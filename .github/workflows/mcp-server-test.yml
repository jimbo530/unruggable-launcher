name: mcp-server test

on:
  push:
    branches: [main]
    paths: ['mcp-server/**']
  pull_request:
    branches: [main]
    paths: ['mcp-server/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
