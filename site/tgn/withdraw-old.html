<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Withdraw from Old Vault</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
<style>
:root{--accent:#f59e0b;--bg:#0a0a1a;--card:#111;--input:#0a0a0a;--border:#2a2000;--dim:color-mix(in srgb,var(--accent) 15%,transparent)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#ccc;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 0 40px}
.hero{text-align:center;padding:20px 20px 12px}
.hero h1{color:var(--accent);font-size:24px;font-weight:700}
.hero .sub{color:#888;font-size:13px;margin-top:6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:480px;margin:12px 20px}
.card h3{color:var(--accent);font-size:14px;margin-bottom:14px;font-weight:600}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #1a1a1a}
.stat-row .k{color:#888}.stat-row .v{color:#fff;font-weight:600}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s}
.btn.connect{background:var(--dim);color:var(--accent);border:2px solid var(--accent);max-width:480px;margin:0 20px 12px}
.btn.go{background:linear-gradient(135deg,var(--accent),#d97706);color:#000}
.btn.go:disabled{opacity:.4;cursor:not-allowed}
.btn.secondary{background:var(--dim);color:var(--accent);border:1px solid var(--accent)}
.toggle-row{display:flex;gap:4px;background:var(--input);border-radius:10px;padding:3px;margin-bottom:14px}
.toggle{flex:1;text-align:center;padding:8px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;color:#888;transition:all .3s}
.toggle.active{background:var(--dim);color:var(--accent)}
.range-row{margin-bottom:14px}
.range-row input[type=range]{width:100%;accent-color:var(--accent)}
.range-row .pct{text-align:center;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px}
.status{margin-top:10px;padding:10px;border-radius:8px;font-size:12px;text-align:center;display:none}
.status.wait{display:block;background:#1a1a00;color:#dda}
.status.ok{display:block;background:#001a00;color:#4f4}
.status.err{display:block;background:#1a0000;color:#f44}
.note{background:#1a1a00;border:1px solid #555500;border-radius:12px;padding:14px;text-align:center;font-size:13px;color:#dda;max-width:480px;margin:0 20px 12px;width:100%}
.footer{text-align:center;margin-top:20px;font-size:11px;color:#444;max-width:480px}
</style>
</head>
<body>

<div class="note">
  This is the old vault. Withdraw your funds here, then deposit into the <b>new vault</b> for yield compounding.
</div>

<div class="hero">
  <h1 id="title">Withdraw from Old Vault</h1>
  <div class="sub">Withdraw your funds from the previous vault contract.</div>
</div>

<button class="btn connect" id="connectBtn" onclick="connect()">Connect Wallet</button>

<div class="card" id="infoCard" style="display:none">
  <h3>Your Position</h3>
  <div class="stat-row"><span class="k">Your shares</span><span class="v" id="userShares">-</span></div>
  <div class="stat-row"><span class="k">Your LP tokens</span><span class="v" id="userLP">-</span></div>
  <div class="stat-row"><span class="k">Estimated value</span><span class="v" id="userValue">-</span></div>
</div>

<div class="card" id="withdrawCard" style="display:none">
  <h3>Withdraw</h3>
  <div class="toggle-row">
    <div class="toggle active" id="wUsdc" onclick="setMode(false)">As USDC</div>
    <div class="toggle" id="wToken" onclick="setMode(true)">As Token</div>
  </div>
  <div class="range-row">
    <div class="pct" id="pctLabel">100%</div>
    <input type="range" min="1" max="100" value="100" id="withdrawPct" oninput="document.getElementById('pctLabel').textContent=this.value+'%'">
  </div>
  <button class="btn go" id="withdrawBtn" onclick="doWithdraw()" disabled>Withdraw as USDC</button>
  <div class="status" id="withdrawStatus"></div>
</div>

<div class="footer">
  <span id="footerAddr"></span>
</div>

<script>
const params = new URLSearchParams(location.search);
const VAULT_ADDR = params.get('vault');
const VAULT_NAME = params.get('name') || 'Old Vault';

if (!VAULT_ADDR) {
  document.body.innerHTML = '<div style="text-align:center;padding:40px;color:#f44">Missing ?vault= parameter</div>';
}

document.getElementById('title').textContent = VAULT_NAME + ' — Withdraw';
document.title = VAULT_NAME + ' — Withdraw from Old Vault';
document.getElementById('footerAddr').textContent = 'Old vault: ' + VAULT_ADDR;

const USDC_ADDR = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';
const BASE_CHAIN = 8453;

const VAULT_ABI = [
  'function withdraw(uint256 shareAmount) external',
  'function withdrawAsToken(uint256 shareAmount) external',
  'function getInfo(address) view returns (uint256 userShares, uint256 userPending, uint256 userLP, uint256 vaultLP)',
  'function totalShares() view returns (uint256)',
  'function FUND() view returns (address)',
  'function TOKEN() view returns (address)',
  'function LP() view returns (address)',
];
const ERC20_ABI = ['function balanceOf(address) view returns (uint256)'];
const PAIR_ABI = [
  'function getReserves() view returns (uint112,uint112,uint32)',
  'function token0() view returns (address)',
  'function totalSupply() view returns (uint256)',
];

let provider, signer, user, vault;
let _userShares = 0n;
let _asToken = false;

async function connect() {
  if (!window.ethereum) { alert('Install MetaMask or a Web3 wallet'); return; }
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    const net = await provider.getNetwork();
    if (Number(net.chainId) !== BASE_CHAIN) {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x2105' }] });
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    signer = await provider.getSigner();
    user = await signer.getAddress();
    vault = new ethers.Contract(VAULT_ADDR, VAULT_ABI, signer);
    document.getElementById('connectBtn').textContent = user.slice(0,6) + '...' + user.slice(-4);
    document.getElementById('infoCard').style.display = '';
    document.getElementById('withdrawCard').style.display = '';
    document.getElementById('withdrawBtn').disabled = false;
    refresh();
  } catch (e) { alert('Connection failed: ' + (e.message || e)); }
}

async function refresh() {
  if (!user) return;
  try {
    const info = await vault.getInfo(user);
    _userShares = info[0];
    const userLP = info[2];

    document.getElementById('userShares').textContent = Number(ethers.formatEther(_userShares)).toFixed(4);
    document.getElementById('userLP').textContent = Number(ethers.formatEther(userLP)).toFixed(6);

    if (_userShares === 0n) {
      document.getElementById('userValue').textContent = '$0.00 (empty)';
      document.getElementById('withdrawBtn').disabled = true;
      return;
    }

    // Try to estimate USD value from LP reserves
    try {
      const fundAddr = await vault.FUND();
      const lpAddr = await vault.LP();
      const pair = new ethers.Contract(lpAddr, PAIR_ABI, provider);
      const [r0, r1] = await pair.getReserves();
      const lpSupply = await pair.totalSupply();
      const t0 = await pair.token0();
      const fundIsT0 = t0.toLowerCase() === fundAddr.toLowerCase();
      const fundReserve = fundIsT0 ? r0 : r1;
      // Fund is 6 decimals, LP is 18. Fund reserve * 2 = total pool value
      const poolUsd = Number(ethers.formatUnits(fundReserve, 6)) * 2;
      const userUsd = lpSupply > 0n ? (poolUsd * Number(userLP)) / Number(lpSupply) : 0;
      document.getElementById('userValue').textContent = '~$' + userUsd.toFixed(2);
    } catch {
      document.getElementById('userValue').textContent = '(could not estimate)';
    }
  } catch (e) {
    document.getElementById('userShares').textContent = 'Error';
  }
}

function setMode(asToken) {
  _asToken = asToken;
  document.getElementById('wUsdc').classList.toggle('active', !asToken);
  document.getElementById('wToken').classList.toggle('active', asToken);
  document.getElementById('withdrawBtn').textContent = asToken ? 'Withdraw as Token' : 'Withdraw as USDC';
}

async function doWithdraw() {
  const pct = parseInt(document.getElementById('withdrawPct').value) || 0;
  if (pct <= 0 || _userShares === 0n) return;
  const shareAmt = _userShares * BigInt(pct) / 100n;
  const status = document.getElementById('withdrawStatus');
  try {
    if (_asToken) {
      status.className = 'status wait'; status.textContent = 'Withdrawing as token (slippage-checked)...';
      const tx = await vault.withdrawAsToken(shareAmt); await tx.wait();
    } else {
      status.className = 'status wait'; status.textContent = 'Withdrawing as USDC (slippage-checked)...';
      const tx = await vault.withdraw(shareAmt); await tx.wait();
    }
    status.className = 'status ok'; status.textContent = 'Withdrawn! Check your wallet.';
    refresh();
  } catch (e) {
    status.className = 'status err';
    const msg = e.reason || e.shortMessage || e.message || 'Failed';
    status.textContent = msg.includes('price impact') ? 'Price impact too high. Try a smaller %.' : msg;
  }
}

if (window.ethereum) {
  window.ethereum.on('accountsChanged', () => location.reload());
  window.ethereum.on('chainChanged', () => location.reload());
}
</script>
</body>
</html>
