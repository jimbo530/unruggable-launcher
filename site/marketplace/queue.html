<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Hero Commission Queue — private</title>
<style>
  :root { --bg:#0a0f0d; --bg2:#111814; --bg3:#161f1a; --border:#243029; --text:#dfeee6; --muted:#7f988b; --green:#4ade80; }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; padding: 24px; }
  h1 { font-size: 18px; letter-spacing: 2px; color: var(--green); }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .keybox { margin: 12px 0 20px; }
  .keybox input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 6px; font-family: inherit; width: 280px; }
  .keybox button { background: var(--green); color: #06120a; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; cursor: pointer; }
  .stats { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .card.done { opacity: .55; }
  .card.spam { opacity: .4; border-style: dashed; }
  .row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .name { font-size: 15px; color: var(--text); font-weight: 700; }
  .meta { font-size: 11px; color: var(--muted); }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; }
  .b-new { background: rgba(74,222,128,.18); color: var(--green); }
  .b-in-progress { background: rgba(96,165,250,.18); color: #60a5fa; }
  .b-done { background: rgba(127,152,139,.18); color: var(--muted); }
  .b-refunded { background: rgba(251,191,36,.18); color: #fbbf24; }
  .b-spam { background: rgba(248,113,113,.18); color: #fca5a5; }
  .answers { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; font-size: 12px; }
  .answers .full { grid-column: 1 / -1; }
  .answers label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .answers .v { color: var(--text); white-space: pre-wrap; }
  .tx a { color: var(--green); word-break: break-all; }
  .actions { margin-top: 12px; display: flex; gap: 6px; flex-wrap: wrap; }
  .actions button { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 5px; padding: 5px 10px; font-size: 10px; cursor: pointer; font-family: inherit; }
  .actions button:hover { border-color: var(--green); }
  .err { color: #fca5a5; font-size: 12px; }
</style>
</head>
<body>
  <h1>HERO COMMISSION QUEUE</h1>
  <div class="sub">Private. Paste your admin key to load requests. Bookmark with <code>?key=…</code> to skip this.</div>
  <div class="keybox" id="keybox">
    <input id="key" type="password" placeholder="admin key">
    <button onclick="loadKey()">Load</button>
  </div>
  <div class="stats" id="stats"></div>
  <div id="list"></div>
  <div class="err" id="err"></div>

<script>
const API = '/api/commission';
let KEY = new URLSearchParams(location.search).get('key') || '';

function loadKey() { KEY = document.getElementById('key').value.trim(); load(); }

async function setStatus(id, status) {
  await fetch(API + '/status?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, status }),
  });
  load();
}

function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c])); }
function txLink(chain, hash) {
  const base = chain === 'polygon' ? 'https://polygonscan.com/tx/' : 'https://basescan.org/tx/';
  return `<a href="${base}${hash}" target="_blank" rel="noopener">${hash.slice(0,18)}…</a>`;
}

async function load() {
  const err = document.getElementById('err'); err.textContent = '';
  if (!KEY) return;
  let data;
  try {
    const r = await fetch(API + '/list?key=' + encodeURIComponent(KEY));
    if (r.status === 403) { err.textContent = 'Wrong admin key.'; return; }
    data = await r.json();
  } catch (e) { err.textContent = 'Could not reach the queue API.'; return; }

  document.getElementById('keybox').style.display = 'none';
  const counts = data.reduce((a, x) => (a[x.status] = (a[x.status] || 0) + 1, a), {});
  document.getElementById('stats').textContent =
    `${data.length} total · ` + Object.entries(counts).map(([k, v]) => `${v} ${k}`).join(' · ');

  document.getElementById('list').innerHTML = data.map(c => {
    const a = c.answers || {};
    const A = (lab, v, full) => v ? `<div class="${full ? 'full' : ''}"><label>${lab}</label><div class="v">${esc(v)}</div></div>` : '';
    return `<div class="card ${c.status}">
      <div class="row">
        <div><span class="name">${esc(a.name || '(no name)')}</span>
          <span class="badge b-${c.status}">${c.status}</span></div>
        <div class="meta">${new Date(c.ts).toLocaleString()} · ${esc(c.chain)}</div>
      </div>
      <div class="meta">✉ ${esc(c.email)}${c.xHandle ? ' · ' + esc(c.xHandle) : ''} · ${c.paidUsdc ? '💲paid $' + c.paidUsdc + ' · ' : ''}tx: <span class="tx">${txLink(c.chain, c.txHash)}</span></div>
      <div class="meta">📦 send hero to: <span class="tx">${esc(c.deliverWallet || c.payerWallet || '(unknown)')}</span></div>
      <div class="answers">
        ${A('Race', a.race)}${A('Role', a.role)}${A('Weapon', a.weapon)}${A('Colors', a.colors)}
        ${A('Vibe', a.vibe, true)}${A('Backstory', a.backstory, true)}${A('Notes', a.anything, true)}
      </div>
      <div class="actions">
        <button onclick="setStatus('${c.id}','in-progress')">▶ in progress</button>
        <button onclick="setStatus('${c.id}','done')">✓ done</button>
        <button onclick="setStatus('${c.id}','refunded')">↩ refunded</button>
        <button onclick="setStatus('${c.id}','spam')">✕ spam</button>
        <button onclick="setStatus('${c.id}','new')">↺ new</button>
      </div>
    </div>`;
  }).join('') || '<div class="meta">No requests yet.</div>';
}

if (KEY) load();
</script>
</body>
</html>
