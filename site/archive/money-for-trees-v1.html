<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Money for Trees V1 (Legacy)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1a0a;color:#ccc;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.hero{text-align:center;padding:40px 20px 20px}
.hero h1{color:#4ade80;font-size:28px;font-weight:700;margin-bottom:4px}
.hero .sub{color:#888;font-size:14px}
.legacy-banner{background:#1a1a00;border:1px solid #554400;border-radius:12px;padding:16px;width:100%;max-width:420px;margin:10px 20px;font-size:13px;color:#f0d060;text-align:center;line-height:1.6}
.legacy-banner a{color:#4ade80;text-decoration:underline}
.card{background:#111;border:1px solid #2a3a2a;border-radius:16px;padding:24px;width:100%;max-width:420px;margin:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:#0a0a0a;border-radius:10px;padding:3px}
.tab{flex:1;text-align:center;padding:10px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#888;transition:all .2s}
.tab.active{background:#1a2a1a;color:#4ade80}
.tab:hover:not(.active){color:#aaa}
.amount-input{background:#0a0a0a;border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:8px;text-align:center;transition:border-color .2s}
.amount-input:focus-within{border-color:#4ade80}
.amount-input .dollar{font-size:36px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:4px}
.amount-input .dollar span{color:#888;font-weight:400}
.amount-input input{background:none;border:none;color:#fff;font-size:36px;font-weight:700;outline:none;width:160px;text-align:center}
.amount-input input::placeholder{color:#333}
.balance-row{font-size:12px;color:#666;margin:6px 0 16px;text-align:center}
.balance-row b{color:#4ade80;cursor:pointer}
.action-btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.action-btn.connect{background:#1a2a1a;color:#4ade80;border:2px solid #4ade80}
.action-btn.connect:hover{background:#2a3a2a}
.action-btn.go{background:#4ade80;color:#000}
.action-btn.go:hover{background:#5bef91}
.action-btn:disabled{opacity:0.4;cursor:not-allowed}
.stats{width:100%;max-width:420px;margin:0 20px 20px}
.stats h3{color:#4ade80;font-size:14px;margin-bottom:10px;font-weight:600}
.stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;font-size:13px}
.stat-row .k{color:#888}.stat-row .v{color:#4ade80;font-weight:600}
.status{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.status.ok{color:#4ade80}.status.err{color:#ef4444}.status.wait{color:#f0d060}
</style>
</head>
<body>

<div class="hero">
  <h1>Money for Trees V1</h1>
  <div class="sub">Legacy contract — withdraw your funds here</div>
</div>

<div class="legacy-banner">
  This is the <strong>V1 contract</strong> (0xe96f...652F). It still works for withdrawals.<br>
  The new version is live at <a href="../money-for-trees.html">money-for-trees.html</a>
</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="setMode('deposit')">Deposit</div>
    <div class="tab" onclick="setMode('withdraw')">Withdraw</div>
  </div>

  <div class="amount-input">
    <div class="dollar">
      <span>$</span>
      <input id="amount" type="number" placeholder="0.00" step="0.01" min="0">
    </div>
  </div>
  <div class="balance-row" id="balanceRow">Connect wallet to see balance</div>

  <button class="action-btn connect" id="mainBtn" onclick="handleAction()">Connect Wallet</button>
  <div class="status" id="status"></div>
</div>

<div class="stats">
  <h3>V1 Stats</h3>
  <div class="stat-row"><span class="k">Total Deposited</span><span class="v" id="sSupply">—</span></div>
  <div class="stat-row"><span class="k">Yield Earned</span><span class="v" id="sYield">—</span></div>
  <div class="stat-row"><span class="k">Total Harvested</span><span class="v" id="sHarvested">—</span></div>
</div>

<script>
const VAULT = '0xe96fa44b4b82F085a457F9B7a0F85ea26FF1652F';
const USDC_ADDR = '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913';

const VAULT_ABI = [
  'function deposit(uint256 amount) external',
  'function withdraw(uint256 amount) external',
  'function totalSupply() view returns (uint256)',
  'function totalBacking() view returns (uint256)',
  'function pendingYield() view returns (uint256)',
  'function totalHarvested() view returns (uint256)',
  'function balanceOf(address) view returns (uint256)',
];

const ERC20_ABI = [
  'function approve(address,uint256) returns (bool)',
  'function allowance(address,address) view returns (uint256)',
  'function balanceOf(address) view returns (uint256)',
];

let provider, signer, vault, usdc, userAddr;
let mode = 'deposit';
let state = 'disconnected';

function fmt(val) { return parseFloat(ethers.formatUnits(val, 6)).toFixed(2); }

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && m==='deposit') || (i===1 && m==='withdraw'));
  });
  document.getElementById('amount').value = '';
  updateButton();
  updateBalances();
}

async function setMax() {
  if (!signer) return;
  try {
    const bal = mode === 'deposit'
      ? await usdc.balanceOf(userAddr)
      : await vault.balanceOf(userAddr);
    document.getElementById('amount').value = ethers.formatUnits(bal, 6);
  } catch(e) { console.error(e); }
}

async function updateBalances() {
  if (!signer) return;
  try {
    const usdcBal = await usdc.balanceOf(userAddr);
    const mftBal = await vault.balanceOf(userAddr);
    if (mode === 'deposit') {
      document.getElementById('balanceRow').innerHTML =
        'Available: $' + fmt(usdcBal) + ' &mdash; <b onclick="setMax()">Use max</b>';
    } else {
      document.getElementById('balanceRow').innerHTML =
        'Deposited: $' + fmt(mftBal) + ' &mdash; <b onclick="setMax()">Withdraw all</b>';
    }
  } catch(e) {}
}

async function updateStats() {
  try {
    const p = new ethers.JsonRpcProvider('https://mainnet.base.org');
    const v = new ethers.Contract(VAULT, VAULT_ABI, p);
    const [supply, pending, harvested] = await Promise.all([
      v.totalSupply(), v.pendingYield(), v.totalHarvested()
    ]);
    document.getElementById('sSupply').textContent = '$' + fmt(supply);
    document.getElementById('sYield').textContent = '$' + fmt(pending);
    document.getElementById('sHarvested').textContent = '$' + fmt(harvested);
  } catch(e) { console.error('Stats error:', e); }
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function updateButton() {
  const btn = document.getElementById('mainBtn');
  if (state === 'disconnected') {
    btn.textContent = 'Connect Wallet';
    btn.className = 'action-btn connect';
    btn.disabled = false;
  } else {
    btn.textContent = mode === 'deposit' ? 'Deposit' : 'Withdraw';
    btn.className = 'action-btn go';
    btn.disabled = false;
  }
}

async function handleAction() {
  if (state === 'disconnected') { await connect(); }
  else { await doSwap(); }
}

async function connect() {
  try {
    if (!window.ethereum) { setStatus('No wallet found', 'err'); return; }
    provider = new ethers.BrowserProvider(window.ethereum);
    const net = await provider.getNetwork();
    if (Number(net.chainId) !== 8453) {
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x2105' }] });
        provider = new ethers.BrowserProvider(window.ethereum);
      } catch(e) { setStatus('Please switch to Base network', 'err'); return; }
    }
    signer = await provider.getSigner();
    userAddr = await signer.getAddress();
    vault = new ethers.Contract(VAULT, VAULT_ABI, signer);
    usdc = new ethers.Contract(USDC_ADDR, ERC20_ABI, signer);
    state = 'ready';
    setStatus('', 'ok');
    updateButton();
    updateBalances();
    updateStats();
  } catch(e) { setStatus('Connection failed: ' + e.message, 'err'); }
}

async function doSwap() {
  const amtStr = document.getElementById('amount').value;
  if (!amtStr || parseFloat(amtStr) <= 0) { setStatus('Enter an amount', 'err'); return; }
  const amt = ethers.parseUnits(amtStr, 6);
  const btn = document.getElementById('mainBtn');
  btn.disabled = true;
  try {
    if (mode === 'deposit') {
      const allowance = await usdc.allowance(userAddr, VAULT);
      if (allowance < amt) {
        setStatus('Approving...', 'wait');
        const appTx = await usdc.approve(VAULT, ethers.MaxUint256);
        await appTx.wait();
      }
      setStatus('Depositing...', 'wait');
      const tx = await vault.deposit(amt);
      await tx.wait();
      setStatus('Deposited $' + parseFloat(amtStr).toFixed(2), 'ok');
    } else {
      setStatus('Withdrawing...', 'wait');
      const tx = await vault.withdraw(amt);
      await tx.wait();
      setStatus('Withdrew $' + parseFloat(amtStr).toFixed(2), 'ok');
    }
    document.getElementById('amount').value = '';
    updateBalances();
    updateStats();
  } catch(e) { setStatus('Error: ' + (e.reason || e.message), 'err'); }
  btn.disabled = false;
}

updateStats();
setInterval(updateStats, 30000);
</script>
</body>
</html>
