<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>S.C.A.T. Attack</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'FIRE', b: 'LOCK' } });

const STAGE_COUNT = 7;
const MAX_HP = 4;
const MAX_LIVES = 3;
const STAGE_LENGTH = 2400; // frames per stage before boss
const ORB_ORBIT_RADIUS = 28;
const ORB_ORBIT_SPEED = 0.04;
const PLAYER_ACCEL = 0.35;
const PLAYER_FRICTION = 0.92;
const PLAYER_MAX_SPEED = 3.2;
const FIRE_COOLDOWN = 8;
const ORB_FIRE_COOLDOWN = 12;
const COMBO_DECAY = 120; // frames before multiplier resets

const STAGE_NAMES = [
  'Orbital Station', 'Atmospheric Entry', 'City Ruins',
  'Underground Base', 'Fungal Hive', 'Ocean Platform', 'Mothership Core'
];
const STAGE_COLORS = [
  { bg: '#050510', mid: '#0a0a2a', fg: '#111144', accent: '#4488ff' },
  { bg: '#0a0510', mid: '#1a1030', fg: '#332244', accent: '#ff8844' },
  { bg: '#080808', mid: '#151515', fg: '#2a2a2a', accent: '#88ff44' },
  { bg: '#0a0a05', mid: '#1a1a10', fg: '#333320', accent: '#ffdd22' },
  { bg: '#0a100a', mid: '#1a2a1a', fg: '#224422', accent: '#44ff88' },
  { bg: '#051015', mid: '#0a2030', fg: '#153040', accent: '#44ddff' },
  { bg: '#100510', mid: '#2a0a2a', fg: '#441444', accent: '#ff44ff' }
];
const SCROLL_SPEEDS = [1.2, 1.8, 1.0, 0.8, 1.0, 1.4, 1.6];

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('scat_attack_hi');
let lives = MAX_LIVES;
let hp = MAX_HP;
let stage = 0;
let frame = 0;
let stageFrame = 0;
let combo = 1;
let comboTimer = 0;
let invincible = 0;
let deathTimer = 0;
let bossActive = false;
let bossWarning = 0;
let stageTransition = 0;
let scrollX = 0;

// Player
let player = { x: 60, y: GH / 2, vx: 0, vy: 0, w: 16, h: 12 };
let mainGunLevel = 0; // 0=single, 1=double, 2=triple spread
let fireTimer = 0;
let orbFireTimer = 0;

// Orbs
let orbs = [
  { angle: 0, locked: false, lockAngle: 0, weaponType: 'normal' },
  { angle: Math.PI, locked: false, lockAngle: Math.PI, weaponType: 'normal' }
];
let orbsLocked = false;
let bPressedLast = false;

// Bullets
let playerBullets = [];
let orbBullets = [];
let enemyBullets = [];

// Enemies & boss
let enemies = [];
let boss = null;
let powerUps = [];
let hazards = []; // stage hazards (walls, tentacles, etc.)

// Background
let starfield = TAS.bg.createStarfield(80, GW, GH);
let bgElements = [];

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function anyKey() {
  return Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b;
}

function wrapAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

function spawnExplosion(x, y, color, count, speed) {
  TAS.particles.spawn(x, y, color, count || 8, speed || 3, { size: 2, sizeVar: 2 });
}

function playShoot() { TAS.audio.playTone(800, 0.05, 'square', 0.06, 400); }
function playOrbShoot() { TAS.audio.playTone(600, 0.04, 'triangle', 0.04, 300); }
function playHit() { TAS.audio.playTone(200, 0.1, 'sawtooth', 0.08, 80); }
function playExplosion() { TAS.audio.playNoise(0.2, 0.08, 800); }
function playPowerUp() { TAS.audio.playTone(440, 0.1, 'sine', 0.08, 880); }
function playBossWarn() { TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1, 100); }
function playLock() { TAS.audio.playTone(1200, 0.08, 'sine', 0.06, 600); }
function playUnlock() { TAS.audio.playTone(600, 0.08, 'sine', 0.06, 1200); }
function playDeath() { TAS.audio.playNoise(0.4, 0.12, 400); }
function playLaser() { TAS.audio.playTone(1000, 0.12, 'sawtooth', 0.04, 2000); }
function playBomb() { TAS.audio.playTone(100, 0.2, 'square', 0.07, 50); }

// ============================================================
// INITIALIZATION
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES;
  hp = MAX_HP;
  stage = 0;
  frame = 0;
  stageFrame = 0;
  combo = 1;
  comboTimer = 0;
  invincible = 60;
  mainGunLevel = 0;
  orbsLocked = false;
  orbs = [
    { angle: 0, locked: false, lockAngle: 0, weaponType: 'normal' },
    { angle: Math.PI, locked: false, lockAngle: Math.PI, weaponType: 'normal' }
  ];
  player = { x: 60, y: GH / 2, vx: 0, vy: 0, w: 16, h: 12 };
  playerBullets = [];
  orbBullets = [];
  enemyBullets = [];
  enemies = [];
  boss = null;
  bossActive = false;
  bossWarning = 0;
  powerUps = [];
  hazards = [];
  bgElements = [];
  scrollX = 0;
  stageTransition = 0;
  TAS.particles.clear();
  generateBgElements();
}

function generateBgElements() {
  bgElements = [];
  for (let i = 0; i < 20; i++) {
    bgElements.push({
      x: Math.random() * GW * 3,
      y: Math.random() * GH,
      size: 4 + Math.random() * 12,
      speed: 0.3 + Math.random() * 0.5,
      type: Math.floor(Math.random() * 3)
    });
  }
}

// ============================================================
// PLAYER DRAWING
// ============================================================
function drawPlayer(px, py) {
  const flash = invincible > 0 && Math.floor(invincible / 3) % 2 === 0;
  if (flash) return;

  ctx.save();
  ctx.translate(px, py);

  // Jetpack flame
  const flicker = Math.sin(frame * 0.5) * 2;
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(-12, -2, -4 - flicker, 4);
  ctx.fillStyle = '#ffdd00';
  ctx.fillRect(-12, -1, -2 - flicker * 0.5, 2);

  // Body (baseling astronaut shape)
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Helmet visor
  ctx.fillStyle = '#4488cc';
  ctx.beginPath();
  ctx.arc(4, -1, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#88ccff';
  ctx.beginPath();
  ctx.arc(5, -2, 2, 0, Math.PI * 2);
  ctx.fill();

  // Jetpack
  ctx.fillStyle = '#556677';
  ctx.fillRect(-8, -4, 4, 8);
  ctx.fillStyle = '#778899';
  ctx.fillRect(-7, -3, 2, 6);

  // Gun barrel
  ctx.fillStyle = '#aabbcc';
  ctx.fillRect(6, -1, 6, 2);

  ctx.restore();
}

// ============================================================
// ORB DRAWING & LOGIC
// ============================================================
function getOrbPosition(orbIdx) {
  const orb = orbs[orbIdx];
  const a = orbsLocked ? orb.lockAngle : orb.angle;
  return {
    x: player.x + Math.cos(a) * ORB_ORBIT_RADIUS,
    y: player.y + Math.sin(a) * ORB_ORBIT_RADIUS
  };
}

function drawOrb(x, y, weaponType, locked) {
  // Outer glow
  const glowColor = locked ? 'rgba(255,100,100,0.3)' : 'rgba(100,200,255,0.3)';
  ctx.fillStyle = glowColor;
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI * 2);
  ctx.fill();

  // Core
  let coreColor = '#88ddff';
  if (weaponType === 'laser') coreColor = '#ff4444';
  else if (weaponType === 'bomb') coreColor = '#ffaa22';
  else if (weaponType === 'wave') coreColor = '#44ff88';

  ctx.fillStyle = coreColor;
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();

  // Inner bright spot
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x - 1, y - 1, 2, 0, Math.PI * 2);
  ctx.fill();

  // Lock indicator
  if (locked) {
    ctx.strokeStyle = '#ff6666';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, 7, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Connection line to player
  ctx.strokeStyle = locked ? 'rgba(255,100,100,0.2)' : 'rgba(100,200,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(x, y);
  ctx.stroke();
}

function updateOrbs(dt) {
  const spd = dt * 60;
  for (let i = 0; i < orbs.length; i++) {
    if (!orbsLocked) {
      orbs[i].angle += ORB_ORBIT_SPEED * spd;
      orbs[i].lockAngle = orbs[i].angle;
    }
  }
}

// ============================================================
// BULLET SYSTEMS
// ============================================================
function fireMainGun() {
  if (fireTimer > 0) return;
  fireTimer = FIRE_COOLDOWN;
  playShoot();

  const bx = player.x + 10;
  const by = player.y;

  if (mainGunLevel === 0) {
    playerBullets.push({ x: bx, y: by, vx: 7, vy: 0, w: 8, h: 2, dmg: 1, color: '#ffdd44' });
  } else if (mainGunLevel === 1) {
    playerBullets.push({ x: bx, y: by - 3, vx: 7, vy: 0, w: 8, h: 2, dmg: 1, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by + 3, vx: 7, vy: 0, w: 8, h: 2, dmg: 1, color: '#ffdd44' });
  } else {
    playerBullets.push({ x: bx, y: by, vx: 7, vy: 0, w: 8, h: 2, dmg: 1, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by - 2, vx: 6.8, vy: -1.2, w: 6, h: 2, dmg: 1, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by + 2, vx: 6.8, vy: 1.2, w: 6, h: 2, dmg: 1, color: '#ffdd44' });
  }
}

function fireOrbs() {
  if (orbFireTimer > 0) return;
  orbFireTimer = ORB_FIRE_COOLDOWN;

  for (let i = 0; i < orbs.length; i++) {
    const pos = getOrbPosition(i);
    const orb = orbs[i];
    const a = orbsLocked ? orb.lockAngle : orb.angle;

    // Fire direction: when locked, fire outward from lock angle; when orbiting, fire forward
    let fireAngle = orbsLocked ? a : 0;

    if (orb.weaponType === 'normal') {
      playOrbShoot();
      const speed = 6;
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * speed,
        vy: Math.sin(fireAngle) * speed,
        w: 6, h: 3, dmg: 1, life: 80,
        type: 'normal', color: '#88ddff'
      });
    } else if (orb.weaponType === 'laser') {
      playLaser();
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 12,
        vy: Math.sin(fireAngle) * 12,
        w: 20, h: 3, dmg: 2, life: 30,
        type: 'laser', color: '#ff4444', pierce: true
      });
    } else if (orb.weaponType === 'bomb') {
      playBomb();
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 4,
        vy: Math.sin(fireAngle) * 4 - 1,
        w: 6, h: 6, dmg: 3, life: 60,
        type: 'bomb', color: '#ffaa22', gravity: 0.08
      });
    } else if (orb.weaponType === 'wave') {
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 5,
        vy: Math.sin(fireAngle) * 5,
        w: 6, h: 6, dmg: 1, life: 90,
        type: 'wave', color: '#44ff88',
        waveAmp: 3, waveFreq: 0.15, wavePhase: 0, baseVy: Math.sin(fireAngle) * 5
      });
    }
  }
}

function updateBullets(dt) {
  const spd = dt * 60;

  // Player bullets
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x > GW + 20 || b.x < -20 || b.y < -20 || b.y > GH + 20) {
      playerBullets.splice(i, 1);
    }
  }

  // Orb bullets
  for (let i = orbBullets.length - 1; i >= 0; i--) {
    const b = orbBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.gravity) b.vy += b.gravity * spd;
    if (b.type === 'wave') {
      b.wavePhase += b.waveFreq * spd;
      b.y += Math.sin(b.wavePhase) * b.waveAmp;
    }
    b.life -= spd;
    if (b.life <= 0 || b.x > GW + 20 || b.x < -20 || b.y < -20 || b.y > GH + 20) {
      if (b.type === 'bomb') {
        spawnExplosion(b.x, b.y, '#ffaa22', 12, 4);
        // Bomb splash damage
        for (let e = enemies.length - 1; e >= 0; e--) {
          if (TAS.math.dist(b.x, b.y, enemies[e].x, enemies[e].y) < 30) {
            damageEnemy(e, 2);
          }
        }
      }
      orbBullets.splice(i, 1);
    }
  }

  // Enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x > GW + 20 || b.x < -40 || b.y < -20 || b.y > GH + 20) {
      enemyBullets.splice(i, 1);
    }
  }
}

function drawBullets() {
  // Player bullets
  for (const b of playerBullets) {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - b.w / 2 + 1, b.y - b.h / 2, b.w - 3, 1);
  }

  // Orb bullets
  for (const b of orbBullets) {
    ctx.fillStyle = b.color;
    if (b.type === 'laser') {
      ctx.globalAlpha = 0.8;
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(b.x - b.w / 2, b.y, b.w, 1);
      ctx.globalAlpha = 1;
    } else if (b.type === 'bomb') {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd00';
      ctx.beginPath();
      ctx.arc(b.x - 1, b.y - 1, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (b.type === 'wave') {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Enemy bullets
  for (const b of enemyBullets) {
    ctx.fillStyle = b.color || '#ff4466';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r || 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// ENEMY SYSTEM
// ============================================================
function spawnEnemy(type, x, y, opts) {
  opts = opts || {};
  const e = {
    type, x, y,
    vx: opts.vx || -2, vy: opts.vy || 0,
    hp: opts.hp || 2, maxHp: opts.hp || 2,
    w: opts.w || 16, h: opts.h || 12,
    timer: 0, phase: 0,
    score: opts.score || 100,
    fireRate: opts.fireRate || 90,
    color: opts.color || '#44aa66',
    parts: opts.parts || null,
    chain: opts.chain || null
  };
  enemies.push(e);
  return e;
}

function damageEnemy(idx, dmg) {
  const e = enemies[idx];
  e.hp -= dmg;
  TAS.particles.spawn(e.x, e.y, '#fff', 3, 2);

  if (e.hp <= 0) {
    killEnemy(idx);
  }
}

function killEnemy(idx) {
  const e = enemies[idx];
  spawnExplosion(e.x, e.y, e.color, 10, 3);
  playExplosion();
  score += e.score * combo;
  comboTimer = COMBO_DECAY;
  combo = Math.min(combo + 1, 8);

  // Drop power-up chance
  if (Math.random() < 0.12) {
    spawnPowerUp(e.x, e.y);
  }

  enemies.splice(idx, 1);
}

function updateEnemies(dt) {
  const spd = dt * 60;

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.timer += spd;

    switch (e.type) {
      case 'drone':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.05) * 0.8 * spd;
        if (e.timer % e.fireRate < spd && Math.random() < 0.3) {
          enemyShoot(e, -4, 0);
        }
        break;

      case 'swooper':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.03) * 2 * spd;
        break;

      case 'turret_floor':
      case 'turret_ceil':
        e.x += (SCROLL_SPEEDS[stage] * -0.5) * spd;
        if (e.timer % e.fireRate < spd) {
          const angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyShoot(e, Math.cos(angle) * 3, Math.sin(angle) * 3);
        }
        break;

      case 'turret_wall':
        e.x += (SCROLL_SPEEDS[stage] * -0.3) * spd;
        if (e.timer % e.fireRate < spd) {
          enemyShoot(e, -3, 0);
          enemyShoot(e, -3, 1);
          enemyShoot(e, -3, -1);
        }
        break;

      case 'snake_head':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.04) * 1.5 * spd;
        if (e.chain) {
          for (let c = 0; c < e.chain.length; c++) {
            const prev = c === 0 ? e : e.chain[c - 1];
            const seg = e.chain[c];
            const dx = prev.x - seg.x, dy = prev.y - seg.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 12) {
              seg.x += (dx / d) * (d - 12) * 0.5 * spd;
              seg.y += (dy / d) * (d - 12) * 0.5 * spd;
            }
          }
        }
        break;

      case 'shield_carrier':
        e.x += e.vx * spd;
        e.phase += 0.02 * spd;
        if (e.timer % (e.fireRate * 2) < spd) {
          enemyShoot(e, -3, 0);
        }
        break;

      case 'bomber':
        e.x += e.vx * spd;
        if (e.timer % e.fireRate < spd) {
          enemyBullets.push({ x: e.x, y: e.y + 8, vx: 0, vy: 3, r: 5, color: '#ff8800' });
        }
        break;

      case 'spore_cloud':
        e.x += e.vx * 0.5 * spd;
        e.y += Math.sin(e.timer * 0.02) * 0.5 * spd;
        if (e.timer % 40 < spd) {
          TAS.particles.spawn(e.x, e.y, '#44ff44', 1, 0.5, { size: 3 });
        }
        break;

      case 'submarine':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.015) * 0.8 * spd;
        if (e.timer % e.fireRate < spd) {
          const angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 3.5, vy: Math.sin(angle) * 3.5, r: 4, color: '#44ddff' });
        }
        break;

      case 'mini_boss':
        e.x += Math.sin(e.timer * 0.015) * 0.8 * spd;
        e.y += Math.sin(e.timer * 0.025) * 1.2 * spd;
        if (e.x > GW - 80) e.x = GW - 80;
        if (e.timer % 30 < spd) {
          const angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyShoot(e, Math.cos(angle) * 4, Math.sin(angle) * 4);
        }
        break;
    }

    // Remove if off-screen left
    if (e.x < -40) {
      enemies.splice(i, 1);
    }
  }
}

function enemyShoot(e, vx, vy) {
  enemyBullets.push({ x: e.x, y: e.y, vx, vy, r: 3, color: '#ff4466' });
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    ctx.translate(e.x, e.y);

    switch (e.type) {
      case 'drone':
        ctx.fillStyle = e.color;
        ctx.fillRect(-8, -6, 16, 12);
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI * 2);
        ctx.fill();
        // Wings
        ctx.fillStyle = e.color;
        ctx.fillRect(-6, -10, 4, 4);
        ctx.fillRect(-6, 6, 4, 4);
        break;

      case 'swooper':
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.moveTo(-10, 0);
        ctx.lineTo(8, -6);
        ctx.lineTo(8, 6);
        ctx.closePath();
        ctx.fill();
        break;

      case 'turret_floor':
      case 'turret_ceil':
        ctx.fillStyle = '#666';
        ctx.fillRect(-8, -8, 16, 16);
        ctx.fillStyle = '#ff4444';
        const tAngle = TAS.math.angle(e.x, e.y, player.x, player.y);
        ctx.save();
        ctx.rotate(tAngle);
        ctx.fillRect(0, -2, 12, 4);
        ctx.restore();
        break;

      case 'turret_wall':
        ctx.fillStyle = '#888';
        ctx.fillRect(-6, -10, 12, 20);
        ctx.fillStyle = '#ff6644';
        ctx.fillRect(-10, -3, 8, 6);
        break;

      case 'snake_head':
        ctx.fillStyle = '#88ff44';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(3, -2, 2, 0, Math.PI * 2);
        ctx.fill();
        // Draw chain
        if (e.chain) {
          for (let c = 0; c < e.chain.length; c++) {
            const seg = e.chain[c];
            ctx.fillStyle = '#66cc33';
            ctx.beginPath();
            ctx.arc(seg.x - e.x, seg.y - e.y, 6 - c * 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        break;

      case 'shield_carrier':
        ctx.fillStyle = e.color;
        ctx.fillRect(-10, -8, 20, 16);
        // Shield (front)
        ctx.fillStyle = 'rgba(100,200,255,0.5)';
        ctx.fillRect(-14, -12, 4, 24);
        break;

      case 'bomber':
        ctx.fillStyle = e.color;
        ctx.fillRect(-12, -6, 24, 12);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(-4, 6, 8, 4);
        break;

      case 'spore_cloud':
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#44ff44';
        ctx.beginPath();
        ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;

      case 'submarine':
        ctx.fillStyle = '#335566';
        ctx.fillRect(-14, -6, 28, 12);
        ctx.fillStyle = '#557788';
        ctx.beginPath();
        ctx.arc(-6, -6, 4, Math.PI, 0);
        ctx.fill();
        break;

      case 'mini_boss':
        ctx.fillStyle = e.color;
        ctx.fillRect(-16, -12, 32, 24);
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(-8, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(8, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        // Health bar
        const hpRatio = e.hp / e.maxHp;
        ctx.fillStyle = '#333';
        ctx.fillRect(-16, -16, 32, 3);
        ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : '#ff4444';
        ctx.fillRect(-16, -16, 32 * hpRatio, 3);
        break;
    }

    ctx.restore();
  }
}

// ============================================================
// BOSS SYSTEM
// ============================================================
function spawnBoss() {
  bossActive = true;
  const bossHp = 40 + stage * 15;
  boss = {
    x: GW + 40, y: GH / 2,
    targetX: GW - 60, targetY: GH / 2,
    w: 48, h: 36,
    hp: bossHp, maxHp: bossHp,
    timer: 0, phase: 0, pattern: 0,
    score: 5000 + stage * 2000,
    color: STAGE_COLORS[stage].accent,
    parts: [],
    defeated: false
  };

  // Boss parts (destructible segments)
  for (let i = 0; i < 2 + stage; i++) {
    boss.parts.push({
      x: 0, y: 0, angle: (i / (2 + stage)) * Math.PI * 2,
      hp: 8, maxHp: 8, radius: 20 + stage * 3,
      active: true
    });
  }
}

function updateBoss(dt) {
  if (!boss || boss.defeated) return;
  const spd = dt * 60;
  boss.timer += spd;

  // Move to position
  boss.x += (boss.targetX - boss.x) * 0.02 * spd;
  boss.y += (boss.targetY - boss.y) * 0.02 * spd;

  // Movement pattern
  boss.targetY = GH / 2 + Math.sin(boss.timer * 0.015) * 80;

  // Attack patterns based on phase
  const phaseTime = 180;
  boss.phase = Math.floor(boss.timer / phaseTime) % 4;

  switch (boss.phase) {
    case 0: // Spread shot
      if (boss.timer % 30 < spd) {
        for (let i = -2; i <= 2; i++) {
          const angle = Math.PI + i * 0.25;
          enemyBullets.push({
            x: boss.x - 20, y: boss.y,
            vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
            r: 4, color: boss.color
          });
        }
      }
      break;
    case 1: // Aimed shots
      if (boss.timer % 20 < spd) {
        const angle = TAS.math.angle(boss.x, boss.y, player.x, player.y);
        enemyBullets.push({
          x: boss.x - 20, y: boss.y,
          vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
          r: 4, color: '#ff8844'
        });
      }
      break;
    case 2: // Spiral
      if (boss.timer % 6 < spd) {
        const angle = boss.timer * 0.1;
        enemyBullets.push({
          x: boss.x, y: boss.y,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
          r: 3, color: '#ff44ff'
        });
      }
      break;
    case 3: // Rest + laser sweep
      if (boss.timer % 45 < spd) {
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          enemyBullets.push({
            x: boss.x + Math.cos(a) * 20, y: boss.y + Math.sin(a) * 20,
            vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5,
            r: 3, color: '#ffdd44'
          });
        }
      }
      break;
  }

  // Update parts
  for (const part of boss.parts) {
    if (!part.active) continue;
    part.angle += 0.02 * spd;
    part.x = boss.x + Math.cos(part.angle) * part.radius;
    part.y = boss.y + Math.sin(part.angle) * part.radius;
  }

  // Check boss death
  if (boss.hp <= 0) {
    boss.defeated = true;
    score += boss.score * combo;
    for (let i = 0; i < 30; i++) {
      setTimeout(function() {
        spawnExplosion(
          boss.x + TAS.math.randRange(-30, 30),
          boss.y + TAS.math.randRange(-20, 20),
          boss.color, 8, 4
        );
        playExplosion();
      }, i * 80);
    }
    TAS.fx.shake(10, 0.92);
    TAS.fx.flash(boss.color, 0.5);
    // Advance stage after delay
    stageTransition = 180;
  }
}

function drawBoss() {
  if (!boss || boss.defeated) return;

  ctx.save();
  ctx.translate(boss.x, boss.y);

  // Main body
  ctx.fillStyle = boss.color;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(0, 0, boss.w, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Core
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(0, 0, boss.w * 0.6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = boss.color;
  ctx.beginPath();
  ctx.arc(0, 0, boss.w * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Eye/core detail
  const pulse = Math.sin(boss.timer * 0.05) * 0.3 + 0.7;
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = pulse;
  ctx.beginPath();
  ctx.arc(0, 0, boss.w * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();

  // Draw parts
  for (const part of boss.parts) {
    if (!part.active) continue;
    ctx.fillStyle = boss.color;
    ctx.beginPath();
    ctx.arc(part.x, part.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(part.x, part.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Health bar
  const hpRatio = boss.hp / boss.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(GW / 2 - 80, GH - 16, 160, 6);
  ctx.fillStyle = hpRatio > 0.3 ? boss.color : '#ff4444';
  ctx.fillRect(GW / 2 - 80, GH - 16, 160 * hpRatio, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', GW / 2, GH - 8);
}

// ============================================================
// POWER-UP SYSTEM
// ============================================================
function spawnPowerUp(x, y) {
  const types = ['gun', 'laser', 'bomb', 'wave', 'health'];
  const weights = [30, 20, 20, 20, 10];
  let total = weights.reduce(function(a, b) { return a + b; }, 0);
  let r = Math.random() * total;
  let type = types[0];
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }
  powerUps.push({ x, y, type, timer: 0, w: 12, h: 12 });
}

function updatePowerUps(dt) {
  const spd = dt * 60;
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const p = powerUps[i];
    p.x -= SCROLL_SPEEDS[stage] * 0.5 * spd;
    p.timer += spd;
    if (p.x < -20) {
      powerUps.splice(i, 1);
      continue;
    }
    // Collect
    if (TAS.hit.rectOverlap(
      player.x - player.w / 2, player.y - player.h / 2, player.w, player.h,
      p.x - p.w / 2, p.y - p.h / 2, p.w, p.h
    )) {
      applyPowerUp(p.type);
      powerUps.splice(i, 1);
    }
  }
}

function applyPowerUp(type) {
  playPowerUp();
  TAS.particles.spawn(player.x, player.y, '#ffdd44', 8, 3);

  switch (type) {
    case 'gun':
      mainGunLevel = Math.min(mainGunLevel + 1, 2);
      break;
    case 'laser':
      orbs[0].weaponType = 'laser';
      orbs[1].weaponType = 'laser';
      break;
    case 'bomb':
      orbs[0].weaponType = 'bomb';
      orbs[1].weaponType = 'bomb';
      break;
    case 'wave':
      orbs[0].weaponType = 'wave';
      orbs[1].weaponType = 'wave';
      break;
    case 'health':
      hp = Math.min(hp + 1, MAX_HP);
      break;
  }
}

function drawPowerUps() {
  for (const p of powerUps) {
    const bob = Math.sin(p.timer * 0.08) * 2;
    ctx.save();
    ctx.translate(p.x, p.y + bob);

    // Glow
    ctx.fillStyle = 'rgba(255,255,100,0.3)';
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fill();

    // Box
    ctx.fillStyle = '#333';
    ctx.fillRect(-6, -6, 12, 12);

    // Letter
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    let label = 'P';
    if (p.type === 'gun') label = 'G';
    else if (p.type === 'laser') label = 'L';
    else if (p.type === 'bomb') label = 'B';
    else if (p.type === 'wave') label = 'W';
    else if (p.type === 'health') label = '+';
    ctx.fillText(label, 0, 3);

    ctx.restore();
  }
}

// ============================================================
// WAVE SPAWNER
// ============================================================
function spawnWave() {
  const progress = stageFrame / STAGE_LENGTH;
  const difficulty = stage + progress * 2;

  // Different spawn patterns based on stage and progress
  const roll = Math.random();

  if (roll < 0.25) {
    // Drone formation
    const count = 3 + Math.floor(difficulty * 0.5);
    for (let i = 0; i < count; i++) {
      spawnEnemy('drone', GW + 20 + i * 30, 40 + Math.random() * (GH - 80), {
        hp: 2 + Math.floor(stage * 0.5),
        vx: -1.5 - Math.random() * 1,
        color: STAGE_COLORS[stage].accent,
        fireRate: 100 - stage * 8
      });
    }
  } else if (roll < 0.4) {
    // Swooper wave (sine pattern)
    const count = 4 + stage;
    for (let i = 0; i < count; i++) {
      spawnEnemy('swooper', GW + 20 + i * 25, GH / 2, {
        hp: 1, vx: -3, vy: 0,
        color: '#ffaa44', score: 80
      });
    }
  } else if (roll < 0.55) {
    // Turrets
    if (stage >= 2) {
      const ty = Math.random() < 0.5 ? 20 : GH - 20;
      spawnEnemy(ty < GH / 2 ? 'turret_ceil' : 'turret_floor', GW + 10, ty, {
        hp: 5 + stage, vx: 0,
        color: '#888', w: 16, h: 16, fireRate: 60 - stage * 5,
        score: 200
      });
    }
  } else if (roll < 0.65) {
    // Snake chain
    if (stage >= 1) {
      const head = spawnEnemy('snake_head', GW + 20, GH / 4 + Math.random() * GH / 2, {
        hp: 6 + stage * 2, vx: -1.2, color: '#88ff44', w: 16, h: 16, score: 500
      });
      head.chain = [];
      for (let c = 0; c < 4 + stage; c++) {
        head.chain.push({ x: head.x + (c + 1) * 12, y: head.y, hp: 1 });
      }
    }
  } else if (roll < 0.75) {
    // Shield carriers
    if (stage >= 2) {
      spawnEnemy('shield_carrier', GW + 20, GH / 3 + Math.random() * GH / 3, {
        hp: 8 + stage * 2, vx: -1, color: '#4488cc', w: 20, h: 16, score: 300,
        fireRate: 80
      });
    }
  } else if (roll < 0.85) {
    // Bombers
    spawnEnemy('bomber', GW + 20, 30 + Math.random() * 40, {
      hp: 4 + stage, vx: -1.5, color: '#886644', w: 24, h: 12,
      fireRate: 45, score: 250
    });
  } else if (roll < 0.92) {
    // Stage-specific enemies
    if (stage === 4) { // Fungal Hive
      spawnEnemy('spore_cloud', GW + 20, 40 + Math.random() * (GH - 80), {
        hp: 3, vx: -0.5, color: '#44ff44', w: 24, h: 24, score: 50
      });
    } else if (stage === 5) { // Ocean
      spawnEnemy('submarine', GW + 20, GH - 60 + Math.random() * 40, {
        hp: 6, vx: -1, color: '#335566', w: 28, h: 12, fireRate: 70, score: 300
      });
    }
  } else {
    // Mini-boss (rare, mid-stage)
    if (progress > 0.4 && progress < 0.6 && Math.random() < 0.3) {
      spawnEnemy('mini_boss', GW + 30, GH / 2, {
        hp: 15 + stage * 5, vx: -0.5,
        color: STAGE_COLORS[stage].accent,
        w: 32, h: 24, score: 2000, fireRate: 30
      });
    }
  }
}

// ============================================================
// COLLISIONS
// ============================================================
function checkCollisions() {
  // Player bullets vs enemies
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (TAS.hit.rectOverlap(
        b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        damageEnemy(ei, b.dmg);
        playerBullets.splice(bi, 1);
        break;
      }
    }
  }

  // Orb bullets vs enemies
  for (let bi = orbBullets.length - 1; bi >= 0; bi--) {
    const b = orbBullets[bi];
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (TAS.hit.rectOverlap(
        b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        damageEnemy(ei, b.dmg);
        if (!b.pierce) { hit = true; break; }
      }
    }
    if (hit) orbBullets.splice(bi, 1);
  }

  // Player bullets vs boss
  if (boss && !boss.defeated) {
    for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
      const b = playerBullets[bi];
      // Hit parts first
      let hitPart = false;
      for (const part of boss.parts) {
        if (!part.active) continue;
        if (TAS.hit.circleOverlap(b.x, b.y, 4, part.x, part.y, 8)) {
          part.hp -= b.dmg;
          if (part.hp <= 0) {
            part.active = false;
            spawnExplosion(part.x, part.y, boss.color, 8, 3);
            score += 500;
          }
          playerBullets.splice(bi, 1);
          hitPart = true;
          break;
        }
      }
      if (hitPart) continue;
      // Hit core
      if (TAS.hit.circleOverlap(b.x, b.y, 4, boss.x, boss.y, boss.w * 0.6)) {
        boss.hp -= b.dmg;
        TAS.particles.spawn(b.x, b.y, '#fff', 2, 2);
        playerBullets.splice(bi, 1);
      }
    }

    // Orb bullets vs boss
    for (let bi = orbBullets.length - 1; bi >= 0; bi--) {
      const b = orbBullets[bi];
      if (TAS.hit.circleOverlap(b.x, b.y, b.w / 2, boss.x, boss.y, boss.w * 0.6)) {
        boss.hp -= b.dmg;
        TAS.particles.spawn(b.x, b.y, '#fff', 2, 2);
        if (!b.pierce) orbBullets.splice(bi, 1);
      }
    }
  }

  // Enemy bullets vs player
  if (invincible <= 0) {
    for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
      const b = enemyBullets[bi];
      if (TAS.hit.circleOverlap(b.x, b.y, b.r || 3, player.x, player.y, 6)) {
        playerHit();
        enemyBullets.splice(bi, 1);
        break;
      }
    }

    // Enemies vs player (collision)
    for (const e of enemies) {
      if (TAS.hit.rectOverlap(
        player.x - player.w / 2, player.y - player.h / 2, player.w, player.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        playerHit();
        break;
      }
    }

    // Boss parts vs player
    if (boss && !boss.defeated) {
      for (const part of boss.parts) {
        if (!part.active) continue;
        if (TAS.hit.circleOverlap(player.x, player.y, 6, part.x, part.y, 8)) {
          playerHit();
          break;
        }
      }
    }
  }
}

function playerHit() {
  hp--;
  invincible = 90;
  combo = 1;
  comboTimer = 0;
  playHit();
  TAS.fx.shake(6, 0.9);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.particles.spawn(player.x, player.y, '#ff8844', 10, 3);

  if (hp <= 0) {
    lives--;
    playDeath();
    if (lives <= 0) {
      gameOver();
    } else {
      // Respawn
      hp = MAX_HP;
      invincible = 120;
      player.x = 60;
      player.y = GH / 2;
      player.vx = 0;
      player.vy = 0;
      mainGunLevel = Math.max(0, mainGunLevel - 1);
      enemyBullets = [];
    }
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('scat_attack_hi', highScore);
  }
}

// ============================================================
// STAGE BACKGROUNDS
// ============================================================
function drawBackground() {
  const colors = STAGE_COLORS[stage];
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Stage-specific background layers
  switch (stage) {
    case 0: // Orbital Station — stars, distant planets
      starfield.update(SCROLL_SPEEDS[stage]);
      starfield.draw();
      // Distant planet
      ctx.fillStyle = '#1a2244';
      ctx.beginPath();
      ctx.arc(GW * 0.7, GH * 0.8, 60, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#223355';
      ctx.beginPath();
      ctx.arc(GW * 0.7, GH * 0.8, 55, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 1: // Atmospheric Entry — clouds, streaks
      starfield.update(SCROLL_SPEEDS[stage] * 0.5);
      starfield.draw();
      // Heat streaks
      for (let i = 0; i < 5; i++) {
        const sy = ((frame * 3 + i * 67) % GH);
        ctx.strokeStyle = 'rgba(255,136,0,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(GW, sy + 20);
        ctx.stroke();
      }
      break;

    case 2: // City Ruins — buildings
      for (const el of bgElements) {
        el.x -= el.speed * SCROLL_SPEEDS[stage];
        if (el.x < -el.size * 3) el.x = GW + el.size;
        ctx.fillStyle = colors.mid;
        ctx.fillRect(el.x, GH - el.size * 3, el.size, el.size * 3);
        ctx.fillStyle = colors.fg;
        ctx.fillRect(el.x + 2, GH - el.size * 3 + 2, el.size - 4, el.size * 3 - 2);
      }
      ctx.fillStyle = colors.fg;
      ctx.fillRect(0, GH - 15, GW, 15);
      break;

    case 3: // Underground Base — ceiling/floor
      ctx.fillStyle = colors.mid;
      ctx.fillRect(0, 0, GW, 30);
      ctx.fillRect(0, GH - 30, GW, 30);
      ctx.fillStyle = colors.fg;
      for (let i = 0; i < 16; i++) {
        const ox = ((i * 32) - (frame * SCROLL_SPEEDS[stage]) % 32);
        ctx.fillRect(ox, 26, 2, 6);
        ctx.fillRect(ox, GH - 32, 2, 6);
      }
      break;

    case 4: // Fungal Hive — organic walls, tendrils
      ctx.fillStyle = colors.mid;
      for (let i = 0; i < 10; i++) {
        const ox = ((i * 50) - (frame * SCROLL_SPEEDS[stage] * 0.8) % 50);
        const h1 = 20 + Math.sin(i * 1.3) * 15;
        ctx.beginPath();
        ctx.arc(ox, 0, h1, 0, Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ox, GH, h1, Math.PI, 0);
        ctx.fill();
      }
      break;

    case 5: // Ocean Platform — waves
      ctx.fillStyle = '#0a2030';
      ctx.fillRect(0, GH * 0.7, GW, GH * 0.3);
      for (let i = 0; i < GW; i += 4) {
        const wy = GH * 0.7 + Math.sin((i + frame * 2) * 0.03) * 5;
        ctx.fillStyle = '#153040';
        ctx.fillRect(i, wy, 4, 2);
      }
      break;

    case 6: // Mothership Core — alien tech
      starfield.update(SCROLL_SPEEDS[stage]);
      starfield.draw();
      // Pulsing grid
      ctx.strokeStyle = 'rgba(255,68,255,0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 10; i++) {
        const gx = ((i * 50) - (frame * 2) % 50);
        ctx.beginPath();
        ctx.moveTo(gx, 0);
        ctx.lineTo(gx, GH);
        ctx.stroke();
      }
      for (let i = 0; i < 7; i++) {
        const gy = ((i * 50) - (frame) % 50);
        ctx.beginPath();
        ctx.moveTo(0, gy);
        ctx.lineTo(GW, gy);
        ctx.stroke();
      }
      break;
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  TAS.ui.drawHUD(score, stage + 1, lives, GW);

  // HP bar
  const barW = 50, barH = 5;
  const bx = 6, by = 22;
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, barW, barH);
  const hpColor = hp > 2 ? '#44ff44' : hp > 1 ? '#ffdd00' : '#ff4444';
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx, by, barW * (hp / MAX_HP), barH);

  // Combo display
  if (combo > 1) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('x' + combo, 60, 27);
  }

  // Orb lock indicator
  if (orbsLocked) {
    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('LOCKED', GW - 6, 27);
  }

  // Orb weapon type display
  ctx.fillStyle = '#88ddff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  const wName = orbs[0].weaponType === 'normal' ? 'ORB' :
    orbs[0].weaponType === 'laser' ? 'LASER' :
    orbs[0].weaponType === 'bomb' ? 'BOMB' : 'WAVE';
  ctx.fillText(wName, GW / 2, 27);

  // Stage name (briefly at start)
  if (stageFrame < 120) {
    const alpha = stageFrame < 60 ? stageFrame / 60 : (120 - stageFrame) / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = STAGE_COLORS[stage].accent;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 10);
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2 + 8);
    ctx.globalAlpha = 1;
  }

  // Boss warning
  if (bossWarning > 0) {
    const pulse = Math.sin(frame * 0.15) * 0.4 + 0.6;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING', GW / 2, GH / 2);
    ctx.font = '10px monospace';
    ctx.fillText('BOSS APPROACHING', GW / 2, GH / 2 + 16);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    starfield.update(0.5);
    if (anyKey()) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 30 && anyKey()) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  const spd = dt * 60;
  stageFrame++;

  // Stage transition
  if (stageTransition > 0) {
    stageTransition -= spd;
    if (stageTransition <= 0) {
      stage++;
      if (stage >= STAGE_COUNT) {
        // Game complete!
        score += 50000;
        gameOver();
        return;
      }
      stageFrame = 0;
      bossActive = false;
      boss = null;
      bossWarning = 0;
      enemies = [];
      enemyBullets = [];
      hazards = [];
      generateBgElements();
      invincible = 60;
    }
    return;
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= spd;
    if (comboTimer <= 0) {
      combo = 1;
    }
  }

  // Invincibility
  if (invincible > 0) invincible -= spd;

  // ---- PLAYER INPUT ----
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // Movement (jetpack with momentum)
  let ax = 0, ay = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) ax -= PLAYER_ACCEL;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) ax += PLAYER_ACCEL;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) ay -= PLAYER_ACCEL;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) ay += PLAYER_ACCEL;

  player.vx += ax;
  player.vy += ay;
  player.vx *= PLAYER_FRICTION;
  player.vy *= PLAYER_FRICTION;

  // Speed cap
  const speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (speed > PLAYER_MAX_SPEED) {
    player.vx = (player.vx / speed) * PLAYER_MAX_SPEED;
    player.vy = (player.vy / speed) * PLAYER_MAX_SPEED;
  }

  player.x += player.vx * spd;
  player.y += player.vy * spd;

  // Bounds
  player.x = TAS.math.clamp(player.x, 16, GW - 16);
  player.y = TAS.math.clamp(player.y, 16, GH - 16);

  // ---- ORB LOCK/UNLOCK (B button) ----
  const bPressed = keys['KeyX'] || keys['ShiftRight'] || touch.b;
  if (bPressed && !bPressedLast) {
    orbsLocked = !orbsLocked;
    if (orbsLocked) {
      // Lock orbs at current angles
      for (let i = 0; i < orbs.length; i++) {
        orbs[i].lockAngle = orbs[i].angle;
      }
      playLock();
    } else {
      playUnlock();
    }
  }
  bPressedLast = bPressed;

  // ---- FIRING ----
  const firePressed = keys['KeyZ'] || keys['Space'] || touch.a;
  if (fireTimer > 0) fireTimer -= spd;
  if (orbFireTimer > 0) orbFireTimer -= spd;

  if (firePressed) {
    fireMainGun();
    fireOrbs();
  }

  // Update orbs
  updateOrbs(dt);

  // Update bullets
  updateBullets(dt);

  // ---- ENEMY SPAWNING ----
  if (!bossActive) {
    const spawnRate = Math.max(30, 90 - stage * 8 - stageFrame * 0.01);
    if (stageFrame % Math.floor(spawnRate) === 0) {
      spawnWave();
    }

    // Boss trigger
    if (stageFrame >= STAGE_LENGTH) {
      bossWarning = 120;
    }
    if (bossWarning > 0) {
      bossWarning -= spd;
      if (bossWarning <= 0 && !bossActive) {
        spawnBoss();
        playBossWarn();
        enemies = []; // Clear remaining enemies for boss fight
      }
    }
  }

  // Update enemies
  updateEnemies(dt);

  // Update boss
  updateBoss(dt);

  // Update power-ups
  updatePowerUps(dt);

  // Collisions
  checkCollisions();

  // Scroll
  scrollX += SCROLL_SPEEDS[stage] * spd;
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, {
      frame, extra: 'Stage: ' + (stage + 1) + ' | Combo: x' + combo
    });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  // Background
  drawBackground();

  // Power-ups
  drawPowerUps();

  // Enemies
  drawEnemies();

  // Boss
  drawBoss();

  // Player
  drawPlayer(player.x, player.y);

  // Orbs
  for (let i = 0; i < orbs.length; i++) {
    const pos = getOrbPosition(i);
    drawOrb(pos.x, pos.y, orbs[i].weaponType, orbsLocked);
  }

  // Bullets
  drawBullets();

  // Particles
  TAS.particles.draw();

  ctx.restore();

  // Screen effects
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);

  // Stage transition overlay
  if (stageTransition > 0) {
    const alpha = Math.min(1, stageTransition / 60);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    if (stage < STAGE_COUNT - 1) {
      ctx.fillText('STAGE CLEAR', GW / 2, GH / 2 - 10);
      ctx.font = '10px monospace';
      ctx.fillText('Entering: ' + STAGE_NAMES[stage + 1], GW / 2, GH / 2 + 10);
    } else {
      ctx.fillText('MISSION COMPLETE', GW / 2, GH / 2);
    }
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitleScreen() {
  starfield.update(0.5);
  starfield.draw();

  // Logo: S.C.A.T.
  ctx.textAlign = 'center';

  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('S.C.A.T.', GW / 2 + 2, 62);

  // Main title with glow
  ctx.fillStyle = '#44ddff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('S.C.A.T.', GW / 2, 60);

  // Subtitle
  ctx.fillStyle = '#88aacc';
  ctx.font = '9px monospace';
  ctx.fillText('SPECIAL CYBERNETIC ATTACK TEAM', GW / 2, 80);

  // Subtitle line 2
  ctx.fillStyle = '#667788';
  ctx.font = '8px monospace';
  ctx.fillText('Baseling Astronauts vs. The Fungal Invasion', GW / 2, 96);

  // Draw a demo baseling astronaut
  ctx.save();
  ctx.translate(GW / 2, 150);
  ctx.scale(2, 2);
  // Body
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#4488cc';
  ctx.beginPath();
  ctx.arc(4, -1, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#556677';
  ctx.fillRect(-8, -4, 4, 8);
  // Flame
  const flicker = Math.sin(frame * 0.4) * 2;
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(-12, -2, -4 - flicker, 4);
  ctx.restore();

  // Draw orbiting orbs on title
  const orbAngle1 = frame * 0.03;
  const orbAngle2 = frame * 0.03 + Math.PI;
  const orbRadius = 35;
  const ox1 = GW / 2 + Math.cos(orbAngle1) * orbRadius;
  const oy1 = 150 + Math.sin(orbAngle1) * orbRadius;
  const ox2 = GW / 2 + Math.cos(orbAngle2) * orbRadius;
  const oy2 = 150 + Math.sin(orbAngle2) * orbRadius;

  ctx.fillStyle = 'rgba(100,200,255,0.3)';
  ctx.beginPath(); ctx.arc(ox1, oy1, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#88ddff';
  ctx.beginPath(); ctx.arc(ox1, oy1, 5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = 'rgba(100,200,255,0.3)';
  ctx.beginPath(); ctx.arc(ox2, oy2, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#88ddff';
  ctx.beginPath(); ctx.arc(ox2, oy2, 5, 0, Math.PI * 2); ctx.fill();

  // Controls info
  ctx.fillStyle = '#556677';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS/WASD: Move  |  Z/SPACE: Fire  |  X: Lock/Unlock Orbs', GW / 2, 210);
  ctx.fillText('Orb weapons: [L]aser  [B]omb  [W]ave', GW / 2, 224);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 250);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 290);
  ctx.globalAlpha = 1;
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
