function spawnEnvParticle(mapKey) {
  if (envParticles.length >= ENV_PARTICLE_MAX) return;
  var theme = ZONE_THEMES[mapKey] || ZONE_THEMES.forest;
  var colors;
  if (mapKey === 'forest') colors = ['#1a3a15', '#2a4a20', '#0d2a0a', '#1a4020'];
  else if (mapKey === 'mountain') colors = ['#1a1a2a', '#2a2a3a', '#88aacc20', '#2a3040'];
  else colors = ['#2a1515', '#3a2020', '#ff444410', '#2a1020'];
  envParticles.push({
    x: Math.random() * GW,
    y: Math.random() * GH,
    vx: (Math.random() - 0.5) * 8,
    vy: mapKey === 'mountain' ? Math.random() * -15 - 5 : Math.random() * 10 + 3,
    size: Math.random() * 2.5 + 0.5,
    color: colors[Math.floor(Math.random() * colors.length)],
    life: Math.random() * 4 + 2,
    maxLife: 0,
    alpha: Math.random() * 0.4 + 0.1
  });
  envParticles[envParticles.length - 1].maxLife = envParticles[envParticles.length - 1].life;
}

function updateEnvParticles(dt) {
  for (var i = envParticles.length - 1; i >= 0; i--) {
    var p = envParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0 || p.x < -10 || p.x > GW + 10 || p.y < -10 || p.y > GH + 10) {
      envParticles.splice(i, 1);
    }
  }
}

function drawEnvParticles() {
  for (var i = 0; i < envParticles.length; i++) {
    var p = envParticles[i];
    var fadeAlpha = p.life < 1 ? p.life : (p.maxLife - p.life < 0.5 ? (p.maxLife - p.life) * 2 : 1);
    ctx.globalAlpha = p.alpha * fadeAlpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === WAVE DEFINITIONS (30 waves with boss variants) ===
function buildWaves() {
  var waves = [];
  for (var w = 1; w <= 30; w++) {
    var enemies = [];
    var count = 5 + w * 2;
    var hpMult = 1 + (w - 1) * 0.35;

    if (w === 10) {
      // Flying boss wave
      enemies.push({ type: 'boss_fly', hpMult: hpMult * 0.9 });
      for (var i = 0; i < Math.floor(count * 0.4); i++) enemies.push({ type: 'flying', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w === 20) {
      // Splitting boss wave
      enemies.push({ type: 'boss_split', hpMult: hpMult * 1.0 });
      for (var i = 0; i < Math.floor(count * 0.3); i++) enemies.push({ type: 'splitter', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.2); i++) enemies.push({ type: 'tank', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w === 30) {
      // Final boss: all three bosses
      enemies.push({ type: 'boss', hpMult: hpMult * 1.5 });
      enemies.push({ type: 'boss_fly', hpMult: hpMult * 1.2 });
      enemies.push({ type: 'boss_split', hpMult: hpMult * 1.3 });
      for (var i = 0; i < Math.floor(count * 0.2); i++) enemies.push({ type: 'reactor_e', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'shielded', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'tank', hpMult: hpMult });
    } else if (w % 5 === 0) {
      // Regular boss wave
      enemies.push({ type: 'boss', hpMult: hpMult * 0.8 });
      for (var i = 0; i < count - 4; i++) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w >= 25) {
      // Late game: everything
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'reactor_e', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'shielded', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'tank', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'flying', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'healer', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'splitter', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'speed', hpMult: hpMult });
    } else if (w >= 15) {
      for (var i = 0; i < Math.floor(count * 0.2); i++) enemies.push({ type: 'tank', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.2); i++) enemies.push({ type: 'flying', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'healer', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'splitter', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'shielded', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w >= 10) {
      for (var i = 0; i < Math.floor(count * 0.25); i++) enemies.push({ type: 'tank', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'flying', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'healer', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'splitter', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w >= 5) {
      for (var i = 0; i < Math.floor(count * 0.2); i++) enemies.push({ type: 'speed', hpMult: hpMult });
      for (var i = 0; i < Math.floor(count * 0.15); i++) enemies.push({ type: 'tank', hpMult: hpMult });
      if (w >= 7) for (var i = 0; i < Math.floor(count * 0.1); i++) enemies.push({ type: 'flying', hpMult: hpMult });
      if (w >= 8) for (var i = 0; i < 2; i++) enemies.push({ type: 'swarm', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else if (w >= 3) {
      for (var i = 0; i < Math.floor(count * 0.3); i++) enemies.push({ type: 'speed', hpMult: hpMult });
      if (w >= 4) for (var i = 0; i < 3; i++) enemies.push({ type: 'swarm', hpMult: hpMult });
      while (enemies.length < count) enemies.push({ type: 'slime', hpMult: hpMult });
    } else {
      for (var i = 0; i < count; i++) enemies.push({ type: 'slime', hpMult: hpMult });
    }
    // Shuffle
    for (var i = enemies.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = enemies[i]; enemies[i] = enemies[j]; enemies[j] = tmp;
    }
    waves.push({ enemies: enemies, bonus: 20 + w * 10, spawnRate: Math.max(0.3, 1.2 - w * 0.03) });
  }
  return waves;
}

  if (map.path2) allPaths.push(map.path2);
  if (map.path3) allPaths.push(map.path3);
  for (var p = 0; p < allPaths.length; p++) {
    for (var i = 0; i < allPaths[p].length; i++) {
      var k = cellKey(allPaths[p][i][0], allPaths[p][i][1]);
      if (!pathSet[k]) {
        pathSet[k] = true;
        pathCells.push(allPaths[p][i]);
      }

  }
}

  comboTimer = 0;
  totalKills = 0;
  cursorCol = Math.floor(COLS / 2);
  cursorRow = Math.floor(ROWS / 2);
  cursorVisible = false;
  paletteIndex = 0;
  envParticles = [];
  TAS.particles.clear();
  initMap(mapKey);

  if (!tutorialDone) {
    tutorialStep = 0;
    tutorialTimer = 0;
  }
}

function startWave() {
  wave++;
  if (wave > 30) {
    gameWin();
    return;
  }
  waveActive = true;
  waveEnemies = waves[wave - 1].enemies.slice();
  spawnIndex = 0;
  spawnTimer = 0;
  waveStartTime = 0;
  comboKills = 0;
  comboTimer = 0;
}

function endWave() {
  waveActive = false;
  var baseBonus = waves[wave - 1].bonus;
  var luckBonus = 0;
  // CHA luck: chance for double bonus
  if (Math.random() < chaMod * 0.05 + statB.luck * 0.02) {
    luckBonus = Math.floor(baseBonus * 0.5);
    floatTexts.push({ x: GW / 2, y: GH / 2 - 16, text: 'LUCKY! +' + luckBonus, color: '#a855f7', life: 2.5 });
  }
  var totalBonus = Math.floor((baseBonus + luckBonus) * CHA_GOLD_MULT);
  gold += totalBonus;
  floatTexts.push({ x: GW / 2, y: GH / 2, text: '+' + totalBonus + ' SPORE GEMS', color: '#f4b41b', life: 2 });
  if (wave >= 30) {
    gameWin();
  } else {
    buildTimer = BUILD_TIME * DEX_BUILD_MULT; // DEX speeds build phase
  }
}

function gameWin() {
  score += Math.floor((lives * 50 + gold) * SCORE_MULT); // INT boosts final score
  var best = highScores[mapKey] || 0;
  if (wave > best) {
    highScores[mapKey] = wave;
    TAS.score.save('sporedef_' + mapKey + '_hi', wave);
  }
  state = 'win';
  triggerScreenShake(6, 0.5);
  TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1046,0.3]], 150);
}

function gameOver() {
  var best = highScores[mapKey] || 0;
  if (wave > best) {
    highScores[mapKey] = wave;
    TAS.score.save('sporedef_' + mapKey + '_hi', wave);
  }
  state = 'gameOver';
  triggerScreenShake(12, 0.8);
  TAS.fx.shake(8, 0.85);
  TAS.audio.playTone(100, 0.5, 'sawtooth', 0.15, 40);
}

// === SCREEN SHAKE (custom layered shake) ===
function triggerScreenShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDecay = duration;
}

function getShakeOffset() {
  if (shakeIntensity <= 0.1) return { x: 0, y: 0 };
  return {
    x: (Math.random() - 0.5) * shakeIntensity * 2,
    y: (Math.random() - 0.5) * shakeIntensity * 2
  };
}

// === SPAWNING ===
function spawnEnemy(def, hpMult, pathIdx) {
  var map = MAPS[mapKey];
  var paths = [map.path];
  if (map.path2) paths.push(map.path2);
  if (map.path3) paths.push(map.path3);
  var chosenPath = paths[pathIdx % paths.length];
  var base = ENEMY_DEFS[def];
  var hp = Math.floor(base.hp * hpMult * statB.hpMult);
  enemies.push({
    type: def,
    x: chosenPath[0][0] * CELL + CELL / 2,
    y: chosenPath[0][1] * CELL + CELL / 2 + HUD_H,
    hp: hp,
    maxHp: hp,
    speed: base.speed,
    gold: Math.floor((base.gold + Math.floor(hpMult * 2)) * CHA_GOLD_MULT), // CHA gold bonus
    color: base.color,
    size: base.size,
    flying: base.flying,
    armor: base.armor,
    healer: base.healer,
    splitter: base.splitter,
    boss: base.boss,
    shield: base.shield || false,
    shieldHp: base.shield ? Math.floor(hp * 0.4) : 0,
    shieldMax: base.shield ? Math.floor(hp * 0.4) : 0,
    slow: 0,
    slowTimer: 0,
    pathIndex: 1,
    path: chosenPath,
    alive: true,
    healCooldown: 0,
    spawnBurstDone: false
  });
  // Spawn particle burst
  var lastE = enemies[enemies.length - 1];
  TAS.particles.spawn(lastE.x, lastE.y, base.color, 6, 2, { size: 2 });
}

// === TOWER LOGIC ===
function placeTower(col, row, type) {
  var def = TOWER_DEFS[type];
  if (gold < def.cost) return false;
  var k = cellKey(col, row);
  if (pathSet[k] || gridOccupied[k] !== undefined) return false;
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  // Must be adjacent to path
  var adj = false;
  for (var dx = -1; dx <= 1; dx++) {
    for (var dy = -1; dy <= 1; dy++) {
      if (pathSet[cellKey(col + dx, row + dy)]) { adj = true; break; }
    }
    if (adj) break;
  }
  if (!adj) return false;
  gold -= def.cost;
  var t = {
    type: type,
    col: col, row: row,
    x: col * CELL + CELL / 2,
    y: row * CELL + CELL / 2 + HUD_H,
    level: 1,
    totalCost: def.cost,
    cooldown: 0,
    target: null,
    angle: 0,
    kills: 0
  };
  gridOccupied[k] = towers.length;
  towers.push(t);
  TAS.audio.playTone(440, 0.1, 'sine', 0.08);
  TAS.particles.spawn(t.x, t.y, def.color, 8, 2, { size: 2 });
  score += Math.floor(10 * SCORE_MULT); // INT score bonus
  return true;
}

function upgradeTower(idx) {
  var t = towers[idx];
  if (!t || t.level >= 3) return false;
  var cost = UPGRADE_COST[t.level];
  if (gold < cost) return false;
  gold -= cost;
  t.level++;
  t.totalCost += cost;
  TAS.audio.playTone(660, 0.12, 'sine', 0.08);
  TAS.particles.spawn(t.x, t.y, '#ffffff', 12, 3, { size: 3 });
  score += Math.floor(20 * SCORE_MULT); // INT score bonus
  triggerScreenShake(2, 0.15);
  return true;
}

function sellTower(idx) {
  var t = towers[idx];
  if (!t) return;
  var refund = Math.floor(t.totalCost * 0.6);
  // CHA bonus: better sell price
  refund = Math.floor(refund * (1 + Math.max(0, chaMod) * 0.05));
  gold += refund;
  var k = cellKey(t.col, t.row);
  delete gridOccupied[k];
  towers.splice(idx, 1);
  gridOccupied = {};
  for (var i = 0; i < towers.length; i++) {
    gridOccupied[cellKey(towers[i].col, towers[i].row)] = i;
  }
  selectedPlaced = null;
  TAS.audio.playTone(220, 0.15, 'sawtooth', 0.06);
  floatTexts.push({ x: t.x, y: t.y, text: '+$' + refund, color: '#38d973', life: 1.5 });
}

function getTowerStats(t) {
  var def = TOWER_DEFS[t.type];
  var mult = UPGRADE_MULT[t.level - 1];
  return {
    range: def.range * (1 + (t.level - 1) * 0.15),
    rate: def.rate * (1 - (t.level - 1) * 0.1) * WIS_CD_MULT, // WIS reduces cooldowns
    dmg: Math.floor(def.dmg * mult * STR_DMG_MULT),             // STR boosts damage
    hitAir: def.hitAir,
    aoe: def.aoe
  };
}

// === PROJECTILE / ATTACK LOGIC ===
function fireTower(t, target) {
  var def = TOWER_DEFS[t.type];
  var stats = getTowerStats(t);
  t.angle = TAS.math.angle(t.x, t.y, target.x, target.y);

  if (t.type === 'ice') {
    // Area slow
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive || e.boss) continue;
      var d = TAS.math.dist(t.x, t.y, e.x, e.y);
      if (d < stats.range) {
        e.slow = 0.5;
        e.slowTimer = 2;
      }
    }
    TAS.particles.spawn(t.x, t.y, '#88eeff', 15, 2.5, { size: 3 });
    TAS.audio.playTone(1200, 0.1, 'sine', 0.04, 800);
  } else if (t.type === 'spray') {
    // Cone AoE
    var ang = t.angle;
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive || (e.flying && !stats.hitAir)) continue;
      var d = TAS.math.dist(t.x, t.y, e.x, e.y);
      if (d > stats.range) continue;
      var eAng = TAS.math.angle(t.x, t.y, e.x, e.y);
      var diff = Math.abs(eAng - ang);
      if (diff > Math.PI) diff = Math.PI * 2 - diff;
      if (diff < 0.6) {
        damageEnemy(e, stats.dmg, t);
      }
    }
    for (var i = 0; i < 8; i++) {
      var sa = ang + (Math.random() - 0.5) * 1.0;
      var sd = stats.range * (0.3 + Math.random() * 0.7);
      TAS.particles.spawn(t.x + Math.cos(sa) * sd * 0.5, t.y + Math.sin(sa) * sd * 0.5, '#cc66ff', 1, 1, { size: 3 });
    }
    TAS.audio.playNoise(0.1, 0.04, 2000);
  } else if (t.type === 'lightning') {
    // Chain lightning - hit target + 2 nearby
    var hit = [target];
    damageEnemy(target, stats.dmg, t);
    for (var chain = 0; chain < 2; chain++) {
      var last = hit[hit.length - 1];
      var best = null, bestD = 60;
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        if (!e.alive || hit.indexOf(e) >= 0) continue;
        if (e.flying && !stats.hitAir) continue;
        var d = TAS.math.dist(last.x, last.y, e.x, e.y);
        if (d < bestD) { bestD = d; best = e; }
      }
      if (best) {
        hit.push(best);
        damageEnemy(best, Math.floor(stats.dmg * 0.7), t);
      }
    }
    for (var i = 0; i < hit.length - 1; i++) {
      beams.push({ x1: hit[i].x, y1: hit[i].y, x2: hit[i+1].x, y2: hit[i+1].y, color: '#ffff44', life: 0.2, width: 2 });
    }
    beams.push({ x1: t.x, y1: t.y, x2: hit[0].x, y2: hit[0].y, color: '#ffff00', life: 0.2, width: 3 });
    TAS.audio.playTone(880, 0.08, 'sawtooth', 0.06, 1600);
  } else if (t.type === 'beam') {
    // Piercing beam along line
    var ang = t.angle;
    var bx2 = t.x + Math.cos(ang) * stats.range;
    var by2 = t.y + Math.sin(ang) * stats.range;
    beams.push({ x1: t.x, y1: t.y, x2: bx2, y2: by2, color: '#ff4488', life: 0.3, width: 3 });
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive) continue;
      if (e.flying && !stats.hitAir) continue;
      var d = pointToLineDist(e.x, e.y, t.x, t.y, bx2, by2);
      if (d < e.size + 3) {
        damageEnemy(e, stats.dmg, t);
      }
    }
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 100);
  } else if (t.type === 'thorn') {
    // Thorn barricade: damages all nearby ground enemies
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive || e.flying) continue;
      var d = TAS.math.dist(t.x, t.y, e.x, e.y);
      if (d < stats.range) {
        damageEnemy(e, stats.dmg, t);
        e.slow = 0.3;
        e.slowTimer = 0.5;
      }
    }
    TAS.particles.spawn(t.x, t.y, '#88aa44', 8, 1.5, { size: 2 });
    TAS.audio.playTone(300, 0.06, 'square', 0.04);
  } else if (t.type === 'poop') {
    // POOP Launcher: AoE splash projectile
    projectiles.push({
      x: t.x, y: t.y,
      tx: target.x, ty: target.y,
      target: target,
      speed: 120,
      dmg: stats.dmg,
      color: '#aa8844',
      size: 5,
      trail: '#886633',
      alive: true,
      splash: true,
      splashRadius: 30,
      tower: t
    });
    TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 80);
  } else if (t.type === 'reactor') {
    // Micro Reactor: radial pulse damage
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.alive) continue;
      var d = TAS.math.dist(t.x, t.y, e.x, e.y);
      if (d < stats.range) {
        var falloff = 1 - (d / stats.range) * 0.5;
        damageEnemy(e, Math.floor(stats.dmg * falloff), t);
      }
    }
    // Reactor pulse visual
    beams.push({ x1: t.x, y1: t.y, x2: t.x, y2: t.y, color: '#ff88ff', life: 0.4, width: stats.range, isRadial: true });
    TAS.particles.spawn(t.x, t.y, '#ff88ff', 20, 3, { size: 2 });
    TAS.audio.playTone(150, 0.25, 'sine', 0.06, 300);
    triggerScreenShake(2, 0.1);
  } else {
    // Projectile-based (spore, cannon)
    var speed = t.type === 'cannon' ? 150 : 220;
    projectiles.push({
      x: t.x, y: t.y,
      tx: target.x, ty: target.y,
      target: target,
      speed: speed,
      dmg: stats.dmg,
      color: def.color,
      size: t.type === 'cannon' ? 4 : 2,
      trail: t.type === 'cannon' ? '#ff8844' : '#88ffbb',
      alive: true,
      splash: false,
      tower: t
    });
    TAS.audio.playTone(t.type === 'cannon' ? 180 : 600, 0.08, 'square', 0.04);
  }
}

function pointToLineDist(px, py, x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var len2 = dx * dx + dy * dy;
  if (len2 === 0) return TAS.math.dist(px, py, x1, y1);
  var t = TAS.math.clamp(((px - x1) * dx + (py - y1) * dy) / len2, 0, 1);
  var cx = x1 + t * dx, cy = y1 + t * dy;
  return TAS.math.dist(px, py, cx, cy);
}

function damageEnemy(e, dmg, tower) {
  // Shield absorbs damage first
  if (e.shield && e.shieldHp > 0) {
    var absorbed = Math.min(e.shieldHp, dmg);
    e.shieldHp -= absorbed;
    dmg -= absorbed;
    if (e.shieldHp <= 0) {
      e.shield = false;
      TAS.particles.spawn(e.x, e.y, '#4488ff', 10, 2, { size: 2 });
      floatTexts.push({ x: e.x, y: e.y - 12, text: 'SHIELD DOWN', color: '#4488ff', life: 1.0 });
    }
    if (dmg <= 0) return;
  }
  var finalDmg = Math.max(1, dmg - e.armor);
  e.hp -= finalDmg;
  if (e.hp <= 0) {
    killEnemy(e, tower);
  }
}

function killEnemy(e, tower) {
  if (!e.alive) return;
  e.alive = false;
  var goldReward = e.gold;
  // CHA luck: chance for double gold
  if (Math.random() < 0.02 + chaMod * 0.01 + statB.luck * 0.005) {
    goldReward *= 2;
    floatTexts.push({ x: e.x, y: e.y - 16, text: 'LUCKY x2!', color: '#a855f7', life: 1.5 });
  }
  gold += goldReward;
  var killScore = Math.floor(e.gold * 2 * SCORE_MULT); // INT score bonus
  score += killScore;
  totalKills++;
  if (tower) tower.kills++;

  // Combo system
  comboKills++;
  comboTimer = COMBO_WINDOW;
  if (comboKills >= 5) {
    var comboBonus = Math.floor(comboKills * 3 * SCORE_MULT);
    score += comboBonus;
    floatTexts.push({ x: e.x, y: e.y - 24, text: comboKills + 'x COMBO +' + comboBonus, color: '#a855f7', life: 1.8 });
    triggerScreenShake(3, 0.15);
  }

  floatTexts.push({ x: e.x, y: e.y - 8, text: '+$' + goldReward, color: '#f4b41b', life: 1.2 });

  // Death particles scale with enemy size
  var pCount = e.boss ? 30 : (e.size > 6 ? 16 : 10);
  TAS.particles.spawn(e.x, e.y, e.color, pCount, e.boss ? 5 : 3, { size: e.boss ? 4 : 3, gravity: 0.5 });
  TAS.audio.playTone(300 + Math.random() * 200, 0.1, 'square', 0.05);

  if (e.boss) {
    triggerScreenShake(8, 0.5);
    // Boss death ring
    for (var a = 0; a < 12; a++) {
      var ang = (a / 12) * Math.PI * 2;
      TAS.particles.spawn(e.x + Math.cos(ang) * 15, e.y + Math.sin(ang) * 15, '#ffffff', 3, 4, { size: 3 });
    }
    floatTexts.push({ x: e.x, y: e.y - 30, text: 'ROT BOSS SLAIN!', color: '#e6482e', life: 2.5 });
    TAS.audio.playMelody([[440,0.1],[550,0.1],[660,0.15]], 100);
  }

  // Splitter spawns 2 minis
  if (e.splitter) {
    var miniCount = e.boss ? 4 : 2;
    for (var s = 0; s < miniCount; s++) {
      var offX = (s % 2 === 0 ? -1 : 1) * 5 * (1 + Math.floor(s / 2));
      var mini = {
        type: 'slime',
        x: e.x + offX,
        y: e.y + (s > 1 ? 5 : 0),
        hp: Math.floor(e.maxHp * (e.boss ? 0.2 : 0.3)),
        maxHp: Math.floor(e.maxHp * (e.boss ? 0.2 : 0.3)),
        speed: e.speed * 1.3,
        gold: e.boss ? 8 : 3,
        color: '#ffcc44',
        size: e.boss ? 5 : 4,
        flying: false, armor: 0, healer: false, splitter: false, boss: false,
        shield: false, shieldHp: 0, shieldMax: 0,
        slow: 0, slowTimer: 0,
        pathIndex: Math.max(0, e.pathIndex - 1),
        path: e.path,
        alive: true,
        healCooldown: 0,
        spawnBurstDone: false
      };
      enemies.push(mini);
    }
  }
}

// === NES CONTROLLER INPUT ===
var nesInput = { up: false, down: false, left: false, right: false, a: false, b: false, start: false, select: false };
var nesPrev = { up: false, down: false, left: false, right: false, a: false, b: false, start: false, select: false };
var nesRepeat = { up: 0, down: 0, left: 0, right: 0 };
var NES_REPEAT_DELAY = 0.35;
var NES_REPEAT_RATE = 0.08;

function updateNesInput(dt) {
  // Read from TAS.input (dpad + buttons)
  var inp = TAS.input;
  nesInput.up = inp.up;
  nesInput.down = inp.down;
  nesInput.left = inp.left;
  nesInput.right = inp.right;
  nesInput.a = inp.a;
  nesInput.b = inp.b;
  nesInput.start = inp.start;
  nesInput.select = inp.select;

  // D-pad repeat logic for cursor movement
  var dirs = ['up', 'down', 'left', 'right'];
  for (var i = 0; i < dirs.length; i++) {
    var d = dirs[i];
    if (nesInput[d]) {
      if (!nesPrev[d]) {
        // First press
        moveCursor(d);
        nesRepeat[d] = NES_REPEAT_DELAY;
        cursorVisible = true;
      } else {
        nesRepeat[d] -= dt;
        if (nesRepeat[d] <= 0) {
          moveCursor(d);
          nesRepeat[d] = NES_REPEAT_RATE;
        }
      }
    } else {
      nesRepeat[d] = 0;
    }
  }

  // A button: place tower at cursor or select placed tower
  if (nesInput.a && !nesPrev.a && cursorVisible) {
    if (state === 'playing') {
      var k = cellKey(cursorCol, cursorRow);
      if (gridOccupied[k] !== undefined) {
        selectedPlaced = gridOccupied[k];
        selectedTower = null;
        TAS.audio.playTone(400, 0.05, 'sine', 0.04);
      } else if (selectedTower) {
        if (!placeTower(cursorCol, cursorRow, selectedTower)) {
          TAS.audio.playTone(150, 0.1, 'square', 0.04);
        }
      }
    }
  }

  // B button: upgrade selected tower or cycle tower type
  if (nesInput.b && !nesPrev.b && cursorVisible) {
    if (state === 'playing') {
      if (selectedPlaced !== null) {
        if (!upgradeTower(selectedPlaced)) {
          // Can't upgrade, deselect
          selectedPlaced = null;
          selectedTower = TOWER_KEYS[paletteIndex];
        }
      } else {
        // Cycle tower selection
        paletteIndex = (paletteIndex + 1) % TOWER_KEYS.length;
        selectedTower = TOWER_KEYS[paletteIndex];
        TAS.audio.playTone(500 + paletteIndex * 50, 0.05, 'sine', 0.04);
      }
    }
  }

  // Start: skip build phase
  if (nesInput.start && !nesPrev.start) {
    if (state === 'playing' && !waveActive && buildTimer > 0) {
      buildTimer = 0;
    } else if (state === 'title' || state === 'gameOver' || state === 'win') {
      // Handle with click logic
    }
  }

  // Select: sell tower
  if (nesInput.select && !nesPrev.select) {
    if (state === 'playing' && selectedPlaced !== null) {
      sellTower(selectedPlaced);
    }
  }

  // Save previous state
  nesPrev.up = nesInput.up;
  nesPrev.down = nesInput.down;
  nesPrev.left = nesInput.left;
  nesPrev.right = nesInput.right;
  nesPrev.a = nesInput.a;
  nesPrev.b = nesInput.b;
  nesPrev.start = nesInput.start;
  nesPrev.select = nesInput.select;
}

function moveCursor(dir) {
  if (dir === 'up') cursorRow = Math.max(0, cursorRow - 1);
  if (dir === 'down') cursorRow = Math.min(ROWS - 1, cursorRow + 1);
  if (dir === 'left') cursorCol = Math.max(0, cursorCol - 1);
  if (dir === 'right') cursorCol = Math.min(COLS - 1, cursorCol + 1);
}

// === MOUSE / TOUCH HANDLING ===
var clickX = -1, clickY = -1, clicked = false;

canvas.addEventListener('mousemove', function(ev) {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  mouseX = (ev.clientX - rect.left) * (canvas.width / dpr) / rect.width;
  mouseY = (ev.clientY - rect.top) * (canvas.height / dpr) / rect.height;
  mouseCell.col = Math.floor(mouseX / CELL);
  mouseCell.row = Math.floor((mouseY - HUD_H) / CELL);
  cursorVisible = false; // Hide dpad cursor when using mouse
});

canvas.addEventListener('mousedown', function(ev) {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  clickX = (ev.clientX - rect.left) * (canvas.width / dpr) / rect.width;
  clickY = (ev.clientY - rect.top) * (canvas.height / dpr) / rect.height;
  clicked = true;
  cursorVisible = false;
  TAS.audio.ensureAudio();
});

canvas.addEventListener('touchstart', function(ev) {
  if (ev.touches.length > 0) {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    var t = ev.touches[0];
    clickX = (t.clientX - rect.left) * (canvas.width / dpr) / rect.width;
    clickY = (t.clientY - rect.top) * (canvas.height / dpr) / rect.height;
    mouseX = clickX;
    mouseY = clickY;
    mouseCell.col = Math.floor(mouseX / CELL);
    mouseCell.row = Math.floor((mouseY - HUD_H) / CELL);
    clicked = true;
    TAS.audio.ensureAudio();
  }
}, { passive: true });

function handleClick() {
  if (!clicked) return;
  clicked = false;

  if (state === 'title') {
    var maps = ['forest','mountain','reactor'];
    for (var i = 0; i < 3; i++) {
      var bx = GW / 2 - 80, by = 140 + i * 40, bw = 160, bh = 32;
      if (TAS.hit.pointInRect(clickX, clickY, bx, by, bw, bh)) {
        mapKey = maps[i];
        startGame();
        return;
      }
    }
    return;
  }

  if (state === 'gameOver' || state === 'win') {
    state = 'title';
    return;
  }

  if (state !== 'playing') return;

  // Tutorial dismiss
  if (!tutorialDone && tutorialStep < TUTORIAL_STEPS.length) {
    tutorialStep++;
    if (tutorialStep >= TUTORIAL_STEPS.length) {
      tutorialDone = true;
      try { localStorage.setItem('sporedef_tut_done', '1'); } catch(e) {}
    }
    return;
  }

  // Check tower palette (bottom panel)
  var panelY = GH - 38;
  var paletteCols = Math.min(TOWER_KEYS.length, 6);
  for (var i = 0; i < TOWER_KEYS.length; i++) {
    var px = 4 + i * 46;
    if (TAS.hit.pointInRect(clickX, clickY, px, panelY, 44, 34)) {
      selectedTower = TOWER_KEYS[i];
      selectedPlaced = null;
      paletteIndex = i;
      TAS.audio.playTone(500, 0.05, 'sine', 0.04);
      return;
    }
  }

  // Check READY button during build phase
  if (!waveActive && buildTimer > 0) {
    var rbx = GW - 70, rby = GH - 38, rbw = 66, rbh = 34;
    if (TAS.hit.pointInRect(clickX, clickY, rbx, rby, rbw, rbh)) {
      buildTimer = 0;
      return;
    }
  }

  // Check upgrade/sell buttons if tower selected
  if (selectedPlaced !== null && towers[selectedPlaced]) {
    var t = towers[selectedPlaced];
    if (t.level < 3) {
      var ubx = t.x + 12, uby = t.y - 24;
      if (TAS.hit.pointInRect(clickX, clickY, ubx - 20, uby - 8, 40, 16)) {
        upgradeTower(selectedPlaced);
        return;
      }
    }
    var sbx = t.x + 12, sby = t.y - 8;
    if (TAS.hit.pointInRect(clickX, clickY, sbx - 20, sby - 8, 40, 16)) {
      sellTower(selectedPlaced);
      return;
    }
  }

  // Grid click - place or select tower
  var col = Math.floor(clickX / CELL);
  var row = Math.floor((clickY - HUD_H) / CELL);
  if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
    var k = cellKey(col, row);
    if (gridOccupied[k] !== undefined) {
      selectedPlaced = gridOccupied[k];
      selectedTower = null;
      TAS.audio.playTone(400, 0.05, 'sine', 0.04);
    } else if (selectedTower) {
      if (!placeTower(col, row, selectedTower)) {
        TAS.audio.playTone(150, 0.1, 'square', 0.04);
      }
    } else {
      selectedPlaced = null;
    }
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateNesInput(dt);
  handleClick();

  // Custom shake decay
  if (shakeIntensity > 0) {
    shakeIntensity *= Math.pow(0.05, dt / Math.max(0.01, shakeDecay));
    if (shakeIntensity < 0.1) shakeIntensity = 0;
  }

  // Environment particles
  if (state === 'playing' && Math.random() < 0.15) {
    spawnEnvParticle(mapKey);
  }
  updateEnvParticles(dt);

  // Combo timer decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      comboKills = 0;
    }
  }

  if (state !== 'playing') return;

  // Tutorial overlay blocks gameplay input but not rendering
  if (!tutorialDone && tutorialStep < TUTORIAL_STEPS.length) {
    tutorialTimer += dt;
    return;
  }

  // Build phase countdown
  if (!waveActive) {
    buildTimer -= dt;
    if (buildTimer <= 0) {
      startWave();
    }
    return;
  }

  waveStartTime += dt;

  // Spawn enemies
  spawnTimer -= dt;
  if (spawnTimer <= 0 && spawnIndex < waveEnemies.length) {
    var eDef = waveEnemies[spawnIndex];
    var pathIdx = spawnIndex % (MAPS[mapKey].path2 ? (MAPS[mapKey].path3 ? 3 : 2) : 1);
    spawnEnemy(eDef.type, eDef.hpMult, pathIdx);
    spawnIndex++;
    spawnTimer = waves[wave - 1].spawnRate;
  }

  // Update enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    // Slow timer
    if (e.slowTimer > 0) {
      e.slowTimer -= dt;
      if (e.slowTimer <= 0) e.slow = 0;
    }

    // Shield regeneration (slow)
    if (e.shieldMax > 0 && e.shieldHp < e.shieldMax && !e.shield) {
      // Shields don't regen once broken
    }

    // Healer logic
    if (e.healer) {
      e.healCooldown -= dt;
      if (e.healCooldown <= 0) {
        e.healCooldown = 2;
        for (var h = 0; h < enemies.length; h++) {
          if (enemies[h] === e || !enemies[h].alive) continue;
          var hd = TAS.math.dist(e.x, e.y, enemies[h].x, enemies[h].y);
          if (hd < 40) {
            enemies[h].hp = Math.min(enemies[h].maxHp, enemies[h].hp + Math.floor(enemies[h].maxHp * 0.1));
          }
        }
        TAS.particles.spawn(e.x, e.y, '#44ff44', 5, 1.5, { size: 2 });
      }
    }

    // Movement
    var spd = e.speed * (1 - e.slow) * dt;
    if (e.flying) {
      var core = MAPS[mapKey].core;
      var cx = core[0] * CELL + CELL / 2;
      var cy = core[1] * CELL + CELL / 2 + HUD_H;
      var ang = TAS.math.angle(e.x, e.y, cx, cy);
      e.x += Math.cos(ang) * spd;
      e.y += Math.sin(ang) * spd;
      if (TAS.math.dist(e.x, e.y, cx, cy) < 10) {
        enemyReachCore(e);
      }
    } else {
      if (e.pathIndex < e.path.length) {
        var target = e.path[e.pathIndex];
        var tx = target[0] * CELL + CELL / 2;
        var ty = target[1] * CELL + CELL / 2 + HUD_H;
        var dx = tx - e.x, dy = ty - e.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < spd + 1) {
          e.x = tx; e.y = ty;
          e.pathIndex++;
        } else {
          e.x += (dx / dist) * spd;
          e.y += (dy / dist) * spd;
        }
      } else {
        enemyReachCore(e);
      }
    }
  }

  // Update towers
  for (var i = 0; i < towers.length; i++) {
    var t = towers[i];
    t.cooldown -= dt;
    if (t.cooldown > 0) continue;
    var stats = getTowerStats(t);
    var best = null, bestD = stats.range + 1;
    for (var j = 0; j < enemies.length; j++) {
      var e = enemies[j];
      if (!e.alive) continue;
      if (e.flying && !stats.hitAir) continue;
      var d = TAS.math.dist(t.x, t.y, e.x, e.y);
      if (d < bestD) { bestD = d; best = e; }
    }
    if (best) {
      fireTower(t, best);
      t.cooldown = stats.rate;
    }
  }

  // Update projectiles
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    if (!p.alive) { projectiles.splice(i, 1); continue; }
    var tx = p.target && p.target.alive ? p.target.x : p.tx;
    var ty = p.target && p.target.alive ? p.target.y : p.ty;
    var ang = TAS.math.angle(p.x, p.y, tx, ty);
    var mv = p.speed * dt;
    p.x += Math.cos(ang) * mv;
    p.y += Math.sin(ang) * mv;
    TAS.particles.spawn(p.x, p.y, p.trail, 1, 0.5, { size: 1.5 });
    if (TAS.math.dist(p.x, p.y, tx, ty) < 8) {
      if (p.splash) {
        // POOP splash AoE
        for (var j = 0; j < enemies.length; j++) {
          var e = enemies[j];
          if (!e.alive || e.flying) continue;
          var sd = TAS.math.dist(p.x, p.y, e.x, e.y);
          if (sd < p.splashRadius) {
            var falloff = 1 - sd / p.splashRadius;
            damageEnemy(e, Math.floor(p.dmg * falloff), p.tower);
          }
        }
        TAS.particles.spawn(p.x, p.y, '#aa8844', 20, 3, { size: 4, gravity: 0.8 });
        triggerScreenShake(3, 0.15);
        TAS.audio.playTone(120, 0.2, 'sawtooth', 0.08, 60);
      } else {
        if (p.target && p.target.alive) {
          damageEnemy(p.target, p.dmg, p.tower);
          TAS.particles.spawn(p.x, p.y, '#ffffff', 5, 2, { size: 2 });
        }
      }
      p.alive = false;
    }
    if (p.x < -20 || p.x > GW + 20 || p.y < -20 || p.y > GH + 20) p.alive = false;
  }

  // Update beams
  for (var i = beams.length - 1; i >= 0; i--) {
    beams[i].life -= dt;
    if (beams[i].life <= 0) beams.splice(i, 1);
  }

  // Update float texts
  for (var i = floatTexts.length - 1; i >= 0; i--) {
    floatTexts[i].y -= 20 * dt;
    floatTexts[i].life -= dt;
    if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
  }

  // Check wave complete
  if (waveActive && spawnIndex >= waveEnemies.length && enemies.length === 0) {
    endWave();
  }
}

function enemyReachCore(e) {
  if (!e.alive) return;
  e.alive = false;
  var dmg = e.boss ? 5 : 1;
  lives -= dmg;
  triggerScreenShake(e.boss ? 10 : 5, e.boss ? 0.5 : 0.3);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(4, 0.9);
  TAS.audio.playTone(150, 0.2, 'sawtooth', 0.1);
  if (lives <= 0) {
    lives = 0;
    gameOver();
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    drawGameField();
    TAS.ui.drawGameOver(score, highScores[mapKey] || 0, GW, GH, { frame: frame, extra: 'Wave ' + wave + '/30 | ' + MAPS[mapKey].name + ' overrun | Rot slain: ' + totalKills });
    return;
  }

  if (state === 'win') {
    drawGameField();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('GARDEN SAVED!', GW / 2, GH * 0.25);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Score: ' + score, GW / 2, GH * 0.38);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '12px monospace';
    ctx.fillText('All 30 waves of rot repelled!', GW / 2, GH * 0.48);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText('Rot slain: ' + totalKills + ' | Lives: ' + lives + ' | Spore Gems: ' + gold, GW / 2, GH * 0.58);
    // Stat display
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, GH * 0.67);
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText('Click to return', GW / 2, GH * 0.82);

    // Victory particles
    if (frame % 8 === 0) {
      TAS.particles.spawn(Math.random() * GW, GH, ['#a855f7','#38d973','#f4b41b','#3cacd7'][Math.floor(Math.random()*4)], 3, 4, { size: 3, gravity: -1 });
    }
    TAS.particles.draw();
    return;
  }

  drawGameField();

  // Tutorial overlay
  if (!tutorialDone && tutorialStep < TUTORIAL_STEPS.length && state === 'playing') {
    drawTutorial();
  }
}

function drawTutorial() {
  var step = TUTORIAL_STEPS[tutorialStep];
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('TUTORIAL (' + (tutorialStep + 1) + '/' + TUTORIAL_STEPS.length + ')', GW / 2, GH * 0.2);
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px monospace';
  // Word wrap the tutorial text
  var words = step.text.split(' ');
  var line = '';
  var lineY = GH * step.y;
  for (var w = 0; w < words.length; w++) {
    var test = line + words[w] + ' ';
    if (ctx.measureText(test).width > GW - 60) {
      ctx.fillText(line, GW / 2, lineY);
      line = words[w] + ' ';
      lineY += 16;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, GW / 2, lineY);

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('Click or press A to continue', GW / 2, GH * 0.88);
  ctx.globalAlpha = 1;
}

function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative grid
  ctx.strokeStyle = '#2a2040';
  ctx.lineWidth = 0.5;
  for (var x = 0; x < GW; x += CELL) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke(); }
  for (var y = 0; y < GH; y += CELL) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke(); }

  // Floating title particles
  if (frame % 5 === 0) {
    TAS.particles.spawn(Math.random() * GW, GH + 5, '#a855f7', 1, 2, { size: 2, gravity: -0.5 });
  }
  TAS.particles.draw();
  drawEnvParticles();

  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('SPORE DEFENSE', GW / 2, 40);
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Defend the Baseling Garden', GW / 2, 56);

  // Show Baseling stat bonuses if any
  if (statB.level > 0 || statB.str !== 10) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' Lv' + statB.level + ' | STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, GW / 2, 72);
    ctx.fillText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 84);
  }

  // Controls legend
  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  ctx.fillText('STR=Dmg DEX=Speed CON=HP INT=Score WIS=Cooldown CHA=Luck', GW / 2, 100);

  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('SELECT MAP:', GW / 2, 125);

  var maps = ['forest','mountain','reactor'];
  var mapNames = [MAPS.forest.name + ' (Easy)', MAPS.mountain.name + ' (Medium)', MAPS.reactor.name + ' (Hard)'];
  var mapColors = ['#38d973','#f4b41b','#e6482e'];
  for (var i = 0; i < 3; i++) {
    var bx = GW / 2 - 80, by = 140 + i * 40, bw = 160, bh = 32;
    var hover = TAS.hit.pointInRect(mouseX, mouseY, bx, by, bw, bh);
    ctx.fillStyle = hover ? '#2a2040' : '#1a1c2c';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = mapColors[i];
    ctx.lineWidth = hover ? 2 : 1;
    ctx.strokeRect(bx, by, bw, bh);
    ctx.fillStyle = mapColors[i];
    ctx.font = 'bold 11px monospace';
    ctx.fillText(mapNames[i], GW / 2, by + 17);
    var hi = highScores[maps[i]];
    if (hi > 0) {
      ctx.fillStyle = '#666';
      ctx.font = '9px monospace';
      ctx.fillText('Best: Wave ' + hi, GW / 2, by + 28);
    }
  }

  // Instructions
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('D-PAD/Arrows: Move | A: Place Defender | B: Cycle/Upgrade | SELECT: Sell', GW / 2, GH - 40);
  ctx.fillText('Mouse/Touch supported | START/Space: Send the rot wave early', GW / 2, GH - 28);
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLICK A MAP TO START', GW / 2, GH - 12);
  ctx.globalAlpha = 1;
}

function getZoneTheme(col) {
  var map = MAPS[mapKey];
  var themes = ZONE_THEMES[mapKey] || ZONE_THEMES.forest;
  if (map.zones) {
    for (var z = 0; z < map.zones.length; z++) {
      if (col >= map.zones[z].startCol && col < map.zones[z].endCol) {
        return themes[map.zones[z].theme];
      }
    }
  }
  return themes[0];
}

function drawGameField() {
  ctx.save();
  TAS.fx.applyShake();

  // Apply custom shake
  var shk = getShakeOffset();
  if (shk.x !== 0 || shk.y !== 0) {
    ctx.translate(shk.x, shk.y);
  }

  // Draw zone backgrounds
  var map = MAPS[mapKey];
  if (map.zones) {
    for (var z = 0; z < map.zones.length; z++) {
      var zone = map.zones[z];
      var theme = (ZONE_THEMES[mapKey] || ZONE_THEMES.forest)[zone.theme];
      ctx.fillStyle = theme.bgColor;
      ctx.fillRect(zone.startCol * CELL, HUD_H, (zone.endCol - zone.startCol) * CELL, ROWS * CELL);
    }
  }

  // Draw environment particles behind grid
  drawEnvParticles();

  // Draw grid with zone-aware coloring
  ctx.lineWidth = 0.5;
  for (var x = 0; x <= COLS; x++) {
    var theme = getZoneTheme(Math.min(x, COLS - 1));
    ctx.strokeStyle = theme.gridColor;
    ctx.beginPath(); ctx.moveTo(x * CELL, HUD_H); ctx.lineTo(x * CELL, HUD_H + ROWS * CELL); ctx.stroke();
  }
  for (var y = 0; y <= ROWS; y++) {
    ctx.strokeStyle = '#1a2a15';
    ctx.beginPath(); ctx.moveTo(0, HUD_H + y * CELL); ctx.lineTo(COLS * CELL, HUD_H + y * CELL); ctx.stroke();
  }

  // Draw path with zone coloring
  for (var i = 0; i < pathCells.length; i++) {
    var pc = pathCells[i];
    var theme = getZoneTheme(pc[0]);
    ctx.fillStyle = theme.pathColor;
    ctx.fillRect(pc[0] * CELL + 1, pc[1] * CELL + HUD_H + 1, CELL - 2, CELL - 2);
    // Subtle path border glow
    ctx.strokeStyle = theme.gridColor;
    ctx.lineWidth = 0.3;
    ctx.strokeRect(pc[0] * CELL + 1, pc[1] * CELL + HUD_H + 1, CELL - 2, CELL - 2);
  }

  // Draw reactor core (pulsing, multi-layered)
  var core = MAPS[mapKey].core;
  var coreX = core[0] * CELL + CELL / 2;
  var coreY = core[1] * CELL + CELL / 2 + HUD_H;
  var corePulse = 0.7 + Math.sin(frame * 0.08) * 0.3;
  // Outer glow
  ctx.fillStyle = 'rgba(168, 85, 247, ' + (0.15 * corePulse) + ')';
  ctx.beginPath(); ctx.arc(coreX, coreY, 20, 0, Math.PI * 2); ctx.fill();
  // Mid ring
  ctx.fillStyle = 'rgba(168, 85, 247, ' + (0.3 * corePulse) + ')';
  ctx.beginPath(); ctx.arc(coreX, coreY, 14, 0, Math.PI * 2); ctx.fill();
  // Core
  ctx.fillStyle = '#a855f7';
  ctx.beginPath(); ctx.arc(coreX, coreY, 8, 0, Math.PI * 2); ctx.fill();
  // Inner bright
  ctx.fillStyle = '#d4aaff';
  ctx.beginPath(); ctx.arc(coreX, coreY, 4, 0, Math.PI * 2); ctx.fill();
  // Rotating energy ring
  ctx.strokeStyle = 'rgba(168,85,247,' + (0.4 * corePulse) + ')';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(coreX, coreY, 11 + corePulse * 2, frame * 0.03, frame * 0.03 + Math.PI * 1.5);
  ctx.stroke();

  // Draw entrance markers with animated arrows
  for (var i = 0; i < map.entrances.length; i++) {
    var ent = map.entrances[i];
    var ex = ent[0] * CELL + CELL / 2;
    var ey = ent[1] * CELL + CELL / 2 + HUD_H;
    ctx.strokeStyle = '#e6482e';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ex, ey, 8, 0, Math.PI * 2); ctx.stroke();
    // Animated arrow pointing inward
    var arrowPulse = Math.sin(frame * 0.1 + i) * 3;
    ctx.fillStyle = '#e6482e';
    ctx.beginPath();
    ctx.moveTo(ex + 12 + arrowPulse, ey - 3);
    ctx.lineTo(ex + 12 + arrowPulse, ey + 3);
    ctx.lineTo(ex + 16 + arrowPulse, ey);
    ctx.closePath();
    ctx.fill();
  }

  // Draw cursor (D-pad mode)
  if (cursorVisible && state === 'playing') {
    var cx = cursorCol * CELL, cy = cursorRow * CELL + HUD_H;
    var cursorPulse = Math.sin(frame * 0.12) * 0.3 + 0.7;
    ctx.globalAlpha = cursorPulse;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
    // Cursor corners
    var cLen = 4;
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + 1, cy + 1 + cLen); ctx.lineTo(cx + 1, cy + 1); ctx.lineTo(cx + 1 + cLen, cy + 1);
    ctx.moveTo(cx + CELL - 1 - cLen, cy + 1); ctx.lineTo(cx + CELL - 1, cy + 1); ctx.lineTo(cx + CELL - 1, cy + 1 + cLen);
    ctx.moveTo(cx + CELL - 1, cy + CELL - 1 - cLen); ctx.lineTo(cx + CELL - 1, cy + CELL - 1); ctx.lineTo(cx + CELL - 1 - cLen, cy + CELL - 1);
    ctx.moveTo(cx + 1 + cLen, cy + CELL - 1); ctx.lineTo(cx + 1, cy + CELL - 1); ctx.lineTo(cx + 1, cy + CELL - 1 - cLen);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Draw range preview for selected tower type or placed tower
  if (selectedTower && !cursorVisible && mouseCell.col >= 0 && mouseCell.row >= 0 && mouseCell.col < COLS && mouseCell.row < ROWS) {
    var def = TOWER_DEFS[selectedTower];
    var px = mouseCell.col * CELL + CELL / 2;
    var py = mouseCell.row * CELL + CELL / 2 + HUD_H;
    var canPlace = !pathSet[cellKey(mouseCell.col, mouseCell.row)] && gridOccupied[cellKey(mouseCell.col, mouseCell.row)] === undefined;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = canPlace ? def.color : '#ff0000';
    ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = canPlace ? def.color : '#ff0000';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  } else if (selectedTower && cursorVisible) {
    // Range preview at cursor position
    var def = TOWER_DEFS[selectedTower];
    var px = cursorCol * CELL + CELL / 2;
    var py = cursorRow * CELL + CELL / 2 + HUD_H;
    var canPlace = !pathSet[cellKey(cursorCol, cursorRow)] && gridOccupied[cellKey(cursorCol, cursorRow)] === undefined;
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = canPlace ? def.color : '#ff0000';
    ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = canPlace ? def.color : '#ff0000';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  if (selectedPlaced !== null && towers[selectedPlaced]) {
    var st = towers[selectedPlaced];
    var stats = getTowerStats(st);
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = TOWER_DEFS[st.type].color;
    ctx.beginPath(); ctx.arc(st.x, st.y, stats.range, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = TOWER_DEFS[st.type].color;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(st.x, st.y, stats.range, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Draw towers
  for (var i = 0; i < towers.length; i++) {
    drawTower(towers[i], i === selectedPlaced);
  }

  // Draw enemies
  for (var i = 0; i < enemies.length; i++) {
    drawEnemy(enemies[i]);
  }

  // Draw projectiles
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    ctx.fillStyle = p.color;
    if (p.splash) {
      // POOP projectile arc visual
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#665533';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw beams
  for (var i = 0; i < beams.length; i++) {
    var b = beams[i];
    ctx.globalAlpha = Math.min(1, b.life * 3);
    if (b.isRadial) {
      // Radial pulse for reactor tower
      var pulseR = b.width * (1 - b.life);
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(b.x1, b.y1, pulseR, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = Math.min(1, b.life * 2) * 0.3;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x1, b.y1, pulseR * 0.7, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.strokeStyle = b.color;
      ctx.lineWidth = b.width;
      ctx.beginPath();
      var segs = 5;
      ctx.moveTo(b.x1, b.y1);
      for (var s = 1; s < segs; s++) {
        var t = s / segs;
        var mx = TAS.math.lerp(b.x1, b.x2, t) + (Math.random() - 0.5) * 8;
        var my = TAS.math.lerp(b.y1, b.y2, t) + (Math.random() - 0.5) * 8;
        ctx.lineTo(mx, my);
      }
      ctx.lineTo(b.x2, b.y2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Draw particles
  TAS.particles.draw();

  // Draw float texts
  for (var i = 0; i < floatTexts.length; i++) {
    var ft = floatTexts[i];
    ctx.globalAlpha = Math.min(1, ft.life);
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  // Draw upgrade/sell buttons for selected placed tower
  if (selectedPlaced !== null && towers[selectedPlaced]) {
    var st = towers[selectedPlaced];
    var def = TOWER_DEFS[st.type];
    var stats = getTowerStats(st);
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(st.x - 48, st.y - 52, 96, 48);
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 1;
    ctx.strokeRect(st.x - 48, st.y - 52, 96, 48);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.fillText(def.name + ' Lv' + st.level + ' [' + st.kills + ' kills]', st.x, st.y - 42);
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText('DMG:' + stats.dmg + ' RNG:' + Math.floor(stats.range) + ' SPD:' + stats.rate.toFixed(2), st.x, st.y - 33);

    if (st.level < 3) {
      var ucost = UPGRADE_COST[st.level];
      ctx.fillStyle = gold >= ucost ? '#38d973' : '#e6482e';
      ctx.font = 'bold 9px monospace';
      ctx.fillText('UP $' + ucost, st.x, st.y - 21);
    }
    var refund = Math.floor(st.totalCost * 0.6 * (1 + Math.max(0, chaMod) * 0.05));
    ctx.fillStyle = '#ffaa44';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('SELL $' + refund, st.x, st.y - 9);
  }

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  ctx.fillStyle = 'rgba(26,28,44,0.92)';
  ctx.fillRect(0, 0, GW, HUD_H);
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('$' + gold, 6, 18);
  ctx.fillStyle = '#e6482e';
  ctx.textAlign = 'center';
  var livesText = '';
  for (var i = 0; i < Math.min(lives, 10); i++) livesText += '\u2665';
  if (lives > 10) livesText += '+' + (lives - 10);
  ctx.fillText(livesText, GW / 2, 18);
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'right';
  ctx.fillText('Wave ' + wave + '/30', GW - 6, 12);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText(MAPS[mapKey].name, GW - 6, 24);

  // Score + combo
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Score: ' + score, 6, 26);

  // Combo indicator
  if (comboKills >= 3) {
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(comboKills + 'x', 80, 26);
  }

  // Build timer or wave status
  if (!waveActive && state === 'playing') {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('BUILD: ' + Math.ceil(buildTimer) + 's', GW / 2 + 60, 24);
  }

  // Tower palette (bottom) - scrollable with more towers
  var panelY = GH - 38;
  ctx.fillStyle = 'rgba(26,28,44,0.92)';
  ctx.fillRect(0, panelY - 2, GW, 40);

  var visibleTowers = Math.min(TOWER_KEYS.length, 9);
  var tileW = Math.min(46, Math.floor((GW - 74) / visibleTowers));
  for (var i = 0; i < visibleTowers; i++) {
    var tk = TOWER_KEYS[i];
    var def = TOWER_DEFS[tk];
    var px = 4 + i * tileW;
    var isSelected = (selectedTower === tk);
    var canAfford = gold >= def.cost;

    ctx.fillStyle = isSelected ? '#2a2040' : '#1a1c2c';
    ctx.fillRect(px, panelY, tileW - 2, 34);
    ctx.strokeStyle = isSelected ? '#38d973' : (canAfford ? def.color : '#442222');
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.strokeRect(px, panelY, tileW - 2, 34);

    // Tower icon
    ctx.fillStyle = canAfford ? def.color : '#444';
    ctx.beginPath(); ctx.arc(px + 10, panelY + 12, 4, 0, Math.PI * 2); ctx.fill();

    // Cost
    ctx.fillStyle = canAfford ? '#ccc' : '#555';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('$' + def.cost, px + 17, panelY + 11);

    // Name abbreviation
    ctx.fillStyle = canAfford ? def.color : '#444';
    ctx.font = '6px monospace';
    var abbr = ['SNT','MRT','SPR','FRS','STK','BEM','WAL','POO','COR'];
    ctx.fillText(abbr[i], px + 2, panelY + 28);

    // Hotkey number
    ctx.fillStyle = '#555';
    ctx.font = '6px monospace';
    ctx.fillText((i + 1).toString(), px + tileW - 10, panelY + 28);
  }

  // READY button during build phase
  if (!waveActive && state === 'playing' && buildTimer > 0) {
    var rbx = GW - 70, rby = panelY, rbw = 66, rbh = 34;
    var hov = TAS.hit.pointInRect(mouseX, mouseY, rbx, rby, rbw, rbh);
    ctx.fillStyle = hov ? '#2a2040' : '#1a1c2c';
    ctx.fillRect(rbx, rby, rbw, rbh);
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 2;
    ctx.strokeRect(rbx, rby, rbw, rbh);
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('READY', rbx + rbw / 2, rby + 14);
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.fillText('START', rbx + rbw / 2, rby + 28);
  }

  // Tower info tooltip (when cursor is on a tower)
  if (cursorVisible && state === 'playing') {
    var ck = cellKey(cursorCol, cursorRow);
    if (gridOccupied[ck] !== undefined) {
      var ti = towers[gridOccupied[ck]];
      var td = TOWER_DEFS[ti.type];
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(2, HUD_H + 2, 160, 28);
      ctx.strokeStyle = td.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(2, HUD_H + 2, 160, 28);
      ctx.textAlign = 'left';
      ctx.fillStyle = td.color;
      ctx.font = '8px monospace';
      ctx.fillText(td.name + ' Lv' + ti.level + ' [' + ti.kills + ' kills]', 6, HUD_H + 14);
      ctx.fillStyle = '#aaa';
      ctx.fillText(td.desc, 6, HUD_H + 24);
    } else if (selectedTower) {
      // Show selected tower info
      var td = TOWER_DEFS[selectedTower];
      ctx.fillStyle = 'rgba(0,0,0,0.8)';
      ctx.fillRect(2, HUD_H + 2, 180, 28);
      ctx.strokeStyle = td.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(2, HUD_H + 2, 180, 28);
      ctx.textAlign = 'left';
      ctx.fillStyle = td.color;
      ctx.font = '8px monospace';
      ctx.fillText(td.name + ' ($' + td.cost + ') DMG:' + Math.floor(td.dmg * STR_DMG_MULT), 6, HUD_H + 14);
      ctx.fillStyle = '#aaa';
      ctx.fillText(td.desc, 6, HUD_H + 24);
    }
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTower(t, selected) {
  var def = TOWER_DEFS[t.type];
  var x = t.x, y = t.y;
  var lvColor = t.level === 3 ? '#f4b41b' : (t.level === 2 ? '#3cacd7' : def.color);

  // Base
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(x - 8, y - 8, 16, 16);
  ctx.strokeStyle = selected ? '#ffffff' : lvColor;
  ctx.lineWidth = selected ? 2 : 1;
  ctx.strokeRect(x - 8, y - 8, 16, 16);

  // Tower shape by type
  ctx.fillStyle = lvColor;
  if (t.type === 'spore') {
    ctx.beginPath(); ctx.arc(x, y, 4 + t.level, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = lvColor; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(t.angle) * 8, y + Math.sin(t.angle) * 8); ctx.stroke();
  } else if (t.type === 'cannon') {
    ctx.beginPath();
    for (var a = 0; a < 6; a++) {
      var ang = a * Math.PI / 3;
      var r = 5 + t.level;
      ctx[a === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(ang) * r, y + Math.sin(ang) * r);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(t.angle) * 10, y + Math.sin(t.angle) * 10); ctx.stroke();
  } else if (t.type === 'spray') {
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.arc(x, y, 6 + t.level, t.angle - 0.5, t.angle + 0.5);
    ctx.closePath(); ctx.fill();
  } else if (t.type === 'ice') {
    ctx.beginPath();
    ctx.moveTo(x, y - 6 - t.level); ctx.lineTo(x + 5, y); ctx.lineTo(x, y + 6 + t.level); ctx.lineTo(x - 5, y);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#88eeff';
    ctx.beginPath(); ctx.arc(x, y, 10 + t.level * 2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (t.type === 'lightning') {
    ctx.fillRect(x - 2, y - 7 - t.level, 4, 14 + t.level * 2);
    ctx.fillStyle = '#ffff88';
    var sparkAng = frame * 0.2;
    ctx.beginPath(); ctx.arc(x + Math.cos(sparkAng) * 3, y - 6 + Math.sin(sparkAng) * 3, 2, 0, Math.PI * 2); ctx.fill();
  } else if (t.type === 'beam') {
    ctx.beginPath();
    ctx.arc(x, y, 5 + t.level, t.angle - 0.8, t.angle + 0.8);
    ctx.lineTo(x, y);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
  } else if (t.type === 'thorn') {
    // Thorn barricade: spiky circle
    ctx.beginPath();
    for (var a = 0; a < 8; a++) {
      var ang = (a / 8) * Math.PI * 2;
      var innerR = 3 + t.level;
      var outerR = 6 + t.level * 1.5;
      var r = a % 2 === 0 ? outerR : innerR;
      ctx[a === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(ang) * r, y + Math.sin(ang) * r);
    }
    ctx.closePath(); ctx.fill();
    // Ground thorns
    ctx.strokeStyle = lvColor;
    ctx.lineWidth = 1;
    for (var a = 0; a < 4; a++) {
      var ang = (a / 4) * Math.PI * 2 + frame * 0.02;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(ang) * (8 + t.level), y + Math.sin(ang) * (8 + t.level));
      ctx.stroke();
    }
  } else if (t.type === 'poop') {
    // POOP launcher: squat mortar
    ctx.fillStyle = '#665533';
    ctx.fillRect(x - 5, y - 3, 10, 6);
    ctx.fillStyle = lvColor;
    ctx.beginPath(); ctx.arc(x, y - 4, 4 + t.level * 0.5, 0, Math.PI * 2); ctx.fill();
    // Barrel
    ctx.strokeStyle = lvColor;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y - 4);
    ctx.lineTo(x + Math.cos(t.angle) * 8, y - 4 + Math.sin(t.angle) * 8);
    ctx.stroke();
  } else if (t.type === 'reactor') {
    // Micro reactor: glowing hexagonal core
    ctx.beginPath();
    for (var a = 0; a < 6; a++) {
      var ang = a * Math.PI / 3 + frame * 0.01;
      var r = 5 + t.level;
      ctx[a === 0 ? 'moveTo' : 'lineTo'](x + Math.cos(ang) * r, y + Math.sin(ang) * r);
    }
    ctx.closePath(); ctx.fill();
    // Pulsing core
    ctx.fillStyle = '#ffffff';
    var rPulse = 2 + Math.sin(frame * 0.15) * 1;
    ctx.beginPath(); ctx.arc(x, y, rPulse, 0, Math.PI * 2); ctx.fill();
    // Energy rings
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#ff88ff';
    ctx.lineWidth = 1;
    var ringR = 8 + t.level * 2 + Math.sin(frame * 0.1) * 2;
    ctx.beginPath(); ctx.arc(x, y, ringR, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Level pips
  for (var l = 0; l < t.level; l++) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(x - 5 + l * 5, y + 9, 3, 3);
  }

  // Kill count indicator for high-kill towers
  if (t.kills >= 10) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(t.kills, x, y - 10);
  }
}

function drawEnemy(e) {
  var x = e.x, y = e.y;

  // Shadow for flying
  if (e.flying) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(x, y + 6, e.size * 0.8, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    y -= 6;
  }

  // Slow effect
  if (e.slow > 0) {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#88eeff';
    ctx.beginPath(); ctx.arc(x, y, e.size + 3, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Shield effect
  if (e.shield && e.shieldHp > 0) {
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#4488ff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, e.size + 4, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath(); ctx.arc(x, y, e.size + 4, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Body
  ctx.fillStyle = e.color;
  if (e.boss) {
    var pulse = 1 + Math.sin(frame * 0.1) * 0.1;
    ctx.beginPath(); ctx.arc(x, y, e.size * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#ff8888'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, e.size * pulse + 2, 0, Math.PI * 2); ctx.stroke();
    // Boss crown
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.moveTo(x - 5, y - e.size - 2);
    ctx.lineTo(x - 3, y - e.size - 6);
    ctx.lineTo(x, y - e.size - 3);
    ctx.lineTo(x + 3, y - e.size - 6);
    ctx.lineTo(x + 5, y - e.size - 2);
    ctx.closePath(); ctx.fill();
    // Boss eyes (angry)
    ctx.fillStyle = '#000';
    ctx.fillRect(x - 4, y - 2, 3, 2);
    ctx.fillRect(x + 1, y - 2, 3, 2);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(x - 2.5, y - 1, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 2.5, y - 1, 1, 0, Math.PI * 2); ctx.fill();
  } else if (e.healer) {
    ctx.beginPath(); ctx.arc(x, y, e.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 1, y - 4, 2, 8);
    ctx.fillRect(x - 4, y - 1, 8, 2);
  } else if (e.type === 'reactor_e') {
    // Reactor runner: angular shape
    ctx.beginPath();
    ctx.moveTo(x, y - e.size);
    ctx.lineTo(x + e.size, y);
    ctx.lineTo(x, y + e.size);
    ctx.lineTo(x - e.size, y);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === 'swarm') {
    // Tiny buzzing dots
    var buzz = Math.sin(frame * 0.3 + e.x) * 1.5;
    ctx.beginPath(); ctx.arc(x + buzz, y, e.size, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === 'shielded') {
    ctx.beginPath(); ctx.arc(x, y, e.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#88bbff';
    ctx.beginPath(); ctx.arc(x, y, e.size * 0.5, 0, Math.PI * 2); ctx.fill();
  } else if (e.flying) {
    ctx.beginPath();
    ctx.moveTo(x, y - e.size);
    ctx.lineTo(x + e.size, y + e.size * 0.5);
    ctx.lineTo(x - e.size, y + e.size * 0.5);
    ctx.closePath(); ctx.fill();
  } else if (e.splitter) {
    ctx.beginPath(); ctx.arc(x, y, e.size, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y - e.size); ctx.lineTo(x, y + e.size); ctx.stroke();
  } else if (e.armor > 0) {
    ctx.fillRect(x - e.size, y - e.size, e.size * 2, e.size * 2);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
    ctx.strokeRect(x - e.size, y - e.size, e.size * 2, e.size * 2);
  } else {
    ctx.beginPath(); ctx.arc(x, y, e.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x - 2, y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 2, y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
  }

  // HP bar
  if (e.hp < e.maxHp) {
    var barW = e.size * 2;
    var hpRatio = e.hp / e.maxHp;
    var barY = e.flying ? y - e.size - 8 : y - e.size - 5;
    ctx.fillStyle = '#300';
    ctx.fillRect(x - barW / 2, barY, barW, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : (hpRatio > 0.25 ? '#ffdd44' : '#ff4444');
    ctx.fillRect(x - barW / 2, barY, barW * hpRatio, 3);
  }

  // Shield bar (below HP bar)
  if (e.shieldMax > 0 && e.shieldHp > 0) {
    var barW = e.size * 2;
    var shieldRatio = e.shieldHp / e.shieldMax;
    var barY = e.flying ? y - e.size - 4 : y - e.size - 1;
    ctx.fillStyle = '#004';
    ctx.fillRect(x - barW / 2, barY, barW, 2);
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(x - barW / 2, barY, barW * shieldRatio, 2);
  }
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', function(e) {
  // Arrow keys feed into TAS.input for NES handling
  if (e.key === 'ArrowUp') { TAS.input.up = true; e.preventDefault(); }
  if (e.key === 'ArrowDown') { TAS.input.down = true; e.preventDefault(); }
  if (e.key === 'ArrowLeft') { TAS.input.left = true; e.preventDefault(); }
  if (e.key === 'ArrowRight') { TAS.input.right = true; e.preventDefault(); }
  if (e.key === 'z' || e.key === 'Z') { TAS.input.a = true; }
  if (e.key === 'x' || e.key === 'X') { TAS.input.b = true; }
  if (e.key === 'Enter') { TAS.input.start = true; }
  if (e.key === 'Shift') { TAS.input.select = true; }

  if (state !== 'playing') return;
  var num = parseInt(e.key);
  if (num >= 1 && num <= TOWER_KEYS.length) {
    selectedTower = TOWER_KEYS[num - 1];
    selectedPlaced = null;
    paletteIndex = num - 1;
    cursorVisible = false;
  }
  if (e.key === 'u' || e.key === 'U') {
    if (selectedPlaced !== null) upgradeTower(selectedPlaced);
  }
  if (e.key === 's' || e.key === 'S') {
    if (selectedPlaced !== null) sellTower(selectedPlaced);
  }
  if (e.key === ' ') {
    if (!waveActive && buildTimer > 0) buildTimer = 0;
    e.preventDefault();
  }
});

document.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowUp') TAS.input.up = false;
  if (e.key === 'ArrowDown') TAS.input.down = false;
  if (e.key === 'ArrowLeft') TAS.input.left = false;
  if (e.key === 'ArrowRight') TAS.input.right = false;
  if (e.key === 'z' || e.key === 'Z') TAS.input.a = false;
  if (e.key === 'x' || e.key === 'X') TAS.input.b = false;
  if (e.key === 'Enter') TAS.input.start = false;
  if (e.key === 'Shift') TAS.input.select = false;
});

// === START ===
TAS.loop.start(update, draw);

})();
</script>
