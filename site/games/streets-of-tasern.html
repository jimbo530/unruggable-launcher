"use strict";

// ============================================================
// BASELING STATS (BaselingPlayer.getMults, see ARCADE-STATS.md)
// ============================================================
// Streets of Tasern is a WAGER game (tasern-wager.js) — stats use the tightened PvP band
// (getMults({pvp:true}) -> 0.95-1.10) so a better-fed baseling has at most a ~10% edge.
// The brawler reads a D&D-style statB across 15+ references; we synthesize statB from the
// five PvP-clamped multipliers and recompute the derived globals in recomputeStats().
//   SPD -> walk speed/jump,  STA -> HP,  PWR -> melee damage,  LCK -> crit/drops.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
var strDmgMult = 1, dexSpdMult = 1, conHpMult = 1, conLives = 0, intScoreMult = 1, wisComboExt = 1, chaDropBonus = 0;
var totalDmgMult = 1, totalSpdMult = 1, totalHpMult = 1, totalScoreMult = 1, cooldownMult = 1, critChance = 0.05, bonusLives = 0, levelScale = 1;

function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults({ pvp: true }) : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // pvp 0.95..1.10 -> str 9..12 (tiny edge)
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck; statB.scoreMult = 1; statB.cooldown = 1; statB.lives = 0;
  statB.str = dnd(m.damage);    // STR -> melee damage
  statB.dex = dnd(m.moveSpeed); // DEX -> move speed, jump
  statB.con = dnd(m.health);    // CON -> HP
  statB.int = dnd(m.luck);      // INT -> score (luck flavor)
  statB.wis = dnd(m.luck);      // WIS -> combo window (luck flavor)
  statB.cha = dnd(m.luck);      // CHA -> drop rate
  strDmgMult = 1 + (statB.str - 10) * 0.04;
  dexSpdMult = 1 + (statB.dex - 10) * 0.03;
  conHpMult = 1 + (statB.con - 10) * 0.05;
  conLives = Math.floor((statB.con - 10) / 5);
  intScoreMult = 1 + (statB.int - 10) * 0.03;
  wisComboExt = 1 + (statB.wis - 10) * 0.04;
  chaDropBonus = (statB.cha - 10) * 0.015;
  totalDmgMult = strDmgMult * statB.damage;
  totalSpdMult = dexSpdMult * statB.speed;
  totalHpMult = conHpMult * statB.hpMult;
  totalScoreMult = intScoreMult * statB.scoreMult;
  cooldownMult = statB.cooldown;
  critChance = 0.05 + statB.luck * 0.02;
  bonusLives = statB.lives + conLives;
  levelScale = 1 + statB.level * 0.02;
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch(e) { console.warn('[streets-of-tasern] NftLoader display info failed:', e && e.message); }
recomputeStats();

var picking = false; // baseling character-select overlay open
var frame = 0;       // global animation clock (incremented each game-loop tick)
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[streets-of-tasern] player init failed:', e && e.message); });
}

// Local sprite-draw helper (this game has no TAS engine). Draws the selected baseling at
// (x,y) center, size px; returns true if a real sprite drew, false to use the fallback.
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W, H, SCALE;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth;
  var sh = window.innerHeight - 20;
  SCALE = Math.min(sw / GW, sh / GH);
  W = Math.floor(GW * SCALE);
  H = Math.floor(GH * SCALE);
  canvas.width = GW * dpr;
  canvas.height = GH * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, Math.floor((sh - H) / 2)) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
  gain.gain.setValueAtTime(vol || 0.1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function playNoise(dur, vol, freq) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var bufSize = Math.floor(audioCtx.sampleRate * dur);
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  var filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = freq || 800;
  filt.Q.value = 1;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);
}

  sporeHit: function() { playTone(150, 0.15, 'triangle', 0.06, 80); playNoise(0.08, 0.05, 300); },

};

// ============================================================
// INPUT SYSTEM (NES-style controls)
// ============================================================
var keys = {};
var justPressed = {};
var touchDir = { x: 0, y: 0 };
var touchBtns = { attack: false, jump: false, special: false };
var touchActive = false;
var touchId = -1;

document.addEventListener('keydown', function(e) {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  ensureAudio();
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault(); ensureAudio(); touchActive = true;
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    var rect = canvas.getBoundingClientRect();
    var x = (t.clientX - rect.left) / SCALE;
    var y = (t.clientY - rect.top) / SCALE;
    if (x > GW * 0.55) {
      if (y < GH * 0.35) touchBtns.jump = true;
      else if (y > GH * 0.65) touchBtns.special = true;
      else touchBtns.attack = true;
    } else {
      touchId = t.identifier;
      touchDir._sx = t.clientX;
      touchDir._sy = t.clientY;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    if (t.identifier === touchId || touchId === -1) {
      var dx = t.clientX - (touchDir._sx || t.clientX);
      var dy = t.clientY - (touchDir._sy || t.clientY);
      var dead = 12;
      touchDir.x = Math.abs(dx) > dead ? (dx > 0 ? 1 : -1) : 0;
      touchDir.y = Math.abs(dy) > dead ? (dy > 0 ? 1 : -1) : 0;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    if (t.identifier === touchId) {
      touchDir.x = 0; touchDir.y = 0; touchId = -1;
    }
  }
  if (e.touches.length === 0) { touchActive = false; touchDir.x = 0; touchDir.y = 0; }
}, { passive: false });

function getInput() {
  var dx = 0, dy = 0, attack = false, jump = false, special = false;
  if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS']) dy = 1;
  if (justPressed['KeyZ'] || justPressed['KeyJ'] || justPressed['Space']) attack = true;
  if (justPressed['KeyX'] || justPressed['KeyK']) jump = true;
  if (justPressed['KeyC'] || justPressed['KeyL']) special = true;
  if (touchDir.x) dx = touchDir.x;
  if (touchDir.y) dy = touchDir.y;
  if (touchBtns.attack) { attack = true; touchBtns.attack = false; }
  if (touchBtns.jump) { jump = true; touchBtns.jump = false; }
  if (touchBtns.special) { special = true; touchBtns.special = false; }
  return { dx: dx, dy: dy, attack: attack, jump: jump, special: special };
}

function anyKey() {
  for (var k in justPressed) { if (justPressed[k]) return true; }
  if (touchBtns.attack || touchBtns.jump || touchBtns.special) return true;
  return false;
}

function clearJustPressed() {
  for (var k in justPressed) justPressed[k] = false;
}

// ============================================================
// PARTICLES
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed, size) {
  for (var i = 0; i < count; i++) {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    var angle = Math.random() * Math.PI * 2;
    var spd = (speed || 3) * (0.4 + Math.random() * 0.8);
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1.5,
      life: 1, color: color, size: (size || 2) + Math.random() * 2
    });
  }
}

function spawnHitSpark(x, y) {
  for (var i = 0; i < 8; i++) {
    var angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
    var spd = 3 + Math.random() * 4;
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 0.7, color: Math.random() > 0.5 ? '#ffff00' : '#ffffff', size: 1 + Math.random() * 2
    });
  }
}

function spawnSporeCloud(x, y) {
  for (var i = 0; i < 10; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 2;
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 0.5,
      life: 1.5, color: ['#44dd88', '#33bb66', '#55ff99'][Math.floor(Math.random() * 3)],
      size: 2 + Math.random() * 3
    });
  }
}

function spawnReactorSpark(x, y) {
  for (var i = 0; i < 6; i++) {
    var angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    var spd = 2 + Math.random() * 3;
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 0.8, color: ['#44ffaa', '#33ff66', '#88ffcc'][Math.floor(Math.random() * 3)],
      size: 1 + Math.random() * 2
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.08 * dt * 60;
    p.life -= dt * 3.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(camX) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    var px = p.x - camX;
    // NES pixel style: snap to 2px grid
    var sx = Math.round(px - p.size / 2);
    var sy = Math.round(p.y - p.size / 2);
    var ss = Math.max(2, Math.round(p.size));
    ctx.fillRect(sx, sy, ss, ss);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// FLOATING TEXT
// ============================================================
var floatingTexts = [];
function spawnText(x, y, text, color) {
  floatingTexts.push({ x: x, y: y, text: text, color: color || '#fff', life: 1.2, vy: -1.5 });
}

function updateFloatingTexts(dt) {
  for (var i = floatingTexts.length - 1; i >= 0; i--) {
    var ft = floatingTexts[i];
    ft.y += ft.vy * dt * 60;
    ft.life -= dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

function drawFloatingTexts(camX) {
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < floatingTexts.length; i++) {
    var ft = floatingTexts[i];
    ctx.globalAlpha = Math.max(0, ft.life);
    // Shadow for readability
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, ft.x - camX + 1, ft.y + 1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x - camX, ft.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ============================================================
// HAZARDS (Environmental dangers)
// ============================================================
var hazards = [];

function createHazard(type, x, y) {
  return {
    type: type, x: x, y: y, w: 14, h: 14,
    timer: 0, active: true, life: 300 + Math.random() * 200,
    animFrame: 0
  };
}

function updateHazards(dt) {
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.timer += dt * 60;
    h.animFrame += dt * 8;
    h.life -= dt * 60;
    if (h.life <= 0) { hazards.splice(i, 1); continue; }

    // Damage player on contact
    if (player && player.state !== 'dead' && player.invincible <= 0) {
      if (Math.abs(player.x - h.x) < 16 && Math.abs(player.y - h.y) < 14) {
        if (h.type === 'spore') {
          hurtPlayer(4);
          SFX.sporeHit();
          spawnSporeCloud(h.x, h.y - 5);
          spawnText(h.x, h.y - 20, 'SPORE ROT!', '#38d973');
        } else if (h.type === 'reactor') {
          hurtPlayer(8);
          SFX.reactorHum();
          spawnReactorSpark(h.x, h.y - 5);
          spawnText(h.x, h.y - 20, 'REACTOR BURN!', '#3cacd7');
        }
        hazards.splice(i, 1);
      }
    }
  }
}

function drawHazards(camX) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var hx = h.x - camX;
    if (hx < -20 || hx > GW + 20) continue;

    ctx.save();
    ctx.translate(hx, h.y);
    if (h.type === 'spore') {
      // Glowing spore cluster
      var pulse = Math.sin(h.animFrame) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#33cc55';
      ctx.beginPath();
      ctx.arc(0, -6, 5 + Math.sin(h.animFrame * 1.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#55ff88';
      ctx.beginPath();
      ctx.arc(-2, -8, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(3, -5, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (h.type === 'reactor') {
      // Electrical arc hazard
      ctx.strokeStyle = '#44ffaa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6, -12);
      ctx.lineTo(-2 + Math.random() * 4, -6);
      ctx.lineTo(2 + Math.random() * 4, -10);
      ctx.lineTo(0, -2);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Glow
      ctx.fillStyle = '#44ffaa33';
      ctx.beginPath();
      ctx.arc(0, -7, 8, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ============================================================
// PLAYER CREATION (Player IS the baseling)
// ============================================================
function createPlayer() {
  // Player uses baseling stats directly - no character selection
  var baseHp = Math.floor(100 * totalHpMult);
  var baseSpd = Math.floor(100 * totalSpdMult);
  var baseAtk = Math.floor(10 * totalDmgMult);

  return {
    x: 60, y: 200, z: 0, vz: 0,
    w: 14, h: 30,
    hp: baseHp, maxHp: baseHp,
    speed: baseSpd,
    atk: baseAtk,
    facing: 1,
    state: 'idle',
    stateTimer: 0,
    attackStep: 0,
    attackCooldown: 0,
    hurtTimer: 0,
    invincible: 0,
    weapon: null,
    grounded: true,
    animFrame: 0,
    walkFrame: 0,
    jumpPow: 380 + (statB.dex - 10) * 5  // ref 17: DEX affects jump power
  };
}

// ============================================================
// ENEMY CREATION
// ============================================================
function createEnemy(type, x, y) {
  var t = ENEMY_TYPES[type];
  var hpScale = currentStage * 3 + Math.floor(levelScale * 2);
  return {
    type: type, x: x, y: y, z: 0, vz: 0,
    w: t.w, h: t.h,
    hp: t.hp + hpScale,
    maxHp: t.hp + hpScale,
    atk: t.atk + Math.floor(currentStage / 2),
    speed: t.speed,
    facing: -1,
    state: 'idle',
    stateTimer: 0,
    hurtTimer: 0,
    attackCooldown: 30 + Math.random() * 40,
    grounded: true,
    aiTimer: 20 + Math.random() * 40,
    aiState: 'wander',
    animFrame: 0,
    isBoss: false,
    flashTimer: 0,
    knockback: 0,
    deathTimer: 0
  };
}

function createBoss(stageIdx) {
  var bossInfo = BOSSES[stageIdx];
  var boss = createEnemy(stageIdx % ENEMY_TYPES.length, stageWidth - 80, 195);
  boss.hp = Math.floor((180 + stageIdx * 40) * levelScale);
  boss.maxHp = boss.hp;
  boss.atk = 15 + stageIdx * 3;
  boss.w = 22;
  boss.h = 36;
  boss.isBoss = true;
  boss.bossSpr = BOSS_SPR[stageIdx] || 'wyrm';
  boss.speed = 55;
  boss.bossPattern = bossInfo.pattern;
  boss.bossColor = bossInfo.color;
  boss.bossName = bossInfo.name;
  boss.bossTitle = bossInfo.title;
  boss.bossTaunt = bossInfo.taunt;
  boss.patternTimer = 0;
  boss.patternPhase = 0;
  return boss;
}

// ============================================================
// BREAKABLE OBJECTS
// ============================================================
function createBreakable(x, y, type) {
  var contents = Math.random();
  var dropThreshold = 0.35 + chaDropBonus;  // ref 18: CHA improves breakable drops
  var weaponThreshold = dropThreshold + 0.15 + chaDropBonus * 0.5;
  var item = null;
  if (contents < dropThreshold) item = 'food';
  else if (contents < weaponThreshold) item = 'weapon';
  return { x: x, y: y, w: 18, h: 18, type: type, hp: 3, contains: item };
}

function initStage(idx) {
  currentStage = idx;
  stageWidth = 950 + idx * 120;
  camera.x = 0;
  enemies = [];
  pickups = [];
  breakables = [];
  hazards = [];
  particles = [];
  floatingTexts = [];
  waveIndex = 0;
  wavesActive = false;
  allWavesCleared = false;
  bossActive = false;
  bossIntroTimer = 0;
  stageTransition = 0;
  scrollLocked = false;
  scrollUnlockX = 0;
  goTimer = 0;
  stageTimer = 0;

  player.x = 60;
  player.y = 195;
  player.z = 0;
  player.vz = 0;
  player.state = 'idle';
  player.grounded = true;
  player.invincible = 90;
  player.stateTimer = 0;

  // Place breakables throughout stage
  var numBreak = 5 + Math.floor(Math.random() * 4) + Math.floor(idx / 2);
  for (var i = 0; i < numBreak; i++) {
    var bx = 120 + Math.random() * (stageWidth - 240);
    var by = GROUND_TOP + 15 + Math.random() * (GROUND_BOT - GROUND_TOP - 30);
    var types = ['crate', 'barrel', 'trashcan'];
    breakables.push(createBreakable(bx, by, types[Math.floor(Math.random() * 3)]));
  }

  // Spawn environmental hazards based on stage theme
  if (STAGES[idx].detail === 'spore') {
    for (var j = 0; j < 4 + idx; j++) {
      var hx = 200 + Math.random() * (stageWidth - 400);
      var hy = GROUND_TOP + 20 + Math.random() * (GROUND_BOT - GROUND_TOP - 40);
      hazards.push(createHazard('spore', hx, hy));
    }
  }
  if (STAGES[idx].detail === 'tower' || STAGES[idx].detail === 'prison') {
    for (var k = 0; k < 3 + Math.floor(idx / 2); k++) {
      var rx = 200 + Math.random() * (stageWidth - 400);
      var ry = GROUND_TOP + 15 + Math.random() * (GROUND_BOT - GROUND_TOP - 30);
      hazards.push(createHazard('reactor', rx, ry));
    }
  }
}

// ============================================================
// WAVE SYSTEM
// ============================================================
function checkWaveSpawn() {
  if (allWavesCleared) return;
  var stage = STAGES[currentStage];
  var numWaves = stage.enemies.length;
  var waveSpacing = (stageWidth - 200) / numWaves;

  if (waveIndex < numWaves) {
    var triggerX = 80 + waveIndex * waveSpacing;
    if (player.x >= triggerX && !wavesActive) {
      var enemyType = stage.enemies[waveIndex];
      // Spore/Reactor stages can spawn special enemy types
      if (STAGES[currentStage].detail === 'spore' && Math.random() < 0.3) enemyType = 4;
      if ((STAGES[currentStage].detail === 'prison' || STAGES[currentStage].detail === 'tower') && Math.random() < 0.25) enemyType = 5;
      var count = 2 + Math.floor(Math.random() * 2) + Math.floor(currentStage / 3);
      for (var i = 0; i < count; i++) {
        var side = Math.random() > 0.5 ? 1 : -1;
        var ex = player.x + side * (GW * 0.45 + Math.random() * 40);
        var ey = GROUND_TOP + 20 + Math.random() * (GROUND_BOT - GROUND_TOP - 40);
        var e = createEnemy(enemyType, ex, ey);
        e.facing = side < 0 ? 1 : -1;
        enemies.push(e);
      }
      wavesActive = true;
      scrollLocked = true;
      scrollUnlockX = camera.x;
      spawnText(player.x, player.y - 50, 'SPORE WAVE ' + (waveIndex + 1) + '!', '#f4b41b');
    }
  }

  if (wavesActive && enemies.filter(function(e) { return e.state !== 'dead'; }).length === 0) {
    wavesActive = false;
    scrollLocked = false;
    waveIndex++;
    goTimer = 90;
    SFX.go();
    var waveBonus = Math.floor(50 * totalScoreMult);
    score += waveBonus;
    spawnText(player.x, player.y - 40, '+' + waveBonus + ' CLEARED!', '#38d973');

    if (waveIndex >= numWaves && !bossActive) {
      setTimeout(function() {
        var boss = createBoss(currentStage);
        boss.x = player.x + GW * 0.4;
        boss.y = 190;
        enemies.push(boss);
        bossActive = true;
        scrollLocked = true;
        bossIntroTimer = 120;
        bossIntroName = boss.bossName;
        bossIntroTitle = boss.bossTitle;
        screenShake = 8;
        flashAlpha = 0.3;
        flashColor = BOSSES[currentStage].color;
      }, 500);
    }
  }

  if (bossActive && enemies.filter(function(e) { return e.state !== 'dead'; }).length === 0) {
    allWavesCleared = true;
    bossActive = false;
    var bossBonus = Math.floor(500 * totalScoreMult);
    score += bossBonus;
    spawnText(player.x, player.y - 50, '+' + bossBonus + ' FUNGI BOSS SLAIN!', '#f4b41b');
  }
}

// ============================================================
// COLLISION HELPERS
// ============================================================
function hitscanRange(attacker, range, width) {
  return {
    x: attacker.x + attacker.facing * range * 0.5,
    y: attacker.y,
    w: range,
    h: width || 22
  };
}

function boxOverlap(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) * 0.5 &&
         Math.abs(a.y - b.y) < (a.h + b.h) * 0.3;
}

function depthClose(a, b) {
  return Math.abs(a.y - b.y) < 22;
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt) {
  if (!player || player.state === 'dead') return;

  var input = getInput();
  player.animFrame += dt * 10;
  player.invincible = Math.max(0, player.invincible - dt * 60);
  player.attackCooldown = Math.max(0, player.attackCooldown - dt * 60 * cooldownMult);
  player.hurtTimer = Math.max(0, player.hurtTimer - dt * 60);

  // Combo timer (WIS extends window)
  if (comboTimer > 0) {
    comboTimer -= dt * 1000;
    if (comboTimer <= 0) { comboCount = 0; comboMultiplier = 1; }
  }

  // Tutorial dismiss
  if (showTutorial && stageTimer > 5) showTutorial = false;

  // Hurt state
  if (player.state === 'hurt') {
    player.stateTimer -= dt * 60;
    player.x += player.facing * -1.5 * dt * 60;
    if (player.stateTimer <= 0) player.state = 'idle';
    return;
  }

  // Attack state
  if (player.state === 'attack') {
    player.stateTimer -= dt * 60;
    if (player.stateTimer <= 0) {
      player.state = 'idle';
      player.attackStep = (player.attackStep + 1) % 3;
    }
    return;
  }

  // Special state
  if (player.state === 'special') {
    player.stateTimer -= dt * 60;
    if (player.stateTimer <= 0) player.state = 'idle';
    return;
  }

  // Jump physics
  if (!player.grounded) {
    player.vz += GRAVITY * dt;
    player.z += player.vz * dt;
    if (player.z >= 0) {
      player.z = 0;
      player.vz = 0;
      player.grounded = true;
      player.state = 'idle';
      SFX.land();
      // Landing dust particles
      spawnParticles(player.x, player.y, '#88776644', 3, 1, 1);
    }
    // Air drift (DEX through totalSpdMult)
    player.x += input.dx * player.speed * 0.4 * dt;
    if (input.dx) player.facing = input.dx;

    // Jump kick (STR through totalDmgMult)
    if (input.attack && player.attackCooldown <= 0) {
      var jkRange = 28;
      var jkDmg = Math.floor(player.atk * 1.3);
      performAttack(jkDmg, jkRange);
      player.attackCooldown = 25 / cooldownMult;
      SFX.kick();
      spawnText(player.x, player.y - 40, 'SPORE KICK!', '#3cacd7');
    }
    return;
  }

  // Ground movement
  if (input.dx !== 0 || input.dy !== 0) {
    var spd = player.speed * dt;
    player.x += input.dx * spd;
    player.y += input.dy * spd * 0.55;
    player.state = 'walk';
    player.walkFrame += dt * 12;
    if (input.dx !== 0) player.facing = input.dx;
  } else {
    player.state = 'idle';
    player.walkFrame = 0;
  }

  // Clamp position
  var leftBound = scrollLocked ? scrollUnlockX + 10 : camera.x + 10;
  var rightBound = scrollLocked ? scrollUnlockX + GW - 10 : Math.min(stageWidth - 10, camera.x + GW - 10);
  player.x = Math.max(leftBound, Math.min(rightBound, player.x));
  player.y = Math.max(GROUND_TOP, Math.min(GROUND_BOT, player.y));

  // Jump (DEX affects jump height)
  if (input.jump) {
    player.vz = -player.jumpPow;
    player.grounded = false;
    player.state = 'jump';
    SFX.kick();
  }

  // Attack (STR affects damage through totalDmgMult)
  if (input.attack && player.attackCooldown <= 0) {
    var step = player.attackStep;
    var range = player.weapon ? 34 : 24;
    var dmg = player.atk;

    // Third hit in combo is stronger
    if (step === 2) {
      dmg = Math.floor(player.atk * 1.6);
      range += 4;
    }

    performAttack(dmg, range);
    player.state = 'attack';
    player.stateTimer = step === 2 ? 16 : 12;
    player.attackCooldown = (step === 2 ? 20 : 13) / cooldownMult;

    if (player.weapon) {
      SFX.weaponSwing();
      player.weapon.durability--;
      if (player.weapon.durability <= 0) {
        SFX.weaponBreak();
        spawnParticles(player.x + player.facing * 15, player.y - 15, player.weapon.color, 6, 3);
        spawnText(player.x, player.y - 35, 'DECOMPOSED!', '#7a444a');
        player.weapon = null;
      }
    } else {
      if (step === 0) SFX.punch1();
      else if (step === 1) SFX.punch2();
      else SFX.punch3();
    }
  }

  // Special (costs HP, STR scales damage)
  if (input.special && player.hp > 20) {
    player.hp -= 12;
    player.state = 'special';
    player.stateTimer = 28;
    SFX.special();
    screenShake = 12;
    flashAlpha = 0.35;
    flashColor = statB.color || '#ffffcc';

    var specialDmg = Math.floor(player.atk * 2.2);
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.state === 'dead') continue;
      var dist = Math.abs(e.x - player.x);
      if (dist < 55 && depthClose(player, e)) {
        damageEnemy(e, specialDmg);
        e.knockback = player.facing * 4;
      }
    }
    spawnParticles(player.x, player.y - 15, statB.color || '#ffff66', 15, 5, 3);
    spawnText(player.x, player.y - 45, 'MYCO BLAST!', '#a855f7');
  }
}

function performAttack(dmg, range) {
  var hitBox = hitscanRange(player, range);
  var hitAny = false;

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.state === 'dead') continue;
    if (boxOverlap(hitBox, e) && depthClose(player, e)) {
      var totalDmg = dmg + (player.weapon ? player.weapon.atkBonus : 0);
      // Critical hit check (luck + statB.luck)
      var isCrit = Math.random() < critChance;        // ref 19: luck -> crit
      if (isCrit) {
        totalDmg = Math.floor(totalDmg * 2);
        SFX.crit();
        critFlash = 8;
        spawnText(e.x, e.y - e.h - 15, 'CRIT!', '#ff4444');
        screenShake = Math.max(screenShake, 8);
      }
      damageEnemy(e, totalDmg);
      e.knockback = player.facing * 2.5;
      hitAny = true;
      spawnHitSpark(e.x - player.facing * 5, e.y - e.h * 0.6);
    }
  }

  // Hit breakables
  for (var j = breakables.length - 1; j >= 0; j--) {
    var b = breakables[j];
    if (boxOverlap(hitBox, b) && depthClose(player, b)) {
      b.hp--;
      SFX.smash();
      spawnParticles(b.x, b.y - 8, '#886644', 3, 2);
      if (b.hp <= 0) {
        spawnParticles(b.x, b.y - 8, '#886644', 8, 3, 3);
        spawnBreakableContents(b);
        breakables.splice(j, 1);
        var breakPts = Math.floor(20 * totalScoreMult);
        score += breakPts;
        spawnText(b.x, b.y - 20, '+' + breakPts, '#aaaaaa');
      }
      hitAny = true;
    }
  }

  if (hitAny) {
    comboCount++;
    comboTimer = COMBO_TIMEOUT;
    comboMultiplier = 1 + Math.floor(comboCount / 4) * 0.5;
    if (comboMultiplier > 4) comboMultiplier = 4;
    if (comboCount > bestCombo) bestCombo = comboCount;
    screenShake = Math.min(8, 2 + comboCount * 0.3);
    // WIS combo bonus popup
    if (comboCount > 0 && comboCount % 5 === 0) {
      var comboBonus = Math.floor(comboCount * 10 * totalScoreMult);
      score += comboBonus;
      spawnText(player.x, player.y - 50, '+' + comboBonus + ' COMBO!', '#ffaa00');
    }
  }
}

function spawnBreakableContents(b) {
  if (b.contains === 'food') {
    var food = FOODS[Math.floor(Math.random() * FOODS.length)];
    pickups.push({ x: b.x, y: b.y, type: 'food', data: food, timer: 480 });
  } else if (b.contains === 'weapon') {
    var w = WEAPONS[Math.floor(Math.random() * WEAPONS.length)];
    pickups.push({ x: b.x, y: b.y, type: 'weapon', data: JSON.parse(JSON.stringify(w)), timer: 480 });
  }
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  e.hurtTimer = 8;
  e.flashTimer = 6;
  e.state = 'hurt';
  e.stateTimer = 12;

  spawnText(e.x, e.y - e.h - 5, dmg.toString(), '#ffcc00');

  if (e.hp <= 0) {
    e.state = 'dead';
    e.deathTimer = 50;
    totalKills++;
    var basePts = e.isBoss ? 800 : ENEMY_TYPES[e.type].reward;
    var pts = Math.floor(basePts * comboMultiplier * totalScoreMult); // ref 20: INT scales kill score
    score += pts;
    spawnText(e.x, e.y - e.h - 15, '+' + pts, '#44ff44');
    spawnParticles(e.x, e.y - e.h * 0.5, '#ff6644', 12, 4, 3);

    if (e.isBoss) {
      SFX.bossDie();
      screenShake = 18;
      flashAlpha = 0.6;
      flashColor = '#ffffff';
      spawnParticles(e.x, e.y - e.h * 0.5, e.bossColor, 20, 6, 4);
      spawnText(e.x, e.y - e.h - 30, e.bossName + ' DEFEATED!', '#ffcc00');
    } else {
      SFX.enemyDie();
      // Random food drop (CHA boosts chance)
      var foodDropChance = 0.15 + chaDropBonus; // ref 21: CHA food drop
      if (Math.random() < foodDropChance) {
        var food = FOODS[Math.floor(Math.random() * FOODS.length)];
        pickups.push({ x: e.x, y: e.y, type: 'food', data: food, timer: 480 });
      }
      // Rare weapon drop (CHA boosts)
      var weapDropChance = 0.04 + chaDropBonus * 0.5; // ref 22: CHA weapon drop
      if (Math.random() < weapDropChance) {
        var w = WEAPONS[Math.floor(Math.random() * WEAPONS.length)];
        pickups.push({ x: e.x, y: e.y, type: 'weapon', data: JSON.parse(JSON.stringify(w)), timer: 480 });
        spawnText(e.x, e.y - 25, 'SPORE LOOT!', '#f4b41b');
      }
    }
  } else {
    if (player.weapon) SFX.weaponHit();
    else SFX.hit();
  }
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];

    if (e.state === 'dead') {
      e.deathTimer -= dt * 60;
      if (e.deathTimer <= 0) enemies.splice(i, 1);
      continue;
    }

    e.animFrame += dt * 8;
    e.hurtTimer = Math.max(0, e.hurtTimer - dt * 60);
    e.flashTimer = Math.max(0, e.flashTimer - dt * 60);
    e.attackCooldown = Math.max(0, e.attackCooldown - dt * 60);

    // Knockback
    if (e.knockback) {
      e.x += e.knockback * dt * 60;
      e.knockback *= 0.85;
      if (Math.abs(e.knockback) < 0.1) e.knockback = 0;
    }

    // Jump physics
    if (!e.grounded) {
      e.vz = (e.vz || 0) + GRAVITY * dt;
      e.z = (e.z || 0) + e.vz * dt;
      if (e.z >= 0) { e.z = 0; e.vz = 0; e.grounded = true; }
    }

    if (e.state === 'hurt') {
      e.stateTimer -= dt * 60;
      if (e.stateTimer <= 0) e.state = 'idle';
      continue;
    }

    if (e.isBoss) {
      updateBossAI(e, dt);
      continue;
    }

    // Normal enemy AI
    e.aiTimer -= dt * 60;
    if (e.aiTimer <= 0) {
      e.aiTimer = 25 + Math.random() * 35;
      var dx = player.x - e.x;
      var dy = player.y - e.y;
      var dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 28 && e.attackCooldown <= 0) {
        e.aiState = 'attack';
      } else if (dist < 100) {
        e.aiState = Math.random() < ENEMY_TYPES[e.type].aggro ? 'approach' : 'circle';
      } else {
        e.aiState = 'approach';
      }
    }

    e.facing = player.x > e.x ? 1 : -1;
    var spd = e.speed * dt;

    switch (e.aiState) {
      case 'approach': {
        var adx = player.x - e.x;
        var ady = player.y - e.y;
        var adist = Math.sqrt(adx * adx + ady * ady);
        if (adist > 24) {
          e.x += (adx / adist) * spd;
          e.y += (ady / adist) * spd * 0.5;
          e.state = 'walk';
        }
        break;
      }
      case 'circle': {
        var cang = Math.atan2(player.y - e.y, player.x - e.x) + (Math.random() > 0.5 ? 1 : -1) * Math.PI * 0.5;
        e.x += Math.cos(cang) * spd * 0.7;
        e.y += Math.sin(cang) * spd * 0.35;
        e.state = 'walk';
        break;
      }
      case 'attack': {
        if (e.attackCooldown <= 0 && depthClose(player, e) && Math.abs(player.x - e.x) < 30) {
          e.state = 'attack';
          e.stateTimer = 12;
          e.attackCooldown = 35 + Math.random() * 25;
          if (player.invincible <= 0 && player.state !== 'dead') {
            hurtPlayer(e.atk);
          }
        } else {
          e.aiState = 'approach';
        }
        break;
      }
      case 'wander': {
        e.aiState = 'approach';
        break;
      }
    }

    // Shadow Assassin: random jumps
    if (e.type === 3 && e.grounded && Math.random() < 0.008) {
      e.vz = -350;
      e.grounded = false;
    }

    // Brute Enforcer charge
    if (e.type === 2 && e.aiState === 'approach') {
      var cdist = Math.abs(player.x - e.x);
      if (cdist > 50 && cdist < 120 && Math.random() < 0.005 && depthClose(player, e)) {
        e.speed = ENEMY_TYPES[2].speed * 3;
        setTimeout(function() { if (e.state !== 'dead') e.speed = ENEMY_TYPES[2].speed; }, 600);
      }
    }

    // Spore Thrower: spawn spore hazard
    if (e.type === 4 && Math.random() < 0.003 && hazards.length < 12) {
      var sx = player.x + (Math.random() - 0.5) * 60;
      var sy = player.y + (Math.random() - 0.5) * 30;
      hazards.push(createHazard('spore', sx, sy));
      SFX.sporeHit();
      spawnText(e.x, e.y - e.h - 5, 'ROT BOMB!', '#38d973');
    }

    // Reactor Guard: spawn reactor hazard
    if (e.type === 5 && Math.random() < 0.002 && hazards.length < 12) {
      var rx = player.x + (Math.random() - 0.5) * 50;
      var ry = player.y + (Math.random() - 0.5) * 25;
      hazards.push(createHazard('reactor', rx, ry));
      SFX.reactorHum();
    }

    e.y = Math.max(GROUND_TOP, Math.min(GROUND_BOT, e.y));
  }
}

function updateBossAI(boss, dt) {
  boss.patternTimer += dt * 60;
  boss.facing = player.x > boss.x ? 1 : -1;
  var spd = boss.speed * dt;
  var dx = player.x - boss.x;
  var dy = player.y - boss.y;
  var dist = Math.sqrt(dx * dx + dy * dy);

  switch (boss.bossPattern) {
    case 'charge': {
      if (boss.patternTimer < 60) {
        if (dist > 30) {
          boss.x += (dx / dist) * spd;
          boss.y += (dy / dist) * spd * 0.4;
          boss.state = 'walk';
        }
      } else if (boss.patternTimer < 80) {
        boss.x += boss.facing * spd * 3;
        boss.state = 'attack';
        spawnParticles(boss.x - boss.facing * 10, boss.y - 10, boss.bossColor, 1, 2, 2);
        if (dist < 30 && depthClose(player, boss) && player.invincible <= 0) {
          hurtPlayer(Math.floor(boss.atk * 1.5));
          screenShake = 8;
          spawnText(player.x, player.y - 40, 'FUNGAL CHARGE!', '#e6482e');
        }
      } else {
        boss.patternTimer = 0;
        boss.state = 'idle';
      }
      break;
    }
    case 'summon': {
      if (boss.patternTimer < 80) {
        if (dist > 50) {
          boss.x += (dx / dist) * spd * 0.6;
          boss.y += (dy / dist) * spd * 0.3;
          boss.state = 'walk';
        }
        if (dist < 35 && boss.attackCooldown <= 0 && depthClose(player, boss)) {
          if (player.invincible <= 0) hurtPlayer(boss.atk);
          boss.attackCooldown = 30;
          boss.state = 'attack';
        }
      } else {
        if (enemies.filter(function(e) { return !e.isBoss && e.state !== 'dead'; }).length < 3) {
          var mtype = currentStage >= 3 ? (Math.random() < 0.3 ? 4 : 0) : 0;
          var me = createEnemy(mtype, boss.x + boss.facing * -60, boss.y);
          enemies.push(me);
          spawnParticles(me.x, me.y - 15, boss.bossColor, 6, 3);
          spawnText(boss.x, boss.y - boss.h - 10, 'SPORELINGS!', '#a855f7');
        }
        boss.patternTimer = 0;
      }
      break;
    }
    case 'teleport': {
      if (boss.patternTimer < 50) {
        if (dist > 30) {
          boss.x += (dx / dist) * spd;
          boss.y += (dy / dist) * spd * 0.4;
          boss.state = 'walk';
        }
        if (dist < 30 && boss.attackCooldown <= 0 && depthClose(player, boss)) {
          if (player.invincible <= 0) hurtPlayer(boss.atk);
          boss.attackCooldown = 25;
          boss.state = 'attack';
        }
      } else if (boss.patternTimer < 55) {
        spawnParticles(boss.x, boss.y - boss.h / 2, '#8844ff', 8, 4);
      } else if (boss.patternTimer < 60) {
        boss.x = player.x - player.facing * 50;
        boss.y = player.y + (Math.random() - 0.5) * 20;
        boss.facing = player.facing;
        spawnParticles(boss.x, boss.y - boss.h / 2, '#8844ff', 8, 4);
        spawnText(boss.x, boss.y - boss.h - 10, 'SPORE SHIFT!', '#a855f7');
        boss.patternTimer = 0;
      }
      break;
    }
    case 'aoe': {
      if (boss.patternTimer < 60) {
        if (dist > 30) {
          boss.x += (dx / dist) * spd;
          boss.y += (dy / dist) * spd * 0.4;
          boss.state = 'walk';
        }
      } else if (boss.patternTimer < 70) {
        boss.state = 'attack';
        if (boss.patternTimer > 65) {
          flashAlpha = 0.2;
          flashColor = '#44ff44';
          // Spawn warning spore circles
          spawnSporeCloud(boss.x, boss.y - 10);
        }
      } else {
        screenShake = 10;
        spawnParticles(boss.x, boss.y - 15, '#44ff44', 18, 6, 3);
        spawnSporeCloud(boss.x, boss.y);
        if (Math.abs(dx) < 60 && depthClose(player, boss) && player.invincible <= 0) {
          hurtPlayer(Math.floor(boss.atk * 1.3));
          spawnText(player.x, player.y - 40, 'MYCELIUM BLAST!', '#38d973');
        }
        // Spawn hazards
        for (var hi = 0; hi < 2; hi++) {
          hazards.push(createHazard('spore', boss.x + (Math.random() - 0.5) * 80, boss.y + (Math.random() - 0.5) * 40));
        }
        boss.patternTimer = 0;
        boss.state = 'idle';
      }
      break;
    }
    case 'combo': {
      if (boss.patternTimer < 40) {
        if (dist > 25) {
          boss.x += (dx / dist) * spd * 1.3;
          boss.y += (dy / dist) * spd * 0.5;
          boss.state = 'walk';
        }
      } else if (boss.patternTimer < 55) {
        boss.state = 'attack';
        if (Math.floor(boss.patternTimer) % 5 === 0) {
          if (dist < 30 && depthClose(player, boss) && player.invincible <= 0) {
            hurtPlayer(Math.floor(boss.atk * 0.7));
          }
          spawnHitSpark(boss.x + boss.facing * 15, boss.y - boss.h * 0.5);
        }
      } else {
        boss.patternTimer = 0;
        boss.state = 'idle';
      }
      break;
    }
  }

  boss.y = Math.max(GROUND_TOP, Math.min(GROUND_BOT, boss.y));
}

// ============================================================
// PLAYER HURT
// ============================================================
function hurtPlayer(dmg) {
  if (!player || player.invincible > 0 || player.state === 'dead') return;
  player.hp -= dmg;
  player.state = 'hurt';
  player.stateTimer = 18;
  player.invincible = 50;
  player.hurtTimer = 18;
  comboCount = 0;
  comboMultiplier = 1;
  comboTimer = 0;
  screenShake = 6;
  SFX.hit();
  spawnParticles(player.x, player.y - 15, '#ff3333', 8, 3);
  spawnText(player.x, player.y - player.h - 5, '-' + dmg, '#ff4444');

  if (player.hp <= 0) {
    player.hp = 0;
    player.state = 'dead';
    SFX.die();
    deathTimer = 100;
    spawnParticles(player.x, player.y - 15, '#ff0000', 15, 5, 3);
  }
}

// ============================================================
// PICKUP UPDATE
// ============================================================
function updatePickups(dt) {
  for (var i = pickups.length - 1; i >= 0; i--) {
    var p = pickups[i];
    p.timer -= dt * 60;
    if (p.timer <= 0) { pickups.splice(i, 1); continue; }

    if (Math.abs(player.x - p.x) < 18 && Math.abs(player.y - p.y) < 14 && player.state !== 'dead') {
      if (p.type === 'food') {
        var healAmt = Math.floor(p.data.heal * totalHpMult * 0.5); // ref 23: CON scales healing
        var healed = Math.min(healAmt, player.maxHp - player.hp);
        player.hp += healed;
        SFX.heal();
        var foodPts = Math.floor(25 * totalScoreMult);
        score += foodPts;
        spawnText(p.x, p.y - 12, '+' + healed + ' HP', '#44ff44');
      } else if (p.type === 'weapon') {
        player.weapon = p.data;
        SFX.pickup();
        spawnText(p.x, p.y - 12, p.data.name + '!', '#ffffff');
      }
      spawnParticles(p.x, p.y - 5, '#ffffff', 5, 2);
      pickups.splice(i, 1);
    }
  }
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera(dt) {
  if (scrollLocked) {
    camera.x = scrollUnlockX;
    return;
  }
  var target = player.x - GW * 0.35;
  camera.x += (target - camera.x) * 0.06;
  camera.x = Math.max(0, Math.min(stageWidth - GW, camera.x));
}

// ============================================================
// DRAW BACKGROUND (Themed zones)
// ============================================================
function drawBackground() {
  var stage = STAGES[currentStage];

  // Sky gradient
  var grad = ctx.createLinearGradient(0, 0, 0, GROUND_TOP + 20);
  grad.addColorStop(0, stage.bgTop);
  grad.addColorStop(1, stage.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GROUND_TOP + 20);

  // Background buildings (parallax)
  var seed = currentStage * 7919;
  for (var i = 0; i < 14; i++) {
    var hash = (i * 4831 + seed) % 10000;
    var bx = ((i * 72 - camera.x * 0.2) % (GW + 100)) - 20;
    var bh = 35 + (hash % 55);
    var bw = 25 + (hash % 25);
    ctx.fillStyle = stage.accent;
    ctx.fillRect(Math.round(bx), GROUND_TOP - bh + 25, bw, bh);
    // NES-style windows (2x2 pixel blocks)
    for (var wy = 5; wy < bh - 10; wy += 10) {
      for (var wx = 4; wx < bw - 6; wx += 8) {
        var lit = ((hash + wx * wy + frameCount) % 7) < 2;
        ctx.fillStyle = lit ? '#ffcc4466' : '#11111188';
        ctx.fillRect(Math.round(bx + wx), GROUND_TOP - bh + 25 + wy, 4, 6);
      }
    }
  }

  // Foreground buildings
  for (var fi = 0; fi < 8; fi++) {
    var fhash = (fi * 3571 + seed + 999) % 10000;
    var fbx = ((fi * 110 - camera.x * 0.5) % (GW + 150)) - 30;
    var fbh = 20 + (fhash % 35);
    var fbw = 35 + (fhash % 30);
    ctx.fillStyle = stage.bgBot;
    ctx.fillRect(Math.round(fbx), GROUND_TOP - fbh + 30, fbw, fbh + 5);
  }

  // Ground plane
  ctx.fillStyle = stage.ground;
  ctx.fillRect(0, GROUND_TOP + 10, GW, GH - GROUND_TOP - 10);

  // Stage-specific details
  drawStageDetails(stage);

  // Ground lines for depth (NES style: dithered)
  ctx.strokeStyle = '#00000033';
  ctx.lineWidth = 1;
  for (var gy = GROUND_TOP + 30; gy < GROUND_BOT + 10; gy += 18) {
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(GW, gy);
    ctx.stroke();
  }
}

function drawStageDetails(stage) {
  var seed = currentStage * 1337;

  switch (stage.detail) {
    case 'docks': {
      // Water at bottom
      ctx.fillStyle = '#1a3050';
      ctx.fillRect(0, GROUND_BOT + 5, GW, GH - GROUND_BOT);
      // Wave effect
      ctx.strokeStyle = '#2a4060';
      for (var x = 0; x < GW; x += 20) {
        ctx.beginPath();
        ctx.arc(x + Math.sin(frameCount * 0.02 + x) * 3, GROUND_BOT + 12, 8, 0, Math.PI);
        ctx.stroke();
      }
      // Dock pilings
      for (var di = 0; di < 6; di++) {
        var cx = ((di * 100 + seed) % stageWidth) - camera.x;
        if (cx < -20 || cx > GW + 20) continue;
        ctx.fillStyle = '#5a4020';
        ctx.fillRect(cx, GROUND_TOP + 5, 6, GROUND_BOT - GROUND_TOP);
        ctx.fillStyle = '#4a3010';
        ctx.fillRect(cx - 1, GROUND_TOP + 3, 8, 3);
      }
      // Crates in background
      for (var ci = 0; ci < 5; ci++) {
        var ccx = ((ci * 130 + seed) % stageWidth) - camera.x;
        if (ccx < -20 || ccx > GW + 20) continue;
        ctx.fillStyle = '#5a4020';
        ctx.fillRect(ccx, GROUND_TOP + 5, 15, 12);
        ctx.strokeStyle = '#3a2010';
        ctx.strokeRect(ccx, GROUND_TOP + 5, 15, 12);
      }
      // Lantern glow
      for (var li = 0; li < 3; li++) {
        var lx = ((li * 180 + 60) % stageWidth) - camera.x;
        if (lx < -30 || lx > GW + 30) continue;
        ctx.fillStyle = '#ffcc3322';
        ctx.beginPath();
        ctx.arc(lx, GROUND_TOP - 5, 12 + Math.sin(frameCount * 0.03) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    }
    case 'market': {
      // Stall canopies with striped patterns
      for (var mi = 0; mi < 5; mi++) {
        var sx = ((mi * 160 + 50 + seed) % stageWidth) - camera.x;
        if (sx < -40 || sx > GW + 40) continue;
        var colors = ['#cc4444', '#4444cc', '#44cc44', '#cccc44', '#cc44cc'];
        // Canopy
        ctx.fillStyle = colors[mi % 5] + '88';
        ctx.fillRect(sx - 20, GROUND_TOP - 5, 40, 6);
        ctx.fillStyle = colors[mi % 5] + '44';
        ctx.fillRect(sx - 22, GROUND_TOP + 1, 44, 3);
        // Posts
        ctx.fillStyle = '#5a4020';
        ctx.fillRect(sx - 20, GROUND_TOP - 5, 3, 20);
        ctx.fillRect(sx + 17, GROUND_TOP - 5, 3, 20);
        // Wares on table
        ctx.fillStyle = '#aa885566';
        ctx.fillRect(sx - 15, GROUND_TOP + 10, 30, 6);
      }
      break;
    }
    case 'alley': {
      // Heavy fog
      ctx.fillStyle = '#0a0a1a55';
      ctx.fillRect(0, 0, GW, GH);
      // Dripping water
      if (frameCount % 40 < 3) {
        var drx = (frameCount * 7 + seed) % GW;
        ctx.fillStyle = '#4488cc66';
        ctx.fillRect(drx, GROUND_TOP + (frameCount % 40) * 15, 2, 4);
      }
      // Gutter
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, GROUND_BOT + 2, GW, 4);
      // Scattered debris
      for (var ai = 0; ai < 8; ai++) {
        var ax = ((ai * 73 + seed * 3) % GW);
        ctx.fillStyle = '#1a1a1a88';
        ctx.fillRect(ax, GROUND_BOT - 2, 3 + ai % 3, 2);
      }
      // Flickering signs
      if (frameCount % 80 < 60) {
        ctx.fillStyle = '#ff444433';
        ctx.fillRect(GW * 0.3 - camera.x % 80, GROUND_TOP - 15, 20, 8);
      }
      break;
    }
    case 'spore': {
      // Glowing mycelium pipes
      var pulseA = (Math.sin(frameCount * 0.05) > 0 ? '88' : '44');
      ctx.strokeStyle = '#33cc33' + pulseA;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_TOP + 5);
      ctx.lineTo(GW, GROUND_TOP + 5);
      ctx.stroke();
      // Branching pipes
      ctx.beginPath();
      ctx.moveTo(0, GROUND_TOP - 10);
      ctx.lineTo(GW * 0.3, GROUND_TOP - 10);
      ctx.lineTo(GW * 0.3, GROUND_TOP + 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(GW * 0.6, GROUND_TOP + 5);
      ctx.lineTo(GW * 0.6, GROUND_TOP - 8);
      ctx.lineTo(GW, GROUND_TOP - 8);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Reactor tanks in background
      for (var ri = 0; ri < 3; ri++) {
        var rtx = ((ri * 200 + 100 + seed) % stageWidth) - camera.x;
        if (rtx < -30 || rtx > GW + 30) continue;
        ctx.fillStyle = '#2a4a2a';
        ctx.fillRect(rtx - 12, GROUND_TOP - 25, 24, 30);
        ctx.fillStyle = '#33cc3344';
        ctx.fillRect(rtx - 8, GROUND_TOP - 20, 16, 15);
        // Bubble animation
        if (frameCount % 20 < 5) {
          ctx.fillStyle = '#33ff3366';
          ctx.beginPath();
          ctx.arc(rtx + Math.random() * 10 - 5, GROUND_TOP - 15 + Math.random() * 10, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Spore particles floating
      if (frameCount % 15 < 2) {
        var spx = Math.random() * GW + camera.x;
        spawnParticles(spx, GROUND_TOP + Math.random() * 20, '#33ff3344', 1, 0.5, 1);
      }
      break;
    }
    case 'cage': {
      // Cage fence
      ctx.strokeStyle = '#66666688';
      ctx.lineWidth = 2;
      for (var gx = 10; gx < GW; gx += 15) {
        ctx.beginPath();
        ctx.moveTo(gx, GROUND_TOP - 20);
        ctx.lineTo(gx, GROUND_TOP + 8);
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.moveTo(0, GROUND_TOP - 20);
      ctx.lineTo(GW, GROUND_TOP - 20);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Blood stains
      for (var bi = 0; bi < 4; bi++) {
        var bsx = ((bi * 120 + seed * 2) % GW);
        ctx.fillStyle = '#44111133';
        ctx.beginPath();
        ctx.ellipse(bsx, GROUND_BOT - 5, 6 + bi * 2, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // Torches
      for (var ti = 0; ti < 2; ti++) {
        var tx = GW * (0.25 + ti * 0.5);
        ctx.fillStyle = '#ff884422';
        ctx.beginPath();
        ctx.arc(tx, GROUND_TOP - 18, 8 + Math.sin(frameCount * 0.1) * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.fillRect(tx - 1, GROUND_TOP - 22, 2, 4);
      }
      break;
    }
    case 'rooftop': {
      // Stars
      for (var si = 0; si < 40; si++) {
        var ssx = (si * 47 + seed) % GW;
        var ssy = (si * 31 + seed) % (GROUND_TOP - 20);
        var twinkle = ((frameCount + si * 13) % 60 < 30) ? '88' : '44';
        ctx.fillStyle = '#ffffff' + twinkle;
        ctx.fillRect(ssx, ssy, 1, 1);
        // Larger stars
        if (si % 7 === 0) {
          ctx.fillRect(ssx - 1, ssy, 3, 1);
          ctx.fillRect(ssx, ssy - 1, 1, 3);
        }
      }
      // Moon
      ctx.fillStyle = '#ddddaa33';
      ctx.beginPath();
      ctx.arc(GW * 0.8, 25, 15, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ddddaa55';
      ctx.beginPath();
      ctx.arc(GW * 0.8, 25, 10, 0, Math.PI * 2);
      ctx.fill();
      // Edge of building
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(0, GROUND_BOT + 5, GW, GH - GROUND_BOT);
      // Chimney smoke
      if (frameCount % 8 < 2) {
        spawnParticles(GW * 0.4 + camera.x, GROUND_TOP - 15, '#33333344', 1, 0.3, 2);
      }
      break;
    }
    case 'prison': {
      // Cell bars in background
      ctx.strokeStyle = '#55555588';
      ctx.lineWidth = 2;
      for (var pi = 0; pi < 4; pi++) {
        var pcx = ((pi * 150 + 80 + seed) % stageWidth) - camera.x;
        if (pcx < -50 || pcx > GW + 50) continue;
        for (var pb = 0; pb < 5; pb++) {
          ctx.beginPath();
          ctx.moveTo(pcx + pb * 8, GROUND_TOP - 15);
          ctx.lineTo(pcx + pb * 8, GROUND_TOP + 8);
          ctx.stroke();
        }
        // Horizontal bar
        ctx.beginPath();
        ctx.moveTo(pcx, GROUND_TOP - 5);
        ctx.lineTo(pcx + 32, GROUND_TOP - 5);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      // Chains hanging
      for (var chi = 0; chi < 3; chi++) {
        var chx = ((chi * 200 + seed + 50) % stageWidth) - camera.x;
        if (chx < -10 || chx > GW + 10) continue;
        ctx.strokeStyle = '#55555566';
        ctx.lineWidth = 1;
        var swing = Math.sin(frameCount * 0.02 + chi) * 3;
        ctx.beginPath();
        ctx.moveTo(chx, GROUND_TOP - 20);
        ctx.lineTo(chx + swing, GROUND_TOP);
        ctx.stroke();
      }
      break;
    }
    case 'tower': {
      // Red glow
      var glowAlpha = (Math.sin(frameCount * 0.03) * 0.15 + 0.15).toFixed(2);
      ctx.fillStyle = 'rgba(200,0,50,' + glowAlpha + ')';
      ctx.fillRect(0, 0, GW, GH);
      // Ornate pillars
      for (var oi = 0; oi < 4; oi++) {
        var opx = ((oi * 160 + 80 + seed) % stageWidth) - camera.x;
        if (opx < -15 || opx > GW + 15) continue;
        ctx.fillStyle = '#3a1520';
        ctx.fillRect(opx - 5, GROUND_TOP - 30, 10, 50);
        ctx.fillStyle = '#4a2030';
        ctx.fillRect(opx - 7, GROUND_TOP - 32, 14, 5);
        ctx.fillRect(opx - 7, GROUND_TOP + 17, 14, 5);
        // Skull ornament
        ctx.fillStyle = '#aaaaaa44';
        ctx.beginPath();
        ctx.arc(opx, GROUND_TOP - 25, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Floating embers
      if (frameCount % 6 < 2) {
        spawnParticles(Math.random() * GW + camera.x, GROUND_BOT, '#ff4422', 1, 1, 1);
      }
      break;
    }
  }
}

// ============================================================
// DRAW PLAYER (Player IS the baseling)
// ============================================================
function drawPlayer_() {
  if (!player) return;
  if (player.state === 'dead' && deathTimer < 30) return;

  var px = player.x - camera.x;
  var py = player.y + (player.z || 0);

  // Blink when invincible
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2) return;

  ctx.save();
  ctx.translate(Math.round(px), Math.round(py));
  if (player.facing < 0) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = '#00000055';
  ctx.beginPath();
  ctx.ellipse(0, -player.z * 0.1, 9, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  var bobY = player.state === 'walk' ? Math.sin(player.walkFrame) * 1.5 : 0;
  var atkReach = player.state === 'attack' ? 4 : 0;

  // === BASELING SPRITE === (facing already applied via ctx.scale above -> flipX:false)
  var _pAnim = 'idle';
  if (player.state === 'attack' || player.state === 'special') _pAnim = 'attack';
  else if (player.state === 'hurt' || player.invincible > 0) _pAnim = 'hurt';
  else if (player.state === 'dead') _pAnim = 'ko';
  else if ((player.z || 0) > 0) _pAnim = 'jump';
  else if (player.state === 'walk') _pAnim = 'walk';
  if (!drawSelectedBaseling(ctx, 0, -18, 40, { flipX: false, frame: frame, anim: _pAnim })) {
  // NES pixel-art baseling body
  var bcolor = statB.color || '#44dd88';
  var bcolor2 = shadeColor(bcolor, -30);

  // Legs
  var legSpread = player.state === 'walk' ? Math.sin(player.walkFrame * 1.5) * 3 : 0;
  ctx.fillStyle = bcolor2;
  ctx.fillRect(-5, -10 - legSpread * 0.3, 4, 10 + legSpread * 0.3);
  ctx.fillRect(1, -10 + legSpread * 0.3, 4, 10 - legSpread * 0.3);

  // Shoes
  ctx.fillStyle = '#333';
  ctx.fillRect(-6, -1, 5, 2);
  ctx.fillRect(1, -1 + (player.state === 'walk' ? legSpread * 0.2 : 0), 5, 2);

  // Body/Torso (baseling colored)
  ctx.fillStyle = bcolor;
  ctx.fillRect(-7, -28 + bobY, 14, 18);

  // Belt
  ctx.fillStyle = '#333';
  ctx.fillRect(-7, -11 + bobY, 14, 2);

  // Baseling icon on chest
  ctx.fillStyle = '#ffffff44';
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon || 'B', 0, -18 + bobY);
  ctx.textAlign = 'left';

  // Arms (skin tone or baseling tint)
  var skinColor = '#dda877';
  ctx.fillStyle = skinColor;
  if (player.state === 'attack') {
    ctx.fillRect(7 + atkReach, -24 + bobY, 12, 4);
    ctx.fillRect(17 + atkReach, -25 + bobY, 5, 5);
    ctx.fillStyle = skinColor;
    ctx.fillRect(-11, -24 + bobY, 4, 8);
  } else if (player.state === 'special') {
    ctx.fillRect(7, -26 + bobY, 10, 4);
    ctx.fillRect(-17, -26 + bobY, 10, 4);
  } else {
    ctx.fillRect(7, -24 + bobY, 4, 9);
    ctx.fillRect(-11, -24 + bobY, 4, 9);
  }

  // Head
  ctx.fillStyle = skinColor;
  ctx.fillRect(-5, -36 + bobY, 10, 9);
  // Hair (baseling colored)
  ctx.fillStyle = bcolor;
  ctx.fillRect(-5, -38 + bobY, 10, 4);
  // Eye
  ctx.fillStyle = '#222';
  ctx.fillRect(2, -33 + bobY, 2, 2);
  }

  // Weapon
  if (player.weapon) {
    ctx.fillStyle = player.weapon.color;
    if (player.state === 'attack') {
      ctx.fillRect(15 + atkReach, -26 + bobY, player.weapon.len, player.weapon.thick);
    } else {
      ctx.save();
      ctx.translate(8, -28 + bobY);
      ctx.rotate(0.3);
      ctx.fillRect(0, 0, player.weapon.thick, player.weapon.len);
      ctx.restore();
    }
  }

  // Special glow (baseling colored)
  if (player.state === 'special') {
    ctx.strokeStyle = bcolor;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 + Math.sin(player.animFrame * 3) * 0.3;
    ctx.beginPath();
    ctx.arc(0, -18, 22 + Math.sin(player.animFrame * 4) * 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  // Crit flash
  if (critFlash > 0) {
    ctx.fillStyle = '#ff000044';
    ctx.fillRect(-12, -40, 24, 42);
    critFlash--;
  }

  ctx.restore();
}

// Helper: darken/lighten color
function shadeColor(color, percent) {
  var num = parseInt(color.replace('#', ''), 16);
  var r = Math.min(255, Math.max(0, (num >> 16) + percent));
  var g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + percent));
  var b = Math.min(255, Math.max(0, (num & 0xff) + percent));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

// ============================================================
// DRAW ENEMY
// ============================================================
function drawEnemy_(e) {
  var ex = e.x - camera.x;
  var ey = e.y + (e.z || 0);
  var t = ENEMY_TYPES[e.type];

  if (e.state === 'dead') {
    ctx.globalAlpha = Math.max(0, e.deathTimer / 50);
    ctx.fillStyle = t.color2;
    ctx.fillRect(Math.round(ex) - 12, e.y - 4, 24, 5);
    ctx.globalAlpha = 1;
    return;
  }

  ctx.save();
  ctx.translate(Math.round(ex), Math.round(ey));
  if (e.facing < 0) ctx.scale(-1, 1);

  var isFlashing = e.flashTimer > 0;
  var bobY = e.state === 'walk' ? Math.sin(e.animFrame * 1.5) * 1 : 0;

  // Shadow
  ctx.fillStyle = '#00000044';
  ctx.beginPath();
  ctx.ellipse(0, -(e.z || 0) * 0.1, t.w * 0.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // === OUR SPRITE (fungal-folklore art) — geometric body kept below as fallback ===
  // The context is already mirrored when the enemy faces left, so a plain draw
  // faces the sprite the right way (art faces right natively).
  var _sprName = e.isBoss ? (e.bossSpr || 'wyrm') : (ENEMY_SPR[e.type] || 'goblin');
  var _im = (window.TasernArt && TasernArt.getImg) ? TasernArt.getImg('art/enemies/enemy-' + _sprName + '.jpg') : null;
  var _sprDrawn = false;
  if (_im && _im.complete && _im.naturalWidth) {
    var _ew = e.isBoss ? e.w : t.w;
    var _eh = e.isBoss ? e.h : t.h;
    var _pad = e.isBoss ? 7 : 4;
    ctx.drawImage(_im, -_ew / 2 - _pad, -_eh - _pad + bobY, _ew + _pad * 2, _eh + _pad * 2);
    if (isFlashing) { // hit flash overlay on top of the sprite
      ctx.save(); ctx.globalAlpha = 0.6; ctx.fillStyle = '#fff';
      ctx.fillRect(-_ew / 2, -_eh + bobY, _ew, _eh); ctx.restore();
    }
    _sprDrawn = true;
  }

  if (!_sprDrawn) {
  // Legs
  ctx.fillStyle = isFlashing ? '#fff' : t.color2;
  ctx.fillRect(-4, -8, 3, 8);
  ctx.fillRect(1, -8, 3, 8);

  // Body
  ctx.fillStyle = isFlashing ? '#fff' : (e.isBoss ? e.bossColor : t.color);
  ctx.fillRect(-t.w / 2, -t.h + 4 + bobY, t.w, t.h * 0.6);

  // Head
  ctx.fillStyle = isFlashing ? '#fff' : '#cc9977';
  var headSize = e.isBoss ? 6 : 5;
  ctx.fillRect(-headSize, -t.h - 2 + bobY, headSize * 2, 8);

  // Type-specific details
  if (!isFlashing) {
    switch (e.type) {
      case 1: // Spore Thug (sharpened stem)
        ctx.fillStyle = '#ccc';
        ctx.fillRect(t.w / 2, -t.h * 0.5 + bobY, 8, 2);
        ctx.fillStyle = '#885533';
        ctx.fillRect(t.w / 2 - 2, -t.h * 0.5 - 1 + bobY, 3, 4);
        break;
      case 2: // Toxic Biker (belly)
        ctx.fillStyle = t.color;
        ctx.beginPath();
        ctx.ellipse(0, -t.h * 0.4 + bobY, t.w * 0.45, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 3: // Shade Mycelium (mask)
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(-4, -t.h + 1 + bobY, 8, 3);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-2, -t.h + 1 + bobY, 2, 1);
        ctx.fillRect(1, -t.h + 1 + bobY, 2, 1);
        break;
      case 4: // Rot Lobber (glowing hands)
        ctx.fillStyle = '#44dd88';
        ctx.fillRect(t.w / 2, -t.h * 0.5 + bobY, 4, 4);
        ctx.fillStyle = '#33bb6644';
        ctx.beginPath();
        ctx.arc(t.w / 2 + 2, -t.h * 0.5 + 2 + bobY, 5 + Math.sin(e.animFrame) * 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 5: // Garden Sentinel (armored, visor)
        ctx.fillStyle = '#556655';
        ctx.fillRect(-t.w / 2 - 1, -t.h + 4 + bobY, t.w + 2, 4);
        ctx.fillStyle = '#44ffaa88';
        ctx.fillRect(-3, -t.h + 1 + bobY, 6, 2);
        break;
    }
  }
  } // end geometric fallback

  // Boss crown/details
  if (e.isBoss) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-5, -t.h - 6 + bobY, 10, 4);
    ctx.fillRect(-3, -t.h - 9 + bobY, 2, 3);
    ctx.fillRect(1, -t.h - 9 + bobY, 2, 3);
    ctx.fillRect(-1, -t.h - 10 + bobY, 2, 4);
    // Boss aura
    ctx.strokeStyle = e.bossColor + '44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -t.h * 0.5, t.w + 5 + Math.sin(e.animFrame * 0.5) * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Attack indicator
  if (e.state === 'attack') {
    ctx.fillStyle = '#ff444488';
    ctx.fillRect(t.w / 2, -t.h * 0.5 + bobY, 12, 4);
  }

  ctx.restore();

  // Boss HP bar
  if (e.isBoss) {
    var barW = 50;
    ctx.fillStyle = '#222';
    ctx.fillRect(Math.round(ex) - barW / 2, Math.round(ey) - t.h - 18, barW, 5);
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(Math.round(ex) - barW / 2, Math.round(ey) - t.h - 18, barW * (e.hp / e.maxHp), 5);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(Math.round(ex) - barW / 2, Math.round(ey) - t.h - 18, barW, 5);
    ctx.fillStyle = '#ff8888';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(e.bossName, Math.round(ex), Math.round(ey) - t.h - 22);
    ctx.textAlign = 'left';
  }
}

// ============================================================
// DRAW BREAKABLES
// ============================================================
function drawBreakable_(b) {
  var bx = b.x - camera.x;
  if (bx < -25 || bx > GW + 25) return;
  ctx.save();
  ctx.translate(Math.round(bx), Math.round(b.y));
  switch (b.type) {
    case 'crate':
      ctx.fillStyle = '#7a5522';
      ctx.fillRect(-9, -16, 18, 16);
      ctx.strokeStyle = '#4a3311';
      ctx.lineWidth = 1;
      ctx.strokeRect(-9, -16, 18, 16);
      ctx.beginPath();
      ctx.moveTo(-9, -8); ctx.lineTo(9, -8);
      ctx.moveTo(0, -16); ctx.lineTo(0, 0);
      ctx.stroke();
      break;
    case 'barrel':
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-7, -18, 14, 18);
      ctx.fillStyle = '#777';
      ctx.fillRect(-8, -16, 16, 2);
      ctx.fillRect(-8, -5, 16, 2);
      ctx.fillStyle = '#4a2a0a';
      ctx.beginPath();
      ctx.ellipse(0, -18, 7, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'trashcan':
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(-7, -15, 14, 15);
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(-8, -16, 16, 3);
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(-9, -18, 18, 3);
      break;
  }
  if (b.hp < 3) {
    ctx.strokeStyle = '#00000066';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-3, -12); ctx.lineTo(2, -5);
    if (b.hp < 2) { ctx.moveTo(3, -14); ctx.lineTo(-1, -4); }
    ctx.stroke();
  }
  // Shimmer if item inside
  if (b.contains && frameCount % 30 < 5) {
    ctx.fillStyle = '#ffffff44';
    ctx.fillRect(4, -14, 2, 2);
  }
  ctx.restore();
}

// ============================================================
// DRAW PICKUPS
// ============================================================
function drawPickup_(p) {
  var px = p.x - camera.x;
  if (px < -15 || px > GW + 15) return;
  var bob = Math.sin(frameCount * 0.06 + p.x * 0.1) * 2;
  if (p.timer < 120 && Math.floor(p.timer / 8) % 2) return;

  ctx.save();
  ctx.translate(Math.round(px), Math.round(p.y + bob));
  if (p.type === 'food') {
    var f = p.data;
    ctx.fillStyle = f.color;
    switch (f.shape) {
      case 'oval':
        ctx.beginPath();
        ctx.ellipse(0, -7, 6, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = f.color2;
        ctx.beginPath();
        ctx.ellipse(0, -7, 3, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'rect':
        ctx.fillRect(-6, -10, 12, 7);
        ctx.fillStyle = f.color2;
        ctx.fillRect(-5, -9, 10, 2);
        break;
      case 'bottle':
        ctx.fillRect(-3, -14, 6, 10);
        ctx.fillRect(-2, -16, 4, 3);
        ctx.fillStyle = f.color2;
        ctx.fillRect(-2, -12, 4, 6);
        break;
      case 'round':
        ctx.beginPath();
        ctx.arc(0, -7, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#44220033';
        ctx.beginPath();
        ctx.arc(1, -6, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  } else if (p.type === 'weapon') {
    ctx.fillStyle = p.data.color;
    ctx.fillRect(-p.data.thick / 2, -14, p.data.thick, p.data.len);
    ctx.fillStyle = p.data.color2;
    ctx.fillRect(-p.data.thick / 2 - 1, -14, p.data.thick + 2, 3);
  }
  if (frameCount % 20 < 5) {
    ctx.fillStyle = '#ffffff88';
    ctx.fillRect(3, -11, 2, 2);
  }
  ctx.restore();
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // Player HP bar
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(8, 8, 84, 12);
  var hpRatio = player.hp / player.maxHp;
  var hpColor = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#ccaa22' : '#cc3333';
  ctx.fillStyle = hpColor;
  ctx.fillRect(10, 10, 80 * hpRatio, 8);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(8, 8, 84, 12);

  // Baseling name + lives
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = 'bold 7px monospace';
  ctx.fillText(statB.name || 'Baseling', 10, 30);
  ctx.fillStyle = '#ff6666';
  for (var i = 0; i < lives; i++) {
    ctx.fillText('\u2665', 60 + i * 9, 30);
  }

  // Level indicator
  if (statB.level > 0) {
    ctx.fillStyle = '#aaa';
    ctx.font = '6px monospace';
    ctx.fillText('LV' + statB.level, 10, 38);
  }

  // Weapon
  if (player.weapon) {
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText(player.weapon.name + ' [' + player.weapon.durability + ']', 10, 46);
  }

  // Score (right side)
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE ' + score.toString().padStart(7, '0'), GW - 10, 16);
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.fillText('HI ' + highScore.toString().padStart(7, '0'), GW - 10, 26);
  // Kill count
  ctx.fillStyle = '#666';
  ctx.fillText('COMPOSTED: ' + totalKills, GW - 10, 36);
  ctx.textAlign = 'left';

  // Combo indicator
  if (comboCount > 2) {
    var comboAlpha = Math.min(1, comboTimer / 500);
    ctx.globalAlpha = comboAlpha;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(comboCount + ' HIT' + (comboCount > 1 ? 'S' : '') + '!', GW / 2, 45);
    ctx.fillStyle = '#e6482e';
    ctx.font = '8px monospace';
    ctx.fillText('x' + comboMultiplier.toFixed(1), GW / 2, 55);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // Stage name (bottom)
  ctx.fillStyle = '#777';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (currentStage + 1) + ' - ' + STAGES[currentStage].name, GW / 2, GH - 6);
  ctx.textAlign = 'left';

  // Boss intro splash
  if (bossIntroTimer > 0) {
    bossIntroTimer--;
    ctx.fillStyle = '#000000bb';
    ctx.fillRect(0, GH * 0.3, GW, GH * 0.3);
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FUNGI BOSS!', GW / 2, GH * 0.4);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(bossIntroName, GW / 2, GH * 0.48);
    ctx.fillStyle = '#888';
    ctx.font = '7px monospace';
    ctx.fillText(bossIntroTitle, GW / 2, GH * 0.55);
    ctx.textAlign = 'left';
  }

  // GO arrow
  if (goTimer > 0) {
    goTimer -= 1;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    var arrowX = GW - 40 + Math.sin(frameCount * 0.2) * 5;
    ctx.fillText('GO >>', arrowX, GH / 2);
    ctx.textAlign = 'left';
  }

// ============================================================
// SCREEN SHAKE
// ============================================================
function applyShake() {
  if (screenShake > 0) {
    var sx = (Math.random() - 0.5) * screenShake;
    var sy = (Math.random() - 0.5) * screenShake;
    ctx.translate(Math.round(sx), Math.round(sy));
    screenShake *= 0.88;
    if (screenShake < 0.3) screenShake = 0;
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frameCount++;
  frame++;

  if (state === 'playing') {
    stageTimer += dt;
    updatePlayer(dt);
    updateEnemies(dt);
    updatePickups(dt);
    updateHazards(dt);
    updateWeather(dt);
    updateCamera(dt);
    updateParticles(dt);
    updateFloatingTexts(dt);
    checkWaveSpawn();

    // Flash decay
    if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 5);

    // Player death
    if (player.state === 'dead') {
      deathTimer -= dt * 60;
      if (deathTimer <= 0) {
        lives--;
        if (lives <= 0) {
          state = 'gameOver';
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('sot_highscore', highScore.toString());
          }
          SFX.gameOver();
        } else {
          player.hp = player.maxHp;
          player.state = 'idle';
          player.invincible = 120;
          player.weapon = null;
        }
      }
    }

    // Stage complete transition
    if (allWavesCleared) {
      stageTransition += dt * 60;
      if (stageTransition > 80) {
        state = 'stageClear';
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('sot_highscore', highScore.toString());
        }
        SFX.stageComplete();
      }
    }
  }
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw() {
  ctx.clearRect(0, 0, GW, GH);

  switch (state) {
    case 'title':
      drawTitle();
      break;
    case 'playing': {
      ctx.save();
      applyShake();
      drawBackground();

      // Collect all Y-sortable entities
      var entities = [];
      for (var bi = 0; bi < breakables.length; bi++) entities.push({ y: breakables[bi].y, type: 'breakable', ref: breakables[bi] });
      for (var pi = 0; pi < pickups.length; pi++) entities.push({ y: pickups[pi].y, type: 'pickup', ref: pickups[pi] });
      for (var ei = 0; ei < enemies.length; ei++) entities.push({ y: enemies[ei].y, type: 'enemy', ref: enemies[ei] });
      if (player) entities.push({ y: player.y, type: 'player' });

      entities.sort(function(a, b) { return a.y - b.y; });

      for (var di = 0; di < entities.length; di++) {
        var ent = entities[di];
        switch (ent.type) {
          case 'breakable': drawBreakable_(ent.ref); break;
          case 'pickup': drawPickup_(ent.ref); break;
          case 'enemy': drawEnemy_(ent.ref); break;
          case 'player': drawPlayer_(); break;
        }
      }

      drawHazards(camera.x);
      drawParticles(camera.x);
      drawFloatingTexts(camera.x);

      // Flash overlay
      if (flashAlpha > 0) {
        ctx.fillStyle = flashColor;
        ctx.globalAlpha = flashAlpha;
        ctx.fillRect(0, 0, GW, GH);
        ctx.globalAlpha = 1;
      }

      drawWeather();
      ctx.restore();
      drawHUD();
      drawStatBars();
      drawTutorial();
      drawStageIntro();
      drawScanlines();
      drawVignette();
      break;
    }
    case 'stageClear':
      drawStageClear();
      break;
    case 'gameOver':
      drawGameOver();
      break;
  }
}

// ============================================================
// MENU INPUT HANDLING (No character select - player IS baseling)
// ============================================================
function handleInput() {
  var input = getInput();

  if (picking) { clearJustPressed(); return; } // picker overlay open — swallow game input

  switch (state) {
    case 'title': {
      // Open the baseling picker with C (consume it so it doesn't also start the game).
      if (justPressed['KeyC'] && window.BaselingPlayer) {
        justPressed['KeyC'] = false;
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
        break;
      }
      if (anyKey()) {
        state = 'playing';
        player = createPlayer();
        score = 0;
        lives = 3 + bonusLives;
        comboCount = 0;
        comboMultiplier = 1;
        bestCombo = 0;
        totalKills = 0;
        showTutorial = true;
        tutorialTimer = 0;
        initStage(0);
        SFX.go();
        touchBtns.attack = false;
      }
      break;
    }
    case 'stageClear': {
      if (anyKey()) {
        if (currentStage < 7) {
          initStage(currentStage + 1);
          state = 'playing';
          SFX.go();
        } else {
          state = 'title';
        }
      }
      break;
    }
    case 'gameOver': {
      if (anyKey()) {
        state = 'title';
      }
      break;
    }
  }
}

// ============================================================

  var bx = 8;

  ctx.fillStyle = '#111';
  ctx.fillRect(bx, by, 55, 24);
  ctx.globalAlpha = 1;

  ctx.font = '5px monospace';
  var stats = [
    { label: 'STR', val: statB.str, max: 20, color: '#ff6644' },
    { label: 'DEX', val: statB.dex, max: 20, color: '#44aaff' },
    { label: 'CON', val: statB.con, max: 20, color: '#44cc44' }
  ];
  for (var i = 0; i < stats.length; i++) {
    var s = stats[i];
    ctx.fillStyle = '#666';
    ctx.fillText(s.label, bx + 2, by + 6 + i * 7);
    ctx.fillStyle = '#222';
    ctx.fillRect(bx + 18, by + 1 + i * 7, 34, 5);
    ctx.fillStyle = s.color + '88';
    ctx.fillRect(bx + 18, by + 1 + i * 7, 34 * Math.min(1, s.val / s.max), 5);
  }
}

// ============================================================
// ENVIRONMENT WEATHER EFFECTS
// ============================================================
var raindrops = [];
function updateWeather(dt) {
  // Rain in alley and docks
  if (STAGES[currentStage].detail === 'alley' || STAGES[currentStage].detail === 'docks') {
    if (frameCount % 2 === 0 && raindrops.length < 40) {
      raindrops.push({
        x: Math.random() * GW + camera.x,
        y: -5,
        speed: 200 + Math.random() * 100,
        len: 3 + Math.random() * 4
      });
    }
    for (var i = raindrops.length - 1; i >= 0; i--) {
      raindrops[i].y += raindrops[i].speed * dt;
      if (raindrops[i].y > GROUND_BOT + 10) {
        raindrops.splice(i, 1);
      }
    }
  } else {
    raindrops = [];
  }
}

function drawWeather() {
  if (raindrops.length === 0) return;
  ctx.strokeStyle = '#4488cc22';
  ctx.lineWidth = 1;
  for (var i = 0; i < raindrops.length; i++) {
    var r = raindrops[i];
    var rx = r.x - camera.x;
    if (rx < -5 || rx > GW + 5) continue;
    ctx.beginPath();
    ctx.moveTo(rx, r.y);
    ctx.lineTo(rx - 1, r.y + r.len);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
}

// ============================================================
// GAME LOOP
// ============================================================
var lastTime = 0;

function gameLoop(timestamp) {
  var dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  handleInput();
  update(dt);
  draw();
  clearJustPressed();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
