<script>
(function() {
"use strict";

// === BASELING STATS (BaselingPlayer.getMults — the single clamped source) ===
// The mod vars below are synthesized from the five bounded multipliers so every effect
// traces back to a clamped getMults() value. str<-damage, dex<-moveSpeed, con<-health,
// cha(piece luck)<-luck. Score (intMod) and build timer (wisMod) are NOT stats here —
// fixed at neutral so feeding your pet never buys score or extra build time.
// dnd(mult)=round(10+(mult-1)*20). Single-player siege builder -> default band.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#0052FF', name: 'Baseling', icon: 'B' };
var picking = false;   // character-select overlay open
var selName = 'WIMMPLE';
function dnd(x) { return Math.round(10 + (x - 1) * 20); }
var strMod = 1, dexMod = 1, conMod = 1, intMod = 1, wisMod = 1, chaMod = 0;
function recomputeStats() {
  var m = TAS.player.mults();
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  strMod = Math.max(1, Math.floor(statB.str / 5));            // [1] PWR: cannon dmg 1-4
  dexMod = Math.max(0.6, 1 + (statB.dex - 10) * 0.04);        // [2] SPD: placement/cannon speed
  conMod = Math.max(1, Math.floor(statB.con / 6));            // [3] STA: wall HP + bonus lives
  intMod = 1;                                                 // score is not a stat
  wisMod = 1;                                                 // build timer fixed/fair for all
  chaMod = Math.min(3, Math.max(0, Math.floor((statB.cha - 8) / 4))); // [4] LCK: extra good pieces 0-3
  // timers depend on wisMod (now 1.0) — refresh in case a pick changed it
  BUILD_TIME = Math.floor(20 * wisMod);
  PLACE_TIME = Math.floor(10 * wisMod);
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  selName = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  if (sel) statB.name = sel.charName;
}
// 5 canonical arcade stat bars centered at cx (display only).
function drawTitleStatBars(cx, topY, totalW) {
  if (!window.BaselingPlayer || !BaselingPlayer.getStats) return;
  var stats = BaselingPlayer.getStats();
  var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
  var bw = totalW / keys.length, x0 = cx - totalW / 2;
  ctx.font = '8px monospace';
  for (var i = 0; i < keys.length; i++) {
    var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
    ctx.fillStyle = mm.color; ctx.textAlign = 'center';
    ctx.fillText(mm.label, bx + bw / 2, topY);
    ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, topY + 3, bw - 6, 5);
    ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, topY + 3, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
  }
  ctx.textAlign = 'center';
}

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;

// Grid settings
var GRID_SIZE = 8;
var GRID_COLS = Math.floor(GW / GRID_SIZE);
var GRID_ROWS = Math.floor(GH / GRID_SIZE);

// Map zones (in grid coords)
var WATER_END = 15;
var LAND_START = 15;
var CASTLE_LEFT = 22;
var CASTLE_RIGHT = 42;
var CASTLE_TOP = 8;
var CASTLE_BOTTOM = 35;

// Phase timings (in seconds) — [5] WIS extends build/place timers
var CANNON_TIME = 15;
var BUILD_TIME = Math.floor(20 * wisMod);
var PLACE_TIME = Math.floor(10 * wisMod);

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'ROTATE', c: 'PICK' } });

// Boot the player module (silent) + recompute stats once it resolves.
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[garden-siege] player init failed:', e && e.message); });
}

// === MOUSE/TOUCH TRACKING ===
var mouseX = GW / 2, mouseY = GH / 2;
var mouseDown = false;
var mouseClicked = false;

function getCanvasPos(clientX, clientY) {
  var rect = TAS.canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  var scaleX = (TAS.canvas.width / dpr) / rect.width;
  var scaleY = (TAS.canvas.height / dpr) / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

TAS.canvas.addEventListener('mousemove', function(e) {
  var p = getCanvasPos(e.clientX, e.clientY);
  mouseX = p.x; mouseY = p.y;
});
TAS.canvas.addEventListener('mousedown', function(e) {
  TAS.audio.ensureAudio();
  var p = getCanvasPos(e.clientX, e.clientY);
  mouseX = p.x; mouseY = p.y;
  mouseDown = true;
  mouseClicked = true;
});
TAS.canvas.addEventListener('mouseup', function() { mouseDown = false; });

TAS.canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length > 0) {
    var p = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
    mouseX = p.x; mouseY = p.y;
    mouseDown = true;
    mouseClicked = true;
  }
}, { passive: true });
TAS.canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length > 0) {
    var p = getCanvasPos(e.touches[0].clientX, e.touches[0].clientY);
    mouseX = p.x; mouseY = p.y;
  }
}, { passive: true });
TAS.canvas.addEventListener('touchend', function() { mouseDown = false; }, { passive: true });

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('garden_rampart_hi');
var round = 1;
var frame = 0;
var phase = 'cannon';
var phaseTimer = 0;
var phaseTransition = 0;
var lives = 3 + conMod;          // [3] CON: bonus starting lives
var showTutorial = true;
var tutorialTimer = 0;
var comboCount = 0;
var comboTimer = 0;
var bossWarning = 0;

// Score popups
var scorePopups = [];

// Grid layers
var wallGrid = [];
var wallHpGrid = [];             // [3] CON: walls have HP
var terrainGrid = [];

// Game objects
var cannons = [];
var cannonballs = [];
var enemies = [];
var explosions = [];
var keeps = [];

// Environmental particles
var envParticles = [];
var sporeClouds = [];
var lightningTimer = 0;

// Build phase
var currentPiece = null;
var nextPiece = null;            // [6] CHA: preview next piece
var pieceRotation = 0;
var cannonsToPlace = 0;
var enclosedCells = [];

// Polyomino wall pieces (relative coordinates) — spore wall segments
var PIECE_SHAPES = [
  [[0,0],[1,0],[2,0],[3,0]],     // Mycelial strand
  [[0,0],[1,0],[2,0],[2,1]],     // Spore L
  [[0,0],[1,0],[2,0],[0,1]],     // Spore J
  [[0,0],[1,0],[2,0],[1,1]],     // Fruiting body T
  [[1,0],[2,0],[0,1],[1,1]],     // Hyphae S
  [[0,0],[1,0],[1,1],[2,1]],     // Hyphae Z
  [[0,0],[1,0],[0,1],[1,1]],     // Spore cluster O
  [[1,0],[0,1],[1,1],[2,1],[1,2]], // Mycelial bloom +
  [[0,0],[1,0],[0,1]],           // Small spore L
  [[0,0],[1,0],[1,1]],           // Corner growth
  [[0,0],[1,0]],                 // Spore pair
  [[0,0],[1,0],[2,0]],           // Short strand
];

// [6] CHA: bonus favorable pieces (straight lines, easy shapes)
var LUCKY_PIECES = [
  [[0,0],[1,0],[2,0],[3,0]],     // Long strand
  [[0,0],[1,0],[0,1],[1,1]],     // Cluster
  [[0,0],[1,0],[2,0]],           // Short strand
  [[0,0],[1,0]],                 // Pair
];

// Wave animation
var waterOffset = 0;

// Zone background colors
var ZONE_COLORS = {
  mycelium: { r: 15, g: 35, b: 20 },
  deepWater: { r: 8, g: 18, b: 45 },
  shore: { r: 60, g: 45, b: 25 },
  castle: { r: 25, g: 40, b: 30 }
};

// === SCORE POPUP SYSTEM ===
function addScorePopup(x, y, text, color) {
  scorePopups.push({
    x: x, y: y, text: text, color: color || '#f4b41b',
    timer: 60, vy: -1.2, alpha: 1
  });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy;
    p.vy *= 0.98;
    p.timer--;
    p.alpha = Math.max(0, p.timer / 60);
    if (p.timer <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#000';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === ENVIRONMENTAL PARTICLES ===
function spawnEnvParticle() {
  var type = Math.random() < 0.6 ? 'spore' : 'firefly';
  envParticles.push({
    x: TAS.math.randRange(0, GW),
    y: TAS.math.randRange(0, GH),
    vx: (Math.random() - 0.5) * 0.3,
    vy: type === 'spore' ? -0.2 - Math.random() * 0.3 : (Math.random() - 0.5) * 0.2,
    size: type === 'spore' ? 1 + Math.random() : 1.5 + Math.random(),
    type: type,
    life: 200 + Math.floor(Math.random() * 200),
    phase: Math.random() * Math.PI * 2
  });
}

function updateEnvParticles(dt) {
  for (var i = envParticles.length - 1; i >= 0; i--) {
    var p = envParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.phase += 0.03;
    if (p.type === 'firefly') {
      p.vx += (Math.random() - 0.5) * 0.05;
      p.vy += (Math.random() - 0.5) * 0.05;
    }
    if (p.life <= 0 || p.x < -10 || p.x > GW + 10 || p.y < -10 || p.y > GH + 10) {
      envParticles.splice(i, 1);
    }
  }
  // Keep population steady
  while (envParticles.length < 25) spawnEnvParticle();
}

function drawEnvParticles() {
  for (var i = 0; i < envParticles.length; i++) {
    var p = envParticles[i];
    var a = Math.min(1, p.life / 50) * (0.3 + Math.sin(p.phase) * 0.2);
    ctx.globalAlpha = a;
    if (p.type === 'spore') {
      ctx.fillStyle = '#88cc66';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      var bright = 0.5 + Math.sin(p.phase * 2) * 0.5;
      ctx.fillStyle = 'rgb(' + Math.floor(200 * bright) + ',' + Math.floor(255 * bright) + ',' + Math.floor(100 * bright) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * bright, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// === SPORE CLOUD EFFECTS ===
function spawnSporeCloud(x, y, color, count) {
  for (var i = 0; i < (count || 5); i++) {
    sporeClouds.push({
      x: x + (Math.random() - 0.5) * 12,
      y: y + (Math.random() - 0.5) * 12,
      size: 3 + Math.random() * 6,
      alpha: 0.4 + Math.random() * 0.3,
      color: color || '#44aa44',
      life: 40 + Math.floor(Math.random() * 30),
      vx: (Math.random() - 0.5) * 0.5,
      vy: -0.3 - Math.random() * 0.4
    });
  }
}

function updateSporeClouds(dt) {
  for (var i = sporeClouds.length - 1; i >= 0; i--) {
    var c = sporeClouds[i];
    c.x += c.vx;
    c.y += c.vy;
    c.size += 0.1;
    c.life--;
    c.alpha = Math.max(0, c.alpha - 0.008);
    if (c.life <= 0 || c.alpha <= 0) sporeClouds.splice(i, 1);
  }
}

function drawSporeClouds() {
  for (var i = 0; i < sporeClouds.length; i++) {
    var c = sporeClouds[i];
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = c.color;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === TERRAIN INITIALIZATION ===
function initTerrain() {
  terrainGrid = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    terrainGrid[r] = [];
    for (var c = 0; c < GRID_COLS; c++) {
      terrainGrid[r][c] = (c < WATER_END) ? 0 : 1;
    }
  }
}

// === WALL GRID ===
function initWalls() {
  wallGrid = [];
  wallHpGrid = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    wallGrid[r] = [];
    wallHpGrid[r] = [];
    for (var c = 0; c < GRID_COLS; c++) {
      wallGrid[r][c] = 0;
      wallHpGrid[r][c] = 0;
    }
  }
}

function setWall(r, c, type) {
  wallGrid[r][c] = type;
  wallHpGrid[r][c] = (type === 1) ? conMod : 0;  // [3] CON: wall HP
}

function placeInitialCastle() {
  var cx = 32, cy = 20;

  keeps = [{gx: cx, gy: cy}];
  wallGrid[cy][cx] = 2;
  wallGrid[cy][cx+1] = 2;
  wallGrid[cy+1][cx] = 2;
  wallGrid[cy+1][cx+1] = 2;

  // Surrounding spore walls
  for (var c = cx - 3; c <= cx + 4; c++) {
    setWall(cy - 3, c, 1);
    setWall(cy + 4, c, 1);
  }
  for (var r = cy - 3; r <= cy + 4; r++) {
    setWall(r, cx - 3, 1);
    setWall(r, cx + 4, 1);
  }

  // Spore cannons — [2] DEX reduces initial cooldown
  var baseCooldown = Math.max(0, 20 - Math.floor(statB.dex / 3));
  cannons = [
    {gx: cx - 1, gy: cy - 1, cooldown: baseCooldown, active: true},
    {gx: cx + 2, gy: cy - 1, cooldown: baseCooldown, active: true},
    {gx: cx, gy: cy + 3, cooldown: baseCooldown, active: true},
  ];
}

// === FLOOD FILL TO FIND ENCLOSED AREAS ===
function findEnclosedAreas() {
  enclosedCells = [];
  var visited = [];
  for (var r = 0; r < GRID_ROWS; r++) {
    visited[r] = [];
    for (var c = 0; c < GRID_COLS; c++) {
      visited[r][c] = (wallGrid[r][c] === 1 || wallGrid[r][c] === 2);
    }
  }

  var outside = [];
  for (var r2 = 0; r2 < GRID_ROWS; r2++) {
    outside[r2] = [];
    for (var c2 = 0; c2 < GRID_COLS; c2++) {
      outside[r2][c2] = false;
    }
  }

  var queue = [];
  for (var c3 = 0; c3 < GRID_COLS; c3++) {
    if (!visited[0][c3]) { queue.push([0, c3]); outside[0][c3] = true; visited[0][c3] = true; }
    if (!visited[GRID_ROWS-1][c3]) { queue.push([GRID_ROWS-1, c3]); outside[GRID_ROWS-1][c3] = true; visited[GRID_ROWS-1][c3] = true; }
  }
  for (var r3 = 0; r3 < GRID_ROWS; r3++) {
    if (!visited[r3][0]) { queue.push([r3, 0]); outside[r3][0] = true; visited[r3][0] = true; }
    if (!visited[r3][GRID_COLS-1]) { queue.push([r3, GRID_COLS-1]); outside[r3][GRID_COLS-1] = true; visited[r3][GRID_COLS-1] = true; }
  }

  while (queue.length > 0) {
    var cell = queue.shift();
    var cr = cell[0], cc = cell[1];
    var dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    for (var d = 0; d < dirs.length; d++) {
      var nr = cr + dirs[d][0], nc = cc + dirs[d][1];
      if (nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS && !visited[nr][nc]) {
        visited[nr][nc] = true;
        outside[nr][nc] = true;
        queue.push([nr, nc]);
      }
    }
  }

  for (var r4 = 0; r4 < GRID_ROWS; r4++) {
    for (var c4 = 0; c4 < GRID_COLS; c4++) {
      if (!outside[r4][c4] && wallGrid[r4][c4] === 0 && terrainGrid[r4][c4] === 1) {
        enclosedCells.push({r: r4, c: c4});
      }
    }
  }

  for (var ci = 0; ci < cannons.length; ci++) {
    cannons[ci].active = isCellEnclosed(cannons[ci].gx, cannons[ci].gy);
  }

  return enclosedCells.length > 0;
}

function isCellEnclosed(gc, gr) {
  for (var i = 0; i < enclosedCells.length; i++) {
    if (enclosedCells[i].r === gr && enclosedCells[i].c === gc) return true;
  }
  if (wallGrid[gr] && wallGrid[gr][gc] === 2) return true;
  return false;
}

function hasEnclosedKeep() {
  for (var i = 0; i < keeps.length; i++) {
    var k = keeps[i];
    if (isCellEnclosed(k.gx, k.gy) || isCellEnclosed(k.gx+1, k.gy) ||
        isCellEnclosed(k.gx, k.gy+1) || isCellEnclosed(k.gx+1, k.gy+1)) {
      return true;
    }
  }
  return false;
}

// === PIECE MANAGEMENT ===
function getRandomPiece() {
  // [6] CHA: higher charisma = more chance of favorable pieces
  if (chaMod > 0 && Math.random() < chaMod * 0.15) {
    var li = TAS.math.randInt(0, LUCKY_PIECES.length - 1);
    return LUCKY_PIECES[li].map(function(p) { return [p[0], p[1]]; });
  }
  var idx = TAS.math.randInt(0, PIECE_SHAPES.length - 1);
  return PIECE_SHAPES[idx].map(function(p) { return [p[0], p[1]]; });
}

function rotatePiece(piece) {
  var maxX = 0, maxY = 0;
  for (var i = 0; i < piece.length; i++) {
    if (piece[i][0] > maxX) maxX = piece[i][0];
    if (piece[i][1] > maxY) maxY = piece[i][1];
  }
  return piece.map(function(p) { return [maxY - p[1], p[0]]; });
}

function getPieceAtGrid(piece, gx, gy) {
  return piece.map(function(p) { return {c: gx + p[0], r: gy + p[1]}; });
}

function canPlacePiece(piece, gx, gy) {
  var cells = getPieceAtGrid(piece, gx, gy);
  for (var i = 0; i < cells.length; i++) {
    var cell = cells[i];
    if (cell.c < LAND_START || cell.c >= GRID_COLS || cell.r < 0 || cell.r >= GRID_ROWS) return false;
    if (wallGrid[cell.r][cell.c] !== 0 && wallGrid[cell.r][cell.c] !== 3) return false;
  }
  return true;
}

function placePiece(piece, gx, gy) {
  var cells = getPieceAtGrid(piece, gx, gy);
  for (var i = 0; i < cells.length; i++) {
    setWall(cells[i].r, cells[i].c, 1);
  }
  spawnSporeCloud(gx * GRID_SIZE + 8, gy * GRID_SIZE + 8, '#66cc88', 4);
  TAS.audio.playTone(300, 0.1, 'square', 0.08);
  TAS.audio.playTone(450, 0.08, 'square', 0.06);
}

// === ENEMY SPAWNING ===
function spawnWave() {
  var baseCount = 2 + round;
  var shipCount = Math.min(Math.floor(baseCount * 0.6), 8);
  var soldierCount = Math.min(Math.floor(baseCount * 0.5), 10);
  var siegeCount = round >= 5 ? Math.floor(round / 5) : 0;

  // Catapult spores from the Spore Sea
  for (var i = 0; i < shipCount; i++) {
    var sy = TAS.math.randRange(30, GH - 30);
    var stype = (round >= 3 && Math.random() < 0.3) ? 'sporeship' : 'driftpod';
    var shp = stype === 'sporeship' ? 3 : 1;
    enemies.push({
      x: -20 - i * 40, y: sy, type: stype,
      hp: shp, maxHp: shp,
      vx: 0.3 + round * 0.05, vy: 0,
      bobPhase: Math.random() * Math.PI * 2,
      fireTimer: TAS.math.randInt(60, 180),
      width: stype === 'sporeship' ? 24 : 14,
      height: stype === 'sporeship' ? 12 : 8,
    });
  }

  // Wall fungi from the Fungal Frontier
  for (var j = 0; j < soldierCount; j++) {
    var gy = TAS.math.randRange(CASTLE_TOP * GRID_SIZE, CASTLE_BOTTOM * GRID_SIZE);
    enemies.push({
      x: GW + 10 + j * 25, y: gy, type: 'sporeling',
      hp: 1, maxHp: 1,
      vx: -(0.4 + round * 0.03), vy: 0,
      width: 6, height: 8, attackTimer: 0,
      walkFrame: Math.floor(Math.random() * 20),
    });
  }

  // Siege engines — Battering Parasites
  for (var k = 0; k < siegeCount; k++) {
    var sgy = TAS.math.randRange(CASTLE_TOP * GRID_SIZE + 20, CASTLE_BOTTOM * GRID_SIZE - 20);
    enemies.push({
      x: GW + 30 + k * 50, y: sgy, type: 'bloombatter',
      hp: 3, maxHp: 3,
      vx: -(0.25 + round * 0.02), vy: 0,
      width: 16, height: 12, attackTimer: 0,
    });
  }

  // Boss every 5 rounds — Siege Mold
  if (round % 5 === 0) {
    bossWarning = 120;
    enemies.push({
      x: -60, y: GH / 2, type: 'sporetitan',
      hp: 5 + round, maxHp: 5 + round,
      vx: 0.2, vy: 0,
      width: 40, height: 40,
      bobPhase: 0, tentacleTimer: 120, fireTimer: 60,
    });
  }

  // Round 10+ spawns Spore Hunters — fast flankers
  if (round >= 10) {
    var hunterCount = Math.floor((round - 8) / 3);
    for (var h = 0; h < hunterCount; h++) {
      var hy = TAS.math.randRange(20, GH - 20);
      var fromLeft = Math.random() < 0.3;
      enemies.push({
        x: fromLeft ? -15 : GW + 15,
        y: hy, type: 'reactorhunter',
        hp: 2, maxHp: 2,
        vx: fromLeft ? 0.8 : -0.8, vy: 0,
        width: 10, height: 10, attackTimer: 0,
        huntPhase: Math.random() * Math.PI * 2,
      });
    }
  }
}

// === CANNONBALL FIRING ===
function fireCannon(cannon, targetX, targetY) {
  if (cannon.cooldown > 0 || !cannon.active) return;
  // [5] WIS: reduces cooldown between shots, [2] DEX: also helps
  cannon.cooldown = Math.max(15, Math.floor(45 / (dexMod * wisMod)));

  var sx = cannon.gx * GRID_SIZE + GRID_SIZE / 2;
  var sy = cannon.gy * GRID_SIZE + GRID_SIZE / 2;
  var a = TAS.math.angle(sx, sy, targetX, targetY);
  var speed = 4 * dexMod;  // [2] DEX: faster cannonball speed

  cannonballs.push({
    x: sx, y: sy,
    vx: Math.cos(a) * speed,
    vy: Math.sin(a) * speed,
    life: 120,
    damage: strMod,  // [1] STR: cannon damage
  });

  TAS.audio.playNoise(0.15, 0.12, 800);
  TAS.audio.playTone(120, 0.2, 'sawtooth', 0.08, 60);
  TAS.particles.spawn(sx, sy, '#ffaa00', 5, 2, {size: 2, gravity: 0.1});
  spawnSporeCloud(sx, sy, '#ff8800', 2);
}

// === DAMAGE WALLS ===
function damageWallAt(gx, gy, radius) {
  radius = radius || 1;
  var damaged = 0;
  for (var dr = -radius; dr <= radius; dr++) {
    for (var dc = -radius; dc <= radius; dc++) {
      var r = gy + dr, c = gx + dc;
      if (r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS) {
        if (wallGrid[r][c] === 1) {
          // [3] CON: walls have HP, must deplete before breaking
          wallHpGrid[r][c]--;
          if (wallHpGrid[r][c] <= 0) {
            wallGrid[r][c] = 3;
            damaged++;
            TAS.particles.spawn(c * GRID_SIZE + 4, r * GRID_SIZE + 4, '#557744', 4, 1.5, {size: 2, shape: 'rect'});
            spawnSporeCloud(c * GRID_SIZE + 4, r * GRID_SIZE + 4, '#446633', 2);
          } else {
            // Wall cracking particles
            TAS.particles.spawn(c * GRID_SIZE + 4, r * GRID_SIZE + 4, '#888', 2, 1, {size: 1});
          }
        }
      }
    }
  }
  if (damaged > 0) {
    TAS.fx.shake(3, 0.85);
    TAS.audio.playNoise(0.1, 0.06, 400);
  }
  return damaged;
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  round = 1;
  phase = 'build';
  phaseTimer = BUILD_TIME;
  phaseTransition = 2;
  lives = 3 + conMod;  // [3] CON: bonus lives
  comboCount = 0;
  comboTimer = 0;
  showTutorial = true;
  tutorialTimer = 0;

  initTerrain();
  initWalls();
  placeInitialCastle();
  findEnclosedAreas();

  enemies = [];
  cannonballs = [];
  explosions = [];
  scorePopups = [];
  envParticles = [];
  sporeClouds = [];
  currentPiece = getRandomPiece();
  nextPiece = getRandomPiece();
  pieceRotation = 0;
  cannonsToPlace = 0;

  TAS.particles.clear();
}

// === PHASE TRANSITIONS ===
function startCannonPhase() {
  phase = 'cannon';
  phaseTimer = CANNON_TIME;
  phaseTransition = 1.5;
  spawnWave();
  findEnclosedAreas();
  comboCount = 0;
}

function startBuildPhase() {
  phase = 'build';
  phaseTimer = BUILD_TIME;  // [5] WIS: already scaled
  phaseTransition = 1.5;
  currentPiece = getRandomPiece();
  nextPiece = getRandomPiece();
  pieceRotation = 0;

  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS; c++) {
      if (wallGrid[r][c] === 3) wallGrid[r][c] = 0;
    }
  }
}

function startPlacePhase() {
  phase = 'place';
  phaseTimer = PLACE_TIME;  // [5] WIS: already scaled
  phaseTransition = 1.5;
  cannonsToPlace = 2 + Math.floor(round / 4);
  findEnclosedAreas();

  if (!hasEnclosedKeep()) {
    // [3] CON: lives system — lose a life instead of instant game over
    lives--;
    if (lives <= 0) {
      gameOver();
      return;
    }
    addScorePopup(GW / 2, GH / 2, 'GARDEN BREACHED! Lives: ' + lives, '#e6482e');
    TAS.fx.shake(6, 0.9);
    TAS.fx.flash('#ff0000', 0.4);
  }

  // [4] INT: area bonus with score multiplier
  var areaBonus = Math.floor(enclosedCells.length * 2 * intMod);
  score += areaBonus;
  if (areaBonus > 10) addScorePopup(GW / 2, GH / 2 - 20, '+' + areaBonus + ' GARDEN SEEDS', '#38d973');
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('garden_rampart_hi', highScore);
  }
  TAS.fx.shake(10, 0.92);
  TAS.fx.flash('#ff2200', 0.6);
  TAS.audio.playTone(200, 0.4, 'sawtooth', 0.12, 50);
  TAS.audio.playNoise(0.5, 0.1, 300);
  spawnSporeCloud(GW / 2, GH / 2, '#ff4400', 20);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  waterOffset += dt * 15;
  updateScorePopups(dt);
  updateEnvParticles(dt);
  updateSporeClouds(dt);

  // Combo timer decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Boss warning countdown
  if (bossWarning > 0) bossWarning--;

  if (state === 'title') {
    if (picking) { mouseClicked = false; return; }   // picker overlay open — swallow input
    if (TAS.input.keys['KeyC'] || TAS.input.keys['c'] || TAS.input.keys['C'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = TAS.input.keys['c'] = TAS.input.keys['C'] = false;
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || mouseClicked) {
      startGame();
      mouseClicked = false;
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 10 === 0 && Math.random() < 0.4) {
      TAS.particles.spawn(
        TAS.math.randRange(50, GW - 50),
        TAS.math.randRange(50, GH - 50),
        '#ff4400', 8, 2, {size: 3, gravity: 0.2}
      );
      spawnSporeCloud(TAS.math.randRange(50, GW - 50), TAS.math.randRange(50, GH - 50), '#882200', 3);
    }
    if ((Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || mouseClicked) && frame > 60) {
      state = 'title';
      frame = 0;
      mouseClicked = false;
    }
    return;
  }

  if (state === 'playing') {
    // Tutorial auto-dismiss
    if (showTutorial) {
      tutorialTimer += dt;
      if (tutorialTimer > 8 || mouseClicked) showTutorial = false;
    }

    if (phaseTransition > 0) {
      phaseTransition -= dt;
      mouseClicked = false;
      return;
    }

    phaseTimer -= dt;

    // Lightning in storm rounds
    if (round >= 8 && Math.random() < 0.003) {
      lightningTimer = 8;
      TAS.fx.flash('#ffffff', 0.15);
    }
    if (lightningTimer > 0) lightningTimer--;

    if (phase === 'cannon') {
      updateCannonPhase(dt);
    } else if (phase === 'build') {
      updateBuildPhase(dt);
    } else if (phase === 'place') {
      updatePlacePhase(dt);
    }
  }

  mouseClicked = false;
}

// === CANNON PHASE UPDATE ===
function updateCannonPhase(dt) {
  // [2] DEX: auto-fire rate scales with dex
  var autoFireRate = Math.max(4, Math.floor(12 / dexMod));

  if (mouseClicked || TAS.input.touch.a) {
    for (var i = 0; i < cannons.length; i++) {
      if (cannons[i].active && cannons[i].cooldown <= 0) {
        fireCannon(cannons[i], mouseX, mouseY);
        break;
      }
    }
  }

  if (mouseDown && frame % autoFireRate === 0) {
    for (var j = 0; j < cannons.length; j++) {
      if (cannons[j].active && cannons[j].cooldown <= 0) {
        fireCannon(cannons[j], mouseX, mouseY);
        break;
      }
    }
  }

  for (var k = 0; k < cannons.length; k++) {
    if (cannons[k].cooldown > 0) cannons[k].cooldown--;
  }

  // Update cannonballs
  for (var bi = cannonballs.length - 1; bi >= 0; bi--) {
    var b = cannonballs[bi];
    b.x += b.vx;
    b.y += b.vy;
    b.vy += 0.02;
    b.life--;

    var hit = false;
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var e = enemies[ei];
      if (TAS.hit.rectOverlap(b.x - 3, b.y - 3, 6, 6, e.x - e.width/2, e.y - e.height/2, e.width, e.height)) {
        // [1] STR: cannon damage from statB
        e.hp -= b.damage;
        hit = true;
        TAS.particles.spawn(b.x, b.y, '#ffdd00', 8, 3, {size: 2, gravity: 0.1});
        TAS.fx.shake(2, 0.8);
        TAS.audio.playTone(200, 0.1, 'square', 0.06);

        if (e.hp <= 0) {
          // Enemy destroyed — score with [4] INT multiplier and combo
          comboCount++;
          comboTimer = 3;
          var basePoints = e.type === 'driftpod' ? 10 : e.type === 'sporeship' ? 30 :
                       e.type === 'sporeling' ? 15 : e.type === 'bloombatter' ? 50 :
                       e.type === 'reactorhunter' ? 40 : 100;
          var comboBonus = Math.min(comboCount, 10);
          var points = Math.floor((basePoints + comboBonus * 5) * intMod);  // [4] INT
          score += points;

          var popColor = comboCount >= 5 ? '#a855f7' : comboCount >= 3 ? '#ffaa00' : '#f4b41b';
          var popText = '+' + points;
          if (comboCount >= 3) popText += ' x' + comboCount;
          addScorePopup(e.x, e.y - 10, popText, popColor);

          var deathColor = e.type === 'sporetitan' ? '#88ff88' : '#ff8800';
          TAS.particles.spawn(e.x, e.y, deathColor, 15, 4, {size: 3, gravity: 0.15});
          spawnSporeCloud(e.x, e.y, '#44aa44', 6);
          TAS.audio.playNoise(0.2, 0.1, 600);
          TAS.audio.playTone(400, 0.15, 'square', 0.08, 100);
          explosions.push({x: e.x, y: e.y, timer: 30, size: e.width});
          enemies.splice(ei, 1);
        }
        break;
      }
    }

    if (hit || b.life <= 0 || b.x < -10 || b.x > GW + 10 || b.y > GH + 10) {
      if (!hit && b.y > GH - 20) {
        TAS.particles.spawn(b.x, b.y, '#4488cc', 4, 2, {size: 1});
      }
      cannonballs.splice(bi, 1);
    }
  }

  updateEnemies(dt);

  for (var xi = explosions.length - 1; xi >= 0; xi--) {
    explosions[xi].timer--;
    if (explosions[xi].timer <= 0) explosions.splice(xi, 1);
  }

  if (phaseTimer <= 0 || enemies.length === 0) {
    // Round clear bonus — [4] INT multiplied
    if (enemies.length === 0 && phaseTimer > 2) {
      var clearBonus = Math.floor(50 * round * intMod);
      score += clearBonus;
      addScorePopup(GW / 2, GH / 2, 'GARDEN DEFENDED +' + clearBonus + ' POOP', '#44ffaa');
    }
    enemies = [];
    cannonballs = [];
    startBuildPhase();
  }
}

function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.x += e.vx;
    e.y += e.vy;

    if (e.type === 'driftpod' || e.type === 'sporeship') {
      e.bobPhase += 0.03;
      e.y += Math.sin(e.bobPhase) * 0.3;

      if (e.fireTimer !== undefined) {
        e.fireTimer--;
        if (e.fireTimer <= 0 && e.x > 20 && e.x < WATER_END * GRID_SIZE + 30) {
          var targetC = TAS.math.randInt(CASTLE_LEFT, CASTLE_RIGHT);
          var targetR = TAS.math.randInt(CASTLE_TOP, CASTLE_BOTTOM);
          if (wallGrid[targetR] && wallGrid[targetR][targetC] === 1) {
            damageWallAt(targetC, targetR, 0);
            TAS.audio.playTone(150, 0.1, 'sawtooth', 0.04);
            // Spore projectile particle trail
            var px = targetC * GRID_SIZE;
            var py = targetR * GRID_SIZE;
            TAS.particles.spawn(px, py, '#88ff44', 3, 2, {size: 1.5, gravity: 0.05});
          }
          e.fireTimer = TAS.math.randInt(90, 200 - round * 5);
        }
      }

      if (e.x > WATER_END * GRID_SIZE + 20) {
        var gc = CASTLE_LEFT;
        var gr = Math.floor(e.y / GRID_SIZE);
        damageWallAt(gc, gr, 1);
        spawnSporeCloud(e.x, e.y, '#558833', 5);
        enemies.splice(i, 1);
        continue;
      }
    } else if (e.type === 'sporeling') {
      e.walkFrame = (e.walkFrame || 0) + 1;
      var gc2 = Math.floor(e.x / GRID_SIZE);
      var gr2 = Math.floor(e.y / GRID_SIZE);
      if (gc2 >= 0 && gc2 < GRID_COLS && gr2 >= 0 && gr2 < GRID_ROWS) {
        if (wallGrid[gr2] && (wallGrid[gr2][gc2] === 1 || wallGrid[gr2][gc2] === 2)) {
          e.attackTimer++;
          e.vx = 0;
          if (e.attackTimer >= 60) {
            damageWallAt(gc2, gr2, 0);
            e.attackTimer = 0;
            spawnSporeCloud(gc2 * GRID_SIZE, gr2 * GRID_SIZE, '#77aa33', 3);
          }
        }
      }
      if (e.x < LAND_START * GRID_SIZE) {
        enemies.splice(i, 1);
        continue;
      }
    } else if (e.type === 'bloombatter') {
      var gc3 = Math.floor(e.x / GRID_SIZE);
      var gr3 = Math.floor(e.y / GRID_SIZE);
      if (gc3 >= 0 && gc3 < GRID_COLS && gr3 >= 0 && gr3 < GRID_ROWS) {
        if (wallGrid[gr3] && (wallGrid[gr3][gc3] === 1 || wallGrid[gr3][gc3] === 2)) {
          e.attackTimer++;
          e.vx = 0;
          if (e.attackTimer >= 45) {
            damageWallAt(gc3, gr3, 1);
            e.attackTimer = 0;
            TAS.fx.shake(5, 0.88);
            spawnSporeCloud(gc3 * GRID_SIZE, gr3 * GRID_SIZE, '#aacc44', 6);
          }
        }
      }
      if (e.x < LAND_START * GRID_SIZE) {
        enemies.splice(i, 1);
        continue;
      }
    } else if (e.type === 'sporetitan') {
      e.bobPhase += 0.02;
      e.y = GH / 2 + Math.sin(e.bobPhase) * 40;

      if (e.tentacleTimer !== undefined) {
        e.tentacleTimer--;
        if (e.tentacleTimer <= 0) {
          var tc = TAS.math.randInt(CASTLE_LEFT, CASTLE_RIGHT);
          var tr = TAS.math.randInt(CASTLE_TOP, CASTLE_BOTTOM);
          damageWallAt(tc, tr, 2);
          TAS.fx.shake(8, 0.9);
          TAS.fx.flash('#38d973', 0.2);
          TAS.audio.playNoise(0.3, 0.12, 200);
          TAS.particles.spawn(tc * GRID_SIZE, tr * GRID_SIZE, '#44cc88', 15, 3, {size: 3});
          spawnSporeCloud(tc * GRID_SIZE, tr * GRID_SIZE, '#33aa55', 8);
          addScorePopup(tc * GRID_SIZE, tr * GRID_SIZE - 10, 'MOLD SMASH!', '#e6482e');
          e.tentacleTimer = TAS.math.randInt(80, 150);
        }
      }

      if (e.x > WATER_END * GRID_SIZE - 20) {
        e.vx = 0;
        e.x = WATER_END * GRID_SIZE - 20;
      }
    } else if (e.type === 'reactorhunter') {
      e.huntPhase = (e.huntPhase || 0) + 0.04;
      e.vy = Math.sin(e.huntPhase) * 1.2;

      var gc4 = Math.floor(e.x / GRID_SIZE);
      var gr4 = Math.floor(e.y / GRID_SIZE);
      if (gc4 >= 0 && gc4 < GRID_COLS && gr4 >= 0 && gr4 < GRID_ROWS) {
        if (wallGrid[gr4] && (wallGrid[gr4][gc4] === 1 || wallGrid[gr4][gc4] === 2)) {
          e.attackTimer++;
          if (e.attackTimer >= 30) {
            damageWallAt(gc4, gr4, 0);
            e.attackTimer = 0;
          }
        }
      }
      if (e.x < -20 || e.x > GW + 20 || e.y < -20 || e.y > GH + 20) {
        enemies.splice(i, 1);
        continue;
      }
    }
  }
}

// === BUILD PHASE UPDATE ===
function updateBuildPhase(dt) {
  if (TAS.input.keys['KeyR'] || TAS.input.keys['r'] || TAS.input.touch.b) {
    if (frame % 10 === 0) {
      currentPiece = rotatePiece(currentPiece);
      TAS.audio.playTone(500, 0.05, 'square', 0.04);
    }
  }

  if (mouseClicked) {
    var gx = Math.floor(mouseX / GRID_SIZE);
    var gy = Math.floor(mouseY / GRID_SIZE);
    if (currentPiece && canPlacePiece(currentPiece, gx, gy)) {
      placePiece(currentPiece, gx, gy);
      currentPiece = nextPiece;      // [6] CHA: use previewed next piece
      nextPiece = getRandomPiece();
      pieceRotation = 0;
    } else {
      TAS.audio.playTone(100, 0.1, 'square', 0.05);
    }
  }

  if (TAS.input.keys['Space'] || TAS.input.keys[' ']) {
    var gx2 = Math.floor(mouseX / GRID_SIZE);
    var gy2 = Math.floor(mouseY / GRID_SIZE);
    if (currentPiece && canPlacePiece(currentPiece, gx2, gy2)) {
      placePiece(currentPiece, gx2, gy2);
      currentPiece = nextPiece;
      nextPiece = getRandomPiece();
      pieceRotation = 0;
    }
    TAS.input.keys['Space'] = false;
    TAS.input.keys[' '] = false;
  }

  if (phaseTimer <= 0) {
    findEnclosedAreas();
    startPlacePhase();
  }
}

// === PLACE CANNONS PHASE UPDATE ===
function updatePlacePhase(dt) {
  if (cannonsToPlace <= 0 || phaseTimer <= 0) {
    round++;
    if (round > 20) {
      // [4] INT: victory bonus
      score += Math.floor(1000 * intMod);
      addScorePopup(GW / 2, GH / 2, 'GARDEN VICTORY! +' + Math.floor(1000 * intMod) + ' POOP', '#f4b41b');
      gameOver();
      return;
    }
    startCannonPhase();
    return;
  }

  if (mouseClicked) {
    var gx = Math.floor(mouseX / GRID_SIZE);
    var gy = Math.floor(mouseY / GRID_SIZE);
    if (isCellEnclosed(gx, gy) && terrainGrid[gy] && terrainGrid[gy][gx] === 1) {
      var occupied = false;
      for (var ci = 0; ci < cannons.length; ci++) {
        if (cannons[ci].gx === gx && cannons[ci].gy === gy) { occupied = true; break; }
      }
      if (!occupied && wallGrid[gy][gx] === 0) {
        cannons.push({gx: gx, gy: gy, cooldown: 0, active: true});
        cannonsToPlace--;
        TAS.audio.playTone(350, 0.1, 'triangle', 0.08);
        TAS.audio.playTone(500, 0.08, 'triangle', 0.06);
        TAS.particles.spawn(gx * GRID_SIZE + 4, gy * GRID_SIZE + 4, '#f4b41b', 6, 2, {size: 2});
        spawnSporeCloud(gx * GRID_SIZE + 4, gy * GRID_SIZE + 4, '#ffaa00', 3);
        addScorePopup(gx * GRID_SIZE, gy * GRID_SIZE - 8, 'SPORE CANNON PLACED', '#3cacd7');
      }
    } else {
      TAS.audio.playTone(100, 0.1, 'square', 0.05);
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawMap();
    drawSporeClouds();
    drawEnvParticles();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Round: ' + round + '  Lives: ' + lives });
    drawScorePopups();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawMap();
  drawWalls();
  drawCannons();
  drawEnemies();
  drawCannonballs();
  drawExplosions();
  drawSporeClouds();
  drawEnvParticles();

  if (phase === 'build' && currentPiece && phaseTransition <= 0) {
    drawGhostPiece();
  }

  if (phase === 'place' && phaseTransition <= 0) {
    drawPlaceHighlight();
  }

  if (phase === 'cannon' && phaseTransition <= 0) {
    drawCrosshair();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawScorePopups();

  // Lightning flash overlay
  if (lightningTimer > 4) {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  drawHUD();
  drawPhaseIndicator();

  // Boss warning
  if (bossWarning > 60) {
    var bwAlpha = Math.sin(bossWarning * 0.15) * 0.5 + 0.5;
    ctx.globalAlpha = bwAlpha;
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SIEGE MOLD APPROACHES!', GW / 2, GH / 2 - 40);
    ctx.globalAlpha = 1;
  }

  // Combo display
  if (comboCount >= 3) {
    ctx.fillStyle = comboCount >= 8 ? '#a855f7' : comboCount >= 5 ? '#ffaa00' : '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('COMBO x' + comboCount, GW - 10, 38);
  }

  // Next piece preview during build phase — [6] CHA: shows next piece
  if (phase === 'build' && nextPiece && chaMod >= 1 && phaseTransition <= 0) {
    drawNextPiecePreview();
  }

  // Tutorial overlay
  if (showTutorial && phase === 'build' && phaseTransition <= 0) {
    drawTutorial();
  }

  if (phaseTransition > 0) {
    drawPhaseTransition();
  }

  // Lives display
  if (lives < 3 + conMod) {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('LIVES: ' + lives, 6, 34);
  }

  // Stat badge in corner — [statB integration display]
  drawStatBadge();

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW MAP ===
function drawMap() {
  // Spore Sea — deep bioluminescent water
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < WATER_END; c++) {
      var wave = Math.sin((c + r * 0.5 + waterOffset * 0.1) * 0.5) * 0.15;
      var depth = 1 - (c / WATER_END) * 0.3;
      var blueBase = Math.floor((60 + wave * 30) * depth);
      var greenTint = Math.floor((30 + wave * 15 + Math.sin((c * 0.4 + waterOffset * 0.03 + r * 0.2)) * 12) * depth);
      ctx.fillStyle = 'rgb(' + Math.floor(8 * depth) + ',' + greenTint + ',' + blueBase + ')';
      ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);

      // Bioluminescent sparkles
      if (Math.sin(c * 3.7 + r * 5.1 + waterOffset * 0.08) > 0.92) {
        ctx.fillStyle = 'rgba(100,255,180,0.3)';
        ctx.fillRect(c * GRID_SIZE + 2, r * GRID_SIZE + 2, 2, 2);
      }
    }
  }

  // Mycelial shore line
  ctx.fillStyle = '#5a4525';
  ctx.fillRect(WATER_END * GRID_SIZE - 3, 0, 6, GH);
  // Shore glow
  ctx.fillStyle = 'rgba(100,180,80,0.15)';
  ctx.fillRect(WATER_END * GRID_SIZE - 1, 0, 2, GH);

  // Fungal land — mycelium-threaded terrain
  for (var r2 = 0; r2 < GRID_ROWS; r2++) {
    for (var c2 = LAND_START; c2 < GRID_COLS; c2++) {
      var base_g = 30 + ((c2 * 7 + r2 * 13) % 18);
      var mycelThread = Math.sin(c2 * 1.3 + r2 * 0.8) > 0.7 ? 8 : 0;
      ctx.fillStyle = 'rgb(' + Math.floor(14 + (c2 % 3) * 3) + ',' + (base_g + mycelThread) + ',' + Math.floor(12 + (r2 % 4) * 2) + ')';
      ctx.fillRect(c2 * GRID_SIZE, r2 * GRID_SIZE, GRID_SIZE, GRID_SIZE);

      // Mycelium network threads — faint white lines
      if ((c2 + r2) % 7 === 0 && Math.sin(c2 * 2.1 + r2 * 3.3) > 0.5) {
        ctx.fillStyle = 'rgba(150,200,130,0.08)';
        ctx.fillRect(c2 * GRID_SIZE, r2 * GRID_SIZE + 3, GRID_SIZE, 1);
      }
    }
  }

  // Castle zone subtle highlight
  if (phase !== 'cannon') {
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#38d973';
    ctx.fillRect(CASTLE_LEFT * GRID_SIZE, CASTLE_TOP * GRID_SIZE,
      (CASTLE_RIGHT - CASTLE_LEFT) * GRID_SIZE, (CASTLE_BOTTOM - CASTLE_TOP) * GRID_SIZE);
    ctx.globalAlpha = 1;
  }

  // Enclosed area highlight
  if (phase !== 'cannon') {
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = '#38d973';
    for (var ei = 0; ei < enclosedCells.length; ei++) {
      var ec = enclosedCells[ei];
      ctx.fillRect(ec.c * GRID_SIZE, ec.r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
    ctx.globalAlpha = 1;
  }
}

// === DRAW WALLS ===
function drawWalls() {
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < GRID_COLS; c++) {
      var cell = wallGrid[r][c];
      if (cell === 0) continue;

      var x = c * GRID_SIZE, y = r * GRID_SIZE;

      if (cell === 1) {
        // Spore walls — living fungal fortification
        var hp = wallHpGrid[r][c];
        var dmgFactor = hp / conMod;
        var gBase = Math.floor(80 + dmgFactor * 40);
        var rBase = Math.floor(50 + dmgFactor * 20);
        ctx.fillStyle = 'rgb(' + rBase + ',' + gBase + ',' + Math.floor(60 + dmgFactor * 20) + ')';
        ctx.fillRect(x, y, GRID_SIZE, GRID_SIZE);

        // Spore texture - bioluminescent veins
        ctx.fillStyle = 'rgba(100,200,120,' + (0.15 + dmgFactor * 0.15) + ')';
        if ((c + r) % 2 === 0) {
          ctx.fillRect(x + 2, y + 1, 3, 1);
          ctx.fillRect(x + 1, y + 4, 1, 3);
        } else {
          ctx.fillRect(x + 4, y + 2, 2, 1);
          ctx.fillRect(x + 3, y + 5, 1, 2);
        }
        // Top highlight
        ctx.fillStyle = 'rgba(150,220,160,0.2)';
        ctx.fillRect(x, y, GRID_SIZE, 1);
        ctx.fillRect(x, y, 1, GRID_SIZE);
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(x + GRID_SIZE - 1, y, 1, GRID_SIZE);
        ctx.fillRect(x, y + GRID_SIZE - 1, GRID_SIZE, 1);

        // [3] CON: crack overlay when damaged
        if (hp < conMod) {
          ctx.strokeStyle = 'rgba(40,30,20,0.5)';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x + 1, y + 1);
          ctx.lineTo(x + 4, y + 5);
          ctx.lineTo(x + 7, y + 3);
          ctx.stroke();
          ctx.lineWidth = 1;
        }
      } else if (cell === 2) {
        // Keep — garden core
        ctx.fillStyle = '#2a4466';
        ctx.fillRect(x, y, GRID_SIZE, GRID_SIZE);
        ctx.fillStyle = '#1a3355';
        ctx.fillRect(x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2);
        // Garden core glow
        var glowPulse = Math.sin(frame * 0.06 + c + r) * 0.3 + 0.5;
        ctx.fillStyle = 'rgba(56,217,115,' + glowPulse * 0.4 + ')';
        ctx.fillRect(x + 2, y + 2, GRID_SIZE - 4, GRID_SIZE - 4);
        // Flag/antenna
        if (c % 2 === 0 && r % 2 === 0) {
          ctx.fillStyle = statB.color;
          ctx.fillRect(x + 3, y, 1, 4);
          ctx.fillRect(x + 4, y, 3, 2);
        }
      } else if (cell === 3) {
        // Destroyed spore wall — decomposing rubble
        ctx.fillStyle = '#3a3020';
        ctx.fillRect(x + 1, y + 2, 3, 3);
        ctx.fillStyle = '#4a4030';
        ctx.fillRect(x + 4, y + 4, 2, 2);
        ctx.fillStyle = '#2a2515';
        ctx.fillRect(x + 2, y + 5, 4, 2);
        // Residual spore glow
        if (Math.random() < 0.01) {
          ctx.fillStyle = 'rgba(100,200,100,0.3)';
          ctx.fillRect(x + 3, y + 3, 2, 2);
        }
      }
    }
  }
}

// === DRAW CANNONS ===
function drawCannons() {
  for (var ci = 0; ci < cannons.length; ci++) {
    var cannon = cannons[ci];
    var x = cannon.gx * GRID_SIZE + GRID_SIZE / 2;
    var y = cannon.gy * GRID_SIZE + GRID_SIZE / 2;

    // Spore cannon base — glowing circular platform
    var baseColor = cannon.active ? '#2a3a2a' : '#2a1818';
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();

    // Cannon glow ring
    if (cannon.active) {
      var glowA = 0.3 + Math.sin(frame * 0.05 + ci) * 0.15;
      ctx.strokeStyle = 'rgba(56,217,115,' + glowA + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Barrel
    if (phase === 'cannon' && cannon.active) {
      var a = TAS.math.angle(x, y, mouseX, mouseY);
      ctx.strokeStyle = '#5a6a5a';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(a) * 7, y + Math.sin(a) * 7);
      ctx.stroke();
      // Barrel tip glow
      ctx.fillStyle = 'rgba(255,200,100,' + (cannon.cooldown > 0 ? 0.6 : 0.2) + ')';
      ctx.beginPath();
      ctx.arc(x + Math.cos(a) * 7, y + Math.sin(a) * 7, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.lineWidth = 1;

      // Cooldown ring — [5] WIS: cooldown indicator
      if (cannon.cooldown > 0) {
        var maxCd = Math.max(15, Math.floor(45 / (dexMod * wisMod)));
        ctx.fillStyle = 'rgba(255,100,0,0.4)';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.arc(x, y, 4, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * (cannon.cooldown / maxCd));
        ctx.closePath();
        ctx.fill();
      }
    } else {
      ctx.strokeStyle = cannon.active ? '#5a6a5a' : '#3a2222';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - 6, y);
      ctx.stroke();
      ctx.lineWidth = 1;
    }

    // Disabled X
    if (!cannon.active) {
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - 3, y - 3); ctx.lineTo(x + 3, y + 3);
      ctx.moveTo(x + 3, y - 3); ctx.lineTo(x - 3, y + 3);
      ctx.stroke();
    }
  }
}

// === DRAW ENEMIES ===
function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var x = e.x, y = e.y;

    if (e.type === 'driftpod') {
      // Catapult spore — floating fungal vessel
      ctx.fillStyle = '#445533';
      ctx.beginPath();
      ctx.moveTo(x - 7, y);
      ctx.quadraticCurveTo(x - 6, y + 5, x, y + 4);
      ctx.quadraticCurveTo(x + 6, y + 5, x + 7, y);
      ctx.quadraticCurveTo(x + 6, y - 3, x, y - 2);
      ctx.quadraticCurveTo(x - 6, y - 3, x - 7, y);
      ctx.fill();
      // Spore cap
      ctx.fillStyle = '#77aa44';
      ctx.beginPath();
      ctx.arc(x, y - 4, 5, Math.PI, 0);
      ctx.fill();
      // Spore dots
      ctx.fillStyle = '#99cc66';
      ctx.fillRect(x - 2, y - 6, 2, 1);
      ctx.fillRect(x + 1, y - 5, 1, 1);
      // Trail spores
      if (frame % 8 === 0) {
        TAS.particles.spawn(x - 8, y, '#668844', 1, 0.5, {size: 1, gravity: -0.02});
      }
    } else if (e.type === 'sporeship') {
      // Spore galleon — large fungal warship
      ctx.fillStyle = '#334422';
      ctx.beginPath();
      ctx.moveTo(x - 12, y + 2);
      ctx.quadraticCurveTo(x - 11, y + 7, x, y + 6);
      ctx.quadraticCurveTo(x + 11, y + 7, x + 12, y + 2);
      ctx.lineTo(x + 10, y - 3);
      ctx.lineTo(x - 10, y - 3);
      ctx.closePath();
      ctx.fill();
      // Mycelial masts
      ctx.fillStyle = '#556633';
      ctx.fillRect(x - 4, y - 12, 2, 14);
      ctx.fillRect(x + 3, y - 10, 2, 12);
      // Spore sails
      ctx.fillStyle = '#66883a';
      ctx.fillRect(x - 8, y - 11, 8, 5);
      ctx.fillStyle = '#778844';
      ctx.fillRect(x + 1, y - 9, 6, 4);
      // Bioluminescent hull lights
      ctx.fillStyle = 'rgba(100,255,100,0.4)';
      ctx.fillRect(x - 8, y + 1, 2, 2);
      ctx.fillRect(x + 6, y + 1, 2, 2);
      // HP bar
      if (e.hp < e.maxHp) {
        ctx.fillStyle = '#222';
        ctx.fillRect(x - 10, y - 16, 20, 3);
        ctx.fillStyle = '#44dd44';
        ctx.fillRect(x - 10, y - 16, 20 * (e.hp / e.maxHp), 3);
      }
    } else if (e.type === 'sporeling') {
      // Wall fungus ground trooper
      var bob = Math.sin((e.walkFrame || 0) * 0.15) * 1;
      ctx.fillStyle = '#446633';
      ctx.fillRect(x - 3, y - 3 + bob, 6, 7);
      // Mushroom cap
      ctx.fillStyle = '#77aa44';
      ctx.beginPath();
      ctx.arc(x, y - 4 + bob, 4, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#88bb55';
      ctx.fillRect(x - 2, y - 7 + bob, 2, 2);
      ctx.fillRect(x + 1, y - 6 + bob, 1, 1);
      // Spore weapon
      ctx.fillStyle = '#665533';
      ctx.fillRect(x - 5, y - 1 + bob, 2, 5);
      // Attack flash
      if (e.attackTimer > 40) {
        ctx.fillStyle = 'rgba(255,200,0,0.4)';
        ctx.beginPath();
        ctx.arc(x - 6, y + bob, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === 'bloombatter') {
      // Battering Parasite — fungal siege engine
      ctx.fillStyle = '#4a3318';
      ctx.fillRect(x - 8, y - 5, 16, 10);
      // Wheels — fungal discs
      ctx.fillStyle = '#334422';
      ctx.beginPath();
      ctx.arc(x - 5, y + 6, 3, 0, Math.PI * 2);
      ctx.arc(x + 5, y + 6, 3, 0, Math.PI * 2);
      ctx.fill();
      // Battering bloom (ram)
      ctx.fillStyle = '#558833';
      ctx.fillRect(x - 14, y - 2, 8, 4);
      ctx.fillStyle = '#88bb44';
      ctx.beginPath();
      ctx.arc(x - 14, y, 4, 0, Math.PI * 2);
      ctx.fill();
      // Top growth
      ctx.fillStyle = '#66993a';
      ctx.beginPath();
      ctx.arc(x, y - 7, 6, Math.PI, 0);
      ctx.fill();
      // Spore cloud when attacking
      if (e.attackTimer > 30) {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#aacc44';
        ctx.beginPath();
        ctx.arc(x - 14, y, 6 + Math.sin(frame * 0.1) * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      // HP bar
      if (e.hp < e.maxHp) {
        ctx.fillStyle = '#222';
        ctx.fillRect(x - 8, y - 13, 16, 3);
        ctx.fillStyle = '#44dd44';
        ctx.fillRect(x - 8, y - 13, 16 * (e.hp / e.maxHp), 3);
      }
    } else if (e.type === 'sporetitan') {
      // Boss — Siege Mold
      var pulse = Math.sin(frame * 0.04) * 3;
      // Body
      ctx.fillStyle = '#1a4422';
      ctx.beginPath();
      ctx.arc(x, y, 20 + pulse, 0, Math.PI * 2);
      ctx.fill();
      // Inner glow
      ctx.fillStyle = 'rgba(56,217,115,0.3)';
      ctx.beginPath();
      ctx.arc(x, y, 14 + pulse * 0.5, 0, Math.PI * 2);
      ctx.fill();
      // Eyes — glowing spore cores
      ctx.fillStyle = '#e6482e';
      ctx.beginPath();
      ctx.arc(x - 7, y - 6, 4, 0, Math.PI * 2);
      ctx.arc(x + 7, y - 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x - 7, y - 6, 2, 0, Math.PI * 2);
      ctx.arc(x + 7, y - 6, 2, 0, Math.PI * 2);
      ctx.fill();
      // Mycelial tentacles
      ctx.strokeStyle = '#33aa55';
      ctx.lineWidth = 3;
      for (var t = 0; t < 8; t++) {
        var tAngle = (t / 8) * Math.PI * 2 + frame * 0.015;
        var tx1 = x + Math.cos(tAngle) * (24 + pulse);
        var ty1 = y + Math.sin(tAngle) * (24 + pulse);
        var tx2 = x + Math.cos(tAngle + 0.4) * (36 + pulse);
        var ty2 = y + Math.sin(tAngle + 0.4) * (36 + pulse);
        ctx.beginPath();
        ctx.moveTo(tx1, ty1);
        ctx.quadraticCurveTo(
          tx1 + Math.sin(frame * 0.025 + t) * 10,
          ty1 + Math.cos(frame * 0.03 + t) * 10,
          tx2, ty2
        );
        ctx.stroke();
        // Tentacle tip glow
        ctx.fillStyle = 'rgba(100,255,150,0.4)';
        ctx.beginPath();
        ctx.arc(tx2, ty2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.lineWidth = 1;
      // Spore spots
      ctx.fillStyle = '#55cc77';
      for (var s = 0; s < 6; s++) {
        var sx2 = x + Math.cos(s * 1.05) * 11;
        var sy2 = y + Math.sin(s * 1.05) * 9;
        ctx.beginPath();
        ctx.arc(sx2, sy2, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Maw
      ctx.fillStyle = '#112211';
      ctx.beginPath();
      ctx.arc(x, y + 4, 6 + Math.sin(frame * 0.06) * 2, 0, Math.PI);
      ctx.fill();
      // HP bar
      ctx.fillStyle = '#222';
      ctx.fillRect(x - 22, y - 30, 44, 5);
      ctx.fillStyle = '#38d973';
      ctx.fillRect(x - 22, y - 30, 44 * (e.hp / e.maxHp), 5);
      ctx.strokeStyle = '#226633';
      ctx.strokeRect(x - 22, y - 30, 44, 5);
      // Name label
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SIEGE MOLD', x, y - 34);
    } else if (e.type === 'reactorhunter') {
      // Spore Hunter — fast flanking unit
      var rPhase = Math.sin((e.huntPhase || 0) + frame * 0.08) * 2;
      ctx.fillStyle = '#7a3db8';
      ctx.beginPath();
      ctx.moveTo(x, y - 5 + rPhase);
      ctx.lineTo(x + 5, y + 3 + rPhase);
      ctx.lineTo(x - 5, y + 3 + rPhase);
      ctx.closePath();
      ctx.fill();
      // Eye
      ctx.fillStyle = '#c77dff';
      ctx.beginPath();
      ctx.arc(x, y - 1 + rPhase, 2, 0, Math.PI * 2);
      ctx.fill();
      // Speed trail
      var trailDir = e.vx > 0 ? -1 : 1;
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.moveTo(x + trailDir * 6, y - 3 + rPhase);
      ctx.lineTo(x + trailDir * 12, y + rPhase);
      ctx.lineTo(x + trailDir * 6, y + 3 + rPhase);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      // HP bar
      if (e.hp < e.maxHp) {
        ctx.fillStyle = '#222';
        ctx.fillRect(x - 5, y - 10 + rPhase, 10, 2);
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(x - 5, y - 10 + rPhase, 10 * (e.hp / e.maxHp), 2);
      }
    }
  }
}

// === DRAW CANNONBALLS ===
function drawCannonballs() {
  for (var i = 0; i < cannonballs.length; i++) {
    var b = cannonballs[i];
    // [1] STR: larger cannonballs for higher damage
    var size = 2 + Math.min(b.damage, 4) * 0.5;
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(b.x, b.y, size, 0, Math.PI * 2);
    ctx.fill();
    // Fire trail
    ctx.fillStyle = 'rgba(255,150,50,0.5)';
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 1.5, b.y - b.vy * 1.5, size * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,200,80,0.3)';
    ctx.beginPath();
    ctx.arc(b.x - b.vx * 3, b.y - b.vy * 3, size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW EXPLOSIONS ===
function drawExplosions() {
  for (var i = 0; i < explosions.length; i++) {
    var ex = explosions[i];
    var progress = 1 - (ex.timer / 30);
    var radius = ex.size * (0.5 + progress);
    ctx.globalAlpha = 1 - progress;
    // Outer blast
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius, 0, Math.PI * 2);
    ctx.fill();
    // Inner core
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Spore scatter ring
    ctx.strokeStyle = 'rgba(100,255,100,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius * 1.3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.globalAlpha = 1;
  }
}

// === DRAW GHOST PIECE ===
function drawGhostPiece() {
  if (!currentPiece) return;
  var gx = Math.floor(mouseX / GRID_SIZE);
  var gy = Math.floor(mouseY / GRID_SIZE);
  var canPlace = canPlacePiece(currentPiece, gx, gy);
  var cells = getPieceAtGrid(currentPiece, gx, gy);

  ctx.globalAlpha = 0.55;
  for (var i = 0; i < cells.length; i++) {
    var cx = cells[i].c * GRID_SIZE, cy = cells[i].r * GRID_SIZE;
    ctx.fillStyle = canPlace ? '#558844' : '#883333';
    ctx.fillRect(cx, cy, GRID_SIZE, GRID_SIZE);
    ctx.strokeStyle = canPlace ? '#38d973' : '#e6482e';
    ctx.strokeRect(cx + 0.5, cy + 0.5, GRID_SIZE - 1, GRID_SIZE - 1);
    // Spore vein preview
    if (canPlace) {
      ctx.fillStyle = 'rgba(100,255,150,0.3)';
      ctx.fillRect(cx + 2, cy + 3, 3, 1);
    }
  }
  ctx.globalAlpha = 1;
}

// === DRAW NEXT PIECE PREVIEW ===
function drawNextPiecePreview() {
  // [6] CHA: next piece preview panel
  var px = GW - 50;
  var py = 50;
  ctx.fillStyle = 'rgba(26,28,44,0.85)';
  ctx.fillRect(px - 4, py - 14, 48, 48);
  ctx.strokeStyle = 'rgba(56,217,115,0.4)';
  ctx.strokeRect(px - 4, py - 14, 48, 48);

  ctx.fillStyle = '#668866';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', px + 20, py - 5);

  if (nextPiece) {
    ctx.globalAlpha = 0.7;
    for (var i = 0; i < nextPiece.length; i++) {
      var nx = px + nextPiece[i][0] * 8 + 4;
      var ny = py + nextPiece[i][1] * 8 + 2;
      ctx.fillStyle = '#558844';
      ctx.fillRect(nx, ny, 7, 7);
      ctx.strokeStyle = '#38d973';
      ctx.strokeRect(nx, ny, 7, 7);
    }
    ctx.globalAlpha = 1;
  }
}

// === DRAW PLACE HIGHLIGHT ===
function drawPlaceHighlight() {
  var gx = Math.floor(mouseX / GRID_SIZE);
  var gy = Math.floor(mouseY / GRID_SIZE);

  ctx.globalAlpha = 0.15 + Math.sin(frame * 0.08) * 0.08;
  ctx.fillStyle = '#f4b41b';
  for (var i = 0; i < enclosedCells.length; i++) {
    var cell = enclosedCells[i];
    var occupied = false;
    for (var ci = 0; ci < cannons.length; ci++) {
      if (cannons[ci].gx === cell.c && cannons[ci].gy === cell.r) { occupied = true; break; }
    }
    if (!occupied && wallGrid[cell.r][cell.c] === 0) {
      ctx.fillRect(cell.c * GRID_SIZE, cell.r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
  }
  ctx.globalAlpha = 1;

  if (isCellEnclosed(gx, gy)) {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(gx * GRID_SIZE + GRID_SIZE / 2, gy * GRID_SIZE + GRID_SIZE / 2, 5, 0, Math.PI * 2);
    ctx.fill();
    // Cannon icon preview
    ctx.strokeStyle = 'rgba(56,217,115,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(gx * GRID_SIZE + GRID_SIZE / 2, gy * GRID_SIZE + GRID_SIZE / 2, 5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// === DRAW CROSSHAIR ===
function drawCrosshair() {
  // Spore cannon targeting reticle
  ctx.strokeStyle = '#e6482e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mouseX - 10, mouseY); ctx.lineTo(mouseX - 4, mouseY);
  ctx.moveTo(mouseX + 4, mouseY); ctx.lineTo(mouseX + 10, mouseY);
  ctx.moveTo(mouseX, mouseY - 10); ctx.lineTo(mouseX, mouseY - 4);
  ctx.moveTo(mouseX, mouseY + 4); ctx.lineTo(mouseX, mouseY + 10);
  ctx.stroke();
  // Outer ring
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 8, 0, Math.PI * 2);
  ctx.stroke();
  // Inner dot
  ctx.fillStyle = 'rgba(255,68,68,0.5)';
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 2, 0, Math.PI * 2);
  ctx.fill();
  // Rotation tick marks
  ctx.globalAlpha = 0.4;
  for (var t = 0; t < 4; t++) {
    var ta = (t / 4) * Math.PI * 2 + frame * 0.02;
    ctx.beginPath();
    ctx.moveTo(mouseX + Math.cos(ta) * 10, mouseY + Math.sin(ta) * 10);
    ctx.lineTo(mouseX + Math.cos(ta) * 12, mouseY + Math.sin(ta) * 12);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// === DRAW HUD ===
function drawHUD() {
  ctx.fillStyle = 'rgba(26,28,44,0.85)';
  ctx.fillRect(0, 0, GW, 24);
  // Top border glow
  ctx.fillStyle = 'rgba(56,217,115,0.15)';
  ctx.fillRect(0, 23, GW, 1);

  ctx.font = 'bold 11px monospace';

  // Score — [4] INT multiplier shown
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('POOP: ' + score, 6, 16);

  // Round
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.fillText('ROUND ' + round + '/20', GW / 2, 16);

  // Active spore cannons count
  ctx.fillStyle = '#38d973';
  ctx.textAlign = 'right';
  var activeCount = 0;
  for (var i = 0; i < cannons.length; i++) {
    if (cannons[i].active) activeCount++;
  }
  ctx.fillText('CANNONS: ' + activeCount, GW - 6, 16);
}

// === DRAW STAT BADGE ===
function drawStatBadge() {
  // Baseling identity badge in bottom-left
  ctx.fillStyle = 'rgba(26,28,44,0.7)';
  ctx.fillRect(0, GH - 38, 72, 18);
  ctx.strokeStyle = 'rgba(56,217,115,0.3)';
  ctx.strokeRect(0, GH - 38, 72, 18);

  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(selName, 4, GH - 26);
}

// === DRAW PHASE INDICATOR ===
function drawPhaseIndicator() {
  var barY = GH - 20;
  ctx.fillStyle = 'rgba(26,28,44,0.85)';
  ctx.fillRect(0, barY, GW, 20);
  ctx.fillStyle = 'rgba(56,217,115,0.15)';
  ctx.fillRect(0, barY, GW, 1);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  var phaseColors = {cannon: '#e6482e', build: '#3cacd7', place: '#f4b41b'};
  var phaseNames = {cannon: 'SPORE CANNONS FIRE!', build: 'GROW GARDEN WALLS', place: 'PLACE SPORE CANNONS'};
  ctx.fillStyle = phaseColors[phase] || '#fff';
  ctx.fillText(phaseNames[phase] || '', 6, barY + 14);

  var maxTime = phase === 'cannon' ? CANNON_TIME : phase === 'build' ? BUILD_TIME : PLACE_TIME;
  var timerPct = Math.max(0, phaseTimer / maxTime);
  var barW = 160;
  var barX = GW / 2 - barW / 2;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY + 5, barW, 10);
  var timerColor = timerPct > 0.3 ? phaseColors[phase] : '#e6482e';
  ctx.fillStyle = timerColor;
  ctx.fillRect(barX, barY + 5, barW * timerPct, 10);
  // Timer glow
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(barX, barY + 5, barW * timerPct, 3);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(barX, barY + 5, barW, 10);

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(Math.max(0, phaseTimer)) + 's', GW / 2, barY + 14);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  if (phase === 'build') {
    ctx.fillText('R=Rotate  Click=Place Bricks', GW - 6, barY + 14);
  } else if (phase === 'place') {
    ctx.fillText('Cannons left: ' + cannonsToPlace, GW - 6, barY + 14);
  } else if (phase === 'cannon') {
    ctx.fillText('Invaders: ' + enemies.length, GW - 6, barY + 14);
  }
}

// === DRAW PHASE TRANSITION ===
function drawPhaseTransition() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, GH / 2 - 35, GW, 70);
  // Border lines
  ctx.fillStyle = 'rgba(56,217,115,0.3)';
  ctx.fillRect(0, GH / 2 - 35, GW, 1);
  ctx.fillRect(0, GH / 2 + 34, GW, 1);

  ctx.textAlign = 'center';
  ctx.font = 'bold 20px monospace';

  var phaseColors = {cannon: '#e6482e', build: '#3cacd7', place: '#f4b41b'};
  var phaseNames = {cannon: 'SPORE CANNONS FIRE!', build: 'GROW GARDEN WALLS!', place: 'PLACE SPORE CANNONS!'};
  var phaseSubs = {
    cannon: 'Your baseling aims — destroy the fungal invaders!',
    build: 'Enclose your garden keep with mycelium bricks!',
    place: 'Deploy spore cannons inside your garden walls!'
  };

  // Drop shadow
  ctx.fillStyle = '#000';
  ctx.fillText(phaseNames[phase] || '', GW / 2 + 2, GH / 2 - 3);
  ctx.fillStyle = phaseColors[phase] || '#fff';
  ctx.fillText(phaseNames[phase] || '', GW / 2, GH / 2 - 5);

  ctx.font = '11px monospace';
  ctx.fillStyle = '#bbb';
  ctx.fillText(phaseSubs[phase] || '', GW / 2, GH / 2 + 18);

  // Round indicator
  if (phase === 'cannon') {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('Round ' + round + ' of 20', GW / 2, GH / 2 + 30);
  }
}

// === DRAW TUTORIAL ===
function drawTutorial() {
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(GW / 2 - 150, 30, 300, 110);
  ctx.strokeStyle = 'rgba(56,217,115,0.4)';
  ctx.strokeRect(GW / 2 - 150, 30, 300, 110);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('GARDEN WALL DEFENSE', GW / 2, 48);

  ctx.fillStyle = '#bbb';
  ctx.font = '9px monospace';
  ctx.fillText('1. BUILD mycelium bricks around your garden keep', GW / 2, 64);
  ctx.fillText('2. PLACE spore cannons inside walled gardens', GW / 2, 78);
  ctx.fillText('3. FIRE cannons to destroy fungal invaders', GW / 2, 92);
  ctx.fillText('Your baseling must keep the garden enclosed!', GW / 2, 108);

  ctx.fillStyle = '#666';
  ctx.fillText('Click or wait to dismiss', GW / 2, 126);
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Animated Spore Sea
  for (var r = 0; r < GRID_ROWS; r++) {
    for (var c = 0; c < WATER_END; c++) {
      var wave = Math.sin((c + r * 0.5 + frame * 0.018) * 0.5) * 0.15;
      var blue = Math.floor(35 + wave * 25);
      var green = Math.floor(18 + wave * 12 + Math.sin(c * 0.3 + frame * 0.01) * 6);
      ctx.fillStyle = 'rgb(6,' + green + ',' + blue + ')';
      ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
  }

  // Fungal land
  for (var r2 = 0; r2 < GRID_ROWS; r2++) {
    for (var c2 = LAND_START; c2 < GRID_COLS; c2++) {
      var gv = 18 + (c2 + r2) % 8;
      ctx.fillStyle = 'rgb(8,' + gv + ',6)';
      ctx.fillRect(c2 * GRID_SIZE, r2 * GRID_SIZE, GRID_SIZE, GRID_SIZE);
    }
  }

  // Castle silhouette — garden fortress
  ctx.fillStyle = '#1a2a20';
  ctx.fillRect(200, 100, 80, 120);
  ctx.fillRect(195, 95, 10, 125);
  ctx.fillRect(275, 95, 10, 125);
  ctx.fillRect(230, 80, 20, 140);
  // Spore towers
  ctx.fillStyle = '#223322';
  ctx.fillRect(192, 78, 16, 22);
  ctx.fillRect(272, 78, 16, 22);
  ctx.fillRect(226, 62, 28, 22);
  // Bioluminescent windows
  var winGlow = Math.sin(frame * 0.04) * 0.3 + 0.5;
  ctx.fillStyle = 'rgba(56,217,115,' + winGlow + ')';
  ctx.fillRect(215, 120, 4, 6);
  ctx.fillRect(230, 115, 4, 6);
  ctx.fillRect(245, 122, 4, 6);
  ctx.fillRect(260, 118, 4, 6);
  // Garden core glow at top
  ctx.fillStyle = 'rgba(56,217,115,' + (winGlow * 0.6) + ')';
  ctx.beginPath();
  ctx.arc(240, 70, 8 + Math.sin(frame * 0.03) * 2, 0, Math.PI * 2);
  ctx.fill();
  // Crenellations (spore caps)
  ctx.fillStyle = '#2a4a30';
  for (var i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(197 + i * 4, 78, 2, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(277 + i * 4, 78, 2, Math.PI, 0);
    ctx.fill();
  }

  // Mycelial network on ground
  ctx.strokeStyle = 'rgba(68,200,100,0.08)';
  ctx.lineWidth = 1;
  for (var m = 0; m < 12; m++) {
    var mx = 160 + m * 15;
    var my = 220 + Math.sin(m * 0.8) * 10;
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.quadraticCurveTo(mx + 10, my - 8 + Math.sin(frame * 0.01 + m) * 3, mx + 20, my + 5);
    ctx.stroke();
  }

  // Title text — with glow
  ctx.textAlign = 'center';

  // Glow
  ctx.fillStyle = 'rgba(56,217,115,0.15)';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('GARDEN SIEGE', GW / 2, 46);

  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('GARDEN SIEGE', GW / 2 + 2, 48 + 2);
  // Main
  ctx.fillStyle = '#38d973';
  ctx.fillText('GARDEN SIEGE', GW / 2, 48);

  ctx.fillStyle = '#7a444a';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Garden Defense', GW / 2, 66);

  // Retro-style controls on title screen — [stat display]
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  var controlY = GH - 100;
  ctx.fillText('Defend your garden fortress against the fungal invaders!', GW / 2, controlY);
  controlY += 14;
  ctx.fillText('FIRE: Click/Tap to aim your baseling spore cannons', GW / 2, controlY);
  controlY += 12;
  ctx.fillText('BUILD: Click to place mycelium bricks (R=Rotate)', GW / 2, controlY);
  controlY += 12;
  ctx.fillText('PLACE: Position new spore cannons inside garden walls', GW / 2, controlY);
  controlY += 14;

  // Controls layout
  ctx.fillStyle = '#666';
  ctx.fillText('[Arrow Keys / Mouse] Move   [Space / Click] Action   [R] Rotate', GW / 2, controlY);

  // Champion name + 5 arcade stat bars + picker prompt
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(selName, GW / 2, controlY + 16);
  drawTitleStatBars(GW / 2, controlY + 26, 220);
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, controlY + 46);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('BEST POOP: ' + highScore, GW / 2, 82);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('CLICK OR PRESS ANY KEY TO START', GW / 2, GH - 12);
  ctx.globalAlpha = 1;

  // Animated driftpod on title
  var shipX = ((frame * 0.4) % (GW + 60)) - 30;
  var shipBob = Math.sin(frame * 0.03) * 2;
  ctx.fillStyle = '#445533';
  ctx.beginPath();
  ctx.moveTo(shipX - 7, 145 + shipBob);
  ctx.quadraticCurveTo(shipX - 6, 150 + shipBob, shipX, 149 + shipBob);
  ctx.quadraticCurveTo(shipX + 6, 150 + shipBob, shipX + 7, 145 + shipBob);
  ctx.quadraticCurveTo(shipX + 6, 142 + shipBob, shipX, 143 + shipBob);
  ctx.quadraticCurveTo(shipX - 6, 142 + shipBob, shipX - 7, 145 + shipBob);
  ctx.fill();
  ctx.fillStyle = '#77aa44';
  ctx.beginPath();
  ctx.arc(shipX, 140 + shipBob, 4, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#556633';
  ctx.fillRect(shipX - 1, 136 + shipBob, 2, 6);

  // Second ship further back
  var ship2X = ((frame * 0.25 + 200) % (GW + 80)) - 40;
  var ship2Bob = Math.sin(frame * 0.025 + 2) * 1.5;
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#334422';
  ctx.beginPath();
  ctx.moveTo(ship2X - 5, 175 + ship2Bob);
  ctx.quadraticCurveTo(ship2X, 179 + ship2Bob, ship2X + 5, 175 + ship2Bob);
  ctx.quadraticCurveTo(ship2X, 172 + ship2Bob, ship2X - 5, 175 + ship2Bob);
  ctx.fill();
  ctx.fillStyle = '#557733';
  ctx.fillRect(ship2X - 1, 169 + ship2Bob, 2, 5);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
