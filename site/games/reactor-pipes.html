<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reactor Pipes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,luck,
// swim}, clamped to the single-player band (0.8–1.6). This game reads D&D-style fields on
// statB via statMod() helpers, so we keep statB's shape and synthesize its fields from the
// five bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20). Not a wager
// game -> default band. recomputeStats() re-runs after a title-screen character pick.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[reactor-pipes] NftLoader display info failed:', e && e.message); }

// Derived stat helpers
function statMod(val) { return Math.floor((val - 10) / 2); }
function strMod() { return statMod(statB.str); }
function dexMod() { return statMod(statB.dex); }
function conMod() { return statMod(statB.con); }
function intMod() { return statMod(statB.int); }
function wisMod() { return statMod(statB.wis); }
function chaMod() { return statMod(statB.cha); }

function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  // Re-derive config-like values (QUEUE_SIZE/scoreMultiplier). `lives` is game state,
  // reset in startGame(), so it is NOT touched here.
  QUEUE_SIZE = Math.min(8, BASE_QUEUE_SIZE + Math.max(0, intMod()));
  scoreMultiplier = 1.0 + Math.max(0, chaMod()) * 0.1;
}
var picking = false; // baseling character-select overlay is open

// === CONSTANTS ===
var GW = 400, GH = 400;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);

var GRID = 7;
var CELL = 40;
var GRID_X = 10;
var GRID_Y = 50;
var QUEUE_X = 320;
var QUEUE_Y = 60;
var BASE_QUEUE_SIZE = 5;
var QUEUE_SIZE = Math.min(8, BASE_QUEUE_SIZE + Math.max(0, intMod())); // INT expands queue

// Directions: 0=up, 1=right, 2=down, 3=left
var DX = [0, 1, 0, -1];
var DY = [-1, 0, 1, 0];
var DIR_NAMES = ['UP', 'RIGHT', 'DOWN', 'LEFT'];

// === THEMED PIPE TYPES ===
// Baseling POOP Pipeline themed pipes
var PIPE_TYPES = {
  H: { name: 'Mycelium Tube', openings: [1, 3], theme: 'mycelial' },
  V: { name: 'Taproot Pipe', openings: [0, 2], theme: 'mycelial' },
  TL: { name: 'Spore Valve Bend', openings: [0, 3], theme: 'spore' },
  TR: { name: 'Spore Valve Bend', openings: [0, 1], theme: 'spore' },
  BL: { name: 'Mold Connector', openings: [2, 3], theme: 'spore' },
  BR: { name: 'Mold Connector', openings: [1, 2], theme: 'spore' },
  X: { name: 'Fungal Junction', openings: [0, 1, 2, 3], theme: 'reactor' },
  RES: { name: 'POOP Vat', openings: [0, 1, 2, 3], theme: 'reactor' },
  REACTOR: { name: 'Compost Reactor', openings: [0, 1, 2, 3], theme: 'reactor' },
  FILTER: { name: 'Spore Filter', openings: [0, 2], theme: 'mycelial' },
  SPLIT: { name: 'Hyphae Splitter', openings: [0, 1, 3], theme: 'spore' }
};

var PIPE_KEYS = ['H', 'V', 'TL', 'TR', 'BL', 'BR', 'X', 'RES', 'REACTOR', 'FILTER', 'SPLIT'];
var BASIC_PIPES = ['H', 'V', 'TL', 'TR', 'BL', 'BR'];
var MEDIUM_PIPES = ['H', 'V', 'TL', 'TR', 'BL', 'BR', 'X', 'RES'];
var ALL_PIPES = ['H', 'V', 'TL', 'TR', 'BL', 'BR', 'X', 'RES', 'FILTER'];
var BOSS_PIPES = ['H', 'V', 'TL', 'TR', 'BL', 'BR', 'X', 'RES', 'REACTOR', 'SPLIT'];

// === ZONE DEFINITIONS ===
var ZONES = [
  { name: 'POOP Pipeline', bg: '#1a1c2c', gridBg: '#1e2030', accent: '#38d973', glow: '#2ab85e', pipe: '#2a3040', pipeFill: '#1e5a3a', coolant: '#38d973', particle: '#4ae88a', levels: [1,5] },
  { name: 'Spore Cavern', bg: '#1c1a2c', gridBg: '#221e30', accent: '#a855f7', glow: '#8b3ad4', pipe: '#2a2040', pipeFill: '#3e2266', coolant: '#b870ff', particle: '#c98aff', levels: [6,10] },
  { name: 'Compost Furnace', bg: '#2c1a1a', gridBg: '#301e1e', accent: '#e6482e', glow: '#c4351d', pipe: '#402020', pipeFill: '#662a2a', coolant: '#f06040', particle: '#ff7a55', levels: [11,15] },
  { name: 'Garden of Decay', bg: '#1a1c22', gridBg: '#1e2028', accent: '#3cacd7', glow: '#2a8fb5', pipe: '#1a2a3a', pipeFill: '#1e3a55', coolant: '#50c0e8', particle: '#66d0f0', levels: [16,20] }
];

function getZone(lv) {
  for (var i = 0; i < ZONES.length; i++) {
    if (lv >= ZONES[i].levels[0] && lv <= ZONES[i].levels[1]) return ZONES[i];
  }
  return ZONES[ZONES.length - 1];
}

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('reactorpipes_hi');
var level = 1;
var frame = 0;
var showTutorial = true;
var tutorialStep = 0;
var tutorialTimer = 0;
var bossLevel = false;
var bossHP = 0;
var bossMaxHP = 0;
var bossName = '';

// Grid: null = empty, { type, filled, fillDir, fillProgress, flowTick }
var grid = [];
var blocked = [];
var walls = [];
var startCell = { r: 0, c: 0, dir: 2 };
var startCells = [];

var queue = [];
var countdown = 0;
var countdownMax = 0;
var flowActive = false;
var flowTimer = 0;
var flowSpeed = 0.8;
var flowHead = null;
var flowHeads = [];
var segmentsFilled = 0;
var minSegments = 5;
var levelComplete = false;
var levelFailed = false;
var levelTransition = 0;
var replaceCost = 20;
var skipCost = 50;

// One-way valves
var oneWays = [];
var wrapEdges = false;
var replaceRestricted = false;

// Visual
var steamVents = [];
var corePhase = 0;
var flowParticles = [];
var scorePopups = [];
var shakeIntensity = 0;
var shakeDuration = 0;

// NES cursor for keyboard control
var cursorR = 3;
var cursorC = 3;
var cursorBlink = 0;

// Revealed tiles (WIS)
var revealedCells = [];

// Lives system (CON)
var lives = 1 + Math.max(0, conMod()) + statB.lives;
var maxLives = lives;

// Score multiplier (CHA)
var scoreMultiplier = 1.0 + Math.max(0, chaMod()) * 0.1;

// Luck bonus (affects pipe quality)
var luckBonus = statB.luck || 1;

// Boot the shared player module (silent — no wallet popup) and apply stats. Done here,
// after the config-like constants exist, so recomputeStats() can re-derive them.
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); luckBonus = statB.luck || 1; }).catch(function (e) { console.warn('[reactor-pipes] player init failed:', e && e.message); });
}

// === SCORE POPUP SYSTEM ===
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.2, maxLife: 1.2 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life -= dt;
    scorePopups[i].y -= 30 * dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = Math.min(1, sp.life / (sp.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === PIXEL ART HELPERS ===
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawPixelBorder(x, y, w, h, color, thickness) {
  var t = thickness || 1;
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), t); // top
  ctx.fillRect(Math.floor(x), Math.floor(y + h - t), Math.floor(w), t); // bottom
  ctx.fillRect(Math.floor(x), Math.floor(y), t, Math.floor(h)); // left
  ctx.fillRect(Math.floor(x + w - t), Math.floor(y), t, Math.floor(h)); // right
}

// NES-style dithered fill
function drawDitheredRect(x, y, w, h, color1, color2) {
  ctx.fillStyle = color1;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
  ctx.fillStyle = color2;
  for (var py = Math.floor(y); py < Math.floor(y + h); py += 2) {
    for (var px = Math.floor(x) + ((py % 4 === 0) ? 0 : 1); px < Math.floor(x + w); px += 2) {
      ctx.fillRect(px, py, 1, 1);
    }
  }
}

// NES-style character icon
function drawCharIcon(x, y, size) {
  var s = size || 16;
  var color = statB.color || '#44dd88';
  var icon = statB.icon || 'B';

  // Body
  drawPixelRect(x + s * 0.25, y + s * 0.1, s * 0.5, s * 0.8, color);
  // Head highlight
  drawPixelRect(x + s * 0.3, y + s * 0.15, s * 0.4, s * 0.3, '#fff');
  ctx.globalAlpha = 0.5;
  drawPixelRect(x + s * 0.3, y + s * 0.15, s * 0.4, s * 0.3, color);
  ctx.globalAlpha = 1;
  // Icon letter
  ctx.fillStyle = '#000';
  ctx.font = 'bold ' + Math.floor(s * 0.5) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(icon, x + s * 0.5, y + s * 0.65);
}

// === LEVEL DEFINITIONS ===
function getLevelConfig(lv) {
  var cfg = {
    countdown: 12,
    flowSpeed: 0.8,
    minSegments: 5,
    blockedCount: 0,
    wallCount: 0,
    oneWayCount: 0,
    multiStart: false,
    wrapEdges: false,
    replaceRestricted: false,
    pipePool: BASIC_PIPES,
    isBoss: false,
    bossName: '',
    bossHP: 0
  };

  // DEX bonus: faster countdown (more time to place), slightly slower flow
  var dexBonus = Math.max(0, dexMod()) * 0.5;
  // WIS bonus: fewer obstacles feel invisible (reveal mechanic)
  // STR bonus: reduce replace/skip costs
  var strDiscount = Math.max(0, strMod()) * 3;

  // Boss levels every 5
  if (lv % 5 === 0 && lv > 0) {
    cfg.isBoss = true;
    if (lv === 5) { cfg.bossName = 'Clogged POOP Golem'; cfg.bossHP = 8; }
    else if (lv === 10) { cfg.bossName = 'Sporeling Overmind'; cfg.bossHP = 14; }
    else if (lv === 15) { cfg.bossName = 'Compost Meltdown'; cfg.bossHP = 20; }
    else { cfg.bossName = 'Rot Wyrm of Tasern'; cfg.bossHP = 28; }
  }

  if (lv <= 5) {
    cfg.countdown = 14 - lv + dexBonus;
    cfg.flowSpeed = 1.0 - lv * 0.02 + dexMod() * 0.01;
    cfg.minSegments = 4 + lv;
    cfg.pipePool = BASIC_PIPES.concat(lv >= 3 ? ['X'] : []).concat(lv >= 4 ? ['RES'] : []);
    if (lv === 5) { cfg.pipePool = BOSS_PIPES; cfg.minSegments = 8; cfg.blockedCount = 2; }
  } else if (lv <= 10) {
    cfg.countdown = 9 - (lv - 6) * 0.5 + dexBonus;
    cfg.flowSpeed = 0.85 - (lv - 6) * 0.03 + dexMod() * 0.01;
    cfg.minSegments = 8 + (lv - 6) * 2;
    cfg.blockedCount = 2 + (lv - 6);
    cfg.pipePool = MEDIUM_PIPES;
    if (lv === 10) { cfg.pipePool = BOSS_PIPES; cfg.minSegments = 14; cfg.wallCount = 2; }
  } else if (lv <= 15) {
    cfg.countdown = 7 - (lv - 11) * 0.4 + dexBonus;
    cfg.flowSpeed = 0.7 - (lv - 11) * 0.02 + dexMod() * 0.01;
    cfg.minSegments = 14 + (lv - 11) * 2;
    cfg.blockedCount = 3 + (lv - 11);
    cfg.wallCount = 2 + (lv - 11);
    cfg.oneWayCount = 1 + Math.floor((lv - 11) / 2);
    cfg.pipePool = ALL_PIPES;
    if (lv === 15) { cfg.pipePool = BOSS_PIPES; cfg.minSegments = 20; cfg.oneWayCount = 3; }
  } else {
    cfg.countdown = 6 - (lv - 16) * 0.3 + dexBonus;
    cfg.flowSpeed = 0.6 - (lv - 16) * 0.02 + dexMod() * 0.01;
    cfg.minSegments = 18 + (lv - 16) * 3;
    cfg.blockedCount = 4 + (lv - 16);
    cfg.wallCount = 3;
    cfg.oneWayCount = 2;
    cfg.multiStart = lv >= 17;
    cfg.wrapEdges = lv >= 18;
    cfg.replaceRestricted = lv >= 19;
    cfg.pipePool = ALL_PIPES;
    if (lv === 20) { cfg.pipePool = BOSS_PIPES; cfg.minSegments = 25; cfg.bossHP = 28; }
  }

  // Ensure countdown doesn't go below minimum
  cfg.countdown = Math.max(3, cfg.countdown);
  cfg.flowSpeed = Math.max(0.3, cfg.flowSpeed);

  // Apply STR discount to costs
  replaceCost = Math.max(5, 20 - strDiscount);
  skipCost = Math.max(15, 50 - strDiscount * 2);

  return cfg;
}

// === INIT LEVEL ===
function initLevel() {
  var cfg = getLevelConfig(level);
  grid = [];
  blocked = [];
  walls = [];
  oneWays = [];
  steamVents = [];
  flowParticles = [];
  startCells = [];
  scorePopups = [];
  revealedCells = [];

  bossLevel = cfg.isBoss;
  bossHP = cfg.bossHP;
  bossMaxHP = cfg.bossHP;
  bossName = cfg.bossName;

  // INT bonus: expanded queue
  QUEUE_SIZE = Math.min(8, BASE_QUEUE_SIZE + Math.max(0, intMod()));

  for (var r = 0; r < GRID; r++) {
    grid[r] = [];
    blocked[r] = [];
    for (var c = 0; c < GRID; c++) {
      grid[r][c] = null;
      blocked[r][c] = false;
    }
  }

  // Place start cell
  var edge = TAS.math.randInt(0, 3);
  if (edge === 0) { startCell = { r: 0, c: TAS.math.randInt(1, 5), dir: 2 }; }
  else if (edge === 1) { startCell = { r: TAS.math.randInt(1, 5), c: GRID - 1, dir: 3 }; }
  else if (edge === 2) { startCell = { r: GRID - 1, c: TAS.math.randInt(1, 5), dir: 0 }; }
  else { startCell = { r: TAS.math.randInt(1, 5), c: 0, dir: 1 }; }

  blocked[startCell.r][startCell.c] = true;
  grid[startCell.r][startCell.c] = { type: 'START', filled: true, fillProgress: 1 };

  // Multiple starts for later levels
  if (cfg.multiStart) {
    var edge2 = (edge + 2) % 4;
    var s2;
    if (edge2 === 0) { s2 = { r: 0, c: TAS.math.randInt(1, 5), dir: 2 }; }
    else if (edge2 === 1) { s2 = { r: TAS.math.randInt(1, 5), c: GRID - 1, dir: 3 }; }
    else if (edge2 === 2) { s2 = { r: GRID - 1, c: TAS.math.randInt(1, 5), dir: 0 }; }
    else { s2 = { r: TAS.math.randInt(1, 5), c: 0, dir: 1 }; }
    if (!blocked[s2.r][s2.c]) {
      blocked[s2.r][s2.c] = true;
      grid[s2.r][s2.c] = { type: 'START', filled: true, fillProgress: 1 };
      startCells.push(s2);
    }
  }
  startCells.unshift(startCell);

  // Place blocked cells
  var placed = 0;
  var attempts = 0;
  while (placed < cfg.blockedCount && attempts < 100) {
    var br = TAS.math.randInt(0, GRID - 1);
    var bc = TAS.math.randInt(0, GRID - 1);
    if (!blocked[br][bc]) {
      blocked[br][bc] = true;
      placed++;
    }
    attempts++;
  }

  // Place walls
  for (var w = 0; w < cfg.wallCount; w++) {
    var wr = TAS.math.randInt(0, GRID - 2);
    var wc = TAS.math.randInt(0, GRID - 2);
    var wd = TAS.math.randInt(1, 2);
    walls.push({ r: wr, c: wc, dir: wd });
  }

  // Place one-way valves
  for (var ow = 0; ow < cfg.oneWayCount; ow++) {
    var owr = TAS.math.randInt(1, GRID - 2);
    var owc = TAS.math.randInt(1, GRID - 2);
    if (!blocked[owr][owc]) {
      oneWays.push({ r: owr, c: owc, dir: TAS.math.randInt(0, 3) });
    }
  }

  // WIS bonus: reveal hidden info (walls, one-ways light up)
  if (wisMod() > 0) {
    var revealCount = Math.min(oneWays.length + walls.length, wisMod() * 2);
    for (var rv = 0; rv < revealCount && rv < oneWays.length; rv++) {
      revealedCells.push({ r: oneWays[rv].r, c: oneWays[rv].c, type: 'oneway' });
    }
  }

  wrapEdges = cfg.wrapEdges;
  replaceRestricted = cfg.replaceRestricted;

  // Fill queue (INT bonus: bigger queue)
  queue = [];
  for (var q = 0; q < QUEUE_SIZE + 1; q++) {
    queue.push(randomPipe(cfg.pipePool));
  }

  // Setup flow
  countdown = cfg.countdown;
  countdownMax = cfg.countdown;
  flowSpeed = cfg.flowSpeed;
  minSegments = cfg.minSegments;
  flowActive = false;
  flowHeads = [];
  flowHead = null;
  segmentsFilled = 0;
  levelComplete = false;
  levelFailed = false;
  levelTransition = 0;

  // Steam vents
  for (var sv = 0; sv < 6; sv++) {
    steamVents.push({
      x: TAS.math.randInt(0, GW),
      y: sv < 3 ? 0 : GH,
      timer: Math.random() * 3,
      interval: 1.5 + Math.random() * 2
    });
  }

  // Place cursor at start cell neighbor for NES controls
  cursorR = Math.min(GRID - 1, Math.max(0, startCell.r + DY[startCell.dir]));
  cursorC = Math.min(GRID - 1, Math.max(0, startCell.c + DX[startCell.dir]));
}

function randomPipe(pool) {
  // LUCK bonus: higher chance of good pipes (X, RES, REACTOR)
  if (luckBonus > 1 && Math.random() < (luckBonus - 1) * 0.15) {
    var goodPipes = pool.filter(function(p) { return p === 'X' || p === 'RES' || p === 'REACTOR' || p === 'SPLIT'; });
    if (goodPipes.length > 0) return goodPipes[TAS.math.randInt(0, goodPipes.length - 1)];
  }
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  level = 1;
  lives = 1 + Math.max(0, conMod()) + statB.lives;
  maxLives = lives;
  TAS.particles.clear();
  initLevel();
  TAS.audio.ensureAudio();
  if (showTutorial) {
    tutorialStep = 0;
    tutorialTimer = 0;
  }
}

// === INPUT ===
var clickX = -1, clickY = -1;
var clicked = false;
var keyJustPressed = {};

TAS.canvas.addEventListener('mousedown', function(e) {
  TAS.audio.ensureAudio();
  var rect = TAS.canvas.getBoundingClientRect();
  var scaleX = GW / rect.width;
  var scaleY = GH / rect.height;
  clickX = (e.clientX - rect.left) * scaleX;
  clickY = (e.clientY - rect.top) * scaleY;
  clicked = true;
});

TAS.canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  TAS.audio.ensureAudio();
  if (e.touches.length > 0) {
    var rect = TAS.canvas.getBoundingClientRect();
    var scaleX = GW / rect.width;
    var scaleY = GH / rect.height;
    clickX = (e.touches[0].clientX - rect.left) * scaleX;
    clickY = (e.touches[0].clientY - rect.top) * scaleY;
    clicked = true;
  }
}, { passive: false });

// NES keyboard controls
var keysDown = {};
var keysJust = {};
document.addEventListener('keydown', function(e) {
  if (!keysDown[e.code]) keysJust[e.code] = true;
  keysDown[e.code] = true;
});
document.addEventListener('keyup', function(e) {
  keysDown[e.code] = false;
});

function consumeKey(code) {
  if (keysJust[code]) { keysJust[code] = false; return true; }
  return false;
}

function clearKeys() {
  keysJust = {};
}

// === PIPE CONNECTION LOGIC ===
function getOpposite(dir) {
  return (dir + 2) % 4;
}

function pipeHasOpening(type, dir) {
  var p = PIPE_TYPES[type];
  if (!p) return false;
  return p.openings.indexOf(dir) >= 0;
}

function hasWallBetween(r1, c1, dir) {
  for (var i = 0; i < walls.length; i++) {
    var w = walls[i];
    if (w.r === r1 && w.c === c1 && w.dir === dir) return true;
    var nr = r1 + DY[dir];
    var nc = c1 + DX[dir];
    var opp = getOpposite(dir);
    if (w.r === nr && w.c === nc && w.dir === opp) return true;
  }
  return false;
}

function getOneWayDir(r, c) {
  for (var i = 0; i < oneWays.length; i++) {
    if (oneWays[i].r === r && oneWays[i].c === c) return oneWays[i].dir;
  }
  return -1;
}

function getNextCell(r, c, dir) {
  var nr = r + DY[dir];
  var nc = c + DX[dir];
  if (wrapEdges) {
    nr = ((nr % GRID) + GRID) % GRID;
    nc = ((nc % GRID) + GRID) % GRID;
  }
  if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) return null;
  return { r: nr, c: nc };
}

function getExitDir(type, enterDir) {
  var p = PIPE_TYPES[type];
  if (!p) return -1;

  var enterSide = getOpposite(enterDir);
  if (p.openings.indexOf(enterSide) < 0) return -1;

  // Cross, reservoir, reactor core: flow continues straight
  if (type === 'X' || type === 'RES' || type === 'REACTOR') {
    if (p.openings.indexOf(enterDir) >= 0) return enterDir;
    return -1;
  }

  // Filter: only vertical, flow goes through with bonus
  if (type === 'FILTER') {
    if (enterSide === 0 || enterSide === 2) {
      return enterDir;
    }
    return -1;
  }

  // Splitter: 3-way, flow continues straight if possible
  if (type === 'SPLIT') {
    if (p.openings.indexOf(enterDir) >= 0) return enterDir;
    // Otherwise pick first available exit
    for (var si = 0; si < p.openings.length; si++) {
      if (p.openings[si] !== enterSide) return p.openings[si];
    }
    return -1;
  }

  // For 2-opening pipes: exit through the other opening
  for (var i = 0; i < p.openings.length; i++) {
    if (p.openings[i] !== enterSide) {
      return p.openings[i];
    }
  }
  return -1;
}

// === FLOW LOGIC ===
function startFlow() {
  flowActive = true;
  flowHeads = [];
  for (var i = 0; i < startCells.length; i++) {
    var sc = startCells[i];
    flowHeads.push({
      r: sc.r + DY[sc.dir],
      c: sc.c + DX[sc.dir],
      enterDir: sc.dir,
      progress: 0,
      dead: false,
      reservoirDelay: 0
    });
    if (wrapEdges) {
      var fh = flowHeads[flowHeads.length - 1];
      fh.r = ((fh.r % GRID) + GRID) % GRID;
      fh.c = ((fh.c % GRID) + GRID) % GRID;
    }
  }
  flowTimer = 0;
}

function advanceFlow(dt) {
  var zone = getZone(level);
  flowTimer += dt;
  var allDead = true;

  for (var fi = 0; fi < flowHeads.length; fi++) {
    var fh = flowHeads[fi];
    if (fh.dead) continue;

    // Reservoir delay
    if (fh.reservoirDelay > 0) {
      fh.reservoirDelay -= dt;
      allDead = false;
      continue;
    }

    fh.progress += dt / flowSpeed;

    if (fh.progress >= 1) {
      fh.progress = 0;

      var cell = grid[fh.r] ? grid[fh.r][fh.c] : null;
      if (cell) {
        cell.filled = true;
        cell.fillProgress = 1;
        segmentsFilled++;

        // Base score with CHA multiplier
        var baseScore = 10;
        var bonusText = '';

        // Type bonuses
        if (cell.type === 'X') { baseScore += 15; bonusText = 'FUNGAL +25'; }
        else if (cell.type === 'RES') { baseScore += 25; bonusText = 'POOP VAT +35'; }
        else if (cell.type === 'REACTOR') { baseScore += 40; bonusText = 'COMPOST +50'; }
        else if (cell.type === 'FILTER') { baseScore += 20; bonusText = 'FILTERED +30'; }
        else if (cell.type === 'SPLIT') { baseScore += 30; bonusText = 'HYPHAE +40'; }

        // Apply CHA score multiplier
        var earnedScore = Math.floor(baseScore * scoreMultiplier * statB.scoreMult);
        score += earnedScore;

        // Boss damage
        if (bossLevel && bossHP > 0) {
          bossHP = Math.max(0, bossHP - 1);
          if (bossHP === 0) {
            score += Math.floor(200 * scoreMultiplier);
            addScorePopup(GW / 2, GH / 2, bossName + ' DEFEATED! +200', '#f4b41b');
            TAS.audio.playMelody([[440, 0.08], [550, 0.08], [660, 0.08], [880, 0.08], [1100, 0.15]], 80);
          }
        }

        // Score popup
        if (bonusText) {
          var px = GRID_X + fh.c * CELL + CELL / 2;
          var py = GRID_Y + fh.r * CELL;
          addScorePopup(px, py, bonusText, zone.accent);
        }

        // Determine exit direction
        var exitDir = getExitDir(cell.type, fh.enterDir);

        // One-way restriction
        var owDir = getOneWayDir(fh.r, fh.c);
        if (owDir >= 0 && exitDir !== owDir) {
          fh.dead = true;
          continue;
        }

        if (exitDir < 0) {
          fh.dead = true;
          continue;
        }

        // Check wall
        if (hasWallBetween(fh.r, fh.c, exitDir)) {
          fh.dead = true;
          continue;
        }

        // Move to next cell
        var next = getNextCell(fh.r, fh.c, exitDir);
        if (!next) {
          fh.dead = true;
          continue;
        }

        var nextCell = grid[next.r] ? grid[next.r][next.c] : null;
        if (!nextCell || blocked[next.r][next.c]) {
          fh.dead = true;
          continue;
        }

        var nextEnterSide = getOpposite(exitDir);
        if (!pipeHasOpening(nextCell.type, nextEnterSide)) {
          fh.dead = true;
          continue;
        }

        if (nextCell.filled) {
          fh.dead = true;
          continue;
        }

        fh.r = next.r;
        fh.c = next.c;
        fh.enterDir = exitDir;

        // Reservoir/reactor delay
        if (nextCell.type === 'RES') {
          fh.reservoirDelay = flowSpeed * 2;
        } else if (nextCell.type === 'REACTOR') {
          fh.reservoirDelay = flowSpeed * 3;
        }

        // Zone-themed particles + flow trail
        var ppx = GRID_X + fh.c * CELL + CELL / 2;
        var ppy = GRID_Y + fh.r * CELL + CELL / 2;
        TAS.particles.spawn(ppx, ppy, zone.particle, 3, 1.5, { size: 1, sizeVar: 1 });
        addFlowTrail(ppx, ppy, zone.coolant);

        // Combo tracking
        addCombo();

        // Sound (pitch scales with segments)
        TAS.audio.playTone(200 + segmentsFilled * 8, 0.08, 'sine', 0.04);
      } else {
        fh.dead = true;
        continue;
      }

      allDead = false;
    } else {
      var curCell = grid[fh.r] ? grid[fh.r][fh.c] : null;
      if (curCell && !curCell.filled) {
        curCell.fillProgress = fh.progress;
        curCell.fillDir = fh.enterDir;
      }
      allDead = false;
    }
  }

  if (allDead || flowHeads.length === 0) {
    endFlow();
  }
}

function endFlow() {
  flowActive = false;
  var zone = getZone(level);

  // Boss level: must defeat boss AND meet segments
  var bossDefeated = !bossLevel || bossHP <= 0;

  if (segmentsFilled >= minSegments && bossDefeated) {
    levelComplete = true;
    var bonus = Math.floor((50 + level * 10) * scoreMultiplier);
    score += bonus;
    addScorePopup(GW / 2, GH / 2 - 40, 'LEVEL CLEAR! +' + bonus, zone.accent);
    if (score > highScore) {
      highScore = score;
      TAS.score.save('reactorpipes_hi', highScore);
    }
    TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 100);
    TAS.fx.flash(zone.accent, 0.3);
  } else {
    // CON: lives system
    lives--;
    if (lives > 0) {
      levelFailed = true;
      addScorePopup(GW / 2, GH / 2, 'SPORE LEAK! Lives: ' + lives, '#ff4444');
      TAS.audio.playMelody([[300, 0.15], [200, 0.15], [150, 0.3]], 120);
      TAS.fx.flash('#ff4444', 0.4);
      shakeIntensity = 8;
      shakeDuration = 0.5;
    } else {
      levelFailed = true;
      TAS.audio.playMelody([[300, 0.15], [200, 0.15], [150, 0.3]], 120);
      TAS.fx.flash('#ff4444', 0.4);
      shakeIntensity = 12;
      shakeDuration = 0.8;
    }
  }
  levelTransition = 2.5;
}

// === PLACE PIPE ===
function placePipe(r, c) {
  if (r < 0 || r >= GRID || c < 0 || c >= GRID) return false;
  if (blocked[r][c]) return false;

  var existing = grid[r][c];
  if (existing && existing.type === 'START') return false;

  if (existing) {
    if (existing.filled) return false;
    if (replaceRestricted && flowActive) return false;
    // STR reduces replace cost
    score = Math.max(0, score - replaceCost);
    addScorePopup(GRID_X + c * CELL + CELL / 2, GRID_Y + r * CELL, '-' + replaceCost + ' POOP', '#7a444a');
    TAS.audio.playTone(150, 0.1, 'triangle', 0.06);
  } else {
    TAS.audio.playTone(600, 0.06, 'square', 0.04);
  }

  var type = queue[0];
  grid[r][c] = { type: type, filled: false, fillProgress: 0, fillDir: -1 };
  queue.shift();
  queue.push(randomPipe(getLevelConfig(level).pipePool));

  TAS.particles.spawn(
    GRID_X + c * CELL + CELL / 2,
    GRID_Y + r * CELL + CELL / 2,
    getZone(level).particle, 5, 2, { size: 1, sizeVar: 2 }
  );

  return true;
}

function skipPiece() {
  if (queue.length < 2) return;
  score = Math.max(0, score - skipCost);
  addScorePopup(QUEUE_X + 30, QUEUE_Y, '-' + skipCost + ' POOP', '#7a444a');
  queue.shift();
  queue.push(randomPipe(getLevelConfig(level).pipePool));
  TAS.audio.playTone(100, 0.08, 'sawtooth', 0.03);
}

// === TUTORIAL ===
var TUTORIAL_STEPS = [
  { text: 'Lay pipes on the grid\nbefore the POOP flows!', x: 140, y: 160, dur: 3.5 },
  { text: 'Use ARROW KEYS to move\nZ to place, X to skip', x: 140, y: 180, dur: 3.5 },
  { text: 'Route enough spore flow\nto clear each level!', x: 140, y: 200, dur: 3.0 },
  { text: 'Your baseling stats\nshape how you plumb!', x: 140, y: 160, dur: 3.5 }
];

function updateTutorial(dt) {
  if (!showTutorial || tutorialStep >= TUTORIAL_STEPS.length) return;
  tutorialTimer += dt;
  if (tutorialTimer >= TUTORIAL_STEPS[tutorialStep].dur) {
    tutorialTimer = 0;
    tutorialStep++;
    if (tutorialStep >= TUTORIAL_STEPS.length) {
      showTutorial = false;
    }
  }
}

function drawTutorial() {
  if (!showTutorial || tutorialStep >= TUTORIAL_STEPS.length) return;
  var step = TUTORIAL_STEPS[tutorialStep];
  var alpha = 1;
  if (tutorialTimer < 0.3) alpha = tutorialTimer / 0.3;
  if (tutorialTimer > step.dur - 0.5) alpha = (step.dur - tutorialTimer) / 0.5;

  ctx.globalAlpha = alpha * 0.85;
  drawPixelRect(step.x - 100, step.y - 20, 200, 50, '#000');
  drawPixelBorder(step.x - 100, step.y - 20, 200, 50, '#38d973', 2);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#c4f5d8';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  var lines = step.text.split('\n');
  for (var li = 0; li < lines.length; li++) {
    ctx.fillText(lines[li], step.x, step.y + li * 14);
  }
  ctx.globalAlpha = 1;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  corePhase += dt * 2;
  cursorBlink += dt;
  updateScorePopups(dt);

  // Custom shake update
  if (shakeDuration > 0) {
    shakeDuration -= dt;
    if (shakeDuration <= 0) shakeIntensity = 0;
  }

  // Steam vents with zone colors
  var zone = getZone(level);
  for (var sv = 0; sv < steamVents.length; sv++) {
    steamVents[sv].timer -= dt;
    if (steamVents[sv].timer <= 0) {
      steamVents[sv].timer = steamVents[sv].interval;
      TAS.particles.spawn(steamVents[sv].x, steamVents[sv].y, zone.particle, 3, 0.8, { size: 2, sizeVar: 2, gravity: steamVents[sv].y === 0 ? 0.3 : -0.3 });
    }
  }

  if (state === 'title') {
    if (picking) { clearKeys(); return; } // overlay open — swallow game input
    if (consumeKey('KeyC')) {
      picking = true;
      TAS.player.select(function () { recomputeStats(); luckBonus = statB.luck || 1; picking = false; });
      clearKeys();
      return;
    }
    if (clicked) { clicked = false; startGame(); return; }
    if (consumeKey('KeyZ') || consumeKey('Enter') || consumeKey('Space')) { startGame(); return; }
    clearKeys();
    return;
  }

  if (state === 'gameOver') {
    if (clicked) { clicked = false; state = 'title'; return; }
    if (consumeKey('KeyZ') || consumeKey('Enter') || consumeKey('Space')) { state = 'title'; return; }
    clearKeys();
    return;
  }

  if (state === 'playing') {
    updateTutorial(dt);

    // Level transition
    if (levelComplete || levelFailed) {
      levelTransition -= dt;
      if (levelTransition <= 0) {
        if (levelComplete) {
          level++;
          if (level > 20) {
            state = 'gameOver';
            clearKeys();
            return;
          }
          initLevel();
        } else {
          if (lives > 0) {
            // Retry level with CON lives
            initLevel();
          } else {
            state = 'gameOver';
          }
        }
      }
      clearKeys();
      return;
    }

    // Countdown before flow
    if (!flowActive) {
      countdown -= dt;
      if (countdown <= 0) {
        startFlow();
      }
    }

    // Advance flow
    if (flowActive) {
      advanceFlow(dt);
    }

    // NES keyboard controls
    if (consumeKey('ArrowUp')) { cursorR = Math.max(0, cursorR - 1); TAS.audio.playTone(800, 0.03, 'square', 0.02); }
    if (consumeKey('ArrowDown')) { cursorR = Math.min(GRID - 1, cursorR + 1); TAS.audio.playTone(800, 0.03, 'square', 0.02); }
    if (consumeKey('ArrowLeft')) { cursorC = Math.max(0, cursorC - 1); TAS.audio.playTone(800, 0.03, 'square', 0.02); }
    if (consumeKey('ArrowRight')) { cursorC = Math.min(GRID - 1, cursorC + 1); TAS.audio.playTone(800, 0.03, 'square', 0.02); }
    if (consumeKey('KeyZ') || consumeKey('Enter')) {
      placePipe(cursorR, cursorC);
    }
    if (consumeKey('KeyX') || consumeKey('Backspace')) {
      skipPiece();
    }

    // Handle click/tap
    if (clicked) {
      clicked = false;

      var gr = Math.floor((clickY - GRID_Y) / CELL);
      var gc = Math.floor((clickX - GRID_X) / CELL);

      if (gr >= 0 && gr < GRID && gc >= 0 && gc < GRID) {
        cursorR = gr;
        cursorC = gc;
        placePipe(gr, gc);
      }

      // Skip button
      if (clickX >= QUEUE_X - 5 && clickX <= QUEUE_X + 70 &&
          clickY >= QUEUE_Y + QUEUE_SIZE * 50 + 10 && clickY <= QUEUE_Y + QUEUE_SIZE * 50 + 40) {
        skipPiece();
      }
    }

    clearKeys();
  }
}

// === DRAW PIPE (NES pixel art style) ===
function drawPipe(x, y, size, type, filled, fillProgress, fillDir) {
  var zone = getZone(level);
  var cx = x + size / 2;
  var cy = y + size / 2;
  var half = size / 2;
  var pipeW = size * 0.3;
  var halfPW = pipeW / 2;

  var openings = PIPE_TYPES[type] ? PIPE_TYPES[type].openings : [];
  var theme = PIPE_TYPES[type] ? PIPE_TYPES[type].theme : 'mycelial';

  // Pipe color based on theme and zone
  var pipeColor = filled ? zone.pipeFill : zone.pipe;
  var pipeStroke = theme === 'reactor' ? '#7a444a' : (theme === 'spore' ? '#6040a0' : '#3a5060');

  // NES pixel style: use filled rects instead of strokes
  if (type === 'H') {
    drawPixelRect(x, cy - halfPW, size, pipeW, pipeColor);
    drawPixelBorder(x, cy - halfPW, size, pipeW, pipeStroke);
    // Rivet details
    drawPixelRect(x + 4, cy - 1, 2, 2, pipeStroke);
    drawPixelRect(x + size - 6, cy - 1, 2, 2, pipeStroke);
  } else if (type === 'V') {
    drawPixelRect(cx - halfPW, y, pipeW, size, pipeColor);
    drawPixelBorder(cx - halfPW, y, pipeW, size, pipeStroke);
    drawPixelRect(cx - 1, y + 4, 2, 2, pipeStroke);
    drawPixelRect(cx - 1, y + size - 6, 2, 2, pipeStroke);
  } else if (type === 'TL') {
    drawPixelRect(x, cy - halfPW, half + halfPW, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, y, pipeW, half + halfPW, pipeColor);
    drawPixelBorder(x, cy - halfPW, half + halfPW, pipeW, pipeStroke);
    drawPixelBorder(cx - halfPW, y, pipeW, half + halfPW, pipeStroke);
    // Corner detail
    drawPixelRect(cx - 2, cy - 2, 4, 4, pipeStroke);
  } else if (type === 'TR') {
    drawPixelRect(cx - halfPW, cy - halfPW, half + halfPW, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, y, pipeW, half + halfPW, pipeColor);
    drawPixelBorder(cx - halfPW, cy - halfPW, half + halfPW, pipeW, pipeStroke);
    drawPixelBorder(cx - halfPW, y, pipeW, half + halfPW, pipeStroke);
    drawPixelRect(cx - 2, cy - 2, 4, 4, pipeStroke);
  } else if (type === 'BL') {
    drawPixelRect(x, cy - halfPW, half + halfPW, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, cy - halfPW, pipeW, half + halfPW, pipeColor);
    drawPixelBorder(x, cy - halfPW, half + halfPW, pipeW, pipeStroke);
    drawPixelBorder(cx - halfPW, cy - halfPW, pipeW, half + halfPW, pipeStroke);
    drawPixelRect(cx - 2, cy - 2, 4, 4, pipeStroke);
  } else if (type === 'BR') {
    drawPixelRect(cx - halfPW, cy - halfPW, half + halfPW, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, cy - halfPW, pipeW, half + halfPW, pipeColor);
    drawPixelBorder(cx - halfPW, cy - halfPW, half + halfPW, pipeW, pipeStroke);
    drawPixelBorder(cx - halfPW, cy - halfPW, pipeW, half + halfPW, pipeStroke);
    drawPixelRect(cx - 2, cy - 2, 4, 4, pipeStroke);
  } else if (type === 'X') {
    drawPixelRect(x, cy - halfPW, size, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, y, pipeW, size, pipeColor);
    drawPixelBorder(x, cy - halfPW, size, pipeW, pipeStroke);
    drawPixelBorder(cx - halfPW, y, pipeW, size, pipeStroke);
    // Junction core
    drawPixelRect(cx - 3, cy - 3, 6, 6, '#7a444a');
    drawPixelRect(cx - 1, cy - 1, 2, 2, '#f4b41b');
  } else if (type === 'RES') {
    // Spore Chamber: big tank
    drawPixelRect(x + 3, y + 3, size - 6, size - 6, pipeColor);
    drawPixelBorder(x + 3, y + 3, size - 6, size - 6, '#7a444a', 2);
    // Openings
    drawPixelRect(cx - halfPW, y, pipeW, 3, pipeColor);
    drawPixelRect(cx - halfPW, y + size - 3, pipeW, 3, pipeColor);
    drawPixelRect(x, cy - halfPW, 3, pipeW, pipeColor);
    drawPixelRect(x + size - 3, cy - halfPW, 3, pipeW, pipeColor);
    // Spore dots inside
    if (!filled) {
      ctx.fillStyle = '#556655';
      ctx.fillRect(cx - 4, cy - 4, 2, 2);
      ctx.fillRect(cx + 2, cy + 1, 2, 2);
      ctx.fillRect(cx - 1, cy + 3, 2, 2);
    }
    // Label
    ctx.fillStyle = '#7a444a';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('POO', cx, cy + 2);
  } else if (type === 'REACTOR') {
    // Reactor Core: glowing center
    drawPixelRect(x + 2, y + 2, size - 4, size - 4, '#7a444a');
    drawPixelBorder(x + 2, y + 2, size - 4, size - 4, '#f4b41b', 2);
    // Openings
    drawPixelRect(cx - halfPW, y, pipeW, 2, '#f4b41b');
    drawPixelRect(cx - halfPW, y + size - 2, pipeW, 2, '#f4b41b');
    drawPixelRect(x, cy - halfPW, 2, pipeW, '#f4b41b');
    drawPixelRect(x + size - 2, cy - halfPW, 2, pipeW, '#f4b41b');
    // Pulsing core
    var rPulse = Math.sin(corePhase * 4) * 0.3 + 0.7;
    ctx.globalAlpha = rPulse;
    drawPixelRect(cx - 4, cy - 4, 8, 8, '#f4b41b');
    drawPixelRect(cx - 2, cy - 2, 4, 4, '#ffe080');
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#f4b41b';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CMP', cx, cy + 8);
  } else if (type === 'FILTER') {
    // Mycelial Filter: vertical with mesh
    drawPixelRect(cx - halfPW, y, pipeW, size, pipeColor);
    drawPixelBorder(cx - halfPW, y, pipeW, size, pipeStroke);
    // Mesh lines
    for (var mi = 0; mi < 4; mi++) {
      drawPixelRect(cx - halfPW + 2, y + 6 + mi * 8, pipeW - 4, 1, '#38d973');
    }
    ctx.fillStyle = '#38d973';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPR', cx, cy + 2);
  } else if (type === 'SPLIT') {
    // Spore Splitter: T-shape (up, left, right)
    drawPixelRect(x, cy - halfPW, size, pipeW, pipeColor);
    drawPixelRect(cx - halfPW, y, pipeW, half + halfPW, pipeColor);
    drawPixelBorder(x, cy - halfPW, size, pipeW, '#a855f7');
    drawPixelBorder(cx - halfPW, y, pipeW, half + halfPW, '#a855f7');
    drawPixelRect(cx - 2, cy - 2, 4, 4, '#b870ff');
    ctx.fillStyle = '#b870ff';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HYP', cx, cy + 8);
  }

  // Draw coolant fill (zone-themed glow)
  if (fillProgress > 0 && type !== 'RES' && type !== 'REACTOR') {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = zone.coolant;
    ctx.shadowColor = zone.coolant;
    ctx.shadowBlur = 4;

    if (type === 'H') {
      var fw = size * fillProgress;
      if (fillDir === 1) { ctx.fillRect(x, cy - halfPW + 2, fw, pipeW - 4); }
      else if (fillDir === 3) { ctx.fillRect(x + size - fw, cy - halfPW + 2, fw, pipeW - 4); }
      else { ctx.fillRect(x, cy - halfPW + 2, fw, pipeW - 4); }
    } else if (type === 'V' || type === 'FILTER') {
      var fh = size * fillProgress;
      if (fillDir === 2) { ctx.fillRect(cx - halfPW + 2, y, pipeW - 4, fh); }
      else if (fillDir === 0) { ctx.fillRect(cx - halfPW + 2, y + size - fh, pipeW - 4, fh); }
      else { ctx.fillRect(cx - halfPW + 2, y, pipeW - 4, fh); }
    } else {
      var fillAmt = fillProgress;
      for (var oi = 0; oi < openings.length; oi++) {
        var od = openings[oi];
        var segLen = half * fillAmt;
        if (od === 0) ctx.fillRect(cx - halfPW + 2, cy - segLen, pipeW - 4, segLen);
        else if (od === 1) ctx.fillRect(cx, cy - halfPW + 2, segLen, pipeW - 4);
        else if (od === 2) ctx.fillRect(cx - halfPW + 2, cy, pipeW - 4, segLen);
        else if (od === 3) ctx.fillRect(cx - segLen, cy - halfPW + 2, segLen, pipeW - 4);
      }
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Reservoir/reactor fill
  if ((type === 'RES' || type === 'REACTOR') && fillProgress > 0) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = type === 'REACTOR' ? '#f4b41b' : zone.coolant;
    ctx.shadowColor = type === 'REACTOR' ? '#f4b41b' : zone.coolant;
    ctx.shadowBlur = 6;
    var fillH = (size - 10) * fillProgress;
    ctx.fillRect(x + 5, y + size - 5 - fillH, size - 10, fillH);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawStartPiece(x, y, size, dir) {
  var zone = getZone(level);
  var cx = x + size / 2;
  var cy = y + size / 2;

  // NES pixel art source block
  drawPixelRect(x + 2, y + 2, size - 4, size - 4, '#1a2c1e');
  drawPixelBorder(x + 2, y + 2, size - 4, size - 4, zone.accent, 2);

  // Inner glow
  drawPixelRect(x + 5, y + 5, size - 10, size - 10, '#1a2a20');

  // Pulsing core
  var pulse = Math.sin(corePhase * 3) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  drawPixelRect(cx - 4, cy - 4, 8, 8, zone.accent);
  drawPixelRect(cx - 2, cy - 2, 4, 4, '#fff');
  ctx.globalAlpha = 1;

  // Arrow showing flow direction (pixel art)
  ctx.fillStyle = zone.accent;
  if (dir === 0) {
    drawPixelRect(cx - 1, y + 4, 2, 6, zone.accent);
    drawPixelRect(cx - 3, y + 8, 2, 2, zone.accent);
    drawPixelRect(cx + 1, y + 8, 2, 2, zone.accent);
  } else if (dir === 1) {
    drawPixelRect(x + size - 10, cy - 1, 6, 2, zone.accent);
    drawPixelRect(x + size - 10, cy - 3, 2, 2, zone.accent);
    drawPixelRect(x + size - 10, cy + 1, 2, 2, zone.accent);
  } else if (dir === 2) {
    drawPixelRect(cx - 1, y + size - 10, 2, 6, zone.accent);
    drawPixelRect(cx - 3, y + size - 10, 2, 2, zone.accent);
    drawPixelRect(cx + 1, y + size - 10, 2, 2, zone.accent);
  } else {
    drawPixelRect(x + 4, cy - 1, 6, 2, zone.accent);
    drawPixelRect(x + 8, cy - 3, 2, 2, zone.accent);
    drawPixelRect(x + 8, cy + 1, 2, 2, zone.accent);
  }

  // Source label
  ctx.fillStyle = zone.accent;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GUT', cx, cy + 3);
}

// === DRAW BOSS HP BAR ===
function drawBossBar() {
  if (!bossLevel) return;
  var zone = getZone(level);
  var barW = 180;
  var barX = GRID_X + (GRID * CELL - barW) / 2;
  var barY = GRID_Y + GRID * CELL + 4;

  // Boss name
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(bossName, GRID_X + GRID * CELL / 2, barY + 8);

  // HP bar background
  drawPixelRect(barX, barY + 12, barW, 8, '#2c1a1a');
  drawPixelBorder(barX, barY + 12, barW, 8, '#e6482e');

  // HP fill
  var hpRatio = bossMaxHP > 0 ? bossHP / bossMaxHP : 0;
  var hpColor = hpRatio > 0.5 ? '#e6482e' : (hpRatio > 0.25 ? '#f4b41b' : '#38d973');
  if (hpRatio > 0) {
    drawPixelRect(barX + 1, barY + 13, (barW - 2) * hpRatio, 6, hpColor);
  }

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText(bossHP + '/' + bossMaxHP, GRID_X + GRID * CELL / 2, barY + 28);
}

// === DRAW STAT BAR ===
function drawStatBar() {
  var y = GH - 22;
  var stats = [
    { label: 'S', val: statB.str, color: '#e6482e' },
    { label: 'D', val: statB.dex, color: '#38d973' },
    { label: 'C', val: statB.con, color: '#f4b41b' },
    { label: 'I', val: statB.int, color: '#3cacd7' },
    { label: 'W', val: statB.wis, color: '#a855f7' },
    { label: 'A', val: statB.cha, color: '#7a444a' }
  ];

  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  var startX = 30;
  var spacing = 45;

  for (var i = 0; i < stats.length; i++) {
    var sx = startX + i * spacing;
    // Stat pip
    var mod = statMod(stats[i].val);
    ctx.fillStyle = mod > 0 ? stats[i].color : (mod < 0 ? '#553333' : '#555555');
    ctx.fillText(stats[i].label + ':' + stats[i].val, sx, y + 6);

    // Mini bar
    var barVal = Math.max(0, Math.min(20, stats[i].val));
    drawPixelRect(sx - 12, y + 9, 24, 3, '#222');
    var barColor = mod > 0 ? stats[i].color : '#444';
    drawPixelRect(sx - 12, y + 9, Math.floor(24 * barVal / 20), 3, barColor);
  }
}

// === MAIN DRAW ===
function draw(dt) {
  var zone = getZone(level);

  // Background
  ctx.fillStyle = state === 'playing' ? zone.bg : '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Reactor core glow
  var corePulse = Math.sin(corePhase) * 0.1 + 0.15;
  ctx.globalAlpha = corePulse;
  var coreGrad = ctx.createRadialGradient(GW / 2, GH / 2, 20, GW / 2, GH / 2, 200);
  coreGrad.addColorStop(0, zone.glow || '#22ff66');
  coreGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = coreGrad;
  ctx.fillRect(0, 0, GW, GH);
  ctx.globalAlpha = 1;

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'playing') {
    ctx.save();

    // Apply shake
    if (shakeIntensity > 0 && shakeDuration > 0) {
      var sx = (Math.random() - 0.5) * shakeIntensity;
      var sy = (Math.random() - 0.5) * shakeIntensity;
      ctx.translate(sx, sy);
    }
    TAS.fx.applyShake();

    // Zone name watermark
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = zone.accent;
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(zone.name.toUpperCase(), GRID_X + GRID * CELL / 2, GRID_Y + GRID * CELL / 2);
    ctx.globalAlpha = 1;

    // Draw grid background
    for (var r = 0; r < GRID; r++) {
      for (var c = 0; c < GRID; c++) {
        var gx = GRID_X + c * CELL;
        var gy = GRID_Y + r * CELL;

        if (blocked[r][c] && !(grid[r][c] && grid[r][c].type === 'START')) {
          // Blocked cell (NES dithered)
          drawDitheredRect(gx, gy, CELL, CELL, '#1a1a22', '#111118');
          drawPixelBorder(gx, gy, CELL, CELL, '#2a2a33');
          // X pattern with pixel lines
          drawPixelRect(gx + 6, gy + 6, 2, 2, '#333340');
          drawPixelRect(gx + CELL - 8, gy + CELL - 8, 2, 2, '#333340');
          drawPixelRect(gx + CELL - 8, gy + 6, 2, 2, '#333340');
          drawPixelRect(gx + 6, gy + CELL - 8, 2, 2, '#333340');
          drawPixelRect(gx + CELL / 2 - 1, gy + CELL / 2 - 1, 2, 2, '#333340');
        } else {
          // Empty cell
          drawPixelRect(gx, gy, CELL, CELL, zone.gridBg);
          drawPixelBorder(gx, gy, CELL, CELL, '#1e2830');

          // WIS: revealed cells glow
          for (var rv = 0; rv < revealedCells.length; rv++) {
            if (revealedCells[rv].r === r && revealedCells[rv].c === c) {
              ctx.globalAlpha = 0.15 + Math.sin(corePhase * 2) * 0.05;
              drawPixelRect(gx + 1, gy + 1, CELL - 2, CELL - 2, '#a855f7');
              ctx.globalAlpha = 1;
            }
          }
        }

        // Draw placed pipe
        var cell = grid[r][c];
        if (cell) {
          if (cell.type === 'START') {
            var sDir = 2;
            for (var si = 0; si < startCells.length; si++) {
              if (startCells[si].r === r && startCells[si].c === c) {
                sDir = startCells[si].dir;
                break;
              }
            }
            drawStartPiece(gx, gy, CELL, sDir);
          } else {
            drawPipe(gx, gy, CELL, cell.type, cell.filled, cell.fillProgress, cell.fillDir);
          }
        }
      }
    }

    // Draw NES cursor
    if (!levelComplete && !levelFailed) {
      var curX = GRID_X + cursorC * CELL;
      var curY = GRID_Y + cursorR * CELL;
      var curAlpha = (Math.sin(cursorBlink * 6) + 1) * 0.3 + 0.2;
      ctx.globalAlpha = curAlpha;
      drawPixelBorder(curX, curY, CELL, CELL, zone.accent, 2);
      // Corner brackets (NES selection style)
      drawPixelRect(curX, curY, 6, 2, zone.accent);
      drawPixelRect(curX, curY, 2, 6, zone.accent);
      drawPixelRect(curX + CELL - 6, curY, 6, 2, zone.accent);
      drawPixelRect(curX + CELL - 2, curY, 2, 6, zone.accent);
      drawPixelRect(curX, curY + CELL - 2, 6, 2, zone.accent);
      drawPixelRect(curX, curY + CELL - 6, 2, 6, zone.accent);
      drawPixelRect(curX + CELL - 6, curY + CELL - 2, 6, 2, zone.accent);
      drawPixelRect(curX + CELL - 2, curY + CELL - 6, 2, 6, zone.accent);
      ctx.globalAlpha = 1;
      // === BASELING SPRITE === the player's baseling plumber rides above the cursor cell.
      TAS.drawBaseling(ctx, curX + CELL / 2, curY - CELL * 0.4, CELL * 0.7, { anim: 'idle', frame: frame });
    }

    // Draw walls
    ctx.fillStyle = '#e6482e';
    for (var wi = 0; wi < walls.length; wi++) {
      var wall = walls[wi];
      var wx = GRID_X + wall.c * CELL;
      var wy = GRID_Y + wall.r * CELL;
      if (wall.dir === 1) {
        drawPixelRect(wx + CELL - 1, wy + 2, 3, CELL - 4, '#e6482e');
      } else if (wall.dir === 2) {
        drawPixelRect(wx + 2, wy + CELL - 1, CELL - 4, 3, '#e6482e');
      }
    }

    // Draw one-way indicators (pixel art arrows)
    for (var owi = 0; owi < oneWays.length; owi++) {
      var ow = oneWays[owi];
      var owx = GRID_X + ow.c * CELL + CELL / 2;
      var owy = GRID_Y + ow.r * CELL + CELL / 2;
      ctx.globalAlpha = 0.6;
      var arrowColor = '#f4b41b';
      if (ow.dir === 0) {
        drawPixelRect(owx - 1, owy - 5, 2, 8, arrowColor);
        drawPixelRect(owx - 3, owy - 3, 2, 2, arrowColor);
        drawPixelRect(owx + 1, owy - 3, 2, 2, arrowColor);
      } else if (ow.dir === 1) {
        drawPixelRect(owx - 3, owy - 1, 8, 2, arrowColor);
        drawPixelRect(owx + 1, owy - 3, 2, 2, arrowColor);
        drawPixelRect(owx + 1, owy + 1, 2, 2, arrowColor);
      } else if (ow.dir === 2) {
        drawPixelRect(owx - 1, owy - 3, 2, 8, arrowColor);
        drawPixelRect(owx - 3, owy + 1, 2, 2, arrowColor);
        drawPixelRect(owx + 1, owy + 1, 2, 2, arrowColor);
      } else {
        drawPixelRect(owx - 5, owy - 1, 8, 2, arrowColor);
        drawPixelRect(owx - 3, owy - 3, 2, 2, arrowColor);
        drawPixelRect(owx - 3, owy + 1, 2, 2, arrowColor);
      }
      ctx.globalAlpha = 1;
    }

    // Draw flow head indicator
    if (flowActive) {
      for (var fhi = 0; fhi < flowHeads.length; fhi++) {
        var fh = flowHeads[fhi];
        if (fh.dead) continue;
        var fhx = GRID_X + fh.c * CELL + CELL / 2;
        var fhy = GRID_Y + fh.r * CELL + CELL / 2;
        var headPulse = Math.sin(frame * 0.15) * 0.3 + 0.5;
        ctx.globalAlpha = headPulse;
        drawPixelRect(fhx - 4, fhy - 4, 8, 8, zone.coolant);
        drawPixelRect(fhx - 2, fhy - 2, 4, 4, '#fff');
        ctx.globalAlpha = 1;
      }
    }

    TAS.particles.draw();
    drawScorePopups();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);

    // === SIDE PANEL ===
    drawPixelRect(QUEUE_X - 10, QUEUE_Y - 30, 85, QUEUE_SIZE * 50 + 70, '#0d1218');
    drawPixelBorder(QUEUE_X - 10, QUEUE_Y - 30, 85, QUEUE_SIZE * 50 + 70, '#2a3a44');

    // Queue label
    ctx.fillStyle = zone.accent;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('NEXT PIECE', QUEUE_X + 32, QUEUE_Y - 16);

    // Current piece highlight
    drawPixelBorder(QUEUE_X + 2, QUEUE_Y + 2, 60, 44, zone.accent, 2);

    // Draw queue pieces
    for (var qi = 0; qi < Math.min(queue.length, QUEUE_SIZE); qi++) {
      var qx = QUEUE_X + 12;
      var qy = QUEUE_Y + qi * 50 + 6;
      drawPipe(qx, qy, 36, queue[qi], false, 0, -1);
      if (qi === 0) {
        ctx.fillStyle = zone.accent;
        ctx.font = '7px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('PLACE', QUEUE_X + 50, qy + 14);
        ctx.fillText('[Z]', QUEUE_X + 50, qy + 24);
      }
    }

    // INT bonus indicator
    if (intMod() > 0) {
      ctx.fillStyle = '#3cacd7';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('INT+' + intMod(), QUEUE_X + 32, QUEUE_Y - 4);
    }

    // Skip button
    var skipY = QUEUE_Y + QUEUE_SIZE * 50 + 10;
    drawPixelRect(QUEUE_X - 5, skipY, 70, 26, '#1a1c2c');
    drawPixelBorder(QUEUE_X - 5, skipY, 70, 26, '#7a444a');
    ctx.fillStyle = '#7a444a';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TOSS [X]', QUEUE_X + 30, skipY + 11);
    ctx.fillText('-' + skipCost + ' POOP', QUEUE_X + 30, skipY + 20);

    // === HUD ===
    drawPixelRect(0, 0, GW, 44, 'rgba(10,14,18,0.9)');
    drawPixelRect(0, 43, GW, 1, zone.accent);

    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';

    // Character icon
    drawCharIcon(4, 2, 16);

    // Name and level
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.fillText(statB.name || 'Baseling', 24, 12);

    // Score
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('SCORE:' + score, 8, 28);

    // CHA multiplier
    if (chaMod() > 0) {
      ctx.fillStyle = '#a855f7';
      ctx.font = '7px monospace';
      ctx.fillText('x' + scoreMultiplier.toFixed(1), 100, 28);
    }

    // Level
    ctx.fillStyle = zone.accent;
    ctx.font = 'bold 10px monospace';
    ctx.fillText('LV' + level, 8, 40);

    // Zone name
    ctx.fillStyle = zone.accent;
    ctx.globalAlpha = 0.7;
    ctx.font = '7px monospace';
    ctx.fillText(zone.name, 40, 40);
    ctx.globalAlpha = 1;

    // Lives (CON)
    ctx.textAlign = 'right';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 9px monospace';
    var livesText = '';
    for (var li = 0; li < lives; li++) livesText += '\u2665';
    for (var ld = lives; ld < maxLives; ld++) livesText += '\u2661';
    ctx.fillText(livesText, 300, 12);

    // High score
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.fillText('HI:' + highScore, 300, 24);

    // Countdown / Flow status
    ctx.textAlign = 'center';
    if (!flowActive && !levelComplete && !levelFailed) {
      var cdColor = countdown > 3 ? zone.accent : '#ff6644';
      ctx.fillStyle = cdColor;
      ctx.font = 'bold 11px monospace';
      ctx.fillText('POOP IN ' + Math.ceil(countdown) + 's', 180, 28);

      // Countdown bar (pixel)
      var barW = 160;
      var barX = 100;
      var barY = 32;
      drawPixelRect(barX, barY, barW, 4, '#1a2a33');
      drawPixelRect(barX, barY, Math.floor(barW * (countdown / countdownMax)), 4, cdColor);
      drawPixelBorder(barX, barY, barW, 4, '#334');

      // DEX bonus indicator
      if (dexMod() > 0) {
        ctx.fillStyle = '#38d973';
        ctx.font = '6px monospace';
        ctx.fillText('DEX+' + dexMod(), 180, 40);
      }
    } else if (flowActive) {
      ctx.fillStyle = zone.coolant;
      ctx.font = 'bold 10px monospace';
      ctx.fillText('PUMPING ' + segmentsFilled + '/' + minSegments, 180, 28);

      // Flow progress bar
      var fpBarW = 160;
      var fpBarX = 100;
      drawPixelRect(fpBarX, 32, fpBarW, 4, '#1a2a33');
      var flowRatio = Math.min(1, segmentsFilled / minSegments);
      drawPixelRect(fpBarX, 32, Math.floor(fpBarW * flowRatio), 4, zone.coolant);
      drawPixelBorder(fpBarX, 32, fpBarW, 4, '#334');
    }

    // Min segments
    ctx.fillStyle = '#777';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('NEED:' + minSegments + ' pipes', 300, 40);

    // Boss HP bar
    drawBossBar();

    // Level transition overlays
    if (levelComplete) {
      ctx.fillStyle = 'rgba(0,40,20,0.7)';
      ctx.fillRect(0, 0, GW, GH);
      ctx.textAlign = 'center';

      // NES-style victory box
      drawPixelRect(GW / 2 - 120, GH / 2 - 50, 240, 100, '#1a2c22');
      drawPixelBorder(GW / 2 - 120, GH / 2 - 50, 240, 100, zone.accent, 2);

      ctx.fillStyle = zone.accent;
      ctx.font = 'bold 18px monospace';
      ctx.fillText('LEVEL CLEAR!', GW / 2, GH / 2 - 20);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#ccffdd';
      ctx.fillText('Pipes: ' + segmentsFilled + ' | +' + Math.floor((50 + level * 10) * scoreMultiplier) + ' POOP', GW / 2, GH / 2 + 5);

      if (bossLevel && bossHP <= 0) {
        ctx.fillStyle = '#f4b41b';
        ctx.font = 'bold 10px monospace';
        ctx.fillText(bossName + ' DEFEATED!', GW / 2, GH / 2 + 25);
      }

      // Zone transition preview
      if (level % 5 === 0 && level < 20) {
        var nextZone = getZone(level + 1);
        ctx.fillStyle = nextZone.accent;
        ctx.font = '9px monospace';
        ctx.fillText('Entering: ' + nextZone.name, GW / 2, GH / 2 + 40);
      }
    }

    if (levelFailed) {
      ctx.fillStyle = 'rgba(40,0,0,0.7)';
      ctx.fillRect(0, 0, GW, GH);
      ctx.textAlign = 'center';

      drawPixelRect(GW / 2 - 120, GH / 2 - 50, 240, 100, '#2c1a1a');
      drawPixelBorder(GW / 2 - 120, GH / 2 - 50, 240, 100, '#e6482e', 2);

      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('SPORE BREACH!', GW / 2, GH / 2 - 20);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#f08070';
      ctx.fillText('Need ' + minSegments + ' pipes, got ' + segmentsFilled, GW / 2, GH / 2 + 5);

      if (lives > 0) {
        ctx.fillStyle = '#f4b41b';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('Lives: ' + lives + '/' + maxLives + ' (CON)', GW / 2, GH / 2 + 25);
      } else {
        ctx.fillStyle = '#e6482e';
        ctx.font = 'bold 10px monospace';
        ctx.fillText('NO LIVES REMAINING', GW / 2, GH / 2 + 25);
      }
    }

    // Wrap indicator
    if (wrapEdges) {
      ctx.fillStyle = '#3cacd7';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('WRAP', GRID_X, GH - 26);
    }

    // Replace restriction indicator
    if (replaceRestricted && flowActive) {
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('NO REPLACE', GRID_X + 40, GH - 26);
    }

    // STR discount indicator
    if (strMod() > 0) {
      ctx.fillStyle = '#e6482e';
      ctx.font = '6px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('STR: -' + (strMod() * 3) + ' cost', GRID_X, GH - 34);
    }

    // WIS reveal indicator
    if (wisMod() > 0 && revealedCells.length > 0) {
      ctx.fillStyle = '#a855f7';
      ctx.font = '6px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('WIS: ' + revealedCells.length + ' revealed', GRID_X + 80, GH - 34);
    }

    // Stat bar at bottom
    drawStatBar();

    // Tutorial overlay
    drawTutorial();

    // Controls hint
    ctx.fillStyle = '#333';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS=move  Z=lay  X=toss  |  Tap to plumb', GW / 2, GH - 42);
  }
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  var zone = ZONES[0];

  // NES grid background
  ctx.globalAlpha = 0.08;
  for (var i = 0; i < 10; i++) {
    for (var j = 0; j < 10; j++) {
      drawPixelRect(i * 40 + 6, j * 40 + 6, 28, 28, zone.accent);
      drawPixelBorder(i * 40 + 6, j * 40 + 6, 28, 28, zone.accent);
    }
  }
  ctx.globalAlpha = 1;

  // Animated pipe demo
  var demoTime = frame * 0.02;
  for (var d = 0; d < 5; d++) {
    var dx = 60 + d * 55;
    var dy = 195 + Math.sin(demoTime + d) * 8;
    var types = ['H', 'TR', 'V', 'BL', 'X'];
    var fp = (Math.sin(demoTime + d * 0.5) + 1) / 2;
    drawPipe(dx, dy, 40, types[d], fp > 0.7, fp, 1);
  }

  // NES-style title box
  drawPixelRect(GW / 2 - 140, 40, 280, 50, '#1a1c2c');
  drawPixelBorder(GW / 2 - 140, 40, 280, 50, zone.accent, 2);

  // Title with pixel shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0d0e16';

  ctx.fillStyle = '#88aacc';

  ctx.fillText('Your baseling plumber routes the POOP flow!', GW / 2, 100);

  // Character display — selected baseling sprite + name (Base-blue).

  drawPixelRect(GW / 2 - 60, 115, 120, 35, '#1a1c2c');

      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 168);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 171, 40, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 171, 40 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
  }

  // SELECT BASELING prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[C] SELECT BASELING', GW / 2, 188);

  // Instructions box
  drawPixelRect(GW / 2 - 130, 245, 260, 65, '#1a1c2c');
  drawPixelBorder(GW / 2 - 130, 245, 260, 65, '#445566');

  ctx.fillStyle = '#667788';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS = Move cursor', GW / 2, 260);
  ctx.fillText('Z / TAP = Lay pipe on grid', GW / 2, 274);
  ctx.fillText('X = Toss pipe (costs POOP)', GW / 2, 288);
  ctx.fillText('Route the spore flow to clear levels!', GW / 2, 302);

  // Zone preview
  ctx.fillStyle = '#445566';
  ctx.font = '7px monospace';
  ctx.fillText('Zones: Pipeline > Cavern > Furnace > Garden', GW / 2, 320);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 340);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  drawPixelRect(GW / 2 - 100, 355, 200, 24, '#1a1c2c');
  drawPixelBorder(GW / 2 - 100, 355, 200, 24, '#f4b41b');
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS Z OR TAP TO START', GW / 2, 371);
  ctx.globalAlpha = 1;
}

// === GAME OVER SCREEN ===
function drawGameOverScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  var zone = getZone(level);

  // Background fade
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);

  // Victory or defeat
  var isVictory = level > 20;

  // Main box
  drawPixelRect(GW / 2 - 140, 40, 280, 300, '#1a1c2c');
  drawPixelBorder(GW / 2 - 140, 40, 280, 300, isVictory ? '#f4b41b' : '#e6482e', 2);

  ctx.textAlign = 'center';

  if (isVictory) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('PIPELINE COMPLETE!', GW / 2, 80);
    ctx.fillStyle = '#ffeeaa';
    ctx.font = '10px monospace';
    ctx.fillText('All POOP routed to the gardens!', GW / 2, 100);
  } else {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('GAME OVER', GW / 2, 80);
    ctx.fillStyle = '#f08070';
    ctx.font = '10px monospace';
    ctx.fillText('Spore breach at level ' + level, GW / 2, 100);
  }

  // Character
  drawCharIcon(GW / 2 - 12, 115, 24);
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(statB.name || 'Baseling', GW / 2, 150);

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, 180);

  // High score
  if (score >= highScore) {
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 198);
  } else {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW / 2, 198);
  }

  // Stats summary
  ctx.fillStyle = '#88aacc';
  ctx.font = '9px monospace';
  ctx.fillText('Level: ' + Math.min(level, 20) + '/20', GW / 2, 225);
  ctx.fillText('Zone: ' + zone.name, GW / 2, 240);
  ctx.fillText('Pipes Filled: ' + segmentsFilled, GW / 2, 255);

  // Stat bonuses recap
  ctx.fillStyle = '#556677';
  ctx.font = '7px monospace';
  var bonuses = [];
  if (strMod() > 0) bonuses.push('STR:-' + (strMod() * 3) + ' cost');
  if (dexMod() > 0) bonuses.push('DEX:+' + (dexMod() * 0.5).toFixed(1) + 's');
  if (conMod() > 0) bonuses.push('CON:+' + conMod() + ' lives');
  if (intMod() > 0) bonuses.push('INT:+' + intMod() + ' queue');
  if (wisMod() > 0) bonuses.push('WIS:reveal');
  if (chaMod() > 0) bonuses.push('CHA:x' + scoreMultiplier.toFixed(1));
  if (bonuses.length > 0) {
    ctx.fillText('Stat bonuses: ' + bonuses.join(' | '), GW / 2, 275);
  }

  // Restart prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  drawPixelRect(GW / 2 - 90, 300, 180, 24, '#1a1c2c');
  drawPixelBorder(GW / 2 - 90, 300, 180, 24, '#f4b41b');
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS Z OR TAP', GW / 2, 316);
  ctx.globalAlpha = 1;
}

// === ZONE TRANSITION EFFECT ===
var zoneTransTimer = 0;
var zoneTransActive = false;
var zoneTransFrom = null;
var zoneTransTo = null;

function startZoneTransition(fromZone, toZone) {
  zoneTransActive = true;
  zoneTransTimer = 0;
  zoneTransFrom = fromZone;
  zoneTransTo = toZone;
}

function updateZoneTransition(dt) {
  if (!zoneTransActive) return;
  zoneTransTimer += dt;
  if (zoneTransTimer >= 1.5) {
    zoneTransActive = false;
  }
}

function drawZoneTransition() {
  if (!zoneTransActive || !zoneTransFrom || !zoneTransTo) return;
  var t = zoneTransTimer / 1.5;

  // Wipe effect from old zone to new
  if (t < 0.5) {
    // Old zone fading out with scan lines
    ctx.globalAlpha = 1 - t * 2;
    ctx.fillStyle = zoneTransFrom.accent;
    for (var sl = 0; sl < GH; sl += 4) {
      ctx.fillRect(0, sl, GW, 1);
    }
    ctx.globalAlpha = 1;
  } else {
    // New zone fading in
    var fadeIn = (t - 0.5) * 2;
    ctx.globalAlpha = fadeIn * 0.3;
    ctx.fillStyle = zoneTransTo.accent;
    for (var sl2 = 0; sl2 < GH; sl2 += 3) {
      ctx.fillRect(0, sl2, GW, 1);
    }
    ctx.globalAlpha = 1;

    // Zone name announcement
    if (fadeIn < 0.8) {
      ctx.globalAlpha = Math.min(1, fadeIn * 2);
      drawPixelRect(GW / 2 - 100, GH / 2 - 20, 200, 40, '#000');
      drawPixelBorder(GW / 2 - 100, GH / 2 - 20, 200, 40, zoneTransTo.accent, 2);
      ctx.fillStyle = zoneTransTo.accent;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(zoneTransTo.name.toUpperCase(), GW / 2, GH / 2 + 5);
      ctx.globalAlpha = 1;
    }
  }
}

// === AMBIENT PARTICLES ===
var ambientParticles = [];
function initAmbientParticles() {
  ambientParticles = [];
  for (var i = 0; i < 20; i++) {
    ambientParticles.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: 1 + Math.random() * 2,
      alpha: 0.1 + Math.random() * 0.2,
      pulse: Math.random() * Math.PI * 2
    });
  }
}
initAmbientParticles();

function updateAmbientParticles(dt) {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.pulse += dt * 2;
    if (p.x < -10) p.x = GW + 10;
    if (p.x > GW + 10) p.x = -10;
    if (p.y < -10) p.y = GH + 10;
    if (p.y > GH + 10) p.y = -10;
  }
}

function drawAmbientParticles() {
  var zone = getZone(level);
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    var a = p.alpha * (0.5 + Math.sin(p.pulse) * 0.5);
    ctx.globalAlpha = a;
    drawPixelRect(Math.floor(p.x), Math.floor(p.y), Math.floor(p.size), Math.floor(p.size), zone.particle);
  }
  ctx.globalAlpha = 1;
}

// === FLOW TRAIL EFFECT ===
var flowTrail = [];

function addFlowTrail(x, y, color) {
  flowTrail.push({ x: x, y: y, color: color, life: 0.8 });
  if (flowTrail.length > 50) flowTrail.shift();
}

function updateFlowTrail(dt) {
  for (var i = flowTrail.length - 1; i >= 0; i--) {
    flowTrail[i].life -= dt;
    if (flowTrail[i].life <= 0) flowTrail.splice(i, 1);
  }
}

function drawFlowTrail() {
  for (var i = 0; i < flowTrail.length; i++) {
    var t = flowTrail[i];
    ctx.globalAlpha = t.life * 0.4;
    drawPixelRect(Math.floor(t.x) - 1, Math.floor(t.y) - 1, 3, 3, t.color);
  }
  ctx.globalAlpha = 1;
}

// === PIPE PLACEMENT PREVIEW ===
function drawPlacementPreview() {
  if (levelComplete || levelFailed || queue.length === 0) return;
  if (blocked[cursorR] && blocked[cursorR][cursorC]) return;
  var existing = grid[cursorR] ? grid[cursorR][cursorC] : null;
  if (existing && existing.type === 'START') return;
  if (existing && existing.filled) return;

  var gx = GRID_X + cursorC * CELL;
  var gy = GRID_Y + cursorR * CELL;

  // Ghost preview of next pipe
  ctx.globalAlpha = 0.25 + Math.sin(cursorBlink * 4) * 0.1;
  drawPipe(gx, gy, CELL, queue[0], false, 0, -1);
  ctx.globalAlpha = 1;
}

// === COMBO SYSTEM ===
var comboCount = 0;
var comboTimer = 0;
var maxCombo = 0;

function addCombo() {
  comboCount++;
  comboTimer = 2.0;
  if (comboCount > maxCombo) maxCombo = comboCount;
  if (comboCount >= 3) {
    var comboBonus = Math.floor(comboCount * 5 * scoreMultiplier);
    score += comboBonus;
    addScorePopup(GW / 2, 60, 'COMBO x' + comboCount + '! +' + comboBonus, '#a855f7');
  }
}

function updateCombo(dt) {
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      comboCount = 0;
    }
  }
}

function drawCombo() {
  if (comboCount < 2 || comboTimer <= 0) return;
  ctx.globalAlpha = Math.min(1, comboTimer);
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('COMBO x' + comboCount, 300, 50);
  ctx.globalAlpha = 1;
}

// === NES SCANLINE OVERLAY ===
function drawScanlines() {
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#000';
  for (var sy = 0; sy < GH; sy += 2) {
    ctx.fillRect(0, sy, GW, 1);
  }
  ctx.globalAlpha = 1;
}

// === CORNER DECORATIONS ===
function drawCornerDecor() {
  var zone = getZone(level);
  ctx.globalAlpha = 0.15;
  // Top-left bracket
  drawPixelRect(2, 2, 12, 2, zone.accent);
  drawPixelRect(2, 2, 2, 12, zone.accent);
  // Top-right bracket
  drawPixelRect(GW - 14, 2, 12, 2, zone.accent);
  drawPixelRect(GW - 4, 2, 2, 12, zone.accent);
  // Bottom-left bracket
  drawPixelRect(2, GH - 4, 12, 2, zone.accent);
  drawPixelRect(2, GH - 14, 2, 12, zone.accent);
  // Bottom-right bracket
  drawPixelRect(GW - 14, GH - 4, 12, 2, zone.accent);
  drawPixelRect(GW - 4, GH - 14, 2, 12, zone.accent);
  ctx.globalAlpha = 1;
}

// Patch update to include new systems
var _origUpdate = update;
update = function(dt) {
  updateAmbientParticles(dt);
  updateFlowTrail(dt);
  updateZoneTransition(dt);
  updateCombo(dt);
  _origUpdate(dt);
};

// Patch draw to add visual layers
var _origDraw = draw;
draw = function(dt) {
  _origDraw(dt);
  if (state === 'playing') {
    drawAmbientParticles();
    drawFlowTrail();
    drawPlacementPreview();
    drawCombo();
    drawZoneTransition();
    drawCornerDecor();
  }
  drawScanlines();
};

// === START LOOP ===
TAS.loop.start(update, draw);

})();
