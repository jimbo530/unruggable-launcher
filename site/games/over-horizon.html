<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Horizon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === STAT B (NFT bonuses) ===
// === BASELING STATS (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single-player (default 0.8–1.6 band). These helpers are D&D-driven, so recomputeStats()
// synthesizes the D&D fields from the clamped mults (a gentle 1->10 mapping keeps each helper
// inside the band) and sets scoreMult/luck to 1.0 so int/cha carry those once. Shmup wiring:
// str<-damage, dex<-moveSpeed, con<-health, int/wis/cha<-luck. No water (SWM untouched).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#38d973', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[over-horizon] NftLoader display info failed:', e && e.message); }

// Map a clamped mult to the 1–20 D&D scale centered on 10 (neutral = mult 1.0). Gentle slope
// (15/point) keeps the helper outputs inside the single-player band.
function dndFromMult(m) { return Math.max(1, Math.round(10 + (m - 1) * 15)); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dndFromMult(m.damage); statB.dex = dndFromMult(m.moveSpeed); statB.con = dndFromMult(m.health);
  statB.int = dndFromMult(m.luck);   statB.wis = dndFromMult(m.luck);      statB.cha = dndFromMult(m.luck);
  statB.scoreMult = 1; statB.luck = 1; // int/cha terms carry score/drop bias (single application)
  statB.lives = m.health > 1.3 ? 1 : 0;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}

// --- statB helper functions ---
function strDmgMult() { return 1 + (statB.str - 10) * 0.05; }
function strBombMult() { return 1 + (statB.str - 10) * 0.06; }
function dexSpeedMult() { return 1 + (statB.dex - 10) * 0.03; }
function conShieldMult() { return 1 + (statB.con - 10) * 0.06; }
function conBonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisFireRateMult() { return 1 + (statB.wis - 10) * 0.03; }
function chaDropChance() { return Math.min(0.5, 0.15 + (statB.cha - 10) * 0.02) * statB.luck; }

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'BOMB', c: 'PICK' } });

recomputeStats();
var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[over-horizon] player init failed:', e && e.message); });
}

const STAGE_NAMES = [
  'Compost Nebula', 'Spore Drift', 'Poop Asteroid Belt', 'Fungal Galaxy',
  'Mycelium Depths', 'Garden Void', 'Cosmic Mold Core', 'The Last Sporefall'
];
const STAGE_COLORS = [
  { bg: '#1a1c2c', fg: '#2a3a2c', accent: '#38d973' },
  { bg: '#1a1a2c', fg: '#2a1a44', accent: '#a855f7' },
  { bg: '#1a1c2c', fg: '#2a3344', accent: '#3cacd7' },
  { bg: '#1c1a1a', fg: '#442211', accent: '#f4b41b' },
  { bg: '#1a1c2c', fg: '#2a332a', accent: '#38d973' },
  { bg: '#1a1a2c', fg: '#1a1a33', accent: '#3cacd7' },
  { bg: '#1c1a2c', fg: '#331133', accent: '#a855f7' },
  { bg: '#1a1c2c', fg: '#7a444a', accent: '#e6482e' }
];

const PLAYER_SPEED_SLOW = 2.0;
const PLAYER_SPEED_FAST = 4.0;
const MAX_HP = 5;
const MAX_LIVES = 3;
const MAX_BOMBS = 3;
const STAGE_LENGTH = 1800;
const FIRE_ANGLES = [0, -0.52, 0.52, -0.785, 0.785];

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('overhorizon_hi');
let lives = MAX_LIVES;
let hp = MAX_HP;
let bombs = MAX_BOMBS;
let stage = 0;
let frame = 0;
let stageFrame = 0;
let multiplier = 1;
let multiTimer = 0;
let playerSpeed = PLAYER_SPEED_SLOW;
let speedToggle = false;
let fireAngleIdx = 0;
let weaponIdx = 0; // 0=seed, 1=myco, 2=poop, 3=sporeSpread, 4=burn
let weaponLevels = [0, 0, 0, 0, 0];
let optionFormation = 0;
let stateTimer = 0;
let bossActive = false;
let bossWarning = 0;
let invincible = 0;
let deathTimer = 0;
let pauseFrame = 0;
let screenShake = 0;
let screenShakeDecay = 0.9;

// Objects
let player = { x: 60, y: GH / 2 };
let bullets = [];
let enemies = [];
let enemyBullets = [];
let powerUps = [];
let options = [];
let boss = null;
let scrollX = 0;

// Parallax layers
let bgLayers = [];
let starfield = TAS.bg.createStarfield(60, GW, GH);

// Explosion particles (enhanced)
let explosions = [];

// === HELPER ===
function anyKey() {
  return Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b;
}

function keyDown(code) {
  return TAS.input.keys[code] || false;
}

function triggerShake(intensity, decay) {
  screenShake = Math.max(screenShake, intensity);
  screenShakeDecay = decay || 0.9;
}

function spawnExplosion(x, y, color, count, speed, sizeBase) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.5 + Math.random());
    explosions.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 20 + Math.floor(Math.random() * 15),
      maxLife: 35,
      size: (sizeBase || 2) + Math.random() * 2,
      color: color
    });
  }
}

// === SFX ===
const SFX = {
  shoot() { TAS.audio.playTone(880, 0.04, 'square', 0.05, 440); },
  laser() { TAS.audio.playTone(200, 0.08, 'sawtooth', 0.06, 1200); },
  wave() { TAS.audio.playTone(440, 0.06, 'triangle', 0.05, 220); },
  homing() { TAS.audio.playTone(660, 0.05, 'sine', 0.04, 330); },
  sporeSpread() { TAS.audio.playTone(300, 0.07, 'triangle', 0.06, 600); TAS.audio.playTone(350, 0.05, 'sine', 0.04, 150); },
  reactorBeam() { TAS.audio.playTone(120, 0.12, 'sawtooth', 0.08, 800); },
  hit() { TAS.audio.playNoise(0.08, 0.06); },
  explode() { TAS.audio.playNoise(0.2, 0.12); TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 30); },
  playerHit() { TAS.audio.playTone(200, 0.15, 'sawtooth', 0.1, 80); TAS.audio.playNoise(0.1, 0.08); },
  die() { TAS.audio.playTone(400, 0.5, 'sawtooth', 0.12, 40); TAS.audio.playNoise(0.3, 0.15); },
  bomb() { TAS.audio.playNoise(0.4, 0.15, 300); TAS.audio.playTone(60, 0.4, 'square', 0.1, 20); },
  superBomb() { TAS.audio.playNoise(0.6, 0.2, 400); TAS.audio.playTone(40, 0.6, 'sawtooth', 0.14, 15); TAS.audio.playTone(80, 0.4, 'square', 0.1, 20); },
  powerup() { TAS.audio.playMelody([[523, 0.06], [659, 0.06], [784, 0.08]], 60); },
  weaponSwitch() { TAS.audio.playTone(1200, 0.03, 'square', 0.06, 600); },
  bossWarn() { TAS.audio.playTone(80, 0.3, 'square', 0.1, 40); },
  stageClear() { TAS.audio.playMelody([[523, 0.12], [659, 0.12], [784, 0.12], [1047, 0.2]], 140); },
  gameOver() { TAS.audio.playMelody([[440, 0.2, 'sawtooth', 0.1], [349, 0.2, 'sawtooth', 0.1], [293, 0.2, 'sawtooth', 0.1], [220, 0.3, 'sawtooth', 0.1]], 200); }
};

// === INIT STAGE ===
function initBgLayers() {
  bgLayers = [];
  const col = STAGE_COLORS[stage];
  for (let l = 0; l < 4; l++) {
    const shapes = [];
    const count = 10 + l * 6;
    for (let i = 0; i < count; i++) {
      shapes.push({
        x: Math.random() * (GW + 200),
        y: Math.random() * GH,
        w: 8 + Math.random() * 45,
        h: 8 + Math.random() * 35,
        type: Math.floor(Math.random() * 5)
      });
    }
    bgLayers.push({ shapes, speed: 0.2 + l * 0.35, color: col.fg, alpha: 0.08 + l * 0.07 });
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES + conBonusLives();
  hp = Math.floor(MAX_HP * conShieldMult());
  bombs = MAX_BOMBS;
  stage = 0;
  stageFrame = 0;
  frame = 0;
  multiplier = 1;
  multiTimer = 0;
  playerSpeed = PLAYER_SPEED_SLOW;
  speedToggle = false;
  fireAngleIdx = 0;
  weaponIdx = 0;
  weaponLevels = [0, 0, 0, 0, 0];
  optionFormation = 0;
  bossActive = false;
  bossWarning = 0;
  invincible = 120;
  deathTimer = 0;
  screenShake = 0;
  player = { x: 60, y: GH / 2 };
  bullets = [];
  enemies = [];
  enemyBullets = [];
  powerUps = [];
  options = [];
  boss = null;
  scrollX = 0;
  explosions = [];
  hazards = [];
  TAS.particles.clear();
  initBgLayers();
}

function startStage(s) {
  stage = s;
  stageFrame = 0;
  bossActive = false;
  bossWarning = 0;
  boss = null;
  enemies = [];
  enemyBullets = [];
  powerUps = [];
  hazards = [];
  explosions = [];
  initBgLayers();
}

// === PLAYER DRAWING (NES-style pixel ship) ===
function drawShip(x, y, scale) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Engine exhaust flicker
  const exLen = 6 + Math.floor(Math.sin(frame * 0.3) * 3);
  ctx.fillStyle = '#ff8844';
  ctx.globalAlpha = 0.6 + Math.sin(frame * 0.4) * 0.3;
  ctx.fillRect(-16, -2, -exLen, 4);
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(-16, -1, -Math.floor(exLen * 0.6), 2);
  ctx.globalAlpha = 1;

  // Ship body (NES sprite style - blocky)
  const shipColor = statB.color || '#225544';
  ctx.fillStyle = shipColor;
  // Main fuselage
  ctx.fillRect(-12, -3, 24, 6);
  // Nose
  ctx.fillRect(12, -2, 4, 4);
  // Wings
  ctx.fillRect(-6, -8, 14, 5);
  ctx.fillRect(-6, 3, 14, 5);
  // Wing tips
  ctx.fillRect(-2, -10, 6, 2);
  ctx.fillRect(-2, 8, 6, 2);

  // Hull highlight
  ctx.fillStyle = '#38d973';
  ctx.fillRect(-8, -2, 18, 4);

  // Reactor core glow
  ctx.fillStyle = STAGE_COLORS[stage].accent;
  ctx.globalAlpha = 0.6 + Math.sin(frame * 0.15) * 0.3;
  ctx.fillRect(-2, -2, 4, 4);
  ctx.globalAlpha = 1;

  // Cockpit
  ctx.fillStyle = '#3cacd7';
  ctx.fillRect(8, -1, 4, 2);

  // Pilot: the selected baseling rides the ship (focal entity). The procedural ship is
  // the no-wallet (Wimmple) look underneath.
  TAS.drawBaseling(ctx, -1, -2, 16, { anim: 'idle', frame: frame, flipX: false });

  ctx.restore();
}

function drawOption(x, y) {
  ctx.fillStyle = STAGE_COLORS[stage].accent;
  ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.2;
  ctx.fillRect(x - 4, y - 4, 8, 8);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - 2, y - 2, 4, 4);
  ctx.globalAlpha = 1;
}

// === WEAPON FIRE ===
let fireTimer = 0;

function getFireRate() {
  const base = [8, 10, 14, 7, 20]; // seed, myco, poop, sporeSpread, burn
  const lvl = weaponLevels[weaponIdx];
  const wisBonus = Math.floor((wisFireRateMult() - 1) * 10);
  return Math.max(2, Math.floor(base[weaponIdx] - lvl * 2 - wisBonus));
}

function fireWeapon(x, y, angleOffset) {
  const angle = FIRE_ANGLES[fireAngleIdx] + (angleOffset || 0);
  const lvl = weaponLevels[weaponIdx];
  const dmgMult = strDmgMult() * statB.damage;

  if (weaponIdx === 0) { // Laser
    SFX.laser();
    const width = 2 + lvl;
    const dmg = Math.floor((3 + lvl * 2) * dmgMult);
    bullets.push({
      x, y, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8,
      w: 12 + lvl * 4, h: width, dmg, type: 'laser', pierce: true,
      color: '#44ffaa', life: 60
    });
    if (lvl >= 2) {
      bullets.push({
        x, y: y - 4, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8,
        w: 8 + lvl * 2, h: width - 1, dmg: Math.floor(dmg * 0.7), type: 'laser', pierce: true,
        color: '#88ffcc', life: 60
      });
      bullets.push({
        x, y: y + 4, vx: Math.cos(angle) * 8, vy: Math.sin(angle) * 8,
        w: 8 + lvl * 2, h: width - 1, dmg: Math.floor(dmg * 0.7), type: 'laser', pierce: true,
        color: '#88ffcc', life: 60
      });
    }
  } else if (weaponIdx === 1) { // Wave
    SFX.wave();
    const amp = 15 + lvl * 8;
    const dmg = Math.floor((2 + lvl) * dmgMult);
    bullets.push({
      x, y, vx: 5 + lvl * 0.5, vy: 0,
      w: 6, h: 6, dmg, type: 'wave', pierce: false,
      color: '#aa55ff', life: 80, amp, freq: 0.12, phase: 0,
      baseY: y, angle
    });
    if (lvl >= 1) {
      bullets.push({
        x, y, vx: 5 + lvl * 0.5, vy: 0,
        w: 6, h: 6, dmg, type: 'wave', pierce: false,
        color: '#cc88ff', life: 80, amp, freq: 0.12, phase: Math.PI,
        baseY: y, angle
      });
    }
    if (lvl >= 3) {
      bullets.push({
        x, y, vx: 5 + lvl * 0.5, vy: 0,
        w: 5, h: 5, dmg: Math.floor(dmg * 0.7), type: 'wave', pierce: false,
        color: '#dd99ff', life: 80, amp: amp * 0.6, freq: 0.18, phase: Math.PI / 2,
        baseY: y, angle
      });
    }
  } else if (weaponIdx === 2) { // Homing
    SFX.homing();
    const dmg = Math.floor((1 + lvl) * dmgMult);
    const count = 1 + Math.floor(lvl / 2);
    for (let i = 0; i < count; i++) {
      const spread = (i - (count - 1) / 2) * 0.3;
      bullets.push({
        x, y, vx: Math.cos(angle + spread) * 3, vy: Math.sin(angle + spread) * 3,
        w: 5, h: 5, dmg, type: 'homing', pierce: false,
        color: '#ffaa44', life: 120, turnSpeed: 0.06 + lvl * 0.015
      });
    }
  } else if (weaponIdx === 3) { // Spore Spread
    SFX.sporeSpread();
    const dmg = Math.floor((2 + lvl) * dmgMult);
    const spreadCount = 3 + lvl;
    for (let i = 0; i < spreadCount; i++) {
      const spread = (i - (spreadCount - 1) / 2) * 0.2;
      const spd = 5 + Math.random() * 2;
      bullets.push({
        x, y,
        vx: Math.cos(angle + spread) * spd,
        vy: Math.sin(angle + spread) * spd,
        w: 4, h: 4, dmg, type: 'spore_bullet', pierce: false,
        color: '#66ff44', life: 40 + lvl * 8
      });
    }
  } else if (weaponIdx === 4) { // Reactor Beam
    SFX.reactorBeam();
    const dmg = Math.floor((8 + lvl * 4) * dmgMult);
    const beamW = 4 + lvl * 2;
    bullets.push({
      x, y, vx: 10, vy: Math.sin(angle) * 2,
      w: GW * 0.6, h: beamW, dmg, type: 'beam', pierce: true,
      color: '#ff4400', life: 8 + lvl * 2
    });
  }
}

function getOptionPositions() {
  const opts = [];
  if (options.length === 0) return opts;
  if (optionFormation === 0) {
    if (options.length >= 1) opts.push({ x: player.x - 5, y: player.y - 22 });
    if (options.length >= 2) opts.push({ x: player.x - 5, y: player.y + 22 });
  } else if (optionFormation === 1) {
    if (options.length >= 1) opts.push({ x: player.x - 25, y: player.y - 8 });
    if (options.length >= 2) opts.push({ x: player.x - 25, y: player.y + 8 });
  } else {
    if (options.length >= 1) opts.push({ x: player.x + 20, y: player.y - 8 });
    if (options.length >= 2) opts.push({ x: player.x + 20, y: player.y + 8 });
  }
  return opts;
}

// === ENEMIES ===
function spawnEnemy(type, x, y, extraData) {
  const e = { x: x || GW + 20, y: y || TAS.math.randRange(30, GH - 30), type, hp: 1, maxHp: 1, vx: -2, vy: 0, timer: 0, data: extraData || {} };
  switch (type) {
    case 'fighter':
      e.hp = e.maxHp = 2;
      e.vx = -2.5 - stage * 0.2;
      e.w = 14; e.h = 10;
      e.score = 100;
      break;
    case 'swarm':
      e.hp = e.maxHp = 1;
      e.vx = -3;
      e.w = 10; e.h = 8;
      e.score = 50;
      e.data.waveAmp = 30 + Math.random() * 20;
      e.data.waveSpeed = 0.04 + Math.random() * 0.02;
      e.data.baseY = e.y;
      break;
    case 'spore':
      e.hp = e.maxHp = 4 + stage;
      e.vx = -0.8;
      e.w = 18; e.h = 18;
      e.score = 300;
      e.data.fireRate = 90 - stage * 5;
      break;
    case 'snake':
      e.hp = e.maxHp = 3;
      e.vx = -1.5;
      e.w = 12; e.h = 12;
      e.score = 200;
      e.data.segments = [];
      for (let i = 0; i < 5; i++) e.data.segments.push({ x: e.x + i * 14, y: e.y });
      break;
    case 'drone':
      e.hp = e.maxHp = 8 + stage * 2;
      e.vx = -1;
      e.w = 22; e.h = 16;
      e.score = 500;
      e.data.fireRate = 60;
      break;
    case 'miniboss':
      e.hp = e.maxHp = 20 + stage * 5;
      e.vx = -0.5;
      e.w = 30; e.h = 24;
      e.score = 2000;
      e.data.fireRate = 40;
      e.data.pattern = 0;
      break;
    // --- PASS 2: Tasern enemies ---
    case 'reactor_cruiser':
      e.hp = e.maxHp = 15 + stage * 4;
      e.vx = -0.7;
      e.w = 28; e.h = 20;
      e.score = 800;
      e.data.fireRate = 50 - stage * 2;
      e.data.shieldHp = 6 + stage;
      e.data.shieldMax = 6 + stage;
      e.data.shieldRegen = 0;
      break;
    case 'spore_swarm':
      e.hp = e.maxHp = 1;
      e.vx = -2.5 - Math.random();
      e.vy = (Math.random() - 0.5) * 3;
      e.w = 8; e.h = 8;
      e.score = 30;
      e.data.splitOnDeath = true;
      break;
    case 'mycelial_worm':
      e.hp = e.maxHp = 25 + stage * 3;
      e.vx = -1;
      e.w = 16; e.h = 14;
      e.score = 1200;
      e.data.segments = [];
      for (let i = 0; i < 8; i++) e.data.segments.push({ x: e.x + i * 16, y: e.y, hp: 3 + stage });
      e.data.fireRate = 70 - stage * 3;
      break;
  }
  enemies.push(e);
}

function drawEnemy(e) {
  const col = STAGE_COLORS[stage];
  ctx.save();
  ctx.translate(e.x, e.y);

  switch (e.type) {
    case 'fighter':
      // NES-style blocky fighter
      ctx.fillStyle = '#885533';
      ctx.fillRect(-7, -4, 14, 8);
      ctx.fillRect(-5, -6, 6, 2);
      ctx.fillRect(-5, 4, 6, 2);
      ctx.fillStyle = '#ffaa44';
      ctx.fillRect(1, -2, 4, 4);
      break;

    case 'swarm':
      ctx.fillStyle = '#668844';
      ctx.fillRect(-4, -4, 8, 8);
      ctx.fillStyle = '#aaff66';
      ctx.fillRect(-2, -2, 4, 4);
      break;

    case 'spore':
      ctx.fillStyle = '#664488';
      ctx.beginPath();
      ctx.arc(0, 0, 9, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 + frame * 0.02;
        ctx.strokeStyle = '#aa66ff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * 9, Math.sin(a) * 9);
        ctx.lineTo(Math.cos(a) * 14, Math.sin(a) * 14);
        ctx.stroke();
      }
      ctx.fillStyle = '#ff88dd';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'snake':
      if (e.data.segments) {
        for (let i = e.data.segments.length - 1; i >= 0; i--) {
          const seg = e.data.segments[i];
          const sz = Math.floor(4 + (e.data.segments.length - i) * 0.5);
          ctx.fillStyle = i === 0 ? '#44aa88' : '#227755';
          ctx.fillRect(seg.x - e.x - sz, seg.y - e.y - sz, sz * 2, sz * 2);
        }
      }
      ctx.fillStyle = '#66ffaa';
      ctx.fillRect(-5, -5, 10, 10);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(1, -2, 3, 3);
      break;

    case 'drone':
      ctx.fillStyle = '#555566';
      ctx.fillRect(-11, -8, 22, 16);
      ctx.fillStyle = '#888899';
      ctx.fillRect(-8, -6, 16, 12);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.strokeStyle = '#aaaacc';
      ctx.lineWidth = 1;
      ctx.strokeRect(-11, -8, 22, 16);
      break;

    case 'miniboss':
      ctx.fillStyle = '#443355';
      ctx.fillRect(-15, -12, 30, 24);
      ctx.fillStyle = '#775599';
      ctx.fillRect(-10, -8, 20, 16);
      const pulse = 0.5 + Math.sin(frame * 0.1) * 0.3;
      ctx.fillStyle = col.accent;
      ctx.globalAlpha = pulse;
      ctx.fillRect(-4, -4, 8, 8);
      ctx.globalAlpha = 1;
      // HP bar
      const hpPct = e.hp / e.maxHp;
      ctx.fillStyle = '#333';
      ctx.fillRect(-15, -16, 30, 3);
      ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffaa00' : '#ff4444';
      ctx.fillRect(-15, -16, Math.floor(30 * hpPct), 3);
      break;

    // --- PASS 2: Tasern enemy sprites ---
    case 'reactor_cruiser':
      // Heavy armored cruiser with shield
      ctx.fillStyle = '#334455';
      ctx.fillRect(-14, -10, 28, 20);
      ctx.fillStyle = '#556677';
      ctx.fillRect(-10, -7, 20, 14);
      // Engine ports
      ctx.fillStyle = '#ff6622';
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.2) * 0.3;
      ctx.fillRect(14, -4, 4, 3);
      ctx.fillRect(14, 1, 4, 3);
      ctx.globalAlpha = 1;
      // Turret
      ctx.fillStyle = '#778899';
      ctx.fillRect(-16, -4, 6, 8);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-18, -2, 4, 4);
      // Shield glow
      if (e.data.shieldHp > 0) {
        ctx.strokeStyle = '#44aaff';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.strokeRect(-16, -12, 32, 24);
        ctx.globalAlpha = 1;
      }
      // HP bar
      var rcHpPct = e.hp / e.maxHp;
      ctx.fillStyle = '#333';
      ctx.fillRect(-14, -14, 28, 2);
      ctx.fillStyle = rcHpPct > 0.5 ? '#44ff44' : '#ff4444';
      ctx.fillRect(-14, -14, Math.floor(28 * rcHpPct), 2);
      break;

    case 'spore_swarm':
      // Tiny spore particle
      ctx.fillStyle = '#88aa44';
      ctx.globalAlpha = 0.8;
      ctx.fillRect(-3, -3, 6, 6);
      ctx.fillStyle = '#ccff66';
      ctx.fillRect(-1, -1, 2, 2);
      ctx.globalAlpha = 1;
      break;

    case 'mycelial_worm':
      // Draw segments
      if (e.data.segments) {
        for (let i = e.data.segments.length - 1; i >= 0; i--) {
          const seg = e.data.segments[i];
          const sz = Math.floor(5 + (e.data.segments.length - i) * 0.8);
          const segAlpha = seg.hp > 0 ? 1 : 0.3;
          ctx.globalAlpha = segAlpha;
          ctx.fillStyle = i % 2 === 0 ? '#445533' : '#556644';
          ctx.fillRect(seg.x - e.x - sz, seg.y - e.y - sz, sz * 2, sz * 2);
          if (seg.hp > 0 && i % 3 === 0) {
            ctx.fillStyle = '#88ff44';
            ctx.fillRect(seg.x - e.x - 2, seg.y - e.y - 2, 4, 4);
          }
        }
      }
      ctx.globalAlpha = 1;
      // Head
      ctx.fillStyle = '#66cc33';
      ctx.fillRect(-7, -7, 14, 14);
      ctx.fillStyle = '#ff6644';
      ctx.fillRect(-5, -3, 4, 3);
      ctx.fillRect(-5, 1, 4, 3);
      // Mandibles
      ctx.fillStyle = '#88ff44';
      ctx.fillRect(-9, -4, 3, 3);
      ctx.fillRect(-9, 1, 3, 3);
      break;
  }
  ctx.restore();
}

function updateEnemy(e, dt) {
  const spd = dt * 60;
  e.timer++;

  switch (e.type) {
    case 'fighter':
      e.x += e.vx * spd;
      if (e.timer > 30) {
        const dy = player.y - e.y;
        e.y += Math.sign(dy) * 0.5 * spd;
      }
      break;

    case 'swarm':
      e.x += e.vx * spd;
      e.y = e.data.baseY + Math.sin(e.timer * e.data.waveSpeed) * e.data.waveAmp;
      break;

    case 'spore':
      e.x += e.vx * spd;
      if (e.timer % e.data.fireRate === 0 && e.x < GW - 20) {
        for (let i = -2; i <= 2; i++) {
          const a = Math.PI + i * 0.3;
          enemyBullets.push({
            x: e.x - 10, y: e.y,
            vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5,
            w: 4, h: 4, color: '#ff66aa'
          });
        }
      }
      break;

    case 'snake':
      e.x += e.vx * spd;
      e.y += Math.sin(e.timer * 0.05) * 1.5 * spd;
      if (e.data.segments) {
        for (let i = e.data.segments.length - 1; i > 0; i--) {
          e.data.segments[i].x = TAS.math.lerp(e.data.segments[i].x, e.data.segments[i - 1].x, 0.3);
          e.data.segments[i].y = TAS.math.lerp(e.data.segments[i].y, e.data.segments[i - 1].y, 0.3);
        }
        e.data.segments[0].x = e.x;
        e.data.segments[0].y = e.y;
      }
      break;

    case 'drone':
      e.x += e.vx * spd;
      if (e.x < GW * 0.7) e.vx = 0;
      if (e.timer % e.data.fireRate === 0 && e.x < GW - 10) {
        const a = TAS.math.angle(e.x, e.y, player.x, player.y);
        enemyBullets.push({
          x: e.x - 11, y: e.y,
          vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
          w: 5, h: 5, color: '#ff4444'
        });
      }
      break;

    case 'miniboss':
      e.x += e.vx * spd;
      if (e.x < GW * 0.75) e.vx = 0;
      e.y += Math.sin(e.timer * 0.02) * 1 * spd;
      e.y = TAS.math.clamp(e.y, 40, GH - 40);
      if (e.timer % e.data.fireRate === 0 && e.x < GW - 10) {
        e.data.pattern = (e.data.pattern + 1) % 3;
        if (e.data.pattern === 0) {
          const a = TAS.math.angle(e.x, e.y, player.x, player.y);
          for (let i = -1; i <= 1; i++) {
            enemyBullets.push({
              x: e.x - 15, y: e.y,
              vx: Math.cos(a + i * 0.15) * 3, vy: Math.sin(a + i * 0.15) * 3,
              w: 5, h: 5, color: '#ffaa00'
            });
          }
        } else {
          for (let i = 0; i < 8; i++) {
            const a = i * Math.PI / 4 + e.timer * 0.01;
            enemyBullets.push({
              x: e.x, y: e.y,
              vx: Math.cos(a) * 2, vy: Math.sin(a) * 2,
              w: 4, h: 4, color: '#ff6688'
            });
          }
        }
      }
      break;

    // --- PASS 2: Tasern enemy AI ---
    case 'reactor_cruiser':
      e.x += e.vx * spd;
      if (e.x < GW * 0.7) e.vx = 0;
      e.y += Math.sin(e.timer * 0.015) * 0.8 * spd;
      e.y = TAS.math.clamp(e.y, 30, GH - 30);
      // Shield regen
      e.data.shieldRegen++;
      if (e.data.shieldRegen > 180 && e.data.shieldHp < e.data.shieldMax) {
        e.data.shieldHp = Math.min(e.data.shieldMax, e.data.shieldHp + 1);
        e.data.shieldRegen = 150;
      }
      // Fire dual cannons
      if (e.timer % e.data.fireRate === 0 && e.x < GW - 10) {
        const a = TAS.math.angle(e.x, e.y, player.x, player.y);
        enemyBullets.push({
          x: e.x - 18, y: e.y - 3,
          vx: Math.cos(a) * 3.5, vy: Math.sin(a) * 3.5,
          w: 5, h: 3, color: '#ff6622'
        });
        enemyBullets.push({
          x: e.x - 18, y: e.y + 3,
          vx: Math.cos(a) * 3.5, vy: Math.sin(a) * 3.5,
          w: 5, h: 3, color: '#ff6622'
        });
      }
      break;

    case 'spore_swarm':
      e.x += e.vx * spd;
      e.y += e.vy * spd;
      // Slight homing toward player
      const dxS = player.x - e.x;
      const dyS = player.y - e.y;
      e.vy += Math.sign(dyS) * 0.02 * spd;
      e.vy = TAS.math.clamp(e.vy, -3, 3);
      break;

    case 'mycelial_worm':
      // Head tracks player vertically
      const dyW = player.y - e.y;
      e.y += Math.sign(dyW) * 0.6 * spd;
      e.x += e.vx * spd;
      if (e.x < GW * 0.65) e.vx = Math.sin(e.timer * 0.01) * 0.5;
      // Segments follow
      if (e.data.segments) {
        for (let i = e.data.segments.length - 1; i > 0; i--) {
          e.data.segments[i].x = TAS.math.lerp(e.data.segments[i].x, e.data.segments[i - 1].x, 0.2);
          e.data.segments[i].y = TAS.math.lerp(e.data.segments[i].y, e.data.segments[i - 1].y, 0.2);
        }
        e.data.segments[0].x = e.x;
        e.data.segments[0].y = e.y;
      }
      // Fire spore clouds from segments
      if (e.timer % e.data.fireRate === 0 && e.x < GW - 10) {
        for (let i = 0; i < e.data.segments.length; i += 3) {
          const seg = e.data.segments[i];
          if (seg.hp <= 0) continue;
          const a = TAS.math.angle(seg.x, seg.y, player.x, player.y);
          enemyBullets.push({
            x: seg.x, y: seg.y,
            vx: Math.cos(a) * 2, vy: Math.sin(a) * 2,
            w: 4, h: 4, color: '#88ff44'
          });
        }
      }
      break;
  }
}

// === BOSS ===
function spawnBoss() {
  bossActive = true;
  const bossHp = 60 + stage * 30;
  boss = {
    x: GW + 40, y: GH / 2,
    targetX: GW - 60, targetY: GH / 2,
    w: 50, h: 40,
    hp: bossHp, maxHp: bossHp,
    timer: 0, phase: 0, alive: true,
    parts: [], score: 5000 + stage * 2000,
    enraged: false
  };
  const partCount = 3 + Math.floor(stage / 2);
  for (let i = 0; i < partCount; i++) {
    boss.parts.push({
      offsetX: -20 - i * 15,
      offsetY: (i % 2 === 0 ? -1 : 1) * (10 + i * 5),
      hp: 10 + stage * 3,
      maxHp: 10 + stage * 3,
      alive: true,
      w: 16, h: 12
    });
  }
  SFX.bossWarn();
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);

  // Draw parts
  for (const p of boss.parts) {
    if (!p.alive) continue;
    ctx.fillStyle = '#663344';
    ctx.fillRect(p.offsetX - p.w / 2, p.offsetY - p.h / 2, p.w, p.h);
    ctx.fillStyle = '#994466';
    ctx.fillRect(p.offsetX - p.w / 2 + 2, p.offsetY - p.h / 2 + 2, p.w - 4, p.h - 4);
    ctx.fillStyle = '#ff88aa';
    ctx.fillRect(p.offsetX - 2, p.offsetY - 2, 4, 4);
  }

  // Main body (NES blocky style)
  ctx.fillStyle = boss.enraged ? '#662244' : '#442233';
  ctx.fillRect(-25, -20, 50, 40);
  ctx.fillStyle = boss.enraged ? '#884466' : '#664455';
  ctx.fillRect(-20, -15, 40, 30);

  // Boss eye/core
  const pulse = 0.5 + Math.sin(frame * 0.08) * 0.4;
  ctx.fillStyle = boss.enraged ? '#ff2200' : STAGE_COLORS[stage].accent;
  ctx.globalAlpha = pulse;
  ctx.fillRect(-6, -6, 12, 12);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-2, -2, 4, 4);

  // Enraged indicator
  if (boss.enraged) {
    ctx.fillStyle = '#ff0000';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.2) * 0.2;
    ctx.fillRect(-28, -23, 56, 46);
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // HP bar at top
  const hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = '#222';
  ctx.fillRect(GW * 0.2, 32, GW * 0.6, 6);
  ctx.fillStyle = hpPct > 0.5 ? '#ff4488' : hpPct > 0.25 ? '#ffaa00' : '#ff2222';
  ctx.fillRect(GW * 0.2, 32, Math.floor(GW * 0.6 * hpPct), 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW * 0.2, 32, GW * 0.6, 6);
}

function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  const spd = dt * 60;
  boss.timer++;

  // Enrage at 30% HP
  if (!boss.enraged && boss.hp < boss.maxHp * 0.3) {
    boss.enraged = true;
    triggerShake(6, 0.92);
    SFX.bossWarn();
  }

  boss.x = TAS.math.lerp(boss.x, boss.targetX, 0.02);
  boss.y = TAS.math.lerp(boss.y, boss.targetY, 0.02);
  boss.targetY = GH / 2 + Math.sin(boss.timer * 0.015) * (GH * 0.3);

  const attackRate = boss.enraged ? Math.max(12, 35 - stage * 3) : Math.max(20, 50 - stage * 3);
  if (boss.timer % attackRate === 0) {
    boss.phase = (boss.phase + 1) % (boss.enraged ? 5 : 4);
    switch (boss.phase) {
      case 0: // Aimed volley
        for (let i = -2; i <= 2; i++) {
          const a = TAS.math.angle(boss.x, boss.y, player.x, player.y) + i * 0.1;
          enemyBullets.push({
            x: boss.x - 25, y: boss.y,
            vx: Math.cos(a) * 3.5, vy: Math.sin(a) * 3.5,
            w: 5, h: 5, color: '#ff4488'
          });
        }
        break;
      case 1: // Ring
        for (let i = 0; i < 12; i++) {
          const a = i * Math.PI / 6 + boss.timer * 0.02;
          enemyBullets.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5,
            w: 4, h: 4, color: '#ffaa66'
          });
        }
        break;
      case 2: // Stream
        for (let i = 0; i < 5; i++) {
          setTimeout(function() {
            if (!boss || !boss.alive) return;
            const a = TAS.math.angle(boss.x, boss.y, player.x, player.y);
            enemyBullets.push({
              x: boss.x - 25, y: boss.y,
              vx: Math.cos(a) * 4, vy: Math.sin(a) * 4,
              w: 6, h: 6, color: '#ff6644'
            });
          }, i * 80);
        }
        break;
      case 3: // Part fire
        for (const p of boss.parts) {
          if (!p.alive) continue;
          const a = TAS.math.angle(boss.x + p.offsetX, boss.y + p.offsetY, player.x, player.y);
          enemyBullets.push({
            x: boss.x + p.offsetX, y: boss.y + p.offsetY,
            vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
            w: 4, h: 4, color: '#ff88dd'
          });
        }
        break;
      case 4: // Enrage: spore burst
        for (let i = 0; i < 20; i++) {
          const a = i * Math.PI / 10;
          const spd2 = 1.5 + Math.random() * 2;
          enemyBullets.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(a) * spd2, vy: Math.sin(a) * spd2,
            w: 3, h: 3, color: '#88ff44'
          });
        }
        break;
    }
  }
}

// === POWER-UPS ===
function spawnPowerUp(x, y) {
  const types = ['weapon', 'option', 'bomb', 'hp'];
  const weights = [5, 2, 2, 3];
  let total = weights.reduce(function(a, b) { return a + b; }, 0);
  let r = Math.random() * total;
  let type = types[0];
  for (let i = 0; i < weights.length; i++) {
    r -= weights[i];
    if (r <= 0) { type = types[i]; break; }
  }
  powerUps.push({ x, y, type, vy: Math.sin(frame * 0.1) * 0.5, timer: 0, w: 12, h: 12 });
}

function drawPowerUp(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  const bob = Math.floor(Math.sin(p.timer * 0.08) * 2);
  ctx.translate(0, bob);

  ctx.globalAlpha = 0.3 + Math.sin(p.timer * 0.1) * 0.15;
  ctx.fillStyle = '#fff';
  ctx.fillRect(-8, -8, 16, 16);
  ctx.globalAlpha = 1;

  const colors = { weapon: '#38d973', option: '#f4b41b', bomb: '#e6482e', hp: '#3cacd7' };
  ctx.fillStyle = colors[p.type] || '#fff';
  ctx.fillRect(-5, -5, 10, 10);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  const labels = { weapon: 'S', option: 'G', bomb: 'P', hp: '+' };
  ctx.fillText(labels[p.type], 0, 3);

  ctx.restore();
}

function collectPowerUp(p) {
  SFX.powerup();
  switch (p.type) {
    case 'weapon':
      if (weaponLevels[weaponIdx] < 3) {
        weaponLevels[weaponIdx]++;
      }
      break;
    case 'option':
      if (options.length < 2) {
        options.push({ x: player.x, y: player.y });
      } else {
        optionFormation = (optionFormation + 1) % 3;
      }
      break;
    case 'bomb':
      if (bombs < MAX_BOMBS) bombs++;
      break;
    case 'hp':
      if (hp < Math.floor(MAX_HP * conShieldMult())) hp++;
      break;
  }
}

// === BOMB ===
let bombActive = 0;
let superBombActive = 0;

function useBomb() {
  if (bombs <= 0 || bombActive > 0) return;
  bombs--;

  // Super bomb: STR >= 10 (above default gives bonus, at default still works but weaker)
  const isSuperBomb = statB.str >= 10;
  const bombDmg = Math.floor(20 * strBombMult());

  if (isSuperBomb && statB.str > 12) {
    // Super bomb: bigger blast, more damage, longer flash
    bombActive = 60;
    superBombActive = 60;
    SFX.superBomb();
    TAS.fx.flash('#ffdd44', 0.8);
    triggerShake(14, 0.93);

    for (const e of enemies) {
      e.hp -= Math.floor(bombDmg * 1.5);
      spawnExplosion(e.x, e.y, '#ff8844', 12, 4, 3);
    }
    if (boss && boss.alive) {
      boss.hp -= Math.floor(bombDmg * 1.2);
      for (const p of boss.parts) {
        if (p.alive) p.hp -= Math.floor(bombDmg * 0.8);
      }
      spawnExplosion(boss.x, boss.y, '#ffaa44', 20, 5, 4);
    }
  } else {
    bombActive = 45;
    SFX.bomb();
    TAS.fx.flash('#fff', 0.6);
    triggerShake(8, 0.92);

    for (const e of enemies) {
      e.hp -= bombDmg;
      TAS.particles.spawn(e.x, e.y, '#ff8844', 8, 3);
    }
    if (boss && boss.alive) {
      boss.hp -= Math.floor(bombDmg * 0.75);
      for (const p of boss.parts) {
        if (p.alive) p.hp -= Math.floor(bombDmg * 0.5);
      }
    }
  }
  enemyBullets = [];
}

// === ENVIRONMENTAL HAZARDS ===
let hazards = [];

function spawnHazard() {
  const types = ['asteroid', 'fungalWall', 'energyStream', 'asteroidSpore', 'reactorDebris'];
  const available = [];
  available.push('asteroid', 'fungalWall');
  if (stage >= 2) available.push('energyStream');
  if (stage >= 1) available.push('asteroidSpore');
  if (stage >= 3) available.push('reactorDebris');

  const type = available[Math.floor(Math.random() * available.length)];
  switch (type) {
    case 'asteroid':
      hazards.push({
        x: GW + 20, y: TAS.math.randRange(20, GH - 20),
        vx: -2 - Math.random() * 2, vy: (Math.random() - 0.5) * 1.5,
        w: 15 + Math.random() * 15, h: 15 + Math.random() * 15,
        type: 'asteroid', hp: 3, rot: Math.random() * Math.PI * 2
      });
      break;
    case 'fungalWall': {
      const gapY = TAS.math.randRange(60, GH - 60);
      const gapH = 50 + Math.random() * 30;
      hazards.push({
        x: GW + 10, y: 0,
        vx: -1.5, vy: 0,
        w: 20, h: gapY - gapH / 2,
        type: 'wall'
      });
      hazards.push({
        x: GW + 10, y: gapY + gapH / 2,
        vx: -1.5, vy: 0,
        w: 20, h: GH - (gapY + gapH / 2),
        type: 'wall'
      });
      break;
    }
    case 'energyStream':
      hazards.push({
        x: GW + 10, y: TAS.math.randRange(30, GH - 30),
        vx: -3, vy: 0,
        w: 60 + Math.random() * 40, h: 6,
        type: 'stream', timer: 0
      });
      break;
    // --- PASS 2: New hazards ---
    case 'asteroidSpore':
      // Asteroid that releases spore swarm enemies on death
      hazards.push({
        x: GW + 20, y: TAS.math.randRange(30, GH - 30),
        vx: -1.5 - Math.random(), vy: (Math.random() - 0.5),
        w: 20 + Math.random() * 10, h: 20 + Math.random() * 10,
        type: 'asteroidSpore', hp: 5, rot: Math.random() * Math.PI * 2
      });
      break;
    case 'reactorDebris':
      // Glowing reactor debris that explodes near player
      hazards.push({
        x: GW + 20, y: TAS.math.randRange(20, GH - 20),
        vx: -2 - Math.random() * 1.5, vy: (Math.random() - 0.5) * 2,
        w: 12 + Math.random() * 8, h: 12 + Math.random() * 8,
        type: 'reactorDebris', hp: 2, timer: 0, rot: Math.random() * Math.PI * 2
      });
      break;
  }
}

function updateHazards(dt) {
  const spd = dt * 60;
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.x += h.vx * spd;
    h.y += h.vy * spd;
    if (h.timer !== undefined) h.timer++;
    if (h.rot !== undefined) h.rot += 0.02 * spd;
    if (h.x + h.w < -10) { hazards.splice(i, 1); continue; }

    // Reactor debris: explode when near player
    if (h.type === 'reactorDebris') {
      const dDist = TAS.math.dist(h.x, h.y, player.x, player.y);
      if (dDist < 50) {
        // Explode into bullets
        for (let j = 0; j < 6; j++) {
          const a = j * Math.PI / 3 + Math.random() * 0.3;
          enemyBullets.push({
            x: h.x, y: h.y,
            vx: Math.cos(a) * 2, vy: Math.sin(a) * 2,
            w: 3, h: 3, color: '#ff6622'
          });
        }
        spawnExplosion(h.x, h.y, '#ff6622', 8, 3, 2);
        triggerShake(3, 0.9);
        hazards.splice(i, 1);
        continue;
      }
    }

    // Check player collision
    if (invincible <= 0 && TAS.hit.rectOverlap(
      player.x - 10, player.y - 7, 20, 14,
      h.x - h.w / 2, h.y - h.h / 2, h.w, h.h
    )) {
      damagePlayer();
    }
  }
}

function drawHazards() {
  for (const h of hazards) {
    ctx.save();
    if (h.type === 'asteroid') {
      ctx.translate(h.x, h.y);
      ctx.rotate(h.rot || 0);
      ctx.fillStyle = '#554433';
      ctx.fillRect(-Math.floor(h.w / 2), -Math.floor(h.h / 2), Math.floor(h.w), Math.floor(h.h));
      ctx.fillStyle = '#443322';
      ctx.fillRect(-Math.floor(h.w / 4), -Math.floor(h.h / 4), Math.floor(h.w / 2), Math.floor(h.h / 2));
    } else if (h.type === 'wall') {
      ctx.fillStyle = '#2a4422';
      ctx.fillRect(h.x, h.y, h.w, h.h);
      ctx.fillStyle = '#3a5533';
      for (let sy = h.y; sy < h.y + h.h; sy += 8) {
        ctx.fillRect(h.x + 2, sy, 3, 4);
      }
    } else if (h.type === 'stream') {
      ctx.globalAlpha = 0.5 + Math.sin((h.timer || 0) * 0.1) * 0.3;
      ctx.fillStyle = STAGE_COLORS[stage].accent;
      ctx.fillRect(h.x - Math.floor(h.w / 2), h.y - Math.floor(h.h / 2), Math.floor(h.w), Math.floor(h.h));
      ctx.globalAlpha = 1;
    } else if (h.type === 'asteroidSpore') {
      ctx.translate(h.x, h.y);
      ctx.rotate(h.rot || 0);
      ctx.fillStyle = '#445533';
      ctx.fillRect(-Math.floor(h.w / 2), -Math.floor(h.h / 2), Math.floor(h.w), Math.floor(h.h));
      // Spore veins
      ctx.fillStyle = '#88ff44';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
      ctx.fillRect(-2, -Math.floor(h.h / 2), 4, Math.floor(h.h));
      ctx.fillRect(-Math.floor(h.w / 2), -2, Math.floor(h.w), 4);
      ctx.globalAlpha = 1;
    } else if (h.type === 'reactorDebris') {
      ctx.translate(h.x, h.y);
      ctx.rotate(h.rot || 0);
      ctx.fillStyle = '#663322';
      ctx.fillRect(-Math.floor(h.w / 2), -Math.floor(h.h / 2), Math.floor(h.w), Math.floor(h.h));
      // Reactor glow
      ctx.fillStyle = '#ff6622';
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15) * 0.3;
      ctx.fillRect(-3, -3, 6, 6);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
}

// === DAMAGE/DEATH ===
function damagePlayer() {
  if (invincible > 0) return;
  hp--;
  invincible = 90;
  SFX.playerHit();
  triggerShake(5, 0.88);
  TAS.fx.flash('#ff0000', 0.3);
  spawnExplosion(player.x, player.y, '#ff4444', 8, 2.5, 2);

  if (hp <= 0) {
    killPlayer();
  }
}

function killPlayer() {
  lives--;
  SFX.die();
  triggerShake(10, 0.93);
  TAS.fx.flash('#ffffff', 0.5);
  spawnExplosion(player.x, player.y, '#ff8844', 25, 4, 3);
  spawnExplosion(player.x, player.y, '#ffdd44', 15, 3, 2);
  spawnExplosion(player.x, player.y, '#ffffff', 10, 5, 1);

  multiplier = 1;
  multiTimer = 0;

  if (lives <= 0) {
    state = 'gameOver';
    stateTimer = 0;
    if (score > highScore) {
      highScore = score;
      TAS.score.save('overhorizon_hi', highScore);
    }
    SFX.gameOver();
  } else {
    deathTimer = 90;
    hp = Math.floor(MAX_HP * conShieldMult());
    invincible = 180;
    player.x = 60;
    player.y = GH / 2;
    if (weaponLevels[weaponIdx] > 0) weaponLevels[weaponIdx]--;
  }
}

// === SPAWN PATTERNS ===
function getSpawnPattern() {
  const patterns = [];
  // Fighter wave
  patterns.push(function() {
    for (let i = 0; i < 5; i++) {
      setTimeout(function() { spawnEnemy('fighter', GW + 20 + i * 30, TAS.math.randRange(40, GH - 40)); }, i * 100);
    }
  });
  // Swarm
  patterns.push(function() {
    const baseY = TAS.math.randRange(60, GH - 60);
    for (let i = 0; i < 8; i++) {
      spawnEnemy('swarm', GW + 20 + i * 20, baseY);
    }
  });
  // Spore launcher
  patterns.push(function() {
    spawnEnemy('spore', GW + 20, TAS.math.randRange(50, GH - 50));
  });
  // Snake
  if (stage >= 1) {
    patterns.push(function() {
      spawnEnemy('snake', GW + 20, TAS.math.randRange(40, GH - 40));
    });
  }
  // Drone
  if (stage >= 2) {
    patterns.push(function() {
      spawnEnemy('drone', GW + 20, TAS.math.randRange(50, GH - 50));
    });
  }
  // Miniboss
  if (stage >= 3 && stageFrame > 600 && stageFrame < STAGE_LENGTH - 300) {
    patterns.push(function() {
      spawnEnemy('miniboss', GW + 40, GH / 2);
    });
  }
  // --- PASS 2: Tasern spawn patterns ---
  // Spore Swarm cloud
  if (stage >= 1) {
    patterns.push(function() {
      const baseY = TAS.math.randRange(40, GH - 40);
      for (let i = 0; i < 12; i++) {
        spawnEnemy('spore_swarm', GW + 10 + Math.random() * 40, baseY + (Math.random() - 0.5) * 60);
      }
    });
  }
  // Reactor Cruiser
  if (stage >= 2) {
    patterns.push(function() {
      spawnEnemy('reactor_cruiser', GW + 30, TAS.math.randRange(50, GH - 50));
    });
  }
  // Mycelial Worm
  if (stage >= 4) {
    patterns.push(function() {
      spawnEnemy('mycelial_worm', GW + 40, TAS.math.randRange(40, GH - 40));
    });
  }
  return patterns;
}

// === KEY STATE FOR EDGE DETECTION ===
let prevKeys = {};
function keyJustPressed(code) {
  return (TAS.input.keys[code] && !prevKeys[code]);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  const spd = dt * 60;

  // Update explosions
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.x += ex.vx;
    ex.y += ex.vy;
    ex.vx *= 0.95;
    ex.vy *= 0.95;
    ex.life--;
    if (ex.life <= 0) { explosions.splice(i, 1); }
  }

  // Screen shake decay
  if (screenShake > 0) {
    screenShake *= screenShakeDecay;
    if (screenShake < 0.5) screenShake = 0;
  }

  // Super bomb timer
  if (superBombActive > 0) superBombActive--;

  if (state === 'title') {
    if (anyKey()) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    stateTimer++;
    if (stateTimer > 60 && anyKey()) {
      state = 'title';
    }
    return;
  }

  if (state === 'stageClear') {
    stateTimer++;
    if (stateTimer > 180) {
      if (stage >= 7) {
        state = 'victory';
        stateTimer = 0;
        if (score > highScore) { highScore = score; TAS.score.save('overhorizon_hi', highScore); }
      } else {
        startStage(stage + 1);
        state = 'playing';
      }
    }
    return;
  }

  if (state === 'victory') {
    stateTimer++;
    if (stateTimer > 120 && anyKey()) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Death timer
  if (deathTimer > 0) { deathTimer--; return; }

  stageFrame++;
  scrollX += spd;

  if (invincible > 0) invincible--;

  // Multiplier decay
  if (multiTimer > 0) {
    multiTimer--;
    if (multiTimer <= 0) multiplier = Math.max(1, multiplier - 1);
  }

  if (bombActive > 0) bombActive--;

  // === INPUT (NES-style: D-pad + A/B) ===
  const baseMoveSpeed = speedToggle ? PLAYER_SPEED_FAST : PLAYER_SPEED_SLOW;
  const moveSpeed = baseMoveSpeed * dexSpeedMult() * statB.speed * spd;
  const inp = TAS.input;

  if (inp.keys['ArrowLeft'] || inp.keys['KeyA'] || inp.touch.left) {
    player.x -= moveSpeed;
  }
  if (inp.keys['ArrowRight'] || inp.keys['KeyD'] || inp.touch.right) {
    player.x += moveSpeed;
  }
  if (inp.keys['ArrowUp'] || inp.keys['KeyW'] || inp.touch.up) {
    player.y -= moveSpeed;
  }
  if (inp.keys['ArrowDown'] || inp.keys['KeyS'] || inp.touch.down) {
    player.y += moveSpeed;
  }

  player.x = TAS.math.clamp(player.x, 14, GW - 14);
  player.y = TAS.math.clamp(player.y, 14, GH - 14);

  // Speed toggle (Select / Shift)
  if (keyJustPressed('ShiftLeft') || keyJustPressed('ShiftRight')) {
    speedToggle = !speedToggle;
  }

  // Fire angle adjust: R key
  if (keyJustPressed('KeyR')) {
    fireAngleIdx = (fireAngleIdx + 1) % FIRE_ANGLES.length;
  }
  if ((inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.a) && keyJustPressed('ArrowUp')) {
    const upAngles = [0, 1, 3];
    const curIdx = upAngles.indexOf(fireAngleIdx);
    fireAngleIdx = upAngles[(curIdx + 1) % upAngles.length];
  }
  if ((inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.a) && keyJustPressed('ArrowDown')) {
    const downAngles = [0, 2, 4];
    const curIdx = downAngles.indexOf(fireAngleIdx);
    fireAngleIdx = downAngles[(curIdx + 1) % downAngles.length];
  }

  // Weapon switch (B button / X key) - now cycles through 5 weapons
  if (keyJustPressed('KeyX') || keyJustPressed('KeyB')) {
    weaponIdx = (weaponIdx + 1) % 5;
    SFX.weaponSwitch();
  }
  if (inp.touch.b && !prevKeys._touchB) {
    // Touch B = bomb (NES style: B=bomb, A=fire)
    useBomb();
  }

  // Formation cycle (C key)
  if (keyJustPressed('KeyC')) {
    optionFormation = (optionFormation + 1) % 3;
  }

  // Bomb (V key)
  if (keyJustPressed('KeyV')) {
    useBomb();
  }

  // Firing (A button / Z / Space)
  if (inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.a) {
    fireTimer++;
    if (fireTimer >= getFireRate()) {
      fireTimer = 0;
      fireWeapon(player.x + 14, player.y, 0);
      const optPos = getOptionPositions();
      for (const op of optPos) {
        fireWeapon(op.x + 8, op.y, 0);
      }
    }
  } else {
    fireTimer = getFireRate() - 1;
  }

  // === UPDATE BULLETS ===
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life--;
    if (b.life <= 0 || b.x > GW + 20 || b.x < -20 || b.y < -20 || b.y > GH + 20) {
      bullets.splice(i, 1);
      continue;
    }

    if (b.type === 'wave') {
      b.x += b.vx * spd;
      b.phase += b.freq * spd * 60;
      const waveOffset = Math.sin(b.phase) * b.amp;
      b.y = b.baseY + waveOffset * Math.cos(b.angle) + Math.sin(b.angle) * (b.x - player.x);
    } else if (b.type === 'homing') {
      let nearest = null;
      let nearDist = 9999;
      for (const e of enemies) {
        const d = TAS.math.dist(b.x, b.y, e.x, e.y);
        if (d < nearDist) { nearDist = d; nearest = e; }
      }
      if (boss && boss.alive) {
        const d = TAS.math.dist(b.x, b.y, boss.x, boss.y);
        if (d < nearDist) { nearDist = d; nearest = boss; }
      }
      if (nearest) {
        const targetAngle = TAS.math.angle(b.x, b.y, nearest.x, nearest.y);
        const currentAngle = Math.atan2(b.vy, b.vx);
        let diff = targetAngle - currentAngle;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        const turn = TAS.math.clamp(diff, -b.turnSpeed, b.turnSpeed);
        const newAngle = currentAngle + turn;
        const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        b.vx = Math.cos(newAngle) * speed;
        b.vy = Math.sin(newAngle) * speed;
      }
      b.x += b.vx * spd;
      b.y += b.vy * spd;
    } else if (b.type === 'beam') {
      // Beam stays at player position but extends forward
      b.x = player.x + 14;
      b.y = player.y + b.vy;
    } else {
      b.x += b.vx * spd;
      b.y += b.vy * spd;
    }

    // Check collision with enemies
    let hitSomething = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, e.x - (e.w || 10) / 2, e.y - (e.h || 10) / 2, e.w || 10, e.h || 10)) {
        // Reactor Cruiser shield absorbs damage first
        if (e.type === 'reactor_cruiser' && e.data.shieldHp > 0) {
          e.data.shieldHp -= b.dmg;
          e.data.shieldRegen = 0;
          TAS.particles.spawn(b.x, b.y, '#44aaff', 4, 2);
          if (e.data.shieldHp <= 0) e.data.shieldHp = 0;
        } else {
          e.hp -= b.dmg;
          TAS.particles.spawn(b.x, b.y, '#ffdd44', 3, 2);
          SFX.hit();
        }
        if (e.hp <= 0) {
          destroyEnemy(e, j);
        }
        if (!b.pierce) { hitSomething = true; break; }
      }
    }

    // Check boss
    if (!hitSomething && boss && boss.alive) {
      for (const p of boss.parts) {
        if (!p.alive) continue;
        if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
          boss.x + p.offsetX - p.w / 2, boss.y + p.offsetY - p.h / 2, p.w, p.h)) {
          p.hp -= b.dmg;
          TAS.particles.spawn(b.x, b.y, '#ff88aa', 3, 2);
          if (p.hp <= 0) {
            p.alive = false;
            spawnExplosion(boss.x + p.offsetX, boss.y + p.offsetY, '#ff4488', 12, 3, 2);
            SFX.explode();
            score += Math.floor(500 * multiplier * intScoreMult());
          }
          if (!b.pierce) hitSomething = true;
          break;
        }
      }
      if (!hitSomething && TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
        boss.x - 25, boss.y - 20, 50, 40)) {
        boss.hp -= b.dmg;
        TAS.particles.spawn(b.x, b.y, '#ffaa66', 3, 2);
        SFX.hit();
        if (!b.pierce) hitSomething = true;
      }
    }

    // Check hazards
    if (!hitSomething) {
      for (let j = hazards.length - 1; j >= 0; j--) {
        const h = hazards[j];
        if ((h.type === 'asteroid' || h.type === 'asteroidSpore' || h.type === 'reactorDebris') && h.hp !== undefined) {
          if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
            h.x - h.w / 2, h.y - h.h / 2, h.w, h.h)) {
            h.hp -= b.dmg;
            if (h.hp <= 0) {
              if (h.type === 'asteroidSpore') {
                // Spawn spore swarm on death
                for (let sp = 0; sp < 5; sp++) {
                  spawnEnemy('spore_swarm', h.x + (Math.random() - 0.5) * 20, h.y + (Math.random() - 0.5) * 20);
                }
                spawnExplosion(h.x, h.y, '#88ff44', 10, 3, 2);
              } else if (h.type === 'reactorDebris') {
                spawnExplosion(h.x, h.y, '#ff6622', 8, 3, 2);
              } else {
                spawnExplosion(h.x, h.y, '#887766', 8, 2, 2);
              }
              hazards.splice(j, 1);
              score += Math.floor(25 * multiplier * intScoreMult());
            }
            if (!b.pierce) hitSomething = true;
            break;
          }
        }
      }
    }

    if (hitSomething) { bullets.splice(i, 1); }
  }

  // === UPDATE ENEMY BULLETS ===
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (invincible <= 0 && TAS.hit.rectOverlap(
      player.x - 6, player.y - 5, 12, 10,
      b.x - b.w / 2, b.y - b.h / 2, b.w, b.h
    )) {
      enemyBullets.splice(i, 1);
      damagePlayer();
    }
  }

  // === UPDATE ENEMIES ===
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    updateEnemy(e, dt);
    if (e.x < -40 || e.x > GW + 60) { enemies.splice(i, 1); continue; }

    if (invincible <= 0 && TAS.hit.rectOverlap(
      player.x - 8, player.y - 6, 16, 12,
      e.x - (e.w || 10) / 2, e.y - (e.h || 10) / 2, e.w || 10, e.h || 10
    )) {
      damagePlayer();
      e.hp -= 5;
      if (e.hp <= 0) destroyEnemy(e, i);
    }
  }

  // === UPDATE BOSS ===
  if (boss && boss.alive) {
    updateBoss(dt);
    if (boss.hp <= 0) {
      boss.alive = false;
      spawnExplosion(boss.x, boss.y, '#ff4488', 40, 5, 4);
      spawnExplosion(boss.x, boss.y, '#ffdd44', 30, 4, 3);
      spawnExplosion(boss.x, boss.y, '#ffffff', 20, 6, 2);
      SFX.explode();
      triggerShake(14, 0.95);
      TAS.fx.flash('#ffffff', 0.6);
      score += Math.floor(boss.score * multiplier * intScoreMult());
      SFX.stageClear();
      state = 'stageClear';
      stateTimer = 0;
      bossActive = false;
    }
  }

  // === UPDATE POWER-UPS ===
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const p = powerUps[i];
    p.x -= 1 * spd;
    p.timer++;
    if (p.x < -20) { powerUps.splice(i, 1); continue; }
    if (TAS.hit.rectOverlap(player.x - 10, player.y - 8, 20, 16, p.x - 6, p.y - 6, 12, 12)) {
      collectPowerUp(p);
      powerUps.splice(i, 1);
    }
  }

  // === UPDATE HAZARDS ===
  updateHazards(dt);

  // === SPAWNING ===
  if (!bossActive) {
    const spawnRate = Math.max(40, 120 - stage * 10 - Math.floor(stageFrame / 200));
    if (stageFrame % spawnRate === 0) {
      const patterns = getSpawnPattern();
      const pat = patterns[Math.floor(Math.random() * patterns.length)];
      pat();
    }

    if (stageFrame % Math.max(80, 180 - stage * 10) === 0 && stageFrame > 60) {
      spawnHazard();
    }

    if (stageFrame >= STAGE_LENGTH) {
      bossWarning++;
      if (bossWarning === 1) SFX.bossWarn();
      if (bossWarning >= 120) {
        spawnBoss();
      }
    }
  }

  // === BACKGROUND ===
  starfield.update(1);
  for (const layer of bgLayers) {
    for (const shape of layer.shapes) {
      shape.x -= layer.speed * spd;
      if (shape.x + shape.w < -10) {
        shape.x = GW + 10 + Math.random() * 50;
        shape.y = Math.random() * GH;
      }
    }
  }

  // Save prev keys
  prevKeys = {};
  for (const k in TAS.input.keys) {
    prevKeys[k] = TAS.input.keys[k];
  }
  prevKeys._touchB = inp.touch.b;
}

function destroyEnemy(e, idx) {
  spawnExplosion(e.x, e.y, '#ff8844', 10, 3, 2);
  spawnExplosion(e.x, e.y, '#ffdd44', 6, 2, 1.5);
  SFX.explode();
  triggerShake(2, 0.88);
  score += Math.floor((e.score || 100) * multiplier * intScoreMult());
  multiplier = Math.min(16, multiplier + 1);
  multiTimer = 180;
  // CHA-based drop chance
  if (Math.random() < chaDropChance()) {
    spawnPowerUp(e.x, e.y);
  }
  // Spore swarm splits on death
  if (e.type === 'spore_swarm' && e.data.splitOnDeath) {
    for (let i = 0; i < 2; i++) {
      const tiny = {
        x: e.x + (Math.random() - 0.5) * 10,
        y: e.y + (Math.random() - 0.5) * 10,
        type: 'spore_swarm', hp: 1, maxHp: 1,
        vx: -2 - Math.random() * 2,
        vy: (Math.random() - 0.5) * 4,
        w: 6, h: 6, score: 15, timer: 0,
        data: { splitOnDeath: false }
      };
      enemies.push(tiny);
    }
  }
  // Mycelial worm: damage segments
  if (e.type === 'mycelial_worm' && e.data.segments) {
    for (const seg of e.data.segments) {
      if (seg.hp > 0) {
        spawnExplosion(seg.x, seg.y, '#88ff44', 4, 2, 1.5);
      }
    }
  }
  if (idx !== undefined) enemies.splice(idx, 1);
}

// === DRAW ===
function draw(dt) {
  const col = STAGE_COLORS[stage] || STAGE_COLORS[0];

  // Background
  ctx.fillStyle = col.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    starfield.draw();
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    starfield.draw();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + STAGE_NAMES[stage] });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();

  // Apply screen shake
  if (screenShake > 0) {
    const shakeX = Math.floor((Math.random() - 0.5) * screenShake * 2);
    const shakeY = Math.floor((Math.random() - 0.5) * screenShake * 2);
    ctx.translate(shakeX, shakeY);
  }
  TAS.fx.applyShake();

  // Stars
  starfield.draw();

  // Parallax bg layers (4 layers for depth)
  for (let l = 0; l < bgLayers.length; l++) {
    const layer = bgLayers[l];
    ctx.globalAlpha = layer.alpha;
    ctx.fillStyle = layer.color;
    for (const shape of layer.shapes) {
      if (shape.type === 0) {
        // Circle
        const r = Math.floor(shape.w / 3);
        ctx.fillRect(shape.x - r, shape.y - r, r * 2, r * 2);
      } else if (shape.type === 1) {
        ctx.fillRect(Math.floor(shape.x), Math.floor(shape.y), Math.floor(shape.w), Math.floor(shape.h));
      } else if (shape.type === 2) {
        // Diamond
        ctx.beginPath();
        ctx.moveTo(Math.floor(shape.x), Math.floor(shape.y - shape.h / 2));
        ctx.lineTo(Math.floor(shape.x + shape.w / 2), Math.floor(shape.y));
        ctx.lineTo(Math.floor(shape.x), Math.floor(shape.y + shape.h / 2));
        ctx.lineTo(Math.floor(shape.x - shape.w / 2), Math.floor(shape.y));
        ctx.closePath();
        ctx.fill();
      } else if (shape.type === 3) {
        // Tendril
        ctx.strokeStyle = layer.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(Math.floor(shape.x), Math.floor(shape.y));
        ctx.quadraticCurveTo(Math.floor(shape.x + shape.w / 2), Math.floor(shape.y + shape.h), Math.floor(shape.x + shape.w), Math.floor(shape.y));
        ctx.stroke();
      } else {
        // Spore cluster (new shape type)
        ctx.fillStyle = col.accent;
        ctx.globalAlpha = layer.alpha * 0.5;
        for (let sp = 0; sp < 3; sp++) {
          const ox = Math.floor(Math.sin(frame * 0.01 + sp * 2) * 4);
          const oy = Math.floor(Math.cos(frame * 0.01 + sp * 2) * 4);
          ctx.fillRect(Math.floor(shape.x) + ox - 2, Math.floor(shape.y) + oy - 2, 4, 4);
        }
        ctx.fillStyle = layer.color;
        ctx.globalAlpha = layer.alpha;
      }
    }
    ctx.globalAlpha = 1;
  }

  // Hazards
  drawHazards();

  // Enemies
  for (const e of enemies) { drawEnemy(e); }

  // Boss
  if (boss && boss.alive) drawBoss();

  // Boss warning
  if (bossWarning > 0 && !bossActive) {
    const flash = Math.sin(bossWarning * 0.15) > 0;
    if (flash) {
      ctx.fillStyle = '#ff2244';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WARNING', GW / 2, GH / 2);
      ctx.font = '10px monospace';
      ctx.fillText('ELDER SPORE INCOMING', GW / 2, GH / 2 + 16);
    }
  }

  // Power-ups
  for (const p of powerUps) { drawPowerUp(p); }

  // Enemy bullets
  for (const b of enemyBullets) {
    ctx.fillStyle = b.color || '#ff4444';
    ctx.fillRect(Math.floor(b.x - b.w / 2), Math.floor(b.y - b.h / 2), b.w, b.h);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(Math.floor(b.x - 1), Math.floor(b.y - 1), 2, 2);
    ctx.globalAlpha = 1;
  }

  // Player bullets
  for (const b of bullets) {
    if (b.type === 'laser') {
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.8;
      ctx.save();
      const angle = Math.atan2(b.vy, b.vx);
      ctx.translate(Math.floor(b.x), Math.floor(b.y));
      ctx.rotate(angle);
      ctx.fillRect(Math.floor(-b.w / 2), Math.floor(-b.h / 2), b.w, b.h);
      ctx.globalAlpha = 0.3;
      ctx.fillRect(Math.floor(-b.w / 2), -b.h, b.w, b.h * 2);
      ctx.restore();
      ctx.globalAlpha = 1;
    } else if (b.type === 'wave') {
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(Math.floor(b.x - b.w / 2), Math.floor(b.y - b.h / 2), b.w, b.h);
      ctx.globalAlpha = 0.3;
      ctx.fillRect(Math.floor(b.x - b.w), Math.floor(b.y - b.h), b.w * 2, b.h * 2);
      ctx.globalAlpha = 1;
    } else if (b.type === 'homing') {
      ctx.fillStyle = b.color;
      const angle = Math.atan2(b.vy, b.vx);
      ctx.save();
      ctx.translate(Math.floor(b.x), Math.floor(b.y));
      ctx.rotate(angle);
      ctx.fillRect(-3, -2, 6, 4);
      ctx.fillRect(3, -1, 2, 2);
      ctx.restore();
      TAS.particles.spawn(b.x - b.vx * 0.3, b.y - b.vy * 0.3, '#ff8844', 1, 0.5, { size: 1, sizeVar: 1 });
    } else if (b.type === 'spore_bullet') {
      ctx.fillStyle = b.color;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(Math.floor(b.x - 2), Math.floor(b.y - 2), 4, 4);
      ctx.fillStyle = '#aaffaa';
      ctx.fillRect(Math.floor(b.x - 1), Math.floor(b.y - 1), 2, 2);
      ctx.globalAlpha = 1;
    } else if (b.type === 'beam') {
      ctx.fillStyle = '#ff4400';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
      ctx.fillRect(Math.floor(b.x), Math.floor(b.y - b.h / 2), Math.floor(b.w), b.h);
      ctx.fillStyle = '#ffaa44';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(Math.floor(b.x), Math.floor(b.y - b.h / 4), Math.floor(b.w), Math.floor(b.h / 2));
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(Math.floor(b.x), Math.floor(b.y - 1), Math.floor(b.w), 2);
      ctx.globalAlpha = 1;
    }
  }

  // Options
  const optPos = getOptionPositions();
  for (const op of optPos) {
    drawOption(op.x, op.y);
  }

  // Player
  if (deathTimer <= 0) {
    if (invincible <= 0 || Math.floor(invincible / 4) % 2 === 0) {
      drawShip(player.x, player.y);
    }
  }

  // Explosion particles (enhanced)
  for (const ex of explosions) {
    const alpha = ex.life / ex.maxLife;
    ctx.fillStyle = ex.color;
    ctx.globalAlpha = alpha;
    const sz = Math.floor(ex.size * alpha);
    ctx.fillRect(Math.floor(ex.x - sz / 2), Math.floor(ex.y - sz / 2), Math.max(1, sz), Math.max(1, sz));
  }
  ctx.globalAlpha = 1;

  // Engine particles
  TAS.particles.draw();
  ctx.restore();

  // Bomb flash
  if (bombActive > 0) {
    const bombAlpha = bombActive / (superBombActive > 0 ? 60 : 45) * (superBombActive > 0 ? 0.6 : 0.4);
    ctx.globalAlpha = bombAlpha;
    ctx.fillStyle = superBombActive > 0 ? '#ffdd44' : '#ffffff';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Stage clear overlay
  if (state === 'stageClear') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('SPORES CLEARED', GW / 2, GH / 2 - 20);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '12px monospace';
    ctx.fillText(STAGE_NAMES[stage] + ' composted!', GW / 2, GH / 2 + 10);
    if (stage < 7) {
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.fillText('Next: ' + STAGE_NAMES[stage + 1], GW / 2, GH / 2 + 30);
    }
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 11px monospace';

  // Score (INT boosted)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 4, 12);

  // Multiplier
  if (multiplier > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('x' + multiplier, 4, 24);
  }

  // Stage
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.font = '9px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW / 2, 12);

  // Weapon indicator (5 weapons now)
  const wNames = ['SEED', 'MYCO', 'POOP', 'SPORE', 'BURN'];
  const wColors = ['#38d973', '#a855f7', '#f4b41b', '#38d973', '#e6482e'];
  ctx.fillStyle = wColors[weaponIdx];
  ctx.font = 'bold 9px monospace';
  ctx.fillText(wNames[weaponIdx] + ' Lv' + (weaponLevels[weaponIdx] + 1), GW / 2, 24);

  // HP bar (CON boosted)
  const maxHpDisplay = Math.floor(MAX_HP * conShieldMult());
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('HP', GW - 80, 11);
  for (let i = 0; i < Math.min(maxHpDisplay, 7); i++) {
    ctx.fillStyle = i < hp ? '#38d973' : '#333';
    ctx.fillRect(GW - 75 + i * 10, 4, 8, 7);
  }

  // Lives (CON bonus)
  ctx.fillStyle = '#aaa';
  ctx.fillText('LIVES', GW - 40, 24);
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#38d973';
    ctx.fillRect(GW - 34 + i * 10, 18, 6, 6);
  }

  // Bombs
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'left';
  ctx.fillText('B:', 120, 24);
  for (let i = 0; i < bombs; i++) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(133 + i * 8, 19, 5, 5);
  }

  // Angle indicator
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(0, GH - 18, 70, 18);
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  const angleNames = ['FLAT', 'UP30', 'DN30', 'UP45', 'DN45'];
  ctx.fillText('ANG: ' + angleNames[fireAngleIdx], 3, GH - 6);

  // Formation indicator
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(72, GH - 18, 50, 18);
  ctx.fillStyle = '#888';
  const formNames = ['A:V', 'B:R', 'C:F'];
  ctx.fillText('OPT:' + formNames[optionFormation], 75, GH - 6);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Decorative background
  ctx.globalAlpha = 0.2;
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = STAGE_COLORS[i].accent;
    const x = 30 + i * 55;
    const y = GH * 0.65 + Math.floor(Math.sin(frame * 0.02 + i) * 10);
    ctx.fillRect(x - 3, y - 3, 6, 6);
  }
  ctx.globalAlpha = 1;

  // Title shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('BASELING HORIZON', GW / 2 + 2, 72);
  // Title
  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillText('BASELING HORIZON', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Spore-Powered Cosmic Shmup from Tasern', GW / 2, 92);

  // Ship preview
  drawShip(GW / 2, 140);

  // NES Controls
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('D-PAD/WASD: Move | A(Z/SPACE): Fire | B(X): Weapon', GW / 2, 178);
  ctx.fillText('R: Angle | C: Formation | V: Bomb | SHIFT: Speed', GW / 2, 192);

  // Weapon list
  ctx.fillStyle = '#38d973';
  ctx.fillText('SEED', Math.floor(GW * 0.15), 216);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('MYCO', Math.floor(GW * 0.32), 216);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('POOP', Math.floor(GW * 0.49), 216);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE', Math.floor(GW * 0.66), 216);
  ctx.fillStyle = '#e6482e';
  ctx.fillText('BURN', Math.floor(GW * 0.83), 216);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 242);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  starfield.draw();

  ctx.textAlign = 'center';

  const glow = 0.7 + Math.sin(frame * 0.03) * 0.3;
  ctx.globalAlpha = glow;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN VICTORIOUS', GW / 2, 80);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#3cacd7';
  ctx.font = '12px monospace';
  ctx.fillText('All cosmic spore fields cleansed!', GW / 2, 110);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 150);

  if (score >= highScore) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 170);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('The baseling gardens bloom across Tasern.', GW / 2, 210);
  ctx.fillText('POOP fuels the cosmos forever.', GW / 2, 225);

  if (stateTimer > 120) {
    const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
    ctx.globalAlpha = 1;
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
