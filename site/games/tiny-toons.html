"use strict";

// ============================================================
// STAT BONUSES (from NFT baseling)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat helpers — called every frame so they reflect live statB
// STR: damage dealt, breakable damage, boss damage
// DEX: move speed, dash speed, jump force boost
// CON: max HP, invuln duration, extra lives
// INT: score multiplier, coin value multiplier
// WIS: cooldown reduction, turret/boss attack telegraphing (aura warning)
// CHA: luck (crit chance, rare drops, better coin spawns)
function statMod(val) { return (val - 10) / 10; } // e.g. 20 => +1.0, 5 => -0.5
function dmgMult()    { return statB.damage * (1 + statMod(statB.str) * 0.5); }       // ref 1: STR
function spdMult()    { return statB.speed  * (1 + statMod(statB.dex) * 0.3); }       // ref 2: DEX
function hpMax()      { return Math.max(1, Math.floor((3 + Math.floor(statMod(statB.con) * 2)) * statB.hpMult)); } // ref 3: CON
function scoreMult()  { return statB.scoreMult * (1 + statMod(statB.int) * 0.4); }    // ref 4: INT
function cdMult()     { return statB.cooldown * Math.max(0.3, 1 - statMod(statB.wis) * 0.25); } // ref 5: WIS
function luckChance() { return Math.min(0.5, 0.05 + statMod(statB.cha) * 0.08) * statB.luck; } // ref 6: CHA
function bonusLives() { return statB.lives + Math.max(0, Math.floor(statMod(statB.con) * 0.5)); } // ref 7: CON extra lives
function coinMult()   { return 1 + statMod(statB.int) * 0.3; }                        // ref 8: INT coin value
function jumpMod()    { return 1 + statMod(statB.dex) * 0.15; }                       // ref 9: DEX jump boost
function invulnTime() { return INVULN_BASE * (1 + statMod(statB.con) * 0.2); }        // ref 10: CON invuln
function wisAura()    { return 40 + statMod(statB.wis) * 20; }                        // ref 11: WIS warning range
function critRoll()   { return Math.random() < luckChance(); }                        // ref 12: CHA crit
function dashSpd()    { return 3 * spdMult(); }                                       // ref 13: DEX dash
function breakDmg()   { return Math.ceil(1 * dmgMult()); }                            // ref 14: STR breakables
function bossDmg(isWeakness) { return Math.ceil((isWeakness ? 3 : 1) * dmgMult()); }  // ref 15: STR boss
function stompDmg()   { return Math.ceil(1 * dmgMult()); }                            // ref 16: STR stomp
function dashHitDmg() { return Math.ceil(2 * dmgMult()); }                            // ref 17: STR dash hit

// ============================================================
// SCORE POPUP SYSTEM
// ============================================================
let scorePopups = [];

function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#ffdd44', timer: 1.2, vy: -40 });
}

function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy * dt;
    p.vy *= 0.97;
    p.timer -= dt;
    if (p.timer <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  for (let i = 0; i < scorePopups.length; i++) {
    const p = scorePopups[i];
    const alpha = Math.min(1, p.timer / 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x - scrollX, p.y);
    // Shadow
    ctx.fillStyle = '#000000';
    ctx.fillText(p.text, p.x - scrollX + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x - scrollX, p.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer(x, y) {
  return {
    x: x, y: y, w: 12, h: 20,
    vx: 0, vy: 0,
    facing: 1,
    grounded: false,
    animFrame: 0,
    animTimer: 0
  };
}

// ============================================================
// LEVEL GENERATION
// ============================================================
function generateLevel(world, stage) {
  const lw = 2400 + stage * 400 + world * 200;
  platforms = [];
  enemies = [];
  coins_list = [];
  stars = [];
  breakables = [];
  conveyors = [];
  hazards = [];
  projectiles = [];
  items = [];
  scorePopups = [];
  boss = null;
  bossActive = false;
  currentZone = 0;

  // Ground
  const groundY = GH - 32;
  for (let x = 0; x < lw; x += TILE) {
    const gapChance = 0.02 + world * 0.01;
    if (Math.random() < gapChance && x > 200 && x < lw - 400) {
      x += TILE * 3;
      continue;
    }
    platforms.push({ x: x, y: groundY, w: TILE, h: TILE, type: 'ground' });
  }

  // Seed RNG for deterministic levels
  let seed = world * 1000 + stage * 100 + 42;
  function seededRandom() {
    seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (seed >>> 0) / 4294967296;
  }

  // Platforms
  const platformCount = 40 + world * 10 + stage * 5;
  for (let i = 0; i < platformCount; i++) {
    const px = 200 + seededRandom() * (lw - 400);
    const py = 80 + seededRandom() * (groundY - 120);
    const pw = TILE * (2 + Math.floor(seededRandom() * 4));
    platforms.push({ x: px, y: py, w: pw, h: TILE, type: 'platform' });
  }

  // High platforms (need Fizz double jump)
  const highCount = 3 + stage;
  for (let i = 0; i < highCount; i++) {
    const px = 300 + i * (lw / (highCount + 1));
    platforms.push({ x: px, y: 50 + seededRandom() * 30, w: TILE * 3, h: TILE, type: 'high' });
    stars.push({ x: px + TILE, y: 30, collected: false });
  }

  // Breakable walls (need Tank dash)
  const breakCount = 2 + world;
  for (let i = 0; i < breakCount; i++) {
    const bx = 400 + i * (lw / (breakCount + 1));
    const by = groundY - TILE * 3;
    for (let j = 0; j < 3; j++) {
      breakables.push({ x: bx, y: by - j * TILE, w: TILE, h: TILE, hp: 1 });
    }
    coins_list.push({ x: bx + TILE * 2, y: by - TILE, collected: false, value: 5 });
  }

  // Wall sections (need Spore wall-jump or Zip climb)
  if (world >= 1) {
    const wallCount = 2 + stage;
    for (let i = 0; i < wallCount; i++) {
      const wx = 500 + i * (lw / (wallCount + 1));
      const wallH = 5 + Math.floor(seededRandom() * 3);
      for (let j = 0; j < wallH; j++) {
        platforms.push({ x: wx, y: groundY - (j + 1) * TILE, w: TILE, h: TILE, type: 'wall' });
        platforms.push({ x: wx + TILE * 5, y: groundY - (j + 1) * TILE, w: TILE, h: TILE, type: 'wall' });
      }
      platforms.push({ x: wx, y: groundY - wallH * TILE - TILE, w: TILE * 6, h: TILE, type: 'platform' });
      coins_list.push({ x: wx + TILE * 2.5, y: groundY - wallH * TILE - TILE * 2, collected: false, value: 3 });
    }
  }

  // Speed sections (need Zip speed)
  if (world >= 2) {
    const speedCount = 1 + stage;
    for (let i = 0; i < speedCount; i++) {
      const sx = 600 + i * (lw / (speedCount + 1));
      for (let j = 0; j < 8; j++) {
        platforms.push({ x: sx + j * TILE * 2.5, y: groundY - TILE * 2, w: TILE * 2, h: TILE, type: 'crumble', timer: 0 });
      }
    }
  }

  // Conveyors (world 2+)
  if (world >= 2) {
    const convCount = 3 + stage;
    for (let i = 0; i < convCount; i++) {
      const cx = 300 + seededRandom() * (lw - 600);
      const cy = groundY - TILE * (2 + Math.floor(seededRandom() * 4));
      const dir = seededRandom() > 0.5 ? 1 : -1;
      conveyors.push({ x: cx, y: cy, w: TILE * 4, h: TILE, dir: dir, speed: 40 + world * 10 });
    }
  }

  // Enemies (Tasern-themed)
  const enemyCount = 10 + world * 5 + stage * 3;
  const etypes = ['sporeling', 'toadstool'];
  if (world >= 1) etypes.push('gloomwing', 'crawler');
  if (world >= 2) etypes.push('sporegun', 'golem');
  if (world >= 3) etypes.push('blightmaw', 'mimic');
  for (let i = 0; i < enemyCount; i++) {
    const ex = 300 + seededRandom() * (lw - 600);
    const ey = groundY - 20;
    const et = etypes[Math.floor(seededRandom() * etypes.length)];
    const def = ENEMY_TYPES[et];
    enemies.push({
      x: ex, y: et === 'gloomwing' ? 60 + seededRandom() * 120 : ey,
      w: def.w, h: def.h,
      vx: (seededRandom() > 0.5 ? 1 : -1) * def.speed,
      vy: 0,
      type: et,
      hp: def.hp,
      maxHp: def.hp,
      color: def.color,
      score: def.score,
      animTimer: seededRandom() * 3,
      shootTimer: 2 + seededRandom() * 3,
      startX: ex,
      patrolDist: 80 + seededRandom() * 60,
      revealed: et !== 'mimic' // mimics start hidden
    });
  }

  // Coins scattered (INT boosts value via coinMult)
  const coinCount = 30 + world * 10;
  for (let i = 0; i < coinCount; i++) {
    // CHA luck: chance of higher-value coins
    const val = critRoll() ? 3 : 1;
    coins_list.push({
      x: 100 + seededRandom() * (lw - 200),
      y: groundY - 30 - seededRandom() * 150,
      collected: false,
      value: val
    });
  }

  // Extra hidden stars
  while (stars.length < 3) {
    stars.push({
      x: 200 + seededRandom() * (lw - 400),
      y: 40 + seededRandom() * 60,
      collected: false
    });
  }
  stars = stars.slice(0, 3);
  totalStars = 3;

  // Hazards (Tasern-themed — type varies by world)
  const hazardCount = 5 + world * 3;
  const hazardPool = ['spikes'];
  if (world >= 1) hazardPool.push('thorns');
  if (world >= 2) hazardPool.push('acid', 'lightning');
  if (world >= 3) hazardPool.push('lava');
  for (let i = 0; i < hazardCount; i++) {
    const ht = hazardPool[Math.floor(seededRandom() * hazardPool.length)];
    hazards.push({
      x: 200 + seededRandom() * (lw - 400),
      y: groundY - 4,
      w: TILE * 2,
      h: 8,
      type: ht,
      animTimer: seededRandom() * 6
    });
  }

  // Items scattered (potions, scrolls, etc.)
  const itemCount = 4 + world * 2 + stage;
  const itemPool = ['potion', 'mushroom', 'scroll'];
  if (world >= 2) itemPool.push('shield');
  if (world >= 3) itemPool.push('sporepack');
  for (let i = 0; i < itemCount; i++) {
    const it = itemPool[Math.floor(seededRandom() * itemPool.length)];
    items.push({
      x: 150 + seededRandom() * (lw - 300),
      y: groundY - 40 - seededRandom() * 120,
      type: it,
      collected: false
    });
  }

  // Boss at end of world (stage 2 = boss stage)
  if (stage === 2) {
    const bossX = lw - 300;
    boss = createBoss(world, bossX, groundY - 60);
  }

  return lw;
}

// ============================================================
// BOSS DEFINITIONS (Tasern lore)
// ============================================================
function createBoss(world, x, y) {
  const bossDefs = [
    { name: 'HEADMASTER VARN',   hp: 12, w: 40, h: 50, color: '#4466aa', weakness: 0, speed: 60,  pattern: 'charge', lore: 'Fallen academy headmaster' },
    { name: 'FUNGAL KING GROTH', hp: 16, w: 48, h: 56, color: '#228844', weakness: 1, speed: 40,  pattern: 'jump',   lore: 'Ancient forest titan' },
    { name: 'REACTOR PRIME',     hp: 20, w: 44, h: 44, color: '#cc4400', weakness: 2, speed: 70,  pattern: 'shoot',  lore: 'Rogue energy core' },
    { name: 'OVERLORD UMBRIX',   hp: 24, w: 52, h: 60, color: '#6622aa', weakness: 3, speed: 80,  pattern: 'all',    lore: 'Dark spore tyrant' }
  ];
  const def = bossDefs[world];
  return {
    x: x, y: y, w: def.w, h: def.h,
    vx: 0, vy: 0,
    hp: def.hp, maxHp: def.hp,
    name: def.name,
    color: def.color,
    weakness: def.weakness,
    speed: def.speed,
    pattern: def.pattern,
    lore: def.lore,
    phase: 0,
    timer: 0,
    attackTimer: 2,
    invuln: 0,
    dead: false,
    facing: -1
  };
}

// ============================================================
// GAME START / RESET
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + bonusLives(); // ref 7: CON extra starting lives
  maxHp = hpMax();           // ref 3: CON max HP
  hp = maxHp;
  coins = 0;
  currentChar = 0;
  worldNum = 0;
  stageNum = 0;
  starsCollected = [];
  comboCount = 0;
  comboTimer = 0;
  speedBoostTimer = 0;
  armorTimer = 0;
  if (firstPlay) {
    showTutorial = true;
    tutorialTimer = 0;
    tutorialStep = 0;
  } else {
    showTutorial = false;
  }
  loadLevel();
}

function loadLevel() {
  levelWidth = generateLevel(worldNum, stageNum);
  scrollX = 0;
  checkpointX = 32;
  checkpointScroll = 0;
  player = createPlayer(32, GH - 80);
  invuln = 0;
  doubleJumpUsed = false;
  dashTimer = 0;
  dashCooldown = 0;
  wallSliding = false;
  wallClimbing = false;
  levelComplete = false;
  levelTimer = 0;
  deathTimer = 0;
  bossActive = false;
  scorePopups = [];
  TAS.particles.clear();
}

function respawn() {
  player = createPlayer(checkpointX, GH - 80);
  player.vx = 0;
  player.vy = 0;
  scrollX = checkpointScroll;
  invuln = invulnTime(); // ref 10: CON-based invuln
  doubleJumpUsed = false;
  dashTimer = 0;
  wallSliding = false;
  wallClimbing = false;
}

// ============================================================
// CHARACTER SWITCH
// ============================================================
function switchCharacter() {
  currentChar = (currentChar + 1) % 4;
  switchFlash = 0.3;
  switchFlashColor = CHARS[currentChar].color;
  TAS.audio.playTone(600, 0.08, 'square');
  TAS.audio.playTone(800, 0.08, 'square');
  for (let i = 0; i < 8; i++) {
    TAS.particles.spawn(
      player.x + player.w / 2 - scrollX,
      player.y + player.h / 2,
      (Math.random() - 0.5) * 100,
      (Math.random() - 0.5) * 100,
      CHARS[currentChar].color,
      0.4
    );
  }
}

// ============================================================
// PHYSICS & COLLISION
// ============================================================
function resolveCollision(entity, dx, dy) {
  let newX = entity.x + dx;
  let newY = entity.y + dy;
  let onGround = false;
  let hitWallL = false;
  let hitWallR = false;
  let hitCeiling = false;
  let onConveyor = null;

  // Conveyors
  for (let i = 0; i < conveyors.length; i++) {
    const c = conveyors[i];
    if (newX + entity.w > c.x && newX < c.x + c.w &&
        newY + entity.h >= c.y && newY + entity.h <= c.y + 8 && entity.vy >= 0) {
      newY = c.y - entity.h;
      onGround = true;
      onConveyor = c;
    }
  }

  // Platforms
  for (let i = 0; i < platforms.length; i++) {
    const p = platforms[i];
    if (p.type === 'crumble' && p.timer > 30) continue;

    if (newX + entity.w > p.x && newX < p.x + p.w &&
        newY + entity.h > p.y && newY < p.y + p.h) {
      if (entity.vy >= 0 && entity.y + entity.h <= p.y + 4) {
        newY = p.y - entity.h;
        onGround = true;
        if (p.type === 'crumble') p.timer++;
      } else if (entity.vy < 0 && entity.y >= p.y + p.h - 4) {
        newY = p.y + p.h;
        hitCeiling = true;
      } else if (dx > 0) {
        newX = p.x - entity.w;
        hitWallR = true;
      } else if (dx < 0) {
        newX = p.x + p.w;
        hitWallL = true;
      }
    }
  }

  // Breakable walls
  for (let i = breakables.length - 1; i >= 0; i--) {
    const b = breakables[i];
    if (newX + entity.w > b.x && newX < b.x + b.w &&
        newY + entity.h > b.y && newY < b.y + b.h) {
      if (dashTimer > 0 && CHARS[currentChar].ability === 'dash') {
        b.hp -= breakDmg(); // ref 14: STR breakable damage
        if (b.hp <= 0) {
          breakables.splice(i, 1);
          const pts = Math.round(50 * scoreMult()); // ref 4: INT score
          score += pts;
          spawnScorePopup(b.x + b.w / 2, b.y, '+' + pts, '#ffaa44');
          TAS.audio.playTone(200, 0.15, 'noise');
          for (let j = 0; j < 6; j++) {
            TAS.particles.spawn(b.x + b.w / 2 - scrollX, b.y + b.h / 2,
              (Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150, '#aa8866', 0.5);
          }
          // Shake on break
          TAS.fx.shake(3, 0.15);
        }
      } else {
        if (entity.vy >= 0 && entity.y + entity.h <= b.y + 4) {
          newY = b.y - entity.h;
          onGround = true;
        } else if (dx > 0) {
          newX = b.x - entity.w;
          hitWallR = true;
        } else if (dx < 0) {
          newX = b.x + b.w;
          hitWallL = true;
        }
      }
    }
  }

  return { x: newX, y: newY, grounded: onGround, wallL: hitWallL, wallR: hitWallR, ceiling: hitCeiling, conveyor: onConveyor };
}

// ============================================================
// ZONE DETECTION — determines sub-zone from player X position
// ============================================================
function getZoneIndex() {
  if (levelWidth <= 0) return 0;
  const progress = player ? player.x / levelWidth : 0;
  if (progress < 0.33) return 0;
  if (progress < 0.66) return 1;
  return 2;
}

function getZoneColors() {
  const w = WORLDS[worldNum];
  const zi = getZoneIndex();
  if (w.zones && w.zones[zi]) {
    return w.zones[zi];
  }
  return { bg: w.bg, ground: w.ground, accent: w.accent };
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;

  // Track just-pressed keys (NES-style: D-pad + A/B + Start/Select)
  const keys = TAS.input.keys;
  for (const k in keys) {
    justPressed[k] = keys[k] && !prevKeys[k];
  }
  justPressed.touchA = TAS.input.touch.a && !prevKeys.touchA;
  justPressed.touchB = TAS.input.touch.b && !prevKeys.touchB;
  Object.assign(prevKeys, keys);
  prevKeys.touchA = TAS.input.touch.a;
  prevKeys.touchB = TAS.input.touch.b;

  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (switchFlash > 0) switchFlash -= dt;
  if (speedBoostTimer > 0) speedBoostTimer -= dt;
  if (armorTimer > 0) armorTimer -= dt;

  // Combo timer decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  if (state === 'title') {
    if (justPressed['Enter'] || justPressed[' '] || justPressed.touchA) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (justPressed['Enter'] || justPressed[' '] || justPressed.touchA) {
      state = 'title';
    }
    return;
  }

  if (state === 'levelClear') {
    levelTimer += dt;
    if (levelTimer > 2) {
      stageNum++;
      if (stageNum > 2) {
        stageNum = 0;
        worldNum++;
        if (worldNum > 3) {
          state = 'victory';
          return;
        }
      }
      loadLevel();
      state = 'playing';
    }
    return;
  }

  if (state === 'victory') {
    if (justPressed['Enter'] || justPressed[' '] || justPressed.touchA) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial overlay
  if (showTutorial) {
    tutorialTimer += dt;
    if (tutorialTimer > 3) {
      tutorialStep++;
      tutorialTimer = 0;
    }
    if (tutorialStep >= 4) {
      showTutorial = false;
      firstPlay = false;
    }
    // Allow skipping tutorial
    if (justPressed['Enter'] || justPressed['Escape'] || justPressed.touchB) {
      showTutorial = false;
      firstPlay = false;
    }
    if (showTutorial) return; // freeze game during tutorial
  }

  // Death handling
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        if (score > highScore) {
          highScore = score;
          TAS.score.save('tinytoons_hi', highScore);
        }
        state = 'gameOver';
      } else {
        maxHp = hpMax(); // ref 3: CON recalc on respawn
        hp = maxHp;
        respawn();
      }
    }
    return;
  }

  // Character switch — NES B button / Shift / touch B
  if (justPressed['b'] || justPressed['Shift'] || justPressed.touchB) {
    switchCharacter();
  }

  // Invulnerability timer
  if (invuln > 0) invuln -= dt;
  if (dashCooldown > 0) dashCooldown -= dt;

  // Zone tracking
  const newZone = getZoneIndex();
  if (newZone !== currentZone) {
    currentZone = newZone;
    // Zone transition particles
    for (let i = 0; i < 12; i++) {
      const zc = getZoneColors();
      TAS.particles.spawn(
        Math.random() * GW, Math.random() * GH,
        (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40,
        zc.accent, 0.6
      );
    }
  }

  // Player movement with DEX speed modifier
  const charDef = CHARS[currentChar];
  let moveSpeed = charDef.speed * spdMult(); // ref 2: DEX speed
  if (speedBoostTimer > 0) moveSpeed *= 1.5; // mushroom boost
  let moveX = 0;
  // NES D-pad: Arrow keys, WASD, or touch
  if (keys['ArrowLeft'] || keys['a'] || TAS.input.touch.left) moveX = -1;
  if (keys['ArrowRight'] || keys['d'] || TAS.input.touch.right) moveX = 1;

  // Dashing (Tank) — DEX modifies dash speed
  if (dashTimer > 0) {
    dashTimer -= dt;
    player.vx = player.facing * moveSpeed * dashSpd(); // ref 13: DEX dash
  } else {
    if (moveX !== 0) {
      player.vx = moveX * moveSpeed;
      player.facing = moveX;
    } else {
      player.vx *= 0.7;
      if (Math.abs(player.vx) < 5) player.vx = 0;
    }
  }

  // Gravity + wall mechanics
  wallSliding = false;
  wallClimbing = false;

  if (!player.grounded) {
    if (charDef.ability === 'walljump' && (moveX !== 0)) {
      const testResult = resolveCollision(player, moveX * 2, 0);
      if ((moveX > 0 && testResult.wallR) || (moveX < 0 && testResult.wallL)) {
        wallSliding = true;
        player.vy = Math.min(player.vy, 60);
      }
    }
    if (charDef.ability === 'climb' && (moveX !== 0)) {
      const testResult = resolveCollision(player, moveX * 2, 0);
      if ((moveX > 0 && testResult.wallR) || (moveX < 0 && testResult.wallL)) {
        wallClimbing = true;
        player.vy = -80;
      }
    }
    if (!wallSliding && !wallClimbing) {
      const grav = charDef.ability === 'doublejump' ? GRAVITY * 0.75 : GRAVITY;
      player.vy += grav * dt;
    }
  }

  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Jump — NES A button / Space / W / Up / touch A — DEX boosts jump
  const jumpPressed = justPressed['ArrowUp'] || justPressed['w'] || justPressed[' '] || justPressed.touchA;
  if (jumpPressed) {
    if (player.grounded) {
      player.vy = charDef.jumpForce * jumpMod(); // ref 9: DEX jump boost
      player.grounded = false;
      doubleJumpUsed = false;
      TAS.audio.playTone(440, 0.08, 'square');
      // Jump dust particles
      for (let i = 0; i < 3; i++) {
        TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y + player.h,
          (Math.random() - 0.5) * 30, Math.random() * 10, '#aaaaaa', 0.25);
      }
    } else if (charDef.ability === 'doublejump' && !doubleJumpUsed) {
      player.vy = charDef.jumpForce * 0.85 * jumpMod(); // ref 9
      doubleJumpUsed = true;
      TAS.audio.playTone(550, 0.08, 'square');
      for (let i = 0; i < 6; i++) {
        TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y + player.h,
          (Math.random() - 0.5) * 60, Math.random() * 40, charDef.color, 0.3);
      }
    } else if (wallSliding && charDef.ability === 'walljump') {
      player.vy = charDef.jumpForce * 0.9 * jumpMod(); // ref 9
      player.vx = -moveX * moveSpeed * 1.5;
      player.facing = -moveX;
      TAS.audio.playTone(500, 0.08, 'triangle');
      // Wall jump sparks
      for (let i = 0; i < 4; i++) {
        TAS.particles.spawn(player.x + (moveX > 0 ? player.w : 0) - scrollX, player.y + player.h / 2,
          -moveX * (20 + Math.random() * 30), (Math.random() - 0.5) * 40, '#ffffff', 0.3);
      }
    } else if (wallClimbing && charDef.ability === 'climb') {
      player.vy = charDef.jumpForce * 0.7 * jumpMod(); // ref 9
      TAS.audio.playTone(480, 0.06, 'triangle');
    }
  }

  // Dash (Tank) — WIS reduces cooldown
  if (charDef.ability === 'dash' && dashCooldown <= 0) {
    if ((justPressed['ArrowDown'] || justPressed['s']) && moveX !== 0) {
      dashTimer = 0.25;
      dashCooldown = 0.8 * cdMult(); // ref 5: WIS cooldown
      TAS.audio.playTone(150, 0.15, 'sawtooth');
      TAS.fx.shake(4, 0.2);
      // Dash trail particles
      for (let i = 0; i < 5; i++) {
        TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y + player.h / 2,
          -player.facing * (40 + Math.random() * 30), (Math.random() - 0.5) * 20, '#ff884488', 0.4);
      }
    }
  }

  // Apply movement
  const moveResult = resolveCollision(player, player.vx * dt, player.vy * dt);
  player.x = moveResult.x;
  player.y = moveResult.y;
  player.grounded = moveResult.grounded;

  if (moveResult.grounded) {
    player.vy = 0;
    doubleJumpUsed = false;
    // Landing dust
    if (Math.abs(player.vx) > 30) {
      for (let i = 0; i < 2; i++) {
        TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y + player.h,
          (Math.random() - 0.5) * 20, -Math.random() * 15, '#aaaaaa', 0.2);
      }
    }
  }
  if (moveResult.ceiling) player.vy = 0;
  if (moveResult.wallL || moveResult.wallR) player.vx = 0;

  // Conveyor belt push
  if (moveResult.conveyor) {
    player.x += moveResult.conveyor.dir * moveResult.conveyor.speed * dt;
  }

  // Camera scroll
  const playerScreenX = player.x - scrollX;
  if (playerScreenX > GW * 0.6) scrollX += (playerScreenX - GW * 0.6) * 3 * dt;
  if (playerScreenX < GW * 0.3) scrollX -= (GW * 0.3 - playerScreenX) * 3 * dt;
  if (scrollX < 0) scrollX = 0;
  if (scrollX > levelWidth - GW) scrollX = levelWidth - GW;

  // Checkpoint
  if (player.x > checkpointX + CHECKPOINT_INTERVAL) {
    checkpointX = player.x;
    checkpointScroll = scrollX;
    // Checkpoint particles
    for (let i = 0; i < 6; i++) {
      TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y,
        (Math.random() - 0.5) * 50, -20 - Math.random() * 30, '#88ff88', 0.5);
    }
  }

  // Fall death
  if (player.y > GH + 50) {
    playerHit();
  }

  // Crumbling platforms
  for (let i = 0; i < platforms.length; i++) {
    const p = platforms[i];
    if (p.type === 'crumble' && p.timer > 0 && p.timer <= 30) {
      p.timer += dt * 60;
    }
  }

  // Coin collection — INT boosts value
  for (let i = 0; i < coins_list.length; i++) {
    const c = coins_list[i];
    if (c.collected) continue;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, c.x, c.y, 12, 12)) {
      c.collected = true;
      const val = Math.round(c.value * coinMult()); // ref 8: INT coin value
      coins += val;
      const pts = Math.round(10 * val * scoreMult()); // ref 4: INT score
      score += pts;
      spawnScorePopup(c.x, c.y, '+' + pts, '#ffdd44');
      TAS.audio.playTone(880, 0.05, 'sine');
      TAS.audio.playTone(1100, 0.05, 'sine');
      // Coin sparkle particles
      for (let j = 0; j < 3; j++) {
        TAS.particles.spawn(c.x + 6 - scrollX, c.y + 6,
          (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, '#ffdd44', 0.3);
      }
      if (coins >= 100) {
        coins -= 100;
        lives++;
        spawnScorePopup(c.x, c.y - 15, '1UP!', '#88ff88');
        TAS.audio.playTone(660, 0.1, 'sine');
        TAS.audio.playTone(880, 0.1, 'sine');
        TAS.audio.playTone(1100, 0.1, 'sine');
      }
    }
  }

  // Star collection
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    if (s.collected) continue;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, s.x, s.y, 14, 14)) {
      s.collected = true;
      const pts = Math.round(500 * scoreMult()); // ref 4: INT score
      score += pts;
      spawnScorePopup(s.x, s.y, '+' + pts + ' STAR!', '#ffdd44');
      starsCollected.push({ world: worldNum, stage: stageNum, index: i });
      TAS.audio.playTone(660, 0.15, 'sine');
      TAS.audio.playTone(990, 0.15, 'sine');
      TAS.fx.flash('#ffff88', 0.2);
      for (let j = 0; j < 12; j++) {
        TAS.particles.spawn(s.x + 7 - scrollX, s.y + 7,
          (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120, '#ffdd44', 0.6);
      }
    }
  }

  // Item collection
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    if (it.collected) continue;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, it.x, it.y, 12, 12)) {
      it.collected = true;
      const def = ITEM_TYPES[it.type];
      switch (def.effect) {
        case 'heal':
          if (hp < maxHp) { hp++; spawnScorePopup(it.x, it.y, '+1 HP', '#ff4488'); }
          else { spawnScorePopup(it.x, it.y, 'FULL HP', '#888888'); }
          break;
        case 'speed':
          speedBoostTimer = 5;
          spawnScorePopup(it.x, it.y, 'SPEED UP!', '#44ff88');
          break;
        case 'score': {
          const pts = Math.round(def.score * scoreMult()); // ref 4
          score += pts;
          spawnScorePopup(it.x, it.y, '+' + pts, '#ffdd88');
          break;
        }
        case 'armor':
          armorTimer = 5;
          invuln = 5;
          spawnScorePopup(it.x, it.y, 'SHIELD!', '#88aaff');
          break;
        case 'ammo':
          score += Math.round(100 * scoreMult());
          spawnScorePopup(it.x, it.y, 'SPORE PACK!', '#aa44ff');
          break;
      }
      TAS.audio.playTone(660, 0.08, 'sine');
      TAS.audio.playTone(880, 0.06, 'sine');
      for (let j = 0; j < 5; j++) {
        TAS.particles.spawn(it.x + 6 - scrollX, it.y + 6,
          (Math.random() - 0.5) * 50, (Math.random() - 0.5) * 50, def.color, 0.4);
      }
    }
  }

  // Hazard collision — type-specific damage
  for (let i = 0; i < hazards.length; i++) {
    const h = hazards[i];
    h.animTimer += dt;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y, h.w, h.h)) {
      const hdef = HAZARD_TYPES[h.type] || HAZARD_TYPES.spikes;
      // Lava does double damage
      if (hdef.dmg > 1) {
        playerHit();
        if (hp > 0) playerHit(); // second hit for lava
      } else {
        playerHit();
      }
      break;
    }
  }

  // Enemy update
  updateEnemies(dt);

  // Projectile update
  updateProjectiles(dt);

  // Boss update
  if (boss && !boss.dead) {
    updateBoss(dt);
  }

  // Level end check
  if (player.x > levelWidth - 100 && !bossActive && (!boss || boss.dead)) {
    levelComplete = true;
    levelTimer = 0;
    state = 'levelClear';
    TAS.audio.playTone(523, 0.15, 'sine');
    TAS.audio.playTone(659, 0.15, 'sine');
    TAS.audio.playTone(784, 0.15, 'sine');
    TAS.audio.playTone(1047, 0.2, 'sine');
    // Celebration particles
    for (let i = 0; i < 20; i++) {
      TAS.particles.spawn(GW / 2, GH / 2,
        (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200,
        ['#ff4444', '#44ff44', '#4444ff', '#ffdd44'][Math.floor(Math.random() * 4)], 1.0);
    }
  }

  // Trigger boss
  if (boss && !boss.dead && !bossActive && player.x > boss.x - 200) {
    bossActive = true;
    scrollX = boss.x - 200;
    TAS.fx.shake(5, 0.4);
    // Boss entrance particles
    for (let i = 0; i < 15; i++) {
      TAS.particles.spawn(boss.x + boss.w / 2 - scrollX, boss.y + boss.h / 2,
        (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, boss.color, 0.7);
    }
  }

  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.1) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }
}

// ============================================================
// ENEMY UPDATE (Tasern creatures)
// ============================================================
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (Math.abs(e.x - player.x) > GW) continue;

    e.animTimer += dt;

    // Mimic reveal — wakes when player is close
    if (e.type === 'mimic' && !e.revealed) {
      if (Math.abs(e.x - player.x) < 60 && Math.abs(e.y - player.y) < 40) {
        e.revealed = true;
        e.vx = (player.x > e.x ? -1 : 1) * 50;
        TAS.audio.playTone(300, 0.1, 'noise');
        spawnScorePopup(e.x, e.y - 10, 'MIMIC!', '#ff4444');
      } else {
        continue; // don't move or collide while hidden
      }
    }

    switch (e.type) {
      case 'sporeling':
      case 'toadstool':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) e.vx = -e.vx;
        break;
      case 'gloomwing':
        e.x += e.vx * dt;
        e.y += Math.sin(e.animTimer * 3) * 30 * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) e.vx = -e.vx;
        break;
      case 'golem':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) e.vx = -e.vx;
        break;
      case 'crawler':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) e.vx = -e.vx;
        break;
      case 'blightmaw':
        // Slow but tracks player
        const bmDir = player.x > e.x ? 1 : -1;
        e.vx = bmDir * ENEMY_TYPES.blightmaw.speed;
        e.x += e.vx * dt;
        break;
      case 'mimic':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) e.vx = -e.vx;
        break;
      case 'sporegun':
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = (2 + Math.random()) * cdMult(); // ref 5: WIS affects enemy timing awareness
          const edx = player.x - e.x;
          const edy = player.y - e.y;
          const dist = Math.sqrt(edx * edx + edy * edy);
          if (dist < 300) {
            projectiles.push({
              x: e.x + e.w / 2, y: e.y + e.h / 2,
              vx: (edx / dist) * 120, vy: (edy / dist) * 120,
              w: 6, h: 6, hostile: true, timer: 3
            });
            TAS.audio.playTone(200, 0.08, 'noise');
            // Muzzle flash particles
            for (let j = 0; j < 3; j++) {
              TAS.particles.spawn(e.x + e.w / 2 - scrollX, e.y + e.h / 2,
                (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30, '#ff6644', 0.2);
            }
          }
        }
        break;
    }

    // WIS aura warning — draw handled in draw, but track proximity here
    // (ref 11: WIS warning range is used in drawEnemies)

    // Player collision with enemies
    if (invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      // Stomp from above
      if (player.vy > 0 && player.y + player.h < e.y + e.h / 2) {
        const dmg = stompDmg(); // ref 16: STR stomp damage
        e.hp -= dmg;
        player.vy = -200;
        // Combo system
        comboCount++;
        comboTimer = 2;
        const comboMult = Math.min(comboCount, 5);
        const pts = Math.round(e.score * scoreMult() * comboMult); // ref 4: INT score
        score += pts;
        const label = comboCount > 1 ? '+' + pts + ' x' + comboCount : '+' + pts;
        spawnScorePopup(e.x, e.y - 10, label, comboCount > 2 ? '#ff44ff' : '#ffdd44');
        // Crit chance from CHA
        if (critRoll()) { // ref 12: CHA crit
          e.hp -= 1; // bonus crit damage
          spawnScorePopup(e.x, e.y - 25, 'CRIT!', '#ff4444');
          TAS.fx.shake(2, 0.1);
        }
        TAS.audio.playTone(300, 0.1, 'square');
        if (e.hp <= 0) {
          enemies.splice(i, 1);
          for (let j = 0; j < 6; j++) {
            TAS.particles.spawn(e.x + e.w / 2 - scrollX, e.y + e.h / 2,
              (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80, e.color, 0.4);
          }
          TAS.fx.shake(2, 0.15);
        }
      } else if (dashTimer > 0) {
        // Tank dash through enemies — STR boosts damage
        const dmg = dashHitDmg(); // ref 17: STR dash
        e.hp -= dmg;
        const pts = Math.round(e.score * scoreMult()); // ref 4
        score += pts;
        spawnScorePopup(e.x, e.y - 10, '+' + pts, '#ff8844');
        TAS.audio.playTone(250, 0.1, 'sawtooth');
        if (e.hp <= 0) {
          enemies.splice(i, 1);
          for (let j = 0; j < 6; j++) {
            TAS.particles.spawn(e.x + e.w / 2 - scrollX, e.y + e.h / 2,
              (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100, e.color, 0.4);
          }
          TAS.fx.shake(3, 0.15);
        }
      } else {
        playerHit();
      }
    }
  }
}

// ============================================================
// PROJECTILE UPDATE
// ============================================================
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.timer -= dt;
    if (p.timer <= 0) {
      projectiles.splice(i, 1);
      continue;
    }
    // Trail particles for projectiles
    if (frame % 3 === 0) {
      TAS.particles.spawn(p.x - scrollX, p.y,
        (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10,
        p.hostile ? '#ff444488' : '#44ff4488', 0.15);
    }
    // Hit player
    if (p.hostile && invuln <= 0) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x - p.w / 2, p.y - p.h / 2, p.w, p.h)) {
        playerHit();
        projectiles.splice(i, 1);
      }
    }
  }
}

// ============================================================
// BOSS UPDATE (Tasern bosses)
// ============================================================
function updateBoss(dt) {
  if (!boss || boss.dead) return;

  boss.timer += dt;
  boss.attackTimer -= dt;
  if (boss.invuln > 0) boss.invuln -= dt;

  const dx = player.x - boss.x;

  switch (boss.pattern) {
    case 'charge':
      if (boss.attackTimer <= 0) {
        boss.vx = (dx > 0 ? 1 : -1) * boss.speed * 2;
        boss.attackTimer = 2 * cdMult(); // ref 5: WIS awareness
        TAS.fx.shake(3, 0.3);
        // Charge dust
        for (let i = 0; i < 4; i++) {
          TAS.particles.spawn(boss.x + boss.w / 2 - scrollX, boss.y + boss.h,
            (Math.random() - 0.5) * 40, -Math.random() * 20, '#886644', 0.3);
        }
      }
      boss.x += boss.vx * dt;
      boss.vx *= 0.98;
      break;
    case 'jump':
      boss.vy += GRAVITY * dt;
      if (boss.y >= GH - 80) {
        boss.y = GH - 80;
        boss.vy = 0;
        if (boss.attackTimer <= 0) {
          boss.vy = -350;
          boss.vx = (dx > 0 ? 1 : -1) * boss.speed;
          boss.attackTimer = 1.5;
          TAS.fx.shake(4, 0.2);
        }
      }
      boss.x += boss.vx * dt;
      boss.y += boss.vy * dt;
      break;
    case 'shoot':
      boss.x += Math.sin(boss.timer * 2) * boss.speed * dt;
      if (boss.attackTimer <= 0) {
        boss.attackTimer = 1;
        for (let a = 0; a < 3; a++) {
          const angle = -0.5 + a * 0.5;
          projectiles.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
            vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150 + 50,
            w: 8, h: 8, hostile: true, timer: 3
          });
        }
        TAS.audio.playTone(150, 0.15, 'noise');
        TAS.fx.shake(2, 0.15);
      }
      break;
    case 'all':
      boss.phase = Math.floor(boss.timer / 3) % 3;
      if (boss.phase === 0) {
        boss.x += Math.sin(boss.timer * 3) * boss.speed * dt;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 0.8;
          projectiles.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h,
            vx: (dx > 0 ? 1 : -1) * 130, vy: 80,
            w: 8, h: 8, hostile: true, timer: 2.5
          });
        }
      } else if (boss.phase === 1) {
        if (boss.attackTimer <= 0) {
          boss.vx = (dx > 0 ? 1 : -1) * boss.speed * 2.5;
          boss.attackTimer = 1.5;
          TAS.fx.shake(4, 0.2);
        }
        boss.x += boss.vx * dt;
        boss.vx *= 0.97;
      } else {
        boss.vy += GRAVITY * 0.8 * dt;
        if (boss.y >= GH - 80) {
          boss.y = GH - 80;
          boss.vy = 0;
          if (boss.attackTimer <= 0) {
            boss.vy = -300;
            boss.attackTimer = 1.2;
          }
        }
        boss.y += boss.vy * dt;
      }
      break;
  }

  boss.facing = dx > 0 ? 1 : -1;

  // Boss-player collision
  if (invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h,
      boss.x, boss.y, boss.w, boss.h)) {
    if (player.vy > 0 && player.y + player.h < boss.y + boss.h / 3) {
      const isWeak = currentChar === boss.weakness;
      const damage = bossDmg(isWeak); // ref 15: STR boss damage
      if (boss.invuln <= 0) {
        boss.hp -= damage;
        boss.invuln = 0.5;
        TAS.fx.shake(5, 0.3);
        TAS.audio.playTone(200, 0.2, 'sawtooth');
        const label = isWeak ? 'SUPER!' : '-' + damage;
        spawnScorePopup(boss.x + boss.w / 2, boss.y - 10, label, isWeak ? '#ff44ff' : '#ffdd44');
        // Boss hit particles
        for (let j = 0; j < 8; j++) {
          TAS.particles.spawn(boss.x + boss.w / 2 - scrollX, boss.y,
            (Math.random() - 0.5) * 80, (Math.random() - 0.5) * 60, '#ffffff', 0.3);
        }
      }
      player.vy = -250;
    } else {
      playerHit();
    }
  }

  // Boss death
  if (boss.hp <= 0) {
    boss.dead = true;
    bossActive = false;
    const pts = Math.round(2000 * scoreMult()); // ref 4: INT score
    score += pts;
    spawnScorePopup(boss.x + boss.w / 2, boss.y, '+' + pts + ' BOSS!', '#ff44ff');
    TAS.fx.shake(8, 0.6);
    TAS.fx.flash('#ffffff', 0.4);
    for (let j = 0; j < 25; j++) {
      TAS.particles.spawn(boss.x + boss.w / 2 - scrollX, boss.y + boss.h / 2,
        (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, boss.color, 0.8);
    }
    TAS.audio.playTone(150, 0.3, 'sawtooth');
    TAS.audio.playTone(100, 0.3, 'square');
  }
}

// ============================================================
// PLAYER HIT
// ============================================================
function playerHit() {
  if (invuln > 0 || deathTimer > 0) return;
  if (armorTimer > 0) {
    armorTimer = 0;
    invuln = invulnTime(); // ref 10
    spawnScorePopup(player.x, player.y - 10, 'BLOCKED!', '#88aaff');
    TAS.fx.shake(2, 0.1);
    return;
  }

  hp--;
  invuln = invulnTime(); // ref 10: CON invuln duration
  TAS.fx.shake(5, 0.3);
  TAS.fx.flash('#ff0000', 0.15);
  TAS.audio.playTone(200, 0.15, 'noise');
  comboCount = 0; // reset combo on hit

  // Tank gets extra hit
  if (hp <= 0 && CHARS[currentChar].extraHit) {
    hp = 1;
    spawnScorePopup(player.x, player.y - 10, 'TOUGH!', '#dd4444');
  }

  if (hp <= 0) {
    deathTimer = 1.5;
    player.vy = -200;
    for (let i = 0; i < 12; i++) {
      TAS.particles.spawn(player.x + player.w / 2 - scrollX, player.y + player.h / 2,
        (Math.random() - 0.5) * 150, (Math.random() - 0.5) * 150, '#ff4444', 0.6);
    }
  }
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  const world = WORLDS[worldNum];
  const zone = getZoneColors();

  // Background — uses zone-specific colors
  ctx.fillStyle = zone.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, world.sky);
  grad.addColorStop(1, zone.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax background decorations
  drawBackground(world, zone);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'World ' + (worldNum + 1) + '-' + (stageNum + 1) });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'levelClear') {
    drawLevelClear();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawPlatforms(zone);
  drawConveyors();
  drawBreakables();
  drawHazards();
  drawCoins();
  drawStars();
  drawItems();
  drawEnemies();
  drawProjectiles();

  if (boss && !boss.dead) drawBoss();
  if (deathTimer <= 0) drawPlayer();

  drawScorePopups();
  TAS.particles.draw();
  ctx.restore();

  // Switch flash overlay
  if (switchFlash > 0) {
    ctx.fillStyle = switchFlashColor;
    ctx.globalAlpha = switchFlash;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Tutorial overlay
  if (showTutorial) drawTutorial();

  // Zone name banner (brief)
  drawZoneBanner();

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// DRAW HELPERS
// ============================================================
function drawBackground(world, zone) {
  // Distant mountains/trees with zone colors
  ctx.fillStyle = zone.ground + '44';
  for (let i = 0; i < 8; i++) {
    const bx = (i * 120 - scrollX * 0.2) % (GW + 120) - 60;
    const bh = 40 + (i % 3) * 20;
    ctx.beginPath();
    ctx.moveTo(bx, GH);
    ctx.lineTo(bx + 30, GH - bh);
    ctx.lineTo(bx + 60, GH - bh + 10);
    ctx.lineTo(bx + 90, GH - bh - 5);
    ctx.lineTo(bx + 120, GH);
    ctx.fill();
  }

  // Mid-ground silhouettes
  ctx.fillStyle = zone.ground + '22';
  for (let i = 0; i < 6; i++) {
    const bx = (i * 160 - scrollX * 0.35) % (GW + 160) - 80;
    const bh = 25 + (i % 4) * 15;
    ctx.beginPath();
    ctx.moveTo(bx, GH);
    ctx.lineTo(bx + 40, GH - bh);
    ctx.lineTo(bx + 80, GH - bh + 5);
    ctx.lineTo(bx + 120, GH - bh - 3);
    ctx.lineTo(bx + 160, GH);
    ctx.fill();
  }

  // Stars/particles in sky
  ctx.fillStyle = '#ffffff44';
  for (let i = 0; i < 25; i++) {
    const sx = ((i * 97 + 13) % GW + frame * 0.02 * (i % 3 + 1)) % GW;
    const sy = (i * 47 + 7) % (GH * 0.5);
    const sz = 1 + (i % 3 === 0 ? 1 : 0);
    ctx.fillRect(sx, sy, sz, sz);
  }

  // Atmospheric particles based on world
  if (worldNum === 1) {
    // Floating spores in fungi forest
    ctx.fillStyle = '#88cc8833';
    for (let i = 0; i < 10; i++) {
      const fx = ((i * 73 + frame * 0.3) % GW);
      const fy = (i * 37 + Math.sin(frame * 0.02 + i) * 20) % GH;
      ctx.beginPath();
      ctx.arc(fx, fy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (worldNum === 2) {
    // Sparks in reactor factory
    if (frame % 15 === 0) {
      TAS.particles.spawn(Math.random() * GW, Math.random() * GH * 0.3,
        (Math.random() - 0.5) * 20, Math.random() * 30, '#ff664488', 0.3);
    }
  } else if (worldNum === 3) {
    // Dark motes in castle
    ctx.fillStyle = '#aa44ff22';
    for (let i = 0; i < 8; i++) {
      const fx = ((i * 67 + frame * 0.2) % GW);
      const fy = (i * 43 + Math.sin(frame * 0.015 + i * 2) * 30) % GH;
      ctx.beginPath();
      ctx.arc(fx, fy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlatforms(zone) {
  for (let i = 0; i < platforms.length; i++) {
    const p = platforms[i];
    const px = p.x - scrollX;
    if (px > GW + TILE || px + p.w < -TILE) continue;

    if (p.type === 'ground') {
      ctx.fillStyle = zone.ground;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = zone.accent;
      ctx.fillRect(px, p.y, p.w, 3);
    } else if (p.type === 'wall') {
      ctx.fillStyle = WORLDS[worldNum].platformColor;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = '#00000033';
      ctx.fillRect(px + 2, p.y + 2, p.w - 4, p.h - 4);
    } else if (p.type === 'crumble') {
      const alpha = p.timer > 0 ? Math.max(0, 1 - p.timer / 30) : 1;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#aa8855';
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.strokeStyle = '#665533';
      ctx.strokeRect(px, p.y, p.w, p.h);
      if (p.timer > 0) {
        ctx.strokeStyle = '#44220088';
        ctx.beginPath();
        ctx.moveTo(px + p.w * 0.3, p.y);
        ctx.lineTo(px + p.w * 0.5, p.y + p.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px + p.w * 0.7, p.y);
        ctx.lineTo(px + p.w * 0.4, p.y + p.h);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    } else if (p.type === 'high') {
      ctx.fillStyle = '#ccaa44';
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = '#ffdd66';
      ctx.fillRect(px, p.y, p.w, 3);
      // Shimmer
      if (frame % 30 < 15) {
        ctx.fillStyle = '#ffffff22';
        ctx.fillRect(px + (frame % 15), p.y, 4, p.h);
      }
    } else {
      ctx.fillStyle = WORLDS[worldNum].platformColor;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = zone.accent + '88';
      ctx.fillRect(px, p.y, p.w, 3);
    }
  }
}

function drawConveyors() {
  for (let i = 0; i < conveyors.length; i++) {
    const c = conveyors[i];
    const cx = c.x - scrollX;
    if (cx > GW + TILE || cx + c.w < -TILE) continue;

    ctx.fillStyle = '#555566';
    ctx.fillRect(cx, c.y, c.w, c.h);
    ctx.fillStyle = '#88aacc';
    const offset = (frame * 2 * c.dir) % 16;
    for (let a = 0; a < c.w; a += 16) {
      const ax = cx + a + offset;
      if (ax >= cx && ax < cx + c.w - 4) {
        ctx.fillRect(ax, c.y + c.h / 2 - 1, 8, 2);
        if (c.dir > 0) {
          ctx.fillRect(ax + 6, c.y + c.h / 2 - 3, 2, 6);
        } else {
          ctx.fillRect(ax, c.y + c.h / 2 - 3, 2, 6);
        }
      }
    }
  }
}

function drawBreakables() {
  for (let i = 0; i < breakables.length; i++) {
    const b = breakables[i];
    const bx = b.x - scrollX;
    if (bx > GW + TILE || bx + b.w < -TILE) continue;

    ctx.fillStyle = '#886644';
    ctx.fillRect(bx, b.y, b.w, b.h);
    ctx.strokeStyle = '#553322';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx + 4, b.y + 4);
    ctx.lineTo(bx + b.w - 4, b.y + b.h - 4);
    ctx.moveTo(bx + b.w - 4, b.y + 4);
    ctx.lineTo(bx + 4, b.y + b.h - 4);
    ctx.stroke();
    // Dash icon
    ctx.fillStyle = '#ff444466';
    ctx.font = '8px monospace';
    ctx.fillText('>', bx + 5, b.y + b.h - 4);
  }
}

function drawHazards() {
  for (let i = 0; i < hazards.length; i++) {
    const h = hazards[i];
    const hx = h.x - scrollX;
    if (hx > GW || hx + h.w < 0) continue;

    const hdef = HAZARD_TYPES[h.type] || HAZARD_TYPES.spikes;

    switch (h.type) {
      case 'spikes':
        ctx.fillStyle = hdef.color;
        const spikeCount = Math.floor(h.w / 8);
        for (let s = 0; s < spikeCount; s++) {
          ctx.beginPath();
          ctx.moveTo(hx + s * 8, h.y + h.h);
          ctx.lineTo(hx + s * 8 + 4, h.y);
          ctx.lineTo(hx + s * 8 + 8, h.y + h.h);
          ctx.fill();
        }
        break;
      case 'acid':
        ctx.fillStyle = hdef.color;
        ctx.fillRect(hx, h.y + 2, h.w, h.h - 2);
        // Bubbles
        ctx.fillStyle = '#66ee44';
        const bubOff = Math.sin(h.animTimer * 2) * 3;
        ctx.beginPath();
        ctx.arc(hx + h.w * 0.3, h.y + bubOff, 2, 0, Math.PI * 2);
        ctx.arc(hx + h.w * 0.7, h.y + bubOff + 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'lava':
        ctx.fillStyle = hdef.color;
        ctx.fillRect(hx, h.y + 1, h.w, h.h - 1);
        // Glow
        ctx.fillStyle = '#ffaa0044';
        ctx.fillRect(hx - 2, h.y - 4, h.w + 4, 6);
        // Shimmer
        const lavaOff = Math.sin(h.animTimer * 3) * 2;
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(hx + 4 + lavaOff, h.y + 2, 6, 2);
        break;
      case 'thorns':
        ctx.fillStyle = hdef.color;
        const thornCount = Math.floor(h.w / 6);
        for (let t = 0; t < thornCount; t++) {
          const sway = Math.sin(h.animTimer + t) * 1;
          ctx.beginPath();
          ctx.moveTo(hx + t * 6, h.y + h.h);
          ctx.lineTo(hx + t * 6 + 3 + sway, h.y - 2);
          ctx.lineTo(hx + t * 6 + 6, h.y + h.h);
          ctx.fill();
        }
        break;
      case 'lightning':
        if (Math.floor(h.animTimer * 4) % 2 === 0) {
          ctx.fillStyle = hdef.color;
          ctx.globalAlpha = 0.6 + Math.sin(h.animTimer * 8) * 0.4;
          ctx.fillRect(hx, h.y - 2, h.w, h.h + 4);
          ctx.globalAlpha = 1;
          // Spark particles
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(hx + Math.random() * h.w, h.y - 3, 2, 2);
        }
        break;
    }
  }
}

function drawCoins() {
  for (let i = 0; i < coins_list.length; i++) {
    const c = coins_list[i];
    if (c.collected) continue;
    const cx = c.x - scrollX;
    if (cx > GW || cx < -12) continue;

    const bob = Math.sin(frame * 0.05 + i) * 2;
    ctx.fillStyle = c.value > 1 ? '#ff8844' : '#ffdd44'; // rare coins are orange
    ctx.beginPath();
    ctx.arc(cx + 6, c.y + 6 + bob, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = c.value > 1 ? '#ff6622' : '#ffaa00';
    ctx.beginPath();
    ctx.arc(cx + 6, c.y + 6 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    // Rare coin sparkle
    if (c.value > 1 && frame % 20 < 10) {
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(cx + 4, c.y + 4 + bob, 2, 2);
    }
  }
}

function drawStars() {
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    if (s.collected) continue;
    const sx = s.x - scrollX;
    if (sx > GW || sx < -14) continue;

    const pulse = 1 + Math.sin(frame * 0.08) * 0.2;
    ctx.save();
    ctx.translate(sx + 7, s.y + 7);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#ffdd44';
    drawStar(ctx, 0, 0, 7, 3, 5);
    ctx.restore();

    ctx.fillStyle = '#ffdd4444';
    ctx.beginPath();
    ctx.arc(sx + 7, s.y + 7, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStar(c, cx, cy, outerR, innerR, points) {
  c.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI) / points - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) c.moveTo(x, y);
    else c.lineTo(x, y);
  }
  c.closePath();
  c.fill();
}

function drawItems() {
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    if (it.collected) continue;
    const ix = it.x - scrollX;
    if (ix > GW || ix < -12) continue;

    const def = ITEM_TYPES[it.type];
    const bob = Math.sin(frame * 0.04 + i * 1.7) * 3;

    // Item glow
    ctx.fillStyle = def.color + '33';
    ctx.beginPath();
    ctx.arc(ix + 6, it.y + 6 + bob, 8, 0, Math.PI * 2);
    ctx.fill();

    // Item body
    ctx.fillStyle = def.color;
    switch (it.type) {
      case 'potion':
        // Flask shape
        ctx.fillRect(ix + 3, it.y + bob, 6, 4);
        ctx.fillRect(ix + 1, it.y + 4 + bob, 10, 8);
        break;
      case 'mushroom':
        ctx.beginPath();
        ctx.arc(ix + 6, it.y + 4 + bob, 5, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#228844';
        ctx.fillRect(ix + 4, it.y + 4 + bob, 4, 6);
        break;
      case 'scroll':
        ctx.fillRect(ix + 2, it.y + 2 + bob, 8, 10);
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(ix + 2, it.y + 2 + bob, 8, 2);
        ctx.fillRect(ix + 2, it.y + 10 + bob, 8, 2);
        break;
      case 'shield':
        ctx.beginPath();
        ctx.moveTo(ix + 6, it.y + bob);
        ctx.lineTo(ix + 11, it.y + 4 + bob);
        ctx.lineTo(ix + 6, it.y + 12 + bob);
        ctx.lineTo(ix + 1, it.y + 4 + bob);
        ctx.closePath();
        ctx.fill();
        break;
      case 'sporepack':
        ctx.beginPath();
        ctx.arc(ix + 6, it.y + 6 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#cc66ff';
        ctx.beginPath();
        ctx.arc(ix + 4, it.y + 4 + bob, 2, 0, Math.PI * 2);
        ctx.arc(ix + 8, it.y + 5 + bob, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

function drawEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    const ex = e.x - scrollX;
    if (ex > GW + 20 || ex < -20) continue;

    // WIS aura warning — shows danger radius (ref 11)
    const auraRange = wisAura();
    const eDist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
    if (eDist < auraRange && eDist > 30) {
      ctx.strokeStyle = '#ff444433';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + e.h / 2, auraRange * 0.3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Mimic disguise
    if (e.type === 'mimic' && !e.revealed) {
      // Draw as a coin chest
      ctx.fillStyle = '#ddaa22';
      ctx.fillRect(ex, e.y, e.w, e.h);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(ex + 2, e.y + 2, e.w - 4, 4);
      continue;
    }

    ctx.fillStyle = e.color;

    switch (e.type) {
      case 'sporeling':
        // Blob with spore spots
        const squish = Math.sin(e.animTimer * 4) * 2;
        ctx.beginPath();
        ctx.ellipse(ex + e.w / 2, e.y + e.h - squish, e.w / 2, e.h / 2 + squish, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88cc66';
        ctx.beginPath();
        ctx.arc(ex + 3, e.y + 3, 2, 0, Math.PI * 2);
        ctx.arc(ex + e.w - 4, e.y + 4, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex + 3, e.y + 2, 3, 3);
        ctx.fillRect(ex + e.w - 6, e.y + 2, 3, 3);
        break;
      case 'gloomwing':
        const wingY = Math.sin(e.animTimer * 8) * 3;
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = e.color + 'aa';
        ctx.beginPath();
        ctx.ellipse(ex, e.y + e.h / 2 + wingY, 6, 4, 0, 0, Math.PI * 2);
        ctx.ellipse(ex + e.w, e.y + e.h / 2 - wingY, 6, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Red eyes
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 4, e.y + e.h / 2 - 2, 2, 2);
        ctx.fillRect(ex + e.w - 6, e.y + e.h / 2 - 2, 2, 2);
        break;
      case 'golem':
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#55443388';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const ra = e.animTimer * 2;
        ctx.moveTo(ex + e.w / 2 + Math.cos(ra) * 5, e.y + e.h / 2 + Math.sin(ra) * 5);
        ctx.lineTo(ex + e.w / 2 - Math.cos(ra) * 5, e.y + e.h / 2 - Math.sin(ra) * 5);
        ctx.stroke();
        // Face
        ctx.fillStyle = '#ffcc44';
        ctx.fillRect(ex + 5, e.y + 5, 3, 3);
        ctx.fillRect(ex + e.w - 8, e.y + 5, 3, 3);
        break;
      case 'sporegun':
        ctx.fillRect(ex, e.y, e.w, e.h);
        ctx.fillStyle = '#888899';
        const tdx = player.x - e.x;
        const tdy = player.y - e.y;
        const tangle = Math.atan2(tdy, tdx);
        ctx.save();
        ctx.translate(ex + e.w / 2, e.y + e.h / 2);
        ctx.rotate(tangle);
        ctx.fillRect(0, -2, 12, 4);
        ctx.restore();
        // Warning glow when about to shoot
        if (e.shootTimer < 0.5) {
          ctx.fillStyle = '#ff444444';
          ctx.beginPath();
          ctx.arc(ex + e.w / 2, e.y + e.h / 2, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 'toadstool':
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, e.y + 4, e.w / 2, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#aa6622';
        ctx.fillRect(ex + e.w / 2 - 3, e.y + 4, 6, e.h - 4);
        ctx.fillStyle = '#ffeecc';
        ctx.beginPath();
        ctx.arc(ex + 4, e.y + 2, 2, 0, Math.PI * 2);
        ctx.arc(ex + e.w - 4, e.y + 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Poison drip
        ctx.fillStyle = '#44cc2288';
        const drip = (e.animTimer * 2) % 1;
        ctx.fillRect(ex + e.w / 2, e.y + e.h - 2 + drip * 5, 2, 3);
        break;
      case 'crawler':
        // Low, fast centipede-like
        ctx.fillRect(ex, e.y + 4, e.w, e.h - 4);
        // Legs
        ctx.fillStyle = '#338888';
        for (let leg = 0; leg < 4; leg++) {
          const legX = ex + 1 + leg * 3;
          const legOff = Math.sin(e.animTimer * 10 + leg * 1.5) * 2;
          ctx.fillRect(legX, e.y + e.h - 2 + legOff, 2, 3);
        }
        // Eyes
        ctx.fillStyle = '#ff8844';
        ctx.fillRect(ex + (e.vx > 0 ? e.w - 3 : 1), e.y + 5, 2, 2);
        break;
      case 'mimic':
        // Revealed mimic — angry chest
        ctx.fillStyle = '#ddaa22';
        ctx.fillRect(ex, e.y, e.w, e.h);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 3, e.y + 4, 3, 3);
        ctx.fillRect(ex + e.w - 6, e.y + 4, 3, 3);
        // Open mouth
        ctx.fillStyle = '#440000';
        ctx.fillRect(ex + 2, e.y + e.h - 5, e.w - 4, 3);
        // Teeth
        ctx.fillStyle = '#ffffff';
        for (let t = 0; t < 3; t++) {
          ctx.fillRect(ex + 3 + t * 4, e.y + e.h - 5, 2, 2);
        }
        break;
      case 'blightmaw':
        // Large chomper
        ctx.beginPath();
        ctx.ellipse(ex + e.w / 2, e.y + e.h / 2, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Mouth
        const mawOpen = Math.abs(Math.sin(e.animTimer * 3)) * 4;
        ctx.fillStyle = '#001100';
        ctx.fillRect(ex + 3, e.y + e.h / 2, e.w - 6, mawOpen + 3);
        // Teeth
        ctx.fillStyle = '#ccddbb';
        for (let t = 0; t < 4; t++) {
          ctx.fillRect(ex + 4 + t * 4, e.y + e.h / 2, 2, 3);
        }
        // Eyes
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(ex + 4, e.y + 3, 4, 4);
        ctx.fillRect(ex + e.w - 8, e.y + 3, 4, 4);
        break;
    }

    // HP bar for multi-hit enemies
    if (e.maxHp > 1 && e.hp < e.maxHp) {
      ctx.fillStyle = '#333333';
      ctx.fillRect(ex, e.y - 5, e.w, 3);
      ctx.fillStyle = '#dd2222';
      ctx.fillRect(ex, e.y - 5, e.w * (e.hp / e.maxHp), 3);
    }
  }
}

function drawProjectiles() {
  for (let i = 0; i < projectiles.length; i++) {
    const p = projectiles[i];
    const px = p.x - scrollX;
    if (px > GW || px < 0) continue;

    ctx.fillStyle = p.hostile ? '#ff4444' : '#44ff44';
    ctx.beginPath();
    ctx.arc(px, p.y, p.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff88';
    ctx.beginPath();
    ctx.arc(px, p.y, p.w / 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBoss() {
  const bx = boss.x - scrollX;
  const charDef = CHARS[boss.weakness];

  // Boss shadow
  ctx.fillStyle = '#00000044';
  ctx.beginPath();
  ctx.ellipse(bx + boss.w / 2, GH - 32, boss.w / 2 + 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Boss body
  ctx.fillStyle = boss.invuln > 0 ? '#ffffff' : boss.color;
  ctx.fillRect(bx, boss.y, boss.w, boss.h);

  // Boss pattern-specific details
  switch (boss.pattern) {
    case 'charge':
      // Horns
      ctx.fillStyle = '#888888';
      ctx.beginPath();
      ctx.moveTo(bx + 5, boss.y);
      ctx.lineTo(bx, boss.y - 8);
      ctx.lineTo(bx + 10, boss.y);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(bx + boss.w - 10, boss.y);
      ctx.lineTo(bx + boss.w, boss.y - 8);
      ctx.lineTo(bx + boss.w - 5, boss.y);
      ctx.fill();
      break;
    case 'jump':
      // Crown of mushrooms
      ctx.fillStyle = '#44aa22';
      for (let m = 0; m < 3; m++) {
        ctx.beginPath();
        ctx.arc(bx + 10 + m * 14, boss.y - 4, 5, Math.PI, 0);
        ctx.fill();
      }
      break;
    case 'shoot':
      // Energy coils
      ctx.strokeStyle = '#ff884488';
      ctx.lineWidth = 2;
      const coilT = boss.timer * 4;
      ctx.beginPath();
      ctx.arc(bx + boss.w / 2, boss.y + boss.h / 2, boss.w / 2 + 4, coilT, coilT + 2);
      ctx.stroke();
      break;
    case 'all':
      // Dark aura
      ctx.fillStyle = '#aa44ff22';
      ctx.beginPath();
      ctx.arc(bx + boss.w / 2, boss.y + boss.h / 2, boss.w / 2 + 8 + Math.sin(boss.timer * 3) * 4, 0, Math.PI * 2);
      ctx.fill();
      break;
  }

  // Boss face
  ctx.fillStyle = '#000000';
  const eyeX = boss.facing > 0 ? bx + boss.w * 0.6 : bx + boss.w * 0.2;
  ctx.fillRect(eyeX, boss.y + boss.h * 0.25, 6, 6);
  ctx.fillRect(eyeX + 12, boss.y + boss.h * 0.25, 6, 6);
  ctx.fillRect(eyeX - 2, boss.y + boss.h * 0.2, 10, 2);
  ctx.fillRect(eyeX + 10, boss.y + boss.h * 0.2, 10, 2);

  // HP bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(bx, boss.y - 12, boss.w, 6);
  ctx.fillStyle = '#dd2222';
  ctx.fillRect(bx, boss.y - 12, boss.w * (boss.hp / boss.maxHp), 6);

  // Weakness indicator
  ctx.fillStyle = charDef.color;
  ctx.font = '8px monospace';
  ctx.fillText('WEAK: ' + charDef.name, bx, boss.y - 16);

  // Boss name + lore
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, bx + boss.w / 2, boss.y - 22);
  ctx.textAlign = 'left';
}

function drawPlayer() {
  if (invuln > 0 && Math.floor(invuln * 10) % 2 === 0) return;

  const charDef = CHARS[currentChar];
  const px = player.x - scrollX;
  const py = player.y;

  // Player shadow
  if (player.grounded) {
    ctx.fillStyle = '#00000033';
    ctx.beginPath();
    ctx.ellipse(px + player.w / 2, py + player.h + 2, player.w / 2 + 1, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(px + player.w / 2, py + player.h / 2);
  if (player.facing < 0) ctx.scale(-1, 1);

  // Body (baseling shape — the player IS the baseling)
  // Use statB color if available, otherwise character color
  ctx.fillStyle = statB.color || charDef.color;
  ctx.beginPath();
  ctx.ellipse(0, -2, player.w / 2 + 2, player.h / 2 - 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Accent details unique per character
  ctx.fillStyle = charDef.accent;
  switch (currentChar) {
    case 0: // Spore - spots
      ctx.beginPath();
      ctx.arc(-3, -5, 2, 0, Math.PI * 2);
      ctx.arc(2, -3, 1.5, 0, Math.PI * 2);
      ctx.arc(-1, 0, 1, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 1: // Fizz - stripes
      ctx.fillRect(-6, -6, 12, 2);
      ctx.fillRect(-5, -2, 10, 2);
      ctx.fillRect(-4, 2, 8, 2);
      break;
    case 2: // Tank - armor plates
      ctx.fillRect(-5, -8, 10, 4);
      ctx.fillRect(-6, -4, 12, 3);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(-2, -7, 4, 2);
      break;
    case 3: // Zip - lightning bolt
      ctx.beginPath();
      ctx.moveTo(-2, -7);
      ctx.lineTo(2, -3);
      ctx.lineTo(0, -3);
      ctx.lineTo(3, 3);
      ctx.lineTo(-1, -1);
      ctx.lineTo(1, -1);
      ctx.closePath();
      ctx.fill();
      break;
  }

  // Baseling icon from statB
  if (statB.icon && statB.icon !== 'B') {
    ctx.fillStyle = '#ffffff88';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, -8);
    ctx.textAlign = 'left';
  }

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(1, -5, 4, 4);
  ctx.fillStyle = '#000000';
  ctx.fillRect(3, -4, 2, 2);

  // Legs (animated)
  ctx.fillStyle = charDef.accent;
  const legOffset = player.grounded ? Math.sin(player.animFrame * 1.5) * 3 : 2;
  ctx.fillRect(-4, player.h / 2 - 6, 3, 5 + legOffset);
  ctx.fillRect(1, player.h / 2 - 6, 3, 5 - legOffset);

  // Speed boost aura
  if (speedBoostTimer > 0) {
    ctx.strokeStyle = '#44ff8888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, player.w / 2 + 5, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Armor shield visual
  if (armorTimer > 0) {
    ctx.strokeStyle = '#88aaff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, player.w / 2 + 6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Wall sliding indicator
  if (wallSliding) {
    ctx.fillStyle = '#ffffff88';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-8 * player.facing, -4 + i * 4, 2, 2);
    }
  }

  // Wall climbing indicator
  if (wallClimbing) {
    ctx.fillStyle = '#ffff8888';
    ctx.fillRect(-8 * player.facing, -6, 3, 12);
  }

  // Dash effect with trail
  if (dashTimer > 0) {
    ctx.fillStyle = '#ff884488';
    ctx.fillRect(-player.w - 4, -4, player.w, 8);
    ctx.fillStyle = '#ff884422';
    ctx.fillRect(-player.w * 2 - 4, -3, player.w, 6);
  }

  ctx.restore();
}

function drawHUD() {
  const charDef = CHARS[currentChar];

  // Top bar background
  ctx.fillStyle = '#00000088';
  ctx.fillRect(0, 0, GW, 28);

  // HP hearts
  const mhp = hpMax(); // ref 3
  for (let i = 0; i < mhp; i++) {
    ctx.fillStyle = i < hp ? '#ff4444' : '#44444488';
    const hx = 8 + i * 14;
    ctx.beginPath();
    ctx.arc(hx + 3, 12, 3, 0, Math.PI * 2);
    ctx.arc(hx + 8, 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx, 14);
    ctx.lineTo(hx + 5.5, 20);
    ctx.lineTo(hx + 11, 14);
    ctx.fill();
  }

  // Character indicator with baseling name
  const nameStr = statB.name || charDef.name;
  ctx.fillStyle = charDef.color;
  const nameW = Math.max(50, nameStr.length * 7 + 8);
  ctx.fillRect(76, 6, nameW, 16);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 9px monospace';
  ctx.fillText(nameStr, 80, 17);

  // Ability text
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '8px monospace';
  ctx.fillText(charDef.desc, 76 + nameW + 4, 17);

  // Score (INT-boosted)
  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, GW - 8, 14);

  // Coins
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('x' + coins, GW - 8, 24);
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(GW - 36, 20, 4, 0, Math.PI * 2);
  ctx.fill();

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#88ccff';
  ctx.fillText('x' + lives, 8, GH - 8);

  // Combo indicator
  if (comboCount > 1 && comboTimer > 0) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMBO x' + comboCount, GW / 2, GH - 20);
    ctx.textAlign = 'left';
  }

  // World/stage + zone name
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.font = '10px monospace';
  const zoneName = WORLDS[worldNum].zones ? WORLDS[worldNum].zones[getZoneIndex()].name : '';
  ctx.fillText(WORLDS[worldNum].name + ' ' + (worldNum + 1) + '-' + (stageNum + 1), GW / 2, GH - 8);
  ctx.textAlign = 'left';

  // Stars collected this level
  const starsThisLevel = stars.filter(function(s) { return s.collected; }).length;
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < starsThisLevel ? '#ffdd44' : '#44444488';
    drawStar(ctx, GW / 2 - 24 + i * 16, 20, 5, 2, 5);
  }

  // Level stat bonuses indicator (small)
  if (statB.level > 0) {
    ctx.fillStyle = '#88ff88';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('LV' + statB.level, GW - 8, GH - 20);
    ctx.textAlign = 'left';
  }

  // Boss HP bar at top
  if (boss && bossActive && !boss.dead) {
    ctx.fillStyle = '#00000088';
    ctx.fillRect(GW / 2 - 80, 30, 160, 14);
    ctx.fillStyle = '#880000';
    ctx.fillRect(GW / 2 - 78, 32, 156, 10);
    ctx.fillStyle = '#dd2222';
    ctx.fillRect(GW / 2 - 78, 32, 156 * (boss.hp / boss.maxHp), 10);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, GW / 2, 41);
    ctx.textAlign = 'left';
  }
}

// ============================================================
// ZONE BANNER — shows zone name briefly on transitions
// ============================================================
let zoneBannerTimer = 0;
let zoneBannerName = '';
let lastZone = -1;

function drawZoneBanner() {
  const zi = getZoneIndex();
  if (zi !== lastZone && state === 'playing') {
    lastZone = zi;
    const w = WORLDS[worldNum];
    if (w.zones && w.zones[zi]) {
      zoneBannerName = w.zones[zi].name;
      zoneBannerTimer = 2;
    }
  }
  if (zoneBannerTimer > 0) {
    zoneBannerTimer -= 1/60;
    const alpha = Math.min(1, zoneBannerTimer / 0.5);
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillStyle = '#000000';
    ctx.fillRect(GW / 2 - 80, GH / 2 - 15, 160, 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(zoneBannerName, GW / 2, GH / 2 + 4);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// TUTORIAL OVERLAY
// ============================================================
function drawTutorial() {
  ctx.fillStyle = '#000000aa';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';

  const steps = [
    { title: 'MOVE YOUR BASELING', lines: ['Arrow Keys / WASD / D-Pad', 'Left & Right to walk'] },
    { title: 'JUMP & ATTACK', lines: ['Space / Up / A Button = Jump', 'Stomp enemies from above!'] },
    { title: 'SWAP FORMS', lines: ['B / Shift = Switch Character', 'Each form has a special ability'] },
    { title: 'EXPLORE!', lines: ['Collect coins, stars & items', 'Defeat the boss at each world end!'] }
  ];

  if (tutorialStep < steps.length) {
    const step = steps[tutorialStep];
    ctx.fillText(step.title, GW / 2, GH / 2 - 30);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#aaaaaa';
    for (let l = 0; l < step.lines.length; l++) {
      ctx.fillText(step.lines[l], GW / 2, GH / 2 + l * 16);
    }
    // Progress dots
    ctx.fillStyle = '#888888';
    for (let d = 0; d < steps.length; d++) {
      ctx.fillStyle = d === tutorialStep ? '#ffffff' : '#555555';
      ctx.beginPath();
      ctx.arc(GW / 2 - 20 + d * 14, GH / 2 + 50, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Skip hint
    ctx.fillStyle = '#666666';
    ctx.font = '8px monospace';
    ctx.fillText('Press B or ESC to skip', GW / 2, GH / 2 + 70);
  }

  ctx.textAlign = 'left';
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TINY TOONS', GW / 2, 50);

  ctx.fillStyle = '#88aacc';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Adventure', GW / 2, 70);

  // Baseling name from NFT
  if (statB.name && statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '10px monospace';
    ctx.fillText('Playing as: ' + statB.name, GW / 2, 86);
  }

  // Character parade
  const charY = 110;
  for (let i = 0; i < 4; i++) {
    const cx = GW / 2 - 100 + i * 70;
    const cd = CHARS[i];
    const bounce = Math.sin(frame * 0.05 + i * 1.5) * 4;

    ctx.fillStyle = cd.color;
    ctx.beginPath();
    ctx.ellipse(cx, charY + bounce, 14, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx + 2, charY + bounce - 6, 4, 4);
    ctx.fillStyle = '#000000';
    ctx.fillRect(cx + 4, charY + bounce - 5, 2, 2);

    ctx.fillStyle = cd.color;
    ctx.font = '9px monospace';
    ctx.fillText(cd.name, cx, charY + 30);
    ctx.fillStyle = '#888888';
    ctx.font = '7px monospace';
    ctx.fillText(cd.desc, cx, charY + 42);
  }

  // NES-style controls reference
  ctx.fillStyle = '#666666';
  ctx.font = '9px monospace';
  ctx.fillText('D-PAD / WASD = Move', GW / 2, 186);
  ctx.fillText('A / SPACE / UP = Jump', GW / 2, 200);
  ctx.fillText('B / SHIFT = Swap Form', GW / 2, 214);
  ctx.fillText('DOWN + MOVE = Dash (Tank)', GW / 2, 228);

  // Stat bonuses display
  if (statB.level > 0) {
    ctx.fillStyle = '#88ff88';
    ctx.font = '8px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, GW / 2, 245);
    ctx.fillText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 257);
  }

  // Start prompt
  const blink = Math.sin(frame * 0.06) > 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px monospace';
    ctx.fillText('PRESS A / JUMP TO START', GW / 2, 280);
  }

  // High score
  ctx.fillStyle = '#888888';
  ctx.font = '10px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 300);

  ctx.textAlign = 'left';
}

// ============================================================
// LEVEL CLEAR SCREEN
// ============================================================
function drawLevelClear() {
  ctx.fillStyle = '#00000088';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 40);

  ctx.fillStyle = '#88ccff';
  ctx.font = '12px monospace';
  ctx.fillText(WORLDS[worldNum].name + ' ' + (worldNum + 1) + '-' + (stageNum + 1), GW / 2, GH / 2 - 15);

  // Stars collected
  const starsThisLevel = stars.filter(function(s) { return s.collected; }).length;
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < starsThisLevel ? '#ffdd44' : '#44444488';
    drawStar(ctx, GW / 2 - 24 + i * 16, GH / 2, 6, 2.5, 5);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.fillText('Stars: ' + starsThisLevel + '/3', GW / 2, GH / 2 + 25);

  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.fillText('Score: ' + score, GW / 2, GH / 2 + 45);

  // Combo display
  if (comboCount > 1) {
    ctx.fillStyle = '#ff44ff';
    ctx.fillText('Best Combo: x' + comboCount, GW / 2, GH / 2 + 60);
  }

  ctx.textAlign = 'left';
}

// ============================================================
// VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CONGRATULATIONS!', GW / 2, 60);

  ctx.fillStyle = '#88ccff';
  ctx.font = '14px monospace';
  ctx.fillText('All worlds cleared!', GW / 2, 85);

  // Baseling name shoutout
  if (statB.name && statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '11px monospace';
    ctx.fillText(statB.name + ' saved Tasern!', GW / 2, 105);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = '12px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 130);
  ctx.fillText('Stars: ' + starsCollected.length + '/36', GW / 2, 150);

  // Stat contribution summary
  if (statB.level > 0) {
    ctx.fillStyle = '#88ff88';
    ctx.font = '9px monospace';
    ctx.fillText('STR bonus: x' + dmgMult().toFixed(1) + ' damage', GW / 2, 170);
    ctx.fillText('INT bonus: x' + scoreMult().toFixed(1) + ' score', GW / 2, 183);
  }

  // Character celebration
  for (let i = 0; i < 4; i++) {
    const cx = GW / 2 - 80 + i * 55;
    const bounce = Math.abs(Math.sin(frame * 0.08 + i * 1.2)) * 20;
    ctx.fillStyle = CHARS[i].color;
    ctx.beginPath();
    ctx.ellipse(cx, 220 - bounce, 12, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx + 2, 220 - bounce - 5, 3, 3);
  }

  // Victory particles
  if (frame % 10 === 0) {
    TAS.particles.spawn(Math.random() * GW, GH,
      (Math.random() - 0.5) * 60, -60 - Math.random() * 80,
      ['#ff4444', '#44ff44', '#4444ff', '#ffdd44', '#ff44ff'][Math.floor(Math.random() * 5)], 1.5);
  }

  const blink = Math.sin(frame * 0.06) > 0;
  if (blink) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px monospace';
    ctx.fillText('PRESS A FOR TITLE', GW / 2, 280);
  }

  ctx.textAlign = 'left';
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
