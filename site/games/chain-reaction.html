    for (var j = 0; j < 7; j++) {
      ctx.lineTo(startX + Math.sin(frame * 0.015 + i + j * 0.8) * 30, GH - j * 50);
    }
    ctx.stroke();
  }

  // Spore particles in background
  ctx.fillStyle = '#38d97322';
  for (var i = 0; i < 15; i++) {
    var px = (i * 67 + frame * 0.3) % GW;
    var py = (i * 43 + frame * 0.2) % GH;
    ctx.beginPath(); ctx.arc(px, py, 1 + (i % 3), 0, Math.PI * 2); ctx.fill();
  }

  // Title shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE CHAIN', GW / 2 + 2, GH * 0.22 + 2);

  // Title
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE CHAIN', GW / 2, GH * 0.22);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Clear the Fungal Infestation!', GW / 2, GH * 0.30);

  // Baseling commando pixel art
  var bx = GW / 2;
  var by = GH * 0.50;
  // Body
  ctx.fillStyle = PLAYER_COLOR;
  ctx.fillRect(bx - 8, by - 16, 16, 28);
  // Cap
  ctx.fillStyle = '#2a4a2a';
  ctx.fillRect(bx - 10, by - 20, 20, 8);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx + 2, by - 13, 4, 3);
  ctx.fillStyle = '#111';
  ctx.fillRect(bx + 3, by - 12, 2, 2);
  // Gun
  ctx.fillStyle = '#444';
  ctx.fillRect(bx + 8, by - 6, 10, 3);
  // Grapple tendril
  ctx.strokeStyle = PLAYER_COLOR;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx - 5, by - 8);
  var gEndX = bx - 80 + Math.sin(frame * 0.03) * 20;
  var gEndY = by - 50 + Math.cos(frame * 0.04) * 10;
  ctx.quadraticCurveTo(bx - 40, by - 30, gEndX, gEndY);
  ctx.stroke();
  ctx.fillStyle = '#aaffcc';
  ctx.beginPath(); ctx.arc(gEndX, gEndY, 4, 0, Math.PI * 2); ctx.fill();

  // Selected baseling preview (idle bob) + name + picker prompt (Base-blue)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (!TAS.drawBaseling(ctx, GW / 2, GH * 0.50, 40, { anim: 'idle', frame: frame })) {
    // no sprite (Wimmple) — title art carries it
  }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, GH * 0.60);
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH * 0.645);

  // Control instructions
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS: MOVE + AIM', GW / 2, GH * 0.70);
  ctx.fillText('W/SPACE: FIRE TENDRIL  |  S: SHOOT SPORES', GW / 2, GH * 0.76);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('NO JUMP -- TENDRIL IS YOUR ONLY WAY UP', GW / 2, GH * 0.82);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH * 0.91);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = '#555';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH * 0.97);
  }
}

// === STAGE COMPLETE SCREEN ===
function drawStageComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN CLEARED!', GW / 2, GH * 0.25);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '14px monospace';
  ctx.fillText(STAGES[currentStage].name, GW / 2, GH * 0.37);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('Score: ' + score, GW / 2, GH * 0.48);

  if (maxChain >= 3) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('Best Chain: x' + maxChain, GW / 2, GH * 0.56);
  }

  if (intelCollected.includes(currentStage)) {
    ctx.fillStyle = '#88ccff';
    ctx.fillText('SEED DATA RECOVERED!', GW / 2, GH * 0.65);
  }

  // Stat contribution
  if (BASELING_LEVEL > 0) {
    ctx.fillStyle = '#777';
    ctx.font = '8px monospace';
    ctx.fillText(BASELING_NAME + ' STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con +
                 ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, GH * 0.73);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('RETURNING TO MAP...', GW / 2, GH * 0.85);
  ctx.globalAlpha = 1;
}

// === GAME OVER SCREEN ===
function drawGameOverCustom() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, GW, GH);

  // Decay effect
  ctx.fillStyle = '#221111';
  for (var i = 0; i < 20; i++) {
    var rx = (i * 73) % GW;
    var ry = (i * 47 + frame * 0.5) % GH;
    ctx.fillRect(rx, ry, 3 + (i % 5), 3 + (i % 4));
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN OVERRUN', GW / 2, GH * 0.3);

  ctx.fillStyle = '#aa6666';
  ctx.font = '12px monospace';
  ctx.fillText('The fungal infestation spreads...', GW / 2, GH * 0.4);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '14px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, GH * 0.52);

  if (maxChain >= 3) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '11px monospace';
    ctx.fillText('Best Chain: x' + maxChain, GW / 2, GH * 0.60);
  }

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, GH * 0.68);
  }

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Stage: ' + (currentStage >= 0 ? STAGES[currentStage].name : '---'), GW / 2, GH * 0.76);

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#888';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO CONTINUE', GW / 2, GH * 0.88);
  ctx.globalAlpha = 1;
}

// === MfT SPLASH ===
var splashTimer = 2;
var showSplash = true;

function drawSplash() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  var alpha = splashTimer > 1.5 ? (2 - splashTimer) * 2 : (splashTimer < 0.5 ? splashTimer * 2 : 1);
  ctx.globalAlpha = alpha;

  ctx.textAlign = 'center';
  ctx.fillStyle = PLAYER_COLOR;
  ctx.font = 'bold 24px monospace';
  ctx.fillText('MfT', GW / 2, GH / 2 - 10);
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('MEME FOR TREES', GW / 2, GH / 2 + 12);

  ctx.globalAlpha = 1;
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (showSplash) {
    splashTimer -= dt;
    if (splashTimer <= 0) showSplash = false;
    return;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC']) {
      TAS.input.keys['KeyC'] = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      state = 'map';
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'map') {
    updateMap(dt);
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
      score = 0;
      lives = BASE_LIVES;  // CON: starting lives
      health = maxHealth;
      weapon = 'normal';
      weaponAmmo = -1;
      maxChain = 0;
    }
    return;
  }

  if (state === 'stageComplete') {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) state = 'map';
    return;
  }

  if (state === 'playing') {
    updatePlayer(dt);
    updateGrapple(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateBullets(dt);
    updatePickups(dt);
    updateCamera(dt);
    updateSporeClouds(dt);
    updateMushroomDrops(dt);
    updateHazards(dt);
    updateScorePopups(dt);
    updateChain(dt);
    updateBuffs(dt);
  }
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (showSplash) { drawSplash(); return; }

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'map') {
    drawMap();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverCustom();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'stageComplete') {
    drawStageComplete();
    return;
  }

  if (state === 'playing') {
    ctx.save();
    TAS.fx.applyShake();

    drawBackground();
    drawPlatforms();
    drawGrapplePoints();
    drawHazards();
    drawSporeClouds();
    drawPickups();
    drawMushroomDrops();
    drawEnemies();
    drawBoss();
    drawGrapple();
    drawPlayer();
    drawBullets();
    drawScorePopups();

    TAS.particles.draw();
    ctx.restore();

    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    drawTutorial();
    TAS.input.drawTouchControls(GW, GH);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
