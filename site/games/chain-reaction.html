<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Chain</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
const { lerp, clamp, randRange, randInt, dist } = TAS.math;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'TENDRIL', b: 'SPORE' } });

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: TAS.player.mults() -> {moveSpeed,health,damage,luck,swim}
// clamped to the single-player band (0.8–1.6). This game's derived constants read
// D&D-style statB fields, so we synthesize them from the bounded mults inside
// recomputeStats() (mult 1.0 -> 10, 0.8 -> 6, 1.6 -> 22) and recompute the constants.
// Not a wager game -> default band.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[chain-reaction] NftLoader display info failed:', e && e.message); }

// Derived stat scaling — (re)assigned by recomputeStats().
var STR_MULT, DEX_MULT, CON_BONUS_HP, CON_BONUS_LIVES, INT_SCORE_MULT, WIS_COOLDOWN, CHA_LUCK;
var PLAYER_COLOR = statB.color, BASELING_NAME = statB.name, BASELING_ICON = statB.icon;
var picking = false; // baseling character-select overlay open
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.cooldown = 1 / m.moveSpeed; statB.scoreMult = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.moveSpeed); statB.cha = dnd(m.luck);
  statB.level = Math.round((statB.str + statB.dex + statB.con + statB.int + statB.wis + statB.cha) / 6);
  STR_MULT = m.damage;             // explosion power/damage
  DEX_MULT = m.moveSpeed;          // cursor/player speed
  CON_BONUS_HP = m.health > 1.3 ? 1 : 0; // extra HP
  CON_BONUS_LIVES = statB.lives;
  INT_SCORE_MULT = 1;              // score is not a stat
  WIS_COOLDOWN = 1 / m.moveSpeed;  // SPD -> cooldown reduction
  CHA_LUCK = m.luck;               // chain luck / drops
  PLAYER_COLOR = statB.color; BASELING_NAME = statB.name; BASELING_ICON = statB.icon;
}
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[chain-reaction] player init failed:', e && e.message); });
}
var BASELING_LEVEL = statB.level || 0;

// === CONSTANTS ===
const GRAVITY = 980;
const BASE_PLAYER_SPEED = 120;
const PLAYER_SPEED = BASE_PLAYER_SPEED * DEX_MULT;   // DEX: movement speed
const GRAPPLE_SPEED = 600 * DEX_MULT;                // DEX: grapple travel speed
const GRAPPLE_MAX_LEN = 180 + Math.floor((statB.dex - 10) * 3); // DEX: grapple reach
const SWING_FORCE = 400;
const BASE_BULLET_SPEED = 320;
const BULLET_SPEED = BASE_BULLET_SPEED * DEX_MULT;   // DEX: bullet speed
const TENDRIL_SEG = 8;
const BASE_MAX_HP = 6 + CON_BONUS_HP;                // CON: max health
const BASE_LIVES = 3 + CON_BONUS_LIVES;              // CON: extra lives
const EXPLOSION_RADIUS = 40 * STR_MULT;              // STR: explosion radius
const EXPLOSION_DAMAGE = 4 * STR_MULT;               // STR: explosion damage

// === SCORE POPUP SYSTEM (PASS 2) ===
var scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#f4b41b', life: 1.2, vy: -40 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y += scorePopups[i].vy * dt;
    scorePopups[i].life -= dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = Math.min(1, sp.life * 2);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x - camera.x, sp.y - camera.y);
  }
  ctx.globalAlpha = 1;
}

// === CHAIN COMBO SYSTEM (PASS 2) ===
var chainCombo = 0;
var chainTimer = 0;
var maxChain = 0;
var CHAIN_WINDOW = 2.5 + (statB.wis - 10) * 0.1;  // WIS: longer chain window
function addChainKill() {
  chainCombo++;
  chainTimer = CHAIN_WINDOW;
  if (chainCombo > maxChain) maxChain = chainCombo;
  if (chainCombo >= 3) {
    addScorePopup(player.x, player.y - 40, 'CHAIN x' + chainCombo + '!', '#f4b41b');
    TAS.audio.playTone(300 + chainCombo * 50, 0.08, 'sine', 0.06);
  }
}
function updateChain(dt) {
  if (chainTimer > 0) {
    chainTimer -= dt;
    if (chainTimer <= 0) {
      if (chainCombo >= 5) {
        var bonus = chainCombo * 100;
        score += Math.round(bonus * INT_SCORE_MULT);  // INT: chain bonus
        addScorePopup(player ? player.x : GW / 2, player ? player.y - 60 : GH / 2, 'CHAIN BONUS +' + bonus, '#f4b41b');
      }
      chainCombo = 0;
    }
  }
}

// === SPORE CLOUD SYSTEM (PASS 2) ===
var sporeClouds = [];
function spawnSporeCloud(x, y, type) {
  sporeClouds.push({
    x: x, y: y, type: type || 'poison', radius: 20, life: 3, maxLife: 3,
    pulsePhase: Math.random() * Math.PI * 2
  });
}
function updateSporeClouds(dt) {
  for (var i = sporeClouds.length - 1; i >= 0; i--) {
    var c = sporeClouds[i];
    c.life -= dt;
    c.pulsePhase += dt * 3;
    c.radius = 20 + Math.sin(c.pulsePhase) * 4;
    if (c.life <= 0) { sporeClouds.splice(i, 1); continue; }
    // Damage player if in cloud
    if (player && invincible <= 0) {
      var d = dist(player.x, player.y - player.h / 2, c.x, c.y);
      if (d < c.radius + 8) {
        if (c.type === 'poison') playerHit(1);
        else if (c.type === 'slow') { player.vx *= 0.5; player.vy *= 0.8; }
      }
    }
  }
}
function drawSporeClouds() {
  for (var i = 0; i < sporeClouds.length; i++) {
    var c = sporeClouds[i];
    var sx = c.x - camera.x;
    var sy = c.y - camera.y;
    var alpha = Math.min(1, c.life / c.maxLife) * 0.5;
    ctx.globalAlpha = alpha;
    if (c.type === 'poison') {
      ctx.fillStyle = '#a855f788';
      ctx.beginPath(); ctx.arc(sx, sy, c.radius, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#7a3db8';
      ctx.beginPath(); ctx.arc(sx, sy, c.radius * 0.5, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = '#38d97388';
      ctx.beginPath(); ctx.arc(sx, sy, c.radius, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// === GARDEN SEED DROPS ===
var mushroomDrops = [];
var MUSHROOM_TYPES = [
  { name: 'Heal Seed', color: '#e6482e', effect: 'heal', desc: '+3 HP' },
  { name: 'Bark Shield', color: '#44aaff', effect: 'shield', desc: '5s Shield' },
  { name: 'POOP Catalyst', color: '#f4b41b', effect: 'burst', desc: 'STR Boost' },
  { name: 'Spore Rush', color: '#38d973', effect: 'speed', desc: 'DEX Boost' },
  { name: 'Garden Sage', color: '#a855f7', effect: 'score', desc: '2x Score' },
  { name: 'Lucky Sprout', color: '#f4b41b', effect: 'luck', desc: '+Drops' }
];
var activeBuffs = { burst: 0, speed: 0, score: 0, luck: 0, shield: 0 };

function spawnMushroomDrop(x, y) {
  var dropChance = 0.25 * CHA_LUCK;  // CHA: better drop chance
  if (activeBuffs.luck > 0) dropChance *= 1.5;
  if (Math.random() > dropChance) return;
  var type = MUSHROOM_TYPES[randInt(0, MUSHROOM_TYPES.length - 1)];
  mushroomDrops.push({ x: x, y: y, w: 12, h: 14, type: type, vy: -80, grounded: false, life: 8 });
}
function updateMushroomDrops(dt) {
  for (var i = mushroomDrops.length - 1; i >= 0; i--) {
    var m = mushroomDrops[i];
    m.life -= dt;
    if (m.life <= 0) { mushroomDrops.splice(i, 1); continue; }
    if (!m.grounded) {
      m.vy += GRAVITY * 0.5 * dt;
      m.y += m.vy * dt;
      var gy = getGroundY(m.x);
      if (m.y >= gy - 8) { m.y = gy - 8; m.grounded = true; }
    }
    // Player pickup
    if (player && TAS.hit.rectOverlap(player.x - player.w / 2, player.y - player.h, player.w, player.h,
        m.x - m.w / 2, m.y - m.h, m.w, m.h)) {
      collectMushroom(m);
      mushroomDrops.splice(i, 1);
    }
  }
}
function collectMushroom(m) {
  var eff = m.type.effect;
  addScorePopup(m.x, m.y - 20, m.type.name, m.type.color);
  TAS.audio.playMelody([[550, 0.06], [770, 0.06], [990, 0.1]], 90);
  TAS.particles.spawn(m.x, m.y, m.type.color, 8, 2);
  if (eff === 'heal') { health = Math.min(maxHealth, health + 3); }
  else if (eff === 'shield') { activeBuffs.shield = 5; invincible = 5; }
  else if (eff === 'burst') { activeBuffs.burst = 8; }
  else if (eff === 'speed') { activeBuffs.speed = 8; }
  else if (eff === 'score') { activeBuffs.score = 10; }
  else if (eff === 'luck') { activeBuffs.luck = 12; }
}
function updateBuffs(dt) {
  for (var k in activeBuffs) { if (activeBuffs[k] > 0) activeBuffs[k] -= dt; }
}
function drawMushroomDrops() {
  for (var i = 0; i < mushroomDrops.length; i++) {
    var m = mushroomDrops[i];
    var sx = m.x - camera.x;
    var sy = m.y - camera.y;
    var bob = Math.sin(frame * 0.08 + m.x) * 2;
    var alpha = m.life < 2 ? m.life / 2 : 1;
    ctx.globalAlpha = alpha;
    // Mushroom cap
    ctx.fillStyle = m.type.color;
    ctx.beginPath();
    ctx.arc(sx, sy - 10 + bob, 7, Math.PI, 0);
    ctx.fill();
    // Stem
    ctx.fillStyle = '#ddc';
    ctx.fillRect(sx - 2, sy - 10 + bob, 4, 8);
    // Spots
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx - 3, sy - 13 + bob, 2, 2);
    ctx.fillRect(sx + 2, sy - 12 + bob, 2, 2);
    ctx.globalAlpha = 1;
  }
}

// === ENVIRONMENTAL HAZARDS (PASS 2) ===
var hazards = [];
function spawnStageHazards(stageIdx) {
  hazards = [];
  var stage = STAGES[stageIdx];
  // Spore vents on some stages
  if (stageIdx >= 1) {
    var numVents = 2 + Math.floor(stageIdx / 2);
    for (var i = 0; i < numVents; i++) {
      var vx = randRange(300, levelWidth - 300);
      hazards.push({
        type: 'spore_vent', x: vx, y: getGroundY(vx) - 4,
        timer: randRange(1, 4), interval: randRange(3, 6), active: false
      });
    }
  }
  // Thorn patches on later stages
  if (stageIdx >= 3) {
    var numThorns = 2 + Math.floor(stageIdx / 3);
    for (var i = 0; i < numThorns; i++) {
      var tx = randRange(400, levelWidth - 400);
      hazards.push({
        type: 'thorns', x: tx, y: getGroundY(tx) - 6, w: randRange(30, 60), h: 8
      });
    }
  }
  // Falling spores on sky stages
  if (stageIdx >= 4) {
    for (var i = 0; i < 3; i++) {
      hazards.push({
        type: 'falling_spore', x: randRange(200, levelWidth - 200), y: -20,
        vy: randRange(30, 60), resetY: -20, active: true
      });
    }
  }
}
function updateHazards(dt) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.type === 'spore_vent') {
      h.timer -= dt;
      if (h.timer <= 0) {
        h.active = !h.active;
        h.timer = h.active ? 1.5 : h.interval;
        if (h.active) {
          spawnSporeCloud(h.x, h.y - 25, 'poison');
          TAS.particles.spawn(h.x, h.y - 10, '#a855f7', 6, 2, { gravity: -0.5 });
        }
      }
    } else if (h.type === 'thorns') {
      if (player && invincible <= 0 && TAS.hit.rectOverlap(
          player.x - player.w / 2, player.y - player.h, player.w, player.h,
          h.x, h.y, h.w, h.h)) {
        playerHit(1);
      }
    } else if (h.type === 'falling_spore') {
      h.y += h.vy * dt;
      if (h.y > levelHeight + 20) { h.y = h.resetY; h.x = randRange(200, levelWidth - 200); }
      if (player && invincible <= 0) {
        if (dist(player.x, player.y - player.h / 2, h.x, h.y) < 12) playerHit(1);
      }
    }
  }
}
function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var sx = h.x - camera.x;
    var sy = (h.y !== undefined ? h.y : 0) - camera.y;
    if (h.type === 'spore_vent') {
      // Vent pipe
      ctx.fillStyle = '#445544';
      ctx.fillRect(sx - 6, sy - 4, 12, 8);
      ctx.fillStyle = '#556655';
      ctx.fillRect(sx - 8, sy - 6, 16, 4);
      if (h.active) {
        ctx.fillStyle = '#a855f766';
        ctx.beginPath(); ctx.arc(sx, sy - 15, 10 + Math.sin(frame * 0.2) * 3, 0, Math.PI * 2); ctx.fill();
      }
    } else if (h.type === 'thorns') {
      ctx.fillStyle = '#664422';
      ctx.fillRect(sx, sy, h.w, h.h);
      // Spikes
      ctx.fillStyle = '#885533';
      for (var j = 0; j < h.w; j += 6) {
        ctx.beginPath();
        ctx.moveTo(sx + j, sy);
        ctx.lineTo(sx + j + 3, sy - 6);
        ctx.lineTo(sx + j + 6, sy);
        ctx.fill();
      }
    } else if (h.type === 'falling_spore') {
      ctx.fillStyle = '#a855f788';
      ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#7a3db8';
      ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2); ctx.fill();
    }
  }
}

// === STAGE DATA (Baseling Garden themed) ===
const STAGES = [
  { name: 'Overgrown Nursery', bg: '#0f1f12', ground: '#2a4a22', accent: '#5a8a3e', enemies: 4, boss: 'sporeling_king',
    zone: 'forest', desc: 'Fungal spores have invaded the seedling beds...' },
  { name: 'Rocky Terrace', bg: '#1a1a2e', ground: '#3a3a5a', accent: '#6688aa', enemies: 5, boss: 'stone_cap',
    zone: 'mountain', desc: 'The stone planters are crawling with mold clusters.' },
  { name: 'Root Cellar', bg: '#120e1e', ground: '#2a2244', accent: '#5544aa', enemies: 6, boss: 'mycelium_brain',
    zone: 'cave', desc: 'Deep beneath the garden, the rot spreads unchecked.' },
  { name: 'Trellis Walk', bg: '#0e2030', ground: '#305a7a', accent: '#66bbdd', enemies: 5, boss: 'sky_polyp',
    zone: 'sky', desc: 'Fungal blooms dangle from every vine and beam.' },
  { name: 'Compost Bog', bg: '#1a2210', ground: '#3a4a28', accent: '#6a8a4a', enemies: 6, boss: 'compost_golem',
    zone: 'swamp', desc: 'The POOP pile has gone wild with toxic fungus.' },
  { name: 'Spore Tower', bg: '#221428', ground: '#443060', accent: '#8855bb', enemies: 7, boss: 'psilocybe_tower',
    zone: 'psychic', desc: 'A towering fungal stalk raining spores on the garden.' },
  { name: 'Greenhouse Rails', bg: '#2a1a10', ground: '#5a3828', accent: '#aa6633', enemies: 8, boss: 'locomotive_fungus',
    zone: 'train', desc: 'The supply rails are overrun by creeping mold.' },
  { name: 'Fungal Heart', bg: '#1a0808', ground: '#3a1818', accent: '#cc2222', enemies: 10, boss: 'apex_fruiter',
    zone: 'core', desc: 'The core of the infestation. Purge it with spores!' }
];

// === ZONE PALETTES (PASS 3) ===
var ZONE_PALETTES = {
  forest: { sky: '#0f1f12', plat: '#3a5a2a', glow: '#44dd88', particle: '#66ff99' },
  mountain: { sky: '#1a1a2e', plat: '#5a5a7a', glow: '#88aacc', particle: '#aaccff' },
  cave: { sky: '#120e1e', plat: '#332255', glow: '#7744cc', particle: '#aa66ff' },
  sky: { sky: '#0e2030', plat: '#4488aa', glow: '#66ddff', particle: '#88eeff' },
  swamp: { sky: '#1a2210', plat: '#4a5a28', glow: '#88aa44', particle: '#aacc66' },
  psychic: { sky: '#221428', plat: '#553377', glow: '#bb66ff', particle: '#dd88ff' },
  train: { sky: '#2a1a10', plat: '#6a4422', glow: '#dd8844', particle: '#ffaa66' },
  core: { sky: '#1a0808', plat: '#5a2222', glow: '#ff4444', particle: '#ff6666' }
};

// === BOSS DATA (Garden Infestation bosses) ===
var BOSS_DATA = {
  sporeling_king: { hp: 20, name: 'Blight King', color: '#448844', pattern: 'circle_spray' },
  stone_cap: { hp: 25, name: 'Mold Golem', color: '#7788aa', pattern: 'aimed_volley' },
  mycelium_brain: { hp: 22, name: 'Root Rot Brain', color: '#6644aa', pattern: 'pulse_ring' },
  sky_polyp: { hp: 28, name: 'Vine Polyp', color: '#44aadd', pattern: 'rain_drop' },
  compost_golem: { hp: 30, name: 'POOP Colossus', color: '#667744', pattern: 'ground_pound' },
  psilocybe_tower: { hp: 26, name: 'Spore Obelisk', color: '#aa55cc', pattern: 'spiral' },
  locomotive_fungus: { hp: 35, name: 'Rail Creeper', color: '#aa6633', pattern: 'train_rush' },
  apex_fruiter: { hp: 50, name: 'Fungal Heart', color: '#cc3333', pattern: 'all_patterns' }
};

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('chain_reaction_hi');
var maxHealth = BASE_MAX_HP;
var lives = BASE_LIVES;
var health = maxHealth;
var currentStage = -1;
var stagesCleared = [];
var intelCollected = [];
var weapon = 'normal';
var weaponAmmo = -1;
var camera = { x: 0, y: 0 };
var tutorialShown = false;
var tutorialStep = 0;
var tutorialTimer = 0;

// Player
var player = null;
// Grapple
var grapple = null;
// Level geometry
var platforms = [];
var grapplePoints = [];
var enemies = [];
var bullets = [];
var playerBullets = [];
var pickups = [];
var explosions = [];
var boss = null;
var commRoom = null;
var levelWidth = 0;
var levelHeight = 0;
var exitDoor = null;
var stageComplete = false;
var stageCompleteTimer = 0;
var deathTimer = 0;
var bossDefeated = false;
var damageFlash = 0;
var invincible = 0;
var bossWarning = 0;
var bossIntroPlayed = false;

// === SAVE/LOAD ===
function saveGame() {
  try {
    localStorage.setItem('chain_reaction_save', JSON.stringify({
      stagesCleared: stagesCleared, intelCollected: intelCollected, highScore: highScore,
      weapon: weapon, tutorialShown: tutorialShown
    }));
  } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem('chain_reaction_save') || '{}');
    stagesCleared = d.stagesCleared || [];
    intelCollected = d.intelCollected || [];
    highScore = d.highScore || 0;
    tutorialShown = d.tutorialShown || false;
  } catch(e) { console.error('Load failed:', e); }
}
loadGame();

// === PLAYER ===
function createPlayer(x, y) {
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: 14, h: 24, facing: 1,
    grounded: false, crouching: false,
    animFrame: 0, animTimer: 0,
    shootCooldown: 0
  };
}

// === GRAPPLE ===
function createGrapple(x, y, angle) {
  return {
    x: x, y: y, tipX: x, tipY: y,
    angle: angle, attached: false,
    attachX: 0, attachY: 0,
    length: 0, maxLength: GRAPPLE_MAX_LEN,
    ropeLen: 0, swingAngle: 0, swingVel: 0,
    retracting: false, extending: true,
    segments: [], timer: 0
  };
}

// === LEVEL GENERATION ===
function generateLevel(stageIdx) {
  platforms = [];
  grapplePoints = [];
  enemies = [];
  bullets = [];
  playerBullets = [];
  pickups = [];
  explosions = [];
  sporeClouds = [];
  mushroomDrops = [];
  scorePopups = [];
  hazards = [];
  chainCombo = 0;
  chainTimer = 0;
  maxChain = 0;
  boss = null;
  commRoom = null;
  exitDoor = null;
  stageComplete = false;
  stageCompleteTimer = 0;
  bossDefeated = false;
  bossWarning = 0;
  bossIntroPlayed = false;
  for (var k in activeBuffs) activeBuffs[k] = 0;

  var stage = STAGES[stageIdx];
  levelWidth = 2400 + stageIdx * 200;
  levelHeight = GH;

  // Ground
  platforms.push({ x: 0, y: levelHeight - 16, w: levelWidth, h: 16, type: 'ground' });

  // Starting platform
  platforms.push({ x: 0, y: levelHeight - 16, w: 120, h: 16, type: 'ground' });

  // Generate platforms with vertical sections requiring grapple
  var sections = 8 + stageIdx * 2;
  var sectionW = levelWidth / sections;

  for (var i = 1; i < sections; i++) {
    var sx = i * sectionW;
    var isVertical = i % 3 === 0;

    if (isVertical) {
      platforms[0] = null;
      platforms.push({ x: sx - 30, y: levelHeight - 100, w: 60, h: 12, type: 'platform' });
      platforms.push({ x: sx + 40, y: levelHeight - 160, w: 60, h: 12, type: 'platform' });
      platforms.push({ x: sx - 20, y: levelHeight - 220, w: 50, h: 12, type: 'platform' });
      grapplePoints.push({ x: sx + 20, y: levelHeight - 250, r: 6 });
      grapplePoints.push({ x: sx + 80, y: levelHeight - 200, r: 6 });
    } else {
      var numPlats = randInt(2, 4);
      for (var j = 0; j < numPlats; j++) {
        var px = sx + randRange(-sectionW * 0.3, sectionW * 0.3);
        var py = levelHeight - randRange(60, 240);
        var pw = randRange(40, 80);
        platforms.push({ x: px, y: py, w: pw, h: 12, type: 'platform' });
      }
      if (Math.random() > 0.4) {
        platforms.push({ x: sx - 40, y: 30 + randRange(0, 40), w: randRange(60, 140), h: 12, type: 'ceiling' });
      }
      if (Math.random() > 0.3) {
        grapplePoints.push({ x: sx + randRange(-40, 40), y: randRange(30, 120), r: 6 });
      }
    }
  }

  // Rebuild ground with gaps
  platforms = platforms.filter(function(p) { return p !== null; });
  var groundSegs = [];
  var gx = 0;
  for (var i = 0; i < sections; i++) {
    var sx = i * sectionW;
    if (i % 3 === 0 && i > 0) {
      if (gx < sx - 60) {
        groundSegs.push({ x: gx, y: levelHeight - 16, w: sx - 60 - gx, h: 16, type: 'ground' });
      }
      gx = sx + 60;
    }
  }
  if (gx < levelWidth) {
    groundSegs.push({ x: gx, y: levelHeight - 16, w: levelWidth - gx, h: 16, type: 'ground' });
  }
  platforms = platforms.filter(function(p) { return p.type !== 'ground'; });
  platforms.push.apply(platforms, groundSegs);

  // Walls and ceiling
  platforms.push({ x: -20, y: 0, w: 20, h: levelHeight, type: 'wall' });
  platforms.push({ x: levelWidth, y: 0, w: 20, h: levelHeight, type: 'wall' });
  platforms.push({ x: 0, y: -10, w: levelWidth, h: 10, type: 'ceiling' });

  // Enemies (PASS 2: Tasern themed enemy types)
  var numEnemies = stage.enemies;
  for (var i = 0; i < numEnemies; i++) {
    var ex = 200 + (levelWidth - 400) * (i / numEnemies) + randRange(-50, 50);
    var groundY = getGroundY(ex);
    var roll = Math.random();
    var etype;
    if (stageIdx >= 4 && roll > 0.85) etype = 'spore_mage';
    else if (roll > 0.7) etype = (Math.random() > 0.5 ? 'drone' : 'sniper');
    else if (stageIdx >= 2 && roll > 0.5) etype = 'myco_knight';
    else etype = 'soldier';
    enemies.push(createEnemy(ex, etype === 'drone' ? groundY - 80 : groundY - 20, etype));
  }

  // Turrets on some platforms
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    if (p.type === 'platform' && Math.random() > 0.8) {
      enemies.push(createEnemy(p.x + p.w / 2, p.y - 14, 'turret'));
    }
  }

  // Boss at end
  boss = createBoss(levelWidth - 200, levelHeight - 80, stage.boss);

  // Comm room (intel)
  if (!intelCollected.includes(stageIdx)) {
    var cx = levelWidth * 0.6 + randRange(-100, 100);
    commRoom = { x: cx, y: levelHeight - 60, w: 32, h: 44, collected: false };
  }

  // Exit door
  exitDoor = { x: levelWidth - 60, y: levelHeight - 56, w: 24, h: 40 };

  // Weapon pickups
  var weapons = ['spread', 'rapid', 'rocket', 'spore_shot'];
  for (var i = 0; i < 2; i++) {
    var px = randRange(300, levelWidth - 400);
    pickups.push({
      x: px, y: getGroundY(px) - 30, w: 16, h: 16,
      type: 'weapon', weapon: weapons[randInt(0, weapons.length - 1)], collected: false
    });
  }

  // Health pickups
  for (var i = 0; i < 3; i++) {
    var px = randRange(200, levelWidth - 200);
    pickups.push({ x: px, y: getGroundY(px) - 20, w: 12, h: 12, type: 'health', collected: false });
  }

  // Spawn hazards
  spawnStageHazards(stageIdx);

  // Player start
  player = createPlayer(60, levelHeight - 60);
  grapple = null;
  camera.x = 0;
  camera.y = 0;
}

function getGroundY(x) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'ground' && x >= p.x && x <= p.x + p.w) return p.y;
  }
  return levelHeight - 16;
}

// === ENEMIES (PASS 2: new Tasern types) ===
function createEnemy(x, y, type) {
  var hpMap = { soldier: 2, sniper: 2, drone: 1, turret: 4, myco_knight: 4, spore_mage: 3 };
  return {
    x: x, y: y,
    w: type === 'drone' ? 18 : (type === 'myco_knight' ? 20 : 16),
    h: type === 'drone' ? 14 : (type === 'myco_knight' ? 26 : 22),
    type: type, hp: hpMap[type] || 2,
    vx: type === 'soldier' || type === 'myco_knight' ? (Math.random() > 0.5 ? 1 : -1) * 30 : 0,
    vy: 0, facing: -1,
    shootTimer: randRange(1, 3), patrolTimer: 0,
    patrolDist: (type === 'soldier' || type === 'myco_knight') ? randRange(40, 100) : 0,
    startX: x, alive: true, hitFlash: 0,
    floatPhase: Math.random() * Math.PI * 2,
    sporeTimer: type === 'spore_mage' ? randRange(3, 6) : 0,
    shieldUp: type === 'myco_knight',
    chargeTimer: 0
  };
}

function createBoss(x, y, type) {
  var data = BOSS_DATA[type] || { hp: 20, name: 'Unknown', color: '#888', pattern: 'circle_spray' };
  var hp = Math.round(data.hp * (1 + currentStage * 0.05));  // Scale with stage
  return {
    x: x, y: y, w: 48, h: 56, type: type,
    hp: hp, maxHp: hp,
    vx: 0, vy: 0, phase: 0, timer: 0, shootTimer: 2,
    alive: true, hitFlash: 0, facing: -1, attackPattern: 0,
    name: data.name, color: data.color, pattern: data.pattern,
    enragePhase: false, spawnTimer: 0
  };
}

// === CORE PHYSICS ===
function updatePlayer(dt) {
  if (!player) return;
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  // CONTROL STANDARD (§7c): Arrows = MOVE/AIM only. WASD = action cluster
  // (W = fire tendril / aim up, S = shoot spores). Legacy keys kept as hidden alts.
  var left = keys['ArrowLeft'] || touch.left;
  var right = keys['ArrowRight'] || touch.right;
  // Up: ArrowUp aims/climbs; W also aims the tendril upward while firing it.
  var up = keys['ArrowUp'] || keys['KeyW'] || touch.up;
  var down = keys['ArrowDown'] || touch.down;  // crouch = ArrowDown only
  // Action cluster: W/Space (+ legacy Z) = grapple ; S/legacy X/C = shoot.
  var grappleBtn = keys['KeyW'] || keys['Space'] || keys['KeyZ'] || touch.a;
  var shootBtn = keys['KeyS'] || keys['KeyX'] || keys['KeyC'] || touch.b;

  if (left) player.facing = -1;
  if (right) player.facing = 1;

  player.crouching = down && player.grounded;

  var speedMult = activeBuffs.speed > 0 ? 1.5 : 1;  // Speed buff from mushroom

  if (!grapple || !grapple.attached) {
    if (!player.crouching) {
      if (left) player.vx = -PLAYER_SPEED * speedMult;
      else if (right) player.vx = PLAYER_SPEED * speedMult;
      else player.vx *= 0.85;
    } else {
      player.vx *= 0.9;
    }
    player.vy += GRAVITY * dt;
  }

  if (grappleBtn && !grapple && !player.crouching) fireGrapple();
  if (!grappleBtn && grapple && grapple.attached) releaseGrapple();

  // WIS: cooldown reduction on shooting
  var cooldownMult = WIS_COOLDOWN * (activeBuffs.burst > 0 ? 0.6 : 1);
  if (shootBtn && player.shootCooldown <= 0) fireWeapon();
  player.shootCooldown -= dt / cooldownMult;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Collision
  player.grounded = false;
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    if (!p || p.type === 'ceiling') continue;
    if (TAS.hit.rectOverlap(player.x - player.w / 2, player.y - player.h, player.w, player.h,
        p.x, p.y, p.w, p.h)) {
      var overlapBottom = (player.y) - p.y;
      var overlapTop = (p.y + p.h) - (player.y - player.h);
      var overlapLeft = (player.x + player.w / 2) - p.x;
      var overlapRight = (p.x + p.w) - (player.x - player.w / 2);
      var minOverlap = Math.min(overlapBottom, overlapTop, overlapLeft, overlapRight);

      if (minOverlap === overlapBottom && player.vy > 0) {
        player.y = p.y; player.vy = 0; player.grounded = true;
      } else if (minOverlap === overlapTop && player.vy < 0) {
        player.y = p.y + p.h + player.h; player.vy = 0;
      } else if (minOverlap === overlapLeft) {
        player.x = p.x - player.w / 2; player.vx = 0;
      } else if (minOverlap === overlapRight) {
        player.x = p.x + p.w + player.w / 2; player.vx = 0;
      }
    }
  }

  // Pit death
  if (player.y > levelHeight + 50) playerHit(maxHealth);

  // Clamp
  player.x = clamp(player.x, player.w / 2, levelWidth - player.w / 2);

  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.12) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }

  if (invincible > 0) invincible -= dt;
}

// === GRAPPLE PHYSICS ===
function fireGrapple() {
  var angle = player.facing > 0 ? -Math.PI / 4 : -Math.PI * 3 / 4;
  var up = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up;
  var finalAngle = up ? (player.facing > 0 ? -Math.PI / 3 : -Math.PI * 2 / 3) : angle;
  grapple = createGrapple(player.x, player.y - player.h * 0.7, finalAngle);
  TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06, 400);
}

function releaseGrapple() {
  if (grapple && grapple.attached) {
    var flingMultiplier = 1.4;
    player.vx = grapple.swingVel * Math.cos(grapple.swingAngle + Math.PI / 2) * flingMultiplier * grapple.ropeLen;
    player.vy = grapple.swingVel * Math.sin(grapple.swingAngle + Math.PI / 2) * flingMultiplier * grapple.ropeLen;
    player.vx = clamp(player.vx, -400, 400);
    player.vy = clamp(player.vy, -500, 200);
    TAS.audio.playTone(400, 0.08, 'sine', 0.05, 200);
  }
  grapple = null;
}

function updateGrapple(dt) {
  if (!grapple) return;

  if (grapple.extending) {
    grapple.tipX += Math.cos(grapple.angle) * GRAPPLE_SPEED * dt;
    grapple.tipY += Math.sin(grapple.angle) * GRAPPLE_SPEED * dt;
    grapple.length = dist(player.x, player.y - player.h * 0.7, grapple.tipX, grapple.tipY);

    var attached = false;

    for (var gi = 0; gi < grapplePoints.length; gi++) {
      var gp = grapplePoints[gi];
      if (dist(grapple.tipX, grapple.tipY, gp.x, gp.y) < gp.r + 8) {
        grapple.attachX = gp.x; grapple.attachY = gp.y;
        attached = true; break;
      }
    }

    if (!attached) {
      for (var pi = 0; pi < platforms.length; pi++) {
        var p = platforms[pi];
        if (!p) continue;
        if (TAS.hit.pointInRect(grapple.tipX, grapple.tipY, p.x, p.y, p.w, p.h)) {
          grapple.attachX = grapple.tipX;
          grapple.attachY = p.y + (p.type === 'ceiling' ? p.h : 0);
          attached = true; break;
        }
      }
    }

    // Grapple stun enemies
    if (!attached) {
      for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(grapple.tipX - 4, grapple.tipY - 4, 8, 8,
            e.x - e.w / 2, e.y - e.h, e.w, e.h)) {
          e.vx = (player.x - e.x) * 3;
          var grappleDmg = Math.round(1 * STR_MULT);  // STR: grapple damage
          e.hp -= grappleDmg;
          if (e.hp <= 0) killEnemy(e);
          grapple = null; return;
        }
      }
    }

    if (attached) {
      grapple.attached = true; grapple.extending = false;
      grapple.ropeLen = dist(player.x, player.y - player.h * 0.5, grapple.attachX, grapple.attachY);
      grapple.swingAngle = Math.atan2(player.y - player.h * 0.5 - grapple.attachY, player.x - grapple.attachX);
      grapple.swingVel = 0;
      TAS.audio.playTone(600, 0.05, 'sine', 0.08);
    }

    if (grapple && grapple.length > grapple.maxLength) { grapple = null; return; }
  }

  if (grapple && grapple.attached) {
    var keys = TAS.input.keys;
    var touch = TAS.input.touch;
    var left = keys['ArrowLeft'] || touch.left;
    var right = keys['ArrowRight'] || touch.right;
    var up = keys['ArrowUp'] || keys['KeyW'] || touch.up;

    var gravEffect = GRAVITY * Math.cos(grapple.swingAngle) / grapple.ropeLen;
    grapple.swingVel += gravEffect * dt;

    if (left) grapple.swingVel -= SWING_FORCE / grapple.ropeLen * dt;
    if (right) grapple.swingVel += SWING_FORCE / grapple.ropeLen * dt;

    if (up && grapple.ropeLen > 30) grapple.ropeLen -= 100 * dt;

    grapple.swingVel *= 0.995;
    grapple.swingAngle += grapple.swingVel * dt;

    player.x = grapple.attachX + Math.cos(grapple.swingAngle) * grapple.ropeLen;
    player.y = grapple.attachY + Math.sin(grapple.swingAngle) * grapple.ropeLen + player.h * 0.5;
    player.vx = grapple.swingVel * Math.cos(grapple.swingAngle + Math.PI / 2) * grapple.ropeLen * 0.5;
    player.vy = grapple.swingVel * Math.sin(grapple.swingAngle + Math.PI / 2) * grapple.ropeLen * 0.5;
    player.grounded = false;

    if (grapple.swingVel > 0.2) player.facing = 1;
    else if (grapple.swingVel < -0.2) player.facing = -1;
  }

  if (grapple) {
    grapple.timer += dt;
    grapple.segments = [];
    var startX = player.x;
    var startY = player.y - player.h * 0.7;
    var endX = grapple.attached ? grapple.attachX : grapple.tipX;
    var endY = grapple.attached ? grapple.attachY : grapple.tipY;

    for (var i = 0; i <= TENDRIL_SEG; i++) {
      var t = i / TENDRIL_SEG;
      var segX = lerp(startX, endX, t);
      var segY = lerp(startY, endY, t);
      var wave = Math.sin(t * Math.PI * 3 + grapple.timer * 8) * (1 - t) * 4;
      var perpX = -(endY - startY);
      var perpY = (endX - startX);
      var perpLen = Math.sqrt(perpX * perpX + perpY * perpY) || 1;
      grapple.segments.push({ x: segX + (perpX / perpLen) * wave, y: segY + (perpY / perpLen) * wave });
    }
  }
}

// === WEAPONS (PASS 2: new spore_shot weapon) ===
function fireWeapon() {
  var bx = player.x + player.facing * 10;
  var by = player.y - player.h * 0.5;
  var dmgMult = STR_MULT * (activeBuffs.burst > 0 ? 1.5 : 1);  // STR + burst buff

  switch (weapon) {
    case 'normal':
      playerBullets.push({ x: bx, y: by, vx: player.facing * BULLET_SPEED, vy: 0,
        dmg: Math.round(1 * dmgMult), size: 3 });
      player.shootCooldown = 0.25;
      TAS.audio.playTone(300, 0.05, 'square', 0.06, 100);
      break;
    case 'rapid':
      playerBullets.push({ x: bx, y: by, vx: player.facing * BULLET_SPEED * 1.2, vy: 0,
        dmg: Math.round(1 * dmgMult), size: 2 });
      player.shootCooldown = 0.1;
      TAS.audio.playTone(400, 0.03, 'square', 0.04, 200);
      if (weaponAmmo > 0) weaponAmmo--;
      if (weaponAmmo === 0) { weapon = 'normal'; weaponAmmo = -1; }
      break;
    case 'spread':
      for (var si = -1; si <= 1; si++) {
        var angle = si * 0.25;
        playerBullets.push({
          x: bx, y: by,
          vx: Math.cos(angle) * player.facing * BULLET_SPEED,
          vy: Math.sin(angle) * BULLET_SPEED * 0.5,
          dmg: Math.round(1 * dmgMult), size: 3
        });
      }
      player.shootCooldown = 0.3;
      TAS.audio.playTone(250, 0.08, 'sawtooth', 0.06, 150);
      if (weaponAmmo > 0) weaponAmmo--;
      if (weaponAmmo === 0) { weapon = 'normal'; weaponAmmo = -1; }
      break;
    case 'rocket':
      playerBullets.push({ x: bx, y: by, vx: player.facing * BULLET_SPEED * 0.7, vy: 0,
        dmg: Math.round(EXPLOSION_DAMAGE * dmgMult), size: 6, rocket: true });  // STR: rocket damage
      player.shootCooldown = 0.6;
      TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 80);
      if (weaponAmmo > 0) weaponAmmo--;
      if (weaponAmmo === 0) { weapon = 'normal'; weaponAmmo = -1; }
      break;
    case 'spore_shot':
      playerBullets.push({ x: bx, y: by, vx: player.facing * BULLET_SPEED * 0.8, vy: 0,
        dmg: Math.round(2 * dmgMult), size: 5, spore: true });
      player.shootCooldown = 0.4;
      TAS.audio.playTone(180, 0.1, 'sine', 0.07, 120);
      if (weaponAmmo > 0) weaponAmmo--;
      if (weaponAmmo === 0) { weapon = 'normal'; weaponAmmo = -1; }
      break;
  }
}

// === ENEMY UPDATE (PASS 2: new enemy types) ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;

    e.hitFlash = Math.max(0, e.hitFlash - dt * 5);

    switch (e.type) {
      case 'soldier':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx *= -1; e.facing = e.vx > 0 ? 1 : -1;
        }
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && Math.abs(e.x - player.x) < 200) {
          var dir = player.x > e.x ? 1 : -1;
          bullets.push({ x: e.x + dir * 10, y: e.y - e.h * 0.4, vx: dir * 180, vy: 0, size: 3 });
          e.shootTimer = randRange(1.5, 3); e.facing = dir;
        }
        break;

      case 'sniper':
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && Math.abs(e.x - player.x) < 350) {
          var dx = player.x - e.x, dy = (player.y - player.h / 2) - (e.y - e.h / 2);
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({ x: e.x, y: e.y - e.h * 0.4, vx: dx / d * 220, vy: dy / d * 220, size: 2 });
          e.shootTimer = randRange(2, 4);
        }
        break;

      case 'drone':
        e.floatPhase += dt * 3;
        e.y += Math.sin(e.floatPhase) * 0.5;
        if (Math.abs(e.x - player.x) < 250) e.x += (player.x > e.x ? 1 : -1) * 40 * dt;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && Math.abs(e.x - player.x) < 200) {
          bullets.push({ x: e.x, y: e.y + 8, vx: 0, vy: 150, size: 3 });
          e.shootTimer = randRange(1, 2.5);
        }
        break;

      case 'turret':
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && Math.abs(e.x - player.x) < 300) {
          var dx = player.x - e.x, dy = (player.y - player.h / 2) - e.y;
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({ x: e.x, y: e.y, vx: dx / d * 200, vy: dy / d * 200, size: 4 });
          e.shootTimer = randRange(1.5, 2.5);
        }
        break;

      case 'myco_knight':
        // Charges at player, shield blocks frontal damage
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx *= -1; e.facing = e.vx > 0 ? 1 : -1;
        }
        if (Math.abs(e.x - player.x) < 120) {
          e.chargeTimer += dt;
          if (e.chargeTimer > 1) {
            e.vx = (player.x > e.x ? 1 : -1) * 120;
            e.facing = e.vx > 0 ? 1 : -1;
            e.chargeTimer = 0;
          }
        }
        break;

      case 'spore_mage':
        e.floatPhase += dt * 2;
        e.y += Math.sin(e.floatPhase) * 0.3;
        e.sporeTimer -= dt;
        if (e.sporeTimer <= 0 && Math.abs(e.x - player.x) < 250) {
          spawnSporeCloud(player.x + randRange(-30, 30), player.y, 'poison');
          e.sporeTimer = randRange(3, 5);
          TAS.audio.playTone(120, 0.15, 'sine', 0.04);
        }
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && Math.abs(e.x - player.x) < 200) {
          var dx = player.x - e.x, dy = player.y - e.y;
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({ x: e.x, y: e.y, vx: dx / d * 140, vy: dy / d * 140, size: 4, spore: true });
          e.shootTimer = randRange(2, 4);
        }
        break;
    }

    // Contact damage
    if (invincible <= 0 && e.alive && TAS.hit.rectOverlap(
      player.x - player.w / 2, player.y - player.h, player.w, player.h,
      e.x - e.w / 2, e.y - e.h, e.w, e.h)) {
      playerHit(1);
    }
  }
}

// === BOSS UPDATE (PASS 2: unique boss patterns) ===
function updateBoss(dt) {
  if (!boss || !boss.alive) return;

  // Boss warning when player approaches
  if (!bossIntroPlayed && player && player.x > levelWidth - 400) {
    bossWarning = 2;
    bossIntroPlayed = true;
    TAS.audio.playTone(80, 0.3, 'sawtooth', 0.08, 40);
    TAS.fx.shake(4, 0.9);
  }

  boss.hitFlash = Math.max(0, boss.hitFlash - dt * 5);
  boss.timer += dt;
  boss.shootTimer -= dt;

  // Enrage at 30% HP
  if (!boss.enragePhase && boss.hp < boss.maxHp * 0.3) {
    boss.enragePhase = true;
    TAS.fx.flash('#ff440044', 0.5);
    TAS.audio.playTone(60, 0.4, 'sawtooth', 0.1, 30);
    addScorePopup(boss.x, boss.y - boss.h, 'ENRAGED!', '#e6482e');
  }

  // Movement
  boss.phase += dt * (boss.enragePhase ? 2.2 : 1.5);
  boss.x += Math.sin(boss.phase) * 60 * dt;
  boss.y += Math.cos(boss.phase * 0.7) * 20 * dt;
  boss.y = clamp(boss.y, levelHeight - 200, levelHeight - 50);

  var fireRate = boss.enragePhase ? 0.8 : 1.5;

  // Attack patterns based on boss type
  if (boss.shootTimer <= 0) {
    boss.attackPattern = (boss.attackPattern + 1) % 4;

    var pattern = boss.pattern;
    if (pattern === 'all_patterns') pattern = ['circle_spray', 'aimed_volley', 'pulse_ring', 'spiral'][boss.attackPattern];

    switch (pattern) {
      case 'circle_spray':
        for (var bi = 0; bi < 6; bi++) {
          var a = (Math.PI * 2 / 6) * bi + boss.timer;
          bullets.push({ x: boss.x, y: boss.y - 10, vx: Math.cos(a) * 140, vy: Math.sin(a) * 140, size: 4 });
        }
        break;
      case 'aimed_volley':
        for (var bi = 0; bi < 3; bi++) {
          var dx = player.x - boss.x + randRange(-30, 30);
          var dy = player.y - boss.y + randRange(-20, 20);
          var d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({ x: boss.x, y: boss.y, vx: dx / d * 200, vy: dy / d * 200, size: 5 });
        }
        break;
      case 'pulse_ring':
        for (var bi = 0; bi < 12; bi++) {
          var a = (Math.PI * 2 / 12) * bi;
          bullets.push({ x: boss.x, y: boss.y - boss.h / 2, vx: Math.cos(a) * 120, vy: Math.sin(a) * 120, size: 3 });
        }
        break;
      case 'rain_drop':
        for (var bi = 0; bi < 5; bi++) {
          bullets.push({ x: boss.x + randRange(-40, 40), y: boss.y - boss.h, vx: randRange(-20, 20), vy: 180, size: 4 });
        }
        break;
      case 'ground_pound':
        if (boss.attackPattern % 2 === 0) {
          TAS.fx.shake(6, 0.9);
          for (var bi = -3; bi <= 3; bi++) {
            bullets.push({ x: boss.x + bi * 30, y: levelHeight - 30, vx: bi * 40, vy: -120, size: 5 });
          }
        }
        break;
      case 'spiral':
        for (var bi = 0; bi < 4; bi++) {
          var a = boss.timer * 2 + bi * Math.PI / 2;
          bullets.push({ x: boss.x, y: boss.y - 20, vx: Math.cos(a) * 160, vy: Math.sin(a) * 160, size: 4 });
        }
        break;
      case 'train_rush':
        boss.vx = player.x > boss.x ? 150 : -150;
        for (var bi = 0; bi < 4; bi++) {
          bullets.push({ x: boss.x + randRange(-20, 20), y: boss.y - boss.h + bi * 15,
            vx: boss.vx > 0 ? -120 : 120, vy: 0, size: 4 });
        }
        break;
      default:
        for (var bi = -1; bi <= 1; bi++) {
          bullets.push({ x: boss.x, y: boss.y - 10, vx: -180 + bi * 20, vy: bi * 60, size: 5 });
        }
    }
    boss.shootTimer = fireRate;
    TAS.audio.playTone(100, 0.1, 'sawtooth', 0.04);
  }

  // Boss spawns minions in enrage
  if (boss.enragePhase) {
    boss.spawnTimer -= dt;
    if (boss.spawnTimer <= 0) {
      enemies.push(createEnemy(boss.x + randRange(-40, 40), boss.y - 30, 'drone'));
      boss.spawnTimer = 4;
    }
  }

  // Contact damage
  if (invincible <= 0 && TAS.hit.rectOverlap(
    player.x - player.w / 2, player.y - player.h, player.w, player.h,
    boss.x - boss.w / 2, boss.y - boss.h, boss.w, boss.h)) {
    playerHit(2);
  }
}

// === BULLET UPDATE ===
function updateBullets(dt) {
  // Player bullets
  for (var i = playerBullets.length - 1; i >= 0; i--) {
    var b = playerBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    if (b.x < camera.x - 20 || b.x > camera.x + GW + 20 || b.y < -20 || b.y > GH + 20) {
      playerBullets.splice(i, 1); continue;
    }

    var hit = false;
    for (var ei = 0; ei < enemies.length; ei++) {
      var e = enemies[ei];
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2,
          e.x - e.w / 2, e.y - e.h, e.w, e.h)) {
        // Myco knight: shield blocks frontal hits
        if (e.type === 'myco_knight' && e.shieldUp) {
          var fromFront = (b.vx > 0 && e.facing === -1) || (b.vx < 0 && e.facing === 1);
          if (fromFront) {
            TAS.audio.playTone(500, 0.05, 'sine', 0.03);
            TAS.particles.spawn(b.x, b.y, '#aaccff', 3, 1);
            hit = true; break;
          }
        }
        e.hp -= b.dmg; e.hitFlash = 1;
        if (e.hp <= 0) killEnemy(e);
        hit = true;
        if (b.rocket) {
          // STR: explosion radius and damage to nearby enemies
          TAS.particles.spawn(b.x, b.y, '#ff6622', 14, 5, { gravity: 1 });
          TAS.fx.shake(3, 0.85);
          // Area damage
          for (var ej = 0; ej < enemies.length; ej++) {
            var e2 = enemies[ej];
            if (!e2.alive || e2 === e) continue;
            if (dist(b.x, b.y, e2.x, e2.y) < EXPLOSION_RADIUS) {
              e2.hp -= Math.round(b.dmg * 0.5);
              e2.hitFlash = 1;
              if (e2.hp <= 0) killEnemy(e2);
            }
          }
        }
        if (b.spore) {
          spawnSporeCloud(b.x, b.y, 'slow');
          TAS.particles.spawn(b.x, b.y, '#38d973', 8, 3);
        }
        break;
      }
    }

    // Hit boss
    if (!hit && boss && boss.alive) {
      if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2,
          boss.x - boss.w / 2, boss.y - boss.h, boss.w, boss.h)) {
        boss.hp -= b.dmg; boss.hitFlash = 1; hit = true;
        if (b.rocket) {
          TAS.particles.spawn(b.x, b.y, '#ff6622', 14, 5, { gravity: 1 });
          TAS.fx.shake(4, 0.85);
        }
        if (b.spore) {
          spawnSporeCloud(b.x, b.y, 'slow');
        }
        if (boss.hp <= 0) killBoss();
      }
    }

    // Hit platforms
    if (!hit) {
      for (var pi = 0; pi < platforms.length; pi++) {
        if (TAS.hit.pointInRect(b.x, b.y, platforms[pi].x, platforms[pi].y, platforms[pi].w, platforms[pi].h)) {
          hit = true;
          if (b.rocket) TAS.particles.spawn(b.x, b.y, '#ff6622', 8, 3, { gravity: 1 });
          if (b.spore) spawnSporeCloud(b.x, b.y, 'slow');
          break;
        }
      }
    }

    if (hit) playerBullets.splice(i, 1);
  }

  // Enemy bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    if (b.x < camera.x - 50 || b.x > camera.x + GW + 50 || b.y < -50 || b.y > GH + 50) {
      bullets.splice(i, 1); continue;
    }

    if (invincible <= 0) {
      var ph = player.crouching ? player.h * 0.5 : player.h;
      if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2,
          player.x - player.w / 2, player.y - ph, player.w, ph)) {
        playerHit(1);
        bullets.splice(i, 1); continue;
      }
    }

    for (var pi = 0; pi < platforms.length; pi++) {
      if (TAS.hit.pointInRect(b.x, b.y, platforms[pi].x, platforms[pi].y, platforms[pi].w, platforms[pi].h)) {
        bullets.splice(i, 1); break;
      }
    }
  }
}

// === DAMAGE ===
function playerHit(dmg) {
  if (invincible > 0) return;
  health -= dmg;
  invincible = 1.5;
  damageFlash = 0.3;
  TAS.fx.shake(6, 0.8);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.1, 50);
  TAS.particles.spawn(player.x, player.y - player.h / 2, '#e6482e', 6, 3);

  if (health <= 0) {
    lives--;
    if (lives <= 0) {
      gameOver();
    } else {
      health = maxHealth;  // CON: max health
      player.x = 60; player.y = levelHeight - 60;
      player.vx = 0; player.vy = 0;
      grapple = null;
      invincible = 3;
    }
  }
}

function killEnemy(e) {
  e.alive = false;
  var baseScore = { drone: 50, sniper: 100, turret: 150, soldier: 75, myco_knight: 125, spore_mage: 150 };
  var pts = baseScore[e.type] || 75;
  var scoreMult = INT_SCORE_MULT * (activeBuffs.score > 0 ? 2 : 1);  // INT + score buff
  var finalPts = Math.round(pts * scoreMult);
  score += finalPts;
  addScorePopup(e.x, e.y - e.h, '+' + finalPts, '#f4b41b');
  addChainKill();
  TAS.particles.spawn(e.x, e.y - e.h / 2, '#38d973', 10, 3, { gravity: 2 });
  TAS.audio.playTone(200, 0.15, 'square', 0.06, 80);
  // CHA: mushroom drop chance
  spawnMushroomDrop(e.x, e.y);
}

function killBoss() {
  boss.alive = false;
  bossDefeated = true;
  var bossScore = Math.round(1000 * INT_SCORE_MULT * (1 + currentStage * 0.2));  // INT: boss score
  score += bossScore;
  addScorePopup(boss.x, boss.y - boss.h, '+' + bossScore, '#38d973');
  addScorePopup(boss.x, boss.y - boss.h - 20, boss.name + ' PURGED!', '#f4b41b');
  TAS.particles.spawn(boss.x, boss.y - boss.h / 2, '#38d973', 30, 6, { gravity: 1 });
  TAS.particles.spawn(boss.x, boss.y - boss.h / 2, '#a855f7', 25, 5, { gravity: 2 });
  TAS.particles.spawn(boss.x - 20, boss.y - boss.h / 3, PLAYER_COLOR, 15, 4, { gravity: 1 });
  TAS.fx.shake(12, 0.92);
  TAS.fx.flash('#ffffff', 0.6);
  TAS.audio.playTone(150, 0.4, 'sawtooth', 0.12, 40);
  stageComplete = true;
  stageCompleteTimer = 3;
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('chain_reaction_hi', highScore);
  }
  saveGame();
}

// === PICKUPS ===
function updatePickups(dt) {
  for (var pi = 0; pi < pickups.length; pi++) {
    var p = pickups[pi];
    if (p.collected) continue;
    if (TAS.hit.rectOverlap(player.x - player.w / 2, player.y - player.h, player.w, player.h,
        p.x - p.w / 2, p.y - p.h / 2, p.w, p.h)) {
      p.collected = true;
      if (p.type === 'weapon') {
        weapon = p.weapon;
        weaponAmmo = p.weapon === 'rapid' ? 40 : (p.weapon === 'spread' ? 20 : (p.weapon === 'spore_shot' ? 15 : 10));
        TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.12]], 80);
        addScorePopup(p.x, p.y - 20, p.weapon.toUpperCase(), '#f4b41b');
      } else if (p.type === 'health') {
        health = Math.min(maxHealth, health + 2);  // CON: max health cap
        TAS.audio.playTone(600, 0.1, 'sine', 0.06);
        addScorePopup(p.x, p.y - 20, '+2 HP', '#38d973');
      }
      TAS.particles.spawn(p.x, p.y, '#38d973', 6, 2);
    }
  }

  // Comm room
  if (commRoom && !commRoom.collected) {
    if (TAS.hit.rectOverlap(player.x - player.w / 2, player.y - player.h, player.w, player.h,
        commRoom.x, commRoom.y - commRoom.h, commRoom.w, commRoom.h)) {
      commRoom.collected = true;
      if (!intelCollected.includes(currentStage)) intelCollected.push(currentStage);
      var intelScore = Math.round(500 * INT_SCORE_MULT);  // INT: intel score
      score += intelScore;
      addScorePopup(commRoom.x + 16, commRoom.y - 22, 'SEED DATA +' + intelScore, '#88ccff');
      TAS.audio.playMelody([[330, 0.1], [440, 0.1], [550, 0.1], [660, 0.15]], 100);
      TAS.particles.spawn(commRoom.x + 16, commRoom.y - 22, '#88ccff', 15, 3);
    }
  }

  if (exitDoor && bossDefeated) {
    if (TAS.hit.rectOverlap(player.x - player.w / 2, player.y - player.h, player.w, player.h,
        exitDoor.x, exitDoor.y, exitDoor.w, exitDoor.h)) {
      completeStage();
    }
  }
}

function completeStage() {
  if (!stagesCleared.includes(currentStage)) stagesCleared.push(currentStage);
  saveGame();
  state = 'stageComplete';
  stageCompleteTimer = 3;
  TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 120);
}

// === CAMERA ===
function updateCamera(dt) {
  var targetX = player.x - GW / 2;
  var targetY = player.y - GH * 0.6;
  camera.x = lerp(camera.x, clamp(targetX, 0, levelWidth - GW), 4 * dt);
  camera.y = lerp(camera.y, clamp(targetY, 0, levelHeight - GH), 4 * dt);
}

// === MAP SCREEN ===
var mapCursor = 0;
var mapInputCooldown = 0;

function drawMap() {
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, GW, GH);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = PLAYER_COLOR;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SPORE CHAIN - GARDEN SELECT', GW / 2, 24);

  // Baseling info
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText(BASELING_NAME + ' Lv.' + BASELING_LEVEL, GW / 2, 38);

  // Intel counter
  ctx.fillStyle = '#88ccff';
  ctx.font = '10px monospace';
  ctx.fillText('SEED DATA: ' + intelCollected.length + '/8', GW / 2, 50);

  // Stage nodes
  var cols = 4, rows = 2;
  var startX = 60, startY = 70;
  var spacingX = 100, spacingY = 100;

  for (var i = 0; i < 8; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var x = startX + col * spacingX;
    var y = startY + row * spacingY;

    var cleared = stagesCleared.includes(i);
    var locked = i === 7 && intelCollected.length < 7;
    var selected = i === mapCursor;
    var pal = ZONE_PALETTES[STAGES[i].zone] || ZONE_PALETTES.forest;

    ctx.fillStyle = locked ? '#222' : (cleared ? '#112211' : '#151520');
    ctx.strokeStyle = selected ? '#f4b41b' : (cleared ? pal.glow : '#334');
    ctx.lineWidth = selected ? 3 : 1;
    ctx.fillRect(x - 42, y - 22, 84, 44);
    ctx.strokeRect(x - 42, y - 22, 84, 44);

    // Zone color pip
    if (!locked) {
      ctx.fillStyle = pal.glow;
      ctx.fillRect(x - 38, y - 18, 4, 4);
    }

    ctx.fillStyle = locked ? '#444' : (selected ? '#fff' : '#99aabb');
    ctx.font = '8px monospace';
    ctx.fillText(STAGES[i].name, x, y - 4);

    if (cleared) {
      ctx.fillStyle = '#38d973';
      ctx.font = '8px monospace';
      ctx.fillText('CLEARED', x, y + 12);
    } else if (locked) {
      ctx.fillStyle = '#e6482e';
      ctx.font = '8px monospace';
      ctx.fillText('LOCKED', x, y + 12);
    }

    if (intelCollected.includes(i)) {
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(x + 30, y - 18, 6, 6);
    }
  }

  // Stage description
  if (mapCursor >= 0 && mapCursor < STAGES.length) {
    ctx.fillStyle = '#556';
    ctx.font = '8px monospace';
    ctx.fillText(STAGES[mapCursor].desc, GW / 2, GH - 36);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('ARROWS SELECT - SPORE TO ENTER', GW / 2, GH - 20);
  ctx.globalAlpha = 1;

  // Stats bar
  ctx.textAlign = 'left';
  ctx.fillStyle = '#777';
  ctx.font = '8px monospace';
  ctx.fillText('WPN:' + weapon.toUpperCase() + (weaponAmmo > 0 ? '[' + weaponAmmo + ']' : ''), 8, GH - 6);
  ctx.textAlign = 'right';
  ctx.fillText('LIVES:' + lives + ' HP:' + health + '/' + maxHealth, GW - 8, GH - 6);
}

function updateMap(dt) {
  mapInputCooldown -= dt;
  if (mapInputCooldown > 0) return;

  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  if (keys['ArrowRight'] || touch.right) {
    mapCursor = Math.min(7, mapCursor + 1); mapInputCooldown = 0.2;
    TAS.audio.playTone(400, 0.04, 'square', 0.04);
  }
  if (keys['ArrowLeft'] || touch.left) {
    mapCursor = Math.max(0, mapCursor - 1); mapInputCooldown = 0.2;
    TAS.audio.playTone(400, 0.04, 'square', 0.04);
  }
  if (keys['ArrowDown'] || touch.down) {
    mapCursor = Math.min(7, mapCursor + 4); mapInputCooldown = 0.2;
    TAS.audio.playTone(400, 0.04, 'square', 0.04);
  }
  if (keys['ArrowUp'] || touch.up) {
    mapCursor = Math.max(0, mapCursor - 4); mapInputCooldown = 0.2;
    TAS.audio.playTone(400, 0.04, 'square', 0.04);
  }

  if (keys['KeyW'] || keys['KeyS'] || keys['KeyZ'] || keys['Space'] || keys['Enter'] || touch.a || keys['KeyX'] || touch.b) {
    var locked = mapCursor === 7 && intelCollected.length < 7;
    if (!locked) {
      currentStage = mapCursor;
      health = maxHealth;
      generateLevel(currentStage);
      state = 'playing';
      TAS.audio.playTone(600, 0.1, 'sine', 0.06, 800);
    } else {
      TAS.audio.playTone(100, 0.2, 'square', 0.05);
    }
    mapInputCooldown = 0.3;
  }
}

// === TUTORIAL (PASS 3) ===
function drawTutorial() {
  if (tutorialShown || currentStage !== 0 || !player) return;
  if (player.x > 400) { tutorialShown = true; saveGame(); return; }

  tutorialTimer += 0.016;
  var step = Math.floor(tutorialTimer / 3) % 4;
  var alpha = 0.85;

  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#000000bb';
  ctx.fillRect(GW / 2 - 140, 30, 280, 50);
  ctx.strokeStyle = PLAYER_COLOR;
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 140, 30, 280, 50);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';

  var msgs = [
    ['ARROWS to move + aim', 'Your baseling is clearing the garden!'],
    ['W/SPACE to fire tendril', 'No jump -- tendril is your way up!'],
    ['S to shoot spores', 'Collect seed drops and POOP catalysts'],
    ['Chain kills for bonus score!', 'Find SEED DATA in each garden']
  ];
  ctx.fillText(msgs[step][0], GW / 2, 50);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText(msgs[step][1], GW / 2, 64);
  ctx.globalAlpha = 1;
}

// === DRAWING (PASS 3: themed zones + pixel art) ===
function drawBackground() {
  var stage = STAGES[currentStage];
  var pal = ZONE_PALETTES[stage.zone] || ZONE_PALETTES.forest;

  ctx.fillStyle = pal.sky;
  ctx.fillRect(0, 0, GW, GH);

  // Zone-specific background elements
  var parallax = camera.x * 0.3;
  ctx.fillStyle = stage.accent + '18';

  if (stage.zone === 'forest' || stage.zone === 'swamp') {
    // Trees / mushroom stalks
    for (var i = 0; i < 12; i++) {
      var bx = (i * 120 - parallax % 120);
      var bh = 50 + (i * 37 % 70);
      ctx.fillRect(bx + 10, GH - 16 - bh - (camera.y * 0.2), 10, bh);
      // Mushroom cap
      ctx.fillStyle = stage.accent + '22';
      ctx.beginPath();
      ctx.arc(bx + 15, GH - 16 - bh - (camera.y * 0.2), 18 + (i % 3) * 5, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = stage.accent + '18';
    }
  } else if (stage.zone === 'cave' || stage.zone === 'core') {
    // Stalactites
    for (var i = 0; i < 15; i++) {
      var bx = (i * 90 - parallax % 90);
      var bh = 20 + (i * 41 % 50);
      ctx.beginPath();
      ctx.moveTo(bx, 0);
      ctx.lineTo(bx + 8, bh);
      ctx.lineTo(bx + 16, 0);
      ctx.fill();
    }
    // Glowing dots
    ctx.fillStyle = pal.glow + '33';
    for (var i = 0; i < 8; i++) {
      var gx = (i * 140 + frame * 0.2) % (GW + 40) - 20;
      var gy = 40 + Math.sin(frame * 0.02 + i) * 20 + (i * 47 % 80);
      ctx.beginPath(); ctx.arc(gx, gy, 2, 0, Math.PI * 2); ctx.fill();
    }
  } else if (stage.zone === 'mountain' || stage.zone === 'train') {
    // Mountain/gear shapes
    var p2 = camera.x * 0.15;
    ctx.fillStyle = stage.ground + '44';
    for (var i = 0; i < 8; i++) {
      var bx = (i * 180 - p2 % 180);
      ctx.beginPath();
      ctx.moveTo(bx, GH);
      ctx.lineTo(bx + 40, GH - 80 - (i * 23 % 50));
      ctx.lineTo(bx + 90, GH);
      ctx.fill();
    }
  } else if (stage.zone === 'sky') {
    // Floating shelf fungi
    for (var i = 0; i < 6; i++) {
      var bx = (i * 160 - parallax * 0.5 % 160);
      var by = 60 + (i * 53 % 100);
      ctx.fillStyle = stage.accent + '1a';
      ctx.fillRect(bx, by, 50 + (i % 3) * 20, 8);
      ctx.fillStyle = stage.accent + '10';
      ctx.fillRect(bx + 5, by + 8, 40 + (i % 3) * 15, 4);
    }
  } else if (stage.zone === 'psychic') {
    // Wavy psychic lines
    ctx.strokeStyle = pal.glow + '22';
    ctx.lineWidth = 1;
    for (var i = 0; i < 5; i++) {
      ctx.beginPath();
      for (var j = 0; j < GW; j += 4) {
        var wy = GH / 2 + Math.sin(j * 0.02 + frame * 0.03 + i * 1.5) * (40 + i * 15);
        if (j === 0) ctx.moveTo(j, wy); else ctx.lineTo(j, wy);
      }
      ctx.stroke();
    }
  }
}

function drawPlatforms() {
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    if (!p) continue;
    if (p.x + p.w < camera.x || p.x > camera.x + GW) continue;
    if (p.y + p.h < camera.y || p.y > camera.y + GH) continue;

    var sx = p.x - camera.x;
    var sy = p.y - camera.y;
    var stage = STAGES[currentStage];
    var pal = ZONE_PALETTES[stage.zone] || ZONE_PALETTES.forest;

    if (p.type === 'ground') {
      ctx.fillStyle = stage.ground;
      ctx.fillRect(sx, sy, p.w, p.h);
      ctx.fillStyle = pal.glow + '66';
      ctx.fillRect(sx, sy, p.w, 2);
      // Mycelium texture
      ctx.fillStyle = stage.ground + 'cc';
      for (var ti = 0; ti < p.w; ti += 8) {
        if ((ti + Math.floor(p.x)) % 16 < 8) ctx.fillRect(sx + ti, sy + 4, 4, 3);
      }
      // Tiny mushrooms growing on ground
      if (stage.zone === 'forest' || stage.zone === 'swamp') {
        ctx.fillStyle = pal.glow + '44';
        for (var ti = 0; ti < p.w; ti += 24) {
          var mh = 3 + (ti * 7 % 4);
          ctx.fillRect(sx + ti + 8, sy - mh, 2, mh);
          ctx.beginPath();
          ctx.arc(sx + ti + 9, sy - mh, 3, Math.PI, 0);
          ctx.fill();
        }
      }
    } else if (p.type === 'platform') {
      ctx.fillStyle = pal.plat;
      ctx.fillRect(sx, sy, p.w, p.h);
      ctx.fillStyle = pal.glow + '55';
      ctx.fillRect(sx, sy, p.w, 2);
      // Supports (organic vines/roots)
      ctx.fillStyle = pal.plat + 'aa';
      ctx.fillRect(sx + 4, sy + p.h, 2, 8);
      ctx.fillRect(sx + p.w - 6, sy + p.h, 2, 8);
    } else if (p.type === 'ceiling') {
      ctx.fillStyle = '#333344';
      ctx.fillRect(sx, sy, p.w, p.h);
      ctx.fillStyle = '#444466';
      ctx.fillRect(sx, sy + p.h - 2, p.w, 2);
    } else if (p.type === 'wall') {
      ctx.fillStyle = '#222233';
      ctx.fillRect(sx, sy, p.w, p.h);
    }
  }
}

function drawGrapplePoints() {
  for (var gi = 0; gi < grapplePoints.length; gi++) {
    var gp = grapplePoints[gi];
    if (gp.x < camera.x - 20 || gp.x > camera.x + GW + 20) continue;
    var sx = gp.x - camera.x;
    var sy = gp.y - camera.y;

    var pulse = Math.sin(frame * 0.08) * 2;
    ctx.fillStyle = PLAYER_COLOR;
    ctx.beginPath(); ctx.arc(sx, sy, gp.r + pulse, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#aaffcc';
    ctx.beginPath(); ctx.arc(sx, sy, gp.r * 0.4, 0, Math.PI * 2); ctx.fill();
    // Mycelium tendrils
    ctx.strokeStyle = PLAYER_COLOR + '44';
    ctx.lineWidth = 1;
    for (var ti = 0; ti < 4; ti++) {
      var a = (frame * 0.02 + ti * Math.PI / 2);
      ctx.beginPath(); ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(a) * (gp.r + 10), sy + Math.sin(a) * (gp.r + 10));
      ctx.stroke();
    }
  }
}

function drawPlayer() {
  if (!player) return;
  var sx = player.x - camera.x;
  var sy = player.y - camera.y;

  if (invincible > 0 && Math.floor(invincible * 10) % 2 === 0) return;

  // === BASELING SPRITE ===
  // Animation from player state: hurt (i-frames) > jump (airborne) > walk > idle.
  var _anim = 'idle';
  if (invincible > 0) _anim = 'hurt';
  else if (!player.grounded) _anim = 'jump';
  else if (player.vx) _anim = 'walk';
  if (!TAS.drawBaseling(ctx, sx, sy - player.h / 2, Math.max(player.w, player.h) + 4, { flipX: player.facing < 0, frame: frame, anim: _anim })) {
    ctx.save();
    ctx.translate(sx, sy);

    var crouch = player.crouching ? 0.6 : 1;
    var bodyH = player.h * crouch;

    // Shield glow when buffed
    if (activeBuffs.shield > 0) {
      ctx.strokeStyle = '#44aaff66';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, -bodyH / 2, 16, 0, Math.PI * 2); ctx.stroke();
    }

    // Body (baseling colored)
    var bodyColor = PLAYER_COLOR;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-player.w / 2, -bodyH, player.w, bodyH);

    // Darken body slightly for depth
    ctx.fillStyle = '#00000033';
    ctx.fillRect(-player.w / 2, -bodyH + bodyH * 0.6, player.w, bodyH * 0.4);

    // Helmet/cap
    ctx.fillStyle = '#2a4a2a';
    ctx.fillRect(-player.w / 2 - 1, -bodyH - 3, player.w + 2, 8);

    // Eyes (NES style: 2x2 pixel)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(player.facing > 0 ? 1 : -6, -bodyH + 3, 5, 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(player.facing > 0 ? 3 : -4, -bodyH + 4, 2, 2);

    // Arm/gun
    ctx.fillStyle = '#5a8a4a';
    var gunY = -bodyH * 0.5;
    ctx.fillRect(player.facing > 0 ? player.w / 2 : -player.w / 2 - 8, gunY, 8, 4);
    ctx.fillStyle = weapon === 'spore_shot' ? '#38d973' : (weapon === 'rocket' ? '#aa5533' : '#333');
    ctx.fillRect(player.facing > 0 ? player.w / 2 + 6 : -player.w / 2 - 12, gunY + 1, 6, 2);

    // Legs
    if (!player.crouching && Math.abs(player.vx) > 10 && player.grounded) {
      var legOff = Math.sin(player.animFrame * Math.PI / 2) * 4;
      ctx.fillStyle = '#2a5a1a';
      ctx.fillRect(-3, 0, 4, 2 + legOff);
      ctx.fillRect(1, 0, 4, 2 - legOff);
    }

    // Grapple shoulder tendril
    ctx.fillStyle = PLAYER_COLOR;
    ctx.beginPath(); ctx.arc(player.facing > 0 ? -3 : 3, -bodyH * 0.7, 3, 0, Math.PI * 2); ctx.fill();

    // Speed buff trail
    if (activeBuffs.speed > 0) {
      ctx.fillStyle = '#38d97344';
      ctx.fillRect(player.facing > 0 ? -player.w : 0, -bodyH * 0.5, player.w * 0.5, bodyH * 0.3);
    }

    ctx.restore();
  }
}

function drawGrapple() {
  if (!grapple) return;
  var segs = grapple.segments;
  if (segs.length < 2) return;

  // Organic tendril
  ctx.strokeStyle = PLAYER_COLOR;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(segs[0].x - camera.x, segs[0].y - camera.y);
  for (var i = 1; i < segs.length; i++) {
    var prev = segs[i - 1]; var curr = segs[i];
    var cpx = (prev.x + curr.x) / 2 - camera.x;
    var cpy = (prev.y + curr.y) / 2 - camera.y;
    ctx.quadraticCurveTo(prev.x - camera.x, prev.y - camera.y, cpx, cpy);
  }
  ctx.stroke();

  // Inner glow
  ctx.strokeStyle = '#aaffcc';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(segs[0].x - camera.x, segs[0].y - camera.y);
  for (var i = 1; i < segs.length; i++) {
    var prev = segs[i - 1]; var curr = segs[i];
    var cpx = (prev.x + curr.x) / 2 - camera.x;
    var cpy = (prev.y + curr.y) / 2 - camera.y;
    ctx.quadraticCurveTo(prev.x - camera.x, prev.y - camera.y, cpx, cpy);
  }
  ctx.stroke();

  if (grapple.attached) {
    var ax = grapple.attachX - camera.x;
    var ay = grapple.attachY - camera.y;
    ctx.fillStyle = '#aaffcc';
    ctx.beginPath(); ctx.arc(ax, ay, 4 + Math.sin(frame * 0.15) * 2, 0, Math.PI * 2); ctx.fill();
  }

  if (grapple.extending) {
    var tx = grapple.tipX - camera.x;
    var ty = grapple.tipY - camera.y;
    ctx.fillStyle = '#ccffdd';
    ctx.beginPath(); ctx.arc(tx, ty, 3, 0, Math.PI * 2); ctx.fill();
  }
}

function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    if (e.x < camera.x - 30 || e.x > camera.x + GW + 30) continue;

    var sx = e.x - camera.x;
    var sy = e.y - camera.y;
    var flash = e.hitFlash > 0;

    ctx.save();
    ctx.translate(sx, sy);

    switch (e.type) {
      case 'soldier':
        ctx.fillStyle = flash ? '#fff' : '#7a3db8';
        ctx.fillRect(-e.w / 2, -e.h, e.w, e.h);
        ctx.fillStyle = flash ? '#fff' : '#5c2d91';
        ctx.fillRect(-e.w / 2 - 1, -e.h - 2, e.w + 2, 6);
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.facing > 0 ? 2 : -5, -e.h + 3, 3, 3);
        ctx.fillStyle = '#444';
        ctx.fillRect(e.facing > 0 ? e.w / 2 : -e.w / 2 - 6, -e.h * 0.5, 6, 3);
        break;

      case 'sniper':
        ctx.fillStyle = flash ? '#fff' : '#6b4f8a';
        ctx.fillRect(-e.w / 2, -e.h * 0.6, e.w, e.h * 0.6);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(e.facing > 0 ? e.w / 2 + 2 : -e.w / 2 - 4, -e.h * 0.4, 2, 2);
        ctx.fillStyle = '#555';
        ctx.fillRect(e.facing > 0 ? e.w / 2 : -e.w / 2 - 10, -e.h * 0.4, 10, 2);
        break;

      case 'drone':
        ctx.fillStyle = flash ? '#fff' : '#8055a8';
        ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
        var rotorOff = Math.sin(frame * 0.4) * 4;
        ctx.fillStyle = '#a07cc8';
        ctx.fillRect(-e.w / 2 - 4 + rotorOff, -e.h / 2 - 3, 6, 2);
        ctx.fillRect(e.w / 2 - 2 - rotorOff, -e.h / 2 - 3, 6, 2);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-2, -2, 4, 4);
        break;

      case 'turret':
        ctx.fillStyle = flash ? '#fff' : '#6b4a7a';
        ctx.fillRect(-e.w / 2, -8, e.w, 8);
        var angle = Math.atan2(player.y - e.y, player.x - e.x);
        ctx.save(); ctx.rotate(angle);
        ctx.fillStyle = '#8a6a9a';
        ctx.fillRect(0, -2, 16, 4);
        ctx.restore();
        ctx.fillStyle = e.shootTimer < 0.5 ? '#ff0000' : '#880000';
        ctx.fillRect(-2, -12, 4, 4);
        break;

      case 'myco_knight':
        // Armored fungal warrior
        ctx.fillStyle = flash ? '#fff' : '#6a4f8a';
        ctx.fillRect(-e.w / 2, -e.h, e.w, e.h);
        // Fungal cap helmet
        ctx.fillStyle = flash ? '#fff' : '#a855f7';
        ctx.beginPath();
        ctx.arc(0, -e.h, 12, Math.PI, 0);
        ctx.fill();
        // Shield
        if (e.shieldUp) {
          ctx.fillStyle = '#8899aa88';
          ctx.fillRect(e.facing > 0 ? -e.w / 2 - 4 : e.w / 2, -e.h * 0.8, 4, e.h * 0.6);
        }
        // Eyes
        ctx.fillStyle = '#e6482e';
        ctx.fillRect(e.facing > 0 ? 1 : -5, -e.h + 8, 3, 3);
        break;

      case 'spore_mage':
        // Floating fungal caster
        ctx.fillStyle = flash ? '#fff' : '#7b44a8';
        ctx.fillRect(-e.w / 2, -e.h * 0.6, e.w, e.h * 0.6);
        // Large bioluminescent cap
        ctx.fillStyle = flash ? '#fff' : '#a855f7';
        ctx.beginPath();
        ctx.arc(0, -e.h * 0.6, 10, Math.PI, 0);
        ctx.fill();
        // Glowing spots
        ctx.fillStyle = '#ffaaff';
        ctx.fillRect(-4, -e.h * 0.6 - 6, 2, 2);
        ctx.fillRect(3, -e.h * 0.6 - 4, 2, 2);
        // Floating particles
        var fp = Math.sin(frame * 0.1 + e.x) * 6;
        ctx.fillStyle = '#aa66ff44';
        ctx.beginPath(); ctx.arc(fp, -e.h - 5, 3, 0, Math.PI * 2); ctx.fill();
        break;
    }

    ctx.restore();
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;

  var sx = boss.x - camera.x;
  var sy = boss.y - camera.y;
  var flash = boss.hitFlash > 0;
  var pal = ZONE_PALETTES[STAGES[currentStage].zone];

  ctx.save();
  ctx.translate(sx, sy);

  // Main body
  ctx.fillStyle = flash ? '#fff' : boss.color;
  ctx.fillRect(-boss.w / 2, -boss.h, boss.w, boss.h);

  // Armor/cap
  ctx.fillStyle = flash ? '#fff' : (boss.enragePhase ? '#cc2222' : boss.color);
  ctx.beginPath();
  ctx.arc(0, -boss.h, boss.w * 0.6, Math.PI, 0);
  ctx.fill();

  // Pulsing eye
  ctx.fillStyle = boss.enragePhase ? '#ff0000' : '#ff6644';
  var eyePulse = Math.sin(frame * 0.1) * 3;
  ctx.beginPath(); ctx.arc(0, -boss.h * 0.65, 7 + eyePulse, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, -boss.h * 0.65, 3, 0, Math.PI * 2); ctx.fill();

  // Weapons/tendrils
  ctx.fillStyle = '#333';
  ctx.fillRect(-boss.w / 2 - 8, -boss.h * 0.4, 10, 6);
  ctx.fillRect(boss.w / 2 - 2, -boss.h * 0.4, 10, 6);

  // Legs/roots
  ctx.fillStyle = boss.color + 'aa';
  for (var li = 0; li < 3; li++) {
    var lx = -boss.w / 3 + li * (boss.w / 3);
    var wv = Math.sin(frame * 0.05 + li) * 3;
    ctx.fillRect(lx - 2, 0, 4, 10 + wv);
  }

  // Enrage aura
  if (boss.enragePhase) {
    ctx.strokeStyle = '#ff220033';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -boss.h / 2, boss.w * 0.8 + Math.sin(frame * 0.1) * 5, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();

  // Boss name + health bar
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, sx, sy - boss.h - 20);

  var barW = 60;
  var barX = sx - barW / 2;
  var barY = sy - boss.h - 14;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, 6);
  ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#dd4444' : '#ff8800';
  ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), 6);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, 6);
}

function drawBullets() {
  for (var i = 0; i < playerBullets.length; i++) {
    var b = playerBullets[i];
    var sx = b.x - camera.x;
    var sy = b.y - camera.y;
    if (b.rocket) {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath(); ctx.arc(sx, sy, b.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f4b41b44';
      ctx.beginPath(); ctx.arc(sx - b.vx * 0.02, sy, b.size + 2, 0, Math.PI * 2); ctx.fill();
    } else if (b.spore) {
      ctx.fillStyle = '#38d973';
      ctx.beginPath(); ctx.arc(sx, sy, b.size, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#38d97344';
      ctx.beginPath(); ctx.arc(sx - b.vx * 0.01, sy, b.size + 2, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = PLAYER_COLOR;
      ctx.beginPath(); ctx.arc(sx, sy, b.size, 0, Math.PI * 2); ctx.fill();
    }
  }

  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    var sx = b.x - camera.x;
    var sy = b.y - camera.y;
    ctx.fillStyle = b.spore ? '#a855f7' : '#e6482e';
    ctx.beginPath(); ctx.arc(sx, sy, b.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = b.spore ? '#a855f744' : '#e6482e88';
    ctx.beginPath(); ctx.arc(sx, sy, b.size + 1, 0, Math.PI * 2); ctx.fill();
  }
}

function drawPickups() {
  for (var pi = 0; pi < pickups.length; pi++) {
    var p = pickups[pi];
    if (p.collected) continue;
    if (p.x < camera.x - 20 || p.x > camera.x + GW + 20) continue;

    var sx = p.x - camera.x;
    var sy = p.y - camera.y;
    var bob = Math.sin(frame * 0.06 + p.x) * 3;

    if (p.type === 'weapon') {
      ctx.fillStyle = p.weapon === 'spore_shot' ? '#38d973' : '#f4b41b';
      ctx.fillRect(sx - p.w / 2, sy - p.h / 2 + bob, p.w, p.h);
      ctx.fillStyle = '#333';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.weapon[0].toUpperCase(), sx, sy + 3 + bob);
    } else {
      ctx.fillStyle = '#38d973';
      ctx.beginPath(); ctx.arc(sx, sy + bob, p.w / 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx - 1, sy - 3 + bob, 2, 6);
      ctx.fillRect(sx - 3, sy - 1 + bob, 6, 2);
    }
  }

  // Comm room
  if (commRoom && !commRoom.collected) {
    var sx = commRoom.x - camera.x;
    var sy = commRoom.y - camera.y;
    ctx.fillStyle = '#1a2a3a';
    ctx.fillRect(sx, sy - commRoom.h, commRoom.w, commRoom.h);
    var screenFlicker = Math.sin(frame * 0.1) > 0 ? '#88ccff' : '#6699cc';
    ctx.fillStyle = screenFlicker;
    ctx.fillRect(sx + 4, sy - commRoom.h + 4, commRoom.w - 8, 18);
    ctx.fillStyle = '#38d973';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SEEDS', sx + commRoom.w / 2, sy - commRoom.h + 15);
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + commRoom.w / 2, sy - commRoom.h);
    ctx.lineTo(sx + commRoom.w / 2, sy - commRoom.h - 10);
    ctx.stroke();
    if (frame % 30 < 15) {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(sx + commRoom.w / 2 - 1, sy - commRoom.h - 12, 3, 3);
    }
  }

  // Exit door
  if (exitDoor) {
    var sx = exitDoor.x - camera.x;
    var sy = exitDoor.y - camera.y;
    ctx.fillStyle = bossDefeated ? '#44aa44' : '#442222';
    ctx.fillRect(sx, sy, exitDoor.w, exitDoor.h);
    if (bossDefeated) {
      ctx.fillStyle = '#38d973';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', sx + exitDoor.w / 2, sy + exitDoor.h / 2 + 3);
      ctx.strokeStyle = '#38d97344';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx - 2, sy - 2, exitDoor.w + 4, exitDoor.h + 4);
    } else {
      ctx.fillStyle = '#663333';
      ctx.fillRect(sx + 8, sy + 15, 8, 10);
    }
  }
}

// === HUD (PASS 3: polished) ===
function drawHUD() {
  // Persistent controls legend for keyboard players (§7c) — brighter on stage 1.
  if (!('ontouchstart' in window)) {
    ctx.save();
    ctx.globalAlpha = (currentStage === 0) ? 0.7 : 0.32;
    ctx.fillStyle = 'rgba(8,12,8,0.72)';
    ctx.fillRect(0, GH - 12, GW, 12);
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS Move/Aim    W/SPACE Tendril    S Spores', GW / 2, GH - 3);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  // Health bar
  var barX = 8, barY = 6, barW = 80, barH = 10;
  ctx.fillStyle = '#111';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);
  var hpColor = health > maxHealth * 0.5 ? PLAYER_COLOR : (health > maxHealth * 0.25 ? '#ddaa44' : '#ff4444');
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, barW * (health / maxHealth), barH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  // Lives
  ctx.fillStyle = PLAYER_COLOR;
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x' + lives, barX + barW + 6, barY + 9);

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, GW - 8, 14);

  // Weapon
  ctx.textAlign = 'center';
  var wpnColor = weapon === 'normal' ? '#777' : (weapon === 'spore_shot' ? '#38d973' : '#f4b41b');
  ctx.fillStyle = wpnColor;
  ctx.font = '9px monospace';
  ctx.fillText(weapon.toUpperCase() + (weaponAmmo > 0 ? ' [' + weaponAmmo + ']' : ''), GW / 2, 14);

  // Chain combo
  if (chainCombo >= 2) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CHAIN x' + chainCombo, GW / 2, 26);
    // Chain timer bar
    ctx.fillStyle = '#f4b41b44';
    ctx.fillRect(GW / 2 - 30, 28, 60 * (chainTimer / CHAIN_WINDOW), 3);
  }

  // Active buffs
  var buffY = 22;
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  if (activeBuffs.burst > 0) { ctx.fillStyle = '#ff8800'; ctx.fillText('STR+', 8, buffY); buffY += 9; }
  if (activeBuffs.speed > 0) { ctx.fillStyle = '#88ff44'; ctx.fillText('DEX+', 8, buffY); buffY += 9; }
  if (activeBuffs.score > 0) { ctx.fillStyle = '#cc44ff'; ctx.fillText('2xSCR', 8, buffY); buffY += 9; }
  if (activeBuffs.shield > 0) { ctx.fillStyle = '#44aaff'; ctx.fillText('SHIELD', 8, buffY); buffY += 9; }
  if (activeBuffs.luck > 0) { ctx.fillStyle = '#f4b41b'; ctx.fillText('LUCK+', 8, buffY); }

  // Stage name (raised above the controls legend strip)
  ctx.fillStyle = '#ffffff22';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGES[currentStage].name, GW / 2, GH - 16);

  // Grapple indicator (raised above the controls legend strip)
  if (!grapple) {
    ctx.fillStyle = PLAYER_COLOR + '66';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('TENDRIL READY', 8, GH - 16);
  }

  // Boss warning
  if (bossWarning > 0) {
    bossWarning -= 0.016;
    var wAlpha = Math.min(1, bossWarning);
    ctx.globalAlpha = wAlpha;
    ctx.fillStyle = '#e6482e88';
    ctx.fillRect(0, GH / 2 - 15, GW, 30);
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING: ' + (boss ? boss.name.toUpperCase() : 'INFESTATION') + ' AHEAD', GW / 2, GH / 2 + 5);
    ctx.globalAlpha = 1;
  }

  // Damage flash
  if (damageFlash > 0) {
    ctx.fillStyle = 'rgba(255,0,0,' + (damageFlash * 0.3) + ')';
    ctx.fillRect(0, 0, GW, GH);
    damageFlash -= 0.02;
  }
}

// === TITLE SCREEN (PASS 3: NES polish) ===
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#080c08';
  ctx.fillRect(0, 0, GW, GH);

  // Animated mycelium background
  ctx.strokeStyle = '#1a3a1a';
  ctx.lineWidth = 2;
  for (var i = 0; i < 10; i++) {
    ctx.beginPath();
    var startX = i * 55;
    ctx.moveTo(startX, GH);
