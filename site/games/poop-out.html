<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>

html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }

  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);

</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GAME_W = 400, GAME_H = 600;
const ROUND_TIME = 180; // 3 minutes per round
const MAX_STARS = 3;
const KD_TO_TKO = 3;
const GETUP_MASH = 15; // button presses needed to get up
const GETUP_TIME = 10; // seconds to mash

// States
const ST_TITLE = 0, ST_INTRO = 1, ST_FIGHT = 2, ST_KD_OPPONENT = 3;
const ST_KD_PLAYER = 4, ST_TKO = 5, ST_WIN = 6, ST_LOSE = 7;
const ST_BETWEEN_ROUNDS = 8, ST_DECISION = 9;

// Player actions
const ACT_IDLE = 0, ACT_PUNCH_L = 1, ACT_PUNCH_R = 2, ACT_DODGE_L = 3;
const ACT_DODGE_R = 4, ACT_BLOCK = 5, ACT_STAR_PUNCH = 6, ACT_HIT = 7;

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, SCALE, OFFSET_X, OFFSET_Y;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / GAME_W, sh / GAME_H);
  W = Math.floor(GAME_W * SCALE);
  H = Math.floor(GAME_H * SCALE);
  OFFSET_X = Math.floor((sw - W) / 2);
  OFFSET_Y = Math.floor((sh - H) / 2);
  canvas.width = GAME_W * dpr;
  canvas.height = GAME_H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, OFFSET_Y) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = audioCtx.sampleRate * dur;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  punch() { playTone(200, 0.08, 'square', 0.12, 100); playNoise(0.06, 0.1); },
  hit() { playTone(150, 0.12, 'sawtooth', 0.15, 60); playNoise(0.1, 0.15); },
  block() { playTone(400, 0.05, 'triangle', 0.08); },
  dodge() { playTone(500, 0.04, 'sine', 0.05, 600); },
  starEarn() { playTone(880, 0.08, 'square', 0.08); setTimeout(() => playTone(1100, 0.1, 'square', 0.1), 80); },
  starPunch() { playTone(200, 0.3, 'sawtooth', 0.15, 800); playNoise(0.2, 0.12); },
  knockdown() { playTone(100, 0.5, 'sawtooth', 0.15, 30); playNoise(0.3, 0.1); },
  bell() { playTone(1200, 0.4, 'sine', 0.12); setTimeout(() => playTone(1200, 0.3, 'sine', 0.08), 400); setTimeout(() => playTone(1200, 0.2, 'sine', 0.06), 700); },
  victory() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.15, 'square', 0.1), i * 120));
  },
  defeat() {
    const notes = [440, 349, 293, 220];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.25, 'sawtooth', 0.1), i * 200));
  },
  getup() { playTone(300, 0.05, 'square', 0.06, 400); },
  crowd() { playNoise(0.5, 0.03); }
};

// ============================================================
// PARTICLES
// ============================================================
let particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 3) * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, color, size: 2 + Math.random() * 4 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.1 * dt * 60;
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// FLASH
// ============================================================
let flashAlpha = 0, flashColor = '#fff';
function flash(color) { flashColor = color || '#fff'; flashAlpha = 0.5; }
function updateFlash(dt) { flashAlpha = Math.max(0, flashAlpha - dt * 4); }
function drawFlash() {
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// OPPONENTS DATA
// ============================================================
const OPPONENTS = [
  {
    name: "Glass Joe the Slime",
    hp: 80, defense: 0.1, speed: 0.6, damage: 5,
    color: '#44DD44', bodyColor: '#33BB33', eyeColor: '#000',
    patterns: ['slow_jab'],
    telegraph: 1.2, recovery: 1.5,
    intro: "A trembling slime blob enters the ring..."
  },
  {
    name: "Piston Poop",
    hp: 120, defense: 0.2, speed: 0.8, damage: 8,
    color: '#8B5E3C', bodyColor: '#6B4226', eyeColor: '#FFF',
    patterns: ['left_right_combo'],
    telegraph: 1.0, recovery: 1.2,
    intro: "Mechanical and relentless!"
  },
  {
    name: "Bald Baseling",
    hp: 150, defense: 0.25, speed: 0.9, damage: 12,
    color: '#FFB366', bodyColor: '#E89940', eyeColor: '#333',
    patterns: ['headbutt', 'slow_jab'],
    telegraph: 0.9, recovery: 1.0,
    intro: "He's got a hard head and bad attitude!"
  },
  {
    name: "King Hippo Toad",
    hp: 250, defense: 0.8, speed: 0.5, damage: 20,
    color: '#44AA66', bodyColor: '#337744', eyeColor: '#FF0',
    patterns: ['mouth_open'],
    telegraph: 1.5, recovery: 2.0,
    weakSpot: true,
    intro: "Massive and nearly invincible... but wait for the opening!"
  },
  {
    name: "Soda Pop Fungi",
    hp: 160, defense: 0.3, speed: 1.2, damage: 10,
    color: '#FF66AA', bodyColor: '#DD4488', eyeColor: '#FFF',
    patterns: ['fast_jab', 'fast_jab', 'slow_jab'],
    telegraph: 0.7, recovery: 0.8,
    heals: true,
    intro: "Quick hands and a healing habit!"
  },
  {
    name: "Don Flamenco Spore",
    hp: 140, defense: 0.4, speed: 1.0, damage: 15,
    color: '#FF4444', bodyColor: '#CC2222', eyeColor: '#000',
    patterns: ['taunt_counter', 'slow_jab'],
    telegraph: 0.6, recovery: 0.7,
    counters: true,
    intro: "Ole! He taunts, he baits, he strikes!"
  },
  {
    name: "Mr. Sandman Shroom",
    hp: 200, defense: 0.35, speed: 1.3, damage: 18,
    color: '#886622', bodyColor: '#664411', eyeColor: '#FF0',
    patterns: ['triple_combo', 'uppercut'],
    telegraph: 0.6, recovery: 0.8,
    intro: "Three crushing blows then the uppercut!"
  },
  {
    name: "Super Macho Mage",
    hp: 220, defense: 0.4, speed: 1.4, damage: 16,
    color: '#9944FF', bodyColor: '#7722DD', eyeColor: '#0FF',
    patterns: ['magic_feint', 'teleport', 'fast_jab'],
    telegraph: 0.5, recovery: 0.6,
    intro: "Now you see him... now you don't!"
  },
  {
    name: "Reactor Tyson",
    hp: 240, defense: 0.45, speed: 1.6, damage: 25,
    color: '#FF8800', bodyColor: '#DD6600', eyeColor: '#F00',
    patterns: ['speed_rush', 'uppercut', 'left_right_combo'],
    telegraph: 0.4, recovery: 0.5,
    intro: "Blinding speed. One punch can end it all."
  },
  {
    name: "Dark Luminar",
    hp: 300, defense: 0.5, speed: 1.5, damage: 22,
    color: '#220044', bodyColor: '#110022', eyeColor: '#F0F',
    patterns: ['triple_combo', 'magic_feint', 'speed_rush', 'uppercut', 'teleport'],
    telegraph: 0.45, recovery: 0.5,
    phases: 3,
    intro: "The final darkness descends..."
  }
];

// ============================================================
// GAME STATE
// ============================================================
let state = ST_TITLE;
let stateTimer = 0;
let currentOpponentIdx = 0;
let currentRound = 1;
let roundTimer = ROUND_TIME;

// Player state
let player = {
  hp: 100, maxHp: 100, stars: 0, kd: 0,
  action: ACT_IDLE, actionTimer: 0,
  score: 0, mashCount: 0, mashTimer: 0,
  stunTimer: 0, invincible: 0,
  punchCooldown: 0
};

// Opponent state
let opp = {
  hp: 100, maxHp: 100, kd: 0,
  action: 'idle', actionTimer: 0,
  telegraphTimer: 0, recoveryTimer: 0,
  patternIdx: 0, comboStep: 0,
  stunTimer: 0, hitTimer: 0,
  phase: 1, x: 0, y: 0,
  bobTimer: 0, flashTimer: 0,
  attackSide: 0, // 0=left, 1=right, 2=both
  vulnerable: false,
  healTimer: 0
};

let shakeTimer = 0, shakeIntensity = 0;
let introTimer = 0;
let counterWindow = false;
let counterTimer = 0;
let lastTime = 0;

// Input
let keys = {};
let touchL = false, touchR = false, touchBlock = false;
let touchDodgeL = false, touchDodgeR = false, touchStar = false;
let swipeStartY = 0, swipeStartX = 0, swiping = false;

// ============================================================
// INPUT HANDLING
// ============================================================
window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;
  if (state === ST_KD_PLAYER) {
    player.mashCount++;
    SFX.getup();
  }
  if (state === ST_TITLE) startFight();
  e.preventDefault();
});
window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
  e.preventDefault();
});

// Touch controls
canvas.addEventListener('touchstart', function(e) {
  ensureAudio();
  e.preventDefault();
  if (state === ST_TITLE) { startFight(); return; }
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const tx = (t.clientX - rect.left) / SCALE;
    const ty = (t.clientY - rect.top) / SCALE;
    handleTouchDown(tx, ty, t.identifier);
  }
});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const tx = (t.clientX - rect.left) / SCALE;
    const ty = (t.clientY - rect.top) / SCALE;
    handleTouchMove(tx, ty, t.identifier);
  }
});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  touchL = false; touchR = false; touchBlock = false;
  touchDodgeL = false; touchDodgeR = false; touchStar = false;
  swiping = false;
});

canvas.addEventListener('mousedown', function(e) {
  ensureAudio();
  if (state === ST_TITLE) { startFight(); return; }
  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) / SCALE;
  const ty = (e.clientY - rect.top) / SCALE;
  handleTouchDown(tx, ty, 0);
});
canvas.addEventListener('mouseup', function() {
  touchL = false; touchR = false; touchBlock = false;
  touchDodgeL = false; touchDodgeR = false; touchStar = false;
});

function handleTouchDown(tx, ty, id) {
  if (state === ST_KD_PLAYER) {
    player.mashCount++;
    SFX.getup();
    return;
  }
  swipeStartX = tx;
  swipeStartY = ty;
  swiping = true;

  // Touch zones: bottom third of screen
  if (ty > GAME_H * 0.75) {
    // Star punch zone (top of touch area, center)
    if (ty < GAME_H * 0.82 && tx > GAME_W * 0.3 && tx < GAME_W * 0.7) {
      touchStar = true; return;
    }
    // Block zone (center bottom)
    if (tx > GAME_W * 0.35 && tx < GAME_W * 0.65) {
      touchBlock = true; return;
    }
    // Left punch
    if (tx < GAME_W * 0.35) { touchL = true; return; }
    // Right punch
    if (tx > GAME_W * 0.65) { touchR = true; return; }
  }
  // Dodge zones (mid sides)
  if (tx < GAME_W * 0.2) { touchDodgeL = true; return; }
  if (tx > GAME_W * 0.8) { touchDodgeR = true; return; }
}

function handleTouchMove(tx, ty, id) {
  if (!swiping) return;
  const dx = tx - swipeStartX;
  const dy = ty - swipeStartY;
  if (Math.abs(dx) > 30) {
    if (dx < -30) touchDodgeL = true;
    if (dx > 30) touchDodgeR = true;
    swiping = false;
  }
  if (dy > 30) {
    touchBlock = true;
    swiping = false;
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startFight() {
  currentOpponentIdx = 0;
  player.score = 0;
  initFight();
}

function initFight() {
  const oppData = OPPONENTS[currentOpponentIdx];
  player.hp = player.maxHp;
  player.stars = 0;
  player.kd = 0;
  player.action = ACT_IDLE;
  player.actionTimer = 0;
  player.stunTimer = 0;
  player.invincible = 0;
  player.punchCooldown = 0;

  opp.hp = oppData.hp;
  opp.maxHp = oppData.hp;
  opp.kd = 0;
  opp.action = 'idle';
  opp.actionTimer = 0;
  opp.telegraphTimer = 0;
  opp.recoveryTimer = 0;
  opp.patternIdx = 0;
  opp.comboStep = 0;
  opp.stunTimer = 0;
  opp.hitTimer = 0;
  opp.phase = 1;
  opp.x = 0;
  opp.y = 0;
  opp.bobTimer = 0;
  opp.flashTimer = 0;
  opp.attackSide = 0;
  opp.vulnerable = false;
  opp.healTimer = 0;

  currentRound = 1;
  roundTimer = ROUND_TIME;
  counterWindow = false;
  counterTimer = 0;
  particles = [];
  shakeTimer = 0;

  state = ST_INTRO;
  introTimer = 3.0;
}

function nextOpponent() {
  currentOpponentIdx++;
  if (currentOpponentIdx >= OPPONENTS.length) {
    state = ST_WIN;
    stateTimer = 5;
    SFX.victory();
    return;
  }
  initFight();
}

function startRound() {
  state = ST_FIGHT;
  roundTimer = ROUND_TIME;
  opp.action = 'idle';
  opp.actionTimer = 1.5;
  SFX.bell();
}

function endRound() {
  currentRound++;
  if (currentRound > 3) {
    // Decision
    state = ST_DECISION;
    stateTimer = 3;
    const oppHpPct = opp.hp / opp.maxHp;
    const plrHpPct = player.hp / player.maxHp;
    if (plrHpPct >= oppHpPct) {
      // Player wins decision
      setTimeout(() => {
        player.score += 1000;
        nextOpponent();
      }, 3000);
    } else {
      setTimeout(() => {
        state = ST_LOSE;
        stateTimer = 4;
        SFX.defeat();
      }, 3000);
    }
    return;
  }
  state = ST_BETWEEN_ROUNDS;
  stateTimer = 3;
  // Heal player slightly between rounds
  player.hp = Math.min(player.maxHp, player.hp + 15);
  // Soda Pop heals
  const oppData = OPPONENTS[currentOpponentIdx];
  if (oppData.heals) {
    opp.hp = Math.min(opp.maxHp, opp.hp + 40);
    opp.healTimer = 2;
  }
}

// ============================================================
// OPPONENT AI
// ============================================================
function updateOpponentAI(dt) {
  const oppData = OPPONENTS[currentOpponentIdx];

  opp.bobTimer += dt * 2;
  if (opp.stunTimer > 0) { opp.stunTimer -= dt; return; }
  if (opp.hitTimer > 0) { opp.hitTimer -= dt; return; }
  if (opp.recoveryTimer > 0) { opp.recoveryTimer -= dt; return; }

  // Idle → choose attack
  if (opp.action === 'idle') {
    opp.actionTimer -= dt;
    if (opp.actionTimer <= 0) {
      // Pick pattern
      const pattern = oppData.patterns[opp.patternIdx % oppData.patterns.length];
      opp.patternIdx++;
      beginAttack(pattern);
    }
    return;
  }

  // Telegraphing
  if (opp.action === 'telegraph') {
    opp.telegraphTimer -= dt;
    opp.flashTimer += dt * 10;
    if (opp.telegraphTimer <= 0) {
      executeAttack();
    }
    return;
  }

  // Attacking
  if (opp.action === 'attacking') {
    opp.actionTimer -= dt;
    if (opp.actionTimer <= 0) {
      finishAttack();
    }
    return;
  }

  // Vulnerable (King Hippo style)
  if (opp.action === 'vulnerable') {
    opp.actionTimer -= dt;
    opp.vulnerable = true;
    if (opp.actionTimer <= 0) {
      opp.vulnerable = false;
      opp.action = 'idle';
      opp.actionTimer = 1.5 / oppData.speed;
    }
    return;
  }
}

function beginAttack(pattern) {
  const oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'telegraph';
  opp.telegraphTimer = oppData.telegraph;
  opp.currentPattern = pattern;
  opp.comboStep = 0;
  opp.flashTimer = 0;

  // Determine attack side
  switch (pattern) {
    case 'slow_jab': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'fast_jab': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'left_right_combo': opp.attackSide = 0; break;
    case 'headbutt': opp.attackSide = 2; break;
    case 'mouth_open': opp.attackSide = 2; break;
    case 'triple_combo': opp.attackSide = 0; break;
    case 'uppercut': opp.attackSide = 2; break;
    case 'taunt_counter': opp.attackSide = 2; break;
    case 'magic_feint': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'teleport': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'speed_rush': opp.attackSide = 0; break;
    default: opp.attackSide = 0;
  }
}

function executeAttack() {
  const oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'attacking';
  opp.actionTimer = 0.15;

  // Check if player dodges or blocks
  const dodging = (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R);
  const blocking = (player.action === ACT_BLOCK);

  let avoided = false;
  let blocked = false;

  if (opp.currentPattern === 'mouth_open') {
    // King Hippo: opens mouth, becomes vulnerable
    opp.action = 'vulnerable';
    opp.actionTimer = 1.5;
    opp.vulnerable = true;
    return;
  }

  if (opp.currentPattern === 'taunt_counter') {
    // Don Flamenco: becomes briefly vulnerable during taunt
    counterWindow = true;
    counterTimer = 0.8;
    opp.action = 'vulnerable';
    opp.actionTimer = 0.8;
    opp.vulnerable = true;
    return;
  }

  if (opp.currentPattern === 'teleport') {
    // Teleport behind and attack
    opp.x = (Math.random() < 0.5 ? -30 : 30);
    opp.attackSide = opp.x < 0 ? 0 : 1;
  }

  // Check dodge direction
  if (dodging) {
    if (opp.attackSide === 0 && player.action === ACT_DODGE_R) avoided = true;
    else if (opp.attackSide === 1 && player.action === ACT_DODGE_L) avoided = true;
    else if (opp.attackSide === 2 && (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R)) avoided = true;
    // Counter window opens when dodge is successful
    if (avoided) {
      counterWindow = true;
      counterTimer = 0.5;
      SFX.dodge();
    }
  }

  if (blocking && !avoided) {
    if (opp.currentPattern !== 'uppercut' && opp.currentPattern !== 'headbutt') {
      blocked = true;
      SFX.block();
      player.hp -= Math.floor(oppData.damage * 0.2);
    }
  }

  if (!avoided && !blocked) {
    // Player gets hit
    let dmg = oppData.damage;
    if (opp.currentPattern === 'uppercut') dmg = Math.floor(dmg * 1.5);
    if (opp.currentPattern === 'headbutt') dmg = Math.floor(dmg * 1.3);
    if (opp.currentPattern === 'speed_rush') dmg = Math.floor(dmg * 0.7);

    player.hp -= dmg;
    player.action = ACT_HIT;
    player.actionTimer = 0.3;
    player.stunTimer = 0.4;
    SFX.hit();
    flash('#FF0000');
    shakeTimer = 0.2;
    shakeIntensity = 4;
    spawnParticles(GAME_W / 2, GAME_H * 0.6, '#FF4444', 5, 3);

    if (player.hp <= 0) {
      playerKnockdown();
    }
  }

  // Combo handling
  if (opp.currentPattern === 'left_right_combo' && opp.comboStep === 0) {
    opp.comboStep = 1;
    opp.actionTimer = 0.3;
    opp.attackSide = 1;
    return;
  }
  if (opp.currentPattern === 'triple_combo' && opp.comboStep < 2) {
    opp.comboStep++;
    opp.actionTimer = 0.2;
    opp.attackSide = opp.comboStep % 2;
    return;
  }
  if (opp.currentPattern === 'speed_rush' && opp.comboStep < 4) {
    opp.comboStep++;
    opp.actionTimer = 0.12;
    opp.attackSide = opp.comboStep % 2;
    return;
  }
}

function finishAttack() {
  const oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'idle';
  opp.recoveryTimer = oppData.recovery / oppData.speed;
  opp.actionTimer = (1.0 + Math.random() * 0.5) / oppData.speed;
  opp.x = opp.x * 0.5; // Return toward center
  counterWindow = false;
}

function playerKnockdown() {
  player.kd++;
  player.hp = 0;
  if (player.kd >= KD_TO_TKO) {
    state = ST_LOSE;
    stateTimer = 4;
    SFX.defeat();
    SFX.knockdown();
    return;
  }
  state = ST_KD_PLAYER;
  player.mashCount = 0;
  player.mashTimer = GETUP_TIME;
  SFX.knockdown();
  flash('#FF0000');
  shakeTimer = 0.5;
  shakeIntensity = 8;
}

function opponentKnockdown() {
  opp.kd++;
  opp.stunTimer = 2.0;
  SFX.knockdown();
  flash('#FFFF00');
  shakeTimer = 0.3;
  shakeIntensity = 6;
  spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFFF00', 15, 5);
  player.score += 500;

  if (opp.kd >= KD_TO_TKO) {
    // TKO!
    state = ST_TKO;
    stateTimer = 4;
    SFX.victory();
    player.score += 2000;
    return;
  }

  // Opponent gets back up
  opp.hp = Math.max(1, opp.hp);
  opp.action = 'idle';
  opp.actionTimer = 2.0;

  // Phase transition for Dark Luminar
  const oppData = OPPONENTS[currentOpponentIdx];
  if (oppData.phases && opp.phase < oppData.phases) {
    opp.phase++;
  }
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function doPlayerPunch(side) {
  if (player.stunTimer > 0 || player.punchCooldown > 0) return;
  if (player.action !== ACT_IDLE && player.action !== ACT_BLOCK) return;

  player.action = side === 0 ? ACT_PUNCH_L : ACT_PUNCH_R;
  player.actionTimer = 0.2;
  player.punchCooldown = 0.25;
  SFX.punch();

  // Check if we can hit opponent
  if (opp.stunTimer > 0 || opp.hitTimer > 0) return; // Already stunned

  const oppData = OPPONENTS[currentOpponentIdx];

  // Counter punch (during counter window) = star!
  if (counterWindow) {
    counterWindow = false;
    let dmg = 20;
    if (opp.vulnerable) dmg = 40;
    opp.hp -= dmg;
    opp.hitTimer = 0.3;
    player.stars = Math.min(MAX_STARS, player.stars + 1);
    SFX.starEarn();
    flash('#FFFF00');
    spawnParticles(GAME_W / 2 + (side === 0 ? -20 : 20), GAME_H * 0.3, '#FFD700', 8, 4);
    player.score += 200;
    checkOpponentKO();
    return;
  }

  // Normal hit during vulnerability
  if (opp.vulnerable) {
    let dmg = 25;
    opp.hp -= dmg;
    opp.hitTimer = 0.2;
    SFX.hit();
    spawnParticles(GAME_W / 2 + (side === 0 ? -15 : 15), GAME_H * 0.3, oppData.color, 5, 3);
    player.score += 100;
    checkOpponentKO();
    return;
  }

  // Normal attack (opponent idle or recovering)
  if (opp.action === 'idle' || opp.recoveryTimer > 0) {
    let dmg = 10 * (1 - oppData.defense);
    if (oppData.weakSpot && !opp.vulnerable) dmg = 1; // King Hippo, barely hurts
    opp.hp -= Math.max(1, Math.floor(dmg));
    opp.hitTimer = 0.15;
    spawnParticles(GAME_W / 2 + (side === 0 ? -10 : 10), GAME_H * 0.3, '#FFF', 3, 2);
    player.score += 50;
    checkOpponentKO();
    return;
  }

  // Attacking opponent blocks our punch (Don Flamenco counter)
  if (oppData.counters && opp.action === 'idle') {
    // Counter attack incoming
    opp.action = 'telegraph';
    opp.telegraphTimer = 0.3;
    opp.currentPattern = 'fast_jab';
    opp.attackSide = side;
  }
}

function doStarPunch() {
  if (player.stars <= 0 || player.stunTimer > 0) return;
  if (player.action !== ACT_IDLE && player.action !== ACT_BLOCK) return;

  player.stars--;
  player.action = ACT_STAR_PUNCH;
  player.actionTimer = 0.5;
  player.punchCooldown = 0.6;
  SFX.starPunch();

  const oppData = OPPONENTS[currentOpponentIdx];
  let dmg = 50 * (1 - oppData.defense * 0.5);
  if (opp.vulnerable) dmg *= 2;
  opp.hp -= Math.floor(dmg);
  opp.stunTimer = 1.0;
  opp.hitTimer = 0.5;
  flash('#FFFF00');
  shakeTimer = 0.3;
  shakeIntensity = 5;
  spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFD700', 20, 6);
  player.score += 300;
  checkOpponentKO();
}

function doDodge(dir) {
  if (player.stunTimer > 0) return;
  if (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R) return;
  player.action = dir === 0 ? ACT_DODGE_L : ACT_DODGE_R;
  player.actionTimer = 0.35;
  player.invincible = 0.35;
}

function doBlock() {
  if (player.stunTimer > 0) return;
  player.action = ACT_BLOCK;
}

function releaseBlock() {
  if (player.action === ACT_BLOCK) {
    player.action = ACT_IDLE;
  }
}

function checkOpponentKO() {
  if (opp.hp <= 0) {
    opp.hp = 0;
    opponentKnockdown();
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  updateParticles(dt);
  updateFlash(dt);
  if (shakeTimer > 0) shakeTimer -= dt;
  if (counterTimer > 0) {
    counterTimer -= dt;
    if (counterTimer <= 0) counterWindow = false;
  }

  switch (state) {
    case ST_INTRO:
      introTimer -= dt;
      if (introTimer <= 0) startRound();
      break;

    case ST_FIGHT:
      updateFight(dt);
      break;

    case ST_KD_PLAYER:
      player.mashTimer -= dt;
      if (player.mashCount >= GETUP_MASH) {
        // Got up!
        player.hp = Math.floor(player.maxHp * 0.3);
        player.action = ACT_IDLE;
        player.stunTimer = 0;
        player.invincible = 1.0;
        state = ST_FIGHT;
        SFX.bell();
      } else if (player.mashTimer <= 0) {
        // Stayed down
        player.kd = KD_TO_TKO;
        state = ST_LOSE;
        stateTimer = 4;
        SFX.defeat();
      }
      break;

    case ST_KD_OPPONENT:
      stateTimer -= dt;
      if (stateTimer <= 0) {
        opp.action = 'idle';
        opp.actionTimer = 1.5;
        state = ST_FIGHT;
      }
      break;

    case ST_TKO:
      stateTimer -= dt;
      if (stateTimer <= 0) nextOpponent();
      break;

    case ST_WIN:
      stateTimer -= dt;
      if (stateTimer <= 0) { state = ST_TITLE; }
      break;

    case ST_LOSE:
      stateTimer -= dt;
      if (stateTimer <= 0) { state = ST_TITLE; }
      break;

    case ST_BETWEEN_ROUNDS:
      stateTimer -= dt;
      if (stateTimer <= 0) startRound();
      break;

    case ST_DECISION:
      stateTimer -= dt;
      break;
  }
}

function updateFight(dt) {
  // Round timer
  roundTimer -= dt;
  if (roundTimer <= 0) {
    roundTimer = 0;
    endRound();
    return;
  }

  // Player cooldowns
  if (player.punchCooldown > 0) player.punchCooldown -= dt;
  if (player.stunTimer > 0) player.stunTimer -= dt;
  if (player.invincible > 0) player.invincible -= dt;
  if (player.actionTimer > 0) {
    player.actionTimer -= dt;
    if (player.actionTimer <= 0 && player.action !== ACT_BLOCK) {
      player.action = ACT_IDLE;
    }
  }

  // Process input
  processInput();

  // Opponent AI
  updateOpponentAI(dt);
}

function processInput() {
  const leftPunch = keys['KeyA'] || keys['ArrowLeft'] || touchL;
  const rightPunch = keys['KeyD'] || keys['ArrowRight'] || touchR;
  const block = keys['KeyS'] || keys['ArrowDown'] || touchBlock;
  const dodgeL = (keys['KeyA'] && keys['KeyS']) || (keys['ArrowLeft'] && keys['ArrowDown']) || touchDodgeL;
  const dodgeR = (keys['KeyD'] && keys['KeyS']) || (keys['ArrowRight'] && keys['ArrowDown']) || touchDodgeR;
  const starPunch = keys['KeyW'] || keys['ArrowUp'] || keys['Space'] || touchStar;

  if (dodgeL) { doDodge(0); touchDodgeL = false; return; }
  if (dodgeR) { doDodge(1); touchDodgeR = false; return; }
  if (starPunch) { doStarPunch(); touchStar = false; return; }
  if (block) { doBlock(); return; } else { releaseBlock(); }
  if (leftPunch) { doPlayerPunch(0); touchL = false; return; }
  if (rightPunch) { doPlayerPunch(1); touchR = false; return; }
}

// ============================================================
// DRAWING - RING / BACKGROUND
// ============================================================
function drawRing() {
  // Ring floor
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Ring mat
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(20, GAME_H * 0.4, GAME_W - 40, GAME_H * 0.45);

  // Ring ropes
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  for (let i = 0; i < 3; i++) {
    const y = GAME_H * 0.2 + i * 40;
    ctx.beginPath();
    ctx.moveTo(10, y);
    ctx.lineTo(GAME_W - 10, y);
    ctx.stroke();
  }

  // Ring posts
  ctx.fillStyle = '#888';
  ctx.fillRect(5, GAME_H * 0.15, 12, GAME_H * 0.35);
  ctx.fillRect(GAME_W - 17, GAME_H * 0.15, 12, GAME_H * 0.35);

  // Crowd (simple dots in background)
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 0, GAME_W, GAME_H * 0.15);
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = ['#553', '#335', '#353', '#533', '#445'][i % 5];
    const cx = (i * 11 + 3) % GAME_W;
    const cy = GAME_H * 0.02 + (i % 3) * GAME_H * 0.04;
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// DRAWING - OPPONENT
// ============================================================
function drawOpponent() {
  const oppData = OPPONENTS[currentOpponentIdx];
  const baseX = GAME_W / 2 + opp.x;
  const baseY = GAME_H * 0.25;
  const bob = Math.sin(opp.bobTimer) * 3;

  ctx.save();

  // Hit reaction
  if (opp.hitTimer > 0) {
    ctx.translate(Math.random() * 4 - 2, Math.random() * 4 - 2);
  }

  // Knockdown animation
  if (opp.kd > 0 && opp.stunTimer > 1.0) {
    ctx.translate(0, (2.0 - opp.stunTimer) * 50);
    ctx.globalAlpha = 0.5 + opp.stunTimer * 0.25;
  }

  const headX = baseX;
  const headY = baseY + bob;
  const bodyX = baseX;
  const bodyY = baseY + 70 + bob;

  // Body (torso)
  ctx.fillStyle = oppData.bodyColor;
  ctx.beginPath();
  ctx.ellipse(bodyX, bodyY, 55, 65, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Arms
  drawOpponentArms(baseX, bodyY, oppData);

  // Head
  ctx.fillStyle = oppData.color;
  ctx.beginPath();
  ctx.ellipse(headX, headY, 40, 45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Eyes
  const eyeFlash = (opp.action === 'telegraph' && Math.floor(opp.flashTimer) % 2 === 0);
  ctx.fillStyle = eyeFlash ? '#FF0000' : oppData.eyeColor;
  ctx.beginPath();
  ctx.ellipse(headX - 12, headY - 5, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headX + 12, headY - 5, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (opp.vulnerable && oppData.weakSpot) {
    // King Hippo open mouth
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 20, 15, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (opp.hitTimer > 0) {
    ctx.fillStyle = '#600';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 18, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.fillStyle = '#400';
    ctx.beginPath();
    ctx.moveTo(headX - 10, headY + 15);
    ctx.lineTo(headX + 10, headY + 15);
    ctx.lineTo(headX, headY + 22);
    ctx.closePath();
    ctx.fill();
  }

  // Special features per opponent
  drawOpponentFeatures(headX, headY, bodyX, bodyY, oppData);

  // Telegraph indicator
  if (opp.action === 'telegraph') {
    ctx.fillStyle = '#FF0000';
    ctx.globalAlpha = 0.3 + Math.sin(opp.flashTimer * 5) * 0.3;
    const indicatorX = opp.attackSide === 0 ? baseX - 60 : (opp.attackSide === 1 ? baseX + 60 : baseX);
    ctx.beginPath();
    ctx.arc(indicatorX, bodyY - 20, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawOpponentArms(baseX, bodyY, oppData) {
  const leftArmX = baseX - 60;
  const rightArmX = baseX + 60;
  const armY = bodyY - 10;

  // Arm states based on action
  let leftExt = 0, rightExt = 0;

  if (opp.action === 'attacking') {
    if (opp.attackSide === 0) leftExt = 1;
    else if (opp.attackSide === 1) rightExt = 1;
    else { leftExt = 0.5; rightExt = 0.5; }
  }
  if (opp.action === 'telegraph') {
    if (opp.attackSide === 0) leftExt = -0.3;
    else if (opp.attackSide === 1) rightExt = -0.3;
    else { leftExt = -0.2; rightExt = -0.2; }
  }

  // Left arm
  ctx.fillStyle = oppData.color;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(leftArmX - leftExt * 30, armY + leftExt * 40, 18, 22, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Left glove
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(leftArmX - 5 - leftExt * 40, armY + 20 + leftExt * 50, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Right arm
  ctx.fillStyle = oppData.color;
  ctx.beginPath();
  ctx.ellipse(rightArmX + rightExt * 30, armY + rightExt * 40, 18, 22, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Right glove
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(rightArmX + 5 + rightExt * 40, armY + 20 + rightExt * 50, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function drawOpponentFeatures(headX, headY, bodyX, bodyY, oppData) {
  const idx = currentOpponentIdx;

  switch (idx) {
    case 0: // Glass Joe - slime drips
      ctx.fillStyle = '#33FF33';
      ctx.globalAlpha = 0.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(headX - 20 + i * 20, headY + 40 + Math.sin(opp.bobTimer + i) * 5, 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;

    case 1: // Piston Poop - mechanical arms
      ctx.fillStyle = '#666';
      ctx.fillRect(bodyX - 45, bodyY - 30, 8, 40);
      ctx.fillRect(bodyX + 37, bodyY - 30, 8, 40);
      break;

    case 2: // Bald Baseling - shiny head
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(headX - 10, headY - 20, 15, 10, -0.3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 3: // King Hippo Toad - crown + belly
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(headX - 20, headY - 40);
      ctx.lineTo(headX - 15, headY - 55);
      ctx.lineTo(headX - 5, headY - 42);
      ctx.lineTo(headX, headY - 58);
      ctx.lineTo(headX + 5, headY - 42);
      ctx.lineTo(headX + 15, headY - 55);
      ctx.lineTo(headX + 20, headY - 40);
      ctx.closePath();
      ctx.fill();
      // Belly band
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(bodyX - 30, bodyY + 10, 60, 8);
      break;

    case 4: // Soda Pop Fungi - mushroom cap + soda
      ctx.fillStyle = '#FF88CC';
      ctx.beginPath();
      ctx.ellipse(headX, headY - 35, 30, 15, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      // Dots
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(headX - 10, headY - 38, 4, 0, Math.PI * 2);
      ctx.arc(headX + 8, headY - 40, 3, 0, Math.PI * 2);
      ctx.fill();
      if (opp.healTimer > 0) {
        ctx.fillStyle = '#00CCFF';
        ctx.fillRect(bodyX + 50, bodyY - 20, 10, 25);
        ctx.fillStyle = '#0088AA';
        ctx.fillRect(bodyX + 48, bodyY - 25, 14, 5);
      }
      break;

    case 5: // Don Flamenco Spore - rose + hat
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(headX + 25, headY + 5, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#080';
      ctx.fillRect(headX + 24, headY + 10, 2, 15);
      // Hat
      ctx.fillStyle = '#222';
      ctx.fillRect(headX - 25, headY - 50, 50, 8);
      ctx.fillRect(headX - 15, headY - 70, 30, 22);
      break;

    case 6: // Mr. Sandman Shroom - sand particles
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.4;
      for (let i = 0; i < 6; i++) {
        const px = headX - 30 + Math.random() * 60;
        const py = headY - 20 + Math.random() * 40;
        ctx.fillRect(px, py, 2, 2);
      }
      ctx.globalAlpha = 1;
      break;

    case 7: // Super Macho Mage - magic aura
      ctx.strokeStyle = '#0FF';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4 + Math.sin(opp.bobTimer * 3) * 0.3;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY, 65, 75, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Wizard hat
      ctx.fillStyle = '#440088';
      ctx.beginPath();
      ctx.moveTo(headX - 25, headY - 35);
      ctx.lineTo(headX, headY - 75);
      ctx.lineTo(headX + 25, headY - 35);
      ctx.closePath();
      ctx.fill();
      break;

    case 8: // Reactor Tyson - energy glow
      ctx.fillStyle = '#FF8800';
      ctx.globalAlpha = 0.3 + Math.sin(opp.bobTimer * 5) * 0.2;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY - 20, 70, 80, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Scar
      ctx.strokeStyle = '#800';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 15, headY - 15);
      ctx.lineTo(headX - 5, headY + 5);
      ctx.stroke();
      break;

    case 9: // Dark Luminar - dark aura + phases
      ctx.strokeStyle = '#F0F';
      ctx.lineWidth = 2 + opp.phase;
      ctx.globalAlpha = 0.3 + opp.phase * 0.1;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY - 10, 60 + opp.phase * 10, 70 + opp.phase * 10, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Crown of darkness
      ctx.fillStyle = '#330066';
      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + (i - 2) * 0.4;
        const sx = headX + Math.cos(angle) * 30;
        const sy = headY - 35 + Math.sin(angle) * 10;
        ctx.beginPath();
        ctx.moveTo(sx - 5, sy);
        ctx.lineTo(sx, sy - 15 - opp.phase * 5);
        ctx.lineTo(sx + 5, sy);
        ctx.closePath();
        ctx.fill();
      }
      break;
  }
}

// ============================================================
// DRAWING - PLAYER
// ============================================================
function drawPlayer() {
  const baseX = GAME_W / 2;
  const baseY = GAME_H * 0.75;

  ctx.save();

  // Dodge offset
  let offsetX = 0;
  if (player.action === ACT_DODGE_L) offsetX = -40;
  if (player.action === ACT_DODGE_R) offsetX = 40;

  // Hit flash
  if (player.action === ACT_HIT) {
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
  }
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  const px = baseX + offsetX;
  const py = baseY;

  // Back of head
  ctx.fillStyle = '#DDA0';
  ctx.fillStyle = '#88CC44';
  ctx.beginPath();
  ctx.ellipse(px, py - 50, 22, 25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Body (from behind - V shape)
  ctx.fillStyle = '#226622';
  ctx.beginPath();
  ctx.moveTo(px - 25, py - 30);
  ctx.lineTo(px - 35, py + 20);
  ctx.lineTo(px + 35, py + 20);
  ctx.lineTo(px + 25, py - 30);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Shorts
  ctx.fillStyle = '#44AA44';
  ctx.fillRect(px - 25, py + 15, 50, 25);
  ctx.strokeRect(px - 25, py + 15, 50, 25);

  // Arms / Gloves
  drawPlayerArms(px, py);

  ctx.restore();
}

function drawPlayerArms(px, py) {
  const armY = py - 10;

  // Left arm
  let leftGloveX = px - 40;
  let leftGloveY = armY;
  // Right arm
  let rightGloveX = px + 40;
  let rightGloveY = armY;

  if (player.action === ACT_PUNCH_L) {
    leftGloveX = px - 20;
    leftGloveY = armY - 80;
  }
  if (player.action === ACT_PUNCH_R) {
    rightGloveX = px + 20;
    rightGloveY = armY - 80;
  }
  if (player.action === ACT_STAR_PUNCH) {
    leftGloveX = px;
    leftGloveY = armY - 100;
    rightGloveX = px;
    rightGloveY = armY - 100;
  }
  if (player.action === ACT_BLOCK) {
    leftGloveX = px - 15;
    leftGloveY = armY - 20;
    rightGloveX = px + 15;
    rightGloveY = armY - 20;
  }

  // Arms (lines from shoulder to glove)
  ctx.strokeStyle = '#88CC44';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(px - 25, py - 20);
  ctx.lineTo(leftGloveX, leftGloveY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px + 25, py - 20);
  ctx.lineTo(rightGloveX, rightGloveY);
  ctx.stroke();

  // Gloves
  ctx.fillStyle = '#00CC00';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(leftGloveX, leftGloveY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(rightGloveX, rightGloveY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Star punch sparkle
  if (player.action === ACT_STAR_PUNCH) {
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.8;
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2 + opp.bobTimer * 3;
      const sx = px + Math.cos(angle) * 25;
      const sy = (armY - 100) + Math.sin(angle) * 25;
      ctx.beginPath();
      ctx.arc(sx, sy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - HUD
// ============================================================
function drawHUD() {
  const oppData = OPPONENTS[currentOpponentIdx];

  // Opponent health bar
  ctx.fillStyle = '#333';
  ctx.fillRect(50, GAME_H * 0.88, GAME_W - 100, 14);
  const oppPct = Math.max(0, opp.hp / opp.maxHp);
  ctx.fillStyle = oppPct > 0.3 ? '#CC0000' : '#FF4400';
  ctx.fillRect(50, GAME_H * 0.88, (GAME_W - 100) * oppPct, 14);
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;
  ctx.strokeRect(50, GAME_H * 0.88, GAME_W - 100, 14);

  // Player health bar
  ctx.fillStyle = '#333';
  ctx.fillRect(50, GAME_H * 0.92, GAME_W - 100, 14);
  const plrPct = Math.max(0, player.hp / player.maxHp);
  ctx.fillStyle = plrPct > 0.3 ? '#00CC00' : '#FFAA00';
  ctx.fillRect(50, GAME_H * 0.92, (GAME_W - 100) * plrPct, 14);
  ctx.strokeStyle = '#FFF';
  ctx.strokeRect(50, GAME_H * 0.92, GAME_W - 100, 14);

  // Labels
  ctx.fillStyle = '#FFF';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(oppData.name.split(' ').slice(0, 2).join(' '), 50, GAME_H * 0.88 - 3);
  ctx.fillText('YOU', 50, GAME_H * 0.92 - 3);

  // Stars
  ctx.textAlign = 'right';
  for (let i = 0; i < MAX_STARS; i++) {
    ctx.fillStyle = i < player.stars ? '#FFD700' : '#444';
    ctx.font = '16px monospace';
    ctx.fillText('\u2605', GAME_W - 50 + i * 18 - 36, GAME_H * 0.92 - 3);
  }

  // Round + Timer
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFF';
  ctx.font = '12px monospace';
  const mins = Math.floor(roundTimer / 60);
  const secs = Math.floor(roundTimer % 60);
  ctx.fillText('Round ' + currentRound + '  ' + mins + ':' + (secs < 10 ? '0' : '') + secs, GAME_W / 2, GAME_H * 0.97);

  // KD indicators
  ctx.textAlign = 'left';
  ctx.font = '10px monospace';
  ctx.fillStyle = '#F88';
  ctx.fillText('KD:' + player.kd, 10, GAME_H * 0.97);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#88F';
  ctx.fillText('KD:' + opp.kd, GAME_W - 10, GAME_H * 0.97);

  // Score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#FFD700';
  ctx.font = '11px monospace';
  ctx.fillText('SCORE: ' + player.score, GAME_W - 10, 15);

  // Counter window indicator
  if (counterWindow) {
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.02) * 0.4;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COUNTER!', GAME_W / 2, GAME_H * 0.7);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - TOUCH CONTROLS OVERLAY
// ============================================================
function drawTouchControls() {
  if (!('ontouchstart' in window)) return;

  ctx.globalAlpha = 0.2;
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;

  // Left punch zone
  ctx.strokeRect(0, GAME_H * 0.75, GAME_W * 0.35, GAME_H * 0.25);
  ctx.fillStyle = '#FFF';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('L', GAME_W * 0.175, GAME_H * 0.87);

  // Right punch zone
  ctx.strokeRect(GAME_W * 0.65, GAME_H * 0.75, GAME_W * 0.35, GAME_H * 0.25);
  ctx.fillText('R', GAME_W * 0.825, GAME_H * 0.87);

  // Block zone
  ctx.strokeRect(GAME_W * 0.35, GAME_H * 0.82, GAME_W * 0.3, GAME_H * 0.18);
  ctx.fillText('BLK', GAME_W * 0.5, GAME_H * 0.92);

  // Star zone
  ctx.strokeRect(GAME_W * 0.3, GAME_H * 0.75, GAME_W * 0.4, GAME_H * 0.07);
  ctx.fillText('\u2605', GAME_W * 0.5, GAME_H * 0.79);

  // Dodge zones (sides)
  ctx.strokeRect(0, GAME_H * 0.4, GAME_W * 0.2, GAME_H * 0.35);
  ctx.fillText('<', GAME_W * 0.1, GAME_H * 0.57);
  ctx.strokeRect(GAME_W * 0.8, GAME_H * 0.4, GAME_W * 0.2, GAME_H * 0.35);
  ctx.fillText('>', GAME_W * 0.9, GAME_H * 0.57);

  ctx.globalAlpha = 1;
}

// ============================================================
// DRAWING - SCREENS
// ============================================================
function drawTitle() {
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Title
  ctx.fillStyle = '#44DD44';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('POOP-OUT!!', GAME_W / 2, GAME_H * 0.3);

  // Subtitle
  ctx.fillStyle = '#88CC44';
  ctx.font = '16px monospace';
  ctx.fillText('Baseling Boxing Championship', GAME_W / 2, GAME_H * 0.38);

  // Instructions
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  const lines = [
    'A/Left = Left Punch',
    'D/Right = Right Punch',
    'S/Down = Block',
    'A+S = Dodge Left | D+S = Dodge Right',
    'W/Up/Space = Star Punch',
    '',
    'Dodge attacks then counter-punch!',
    'Perfect counters earn Stars!',
    'Stars unleash devastating uppercuts!',
    '',
    'Touch: tap sides to punch, center to block',
    'Swipe L/R to dodge, top-center for Star'
  ];
  lines.forEach((l, i) => {
    ctx.fillText(l, GAME_W / 2, GAME_H * 0.5 + i * 16);
  });

  // Start prompt
  ctx.fillStyle = '#FFD700';
  ctx.font = '14px monospace';
  ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  ctx.fillText('Press any key or tap to start', GAME_W / 2, GAME_H * 0.9);
  ctx.globalAlpha = 1;

  // Trophy icon
  ctx.fillStyle = '#FFD700';
  ctx.font = '60px monospace';
  ctx.fillText('\u{1F3C6}', GAME_W / 2, GAME_H * 0.18);
}

function drawIntro() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  // Intro overlay
  const oppData = OPPONENTS[currentOpponentIdx];
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GAME_H * 0.35, GAME_W, GAME_H * 0.3);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FIGHT ' + (currentOpponentIdx + 1) + '/10', GAME_W / 2, GAME_H * 0.42);

  ctx.fillStyle = oppData.color;
  ctx.font = 'bold 16px monospace';
  ctx.fillText(oppData.name, GAME_W / 2, GAME_H * 0.48);

  ctx.fillStyle = '#CCC';
  ctx.font = '11px monospace';
  ctx.fillText(oppData.intro, GAME_W / 2, GAME_H * 0.55);

  // Fight countdown
  const count = Math.ceil(introTimer);
  if (count <= 3) {
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 40px monospace';
    ctx.fillText(count.toString(), GAME_W / 2, GAME_H * 0.63);
  }
}

function drawKDPlayer() {
  drawRing();
  drawOpponent();

  // Player on ground
  ctx.fillStyle = '#88CC44';
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(GAME_W / 2, GAME_H * 0.8, 40, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  drawHUD();

  // Mash prompt
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.4, GAME_W, GAME_H * 0.2);

  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('KNOCKED DOWN!', GAME_W / 2, GAME_H * 0.47);

  ctx.fillStyle = '#FFF';
  ctx.font = '14px monospace';
  ctx.fillText('MASH BUTTONS TO GET UP!', GAME_W / 2, GAME_H * 0.53);

  // Progress bar
  const pct = Math.min(1, player.mashCount / GETUP_MASH);
  ctx.fillStyle = '#333';
  ctx.fillRect(80, GAME_H * 0.56, GAME_W - 160, 12);
  ctx.fillStyle = '#00FF00';
  ctx.fillRect(80, GAME_H * 0.56, (GAME_W - 160) * pct, 12);

  // Timer
  ctx.fillStyle = '#FF0';
  ctx.font = '12px monospace';
  ctx.fillText(Math.ceil(player.mashTimer) + 's', GAME_W / 2, GAME_H * 0.6 + 14);
}

function drawTKO() {
  drawRing();
  drawPlayer();

  // Opponent down
  const oppData = OPPONENTS[currentOpponentIdx];
  ctx.fillStyle = oppData.color;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(GAME_W / 2, GAME_H * 0.35, 50, 20, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.3, GAME_W, GAME_H * 0.15);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('T.K.O.!!', GAME_W / 2, GAME_H * 0.38);

  ctx.fillStyle = '#FFF';
  ctx.font = '14px monospace';
  ctx.fillText('You defeated ' + oppData.name + '!', GAME_W / 2, GAME_H * 0.43);
}

function drawWin() {
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHAMPION!!', GAME_W / 2, GAME_H * 0.3);

  ctx.fillStyle = '#FFF';
  ctx.font = '16px monospace';
  ctx.fillText('You defeated all 10 opponents!', GAME_W / 2, GAME_H * 0.4);

  ctx.fillStyle = '#88CC44';
  ctx.font = '14px monospace';
  ctx.fillText('Final Score: ' + player.score, GAME_W / 2, GAME_H * 0.5);

  ctx.fillStyle = '#FFD700';
  ctx.font = '60px monospace';
  ctx.fillText('\u{1F3C6}', GAME_W / 2, GAME_H * 0.7);
}

function drawLose() {
  drawRing();
  drawOpponent();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GAME_H * 0.35, GAME_W, GAME_H * 0.2);

  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DEFEATED!', GAME_W / 2, GAME_H * 0.42);

  ctx.fillStyle = '#CCC';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + player.score, GAME_W / 2, GAME_H * 0.5);
  ctx.fillText('Press any key to try again', GAME_W / 2, GAME_H * 0.54);
}

function drawBetweenRounds() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, GAME_H * 0.4, GAME_W, GAME_H * 0.15);

  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Round ' + (currentRound) + ' starting...', GAME_W / 2, GAME_H * 0.49);

  if (OPPONENTS[currentOpponentIdx].heals && opp.healTimer > 0) {
    ctx.fillStyle = '#00CCFF';
    ctx.font = '12px monospace';
    ctx.fillText('Opponent drinks soda and heals!', GAME_W / 2, GAME_H * 0.54);
  }
}

function drawDecision() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.35, GAME_W, GAME_H * 0.2);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DECISION!', GAME_W / 2, GAME_H * 0.42);

  const oppHpPct = opp.hp / opp.maxHp;
  const plrHpPct = player.hp / player.maxHp;
  const winner = plrHpPct >= oppHpPct ? 'YOU WIN!' : 'OPPONENT WINS!';
  ctx.fillStyle = plrHpPct >= oppHpPct ? '#00FF00' : '#FF4444';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(winner, GAME_W / 2, GAME_H * 0.5);
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(time) {
  const dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;

  update(dt);

  // Screen shake
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeIntensity * 2,
      (Math.random() - 0.5) * shakeIntensity * 2
    );
  }

  // Draw based on state
  switch (state) {
    case ST_TITLE:
      drawTitle();
      break;

    case ST_INTRO:
      drawIntro();
      break;

    case ST_FIGHT:
      drawRing();
      drawOpponent();
      drawPlayer();
      drawHUD();
      drawTouchControls();
      break;

    case ST_KD_PLAYER:
      drawKDPlayer();
      break;

    case ST_KD_OPPONENT:
      drawRing();
      drawOpponent();
      drawPlayer();
      drawHUD();
      break;

    case ST_TKO:
      drawTKO();
      break;

    case ST_WIN:
      drawWin();
      break;

    case ST_LOSE:
      drawLose();
      break;

    case ST_BETWEEN_ROUNDS:
      drawBetweenRounds();
      break;

    case ST_DECISION:
      drawDecision();
      break;
  }

  drawParticles();
  drawFlash();

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// Kick off
requestAnimationFrame(gameLoop);

})();
</script>
