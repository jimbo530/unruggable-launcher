  damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1,
  cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10,

// Stat helper: mod = (stat - 10) / 2, clamped
function statMod(val) { return Math.floor((val - 10) / 2); }

// Derived stats from baseling (15+ references throughout)
// STR: punch damage multiplier, star punch damage, knockback
// DEX: dodge window, punch speed, counter window duration
// CON: max HP, damage reduction, knockdown recovery
// INT: pattern recognition (telegraph duration bonus), score multiplier
// WIS: heal amount between rounds, mash requirement reduction
// CHA: crowd favor (bonus stars), opponent morale damage, luck for crits

var derivedStats = {
  punchDamage: function() { return statB.damage * (1 + statMod(statB.str) * 0.08); },        // STR: +8% per mod
  starDamage: function() { return statB.damage * (1.5 + statMod(statB.str) * 0.12); },       // STR: star punch bonus
  dodgeWindow: function() { return 0.35 + statMod(statB.dex) * 0.03; },                      // DEX: wider dodge
  punchCooldown: function() { return Math.max(0.08, 0.25 * statB.cooldown - statMod(statB.dex) * 0.015); }, // DEX: faster punches
  counterWindow: function() { return 0.5 + statMod(statB.dex) * 0.04; },                     // DEX: longer counter
  maxHp: function() { return Math.floor((100 + statMod(statB.con) * 8) * statB.hpMult); },   // CON: more HP
  damageReduction: function() { return Math.max(0, statMod(statB.con) * 0.03); },             // CON: damage soak
  telegraphBonus: function() { return statMod(statB.int) * 0.06; },                           // INT: see attacks earlier
  scoreMult: function() { return statB.scoreMult * (1 + statMod(statB.int) * 0.05); },       // INT: score bonus
  healBonus: function() { return Math.floor(statMod(statB.wis) * 3); },                       // WIS: heal between rounds
  mashReduction: function() { return Math.max(0, Math.floor(statMod(statB.wis) * 1.5)); },   // WIS: easier getup
  critChance: function() { return Math.min(0.3, statB.luck * 0.05 + statMod(statB.cha) * 0.02); }, // CHA: crit chance
  starBonus: function() { return statMod(statB.cha) >= 3 ? 1 : 0; },                         // CHA: bonus star chance
  crowdFavor: function() { return Math.max(0, statMod(statB.cha) * 0.04); },                  // CHA: crowd morale dmg
  extraLives: function() { return statB.lives; }                                               // bonus lives from NFT
};

// ============================================================
// AUDIO ENGINE

var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSize = audioCtx.sampleRate * dur;
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

// ============================================================
// PARTICLES (enhanced)
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed, type) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = (speed || 3) * (0.5 + Math.random());
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1, color: color,
      size: 2 + Math.random() * 4,
      type: type || 'square',
      rot: Math.random() * Math.PI * 2,
      rotSpd: (Math.random() - 0.5) * 5
    });
  }
}

function spawnTextParticle(x, y, text, color, size) {
  particles.push({
    x: x, y: y, vx: (Math.random() - 0.5) * 1,
    vy: -2 - Math.random(), life: 1.5,
    color: color, size: size || 14,
    type: 'text', text: text, rot: 0, rotSpd: 0
  });
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.type !== 'text') p.vy += 0.1 * dt * 60;
    p.rot += p.rotSpd * dt;
    p.life -= dt * (p.type === 'text' ? 1.0 : 2.5);
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.min(1, p.life);
    if (p.type === 'text') {
      ctx.fillStyle = p.color;
      ctx.font = 'bold ' + p.size + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
    } else if (p.type === 'star') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      drawPixelStar(0, 0, p.size, p.color);
      ctx.restore();
    } else if (p.type === 'ring') {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1.5 - p.life), 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
}

function drawPixelStar(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x - size * 0.1, y - size * 0.5, size * 0.2, size);
  ctx.fillRect(x - size * 0.5, y - size * 0.1, size, size * 0.2);
  ctx.fillRect(x - size * 0.3, y - size * 0.3, size * 0.6, size * 0.6);
}

// ============================================================
// SCORE POPUP SYSTEM
// ============================================================
var scorePopups = [];
function addScorePopup(x, y, amount, label) {
  var color = '#FFD700';
  if (amount >= 300) color = '#FF4400';
  else if (amount >= 150) color = '#FFAA00';
  var text = '+' + amount;
  if (label) text = label + ' +' + amount;
  scorePopups.push({ x: x, y: y, text: text, color: color, life: 1.8, vy: -1.5 });
  spawnTextParticle(x, y - 10, text, color, amount >= 200 ? 16 : 12);
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.y += sp.vy * dt * 60;
    sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

// ============================================================
// FLASH & SCREEN EFFECTS
// ============================================================
var flashAlpha = 0, flashColor = '#fff';
function flash(color) { flashColor = color || '#fff'; flashAlpha = 0.5; }
function updateFlash(dt) { flashAlpha = Math.max(0, flashAlpha - dt * 4); }
function drawFlash() {
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

var screenTint = null;
var screenTintAlpha = 0;
function setScreenTint(color, alpha) { screenTint = color; screenTintAlpha = alpha; }
function drawScreenTint() {
  if (screenTint && screenTintAlpha > 0) {
    ctx.globalAlpha = screenTintAlpha;
    ctx.fillStyle = screenTint;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

  if (state === ST_KD_PLAYER) {
    player.mashCount++;
    SFX.getup();

  e.preventDefault();
  if (state === ST_TITLE) { startFight(); return; }
  if (state === ST_TUTORIAL) { tutorialStep++; tutorialTimer = 4; return; }
  for (var t = 0; t < e.changedTouches.length; t++) {
    var touch = e.changedTouches[t];
    var rect = canvas.getBoundingClientRect();
    var tx = (touch.clientX - rect.left) / SCALE;
    var ty = (touch.clientY - rect.top) / SCALE;
    handleTouchDown(tx, ty, touch.identifier);
  }
});
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var t = 0; t < e.changedTouches.length; t++) {
    var touch = e.changedTouches[t];
    var rect = canvas.getBoundingClientRect();
    var tx = (touch.clientX - rect.left) / SCALE;
    var ty = (touch.clientY - rect.top) / SCALE;
    handleTouchMove(tx, ty, touch.identifier);
  }
});
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  touchL = false; touchR = false; touchBlock = false;
  touchDodgeL = false; touchDodgeR = false; touchStar = false;
  swiping = false;
});

canvas.addEventListener('mousedown', function(e) {
  ensureAudio();
  if (state === ST_TITLE) { startFight(); return; }
  if (state === ST_TUTORIAL) { tutorialStep++; tutorialTimer = 4; return; }
  var rect = canvas.getBoundingClientRect();
  var tx = (e.clientX - rect.left) / SCALE;
  var ty = (e.clientY - rect.top) / SCALE;
  handleTouchDown(tx, ty, 0);
});
canvas.addEventListener('mouseup', function() {
  touchL = false; touchR = false; touchBlock = false;
  touchDodgeL = false; touchDodgeR = false; touchStar = false;
});

function handleTouchDown(tx, ty, id) {
  if (state === ST_KD_PLAYER) {
    player.mashCount++;
    SFX.getup();
    return;
  }
  swipeStartX = tx;
  swipeStartY = ty;
  swiping = true;

  if (ty > GAME_H * 0.75) {
    if (ty < GAME_H * 0.82 && tx > GAME_W * 0.3 && tx < GAME_W * 0.7) {
      touchStar = true; return;
    }
    if (tx > GAME_W * 0.35 && tx < GAME_W * 0.65) {
      touchBlock = true; return;
    }
    if (tx < GAME_W * 0.35) { touchL = true; return; }
    if (tx > GAME_W * 0.65) { touchR = true; return; }
  }
  if (tx < GAME_W * 0.2) { touchDodgeL = true; return; }
  if (tx > GAME_W * 0.8) { touchDodgeR = true; return; }
}

function handleTouchMove(tx, ty, id) {
  if (!swiping) return;
  var dx = tx - swipeStartX;
  if (Math.abs(dx) > 30) {
    if (dx < -30) touchDodgeL = true;
    if (dx > 30) touchDodgeR = true;
    swiping = false;
  }
  if ((ty - swipeStartY) > 30) {
    touchBlock = true;
    swiping = false;
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startFight() {
  currentOpponentIdx = 0;
  player.score = 0;
  player.totalKOs = 0;
  player.perfectRounds = 0;
  maxCombo = 0;
  if (!tutorialShown) {
    state = ST_TUTORIAL;
    tutorialStep = 0;
    tutorialTimer = 6;
    tutorialShown = true;
    return;
  }
  initFight();
}

function initFight() {
  var oppData = OPPONENTS[currentOpponentIdx];
  player.maxHp = derivedStats.maxHp();                // CON: max HP
  player.hp = player.maxHp;
  player.stars = 0;
  player.kd = 0;
  player.action = ACT_IDLE;
  player.actionTimer = 0;
  player.stunTimer = 0;
  player.invincible = 0;
  player.punchCooldown = 0;

  opp.hp = oppData.hp;
  opp.maxHp = oppData.hp;
  opp.kd = 0;
  opp.action = 'idle';
  opp.actionTimer = 0;
  opp.telegraphTimer = 0;
  opp.recoveryTimer = 0;
  opp.patternIdx = 0;
  opp.comboStep = 0;
  opp.stunTimer = 0;
  opp.hitTimer = 0;
  opp.phase = 1;
  opp.x = 0;
  opp.y = 0;
  opp.bobTimer = 0;
  opp.flashTimer = 0;
  opp.attackSide = 0;
  opp.vulnerable = false;
  opp.healTimer = 0;
  opp.poisonTimer = 0;
  opp.blindTimer = 0;
  opp.enraged = false;
  opp.phaseTransition = 0;

  currentRound = 1;
  roundTimer = ROUND_TIME;
  counterWindow = false;
  counterTimer = 0;
  comboCounter = 0;
  comboTimer = 0;
  particles = [];
  scorePopups = [];
  shakeTimer = 0;
  screenTint = null;
  screenTintAlpha = 0;

  state = ST_INTRO;
  introTimer = 3.5;
}

function nextOpponent() {
  currentOpponentIdx++;
  if (currentOpponentIdx >= OPPONENTS.length) {
    state = ST_WIN;
    stateTimer = 6;
    SFX.victory();
    return;
  }
  initFight();
}

function startRound() {
  state = ST_FIGHT;
  roundTimer = ROUND_TIME;
  opp.action = 'idle';
  opp.actionTimer = 1.5;
  SFX.bell();
}

function endRound() {
  currentRound++;
  if (currentRound > 3) {
    state = ST_DECISION;
    stateTimer = 3;
    var oppHpPct = opp.hp / opp.maxHp;
    var plrHpPct = player.hp / player.maxHp;
    if (plrHpPct >= oppHpPct) {
      setTimeout(function() {
        var bonus = Math.floor(1000 * derivedStats.scoreMult());  // INT: score mult
        player.score += bonus;
        addScorePopup(GAME_W / 2, GAME_H * 0.4, bonus, 'DECISION');
        nextOpponent();
      }, 3000);
    } else {
      setTimeout(function() {
        state = ST_LOSE;
        stateTimer = 4;
        SFX.defeat();
      }, 3000);
    }
    return;
  }
  state = ST_BETWEEN_ROUNDS;
  stateTimer = 3;
  // Heal player between rounds (WIS bonus)
  var healAmt = 15 + derivedStats.healBonus();                    // WIS: heal bonus
  player.hp = Math.min(player.maxHp, player.hp + healAmt);
  // Soda Pop heals
  var oppData = OPPONENTS[currentOpponentIdx];
  if (oppData.heals) {
    opp.hp = Math.min(opp.maxHp, opp.hp + 40);
    opp.healTimer = 2;
  }
}

// ============================================================
// OPPONENT AI
// ============================================================
function updateOpponentAI(dt) {
  var oppData = OPPONENTS[currentOpponentIdx];

  opp.bobTimer += dt * 2;
  if (opp.poisonTimer > 0) opp.poisonTimer -= dt;
  if (opp.blindTimer > 0) opp.blindTimer -= dt;

  // Boss phase transition
  if (opp.phaseTransition > 0) {
    opp.phaseTransition -= dt;
    return;
  }

  if (opp.stunTimer > 0) { opp.stunTimer -= dt; return; }
  if (opp.hitTimer > 0) { opp.hitTimer -= dt; return; }
  if (opp.recoveryTimer > 0) { opp.recoveryTimer -= dt; return; }

  // Enrage check for bosses at 30% HP
  if (oppData.isBoss && !opp.enraged && opp.hp < opp.maxHp * 0.3) {
    opp.enraged = true;
    SFX.roar();
    flash('#FF0000');
    shakeTimer = 0.5;
    shakeIntensity = 6;
    spawnTextParticle(GAME_W / 2, GAME_H * 0.3, 'TOXIC RAGE!', '#e6482e', 20);
    spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FF0000', 20, 5, 'ring');
  }

  // Idle -> choose attack
  if (opp.action === 'idle') {
    opp.actionTimer -= dt;
    if (opp.actionTimer <= 0) {
      var pattern = oppData.patterns[opp.patternIdx % oppData.patterns.length];
      opp.patternIdx++;
      // Boss enrage: faster attacks, add speed_rush randomly
      if (opp.enraged && Math.random() < 0.3) pattern = 'speed_rush';
      beginAttack(pattern);
    }
    return;
  }

  // Telegraphing
  if (opp.action === 'telegraph') {
    opp.telegraphTimer -= dt;
    opp.flashTimer += dt * 10;
    if (opp.telegraphTimer <= 0) {
      executeAttack();
    }
    return;
  }

  // Attacking
  if (opp.action === 'attacking') {
    opp.actionTimer -= dt;
    if (opp.actionTimer <= 0) {
      finishAttack();
    }
    return;
  }

  // Vulnerable (King Hippo style)
  if (opp.action === 'vulnerable') {
    opp.actionTimer -= dt;
    opp.vulnerable = true;
    if (opp.actionTimer <= 0) {
      opp.vulnerable = false;
      opp.action = 'idle';
      opp.actionTimer = 1.5 / oppData.speed;
    }
    return;
  }
}

function beginAttack(pattern) {
  var oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'telegraph';
  // INT: baseling sees telegraph longer
  opp.telegraphTimer = oppData.telegraph + derivedStats.telegraphBonus();
  opp.currentPattern = pattern;
  opp.comboStep = 0;
  opp.flashTimer = 0;

  // Enrage speeds up telegraph
  if (opp.enraged) opp.telegraphTimer *= 0.6;

  switch (pattern) {
    case 'slow_jab': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'fast_jab': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'left_right_combo': opp.attackSide = 0; break;
    case 'headbutt': opp.attackSide = 2; break;
    case 'mouth_open': opp.attackSide = 2; break;
    case 'triple_combo': opp.attackSide = 0; break;
    case 'uppercut': opp.attackSide = 2; break;
    case 'taunt_counter': opp.attackSide = 2; break;
    case 'magic_feint': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'teleport': opp.attackSide = Math.random() < 0.5 ? 0 : 1; break;
    case 'speed_rush': opp.attackSide = 0; break;
    case 'poison_spit': opp.attackSide = 2; break;
    case 'spore_cloud': opp.attackSide = 2; break;
    case 'spin_strike': opp.attackSide = 2; break;
    case 'sand_blind': opp.attackSide = 2; break;
    case 'arcane_blast': opp.attackSide = 2; break;
    case 'furnace_blast': opp.attackSide = 2; break;
    case 'dark_nova': opp.attackSide = 2; break;
    default: opp.attackSide = 0;
  }
}

function executeAttack() {
  var oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'attacking';
  opp.actionTimer = 0.15;

  var dodging = (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R);
  var blocking = (player.action === ACT_BLOCK);

  var avoided = false;
  var blocked = false;

  // Special pattern handling
  if (opp.currentPattern === 'mouth_open') {
    opp.action = 'vulnerable';
    opp.actionTimer = 1.5;
    opp.vulnerable = true;
    return;
  }

  if (opp.currentPattern === 'taunt_counter') {
    counterWindow = true;
    counterTimer = 0.8 + derivedStats.counterWindow() - 0.5;    // DEX: counter window
    opp.action = 'vulnerable';
    opp.actionTimer = counterTimer;
    opp.vulnerable = true;
    return;
  }

  if (opp.currentPattern === 'poison_spit') {
    if (!dodging) {
      opp.poisonTimer = 3;
      SFX.poison();
      spawnParticles(GAME_W / 2, GAME_H * 0.6, '#00FF00', 10, 3);
      spawnTextParticle(GAME_W / 2, GAME_H * 0.55, 'SPORE SICK!', '#38d973', 14);
      player.hp -= Math.floor(3 * (1 - derivedStats.damageReduction()));  // CON: reduce poison
    } else {
      avoided = true;
      SFX.dodge();
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'spore_cloud') {
    if (!dodging && !blocking) {
      player.stunTimer = 0.8;
      SFX.poison();
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#a855f7', 15, 4);
      spawnTextParticle(GAME_W / 2, GAME_H * 0.45, 'SPORED!', '#a855f7', 14);
    } else {
      if (dodging) { avoided = true; SFX.dodge(); }
      if (blocking) { blocked = true; SFX.block(); }
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'spin_strike') {
    // Must dodge, blocking only reduces half
    if (dodging) { avoided = true; SFX.dodge(); counterWindow = true; counterTimer = derivedStats.counterWindow(); }
    else if (blocking) {
      player.hp -= Math.floor(oppData.damage * 0.5 * (1 - derivedStats.damageReduction()));
      SFX.block();
      blocked = true;
    } else {
      player.hp -= Math.floor(oppData.damage * 1.2);
      player.action = ACT_HIT;
      player.actionTimer = 0.4;
      player.stunTimer = 0.5;
      SFX.hit();
      flash('#FF0000');
      shakeTimer = 0.3;
      shakeIntensity = 5;
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'sand_blind') {
    if (!dodging) {
      opp.blindTimer = 2.5;
      SFX.poison();
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#DDAA44', 20, 4);
      spawnTextParticle(GAME_W / 2, GAME_H * 0.45, 'MOLD BLIND!', '#7a444a', 14);
    } else {
      avoided = true;
      SFX.dodge();
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'arcane_blast') {
    // Wide AoE — must dodge to specific side
    var safeDir = Math.random() < 0.5 ? ACT_DODGE_L : ACT_DODGE_R;
    if (player.action === safeDir) {
      avoided = true;
      SFX.dodge();
      counterWindow = true;
      counterTimer = derivedStats.counterWindow();
    } else if (dodging) {
      // Wrong dodge direction, half damage
      player.hp -= Math.floor(oppData.damage * 0.5 * (1 - derivedStats.damageReduction()));
      SFX.hit();
    } else {
      player.hp -= Math.floor(oppData.damage * 1.3);
      player.action = ACT_HIT;
      player.actionTimer = 0.5;
      player.stunTimer = 0.6;
      SFX.hit();
      SFX.magic();
      flash('#9944FF');
      shakeTimer = 0.4;
      shakeIntensity = 6;
      spawnParticles(GAME_W / 2, GAME_H * 0.6, '#9944FF', 15, 5, 'ring');
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'furnace_blast') {
    // Reactor Tyson: large fire blast
    if (dodging) {
      avoided = true;
      SFX.dodge();
      counterWindow = true;
      counterTimer = derivedStats.counterWindow();
    } else if (blocking) {
      player.hp -= Math.floor(oppData.damage * 0.6 * (1 - derivedStats.damageReduction()));
      SFX.block();
      blocked = true;
    } else {
      player.hp -= Math.floor(oppData.damage * 1.4);
      player.action = ACT_HIT;
      player.actionTimer = 0.5;
      player.stunTimer = 0.7;
      SFX.hit();
      flash('#FF4400');
      shakeTimer = 0.4;
      shakeIntensity = 7;
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#FF8800', 20, 6);
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#FF4400', 10, 4);
      spawnTextParticle(GAME_W / 2, GAME_H * 0.4, 'POOP BLAST!', '#e6482e', 18);
    }
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'dark_nova') {
    // Boss ultimate: screen-wide, must perfect dodge
    SFX.magic();
    SFX.roar();
    if (dodging) {
      avoided = true;
      SFX.dodge();
      counterWindow = true;
      counterTimer = derivedStats.counterWindow() + 0.3;
      spawnTextParticle(GAME_W / 2, GAME_H * 0.4, 'PERFECT DODGE!', '#FFD700', 16);
    } else {
      var novaDmg = Math.floor(oppData.damage * 2.0 * (1 - derivedStats.damageReduction()));
      if (blocking) novaDmg = Math.floor(novaDmg * 0.6);
      player.hp -= novaDmg;
      player.action = ACT_HIT;
      player.actionTimer = 0.6;
      player.stunTimer = 0.8;
      flash('#8800FF');
      shakeTimer = 0.6;
      shakeIntensity = 10;
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#8800FF', 30, 7, 'ring');
      spawnParticles(GAME_W / 2, GAME_H * 0.5, '#FF00FF', 15, 5);
      spawnTextParticle(GAME_W / 2, GAME_H * 0.35, 'BLIGHT NOVA!', '#a855f7', 20);
    }
    if (player.hp <= 0) playerKnockdown();
    finishAttack();
    return;
  }

  if (opp.currentPattern === 'teleport') {
    opp.x = (Math.random() < 0.5 ? -30 : 30);
    opp.attackSide = opp.x < 0 ? 0 : 1;
    SFX.magic();
    spawnParticles(GAME_W / 2, GAME_H * 0.25, '#9944FF', 8, 3);
  }

  // Standard dodge checking
  if (dodging) {
    if (opp.attackSide === 0 && player.action === ACT_DODGE_R) avoided = true;
    else if (opp.attackSide === 1 && player.action === ACT_DODGE_L) avoided = true;
    else if (opp.attackSide === 2 && (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R)) avoided = true;
    if (avoided) {
      counterWindow = true;
      counterTimer = derivedStats.counterWindow();                // DEX: counter window
      SFX.dodge();
    }
  }

  if (blocking && !avoided) {
    if (opp.currentPattern !== 'uppercut' && opp.currentPattern !== 'headbutt') {
      blocked = true;
      SFX.block();
      player.hp -= Math.floor(oppData.damage * 0.2 * (1 - derivedStats.damageReduction())); // CON: block reduction
    }
  }

  if (!avoided && !blocked) {
    var dmg = oppData.damage;
    if (opp.currentPattern === 'uppercut') dmg = Math.floor(dmg * 1.5);
    if (opp.currentPattern === 'headbutt') dmg = Math.floor(dmg * 1.3);
    if (opp.currentPattern === 'speed_rush') dmg = Math.floor(dmg * 0.7);
    // CON: damage reduction
    dmg = Math.floor(dmg * (1 - derivedStats.damageReduction()));
    player.hp -= dmg;
    player.action = ACT_HIT;
    player.actionTimer = 0.3;
    player.stunTimer = 0.4;
    comboCounter = 0;
    SFX.hit();
    flash('#FF0000');
    shakeTimer = 0.2;
    shakeIntensity = 4;
    spawnParticles(GAME_W / 2, GAME_H * 0.6, '#FF4444', 5, 3);

    if (player.hp <= 0) {
      playerKnockdown();
    }
  }

  // Combo handling
  if (opp.currentPattern === 'left_right_combo' && opp.comboStep === 0) {
    opp.comboStep = 1;
    opp.actionTimer = 0.3;
    opp.attackSide = 1;
    return;
  }
  if (opp.currentPattern === 'triple_combo' && opp.comboStep < 2) {
    opp.comboStep++;
    opp.actionTimer = 0.2;
    opp.attackSide = opp.comboStep % 2;
    return;
  }
  if (opp.currentPattern === 'speed_rush' && opp.comboStep < 4) {
    opp.comboStep++;
    opp.actionTimer = 0.12;
    opp.attackSide = opp.comboStep % 2;
    return;
  }
}

function finishAttack() {
  var oppData = OPPONENTS[currentOpponentIdx];
  opp.action = 'idle';
  var recovSpd = opp.enraged ? oppData.speed * 1.5 : oppData.speed;
  opp.recoveryTimer = oppData.recovery / recovSpd;
  opp.actionTimer = (1.0 + Math.random() * 0.5) / recovSpd;
  opp.x = opp.x * 0.5;
  counterWindow = false;
}

function playerKnockdown() {
  player.kd++;
  player.hp = 0;
  comboCounter = 0;
  if (player.kd >= KD_TO_TKO + derivedStats.extraLives()) {     // bonus lives from NFT
    state = ST_LOSE;
    stateTimer = 4;
    SFX.defeat();
    SFX.knockdown();
    return;
  }
  state = ST_KD_PLAYER;
  // WIS: easier getup
  player.mashCount = 0;
  player.mashTimer = GETUP_TIME;
  SFX.knockdown();
  flash('#FF0000');
  shakeTimer = 0.5;
  shakeIntensity = 8;
}

function opponentKnockdown() {
  opp.kd++;
  opp.stunTimer = 2.0;
  SFX.knockdown();
  flash('#FFFF00');
  shakeTimer = 0.3;
  shakeIntensity = 6;
  spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFFF00', 15, 5, 'star');
  var koScore = Math.floor(500 * derivedStats.scoreMult());      // INT: score mult
  player.score += koScore;
  addScorePopup(GAME_W / 2, GAME_H * 0.3, koScore, 'KO');

  if (opp.kd >= KD_TO_TKO) {
    state = ST_TKO;
    stateTimer = 4;
    SFX.victory();
    var tkoScore = Math.floor(2000 * derivedStats.scoreMult());
    player.score += tkoScore;
    player.totalKOs++;
    addScorePopup(GAME_W / 2, GAME_H * 0.2, tkoScore, 'TKO');
    spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFD700', 30, 7, 'star');
    return;
  }

  opp.hp = Math.max(1, opp.hp);
  opp.action = 'idle';
  opp.actionTimer = 2.0;

  // Boss phase transition
  var oppData = OPPONENTS[currentOpponentIdx];
  if (oppData.phases && opp.phase < oppData.phases) {
    opp.phase++;
    opp.phaseTransition = 2.0;
    SFX.bossPhase();
    flash('#FF00FF');
    shakeTimer = 1.0;
    shakeIntensity = 8;
    spawnTextParticle(GAME_W / 2, GAME_H * 0.25, 'PHASE ' + opp.phase + '!', '#FF00FF', 22);
    spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FF00FF', 25, 6, 'ring');
    // Each phase heals boss slightly and boosts speed
    opp.hp = Math.min(opp.maxHp, opp.hp + Math.floor(opp.maxHp * 0.15));
  }
}

// ============================================================
// PLAYER ACTIONS
// ============================================================
function doPlayerPunch(side) {
  if (player.stunTimer > 0 || player.punchCooldown > 0) return;
  if (player.action !== ACT_IDLE && player.action !== ACT_BLOCK) return;

  player.action = side === 0 ? ACT_PUNCH_L : ACT_PUNCH_R;
  player.actionTimer = 0.2;
  player.punchCooldown = derivedStats.punchCooldown();           // DEX: faster cooldown
  SFX.punch();

  if (opp.stunTimer > 0 || opp.hitTimer > 0) return;

  var oppData = OPPONENTS[currentOpponentIdx];
  var isCrit = Math.random() < derivedStats.critChance();        // CHA: crit chance

  // Counter punch
  if (counterWindow) {
    counterWindow = false;
    var dmg = Math.floor(20 * derivedStats.punchDamage());       // STR: punch damage
    if (opp.vulnerable) dmg = Math.floor(40 * derivedStats.punchDamage());
    if (isCrit) { dmg = Math.floor(dmg * 1.5); SFX.crit(); critFlash = 0.3; }
    opp.hp -= dmg;
    opp.hitTimer = 0.3;
    player.stars = Math.min(MAX_STARS, player.stars + 1 + derivedStats.starBonus()); // CHA: bonus star
    if (player.stars > MAX_STARS) player.stars = MAX_STARS;
    SFX.starEarn();
    flash('#FFFF00');
    comboCounter++;
    comboTimer = 2.0;
    if (comboCounter > maxCombo) maxCombo = comboCounter;
    var pts = Math.floor(200 * derivedStats.scoreMult());
    player.score += pts;
    addScorePopup(GAME_W / 2 + (side === 0 ? -30 : 30), GAME_H * 0.3, pts, isCrit ? 'CRIT' : 'COUNTER');
    spawnParticles(GAME_W / 2 + (side === 0 ? -20 : 20), GAME_H * 0.3, '#FFD700', 8, 4, 'star');
    if (isCrit) spawnParticles(GAME_W / 2, GAME_H * 0.3, '#FF4400', 6, 5, 'ring');
    checkOpponentKO();
    return;
  }

  // Hit during vulnerability
  if (opp.vulnerable) {
    var vdmg = Math.floor(25 * derivedStats.punchDamage());
    if (isCrit) { vdmg = Math.floor(vdmg * 1.5); SFX.crit(); critFlash = 0.3; }
    opp.hp -= vdmg;
    opp.hitTimer = 0.2;
    SFX.hit();
    comboCounter++;
    comboTimer = 2.0;
    if (comboCounter > maxCombo) maxCombo = comboCounter;
    var vpts = Math.floor(100 * derivedStats.scoreMult());
    player.score += vpts;
    addScorePopup(GAME_W / 2, GAME_H * 0.3, vpts, isCrit ? 'CRIT' : '');
    spawnParticles(GAME_W / 2 + (side === 0 ? -15 : 15), GAME_H * 0.3, oppData.color, 5, 3);
    // CHA: crowd favor = extra morale dmg
    opp.hp -= Math.floor(derivedStats.crowdFavor() * 5);
    checkOpponentKO();
    return;
  }

  // Normal attack
  if (opp.action === 'idle' || opp.recoveryTimer > 0) {
    var ndmg = Math.floor(10 * (1 - oppData.defense) * derivedStats.punchDamage());
    if (oppData.weakSpot && !opp.vulnerable) ndmg = 1;
    if (isCrit) { ndmg = Math.floor(ndmg * 1.8); SFX.crit(); critFlash = 0.3; }
    opp.hp -= Math.max(1, ndmg);
    opp.hitTimer = 0.15;
    comboCounter++;
    comboTimer = 2.0;
    if (comboCounter > maxCombo) maxCombo = comboCounter;
    var npts = Math.floor(50 * derivedStats.scoreMult());
    player.score += npts;
    addScorePopup(GAME_W / 2 + (side === 0 ? -20 : 20), GAME_H * 0.35, npts, isCrit ? 'CRIT' : '');
    spawnParticles(GAME_W / 2 + (side === 0 ? -10 : 10), GAME_H * 0.3, '#FFF', 3, 2);
    checkOpponentKO();
    return;
  }

  // Don Flamenco counter
  if (oppData.counters && opp.action === 'idle') {
    opp.action = 'telegraph';
    opp.telegraphTimer = 0.3;
    opp.currentPattern = 'fast_jab';
    opp.attackSide = side;
  }
}

function doStarPunch() {
  if (player.stars <= 0 || player.stunTimer > 0) return;
  if (player.action !== ACT_IDLE && player.action !== ACT_BLOCK) return;

  player.stars--;
  player.action = ACT_STAR_PUNCH;
  player.actionTimer = 0.5;
  player.punchCooldown = 0.6;
  SFX.starPunch();

  var oppData = OPPONENTS[currentOpponentIdx];
  var dmg = Math.floor(50 * derivedStats.starDamage() * (1 - oppData.defense * 0.5)); // STR: star damage
  if (opp.vulnerable) dmg *= 2;
  opp.hp -= dmg;
  opp.stunTimer = 1.0;
  opp.hitTimer = 0.5;
  flash('#FFFF00');
  shakeTimer = 0.3;
  shakeIntensity = 5;
  var spts = Math.floor(300 * derivedStats.scoreMult());
  player.score += spts;
  addScorePopup(GAME_W / 2, GAME_H * 0.2, spts, 'STAR');
  spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFD700', 20, 6, 'star');
  spawnParticles(GAME_W / 2, GAME_H * 0.25, '#FFF', 10, 4, 'ring');
  checkOpponentKO();
}

function doDodge(dir) {
  if (player.stunTimer > 0) return;
  if (player.action === ACT_DODGE_L || player.action === ACT_DODGE_R) return;
  player.action = dir === 0 ? ACT_DODGE_L : ACT_DODGE_R;
  player.actionTimer = derivedStats.dodgeWindow();               // DEX: dodge duration
  player.invincible = derivedStats.dodgeWindow();
}

function doBlock() {
  if (player.stunTimer > 0) return;
  player.action = ACT_BLOCK;
}

function releaseBlock() {
  if (player.action === ACT_BLOCK) {
    player.action = ACT_IDLE;
  }
}

function checkOpponentKO() {
  if (opp.hp <= 0) {
    opp.hp = 0;
    opponentKnockdown();
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  gameTime += dt;
  updateParticles(dt);
  updateScorePopups(dt);
  updateFlash(dt);
  if (shakeTimer > 0) shakeTimer -= dt;
  if (critFlash > 0) critFlash -= dt;
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCounter = 0;
  }
  if (counterTimer > 0) {
    counterTimer -= dt;
    if (counterTimer <= 0) counterWindow = false;
  }

  switch (state) {
    case ST_TUTORIAL:
      tutorialTimer -= dt;
      if (tutorialStep >= 5 || tutorialTimer <= 0) {
        initFight();
      }
      break;

    case ST_INTRO:
      introTimer -= dt;
      if (introTimer <= 0) startRound();
      break;

    case ST_FIGHT:
      updateFight(dt);
      break;

    case ST_KD_PLAYER:
      player.mashTimer -= dt;
      var mashNeeded = GETUP_MASH - derivedStats.mashReduction();  // WIS: easier getup
      if (player.mashCount >= mashNeeded) {
        // CON: recover more HP on getup
        player.hp = Math.floor(player.maxHp * (0.3 + statMod(statB.con) * 0.02));
        player.action = ACT_IDLE;
        player.stunTimer = 0;
        player.invincible = 1.0;
        state = ST_FIGHT;
        SFX.bell();
      } else if (player.mashTimer <= 0) {
        player.kd = KD_TO_TKO + derivedStats.extraLives();
        state = ST_LOSE;
        stateTimer = 4;
        SFX.defeat();
      }
      break;

    case ST_KD_OPPONENT:
      stateTimer -= dt;
      if (stateTimer <= 0) {
        opp.action = 'idle';
        opp.actionTimer = 1.5;
        state = ST_FIGHT;
      }
      break;

    case ST_TKO:
      stateTimer -= dt;
      if (stateTimer <= 0) nextOpponent();
      break;

    case ST_WIN:
      stateTimer -= dt;
      if (stateTimer <= 0) { state = ST_TITLE; }
      break;

    case ST_LOSE:
      stateTimer -= dt;
      if (stateTimer <= 0) { state = ST_TITLE; }
      break;

    case ST_BETWEEN_ROUNDS:
      stateTimer -= dt;
      if (stateTimer <= 0) startRound();
      break;

    case ST_DECISION:
      stateTimer -= dt;
      break;
  }
}

function updateFight(dt) {
  roundTimer -= dt;
  if (roundTimer <= 0) {
    roundTimer = 0;
    endRound();
    return;
  }

  if (player.punchCooldown > 0) player.punchCooldown -= dt;
  if (player.stunTimer > 0) player.stunTimer -= dt;
  if (player.invincible > 0) player.invincible -= dt;
  if (player.actionTimer > 0) {
    player.actionTimer -= dt;
    if (player.actionTimer <= 0 && player.action !== ACT_BLOCK) {
      player.action = ACT_IDLE;
    }
  }

  // Poison tick damage
  if (opp.poisonTimer > 0) {
    player.hp -= Math.floor(dt * 3 * (1 - derivedStats.damageReduction())); // CON: resist poison
    if (player.hp <= 0) playerKnockdown();
  }

  processInput();
  updateOpponentAI(dt);
}

function processInput() {
  var leftPunch = keys['KeyA'] || keys['ArrowLeft'] || touchL;
  var rightPunch = keys['KeyD'] || keys['ArrowRight'] || touchR;
  var block = keys['KeyS'] || keys['ArrowDown'] || touchBlock;
  var dodgeL = (keys['KeyA'] && keys['KeyS']) || (keys['ArrowLeft'] && keys['ArrowDown']) || touchDodgeL;
  var dodgeR = (keys['KeyD'] && keys['KeyS']) || (keys['ArrowRight'] && keys['ArrowDown']) || touchDodgeR;
  var starPunch = keys['KeyW'] || keys['ArrowUp'] || keys['Space'] || touchStar;

  if (dodgeL) { doDodge(0); touchDodgeL = false; return; }
  if (dodgeR) { doDodge(1); touchDodgeR = false; return; }
  if (starPunch) { doStarPunch(); touchStar = false; return; }
  if (block) { doBlock(); return; } else { releaseBlock(); }
  if (leftPunch) { doPlayerPunch(0); touchL = false; return; }
  if (rightPunch) { doPlayerPunch(1); touchR = false; return; }
}

// ============================================================
// DRAWING HELPERS — NES PIXEL ART
// ============================================================
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawPixelBorder(x, y, w, h, color, borderColor) {
  ctx.fillStyle = borderColor || '#000';
  ctx.fillRect(Math.floor(x) - 1, Math.floor(y) - 1, Math.floor(w) + 2, Math.floor(h) + 2);
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawNESText(text, x, y, color, size, align) {
  ctx.fillStyle = color || '#FFF';
  ctx.font = (size || 10) + 'px monospace';
  ctx.textAlign = align || 'center';
  // NES shadow effect
  ctx.fillStyle = '#000';
  ctx.fillText(text, x + 1, y + 1);
  ctx.fillStyle = color || '#FFF';
  ctx.fillText(text, x, y);
}

// ============================================================
// DRAWING - RING / BACKGROUND (themed per zone)
// ============================================================
function drawRing() {
  var theme = ZONE_THEMES[currentOpponentIdx] || ZONE_THEMES[0];

  // Background
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Ring mat
  ctx.fillStyle = theme.ring;
  ctx.fillRect(20, GAME_H * 0.4, GAME_W - 40, GAME_H * 0.45);

  // Mat pattern (NES pixel pattern)
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#FFF';
  for (var px = 24; px < GAME_W - 40; px += 8) {
    for (var py = GAME_H * 0.41; py < GAME_H * 0.84; py += 8) {
      if ((px + py) % 16 < 8) ctx.fillRect(px, py, 4, 4);
    }
  }
  ctx.globalAlpha = 1;

  // Ring ropes
  ctx.strokeStyle = theme.ropes;
  ctx.lineWidth = 3;
  for (var r = 0; r < 3; r++) {
    var ry = GAME_H * 0.2 + r * 40;
    ctx.beginPath();
    ctx.moveTo(10, ry);
    ctx.lineTo(GAME_W - 10, ry);
    ctx.stroke();
  }

  // Ring posts (pixel art)
  drawPixelBorder(5, GAME_H * 0.15, 12, GAME_H * 0.35, '#999', '#555');
  drawPixelBorder(GAME_W - 17, GAME_H * 0.15, 12, GAME_H * 0.35, '#999', '#555');
  // Post caps
  drawPixelRect(3, GAME_H * 0.14, 16, 6, theme.ropes);
  drawPixelRect(GAME_W - 19, GAME_H * 0.14, 16, 6, theme.ropes);

  // Crowd
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GAME_W, GAME_H * 0.15);
  for (var ci = 0; ci < 50; ci++) {
    ctx.fillStyle = theme.crowd[ci % 5];
    var cx = (ci * 9 + 3) % GAME_W;
    var cy = GAME_H * 0.02 + (ci % 4) * GAME_H * 0.03;
    // Pixel heads
    ctx.fillRect(cx - 3, cy - 3, 6, 6);
    // Bobbing
    if (Math.sin(gameTime * 2 + ci) > 0.5) {
      ctx.fillRect(cx - 3, cy - 5, 6, 2);
    }
  }

  // Blind overlay
  if (opp.blindTimer > 0) {
    ctx.globalAlpha = Math.min(0.6, opp.blindTimer * 0.25);
    ctx.fillStyle = '#DDAA44';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }

  // Zone name (subtle)
  ctx.globalAlpha = 0.15;
  drawNESText(theme.name, GAME_W / 2, GAME_H * 0.39, theme.ropes, 10);
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAWING - OPPONENT
// ============================================================
function drawOpponent() {
  var oppData = OPPONENTS[currentOpponentIdx];
  var baseX = GAME_W / 2 + opp.x;
  var baseY = GAME_H * 0.25;
  var bob = Math.sin(opp.bobTimer) * 3;

  ctx.save();

  // Hit reaction
  if (opp.hitTimer > 0) {
    ctx.translate(Math.random() * 4 - 2, Math.random() * 4 - 2);
  }

  // Phase transition glow
  if (opp.phaseTransition > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(opp.phaseTransition * 10) * 0.3;
    var ptGlow = opp.phaseTransition * 20;
    ctx.strokeStyle = '#FF00FF';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(baseX, baseY + 35, 60 + ptGlow, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Knockdown animation
  if (opp.kd > 0 && opp.stunTimer > 1.0) {
    ctx.translate(0, (2.0 - opp.stunTimer) * 50);
    ctx.globalAlpha = 0.5 + opp.stunTimer * 0.25;
  }

  var headX = baseX;
  var headY = baseY + bob;
  var bodyX = baseX;
  var bodyY = baseY + 70 + bob;

  // Body shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(bodyX, bodyY + 70, 50, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = oppData.bodyColor;
  ctx.beginPath();
  ctx.ellipse(bodyX, bodyY, 55, 65, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Arms
  drawOpponentArms(baseX, bodyY, oppData);

  // Head
  ctx.fillStyle = oppData.color;
  ctx.beginPath();
  ctx.ellipse(headX, headY, 40, 45, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Eyes
  var eyeFlash = (opp.action === 'telegraph' && Math.floor(opp.flashTimer) % 2 === 0);
  var enrageEyes = opp.enraged && Math.sin(gameTime * 8) > 0;
  ctx.fillStyle = eyeFlash ? '#FF0000' : (enrageEyes ? '#FF0000' : oppData.eyeColor);
  ctx.beginPath();
  ctx.ellipse(headX - 12, headY - 5, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headX + 12, headY - 5, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (track player)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(headX - 11, headY - 4, 3, 0, Math.PI * 2);
  ctx.arc(headX + 13, headY - 4, 3, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (opp.vulnerable && oppData.weakSpot) {
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 20, 15, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tongue
    ctx.fillStyle = '#FF6666';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 28, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (opp.hitTimer > 0) {
    ctx.fillStyle = '#600';
    ctx.beginPath();
    ctx.ellipse(headX, headY + 18, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (opp.enraged) {
    ctx.fillStyle = '#800';
    ctx.beginPath();
    ctx.moveTo(headX - 12, headY + 14);
    ctx.lineTo(headX + 12, headY + 14);
    ctx.lineTo(headX, headY + 24);
    ctx.closePath();
    ctx.fill();
    // Fangs
    ctx.fillStyle = '#FFF';
    ctx.fillRect(headX - 8, headY + 14, 3, 5);
    ctx.fillRect(headX + 5, headY + 14, 3, 5);
  } else {
    ctx.fillStyle = '#400';
    ctx.beginPath();
    ctx.moveTo(headX - 10, headY + 15);
    ctx.lineTo(headX + 10, headY + 15);
    ctx.lineTo(headX, headY + 22);
    ctx.closePath();
    ctx.fill();
  }

  // Opponent-specific features
  drawOpponentFeatures(headX, headY, bodyX, bodyY, oppData);

  // Telegraph indicator
  if (opp.action === 'telegraph') {
    ctx.fillStyle = '#FF0000';
    ctx.globalAlpha = 0.3 + Math.sin(opp.flashTimer * 5) * 0.3;
    var indicatorX = opp.attackSide === 0 ? baseX - 60 : (opp.attackSide === 1 ? baseX + 60 : baseX);
    ctx.beginPath();
    ctx.arc(indicatorX, bodyY - 20, 15, 0, Math.PI * 2);
    ctx.fill();
    // Exclamation mark
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#FF0000';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('!', indicatorX, bodyY - 35);
    ctx.globalAlpha = 1;
  }

  // Enrage aura
  if (opp.enraged) {
    ctx.strokeStyle = '#FF0000';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.3 + Math.sin(gameTime * 6) * 0.2;
    ctx.beginPath();
    ctx.ellipse(bodyX, bodyY - 10, 65, 80, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawOpponentArms(baseX, bodyY, oppData) {
  var leftArmX = baseX - 60;
  var rightArmX = baseX + 60;
  var armY = bodyY - 10;

  var leftExt = 0, rightExt = 0;

  if (opp.action === 'attacking') {
    if (opp.attackSide === 0) leftExt = 1;
    else if (opp.attackSide === 1) rightExt = 1;
    else { leftExt = 0.5; rightExt = 0.5; }
  }
  if (opp.action === 'telegraph') {
    if (opp.attackSide === 0) leftExt = -0.3;
    else if (opp.attackSide === 1) rightExt = -0.3;
    else { leftExt = -0.2; rightExt = -0.2; }
  }

  // Left arm
  ctx.fillStyle = oppData.color;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(leftArmX - leftExt * 30, armY + leftExt * 40, 18, 22, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Left glove
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(leftArmX - 5 - leftExt * 40, armY + 20 + leftExt * 50, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Glove highlight
  ctx.fillStyle = '#FF4444';
  ctx.beginPath();
  ctx.arc(leftArmX - 8 - leftExt * 40, armY + 17 + leftExt * 50, 5, 0, Math.PI * 2);
  ctx.fill();

  // Right arm
  ctx.fillStyle = oppData.color;
  ctx.beginPath();
  ctx.ellipse(rightArmX + rightExt * 30, armY + rightExt * 40, 18, 22, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Right glove
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(rightArmX + 5 + rightExt * 40, armY + 20 + rightExt * 50, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#FF4444';
  ctx.beginPath();
  ctx.arc(rightArmX + 8 + rightExt * 40, armY + 17 + rightExt * 50, 5, 0, Math.PI * 2);
  ctx.fill();
}

function drawOpponentFeatures(headX, headY, bodyX, bodyY, oppData) {
  var idx = currentOpponentIdx;

  switch (idx) {
    case 0: // Glob the Timid - slime drips + bubbles
      ctx.fillStyle = '#33FF33';
      ctx.globalAlpha = 0.5;
      for (var s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.ellipse(headX - 20 + s * 20, headY + 40 + Math.sin(opp.bobTimer + s) * 5, 4, 8, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // Bubbles
      ctx.strokeStyle = '#88FF88';
      ctx.lineWidth = 1;
      for (var b = 0; b < 4; b++) {
        var bx = headX - 15 + b * 10;
        var by = headY - 30 - Math.abs(Math.sin(gameTime * 2 + b * 1.5)) * 20;
        ctx.beginPath();
        ctx.arc(bx, by, 3, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      break;

    case 1: // Piston Poop - mechanical arms + gears
      ctx.fillStyle = '#666';
      ctx.fillRect(bodyX - 45, bodyY - 30, 8, 40);
      ctx.fillRect(bodyX + 37, bodyY - 30, 8, 40);
      // Gear
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bodyX - 41, bodyY - 10, 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(bodyX + 41, bodyY - 10, 8, 0, Math.PI * 2);
      ctx.stroke();
      // Steam
      if (opp.action === 'telegraph') {
        ctx.fillStyle = '#CCC';
        ctx.globalAlpha = 0.4;
        for (var st = 0; st < 3; st++) {
          ctx.beginPath();
          ctx.arc(bodyX - 50 + st * 5, bodyY - 40 - st * 8 - Math.sin(gameTime * 4) * 5, 4 + st * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      break;

    case 2: // Bald Baseling - shiny head + bandage
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(headX - 10, headY - 20, 15, 10, -0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bandage
      ctx.fillStyle = '#DDCCAA';
      ctx.save();
      ctx.translate(headX + 15, headY - 10);
      ctx.rotate(0.3);
      ctx.fillRect(-4, -8, 8, 16);
      ctx.restore();
      break;

    case 3: // Toad King Grothak - crown + belly + warts
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(headX - 20, headY - 40);
      ctx.lineTo(headX - 15, headY - 55);
      ctx.lineTo(headX - 5, headY - 42);
      ctx.lineTo(headX, headY - 58);
      ctx.lineTo(headX + 5, headY - 42);
      ctx.lineTo(headX + 15, headY - 55);
      ctx.lineTo(headX + 20, headY - 40);
      ctx.closePath();
      ctx.fill();
      // Crown jewels
      ctx.fillStyle = '#FF0044';
      ctx.beginPath();
      ctx.arc(headX, headY - 50, 4, 0, Math.PI * 2);
      ctx.fill();
      // Belly band
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(bodyX - 30, bodyY + 10, 60, 8);
      // Warts
      ctx.fillStyle = '#226622';
      ctx.beginPath();
      ctx.arc(headX - 25, headY + 5, 5, 0, Math.PI * 2);
      ctx.arc(headX + 20, headY - 10, 4, 0, Math.PI * 2);
      ctx.arc(headX - 10, headY + 25, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 4: // Soda Pop Fungi - mushroom cap + spots + soda
      ctx.fillStyle = '#FF88CC';
      ctx.beginPath();
      ctx.ellipse(headX, headY - 35, 30, 15, 0, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFF';
      ctx.beginPath();
      ctx.arc(headX - 10, headY - 38, 4, 0, Math.PI * 2);
      ctx.arc(headX + 8, headY - 40, 3, 0, Math.PI * 2);
      ctx.arc(headX + 18, headY - 34, 2, 0, Math.PI * 2);
      ctx.fill();
      if (opp.healTimer > 0) {
        ctx.fillStyle = '#00CCFF';
        ctx.fillRect(bodyX + 50, bodyY - 20, 10, 25);
        ctx.fillStyle = '#0088AA';
        ctx.fillRect(bodyX + 48, bodyY - 25, 14, 5);
        // Bubbles in soda
        ctx.fillStyle = '#88EEFF';
        ctx.beginPath();
        ctx.arc(bodyX + 54, bodyY - 12 + Math.sin(gameTime * 5) * 3, 2, 0, Math.PI * 2);
        ctx.arc(bodyX + 57, bodyY - 6 + Math.cos(gameTime * 4) * 2, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // Spore particles
      ctx.fillStyle = '#FF88CC';
      ctx.globalAlpha = 0.3;
      for (var sp = 0; sp < 5; sp++) {
        var spx = headX - 25 + Math.sin(gameTime + sp * 1.3) * 30;
        var spy = headY - 50 - Math.abs(Math.sin(gameTime * 0.7 + sp)) * 15;
        ctx.beginPath();
        ctx.arc(spx, spy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;

    case 5: // Don Flamenco Spore - rose + hat + cape
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(headX + 25, headY + 5, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#080';
      ctx.fillRect(headX + 24, headY + 10, 2, 15);
      // Hat
      ctx.fillStyle = '#222';
      ctx.fillRect(headX - 25, headY - 50, 50, 8);
      ctx.fillRect(headX - 15, headY - 70, 30, 22);
      // Cape hint
      ctx.fillStyle = '#CC0000';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(bodyX - 40, bodyY - 20);
      ctx.lineTo(bodyX - 55, bodyY + 40);
      ctx.lineTo(bodyX - 30, bodyY + 30);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    case 6: // Sandstorm Shaman - sand aura + staff
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.3;
      for (var sd = 0; sd < 12; sd++) {
        var sdx = headX - 40 + Math.random() * 80;
        var sdy = headY - 30 + Math.random() * 60;
        ctx.fillRect(sdx, sdy, 2, 2);
      }
      ctx.globalAlpha = 1;
      // Staff
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(bodyX + 55, bodyY - 50, 4, 100);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(bodyX + 57, bodyY - 55, 8, 0, Math.PI * 2);
      ctx.fill();
      // Headdress
      ctx.fillStyle = '#DDAA44';
      ctx.beginPath();
      ctx.moveTo(headX - 30, headY - 35);
      ctx.lineTo(headX, headY - 60);
      ctx.lineTo(headX + 30, headY - 35);
      ctx.closePath();
      ctx.fill();
      break;

    case 7: // Archmage Vorathos - aura + wizard hat + orbs
      ctx.strokeStyle = '#0FF';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.4 + Math.sin(opp.bobTimer * 3) * 0.3;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY, 65, 75, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Wizard hat
      ctx.fillStyle = '#440088';
      ctx.beginPath();
      ctx.moveTo(headX - 25, headY - 35);
      ctx.lineTo(headX, headY - 75);
      ctx.lineTo(headX + 25, headY - 35);
      ctx.closePath();
      ctx.fill();
      // Hat star
      ctx.fillStyle = '#FFD700';
      drawPixelStar(headX, headY - 55, 6, '#FFD700');
      // Orbiting orbs
      for (var ob = 0; ob < 3; ob++) {
        var oa = gameTime * 2 + ob * (Math.PI * 2 / 3);
        var ox = bodyX + Math.cos(oa) * 50;
        var oy = bodyY - 10 + Math.sin(oa) * 30;
        ctx.fillStyle = ['#0FF', '#F0F', '#FF0'][ob];
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(ox, oy, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;

    case 8: // Reactor Tyson - energy glow + scar + reactor core
      ctx.fillStyle = '#FF8800';
      ctx.globalAlpha = 0.3 + Math.sin(opp.bobTimer * 5) * 0.2;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY - 20, 70, 80, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Scar
      ctx.strokeStyle = '#800';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(headX - 15, headY - 15);
      ctx.lineTo(headX - 5, headY + 5);
      ctx.stroke();
      // Reactor core in chest
      ctx.fillStyle = '#FF4400';
      ctx.globalAlpha = 0.6 + Math.sin(gameTime * 8) * 0.3;
      ctx.beginPath();
      ctx.arc(bodyX, bodyY - 10, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFAA00';
      ctx.beginPath();
      ctx.arc(bodyX, bodyY - 10, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    case 9: // The Dark Luminar - dark aura + crown + phase effects
      ctx.strokeStyle = '#F0F';
      ctx.lineWidth = 2 + opp.phase;
      ctx.globalAlpha = 0.3 + opp.phase * 0.1;
      ctx.beginPath();
      ctx.ellipse(bodyX, bodyY - 10, 60 + opp.phase * 10, 70 + opp.phase * 10, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Crown of darkness
      ctx.fillStyle = '#330066';
      for (var cr = 0; cr < 5; cr++) {
        var ca = -Math.PI / 2 + (cr - 2) * 0.4;
        var csx = headX + Math.cos(ca) * 30;
        var csy = headY - 35 + Math.sin(ca) * 10;
        ctx.beginPath();
        ctx.moveTo(csx - 5, csy);
        ctx.lineTo(csx, csy - 15 - opp.phase * 5);
        ctx.lineTo(csx + 5, csy);
        ctx.closePath();
        ctx.fill();
      }
      // Phase-specific effects
      if (opp.phase >= 2) {
        // Shadow orbs
        ctx.fillStyle = '#8800FF';
        ctx.globalAlpha = 0.5;
        for (var so = 0; so < opp.phase * 2; so++) {
          var soa = gameTime * 1.5 + so * (Math.PI * 2 / (opp.phase * 2));
          var sox = bodyX + Math.cos(soa) * (55 + opp.phase * 8);
          var soy = bodyY - 10 + Math.sin(soa) * (40 + opp.phase * 5);
          ctx.beginPath();
          ctx.arc(sox, soy, 4 + opp.phase, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      if (opp.phase >= 3) {
        // Dark tendrils
        ctx.strokeStyle = '#440066';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.4;
        for (var td = 0; td < 4; td++) {
          ctx.beginPath();
          ctx.moveTo(bodyX, bodyY + 30);
          var tx = bodyX + Math.sin(gameTime + td * 1.5) * 60;
          var tdy = bodyY + 60 + Math.cos(gameTime * 0.7 + td) * 20;
          ctx.quadraticCurveTo(bodyX + Math.sin(gameTime * 2 + td) * 30, bodyY + 45, tx, tdy);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      break;
  }
}

// ============================================================
// DRAWING - PLAYER (the baseling)
// ============================================================
function drawPlayer() {
  var baseX = GAME_W / 2;
  var baseY = GAME_H * 0.75;
  var pColor = statB.color || '#88CC44';
  var pDark = darkenColor(pColor, 0.6);

  ctx.save();

  // Dodge offset
  var offsetX = 0;
  if (player.action === ACT_DODGE_L) offsetX = -40;
  if (player.action === ACT_DODGE_R) offsetX = 40;

  // Hit flash
  if (player.action === ACT_HIT) {
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
  }
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  var px = baseX + offsetX;
  var py = baseY;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px, py + 35, 30, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, px, py - 10, 70, { flipX: false, frame: frame })) {
    // Back of head
    ctx.fillStyle = pColor;
    ctx.beginPath();
    ctx.ellipse(px, py - 50, 22, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Baseling icon on head
    ctx.fillStyle = '#000';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon || 'B', px, py - 44);

    // Body (from behind - V shape)
    ctx.fillStyle = pDark;
    ctx.beginPath();
    ctx.moveTo(px - 25, py - 30);
    ctx.lineTo(px - 35, py + 20);
    ctx.lineTo(px + 35, py + 20);
    ctx.lineTo(px + 25, py - 30);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Shorts
    ctx.fillStyle = pColor;
    ctx.fillRect(px - 25, py + 15, 50, 25);
    ctx.strokeRect(px - 25, py + 15, 50, 25);

    // Belt
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(px - 22, py + 13, 44, 4);
  }

  // Arms / Gloves — overlay, stays outside
  drawPlayerArms(px, py, pColor);

  ctx.restore();
}

function darkenColor(hex, factor) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.floor(r * factor);
  g = Math.floor(g * factor);
  b = Math.floor(b * factor);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawPlayerArms(px, py, pColor) {
  var armY = py - 10;
  var leftGloveX = px - 40;
  var leftGloveY = armY;
  var rightGloveX = px + 40;
  var rightGloveY = armY;

  if (player.action === ACT_PUNCH_L) {
    leftGloveX = px - 20;
    leftGloveY = armY - 80;
  }
  if (player.action === ACT_PUNCH_R) {
    rightGloveX = px + 20;
    rightGloveY = armY - 80;
  }
  if (player.action === ACT_STAR_PUNCH) {
    leftGloveX = px;
    leftGloveY = armY - 100;
    rightGloveX = px;
    rightGloveY = armY - 100;
  }
  if (player.action === ACT_BLOCK) {
    leftGloveX = px - 15;
    leftGloveY = armY - 20;
    rightGloveX = px + 15;
    rightGloveY = armY - 20;
  }

  // Arms
  ctx.strokeStyle = pColor;
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(px - 25, py - 20);
  ctx.lineTo(leftGloveX, leftGloveY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px + 25, py - 20);
  ctx.lineTo(rightGloveX, rightGloveY);
  ctx.stroke();

  // Gloves
  var gloveColor = '#38d973';
  ctx.fillStyle = gloveColor;
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(leftGloveX, leftGloveY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(rightGloveX, rightGloveY, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Glove highlights
  ctx.fillStyle = '#6ef0a0';
  ctx.beginPath();
  ctx.arc(leftGloveX - 3, leftGloveY - 3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(rightGloveX - 3, rightGloveY - 3, 5, 0, Math.PI * 2);
  ctx.fill();

  // Star punch effect
  if (player.action === ACT_STAR_PUNCH) {
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.8;
    for (var i = 0; i < 5; i++) {
      var angle = (i / 5) * Math.PI * 2 + gameTime * 8;
      var sx = px + Math.cos(angle) * 25;
      var sy = (armY - 100) + Math.sin(angle) * 25;
      drawPixelStar(sx, sy, 5, '#FFD700');
    }
    ctx.globalAlpha = 1;
  }

  // Crit flash
  if (critFlash > 0) {
    ctx.fillStyle = '#FF4400';
    ctx.globalAlpha = critFlash;
    ctx.beginPath();
    ctx.arc(px, armY - 60, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - HUD
// ============================================================
function drawHUD() {
  var oppData = OPPONENTS[currentOpponentIdx];

  // HUD background
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.855, GAME_W, GAME_H * 0.15);

  // Opponent health bar
  drawPixelBorder(50, GAME_H * 0.875, GAME_W - 100, 14, '#222', '#555');
  var oppPct = Math.max(0, opp.hp / opp.maxHp);
  var oppBarColor = oppPct > 0.3 ? '#CC0000' : '#FF4400';
  if (oppPct <= 0.15) oppBarColor = '#FF0000';
  ctx.fillStyle = oppBarColor;
  ctx.fillRect(51, GAME_H * 0.876, (GAME_W - 102) * oppPct, 12);

  // Player health bar
  drawPixelBorder(50, GAME_H * 0.91, GAME_W - 100, 14, '#222', '#555');
  var plrPct = Math.max(0, player.hp / player.maxHp);
  var plrBarColor = plrPct > 0.3 ? '#00CC00' : '#FFAA00';
  if (plrPct <= 0.15) plrBarColor = '#FF4400';
  ctx.fillStyle = plrBarColor;
  ctx.fillRect(51, GAME_H * 0.911, (GAME_W - 102) * plrPct, 12);

  // Labels
  drawNESText(oppData.name.split(' ').slice(0, 2).join(' '), 52, GAME_H * 0.872, oppData.color, 10, 'left');
  drawNESText(statB.name || 'YOU', 52, GAME_H * 0.908, statB.color, 10, 'left');

  // Stars
  for (var i = 0; i < MAX_STARS; i++) {
    var starColor = i < player.stars ? '#FFD700' : '#333';
    drawNESText('\u2605', GAME_W - 52 + i * 18 - 36, GAME_H * 0.908, starColor, 16, 'right');
  }

  // Round + Timer
  var mins = Math.floor(roundTimer / 60);
  var secs = Math.floor(roundTimer % 60);
  var timeColor = roundTimer < 30 ? '#FF4444' : '#FFF';
  drawNESText('Round ' + currentRound + '  ' + mins + ':' + (secs < 10 ? '0' : '') + secs, GAME_W / 2, GAME_H * 0.965, timeColor, 12);

  // KD indicators
  drawNESText('KD:' + player.kd, 12, GAME_H * 0.965, '#F88', 10, 'left');
  drawNESText('KD:' + opp.kd, GAME_W - 12, GAME_H * 0.965, '#88F', 10, 'right');

  // Score
  drawNESText('POOP: ' + player.score, GAME_W - 10, 15, '#f4b41b', 11, 'right');

  // Combo counter
  if (comboCounter >= 3) {
    var comboAlpha = Math.min(1, comboTimer);
    ctx.globalAlpha = comboAlpha;
    drawNESText(comboCounter + 'x COMBO!', GAME_W / 2, GAME_H * 0.68, '#f4b41b', 14);
    ctx.globalAlpha = 1;
  }

  // Counter window indicator
  if (counterWindow) {
    ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.02) * 0.4;
    drawNESText('>>> COUNTER! <<<', GAME_W / 2, GAME_H * 0.72, '#f4b41b', 14);
    ctx.globalAlpha = 1;
  }

  // Poison indicator
  if (opp.poisonTimer > 0) {
    ctx.globalAlpha = 0.7;
    drawNESText('SPORE SICK!', GAME_W / 2, GAME_H * 0.64, '#38d973', 12);
    ctx.globalAlpha = 1;
  }

  // Boss phase indicator
  var bossData = OPPONENTS[currentOpponentIdx];
  if (bossData.phases) {
    drawNESText('PHASE ' + opp.phase + '/' + bossData.phases, GAME_W / 2, 30, '#a855f7', 10);
  }

  // Baseling level display
  if (statB.level > 0) {
    drawNESText('Lv.' + statB.level, 10, 15, statB.color, 10, 'left');
  }
}

  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;

  ctx.strokeRect(0, GAME_H * 0.75, GAME_W * 0.35, GAME_H * 0.25);
  drawNESText('L', GAME_W * 0.175, GAME_H * 0.87, '#FFF', 10);

  ctx.strokeRect(GAME_W * 0.65, GAME_H * 0.75, GAME_W * 0.35, GAME_H * 0.25);
  drawNESText('R', GAME_W * 0.825, GAME_H * 0.87, '#FFF', 10);

  ctx.strokeRect(GAME_W * 0.35, GAME_H * 0.82, GAME_W * 0.3, GAME_H * 0.18);
  drawNESText('BLK', GAME_W * 0.5, GAME_H * 0.92, '#FFF', 10);

  ctx.strokeRect(GAME_W * 0.3, GAME_H * 0.75, GAME_W * 0.4, GAME_H * 0.07);
  drawNESText('\u2605', GAME_W * 0.5, GAME_H * 0.79, '#FFD700', 10);

  ctx.strokeRect(0, GAME_H * 0.4, GAME_W * 0.2, GAME_H * 0.35);
  drawNESText('<', GAME_W * 0.1, GAME_H * 0.57, '#FFF', 10);
  ctx.strokeRect(GAME_W * 0.8, GAME_H * 0.4, GAME_W * 0.2, GAME_H * 0.35);
  drawNESText('>', GAME_W * 0.9, GAME_H * 0.57, '#FFF', 10);

  ctx.globalAlpha = 1;
}

// ============================================================
// DRAWING - SCREENS
// ============================================================
function drawTitle() {
  // Art background
  var _artDrawn = false;
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GAME_W, GAME_H); _artDrawn = true; }
  }
  if (!_artDrawn) { ctx.fillStyle = '#1a1c2c'; ctx.fillRect(0, 0, GAME_W, GAME_H); }

  // Animated background scanlines
  ctx.globalAlpha = 0.03;
  ctx.fillStyle = '#a855f7';
  for (var sl = 0; sl < GAME_H; sl += 4) {
    if ((sl + Math.floor(gameTime * 20)) % 8 < 4) {
      ctx.fillRect(0, sl, GAME_W, 2);
    }
  }
  ctx.globalAlpha = 1;

  // Animated ring in background
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 2;
  for (var tr = 0; tr < 3; tr++) {
    ctx.beginPath();
    ctx.moveTo(30, GAME_H * 0.12 + tr * 25);
    ctx.lineTo(GAME_W - 30, GAME_H * 0.12 + tr * 25);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  titleBob += 0.05;

  // Title with bounce
  var titleY = GAME_H * 0.25 + Math.sin(titleBob) * 5;
  drawNESText('POOP-OUT!!', GAME_W / 2, titleY, '#38d973', 42);
  drawNESText('POOP-OUT!!', GAME_W / 2 + 2, titleY + 2, '#1a6e38', 42);

  // Subtitle
  drawNESText('Baseling Boxing Championship', GAME_W / 2, GAME_H * 0.34, '#a855f7', 14);

  // Baseling name
  if (statB.name !== 'Baseling') {
    drawNESText('Baseling: ' + statB.name, GAME_W / 2, GAME_H * 0.39, statB.color, 12);
  }

  // NES-style control display
  var controlY = GAME_H * 0.44;
  drawNESText('-- CONTROLS --', GAME_W / 2, controlY, '#f4b41b', 12);
  controlY += 18;

  // NES D-pad visual
  var padX = GAME_W * 0.25;
  var padY = controlY + 30;
  // D-pad
  drawPixelRect(padX - 6, padY - 18, 12, 36, '#555');
  drawPixelRect(padX - 18, padY - 6, 36, 12, '#555');
  drawPixelRect(padX - 4, padY - 16, 8, 32, '#888');
  drawPixelRect(padX - 16, padY - 4, 32, 8, '#888');
  drawNESText('A+S', padX - 22, padY + 4, '#AAA', 8, 'right');
  drawNESText('D+S', padX + 22, padY + 4, '#AAA', 8, 'left');

  // Buttons
  var btnX = GAME_W * 0.7;
  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(btnX + 15, padY - 5, 10, 0, Math.PI * 2);
  ctx.fill();
  drawNESText('A', btnX + 15, padY - 2, '#FFF', 10);

  ctx.fillStyle = '#CC0000';
  ctx.beginPath();
  ctx.arc(btnX - 10, padY + 5, 10, 0, Math.PI * 2);
  ctx.fill();
  drawNESText('B', btnX - 10, padY + 8, '#FFF', 10);

  // Control labels
  var lblY = padY + 30;
  var labels = [
    ['A / Left', 'Left Punch'],
    ['D / Right', 'Right Punch'],
    ['S / Down', 'Block'],
    ['A+S / D+S', 'Dodge L / R'],
    ['W / Space', 'Spore Punch']
  ];
  for (var li = 0; li < labels.length; li++) {
    drawNESText(labels[li][0], GAME_W * 0.35, lblY + li * 14, '#888', 9, 'right');
    drawNESText(labels[li][1], GAME_W * 0.4, lblY + li * 14, '#AAA', 9, 'left');
  }

  // Touch hint
  drawNESText('Touch: tap sides=punch, center=block', GAME_W / 2, GAME_H * 0.82, '#555', 9);
  drawNESText('Swipe L/R=dodge, top-center=Star', GAME_W / 2, GAME_H * 0.84, '#555', 9);

  // Stats display if NFT loaded
  if (statB.level > 0) {
    var sty = GAME_H * 0.87;
    drawNESText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, GAME_W / 2, sty, '#888', 9);
    drawNESText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GAME_W / 2, sty + 12, '#888', 9);
  }

  // Start prompt
  ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  drawNESText('Press any key or tap to start', GAME_W / 2, GAME_H * 0.93, '#38d973', 13);
  ctx.globalAlpha = 1;
}

function drawTutorial() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  var steps = [
    { title: 'DODGE', text: 'When you see ! dodge LEFT or RIGHT\nto dodge toxic spore attacks!', color: '#38d973' },
    { title: 'COUNTER', text: 'After a successful dodge,\nhit back for bonus damage + spore gems!', color: '#f4b41b' },
    { title: 'STAR PUNCH', text: 'Earn spore gems from counters.\nPress W/Up for a devastating POOP uppercut!', color: '#e6482e' },
    { title: 'BLOCK', text: 'Hold S/Down to block.\nReduces damage but no counter window.', color: '#3cacd7' },
    { title: 'FIGHT!', text: 'Defeat 10 fungal foes to become\nBaseling Boxing Champion of Tasern!', color: '#a855f7' }
  ];

  var step = Math.min(tutorialStep, steps.length - 1);
  var s = steps[step];

  drawNESText('-- TUTORIAL ' + (step + 1) + '/' + steps.length + ' --', GAME_W / 2, GAME_H * 0.15, '#888', 12);
  drawNESText(s.title, GAME_W / 2, GAME_H * 0.35, s.color, 32);

  var lines = s.text.split('\n');
  for (var tl = 0; tl < lines.length; tl++) {
    drawNESText(lines[tl], GAME_W / 2, GAME_H * 0.5 + tl * 20, '#CCC', 12);
  }

  // Animated demo visual
  var demoY = GAME_H * 0.7;
  if (step === 0) {
    // Show dodge arrows
    var arrowBob = Math.sin(gameTime * 3) * 10;
    drawNESText('<<<', GAME_W * 0.3 - arrowBob, demoY, '#44DD44', 20);
    drawNESText('>>>', GAME_W * 0.7 + arrowBob, demoY, '#44DD44', 20);
  } else if (step === 1) {
    // Show punch
    drawNESText('COUNTER! +200', GAME_W / 2, demoY, '#FFD700', 16);
  } else if (step === 2) {
    // Show star
    drawPixelStar(GAME_W / 2, demoY, 15, '#FFD700');
  }

  ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  drawNESText('Press any key to continue...', GAME_W / 2, GAME_H * 0.9, '#888', 11);
  ctx.globalAlpha = 1;
}

function drawIntro() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  var oppData = OPPONENTS[currentOpponentIdx];
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, GAME_H * 0.33, GAME_W, GAME_H * 0.34);

  // NES-style border
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, GAME_H * 0.33, GAME_W - 10, GAME_H * 0.34);

  drawNESText('FIGHT ' + (currentOpponentIdx + 1) + '/10', GAME_W / 2, GAME_H * 0.39, '#f4b41b', 18);
  drawNESText(oppData.name, GAME_W / 2, GAME_H * 0.45, oppData.color, 16);
  if (oppData.subtitle) {
    drawNESText('"' + oppData.subtitle + '"', GAME_W / 2, GAME_H * 0.49, '#AAA', 10);
  }
  drawNESText(oppData.intro, GAME_W / 2, GAME_H * 0.55, '#CCC', 10);

  // Taunt
  if (oppData.taunt && introTimer < 2.0) {
    ctx.globalAlpha = Math.min(1, (2.0 - introTimer) * 2);
    drawNESText('"' + oppData.taunt + '"', GAME_W / 2, GAME_H * 0.6, oppData.color, 10);
    ctx.globalAlpha = 1;
  }

  // Countdown
  var count = Math.ceil(introTimer);
  if (count <= 3) {
    drawNESText(count.toString(), GAME_W / 2, GAME_H * 0.67, '#FFF', 36);
  }
}

function drawKDPlayer() {
  drawRing();
  drawOpponent();

  // Player on ground (pixel art)
  ctx.fillStyle = statB.color;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.ellipse(GAME_W / 2, GAME_H * 0.8, 40, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  // Stars circling head
  for (var ks = 0; ks < 3; ks++) {
    var ka = gameTime * 3 + ks * (Math.PI * 2 / 3);
    var kx = GAME_W / 2 + Math.cos(ka) * 25;
    var ky = GAME_H * 0.77 + Math.sin(ka) * 8;
    drawPixelStar(kx, ky, 4, '#FFD700');
  }
  ctx.globalAlpha = 1;

  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GAME_H * 0.4, GAME_W, GAME_H * 0.22);
  ctx.strokeStyle = '#FF4444';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, GAME_H * 0.4, GAME_W - 10, GAME_H * 0.22);

  drawNESText('KNOCKED DOWN!', GAME_W / 2, GAME_H * 0.46, '#e6482e', 20);
  drawNESText('MASH TO REVIVE YOUR BASELING!', GAME_W / 2, GAME_H * 0.52, '#FFF', 13);

  // Progress bar
  var mashNeeded = GETUP_MASH - derivedStats.mashReduction();
  var pct = Math.min(1, player.mashCount / mashNeeded);
  drawPixelBorder(80, GAME_H * 0.55, GAME_W - 160, 14, '#222', '#555');
  ctx.fillStyle = pct >= 1 ? '#FFD700' : '#00FF00';
  ctx.fillRect(81, GAME_H * 0.551, (GAME_W - 162) * pct, 12);

  drawNESText(Math.ceil(player.mashTimer) + 's', GAME_W / 2, GAME_H * 0.6 + 10, '#FF0', 12);
}

function drawTKO() {
  drawRing();
  drawPlayer();

  var oppData = OPPONENTS[currentOpponentIdx];
  ctx.fillStyle = oppData.color;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(GAME_W / 2, GAME_H * 0.35, 50, 20, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  drawHUD();

  // Victory overlay
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.28, GAME_W, GAME_H * 0.2);
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, GAME_H * 0.28, GAME_W - 10, GAME_H * 0.2);

  drawNESText('T.K.O.!!', GAME_W / 2, GAME_H * 0.35, '#f4b41b', 28);
  drawNESText('Your baseling defeated ' + oppData.name + '!', GAME_W / 2, GAME_H * 0.42, '#FFF', 12);

  if (oppData.defeatQuote) {
    drawNESText('"' + oppData.defeatQuote + '"', GAME_W / 2, GAME_H * 0.47, oppData.color, 9);
  }

  // Victory particles
  if (Math.random() < 0.15) {
    spawnParticles(Math.random() * GAME_W, GAME_H * 0.25, '#FFD700', 2, 2, 'star');
  }
}

function drawWin() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Confetti
  for (var ci = 0; ci < 30; ci++) {
    ctx.fillStyle = ['#f4b41b', '#e6482e', '#38d973', '#3cacd7', '#a855f7'][ci % 5];
    ctx.globalAlpha = 0.6;
    var cx = (ci * 14 + Math.sin(gameTime + ci) * 20) % GAME_W;
    var cy = (gameTime * 30 + ci * 25) % GAME_H;
    ctx.fillRect(cx, cy, 4, 4);
  }
  ctx.globalAlpha = 1;

  drawNESText('CHAMPION!!', GAME_W / 2, GAME_H * 0.2, '#f4b41b', 32);
  drawNESText('Your baseling conquered all 10 foes!', GAME_W / 2, GAME_H * 0.3, '#FFF', 14);

  // Stats
  drawNESText('POOP Earned: ' + player.score, GAME_W / 2, GAME_H * 0.42, '#f4b41b', 14);
  drawNESText('Total KOs: ' + player.totalKOs, GAME_W / 2, GAME_H * 0.48, '#38d973', 12);
  drawNESText('Max Combo: ' + maxCombo + 'x', GAME_W / 2, GAME_H * 0.53, '#e6482e', 12);

  if (statB.name !== 'Baseling') {
    drawNESText('Baseling: ' + statB.name + ' (Lv.' + statB.level + ')', GAME_W / 2, GAME_H * 0.6, statB.color, 12);
  }

  // Trophy
  ctx.fillStyle = '#FFD700';
  ctx.font = '60px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('\u{1F3C6}', GAME_W / 2, GAME_H * 0.78);

  ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
  drawNESText('Press any key to play again', GAME_W / 2, GAME_H * 0.92, '#888', 12);
  ctx.globalAlpha = 1;
}

function drawLose() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GAME_W, GAME_H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GAME_W, GAME_H); }
  }
  drawRing();
  drawOpponent();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, GAME_H * 0.33, GAME_W, GAME_H * 0.24);
  ctx.strokeStyle = '#FF4444';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, GAME_H * 0.33, GAME_W - 10, GAME_H * 0.24);

  drawNESText('COMPOSTED!', GAME_W / 2, GAME_H * 0.4, '#e6482e', 24);
  drawNESText('POOP Earned: ' + player.score, GAME_W / 2, GAME_H * 0.47, '#f4b41b', 14);
  drawNESText('Max Combo: ' + maxCombo + 'x', GAME_W / 2, GAME_H * 0.51, '#e6482e', 11);
  drawNESText('Press any key to try again', GAME_W / 2, GAME_H * 0.55, '#888', 11);
}

function drawBetweenRounds() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GAME_H * 0.38, GAME_W, GAME_H * 0.18);
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;
  ctx.strokeRect(5, GAME_H * 0.38, GAME_W - 10, GAME_H * 0.18);

  drawNESText('Round ' + (currentRound) + ' starting...', GAME_W / 2, GAME_H * 0.45, '#FFF', 18);

  if (OPPONENTS[currentOpponentIdx].heals && opp.healTimer > 0) {
    drawNESText('Opponent drinks spore potion and heals!', GAME_W / 2, GAME_H * 0.52, '#a855f7', 11);
  }

  var healAmt = 15 + derivedStats.healBonus();
  if (healAmt > 15) {
    drawNESText('WIS bonus: +' + derivedStats.healBonus() + ' HP recovered!', GAME_W / 2, GAME_H * 0.55, '#38d973', 9);
  }
}

function drawDecision() {
  drawRing();
  drawOpponent();
  drawPlayer();
  drawHUD();

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GAME_H * 0.33, GAME_W, GAME_H * 0.22);
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 2;
  ctx.strokeRect(5, GAME_H * 0.33, GAME_W - 10, GAME_H * 0.22);

  drawNESText('DECISION!', GAME_W / 2, GAME_H * 0.39, '#f4b41b', 18);

  var oppHpPct = opp.hp / opp.maxHp;
  var plrHpPct = player.hp / player.maxHp;
  var winner = plrHpPct >= oppHpPct ? 'YOU WIN!' : 'OPPONENT WINS!';
  var wColor = plrHpPct >= oppHpPct ? '#00FF00' : '#FF4444';
  drawNESText(winner, GAME_W / 2, GAME_H * 0.47, wColor, 16);

  drawNESText('You: ' + Math.floor(plrHpPct * 100) + '%  Opp: ' + Math.floor(oppHpPct * 100) + '%', GAME_W / 2, GAME_H * 0.53, '#CCC', 10);
}

// ============================================================
// SCANLINE OVERLAY (NES effect)
// ============================================================
function drawScanlines() {
  ctx.globalAlpha = 0.04;
  ctx.fillStyle = '#000';
  for (var sy = 0; sy < GAME_H; sy += 3) {
    ctx.fillRect(0, sy, GAME_W, 1);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(time) {
  var dt = Math.min(0.05, (time - lastTime) / 1000);
  lastTime = time;

  update(dt);

  // Screen shake
  ctx.save();
  if (shakeTimer > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeIntensity * 2,
      (Math.random() - 0.5) * shakeIntensity * 2
    );
  }

  switch (state) {
    case ST_TITLE:
      drawTitle();
      break;

    case ST_TUTORIAL:
      drawTutorial();
      break;

    case ST_INTRO:
      drawIntro();
      break;

    case ST_FIGHT:
      drawRing();
      drawOpponent();
      drawPlayer();
      drawHUD();
      drawTouchControls();
      break;

    case ST_KD_PLAYER:
      drawKDPlayer();
      break;

    case ST_KD_OPPONENT:
      drawRing();
      drawOpponent();
      drawPlayer();
      drawHUD();
      break;

    case ST_TKO:
      drawTKO();
      break;

    case ST_WIN:
      drawWin();
      break;

    case ST_LOSE:
      drawLose();
      break;

    case ST_BETWEEN_ROUNDS:
      drawBetweenRounds();
      break;

    case ST_DECISION:
      drawDecision();
      break;
  }

  drawParticles();
  drawFlash();
  drawScreenTint();
  drawScanlines();

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// Kick off
requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
