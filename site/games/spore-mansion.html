"use strict";

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM unused (no water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[spore-mansion] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-mansion] player init failed:', e && e.message); });
}

// Derived stat helpers — called throughout the game
function strMod() { return Math.floor((statB.str - 10) / 2); }
function dexMod() { return Math.floor((statB.dex - 10) / 2); }
function conMod() { return Math.floor((statB.con - 10) / 2); }
function intMod() { return Math.floor((statB.int - 10) / 2); }
function wisMod() { return Math.floor((statB.wis - 10) / 2); }
function chaMod() { return Math.floor((statB.cha - 10) / 2); }

// STR: force/breaking threshold — higher STR = easier breaking
function strCheck(dc) { return (Math.random() * 20 + 1 + strMod()) >= dc; }
// DEX: movement speed multiplier
function dexSpeedMult() { return 1 + dexMod() * 0.1; }
// CON: stealth duration and HP bonus
function conStealthBonus() { return Math.max(0, conMod() * 0.5); }
function conHpBonus() { return Math.max(0, conMod()); }
// INT: puzzle hints and score multiplier
function intScoreMult() { return Math.max(1, 1 + intMod() * 0.15); }
function intHintChance() { return Math.min(0.8, 0.2 + intMod() * 0.1); }
// WIS: item discovery and cooldown reduction
function wisDiscoveryChance() { return Math.min(0.9, 0.3 + wisMod() * 0.1); }
function wisCooldownMult() { return Math.max(0.3, 1 - wisMod() * 0.08); }
// CHA: NPC interactions and luck
function chaLuckBonus() { return Math.min(0.5, Math.max(0, chaMod() * 0.08)); }
function chaNpcBonus() { return Math.max(0, chaMod()); }

(function preloadEnemyArt() {
  if (!window.TasernArt) return;

function enemySpr(type) {
  if (!window.TasernArt || !ENEMY_SPR_SRC[type]) return null;
  var im = TasernArt.getImg(ENEMY_SPR_SRC[type]);
  return (im && im.complete && im.naturalWidth > 0) ? im : null;
}
// Draw a sprite bottom-anchored inside a box, aspect preserved, flipped when facing left.
function drawEnemySpr(im, x, y, w, h, flip) {
  var iw = im.naturalWidth, ih = im.naturalHeight;
  var s = Math.min(w / iw, h / ih);
  var dw = iw * s, dh = ih * s;
  var dx = x + (w - dw) / 2, dy = y + (h - dh);
  ctx.save();
  if (flip) { ctx.translate(dx + dw, dy); ctx.scale(-1, 1); ctx.drawImage(im, 0, 0, dw, dh); }
  else { ctx.drawImage(im, dx, dy, dw, dh); }
  ctx.restore();
}

function addScore(pts, x, y, label) {

// === KEYBOARD CURSOR STATE ===
// Arrows move a virtual cursor (shares mouseX/mouseY so all existing click/hover
// logic is reused). WASD = the action cluster. Legacy keys (1/2/3, Space) kept as alts.
let kbCursor = false;        // true once arrows/WASD are used (shows the cursor)
let kbX = GW / 2, kbY = SCENE_H / 2;
const NO_TOUCH = !('ontouchstart' in window); // desktop = show keyboard legend
function kbHeld(k) { return !!(TAS.input.keys[k]); }
function kbTap(codes) { // edge-triggered: true once per press, then clears
  for (var i = 0; i < codes.length; i++) {
    if (TAS.input.keys[codes[i]]) {
      for (var j = 0; j < codes.length; j++) TAS.input.keys[codes[j]] = false;
      return true;
    }
  }
  return false;
}
function kbSyntheticClick() { // route the keyboard cursor through the mouse-click handler
  mouseX = kbX; mouseY = kbY; mouseClicked = true;
}
function cycleVerb(dir) {
  var idx = VERBS.indexOf(selectedVerb);
  if (idx < 0) idx = 0;
  idx = (idx + dir + VERBS.length) % VERBS.length;
  selectedVerb = VERBS[idx];
  useItem = null;
  TAS.audio.playTone(500, 0.05, 'sine', 0.04);
}
let kbInvSel = 0; // keyboard inventory selection index (for S = inventory)

const canvas = TAS.canvas;
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (GW / rect.width);
  mouseY = (e.clientY - rect.top) * (GH / rect.height);
});
canvas.addEventListener('click', function(e) {
  TAS.audio.ensureAudio();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (GW / rect.width);
  mouseY = (e.clientY - rect.top) * (GH / rect.height);
  mouseClicked = true;
});
canvas.addEventListener('touchstart', function(e) {
  TAS.audio.ensureAudio();
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    mouseX = (t.clientX - rect.left) * (GW / rect.width);
    mouseY = (t.clientY - rect.top) * (GH / rect.height);
    mouseClicked = true;
  }
}, { passive: true });

// === SAVE / LOAD ===
function saveGame() {
  try {
    const data = { currentChar, currentRoom, inventory, puzzlesSolved, charPositions, charAlive, charRoom, powerOn, ghostHelped, scientistPathIdx, score };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    currentChar = d.currentChar || 0;
    currentRoom = d.currentRoom || 'foyer';
    inventory = d.inventory || [[], [], []];
    puzzlesSolved = d.puzzlesSolved || {};
    charPositions = d.charPositions || [{x:200,y:160},{x:220,y:160},{x:240,y:160}];
    charAlive = d.charAlive || [true, true, true];
    charRoom = d.charRoom || ['foyer','foyer','foyer'];
    powerOn = d.powerOn || false;
    ghostHelped = d.ghostHelped || false;
    scientistPathIdx = d.scientistPathIdx || 0;
    score = d.score || 0;
    rebuildObjectsFromPuzzles();
    return true;
  } catch(e) { console.warn('Load failed:', e); return false; }
}

function rebuildObjectsFromPuzzles() {
  roomObjects = getDefaultObjects();
  for (const key of Object.keys(puzzlesSolved)) {
    if (key.startsWith('picked_')) {
      const parts = key.replace('picked_', '').split('__');
      const room = parts[0], objId = parts[1];
      if (roomObjects[room]) {
        roomObjects[room] = roomObjects[room].filter(function(o) { return o.id !== objId; });
      }
    }
  }
}

// === SHOW MESSAGE ===
function showMsg(text, duration) {
  msgText = text;
  msgTimer = duration || 3;
}

// === DIALOGUE SYSTEM ===
function startDialogue(lines) {
  dialogueLines = lines;
  dialogueIdx = 0;
  state = 'dialogue';
}

function advanceDialogue() {
  dialogueIdx++;
  if (dialogueIdx >= dialogueLines.length) {
    state = 'playing';
    dialogueLines = [];
    dialogueIdx = 0;
  }
}

// === INVENTORY HELPERS ===
function hasItem(charIdx, itemId) {
  return inventory[charIdx].indexOf(itemId) >= 0;
}

function anyHasItem(itemId) {
  return inventory.some(function(inv) { return inv.indexOf(itemId) >= 0; });
}

function addItem(itemId) {
  if (!hasItem(currentChar, itemId)) {
    inventory[currentChar].push(itemId);
    TAS.audio.playTone(600, 0.1, 'sine', 0.08);
    TAS.audio.playTone(800, 0.15, 'sine', 0.06);
    showMsg('Got: ' + ALL_ITEMS[itemId].name);
    addScore(50, charPositions[currentChar].x, charPositions[currentChar].y - 20, 'ITEM');
  }
}

function removeItem(charIdx, itemId) {
  const idx = inventory[charIdx].indexOf(itemId);
  if (idx >= 0) inventory[charIdx].splice(idx, 1);
}

// === INTERACTION LOGIC ===
function interact(verb, obj) {
  if (!obj) return;
  const ch = CHARS[currentChar];

  // Character requirement check — CHA bonus can sometimes override (chaLuckBonus)
  if (obj.charReq && obj.charReq !== ch.id) {
    if (Math.random() < chaLuckBonus()) {
      showMsg(ch.name + ' channels baseling charm and manages it!');
      addScore(100, obj.x, obj.y, 'CHA LUCK');
    } else {
      var needed = CHARS.find(function(c) { return c.id === obj.charReq; });
      showMsg(ch.name + ' can\'t do that. Maybe ' + needed.name + ' could...');
      // INT hint: suggest which character
      if (Math.random() < intHintChance()) {
        showMsg(ch.name + ' can\'t do that. ' + needed.name + ' (' + needed.desc + ') could handle this!');
      }
      return;
    }
  }

  switch(verb) {
    case 'Walk To':
      if (obj.type === 'exit' || obj.type === 'climbable' || obj.type === 'high_exit') {
        changeRoom(obj.target);
        addScore(10, obj.x, obj.y, 'EXPLORE');
      } else if (obj.type === 'hazard') {
        // CON check: can you resist the hazard?
        if (conMod() >= 2 || stealthActive) {
          showMsg('Your baseling constitution protects you from the spores!');
          addScore(30, obj.x, obj.y, 'CON RESIST');
        } else {
          showMsg('The spore cloud stings! Your baseling coughs violently.');
          TAS.fx.flash('#38d973', 0.2);
        }
        charPositions[currentChar] = { x: Math.min(420, Math.max(30, obj.x)), y: Math.min(170, Math.max(80, obj.y + 30)) };
      } else {
        // DEX affects movement snappiness
        var speed = dexSpeedMult();
        charPositions[currentChar] = { x: Math.min(420, Math.max(30, obj.x)), y: Math.min(170, Math.max(80, obj.y + 30)) };
        showMsg(obj.desc);
      }
      break;

    case 'Pick Up':
      if (obj.type === 'pickup' && obj.item) {
        addItem(obj.item);
        var roomObjs = roomObjects[currentRoom];
        var idx = roomObjs.indexOf(obj);
        if (idx >= 0) roomObjs.splice(idx, 1);
        puzzlesSolved['picked_' + currentRoom + '__' + obj.id] = true;
      } else if (obj.type === 'container' && obj.item && !puzzlesSolved['looted_' + obj.id]) {
        addItem(obj.item);
        puzzlesSolved['looted_' + obj.id] = true;
        obj.item = null;
        obj.desc = 'Empty now. Nothing else in here.';
      } else {
        // WIS: chance to discover a hidden reactor shard
        if (Math.random() < wisDiscoveryChance() && !puzzlesSolved['wis_bonus_' + currentRoom]) {
          puzzlesSolved['wis_bonus_' + currentRoom] = true;
          addScore(75, obj.x, obj.y, 'WIS FIND');
          showMsg('Your baseling instincts sense something... a reactor shard hidden nearby!');
        } else {
          showMsg('Can\'t pick that up.');
        }
      }
      break;

    case 'Open':
      if (obj.type === 'container') {
        if (obj.item && !puzzlesSolved['looted_' + obj.id]) {
          addItem(obj.item);
          puzzlesSolved['looted_' + obj.id] = true;
          obj.item = null;
          showMsg('Found something inside!');
        } else {
          showMsg('It\'s empty.');
        }
      } else if (obj.type === 'locked_door') {
        if (hasItem(currentChar, obj.key)) {
          showMsg('Unlocked!');
          TAS.audio.playTone(400, 0.2, 'sine', 0.08);
          puzzlesSolved['unlocked_' + obj.id] = true;
          obj.type = 'exit';
          addScore(100, obj.x, obj.y, 'UNLOCK');
          changeRoom(obj.target);
        } else {
          showMsg('It\'s locked. Need a key...');
          TAS.audio.playTone(100, 0.2, 'square', 0.06);
        }
      } else if (obj.type === 'locked') {
        if (obj.id === 'safe' && hasItem(currentChar, 'book') && ch.id === 'brains') {
          showMsg('Brains decodes the reactor tome -- the spore safe combination is 7-3-9!');
          puzzlesSolved['safe_opened'] = true;
          addItem('crystal');
          obj.type = 'scenery';
          obj.desc = 'The reactor safe is open and empty.';
          addScore(200, obj.x, obj.y, 'INT DECODE');
        } else if (obj.id === 'chest') {
          // STR check for forcing the lock
          if (ch.id === 'muscles' || strCheck(12)) {
            showMsg(ch.id === 'muscles' ? 'Muscles rips the lock clean off!' : ch.name + '\'s baseling strength forces the lock!');
            puzzlesSolved['chest_opened'] = true;
            addItem('ghost_charm');
            obj.type = 'scenery';
            obj.desc = 'A broken chest. Empty now.';
            addScore(150, obj.x, obj.y, 'STR FORCE');
          } else if (hasItem(currentChar, 'crowbar')) {
            showMsg('Pried it open with the spore pry bar!');
            puzzlesSolved['chest_opened'] = true;
            addItem('ghost_charm');
            obj.type = 'scenery';
            obj.desc = 'A broken chest. Empty now.';
            addScore(100, obj.x, obj.y, 'PRIED');
          } else {
            showMsg('It\'s locked tight. Need something to force it open.');
            // INT hint
            if (Math.random() < intHintChance()) {
              showMsg('It\'s locked tight. A spore pry bar or baseling with high STR could force it.');
            }
          }
        } else {
          showMsg('It\'s locked. There must be a way...');
        }
      } else {
        showMsg('Can\'t open that.');
      }
      break;

    case 'Use':
      if (useItem) {
        handleUseItemOn(useItem, obj);
        useItem = null;
      } else if (obj.type === 'device') {
        handleDevice(obj);
      } else if (obj.type === 'final_device') {
        handleFinalDevice(obj);
      } else {
        showMsg('Use what on it? Select an inventory item first.');
      }
      break;

    case 'Talk':
      if (obj.type === 'ghost') {
        // CHA bonus: ghost is friendlier with high charisma
        var chaBonus = chaNpcBonus();
        if (ghostHelped) {
          var extraHint = chaBonus >= 2 ? '\nGhost: "Your baseling charm reminds me of the old garden... the spore gem is the key to everything."' : '';
          startDialogue([
            'Ghost: "You already helped me, fellow baseling. The charm protects you."',
            'Ghost: "Find the spore gem, the antidote, and fix that reactor wire."',
            'Ghost: "Your baseling friend awaits in the secret lab below..."' + extraHint
          ]);
          if (chaBonus >= 2) addScore(50, obj.x, obj.y, 'CHA RAPPORT');
        } else if (hasItem(currentChar, 'music_box')) {
          startDialogue([
            'Ghost: "That melody... I remember now. My favorite spore song..."',
            'Ghost: "Thank you for reminding this old baseling who I was."',
            'Ghost: "Take this charm. It will protect your baseling from the mad mold scientist."',
            '(The ghost baseling fades to a peaceful shimmer)'
          ]);
          ghostHelped = true;
          removeItem(currentChar, 'music_box');
          addItem('ghost_charm');
          puzzlesSolved['ghost_helped'] = true;
          addScore(300, obj.x, obj.y, 'GHOST FREED');
        } else {
          var hintLine = chaBonus >= 1 ? 'Ghost: "You seem kind, little baseling... find the spore music box in the resonance chamber."' : 'Ghost: "Find the music that reminds this old baseling who I was..."';
          startDialogue([
            'Ghost: "I\'ve been haunting this garden so long... I can\'t remember..."',
            'Ghost: "There was a spore song... if only I could hear it again..."',
            hintLine
          ]);
          if (chaBonus >= 1) addScore(25, obj.x, obj.y, 'CHA CHARM');
        }
      } else if (obj.type === 'readable') {
        if (obj.id === 'notes') {
          startDialogue([
            '"Subject 7 (Nibbles): Spore integration at 47% - baseling resistance high"',
            '"Phase 3 requires spore gem catalyst + antidote base"',
            '"Release mechanism: spore gem, antidote, stable reactor conductor"',
            '"Note: keep spare mycelium key behind the Sporax portrait in the library"'
          ]);
          puzzlesSolved['read_notes'] = true;
          addScore(100, obj.x, obj.y, 'INT RESEARCH');
        } else if (obj.id === 'sheet_music') {
          startDialogue([
            'The sheet music is written in strange spore notation...',
            'It seems to be the melody the ghost baseling hums.',
            'Maybe a spore music box could play this tune?'
          ]);
          addScore(25, obj.x, obj.y, 'CLUE');
        } else if (obj.id === 'reactor_diagram') {
          // INT: higher INT reveals more detail
          if (intMod() >= 2) {
            startDialogue([
              'Your baseling intellect deciphers the reactor diagram fully.',
              'The spore mansion runs on a mycelial reactor core in the basement.',
              'A garden fuse is needed, then the core, then the main switch.',
              'The mad mold scientist\'s secret lab draws power from a separate circuit.'
            ]);
            addScore(75, obj.x, obj.y, 'INT DECODE');
          } else {
            startDialogue([
              'A complex reactor diagram. Your baseling understands some of it.',
              'The basement has a reactor core. It seems to need a garden fuse.'
            ]);
          }
        } else if (obj.id === 'hazard_sign' || obj.id === 'reactor_warning') {
          showMsg(obj.desc);
          addScore(10, obj.x, obj.y, 'READ');
        } else {
          showMsg(obj.desc);
        }
      } else {
        showMsg('That doesn\'t want to talk to your baseling. Rude.');
      }
      break;

    case 'Give':
      if (obj.type === 'ghost' && hasItem(currentChar, 'music_box')) {
        interact('Talk', obj);
      } else {
        showMsg('Give what to whom? No baseling wants your junk.');
      }
      break;

    case 'Push':
      if (obj.type === 'heavy') {
        // STR check: muscles auto-pass, others roll
        if (ch.id === 'muscles' || strCheck(14)) {
          showMsg(ch.id === 'muscles' ? 'Muscles shoves it aside with ease!' : ch.name + '\'s baseling strength prevails!');
          puzzlesSolved['pushed_' + obj.id] = true;
          if (obj.target) {
            obj.type = 'exit';
            obj.desc = 'A cleared passage through the mycelium.';
          } else {
            obj.desc = 'Already pushed aside.';
          }
          TAS.fx.shake(4, 0.9);
          addScore(100, obj.x, obj.y, 'STR PUSH');
          // Spawn particles on push
          for (var pi = 0; pi < 8; pi++) {
            spawnRoomParticle(obj.x + obj.w/2, obj.y + obj.h/2, '#aaaaaa');
          }
        } else {
          showMsg('Too heavy! Need a stronger baseling...');
          TAS.fx.shake(1, 0.3);
        }
      } else if (obj.id === 'painting') {
        if (!obj.pushed) {
          obj.pushed = true;
          showMsg('The mad mold scientist\'s portrait swings aside revealing a hidden niche!');
          if (!puzzlesSolved['painting_key']) {
            addItem('lab_key');
            puzzlesSolved['painting_key'] = true;
            addScore(150, obj.x, obj.y, 'SECRET');
          }
        } else {
          showMsg('Already pushed aside.');
        }
      } else {
        showMsg('Can\'t push that. It doesn\'t budge.');
      }
      break;

    case 'Pull':
      if (obj.id === 'chains' && (ch.id === 'muscles' || strCheck(15))) {
        showMsg(ch.id === 'muscles' ? 'Muscles rips the chains from the wall!' : ch.name + ' tears the spore-weakened chains free!');
        puzzlesSolved['chains_pulled'] = true;
        addScore(75, obj.x, obj.y, 'STR PULL');
        TAS.fx.shake(3, 0.6);
      } else if (obj.id === 'painting') {
        interact('Push', obj);
      } else {
        showMsg('Pulling it doesn\'t help.');
      }
      break;

    default:
      showMsg(obj.desc);
  }
}

function handleUseItemOn(itemId, obj) {
  var item = ALL_ITEMS[itemId];
  if (itemId === 'tape' && obj.id === 'broken_wire') {
    showMsg('Combined the spore tape with the reactor wire! Now it conducts garden current.');
    removeItem(currentChar, 'tape');
    removeItem(currentChar, 'wire');
    addItem('fixed_wire');
    puzzlesSolved['wire_fixed'] = true;
    var roomObjs = roomObjects[currentRoom];
    var idx = roomObjs.findIndex(function(o) { return o.id === 'broken_wire'; });
    if (idx >= 0) roomObjs.splice(idx, 1);
    addScore(150, obj.x, obj.y, 'CRAFT');
  } else if (itemId === 'fuse' && obj.id === 'fusebox') {
    showMsg('Inserted the garden fuse into the reactor fuse box!');
    removeItem(currentChar, 'fuse');
    puzzlesSolved['fuse_installed'] = true;
    obj.desc = 'The reactor fuse box now has a working fuse.';
    addScore(100, obj.x, obj.y, 'REPAIR');
  } else if (itemId === 'fuse' && obj.id === 'generator_obj') {
    showMsg('The garden fuse goes in the fuse box upstairs, not directly in the reactor core.');
  } else if (itemId === 'battery' && obj.id === 'beacon') {
    showMsg('Installed the POOP cell! The beacon flickers to life.');
    removeItem(currentChar, 'battery');
    puzzlesSolved['beacon_powered'] = true;
    addScore(100, obj.x, obj.y, 'POWER');
  } else if (itemId === 'crowbar' && (obj.type === 'locked' || obj.type === 'breakable')) {
    if (obj.id === 'chest') {
      interact('Open', obj);
    } else if (obj.id === 'cell_door') {
      showMsg('Pried the cell door open with the spore pry bar!');
      puzzlesSolved['cell_open'] = true;
      obj.type = 'scenery';
      obj.desc = 'The cell door hangs open, spore-crust crumbling.';
      addScore(100, obj.x, obj.y, 'BREAK');
    } else {
      showMsg('The spore pry bar doesn\'t work on that.');
    }
  } else if (itemId === 'ghost_charm' && obj.id === 'cell_door') {
    showMsg('The charm glows but doesn\'t help with the door.');
  } else if (itemId === 'rusty_key' && obj.type === 'locked_door' && obj.key === 'rusty_key') {
    interact('Open', obj);
  } else if (itemId === 'lab_key' && obj.id === 'locked_gate') {
    showMsg('The lab key fits! The reactor gate swings open for your baseling.');
    removeItem(currentChar, 'lab_key');
    puzzlesSolved['lab_gate_open'] = true;
    obj.type = 'exit';
    obj.desc = 'The reactor gate is open.';
    addScore(200, obj.x, obj.y, 'ACCESS');
    changeRoom('secret_lab');
  } else {
    showMsg('Can\'t use ' + item.name + ' on that.');
  }
}

function handleDevice(obj) {
  if (obj.id === 'generator_obj') {
    if (puzzlesSolved['fuse_installed']) {
      showMsg('The reactor core roars to life! Power restored to the mansion!');
      powerOn = true;
      puzzlesSolved['power_on'] = true;
      TAS.fx.flash('#38d973', 0.3);
      TAS.fx.shake(5, 1.2);
      TAS.audio.playTone(100, 0.5, 'sawtooth', 0.06);
      addScore(300, obj.x, obj.y, 'REACTOR ON');
      for (var pi = 0; pi < 15; pi++) {
        spawnRoomParticle(obj.x + obj.w/2, obj.y, '#38d973');
      }
    } else {
      showMsg('The reactor core won\'t start. A garden fuse is missing.');
    }
  } else if (obj.id === 'switch_panel') {
    if (powerOn) {
      showMsg('Reactor power is flowing through the mansion!');
    } else {
      showMsg('No power. The reactor core needs to be running.');
    }
  } else if (obj.id === 'fusebox') {
    if (puzzlesSolved['fuse_installed']) {
      showMsg('The reactor fuse box is working. Head to the reactor core.');
    } else {
      showMsg('A garden fuse is missing from the reactor box.');
    }
  } else if (obj.id === 'beacon') {
    if (puzzlesSolved['beacon_powered']) {
      showMsg('The beacon pulses! A distress signal goes out into the night!');
      puzzlesSolved['beacon_active'] = true;
      addScore(200, obj.x, obj.y, 'SIGNAL');
      TAS.fx.flash('#ffffff', 0.2);
    } else {
      showMsg('No power source. Needs a POOP cell.');
    }
  } else if (obj.id === 'panel') {
    // INT bonus: easier hacking
    if (CHARS[currentChar].id === 'brains' || intMod() >= 3) {
      showMsg(CHARS[currentChar].id === 'brains' ? 'Brains hacks the reactor panel! Security disabled.' : CHARS[currentChar].name + '\'s intellect cracks the reactor security!');
      puzzlesSolved['panel_hacked'] = true;
      addScore(250, obj.x, obj.y, 'INT HACK');
    } else {
      showMsg('Too complex. Only a genius baseling could figure this spore lock out.');
      if (Math.random() < intHintChance()) {
        showMsg('Too complex. Brains could hack this, or a baseling with very high INT.');
      }
    }
  } else if (obj.id === 'computer') {
    if (CHARS[currentChar].id === 'brains' || intMod() >= 2) {
      startDialogue([
        (CHARS[currentChar].id === 'brains' ? 'Brains' : CHARS[currentChar].name) + ' accesses the reactor terminal...',
        '"Project Sporeling: Fungal consciousness transfer via garden reactor energy"',
        '"Subject 7 (Nibbles the baseling) location: Sub-Level Secret Lab"',
        '"Release requires: Spore Gem + Antidote + Conductor"'
      ]);
      addScore(150, obj.x, obj.y, 'INT DATA');
    } else {
      showMsg('The screen shows gibberish. Need a smarter baseling.');
    }
  }
}

function handleFinalDevice(obj) {
  var hasC = anyHasItem('crystal');
  var hasA = anyHasItem('antidote');
  var hasW = anyHasItem('fixed_wire');

  if (hasC && hasA && hasW) {
    showMsg('Inserting all garden reactor components...');
    for (var i = 0; i < 3; i++) {
      removeItem(i, 'crystal');
      removeItem(i, 'antidote');
      removeItem(i, 'fixed_wire');
    }
    puzzlesSolved['friend_rescued'] = true;
    winState = true;
    state = 'win';
    addScore(1000, GW/2, GH/2, 'RESCUED');
    TAS.fx.flash('#38d973', 0.5);
    TAS.fx.shake(6, 1.5);
    TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1047,0.3]], 150);
  } else {
    var missing = [];
    if (!hasC) missing.push('Spore Gem');
    if (!hasA) missing.push('Antidote');
    if (!hasW) missing.push('Fixed Wire');
    showMsg('Still need: ' + missing.join(', '));
    // INT hint: tell which room to check
    if (Math.random() < intHintChance()) {
      if (!hasC) showMsg('Still need items. The spore gem might be in the Sporeling Hall cabinet.');
      else if (!hasA) showMsg('Still need items. Check the Spore Wash medicine locker for antidote.');
      else if (!hasW) showMsg('Still need items. Fix the broken wire in the Reactor Corridor with spore tape.');
    }
  }
}

// === ROOM NAVIGATION ===
function changeRoom(roomId) {
  if (!ROOMS[roomId]) {
    showMsg('Can\'t go there.');
    return;
  }
  currentRoom = roomId;
  charRoom[currentChar] = roomId;
  charPositions[currentChar] = { x: 200, y: 140 };
  hintShown = false;
  discoveryBonus = false;
  saveGame();
  TAS.audio.playTone(200, 0.1, 'sine', 0.04);

  // WIS: chance to auto-discover something in a new room
  if (Math.random() < wisDiscoveryChance() * 0.3 && !puzzlesSolved['wis_room_' + roomId]) {
    puzzlesSolved['wis_room_' + roomId] = true;
    discoveryBonus = true;
    showMsg('Your baseling senses tingle... something hidden is nearby!');
  }

  // Check for scientist — ghost charm or stealth provides protection
  if (roomId === scientistRoom && !puzzlesSolved['panel_hacked']) {
    if (anyHasItem('ghost_charm')) {
      showMsg('The ghost charm wards off Dr. Sporax! The mad mold scientist flees!');
      scientistRoom = 'lab';
      addScore(100, charPositions[currentChar].x, charPositions[currentChar].y, 'WARD');
    } else if (stealthActive) {
      showMsg('Your baseling sneaks past Dr. Sporax undetected!');
      addScore(75, charPositions[currentChar].x, charPositions[currentChar].y, 'CON SNEAK');
    } else {
      caught = true;
      caughtTimer = 3;
      showMsg('The mad mold scientist caught your baseling! Sent to the dungeon!');
      TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1);
      TAS.fx.flash('#ff0000', 0.4);
      TAS.fx.shake(5, 1.0);
    }
  }
}

// === SCIENTIST PATROL ===
function updateScientist(dt) {
  if (puzzlesSolved['panel_hacked']) return;
  scientistTimer += dt;
  var patrolSpeed = 8 - Math.min(3, dexMod()); // DEX: scientist is slower relative to you
  if (scientistTimer > patrolSpeed) {
    scientistTimer = 0;
    scientistPathIdx = (scientistPathIdx + 1) % scientistPath.length;
    scientistRoom = scientistPath[scientistPathIdx];
    if (scientistRoom === currentRoom && charRoom[currentChar] === currentRoom) {
      if (anyHasItem('ghost_charm')) {
        showMsg('The ghost charm keeps the mad mold scientist at bay!');
        scientistRoom = scientistPath[(scientistPathIdx + 1) % scientistPath.length];
      } else if (stealthActive) {
        showMsg('Your baseling remains hidden as Dr. Sporax passes through!');
        addScore(50, charPositions[currentChar].x, charPositions[currentChar].y, 'STEALTH');
      } else {
        caught = true;
        caughtTimer = 3;
        showMsg('The mad mold scientist found your baseling! To the dungeon!');
        TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1);
        TAS.fx.flash('#ff0000', 0.4);
        TAS.fx.shake(5, 1.0);
      }
    }
  }
}

// === STEALTH SYSTEM (CON-based) ===
function updateStealth(dt) {
  if (stealthActive) {
    stealthTimer -= dt;
    if (stealthTimer <= 0) {
      stealthActive = false;
      stealthTimer = 0;
    }
  }
}

// Activate stealth when entering dark rooms — CON determines duration
function checkStealthOnEntry() {
  var room = ROOMS[currentRoom];
  if (room && room.theme === 'dark') {
    stealthActive = true;
    stealthTimer = 3 + conStealthBonus(); // CON: longer stealth in dark rooms
  }
}

// === ROOM PARTICLE HELPER ===
function spawnRoomParticle(x, y, color) {
  fungiParticles.push({
    x: x, y: y,
    vx: (Math.random() - 0.5) * 2,
    vy: -1 - Math.random() * 2,
    life: 1,
    size: 1.5 + Math.random() * 2.5,
    color: color || '#38d973'
  });
}

// === AMBIENT FUNGI PARTICLES ===
function updateAmbient(dt) {
  ambientTimer += dt;
  if (ambientTimer > 0.4) {
    ambientTimer = 0;
    var room = ROOMS[currentRoom];
    var glow = room ? room.glow : '#38d973';
    // Spawn 1-2 ambient particles
    for (var j = 0; j < (powerOn ? 2 : 1); j++) {
      fungiParticles.push({
        x: Math.random() * GW,
        y: SCENE_H * 0.3 + Math.random() * SCENE_H * 0.6,
        vx: (Math.random() - 0.5) * 0.3,
        vy: -0.2 - Math.random() * 0.3,
        life: 1,
        size: 1 + Math.random() * 2,
        color: glow
      });
    }
    // Extra spore particles in organic/garden themed rooms
    if (room && (room.theme === 'organic' || room.theme === 'garden')) {
      fungiParticles.push({
        x: Math.random() * GW,
        y: SCENE_H * 0.5 + Math.random() * SCENE_H * 0.4,
        vx: (Math.random() - 0.5) * 0.5,
        vy: -0.1 - Math.random() * 0.2,
        life: 1.5,
        size: 2 + Math.random() * 3,
        color: '#38d973'
      });
    }
  }
  for (var i = fungiParticles.length - 1; i >= 0; i--) {
    var p = fungiParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt * 0.4;
    if (p.life <= 0) fungiParticles.splice(i, 1);
  }
  // Update score popups
  for (var s = scorePopups.length - 1; s >= 0; s--) {
    scorePopups[s].y -= dt * 30;
    scorePopups[s].life -= dt;
    if (scorePopups[s].life <= 0) scorePopups.splice(s, 1);
  }
}

// === DRAWING FUNCTIONS ===

// NES-style pixel drawing helpers
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawPixelBorder(x, y, w, h, color, thickness) {
  ctx.strokeStyle = color;
  ctx.lineWidth = thickness || 1;
  ctx.strokeRect(Math.floor(x) + 0.5, Math.floor(y) + 0.5, Math.floor(w), Math.floor(h));
}

// Theme-specific room decorations
function drawRoomDecorations(room) {
  if (!room) return;
  var t = room.theme;
  ctx.globalAlpha = 0.15;

  if (t === 'mansion') {
    // Brick pattern on walls
    ctx.fillStyle = '#332211';
    for (var by = 10; by < SCENE_H - 50; by += 16) {
      for (var bx = (by % 32 === 10 ? 0 : 8); bx < GW; bx += 24) {
        ctx.fillRect(bx, by, 20, 12);
      }
    }
    // Wainscoting
    ctx.fillStyle = '#221111';
    ctx.fillRect(0, SCENE_H - 70, GW, 30);
    ctx.strokeStyle = room.glow;
    ctx.globalAlpha = 0.1;
    ctx.strokeRect(0, SCENE_H - 70, GW, 1);
  } else if (t === 'tech') {
    // Grid lines (reactor aesthetic)
    ctx.strokeStyle = room.glow;
    ctx.globalAlpha = 0.08;
    for (var gx = 0; gx < GW; gx += 32) {
      ctx.beginPath();
      ctx.moveTo(gx, 0);
      ctx.lineTo(gx, SCENE_H);
      ctx.stroke();
    }
    for (var gy = 0; gy < SCENE_H; gy += 32) {
      ctx.beginPath();
      ctx.moveTo(0, gy);
      ctx.lineTo(GW, gy);
      ctx.stroke();
    }
    // Reactor pipes along ceiling
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#334444';
    ctx.fillRect(0, 5, GW, 8);
    ctx.fillStyle = room.glow;
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.05) * 0.05;
    ctx.fillRect(0, 7, GW, 4);
  } else if (t === 'organic') {
    // Mycelial network lines
    ctx.strokeStyle = room.glow;
    ctx.globalAlpha = 0.1;
    ctx.lineWidth = 1;
    for (var mi = 0; mi < 6; mi++) {
      var mx1 = (mi * 97 + 13) % GW;
      var my1 = (mi * 53 + 7) % (SCENE_H - 40);
      var mx2 = (mi * 71 + 43) % GW;
      var my2 = (mi * 37 + 19) % (SCENE_H - 40);
      ctx.beginPath();
      ctx.moveTo(mx1, my1);
      ctx.quadraticCurveTo(GW/2, my1 + 30, mx2, my2);
      ctx.stroke();
    }
  } else if (t === 'dark') {
    // Dark vignette corners
    var grad = ctx.createRadialGradient(GW/2, SCENE_H/2, 50, GW/2, SCENE_H/2, GW/2);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, SCENE_H);
  } else if (t === 'mystical') {
    // Floating diamond shapes
    ctx.fillStyle = room.glow;
    for (var di = 0; di < 4; di++) {
      var dx = (di * 110 + 40 + Math.sin(frame * 0.02 + di) * 15);
      var dy = 30 + di * 40 + Math.cos(frame * 0.03 + di) * 10;
      ctx.globalAlpha = 0.08 + Math.sin(frame * 0.04 + di) * 0.04;
      ctx.save();
      ctx.translate(dx, dy);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-5, -5, 10, 10);
      ctx.restore();
    }
  } else if (t === 'garden') {
    // Ground grass tufts
    ctx.fillStyle = '#1a3a1a';
    ctx.globalAlpha = 0.3;
    for (var gi = 0; gi < 20; gi++) {
      var gx2 = (gi * 23 + 5) % GW;
      ctx.fillRect(gx2, SCENE_H - 42, 3, 6);
      ctx.fillRect(gx2 + 4, SCENE_H - 44, 2, 8);
    }
  }
  ctx.globalAlpha = 1;
  ctx.lineWidth = 1;
}

function drawRoom() {
  var room = ROOMS[currentRoom];
  if (!room) return;

  // Background
  ctx.fillStyle = room.bg;
  ctx.fillRect(0, 0, GW, SCENE_H);

  // Theme decorations
  drawRoomDecorations(room);

  // Floor
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, SCENE_H - 40, GW, 40);
  // Floor tiles (NES style)
  ctx.strokeStyle = room.glow;
  ctx.globalAlpha = 0.15;
  for (var fx = 0; fx < GW; fx += 32) {
    ctx.strokeRect(fx, SCENE_H - 40, 32, 40);
  }
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(0, SCENE_H - 40, GW, 1);
  ctx.globalAlpha = 1;

  // Walls with NES-style double border
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.strokeRect(2, 2, GW - 4, SCENE_H - 4);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.strokeRect(4, 4, GW - 8, SCENE_H - 8);

  // Glowing fungi patches (themed)
  var seed = currentRoom.length * 7;
  for (var i = 0; i < 7; i++) {
    var fpx = ((seed + i * 97) % 400) + 20;
    var fpy = ((seed + i * 53) % (SCENE_H - 80)) + 30;
    var fs = 2 + (i % 4) * 2;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.15;
    ctx.fillStyle = room.glow;
    ctx.beginPath();
    ctx.arc(fpx, fpy, fs, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.08;
    ctx.beginPath();
    ctx.arc(fpx, fpy, fs * 3, 0, Math.PI * 2);
    ctx.fill();
    // NES-style mushroom cap on some
    if (i % 3 === 0) {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = room.glow;
      ctx.fillRect(fpx - fs, fpy - fs * 1.5, fs * 2, fs);
      ctx.fillStyle = '#000';
      ctx.fillRect(fpx - 1, fpy - fs * 0.5, 2, fs);
    }
  }
  ctx.globalAlpha = 1;

  // Draw ambient particles
  for (var pi = 0; pi < fungiParticles.length; pi++) {
    var p = fungiParticles[pi];
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Room name
  ctx.fillStyle = room.glow;
  ctx.globalAlpha = 0.7;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(room.name, 8, 14);
  ctx.globalAlpha = 1;

  // Stealth indicator
  if (stealthActive) {
    ctx.fillStyle = '#3cacd7';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('STEALTH', 8, 24);
    ctx.globalAlpha = 1;
  }

  // Discovery indicator
  if (discoveryBonus) {
    ctx.fillStyle = '#f4b41b';
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.3;
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SOMETHING HIDDEN HERE', 8, stealthActive ? 34 : 24);
    ctx.globalAlpha = 1;
  }

  // Exit indicators
  var exits = room.exits;
  ctx.font = '8px monospace';
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  if (exits.north || exits.up) {
    var eName = exits.north ? ROOMS[exits.north].name : 'Up';
    ctx.fillText('^ ' + eName, GW/2, 18);
    // NES arrow
    drawPixelRect(GW/2 - 4, 6, 8, 2, '#888');
    drawPixelRect(GW/2 - 2, 4, 4, 2, '#888');
  }
  if (exits.south || exits.down) {
    var sName = exits.south ? ROOMS[exits.south].name : 'Down';
    ctx.fillText('v ' + sName, GW/2, SCENE_H - 8);
  }
  if (exits.east) { ctx.textAlign = 'right'; ctx.fillText(ROOMS[exits.east].name + ' >', GW - 8, SCENE_H/2); }
  if (exits.west) { ctx.textAlign = 'left'; ctx.fillText('< ' + ROOMS[exits.west].name, 8, SCENE_H/2); }
}

function drawObjects() {
  var objs = roomObjects[currentRoom] || [];
  for (var oi = 0; oi < objs.length; oi++) {
    var obj = objs[oi];
    var isHover = (obj === hoverObject);
    var glow = isHover ? 1 : 0.6;

    ctx.globalAlpha = glow;
    switch(obj.type) {
      case 'exit': case 'climbable': case 'high_exit':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#335533');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#88ff88' : '#446644', 2);
        // Door arch (NES style)
        ctx.fillStyle = isHover ? '#88ff88' : '#446644';
        ctx.fillRect(obj.x, obj.y, obj.w, 3);
        break;
      case 'locked_door':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#553322');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#f4b41b' : '#664433', 2);
        // Lock icon
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(obj.x + obj.w/2 - 3, obj.y + obj.h/2 - 2, 6, 6);
        ctx.fillStyle = '#000';
        ctx.fillRect(obj.x + obj.w/2 - 1, obj.y + obj.h/2, 2, 2);
        break;
      case 'pickup':
        ctx.fillStyle = ALL_ITEMS[obj.item] ? ALL_ITEMS[obj.item].color : '#fff';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, Math.min(obj.w, obj.h)/2, 0, Math.PI*2);
        ctx.fill();
        if (isHover) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke(); ctx.lineWidth = 1; }
        // Sparkle effect
        if (frame % 30 < 15) {
          ctx.fillStyle = '#fff';
          ctx.globalAlpha = 0.5;
          ctx.fillRect(obj.x + obj.w/2 - 1, obj.y + obj.h/2 - 5, 2, 3);
          ctx.fillRect(obj.x + obj.w/2 + 3, obj.y + obj.h/2 - 1, 3, 2);
          ctx.globalAlpha = glow;
        }
        break;
      case 'container':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#443322');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#ffaa66' : '#554433', 2);
        // Handle
        ctx.fillStyle = '#665544';
        ctx.fillRect(obj.x + obj.w/2 - 4, obj.y + 2, 8, 3);
        break;
      case 'ghost':
        // Library sprite (spectral wisp) with the same flicker; procedural ghost kept as fallback.
        var _gim = enemySpr('ghost');
        if (_gim) {
          ctx.globalAlpha = 0.45 + Math.sin(frame * 0.05) * 0.2;
          drawEnemySpr(_gim, obj.x - 4, obj.y - 8, obj.w + 8, obj.h + 8, false);
          ctx.globalAlpha = glow;
          break;
        }
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05) * 0.2;
        ctx.fillStyle = '#aaccff';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, obj.w/2, 0, Math.PI*2);
        ctx.fill();
        // Ghost face
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(obj.x + obj.w/2 - 6, obj.y + obj.h/2 - 4, 3, 3);
        ctx.fillRect(obj.x + obj.w/2 + 3, obj.y + obj.h/2 - 4, 3, 3);
        ctx.fillRect(obj.x + obj.w/2 - 3, obj.y + obj.h/2 + 3, 6, 2);
        // Wavy bottom
        for (var gi = 0; gi < 4; gi++) {
          ctx.globalAlpha = 0.2 + Math.sin(frame * 0.06 + gi) * 0.1;
          ctx.fillRect(obj.x + obj.w/2 - 8 + gi * 5, obj.y + obj.h/2 + 8 + Math.sin(frame * 0.08 + gi) * 2, 4, 4);
        }
        ctx.globalAlpha = glow;
        break;
      case 'goal':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#224422');
        ctx.strokeStyle = '#38d973';
        ctx.lineWidth = 2;
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        ctx.lineWidth = 1;
        // Friend inside pod
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2 - 5, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.fillRect(obj.x + obj.w/2 - 4, obj.y + obj.h/2 + 3, 8, 12);
        // Pod bubbles
        for (var bi = 0; bi < 3; bi++) {
          ctx.globalAlpha = 0.3 + Math.sin(frame * 0.06 + bi) * 0.2;
          ctx.beginPath();
          ctx.arc(obj.x + obj.w/2 - 10 + bi * 10, obj.y + 15 + Math.sin(frame * 0.04 + bi * 2) * 5, 2, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = glow;
        break;
      case 'hazard':
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.06) * 0.2;
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, obj.w/2 + Math.sin(frame * 0.04) * 3, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 0.2;
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, obj.w/2 + 8, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = glow;
        break;
      case 'device': case 'final_device': case 'hackable':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#222244');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#88aaff' : '#334466', 2);
        if (powerOn || obj.type === 'hackable') {
          // Blinking LED
          ctx.fillStyle = frame % 40 < 20 ? '#38d973' : '#228822';
          ctx.fillRect(obj.x + 3, obj.y + 3, 4, 4);
          // Screen glow
          ctx.fillStyle = '#113311';
          ctx.fillRect(obj.x + 10, obj.y + 4, obj.w - 14, obj.h - 8);
          ctx.fillStyle = '#38d973';
          ctx.globalAlpha = 0.3;
          for (var li = 0; li < 3; li++) {
            ctx.fillRect(obj.x + 12, obj.y + 8 + li * 6, obj.w - 18, 2);
          }
          ctx.globalAlpha = glow;
        }
        break;
      case 'readable':
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#333322');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#ddddaa' : '#555544');
        // Text lines icon
        ctx.fillStyle = '#888866';
        ctx.fillRect(obj.x + 3, obj.y + 4, obj.w - 6, 2);
        ctx.fillRect(obj.x + 3, obj.y + 8, obj.w - 8, 2);
        ctx.fillRect(obj.x + 3, obj.y + 12, obj.w - 10, 2);
        break;
      default:
        drawPixelRect(obj.x, obj.y, obj.w, obj.h, '#332222');
        drawPixelBorder(obj.x, obj.y, obj.w, obj.h, isHover ? '#aaa' : '#444');
    }
    ctx.globalAlpha = 1;

    // Label on hover with NES-style background
    if (isHover) {
      var label = obj.name;
      var tw = ctx.measureText(label).width;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(obj.x + obj.w/2 - tw/2 - 4, obj.y - 14, tw + 8, 12);
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(label, obj.x + obj.w/2, obj.y - 4);
    }
  }
}

function drawCharacter(idx) {
  if (!charAlive[idx]) return;
  if (charRoom[idx] !== currentRoom) return;

  var ch = CHARS[idx];
  var pos = charPositions[idx];
  var isCurrent = (idx === currentChar);
  var bob = Math.sin(frame * 0.06 + idx) * 2;
  var alpha = isCurrent ? 1 : (stealthActive ? 0.3 : 0.5);

  ctx.globalAlpha = alpha;
  var x = pos.x, y = pos.y + bob;

  // Shadow
  ctx.fillStyle = '#000';
  ctx.globalAlpha = alpha * 0.3;
  ctx.beginPath();
  ctx.ellipse(x, pos.y + 16, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = alpha;

  // Baseling body (NES pixel art style). The CURRENT character is the player's selected
  // baseling sprite; the other two switchable characters keep their procedural look.
  var c = ch.color;
  var _drewSprite = isCurrent && window.TAS && TAS.drawBaseling &&
    TAS.drawBaseling(ctx, x, y - 8, 24, { flipX: false, frame: frame, anim: 'idle', alpha: alpha });
  if (!_drewSprite) {
    // Body
    ctx.fillStyle = c;
    ctx.fillRect(x - 5, y - 10, 10, 14);
    // Head (round baseling)
    ctx.beginPath();
    ctx.arc(x, y - 18, 8, 0, Math.PI * 2);
    ctx.fill();
    // Eyes (pixel style)
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 4, y - 20, 3, 3);
    ctx.fillRect(x + 1, y - 20, 3, 3);
    ctx.fillStyle = '#111';
    ctx.fillRect(x - 3, y - 19, 2, 2);
    ctx.fillRect(x + 2, y - 19, 2, 2);
    // Feet
    ctx.fillStyle = c;
    ctx.fillRect(x - 5, y + 4, 4, 6);
    ctx.fillRect(x + 1, y + 4, 4, 6);
    // Arms (animation)
    var armWave = Math.sin(frame * 0.08 + idx * 2) * 2;
    ctx.fillRect(x - 8, y - 8 + armWave, 3, 8);
    ctx.fillRect(x + 5, y - 8 - armWave, 3, 8);

    // Baseling icon on body
    ctx.fillStyle = '#000';
    ctx.globalAlpha = alpha * 0.5;
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ch.icon, x, y);
    ctx.globalAlpha = alpha;
  }

  // Name tag
  if (isCurrent) {
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 0.5;
    var nameW = ctx.measureText(ch.name).width + 6;
    ctx.fillRect(x - nameW/2, y - 32, nameW, 10);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ch.name, x, y - 24);
    // Selection circle
    ctx.strokeStyle = c;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(x, pos.y + 16, 8, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  ctx.globalAlpha = 1;
}

function drawScientist() {
  // Dr. Sporax is drawn procedurally on purpose — no fitting library sprite yet (known art gap).
  if (scientistRoom !== currentRoom) return;
  if (puzzlesSolved['panel_hacked']) return;

  var sx = 350 + Math.sin(frame * 0.04) * 20;
  var sy = 120;
  var bob = Math.sin(frame * 0.08) * 2;

  // Shadow
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.ellipse(sx, sy + 16, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // White coat (NES pixel style)
  ctx.fillStyle = '#ddddcc';
  ctx.fillRect(sx - 8, sy - 8 + bob, 16, 22);
  // Coat details
  ctx.fillStyle = '#ccccbb';
  ctx.fillRect(sx - 1, sy - 6 + bob, 2, 18);
  // Head (wild hair)
  ctx.fillStyle = '#888888';
  ctx.beginPath();
  ctx.arc(sx, sy - 16 + bob, 9, 0, Math.PI * 2);
  ctx.fill();
  // Wild hair spikes
  ctx.fillStyle = '#999999';
  ctx.fillRect(sx - 8, sy - 24 + bob, 3, 6);
  ctx.fillRect(sx - 3, sy - 26 + bob, 3, 6);
  ctx.fillRect(sx + 3, sy - 25 + bob, 3, 6);
  ctx.fillRect(sx + 7, sy - 23 + bob, 3, 5);
  // Goggles (red reactor goggles)
  ctx.fillStyle = '#e6482e';
  ctx.fillRect(sx - 7, sy - 18 + bob, 6, 5);
  ctx.fillRect(sx + 1, sy - 18 + bob, 6, 5);
  ctx.fillStyle = '#ff8888';
  ctx.fillRect(sx - 6, sy - 17 + bob, 2, 2);
  ctx.fillRect(sx + 2, sy - 17 + bob, 2, 2);
  // Evil grin
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy - 10 + bob, 4, 0.1, Math.PI - 0.1);
  ctx.stroke();
  ctx.lineWidth = 1;
  // Feet
  ctx.fillStyle = '#444';
  ctx.fillRect(sx - 6, sy + 14 + bob, 5, 4);
  ctx.fillRect(sx + 1, sy + 14 + bob, 5, 4);

  // Name with warning color
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.6;
  var dw = ctx.measureText('Dr. Sporax').width + 6;
  ctx.fillRect(sx - dw/2, sy - 34 + bob, dw, 10);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Dr. Sporax', sx, sy - 26 + bob);

  // Danger indicator
  ctx.fillStyle = '#ff0000';
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
  ctx.font = '7px monospace';
  ctx.fillText('DANGER', sx, sy - 38 + bob);
  ctx.globalAlpha = 1;
}

function drawVerbBar() {
  var barY = GH - VERB_BAR_H - INV_BAR_H;
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, barY, GW, VERB_BAR_H);
  ctx.strokeStyle = '#333';
  ctx.strokeRect(0, barY, GW, VERB_BAR_H);

  for (var i = 0; i < VERBS.length; i++) {
    var col = i % 4;
    var row = Math.floor(i / 4);
    var vx = col * VERB_W;
    var vy = barY + row * VERB_H;
    var isSelected = (VERBS[i] === selectedVerb);
    var isHovering = mouseX >= vx && mouseX < vx + VERB_W && mouseY >= vy && mouseY < vy + VERB_H;

    if (isSelected) {
      ctx.fillStyle = '#334455';
      ctx.fillRect(vx + 1, vy + 1, VERB_W - 2, VERB_H - 2);
      // NES-style selection highlight
      ctx.strokeStyle = '#f4b41b';
      ctx.strokeRect(vx + 1, vy + 1, VERB_W - 2, VERB_H - 2);
    } else if (isHovering) {
      ctx.fillStyle = '#222233';
      ctx.fillRect(vx + 1, vy + 1, VERB_W - 2, VERB_H - 2);
    }

    ctx.strokeStyle = '#444';
    ctx.strokeRect(vx, vy, VERB_W, VERB_H);

    ctx.fillStyle = isSelected ? '#f4b41b' : (isHovering ? '#aaa' : '#888');
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(VERBS[i], vx + VERB_W/2, vy + VERB_H/2 + 3);
  }
}

function drawInventory() {
  var invY = GH - INV_BAR_H;
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, invY, GW, INV_BAR_H);
  ctx.strokeStyle = '#333';
  ctx.strokeRect(0, invY, GW, INV_BAR_H);

  var inv = inventory[currentChar];
  var slotW = 50;
  var startX = 4;
  for (var i = 0; i < Math.min(inv.length, 9); i++) {
    var item = ALL_ITEMS[inv[i]];
    if (!item) continue;
    var sx = startX + i * (slotW + 2);
    var isHovering = mouseX >= sx && mouseX < sx + slotW && mouseY >= invY && mouseY < invY + INV_BAR_H;
    var isUsing = (useItem === inv[i]);

    ctx.fillStyle = isUsing ? '#334400' : (isHovering ? '#222244' : '#111122');
    ctx.fillRect(sx, invY + 2, slotW, INV_BAR_H - 4);
    ctx.strokeStyle = isUsing ? '#38d973' : (isHovering ? '#666' : '#333');
    ctx.strokeRect(sx, invY + 2, slotW, INV_BAR_H - 4);

    ctx.fillStyle = item.color;
    ctx.beginPath();
    ctx.arc(sx + 12, invY + INV_BAR_H/2, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#ccc';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.name.substring(0, 7), sx + 20, invY + INV_BAR_H/2 + 3);
  }

  // Character indicator with baseling icon
  ctx.textAlign = 'right';
  ctx.fillStyle = CHARS[currentChar].color;
  ctx.font = 'bold 10px monospace';
  ctx.fillText('[' + CHARS[currentChar].icon + '] ' + CHARS[currentChar].name, GW - 6, invY + INV_BAR_H/2 + 4);
}

function drawMessage() {
  if (msgTimer <= 0 || !msgText) return;
  var alpha = Math.min(1, msgTimer);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.font = '10px monospace';
  var tw = ctx.measureText(msgText).width + 24;
  var mx = (GW - tw) / 2;
  ctx.fillRect(mx, SCENE_H - 32, tw, 24);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx, SCENE_H - 32, tw, 24);
  ctx.fillStyle = '#e0f0e0';
  ctx.textAlign = 'center';
  ctx.fillText(msgText, GW/2, SCENE_H - 16);
  ctx.globalAlpha = 1;
}

function drawDialogue() {
  if (state !== 'dialogue') return;
  var line = dialogueLines[dialogueIdx] || '';

  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(16, SCENE_H - 65, GW - 32, 55);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 2;
  ctx.strokeRect(16, SCENE_H - 65, GW - 32, 55);
  ctx.lineWidth = 1;
  // Inner border (NES double-border)
  ctx.strokeStyle = '#226633';
  ctx.strokeRect(18, SCENE_H - 63, GW - 36, 51);

  ctx.fillStyle = '#e0f0e0';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  // Word wrap
  var words = line.split(' ');
  var lines = [''];
  var li = 0;
  for (var wi = 0; wi < words.length; wi++) {
    if (ctx.measureText(lines[li] + words[wi]).width > GW - 70) {
      li++;
      lines[li] = '';
    }
    lines[li] += words[wi] + ' ';
  }
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], 28, SCENE_H - 48 + i * 13);
  }

  // Progress indicator
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('[' + (dialogueIdx + 1) + '/' + dialogueLines.length + ' click]', GW - 24, SCENE_H - 15);
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.life);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

function drawCaughtScreen() {
  ctx.fillStyle = 'rgba(80,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);

  // NES-style caught text
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CAUGHT!', GW/2 + 2, GH/2 - 18);
  ctx.fillStyle = '#e6482e';
  ctx.fillText('CAUGHT!', GW/2, GH/2 - 20);

  ctx.fillStyle = '#e6482e';
  ctx.font = '11px monospace';
  ctx.fillText('The mad mold scientist sends your baseling to the dungeon!', GW/2, GH/2 + 10);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Hack the security panel to stop his fungal patrols.', GW/2, GH/2 + 28);
}

// === TITLE SCREEN ===
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Spore mansion silhouette (NES style)
  ctx.fillStyle = '#252840';
  ctx.fillRect(140, 100, 200, 130);
  ctx.fillRect(160, 70, 30, 30);
  ctx.fillRect(290, 60, 30, 40);
  ctx.fillRect(180, 50, 120, 50);
  // Reactor tower
  ctx.fillRect(305, 40, 20, 20);
  ctx.fillStyle = '#38d973';
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06) * 0.3;
  ctx.fillRect(310, 42, 10, 8);
  ctx.globalAlpha = 1;

  // Windows
  for (var i = 0; i < 6; i++) {
    var wx = 160 + (i % 3) * 60;
    var wy = 110 + Math.floor(i / 3) * 50;
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04 + i) * 0.2;
    ctx.fillRect(wx, wy, 15, 20);
    // Window panes (NES detail)
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(wx + 7, wy, 1, 20);
    ctx.fillRect(wx, wy + 9, 15, 1);
  }
  ctx.globalAlpha = 1;

  // Fungi glow along ground
  for (var j = 0; j < 10; j++) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.02 + j * 0.7) * 0.1;
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.arc(80 + j * 35, 235 + Math.sin(j) * 5, 3 + Math.sin(frame * 0.03 + j) * 2, 0, Math.PI*2);
    ctx.fill();
    // Mushroom stems
    ctx.fillStyle = '#226633';
    ctx.fillRect(80 + j * 35 - 1, 232 + Math.sin(j) * 5, 2, 6);
  }
  ctx.globalAlpha = 1;

  // Title with NES drop shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE MANSION', GW/2 + 2, 27);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE MANSION', GW/2, 25);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('FUNGAL FRENZY', GW/2 + 1, 44);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('FUNGAL FRENZY', GW/2, 43);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Adventure', GW/2, 60);

  // Baseling characters (NES pixel art)
  for (var ci = 0; ci < 3; ci++) {
    var cx = 150 + ci * 65;
    var cy = 265;
    var c = CHARS[ci].color;
    // Body
    ctx.fillStyle = c;
    ctx.fillRect(cx - 5, cy, 10, 14);
    // Head
    ctx.beginPath();
    ctx.arc(cx, cy - 8, 8, 0, Math.PI*2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 4, cy - 10, 3, 3);
    ctx.fillRect(cx + 1, cy - 10, 3, 3);
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - 3, cy - 9, 2, 2);
    ctx.fillRect(cx + 2, cy - 9, 2, 2);
    // Feet
    ctx.fillStyle = c;
    ctx.fillRect(cx - 5, cy + 14, 4, 4);
    ctx.fillRect(cx + 1, cy + 14, 4, 4);
    // Label
    ctx.fillStyle = '#ccc';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(CHARS[ci].name, cx, cy + 28);
    ctx.fillStyle = '#888';

    ctx.fillStyle = '#3cacd7';

  }
}

function drawWinScreen() {

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLICK TO PLAY AGAIN', GW/2, 290);

// === TUTORIAL OVERLAY ===
function drawTutorial() {
  if (tutorialDismissed || state !== 'playing') return;
  if (Object.keys(puzzlesSolved).length > 2) { tutorialDismissed = true; return; }

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(30, 20, GW - 60, SCENE_H - 40);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 2;
  ctx.strokeRect(30, 20, GW - 60, SCENE_H - 40);
  ctx.lineWidth = 1;

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASELING RESCUE MISSION', GW/2, 45);

  ctx.fillStyle = '#e0f0e0';
  ctx.font = '9px monospace';
  var tips = [
    'Your baseling squad must rescue Nibbles from the mad mold scientist!',
    '',
    'VERBS: Click a verb, then click an object (or A/D pick verb, W act)',
    'KEYS: ARROWS move cursor | W act | A/D verb | S item | 1/2/3 swap',
    'ITEMS: Click inventory slot then "Use" on objects',
    'EXITS: Click room edges or exit objects to move',
    '',
    'Each baseling has unique skills:',
    '  Sparky - climbs mycelium and reaches high places',
    '  Brains - hacks terminals and reads spore data',
    '  Muscles - smashes through spore walls and forces locks',
    '',
    'Baseling stats boost: STR=force DEX=speed CON=stealth',
    '  INT=puzzles WIS=discovery CHA=NPC luck'
  ];
  for (var ti = 0; ti < tips.length; ti++) {
    ctx.fillText(tips[ti], GW/2, 62 + ti * 12);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.globalAlpha = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.fillText('CLICK TO DISMISS', GW/2, SCENE_H - 25);
  ctx.globalAlpha = 1;
}

// === CLICK HANDLING ===
function handleClick() {
  if (!mouseClicked) return;
  mouseClicked = false;

  if (state === 'title') {
    if (TAS.input.keys[' '] || TAS.input.keys['Space']) {
      if (loadGame()) {
        state = 'playing';
        return;
      }
    }
    state = 'playing';
    return;
  }

  if (state === 'win') {
    localStorage.removeItem(SAVE_KEY);
    resetGame();
    state = 'title';
    return;
  }

  if (state === 'gameOver') {
    localStorage.removeItem(SAVE_KEY);
    resetGame();
    state = 'title';
    return;
  }

  if (state === 'dialogue') {
    advanceDialogue();
    TAS.audio.playTone(400, 0.05, 'sine', 0.04);
    return;
  }

  if (state !== 'playing') return;

  // Dismiss tutorial
  if (!tutorialDismissed && Object.keys(puzzlesSolved).length <= 2) {
    tutorialDismissed = true;
    return;
  }

  if (caught) return;

  var barY = GH - VERB_BAR_H - INV_BAR_H;
  var invY = GH - INV_BAR_H;

  // Check verb bar click
  if (mouseY >= barY && mouseY < barY + VERB_BAR_H) {
    var col = Math.floor(mouseX / VERB_W);
    var row = Math.floor((mouseY - barY) / VERB_H);
    var idx = row * 4 + col;
    if (idx >= 0 && idx < VERBS.length) {
      selectedVerb = VERBS[idx];
      useItem = null;
      TAS.audio.playTone(500, 0.05, 'sine', 0.04);
    }
    return;
  }

  // Check inventory click
  if (mouseY >= invY) {
    var inv = inventory[currentChar];
    var slotW = 50;
    var startX = 4;
    for (var i = 0; i < Math.min(inv.length, 9); i++) {
      var sx = startX + i * (slotW + 2);
      if (mouseX >= sx && mouseX < sx + slotW) {
        if (selectedVerb === 'Use') {
          useItem = inv[i];
          showMsg('Use ' + ALL_ITEMS[inv[i]].name + ' on what?');
        } else {
          showMsg(ALL_ITEMS[inv[i]].desc);
        }
        TAS.audio.playTone(300, 0.05, 'sine', 0.04);
        return;
      }
    }
    return;
  }

  // Check scene click (objects or exits)
  if (mouseY < SCENE_H) {
    // Check exit clicks (edges)
    var room = ROOMS[currentRoom];
    if (room.exits) {
      if (mouseY < 25 && (room.exits.north || room.exits.up)) {
        changeRoom(room.exits.north || room.exits.up);
        checkStealthOnEntry();
        return;
      }
      if (mouseY > SCENE_H - 25 && (room.exits.south || room.exits.down)) {
        changeRoom(room.exits.south || room.exits.down);
        checkStealthOnEntry();
        return;
      }
      if (mouseX < 25 && room.exits.west) {
        changeRoom(room.exits.west);
        checkStealthOnEntry();
        return;
      }
      if (mouseX > GW - 25 && room.exits.east) {
        changeRoom(room.exits.east);
        checkStealthOnEntry();
        return;
      }
    }

    // Check object clicks
    var objs = roomObjects[currentRoom] || [];
    for (var oi = objs.length - 1; oi >= 0; oi--) {
      var obj = objs[oi];
      if (mouseX >= obj.x && mouseX < obj.x + obj.w && mouseY >= obj.y && mouseY < obj.y + obj.h) {
        interact(selectedVerb, obj);
        TAS.audio.playTone(350, 0.05, 'sine', 0.03);
        return;
      }
    }

    // Walk to empty space — DEX affects how quickly they "arrive"
    if (selectedVerb === 'Walk To') {
      charPositions[currentChar] = { x: TAS.math.clamp(mouseX, 20, GW - 20), y: TAS.math.clamp(mouseY, 60, SCENE_H - 20) };
      TAS.audio.playTone(200, 0.03, 'sine', 0.02);
    }
  }
}

// === KEYBOARD ===
function handleKeys(dt) {
  // Character switching
  if (TAS.input.keys['1'] || TAS.input.keys['Digit1']) {
    if (charAlive[0]) { currentChar = 0; currentRoom = charRoom[0]; showMsg('Switched to ' + CHARS[0].name); checkStealthOnEntry(); }
    TAS.input.keys['1'] = false; TAS.input.keys['Digit1'] = false;
  }
  if (TAS.input.keys['2'] || TAS.input.keys['Digit2']) {
    if (charAlive[1]) { currentChar = 1; currentRoom = charRoom[1]; showMsg('Switched to ' + CHARS[1].name); checkStealthOnEntry(); }
    TAS.input.keys['2'] = false; TAS.input.keys['Digit2'] = false;
  }
  if (TAS.input.keys['3'] || TAS.input.keys['Digit3']) {
    if (charAlive[2]) { currentChar = 2; currentRoom = charRoom[2]; showMsg('Switched to ' + CHARS[2].name); checkStealthOnEntry(); }
    TAS.input.keys['3'] = false; TAS.input.keys['Digit3'] = false;
  }

  // Space to load on title
  if (state === 'title' && (TAS.input.keys[' '] || TAS.input.keys['Space'])) {
    if (loadGame()) { state = 'playing'; }
    TAS.input.keys[' '] = false; TAS.input.keys['Space'] = false;
  }

  // Touch B button to swap character
  if (TAS.input.touch.b) {
    var next = (currentChar + 1) % 3;
    var tries = 0;
    while (!charAlive[next] && tries < 3) { next = (next + 1) % 3; tries++; }
    if (charAlive[next]) { currentChar = next; currentRoom = charRoom[next]; showMsg('Switched to ' + CHARS[next].name); checkStealthOnEntry(); }
    TAS.input.touch.b = false;
  }

  // === KEYBOARD CURSOR + ACTION CLUSTER (playing state) ===
  // Arrows = MOVE the cursor (held = continuous); at scene edges they trigger exits.
  var moveStep = 4 * dexSpeedMult();
  var moved = false;
  if (kbHeld('ArrowLeft'))  { kbX -= moveStep; moved = true; }
  if (kbHeld('ArrowRight')) { kbX += moveStep; moved = true; }
  if (kbHeld('ArrowUp'))    { kbY -= moveStep; moved = true; }
  if (kbHeld('ArrowDown'))  { kbY += moveStep; moved = true; }
  if (moved) {
    kbCursor = true;
    kbX = TAS.math.clamp(kbX, 4, GW - 4);
    kbY = TAS.math.clamp(kbY, 4, GH - 4);
    mouseX = kbX; mouseY = kbY; // drive hover/status with the cursor
  }

  // WASD = action cluster:
  //   W = ACT (interact / walk-to / pick-up on whatever the cursor is over)
  //   A = previous verb   D = next verb
  //   S = inventory: cycle highlighted item; with verb "Use" it arms that item
  if (kbTap(['KeyA'])) { kbCursor = true; cycleVerb(-1); }
  if (kbTap(['KeyD'])) { kbCursor = true; cycleVerb(1); }
  if (kbTap(['KeyW', 'Space', ' '])) { // W (and Space as single-action alt) = act at cursor
    kbCursor = true;
    if (mouseClicked) mouseClicked = false; // avoid double-fire if mouse also clicked
    kbSyntheticClick();
  }
  if (kbTap(['KeyS'])) { // S = inventory step / select
    kbCursor = true;
    var inv = inventory[currentChar];
    if (inv.length) {
      kbInvSel = kbInvSel % inv.length;
      var itemId = inv[kbInvSel];
      if (selectedVerb === 'Use') { useItem = itemId; showMsg('Use ' + ALL_ITEMS[itemId].name + ' on what?'); }
      else { showMsg(ALL_ITEMS[itemId].desc); }
      TAS.audio.playTone(300, 0.05, 'sine', 0.04);
      kbInvSel = (kbInvSel + 1) % inv.length;
    } else {
      showMsg('Inventory empty.');
    }
  }
}

// === HOVER DETECTION ===
function updateHover() {
  hoverObject = null;
  if (mouseY >= SCENE_H) return;
  var objs = roomObjects[currentRoom] || [];
  for (var i = objs.length - 1; i >= 0; i--) {
    var obj = objs[i];
    if (mouseX >= obj.x && mouseX < obj.x + obj.w && mouseY >= obj.y && mouseY < obj.y + obj.h) {
      hoverObject = obj;
      return;
    }
  }
}

// === RESET ===
function resetGame() {
  currentChar = 0;
  currentRoom = 'foyer';
  selectedVerb = 'Walk To';
  inventory = [[], [], []];
  puzzlesSolved = {};
  charPositions = [{x:200,y:160},{x:220,y:160},{x:240,y:160}];
  charAlive = [true, true, true];
  charRoom = ['foyer', 'foyer', 'foyer'];
  roomObjects = getDefaultObjects();
  hoverObject = null;
  msgText = '';
  msgTimer = 0;
  scientistRoom = 'lab_hall';
  scientistTimer = 0;
  scientistPathIdx = 0;
  powerOn = false;
  ghostHelped = false;
  useItem = null;
  caught = false;
  caughtTimer = 0;
  winState = false;
  fungiParticles = [];
  score = 0;
  scorePopups = [];
  stealthActive = false;
  stealthTimer = 0;
  tutorialDismissed = false;
}

// === COMBINE ITEMS (in inventory) ===
function checkCombinations() {
  var inv = inventory[currentChar];
  if (inv.indexOf('tape') >= 0 && inv.indexOf('wire') >= 0) {
    // Auto-combine hint — WIS provides better hint
    if (selectedVerb === 'Use' && useItem === 'tape') {
      if (Math.random() < wisDiscoveryChance()) {
        showMsg('Try using the spore tape on the broken reactor wire in the Reactor Corridor!');
      }
    }
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title' || state === 'win' || state === 'gameOver') {
    // Title-screen baseling picker (C) — picker only opens from the title.
    if (state === 'title' && !picking && (TAS.input.keys['KeyC'] || TAS.input.touch.c)) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (state === 'title' && picking) return; // overlay open — swallow title input
    // W / Enter act as a click on title/win/gameOver (keyboard alt for CLICK TO START)
    if (kbTap(['KeyW', 'Enter'])) { kbSyntheticClick(); }
    handleClick();
    return;
  }

  if (state === 'dialogue') {
    // W / Enter / Space advance dialogue (keyboard alt for click)
    if (kbTap(['KeyW', 'Enter', 'Space', ' '])) { kbSyntheticClick(); }
    handleClick();
    return;
  }

  if (state === 'playing') {
    handleKeys(dt);
    updateHover();
    updateScientist(dt);
    updateAmbient(dt);
    updateStealth(dt);

    if (msgTimer > 0) msgTimer -= dt;

    // Handle caught state
    if (caught) {
      caughtTimer -= dt;
      if (caughtTimer <= 0) {
        caught = false;
        currentRoom = 'dungeon';
        charRoom[currentChar] = 'dungeon';
        charPositions[currentChar] = { x: 150, y: 130 };
        saveGame();
      }
      handleClick();
      return;
    }

    handleClick();

    // Check game over
    var aliveCount = charAlive.filter(Boolean).length;
    if (aliveCount === 0) {
      state = 'gameOver';
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'win') {
    drawWinScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawRoom();
  drawObjects();
  for (var i = 0; i < 3; i++) drawCharacter(i);
  drawScientist();
  drawScorePopups();

  TAS.particles.draw();
  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  drawVerbBar();
  drawInventory();
  drawMessage();

  if (state === 'dialogue') drawDialogue();
  if (caught) drawCaughtScreen();

  // Tutorial
  drawTutorial();

  // Status line
  var statusY = GH - VERB_BAR_H - INV_BAR_H - 12;
  if (hoverObject && !caught && state === 'playing') {
    ctx.fillStyle = '#ddd';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(selectedVerb + ' ' + hoverObject.name, GW/2, statusY);
  } else if (useItem) {
    ctx.fillStyle = '#38d973';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Use ' + ALL_ITEMS[useItem].name + ' on...', GW/2, statusY);
  }

  // Floor indicator + score
  if (ROOMS[currentRoom]) {
    var floorNames = { 0: 'Reactor Sub-Level', 1: 'Ground Floor', 2: 'Upper Floor', 3: 'Attic Level' };
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(floorNames[ROOMS[currentRoom].floor] || '', GW - 6, 14);
    // Score
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SCORE: ' + score, GW - 6, 24);
  }

  // Keyboard cursor (only after arrows/WASD have been used, in the scene area)
  if (kbCursor && state === 'playing' && !caught && kbY < SCENE_H) {
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(kbX - 6, kbY); ctx.lineTo(kbX + 6, kbY);
    ctx.moveTo(kbX, kbY - 6); ctx.lineTo(kbX, kbY + 6);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Persistent desktop controls legend (hidden on touch). Title legend is behind
  // the NFT gate, so a faint in-game strip keeps controls discoverable.
  if (NO_TOUCH && state === 'playing' && !caught) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, GW, 11);
    ctx.fillStyle = '#7fd8a0';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('ARROWS move  W act  A/D verb  S item  1/2/3 swap  (or click)', 6, 8);
    ctx.textAlign = 'center';
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
