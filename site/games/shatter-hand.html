  return {

    hp: def.hp, maxHp: def.hp,
    angle: 0, attackTimer: 0, attackCd: 1.2,
    projectiles: []

}

// ============================================================
// ENEMY CREATION
// ============================================================
function createEnemy(type, x, y) {
  const def = ENEMY_DEFS[type];
  if (!def) return null;
  return {
    type: type, x: x, y: def.flying ? y - 60 : y - def.h,
    w: def.w, h: def.h, vx: 0, vy: 0,
    hp: def.hp, maxHp: def.hp, speed: def.speed,
    damage: def.damage, score: def.score, color: def.color,
    atkCd: def.atkCd, atkRange: def.atkRange, atkTimer: def.atkCd * 0.5,
    flying: def.flying || false, shootsProjectile: def.shootsProjectile || false,
    hasShield: def.hasShield || false, heavy: def.heavy || false,
    canDash: def.canDash || false, isBoss: def.isBoss || false,
    facing: -1, stunTimer: 0, knockbackVx: 0, knockbackVy: 0,
    dying: false, deathTimer: 0, shieldFacing: -1,
    animFrame: 0, animTimer: 0, dashCd: 0,
    bossPhase: 0, bossPatternTimer: 0
  };
}

// ============================================================
// PLATFORMS & WALLS
// ============================================================
function generatePlatforms(stage) {
  platforms = [];
  breakableWalls = [];
  const sw = stage.width;

  // Add platforms every 200-400 px
  for (let x = 200; x < sw - 200; x += 180 + Math.floor(Math.random() * 220)) {
    const py = FLOOR_Y - 60 - Math.floor(Math.random() * 80);
    const pw = 50 + Math.floor(Math.random() * 40);
    platforms.push({ x: x, y: py, w: pw, h: 8, crumbling: stage.gimmick === 'vines' && Math.random() < 0.3, crumbleTimer: 0, fallen: false });
  }

  // Breakable walls
  for (let x = 400; x < sw - 300; x += 500 + Math.floor(Math.random() * 300)) {
    if (Math.random() < 0.5) {
      breakableWalls.push({ x: x, y: FLOOR_Y - 50, w: 16, h: 50, hp: 2, hasPickup: Math.random() < 0.6 });
    }
  }

  // Conveyor belts for factory
  if (stage.gimmick === 'conveyor') {
    for (let x = 300; x < sw - 200; x += 400) {
      if (Math.random() < 0.4) {
        platforms.push({ x: x, y: FLOOR_Y - 2, w: 100, h: 6, conveyor: true, conveyorDir: Math.random() < 0.5 ? 1 : -1 });
      }
    }
  }
}

// ============================================================

function spawnPickup(x, y, type) {

}

function spawnTokenPickup(x, y) {
  const types = ['A', 'B', 'G'];
  const type = types[Math.floor(Math.random() * 3)];
  pickups.push({ x: x, y: y, w: 14, h: 14, type: 'token_' + type, vy: -120, timer: 10, bobTimer: 0 });
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticle(x, y, vx, vy, color, life, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x:x, y:y, vx:vx, vy:vy, color:color, life:life, maxLife:life, size: size || 3 });
}

function spawnImpactBurst(x, y, count, color, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random() * 0.5);
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, color, 0.3 + Math.random() * 0.3, 2 + Math.random() * 4);
  }
}

function spawnPunchImpact(x, y, dir) {
  // Big satisfying burst
  for (let i = 0; i < 15; i++) {
    const angle = -Math.PI/4 + Math.random() * Math.PI/2;
    const spd = 150 + Math.random() * 250;
    spawnParticle(x, y, dir * Math.cos(angle) * spd, Math.sin(angle) * spd - 50,
      ['#ffff44', '#ff8800', '#ffffff', '#ffcc00'][Math.floor(Math.random() * 4)],
      0.2 + Math.random() * 0.3, 3 + Math.random() * 5);
  }
  // Speed lines
  for (let i = 0; i < 5; i++) {
    spawnParticle(x - dir * 10, y - 5 + Math.random() * 10, dir * (200 + Math.random() * 100), 0, '#ffffff', 0.15, 2);
  }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function doShake(intensity) {
  screenShake = Math.max(screenShake, intensity);
}

// ============================================================
// START GAME
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  stageNum = 0;
  initStage();
}

function initStage() {
  const stage = STAGES[stageNum];
  stageWidth = stage.width;
  scrollX = 0;
  player = createPlayer();
  enemies = [];
  projectiles = [];
  pickups = [];
  particles = [];
  waveIndex = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
  bossActive = false;
  bossWarned = false;
  waterLevel = GH + 50;
  lavaLevel = GH + 50;
  windTimer = 0;
  windDir = 1;
  gimmickTimer = 0;
  deathTimer = 0;
  generatePlatforms(stage);
  state = 'stageIntro';
  stageCompleteTimer = 2.0;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;
  dt = Math.min(dt, 0.05);

  // Track just-pressed
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  justPressed.jump = (keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a) && !prevKeys.jump;
  justPressed.punch = (keys['KeyZ'] || keys['KeyX'] || touch.b) && !prevKeys.punch;
  prevKeys.jump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a;
  prevKeys.punch = keys['KeyZ'] || keys['KeyX'] || touch.b;

  // Shake decay
  if (screenShake > 0) {
    screenShake -= dt * 20;
    if (screenShake < 0) screenShake = 0;
    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (state === 'title') {
    if (justPressed.jump || justPressed.punch) startGame();
    return;
  }

  if (state === 'stageIntro') {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) state = 'playing';
    return;
  }

  if (state === 'stageComplete') {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) {
      stageNum++;
      if (stageNum >= STAGES.length) {
        state = 'victory';
      } else {
        initStage();
      }
    }
    return;
  }

  if (state === 'gameOver') {
    deathTimer -= dt;
    if (deathTimer <= 0 && (justPressed.jump || justPressed.punch)) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (justPressed.jump || justPressed.punch) state = 'title';
    return;
  }

  if (state !== 'playing') return;

  const stage = STAGES[stageNum];
  const grav = GRAVITY * (stage.gimmick === 'lowgrav' ? 0.5 : 1.0);

  // --- PLAYER UPDATE ---
  updatePlayer(dt, grav, stage);

  // --- ENEMIES ---
  updateEnemies(dt, grav, stage);

  // --- PROJECTILES ---
  updateProjectiles(dt);

  // --- PICKUPS ---
  updatePickups(dt);

  // --- SATELLITE BOT ---
  updateBot(dt);

  // --- STAGE GIMMICKS ---
  updateGimmicks(dt, stage);

  // --- WAVE SPAWNING ---
  spawnWaves(stage);

  // --- STAGE COMPLETION ---
  if (!stageComplete && waveIndex >= stage.waves.length && enemies.length === 0) {
    stageComplete = true;
    stageCompleteTimer = 2.5;
    state = 'stageComplete';
    SFX.stageComplete();
  }

  // --- CAMERA ---
  const targetScroll = player.x - GW * 0.35;
  scrollX = Math.max(0, Math.min(stageWidth - GW, targetScroll));
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt, grav, stage) {
  const p = player;
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // Iframes
  if (p.iframes > 0) p.iframes -= dt;

  // Horizontal movement
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { moveX = -1; p.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { moveX = 1; p.facing = 1; }

  if (!p.punching) {
    p.vx = moveX * PLAYER_SPEED;
  } else {
    p.vx *= 0.85;
  }

  // Wind gimmick
  if (stage.gimmick === 'wind') {
    p.vx += windDir * stage.windForce * dt * 60;
  }

  // Jump
  if (justPressed.jump && p.grounded) {
    p.vy = JUMP_FORCE * (stage.gimmick === 'lowgrav' ? 0.75 : 1.0);
    p.grounded = false;
    SFX.jump();
  }

  // Gravity
  p.vy += grav * dt;

  // Move
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // Floor collision
  p.grounded = false;
  if (p.y + p.h >= FLOOR_Y) {
    p.y = FLOOR_Y - p.h;
    p.vy = 0;
    p.grounded = true;
  }

  // Platform collision
  for (let i = 0; i < platforms.length; i++) {
    const plat = platforms[i];
    if (plat.fallen) continue;
    if (p.vy > 0 && p.y + p.h >= plat.y && p.y + p.h <= plat.y + plat.h + p.vy * dt + 5 &&
        p.x + p.w > plat.x && p.x < plat.x + plat.w) {
      p.y = plat.y - p.h;
      p.vy = 0;
      p.grounded = true;
      // Conveyor
      if (plat.conveyor) {
        p.x += plat.conveyorDir * stage.conveyorSpeed * dt;
      }
      // Crumbling
      if (plat.crumbling && !plat.crumbleTimer) {
        plat.crumbleTimer = 0.8;
      }
    }
  }

  // World bounds
  p.x = Math.max(0, Math.min(stageWidth - p.w, p.x));

  // Water/Lava hazard
  if (stage.gimmick === 'water' && p.y + p.h > waterLevel) {
    p.vy -= 200 * dt;
    p.vx *= 0.95;
  }
  if (stage.gimmick === 'lava' && p.y + p.h > lavaLevel) {
    hurtPlayer(1);
  }

  // Punch
  p.punchCooldown -= dt;
  if (justPressed.punch && p.punchCooldown <= 0) {
    p.punching = true;
    p.punchTimer = 0.2;
    p.punchCooldown = 0.3;
    SFX.punch();
    doPunchAttack();
  }
  if (p.punching) {
    p.punchTimer -= dt;
    if (p.punchTimer <= 0) p.punching = false;
  }

  // Animation
  p.animTimer += dt;
  if (p.animTimer > 0.12) { p.animTimer = 0; p.animFrame = (p.animFrame + 1) % 4; }
}

// ============================================================
// PUNCH ATTACK
// ============================================================
function doPunchAttack() {
  const p = player;
  const px = p.x + (p.facing > 0 ? p.w : -PUNCH_RANGE);
  const py = p.y;
  const punchBox = { x: px, y: py, w: PUNCH_RANGE, h: p.h };

  let hitSomething = false;

  // Hit enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dying) continue;
    if (rectOverlap(punchBox, e)) {
      // Shield check - must punch from behind
      if (e.hasShield && e.facing !== p.facing) {
        SFX.deflect();
        spawnImpactBurst(e.x + e.w/2, e.y + e.h/2, 5, '#44ff44', 100);
        continue;
      }
      hitEnemy(e, p.facing);
      hitSomething = true;
    }
  }

  // Deflect projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    if (proj.friendly) continue;
    if (rectOverlap(punchBox, { x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 })) {
      proj.vx = -proj.vx * 1.5;
      proj.vy = -proj.vy * 0.5;
      proj.friendly = true;
      proj.color = '#ffff00';
      SFX.deflect();
      spawnImpactBurst(proj.x, proj.y, 8, '#ffff44', 120);
      doShake(3);
      hitSomething = true;
    }
  }

  // Break walls
  for (let i = breakableWalls.length - 1; i >= 0; i--) {
    const wall = breakableWalls[i];
    if (rectOverlap(punchBox, wall)) {
      wall.hp--;
      if (wall.hp <= 0) {
        SFX.wallBreak();
        spawnImpactBurst(wall.x + wall.w/2, wall.y + wall.h/2, 20, '#886644', 200);
        if (wall.hasPickup) {
          spawnTokenPickup(wall.x, wall.y);
        }
        breakableWalls.splice(i, 1);
        doShake(5);
      } else {
        spawnImpactBurst(wall.x + wall.w/2, wall.y + wall.h/2, 8, '#886644', 100);
        doShake(2);
      }
      hitSomething = true;
    }
  }

  if (hitSomething) {
    spawnPunchImpact(p.x + p.facing * (p.w + 10), p.y + p.h/2, p.facing);
    doShake(4);
  }
}

function hitEnemy(e, dir) {
  const damage = PUNCH_DAMAGE + (player.bot && player.bot.type === 'sword' ? 10 : 0);
  e.hp -= damage;
  e.stunTimer = 0.4;

  if (e.heavy) {
    e.knockbackVx = dir * PUNCH_KNOCKBACK * 0.4;
    e.knockbackVy = -80;
  } else {
    e.knockbackVx = dir * PUNCH_KNOCKBACK;
    e.knockbackVy = -200;
  }

  spawnPunchImpact(e.x + e.w/2, e.y + e.h/2, dir);
  doShake(e.isBoss ? 6 : 4);
  SFX.punchHeavy();

  if (e.hp <= 0) {
    killEnemy(e, dir);
  } else {
    // Knockback into other enemies
    checkEnemyCollisions(e, dir);
  }
}

function checkEnemyCollisions(hitter, dir) {
  for (let i = 0; i < enemies.length; i++) {
    const other = enemies[i];
    if (other === hitter || other.dying) continue;
    if (Math.abs(hitter.x - other.x) < 30 && Math.abs(hitter.y - other.y) < 20) {
      other.hp -= 10;
      other.knockbackVx = dir * PUNCH_KNOCKBACK * 0.6;
      other.knockbackVy = -150;
      other.stunTimer = 0.3;
      spawnImpactBurst(other.x + other.w/2, other.y + other.h/2, 8, '#ffaa00', 120);
      SFX.enemyFly();
      if (other.hp <= 0) killEnemy(other, dir);
    }
  }
}

function killEnemy(e, dir) {
  e.dying = true;
  e.deathTimer = 0.6;
  e.knockbackVx = dir * PUNCH_KNOCKBACK * 1.2;
  e.knockbackVy = -300;
  score += e.score;
  SFX.enemyDie();
  doShake(e.isBoss ? 10 : 5);
  spawnImpactBurst(e.x + e.w/2, e.y + e.h/2, 20, e.color, 250);

  // Drop token or health
  if (Math.random() < 0.3 && !e.isBoss) {
    spawnTokenPickup(e.x, e.y);
  } else if (Math.random() < 0.15) {
    spawnPickup(e.x, e.y, 'health');
  } else if (Math.random() < 0.05) {
    spawnPickup(e.x, e.y, 'life');
  }
  if (e.isBoss) {
    spawnPickup(e.x, e.y, 'health');
    spawnTokenPickup(e.x + 20, e.y);
    spawnTokenPickup(e.x - 20, e.y);
  }
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(dt, grav, stage) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];

    if (e.dying) {
      e.deathTimer -= dt;
      e.x += e.knockbackVx * dt;
      e.y += e.knockbackVy * dt;
      e.knockbackVy += grav * dt;
      if (e.deathTimer <= 0) { enemies.splice(i, 1); }
      continue;
    }

    // Stun
    if (e.stunTimer > 0) {
      e.stunTimer -= dt;
      e.x += e.knockbackVx * dt;
      e.y += e.knockbackVy * dt;
      e.knockbackVx *= 0.9;
      if (!e.flying) {
        e.knockbackVy += grav * dt;
        if (e.y + e.h > FLOOR_Y) { e.y = FLOOR_Y - e.h; e.knockbackVy = 0; }
      }
      continue;
    }

    // AI
    const dx = player.x - e.x;
    const dist = Math.abs(dx);
    e.facing = dx > 0 ? 1 : -1;
    e.shieldFacing = e.facing;

    // Attack timer
    e.atkTimer -= dt;

    if (e.isBoss) {
      updateBossAI(e, dt, dist);
    } else if (e.flying) {
      // Fly toward player at altitude
      const targetY = player.y - 50;
      e.y += (targetY - e.y) * dt * 2;
      e.x += e.facing * e.speed * dt * 0.7;

      if (e.shootsProjectile && e.atkTimer <= 0 && dist < e.atkRange * 2) {
        e.atkTimer = e.atkCd;
        fireEnemyProjectile(e);
      }
    } else if (e.canDash && dist < 80 && e.dashCd <= 0) {
      // Ninja dash
      e.x += e.facing * 120 * dt;
      e.dashCd = 1.5;
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
    } else {
      // Walk toward player
      if (dist > e.atkRange) {
        e.x += e.facing * e.speed * dt;
      }
      // Attack
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
    }

    if (e.dashCd > 0) e.dashCd -= dt;

    // Gravity for ground enemies
    if (!e.flying) {
      e.vy = (e.vy || 0) + grav * dt;
      e.y += e.vy * dt;
      if (e.y + e.h > FLOOR_Y) { e.y = FLOOR_Y - e.h; e.vy = 0; }
    }

    // Keep in bounds
    e.x = Math.max(scrollX - 30, Math.min(scrollX + GW + 30, e.x));

    // Animation
    e.animTimer += dt;
    if (e.animTimer > 0.15) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 4; }
  }
}

function updateBossAI(e, dt, dist) {
  e.bossPatternTimer -= dt;
  if (e.bossPatternTimer <= 0) {
    e.bossPhase = (e.bossPhase + 1) % 4;
    e.bossPatternTimer = 2.0 + Math.random();
  }

  switch (e.bossPhase) {
    case 0: // Approach
      if (dist > e.atkRange) e.x += e.facing * e.speed * dt;
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
      break;
    case 1: // Retreat and fire
      e.x -= e.facing * e.speed * 0.5 * dt;
      if (e.atkTimer <= 0) {
        e.atkTimer = e.atkCd * 0.6;
        fireEnemyProjectile(e);
      }
      break;
    case 2: // Charge
      e.x += e.facing * e.speed * 2.5 * dt;
      if (dist < 20) {
        attackPlayer(e);
        e.atkTimer = e.atkCd;
        doShake(3);
      }
      break;
    case 3: // Jump attack
      if (e.vy === 0 || !e.vy) { e.vy = -350; }
      if (e.flying) {
        e.x += e.facing * e.speed * dt;
        e.y += Math.sin(frame * 0.1) * 2;
      }
      break;
  }
}

function attackPlayer(e) {
  const p = player;
  if (p.iframes > 0) return;
  if (rectOverlap({ x: e.x + (e.facing > 0 ? e.w : -e.atkRange), y: e.y, w: e.atkRange, h: e.h },
    { x: p.x, y: p.y, w: p.w, h: p.h })) {
    hurtPlayer(e.damage > 15 ? 2 : 1);
  }
}

function fireEnemyProjectile(e) {
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy) || 1;
  projectiles.push({
    x: e.x + e.w/2, y: e.y + e.h/2,
    vx: (dx / dist) * 180, vy: (dy / dist) * 180,
    color: '#ff4444', friendly: false, life: 3.0, size: 5
  });
}

// ============================================================
// HURT PLAYER
// ============================================================
function hurtPlayer(amount) {
  const p = player;
  if (p.iframes > 0) return;

  // Bot takes hit first
  if (p.bot && p.bot.hp > 0) {
    p.bot.hp -= amount;
    doShake(3);
    SFX.playerHurt();
    spawnImpactBurst(p.x + p.w/2, p.y, 10, p.bot.color, 150);
    if (p.bot.hp <= 0) {
      SFX.botDestroyed();
      p.bot = null;
    }
    p.iframes = IFRAMES * 0.5;
    return;
  }

  p.hp -= amount;
  p.iframes = IFRAMES;
  doShake(5);
  SFX.playerHurt();
  spawnImpactBurst(p.x + p.w/2, p.y + p.h/2, 12, '#ff0000', 150);

  if (p.hp <= 0) {
    lives--;
    if (lives <= 0) {
      if (score > highScore) { highScore = score; TAS.score.save('shatterhand_hi', score); }
      state = 'gameOver';
      deathTimer = 1.5;
      SFX.gameOver();
    } else {
      player = createPlayer();
      player.x = Math.max(scrollX + 40, player.x);
    }
  }
}

// ============================================================
// PROJECTILES
// ============================================================
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;
    proj.life -= dt;

    if (proj.life <= 0) { projectiles.splice(i, 1); continue; }
    if (proj.x < scrollX - 20 || proj.x > scrollX + GW + 20) { projectiles.splice(i, 1); continue; }

    // Friendly projectile hits enemies
    if (proj.friendly) {
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e.dying) continue;
        if (rectOverlap({ x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 }, e)) {
          e.hp -= 15;
          e.stunTimer = 0.2;
          e.knockbackVx = proj.vx > 0 ? 100 : -100;
          spawnImpactBurst(proj.x, proj.y, 8, '#ffff00', 100);
          if (e.hp <= 0) killEnemy(e, proj.vx > 0 ? 1 : -1);
          projectiles.splice(i, 1);
          break;
        }
      }
    } else {
      // Enemy projectile hits player
      if (player.iframes <= 0 && rectOverlap({ x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 },
        { x: player.x, y: player.y, w: player.w, h: player.h })) {
        hurtPlayer(1);
        projectiles.splice(i, 1);
      }
    }
  }
}

// ============================================================
// PICKUPS
// ============================================================
function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    pk.vy += 300 * dt;
    pk.y += pk.vy * dt;
    if (pk.y > FLOOR_Y - pk.h) { pk.y = FLOOR_Y - pk.h; pk.vy = 0; }
    pk.bobTimer += dt;
    pk.timer -= dt;
    if (pk.timer <= 0) { pickups.splice(i, 1); continue; }

    // Collect
    if (rectOverlap({ x: pk.x, y: pk.y, w: pk.w, h: pk.h },
      { x: player.x, y: player.y, w: player.w, h: player.h })) {
      collectPickup(pk);
      pickups.splice(i, 1);
    }
  }
}

function collectPickup(pk) {
  if (pk.type === 'health') {
    player.hp = Math.min(player.maxHp, player.hp + 2);
    SFX.powerup();
    spawnImpactBurst(pk.x, pk.y, 8, '#44ff44', 80);
  } else if (pk.type === 'life') {
    lives++;
    SFX.powerup();
    spawnImpactBurst(pk.x, pk.y, 12, '#ffff44', 100);
  } else if (pk.type.startsWith('token_')) {
    const letter = pk.type.charAt(6); // A, B, or G
    player.tokens.push(letter);
    SFX.tokenGet();
    spawnImpactBurst(pk.x, pk.y, 10, '#88aaff', 100);

    if (player.tokens.length >= 3) {
      const combo = player.tokens.slice(0, 3).join('');
      player.tokens = [];
      summonBot(combo);
    }
  }
  score += 50;
}

function summonBot(combo) {
  // Check exact match first, then try sorted combos
  let bot = null;
  if (BOT_COMBOS[combo]) {
    bot = createBot(combo);
  } else {
    // Check all permutations
    const perms = [combo, combo[0]+combo[2]+combo[1], combo[1]+combo[0]+combo[2],
                   combo[1]+combo[2]+combo[0], combo[2]+combo[0]+combo[1], combo[2]+combo[1]+combo[0]];
    for (let i = 0; i < perms.length; i++) {
      if (BOT_COMBOS[perms[i]]) { bot = createBot(perms[i]); break; }
    }
  }
  if (!bot) {
    // Default weak bot for unmatched combos
    bot = { name: 'MINI BOT', color: '#888888', type: 'pulse', hp: 1, maxHp: 1, angle: 0, attackTimer: 0, attackCd: 2.0, projectiles: [] };
  }
  player.bot = bot;
  SFX.botSummon();
  doShake(3);
  spawnImpactBurst(player.x + player.w/2, player.y - 20, 20, bot.color, 150);
}

// ============================================================
// BOT UPDATE
// ============================================================
function updateBot(dt) {
  const bot = player.bot;
  if (!bot) return;

  bot.angle += dt * 3;
  bot.attackTimer -= dt;

  if (bot.attackTimer <= 0 && enemies.length > 0) {
    bot.attackTimer = bot.attackCd;
    botAttack(bot);
  }

  // Update bot projectiles
  for (let i = bot.projectiles.length - 1; i >= 0; i--) {
    const bp = bot.projectiles[i];
    bp.x += bp.vx * dt;
    bp.y += bp.vy * dt;
    bp.life -= dt;
    if (bp.life <= 0) { bot.projectiles.splice(i, 1); continue; }

    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (e.dying) continue;
      if (rectOverlap({ x: bp.x - 5, y: bp.y - 5, w: 10, h: 10 }, e)) {
        e.hp -= bp.damage;
        e.stunTimer = 0.15;
        e.knockbackVx = bp.vx > 0 ? 60 : -60;
        spawnImpactBurst(bp.x, bp.y, 6, bot.color, 80);
        if (e.hp <= 0) killEnemy(e, bp.vx > 0 ? 1 : -1);
        if (!bp.piercing) { bot.projectiles.splice(i, 1); break; }
      }
    }
  }
}

function botAttack(bot) {
  const px = player.x + player.w/2;
  const py = player.y - 20;
  SFX.botAttack();

  switch (bot.type) {
    case 'sword': case 'blade': case 'cutter':
      // Slash ahead - damage in area
      const slashX = px + player.facing * 30;
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (e.dying) continue;
        if (Math.abs(e.x - slashX) < 35 && Math.abs(e.y - py) < 40) {
          e.hp -= 20;
          e.stunTimer = 0.2;
          e.knockbackVx = player.facing * 120;
          spawnImpactBurst(e.x + e.w/2, e.y + e.h/2, 8, bot.color, 100);
          if (e.hp <= 0) killEnemy(e, player.facing);
        }
      }
      spawnImpactBurst(slashX, py, 6, bot.color, 80);
      break;
    case 'laser': case 'ray': case 'beam':
      // Diagonal beams
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 200, vy: -100, life: 1.5, damage: 15, piercing: true });
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 200, vy: 100, life: 1.5, damage: 15, piercing: true });
      break;
    case 'grenade': case 'bomb': case 'rocket':
      // Lob explosive
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 150, vy: -180, life: 1.0, damage: 30, explosive: true });
      break;
    case 'shield':
      // Already handled in hurtPlayer - bot takes hits
      break;
    case 'spark': case 'flash':
      // Burst in circle
      for (let a = 0; a < 8; a++) {
        const angle = (a / 8) * Math.PI * 2;
        bot.projectiles.push({ x: px, y: py, vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150, life: 0.8, damage: 10 });
      }
      break;
    case 'pulse':
      // Forward shot
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 250, vy: 0, life: 2.0, damage: 18 });
      break;
    case 'mine':
      // Drop mine below
      bot.projectiles.push({ x: px, y: py + 20, vx: 0, vy: 50, life: 3.0, damage: 25, explosive: true });
      break;
  }
}

// ============================================================
// STAGE GIMMICKS
// ============================================================
function updateGimmicks(dt, stage) {
  gimmickTimer += dt;

  // Crumbling platforms
  for (let i = 0; i < platforms.length; i++) {
    const plat = platforms[i];
    if (plat.crumbleTimer > 0) {
      plat.crumbleTimer -= dt;
      if (plat.crumbleTimer <= 0) plat.fallen = true;
    }
  }

  switch (stage.gimmick) {
    case 'water':
      waterLevel = FLOOR_Y - 20 - Math.sin(gimmickTimer * 0.5) * 60;
      break;
    case 'lava':
      lavaLevel = FLOOR_Y - 10 - Math.sin(gimmickTimer * 0.3) * 40;
      break;
    case 'wind':
      windTimer += dt;
      if (windTimer > 3) { windTimer = 0; windDir *= -1; }
      break;
  }
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function spawnWaves(stage) {
  while (waveIndex < stage.waves.length) {
    const wave = stage.waves[waveIndex];
    if (scrollX + GW * 0.8 >= wave.x) {
      if (wave.boss && !bossWarned) {
        bossWarned = true;
        SFX.bossWarning();
        doShake(4);
      }
      for (let j = 0; j < wave.enemies.length; j++) {
        const ed = wave.enemies[j];
        const ex = wave.x + j * 40 + Math.random() * 20;
        const ey = FLOOR_Y;
        const enemy = createEnemy(ed.t, ex, ey);
        if (enemy) enemies.push(enemy);
      }
      bossActive = wave.boss || false;
      waveIndex++;
    } else {
      break;
    }
  }
}

// ============================================================
// COLLISION UTIL
// ============================================================
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  ctx.translate(Math.round(screenShakeX), Math.round(screenShakeY));

  const stage = STAGES[stageNum];
  drawBackground(stage);
  drawPlatforms(stage);
  drawBreakableWalls();
  drawPickups();
  drawEnemies();
  drawPlayer();
  drawBot();
  drawProjectiles();
  drawParticles();
  drawGimmickOverlay(stage);

  ctx.restore();

  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  if (state === 'stageComplete') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE CLEAR!', GW/2, GH/2 - 10);
    ctx.font = '14px monospace';
    ctx.fillText('Score: ' + score, GW/2, GH/2 + 20);
  }
}

// ============================================================
// DRAW BACKGROUND
// ============================================================
function drawBackground(stage) {
  ctx.fillStyle = stage.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax background elements
  const parallax = scrollX * 0.3;
  ctx.fillStyle = stage.accent + '22';
  for (let x = -parallax % 120; x < GW; x += 120) {
    ctx.fillRect(x, 40, 60, 180);
  }

  // Middle layer
  const mid = scrollX * 0.6;
  ctx.fillStyle = stage.accent + '33';
  for (let x = -mid % 80; x < GW; x += 80) {
    ctx.fillRect(x, 100 + Math.sin(x * 0.03) * 20, 30, FLOOR_Y - 100);
  }

  // Floor
  ctx.fillStyle = stage.floor;
  ctx.fillRect(0, FLOOR_Y, GW, GH - FLOOR_Y);

  // Floor detail line
  ctx.fillStyle = stage.accent + '44';
  ctx.fillRect(0, FLOOR_Y, GW, 2);

  // Stage-specific details
  if (stage.gimmick === 'conveyor') {
    // Gears in background
    for (let x = 50 - (scrollX * 0.2) % 200; x < GW; x += 200) {
      drawGear(x, 60, 25, frame * 0.02);
    }
  }
}

function drawGear(cx, cy, r, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#44444466';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const rr = i % 2 === 0 ? r : r * 0.7;
    if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
    else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// DRAW PLATFORMS
// ============================================================
function drawPlatforms(stage) {
  for (let i = 0; i < platforms.length; i++) {
    const plat = platforms[i];
    if (plat.fallen) continue;
    const px = plat.x - scrollX;
    if (px + plat.w < -10 || px > GW + 10) continue;

    if (plat.conveyor) {
      ctx.fillStyle = '#666644';
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      // Conveyor arrows
      ctx.fillStyle = '#aaaa44';
      const arrowOffset = (frame * plat.conveyorDir * 2) % 20;
      for (let ax = arrowOffset; ax < plat.w; ax += 20) {
        ctx.fillRect(px + ax, plat.y + 2, 8, 2);
      }
    } else if (plat.crumbling && plat.crumbleTimer > 0) {
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(px + Math.random() * 2, plat.y + Math.random() * 2, plat.w, plat.h);
    } else {
      ctx.fillStyle = stage.accent + 'aa';
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      ctx.fillStyle = stage.accent;
      ctx.fillRect(px, plat.y, plat.w, 2);
    }
  }
}

// ============================================================
// DRAW BREAKABLE WALLS
// ============================================================
function drawBreakableWalls() {
  for (let i = 0; i < breakableWalls.length; i++) {
    const wall = breakableWalls[i];
    const wx = wall.x - scrollX;
    if (wx < -20 || wx > GW + 20) continue;

    ctx.fillStyle = '#886644';
    ctx.fillRect(wx, wall.y, wall.w, wall.h);
    // Crack pattern
    ctx.strokeStyle = '#554433';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(wx + wall.w/2, wall.y + 5);
    ctx.lineTo(wx + wall.w/2 + 3, wall.y + wall.h/2);
    ctx.lineTo(wx + wall.w/2 - 2, wall.y + wall.h - 5);
    ctx.stroke();

    // Glow if has pickup
    if (wall.hasPickup) {
      ctx.fillStyle = '#ffaa0033';
      ctx.fillRect(wx - 2, wall.y - 2, wall.w + 4, wall.h + 4);
    }
  }
}

// ============================================================
// DRAW PLAYER (Baseling with cybernetic fists)
// ============================================================
function drawPlayer() {
  const p = player;
  const px = Math.round(p.x - scrollX);
  const py = Math.round(p.y);

  // Skip frames during iframes (blink)
  if (p.iframes > 0 && Math.floor(p.iframes * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px + p.w/2, py + p.h/2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // Body - baseling shape (round with little legs)
  ctx.fillStyle = '#44aaff';
  ctx.beginPath();
  ctx.ellipse(0, -2, 8, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(2, -8, 4, 4);
  ctx.fillStyle = '#111';
  ctx.fillRect(3, -7, 2, 2);

  // Cybernetic fist
  const fistExtend = p.punching ? 14 : 6;
  const fistY = p.punching ? -2 : 2;
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(fistExtend - 2, fistY - 4, 8, 8);
  // Fist glow when punching
  if (p.punching) {
    ctx.fillStyle = '#ffaa00' + (Math.floor(frame * 0.5) % 2 === 0 ? 'ff' : '88');
    ctx.fillRect(fistExtend - 4, fistY - 6, 12, 12);
    ctx.fillStyle = '#ffffff88';
    ctx.fillRect(fistExtend, fistY - 2, 6, 4);
  }

  // Arm (cybernetic)
  ctx.fillStyle = '#888888';
  ctx.fillRect(4, fistY - 2, fistExtend - 4, 4);

  // Legs (animate when moving)
  const legOffset = p.grounded ? Math.sin(p.animFrame * Math.PI / 2) * 3 : 2;
  ctx.fillStyle = '#3388dd';
  ctx.fillRect(-4, 10, 4, 5 + legOffset);
  ctx.fillRect(2, 10, 4, 5 - legOffset);

  // Spore cap (top of baseling)
  ctx.fillStyle = '#2277cc';
  ctx.beginPath();
  ctx.ellipse(0, -12, 7, 5, 0, Math.PI, 0);
  ctx.fill();

  ctx.restore();
}

// ============================================================
// DRAW BOT
// ============================================================
function drawBot() {
  const bot = player.bot;
  if (!bot) return;

  const px = player.x - scrollX + player.w/2;
  const py = player.y - 25;
  const bx = px + Math.cos(bot.angle) * 20;
  const by = py + Math.sin(bot.angle) * 12;

  // Bot body
  ctx.fillStyle = bot.color;
  ctx.beginPath();
  ctx.arc(bx, by, 7, 0, Math.PI * 2);
  ctx.fill();

  // Bot eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(bx + player.facing * 2, by - 1, 2, 0, Math.PI * 2);
  ctx.fill();

  // Bot trail
  ctx.fillStyle = bot.color + '44';
  for (let i = 1; i <= 3; i++) {
    const ta = bot.angle - i * 0.4;
    ctx.beginPath();
    ctx.arc(px + Math.cos(ta) * 20, py + Math.sin(ta) * 12, 4 - i, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP pips
  for (let i = 0; i < bot.maxHp; i++) {
    ctx.fillStyle = i < bot.hp ? bot.color : '#333333';
    ctx.fillRect(bx - bot.maxHp * 3 + i * 6, by - 12, 5, 3);
  }

  // Bot projectiles
  for (let i = 0; i < bot.projectiles.length; i++) {
    const bp = bot.projectiles[i];
    const bpx = bp.x - scrollX;
    ctx.fillStyle = bot.color;
    ctx.beginPath();
    ctx.arc(bpx, bp.y, bp.explosive ? 5 : 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff88';
    ctx.beginPath();
    ctx.arc(bpx, bp.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// DRAW ENEMIES
// ============================================================
function drawEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    const ex = Math.round(e.x - scrollX);
    const ey = Math.round(e.y);
    if (ex + e.w < -30 || ex > GW + 30) continue;

    const alpha = e.dying ? Math.max(0, e.deathTimer / 0.6) : 1;
    if (alpha <= 0) continue;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(ex + e.w/2, ey + e.h/2);
    if (e.facing < 0) ctx.scale(-1, 1);

    // Stun flash
    if (e.stunTimer > 0 && Math.floor(e.stunTimer * 15) % 2 === 0) {
      ctx.fillStyle = '#ffffff';
    } else {
      ctx.fillStyle = e.color;
    }

    if (e.isBoss) {
      // Boss - bigger, more detailed
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Boss armor plates
      ctx.fillStyle = e.color + 'aa';
      ctx.fillRect(-e.w/2 + 3, -e.h/2 + 3, e.w - 6, 10);
      ctx.fillRect(-e.w/2 + 3, e.h/2 - 13, e.w - 6, 10);
      // Boss eye
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(4, -e.h/4, 6, 4);
      // Boss health bar
      ctx.fillStyle = '#333333';
      ctx.fillRect(-e.w/2, -e.h/2 - 8, e.w, 4);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-e.w/2, -e.h/2 - 8, e.w * (e.hp / e.maxHp), 4);
    } else if (e.flying) {
      // Drone
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Propeller
      const propW = 6 + Math.sin(frame * 0.5) * 4;
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(-propW, -e.h/2 - 3, propW * 2, 2);
      // Eye
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(2, -1, 3, 3);
    } else if (e.hasShield) {
      // Shield bot
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Shield
      ctx.fillStyle = '#88ff88';
      ctx.fillRect(e.w/2, -e.h/2 + 4, 4, e.h - 8);
      // Visor
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(2, -4, 5, 3);
    } else if (e.canDash) {
      // Ninja
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Scarf
      ctx.fillStyle = e.color + 'aa';
      ctx.fillRect(-e.w/2 - 6, -e.h/2 + 4, 6, 4);
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(1, -5, 4, 2);
    } else {
      // Standard soldier/tank
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Helmet
      ctx.fillStyle = e.color + 'cc';
      ctx.fillRect(-e.w/2, -e.h/2, e.w, 8);
      // Visor
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(2, -e.h/2 + 10, 4, 3);
    }

    ctx.restore();
  }
}

// ============================================================
// DRAW PICKUPS
// ============================================================
function drawPickups() {
  for (let i = 0; i < pickups.length; i++) {
    const pk = pickups[i];
    const px = pk.x - scrollX;
    const py = pk.y + Math.sin(pk.bobTimer * 4) * 3;
    if (px < -20 || px > GW + 20) continue;

    // Blink when about to expire
    if (pk.timer < 2 && Math.floor(pk.timer * 5) % 2 === 0) continue;

    if (pk.type === 'health') {
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(px + 3, py, 6, 12);
      ctx.fillRect(px, py + 3, 12, 6);
    } else if (pk.type === 'life') {
      ctx.fillStyle = '#ffff44';
      ctx.beginPath();
      ctx.arc(px + 7, py + 7, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('1UP', px + 7, py + 10);
    } else if (pk.type.startsWith('token_')) {
      const letter = pk.type.charAt(6);
      const colors = { A: '#ff4444', B: '#44ff44', G: '#ffaa00' };
      const symbols = { A: 'a', B: 'b', G: 'g' };
      ctx.fillStyle = colors[letter] || '#888888';
      ctx.beginPath();
      ctx.arc(px + 7, py + 7, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(symbols[letter], px + 7, py + 10);
    }
  }
}

// ============================================================
// DRAW PROJECTILES
// ============================================================
function drawProjectiles() {
  for (let i = 0; i < projectiles.length; i++) {
    const proj = projectiles[i];
    const px = proj.x - scrollX;
    ctx.fillStyle = proj.color;
    ctx.beginPath();
    ctx.arc(px, proj.y, proj.size || 4, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.fillStyle = proj.color + '44';
    ctx.beginPath();
    ctx.arc(px, proj.y, (proj.size || 4) + 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// DRAW PARTICLES
// ============================================================
function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const alpha = Math.max(0, p.life / p.maxLife);
    const px = p.x - scrollX;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(px - p.size/2, p.y - p.size/2, p.size * alpha, p.size * alpha);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW GIMMICK OVERLAY
// ============================================================
function drawGimmickOverlay(stage) {
  if (stage.gimmick === 'water' && waterLevel < GH) {
    ctx.fillStyle = '#2244aa33';
    ctx.fillRect(0, waterLevel, GW, GH - waterLevel);
    ctx.fillStyle = '#4488ff44';
    ctx.fillRect(0, waterLevel, GW, 3);
    // Bubbles
    for (let i = 0; i < 5; i++) {
      const bx = (frame * 2 + i * 97) % GW;
      const by = waterLevel + 10 + Math.sin(frame * 0.05 + i) * 20;
      ctx.fillStyle = '#88ccff44';
      ctx.beginPath();
      ctx.arc(bx, by, 2 + Math.sin(frame * 0.1 + i) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  if (stage.gimmick === 'lava' && lavaLevel < GH) {
    ctx.fillStyle = '#ff220044';
    ctx.fillRect(0, lavaLevel, GW, GH - lavaLevel);
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(0, lavaLevel, GW, 3);
    // Lava glow
    ctx.fillStyle = '#ff880022';
    ctx.fillRect(0, lavaLevel - 20, GW, 20);
  }

  if (stage.gimmick === 'wind') {
    // Wind streaks
    ctx.strokeStyle = '#ffffff11';
    ctx.lineWidth = 1;
    for (let i = 0; i < 8; i++) {
      const wx = ((frame * windDir * 5 + i * 60) % GW + GW) % GW;
      const wy = 50 + i * 30;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.lineTo(wx + windDir * 30, wy);
      ctx.stroke();
    }
  }

  if (stage.gimmick === 'lowgrav') {
    // Floating debris
    for (let i = 0; i < 6; i++) {
      const dx = (frame * 0.3 + i * 80) % GW;
      const dy = 50 + Math.sin(frame * 0.02 + i * 2) * 100;
      ctx.fillStyle = '#44ffff22';
      ctx.fillRect(dx, dy, 3, 3);
    }
  }
}

// ============================================================
// DRAW HUD
// ============================================================
function drawHUD() {
  // Health bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(10, 10, 80, 10);
  ctx.fillStyle = player.hp > 2 ? '#44ff44' : (player.hp > 1 ? '#ffaa00' : '#ff4444');
  ctx.fillRect(10, 10, 80 * (player.hp / player.maxHp), 10);
  ctx.strokeStyle = '#666666';
  ctx.strokeRect(10, 10, 80, 10);

  // Lives
  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x' + lives, 95, 18);

  // Score
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, GW - 10, 18);

  // Stage name
  ctx.textAlign = 'center';
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  ctx.fillText('STAGE ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name, GW/2, 12);

  // Token display
  if (player.tokens.length > 0) {
    ctx.fillStyle = '#222222cc';
    ctx.fillRect(10, 25, 60, 14);
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    for (let i = 0; i < player.tokens.length; i++) {
      const colors = { A: '#ff4444', B: '#44ff44', G: '#ffaa00' };
      ctx.fillStyle = colors[player.tokens[i]];
      ctx.fillText(player.tokens[i], 14 + i * 18, 36);
    }
    // Empty slots
    ctx.fillStyle = '#444444';
    for (let i = player.tokens.length; i < 3; i++) {
      ctx.fillText('?', 14 + i * 18, 36);
    }
  }

  // Bot indicator
  if (player.bot) {
    ctx.fillStyle = '#222222cc';
    ctx.fillRect(GW - 100, 25, 90, 14);
    ctx.fillStyle = player.bot.color;
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(player.bot.name, GW - 12, 35);
  }

  // Boss HP bar
  if (bossActive) {
    const boss = enemies.find(function(e) { return e.isBoss && !e.dying; });
    if (boss) {
      ctx.fillStyle = '#333333';
      ctx.fillRect(GW/2 - 80, GH - 20, 160, 8);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(GW/2 - 80, GH - 20, 160 * (boss.hp / boss.maxHp), 8);
      ctx.strokeStyle = '#666666';
      ctx.strokeRect(GW/2 - 80, GH - 20, 160, 8);
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', GW/2, GH - 12);
    }
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  // Background gradient
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Animated lines
  for (let i = 0; i < 20; i++) {
    const x = (frame * 2 + i * 50) % (GW + 100) - 50;
    ctx.fillStyle = '#ff440011';
    ctx.fillRect(x, 0, 2, GH);
  }

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHATTER', GW/2, GH/2 - 40);

  // Fist icon between words
  ctx.fillStyle = '#ffaa00';
  ctx.fillRect(GW/2 - 20, GH/2 - 28, 40, 6);

  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('HAND', GW/2, GH/2);

  // Subtitle
  ctx.fillStyle = '#888888';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW/2, GH/2 + 25);

  // Baseling with cyberfists
  drawTitleBaseling(GW/2, GH/2 + 70);

  // Instructions
  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  const blink = Math.floor(frame * 0.03) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 40);

  // Controls
  ctx.fillStyle = '#444444';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS: Move | SPACE: Jump | Z/X: PUNCH', GW/2, GH - 20);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 20);
  }
}

function drawTitleBaseling(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#44aaff';
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cap
  ctx.fillStyle = '#2277cc';
  ctx.beginPath();
  ctx.ellipse(0, -18, 12, 8, 0, Math.PI, 0);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(3, -8, 6, 6);
  ctx.fillRect(-8, -8, 6, 6);
  ctx.fillStyle = '#111';
  ctx.fillRect(5, -6, 3, 3);
  ctx.fillRect(-6, -6, 3, 3);

  // Left fist (cybernetic)
  const fistPulse = Math.sin(frame * 0.1) * 2;
  ctx.fillStyle = '#888888';
  ctx.fillRect(-24, -4, 12, 5);
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(-30 - fistPulse, -7, 10, 10);
  ctx.fillStyle = '#ffaa0088';
  ctx.fillRect(-30 - fistPulse - 2, -9, 14, 14);

  // Right fist
  ctx.fillStyle = '#888888';
  ctx.fillRect(14, -4, 12, 5);
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(22 + fistPulse, -7, 10, 10);
  ctx.fillStyle = '#ffaa0088';
  ctx.fillRect(22 + fistPulse - 2, -9, 14, 14);

  ctx.restore();
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GW/2, GH/2 - 30);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH/2 + 10);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffaa00';
    ctx.fillText('NEW HIGH SCORE!', GW/2, GH/2 + 35);
  } else {
    ctx.fillStyle = '#888888';
    ctx.fillText('Best: ' + highScore, GW/2, GH/2 + 35);
  }

  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  ctx.fillText('Stage reached: ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name, GW/2, GH/2 + 60);

  if (deathTimer <= 0) {
    const blink = Math.floor(frame * 0.03) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#888888';
      ctx.fillText('PRESS ANY KEY', GW/2, GH - 30);
    }
  }
}

// ============================================================
// VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#000a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  for (let i = 0; i < 20; i++) {
    const cx = (frame * 1.5 + i * 48) % GW;
    const cy = (frame * 0.8 + i * 37) % GH;
    ctx.fillStyle = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'][i % 5] + '66';
    ctx.fillRect(cx, cy, 4, 4);
  }

  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GW/2, GH/2 - 40);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('All stages cleared!', GW/2, GH/2);
  ctx.fillText('Final Score: ' + score, GW/2, GH/2 + 25);

  drawTitleBaseling(GW/2, GH/2 + 70);

  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  const blink = Math.floor(frame * 0.03) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY', GW/2, GH - 20);
}

// ============================================================
// STAGE INTRO
// ============================================================
function drawStageIntro() {
  const stage = STAGES[stageNum];
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, GW, GH);

  // Stage border
  ctx.strokeStyle = stage.accent;
  ctx.lineWidth = 2;
  ctx.strokeRect(GW/2 - 120, GH/2 - 40, 240, 80);

  ctx.fillStyle = stage.accent;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stageNum + 1), GW/2, GH/2 - 18);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(stage.name, GW/2, GH/2 + 8);

  // Gimmick hint
  const hints = {
    conveyor: 'Watch the conveyor belts!',
    water: 'Rising water sections ahead',
    vines: 'Platforms may crumble!',
    wind: 'Strong gusts blow you around',
    lava: 'Stay above the lava!',
    lowgrav: 'Low gravity zone',
    mixed: 'All hazards combined!'
  };
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  ctx.fillText(hints[stage.gimmick] || '', GW/2, GH/2 + 30);
}

// ============================================================
// GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
