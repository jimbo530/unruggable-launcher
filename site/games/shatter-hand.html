// ============================================================
// BASELING STAT INTEGRATION
// ============================================================
// Stats come from BaselingPlayer.getMults() (see ARCADE-STATS.md), the single source of
// stat math, clamped to the single-player band (0.8-1.6). The STAT helpers below read
// D&D-style fields on statB; rather than rewrite them, we synthesize statB from the five
// bounded multipliers in recomputeStats(), re-run after a title-screen baseling pick.
//   SPD -> move/jump/attack-speed,  STA -> HP/iframes,  PWR -> punch damage/knockback,  LCK -> drops/crit/score.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage);    // STR -> punch damage, range, knockback
  statB.dex = dnd(m.moveSpeed); // DEX -> move/jump/attack speed, deflect window
  statB.con = dnd(m.health);    // CON -> max HP, iframe duration
  statB.int = dnd(m.luck);      // INT -> bot/satellite damage + speed (luck flavor)
  statB.wis = dnd(m.luck);      // WIS -> score, drop luck, crit (luck flavor)
  statB.cha = dnd(m.luck);      // CHA -> bonus lives, bot durability
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch(e) { console.warn('[shatter-hand] NftLoader display info failed:', e && e.message); }
recomputeStats();
var picking = false; // baseling character-select overlay open

// Derived stats from the five bounded multipliers (15+ references)
var STAT = {
  punchDmg: function() { return Math.floor(30 * statB.damage * (1 + (statB.str - 10) * 0.08)); },        // REF 1: STR -> punch damage
  punchRange: function() { return Math.floor(32 * (1 + (statB.str - 10) * 0.03)); },                      // REF 2: STR -> punch reach
  punchKnockback: function() { return Math.floor(350 * (1 + (statB.str - 10) * 0.05)); },                 // REF 3: STR -> knockback force
  moveSpeed: function() { return Math.floor(140 * statB.speed * (1 + (statB.dex - 10) * 0.06)); },        // REF 4: DEX -> movement speed
  jumpForce: function() { return -480 * (1 + (statB.dex - 10) * 0.04); },                                 // REF 5: DEX -> jump height
  punchCooldown: function() { return 0.3 * statB.cooldown * (1 / (1 + (statB.dex - 10) * 0.05)); },       // REF 6: DEX -> attack speed
  maxHp: function() { return Math.floor(6 * statB.hpMult * (1 + (statB.con - 10) * 0.1)); },              // REF 7: CON -> max HP
  iframeDuration: function() { return 1.2 * (1 + (statB.con - 10) * 0.04); },                             // REF 8: CON -> invincibility time
  botDamage: function() { return 1 + (statB.int - 10) * 0.08; },                                          // REF 9: INT -> bot/satellite damage
  botCooldown: function() { return 1.2 * (1 / (1 + (statB.int - 10) * 0.06)); },                          // REF 10: INT -> bot attack speed
  scoreMult: function() { return statB.scoreMult * (1 + (statB.wis - 10) * 0.05); },                      // REF 11: WIS -> score multiplier
  dropLuck: function() { return statB.luck * (1 + (statB.wis - 10) * 0.06); },                            // REF 12: WIS -> item drop chance
  extraLives: function() { return statB.lives + Math.floor(Math.max(0, statB.cha - 12) / 4); },           // REF 13: CHA -> bonus starting lives
  botHpBonus: function() { return Math.floor((statB.cha - 10) * 0.3); },                                  // REF 14: CHA -> satellite bot durability
  critChance: function() { return 0.05 * (1 + (statB.wis - 10) * 0.08); },                                // REF 15: WIS -> critical hit chance
  deflectWindow: function() { return 0.2 * (1 + (statB.dex - 10) * 0.04); }                               // REF 16: DEX -> deflect timing window
};

function createPlayer() {
  var mhp = STAT.maxHp();
  return {
    x: 60, y: FLOOR_Y - 30, w: 16, h: 30,
    vx: 0, vy: 0, grounded: false, facing: 1,
    hp: mhp, maxHp: mhp, iframes: 0,
    punching: false, punchTimer: 0, punchCooldown: 0,
    tokens: [],
    bot: null,
    animFrame: 0, animTimer: 0,
    jumpHeld: false,
    comboCount: 0, comboTimer: 0
  };
}

// ============================================================
// SATELLITE BOT
// ============================================================
function createBot(combo) {
  var def = BOT_COMBOS[combo];
  if (!def) return null;
  var bonusHp = STAT.botHpBonus();
  return {
    name: def.name, color: def.color, type: def.type,
    hp: def.hp + bonusHp, maxHp: def.hp + bonusHp,
    angle: 0, attackTimer: 0, attackCd: STAT.botCooldown(),
    projectiles: []
  };
}

function createEnemy(type, x, y) {
  var def = ENEMY_DEFS[type];
  if (!def) return null;
  var lvlScale = 1 + stageNum * 0.08;
  return {
    type: type, x: x, y: def.flying ? y - 60 : y - def.h,
    w: def.w, h: def.h, vx: 0, vy: 0,
    hp: Math.floor(def.hp * lvlScale), maxHp: Math.floor(def.hp * lvlScale),
    speed: def.speed, damage: def.damage, score: def.score,
    color: def.color, bodyColor: def.bodyColor || def.color, name: def.name || type,
    atkCd: def.atkCd, atkRange: def.atkRange, atkTimer: def.atkCd * 0.5,
    flying: def.flying || false, shootsProjectile: def.shootsProjectile || false,
    hasShield: def.hasShield || false, heavy: def.heavy || false,
    canDash: def.canDash || false, isBoss: def.isBoss || false,
    facing: -1, stunTimer: 0, knockbackVx: 0, knockbackVy: 0,
    dying: false, deathTimer: 0, shieldFacing: -1,
    animFrame: 0, animTimer: 0, dashCd: 0,
    bossPhase: 0, bossPatternTimer: 0,
    flashTimer: 0
  };
}

// ============================================================
// PLATFORMS & WALLS
// ============================================================
function generatePlatforms(stage) {
  platforms = [];
  breakableWalls = [];
  hazardZones = [];
  var sw = stage.width;

  for (var x = 200; x < sw - 200; x += 180 + Math.floor(Math.random() * 220)) {
    var py = FLOOR_Y - 60 - Math.floor(Math.random() * 80);
    var pw = 50 + Math.floor(Math.random() * 40);
    platforms.push({ x: x, y: py, w: pw, h: 8, crumbling: stage.gimmick === 'vines' && Math.random() < 0.3, crumbleTimer: 0, fallen: false });
  }

  for (var x2 = 400; x2 < sw - 300; x2 += 500 + Math.floor(Math.random() * 300)) {
    if (Math.random() < 0.5) {
      breakableWalls.push({ x: x2, y: FLOOR_Y - 50, w: 16, h: 50, hp: 2, hasPickup: Math.random() < 0.6 });
    }
  }

  if (stage.gimmick === 'conveyor') {
    for (var x3 = 300; x3 < sw - 200; x3 += 400) {
      if (Math.random() < 0.4) {
        platforms.push({ x: x3, y: FLOOR_Y - 2, w: 100, h: 6, conveyor: true, conveyorDir: Math.random() < 0.5 ? 1 : -1 });
      }
    }
  }

  // Hazard zones per stage theme
  if (stage.zone === 'caverns') {
    for (var x4 = 500; x4 < sw - 400; x4 += 600 + Math.floor(Math.random() * 300)) {
      hazardZones.push({ x: x4, y: FLOOR_Y - 4, w: 60, h: 4, type: 'spikes' });
    }
  }
  if (stage.zone === 'wilds') {
    for (var x5 = 400; x5 < sw - 300; x5 += 700 + Math.floor(Math.random() * 400)) {
      hazardZones.push({ x: x5, y: FLOOR_Y - 20, w: 30, h: 20, type: 'poison_cloud', timer: 0 });
    }
  }
}

// ============================================================
// PICKUPS - Tasern items
// ============================================================
function spawnPickup(x, y, type) {
  pickups.push({ x: x, y: y, w: 12, h: 12, type: type, vy: -100, timer: 8, bobTimer: 0 });
}

function spawnTokenPickup(x, y) {
  var types = ['A', 'B', 'G'];
  var type = types[Math.floor(Math.random() * 3)];
  pickups.push({ x: x, y: y, w: 14, h: 14, type: 'token_' + type, vy: -120, timer: 10, bobTimer: 0 });
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticle(x, y, vx, vy, color, life, size) {
  if (particles.length >= MAX_PARTICLES) particles.shift();
  particles.push({ x:x, y:y, vx:vx, vy:vy, color:color, life:life, maxLife:life, size: size || 3 });
}

function spawnImpactBurst(x, y, count, color, speed) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = speed * (0.5 + Math.random() * 0.5);
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, color, 0.3 + Math.random() * 0.3, 2 + Math.random() * 4);
  }
}

function spawnPunchImpact(x, y, dir) {
  var colors = ['#ffff44', '#ff8800', '#ffffff', statB.color];
  for (var i = 0; i < 18; i++) {
    var angle = -Math.PI/4 + Math.random() * Math.PI/2;
    var spd = 160 + Math.random() * 280;
    spawnParticle(x, y, dir * Math.cos(angle) * spd, Math.sin(angle) * spd - 50,
      colors[Math.floor(Math.random() * colors.length)],
      0.2 + Math.random() * 0.35, 3 + Math.random() * 5);
  }
  for (var i2 = 0; i2 < 6; i2++) {
    spawnParticle(x - dir * 10, y - 5 + Math.random() * 10, dir * (200 + Math.random() * 100), 0, '#ffffff', 0.15, 2);
  }
}

function spawnCritImpact(x, y, dir) {
  var colors = ['#ff0000', '#ff4400', '#ffff00', '#ffffff'];
  for (var i = 0; i < 25; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = 200 + Math.random() * 350;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd - 80,
      colors[Math.floor(Math.random() * colors.length)],
      0.3 + Math.random() * 0.4, 4 + Math.random() * 6);
  }
  // Star burst lines
  for (var i2 = 0; i2 < 8; i2++) {
    var a = (i2 / 8) * Math.PI * 2;
    spawnParticle(x, y, Math.cos(a) * 300, Math.sin(a) * 300, '#ffffff', 0.2, 2);
  }
}

function spawnDeathExplosion(x, y, color) {
  for (var i = 0; i < 30; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = 100 + Math.random() * 300;
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd - 60,
      i % 3 === 0 ? '#ffffff' : color,
      0.4 + Math.random() * 0.5, 3 + Math.random() * 6);
  }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function doShake(intensity) {
  screenShake = Math.max(screenShake, intensity);
}

// ============================================================
// START GAME
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + STAT.extraLives();
  stageNum = 0;
  if (!tutorialShown) {
    tutorialTimer = 6.0;
    tutorialShown = true;
  }
  initStage();
}

function initStage() {
  var stage = STAGES[stageNum];
  stageWidth = stage.width;
  scrollX = 0;
  player = createPlayer();
  enemies = [];
  projectiles = [];
  pickups = [];
  particles = [];
  scorePopups = [];
  waveIndex = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
  bossActive = false;
  bossWarned = false;
  waterLevel = GH + 50;
  lavaLevel = GH + 50;
  windTimer = 0;
  windDir = 1;
  gimmickTimer = 0;
  deathTimer = 0;
  generatePlatforms(stage);
  state = 'stageIntro';
  stageCompleteTimer = 2.0;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;
  dt = Math.min(dt, 0.05);

  // Track just-pressed (NES: A=jump, B=punch, arrows=move)
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  justPressed.jump = (keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a) && !prevKeys.jump;
  justPressed.punch = (keys['KeyZ'] || keys['KeyX'] || touch.b) && !prevKeys.punch;
  prevKeys.jump = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a;
  prevKeys.punch = keys['KeyZ'] || keys['KeyX'] || touch.b;

  // Shake decay
  if (screenShake > 0) {
    screenShake -= dt * 22;
    if (screenShake < 0) screenShake = 0;
    screenShakeX = (Math.random() - 0.5) * screenShake * 2;
    screenShakeY = (Math.random() - 0.5) * screenShake * 2;
  }

  // Particles
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Score popups
  for (var i2 = scorePopups.length - 1; i2 >= 0; i2--) {
    var sp = scorePopups[i2];
    sp.y -= 40 * dt;
    sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(i2, 1);
  }

  // Tutorial timer
  if (tutorialTimer > 0) tutorialTimer -= dt;

  if (state === 'title') {
    if (picking) return; // baseling picker overlay open — ignore game input
    if (keys['KeyC'] || touch.c) {
      keys['KeyC'] = false; touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (justPressed.jump || justPressed.punch) startGame();
    return;
  }

  if (state === 'stageIntro') {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) state = 'playing';
    return;
  }

  if (state === 'stageComplete') {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) {
      stageNum++;
      if (stageNum >= STAGES.length) {
        state = 'victory';
      } else {
        initStage();
      }
    }
    return;
  }

  if (state === 'gameOver') {
    deathTimer -= dt;
    if (deathTimer <= 0 && (justPressed.jump || justPressed.punch)) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (justPressed.jump || justPressed.punch) state = 'title';
    return;
  }

  if (state !== 'playing') return;

  var stage = STAGES[stageNum];
  var grav = GRAVITY * (stage.gimmick === 'lowgrav' ? 0.5 : 1.0);

  updatePlayer(dt, grav, stage);
  updateEnemies(dt, grav, stage);
  updateProjectiles(dt);
  updatePickups(dt);
  updateBot(dt);
  updateGimmicks(dt, stage);
  updateHazardZones(dt);
  spawnWaves(stage);

  // Combo timer decay
  if (player.comboTimer > 0) {
    player.comboTimer -= dt;
    if (player.comboTimer <= 0) player.comboCount = 0;
  }

  // Stage completion
  if (!stageComplete && waveIndex >= stage.waves.length && enemies.length === 0) {
    stageComplete = true;
    stageCompleteTimer = 2.5;
    state = 'stageComplete';
    SFX.stageComplete();
    var clearBonus = Math.floor(500 * (stageNum + 1) * STAT.scoreMult());
    score += clearBonus;
    addScorePopup(GW / 2, GH / 2 - 40, 'GARDEN CLEAR +' + clearBonus, '#f4b41b');
  }

  // Camera
  var targetScroll = player.x - GW * 0.35;
  scrollX = Math.max(0, Math.min(stageWidth - GW, targetScroll));
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt, grav, stage) {
  var p = player;
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  if (p.iframes > 0) p.iframes -= dt;

  // Horizontal movement - DEX scales speed (REF 4)
  var moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { moveX = -1; p.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { moveX = 1; p.facing = 1; }

  if (!p.punching) {
    p.vx = moveX * STAT.moveSpeed();
  } else {
    p.vx *= 0.85;
  }

  // Wind gimmick
  if (stage.gimmick === 'wind') {
    p.vx += windDir * stage.windForce * dt * 60;
  }

  // Jump - DEX scales jump force (REF 5)
  if (justPressed.jump && p.grounded) {
    p.vy = STAT.jumpForce() * (stage.gimmick === 'lowgrav' ? 0.75 : 1.0);
    p.grounded = false;
    SFX.jump();
  }

  // Gravity
  p.vy += grav * dt;

  // Move
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // Floor collision
  p.grounded = false;
  if (p.y + p.h >= FLOOR_Y) {
    p.y = FLOOR_Y - p.h;
    p.vy = 0;
    p.grounded = true;
  }

  // Platform collision
  for (var i = 0; i < platforms.length; i++) {
    var plat = platforms[i];
    if (plat.fallen) continue;
    if (p.vy > 0 && p.y + p.h >= plat.y && p.y + p.h <= plat.y + plat.h + p.vy * dt + 5 &&
        p.x + p.w > plat.x && p.x < plat.x + plat.w) {
      p.y = plat.y - p.h;
      p.vy = 0;
      p.grounded = true;
      if (plat.conveyor) {
        p.x += plat.conveyorDir * stage.conveyorSpeed * dt;
      }
      if (plat.crumbling && !plat.crumbleTimer) {
        plat.crumbleTimer = 0.8;
      }
    }
  }

  // World bounds
  p.x = Math.max(0, Math.min(stageWidth - p.w, p.x));

  // Water/Lava hazard
  if (stage.gimmick === 'water' && p.y + p.h > waterLevel) {
    p.vy -= 200 * dt;
    p.vx *= 0.95;
  }
  if (stage.gimmick === 'lava' && p.y + p.h > lavaLevel) {
    hurtPlayer(1);
  }

  // Punch - DEX scales cooldown (REF 6), STR scales range (REF 2)
  p.punchCooldown -= dt;
  if (justPressed.punch && p.punchCooldown <= 0) {
    p.punching = true;
    p.punchTimer = STAT.deflectWindow();
    p.punchCooldown = STAT.punchCooldown();
    SFX.punch();
    doPunchAttack();
  }

  if (p.punching) {
    p.punchTimer -= dt;
    if (p.punchTimer <= 0) p.punching = false;
  }

  // Animation
  p.animTimer += dt;
  if (p.animTimer > 0.12) { p.animTimer = 0; p.animFrame = (p.animFrame + 1) % 4; }
}

// ============================================================
// PUNCH ATTACK
// ============================================================
function doPunchAttack() {
  var p = player;
  var range = STAT.punchRange();
  var px = p.x + (p.facing > 0 ? p.w : -range);
  var py = p.y;
  var punchBox = { x: px, y: py, w: range, h: p.h };
  var hitSomething = false;

  // Check for critical hit (REF 15: WIS)
  var isCrit = Math.random() < STAT.critChance();

  // Hit enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (e.dying) continue;
    if (rectOverlap(punchBox, e)) {
      if (e.hasShield && e.facing !== p.facing) {
        SFX.deflect();
        spawnImpactBurst(e.x + e.w/2, e.y + e.h/2, 5, '#44ff44', 100);
        addScorePopup(e.x, e.y - 10, 'BLOCKED', '#ff4444');
        continue;
      }
      hitEnemy(e, p.facing, isCrit);
      hitSomething = true;
    }
  }

  // Deflect projectiles
  for (var i2 = projectiles.length - 1; i2 >= 0; i2--) {
    var proj = projectiles[i2];
    if (proj.friendly) continue;
    if (rectOverlap(punchBox, { x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 })) {
      proj.vx = -proj.vx * 1.5;
      proj.vy = -proj.vy * 0.5;
      proj.friendly = true;
      proj.color = statB.color;
      SFX.deflect();
      spawnImpactBurst(proj.x, proj.y, 8, '#ffff44', 120);
      addScorePopup(proj.x, proj.y - 10, 'DEFLECT!', '#44ffff');
      doShake(3);
      hitSomething = true;
    }
  }

  // Break walls
  for (var i3 = breakableWalls.length - 1; i3 >= 0; i3--) {
    var wall = breakableWalls[i3];
    if (rectOverlap(punchBox, wall)) {
      wall.hp--;
      if (wall.hp <= 0) {
        SFX.wallBreak();
        spawnImpactBurst(wall.x + wall.w/2, wall.y + wall.h/2, 20, '#886644', 200);
        if (wall.hasPickup) {
          spawnTokenPickup(wall.x, wall.y);
        }
        breakableWalls.splice(i3, 1);
        doShake(5);
      } else {
        spawnImpactBurst(wall.x + wall.w/2, wall.y + wall.h/2, 8, '#886644', 100);
        doShake(2);
      }
      hitSomething = true;
    }
  }

  if (hitSomething) {
    if (isCrit) {
      spawnCritImpact(p.x + p.facing * (p.w + 10), p.y + p.h/2, p.facing);
      doShake(7);
    } else {
      spawnPunchImpact(p.x + p.facing * (p.w + 10), p.y + p.h/2, p.facing);
      doShake(4);
    }
    // Combo tracking
    p.comboCount++;
    p.comboTimer = 2.0;
    if (p.comboCount >= 3) {
      var comboBonus = Math.floor(p.comboCount * 50 * STAT.scoreMult());
      score += comboBonus;
      addScorePopup(p.x, p.y - 30, p.comboCount + 'x COMBO +' + comboBonus, '#ff44ff');
    }
  }
}

function hitEnemy(e, dir, isCrit) {
  // STR scales punch damage (REF 1)
  var damage = STAT.punchDmg();
  if (player.bot && player.bot.type === 'sword') damage += Math.floor(10 * STAT.botDamage());
  if (isCrit) damage = Math.floor(damage * 2);

  e.hp -= damage;
  e.stunTimer = 0.4;
  e.flashTimer = 0.15;

  // STR scales knockback (REF 3)
  var kb = STAT.punchKnockback();
  if (e.heavy) {
    e.knockbackVx = dir * kb * 0.4;
    e.knockbackVy = -80;
  } else {
    e.knockbackVx = dir * kb;
    e.knockbackVy = -200;
  }

  if (isCrit) {
    spawnCritImpact(e.x + e.w/2, e.y + e.h/2, dir);
    doShake(e.isBoss ? 8 : 6);
    SFX.punchCrit();
    addScorePopup(e.x, e.y - 10, 'CRIT!', '#ff0000');
  } else {
    spawnPunchImpact(e.x + e.w/2, e.y + e.h/2, dir);
    doShake(e.isBoss ? 6 : 4);
    SFX.punchHeavy();
  }

  if (e.hp <= 0) {
    killEnemy(e, dir);
  } else {
    addScorePopup(e.x, e.y - 10, '-' + damage, '#ff8844');
    checkEnemyCollisions(e, dir);
  }
}

function checkEnemyCollisions(hitter, dir) {
  for (var i = 0; i < enemies.length; i++) {
    var other = enemies[i];
    if (other === hitter || other.dying) continue;
    if (Math.abs(hitter.x - other.x) < 30 && Math.abs(hitter.y - other.y) < 20) {
      other.hp -= 10;
      other.knockbackVx = dir * STAT.punchKnockback() * 0.6;
      other.knockbackVy = -150;
      other.stunTimer = 0.3;
      other.flashTimer = 0.1;
      spawnImpactBurst(other.x + other.w/2, other.y + other.h/2, 8, '#ffaa00', 120);
      SFX.enemyFly();
      addScorePopup(other.x, other.y - 10, 'COLLIDE!', '#ffaa00');
      if (other.hp <= 0) killEnemy(other, dir);
    }
  }
}

function killEnemy(e, dir) {
  e.dying = true;
  e.deathTimer = 0.6;
  e.knockbackVx = dir * STAT.punchKnockback() * 1.2;
  e.knockbackVy = -300;
  // WIS scales score (REF 11)
  var baseScore = Math.floor(e.score * STAT.scoreMult());
  score += baseScore;
  addScorePopup(e.x, e.y - 20, '+' + baseScore, '#ffff44');
  if (e.isBoss) addScorePopup(e.x, e.y - 40, e.name + ' DEFEATED!', '#ff44ff');
  SFX.enemyDie();
  doShake(e.isBoss ? 12 : 5);
  spawnDeathExplosion(e.x + e.w/2, e.y + e.h/2, e.color);

  // WIS scales drop chance (REF 12)
  var luck = STAT.dropLuck();
  if (Math.random() < 0.3 * luck && !e.isBoss) {
    spawnTokenPickup(e.x, e.y);
  } else if (Math.random() < 0.15 * luck) {
    spawnPickup(e.x, e.y, 'health');
  } else if (Math.random() < 0.05 * luck) {
    spawnPickup(e.x, e.y, 'life');
  } else if (Math.random() < 0.08 * luck) {
    spawnPickup(e.x, e.y, 'spore_shield');
  }
  if (e.isBoss) {
    spawnPickup(e.x, e.y, 'health');
    spawnTokenPickup(e.x + 20, e.y);
    spawnTokenPickup(e.x - 20, e.y);
    spawnPickup(e.x + 30, e.y, 'spore_shield');
  }
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(dt, grav, stage) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];

    if (e.flashTimer > 0) e.flashTimer -= dt;

    if (e.dying) {
      e.deathTimer -= dt;
      e.x += e.knockbackVx * dt;
      e.y += e.knockbackVy * dt;
      e.knockbackVy += grav * dt;
      if (e.deathTimer <= 0) { enemies.splice(i, 1); }
      continue;
    }

    if (e.stunTimer > 0) {
      e.stunTimer -= dt;
      e.x += e.knockbackVx * dt;
      e.y += e.knockbackVy * dt;
      e.knockbackVx *= 0.9;
      if (!e.flying) {
        e.knockbackVy += grav * dt;
        if (e.y + e.h > FLOOR_Y) { e.y = FLOOR_Y - e.h; e.knockbackVy = 0; }
      }
      continue;
    }

    var dx = player.x - e.x;
    var dist = Math.abs(dx);
    e.facing = dx > 0 ? 1 : -1;
    e.shieldFacing = e.facing;
    e.atkTimer -= dt;

    if (e.isBoss) {
      updateBossAI(e, dt, dist);
    } else if (e.flying) {
      var targetY = player.y - 50;
      e.y += (targetY - e.y) * dt * 2;
      e.x += e.facing * e.speed * dt * 0.7;
      if (e.shootsProjectile && e.atkTimer <= 0 && dist < e.atkRange * 2) {
        e.atkTimer = e.atkCd;
        fireEnemyProjectile(e);
      }
    } else if (e.canDash && dist < 80 && e.dashCd <= 0) {
      e.x += e.facing * 120 * dt;
      e.dashCd = 1.5;
      // Trail particles for dash
      spawnParticle(e.x, e.y + e.h/2, -e.facing * 80, 0, e.color + '88', 0.3, 3);
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
    } else {
      if (dist > e.atkRange) {
        e.x += e.facing * e.speed * dt;
      }
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
    }

    if (e.dashCd > 0) e.dashCd -= dt;

    if (!e.flying) {
      e.vy = (e.vy || 0) + grav * dt;
      e.y += e.vy * dt;
      if (e.y + e.h > FLOOR_Y) { e.y = FLOOR_Y - e.h; e.vy = 0; }
    }

    e.x = Math.max(scrollX - 30, Math.min(scrollX + GW + 30, e.x));

    e.animTimer += dt;
    if (e.animTimer > 0.15) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 4; }
  }
}

function updateBossAI(e, dt, dist) {
  e.bossPatternTimer -= dt;
  if (e.bossPatternTimer <= 0) {
    e.bossPhase = (e.bossPhase + 1) % 4;
    e.bossPatternTimer = 2.0 + Math.random();
  }

  switch (e.bossPhase) {
    case 0:
      if (dist > e.atkRange) e.x += e.facing * e.speed * dt;
      if (dist < e.atkRange && e.atkTimer <= 0) {
        e.atkTimer = e.atkCd;
        attackPlayer(e);
      }
      break;
    case 1:
      e.x -= e.facing * e.speed * 0.5 * dt;
      if (e.atkTimer <= 0) {
        e.atkTimer = e.atkCd * 0.6;
        fireEnemyProjectile(e);
      }
      break;
    case 2:
      e.x += e.facing * e.speed * 2.5 * dt;
      if (dist < 20) {
        attackPlayer(e);
        e.atkTimer = e.atkCd;
        doShake(4);
        spawnImpactBurst(e.x + e.facing * e.w, e.y + e.h/2, 10, e.color, 150);
      }
      break;
    case 3:
      if (e.vy === 0 || !e.vy) { e.vy = -350; }
      if (e.flying) {
        e.x += e.facing * e.speed * dt;
        e.y += Math.sin(frame * 0.1) * 2;
      }
      break;
  }
}

function attackPlayer(e) {
  var p = player;
  if (p.iframes > 0) return;
  if (rectOverlap({ x: e.x + (e.facing > 0 ? e.w : -e.atkRange), y: e.y, w: e.atkRange, h: e.h },
    { x: p.x, y: p.y, w: p.w, h: p.h })) {
    hurtPlayer(e.damage > 15 ? 2 : 1);
  }
}

function fireEnemyProjectile(e) {
  var dx = player.x - e.x;
  var dy = player.y - e.y;
  var dist = Math.sqrt(dx * dx + dy * dy) || 1;
  var projColor = e.isBoss ? '#ff8800' : '#cc4444';
  projectiles.push({
    x: e.x + e.w/2, y: e.y + e.h/2,
    vx: (dx / dist) * 180, vy: (dy / dist) * 180,
    color: projColor, friendly: false, life: 3.0, size: e.isBoss ? 6 : 5
  });
  if (e.isBoss && e.bossPhase === 1) {
    // Boss fires spread shot in phase 1
    var angle = Math.atan2(dy, dx);
    projectiles.push({
      x: e.x + e.w/2, y: e.y + e.h/2,
      vx: Math.cos(angle + 0.3) * 160, vy: Math.sin(angle + 0.3) * 160,
      color: projColor, friendly: false, life: 2.5, size: 4
    });
    projectiles.push({
      x: e.x + e.w/2, y: e.y + e.h/2,
      vx: Math.cos(angle - 0.3) * 160, vy: Math.sin(angle - 0.3) * 160,
      color: projColor, friendly: false, life: 2.5, size: 4
    });
  }
}

// ============================================================
// HURT PLAYER
// ============================================================
function hurtPlayer(amount) {
  var p = player;
  if (p.iframes > 0) return;

  // Bot takes hit first (CHA bonus HP - REF 14)
  if (p.bot && p.bot.hp > 0) {
    p.bot.hp -= amount;
    doShake(3);
    SFX.playerHurt();
    spawnImpactBurst(p.x + p.w/2, p.y, 10, p.bot.color, 150);
    addScorePopup(p.x, p.y - 10, 'BOT HIT', '#ff8844');
    if (p.bot.hp <= 0) {
      SFX.botDestroyed();
      addScorePopup(p.x, p.y - 20, p.bot.name + ' LOST', '#ff4444');
      p.bot = null;
    }
    p.iframes = STAT.iframeDuration() * 0.5;
    return;
  }

  p.hp -= amount;
  // CON scales iframes (REF 8)
  p.iframes = STAT.iframeDuration();
  doShake(6);
  SFX.playerHurt();
  spawnImpactBurst(p.x + p.w/2, p.y + p.h/2, 15, '#ff0000', 180);

  if (p.hp <= 0) {
    lives--;
    if (lives <= 0) {
      if (score > highScore) { highScore = score; TAS.score.save('shatterhand_hi', score); }
      state = 'gameOver';
      deathTimer = 1.5;
      SFX.gameOver();
      spawnDeathExplosion(p.x + p.w/2, p.y + p.h/2, statB.color);
    } else {
      addScorePopup(p.x, p.y - 20, 'BASELING DOWN', '#e6482e');
      player = createPlayer();
      player.x = Math.max(scrollX + 40, player.x);
    }
  }
}

// ============================================================
// PROJECTILES
// ============================================================
function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var proj = projectiles[i];
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;
    proj.life -= dt;

    if (proj.life <= 0) { projectiles.splice(i, 1); continue; }
    if (proj.x < scrollX - 20 || proj.x > scrollX + GW + 20) { projectiles.splice(i, 1); continue; }

    if (proj.friendly) {
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e = enemies[j];
        if (e.dying) continue;
        if (rectOverlap({ x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 }, e)) {
          e.hp -= 15;
          e.stunTimer = 0.2;
          e.knockbackVx = proj.vx > 0 ? 100 : -100;
          e.flashTimer = 0.1;
          spawnImpactBurst(proj.x, proj.y, 8, '#ffff00', 100);
          addScorePopup(proj.x, proj.y - 10, '-15', '#ffff44');
          if (e.hp <= 0) killEnemy(e, proj.vx > 0 ? 1 : -1);
          projectiles.splice(i, 1);
          break;
        }
      }
    } else {
      if (player.iframes <= 0 && rectOverlap({ x: proj.x - 4, y: proj.y - 4, w: 8, h: 8 },
        { x: player.x, y: player.y, w: player.w, h: player.h })) {
        hurtPlayer(1);
        projectiles.splice(i, 1);
      }
    }
  }
}

// ============================================================
// PICKUPS
// ============================================================
function updatePickups(dt) {
  for (var i = pickups.length - 1; i >= 0; i--) {
    var pk = pickups[i];
    pk.vy += 300 * dt;
    pk.y += pk.vy * dt;
    if (pk.y > FLOOR_Y - pk.h) { pk.y = FLOOR_Y - pk.h; pk.vy = 0; }
    pk.bobTimer += dt;
    pk.timer -= dt;
    if (pk.timer <= 0) { pickups.splice(i, 1); continue; }

    if (rectOverlap({ x: pk.x, y: pk.y, w: pk.w, h: pk.h },
      { x: player.x, y: player.y, w: player.w, h: player.h })) {
      collectPickup(pk);
      pickups.splice(i, 1);
    }
  }
}

function collectPickup(pk) {
  if (pk.type === 'health') {
    player.hp = Math.min(player.maxHp, player.hp + 2);
    SFX.powerup();
    spawnImpactBurst(pk.x, pk.y, 8, '#44ff44', 80);
    addScorePopup(pk.x, pk.y - 10, '+GARDEN SEED', '#38d973');
  } else if (pk.type === 'life') {
    lives++;
    SFX.powerup();
    spawnImpactBurst(pk.x, pk.y, 12, '#ffff44', 100);
    addScorePopup(pk.x, pk.y - 10, 'EXTRA LIFE!', '#f4b41b');
  } else if (pk.type === 'spore_shield') {
    // Temporary shield - grants iframes (CON scaling REF 8)
    player.iframes = STAT.iframeDuration() * 1.5;
    SFX.powerup();
    spawnImpactBurst(pk.x, pk.y, 15, statB.color, 120);
    addScorePopup(pk.x, pk.y - 10, 'MYCELIUM SHIELD!', '#3cacd7');
  } else if (pk.type.startsWith('token_')) {
    var letter = pk.type.charAt(6);
    player.tokens.push(letter);
    SFX.tokenGet();
    spawnImpactBurst(pk.x, pk.y, 10, '#88aaff', 100);
    addScorePopup(pk.x, pk.y - 10, letter + ' SPORE GEM', '#88aaff');

    if (player.tokens.length >= 3) {
      var combo = player.tokens.slice(0, 3).join('');
      player.tokens = [];
      summonBot(combo);
    }
  }
  var pickupScore = Math.floor(50 * STAT.scoreMult());
  score += pickupScore;
}

function summonBot(combo) {
  var bot = null;
  if (BOT_COMBOS[combo]) {
    bot = createBot(combo);
  } else {
    var perms = [combo, combo[0]+combo[2]+combo[1], combo[1]+combo[0]+combo[2],
                 combo[1]+combo[2]+combo[0], combo[2]+combo[0]+combo[1], combo[2]+combo[1]+combo[0]];
    for (var i = 0; i < perms.length; i++) {
      if (BOT_COMBOS[perms[i]]) { bot = createBot(perms[i]); break; }
    }
  }
  if (!bot) {
    var bonusHp = STAT.botHpBonus();
    bot = { name: 'BABY BASELING', color: '#888888', type: 'pulse', hp: 1 + bonusHp, maxHp: 1 + bonusHp, angle: 0, attackTimer: 0, attackCd: 2.0, projectiles: [] };
  }
  player.bot = bot;
  SFX.botSummon();
  doShake(3);
  spawnImpactBurst(player.x + player.w/2, player.y - 20, 20, bot.color, 150);
  addScorePopup(player.x, player.y - 30, bot.name + '!', bot.color);
}

// ============================================================
// BOT UPDATE - INT scales damage and cooldown (REF 9, 10)
// ============================================================
function updateBot(dt) {
  var bot = player.bot;
  if (!bot) return;

  bot.angle += dt * 3;
  bot.attackTimer -= dt;

  if (bot.attackTimer <= 0 && enemies.length > 0) {
    bot.attackTimer = bot.attackCd;
    botAttack(bot);
  }

  for (var i = bot.projectiles.length - 1; i >= 0; i--) {
    var bp = bot.projectiles[i];
    bp.x += bp.vx * dt;
    bp.y += bp.vy * dt;
    bp.life -= dt;
    if (bp.life <= 0) { bot.projectiles.splice(i, 1); continue; }

    for (var j = enemies.length - 1; j >= 0; j--) {
      var e = enemies[j];
      if (e.dying) continue;
      if (rectOverlap({ x: bp.x - 5, y: bp.y - 5, w: 10, h: 10 }, e)) {
        var botDmg = Math.floor(bp.damage * STAT.botDamage());
        e.hp -= botDmg;
        e.stunTimer = 0.15;
        e.knockbackVx = bp.vx > 0 ? 60 : -60;
        e.flashTimer = 0.1;
        spawnImpactBurst(bp.x, bp.y, 6, bot.color, 80);
        addScorePopup(bp.x, bp.y - 10, '-' + botDmg, bot.color);
        if (e.hp <= 0) killEnemy(e, bp.vx > 0 ? 1 : -1);
        if (!bp.piercing) { bot.projectiles.splice(i, 1); break; }
      }
    }
  }
}

function botAttack(bot) {
  var px = player.x + player.w/2;
  var py = player.y - 20;
  SFX.botAttack();

  switch (bot.type) {
    case 'sword': case 'blade': case 'cutter':
      var slashX = px + player.facing * 30;
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        if (e.dying) continue;
        if (Math.abs(e.x - slashX) < 35 && Math.abs(e.y - py) < 40) {
          var sDmg = Math.floor(20 * STAT.botDamage());
          e.hp -= sDmg;
          e.stunTimer = 0.2;
          e.knockbackVx = player.facing * 120;
          e.flashTimer = 0.1;
          spawnImpactBurst(e.x + e.w/2, e.y + e.h/2, 8, bot.color, 100);
          if (e.hp <= 0) killEnemy(e, player.facing);
        }
      }
      spawnImpactBurst(slashX, py, 6, bot.color, 80);
      break;
    case 'laser': case 'ray': case 'beam':
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 200, vy: -100, life: 1.5, damage: 15, piercing: true });
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 200, vy: 100, life: 1.5, damage: 15, piercing: true });
      break;
    case 'grenade': case 'bomb': case 'rocket':
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 150, vy: -180, life: 1.0, damage: 30, explosive: true });
      break;
    case 'shield':
      break;
    case 'spark': case 'flash':
      for (var a = 0; a < 8; a++) {
        var angle = (a / 8) * Math.PI * 2;
        bot.projectiles.push({ x: px, y: py, vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150, life: 0.8, damage: 10 });
      }
      break;
    case 'pulse':
      bot.projectiles.push({ x: px, y: py, vx: player.facing * 250, vy: 0, life: 2.0, damage: 18 });
      break;
    case 'mine':
      bot.projectiles.push({ x: px, y: py + 20, vx: 0, vy: 50, life: 3.0, damage: 25, explosive: true });
      break;
  }
}

// ============================================================
// STAGE GIMMICKS
// ============================================================
function updateGimmicks(dt, stage) {
  gimmickTimer += dt;

  for (var i = 0; i < platforms.length; i++) {
    var plat = platforms[i];
    if (plat.crumbleTimer > 0) {
      plat.crumbleTimer -= dt;
      if (plat.crumbleTimer <= 0) {
        plat.fallen = true;
        spawnImpactBurst(plat.x + plat.w/2, plat.y, 8, '#886644', 80);
      }
    }
  }

  switch (stage.gimmick) {
    case 'water':
      waterLevel = FLOOR_Y - 20 - Math.sin(gimmickTimer * 0.5) * 60;
      break;
    case 'lava':
      lavaLevel = FLOOR_Y - 10 - Math.sin(gimmickTimer * 0.3) * 40;
      break;
    case 'wind':
      windTimer += dt;
      if (windTimer > 3) { windTimer = 0; windDir *= -1; }
      break;
  }
}

function updateHazardZones(dt) {
  for (var i = 0; i < hazardZones.length; i++) {
    var hz = hazardZones[i];
    if (hz.type === 'poison_cloud') {
      hz.timer += dt;
      if (hz.timer > 0.5) {
        hz.timer = 0;
        spawnParticle(hz.x + Math.random() * hz.w, hz.y - Math.random() * 10, 0, -20, '#88ff4444', 0.8, 4);
      }
    }
    if (player.iframes <= 0 && rectOverlap(
      { x: hz.x, y: hz.y, w: hz.w, h: hz.h },
      { x: player.x, y: player.y, w: player.w, h: player.h }
    )) {
      if (hz.type === 'spikes') {
        hurtPlayer(1);
        doShake(3);
      } else if (hz.type === 'poison_cloud') {
        hurtPlayer(1);
      }
    }
  }
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function spawnWaves(stage) {
  while (waveIndex < stage.waves.length) {
    var wave = stage.waves[waveIndex];
    if (scrollX + GW * 0.8 >= wave.x) {
      if (wave.boss && !bossWarned) {
        bossWarned = true;
        SFX.bossWarning();
        doShake(6);
        addScorePopup(GW / 2, GH / 2, 'WARNING: GARDEN BOSS', '#e6482e');
      }
      for (var j = 0; j < wave.enemies.length; j++) {
        var ed = wave.enemies[j];
        var ex = wave.x + j * 40 + Math.random() * 20;
        var ey = FLOOR_Y;
        var enemy = createEnemy(ed.t, ex, ey);
        if (enemy) {
          enemies.push(enemy);
          spawnImpactBurst(ex, ey - 20, 6, enemy.color, 60);
        }
      }
      bossActive = wave.boss || false;
      waveIndex++;
    } else {
      break;
    }
  }
}

// ============================================================
// COLLISION UTIL
// ============================================================
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// NES PIXEL ART HELPERS
// ============================================================
function drawPixelSprite(data, x, y, scale, flip) {
  ctx.save();
  if (flip) {
    ctx.translate(x + data[0].length * scale, y);
    ctx.scale(-1, 1);
    x = 0; y = 0;
  }
  for (var row = 0; row < data.length; row++) {
    for (var col = 0; col < data[row].length; col++) {
      var c = data[row][col];
      if (c !== '.') {
        ctx.fillStyle = c;
        ctx.fillRect(x + col * scale, y + row * scale, scale, scale);
      }
    }
  }
  if (flip) ctx.restore();
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') { drawTitle(); return; }
  if (state === 'gameOver') { drawGameOver(); return; }
  if (state === 'victory') { drawVictory(); return; }
  if (state === 'stageIntro') { drawStageIntro(); return; }

  // === GAME RENDERING ===
  ctx.save();
  ctx.translate(Math.round(screenShakeX), Math.round(screenShakeY));

  var stage = STAGES[stageNum];
  drawBackground(stage);
  drawHazardZones();
  drawPlatforms(stage);
  drawBreakableWalls();
  drawPickups();
  drawEnemies();
  drawPlayer();
  drawBot();
  drawProjectiles();
  drawParticles();
  drawGimmickOverlay(stage);
  drawScorePopups();

  ctx.restore();

  drawHUD();
  drawTutorial();
  TAS.input.drawTouchControls(GW, GH);

  if (state === 'stageComplete') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE CLEAR!', GW/2, GH/2 - 20);
    ctx.font = '12px monospace';
    ctx.fillStyle = STAGES[stageNum].accent;
    ctx.fillText(STAGES[stageNum].name + ' CLEARED', GW/2, GH/2 + 5);
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('Score: ' + score, GW/2, GH/2 + 25);
  }
}

// ============================================================
// DRAW BACKGROUND - Zone-themed
// ============================================================
function drawBackground(stage) {
  ctx.fillStyle = stage.bg;
  ctx.fillRect(0, 0, GW, GH);

  var parallax = scrollX * 0.3;

  // Zone-specific backgrounds
  if (stage.zone === 'foundry') {
    // Pipes and gears
    ctx.fillStyle = '#22201a';
    for (var x = -parallax % 100; x < GW; x += 100) {
      ctx.fillRect(x, 30, 8, 200);
      ctx.fillRect(x - 15, 80 + Math.sin(x * 0.02) * 20, 38, 6);
    }
    for (var gx = 50 - (scrollX * 0.2) % 200; gx < GW; gx += 200) {
      drawGear(gx, 60, 25, frame * 0.02);
    }
  } else if (stage.zone === 'docks') {
    // Water reflections, dock posts
    ctx.fillStyle = '#0a1520';
    for (var x2 = -parallax % 80; x2 < GW; x2 += 80) {
      ctx.fillRect(x2, 180, 6, FLOOR_Y - 180);
      ctx.fillRect(x2 - 6, 175, 18, 8);
    }
    // Ropes
    ctx.strokeStyle = '#1a2a3a';
    ctx.lineWidth = 1;
    for (var rx = -parallax % 160; rx < GW; rx += 160) {
      ctx.beginPath();
      ctx.moveTo(rx, 175);
      ctx.quadraticCurveTo(rx + 40, 195, rx + 80, 175);
      ctx.stroke();
    }
  } else if (stage.zone === 'wilds') {
    // Trees and fungi
    ctx.fillStyle = '#0c1a0c';
    for (var x3 = -parallax % 120; x3 < GW; x3 += 120) {
      ctx.fillRect(x3 + 10, 40, 10, FLOOR_Y - 40);
      ctx.fillStyle = '#1a3a1a';
      ctx.beginPath();
      ctx.arc(x3 + 15, 40, 25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0c1a0c';
    }
    // Mushrooms in BG
    ctx.fillStyle = '#2a4a2a';
    for (var mx = -(scrollX * 0.5) % 90; mx < GW; mx += 90) {
      ctx.fillRect(mx + 2, FLOOR_Y - 20, 4, 20);
      ctx.beginPath();
      ctx.arc(mx + 4, FLOOR_Y - 22, 8, Math.PI, 0);
      ctx.fill();
    }
  } else if (stage.zone === 'spire') {
    // Clouds and pillars
    ctx.fillStyle = '#181830';
    for (var x4 = -parallax % 140; x4 < GW; x4 += 140) {
      ctx.fillRect(x4, 60, 20, FLOOR_Y - 60);
    }
    ctx.fillStyle = '#24244a';
    for (var cx = -(scrollX * 0.15) % 200; cx < GW; cx += 200) {
      ctx.beginPath();
      ctx.arc(cx, 50, 30, 0, Math.PI * 2);
      ctx.arc(cx + 25, 45, 22, 0, Math.PI * 2);
      ctx.arc(cx - 20, 48, 18, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (stage.zone === 'caverns') {
    // Stalactites and magma glow
    ctx.fillStyle = '#2a1000';
    for (var x5 = -parallax % 60; x5 < GW; x5 += 60) {
      var sh = 15 + Math.sin(x5 * 0.1) * 10;
      ctx.beginPath();
      ctx.moveTo(x5, 0);
      ctx.lineTo(x5 + 8, sh);
      ctx.lineTo(x5 + 16, 0);
      ctx.fill();
    }
    // Lava glow on floor
    ctx.fillStyle = '#ff440011';
    ctx.fillRect(0, FLOOR_Y - 5, GW, 10);
  } else if (stage.zone === 'void') {
    // Stars
    for (var si = 0; si < 40; si++) {
      var sx = (si * 127 + frame * 0.1) % GW;
      var sy = (si * 83 + Math.sin(si + frame * 0.01) * 5) % (FLOOR_Y - 20);
      ctx.fillStyle = si % 4 === 0 ? '#44eeee33' : '#ffffff22';
      ctx.fillRect(sx, sy, 2, 2);
    }
    // Floating panels
    ctx.fillStyle = '#121220';
    for (var x6 = -(scrollX * 0.4) % 180; x6 < GW; x6 += 180) {
      ctx.fillRect(x6, 100, 50, 30);
      ctx.strokeStyle = '#44eeee22';
      ctx.strokeRect(x6, 100, 50, 30);
    }
  } else if (stage.zone === 'tower') {
    // Runes and dark energy
    ctx.fillStyle = '#180020';
    for (var x7 = -parallax % 100; x7 < GW; x7 += 100) {
      ctx.fillRect(x7, 20, 12, FLOOR_Y - 20);
    }
    // Pulsing runes
    var runeAlpha = Math.floor((Math.sin(frame * 0.03) * 0.3 + 0.3) * 255).toString(16).padStart(2, '0');
    ctx.fillStyle = '#cc44ee' + runeAlpha;
    for (var ri = 0; ri < 6; ri++) {
      var rrx = (ri * 97 + frame * 0.5) % GW;
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(String.fromCharCode(0x2720 + ri), rrx, 80 + Math.sin(ri + frame * 0.02) * 30);
    }
  } else {
    // Generic fallback
    ctx.fillStyle = stage.accent + '22';
    for (var xg = -parallax % 120; xg < GW; xg += 120) {
      ctx.fillRect(xg, 40, 60, 180);
    }
  }

  // Middle layer
  var mid = scrollX * 0.6;
  ctx.fillStyle = stage.accent + '18';
  for (var xm = -mid % 80; xm < GW; xm += 80) {
    ctx.fillRect(xm, 100 + Math.sin(xm * 0.03) * 20, 30, FLOOR_Y - 100);
  }

  // Floor
  ctx.fillStyle = stage.floor;
  ctx.fillRect(0, FLOOR_Y, GW, GH - FLOOR_Y);
  ctx.fillStyle = stage.accent + '44';
  ctx.fillRect(0, FLOOR_Y, GW, 2);

  // Floor detail per zone
  if (stage.zone === 'foundry') {
    ctx.fillStyle = '#333320';
    for (var fd = -(scrollX * 0.8) % 40; fd < GW; fd += 40) {
      ctx.fillRect(fd, FLOOR_Y + 5, 20, 3);
    }
  }
}

function drawGear(cx, cy, r, angle) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#33332244';
  ctx.beginPath();
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * Math.PI * 2;
    var rr = i % 2 === 0 ? r : r * 0.7;
    if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
    else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ============================================================
// DRAW HAZARD ZONES
// ============================================================
function drawHazardZones() {
  for (var i = 0; i < hazardZones.length; i++) {
    var hz = hazardZones[i];
    var hx = hz.x - scrollX;
    if (hx + hz.w < -10 || hx > GW + 10) continue;

    if (hz.type === 'spikes') {
      ctx.fillStyle = '#884422';
      for (var s = 0; s < hz.w; s += 8) {
        ctx.beginPath();
        ctx.moveTo(hx + s, hz.y + hz.h);
        ctx.lineTo(hx + s + 4, hz.y);
        ctx.lineTo(hx + s + 8, hz.y + hz.h);
        ctx.fill();
      }
    } else if (hz.type === 'poison_cloud') {
      ctx.fillStyle = '#44aa2233';
      ctx.beginPath();
      ctx.arc(hx + hz.w / 2, hz.y, 15 + Math.sin(frame * 0.05) * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#66cc4422';
      ctx.beginPath();
      ctx.arc(hx + hz.w / 2 + 8, hz.y - 5, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============================================================
// DRAW PLATFORMS
// ============================================================
function drawPlatforms(stage) {
  for (var i = 0; i < platforms.length; i++) {
    var plat = platforms[i];
    if (plat.fallen) continue;
    var px = plat.x - scrollX;
    if (px + plat.w < -10 || px > GW + 10) continue;

    if (plat.conveyor) {
      ctx.fillStyle = '#555540';
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      ctx.fillStyle = '#aaaa44';
      var arrowOffset = (frame * plat.conveyorDir * 2) % 20;
      for (var ax = arrowOffset; ax < plat.w; ax += 20) {
        ctx.fillRect(px + ax, plat.y + 2, 8, 2);
      }
    } else if (plat.crumbling && plat.crumbleTimer > 0) {
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(px + Math.random() * 2, plat.y + Math.random() * 2, plat.w, plat.h);
    } else {
      ctx.fillStyle = stage.accent + '88';
      ctx.fillRect(px, plat.y, plat.w, plat.h);
      ctx.fillStyle = stage.accent;
      ctx.fillRect(px, plat.y, plat.w, 2);
    }
  }
}

// ============================================================
// DRAW BREAKABLE WALLS
// ============================================================
function drawBreakableWalls() {
  for (var i = 0; i < breakableWalls.length; i++) {
    var wall = breakableWalls[i];
    var wx = wall.x - scrollX;
    if (wx < -20 || wx > GW + 20) continue;

    // NES-style brick pattern
    ctx.fillStyle = '#886644';
    ctx.fillRect(wx, wall.y, wall.w, wall.h);
    ctx.strokeStyle = '#664422';
    ctx.lineWidth = 1;
    for (var by = wall.y; by < wall.y + wall.h; by += 10) {
      ctx.beginPath();
      ctx.moveTo(wx, by);
      ctx.lineTo(wx + wall.w, by);
      ctx.stroke();
    }
    // Crack
    ctx.strokeStyle = '#443322';
    ctx.beginPath();
    ctx.moveTo(wx + wall.w/2, wall.y + 5);
    ctx.lineTo(wx + wall.w/2 + 3, wall.y + wall.h/2);
    ctx.lineTo(wx + wall.w/2 - 2, wall.y + wall.h - 5);
    ctx.stroke();

    if (wall.hasPickup) {
      ctx.fillStyle = '#ffaa0022';
      ctx.fillRect(wx - 2, wall.y - 2, wall.w + 4, wall.h + 4);
      // Sparkle
      if (frame % 30 < 15) {
        ctx.fillStyle = '#ffaa0066';
        ctx.fillRect(wx + wall.w/2 - 1, wall.y + 3, 3, 3);
      }
    }
  }
}

// ============================================================
// DRAW PLAYER - NES-style Baseling with cybernetic fists
// ============================================================
function drawPlayer() {
  var p = player;
  var px = Math.round(p.x - scrollX);
  var py = Math.round(p.y);

  if (p.iframes > 0 && Math.floor(p.iframes * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px + p.w/2, py + p.h/2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, 0, 0, 30, { flipX: false, frame: frame })) {
  // Baseling body - use statB.color
  var bodyColor = statB.color;
  var darkBody = shadeColor(bodyColor, -30);

  // Spore cap (top)
  ctx.fillStyle = darkBody;
  ctx.fillRect(-7, -15, 14, 6);
  ctx.fillRect(-5, -17, 10, 4);

  // Head/body (round blob)
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-8, -9, 16, 14);
  ctx.fillRect(-6, -11, 12, 2);
  ctx.fillRect(-6, 5, 12, 2);

  // Eyes (NES pixel style)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(2, -7, 4, 4);
  ctx.fillStyle = '#111111';
  ctx.fillRect(3, -6, 2, 2);

  // Cybernetic arm
  ctx.fillStyle = '#888888';
  var armLen = p.punching ? 14 : 6;
  var armY = p.punching ? -2 : 1;
  ctx.fillRect(4, armY, armLen, 4);

  // Cybernetic fist
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(armLen + 2, armY - 2, 6, 6);

  if (p.punching) {
    // Fist energy glow
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(armLen, armY - 3, 10, 8);
    ctx.fillStyle = '#ffffff88';
    ctx.fillRect(armLen + 2, armY - 1, 6, 4);
  }

  // Legs (animated)
  var legOff = p.grounded ? Math.sin(p.animFrame * Math.PI / 2) * 3 : 2;
  ctx.fillStyle = darkBody;
  ctx.fillRect(-4, 7, 4, 5 + legOff);
  ctx.fillRect(2, 7, 4, 5 - legOff);

  // Shoes
  ctx.fillStyle = '#666666';
  ctx.fillRect(-5, 12 + legOff, 5, 3);
  ctx.fillRect(1, 12 - legOff, 5, 3);
  }

  ctx.restore();
}

// ============================================================
// DRAW BOT
// ============================================================
function drawBot() {
  var bot = player.bot;
  if (!bot) return;

  var px = player.x - scrollX + player.w/2;
  var py = player.y - 25;
  var bx = px + Math.cos(bot.angle) * 20;
  var by = py + Math.sin(bot.angle) * 12;

  // Bot body (NES pixel orb)
  ctx.fillStyle = bot.color;
  ctx.fillRect(bx - 5, by - 5, 10, 10);
  ctx.fillRect(bx - 3, by - 7, 6, 2);
  ctx.fillRect(bx - 3, by + 5, 6, 2);

  // Bot eye
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bx + player.facing * 2 - 1, by - 2, 3, 3);
  ctx.fillStyle = '#111';
  ctx.fillRect(bx + player.facing * 2, by - 1, 1, 1);

  // Bot trail
  ctx.fillStyle = bot.color + '44';
  for (var i = 1; i <= 3; i++) {
    var ta = bot.angle - i * 0.4;
    ctx.fillRect(px + Math.cos(ta) * 20 - 2 + i, py + Math.sin(ta) * 12 - 2, 4 - i, 4 - i);
  }

  // HP pips
  for (var h = 0; h < bot.maxHp; h++) {
    ctx.fillStyle = h < bot.hp ? bot.color : '#333333';
    ctx.fillRect(bx - bot.maxHp * 3 + h * 6, by - 12, 5, 3);
  }

  // Bot projectiles
  for (var j = 0; j < bot.projectiles.length; j++) {
    var bp = bot.projectiles[j];
    var bpx = bp.x - scrollX;
    ctx.fillStyle = bot.color;
    ctx.fillRect(bpx - 3, bp.y - 3, bp.explosive ? 8 : 6, bp.explosive ? 8 : 6);
    ctx.fillStyle = '#ffffff66';
    ctx.fillRect(bpx - 1, bp.y - 1, 3, 3);
  }
}

// ============================================================
// DRAW ENEMIES - NES pixel art Tasern creatures
// ============================================================
function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var ex = Math.round(e.x - scrollX);
    var ey = Math.round(e.y);
    if (ex + e.w < -30 || ex > GW + 30) continue;

    var alpha = e.dying ? Math.max(0, e.deathTimer / 0.6) : 1;
    if (alpha <= 0) continue;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(ex + e.w/2, ey + e.h/2);
    if (e.facing < 0) ctx.scale(-1, 1);

    var useColor = (e.stunTimer > 0 && Math.floor(e.stunTimer * 15) % 2 === 0) || e.flashTimer > 0 ? '#ffffff' : e.color;
    var useBody = (e.stunTimer > 0 && Math.floor(e.stunTimer * 15) % 2 === 0) || e.flashTimer > 0 ? '#dddddd' : e.bodyColor;

    if (e.isBoss) {
      drawBossSprite(e, useColor, useBody);
    } else if (e.flying) {
      // Mold Drone - flying spore with propeller
      ctx.fillStyle = useBody;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      ctx.fillStyle = useColor;
      ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, e.w - 4, e.h - 4);
      // Propeller
      var propW = 6 + Math.sin(frame * 0.5) * 4;
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(-propW, -e.h/2 - 3, propW * 2, 2);
      // Eye
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(2, -2, 3, 3);
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(3, -1, 1, 1);
    } else if (e.hasShield) {
      // Bark Shield - armored treant
      ctx.fillStyle = useBody;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Bark texture
      ctx.fillStyle = useColor;
      ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, e.w - 4, 6);
      ctx.fillRect(-e.w/2 + 2, e.h/2 - 8, e.w - 4, 6);
      // Shield (bark plate)
      ctx.fillStyle = '#66aa44';
      ctx.fillRect(e.w/2, -e.h/2 + 4, 5, e.h - 8);
      ctx.fillStyle = '#88cc66';
      ctx.fillRect(e.w/2 + 1, -e.h/2 + 6, 3, e.h - 12);
      // Face
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(2, -5, 4, 3);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(3, -4, 2, 1);
    } else if (e.canDash) {
      // Mycelium Ninja - thin, fast
      ctx.fillStyle = useBody;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      ctx.fillStyle = useColor;
      ctx.fillRect(-e.w/2 + 1, -e.h/2 + 1, e.w - 2, e.h - 2);
      // Scarf (mycelium strand)
      ctx.fillStyle = useColor + 'aa';
      ctx.fillRect(-e.w/2 - 8, -e.h/2 + 3, 8, 3);
      ctx.fillRect(-e.w/2 - 10, -e.h/2 + 5, 4, 2);
      // Eyes (narrow slit)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, -5, 5, 2);
    } else if (e.heavy) {
      // Fungal Tank - big mushroom bruiser
      ctx.fillStyle = useBody;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Cap
      ctx.fillStyle = useColor;
      ctx.fillRect(-e.w/2 - 2, -e.h/2, e.w + 4, 10);
      ctx.fillRect(-e.w/2 + 2, -e.h/2 - 4, e.w - 4, 6);
      // Spots on cap
      ctx.fillStyle = '#aaaa66';
      ctx.fillRect(-e.w/2 + 3, -e.h/2 + 2, 4, 4);
      ctx.fillRect(e.w/2 - 7, -e.h/2 + 3, 3, 3);
      // Face
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(2, -2, 4, 3);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(3, -1, 2, 1);
    } else {
      // Spore Grunt - basic soldier mushroom
      ctx.fillStyle = useBody;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      // Spore cap (helmet)
      ctx.fillStyle = useColor;
      ctx.fillRect(-e.w/2, -e.h/2, e.w, 8);
      ctx.fillRect(-e.w/2 - 1, -e.h/2 + 2, e.w + 2, 4);
      // Visor
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(2, -e.h/2 + 10, 4, 3);
      ctx.fillStyle = '#111111';
      ctx.fillRect(3, -e.h/2 + 11, 2, 1);
    }

    ctx.restore();
  }
}

function drawBossSprite(e, useColor, useBody) {
  // Big boss body
  ctx.fillStyle = useBody;
  ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);

  // Boss armor plates
  ctx.fillStyle = useColor;
  ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, e.w - 4, 8);
  ctx.fillRect(-e.w/2 + 2, e.h/2 - 10, e.w - 4, 8);
  ctx.fillRect(-e.w/2, -e.h/2 + 10, 4, e.h - 20);
  ctx.fillRect(e.w/2 - 4, -e.h/2 + 10, 4, e.h - 20);

  // Boss face region
  ctx.fillStyle = '#000000';
  ctx.fillRect(2, -e.h/4 - 4, e.w/2 - 6, 10);

  // Boss eye (pulsing)
  var eyeColor = Math.floor(frame * 0.1) % 2 === 0 ? '#ff0000' : '#ff4400';
  ctx.fillStyle = eyeColor;
  ctx.fillRect(4, -e.h/4, 6, 4);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(6, -e.h/4 + 1, 2, 2);

  // Boss health bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(-e.w/2, -e.h/2 - 8, e.w, 4);
  ctx.fillStyle = e.hp > e.maxHp * 0.3 ? '#ff4444' : '#ff0000';
  ctx.fillRect(-e.w/2, -e.h/2 - 8, e.w * (e.hp / e.maxHp), 4);

  // Boss crown/horns
  ctx.fillStyle = useColor;
  ctx.fillRect(-e.w/2 + 4, -e.h/2 - 4, 4, 6);
  ctx.fillRect(e.w/2 - 8, -e.h/2 - 4, 4, 6);

  // Boss name tag
  if (!e.dying) {
    ctx.fillStyle = '#ffffff66';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(e.name, 0, -e.h/2 - 12);
  }
}

// ============================================================
// DRAW PICKUPS - Tasern themed items
// ============================================================
function drawPickups() {
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    var px = pk.x - scrollX;
    var py = pk.y + Math.sin(pk.bobTimer * 4) * 3;
    if (px < -20 || px > GW + 20) continue;

    if (pk.timer < 2 && Math.floor(pk.timer * 5) % 2 === 0) continue;

    if (pk.type === 'health') {
      // Healing mushroom
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(px + 4, py + 4, 4, 8);
      ctx.fillStyle = '#66ff66';
      ctx.beginPath();
      ctx.arc(px + 6, py + 4, 5, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(px + 5, py + 1, 2, 2);
    } else if (pk.type === 'life') {
      // 1UP mushroom (golden)
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(px + 3, py + 5, 6, 7);
      ctx.beginPath();
      ctx.arc(px + 6, py + 5, 6, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('1UP', px + 6, py + 11);
    } else if (pk.type === 'spore_shield') {
      // Shield spore (glowing)
      ctx.fillStyle = '#44ddff';
      ctx.fillRect(px + 2, py + 2, 8, 8);
      ctx.fillStyle = '#88eeff';
      ctx.fillRect(px + 3, py + 3, 6, 6);
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(px + 4, py + 4, 4, 4);
      // Sparkle
      if (frame % 20 < 10) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(px + 5, py, 2, 2);
      }
    } else if (pk.type.startsWith('token_')) {
      var letter = pk.type.charAt(6);
      var colors = { A: '#ff4444', B: '#44ff44', G: '#ffaa00' };
      var symbols = { A: 'a', B: 'b', G: 'g' };
      // Token gem (NES diamond shape)
      ctx.fillStyle = colors[letter] || '#888888';
      ctx.beginPath();
      ctx.moveTo(px + 7, py);
      ctx.lineTo(px + 14, py + 7);
      ctx.lineTo(px + 7, py + 14);
      ctx.lineTo(px, py + 7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(px + 5, py + 3, 3, 3);
      // Letter
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(symbols[letter], px + 7, py + 10);
    }
  }
}

// ============================================================
// DRAW PROJECTILES
// ============================================================
function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var proj = projectiles[i];
    var px = proj.x - scrollX;
    var sz = proj.size || 4;
    // NES pixel projectile
    ctx.fillStyle = proj.color;
    ctx.fillRect(px - sz/2, proj.y - sz/2, sz, sz);
    // Glow ring
    ctx.fillStyle = proj.color + '33';
    ctx.fillRect(px - sz, proj.y - sz, sz * 2, sz * 2);
    // Trail
    ctx.fillStyle = proj.color + '22';
    ctx.fillRect(px - proj.vx * 0.02 - 2, proj.y - proj.vy * 0.02 - 2, 4, 4);
  }
}

// ============================================================
// DRAW PARTICLES
// ============================================================
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = Math.max(0, p.life / p.maxLife);
    var px = p.x - scrollX;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    var sz = p.size * alpha;
    ctx.fillRect(Math.round(px - sz/2), Math.round(p.y - sz/2), Math.ceil(sz), Math.ceil(sz));
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW SCORE POPUPS
// ============================================================
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = Math.max(0, sp.life / sp.maxLife);
    var spx = sp.x - scrollX;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, spx, sp.y);
    // Shadow for readability
    ctx.fillStyle = '#000000';
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillText(sp.text, spx + 1, sp.y + 1);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW GIMMICK OVERLAY
// ============================================================
function drawGimmickOverlay(stage) {
  if (stage.gimmick === 'water' && waterLevel < GH) {
    ctx.fillStyle = '#2244aa33';
    ctx.fillRect(0, waterLevel, GW, GH - waterLevel);
    ctx.fillStyle = '#4488ff44';
    ctx.fillRect(0, waterLevel, GW, 3);
    // Bubbles (NES circles)
    for (var i = 0; i < 5; i++) {
      var bx = (frame * 2 + i * 97) % GW;
      var by = waterLevel + 10 + Math.sin(frame * 0.05 + i) * 20;
      ctx.fillStyle = '#88ccff33';
      ctx.fillRect(bx - 2, by - 2, 4, 4);
    }
    // Surface shimmer
    ctx.fillStyle = '#88ccff11';
    for (var si = 0; si < GW; si += 16) {
      if ((si + frame) % 32 < 16) ctx.fillRect(si, waterLevel - 2, 8, 2);
    }
  }

  if (stage.gimmick === 'lava' && lavaLevel < GH) {
    ctx.fillStyle = '#ff220044';
    ctx.fillRect(0, lavaLevel, GW, GH - lavaLevel);
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(0, lavaLevel, GW, 3);
    // Lava glow
    ctx.fillStyle = '#ff880022';
    ctx.fillRect(0, lavaLevel - 20, GW, 20);
    // Lava bubbles
    for (var li = 0; li < 4; li++) {
      var lbx = (frame * 1.5 + li * 120) % GW;
      var lby = lavaLevel + 5 + Math.sin(frame * 0.08 + li) * 8;
      ctx.fillStyle = '#ffaa0066';
      ctx.fillRect(lbx, lby, 4, 4);
    }
  }

  if (stage.gimmick === 'wind') {
    ctx.strokeStyle = '#ffffff11';
    ctx.lineWidth = 1;
    for (var wi = 0; wi < 12; wi++) {
      var wx = ((frame * windDir * 5 + wi * 40) % GW + GW) % GW;
      var wy = 40 + wi * 20;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.lineTo(wx + windDir * 40, wy);
      ctx.stroke();
    }
    // Wind direction indicator
    ctx.fillStyle = '#ffffff22';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(windDir > 0 ? '>>>' : '<<<', GW/2, 30);
  }

  if (stage.gimmick === 'lowgrav') {
    for (var di = 0; di < 8; di++) {
      var dx = (frame * 0.3 + di * 60) % GW;
      var dy = 40 + Math.sin(frame * 0.02 + di * 2) * 100;
      ctx.fillStyle = '#44eeee18';
      ctx.fillRect(dx, dy, 3, 3);
    }
  }
}

// ============================================================
// DRAW HUD
// ============================================================
function drawHUD() {
  // Health bar with NES pixel border
  ctx.fillStyle = '#222222';
  ctx.fillRect(8, 8, 84, 14);
  ctx.fillStyle = '#333333';
  ctx.fillRect(10, 10, 80, 10);
  var hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : (hpRatio > 0.25 ? '#ffaa00' : '#ff4444');
  ctx.fillRect(10, 10, 80 * hpRatio, 10);
  // HP pips
  ctx.fillStyle = '#ffffff44';
  for (var hi = 1; hi < player.maxHp; hi++) {
    ctx.fillRect(10 + (80 / player.maxHp) * hi, 10, 1, 10);
  }
  ctx.strokeStyle = '#666666';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 10, 80, 10);

  // Lives
  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x' + lives, 95, 18);

  // Baseling icon next to HP
  ctx.fillStyle = statB.color;
  ctx.fillRect(2, 10, 5, 7);
  ctx.fillRect(1, 13, 7, 4);

  // Score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('SCORE: ' + score, GW - 10, 18);

  // Stage + baseling name
  ctx.textAlign = 'center';
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  var stageLabel = 'STAGE ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name;
  ctx.fillText(stageLabel, GW/2, 12);

  // Baseling name tag
  if (statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color + '88';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name, GW/2, 22);
  }

  // Token display
  if (player.tokens.length > 0) {
    ctx.fillStyle = '#222222cc';
    ctx.fillRect(10, 25, 60, 14);
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    var tokenColors = { A: '#ff4444', B: '#44ff44', G: '#ffaa00' };
    for (var ti = 0; ti < player.tokens.length; ti++) {
      ctx.fillStyle = tokenColors[player.tokens[ti]];
      ctx.fillText(player.tokens[ti], 14 + ti * 18, 36);
    }
    ctx.fillStyle = '#444444';
    for (var ti2 = player.tokens.length; ti2 < 3; ti2++) {
      ctx.fillText('?', 14 + ti2 * 18, 36);
    }
  }

  // Bot indicator
  if (player.bot) {
    ctx.fillStyle = '#222222cc';
    ctx.fillRect(GW - 100, 25, 90, 14);
    ctx.fillStyle = player.bot.color;
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(player.bot.name, GW - 12, 35);
    // Bot HP dots
    for (var bi = 0; bi < player.bot.maxHp; bi++) {
      ctx.fillStyle = bi < player.bot.hp ? player.bot.color : '#444444';
      ctx.fillRect(GW - 100 + bi * 6, 32, 4, 4);
    }
  }

  // Combo display
  if (player.comboCount >= 3) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(player.comboCount + 'x COMBO', GW / 2, GH - 30);
  }

  // Boss HP bar
  if (bossActive) {
    var boss = null;
    for (var ei = 0; ei < enemies.length; ei++) {
      if (enemies[ei].isBoss && !enemies[ei].dying) { boss = enemies[ei]; break; }
    }
    if (boss) {
      ctx.fillStyle = '#222222';
      ctx.fillRect(GW/2 - 82, GH - 22, 164, 12);
      ctx.fillStyle = '#333333';
      ctx.fillRect(GW/2 - 80, GH - 20, 160, 8);
      ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#ff4444' : '#ff0000';
      ctx.fillRect(GW/2 - 80, GH - 20, 160 * (boss.hp / boss.maxHp), 8);
      ctx.strokeStyle = '#666666';
      ctx.strokeRect(GW/2 - 80, GH - 20, 160, 8);
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(boss.name, GW/2, GH - 12);
    }
  }

  // Stat display (small, bottom-left)
  if (statB.level > 0) {
    ctx.fillStyle = '#ffffff44';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('LV' + statB.level, 10, GH - 8);
  }
}

// ============================================================
// DRAW TUTORIAL
// ============================================================
function drawTutorial() {
  if (tutorialTimer <= 0) return;
  var alpha = Math.min(1, tutorialTimer / 1.0);
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = '#000000';
  ctx.fillRect(GW/2 - 140, GH - 70, 280, 55);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = statB.color;
  ctx.lineWidth = 1;
  ctx.strokeRect(GW/2 - 140, GH - 70, 280, 55);
  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS: Move  |  SPACE/W: Jump', GW/2, GH - 53);
  ctx.fillText('Z/X: PUNCH  |  Punch to deflect!', GW/2, GH - 40);
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  ctx.fillText('Collect 3 spore gems for a garden bot', GW/2, GH - 25);
  ctx.globalAlpha = 1;
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }

  // Animated lines (NES scanline effect)
  for (var i = 0; i < 20; i++) {
    var x = (frame * 2 + i * 50) % (GW + 100) - 50;
    ctx.fillStyle = '#a855f708';
    ctx.fillRect(x, 0, 2, GH);
  }
  // Horizontal scanlines
  for (var sl = 0; sl < GH; sl += 4) {
    ctx.fillStyle = '#00000022';
    ctx.fillRect(0, sl, GW, 1);
  }

  // Title shadow
  ctx.fillStyle = '#2a0040';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHATTER', GW/2 + 2, GH/2 - 38);

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SHATTER', GW/2, GH/2 - 40);

  // Separator
  ctx.fillStyle = '#f4b41b';
  ctx.fillRect(GW/2 - 20, GH/2 - 28, 40, 4);

  ctx.fillStyle = '#1a3a1a';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('SPORE', GW/2 + 2, GH/2 + 2);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE', GW/2, GH/2);

  // Subtitle
  ctx.fillStyle = '#3cacd7';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Brawl', GW/2, GH/2 + 22);

  // Baseling preview — selected baseling sprite, falling back to the procedural draw.
  if (!TAS.drawBaseling(ctx, GW/2, GH/2 + 60, 40, { anim: 'idle', frame: frame })) {
    drawTitleBaseling(GW/2, GH/2 + 65);
  }

  // Selected baseling name + 5 ARCADE stat bars (Base-blue accents)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW/2, GH/2 + 92);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    var _bw = 38, _bx0 = GW/2 - (_keys.length * (_bw + 8)) / 2, _by = GH/2 + 102;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _bx0 + _i * (_bw + 8);
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _by);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _by + 3, _bw, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _by + 3, _bw * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // Instructions
  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  var blink = Math.floor(frame * 0.03) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 34);

  // Controls + [C] SELECT BASELING prompt
  ctx.fillStyle = '#444444';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS: Move | SPACE: Jump | Z/X: PUNCH', GW/2, GH - 20);
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW/2, GH - 8);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 20);
  }
}

function drawTitleBaseling(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = statB.color;
  ctx.fillRect(-10, -10, 20, 18);
  ctx.fillRect(-8, -14, 16, 6);
  ctx.fillRect(-8, 8, 16, 4);

  // Cap
  var darkCap = shadeColor(statB.color, -30);
  ctx.fillStyle = darkCap;
  ctx.fillRect(-8, -18, 16, 6);
  ctx.fillRect(-6, -20, 12, 4);

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(3, -8, 5, 5);
  ctx.fillRect(-7, -8, 5, 5);
  ctx.fillStyle = '#111';
  ctx.fillRect(5, -6, 2, 2);
  ctx.fillRect(-5, -6, 2, 2);

  // Left fist (cybernetic)
  var fistPulse = Math.sin(frame * 0.1) * 2;
  ctx.fillStyle = '#888888';
  ctx.fillRect(-22, -3, 10, 4);
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(-28 - fistPulse, -5, 8, 8);
  ctx.fillStyle = '#ffaa0088';
  ctx.fillRect(-30 - fistPulse, -7, 12, 12);

  // Right fist
  ctx.fillStyle = '#888888';
  ctx.fillRect(14, -3, 10, 4);
  ctx.fillStyle = '#cccccc';
  ctx.fillRect(22 + fistPulse, -5, 8, 8);
  ctx.fillStyle = '#ffaa0088';
  ctx.fillRect(20 + fistPulse, -7, 12, 12);

  ctx.restore();
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  // Scanlines
  for (var sl = 0; sl < GH; sl += 4) {
    ctx.fillStyle = '#e6482e08';
    ctx.fillRect(0, sl, GW, 1);
  }

  ctx.fillStyle = '#3a0a0a';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GW/2 + 2, GH/2 - 28);
  ctx.fillStyle = '#e6482e';
  ctx.fillText('GAME OVER', GW/2, GH/2 - 30);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH/2 + 10);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('NEW HIGH SCORE!', GW/2, GH/2 + 35);
  } else {
    ctx.fillStyle = '#888888';
    ctx.fillText('Best: ' + highScore, GW/2, GH/2 + 35);
  }

  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  ctx.fillText('Stage: ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name, GW/2, GH/2 + 60);

  if (statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color;
    ctx.fillText(statB.name + ' wilted in the garden', GW/2, GH/2 + 78);
  }

  if (deathTimer <= 0) {
    var blink = Math.floor(frame * 0.03) % 2 === 0;
    if (blink) {
      ctx.fillStyle = '#888888';
      ctx.fillText('PRESS ANY KEY', GW/2, GH - 30);
    }
  }
}

// ============================================================
// VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  for (var i = 0; i < 25; i++) {
    var cx = (frame * 1.5 + i * 48) % GW;
    var cy = (frame * 0.8 + i * 37) % GH;
    ctx.fillStyle = [statB.color,'#38d973','#a855f7','#f4b41b','#3cacd7'][i % 5] + '66';
    ctx.fillRect(cx, cy, 4, 4);
  }

  ctx.fillStyle = '#1a3a1a';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GW/2 + 2, GH/2 - 38);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('VICTORY!', GW/2, GH/2 - 40);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('The spore regime has fallen!', GW/2, GH/2);
  ctx.fillText('Final Score: ' + score, GW/2, GH/2 + 25);

  if (statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color;
    ctx.fillText(statB.name + ' conquered the garden!', GW/2, GH/2 + 48);
  }

  drawTitleBaseling(GW/2, GH/2 + 85);

  ctx.fillStyle = '#666666';
  ctx.font = '10px monospace';
  var blink = Math.floor(frame * 0.03) % 2 === 0;
  if (blink) ctx.fillText('PRESS ANY KEY', GW/2, GH - 20);
}

// ============================================================
// STAGE INTRO
// ============================================================
function drawStageIntro() {
  var stage = STAGES[stageNum];
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, GW, GH);

  // Stage border (NES style double border)
  ctx.strokeStyle = stage.accent + '44';
  ctx.lineWidth = 2;
  ctx.strokeRect(GW/2 - 124, GH/2 - 44, 248, 88);
  ctx.strokeStyle = stage.accent;
  ctx.lineWidth = 1;
  ctx.strokeRect(GW/2 - 120, GH/2 - 40, 240, 80);

  ctx.fillStyle = stage.accent;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stageNum + 1), GW/2, GH/2 - 18);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(stage.name, GW/2, GH/2 + 8);

  // Gimmick hints (Tasern themed)
  var hints = {
    conveyor: 'Beware the POOP-fueled conveyors!',
    water: 'Tides rise in the sunken gardens',
    vines: 'Mycelial platforms may crumble!',
    wind: 'Spore gusts blow your baseling around',
    lava: 'Keep your baseling above the ember flow!',
    lowgrav: 'Void gravity weakens your baseling here',
    mixed: 'The fungal regime ends here!'
  };
  ctx.fillStyle = '#888888';
  ctx.font = '9px monospace';
  ctx.fillText(hints[stage.gimmick] || '', GW/2, GH/2 + 28);

  // Baseling ready message
  if (statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color + '88';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name + ' READY', GW/2, GH/2 + 42);
  }
}

// ============================================================
// COLOR UTILITY
// ============================================================
function shadeColor(hex, amt) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = Math.max(0, Math.min(255, parseInt(hex.substring(0,2), 16) + amt));
  var g = Math.max(0, Math.min(255, parseInt(hex.substring(2,4), 16) + amt));
  var b = Math.max(0, Math.min(255, parseInt(hex.substring(4,6), 16) + amt));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ============================================================
// GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
