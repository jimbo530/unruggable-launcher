<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --border: #1e1e2e;
  --text: #e0e0e0;
  --muted: #666;
  --accent: #c9a84c;
  --neon-blue: #00d4ff;
  --neon-purple: #a855f7;
  --neon-green: #22c55e;
  --neon-pink: #ff3e9d;
  --neon-orange: #ff8c00;
  --neon-red: #ef4444;
  --neon-yellow: #fbbf24;
  --neon-cyan: #06b6d4;
  --neon-lime: #84cc16;
  --neon-indigo: #6366f1;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 10000;
}

/* Header */
.header {
  text-align: center;
  padding: 60px 20px 30px;
  position: relative;
}

.header::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.arcade-title {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow:
    0 0 10px rgba(201,168,76,0.6),
    0 0 20px rgba(201,168,76,0.4),
    0 0 40px rgba(201,168,76,0.2),
    0 0 80px rgba(201,168,76,0.1);
  animation: glow 3s ease-in-out infinite alternate;
  margin-bottom: 8px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px rgba(201,168,76,0.6), 0 0 20px rgba(201,168,76,0.4), 0 0 40px rgba(201,168,76,0.2); }
  to { text-shadow: 0 0 15px rgba(201,168,76,0.8), 0 0 30px rgba(201,168,76,0.6), 0 0 60px rgba(201,168,76,0.3), 0 0 100px rgba(201,168,76,0.15); }
}

.subtitle {
  font-size: clamp(0.7rem, 2vw, 1rem);
  color: var(--muted);
  letter-spacing: 0.3em;
  margin-bottom: 24px;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  padding: 12px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: inline-flex;
  margin: 0 auto;
}

.stat-item {
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.stat-item span {
  color: var(--accent);
  font-weight: 700;
}

/* Controls */
.controls {
  max-width: 1400px;
  margin: 30px auto 20px;
  padding: 0 20px;
}

.search-row {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
  min-width: 200px;
  padding: 12px 16px 12px 40px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-box:focus {
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(201,168,76,0.2);
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 0.9rem;
  pointer-events: none;
}

.sort-select {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 0.8rem;
  cursor: pointer;
  outline: none;
}

.sort-select:focus {
  border-color: var(--accent);
}

.back-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.back-link:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* Genre Tabs */
.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.tab {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.tab:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.tab.active {
  background: rgba(201,168,76,0.12);
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 8px rgba(201,168,76,0.15);
}

.results-count {
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  padding: 8px 0;
}

/* Game Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

/* Game Card */
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  display: block;
}

.game-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent, var(--accent));
  opacity: 0.6;
  transition: opacity 0.25s;
}

.game-card:hover {
  transform: translateY(-3px) scale(1.01);
  border-color: var(--card-accent, var(--accent));
  box-shadow:
    0 8px 30px rgba(0,0,0,0.4),
    0 0 15px color-mix(in srgb, var(--card-accent, var(--accent)) 20%, transparent);
}

.game-card:hover::before {
  opacity: 1;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
}

.game-name {
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: var(--text);
  line-height: 1.3;
}

.fav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1.1rem;
  padding: 2px 4px;
  transition: transform 0.2s;
  opacity: 0.3;
}

.fav-btn:hover {
  transform: scale(1.3);
  opacity: 0.7;
}

.fav-btn.active {
  opacity: 1;
}

.genre-badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
  color: var(--card-accent, var(--accent));
  background: color-mix(in srgb, var(--card-accent, var(--accent)) 12%, transparent);
  border: 1px solid color-mix(in srgb, var(--card-accent, var(--accent)) 30%, transparent);
}

.game-desc {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.5;
  letter-spacing: 0.03em;
}

.play-hint {
  position: absolute;
  bottom: 12px;
  right: 16px;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  opacity: 0;
  transition: opacity 0.25s;
}

.game-card:hover .play-hint {
  opacity: 1;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  grid-column: 1 / -1;
}

.empty-state p {
  color: var(--muted);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
}

/* Footer */
.footer {
  text-align: center;
  padding: 40px 20px;
  border-top: 1px solid var(--border);
  max-width: 1400px;
  margin: 0 auto;
}

.footer p {
  color: var(--muted);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

/* Mobile */
@media (max-width: 768px) {
  .header { padding: 40px 16px 20px; }
  .stats-bar { gap: 12px; }
  .stat-item { font-size: 0.65rem; }
  .game-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 12px 40px; }
  .game-card { padding: 14px; }
  .game-name { font-size: 0.8rem; }
  .controls { padding: 0 12px; }
  .tabs { gap: 4px; }
  .tab { padding: 6px 10px; font-size: 0.6rem; }
}

@media (max-width: 480px) {
  .game-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .game-card { padding: 12px; }
  .game-name { font-size: 0.75rem; }
  .game-desc { font-size: 0.65rem; }
}

/* Animation for cards appearing */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.game-card {
  animation: cardIn 0.3s ease forwards;
}

const CATEGORIES = ['ALL', 'Action/Platformer', 'Puzzle', 'RPG/Adventure', 'Racing', 'Sports', 'Shooter', 'Strategy', 'Fighting', 'Arcade/Action', 'Unique/Other'];

// State
let currentGenre = 'ALL';
let searchTerm = '';
let sortMode = 'az';
let favorites = JSON.parse(localStorage.getItem('tasern-arcade-favs') || '[]');
let showFavoritesOnly = false;

// Build tabs
function buildTabs() {
  const tabsEl = document.getElementById('tabs');
  let html = '';

  // Favorites tab
  html += `<button class="tab ${showFavoritesOnly ? 'active' : ''}" data-genre="FAVORITES" style="border-color: ${showFavoritesOnly ? '#fbbf24' : ''}; color: ${showFavoritesOnly ? '#fbbf24' : ''};">&#9733; FAVS (${favorites.length})</button>`;

  CATEGORIES.forEach(cat => {
    const isActive = !showFavoritesOnly && currentGenre === cat;
    const color = cat === 'ALL' ? 'var(--accent)' : (GENRE_COLORS[cat] || 'var(--accent)');
    html += `<button class="tab ${isActive ? 'active' : ''}" data-genre="${cat}" style="${isActive ? `border-color:${color};color:${color};background:color-mix(in srgb, ${color} 10%, transparent)` : ''}">${cat}</button>`;
  });

  tabsEl.innerHTML = html;

  tabsEl.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const genre = btn.dataset.genre;
      if (genre === 'FAVORITES') {
        showFavoritesOnly = !showFavoritesOnly;
        if (showFavoritesOnly) currentGenre = 'ALL';
      } else {
        showFavoritesOnly = false;
        currentGenre = genre;
      }
      buildTabs();
      renderGrid();
    });
  });
}

// Filter and sort games
function getFilteredGames() {
  let filtered = GAMES.slice();

  // Genre filter
  if (currentGenre !== 'ALL') {
    filtered = filtered.filter(g => g.genre === currentGenre);
  }

  // Search filter
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    filtered = filtered.filter(g =>
      g.name.toLowerCase().includes(term) ||
      g.genre.toLowerCase().includes(term) ||
      g.desc.toLowerCase().includes(term)
    );
  }

  // Favorites filter
  if (showFavoritesOnly) {
    filtered = filtered.filter(g => favorites.includes(g.file));
  }

  // Sort
  switch (sortMode) {
    case 'az':
      filtered.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'za':
      filtered.sort((a, b) => b.name.localeCompare(a.name));
      break;
    case 'genre':
      filtered.sort((a, b) => a.genre.localeCompare(b.genre) || a.name.localeCompare(b.name));
      break;
  }

  return filtered;
}

// Toggle favorite
function toggleFavorite(file, e) {
  e.preventDefault();
  e.stopPropagation();
  const idx = favorites.indexOf(file);
  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push(file);
  }
  localStorage.setItem('tasern-arcade-favs', JSON.stringify(favorites));
  buildTabs();
  renderGrid();
}

// Render game grid
function renderGrid() {
  const grid = document.getElementById('gameGrid');
  const filtered = getFilteredGames();
  const countEl = document.getElementById('resultsCount');

  countEl.textContent = `Showing ${filtered.length} of 100 games`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No games found matching your criteria.</p></div>';
    return;
  }

  let html = '';
  filtered.forEach((game, i) => {
    const color = GENRE_COLORS[game.genre] || 'var(--accent)';
    const isFav = favorites.includes(game.file);
    const delay = Math.min(i * 30, 600);

    html += `
      <a href="${game.file}" class="game-card" style="--card-accent: ${color}; animation-delay: ${delay}ms; opacity: 0;">
        <div class="card-top">
          <div class="game-name">${game.name}</div>
          <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${game.file}', event)" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">
            ${isFav ? '&#9733;' : '&#9734;'}
          </button>
        </div>
        <div class="genre-badge">${game.genre}</div>
        <div class="game-desc">${game.desc}</div>
        <div class="play-hint">PLAY &#8594;</div>
      </a>
    `;
  });

  grid.innerHTML = html;
}

// Event listeners
document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim();
  renderGrid();
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
  sortMode = e.target.value;
  renderGrid();
});

// Init
buildTabs();
renderGrid();
