<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Dodgeball</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === BASELING STATS (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// WAGER game -> TAS.player.mults({ pvp:true }) (tight 0.95–1.10 fairness band). This brawler's
// many statB.*/derived-const reads are kept working by synthesizing the high-level + D&D stat
// fields from the clamped mults (option b in REMASTER-GUIDE) in recomputeStats(), and the
// stat-derived constants are reassignable so a title-screen pick takes effect. Brawler wiring:
// walk speed<-moveSpeed, HP/stamina<-health, throw power<-damage, drops/luck<-luck. No water.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[super-dodge] NftLoader display info failed:', e && e.message); }

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'THROW', b: 'SWAP', c: 'PICK' } });

const COURT_LEFT = 20;
const COURT_RIGHT = 460;
const COURT_TOP = 100;
const COURT_BOTTOM = 280;
const COURT_MID = 240;
const GROUND_Y = 260;
const GRAVITY = 1400;
const BALL_SPEED = 280;
const SUPER_SPEED = 380;
const SAVE_KEY = 'sdodge';
var PLAYER_COLOR = statB.color;                            // baseling color (display)
var PLAYER_NAME = statB.name;                              // baseling name (display)
var PLAYER_ICON = statB.icon;                              // baseling icon (display)
// Stat-derived constants — assigned in recomputeStats() from the clamped mults.
var CATCH_WINDOW, CHARGE_TIME, SPRINT_DRAIN, SPRINT_REGEN, MAX_STAMINA, EXTRA_LIVES;

// Map a clamped mult to the 1–20 D&D scale centered on 10 (neutral = mult 1.0).
function dndFromMult(m) { return Math.max(1, Math.min(20, Math.round(10 + (m - 1) * 50))); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults({ pvp: true }) : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dndFromMult(m.damage);  statB.dex = dndFromMult(m.moveSpeed); statB.con = dndFromMult(m.health);
  statB.int = dndFromMult(m.luck);    statB.wis = dndFromMult(m.luck);      statB.cha = dndFromMult(m.luck);
  statB.damage = m.damage;     // throw power / ball damage
  statB.speed = m.moveSpeed;   // ball velocity / move pace
  statB.hpMult = m.health;     // team HP
  statB.scoreMult = m.luck;    // score bias folded into luck (not a 6th stat)
  statB.cooldown = 1 / m.moveSpeed; // super-charge cadence (faster pet = quicker)
  statB.luck = m.luck;         // lucky-dodge bias
  statB.lives = 0; // FLAT in wager play — no discrete advantages (#24 ruling)
  CATCH_WINDOW = 8 + Math.floor(statB.dex / 5);
  CHARGE_TIME  = Math.max(20, 60 - Math.floor(statB.int / 3));
  SPRINT_DRAIN = Math.max(10, 30 - Math.floor(statB.dex / 4));
  SPRINT_REGEN = 15 + Math.floor(statB.con / 4);
  MAX_STAMINA  = 100 + Math.floor(statB.con * 2);
  EXTRA_LIVES  = statB.lives;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level);
             PLAYER_NAME = statB.name; }
}
recomputeStats();

var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[super-dodge] player init failed:', e && e.message); });
}

// === TEAMS (Garden Arenas) ===
const TEAMS = [
  { name: "Spore Squad", district: "Nursery Patch", colors: ['#38d973', '#1a7a3a', '#6fffaa'], super: 'thunder', aggro: 0.3, react: 18, taunt: 'Fresh from the soil!' },
  { name: "Mold Mashers", district: "Compost Heap", colors: ['#f4b41b', '#8a6510', '#ffd966'], super: 'curve', aggro: 0.4, react: 16, taunt: 'Everything decomposes!' },
  { name: "Fungi Fighters", district: "The Underspore", colors: ['#a855f7', '#5c2d91', '#cc88ff'], super: 'shadow', aggro: 0.5, react: 14, taunt: 'You cannot hit what grows in the dark...' },
  { name: "Garden Golems", district: "Mycelium Grove", colors: ['#3cacd7', '#1d6680', '#6fd4f7'], super: 'rocket', aggro: 0.5, react: 13, taunt: 'The network grows!' },
  { name: "Poop Slingers", district: "Hauler Yard", colors: ['#7a444a', '#4a2228', '#b06a72'], super: 'bomb', aggro: 0.6, react: 11, taunt: 'Eat fertilizer!' },
  { name: "Cap Crushers", district: "Mushroom Spire", colors: ['#3cacd7', '#1d5599', '#88ccee'], super: 'thunder', aggro: 0.65, react: 10, taunt: 'The canopy sees all!' },
  { name: "Root Reapers", district: "Dead Garden", colors: ['#2a2030', '#111111', '#555555'], super: 'shadow', aggro: 0.7, react: 8, taunt: 'Roots pull you under...' },
  { name: "Ember Bloom", district: "Volcanic Bed", colors: ['#e6482e', '#aa2200', '#ff8844'], super: 'fire', aggro: 0.8, react: 6, taunt: 'Burn and regrow stronger!', isBoss: true }
];

const PLAYER_TEAM_IDX = 0;

// === SUPER THROW TYPES ===
const SUPER_TYPES = ['thunder', 'fire', 'shadow', 'bomb', 'curve', 'rocket'];

// === POWER-UPS (Garden shop between matches) ===
const POWERUPS = [
  { name: 'Mycelium Runners', cost: 30, stat: 'speed', amount: 15, desc: '+15 Speed' },
  { name: 'Bark Shield Spore', cost: 40, stat: 'defense', amount: 5, desc: '+5 Defense' },
  { name: 'POOP Catalyst', cost: 50, stat: 'charge', amount: 8, desc: 'Faster charge' },
  { name: 'Garden Seed Tonic', cost: 25, stat: 'stamina', amount: 15, desc: '+15 Stamina' },
  { name: 'Compost Gauntlet', cost: 45, stat: 'power', amount: 8, desc: '+8 Throw power' },
  { name: 'Healer Moss', cost: 20, stat: 'heal', amount: 30, desc: 'Heal 30 HP' }
];

// === COURT HAZARDS ===
const HAZARD_TYPES = [
  { name: 'fire_trap', color: '#e6482e', radius: 15, damage: 5, duration: 3, spawnChance: 0.003 },
  { name: 'ice_patch', color: '#3cacd7', radius: 20, damage: 0, duration: 5, spawnChance: 0.002 },
  { name: 'spore_cloud', color: '#38d973', radius: 18, damage: 3, duration: 4, spawnChance: 0.002 },
  { name: 'shadow_rift', color: '#a855f7', radius: 12, damage: 8, duration: 2, spawnChance: 0.001 }
];

// === ITEM DROPS ===
const ITEM_TYPES = [
  { name: 'Healer Spore', color: '#e6482e', effect: 'heal', amount: 20, icon: '+' },
  { name: 'Speed Seed', color: '#3cacd7', effect: 'speedBoost', amount: 60, icon: 'S' },
  { name: 'POOP Token', color: '#f4b41b', effect: 'powerBoost', amount: 30, icon: 'P' },
  { name: 'Spore Gem', color: '#38d973', effect: 'shield', amount: 90, icon: 'D' }
];

// === CHARACTER TEMPLATES ===
// Player baseling uses statB: STR=power, DEX=speed, CON=hp, INT=charge, WIS=luck, CHA=team morale
const CHAR_TEMPLATES = [
  { name: PLAYER_NAME, super: 'thunder', hp: Math.floor(80 * statB.hpMult + statB.con * 2), speed: 130 + Math.floor(statB.dex * 1.5), power: Math.floor(20 * statB.damage + statB.str), color: 0, isBaseling: true },
  { name: 'Tank', super: 'bomb', hp: 120, speed: 90, power: 25, color: 1, isBaseling: false },
  { name: 'Scout', super: 'rocket', hp: 70, speed: 160, power: 15, color: 2, isBaseling: false },
  { name: 'Trickster', super: 'shadow', hp: 75, speed: 140, power: 18, color: 0, isBaseling: false },
  { name: 'Blaze', super: 'fire', hp: 85, speed: 120, power: 22, color: 1, isBaseling: false },
  { name: 'Bender', super: 'curve', hp: 90, speed: 110, power: 20, color: 2, isBaseling: false }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let score = 0;
let highScore = TAS.score.load(SAVE_KEY + '_hi') || 0;
let tournamentRound = 0;
let tokens = 0;
let playerTeam = [];
let enemyTeam = [];
let balls = [];
let particles = [];
let controlledIdx = 0;
let matchResult = '';
let slowMo = 0;
let slowMoTimer = 0;
let screenShake = 0;
let shakeX = 0, shakeY = 0;
let flashAlpha = 0;
let shopOpen = false;
let shopCursor = 0;
let matchIntro = 0;
let matchIntroText = '';
let playerStats = { speed: 0, defense: 0, charge: 0, stamina: 0, power: 0 };
let catchFlash = 0;
let catchText = '';
let aiThrowCooldown = 0;
let extraLives = EXTRA_LIVES;                  // statB.lives: revives in tournament
let scorePopups = [];                          // floating score/text popups
let dodgeStreak = 0;                           // WIS: consecutive dodges increase luck
let teamMorale = Math.floor(statB.cha / 3);   // CHA: teammate effectiveness boost
let luckyDodgeChance = 0.02 * statB.luck + statB.wis * 0.005; // WIS+luck: auto-dodge chance
let hazards = [];                              // court hazards
let items = [];                                // item drops on court
let itemEffects = { speedBoost: 0, powerBoost: 0, shield: 0 }; // active item buffs
let bossMode = false;                          // final boss has special mechanics
let bossRage = 0;                              // boss rage meter
let showTutorial = true;                       // first-match tutorial

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// === CHARACTER FACTORY ===
function createChar(template, teamIdx, side, slot) {
  const team = TEAMS[teamIdx];
  const baseX = side === 'left' ? COURT_LEFT + 40 + slot * 60 : COURT_MID + 40 + slot * 60;
  // CHA morale boost for player teammates (not the baseling itself)
  const moraleSpd = (side === 'left' && !template.isBaseling) ? teamMorale * 3 : 0;
  const moralePow = (side === 'left' && !template.isBaseling) ? teamMorale * 2 : 0;
  return {
    x: baseX,
    y: GROUND_Y,
    vx: 0, vy: 0,
    w: 16, h: 28,
    hp: template.hp,
    maxHp: template.hp,
    speed: template.speed + moraleSpd,
    power: template.power + moralePow,
    super: template.super,
    chargeFrames: 0,
    stamina: MAX_STAMINA + playerStats.stamina,
    maxStamina: MAX_STAMINA + playerStats.stamina,
    alive: true,
    side: side,
    slot: slot,
    team: teamIdx,
    colorIdx: template.color,
    name: template.name,
    isBaseling: template.isBaseling || false,
    state: 'idle',
    stateTimer: 0,
    hasBall: false,
    invuln: 0,
    stunTimer: 0,
    jumpCooldown: 0,
    facing: side === 'left' ? 1 : -1,
    aiTarget: null,
    aiTimer: 0,
    sprinting: false,
    throwDir: { x: 0, y: 0 }
  };
}

// === BALL FACTORY ===
function createBall(x, y) {
  return {
    x: x, y: y,
    vx: 0, vy: 0,
    radius: 5,
    active: true,
    thrown: false,
    superType: null,
    thrower: null,
    damage: 0,
    trailParticles: [],
    visible: true,
    invisTimer: 0,
    splitDone: false,
    homingTarget: null,
    bounced: false,
    grounded: false,
    catchable: true
  };
}

// === PARTICLE SYSTEM ===
function spawnParticle(x, y, vx, vy, color, life, size) {
  if (particles.length > 200) particles.shift();
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 3 });
}

function spawnExplosion(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + rnd(-0.2, 0.2);
    const spd = rnd(speed * 0.5, speed * 1.5);
    spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, color, rnd(0.3, 0.8), rnd(2, 5));
  }
}

function spawnTrail(x, y, color) {
  spawnParticle(x, y, rnd(-10, 10), rnd(-20, 5), color, rnd(0.2, 0.5), rnd(2, 4));
}

// === MATCH INITIALIZATION ===
function initMatch(enemyIdx) {
  const pTemplates = [CHAR_TEMPLATES[0], CHAR_TEMPLATES[1], CHAR_TEMPLATES[2]];
  const eBase = enemyIdx % CHAR_TEMPLATES.length;
  const eTemplates = [
    CHAR_TEMPLATES[eBase],
    CHAR_TEMPLATES[(eBase + 1) % CHAR_TEMPLATES.length],
    CHAR_TEMPLATES[(eBase + 2) % CHAR_TEMPLATES.length]
  ];

  playerTeam = pTemplates.map((t, i) => {
    const c = createChar(t, PLAYER_TEAM_IDX, 'left', i);
    c.speed += playerStats.speed;
    c.power += playerStats.power;
    c.hp += playerStats.defense * 2;
    c.maxHp = c.hp;
    c.maxStamina += playerStats.stamina;
    c.stamina = c.maxStamina;
    return c;
  });

  enemyTeam = eTemplates.map((t, i) => {
    const c = createChar(t, enemyIdx, 'right', i);
    const diff = enemyIdx * 0.12;
    c.speed *= (1 + diff);
    c.power *= (1 + diff * 0.5);
    c.hp = Math.floor(c.hp * (1 + diff * 0.3));
    c.maxHp = c.hp;
    return c;
  });

  balls = [createBall(GW / 2, GROUND_Y - 10)];
  controlledIdx = 0;
  matchResult = '';
  aiThrowCooldown = 0;
  particles = [];
  hazards = [];
  items = [];
  itemEffects = { speedBoost: 0, powerBoost: 0, shield: 0 };
  slowMo = 0;
  screenShake = 0;
  bossMode = TEAMS[enemyIdx].isBoss || false;
  bossRage = 0;
  matchIntro = 120;
  matchIntroText = 'VS ' + TEAMS[enemyIdx].name.toUpperCase();
  if (bossMode) matchIntroText = 'ALPHA BLOOM: ' + TEAMS[enemyIdx].name.toUpperCase();
}

// === TOURNAMENT START ===
function startTournament() {
  state = 'playing';
  tournamentRound = 0;
  score = 0;
  tokens = 50 + statB.level * 5;            // level: more starting spore gems
  extraLives = EXTRA_LIVES;                   // reset revives
  dodgeStreak = 0;
  playerStats = { speed: 0, defense: 0, charge: 0, stamina: 0, power: 0 };
  initMatch(1);
}

// === INPUT HANDLING (NES: Z=A/Throw, X=B/Swap, C=Select/Sprint) ===
function getInput() {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  const gp = TAS.input.gamepad;
  return {
    left: keys['ArrowLeft'] || touch.left || (gp && gp.left),
    right: keys['ArrowRight'] || touch.right || (gp && gp.right),
    up: keys['ArrowUp'] || touch.up || (gp && gp.up),
    down: keys['ArrowDown'] || touch.down || (gp && gp.down),
    fire: keys['KeyZ'] || keys['Space'] || touch.a || (gp && gp.a),
    swap: keys['KeyX'] || keys['ShiftLeft'] || touch.b || (gp && gp.b),
    sprint: keys['KeyC'] || keys['ShiftRight'] || touch.c || (gp && gp.select)
  };
}

let prevFire = false;
let prevSwap = false;
let fireHeld = 0;

// === GAME UPDATE ===
function update(dt) {
  frame++;

  if (flashAlpha > 0) flashAlpha -= dt * 4;
  if (screenShake > 0) {
    screenShake -= dt * 8;
    shakeX = rnd(-screenShake * 3, screenShake * 3);
    shakeY = rnd(-screenShake * 2, screenShake * 2);
  } else { shakeX = 0; shakeY = 0; }
  if (catchFlash > 0) catchFlash -= dt * 3;
  if (slowMoTimer > 0) { slowMoTimer -= dt; if (slowMoTimer <= 0) slowMo = 0; }

  const effectiveDt = slowMo > 0 ? dt * 0.25 : dt;

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * effectiveDt;
    p.y += p.vy * effectiveDt;
    p.vy += 200 * effectiveDt;
    p.life -= effectiveDt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 40 * effectiveDt;
    scorePopups[i].life -= effectiveDt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume (C is in-game sprint, picker only on title)
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    const inp = getInput();
    if (inp.fire && !prevFire) {
      TAS.audio.playTone(440, 0.1, 'square', 0.15);
      startTournament();
    }
    prevFire = inp.fire;
    return;
  }

  if (state === 'gameOver') {
    const inp = getInput();
    if (inp.fire && !prevFire) { state = 'title'; }
    prevFire = inp.fire;
    return;
  }

  if (state === 'victory') {
    const inp = getInput();
    if (inp.fire && !prevFire) { state = 'title'; }
    prevFire = inp.fire;
    return;
  }

  if (state === 'shop') {
    updateShop();
    return;
  }

  if (state === 'matchEnd') {
    const inp = getInput();
    if (inp.fire && !prevFire) {
      if (matchResult === 'win') {
        tournamentRound++;
        tokens += 30 + tournamentRound * 10;
        if (tournamentRound >= 7) {
          state = 'victory';
          score += Math.floor(5000 * statB.scoreMult);
          if (score > highScore) { highScore = score; TAS.score.save(SAVE_KEY + '_hi', highScore); }
        } else {
          state = 'shop';
          shopCursor = 0;
        }
      } else {
        state = 'gameOver';
        if (score > highScore) { highScore = score; TAS.score.save(SAVE_KEY + '_hi', highScore); }
      }
    }
    prevFire = inp.fire;
    return;
  }

  if (state === 'playing') {
    if (matchIntro > 0) { matchIntro--; return; }
    updatePlaying(effectiveDt);
  }
}

// === SHOP UPDATE ===
function updateShop() {
  const inp = getInput();

  if (inp.up && !prevFire) {
    shopCursor = (shopCursor - 1 + POWERUPS.length + 1) % (POWERUPS.length + 1);
    TAS.audio.playTone(330, 0.05, 'square', 0.1);
  }
  if (inp.down && !prevSwap) {
    shopCursor = (shopCursor + 1) % (POWERUPS.length + 1);
    TAS.audio.playTone(330, 0.05, 'square', 0.1);
  }

  if (inp.fire && !prevFire) {
    if (shopCursor === POWERUPS.length) {
      // Continue
      TAS.audio.playTone(550, 0.15, 'square', 0.15);
      const nextEnemy = tournamentRound + 1;
      if (nextEnemy < TEAMS.length) {
        state = 'playing';
        initMatch(nextEnemy);
      }
    } else {
      const item = POWERUPS[shopCursor];
      if (tokens >= item.cost) {
        tokens -= item.cost;
        if (item.stat === 'heal') {
          // Will heal at match start
        } else {
          playerStats[item.stat] += item.amount;
        }
        TAS.audio.playTone(660, 0.15, 'sine', 0.15);
        spawnExplosion(GW / 2, GH / 2, '#ffdd44', 8, 80);
      } else {
        TAS.audio.playTone(110, 0.2, 'square', 0.1);
      }
    }
  }

  prevFire = inp.fire;
  prevSwap = inp.down || inp.up;
}

// === MAIN GAMEPLAY ===
function updatePlaying(dt) {
  const inp = getInput();
  const controlled = playerTeam[controlledIdx];

  // Handle swap
  if (inp.swap && !prevSwap && controlled) {
    let nearest = null;
    let nearDist = Infinity;
    for (let i = 0; i < playerTeam.length; i++) {
      if (i !== controlledIdx && playerTeam[i].alive) {
        const d = dist(controlled, playerTeam[i]);
        if (d < nearDist) { nearDist = d; nearest = i; }
      }
    }
    if (nearest !== null) {
      controlledIdx = nearest;
      TAS.audio.playTone(440, 0.05, 'triangle', 0.1);
    }
  }
  prevSwap = inp.swap;

  // Update controlled player
  if (controlled && controlled.alive && controlled.stunTimer <= 0) {
    updateControlledPlayer(controlled, inp, dt);
  }

  // Fire hold for charging
  if (inp.fire) {
    fireHeld++;
  } else {
    if (fireHeld > 0 && controlled && controlled.alive && controlled.hasBall) {
      throwBall(controlled, inp, fireHeld);
    }
    fireHeld = 0;
  }
  prevFire = inp.fire;

  // Update all characters
  updateAllChars(dt);

  // AI for player teammates
  for (let i = 0; i < playerTeam.length; i++) {
    if (i !== controlledIdx && playerTeam[i].alive) {
      updateTeammateAI(playerTeam[i], dt);
    }
  }

  // AI for enemies
  aiThrowCooldown -= dt;
  for (let i = 0; i < enemyTeam.length; i++) {
    if (enemyTeam[i].alive) {
      updateEnemyAI(enemyTeam[i], i, dt);
    }
  }

  // Update balls
  updateBalls(dt);

  // Update hazards
  updateHazards(dt);

  // Update items
  updateItems(dt);

  // Update item buff timers
  if (itemEffects.speedBoost > 0) itemEffects.speedBoost -= dt;
  if (itemEffects.powerBoost > 0) itemEffects.powerBoost -= dt;
  if (itemEffects.shield > 0) itemEffects.shield -= dt;

  // Boss rage mechanic
  if (bossMode) {
    bossRage = Math.min(100, bossRage + dt * 5);
    if (bossRage >= 100 && frame % 120 === 0) {
      // Boss rage: extra ball spawn
      const rx = rnd(COURT_MID + 30, COURT_RIGHT - 30);
      const ry = rnd(COURT_TOP + 30, COURT_BOTTOM - 30);
      const rageBall = createBall(rx, ry);
      rageBall.thrown = true;
      rageBall.superType = 'fire';
      rageBall.damage = 15;
      rageBall.vx = -SUPER_SPEED;
      rageBall.vy = rnd(-100, 100);
      rageBall.thrower = enemyTeam[0] || { side: 'right' };
      balls.push(rageBall);
      spawnExplosion(rx, ry, '#ff4400', 10, 80);
      screenShake = 0.5;
      TAS.audio.playTone(200, 0.3, 'sawtooth', 0.15);
      bossRage = 0;
    }
  }

  // Check match end
  const pAlive = playerTeam.filter(c => c.alive).length;
  const eAlive = enemyTeam.filter(c => c.alive).length;
  if (pAlive === 0) {
    matchResult = 'lose';
    state = 'matchEnd';
    TAS.audio.playTone(110, 0.5, 'sawtooth', 0.15);
  } else if (eAlive === 0) {
    matchResult = 'win';
    score += Math.floor((1000 + tournamentRound * 500) * statB.scoreMult);
    state = 'matchEnd';
    TAS.audio.playTone(660, 0.3, 'square', 0.15);
    setTimeout(() => TAS.audio.playTone(880, 0.3, 'square', 0.12), 150);
  }
}

// === PLAYER CONTROL ===
function updateControlledPlayer(p, inp, dt) {
  let moveX = 0, moveY = 0;
  if (inp.left) moveX = -1;
  if (inp.right) moveX = 1;
  if (inp.up) moveY = -1;
  if (inp.down) moveY = 1;

  // Sprint
  p.sprinting = inp.sprint && (moveX !== 0 || moveY !== 0) && p.stamina > 0;
  const spdMult = p.sprinting ? 1.6 : 1.0;
  if (p.sprinting) {
    p.stamina -= SPRINT_DRAIN * dt;
    if (p.stamina < 0) p.stamina = 0;
  } else {
    p.stamina = Math.min(p.maxStamina, p.stamina + SPRINT_REGEN * dt);
  }

  const itemSpd = itemEffects.speedBoost > 0 ? 1.4 : 1.0;
  const spd = (p.speed + playerStats.speed) * spdMult * itemSpd;
  p.vx = moveX * spd;
  p.vy = moveY * spd * 0.6;

  // Store throw direction
  if (moveX !== 0 || moveY !== 0) {
    p.throwDir = { x: moveX || p.facing, y: moveY * 0.5 };
    if (moveX !== 0) p.facing = moveX > 0 ? 1 : -1;
  } else {
    p.throwDir = { x: p.facing, y: 0 };
  }

  // Jump/dodge
  if ((inp.up && p.y <= COURT_TOP + 20) || (inp.fire === false && inp.swap === false && inp.up)) {
    // Jump is automatic with up near top
  }

  // Catch attempt (press fire without ball as ball approaches)
  if (inp.fire && !p.hasBall && p.stunTimer <= 0) {
    p.state = 'catching';
    p.stateTimer = CATCH_WINDOW;
  }
}

// === THROW BALL ===
function throwBall(thrower, inp, chargeFrames) {
  thrower.hasBall = false;
  const isSuper = chargeFrames >= Math.max(10, (CHARGE_TIME - playerStats.charge) * statB.cooldown); // cooldown: charge speed
  const ball = createBall(thrower.x, thrower.y - 5);

  // Direction
  let dx = thrower.throwDir.x;
  let dy = thrower.throwDir.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  dx /= len;
  dy /= len;

  // Pass to teammate check
  if (thrower.side === 'left') {
    // Check if aiming toward a teammate
    const teammates = playerTeam.filter(t => t !== thrower && t.alive);
    let passTarget = null;
    for (const t of teammates) {
      const tdx = t.x - thrower.x;
      const tdy = t.y - thrower.y;
      const dot = tdx * dx + tdy * dy;
      if (dot > 0 && dist(thrower, t) < 80) {
        passTarget = t;
        break;
      }
    }
    if (passTarget && !isSuper) {
      ball.vx = (passTarget.x - thrower.x) * 3;
      ball.vy = (passTarget.y - thrower.y) * 3;
      ball.thrown = false;
      ball.damage = 0;
      ball.catchable = true;
      balls.push(ball);
      TAS.audio.playTone(330, 0.08, 'triangle', 0.1);
      return;
    }
  }

  const spdBoost = thrower.isBaseling ? statB.speed : 1;           // speed: ball velocity
  const speed = (isSuper ? SUPER_SPEED : BALL_SPEED) * spdBoost;
  const power = thrower.power + playerStats.power;
  ball.vx = dx * speed;
  ball.vy = dy * speed * 0.5 - 50;
  ball.thrown = true;
  ball.thrower = thrower;
  ball.damage = Math.floor((isSuper ? power * 2 : power) * statB.damage); // damage: hit harder
  ball.catchable = true;

  if (isSuper) {
    ball.superType = thrower.super;
    TAS.audio.playTone(880, 0.2, 'sawtooth', 0.2);
    TAS.audio.playTone(1100, 0.15, 'sine', 0.1);
    spawnExplosion(thrower.x, thrower.y - 10, TEAMS[thrower.team].colors[2], 12, 100);
    screenShake = 0.5;
  } else {
    TAS.audio.playTone(550, 0.1, 'square', 0.12);
  }

  balls.push(ball);
}

// === AI THROW ===
function aiThrow(thrower) {
  if (aiThrowCooldown > 0) return;
  thrower.hasBall = false;
  const ball = createBall(thrower.x, thrower.y - 5);

  // Pick target
  const targets = playerTeam.filter(t => t.alive);
  if (targets.length === 0) return;
  const target = targets[rndInt(0, targets.length - 1)];

  const dx = target.x - thrower.x;
  const dy = target.y - thrower.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;

  const team = TEAMS[thrower.team];
  const isSuper = Math.random() < team.aggro * 0.4;
  const speed = isSuper ? SUPER_SPEED : BALL_SPEED;

  ball.vx = (dx / len) * speed;
  ball.vy = (dy / len) * speed * 0.7 - 30;
  ball.thrown = true;
  ball.thrower = thrower;
  ball.damage = isSuper ? thrower.power * 2 : thrower.power;
  ball.catchable = true;

  if (isSuper) {
    ball.superType = team.super;
    TAS.audio.playTone(660, 0.15, 'sawtooth', 0.15);
    spawnExplosion(thrower.x, thrower.y - 10, team.colors[2], 8, 80);
    screenShake = 0.3;
  } else {
    TAS.audio.playTone(440, 0.08, 'square', 0.1);
  }

  balls.push(ball);
  aiThrowCooldown = rnd(0.8, 2.0);
}

// === UPDATE ALL CHARACTERS ===
function updateAllChars(dt) {
  const allChars = [...playerTeam, ...enemyTeam];
  for (const c of allChars) {
    if (!c.alive) continue;

    if (c.stunTimer > 0) { c.stunTimer -= dt; c.vx = 0; c.vy = 0; }
    if (c.invuln > 0) c.invuln -= dt;
    if (c.stateTimer > 0) c.stateTimer -= dt;

    // Apply velocity
    c.x += c.vx * dt;
    c.y += c.vy * dt;

    // Boundary constraints
    if (c.side === 'left') {
      c.x = clamp(c.x, COURT_LEFT + c.w / 2, COURT_MID - c.w / 2);
    } else {
      c.x = clamp(c.x, COURT_MID + c.w / 2, COURT_RIGHT - c.w / 2);
    }
    c.y = clamp(c.y, COURT_TOP + c.h / 2, COURT_BOTTOM - c.h / 2);

    // Auto pick up nearby ball
    if (!c.hasBall && c.stunTimer <= 0) {
      for (const ball of balls) {
        if (!ball.thrown && ball.active && !ball.grounded) {
          if (dist(c, ball) < 20) {
            c.hasBall = true;
            ball.active = false;
            TAS.audio.playTone(220, 0.05, 'triangle', 0.08);
            break;
          }
        }
        // Grounded ball pickup
        if (ball.grounded && ball.active && dist(c, ball) < 18) {
          c.hasBall = true;
          ball.active = false;
          TAS.audio.playTone(220, 0.05, 'triangle', 0.08);
          break;
        }
      }
    }

    // Friction
    if (c !== playerTeam[controlledIdx]) {
      c.vx *= 0.9;
      c.vy *= 0.9;
    }
  }
}

// === TEAMMATE AI ===
function updateTeammateAI(p, dt) {
  p.aiTimer -= dt;
  if (p.aiTimer > 0) return;
  p.aiTimer = rnd(0.3, 0.8);

  if (p.hasBall) {
    // Pass to controlled player or throw at enemies
    const controlled = playerTeam[controlledIdx];
    if (controlled && controlled.alive && Math.random() < 0.6) {
      // Pass
      p.hasBall = false;
      const ball = createBall(p.x, p.y - 5);
      ball.vx = (controlled.x - p.x) * 2.5;
      ball.vy = (controlled.y - p.y) * 2.5;
      ball.thrown = false;
      ball.damage = 0;
      balls.push(ball);
      TAS.audio.playTone(330, 0.06, 'triangle', 0.08);
    } else {
      // Throw at enemy
      const targets = enemyTeam.filter(e => e.alive);
      if (targets.length > 0) {
        const target = targets[rndInt(0, targets.length - 1)];
        p.hasBall = false;
        const ball = createBall(p.x, p.y - 5);
        const dx = target.x - p.x;
        const dy = target.y - p.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        ball.vx = (dx / len) * BALL_SPEED * 0.8;
        ball.vy = (dy / len) * BALL_SPEED * 0.5;
        ball.thrown = true;
        ball.thrower = p;
        ball.damage = p.power;
        ball.catchable = true;
        balls.push(ball);
        TAS.audio.playTone(440, 0.06, 'square', 0.08);
      }
    }
  } else {
    // Move toward nearest ball or hold position
    let nearestBall = null;
    let nearDist = Infinity;
    for (const ball of balls) {
      if (ball.active && !ball.thrown && ball.x < COURT_MID) {
        const d = dist(p, ball);
        if (d < nearDist) { nearDist = d; nearestBall = ball; }
      }
    }
    if (nearestBall && nearDist > 20) {
      const dx = nearestBall.x - p.x;
      const dy = nearestBall.y - p.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      p.vx = (dx / len) * p.speed * 0.6;
      p.vy = (dy / len) * p.speed * 0.6;
    } else {
      // Return to formation
      const homeX = COURT_LEFT + 50 + p.slot * 60;
      const homeY = GROUND_Y - 10 + p.slot * 20;
      p.vx = (homeX - p.x) * 2;
      p.vy = (homeY - p.y) * 2;
    }
  }

  // Dodge incoming balls
  for (const ball of balls) {
    if (ball.thrown && ball.active && ball.thrower && ball.thrower.side === 'right') {
      if (dist(p, ball) < 60 && Math.random() < 0.4) {
        p.vy = (Math.random() < 0.5 ? -1 : 1) * p.speed;
      }
    }
  }
}

// === ENEMY AI ===
function updateEnemyAI(e, idx, dt) {
  const team = TEAMS[e.team];
  e.aiTimer -= dt;
  if (e.aiTimer > 0) return;
  e.aiTimer = rnd(0.2, 0.6) * (1 - team.aggro * 0.3);

  if (e.hasBall) {
    // Decide to throw
    if (Math.random() < team.aggro) {
      aiThrow(e);
    } else {
      // Position for throw
      const targetY = rnd(COURT_TOP + 40, COURT_BOTTOM - 40);
      e.vy = (targetY - e.y) * 2;
    }
  } else {
    // Try to get a ball
    let nearestBall = null;
    let nearDist = Infinity;
    for (const ball of balls) {
      if (ball.active && !ball.thrown && ball.x > COURT_MID - 20) {
        const d = dist(e, ball);
        if (d < nearDist) { nearDist = d; nearestBall = ball; }
      }
    }
    if (nearestBall && nearDist > 15) {
      const dx = nearestBall.x - e.x;
      const dy = nearestBall.y - e.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      e.vx = (dx / len) * e.speed * 0.8;
      e.vy = (dy / len) * e.speed * 0.8;
    } else {
      // Dodge
      for (const ball of balls) {
        if (ball.thrown && ball.active && ball.thrower && ball.thrower.side === 'left') {
          const d = dist(e, ball);
          if (d < 50 + team.react * 3) {
            if (Math.random() < 0.3 + team.aggro * 0.3) {
              // Try to catch
              e.state = 'catching';
              e.stateTimer = CATCH_WINDOW + team.react;
            } else {
              e.vy = (Math.random() < 0.5 ? -1 : 1) * e.speed * 1.2;
            }
          }
        }
      }
      // Wander
      const homeX = COURT_MID + 50 + e.slot * 55;
      const homeY = COURT_TOP + 50 + e.slot * 50;
      e.vx = (homeX - e.x) * 1.5;
      e.vy = (homeY - e.y) * 1.5;
    }
  }
}

// === BALL PHYSICS & SUPER EFFECTS ===
function updateBalls(dt) {
  for (let i = balls.length - 1; i >= 0; i--) {
    const ball = balls[i];
    if (!ball.active) { balls.splice(i, 1); continue; }

    // Super throw behaviors
    if (ball.superType && ball.thrown) {
      updateSuperBall(ball, dt);
    }

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    // Add gravity to non-thrown balls
    if (!ball.thrown) {
      ball.vy += GRAVITY * 0.3 * dt;
    } else {
      ball.vy += GRAVITY * 0.1 * dt;
    }

    // Trail particles for thrown balls
    if (ball.thrown && ball.visible) {
      const color = ball.superType ? getSuperColor(ball.superType) : '#ffffff';
      if (frame % 2 === 0) spawnTrail(ball.x, ball.y, color);
    }

    // Ground bounce
    if (ball.y > COURT_BOTTOM - 5) {
      ball.y = COURT_BOTTOM - 5;
      if (ball.thrown && !ball.bounced) {
        ball.bounced = true;
        ball.vy = -Math.abs(ball.vy) * 0.3;
        ball.vx *= 0.6;
        // Fire ball split
        if (ball.superType === 'fire' && !ball.splitDone) {
          ball.splitDone = true;
          fireBallSplit(ball);
        }
      } else {
        ball.vy = 0;
        ball.vx *= 0.85;
        ball.thrown = false;
        ball.grounded = true;
        ball.superType = null;
        if (Math.abs(ball.vx) < 5) ball.vx = 0;
      }
    }

    // Wall bounds
    if (ball.x < COURT_LEFT || ball.x > COURT_RIGHT) {
      ball.active = false;
      // Respawn ball at center
      setTimeout(() => {
        if (balls.filter(b => b.active).length < 1) {
          balls.push(createBall(GW / 2, COURT_TOP + 30));
        }
      }, 1000);
      continue;
    }

    // Top bound
    if (ball.y < COURT_TOP) {
      ball.y = COURT_TOP;
      ball.vy = Math.abs(ball.vy) * 0.5;
    }

    // Hit detection
    if (ball.thrown && ball.active) {
      const targets = ball.thrower && ball.thrower.side === 'left' ? enemyTeam : playerTeam;
      for (const target of targets) {
        if (!target.alive || target.invuln > 0) continue;
        if (dist(ball, target) < 18) {
          // Check if catching
          if (target.state === 'catching' && target.stateTimer > 0 && ball.catchable) {
            // CAUGHT!
            performCatch(target, ball);
          } else {
            // HIT!
            performHit(target, ball);
          }
          break;
        }
      }
    }
  }

  // Ensure at least one ball exists
  if (balls.filter(b => b.active).length === 0) {
    balls.push(createBall(GW / 2, COURT_TOP + 30));
  }
}

// === SUPER BALL BEHAVIORS ===
function updateSuperBall(ball, dt) {
  switch (ball.superType) {
    case 'thunder':
      // Zigzag pattern
      ball.vy += Math.sin(frame * 0.5) * 800 * dt;
      if (frame % 3 === 0) spawnParticle(ball.x, ball.y, rnd(-30, 30), rnd(-30, 30), '#ffff44', 0.3, 3);
      break;
    case 'shadow':
      // Goes invisible mid-flight
      ball.invisTimer += dt;
      if (ball.invisTimer > 0.15 && ball.invisTimer < 0.45) {
        ball.visible = false;
      } else {
        ball.visible = true;
      }
      if (ball.invisTimer > 0.45) {
        spawnParticle(ball.x, ball.y, 0, 0, '#9944ff', 0.2, 5);
      }
      break;
    case 'curve':
      // Extreme curve
      ball.vy += Math.sin(frame * 0.15) * 600 * dt;
      ball.vx += Math.cos(frame * 0.1) * 100 * dt;
      break;
    case 'rocket':
      // Slight homing
      if (ball.thrower) {
        const targets = ball.thrower.side === 'left' ? enemyTeam : playerTeam;
        const alive = targets.filter(t => t.alive);
        if (alive.length > 0) {
          const nearest = alive.reduce((a, b) => dist(ball, a) < dist(ball, b) ? a : b);
          const dx = nearest.x - ball.x;
          const dy = nearest.y - ball.y;
          const len = Math.sqrt(dx * dx + dy * dy) || 1;
          ball.vx += (dx / len) * 150 * dt;
          ball.vy += (dy / len) * 80 * dt;
        }
      }
      if (frame % 2 === 0) spawnParticle(ball.x, ball.y, rnd(-20, 20), rnd(10, 40), '#ff6600', 0.3, 4);
      break;
    case 'bomb':
      // Normal flight, explodes on impact (handled in hit)
      if (frame % 4 === 0) spawnParticle(ball.x, ball.y, rnd(-5, 5), rnd(-5, 5), '#ff4400', 0.4, 3);
      break;
    case 'fire':
      // Normal flight, splits on ground bounce (handled in updateBalls)
      if (frame % 2 === 0) spawnParticle(ball.x, ball.y, rnd(-15, 15), rnd(-15, 15), '#ff8800', 0.3, 4);
      break;
  }
}

// === FIRE BALL SPLIT ===
function fireBallSplit(parentBall) {
  for (let i = -1; i <= 1; i++) {
    if (i === 0) continue;
    const child = createBall(parentBall.x, parentBall.y);
    child.vx = parentBall.vx * 0.7 + i * 120;
    child.vy = -180;
    child.thrown = true;
    child.thrower = parentBall.thrower;
    child.damage = parentBall.damage * 0.5;
    child.superType = null;
    child.catchable = true;
    balls.push(child);
  }
  spawnExplosion(parentBall.x, parentBall.y, '#ff4400', 10, 120);
  screenShake = 0.4;
  TAS.audio.playTone(200, 0.2, 'sawtooth', 0.15);
}

// === CATCH ===
function performCatch(catcher, ball) {
  catcher.hasBall = true;
  ball.active = false;
  catcher.state = 'idle';
  catcher.stateTimer = 0;

  // Slow-mo on super catch
  if (ball.superType) {
    slowMo = 1;
    slowMoTimer = 0.6;
    catchFlash = 1;
    catchText = 'SUPER CATCH!';
    var pts = Math.floor(500 * statB.scoreMult);       // scoreMult: bonus score
    score += pts;
    spawnScorePopup(catcher.x, catcher.y - 30, '+' + pts, '#ffff44');
    spawnExplosion(catcher.x, catcher.y, '#ffffff', 20, 150);
    TAS.audio.playTone(880, 0.2, 'sine', 0.2);
    TAS.audio.playTone(1100, 0.15, 'sine', 0.15);
    screenShake = 0.6;
    dodgeStreak++;
  } else {
    catchFlash = 0.6;
    catchText = 'CATCH!';
    var pts2 = Math.floor(100 * statB.scoreMult);
    score += pts2;
    spawnScorePopup(catcher.x, catcher.y - 30, '+' + pts2, '#44ff44');
    spawnExplosion(catcher.x, catcher.y, '#44ff44', 8, 80);
    TAS.audio.playTone(660, 0.15, 'sine', 0.15);
    dodgeStreak++;
  }
  flashAlpha = 0.3;
}

// === HAZARD SYSTEM ===
function updateHazards(dt) {
  // Spawn hazards based on round difficulty
  const spawnMult = 1 + tournamentRound * 0.3;
  for (const hType of HAZARD_TYPES) {
    if (Math.random() < hType.spawnChance * spawnMult && hazards.length < 5) {
      hazards.push({
        x: rnd(COURT_LEFT + 30, COURT_RIGHT - 30),
        y: rnd(COURT_TOP + 20, COURT_BOTTOM - 20),
        type: hType,
        life: hType.duration,
        radius: hType.radius
      });
    }
  }
  // Update and apply hazards
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.life -= dt;
    if (h.life <= 0) { hazards.splice(i, 1); continue; }
    // Check collision with all characters
    const allChars = [...playerTeam, ...enemyTeam];
    for (const c of allChars) {
      if (!c.alive || c.invuln > 0) continue;
      if (dist(c, h) < h.radius + 8) {
        if (h.type.name === 'ice_patch') {
          // Slow effect
          c.vx *= 0.5;
          c.vy *= 0.5;
          c.stunTimer = Math.max(c.stunTimer, 0.2);
        } else if (h.type.damage > 0) {
          // Shield blocks hazard damage for player team
          if (c.side === 'left' && itemEffects.shield > 0) {
            spawnScorePopup(c.x, c.y - 20, 'BLOCKED!', '#44ff88');
          } else {
            c.hp -= h.type.damage;
            c.invuln = 0.5;
            spawnScorePopup(c.x, c.y - 20, '-' + h.type.damage, h.type.color);
            if (c.hp <= 0) {
              c.hp = 0; c.alive = false;
              spawnExplosion(c.x, c.y, '#ff0000', 12, 100);
            }
          }
        }
      }
    }
    // Ambient particles
    if (frame % 4 === 0) {
      spawnParticle(h.x + rnd(-h.radius, h.radius), h.y + rnd(-h.radius, h.radius),
        rnd(-10, 10), rnd(-20, -5), h.type.color, 0.4, 2);
    }
  }
}

// === ITEM SYSTEM ===
function updateItems(dt) {
  // Random item drops
  if (Math.random() < 0.001 + tournamentRound * 0.0005 && items.length < 3) {
    const iType = ITEM_TYPES[rndInt(0, ITEM_TYPES.length - 1)];
    items.push({
      x: rnd(COURT_LEFT + 30, COURT_RIGHT - 30),
      y: rnd(COURT_TOP + 20, COURT_BOTTOM - 20),
      type: iType,
      life: 8,
      bobOffset: rnd(0, Math.PI * 2)
    });
  }
  // Update items and check pickup
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.life -= dt;
    if (item.life <= 0) { items.splice(i, 1); continue; }
    // Check pickup by player team only
    for (const p of playerTeam) {
      if (!p.alive) continue;
      if (dist(p, item) < 18) {
        applyItem(p, item.type);
        items.splice(i, 1);
        break;
      }
    }
  }
}

function applyItem(player, iType) {
  switch (iType.effect) {
    case 'heal':
      player.hp = Math.min(player.maxHp, player.hp + iType.amount);
      spawnScorePopup(player.x, player.y - 30, '+' + iType.amount + ' HP', '#ff4488');
      break;
    case 'speedBoost':
      itemEffects.speedBoost = iType.amount;
      spawnScorePopup(player.x, player.y - 30, 'SPEED UP!', '#44ddff');
      break;
    case 'powerBoost':
      itemEffects.powerBoost = iType.amount;
      spawnScorePopup(player.x, player.y - 30, 'POWER UP!', '#ff8844');
      break;
    case 'shield':
      itemEffects.shield = iType.amount;
      spawnScorePopup(player.x, player.y - 30, 'SHIELD!', '#44ff88');
      break;
  }
  TAS.audio.playTone(660, 0.12, 'sine', 0.15);
  TAS.audio.playTone(880, 0.08, 'sine', 0.1);
  spawnExplosion(player.x, player.y, iType.color, 10, 80);
  var pts = Math.floor(50 * statB.scoreMult);
  score += pts;
  spawnScorePopup(player.x, player.y - 45, '+' + pts, '#ffff44');
}

// === SCORE POPUP SYSTEM ===
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color, life: 1.2, maxLife: 1.2 });
}

// === HIT ===
function performHit(target, ball) {
  // WIS+luck: lucky dodge chance for player team
  if (target.side === 'left' && Math.random() < luckyDodgeChance) {
    spawnScorePopup(target.x, target.y - 30, 'LUCKY DODGE!', '#ffdd00');
    spawnExplosion(target.x, target.y, '#ffdd00', 6, 60);
    TAS.audio.playTone(770, 0.12, 'sine', 0.12);
    ball.active = false;
    dodgeStreak++;
    return;
  }
  dodgeStreak = 0;
  const dmg = Math.max(1, ball.damage - (playerStats.defense * (target.side === 'left' ? 1 : 0)));
  target.hp -= dmg;
  target.invuln = 0.5;
  target.stunTimer = 0.4;
  target.vx = ball.vx * 0.3;
  target.vy = ball.vy * 0.2;
  spawnScorePopup(target.x, target.y - 20, '-' + dmg, '#ff4444');

  // Bomb explosion AoE
  if (ball.superType === 'bomb') {
    const aoeTargets = target.side === 'left' ? playerTeam : enemyTeam;
    for (const t of aoeTargets) {
      if (t !== target && t.alive && dist(t, ball) < 60) {
        t.hp -= dmg * 0.5;
        t.stunTimer = 0.6;
        t.invuln = 0.3;
      }
    }
    spawnExplosion(ball.x, ball.y, '#ff4400', 25, 180);
    spawnExplosion(ball.x, ball.y, '#ffaa00', 15, 120);
    screenShake = 1.0;
    TAS.audio.playTone(100, 0.4, 'sawtooth', 0.2);
    TAS.audio.playTone(60, 0.5, 'square', 0.15);
  } else {
    spawnExplosion(ball.x, ball.y, '#ff4444', 8, 100);
    screenShake = 0.4;
    TAS.audio.playTone(180, 0.15, 'square', 0.15);
  }

  ball.active = false;
  ball.thrown = false;

  // Check elimination
  if (target.hp <= 0) {
    target.hp = 0;
    target.alive = false;
    spawnExplosion(target.x, target.y, '#ff0000', 20, 150);
    spawnExplosion(target.x, target.y, '#ffff00', 10, 100);
    screenShake = 0.8;
    TAS.audio.playTone(100, 0.5, 'sawtooth', 0.2);
    var elimPts = Math.floor(300 * statB.scoreMult);
    score += elimPts;
    spawnScorePopup(target.x, target.y - 30, 'KO +' + elimPts, '#ff8844');

    // Extra lives: revive baseling if eliminated
    if (target.side === 'left' && target.isBaseling && extraLives > 0) {
      extraLives--;
      target.alive = true;
      target.hp = Math.floor(target.maxHp * 0.5);
      target.invuln = 2.0;
      spawnScorePopup(target.x, target.y - 40, 'REVIVE!', '#44ffff');
      spawnExplosion(target.x, target.y, '#44ffff', 15, 120);
      TAS.audio.playTone(880, 0.3, 'sine', 0.2);
    }

    // Switch to next alive if controlled was eliminated
    if (target.side === 'left') {
      if (!playerTeam[controlledIdx].alive) {
        for (let i = 0; i < playerTeam.length; i++) {
          if (playerTeam[i].alive) { controlledIdx = i; break; }
        }
      }
    }
  }

  flashAlpha = 0.2;
}

// === SUPER THROW COLORS ===
function getSuperColor(type) {
  switch (type) {
    case 'thunder': return '#ffff00';
    case 'fire': return '#ff6600';
    case 'shadow': return '#9944ff';
    case 'bomb': return '#ff2200';
    case 'curve': return '#00ffcc';
    case 'rocket': return '#ff8800';
    default: return '#ffffff';
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }
  if (state === 'gameOver') {
    drawGameOver();
    return;
  }
  if (state === 'victory') {
    drawVictory();
    return;
  }
  if (state === 'shop') {
    drawShop();
    return;
  }

  // Apply screen shake
  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawCourt();
  drawHazards();
  drawItems();
  drawCharacters();
  drawBalls();
  drawParticles();

  ctx.restore();

  // UI overlays
  drawHUD();
  if (matchIntro > 0) drawMatchIntro();
  if (state === 'matchEnd') drawMatchEnd();
  if (catchFlash > 0) drawCatchFlash();
  drawScorePopups();
  if (flashAlpha > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, GW, GH);
  }
  if (slowMo > 0) {
    ctx.fillStyle = 'rgba(0, 0, 40, 0.15)';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Tutorial overlay (first match only)
  if (showTutorial && state === 'playing' && matchIntro <= 0 && tournamentRound === 0 && frame < 600) {
    drawTutorial();
  }
  if (frame >= 600 && showTutorial) showTutorial = false;

  TAS.input.drawTouchControls(GW, GH);
}

// === ZONE THEMES ===
const ZONE_THEMES = [
  { floor1: '#1a2c1a', floor2: '#0a1a0a', line: '#2a5a2a', accent: '#38d973', detail: 'grove' },    // Nursery Patch
  { floor1: '#2c2a1a', floor2: '#1a1a0a', line: '#5a5530', accent: '#f4b41b', detail: 'market' },   // Compost Heap
  { floor1: '#1c1a2c', floor2: '#0a0a1a', line: '#3a2a5a', accent: '#a855f7', detail: 'sewer' },    // The Underspore
  { floor1: '#1a2a2c', floor2: '#0a1a1c', line: '#2a4a55', accent: '#3cacd7', detail: 'grove' },    // Mycelium Grove
  { floor1: '#2c1a1c', floor2: '#1a0a0c', line: '#5a2a30', accent: '#7a444a', detail: 'forge' },    // Hauler Yard
  { floor1: '#1a1c2c', floor2: '#0a0c1a', line: '#2a3a5a', accent: '#3cacd7', detail: 'spire' },    // Mushroom Spire
  { floor1: '#151218', floor2: '#0a0a0c', line: '#222222', accent: '#555555', detail: 'alley' },     // Dead Garden
  { floor1: '#2c1500', floor2: '#1a0a00', line: '#5a3020', accent: '#e6482e', detail: 'ember' }      // Volcanic Bed
];

// === DRAW COURT ===
function drawCourt() {
  const enemyIdx = Math.min(tournamentRound + 1, TEAMS.length - 1);
  const zone = ZONE_THEMES[Math.min(enemyIdx, ZONE_THEMES.length - 1)];

  // Floor gradient themed per zone
  const gradient = ctx.createLinearGradient(0, COURT_TOP, 0, COURT_BOTTOM);
  gradient.addColorStop(0, zone.floor1);
  gradient.addColorStop(1, zone.floor2);
  ctx.fillStyle = gradient;
  ctx.fillRect(COURT_LEFT, COURT_TOP, COURT_RIGHT - COURT_LEFT, COURT_BOTTOM - COURT_TOP);

  // Zone-specific floor details
  drawZoneDetails(zone, enemyIdx);

  // Court lines
  ctx.strokeStyle = zone.line;
  ctx.lineWidth = 2;
  ctx.strokeRect(COURT_LEFT, COURT_TOP, COURT_RIGHT - COURT_LEFT, COURT_BOTTOM - COURT_TOP);

  // Center line
  ctx.beginPath();
  ctx.setLineDash([6, 4]);
  ctx.moveTo(COURT_MID, COURT_TOP);
  ctx.lineTo(COURT_MID, COURT_BOTTOM);
  ctx.strokeStyle = zone.accent + '44';
  ctx.stroke();
  ctx.setLineDash([]);

  // Center circle with zone accent
  ctx.beginPath();
  ctx.arc(COURT_MID, (COURT_TOP + COURT_BOTTOM) / 2, 25, 0, Math.PI * 2);
  ctx.strokeStyle = zone.accent + '33';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Team zone colors
  ctx.fillStyle = `rgba(${hexToRgb(PLAYER_COLOR)}, 0.05)`;
  ctx.fillRect(COURT_LEFT, COURT_TOP, COURT_MID - COURT_LEFT, COURT_BOTTOM - COURT_TOP);
  ctx.fillStyle = `rgba(${hexToRgb(TEAMS[enemyIdx].colors[0])}, 0.05)`;
  ctx.fillRect(COURT_MID, COURT_TOP, COURT_RIGHT - COURT_MID, COURT_BOTTOM - COURT_TOP);

  // Crowd with zone-themed colors
  ctx.fillStyle = zone.floor1;
  ctx.fillRect(COURT_LEFT, COURT_TOP - 30, COURT_RIGHT - COURT_LEFT, 30);
  for (let i = 0; i < 40; i++) {
    const cx = COURT_LEFT + 10 + i * 11;
    const cy = COURT_TOP - 15 + Math.sin(i * 2 + frame * 0.02) * 3;
    const crowdHue = parseInt(TEAMS[enemyIdx].colors[0].slice(1, 3), 16) + i * 8;
    ctx.fillStyle = `hsl(${crowdHue % 360}, 30%, ${35 + Math.sin(frame * 0.05 + i) * 5}%)`;
    ctx.beginPath();
    ctx.arc(cx, cy, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // District name on floor
  ctx.globalAlpha = 0.08;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = zone.accent;
  ctx.fillText(TEAMS[enemyIdx].district.toUpperCase(), COURT_MID + 110, (COURT_TOP + COURT_BOTTOM) / 2);
  ctx.globalAlpha = 1;
}

// === ZONE FLOOR DETAILS ===
function drawZoneDetails(zone, enemyIdx) {
  ctx.globalAlpha = 0.15;
  switch (zone.detail) {
    case 'harbor':
      // Water ripple lines
      for (let y = COURT_TOP + 20; y < COURT_BOTTOM; y += 25) {
        ctx.beginPath();
        ctx.moveTo(COURT_LEFT, y);
        for (let x = COURT_LEFT; x < COURT_RIGHT; x += 10) {
          ctx.lineTo(x, y + Math.sin((x + frame * 2) * 0.03) * 3);
        }
        ctx.strokeStyle = '#4488aa';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'market':
      // Cobblestone pattern
      for (let x = COURT_LEFT + 10; x < COURT_RIGHT; x += 20) {
        for (let y = COURT_TOP + 10; y < COURT_BOTTOM; y += 15) {
          ctx.strokeStyle = '#554422';
          ctx.lineWidth = 1;
          ctx.strokeRect(x + ((y / 15) % 2) * 10, y, 18, 13);
        }
      }
      break;
    case 'sewer':
      // Dripping particles
      if (frame % 20 === 0) {
        spawnParticle(rnd(COURT_LEFT, COURT_RIGHT), COURT_TOP, 0, rnd(20, 60), '#6644aa', 1.5, 2);
      }
      break;
    case 'grove':
      // Mycelium network lines
      for (let i = 0; i < 8; i++) {
        const sx = COURT_LEFT + ((i * 57 + frame * 0.1) % (COURT_RIGHT - COURT_LEFT));
        const sy = COURT_TOP + ((i * 41) % (COURT_BOTTOM - COURT_TOP));
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + rnd(-30, 30), sy + rnd(-30, 30));
        ctx.strokeStyle = '#22aa44';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'forge':
      // Glowing embers on floor
      for (let i = 0; i < 6; i++) {
        const ex = COURT_LEFT + ((i * 73 + frame) % (COURT_RIGHT - COURT_LEFT));
        const ey = COURT_TOP + ((i * 47 + frame * 0.5) % (COURT_BOTTOM - COURT_TOP));
        ctx.beginPath();
        ctx.arc(ex, ey, 2 + Math.sin(frame * 0.1 + i) * 1, 0, Math.PI * 2);
        ctx.fillStyle = '#ff4422';
        ctx.fill();
      }
      break;
    case 'spire':
      // Geometric floor patterns
      for (let i = 0; i < 4; i++) {
        const cx = COURT_LEFT + 60 + i * 100;
        const cy = (COURT_TOP + COURT_BOTTOM) / 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 15, 0, Math.PI * 2);
        ctx.strokeStyle = '#4466cc';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      break;
    case 'alley':
      // Dark cracks
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        const sx = COURT_LEFT + i * 90;
        ctx.moveTo(sx, COURT_TOP + rnd(10, 30));
        ctx.lineTo(sx + rnd(-20, 20), COURT_BOTTOM - rnd(10, 30));
        ctx.strokeStyle = '#222222';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      break;
    case 'ember':
      // Lava cracks
      for (let i = 0; i < 6; i++) {
        const lx = COURT_LEFT + 30 + i * 70;
        const ly = COURT_TOP + 20 + (i * 30) % (COURT_BOTTOM - COURT_TOP - 40);
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx + rnd(-15, 15), ly + rnd(15, 40));
        ctx.strokeStyle = '#ff4400';
        ctx.lineWidth = 2 + Math.sin(frame * 0.1 + i) * 1;
        ctx.stroke();
      }
      // Ambient heat shimmer
      if (frame % 8 === 0) {
        spawnParticle(rnd(COURT_LEFT, COURT_RIGHT), COURT_BOTTOM, rnd(-5, 5), rnd(-40, -20), '#ff440033', 0.8, 3);
      }
      break;
  }
  ctx.globalAlpha = 1;
}

// === DRAW HAZARDS ===
function drawHazards() {
  for (const h of hazards) {
    const alpha = Math.min(1, h.life / 0.5) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
    ctx.fillStyle = h.type.color;
    ctx.fill();
    // Pulsing ring
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.radius + Math.sin(frame * 0.1) * 3, 0, Math.PI * 2);
    ctx.strokeStyle = h.type.color;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Label
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(h.type.name === 'fire_trap' ? 'EMBER' : h.type.name === 'ice_patch' ? 'FROST' : h.type.name === 'spore_cloud' ? 'SPORE' : 'BLIGHT', h.x, h.y + 3);
    ctx.globalAlpha = 1;
  }
}

// === DRAW ITEMS ===
function drawItems() {
  for (const item of items) {
    const bobY = Math.sin(frame * 0.08 + item.bobOffset) * 4;
    const alpha = item.life < 2 ? (Math.sin(frame * 0.3) * 0.3 + 0.7) : 1;
    ctx.globalAlpha = alpha;
    // Glow
    ctx.beginPath();
    ctx.arc(item.x, item.y + bobY, 12, 0, Math.PI * 2);
    ctx.fillStyle = item.type.color + '33';
    ctx.fill();
    // Icon circle
    ctx.beginPath();
    ctx.arc(item.x, item.y + bobY, 8, 0, Math.PI * 2);
    ctx.fillStyle = item.type.color;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Icon letter
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(item.type.icon, item.x, item.y + bobY);
    ctx.globalAlpha = 1;
  }
}

// === DRAW CHARACTERS ===
function drawCharacters() {
  const allChars = [...playerTeam, ...enemyTeam];
  // Sort by y for depth
  allChars.sort((a, b) => a.y - b.y);

  for (const c of allChars) {
    if (!c.alive) continue;

    const team = TEAMS[c.team];
    // Baseling uses NFT color scheme
    const colors = c.isBaseling ? [PLAYER_COLOR, darkenColor(PLAYER_COLOR, 0.6), lightenColor(PLAYER_COLOR, 1.4)] : team.colors;
    const isControlled = c === playerTeam[controlledIdx];

    // Invulnerability flash
    if (c.invuln > 0 && Math.floor(c.invuln * 10) % 2 === 0) continue;

    ctx.save();
    ctx.translate(c.x, c.y);

    // Controlled indicator
    if (isControlled) {
      ctx.beginPath();
      ctx.arc(0, -c.h - 8, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#ffff00';
      ctx.fill();
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, c.h / 2 - 2, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bobY = Math.sin(frame * 0.1 + c.slot) * 1.5;

    // Legs
    const legSpread = (c.vx !== 0 || c.vy !== 0) ? Math.sin(frame * 0.2 + c.slot) * 4 : 0;
    ctx.fillStyle = colors[1];
    ctx.fillRect(-4 + legSpread, 4 + bobY, 4, 12);
    ctx.fillRect(2 - legSpread, 4 + bobY, 4, 12);

    // Torso
    ctx.fillStyle = colors[0];
    ctx.fillRect(-7, -10 + bobY, 14, 16);

    // Stripe
    ctx.fillStyle = colors[2];
    ctx.fillRect(-7, -4 + bobY, 14, 3);

    // Head
    ctx.fillStyle = '#ffcc88';
    ctx.beginPath();
    ctx.arc(0, -14 + bobY, 6, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#000000';
    ctx.fillRect(-3 * c.facing - 1, -15 + bobY, 2, 2);
    ctx.fillRect(1 * c.facing, -15 + bobY, 2, 2);

    // Player baseling: draw the selected sprite over the body (focal entity). The
    // procedural body above is the no-wallet fallback; the ball-arm below stays on top.
    if (c.isBaseling) {
      var _da = c.stunTimer > 0 ? 'hurt' : ((c.vx !== 0 || c.vy !== 0) ? 'walk' : 'idle');
      TAS.drawBaseling(ctx, 0, -6 + bobY, 30, { anim: _da, frame: frame, flipX: c.facing < 0 });
    }

    // Arms
    ctx.fillStyle = colors[0];
    if (c.hasBall) {
      // Arm up holding ball
      ctx.fillRect(c.facing * 6, -12 + bobY, 4 * c.facing, 3);
      ctx.fillRect(c.facing * 9, -16 + bobY, 3, 5);
      // Ball in hand
      ctx.beginPath();
      ctx.arc(c.facing * 11, -18 + bobY, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#dd4422';
      ctx.fill();
      ctx.strokeStyle = '#ff8866';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      // Arms at sides
      ctx.fillRect(-9, -6 + bobY, 3, 8);
      ctx.fillRect(6, -6 + bobY, 3, 8);
    }

    // Charge indicator
    if (isControlled && fireHeld > 0 && c.hasBall) {
      const chargeRatio = Math.min(1, fireHeld / Math.max(10, (CHARGE_TIME - playerStats.charge) * statB.cooldown));
      ctx.fillStyle = chargeRatio >= 1 ? '#ffff00' : '#ff8800';
      ctx.fillRect(-10, -c.h - 4, 20 * chargeRatio, 3);
      if (chargeRatio >= 1 && frame % 4 < 2) {
        spawnParticle(c.x + rnd(-8, 8), c.y - c.h - 5, rnd(-20, 20), rnd(-40, -10), getSuperColor(c.super), 0.3, 2);
      }
    }

    // Stun stars
    if (c.stunTimer > 0) {
      for (let s = 0; s < 3; s++) {
        const angle = frame * 0.15 + s * 2.1;
        const sx = Math.cos(angle) * 10;
        const sy = -20 + Math.sin(angle) * 5 + bobY;
        ctx.fillStyle = '#ffff00';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('*', sx, sy);
      }
    }

    // HP bar
    const hpRatio = c.hp / c.maxHp;
    ctx.fillStyle = '#333333';
    ctx.fillRect(-10, -c.h - 12, 20, 3);
    ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc44' : '#cc4444';
    ctx.fillRect(-10, -c.h - 12, 20 * hpRatio, 3);

    ctx.restore();
  }
}

// === DRAW MINI PLAYER (for title) ===
function drawMiniPlayer(x, y, colors, facing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = colors[1];
  ctx.fillRect(-3, 4, 3, 8);
  ctx.fillRect(1, 4, 3, 8);
  ctx.fillStyle = colors[0];
  ctx.fillRect(-5, -6, 10, 12);
  ctx.fillStyle = colors[2];
  ctx.fillRect(-5, -2, 10, 2);
  ctx.fillStyle = '#ffcc88';
  ctx.beginPath();
  ctx.arc(0, -10, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// === DRAW BALLS ===
function drawBalls() {
  for (const ball of balls) {
    if (!ball.active) continue;
    if (!ball.visible) {
      // Draw faint shadow for invisible balls
      ctx.globalAlpha = 0.1;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#9944ff';
      ctx.fill();
      ctx.globalAlpha = 1;
      continue;
    }

    ctx.save();

    // Super glow
    if (ball.superType && ball.thrown) {
      const color = getSuperColor(ball.superType);
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;

      // Extra ring
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius + 4, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.3) * 0.2;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Ball body
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fillStyle = ball.thrown ? '#dd3322' : '#cc6644';
    ctx.fill();
    ctx.strokeStyle = ball.thrown ? '#ff8866' : '#aa8866';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Ball highlight
    ctx.beginPath();
    ctx.arc(ball.x - 1, ball.y - 2, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();

    // Speed lines for fast balls
    if (ball.thrown && Math.abs(ball.vx) > 200) {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      for (let l = 0; l < 3; l++) {
        const lx = ball.x - ball.vx * 0.01 * (l + 1);
        const ly = ball.y - ball.vy * 0.01 * (l + 1) + rnd(-3, 3);
        ctx.beginPath();
        ctx.moveTo(lx, ly);
        ctx.lineTo(lx - ball.vx * 0.008, ly);
        ctx.stroke();
      }
    }

    ctx.restore();
  }
}

// === DRAW PARTICLES ===
function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === DRAW HUD ===
function drawHUD() {
  ctx.textAlign = 'left';
  ctx.font = '10px monospace';

  // Score
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Score: ' + score, 10, 14);

  // Spore Gems
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('Spore Gems: ' + tokens, 10, 26);

  // Extra lives
  if (extraLives > 0) {
    ctx.fillStyle = '#44ffff';
    ctx.fillText('Lives: ' + PLAYER_ICON.repeat(extraLives + 1), 10, 38);
  }

  // Dodge streak (WIS bonus)
  if (dodgeStreak >= 3) {
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('Streak: ' + dodgeStreak, 10, extraLives > 0 ? 50 : 38);
  }

  // Round
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Garden ' + (tournamentRound + 1) + '/7', GW - 10, 14);

  // Team names — player team shows baseling name
  ctx.textAlign = 'center';
  ctx.font = '9px monospace';
  ctx.fillStyle = PLAYER_COLOR;
  ctx.fillText(PLAYER_NAME + "'s Baselings", COURT_LEFT + 60, COURT_TOP - 35);
  const eIdx = Math.min(tournamentRound + 1, TEAMS.length - 1);
  ctx.fillStyle = TEAMS[eIdx].colors[2];
  ctx.fillText(TEAMS[eIdx].name, COURT_RIGHT - 60, COURT_TOP - 35);

  // Player team HP bars
  ctx.textAlign = 'left';
  for (let i = 0; i < playerTeam.length; i++) {
    const p = playerTeam[i];
    const bx = 10;
    const by = GH - 55 + i * 16;
    ctx.fillStyle = p.alive ? '#ffffff' : '#444444';
    ctx.font = '8px monospace';
    ctx.fillText(p.name[0], bx, by + 8);
    ctx.fillStyle = '#222222';
    ctx.fillRect(bx + 10, by, 50, 8);
    if (p.alive) {
      const hpR = p.hp / p.maxHp;
      ctx.fillStyle = hpR > 0.5 ? '#44aa44' : hpR > 0.25 ? '#aaaa44' : '#aa4444';
      ctx.fillRect(bx + 10, by, 50 * hpR, 8);
    }
    if (i === controlledIdx) {
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx + 9, by - 1, 52, 10);
    }
  }

  // Stamina bar for controlled
  const controlled = playerTeam[controlledIdx];
  if (controlled && controlled.alive) {
    const stR = controlled.stamina / controlled.maxStamina;
    ctx.fillStyle = '#222222';
    ctx.fillRect(10, GH - 10, 60, 5);
    ctx.fillStyle = stR > 0.3 ? '#4488cc' : '#cc8844';
    ctx.fillRect(10, GH - 10, 60 * stR, 5);
    ctx.font = '7px monospace';
    ctx.fillStyle = '#88aacc';
    ctx.fillText('STA', 72, GH - 5);
  }

  // Enemy team HP bars
  ctx.textAlign = 'right';
  for (let i = 0; i < enemyTeam.length; i++) {
    const e = enemyTeam[i];
    const bx = GW - 70;
    const by = GH - 55 + i * 16;
    ctx.fillStyle = e.alive ? '#ffffff' : '#444444';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(e.name[0], GW - 10, by + 8);
    ctx.fillStyle = '#222222';
    ctx.fillRect(bx, by, 50, 8);
    if (e.alive) {
      const hpR = e.hp / e.maxHp;
      ctx.fillStyle = hpR > 0.5 ? '#44aa44' : hpR > 0.25 ? '#aaaa44' : '#aa4444';
      ctx.fillRect(bx, by, 50 * hpR, 8);
    }
  }

  // Super throw hint
  if (controlled && controlled.alive && controlled.hasBall) {
    ctx.textAlign = 'center';
    ctx.font = '8px monospace';
    ctx.fillStyle = '#888888';
    ctx.fillText('Hold THROW for ' + controlled.super.toUpperCase() + ' BALL', GW / 2, GH - 5);
  }

  // Active item buffs
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  let buffY = GH - 65;
  if (itemEffects.speedBoost > 0) {
    ctx.fillStyle = '#44ddff';
    ctx.fillText('SPD UP ' + Math.ceil(itemEffects.speedBoost) + 's', 85, buffY);
    buffY -= 10;
  }
  if (itemEffects.powerBoost > 0) {
    ctx.fillStyle = '#ff8844';
    ctx.fillText('POW UP ' + Math.ceil(itemEffects.powerBoost) + 's', 85, buffY);
    buffY -= 10;
  }
  if (itemEffects.shield > 0) {
    ctx.fillStyle = '#44ff88';
    ctx.fillText('SHIELD ' + Math.ceil(itemEffects.shield) + 's', 85, buffY);
  }

  // Boss rage bar
  if (bossMode) {
    ctx.textAlign = 'center';
    ctx.font = '8px monospace';
    ctx.fillStyle = '#e6482e';
    ctx.fillText('BLOOM RAGE', GW / 2, COURT_TOP - 45);
    ctx.fillStyle = '#331100';
    ctx.fillRect(GW / 2 - 50, COURT_TOP - 42, 100, 6);
    ctx.fillStyle = bossRage >= 80 ? '#ff2200' : '#ff6600';
    ctx.fillRect(GW / 2 - 50, COURT_TOP - 42, bossRage, 6);
  }
}

// === DRAW MATCH INTRO ===
function drawMatchIntro() {
  const alpha = Math.min(1, matchIntro / 30);
  ctx.fillStyle = `rgba(0, 0, 0, ${alpha * 0.7})`;
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
  ctx.fillText(matchIntroText, GW / 2, GH / 2 - 10);
  ctx.font = '12px monospace';
  ctx.fillStyle = `rgba(200, 200, 200, ${alpha})`;
  const eIdx = Math.min(tournamentRound + 1, TEAMS.length - 1);
  ctx.fillText(TEAMS[eIdx].district, GW / 2, GH / 2 + 20);
  // Enemy taunt
  if (TEAMS[eIdx].taunt) {
    ctx.font = 'italic 10px monospace';
    ctx.fillStyle = `rgba(${hexToRgb(TEAMS[eIdx].colors[2])}, ${alpha * 0.8})`;
    ctx.fillText('"' + TEAMS[eIdx].taunt + '"', GW / 2, GH / 2 + 40);
  }
  // Boss warning
  if (TEAMS[eIdx].isBoss) {
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = `rgba(255, 68, 0, ${alpha * (Math.sin(frame * 0.2) * 0.3 + 0.7)})`;
    ctx.fillText('-- ALPHA BLOOM --', GW / 2, GH / 2 + 60);
  }
}

// === DRAW CATCH FLASH ===
function drawCatchFlash() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 24px monospace';
  ctx.fillStyle = `rgba(255, 255, 100, ${catchFlash})`;
  ctx.fillText(catchText, GW / 2, GH / 2 - 40);
}

// === DRAW SCORE POPUPS ===
function drawScorePopups() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 12px monospace';
  for (const pop of scorePopups) {
    const alpha = pop.life / pop.maxLife;
    ctx.fillStyle = pop.color.replace(')', ', ' + alpha + ')').replace('rgb', 'rgba');
    // Handle hex colors
    if (pop.color.startsWith('#')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pop.color;
    }
    ctx.fillText(pop.text, pop.x, pop.y);
    ctx.globalAlpha = 1;
  }
}

// === DRAW MATCH END ===
function drawMatchEnd() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 32px monospace';
  if (matchResult === 'win') {
    ctx.fillStyle = '#38d973';
    ctx.fillText('GARDEN CLEARED!', GW / 2, GH / 2 - 20);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('+' + (30 + tournamentRound * 10) + ' Spore Gems', GW / 2, GH / 2 + 15);
  } else {
    ctx.fillStyle = '#e6482e';
    ctx.fillText('COMPOSTED!', GW / 2, GH / 2 - 20);
  }
  ctx.font = '12px monospace';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Press THROW to continue', GW / 2, GH / 2 + 45);
}

// === DRAW SHOP ===
function drawShop() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText('GARDEN SUPPLY SHOP', GW / 2, 30);

  ctx.font = '11px monospace';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('Spore Gems: ' + tokens, GW / 2, 50);

  ctx.textAlign = 'left';
  for (let i = 0; i < POWERUPS.length; i++) {
    const item = POWERUPS[i];
    const y = 80 + i * 30;
    const selected = i === shopCursor;

    if (selected) {
      ctx.fillStyle = '#1a2c1a';
      ctx.fillRect(60, y - 8, 360, 26);
      ctx.strokeStyle = '#38d973';
      ctx.lineWidth = 1;
      ctx.strokeRect(60, y - 8, 360, 26);
    }

    ctx.font = selected ? 'bold 12px monospace' : '12px monospace';
    ctx.fillStyle = tokens >= item.cost ? '#ffffff' : '#666666';
    ctx.fillText(item.name, 80, y + 6);
    ctx.fillStyle = '#f4b41b';
    ctx.fillText(item.cost + 'G', 240, y + 6);
    ctx.fillStyle = '#3cacd7';
    ctx.fillText(item.desc, 290, y + 6);
  }

  // Continue option
  const contY = 80 + POWERUPS.length * 30;
  const contSelected = shopCursor === POWERUPS.length;
  if (contSelected) {
    ctx.fillStyle = '#1a2c1a';
    ctx.fillRect(60, contY - 8, 360, 26);
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 1;
    ctx.strokeRect(60, contY - 8, 360, 26);
  }
  ctx.font = contSelected ? 'bold 14px monospace' : '14px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText('>> NEXT GARDEN >>', 80, contY + 6);

  // Stats display
  ctx.textAlign = 'right';
  ctx.font = '9px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('SPD +' + playerStats.speed, GW - 20, GH - 50);
  ctx.fillText('DEF +' + playerStats.defense, GW - 20, GH - 38);
  ctx.fillText('POW +' + playerStats.power, GW - 20, GH - 26);
  ctx.fillText('CHG +' + playerStats.charge, GW - 20, GH - 14);

  ctx.textAlign = 'center';
  ctx.font = '10px monospace';
  ctx.fillStyle = '#666666';
  ctx.fillText('UP/DOWN: Select | THROW: Buy/Continue to next garden', GW / 2, GH - 5);

  // Draw particles for shop too
  drawParticles();
}

// === DRAW GAME OVER ===
function drawGameOver() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#e6482e';
  ctx.fillText('GARDEN ELIMINATED', GW / 2, GH / 2 - 40);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Score: ' + score, GW / 2, GH / 2);

  ctx.font = '12px monospace';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('Best: ' + highScore, GW / 2, GH / 2 + 25);

  ctx.fillStyle = '#888888';
  ctx.fillText('Survived ' + (tournamentRound + 1) + ' garden rounds', GW / 2, GH / 2 + 50);

  ctx.font = '11px monospace';
  ctx.fillStyle = '#aaaaaa';
  const blink = Math.sin(frame * 0.1) > 0;
  if (blink) ctx.fillText('Press THROW to return', GW / 2, GH / 2 + 80);
}

// === DRAW VICTORY ===
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  if (frame % 5 === 0) {
    spawnParticle(rnd(50, GW - 50), rnd(20, 60), rnd(-50, 50), rnd(50, 150),
      `hsl(${rnd(0, 360)}, 80%, 60%)`, rnd(1, 2), rnd(3, 6));
  }
  drawParticles();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('GARDEN CHAMPION!', GW / 2, GH / 2 - 50);

  ctx.font = '16px monospace';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(PLAYER_NAME + "'s baseling team rules the garden!", GW / 2, GH / 2 - 10);

  ctx.font = '14px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText('Final Score: ' + score, GW / 2, GH / 2 + 25);

  ctx.font = '11px monospace';
  ctx.fillStyle = '#aaaaaa';
  const blink = Math.sin(frame * 0.1) > 0;
  if (blink) ctx.fillText('Press THROW to return', GW / 2, GH / 2 + 60);
}

// === UTILITY: hex to rgb string ===
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return r + ',' + g + ',' + b;
}

// === UTILITY: darken/lighten hex color ===
function darkenColor(hex, factor) {
  const r = Math.floor(parseInt(hex.slice(1, 3), 16) * factor);
  const g = Math.floor(parseInt(hex.slice(3, 5), 16) * factor);
  const b = Math.floor(parseInt(hex.slice(5, 7), 16) * factor);
  return '#' + clamp(r, 0, 255).toString(16).padStart(2, '0') + clamp(g, 0, 255).toString(16).padStart(2, '0') + clamp(b, 0, 255).toString(16).padStart(2, '0');
}

function lightenColor(hex, factor) {
  return darkenColor(hex, factor);
}

// === DRAW TUTORIAL ===
function drawTutorial() {
  const step = Math.floor(frame / 150) % 5;
  const alpha = 0.85;
  ctx.globalAlpha = alpha;

  // Tutorial box
  ctx.fillStyle = '#000000';
  ctx.fillRect(GW / 2 - 140, 30, 280, 55);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 2;
  ctx.strokeRect(GW / 2 - 140, 30, 280, 55);

  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE TRAINING', GW / 2, 42);

  ctx.font = '9px monospace';
  ctx.fillStyle = '#ffffff';
  switch (step) {
    case 0:
      ctx.fillText('ARROWS to move your baseling around the arena', GW / 2, 56);
      ctx.fillText('Stay on YOUR side of the garden (left half)', GW / 2, 68);
      break;
    case 1:
      ctx.fillText('Press Z/THROW to pick up and hurl spore balls', GW / 2, 56);
      ctx.fillText('HOLD to charge a SUPER spore throw!', GW / 2, 68);
      break;
    case 2:
      ctx.fillText('Press X/SWAP to switch between your baselings', GW / 2, 56);
      ctx.fillText('Press C/SPRINT to dash faster (uses stamina)', GW / 2, 68);
      break;
    case 3:
      ctx.fillText('Press THROW as a spore ball arrives to CATCH it!', GW / 2, 56);
      ctx.fillText('Catching super throws = huge spore gems!', GW / 2, 68);
      break;
    case 4:
      ctx.fillText('Collect garden seeds and POOP tokens on the court', GW / 2, 56);
      ctx.fillText('Watch out for blight hazards! Grow strong!', GW / 2, 68);
      break;
  }

  // Step dots
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(GW / 2 - 16 + i * 8, 78, 2, 0, Math.PI * 2);
    ctx.fillStyle = i === step ? '#38d973' : '#333333';
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

// === NES PIXEL HELPER: draw a pixel block ===
function drawPixel(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), size, size);
}

// === DRAW BASELING PIXEL SPRITE ===
function drawBaselingSprite(x, y, colors, facing, animFrame, hasBall) {
  const px = 2; // pixel size
  const f = facing > 0 ? 1 : -1;
  const walk = Math.floor(animFrame * 0.15) % 2;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Feet (walk animation)
  drawPixel(-3 * f + (walk ? 2 : -2), 6, px, colors[1]);
  drawPixel(1 * f + (walk ? -2 : 2), 6, px, colors[1]);
  drawPixel(-3 * f + (walk ? 2 : -2), 8, px, colors[1]);
  drawPixel(1 * f + (walk ? -2 : 2), 8, px, colors[1]);

  // Body
  for (let by = -6; by <= 4; by += px) {
    for (let bx = -5; bx <= 3; bx += px) {
      drawPixel(bx, by, px, colors[0]);
    }
  }

  // Belt stripe
  for (let bx = -5; bx <= 3; bx += px) {
    drawPixel(bx, 0, px, colors[2]);
  }

  // Head
  for (let hy = -14; hy <= -8; hy += px) {
    for (let hx = -4; hx <= 2; hx += px) {
      drawPixel(hx, hy, px, '#ffcc88');
    }
  }

  // Eyes
  drawPixel(-2 * f, -12, px, '#000000');
  drawPixel(2 * f, -12, px, '#000000');

  // Arms
  if (hasBall) {
    drawPixel(5 * f, -4, px, colors[0]);
    drawPixel(5 * f, -6, px, colors[0]);
    drawPixel(7 * f, -8, px, colors[0]);
    // Ball in hand
    ctx.beginPath();
    ctx.arc(8 * f, -10, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#dd4422';
    ctx.fill();
  } else {
    drawPixel(-6, -2, px, colors[0]);
    drawPixel(-6, 0, px, colors[0]);
    drawPixel(5, -2, px, colors[0]);
    drawPixel(5, 0, px, colors[0]);
  }

  ctx.restore();
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
