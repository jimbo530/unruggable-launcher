<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,luck,
// swim}, clamped to the single-player band (0.8–1.6). The stat* helpers below read D&D-
// style fields on statB, so we keep statB's shape and synthesize its fields from the five
// bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20). Not a wager game
// -> default band. recomputeStats() re-runs after a title-screen character pick.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[rainbow-bridge] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[rainbow-bridge] player init failed:', e && e.message); });
}

// Derived stat helpers
function statDamage() { return 1 + (statB.str - 10) * 0.1; } // STR: spore/stomp damage
function statSpeed() { return 1 + (statB.dex - 10) * 0.05; } // DEX: movement speed
function statJump() { return 1 + (statB.dex - 10) * 0.03; } // DEX: jump height
function statMaxHP() { return 3 + Math.floor((statB.con - 10) * 0.3) + statB.lives; } // CON: extra lives
function statScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.05); } // INT: score multiplier
function statRainbowLife() { return 1 + (statB.int - 10) * 0.04; } // INT: spore bridge duration
function statWaterSense() { return statB.wis >= 14; } // WIS: muck warning earlier
function statLuck() { return statB.luck * (1 + (statB.cha - 10) * 0.06); } // CHA: item drop luck
function statCooldown() { return Math.max(0.3, statB.cooldown * (1 - (statB.dex - 10) * 0.02)); } // DEX: spore bridge cooldown
function statInvTime() { return 1.5 + (statB.con - 10) * 0.05; } // CON: invincibility time
function statCritChance() { return 0.05 + (statB.luck - 1) * 0.03 + (statB.cha - 10) * 0.01; } // CHA+luck: crit chance
function statGemRadius() { return 1 + (statB.wis - 10) * 0.04; } // WIS: gem pickup radius
function statDoubleJump() { return statB.dex >= 16; } // DEX 16+: double jump unlock
function statRainbowMax() { return RAINBOW_MAX + (statB.int >= 16 ? 1 : 0); } // INT 16+: extra spore bridge

// === GAME CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'SPORE', c: 'PICK' } });

var TILE = 16;
var COLS = Math.ceil(GW / TILE);
var LEVEL_SCREENS = 8;
var LEVEL_ROWS = Math.ceil(GH / TILE) * LEVEL_SCREENS;
var GRAVITY = 980;
var MAX_FALL = 400;
var JUMP_VEL = -320;
var MOVE_SPEED = 120;
var RAINBOW_MAX = 3;
var RAINBOW_LIFE = 3.0;
var RAINBOW_WIDTH = 48;
var RAINBOW_HEIGHT = 8;
var WATER_BASE_SPEED = 12;

// Spore spectrum colors
var ROYGBIV = ['#e6482e','#f4b41b','#f4b41b','#38d973','#3cacd7','#a855f7','#7a444a'];
var GEM_COLORS = ['#e6482e','#f4b41b','#f4d44b','#38d973','#3cacd7','#a855f7','#c06aff'];

// Baseling-themed world zones
var WORLDS = [
  { name: 'Mycelium Marsh', bg1: '#1a2a1a', bg2: '#0d1c0d', platColor: '#3a5a2a', accent: '#38d973', waterSpeed: 1.0,
    enemies: ['sporeling','mushcap','mire_toad','spore_turret'], bossName: 'Mycelium Monarch', bossColor: '#38d973' },
  { name: 'Prismatic Caverns', bg1: '#1a1c2c', bg2: '#0d0e18', platColor: '#3a3456', accent: '#a855f7', waterSpeed: 1.3,
    enemies: ['shard_bat','geode_crawler','prism_eye','crystal_turret'], bossName: 'Prismatic Fungoid', bossColor: '#a855f7' },
  { name: 'Garden Ruins', bg1: '#2a1a18', bg2: '#1c0d0c', platColor: '#7a444a', accent: '#f4b41b', waterSpeed: 1.6,
    enemies: ['rust_drone','slag_hopper','cinder_worm','reactor_turret'], bossName: 'Compost Golem', bossColor: '#f4b41b' },
  { name: 'Spore Canopy', bg1: '#1a2230', bg2: '#0d1420', platColor: '#2a4a5a', accent: '#3cacd7', waterSpeed: 2.0,
    enemies: ['wind_wisp','sky_sentinel','storm_orb','arc_turret'], bossName: 'Canopy Lord', bossColor: '#3cacd7' }
];

// === SCORE POPUPS ===
var scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, maxLife: 1.2 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 30 * dt;
    scorePopups[i].life -= dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.life / (sp.maxLife * 0.3));
    ctx.fillStyle = sp.color;
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === COMBO SYSTEM ===
var combo = 0;
var comboTimer = 0;
var COMBO_TIMEOUT = 2.0;
function addCombo() {
  combo++;
  comboTimer = COMBO_TIMEOUT;
  if (combo >= 5) {
    addScorePopup(player.x + 6, player.y - 20, 'COMBO x' + combo + '!', '#ff44ff');
  }
}
function getComboMult() { return 1 + Math.min(combo, 20) * 0.1; }
function updateCombo(dt) {
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; comboTimer = 0; }
  }
}

// === HAZARDS ===
var hazards = [];

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('rainbowbridge_hi');
var lives = 3;
var level = 1;
var frame = 0;
var totalKills = 0;
var gemsTotal = 0;
var showTutorial = !TAS.score.load('rainbowbridge_played');
var tutorialStep = 0;
var tutorialTimer = 0;

// Player
var player = { x: 0, y: 0, vx: 0, vy: 0, w: 12, h: 14, facing: 1, onGround: false, invincible: 0, jumpHeld: false, doubleJumped: false, rainbowCooldown: 0, stompCombo: 0 };
// Camera
var camY = 0;
var camShakeX = 0;
var camShakeY = 0;
// Water
var waterY = 0;
// Rainbows
var rainbows = [];
// Platforms
var platforms = [];
// Enemies
var enemies = [];
// Items (gems, powerups)
var items = [];
// Projectiles (enemy shots)
var projectiles = [];
// Gems collected this level (by color index)
var gemsCollected = [false,false,false,false,false,false,false];
// Powerups active
var powerDouble = 0;
var powerSpeed = 0;
var powerStar = 0;
var powerExtend = 0;
var powerShield = 0;
// Level height
var levelHeight = 0;
// Boss
var boss = null;
var bossActive = false;
// Level complete
var levelComplete = false;
var levelCompleteTimer = 0;
// Death animation
var deathTimer = 0;
// Input edge detection
var jumpWasPressed = false;
var rainbowWasPressed = false;
// Background decorations
var bgDecos = [];
// Zone transition
var zoneTransAlpha = 0;
var zoneTransTimer = 0;
// Ambient particles
var ambientTimer = 0;
// Minimap
var minimapOn = true;

// Trail effect for player
var playerTrail = [];
var TRAIL_MAX = 8;

// === HELPERS ===
function worldIndex() { return Math.floor((level - 1) / 5); }
function worldTheme() { return WORLDS[Math.min(worldIndex(), 3)]; }
function isBossLevel() { return level % 5 === 0; }

function addScore(pts, x, y, label) {
  var final = Math.ceil(pts * statScoreMult() * getComboMult());
  score += final;
  if (x !== undefined && y !== undefined) {
    addScorePopup(x, y, (label || '+') + final, '#ffdd44');
  }
}

function resetPlayer() {
  player.x = GW / 2 - player.w / 2;
  player.y = levelHeight - 40;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.invincible = statInvTime(); // CON: longer invincibility
  player.facing = 1;
  player.doubleJumped = false;
  player.rainbowCooldown = 0;
  player.stompCombo = 0;
  playerTrail = [];
}

// === LEVEL GENERATION ===
function generateLevel() {
  platforms = [];
  enemies = [];
  items = [];
  projectiles = [];
  rainbows = [];
  bgDecos = [];
  hazards = [];
  scorePopups = [];
  gemsCollected = [false,false,false,false,false,false,false];
  powerDouble = 0; powerSpeed = 0; powerStar = 0; powerExtend = 0; powerShield = 0;
  boss = null;
  bossActive = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  combo = 0; comboTimer = 0;

  levelHeight = GH * LEVEL_SCREENS;
  waterY = levelHeight + 60;

  var theme = worldTheme();
  var wi = worldIndex();

  // Ground platform
  platforms.push({ x: 0, y: levelHeight - TILE, w: GW, h: TILE, type: 'ground' });

  // Generate platforms going up
  var lastY = levelHeight - 60;
  var gemIdx = 0;

  for (var py = levelHeight - 80; py > 60; py -= TAS.math.randInt(34, 54)) {
    var pw = TAS.math.randInt(32, 72);
    var px = TAS.math.randInt(8, GW - pw - 8);
    var platType = 'normal';

    // Special platform types per zone
    if (wi >= 1 && Math.random() < 0.12) platType = 'crumbling';
    if (wi >= 2 && Math.random() < 0.08) platType = 'moving';
    if (wi >= 3 && Math.random() < 0.06) platType = 'ice';

    var plat = { x: px, y: py, w: pw, h: 8, type: platType, origX: px, movePhase: Math.random() * Math.PI * 2, crumbleTimer: -1 };
    platforms.push(plat);

    // Add enemies on some platforms (more on higher worlds)
    var enemyChance = 0.2 + wi * 0.1;
    if (Math.random() < enemyChance && py > 200) {
      var etypes = theme.enemies;
      var eidx = 0;
      var r = Math.random();
      if (r < 0.15 && wi >= 0) eidx = 3; // turret type
      else if (r < 0.35 && wi >= 1) eidx = 1; // crawler/hopper
      else if (r < 0.50 && wi >= 2) eidx = 2; // special
      enemies.push(createEnemy(etypes[eidx], px + pw / 2, py - 16, px, px + pw));
    }

    // Place gems (one of each ROYGBIV color per level)
    if (gemIdx < 7 && Math.random() < 0.25) {
      items.push({ x: px + pw / 2 - 4, y: py - 20, w: 8, h: 8, type: 'gem', color: gemIdx, vy: 0, grounded: true });
      gemIdx++;
    }

    // Occasional powerup (CHA luck affects rate)
    if (Math.random() < 0.06 * statLuck()) {
      var ptypes = ['double','speed','star','extend','shield','mana'];
      var ptype = ptypes[TAS.math.randInt(0, ptypes.length - 1)];
      items.push({ x: px + pw / 2 - 5, y: py - 22, w: 10, h: 10, type: ptype, vy: 0, grounded: true });
    }

    // Hazards per zone
    if (Math.random() < 0.05 + wi * 0.03) {
      var htype = ['spore_cloud','crystal_spike','steam_vent','lightning'][wi];
      hazards.push({ x: px + pw / 2, y: py - 24, w: 16, h: 16, type: htype, phase: Math.random() * Math.PI * 2, active: true });
    }

    lastY = py;
  }

  // Ensure remaining gems are placed
  while (gemIdx < 7) {
    var gy = TAS.math.randInt(200, levelHeight - 200);
    var gx = TAS.math.randInt(20, GW - 30);
    items.push({ x: gx, y: gy, w: 8, h: 8, type: 'gem', color: gemIdx, vy: 0, grounded: false });
    gemIdx++;
  }

  // Spore relic (rare per level, WIS increases chance)
  if (Math.random() < 0.15 * statLuck()) {
    var relicY = TAS.math.randInt(200, levelHeight - 300);
    items.push({ x: TAS.math.randInt(20, GW - 30), y: relicY, w: 12, h: 12, type: 'relic', vy: 0, grounded: false });
  }

  // Boss level: place boss near top
  if (isBossLevel()) {
    boss = createBoss(wi);
    bossActive = true;
  }

  // Goal platform at top
  platforms.push({ x: GW / 2 - 40, y: 40, w: 80, h: 10, type: 'goal' });

  // Background decorations (more per zone)
  for (var d = 0; d < 40 + wi * 10; d++) {
    bgDecos.push({
      x: TAS.math.randInt(0, GW),
      y: TAS.math.randInt(0, levelHeight),
      size: TAS.math.randInt(2, 6),
      type: TAS.math.randInt(0, 5),
      phase: Math.random() * Math.PI * 2
    });
  }

  resetPlayer();
  camY = levelHeight - GH;
}

function createEnemy(type, x, y, minX, maxX) {
  var wi = worldIndex();
  var baseHp = 1 + Math.floor(wi * 0.5);
  var isFlyer = type === 'shard_bat' || type === 'wind_wisp';
  var isBouncer = type === 'mire_toad' || type === 'slag_hopper' || type === 'geode_crawler' || type === 'storm_orb';
  var isTurret = type.indexOf('turret') >= 0;
  var isSpecial = type === 'prism_eye' || type === 'cinder_worm' || type === 'sky_sentinel' || type === 'spore_turret';

  return {
    type: type,
    x: x, y: y, w: 14, h: 14,
    vx: isFlyer ? 0 : isTurret ? 0 : (Math.random() < 0.5 ? -30 - wi * 5 : 30 + wi * 5),
    vy: 0,
    minX: minX - 20, maxX: maxX + 20,
    hp: isTurret ? baseHp + 1 : baseHp,
    maxHp: isTurret ? baseHp + 1 : baseHp,
    phase: Math.random() * Math.PI * 2,
    baseY: y,
    shootTimer: 2.5 - wi * 0.3,
    alive: true,
    isFlyer: isFlyer,
    isBouncer: isBouncer,
    isTurret: isTurret,
    isSpecial: isSpecial,
    flashTimer: 0
  };
}

function createBoss(worldIdx) {
  var hp = Math.ceil((6 + worldIdx * 4) / statDamage()); // STR: fewer hits needed
  return {
    x: GW / 2, y: 120, w: 36, h: 36,
    vx: 40 + worldIdx * 15,
    hp: hp, maxHp: hp,
    phase: 0,
    shootTimer: 1.5 - worldIdx * 0.15,
    shootCooldown: 0,
    alive: true,
    flash: 0,
    pattern: 0,
    patternTimer: 0,
    enraged: false
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateCombo(dt);

  // Zone transition fade
  if (zoneTransTimer > 0) {
    zoneTransTimer -= dt;
    zoneTransAlpha = zoneTransTimer > 0.5 ? (1 - zoneTransTimer) * 2 : zoneTransTimer * 2;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; // consume so it doesn't reopen / start
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'levelIntro') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      state = 'playing';
      if (showTutorial && level === 1) {
        tutorialStep = 1;
        tutorialTimer = 6;
      }
    }
    return;
  }

  if (state === 'levelClear') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      var prevWorld = worldIndex();
      level++;
      if (level > 20) {
        score += 50000;
        if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        // Zone transition effect
        if (worldIndex() !== prevWorld) {
          zoneTransTimer = 1.0;
        }
        generateLevel();
        state = 'levelIntro';
        levelCompleteTimer = 2.0;
      }
    }
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt;
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        resetPlayer();
        waterY = Math.max(waterY, player.y + GH);
        state = 'playing';
      }
    }
    updateCamera();
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
    // Tutorial
    if (tutorialTimer > 0) {
      tutorialTimer -= dt;
      if (tutorialTimer <= 0) {
        tutorialStep++;
        if (tutorialStep > 3) {
          tutorialStep = 0;
          showTutorial = false;
          TAS.score.save('rainbowbridge_played', 1);
        } else {
          tutorialTimer = 5;
        }
      }
    }
  }
}

function updatePlaying(dt) {
  // Input
  var left = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
  var right = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
  var jumpPress = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a;
  var rainbowPress = TAS.input.keys['KeyX'] || TAS.input.keys['KeyZ'] || TAS.input.touch.b;

  var jumpEdge = jumpPress && !jumpWasPressed;
  var rainbowEdge = rainbowPress && !rainbowWasPressed;
  jumpWasPressed = jumpPress;
  rainbowWasPressed = rainbowPress;

  // Movement (DEX: speed bonus)
  var spd = MOVE_SPEED * statSpeed();
  if (powerSpeed > 0) spd *= 1.5;
  if (left) { player.vx = -spd; player.facing = -1; }
  else if (right) { player.vx = spd; player.facing = 1; }
  else { player.vx = 0; }

  // Jump (DEX: jump height)
  if (jumpEdge && player.onGround) {
    player.vy = JUMP_VEL * statJump();
    player.onGround = false;
    player.jumpHeld = true;
    player.doubleJumped = false;
    TAS.audio.playTone(280, 0.1, 'square', 0.06, 400);
  }
  // Double jump (DEX 16+)
  else if (jumpEdge && !player.onGround && !player.doubleJumped && statDoubleJump()) {
    player.vy = JUMP_VEL * statJump() * 0.75;
    player.doubleJumped = true;
    TAS.audio.playTone(350, 0.08, 'square', 0.05, 500);
    TAS.particles.spawn(player.x + 6, player.y + player.h, statB.color, 4, 1);
  }
  // Variable jump height
  if (!jumpPress && player.vy < -100) {
    player.vy *= 0.5;
  }

  // Rainbow creation (DEX: cooldown)
  if (player.rainbowCooldown > 0) player.rainbowCooldown -= dt;
  if (rainbowEdge && player.rainbowCooldown <= 0) {
    createRainbow();
    player.rainbowCooldown = statCooldown();
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx * dt;
  // Wrap horizontally
  if (player.x + player.w < 0) player.x = GW;
  if (player.x > GW) player.x = -player.w;

  // Player trail
  if (Math.abs(player.vx) > 10 || Math.abs(player.vy) > 50) {
    playerTrail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, life: 0.3 });
    if (playerTrail.length > TRAIL_MAX) playerTrail.shift();
  }
  for (var ti = playerTrail.length - 1; ti >= 0; ti--) {
    playerTrail[ti].life -= dt;
    if (playerTrail[ti].life <= 0) playerTrail.splice(ti, 1);
  }

  // Move Y & collision
  player.y += player.vy * dt;
  player.onGround = false;

  // Platform collision (only when falling)
  if (player.vy >= 0) {
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (p.crumbleTimer >= 0 && p.crumbleTimer < 0.1) continue; // fully crumbled
      if (checkPlatformCollision(player, p)) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        player.doubleJumped = false;
        player.stompCombo = 0;
        // Trigger crumble on crumbling platforms
        if (p.type === 'crumbling' && p.crumbleTimer < 0) {
          p.crumbleTimer = 0.8;
        }
        break;
      }
    }
    // Rainbow collision
    if (!player.onGround) {
      for (var i = 0; i < rainbows.length; i++) {
        var rb = rainbows[i];
        if (rb.life > 0 && checkRainbowCollision(player, rb)) {
          player.y = rb.y - player.h;
          player.vy = 0;
          player.onGround = true;
          player.doubleJumped = false;
          break;
        }
      }
    }
  }

  // Stomp detection: if falling fast and landing on enemy
  if (player.vy > 150 && !player.onGround) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      if (!e.alive) continue;
      var feet = player.y + player.h;
      if (player.x + player.w > e.x - e.w/2 && player.x < e.x + e.w/2 &&
          feet >= e.y - e.h/2 && feet <= e.y + e.h/4) {
        stompEnemy(e, i);
        player.vy = JUMP_VEL * 0.6;
        player.stompCombo++;
        break;
      }
    }
  }

  // Water rising
  var theme = worldTheme();
  waterY -= WATER_BASE_SPEED * theme.waterSpeed * dt;
  // Water kills
  if (player.y + player.h > waterY) {
    killPlayer();
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible -= dt;
  // Powerup timers
  if (powerDouble > 0) powerDouble -= dt;
  if (powerSpeed > 0) powerSpeed -= dt;
  if (powerStar > 0) powerStar -= dt;
  if (powerExtend > 0) powerExtend -= dt;
  if (powerShield > 0) powerShield -= dt;

  // Update rainbows
  updateRainbows(dt);

  // Update enemies
  updateEnemies(dt);

  // Update boss
  if (boss && boss.alive) {
    updateBoss(dt);
  }

  // Update projectiles
  updateProjectiles(dt);

  // Update items
  updateItems(dt);

  // Update hazards
  updateHazards(dt);

  // Update platform specials
  updatePlatforms(dt);

  // Ambient zone particles
  ambientTimer -= dt;
  if (ambientTimer <= 0) {
    spawnAmbientParticle();
    ambientTimer = 0.3 + Math.random() * 0.5;
  }

  // Check player-enemy collision
  if (player.invincible <= 0 && powerStar <= 0 && powerShield <= 0) {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        killPlayer();
        break;
      }
    }
    // Boss collision
    if (boss && boss.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
      killPlayer();
    }
    // Projectile collision
    for (var i = 0; i < projectiles.length; i++) {
      var pr = projectiles[i];
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pr.x - 3, pr.y - 3, 6, 6)) {
        if (powerShield > 0) {
          powerShield = 0;
          projectiles.splice(i, 1);
          TAS.particles.spawn(player.x + 6, player.y + 7, '#44ffff', 6, 2);
          addScorePopup(player.x + 6, player.y - 10, 'SHIELD!', '#44ffff');
          break;
        }
        killPlayer();
        projectiles.splice(i, 1);
        break;
      }
    }
    // Hazard collision
    for (var i = 0; i < hazards.length; i++) {
      var hz = hazards[i];
      if (!hz.active) continue;
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hz.x - hz.w/2, hz.y - hz.h/2, hz.w, hz.h)) {
        killPlayer();
        break;
      }
    }
  }
  // Star kills enemies on contact (STR: more damage particles)
  if (powerStar > 0) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      if (e.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        killEnemy(e, i);
      }
    }
  }
  // Shield absorbs one hit
  if (powerShield > 0 && player.invincible <= 0) {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        powerShield = 0;
        player.invincible = 1.0;
        TAS.particles.spawn(player.x + 6, player.y + 7, '#44ffff', 8, 2);
        addScorePopup(player.x + 6, player.y - 10, 'BLOCKED!', '#44ffff');
        break;
      }
    }
  }

  // Check item collision (WIS: bigger pickup radius)
  var pickRad = 2 * statGemRadius();
  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    if (TAS.hit.rectOverlap(player.x - pickRad, player.y - pickRad, player.w + pickRad * 2, player.h + pickRad * 2, it.x, it.y, it.w, it.h)) {
      collectItem(it, i);
    }
  }

  // Goal check
  if (!bossActive) {
    var goal = platforms[platforms.length - 1];
    if (goal.type === 'goal' && player.y + player.h <= goal.y + 4 && player.y + player.h >= goal.y - 8 &&
        player.x + player.w > goal.x && player.x < goal.x + goal.w) {
      completeLevel();
    }
  }

  updateCamera();
}

function checkPlatformCollision(pl, plat) {
  var feet = pl.y + pl.h;
  var prevFeet = feet - pl.vy * (1/60);
  return pl.x + pl.w > plat.x && pl.x < plat.x + plat.w &&
         feet >= plat.y && feet <= plat.y + 12 &&
         prevFeet <= plat.y + 4;
}

function checkRainbowCollision(pl, rb) {
  var rx = rb.x;
  var ry = rb.y;
  var rw = rb.w;
  var feet = pl.y + pl.h;
  return pl.x + pl.w > rx && pl.x < rx + rw &&
         feet >= ry && feet <= ry + 10 &&
         pl.vy >= 0;
}

function createRainbow() {
  var active = 0;
  for (var i = 0; i < rainbows.length; i++) {
    if (rainbows[i].life > 0) active++;
  }
  var maxRb = statRainbowMax(); // INT 16+: extra rainbow
  if (powerDouble > 0) maxRb++;
  if (active >= maxRb) return;

  var rbLife = (powerExtend > 0 ? RAINBOW_LIFE * 1.5 : RAINBOW_LIFE) * statRainbowLife(); // INT: longer rainbows
  var rbW = RAINBOW_WIDTH;
  var rx = player.x + (player.facing > 0 ? player.w : -rbW);
  var ry = player.y - 14;

  var rb = { x: rx, y: ry, w: rbW, h: RAINBOW_HEIGHT, life: rbLife, maxLife: rbLife, facing: player.facing, justCreated: true };
  rainbows.push(rb);

  if (powerDouble > 0) {
    var rb2 = { x: rx + player.facing * 16, y: ry - 20, w: rbW, h: RAINBOW_HEIGHT, life: rbLife, maxLife: rbLife, facing: player.facing, justCreated: true };
    rainbows.push(rb2);
  }

  TAS.audio.playMelody([
    [523, 0.06, 'sine', 0.06],
    [659, 0.06, 'sine', 0.06],
    [784, 0.08, 'sine', 0.05]
  ], 40);

  // Rainbow damages enemies on creation (STR: damage multiplier for crit)
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.alive && TAS.hit.rectOverlap(rx, ry, rbW, RAINBOW_HEIGHT, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
      var dmg = Math.ceil(statDamage());
      var isCrit = Math.random() < statCritChance();
      if (isCrit) dmg *= 2;
      damageEnemy(e, i, dmg, isCrit);
    }
  }
  // Damage boss (STR: more damage)
  if (boss && boss.alive && TAS.hit.rectOverlap(rx, ry, rbW, RAINBOW_HEIGHT + 8, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
    hitBoss();
  }
}

function updateRainbows(dt) {
  for (var i = rainbows.length - 1; i >= 0; i--) {
    var rb = rainbows[i];
    rb.life -= dt;
    rb.justCreated = false;
    if (rb.life <= 0) {
      dropItemsFromRainbow(rb);
      rainbows.splice(i, 1);
    }
  }
}

function dropItemsFromRainbow(rb) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.alive && e.y + e.h/2 >= rb.y - 4 && e.y - e.h/2 <= rb.y + rb.h &&
        e.x > rb.x && e.x < rb.x + rb.w) {
      if (Math.random() < 0.5 * statLuck()) { // CHA: better drops
        var ci = TAS.math.randInt(0, 6);
        items.push({ x: e.x - 4, y: rb.y, w: 8, h: 8, type: 'gem', color: ci, vy: -50, grounded: false });
      }
    }
  }
}

function updatePlatforms(dt) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'moving') {
      p.movePhase += dt * 1.5;
      p.x = p.origX + Math.sin(p.movePhase) * 30;
    }
    if (p.type === 'crumbling' && p.crumbleTimer >= 0) {
      p.crumbleTimer -= dt;
    }
  }
}

function updateEnemies(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.y < camY - 100 || e.y > camY + GH + 100) continue;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    if (e.isTurret) {
      // Turrets stay still and shoot
      e.shootTimer -= dt;
      if (e.shootTimer <= 0) {
        e.shootTimer = 2.5 - worldIndex() * 0.3;
        var dx = player.x - e.x;
        var dy = player.y - e.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0 && dist < GH * 0.6) {
          projectiles.push({ x: e.x, y: e.y + e.h/2, vx: (dx / dist) * 80, vy: (dy / dist) * 80, type: 'aimed' });
          TAS.audio.playTone(200, 0.06, 'sawtooth', 0.03);
        }
      }
    } else if (e.isFlyer) {
      e.phase += dt * 2.5;
      e.x += Math.cos(e.phase) * 45 * dt;
      e.y = e.baseY + Math.sin(e.phase * 0.7) * 25;
    } else if (e.isBouncer) {
      e.vy += GRAVITY * 0.5 * dt;
      e.y += e.vy * dt;
      if (e.y > e.baseY) {
        e.y = e.baseY;
        e.vy = -180 - worldIndex() * 20;
      }
      e.x += e.vx * dt;
      if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
    } else {
      // Walker types
      e.x += e.vx * dt;
      if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
    }
  }
}

function updateBoss(dt) {
  boss.phase += dt;
  boss.patternTimer -= dt;

  // Enrage at 30% HP
  if (!boss.enraged && boss.hp <= boss.maxHp * 0.3) {
    boss.enraged = true;
    boss.vx *= 1.5;
    boss.shootTimer *= 0.6;
    TAS.fx.flash('#ff0000', 0.3);
    addScorePopup(boss.x, boss.y - 30, 'ENRAGED!', '#ff0000');
  }

  // Pattern switching
  if (boss.patternTimer <= 0) {
    boss.pattern = (boss.pattern + 1) % 3;
    boss.patternTimer = 4 + Math.random() * 2;
  }

  // Movement
  switch (boss.pattern) {
    case 0: // Side to side
      boss.x += boss.vx * dt;
      if (boss.x - boss.w/2 < 10 || boss.x + boss.w/2 > GW - 10) boss.vx = -boss.vx;
      boss.y = 100 + Math.sin(boss.phase * 1.5) * 30;
      break;
    case 1: // Chase player X
      var diff = player.x - boss.x;
      boss.x += Math.sign(diff) * Math.abs(boss.vx) * 0.8 * dt;
      boss.y = 80 + Math.sin(boss.phase * 2) * 20;
      break;
    case 2: // Circle pattern
      boss.x = GW / 2 + Math.cos(boss.phase * 2) * 80;
      boss.y = 100 + Math.sin(boss.phase * 2) * 40;
      break;
  }

  if (boss.flash > 0) boss.flash -= dt;

  boss.shootCooldown -= dt;
  if (boss.shootCooldown <= 0) {
    boss.shootCooldown = boss.shootTimer;
    var wi = worldIndex();
    // World-specific attack patterns
    switch (wi) {
      case 0: // Spore spread
        for (var a = -2; a <= 2; a++) {
          projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: a * 25, vy: 70 + Math.abs(a) * 10, type: 'spore' });
        }
        break;
      case 1: // Crystal shards spiral
        for (var a = 0; a < 4; a++) {
          var ang = boss.phase * 2 + a * Math.PI / 2;
          projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: Math.cos(ang) * 60, vy: Math.sin(ang) * 60 + 40, type: 'crystal' });
        }
        break;
      case 2: // Reactor bombs (3 dropping)
        projectiles.push({ x: boss.x - 20, y: boss.y + boss.h/2, vx: 0, vy: 90, type: 'bomb' });
        projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: 0, vy: 100, type: 'bomb' });
        projectiles.push({ x: boss.x + 20, y: boss.y + boss.h/2, vx: 0, vy: 90, type: 'bomb' });
        break;
      case 3: // Lightning bolts
        projectiles.push({ x: player.x + TAS.math.randInt(-30, 30), y: camY, vx: 0, vy: 200, type: 'lightning' });
        projectiles.push({ x: player.x + TAS.math.randInt(-50, 50), y: camY, vx: 0, vy: 180, type: 'lightning' });
        break;
    }
    TAS.audio.playTone(150, 0.15, 'sawtooth', 0.04);
  }
}

function hitBoss() {
  if (!boss || !boss.alive) return;
  var dmg = Math.ceil(statDamage()); // STR: more damage
  var isCrit = Math.random() < statCritChance();
  if (isCrit) dmg *= 2;
  boss.hp -= dmg;
  boss.flash = 0.2;
  TAS.fx.shake(6, 0.85);
  camShakeX = (Math.random() - 0.5) * 4;
  camShakeY = (Math.random() - 0.5) * 4;
  TAS.audio.playTone(200, 0.2, 'square', 0.08, 80);
  addScore(200 * dmg, boss.x, boss.y - 20, isCrit ? 'CRIT! +' : '+');
  addCombo();

  if (isCrit) {
    TAS.particles.spawn(boss.x, boss.y, '#ffff00', 12, 3);
    addScorePopup(boss.x, boss.y - 30, 'CRITICAL!', '#ffff00');
  }

  if (boss.hp <= 0) {
    boss.alive = false;
    bossActive = false;
    addScore(5000, boss.x, boss.y - 10, 'FUNGUS FELLED! +');
    TAS.fx.flash('#ffff00', 0.5);
    TAS.fx.shake(10, 0.95);
    // Explosion burst
    for (var b = 0; b < 5; b++) {
      TAS.particles.spawn(boss.x + TAS.math.randInt(-15, 15), boss.y + TAS.math.randInt(-15, 15), '#ff4444', 8, 4, { gravity: 1 });
      TAS.particles.spawn(boss.x + TAS.math.randInt(-15, 15), boss.y + TAS.math.randInt(-15, 15), '#ffcc00', 6, 3);
    }
    TAS.particles.spawn(boss.x, boss.y, worldTheme().accent, 15, 4);
    // Boss drops relics
    items.push({ x: boss.x - 6, y: boss.y, w: 12, h: 12, type: 'relic', vy: -80, grounded: false });
    // Victory fanfare
    TAS.audio.playMelody([
      [523, 0.12, 'square', 0.08],
      [659, 0.12, 'square', 0.08],
      [784, 0.12, 'square', 0.08],
      [1047, 0.3, 'square', 0.1]
    ], 150);
  }
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    // Bomb type: accelerate downward
    if (p.type === 'bomb') p.vy += 80 * dt;
    // Lightning: fast
    if (p.type === 'lightning') p.vy += 100 * dt;
    // Remove offscreen
    if (p.y > camY + GH + 50 || p.y < camY - 50 || p.x < -20 || p.x > GW + 20) {
      projectiles.splice(i, 1);
    }
  }
}

function updateItems(dt) {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (!it.grounded) {
      it.vy += GRAVITY * 0.5 * dt;
      it.y += it.vy * dt;
      for (var j = 0; j < platforms.length; j++) {
        var p = platforms[j];
        if (it.y + it.h >= p.y && it.y + it.h <= p.y + 10 && it.x + it.w > p.x && it.x < p.x + p.w && it.vy > 0) {
          it.y = p.y - it.h;
          it.vy = 0;
          it.grounded = true;
          break;
        }
      }
    }
  }
}

function updateHazards(dt) {
  for (var i = 0; i < hazards.length; i++) {
    var hz = hazards[i];
    hz.phase += dt * 2;
    // Toggle active state for pulsing hazards
    if (hz.type === 'steam_vent' || hz.type === 'lightning') {
      hz.active = Math.sin(hz.phase) > 0;
    } else {
      hz.active = true;
    }
  }
}

function stompEnemy(e, idx) {
  var dmg = Math.ceil(statDamage() * (1 + player.stompCombo * 0.5));
  var isCrit = Math.random() < statCritChance();
  if (isCrit) dmg *= 2;
  damageEnemy(e, idx, dmg, isCrit);
  addCombo();
  TAS.audio.playTone(300, 0.08, 'square', 0.06, 150);
  if (player.stompCombo > 0) {
    addScorePopup(e.x, e.y - 16, 'STOMP x' + (player.stompCombo + 1) + '!', '#ff8844');
  }
}

function damageEnemy(e, idx, dmg, isCrit) {
  e.hp -= dmg;
  e.flashTimer = 0.15;
  if (e.hp <= 0) {
    killEnemy(e, idx);
    if (isCrit) {
      TAS.particles.spawn(e.x, e.y, '#ffff00', 10, 3);
    }
  } else {
    TAS.particles.spawn(e.x, e.y, '#ffffff', 3, 1);
    TAS.audio.playTone(350, 0.05, 'square', 0.04);
  }
}

function killEnemy(e, idx) {
  e.alive = false;
  totalKills++;
  var pts = e.isTurret ? 200 : e.isSpecial ? 150 : 100;
  addScore(pts, e.x, e.y - 10);
  addCombo();
  var particleCount = Math.ceil(6 * statDamage()); // STR: more particles
  TAS.particles.spawn(e.x, e.y, '#ff4444', particleCount, 2);
  TAS.particles.spawn(e.x, e.y, worldTheme().accent, 3, 1);
  TAS.audio.playTone(400, 0.08, 'square', 0.06, 100);
  // CHA: chance to drop extra gem
  if (Math.random() < 0.2 * statLuck()) {
    var ci = TAS.math.randInt(0, 6);
    items.push({ x: e.x - 4, y: e.y, w: 8, h: 8, type: 'gem', color: ci, vy: -60, grounded: false });
  }
}

function killPlayer() {
  if (player.invincible > 0 || powerStar > 0) return;
  if (powerShield > 0) {
    powerShield = 0;
    player.invincible = 1.0;
    TAS.particles.spawn(player.x + 6, player.y + 7, '#44ffff', 8, 2);
    addScorePopup(player.x + 6, player.y - 10, 'SHIELD!', '#44ffff');
    return;
  }
  state = 'dying';
  deathTimer = 1.5;
  player.vy = JUMP_VEL * 0.7;
  TAS.fx.shake(8, 0.9);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 60);
  TAS.particles.spawn(player.x + 6, player.y + 7, statB.color, 10, 3);
  combo = 0;
  comboTimer = 0;
}

function collectItem(it, idx) {
  items.splice(idx, 1);
  if (it.type === 'gem') {
    gemsCollected[it.color] = true;
    gemsTotal++;
    addScore(50, it.x + 4, it.y);
    TAS.particles.spawn(it.x + 4, it.y + 4, GEM_COLORS[it.color], 6, 2);
    TAS.audio.playTone(600 + it.color * 80, 0.1, 'sine', 0.06);
    addCombo();
    // Check if all 7 collected
    var allGems = true;
    for (var g = 0; g < 7; g++) { if (!gemsCollected[g]) { allGems = false; break; } }
    if (allGems) {
      addScore(10000, player.x + 6, player.y - 30, 'FULL SPECTRUM! +');
      TAS.fx.flash('#ffffff', 0.4);
      TAS.audio.playMelody([
        [523, 0.1, 'sine', 0.08], [587, 0.1, 'sine', 0.08],
        [659, 0.1, 'sine', 0.08], [698, 0.1, 'sine', 0.08],
        [784, 0.1, 'sine', 0.08], [880, 0.1, 'sine', 0.08],
        [988, 0.2, 'sine', 0.1]
      ], 80);
    }
  } else if (it.type === 'relic') {
    addScore(2500, it.x + 6, it.y, 'SPORE RELIC! +');
    TAS.particles.spawn(it.x + 6, it.y + 6, '#ffaa00', 12, 3);
    TAS.particles.spawn(it.x + 6, it.y + 6, '#ffffff', 8, 2);
    TAS.fx.flash('#ffaa00', 0.3);
    TAS.audio.playMelody([
      [659, 0.1, 'sine', 0.08],
      [784, 0.1, 'sine', 0.08],
      [988, 0.2, 'sine', 0.1]
    ], 100);
  } else if (it.type === 'mana') {
    // Mana potion: restore one rainbow instantly and boost
    powerExtend = Math.max(powerExtend, 5);
    addScorePopup(it.x + 5, it.y, 'MYCELIUM!', '#a855f7');
    TAS.particles.spawn(it.x + 5, it.y + 5, '#8844ff', 6, 2);
    TAS.audio.playTone(700, 0.12, 'sine', 0.06);
  } else if (it.type === 'shield') {
    powerShield = 15;
    addScorePopup(it.x + 5, it.y, 'SHIELD!', '#44ffff');
    TAS.particles.spawn(it.x + 5, it.y + 5, '#44ffff', 6, 2);
    TAS.audio.playTone(600, 0.12, 'sine', 0.06);
  } else if (it.type === 'double') {
    powerDouble = 10;
    addScorePopup(it.x + 5, it.y, 'DOUBLE SPORE!', '#a855f7');
    TAS.audio.playTone(800, 0.15, 'sine', 0.06);
  } else if (it.type === 'speed') {
    powerSpeed = 10;
    addScorePopup(it.x + 5, it.y, 'GARDEN SEED!', '#38d973');
    TAS.audio.playTone(900, 0.15, 'sine', 0.06);
  } else if (it.type === 'star') {
    powerStar = 8;
    addScorePopup(it.x + 5, it.y, 'POOP TOKEN!', '#f4b41b');
    TAS.audio.playTone(1000, 0.2, 'sine', 0.08);
    TAS.fx.flash('#ffff00', 0.2);
  } else if (it.type === 'extend') {
    powerExtend = 12;
    addScorePopup(it.x + 5, it.y, 'SPORE GROW!', '#3cacd7');
    TAS.audio.playTone(700, 0.15, 'sine', 0.06);
  }
}

function completeLevel() {
  if (levelComplete) return;
  levelComplete = true;
  state = 'levelClear';
  levelCompleteTimer = 3.0;
  var bonus = Math.max(0, Math.floor((waterY - player.y) * 2));
  addScore(bonus, player.x + 6, player.y - 20, 'SPEED +');
  if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
  // Fanfare
  TAS.audio.playMelody([
    [523, 0.15, 'square', 0.08],
    [659, 0.15, 'square', 0.08],
    [784, 0.15, 'square', 0.08],
    [1047, 0.4, 'square', 0.1]
  ], 160);
  TAS.particles.spawn(player.x + 6, player.y, '#ffdd44', 20, 3);
  TAS.particles.spawn(player.x + 6, player.y, '#ff44ff', 15, 3);
}

function updateCamera() {
  var targetY = player.y - GH * 0.35;
  camY += (targetY - camY) * 0.08;
  camY = TAS.math.clamp(camY, 0, levelHeight - GH);
  // Dampen shake
  camShakeX *= 0.85;
  camShakeY *= 0.85;
}

function spawnAmbientParticle() {
  var wi = worldIndex();
  var ax = TAS.math.randInt(0, GW);
  var ay = camY + TAS.math.randInt(0, GH);
  var colors = ['#38d97333', '#a855f733', '#f4b41b33', '#3cacd733'];
  TAS.particles.spawn(ax, ay, colors[wi] || '#ffffff33', 1, 1, { gravity: wi === 3 ? -0.3 : 0.1, size: 1 });
}

function startGame() {
  TAS.audio.ensureAudio();
  state = 'levelIntro';
  score = 0;
  lives = statMaxHP(); // CON: more starting lives
  level = 1;
  frame = 0;
  totalKills = 0;
  gemsTotal = 0;
  combo = 0;
  comboTimer = 0;
  TAS.particles.clear();
  generateLevel();
  levelCompleteTimer = 2.0;
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'levelIntro') {
    drawLevelIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();

  ctx.save();
  ctx.translate(camShakeX, -camY + camShakeY);

  drawBgDecos();
  drawPlatforms();
  drawHazards();
  drawItems();
  drawRainbows();
  drawPlayerTrail();
  drawEnemies();
  if (boss && boss.alive) drawBoss();
  drawProjectiles();
  drawPlayer();
  drawWater();
  drawScorePopups();

  TAS.particles.draw();
  ctx.restore();

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // Zone transition overlay
  if (zoneTransTimer > 0) {
    ctx.fillStyle = '#000';
    ctx.globalAlpha = Math.max(0, zoneTransAlpha);
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  drawHUD();
  drawMinimap();
  if (tutorialStep > 0) drawTutorial();
  TAS.input.drawTouchControls(GW, GH);

  if (state === 'levelClear') {
    drawLevelClear();
  }
}

function drawBackground() {
  var theme = worldTheme();
  var grd = ctx.createLinearGradient(0, 0, 0, GH);
  grd.addColorStop(0, theme.bg2);
  grd.addColorStop(1, theme.bg1);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  // Zone-specific parallax
  ctx.globalAlpha = 0.15;
  var wi = worldIndex();
  for (var i = 0; i < 14; i++) {
    var bx = ((i * 47 + frame * 0.1) % (GW + 40)) - 20;
    var by = ((i * 73 + camY * 0.2) % GH);
    ctx.fillStyle = theme.accent;
    if (wi === 0) {
      // Mushroom caps and spore clouds
      ctx.beginPath();
      ctx.arc(bx, by, 6 + i % 4, 0, Math.PI, true);
      ctx.fill();
      if (i % 3 === 0) {
        ctx.globalAlpha = 0.08;
        ctx.beginPath();
        ctx.arc(bx + 5, by - 10, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.15;
      }
    } else if (wi === 1) {
      // Crystal formations
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(i * 0.5);
      ctx.fillRect(-1, -5 - i % 4, 3, 10 + i % 6);
      ctx.restore();
    } else if (wi === 2) {
      // Gears and pipes
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(bx + 5, by - 1, 8 + i % 5, 2);
    } else {
      // Clouds and wind streaks
      ctx.beginPath();
      ctx.arc(bx, by, 10 + i % 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx + 8, by - 2, 7 + i % 3, 0, Math.PI * 2);
      ctx.fill();
      // Wind streaks
      ctx.globalAlpha = 0.08;
      ctx.fillRect(bx - 20, by + 8, 40, 1);
      ctx.globalAlpha = 0.15;
    }
  }
  ctx.globalAlpha = 1;
}

function drawBgDecos() {
  var theme = worldTheme();
  var wi = worldIndex();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = theme.accent;
  for (var i = 0; i < bgDecos.length; i++) {
    var d = bgDecos[i];
    if (d.y < camY - 20 || d.y > camY + GH + 20) continue;
    var pulse = Math.sin(frame * 0.02 + d.phase) * 0.5 + 0.5;
    ctx.globalAlpha = 0.1 + pulse * 0.15;
    if (d.type === 0) {
      ctx.fillRect(d.x, d.y, d.size, d.size);
    } else if (d.type === 1) {
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 2) {
      ctx.fillRect(d.x, d.y, d.size * 0.5, d.size * 2);
    } else if (d.type === 3) {
      // Tiny star
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = pulse * 0.3;
      ctx.fillRect(d.x, d.y, 1, 1);
      ctx.fillStyle = theme.accent;
    } else if (d.type === 4 && wi === 0) {
      // Small mushroom
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * 0.7, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(d.x - 1, d.y, 2, d.size);
    } else {
      // Vine/tendril
      ctx.fillRect(d.x, d.y, 1, d.size * 3);
    }
  }
  ctx.globalAlpha = 1;
}

function drawPlatforms() {
  var theme = worldTheme();
  var wi = worldIndex();
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.y < camY - 20 || p.y > camY + GH + 20) continue;

    // Crumbling platform fade out
    if (p.type === 'crumbling' && p.crumbleTimer >= 0) {
      if (p.crumbleTimer < 0.1) continue;
      ctx.globalAlpha = Math.min(1, p.crumbleTimer / 0.3);
      if (p.crumbleTimer < 0.3) {
        // Shake effect
        ctx.save();
        ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 2);
      }
    }

    if (p.type === 'goal') {
      var shimmer = Math.sin(frame * 0.08) * 0.3 + 0.7;
      ctx.fillStyle = '#f4b41b';
      ctx.globalAlpha = shimmer;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#f4b41b';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      var goalLabel = bossActive ? 'SEALED' : 'GARDEN GATE';
      ctx.fillText(goalLabel, p.x + p.w/2, p.y - 8);
      // Arrow animation
      if (!bossActive) {
        var arrowY = Math.sin(frame * 0.1) * 3;
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.moveTo(p.x + p.w/2, p.y - 18 + arrowY);
        ctx.lineTo(p.x + p.w/2 - 5, p.y - 24 + arrowY);
        ctx.lineTo(p.x + p.w/2 + 5, p.y - 24 + arrowY);
        ctx.fill();
      }
    } else if (p.type === 'ground') {
      ctx.fillStyle = theme.platColor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Ground detail per zone
      for (var gd = 0; gd < p.w; gd += 8) {
        ctx.fillStyle = theme.accent + '44';
        ctx.fillRect(p.x + gd, p.y + 4, 2, 2);
      }
    } else if (p.type === 'ice') {
      ctx.fillStyle = '#88ccee';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#aaeeff';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Ice sparkle
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1 + p.x) * 0.3;
      ctx.fillRect(p.x + p.w * 0.3, p.y + 1, 2, 2);
      ctx.fillRect(p.x + p.w * 0.7, p.y + 1, 2, 2);
      ctx.globalAlpha = 1;
    } else if (p.type === 'moving') {
      ctx.fillStyle = '#ccaa44';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#eedd66';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Direction arrows
      ctx.fillStyle = '#eedd6644';
      ctx.fillRect(p.x + 2, p.y + 3, 3, 2);
      ctx.fillRect(p.x + p.w - 5, p.y + 3, 3, 2);
    } else if (p.type === 'crumbling') {
      ctx.fillStyle = '#886655';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#aa8866';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Crack lines
      ctx.fillStyle = '#55443344';
      ctx.fillRect(p.x + p.w * 0.3, p.y + 2, 1, 4);
      ctx.fillRect(p.x + p.w * 0.6, p.y + 1, 1, 5);
      if (p.crumbleTimer >= 0 && p.crumbleTimer < 0.3) ctx.restore();
    } else {
      // Normal platform with zone theming
      ctx.fillStyle = theme.platColor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
      ctx.fillStyle = '#ffffff22';
      ctx.fillRect(p.x, p.y, 2, p.h);
      ctx.fillRect(p.x + p.w - 2, p.y, 2, p.h);
      // Zone decoration on platforms
      if (wi === 0 && p.w > 40 && Math.floor(p.x * 0.1) % 3 === 0) {
        // Small mushroom
        ctx.fillStyle = '#55aa5544';
        ctx.beginPath();
        ctx.arc(p.x + p.w / 2, p.y - 3, 4, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(p.x + p.w / 2 - 1, p.y - 3, 2, 3);
      }
    }

    ctx.globalAlpha = 1;
  }
}

function drawHazards() {
  var wi = worldIndex();
  for (var i = 0; i < hazards.length; i++) {
    var hz = hazards[i];
    if (hz.y < camY - 30 || hz.y > camY + GH + 30) continue;
    if (!hz.active && (hz.type === 'steam_vent' || hz.type === 'lightning')) {
      // Draw faded when inactive
      ctx.globalAlpha = 0.2;
    }
    var hx = hz.x - hz.w/2;
    var hy = hz.y - hz.h/2;
    switch (hz.type) {
      case 'spore_cloud':
        ctx.fillStyle = '#44aa4488';
        var sz = 6 + Math.sin(hz.phase) * 2;
        ctx.beginPath();
        ctx.arc(hz.x, hz.y, sz, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88ff8844';
        ctx.beginPath();
        ctx.arc(hz.x + 3, hz.y - 2, sz * 0.6, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'crystal_spike':
        ctx.fillStyle = '#8866cc';
        ctx.save();
        ctx.translate(hz.x, hz.y);
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(-4, 6);
        ctx.lineTo(4, 6);
        ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#aa88ee44';
        ctx.fillRect(hz.x - 1, hz.y - 7, 2, 3);
        break;
      case 'steam_vent':
        ctx.fillStyle = '#cc884488';
        ctx.fillRect(hx + 4, hy + 8, 8, 8);
        if (hz.active) {
          ctx.fillStyle = '#ffcc8844';
          for (var v = 0; v < 3; v++) {
            ctx.fillRect(hz.x - 2 + v * 3, hy - v * 4 + Math.sin(hz.phase + v) * 2, 3, 4);
          }
        }
        break;
      case 'lightning':
        if (hz.active) {
          ctx.fillStyle = '#88ccff';
          ctx.fillRect(hz.x - 1, hy, 2, hz.h);
          ctx.fillStyle = '#ffffff88';
          ctx.fillRect(hz.x, hy + 2, 1, hz.h - 4);
        }
        ctx.fillStyle = '#446688';
        ctx.beginPath();
        ctx.arc(hz.x, hy, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
    ctx.globalAlpha = 1;
  }
}

function drawRainbows() {
  for (var i = 0; i < rainbows.length; i++) {
    var rb = rainbows[i];
    var alpha = Math.min(1, rb.life / (rb.maxLife * 0.3));
    drawRainbowArc(rb.x + rb.w/2, rb.y + rb.h/2, rb.w/2, alpha);
  }
}

function drawRainbowArc(cx, cy, radius, alpha) {
  ctx.globalAlpha = alpha;
  var stripeH = 2;
  for (var s = 0; s < 7; s++) {
    ctx.fillStyle = ROYGBIV[s];
    var y = cy - 7 + s * stripeH;
    var w = radius * 2 * (1 - Math.abs(s - 3) * 0.05);
    var x = cx - w / 2;
    ctx.fillRect(x, y, w, stripeH);
  }
  if (Math.random() < 0.3) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - radius + Math.random() * 4, cy - 4 + Math.random() * 8, 2, 2);
    ctx.fillRect(cx + radius - Math.random() * 4, cy - 4 + Math.random() * 8, 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (it.y < camY - 20 || it.y > camY + GH + 20) continue;

    if (it.type === 'gem') {
      var bounce = Math.sin(frame * 0.06 + it.x) * 2;
      ctx.fillStyle = GEM_COLORS[it.color];
      ctx.save();
      ctx.translate(it.x + 4, it.y + 4 + bounce);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(it.x + 2, it.y + 1 + bounce, 2, 2);
    } else if (it.type === 'relic') {
      // Glowing spore relic
      var glow = Math.sin(frame * 0.08) * 0.3 + 0.7;
      ctx.globalAlpha = glow * 0.4;
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(it.x + 6, it.y + 6, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(it.x + 2, it.y + 2, 8, 8);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(it.x + 4, it.y + 4, 4, 4);
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(it.x + 4, it.y + 2, 2, 2);
    } else {
      // Powerup boxes
      var colors = { double: '#ff44ff', speed: '#44ff44', star: '#ffff44', extend: '#44ffff', shield: '#4488ff', mana: '#8844ff' };
      ctx.fillStyle = colors[it.type] || '#fff';
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.fillStyle = '#00000044';
      ctx.fillRect(it.x + 2, it.y + 2, it.w - 4, it.h - 4);
      ctx.fillStyle = colors[it.type] || '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      var labels = { double: 'x2', speed: 'SP', star: '*', extend: 'EX', shield: 'SH', mana: 'MP' };
      ctx.fillText(labels[it.type] || '?', it.x + it.w/2, it.y + it.h - 2);
    }
  }
}

function drawPlayerTrail() {
  for (var i = 0; i < playerTrail.length; i++) {
    var t = playerTrail[i];
    ctx.globalAlpha = t.life / 0.3 * 0.2;
    ctx.fillStyle = powerStar > 0 ? '#ffff44' : statB.color;
    ctx.fillRect(t.x - 2, t.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawEnemies() {
  var wi = worldIndex();
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.y < camY - 20 || e.y > camY + GH + 20) continue;

    var ex = e.x - e.w/2;
    var ey = e.y - e.h/2;

    // Flash white when hit
    if (e.flashTimer > 0) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex, ey, e.w, e.h);
      continue;
    }

    // Zone-themed enemy rendering
    if (e.isTurret) {
      // All turret types share a base look
      var turretColors = ['#668844', '#6644aa', '#886633', '#446688'];
      ctx.fillStyle = turretColors[wi] || '#666';
      ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
      ctx.fillStyle = '#aa2222';
      ctx.fillRect(ex + 3, ey, e.w - 6, 6);
      // Barrel pointing at player
      ctx.fillStyle = '#444';
      var barrelDir = player.x > e.x ? 1 : -1;
      ctx.fillRect(e.x + barrelDir * 5, ey + e.h - 3, barrelDir * 4, 2);
      // HP pips for multi-HP turrets
      if (e.maxHp > 1) {
        for (var hp = 0; hp < e.hp; hp++) {
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(ex + 2 + hp * 4, ey - 3, 3, 2);
        }
      }
    } else if (e.isFlyer) {
      // Flyer types
      var flyColors = ['#448844', '#6644aa', '#886644', '#448899'];
      ctx.fillStyle = flyColors[wi] || '#444488';
      ctx.fillRect(ex + 3, ey + 3, e.w - 6, e.h - 6);
      var wingOff = Math.sin(frame * 0.15) * 3;
      ctx.fillRect(ex - 3, ey + 4 + wingOff, 6, 3);
      ctx.fillRect(ex + e.w - 3, ey + 4 - wingOff, 6, 3);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex + 4, ey + 5, 2, 2);
      ctx.fillRect(ex + e.w - 6, ey + 5, 2, 2);
      // Zone flair
      if (wi === 1) {
        // Crystal bat sparkle
        ctx.fillStyle = '#aa88ff44';
        ctx.fillRect(ex + e.w/2 - 1, ey + 1, 2, 2);
      }
    } else if (e.isBouncer) {
      // Bouncer types
      var bounceColors = ['#44aa66', '#8866aa', '#cc8800', '#44aacc'];
      ctx.fillStyle = bounceColors[wi] || '#44cc44';
      var squish = e.vy < 0 ? 0.8 : 1.1;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.scale(1/squish, squish);
      ctx.beginPath();
      ctx.arc(0, 0, e.w/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex + 3, ey + 3, 2, 2);
      ctx.fillRect(ex + e.w - 5, ey + 3, 2, 2);
      // Zone flair
      if (wi === 0) {
        // Mire toad tongue when close
        if (Math.abs(player.x - e.x) < 40) {
          ctx.fillStyle = '#ff446644';
          ctx.fillRect(e.x - 1, ey + e.h/2, 2, 6);
        }
      }
    } else {
      // Walker types
      var walkColors = ['#cc4444', '#8844cc', '#886633', '#cc8844'];
      ctx.fillStyle = walkColors[wi] || '#cc4444';
      ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
      ctx.beginPath();
      ctx.arc(e.x, ey + 4, e.w/2, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex + 2, ey + 5, 3, 3);
      ctx.fillRect(ex + e.w - 5, ey + 5, 3, 3);
      ctx.fillStyle = '#000';
      var lookDir = e.vx > 0 ? 1 : 0;
      ctx.fillRect(ex + 3 + lookDir, ey + 6, 1, 1);
      ctx.fillRect(ex + e.w - 4 + lookDir, ey + 6, 1, 1);
      // Zone flair
      if (wi === 0) {
        // Spore cap spots
        ctx.fillStyle = '#ffffff33';
        ctx.fillRect(ex + 3, ey + 1, 2, 2);
        ctx.fillRect(ex + e.w - 5, ey + 2, 2, 2);
      }
    }

    // HP bar for multi-HP enemies (not turrets, they have pips)
    if (e.maxHp > 1 && !e.isTurret && e.hp < e.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(ex, ey - 4, e.w, 2);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex, ey - 4, e.w * (e.hp / e.maxHp), 2);
    }
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  var bx = boss.x - boss.w/2;
  var by = boss.y - boss.h/2;
  var wi = worldIndex();
  var theme = worldTheme();

  // Boss glow
  ctx.globalAlpha = 0.2 + Math.sin(frame * 0.05) * 0.1;
  ctx.fillStyle = theme.bossColor;
  ctx.beginPath();
  ctx.arc(boss.x, boss.y, boss.w, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Flash when hit
  if (boss.flash > 0 && Math.floor(boss.flash * 20) % 2 === 0) {
    ctx.fillStyle = '#ffffff';
  } else {
    ctx.fillStyle = theme.bossColor;
  }

  // Zone-specific boss art
  switch (wi) {
    case 0: // Mycelium King: large mushroom
      ctx.beginPath();
      ctx.arc(boss.x, by + 8, boss.w/2 + 4, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(bx + 6, by + 8, boss.w - 12, boss.h - 8);
      // Spots
      ctx.fillStyle = '#ffffff33';
      ctx.fillRect(bx + 8, by + 4, 4, 3);
      ctx.fillRect(bx + boss.w - 14, by + 6, 3, 3);
      break;
    case 1: // Prism Wyrm: segmented crystal
      ctx.save();
      ctx.translate(boss.x, boss.y);
      for (var seg = 0; seg < 3; seg++) {
        var sx = Math.sin(boss.phase * 2 + seg * 0.8) * 6;
        ctx.fillRect(sx - 8, -boss.h/2 + seg * 12, 16, 10);
      }
      ctx.restore();
      // Crystal shimmer
      ctx.fillStyle = '#aa88ff44';
      ctx.fillRect(bx + 4, by + 2, 3, 3);
      break;
    case 2: // Furnace Golem: blocky mechanical
      ctx.fillRect(bx, by, boss.w, boss.h);
      ctx.fillStyle = '#ff660044';
      ctx.fillRect(bx + 4, by + boss.h - 8, boss.w - 8, 8);
      // Vents
      if (boss.enraged) {
        ctx.fillStyle = '#ff884488';
        ctx.fillRect(bx - 4, by + 8, 4, 6);
        ctx.fillRect(bx + boss.w, by + 8, 4, 6);
      }
      break;
    case 3: // Tempest Lord: swirling cloud form
      ctx.beginPath();
      ctx.arc(boss.x, boss.y, boss.w/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(boss.x + Math.cos(boss.phase * 3) * 8, boss.y - 6, boss.w/3, 0, Math.PI * 2);
      ctx.fill();
      // Lightning crackle
      if (frame % 8 < 4) {
        ctx.fillStyle = '#ffffff88';
        ctx.fillRect(boss.x - 1, by + boss.h/2, 2, 8);
      }
      break;
    default:
      ctx.fillRect(bx, by, boss.w, boss.h);
  }

  // Eyes (all bosses)
  ctx.fillStyle = boss.enraged ? '#ff0000' : '#ffcc00';
  ctx.fillRect(bx + 8, by + 10, 5, 5);
  ctx.fillRect(bx + boss.w - 13, by + 10, 5, 5);
  ctx.fillStyle = '#000';
  ctx.fillRect(bx + 10, by + 12, 2, 2);
  ctx.fillRect(bx + boss.w - 11, by + 12, 2, 2);

  // Enrage indicator
  if (boss.enraged) {
    ctx.fillStyle = '#ff000044';
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.w/2 + 6 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(bx - 4, by - 12, boss.w + 8, 6);
  var hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#ff2222';
  ctx.fillRect(bx - 4, by - 12, (boss.w + 8) * hpPct, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(theme.bossName, boss.x, by - 16);
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    if (p.y < camY - 10 || p.y > camY + GH + 10) continue;

    switch (p.type) {
      case 'spore':
        ctx.fillStyle = '#66cc4488';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88ff6644';
        ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
        break;
      case 'crystal':
        ctx.fillStyle = '#8866cc';
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(frame * 0.1);
        ctx.fillRect(-3, -3, 6, 6);
        ctx.restore();
        ctx.fillStyle = '#aa88ff44';
        ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
        break;
      case 'bomb':
        ctx.fillStyle = '#cc6600';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff884444';
        ctx.fillRect(p.x - 1, p.y - 6, 2, 4);
        break;
      case 'lightning':
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(p.x - 1, p.y - 6, 2, 12);
        ctx.fillStyle = '#ffffff88';
        ctx.fillRect(p.x, p.y - 4, 1, 8);
        break;
      case 'aimed':
        ctx.fillStyle = '#ff6644';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
        break;
      default:
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
    }
  }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  var px = player.x;
  var py = player.y;

  // Star glow
  if (powerStar > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.2) * 0.2;
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h/2, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Shield bubble
  if (powerShield > 0) {
    ctx.globalAlpha = 0.25 + Math.sin(frame * 0.1) * 0.1;
    ctx.strokeStyle = '#44ffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h/2, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  var _anim = player.invincible > 0 ? 'hurt' : (!player.onGround ? 'jump' : (Math.abs(player.vx) > 1 ? 'walk' : 'idle'));
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, Math.max(player.w, player.h), { flipX: player.facing < 0, frame: frame, anim: _anim })) {
    // Body (baseling = player's creature)
    ctx.fillStyle = powerStar > 0 ? '#ffdd44' : statB.color;
    ctx.fillRect(px + 1, py + 4, player.w - 2, player.h - 4);

    // Head
    var headColor = powerStar > 0 ? '#ffee66' : statB.color;
    ctx.fillStyle = headColor;
    ctx.fillRect(px, py, player.w, 8);
    // Head highlight
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(px + 1, py + 1, player.w - 2, 2);

    // Eyes
    ctx.fillStyle = '#fff';
    var eyeX = player.facing > 0 ? px + 7 : px + 2;
    ctx.fillRect(eyeX, py + 2, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(eyeX + 1, py + 3, 1, 1);

    // Baseling icon on body
    ctx.fillStyle = '#ffffff44';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, px + player.w/2, py + 12);

    // Feet (walking animation)
    ctx.fillStyle = powerStar > 0 ? '#ccaa22' : '#3399bb';
    if (player.onGround && player.vx !== 0) {
      var step = Math.floor(frame * 0.15) % 2;
      ctx.fillRect(px + 2, py + player.h - 2, 3, 2);
      ctx.fillRect(px + player.w - 5, py + player.h - 2 + step, 3, 2);
    } else {
      ctx.fillRect(px + 2, py + player.h - 2, 3, 2);
      ctx.fillRect(px + player.w - 5, py + player.h - 2, 3, 2);
    }
  }

  // Double jump puff
  if (player.doubleJumped && !player.onGround) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h + 4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Speed trail
  if (powerSpeed > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(px - player.facing * 4, py + 4, 4, 8);
    ctx.fillRect(px - player.facing * 8, py + 5, 3, 6);
    ctx.globalAlpha = 1;
  }
}

function drawWater() {
  if (waterY > camY + GH) return;
  var wy = waterY;
  // Muck body
  ctx.fillStyle = '#3a2a1a';
  ctx.globalAlpha = 0.7;
  for (var wx = 0; wx < GW; wx += 4) {
    var waveOff = Math.sin((wx + frame * 2) * 0.05) * 3;
    ctx.fillRect(wx, wy + waveOff, 4, camY + GH - wy);
  }
  // Surface highlight
  ctx.fillStyle = '#5a4a2a';
  ctx.globalAlpha = 0.5;
  for (var wx = 0; wx < GW; wx += 8) {
    var waveOff = Math.sin((wx + frame * 2) * 0.05) * 3;
    ctx.fillRect(wx, wy + waveOff, 8, 3);
  }
  // Foam line
  ctx.fillStyle = '#7a6a3a';
  ctx.globalAlpha = 0.3;
  for (var wx = 0; wx < GW; wx += 6) {
    var waveOff = Math.sin((wx + frame * 2.5) * 0.06) * 2;
    ctx.fillRect(wx, wy + waveOff - 2, 4, 2);
  }
  ctx.globalAlpha = 1;

  // Bubbles
  if (frame % 20 === 0 && waterY < camY + GH) {
    TAS.particles.spawn(
      TAS.math.randInt(0, GW),
      Math.max(waterY + 20, camY + GH - 20),
      '#7a6a3a', 1, 1, { gravity: -0.5, size: 2 }
    );
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 10px monospace';
  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 4, 12);

  // Level
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.fillText('W' + (worldIndex()+1) + '-' + ((level-1)%5+1), GW/2, 12);

  // Combo indicator
  if (combo >= 3) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = '8px monospace';
    ctx.fillText('x' + combo, GW/2, 24);
  }

  // Lives (draw baseling icons)
  ctx.textAlign = 'right';
  ctx.fillStyle = statB.color;
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 8 - i * 14, 4, 10, 8);
    ctx.fillStyle = '#ffffff44';
    ctx.fillRect(GW - 6 - i * 14, 5, 3, 3);
    ctx.fillStyle = statB.color;
  }

  // Gem indicator
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(GW/2 - 56, GH - 18, 112, 14);
  for (var g = 0; g < 7; g++) {
    if (gemsCollected[g]) {
      ctx.fillStyle = GEM_COLORS[g];
    } else {
      ctx.fillStyle = '#333';
    }
    ctx.fillRect(GW/2 - 49 + g * 15, GH - 15, 10, 8);
  }

  // Powerup indicators
  var py = 18;
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  if (powerDouble > 0) { ctx.fillStyle = '#ff44ff'; ctx.fillText('x2:' + Math.ceil(powerDouble), 4, py += 10); }
  if (powerSpeed > 0) { ctx.fillStyle = '#44ff44'; ctx.fillText('SPD:' + Math.ceil(powerSpeed), 4, py += 10); }
  if (powerStar > 0) { ctx.fillStyle = '#ffff44'; ctx.fillText('STAR:' + Math.ceil(powerStar), 4, py += 10); }
  if (powerExtend > 0) { ctx.fillStyle = '#44ffff'; ctx.fillText('EXT:' + Math.ceil(powerExtend), 4, py += 10); }
  if (powerShield > 0) { ctx.fillStyle = '#4488ff'; ctx.fillText('SH:' + Math.ceil(powerShield), 4, py += 10); }

  // Water warning (WIS: earlier warning)
  var warnDist = statWaterSense() ? GH * 0.8 : GH * 0.6;
  var waterDist = waterY - (player.y + player.h);
  if (waterDist < warnDist && waterDist > 0) {
    var warn = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = warn * (1 - waterDist / warnDist);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MUCK RISING!', GW/2, GH - 30);
    if (statWaterSense()) {
      ctx.font = '8px monospace';
      ctx.fillStyle = '#ff8888';
      ctx.fillText(Math.floor(waterDist) + 'px', GW/2, GH - 20);
    }
    ctx.globalAlpha = 1;
  }

  // Spore bridge cooldown indicator
  if (player.rainbowCooldown > 0) {
    ctx.fillStyle = '#ffffff44';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SB:' + player.rainbowCooldown.toFixed(1), GW - 4, 24);
  }
}

function drawMinimap() {
  if (!minimapOn || state !== 'playing') return;
  var mmW = 24;
  var mmH = 60;
  var mmX = GW - mmW - 4;
  var mmY = 32;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#ffffff33';
  ctx.lineWidth = 1;
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  var scaleX = mmW / GW;
  var scaleY = mmH / levelHeight;

  // Platforms
  ctx.fillStyle = '#ffffff44';
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    ctx.fillRect(mmX + p.x * scaleX, mmY + p.y * scaleY, Math.max(1, p.w * scaleX), 1);
  }

  // Water line
  ctx.fillStyle = '#5a4a2a88';
  var wy = mmY + waterY * scaleY;
  ctx.fillRect(mmX, wy, mmW, mmY + mmH - wy);

  // Player dot
  ctx.fillStyle = statB.color;
  ctx.fillRect(mmX + player.x * scaleX - 1, mmY + player.y * scaleY - 1, 2, 2);

  // Goal
  if (!bossActive) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(mmX + (GW/2 - 40) * scaleX, mmY + 40 * scaleY, 3, 1);
  }

  // Boss
  if (boss && boss.alive) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(mmX + boss.x * scaleX - 1, mmY + boss.y * scaleY - 1, 2, 2);
  }

  // Camera viewport
  ctx.strokeStyle = '#ffffff44';
  ctx.strokeRect(mmX, mmY + camY * scaleY, mmW, GH * scaleY);
}

function drawTutorial() {
  if (tutorialStep <= 0 || tutorialStep > 3) return;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(20, GH * 0.35, GW - 40, 80);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 10px monospace';

  var msgs = [
    '',
    ['Move your baseling with ARROWS/WASD', 'SPACE or W to JUMP'],
    ['Press Z or X to grow SPORE BRIDGES', 'Stand on them to climb higher!'],
    ['Collect all 7 SPORE GEMS for bonus!', 'Stomp fungi from above!']
  ];

  if (msgs[tutorialStep]) {
    ctx.fillText(msgs[tutorialStep][0], GW/2, GH * 0.35 + 25);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.fillText(msgs[tutorialStep][1], GW/2, GH * 0.35 + 45);
  }

  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('(' + tutorialStep + '/3)', GW/2, GH * 0.35 + 65);
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN CLEARED!', GW/2, GH * 0.30);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  var bonus = Math.max(0, Math.floor((waterY - player.y) * 2));
  ctx.fillText('Speed Bonus: ' + bonus, GW/2, GH * 0.44);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Combo Max: ' + combo, GW/2, GH * 0.52);

  // Gem collection
  var allGems = true;
  for (var g = 0; g < 7; g++) { if (!gemsCollected[g]) { allGems = false; break; } }
  if (allGems) {
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('FULL SPECTRUM!', GW/2, GH * 0.62);
  }

  // Stat contribution summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' bonuses active', GW/2, GH * 0.72);
  }

  ctx.fillStyle = '#3cacd7';
  ctx.font = '11px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH * 0.82);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
