<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rainbow Bridge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'RAIN' } });

var TILE = 16;
var COLS = Math.ceil(GW / TILE); // 20
var LEVEL_SCREENS = 8;
var LEVEL_ROWS = Math.ceil(GH / TILE) * LEVEL_SCREENS; // ~240 rows
var GRAVITY = 980;
var MAX_FALL = 400;
var JUMP_VEL = -320;
var MOVE_SPEED = 120;
var RAINBOW_MAX = 3;
var RAINBOW_LIFE = 3.0;
var RAINBOW_WIDTH = 48;
var RAINBOW_HEIGHT = 8;
var WATER_BASE_SPEED = 12;

// Rainbow colors
var ROYGBIV = ['#ff0000','#ff8800','#ffff00','#00cc00','#0066ff','#4400cc','#8800ff'];
var GEM_COLORS = ['#ff3333','#ff9933','#ffff33','#33ff33','#3399ff','#6633cc','#aa33ff'];

// World themes
var WORLDS = [
  { name: 'Spore Island', bg1: '#1a3a2a', bg2: '#0d2818', platColor: '#336633', accent: '#55aa55', waterSpeed: 1.0 },
  { name: 'Crystal Cavern', bg1: '#1a1a3a', bg2: '#0d0d28', platColor: '#334466', accent: '#6688cc', waterSpeed: 1.3 },
  { name: 'Reactor Heights', bg1: '#2a1a1a', bg2: '#1a0d0d', platColor: '#554433', accent: '#cc8844', waterSpeed: 1.6 },
  { name: 'Sky Kingdom', bg1: '#1a2a3a', bg2: '#0d1828', platColor: '#446688', accent: '#88ccff', waterSpeed: 2.0 }
];

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('rainbowbridge_hi');
var lives = 3;
var level = 1;
var frame = 0;

// Player
var player = { x: 0, y: 0, vx: 0, vy: 0, w: 12, h: 14, facing: 1, onGround: false, invincible: 0, jumpHeld: false };
// Camera
var camY = 0;
// Water
var waterY = 0;
// Rainbows
var rainbows = [];
// Platforms
var platforms = [];
// Enemies
var enemies = [];
// Items (gems, powerups)
var items = [];
// Projectiles (enemy shots)
var projectiles = [];
// Gems collected this level (by color index)
var gemsCollected = [false,false,false,false,false,false,false];
// Powerups active
var powerDouble = 0;
var powerSpeed = 0;
var powerStar = 0;
var powerExtend = 0;
// Level height
var levelHeight = 0;
// Boss
var boss = null;
var bossActive = false;
// Level complete
var levelComplete = false;
var levelCompleteTimer = 0;
// Death animation
var deathTimer = 0;
// Input edge detection
var jumpWasPressed = false;
var rainbowWasPressed = false;
// Background decorations
var bgDecos = [];

// === HELPERS ===
function worldIndex() { return Math.floor((level - 1) / 5); }
function worldTheme() { return WORLDS[Math.min(worldIndex(), 3)]; }
function isBossLevel() { return level % 5 === 0; }

function resetPlayer() {
  player.x = GW / 2 - player.w / 2;
  player.y = levelHeight - 40;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.invincible = 1.5;
  player.facing = 1;
}

// === LEVEL GENERATION ===
function generateLevel() {
  platforms = [];
  enemies = [];
  items = [];
  projectiles = [];
  rainbows = [];
  bgDecos = [];
  gemsCollected = [false,false,false,false,false,false,false];
  powerDouble = 0; powerSpeed = 0; powerStar = 0; powerExtend = 0;
  boss = null;
  bossActive = false;
  levelComplete = false;
  levelCompleteTimer = 0;

  levelHeight = GH * LEVEL_SCREENS;
  waterY = levelHeight + 60;

  var theme = worldTheme();
  var wi = worldIndex();

  // Ground platform
  platforms.push({ x: 0, y: levelHeight - TILE, w: GW, h: TILE, type: 'ground' });

  // Generate platforms going up
  var lastY = levelHeight - 60;
  var gemIdx = 0;

  for (var py = levelHeight - 80; py > 60; py -= TAS.math.randInt(36, 56)) {
    var pw = TAS.math.randInt(32, 72);
    var px = TAS.math.randInt(8, GW - pw - 8);

    platforms.push({ x: px, y: py, w: pw, h: 8, type: 'normal' });

    // Add enemies on some platforms (more on higher worlds)
    var enemyChance = 0.2 + wi * 0.1;
    if (Math.random() < enemyChance && py > 200) {
      var etype = 'walker';
      var r = Math.random();
      if (wi >= 1 && r < 0.2) etype = 'flyer';
      else if (wi >= 2 && r < 0.35) etype = 'bouncer';
      else if (wi >= 2 && r < 0.45) etype = 'shooter';

      enemies.push(createEnemy(etype, px + pw / 2, py - 16, px, px + pw));
    }

    // Place gems (one of each ROYGBIV color per level)
    if (gemIdx < 7 && Math.random() < 0.25) {
      items.push({ x: px + pw / 2 - 4, y: py - 20, w: 8, h: 8, type: 'gem', color: gemIdx, vy: 0, grounded: true });
      gemIdx++;
    }

    // Occasional powerup
    if (Math.random() < 0.06) {
      var ptype = ['double','speed','star','extend'][TAS.math.randInt(0, 3)];
      items.push({ x: px + pw / 2 - 5, y: py - 22, w: 10, h: 10, type: ptype, vy: 0, grounded: true });
    }

    lastY = py;
  }

  // Ensure remaining gems are placed
  while (gemIdx < 7) {
    var gy = TAS.math.randInt(200, levelHeight - 200);
    var gx = TAS.math.randInt(20, GW - 30);
    items.push({ x: gx, y: gy, w: 8, h: 8, type: 'gem', color: gemIdx, vy: 0, grounded: false });
    gemIdx++;
  }

  // Boss level: place boss near top
  if (isBossLevel()) {
    boss = createBoss(wi);
    bossActive = true;
  }

  // Goal platform at top
  platforms.push({ x: GW / 2 - 40, y: 40, w: 80, h: 10, type: 'goal' });

  // Background decorations
  for (var d = 0; d < 30; d++) {
    bgDecos.push({
      x: TAS.math.randInt(0, GW),
      y: TAS.math.randInt(0, levelHeight),
      size: TAS.math.randInt(2, 6),
      type: TAS.math.randInt(0, 3)
    });
  }

  resetPlayer();
  camY = levelHeight - GH;
}

function createEnemy(type, x, y, minX, maxX) {
  return {
    type: type,
    x: x, y: y, w: 12, h: 12,
    vx: (type === 'walker' || type === 'shooter') ? (Math.random() < 0.5 ? -30 : 30) : 0,
    vy: 0,
    minX: minX - 20, maxX: maxX + 20,
    hp: 1,
    phase: Math.random() * Math.PI * 2,
    baseY: y,
    shootTimer: 2,
    alive: true
  };
}

function createBoss(worldIdx) {
  var hp = 5 + worldIdx * 3;
  return {
    x: GW / 2, y: 120, w: 32, h: 32,
    vx: 40 + worldIdx * 15,
    hp: hp, maxHp: hp,
    phase: 0,
    shootTimer: 1.5 - worldIdx * 0.2,
    shootCooldown: 0,
    alive: true,
    flash: 0
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'levelIntro') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'levelClear') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      level++;
      if (level > 20) {
        // Game beaten!
        score += 50000;
        if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        generateLevel();
        state = 'levelIntro';
        levelCompleteTimer = 2.0;
      }
    }
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt;
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        resetPlayer();
        waterY = Math.max(waterY, player.y + GH);
        state = 'playing';
      }
    }
    updateCamera();
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
  }
}

function updatePlaying(dt) {
  // Input
  var left = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
  var right = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
  var jumpPress = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a;
  var rainbowPress = TAS.input.keys['KeyX'] || TAS.input.keys['KeyZ'] || TAS.input.touch.b;

  var jumpEdge = jumpPress && !jumpWasPressed;
  var rainbowEdge = rainbowPress && !rainbowWasPressed;
  jumpWasPressed = jumpPress;
  rainbowWasPressed = rainbowPress;

  // Movement
  var spd = powerSpeed > 0 ? MOVE_SPEED * 1.5 : MOVE_SPEED;
  if (left) { player.vx = -spd; player.facing = -1; }
  else if (right) { player.vx = spd; player.facing = 1; }
  else { player.vx = 0; }

  // Jump
  if (jumpEdge && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.jumpHeld = true;
    TAS.audio.playTone(280, 0.1, 'square', 0.06, 400);
  }
  // Variable jump height
  if (!jumpPress && player.vy < -100) {
    player.vy *= 0.5;
  }

  // Rainbow creation
  if (rainbowEdge) {
    createRainbow();
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx * dt;
  // Wrap horizontally
  if (player.x + player.w < 0) player.x = GW;
  if (player.x > GW) player.x = -player.w;

  // Move Y & collision
  player.y += player.vy * dt;
  player.onGround = false;

  // Platform collision (only when falling)
  if (player.vy >= 0) {
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (checkPlatformCollision(player, p)) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
    // Rainbow collision
    if (!player.onGround) {
      for (var i = 0; i < rainbows.length; i++) {
        var rb = rainbows[i];
        if (rb.life > 0 && checkRainbowCollision(player, rb)) {
          player.y = rb.y - player.h;
          player.vy = 0;
          player.onGround = true;
          break;
        }
      }
    }
  }

  // Water rising
  var theme = worldTheme();
  waterY -= WATER_BASE_SPEED * theme.waterSpeed * dt;
  // Water kills
  if (player.y + player.h > waterY) {
    killPlayer();
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible -= dt;
  // Powerup timers
  if (powerDouble > 0) powerDouble -= dt;
  if (powerSpeed > 0) powerSpeed -= dt;
  if (powerStar > 0) powerStar -= dt;
  if (powerExtend > 0) powerExtend -= dt;

  // Update rainbows
  updateRainbows(dt);

  // Update enemies
  updateEnemies(dt);

  // Update boss
  if (boss && boss.alive) {
    updateBoss(dt);
  }

  // Update projectiles
  updateProjectiles(dt);

  // Update items
  updateItems(dt);

  // Check player-enemy collision
  if (player.invincible <= 0 && powerStar <= 0) {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        killPlayer();
        break;
      }
    }
    // Boss collision
    if (boss && boss.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
      killPlayer();
    }
    // Projectile collision
    for (var i = 0; i < projectiles.length; i++) {
      var pr = projectiles[i];
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pr.x - 3, pr.y - 3, 6, 6)) {
        killPlayer();
        projectiles.splice(i, 1);
        break;
      }
    }
  }
  // Star kills enemies on contact
  if (powerStar > 0) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      if (e.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        killEnemy(e, i);
      }
    }
  }

  // Check item collision
  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, it.x, it.y, it.w, it.h)) {
      collectItem(it, i);
    }
  }

  // Goal check
  if (!bossActive) {
    var goal = platforms[platforms.length - 1]; // goal platform
    if (goal.type === 'goal' && player.y + player.h <= goal.y + 4 && player.y + player.h >= goal.y - 8 &&
        player.x + player.w > goal.x && player.x < goal.x + goal.w) {
      completeLevel();
    }
  }

  updateCamera();
}

function checkPlatformCollision(pl, plat) {
  var feet = pl.y + pl.h;
  var prevFeet = feet - pl.vy * (1/60); // approximate previous position
  return pl.x + pl.w > plat.x && pl.x < plat.x + plat.w &&
         feet >= plat.y && feet <= plat.y + 12 &&
         prevFeet <= plat.y + 4;
}

function checkRainbowCollision(pl, rb) {
  // Rainbow is an arc; simplify as a flat platform at its top
  var rx = rb.x;
  var ry = rb.y;
  var rw = rb.w;
  var feet = pl.y + pl.h;
  return pl.x + pl.w > rx && pl.x < rx + rw &&
         feet >= ry && feet <= ry + 10 &&
         pl.vy >= 0;
}

function createRainbow() {
  // Count active rainbows
  var active = 0;
  for (var i = 0; i < rainbows.length; i++) {
    if (rainbows[i].life > 0) active++;
  }
  var maxRb = powerDouble > 0 ? RAINBOW_MAX + 1 : RAINBOW_MAX;
  if (active >= maxRb) return;

  var rbLife = powerExtend > 0 ? RAINBOW_LIFE * 1.5 : RAINBOW_LIFE;
  var rbW = RAINBOW_WIDTH;
  var rx = player.x + (player.facing > 0 ? player.w : -rbW);
  var ry = player.y - 14;

  var rb = { x: rx, y: ry, w: rbW, h: RAINBOW_HEIGHT, life: rbLife, maxLife: rbLife, facing: player.facing, justCreated: true };
  rainbows.push(rb);

  // If double rainbow, create second one higher
  if (powerDouble > 0) {
    var rb2 = { x: rx + player.facing * 16, y: ry - 20, w: rbW, h: RAINBOW_HEIGHT, life: rbLife, maxLife: rbLife, facing: player.facing, justCreated: true };
    rainbows.push(rb2);
  }

  // Sound: ascending sparkle
  TAS.audio.playMelody([
    [523, 0.06, 'sine', 0.06],
    [659, 0.06, 'sine', 0.06],
    [784, 0.08, 'sine', 0.05]
  ], 40);

  // Rainbow damages enemies on creation
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.alive && TAS.hit.rectOverlap(rx, ry, rbW, RAINBOW_HEIGHT, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
      killEnemy(e, i);
    }
  }
  // Damage boss
  if (boss && boss.alive && TAS.hit.rectOverlap(rx, ry, rbW, RAINBOW_HEIGHT + 8, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
    hitBoss();
  }
}

function updateRainbows(dt) {
  for (var i = rainbows.length - 1; i >= 0; i--) {
    var rb = rainbows[i];
    rb.life -= dt;
    rb.justCreated = false;
    if (rb.life <= 0) {
      // Drop items that were on this rainbow
      dropItemsFromRainbow(rb);
      rainbows.splice(i, 1);
    }
  }
}

function dropItemsFromRainbow(rb) {
  // Check if any enemies are on this rainbow and drop loot
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.alive && e.y + e.h/2 >= rb.y - 4 && e.y - e.h/2 <= rb.y + rb.h &&
        e.x > rb.x && e.x < rb.x + rb.w) {
      // Drop a gem or fruit
      if (Math.random() < 0.5) {
        var ci = TAS.math.randInt(0, 6);
        items.push({ x: e.x - 4, y: rb.y, w: 8, h: 8, type: 'gem', color: ci, vy: -50, grounded: false });
      }
    }
  }
}

function updateEnemies(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;

    // Skip offscreen enemies (far from camera)
    if (e.y < camY - 100 || e.y > camY + GH + 100) continue;

    switch (e.type) {
      case 'walker':
        e.x += e.vx * dt;
        if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
        break;
      case 'flyer':
        e.phase += dt * 2.5;
        e.x += Math.cos(e.phase) * 40 * dt;
        e.y = e.baseY + Math.sin(e.phase * 0.7) * 20;
        break;
      case 'bouncer':
        e.vy += GRAVITY * 0.5 * dt;
        e.y += e.vy * dt;
        if (e.y > e.baseY) {
          e.y = e.baseY;
          e.vy = -180;
        }
        e.x += e.vx * dt;
        if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
        break;
      case 'shooter':
        e.x += e.vx * dt;
        if (e.x < e.minX || e.x > e.maxX) e.vx = -e.vx;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = 2.5 - worldIndex() * 0.3;
          // Shoot downward
          projectiles.push({ x: e.x, y: e.y + e.h/2, vx: 0, vy: 100 });
        }
        break;
    }
  }
}

function updateBoss(dt) {
  boss.phase += dt;
  boss.x += boss.vx * dt;
  if (boss.x - boss.w/2 < 10 || boss.x + boss.w/2 > GW - 10) {
    boss.vx = -boss.vx;
  }
  boss.y = 100 + Math.sin(boss.phase * 1.5) * 30;

  if (boss.flash > 0) boss.flash -= dt;

  boss.shootCooldown -= dt;
  if (boss.shootCooldown <= 0) {
    boss.shootCooldown = boss.shootTimer;
    // Fire spread shot
    projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: -30, vy: 80 });
    projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: 0, vy: 100 });
    projectiles.push({ x: boss.x, y: boss.y + boss.h/2, vx: 30, vy: 80 });
    TAS.audio.playTone(150, 0.15, 'sawtooth', 0.04);
  }
}

function hitBoss() {
  if (!boss || !boss.alive) return;
  boss.hp--;
  boss.flash = 0.2;
  TAS.fx.shake(4, 0.85);
  TAS.audio.playTone(200, 0.2, 'square', 0.08, 80);
  score += 200;

  if (boss.hp <= 0) {
    boss.alive = false;
    bossActive = false;
    score += 5000;
    TAS.fx.flash('#ffff00', 0.5);
    TAS.particles.spawn(boss.x, boss.y, '#ff4444', 20, 4, { gravity: 1 });
    TAS.particles.spawn(boss.x, boss.y, '#ffcc00', 15, 3);
    // Victory sound
    TAS.audio.playMelody([
      [523, 0.12, 'square', 0.08],
      [659, 0.12, 'square', 0.08],
      [784, 0.12, 'square', 0.08],
      [1047, 0.3, 'square', 0.1]
    ], 150);
  }
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    // Remove offscreen
    if (p.y > camY + GH + 50 || p.y < camY - 50 || p.x < -20 || p.x > GW + 20) {
      projectiles.splice(i, 1);
    }
  }
}

function updateItems(dt) {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (!it.grounded) {
      it.vy += GRAVITY * 0.5 * dt;
      it.y += it.vy * dt;
      // Check platform landing
      for (var j = 0; j < platforms.length; j++) {
        var p = platforms[j];
        if (it.y + it.h >= p.y && it.y + it.h <= p.y + 10 && it.x + it.w > p.x && it.x < p.x + p.w && it.vy > 0) {
          it.y = p.y - it.h;
          it.vy = 0;
          it.grounded = true;
          break;
        }
      }
    }
  }
}

function killEnemy(e, idx) {
  e.alive = false;
  score += 100;
  TAS.particles.spawn(e.x, e.y, '#ff4444', 6, 2);
  TAS.audio.playTone(400, 0.08, 'square', 0.06, 100);
}

function killPlayer() {
  if (player.invincible > 0 || powerStar > 0) return;
  state = 'dying';
  deathTimer = 1.5;
  player.vy = JUMP_VEL * 0.7;
  TAS.fx.shake(6, 0.9);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 60);
}

function collectItem(it, idx) {
  items.splice(idx, 1);
  if (it.type === 'gem') {
    gemsCollected[it.color] = true;
    score += 50;
    TAS.particles.spawn(it.x + 4, it.y + 4, GEM_COLORS[it.color], 5, 2);
    TAS.audio.playTone(600 + it.color * 80, 0.1, 'sine', 0.06);
    // Check if all 7 collected
    var allGems = true;
    for (var g = 0; g < 7; g++) { if (!gemsCollected[g]) { allGems = false; break; } }
    if (allGems) {
      score += 10000;
      TAS.fx.flash('#ffffff', 0.4);
      TAS.audio.playMelody([
        [523, 0.1, 'sine', 0.08], [587, 0.1, 'sine', 0.08],
        [659, 0.1, 'sine', 0.08], [698, 0.1, 'sine', 0.08],
        [784, 0.1, 'sine', 0.08], [880, 0.1, 'sine', 0.08],
        [988, 0.2, 'sine', 0.1]
      ], 80);
    }
  } else if (it.type === 'double') {
    powerDouble = 10;
    TAS.audio.playTone(800, 0.15, 'sine', 0.06);
  } else if (it.type === 'speed') {
    powerSpeed = 10;
    TAS.audio.playTone(900, 0.15, 'sine', 0.06);
  } else if (it.type === 'star') {
    powerStar = 8;
    TAS.audio.playTone(1000, 0.2, 'sine', 0.08);
    TAS.fx.flash('#ffff00', 0.2);
  } else if (it.type === 'extend') {
    powerExtend = 12;
    TAS.audio.playTone(700, 0.15, 'sine', 0.06);
  }
}

function completeLevel() {
  if (levelComplete) return;
  levelComplete = true;
  state = 'levelClear';
  levelCompleteTimer = 3.0;
  // Speed bonus
  var bonus = Math.max(0, Math.floor((waterY - player.y) * 2));
  score += bonus;
  if (score > highScore) { highScore = score; TAS.score.save('rainbowbridge_hi', score); }
  // Fanfare
  TAS.audio.playMelody([
    [523, 0.15, 'square', 0.08],
    [659, 0.15, 'square', 0.08],
    [784, 0.15, 'square', 0.08],
    [1047, 0.4, 'square', 0.1]
  ], 160);
  TAS.particles.spawn(player.x + 6, player.y, '#ffdd44', 20, 3);
  TAS.particles.spawn(player.x + 6, player.y, '#ff44ff', 15, 3);
}

function updateCamera() {
  // Follow player, keep them in upper third
  var targetY = player.y - GH * 0.35;
  camY += (targetY - camY) * 0.08;
  camY = TAS.math.clamp(camY, 0, levelHeight - GH);
}

function startGame() {
  TAS.audio.ensureAudio();
  state = 'levelIntro';
  score = 0;
  lives = 3;
  level = 1;
  frame = 0;
  TAS.particles.clear();
  generateLevel();
  levelCompleteTimer = 2.0;
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level: ' + level });
    return;
  }

  if (state === 'levelIntro') {
    drawLevelIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();

  ctx.save();
  ctx.translate(0, -camY);

  // Draw background decorations
  drawBgDecos();
  // Draw platforms
  drawPlatforms();
  // Draw items
  drawItems();
  // Draw rainbows
  drawRainbows();
  // Draw enemies
  drawEnemies();
  // Draw boss
  if (boss && boss.alive) drawBoss();
  // Draw projectiles
  drawProjectiles();
  // Draw player
  drawPlayer();
  // Draw water
  drawWater();

  TAS.particles.draw();
  ctx.restore();

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Level clear overlay
  if (state === 'levelClear') {
    drawLevelClear();
  }
}

function drawTitleScreen() {
  // Animated rainbow background
  var theme = WORLDS[0];
  ctx.fillStyle = '#0a1520';
  ctx.fillRect(0, 0, GW, GH);

  // Draw decorative rainbow arcs
  for (var i = 0; i < 5; i++) {
    var rx = 40 + i * 60;
    var ry = 180 + Math.sin(frame * 0.02 + i) * 30;
    drawRainbowArc(rx, ry, 40 + i * 5, 0.4);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('RAINBOW', GW/2 + 2, 82);
  ctx.fillText('BRIDGE', GW/2 + 2, 114);

  // Rainbow-colored title
  var titleChars = 'RAINBOW';
  var startX = GW/2 - 84;
  ctx.font = 'bold 28px monospace';
  for (var c = 0; c < titleChars.length; c++) {
    ctx.fillStyle = ROYGBIV[c];
    ctx.textAlign = 'left';
    ctx.fillText(titleChars[c], startX + c * 24, 80);
  }
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('BRIDGE', GW/2, 112);

  // Subtitle
  ctx.fillStyle = '#668899';
  ctx.font = '11px monospace';
  ctx.fillText('A Tasern Arcade Adventure', GW/2, 138);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Arrow Keys / D-Pad = Move', GW/2, 280);
  ctx.fillText('Space / A = Jump', GW/2, 296);
  ctx.fillText('Z-X / B = Create Rainbow', GW/2, 312);
  ctx.fillText('Climb up! Water rises below!', GW/2, 340);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 380);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, 440);
  ctx.globalAlpha = 1;
}

function drawLevelIntro() {
  var theme = worldTheme();
  ctx.fillStyle = theme.bg1;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = theme.accent;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('WORLD ' + (worldIndex() + 1) + '-' + ((level - 1) % 5 + 1), GW/2, GH * 0.35);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(theme.name, GW/2, GH * 0.45);

  if (isBossLevel()) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('-- BOSS FIGHT --', GW/2, GH * 0.56);
  }

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Level ' + level + ' / 20', GW/2, GH * 0.7);
}

function drawBackground() {
  var theme = worldTheme();
  // Gradient background
  var grd = ctx.createLinearGradient(0, 0, 0, GH);
  grd.addColorStop(0, theme.bg2);
  grd.addColorStop(1, theme.bg1);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax elements (subtle)
  ctx.globalAlpha = 0.15;
  var wi = worldIndex();
  for (var i = 0; i < 12; i++) {
    var bx = ((i * 47 + frame * 0.1) % (GW + 40)) - 20;
    var by = ((i * 73 + camY * 0.2) % GH);
    ctx.fillStyle = theme.accent;
    if (wi === 0) {
      // Mushroom caps
      ctx.beginPath();
      ctx.arc(bx, by, 6 + i % 4, 0, Math.PI, true);
      ctx.fill();
    } else if (wi === 1) {
      // Crystal shapes
      ctx.fillRect(bx, by, 3, 10 + i % 6);
    } else if (wi === 2) {
      // Gears
      ctx.beginPath();
      ctx.arc(bx, by, 5 + i % 3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Clouds
      ctx.beginPath();
      ctx.arc(bx, by, 10 + i % 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx + 8, by - 2, 7 + i % 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawBgDecos() {
  var theme = worldTheme();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = theme.accent;
  for (var i = 0; i < bgDecos.length; i++) {
    var d = bgDecos[i];
    if (d.y < camY - 20 || d.y > camY + GH + 20) continue;
    if (d.type === 0) {
      ctx.fillRect(d.x, d.y, d.size, d.size);
    } else if (d.type === 1) {
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(d.x, d.y, d.size * 0.5, d.size * 2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawPlatforms() {
  var theme = worldTheme();
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.y < camY - 20 || p.y > camY + GH + 20) continue;

    if (p.type === 'goal') {
      // Shimmering goal platform
      var shimmer = Math.sin(frame * 0.08) * 0.3 + 0.7;
      ctx.fillStyle = '#ffdd44';
      ctx.globalAlpha = shimmer;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.globalAlpha = 1;
      // Arrow indicator
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GOAL', p.x + p.w/2, p.y - 8);
    } else if (p.type === 'ground') {
      ctx.fillStyle = theme.platColor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
    } else {
      // Normal platform
      ctx.fillStyle = theme.platColor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // Highlight
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Edge marks
      ctx.fillStyle = '#ffffff33';
      ctx.fillRect(p.x, p.y, 2, p.h);
      ctx.fillRect(p.x + p.w - 2, p.y, 2, p.h);
    }
  }
}

function drawRainbows() {
  for (var i = 0; i < rainbows.length; i++) {
    var rb = rainbows[i];
    var alpha = Math.min(1, rb.life / (rb.maxLife * 0.3));
    drawRainbowArc(rb.x + rb.w/2, rb.y + rb.h/2, rb.w/2, alpha);
  }
}

function drawRainbowArc(cx, cy, radius, alpha) {
  ctx.globalAlpha = alpha;
  var stripeH = 2;
  for (var s = 0; s < 7; s++) {
    ctx.fillStyle = ROYGBIV[s];
    var y = cy - 7 + s * stripeH;
    // Arc shape using rounded rect approximation
    var w = radius * 2 * (1 - Math.abs(s - 3) * 0.05);
    var x = cx - w / 2;
    ctx.fillRect(x, y, w, stripeH);
  }
  // Sparkle endpoints
  if (Math.random() < 0.3) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(cx - radius + Math.random() * 4, cy - 4 + Math.random() * 8, 2, 2);
    ctx.fillRect(cx + radius - Math.random() * 4, cy - 4 + Math.random() * 8, 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (it.y < camY - 20 || it.y > camY + GH + 20) continue;

    if (it.type === 'gem') {
      // Diamond shape
      var bounce = Math.sin(frame * 0.06 + it.x) * 2;
      ctx.fillStyle = GEM_COLORS[it.color];
      ctx.save();
      ctx.translate(it.x + 4, it.y + 4 + bounce);
      ctx.rotate(Math.PI / 4);
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
      // Sparkle
      ctx.fillStyle = '#ffffff88';
      ctx.fillRect(it.x + 2, it.y + 1 + bounce, 2, 2);
    } else {
      // Powerup box
      var colors = { double: '#ff44ff', speed: '#44ff44', star: '#ffff44', extend: '#44ffff' };
      ctx.fillStyle = colors[it.type] || '#fff';
      ctx.fillRect(it.x, it.y, it.w, it.h);
      ctx.fillStyle = '#00000044';
      ctx.fillRect(it.x + 2, it.y + 2, it.w - 4, it.h - 4);
      // Icon
      ctx.fillStyle = colors[it.type] || '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      var labels = { double: 'x2', speed: 'SP', star: '*', extend: 'EX' };
      ctx.fillText(labels[it.type] || '?', it.x + it.w/2, it.y + it.h - 2);
    }
  }
}

function drawEnemies() {
  var wi = worldIndex();
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.y < camY - 20 || e.y > camY + GH + 20) continue;

    var ex = e.x - e.w/2;
    var ey = e.y - e.h/2;

    switch (e.type) {
      case 'walker':
        // Mushroom-like enemy
        ctx.fillStyle = wi === 0 ? '#cc4444' : wi === 1 ? '#8844cc' : wi === 2 ? '#886633' : '#cc8844';
        ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
        ctx.beginPath();
        ctx.arc(e.x, ey + 4, e.w/2, Math.PI, 0);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + 2, ey + 5, 3, 3);
        ctx.fillRect(ex + e.w - 5, ey + 5, 3, 3);
        break;
      case 'flyer':
        // Bat/bird
        ctx.fillStyle = wi === 1 ? '#6644aa' : '#444488';
        ctx.fillRect(ex + 3, ey + 3, e.w - 6, e.h - 6);
        // Wings
        var wingOff = Math.sin(frame * 0.15) * 3;
        ctx.fillRect(ex - 2, ey + 4 + wingOff, 5, 3);
        ctx.fillRect(ex + e.w - 3, ey + 4 - wingOff, 5, 3);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 4, ey + 5, 2, 2);
        ctx.fillRect(ex + e.w - 6, ey + 5, 2, 2);
        break;
      case 'bouncer':
        // Bouncy slime
        ctx.fillStyle = wi === 2 ? '#cc8800' : '#44cc44';
        var squish = e.vy < 0 ? 0.8 : 1.1;
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.scale(1/squish, squish);
        ctx.beginPath();
        ctx.arc(0, 0, e.w/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + 3, ey + 3, 2, 2);
        ctx.fillRect(ex + e.w - 5, ey + 3, 2, 2);
        break;
      case 'shooter':
        // Turret-like
        ctx.fillStyle = '#666';
        ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
        ctx.fillStyle = '#aa2222';
        ctx.fillRect(ex + 3, ey, e.w - 6, 6);
        // Barrel
        ctx.fillStyle = '#444';
        ctx.fillRect(e.x - 1, ey + e.h - 2, 3, 4);
        break;
    }
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  var bx = boss.x - boss.w/2;
  var by = boss.y - boss.h/2;
  var wi = worldIndex();

  // Flash when hit
  if (boss.flash > 0 && Math.floor(boss.flash * 20) % 2 === 0) {
    ctx.fillStyle = '#ffffff';
  } else {
    var bossColors = ['#cc2222', '#6622cc', '#cc6600', '#2244cc'];
    ctx.fillStyle = bossColors[wi] || '#cc2222';
  }

  // Body
  ctx.fillRect(bx, by, boss.w, boss.h);
  // Detail
  ctx.fillStyle = '#000000';
  ctx.fillRect(bx + 4, by + 4, boss.w - 8, boss.h - 8);
  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(bx + 6, by + 8, 6, 6);
  ctx.fillRect(bx + boss.w - 12, by + 8, 6, 6);
  // Mouth
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(bx + 8, by + 20, boss.w - 16, 4);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by - 10, boss.w, 5);
  ctx.fillStyle = '#ff2222';
  ctx.fillRect(bx, by - 10, boss.w * (boss.hp / boss.maxHp), 5);
}

function drawProjectiles() {
  ctx.fillStyle = '#ff4444';
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    if (p.y < camY - 10 || p.y > camY + GH + 10) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(p.x - 1, p.y - 1, 2, 2);
    ctx.fillStyle = '#ff4444';
  }
}

function drawPlayer() {
  // Blink when invincible
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  var px = player.x;
  var py = player.y;

  // Star glow
  if (powerStar > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.2) * 0.2;
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h/2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Body (baseling-style cute creature)
  ctx.fillStyle = powerStar > 0 ? '#ffdd44' : '#55ccff';
  ctx.fillRect(px + 1, py + 4, player.w - 2, player.h - 4);

  // Head
  ctx.fillStyle = powerStar > 0 ? '#ffee66' : '#77ddff';
  ctx.fillRect(px, py, player.w, 8);

  // Eyes
  ctx.fillStyle = '#fff';
  var eyeX = player.facing > 0 ? px + 7 : px + 2;
  ctx.fillRect(eyeX, py + 2, 3, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(eyeX + 1, py + 3, 1, 1);

  // Feet (walking animation)
  ctx.fillStyle = '#3399bb';
  if (player.onGround && player.vx !== 0) {
    var step = Math.floor(frame * 0.15) % 2;
    ctx.fillRect(px + 2, py + player.h - 2, 3, 2);
    ctx.fillRect(px + player.w - 5, py + player.h - 2 + step, 3, 2);
  } else {
    ctx.fillRect(px + 2, py + player.h - 2, 3, 2);
    ctx.fillRect(px + player.w - 5, py + player.h - 2, 3, 2);
  }

  // Speed trail
  if (powerSpeed > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(px - player.facing * 4, py + 4, 4, 8);
    ctx.globalAlpha = 1;
  }
}

function drawWater() {
  if (waterY > camY + GH) return;
  var wy = waterY;
  // Water surface wave
  ctx.fillStyle = '#2255cc';
  ctx.globalAlpha = 0.7;
  for (var wx = 0; wx < GW; wx += 4) {
    var waveOff = Math.sin((wx + frame * 2) * 0.05) * 3;
    ctx.fillRect(wx, wy + waveOff, 4, camY + GH - wy);
  }
  // Surface highlight
  ctx.fillStyle = '#44aaff';
  ctx.globalAlpha = 0.5;
  for (var wx = 0; wx < GW; wx += 8) {
    var waveOff = Math.sin((wx + frame * 2) * 0.05) * 3;
    ctx.fillRect(wx, wy + waveOff, 8, 3);
  }
  ctx.globalAlpha = 1;

  // Bubble particles (ambient)
  if (frame % 20 === 0 && waterY < camY + GH) {
    TAS.particles.spawn(
      TAS.math.randInt(0, GW),
      Math.max(waterY + 20, camY + GH - 20),
      '#88ccff', 1, 1, { gravity: -0.5, size: 2 }
    );
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 10px monospace';
  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 4, 12);

  // Level
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('W' + (worldIndex()+1) + '-' + ((level-1)%5+1), GW/2, 12);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#55ccff';
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 8 - i * 14, 4, 10, 8);
  }

  // Gem indicator (bottom of screen)
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(GW/2 - 56, GH - 18, 112, 14);
  for (var g = 0; g < 7; g++) {
    if (gemsCollected[g]) {
      ctx.fillStyle = GEM_COLORS[g];
    } else {
      ctx.fillStyle = '#333';
    }
    ctx.fillRect(GW/2 - 49 + g * 15, GH - 15, 10, 8);
  }

  // Powerup indicators
  var py = 18;
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  if (powerDouble > 0) { ctx.fillStyle = '#ff44ff'; ctx.fillText('x2:' + Math.ceil(powerDouble), 4, py += 10); }
  if (powerSpeed > 0) { ctx.fillStyle = '#44ff44'; ctx.fillText('SPD:' + Math.ceil(powerSpeed), 4, py += 10); }
  if (powerStar > 0) { ctx.fillStyle = '#ffff44'; ctx.fillText('STAR:' + Math.ceil(powerStar), 4, py += 10); }
  if (powerExtend > 0) { ctx.fillStyle = '#44ffff'; ctx.fillText('EXT:' + Math.ceil(powerExtend), 4, py += 10); }

  // Water warning
  var waterDist = waterY - (player.y + player.h);
  if (waterDist < GH * 0.6 && waterDist > 0) {
    var warn = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = warn * (1 - waterDist / (GH * 0.6));
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WATER RISING!', GW/2, GH - 30);
    ctx.globalAlpha = 1;
  }
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('LEVEL CLEAR!', GW/2, GH * 0.35);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  var bonus = Math.max(0, Math.floor((waterY - player.y) * 2));
  ctx.fillText('Speed Bonus: ' + bonus, GW/2, GH * 0.48);

  // Show gem collection
  var allGems = true;
  for (var g = 0; g < 7; g++) { if (!gemsCollected[g]) { allGems = false; break; } }
  if (allGems) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('RAINBOW COMPLETE! +10000', GW/2, GH * 0.58);
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH * 0.7);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
