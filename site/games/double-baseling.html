  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}

// ============================================================
// ENEMY FACTORY
// ============================================================
function createEnemy(type, x, y, isBoss, bossName) {
  var def = ENEMY_DEFS[type];
  var bossScale = isBoss ? 2.2 : 1;
  var sizeScale = type === 'mycelial_brute' ? 1.5 : 1;
  return {
    type: type,
    x: x, y: y, vx: 0, vy: 0,
    w: Math.floor(def.w * (isBoss ? 1.4 : 1) * sizeScale),
    h: Math.floor(def.h * (isBoss ? 1.3 : 1) * sizeScale),
    hp: Math.floor(def.hp * bossScale),
    maxHp: Math.floor(def.hp * bossScale),
    speed: def.speed * (isBoss ? 0.85 : 1),
    color: def.color,
    damage: Math.floor(def.damage * (isBoss ? 1.5 : 1)),
    xpValue: Math.floor(def.xp * (isBoss ? 3 : 1)),
    atkRange: def.atkRange * (isBoss ? 1.3 : 1),
    atkCd: def.atkCd * (isBoss ? 0.8 : 1),
    facing: -1,
    grounded: true,
    attacking: false,
    atkFrame: 0,
    atkDuration: 0,
    stunned: false,
    stunTimer: 0,
    knockback: false,
    kbVx: 0, kbVy: 0,
    dead: false,
    deathTimer: 0,
    atkCooldown: Math.random() * 500 + 300,
    isBoss: !!isBoss,
    bossName: bossName || '',
    aiState: 'approach',
    aiTimer: 0,
    flashTimer: 0,
    toxicTrailTimer: 0,
    grabbing: false,
    grabTarget: null,
    sporeTimer: 0
  };
}

// ============================================================
// FLOATING TEXT
// ============================================================
function spawnFloatingText(x, y, text, color) {

}

// ============================================================
// CRATE / HAZARD FACTORIES
// ============================================================
function spawnCrates(stageIdx) {
  crates = [];
  var stage = STAGES[stageIdx];
  var numCrates = 3 + stageIdx;
  for (var i = 0; i < numCrates; i++) {
    var cx = 200 + Math.floor(Math.random() * (stage.width - 400));
    var cy = FLOOR_TOP + Math.floor(Math.random() * (FLOOR_BOT - FLOOR_TOP));
    var isReactor = stageIdx >= 2 && Math.random() < 0.35;
    crates.push({
      x: cx, y: cy, w: 16, h: 16, hp: isReactor ? 15 : 20,
      type: isReactor ? 'reactor_barrel' : 'crate',
      destroyed: false
    });
  }
}

function spawnHazards(stageIdx) {
  hazards = [];
  if (stageIdx < 2) return;
  var stage = STAGES[stageIdx];
  var numHazards = Math.floor(1 + stageIdx * 0.8);
  for (var i = 0; i < numHazards; i++) {
    var hx = 300 + Math.floor(Math.random() * (stage.width - 500));
    hazards.push({
      x: hx, y: FLOOR_TOP - 10, type: 'mycelial_growth',
      shootTimer: 2000 + Math.floor(Math.random() * 2000),
      shootCd: 3000
    });
  }
}

// ============================================================
// INPUT HANDLING
// ============================================================
function updateInput() {
  var inp = TAS.input;
  var dx = 0, dy = 0, punch = false, kick = false, jump = false;

  // CONTROL STANDARD (§7c): Arrows = MOVE only. WASD = action cluster.
  if (inp.keys['ArrowLeft'] || inp.touch.left) dx = -1;
  if (inp.keys['ArrowRight'] || inp.touch.right) dx = 1;
  if (inp.keys['ArrowUp'] || inp.touch.up) dy = -1;
  if (inp.keys['ArrowDown'] || inp.touch.down) dy = 1;

  // Just-pressed detection — WASD = action cluster (A=Punch, S=Kick, W=Jump, D=Special);
  // legacy keys (Z/X/J/K/Space/C/L) kept as hidden alts.
  var punchKeys = ['KeyA','KeyZ','KeyJ'];
  var kickKeys = ['KeyS','KeyX','KeyK'];
  var jumpKeys = ['KeyW','Space','KeyC','KeyL'];
  var specialKeys = ['KeyD'];

  for (var i = 0; i < punchKeys.length; i++) {
    if (inp.keys[punchKeys[i]] && !prevKeys[punchKeys[i]]) punch = true;
  }
  for (var i = 0; i < kickKeys.length; i++) {
    if (inp.keys[kickKeys[i]] && !prevKeys[kickKeys[i]]) kick = true;
  }
  for (var i = 0; i < jumpKeys.length; i++) {
    if (inp.keys[jumpKeys[i]] && !prevKeys[jumpKeys[i]]) jump = true;
  }
  // Special (D) acts as the 4th cluster button: a punch input (feeds charge/combo/grab).
  var special = false;
  for (var i = 0; i < specialKeys.length; i++) {
    if (inp.keys[specialKeys[i]] && !prevKeys[specialKeys[i]]) special = true;
  }
  if (special) punch = true;

  // Punch held detection for charged attack (A or D held)
  var punchCurrentlyHeld = false;
  for (var i = 0; i < punchKeys.length; i++) {
    if (inp.keys[punchKeys[i]]) punchCurrentlyHeld = true;
  }
  for (var i = 0; i < specialKeys.length; i++) {
    if (inp.keys[specialKeys[i]]) punchCurrentlyHeld = true;
  }
  if (inp.touch.a) punchCurrentlyHeld = true;
  punchHeld = punchCurrentlyHeld;

  // Touch buttons
  if (inp.touch.a && !prevKeys._ta) punch = true;
  if (inp.touch.b && !prevKeys._tb) kick = true;
  if (inp.touch.c && !prevKeys._tc) jump = true;

  // Double-tap direction detection for dodge roll (DEX >= 8)
  if (statB.dex >= 8 && !dodgeRolling) {
    if (dx !== 0) {
      var now = Date.now();
      if (dx === lastTapDir && (now - lastTapTime) < 200 && tapCount === 1) {
        dodgeRolling = true;
        dodgeTimer = DODGE_DURATION;
        dodgeDir = dx;
        tapCount = 0;
        SFX.dodge();
      } else if (dx !== lastTapDir || (now - lastTapTime) > 300) {
        lastTapDir = dx;
        lastTapTime = now;
        tapCount = 1;
      }
    }
  }

  // Store prev
  for (var k in inp.keys) prevKeys[k] = inp.keys[k];
  prevKeys._ta = inp.touch.a;
  prevKeys._tb = inp.touch.b;
  prevKeys._tc = inp.touch.c;

  return { dx: dx, dy: dy, punch: punch, kick: kick, jump: jump };
}

function anyInput() {
  var inp = TAS.input;
  if (Object.values(inp.keys).some(Boolean)) return true;
  if (inp.touch.a || inp.touch.b || inp.touch.c || inp.touch.left || inp.touch.right) return true;
  return false;
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt, input) {
  var p = player;

  // Grabbed by brute — mash to escape
  if (p.grabbed) {
    p.grabEscapeMash -= dt * 1000;
    if (input.punch || input.kick || input.jump) {
      p.grabEscapeMash -= 200;
    }
    if (p.grabEscapeMash <= 0) {
      p.grabbed = false;
      p.invincible = true;
      p.invTimer = 500;
      // Knock away the grabber
      for (var i = 0; i < enemies.length; i++) {
        if (enemies[i].grabbing) {
          enemies[i].grabbing = false;
          enemies[i].stunned = true;
          enemies[i].stunTimer = 500;
          enemies[i].grabTarget = null;
        }
      }
    }
    return;
  }

  // Dodge roll
  if (dodgeRolling) {
    dodgeTimer -= dt * 1000;
    p.invincible = true;
    p.invTimer = 100;
    p.x += dodgeDir * DODGE_SPEED * statB.speed * dt;
    if (dodgeTimer <= 0) {
      dodgeRolling = false;
    }
    clampPlayer();
    return;
  }

  // Invincibility timer
  if (p.invincible) {
    p.invTimer -= dt * 1000;
    if (p.invTimer <= 0) { p.invincible = false; p.invTimer = 0; }
  }

  // Stun recovery — WIS shortens hitstun
  if (p.stunned) {
    var stunRecover = statB.cooldown; // lower cooldown = faster recovery
    p.stunTimer -= dt * 1000 * (1 / stunRecover);
    if (p.stunTimer <= 0) { p.stunned = false; }
    p.vx *= 0.9;
    p.x += p.vx * dt;
    applyGravity(p, dt);
    clampPlayer();
    return;
  }

  // Charged attack — hold punch (STR >= 12)
  if (punchHeld && p.grounded && !p.attacking && statB.str >= 12) {
    chargeTimer += dt * 1000;
  } else if (!punchHeld && chargeTimer > 0) {
    if (chargeTimer >= 600 && p.grounded && !p.attacking) {
      // Release charged spore punch
      startAttack(p, 'sporePunch', 450);
      p.vx = p.facing * 60;
      SFX.chargedPunch();
      TAS.particles.spawn(p.x + p.facing * 20, p.y - 20, '#44ff88', 10, 5, { size: 2, sizeVar: 3 });
    }
    chargeTimer = 0;
  }

  // Grab update
  if (p.grabbing) {
    p.grabTimer -= dt * 1000;
    var ge = p.grabbing;
    ge.x = p.x + p.facing * 20;
    ge.y = p.y;
    if (p.grabTimer <= 0) {
      p.grabbing = null;
    }
    if (input.punch) {
      ge.hp -= Math.floor(15 * statB.damage);
      ge.flashTimer = 100;
      SFX.punch2();
      TAS.particles.spawn(ge.x, ge.y - ge.h/2, '#ffff00', 4, 2);
      score += Math.floor(50 * statB.scoreMult);
      comboHit();
      if (ge.hp <= 0) { killEnemy(ge); p.grabbing = null; }
    }
    if (input.dx !== 0) {
      var throwDir = input.dx;
      ge.knockback = true;
      ge.kbVx = throwDir * (250 + statB.str * 5);
      ge.kbVy = -100;
      ge.stunned = true;
      ge.stunTimer = 800;
      ge.hp -= Math.floor(20 * statB.damage);
      SFX.throw_();
      score += Math.floor(80 * statB.scoreMult);
      comboHit();
      p.grabbing = null;
      if (ge.hp <= 0) killEnemy(ge);
    }
    return;
  }

  // Attack state
  if (p.attacking) {
    p.atkFrame += dt * 1000;
    if (p.atkFrame >= p.atkDuration) {
      p.attacking = false;
      p.hitThisAtk = false;
    }
    applyGravity(p, dt);
    p.x += p.vx * dt;
    clampPlayer();
    return;
  }

  // Double-tap run detection
  if (input.dx !== 0 && input.dx === p.lastDir && (Date.now() - p.lastDirTime) < 250 && !p.running) {
    p.running = true;
    p.runTimer = 0;
  }
  if (input.dx !== 0) {
    if (input.dx !== p.lastDir) { p.lastDirTime = Date.now(); }
    p.lastDir = input.dx;
  } else {
    p.running = false;
  }

  // Movement — DEX scales speed
  var speed = (p.running ? PLAYER_SPEED * 1.6 : PLAYER_SPEED) * statB.speed;
  if (input.dx !== 0) {
    p.facing = input.dx;
    p.x += input.dx * speed * dt;
  }
  if (input.dy !== 0 && p.grounded) {
    p.y += input.dy * speed * 0.6 * dt;
  }

  p.y = TAS.math.clamp(p.y, FLOOR_TOP, FLOOR_BOT);

  // Jump
  if (input.jump && p.grounded) {
    p.vy = JUMP_FORCE;
    p.grounded = false;
    p.jumping = true;
  }

  // Ground slam (CON >= 10, in air) — jump + attack
  if ((input.punch || input.kick) && !p.grounded && statB.con >= 10 && p.vy > 0) {
    startAttack(p, 'groundSlam', 400);
    p.vy = 300;
    SFX.groundSlam();
    return;
  }

  // Flying knee (running + punch, level 7)
  if (input.punch && p.running && playerLevel >= 7) {
    startAttack(p, 'flyingKnee', 350);
    p.vx = p.facing * 200 * statB.speed;
    SFX.flyingKnee();
    return;
  }

  // Jump kick (level 3)
  if ((input.punch || input.kick) && !p.grounded && playerLevel >= 3) {
    startAttack(p, 'jumpKick', 300);
    p.vx = p.facing * 80 * statB.speed;
    SFX.jumpKick();
    return;
  }

  // Spinning kick (level 5)
  if (input.kick && p.grounded && input.dx === 0 && playerLevel >= 5 && comboCount >= 3) {
    startAttack(p, 'spinKick', 400);
    p.spinAngle = 0;
    SFX.spin();
    return;
  }

  // Uppercut (level 6)
  if (input.punch && input.dy === -1 && p.grounded && playerLevel >= 6) {
    startAttack(p, 'uppercut', 350);
    p.vx = p.facing * 40;
    SFX.uppercut();
    return;
  }

  // Kick (level 2)
  if (input.kick && p.grounded && playerLevel >= 2) {
    startAttack(p, 'kick', 350);
    p.vx = p.facing * 30;
    SFX.kick();
    return;
  }

  // Punch combo
  if (input.punch && p.grounded) {
    var step = 0;
    if (p.comboTimer > 0 && p.comboStep < 2) {
      step = p.comboStep + 1;
    }
    p.comboStep = step;
    p.comboTimer = COMBO_WINDOW * (2 - statB.cooldown); // WIS extends combo window
    var dur = step === 2 ? 300 : 250;
    startAttack(p, 'punch' + step, dur);
    p.vx = p.facing * (20 + step * 10);
    if (step === 0) SFX.punch1();
    else if (step === 1) SFX.punch2();
    else SFX.punch3();
    return;
  }

  // Combo timer decay
  if (p.comboTimer > 0) {
    p.comboTimer -= dt * 1000;
    if (p.comboTimer <= 0) { p.comboStep = 0; }
  }

  applyGravity(p, dt);
  clampPlayer();

  // Scroll
  var screenX = p.x - scrollX;
  if (screenX > GW - SCROLL_MARGIN && !scrollLock) {
    scrollX = p.x - (GW - SCROLL_MARGIN);
  }
  scrollX = TAS.math.clamp(scrollX, 0, stageWidth - GW);
  p.x = TAS.math.clamp(p.x, scrollX + 20, scrollLock ? scrollX + GW - 20 : stageWidth - 20);
}

function startAttack(p, type, duration) {
  p.attacking = true;
  p.atkType = type;
  p.atkFrame = 0;
  p.atkDuration = duration;
  p.hitThisAtk = false;
}

function applyGravity(entity, dt) {
  if (!entity.grounded) {
    entity.vy += GRAVITY * dt;
    entity.y += entity.vy * dt;
    if (entity._groundY === undefined) entity._groundY = entity.y;
    if (entity.vy > 0 && entity.y >= entity._groundY) {
      entity.y = entity._groundY;
      entity.vy = 0;
      entity.grounded = true;
      entity.jumping = false;
      // Ground slam landing effect
      if (entity === player && player.attacking && player.atkType === 'groundSlam') {
        TAS.fx.shake(6, 0.8);
        TAS.particles.spawn(entity.x, entity.y, '#ffaa44', 12, 5, { size: 2, sizeVar: 3, gravity: 0.5 });
        // Damage nearby enemies
        for (var i = 0; i < enemies.length; i++) {
          var e = enemies[i];
          if (!e.dead && Math.abs(e.x - entity.x) < 50 && Math.abs(e.y - entity.y) < 30) {
            hitEnemy(e, Math.floor(18 * statB.damage), 100, entity.x < e.x ? 1 : -1);
          }
        }
        // Destroy nearby crates
        for (var i = 0; i < crates.length; i++) {
          if (!crates[i].destroyed && Math.abs(crates[i].x - entity.x) < 40 && Math.abs(crates[i].y - entity.y) < 30) {
            destroyCrate(crates[i]);
          }
        }
      }
    }
  } else {
    entity._groundY = entity.y;
  }
}

function clampPlayer() {
  player.x = TAS.math.clamp(player.x, scrollX + 10, Math.min(scrollX + GW - 10, stageWidth - 10));
  player.y = TAS.math.clamp(player.y, FLOOR_TOP, FLOOR_BOT);
}

// ============================================================
// COMBAT - HIT DETECTION
// ============================================================
function checkPlayerAttacks() {
  var p = player;
  if (!p.attacking || p.hitThisAtk) return;

  var progress = p.atkFrame / p.atkDuration;
  if (progress < 0.2 || progress > 0.7) return;

  var atkData = getAttackData(p.atkType);
  var hx = p.x + p.facing * atkData.reach;
  var hy = p.y - p.h / 2;
  var hw = atkData.width;
  var hh = atkData.height;
  var isSpinKick = p.atkType === 'spinKick';
  var isSporePunch = p.atkType === 'sporePunch';
  var isGroundSlam = p.atkType === 'groundSlam';
  var isAreaAttack = isSpinKick || isSporePunch || isGroundSlam;

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.dead) continue;

    var inRange = false;
    if (isAreaAttack) {
      inRange = Math.abs(e.x - p.x) < atkData.reach + e.w && Math.abs(e.y - p.y) < 30;
    } else {
      inRange = TAS.hit.rectOverlap(hx - hw/2, hy - hh/2, hw, hh, e.x - e.w/2, e.y - e.h, e.w, e.h);
    }

    if (inRange && Math.abs(e.y - p.y) < 25) {
      // STR scales knockback distance
      var kbMult = 1 + (statB.str - 10) * 0.05;
      hitEnemy(e, Math.floor(atkData.damage * statB.damage), Math.floor(atkData.knockback * kbMult), p.facing);
      if (!isAreaAttack) p.hitThisAtk = true;

      // Try grab (level 4)
      if (playerLevel >= 4 && e.stunned && !e.dead && Math.abs(e.x - p.x) < GRAB_RANGE && p.grounded) {
        p.grabbing = e;
        p.grabTimer = 3000;
        p.attacking = false;
        SFX.grab();
        return;
      }
    }
  }

  // Hit crates
  for (var i = 0; i < crates.length; i++) {
    var c = crates[i];
    if (c.destroyed) continue;
    var cx = c.x, cy = c.y;
    if (Math.abs(cx - (p.x + p.facing * atkData.reach)) < 20 && Math.abs(cy - p.y) < 20) {
      c.hp -= Math.floor(atkData.damage * statB.damage);
      if (c.hp <= 0) destroyCrate(c);
    }
  }

  // Weapon attacks
  if (p.weapon) {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.dead) continue;
      var wReach = p.weapon === 'chain' ? 55 : p.weapon === 'bat' ? 40 : 30;
      if (Math.abs(e.x - (p.x + p.facing * wReach)) < 20 && Math.abs(e.y - p.y) < 25) {
        var wDmg = p.weapon === 'knife' ? 18 : p.weapon === 'bat' ? 22 : p.weapon === 'chain' ? 15 : 35;
        hitEnemy(e, Math.floor(wDmg * statB.damage), 120, p.facing);
        SFX.weaponHit();
        p.weaponUses--;
        if (p.weaponUses <= 0) { p.weapon = null; }
        p.hitThisAtk = true;
        break;
      }
    }
  }
}

function getAttackData(type) {
  switch(type) {
    case 'punch0': return { reach: 18, width: 16, height: 20, damage: 8, knockback: 40 };
    case 'punch1': return { reach: 20, width: 18, height: 20, damage: 10, knockback: 60 };
    case 'punch2': return { reach: 24, width: 20, height: 22, damage: 14, knockback: 100 };
    case 'kick': return { reach: 28, width: 20, height: 24, damage: 16, knockback: 130 };
    case 'jumpKick': return { reach: 22, width: 22, height: 28, damage: 20, knockback: 150 };
    case 'spinKick': return { reach: 35, width: 40, height: 30, damage: 18, knockback: 120 };
    case 'uppercut': return { reach: 16, width: 18, height: 30, damage: 22, knockback: 80 };
    case 'flyingKnee': return { reach: 24, width: 22, height: 26, damage: 25, knockback: 160 };
    case 'sporePunch': return { reach: 30, width: 36, height: 30, damage: 28, knockback: 140 };
    case 'groundSlam': return { reach: 40, width: 50, height: 20, damage: 18, knockback: 100 };
    default: return { reach: 18, width: 16, height: 20, damage: 8, knockback: 40 };
  }
}

function hitEnemy(e, damage, knockback, dir) {
  e.hp -= damage;
  e.stunned = true;
  e.stunTimer = HITSTUN;
  e.flashTimer = 80;
  e.knockback = true;
  e.kbVx = dir * knockback;
  e.kbVy = 0;
  e.attacking = false;

  // Release grab if brute was grabbing
  if (e.grabbing) {
    e.grabbing = false;
    if (player.grabbed) {
      player.grabbed = false;
      player.invincible = true;
      player.invTimer = 500;
    }
  }

  TAS.particles.spawn(e.x, e.y - e.h/2, '#ffff00', 5, 3, { size: 1, sizeVar: 2 });
  TAS.fx.shake(2, 0.85);

  comboHit();
  score += Math.floor(10 * comboCount * statB.scoreMult);

  // INT combo counter bonus
  if (statB.int >= 12 && comboCount >= 3) {
    var comboBonus = Math.floor(comboCount * 5 * statB.scoreMult);
    score += comboBonus;
    spawnFloatingText(e.x, e.y - e.h - 10, '+' + comboBonus, '#3cacd7');
  }

  if (e.hp <= 0) {
    killEnemy(e);
  }
}

function killEnemy(e) {
  e.dead = true;
  e.deathTimer = 600;
  e.kbVx = player.facing * 100;
  e.kbVy = -150;
  e.grounded = false;
  waveEnemiesAlive--;

  var bonus = e.xpValue * (1 + comboCount * 0.1);
  xp += Math.floor(bonus);
  score += Math.floor(e.xpValue * 5 * statB.scoreMult);
  checkLevelUp();

  TAS.particles.spawn(e.x, e.y - e.h/2, e.color, 10, 4, { size: 2, sizeVar: 3, gravity: 1 });
  TAS.fx.flash('#fff', 0.15);
  SFX.enemyDie();

  // Reactor thug leaves toxic trail on death
  if (e.type === 'reactor_thug') {
    TAS.particles.spawn(e.x, e.y, '#33ff55', 8, 3, { size: 2, sizeVar: 2, gravity: 0.3 });
  }

  // Weapon drop — CHA increases rate via luck stat
  var dropChance = 0.15 * statB.luck;
  if (Math.random() < dropChance && !e.isBoss) {
    var wTypes = ['bat','knife','chain'];
    weapons.push({ type: wTypes[TAS.math.randInt(0,2)], x: Math.floor(e.x), y: Math.floor(e.y) });
  }

  if (e.isBoss) {
    bossDefeated = true;
    score += Math.floor(500 * statB.scoreMult);
    TAS.fx.shake(8, 0.75);
    TAS.fx.flash('#ffdd44', 0.3);
    TAS.particles.spawn(e.x, e.y - e.h/2, '#ffdd44', 20, 6, { size: 3, sizeVar: 4, gravity: 1 });
    // Boss drops health
    weapons.push({ type: 'health', x: Math.floor(e.x), y: Math.floor(e.y) });
  }
}

function comboHit() {
  comboCount++;
  comboTimer = 2000;
  if (comboCount >= 2) {
    spawnFloatingText(player.x, player.y - player.h - 15, comboCount + ' SPORE!', comboCount >= 5 ? '#a855f7' : '#f4b41b');
  }
}

function checkLevelUp() {
  while (playerLevel < 7 && xp >= XP_LEVELS[playerLevel]) {
    playerLevel++;
    SFX.levelUp();
    TAS.fx.flash('#38d973', 0.3);
    TAS.particles.spawn(player.x, player.y - player.h, '#38d973', 15, 4, { size: 2, sizeVar: 3 });
    spawnFloatingText(player.x, player.y - player.h - 30, 'EVOLVED!', '#38d973');
  }
}

// ============================================================
// CRATE DESTRUCTION
// ============================================================
function destroyCrate(c) {
  c.destroyed = true;
  SFX.crateBreak();
  TAS.particles.spawn(c.x, c.y, c.type === 'reactor_barrel' ? '#44ff44' : '#aa8844', 8, 3, { size: 2, sizeVar: 2, gravity: 1 });

  if (c.type === 'reactor_barrel') {
    // Explosion damages nearby enemies
    SFX.explosion();
    TAS.fx.shake(5, 0.8);
    TAS.fx.flash('#ff8844', 0.15);
    TAS.particles.spawn(c.x, c.y, '#ff6622', 15, 5, { size: 3, sizeVar: 4, gravity: 0.5 });
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (!e.dead && Math.abs(e.x - c.x) < 50 && Math.abs(e.y - c.y) < 35) {
        hitEnemy(e, 25, 150, e.x > c.x ? 1 : -1);
      }
    }
    // Can hurt player too if too close
    if (Math.abs(player.x - c.x) < 35 && Math.abs(player.y - c.y) < 25 && !player.invincible) {
      damagePlayer(10, player.x > c.x ? 1 : -1);
    }
  } else {
    // Regular crate drops
    var roll = Math.random();
    if (roll < 0.4) {
      weapons.push({ type: 'health', x: Math.floor(c.x), y: Math.floor(c.y) });
    } else if (roll < 0.7) {
      var wTypes = ['bat','knife','chain'];
      weapons.push({ type: wTypes[TAS.math.randInt(0,2)], x: Math.floor(c.x), y: Math.floor(c.y) });
    }
  }
}

// ============================================================
// ENEMY AI
// ============================================================
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];

    if (e.dead) {
      e.deathTimer -= dt * 1000;
      if (!e.grounded) {
        e.vy += GRAVITY * dt;
        e.x += e.kbVx * dt;
        e.y += e.vy * dt;
        if (e.y >= FLOOR_BOT + 20) { e.y = FLOOR_BOT + 20; e.grounded = true; }
      }
      if (e.deathTimer <= 0) {
        enemies.splice(i, 1);
      }
      continue;
    }

    if (e.flashTimer > 0) e.flashTimer -= dt * 1000;

    // Knockback
    if (e.knockback) {
      e.x += e.kbVx * dt;
      e.y += e.kbVy * dt;
      e.kbVx *= 0.92;
      if (Math.abs(e.kbVx) < 5) { e.knockback = false; e.kbVx = 0; }
      e.y = TAS.math.clamp(e.y, FLOOR_TOP, FLOOR_BOT);
      e.x = TAS.math.clamp(e.x, scrollX - 20, scrollX + GW + 20);
      // Reactor thug toxic trail during knockback
      if (e.type === 'reactor_thug') {
        e.toxicTrailTimer += dt * 1000;
        if (e.toxicTrailTimer > 100) {
          e.toxicTrailTimer = 0;
          TAS.particles.spawn(e.x, e.y, '#33ff5588', 2, 2, { size: 1, sizeVar: 1, gravity: -0.2 });
        }
      }
      continue;
    }

    // Stun
    if (e.stunned) {
      e.stunTimer -= dt * 1000;
      if (e.stunTimer <= 0) { e.stunned = false; }
      continue;
    }

    // Brute grab logic
    if (e.type === 'mycelial_brute' && e.grabbing) {
      // Damage player while grabbed
      e.sporeTimer += dt * 1000;
      if (e.sporeTimer > 800) {
        e.sporeTimer = 0;
        if (!player.invincible) {
          damagePlayer(Math.floor(e.damage * 0.5), e.facing);
        }
      }
      continue;
    }

    // Attack animation
    if (e.attacking) {
      e.atkFrame += dt * 1000;
      if (e.atkFrame >= e.atkDuration) {
        e.attacking = false;
      }
      // Hit player at midpoint
      if (e.atkFrame > e.atkDuration * 0.4 && e.atkFrame < e.atkDuration * 0.6) {
        var dist = Math.abs(e.x - player.x);
        var yClose = Math.abs(e.y - player.y) < 20;
        if (dist < e.atkRange + 10 && yClose && !player.invincible && !player.stunned && !dodgeRolling) {
          damagePlayer(e.damage, e.x < player.x ? 1 : -1);
        }
      }
      continue;
    }

    // AI cooldown
    e.atkCooldown -= dt * 1000;

    // AI behavior
    var dx = player.x - e.x;
    var dy = player.y - e.y;
    var distToPlayer = Math.sqrt(dx*dx + dy*dy);

    e.facing = dx > 0 ? 1 : -1;

    // === Type-specific behaviors ===

    // Ninja jump approach
    if (e.type === 'ninja' && distToPlayer > 100 && Math.random() < 0.005) {
      e.vy = -250;
      e.grounded = false;
      e.x += e.facing * 40;
    }

    // Whip attack at range
    if (e.type === 'whip_guy' && distToPlayer < e.atkRange && distToPlayer > 30 && e.atkCooldown <= 0) {
      e.attacking = true;
      e.atkFrame = 0;
      e.atkDuration = 500;
      e.atkCooldown = e.atkCd;
      continue;
    }

    // Reactor Thug — charges at player when close
    if (e.type === 'reactor_thug' && distToPlayer < 80 && distToPlayer > 25 && e.atkCooldown <= 0 && Math.random() < 0.02) {
      e.x += e.facing * 30;
      e.attacking = true;
      e.atkFrame = 0;
      e.atkDuration = 400;
      e.atkCooldown = e.atkCd;
      continue;
    }

    // Spore Bomber — throw spore grenade at range
    if (e.type === 'spore_bomber' && distToPlayer < e.atkRange && distToPlayer > 35 && e.atkCooldown <= 0) {
      e.atkCooldown = e.atkCd + Math.random() * 500;
      // Launch spore projectile
      projectiles.push({
        x: e.x, y: e.y - 10,
        vx: e.facing * 120, vy: -80,
        damage: e.damage, life: 1500, type: 'spore',
        fromEnemy: true
      });
      SFX.sporeHit();
      continue;
    }

    // Mycelial Brute — grab on contact
    if (e.type === 'mycelial_brute' && distToPlayer < 28 && Math.abs(dy) < 15 && e.atkCooldown <= 0 && !player.grabbed && !player.invincible && !dodgeRolling) {
      e.grabbing = true;
      e.grabTarget = player;
      player.grabbed = true;
      player.grabEscapeMash = 1500; // mash to escape
      e.sporeTimer = 0;
      e.atkCooldown = e.atkCd;
      continue;
    }

    // Approach player
    if (distToPlayer > e.atkRange) {
      var moveX = (dx > 0 ? 1 : -1) * e.speed * dt;
      var moveY = (dy > 0 ? 1 : -1) * e.speed * 0.5 * dt;
      e.x += moveX;
      if (Math.abs(dy) > 8) e.y += moveY;
    } else if (e.atkCooldown <= 0 && Math.abs(dy) < 15) {
      e.attacking = true;
      e.atkFrame = 0;
      e.atkDuration = 400;
      e.atkCooldown = e.atkCd + Math.random() * 300;
    } else {
      e.aiTimer += dt * 1000;
      if (e.aiTimer > 600) {
        e.aiTimer = 0;
        e.y += (Math.random() > 0.5 ? 1 : -1) * 15;
      }
    }

    e.y = TAS.math.clamp(e.y, FLOOR_TOP, FLOOR_BOT);
    e.x = TAS.math.clamp(e.x, scrollX - 30, scrollX + GW + 30);
    applyGravity(e, dt);
  }
}

function damagePlayer(dmg, dir) {
  if (player.invincible || player.stunned || dodgeRolling) return;
  player.hp -= dmg;
  player.stunned = true;
  player.stunTimer = Math.floor(300 * statB.cooldown); // WIS reduces stun time
  player.vx = dir * 80;
  player.invincible = true;
  player.invTimer = 800;
  player.attacking = false;
  player.grabbing = null;
  comboCount = 0;
  comboTimer = 0;

  TAS.fx.shake(4, 0.85);
  TAS.fx.flash('#ff0000', 0.2);
  TAS.particles.spawn(player.x, player.y - player.h/2, '#ff4444', 6, 3);
  SFX.playerHurt();

  if (player.hp <= 0) {
    player.hp = 0;
    lives--;
    if (lives > 0) {
      // Respawn with partial health
      player.hp = Math.floor(player.maxHp * 0.5);
      player.invincible = true;
      player.invTimer = 2000;
      player.stunned = false;
      TAS.fx.flash('#ffffff', 0.3);
      spawnFloatingText(player.x, player.y - 50, 'SEEDS: ' + lives, '#e6482e');
    } else {
      state = 'dying';
      deathTimer = 2000;
      SFX.gameOver();
    }
  }
}

// ============================================================
// ALLY (CHA >= 15)
// ============================================================
function updateAlly(dt) {
  if (statB.cha < 15) return;

  allyTimer -= dt * 1000;
  if (!ally && allyTimer <= 0 && enemies.length > 0 && Math.random() < 0.001) {
    // Spawn ally
    ally = {
      x: player.x - 40, y: player.y,
      atkTimer: 0, life: 8000
    };
    spawnFloatingText(player.x, player.y - 60, 'SEEDLING JOINS!', '#3cacd7');
    allyTimer = 30000;
  }

  if (ally) {
    ally.life -= dt * 1000;
    ally.atkTimer -= dt * 1000;

    // Follow player
    var adx = player.x - 30 - ally.x;
    var ady = player.y - ally.y;
    ally.x += adx * 2 * dt;
    ally.y += ady * 2 * dt;

    // Attack nearest enemy
    if (ally.atkTimer <= 0) {
      var nearest = null, nearDist = 60;
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        if (e.dead) continue;
        var d = Math.abs(e.x - ally.x) + Math.abs(e.y - ally.y);
        if (d < nearDist) { nearest = e; nearDist = d; }
      }
      if (nearest) {
        hitEnemy(nearest, Math.floor(6 * statB.damage), 30, nearest.x > ally.x ? 1 : -1);
        SFX.allyAttack();
        ally.atkTimer = 1200;
      }
    }

    if (ally.life <= 0) {
      ally = null;
    }
  }
}

// ============================================================
// HAZARD UPDATE
// ============================================================
function updateHazards(dt) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.type === 'mycelial_growth') {
      h.shootTimer -= dt * 1000;
      if (h.shootTimer <= 0) {
        h.shootTimer = h.shootCd;
        // Shoot spore if player is on screen near this hazard
        var hsx = h.x - scrollX;
        if (hsx > -20 && hsx < GW + 20) {
          var dir = player.x > h.x ? 1 : -1;
          projectiles.push({
            x: h.x, y: h.y + 20,
            vx: dir * 60, vy: 20,
            damage: 6, life: 2000, type: 'spore',
            fromEnemy: true
          });
        }
      }
    }
  }
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function updateWaves() {
  var stage = STAGES[stageNum];
  if (waveIndex >= stage.waves.length) {
    if (enemies.length === 0 && !stageComplete) {
      stageComplete = true;
      stageCompleteTimer = 3000;
      SFX.stageComplete();
      if (player.hp === player.maxHp) {
        score += Math.floor(1000 * statB.scoreMult);
      }
    }
    return;
  }

  var wave = stage.waves[waveIndex];

  if (scrollX + GW * 0.6 >= wave.x && waveEnemiesAlive <= 0) {
    scrollLock = true;
    scrollTarget = Math.min(wave.x - GW * 0.3, stageWidth - GW);

    // Boss intro
    if (wave.boss) {
      var bn = '';
      for (var j = 0; j < wave.enemies.length; j++) {
        if (wave.enemies[j].boss && wave.enemies[j].bossName) bn = wave.enemies[j].bossName;
      }
      if (bn) {
        bossIntroTimer = 2000;
        bossIntroName = bn;
        SFX.bossIntro();
      }
    }

    for (var i = 0; i < wave.enemies.length; i++) {
      var edef = wave.enemies[i];
      var spawnX = scrollX + GW + 20 + i * 40;
      var spawnY = FLOOR_TOP + Math.floor(Math.random() * (FLOOR_BOT - FLOOR_TOP));
      enemies.push(createEnemy(edef.t, spawnX, spawnY, edef.boss, edef.bossName));
      waveEnemiesAlive++;
    }
    waveIndex++;
  }

  if (scrollLock && waveEnemiesAlive <= 0 && waveIndex <= stage.waves.length) {
    scrollLock = false;
    goArrowTimer = 2000;
  }
}

// ============================================================
// WEAPONS / PICKUPS
// ============================================================
function checkPickups() {
  for (var i = weapons.length - 1; i >= 0; i--) {
    var w = weapons[i];
    if (Math.abs(w.x - player.x) < 18 && Math.abs(w.y - player.y) < 18) {
      if (w.type === 'health') {
        player.hp = Math.min(player.maxHp, player.hp + 30);
        SFX.pickup();
        spawnFloatingText(w.x, w.y - 10, '+SPORE GEL', '#38d973');
        weapons.splice(i, 1);
      } else if (w.type === 'barrel') {
        launchBarrel(player.facing);
        weapons.splice(i, 1);
      } else {
        player.weapon = w.type;
        player.weaponUses = WEAPON_DURABILITY[w.type];
        weapons.splice(i, 1);
        SFX.pickup();
      }
    }
  }
}

function launchBarrel(dir) {
  projectiles.push({
    x: player.x + dir * 20, y: player.y - 10,
    vx: dir * 250, vy: -50,
    damage: Math.floor(35 * statB.damage), life: 1500, type: 'barrel',
    fromEnemy: false
  });
  SFX.throw_();
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.vy += 200 * dt;
    p.y += p.vy * dt;
    p.life -= dt * 1000;

    if (p.life <= 0 || p.y > FLOOR_BOT + 30) {
      // Spore explosion on landing
      if (p.type === 'spore') {
        TAS.particles.spawn(p.x, p.y, '#88aa33', 6, 3, { size: 2, sizeVar: 2 });
        // Area damage on landing for enemy spores
        if (p.fromEnemy && Math.abs(player.x - p.x) < 30 && Math.abs(player.y - p.y) < 25) {
          damagePlayer(p.damage, player.x > p.x ? 1 : -1);
        }
      }
      projectiles.splice(i, 1);
      continue;
    }

    if (p.fromEnemy) {
      // Enemy projectile — hits player
      if (Math.abs(player.x - p.x) < 18 && Math.abs(player.y - p.y) < 20 && !player.invincible && !dodgeRolling) {
        damagePlayer(p.damage, p.vx > 0 ? 1 : -1);
        if (p.type === 'spore') {
          TAS.particles.spawn(p.x, p.y, '#88aa33', 6, 3, { size: 2, sizeVar: 2 });
        }
        projectiles.splice(i, 1);
        continue;
      }
    } else {
      // Player projectile — hits enemies
      for (var j = 0; j < enemies.length; j++) {
        var e = enemies[j];
        if (e.dead) continue;
        if (Math.abs(e.x - p.x) < 20 && Math.abs(e.y - p.y) < 25) {
          hitEnemy(e, p.damage, 180, p.vx > 0 ? 1 : -1);
          TAS.fx.shake(4, 0.85);
          SFX.slam();
          projectiles.splice(i, 1);
          break;
        }
      }
    }
  }
}

// ============================================================
// BACK ATTACK
// ============================================================
function checkBackAttack(input) {
  if (!input.punch || player.attacking || !player.grounded) return;
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.dead || e.stunned) continue;
    var behind = (player.facing === 1 && e.x < player.x - 10) || (player.facing === -1 && e.x > player.x + 10);
    if (behind && Math.abs(e.x - player.x) < 30 && Math.abs(e.y - player.y) < 20) {
      startAttack(player, 'punch2', 300);
      player.facing = -player.facing;
      SFX.punch3();
      return true;
    }
  }
  return false;
}

// ============================================================
// FLOATING TEXT UPDATE
// ============================================================
function updateFloatingTexts(dt) {
  for (var i = floatingTexts.length - 1; i >= 0; i--) {
    var ft = floatingTexts[i];
    ft.life -= dt * 1000;
    ft.y -= 30 * dt;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt * 1000;
    if (comboTimer <= 0) { comboCount = 0; }
  }

  // Boss intro timer
  if (bossIntroTimer > 0) {
    bossIntroTimer -= dt * 1000;
  }

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (anyInput()) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (anyInput()) {
      state = 'title';
    }
    return;
  }

  if (state === 'stageIntro') {
    stageCompleteTimer -= dt * 1000;
    if (stageCompleteTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt * 1000;
    if (deathTimer <= 0) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('doublebaseling_hi', highScore);
      }
      state = 'gameOver';
    }
    return;
  }

  if (state === 'stageComplete') {
    stageCompleteTimer -= dt * 1000;
    if (stageCompleteTimer <= 0) {
      stageNum++;
      if (stageNum >= STAGES.length) {
        score += Math.floor(5000 * statB.scoreMult);
        if (score > highScore) { highScore = score; TAS.score.save('doublebaseling_hi', highScore); }
        state = 'gameOver';
      } else {
        player.hp = Math.min(player.maxHp, player.hp + 30);
        initStage();
        state = 'stageIntro';
        stageCompleteTimer = 2000;
      }
    }
    return;
  }

  if (state === 'playing') {
    var input = updateInput();

    if (!checkBackAttack(input)) {
      updatePlayer(dt, input);
    }

    checkPlayerAttacks();
    updateEnemies(dt);
    updateWaves();
    checkPickups();
    updateProjectiles(dt);
    updateFloatingTexts(dt);
    updateHazards(dt);
    updateAlly(dt);

    if (goArrowTimer > 0) goArrowTimer -= dt * 1000;

    if (stageComplete) {
      stageCompleteTimer -= dt * 1000;
      if (stageCompleteTimer <= 0) {
        state = 'stageComplete';
        stageCompleteTimer = 2500;
      }
    }
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawHazards();
  drawCrates();
  drawWeapons();
  drawProjectiles();

  // Sort all entities by Y for depth
  var entities = [];
  if (player.hp > 0 || lives > 0) entities.push({ type: 'player', y: player.y, obj: player });
  for (var i = 0; i < enemies.length; i++) {
    entities.push({ type: 'enemy', y: enemies[i].y, obj: enemies[i] });
  }
  entities.sort(function(a,b) { return a.y - b.y; });

  for (var i = 0; i < entities.length; i++) {
    if (entities[i].type === 'player') drawPlayer();
    else drawEnemy(entities[i].obj);
  }

  // Draw ally
  if (ally) drawAlly();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawControlsLegend();
  drawFloatingTexts();

  if (goArrowTimer > 0) drawGoArrow();
  if (bossIntroTimer > 0) drawBossIntro();
  if (state === 'dying') drawDeathOverlay();
  if (stageComplete) drawStageCompleteOverlay();

  // Charge indicator
  if (chargeTimer > 0 && statB.str >= 12) {
    var chargePct = Math.min(1, chargeTimer / 600);
    var cx = player.x - scrollX;
    var cy = player.y - player.h - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(Math.floor(cx - 12), Math.floor(cy), 24, 4);
    ctx.fillStyle = chargePct >= 1 ? '#ff4444' : '#ffaa44';
    ctx.fillRect(Math.floor(cx - 12), Math.floor(cy), Math.floor(24 * chargePct), 4);
  }

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// BACKGROUND RENDERING — Parallax per zone
// ============================================================
function drawBackground() {
  var stage = STAGES[stageNum];
  var ox = -scrollX;

  // Sky gradient
  ctx.fillStyle = stage.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Far parallax layer (0.2x)
  ctx.fillStyle = stage.parallaxColor;
  var farOff = ox * 0.2;
  for (var i = 0; i < 25; i++) {
    var fx = Math.floor(i * 100 + farOff);
    if (fx > -100 && fx < GW + 10) {
      var fh = 20 + (i * 43 % 35);
      ctx.fillRect(fx, FLOOR_TOP - fh + 15, 60, fh);
    }
  }

  // Mid buildings (0.4x)
  ctx.fillStyle = stage.buildings;
  var bOff = ox * 0.4;
  for (var i = 0; i < 20; i++) {
    var bx = Math.floor(i * 120 + bOff);
    if (bx > -120 && bx < GW + 10) {
      var bh = 40 + (i * 37 % 50);
      ctx.fillRect(bx, FLOOR_TOP - bh + 30, 80, bh);
      // Windows — spore glow
      ctx.fillStyle = '#a855f766';
      for (var wy = 0; wy < bh - 15; wy += 12) {
        for (var wx = 8; wx < 70; wx += 16) {
          if ((frame + i + wy) % 120 < 60) {
            ctx.fillRect(bx + wx, FLOOR_TOP - bh + 35 + wy, 6, 8);
          }
        }
      }
      ctx.fillStyle = stage.buildings;
    }
  }

  // Detail layer (0.6x)
  ctx.fillStyle = stage.detailColor;
  var mOff = ox * 0.6;
  for (var i = 0; i < 15; i++) {
    var mx = Math.floor(i * 150 + mOff);
    if (mx > -60 && mx < GW + 10) {
      ctx.fillRect(mx, FLOOR_TOP - 5, 60, 10);
    }
  }

  // Floor plane
  ctx.fillStyle = stage.floor;
  ctx.fillRect(0, FLOOR_TOP + 5, GW, FLOOR_BOT - FLOOR_TOP + 20);

  // Floor lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var ly = FLOOR_TOP + 15; ly <= FLOOR_BOT; ly += 12) {
    ctx.beginPath();
    ctx.moveTo(0, ly);
    ctx.lineTo(GW, ly);
    ctx.stroke();
  }

  // Zone-specific decorations
  drawZoneDetails(stage.zone, ox);
}

function drawZoneDetails(zone, ox) {
  if (zone === 'harbor') {
    // Dock planks and rope posts
    ctx.fillStyle = '#443322';
    for (var i = 0; i < 12; i++) {
      var px = Math.floor(i * 140 + ox * 0.5);
      if (px > -20 && px < GW + 20) {
        ctx.fillRect(px, FLOOR_TOP - 15, 6, 20);
        ctx.fillStyle = '#665544';
        ctx.fillRect(px - 4, FLOOR_TOP - 18, 14, 4);
        ctx.fillStyle = '#443322';
      }
    }
    // Water reflection at bottom
    ctx.fillStyle = 'rgba(30,60,100,0.3)';
    ctx.fillRect(0, FLOOR_BOT + 5, GW, 20);
  }

  if (zone === 'fungal') {
    // Mushroom clusters
    ctx.fillStyle = '#224433';
    for (var i = 0; i < 10; i++) {
      var mx = Math.floor(i * 160 + ox * 0.5);
      if (mx > -30 && mx < GW + 30) {
        // Stem
        ctx.fillRect(mx + 5, FLOOR_TOP - 20, 4, 18);
        // Cap
        ctx.fillStyle = '#44aa66';
        ctx.beginPath();
        ctx.arc(mx + 7, FLOOR_TOP - 22, 8, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#224433';
      }
    }
    // Spore particles in air
    if (frame % 8 === 0) {
      var sx = Math.floor(Math.random() * GW);
      TAS.particles.spawn(sx + scrollX, FLOOR_TOP + Math.random() * 30, '#44ff6644', 1, 1, { size: 1, gravity: -0.1 });
    }
  }

  if (zone === 'reactor') {
    // Pipes and machinery
    ctx.fillStyle = '#4a3a20';
    for (var i = 0; i < 8; i++) {
      var rx = Math.floor(i * 200 + ox * 0.5);
      if (rx > -40 && rx < GW + 40) {
        ctx.fillRect(rx, FLOOR_TOP - 40, 8, 45);
        ctx.fillRect(rx - 10, FLOOR_TOP - 42, 28, 6);
        // Glow
        ctx.fillStyle = '#44ff4422';
        ctx.fillRect(rx - 2, FLOOR_TOP - 35, 12, 3);
        ctx.fillStyle = '#4a3a20';
      }
    }
  }

  if (zone === 'hive') {
    // Honeycomb/hive walls
    ctx.fillStyle = '#2a1e3a';
    for (var i = 0; i < 15; i++) {
      var hx = Math.floor(i * 110 + ox * 0.45);
      if (hx > -30 && hx < GW + 30) {
        // Hexagonal shapes
        for (var j = 0; j < 3; j++) {
          var hy = FLOOR_TOP - 30 - j * 18;
          ctx.beginPath();
          ctx.moveTo(hx, hy - 8);
          ctx.lineTo(hx + 7, hy - 4);
          ctx.lineTo(hx + 7, hy + 4);
          ctx.lineTo(hx, hy + 8);
          ctx.lineTo(hx - 7, hy + 4);
          ctx.lineTo(hx - 7, hy - 4);
          ctx.closePath();
          ctx.fill();
        }
      }
    }
    // Purple mist
    if (frame % 12 === 0) {
      TAS.particles.spawn(Math.floor(Math.random() * GW) + scrollX, FLOOR_TOP + Math.random() * 40, '#6644aa33', 1, 1, { size: 2, gravity: -0.05 });
    }
  }

  if (zone === 'gate') {
    // Gate pillars
    ctx.fillStyle = '#3a1020';
    var gOff = ox * 0.4;
    for (var i = 0; i < 6; i++) {
      var gx = Math.floor(i * 250 + gOff + 100);
      if (gx > -30 && gx < GW + 30) {
        ctx.fillRect(gx, FLOOR_TOP - 60, 12, 65);
        ctx.fillStyle = '#cc2244';
        ctx.fillRect(gx - 2, FLOOR_TOP - 62, 16, 5);
        ctx.fillStyle = '#3a1020';
      }
    }
    // Red ambient glow at top
    var grad = ctx.createLinearGradient(0, 0, 0, 40);
    grad.addColorStop(0, 'rgba(150,20,30,0.15)');
    grad.addColorStop(1, 'rgba(150,20,30,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, 40);
  }
}

// ============================================================
// ENTITY DRAWING
// ============================================================
function drawPlayer() {
  var p = player;
  var sx = Math.floor(p.x - scrollX);
  var drawY = Math.floor(p.grounded ? p.y : p.y);

  if (p.invincible && Math.floor(frame / 3) % 2 === 0) return;

  // === BASELING SPRITE ===
  if (TAS.drawBaseling(ctx, sx, drawY - 18, 40, { flipX: p.facing < 0, frame: frame })) {
    ctx.globalAlpha = 1;
  } else {
    ctx.save();
    ctx.translate(sx, drawY);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();

  // Dodge roll visual
  if (dodgeRolling) {
    ctx.globalAlpha = 0.6;
    var rollAngle = ((DODGE_DURATION - dodgeTimer) / DODGE_DURATION) * Math.PI * 2;
    ctx.rotate(rollAngle);
  }

  // Grabbed visual
  if (p.grabbed) {
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.3) * 0.3;
  }

  var bodyColor = statB.color || '#44aaff';
  var headColor = '#ffcc88';
  var pantsColor = '#2244aa';

  if (p.stunned) bodyColor = '#aa4444';
  if (chargeTimer >= 600 && statB.str >= 12) bodyColor = '#ff6644';

  var jumpOff = p.grounded ? 0 : -20 + (p.vy > 0 ? 5 : -5);

  if (p.attacking && p.atkType === 'spinKick') {
    p.spinAngle += 0.3;
    ctx.rotate(p.spinAngle);
  }

  // Ground slam pose
  if (p.attacking && p.atkType === 'groundSlam' && !p.grounded) {
    ctx.rotate(0.3 * p.facing);
  }

  // Legs
  ctx.fillStyle = pantsColor;
  if (p.attacking && (p.atkType === 'kick' || p.atkType === 'jumpKick')) {
    ctx.fillRect(p.facing * 2, -14 + jumpOff, p.facing * 18, 6);
    ctx.fillRect(-4, -8 + jumpOff, 8, 10);
  } else {
    ctx.fillRect(-5, -10 + jumpOff, 5, 12);
    ctx.fillRect(1, -10 + jumpOff, 5, 12);
  }

  // Torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-7, -28 + jumpOff, 14, 18);

  // Arms
  if (p.attacking) {
    var progress = p.atkFrame / p.atkDuration;
    if (p.atkType.startsWith('punch') || p.atkType === 'sporePunch') {
      var ext = Math.floor(Math.sin(progress * Math.PI) * (p.atkType === 'sporePunch' ? 22 : 16));
      ctx.fillRect(p.facing > 0 ? 5 : -5 - ext, -26 + jumpOff, ext + 4, 5);
      // Spore punch glow
      if (p.atkType === 'sporePunch') {
        ctx.fillStyle = '#44ff8866';
        ctx.beginPath();
        ctx.arc(p.facing * (ext + 8), -24 + jumpOff, 6 + Math.sin(progress * Math.PI) * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (p.atkType === 'uppercut') {
      var ext = Math.floor(Math.sin(progress * Math.PI) * 14);
      ctx.fillRect(-2, -28 - ext + jumpOff, 5, ext + 4);
    } else if (p.atkType === 'flyingKnee') {
      ctx.fillRect(-6, -24 + jumpOff, 12, 5);
    } else if (p.atkType === 'groundSlam') {
      ctx.fillRect(-8, -20 + jumpOff, 16, 6);
    }
  } else {
    ctx.fillRect(-9, -26 + jumpOff, 4, 10);
    ctx.fillRect(5, -26 + jumpOff, 4, 10);
  }

  // Head
  ctx.fillStyle = headColor;
  ctx.fillRect(-5, -36 + jumpOff, 10, 10);

  // Headband — uses baseling color
  ctx.fillStyle = statB.color || '#ff4444';
  ctx.fillRect(-6, -34 + jumpOff, 12, 3);

  // Weapon in hand
  if (p.weapon) {
    ctx.fillStyle = p.weapon === 'bat' ? '#aa8844' : p.weapon === 'knife' ? '#cccccc' : '#888888';
    var wLen = p.weapon === 'chain' ? 25 : p.weapon === 'bat' ? 20 : 12;
    ctx.fillRect(p.facing * 8, -30 + jumpOff, p.facing * wLen, 3);
  }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Grab indicator
  if (p.grabbing && !p.grabbing.dead) {
    ctx.fillStyle = '#ffff44';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GRAB!', sx, drawY - 44);
  }

  // Grabbed by brute indicator
  if (p.grabbed) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MASH TO ESCAPE!', sx, drawY - 50);
    // Escape bar
    var escPct = Math.max(0, player.grabEscapeMash / 1500);
    ctx.fillStyle = '#333';
    ctx.fillRect(Math.floor(sx - 16), Math.floor(drawY - 46), 32, 4);
    ctx.fillStyle = '#ff6644';
    ctx.fillRect(Math.floor(sx - 16), Math.floor(drawY - 46), Math.floor(32 * escPct), 4);
  }
}

function drawEnemy(e) {
  var sx = Math.floor(e.x - scrollX);
  if (sx < -40 || sx > GW + 40) return;

  ctx.save();
  ctx.translate(sx, Math.floor(e.y));

  var jumpOff = e.grounded ? 0 : Math.min(0, Math.floor(e.vy * 0.02));

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 2, e.w * 0.7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Death animation
  if (e.dead) {
    var deathProg = 1 - (e.deathTimer / 600);
    ctx.globalAlpha = Math.max(0, 1 - deathProg);
    jumpOff += Math.floor(deathProg * -30);
  }

  var col = (e.flashTimer > 0) ? '#ffffff' : e.color;
  var bossScale = e.isBoss ? 1.3 : 1;
  var bruteScale = e.type === 'mycelial_brute' ? 1.5 : 1;
  var totalScale = bossScale * bruteScale;

  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(Math.floor(-4 * totalScale), -8 + jumpOff, Math.floor(4 * totalScale), Math.floor(10 * totalScale));
  ctx.fillRect(Math.floor(1 * totalScale), -8 + jumpOff, Math.floor(4 * totalScale), Math.floor(10 * totalScale));

  // Body
  ctx.fillStyle = col;
  ctx.fillRect(Math.floor(-6 * totalScale), Math.floor(-24 * totalScale) + jumpOff, Math.floor(12 * totalScale), Math.floor(16 * totalScale));

  // Arms
  if (e.attacking) {
    var ap = e.atkFrame / e.atkDuration;
    var ext = Math.floor(Math.sin(ap * Math.PI) * 14 * totalScale);
    ctx.fillRect(e.facing > 0 ? Math.floor(4*totalScale) : Math.floor(-4*totalScale) - ext, Math.floor(-22*totalScale) + jumpOff, ext + 3, Math.floor(4 * totalScale));
  } else {
    ctx.fillRect(Math.floor(-8 * totalScale), Math.floor(-22 * totalScale) + jumpOff, Math.floor(3 * totalScale), Math.floor(8 * totalScale));
    ctx.fillRect(Math.floor(5 * totalScale), Math.floor(-22 * totalScale) + jumpOff, Math.floor(3 * totalScale), Math.floor(8 * totalScale));
  }

  // Head
  ctx.fillStyle = e.type === 'ninja' ? '#222244' : e.type === 'reactor_thug' ? '#55cc77' : e.type === 'spore_bomber' ? '#99bb44' : e.type === 'mycelial_brute' ? '#775599' : '#ddaa88';
  ctx.fillRect(Math.floor(-4 * totalScale), Math.floor(-32 * totalScale) + jumpOff, Math.floor(8 * totalScale), Math.floor(8 * totalScale));

  // Type indicators
  if (e.type === 'ninja') {
    ctx.fillStyle = '#222';
    ctx.fillRect(Math.floor(-5 * totalScale), Math.floor(-30 * totalScale) + jumpOff, Math.floor(10 * totalScale), 3);
  }
  if (e.type === 'knife_girl') {
    ctx.fillStyle = '#ffaacc';
    ctx.fillRect(Math.floor(-5 * totalScale), Math.floor(-34 * totalScale) + jumpOff, Math.floor(10 * totalScale), 3);
  }
  if (e.type === 'whip_guy') {
    ctx.fillStyle = '#888';
    ctx.fillRect(e.facing * Math.floor(6 * totalScale), Math.floor(-20 * totalScale) + jumpOff, e.facing * 20, 2);
  }
  if (e.type === 'heavy') {
    ctx.fillStyle = col;
    ctx.fillRect(Math.floor(-8 * totalScale), Math.floor(-24 * totalScale) + jumpOff, Math.floor(16 * totalScale), Math.floor(6 * totalScale));
  }

  // Reactor Thug glow
  if (e.type === 'reactor_thug') {
    ctx.fillStyle = '#33ff5533';
    ctx.beginPath();
    ctx.arc(0, Math.floor(-12 * totalScale) + jumpOff, Math.floor(10 * totalScale), 0, Math.PI * 2);
    ctx.fill();
  }

  // Spore Bomber — small with spore pack
  if (e.type === 'spore_bomber') {
    ctx.fillStyle = '#667722';
    ctx.fillRect(Math.floor(-3 * totalScale), Math.floor(-18 * totalScale) + jumpOff, Math.floor(6 * totalScale), Math.floor(6 * totalScale));
    // Spore sack on back
    ctx.fillStyle = '#88aa33';
    ctx.beginPath();
    ctx.arc(Math.floor(-5 * e.facing * totalScale), Math.floor(-16 * totalScale) + jumpOff, Math.floor(4 * totalScale), 0, Math.PI * 2);
    ctx.fill();
  }

  // Mycelial Brute — tendrils
  if (e.type === 'mycelial_brute') {
    ctx.fillStyle = '#554477';
    for (var t = 0; t < 3; t++) {
      var tx = Math.floor((t - 1) * 6 * totalScale);
      var ty = Math.floor(-26 * totalScale) + jumpOff;
      var wave = Math.sin(frame * 0.05 + t) * 3;
      ctx.fillRect(tx, ty, 3, Math.floor(8 * totalScale));
      ctx.fillRect(tx + Math.floor(wave), ty - 4, 3, 4);
    }
    // Grab indicator
    if (e.grabbing) {
      ctx.fillStyle = '#ff444488';
      ctx.beginPath();
      ctx.arc(0, Math.floor(-15 * totalScale) + jumpOff, Math.floor(14 * totalScale), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Boss crown
  if (e.isBoss) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(-4, Math.floor(-36 * totalScale) + jumpOff, 8, 4);
    ctx.fillRect(-2, Math.floor(-39 * totalScale) + jumpOff, 2, 4);
    ctx.fillRect(1, Math.floor(-39 * totalScale) + jumpOff, 2, 4);
  }

  // Stunned stars
  if (e.stunned && !e.dead) {
    ctx.fillStyle = '#ffff00';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    var starOff = Math.sin(frame * 0.15) * 3;
    ctx.fillText('*', Math.floor(starOff - 5), Math.floor(-34 * totalScale) + jumpOff);
    ctx.fillText('*', Math.floor(starOff + 5), Math.floor(-36 * totalScale) + jumpOff);
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Health bar
  if ((e.isBoss || e.hp < e.maxHp) && !e.dead) {
    var barW = e.isBoss ? 40 : 24;
    var barH = 3;
    var barX = Math.floor(sx - barW/2);
    var barY = Math.floor(e.y - e.h * (e.isBoss ? 1.5 : 1.2) - 5);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = e.isBoss ? '#e6482e' : '#38d973';
    ctx.fillRect(barX, barY, Math.floor(barW * (e.hp / e.maxHp)), barH);
    // Boss name
    if (e.isBoss && e.bossName) {
      ctx.fillStyle = '#f4b41b';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.bossName, sx, barY - 3);
    }
  }
}

function drawAlly() {
  var ax = Math.floor(ally.x - scrollX);
  var ay = Math.floor(ally.y);
  ctx.save();
  ctx.translate(ax, ay);
  ctx.globalAlpha = Math.min(1, ally.life / 1000);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body — uses baseling color
  ctx.fillStyle = statB.color || '#44ddff';
  ctx.fillRect(-5, -22, 10, 14);
  // Head
  ctx.fillStyle = '#eebb88';
  ctx.fillRect(-4, -30, 8, 8);
  // Legs
  ctx.fillStyle = '#335566';
  ctx.fillRect(-4, -8, 4, 10);
  ctx.fillRect(1, -8, 4, 10);

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCrates() {
  for (var i = 0; i < crates.length; i++) {
    var c = crates[i];
    if (c.destroyed) continue;
    var sx = Math.floor(c.x - scrollX);
    if (sx < -20 || sx > GW + 20) continue;

    if (c.type === 'reactor_barrel') {
      ctx.fillStyle = '#448833';
      ctx.fillRect(sx - 8, Math.floor(c.y) - 12, 16, 16);
      ctx.fillStyle = '#33ff55';
      ctx.fillRect(sx - 2, Math.floor(c.y) - 8, 4, 4);
      // Glow
      ctx.fillStyle = '#33ff5522';
      ctx.beginPath();
      ctx.arc(sx, Math.floor(c.y) - 4, 10, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx - 8, Math.floor(c.y) - 12, 16, 16);
      ctx.strokeStyle = '#664422';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx - 8, Math.floor(c.y) - 12, 16, 16);
      ctx.fillStyle = '#aa8855';
      ctx.fillRect(sx - 1, Math.floor(c.y) - 12, 2, 16);
      ctx.fillRect(sx - 8, Math.floor(c.y) - 5, 16, 2);
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var sx = Math.floor(h.x - scrollX);
    if (sx < -30 || sx > GW + 30) continue;

    if (h.type === 'mycelial_growth') {
      // Fungal wall growth
      ctx.fillStyle = '#336633';
      ctx.fillRect(sx - 6, Math.floor(h.y), 12, 30);
      // Tendrils
      for (var t = 0; t < 3; t++) {
        var wave = Math.sin(frame * 0.03 + t * 2) * 4;
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(sx - 3 + Math.floor(wave) + t * 4, Math.floor(h.y) - 5 - t * 3, 3, 8 + t * 3);
      }
      // Spore indicator when about to shoot
      if (h.shootTimer < 500) {
        ctx.fillStyle = '#88ff4466';
        ctx.beginPath();
        ctx.arc(sx, Math.floor(h.y) + 15, 6 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawWeapons() {
  for (var i = 0; i < weapons.length; i++) {
    var w = weapons[i];
    var sx = Math.floor(w.x - scrollX);
    if (sx < -20 || sx > GW + 20) continue;

    var bob = Math.sin(frame * 0.08 + i) * 2;
    ctx.save();
    ctx.translate(sx, Math.floor(w.y + bob));

    ctx.fillStyle = '#888';
    ctx.fillRect(-2, 2, 4, 4);

    if (w.type === 'health') {
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(-5, -5, 10, 4);
      ctx.fillRect(-2, -8, 4, 10);
    } else {
      switch(w.type) {
        case 'bat':
          ctx.fillStyle = '#aa8844';
          ctx.fillRect(-10, -3, 20, 4);
          ctx.fillRect(8, -5, 4, 8);
          break;
        case 'knife':
          ctx.fillStyle = '#cccccc';
          ctx.fillRect(-6, -2, 12, 3);
          ctx.fillStyle = '#886633';
          ctx.fillRect(-8, -3, 4, 5);
          break;
        case 'chain':
          ctx.fillStyle = '#999999';
          for (var c = -8; c < 10; c += 4) {
            ctx.fillRect(c, -2, 3, 3);
          }
          break;
        case 'barrel':
          ctx.fillStyle = '#885522';
          ctx.fillRect(-8, -10, 16, 14);
          ctx.fillStyle = '#666';
          ctx.fillRect(-9, -8, 18, 2);
          ctx.fillRect(-9, -2, 18, 2);
          break;
      }
    }

    // Pickup glow
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.2;
    ctx.fillStyle = w.type === 'health' ? '#44ff88' : '#ffff88';
    ctx.beginPath();
    ctx.arc(0, -2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    var sx = Math.floor(p.x - scrollX);
    if (p.type === 'barrel') {
      ctx.fillStyle = '#885522';
      ctx.fillRect(sx - 8, Math.floor(p.y) - 10, 16, 14);
      ctx.fillStyle = '#666';
      ctx.fillRect(sx - 9, Math.floor(p.y) - 8, 18, 2);
    } else if (p.type === 'spore') {
      ctx.fillStyle = '#88aa33';
      ctx.beginPath();
      ctx.arc(sx, Math.floor(p.y), 4, 0, Math.PI * 2);
      ctx.fill();
      // Trail
      ctx.fillStyle = '#88aa3344';
      ctx.beginPath();
      ctx.arc(sx - Math.floor(p.vx * 0.02), Math.floor(p.y) - 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// HUD
// ============================================================
function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 32);

  // Player health
  ctx.fillStyle = '#444';
  ctx.fillRect(6, 4, 100, 10);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(6, 4, Math.floor(100 * hpPct), 10);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(6, 4, 100, 10);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 8, 12);

  // Seeds (lives)
  ctx.fillStyle = '#38d973';
  ctx.textAlign = 'left';
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(110 + i * 10, 5, 7, 8);
  }

  // Player level & XP
  ctx.fillStyle = '#3cacd7';
  ctx.fillText('LV' + playerLevel, 6, 26);

  var xpNext = playerLevel < 7 ? XP_LEVELS[playerLevel] : XP_LEVELS[6];
  var xpPrev = playerLevel > 1 ? XP_LEVELS[playerLevel - 1] : 0;
  var xpPct = playerLevel >= 7 ? 1 : (xp - xpPrev) / (xpNext - xpPrev);
  ctx.fillStyle = '#333';
  ctx.fillRect(32, 19, 50, 6);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(32, 19, Math.floor(50 * xpPct), 6);

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('POOP: ' + score, GW/2, 12);

  // Stage
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('Stage ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name, GW/2, 26);

  // High score
  ctx.fillStyle = '#7a444a';
  ctx.textAlign = 'right';
  ctx.font = '8px monospace';
  ctx.fillText('HI: ' + highScore, GW - 6, 12);

  // Weapon indicator
  if (player.weapon) {
    ctx.fillStyle = '#f4b41b';
    ctx.textAlign = 'right';
    var wName = player.weapon === 'bat' ? 'SPORE CLUB' : player.weapon === 'knife' ? 'MYCO SHARD' : player.weapon === 'chain' ? 'ROOT WHIP' : player.weapon.toUpperCase();
    ctx.fillText(wName + ' x' + player.weaponUses, GW - 6, 26);
  }

  // Move unlocks
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  var moveY = GH - 8;
  for (var i = 0; i < MOVE_NAMES.length; i++) {
    var unlocked = (i + 1) <= playerLevel;
    ctx.fillStyle = unlocked ? '#38d973' : '#333';
    if (i < 4) ctx.fillText((unlocked ? '>' : ' ') + MOVE_NAMES[i], 4, moveY - (3-i) * 9);
  }
}

// Persistent on-screen controls key (desktop only; title legend is behind the NFT gate).
var HAS_TOUCH = ('ontouchstart' in window);
function drawControlsLegend() {
  if (HAS_TOUCH) return;
  var bright = stageNum === 0 ? 0.85 : 0.4;
  ctx.globalAlpha = bright;
  ctx.fillStyle = '#000';
  ctx.fillRect(GW - 132, GH - 13, 128, 11);
  ctx.fillStyle = '#9fd6b0';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('ARROWS Move  A Punch  S Kick  W Hop  D Special', GW - 6, GH - 4);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawFloatingTexts() {
  for (var i = 0; i < floatingTexts.length; i++) {
    var ft = floatingTexts[i];
    var alpha = Math.min(1, ft.life / 300);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, Math.floor(ft.x - scrollX), Math.floor(ft.y));
  }
  ctx.globalAlpha = 1;
}

function drawGoArrow() {
  var alpha = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('GROW >>>', GW - 20, GH/2);
  ctx.globalAlpha = 1;
}

function drawBossIntro() {
  var progress = 1 - (bossIntroTimer / 2000);
  // Darken screen
  ctx.fillStyle = 'rgba(0,0,0,' + (0.6 * (1 - Math.abs(progress - 0.5) * 2)) + ')';
  ctx.fillRect(0, 0, GW, GH);

  if (progress > 0.2 && progress < 0.8) {
    // Name card
    ctx.fillStyle = 'rgba(26,28,44,0.9)';
    ctx.fillRect(0, GH/2 - 25, GW, 50);
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    ctx.strokeRect(10, GH/2 - 24, GW - 20, 48);

    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TOXIC ALERT', GW/2, GH/2 - 8);

    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(bossIntroName, GW/2, GH/2 + 14);
  }
}

  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 220);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, 245);
  ctx.globalAlpha = 1;

  // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT
  var _sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF'; ctx.textAlign = 'center'; ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW/2, 270);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 115;
    ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = 278;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _yy + 3, 40 * Math.max(0.04, Math.min(1, _v/200)), 4);
    }
    ctx.textAlign = 'center';
  }
}

function drawStageIntro() {
  var stage = STAGES[stageNum];
  ctx.fillStyle = stage.bg || '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  // Zone name banner
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GH/2 - 30, GW, 60);

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stageNum + 1), GW/2, GH/2 - 10);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText(stage.name, GW/2, GH/2 + 14);

  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Your baseling is ready...', GW/2, GH/2 + 36);
}

function drawStageCompleteOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, GH);

  var pulse = Math.sin(frame * 0.08) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GARDEN CLEARED!', GW/2, GH/2 - 10);

  if (player.hp === player.maxHp) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('PERFECT HARVEST! +' + Math.floor(1000 * statB.scoreMult), GW/2, GH/2 + 15);
  }
  ctx.globalAlpha = 1;
}

function drawDeathOverlay() {
  var alpha = Math.min(0.7, (2000 - deathTimer) / 2000);
  ctx.fillStyle = 'rgba(80,0,0,' + alpha + ')';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WILTED', GW/2, GH/2);
}

function drawGameOverScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (stageNum >= STAGES.length) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPORE CITY SAVED!', GW/2, 60);

    ctx.fillStyle = '#38d973';
    ctx.font = '12px monospace';
    ctx.fillText('Your baseling conquered all 5 fungal zones!', GW/2, 90);
  } else {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMPOSTED', GW/2, 60);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('POOP TOKENS: ' + score, GW/2, 120);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 140);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, 140);
  }

  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.fillText('Gardens cleared: ' + (stageNum + 1) + '/' + STAGES.length, GW/2, 165);
  ctx.fillText('Evolution: ' + playerLevel + '/7', GW/2, 180);

  // Baseling stat summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' (Lv' + statB.level + ') - DMG:x' + statB.damage.toFixed(1) + ' SPD:x' + statB.speed.toFixed(1) + ' HP:x' + statB.hpMult.toFixed(1), GW/2, 200);
  }

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, 235);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME LOOP START
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
