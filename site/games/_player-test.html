<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BaselingPlayer test harness</title>
<style>
  body { background:#0b0e17; color:#e8eef7; font-family:monospace; padding:16px; }
  button { background:#0052FF;color:#fff;border:0;border-radius:6px;padding:8px 12px;margin:4px;cursor:pointer;font-family:monospace; }
  pre { background:#131826;border:1px solid #243049;border-radius:8px;padding:12px;white-space:pre-wrap;font-size:12px; }
  h3 { color:#0052FF; }
</style>
</head>
<body>
<h3>BaselingPlayer test harness</h3>
<button id="btn-picker">Show picker</button>
<pre id="out">running...</pre>

<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script>
(function(){
  // Point sprite resolver at the local _sprites folder so real art renders.
  var MAP = {
    'cat':'baby-cat-white.png','frog':'baby-frog-green.png','bull':'baby-bull.png',
    'redpanda':'baby-redpanda.png','wimmple':'baby-floof-cat.png' // wimmple has no png here; reuse floof for visual
  };
  BaselingSprites.setResolver(function(id){ return '_sprites/' + (MAP[id] || (id + '.png')); });

  var log = [];
  function rec(label, val){ log.push(label + ': ' + JSON.stringify(val)); document.getElementById('out').textContent = log.join('\n'); }

  // --- Mock the roster API. We test 3 scenarios sequentially. ---
  var SCENARIO = 'v2'; // 'v2' | 'old' | 'noStats'
  var realFetch = window.fetch.bind(window);
  window.fetch = function(url, opts){
    if (typeof url === 'string' && url.indexOf('/api/baseling/arcade-roster') === 0) {
      var body;
      if (SCENARIO === 'v2') {
        body = { found:true, source:'save', roster: [
          { tokenId: 7, charId:'frog', charName:'Frog', rarity:'epic', stage:3, sparkle:true, alive:true,
            stats:{speed:180,stamina:50,power:120,luck:90,swim:160}, baseStats:{speed:120,stamina:40,power:100,luck:80,swim:140}, tokenFeeds:{weth:{total:1.2}} },
          { tokenId: 9, charId:'bull', charName:'Bull', rarity:'rare', stage:2, alive:true,
            stats:{speed:30,stamina:200,power:200,luck:10,swim:5}, baseStats:{speed:25,stamina:180,power:180,luck:8,swim:4} }
        ]};
      } else if (SCENARIO === 'old') {
        // Old shape: { baselings: [...] } with NO stats field
        body = { baselings: [
          { tokenId: 3, charId:'cat', charName:'Cat', rarity:'common', stage:1, alive:true }
        ]};
      } else {
        body = { found:true, source:'chain', roster: [
          { tokenId: 5, charId:'redpanda', charName:'Red Panda', rarity:'legendary', stage:4 } // no stats -> default 10
        ]};
      }
      return Promise.resolve({ ok:true, json:function(){ return Promise.resolve(body); } });
    }
    return realFetch(url, opts);
  };

  // Mock an authorized wallet (eth_accounts returns an address, no popup).
  // Suppress with ?nowallet to test the genuine no-wallet cold start.
  var NO_WALLET = /[?&]nowallet/.test(window.location.search);
  if (!NO_WALLET) window.ethereum = {
    request: function(args){
      if (args.method === 'eth_accounts') return Promise.resolve(['0x1111111111111111111111111111111111111111']);
      if (args.method === 'eth_requestAccounts') return Promise.resolve(['0x1111111111111111111111111111111111111111']);
      if (args.method === 'wallet_switchEthereumChain') return Promise.resolve(null);
      return Promise.resolve(null);
    }
  };

  // Expose a runner so puppeteer can drive scenarios
  window.runScenario = function(scenario){
    SCENARIO = scenario;
    // reset module state by reloading? The module caches initPromise. For test we
    // re-fetch via connect() which rebuilds the roster from the mock.
    return BaselingPlayer.connect().then(function(){
      var sel = BaselingPlayer.getSelected();
      var stats = BaselingPlayer.getStats();
      var multsSP = BaselingPlayer.getMults();
      var multsPVP = BaselingPlayer.getMults({pvp:true});
      return {
        scenario: scenario,
        rosterLen: BaselingPlayer.getRoster().length,
        rosterError: BaselingPlayer.getRosterError(),
        selectedName: sel.charName,
        selectedTokenId: sel.tokenId,
        stats: stats,
        multsSP: multsSP,
        multsPVP: multsPVP,
        names: BaselingPlayer.getRoster().map(function(e){return e.charName;})
      };
    });
  };

  // Test no-wallet fallback (Wimmple)
  window.runNoWallet = function(){
    window.ethereum = undefined;
    // force fresh init by clearing the internal promise via a fresh page is ideal,
    // but we can call connect() which returns null and leaves Wimmple.
    // Instead validate getSelected default works with no init:
    return Promise.resolve({
      defaultSelected: BaselingPlayer.getSelected().charName,
      defaultStats: BaselingPlayer.getStats(),
      defaultMults: BaselingPlayer.getMults()
    });
  };

  // For the no-wallet cold start, wipe any persisted selection first.
  if (NO_WALLET) { try { localStorage.removeItem('mft_arcade_baseling'); } catch(e){} }

  // initial auto-init (silent) with v2
  BaselingPlayer.init({}).then(function(){
    rec('init.ready', BaselingPlayer.isReady());
    rec('init.selected', BaselingPlayer.getSelected().charName);
    rec('init.rosterLen', BaselingPlayer.getRoster().length);
  });

  document.getElementById('btn-picker').onclick = function(){
    BaselingPlayer.select(function(entry){
      rec('PICKED', { name: entry.charName, tokenId: entry.tokenId, mults: BaselingPlayer.getMults() });
    });
  };
})();
</script>
</body>
</html>
