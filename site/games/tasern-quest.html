// Generate dungeon maps (10x10 each floor)
var DG_W = 10, DG_H = 10;
function genDungeon(dIdx) {
  var d = DUNGEONS[dIdx];
  d.map = [];
  for (var f = 0; f < d.floors; f++) {
    var floor = [];
    for (var y = 0; y < DG_H; y++) {
      var row = [];
      for (var x = 0; x < DG_W; x++) {
        if (x === 0 || x === DG_W-1 || y === 0 || y === DG_H-1) row.push(1); // wall
        else row.push(Math.random() < 0.2 ? 1 : 0); // 0=floor, 1=wall
      }
      floor.push(row);
    }
    // Ensure entrance (bottom center) and exit (top center) are open
    floor[DG_H-2][Math.floor(DG_W/2)] = 0;
    floor[1][Math.floor(DG_W/2)] = 0;
    // Carve a rough path
    var cx = Math.floor(DG_W/2), cy = DG_H-2;
    while (cy > 1) {
      floor[cy][cx] = 0;
      if (Math.random() < 0.5 && cx > 1 && cx < DG_W-2) cx += Math.random() < 0.5 ? 1 : -1;
      else cy--;
    }
    d.map.push(floor);
  }
}
for (var di = 0; di < DUNGEONS.length; di++) genDungeon(di);

function newPlayer() {
  return {
    name: 'Hero',
    lv: 1, xp: 0, xpNext: 20,
    hp: 35, maxHp: 35,
    mp: 10, maxMp: 10,

function getAtk(p) { return p.baseAtk + WEAPONS[p.weapon].atk; }
function getDef(p) { return p.baseDef + ARMORS[p.armor].def + SHIELDS[p.shield].def + p.bufDef; }
function getAgi(p) { return p.baseAgi; }

function xpForLevel(lv) { return Math.floor(20 * Math.pow(1.5, lv - 1)); }

function levelUp() {
  player.lv++;
  player.xpNext = xpForLevel(player.lv);
  player.maxHp += TAS.math.randInt(4, 8);
  player.maxMp += TAS.math.randInt(2, 4);
  player.baseAtk += TAS.math.randInt(1, 3);
  player.baseDef += TAS.math.randInt(1, 2);
  player.baseAgi += TAS.math.randInt(1, 2);
  player.hp = player.maxHp;
  player.mp = player.maxMp;
  // Learn spells
  for (var i = 0; i < SPELLS.length; i++) {
    if (SPELLS[i].learnLv === player.lv) {
      var has = false;
      for (var j = 0; j < player.spells.length; j++) {
        if (player.spells[j].name === SPELLS[i].name) has = true;
      }
      if (!has) {
        player.spells.push(SPELLS[i]);
        addText('Learned ' + SPELLS[i].name + '!');
      }
    }
  }
  sfxLevelUp();
  addText('Level up! Now LV ' + player.lv + '!');
}

// === SAVE/LOAD ===
function saveGame() {
  try { localStorage.setItem('tasernquest_save', JSON.stringify(player)); } catch(e) { console.error('Save failed:', e); }
}
function loadGame() {
  try {
    var d = localStorage.getItem('tasernquest_save');
    if (d) { player = JSON.parse(d); return true; }
  } catch(e) { console.error('Load failed:', e); }
  return false;
}

  return (TAS.input.keys[k] && !prevKeys[k]);
}
function copyKeys() {
  prevKeys = {};
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}

// Touch input for menus
var touchTapX = -1, touchTapY = -1, touchTapped = false;
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'OK', b: 'BACK' } });
var canvas = TAS.canvas;
canvas.addEventListener('click', function(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = GW / rect.width;
  var scaleY = GH / rect.height;
  touchTapX = (e.clientX - rect.left) * scaleX;
  touchTapY = (e.clientY - rect.top) * scaleY;
  touchTapped = true;
  TAS.audio.ensureAudio();
});

// === DRAW HELPERS ===
function drawBox(x, y, w, h, bg, border) {
  ctx.fillStyle = bg || '#111133';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = border || '#aaaacc';
  ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, w-2, h-2);
}

function drawText(txt, x, y, color, size, align) {
  ctx.fillStyle = color || '#ffffff';
  ctx.font = (size || 10) + 'px monospace';
  ctx.textAlign = align || 'left';
  ctx.fillText(txt, x, y);
}

function drawTextBox(msg, y) {
  drawBox(8, y || (GH - 56), GW - 16, 48);
  drawText(msg, 16, (y || (GH - 56)) + 20, '#fff', 10);
  drawText('[OK]', GW - 30, (y || (GH - 56)) + 40, '#aaa', 8, 'right');
}

// === MONSTER ART (procedural) ===
function drawMonster(m, cx, cy) {
  var c = m.color;
  ctx.save();
  switch(m.type) {
    case 'slime':
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 10, 30, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 8, cy + 2, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 8, cy + 2, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(cx - 7, cy + 3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 9, cy + 3, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'rat':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 25, 15, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 20, cy + 5, 8, 6, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcccc';
      ctx.beginPath(); ctx.ellipse(cx - 15, cy - 5, 6, 8, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 5, cy - 5, 6, 8, 0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff3333';
      ctx.beginPath(); ctx.arc(cx - 12, cy + 5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 2, cy + 5, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx + 25, cy + 15); ctx.quadraticCurveTo(cx+40, cy+5, cx+35, cy-5); ctx.stroke();
      break;
    case 'bat':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 12, 10, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx - 40, cy - 20); ctx.lineTo(cx - 30, cy + 10); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 12, cy); ctx.lineTo(cx + 40, cy - 20); ctx.lineTo(cx + 30, cy + 10); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(cx - 4, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'goblin':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 15, 18, 22, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy - 12, 14, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff44';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 14, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 14, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#662200';
      ctx.beginPath(); ctx.moveTo(cx - 14, cy - 20); ctx.lineTo(cx - 8, cy - 26); ctx.lineTo(cx - 5, cy - 18); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 14, cy - 20); ctx.lineTo(cx + 8, cy - 26); ctx.lineTo(cx + 5, cy - 18); ctx.fill();
      break;
    case 'skeleton':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 10, 12, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(cx - 3, cy + 4, 6, 30);
      ctx.fillRect(cx - 15, cy + 8, 30, 4);
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 12, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy - 12, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(cx - 3, cy - 4, 6, 3);
      break;
    case 'wolf':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 30, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 25, cy, 12, 10, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(cx - 30, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 22, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx - 30, cy + 6); ctx.lineTo(cx - 26, cy + 10); ctx.lineTo(cx - 22, cy + 6); ctx.fill();
      break;
    case 'orc':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 24, 28, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy - 22, 16, 16, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 24, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 24, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx - 6, cy - 14); ctx.lineTo(cx - 3, cy - 18); ctx.lineTo(cx, cy - 14); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx, cy - 14); ctx.lineTo(cx + 3, cy - 18); ctx.lineTo(cx + 6, cy - 14); ctx.fill();
      break;
    case 'ghost':
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 5, 20, 24, 0, 0, Math.PI); ctx.fill();
      ctx.fillRect(cx - 20, cy - 5, 40, 30);
      for (var gi = 0; gi < 5; gi++) {
        ctx.beginPath(); ctx.arc(cx - 16 + gi * 8, cy + 25, 4, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(cx - 7, cy - 8, 4, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 7, cy - 8, 4, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 5, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'golem':
      ctx.fillStyle = c;
      ctx.fillRect(cx - 20, cy - 20, 40, 50);
      ctx.fillRect(cx - 12, cy - 35, 24, 20);
      ctx.fillRect(cx - 35, cy - 10, 15, 35);
      ctx.fillRect(cx + 20, cy - 10, 15, 35);
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 28, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 28, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'wyvern':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 22, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 15, cy - 15, 10, 8, -0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 22, cy); ctx.lineTo(cx - 50, cy - 30); ctx.lineTo(cx - 35, cy + 5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 22, cy); ctx.lineTo(cx + 50, cy - 30); ctx.lineTo(cx + 35, cy + 5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 18, cy - 17, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'knight':
      ctx.fillStyle = c;
      ctx.fillRect(cx - 14, cy - 30, 28, 55);
      ctx.beginPath(); ctx.ellipse(cx, cy - 35, 12, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#882222';
      ctx.beginPath(); ctx.moveTo(cx - 12, cy - 45); ctx.lineTo(cx, cy - 55); ctx.lineTo(cx + 12, cy - 45); ctx.fill();
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(cx + 14, cy - 20, 25, 4);
      ctx.fillRect(cx + 35, cy - 30, 4, 20);
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(cx - 3, cy - 37, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 3, cy - 37, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'fire':
      ctx.fillStyle = '#ff3300';
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 25, 30, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 16, 22, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff44';
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 8, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 6, cy - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6, cy - 2, 3, 0, Math.PI*2); ctx.fill();
      // Flames on top
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.moveTo(cx - 10, cy - 20); ctx.lineTo(cx - 5, cy - 40); ctx.lineTo(cx, cy - 20); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx, cy - 22); ctx.lineTo(cx + 5, cy - 42); ctx.lineTo(cx + 10, cy - 22); ctx.fill();
      break;
    case 'lich':
      ctx.fillStyle = '#221133';
      ctx.beginPath(); ctx.moveTo(cx - 20, cy - 30); ctx.lineTo(cx + 20, cy - 30); ctx.lineTo(cx + 25, cy + 30); ctx.lineTo(cx - 25, cy + 30); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 30, 14, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#44ff44';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 32, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy - 32, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#44ff44';
      ctx.beginPath(); ctx.arc(cx + 30, cy - 10, 6, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 30, cy - 10, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'dragon':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 35, 25, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 30, cy - 20, 14, 12, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 35, cy); ctx.lineTo(cx - 60, cy - 35); ctx.lineTo(cx - 40, cy + 5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 35, cy); ctx.lineTo(cx + 60, cy - 35); ctx.lineTo(cx + 40, cy + 5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 34, cy - 23, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 26, cy - 23, 3, 0, Math.PI*2); ctx.fill();
      // horns
      ctx.fillStyle = '#880000';
      ctx.beginPath(); ctx.moveTo(cx - 35, cy - 30); ctx.lineTo(cx - 38, cy - 45); ctx.lineTo(cx - 30, cy - 30); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 25, cy - 30); ctx.lineTo(cx - 22, cy - 45); ctx.lineTo(cx - 20, cy - 30); ctx.fill();
      break;
    case 'boss':
      // Dark Spore King - large mushroom demon
      ctx.fillStyle = '#110022';
      ctx.beginPath(); ctx.ellipse(cx, cy + 20, 35, 30, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 15, 40, 28, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#440066';
      ctx.beginPath(); ctx.ellipse(cx, cy - 15, 40, 28, 0, 0, Math.PI); ctx.fill();
      // spots
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath(); ctx.arc(cx - 15, cy - 25, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy - 30, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 20, cy - 20, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 25, cy - 15, 3, 0, Math.PI*2); ctx.fill();
      // eyes
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(cx - 10, cy + 10, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy + 10, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 10, cy + 10, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy + 10, 2, 0, Math.PI*2); ctx.fill();
      // tentacles
      ctx.strokeStyle = '#330055';
      ctx.lineWidth = 3;
      var t = frame * 0.03;
      for (var ti = 0; ti < 5; ti++) {
        ctx.beginPath();
        ctx.moveTo(cx - 30 + ti * 15, cy + 45);
        ctx.quadraticCurveTo(cx - 30 + ti * 15 + Math.sin(t + ti) * 8, cy + 60, cx - 30 + ti * 15 + Math.sin(t + ti + 1) * 5, cy + 75);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      break;
    default:
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy, 25, 25, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// === TILE DRAWING ===
function drawTile(type, x, y, size) {
  var s = size || TILE;
  switch(type) {
    case T.GRASS:
      ctx.fillStyle = COL.grass;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#3a7a3a';
      ctx.fillRect(x + 3, y + 4, 2, 3);
      ctx.fillRect(x + 9, y + 8, 2, 3);
      ctx.fillRect(x + 12, y + 2, 2, 3);
      break;
    case T.FOREST:
      ctx.fillStyle = COL.forest;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#2a5a2a';
      ctx.beginPath(); ctx.arc(x + s/2, y + s/3, s/3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#553311';
      ctx.fillRect(x + s/2 - 1, y + s/2, 2, s/2);
      break;
    case T.MOUNTAIN:
      ctx.fillStyle = COL.mountain;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#887766';
      ctx.beginPath(); ctx.moveTo(x + s/2, y + 2); ctx.lineTo(x + 2, y + s - 2); ctx.lineTo(x + s - 2, y + s - 2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.moveTo(x + s/2, y + 2); ctx.lineTo(x + s/2 - 3, y + 5); ctx.lineTo(x + s/2 + 3, y + 5); ctx.closePath(); ctx.fill();
      break;
    case T.WATER:
      ctx.fillStyle = COL.water;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#3355aa';
      var wv = Math.sin((x + frame * 0.5) * 0.3) * 2;
      ctx.fillRect(x + 2, y + 6 + wv, s - 4, 2);
      ctx.fillRect(x + 4, y + 11 - wv, s - 6, 2);
      break;
    case T.SAND:
      ctx.fillStyle = COL.sand;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#bbaa55';
      ctx.fillRect(x + 4, y + 6, 2, 2);
      ctx.fillRect(x + 10, y + 12, 2, 2);
      break;
    case T.TOWN:
      ctx.fillStyle = COL.sand;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.town;
      ctx.fillRect(x + 3, y + 5, s - 6, s - 6);
      ctx.fillStyle = '#aa4444';
      ctx.beginPath(); ctx.moveTo(x + 2, y + 5); ctx.lineTo(x + s/2, y + 1); ctx.lineTo(x + s - 2, y + 5); ctx.closePath(); ctx.fill();
      break;
    case T.DUNGEON:
      ctx.fillStyle = COL.grass;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.dungeon;
      ctx.fillRect(x + 3, y + 3, s - 6, s - 4);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 5, y + 6, s - 10, s - 8);
      break;
    case T.BRIDGE:
      ctx.fillStyle = COL.water;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.bridge;
      ctx.fillRect(x + 2, y + 4, s - 4, s - 8);
      ctx.fillStyle = '#553300';
      ctx.fillRect(x + 2, y + 4, s - 4, 2);
      ctx.fillRect(x + 2, y + s - 6, s - 4, 2);
      break;
    case T.PATH:
      ctx.fillStyle = COL.path;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#887755';
      ctx.fillRect(x + 3, y + 3, 2, 2);
      ctx.fillRect(x + 9, y + 10, 2, 2);
      break;
    case T.CASTLE:
      ctx.fillStyle = COL.path;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.castle;
      ctx.fillRect(x + 2, y + 4, s - 4, s - 4);
      ctx.fillStyle = '#555';
      ctx.fillRect(x + 2, y + 2, 4, 4);
      ctx.fillRect(x + s - 6, y + 2, 4, 4);
      ctx.fillRect(x + s/2 - 2, y + 2, 4, 4);
      ctx.fillStyle = '#880000';
      ctx.fillRect(x + s/2 - 2, y + s - 6, 4, 5);
      break;
  }
}

// === PLAYER SPRITE ===
function drawPlayer(px, py) {
  // Small baseling character
  ctx.fillStyle = '#44aaff';
  ctx.beginPath(); ctx.ellipse(px + 8, py + 6, 5, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3388dd';
  ctx.beginPath(); ctx.ellipse(px + 8, py + 12, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px + 6, py + 5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 10, py + 5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';

}

// === GET ENCOUNTER ZONE ===
function getZone(px, py) {
  // Distance from start determines zone
  var dist = Math.sqrt((px - 3) * (px - 3) + (py - 3) * (py - 3));
  if (dist < 5) return 1;
  if (dist < 9) return 2;
  if (dist < 13) return 3;
  if (dist < 17) return 4;
  return 5;
}

function getDungeonZone(dIdx) {
  return Math.min(5, dIdx + 2);
}

function getRandomMonster(zone) {
  var pool = [];
  for (var i = 0; i < MONSTERS.length - 1; i++) { // exclude boss
    if (MONSTERS[i].zone <= zone && MONSTERS[i].zone >= zone - 1) pool.push(i);
  }
  if (pool.length === 0) pool = [0];
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

// === BATTLE SYSTEM ===
function startBattle(monsterIdx, isBoss) {
  var m = MONSTERS[monsterIdx];
  battleState = {
    enemy: {
      name: m.name, hp: m.hp, maxHp: m.hp, atk: m.atk, def: m.def, agi: m.agi,
      xp: m.xp, gold: m.gold, color: m.color, type: m.type, idx: monsterIdx,
      asleep: 0, isBoss: isBoss || false
    },
    phase: 'start', // start, menu, spell, item, animPlayer, animEnemy, result, victory, dead, flee
    menu: 0,
    spellMenu: 0,
    itemMenu: 0,
    msg: '',
    timer: 0,
    animFrame: 0,
    playerDmg: 0,
    enemyDmg: 0,
    bossPhase: isBoss ? 1 : 0
  };
  player.bufDef = 0;
  state = 'battle';
  sfxEncounter();
  battleState.msg = m.name + ' appeared!';
  battleState.timer = 60;
}

function battleUpdate(dt) {
  var b = battleState;
  if (!b) return;

  b.animFrame++;

  if (b.timer > 0) {
    b.timer--;
    if (b.timer === 0) {
      if (b.phase === 'start') b.phase = 'menu';
      else if (b.phase === 'animPlayer') {
        // Apply player action result
        if (b.enemyDmg > 0) {
          b.enemy.hp -= b.enemyDmg;
          if (b.enemy.hp <= 0) {
            b.enemy.hp = 0;
            b.phase = 'victory';
            b.msg = b.enemy.name + ' defeated!';
            b.timer = 90;
            sfxVictory();
            return;
          }
        }
        // Check boss phase change
        if (b.enemy.isBoss && b.enemy.hp < b.enemy.maxHp * (1 - b.bossPhase * 0.3) && b.bossPhase < 3) {
          b.bossPhase++;
          b.msg = b.enemy.name + ' grows stronger! Phase ' + b.bossPhase + '!';
          b.enemy.atk += 10;
          b.enemy.def += 5;
          b.timer = 60;
          return;
        }
        // Enemy turn
        b.phase = 'animEnemy';
        enemyAction(b);
      }
      else if (b.phase === 'animEnemy') {
        // Apply enemy damage
        if (b.playerDmg > 0) {
          player.hp -= b.playerDmg;
          TAS.fx.shake(3, 0.85);
          if (player.hp <= 0) {
            player.hp = 0;
            b.phase = 'dead';
            b.msg = 'You have been defeated...';
            b.timer = 120;
            sfxDeath();
            return;
          }
        }
        // Check if enemy still asleep
        if (b.enemy.asleep > 0) b.enemy.asleep--;
        b.phase = 'menu';
      }
      else if (b.phase === 'victory') {
        // Award XP and gold
        player.xp += b.enemy.xp;
        player.gold += b.enemy.gold;
        b.msg = 'Got ' + b.enemy.xp + ' XP and ' + b.enemy.gold + ' Gold!';
        b.phase = 'result';
        b.timer = 60;
      }
      else if (b.phase === 'result') {
        // Check level up
        while (player.xp >= player.xpNext && player.lv < 20) {
          player.xp -= player.xpNext;
          levelUp();
        }
        endBattle();
      }
      else if (b.phase === 'dead') {
        // Game over - respawn at first town
        player.hp = Math.floor(player.maxHp / 2);
        player.mp = Math.floor(player.maxMp / 2);
        player.gold = Math.floor(player.gold / 2);
        player.x = 3; player.y = 3;
        player.inDungeon = -1;
        addText('You awaken at Willowbrook, having lost half your gold...');
        endBattle();
      }
      else if (b.phase === 'flee') {
        endBattle();
      }
    }
    return;
  }

  // Menu input
  if (b.phase === 'menu') {
    if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { b.menu = (b.menu + 3) % 4; sfxMenu(); }
    if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { b.menu = (b.menu + 1) % 4; sfxMenu(); }
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      handleBattleAction(b.menu);
    }
  }
  else if (b.phase === 'spell') {
    var spCount = player.spells.length;
    if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { b.spellMenu = (b.spellMenu + spCount - 1) % spCount; sfxMenu(); }
    if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { b.spellMenu = (b.spellMenu + 1) % spCount; sfxMenu(); }
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      castSpell(b.spellMenu);
    }
    if (keyJustPressed('KeyX') || keyJustPressed('Escape') || TAS.input.touch.b) {
      TAS.input.touch.b = false;
      b.phase = 'menu';
    }
  }
  else if (b.phase === 'item') {
    var itCount = player.items.length;
    if (itCount === 0) { b.phase = 'menu'; return; }
    if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { b.itemMenu = (b.itemMenu + itCount - 1) % itCount; sfxMenu(); }
    if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { b.itemMenu = (b.itemMenu + 1) % itCount; sfxMenu(); }
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      useItem(b.itemMenu);
    }
    if (keyJustPressed('KeyX') || keyJustPressed('Escape') || TAS.input.touch.b) {
      TAS.input.touch.b = false;
      b.phase = 'menu';
    }
  }
}

function handleBattleAction(choice) {
  var b = battleState;
  switch(choice) {
    case 0: // FIGHT
      var dmg = Math.max(1, getAtk(player) - b.enemy.def + TAS.math.randInt(-3, 5));
      b.enemyDmg = dmg;
      b.msg = 'You attack! ' + dmg + ' damage!';
      b.phase = 'animPlayer';
      b.timer = 40;
      sfxAttack();
      TAS.particles.spawn(GW/2, 70, '#ffff44', 8, 3);
      break;
    case 1: // MAGIC
      if (player.spells.length === 0) { b.msg = 'No spells learned!'; b.timer = 30; return; }
      b.phase = 'spell';
      b.spellMenu = 0;
      break;
    case 2: // ITEM
      if (player.items.length === 0) { b.msg = 'No items!'; b.timer = 30; return; }
      b.phase = 'item';
      b.itemMenu = 0;
      break;
    case 3: // RUN
      var chance = 50 + (getAgi(player) - b.enemy.agi) * 5;
      if (b.enemy.isBoss) chance = 0;
      if (Math.random() * 100 < chance) {
        b.msg = 'Got away safely!';
        b.phase = 'flee';
        b.timer = 40;
      } else {
        b.msg = 'Cannot escape!';
        b.phase = 'animPlayer';
        b.enemyDmg = 0;
        b.timer = 40;
      }
      break;
  }
}

function castSpell(idx) {
  var b = battleState;
  var sp = player.spells[idx];
  if (player.mp < sp.cost) { b.msg = 'Not enough MP!'; b.timer = 30; return; }
  player.mp -= sp.cost;
  sfxMagic();
  TAS.particles.spawn(GW/2, 70, '#88ccff', 12, 4);

  switch(sp.type) {
    case 'heal':
      var heal = sp.power + TAS.math.randInt(0, 10);
      player.hp = Math.min(player.maxHp, player.hp + heal);
      b.msg = 'Heal! Restored ' + heal + ' HP!';
      b.enemyDmg = 0;
      sfxHeal();
      break;
    case 'damage':
      var dmg = sp.power + TAS.math.randInt(-5, 10) + Math.floor(player.lv * 1.5);
      b.enemyDmg = Math.max(1, dmg - Math.floor(b.enemy.def / 2));
      b.msg = sp.name + '! ' + b.enemyDmg + ' damage!';
      TAS.fx.flash('#ff4444', 0.3);
      break;
    case 'status':
      if (Math.random() * 100 < sp.power) {
        b.enemy.asleep = TAS.math.randInt(2, 4);
        b.msg = b.enemy.name + ' fell asleep!';
        b.enemyDmg = 0;
      } else {
        b.msg = 'But it failed!';
        b.enemyDmg = 0;
      }
      break;
    case 'buff':
      player.bufDef += sp.power;
      b.msg = 'Defense up by ' + sp.power + '!';
      b.enemyDmg = 0;
      sfxHeal();
      break;
  }
  b.phase = 'animPlayer';
  b.timer = 40;
}

function useItem(idx) {
  var b = battleState;
  if (idx >= player.items.length) return;
  var slot = player.items[idx];
  var item = ITEM_DEFS[slot.id];

  switch(item.effect) {
    case 'heal':
      player.hp = Math.min(player.maxHp, player.hp + item.val);
      b.msg = 'Used ' + item.name + '! Healed ' + item.val + ' HP!';
      sfxHeal();
      break;
    case 'healfull':
      player.hp = player.maxHp;
      player.mp = player.maxMp;
      b.msg = 'Used ' + item.name + '! Fully restored!';
      sfxHeal();
      break;
    case 'cure':
      b.msg = 'Used ' + item.name + '!';
      break;
    case 'mp':
      player.mp = Math.min(player.maxMp, player.mp + item.val);
      b.msg = 'Used ' + item.name + '! Restored ' + item.val + ' MP!';
      sfxHeal();
      break;
    case 'warp':
      b.msg = 'Cannot use here!';
      b.phase = 'menu';
      return;
  }
  slot.qty--;
  if (slot.qty <= 0) player.items.splice(idx, 1);
  b.enemyDmg = 0;
  b.phase = 'animPlayer';
  b.timer = 40;
}

function enemyAction(b) {
  if (b.enemy.asleep > 0) {
    b.msg = b.enemy.name + ' is asleep!';
    b.playerDmg = 0;
    b.timer = 40;
    return;
  }
  // Boss special attacks
  if (b.enemy.isBoss && b.bossPhase >= 2 && Math.random() < 0.4) {
    var spdmg = 15 + TAS.math.randInt(5, 15) + b.bossPhase * 8;
    b.playerDmg = Math.max(1, spdmg - getDef(player));
    b.msg = b.enemy.name + ' casts Dark Spore! ' + b.playerDmg + ' damage!';
    TAS.fx.flash('#8800aa', 0.4);
    sfxMagic();
  }
  // Lich heals sometimes
  else if (b.enemy.type === 'lich' && b.enemy.hp < b.enemy.maxHp * 0.5 && Math.random() < 0.3) {
    var eheal = TAS.math.randInt(10, 20);
    b.enemy.hp = Math.min(b.enemy.maxHp, b.enemy.hp + eheal);
    b.playerDmg = 0;
    b.msg = b.enemy.name + ' heals itself!';
    sfxHeal();
  }
  else {
    var dmg = Math.max(1, b.enemy.atk - getDef(player) + TAS.math.randInt(-2, 4));
    b.playerDmg = dmg;
    b.msg = b.enemy.name + ' attacks! ' + dmg + ' damage!';
    sfxHit();
  }
  b.timer = 40;
}

function endBattle() {
  battleState = null;
  state = player.inDungeon >= 0 ? 'dungeon' : 'overworld';
}

// === BATTLE DRAW ===
function drawBattle() {
  var b = battleState;
  if (!b) return;

  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Ground
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, 140, GW, GH - 140);

  // Monster
  if (b.enemy.hp > 0) {
    var bobY = Math.sin(b.animFrame * 0.04) * 3;
    drawMonster(b.enemy, GW / 2, 75 + bobY);
  }

  // Enemy HP bar
  drawBox(10, 8, 140, 28, '#0a0a2a');
  drawText(b.enemy.name, 16, 22, '#fff', 9);
  var hpPct = b.enemy.hp / b.enemy.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(16, 27, 120, 6);
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(16, 27, Math.floor(120 * hpPct), 6);

  // Player stats panel
  drawBox(GW - 150, 8, 140, 44, '#0a0a2a');
  drawText(player.name + ' LV' + player.lv, GW - 144, 22, '#88ccff', 9);
  drawText('HP: ' + player.hp + '/' + player.maxHp, GW - 144, 34, '#44cc44', 8);
  drawText('MP: ' + player.mp + '/' + player.maxMp, GW - 144, 46, '#4488ff', 8);

  // Particles
  TAS.particles.draw();

  // Bottom area: message or menu
  drawBox(4, 150, GW - 8, 134);

  if (b.phase === 'menu') {
    var cmds = ['FIGHT', 'MAGIC', 'ITEM', 'RUN'];
    for (var i = 0; i < 4; i++) {
      var sel = (b.menu === i);
      drawText((sel ? '> ' : '  ') + cmds[i], 20, 170 + i * 18, sel ? '#ffff44' : '#aaaacc', 11);
    }
    // Right side: player equip summary
    drawText('ATK:' + getAtk(player) + ' DEF:' + getDef(player), 160, 170, '#888', 8);
    drawText('AGI:' + getAgi(player), 160, 182, '#888', 8);
    drawText(WEAPONS[player.weapon].name, 160, 198, '#aaa', 8);
    drawText(ARMORS[player.armor].name, 160, 210, '#aaa', 8);
  }
  else if (b.phase === 'spell') {
    drawText('SPELLS:', 16, 168, '#88ccff', 9);
    for (var i = 0; i < player.spells.length; i++) {
      var sp = player.spells[i];
      var sel = (b.spellMenu === i);
      var col = player.mp >= sp.cost ? (sel ? '#ffff44' : '#ffffff') : '#666666';
      drawText((sel ? '> ' : '  ') + sp.name + ' (' + sp.cost + 'MP)', 20, 182 + i * 14, col, 9);
    }
    drawText('[BACK]', GW - 60, 272, '#888', 8);
  }
  else if (b.phase === 'item') {
    drawText('ITEMS:', 16, 168, '#88ccff', 9);
    for (var i = 0; i < Math.min(6, player.items.length); i++) {
      var it = player.items[i];
      var idef = ITEM_DEFS[it.id];
      var sel = (b.itemMenu === i);
      drawText((sel ? '> ' : '  ') + idef.name + ' x' + it.qty, 20, 182 + i * 14, sel ? '#ffff44' : '#fff', 9);
    }
    drawText('[BACK]', GW - 60, 272, '#888', 8);
  }
  else {
    // Message display
    drawText(b.msg, 16, 180, '#ffffff', 10);
    if (b.timer > 0) {
      var dots = '.'.repeat(Math.floor(b.animFrame / 10) % 4);
      drawText(dots, 16, 200, '#666', 10);
    }
  }
}

// === TOWN SYSTEM ===
function enterTown(townIdx) {
  menuState = {
    type: 'town',
    town: TOWNS[townIdx],
    menu: 0,
    sub: null,
    subMenu: 0,
    msg: '',
    msgTimer: 0,
    npcIdx: 0
  };
  state = 'town';
}

var NPC_HINTS = [
  ['The Cave of Trials lies to the east. Be careful!', 'I hear the Dark Spore King lurks in the southern castle.', 'Rest at the Inn to save your progress.'],
  ['The Crystal Depths hold rare treasures...', 'Stronger weapons can be found in Duskholm.', 'The volcano rumbles to the south... be wary.'],
  ['The Hero equipment is forged from ancient metals.', 'Only the brave dare enter the Dark Castle.', 'Stock up on Elixirs before the final battle!']
];

function townUpdate(dt) {
  var m = menuState;
  if (!m) return;
  if (m.msgTimer > 0) {
    m.msgTimer--;
    if (m.msgTimer === 0) m.sub = null;
    return;
  }

  if (m.sub === null) {
    // Main town menu
    if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { m.menu = (m.menu + 3) % 4; sfxMenu(); }
    if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { m.menu = (m.menu + 1) % 4; sfxMenu(); }
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      switch(m.menu) {
        case 0: // Inn
          if (player.gold >= 10 * m.town.tier) {
            player.gold -= 10 * m.town.tier;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            saveGame();
            m.msg = 'Rested well! HP/MP restored. Game saved.';
            m.sub = 'msg';
            m.msgTimer = 90;
            sfxHeal();
          } else {
            m.msg = 'Not enough gold! Need ' + (10 * m.town.tier) + 'G.';
            m.sub = 'msg';
            m.msgTimer = 60;
          }
          break;
        case 1: // Shop
          m.sub = 'shop';
          m.subMenu = 0;
          break;
        case 2: // Talk
          var hints = NPC_HINTS[Math.min(2, m.town.tier - 1)];
          m.msg = hints[m.npcIdx % hints.length];
          m.npcIdx++;
          m.sub = 'msg';
          m.msgTimer = 90;
          break;
        case 3: // Leave
          state = 'overworld';
          menuState = null;
          return;
      }
    }
    if (keyJustPressed('KeyX') || keyJustPressed('Escape') || TAS.input.touch.b) {
      TAS.input.touch.b = false;
      state = 'overworld';
      menuState = null;
    }
  }
  else if (m.sub === 'shop') {
    var shopItems = getShopItems(m.town.tier);
    if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { m.subMenu = (m.subMenu + shopItems.length - 1) % shopItems.length; sfxMenu(); }
    if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { m.subMenu = (m.subMenu + 1) % shopItems.length; sfxMenu(); }
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      buyItem(shopItems[m.subMenu], m);
    }
    if (keyJustPressed('KeyX') || keyJustPressed('Escape') || TAS.input.touch.b) {
      TAS.input.touch.b = false;
      m.sub = null;
    }
  }
}

function getShopItems(tier) {
  var items = [];
  // Equipment by tier
  var maxEq = Math.min(4, tier + 1);
  for (var i = 1; i <= maxEq; i++) {
    if (i < WEAPONS.length) items.push({ type:'weapon', idx:i, name:WEAPONS[i].name, price:WEAPONS[i].price });
    if (i < ARMORS.length) items.push({ type:'armor', idx:i, name:ARMORS[i].name, price:ARMORS[i].price });
    if (i < SHIELDS.length) items.push({ type:'shield', idx:i, name:SHIELDS[i].name, price:SHIELDS[i].price });
  }
  // Consumables
  var maxIt = Math.min(ITEM_DEFS.length, tier * 2 + 1);
  for (var i = 0; i < maxIt; i++) {
    items.push({ type:'item', idx:i, name:ITEM_DEFS[i].name, price:ITEM_DEFS[i].price });
  }
  return items;
}

function buyItem(shopItem, m) {
  if (player.gold < shopItem.price) {
    m.msg = 'Not enough gold!';
    m.sub = 'msg';
    m.msgTimer = 40;
    return;
  }
  player.gold -= shopItem.price;
  switch(shopItem.type) {
    case 'weapon':
      player.weapon = Math.max(player.weapon, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'armor':
      player.armor = Math.max(player.armor, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'shield':
      player.shield = Math.max(player.shield, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'item':
      var found = false;
      for (var i = 0; i < player.items.length; i++) {
        if (player.items[i].id === shopItem.idx) { player.items[i].qty++; found = true; break; }
      }
      if (!found) player.items.push({ id: shopItem.idx, qty: 1 });
      m.msg = 'Bought ' + shopItem.name + '!';
      break;
  }
  m.sub = 'msg';
  m.msgTimer = 40;
  sfxMenu();
}

function drawTown() {

  // Town background
  ctx.fillStyle = '#1a1a0a';

  ctx.fillRect(230, 45, 70, 45);
  ctx.fillStyle = '#228822';
  ctx.beginPath(); ctx.moveTo(225, 45); ctx.lineTo(265, 20); ctx.lineTo(305, 45); ctx.closePath(); ctx.fill();

      drawText((sel ? '> ' : '  ') + opts[i], 80, 158 + i * 24, sel ? '#ffff44' : '#aaaacc', 11);
    }

}

// === DUNGEON SYSTEM ===
function enterDungeon(dIdx) {
  var d = DUNGEONS[dIdx];
  player.inDungeon = dIdx;
  player.dungeonFloor = 0;
  player.dx = Math.floor(DG_W / 2);
  player.dy = DG_H - 2;
  state = 'dungeon';
  addText('Entered ' + d.name + '...');
}

function dungeonUpdate(dt) {
  if (hasText()) {
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      textQueue.shift();
    }
    return;
  }

  if (inputCooldown > 0) { inputCooldown--; return; }

  var dx = 0, dy = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left) dx = -1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right) dx = 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up) dy = -1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down) dy = 1;

  if (dx !== 0 || dy !== 0) {
    var d = DUNGEONS[player.inDungeon];
    var nx = player.dx + dx;
    var ny = player.dy + dy;
    if (nx >= 0 && nx < DG_W && ny >= 0 && ny < DG_H) {
      if (d.map[player.dungeonFloor][ny][nx] === 0) {
        player.dx = nx;
        player.dy = ny;
        player.steps++;
        inputCooldown = 8;
        sfxStep();

        // Check exit (top)
        if (ny <= 1 && nx === Math.floor(DG_W/2)) {
          if (player.dungeonFloor < d.floors - 1) {
            player.dungeonFloor++;
            player.dy = DG_H - 2;
            addText('Descended to floor ' + (player.dungeonFloor + 1) + '...');
          } else {
            // Last floor reached - boss or exit
            if (player.inDungeon === 3 && !player.defeatedBoss) {
              startBattle(14, true); // Dark Spore King
            } else {
              addText('You found a treasure chest! +' + (50 * (player.inDungeon + 1)) + ' Gold!');
              player.gold += 50 * (player.inDungeon + 1);
              player.inDungeon = -1;
              state = 'overworld';
            }
            return;
          }
        }
        // Check entrance (bottom) = exit dungeon
        if (ny >= DG_H - 2 && player.dungeonFloor === 0 && nx === Math.floor(DG_W/2)) {
          if (dy > 0) {
            player.inDungeon = -1;
            state = 'overworld';
            addText('Left the dungeon.');
            return;
          }
        }

        // Random encounter in dungeon
        if (Math.random() < 0.12) {
          var zone = getDungeonZone(player.inDungeon);
          startBattle(getRandomMonster(zone));
        }
      }
    }
  }
}

function drawDungeon() {
  var d = DUNGEONS[player.inDungeon];
  if (!d || !d.map) return;
  var floor = d.map[player.dungeonFloor];

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  // Draw dungeon tiles centered on player
  var tileSize = 28;
  var viewTilesX = Math.ceil(GW / tileSize) + 1;
  var viewTilesY = Math.ceil((GH - 50) / tileSize) + 1;
  var offsetX = Math.floor(GW / 2 - player.dx * tileSize);
  var offsetY = Math.floor((GH - 50) / 2 - player.dy * tileSize);

  for (var ty = 0; ty < DG_H; ty++) {
    for (var tx = 0; tx < DG_W; tx++) {
      var sx = offsetX + tx * tileSize;
      var sy = offsetY + ty * tileSize;
      if (sx > GW || sy > GH - 50 || sx + tileSize < 0 || sy + tileSize < 0) continue;

      if (floor[ty][tx] === 1) {
        ctx.fillStyle = player.inDungeon === 2 ? '#442200' : player.inDungeon === 3 ? '#1a1a2a' : '#333344';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.strokeStyle = '#222';
        ctx.strokeRect(sx, sy, tileSize, tileSize);
      } else {
        ctx.fillStyle = player.inDungeon === 2 ? '#221100' : player.inDungeon === 3 ? '#0a0a15' : '#1a1a22';
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.fillStyle = player.inDungeon === 2 ? '#331100' : '#181828';
        ctx.fillRect(sx + 2, sy + 2, 3, 3);
      }
    }
  }

  // Draw player in center
  var psx = offsetX + player.dx * tileSize;
  var psy = offsetY + player.dy * tileSize;
  ctx.fillStyle = '#44aaff';
  ctx.beginPath(); ctx.arc(psx + tileSize/2, psy + tileSize/2, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(psx + tileSize/2 - 3, psy + tileSize/2 - 2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(psx + tileSize/2 + 3, psy + tileSize/2 - 2, 2, 0, Math.PI*2); ctx.fill();

  // Dungeon HUD
  drawBox(0, GH - 50, GW, 50);
  drawText(d.name + ' F' + (player.dungeonFloor + 1), 10, GH - 34, '#aaaacc', 10);
  drawText('HP:' + player.hp + '/' + player.maxHp + ' MP:' + player.mp + '/' + player.maxMp, 10, GH - 18, '#44cc44', 9);
  drawText('LV:' + player.lv + ' G:' + player.gold, GW - 100, GH - 34, '#ffdd44', 9);

  // Text messages
  if (hasText()) {
    drawTextBox(textQueue[0], GH - 110);
  }
}

// === OVERWORLD ===
function overworldUpdate(dt) {
  if (hasText()) {
    if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
      TAS.input.touch.a = false;
      textQueue.shift();
    }
    return;
  }

  if (inputCooldown > 0) { inputCooldown--; return; }

  var dx = 0, dy = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left) dx = -1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right) dx = 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up) dy = -1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down) dy = 1;

  if (dx !== 0 || dy !== 0) {
    var nx = player.x + dx;
    var ny = player.y + dy;
    if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
      var tile = WORLD_MAP[ny][nx];
      if (PASSABLE.indexOf(tile) >= 0) {
        player.x = nx;
        player.y = ny;
        player.steps++;
        inputCooldown = 8;
        sfxStep();

        // Check for town
        if (tile === T.TOWN) {
          for (var i = 0; i < TOWNS.length; i++) {
            if (TOWNS[i].x === nx && TOWNS[i].y === ny) { enterTown(i); return; }
          }
        }
        // Check for dungeon
        if (tile === T.DUNGEON || tile === T.CASTLE) {
          for (var i = 0; i < DUNGEONS.length; i++) {
            if (DUNGEONS[i].x === nx && DUNGEONS[i].y === ny) { enterDungeon(i); return; }
          }
        }

        // Random encounter
        var rate = ENCOUNTER_RATE[tile] || 0;
        if (Math.random() < rate) {
          var zone = getZone(nx, ny);
          startBattle(getRandomMonster(zone));
        }
      }
    }
  }

  // Use item outside battle (warp wing)
  if (keyJustPressed('KeyI')) {
    menuState = { type: 'fieldItem', menu: 0 };
    state = 'fieldMenu';
  }
}

function drawOverworld() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  // Camera centered on player
  var camX = player.x - Math.floor(VIEW_W / 2);
  var camY = player.y - Math.floor(VIEW_H / 2);
  camX = TAS.math.clamp(camX, 0, MAP_W - VIEW_W);
  camY = TAS.math.clamp(camY, 0, MAP_H - VIEW_H);

  // Draw tiles
  for (var ty = 0; ty < VIEW_H; ty++) {
    for (var tx = 0; tx < VIEW_W; tx++) {
      var mx = camX + tx;
      var my = camY + ty;
      if (mx >= 0 && mx < MAP_W && my >= 0 && my < MAP_H) {
        drawTile(WORLD_MAP[my][mx], tx * TILE, ty * TILE, TILE);
      }
    }
  }

  // Draw player
  var px = (player.x - camX) * TILE;
  var py = (player.y - camY) * TILE;
  drawPlayer(px, py);

  // HUD at bottom
  drawBox(0, VIEW_H * TILE, GW, GH - VIEW_H * TILE);
  drawText('LV:' + player.lv + ' HP:' + player.hp + '/' + player.maxHp + ' MP:' + player.mp + '/' + player.maxMp, 8, VIEW_H * TILE + 16, '#44cc44', 9);
  drawText('ATK:' + getAtk(player) + ' DEF:' + getDef(player) + ' G:' + player.gold, 8, VIEW_H * TILE + 30, '#ffdd44', 9);
  drawText('[I]=Items  [Z/Space]=Confirm', 8, VIEW_H * TILE + 44, '#666', 8);

  // Text overlay
  if (hasText()) {
    drawTextBox(textQueue[0], VIEW_H * TILE - 56);
  }
}

// === FIELD ITEM MENU ===
function fieldMenuUpdate(dt) {
  var m = menuState;
  if (!m) return;
  if (player.items.length === 0) {
    state = 'overworld';
    menuState = null;
    return;
  }
  if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { m.menu = (m.menu + player.items.length - 1) % player.items.length; sfxMenu(); }
  if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { m.menu = (m.menu + 1) % player.items.length; sfxMenu(); }
  if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
    TAS.input.touch.a = false;
    var slot = player.items[m.menu];
    var item = ITEM_DEFS[slot.id];
    switch(item.effect) {
      case 'heal':
        player.hp = Math.min(player.maxHp, player.hp + item.val);
        addText('Used ' + item.name + '! Healed ' + item.val + ' HP.');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'healfull':
        player.hp = player.maxHp; player.mp = player.maxMp;
        addText('Used ' + item.name + '! Fully restored!');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'mp':
        player.mp = Math.min(player.maxMp, player.mp + item.val);
        addText('Used ' + item.name + '! Restored ' + item.val + ' MP.');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'warp':
        player.x = 3; player.y = 3;
        player.inDungeon = -1;
        addText('Warped back to Willowbrook!');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        break;
      default:
        addText('Cannot use that here.');
        break;
    }
    state = 'overworld';
    menuState = null;
  }
  if (keyJustPressed('KeyX') || keyJustPressed('Escape') || keyJustPressed('KeyI') || TAS.input.touch.b) {
    TAS.input.touch.b = false;
    state = 'overworld';
    menuState = null;
  }
}

function drawFieldMenu() {
  drawOverworld();
  drawBox(40, 40, GW - 80, GH - 100);
  drawText('ITEMS', GW/2, 60, '#88ccff', 11, 'center');
  for (var i = 0; i < player.items.length; i++) {
    var it = player.items[i];
    var idef = ITEM_DEFS[it.id];
    var sel = (menuState.menu === i);
    drawText((sel ? '> ' : '  ') + idef.name + ' x' + it.qty, 60, 80 + i * 16, sel ? '#ffff44' : '#fff', 10);
  }
  drawText('[BACK]', GW/2, GH - 70, '#888', 8, 'center');
}

// === VICTORY (beat boss) ===
function drawVictoryScreen() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  var pulse = Math.sin(frame * 0.03) * 0.15 + 0.85;
  ctx.globalAlpha = pulse;
  drawText('CONGRATULATIONS!', GW/2, 60, '#ffdd44', 14, 'center');
  ctx.globalAlpha = 1;
  drawText('You have defeated the', GW/2, 100, '#fff', 10, 'center');
  drawText('Dark Spore King!', GW/2, 118, '#ff44ff', 12, 'center');
  drawText('Peace returns to Tasern.', GW/2, 150, '#88ccff', 10, 'center');
  drawText('Final Level: ' + player.lv, GW/2, 185, '#44cc44', 10, 'center');
  drawText('Gold: ' + player.gold, GW/2, 200, '#ffff44', 10, 'center');
  drawText('Steps: ' + player.steps, GW/2, 215, '#aaa', 9, 'center');

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  drawText('PRESS ANY KEY FOR NEW GAME', GW/2, 260, '#88ccff', 9, 'center');
  ctx.globalAlpha = 1;

  TAS.particles.spawn(TAS.math.randInt(20, GW - 20), TAS.math.randInt(20, GH - 20), ['#ff44ff','#44ffff','#ffff44','#44ff44'][TAS.math.randInt(0,3)], 1, 1);
}

// === TITLE SCREEN ===
function drawTitle() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Draw a landscape
  ctx.fillStyle = '#112211';
  ctx.fillRect(0, 160, GW, GH - 160);
  ctx.fillStyle = '#1a3a1a';
  ctx.beginPath(); ctx.moveTo(0, 160); ctx.lineTo(60, 120); ctx.lineTo(120, 155); ctx.lineTo(180, 100); ctx.lineTo(250, 140); ctx.lineTo(320, 160); ctx.lineTo(320, 200); ctx.lineTo(0, 200); ctx.closePath(); ctx.fill();

  // Stars
  ctx.fillStyle = '#ffffff';
  for (var i = 0; i < 30; i++) {
    var sx = (i * 37 + frame * 0.1) % GW;
    var sy = (i * 23) % 150;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TASERN QUEST', GW/2 + 2, 52);
  ctx.fillStyle = '#44dd88';
  ctx.fillText('TASERN QUEST', GW/2, 50);

  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('A Baseling\'s Adventure', GW/2, 70);

  // Menu
  var hasSave = false;
  try { hasSave = !!localStorage.getItem('tasernquest_save'); } catch(e) { console.warn('[tasern-quest] load save check:', e.message || e); }

  var opts = hasSave ? ['Continue', 'New Game'] : ['New Game'];
  for (var i = 0; i < opts.length; i++) {
    var sel = (titleMenu === i);
    ctx.fillStyle = sel ? '#ffff44' : '#aaaacc';
    ctx.font = (sel ? 'bold ' : '') + '11px monospace';
    ctx.fillText((sel ? '> ' : '  ') + opts[i], GW/2, 200 + i * 22);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('[Z/Space] to select', GW/2, 260);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#444';
  ctx.font = '7px monospace';
  ctx.fillText('Arrow keys to move. Z=Confirm X=Back I=Items', GW/2, 280);
}

var titleMenu = 0;

function titleUpdate(dt) {
  var hasSave = false;
  try { hasSave = !!localStorage.getItem('tasernquest_save'); } catch(e) { console.warn('[tasern-quest] load save check:', e.message || e); }
  var maxOpt = hasSave ? 1 : 0;

  if (keyJustPressed('ArrowUp') || keyJustPressed('KeyW')) { titleMenu = Math.max(0, titleMenu - 1); sfxMenu(); }
  if (keyJustPressed('ArrowDown') || keyJustPressed('KeyS')) { titleMenu = Math.min(maxOpt, titleMenu + 1); sfxMenu(); }
  if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
    TAS.input.touch.a = false;
    TAS.audio.ensureAudio();
    if (hasSave && titleMenu === 0) {
      // Continue
      if (loadGame()) {
        state = player.inDungeon >= 0 ? 'dungeon' : 'overworld';
        addText('Welcome back, adventurer!');
      }
    } else {
      // New Game
      player = newPlayer();
      state = 'overworld';
      addText('Your quest begins! Defeat the Dark Spore King!');
      addText('Visit towns for rest and supplies.');
      addText('Beware of monsters in the wild!');
    }
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  switch(state) {
    case 'title': titleUpdate(dt); break;
    case 'overworld': overworldUpdate(dt); break;
    case 'battle': battleUpdate(dt); break;
    case 'town': townUpdate(dt); break;
    case 'dungeon': dungeonUpdate(dt); break;
    case 'fieldMenu': fieldMenuUpdate(dt); break;
    case 'victory':
      if (keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a) {
        TAS.input.touch.a = false;
        try { localStorage.removeItem('tasernquest_save'); } catch(e) { console.error('Clear save failed:', e); }
        player = newPlayer();
        state = 'title';
        titleMenu = 0;
      }
      break;
  }

  // Check boss defeated
  if (state === 'battle' && battleState && battleState.enemy.isBoss && battleState.enemy.hp <= 0 && battleState.phase === 'result') {
    player.defeatedBoss = true;
    saveGame();
  }
  if (player && player.defeatedBoss && state !== 'battle' && state !== 'victory') {
    state = 'victory';
  }

  copyKeys();
  touchTapped = false;
}

// === MAIN DRAW ===
function draw(dt) {
  switch(state) {
    case 'title': drawTitle(); break;
    case 'overworld': drawOverworld(); break;
    case 'battle': drawBattle(); break;
    case 'town': drawTown(); break;
    case 'dungeon': drawDungeon(); break;
    case 'fieldMenu': drawFieldMenu(); break;
    case 'victory': drawVictoryScreen(); break;
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
