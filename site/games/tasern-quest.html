// === SCORE POPUPS ===
var popups = [];
function addPopup(x, y, text, color) {
  popups.push({ x: x, y: y, text: text, color: color || '#ffff44', life: 60, vy: -1.2 });
}
function updatePopups() {
  for (var i = popups.length - 1; i >= 0; i--) {
    popups[i].y += popups[i].vy;
    popups[i].life--;
    if (popups[i].life <= 0) popups.splice(i, 1);
  }
}
function drawPopups() {
  for (var i = 0; i < popups.length; i++) {
    var p = popups[i];
    var alpha = Math.min(1, p.life / 20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// === WEATHER SYSTEM ===
var weather = { type: 'clear', timer: 0, particles: [] };
function updateWeather() {
  weather.timer--;
  if (weather.timer <= 0) {
    var r = Math.random();
    if (r < 0.6) weather.type = 'clear';
    else if (r < 0.8) weather.type = 'rain';
    else if (r < 0.9) weather.type = 'snow';
    else weather.type = 'fog';
    weather.timer = TAS.math.randInt(300, 900);
    weather.particles = [];
  }
  if (weather.type === 'rain') {
    for (var i = 0; i < 3; i++) {
      weather.particles.push({ x: Math.random() * GW, y: -5, vy: 4 + Math.random() * 2, life: 80 });
    }
  } else if (weather.type === 'snow') {
    if (Math.random() < 0.3) {
      weather.particles.push({ x: Math.random() * GW, y: -5, vy: 0.8 + Math.random(), vx: Math.sin(frame * 0.01) * 0.5, life: 200 });
    }
  }
  for (var i = weather.particles.length - 1; i >= 0; i--) {
    var wp = weather.particles[i];
    wp.y += wp.vy || 0;
    wp.x += wp.vx || 0;
    wp.life--;
    if (wp.life <= 0 || wp.y > GH) weather.particles.splice(i, 1);
  }
}
function drawWeather() {
  if (weather.type === 'rain') {
    ctx.strokeStyle = '#5588cc';
    ctx.lineWidth = 1;
    for (var i = 0; i < weather.particles.length; i++) {
      var wp = weather.particles[i];
      ctx.beginPath(); ctx.moveTo(wp.x, wp.y); ctx.lineTo(wp.x - 1, wp.y + 6); ctx.stroke();
    }
  } else if (weather.type === 'snow') {
    ctx.fillStyle = '#ddeeff';
    for (var i = 0; i < weather.particles.length; i++) {
      var wp = weather.particles[i];
      ctx.fillRect(wp.x, wp.y, 2, 2);
    }
  } else if (weather.type === 'fog') {
    ctx.fillStyle = 'rgba(180,180,200,0.15)';
    ctx.fillRect(0, 0, GW, GH);
  }
}

  tutorial.active = msg;
  tutorial.timer = 180;
}
function updateTutorial() {
  if (tutorial.timer > 0) {
    tutorial.timer--;
    if (tutorial.timer <= 0) tutorial.active = null;

}
function drawTutorial() {
  if (!tutorial.active) return;
  var alpha = Math.min(1, tutorial.timer / 30);

  ctx.fillRect(20, 10, GW - 40, 36);

// Generate dungeon maps (10x10 each floor)
var DG_W = 10, DG_H = 10;
function genDungeon(dIdx) {
  var d = DUNGEONS[dIdx];
  d.map = [];
  for (var f = 0; f < d.floors; f++) {
    var floor = [];
    for (var y = 0; y < DG_H; y++) {
      var row = [];
      for (var x = 0; x < DG_W; x++) {
        if (x === 0 || x === DG_W-1 || y === 0 || y === DG_H-1) row.push(1);
        else row.push(Math.random() < 0.2 ? 1 : 0);
      }
      floor.push(row);
    }
    floor[DG_H-2][Math.floor(DG_W/2)] = 0;
    floor[1][Math.floor(DG_W/2)] = 0;
    var cx = Math.floor(DG_W/2), cy = DG_H-2;
    while (cy > 1) {
      floor[cy][cx] = 0;
      if (Math.random() < 0.5 && cx > 1 && cx < DG_W-2) cx += Math.random() < 0.5 ? 1 : -1;
      else cy--;
    }
    d.map.push(floor);
  }
}
for (var di = 0; di < DUNGEONS.length; di++) genDungeon(di);

var player = null;

function newPlayer() {
  var baseHp = 35 + conMod * 3;   // ref 7: CON boosts starting HP
  var baseMp = 10 + intMod * 2;   // ref 8: INT boosts starting MP
  return {
    name: statB.name || 'Baseling',
    lv: 1, xp: 0, xpNext: 20,
    hp: Math.max(15, baseHp), maxHp: Math.max(15, baseHp),
    mp: Math.max(5, baseMp), maxMp: Math.max(5, baseMp),
    baseAtk: 5 + Math.max(0, strMod),  // ref 9: STR boosts base ATK
    baseDef: 4 + Math.max(0, conMod),  // ref 10: CON boosts base DEF
    baseAgi: 5 + Math.max(0, dexMod),  // ref 11: DEX boosts base AGI
    weapon: 0, armor: 0, shield: 0,
    gold: 20,
    items: [{ id:0, qty:3 }],
    x: 3, y: 3,
    steps: 0,
    bufDef: 0, bufAtk: 0,
    spells: [SPELLS[0]],
    inDungeon: -1, dungeonFloor: 0, dx: 0, dy: 0,
    defeatedBoss: false,
    miniBossesDefeated: [false, false, false],
    poisoned: false, poisonTimer: 0,
    critChance: 5 + dexMod * 2  // ref 12: DEX boosts crit chance
  };
}

function getAtk(p) { return p.baseAtk + WEAPONS[p.weapon].atk + p.bufAtk + Math.max(0, strMod); } // ref 13: STR in atk calc
function getDef(p) { return p.baseDef + ARMORS[p.armor].def + SHIELDS[p.shield].def + p.bufDef; }
function getAgi(p) { return p.baseAgi + Math.max(0, dexMod); } // ref 14: DEX in agi calc

function getShopDiscount() { return Math.max(0, chaMod * 5); } // ref 15: CHA shop discount %

function xpForLevel(lv) { return Math.floor(20 * Math.pow(1.5, lv - 1)); }

function levelUp() {
  player.lv++;
  player.xpNext = xpForLevel(player.lv);
  player.maxHp += TAS.math.randInt(4, 8) + Math.max(0, conMod); // ref 16: CON HP per level
  player.maxMp += TAS.math.randInt(2, 4) + Math.max(0, intMod); // ref 17: INT MP per level
  player.baseAtk += TAS.math.randInt(1, 3);
  player.baseDef += TAS.math.randInt(1, 2);
  player.baseAgi += TAS.math.randInt(1, 2);
  player.hp = player.maxHp;
  player.mp = player.maxMp;
  for (var i = 0; i < SPELLS.length; i++) {
    if (SPELLS[i].learnLv === player.lv) {
      var has = false;
      for (var j = 0; j < player.spells.length; j++) {
        if (player.spells[j].name === SPELLS[i].name) has = true;
      }
      if (!has) {
        player.spells.push(SPELLS[i]);
        addText('Learned ' + SPELLS[i].name + '!');
      }
    }
  }
  sfxLevelUp();
  addText('Level up! Now LV ' + player.lv + '!');
  addPopup(GW / 2, 100, 'LEVEL UP!', '#f4b41b');
  TAS.particles.spawn(GW / 2, 100, '#f4b41b', 15, 5);
}

// === SCREEN SHAKE ===
function triggerShake(intensity) {
  screenShake.intensity = intensity;
}
function updateShake() {
  if (screenShake.intensity > 0.1) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
    screenShake.intensity = 0;
  }
}

// === SAVE/LOAD ===
function saveGame() {
  try { localStorage.setItem('tasernquest_save', JSON.stringify(player)); } catch(e) { console.error('Save failed:', e); }
}
function loadGame() {
  try {
    var d = localStorage.getItem('tasernquest_save');
    if (d) { player = JSON.parse(d); return true; }
  } catch(e) { console.error('Load failed:', e); }
  return false;
}

var prevKeys = {};
function keyJustPressed(k) {
  return (TAS.input.keys[k] && !prevKeys[k]);
}
function copyKeys() {
  prevKeys = {};
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}
// NES mapping: Z=A(confirm), X=B(back/cancel), Enter=Start, Shift=Select
function btnA() { return keyJustPressed('KeyZ') || keyJustPressed('Space') || keyJustPressed('Enter') || TAS.input.touch.a; }
function btnB() { return keyJustPressed('KeyX') || keyJustPressed('Escape') || TAS.input.touch.b; }
function btnUp() { return keyJustPressed('ArrowUp') || keyJustPressed('KeyW'); }
function btnDown() { return keyJustPressed('ArrowDown') || keyJustPressed('KeyS'); }
function btnLeft() { return keyJustPressed('ArrowLeft') || keyJustPressed('KeyA'); }
function btnRight() { return keyJustPressed('ArrowRight') || keyJustPressed('KeyD'); }
function heldUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function heldDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function heldLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function heldRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function clearTouchA() { TAS.input.touch.a = false; }
function clearTouchB() { TAS.input.touch.b = false; }

// Touch input for menus
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'OK', b: 'BACK' } });
var canvas = TAS.canvas;
var touchTapX = -1, touchTapY = -1, touchTapped = false;
canvas.addEventListener('click', function(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = GW / rect.width;
  var scaleY = GH / rect.height;
  touchTapX = (e.clientX - rect.left) * scaleX;
  touchTapY = (e.clientY - rect.top) * scaleY;
  touchTapped = true;
  TAS.audio.ensureAudio();
});

// === DRAW HELPERS ===
function drawBox(x, y, w, h, bg, border) {
  ctx.fillStyle = bg || '#1a1c2c';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = border || '#a855f7';
  ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, w-2, h-2);
}

function drawText(txt, x, y, color, size, align) {
  ctx.fillStyle = color || '#ffffff';
  ctx.font = (size || 10) + 'px monospace';
  ctx.textAlign = align || 'left';
  ctx.fillText(txt, x, y);
  ctx.textAlign = 'left';
}

function drawTextBox(msg, y) {
  drawBox(8, y || (GH - 56), GW - 16, 48);
  drawText(msg, 16, (y || (GH - 56)) + 20, '#fff', 10);
  drawText('[OK]', GW - 30, (y || (GH - 56)) + 40, '#aaa', 8, 'right');
}

// NES-style HP bar
function drawHPBar(x, y, w, h, current, max, color) {
  ctx.fillStyle = '#111';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  var pct = Math.max(0, current / max);
  ctx.fillStyle = pct > 0.5 ? (color || '#44cc44') : pct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(x + 1, y + 1, Math.floor((w - 2) * pct), h - 2);
}

// === MONSTER ART (procedural) ===
function drawMonster(m, cx, cy) {
  var c = m.color;
  ctx.save();
  switch(m.type) {
    case 'slime':
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 10, 30, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      // Spore spots
      ctx.fillStyle = '#88ff88';
      ctx.beginPath(); ctx.arc(cx - 12, cy + 4, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 8, cy + 14, 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 8, cy + 2, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 8, cy + 2, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(cx - 7, cy + 3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 9, cy + 3, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'rat':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 25, 15, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 20, cy + 5, 8, 6, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcccc';
      ctx.beginPath(); ctx.ellipse(cx - 15, cy - 5, 6, 8, -0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 5, cy - 5, 6, 8, 0.2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff3333';
      ctx.beginPath(); ctx.arc(cx - 12, cy + 5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 2, cy + 5, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(cx + 25, cy + 15); ctx.quadraticCurveTo(cx+40, cy+5, cx+35, cy-5); ctx.stroke();
      break;
    case 'bat':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 12, 10, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 12, cy); ctx.lineTo(cx - 40, cy - 20); ctx.lineTo(cx - 30, cy + 10); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 12, cy); ctx.lineTo(cx + 40, cy - 20); ctx.lineTo(cx + 30, cy + 10); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(cx - 4, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'goblin':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 15, 18, 22, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy - 12, 14, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff44';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 14, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 14, 3, 0, Math.PI*2); ctx.fill();
      // Spore cap on head
      ctx.fillStyle = '#22cc44';
      ctx.beginPath(); ctx.ellipse(cx, cy - 24, 10, 5, 0, 0, Math.PI*2); ctx.fill();
      break;
    case 'skeleton':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 10, 12, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(cx - 3, cy + 4, 6, 30);
      ctx.fillRect(cx - 15, cy + 8, 30, 4);
      // Mycelium threads
      ctx.strokeStyle = '#44cc88';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx - 10, cy + 10); ctx.lineTo(cx - 18, cy + 20); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 10, cy + 10); ctx.lineTo(cx + 18, cy + 20); ctx.stroke();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 12, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy - 12, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillRect(cx - 3, cy - 4, 6, 3);
      break;
    case 'wolf':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 30, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 25, cy, 12, 10, -0.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(cx - 30, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 22, cy + 2, 2, 0, Math.PI*2); ctx.fill();
      // Reactor glow on eyes
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(cx - 30, cy + 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx - 30, cy + 6); ctx.lineTo(cx - 26, cy + 10); ctx.lineTo(cx - 22, cy + 6); ctx.fill();
      break;
    case 'orc':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 24, 28, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy - 22, 16, 16, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 24, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 24, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx - 6, cy - 14); ctx.lineTo(cx - 3, cy - 18); ctx.lineTo(cx, cy - 14); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx, cy - 14); ctx.lineTo(cx + 3, cy - 18); ctx.lineTo(cx + 6, cy - 14); ctx.fill();
      // Fungal growth
      ctx.fillStyle = '#33aa33';
      ctx.beginPath(); ctx.arc(cx + 18, cy - 5, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 15, cy - 12, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'ghost':
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 5, 20, 24, 0, 0, Math.PI); ctx.fill();
      ctx.fillRect(cx - 20, cy - 5, 40, 30);
      for (var gi = 0; gi < 5; gi++) {
        ctx.beginPath(); ctx.arc(cx - 16 + gi * 8, cy + 25, 4, 0, Math.PI*2); ctx.fill();
      }
      // Spore particles floating off
      ctx.fillStyle = '#88ffaa';
      for (var si = 0; si < 3; si++) {
        var sx = cx - 10 + si * 10 + Math.sin(frame * 0.05 + si) * 4;
        var sy = cy - 20 - si * 6 + Math.cos(frame * 0.03 + si) * 3;
        ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(cx - 7, cy - 8, 4, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + 7, cy - 8, 4, 6, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 5, 7, 0, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'golem':
      ctx.fillStyle = c;
      ctx.fillRect(cx - 20, cy - 20, 40, 50);
      ctx.fillRect(cx - 12, cy - 35, 24, 20);
      ctx.fillRect(cx - 35, cy - 10, 15, 35);
      ctx.fillRect(cx + 20, cy - 10, 15, 35);
      // Reactor core glow
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.arc(cx, cy + 5, 8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(cx, cy + 5, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.arc(cx - 5, cy - 28, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 5, cy - 28, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'wyvern':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 22, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 15, cy - 15, 10, 8, -0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 22, cy); ctx.lineTo(cx - 50, cy - 30); ctx.lineTo(cx - 35, cy + 5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 22, cy); ctx.lineTo(cx + 50, cy - 30); ctx.lineTo(cx + 35, cy + 5); ctx.closePath(); ctx.fill();
      // Mycelium veins on wings
      ctx.strokeStyle = '#88ff88';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx - 30, cy - 10); ctx.lineTo(cx - 45, cy - 25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 30, cy - 10); ctx.lineTo(cx + 45, cy - 25); ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 18, cy - 17, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'knight':
      ctx.fillStyle = c;
      ctx.fillRect(cx - 14, cy - 30, 28, 55);
      ctx.beginPath(); ctx.ellipse(cx, cy - 35, 12, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#882222';
      ctx.beginPath(); ctx.moveTo(cx - 12, cy - 45); ctx.lineTo(cx, cy - 55); ctx.lineTo(cx + 12, cy - 45); ctx.fill();
      // Reactor-powered sword
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(cx + 14, cy - 20, 25, 4);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(cx + 35, cy - 30, 4, 20);
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(cx - 3, cy - 37, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 3, cy - 37, 2, 0, Math.PI*2); ctx.fill();
      break;
    case 'fire':
      ctx.fillStyle = '#ff3300';
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 25, 30, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 16, 22, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff44';
      ctx.beginPath(); ctx.ellipse(cx, cy + 5, 8, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - 6, cy - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 6, cy - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff6600';
      var ft = frame * 0.06;
      ctx.beginPath(); ctx.moveTo(cx - 10, cy - 20); ctx.lineTo(cx - 5, cy - 40 + Math.sin(ft) * 5); ctx.lineTo(cx, cy - 20); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx, cy - 22); ctx.lineTo(cx + 5, cy - 42 + Math.cos(ft) * 5); ctx.lineTo(cx + 10, cy - 22); ctx.fill();
      break;
    case 'lich':
      ctx.fillStyle = '#221133';
      ctx.beginPath(); ctx.moveTo(cx - 20, cy - 30); ctx.lineTo(cx + 20, cy - 30); ctx.lineTo(cx + 25, cy + 30); ctx.lineTo(cx - 25, cy + 30); ctx.closePath(); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 30, 14, 14, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#44ff44';
      ctx.beginPath(); ctx.arc(cx - 4, cy - 32, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 4, cy - 32, 3, 0, Math.PI*2); ctx.fill();
      // Spore orb
      ctx.fillStyle = '#44ff44';
      ctx.beginPath(); ctx.arc(cx + 30, cy - 10, 6 + Math.sin(frame * 0.04) * 2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#88ff88';
      ctx.beginPath(); ctx.arc(cx + 30, cy - 10, 3, 0, Math.PI*2); ctx.fill();
      break;
    case 'dragon':
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy + 10, 35, 25, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx - 30, cy - 20, 14, 12, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 35, cy); ctx.lineTo(cx - 60, cy - 35); ctx.lineTo(cx - 40, cy + 5); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx + 35, cy); ctx.lineTo(cx + 60, cy - 35); ctx.lineTo(cx + 40, cy + 5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 34, cy - 23, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 26, cy - 23, 3, 0, Math.PI*2); ctx.fill();
      // Mycelium horns
      ctx.fillStyle = '#44cc44';
      ctx.beginPath(); ctx.moveTo(cx - 35, cy - 30); ctx.lineTo(cx - 38, cy - 45); ctx.lineTo(cx - 30, cy - 30); ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx - 25, cy - 30); ctx.lineTo(cx - 22, cy - 45); ctx.lineTo(cx - 20, cy - 30); ctx.fill();
      break;
    case 'boss':
      // Dark Spore King - large mushroom demon
      ctx.fillStyle = '#110022';
      ctx.beginPath(); ctx.ellipse(cx, cy + 20, 35, 30, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy - 15, 40, 28, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#440066';
      ctx.beginPath(); ctx.ellipse(cx, cy - 15, 40, 28, 0, 0, Math.PI); ctx.fill();
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath(); ctx.arc(cx - 15, cy - 25, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy - 30, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 20, cy - 20, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx - 25, cy - 15, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath(); ctx.arc(cx - 10, cy + 10, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy + 10, 5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath(); ctx.arc(cx - 10, cy + 10, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 10, cy + 10, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#330055';
      ctx.lineWidth = 3;
      var t = frame * 0.03;
      for (var ti = 0; ti < 5; ti++) {
        ctx.beginPath();
        ctx.moveTo(cx - 30 + ti * 15, cy + 45);
        ctx.quadraticCurveTo(cx - 30 + ti * 15 + Math.sin(t + ti) * 8, cy + 60, cx - 30 + ti * 15 + Math.sin(t + ti + 1) * 5, cy + 75);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      break;
    default:
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.ellipse(cx, cy, 25, 25, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// === TILE DRAWING ===
function drawTile(type, x, y, size) {
  var s = size || TILE;
  switch(type) {
    case T.GRASS:
      ctx.fillStyle = COL.grass;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#3a7a3a';
      ctx.fillRect(x + 3, y + 4, 2, 3);
      ctx.fillRect(x + 9, y + 8, 2, 3);
      ctx.fillRect(x + 12, y + 2, 2, 3);
      break;
    case T.FOREST:
      ctx.fillStyle = COL.forest;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#2a5a2a';
      ctx.beginPath(); ctx.arc(x + s/2, y + s/3, s/3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#553311';
      ctx.fillRect(x + s/2 - 1, y + s/2, 2, s/2);
      break;
    case T.MOUNTAIN:
      ctx.fillStyle = COL.mountain;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#887766';
      ctx.beginPath(); ctx.moveTo(x + s/2, y + 2); ctx.lineTo(x + 2, y + s - 2); ctx.lineTo(x + s - 2, y + s - 2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#aaa';
      ctx.beginPath(); ctx.moveTo(x + s/2, y + 2); ctx.lineTo(x + s/2 - 3, y + 5); ctx.lineTo(x + s/2 + 3, y + 5); ctx.closePath(); ctx.fill();
      break;
    case T.WATER:
      ctx.fillStyle = COL.water;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#3355aa';
      var wv = Math.sin((x + frame * 0.5) * 0.3) * 2;
      ctx.fillRect(x + 2, y + 6 + wv, s - 4, 2);
      ctx.fillRect(x + 4, y + 11 - wv, s - 6, 2);
      break;
    case T.SAND:
      ctx.fillStyle = COL.sand;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#bbaa55';
      ctx.fillRect(x + 4, y + 6, 2, 2);
      ctx.fillRect(x + 10, y + 12, 2, 2);
      break;
    case T.TOWN:
      ctx.fillStyle = COL.sand;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.town;
      ctx.fillRect(x + 3, y + 5, s - 6, s - 6);
      ctx.fillStyle = '#a855f7';
      ctx.beginPath(); ctx.moveTo(x + 2, y + 5); ctx.lineTo(x + s/2, y + 1); ctx.lineTo(x + s - 2, y + 5); ctx.closePath(); ctx.fill();
      break;
    case T.DUNGEON:
      ctx.fillStyle = COL.grass;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.dungeon;
      ctx.fillRect(x + 3, y + 3, s - 6, s - 4);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 5, y + 6, s - 10, s - 8);
      break;
    case T.BRIDGE:
      ctx.fillStyle = COL.water;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.bridge;
      ctx.fillRect(x + 2, y + 4, s - 4, s - 8);
      ctx.fillStyle = '#553300';
      ctx.fillRect(x + 2, y + 4, s - 4, 2);
      ctx.fillRect(x + 2, y + s - 6, s - 4, 2);
      break;
    case T.PATH:
      ctx.fillStyle = COL.path;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = '#887755';
      ctx.fillRect(x + 3, y + 3, 2, 2);
      ctx.fillRect(x + 9, y + 10, 2, 2);
      break;
    case T.CASTLE:
      ctx.fillStyle = COL.path;
      ctx.fillRect(x, y, s, s);
      ctx.fillStyle = COL.castle;
      ctx.fillRect(x + 2, y + 4, s - 4, s - 4);
      ctx.fillStyle = '#555';
      ctx.fillRect(x + 2, y + 2, 4, 4);
      ctx.fillRect(x + s - 6, y + 2, 4, 4);
      ctx.fillRect(x + s/2 - 2, y + 2, 4, 4);
      ctx.fillStyle = '#e6482e';
      ctx.fillRect(x + s/2 - 2, y + s - 6, 4, 5);
      break;
  }
}

// === PLAYER SPRITE (baseling character) ===
function drawPlayer(px, py) {
  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, px + 8, py + 8, 16, { flipX: false, frame: frame })) {
  // Use baseling color from statB
  var baseColor = statB.color || '#44aaff';
  ctx.fillStyle = baseColor;
  ctx.beginPath(); ctx.ellipse(px + 8, py + 6, 5, 5, 0, 0, Math.PI*2); ctx.fill();
  // Body slightly darker
  var r = parseInt(baseColor.slice(1,3),16), g = parseInt(baseColor.slice(3,5),16), b = parseInt(baseColor.slice(5,7),16);
  ctx.fillStyle = 'rgb(' + Math.max(0,r-30) + ',' + Math.max(0,g-30) + ',' + Math.max(0,b-30) + ')';
  ctx.beginPath(); ctx.ellipse(px + 8, py + 12, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px + 6, py + 5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 10, py + 5, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(px + 6, py + 5, 0.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 10, py + 5, 0.8, 0, Math.PI*2); ctx.fill();
  }
  // Poison indicator
  if (player && player.poisoned) {
    ctx.fillStyle = '#88ff00';
    ctx.beginPath(); ctx.arc(px + 8, py + 1, 2, 0, Math.PI*2); ctx.fill();
  }
}

// === GET ENCOUNTER ZONE ===
function getZone(px, py) {
  var dist = Math.sqrt((px - 3) * (px - 3) + (py - 3) * (py - 3));
  // WIS reduces encounter surprise (ref 18: WIS awareness)
  if (dist < 5) return 1;
  if (dist < 9) return 2;
  if (dist < 13) return 3;
  if (dist < 17) return 4;
  return 5;
}

function getDungeonZone(dIdx) {
  return Math.min(5, dIdx + 2);
}

function getRandomMonster(zone) {
  var pool = [];
  for (var i = 0; i < MONSTERS.length - 4; i++) { // exclude mini-bosses and boss
    if (MONSTERS[i].zone <= zone && MONSTERS[i].zone >= zone - 1) pool.push(i);
  }
  if (pool.length === 0) pool = [0];
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

// === BATTLE SYSTEM ===
function startBattle(monsterIdx, isBoss) {
  var m = MONSTERS[monsterIdx];
  battleState = {
    enemy: {
      name: m.name, hp: m.hp, maxHp: m.hp, atk: m.atk, def: m.def, agi: m.agi,
      xp: m.xp, gold: m.gold, color: m.color, type: m.type, idx: monsterIdx,
      asleep: 0, isBoss: isBoss || false, poisonChance: (m.zone >= 3) ? 15 : 0
    },
    phase: 'start',
    menu: 0,
    spellMenu: 0,
    itemMenu: 0,
    msg: '',
    timer: 0,
    animFrame: 0,
    playerDmg: 0,
    enemyDmg: 0,
    bossPhase: isBoss ? 1 : 0
  };
  player.bufDef = 0;
  player.bufAtk = 0;
  state = 'battle';
  sfxEncounter();
  battleState.msg = m.name + ' appeared!';
  battleState.timer = 60;
  triggerShake(4);
  showTutorial('battle', 'Z=Confirm  X=Back  Arrows=Navigate');
}

function battleUpdate(dt) {
  var b = battleState;
  if (!b) return;

  b.animFrame++;

  if (b.timer > 0) {
    b.timer--;
    if (b.timer === 0) {
      if (b.phase === 'start') b.phase = 'menu';
      else if (b.phase === 'animPlayer') {
        if (b.enemyDmg > 0) {
          b.enemy.hp -= b.enemyDmg;
          if (b.enemy.hp <= 0) {
            b.enemy.hp = 0;
            b.phase = 'victory';
            b.msg = b.enemy.name + ' defeated!';
            b.timer = 90;
            sfxVictory();
            return;
          }
        }
        if (b.enemy.isBoss && b.enemy.hp < b.enemy.maxHp * (1 - b.bossPhase * 0.3) && b.bossPhase < 3) {
          b.bossPhase++;
          b.msg = b.enemy.name + ' grows stronger! Phase ' + b.bossPhase + '!';
          b.enemy.atk += 10;
          b.enemy.def += 5;
          b.timer = 60;
          triggerShake(8);
          TAS.particles.spawn(GW/2, 75, '#ff00ff', 20, 6);
          return;
        }
        b.phase = 'animEnemy';
        enemyAction(b);
      }
      else if (b.phase === 'animEnemy') {
        if (b.playerDmg > 0) {
          player.hp -= b.playerDmg;
          triggerShake(b.playerDmg > 20 ? 6 : 3);
          addPopup(GW - 80, 30, '-' + b.playerDmg, '#ff4444');
          if (player.hp <= 0) {
            player.hp = 0;
            b.phase = 'dead';
            b.msg = 'Your baseling has fallen...';
            b.timer = 120;
            sfxDeath();
            return;
          }
        }
        // Poison tick
        if (player.poisoned) {
          var pDmg = Math.max(1, Math.floor(player.maxHp * 0.05));
          player.hp = Math.max(1, player.hp - pDmg);
          player.poisonTimer--;
          addPopup(GW - 80, 50, '-' + pDmg + ' PSN', '#88ff00');
          if (player.poisonTimer <= 0) { player.poisoned = false; addText('Poison wore off.'); }
        }
        if (b.enemy.asleep > 0) b.enemy.asleep--;
        b.phase = 'menu';
      }
      else if (b.phase === 'victory') {
        var xpGain = b.enemy.xp + Math.max(0, intMod * 2); // ref 19: INT XP bonus
        var goldGain = b.enemy.gold + Math.max(0, chaMod);  // ref 20: CHA gold bonus
        player.xp += xpGain;
        player.gold += goldGain;
        b.msg = 'Got ' + xpGain + ' XP and ' + goldGain + ' Gold!';
        addPopup(GW / 2, 120, '+' + xpGain + ' XP', '#44ff44');
        addPopup(GW / 2 + 40, 120, '+' + goldGain + ' G', '#ffff44');
        b.phase = 'result';
        b.timer = 60;
      }
      else if (b.phase === 'result') {
        while (player.xp >= player.xpNext && player.lv < 20) {
          player.xp -= player.xpNext;
          levelUp();
        }
        endBattle();
      }
      else if (b.phase === 'dead') {
        player.hp = Math.floor(player.maxHp / 2);
        player.mp = Math.floor(player.maxMp / 2);
        player.gold = Math.floor(player.gold / 2);
        player.x = 3; player.y = 3;
        player.inDungeon = -1;
        player.poisoned = false;
        addText('Your baseling wakes at Sporehollow, half your gold lost to spores...');
        endBattle();
      }
      else if (b.phase === 'flee') {
        endBattle();
      }
    }
    return;
  }

  if (b.phase === 'menu') {
    if (btnUp()) { b.menu = (b.menu + 3) % 4; sfxMenu(); }
    if (btnDown()) { b.menu = (b.menu + 1) % 4; sfxMenu(); }
    if (btnA()) {
      clearTouchA();
      handleBattleAction(b.menu);
    }
  }
  else if (b.phase === 'spell') {
    var spCount = player.spells.length;
    if (btnUp()) { b.spellMenu = (b.spellMenu + spCount - 1) % spCount; sfxMenu(); }
    if (btnDown()) { b.spellMenu = (b.spellMenu + 1) % spCount; sfxMenu(); }
    if (btnA()) {
      clearTouchA();
      castSpell(b.spellMenu);
    }
    if (btnB()) {
      clearTouchB();
      b.phase = 'menu';
    }
  }
  else if (b.phase === 'item') {
    var itCount = player.items.length;
    if (itCount === 0) { b.phase = 'menu'; return; }
    if (btnUp()) { b.itemMenu = (b.itemMenu + itCount - 1) % itCount; sfxMenu(); }
    if (btnDown()) { b.itemMenu = (b.itemMenu + 1) % itCount; sfxMenu(); }
    if (btnA()) {
      clearTouchA();
      useItem(b.itemMenu);
    }
    if (btnB()) {
      clearTouchB();
      b.phase = 'menu';
    }
  }
}

function handleBattleAction(choice) {
  var b = battleState;
  switch(choice) {
    case 0: // FIGHT
      var baseDmg = getAtk(player) - b.enemy.def + TAS.math.randInt(-3, 5);
      // Critical hit check (ref 21: DEX crit)
      var isCrit = Math.random() * 100 < player.critChance;
      if (isCrit) {
        baseDmg = Math.floor(baseDmg * 1.8);
        sfxCrit();
        addPopup(GW / 2, 60, 'CRITICAL!', '#ff4444');
        TAS.particles.spawn(GW/2, 70, '#ff4444', 12, 4);
        triggerShake(5);
      }
      var dmg = Math.max(1, baseDmg);
      b.enemyDmg = dmg;
      b.msg = isCrit ? 'Critical hit! ' + dmg + ' damage!' : 'You attack! ' + dmg + ' damage!';
      b.phase = 'animPlayer';
      b.timer = 40;
      if (!isCrit) sfxAttack();
      addPopup(GW/2, 70, '-' + dmg, '#ffff44');
      TAS.particles.spawn(GW/2, 70, '#ffff44', 8, 3);
      break;
    case 1: // MAGIC
      if (player.spells.length === 0) { b.msg = 'No spells learned!'; b.timer = 30; return; }
      b.phase = 'spell';
      b.spellMenu = 0;
      break;
    case 2: // ITEM
      if (player.items.length === 0) { b.msg = 'No items!'; b.timer = 30; return; }
      b.phase = 'item';
      b.itemMenu = 0;
      break;
    case 3: // RUN
      var chance = 50 + (getAgi(player) - b.enemy.agi) * 5 + dexMod * 3; // ref 22: DEX flee bonus
      if (b.enemy.isBoss) chance = 0;
      if (Math.random() * 100 < chance) {
        b.msg = 'Got away safely!';
        b.phase = 'flee';
        b.timer = 40;
      } else {
        b.msg = 'Cannot escape!';
        b.phase = 'animPlayer';
        b.enemyDmg = 0;
        b.timer = 40;
      }
      break;
  }
}

function castSpell(idx) {
  var b = battleState;
  var sp = player.spells[idx];
  if (player.mp < sp.cost) { b.msg = 'Not enough MP!'; b.timer = 30; return; }
  player.mp -= sp.cost;
  sfxMagic();
  TAS.particles.spawn(GW/2, 70, '#88ccff', 12, 4);

  var spellBonus = Math.max(0, intMod * 3); // ref 23: INT spell power bonus

  switch(sp.type) {
    case 'heal':
      var healPower = sp.power + TAS.math.randInt(0, 10) + Math.max(0, wisMod * 4); // ref 24: WIS heal bonus
      var heal = Math.min(player.maxHp - player.hp, healPower);
      player.hp = Math.min(player.maxHp, player.hp + healPower);
      b.msg = 'Heal! Restored ' + heal + ' HP!';
      b.enemyDmg = 0;
      sfxHeal();
      addPopup(GW - 80, 30, '+' + heal, '#44ff44');
      TAS.particles.spawn(GW - 80, 40, '#44ff44', 10, 3);
      break;
    case 'damage':
      var dmg = sp.power + TAS.math.randInt(-5, 10) + Math.floor(player.lv * 1.5) + spellBonus;
      b.enemyDmg = Math.max(1, dmg - Math.floor(b.enemy.def / 2));
      b.msg = sp.name + '! ' + b.enemyDmg + ' damage!';
      addPopup(GW/2, 60, '-' + b.enemyDmg, '#88ccff');
      TAS.fx.flash('#ff4444', 0.3);
      triggerShake(4);
      break;
    case 'status':
      var statusChance = sp.power + wisMod * 5; // ref 25: WIS status chance
      if (Math.random() * 100 < statusChance) {
        b.enemy.asleep = TAS.math.randInt(2, 4);
        b.msg = b.enemy.name + ' fell asleep!';
        b.enemyDmg = 0;
      } else {
        b.msg = 'But it failed!';
        b.enemyDmg = 0;
      }
      break;
    case 'buff':
      player.bufDef += sp.power;
      b.msg = 'Defense up by ' + sp.power + '!';
      b.enemyDmg = 0;
      sfxHeal();
      addPopup(GW - 80, 30, 'DEF+' + sp.power, '#4488ff');
      break;
  }
  b.phase = 'animPlayer';
  b.timer = 40;
}

function useItem(idx) {
  var b = battleState;
  if (idx >= player.items.length) return;
  var slot = player.items[idx];
  var item = ITEM_DEFS[slot.id];

  switch(item.effect) {
    case 'heal':
      player.hp = Math.min(player.maxHp, player.hp + item.val);
      b.msg = 'Used ' + item.name + '! Healed ' + item.val + ' HP!';
      sfxHeal();
      addPopup(GW - 80, 30, '+' + item.val, '#44ff44');
      break;
    case 'healfull':
      player.hp = player.maxHp;
      player.mp = player.maxMp;
      b.msg = 'Used ' + item.name + '! Fully restored!';
      sfxHeal();
      break;
    case 'cure':
      player.poisoned = false;
      player.poisonTimer = 0;
      b.msg = 'Used ' + item.name + '! Cured!';
      break;
    case 'mp':
      player.mp = Math.min(player.maxMp, player.mp + item.val);
      b.msg = 'Used ' + item.name + '! Restored ' + item.val + ' MP!';
      sfxHeal();
      break;
    case 'warp':
      b.msg = 'Cannot use here!';
      b.phase = 'menu';
      return;
    case 'flee':
      if (!b.enemy.isBoss) {
        b.msg = 'Used Mycelium Scroll! Escaped!';
        b.phase = 'flee';
        b.timer = 40;
        slot.qty--; if (slot.qty <= 0) player.items.splice(idx, 1);
        return;
      } else {
        b.msg = 'Cannot flee from boss!';
        b.phase = 'menu';
        return;
      }
    case 'atkbuff':
      player.bufAtk += item.val;
      b.msg = 'Used ' + item.name + '! ATK +' + item.val + '!';
      addPopup(GW - 80, 30, 'ATK+' + item.val, '#ff8844');
      break;
  }
  slot.qty--;
  if (slot.qty <= 0) player.items.splice(idx, 1);
  b.enemyDmg = 0;
  b.phase = 'animPlayer';
  b.timer = 40;
}

function enemyAction(b) {
  if (b.enemy.asleep > 0) {
    b.msg = b.enemy.name + ' is asleep!';
    b.playerDmg = 0;
    b.timer = 40;
    return;
  }
  // Boss special attacks
  if (b.enemy.isBoss && b.bossPhase >= 2 && Math.random() < 0.4) {
    var spdmg = 15 + TAS.math.randInt(5, 15) + b.bossPhase * 8;
    b.playerDmg = Math.max(1, spdmg - getDef(player));
    b.msg = b.enemy.name + ' unleashes a Dark Spore Cloud! ' + b.playerDmg + ' damage!';
    TAS.fx.flash('#8800aa', 0.4);
    sfxMagic();
    TAS.particles.spawn(GW - 80, 30, '#aa44ff', 15, 5);
  }
  // Lich heals
  else if (b.enemy.type === 'lich' && b.enemy.hp < b.enemy.maxHp * 0.5 && Math.random() < 0.3) {
    var eheal = TAS.math.randInt(10, 20);
    b.enemy.hp = Math.min(b.enemy.maxHp, b.enemy.hp + eheal);
    b.playerDmg = 0;
    b.msg = b.enemy.name + ' heals itself!';
    sfxHeal();
  }
  // Poison attack from zone 3+ enemies
  else if (b.enemy.poisonChance > 0 && !player.poisoned && Math.random() * 100 < b.enemy.poisonChance) {
    var pdmg = Math.max(1, b.enemy.atk - getDef(player) + TAS.math.randInt(-2, 4));
    b.playerDmg = pdmg;
    // CON resist poison (ref 26: CON poison resist)
    if (Math.random() * 100 < 30 + conMod * 8) {
      b.msg = b.enemy.name + ' attacks with poison! Resisted!';
    } else {
      player.poisoned = true;
      player.poisonTimer = 3;
      b.msg = b.enemy.name + ' poisons you! ' + pdmg + ' dmg!';
      sfxPoison();
      addPopup(GW - 80, 30, 'POISONED!', '#88ff00');
    }
  }
  else {
    var dmg = Math.max(1, b.enemy.atk - getDef(player) + TAS.math.randInt(-2, 4));
    b.playerDmg = dmg;
    b.msg = b.enemy.name + ' attacks! ' + dmg + ' damage!';
    sfxHit();
  }
  b.timer = 40;
}

function endBattle() {
  battleState = null;
  state = player.inDungeon >= 0 ? 'dungeon' : 'overworld';
}

// === BATTLE DRAW ===
function drawBattle() {
  var b = battleState;
  if (!b) return;

  // Themed background based on zone
  var bgCol = '#1a1c2c';
  var groundCol = '#222236';
  if (player.inDungeon === 0) { bgCol = '#0a1a0a'; groundCol = '#1a2a1a'; }
  else if (player.inDungeon === 1) { bgCol = '#1a0a00'; groundCol = '#2a1a0a'; }
  else if (player.inDungeon === 2) { bgCol = '#0a0a10'; groundCol = '#15152a'; }
  else if (player.inDungeon === 3) { bgCol = '#0a001a'; groundCol = '#15002a'; }

  ctx.fillStyle = bgCol;
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = groundCol;
  ctx.fillRect(0, 140, GW, GH - 140);

  // Monster
  if (b.enemy.hp > 0) {
    var bobY = Math.sin(b.animFrame * 0.04) * 3;
    drawMonster(b.enemy, GW / 2, 75 + bobY);
  }

  // Enemy HP bar
  drawBox(10, 8, 140, 28, '#1a1c2c');
  drawText(b.enemy.name, 16, 22, '#fff', 9);
  drawHPBar(16, 27, 120, 6, b.enemy.hp, b.enemy.maxHp);

  // Player stats panel
  drawBox(GW - 150, 8, 140, 52, '#1a1c2c');
  drawText((statB.name || 'Baseling') + ' LV' + player.lv, GW - 144, 22, '#3cacd7', 9);
  drawHPBar(GW - 144, 26, 100, 5, player.hp, player.maxHp, '#44cc44');
  drawText('HP:' + player.hp + '/' + player.maxHp, GW - 144, 40, '#38d973', 8);
  drawText('MP:' + player.mp + '/' + player.maxMp, GW - 144, 52, '#3cacd7', 8);
  if (player.poisoned) drawText('PSN', GW - 40, 52, '#88ff00', 7);

  // Particles and popups
  TAS.particles.draw();
  drawPopups();

  // Bottom area
  drawBox(4, 150, GW - 8, 134);

  if (b.phase === 'menu') {
    var cmds = ['FIGHT', 'MAGIC', 'ITEM', 'RUN'];
    for (var i = 0; i < 4; i++) {
      var sel = (b.menu === i);
      drawText((sel ? '> ' : '  ') + cmds[i], 20, 170 + i * 18, sel ? '#f4b41b' : '#aaaacc', 11);
    }
    drawText('ATK:' + getAtk(player) + ' DEF:' + getDef(player), 160, 170, '#888', 8);
    drawText('AGI:' + getAgi(player) + ' CRT:' + player.critChance + '%', 160, 182, '#888', 8);
    drawText(WEAPONS[player.weapon].name, 160, 198, '#aaa', 8);
    drawText(ARMORS[player.armor].name, 160, 210, '#aaa', 8);
  }
  else if (b.phase === 'spell') {
    drawText('SPELLS:', 16, 168, '#a855f7', 9);
    for (var i = 0; i < player.spells.length; i++) {
      var sp = player.spells[i];
      var sel = (b.spellMenu === i);
      var col = player.mp >= sp.cost ? (sel ? '#f4b41b' : '#ffffff') : '#666666';
      drawText((sel ? '> ' : '  ') + sp.name + ' (' + sp.cost + 'MP)', 20, 182 + i * 14, col, 9);
    }
    drawText('[X=BACK]', GW - 70, 272, '#888', 8);
  }
  else if (b.phase === 'item') {
    drawText('ITEMS:', 16, 168, '#38d973', 9);
    for (var i = 0; i < Math.min(6, player.items.length); i++) {
      var it = player.items[i];
      var idef = ITEM_DEFS[it.id];
      var sel = (b.itemMenu === i);
      drawText((sel ? '> ' : '  ') + idef.name + ' x' + it.qty, 20, 182 + i * 14, sel ? '#f4b41b' : '#fff', 9);
    }
    drawText('[X=BACK]', GW - 70, 272, '#888', 8);
  }
  else {
    drawText(b.msg, 16, 180, '#ffffff', 10);
    if (b.timer > 0) {
      var dots = '.'.repeat(Math.floor(b.animFrame / 10) % 4);
      drawText(dots, 16, 200, '#666', 10);
    }
  }
}

// === TOWN SYSTEM ===
function enterTown(townIdx) {
  menuState = {
    type: 'town',
    town: TOWNS[townIdx],
    menu: 0,
    sub: null,
    subMenu: 0,
    msg: '',
    msgTimer: 0,
    npcIdx: 0
  };
  state = 'town';
  showTutorial('town', 'Z=Select  X=Leave  Rest at Inn to save');
}

var NPC_HINTS = [
  ['The Spore Caverns lie to the east. Watch for Quest Molds!', 'The Dark Spore King lurks in the southern castle...', 'Rest at the Inn to save your baseling\'s progress.', 'Wise baselings sense spore clouds before they strike!', 'Strong baselings crush fungi with a single blow!'],
  ['The Reactor Depths hold rare POOP treasures...', 'Mycelium Hold has the finest garden equipment in the land.', 'The Mycelium Caldera rumbles with composting heat...', 'Charismatic baselings haggle better at the garden shop.', 'Smart baselings harvest more spore gems from battle!'],
  ['Hero equipment is forged from ancient reactor cores and POOP.', 'Only the bravest baselings enter the Dark Spore Castle.', 'Stock up on Reactor Elixirs before the final garden war!', 'The mycelium network feeds every garden in Tasern...', 'All POOP flows through the reactor network back to the gardens.']
];

function townUpdate(dt) {
  var m = menuState;
  if (!m) return;
  if (m.msgTimer > 0) {
    m.msgTimer--;
    if (m.msgTimer === 0) m.sub = null;
    return;
  }

  if (m.sub === null) {
    if (btnUp()) { m.menu = (m.menu + 3) % 4; sfxMenu(); }
    if (btnDown()) { m.menu = (m.menu + 1) % 4; sfxMenu(); }
    if (btnA()) {
      clearTouchA();
      switch(m.menu) {
        case 0: // Inn
          var innCost = Math.max(1, Math.floor(10 * m.town.tier * (100 - getShopDiscount()) / 100));
          if (player.gold >= innCost) {
            player.gold -= innCost;
            player.hp = player.maxHp;
            player.mp = player.maxMp;
            player.poisoned = false;
            player.poisonTimer = 0;
            saveGame();
            m.msg = 'Rested well! HP/MP restored. Game saved.';
            m.sub = 'msg';
            m.msgTimer = 90;
            sfxHeal();
          } else {
            m.msg = 'Not enough gold! Need ' + innCost + 'G.';
            m.sub = 'msg';
            m.msgTimer = 60;
          }
          break;
        case 1: // Shop
          m.sub = 'shop';
          m.subMenu = 0;
          break;
        case 2: // Talk
          var hints = NPC_HINTS[Math.min(2, m.town.tier - 1)];
          m.msg = hints[m.npcIdx % hints.length];
          m.npcIdx++;
          m.sub = 'msg';
          m.msgTimer = 90;
          break;
        case 3: // Leave
          state = 'overworld';
          menuState = null;
          return;
      }
    }
    if (btnB()) {
      clearTouchB();
      state = 'overworld';
      menuState = null;
    }
  }
  else if (m.sub === 'shop') {
    var shopItems = getShopItems(m.town.tier);
    if (btnUp()) { m.subMenu = (m.subMenu + shopItems.length - 1) % shopItems.length; sfxMenu(); }
    if (btnDown()) { m.subMenu = (m.subMenu + 1) % shopItems.length; sfxMenu(); }
    if (btnA()) {
      clearTouchA();
      buyItem(shopItems[m.subMenu], m);
    }
    if (btnB()) {
      clearTouchB();
      m.sub = null;
    }
  }
}

function getShopItems(tier) {
  var items = [];
  var maxEq = Math.min(4, tier + 1);
  for (var i = 1; i <= maxEq; i++) {
    if (i < WEAPONS.length) items.push({ type:'weapon', idx:i, name:WEAPONS[i].name, price:WEAPONS[i].price });
    if (i < ARMORS.length) items.push({ type:'armor', idx:i, name:ARMORS[i].name, price:ARMORS[i].price });
    if (i < SHIELDS.length) items.push({ type:'shield', idx:i, name:SHIELDS[i].name, price:SHIELDS[i].price });
  }
  var maxIt = Math.min(ITEM_DEFS.length, tier * 3);
  for (var i = 0; i < maxIt; i++) {
    items.push({ type:'item', idx:i, name:ITEM_DEFS[i].name, price:ITEM_DEFS[i].price });
  }
  return items;
}

function buyItem(shopItem, m) {
  var discount = getShopDiscount(); // ref 27: CHA discount applied
  var price = Math.max(1, Math.floor(shopItem.price * (100 - discount) / 100));
  if (player.gold < price) {
    m.msg = 'Not enough gold!';
    m.sub = 'msg';
    m.msgTimer = 40;
    return;
  }
  player.gold -= price;
  switch(shopItem.type) {
    case 'weapon':
      player.weapon = Math.max(player.weapon, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'armor':
      player.armor = Math.max(player.armor, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'shield':
      player.shield = Math.max(player.shield, shopItem.idx);
      m.msg = 'Equipped ' + shopItem.name + '!';
      break;
    case 'item':
      var found = false;
      for (var i = 0; i < player.items.length; i++) {
        if (player.items[i].id === shopItem.idx) { player.items[i].qty++; found = true; break; }
      }
      if (!found) player.items.push({ id: shopItem.idx, qty: 1 });
      m.msg = 'Bought ' + shopItem.name + '!';
      break;
  }
  m.sub = 'msg';
  m.msgTimer = 40;
  sfxMenu();
}

// === DUNGEON SYSTEM ===
function enterDungeon(dIdx) {
  var d = DUNGEONS[dIdx];
  player.inDungeon = dIdx;
  player.dungeonFloor = 0;
  player.dx = Math.floor(DG_W / 2);
  player.dy = DG_H - 2;
  state = 'dungeon';
  addText('Entered ' + d.name + '...');
  showTutorial('dungeon', 'Explore carefully. Stronger foes lurk deeper!');
}

function dungeonUpdate(dt) {
  if (hasText()) {
    if (btnA()) {
      clearTouchA();
      textQueue.shift();
    }
    return;
  }

  if (inputCooldown > 0) { inputCooldown--; return; }

  var dx = 0, dy = 0;
  if (heldLeft()) dx = -1;
  if (heldRight()) dx = 1;
  if (heldUp()) dy = -1;
  if (heldDown()) dy = 1;

  if (dx !== 0 || dy !== 0) {
    var d = DUNGEONS[player.inDungeon];
    var nx = player.dx + dx;
    var ny = player.dy + dy;
    if (nx >= 0 && nx < DG_W && ny >= 0 && ny < DG_H) {
      if (d.map[player.dungeonFloor][ny][nx] === 0) {
        player.dx = nx;
        player.dy = ny;
        player.steps++;
        inputCooldown = 8;
        sfxStep();

        // Check exit (top)
        if (ny <= 1 && nx === Math.floor(DG_W/2)) {
          if (player.dungeonFloor < d.floors - 1) {
            player.dungeonFloor++;
            player.dy = DG_H - 2;
            addText('Descended to floor ' + (player.dungeonFloor + 1) + '...');
          } else {
            // Last floor: mini-boss or final boss
            if (player.inDungeon === 3 && !player.defeatedBoss) {
              startBattle(17, true); // Dark Spore King (index 17)
            } else if (player.inDungeon < 3 && !player.miniBossesDefeated[player.inDungeon]) {
              // Mini-boss for this dungeon
              startBattle(14 + player.inDungeon, false);
              player.miniBossesDefeated[player.inDungeon] = true;
            } else {
              var treasure = 50 * (player.inDungeon + 1);
              addText('You found a treasure chest! +' + treasure + ' Gold!');
              player.gold += treasure;
              sfxChest();
              addPopup(GW/2, 100, '+' + treasure + 'G', '#ffff44');
              player.inDungeon = -1;
              state = 'overworld';
            }
            return;
          }
        }
        // Check entrance (bottom) = exit dungeon
        if (ny >= DG_H - 2 && player.dungeonFloor === 0 && nx === Math.floor(DG_W/2)) {
          if (dy > 0) {
            player.inDungeon = -1;
            state = 'overworld';
            addText('Left the dungeon.');
            return;
          }
        }

        // Random encounter in dungeon -- WIS reduces rate (ref 28: WIS encounter reduction)
        var encounterRate = Math.max(0.04, 0.12 - wisMod * 0.01);
        if (Math.random() < encounterRate) {
          var zone = getDungeonZone(player.inDungeon);
          startBattle(getRandomMonster(zone));
        }
      }
    }
  }
}

function drawDungeon() {
  var d = DUNGEONS[player.inDungeon];
  if (!d || !d.map) return;
  var floor = d.map[player.dungeonFloor];

  // Themed dungeon backgrounds
  var wallCol, floorCol, accentCol;
  switch(d.zone) {
    case 'spore':
      wallCol = '#224422'; floorCol = '#112211'; accentCol = '#44cc44';
      break;
    case 'reactor':
      wallCol = '#442200'; floorCol = '#221100'; accentCol = '#ff8800';
      break;
    case 'mycelium':
      wallCol = '#222244'; floorCol = '#111122'; accentCol = '#8844cc';
      break;
    case 'dark':
      wallCol = '#1a1a2a'; floorCol = '#0a0a15'; accentCol = '#ff00ff';
      break;
    default:
      wallCol = '#333344'; floorCol = '#1a1a22'; accentCol = '#888888';
  }

  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  var tileSize = 28;
  var offsetX = Math.floor(GW / 2 - player.dx * tileSize);
  var offsetY = Math.floor((GH - 50) / 2 - player.dy * tileSize);

  for (var ty = 0; ty < DG_H; ty++) {
    for (var tx = 0; tx < DG_W; tx++) {
      var sx = offsetX + tx * tileSize;
      var sy = offsetY + ty * tileSize;
      if (sx > GW || sy > GH - 50 || sx + tileSize < 0 || sy + tileSize < 0) continue;

      if (floor[ty][tx] === 1) {
        ctx.fillStyle = wallCol;
        ctx.fillRect(sx, sy, tileSize, tileSize);
        ctx.strokeStyle = '#222';
        ctx.strokeRect(sx, sy, tileSize, tileSize);
        // Accent details on walls
        if ((tx + ty) % 3 === 0) {
          ctx.fillStyle = accentCol;
          ctx.globalAlpha = 0.2;
          ctx.fillRect(sx + 4, sy + 4, 4, 4);
          ctx.globalAlpha = 1;
        }
      } else {
        ctx.fillStyle = floorCol;
        ctx.fillRect(sx, sy, tileSize, tileSize);
        // Floor details
        if ((tx + ty) % 5 === 0) {
          ctx.fillStyle = accentCol;
          ctx.globalAlpha = 0.1;
          ctx.fillRect(sx + 2, sy + 2, 3, 3);
          ctx.globalAlpha = 1;
        }
      }
    }
  }

  // Draw player
  var psx = offsetX + player.dx * tileSize;
  var psy = offsetY + player.dy * tileSize;
  ctx.fillStyle = statB.color || '#44aaff';
  ctx.beginPath(); ctx.arc(psx + tileSize/2, psy + tileSize/2, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(psx + tileSize/2 - 3, psy + tileSize/2 - 2, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(psx + tileSize/2 + 3, psy + tileSize/2 - 2, 2, 0, Math.PI*2); ctx.fill();
  if (player.poisoned) {
    ctx.fillStyle = '#88ff00';
    ctx.beginPath(); ctx.arc(psx + tileSize/2, psy + tileSize/2 - 10, 2, 0, Math.PI*2); ctx.fill();
  }

  // Ambient particles for themed dungeons
  if (frame % 15 === 0) {
    TAS.particles.spawn(
      TAS.math.randInt(20, GW - 20),
      TAS.math.randInt(20, GH - 70),
      accentCol, 1, 1
    );
  }
  TAS.particles.draw();
  drawPopups();

  // Dungeon HUD
  drawBox(0, GH - 50, GW, 50);
  drawText(d.name + ' F' + (player.dungeonFloor + 1), 10, GH - 34, accentCol, 10);
  drawHPBar(10, GH - 28, 80, 5, player.hp, player.maxHp, '#44cc44');
  drawText('HP:' + player.hp + '/' + player.maxHp + ' MP:' + player.mp + '/' + player.maxMp, 10, GH - 18, '#38d973', 9);
  drawText('LV:' + player.lv + ' G:' + player.gold, GW - 100, GH - 34, '#f4b41b', 9);
  if (player.poisoned) drawText('PSN', GW - 40, GH - 18, '#88ff00', 8);

  if (hasText()) {
    drawTextBox(textQueue[0], GH - 110);
  }
}

// === OVERWORLD ===
function overworldUpdate(dt) {
  if (hasText()) {
    if (btnA()) {
      clearTouchA();
      textQueue.shift();
    }
    return;
  }

  if (inputCooldown > 0) { inputCooldown--; return; }

  var dx = 0, dy = 0;
  if (heldLeft()) dx = -1;
  if (heldRight()) dx = 1;
  if (heldUp()) dy = -1;
  if (heldDown()) dy = 1;

  if (dx !== 0 || dy !== 0) {
    var nx = player.x + dx;
    var ny = player.y + dy;
    if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H) {
      var tile = WORLD_MAP[ny][nx];
      if (PASSABLE.indexOf(tile) >= 0) {
        player.x = nx;
        player.y = ny;
        player.steps++;
        inputCooldown = 8;
        sfxStep();

        if (tile === T.TOWN) {
          for (var i = 0; i < TOWNS.length; i++) {
            if (TOWNS[i].x === nx && TOWNS[i].y === ny) { enterTown(i); return; }
          }
        }
        if (tile === T.DUNGEON || tile === T.CASTLE) {
          for (var i = 0; i < DUNGEONS.length; i++) {
            if (DUNGEONS[i].x === nx && DUNGEONS[i].y === ny) { enterDungeon(i); return; }
          }
        }

        // Random encounter -- WIS reduces rate (ref 29: WIS overworld awareness)
        var rate = ENCOUNTER_RATE[tile] || 0;
        rate = Math.max(0.01, rate - wisMod * 0.005);
        if (Math.random() < rate) {
          var zone = getZone(nx, ny);
          startBattle(getRandomMonster(zone));
        }
      }
    }
  }

  // Field item menu
  if (keyJustPressed('KeyI') || keyJustPressed('ShiftLeft') || keyJustPressed('ShiftRight')) {
    menuState = { type: 'fieldItem', menu: 0 };
    state = 'fieldMenu';
  }
  // Status screen on Select (Tab)
  if (keyJustPressed('Tab')) {
    state = 'status';
  }
}

function drawOverworld() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  var camX = player.x - Math.floor(VIEW_W / 2);
  var camY = player.y - Math.floor(VIEW_H / 2);
  camX = TAS.math.clamp(camX, 0, MAP_W - VIEW_W);
  camY = TAS.math.clamp(camY, 0, MAP_H - VIEW_H);

  for (var ty = 0; ty < VIEW_H; ty++) {
    for (var tx = 0; tx < VIEW_W; tx++) {
      var mx = camX + tx;
      var my = camY + ty;
      if (mx >= 0 && mx < MAP_W && my >= 0 && my < MAP_H) {
        drawTile(WORLD_MAP[my][mx], tx * TILE, ty * TILE, TILE);
      }
    }
  }

  var px = (player.x - camX) * TILE;
  var py = (player.y - camY) * TILE;
  drawPlayer(px, py);

  // Weather
  drawWeather();
  drawPopups();

  // HUD at bottom

  drawHPBar(8, VIEW_H * TILE + 6, 80, 5, player.hp, player.maxHp, '#44cc44');

  drawText('ATK:' + getAtk(player) + ' DEF:' + getDef(player) + ' G:' + player.gold, 8, VIEW_H * TILE + 34, '#f4b41b', 9);
  drawText('[I/Shift]=Items [Tab]=Stats [Z]=OK [X]=Back', 8, VIEW_H * TILE + 48, '#555', 7);
  if (player.poisoned) drawText('PSN', GW - 30, VIEW_H * TILE + 20, '#88ff00', 8);
  if (weather.type !== 'clear') drawText(weather.type.toUpperCase(), GW - 40, VIEW_H * TILE + 34, '#6688aa', 7);

  if (hasText()) {
    drawTextBox(textQueue[0], VIEW_H * TILE - 56);

  drawTutorial();
}

// === FIELD ITEM MENU ===
function fieldMenuUpdate(dt) {
  var m = menuState;
  if (!m) return;
  if (player.items.length === 0) {
    state = 'overworld';
    menuState = null;
    return;
  }
  if (btnUp()) { m.menu = (m.menu + player.items.length - 1) % player.items.length; sfxMenu(); }
  if (btnDown()) { m.menu = (m.menu + 1) % player.items.length; sfxMenu(); }
  if (btnA()) {
    clearTouchA();
    var slot = player.items[m.menu];
    var item = ITEM_DEFS[slot.id];
    switch(item.effect) {
      case 'heal':
        player.hp = Math.min(player.maxHp, player.hp + item.val);
        addText('Used ' + item.name + '! Healed ' + item.val + ' HP.');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'healfull':
        player.hp = player.maxHp; player.mp = player.maxMp;
        addText('Used ' + item.name + '! Fully restored!');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'cure':
        player.poisoned = false; player.poisonTimer = 0;
        addText('Used ' + item.name + '! Cured!');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        break;
      case 'mp':
        player.mp = Math.min(player.maxMp, player.mp + item.val);
        addText('Used ' + item.name + '! Restored ' + item.val + ' MP.');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        sfxHeal();
        break;
      case 'warp':
        player.x = 3; player.y = 3;
        player.inDungeon = -1;
        addText('Warped back to Sporehollow!');
        slot.qty--; if (slot.qty <= 0) player.items.splice(m.menu, 1);
        break;
      default:
        addText('Cannot use that here.');
        break;
    }
    state = 'overworld';
    menuState = null;
  }
  if (btnB() || keyJustPressed('KeyI')) {
    clearTouchB();
    state = 'overworld';
    menuState = null;
  }
}

  drawText('Steps: ' + player.steps, GW/2, 225, '#aaa', 9, 'center');
  drawText(statB.name + ' - ' + statB.icon, GW/2, 240, statB.color, 9, 'center');

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  drawText('PRESS Z FOR NEW GAME', GW/2, 268, '#3cacd7', 9, 'center');
  ctx.globalAlpha = 1;

  // Victory particles
  if (frame % 5 === 0) {
    TAS.particles.spawn(TAS.math.randInt(20, GW - 20), TAS.math.randInt(20, GH - 20), ['#a855f7','#38d973','#f4b41b','#3cacd7','#e6482e'][TAS.math.randInt(0,4)], 2, 2);
  }
  TAS.particles.draw();
}

// === TITLE SCREEN ===
function drawTitle() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }

  // Landscape with mycelium detail
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 160, GW, GH - 160);
  ctx.fillStyle = '#2a3a2a';
  ctx.beginPath(); ctx.moveTo(0, 160); ctx.lineTo(60, 120); ctx.lineTo(120, 155); ctx.lineTo(180, 100); ctx.lineTo(250, 140); ctx.lineTo(320, 160); ctx.lineTo(320, 200); ctx.lineTo(0, 200); ctx.closePath(); ctx.fill();
  // Mycelium threads
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3;
  for (var mi = 0; mi < 6; mi++) {
    var mx1 = mi * 55 + 10, my1 = 170 + Math.sin(mi) * 8;
    ctx.beginPath(); ctx.moveTo(mx1, my1); ctx.quadraticCurveTo(mx1 + 20, my1 - 10, mx1 + 40, my1 + 5); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Stars
  ctx.fillStyle = '#a855f7';
  for (var i = 0; i < 30; i++) {
    var sx = (i * 37 + frame * 0.1) % GW;
    var sy = (i * 23) % 150;
    var twinkle = Math.sin(frame * 0.05 + i) > 0 ? 1 : 0;
    if (twinkle) ctx.fillRect(sx, sy, 1, 1);
  }

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TASERN QUEST', GW/2 + 2, 52);
  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillText('TASERN QUEST', GW/2, 50);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '9px monospace';
  ctx.fillText('A Baseling\'s Quest Through the Spore Gardens', GW/2, 70);

  // Menu
  var hasSave = false;
  try { hasSave = !!localStorage.getItem('tasernquest_save'); } catch(e) { console.warn('[tasern-quest] load save check:', e.message || e); }

  var opts = hasSave ? ['Continue', 'New Game'] : ['New Game'];
  for (var i = 0; i < opts.length; i++) {
    var sel = (titleMenu === i);
    ctx.fillStyle = sel ? '#f4b41b' : '#aaaacc';
    ctx.font = (sel ? 'bold ' : '') + '11px monospace';
    ctx.fillText((sel ? '> ' : '  ') + opts[i], GW/2, 200 + i * 22);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#3cacd7';
  ctx.font = '8px monospace';
  ctx.fillText('[Z/Space] to select', GW/2, 250);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#7a444a';
  ctx.font = '7px monospace';
  ctx.fillText('Arrows=Move Z=OK X=Back I/Shift=Items Tab=Stats', GW/2, 270);

  ctx.textAlign = 'left';
}

var titleMenu = 0;

function titleUpdate(dt) {
  var hasSave = false;
  try { hasSave = !!localStorage.getItem('tasernquest_save'); } catch(e) { console.warn('[tasern-quest] load save check:', e.message || e); }
  var maxOpt = hasSave ? 1 : 0;

  if (btnUp()) { titleMenu = Math.max(0, titleMenu - 1); sfxMenu(); }
  if (btnDown()) { titleMenu = Math.min(maxOpt, titleMenu + 1); sfxMenu(); }
  if (btnA()) {
    clearTouchA();
    TAS.audio.ensureAudio();
    if (hasSave && titleMenu === 0) {
      if (loadGame()) {
        // Ensure saved player has new fields
        if (!player.miniBossesDefeated) player.miniBossesDefeated = [false, false, false];
        if (!player.critChance) player.critChance = 5 + dexMod * 2;
        if (player.bufAtk === undefined) player.bufAtk = 0;
        state = player.inDungeon >= 0 ? 'dungeon' : 'overworld';
        addText('Welcome back, baseling hero!');
        showTutorial('welcome', 'Arrows=Move  Z=OK  X=Back  I=Items  Tab=Stats');
      }
    } else {
      player = newPlayer();
      state = 'overworld';
      addText('Your baseling hero sets forth into the spore overworld!');
      addText('Defeat the Dark Spore King in the southern castle!');
      addText('Visit garden towns for rest and POOP supplies.');
      addText('Beware of fungal creatures in the wild!');
      showTutorial('start', 'Arrow keys to move. Visit the town nearby!');
    }
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updatePopups();
  updateShake();
  updateTutorial();
  if (state === 'overworld') updateWeather();

  switch(state) {
    case 'title': titleUpdate(dt); break;
    case 'overworld': overworldUpdate(dt); break;
    case 'battle': battleUpdate(dt); break;
    case 'town': townUpdate(dt); break;
    case 'dungeon': dungeonUpdate(dt); break;
    case 'fieldMenu': fieldMenuUpdate(dt); break;
    case 'status': statusUpdate(dt); break;
    case 'victory':
      if (btnA()) {
        clearTouchA();
        try { localStorage.removeItem('tasernquest_save'); } catch(e) { console.error('Clear save failed:', e); }
        player = newPlayer();
        state = 'title';
        titleMenu = 0;
      }
      break;
  }

  // Check boss defeated
  if (state === 'battle' && battleState && battleState.enemy.isBoss && battleState.enemy.hp <= 0 && battleState.phase === 'result') {
    player.defeatedBoss = true;
    saveGame();
  }
  if (player && player.defeatedBoss && state !== 'battle' && state !== 'victory') {
    state = 'victory';
  }

  copyKeys();
  touchTapped = false;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.save();
  if (screenShake.intensity > 0.1) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  switch(state) {
    case 'title': drawTitle(); break;
    case 'overworld': drawOverworld(); break;
    case 'battle': drawBattle(); break;
    case 'town': drawTown(); break;
    case 'dungeon': drawDungeon(); break;
    case 'fieldMenu': drawFieldMenu(); break;
    case 'status': drawStatus(); break;
    case 'victory': drawVictoryScreen(); break;
  }

  ctx.restore();
  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
