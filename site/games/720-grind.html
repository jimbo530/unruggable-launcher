// === DRAW SHOP ===
function drawShop() {
  ctx.fillStyle = '#1a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('GARDEN BOARD SHOP', GW / 2, 30);

  ctx.fillStyle = '#88ccff';
  ctx.font = '12px monospace';
  ctx.fillText('Money: M' + money, GW / 2, 50);

  for (var i = 0; i < boards.length; i++) {
    var b = boards[i];
    var y = 75 + i * 45;
    var owned = boardsOwned[i];
    var selected = i === currentBoard;
    var affordable = b.cost <= money;

    ctx.fillStyle = selected ? 'rgba(68,221,136,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.fillRect(40, y, GW - 80, 40);
    if (selected) { ctx.strokeStyle = '#44dd88'; ctx.lineWidth = 2; ctx.strokeRect(40, y, GW - 80, 40); }

    ctx.textAlign = 'left';
    ctx.fillStyle = selected ? '#44dd88' : owned ? '#aaa' : affordable ? '#ffdd44' : '#555';
    ctx.font = 'bold 11px monospace';
    ctx.fillText((i + 1) + '. ' + b.name, 50, y + 16);

    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('SPD:' + b.speed.toFixed(1) + ' AIR:' + b.air.toFixed(1) + ' SPIN:' + b.spin.toFixed(1), 50, y + 32);

    ctx.textAlign = 'right';
    if (selected) { ctx.fillStyle = '#44dd88'; ctx.fillText('[EQUIPPED]', GW - 50, y + 22); }
    else if (owned) { ctx.fillStyle = '#888'; ctx.fillText('OWNED', GW - 50, y + 22); }
    else { ctx.fillStyle = affordable ? '#ffdd44' : '#555'; ctx.fillText('M' + b.cost, GW - 50, y + 22); }
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Press 1-5 to buy/equip | ESC/B to leave garden', GW / 2, GH - 15);
}

// === DRAW PARK ===
function drawPark() {
  var type = state === 'championship' ? PARK_HALFPIPE : parkTypes[currentPark];
  var shake = getShakeOffset();

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(shake.x, shake.y);

  if (type === PARK_HALFPIPE) drawHalfpipe();
  else if (type === PARK_DOWNHILL) drawDownhill();
  else if (type === PARK_SLALOM) drawSlalom();
  else if (type === PARK_JUMP) drawJumpRamp();

  if (bossActive && boss) drawBossSprite(boss);

  TAS.particles.draw();
  drawDeathParticles();
  drawScorePopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Park HUD
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, 28);
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText((state === 'championship' ? 'CHAMPIONSHIP: ' : (bossActive ? 'BOSS: ' : 'PARK: ')) + parkScore, 6, 18);
  ctx.textAlign = 'center';
  ctx.fillStyle = parkTimer < 5 ? '#ff4444' : '#38d973';
  ctx.fillText('TIME: ' + Math.ceil(parkTimer), GW / 2, 18);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff6688';
  ctx.fillText('CRASHES: ' + parkCrashes + '/3', GW - 6, 18);

  if (comboCount > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('COMBO x' + comboMultiplier.toFixed(1), GW / 2, 42);
  }

  if (trickDisplayTimer > 0) {
    var alpha = Math.min(1, trickDisplayTimer * 2);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    var isBail = trickDisplay.indexOf('WIPEOUT') >= 0;
    var isLucky = trickDisplay.indexOf('LUCKY') >= 0;
    ctx.fillStyle = isBail ? '#ff4444' : isLucky ? '#ffd700' : '#ffdd44';
    ctx.font = 'bold ' + (isBail ? 20 : isLucky ? 18 : 16) + 'px monospace';
    ctx.fillText(trickDisplay, GW / 2, GH / 2 - 20);
    ctx.globalAlpha = 1;
  }

  if (state === 'park') {
    var targets = parkTargets[currentPark];
    ctx.textAlign = 'left';
    ctx.font = '8px monospace';
    ctx.fillStyle = parkScore >= targets[0] ? '#cd7f32' : '#444';
    ctx.fillText('B:' + targets[0], 6, GH - 20);
    ctx.fillStyle = parkScore >= targets[1] ? '#c0c0c0' : '#444';
    ctx.fillText('S:' + targets[1], 60, GH - 20);
    ctx.fillStyle = parkScore >= targets[2] ? '#ffd700' : '#444';
    ctx.fillText('G:' + targets[2], 114, GH - 20);
  }

  // Zone indicator
  var zone = getCurrentZone();
  ctx.textAlign = 'right';
  ctx.fillStyle = zone.accent;
  ctx.font = '7px monospace';
  ctx.fillText(zone.name, GW - 6, GH - 8);

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW HALFPIPE ===
function drawHalfpipe() {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 28, GW, GH - 28);

  // Crowd (background)
  for (var i = 0; i < 20; i++) {
    ctx.fillStyle = ['#664444','#446644','#444466','#666644','#664466'][i % 5];
    ctx.beginPath();
    ctx.arc(24 * i + 12, 80 + Math.sin(i + frame * 0.05) * 3, 6, 0, PI2);
    ctx.fill();
  }

  // Halfpipe structure
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(30, 280);
  ctx.quadraticCurveTo(30, 180, 80, 130);
  ctx.lineTo(80, 280);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(GW - 30, 280);
  ctx.quadraticCurveTo(GW - 30, 180, GW - 80, 130);
  ctx.lineTo(GW - 80, 280);
  ctx.fill();
  ctx.fillStyle = '#444';
  ctx.fillRect(80, 260, GW - 160, 25);
  ctx.fillStyle = '#888';
  ctx.fillRect(60, 125, 30, 5);
  ctx.fillRect(GW - 90, 125, 30, 5);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(60, 130);
  ctx.quadraticCurveTo(GW / 2, 270, GW - 60, 130);
  ctx.stroke();

  // Spore vents
  for (var vi = 0; vi < parkSporeVents.length; vi++) {
    var v = parkSporeVents[vi];
    if (v.active) {
      ctx.fillStyle = 'rgba(100,200,100,0.6)';
      for (var sp = 0; sp < 5; sp++) {
        var sy2 = v.y - sp * 12 - Math.random() * 10;
        ctx.beginPath();
        ctx.arc(v.x + Math.sin(frame * 0.1 + sp) * 5, sy2, 4 + sp, 0, PI2);
        ctx.fill();
      }
    }
    // Vent pipe
    ctx.fillStyle = '#555';
    ctx.fillRect(v.x - 5, v.y, 10, 6);
  }

  // Skater
  var sx = parkPlayer.x;
  var sy;
  if (parkPlayer.airborne) {
    sy = 130 - Math.max(0, parkPlayer.height) * 0.5;
  } else {
    sy = parkPlayer.y;
  }
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(parkPlayer.rotation);
  drawBaselingSkater(0, 0, 1.0, frame * 0.1);
  ctx.restore();

  if (parkPlayer.airborne) {
    ctx.fillStyle = 'rgba(255,136,255,0.5)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AIR: ' + parkPlayer.airTime.toFixed(1) + 's', sx, sy - 30);

    if (trickQueue.length === 0) {
      ctx.fillStyle = '#555';
      ctx.font = '8px monospace';
      ctx.fillText('Press directions, then TRICK!', sx, sy + 25);
    } else {
      ctx.fillStyle = '#88ff88';
      ctx.font = '8px monospace';
      ctx.fillText(trickQueue.join(' ') + ' ...', sx, sy + 25);
    }
  }

  if (!parkPlayer.airborne && frame < 180) {
    ctx.fillStyle = '#555';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LEFT/RIGHT to pump, gain speed at edges!', GW / 2, GH - 8);
  }
}

// === DRAW DOWNHILL ===
function drawDownhill() {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 28, GW, GH - 28);

  // Road
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 130, GW, 170);
  ctx.strokeStyle = '#555';
  ctx.setLineDash([15, 10]);
  ctx.lineWidth = 1;
  var offset = -(downhillScroll % 25);
  ctx.beginPath();
  for (var lx = offset; lx < GW; lx += 25) {
    ctx.moveTo(lx, 200); ctx.lineTo(lx + 12, 200);
    ctx.moveTo(lx, 250); ctx.lineTo(lx + 12, 250);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Goo patches
  for (var gpi = 0; gpi < parkGooPatches.length; gpi++) {
    var gp = parkGooPatches[gpi];
    var gpx = gp.x - downhillScroll;
    if (gpx > -gp.w && gpx < GW) {
      ctx.fillStyle = 'rgba(80,160,60,0.5)';
      ctx.beginPath();
      ctx.ellipse(gpx + gp.w / 2, gp.y + 10, gp.w / 2, 10, 0, 0, PI2);
      ctx.fill();
      // Goo bubbles
      ctx.fillStyle = 'rgba(100,200,80,0.7)';
      ctx.beginPath();
      ctx.arc(gpx + gp.w * 0.3, gp.y + 8 + Math.sin(frame * 0.08) * 2, 3, 0, PI2);
      ctx.fill();
    }
  }

  // Rails
  for (var ri = 0; ri < parkRails.length; ri++) {
    var r = parkRails[ri];
    var rx = r.x - downhillScroll;
    if (rx > -r.w && rx < GW) {
      ctx.fillStyle = '#888';
      ctx.fillRect(rx, r.y, r.w, 4);
      ctx.fillStyle = '#666';
      ctx.fillRect(rx, r.y + 4, 3, 10);
      ctx.fillRect(rx + r.w - 3, r.y + 4, 3, 10);
    }
  }

  // Mycelial worms
  for (var wi = 0; wi < parkMycelialWorms.length; wi++) {
    var w = parkMycelialWorms[wi];
    var wx = w.x - downhillScroll;
    if (wx > -40 && wx < GW + 40 && w.emerging) {
      ctx.fillStyle = '#558844';
      ctx.beginPath();
      ctx.ellipse(wx, w.y - w.height / 2, 6, w.height / 2, 0, 0, PI2);
      ctx.fill();
      // Head
      ctx.fillStyle = '#77aa55';
      ctx.beginPath();
      ctx.arc(wx, w.y - w.height, 7, 0, PI2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(wx - 3, w.y - w.height - 2, 2, 0, PI2); ctx.fill();
      ctx.beginPath(); ctx.arc(wx + 3, w.y - w.height - 2, 2, 0, PI2); ctx.fill();
      // Warning indicator
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', wx, w.y - w.height - 12);
    }
  }

  // Obstacles
  for (var oi = 0; oi < parkObstacles.length; oi++) {
    var o = parkObstacles[oi];
    var ox = o.x - downhillScroll;
    if (ox > -40 && ox < GW + 40) {
      if (o.type === 'rock') {
        ctx.fillStyle = '#666';
        ctx.beginPath(); ctx.arc(ox + o.w / 2, o.y + o.h / 2, o.w / 2, 0, PI2); ctx.fill();
        ctx.fillStyle = '#777';
        ctx.beginPath(); ctx.arc(ox + o.w / 2 - 2, o.y + o.h / 2 - 2, o.w / 4, 0, PI2); ctx.fill();
      } else {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(ox + o.w / 2, o.y);
        ctx.lineTo(ox, o.y + o.h);
        ctx.lineTo(ox + o.w, o.y + o.h);
        ctx.fill();
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(ox + o.w / 2 - 1, o.y + 2, 2, o.h - 4);
      }
    }
  }

  // Fungal pickups
  for (var fi = 0; fi < parkFungalPickups.length; fi++) {
    var fp = parkFungalPickups[fi];
    if (fp.collected) continue;
    var fpx = fp.x - downhillScroll;
    if (fpx > -20 && fpx < GW + 20) {
      var bob = Math.sin(frame * 0.06 + fi) * 3;
      ctx.fillStyle = fp.type === 'extract' ? '#88ff88' : '#ff88ff';
      ctx.beginPath();
      ctx.ellipse(fpx, fp.y + bob - 5, 5, 4, 0, PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ddc';
      ctx.fillRect(fpx - 2, fp.y + bob - 2, 4, 6);
    }
  }

  // Tokens
  for (var ti = 0; ti < parkTokens.length; ti++) {
    var t = parkTokens[ti];
    if (t.collected) continue;
    var tx = t.x - downhillScroll;
    if (tx > -20 && tx < GW + 20) {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath(); ctx.arc(tx, t.y, 6, 0, PI2); ctx.fill();
      ctx.fillStyle = '#92600a';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P', tx, t.y + 3);
    }
  }

  // Skater
  var sy = parkPlayer.y - parkPlayer.height;
  ctx.save();
  ctx.translate(parkPlayer.x, sy);
  if (parkPlayer.grinding) {
    ctx.rotate(Math.sin(frame * 0.3) * 0.05);
  }
  drawBaselingSkater(0, 0, 1.0, frame * 0.15);
  ctx.restore();

  if (parkPlayer.grinding) {
    ctx.fillStyle = '#ffaa00';
    for (var i = 0; i < 3; i++) {
      ctx.fillRect(parkPlayer.x - 5 + Math.random() * 10, parkPlayer.y + 8, 2, 2);
    }
  }

  // Progress bar
  ctx.fillStyle = '#333';
  ctx.fillRect(20, GH - 12, GW - 40, 6);
  ctx.fillStyle = '#38d973';
  ctx.fillRect(20, GH - 12, (GW - 40) * Math.min(1, downhillScroll / 3200), 6);
}

// === DRAW SLALOM ===
function drawSlalom() {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 28, GW, GH - 28);

  ctx.fillStyle = zone.bg2;
  ctx.fillRect(0, 100, GW, 200);

  var scrollX = Math.max(0, parkPlayer.x - 100);

  // Spore vents in slalom
  for (var vi = 0; vi < parkSporeVents.length; vi++) {
    var v = parkSporeVents[vi];
    var vx = v.x - scrollX;
    if (vx > -20 && vx < GW + 20) {
      if (v.active) {
        ctx.fillStyle = 'rgba(100,200,100,0.5)';
        for (var sp = 0; sp < 3; sp++) {
          ctx.beginPath();
          ctx.arc(vx + Math.sin(frame * 0.1 + sp) * 4, v.y - sp * 10, 5 + sp, 0, PI2);
          ctx.fill();
        }
      }
      ctx.fillStyle = '#555';
      ctx.fillRect(vx - 4, v.y, 8, 5);
    }
  }

  // Gates
  for (var gi = 0; gi < parkGates.length; gi++) {
    var g = parkGates[gi];
    var gx = g.x - scrollX;
    if (gx < -20 || gx > GW + 20) continue;
    ctx.strokeStyle = g.passed ? '#44ff44' : '#ff4444';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(gx, g.y - 20);
    ctx.lineTo(gx, g.y + 20);
    ctx.stroke();
    ctx.fillStyle = g.passed ? '#44ff44' : g.side === 'left' ? '#ff4444' : '#4444ff';
    ctx.beginPath();
    ctx.moveTo(gx, g.y - 20);
    ctx.lineTo(gx + 12, g.y - 15);
    ctx.lineTo(gx, g.y - 10);
    ctx.fill();
  }

  // Skater
  var sx = parkPlayer.x - scrollX;
  ctx.save();
  ctx.translate(sx, parkPlayer.y);
  drawBaselingSkater(0, 0, 1.0, frame * 0.12);
  ctx.restore();

  // Speed lines
  ctx.strokeStyle = 'rgba(136,204,255,0.3)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(sx - 15 - i * 8, parkPlayer.y + Math.random() * 10 - 5);
    ctx.lineTo(sx - 25 - i * 8, parkPlayer.y + Math.random() * 10 - 5);
    ctx.stroke();
  }

  // Progress
  ctx.fillStyle = '#333';
  ctx.fillRect(20, GH - 12, GW - 40, 6);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(20, GH - 12, (GW - 40) * Math.min(1, parkPlayer.x / 1400), 6);

  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  var passed = parkGates.filter(function(g){return g.passed;}).length;
  ctx.fillText('GATES: ' + passed + '/' + parkGates.length, GW / 2, GH - 20);
}

// === DRAW JUMP RAMP ===
function drawJumpRamp() {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 28, GW, GH - 28);

  // Ground
  ctx.fillStyle = '#333';
  ctx.fillRect(0, 250, GW, 70);

  // Ramp
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.moveTo(260, 250);
  ctx.lineTo(320, 170);
  ctx.lineTo(340, 170);
  ctx.lineTo(340, 250);
  ctx.fill();
  ctx.strokeStyle = '#777';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(260, 250);
  ctx.lineTo(320, 170);
  ctx.stroke();

  // Landing zone
  ctx.fillStyle = 'rgba(68,221,136,0.1)';
  ctx.fillRect(360, 240, 100, 15);
  ctx.strokeStyle = '#44dd88';
  ctx.setLineDash([4,4]);
  ctx.strokeRect(360, 240, 100, 15);
  ctx.setLineDash([]);

  // Speed meter
  if (!rampLaunched) {
    ctx.fillStyle = '#333';
    ctx.fillRect(30, GH - 30, 100, 10);
    ctx.fillStyle = rampSpeed > 200 ? '#44dd88' : rampSpeed > 100 ? '#ffdd44' : '#ff4444';
    ctx.fillRect(30, GH - 30, Math.min(100, rampSpeed / 3), 10);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPEED', 30, GH - 34);
    ctx.fillStyle = '#888';
    ctx.fillText('Hold RIGHT to build speed!', 30, GH - 5);
  }

  // Skater
  var sx = parkPlayer.x;
  var sy;
  if (parkPlayer.airborne) {
    sy = 170 - Math.max(0, parkPlayer.height) * 0.3;
  } else if (parkPlayer.x >= 260 && parkPlayer.x < 320 && !rampLaunched) {
    var rampProgress = (parkPlayer.x - 260) / 60;
    sy = 250 - rampProgress * 80;
  } else {
    sy = 240;
  }

  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(parkPlayer.rotation);
  drawBaselingSkater(0, 0, 1.2, frame * 0.12);
  ctx.restore();

  if (parkPlayer.airborne) {
    var airHeight = Math.max(0, parkPlayer.height);
    ctx.fillStyle = 'rgba(136,204,255,0.6)';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HEIGHT: ' + airHeight.toFixed(0), sx, sy - 35);

    if (trickQueue.length > 0) {
      ctx.fillStyle = '#88ff88';
      ctx.font = '9px monospace';
      ctx.fillText(trickQueue.join(' ') + ' -> TRICK!', sx, sy + 30);
    } else {
      ctx.fillStyle = '#888';
      ctx.font = '9px monospace';
      ctx.fillText('Arrows then TRICK!', sx, sy + 30);
    }
  }
}

// === DRAW PARK RESULT ===
function drawParkResult() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(parkNames[currentPark] + ' COMPLETE', GW / 2, 50);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('POOP SCORE: ' + parkScore, GW / 2, 90);

  // Score multiplier note
  if (statB.scoreMult > 1) {
    ctx.fillStyle = '#88ccff';
    ctx.font = '9px monospace';
    ctx.fillText('(x' + statB.scoreMult.toFixed(1) + ' INT bonus applied)', GW / 2, 106);
  }

  var medal = 0;
  var targets = parkTargets[currentPark] || parkTargets[0];
  if (parkScore >= targets[2]) medal = 3;
  else if (parkScore >= targets[1]) medal = 2;
  else if (parkScore >= targets[0]) medal = 1;

  var medalNames = ['NO MEDAL', 'BRONZE', 'SILVER', 'GOLD'];
  var medalColors = ['#555', '#cd7f32', '#c0c0c0', '#ffd700'];
  ctx.fillStyle = medalColors[medal];
  ctx.font = 'bold 18px monospace';
  ctx.fillText(medalNames[medal], GW / 2, 135);

  if (medal > 0) {
    ctx.beginPath();
    ctx.arc(GW / 2, 165, 15, 0, PI2);
    ctx.fillStyle = medalColors[medal];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = '12px monospace';
  ctx.fillText('Garden Seeds earned: M' + Math.floor(parkScore / 2), GW / 2, 200);
  ctx.fillText('Crashes: ' + parkCrashes, GW / 2, 220);

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Bronze: ' + targets[0] + '  Silver: ' + targets[1] + '  Gold: ' + targets[2], GW / 2, 250);

  if (championshipUnlocked) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('GARDEN CHAMPIONSHIP UNLOCKED!', GW / 2, 275);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY TO CONTINUE', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

// === CUSTOM GAME OVER ===
function drawGameOverCustom() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, GW, GH);

  // Fallen baseling
  ctx.save();
  ctx.translate(GW / 2, GH / 2 + 10);
  ctx.rotate(0.5);
  drawBaselingSkater(0, 0, 2, 0);
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('WIPED OUT', GW / 2, 50);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('POOP SCORE: ' + score, GW / 2, 80);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 98);
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW / 2, 98);
  }

  // Stats summary
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Level: ' + gameLevel + '  Parks: ' + totalParksCompleted + '  Medals: ' + parkMedals.filter(function(m){return m > 0;}).length + '/4', GW / 2, GH - 50);

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

// === DRAW WIN ===
function drawWin() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Fireworks
  if (frame % 10 === 0) {
    var fwColors = ['#ff4444','#ffdd44','#44ff44','#4488ff','#ff44ff'];
    TAS.particles.spawn(100 + Math.random() * 280, 50 + Math.random() * 100, fwColors[Math.floor(Math.random() * 5)], 20, 3, { size: 2, gravity: 1 });
    spawnDeathParticles(100 + Math.random() * 280, 50 + Math.random() * 100, fwColors[Math.floor(Math.random() * 5)], 8);
    TAS.audio.playTone(400 + Math.random() * 600, 0.08, 'triangle', 0.03);
  }

  TAS.particles.draw();
  drawDeathParticles();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN CHAMPION!', GW / 2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Final POOP Score: ' + score, GW / 2, 100);

  if (score >= highScore && score > 0) {
    var hsPulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = hsPulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 120);
    ctx.globalAlpha = 1;
  }

  drawBaselingSkater(GW / 2, 180, 2.5, frame * 0.03);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  var medalSummary = '';
  for (var i = 0; i < 4; i++) {
    var mc = ['--', 'B', 'S', 'G'][parkMedals[i]];
    medalSummary += parkNames[i] + ':' + mc + '  ';
  }
  ctx.fillText(medalSummary, GW / 2, 225);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('The baseling shreds the spore districts!', GW / 2, 255);

  // Stat summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' Lv.' + statB.level + ' - Victory!', GW / 2, 272);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

// === MAIN LOOP ===
TAS.loop.start(update, draw);

})();
</script>
