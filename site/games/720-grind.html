<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b','c'], labels: { a: 'JUMP', b: 'TRICK', c: 'PICK' } });

var PI = Math.PI, PI2 = PI * 2;
var CITY_W = 1200, CITY_H = 900;
var TILE = 30;

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// WAGER game: stat math goes through TAS.player.mults({ pvp:true }) so the band is the
// tight 0.95–1.10 fairness clamp (better-fed pet = at most ~10% edge). The game's many
// statB.* reads are kept working by synthesizing those fields from the clamped mults in
// recomputeStats() (option b in REMASTER-GUIDE) — every gameplay number traces back to a
// clamped getMults() value. Racing-sports wiring: speed->moveSpeed, hpMult/lives->health,
// damage->damage, luck/scoreMult->luck. No water on the streets, so SWM is untouched.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[720-grind] NftLoader display info failed:', e && e.message); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults({ pvp: true }) : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.speed     = m.moveSpeed;                 // DEX -> skate/scroll pace
  statB.damage    = m.damage;                    // STR -> grind/bump/boss damage
  statB.hpMult    = m.health;                    // CON -> lives / time-penalty soak
  statB.luck      = m.luck;                       // LCK -> pickup value bias
  statB.scoreMult = m.luck;                       // score bias folded into luck (not a 6th stat)
  statB.cooldown  = m.health;                     // shield/park-time duration rides survivability
  statB.lives     = m.health > 1.05 ? 1 : 0;      // tiny pvp-band cushion
  // Keep a selected-baseling display name/color in sync for the title + HUD.
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}
recomputeStats();

var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[720-grind] player init failed:', e && e.message); });
}

// === MfT SPLASH ===
var splashTimer = 2.0;
var splashDone = false;

// === TUTORIAL ===
var tutorialShown = false;
var tutorialActive = false;
var tutorialTimer = 0;

// === INPUT DEBOUNCE ===
var inputCooldown = 0;

function clearAllInput() {
  var k = TAS.input.keys;
  for (var key in k) { k[key] = false; }
  TAS.input.touch.left = TAS.input.touch.right = TAS.input.touch.up = TAS.input.touch.down = TAS.input.touch.a = TAS.input.touch.b = false;
  inputCooldown = 0.3;
}

function anyKeyPressed() {
  if (inputCooldown > 0) return false;
  if (TAS.input.touch.a || TAS.input.touch.b) return true;
  var k = TAS.input.keys;
  for (var key in k) { if (k[key]) return true; }
  return false;
}

// === SCORE POPUPS ===
var scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.2, maxLife: 1.2 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life -= dt;
    scorePopups[i].y -= 40 * dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  }
}

// === SCREEN SHAKE ===
var shakeFrames = 0;
var shakeIntensity = 0;
function triggerShake(intensity, frames) {
  shakeIntensity = intensity;
  shakeFrames = frames;
}
function getShakeOffset() {
  if (shakeFrames <= 0) return { x: 0, y: 0 };
  shakeFrames--;
  var amt = shakeIntensity * (shakeFrames / 10);
  return { x: (Math.random() - 0.5) * amt * 2, y: (Math.random() - 0.5) * amt * 2 };
}

// === DEATH/EXPLOSION PARTICLES ===
var deathParticles = [];
function spawnDeathParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * PI2;
    var speed = 30 + Math.random() * 80;
    deathParticles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.5 + Math.random() * 0.5,
      color: color,
      size: 1 + Math.random() * 3
    });
  }
}
function updateDeathParticles(dt) {
  for (var i = deathParticles.length - 1; i >= 0; i--) {
    var p = deathParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 120 * dt;
    p.life -= dt;
    p.size *= 0.98;
    if (p.life <= 0) deathParticles.splice(i, 1);
  }
}
function drawDeathParticles() {
  for (var i = 0; i < deathParticles.length; i++) {
    var p = deathParticles[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// === GAME STATE ===
var state = 'splash';
var score = 0;
var highScore = TAS.score.load('720grind_hi');
var frame = 0;
var lives = 3;
var cityTimer = 45;
var beeActive = false;
var beeTimer = 0;
var parkTickets = [false, false, false, false];
var parkMedals = [0, 0, 0, 0];
var currentPark = -1;
var parkState = null;
var shopOpen = false;
var championshipUnlocked = false;
var gameWon = false;
var wasChampionship = false;
var gameLevel = 1;
var totalParksCompleted = 0;

// Board stats
var boards = [
  { name: 'SPORE BOARD', speed: 1.0, air: 1.0, spin: 1.0, cost: 0 },
  { name: 'MYCO CRUISER', speed: 1.3, air: 1.1, spin: 1.2, cost: 500 },
  { name: 'REACTOR RIDER', speed: 1.1, air: 1.5, spin: 1.3, cost: 1200 },
  { name: 'POOP DECK', speed: 1.2, air: 1.3, spin: 1.8, cost: 2000 },
  { name: 'YIELDLING PRO', speed: 1.5, air: 1.6, spin: 2.0, cost: 4000 }
];
var currentBoard = 0;
var boardsOwned = [true, false, false, false, false];
var money = 0;

// Player (city mode)
var player = { x: 600, y: 450, vx: 0, vy: 0, angle: 0, pushing: false, pushFrame: 0 };
var PLAYER_SPEED = 160;
var FRICTION = 0.94;

// Camera
var camX = 0, camY = 0;

// City objects
var parks = [];
var tokens = [];
var cars = [];
var pedestrians = [];
var bees = [];
var shops = [];
var buildings = [];

// Tasern city objects
var reactorBugs = [];
var sporeCrawlers = [];
var gooTrails = [];
var sporePickups = [];
var sporeRainDrops = [];
var sporeRainTimer = 0;
var playerShield = 0;
var playerReactorCore = false;
var reactorCoreTimer = 0;

// Car hit invincibility
var carHitTimer = 0;

// Park event state
var parkPlayer = { x: 0, y: 0, vx: 0, vy: 0, airborne: false, airTime: 0, rotation: 0, height: 0, grinding: false };
var trickQueue = [];
var currentTrick = '';
var trickScore = 0;
var comboCount = 0;
var comboMultiplier = 1;
var parkScore = 0;
var parkTimer = 30;
var parkCrashes = 0;
var parkObstacles = [];
var parkRails = [];
var parkTokens = [];
var parkGates = [];
var gateIndex = 0;
var halfpipePos = 0;
var halfpipeVel = 0;
var halfpipeHeight = 0;
var rampSpeed = 0;
var rampLaunched = false;
var downhillScroll = 0;
var trickDisplay = '';
var trickDisplayTimer = 0;
var landingTimer = 0;

// Park hazards (Tasern)
var parkSporeVents = [];
var parkGooPatches = [];
var parkMycelialWorms = [];
var parkFungalPickups = [];

// Boss state
var bossActive = false;
var boss = null;

// Trick definitions
var TRICKS = [
  { name: '360', keys: ['left','left'], score: 100, minAir: 0.3 },
  { name: '540', keys: ['left','left','left'], score: 200, minAir: 0.5 },
  { name: '720', keys: ['left','left','left','left'], score: 500, minAir: 0.8 },
  { name: 'KICKFLIP', keys: ['down','up'], score: 150, minAir: 0.2 },
  { name: 'HEELFLIP', keys: ['up','down'], score: 150, minAir: 0.2 },
  { name: 'HANDPLANT', keys: ['up','up'], score: 250, minAir: 0.4 },
  { name: 'INDY GRAB', keys: ['down','down'], score: 200, minAir: 0.3 },
  { name: 'MADONNA', keys: ['left','down','right'], score: 350, minAir: 0.6 },
  { name: 'MCTWIST', keys: ['right','right','left'], score: 400, minAir: 0.7 },
  { name: 'SPORE SPIN', keys: ['left','right','left'], score: 300, minAir: 0.4 },
  { name: 'MYCO FLIP', keys: ['down','up','down'], score: 350, minAir: 0.5 }
];

// Park types
var PARK_HALFPIPE = 0, PARK_DOWNHILL = 1, PARK_SLALOM = 2, PARK_JUMP = 3;
var parkTypes = [PARK_HALFPIPE, PARK_DOWNHILL, PARK_SLALOM, PARK_JUMP];
var parkNames = ['SPORE PIPE', 'MYCO HILL', 'GARDEN RUN', 'POOP RAMP'];
var parkTargets = [
  [800, 1500, 2500],
  [600, 1200, 2000],
  [500, 1000, 1800],
  [700, 1400, 2200]
];

// Zone theming (cycles every 5 levels)
var ZONES = [
  { name: 'SPORE CELLARS', bg1: '#1a0a2a', bg2: '#2a1a3a', accent: '#88cc88', ground: '#2a2a3a' },
  { name: 'MYCELIAL DEPTHS', bg1: '#0a1a1a', bg2: '#1a2a2a', accent: '#44ccaa', ground: '#1a3a2a' },
  { name: 'REACTOR TUNNELS', bg1: '#1a1a0a', bg2: '#2a2a1a', accent: '#ccaa44', ground: '#2a2a1a' },
  { name: 'HIVE CORE', bg1: '#2a0a0a', bg2: '#3a1a1a', accent: '#cc4444', ground: '#3a1a1a' },
  { name: "NAMARIS' VESSEL", bg1: '#0a0a2a', bg2: '#1a1a3a', accent: '#8844cc', ground: '#1a1a3a' }
];
function getCurrentZone() {
  return ZONES[(gameLevel - 1) % ZONES.length];
}

// Boss definitions
var BOSS_TYPES = [
  { name: 'MYCELIAL QUEEN', hp: 5, color: '#cc44cc', size: 3, speed: 40, pattern: 'circle', projectileColor: '#ff88ff' },
  { name: 'REACTOR HIVE', hp: 7, color: '#ccaa44', size: 2.5, speed: 30, pattern: 'spread', projectileColor: '#ffcc44' },
  { name: 'SPORE LORD', hp: 9, color: '#44cc88', size: 3.5, speed: 50, pattern: 'chase', projectileColor: '#88ffaa' },
  { name: 'GOOP TITAN', hp: 11, color: '#8844cc', size: 4, speed: 35, pattern: 'rain', projectileColor: '#aa88ff' },
  { name: 'NAMARIS SHADE', hp: 15, color: '#ff4444', size: 3, speed: 60, pattern: 'teleport', projectileColor: '#ff8888' }
];

// === CITY GENERATION ===
function generateCity() {
  parks = [
    { x: 200, y: 150, type: 0, icon: '#ff4444' },
    { x: 950, y: 200, type: 1, icon: '#44ff44' },
    { x: 250, y: 700, type: 2, icon: '#4488ff' },
    { x: 900, y: 750, type: 3, icon: '#ffaa00' }
  ];
  shops = [
    { x: 580, y: 420, w: 50, h: 40 }
  ];
  tokens = [];
  for (var i = 0; i < 40; i++) {
    tokens.push({ x: 80 + Math.random() * (CITY_W - 160), y: 80 + Math.random() * (CITY_H - 160), collected: false });
  }
  cars = [];
  for (var i = 0; i < 6; i++) {
    var horizontal = Math.random() > 0.5;
    cars.push({
      x: horizontal ? -60 : 200 + Math.random() * 800,
      y: horizontal ? 150 + Math.random() * 600 : -60,
      vx: horizontal ? (60 + Math.random() * 40) * (Math.random() > 0.5 ? 1 : -1) : 0,
      vy: horizontal ? 0 : (60 + Math.random() * 40) * (Math.random() > 0.5 ? 1 : -1),
      w: horizontal ? 50 : 24,
      h: horizontal ? 24 : 50,
      color: ['#cc3333','#3333cc','#33cc33','#cccc33','#cc33cc','#ffffff'][i]
    });
  }
  pedestrians = [];
  for (var i = 0; i < 8; i++) {
    pedestrians.push({
      x: 100 + Math.random() * 1000, y: 100 + Math.random() * 700,
      vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.5) * 30,
      timer: Math.random() * 3
    });
  }
  buildings = [];
  for (var i = 0; i < 20; i++) {
    var bx = 60 + Math.random() * (CITY_W - 120);
    var by = 60 + Math.random() * (CITY_H - 120);
    var bw = 40 + Math.random() * 60;
    var bh = 40 + Math.random() * 60;
    var overlap = false;
    for (var j = 0; j < parks.length; j++) { var p = parks[j]; if (TAS.hit.rectOverlap(bx, by, bw, bh, p.x - 50, p.y - 50, 100, 100)) overlap = true; }
    for (var j = 0; j < shops.length; j++) { var s = shops[j]; if (TAS.hit.rectOverlap(bx, by, bw, bh, s.x - 20, s.y - 20, s.w + 40, s.h + 40)) overlap = true; }
    if (!overlap) buildings.push({ x: bx, y: by, w: bw, h: bh, color: ['#445','#454','#544','#455','#545'][i % 5] });
  }
  bees = [];
  beeActive = false;
  beeTimer = 0;

  // Tasern enemies in city
  reactorBugs = [];
  var bugCount = 2 + Math.floor(gameLevel * 0.5);
  for (var i = 0; i < bugCount; i++) {
    reactorBugs.push({
      x: 100 + Math.random() * (CITY_W - 200),
      y: 100 + Math.random() * (CITY_H - 200),
      vx: (Math.random() - 0.5) * 60,
      vy: (Math.random() - 0.5) * 60,
      hp: 1,
      timer: Math.random() * 3,
      frame: Math.random() * 100
    });
  }

  sporeCrawlers = [];
  var crawlerCount = 1 + Math.floor(gameLevel * 0.3);
  for (var i = 0; i < crawlerCount; i++) {
    sporeCrawlers.push({
      x: 150 + Math.random() * (CITY_W - 300),
      y: 150 + Math.random() * (CITY_H - 300),
      angle: Math.random() * PI2,
      speed: 20 + Math.random() * 20,
      size: 12 + Math.random() * 8,
      gooTimer: 0
    });
  }

  // Spore pickups
  sporePickups = [];
  for (var i = 0; i < 5; i++) {
    var ptype = Math.random() < 0.5 ? 'shield' : (Math.random() < 0.5 ? 'core' : 'extract');
    sporePickups.push({
      x: 80 + Math.random() * (CITY_W - 160),
      y: 80 + Math.random() * (CITY_H - 160),
      type: ptype,
      collected: false
    });
  }

  gooTrails = [];
}

// === PARK GENERATION ===
function initPark(type) {
  parkScore = 0;
  parkTimer = type === PARK_DOWNHILL ? 25 : type === PARK_SLALOM ? 20 : 30;
  parkTimer *= statB.cooldown; // WIS extends park time
  parkCrashes = 0;
  comboCount = 0;
  comboMultiplier = 1;
  trickDisplay = '';
  trickDisplayTimer = 0;
  trickQueue = [];
  currentTrick = '';
  parkObstacles = [];
  parkRails = [];
  parkTokens = [];
  parkGates = [];
  gateIndex = 0;
  scorePopups = [];
  parkSporeVents = [];
  parkGooPatches = [];
  parkMycelialWorms = [];
  parkFungalPickups = [];
  bossActive = false;
  boss = null;

  // Check if boss level (every 5 parks completed)
  if (totalParksCompleted > 0 && totalParksCompleted % 5 === 0) {
    initBoss();
  }

  if (type === PARK_HALFPIPE) {
    parkPlayer = { x: GW / 2, y: 220, vx: 0, vy: 0, airborne: false, airTime: 0, rotation: 0, height: 0, grinding: false };
    halfpipePos = 0.5;
    halfpipeVel = 0;
    halfpipeHeight = 0;
    // Add spore vents
    for (var i = 0; i < 3; i++) {
      parkSporeVents.push({ x: 100 + i * 150, y: 260, timer: Math.random() * 3, active: false, activeTimer: 0 });
    }
  } else if (type === PARK_DOWNHILL) {
    parkPlayer = { x: 100, y: 200, vx: 0, vy: 0, airborne: false, airTime: 0, rotation: 0, height: 0, grinding: false };
    downhillScroll = 0;
    for (var i = 0; i < 20; i++) {
      parkObstacles.push({ x: 200 + i * 150 + Math.random() * 80, y: 140 + Math.random() * 120, w: 20 + Math.random() * 20, h: 16, type: Math.random() > 0.5 ? 'rock' : 'cone' });
    }
    for (var i = 0; i < 8; i++) {
      parkRails.push({ x: 300 + i * 250, y: 180 + Math.random() * 60, w: 80 + Math.random() * 40 });
    }
    for (var i = 0; i < 15; i++) {
      parkTokens.push({ x: 250 + i * 180 + Math.random() * 60, y: 140 + Math.random() * 100, collected: false });
    }
    // Add mycelial worms
    for (var i = 0; i < 4; i++) {
      parkMycelialWorms.push({ x: 400 + i * 600, y: 160 + Math.random() * 80, emerging: false, timer: 1 + Math.random() * 2, height: 0 });
    }
    // Add goo patches
    for (var i = 0; i < 6; i++) {
      parkGooPatches.push({ x: 350 + i * 400 + Math.random() * 100, y: 150 + Math.random() * 100, w: 30 + Math.random() * 20, slowFactor: 0.5 });
    }
    // Fungal pickups
    for (var i = 0; i < 3; i++) {
      parkFungalPickups.push({ x: 500 + i * 800, y: 150 + Math.random() * 80, collected: false, type: Math.random() < 0.5 ? 'extract' : 'spore_boost' });
    }
  } else if (type === PARK_SLALOM) {
    parkPlayer = { x: 60, y: 200, vx: 3, vy: 0, airborne: false, airTime: 0, rotation: 0, height: 0, grinding: false };
    for (var i = 0; i < 12; i++) {
      parkGates.push({ x: 100 + i * 100, y: 140 + Math.sin(i * 0.8) * 60, passed: false, side: i % 2 === 0 ? 'left' : 'right' });
    }
    // Spore vents along course
    for (var i = 0; i < 4; i++) {
      parkSporeVents.push({ x: 200 + i * 250, y: 200, timer: Math.random() * 2, active: false, activeTimer: 0 });
    }
  } else if (type === PARK_JUMP) {
    parkPlayer = { x: 60, y: 240, vx: 0, vy: 0, airborne: false, airTime: 0, rotation: 0, height: 0, grinding: false };
    rampSpeed = 0;
    rampLaunched = false;
  }
}

// === BOSS INIT ===
function initBoss() {
  var bossIdx = Math.floor((totalParksCompleted / 5 - 1) % BOSS_TYPES.length);
  var bdef = BOSS_TYPES[bossIdx];
  bossActive = true;
  boss = {
    name: bdef.name,
    x: GW / 2,
    y: 80,
    hp: Math.floor(bdef.hp * statB.hpMult),
    maxHp: Math.floor(bdef.hp * statB.hpMult),
    color: bdef.color,
    size: bdef.size,
    speed: bdef.speed,
    pattern: bdef.pattern,
    projectileColor: bdef.projectileColor,
    projectiles: [],
    timer: 0,
    phase: 0,
    flashTimer: 0,
    teleportTimer: 0
  };
}

// === START/RESET ===
function startGame() {
  state = 'city';
  score = 0;
  lives = Math.floor(3 * statB.hpMult) + statB.lives; // CON bonus
  money = 0;
  currentBoard = 0;
  boardsOwned = [true, false, false, false, false];
  parkTickets = [false, false, false, false];
  parkMedals = [0, 0, 0, 0];
  championshipUnlocked = false;
  gameWon = false;
  wasChampionship = false;
  gameLevel = 1;
  totalParksCompleted = 0;
  cityTimer = 45;
  carHitTimer = 0;
  playerShield = 0;
  playerReactorCore = false;
  reactorCoreTimer = 0;
  scorePopups = [];
  deathParticles = [];
  player.x = 600; player.y = 450; player.vx = 0; player.vy = 0; player.angle = 0;
  generateCity();
  TAS.particles.clear();
  clearAllInput();

  // Show tutorial on first play
  if (!tutorialShown) {
    tutorialActive = true;
    tutorialTimer = 0;
    tutorialShown = true;
  }
}

function enterPark(idx) {
  currentPark = idx;
  state = 'park';
  wasChampionship = false;
  initPark(parkTypes[idx]);
  TAS.audio.playTone(440, 0.1, 'square', 0.08);
  setTimeout(function() { TAS.audio.playTone(660, 0.1, 'square', 0.08); }, 100);
}

function exitPark(completed) {
  if (completed) {
    var finalScore = Math.floor(parkScore * statB.scoreMult); // INT bonus
    score += finalScore;
    money += Math.floor(finalScore / 2);
    totalParksCompleted++;
    gameLevel = 1 + Math.floor(totalParksCompleted / 4);

    if (wasChampionship) {
      state = 'win';
      gameWon = true;
      if (score > highScore) {
        highScore = score;
        TAS.score.save('720grind_hi', highScore);
      }
      TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.15]], 120);
      clearAllInput();
      return;
    }

    var medal = 0;
    var targets = parkTargets[currentPark];
    if (parkScore >= targets[2]) medal = 3;
    else if (parkScore >= targets[1]) medal = 2;
    else if (parkScore >= targets[0]) medal = 1;
    if (medal > parkMedals[currentPark]) parkMedals[currentPark] = medal;
    if (medal > 0) parkTickets[currentPark] = true;
    TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.15]], 120);
  }
  state = 'parkResult';
  championshipUnlocked = parkTickets.every(function(t) { return t; });
  clearAllInput();
}

function returnToCity() {
  state = 'city';
  cityTimer = 40;
  beeActive = false;
  bees = [];
  clearAllInput();
}

// === CITY UPDATE ===
function updateCity(dt) {
  var inp = TAS.input;
  var spd = PLAYER_SPEED * boards[currentBoard].speed * statB.speed; // DEX bonus
  var ax = 0, ay = 0;

  if (carHitTimer > 0) carHitTimer -= dt;
  if (playerShield > 0) playerShield -= dt;
  if (reactorCoreTimer > 0) {
    reactorCoreTimer -= dt;
    if (reactorCoreTimer <= 0) playerReactorCore = false;
  }

  // Tutorial overlay pauses input
  if (tutorialActive) {
    tutorialTimer += dt;
    if (tutorialTimer > 1 && anyKeyPressed()) {
      tutorialActive = false;
      clearAllInput();
    }
    return;
  }

  if (inp.keys['ArrowLeft'] || inp.keys['KeyA'] || inp.touch.left) ax -= 1;
  if (inp.keys['ArrowRight'] || inp.keys['KeyD'] || inp.touch.right) ax += 1;
  if (inp.keys['ArrowUp'] || inp.keys['KeyW'] || inp.touch.up) ay -= 1;
  if (inp.keys['ArrowDown'] || inp.keys['KeyS'] || inp.touch.down) ay += 1;

  if (ax || ay) {
    var len = Math.sqrt(ax * ax + ay * ay);
    player.vx += (ax / len) * spd * dt * 3;
    player.vy += (ay / len) * spd * dt * 3;
    player.angle = Math.atan2(ay, ax);
    player.pushing = true;
    player.pushFrame += dt * 8;
  } else {
    player.pushing = false;
  }

  player.vx *= FRICTION;
  player.vy *= FRICTION;
  var maxSpd = spd * 1.5;
  var vel = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (vel > maxSpd) { player.vx *= maxSpd / vel; player.vy *= maxSpd / vel; }

  var nx = player.x + player.vx * dt;
  var ny = player.y + player.vy * dt;

  // Building collision
  for (var bi = 0; bi < buildings.length; bi++) {
    var b = buildings[bi];
    if (TAS.hit.rectOverlap(nx - 8, ny - 8, 16, 16, b.x, b.y, b.w, b.h)) {
      nx = player.x; ny = player.y;
      player.vx *= -0.3; player.vy *= -0.3;
      break;
    }
  }

  // Goo trail slowdown
  for (var gi = 0; gi < gooTrails.length; gi++) {
    var g = gooTrails[gi];
    if (TAS.math.dist(nx, ny, g.x, g.y) < g.size) {
      player.vx *= 0.8;
      player.vy *= 0.8;
    }
  }

  player.x = TAS.math.clamp(nx, 10, CITY_W - 10);
  player.y = TAS.math.clamp(ny, 10, CITY_H - 10);

  if (vel > 40 && frame % 3 === 0) {
    TAS.particles.spawn(player.x - Math.cos(player.angle) * 6, player.y - Math.sin(player.angle) * 6, '#aaa', 1, 0.5, { size: 1, sizeVar: 1 });
  }

  if (player.pushing && frame % 20 === 0) {
    TAS.audio.playNoise(0.04, 0.02, 2000);
  }

  // Token collection (INT = scoreMult)
  for (var ti = 0; ti < tokens.length; ti++) {
    var t = tokens[ti];
    if (!t.collected && TAS.math.dist(player.x, player.y, t.x, t.y) < 15) {
      t.collected = true;
      var tokenPts = Math.floor(25 * statB.scoreMult);
      score += tokenPts;
      money += Math.floor(10 * statB.scoreMult);
      spawnScorePopup(t.x, t.y, '+' + tokenPts);
      TAS.audio.playTone(880, 0.06, 'square', 0.06);
      TAS.particles.spawn(t.x, t.y, '#f4b41b', 6, 2, { size: 2 });
    }
  }

  // Spore pickup collection
  for (var si = 0; si < sporePickups.length; si++) {
    var sp = sporePickups[si];
    if (!sp.collected && TAS.math.dist(player.x, player.y, sp.x, sp.y) < 15) {
      sp.collected = true;
      if (sp.type === 'shield') {
        playerShield = 8 * statB.cooldown; // WIS extends duration
        spawnScorePopup(sp.x, sp.y, 'SPORE SHIELD!', '#a855f7');
      } else if (sp.type === 'core') {
        playerReactorCore = true;
        reactorCoreTimer = 10 * statB.cooldown;
        spawnScorePopup(sp.x, sp.y, 'GARDEN CORE!', '#f4b41b');
      } else {
        var extractPts = Math.floor(100 * statB.scoreMult);
        score += extractPts;
        money += 25;
        spawnScorePopup(sp.x, sp.y, 'SPORE GEM +' + extractPts, '#38d973');
      }
      TAS.audio.playMelody([[440,0.06],[660,0.06],[880,0.08]], 100);
      TAS.particles.spawn(sp.x, sp.y, sp.type === 'shield' ? '#a855f7' : '#f4b41b', 10, 2.5, { size: 2 });
    }
  }

  // Reactor bug updates
  for (var rbi = reactorBugs.length - 1; rbi >= 0; rbi--) {
    var rb = reactorBugs[rbi];
    rb.frame++;
    rb.timer -= dt;
    if (rb.timer <= 0) {
      rb.vx = (Math.random() - 0.5) * 80;
      rb.vy = (Math.random() - 0.5) * 80;
      rb.timer = 1 + Math.random() * 2;
    }
    rb.x += rb.vx * dt;
    rb.y += rb.vy * dt;
    rb.x = TAS.math.clamp(rb.x, 20, CITY_W - 20);
    rb.y = TAS.math.clamp(rb.y, 20, CITY_H - 20);

    var distToPlayer = TAS.math.dist(player.x, player.y, rb.x, rb.y);
    // Reactor Core kills bugs on contact (STR bonus)
    if (playerReactorCore && distToPlayer < 20) {
      var bugPts = Math.floor(50 * statB.damage * statB.scoreMult);
      score += bugPts;
      money += 15;
      spawnScorePopup(rb.x, rb.y, '+' + bugPts, '#ff8844');
      spawnDeathParticles(rb.x, rb.y, '#ccaa44', 12);
      TAS.audio.playTone(300, 0.08, 'square', 0.06);
      reactorBugs.splice(rbi, 1);
      continue;
    }
    // Bug damages player
    if (distToPlayer < 12 && carHitTimer <= 0) {
      if (playerShield > 0) {
        playerShield = 0;
        spawnScorePopup(player.x, player.y, 'SHIELD BREAK!', '#ff4444');
        TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06);
        spawnDeathParticles(rb.x, rb.y, '#44ddff', 8);
        reactorBugs.splice(rbi, 1);
        continue;
      }
      var dmg = Math.max(1, 3 - Math.floor(statB.hpMult)); // CON reduces time penalty
      cityTimer -= dmg;
      carHitTimer = 1.0;
      player.vx = -player.vx * 1.5; player.vy = -player.vy * 1.5;
      TAS.fx.shake(6, 0.85);
      TAS.fx.flash('#ccaa00', 0.3);
      triggerShake(4, 8);
      TAS.audio.playTone(150, 0.12, 'sawtooth', 0.08);
      TAS.particles.spawn(player.x, player.y, '#ccaa44', 8, 2);
    }
  }

  // Spore crawler updates
  for (var sci = 0; sci < sporeCrawlers.length; sci++) {
    var sc2 = sporeCrawlers[sci];
    sc2.angle += (Math.random() - 0.5) * 2 * dt;
    sc2.x += Math.cos(sc2.angle) * sc2.speed * dt;
    sc2.y += Math.sin(sc2.angle) * sc2.speed * dt;
    sc2.x = TAS.math.clamp(sc2.x, 30, CITY_W - 30);
    sc2.y = TAS.math.clamp(sc2.y, 30, CITY_H - 30);

    // Leave goo trails
    sc2.gooTimer -= dt;
    if (sc2.gooTimer <= 0) {
      sc2.gooTimer = 0.8;
      gooTrails.push({ x: sc2.x, y: sc2.y, size: 8 + Math.random() * 6, life: 8 });
    }

    // Damage if player gets too close
    if (TAS.math.dist(player.x, player.y, sc2.x, sc2.y) < sc2.size + 8 && carHitTimer <= 0) {
      if (playerShield <= 0) {
        cityTimer -= 4;
        carHitTimer = 1.5;
        player.vx = -player.vx * 2; player.vy = -player.vy * 2;
        TAS.fx.shake(10, 0.8);
        TAS.fx.flash('#88ff88', 0.4);
        triggerShake(6, 10);
        TAS.audio.playNoise(0.3, 0.12, 500);
        TAS.particles.spawn(player.x, player.y, '#88ff88', 12, 3);
      }
    }
  }

  // Goo trail decay
  for (var gi2 = gooTrails.length - 1; gi2 >= 0; gi2--) {
    gooTrails[gi2].life -= dt;
    if (gooTrails[gi2].life <= 0) gooTrails.splice(gi2, 1);
  }

  // Spore rain (weather effect scaled by level)
  sporeRainTimer -= dt;
  if (sporeRainTimer <= 0 && gameLevel >= 2) {
    sporeRainTimer = 0.15;
    sporeRainDrops.push({ x: camX + Math.random() * GW, y: camY - 10, speed: 100 + Math.random() * 60 });
  }
  for (var sri = sporeRainDrops.length - 1; sri >= 0; sri--) {
    sporeRainDrops[sri].y += sporeRainDrops[sri].speed * dt;
    if (sporeRainDrops[sri].y > camY + GH + 20) sporeRainDrops.splice(sri, 1);
  }

  // Car updates
  for (var ci = 0; ci < cars.length; ci++) {
    var c = cars[ci];
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    if (c.x > CITY_W + 60) c.x = -60;
    if (c.x < -60) c.x = CITY_W + 60;
    if (c.y > CITY_H + 60) c.y = -60;
    if (c.y < -60) c.y = CITY_H + 60;
    if (carHitTimer <= 0 && TAS.hit.rectOverlap(player.x - 8, player.y - 8, 16, 16, c.x - c.w / 2, c.y - c.h / 2, c.w, c.h)) {
      if (playerShield > 0) {
        playerShield = 0;
        spawnScorePopup(player.x, player.y, 'SHIELD BREAK!', '#ff4444');
        carHitTimer = 0.5;
      } else {
        cityTimer -= 5;
        carHitTimer = 1.5;
        player.vx = -player.vx * 2; player.vy = -player.vy * 2;
        TAS.fx.shake(8, 0.85);
        TAS.fx.flash('#ff0000', 0.3);
        triggerShake(5, 8);
        TAS.audio.playNoise(0.3, 0.1, 400);
        TAS.particles.spawn(player.x, player.y, '#ff4444', 10, 3);
      }
    }
  }

  // Pedestrian updates
  for (var pi = 0; pi < pedestrians.length; pi++) {
    var p = pedestrians[pi];
    p.timer -= dt;
    if (p.timer <= 0) {
      p.vx = (Math.random() - 0.5) * 40;
      p.vy = (Math.random() - 0.5) * 40;
      p.timer = 2 + Math.random() * 3;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.x = TAS.math.clamp(p.x, 20, CITY_W - 20);
    p.y = TAS.math.clamp(p.y, 20, CITY_H - 20);
  }

  // Timer & bees
  cityTimer -= dt;
  if (cityTimer <= 10 && !beeActive) {
    beeActive = true;
    for (var i = 0; i < 3; i++) {
      bees.push({ x: Math.random() > 0.5 ? 0 : CITY_W, y: Math.random() * CITY_H, speed: 50 + i * 20 });
    }
    TAS.audio.playTone(200, 0.3, 'sawtooth', 0.06);
  }

  if (beeActive) {
    for (var bi2 = 0; bi2 < bees.length; bi2++) {
      var bee = bees[bi2];
      var ang = TAS.math.angle(bee.x, bee.y, player.x, player.y);
      bee.x += Math.cos(ang) * bee.speed * dt;
      bee.y += Math.sin(ang) * bee.speed * dt;
      bee.speed += dt * 8;
      if (TAS.math.dist(bee.x, bee.y, player.x, player.y) < 12) {
        if (playerShield > 0) {
          playerShield = 0;
          spawnScorePopup(player.x, player.y, 'SHIELD BREAK!', '#ff4444');
          bees.splice(bi2, 1);
          break;
        }
        lives--;
        TAS.fx.shake(12, 0.8);
        TAS.fx.flash('#ffff00', 0.5);
        triggerShake(8, 12);
        TAS.audio.playNoise(0.4, 0.15, 800);
        spawnDeathParticles(player.x, player.y, '#ffcc00', 15);
        if (lives <= 0) { gameOver(); return; }
        cityTimer = 40;
        beeActive = false;
        bees = [];
        break;
      }
    }
  }

  if (cityTimer <= 0) {
    lives--;
    TAS.fx.flash('#ff0000', 0.5);
    if (lives <= 0) { gameOver(); return; }
    cityTimer = 40;
    beeActive = false;
    bees = [];
  }

  // Park entry
  for (var i = 0; i < parks.length; i++) {
    var pk = parks[i];
    if (TAS.math.dist(player.x, player.y, pk.x, pk.y) < 30) {
      if (inp.keys['KeyE'] || inp.keys['Enter'] || inp.keys['KeyZ'] || inp.touch.a) {
        inp.keys['KeyE'] = false;
        inp.keys['Enter'] = false;
        inp.keys['KeyZ'] = false;
        inp.touch.a = false;
        enterPark(i);
        return;
      }
    }
  }

  // Shop
  for (var si2 = 0; si2 < shops.length; si2++) {
    var s2 = shops[si2];
    if (TAS.hit.rectOverlap(player.x - 8, player.y - 8, 16, 16, s2.x, s2.y, s2.w, s2.h)) {
      if (inp.keys['KeyE'] || inp.keys['Enter'] || inp.keys['KeyZ'] || inp.touch.a) {
        inp.keys['KeyE'] = false;
        inp.keys['Enter'] = false;
        inp.keys['KeyZ'] = false;
        inp.touch.a = false;
        shopOpen = true;
        state = 'shop';
        return;
      }
    }
  }

  // Championship entrance
  if (championshipUnlocked && TAS.math.dist(player.x, player.y, 600, 450) < 30) {
    if (inp.keys['KeyE'] || inp.keys['Enter'] || inp.keys['KeyZ'] || inp.touch.a) {
      inp.keys['KeyE'] = false;
      inp.keys['Enter'] = false;
      inp.keys['KeyZ'] = false;
      inp.touch.a = false;
      state = 'championship';
      wasChampionship = true;
      initPark(PARK_HALFPIPE);
      parkTimer = 60;
    }
  }

  // Camera
  camX = TAS.math.lerp(camX, player.x - GW / 2, dt * 4);
  camY = TAS.math.lerp(camY, player.y - GH / 2, dt * 4);
  camX = TAS.math.clamp(camX, 0, CITY_W - GW);
  camY = TAS.math.clamp(camY, 0, CITY_H - GH);

  updateScorePopups(dt);
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!bossActive || !boss) return;

  boss.timer += dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  // Move boss based on pattern
  if (boss.pattern === 'circle') {
    boss.x = GW / 2 + Math.cos(boss.timer * 1.5) * 150;
    boss.y = 70 + Math.sin(boss.timer * 2) * 30;
  } else if (boss.pattern === 'spread') {
    boss.x = GW / 2 + Math.sin(boss.timer * 0.8) * 180;
    boss.y = 60 + Math.sin(boss.timer * 1.2) * 20;
  } else if (boss.pattern === 'chase') {
    var dx = parkPlayer.x - boss.x;
    var dy = (parkPlayer.airborne ? 130 : parkPlayer.y) - boss.y;
    var dist = Math.sqrt(dx * dx + dy * dy) || 1;
    boss.x += (dx / dist) * boss.speed * dt;
    boss.y = TAS.math.clamp(boss.y + (dy / dist) * boss.speed * 0.5 * dt, 50, 120);
  } else if (boss.pattern === 'rain') {
    boss.x = GW / 2 + Math.sin(boss.timer * 0.5) * 200;
    boss.y = 55;
  } else if (boss.pattern === 'teleport') {
    boss.teleportTimer -= dt;
    if (boss.teleportTimer <= 0) {
      boss.teleportTimer = 1.5;
      boss.x = 60 + Math.random() * (GW - 120);
      boss.y = 50 + Math.random() * 60;
      spawnDeathParticles(boss.x, boss.y, boss.color, 8);
    }
  }

  // Fire projectiles
  var fireRate = 1.5 - (boss.maxHp - boss.hp) * 0.08;
  if (boss.timer % fireRate < dt) {
    if (boss.pattern === 'spread') {
      for (var i = -2; i <= 2; i++) {
        boss.projectiles.push({ x: boss.x, y: boss.y + 20, vx: i * 40, vy: 80 + Math.random() * 40, life: 3 });
      }
    } else if (boss.pattern === 'rain') {
      for (var i = 0; i < 3; i++) {
        boss.projectiles.push({ x: boss.x - 30 + Math.random() * 60, y: boss.y + 20, vx: (Math.random() - 0.5) * 20, vy: 60 + Math.random() * 40, life: 3 });
      }
    } else {
      var aimAngle = Math.atan2((parkPlayer.airborne ? 130 : parkPlayer.y) - boss.y, parkPlayer.x - boss.x);
      boss.projectiles.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(aimAngle) * 100, vy: Math.sin(aimAngle) * 100, life: 3 });
    }
    TAS.audio.playTone(200, 0.06, 'sawtooth', 0.04);
  }

  // Update projectiles
  for (var pi2 = boss.projectiles.length - 1; pi2 >= 0; pi2--) {
    var proj = boss.projectiles[pi2];
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;
    proj.life -= dt;
    if (proj.life <= 0 || proj.x < -20 || proj.x > GW + 20 || proj.y > GH + 20) {
      boss.projectiles.splice(pi2, 1);
      continue;
    }
    // Hit player
    var py = parkPlayer.airborne ? (130 - Math.max(0, parkPlayer.height) * 0.5) : parkPlayer.y;
    if (TAS.math.dist(proj.x, proj.y, parkPlayer.x, py) < 14) {
      boss.projectiles.splice(pi2, 1);
      crashPark();
    }
  }

  // Player can damage boss by doing tricks near it (airborne trick completion)
  if (parkPlayer.airborne && trickDisplayTimer > 0.9 && trickDisplay.indexOf('WIPEOUT') < 0) {
    var bossDistToPlayer = TAS.math.dist(boss.x, boss.y, parkPlayer.x, 130 - Math.max(0, parkPlayer.height) * 0.5);
    if (bossDistToPlayer < 60 && boss.flashTimer <= 0) {
      boss.hp -= Math.ceil(statB.damage); // STR bonus
      boss.flashTimer = 0.3;
      triggerShake(6, 8);
      spawnDeathParticles(boss.x, boss.y, boss.projectileColor, 10);
      var bossPts = Math.floor(200 * statB.scoreMult);
      parkScore += bossPts;
      spawnScorePopup(boss.x, boss.y, 'BOSS HIT +' + bossPts, '#ff4444');
      TAS.audio.playTone(100, 0.15, 'square', 0.08);
      if (boss.hp <= 0) {
        // Boss defeated
        var defeatPts = Math.floor(1000 * statB.scoreMult * statB.damage);
        parkScore += defeatPts;
        spawnScorePopup(boss.x, boss.y, 'DEFEATED +' + defeatPts, '#ffd700');
        spawnDeathParticles(boss.x, boss.y, boss.color, 30);
        spawnDeathParticles(boss.x, boss.y, '#ffd700', 20);
        TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.15]], 100);
        triggerShake(10, 15);
        bossActive = false;
        boss = null;
      }
    }
  }
}

// === HALFPIPE UPDATE ===
function updateHalfpipe(dt) {
  var inp = TAS.input;
  var airMod = boards[currentBoard].air;
  var spinMod = boards[currentBoard].spin;

  // Update spore vents
  for (var vi = 0; vi < parkSporeVents.length; vi++) {
    var v = parkSporeVents[vi];
    if (!v.active) {
      v.timer -= dt;
      if (v.timer <= 0) { v.active = true; v.activeTimer = 1.5; }
    } else {
      v.activeTimer -= dt;
      if (v.activeTimer <= 0) { v.active = false; v.timer = 2 + Math.random() * 3; }
      // Damage player if near vent
      if (!parkPlayer.airborne && Math.abs(parkPlayer.x - v.x) < 25 && Math.abs(parkPlayer.y - v.y) < 30) {
        crashPark();
      }
    }
  }

  if (bossActive) updateBoss(dt);

  if (!parkPlayer.airborne) {
    if (inp.keys['ArrowLeft'] || inp.touch.left) halfpipeVel -= 6 * dt;
    if (inp.keys['ArrowRight'] || inp.touch.right) halfpipeVel += 6 * dt;
    halfpipeVel *= 0.995;
    halfpipePos += halfpipeVel * dt;

    var distFromCenter = (halfpipePos - 0.5) * 2;
    halfpipeHeight = distFromCenter * distFromCenter * 120;

    if ((halfpipePos <= 0.05 || halfpipePos >= 0.95) && Math.abs(halfpipeVel) > 1.5) {
      parkPlayer.airborne = true;
      parkPlayer.airTime = 0;
      parkPlayer.height = 0;
      parkPlayer.vy = Math.abs(halfpipeVel) * 40 * airMod;
      parkPlayer.rotation = 0;
      trickQueue = [];
      TAS.audio.playTone(300, 0.1, 'triangle', 0.06, 600);
    }

    halfpipePos = TAS.math.clamp(halfpipePos, 0, 1);
    parkPlayer.x = 60 + halfpipePos * (GW - 120);
    parkPlayer.y = 240 - halfpipeHeight * 0.3;
  } else {
    parkPlayer.airTime += dt;
    parkPlayer.vy -= 400 * dt;
    parkPlayer.height += parkPlayer.vy * dt;

    if (inp.keys['ArrowLeft'] || inp.touch.left) { trickQueue.push('left'); inp.keys['ArrowLeft'] = false; }
    if (inp.keys['ArrowRight'] || inp.touch.right) { trickQueue.push('right'); inp.keys['ArrowRight'] = false; }
    if (inp.keys['ArrowUp'] || inp.touch.up) { trickQueue.push('up'); inp.keys['ArrowUp'] = false; }
    if (inp.keys['ArrowDown'] || inp.touch.down) { trickQueue.push('down'); inp.keys['ArrowDown'] = false; }

    if (trickQueue.length > 0) {
      parkPlayer.rotation += spinMod * 8 * dt;
    }

    if ((inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.b) && trickQueue.length > 0) {
      matchTrick();
      inp.keys['KeyZ'] = false; inp.keys['Space'] = false;
    }

    if (parkPlayer.height <= 0 && parkPlayer.vy < 0) {
      parkPlayer.airborne = false;
      parkPlayer.height = 0;
      var rotNorm = (parkPlayer.rotation % PI2 + PI2) % PI2;
      if (rotNorm > 0.5 && rotNorm < PI2 - 0.5) {
        crashPark();
      } else {
        if (comboCount > 0) {
          var bonus = Math.floor(comboCount * comboMultiplier * 50 * statB.scoreMult);
          parkScore += bonus;
          trickDisplay = 'COMBO x' + comboMultiplier.toFixed(1) + '! +' + bonus;
          trickDisplayTimer = 1.5;
          spawnScorePopup(parkPlayer.x, 130, '+' + bonus, '#a855f7');
          TAS.audio.playMelody([[523,0.08],[659,0.08],[784,0.1]], 80);
          TAS.particles.spawn(parkPlayer.x, parkPlayer.y, '#f4b41b', 12, 3, { size: 2 });
        }
        comboCount = 0;
        comboMultiplier = 1;
        landingTimer = 0.2;
        TAS.audio.playTone(200, 0.05, 'triangle', 0.05);
      }
      parkPlayer.rotation = 0;
      halfpipePos = parkPlayer.x < GW / 2 ? 0.1 : 0.9;
      halfpipeVel = parkPlayer.x < GW / 2 ? 1.5 : -1.5;
    }

    parkPlayer.x = 60 + halfpipePos * (GW - 120);
    parkPlayer.y = 130 - Math.max(0, parkPlayer.height) * 0.5;
  }
}

// === DOWNHILL UPDATE ===
function updateDownhill(dt) {
  var inp = TAS.input;
  var spdMod = boards[currentBoard].speed * statB.speed; // DEX bonus

  downhillScroll += 200 * spdMod * dt;
  parkPlayer.x = 100;

  if (inp.keys['ArrowUp'] || inp.touch.up) parkPlayer.y -= 120 * statB.speed * dt;
  if (inp.keys['ArrowDown'] || inp.touch.down) parkPlayer.y += 120 * statB.speed * dt;
  parkPlayer.y = TAS.math.clamp(parkPlayer.y, 140, 280);

  // Goo patch slowdown
  for (var gpi = 0; gpi < parkGooPatches.length; gpi++) {
    var gp = parkGooPatches[gpi];
    var gpx = gp.x - downhillScroll;
    if (gpx > -gp.w && gpx < GW && !parkPlayer.airborne) {
      if (TAS.hit.rectOverlap(parkPlayer.x - 8, parkPlayer.y - 8, 16, 16, gpx, gp.y, gp.w, 20)) {
        downhillScroll -= 200 * spdMod * dt * 0.4; // slow down
      }
    }
  }

  // Jump
  if ((inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.a) && !parkPlayer.airborne) {
    parkPlayer.airborne = true;
    parkPlayer.vy = 200 * boards[currentBoard].air;
    parkPlayer.height = 0;
    parkPlayer.airTime = 0;
    trickQueue = [];
    TAS.audio.playTone(400, 0.08, 'triangle', 0.05, 800);
  }

  if (parkPlayer.airborne) {
    parkPlayer.airTime += dt;
    parkPlayer.vy -= 500 * dt;
    parkPlayer.height += parkPlayer.vy * dt;
    if (parkPlayer.height <= 0) {
      parkPlayer.airborne = false;
      parkPlayer.height = 0;
      parkPlayer.vy = 0;
      landingTimer = 0.1;
      TAS.audio.playTone(150, 0.04, 'triangle', 0.04);
    }
    if (inp.touch.b || inp.keys['KeyX']) {
      if (inp.keys['ArrowLeft'] || inp.touch.left) trickQueue.push('left');
      if (inp.keys['ArrowRight'] || inp.touch.right) trickQueue.push('right');
      if (inp.keys['ArrowUp'] || inp.touch.up) trickQueue.push('up');
      if (inp.keys['ArrowDown'] || inp.touch.down) trickQueue.push('down');
      matchTrick();
    }
  }

  // Grinding (STR bonus to grind score)
  parkPlayer.grinding = false;
  for (var ri = 0; ri < parkRails.length; ri++) {
    var r = parkRails[ri];
    var rx = r.x - downhillScroll;
    if (rx > -r.w && rx < GW) {
      if (!parkPlayer.airborne && Math.abs(parkPlayer.y - r.y) < 12 && parkPlayer.x > rx && parkPlayer.x < rx + r.w) {
        parkPlayer.grinding = true;
        parkPlayer.y = r.y;
        var grindPts = Math.floor(30 * statB.damage * dt);
        parkScore += grindPts;
        if (frame % 4 === 0) TAS.particles.spawn(parkPlayer.x, parkPlayer.y + 8, '#ffaa00', 2, 1.5, { size: 1, gravity: 1 });
        if (frame % 10 === 0) TAS.audio.playTone(1200 + Math.random() * 400, 0.03, 'sawtooth', 0.02);
      }
    }
  }

  // Mycelial worms
  for (var wi = 0; wi < parkMycelialWorms.length; wi++) {
    var w = parkMycelialWorms[wi];
    var wx = w.x - downhillScroll;
    if (wx > -40 && wx < GW + 40) {
      w.timer -= dt;
      if (w.timer <= 0 && !w.emerging) {
        w.emerging = true;
        w.height = 0;
      }
      if (w.emerging) {
        w.height = Math.min(w.height + 60 * dt, 40);
        if (w.height >= 40) {
          w.timer = 2;
          w.emerging = false;
          w.height = 0;
        }
        // Collision with worm
        if (!parkPlayer.airborne && Math.abs(parkPlayer.x - wx) < 15 && Math.abs(parkPlayer.y - w.y) < 20) {
          crashPark();
          w.emerging = false;
          w.height = 0;
          w.timer = 3;
        }
      }
    }
  }

  // Fungal pickups (CHA = luck bonus for better drops)
  for (var fi = 0; fi < parkFungalPickups.length; fi++) {
    var fp = parkFungalPickups[fi];
    if (fp.collected) continue;
    var fpx = fp.x - downhillScroll;
    if (fpx > -20 && fpx < GW + 20) {
      if (TAS.math.dist(parkPlayer.x, parkPlayer.y - parkPlayer.height, fpx, fp.y) < 16) {
        fp.collected = true;
        var pickupPts = Math.floor((fp.type === 'extract' ? 75 : 100) * statB.scoreMult * statB.luck);
        parkScore += pickupPts;
        spawnScorePopup(fpx, fp.y, '+' + pickupPts, '#88ff88');
        TAS.audio.playMelody([[550,0.05],[770,0.05]], 90);
        TAS.particles.spawn(fpx, fp.y, '#88ff88', 8, 2.5);
      }
    }
  }

  // Obstacles
  for (var oi = 0; oi < parkObstacles.length; oi++) {
    var o = parkObstacles[oi];
    var ox = o.x - downhillScroll;
    if (ox > -40 && ox < GW + 40) {
      if (!parkPlayer.airborne && TAS.hit.rectOverlap(parkPlayer.x - 8, parkPlayer.y - 8, 16, 16, ox, o.y, o.w, o.h)) {
        crashPark();
        o.x = -999;
      }
    }
  }

  // Tokens (INT = scoreMult)
  for (var ti = 0; ti < parkTokens.length; ti++) {
    var t = parkTokens[ti];
    if (t.collected) continue;
    var tx = t.x - downhillScroll;
    if (tx > -20 && tx < GW + 20) {
      if (TAS.math.dist(parkPlayer.x, parkPlayer.y - parkPlayer.height, tx, t.y) < 16) {
        t.collected = true;
        var tkPts = Math.floor(50 * statB.scoreMult);
        parkScore += tkPts;
        spawnScorePopup(tx, t.y, '+' + tkPts);
        TAS.audio.playTone(880, 0.05, 'square', 0.05);
        TAS.particles.spawn(tx, t.y, '#ffdd44', 5, 2);
      }
    }
  }

  if (downhillScroll > 3200) {
    exitPark(true);
  }
}

// === SLALOM UPDATE ===
function updateSlalom(dt) {
  var inp = TAS.input;
  var spdMod = boards[currentBoard].speed * statB.speed; // DEX bonus

  parkPlayer.x += 150 * spdMod * dt;
  if (inp.keys['ArrowUp'] || inp.touch.up) parkPlayer.y -= 160 * statB.speed * dt;
  if (inp.keys['ArrowDown'] || inp.touch.down) parkPlayer.y += 160 * statB.speed * dt;
  parkPlayer.y = TAS.math.clamp(parkPlayer.y, 120, 280);

  // Spore vent hazards
  for (var vi = 0; vi < parkSporeVents.length; vi++) {
    var v = parkSporeVents[vi];
    if (!v.active) {
      v.timer -= dt;
      if (v.timer <= 0) { v.active = true; v.activeTimer = 1.2; }
    } else {
      v.activeTimer -= dt;
      if (v.activeTimer <= 0) { v.active = false; v.timer = 1.5 + Math.random() * 2; }
      var scrollX2 = Math.max(0, parkPlayer.x - 100);
      var vx = v.x - scrollX2;
      if (Math.abs(parkPlayer.x - scrollX2 - vx) < 20 && Math.abs(parkPlayer.y - v.y) < 25) {
        parkPlayer.x -= 30;
        parkScore -= 25;
        spawnScorePopup(vx, v.y, '-25', '#ff4444');
      }
    }
  }

  // Gates (INT = scoreMult)
  for (var i = 0; i < parkGates.length; i++) {
    var g = parkGates[i];
    if (g.passed) continue;
    if (parkPlayer.x > g.x) {
      var inGate = Math.abs(parkPlayer.y - g.y) < 25;
      if (inGate) {
        g.passed = true;
        var gatePts = Math.floor((100 + (i === gateIndex ? 50 : 0)) * statB.scoreMult);
        parkScore += gatePts;
        gateIndex = i + 1;
        spawnScorePopup(g.x - Math.max(0, parkPlayer.x - 100), g.y, '+' + gatePts, '#44ff44');
        TAS.audio.playTone(660, 0.06, 'square', 0.05);
        TAS.particles.spawn(g.x - Math.max(0, parkPlayer.x - 100), g.y, '#44ff44', 6, 2);
      } else {
        g.passed = true;
        parkScore -= 50;
        spawnScorePopup(g.x - Math.max(0, parkPlayer.x - 100), g.y, '-50', '#ff4444');
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.06);
      }
    }
  }

  if (parkPlayer.x > 1400) {
    exitPark(true);
  }
}

// === JUMP RAMP UPDATE ===
function updateJumpRamp(dt) {
  var inp = TAS.input;
  var airMod = boards[currentBoard].air;
  var spinMod = boards[currentBoard].spin;

  if (bossActive) updateBoss(dt);

  if (!rampLaunched) {
    if (inp.keys['ArrowRight'] || inp.touch.right) {
      rampSpeed += 200 * statB.speed * dt; // DEX bonus
    }
    rampSpeed *= 0.99;
    rampSpeed = Math.min(rampSpeed, 300);
    parkPlayer.x += rampSpeed * dt;

    if (rampSpeed > 100 && frame % 2 === 0) {
      TAS.particles.spawn(parkPlayer.x - 10, parkPlayer.y + Math.random() * 10 - 5, '#88ccff', 1, rampSpeed * 0.01, { size: 1, shape: 'rect' });
    }

    if (rampSpeed > 50 && frame % 15 === 0) {
      TAS.audio.playNoise(0.03, 0.01 + rampSpeed * 0.0001, 3000);
    }

    if (parkPlayer.x >= 300) {
      rampLaunched = true;
      parkPlayer.airborne = true;
      parkPlayer.vy = rampSpeed * 0.8 * airMod;
      parkPlayer.vx = rampSpeed * 0.4;
      parkPlayer.height = 0;
      parkPlayer.airTime = 0;
      parkPlayer.rotation = 0;
      trickQueue = [];
      TAS.audio.playTone(250, 0.15, 'triangle', 0.06, 800);
    }
  } else if (parkPlayer.airborne) {
    parkPlayer.airTime += dt;
    parkPlayer.vy -= 300 * dt;
    parkPlayer.x += parkPlayer.vx * dt;
    parkPlayer.height += parkPlayer.vy * dt;

    if (inp.keys['ArrowLeft'] || inp.touch.left) { trickQueue.push('left'); inp.keys['ArrowLeft'] = false; }
    if (inp.keys['ArrowRight'] || inp.touch.right) { trickQueue.push('right'); inp.keys['ArrowRight'] = false; }
    if (inp.keys['ArrowUp'] || inp.touch.up) { trickQueue.push('up'); inp.keys['ArrowUp'] = false; }
    if (inp.keys['ArrowDown'] || inp.touch.down) { trickQueue.push('down'); inp.keys['ArrowDown'] = false; }

    if (trickQueue.length > 0) parkPlayer.rotation += spinMod * 8 * dt;

    if ((inp.keys['KeyZ'] || inp.keys['Space'] || inp.touch.b) && trickQueue.length > 0) {
      matchTrick();
      inp.keys['KeyZ'] = false; inp.keys['Space'] = false;
    }

    if (parkPlayer.height <= 0 && parkPlayer.vy < 0) {
      parkPlayer.airborne = false;
      parkPlayer.height = 0;
      var rotNorm = (parkPlayer.rotation % PI2 + PI2) % PI2;
      if (rotNorm > 0.5 && rotNorm < PI2 - 0.5) {
        crashPark();
      } else {
        if (comboCount > 0) {
          var bonus = Math.floor(comboCount * comboMultiplier * 50 * statB.scoreMult);
          parkScore += bonus;
          trickDisplay = 'LANDED! +' + bonus;
          trickDisplayTimer = 1.5;
          spawnScorePopup(parkPlayer.x, 170, '+' + bonus, '#f4b41b');
          TAS.audio.playMelody([[523,0.08],[659,0.08],[784,0.1],[1047,0.12]], 80);
          TAS.particles.spawn(parkPlayer.x, 240, '#f4b41b', 20, 4, { size: 3 });
        }
        comboCount = 0;
        comboMultiplier = 1;
        TAS.audio.playTone(200, 0.06, 'triangle', 0.05);
      }
      parkPlayer.rotation = 0;
      setTimeout(function() {
        if (state === 'park' || state === 'championship') {
          parkPlayer.x = 60;
          rampSpeed = 0;
          rampLaunched = false;
          parkPlayer.airborne = false;
        }
      }, 500);
    }
  }
}

// === TRICK MATCHING (STR = damage multiplier on score, CHA = luck for bonus) ===
function matchTrick() {
  if (trickQueue.length < 2) return;
  var matched = null;
  for (var ti = 0; ti < TRICKS.length; ti++) {
    var t = TRICKS[ti];
    if (trickQueue.length >= t.keys.length && parkPlayer.airTime >= t.minAir) {
      var match = true;
      var start = trickQueue.length - t.keys.length;
      for (var i = 0; i < t.keys.length; i++) {
        if (trickQueue[start + i] !== t.keys[i]) { match = false; break; }
      }
      if (match && (!matched || t.score > matched.score)) matched = t;
    }
  }
  if (matched) {
    // CHA luck: chance for 2x bonus
    var luckBonus = (Math.random() < (statB.luck - 1) * 0.3) ? 2 : 1;
    var pts = Math.floor(matched.score * comboMultiplier * statB.damage * luckBonus); // STR bonus
    parkScore += pts;
    comboCount++;
    comboMultiplier = Math.min(comboMultiplier + 0.5, 5);
    trickDisplay = matched.name + '! +' + pts;
    if (luckBonus > 1) trickDisplay += ' LUCKY!';
    trickDisplayTimer = 1.2;
    trickQueue = [];
    spawnScorePopup(parkPlayer.x, parkPlayer.y - 30, '+' + pts, luckBonus > 1 ? '#f4b41b' : '#a855f7');
    TAS.audio.playTone(600 + comboCount * 100, 0.1, 'square', 0.07);
    TAS.particles.spawn(parkPlayer.x, parkPlayer.y - 20, '#a855f7', 8, 2.5, { size: 2 });
    TAS.fx.flash('#ffffff', 0.15);
  }
}

// === CRASH ===
function crashPark() {
  parkCrashes++;
  comboCount = 0;
  comboMultiplier = 1;
  trickDisplay = 'WIPEOUT!';
  trickDisplayTimer = 1.0;
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#ff4400', 0.4);
  triggerShake(8, 12);
  TAS.audio.playNoise(0.3, 0.12, 300);
  spawnDeathParticles(parkPlayer.x, parkPlayer.y, '#ff4444', 15);
  TAS.particles.spawn(parkPlayer.x, parkPlayer.y, '#ff4444', 15, 3, { size: 2, gravity: 2 });
  parkPlayer.rotation = 0;
  parkPlayer.airborne = false;
  parkPlayer.height = 0;
  if (parkCrashes >= 3) {
    exitPark(true);
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('720grind_hi', highScore);
  }
  clearAllInput();
}

// === UPDATE ===
function update(dt) {
  frame++;
  if (inputCooldown > 0) inputCooldown -= dt;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateDeathParticles(dt);
  if (trickDisplayTimer > 0) trickDisplayTimer -= dt;
  if (landingTimer > 0) landingTimer -= dt;

  if (state === 'splash') {
    splashTimer -= dt;
    if (splashTimer <= 0) {
      state = 'title';
      splashDone = true;
      clearAllInput();
    }
    return;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; clearAllInput(); });
      return;
    }
    if (anyKeyPressed()) { startGame(); }
    return;
  }
  if (state === 'gameOver') {
    if (anyKeyPressed()) { state = 'title'; clearAllInput(); }
    return;
  }
  if (state === 'city') {
    updateCity(dt);
    return;
  }
  if (state === 'shop') {
    updateShop(dt);
    return;
  }
  if (state === 'parkResult') {
    if (anyKeyPressed()) { returnToCity(); }
    return;
  }
  if (state === 'park' || state === 'championship') {
    parkTimer -= dt;
    if (parkTimer <= 0) { exitPark(true); return; }
    var type = state === 'championship' ? PARK_HALFPIPE : parkTypes[currentPark];
    if (type === PARK_HALFPIPE) updateHalfpipe(dt);
    else if (type === PARK_DOWNHILL) updateDownhill(dt);
    else if (type === PARK_SLALOM) updateSlalom(dt);
    else if (type === PARK_JUMP) updateJumpRamp(dt);
    updateScorePopups(dt);
    return;
  }
  if (state === 'win') {
    if (anyKeyPressed()) { state = 'title'; clearAllInput(); }
    return;
  }
}

// === SHOP UPDATE ===
function updateShop(dt) {
  var inp = TAS.input;
  if (inp.keys['Escape'] || inp.keys['Backspace'] || inp.touch.b) {
    state = 'city';
    inp.keys['Escape'] = false;
    inp.keys['Backspace'] = false;
    inp.touch.b = false;
    clearAllInput();
    return;
  }
  for (var i = 0; i < boards.length; i++) {
    var key = 'Digit' + (i + 1);
    if (inp.keys[key]) {
      inp.keys[key] = false;
      if (i === currentBoard) continue;
      if (boardsOwned[i]) {
        currentBoard = i;
        TAS.audio.playTone(440, 0.06, 'square', 0.05);
      } else if (boards[i].cost <= money) {
        money -= boards[i].cost;
        boardsOwned[i] = true;
        currentBoard = i;
        TAS.audio.playMelody([[440,0.08],[550,0.08],[660,0.1]], 100);
        TAS.fx.flash('#44dd88', 0.2);
      } else {
        TAS.audio.playTone(100, 0.2, 'sawtooth', 0.06);
      }
    }
  }
  if (inp.touch.a) {
    inp.touch.a = false;
    var nextIdx = (currentBoard + 1) % boards.length;
    if (boardsOwned[nextIdx]) {
      currentBoard = nextIdx;
      TAS.audio.playTone(440, 0.06, 'square', 0.05);
    } else if (boards[nextIdx].cost <= money) {
      money -= boards[nextIdx].cost;
      boardsOwned[nextIdx] = true;
      currentBoard = nextIdx;
      TAS.audio.playMelody([[440,0.08],[550,0.08],[660,0.1]], 100);
    } else {
      TAS.audio.playTone(100, 0.15, 'sawtooth', 0.05);
    }
  }
}

// === DRAW ===
function draw(dt) {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'splash') { drawSplash(); return; }
  if (state === 'title') { drawTitle(); return; }
  if (state === 'gameOver') { drawGameOverCustom(); return; }
  if (state === 'city') { drawCity(); return; }
  if (state === 'shop') { drawShop(); return; }
  if (state === 'parkResult') { drawParkResult(); return; }
  if (state === 'park' || state === 'championship') { drawPark(); return; }
  if (state === 'win') { drawWin(); return; }
}

// === DRAW MfT SPLASH ===
function drawSplash() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, GW, GH);

  var progress = 1 - (splashTimer / 2);
  var alpha = progress < 0.3 ? progress / 0.3 : progress > 0.7 ? (1 - progress) / 0.3 : 1;
  ctx.globalAlpha = TAS.math.clamp(alpha, 0, 1);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('MfT', GW / 2, GH / 2 - 10);

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Memes for Trees', GW / 2, GH / 2 + 15);

  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('tasern.quest', GW / 2, GH / 2 + 35);

  ctx.globalAlpha = 1;
}

    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _sx = GW / 2 - 110;

    for (var _i = 0; _i < _keys.length; _i++) {

      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, 100);

      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 103, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // NES-style control instructions with dotted leaders
  var ctrlY = GH - 90;
  ctx.fillStyle = '#999';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  var ctrlX = GW / 2 - 100;
  ctx.fillText('ARROWS ........... Move', ctrlX, ctrlY);
  ctx.fillText('Z ................ Action', ctrlX, ctrlY + 14);
  ctx.fillText('X ................ Jump', ctrlX, ctrlY + 28);
  ctx.fillText('E ................ Enter', ctrlX, ctrlY + 42);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Combos: Direction keys in air, then TRICK!', GW / 2, GH - 34);

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO GRIND', GW / 2, GH - 22);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 6);
}

// === DRAW BASELING SKATER ===
// The selected baseling rides the skateboard (focal entity). The deck is always drawn;
// the rider is the chosen baseling sprite, falling back to the procedural mushroom so the
// game stays playable with no wallet (Wimmple).
function drawBaselingSkater(x, y, sc, rot) {
  ctx.save();
  ctx.translate(x, y);
  var s = sc || 1;
  var baseColor = statB.color || '#66cc88';

  // Rider: try the selected baseling sprite first (centered on the deck, ~36px * sc).
  var _anim = (player && player.pushing) ? 'walk' : 'idle';
  var rode = TAS.drawBaseling(ctx, 0, -6 * s, 36 * s, { anim: _anim, frame: frame, flipX: false });
  if (!rode) {
  // Mushroom cap (top)
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.ellipse(0, -16 * s, 11 * s, 7 * s, 0, PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(-4 * s, -18 * s, 2 * s, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(3 * s, -19 * s, 1.5 * s, 0, PI2); ctx.fill();

  // Body (stem - round blob)
  ctx.fillStyle = '#eeddcc';
  ctx.beginPath();
  ctx.ellipse(0, -6 * s, 8 * s, 10 * s, 0, 0, PI2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3 * s, -9 * s, 3 * s, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(3 * s, -9 * s, 3 * s, 0, PI2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-2.5 * s, -8.5 * s, 1.5 * s, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5 * s, -8.5 * s, 1.5 * s, 0, PI2); ctx.fill();

  // Mouth (happy)
  ctx.strokeStyle = '#333';
  ctx.lineWidth = s * 0.8;
  ctx.beginPath();
  ctx.arc(0, -5 * s, 3 * s, 0.2, PI - 0.2);
  ctx.stroke();

  // Tiny arms
  ctx.strokeStyle = '#ddc';
  ctx.lineWidth = s * 1.5;
  ctx.beginPath(); ctx.moveTo(-7 * s, -4 * s); ctx.lineTo(-10 * s, 0 * s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(7 * s, -4 * s); ctx.lineTo(10 * s, 0 * s); ctx.stroke();
  }

  // Skateboard
  ctx.save();
  ctx.rotate(Math.sin(rot) * 0.1);
  ctx.fillStyle = '#8B4513';
  // Board deck (rounded shape)
  ctx.beginPath();
  ctx.moveTo(-12 * s, 6 * s);
  ctx.quadraticCurveTo(-14 * s, 5 * s, -13 * s, 4 * s);
  ctx.lineTo(13 * s, 4 * s);
  ctx.quadraticCurveTo(14 * s, 5 * s, 12 * s, 6 * s);
  ctx.lineTo(12 * s, 8 * s);
  ctx.lineTo(-12 * s, 8 * s);
  ctx.fill();
  // Board stripe
  ctx.fillStyle = baseColor;
  ctx.fillRect(-8 * s, 5 * s, 16 * s, 2 * s);
  // Wheels
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-8 * s, 10 * s, 2.5 * s, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(8 * s, 10 * s, 2.5 * s, 0, PI2); ctx.fill();
  // Wheel highlights
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.arc(-8 * s, 9.5 * s, 1 * s, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(8 * s, 9.5 * s, 1 * s, 0, PI2); ctx.fill();
  ctx.restore();

  ctx.restore();
}

// === DRAW REACTOR BUG ===
function drawReactorBug(x, y, f) {
  ctx.save();
  ctx.translate(x, y);
  // Body
  ctx.fillStyle = '#ccaa44';
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 5, 0, 0, PI2);
  ctx.fill();
  // Shell segments
  ctx.strokeStyle = '#aa8833';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(-2, 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, -5); ctx.lineTo(2, 5); ctx.stroke();
  // Eyes (glowing)
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(-3, -3, 1.5, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -3, 1.5, 0, PI2); ctx.fill();
  // Legs
  ctx.strokeStyle = '#886622';
  ctx.lineWidth = 0.8;
  for (var i = -2; i <= 2; i++) {
    var legY = i * 2.5;
    var legWiggle = Math.sin(f * 0.15 + i) * 2;
    ctx.beginPath(); ctx.moveTo(-7, legY); ctx.lineTo(-10 + legWiggle, legY + 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(7, legY); ctx.lineTo(10 - legWiggle, legY + 2); ctx.stroke();
  }
  // Antenna
  ctx.beginPath(); ctx.moveTo(-2, -5); ctx.lineTo(-4, -9 + Math.sin(f * 0.1) * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2, -5); ctx.lineTo(4, -9 + Math.cos(f * 0.1) * 2); ctx.stroke();
  ctx.restore();
}

// === DRAW SPORE CRAWLER ===
function drawSporeCrawler(x, y, size, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // Segmented body
  ctx.fillStyle = '#558844';
  for (var i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(i * size * 0.3 - size * 0.45, 0, size * 0.3 - i * 0.5, 0, PI2);
    ctx.fill();
  }
  // Head
  ctx.fillStyle = '#77aa55';
  ctx.beginPath();
  ctx.arc(-size * 0.5, 0, size * 0.35, 0, PI2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.arc(-size * 0.55, -size * 0.15, 2, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(-size * 0.55, size * 0.15, 2, 0, PI2); ctx.fill();
  // Mandibles
  ctx.strokeStyle = '#446633';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-size * 0.6, -3); ctx.lineTo(-size * 0.75, -6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-size * 0.6, 3); ctx.lineTo(-size * 0.75, 6); ctx.stroke();
  ctx.restore();
}

// === DRAW BOSS ===
function drawBossSprite(b) {
  if (!b) return;
  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.flashTimer > 0 && Math.floor(frame * 0.3) % 2) {
    ctx.globalAlpha = 0.5;
  }

  var sz = b.size * 8;

  // Body (differs by type)
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz, sz * 0.8, 0, 0, PI2);
  ctx.fill();

  // Inner pattern
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  for (var i = 0; i < 5; i++) {
    var px = Math.cos(i * 1.26 + frame * 0.02) * sz * 0.5;
    var py = Math.sin(i * 1.26 + frame * 0.02) * sz * 0.4;
    ctx.beginPath(); ctx.arc(px, py, sz * 0.15, 0, PI2); ctx.fill();
  }

  // Crown/horns
  ctx.fillStyle = b.projectileColor;
  for (var i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * sz * 0.3, -sz * 0.7);
    ctx.lineTo(i * sz * 0.3 - 3, -sz * 1.1 - Math.abs(i) * 3);
    ctx.lineTo(i * sz * 0.3 + 3, -sz * 1.1 - Math.abs(i) * 3);
    ctx.fill();
  }

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-sz * 0.3, -sz * 0.15, sz * 0.2, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz * 0.3, -sz * 0.15, sz * 0.2, 0, PI2); ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath(); ctx.arc(-sz * 0.3, -sz * 0.15, sz * 0.1, 0, PI2); ctx.fill();
  ctx.beginPath(); ctx.arc(sz * 0.3, -sz * 0.15, sz * 0.1, 0, PI2); ctx.fill();

  // Mouth
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(0, sz * 0.2, sz * 0.25, 0.3, PI - 0.3);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(b.x - 30, b.y - sz - 15, 60, 6);
  ctx.fillStyle = b.hp > b.maxHp * 0.3 ? '#44dd88' : '#ff4444';
  ctx.fillRect(b.x - 30, b.y - sz - 15, 60 * (b.hp / b.maxHp), 6);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.x - 30, b.y - sz - 15, 60, 6);

  // Boss name
  ctx.fillStyle = b.color;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, b.x, b.y - sz - 20);

  // Projectiles
  for (var pi2 = 0; pi2 < b.projectiles.length; pi2++) {
    var proj = b.projectiles[pi2];
    ctx.fillStyle = b.projectileColor;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, 4, 0, PI2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, 2, 0, PI2);
    ctx.fill();
  }
}

// === DRAW CITY ===
function drawCity() {
  var shake = getShakeOffset();
  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-camX + shake.x, -camY + shake.y);

  var zone = getCurrentZone();

  // Ground
  ctx.fillStyle = zone.ground;
  ctx.fillRect(0, 0, CITY_W, CITY_H);

  // Grid roads
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (var i = 0; i < CITY_W; i += TILE) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, CITY_H); ctx.stroke();
  }
  for (var i = 0; i < CITY_H; i += TILE) {
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(CITY_W, i); ctx.stroke();
  }

  // Road markings
  ctx.strokeStyle = '#555';
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(0, CITY_H / 2); ctx.lineTo(CITY_W, CITY_H / 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CITY_W / 2, 0); ctx.lineTo(CITY_W / 2, CITY_H); ctx.stroke();
  ctx.setLineDash([]);

  // Goo trails
  for (var gi = 0; gi < gooTrails.length; gi++) {
    var g = gooTrails[gi];
    var gAlpha = Math.min(1, g.life / 4);
    ctx.fillStyle = 'rgba(100,180,80,' + (gAlpha * 0.4) + ')';
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.size, 0, PI2);
    ctx.fill();
  }

  // Spore rain
  if (gameLevel >= 2) {
    ctx.fillStyle = 'rgba(120,200,100,0.3)';
    for (var sri = 0; sri < sporeRainDrops.length; sri++) {
      var sr = sporeRainDrops[sri];
      ctx.fillRect(sr.x, sr.y, 1, 4);
    }
  }

  // Buildings
  for (var bi = 0; bi < buildings.length; bi++) {
    var b = buildings[bi];
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,100,0.3)';
    for (var wx = b.x + 5; wx < b.x + b.w - 5; wx += 10) {
      for (var wy = b.y + 5; wy < b.y + b.h - 5; wy += 10) {
        ctx.fillRect(wx, wy, 5, 5);
      }
    }
  }

  // Parks
  for (var i = 0; i < parks.length; i++) {
    var pk = parks[i];
    ctx.fillStyle = parkTickets[i] ? 'rgba(68,255,68,0.2)' : 'rgba(255,255,255,0.1)';
    ctx.beginPath(); ctx.arc(pk.x, pk.y, 35, 0, PI2); ctx.fill();
    ctx.strokeStyle = pk.icon;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(pk.x, pk.y, 35, 0, PI2); ctx.stroke();
    ctx.fillStyle = pk.icon;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(parkNames[i], pk.x, pk.y - 8);
    if (parkMedals[i] > 0) {
      var mc = ['', '#cd7f32', '#c0c0c0', '#ffd700'][parkMedals[i]];
      ctx.fillStyle = mc;
      ctx.beginPath(); ctx.arc(pk.x, pk.y + 12, 5, 0, PI2); ctx.fill();
    }
    if (TAS.math.dist(player.x, player.y, pk.x, pk.y) < 30) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '9px monospace';
      ctx.fillText('[Z / ENTER]', pk.x, pk.y + 28);
    }
  }

  // Championship (center)
  if (championshipUnlocked) {
    var champPulse = 0.6 + Math.sin(frame * 0.04) * 0.4;
    ctx.fillStyle = 'rgba(255,215,0,' + (0.15 * champPulse) + ')';
    ctx.beginPath(); ctx.arc(600, 450, 25, 0, PI2); ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(600, 450, 25, 0, PI2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARDEN', 600, 448);
    ctx.fillText('CHAMPIONSHIP', 600, 458);
    if (TAS.math.dist(player.x, player.y, 600, 450) < 30) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '9px monospace';
      ctx.fillText('[Z / ENTER]', 600, 475);
    }
  }

  // Shops
  for (var si = 0; si < shops.length; si++) {
    var s = shops[si];
    ctx.fillStyle = '#553388';
    ctx.fillRect(s.x, s.y, s.w, s.h);
    // Mushroom sign
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.ellipse(s.x + s.w / 2, s.y - 5, 15, 8, 0, PI, 0);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHOP', s.x + s.w / 2, s.y + s.h / 2 + 3);
    if (TAS.hit.rectOverlap(player.x - 8, player.y - 8, 16, 16, s.x - 10, s.y - 10, s.w + 20, s.h + 20)) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '9px monospace';
      ctx.fillText('[Z / ENTER]', s.x + s.w / 2, s.y + s.h + 14);
    }
  }

  // Spore pickups
  for (var spi = 0; spi < sporePickups.length; spi++) {
    var sp2 = sporePickups[spi];
    if (sp2.collected) continue;
    var bob = Math.sin(frame * 0.06 + sp2.x) * 3;
    if (sp2.type === 'shield') {
      ctx.fillStyle = '#a855f7';
      ctx.beginPath(); ctx.arc(sp2.x, sp2.y + bob, 7, 0, PI2); ctx.fill();
      ctx.fillStyle = '#c084fc';
      ctx.beginPath();
      ctx.moveTo(sp2.x, sp2.y + bob - 5);
      ctx.lineTo(sp2.x - 5, sp2.y + bob + 3);
      ctx.lineTo(sp2.x + 5, sp2.y + bob + 3);
      ctx.fill();
    } else if (sp2.type === 'core') {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath(); ctx.arc(sp2.x, sp2.y + bob, 7, 0, PI2); ctx.fill();
      ctx.fillStyle = '#fcd34d';
      ctx.fillRect(sp2.x - 2, sp2.y + bob - 5, 4, 10);
      ctx.fillRect(sp2.x - 5, sp2.y + bob - 2, 10, 4);
    } else {
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.ellipse(sp2.x, sp2.y + bob, 6, 8, 0, 0, PI2);
      ctx.fill();
      ctx.fillStyle = '#86efac';
      ctx.beginPath(); ctx.arc(sp2.x - 1, sp2.y + bob - 3, 2, 0, PI2); ctx.fill();
    }
  }

  // Tokens
  for (var ti = 0; ti < tokens.length; ti++) {
    var t = tokens[ti];
    if (t.collected) continue;
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(t.x, t.y, 5 + Math.sin(frame * 0.08 + t.x) * 1, 0, PI2);
    ctx.fill();
    ctx.fillStyle = '#92600a';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('P', t.x, t.y + 2);
  }

  // Cars
  for (var ci = 0; ci < cars.length; ci++) {
    var c = cars[ci];
    ctx.fillStyle = c.color;
    ctx.fillRect(c.x - c.w / 2, c.y - c.h / 2, c.w, c.h);
    ctx.fillStyle = '#222';
    if (c.w > c.h) {
      ctx.fillRect(c.x - c.w / 2 + 2, c.y - c.h / 2, 6, c.h);
      ctx.fillRect(c.x + c.w / 2 - 8, c.y - c.h / 2, 6, c.h);
    } else {
      ctx.fillRect(c.x - c.w / 2, c.y - c.h / 2 + 2, c.w, 6);
      ctx.fillRect(c.x - c.w / 2, c.y + c.h / 2 - 8, c.w, 6);
    }
  }

  // Pedestrians
  for (var pi = 0; pi < pedestrians.length; pi++) {
    var p = pedestrians[pi];
    ctx.fillStyle = '#aa8866';
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, PI2); ctx.fill();
    ctx.fillStyle = '#664422';
    ctx.beginPath(); ctx.arc(p.x, p.y - 4, 3, 0, PI2); ctx.fill();
  }

  // Reactor bugs
  for (var rbi = 0; rbi < reactorBugs.length; rbi++) {
    var rb = reactorBugs[rbi];
    drawReactorBug(rb.x, rb.y, rb.frame);
  }

  // Spore crawlers
  for (var sci = 0; sci < sporeCrawlers.length; sci++) {
    var sc2 = sporeCrawlers[sci];
    drawSporeCrawler(sc2.x, sc2.y, sc2.size, sc2.angle);
  }

  // Bees
  for (var bi2 = 0; bi2 < bees.length; bi2++) {
    var bee = bees[bi2];
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.ellipse(bee.x, bee.y, 6, 4, 0, 0, PI2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.fillRect(bee.x - 4, bee.y - 1, 2, 3);
    ctx.fillRect(bee.x, bee.y - 1, 2, 3);
    ctx.fillStyle = 'rgba(200,200,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(bee.x - 2, bee.y - 5 + Math.sin(frame * 0.5) * 2, 4, 3, -0.3, 0, PI2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(bee.x + 2, bee.y - 5 + Math.sin(frame * 0.5 + 1) * 2, 4, 3, 0.3, 0, PI2);
    ctx.fill();
  }

  // Player (flash when invincible)
  if (carHitTimer <= 0 || Math.floor(frame * 0.5) % 2 === 0) {
    // Shield aura
    if (playerShield > 0) {
      ctx.strokeStyle = 'rgba(168,85,247,' + (0.3 + Math.sin(frame * 0.1) * 0.2) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(player.x, player.y, 14, 0, PI2); ctx.stroke();
    }
    // Garden core glow
    if (playerReactorCore) {
      ctx.fillStyle = 'rgba(244,180,27,' + (0.15 + Math.sin(frame * 0.08) * 0.1) + ')';
      ctx.beginPath(); ctx.arc(player.x, player.y, 18, 0, PI2); ctx.fill();
    }
    drawBaselingSkater(player.x, player.y, 0.8, frame * 0.1);
  }

  // Speed lines when fast
  var spd = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (spd > 80) {
    ctx.strokeStyle = 'rgba(100,200,255,0.3)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 3; i++) {
      var lx = player.x - Math.cos(player.angle) * (10 + i * 8);
      var ly = player.y - Math.sin(player.angle) * (10 + i * 8);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx - Math.cos(player.angle) * 12, ly - Math.sin(player.angle) * 12);
      ctx.stroke();
    }
  }

  TAS.particles.draw();
  drawDeathParticles();
  drawScorePopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, 28);
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('POOP: ' + score, 6, 18);
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('M: ' + money, GW / 2 - 40, 18);
  ctx.fillStyle = cityTimer < 10 ? '#ff4444' : '#38d973';
  ctx.fillText('TIME: ' + Math.ceil(cityTimer), GW / 2 + 50, 18);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff6688';
  for (var i = 0; i < lives; i++) {
    ctx.fillText('\u2665', GW - 8 - i * 16, 18);
  }
  // Zone name
  ctx.textAlign = 'center';
  ctx.fillStyle = zone.accent;
  ctx.font = '8px monospace';
  ctx.fillText(zone.name + ' (Lv.' + gameLevel + ')', GW / 2, GH - 22);

  // Tickets
  ctx.textAlign = 'left';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  var ticketStr = 'PARKS: ';
  for (var i = 0; i < 4; i++) ticketStr += parkTickets[i] ? '\u2713' : '\u2717';
  ctx.fillText(ticketStr, 6, GH - 6);

  // Board name
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText(boards[currentBoard].name, GW - 6, GH - 6);

  // Bee warning
  if (beeActive) {
    var warn = Math.sin(frame * 0.15) > 0;
    if (warn) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!! SPORE SWARM !!', GW / 2, GH / 2 - 40);
    }
  }

  if (cityTimer < 15 && cityTimer > 10 && !beeActive) {
    ctx.fillStyle = '#ffaa44';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Grind to a park before the swarm comes!', GW / 2, 42);
  }

  // Active powerup indicators
  if (playerShield > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPORE SHIELD: ' + Math.ceil(playerShield) + 's', 6, 38);
  }
  if (playerReactorCore) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('GARDEN CORE: ' + Math.ceil(reactorCoreTimer) + 's', 6, playerShield > 0 ? 48 : 38);
  }

  // Tutorial overlay
  if (tutorialActive) {
    drawTutorial();
  }

  TAS.input.drawTouchControls(GW, GH);
}
