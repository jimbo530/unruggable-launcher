<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fungal Fury</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 480, GH = 270;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'FIRE' } });

var GRAVITY = 0.45;
var PLAYER_SPEED = 2.2;
var JUMP_FORCE = -7.2;
var STAGE_WIDTH = 2400;
var INV_TIME = 90;

// === WEAPON DEFS ===
var WEAPONS = {
  NORMAL: { name: 'NORMAL', rate: 10, color: '#ffa', speed: 6, size: 3, pierce: false },
  SPREAD: { name: 'SPREAD', rate: 14, color: '#f84', speed: 5, size: 3, pierce: false },
  LASER:  { name: 'LASER',  rate: 20, color: '#4ff', speed: 12, size: 2, pierce: true, width: 3 },
  FIRE:   { name: 'FIRE',   rate: 12, color: '#f42', speed: 4, size: 4, pierce: false, arc: true },
  RAPID:  { name: 'RAPID',  rate: 5,  color: '#ff4', speed: 7, size: 2, pierce: false }
};

// === STAGE THEMES ===
var STAGE_THEMES = [
  { name: 'JUNGLE ASSAULT',      bg1: '#0a2a0a', bg2: '#143814', ground: '#2a5a1a', sky: '#0a1a2a', trees: true },
  { name: 'REACTOR BASE',        bg1: '#1a1a2a', bg2: '#2a2a3a', ground: '#3a3a4a', sky: '#0a0a1a', metal: true },
  { name: 'SPORE WATERFALL',     bg1: '#0a1a3a', bg2: '#1a2a4a', ground: '#2a4a3a', sky: '#0a0a2a', water: true },
  { name: 'FUNGAL TUNNEL',       bg1: '#2a1a2a', bg2: '#3a2a3a', ground: '#4a3a4a', sky: '#1a0a1a', tunnel: true },
  { name: 'SPORE CAVERN',        bg1: '#1a0a2a', bg2: '#2a1a3a', ground: '#3a2a1a', sky: '#0a0a1a', spores: true },
  { name: 'CRYSTAL MINES',       bg1: '#1a2a3a', bg2: '#2a3a4a', ground: '#4a5a6a', sky: '#0a1a2a', crystals: true },
  { name: 'BOSS RUSH',           bg1: '#2a0a0a', bg2: '#3a1a1a', ground: '#4a2a2a', sky: '#1a0a0a', fire: true },
  { name: 'THE FINAL HIVE',      bg1: '#2a1a0a', bg2: '#3a2a1a', ground: '#5a3a2a', sky: '#1a0a0a', organic: true }
];

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('fungalfury_hi');
var lives = 3;
var stage = 0;
var frame = 0;
var scrollX = 0;
var stageTimer = 0;
var bossActive = false;
var bossDefeated = false;
var stageClearTimer = 0;
var stageIntroTimer = 0;
var comboCount = 0;
var comboTimer = 0;
var screenKills = 0;

// Player
var player = null;
var bullets = [];
var enemies = [];
var eBullets = [];
var powerups = [];
var platforms = [];
var explosions = [];
var decorations = [];
var checkpointX = 0;
var boss = null;

// === TERRAIN GENERATION ===
function generateTerrain(stageIdx) {
  platforms = [];
  decorations = [];
  var groundY = GH - 40;

  // Ground segments with varied height
  for (var x = 0; x < STAGE_WIDTH; x += 60) {
    var h = 38 + Math.floor(Math.sin(x * 0.01) * 8);
    var gap = (x > 200 && x < STAGE_WIDTH - 200 && Math.random() < 0.1);
    if (!gap) {
      var yOffset = Math.random() < 0.25 ? Math.floor(Math.random() * 16) : 0;
      platforms.push({ x: x, y: groundY - yOffset, w: 60, h: h + yOffset, ground: true });
    }
  }

  // Floating platforms - more on later stages
  var platCount = 10 + stageIdx * 4;
  for (var i = 0; i < platCount; i++) {
    var px = 80 + Math.random() * (STAGE_WIDTH - 160);
    var py = 60 + Math.random() * (GH - 140);
    var pw = 35 + Math.random() * 55;
    platforms.push({ x: px, y: py, w: pw, h: 8, ground: false });
  }

  // Decorations based on stage theme
  var theme = STAGE_THEMES[stageIdx];
  if (theme.trees) {
    for (var t = 0; t < 20; t++) {
      decorations.push({ type: 'tree', x: Math.random() * STAGE_WIDTH, y: groundY - 30 - Math.random() * 40, size: 20 + Math.random() * 30 });
    }
  }
  if (theme.metal) {
    for (var m = 0; m < 15; m++) {
      decorations.push({ type: 'pipe', x: Math.random() * STAGE_WIDTH, y: 20 + Math.random() * 100, w: 8 + Math.random() * 4, h: 40 + Math.random() * 80 });
    }
  }
  if (theme.crystals) {
    for (var c = 0; c < 12; c++) {
      decorations.push({ type: 'crystal', x: Math.random() * STAGE_WIDTH, y: 40 + Math.random() * (GH - 100), size: 8 + Math.random() * 16, hue: 180 + Math.random() * 60 });
    }
  }
  if (theme.organic) {
    for (var o = 0; o < 18; o++) {
      decorations.push({ type: 'tendril', x: Math.random() * STAGE_WIDTH, y: Math.random() < 0.5 ? 0 : groundY, len: 30 + Math.random() * 50, phase: Math.random() * 6 });
    }
  }
  if (theme.water) {
    for (var w = 0; w < 8; w++) {
      decorations.push({ type: 'waterfall', x: 200 + w * 280 + Math.random() * 100, y: 0, h: GH - 40 });
    }
  }

  checkpointX = 0;
}

// === ENEMY SPAWNING ===
function spawnEnemies(stageIdx) {
  enemies = [];
  var count = 12 + stageIdx * 5;
  for (var i = 0; i < count; i++) {
    var ex = 280 + Math.random() * (STAGE_WIDTH - 500);
    var ey = GH - 80;
    var type = pickEnemyType(stageIdx);
    if (type === 'flyer') ey = 30 + Math.random() * 80;
    enemies.push(createEnemy(type, ex, ey, stageIdx));
  }
}

function pickEnemyType(stageIdx) {
  var r = Math.random();
  if (stageIdx < 2) {
    if (r < 0.35) return 'grunt';
    if (r < 0.55) return 'turret';
    if (r < 0.75) return 'runner';
    if (r < 0.9) return 'flyer';
    return 'jumper';
  } else if (stageIdx < 5) {
    if (r < 0.2) return 'grunt';
    if (r < 0.35) return 'turret';
    if (r < 0.5) return 'sniper';
    if (r < 0.65) return 'jumper';
    if (r < 0.8) return 'runner';
    if (r < 0.92) return 'flyer';
    return 'shielder';
  } else {
    if (r < 0.15) return 'grunt';
    if (r < 0.28) return 'turret';
    if (r < 0.4) return 'sniper';
    if (r < 0.52) return 'jumper';
    if (r < 0.64) return 'runner';
    if (r < 0.76) return 'flyer';
    if (r < 0.88) return 'shielder';
    return 'bomber';
  }
}

function createEnemy(type, x, y, stageIdx) {
  var hp = 1, w = 14, h = 20, shootRate = 120, spd = 0.8;
  if (type === 'grunt')    { hp = 1; spd = 0.6 + stageIdx * 0.08; shootRate = 100 - stageIdx * 5; }
  if (type === 'turret')   { hp = 3 + Math.floor(stageIdx/2); spd = 0; w = 16; h = 16; shootRate = 70 - stageIdx * 4; }
  if (type === 'sniper')   { hp = 2; spd = 0; shootRate = 90 - stageIdx * 5; }
  if (type === 'jumper')   { hp = 1; spd = 1.1 + stageIdx * 0.1; }
  if (type === 'runner')   { hp = 1; spd = 2.2 + stageIdx * 0.12; }
  if (type === 'flyer')    { hp = 1; spd = 1.0; w = 16; h = 12; }
  if (type === 'shielder') { hp = 5; spd = 0.4; w = 18; h = 22; shootRate = 80; }
  if (type === 'bomber')   { hp = 2; spd = 1.5; w = 14; h = 14; shootRate = 60; }
  return {
    type: type, x: x, y: y, w: w, h: h, hp: hp, maxHp: hp,
    vx: 0, vy: 0, spd: spd, dir: -1,
    shootRate: shootRate, shootTimer: Math.floor(Math.random() * shootRate),
    jumpTimer: Math.floor(Math.random() * 60), alive: true, flash: 0, startX: x,
    shieldAngle: 0, bombTimer: 0
  };
}

// === BOSS FACTORY ===
function createBoss(stageIdx) {
  var bx = STAGE_WIDTH - 120;
  var hp = 35 + stageIdx * 18;
  var bossW = 70 + stageIdx * 5;
  var bossH = 70 + stageIdx * 5;
  boss = {
    x: bx, y: GH / 2 - bossH / 2, w: bossW, h: bossH,
    hp: hp, maxHp: hp,
    phase: 0, phaseTimer: 0,
    shootTimer: 0, moveTimer: 0, chargeTimer: 0,
    vy: 0, vx: 0, dir: -1, flash: 0,
    pattern: 0, patternTimer: 0,
    parts: [
      { ox: -22, oy: -12, w: 14, h: 14, hp: 8 + stageIdx * 3, maxHp: 8 + stageIdx * 3, alive: true, type: 'eye' },
      { ox: 22, oy: -12, w: 14, h: 14, hp: 8 + stageIdx * 3, maxHp: 8 + stageIdx * 3, alive: true, type: 'eye' },
      { ox: 0, oy: 22, w: 18, h: 18, hp: 0, alive: true, type: 'core' }
    ],
    alive: true, stageIdx: stageIdx,
    spawnTimer: 0
  };
}

// === PLAYER ===
function createPlayer() {
  return {
    x: 40, y: GH - 90, w: 12, h: 22,
    vx: 0, vy: 0,
    grounded: false, crouching: false,
    facingRight: true,
    aimX: 1, aimY: 0,
    weapon: WEAPONS.NORMAL,
    shootTimer: 0,
    alive: true, invTimer: INV_TIME,
    barrier: false,
    runFrame: 0
  };
}

// === INIT STAGE ===
function initStage(idx) {
  stage = idx;
  scrollX = 0;
  stageTimer = 0;
  bossActive = false;
  bossDefeated = false;
  stageClearTimer = 0;
  stageIntroTimer = 140;
  boss = null;
  bullets = [];
  eBullets = [];
  powerups = [];
  explosions = [];
  comboCount = 0;
  comboTimer = 0;
  generateTerrain(idx);
  spawnEnemies(idx);
  player = createPlayer();
  // Scatter powerup capsules
  var puTypes = ['SPREAD', 'LASER', 'FIRE', 'RAPID', 'BARRIER', 'BOMB'];
  var puCount = 3 + Math.floor(idx / 2);
  for (var i = 0; i < puCount; i++) {
    var px = 350 + Math.random() * (STAGE_WIDTH - 600);
    var py = 50 + Math.random() * 70;
    powerups.push({ x: px, y: py, w: 16, h: 12, type: puTypes[Math.floor(Math.random() * puTypes.length)], baseY: py });
  }
}

// === GAME START ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  screenKills = 0;
  TAS.particles.clear();
  initStage(0);
}

// === SOUND EFFECTS ===
var SFX = {
  shoot: function() { TAS.audio.playTone(880, 0.04, 'square', 0.05, 440); },
  spread: function() { TAS.audio.playTone(660, 0.05, 'square', 0.04, 330); },
  laser: function() { TAS.audio.playTone(200, 0.12, 'sawtooth', 0.06, 800); },
  fire: function() { TAS.audio.playTone(150, 0.08, 'triangle', 0.05, 80); },
  rapid: function() { TAS.audio.playTone(1100, 0.03, 'square', 0.04, 600); },
  hit: function() { TAS.audio.playNoise(0.06, 0.06, 2000); },
  explode: function() { TAS.audio.playNoise(0.2, 0.1); TAS.audio.playTone(100, 0.2, 'sawtooth', 0.07, 30); },
  bigExplode: function() { TAS.audio.playNoise(0.35, 0.14, 600); TAS.audio.playTone(60, 0.3, 'sawtooth', 0.1, 20); },
  die: function() { TAS.audio.playTone(400, 0.5, 'sawtooth', 0.1, 40); TAS.audio.playNoise(0.3, 0.12); },
  powerup: function() { TAS.audio.playTone(523, 0.06, 'square', 0.06); setTimeout(function(){ TAS.audio.playTone(784, 0.08, 'square', 0.07); }, 80); },
  bomb: function() { TAS.audio.playNoise(0.4, 0.15, 800); TAS.audio.playTone(60, 0.4, 'sawtooth', 0.1, 20); },
  jump: function() { TAS.audio.playTone(300, 0.08, 'square', 0.04, 500); },
  bossHit: function() { TAS.audio.playTone(200, 0.1, 'sawtooth', 0.08, 80); TAS.audio.playNoise(0.08, 0.06); },
  combo: function(n) { TAS.audio.playTone(440 + n * 80, 0.06, 'square', 0.05); },
  stageClear: function() {
    [523,659,784,1047].forEach(function(n,i){ setTimeout(function(){ TAS.audio.playTone(n, 0.15, 'square', 0.07); }, i*120); });
  },
  bossWarn: function() { TAS.audio.playTone(80, 0.3, 'square', 0.08, 40); TAS.audio.playNoise(0.15, 0.06); }
};

// === INPUT HANDLING ===
function getInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;
  return {
    left:  k['ArrowLeft']  || k['KeyA'] || t.left,
    right: k['ArrowRight'] || k['KeyD'] || t.right,
    up:    k['ArrowUp']    || k['KeyW'] || t.up,
    down:  k['ArrowDown']  || k['KeyS'] || t.down,
    jump:  k['KeyZ'] || k['Space'] || t.a,
    fire:  k['KeyX'] || k['KeyF'] || t.b
  };
}

// === COLLISION WITH PLATFORMS ===
function collidePlatforms(obj) {
  obj.grounded = false;
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    var px = p.x - scrollX;
    if (obj.x + obj.w > px && obj.x < px + p.w) {
      // Landing on top
      if (obj.vy >= 0 && obj.y + obj.h > p.y && obj.y + obj.h < p.y + 18) {
        obj.y = p.y - obj.h;
        obj.vy = 0;
        obj.grounded = true;
      }
      // Hit from below (only solid ground blocks)
      if (p.ground && obj.vy < 0 && obj.y < p.y + p.h && obj.y > p.y + p.h - 10) {
        obj.y = p.y + p.h;
        obj.vy = 0;
      }
    }
  }
}

// === FIRE BULLET ===
function fireBullet() {
  if (player.shootTimer > 0) return;
  var weapon = player.weapon;
  player.shootTimer = weapon.rate;

  var cx = player.x + player.w / 2;
  var cy = player.y + player.h / 2 - (player.crouching ? -4 : 0);
  var ax = player.aimX, ay = player.aimY;
  var len = Math.sqrt(ax * ax + ay * ay);
  if (len > 0) { ax /= len; ay /= len; } else { ax = player.facingRight ? 1 : -1; ay = 0; }

  if (weapon.name === 'SPREAD') {
    for (var i = -2; i <= 2; i++) {
      var ang = Math.atan2(ay, ax) + i * 0.18;
      bullets.push({ x: cx, y: cy, vx: Math.cos(ang) * weapon.speed, vy: Math.sin(ang) * weapon.speed, size: weapon.size, color: weapon.color, pierce: false, life: 70 });
    }
    SFX.spread();
  } else if (weapon.name === 'LASER') {
    bullets.push({ x: cx, y: cy, vx: ax * weapon.speed, vy: ay * weapon.speed, size: weapon.size, color: weapon.color, pierce: true, life: 50, laser: true, width: weapon.width });
    SFX.laser();
  } else if (weapon.name === 'FIRE') {
    bullets.push({ x: cx, y: cy, vx: ax * weapon.speed, vy: ay * weapon.speed - 1.2, size: weapon.size, color: weapon.color, pierce: false, life: 45, arc: true });
    SFX.fire();
  } else if (weapon.name === 'RAPID') {
    bullets.push({ x: cx, y: cy, vx: ax * weapon.speed, vy: ay * weapon.speed, size: weapon.size, color: weapon.color, pierce: false, life: 55 });
    SFX.rapid();
  } else {
    bullets.push({ x: cx, y: cy, vx: ax * weapon.speed, vy: ay * weapon.speed, size: weapon.size, color: weapon.color, pierce: false, life: 60 });
    SFX.shoot();
  }
}

// === ENEMY SHOOT ===
function enemyShoot(e) {
  var cx = e.x - scrollX + e.w / 2;
  var cy = e.y + e.h / 2;
  var px = player.x + player.w / 2;
  var py = player.y + player.h / 2;
  var ang = Math.atan2(py - cy, px - cx);
  var spd = 2.2 + stage * 0.2;

  if (e.type === 'turret') {
    for (var i = -1; i <= 1; i++) {
      eBullets.push({ x: cx, y: cy, vx: Math.cos(ang + i * 0.25) * spd, vy: Math.sin(ang + i * 0.25) * spd, size: 3, life: 110 });
    }
  } else if (e.type === 'sniper') {
    eBullets.push({ x: cx, y: cy, vx: Math.cos(ang) * (spd + 2), vy: Math.sin(ang) * (spd + 2), size: 4, life: 140 });
  } else if (e.type === 'bomber') {
    // Lob a bomb that explodes
    eBullets.push({ x: cx, y: cy, vx: Math.cos(ang) * 2, vy: -3, size: 5, life: 80, bomb: true });
  } else if (e.type === 'shielder') {
    for (var j = -2; j <= 2; j++) {
      eBullets.push({ x: cx, y: cy, vx: Math.cos(ang + j * 0.15) * spd, vy: Math.sin(ang + j * 0.15) * spd, size: 3, life: 90 });
    }
  } else {
    eBullets.push({ x: cx, y: cy, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd, size: 3, life: 100 });
  }
}

// === BOSS ATTACK PATTERNS ===
function bossAttack() {
  if (!boss || !boss.alive) return;
  var cx = boss.x - scrollX + boss.w / 2;
  var cy = boss.y + boss.h / 2;
  var px = player.x + player.w / 2;
  var py = player.y + player.h / 2;
  var ang = Math.atan2(py - cy, px - cx);
  var spd = 2.8 + stage * 0.25;

  var pattern = boss.pattern % 4;
  if (pattern === 0) {
    // Spiral burst
    for (var i = 0; i < 10; i++) {
      var a = (Math.PI * 2 / 10) * i + boss.phaseTimer * 0.04;
      eBullets.push({ x: cx, y: cy, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, size: 4, life: 90 });
    }
  } else if (pattern === 1) {
    // Aimed spread volley
    for (var j = -4; j <= 4; j++) {
      eBullets.push({ x: cx, y: cy, vx: Math.cos(ang + j * 0.12) * (spd + 1), vy: Math.sin(ang + j * 0.12) * (spd + 1), size: 3, life: 110 });
    }
  } else if (pattern === 2) {
    // Rapid random spray
    for (var m = 0; m < 6; m++) {
      var ra = ang + (Math.random() - 0.5) * 1.2;
      eBullets.push({ x: cx, y: cy, vx: Math.cos(ra) * (spd + 1.5), vy: Math.sin(ra) * (spd + 1.5), size: 3, life: 80 });
    }
  } else {
    // Falling debris from top
    for (var d = 0; d < 5; d++) {
      var dx = cx + (Math.random() - 0.5) * 120;
      eBullets.push({ x: dx, y: 0, vx: (Math.random() - 0.5) * 0.5, vy: 2.5 + Math.random() * 2, size: 5, life: 120 });
    }
  }
}

// === BOSS SPAWN MINIONS ===
function bossSpawnMinion() {
  if (!boss || !boss.alive) return;
  var bx = boss.x - scrollX;
  var mType = Math.random() < 0.5 ? 'grunt' : 'runner';
  var mx = bx + (Math.random() - 0.5) * 40;
  var my = boss.y + boss.h;
  var en = createEnemy(mType, mx + scrollX, my, stage);
  en.hp = 1;
  enemies.push(en);
}

// === PLAYER DEATH ===
function killPlayer() {
  if (player.barrier) {
    player.barrier = false;
    player.invTimer = 30;
    TAS.fx.flash('#0ff', 0.3);
    SFX.hit();
    return;
  }
  player.alive = false;
  SFX.die();
  TAS.fx.shake(8, 0.88);
  TAS.fx.flash('#f00', 0.5);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#f84', 20, 4, { gravity: 0.1 });
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4', 12, 3);
  lives--;
  if (lives <= 0) {
    setTimeout(function() {
      if (score > highScore) { highScore = score; TAS.score.save('fungalfury_hi', highScore); }
      state = 'gameOver';
    }, 1500);
  } else {
    setTimeout(function() {
      player = createPlayer();
      player.x = Math.max(40, checkpointX - scrollX);
      player.invTimer = INV_TIME;
      player.weapon = WEAPONS.NORMAL;
      eBullets = [];
    }, 1200);
  }
}

// === SPAWN EXPLOSION ===
function spawnExplosion(x, y, size) {
  explosions.push({ x: x, y: y, size: size, life: 1.0 });
  TAS.particles.spawn(x, y, '#f84', 8, 3, { gravity: 0.05 });
  TAS.particles.spawn(x, y, '#ff4', 5, 2);
}

// === COMBO SYSTEM ===
function addKill() {
  comboCount++;
  comboTimer = 60;
  var bonus = comboCount > 1 ? comboCount * 50 : 0;
  score += 100 + bonus;
  screenKills++;
  if (comboCount > 1) SFX.combo(comboCount);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 4 === 0 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;
  stageTimer++;

  // Combo decay
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Stage intro
  if (stageIntroTimer > 0) {
    stageIntroTimer--;
    return;
  }

  // Stage clear sequence
  if (bossDefeated) {
    stageClearTimer++;
    if (stageClearTimer === 1) SFX.stageClear();
    if (stageClearTimer > 180) {
      if (stage < 7) {
        initStage(stage + 1);
      } else {
        score += 10000;
        if (score > highScore) { highScore = score; TAS.score.save('fungalfury_hi', highScore); }
        state = 'gameOver';
      }
    }
    return;
  }

  var inp = getInput();

  // === PLAYER UPDATE ===
  if (player.alive) {
    if (player.invTimer > 0) player.invTimer--;
    if (player.shootTimer > 0) player.shootTimer--;

    // Movement
    player.vx = 0;
    player.crouching = false;
    if (inp.down && player.grounded) {
      player.crouching = true;
    } else {
      if (inp.left)  { player.vx = -PLAYER_SPEED; player.facingRight = false; }
      if (inp.right) { player.vx = PLAYER_SPEED; player.facingRight = true; }
    }

    // Run animation frame
    if (Math.abs(player.vx) > 0.1 && player.grounded) {
      player.runFrame += 0.2;
    } else {
      player.runFrame = 0;
    }

    // Jump
    if (inp.jump && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      SFX.jump();
    }

    // Aim direction (8 directions)
    var aimDirX = 0, aimDirY = 0;
    if (inp.right) aimDirX = 1;
    else if (inp.left) aimDirX = -1;
    if (inp.up) aimDirY = -1;
    else if (inp.down && !player.grounded) aimDirY = 1;

    if (aimDirX !== 0 || aimDirY !== 0) {
      player.aimX = aimDirX;
      player.aimY = aimDirY;
    } else if (player.aimX === 0 && player.aimY === 0) {
      player.aimX = player.facingRight ? 1 : -1;
    }

    // Physics
    player.vy += GRAVITY;
    if (player.vy > 8) player.vy = 8;
    player.x += player.vx;
    player.y += player.vy;

    // Platform collision
    collidePlatforms(player);

    // World bounds
    if (player.x < 0) player.x = 0;
    if (player.x > GW - player.w) player.x = GW - player.w;
    if (player.y > GH + 40) killPlayer();

    // Scroll camera
    if (player.x > GW * 0.55 && scrollX < STAGE_WIDTH - GW) {
      var push = (player.x - GW * 0.55) * 0.12;
      scrollX += push;
      player.x -= push;
    }
    if (player.x < GW * 0.3 && scrollX > 0) {
      var pull = (GW * 0.3 - player.x) * 0.08;
      scrollX -= pull;
      player.x += pull;
    }
    scrollX = TAS.math.clamp(scrollX, 0, STAGE_WIDTH - GW);

    // Update checkpoint
    if (player.x + scrollX > checkpointX + 400) {
      checkpointX = player.x + scrollX - 100;
    }

    // Shooting
    if (inp.fire) fireBullet();

    // Boss trigger
    if (scrollX >= STAGE_WIDTH - GW - 60 && !bossActive && !boss) {
      bossActive = true;
      createBoss(stage);
      TAS.fx.flash('#f00', 0.2);
      SFX.bossWarn();
    }
  }

  // === PLAYER BULLETS UPDATE ===
  for (var bi = bullets.length - 1; bi >= 0; bi--) {
    var b = bullets[bi];
    b.x += b.vx;
    b.y += b.vy;
    if (b.arc) b.vy += 0.18;
    b.life--;
    if (b.life <= 0 || b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      bullets.splice(bi, 1);
      continue;
    }
    var hitSomething = false;

    // Hit enemies
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var e = enemies[ei];
      if (!e.alive) continue;
      var ex = e.x - scrollX;
      if (ex < -50 || ex > GW + 50) continue;

      // Shielder deflects from front
      if (e.type === 'shielder') {
        var fromRight = b.vx < 0;
        var shieldSide = e.dir > 0;
        if (fromRight === shieldSide && Math.random() < 0.6) continue;
      }

      if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2, ex, e.y, e.w, e.h)) {
        e.hp--;
        e.flash = 5;
        SFX.hit();
        if (e.hp <= 0) {
          e.alive = false;
          addKill();
          spawnExplosion(ex + e.w / 2, e.y + e.h / 2, e.w);
          SFX.explode();
          // Chance to drop powerup
          if (Math.random() < 0.08) {
            var types = ['SPREAD','LASER','FIRE','RAPID','BARRIER'];
            powerups.push({ x: e.x, y: e.y, w: 16, h: 12, type: types[Math.floor(Math.random()*types.length)], baseY: e.y });
          }
        }
        if (!b.pierce) { hitSomething = true; break; }
      }
    }

    // Hit boss
    if (!hitSomething && boss && boss.alive) {
      var bsX = boss.x - scrollX;
      // Parts first
      for (var pi = 0; pi < boss.parts.length; pi++) {
        var part = boss.parts[pi];
        if (!part.alive || part.hp === 0) continue;
        var partX = bsX + boss.w / 2 + part.ox - part.w / 2;
        var partY = boss.y + boss.h / 2 + part.oy - part.h / 2;
        if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2, partX, partY, part.w, part.h)) {
          part.hp--;
          boss.flash = 3;
          SFX.bossHit();
          if (part.hp <= 0) {
            part.alive = false;
            score += 500;
            spawnExplosion(partX + part.w / 2, partY + part.h / 2, 20);
            TAS.fx.shake(5, 0.9);
          }
          if (!b.pierce) hitSomething = true;
          break;
        }
      }
      // Core exposed when eyes dead
      if (!hitSomething && !boss.parts[0].alive && !boss.parts[1].alive) {
        if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size * 2, b.size * 2, bsX, boss.y, boss.w, boss.h)) {
          boss.hp--;
          boss.flash = 3;
          SFX.bossHit();
          if (boss.hp <= 0) {
            boss.alive = false;
            bossDefeated = true;
            score += 3000 + stage * 1000;
            for (var exp = 0; exp < 10; exp++) {
              (function(idx) {
                setTimeout(function() {
                  spawnExplosion(bsX + boss.w/2 + (Math.random()-0.5)*70, boss.y + boss.h/2 + (Math.random()-0.5)*70, 25);
                  SFX.bigExplode();
                  TAS.fx.shake(7, 0.84);
                }, idx * 180);
              })(exp);
            }
            TAS.fx.flash('#fff', 0.7);
          }
          if (!b.pierce) hitSomething = true;
        }
      }
    }
    if (hitSomething) bullets.splice(bi, 1);
  }

  // === ENEMY UPDATE ===
  for (var ei2 = 0; ei2 < enemies.length; ei2++) {
    var en = enemies[ei2];
    if (!en.alive) continue;
    var enX = en.x - scrollX;
    if (enX < -120 || enX > GW + 120) continue;
    if (en.flash > 0) en.flash--;

    // Type-specific AI
    if (en.type === 'grunt' || en.type === 'runner') {
      if (player.alive) en.dir = (player.x + player.w/2 > enX + en.w/2) ? 1 : -1;
      en.x += en.spd * en.dir;
    } else if (en.type === 'jumper') {
      if (player.alive) en.dir = (player.x + player.w/2 > enX + en.w/2) ? 1 : -1;
      en.x += en.spd * en.dir;
      en.jumpTimer++;
      if (en.jumpTimer > 55) { en.vy = -6.5; en.jumpTimer = 0; }
      en.vy = (en.vy || 0) + GRAVITY * 0.7;
      en.y += en.vy;
      if (en.y > GH - 60) { en.y = GH - 60; en.vy = 0; }
    } else if (en.type === 'flyer') {
      en.x += Math.sin(frame * 0.025 + en.startX * 0.01) * 1.8;
      en.y += Math.cos(frame * 0.018 + en.startX * 0.01) * 1.0;
      if (player.alive && Math.abs(enX - player.x) > 40) {
        en.x += (player.x > enX ? 0.4 : -0.4);
      }
      en.y = TAS.math.clamp(en.y, 20, GH - 60);
    } else if (en.type === 'shielder') {
      if (player.alive) en.dir = (player.x + player.w/2 > enX + en.w/2) ? 1 : -1;
      en.x += en.spd * en.dir;
      en.shieldAngle += 0.05;
    } else if (en.type === 'bomber') {
      // Float above and bomb
      en.y = TAS.math.clamp(en.y, 30, 80);
      en.x += en.spd * en.dir;
      if (enX < 30 || enX > GW - 30) en.dir *= -1;
    } else if (en.type === 'turret' || en.type === 'sniper') {
      if (player.alive) en.dir = (player.x + player.w/2 > enX + en.w/2) ? 1 : -1;
    }

    // Enemy shooting
    en.shootTimer--;
    if (en.shootTimer <= 0 && player.alive) {
      en.shootTimer = en.shootRate;
      if (Math.abs(enX - player.x) < 320) {
        enemyShoot(en);
      }
    }

    // Contact damage
    if (player.alive && player.invTimer <= 0) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, enX, en.y, en.w, en.h)) {
        killPlayer();
      }
    }
  }

  // === ENEMY BULLETS UPDATE ===
  for (var ebi = eBullets.length - 1; ebi >= 0; ebi--) {
    var eb = eBullets[ebi];
    eb.x += eb.vx;
    eb.y += eb.vy;
    if (eb.bomb) eb.vy += 0.12;
    eb.life--;
    if (eb.life <= 0 || eb.x < -30 || eb.x > GW + 30 || eb.y < -30 || eb.y > GH + 30) {
      // Bomb explodes at end of life or on ground
      if (eb.bomb && eb.y > GH - 50) {
        spawnExplosion(eb.x, eb.y, 20);
        SFX.explode();
        // Damage player if close
        if (player.alive && player.invTimer <= 0 && TAS.math.dist(player.x, player.y, eb.x, eb.y) < 30) {
          killPlayer();
        }
      }
      eBullets.splice(ebi, 1);
      continue;
    }
    if (player.alive && player.invTimer <= 0) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, eb.x - eb.size, eb.y - eb.size, eb.size * 2, eb.size * 2)) {
        eBullets.splice(ebi, 1);
        killPlayer();
      }
    }
  }

  // === BOSS UPDATE ===
  if (boss && boss.alive) {
    boss.phaseTimer++;
    boss.moveTimer++;
    if (boss.flash > 0) boss.flash--;

    // Phase based on HP ratio
    var hpRatio = boss.hp / boss.maxHp;
    if (hpRatio < 0.25) boss.phase = 2;
    else if (hpRatio < 0.55) boss.phase = 1;
    else boss.phase = 0;

    // Movement - oscillate and occasionally charge
    var moveSpeed = 1.2 + boss.phase * 0.4;
    boss.y += Math.sin(boss.moveTimer * 0.018) * moveSpeed;
    boss.y = TAS.math.clamp(boss.y, 30, GH - boss.h - 30);

    // Charge pattern in phase 2
    if (boss.phase >= 2) {
      boss.chargeTimer++;
      if (boss.chargeTimer > 120) {
        boss.x -= 2;
        if (boss.x - scrollX < GW * 0.4) {
          boss.x = STAGE_WIDTH - 120;
          boss.chargeTimer = 0;
        }
      }
    }

    // Shooting
    boss.shootTimer--;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = Math.max(15, 45 - stage * 3 - boss.phase * 10);
      boss.pattern++;
      bossAttack();
    }

    // Spawn minions in later phases
    boss.spawnTimer++;
    if (boss.phase >= 1 && boss.spawnTimer > 200) {
      boss.spawnTimer = 0;
      bossSpawnMinion();
    }

    // Boss contact damage
    if (player.alive && player.invTimer <= 0) {
      var bossSX = boss.x - scrollX;
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, bossSX, boss.y, boss.w, boss.h)) {
        killPlayer();
      }
    }
  }

  // === POWERUPS UPDATE ===
  for (var pui = powerups.length - 1; pui >= 0; pui--) {
    var pu = powerups[pui];
    pu.y = pu.baseY + Math.sin(frame * 0.05 + pui * 2) * 4;
    var puX = pu.x - scrollX;
    if (player.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, puX, pu.y, pu.w, pu.h)) {
      powerups.splice(pui, 1);
      SFX.powerup();
      TAS.fx.flash('#0f0', 0.15);
      if (pu.type === 'BARRIER') {
        player.barrier = true;
      } else if (pu.type === 'BOMB') {
        SFX.bomb();
        TAS.fx.flash('#fff', 0.5);
        TAS.fx.shake(10, 0.85);
        for (var bei = 0; bei < enemies.length; bei++) {
          var benX = enemies[bei].x - scrollX;
          if (enemies[bei].alive && benX > -30 && benX < GW + 30) {
            enemies[bei].alive = false;
            score += 100;
            spawnExplosion(benX + enemies[bei].w/2, enemies[bei].y + enemies[bei].h/2, 15);
          }
        }
        eBullets = [];
      } else if (WEAPONS[pu.type]) {
        player.weapon = WEAPONS[pu.type];
      }
    }
  }

  // === EXPLOSIONS DECAY ===
  for (var exi = explosions.length - 1; exi >= 0; exi--) {
    explosions[exi].life -= 0.04;
    if (explosions[exi].life <= 0) explosions.splice(exi, 1);
  }
}

// ================================================================
// DRAW FUNCTIONS
// ================================================================

function drawBackground() {
  var theme = STAGE_THEMES[stage];
  ctx.fillStyle = theme.sky;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax layers
  var p1 = scrollX * 0.15;
  var p2 = scrollX * 0.4;

  // Far mountains/shapes
  ctx.fillStyle = theme.bg1;
  for (var i = 0; i < 12; i++) {
    var mx = i * 100 - (p1 % 100);
    var mh = 35 + Math.sin(i * 1.8 + stage) * 22;
    ctx.beginPath();
    ctx.moveTo(mx - 10, GH - 40);
    ctx.lineTo(mx + 50, GH - 40 - mh);
    ctx.lineTo(mx + 110, GH - 40);
    ctx.fill();
  }

  // Mid-ground structures
  ctx.fillStyle = theme.bg2;
  for (var j = 0; j < 18; j++) {
    var tx = j * 70 - (p2 % 70);
    var th = 15 + Math.sin(j * 2.5 + stage * 0.5) * 12;
    ctx.fillRect(tx, GH - 40 - th, 25 + Math.sin(j * 1.1) * 8, th);
  }

  // Stage-specific background details
  drawStageDetails(theme);
}

function drawStageDetails(theme) {
  if (theme.trees) {
    // Vine/canopy hints
    ctx.fillStyle = '#1a4a1a';
    for (var i = 0; i < 6; i++) {
      var vx = ((i * 137 + scrollX * 0.3) % (GW + 40)) - 20;
      ctx.fillRect(vx, 0, 3, 20 + Math.sin(frame * 0.01 + i) * 8);
    }
  }
  if (theme.water) {
    // Waterfall streams in background
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#4af';
    for (var w = 0; w < 4; w++) {
      var wx = ((w * 200 + 50 - scrollX * 0.3) % GW);
      var ww = 6 + Math.sin(frame * 0.03 + w) * 2;
      ctx.fillRect(wx, 0, ww, GH - 40);
      // Splash at bottom
      for (var sp = 0; sp < 3; sp++) {
        ctx.beginPath();
        ctx.arc(wx + ww/2 + (Math.random()-0.5)*10, GH - 42 + Math.random()*4, 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
  if (theme.spores) {
    ctx.globalAlpha = 0.35;
    for (var s = 0; s < 25; s++) {
      var sx = ((s * 67 + frame * 0.25) % GW);
      var sy = ((s * 43 + frame * 0.4) % GH);
      ctx.fillStyle = s % 3 === 0 ? '#a4f' : '#64a';
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5 + Math.sin(frame * 0.02 + s) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (theme.tunnel) {
    // Pseudo-3D tunnel lines converging
    ctx.strokeStyle = '#4a3a4a';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    var vanishX = GW / 2 + Math.sin(frame * 0.005) * 30;
    var vanishY = GH / 2;
    for (var l = 0; l < 8; l++) {
      var edgeX = l < 4 ? 0 : GW;
      var edgeY = (l % 4) * (GH / 3);
      ctx.beginPath();
      ctx.moveTo(edgeX, edgeY);
      ctx.lineTo(vanishX, vanishY);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  if (theme.crystals) {
    ctx.globalAlpha = 0.4;
    for (var c = 0; c < 10; c++) {
      var cx2 = ((c * 131 + frame * 0.15) % GW);
      var cy2 = 25 + ((c * 51) % (GH - 80));
      var glint = Math.sin(frame * 0.035 + c * 2.1) * 0.5 + 0.5;
      ctx.fillStyle = 'hsl(' + (180 + c * 25) + ',60%,' + (35 + glint * 30) + '%)';
      ctx.beginPath();
      ctx.moveTo(cx2, cy2 - 6);
      ctx.lineTo(cx2 + 3, cy2);
      ctx.lineTo(cx2, cy2 + 6);
      ctx.lineTo(cx2 - 3, cy2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (theme.fire) {
    // Embers rising
    ctx.globalAlpha = 0.5;
    for (var f = 0; f < 15; f++) {
      var fx = (f * 89 + frame * 0.5) % GW;
      var fy = GH - ((f * 31 + frame * 0.8) % GH);
      ctx.fillStyle = f % 2 === 0 ? '#f84' : '#fa4';
      ctx.beginPath();
      ctx.arc(fx, fy, 1 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (theme.organic) {
    // Pulsing veins on walls
    ctx.strokeStyle = '#5a2a1a';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4;
    for (var o = 0; o < 6; o++) {
      var ox = ((o * 160 - scrollX * 0.2) % (GW + 100)) - 50;
      ctx.beginPath();
      ctx.moveTo(ox, 0);
      for (var seg = 0; seg < 5; seg++) {
        ctx.lineTo(ox + Math.sin(seg * 1.2 + frame * 0.01 + o) * 15, seg * (GH / 5));
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawDecorations() {
  for (var i = 0; i < decorations.length; i++) {
    var d = decorations[i];
    var dx = d.x - scrollX;
    if (dx < -60 || dx > GW + 60) continue;

    if (d.type === 'tree') {
      ctx.fillStyle = '#2a1a0a';
      ctx.fillRect(dx + d.size/2 - 3, d.y, 6, d.size * 0.8);
      ctx.fillStyle = '#1a5a1a';
      ctx.beginPath();
      ctx.arc(dx + d.size/2, d.y - d.size * 0.2, d.size * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2a7a2a';
      ctx.beginPath();
      ctx.arc(dx + d.size/2 - 5, d.y, d.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 'pipe') {
      ctx.fillStyle = '#4a4a5a';
      ctx.fillRect(dx, d.y, d.w, d.h);
      ctx.fillStyle = '#5a5a6a';
      ctx.fillRect(dx, d.y, d.w, 3);
      ctx.fillRect(dx, d.y + d.h - 3, d.w, 3);
    } else if (d.type === 'crystal') {
      ctx.fillStyle = 'hsl(' + d.hue + ',50%,40%)';
      ctx.beginPath();
      ctx.moveTo(dx, d.y);
      ctx.lineTo(dx + d.size * 0.4, d.y - d.size);
      ctx.lineTo(dx + d.size * 0.8, d.y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'hsl(' + d.hue + ',60%,60%)';
      ctx.beginPath();
      ctx.moveTo(dx + d.size * 0.2, d.y);
      ctx.lineTo(dx + d.size * 0.4, d.y - d.size * 0.7);
      ctx.lineTo(dx + d.size * 0.5, d.y);
      ctx.closePath();
      ctx.fill();
    } else if (d.type === 'tendril') {
      ctx.strokeStyle = '#5a3a2a';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(dx, d.y);
      for (var s = 1; s <= 5; s++) {
        var sy = d.y + (d.y === 0 ? 1 : -1) * s * d.len / 5;
        var sxo = Math.sin(frame * 0.015 + d.phase + s * 0.8) * 10;
        ctx.lineTo(dx + sxo, sy);
      }
      ctx.stroke();
    }
  }
}

function drawPlatforms() {
  var theme = STAGE_THEMES[stage];
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    var px = p.x - scrollX;
    if (px < -80 || px > GW + 80) continue;
    if (p.ground) {
      ctx.fillStyle = theme.ground;
      ctx.fillRect(px, p.y, p.w, p.h);
      // Top edge detail
      ctx.fillStyle = theme.organic ? '#6a4a3a' : '#4a8a3a';
      ctx.fillRect(px, p.y, p.w, 3);
      // Surface texture
      for (var d = 0; d < 4; d++) {
        ctx.fillStyle = theme.organic ? '#4a2a1a' : '#3a6a2a';
        ctx.fillRect(px + 8 + d * 14, p.y + 6 + (d % 2) * 8, 3, 3);
      }
    } else {
      // Floating platform
      ctx.fillStyle = '#5a7a9a';
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = '#7a9aba';
      ctx.fillRect(px, p.y, p.w, 2);
      ctx.fillStyle = '#3a5a7a';
      ctx.fillRect(px, p.y + p.h - 2, p.w, 2);
    }
  }
}

function drawPlayer() {
  if (!player.alive) return;
  if (player.invTimer > 0 && frame % 4 < 2) return;

  var px = player.x, py = player.y;
  var pw = player.w, ph = player.h;
  if (player.crouching) { py += 8; ph -= 8; }

  var flip = player.facingRight ? 1 : -1;
  var cx = px + pw / 2;

  // Legs with run animation
  ctx.fillStyle = '#2a5a2a';
  var legOffset = Math.sin(player.runFrame) * 3;
  ctx.fillRect(px + 2, py + ph - 5, 4, 5);
  ctx.fillRect(px + pw - 6, py + ph - 5 + (player.grounded ? 0 : legOffset), 4, 5);

  // Body (armor)
  ctx.fillStyle = player.barrier ? '#2a8a8a' : '#3a6a3a';
  ctx.fillRect(px + 1, py + 6, pw - 2, ph - 11);

  // Chest detail
  ctx.fillStyle = player.barrier ? '#4af' : '#5a8a5a';
  ctx.fillRect(px + 3, py + 8, pw - 6, 4);

  // Head (mushroom helmet)
  ctx.fillStyle = '#6a3a2a';
  ctx.beginPath();
  ctx.arc(cx, py + 4, 6, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#8a5a3a';
  ctx.fillRect(px + 2, py + 2, pw - 4, 5);
  // Visor
  ctx.fillStyle = '#2f2';
  ctx.fillRect(cx - 3 + flip * 1, py + 3, 5, 3);

  // Gun arm
  var gunLen = 9;
  var ax = player.aimX, ay = player.aimY;
  var alen = Math.sqrt(ax * ax + ay * ay) || 1;
  var gnx = (ax / alen) * gunLen;
  var gny = (ay / alen) * gunLen;
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx, py + ph / 2 - 3);
  ctx.lineTo(cx + gnx, py + ph / 2 - 3 + gny);
  ctx.stroke();
  // Muzzle
  ctx.fillStyle = '#aaa';
  ctx.beginPath();
  ctx.arc(cx + gnx, py + ph / 2 - 3 + gny, 2, 0, Math.PI * 2);
  ctx.fill();

  // Barrier shield effect
  if (player.barrier) {
    ctx.strokeStyle = '#4ff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.35 + Math.sin(frame * 0.12) * 0.2;
    ctx.beginPath();
    ctx.arc(cx, py + ph / 2, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    var ex = e.x - scrollX;
    if (ex < -30 || ex > GW + 30) continue;

    var baseColor = e.flash > 0 ? '#fff' : getEnemyColor(e.type);
    ctx.fillStyle = baseColor;

    if (e.type === 'grunt') {
      // Fungal humanoid
      ctx.fillRect(ex + 2, e.y + 5, e.w - 4, e.h - 7);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#a44';
      ctx.beginPath();
      ctx.arc(ex + e.w/2, e.y + 4, 7, Math.PI, 0);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ex + 4, e.y + 5, 2, 2);
      ctx.fillRect(ex + e.w - 6, e.y + 5, 2, 2);
    } else if (e.type === 'turret') {
      // Armored turret
      ctx.fillRect(ex, e.y + 5, e.w, e.h - 5);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#777';
      ctx.fillRect(ex + 2, e.y, e.w - 4, 7);
      // Barrel aimed at player
      var ang = player.alive ? Math.atan2(player.y - e.y, player.x - ex) : 0;
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(ex + e.w/2, e.y + e.h/2);
      ctx.lineTo(ex + e.w/2 + Math.cos(ang)*12, e.y + e.h/2 + Math.sin(ang)*12);
      ctx.stroke();
      // HP pips
      ctx.fillStyle = '#f44';
      for (var hp = 0; hp < e.hp; hp++) {
        ctx.fillRect(ex + 2 + hp * 4, e.y - 4, 3, 2);
      }
    } else if (e.type === 'sniper') {
      ctx.fillRect(ex + 3, e.y + 3, e.w - 6, e.h - 3);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#66a';
      ctx.fillRect(ex + 1, e.y, e.w - 2, 5);
      // Laser sight
      if (player.alive) {
        ctx.strokeStyle = '#f00';
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.beginPath();
        ctx.moveTo(ex + e.w/2, e.y + e.h/2);
        ctx.lineTo(player.x + player.w/2, player.y + player.h/2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    } else if (e.type === 'jumper') {
      ctx.fillRect(ex + 1, e.y + 3, e.w - 2, e.h - 5);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#4a4';
      ctx.beginPath();
      ctx.arc(ex + e.w/2, e.y + 4, 6, Math.PI, 0);
      ctx.fill();
      // Spring legs
      ctx.strokeStyle = '#aaa';
      ctx.lineWidth = 2;
      var legComp = Math.sin(e.jumpTimer * 0.1) * 2;
      ctx.beginPath();
      ctx.moveTo(ex + 4, e.y + e.h - 2);
      ctx.lineTo(ex + 4, e.y + e.h + 2 + legComp);
      ctx.moveTo(ex + e.w - 4, e.y + e.h - 2);
      ctx.lineTo(ex + e.w - 4, e.y + e.h + 2 + legComp);
      ctx.stroke();
    } else if (e.type === 'runner') {
      ctx.fillRect(ex + 2, e.y + 4, e.w - 4, e.h - 6);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#f84';
      ctx.beginPath();
      ctx.arc(ex + e.w/2, e.y + 5, 6, Math.PI, 0);
      ctx.fill();
      // Speed trail
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fa4';
      ctx.fillRect(ex - 6 * e.dir, e.y + 8, 5, 3);
      ctx.fillRect(ex - 9 * e.dir, e.y + 12, 6, 2);
      ctx.globalAlpha = 1;
    } else if (e.type === 'flyer') {
      // Spore creature
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#a4f';
      // Tendrils
      for (var t = 0; t < 4; t++) {
        var ta = (t / 4) * Math.PI * 2 + frame * 0.05;
        ctx.fillRect(ex + e.w/2 + Math.cos(ta) * 9, e.y + e.h/2 + Math.sin(ta) * 7, 3, 3);
      }
    } else if (e.type === 'shielder') {
      // Armored fungal warrior
      ctx.fillRect(ex + 2, e.y + 4, e.w - 4, e.h - 6);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#888';
      // Shield on facing side
      var shX = e.dir > 0 ? ex + e.w - 3 : ex - 3;
      ctx.fillRect(shX, e.y + 2, 5, e.h - 4);
      ctx.fillStyle = e.flash > 0 ? '#fff' : '#6a4';
      ctx.beginPath();
      ctx.arc(ex + e.w/2, e.y + 4, 7, Math.PI, 0);
      ctx.fill();
    } else if (e.type === 'bomber') {
      // Flying bomber
      ctx.beginPath();
      ctx.arc(ex + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI * 2);
      ctx.fill();
      // Propeller
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1;
      var propAng = frame * 0.3;
      ctx.beginPath();
      ctx.moveTo(ex + e.w/2 - Math.cos(propAng)*6, e.y - 2);
      ctx.lineTo(ex + e.w/2 + Math.cos(propAng)*6, e.y - 2);
      ctx.stroke();
      // Bomb bay
      ctx.fillStyle = '#444';
      ctx.fillRect(ex + e.w/2 - 3, e.y + e.h - 2, 6, 3);
    }
  }
}

function getEnemyColor(type) {
  var colors = { grunt:'#844', turret:'#555', sniper:'#448', jumper:'#484', runner:'#864', flyer:'#648', shielder:'#686', bomber:'#866' };
  return colors[type] || '#666';
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  var bx = boss.x - scrollX;
  var by = boss.y;
  var bw = boss.w, bh = boss.h;

  // Outer shell - pulsing organic mass
  var pulse = Math.sin(frame * 0.03) * 3;
  ctx.fillStyle = boss.flash > 0 ? '#fcc' : '#623';
  ctx.beginPath();
  ctx.arc(bx + bw/2, by + bh/2, bw/2 + pulse, 0, Math.PI * 2);
  ctx.fill();

  // Inner body segments
  ctx.fillStyle = boss.flash > 0 ? '#faa' : '#834';
  ctx.beginPath();
  ctx.arc(bx + bw/2, by + bh/2, bw/2 - 5, 0, Math.PI * 2);
  ctx.fill();

  // Organic texture bumps
  ctx.fillStyle = '#945';
  for (var t = 0; t < 8; t++) {
    var ta = (t / 8) * Math.PI * 2 + frame * 0.008;
    var tr = bw * 0.35;
    ctx.beginPath();
    ctx.arc(bx + bw/2 + Math.cos(ta) * tr, by + bh/2 + Math.sin(ta) * tr, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Veins/arteries
  ctx.strokeStyle = '#a34';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.5;
  for (var v = 0; v < 4; v++) {
    var va = (v / 4) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(bx + bw/2, by + bh/2);
    ctx.quadraticCurveTo(
      bx + bw/2 + Math.cos(va + frame*0.005) * bw * 0.3,
      by + bh/2 + Math.sin(va + frame*0.005) * bh * 0.3,
      bx + bw/2 + Math.cos(va) * bw * 0.45,
      by + bh/2 + Math.sin(va) * bh * 0.45
    );
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Parts (eyes and core)
  for (var pi = 0; pi < boss.parts.length; pi++) {
    var part = boss.parts[pi];
    if (!part.alive) continue;
    var partX = bx + bw / 2 + part.ox - part.w / 2;
    var partY = by + bh / 2 + part.oy - part.h / 2;

    if (part.type === 'eye') {
      // Menacing eye
      ctx.fillStyle = boss.flash > 0 ? '#fff' : '#f22';
      ctx.beginPath();
      ctx.arc(partX + part.w/2, partY + part.h/2, part.w/2, 0, Math.PI * 2);
      ctx.fill();
      // Iris tracking player
      var angToPlayer = player.alive ? Math.atan2(player.y - partY, player.x - partX) : 0;
      ctx.fillStyle = '#400';
      ctx.beginPath();
      ctx.arc(partX + part.w/2 + Math.cos(angToPlayer)*3, partY + part.h/2 + Math.sin(angToPlayer)*3, part.w/4, 0, Math.PI * 2);
      ctx.fill();
      // HP indicator
      ctx.fillStyle = '#f88';
      var hpW = part.w * (part.hp / part.maxHp);
      ctx.fillRect(partX, partY - 5, hpW, 2);
    } else {
      // Core
      var coreVuln = !boss.parts[0].alive && !boss.parts[1].alive;
      if (coreVuln) {
        ctx.fillStyle = frame % 8 < 4 ? '#f84' : '#ff4';
        ctx.beginPath();
        ctx.arc(partX + part.w/2, partY + part.h/2, part.w/2 + Math.sin(frame*0.1)*2, 0, Math.PI * 2);
        ctx.fill();
        // Glowing outline
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(partX + part.w/2, partY + part.h/2, part.w/2 + 4 + Math.sin(frame*0.12)*3, 0, Math.PI * 2);
        ctx.stroke();
      } else {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(partX + part.w/2, partY + part.h/2, part.w/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#555';
        ctx.font = '7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SEALED', partX + part.w/2, partY + part.h/2 + 3);
      }
    }
  }

  // HP bar
  ctx.fillStyle = '#200';
  ctx.fillRect(bx, by - 14, bw, 8);
  ctx.fillStyle = boss.hp / boss.maxHp > 0.3 ? '#f44' : '#f84';
  ctx.fillRect(bx + 1, by - 13, (bw - 2) * (boss.hp / boss.maxHp), 6);
  ctx.strokeStyle = '#844';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by - 14, bw, 8);
  // Boss name
  ctx.fillStyle = '#faa';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HIVE ' + (boss.phase === 2 ? 'FURY' : boss.phase === 1 ? 'RAGE' : 'MIND'), bx + bw/2, by - 18);
}

function drawBullets() {
  // Player bullets
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    ctx.fillStyle = b.color;
    if (b.laser) {
      // Laser beam trail
      ctx.fillRect(b.x - 8, b.y - 1, 16, 2);
      ctx.globalAlpha = 0.5;
      ctx.fillRect(b.x - 10, b.y - 2, 20, 4);
      ctx.globalAlpha = 1;
    } else if (b.arc) {
      // Fire projectile
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fa4';
      ctx.beginPath();
      ctx.arc(b.x - b.vx * 0.3, b.y - b.vy * 0.3, b.size * 0.7, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Enemy bullets
  for (var j = 0; j < eBullets.length; j++) {
    var eb = eBullets[j];
    if (eb.bomb) {
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.arc(eb.x, eb.y, eb.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(eb.x, eb.y - eb.size, 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(eb.x, eb.y, eb.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f88';
      ctx.beginPath();
      ctx.arc(eb.x, eb.y, eb.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPowerups() {
  for (var i = 0; i < powerups.length; i++) {
    var pu = powerups[i];
    var px = pu.x - scrollX;
    if (px < -20 || px > GW + 20) continue;
    var bob = Math.sin(frame * 0.06 + i * 2) * 3;
    var py = pu.y + bob;

    // Capsule glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = getPowerupColor(pu.type);
    ctx.beginPath();
    ctx.arc(px + pu.w/2, py + pu.h/2, pu.w * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Capsule body
    ctx.fillStyle = '#eee';
    ctx.fillRect(px, py, pu.w, pu.h);
    ctx.fillStyle = getPowerupColor(pu.type);
    ctx.fillRect(px + 2, py + 2, pu.w - 4, pu.h - 4);
    // Letter label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pu.type.charAt(0), px + pu.w / 2, py + pu.h - 2);
  }
}

function getPowerupColor(type) {
  var colors = { SPREAD:'#f84', LASER:'#4af', FIRE:'#f42', RAPID:'#ff4', BARRIER:'#4ff', BOMB:'#f4f' };
  return colors[type] || '#888';
}

function drawExplosions() {
  for (var i = 0; i < explosions.length; i++) {
    var ex = explosions[i];
    var r = ex.size * (1 - ex.life * 0.4);
    ctx.globalAlpha = ex.life;
    ctx.fillStyle = '#f84';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawCombo() {
  if (comboCount > 1 && comboTimer > 0) {
    var alpha = comboTimer / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff4';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(comboCount + 'x COMBO!', GW / 2, 50);
    ctx.fillStyle = '#fa8';
    ctx.font = '10px monospace';
    ctx.fillText('+' + (comboCount * 50) + ' bonus', GW / 2, 64);
    ctx.globalAlpha = 1;
  }
}

function drawWeaponIndicator() {
  if (!player.alive) return;
  var w = 70, h = 12;
  var x = GW / 2 - w / 2, y = GH - 15;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = player.weapon.color;
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = player.weapon.color;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(player.weapon.name, GW / 2, y + h - 2);
}

function drawStageIntro() {
  if (stageIntroTimer <= 0) return;
  var alpha = Math.min(1, stageIntroTimer / 40);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  // Stage number with flair
  ctx.fillStyle = '#ff8844';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 24);

  // Decorative lines
  ctx.strokeStyle = '#f84';
  ctx.lineWidth = 1;
  var lineW = 80 + (140 - stageIntroTimer);
  ctx.beginPath();
  ctx.moveTo(GW/2 - lineW, GH/2 - 8);
  ctx.lineTo(GW/2 + lineW, GH/2 - 8);
  ctx.stroke();

  // Stage name
  ctx.fillStyle = '#ccc';
  ctx.font = '12px monospace';
  ctx.fillText(STAGE_THEMES[stage].name, GW / 2, GH / 2 + 12);

  // Lives remaining
  ctx.fillStyle = '#4a4';
  ctx.font = '9px monospace';
  ctx.fillText('LIVES: ' + lives, GW / 2, GH / 2 + 35);

  ctx.globalAlpha = 1;
}

function drawStageClear() {
  if (!bossDefeated) return;
  var progress = Math.min(1, stageClearTimer / 60);
  ctx.fillStyle = 'rgba(0,0,0,' + (progress * 0.6) + ')';
  ctx.fillRect(0, 0, GW, GH);
  var pulse = Math.sin(frame * 0.08) * 0.2 + 0.8;
  ctx.globalAlpha = pulse * progress;
  ctx.fillStyle = '#4f4';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 14);
  ctx.fillStyle = '#ff4';
  ctx.font = '13px monospace';
  ctx.fillText('+' + (3000 + stage * 1000) + ' BONUS', GW / 2, GH / 2 + 16);
  if (stage < 7) {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('NEXT: ' + STAGE_THEMES[stage + 1].name, GW / 2, GH / 2 + 38);
  } else {
    ctx.fillStyle = '#ff8';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('ALL STAGES COMPLETE!', GW / 2, GH / 2 + 38);
  }
  ctx.globalAlpha = 1;
}

function drawTitle() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, GW, GH);

  // Animated fungal spores background
  for (var i = 0; i < 35; i++) {
    var sx = (i * 53 + frame * 0.35) % GW;
    var sy = (i * 41 + frame * 0.5) % GH;
    ctx.globalAlpha = 0.25 + Math.sin(frame * 0.018 + i * 0.7) * 0.15;
    ctx.fillStyle = i % 4 === 0 ? '#4a2' : i % 4 === 1 ? '#a42' : i % 4 === 2 ? '#2a4' : '#642';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + Math.sin(frame * 0.025 + i) * 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Ground silhouette
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, GH - 30, GW, 30);
  for (var g = 0; g < 12; g++) {
    ctx.fillRect(g * 42, GH - 32 - Math.random() * 4, 40, 4);
  }

  // Title text with glow
  ctx.textAlign = 'center';
  ctx.shadowColor = '#4f4';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#2a8a2a';
  ctx.font = 'bold 30px monospace';
  ctx.fillText('FUNGAL FURY', GW / 2, 68);
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#4fc44f';
  ctx.fillText('FUNGAL FURY', GW / 2, 68);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#886';
  ctx.font = '11px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 90);

  // Decorative divider
  ctx.strokeStyle = '#4a4';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GW/2 - 80, 100);
  ctx.lineTo(GW/2 + 80, 100);
  ctx.stroke();

  // Controls
  ctx.fillStyle = '#777';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS = Move/Aim | Z = Jump | X = Fire', GW / 2, 130);
  ctx.fillText('Aim 8 directions - Crouch with DOWN', GW / 2, 145);
  ctx.fillStyle = '#595';
  ctx.fillText('Collect weapon capsules: S=Spread L=Laser F=Fire R=Rapid', GW / 2, 163);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#aa8';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 192);
  }

  // Stage count
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('8 Stages of Fungal Warfare', GW / 2, 210);

  // Start prompt
  var pulse2 = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#ff8';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 245);
  ctx.globalAlpha = 1;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' | Kills: ' + screenKills });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawDecorations();
  drawPlatforms();
  drawPowerups();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawBullets();
  drawExplosions();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawStageIntro();
  drawStageClear();
  drawCombo();

  // HUD
  TAS.ui.drawHUD(score, stage + 1, lives, GW);
  drawWeaponIndicator();
  TAS.input.drawTouchControls(GW, GH);
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
