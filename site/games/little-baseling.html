<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Little Baseling Dreamworld</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 384, GH = 256;
var TS = 16; // tile size
var COLS = 48, ROWS = 16; // level size in tiles (scrolling)
var GRAVITY = 600;
var MAX_FALL = 350;
var BASE_KEYS = 6;
var ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'ACTION' } });

// === GROK ART LAYER (Little Baseling — reused shared sprite pools) ===
// Player = baseling sprite via TAS.drawBaseling. Enemies/items/scenery/backgrounds
// all reuse the shared art pools (art/toads, art/items, art/scenery, art/backgrounds).
var SPR = { enemy: [], item: {}, tree: [], cloud: [], bg: [] };
(function loadArt() {
  function img(src) { var i = new Image(); i.src = src; return i; }
  // 4 enemy types (Dream Mold / Sleep Spore / Nightmare Fungi / Rot Crawler) -> keyed sprites.
  SPR.enemy = [
    img('art/toads/enemy-slime-mold.png'),   // 0 Dream Mold
    img('art/toads/enemy-will-o-wisp.png'),  // 1 Sleep Spore (floaty)
    img('art/toads/enemy-myconid.png'),      // 2 Nightmare Fungi
    img('art/toads/enemy-rot-walker.png')    // 3 Rot Crawler
  ];
  // Items reuse shared pickups.
  SPR.item = {
    heart: img('art/items/pickup-hp.png'),
    sporecap: img('art/items/coin-eth.png'),
    thread: img('art/items/pickup-magic.png')
  };
  // Shared scenery (trees on ground, clouds in sky band).
  SPR.tree = [img('art/scenery/tree-1.png'), img('art/scenery/tree-2.png')];
  SPR.cloud = [img('art/scenery/cloud-1.png'), img('art/scenery/cloud-2.png')];
  // 7 dream levels -> reused atmospheric backgrounds.
  var bgNames = ['bg-fungal-forest','bg-toadstool-grove','bg-compost-cavern','bg-mire-swamp','bg-fae-court','bg-mushroom-village','bg-barrow-crypt'];
  SPR.bg = bgNames.map(function(n) { return img('art/backgrounds/' + n + '.webp'); });
})();
function sprReady(i) { return !!(i && i.complete && i.naturalWidth > 0); }

// Flattened scenery layer (§7d): bg + trees + clouds baked once per stage into an
// offscreen canvas sized to the whole world; blitted per-frame under the mobile sprites.
var bgScene = document.createElement('canvas');
var bgSceneCtx = bgScene.getContext('2d');
var bgSceneLevel = -1;
var sceneryTrees = [];
function bakeScene(lvl) {
  bgScene.width = COLS * TS;
  bgScene.height = ROWS * TS;
  var b = bgSceneCtx;
  b.clearRect(0, 0, bgScene.width, bgScene.height);
  // Background image (cover, tiled horizontally across the world) + dark dreamy overlay.
  var bg = SPR.bg[lvl] || SPR.bg[0];
  if (sprReady(bg)) {
    var tileW = ROWS * TS * (bg.naturalWidth / bg.naturalHeight);
    for (var x = 0; x < bgScene.width; x += tileW) {
      b.drawImage(bg, x, 0, tileW, ROWS * TS);
    }
    b.fillStyle = 'rgba(10,8,24,0.45)';
    b.fillRect(0, 0, bgScene.width, bgScene.height);
  }
  // Trees along the ground line (seeded so they sit consistently each bake).
  var gseed = lvl * 911 + 7;
  function grng() { gseed = (gseed * 1664525 + 1013904223) & 0x7fffffff; return (gseed & 0xffff) / 0xffff; }
  sceneryTrees = [];
  for (var i = 0; i < 10; i++) {
    var tx = Math.floor(grng() * (COLS - 2) + 1) * TS;
    var tr = SPR.tree[i % 2];
    if (!sprReady(tr)) continue;
    var th = (60 + Math.floor(grng() * 30));
    var tw = th * (tr.naturalWidth / tr.naturalHeight);
    var gy = findGround(Math.floor(tx / TS)) * TS;
    b.globalAlpha = 0.85;
    b.drawImage(tr, Math.floor(tx - tw / 2), Math.floor(gy - th), tw, th);
    b.globalAlpha = 1;
  }
  // Clouds drifting in the sky band.
  for (var c = 0; c < 6; c++) {
    var cl = SPR.cloud[c % 2];
    if (!sprReady(cl)) continue;
    var cw = 40 + Math.floor(grng() * 30);
    var ch = cw * (cl.naturalHeight / cl.naturalWidth);
    var cx = grng() * bgScene.width;
    var cy = 8 + grng() * 50;
    b.globalAlpha = 0.5;
    b.drawImage(cl, Math.floor(cx), Math.floor(cy), cw, ch);
    b.globalAlpha = 1;
  }
  bgSceneLevel = lvl;
}

// === STAT BONUSES (from NftLoader) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Bridge shared baseling stats (getMults, ARCADE-STATS.md) onto statB; helpers read statB live.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[little-baseling] player init failed:', e && e.message); });
}

// Scaled score add — always Math.floor
function addScore(base) { score += Math.floor(base * statB.scoreMult); }

// Keys per level scaled by CHA luck (more luck = fewer keys needed)
function keysNeeded() { return Math.floor(Math.max(3, BASE_KEYS - (statB.luck - 1) * 2)); }

// === GAME STATE ===
var state = 'title';
var frame = 0;
var level = 0;
var score = 0;
var hp = 3;
var maxHp = 3;
var keysCollected = 0;
var keysPerLevel = BASE_KEYS;
var highScore = TAS.score.load('littlebaseling_hi');
var invincTimer = 0;
var levelCompleteTimer = 0;
var deathTimer = 0;
var levelTransTimer = 0;
var candyThrown = [];
var shakeTimer = 0;
var abilityCooldown = 0;
var bgStars = [];
var bgClouds = [];

// Camera
var camX = 0, camY = 0;

// Player
var P = { x: 32, y: 200, vx: 0, vy: 0, w: 10, h: 14, onGround: false, facing: 1, animT: 0, riding: null, jumpHeld: false };

// Animals in current level
var animals = [];
// Enemies in current level
var enemies = [];
// Keys in current level
var keys = [];
// Floating items (hearts, spore gems, mycelium candy)
var items = [];
// Level tile data
var tiles = [];
// Particles for decoration
var floaters = [];
// Door position
var doorX = 0, doorY = 0;
var doorOpen = false;
// Boss state
var boss = null;
var bossFlash = 0;

// Baseling dream creature types
var CREATURE = {
  REACTOR_FROG: 0, MYCELIAL_MOLE: 1, SPORE_BEE: 2, LICHEN_LIZARD: 3, FUNGI_FISH: 4, MOSS_GORILLA: 5
};
var CREATURE_NAMES = ['Reactor Frog', 'Mycelial Mole', 'Spore Bee', 'Lichen Lizard', 'Fungi Fish', 'Moss Gorilla'];
var CREATURE_COLORS = ['#33ff88', '#9b6e4c', '#ffcc00', '#33ddaa', '#44aaff', '#667744'];

// Level themes — Baseling spore dreamscapes
var LEVEL_NAMES = [
  'POOP Hollow',         // mushroom forest - baseling poop garden
  'Garden Canopy',       // flower garden - community garden
  'Mycelium Depths',     // underground - deep spore network
  'Bioluminescent Reef', // night sea - glowing fungal sea
  'Reactor Dream',       // reactor cores pulsing with yield
  'Moss Citadel',        // overgrown baseling fortress
  'Nightmare Mold'       // the final fungal nightmare
];
var LEVEL_BG = ['#1a1c2c', '#1a0f2c', '#0e0e14', '#0a1018', '#101820', '#1a1020', '#1c0a14'];
var LEVEL_FOCUS = [CREATURE.REACTOR_FROG, CREATURE.SPORE_BEE, CREATURE.MYCELIAL_MOLE, CREATURE.FUNGI_FISH, CREATURE.LICHEN_LIZARD, CREATURE.MOSS_GORILLA, -1];

// Tile types
var TILE = { AIR: 0, SOLID: 1, DIRT: 2, WATER: 3, PLATFORM: 4, LADDER: 5, SPIKE: 6, MYCELIUM: 7 };

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  tiles = [];
  animals = [];
  enemies = [];
  keys = [];
  items = [];
  candyThrown = [];
  floaters = [];
  keysCollected = 0;
  doorOpen = false;
  boss = null;
  bossFlash = 0;
  abilityCooldown = 0;

  // Recalculate stat-driven values (CON → HP)
  maxHp = Math.floor(3 * statB.hpMult) + statB.lives;
  if (hp > maxHp) hp = maxHp;
  keysPerLevel = keysNeeded();

  var w = COLS, h = ROWS;
  // Init with air
  for (var y = 0; y < h; y++) {
    tiles[y] = [];
    for (var x = 0; x < w; x++) {
      tiles[y][x] = TILE.AIR;
    }
  }

  // Ground floor
  for (var x = 0; x < w; x++) {
    tiles[h - 1][x] = TILE.SOLID;
    tiles[h - 2][x] = TILE.SOLID;
  }

  // Generate terrain based on level theme
  var seed = lvl * 137 + 42;
  function rng() { seed = (seed * 1664525 + 1013904223) & 0x7fffffff; return (seed & 0xffff) / 0xffff; }

  if (lvl === 0) { // Spore Hollow
    for (var i = 0; i < 12; i++) {
      var px = Math.floor(rng() * (w - 8)) + 4;
      var py = Math.floor(rng() * 8) + 4;
      var pw = Math.floor(rng() * 5) + 3;
      for (var j = 0; j < pw; j++) {
        if (px + j < w) tiles[py][px + j] = TILE.SOLID;
      }
    }
    for (var i = 0; i < 3; i++) {
      var px = Math.floor(rng() * 8) + i * 14 + 3;
      for (var j = 0; j < 4; j++) {
        if (px + j < w) { tiles[h - 2][px + j] = TILE.WATER; tiles[h - 3][px + j] = TILE.WATER; }
      }
    }
    for (var i = 0; i < 5; i++) {
      var lx = Math.floor(rng() * (w - 4)) + 2;
      for (var ly = 4; ly < h - 3; ly++) tiles[ly][lx] = TILE.LADDER;
    }
    // Mycelium patches
    for (var i = 0; i < 6; i++) {
      var mx = Math.floor(rng() * (w - 4)) + 2;
      var my = Math.floor(rng() * 4) + 8;
      if (my < h && mx < w) tiles[my][mx] = TILE.MYCELIUM;
      if (my < h && mx + 1 < w) tiles[my][mx + 1] = TILE.MYCELIUM;
    }
  } else if (lvl === 1) { // Bloom Canopy
    for (var x = 8; x < w - 8; x++) {
      if (rng() > 0.4) { tiles[h - 2][x] = TILE.AIR; }
    }
    for (var i = 0; i < 20; i++) {
      var px = Math.floor(rng() * (w - 6)) + 3;
      var py = Math.floor(rng() * 10) + 3;
      var pw = Math.floor(rng() * 4) + 2;
      for (var j = 0; j < pw; j++) {
        if (px + j < w && py < h) tiles[py][px + j] = TILE.PLATFORM;
      }
    }
    for (var i = 0; i < 6; i++) {
      var px = Math.floor(rng() * 6) + i * 7 + 2;
      var pw = Math.floor(rng() * 3) + 2;
      for (var j = 0; j < pw; j++) {
        if (px + j < w) tiles[h - 2][px + j] = TILE.SOLID;
      }
    }
  } else if (lvl === 2) { // Mycelium Depths
    for (var y = 3; y < h - 2; y++) {
      for (var x = 2; x < w - 2; x++) {
        if (rng() > 0.35) tiles[y][x] = TILE.DIRT;
        else if (rng() > 0.5) tiles[y][x] = TILE.SOLID;
      }
    }
    for (var i = 0; i < 5; i++) {
      var ty = Math.floor(rng() * 8) + 4;
      var tx = Math.floor(rng() * 10) + 2;
      for (var j = 0; j < 12; j++) {
        if (tx + j < w) tiles[ty][tx + j] = TILE.AIR;
        if (ty + 1 < h && tx + j < w) tiles[ty + 1][tx + j] = TILE.AIR;
      }
    }
    for (var y = 3; y < h - 2; y++) { tiles[y][1] = TILE.AIR; tiles[y][2] = TILE.AIR; tiles[y][3] = TILE.AIR; }
    // Mycelium networks
    for (var i = 0; i < 10; i++) {
      var mx = Math.floor(rng() * (w - 4)) + 2;
      var my = Math.floor(rng() * (h - 6)) + 3;
      if (tiles[my][mx] === TILE.DIRT) tiles[my][mx] = TILE.MYCELIUM;
    }
  } else if (lvl === 3) { // Bioluminescent Reef
    for (var y = 5; y < h - 2; y++) {
      for (var x = 0; x < w; x++) {
        tiles[y][x] = TILE.WATER;
      }
    }
    for (var i = 0; i < 8; i++) {
      var px = Math.floor(rng() * 5) + i * 6;
      var pw = Math.floor(rng() * 3) + 2;
      for (var j = 0; j < pw; j++) {
        if (px + j < w) { tiles[4][px + j] = TILE.SOLID; tiles[3][px + j] = TILE.AIR; }
      }
    }
    for (var i = 0; i < 6; i++) {
      var ax = Math.floor(rng() * (w - 4)) + 2;
      var ay = Math.floor(rng() * 5) + 7;
      for (var j = 0; j < 3; j++) { if (ax + j < w && ay < h) tiles[ay][ax + j] = TILE.AIR; }
      if (ay - 1 >= 0) { for (var j = 0; j < 3; j++) { if (ax + j < w) tiles[ay - 1][ax + j] = TILE.AIR; } }
    }
  } else if (lvl === 4) { // Reactor Dream — glowing reactor pipes + platforms
    for (var i = 0; i < 15; i++) {
      var px = Math.floor(rng() * (w - 4)) + 2;
      var py = Math.floor(rng() * 10) + 2;
      var ph = Math.floor(rng() * 5) + 3;
      for (var j = 0; j < ph; j++) {
        if (py + j < h - 2) tiles[py + j][px] = TILE.SOLID;
        if (px + 1 < w && py + j < h - 2) tiles[py + j][px + 1] = TILE.SOLID;
      }
    }
    for (var x = 4; x < w - 4; x++) {
      if (rng() > 0.5) { tiles[1][x] = TILE.SOLID; tiles[2][x] = TILE.SOLID; }
    }
    for (var i = 0; i < 10; i++) {
      var px = Math.floor(rng() * (w - 5)) + 2;
      var py = Math.floor(rng() * 6) + 5;
      for (var j = 0; j < 3; j++) { if (px + j < w) tiles[py][px + j] = TILE.PLATFORM; }
    }
    // Mycelium conduits
    for (var i = 0; i < 8; i++) {
      var mx = Math.floor(rng() * (w - 4)) + 2;
      var my = Math.floor(rng() * 8) + 3;
      if (my < h && mx < w) tiles[my][mx] = TILE.MYCELIUM;
    }
  } else if (lvl === 5) { // Moss Citadel
    for (var y = 0; y < h; y++) {
      for (var x = 0; x < w; x++) {
        if (x % 10 === 0 && y > 1) tiles[y][x] = TILE.SOLID;
      }
    }
    for (var y = 4; y < h - 2; y += 4) {
      for (var x = 0; x < w; x++) {
        if (rng() > 0.3) tiles[y][x] = TILE.SOLID;
      }
    }
    for (var i = 0; i < 10; i++) {
      var lx = Math.floor(rng() * (w - 4)) + 2;
      for (var ly = 1; ly < h - 2; ly++) {
        if (tiles[ly][lx] !== TILE.SOLID) tiles[ly][lx] = TILE.LADDER;
      }
    }
    for (var y = 4; y < h - 2; y += 4) {
      for (var i = 0; i < 5; i++) {
        var gx = Math.floor(rng() * (w - 2)) + 1;
        tiles[y][gx] = TILE.AIR;
        if (gx + 1 < w) tiles[y][gx + 1] = TILE.AIR;
      }
    }
  } else { // Fungal Nightmare
    for (var i = 0; i < 15; i++) {
      var px = Math.floor(rng() * (w - 6)) + 3;
      var py = Math.floor(rng() * 10) + 3;
      var pw = Math.floor(rng() * 5) + 2;
      for (var j = 0; j < pw; j++) { if (px + j < w) tiles[py][px + j] = TILE.SOLID; }
    }
    for (var i = 0; i < 5; i++) {
      var px = Math.floor(rng() * (w - 4)) + 2;
      for (var y = 3; y < h - 3; y++) tiles[y][px] = TILE.LADDER;
    }
    for (var i = 0; i < 4; i++) {
      var px = Math.floor(rng() * 6) + i * 11 + 2;
      for (var j = 0; j < 3; j++) { if (px + j < w) { tiles[h - 3][px + j] = TILE.WATER; tiles[h - 4][px + j] = TILE.WATER; } }
    }
    for (var i = 0; i < 8; i++) {
      var px = Math.floor(rng() * (w - 4)) + 2;
      var py = Math.floor(rng() * 6) + 4;
      for (var j = 0; j < 3; j++) { if (px + j < w) tiles[py][px + j] = TILE.PLATFORM; }
    }
    // Mycelium webs in nightmare
    for (var i = 0; i < 12; i++) {
      var mx = Math.floor(rng() * (w - 4)) + 2;
      var my = Math.floor(rng() * (h - 6)) + 3;
      if (my < h && mx < w && tiles[my][mx] === TILE.AIR) tiles[my][mx] = TILE.MYCELIUM;
    }
  }

  // Ensure start area is clear
  for (var y = h - 5; y < h - 2; y++) {
    for (var x = 0; x < 4; x++) { tiles[y][x] = TILE.AIR; }
  }
  tiles[h - 3][0] = TILE.SOLID;
  tiles[h - 3][1] = TILE.SOLID;

  // Place player
  P.x = 24; P.y = (h - 5) * TS; P.vx = 0; P.vy = 0; P.onGround = false; P.riding = null; P.jumpHeld = false;

  // Place door at far end
  doorX = (w - 3) * TS; doorY = findGround(w - 3) * TS - TS;

  // Place keys — CHA boosts extra key spawns
  // CHA luck → extra key spawns
  var totalKeys = keysPerLevel + Math.floor(Math.max(0, (statB.luck - 1) * 3));
  for (var i = 0; i < totalKeys; i++) {
    var attempts = 0;
    while (attempts < 100) {
      var kx = Math.floor(rng() * (w - 6)) + 3;
      var ky = Math.floor(rng() * (h - 5)) + 1;
      if (getTile(kx, ky) === TILE.AIR || getTile(kx, ky) === TILE.WATER) {
        keys.push({ x: kx * TS + 4, y: ky * TS + 4, w: 8, h: 8, collected: false, bobT: rng() * 6.28 });
        break;
      }
      attempts++;
    }
  }

  // Place creatures (focused creature + 1-2 others in later levels)
  var focusCreature = LEVEL_FOCUS[lvl];
  if (focusCreature >= 0) {
    placeAnimal(focusCreature, rng);
    placeAnimal(focusCreature, rng);
    if (lvl >= 3) { placeAnimal(Math.floor(rng() * 6), rng); }
  } else {
    for (var a = 0; a < 6; a++) placeAnimal(a, rng);
  }

  // Place enemies — more at higher levels
  var enemyCount = 4 + lvl * 2;
  for (var i = 0; i < enemyCount; i++) {
    var attempts = 0;
    while (attempts < 50) {
      var ex = Math.floor(rng() * (w - 8)) + 4;
      var ey = findGround(ex) - 1;
      if (ey > 0 && ey < h - 1) {
        enemies.push({ x: ex * TS, y: ey * TS, w: 12, h: 12, vx: (rng() > 0.5 ? 1 : -1) * (30 + rng() * 40), type: Math.floor(rng() * 4), hp: 1, animT: rng() * 6 });
        break;
      }
      attempts++;
    }
  }

  // Place items: hearts + Baseling items (spore gems, mycelium candy)
  // CHA luck → more heart drops
  var heartCount = Math.floor(3 * statB.luck);
  for (var i = 0; i < heartCount; i++) {
    var hx = Math.floor(rng() * (w - 6)) + 3;
    var hy = Math.floor(rng() * (h - 5)) + 2;
    if (getTile(hx, hy) === TILE.AIR) {
      items.push({ x: hx * TS + 4, y: hy * TS + 4, w: 8, h: 8, type: 'heart' });
    }
  }
  // Spore gems (bonus score)
  for (var i = 0; i < 4; i++) {
    var sx = Math.floor(rng() * (w - 6)) + 3;
    var sy = Math.floor(rng() * (h - 5)) + 2;
    if (getTile(sx, sy) === TILE.AIR) {
      items.push({ x: sx * TS + 4, y: sy * TS + 4, w: 8, h: 8, type: 'sporecap' });
    }
  }
  // Mycelium candy (temporary speed boost)
  for (var i = 0; i < 2; i++) {
    var tx = Math.floor(rng() * (w - 6)) + 3;
    var ty = Math.floor(rng() * (h - 5)) + 2;
    if (getTile(tx, ty) === TILE.AIR) {
      items.push({ x: tx * TS + 4, y: ty * TS + 4, w: 8, h: 8, type: 'thread' });
    }
  }

  // Boss on levels 3, 5, and 6 (Nightmare)
  if (lvl === 3 || lvl === 5 || lvl >= 6) {
    var bx = Math.floor(w * 0.7) * TS;
    var by = findGround(Math.floor(w * 0.7)) * TS - 32;
    boss = {
      x: bx, y: by, w: 24, h: 24, hp: Math.floor(3 + lvl), maxHp: Math.floor(3 + lvl),
      vx: 40, phase: 0, timer: 0, type: lvl >= 6 ? 2 : (lvl === 5 ? 1 : 0),
      flashTimer: 0
    };
  }

  // Generate floating decoration particles (spores)
  for (var i = 0; i < 30; i++) {
    floaters.push({ x: rng() * w * TS, y: rng() * h * TS, speed: 0.2 + rng() * 0.5, size: 1 + rng() * 2, phase: rng() * 6.28, color: i % 3 });
  }

  // Generate background stars for dreamy sky
  bgStars = [];
  for (var i = 0; i < 40; i++) {
    bgStars.push({ x: rng() * GW, y: rng() * (GH * 0.6), size: 1 + Math.floor(rng() * 2), twinkle: rng() * 6.28, speed: 0.3 + rng() * 0.7 });
  }
  // Background clouds
  bgClouds = [];
  for (var i = 0; i < 5; i++) {
    bgClouds.push({ x: rng() * GW * 1.5, y: 10 + rng() * 60, w: 30 + Math.floor(rng() * 40), speed: 3 + rng() * 5 });
  }

  camX = 0; camY = 0;

  // Bake the flattened Grok scenery layer for this level (§7d).
  bakeScene(lvl);
}

function placeAnimal(type, rng) {
  var w = COLS, h = ROWS;
  var attempts = 0;
  while (attempts < 80) {
    var ax = Math.floor(rng() * (w - 8)) + 4;
    var ay = findGround(ax) - 1;
    if (type === CREATURE.FUNGI_FISH) {
      for (var y = 5; y < h - 2; y++) {
        if (getTile(ax, y) === TILE.WATER) { ay = y; break; }
      }
    }
    if (ay > 0 && ay < h - 1) {
      animals.push({ x: ax * TS, y: ay * TS, w: 14, h: 14, type: type, stunned: false, stunTimer: 0, ridden: false, facing: 1, animT: 0 });
      return;
    }
    attempts++;
  }
}

function findGround(col) {
  for (var y = 0; y < ROWS; y++) {
    if (tiles[y] && tiles[y][col] === TILE.SOLID) return y;
  }
  return ROWS - 2;
}

function getTile(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return TILE.SOLID;
  return tiles[row][col];
}

function getTileAt(px, py) {
  return getTile(Math.floor(px / TS), Math.floor(py / TS));
}

function isSolid(col, row) {
  var t = getTile(col, row);
  return t === TILE.SOLID || t === TILE.DIRT;
}

function isPlatform(col, row) {
  return getTile(col, row) === TILE.PLATFORM;
}

// === INPUT HELPERS (CONTROL STANDARD §7c) ===
// Arrows = MOVE (Up/Down also climb ladders / fly / swim). WASD = action cluster:
// W = JUMP, S = down/dismount-with-action, A/D paired with arrows for movement only,
// J/D = ACTION (throw spore treat / creature attack). Legacy Z/X/Space/Shift = hidden alts.
function btnLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.touch.left; }
function btnRight() { return TAS.input.keys['ArrowRight'] || TAS.input.touch.right; }
function btnUp() { return TAS.input.keys['ArrowUp'] || TAS.input.touch.up; }
function btnDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function btnJump() { return TAS.input.keys['KeyW'] || TAS.input.keys['KeyZ'] || TAS.input.keys['Space'] || TAS.input.touch.a; }
function btnAction() { return TAS.input.keys['KeyJ'] || TAS.input.keys['KeyD'] || TAS.input.keys['KeyX'] || TAS.input.keys['ShiftLeft'] || TAS.input.touch.b; }
function btnStart() { return TAS.input.keys['Enter'] || TAS.input.keys['Escape']; }
function btnSelect() { return TAS.input.keys['ShiftRight'] || TAS.input.keys['Tab']; }

var prevJump = false, prevAction = false, prevStart = false;
function jumpPressed() { var b = btnJump(); var r = b && !prevJump; return r; }
function actionPressed() { var b = btnAction(); var r = b && !prevAction; return r; }
function startPressed() { var b = btnStart(); var r = b && !prevStart; return r; }

// === SOUND EFFECTS ===
function sfxCandy() { TAS.audio.playTone(800, 0.08, 'sine', 0.1); TAS.audio.playTone(1200, 0.06, 'sine', 0.08); }
function sfxMount() { TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.12]], 80); }
function sfxDismount() { TAS.audio.playNoise(0.15, 0.08, 800); TAS.audio.playTone(300, 0.1, 'square', 0.06); }
function sfxKey() { TAS.audio.playMelody([[880, 0.06], [1100, 0.06], [1320, 0.1]], 60); }
function sfxHit() { TAS.audio.playTone(200, 0.15, 'square', 0.12, 80); }
function sfxEnemyHit() { TAS.audio.playTone(400, 0.08, 'square', 0.08, 200); }
function sfxLevelClear() { TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]], 150); }
function sfxDeath() { TAS.audio.playMelody([[400, 0.2], [300, 0.2], [200, 0.3]], 200); }
function sfxBossHit() { TAS.audio.playTone(150, 0.2, 'square', 0.15, 60); TAS.audio.playTone(250, 0.1, 'sawtooth', 0.1); }
function sfxSporePop() { TAS.audio.playTone(900, 0.06, 'sine', 0.06); TAS.audio.playTone(1400, 0.04, 'sine', 0.04); }
function sfxThread() { TAS.audio.playMelody([[600, 0.04], [800, 0.04], [1000, 0.06]], 40); }

// Temporary speed boost state
var speedBoostTimer = 0;

// === SPORE TREAT THROW (CHA luck affects max treats, WIS cooldown) ===
function throwCandy() {
  var maxCandy = Math.floor(3 * statB.luck);
  if (candyThrown.length >= maxCandy) return;
  if (abilityCooldown > 0) return;
  sfxCandy();
  abilityCooldown = 0.2 * statB.cooldown;
  candyThrown.push({ x: P.x + (P.facing > 0 ? P.w : 0), y: P.y + 4, vx: Math.floor(P.facing * 200 * statB.speed), vy: -80, life: 1.5 });
}

// === PLAYER PHYSICS (DEX scales speed) ===
function updatePlayer(dt) {
  var baseSpeed = 100;
  var speed = Math.floor(baseSpeed * statB.speed);
  var jumpForce = -260;
  var riding = P.riding;

  // Speed boost
  if (speedBoostTimer > 0) {
    speedBoostTimer -= dt;
    speed = Math.floor(speed * 1.4);
  }

  if (riding) {
    switch (riding.type) {
      case CREATURE.REACTOR_FROG:
        speed = Math.floor(110 * statB.speed);
        jumpForce = -380;
        break;
      case CREATURE.MYCELIAL_MOLE:
        speed = Math.floor(80 * statB.speed);
        jumpForce = -220;
        break;
      case CREATURE.SPORE_BEE:
        speed = Math.floor(90 * statB.speed);
        break;
      case CREATURE.LICHEN_LIZARD:
        speed = Math.floor(140 * statB.speed);
        jumpForce = -260;
        break;
      case CREATURE.FUNGI_FISH:
        speed = Math.floor(100 * statB.speed);
        break;
      case CREATURE.MOSS_GORILLA:
        speed = Math.floor(70 * statB.speed);
        jumpForce = -180;
        break;
    }
  }

  // Horizontal movement
  P.vx = 0;
  if (btnLeft()) { P.vx = -speed; P.facing = -1; }
  if (btnRight()) { P.vx = speed; P.facing = 1; }

  // Special: Spore Bee flying
  if (riding && riding.type === CREATURE.SPORE_BEE) {
    P.vy = 0;
    if (btnUp()) P.vy = -120;
    if (btnDown()) P.vy = 100;
    if (!btnUp() && !btnDown()) P.vy = 20;
    P.x += P.vx * dt;
    P.y += P.vy * dt;
    P.animT += dt;
  }
  // Special: Fungi Fish swimming
  else if (riding && riding.type === CREATURE.FUNGI_FISH) {
    var inWater = getTileAt(P.x + P.w / 2, P.y + P.h / 2) === TILE.WATER;
    if (inWater) {
      P.vy = 0;
      if (btnUp()) P.vy = -120;
      if (btnDown()) P.vy = 100;
      if (!btnUp() && !btnDown()) P.vy = 10;
      P.x += P.vx * dt;
      P.y += P.vy * dt;
    } else {
      applyGravity(dt, jumpForce);
      P.x += P.vx * dt;
      P.y += P.vy * dt;
    }
    P.animT += dt;
  }
  // Special: Lichen Lizard wall cling
  else if (riding && riding.type === CREATURE.LICHEN_LIZARD) {
    var onWall = false;
    var wallDir = 0;
    if (isSolid(Math.floor((P.x - 2) / TS), Math.floor((P.y + P.h / 2) / TS))) { onWall = true; wallDir = -1; }
    if (isSolid(Math.floor((P.x + P.w + 2) / TS), Math.floor((P.y + P.h / 2) / TS))) { onWall = true; wallDir = 1; }

    if (onWall && !P.onGround) {
      P.vy = 20;
      if (btnUp()) P.vy = -100;
      if (btnDown()) P.vy = 60;
      if (jumpPressed()) { P.vy = -280; P.vx = -wallDir * 120; }
    } else {
      applyGravity(dt, jumpForce);
    }
    P.x += P.vx * dt;
    P.y += P.vy * dt;
    P.animT += dt;
  }
  else {
    var onLadder = getTileAt(P.x + P.w / 2, P.y + P.h / 2) === TILE.LADDER;
    if (onLadder && (btnUp() || btnDown())) {
      P.vy = 0;
      if (btnUp()) P.vy = -80;
      if (btnDown()) P.vy = 80;
      P.onGround = true;
    } else {
      applyGravity(dt, jumpForce);
    }

    P.x += P.vx * dt;
    P.y += P.vy * dt;
    P.animT += dt;
  }

  // Mycelial Mole dig (WIS cooldown)
  if (riding && riding.type === CREATURE.MYCELIAL_MOLE && btnAction() && actionPressed()) {
    if (abilityCooldown <= 0) {
      var digX = Math.floor((P.x + P.w / 2 + P.facing * 12) / TS);
      var digY = Math.floor((P.y + P.h / 2) / TS);
      if (digX >= 0 && digX < COLS && digY >= 0 && digY < ROWS && (tiles[digY][digX] === TILE.DIRT || tiles[digY][digX] === TILE.MYCELIUM)) {
        tiles[digY][digX] = TILE.AIR;
        TAS.particles.spawn(digX * TS + 8, digY * TS + 8, '#9b6e4c', 8, 2, { gravity: 1 });
        TAS.audio.playNoise(0.1, 0.06, 400);
        abilityCooldown = 0.4 * statB.cooldown;
      }
    }
  }

  // Mycelium tile — bounce pad
  var footTile = getTileAt(P.x + P.w / 2, P.y + P.h + 1);
  if (footTile === TILE.MYCELIUM && P.onGround) {
    P.vy = -200;
    P.onGround = false;
    TAS.particles.spawn(P.x + P.w / 2, P.y + P.h, '#88ff88', 6, 2, { gravity: -0.5 });
    TAS.audio.playTone(500, 0.06, 'sine', 0.05, 400);
  }

  // Collide with level
  resolveCollision();

  // Water check (not on Fungi Fish)
  if (!riding || riding.type !== CREATURE.FUNGI_FISH) {
    var inWater = getTileAt(P.x + P.w / 2, P.y + P.h) === TILE.WATER;
    if (inWater && (!riding || riding.type !== CREATURE.SPORE_BEE)) {
      if (riding) { dismount(); }
      P.vy = Math.min(P.vy, 40);
      if (btnUp()) P.vy = -60;
    }
  }

  // Spike check
  var spikeTile = getTileAt(P.x + P.w / 2, P.y + P.h);
  if (spikeTile === TILE.SPIKE) takeDamage();

  // Clamp to level bounds
  if (P.x < 0) P.x = 0;
  if (P.x > (COLS - 1) * TS - P.w) P.x = (COLS - 1) * TS - P.w;
  if (P.y < 0) { P.y = 0; P.vy = 0; }
  if (P.y > ROWS * TS) takeDamage();

  // Update camera — smooth follow
  var targetCamX = P.x - GW / 2 + P.w / 2;
  var targetCamY = P.y - GH / 2 + P.h / 2;
  camX += (targetCamX - camX) * 4 * dt;
  camY += (targetCamY - camY) * 4 * dt;
  camX = TAS.math.clamp(camX, 0, COLS * TS - GW);
  camY = TAS.math.clamp(camY, 0, ROWS * TS - GH);
}

function applyGravity(dt, jumpForce) {
  if (P.onGround && jumpPressed()) {
    P.vy = jumpForce;
    P.onGround = false;
    P.jumpHeld = true;
    TAS.audio.playTone(350, 0.06, 'square', 0.05, 500);
  }
  if (!btnJump()) P.jumpHeld = false;
  if (P.jumpHeld && P.vy < 0) {
    P.vy += GRAVITY * 0.5 * dt;
  } else {
    P.vy += GRAVITY * dt;
  }
  if (P.vy > MAX_FALL) P.vy = MAX_FALL;
}

function resolveCollision() {
  P.onGround = false;
  var left = Math.floor(P.x / TS);
  var right = Math.floor((P.x + P.w - 1) / TS);
  var top = Math.floor(P.y / TS);
  var bottom = Math.floor((P.y + P.h - 1) / TS);

  if (P.vy > 0) {
    var footRow = Math.floor((P.y + P.h) / TS);
    for (var col = left; col <= right; col++) {
      if (isSolid(col, footRow) || (isPlatform(col, footRow) && P.y + P.h - P.vy * 0.017 <= footRow * TS)) {
        P.y = footRow * TS - P.h;
        P.vy = 0;
        P.onGround = true;
        break;
      }
    }
  } else if (P.vy < 0) {
    var headRow = Math.floor(P.y / TS);
    for (var col = left; col <= right; col++) {
      if (isSolid(col, headRow)) {
        P.y = (headRow + 1) * TS;
        P.vy = 0;
        break;
      }
    }
  }

  left = Math.floor(P.x / TS);
  right = Math.floor((P.x + P.w - 1) / TS);
  top = Math.floor(P.y / TS);
  bottom = Math.floor((P.y + P.h - 1) / TS);

  if (P.vx > 0) {
    for (var row = top; row <= bottom; row++) {
      if (isSolid(right, row)) {
        P.x = right * TS - P.w;
        break;
      }
    }
  } else if (P.vx < 0) {
    for (var row = top; row <= bottom; row++) {
      if (isSolid(left, row)) {
        P.x = (left + 1) * TS;
        break;
      }
    }
  }
}

// === MOUNTING / DISMOUNTING ===
function mount(animal) {
  P.riding = animal;
  animal.ridden = true;
  P.w = 14; P.h = 14;
  sfxMount();
  TAS.particles.spawn(P.x + P.w / 2, P.y + P.h / 2, CREATURE_COLORS[animal.type], 10, 3);
  TAS.fx.shake(2, 0.9);
}

function dismount() {
  if (!P.riding) return;
  P.riding.ridden = false;
  P.riding.x = P.x;
  P.riding.y = P.y;
  P.riding = null;
  P.w = 10; P.h = 14;
  sfxDismount();
  TAS.particles.spawn(P.x + P.w / 2, P.y + P.h / 2, '#ddeeff', 8, 2);
}

// === DAMAGE (CON affects max HP) ===
function takeDamage() {
  if (invincTimer > 0) return;
  if (P.riding) {
    dismount();
    invincTimer = 1.5 * statB.hpMult;
    TAS.fx.shake(5, 0.85);
    return;
  }
  hp--;
  invincTimer = 2 * statB.hpMult;
  TAS.fx.shake(8, 0.75);
  TAS.fx.flash('#ff0000', 0.4);
  sfxHit();
  if (hp <= 0) {
    deathTimer = 2;
    sfxDeath();
    TAS.fx.shake(12, 0.6);
  }
}

// === ATTACK (STR scales damage, WIS scales cooldown) ===
function doAttack() {
  if (!P.riding) return;
  if (abilityCooldown > 0) return;

  var ax = P.x + (P.facing > 0 ? P.w : -16);
  var ay = P.y - 2;
  var aw = 16, ah = P.h + 4;
  var hitSomething = false;

  // Reactor Frog tongue — longer range (STR scales)
  if (P.riding.type === CREATURE.REACTOR_FROG) { aw = Math.floor(32 * statB.damage); ax = P.x + (P.facing > 0 ? P.w : -aw); }
  // Moss Gorilla — wider, stronger (STR scales)
  if (P.riding.type === CREATURE.MOSS_GORILLA) { aw = Math.floor(20 * statB.damage); ah = Math.floor(18 * statB.damage); }

  var dmg = Math.floor(1 * statB.damage);

  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (TAS.hit.rectOverlap(ax, ay, aw, ah, e.x, e.y, e.w, e.h)) {
      e.hp -= dmg;
      if (e.hp <= 0) {
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#f4b41b', 10, 3, { gravity: 1 });
        sfxEnemyHit();
        enemies.splice(i, 1);
        addScore(100);
        // CHA luck: chance to drop item on kill
        if (Math.random() < statB.luck * 0.15) {
          items.push({ x: e.x + 4, y: e.y + 4, w: 8, h: 8, type: 'sporecap' });
        }
      } else {
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff8844', 4, 2);
      }
      hitSomething = true;
    }
  }

  // Boss hit
  if (boss && TAS.hit.rectOverlap(ax, ay, aw, ah, boss.x, boss.y, boss.w, boss.h)) {
    boss.hp -= dmg;
    boss.flashTimer = 0.15;
    sfxBossHit();
    TAS.fx.shake(6, 0.8);
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff4444', 12, 3, { gravity: 1 });
    if (boss.hp <= 0) {
      addScore(2000);
      TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f4b41b', 25, 5, { gravity: -1 });
      TAS.fx.flash('#ffffff', 0.5);
      TAS.fx.shake(10, 0.6);
      boss = null;
    }
  }

  abilityCooldown = 0.3 * statB.cooldown;

  // Visual feedback
  if (P.riding.type === CREATURE.REACTOR_FROG) {
    TAS.particles.spawn(ax + aw / 2, ay + ah / 2, '#33ff88', 4, 1);
  } else {
    TAS.particles.spawn(ax + aw / 2, ay + ah / 2, CREATURE_COLORS[P.riding.type], 5, 2);
  }
}

// === GAME START ===
function startGame() {
  state = 'playing';
  score = 0;
  maxHp = Math.floor(3 * statB.hpMult) + statB.lives;
  hp = maxHp;
  level = 0;
  speedBoostTimer = 0;
  TAS.particles.clear();
  generateLevel(level);
  levelTransTimer = 1.5;
}

function nextLevel() {
  level++;
  if (level >= 7) {
    state = 'victory';
    if (score > highScore) { highScore = score; TAS.score.save('littlebaseling_hi', score); }
    return;
  }
  generateLevel(level);
  levelTransTimer = 1.5;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  if (abilityCooldown > 0) abilityCooldown -= dt;

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  // Level transition overlay
  if (levelTransTimer > 0) { levelTransTimer -= dt; return; }

  // Death
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      if (hp <= 0) {
        state = 'gameOver';
        if (score > highScore) { highScore = score; TAS.score.save('littlebaseling_hi', score); }
        frame = 0;
      } else {
        generateLevel(level);
      }
    }
    return;
  }

  // Level complete
  if (levelCompleteTimer > 0) {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) nextLevel();
    return;
  }

  // Invincibility
  if (invincTimer > 0) invincTimer -= dt;

  // Player
  updatePlayer(dt);

  // Action button
  var jp = jumpPressed();
  var ap = actionPressed();

  if (ap) {
    if (P.riding) {
      doAttack();
    } else {
      throwCandy();
    }
  }

  // Dismount with down+action
  if (P.riding && btnDown() && ap) {
    dismount();
  }

  // Update candy
  for (var i = candyThrown.length - 1; i >= 0; i--) {
    var c = candyThrown[i];
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.vy += 300 * dt;
    c.life -= dt;
    if (c.life <= 0 || isSolid(Math.floor(c.x / TS), Math.floor(c.y / TS))) {
      TAS.particles.spawn(c.x, c.y, '#a855f7', 5, 2);
      candyThrown.splice(i, 1);
      continue;
    }
    for (var j = 0; j < animals.length; j++) {
      var a = animals[j];
      if (!a.ridden && !a.stunned && TAS.hit.rectOverlap(c.x - 3, c.y - 3, 6, 6, a.x, a.y, a.w, a.h)) {
        a.stunned = true;
        a.stunTimer = 4 * statB.luck;
        TAS.particles.spawn(a.x + a.w / 2, a.y + a.h / 2, '#c084fc', 8, 2);
        TAS.audio.playTone(600, 0.1, 'sine', 0.08);
        candyThrown.splice(i, 1);
        break;
      }
    }
  }

  // Update animals
  for (var i = 0; i < animals.length; i++) {
    var a = animals[i];
    if (a.ridden) continue;
    a.animT += dt;
    if (a.stunned) {
      a.stunTimer -= dt;
      if (a.stunTimer <= 0) a.stunned = false;
      if (TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, a.x, a.y, a.w, a.h) && !P.riding) {
        mount(a);
      }
    } else {
      a.x += Math.sin(a.animT * 1.5) * 0.3 * a.facing;
    }
  }

  // Update enemies
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    e.x += e.vx * dt;
    e.animT += dt;
    var eCol = Math.floor((e.x + (e.vx > 0 ? e.w : 0)) / TS);
    var eRow = Math.floor((e.y + e.h / 2) / TS);
    if (isSolid(eCol, eRow) || e.x < 0 || e.x > (COLS - 1) * TS) {
      e.vx = -e.vx;
    }
    var belowRow = Math.floor((e.y + e.h + 2) / TS);
    var belowCol = Math.floor((e.x + e.w / 2) / TS);
    if (!isSolid(belowCol, belowRow) && getTile(belowCol, belowRow) !== TILE.PLATFORM) {
      if (e.type === 0) e.vx = -e.vx;
    }
    if (invincTimer <= 0 && TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, e.x, e.y, e.w, e.h)) {
      takeDamage();
    }
  }

  // Update boss
  if (boss) {
    boss.timer += dt;
    if (boss.flashTimer > 0) boss.flashTimer -= dt;

    // Boss movement pattern
    boss.x += boss.vx * dt;
    if (boss.x < 4 * TS || boss.x > (COLS - 6) * TS) boss.vx = -boss.vx;

    // Boss phases
    if (boss.type === 0) {
      // Reef Guardian — bounces, spawns bubbles
      boss.y += Math.sin(boss.timer * 2) * 0.8;
    } else if (boss.type === 1) {
      // Moss Colossus — charges at player
      if (Math.floor(boss.timer) % 4 === 0 && boss.phase === 0) {
        boss.vx = (P.x > boss.x ? 1 : -1) * 80;
        boss.phase = 1;
      }
      if (boss.phase === 1 && Math.floor(boss.timer) % 4 === 2) {
        boss.vx = 40 * (boss.vx > 0 ? 1 : -1);
        boss.phase = 0;
      }
    } else {
      // Nightmare Fungus — teleports, spawns spores
      if (Math.floor(boss.timer * 2) % 6 === 0 && boss.phase === 0) {
        boss.phase = 1;
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#aa22ff', 12, 3);
      }
      if (boss.phase === 1 && Math.floor(boss.timer * 2) % 6 === 3) {
        boss.x = P.x + (Math.random() > 0.5 ? 60 : -60);
        boss.y = P.y - 20;
        boss.phase = 0;
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff22aa', 12, 3);
      }
    }

    // Boss hits player
    if (invincTimer <= 0 && TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, boss.x, boss.y, boss.w, boss.h)) {
      takeDamage();
    }
  }

  // Collect keys
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k.collected) continue;
    k.bobT += dt * 3;
    if (TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, k.x, k.y + Math.sin(k.bobT) * 2, k.w, k.h)) {
      k.collected = true;
      keysCollected++;
      addScore(500);
      sfxKey();
      TAS.particles.spawn(k.x + 4, k.y + 4, '#f4b41b', 14, 3, { gravity: -0.5 });
      if (keysCollected >= keysPerLevel) {
        doorOpen = true;
        TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.15]], 100);
        TAS.fx.shake(3, 0.9);
      }
    }
  }

  // Collect items
  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    if (TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, it.x, it.y, it.w, it.h)) {
      if (it.type === 'heart' && hp < maxHp) {
        hp++;
        TAS.audio.playTone(880, 0.1, 'sine', 0.08);
        TAS.particles.spawn(it.x + 4, it.y + 4, '#ff4466', 8, 2);
        items.splice(i, 1);
      } else if (it.type === 'sporecap') {
        addScore(250);
        sfxSporePop();
        TAS.particles.spawn(it.x + 4, it.y + 4, '#88ff44', 8, 2, { gravity: -0.5 });
        items.splice(i, 1);
      } else if (it.type === 'thread') {
        speedBoostTimer = 5 * statB.speed;
        sfxThread();
        TAS.particles.spawn(it.x + 4, it.y + 4, '#44ffcc', 10, 2, { gravity: -0.3 });
        items.splice(i, 1);
      }
    }
  }

  // Check door
  if (doorOpen && TAS.hit.rectOverlap(P.x, P.y, P.w, P.h, doorX, doorY, 16, 16)) {
    levelCompleteTimer = 2;
    addScore(1000);
    sfxLevelClear();
    TAS.particles.spawn(doorX + 8, doorY + 8, '#f4b41b', 25, 4, { gravity: -1 });
    TAS.fx.shake(4, 0.85);
  }

  // Update floaters
  for (var i = 0; i < floaters.length; i++) {
    var f = floaters[i];
    f.y -= f.speed * dt * 20;
    f.phase += dt;
    if (f.y < -10) f.y = ROWS * TS + 10;
  }

  prevJump = btnJump();
  prevAction = btnAction();
  prevStart = btnStart();
}

// === DRAW ===
function draw(dt) {
  var bgColor = LEVEL_BG[level] || '#060a1a';
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Spore Dream ' + (level + 1) + ' - ' + LEVEL_NAMES[level] });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // Dreamy parallax background
  drawDreamBackground();

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  // Flattened Grok scenery layer (bg + trees + clouds), baked once per stage (§7d).
  if (bgSceneLevel !== level) bakeScene(level);
  ctx.drawImage(bgScene, 0, 0);

  // Draw background floaters (spores)
  drawFloaters();

  // Draw tiles
  drawTiles();

  // Draw door
  drawDoor();

  // Draw items
  drawItems();

  // Draw keys
  drawKeys();

  // Draw animals
  drawAnimals();

  // Draw enemies
  drawEnemies();

  // Draw boss
  if (boss) drawBoss();

  // Draw player
  drawPlayer();

  // Draw candy
  drawCandy();

  // Particles
  ctx.translate(Math.floor(camX), Math.floor(camY));
  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Level transition overlay
  if (levelTransTimer > 0) {
    var alpha = levelTransTimer / 1.5;
    ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Spore Dream ' + (level + 1), GW / 2, GH / 2 - 20);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '11px monospace';
    ctx.fillText(LEVEL_NAMES[level], GW / 2, GH / 2);
    if (LEVEL_FOCUS[level] >= 0) {
      ctx.fillStyle = CREATURE_COLORS[LEVEL_FOCUS[level]];
      ctx.fillText('Your baseling must befriend the ' + CREATURE_NAMES[LEVEL_FOCUS[level]] + '!', GW / 2, GH / 2 + 18);
    } else {
      ctx.fillStyle = '#a855f7';
      ctx.fillText('All spore creatures roam free!', GW / 2, GH / 2 + 18);
    }
    if (boss) {
      ctx.fillStyle = '#ff4444';
      ctx.font = '9px monospace';
      ctx.fillText('A great nightmare mold guards this dream...', GW / 2, GH / 2 + 34);
    }
  }

  // Level complete overlay
  if (levelCompleteTimer > 0) {
    ctx.fillStyle = 'rgba(255,255,200,0.15)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('SPORE DREAM CLEAR!', GW / 2, GH / 2 - 10);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    var bonusPts = Math.floor(1000 * statB.scoreMult);
    ctx.fillText('+' + bonusPts + ' POOP tokens', GW / 2, GH / 2 + 10);
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAWING HELPERS ===

// Dreamy parallax background — stars and clouds
function drawDreamBackground() {
  var t = frame * 0.015;
  // Stars
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var twinkle = Math.sin(t * s.speed + s.twinkle) * 0.4 + 0.6;
    ctx.globalAlpha = twinkle * 0.5;
    ctx.fillStyle = i % 3 === 0 ? '#aaccff' : (i % 3 === 1 ? '#ffddaa' : '#ddddff');
    ctx.fillRect(Math.floor(s.x - camX * 0.05) % GW, Math.floor(s.y), s.size, s.size);
  }
  // Clouds (parallax)
  ctx.globalAlpha = 0.08;
  for (var i = 0; i < bgClouds.length; i++) {
    var c = bgClouds[i];
    var cx = (c.x - camX * 0.1 + frame * 0.1 * c.speed * 0.1) % (GW + c.w * 2) - c.w;
    ctx.fillStyle = level === 4 ? '#38d973' : (level >= 6 ? '#7a444a' : '#a855f7');
    ctx.fillRect(Math.floor(cx), Math.floor(c.y), c.w, 6);
    ctx.fillRect(Math.floor(cx) + 4, Math.floor(c.y) - 3, c.w - 8, 4);
  }
  ctx.globalAlpha = 1;
}

    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 115;
    ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = GH - 22;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 4);

function drawTiles() {
  var startCol = Math.floor(camX / TS);
  var endCol = Math.ceil((camX + GW) / TS) + 1;
  var startRow = Math.floor(camY / TS);
  var endRow = Math.ceil((camY + GH) / TS) + 1;

  for (var y = startRow; y < endRow && y < ROWS; y++) {
    for (var x = startCol; x < endCol && x < COLS; x++) {
      if (y < 0 || x < 0) continue;
      var t = tiles[y][x];
      var px = x * TS, py = y * TS;
      switch (t) {
        case TILE.SOLID:
          ctx.fillStyle = getLevelTileColor(0);
          ctx.fillRect(px, py, TS, TS);
          ctx.fillStyle = getLevelTileColor(1);
          ctx.fillRect(px, py, TS, 1);
          ctx.fillRect(px, py, 1, TS);
          break;
        case TILE.DIRT:
          ctx.fillStyle = '#5b3216';
          ctx.fillRect(px, py, TS, TS);
          ctx.fillStyle = '#7b4e2c';
          ctx.fillRect(px + 2, py + 2, 3, 3);
          ctx.fillRect(px + 9, py + 7, 4, 3);
          ctx.fillRect(px + 4, py + 11, 3, 2);
          // Speckles
          ctx.fillStyle = '#9b6e4c';
          ctx.fillRect(px + 7, py + 3, 2, 2);
          ctx.fillRect(px + 1, py + 9, 2, 2);
          break;
        case TILE.WATER:
          ctx.fillStyle = 'rgba(20,60,160,0.6)';
          ctx.fillRect(px, py, TS, TS);
          ctx.fillStyle = 'rgba(60,140,255,0.3)';
          ctx.fillRect(px, py, TS, 2);
          var wave = Math.sin(frame * 0.08 + x * 0.5) * 2;
          ctx.fillStyle = 'rgba(100,200,255,0.25)';
          ctx.fillRect(px, py + wave + 4, TS, 1);
          // Bioluminescent glow in reef level
          if (level === 3) {
            ctx.globalAlpha = 0.08 + Math.sin(frame * 0.04 + x * 0.3 + y * 0.2) * 0.05;
            ctx.fillStyle = '#44ffaa';
            ctx.fillRect(px, py, TS, TS);
            ctx.globalAlpha = 1;
          }
          break;
        case TILE.PLATFORM:
          ctx.fillStyle = getLevelTileColor(2);
          ctx.fillRect(px, py, TS, 4);
          ctx.fillStyle = getLevelTileColor(3);
          ctx.fillRect(px, py, TS, 1);
          break;
        case TILE.LADDER:
          ctx.fillStyle = '#886633';
          ctx.fillRect(px + 2, py, 2, TS);
          ctx.fillRect(px + TS - 4, py, 2, TS);
          ctx.fillRect(px + 2, py + 6, TS - 4, 2);
          ctx.fillRect(px + 2, py + 12, TS - 4, 2);
          break;
        case TILE.SPIKE:
          ctx.fillStyle = '#cc3333';
          for (var s = 0; s < 4; s++) {
            ctx.beginPath();
            ctx.moveTo(px + s * 4, py + TS);
            ctx.lineTo(px + s * 4 + 2, py + 6);
            ctx.lineTo(px + s * 4 + 4, py + TS);
            ctx.fill();
          }
          break;
        case TILE.MYCELIUM:
          // Glowing mycelium network tile
          ctx.fillStyle = '#1a3a1a';
          ctx.fillRect(px, py, TS, TS);
          var glow = Math.sin(frame * 0.06 + x * 0.4 + y * 0.3) * 0.3 + 0.7;
          ctx.globalAlpha = glow * 0.6;
          ctx.fillStyle = '#44ff88';
          ctx.fillRect(px + 2, py + 6, TS - 4, 3);
          ctx.fillRect(px + 5, py + 2, 3, TS - 4);
          // Node dots
          ctx.fillStyle = '#88ffaa';
          ctx.fillRect(px + 6, py + 7, 3, 3);
          ctx.globalAlpha = 1;
          break;
      }
    }
  }
}

function getLevelTileColor(variant) {
  var colors = [
    ['#1a4a2a', '#2a6a3a', '#124418', '#339944'], // Spore Hollow
    ['#4a1a4a', '#6a3a6a', '#331144', '#994499'], // Bloom Canopy
    ['#2a2a2a', '#444444', '#181818', '#555555'], // Mycelium Depths
    ['#0a2a4a', '#1a4a7a', '#081833', '#336699'], // Bioluminescent Reef
    ['#1a3a2a', '#2a5a4a', '#0a2218', '#44886a'], // Reactor Dream (green-teal glow)
    ['#3a2a1a', '#5a4a3a', '#221808', '#887744'], // Moss Citadel
    ['#2a0a1a', '#4a1a3a', '#180008', '#771144'], // Fungal Nightmare
  ];
  var l = TAS.math.clamp(level, 0, 6);
  return colors[l][variant];
}

function drawDoor() {
  var pulse = Math.sin(frame * 0.06) * 0.2 + 0.8;
  if (doorOpen) {
    // Glowing portal
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = pulse * 0.4;
    ctx.fillRect(doorX - 3, doorY - 3, 22, 22);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(doorX - 1, doorY - 1, 18, 18);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffaa00';
  } else {
    ctx.fillStyle = '#444444';
  }
  ctx.fillRect(doorX, doorY, 16, 16);
  ctx.fillStyle = doorOpen ? '#fff' : '#333';
  ctx.fillRect(doorX + 3, doorY + 2, 10, 12);
  ctx.fillStyle = doorOpen ? '#ffdd44' : '#666';
  ctx.fillRect(doorX + 11, doorY + 7, 2, 2);
  if (!doorOpen) {
    ctx.fillStyle = '#886600';
    ctx.fillRect(doorX + 5, doorY + 5, 6, 6);
    ctx.fillStyle = '#443300';
    ctx.fillRect(doorX + 7, doorY + 7, 2, 3);
  }
}

function drawKeys() {
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    if (k.collected) continue;
    var bob = Math.sin(k.bobT) * 2;
    var glow = Math.sin(frame * 0.08 + i) * 0.2 + 0.8;
    ctx.globalAlpha = glow;
    // Glow aura
    ctx.fillStyle = 'rgba(244,180,27,0.2)';
    ctx.fillRect(k.x - 1, k.y + bob - 1, 10, 12);
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(k.x + 1, k.y + bob, 6, 3);
    ctx.fillRect(k.x, k.y + bob + 1, 2, 5);
    ctx.fillRect(k.x + 4, k.y + bob + 3, 3, 2);
    ctx.fillRect(k.x + 4, k.y + bob + 6, 3, 2);
    ctx.globalAlpha = 1;
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var bob = Math.sin(frame * 0.05 + i * 2) * 2;
    // Grok pickup sprite (centered on the item rect); procedural fallback below.
    var _is = SPR.item[it.type];
    if (sprReady(_is)) {
      var _sz = 14;
      ctx.drawImage(_is, Math.floor(it.x + it.w / 2 - _sz / 2), Math.floor(it.y + bob + it.h / 2 - _sz / 2), _sz, _sz);
      continue;
    }
    if (it.type === 'heart') {
      ctx.fillStyle = '#ff4466';
      ctx.fillRect(it.x + 1, it.y + bob, 2, 2);
      ctx.fillRect(it.x + 4, it.y + bob, 2, 2);
      ctx.fillRect(it.x, it.y + bob + 2, 7, 3);
      ctx.fillRect(it.x + 1, it.y + bob + 5, 5, 2);
      ctx.fillRect(it.x + 2, it.y + bob + 7, 3, 1);
    } else if (it.type === 'sporecap') {
      // Mushroom cap
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(it.x + 1, it.y + bob, 6, 4);
      ctx.fillStyle = '#88ff88';
      ctx.fillRect(it.x + 2, it.y + bob + 1, 2, 2);
      // Stem
      ctx.fillStyle = '#ddddaa';
      ctx.fillRect(it.x + 3, it.y + bob + 4, 2, 4);
    } else if (it.type === 'thread') {
      // Mycelium thread (glowing)
      var tGlow = Math.sin(frame * 0.1 + i) * 0.3 + 0.7;
      ctx.globalAlpha = tGlow;
      ctx.fillStyle = '#44ffcc';
      ctx.fillRect(it.x + 1, it.y + bob + 2, 6, 2);
      ctx.fillRect(it.x + 3, it.y + bob, 2, 6);
      ctx.fillStyle = '#88ffdd';
      ctx.fillRect(it.x + 3, it.y + bob + 2, 2, 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawAnimals() {
  for (var i = 0; i < animals.length; i++) {
    var a = animals[i];
    if (a.ridden) continue;
    var color = CREATURE_COLORS[a.type];
    var blink = a.stunned ? (Math.floor(frame * 0.2) % 2 === 0) : false;

    if (blink) { ctx.globalAlpha = 0.5; }
    ctx.fillStyle = color;

    switch (a.type) {
      case CREATURE.REACTOR_FROG:
        // Body with reactor spots
        ctx.fillRect(a.x + 2, a.y + 4, 10, 8);
        ctx.fillStyle = '#22cc66';
        ctx.fillRect(a.x + 4, a.y + 6, 3, 3);
        ctx.fillStyle = color;
        // Eyes (larger, more expressive)
        ctx.fillRect(a.x + 1, a.y + 1, 5, 4);
        ctx.fillRect(a.x + 8, a.y + 1, 5, 4);
        ctx.fillStyle = '#fff';
        ctx.fillRect(a.x + 2, a.y + 2, 3, 2);
        ctx.fillRect(a.x + 9, a.y + 2, 3, 2);
        ctx.fillStyle = '#111';
        ctx.fillRect(a.x + 3, a.y + 2, 1, 2);
        ctx.fillRect(a.x + 10, a.y + 2, 1, 2);
        // Legs
        ctx.fillStyle = color;
        ctx.fillRect(a.x, a.y + 10, 4, 4);
        ctx.fillRect(a.x + 10, a.y + 10, 4, 4);
        // Reactor glow spot
        ctx.globalAlpha = Math.sin(frame * 0.1) * 0.3 + 0.5;
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(a.x + 5, a.y + 7, 2, 2);
        ctx.globalAlpha = blink ? 0.5 : 1;
        break;
      case CREATURE.MYCELIAL_MOLE:
        // Body
        ctx.fillRect(a.x + 2, a.y + 3, 10, 10);
        // Nose
        ctx.fillStyle = '#ffaaaa';
        ctx.fillRect(a.x + 6, a.y + 8, 3, 3);
        // Eyes
        ctx.fillStyle = '#111';
        ctx.fillRect(a.x + 4, a.y + 5, 2, 2);
        ctx.fillRect(a.x + 9, a.y + 5, 2, 2);
        // Mycelium-infused claws (glowing tips)
        ctx.fillStyle = '#ddd';
        ctx.fillRect(a.x, a.y + 11, 3, 3);
        ctx.fillRect(a.x + 11, a.y + 11, 3, 3);
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(a.x, a.y + 13, 3, 1);
        ctx.fillRect(a.x + 11, a.y + 13, 3, 1);
        break;
      case CREATURE.SPORE_BEE:
        // Body stripes (golden + dark)
        ctx.fillRect(a.x + 3, a.y + 4, 8, 8);
        ctx.fillStyle = '#332200';
        ctx.fillRect(a.x + 3, a.y + 6, 8, 2);
        ctx.fillRect(a.x + 3, a.y + 10, 8, 2);
        // Wings (translucent, animated)
        var wingBob = Math.sin(frame * 0.4) * 2;
        ctx.fillStyle = 'rgba(200,255,220,0.5)';
        ctx.fillRect(a.x + 1, a.y + 1 + wingBob, 5, 4);
        ctx.fillRect(a.x + 8, a.y + 1 - wingBob, 5, 4);
        // Spore dust trail
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ffff88';
        ctx.fillRect(a.x + 5 + Math.sin(frame * 0.2) * 2, a.y + 12, 2, 2);
        ctx.globalAlpha = blink ? 0.5 : 1;
        // Eyes
        ctx.fillStyle = '#111';
        ctx.fillRect(a.x + 5, a.y + 4, 2, 2);
        ctx.fillRect(a.x + 8, a.y + 4, 2, 2);
        break;
      case CREATURE.LICHEN_LIZARD:
        // Body
        ctx.fillRect(a.x + 1, a.y + 5, 12, 6);
        // Head
        ctx.fillRect(a.x + 10, a.y + 3, 4, 5);
        // Tail (with lichen pattern)
        ctx.fillRect(a.x - 2, a.y + 7, 4, 3);
        ctx.fillStyle = '#22bb88';
        ctx.fillRect(a.x - 1, a.y + 8, 2, 1);
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(a.x + 11, a.y + 4, 2, 2);
        ctx.fillStyle = '#ff4400';
        ctx.fillRect(a.x + 12, a.y + 4, 1, 1);
        // Legs
        ctx.fillStyle = color;
        ctx.fillRect(a.x + 2, a.y + 11, 2, 3);
        ctx.fillRect(a.x + 9, a.y + 11, 2, 3);
        break;
      case CREATURE.FUNGI_FISH:
        // Body
        ctx.fillRect(a.x + 3, a.y + 4, 10, 7);
        // Tail
        ctx.fillRect(a.x, a.y + 5, 4, 5);
        // Bioluminescent spots
        ctx.fillStyle = '#88ddff';
        ctx.fillRect(a.x + 5, a.y + 6, 2, 2);
        ctx.fillRect(a.x + 8, a.y + 8, 2, 2);
        // Eye
        ctx.fillStyle = '#fff';
        ctx.fillRect(a.x + 10, a.y + 5, 3, 3);
        ctx.fillStyle = '#111';
        ctx.fillRect(a.x + 11, a.y + 6, 2, 2);
        // Fin
        ctx.fillStyle = color;
        ctx.fillRect(a.x + 6, a.y + 2, 4, 3);
        break;
      case CREATURE.MOSS_GORILLA:
        // Body (big)
        ctx.fillRect(a.x + 2, a.y + 2, 10, 12);
        // Arms (thick)
        ctx.fillRect(a.x - 1, a.y + 5, 3, 8);
        ctx.fillRect(a.x + 12, a.y + 5, 3, 8);
        // Mossy shoulders
        ctx.fillStyle = '#88aa44';
        ctx.fillRect(a.x + 1, a.y + 2, 3, 2);
        ctx.fillRect(a.x + 10, a.y + 2, 3, 2);
        // Face
        ctx.fillStyle = '#997744';
        ctx.fillRect(a.x + 4, a.y + 3, 6, 5);
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(a.x + 4, a.y + 4, 2, 2);
        ctx.fillRect(a.x + 8, a.y + 4, 2, 2);
        ctx.fillStyle = '#111';
        ctx.fillRect(a.x + 5, a.y + 4, 1, 2);
        ctx.fillRect(a.x + 9, a.y + 4, 1, 2);
        break;
    }
    ctx.globalAlpha = 1;

    // Stunned indicator (spore sparkles)
    if (a.stunned) {
      ctx.fillStyle = '#f4b41b';
      var starOffset = Math.sin(frame * 0.15) * 3;
      ctx.fillRect(a.x + 3 + starOffset, a.y - 3, 2, 2);
      ctx.fillRect(a.x + 9 - starOffset, a.y - 4, 2, 2);
      ctx.fillRect(a.x + 6, a.y - 5 + Math.cos(frame * 0.1), 2, 2);
    }
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var bounce = Math.sin(e.animT * 4) * 2;

    // Grok enemy sprite (anchored at feet, flipped by movement direction); procedural fallback.
    var _es = SPR.enemy[e.type];
    if (sprReady(_es)) {
      var _eh = e.h + 6;
      var _ew = _eh * (_es.naturalWidth / _es.naturalHeight);
      ctx.save();
      ctx.translate(Math.floor(e.x + e.w / 2), Math.floor(e.y + e.h + bounce));
      if (e.vx < 0) ctx.scale(-1, 1);
      ctx.drawImage(_es, -_ew / 2, -_eh, _ew, _eh);
      ctx.restore();
      continue;
    }

    switch (e.type) {
      case 0: // Dream Mold
        ctx.fillStyle = '#88cc44';
        ctx.fillRect(e.x + 1, e.y + 4 + bounce, 10, 8);
        ctx.fillRect(e.x + 3, e.y + 2 + bounce, 6, 4);
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 5 + bounce, 2, 2);
        ctx.fillRect(e.x + 7, e.y + 5 + bounce, 2, 2);
        ctx.fillStyle = '#111';
        ctx.fillRect(e.x + 4, e.y + 5 + bounce, 1, 1);
        ctx.fillRect(e.x + 8, e.y + 5 + bounce, 1, 1);
        break;
      case 1: // Sleep Spore
        ctx.globalAlpha = 0.65;
        ctx.fillStyle = '#aaddcc';
        ctx.fillRect(e.x + 1, e.y + 2, 10, 8);
        ctx.fillRect(e.x + 3, e.y, 6, 4);
        ctx.fillRect(e.x + 1, e.y + 10, 3, 2);
        ctx.fillRect(e.x + 5, e.y + 10, 3, 2);
        ctx.fillRect(e.x + 9, e.y + 10, 3, 2);
        ctx.fillStyle = '#224';
        ctx.fillRect(e.x + 3, e.y + 4, 2, 3);
        ctx.fillRect(e.x + 7, e.y + 4, 2, 3);
        // Spore trail
        ctx.fillStyle = '#88ff88';
        ctx.fillRect(e.x + 5, e.y + 12, 2, 2);
        ctx.globalAlpha = 1;
        break;
      case 2: // Nightmare Fungi
        ctx.fillStyle = '#ff6622';
        ctx.fillRect(e.x + 2, e.y + 3, 8, 8);
        ctx.fillStyle = '#ffaa44';
        ctx.fillRect(e.x + 4, e.y + 1, 4, 4);
        ctx.fillStyle = '#ffdd88';
        ctx.fillRect(e.x + 4, e.y + 5, 4, 3);
        if (frame % 4 < 2) {
          ctx.fillStyle = '#ff4400';
          ctx.fillRect(e.x + 3, e.y - 1, 2, 3);
          ctx.fillRect(e.x + 7, e.y - 2, 2, 4);
        }
        break;
      case 3: // Rot Crawler
        ctx.fillStyle = '#666644';
        ctx.fillRect(e.x + 1, e.y + 5, 10, 6);
        // Legs (animated)
        var legPhase = Math.sin(e.animT * 6);
        ctx.fillRect(e.x, e.y + 10 + legPhase, 2, 3);
        ctx.fillRect(e.x + 4, e.y + 10 - legPhase, 2, 3);
        ctx.fillRect(e.x + 8, e.y + 10 + legPhase, 2, 3);
        // Eyes
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(e.x + 3, e.y + 6, 2, 2);
        ctx.fillRect(e.x + 7, e.y + 6, 2, 2);
        // Antennae
        ctx.fillStyle = '#888866';
        ctx.fillRect(e.x + 3, e.y + 3, 1, 3);
        ctx.fillRect(e.x + 8, e.y + 3, 1, 3);
        break;
    }
  }
}

function drawBoss() {
  if (!boss) return;
  var b = boss;
  var pulse = Math.sin(frame * 0.08) * 3;

  if (b.flashTimer > 0) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x - 2, b.y - 2, b.w + 4, b.h + 4);
    ctx.globalAlpha = 1;
  }

  if (b.type === 0) {
    // Reef Guardian — glowing jellyfish boss
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(b.x + 2, b.y + 2 + pulse, b.w - 4, b.h - 8);
    ctx.fillStyle = '#88ccff';
    ctx.fillRect(b.x + 4, b.y + 4 + pulse, b.w - 8, b.h - 12);
    // Tentacles
    ctx.fillStyle = '#4488ff';
    for (var t = 0; t < 4; t++) {
      var tx = b.x + 4 + t * 5;
      var ty = b.y + b.h - 6 + Math.sin(frame * 0.1 + t) * 3;
      ctx.fillRect(tx, ty, 2, 6);
    }
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x + 6, b.y + 8 + pulse, 4, 4);
    ctx.fillRect(b.x + 14, b.y + 8 + pulse, 4, 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(b.x + 7, b.y + 9 + pulse, 2, 2);
    ctx.fillRect(b.x + 15, b.y + 9 + pulse, 2, 2);
  } else if (b.type === 1) {
    // Moss Colossus — hulking mossy beast
    ctx.fillStyle = '#556633';
    ctx.fillRect(b.x + 2, b.y + 4, b.w - 4, b.h - 4);
    ctx.fillStyle = '#667744';
    ctx.fillRect(b.x, b.y + 8, b.w, b.h - 8);
    // Arms
    ctx.fillRect(b.x - 4, b.y + 10, 5, 10);
    ctx.fillRect(b.x + b.w - 1, b.y + 10, 5, 10);
    // Mossy top
    ctx.fillStyle = '#88aa44';
    ctx.fillRect(b.x + 4, b.y, b.w - 8, 6);
    ctx.fillRect(b.x + 6, b.y - 2, b.w - 12, 4);
    // Eyes
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(b.x + 6, b.y + 8, 4, 3);
    ctx.fillRect(b.x + 14, b.y + 8, 4, 3);
  } else {
    // Nightmare Mold — shifting, terrifying
    var shift = Math.sin(frame * 0.06) * 2;
    ctx.fillStyle = '#661144';
    ctx.fillRect(b.x + shift, b.y + 2, b.w, b.h - 2);
    ctx.fillStyle = '#882266';
    ctx.fillRect(b.x + 4 - shift, b.y, b.w - 8, b.h);
    // Pulsing cap
    ctx.fillStyle = '#aa3388';
    ctx.fillRect(b.x + 2, b.y - 4 + pulse, b.w - 4, 8);
    // Eyes (multiple, unsettling)
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(b.x + 5 + shift, b.y + 6, 3, 3);
    ctx.fillRect(b.x + 16 - shift, b.y + 8, 3, 3);
    ctx.fillRect(b.x + 10, b.y + 4 + shift, 2, 2);
    // Dripping spores
    ctx.fillStyle = '#ff88cc';
    ctx.fillRect(b.x + 4, b.y + b.h - 2 + Math.sin(frame * 0.15) * 2, 2, 3);
    ctx.fillRect(b.x + 14, b.y + b.h + Math.cos(frame * 0.12) * 2, 2, 3);
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(b.x, b.y - 8, b.w, 3);
  ctx.fillStyle = '#ff4444';
  var hpFrac = Math.max(0, b.hp / b.maxHp);
  ctx.fillRect(b.x, b.y - 8, Math.floor(b.w * hpFrac), 3);
}

function drawPlayer() {
  if (deathTimer > 0) {
    ctx.globalAlpha = Math.sin(frame * 0.3) * 0.5 + 0.5;
  } else if (invincTimer > 0) {
    if (Math.floor(frame * 0.2) % 2) ctx.globalAlpha = 0.4;
  }

  var px = Math.floor(P.x), py = Math.floor(P.y);

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, px + P.w / 2, py + P.h / 2, Math.max(P.w, P.h), { flipX: P.facing < 0, frame: frame })) {
    if (P.riding) {
      var color = CREATURE_COLORS[P.riding.type];
      ctx.fillStyle = color;
      ctx.fillRect(px, py + 4, P.w, P.h - 4);

      switch (P.riding.type) {
        case CREATURE.REACTOR_FROG:
          ctx.fillRect(px + (P.facing > 0 ? 8 : -2), py + 1, 6, 5);
          ctx.fillStyle = '#fff';
          ctx.fillRect(px + (P.facing > 0 ? 10 : 0), py + 2, 2, 2);
          // Reactor glow
          ctx.globalAlpha = Math.sin(frame * 0.1) * 0.3 + 0.4;
          ctx.fillStyle = '#88ffaa';
          ctx.fillRect(px + 4, py + 8, 4, 3);
          ctx.globalAlpha = (invincTimer > 0 && Math.floor(frame * 0.2) % 2) ? 0.4 : 1;
          break;
        case CREATURE.SPORE_BEE:
          ctx.fillStyle = '#332200';
          ctx.fillRect(px + 2, py + 7, P.w - 4, 2);
          ctx.fillStyle = 'rgba(200,255,220,0.45)';
          ctx.fillRect(px + 2, py - 2 + Math.sin(frame * 0.4) * 2, 5, 4);
          ctx.fillRect(px + 7, py - 2 - Math.sin(frame * 0.4) * 2, 5, 4);
          break;
        case CREATURE.MOSS_GORILLA:
          ctx.fillRect(px - 2, py + 6, 3, 8);
          ctx.fillRect(px + P.w - 1, py + 6, 3, 8);
          ctx.fillStyle = '#88aa44';
          ctx.fillRect(px + 1, py + 3, 3, 2);
          ctx.fillRect(px + P.w - 4, py + 3, 3, 2);
          break;
        default:
          ctx.fillRect(px + (P.facing > 0 ? P.w - 3 : 0), py + 2, 4, 4);
          break;
      }

      // Baseling riding on top
      ctx.fillStyle = '#ffddbb';
      ctx.fillRect(px + 3, py - 4, 5, 5);
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(px + 3, py + 1, 5, 3);
      // Spore cap (pointy mushroom hat)
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(px + 3, py - 8, 5, 5);
      ctx.fillRect(px + 5, py - 10, 3, 3);
      ctx.fillStyle = '#38d973';
      ctx.fillRect(px + 7, py - 11, 2, 2);
    } else {
      // Baseling sprite — little spore creature
      // Head
      ctx.fillStyle = '#ffddbb';
      ctx.fillRect(px + 2, py, 6, 6);
      // Spore fuzz on top
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(px + 2, py, 6, 2);
      ctx.fillRect(px + (P.facing > 0 ? 7 : 2), py + 1, 1, 2);
      // Eyes
      ctx.fillStyle = '#222';
      ctx.fillRect(px + (P.facing > 0 ? 6 : 3), py + 2, 1, 2);
      // Mouth
      ctx.fillStyle = '#cc8866';
      ctx.fillRect(px + (P.facing > 0 ? 5 : 4), py + 5, 2, 1);
      // Body (spore-purple)
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(px + 1, py + 6, 8, 6);
      // Mycelium stripes
      ctx.fillStyle = '#7b3bbf';
      ctx.fillRect(px + 1, py + 8, 8, 1);
      ctx.fillRect(px + 1, py + 10, 8, 1);
      // Feet
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(px + 1, py + 12, 3, 2);
      ctx.fillRect(px + 6, py + 12, 3, 2);
      // Spore cap (pointy mushroom hat)
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(px + 3, py - 4, 5, 5);
      ctx.fillRect(px + 5, py - 6, 3, 3);
      ctx.fillStyle = '#38d973';
      ctx.fillRect(px + 7, py - 7, 2, 2);
    }
  }

  // Speed boost visual
  if (speedBoostTimer > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#44ffcc';
    ctx.fillRect(px - 3, py + 2, 2, P.h - 4);
    ctx.fillRect(px + P.w + 1, py + 2, 2, P.h - 4);
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
}

function drawCandy() {
  for (var i = 0; i < candyThrown.length; i++) {
    var c = candyThrown[i];
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(c.x - 3, c.y - 3, 6, 6);
    ctx.fillStyle = '#c084fc';
    ctx.fillRect(c.x - 2, c.y - 2, 3, 3);
    ctx.fillStyle = '#38d973';
    ctx.fillRect(c.x - 4, c.y - 1, 2, 2);
    ctx.fillRect(c.x + 3, c.y - 1, 2, 2);
    // Trail sparkle
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(c.x - c.vx * 0.01 - 1, c.y + 1, 2, 2);
    ctx.globalAlpha = 1;
  }
}

function drawFloaters() {
  ctx.globalAlpha = 0.25;
  var fColors = [
    ['#88ff88', '#44ffaa', '#aaffcc'],  // green spores
    ['#ffdd44', '#88ccff', '#ff88cc'],   // mixed
    ['#ff4488', '#aa22ff', '#ff88cc']    // nightmare
  ];
  var palette = level >= 6 ? 2 : (level >= 3 ? 1 : 0);
  for (var i = 0; i < floaters.length; i++) {
    var f = floaters[i];
    var wobble = Math.sin(f.phase + frame * 0.02) * 4;
    ctx.fillStyle = fColors[palette][f.color];
    ctx.fillRect(Math.floor(f.x + wobble), Math.floor(f.y), f.size, f.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Background bar (NES-style)
  ctx.fillStyle = 'rgba(8,4,16,0.8)';
  ctx.fillRect(0, 0, GW, 22);
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(0, 21, GW, 1);

  // Hearts (CON-scaled)
  for (var i = 0; i < maxHp; i++) {
    ctx.fillStyle = i < hp ? '#e6482e' : '#332233';
    ctx.fillRect(6 + i * 12, 5, 9, 9);
    if (i < hp) {
      ctx.fillStyle = '#f47a6e';
      ctx.fillRect(7 + i * 12, 6, 3, 3);
    }
  }

  // Keys (garden seeds)
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  var keysX = 6 + maxHp * 12 + 6;
  ctx.fillText('SEED:' + keysCollected + '/' + keysPerLevel, keysX, 14);

  // Score (INT-boosted)
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('' + score, GW / 2, 14);

  // Dream level
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'right';
  ctx.fillText('Spore ' + (level + 1), GW - 6, 14);

  // Riding indicator
  if (P.riding) {
    ctx.fillStyle = CREATURE_COLORS[P.riding.type];
    ctx.textAlign = 'left';
    ctx.font = '8px monospace';
    ctx.fillText(CREATURE_NAMES[P.riding.type], 6, GH - 28);
  }

  // Boss HP bar
  if (boss) {
    ctx.fillStyle = '#444';
    ctx.fillRect(GW / 2 - 50, GH - 14, 100, 6);
    ctx.fillStyle = '#ff4444';
    var bossHpFrac = Math.max(0, boss.hp / boss.maxHp);
    ctx.fillRect(GW / 2 - 50, GH - 14, Math.floor(100 * bossHpFrac), 6);
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(GW / 2 - 50, GH - 14, Math.floor(100 * bossHpFrac), 1);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    var bossNames = ['Reef Guardian', 'Moss Colossus', 'Nightmare Mold'];
    ctx.fillText(bossNames[boss.type] || 'BOSS', GW / 2, GH - 18);
  }

  // Speed boost indicator
  if (speedBoostTimer > 0) {
    ctx.fillStyle = '#38d973';
    ctx.textAlign = 'right';
    ctx.font = '7px monospace';
    ctx.fillText('SPORE RUSH', GW - 6, GH - 28);
  }

  // Ability cooldown dot
  if (abilityCooldown > 0) {
    ctx.fillStyle = '#e6482e';
    ctx.fillRect(GW - 12, 6, 6, 6);
  }

  // Persistent controls legend (desktop only; brighter on the first dream).
  if (!('ontouchstart' in window)) {
    ctx.globalAlpha = (level === 0) ? 0.85 : 0.4;
    ctx.fillStyle = '#0052FF';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS MOVE   W JUMP   J/D ACTION', Math.floor(GW / 2), GH - 4);
    ctx.globalAlpha = 1;
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
