<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boulder Baseling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 480, GH = 384;
var TILE = 16;
var COLS = 30, ROWS = 24;
var VIEW_COLS = 20, VIEW_ROWS = 15;
var ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: [], labels: {} });

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#a855f7', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat bonuses from baseling attributes
var STR_DIG_MULT = 1 + (statB.str - 10) * 0.05;        // STR: digging power, push force, boulder damage
var DEX_SPEED_MULT = 1 + (statB.dex - 10) * 0.03;      // DEX: movement speed
var CON_HP_BONUS = Math.floor((statB.con - 10) / 5);    // CON: extra lives
var INT_SCORE_MULT = 1 + (statB.int - 10) * 0.04;       // INT: score multiplier
var WIS_CD_MULT = Math.max(0.3, 1 - (statB.wis - 10) * 0.03); // WIS: cooldown reduction
var CHA_LUCK_MULT = 1 + (statB.cha - 10) * 0.04;       // CHA: gem drop rate, item chance
var LEVEL_BONUS = statB.level * 0.02;                     // level: small global bonus

// Tile types
var T_EMPTY = 0, T_DIRT = 1, T_WALL = 2, T_BOULDER = 3, T_GEM = 4;
var T_EXIT = 5, T_PLAYER = 6, T_BUTTERFLY = 7, T_FIREFLY = 8;
var T_MAGIC_WALL = 9, T_EXPAND_WALL = 10;
var T_SPORECRAWLER = 11, T_MUSHROOMGOLEM = 12;
var T_MUSHROOM_ITEM = 13, T_MYCELIUM_BOOTS = 14, T_SPORE_CLOUD = 15;
var T_MYCELIUM_NET = 16, T_CRYSTAL_VEIN = 17, T_FUNGAL_BLOOM = 18;

// Game state
var state = 'title';
var score = 0, highScore = TAS.score.load('boulderbaseling_hi');
var lives = 3, level = 1;
var frame = 0;
var grid = [];
var playerX = 1, playerY = 1;
var gemsCollected = 0, gemsRequired = 0;
var exitOpen = false, exitX = 0, exitY = 0;
var timeLeft = 0, timerMax = 0;
var enemies = [];
var fallingObjects = [];
var magicWallActive = false, magicWallTimer = 0;
var expandTimer = 0;
var camX = 0, camY = 0;
var deathTimer = 0;
var winTimer = 0;
var moveTimer = 0;
var MOVE_DELAY = Math.max(0.04, 0.12 / DEX_SPEED_MULT); // DEX: faster movement [ref 1]
var lastDir = -1;
var inputHeld = false;

// Player powerup state
var hasShield = false;
var shieldTimer = 0;
var hasBoots = false;
var bootsTimer = 0;
var netSlowTimer = 0;
var comboCount = 0;
var comboTimer = 0;
var bossActive = false;
var boss = null;
var totalGemsThisRun = 0;

// Score popups
var scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.2, startY: y });
}

// Tutorial state
var tutorialShown = false;
var tutorialTimer = 0;
var TUTORIAL_DURATION = 5;

// Zone theming per level range
function getZoneTheme(lvl) {
  if (lvl <= 5)  return { name: 'TASERN UPPER MINES', dirt: ['#7a444a','#6b3a40','#8a5050','#5c3038'], bg: '#0a0806', wall: '#556', accent: '#38d973' };
  if (lvl <= 10) return { name: 'SPORE CRYSTAL DEPTHS', dirt: ['#6a3a3a','#5b2e2e','#7a4848','#4c2222'], bg: '#060a04', wall: '#446', accent: '#38d973' };
  if (lvl <= 15) return { name: 'GARDEN GEM CAVERNS', dirt: ['#5a3050','#4a2040','#6a3a5a','#3c1830'], bg: '#040408', wall: '#558', accent: '#f4b41b' };
  return { name: 'POOP DIAMOND CORE', dirt: ['#7a444a','#6b3a40','#5a2a30','#4c1e28'], bg: '#0a0404', wall: '#644', accent: '#f4b41b' };
}

// Seeded random for level generation
var seed = 1;
function seededRandom() {
  seed = (seed * 16807 + 0) % 2147483647;
  return (seed - 1) / 2147483646;
}

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  seed = lvl * 7919 + 31337;
  grid = [];
  enemies = [];
  fallingObjects = [];
  magicWallActive = false;
  magicWallTimer = 0;
  expandTimer = 0;
  exitOpen = false;
  gemsCollected = 0;
  hasShield = false;
  shieldTimer = 0;
  hasBoots = false;
  bootsTimer = 0;
  netSlowTimer = 0;
  comboCount = 0;
  comboTimer = 0;
  bossActive = false;
  boss = null;
  scorePopups = [];

  // Initialize grid with dirt
  for (var y = 0; y < ROWS; y++) {
    grid[y] = [];
    for (var x = 0; x < COLS; x++) {
      if (y === 0 || y === ROWS - 1 || x === 0 || x === COLS - 1) {
        grid[y][x] = T_WALL;
      } else {
        grid[y][x] = T_DIRT;
      }
    }
  }

  // Density parameters scale with level
  var boulderChance = 0.08 + lvl * 0.012;
  var gemChance = (0.04 + lvl * 0.005) * CHA_LUCK_MULT; // CHA: more gems spawn [ref 2]
  var wallChance = 0.03 + lvl * 0.008;

  // Place random tiles
  for (var y = 2; y < ROWS - 2; y++) {
    for (var x = 2; x < COLS - 2; x++) {
      var r = seededRandom();
      if (r < boulderChance) {
        grid[y][x] = T_BOULDER;
      } else if (r < boulderChance + gemChance) {
        grid[y][x] = T_GEM;
      } else if (r < boulderChance + gemChance + wallChance) {
        grid[y][x] = T_WALL;
      }
    }
  }

  // Place Tasern-themed items (mushroom shields, mycelium boots)
  var itemChance = 0.008 * CHA_LUCK_MULT; // CHA: more items [ref 3]
  for (var y = 2; y < ROWS - 2; y++) {
    for (var x = 2; x < COLS - 2; x++) {
      if (grid[y][x] !== T_DIRT) continue;
      var ir = seededRandom();
      if (ir < itemChance * 0.5) {
        grid[y][x] = T_MUSHROOM_ITEM;
      } else if (ir < itemChance) {
        grid[y][x] = T_MYCELIUM_BOOTS;
      }
    }
  }

  // Place hazards (spore clouds, mycelium nets) in later levels
  if (lvl >= 3) {
    var hazardChance = 0.005 + lvl * 0.002;
    for (var y = 3; y < ROWS - 3; y++) {
      for (var x = 3; x < COLS - 3; x++) {
        if (grid[y][x] !== T_EMPTY && grid[y][x] !== T_DIRT) continue;
        var hr = seededRandom();
        if (hr < hazardChance * 0.4 && grid[y][x] === T_EMPTY) {
          grid[y][x] = T_SPORE_CLOUD;
        } else if (hr < hazardChance && grid[y][x] === T_DIRT) {
          grid[y][x] = T_MYCELIUM_NET;
        }
      }
    }
  }

  // Crystal veins in Crystal Caverns zone (lvl 11-15)
  if (lvl >= 11 && lvl <= 15) {
    for (var i = 0; i < 3 + lvl - 10; i++) {
      var cx = 3 + Math.floor(seededRandom() * (COLS - 6));
      var cy = 3 + Math.floor(seededRandom() * (ROWS - 6));
      var clen = 2 + Math.floor(seededRandom() * 4);
      var cdir = seededRandom() < 0.5 ? 0 : 1;
      for (var j = 0; j < clen; j++) {
        var vx = cx + (cdir === 0 ? j : 0);
        var vy = cy + (cdir === 1 ? j : 0);
        if (vx > 0 && vx < COLS - 1 && vy > 0 && vy < ROWS - 1) {
          if (grid[vy][vx] === T_DIRT || grid[vy][vx] === T_WALL) {
            grid[vy][vx] = T_CRYSTAL_VEIN;
          }
        }
      }
    }
  }

  // Fungal blooms in Spore Core zone (lvl 16+)
  if (lvl >= 16) {
    var bloomCount = Math.min(lvl - 14, 6);
    for (var i = 0; i < bloomCount; i++) {
      var bx = 3 + Math.floor(seededRandom() * (COLS - 6));
      var by = 3 + Math.floor(seededRandom() * (ROWS - 6));
      if (grid[by][bx] === T_DIRT) {
        grid[by][bx] = T_FUNGAL_BLOOM;
      }
    }
  }

  // Place player at top-left area
  playerX = 1 + Math.floor(seededRandom() * 3);
  playerY = 1 + Math.floor(seededRandom() * 3);
  grid[playerY][playerX] = T_EMPTY;
  // Clear area around player
  for (var dy = -1; dy <= 1; dy++) {
    for (var dx = -1; dx <= 1; dx++) {
      var nx = playerX + dx, ny = playerY + dy;
      if (nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1) {
        if (grid[ny][nx] !== T_WALL) {
          grid[ny][nx] = T_EMPTY;
        }
      }
    }
  }

  // Place exit far from player
  exitX = COLS - 2 - Math.floor(seededRandom() * 4);
  exitY = ROWS - 2 - Math.floor(seededRandom() * 4);
  grid[exitY][exitX] = T_WALL; // hidden until opened

  // Count gems and set requirement
  var totalGems = 0;
  for (var y = 0; y < ROWS; y++) {
    for (var x = 0; x < COLS; x++) {
      if (grid[y][x] === T_GEM) totalGems++;
    }
  }
  gemsRequired = Math.max(3, Math.floor(totalGems * (0.5 + lvl * 0.02)));
  if (gemsRequired > totalGems) gemsRequired = totalGems;

  // Place classic enemies based on level
  var numButterflies = lvl >= 6 ? Math.min(Math.floor((lvl - 4) * 0.8), 6) : 0;
  var numFireflies = lvl >= 11 ? Math.min(Math.floor((lvl - 9) * 0.6), 4) : 0;

  for (var i = 0; i < numButterflies; i++) {
    placeEnemy(T_BUTTERFLY);
  }
  for (var i = 0; i < numFireflies; i++) {
    placeEnemy(T_FIREFLY);
  }

  // Mine enemies: Cave Slimes (lvl 3+), Rock Beetles (lvl 8+)
  var numSporeCrawlers = lvl >= 3 ? Math.min(Math.floor((lvl - 1) * 0.6), 5) : 0;
  var numMushroomGolems = lvl >= 8 ? Math.min(Math.floor((lvl - 6) * 0.4), 3) : 0;

  for (var i = 0; i < numSporeCrawlers; i++) {
    placeEnemy(T_SPORECRAWLER);
  }
  for (var i = 0; i < numMushroomGolems; i++) {
    placeEnemy(T_MUSHROOMGOLEM);
  }

  // Magic walls (level 11+)
  if (lvl >= 11) {
    var numMagic = Math.min(Math.floor((lvl - 9) * 0.5), 4);
    for (var i = 0; i < numMagic; i++) {
      var mx = 3 + Math.floor(seededRandom() * (COLS - 6));
      var my = 5 + Math.floor(seededRandom() * (ROWS - 10));
      var mw = 3 + Math.floor(seededRandom() * 4);
      for (var j = 0; j < mw && mx + j < COLS - 1; j++) {
        if (grid[my][mx + j] === T_DIRT || grid[my][mx + j] === T_WALL) {
          grid[my][mx + j] = T_MAGIC_WALL;
        }
      }
    }
  }

  // Expanding walls (level 13+)
  if (lvl >= 13) {
    var numExpand = Math.min(Math.floor((lvl - 11) * 0.4), 3);
    for (var i = 0; i < numExpand; i++) {
      var ex = 5 + Math.floor(seededRandom() * (COLS - 10));
      var ey = 5 + Math.floor(seededRandom() * (ROWS - 10));
      if (grid[ey][ex] === T_DIRT) {
        grid[ey][ex] = T_EXPAND_WALL;
      }
    }
  }

  // Boss fights every 5 levels
  if (lvl % 5 === 0 && lvl <= 20) {
    spawnBoss(lvl);
  }

  // Timer based on level, WIS gives more time via cooldown reduction [ref 4]
  timerMax = Math.max(60, Math.floor((180 - lvl * 5) / WIS_CD_MULT));
  timeLeft = timerMax;

  // Show tutorial on first level
  if (lvl === 1 && !tutorialShown) {
    tutorialTimer = TUTORIAL_DURATION;
    tutorialShown = true;
  }
}

function placeEnemy(type) {
  for (var attempts = 0; attempts < 50; attempts++) {
    var ex = 5 + Math.floor(seededRandom() * (COLS - 10));
    var ey = 5 + Math.floor(seededRandom() * (ROWS - 10));
    if (grid[ey][ex] === T_DIRT && Math.abs(ex - playerX) > 5 && Math.abs(ey - playerY) > 5) {
      grid[ey][ex] = T_EMPTY;
      for (var dy = -1; dy <= 0; dy++) {
        for (var dx = -1; dx <= 0; dx++) {
          var nx = ex + dx, ny = ey + dy;
          if (nx > 0 && nx < COLS - 1 && ny > 0 && ny < ROWS - 1) {
            if (grid[ny][nx] === T_DIRT) grid[ny][nx] = T_EMPTY;
          }
        }
      }
      var hp = 1;
      if (type === T_MUSHROOMGOLEM) hp = 3;
      enemies.push({ x: ex, y: ey, type: type, dir: 0, moveTimer: 0, hp: hp, flashTimer: 0, sporeTimer: 0 });
      return;
    }
  }
}

// === BOSS SYSTEM ===
function spawnBoss(lvl) {
  bossActive = true;
  var bossHP = 5 + lvl * 2;
  var bossNames = ['', '', '', '', '', 'CAVE SLIME KING', '', '', '', '', 'BURROWING SPORE TITAN', '', '', '', '', 'GARDEN GEM WARDEN', '', '', '', '', 'POOP DIAMOND OVERLORD'];
  boss = {
    x: Math.floor(COLS / 2),
    y: Math.floor(ROWS / 2),
    hp: bossHP,
    maxHP: bossHP,
    name: bossNames[lvl] || 'CAVE BOSS',
    moveTimer: 0,
    attackTimer: 0,
    phase: 0,
    flashTimer: 0,
    size: 2
  };
  // Clear space for boss
  for (var dy = -2; dy <= 2; dy++) {
    for (var dx = -2; dx <= 2; dx++) {
      var bx = boss.x + dx, by = boss.y + dy;
      if (bx > 0 && bx < COLS - 1 && by > 0 && by < ROWS - 1) {
        grid[by][bx] = T_EMPTY;
      }
    }
  }
}

function updateBoss(dt) {
  if (!bossActive || !boss) return;

  boss.moveTimer += dt;
  boss.attackTimer += dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  // Boss movement - slowly chase player
  var bossSpeed = 0.6 - level * 0.01;
  if (boss.moveTimer >= bossSpeed) {
    boss.moveTimer = 0;
    var dx = playerX - boss.x;
    var dy = playerY - boss.y;
    var adx = Math.abs(dx), ady = Math.abs(dy);
    var mx = 0, my = 0;
    if (adx > ady) mx = dx > 0 ? 1 : -1;
    else my = dy > 0 ? 1 : -1;

    var nx = boss.x + mx, ny = boss.y + my;
    if (nx > 1 && nx < COLS - 2 && ny > 1 && ny < ROWS - 2) {
      // Boss destroys dirt/boulders as it moves
      if (grid[ny][nx] === T_DIRT || grid[ny][nx] === T_BOULDER || grid[ny][nx] === T_EMPTY) {
        grid[ny][nx] = T_EMPTY;
        boss.x = nx;
        boss.y = ny;
      }
    }

    // Check if boss touches player
    if (Math.abs(boss.x - playerX) <= 1 && Math.abs(boss.y - playerY) <= 1) {
      if (!hasShield) {
        killPlayer();
      } else {
        hasShield = false;
        shieldTimer = 0;
        TAS.fx.flash('#44ffaa', 0.2);
        addScorePopup(playerX * TILE, playerY * TILE, 'SHIELD!', '#44ffaa');
      }
    }
  }

  // Boss attack - spawn boulders or spore clouds
  var atkRate = 3.0 - level * 0.05;
  if (boss.attackTimer >= atkRate) {
    boss.attackTimer = 0;
    // Drop boulders near player
    for (var i = 0; i < 1 + Math.floor(level / 10); i++) {
      var bx = playerX - 2 + Math.floor(Math.random() * 5);
      var by = Math.max(1, playerY - 5 - Math.floor(Math.random() * 3));
      if (bx > 0 && bx < COLS - 1 && by > 0 && by < ROWS - 1) {
        if (grid[by][bx] === T_EMPTY || grid[by][bx] === T_DIRT) {
          grid[by][bx] = T_BOULDER;
          TAS.particles.spawn(bx * TILE + 8, by * TILE + 8, '#ff8844', 4, 2);
        }
      }
    }
    TAS.audio.playNoise(0.2, 0.08, 120);
  }
}

function damageBoss(dmg) {
  if (!bossActive || !boss) return;
  boss.hp -= dmg;
  boss.flashTimer = 0.3;
  TAS.fx.shake(6, 0.88);
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.1);
  addScorePopup(boss.x * TILE, boss.y * TILE - 16, '-' + dmg, '#ff4444');

  if (boss.hp <= 0) {
    // Boss defeated
    bossActive = false;
    var bossScore = Math.floor(500 * INT_SCORE_MULT * (1 + LEVEL_BONUS)); // INT+level: boss score [ref 5]
    score += bossScore;
    addScorePopup(boss.x * TILE, boss.y * TILE - 24, '+' + bossScore, '#ffdd44');
    TAS.fx.shake(12, 0.92);
    TAS.fx.flash('#ffffff', 0.5);
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.15]], 90);

    // Explosion of gems
    for (var dy = -3; dy <= 3; dy++) {
      for (var dx = -3; dx <= 3; dx++) {
        var gx = boss.x + dx, gy = boss.y + dy;
        if (gx > 0 && gx < COLS - 1 && gy > 0 && gy < ROWS - 1) {
          if (grid[gy][gx] === T_EMPTY || grid[gy][gx] === T_DIRT) {
            if (Math.random() < 0.4 * CHA_LUCK_MULT) { // CHA: more boss gem drops [ref 6]
              grid[gy][gx] = T_GEM;
            } else {
              grid[gy][gx] = T_EMPTY;
            }
          }
          TAS.particles.spawn(gx * TILE + 8, gy * TILE + 8, '#ffdd44', 5, 3);
        }
      }
    }
    boss = null;

    // Open exit after boss defeat
    if (!exitOpen) {
      openExit();
    }
  }
}

// === PHYSICS ===
var physicsTimer = 0;
var PHYSICS_RATE = 0.10;

function isFalling(x, y) {
  for (var i = 0; i < fallingObjects.length; i++) {
    if (fallingObjects[i].x === x && fallingObjects[i].y === y) return true;
  }
  return false;
}

function setFalling(x, y, val) {
  if (val) {
    if (!isFalling(x, y)) fallingObjects.push({ x: x, y: y });
  } else {
    for (var i = fallingObjects.length - 1; i >= 0; i--) {
      if (fallingObjects[i].x === x && fallingObjects[i].y === y) {
        fallingObjects.splice(i, 1);
      }
    }
  }
}

function isRounded(tile) {
  return tile === T_BOULDER || tile === T_GEM || tile === T_WALL || tile === T_CRYSTAL_VEIN;
}

function physicsTick() {
  var newFalling = [];

  for (var y = ROWS - 2; y >= 1; y--) {
    for (var x = 1; x < COLS - 1; x++) {
      var tile = grid[y][x];
      if (tile !== T_BOULDER && tile !== T_GEM) continue;

      var below = grid[y + 1][x];
      var wasFalling = isFalling(x, y);

      // Fall straight down
      if (below === T_EMPTY) {
        grid[y + 1][x] = tile;
        grid[y][x] = T_EMPTY;
        setFalling(x, y, false);
        newFalling.push({ x: x, y: y + 1 });
        continue;
      }

      // Pass through magic wall
      if (below === T_MAGIC_WALL && y + 2 < ROWS - 1 && grid[y + 2][x] === T_EMPTY) {
        magicWallActive = true;
        magicWallTimer = 5;
        var transformed = (tile === T_BOULDER) ? T_GEM : T_BOULDER;
        grid[y + 2][x] = transformed;
        grid[y][x] = T_EMPTY;
        setFalling(x, y, false);
        newFalling.push({ x: x, y: y + 2 });
        TAS.audio.playTone(800, 0.1, 'sine', 0.06);
        continue;
      }

      // Kill on impact
      if (wasFalling && below !== T_EMPTY) {
        var impactDamage = Math.ceil(STR_DIG_MULT); // STR: boulder impact damage [ref 7]

        // Check if landing on player
        if (y + 1 === playerY && x === playerX) {
          if (hasShield) {
            hasShield = false;
            shieldTimer = 0;
            TAS.fx.flash('#44ffaa', 0.2);
            addScorePopup(playerX * TILE, playerY * TILE, 'BLOCKED!', '#44ffaa');
          } else {
            killPlayer();
          }
        }
        // Check if landing on enemy
        for (var ei = enemies.length - 1; ei >= 0; ei--) {
          if (enemies[ei].x === x && enemies[ei].y === y + 1) {
            enemies[ei].hp -= impactDamage;
            if (enemies[ei].hp <= 0) {
              explodeEnemy(ei);
            } else {
              enemies[ei].flashTimer = 0.2;
              TAS.audio.playTone(300, 0.06, 'square', 0.04);
            }
          }
        }
        // Check if hitting boss
        if (bossActive && boss && Math.abs(x - boss.x) <= 1 && Math.abs(y + 1 - boss.y) <= 1) {
          damageBoss(impactDamage);
        }
        setFalling(x, y, false);

        // Screen shake on heavy impact
        TAS.fx.shake(2, 0.8);
      }

      // Roll off rounded objects
      if (isRounded(below) || below === T_BOULDER || below === T_GEM) {
        if (x > 1 && grid[y][x - 1] === T_EMPTY && grid[y + 1][x - 1] === T_EMPTY) {
          grid[y][x - 1] = tile;
          grid[y][x] = T_EMPTY;
          setFalling(x, y, false);
          newFalling.push({ x: x - 1, y: y });
          continue;
        }
        if (x < COLS - 2 && grid[y][x + 1] === T_EMPTY && grid[y + 1][x + 1] === T_EMPTY) {
          grid[y][x + 1] = tile;
          grid[y][x] = T_EMPTY;
          setFalling(x, y, false);
          newFalling.push({ x: x + 1, y: y });
          continue;
        }
      }
    }
  }

  fallingObjects = newFalling;

  // Check if falling objects hit player
  for (var i = 0; i < fallingObjects.length; i++) {
    var fo = fallingObjects[i];
    if (fo.x === playerX && fo.y === playerY) {
      if (hasShield) {
        hasShield = false;
        shieldTimer = 0;
      } else {
        killPlayer();
      }
    }
  }
}

function explodeEnemy(idx) {
  var e = enemies[idx];
  var isButterfly = (e.type === T_BUTTERFLY);
  var isSporeCrawler = (e.type === T_SPORECRAWLER);
  enemies.splice(idx, 1);

  TAS.fx.shake(4, 0.85);
  TAS.audio.playNoise(0.3, 0.12, 400);

  // Score for killing enemy
  var killScore = 25;
  if (e.type === T_FIREFLY) killScore = 50;
  if (e.type === T_MUSHROOMGOLEM) killScore = 75;
  killScore = Math.floor(killScore * INT_SCORE_MULT * (1 + LEVEL_BONUS)); // INT+level: enemy kill score [ref 8]

  // Combo system
  comboCount++;
  comboTimer = 2.0;
  if (comboCount > 1) {
    killScore = Math.floor(killScore * (1 + comboCount * 0.5));
    addScorePopup(e.x * TILE, e.y * TILE - 16, comboCount + 'x COMBO!', '#ff88ff');
  }

  score += killScore;
  addScorePopup(e.x * TILE, e.y * TILE, '+' + killScore, '#ffdd44');

  // Explode into 3x3 area
  for (var dy = -1; dy <= 1; dy++) {
    for (var dx = -1; dx <= 1; dx++) {
      var nx = e.x + dx, ny = e.y + dy;
      if (nx <= 0 || nx >= COLS - 1 || ny <= 0 || ny >= ROWS - 1) continue;
      if (grid[ny][nx] === T_WALL) continue;

      if (nx === playerX && ny === playerY) {
        if (!hasShield) killPlayer();
        else { hasShield = false; shieldTimer = 0; }
      }
      for (var j = enemies.length - 1; j >= 0; j--) {
        if (enemies[j].x === nx && enemies[j].y === ny) {
          enemies.splice(j, 1);
        }
      }

      if (isButterfly) {
        grid[ny][nx] = T_GEM;
        TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#38d973', 3, 2);
      } else if (isSporeCrawler) {
        // Cave slimes leave toxic clouds on death
        grid[ny][nx] = T_SPORE_CLOUD;
        TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#88ff44', 4, 2);
      } else {
        grid[ny][nx] = T_EMPTY;
        TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#ff4422', 3, 2);
      }
    }
  }
}

// === ENEMY AI ===
var enemyPhysicsTimer = 0;
var ENEMY_RATE = 0.18;

function moveEnemies() {
  var DX = [0, 1, 0, -1];
  var DY = [-1, 0, 1, 0];

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.flashTimer > 0) continue; // stunned enemies don't move

    // Cave slime: erratic movement, leaves toxic trails
    if (e.type === T_SPORECRAWLER) {
      e.sporeTimer = (e.sporeTimer || 0) + 1;
      var sdir = Math.floor(Math.random() * 4);
      var snx = e.x + DX[sdir];
      var sny = e.y + DY[sdir];
      if (canEnemyMove(snx, sny)) {
        // Occasionally leave a spore cloud behind
        if (e.sporeTimer > 8 && Math.random() < 0.15) {
          if (grid[e.y][e.x] === T_EMPTY) grid[e.y][e.x] = T_SPORE_CLOUD;
          e.sporeTimer = 0;
        }
        e.x = snx;
        e.y = sny;
      }
      if (e.x === playerX && e.y === playerY) killPlayer();
      continue;
    }

    // Rock beetle: slow, destroys dirt, seeks player
    if (e.type === T_MUSHROOMGOLEM) {
      e.moveTimer = (e.moveTimer || 0) + 1;
      if (e.moveTimer < 3) continue; // moves every 3rd tick
      e.moveTimer = 0;

      var gdx = playerX - e.x;
      var gdy = playerY - e.y;
      var gmx = 0, gmy = 0;
      if (Math.abs(gdx) > Math.abs(gdy)) gmx = gdx > 0 ? 1 : -1;
      else gmy = gdy > 0 ? 1 : -1;

      var gnx = e.x + gmx, gny = e.y + gmy;
      if (gnx > 0 && gnx < COLS - 1 && gny > 0 && gny < ROWS - 1) {
        var target = grid[gny][gnx];
        if (target === T_EMPTY || target === T_DIRT || target === T_SPORE_CLOUD) {
          grid[gny][gnx] = T_EMPTY;
          e.x = gnx;
          e.y = gny;
          if (target === T_DIRT) {
            TAS.particles.spawn(gnx * TILE + 8, gny * TILE + 8, '#7a444a', 3, 1);
          }
        }
      }
      if (e.x === playerX && e.y === playerY) killPlayer();
      continue;
    }

    // Classic butterfly/firefly wall-following AI
    var turnDir = (e.type === T_BUTTERFLY) ? 1 : -1;
    var preferredDir = (e.dir + turnDir + 4) % 4;
    var nx = e.x + DX[preferredDir];
    var ny = e.y + DY[preferredDir];

    if (canEnemyMove(nx, ny)) {
      e.dir = preferredDir;
      e.x = nx;
      e.y = ny;
    } else {
      nx = e.x + DX[e.dir];
      ny = e.y + DY[e.dir];
      if (canEnemyMove(nx, ny)) {
        e.x = nx;
        e.y = ny;
      } else {
        var oppDir = (e.dir - turnDir + 4) % 4;
        nx = e.x + DX[oppDir];
        ny = e.y + DY[oppDir];
        if (canEnemyMove(nx, ny)) {
          e.dir = oppDir;
          e.x = nx;
          e.y = ny;
        } else {
          e.dir = (e.dir + 2) % 4;
        }
      }
    }

    if (e.x === playerX && e.y === playerY) {
      killPlayer();
    }
  }
}

function canEnemyMove(x, y) {
  if (x <= 0 || x >= COLS - 1 || y <= 0 || y >= ROWS - 1) return false;
  return grid[y][x] === T_EMPTY || grid[y][x] === T_SPORE_CLOUD;
}

// === EXPANDING WALLS ===
function expandWalls() {
  var expanded = false;
  for (var y = 1; y < ROWS - 1; y++) {
    for (var x = 1; x < COLS - 1; x++) {
      if (grid[y][x] !== T_EXPAND_WALL) continue;
      if (x > 1 && grid[y][x - 1] === T_EMPTY) {
        grid[y][x - 1] = T_EXPAND_WALL;
        expanded = true;
      }
      if (x < COLS - 2 && grid[y][x + 1] === T_EMPTY) {
        grid[y][x + 1] = T_EXPAND_WALL;
        expanded = true;
      }
    }
  }
  if (expanded) {
    TAS.audio.playTone(100, 0.05, 'sawtooth', 0.03);
  }
}

// === PLAYER ===
function killPlayer() {
  if (deathTimer > 0) return;
  if (hasShield) {
    hasShield = false;
    shieldTimer = 0;
    TAS.fx.flash('#44ffaa', 0.3);
    TAS.audio.playTone(600, 0.08, 'sine', 0.06);
    addScorePopup(playerX * TILE, playerY * TILE, 'SHIELD!', '#44ffaa');
    return;
  }
  deathTimer = 1.5;
  TAS.fx.shake(8, 0.9);
  TAS.fx.flash('#ff0000', 0.4);
  TAS.audio.playNoise(0.4, 0.15, 200);
  TAS.particles.spawn(playerX * TILE + 8, playerY * TILE + 8, statB.color, 15, 3, { gravity: 0.1 });
  TAS.particles.spawn(playerX * TILE + 8, playerY * TILE + 8, '#ff4444', 10, 3, { gravity: 0.15 });
}

function movePlayer(dx, dy) {
  var nx = playerX + dx;
  var ny = playerY + dy;

  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;

  var target = grid[ny][nx];

  // Can't walk into walls, expanding walls, or magic walls
  if (target === T_WALL || target === T_EXPAND_WALL || target === T_MAGIC_WALL) return false;

  // Crystal veins: STR check to break through [ref 9]
  if (target === T_CRYSTAL_VEIN) {
    if (STR_DIG_MULT >= 1.2) {
      grid[ny][nx] = T_GEM; // strong enough to crack into gems
      TAS.audio.playTone(1200, 0.08, 'sine', 0.06);
      TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#88aaff', 8, 2);
      addScorePopup(nx * TILE, ny * TILE, 'CRACKED!', '#88aaff');
      return false; // takes a turn to crack
    }
    return false; // too weak
  }

  // Fungal bloom: WIS check to safely harvest [ref 10]
  if (target === T_FUNGAL_BLOOM) {
    if (WIS_CD_MULT <= 0.8) { // high WIS
      var bloomScore = Math.floor(30 * INT_SCORE_MULT);
      score += bloomScore;
      addScorePopup(nx * TILE, ny * TILE, '+' + bloomScore, '#ff88cc');
      TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#ff44aa', 8, 3);
      TAS.audio.playTone(660, 0.1, 'sine', 0.08);
    } else {
      // Low WIS: spore damage
      killPlayer();
      return false;
    }
  }

  // Push boulders horizontally - STR affects push range [ref 11]
  if (target === T_BOULDER && dy === 0) {
    var pushRange = STR_DIG_MULT >= 1.5 ? 2 : 1; // High STR: push 2 tiles
    var bx = nx + dx;
    if (bx > 0 && bx < COLS - 1 && grid[ny][bx] === T_EMPTY && !isFalling(nx, ny)) {
      grid[ny][bx] = T_BOULDER;
      grid[ny][nx] = T_EMPTY;
      TAS.audio.playTone(80, 0.08, 'triangle', 0.05);
      TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#888', 3, 1);
    } else {
      return false;
    }
  } else if (target === T_BOULDER) {
    return false;
  }

  // Collect gems - INT boosts score, CHA boosts bonus drops [ref 12]
  if (target === T_GEM) {
    gemsCollected++;
    totalGemsThisRun++;
    var gemScore = Math.floor(10 * INT_SCORE_MULT * (1 + LEVEL_BONUS)); // INT+level: gem score [ref 12]
    score += gemScore;
    addScorePopup(nx * TILE, ny * TILE, '+' + gemScore, '#38d973');
    TAS.audio.playTone(880, 0.1, 'sine', 0.08);
    TAS.audio.playTone(1100, 0.1, 'sine', 0.06);
    TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#38d973', 6, 2);

    // CHA: chance for bonus gem on pickup [ref 13]
    if (Math.random() < 0.1 * CHA_LUCK_MULT) {
      var bonusScore = Math.floor(5 * INT_SCORE_MULT);
      score += bonusScore;
      addScorePopup(nx * TILE, ny * TILE - 12, 'LUCKY +' + bonusScore, '#f4b41b');
      TAS.audio.playTone(1320, 0.06, 'sine', 0.05);
    }

    // Combo boost
    comboCount++;
    comboTimer = 1.5;

    if (gemsCollected >= gemsRequired && !exitOpen) {
      openExit();
    }
  }

  // Collect spore cap shield
  if (target === T_MUSHROOM_ITEM) {
    hasShield = true;
    shieldTimer = 15 / WIS_CD_MULT; // WIS: longer shield duration [ref 14]
    TAS.audio.playMelody([[440, 0.06], [660, 0.06], [880, 0.08]], 80);
    TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#44ff88', 8, 2);
    addScorePopup(nx * TILE, ny * TILE, 'SHIELD!', '#44ff88');
  }

  // Collect mine boots
  if (target === T_MYCELIUM_BOOTS) {
    hasBoots = true;
    bootsTimer = 10 / WIS_CD_MULT; // WIS: longer boots duration [ref 15]
    TAS.audio.playMelody([[523, 0.06], [784, 0.06], [1047, 0.08]], 80);
    TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#ffaa22', 8, 2);
    addScorePopup(nx * TILE, ny * TILE, 'SPEED!', '#ffaa22');
  }

  // Spore cloud damage
  if (target === T_SPORE_CLOUD) {
    // CON check: high CON resists spore damage [ref 16]
    if (CON_HP_BONUS < 1 && !hasShield) {
      netSlowTimer = 1.5;
      TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#88ff44', 6, 2);
      addScorePopup(nx * TILE, ny * TILE, 'TOXIC!', '#88ff44');
      TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06);
    }
  }

  // Mycelium net: slows player
  if (target === T_MYCELIUM_NET) {
    netSlowTimer = 2.0 * WIS_CD_MULT; // WIS: less slow duration [ref 17]
    TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#668844', 4, 1);
    addScorePopup(nx * TILE, ny * TILE, 'STUCK!', '#668844');
    TAS.audio.playTone(150, 0.08, 'sawtooth', 0.04);
  }

  // Dig through dirt - STR: particle burst on dig [ref 18]
  if (target === T_DIRT) {
    TAS.audio.playNoise(0.06, 0.04, 800);
    var digParticles = STR_DIG_MULT >= 1.3 ? 8 : 4;
    TAS.particles.spawn(nx * TILE + 8, ny * TILE + 8, '#7a444a', digParticles, 1, { size: 1, sizeVar: 1 });
  }

  // Reach exit
  if (target === T_EXIT && exitOpen) {
    winLevel();
    return true;
  }

  // Check for enemy collision
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].x === nx && enemies[i].y === ny) {
      killPlayer();
      return false;
    }
  }

  grid[ny][nx] = T_EMPTY;
  playerX = nx;
  playerY = ny;
  return true;
}

function openExit() {
  exitOpen = true;
  grid[exitY][exitX] = T_EXIT;
  TAS.audio.playMelody([[523, 0.12], [659, 0.12], [784, 0.12], [1047, 0.2]], 100);
  TAS.fx.flash('#38d973', 0.2);
  TAS.particles.spawn(exitX * TILE + 8, exitY * TILE + 8, '#38d973', 12, 3);
}

function winLevel() {
  winTimer = 2.0;
  var timeBonus = Math.floor(Math.floor(timeLeft) * 2 * INT_SCORE_MULT); // INT: time bonus [ref 19]
  score += timeBonus;
  addScorePopup(playerX * TILE, playerY * TILE - 16, 'TIME +' + timeBonus, '#ffdd44');
  TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.1], [1318, 0.2]], 80);
  TAS.fx.flash('#ffffff', 0.3);
}

// === GAME FLOW ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + CON_HP_BONUS + statB.lives; // CON+statB: extra starting lives [ref 20]
  level = 1;
  totalGemsThisRun = 0;
  TAS.particles.clear();
  generateLevel(level);
}

function nextLevel() {
  level++;
  if (level > 20) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('boulderbaseling_hi', highScore);
    }
    return;
  }
  generateLevel(level);
}

function die() {
  lives--;
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('boulderbaseling_hi', highScore);
    }
  } else {
    generateLevel(level);
  }
}

// === CAMERA ===
function updateCamera() {
  var targetX = playerX * TILE - (VIEW_COLS * TILE) / 2 + TILE / 2;
  var targetY = playerY * TILE - (VIEW_ROWS * TILE) / 2 + TILE / 2;
  targetX = TAS.math.clamp(targetX, 0, COLS * TILE - VIEW_COLS * TILE);
  targetY = TAS.math.clamp(targetY, 0, ROWS * TILE - VIEW_ROWS * TILE);
  camX = TAS.math.lerp(camX, targetX, 0.12);
  camY = TAS.math.lerp(camY, targetY, 0.12);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Update score popups
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life -= dt;
    scorePopups[i].y -= dt * 30;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.left || TAS.input.touch.right || TAS.input.touch.up || TAS.input.touch.down) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.left || TAS.input.touch.right || TAS.input.touch.up || TAS.input.touch.down) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial countdown
  if (tutorialTimer > 0) {
    tutorialTimer -= dt;
    // Any key dismisses tutorial
    if (Object.values(TAS.input.keys).some(Boolean)) tutorialTimer = 0;
  }

  // Win animation
  if (winTimer > 0) {
    winTimer -= dt;
    if (winTimer <= 0) {
      nextLevel();
    }
    return;
  }

  // Death animation
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      die();
    }
    return;
  }

  // Powerup timers
  if (hasShield) {
    shieldTimer -= dt;
    if (shieldTimer <= 0) { hasShield = false; }
  }
  if (hasBoots) {
    bootsTimer -= dt;
    if (bootsTimer <= 0) { hasBoots = false; }
  }
  if (netSlowTimer > 0) {
    netSlowTimer -= dt;
  }

  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    killPlayer();
    return;
  }
  // Warning beep
  if (timeLeft <= 10 && Math.floor(timeLeft * 2) % 2 === 0 && Math.floor((timeLeft + dt) * 2) % 2 !== 0) {
    TAS.audio.playTone(440, 0.05, 'square', 0.04);
  }

  // Player movement
  moveTimer -= dt;
  var dx = 0, dy = 0;
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) dx = -1;
  else if (keys['ArrowRight'] || keys['KeyD'] || touch.right) dx = 1;
  else if (keys['ArrowUp'] || keys['KeyW'] || touch.up) dy = -1;
  else if (keys['ArrowDown'] || keys['KeyS'] || touch.down) dy = 1;

  // Calculate effective move delay
  var effectiveDelay = MOVE_DELAY;
  if (hasBoots) effectiveDelay *= 0.6; // boots: faster
  if (netSlowTimer > 0) effectiveDelay *= 1.8; // net: slower

  if (dx !== 0 || dy !== 0) {
    if (moveTimer <= 0) {
      movePlayer(dx, dy);
      moveTimer = effectiveDelay;
    }
  } else {
    moveTimer = 0;
  }

  // Physics
  physicsTimer += dt;
  while (physicsTimer >= PHYSICS_RATE) {
    physicsTimer -= PHYSICS_RATE;
    physicsTick();
  }

  // Enemies
  enemyPhysicsTimer += dt;
  while (enemyPhysicsTimer >= ENEMY_RATE) {
    enemyPhysicsTimer -= ENEMY_RATE;
    moveEnemies();
  }

  // Boss
  updateBoss(dt);

  // Expanding walls
  expandTimer += dt;
  if (expandTimer >= 1.5) {
    expandTimer -= 1.5;
    expandWalls();
  }

  // Magic wall timeout
  if (magicWallActive) {
    magicWallTimer -= dt;
    if (magicWallTimer <= 0) magicWallActive = false;
  }

  // Ambient spore particles in later zones
  if (level >= 6 && frame % 30 === 0) {
    var theme = getZoneTheme(level);
    var px = camX + Math.random() * VIEW_COLS * TILE;
    var py = camY + Math.random() * VIEW_ROWS * TILE;
    TAS.particles.spawn(px, py, theme.accent, 1, 3, { size: 1, sizeVar: 0.5, gravity: -0.02 });
  }

  // Camera
  updateCamera();
}

// === DRAWING ===
function drawTile(x, y, tile, screenX, screenY) {
  var s = TILE;
  var theme = getZoneTheme(level);

  switch (tile) {
    case T_EMPTY:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      // Subtle floor texture
      if ((x + y) % 7 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        ctx.fillRect(screenX + 2, screenY + 2, 2, 2);
      }
      break;

    case T_DIRT:
      var dirtSeed = (x * 31 + y * 17) % 4;
      ctx.fillStyle = theme.dirt[dirtSeed];
      ctx.fillRect(screenX, screenY, s, s);
      ctx.fillStyle = 'rgba(140,80,85,0.3)';
      var sx = ((x * 7 + y * 13) % 11);
      var sy = ((x * 3 + y * 19) % 9);
      ctx.fillRect(screenX + sx % s, screenY + sy % s, 2, 2);
      ctx.fillRect(screenX + (sx + 7) % s, screenY + (sy + 5) % s, 1, 1);
      // Zone-specific detail
      if (level >= 6 && level <= 10 && (x * y) % 11 === 0) {
        ctx.fillStyle = 'rgba(100,180,60,0.2)';
        ctx.fillRect(screenX + 3, screenY + 6, 3, 2); // tiny mycelium strand
      }
      break;

    case T_WALL:
      ctx.fillStyle = theme.wall;
      ctx.fillRect(screenX, screenY, s, s);
      ctx.fillStyle = '#778';
      ctx.fillRect(screenX, screenY, s - 1, s - 1);
      ctx.fillStyle = '#99a';
      ctx.fillRect(screenX + 1, screenY + 1, 3, 3);
      break;

    case T_BOULDER:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.arc(screenX + s / 2, screenY + s / 2, s / 2 - 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.arc(screenX + s / 2 - 2, screenY + s / 2 - 2, s / 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.arc(screenX + s / 2 + 2, screenY + s / 2 + 3, s / 3, 0, Math.PI * 2);
      ctx.fill();
      // Falling indicator
      if (isFalling(x, y)) {
        ctx.fillStyle = 'rgba(255,100,50,0.3)';
        ctx.fillRect(screenX, screenY, s, 2);
      }
      break;

    case T_GEM:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      var sparkle = Math.sin(frame * 0.1 + x * 3 + y * 7) * 0.3 + 0.7;
      ctx.globalAlpha = sparkle;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.moveTo(screenX + s / 2, screenY + 2);
      ctx.lineTo(screenX + s - 2, screenY + s / 2);
      ctx.lineTo(screenX + s / 2, screenY + s - 2);
      ctx.lineTo(screenX + 2, screenY + s / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#a0f0b8';
      ctx.fillRect(screenX + s / 2 - 2, screenY + s / 2 - 2, 4, 4);
      ctx.globalAlpha = 1;
      break;

    case T_EXIT:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      if (exitOpen) {
        var pulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
        ctx.fillStyle = theme.accent;
        ctx.globalAlpha = pulse;
        ctx.fillRect(screenX + 2, screenY + 2, s - 4, s - 4);
        ctx.fillStyle = '#70e8a0';
        ctx.fillRect(screenX + 4, screenY + 4, s - 8, s - 8);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.moveTo(screenX + s / 2, screenY + 3);
        ctx.lineTo(screenX + s - 3, screenY + s / 2);
        ctx.lineTo(screenX + s / 2, screenY + s - 3);
        ctx.lineTo(screenX + 3, screenY + s / 2);
        ctx.closePath();
        ctx.fill();
      }
      break;

    case T_MAGIC_WALL:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      var magicPulse = magicWallActive ? (Math.sin(frame * 0.2) * 0.4 + 0.6) : 0.4;
      ctx.fillStyle = magicWallActive ? '#cc44ff' : '#663388';
      ctx.globalAlpha = magicPulse;
      ctx.fillRect(screenX, screenY, s, s);
      ctx.fillStyle = '#dd88ff';
      ctx.fillRect(screenX + 2, screenY + 2, 3, 3);
      ctx.fillRect(screenX + s - 5, screenY + s - 5, 3, 3);
      ctx.globalAlpha = 1;
      break;

    case T_EXPAND_WALL:
      ctx.fillStyle = '#884422';
      ctx.fillRect(screenX, screenY, s, s);
      ctx.fillStyle = '#aa6633';
      ctx.fillRect(screenX + 1, screenY + 1, s - 2, s - 2);
      var ep = Math.sin(frame * 0.06 + x) * 0.2 + 0.3;
      ctx.globalAlpha = ep;
      ctx.fillStyle = '#ff8844';
      ctx.fillRect(screenX, screenY, s, 2);
      ctx.fillRect(screenX, screenY + s - 2, s, 2);
      ctx.fillRect(screenX, screenY, 2, s);
      ctx.fillRect(screenX + s - 2, screenY, 2, s);
      ctx.globalAlpha = 1;
      break;

    // Tasern items
    case T_MUSHROOM_ITEM:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      // Mushroom cap
      var mPulse = Math.sin(frame * 0.08 + x) * 0.15 + 0.85;
      ctx.globalAlpha = mPulse;
      ctx.fillStyle = '#44ff88';
      ctx.beginPath();
      ctx.arc(screenX + s / 2, screenY + s / 2 - 2, 5, Math.PI, 0);
      ctx.fill();
      // Stem
      ctx.fillStyle = '#ddddaa';
      ctx.fillRect(screenX + s / 2 - 2, screenY + s / 2 - 2, 4, 6);
      // Shield sparkle
      ctx.fillStyle = '#aaffcc';
      ctx.fillRect(screenX + s / 2 - 1, screenY + s / 2 - 4, 2, 2);
      ctx.globalAlpha = 1;
      break;

    case T_MYCELIUM_BOOTS:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      var bPulse = Math.sin(frame * 0.1 + y) * 0.15 + 0.85;
      ctx.globalAlpha = bPulse;
      // Boot shape
      ctx.fillStyle = '#ffaa22';
      ctx.fillRect(screenX + 3, screenY + 4, 4, 8);
      ctx.fillRect(screenX + 3, screenY + 10, 7, 3);
      ctx.fillRect(screenX + 9, screenY + 6, 4, 7);
      // Speed lines
      ctx.fillStyle = '#ffdd88';
      ctx.fillRect(screenX + 1, screenY + 6, 2, 1);
      ctx.fillRect(screenX + 1, screenY + 9, 2, 1);
      ctx.globalAlpha = 1;
      break;

    case T_SPORE_CLOUD:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      var sPulse = Math.sin(frame * 0.06 + x * 2 + y) * 0.2 + 0.4;
      ctx.globalAlpha = sPulse;
      ctx.fillStyle = '#88ff44';
      ctx.beginPath();
      ctx.arc(screenX + s / 2, screenY + s / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aaff66';
      ctx.beginPath();
      ctx.arc(screenX + s / 2 + 2, screenY + s / 2 - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    case T_MYCELIUM_NET:
      var dirtSeed2 = (x * 31 + y * 17) % 4;
      ctx.fillStyle = theme.dirt[dirtSeed2];
      ctx.fillRect(screenX, screenY, s, s);
      // Net overlay
      ctx.strokeStyle = 'rgba(100,136,68,0.6)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(screenX, screenY); ctx.lineTo(screenX + s, screenY + s);
      ctx.moveTo(screenX + s, screenY); ctx.lineTo(screenX, screenY + s);
      ctx.moveTo(screenX + s / 2, screenY); ctx.lineTo(screenX + s / 2, screenY + s);
      ctx.moveTo(screenX, screenY + s / 2); ctx.lineTo(screenX + s, screenY + s / 2);
      ctx.stroke();
      break;

    case T_CRYSTAL_VEIN:
      ctx.fillStyle = theme.wall;
      ctx.fillRect(screenX, screenY, s, s);
      // Crystal highlights
      var cSparkle = Math.sin(frame * 0.12 + x * 5 + y * 3) * 0.3 + 0.7;
      ctx.globalAlpha = cSparkle;
      ctx.fillStyle = '#6688ff';
      ctx.fillRect(screenX + 2, screenY + 3, 4, 3);
      ctx.fillStyle = '#88aaff';
      ctx.fillRect(screenX + 8, screenY + 7, 3, 4);
      ctx.fillStyle = '#aaccff';
      ctx.fillRect(screenX + 5, screenY + 11, 5, 2);
      ctx.globalAlpha = 1;
      break;

    case T_FUNGAL_BLOOM:
      ctx.fillStyle = theme.bg;
      ctx.fillRect(screenX, screenY, s, s);
      // Pulsing bloom
      var fPulse = Math.sin(frame * 0.07 + x + y * 3) * 0.3 + 0.7;
      ctx.globalAlpha = fPulse;
      ctx.fillStyle = '#ff44aa';
      ctx.beginPath();
      ctx.arc(screenX + s / 2, screenY + s / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff88cc';
      ctx.beginPath();
      ctx.arc(screenX + s / 2 - 3, screenY + s / 2 - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(screenX + s / 2 + 3, screenY + s / 2 + 1, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Center dot
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(screenX + s / 2 - 1, screenY + s / 2 - 1, 2, 2);
      ctx.globalAlpha = 1;
      break;
  }
}

function drawPlayer(screenX, screenY) {
  var s = TILE;
  var bob = Math.sin(frame * 0.08) * 0.5;

  // Shield aura
  if (hasShield) {
    var shieldPulse = Math.sin(frame * 0.12) * 0.2 + 0.3;
    ctx.globalAlpha = shieldPulse;
    ctx.fillStyle = '#44ff88';
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2, s / 2 + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Speed trail when boots active
  if (hasBoots) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#ffaa22';
    ctx.beginPath();
    ctx.arc(screenX + s / 2 - 2, screenY + s / 2 + 2, s / 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, screenX + s / 2, screenY + s / 2, s, { frame: frame })) {
    // Baseling body - uses statB.color
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2 + 1 + bob, s / 2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(screenX + s / 2 - 2, screenY + s / 2 - 2 + bob, s / 4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(screenX + s / 2 - 3, screenY + s / 2 - 1 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(screenX + s / 2 + 3, screenY + s / 2 - 1 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(screenX + s / 2 - 3, screenY + s / 2 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(screenX + s / 2 + 3, screenY + s / 2 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Mouth
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2 + 3 + bob, 3, 0, Math.PI);
    ctx.stroke();
  }

  // Net slow visual
  if (netSlowTimer > 0) {
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = '#668844';
    ctx.lineWidth = 1;
    ctx.strokeRect(screenX + 1, screenY + 1, s - 2, s - 2);
    ctx.globalAlpha = 1;
  }
}

function drawEnemy(e, screenX, screenY) {
  var s = TILE;
  var bob = Math.sin(frame * 0.12 + e.x * 5) * 1.5;

  // Flash when damaged
  if (e.flashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.5;
  }

  if (e.type === T_BUTTERFLY) {
    ctx.fillStyle = '#66aa44';
    var wingAngle = Math.sin(frame * 0.2) * 0.4;
    ctx.beginPath();
    ctx.ellipse(screenX + s / 2 - 4, screenY + s / 2 + bob, 4, 6, wingAngle, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(screenX + s / 2 + 4, screenY + s / 2 + bob, 4, 6, -wingAngle, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#334422';
    ctx.fillRect(screenX + s / 2 - 1, screenY + s / 2 - 3 + bob, 3, 7);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(screenX + s / 2 - 2, screenY + s / 2 - 3 + bob, 2, 2);
    ctx.fillRect(screenX + s / 2 + 1, screenY + s / 2 - 3 + bob, 2, 2);

  } else if (e.type === T_FIREFLY) {
    var glow = Math.sin(frame * 0.15 + e.y * 3) * 0.3 + 0.7;
    ctx.globalAlpha = (e.flashTimer > 0) ? 0.5 : glow;
    ctx.fillStyle = '#ff4422';
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2 + bob, s / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2 + bob, s / 3 - 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(screenX + s / 2 - 3, screenY + s / 2 - 2 + bob, 2, 2);
    ctx.fillRect(screenX + s / 2 + 2, screenY + s / 2 - 2 + bob, 2, 2);

  } else if (e.type === T_SPORECRAWLER) {
    // Cave Slime: segmented ooze creature
    var crawl = Math.sin(frame * 0.18 + e.x) * 2;
    ctx.fillStyle = '#66cc22';
    // Segments
    for (var seg = 0; seg < 3; seg++) {
      var segOff = Math.sin(frame * 0.18 + seg * 1.5) * 1;
      ctx.beginPath();
      ctx.arc(screenX + 4 + seg * 4, screenY + s / 2 + crawl + segOff, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Head
    ctx.fillStyle = '#88ee44';
    ctx.beginPath();
    ctx.arc(screenX + s - 4, screenY + s / 2 + crawl, 4, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(screenX + s - 5, screenY + s / 2 - 2 + crawl, 2, 2);
    // Antennae
    ctx.strokeStyle = '#aaff66';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(screenX + s - 2, screenY + s / 2 - 3 + crawl);
    ctx.lineTo(screenX + s, screenY + s / 2 - 6 + crawl);
    ctx.stroke();

  } else if (e.type === T_MUSHROOMGOLEM) {
    // Rock Beetle: big chunky armored mine creature
    var stomp = Math.abs(Math.sin(frame * 0.06 + e.y)) * 1;
    // Body
    ctx.fillStyle = '#886644';
    ctx.fillRect(screenX + 3, screenY + s / 2 + stomp, s - 6, s / 2 - stomp);
    // Cap
    ctx.fillStyle = '#cc4444';
    ctx.beginPath();
    ctx.arc(screenX + s / 2, screenY + s / 2 - 1 + stomp, 7, Math.PI, 0);
    ctx.fill();
    // Spots on cap
    ctx.fillStyle = '#ffcccc';
    ctx.fillRect(screenX + s / 2 - 3, screenY + s / 2 - 5 + stomp, 2, 2);
    ctx.fillRect(screenX + s / 2 + 2, screenY + s / 2 - 4 + stomp, 2, 2);
    // Eyes
    ctx.fillStyle = '#ffff44';
    ctx.fillRect(screenX + s / 2 - 3, screenY + s / 2 + 1 + stomp, 3, 3);
    ctx.fillRect(screenX + s / 2 + 1, screenY + s / 2 + 1 + stomp, 3, 3);
    // HP indicator
    if (e.hp > 1) {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(screenX + 2, screenY + 1, Math.floor((s - 4) * e.hp / 3), 2);
    }
  }

  ctx.globalAlpha = 1;
}

function drawBoss(offsetX, offsetY, startCol, startRow, subX, subY) {
  if (!bossActive || !boss) return;

  var bsx = offsetX + (boss.x - startCol) * TILE - subX;
  var bsy = offsetY + (boss.y - startRow) * TILE - subY;
  var s = TILE * boss.size;

  // Flash on damage
  if (boss.flashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.5;
  }

  // Boss body - large menacing mushroom
  var pulse = Math.sin(frame * 0.04) * 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(bsx + TILE / 2, bsy + TILE + 4 + pulse, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stem
  ctx.fillStyle = '#664422';
  ctx.fillRect(bsx - 4, bsy - 2 + pulse, TILE + 8, TILE + 8);

  // Giant cap
  ctx.fillStyle = level <= 10 ? '#ff2244' : level <= 15 ? '#4466ff' : '#ff44aa';
  ctx.beginPath();
  ctx.arc(bsx + TILE / 2, bsy - 8 + pulse, 16, Math.PI, 0);
  ctx.fill();

  // Cap spots
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bsx - 2, bsy - 14 + pulse, 3, 3);
  ctx.fillRect(bsx + 8, bsy - 16 + pulse, 3, 3);
  ctx.fillRect(bsx + 14, bsy - 12 + pulse, 3, 3);

  // Angry eyes
  ctx.fillStyle = '#ffff00';
  ctx.fillRect(bsx + 1, bsy + 2 + pulse, 5, 4);
  ctx.fillRect(bsx + TILE - 6, bsy + 2 + pulse, 5, 4);
  // Pupils
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(bsx + 3, bsy + 3 + pulse, 2, 2);
  ctx.fillRect(bsx + TILE - 4, bsy + 3 + pulse, 2, 2);

  // Mouth
  ctx.fillStyle = '#220000';
  ctx.fillRect(bsx + 3, bsy + 8 + pulse, TILE - 6, 3);
  // Teeth
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bsx + 4, bsy + 8 + pulse, 2, 2);
  ctx.fillRect(bsx + 8, bsy + 8 + pulse, 2, 2);
  ctx.fillRect(bsx + 12, bsy + 8 + pulse, 2, 2);

  ctx.globalAlpha = 1;

  // HP bar
  var hpBarW = 40;
  var hpBarX = bsx + TILE / 2 - hpBarW / 2;
  var hpBarY = bsy - 24;
  ctx.fillStyle = '#440000';
  ctx.fillRect(hpBarX, hpBarY, hpBarW, 5);
  ctx.fillStyle = '#ff2244';
  ctx.fillRect(hpBarX, hpBarY, Math.floor(hpBarW * boss.hp / boss.maxHP), 5);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, bsx + TILE / 2, hpBarY - 3);
}

function draw(dt) {
  var theme = getZoneTheme(level);
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Mine: ' + level + ' | Crystals: ' + totalGemsThisRun });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  var hudH = 28;
  var viewW = VIEW_COLS * TILE;
  var viewH = VIEW_ROWS * TILE;
  var offsetX = Math.floor((GW - viewW) / 2);
  var offsetY = hudH + Math.floor((GH - hudH - viewH) / 2);

  var startCol = Math.floor(camX / TILE);
  var startRow = Math.floor(camY / TILE);
  var subX = camX % TILE;
  var subY = camY % TILE;

  for (var vy = -1; vy <= VIEW_ROWS; vy++) {
    for (var vx = -1; vx <= VIEW_COLS; vx++) {
      var gx = startCol + vx;
      var gy = startRow + vy;
      if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) continue;

      var screenX = offsetX + vx * TILE - subX;
      var screenY = offsetY + vy * TILE - subY;

      if (screenX + TILE < offsetX || screenX > offsetX + viewW) continue;
      if (screenY + TILE < offsetY || screenY > offsetY + viewH) continue;

      drawTile(gx, gy, grid[gy][gx], screenX, screenY);
    }
  }

  // Draw enemies
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var esx = offsetX + (e.x - startCol) * TILE - subX;
    var esy = offsetY + (e.y - startRow) * TILE - subY;
    if (esx + TILE < offsetX || esx > offsetX + viewW) continue;
    if (esy + TILE < offsetY || esy > offsetY + viewH) continue;
    ctx.fillStyle = theme.bg;
    ctx.fillRect(esx, esy, TILE, TILE);
    drawEnemy(e, esx, esy);
  }

  // Draw boss
  drawBoss(offsetX, offsetY, startCol, startRow, subX, subY);

  // Draw player
  if (deathTimer <= 0) {
    var psx = offsetX + (playerX - startCol) * TILE - subX;
    var psy = offsetY + (playerY - startRow) * TILE - subY;
    drawPlayer(psx, psy);
  }

  // Draw particles with offset
  ctx.save();
  ctx.translate(offsetX - camX, offsetY - camY);
  TAS.particles.draw();
  ctx.restore();

  // Score popups (world space)
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var spx = offsetX + sp.x - camX;
    var spy = offsetY + sp.y - camY;
    ctx.globalAlpha = Math.min(1, sp.life * 2);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, spx, spy);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Tutorial overlay
  if (tutorialTimer > 0) {
    drawTutorial();
  }

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);

  // Win overlay
  if (winTimer > 0) {
    ctx.fillStyle = 'rgba(56, 217, 115, 0.2)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('MINE LEVEL CLEAR!', GW / 2, GH / 2);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '14px monospace';
    ctx.fillText('Time bonus: +' + (Math.floor(timeLeft) * 2), GW / 2, GH / 2 + 24);
    // Zone name
    ctx.fillStyle = theme.accent;
    ctx.font = '10px monospace';
    ctx.fillText(theme.name, GW / 2, GH / 2 + 42);
  }
}

function drawHUD() {
  var barH = 26;
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 11px monospace';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE:' + score, 4, 17);

  // Level + zone
  var theme = getZoneTheme(level);
  ctx.fillStyle = theme.accent;
  ctx.textAlign = 'center';
  ctx.fillText('LV' + level, GW / 2 - 60, 17);

  // Gems
  ctx.fillStyle = gemsCollected >= gemsRequired ? '#f4b41b' : '#38d973';
  ctx.fillText('CRYSTALS:' + gemsCollected + '/' + gemsRequired, GW / 2 + 20, 17);

  // Timer
  var timeColor = timeLeft <= 10 ? '#ff4444' : timeLeft <= 30 ? '#ffaa44' : '#38d973';
  ctx.fillStyle = timeColor;
  ctx.textAlign = 'right';
  ctx.fillText('TIME:' + Math.ceil(timeLeft), GW - 50, 17);

  // Lives (draw as baseling heads)
  for (var i = 0; i < lives; i++) {
    var lx = GW - 10 - i * 14;
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(lx, 13, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(lx - 2, 11, 2, 2);
    ctx.fillRect(lx + 1, 11, 2, 2);
  }

  // Combo indicator
  if (comboCount > 1 && comboTimer > 0) {
    ctx.fillStyle = '#ff88ff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(comboCount + 'x COMBO', GW / 2, barH + 12);
  }

  // Powerup indicators
  var indicatorY = GH - 24;
  if (hasShield) {
    ctx.fillStyle = 'rgba(68,255,136,0.5)';
    ctx.fillRect(4, indicatorY, 60, 14);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SHIELD ' + Math.ceil(shieldTimer), 6, indicatorY + 10);
  }
  if (hasBoots) {
    ctx.fillStyle = 'rgba(255,170,34,0.5)';
    ctx.fillRect(68, indicatorY, 60, 14);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPEED ' + Math.ceil(bootsTimer), 70, indicatorY + 10);
  }
  if (netSlowTimer > 0) {
    ctx.fillStyle = 'rgba(102,136,68,0.5)';
    ctx.fillRect(132, indicatorY, 60, 14);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SLOWED', 134, indicatorY + 10);
  }

  // Exit indicator
  if (exitOpen && !bossActive) {
    var pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MINE EXIT OPEN!', GW / 2, GH - 10);
    ctx.globalAlpha = 1;
  }

  // Boss warning
  if (bossActive) {
    var warn = Math.sin(frame * 0.08) * 0.4 + 0.6;
    ctx.globalAlpha = warn;
    ctx.fillStyle = '#ff2244';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS FIGHT!', GW / 2, GH - 10);
    ctx.globalAlpha = 1;
  }

  // Zone name on level start
  if (timeLeft > timerMax - 3) {
    var fadeIn = Math.min(1, (timerMax - timeLeft) * 2);
    var fadeOut = Math.min(1, (timeLeft - timerMax + 3) * 2);
    ctx.globalAlpha = Math.min(fadeIn, fadeOut);
    var theme = getZoneTheme(level);
    ctx.fillStyle = theme.accent;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(theme.name, GW / 2, barH + 28);
    ctx.globalAlpha = 1;
  }
}

function drawTutorial() {
  var alpha = Math.min(1, tutorialTimer);
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = '#000000';
  ctx.fillRect(GW / 2 - 140, GH / 2 - 80, 280, 160);
  ctx.globalAlpha = alpha;

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOW TO PLAY', GW / 2, GH / 2 - 55);

  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  var lines = [
    'ARROWS/WASD: Move & dig',
    'Collect spore crystals to open exit',
    'Push boulders sideways',
    'Crush cave slimes with boulders',
    'Spore cap = shield, Boots = speed',
    'Avoid toxic clouds & mycelium nets',
    'Mine boss every 5 levels!',
    '',
    'Press any key to dismiss'
  ];
  for (var i = 0; i < lines.length; i++) {
    ctx.fillStyle = i === lines.length - 1 ? '#ffdd44' : '#cccccc';
    ctx.fillText(lines[i], GW / 2, GH / 2 - 35 + i * 14);
  }
  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  // Cave background with zone theme
  for (var y = 0; y < GH; y += TILE) {
    for (var x = 0; x < GW; x += TILE) {
      var r = ((x * 7 + y * 13) % 100);
      if (r < 30) {
        ctx.fillStyle = '#3a2225';
        ctx.fillRect(x, y, TILE, TILE);
      } else if (r < 60) {
        ctx.fillStyle = '#2a1518';
        ctx.fillRect(x, y, TILE, TILE);
      }
    }
  }

  // Animated mycelium network on background
  ctx.strokeStyle = 'rgba(168,85,247,0.1)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 12; i++) {
    var mx = (frame * 0.3 + i * 40) % GW;
    var my = 200 + Math.sin(frame * 0.02 + i * 2) * 50;
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.lineTo(mx + 30, my + Math.sin(frame * 0.03 + i) * 20);
    ctx.stroke();
  }

  // Decorative gems
  for (var i = 0; i < 8; i++) {
    var gx = 50 + i * 55;
    var gy = 270 + Math.sin(frame * 0.03 + i) * 10;
    var sparkle = Math.sin(frame * 0.1 + i * 2) * 0.3 + 0.7;
    ctx.globalAlpha = sparkle;
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.moveTo(gx, gy - 6);
    ctx.lineTo(gx + 6, gy);
    ctx.lineTo(gx, gy + 6);
    ctx.lineTo(gx - 6, gy);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('BOULDER BASELING', GW / 2 + 2, 62);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('BOULDER BASELING', GW / 2, 60);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Dig the Tasern Crystal Mines', GW / 2, 82);

  // Draw big baseling mascot using statB.color
  var bx = GW / 2, by = 118;
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.arc(bx, by, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(bx - 5, by - 5, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(bx - 5, by - 3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + 5, by - 3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(bx - 5, by - 1, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + 5, by - 1, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(bx, by + 5, 5, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Baseling name
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 10px monospace';
  ctx.fillText(statB.name, bx, by + 26);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Dig for spore crystals & garden gems', GW / 2, 158);
  ctx.fillText('Dodge boulders, cave slimes & toxins', GW / 2, 173);
  ctx.fillText('Collect enough gems to open the exit', GW / 2, 188);
  ctx.fillText('Crush rock beetles with falling boulders', GW / 2, 203);

  // NES-style control box
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 120, 214, 240, 48);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('-- CONTROLS --', GW / 2, 228);
  ctx.fillStyle = '#ccc';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS / WASD .... Move & Dig', GW / 2, 242);
  ctx.fillText('D-PAD (Touch) .... Mobile Move', GW / 2, 254);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = '12px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 290);
  }

  // Stat preview if baseling is loaded
  if (statB.level > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.fillText('LV' + statB.level + ' ' + statB.name + ' | STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 308);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 340);
  ctx.globalAlpha = 1;

  // Version tag
  ctx.fillStyle = '#333';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('v2.1', GW - 4, GH - 18);
  ctx.textAlign = 'center';
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0806';
  ctx.fillRect(0, 0, GW, GH);

  // Background sparkles
  for (var i = 0; i < 20; i++) {
    var sx = (frame * 0.5 + i * 24) % GW;
    var sy = (frame * 0.3 + i * 19) % GH;
    var sa = Math.sin(frame * 0.08 + i) * 0.3 + 0.4;
    ctx.globalAlpha = sa;
    ctx.fillStyle = i % 3 === 0 ? '#38d973' : i % 3 === 1 ? '#a855f7' : '#f4b41b';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('MINE CLEARED!', GW / 2, 80);

  // Victory baseling
  var vbx = GW / 2, vby = 115;
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.arc(vbx, vby, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(vbx - 4, vby - 2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(vbx + 4, vby - 2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(vbx - 4, vby - 1, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(vbx + 4, vby - 1, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('All 20 mine levels cleared!', GW / 2, 150);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 185);

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Spore Crystals: ' + totalGemsThisRun, GW / 2, 210);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 235);
    ctx.globalAlpha = 1;
  }

  // Gem shower
  for (var i = 0; i < 12; i++) {
    var gx = 40 + i * 36;
    var gy = 280 + Math.sin(frame * 0.04 + i * 1.5) * 15;
    var sparkle = Math.sin(frame * 0.1 + i) * 0.3 + 0.7;
    ctx.globalAlpha = sparkle;
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.moveTo(gx, gy - 5);
    ctx.lineTo(gx + 5, gy);
    ctx.lineTo(gx, gy + 5);
    ctx.lineTo(gx - 5, gy);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, 340);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
