<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blaster Baseling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0808; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'FIRE' } });

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// === CONSTANTS ===
const TILE = 16;
const TANK_W = 24, TANK_H = 20;
const FOOT_W = 12, FOOT_H = 12;
const GRAVITY = 600;
const BASE_TANK_SPEED = 120;
const BASE_TANK_JUMP = -280;
const BASE_FOOT_SPEED = 90;
const BASE_TANK_MAX_HP = 8;
const BASE_FOOT_MAX_HP = 4;
const BASE_MAX_LIVES = 3;
const ZONE_W = 30, ZONE_H = 20;
const DUNGEON_W = 15, DUNGEON_H = 11;
const BASE_BULLET_SPEED = 250;
const GRENADE_SPEED = 150;
const BASE_SHOOT_CD_TANK = 0.2;
const BASE_SHOOT_CD_FOOT = 0.25;

// Derived from statB (STR=damage, DEX=speed, CON=HP+lives, INT=score, WIS=cooldown, CHA=drops)
var TANK_SPEED = BASE_TANK_SPEED * statB.speed;            // DEX → speed
var TANK_JUMP = BASE_TANK_JUMP * statB.speed;              // DEX → jump power
var FOOT_SPEED = BASE_FOOT_SPEED * statB.speed;            // DEX → foot speed
var TANK_MAX_HP = Math.round(BASE_TANK_MAX_HP * statB.hpMult); // CON → tank HP
var FOOT_MAX_HP = Math.round(BASE_FOOT_MAX_HP * statB.hpMult); // CON → foot HP
var MAX_LIVES = BASE_MAX_LIVES + statB.lives;              // CON → extra lives
var BULLET_SPEED = BASE_BULLET_SPEED * statB.speed;        // DEX → bullet speed
var SHOOT_CD_TANK = BASE_SHOOT_CD_TANK * statB.cooldown;   // WIS → shoot cooldown
var SHOOT_CD_FOOT = BASE_SHOOT_CD_FOOT * statB.cooldown;   // WIS → shoot cooldown
var DMG_MULT = statB.damage;                                // STR → damage multiplier
var SCORE_MULT = statB.scoreMult;                           // INT → score multiplier
var DROP_CHANCE = 0.15 * statB.luck;                        // CHA → item drop chance
var CRIT_CHANCE = Math.min(0.5, (statB.luck - 1) * 0.1);   // CHA → crit chance
var HOVER_MAX = 60 + (statB.dex - 10) * 2;                 // DEX → hover fuel

// === ZONE DEFINITIONS ===
const ZONE_COLORS = [
  { bg: '#1a0f2e', wall: '#4a2e6a', accent: '#8844aa', glow: '#cc66ff' }, // Spore Hollows
  { bg: '#0f1a2e', wall: '#2e4a6a', accent: '#44aadd', glow: '#66ccff' }, // Crystal Mycelium
  { bg: '#0a1a1a', wall: '#1a4a4a', accent: '#44ddaa', glow: '#66ffcc' }, // Fungal Depths
  { bg: '#2e1a0a', wall: '#6a3a1a', accent: '#dd6622', glow: '#ff8844' }, // Ember Caps
  { bg: '#0a2e0a', wall: '#2a5a2a', accent: '#66dd44', glow: '#88ff66' }, // Bio-Garden
  { bg: '#1a1a2e', wall: '#3a3a6a', accent: '#aaaaff', glow: '#ccccff' }, // Psilocyte Core
  { bg: '#1a1a1a', wall: '#4a4a4a', accent: '#ccaa44', glow: '#ffcc66' }, // Mycelial Nexus
  { bg: '#0a0a0a', wall: '#2a1a2a', accent: '#dd44dd', glow: '#ff66ff' }  // The Dark Spore
];

const ZONE_NAMES = [
  'Spore Hollows', 'Crystal Mycelium', 'Fungal Depths', 'Ember Caps',
  'Bio-Garden', 'Psilocyte Core', 'Mycelial Nexus', 'The Dark Spore'
];

const ZONE_ENEMY_THEMES = [
  ['Sporeling', 'Puffball', 'Cap Turret', 'Spore Mine'],
  ['Crystalite', 'Prism Fly', 'Shard Turret', 'Crystal Mine'],
  ['Deepstalker', 'Gill Moth', 'Brine Turret', 'Depth Mine'],
  ['Ember Bug', 'Ash Flier', 'Flame Turret', 'Cinder Mine'],
  ['Vine Creep', 'Bloom Moth', 'Thorn Turret', 'Pod Mine'],
  ['Psion Slug', 'Mind Fly', 'Psych Turret', 'Brain Mine'],
  ['Wire Worm', 'Gear Bat', 'Tesla Turret', 'Pulse Mine'],
  ['Dark Creep', 'Void Fly', 'Shadow Turret', 'Doom Mine']
];

const BOSS_NAMES = [
  'Sporewarden', 'Crystal King', 'Abyssal Myc', 'Inferno Cap',
  'Bloom Mother', 'Psion Lord', 'Core Warden', 'Dark Spore Prime'
];

const UPGRADE_NAMES = ['Wall Climb', 'Water Traverse', 'Crusher Armor', 'Mega Cannon'];
const GUN_NAMES = ['Spread', 'Wave', 'Homing'];

// Tasern item types
const TASERN_ITEMS = [
  { type: 'spore_shield', name: 'Spore Shield', color: '#88dd44', desc: '+2 Temp HP' },
  { type: 'myco_boost', name: 'Myco Boost', color: '#ff8844', desc: 'Speed Up 10s' },
  { type: 'fungi_charm', name: 'Fungi Charm', color: '#dd44dd', desc: '+50 Score' },
  { type: 'cap_grenade', name: 'Cap Grenade', color: '#ffaa44', desc: '+3 Grenades' },
  { type: 'glow_sap', name: 'Glow Sap', color: '#44ffdd', desc: 'Full Heal' }
];

// === SCORE POPUP SYSTEM ===
var scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, vy: -40 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y += scorePopups[i].vy * dt;
    scorePopups[i].life -= dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x - camX, p.y - camY);
  }
  ctx.globalAlpha = 1;
}

// === ENVIRONMENTAL HAZARD SYSTEM ===
var envHazards = [];
function spawnEnvironmentalHazards(zone, screen, isD) {
  envHazards = [];
  var rng = seedRandom(zone * 777 + screen * 13 + 321);
  var w = isD ? DUNGEON_W : ZONE_W;
  var h = isD ? DUNGEON_H : ZONE_H;
  var count = 1 + Math.floor(rng() * 3) + Math.floor(zone * 0.5);
  for (var i = 0; i < count; i++) {
    var htype = Math.floor(rng() * 4);
    var hx = 3 + Math.floor(rng() * (w - 6));
    var hy = 3 + Math.floor(rng() * (h - 6));
    envHazards.push({
      x: hx * TILE, y: hy * TILE, type: htype,
      timer: rng() * 3, active: false, w: TILE, h: TILE
    });
  }
}

// Hazard types: 0=spore cloud, 1=dripping acid, 2=mycelium trap, 3=fungal vent
function updateEnvHazards(dt) {
  for (var i = 0; i < envHazards.length; i++) {
    var h = envHazards[i];
    h.timer -= dt;
    if (h.timer <= 0) {
      h.active = !h.active;
      h.timer = h.active ? 1.5 : 2.0 + Math.random();
      if (h.active && h.type === 0) {
        TAS.particles.spawn(h.x + 8, h.y + 8, '#88aa44', 6, 2, { gravity: -0.3 });
      }
      if (h.active && h.type === 3) {
        TAS.particles.spawn(h.x + 8, h.y, '#ff8844', 8, 3, { gravity: -1 });
      }
    }
    if (h.active) {
      var pw = mode === 'tank' ? TANK_W : FOOT_W;
      var ph = mode === 'tank' ? TANK_H : FOOT_H;
      if (TAS.hit.rectOverlap(player.x, player.y, pw, ph, h.x, h.y, h.w, h.h)) {
        if (player.invuln <= 0) {
          takeDamage(1);
          if (h.type === 2) {
            // Mycelium trap slows player briefly
            player.vx *= 0.3;
            if (player.vy) player.vy *= 0.5;
          }
        }
      }
    }
  }
}

function drawEnvHazards() {
  for (var i = 0; i < envHazards.length; i++) {
    var h = envHazards[i];
    var hx = h.x - camX, hy = h.y - camY;
    if (hx < -20 || hx > GW + 20 || hy < -20 || hy > GH + 20) continue;

    if (h.type === 0) { // spore cloud
      ctx.fillStyle = '#88aa44';
      ctx.globalAlpha = h.active ? 0.4 + Math.sin(frame * 0.1) * 0.2 : 0.1;
      ctx.beginPath();
      ctx.arc(hx + 8, hy + 8, h.active ? 12 : 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (h.type === 1) { // dripping acid
      ctx.fillStyle = '#44ff88';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(hx + 6, hy, 4, TILE);
      if (h.active) {
        var dripY = (frame * 2 + i * 17) % (TILE * 2);
        ctx.beginPath();
        ctx.arc(hx + 8, hy + dripY, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (h.type === 2) { // mycelium trap
      ctx.fillStyle = '#886644';
      ctx.globalAlpha = h.active ? 0.7 : 0.3;
      for (var t = 0; t < 4; t++) {
        ctx.fillRect(hx + t * 4, hy + 12, 3, 4);
      }
      if (h.active) {
        ctx.fillStyle = '#aa8866';
        ctx.fillRect(hx, hy + 8, TILE, 2);
      }
      ctx.globalAlpha = 1;
    } else if (h.type === 3) { // fungal vent
      ctx.fillStyle = '#ff6622';
      ctx.fillRect(hx + 4, hy + 10, 8, 6);
      if (h.active) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ff8844';
        ctx.fillRect(hx + 2, hy - 8, 12, 18);
        ctx.globalAlpha = 1;
      }
    }
  }
}

// === SCREEN SHAKE EXTRAS ===
var shakeIntensity = 0;
function triggerShake(amount) {
  shakeIntensity = Math.max(shakeIntensity, amount);
  TAS.fx.shake(amount, 0.85);
}

// === PARTICLE TRAILS ===
var trailTimer = 0;
function updateTrails(dt) {
  trailTimer -= dt;
  if (trailTimer <= 0 && state === 'playing') {
    trailTimer = 0.08;
    // Player trail when moving fast
    if (Math.abs(player.vx) > 60 || Math.abs(player.vy) > 100) {
      TAS.particles.spawn(
        player.x + (mode === 'tank' ? TANK_W / 2 : FOOT_W / 2),
        player.y + (mode === 'tank' ? TANK_H : FOOT_H),
        statB.color, 1, 1
      );
    }
  }
  if (shakeIntensity > 0) shakeIntensity *= 0.9;
  if (shakeIntensity < 0.1) shakeIntensity = 0;
}

// === BUFF/DEBUFF SYSTEM ===
var buffs = { speedBoost: 0, shieldHP: 0 };
function updateBuffs(dt) {
  if (buffs.speedBoost > 0) buffs.speedBoost -= dt;
}

// === TUTORIAL SYSTEM ===
var tutorialStep = 0;
var tutorialTimer = 0;
var tutorialShown = {};
var TUTORIALS = [
  { trigger: 'start', text: 'ARROWS to move, Z to jump, X to shoot', duration: 4 },
  { trigger: 'door', text: 'Press DOWN at glowing doors to enter dungeons', duration: 3 },
  { trigger: 'dungeon', text: 'Top-down mode! 8-dir movement. C for grenades', duration: 3 },
  { trigger: 'boss', text: 'BOSS FIGHT! Dodge patterns, aim for the core!', duration: 3 },
  { trigger: 'upgrade', text: 'Upgrades boost your tank. Explore to find them all!', duration: 3 },
  { trigger: 'zone', text: 'New zone ahead! Enemies get tougher here.', duration: 3 }
];
function showTutorial(trigger) {
  if (tutorialShown[trigger]) return;
  for (var i = 0; i < TUTORIALS.length; i++) {
    if (TUTORIALS[i].trigger === trigger) {
      tutorialStep = i;
      tutorialTimer = TUTORIALS[i].duration;
      tutorialShown[trigger] = true;
      return;
    }
  }
}
function updateTutorial(dt) {
  if (tutorialTimer > 0) tutorialTimer -= dt;
}
function drawTutorial() {
  if (tutorialTimer <= 0) return;
  var tut = TUTORIALS[tutorialStep];
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(GW / 2 - 180, GH - 50, 360, 30);
  ctx.strokeStyle = statB.color;
  ctx.strokeRect(GW / 2 - 180, GH - 50, 360, 30);
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.globalAlpha = Math.min(1, tutorialTimer * 2);
  ctx.fillText(tut.text, GW / 2, GH - 31);
  ctx.globalAlpha = 1;
}

// === COMBO SYSTEM ===
var comboCount = 0;
var comboTimer = 0;
function addCombo(x, y) {
  comboCount++;
  comboTimer = 2.0;
  if (comboCount >= 3) {
    var bonus = comboCount * 5;
    score += Math.round(bonus * SCORE_MULT);
    spawnScorePopup(x, y - 10, comboCount + 'x COMBO +' + Math.round(bonus * SCORE_MULT), '#ff44ff');
  }
}
function updateCombo(dt) {
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }
}

// === GAME STATE ===
var state = 'title';
var frame = 0;
var lives = MAX_LIVES;
var score = 0;
var highScore = TAS.score.load('blaster_baseling_hi');

var mode = 'tank';
var currentZone = 0;
var currentScreen = 0;
var inDungeon = false;
var dungeonRoom = 0;
var dungeonId = -1;
var levelCount = 0; // tracks zone transitions for boss-every-5 logic

// Player state
var player = null;
var tankHP = TANK_MAX_HP;
var footHP = FOOT_MAX_HP;
var tankUpgrades = [false, false, false, false];
var gunUpgrade = -1;
var grenades = 3;
var hoverFuel = 0;

// Camera
var camX = 0, camY = 0;

// Bullets, enemies, items
var bullets = [];
var enemyBullets = [];
var enemies = [];
var items = [];
var doors = [];
var particles_local = [];

// Map data
var tiles = [];
var mapW = 0, mapH = 0;

// Dungeon state
var dungeonTiles = [];
var dungeonEnemies = [];
var dungeonBoss = null;
var dungeonCleared = [];

// Zone progression
var zoneKeys = [true, false, false, false, false, false, false, false];
var exploredScreens = {};

// Zone transition effect
var zoneTransition = { active: false, timer: 0, fromZone: 0, toZone: 0 };

// === BACKGROUND LAYERS (parallax) ===
var bgLayers = [];
function generateBgLayers(zone) {
  bgLayers = [];
  var rng = seedRandom(zone * 999 + 77);
  // Far background mushrooms/crystals
  for (var i = 0; i < 15; i++) {
    bgLayers.push({
      x: rng() * GW * 2, y: GH * 0.3 + rng() * GH * 0.5,
      w: 8 + rng() * 16, h: 12 + rng() * 24,
      depth: 0.2 + rng() * 0.3,
      type: Math.floor(rng() * 3) // 0=mushroom, 1=crystal, 2=stalagmite
    });
  }
  // Mid-ground detail
  for (var i = 0; i < 10; i++) {
    bgLayers.push({
      x: rng() * GW * 2, y: GH * 0.5 + rng() * GH * 0.3,
      w: 4 + rng() * 8, h: 6 + rng() * 12,
      depth: 0.4 + rng() * 0.2,
      type: 3 + Math.floor(rng() * 2) // 3=small shroom, 4=vine
    });
  }
}

function drawBgLayers() {
  var colors = ZONE_COLORS[currentZone];
  for (var i = 0; i < bgLayers.length; i++) {
    var layer = bgLayers[i];
    var px = (layer.x - camX * layer.depth) % (GW * 2) - GW * 0.5;
    var py = layer.y;
    ctx.globalAlpha = 0.15 + layer.depth * 0.15;

    if (layer.type === 0) { // mushroom silhouette
      ctx.fillStyle = colors.wall;
      ctx.fillRect(px + layer.w * 0.4, py, layer.w * 0.2, layer.h);
      ctx.beginPath();
      ctx.arc(px + layer.w * 0.5, py, layer.w * 0.5, Math.PI, 0);
      ctx.fill();
    } else if (layer.type === 1) { // crystal
      ctx.fillStyle = colors.accent;
      ctx.beginPath();
      ctx.moveTo(px, py + layer.h);
      ctx.lineTo(px + layer.w * 0.5, py);
      ctx.lineTo(px + layer.w, py + layer.h);
      ctx.fill();
    } else if (layer.type === 2) { // stalagmite
      ctx.fillStyle = colors.wall;
      ctx.beginPath();
      ctx.moveTo(px, py + layer.h);
      ctx.lineTo(px + layer.w * 0.3, py);
      ctx.lineTo(px + layer.w * 0.7, py + layer.h * 0.3);
      ctx.lineTo(px + layer.w, py + layer.h);
      ctx.fill();
    } else if (layer.type === 3) { // small shroom
      ctx.fillStyle = colors.accent;
      ctx.fillRect(px + 1, py + 2, 2, layer.h - 2);
      ctx.beginPath();
      ctx.arc(px + 2, py + 2, 3, Math.PI, 0);
      ctx.fill();
    } else if (layer.type === 4) { // vine
      ctx.strokeStyle = colors.accent;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.quadraticCurveTo(px + layer.w, py + layer.h * 0.5, px + 2, py + layer.h);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }
  ctx.globalAlpha = 1;
}

// === SAVE / LOAD ===
function saveGame() {
  var data = {
    zone: currentZone, screen: currentScreen, lives: lives, score: score,
    tankUpgrades: tankUpgrades, gunUpgrade: gunUpgrade, grenades: grenades, zoneKeys: zoneKeys,
    dungeonCleared: dungeonCleared, exploredScreens: exploredScreens, tankHP: tankHP, footHP: footHP,
    levelCount: levelCount
  };
  try { localStorage.setItem('blaster_baseling_save', JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    var raw = localStorage.getItem('blaster_baseling_save');
    if (!raw) return false;
    var data = JSON.parse(raw);
    currentZone = data.zone || 0;
    currentScreen = data.screen || 0;
    lives = data.lives || MAX_LIVES;
    score = data.score || 0;
    tankUpgrades = data.tankUpgrades || [false, false, false, false];
    gunUpgrade = data.gunUpgrade !== undefined ? data.gunUpgrade : -1;
    grenades = data.grenades || 3;
    zoneKeys = data.zoneKeys || [true, false, false, false, false, false, false, false];
    dungeonCleared = data.dungeonCleared || [];
    exploredScreens = data.exploredScreens || {};
    tankHP = data.tankHP || TANK_MAX_HP;
    footHP = data.footHP || FOOT_MAX_HP;
    levelCount = data.levelCount || 0;
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

// === MAP GENERATION ===
function seedRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

function generateZoneScreen(zone, screen) {
  var rng = seedRandom(zone * 1000 + screen * 7 + 42);
  var w = ZONE_W, h = ZONE_H;
  var t = [];
  for (var y = 0; y < h; y++) {
    t[y] = [];
    for (var x = 0; x < w; x++) {
      if (y === 0 || y === h - 1 || x === 0 || x === w - 1) {
        t[y][x] = 1;
      } else if (y >= h - 3 && rng() < 0.3) {
        t[y][x] = 1;
      } else if (y >= h - 2) {
        t[y][x] = 1;
      } else {
        t[y][x] = 0;
      }
    }
  }

  // Add platforms
  var platformCount = 3 + Math.floor(rng() * 4);
  for (var i = 0; i < platformCount; i++) {
    var px = 3 + Math.floor(rng() * (w - 8));
    var py = 4 + Math.floor(rng() * (h - 8));
    var pw = 3 + Math.floor(rng() * 5);
    for (var x = px; x < px + pw && x < w - 1; x++) {
      t[py][x] = 1;
    }
  }

  // Zone-specific features
  if (zone === 2 || zone === 3) {
    for (var x = 1; x < w - 1; x++) {
      if (rng() < 0.4 && t[h - 2][x] === 1) {
        t[h - 2][x] = zone === 2 ? 2 : 3;
        t[h - 3][x] = zone === 2 ? 2 : 3;
      }
    }
  }

  // Zone 4 (Bio-Garden) - thorny vines tile type 4
  if (zone === 4) {
    for (var x = 2; x < w - 2; x++) {
      if (rng() < 0.15) {
        var vy = 2 + Math.floor(rng() * (h - 6));
        t[vy][x] = 4; // thorns
      }
    }
  }

  // Zone 6 (Mycelial Nexus) - conveyor tiles type 5
  if (zone === 6) {
    for (var x = 3; x < w - 3; x++) {
      if (rng() < 0.1) {
        var cy = h - 3;
        if (t[cy][x] === 1) t[cy][x] = 5; // conveyor
      }
    }
  }

  // Openings for zone transitions
  if (screen > 0) {
    for (var y = h - 5; y < h - 1; y++) t[y][0] = 0;
  }
  if (screen < 2) {
    for (var y = h - 5; y < h - 1; y++) t[y][w - 1] = 0;
  }
  if (screen === 2 && zone < 7) {
    for (var x = 13; x < 17; x++) t[0][x] = 0;
  }

  return t;
}

function generateDungeon(zone, id) {
  var rng = seedRandom(zone * 500 + id * 13 + 99);
  var w = DUNGEON_W, h = DUNGEON_H;
  var t = [];
  for (var y = 0; y < h; y++) {
    t[y] = [];
    for (var x = 0; x < w; x++) {
      if (y === 0 || y === h - 1 || x === 0 || x === w - 1) {
        t[y][x] = 1;
      } else {
        t[y][x] = 0;
      }
    }
  }

  var obstCount = 4 + Math.floor(rng() * 4);
  for (var i = 0; i < obstCount; i++) {
    var ox = 2 + Math.floor(rng() * (w - 5));
    var oy = 2 + Math.floor(rng() * (h - 5));
    var ow = 1 + Math.floor(rng() * 3);
    var oh = 1 + Math.floor(rng() * 2);
    for (var y = oy; y < oy + oh && y < h - 1; y++) {
      for (var x = ox; x < ox + ow && x < w - 1; x++) {
        t[y][x] = 1;
      }
    }
  }

  t[h - 2][Math.floor(w / 2)] = 0;
  t[h - 2][Math.floor(w / 2) + 1] = 0;
  t[h - 3][Math.floor(w / 2)] = 0;

  return t;
}

function generateEnemies(zone, screen, isD, dId) {
  var rng = seedRandom(zone * 333 + (isD ? dId * 77 : screen * 11) + 7);
  var elist = [];
  var count = isD ? (3 + zone) : (2 + Math.floor(rng() * 3) + Math.floor(zone * 0.5));
  var w = isD ? DUNGEON_W : ZONE_W;
  var h = isD ? DUNGEON_H : ZONE_H;

  for (var i = 0; i < count; i++) {
    var ex = 3 + Math.floor(rng() * (w - 6));
    var ey = 2 + Math.floor(rng() * (h - 5));
    var type = Math.floor(rng() * 4);
    var baseHP = 1 + Math.floor(zone * 0.5);
    // Zone 5+ gets extra enemy subtypes
    var subtype = zone >= 4 ? Math.floor(rng() * 3) : 0;
    elist.push({
      x: ex * TILE, y: ey * TILE, type: type, subtype: subtype,
      hp: baseHP, maxHP: baseHP,
      w: 14, h: 14, vx: type === 0 ? (rng() > 0.5 ? 1 : -1) * 30 : 0,
      vy: type === 1 ? (rng() > 0.5 ? 1 : -1) * 20 : 0,
      shootTimer: 60 + Math.floor(rng() * 60), shootCD: 0, alive: true,
      startX: ex * TILE, startY: ey * TILE, moveRange: 30 + rng() * 50,
      flashTimer: 0
    });
  }
  return elist;
}

function generateDoors(zone, screen) {
  var rng = seedRandom(zone * 200 + screen * 3 + 55);
  var dlist = [];
  if (screen === 0 || (screen === 1 && rng() > 0.3)) {
    var dx = 8 + Math.floor(rng() * 14);
    dlist.push({ x: dx * TILE, y: (ZONE_H - 4) * TILE, id: zone * 10 + screen, required: screen === 0 });
  }
  if (screen === 2 && rng() > 0.5) {
    var dx = 18 + Math.floor(rng() * 6);
    dlist.push({ x: dx * TILE, y: (ZONE_H - 4) * TILE, id: zone * 10 + 5, required: false });
  }
  return dlist;
}

function generateItems(zone, screen, isD, dId) {
  var rng = seedRandom(zone * 444 + (isD ? dId * 9 : screen * 5) + 123);
  var ilist = [];

  if (isD && rng() > 0.6) {
    ilist.push({ x: 7 * TILE, y: 3 * TILE, type: 'grenade', collected: false });
  }
  if (!isD && rng() > 0.7) {
    var ix = 5 + Math.floor(rng() * 20);
    ilist.push({ x: ix * TILE, y: (ZONE_H - 5) * TILE, type: 'health', collected: false });
  }

  // Tasern-themed items (CHA/luck increases spawn chance)
  var tasernChance = 0.12 * statB.luck; // CHA → more Tasern items
  if (rng() < tasernChance) {
    var tItem = TASERN_ITEMS[Math.floor(rng() * TASERN_ITEMS.length)];
    var tx = 4 + Math.floor(rng() * (isD ? 8 : 20));
    var ty = 3 + Math.floor(rng() * (isD ? 5 : 12));
    ilist.push({ x: tx * TILE, y: ty * TILE, type: tItem.type, collected: false, tasern: true, name: tItem.name, desc: tItem.desc, color: tItem.color });
  }

  return ilist;
}

// === LOAD SCREEN ===
function loadScreen() {
  if (inDungeon) {
    dungeonTiles = generateDungeon(currentZone, dungeonId);
    dungeonEnemies = generateEnemies(currentZone, 0, true, dungeonId);
    items = generateItems(currentZone, 0, true, dungeonId);
    mapW = DUNGEON_W;
    mapH = DUNGEON_H;
    spawnEnvironmentalHazards(currentZone, dungeonRoom, true);
    if (dungeonRoom >= 2) {
      spawnBoss();
    }
  } else {
    tiles = generateZoneScreen(currentZone, currentScreen);
    enemies = generateEnemies(currentZone, currentScreen, false, 0);
    doors = generateDoors(currentZone, currentScreen);
    items = generateItems(currentZone, currentScreen, false, 0);
    mapW = ZONE_W;
    mapH = ZONE_H;
    spawnEnvironmentalHazards(currentZone, currentScreen, false);
    var key = currentZone + '_' + currentScreen;
    exploredScreens[key] = true;
  }
  bullets = [];
  enemyBullets = [];
  scorePopups = [];
  generateBgLayers(currentZone);
}

function spawnBoss() {
  var bossHP = Math.round((8 + currentZone * 4) * (1 + currentZone * 0.15));
  // Every 5 level transitions triggers a mega-boss variant
  var isMegaBoss = (levelCount > 0 && levelCount % 5 === 0);
  if (isMegaBoss) {
    bossHP = Math.round(bossHP * 1.8);
  }
  dungeonBoss = {
    x: (DUNGEON_W / 2) * TILE, y: 3 * TILE, w: isMegaBoss ? 36 : 28, h: isMegaBoss ? 36 : 28,
    hp: bossHP, maxHP: bossHP, phase: 0, timer: 0,
    vx: 40 + currentZone * 3, vy: 20 + currentZone * 2,
    shootCD: 0, alive: true, mega: isMegaBoss,
    attackPattern: 0, patternTimer: 0,
    name: BOSS_NAMES[currentZone] || 'Unknown',
    entranceTimer: 1.5 // dramatic entrance
  };
  showTutorial('boss');
  TAS.audio.playTone(80, 0.5, 'sawtooth', 0.1, 40);
}

// === PLAYER INIT ===
function initPlayer() {
  player = {
    x: 3 * TILE, y: (ZONE_H - 4) * TILE,
    vx: 0, vy: 0, facing: 1,
    shootCD: 0, invuln: 0, grounded: false,
    facingUp: false, walkFrame: 0
  };
  hoverFuel = HOVER_MAX;
}

// === START GAME ===
function startGame(continued) {
  if (!continued) {
    lives = MAX_LIVES;
    score = 0;
    currentZone = 0;
    currentScreen = 0;
    tankHP = TANK_MAX_HP;
    footHP = FOOT_MAX_HP;
    tankUpgrades = [false, false, false, false];
    gunUpgrade = -1;
    grenades = 3;
    zoneKeys = [true, false, false, false, false, false, false, false];
    dungeonCleared = [];
    exploredScreens = {};
    levelCount = 0;
  }
  mode = 'tank';
  inDungeon = false;
  dungeonRoom = 0;
  dungeonBoss = null;
  buffs.speedBoost = 0;
  buffs.shieldHP = 0;
  comboCount = 0;
  comboTimer = 0;
  initPlayer();
  loadScreen();
  state = 'playing';
  TAS.particles.clear();
  showTutorial('start');
}

// === COLLISION HELPERS ===
function tileAt(tx, ty) {
  if (inDungeon) {
    if (tx < 0 || tx >= DUNGEON_W || ty < 0 || ty >= DUNGEON_H) return 1;
    return dungeonTiles[ty][tx];
  } else {
    if (tx < 0 || tx >= ZONE_W || ty < 0 || ty >= ZONE_H) return 1;
    return tiles[ty][tx];
  }
}

function solidAt(px, py, pw, ph) {
  var x1 = Math.floor(px / TILE);
  var y1 = Math.floor(py / TILE);
  var x2 = Math.floor((px + pw - 1) / TILE);
  var y2 = Math.floor((py + ph - 1) / TILE);
  for (var y = y1; y <= y2; y++) {
    for (var x = x1; x <= x2; x++) {
      var t = tileAt(x, y);
      if (t === 1) return true;
      if (t === 2 && mode === 'tank' && !tankUpgrades[1]) return true;
      if (t === 3) return true;
      if (t === 4) return false; // thorns are passable but damaging
      if (t === 5) return false; // conveyors are passable
    }
  }
  return false;
}

function hazardAt(px, py, pw, ph) {
  var x1 = Math.floor(px / TILE);
  var y1 = Math.floor(py / TILE);
  var x2 = Math.floor((px + pw - 1) / TILE);
  var y2 = Math.floor((py + ph - 1) / TILE);
  for (var y = y1; y <= y2; y++) {
    for (var x = x1; x <= x2; x++) {
      var t = tileAt(x, y);
      if (t === 3) return 'lava';
      if (t === 2 && mode === 'foot') return 'water';
      if (t === 4) return 'thorns';
    }
  }
  return null;
}

function conveyorAt(px, py, pw, ph) {
  var x1 = Math.floor(px / TILE);
  var y1 = Math.floor(py / TILE);
  var x2 = Math.floor((px + pw - 1) / TILE);
  var y2 = Math.floor((py + ph - 1) / TILE);
  for (var y = y1; y <= y2; y++) {
    for (var x = x1; x <= x2; x++) {
      if (tileAt(x, y) === 5) return 1; // push right
    }
  }
  return 0;
}

// === UPDATE: TANK MODE ===
function updateTank(dt) {
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var spd = TANK_SPEED * (buffs.speedBoost > 0 ? 1.4 : 1); // Buff: speed boost

  var moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { moveX = -1; player.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { moveX = 1; player.facing = 1; }
  player.vx = moveX * spd;

  // Conveyor belt push
  var conv = conveyorAt(player.x, player.y + TANK_H, TANK_W, 2);
  if (conv) player.vx += conv * 40;

  player.facingUp = !!(keys['ArrowUp'] || keys['KeyW'] || touch.up);

  // Walk animation frame
  if (Math.abs(moveX) > 0) player.walkFrame += dt * 8;

  // Jump / Hover
  if ((keys['Space'] || keys['KeyZ'] || touch.a) && player.grounded) {
    player.vy = TANK_JUMP;
    player.grounded = false;
    hoverFuel = HOVER_MAX;
    TAS.audio.playTone(200, 0.15, 'square', 0.08, 300);
  } else if ((keys['Space'] || keys['KeyZ'] || touch.a) && !player.grounded && hoverFuel > 0) {
    player.vy = Math.max(player.vy - 400 * dt, -100);
    hoverFuel -= dt * 60;
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > 400) player.vy = 400;

  // Move X
  var newX = player.x + player.vx * dt;
  if (!solidAt(newX, player.y, TANK_W, TANK_H)) {
    player.x = newX;
  } else if (tankUpgrades[0]) {
    var wallY = player.y - 2;
    if (!solidAt(player.x, wallY, TANK_W, TANK_H)) {
      player.y = wallY;
      player.x = newX;
    }
  }

  // Move Y
  var newY = player.y + player.vy * dt;
  if (!solidAt(player.x, newY, TANK_W, TANK_H)) {
    player.y = newY;
    player.grounded = false;
  } else {
    if (player.vy > 0) {
      player.grounded = true;
      hoverFuel = HOVER_MAX;
    }
    player.vy = 0;
  }

  // Shoot (WIS → cooldown via SHOOT_CD_TANK)
  if (player.shootCD > 0) player.shootCD -= dt;
  if ((keys['KeyX'] || keys['Enter'] || touch.b) && player.shootCD <= 0) {
    fireBullet();
    player.shootCD = SHOOT_CD_TANK;
  }

  // Screen transitions
  if (player.x < -4) {
    if (currentScreen > 0) {
      currentScreen--;
      player.x = (ZONE_W - 2) * TILE;
      loadScreen();
    } else if (currentZone > 0 && zoneKeys[currentZone - 1]) {
      currentZone--;
      currentScreen = 2;
      player.x = (ZONE_W - 2) * TILE;
      levelCount++;
      loadScreen();
      showTutorial('zone');
    } else {
      player.x = 0;
    }
  }
  if (player.x > (ZONE_W - 1) * TILE) {
    if (currentScreen < 2) {
      currentScreen++;
      player.x = 2 * TILE;
      loadScreen();
    } else {
      player.x = (ZONE_W - 1) * TILE;
    }
  }
  if (player.y < -4 && currentScreen === 2 && currentZone < 7) {
    if (zoneKeys[currentZone + 1]) {
      zoneTransition.active = true;
      zoneTransition.timer = 1.0;
      zoneTransition.fromZone = currentZone;
      zoneTransition.toZone = currentZone + 1;
      currentZone++;
      currentScreen = 0;
      player.y = (ZONE_H - 3) * TILE;
      levelCount++;
      loadScreen();
      showTutorial('zone');
    } else {
      player.y = 0;
    }
  }

  // Door interaction
  for (var di = 0; di < doors.length; di++) {
    var door = doors[di];
    if (TAS.hit.rectOverlap(player.x, player.y, TANK_W, TANK_H, door.x, door.y, TILE * 2, TILE * 2)) {
      if (keys['ArrowDown'] || keys['KeyS'] || touch.down) {
        showTutorial('door');
        enterDungeon(door.id);
      }
    }
  }

  // Hazard damage
  var haz = hazardAt(player.x, player.y, TANK_W, TANK_H);
  if (haz && player.invuln <= 0) {
    takeDamage(haz === 'lava' ? 2 : 1);
  }
}

// === UPDATE: FOOT MODE (TOP-DOWN) ===
function updateFoot(dt) {
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  var mx = 0, my = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { mx = -1; player.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { mx = 1; player.facing = 1; }
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) { my = -1; player.facingUp = true; }
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) { my = 1; player.facingUp = false; }

  if (mx !== 0 || my !== 0) {
    var len = Math.sqrt(mx * mx + my * my);
    mx /= len; my /= len;
  }

  var spd = FOOT_SPEED * (buffs.speedBoost > 0 ? 1.4 : 1);
  var newX = player.x + mx * spd * dt * 60;
  var newY = player.y + my * spd * dt * 60;

  if (mx !== 0 || my !== 0) player.walkFrame += dt * 10;

  if (!solidAt(newX, player.y, FOOT_W, FOOT_H)) player.x = newX;
  if (!solidAt(player.x, newY, FOOT_W, FOOT_H)) player.y = newY;

  // Shoot (WIS → cooldown via SHOOT_CD_FOOT)
  if (player.shootCD > 0) player.shootCD -= dt;
  if ((keys['KeyX'] || keys['Enter'] || touch.b) && player.shootCD <= 0) {
    fireFootBullet(mx, my);
    player.shootCD = SHOOT_CD_FOOT;
  }

  // Grenade
  if ((keys['KeyC'] || keys['ShiftLeft']) && grenades > 0 && player.shootCD <= 0) {
    fireGrenade(mx, my);
    grenades--;
    player.shootCD = 0.4 * statB.cooldown; // WIS → grenade cooldown
  }

  // Room transition in dungeon
  if (player.y > (DUNGEON_H - 1) * TILE) {
    exitDungeon();
  }
  if (player.y < TILE && dungeonRoom < 2) {
    dungeonRoom++;
    player.y = (DUNGEON_H - 2) * TILE;
    loadScreen();
  }

  // Hazard
  var haz = hazardAt(player.x, player.y, FOOT_W, FOOT_H);
  if (haz && player.invuln <= 0) {
    takeDamage(1);
  }
}

// === SHOOTING ===
function fireBullet() {
  var dx = player.facing, dy = 0;
  if (player.facingUp) { dx = 0; dy = -1; }
  var bx = player.x + (dx > 0 ? TANK_W : dx < 0 ? -6 : TANK_W / 2);
  var by = player.y + (dy < 0 ? -6 : TANK_H / 2);

  // STR → damage via DMG_MULT
  if (tankUpgrades[3]) {
    bullets.push({ x: bx, y: by, vx: dx * BULLET_SPEED * 1.5, vy: dy * BULLET_SPEED * 1.5, size: 6, dmg: Math.round(3 * DMG_MULT), life: 2 });
  } else {
    bullets.push({ x: bx, y: by, vx: dx * BULLET_SPEED, vy: dy * BULLET_SPEED, size: 4, dmg: Math.round(1 * DMG_MULT), life: 1.5 });
  }
  // Muzzle flash particle
  TAS.particles.spawn(bx, by, '#ffdd44', 3, 1);
  TAS.audio.playTone(440, 0.06, 'square', 0.06, 880);
}

function fireFootBullet(mx, my) {
  var dx = player.facing, dy = 0;
  if (my < -0.5) dy = -1;
  else if (my > 0.5) dy = 1;
  if (Math.abs(mx) > 0.5) dx = mx > 0 ? 1 : -1;
  if (dx === 0 && dy === 0) dx = player.facing;

  var bx = player.x + FOOT_W / 2;
  var by = player.y + FOOT_H / 2;

  // All foot bullets use STR → DMG_MULT
  if (gunUpgrade === 0) { // spread
    for (var a = -0.3; a <= 0.3; a += 0.3) {
      var sdx = dx * Math.cos(a) - dy * Math.sin(a);
      var sdy = dx * Math.sin(a) + dy * Math.cos(a);
      bullets.push({ x: bx, y: by, vx: sdx * BULLET_SPEED, vy: sdy * BULLET_SPEED, size: 3, dmg: Math.round(1 * DMG_MULT), life: 0.8 });
    }
  } else if (gunUpgrade === 1) { // wave
    bullets.push({ x: bx, y: by, vx: dx * BULLET_SPEED * 0.8, vy: dy * BULLET_SPEED * 0.8, size: 5, dmg: Math.round(2 * DMG_MULT), life: 1.2, wave: true, waveT: 0 });
  } else if (gunUpgrade === 2) { // homing
    bullets.push({ x: bx, y: by, vx: dx * BULLET_SPEED * 0.7, vy: dy * BULLET_SPEED * 0.7, size: 3, dmg: Math.round(2 * DMG_MULT), life: 2, homing: true });
  } else {
    bullets.push({ x: bx, y: by, vx: dx * BULLET_SPEED, vy: dy * BULLET_SPEED, size: 3, dmg: Math.round(1 * DMG_MULT), life: 1 });
  }
  TAS.particles.spawn(bx, by, '#44ddff', 2, 1);
  TAS.audio.playTone(660, 0.05, 'triangle', 0.05, 1200);
}

function fireGrenade(mx, my) {
  var dx = mx || player.facing;
  var dy = my || 0;
  bullets.push({
    x: player.x + (mode === 'tank' ? TANK_W / 2 : FOOT_W / 2),
    y: player.y,
    vx: dx * GRENADE_SPEED, vy: dy * GRENADE_SPEED - 80,
    size: 5, dmg: Math.round(4 * DMG_MULT), life: 1.5, grenade: true, gravity: 200 // STR → grenade dmg
  });
  TAS.audio.playTone(150, 0.1, 'sawtooth', 0.06, 80);
}

// === DAMAGE ===
function takeDamage(amount) {
  if (player.invuln > 0) return;
  // Shield buff absorbs damage first
  if (buffs.shieldHP > 0) {
    buffs.shieldHP -= amount;
    if (buffs.shieldHP < 0) buffs.shieldHP = 0;
    TAS.particles.spawn(player.x, player.y, '#44ff88', 8, 2);
    player.invuln = 0.5;
    return;
  }
  if (mode === 'tank') {
    tankHP -= amount;
    if (tankUpgrades[2]) tankHP += Math.floor(amount * 0.3); // crusher armor
    if (tankHP <= 0) { die(); return; }
  } else {
    footHP -= amount;
    if (footHP <= 0) { die(); return; }
  }
  player.invuln = 1.5;
  TAS.fx.flash('#ff0000', 0.4);
  triggerShake(4);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.1, 50);
}

function die() {
  lives--;
  TAS.fx.flash('#ff0000', 0.8);
  triggerShake(8);
  TAS.particles.spawn(player.x, player.y, '#ff4400', 20, 4, { gravity: 1 });
  TAS.particles.spawn(player.x, player.y, statB.color, 10, 3, { gravity: 0.5 }); // Baseling-colored death particles
  TAS.audio.playNoise(0.4, 0.15, 200);

  if (lives <= 0) {
    if (score > highScore) {
      highScore = score;
      TAS.score.save('blaster_baseling_hi', highScore);
    }
    saveGame();
    state = 'gameOver';
    return;
  }

  // Respawn
  tankHP = TANK_MAX_HP;
  footHP = FOOT_MAX_HP;
  gunUpgrade = -1;
  buffs.speedBoost = 0;
  buffs.shieldHP = 0;
  if (inDungeon) {
    exitDungeon();
  } else {
    initPlayer();
    loadScreen();
  }
}

// === DUNGEON ENTER/EXIT ===
function enterDungeon(id) {
  inDungeon = true;
  dungeonId = id;
  dungeonRoom = 0;
  dungeonBoss = null;
  mode = 'foot';
  player.x = (DUNGEON_W / 2) * TILE;
  player.y = (DUNGEON_H - 3) * TILE;
  player.vx = 0; player.vy = 0;
  loadScreen();
  showTutorial('dungeon');
  TAS.audio.playTone(200, 0.3, 'triangle', 0.06, 400);
}

function exitDungeon() {
  inDungeon = false;
  dungeonRoom = 0;
  dungeonBoss = null;
  mode = 'tank';
  initPlayer();
  loadScreen();
  TAS.audio.playTone(400, 0.3, 'triangle', 0.06, 200);
}

// === UPDATE ENEMIES ===
function updateEnemiesCommon(elist, dt) {
  for (var i = elist.length - 1; i >= 0; i--) {
    var e = elist[i];
    if (!e.alive) continue;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Movement by type
    if (e.type === 0) { // crawler
      e.x += e.vx * dt;
      if (Math.abs(e.x - e.startX) > e.moveRange) e.vx *= -1;
    } else if (e.type === 1) { // flyer - sine pattern
      e.x += e.vx * dt;
      e.y = e.startY + Math.sin(frame * 0.03 + i) * 30;
      if (Math.abs(e.x - e.startX) > e.moveRange) e.vx *= -1;
    } else if (e.type === 2) { // turret - stationary, shoots
      e.shootCD -= dt;
      if (e.shootCD <= 0) {
        var ang = TAS.math.angle(e.x, e.y, player.x, player.y);
        enemyBullets.push({
          x: e.x + 7, y: e.y + 7,
          vx: Math.cos(ang) * 100, vy: Math.sin(ang) * 100,
          size: 3, life: 3
        });
        e.shootCD = (90 - currentZone * 5) / 60;
        TAS.audio.playTone(200, 0.04, 'sawtooth', 0.03);
      }
    } else if (e.type === 3) { // mine layer
      e.x += e.vx * dt;
      if (Math.abs(e.x - e.startX) > e.moveRange) e.vx *= -1;
      e.shootCD -= dt;
      if (e.shootCD <= 0) {
        enemyBullets.push({
          x: e.x + 7, y: e.y + 14, vx: 0, vy: 0, size: 4, life: 5, mine: true
        });
        e.shootCD = 2;
      }
    }

    // Bullet hit detection
    for (var j = bullets.length - 1; j >= 0; j--) {
      var b = bullets[j];
      if (TAS.hit.rectOverlap(b.x - b.size / 2, b.y - b.size / 2, b.size, b.size, e.x, e.y, e.w, e.h)) {
        // CHA → crit chance
        var isCrit = Math.random() < CRIT_CHANCE;
        var finalDmg = isCrit ? b.dmg * 2 : b.dmg;
        e.hp -= finalDmg;
        e.flashTimer = 0.1;
        if (!b.grenade) bullets.splice(j, 1);
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, ZONE_COLORS[currentZone].accent, 5, 2);

        if (isCrit) {
          spawnScorePopup(e.x, e.y - 8, 'CRIT!', '#ff4444');
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 8, 3);
          TAS.audio.playTone(500, 0.08, 'square', 0.06, 300);
        } else {
          TAS.audio.playTone(300, 0.05, 'square', 0.04, 200);
        }

        if (e.hp <= 0) {
          e.alive = false;
          // INT → score via SCORE_MULT
          var killScore = Math.round(10 * (currentZone + 1) * SCORE_MULT);
          score += killScore;
          addCombo(e.x, e.y);
          spawnScorePopup(e.x + e.w / 2, e.y, '+' + killScore, '#ffdd44');
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffaa00', 12, 3, { gravity: 0.5 });
          TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 50);
          // CHA → drop chance via DROP_CHANCE
          if (Math.random() < DROP_CHANCE) {
            var dropRoll = Math.random();
            if (dropRoll < 0.3) {
              items.push({ x: e.x, y: e.y, type: 'health', collected: false });
            } else if (dropRoll < 0.55) {
              items.push({ x: e.x, y: e.y, type: 'grenade', collected: false });
            } else {
              // Tasern item drop
              var tItem = TASERN_ITEMS[Math.floor(Math.random() * TASERN_ITEMS.length)];
              items.push({ x: e.x, y: e.y, type: tItem.type, collected: false, tasern: true, name: tItem.name, desc: tItem.desc, color: tItem.color });
            }
          }
        }
        break;
      }
    }

    // Collide with player
    var pw = mode === 'tank' ? TANK_W : FOOT_W;
    var ph = mode === 'tank' ? TANK_H : FOOT_H;
    if (e.alive && TAS.hit.rectOverlap(player.x, player.y, pw, ph, e.x, e.y, e.w, e.h)) {
      if (player.invuln <= 0) takeDamage(1);
    }
  }
}

// === UPDATE BOSS ===
function updateBoss(dt) {
  if (!dungeonBoss || !dungeonBoss.alive) return;
  var b = dungeonBoss;

  // Dramatic entrance
  if (b.entranceTimer > 0) {
    b.entranceTimer -= dt;
    if (b.entranceTimer > 0) {
      if (Math.floor(b.entranceTimer * 6) % 2 === 0) {
        TAS.fx.flash(ZONE_COLORS[currentZone].glow, 0.1);
      }
      return;
    }
  }

  b.timer += dt;
  b.patternTimer += dt;

  // Movement
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  if (b.x < TILE * 2 || b.x > (DUNGEON_W - 3) * TILE) b.vx *= -1;
  if (b.y < TILE * 2 || b.y > (DUNGEON_H - 4) * TILE) b.vy *= -1;

  // Phase changes
  if (b.hp < b.maxHP * 0.6 && b.phase === 0) {
    b.phase = 1;
    b.vx *= 1.3;
    b.vy *= 1.3;
    TAS.fx.flash(ZONE_COLORS[currentZone].glow, 0.3);
    triggerShake(5);
    spawnScorePopup(b.x, b.y - 20, 'PHASE 2!', '#ff4444');
  }
  if (b.hp < b.maxHP * 0.3 && b.phase === 1) {
    b.phase = 2;
    b.vx *= 1.2;
    b.vy *= 1.2;
    TAS.fx.flash('#ff0000', 0.4);
    triggerShake(6);
    spawnScorePopup(b.x, b.y - 20, 'ENRAGED!', '#ff0000');
  }

  // Attack patterns based on zone
  b.shootCD -= dt;
  if (b.shootCD <= 0) {
    if (b.phase === 0) {
      // Simple aimed shot
      var ang = TAS.math.angle(b.x, b.y, player.x, player.y);
      enemyBullets.push({
        x: b.x + b.w / 2, y: b.y + b.h / 2,
        vx: Math.cos(ang) * 120, vy: Math.sin(ang) * 120,
        size: 4, life: 3
      });
      b.shootCD = 1.0;
    } else if (b.phase === 1) {
      // Fan shot
      var baseAng = TAS.math.angle(b.x, b.y, player.x, player.y);
      for (var si = -2; si <= 2; si++) {
        var sAng = baseAng + si * 0.25;
        enemyBullets.push({
          x: b.x + b.w / 2, y: b.y + b.h / 2,
          vx: Math.cos(sAng) * 110, vy: Math.sin(sAng) * 110,
          size: 4, life: 3
        });
      }
      b.shootCD = 0.8;
    } else {
      // Spiral pattern (phase 2)
      for (var si = 0; si < 6; si++) {
        var sAng = (b.timer * 2 + si * Math.PI / 3);
        enemyBullets.push({
          x: b.x + b.w / 2, y: b.y + b.h / 2,
          vx: Math.cos(sAng) * 90, vy: Math.sin(sAng) * 90,
          size: 3, life: 4
        });
      }
      b.shootCD = 0.5;
    }
    TAS.audio.playTone(150, 0.08, 'sawtooth', 0.05, 100);
  }

  // Mega boss spawns adds
  if (b.mega && b.phase >= 1 && b.patternTimer > 4) {
    b.patternTimer = 0;
    var elist = inDungeon ? dungeonEnemies : enemies;
    elist.push({
      x: b.x + (Math.random() > 0.5 ? -30 : b.w + 10),
      y: b.y + b.h / 2,
      type: 1, subtype: 0, hp: 1, maxHP: 1,
      w: 10, h: 10, vx: (Math.random() > 0.5 ? 1 : -1) * 40,
      vy: (Math.random() > 0.5 ? 1 : -1) * 25,
      shootTimer: 120, shootCD: 2, alive: true,
      startX: b.x, startY: b.y, moveRange: 60, flashTimer: 0
    });
  }

  // Hit detection (STR → DMG_MULT already applied in bullet creation)
  for (var j = bullets.length - 1; j >= 0; j--) {
    var bul = bullets[j];
    if (TAS.hit.rectOverlap(bul.x - bul.size / 2, bul.y - bul.size / 2, bul.size, bul.size, b.x, b.y, b.w, b.h)) {
      var isCrit = Math.random() < CRIT_CHANCE;
      var finalDmg = isCrit ? bul.dmg * 2 : bul.dmg;
      b.hp -= finalDmg;
      if (!bul.grenade) bullets.splice(j, 1);
      TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ff8800', 4, 2);
      triggerShake(2);

      if (isCrit) {
        spawnScorePopup(b.x + b.w / 2, b.y - 12, 'CRIT!', '#ff4444');
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ff4444', 6, 3);
      }

      if (b.hp <= 0) {
        b.alive = false;
        var bossScore = Math.round(100 * (currentZone + 1) * SCORE_MULT * (b.mega ? 2 : 1));
        score += bossScore;
        spawnScorePopup(b.x + b.w / 2, b.y - 20, '+' + bossScore + ' BOSS!', '#ffdd00');
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ffdd00', 30, 5, { gravity: 0.3 });
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, ZONE_COLORS[currentZone].glow, 20, 4, { gravity: 0.2 });
        TAS.fx.flash('#ffffff', 0.6);
        triggerShake(10);
        TAS.audio.playNoise(0.5, 0.2, 300);

        // Drop reward
        var dKey = currentZone + '_' + dungeonId;
        if (!dungeonCleared.includes(dKey)) {
          dungeonCleared.push(dKey);
          var doorData = doors.find(function(d) { return d.id === dungeonId; });
          if (doorData && doorData.required) {
            if (currentZone < 7) zoneKeys[currentZone + 1] = true;
            items.push({ x: b.x, y: b.y, type: 'zonekey', collected: false });
          } else {
            var availUpg = tankUpgrades.findIndex(function(u) { return !u; });
            if (availUpg >= 0) {
              items.push({ x: b.x, y: b.y, type: 'tankupgrade', upgradeId: availUpg, collected: false });
            } else {
              var gId = (gunUpgrade + 1) % 3;
              items.push({ x: b.x, y: b.y, type: 'gunupgrade', upgradeId: gId, collected: false });
            }
          }
        }
        saveGame();
      }
      break;
    }
  }

  // Collide with player
  var pw = FOOT_W, ph = FOOT_H;
  if (b.alive && TAS.hit.rectOverlap(player.x, player.y, pw, ph, b.x, b.y, b.w, b.h)) {
    if (player.invuln <= 0) takeDamage(2);
  }
}

// === UPDATE BULLETS ===
function updateBullets(dt) {
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.grenade && b.gravity) {
      b.vy += b.gravity * dt;
    }
    if (b.wave) {
      b.waveT += dt * 8;
      var perp = Math.atan2(b.vy, b.vx) + Math.PI / 2;
      b.x += b.vx * dt + Math.sin(b.waveT) * 2 * Math.cos(perp);
      b.y += b.vy * dt + Math.sin(b.waveT) * 2 * Math.sin(perp);
    } else if (b.homing) {
      var elist = inDungeon ? dungeonEnemies : enemies;
      var nearest = null, nearDist = 999;
      for (var ei = 0; ei < elist.length; ei++) {
        if (!elist[ei].alive) continue;
        var d = TAS.math.dist(b.x, b.y, elist[ei].x, elist[ei].y);
        if (d < nearDist) { nearDist = d; nearest = elist[ei]; }
      }
      if (dungeonBoss && dungeonBoss.alive) {
        var d = TAS.math.dist(b.x, b.y, dungeonBoss.x, dungeonBoss.y);
        if (d < nearDist) { nearDist = d; nearest = dungeonBoss; }
      }
      if (nearest) {
        var ang = TAS.math.angle(b.x, b.y, nearest.x + 7, nearest.y + 7);
        var curAng = Math.atan2(b.vy, b.vx);
        var diff = ang - curAng;
        var turn = Math.max(-3 * dt, Math.min(3 * dt, diff));
        var newAng = curAng + turn;
        var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        b.vx = Math.cos(newAng) * spd;
        b.vy = Math.sin(newAng) * spd;
      }
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    } else {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }
    b.life -= dt;

    var tx = Math.floor(b.x / TILE), ty = Math.floor(b.y / TILE);
    if (tileAt(tx, ty) === 1) {
      if (b.grenade) {
        TAS.particles.spawn(b.x, b.y, '#ffaa00', 15, 4, { gravity: 0.3 });
        TAS.audio.playNoise(0.2, 0.1, 400);
        triggerShake(3);
      }
      bullets.splice(i, 1);
      continue;
    }

    if (b.life <= 0) {
      if (b.grenade) {
        TAS.particles.spawn(b.x, b.y, '#ffaa00', 15, 4, { gravity: 0.3 });
        TAS.audio.playNoise(0.2, 0.1, 400);
        triggerShake(3);
      }
      bullets.splice(i, 1);
    }
  }

  // Enemy bullets
  for (var i = enemyBullets.length - 1; i >= 0; i--) {
    var b = enemyBullets[i];
    if (!b.mine) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }
    b.life -= dt;
    if (b.life <= 0) { enemyBullets.splice(i, 1); continue; }

    var pw = mode === 'tank' ? TANK_W : FOOT_W;
    var ph = mode === 'tank' ? TANK_H : FOOT_H;
    if (TAS.hit.rectOverlap(b.x - b.size / 2, b.y - b.size / 2, b.size, b.size, player.x, player.y, pw, ph)) {
      if (player.invuln <= 0) {
        takeDamage(b.mine ? 2 : 1);
        enemyBullets.splice(i, 1);
      }
    }
  }
}

// === UPDATE ITEMS ===
function updateItems() {
  var pw = mode === 'tank' ? TANK_W : FOOT_W;
  var ph = mode === 'tank' ? TANK_H : FOOT_H;

  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    if (it.collected) continue;
    if (TAS.hit.rectOverlap(player.x, player.y, pw, ph, it.x, it.y, TILE, TILE)) {
      it.collected = true;
      var itemScore = Math.round(25 * SCORE_MULT); // INT → item pickup score
      score += itemScore;
      TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.12]], 80);

      if (it.type === 'health') {
        if (mode === 'tank') tankHP = Math.min(TANK_MAX_HP, tankHP + 2);
        else footHP = Math.min(FOOT_MAX_HP, footHP + 1);
        TAS.particles.spawn(it.x, it.y, '#44ff44', 8, 2);
        spawnScorePopup(it.x, it.y - 8, '+HP', '#44ff44');
      } else if (it.type === 'grenade') {
        grenades = Math.min(9, grenades + 2);
        TAS.particles.spawn(it.x, it.y, '#ffaa44', 8, 2);
        spawnScorePopup(it.x, it.y - 8, '+GRENADES', '#ffaa44');
      } else if (it.type === 'zonekey') {
        TAS.particles.spawn(it.x, it.y, '#ffdd00', 20, 4);
        TAS.fx.flash('#ffdd00', 0.3);
        state = 'message';
        messageText = 'ZONE KEY ACQUIRED!\n' + ZONE_NAMES[Math.min(currentZone + 1, 7)] + ' unlocked!';
        messageTimer = 3;
      } else if (it.type === 'tankupgrade') {
        tankUpgrades[it.upgradeId] = true;
        TAS.particles.spawn(it.x, it.y, '#4488ff', 20, 4);
        TAS.fx.flash('#4488ff', 0.3);
        showTutorial('upgrade');
        state = 'message';
        messageText = 'TANK UPGRADE!\n' + UPGRADE_NAMES[it.upgradeId];
        messageTimer = 3;
      } else if (it.type === 'gunupgrade') {
        gunUpgrade = it.upgradeId;
        TAS.particles.spawn(it.x, it.y, '#aa44ff', 20, 4);
        TAS.fx.flash('#aa44ff', 0.3);
        state = 'message';
        messageText = 'GUN UPGRADE!\n' + GUN_NAMES[it.upgradeId];
        messageTimer = 3;
      // Tasern item pickups
      } else if (it.type === 'spore_shield') {
        buffs.shieldHP = 2;
        TAS.particles.spawn(it.x, it.y, it.color, 10, 3);
        spawnScorePopup(it.x, it.y - 12, it.name + '!', it.color);
      } else if (it.type === 'myco_boost') {
        buffs.speedBoost = 10;
        TAS.particles.spawn(it.x, it.y, it.color, 10, 3);
        spawnScorePopup(it.x, it.y - 12, it.name + '!', it.color);
      } else if (it.type === 'fungi_charm') {
        var charmScore = Math.round(50 * SCORE_MULT);
        score += charmScore;
        TAS.particles.spawn(it.x, it.y, it.color, 10, 3);
        spawnScorePopup(it.x, it.y - 12, '+' + charmScore + ' ' + it.name, it.color);
      } else if (it.type === 'cap_grenade') {
        grenades = Math.min(9, grenades + 3);
        TAS.particles.spawn(it.x, it.y, it.color, 10, 3);
        spawnScorePopup(it.x, it.y - 12, it.name + '!', it.color);
      } else if (it.type === 'glow_sap') {
        if (mode === 'tank') tankHP = TANK_MAX_HP;
        else footHP = FOOT_MAX_HP;
        TAS.particles.spawn(it.x, it.y, it.color, 14, 4);
        spawnScorePopup(it.x, it.y - 12, 'FULL HEAL!', it.color);
        TAS.fx.flash(it.color, 0.2);
      }
      items.splice(i, 1);
    }
  }
}

var messageText = '';
var messageTimer = 0;

// === ZONE TRANSITION EFFECT ===
function updateZoneTransition(dt) {
  if (zoneTransition.active) {
    zoneTransition.timer -= dt;
    if (zoneTransition.timer <= 0) zoneTransition.active = false;
  }
}
function drawZoneTransition() {
  if (!zoneTransition.active) return;
  var t = zoneTransition.timer;
  ctx.fillStyle = ZONE_COLORS[zoneTransition.toZone].bg;
  ctx.globalAlpha = Math.min(1, t * 2);
  ctx.fillRect(0, 0, GW, GH);
  ctx.globalAlpha = 1;
  ctx.fillStyle = ZONE_COLORS[zoneTransition.toZone].accent;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Entering ' + ZONE_NAMES[zoneTransition.toZone], GW / 2, GH / 2);
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateZoneTransition(dt);
  updateTutorial(dt);
  updateCombo(dt);
  updateBuffs(dt);
  updateTrails(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      var hasSave = loadGame();
      startGame(hasSave);
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'message') {
    messageTimer -= dt;
    if (messageTimer <= 0 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
    }
    return;
  }

  if (state === 'map') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.b) {
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  // Map toggle
  if (TAS.input.keys['KeyM'] || TAS.input.keys['Tab']) {
    state = 'map';
    TAS.input.keys['KeyM'] = false;
    TAS.input.keys['Tab'] = false;
    return;
  }

  // Invulnerability timer
  if (player.invuln > 0) player.invuln -= dt;

  // Mode-specific update
  if (mode === 'tank') {
    updateTank(dt);
  } else {
    updateFoot(dt);
  }

  // Update entities
  var elist = inDungeon ? dungeonEnemies : enemies;
  updateEnemiesCommon(elist, dt);
  if (inDungeon) updateBoss(dt);
  updateBullets(dt);
  updateItems();
  updateEnvHazards(dt);
}

// === DRAWING ===
function drawTile(x, y, type, zone) {
  var colors = ZONE_COLORS[zone];
  var sx = x * TILE - camX;
  var sy = y * TILE - camY;
  if (sx < -TILE || sx > GW || sy < -TILE || sy > GH) return;

  if (type === 1) {
    ctx.fillStyle = colors.wall;
    ctx.fillRect(sx, sy, TILE, TILE);
    // NES-style brick pattern
    ctx.strokeStyle = colors.accent;
    ctx.globalAlpha = 0.2;
    ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
    // Cross-hatch detail
    if ((x + y) % 2 === 0) {
      ctx.fillStyle = colors.accent;
      ctx.globalAlpha = 0.08;
      ctx.fillRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
    }
    ctx.globalAlpha = 1;
  } else if (type === 2) { // water
    ctx.fillStyle = '#224488';
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.05 + x * 0.3) * 0.2;
    ctx.fillRect(sx, sy, TILE, TILE);
    // Water surface ripple
    ctx.fillStyle = '#4488cc';
    ctx.globalAlpha = 0.3;
    var ripple = Math.sin(frame * 0.08 + x * 0.5) * 2;
    ctx.fillRect(sx, sy + ripple, TILE, 2);
    ctx.globalAlpha = 1;
  } else if (type === 3) { // lava
    ctx.fillStyle = '#cc3300';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08 + x * 0.5) * 0.3;
    ctx.fillRect(sx, sy, TILE, TILE);
    // Lava bubbles
    ctx.fillStyle = '#ffaa00';
    ctx.globalAlpha = 0.5;
    var bub = Math.sin(frame * 0.12 + x * 1.3) * 3;
    ctx.beginPath();
    ctx.arc(sx + 8 + bub, sy + 6, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    if (Math.random() < 0.02) {
      TAS.particles.spawn(sx + Math.random() * TILE, sy, '#ffaa00', 1, 1, { gravity: -0.5 });
    }
  } else if (type === 4) { // thorns
    ctx.fillStyle = '#446622';
    ctx.globalAlpha = 0.7;
    for (var t = 0; t < 3; t++) {
      ctx.beginPath();
      ctx.moveTo(sx + t * 6, sy + TILE);
      ctx.lineTo(sx + t * 6 + 3, sy + 4);
      ctx.lineTo(sx + t * 6 + 6, sy + TILE);
      ctx.fill();
    }
    ctx.fillStyle = '#88aa44';
    ctx.fillRect(sx + 2, sy + TILE - 3, TILE - 4, 3);
    ctx.globalAlpha = 1;
  } else if (type === 5) { // conveyor
    ctx.fillStyle = '#555566';
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#888899';
    var convOff = (frame * 2) % TILE;
    for (var ci = 0; ci < 3; ci++) {
      ctx.fillRect(sx + (ci * 6 + convOff) % TILE, sy + 6, 4, 4);
    }
    // Arrow indicators
    ctx.fillStyle = '#aabb44';
    ctx.beginPath();
    ctx.moveTo(sx + 12, sy + 8);
    ctx.lineTo(sx + 15, sy + 10);
    ctx.lineTo(sx + 12, sy + 12);
    ctx.fill();
  }
}

function drawMap() {
  var tileData = inDungeon ? dungeonTiles : tiles;
  var w = inDungeon ? DUNGEON_W : ZONE_W;
  var h = inDungeon ? DUNGEON_H : ZONE_H;

  // Background
  ctx.fillStyle = ZONE_COLORS[currentZone].bg;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax background layers
  if (!inDungeon) drawBgLayers();

  // Background detail (animated spore particles)
  ctx.fillStyle = ZONE_COLORS[currentZone].accent;
  for (var i = 0; i < 30; i++) {
    var bx = ((i * 47 + frame * 0.2) % (GW + 40)) - 20;
    var by = ((i * 31 + i * i * 3 + Math.sin(frame * 0.01 + i) * 8) % GH);
    ctx.globalAlpha = 0.08 + Math.sin(frame * 0.02 + i) * 0.04;
    ctx.fillRect(bx, by, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Tiles
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      if (tileData[y][x] !== 0) drawTile(x, y, tileData[y][x], currentZone);
    }
  }
}

function drawDoors() {
  if (inDungeon) return;
  for (var di = 0; di < doors.length; di++) {
    var door = doors[di];
    var dx = door.x - camX, dy = door.y - camY;
    // Door frame with mushroom archway
    ctx.fillStyle = '#553311';
    ctx.fillRect(dx - 2, dy - 6, TILE * 2 + 4, TILE * 2 + 8);
    // Mushroom cap arch
    ctx.fillStyle = ZONE_COLORS[currentZone].accent;
    ctx.beginPath();
    ctx.arc(dx + TILE, dy - 4, TILE + 2, Math.PI, 0);
    ctx.fill();
    // Door interior
    ctx.fillStyle = '#110800';
    ctx.fillRect(dx, dy, TILE * 2, TILE * 2);
    // Glow if required
    if (door.required) {
      ctx.strokeStyle = '#ffdd00';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.strokeRect(dx - 3, dy - 3, TILE * 2 + 6, TILE * 2 + 6);
      // Pulsing spore particles at entrance
      if (frame % 20 === 0) {
        TAS.particles.spawn(dx + TILE + (Math.random() - 0.5) * 20, dy + TILE * 2, '#ffdd00', 2, 1, { gravity: -0.3 });
      }
      ctx.globalAlpha = 1;
    }
    // Arrow indicator with text
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    var arrowBob = Math.sin(frame * 0.08) * 2;
    ctx.fillText('v ENTER v', dx + TILE, dy - 10 + arrowBob);
  }
}

function drawPlayer() {
  var px = player.x - camX, py = player.y - camY;
  var flash = player.invuln > 0 && Math.floor(frame * 0.3) % 2 === 0;
  if (flash) ctx.globalAlpha = 0.5;

  // Shield visual
  if (buffs.shieldHP > 0) {
    ctx.strokeStyle = '#44ff88';
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
    var sw = mode === 'tank' ? TANK_W : FOOT_W;
    var sh = mode === 'tank' ? TANK_H : FOOT_H;
    ctx.strokeRect(px - 2, py - 2, sw + 4, sh + 4);
    ctx.globalAlpha = flash ? 0.5 : 1;
  }

  // Speed boost visual
  if (buffs.speedBoost > 0) {
    ctx.fillStyle = '#ff8844';
    ctx.globalAlpha = 0.3;
    var sw = mode === 'tank' ? TANK_W : FOOT_W;
    ctx.fillRect(px - 4, py + (mode === 'tank' ? TANK_H - 2 : FOOT_H - 2), sw + 8, 3);
    ctx.globalAlpha = flash ? 0.5 : 1;
  }

  if (mode === 'tank') {
    // Tank body - baseling-colored accents
    ctx.fillStyle = '#3366aa';
    ctx.fillRect(px, py + 6, TANK_W, TANK_H - 6);
    // Treads with animation
    ctx.fillStyle = '#222';
    ctx.fillRect(px, py + TANK_H - 4, TANK_W, 4);
    var treadOff = Math.floor(player.walkFrame) % 4;
    for (var ti = 0; ti < 4; ti++) {
      ctx.fillStyle = '#444';
      ctx.fillRect(px + 2 + ((ti * 6 + treadOff * 2) % TANK_W), py + TANK_H - 3, 4, 2);
    }
    // Turret
    ctx.fillStyle = '#4488cc';
    ctx.fillRect(px + 6, py + 2, 12, 8);
    // Gun barrel
    ctx.fillStyle = '#555';
    if (player.facingUp) {
      ctx.fillRect(px + 10, py - 6, 4, 8);
    } else {
      var gx = player.facing > 0 ? px + TANK_W - 2 : px - 6;
      ctx.fillRect(gx, py + 4, 8, 3);
    }
    // Reactor glow (baseling color)
    ctx.fillStyle = statB.color;
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
    ctx.fillRect(px + 9, py + 8, 6, 4);
    ctx.globalAlpha = flash ? 0.5 : 1;
    // Baseling in cockpit
    ctx.fillStyle = statB.color;
    ctx.fillRect(px + 10, py + 3, 4, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 10, py + 3, 2, 2);
    ctx.fillRect(px + 13, py + 3, 1, 1);
    // Hover effect
    if (!player.grounded && hoverFuel > 0) {
      ctx.fillStyle = '#ff8800';
      ctx.globalAlpha = 0.6;
      var flameH1 = 3 + Math.random() * 3;
      var flameH2 = 3 + Math.random() * 3;
      ctx.fillRect(px + 4, py + TANK_H, 4, flameH1);
      ctx.fillRect(px + 16, py + TANK_H, 4, flameH2);
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(px + 5, py + TANK_H, 2, flameH1 * 0.6);
      ctx.fillRect(px + 17, py + TANK_H, 2, flameH2 * 0.6);
      ctx.globalAlpha = 1;
    }
  } else {
    // On-foot baseling with animation
    var bobY = Math.sin(player.walkFrame * 0.8) * 1;
    // Body
    ctx.fillStyle = statB.color;
    ctx.fillRect(px + 2, py + bobY, 8, 8); // head
    ctx.fillRect(px + 3, py + 8 + bobY, 6, 4); // body
    // Cap (mushroom hat)
    ctx.fillStyle = ZONE_COLORS[currentZone].accent;
    ctx.fillRect(px + 1, py - 2 + bobY, 10, 3);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 3, py + 2 + bobY, 2, 2);
    ctx.fillRect(px + 7, py + 2 + bobY, 2, 2);
    ctx.fillStyle = '#111';
    ctx.fillRect(px + (player.facing > 0 ? 4 : 3), py + 3 + bobY, 1, 1);
    ctx.fillRect(px + (player.facing > 0 ? 8 : 7), py + 3 + bobY, 1, 1);
    // Gun
    ctx.fillStyle = '#aaa';
    var gx = player.facing > 0 ? px + 10 : px - 3;
    ctx.fillRect(gx, py + 5 + bobY, 4, 2);
    ctx.fillStyle = '#888';
    ctx.fillRect(gx + (player.facing > 0 ? 3 : 0), py + 5 + bobY, 1, 2);
    // Legs animation
    ctx.fillStyle = statB.color;
    var legOff = Math.sin(player.walkFrame) * 2;
    ctx.fillRect(px + 3, py + 12 + bobY + Math.max(0, legOff), 2, 2);
    ctx.fillRect(px + 7, py + 12 + bobY + Math.max(0, -legOff), 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawEnemies(elist) {
  for (var i = 0; i < elist.length; i++) {
    var e = elist[i];
    if (!e.alive) continue;
    var ex = e.x - camX, ey = e.y - camY;
    if (ex < -20 || ex > GW + 20 || ey < -20 || ey > GH + 20) continue;

    // Damage flash
    if (e.flashTimer > 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex, ey, e.w, e.h);
      continue;
    }

    var zColors = ZONE_COLORS[currentZone];

    if (e.type === 0) { // crawler - mushroom creature
      ctx.fillStyle = '#aa3333';
      ctx.fillRect(ex + 2, ey + 6, 10, 8);
      // Mushroom cap
      ctx.fillStyle = zColors.accent;
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 4, 7, Math.PI, 0);
      ctx.fill();
      // Spots on cap
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(ex + 4, ey + 2, 2, 2);
      ctx.fillRect(ex + 9, ey + 3, 2, 1);
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex + 4, ey + 7, 2, 2);
      ctx.fillRect(ex + 8, ey + 7, 2, 2);
      // Legs
      ctx.fillStyle = '#661111';
      ctx.fillRect(ex + 2, ey + 12, 2, 2);
      ctx.fillRect(ex + 10, ey + 12, 2, 2);
    } else if (e.type === 1) { // flyer - spore moth
      ctx.fillStyle = zColors.accent;
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 7, 5, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      ctx.fillStyle = zColors.glow;
      ctx.globalAlpha = 0.6;
      var wingOff = Math.sin(frame * 0.2) * 3;
      // Left wing
      ctx.beginPath();
      ctx.ellipse(ex - 1, ey + 4 + wingOff, 5, 3, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Right wing
      ctx.beginPath();
      ctx.ellipse(ex + 15, ey + 4 - wingOff, 5, 3, 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ex + 5, ey + 5, 2, 2);
      ctx.fillRect(ex + 8, ey + 5, 2, 2);
      // Spore trail
      if (frame % 8 === 0) {
        TAS.particles.spawn(ex + 7, ey + 12, zColors.accent, 1, 1, { gravity: 0.2 });
      }
    } else if (e.type === 2) { // turret - fungal turret
      ctx.fillStyle = '#555';
      ctx.fillRect(ex, ey + 6, 14, 8);
      ctx.fillStyle = zColors.wall;
      ctx.fillRect(ex + 2, ey, 10, 8);
      // Mushroom dome top
      ctx.fillStyle = zColors.accent;
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 2, 6, Math.PI, 0);
      ctx.fill();
      // Barrel pointing at player
      ctx.fillStyle = '#aaa';
      var ang = TAS.math.angle(ex + 7, ey + 4, player.x - camX, player.y - camY);
      ctx.save();
      ctx.translate(ex + 7, ey + 4);
      ctx.rotate(ang);
      ctx.fillRect(0, -1, 10, 2);
      ctx.restore();
      // Targeting glow
      ctx.fillStyle = '#ff4444';
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.2;
      ctx.fillRect(ex + 5, ey + 2, 4, 4);
      ctx.globalAlpha = 1;
    } else if (e.type === 3) { // mine layer - pod creature
      ctx.fillStyle = '#336633';
      ctx.fillRect(ex + 1, ey + 2, 12, 10);
      // Spore pods
      ctx.fillStyle = zColors.accent;
      ctx.beginPath();
      ctx.arc(ex + 4, ey + 4, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 4, 3, 0, Math.PI * 2);
      ctx.fill();
      // Pulsing core
      ctx.fillStyle = zColors.glow;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.3;
      ctx.fillRect(ex + 5, ey + 6, 4, 4);
      ctx.globalAlpha = 1;
    }

    // HP bar for damaged enemies
    if (e.hp < e.maxHP && e.maxHP > 1) {
      ctx.fillStyle = '#333';
      ctx.fillRect(ex, ey - 4, e.w, 2);
      ctx.fillStyle = '#dd4444';
      ctx.fillRect(ex, ey - 4, e.w * (e.hp / e.maxHP), 2);
    }
  }
}

function drawBoss() {
  if (!dungeonBoss || !dungeonBoss.alive) return;
  var b = dungeonBoss;

  // Entrance animation
  if (b.entranceTimer > 0) {
    ctx.fillStyle = ZONE_COLORS[currentZone].glow;
    ctx.globalAlpha = b.entranceTimer * 0.5;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING: ' + b.name, GW / 2, GH / 2);
    return;
  }

  var bx = b.x - camX, by = b.y - camY;

  // Phase 2 aura
  if (b.phase >= 2) {
    ctx.strokeStyle = '#ff4444';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.2;
    ctx.beginPath();
    ctx.arc(bx + b.w / 2, by + b.h / 2, b.w * 0.8 + Math.sin(frame * 0.1) * 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Boss body - giant mushroom creature
  var phaseColor = b.phase === 0 ? ZONE_COLORS[currentZone].wall : (b.phase === 1 ? '#aa2222' : '#ff3333');
  ctx.fillStyle = phaseColor;
  ctx.fillRect(bx + 2, by + b.h * 0.3, b.w - 4, b.h * 0.7);
  // Mushroom cap
  ctx.fillStyle = b.phase >= 2 ? '#ff4444' : ZONE_COLORS[currentZone].accent;
  ctx.beginPath();
  ctx.arc(bx + b.w / 2, by + b.h * 0.3, b.w * 0.6, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(bx + b.w * 0.3, by + b.h * 0.15, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + b.w * 0.65, by + b.h * 0.2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Core glow
  ctx.fillStyle = ZONE_COLORS[currentZone].glow;
  ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.4;
  ctx.fillRect(bx + b.w * 0.3, by + b.h * 0.45, b.w * 0.4, b.h * 0.25);
  ctx.globalAlpha = 1;
  // Eyes
  var eyeGlow = b.phase >= 1 ? '#ff0000' : '#fff';
  ctx.fillStyle = eyeGlow;
  ctx.fillRect(bx + b.w * 0.2, by + b.h * 0.35, 4, 4);
  ctx.fillRect(bx + b.w * 0.65, by + b.h * 0.35, 4, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(bx + b.w * 0.2 + 1, by + b.h * 0.35 + 1, 2, 2);
  ctx.fillRect(bx + b.w * 0.65 + 1, by + b.h * 0.35 + 1, 2, 2);
  // Mega boss crown
  if (b.mega) {
    ctx.fillStyle = '#ffdd00';
    for (var ci = 0; ci < 3; ci++) {
      ctx.beginPath();
      ctx.moveTo(bx + b.w * 0.25 + ci * b.w * 0.2, by + b.h * 0.05);
      ctx.lineTo(bx + b.w * 0.3 + ci * b.w * 0.2, by - 6);
      ctx.lineTo(bx + b.w * 0.35 + ci * b.w * 0.2, by + b.h * 0.05);
      ctx.fill();
    }
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(bx - 4, by - 12, b.w + 8, 6);
  var hpColor = b.hp > b.maxHP * 0.5 ? '#44dd44' : (b.hp > b.maxHP * 0.25 ? '#ddaa44' : '#dd4444');
  ctx.fillStyle = hpColor;
  ctx.fillRect(bx - 4, by - 12, (b.w + 8) * (b.hp / b.maxHP), 6);
  ctx.strokeStyle = '#888';
  ctx.strokeRect(bx - 4, by - 12, b.w + 8, 6);
  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name + (b.mega ? ' (MEGA)' : ''), bx + b.w / 2, by - 16);
}

function drawBullets() {
  // Player bullets
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    var bx = b.x - camX, by = b.y - camY;
    if (b.grenade) {
      ctx.fillStyle = '#886622';
      ctx.beginPath();
      ctx.arc(bx, by, b.size, 0, Math.PI * 2);
      ctx.fill();
      // Fuse spark
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(bx - 1, by - b.size - 2, 2, 3);
    } else if (b.wave) {
      ctx.fillStyle = '#44ddff';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(bx, by, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (b.homing) {
      ctx.fillStyle = '#ff44ff';
      ctx.fillRect(bx - b.size / 2, by - b.size / 2, b.size, b.size);
      // Trail
      ctx.fillStyle = '#ff88ff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(bx - b.size, by - 1, b.size, 2);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = b.size > 4 ? '#ffdd44' : statB.color;
      ctx.fillRect(bx - b.size / 2, by - b.size / 2, b.size, b.size);
    }
  }
  // Enemy bullets
  for (var i = 0; i < enemyBullets.length; i++) {
    var b = enemyBullets[i];
    var bx = b.x - camX, by = b.y - camY;
    if (b.mine) {
      ctx.fillStyle = '#ff4400';
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.4;
      ctx.beginPath();
      ctx.arc(bx, by, b.size, 0, Math.PI * 2);
      ctx.fill();
      // Warning ring
      ctx.strokeStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(bx, by, b.size + 2 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#ff4488';
      ctx.fillRect(bx - b.size / 2, by - b.size / 2, b.size, b.size);
      // Glow
      ctx.fillStyle = '#ff88aa';
      ctx.globalAlpha = 0.3;
      ctx.fillRect(bx - b.size, by - b.size, b.size * 2, b.size * 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (it.collected) continue;
    var ix = it.x - camX, iy = it.y - camY;
    var bob = Math.sin(frame * 0.06 + i) * 3;

    // Glow halo for all items
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.08) * 0.05;
    ctx.fillStyle = it.color || '#ffdd44';
    ctx.beginPath();
    ctx.arc(ix + 8, iy + bob + 6, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    if (it.type === 'health') {
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(ix + 4, iy + bob + 2, 8, 3);
      ctx.fillRect(ix + 6, iy + bob, 4, 7);
    } else if (it.type === 'grenade') {
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(ix + 8, iy + bob + 6, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#886622';
      ctx.fillRect(ix + 7, iy + bob, 2, 4);
    } else if (it.type === 'zonekey') {
      ctx.fillStyle = '#ffdd00';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08) * 0.3;
      ctx.fillRect(ix + 3, iy + bob + 2, 10, 6);
      ctx.fillRect(ix + 5, iy + bob + 6, 3, 4);
      // Key sparkle
      if (frame % 15 === 0) TAS.particles.spawn(ix + 8, iy + bob + 5, '#ffdd00', 2, 1, { gravity: -0.3 });
      ctx.globalAlpha = 1;
    } else if (it.type === 'tankupgrade') {
      ctx.fillStyle = '#4488ff';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08) * 0.3;
      ctx.fillRect(ix + 2, iy + bob + 2, 12, 10);
      ctx.fillStyle = '#88bbff';
      ctx.fillRect(ix + 5, iy + bob + 4, 6, 6);
      ctx.globalAlpha = 1;
    } else if (it.type === 'gunupgrade') {
      ctx.fillStyle = '#aa44ff';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08) * 0.3;
      ctx.fillRect(ix + 2, iy + bob + 4, 12, 4);
      ctx.fillRect(ix + 10, iy + bob + 2, 4, 8);
      ctx.globalAlpha = 1;
    } else if (it.tasern) {
      // Tasern themed items - mushroom-shaped
      ctx.fillStyle = it.color;
      ctx.globalAlpha = 0.8 + Math.sin(frame * 0.1) * 0.2;
      ctx.fillRect(ix + 5, iy + bob + 6, 6, 6);
      ctx.beginPath();
      ctx.arc(ix + 8, iy + bob + 5, 6, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(ix + 6, iy + bob + 2, 2, 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, 30);

  // HP bar with NES-style segments
  var hp = mode === 'tank' ? tankHP : footHP;
  var maxHP = mode === 'tank' ? TANK_MAX_HP : FOOT_MAX_HP;
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 4, 82, 10);
  var hpPct = hp / maxHP;
  var hpCol = hpPct > 0.5 ? '#44dd44' : hpPct > 0.25 ? '#ddaa44' : '#dd4444';
  // Segmented HP bar
  var segments = maxHP;
  var segW = 80 / segments;
  for (var s = 0; s < hp; s++) {
    ctx.fillStyle = hpCol;
    ctx.fillRect(5 + s * segW, 5, segW - 1, 8);
  }
  ctx.strokeStyle = '#666';
  ctx.strokeRect(4, 4, 82, 10);
  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 5, 22);

  // Shield indicator
  if (buffs.shieldHP > 0) {
    ctx.fillStyle = '#44ff88';
    ctx.fillText('+' + buffs.shieldHP, 20, 22);
  }

  // Mode indicator with icon
  ctx.fillStyle = mode === 'tank' ? '#4488cc' : statB.color;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(mode === 'tank' ? 'TANK' : 'SCOUT', 40, 22);

  // Zone name
  ctx.fillStyle = ZONE_COLORS[currentZone].accent;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(ZONE_NAMES[currentZone], GW / 2, 10);

  // Screen indicator
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText(inDungeon ? 'DUNGEON ' + (dungeonRoom + 1) + '/3' : 'AREA ' + (currentScreen + 1) + '/3', GW / 2, 22);

  // Score with baseling icon
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE:' + score, GW - 4, 10);

  // Lives with baseling sprites
  for (var i = 0; i < lives; i++) {
    ctx.fillStyle = statB.color;
    ctx.fillRect(GW - 10 - i * 10, 15, 6, 6);
    ctx.fillStyle = '#fff';
    ctx.fillRect(GW - 9 - i * 10, 16, 1, 1);
    ctx.fillRect(GW - 7 - i * 10, 16, 1, 1);
  }

  // Grenades
  ctx.fillStyle = '#ffaa44';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('G:' + grenades, 90, 10);

  // Hover fuel (tank only)
  if (mode === 'tank') {
    ctx.fillStyle = '#222';
    ctx.fillRect(90, 14, 40, 5);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(90, 14, 40 * (hoverFuel / HOVER_MAX), 5);
    ctx.strokeStyle = '#444';
    ctx.strokeRect(90, 14, 40, 5);
  }

  // Upgrades indicator
  var ux = 140;
  for (var i = 0; i < 4; i++) {
    ctx.fillStyle = tankUpgrades[i] ? '#4488ff' : '#222';
    ctx.fillRect(ux + i * 10, 14, 8, 5);
    if (tankUpgrades[i]) {
      ctx.fillStyle = '#88bbff';
      ctx.fillRect(ux + i * 10 + 2, 15, 4, 3);
    }
  }

  // Gun upgrade
  if (gunUpgrade >= 0) {
    ctx.fillStyle = '#aa44ff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(GUN_NAMES[gunUpgrade], 190, 22);
  }

  // Combo counter
  if (comboCount >= 2) {
    ctx.fillStyle = '#ff44ff';
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(comboCount + 'x COMBO', GW / 2, 42);
    ctx.globalAlpha = 1;
  }

  // Speed boost timer
  if (buffs.speedBoost > 0) {
    ctx.fillStyle = '#ff8844';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('BOOST ' + Math.ceil(buffs.speedBoost) + 's', GW - 4, 28);
  }

  // Baseling stat display (small, top-right corner area)
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('Lv.' + statB.level + ' ' + statB.name, GW - 4, GH - 8);
  }
}

function drawWorldMap() {
  ctx.fillStyle = '#0a0515';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE MAP', GW / 2, 20);

  var cellW = 40, cellH = 28;
  var startX = (GW - cellW * 3) / 2;
  var startY = 35;

  for (var z = 0; z < 8; z++) {
    var zx = startX + (z % 3) * (cellW + 8) + Math.floor(z / 3) * 20;
    var zy = startY + Math.floor(z / 3) * (cellH + 8);

    ctx.fillStyle = zoneKeys[z] ? ZONE_COLORS[z].wall : '#181818';
    ctx.fillRect(zx, zy, cellW, cellH);
    ctx.strokeStyle = z === currentZone ? '#fff' : (zoneKeys[z] ? ZONE_COLORS[z].accent : '#333');
    ctx.lineWidth = z === currentZone ? 2 : 1;
    ctx.strokeRect(zx, zy, cellW, cellH);
    ctx.lineWidth = 1;

    // Zone mushroom icon
    if (zoneKeys[z]) {
      ctx.fillStyle = ZONE_COLORS[z].accent;
      ctx.beginPath();
      ctx.arc(zx + cellW / 2, zy + 8, 5, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(zx + cellW / 2 - 1, zy + 8, 2, 5);
    }

    ctx.fillStyle = zoneKeys[z] ? '#fff' : '#444';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(z + 1 + '', zx + cellW / 2, zy + 10);
    ctx.font = '5px monospace';
    ctx.fillText(ZONE_NAMES[z].split(' ')[0], zx + cellW / 2, zy + 20);

    for (var s = 0; s < 3; s++) {
      var key = z + '_' + s;
      ctx.fillStyle = exploredScreens[key] ? ZONE_COLORS[z].accent : '#222';
      ctx.fillRect(zx + 4 + s * 12, zy + cellH - 6, 10, 4);
    }
  }

  // Baseling stats panel
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(10, GH - 100, 140, 80);
  ctx.strokeStyle = statB.color;
  ctx.strokeRect(10, GH - 100, 140, 80);
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(statB.name + ' Lv.' + statB.level, 16, GH - 86);
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('STR:' + statB.str + ' (DMG x' + DMG_MULT.toFixed(1) + ')', 16, GH - 74);
  ctx.fillText('DEX:' + statB.dex + ' (SPD x' + statB.speed.toFixed(1) + ')', 16, GH - 64);
  ctx.fillText('CON:' + statB.con + ' (HP x' + statB.hpMult.toFixed(1) + ')', 16, GH - 54);
  ctx.fillText('INT:' + statB.int + ' (SCR x' + SCORE_MULT.toFixed(1) + ')', 16, GH - 44);
  ctx.fillText('WIS:' + statB.wis + ' (CD x' + statB.cooldown.toFixed(1) + ')', 16, GH - 34);
  ctx.fillText('CHA:' + statB.cha + ' (LUCK x' + statB.luck.toFixed(1) + ')', 16, GH - 24);

  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Press any key to close', GW / 2, GH - 10);
  ctx.fillText('Current: ' + ZONE_NAMES[currentZone] + ' - Screen ' + (currentScreen + 1), GW / 2, GH - 108);
}

function drawMessage() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative border
  ctx.strokeStyle = ZONE_COLORS[currentZone].accent;
  ctx.strokeRect(GW / 2 - 140, GH / 2 - 40, 280, 80);

  ctx.textAlign = 'center';
  var lines = messageText.split('\n');
  ctx.fillStyle = '#ffdd00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(lines[0] || '', GW / 2, GH / 2 - 10);
  if (lines[1]) {
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText(lines[1], GW / 2, GH / 2 + 14);
  }
  // Press any key
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('press any key', GW / 2, GH / 2 + 34);
}

// === CAMERA ===
function updateCamera() {
  var pw = mode === 'tank' ? TANK_W : FOOT_W;
  var ph = mode === 'tank' ? TANK_H : FOOT_H;
  var tw = (inDungeon ? DUNGEON_W : ZONE_W) * TILE;
  var th = (inDungeon ? DUNGEON_H : ZONE_H) * TILE;

  var targetX = player.x + pw / 2 - GW / 2;
  var targetY = player.y + ph / 2 - GH / 2;

  camX = TAS.math.lerp(camX, targetX, 0.1);
  camY = TAS.math.lerp(camY, targetY, 0.1);
