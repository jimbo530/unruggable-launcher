  camX = TAS.math.clamp(camX, 0, Math.max(0, tw - GW));
  camY = TAS.math.clamp(camY, 0, Math.max(0, th - GH));
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'map') {
    drawWorldMap();
    return;
  }

  if (state === 'message') {
    drawMessage();
    return;
  }

  // === GAME RENDERING ===
  updateCamera();

  ctx.save();
  TAS.fx.applyShake();

  drawMap();
  drawDoors();
  drawEnvHazards();
  drawItems();
  drawEnemies(inDungeon ? dungeonEnemies : enemies);
  if (inDungeon) drawBoss();
  drawPlayer();
  drawBullets();
  drawScorePopups();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawTutorial();
  drawZoneTransition();
  TAS.input.drawTouchControls(GW, GH);
}

function drawGameOverScreen() {
  ctx.fillStyle = '#0a0515';
  ctx.fillRect(0, 0, GW, GH);

  // Death particles effect
  for (var i = 0; i < 20; i++) {
    ctx.fillStyle = ZONE_COLORS[currentZone % 8].accent;
    ctx.globalAlpha = 0.1 + Math.sin(frame * 0.02 + i) * 0.08;
    var px = (i * 37 + frame * 0.5) % GW;
    var py = (i * 29 + Math.sin(frame * 0.01 + i) * 15) % GH;
    ctx.fillRect(px, py, 3, 3);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#dd4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GAME OVER', GW / 2, GH * 0.25);

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Defeated in ' + ZONE_NAMES[currentZone], GW / 2, GH * 0.35);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, GH * 0.48);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, GH * 0.55);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH * 0.63);

  // Baseling stats summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' fought bravely (Lv.' + statB.level + ')', GW / 2, GH * 0.73);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.88);
  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  // Background effect - animated cave
  ctx.fillStyle = '#0a0515';
  ctx.fillRect(0, 0, GW, GH);

  // Underground cavern aesthetic with floating spores
  for (var i = 0; i < 50; i++) {
    var x = (i * 37 + frame * 0.3) % GW;
    var y = (i * 23 + Math.sin(i + frame * 0.01) * 20) % GH;
    ctx.fillStyle = ZONE_COLORS[Math.floor(i / 6) % 8].accent;
    ctx.globalAlpha = 0.06 + Math.sin(frame * 0.02 + i) * 0.04;
    ctx.beginPath();
    ctx.arc(x, y, 1 + Math.sin(i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Background mushroom silhouettes
  for (var i = 0; i < 5; i++) {
    ctx.fillStyle = '#1a1030';
    var mx = 40 + i * 100;
    var my = GH * 0.8;
    var mh = 30 + Math.sin(i * 2.3) * 15;
    ctx.fillRect(mx + 8, my - mh, 4, mh);
    ctx.beginPath();
    ctx.arc(mx + 10, my - mh, 12, Math.PI, 0);
    ctx.fill();
  }

  // Tank drawing - larger and more detailed
  var tx = GW / 2 - 36, ty = GH * 0.42;
  // Tank body
  ctx.fillStyle = '#3366aa';
  ctx.fillRect(tx, ty + 10, 56, 28);
  // Tank turret
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(tx + 14, ty + 2, 28, 16);
  // Gun barrel
  ctx.fillStyle = '#555';
  ctx.fillRect(tx + 56, ty + 7, 18, 6);
  ctx.fillStyle = '#666';
  ctx.fillRect(tx + 72, ty + 6, 4, 8);
  // Treads
  ctx.fillStyle = '#222';
  ctx.fillRect(tx, ty + 34, 56, 8);
  for (var ti = 0; ti < 7; ti++) {
    ctx.fillStyle = '#444';
    ctx.fillRect(tx + 2 + ((ti * 8 + Math.floor(frame * 0.5)) % 54), ty + 35, 5, 6);
  }
  // Reactor glow
  ctx.fillStyle = statB.color;
  ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.4;
  ctx.fillRect(tx + 22, ty + 14, 14, 8);
  ctx.globalAlpha = 1;
  // Baseling in cockpit
  ctx.fillStyle = statB.color;
  ctx.fillRect(tx + 24, ty + 4, 10, 9);
  ctx.fillStyle = '#fff';
  ctx.fillRect(tx + 25, ty + 6, 3, 3);
  ctx.fillRect(tx + 30, ty + 6, 3, 3);
  ctx.fillStyle = '#111';
  ctx.fillRect(tx + 26, ty + 7, 1, 1);
  ctx.fillRect(tx + 31, ty + 7, 1, 1);
  // Exhaust
  if (frame % 4 < 2) {
    ctx.fillStyle = '#ff8800';
    ctx.globalAlpha = 0.4;
    ctx.fillRect(tx - 4, ty + 30, 6, 4 + Math.random() * 3);
    ctx.globalAlpha = 1;
  }

  // Title with shadow and glow
  ctx.textAlign = 'center';
  // Glow
  ctx.fillStyle = statB.color;
  ctx.globalAlpha = 0.15 + Math.sin(frame * 0.03) * 0.05;
  ctx.font = 'bold 26px monospace';
  ctx.fillText('BLASTER BASELING', GW / 2, GH * 0.16);
  ctx.globalAlpha = 1;
  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('BLASTER BASELING', GW / 2 + 2, GH * 0.16 + 2);
  // Main text
  ctx.fillStyle = statB.color;
  ctx.fillText('BLASTER BASELING', GW / 2, GH * 0.16);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, GH * 0.23);

  // NES-style control box
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(GW / 2 - 170, GH * 0.65, 340, 72);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(GW / 2 - 170, GH * 0.65, 340, 72);

  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('--- NES CONTROLS ---', GW / 2, GH * 0.65 + 14);
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('D-PAD / ARROWS .... Move + Aim', GW / 2, GH * 0.65 + 28);
  ctx.fillText('A / Z / SPACE ..... Jump / Hover', GW / 2, GH * 0.65 + 39);
  ctx.fillText('B / X / ENTER ..... Fire Weapon', GW / 2, GH * 0.65 + 50);
  ctx.fillText('SELECT / C ........ Grenade (dungeon)', GW / 2, GH * 0.65 + 61);

  // Baseling info
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText('Playing as: ' + statB.name + ' (Lv.' + statB.level + ')', GW / 2, GH * 0.60);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS START', GW / 2, GH * 0.94);
  ctx.globalAlpha = 1;

  // Save indicator
  try {
    if (localStorage.getItem('blaster_baseling_save')) {
      ctx.fillStyle = '#44aa88';
      ctx.font = '8px monospace';
      ctx.fillText('(save data found - will continue)', GW / 2, GH * 0.58);
    }
  } catch(e) { console.error('localStorage check failed:', e); }
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
