// BASELING STAT BLOCK (NftLoader integration)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };

// Derived stat helpers — called throughout gameplay
function strMod() { return Math.floor((statB.str - 10) / 2); }
function dexMod() { return Math.floor((statB.dex - 10) / 2); }
function conMod() { return Math.floor((statB.con - 10) / 2); }
function intMod() { return Math.floor((statB.int - 10) / 2); }
function wisMod() { return Math.floor((statB.wis - 10) / 2); }
function chaMod() { return Math.floor((statB.cha - 10) / 2); }

// === BASELING PLAYER MODULE (Type B — no tasern-engine; direct BaselingPlayer) ===
var picking = false; // character-select overlay open
function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  statB.lives = 0; statB.scoreMult = 1; statB.cooldown = 1;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; }
  // Re-derive the tuned constants so a title-screen pick takes effect
  MAX_OPTIONS = 4 + Math.max(0, chaMod());
  PLAYER_SPEED_BASE = 2.5 + dexMod() * 0.15;
  FIRE_RATE_BASE = Math.max(3, 8 - dexMod());
  BASE_LIVES = 3 + Math.max(0, conMod()) + statB.lives;
  SCORE_MULT = statB.scoreMult + Math.max(0, intMod() * 0.05);
  LUCK_MULT = statB.luck + Math.max(0, wisMod() * 0.03);
  DMG_BONUS = statB.damage + Math.max(0, strMod() * 0.2);
}
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[reactor-force] player init failed:', e && e.message); });
}

var LUCK_MULT = statB.luck + Math.max(0, wisMod() * 0.03); // WIS: luck (recomputed on pick)

// ============================================================
// CANVAS SETUP

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, SCALE;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth;
  var sh = window.innerHeight - 20;
  SCALE = Math.min(sw / GW, sh / GH);
  W = Math.floor(GW * SCALE);
  H = Math.floor(GH * SCALE);
  canvas.width = GW * dpr;
  canvas.height = GH * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, Math.floor((sh - H) / 2)) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// SCREEN SHAKE
// ============================================================
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDur = 0;
function triggerShake(magnitude, duration) {
  shakeMag = magnitude;
  shakeDur = duration;
}
function updateShake() {
  if (shakeDur > 0) {
    shakeDur--;
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.92;
  } else {
    shakeX = 0;
    shakeY = 0;
  }
}

// ============================================================
// AUDIO ENGINE
// ============================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSize = Math.floor(audioCtx.sampleRate * dur);
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

var SFX = {

// ============================================================
// SCORE POPUPS
// ============================================================
var scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#ffcc00', life: 1.0, vy: -1.2 });
}
function updateScorePopups() {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy;
    p.life -= 0.025;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// PARTICLES (enhanced)
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed, shape) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = (speed || 2) * (0.3 + Math.random());
    particles.push({
      x: x, y: y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 1, color: color,
      size: 1 + Math.random() * 2,
      shape: shape || 'square',
      gravity: 0
    });
  }
}
function spawnEmberParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * Math.PI * 2;
    var s = 0.5 + Math.random() * 1.5;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s - 0.5,
      life: 1, color: color,
      size: 1 + Math.random(),
      shape: 'circle',
      gravity: -0.02
    });
  }
}
function spawnTrailParticle(x, y, color) {
  particles.push({
    x: x + (Math.random()-0.5)*4,
    y: y + (Math.random()-0.5)*4,
    vx: -0.5 - Math.random(), vy: (Math.random()-0.5)*0.5,
    life: 0.6, color: color, size: 1 + Math.random(), shape: 'square', gravity: 0
  });
}
function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += p.gravity;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// STARFIELD
// ============================================================
var stars = [];
for (var si = 0; si < 80; si++) {
  stars.push({ x: Math.random()*GW, y: Math.random()*GH, speed: 0.3+Math.random()*1.5, size: Math.random()<0.3?2:1 });
}
function updateStars() {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    s.x -= s.speed;
    if (s.x < 0) { s.x = GW; s.y = Math.random()*GH; }
  }
}
function drawStars() {
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var bright = Math.floor(100 + s.speed * 100);
    ctx.fillStyle = 'rgb(' + bright + ',' + bright + ',' + (bright+30) + ')';
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

function getZone() {
  var idx = stage;
  if (idx < 1) idx = 1;
  if (idx > ZONE_THEMES.length - 1) idx = ((idx - 1) % (ZONE_THEMES.length - 1)) + 1;
  return ZONE_THEMES[idx];
}

// ============================================================
// TERRAIN (themed per zone)
// ============================================================
var terrainTop = [];
var terrainBot = [];
function initTerrain() {
  terrainTop = []; terrainBot = [];
  for (var i = 0; i <= GW + 40; i += 4) {
    terrainTop.push(Math.random() * 20 + 5);
    terrainBot.push(Math.random() * 20 + 5);
  }
}
function updateTerrain() {
  if (Math.random() < 0.3) {
    terrainTop.shift();
    terrainTop.push(Math.random() * (15 + stage * 5) + 5);
    terrainBot.shift();
    terrainBot.push(Math.random() * (15 + stage * 5) + 5);
  }
}
function drawTerrain() {
  var zone = getZone();
  var colA = zone ? zone.terrainA : '#1a3320';
  var colB = zone ? zone.terrainB : '#0d1a10';

  ctx.fillStyle = colA;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (var i = 0; i < terrainTop.length; i++) ctx.lineTo(i * 4, terrainTop[i]);
  ctx.lineTo(GW, 0);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colB;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (var i = 0; i < terrainTop.length; i++) ctx.lineTo(i * 4, terrainTop[i] * 0.6);
  ctx.lineTo(GW, 0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = colA;
  ctx.beginPath();
  ctx.moveTo(0, GH);
  for (var i = 0; i < terrainBot.length; i++) ctx.lineTo(i * 4, GH - terrainBot[i]);
  ctx.lineTo(GW, GH);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = colB;
  ctx.beginPath();
  ctx.moveTo(0, GH);
  for (var i = 0; i < terrainBot.length; i++) ctx.lineTo(i * 4, GH - terrainBot[i] * 0.6);
  ctx.lineTo(GW, GH);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// FOG LAYERS (zone atmosphere)
// ============================================================
var fogLayers = [];
function initFog() {
  fogLayers = [];
  for (var i = 0; i < 6; i++) {
    fogLayers.push({ x: Math.random() * GW, y: 40 + Math.random() * (GH - 80), r: 30 + Math.random() * 50, speed: 0.2 + Math.random() * 0.5 });
  }
}
function updateFog() {
  for (var i = 0; i < fogLayers.length; i++) {
    var f = fogLayers[i];
    f.x -= f.speed;
    if (f.x < -f.r * 2) { f.x = GW + f.r; f.y = 40 + Math.random() * (GH - 80); }
  }
}
function drawFog() {
  var zone = getZone();
  if (!zone) return;
  for (var i = 0; i < fogLayers.length; i++) {
    var f = fogLayers[i];
    ctx.fillStyle = zone.fogColor;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPixelSprite(x, y, pixels, palette, scale) {
  scale = scale || 1;
  for (var row = 0; row < pixels.length; row++) {
    for (var col = 0; col < pixels[row].length; col++) {
      var c = pixels[row][col];
      if (c === 0 || c === ' ') continue;
      ctx.fillStyle = palette[c] || '#ff00ff';
      ctx.fillRect(
        Math.floor(x + col * scale),
        Math.floor(y + row * scale),
        scale, scale
      );
    }
  }
}

function getShipPalette() {
  var base = statB.color || '#44dd88';
  return {
    1: shadeColor(base, -60),
    2: shadeColor(base, -30),
    3: base,
    4: shadeColor(base, 30),
    5: '#ffffff'
  };
}

function shadeColor(hex, amt) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// PLAYER
// ============================================================
function initPlayer() {
  player = {
    x: 60, y: GH/2, w: 20, h: 14,
    fireTimer: 0, invincible: 0, dead: false,
    trail: [],
    combo: 0, comboTimer: 0
  };
  options = [];
  speedLevel = 0; hasDouble = false; hasLaser = false; hasMissile = false;
  hasShield = false; shieldHP = 0;
  powerBar = 0; powerOrbs = 0;
}

function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible/3)%2) return;

  var px = player.x, py = player.y;

  // Engine glow trail particles
  if (frameCount % 2 === 0) {
    spawnTrailParticle(px - 12, py, statB.color || '#44dd88');
  }

  // === BASELING SPRITE ===
  var anim = 'idle';
  if (player.invincible > 0) anim = 'hurt';
  else if (player.vx || player.vy) anim = 'walk';
  if (!drawSelectedBaseling(ctx, px, py, 20, { flipX: false, frame: frameCount, anim: anim })) {
    // NES pixel ship centered on px,py
    var palette = getShipPalette();
    var sprW = SHIP_PIXELS[0].length;
    var sprH = SHIP_PIXELS.length;
    drawPixelSprite(px - sprW/2, py - sprH/2, SHIP_PIXELS, palette, 1);

    // Baseling icon on ship
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon || 'B', px + 2, py + 2);
  }

  // Shield bubble
  if (hasShield && shieldHP > 0) {
    ctx.strokeStyle = 'rgba(0, 200, 255, ' + (0.3 + Math.sin(frameCount*0.1)*0.15) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(px, py, 16, 12, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
}

function drawOptions() {
  for (var i = 0; i < options.length; i++) {
    var o = options[i];
    var pulse = Math.sin(frameCount*0.15 + i)*0.3 + 0.7;
    ctx.fillStyle = '#ff8800';
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(o.x, o.y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(o.x, o.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function fireBullets() {
  if (player.dead) return;
  if (player.fireTimer > 0) return;

  var rate = hasLaser ? FIRE_RATE_BASE + 4 : FIRE_RATE_BASE;
  // INT: reduced cooldown on weapons // stat ref #1 (intMod)
  rate = Math.max(2, rate - Math.max(0, intMod()));
  player.fireTimer = rate;

  // STR: damage bonus // stat ref #2
  var baseDmg = DMG_BONUS;

  if (hasLaser) {
    bullets.push({ x: player.x + 12, y: player.y, vx: 8, vy: 0, w: 24, h: 2, dmg: baseDmg * 2, type: 'laser' });
    SFX.laser();
  } else if (hasDouble) {
    bullets.push({ x: player.x + 10, y: player.y - 4, vx: 7, vy: -0.5, w: 6, h: 2, dmg: baseDmg, type: 'bullet' });
    bullets.push({ x: player.x + 10, y: player.y + 4, vx: 7, vy: 0.5, w: 6, h: 2, dmg: baseDmg, type: 'bullet' });
    SFX.shoot();
  } else {
    bullets.push({ x: player.x + 10, y: player.y, vx: 7, vy: 0, w: 6, h: 2, dmg: baseDmg, type: 'bullet' });
    SFX.shoot();
  }

  if (hasMissile) {
    // WIS: missile tracking accuracy // stat ref #3
    var missileVy = 2 - wisMod() * 0.15;
    bullets.push({ x: player.x, y: player.y + 8, vx: 3, vy: missileVy, w: 4, h: 4, dmg: baseDmg * 2, type: 'missile', timer: 0, seeking: wisMod() > 0 });
    SFX.missile();
  }

  // Options fire too
  for (var oi = 0; oi < options.length; oi++) {
    var o = options[oi];
    if (hasLaser) {
      bullets.push({ x: o.x + 6, y: o.y, vx: 8, vy: 0, w: 16, h: 2, dmg: baseDmg, type: 'laser' });
    } else {
      bullets.push({ x: o.x + 6, y: o.y, vx: 7, vy: 0, w: 5, h: 2, dmg: baseDmg, type: 'bullet' });
    }
  }
}

function updateBullets() {
  for (var i = bullets.length-1; i >= 0; i--) {
    var b = bullets[i];
    if (b.type === 'missile') {
      b.timer++;
      if (b.seeking && enemies.length > 0) {
        // WIS: seeking missiles track nearest enemy // stat ref #4
        var nearest = null, nd = 99999;
        for (var ei = 0; ei < enemies.length; ei++) {
          if (enemies[ei].dead) continue;
          var dd = Math.abs(enemies[ei].x - b.x) + Math.abs(enemies[ei].y - b.y);
          if (dd < nd) { nd = dd; nearest = enemies[ei]; }
        }
        if (nearest) {
          var dx = nearest.x - b.x, dy = nearest.y - b.y;
          var dd2 = Math.sqrt(dx*dx + dy*dy);
          if (dd2 > 0) {
            b.vx += (dx/dd2) * 0.3;
            b.vy += (dy/dd2) * 0.3;
          }
        }
      } else {
        b.vy += 0.08;
        if (b.vy > 3) b.vy = 3;
      }
    }
    b.x += b.vx; b.y += b.vy;
    if (b.x > GW + 10 || b.x < -10 || b.y > GH + 10 || b.y < -10) {
      bullets.splice(i, 1);
    }
  }
}

function drawBullets() {
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    if (b.type === 'laser') {
      ctx.fillStyle = '#00ffff';
      ctx.fillRect(b.x, b.y - 1, b.w, b.h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x + 2, b.y, b.w - 4, 1);
    } else if (b.type === 'missile') {
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(b.x - 2, b.y - 2, 5, 4);
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(b.x - 4, b.y - 1, 2, 2);
    } else {
      ctx.fillStyle = statB.color || '#88ff44';
      ctx.fillRect(b.x, b.y - 1, b.w, b.h);
    }
  }
}

function updateEnemyBullets() {
  for (var i = enemyBullets.length-1; i >= 0; i--) {
    var b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -10 || b.x > GW+10 || b.y < -10 || b.y > GH+10) {
      enemyBullets.splice(i, 1);
    }
  }
}

  for (var i = 0; i < enemyBullets.length; i++) {
    var b = enemyBullets[i];
    ctx.fillStyle = b.color || '#ff3366';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r || 2, 0, Math.PI*2);
    ctx.fill();
  }
}

var ENEMY_TYPES = {
  sporeling:  { w: 12, h: 10, hp: 1, score: 100, color: '#e6482e', pixels: SPORE_PIXELS, palette: SPORE_PALETTE, bulletColor: '#e6482e' },
  fungalKnight: { w: 16, h: 12, hp: 2, score: 200, color: '#a855f7', pixels: FUNGAL_PIXELS, palette: FUNGAL_PALETTE, bulletColor: '#c084fc' },
  huskCruiser: { w: 20, h: 14, hp: 4, score: 400, color: '#7a444a', pixels: HUSK_PIXELS, palette: HUSK_PALETTE, bulletColor: '#f4b41b' },
  voidWraith:  { w: 14, h: 14, hp: 3, score: 300, color: '#3cacd7', pixels: WRAITH_PIXELS, palette: WRAITH_PALETTE, bulletColor: '#3cacd7' }
};

function spawnWave() {
  var waveType = Math.random();
  var yBase = 40 + Math.random() * (GH - 80);

  if (waveType < 0.30) {
    // Sporeling swarm — reactor mold
    var count = 4 + Math.floor(stage * 0.8);
    for (var i = 0; i < count; i++) {
      enemies.push(makeEnemy('sporeling', GW + 20 + i * 22, yBase + Math.sin(i) * 15, 'line'));
    }
  } else if (waveType < 0.52) {
    // Power Spore sine wave
    var count = 3 + Math.floor(stage * 0.5);
    for (var i = 0; i < count; i++) {
      enemies.push(makeEnemy('fungalKnight', GW + 30 + i * 30, GH/2, 'sine', { phase: i * 0.8, amp: 50 + stage * 10 }));
    }
  } else if (waveType < 0.72) {
    // Energy Fungi diagonal
    var count = 2 + Math.floor(stage * 0.3);
    for (var i = 0; i < count; i++) {
      var fromTop = Math.random() > 0.5;
      enemies.push(makeEnemy('huskCruiser', GW + 10 + i * 40, fromTop ? -10 : GH + 10, 'diagonal', { dir: fromTop ? 1 : -1 }));
    }
  } else if (waveType < 0.88) {
    // Mycelium Wraith turrets
    var count = 1 + Math.floor(stage * 0.4);
    for (var i = 0; i < count; i++) {
      enemies.push(makeEnemy('voidWraith', GW + 20 + i * 50, 30 + Math.random() * (GH - 60), 'turret'));
    }
  } else {
    // Mixed spore ambush (higher gardens)
    enemies.push(makeEnemy('sporeling', GW + 20, 40, 'line'));
    enemies.push(makeEnemy('sporeling', GW + 42, 50, 'line'));
    enemies.push(makeEnemy('fungalKnight', GW + 60, GH/2, 'sine', { phase: 0, amp: 60 }));
    if (stage >= 3) enemies.push(makeEnemy('voidWraith', GW + 80, GH - 60, 'turret'));
    if (stage >= 5) enemies.push(makeEnemy('huskCruiser', GW + 30, -10, 'diagonal', { dir: 1 }));
  }
}

function makeEnemy(type, x, y, pattern, data) {
  var def = ENEMY_TYPES[type];
  // CON scaling for enemy HP per stage // stat ref #5 (enemies scale vs player CON)
  var hpScale = Math.floor(stage * 0.3);
  return {
    x: x, y: y, w: def.w, h: def.h,
    hp: def.hp + hpScale,
    maxHp: def.hp + hpScale,
    type: type, color: def.color, score: def.score,
    pattern: pattern, data: data || {},
    timer: 0, fireTimer: 60 + Math.floor(Math.random() * 60),
    dead: false, flashTimer: 0
  };
}

function updateEnemies() {
  for (var i = enemies.length-1; i >= 0; i--) {
    var e = enemies[i];
    if (e.dead) { enemies.splice(i, 1); continue; }
    e.timer++;
    if (e.flashTimer > 0) e.flashTimer--;

    var speed = 1.2 + stage * 0.15;

    switch (e.pattern) {
      case 'line':
        e.x -= speed;
        e.y += Math.sin(e.timer * 0.05) * 0.5;
        break;
      case 'sine':
        e.x -= speed * 0.8;
        e.y = GH/2 + Math.sin(e.timer * 0.04 + (e.data.phase||0)) * (e.data.amp||50);
        break;
      case 'diagonal':
        e.x -= speed * 0.6;
        e.y += (e.data.dir||1) * speed * 0.8;
        if (e.y < 20 || e.y > GH - 20) e.data.dir = -(e.data.dir||1);
        break;
      case 'turret':
        e.x -= speed * 0.4;
        e.y += Math.sin(e.timer * 0.02) * 0.3;
        break;
    }

    // Shooting
    if (e.type === 'voidWraith' || e.type === 'huskCruiser' || (e.type === 'fungalKnight' && stage >= 3)) {
      e.fireTimer--;
      if (e.fireTimer <= 0) {
        e.fireTimer = 80 - stage * 5;
        if (e.fireTimer < 30) e.fireTimer = 30;
        var dx = player.x - e.x, dy = player.y - e.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 0 && e.x < GW - 10) {
          var bspd = 2.5 + stage * 0.2;
          var def = ENEMY_TYPES[e.type];
          enemyBullets.push({ x: e.x, y: e.y, vx: dx/dist*bspd, vy: dy/dist*bspd, r: 2, color: def ? def.bulletColor : '#ff3366' });
        }
      }
    }

    // Off screen removal
    if (e.x < -30 || e.y < -40 || e.y > GH + 40) {
      enemies.splice(i, 1);
    }
  }
}

function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.dead) continue;

    var def = ENEMY_TYPES[e.type];
    if (def && def.pixels) {
      var pal = def.palette;
      // Flash white on hit
      if (e.flashTimer > 0) {
        pal = { 1: '#ffffff', 2: '#ffffff', 3: '#ffffff', 4: '#ffffff' };
      }
      var sprW = def.pixels[0].length;
      var sprH = def.pixels.length;
      drawPixelSprite(e.x - sprW/2, e.y - sprH/2, def.pixels, pal, 1);
    } else {
      // Fallback shape
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.moveTo(e.x - e.w/2, e.y);
      ctx.lineTo(e.x - e.w/4, e.y - e.h/2);
      ctx.lineTo(e.x + e.w/3, e.y - e.h/3);
      ctx.lineTo(e.x + e.w/2, e.y);
      ctx.lineTo(e.x + e.w/3, e.y + e.h/3);
      ctx.lineTo(e.x - e.w/4, e.y + e.h/2);
      ctx.closePath();
      ctx.fill();
    }

    // Glowing eye
    ctx.fillStyle = def ? def.bulletColor : '#ff0066';
    ctx.beginPath();
    ctx.arc(e.x + 2, e.y, 1.5, 0, Math.PI*2);
    ctx.fill();

    // HP bar for tougher enemies
    if (e.maxHp > 2) {
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 4, e.w, 2);
      ctx.fillStyle = '#ff3300';
      ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 4, e.w * (e.hp/e.maxHp), 2);
    }
  }
}

function getBossPalette(stg) {
  var palettes = [
    null,

    { 1: '#0a1a2c', 2: '#1a3050', 3: '#3cacd7', 4: '#66d4ff', 5: '#88eeff' },
    { 1: '#2a1008', 2: '#5a2a10', 3: '#7a444a', 4: '#f4b41b', 5: '#ffe060' },
    { 1: '#1a0a2c', 2: '#3a1a5c', 3: '#a855f7', 4: '#c084fc', 5: '#e0b0ff' },
    { 1: '#0a0a1c', 2: '#1a1c2c', 3: '#3cacd7', 4: '#38d973', 5: '#88ffaa' },
    { 1: '#2a0a00', 2: '#5a1a08', 3: '#e6482e', 4: '#f4b41b', 5: '#ffe060' },
    { 1: '#0a2a08', 2: '#1a5a10', 3: '#38d973', 4: '#66ff88', 5: '#aaffcc' }
  ];
  var idx = stg;
  if (idx < 1) idx = 1;
  if (idx > palettes.length - 1) idx = ((idx - 1) % (palettes.length - 1)) + 1;

function spawnBoss() {
  bossActive = true;
  // CON/STR affect boss HP scaling // stat ref #6
  var bossHP = 30 + stage * 20;
  boss = {
    x: GW + 40, y: GH/2, w: 50, h: 40,
    hp: bossHP, maxHp: bossHP,
    phase: 0, timer: 0, fireTimer: 0,
    pattern: 0, entering: true,
    dead: false, flashTimer: 0
  };
  SFX.boss();
  triggerShake(3, 30);
}

function updateBoss() {
  if (!boss || boss.dead) return;
  boss.timer++;
  if (boss.flashTimer > 0) boss.flashTimer--;

  if (boss.entering) {
    boss.x -= 1;
    if (boss.x <= GW - 70) boss.entering = false;
    return;
  }

  var phase = Math.floor(boss.timer / 180) % 3;
  switch (phase) {
    case 0:
      boss.y += Math.sin(boss.timer * 0.03) * 1.5;
      break;
    case 1:
      boss.y += Math.sin(boss.timer * 0.06) * 3;
      break;
    case 2:
      boss.x += Math.sin(boss.timer * 0.02) * 1.5;
      if (boss.x < GW - 100) boss.x = GW - 100;
      if (boss.x > GW - 40) boss.x = GW - 40;
      break;
  }

  if (boss.y < 40) boss.y = 40;
  if (boss.y > GH - 40) boss.y = GH - 40;

  // Boss spore burst - INT affects how well baseling can predict // stat ref #7
  boss.fireTimer--;
  if (boss.fireTimer <= 0) {
    boss.fireTimer = Math.max(15, 40 - stage * 4);
    var fpattern = Math.floor(boss.timer / 120) % 5;

    switch (fpattern) {
      case 0: // Aimed shot
        var dx = player.x - boss.x, dy = player.y - boss.y;
        var d = Math.sqrt(dx*dx+dy*dy);
        if (d > 0) enemyBullets.push({ x: boss.x - 20, y: boss.y, vx: dx/d*3.5, vy: dy/d*3.5, r: 3, color: '#ff3366' });
        break;
      case 1: // Spread
        for (var a = -3; a <= 3; a++) {
          var ang = a * 0.2 + Math.PI;
          enemyBullets.push({ x: boss.x - 20, y: boss.y, vx: Math.cos(ang)*3, vy: Math.sin(ang)*3, r: 2, color: '#ff6699' });
        }
        boss.fireTimer = 50;
        break;
      case 2: // Stream
        enemyBullets.push({ x: boss.x - 25, y: boss.y - 10, vx: -4, vy: 0, r: 2, color: '#ff3366' });
        enemyBullets.push({ x: boss.x - 25, y: boss.y + 10, vx: -4, vy: 0, r: 2, color: '#ff3366' });
        break;
      case 3: // Ring burst
        for (var a = 0; a < 12; a++) {
          var ang = a * (Math.PI*2/12);
          enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang)*2.5, vy: Math.sin(ang)*2.5, r: 2, color: '#ff6699' });
        }
        boss.fireTimer = 80;
        break;
      case 4: // Spore burst (Baseling special)
        for (var a = 0; a < 8; a++) {
          var ang = a * (Math.PI*2/8) + boss.timer * 0.02;
          enemyBullets.push({ x: boss.x - 10, y: boss.y, vx: Math.cos(ang)*2, vy: Math.sin(ang)*2, r: 3, color: '#aa44ff' });
        }
        boss.fireTimer = 60;
        break;
    }
  }
}

function drawBoss() {
  if (!boss || boss.dead) return;
  var px = boss.x, py = boss.y;

  // NES pixel boss
  var pal = getBossPalette(stage);
  if (boss.flashTimer > 0) {
    pal = { 1: '#ffffff', 2: '#ffffff', 3: '#ffffff', 4: '#ffffff', 5: '#ffffff' };
  }
  var sprW = BOSS_PIXELS[0].length;
  var sprH = BOSS_PIXELS.length;
  drawPixelSprite(px - sprW, py - sprH, BOSS_PIXELS, pal, 2);

  // Pulsing core
  var pulse = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
  ctx.fillStyle = 'rgba(255, 0, 100, ' + pulse + ')';
  ctx.beginPath();
  ctx.arc(px - 5, py, 6, 0, Math.PI*2);
  ctx.fill();

  // Weapon port glow
  ctx.fillStyle = '#ff3366';
  ctx.fillRect(px - 28, py - 12, 4, 4);
  ctx.fillRect(px - 28, py + 8, 4, 4);

  // HP bar
  var barW = 60;
  ctx.fillStyle = '#333';
  ctx.fillRect(px - barW/2, py - 34, barW, 4);
  ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#ff3300' : '#ff0000';
  ctx.fillRect(px - barW/2, py - 34, barW * (boss.hp / boss.maxHp), 4);

  // Boss name
  var bossIdx = stage;
  if (bossIdx < 1) bossIdx = 1;
  if (bossIdx > BOSS_NAMES.length - 1) bossIdx = ((bossIdx - 1) % (BOSS_NAMES.length - 1)) + 1;
  ctx.fillStyle = '#ff6699';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(BOSS_NAMES[bossIdx] || ('BOSS-' + stage), px, py - 38);
}

// ============================================================
// ORBS (power capsules)
// ============================================================
function spawnOrb(x, y) {
  orbs.push({ x: x, y: y, vx: -1, vy: 0, timer: 0 });
}

function updateOrbs() {
  for (var i = orbs.length-1; i >= 0; i--) {
    var o = orbs[i];
    o.x += o.vx; o.timer++;
    o.y += Math.sin(o.timer * 0.08) * 0.3;
    if (o.x < -10) { orbs.splice(i, 1); continue; }
    if (!player.dead && Math.abs(o.x - player.x) < 14 && Math.abs(o.y - player.y) < 10) {
      powerOrbs++;
      orbs.splice(i, 1);
      SFX.powerup();
    }
  }
}

function drawOrbs() {
  for (var i = 0; i < orbs.length; i++) {
    var o = orbs[i];
    var pulse = Math.sin(o.timer * 0.15) * 0.2 + 0.8;
    ctx.fillStyle = '#ff8800';
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(o.x, o.y, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(o.x, o.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// ITEMS (Baseling pickups — POOP, spores, seeds, mycelium)
// ============================================================
var ITEM_TYPES = {
  healthPotion: { color: '#e6482e', glow: '#ff8888', label: 'HP', effect: 'heal' },
  speedScroll:  { color: '#3cacd7', glow: '#88ccff', label: 'SPD', effect: 'speed' },
  strengthRune: { color: '#f4b41b', glow: '#ffaa44', label: 'POO', effect: 'strength' },
  wisdomOrb:    { color: '#a855f7', glow: '#cc88ff', label: 'SPR', effect: 'wisdom' },
  shieldGem:    { color: '#38d973', glow: '#44ffff', label: 'SED', effect: 'shield' },
  scoreCoin:    { color: '#f4b41b', glow: '#ffee88', label: 'M', effect: 'score' }
};

function spawnItem(x, y) {
  var typeKeys = Object.keys(ITEM_TYPES);
  // WIS: luck affects item quality // stat ref #8
  var idx = Math.floor(Math.random() * typeKeys.length);
  if (LUCK_MULT > 1.1 && Math.random() < 0.3) {
    // Higher luck favors better items (strength rune, wisdom orb)
    idx = 2 + Math.floor(Math.random() * 2);
  }
  var key = typeKeys[idx];
  var def = ITEM_TYPES[key];
  items.push({ x: x, y: y, vx: -0.8, vy: 0, timer: 0, type: key, color: def.color, glow: def.glow, label: def.label, effect: def.effect });
}

function updateItems() {
  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    it.x += it.vx; it.timer++;
    it.y += Math.sin(it.timer * 0.06) * 0.4;
    if (it.x < -10) { items.splice(i, 1); continue; }

    // CHA: pickup radius // stat ref #9
    var pickupDist = 12 + Math.max(0, chaMod()) * 2;
    if (!player.dead && Math.abs(it.x - player.x) < pickupDist && Math.abs(it.y - player.y) < pickupDist) {
      applyItem(it);
      items.splice(i, 1);
    }
  }
}

function applyItem(it) {
  SFX.item();
  switch (it.effect) {
    case 'heal':
      // CON: health potion restores more with higher CON // stat ref #10
      var healAmt = 1 + Math.max(0, Math.floor(conMod() / 2));
      if (hasShield) {
        shieldHP = Math.min(shieldHP + healAmt, 5);
      }
      spawnScorePopup(it.x, it.y, '+HEAL', '#e6482e');
      break;
    case 'speed':
      if (speedLevel < 5) speedLevel++;
      spawnScorePopup(it.x, it.y, '+SPEED', '#3cacd7');
      break;
    case 'strength':
      // Temporary damage boost (lasts 300 frames)
      player.dmgBoost = (player.dmgBoost || 0) + 300;
      spawnScorePopup(it.x, it.y, '+POOP!', '#f4b41b');
      break;
    case 'wisdom':
      // Extra orbs
      powerOrbs += 2;
      spawnScorePopup(it.x, it.y, '+SPOREx2', '#a855f7');
      break;
    case 'shield':
      hasShield = true;
      shieldHP = Math.min(shieldHP + 2, 5);
      spawnScorePopup(it.x, it.y, '+SEED', '#38d973');
      break;
    case 'score':
      var bonus = Math.floor(500 * SCORE_MULT);
      score += bonus;
      spawnScorePopup(it.x, it.y, '+' + bonus + 'M', '#f4b41b');
      break;
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var pulse = Math.sin(it.timer * 0.12) * 0.2 + 0.8;
    // Glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = it.glow;
    ctx.beginPath();
    ctx.arc(it.x, it.y, 8, 0, Math.PI*2);
    ctx.fill();
    // Body
    ctx.globalAlpha = pulse;
    ctx.fillStyle = it.color;
    ctx.fillRect(it.x - 4, it.y - 4, 8, 8);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(it.x - 4, it.y - 4, 8, 8);
    ctx.lineWidth = 1;
    // Label
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(it.label, it.x, it.y + 2);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// HAZARDS (Reactor garden spore clouds and corruption zones)
// ============================================================
function spawnHazard() {
  var hazType = Math.random();
  if (hazType < 0.5) {
    // Spore cloud - damages on contact
    hazards.push({
      type: 'sporeCloud', x: GW + 30, y: 30 + Math.random() * (GH - 60),
      w: 30 + Math.random() * 20, h: 20 + Math.random() * 15,
      vx: -0.6 - Math.random() * 0.4, timer: 0, color: 'rgba(100,30,80,0.3)'
    });
  } else {
    // Corruption zone - slows player
    hazards.push({
      type: 'corruption', x: GW + 40, y: 20 + Math.random() * (GH - 40),
      w: 40, h: 50 + Math.random() * 30,
      vx: -0.5, timer: 0, color: 'rgba(50,0,80,0.25)'
    });
  }
}

function updateHazards() {
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.x += h.vx; h.timer++;
    if (h.x < -h.w - 10) { hazards.splice(i, 1); continue; }

    // Player collision
    if (!player.dead && player.invincible <= 0) {
      if (player.x > h.x - h.w/2 && player.x < h.x + h.w/2 &&
          player.y > h.y - h.h/2 && player.y < h.y + h.h/2) {
        if (h.type === 'sporeCloud') {
          // CON: resist spore damage // stat ref #11
          if (conMod() < 2 || Math.random() > 0.5) {
            if (hasShield && shieldHP > 0) {
              shieldHP--;
              if (shieldHP <= 0) hasShield = false;
            } else if (h.timer % 60 === 0) {
              playerDie();
              return;
            }
          }
          SFX.hazard();
        } else if (h.type === 'corruption') {
          // Slow effect - WIS resists // stat ref #12
          player.slowed = Math.max(0, 30 - wisMod() * 5);
        }
      }
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.type === 'sporeCloud') {
      // Animated spore cloud
      for (var s = 0; s < 5; s++) {
        var ox = Math.sin(h.timer * 0.03 + s * 1.2) * h.w * 0.3;
        var oy = Math.cos(h.timer * 0.04 + s * 0.8) * h.h * 0.3;
        ctx.fillStyle = h.color;
        ctx.beginPath();
        ctx.arc(h.x + ox, h.y + oy, 8 + Math.sin(h.timer * 0.05 + s) * 3, 0, Math.PI * 2);
        ctx.fill();
      }
      // Warning symbol
      ctx.fillStyle = 'rgba(255,100,150,0.4)';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', h.x, h.y + 3);
    } else if (h.type === 'corruption') {
      // Corruption zone with scanlines
      ctx.fillStyle = h.color;
      ctx.fillRect(h.x - h.w/2, h.y - h.h/2, h.w, h.h);
      // Scanline effect
      ctx.fillStyle = 'rgba(80,0,120,0.15)';
      for (var sl = 0; sl < h.h; sl += 4) {
        var slY = h.y - h.h/2 + sl + (h.timer % 4);
        if (slY >= h.y - h.h/2 && slY <= h.y + h.h/2) {
          ctx.fillRect(h.x - h.w/2, slY, h.w, 1);
        }
      }
    }
  }
}

// ============================================================
// POWER-UP SYSTEM (Gradius style)
// ============================================================
function activatePower() {
  if (powerOrbs <= 0) return;
  powerOrbs--;
  SFX.activate();

  switch (powerBar) {
    case 0: // Speed — DEX bonus applied via PLAYER_SPEED_BASE // stat ref #13
      if (speedLevel < 5) speedLevel++;
      break;
    case 1: // Missile
      hasMissile = true;
      break;
    case 2: // Double
      hasDouble = true;
      hasLaser = false;
      break;
    case 3: // Laser
      hasLaser = true;
      hasDouble = false;
      break;
    case 4: // Option — CHA: max options // stat ref #14
      if (options.length < MAX_OPTIONS) {
        options.push({ x: player.x - 20 * (options.length+1), y: player.y });
      }
      break;
    case 5: // Shield — CON: shield HP // stat ref #15
      hasShield = true;
      shieldHP = 3 + Math.max(0, conMod());
      break;
  }

  powerBar = 0;
}

function cyclePower() {
  if (powerOrbs > 0) {
    powerBar = (powerBar + 1) % 6;
  }
}

// ============================================================
// COLLISION DETECTION
// ============================================================
function checkCollisions() {
  // Bullets vs enemies
  for (var bi = bullets.length-1; bi >= 0; bi--) {
    var b = bullets[bi];
    for (var ei = enemies.length-1; ei >= 0; ei--) {
      var e = enemies[ei];
      if (e.dead) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + b.w/2 && Math.abs(b.y - e.y) < e.h/2 + b.h/2) {
        // STR: damage with temporary boost // stat ref #16
        var dmg = b.dmg;
        if (player.dmgBoost && player.dmgBoost > 0) dmg *= 1.5;
        e.hp -= dmg;
        e.flashTimer = 4;
        bullets.splice(bi, 1);
        if (e.hp <= 0) {
          killEnemy(e, ei);
        } else {
          spawnParticles(b.x, b.y, '#ffaa00', 3, 1);
        }
        break;
      }
    }
    // Bullets vs boss
    if (boss && !boss.dead && bi < bullets.length) {
      var b2 = bullets[bi];
      if (Math.abs(b2.x - boss.x) < boss.w/2 + b2.w/2 && Math.abs(b2.y - boss.y) < boss.h/2 + b2.h/2) {
        var dmg2 = b2.dmg;
        if (player.dmgBoost && player.dmgBoost > 0) dmg2 *= 1.5;
        boss.hp -= dmg2;
        boss.flashTimer = 3;
        bullets.splice(bi, 1);
        spawnParticles(b2.x, b2.y, '#ffaa00', 3, 1);
        triggerShake(1, 3);
        if (boss.hp <= 0) {
          killBoss();
        }
      }
    }
  }

  // Enemy bullets vs player — DEX: smaller hitbox // stat ref #17
  var hitboxW = Math.max(4, 8 - dexMod());
  var hitboxH = Math.max(3, 6 - dexMod());
  if (!player.dead && player.invincible <= 0) {
    for (var i = enemyBullets.length-1; i >= 0; i--) {
      var b = enemyBullets[i];
      if (Math.abs(b.x - player.x) < hitboxW && Math.abs(b.y - player.y) < hitboxH) {
        if (hasShield && shieldHP > 0) {
          shieldHP--;
          enemyBullets.splice(i, 1);
          if (shieldHP <= 0) hasShield = false;
        } else {
          playerDie();
          return;
        }
      }
    }
  }

  // Enemies vs player (body collision)
  if (!player.dead && player.invincible <= 0) {
    for (var ei2 = 0; ei2 < enemies.length; ei2++) {
      var e2 = enemies[ei2];
      if (e2.dead) continue;
      if (Math.abs(e2.x - player.x) < (e2.w + player.w)/2 - 4 && Math.abs(e2.y - player.y) < (e2.h + player.h)/2 - 4) {
        if (hasShield && shieldHP > 0) {
          shieldHP--;
          e2.hp -= 5;
          if (e2.hp <= 0) killEnemy(e2, enemies.indexOf(e2));
          if (shieldHP <= 0) hasShield = false;
        } else {
          playerDie();
          return;
        }
      }
    }
    // Boss collision
    if (boss && !boss.dead) {
      if (Math.abs(boss.x - player.x) < (boss.w + player.w)/2 && Math.abs(boss.y - player.y) < (boss.h + player.h)/2) {
        if (hasShield && shieldHP > 0) {
          shieldHP = 0; hasShield = false;
        } else {
          playerDie();
        }
      }
    }
  }
}

function killEnemy(e, idx) {
  e.dead = true;
  totalKills++;

  // Combo system
  player.combo++;
  player.comboTimer = 90;
  var comboMult = Math.min(player.combo, 10);

  // INT: score multiplier // stat ref #18
  var pts = Math.floor(e.score * SCORE_MULT * (1 + comboMult * 0.1));
  score += pts;

  SFX.explode();
  triggerShake(2, 5);
  spawnParticles(e.x, e.y, e.color, 10, 2.5);
  spawnEmberParticles(e.x, e.y, '#ff8800', 6);

  // Score popup with combo
  var popText = '+' + pts;
  if (comboMult > 1) popText += ' x' + comboMult;
  spawnScorePopup(e.x, e.y - 8, popText, comboMult > 3 ? '#ff4444' : '#ffcc00');

  // WIS: luck for drops // stat ref #19
  var dropChance = 0.35 + LUCK_MULT * 0.05;
  if (Math.random() < dropChance) {
    spawnOrb(e.x, e.y);
  }
  // Item drops (rarer)
  var itemChance = 0.08 + LUCK_MULT * 0.02;
  if (Math.random() < itemChance) {
    spawnItem(e.x, e.y);
  }
}

function killBoss() {
  boss.dead = true;
  bossActive = false;
  // INT: score multiplier on boss // stat ref #20
  var bossScore = Math.floor((2000 + stage * 1000) * SCORE_MULT);
  score += bossScore;
  SFX.explode();
  triggerShake(6, 30);
  spawnScorePopup(boss.x, boss.y - 20, '+' + bossScore, '#ff44ff');

  for (var i = 0; i < 8; i++) {
    (function(idx) {
      setTimeout(function() {
        if (boss) {
          spawnParticles(boss.x + (Math.random()-0.5)*40, boss.y + (Math.random()-0.5)*30, '#ff3366', 15, 3);
          spawnEmberParticles(boss.x + (Math.random()-0.5)*30, boss.y + (Math.random()-0.5)*20, '#ffaa00', 8);
        }
        SFX.explode();
        triggerShake(3, 8);
      }, idx * 150);
    })(i);
  }

  setTimeout(function() {
    state = 'stageClear';
    stateTimer = 180;
    SFX.stageClear();
  }, 1000);
}

function playerDie() {
  if (player.dead) return;
  player.dead = true;
  lives--;
  SFX.playerDie();
  triggerShake(5, 20);
  spawnParticles(player.x, player.y, statB.color || '#00ff88', 20, 3);
  spawnEmberParticles(player.x, player.y, '#ffcc00', 12);
  state = 'dying';
  stateTimer = 90;
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  state = 'playing';
  score = 0; lives = BASE_LIVES; stage = 1;
  frameCount = 0; stageTimer = 0;
  bossActive = false; bossWarning = 0; boss = null;
  bullets = []; enemies = []; enemyBullets = []; orbs = []; particles = [];
  items = []; hazards = []; scorePopups = []; totalKills = 0;

  // NftLoader bonus lives
  if (window.NftLoader && window.NftLoader.selectedCharacter) {
    var bonuses = window.NftLoader.getBonuses();
    lives += bonuses.lives;
  }

  initPlayer();
  initTerrain();
  initFog();

  if (showTutorial) {
    tutorialTimer = 300; // 5 seconds
    showTutorial = false;
  }
}

function respawn() {
  player.dead = false;
  player.x = 60; player.y = GH/2;
  player.invincible = 120;
  player.trail = [];
  player.combo = 0; player.comboTimer = 0;
  // Lose powers on death (Gradius style)
  speedLevel = 0; hasDouble = false; hasLaser = false; hasMissile = false;
  hasShield = false; shieldHP = 0;
  options = [];
  powerBar = 0; powerOrbs = 0;
  enemyBullets = [];
}

function nextStage() {
  stage++;
  if (stage > STAGE_COUNT) {
    stage = 1;
    score += 10000;
  }
  stageTimer = 0; bossActive = false; bossWarning = 0; boss = null;
  enemies = []; enemyBullets = []; orbs = []; items = []; hazards = [];
  initTerrain();
  initFog();
  state = 'playing';
}

// ============================================================
// INPUT — NES-STYLE CONTROLS
// ============================================================
window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow input
    if (e.code === 'KeyC') {
      e.preventDefault();
      picking = true;
      if (window.BaselingPlayer && BaselingPlayer.select) {
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      } else { picking = false; }
      return;
    }
    startGame(); return;
  }
  if (state === 'gameOver') { state = 'title'; return; }

  if (state === 'playing') {
    // NES A button = Z / Space / Enter (FIRE)
    if (e.code === 'KeyZ' || e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      fireBullets();
    }
    // NES B button = X / Shift (ACTIVATE POWER)
    if (e.code === 'KeyX' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
      activatePower();
    }
    // NES Select = C / Backspace (CYCLE POWER)
    if (e.code === 'KeyC' || e.code === 'Backspace') {
      e.preventDefault();
      cyclePower();
    }
    // NES Start = A / Escape (AUTO-FIRE TOGGLE)
    if (e.code === 'KeyA' || e.code === 'Escape') {
      autoFire = !autoFire;
    }
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
});

// Touch controls
var touchMove = { active: false, x: 0, y: 0 };
var touchFire = false;
var touchPower = false;

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();

  if (state === 'title') {
    if (picking) return; // overlay open — its own UI handles taps
    var _t0 = e.changedTouches[0];
    var _r0 = canvas.getBoundingClientRect();
    var _gy = (_t0.clientY - _r0.top) / _r0.height * GH;
    if (_gy > GH - 52 && _gy < GH - 30) { // tap on the [C] SELECT BASELING line
      picking = true;
      if (window.BaselingPlayer && BaselingPlayer.select) {
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      } else { picking = false; }
      return;
    }
    startGame(); return;
  }
  if (state === 'gameOver') { state = 'title'; return; }

  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    var rect = canvas.getBoundingClientRect();
    var tx = (t.clientX - rect.left) / SCALE;
    var ty = (t.clientY - rect.top) / SCALE;

    if (tx > GW * 0.65) {
      if (ty > GH * 0.7) {
        activatePower();
        touchPower = true;
      } else {
        touchFire = true;
      }
    } else {
      touchMove.active = true;
      touchMove.x = tx;
      touchMove.y = ty;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var t = e.changedTouches[ti];
    var rect = canvas.getBoundingClientRect();
    var tx = (t.clientX - rect.left) / SCALE;
    var ty = (t.clientY - rect.top) / SCALE;
    if (tx < GW * 0.65) {
      touchMove.x = tx;
      touchMove.y = ty;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    touchMove.active = false;
    touchFire = false;
    touchPower = false;
  }
}, { passive: false });

// ============================================================
// UPDATE
// ============================================================
function update() {
  if (state !== 'playing') return;

  frameCount++;
  stageTimer++;
  updateShake();

  // Combo timer decay
  if (player.comboTimer > 0) {
    player.comboTimer--;
    if (player.comboTimer <= 0) player.combo = 0;
  }

  // Damage boost timer
  if (player.dmgBoost && player.dmgBoost > 0) player.dmgBoost--;

  // Slow timer
  if (player.slowed && player.slowed > 0) player.slowed--;

  // Tutorial timer
  if (tutorialTimer > 0) tutorialTimer--;

  // Player movement
  if (!player.dead) {
    // DEX: base speed already in PLAYER_SPEED_BASE // stat ref already counted
    var spd = PLAYER_SPEED_BASE + speedLevel * PLAYER_SPEED_INC;
    if (player.slowed && player.slowed > 0) spd *= 0.5;

    if (touchMove.active) {
      var dx = touchMove.x - player.x;
      var dy = touchMove.y - player.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        player.x += (dx/dist) * spd;
        player.y += (dy/dist) * spd;
      }
    } else {
      // NES D-pad: Arrow keys + WASD
      if (keys['ArrowUp'] || keys['KeyW']) player.y -= spd;
      if (keys['ArrowDown'] || keys['KeyS']) player.y += spd;
      if (keys['ArrowLeft']) player.x -= spd;
      if (keys['ArrowRight'] || keys['KeyD']) player.x += spd;
    }

    // Bounds
    if (player.x < 10) player.x = 10;
    if (player.x > GW - 10) player.x = GW - 10;
    if (player.y < 12) player.y = 12;
    if (player.y > GH - 12) player.y = GH - 12;

    // Trail for options
    player.trail.unshift({ x: player.x, y: player.y });
    if (player.trail.length > 60) player.trail.length = 60;

    // Update option positions
    for (var i = 0; i < options.length; i++) {
      var trailIdx = (i + 1) * 12;
      if (player.trail[trailIdx]) {
        options[i].x += (player.trail[trailIdx].x - options[i].x) * 0.3;
        options[i].y += (player.trail[trailIdx].y - options[i].y) * 0.3;
      }
    }

    // Fire
    if (player.fireTimer > 0) player.fireTimer--;
    if (autoFire || touchFire || keys['KeyZ'] || keys['Space'] || keys['Enter']) {
      fireBullets();
    }

    if (player.invincible > 0) player.invincible--;
  }

  // Wave spawning
  if (!bossActive) {
    var spawnRate = Math.max(40, 90 - stage * 10);
    if (stageTimer % spawnRate === 0 && stageTimer < getBossTime()) {
      spawnWave();
    }

    // Hazard spawning (every ~200 frames)
    if (stageTimer > 100 && stageTimer % 200 === 0 && stage >= 2) {
      spawnHazard();
    }

    // Boss warning
    if (stageTimer >= getBossTime() - BOSS_WARNING_TIME && stageTimer < getBossTime()) {
      bossWarning = getBossTime() - stageTimer;
    }

    if (stageTimer >= getBossTime() && !bossActive) {
      spawnBoss();
    }
  }

  updateBullets();
  updateEnemies();
  updateEnemyBullets();
  updateBoss();
  updateOrbs();
  updateItems();
  updateHazards();
  updateParticles();
  updateScorePopups();
  updateStars();
  updateTerrain();
  updateFog();
  checkCollisions();
}

function getBossTime() {
  return 600 + stage * 100;
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  var zone = getZone();
  ctx.fillStyle = zone ? zone.bg : '#000810';
  ctx.fillRect(0, 0, GW, GH);

  // Apply screen shake
  if (shakeDur > 0) {
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  if (state === 'title') {
    drawTitleScreen();
    if (shakeDur > 0) ctx.restore();
    return;
  }

  drawStars();
  drawTerrain();
  drawFog();

  if (state === 'playing' || state === 'dying') {
    drawHazards();
    drawItems();
    drawOrbs();
    drawBullets();
    drawEnemyBullets();
    drawEnemies();
    drawBoss();
    drawOptions();
    drawPlayer();
    drawParticles();
    drawScorePopups();
    drawHUD();
    drawTouchHints();
    drawTutorial();

    // Boss warning
    if (bossWarning > 0 && !bossActive) {
      var flash = Math.floor(frameCount / 8) % 2;
      if (flash) {
        ctx.fillStyle = '#e6482e';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPORE ALERT', GW/2, GH/2 - 10);
        ctx.font = '10px monospace';
        var bossIdx = stage;
        if (bossIdx < 1) bossIdx = 1;
        if (bossIdx > BOSS_NAMES.length - 1) bossIdx = ((bossIdx - 1) % (BOSS_NAMES.length - 1)) + 1;
        ctx.fillText((BOSS_NAMES[bossIdx] || 'BOSS') + ' APPROACHES', GW/2, GH/2 + 5);
      }
    }

    // Zone name on stage start
    if (stageTimer < 120 && zone) {
      var alpha = stageTimer < 60 ? stageTimer / 60 : (120 - stageTimer) / 60;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('-- ' + zone.name.toUpperCase() + ' --', GW/2, GH/2 - 40);
      ctx.font = '8px monospace';
      ctx.fillText('GARDEN ' + stage, GW/2, GH/2 - 25);
      ctx.globalAlpha = 1;
    }

    // Combo display
    if (player.combo > 1 && player.comboTimer > 0) {
      ctx.fillStyle = player.combo > 5 ? '#ff4444' : '#ffaa00';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'right';
      ctx.globalAlpha = Math.min(1, player.comboTimer / 30);
      ctx.fillText(player.combo + 'x COMBO', GW - 6, 24);
      ctx.globalAlpha = 1;
    }
  }

  if (state === 'dying') {
    stateTimer--;
    if (stateTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('reactorforce_hi', String(highScore)); } catch(e) { /* full */ }
        }
        SFX.gameOver();
      } else {
        respawn();
        state = 'playing';
      }
    }
  }

  if (state === 'stageClear') {
    drawStars();
    drawTerrain();
    drawFog();
    drawPlayer();
    drawOptions();
    drawParticles();
    drawScorePopups();
    drawHUD();
    drawStageClear();
    stateTimer--;
    if (stateTimer <= 0) nextStage();
  }

  if (state === 'gameOver') {
    drawStars();
    drawTerrain();
    drawFog();
    drawHUD();
    drawGameOver();
  }

  if (shakeDur > 0) ctx.restore();
}

// ============================================================
// TUTORIAL OVERLAY
// ============================================================
function drawTutorial() {
  if (tutorialTimer <= 0) return;

  var alpha = tutorialTimer > 240 ? (300 - tutorialTimer) / 60 : (tutorialTimer < 60 ? tutorialTimer / 60 : 1);
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = '#000000';
  ctx.fillRect(GW/2 - 110, 30, 220, 120);
  ctx.strokeStyle = statB.color || '#44dd88';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW/2 - 110, 30, 220, 120);
  ctx.lineWidth = 1;

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('-- CONTROLS --', GW/2, 48);

  ctx.fillStyle = '#cccccc';
  ctx.font = '7px monospace';
  var ty = 62;
  ctx.fillText('D-PAD / WASD .... Move', GW/2, ty); ty += 12;
  ctx.fillText('A (Z/SPACE) ..... Fire', GW/2, ty); ty += 12;
  ctx.fillText('B (X/SHIFT) ..... Use Power', GW/2, ty); ty += 12;
  ctx.fillText('SELECT (C) ...... Cycle Power', GW/2, ty); ty += 12;

}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // Score
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 4, 10);

  // Hi score
  ctx.fillStyle = '#888888';
  ctx.textAlign = 'center';
  ctx.fillText('HI ' + highScore, GW/2, 10);

  // Stage + zone
  var zone = getZone();
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'right';
  ctx.fillText('GARDEN ' + stage, GW - 4, 10);

  // Baseling name + level
  if (statB.level > 0 || statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(statB.name + (statB.level > 0 ? ' Lv' + statB.level : ''), 4, 20);
  }

  // Lives (pixel ship icons)
  ctx.fillStyle = statB.color || '#00ff88';
  for (var i = 0; i < lives; i++) {
    var lx = 6 + i * 12;
    // Tiny ship icon
    ctx.fillRect(lx, GH - 26, 6, 3);
    ctx.fillRect(lx + 4, GH - 27, 3, 5);
    ctx.fillRect(lx - 1, GH - 25, 2, 1);
  }

  // Power bar (Gradius style)
  var barY = GH - 14;
  var barStartX = 4;
  var cellW = 50;
  var cellH = 10;

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barStartX - 2, barY - 2, cellW * 6 + 8, cellH + 4);

  for (var i = 0; i < 6; i++) {
    var x = barStartX + i * cellW;
    var selected = i === powerBar && powerOrbs > 0;

    ctx.fillStyle = selected ? '#ff8800' : '#222233';
    ctx.fillRect(x, barY, cellW - 2, cellH);
    ctx.strokeStyle = selected ? '#ffcc00' : '#444466';
    ctx.strokeRect(x, barY, cellW - 2, cellH);

    ctx.fillStyle = selected ? '#000000' : '#667788';
    ctx.font = selected ? 'bold 7px monospace' : '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(POWER_NAMES[i], x + cellW/2 - 1, barY + 8);
  }

  // Orb count
  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SPORE:' + powerOrbs, barStartX + cellW * 6 + 6, barY + 8);

  // Auto-fire indicator
  if (autoFire) {
    ctx.fillStyle = '#66ff66';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('AUTO', GW - 4, GH - 20);
  }

  // Damage boost indicator
  if (player.dmgBoost && player.dmgBoost > 0) {
    ctx.fillStyle = '#ff8800';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('STR+', GW - 30, GH - 20);
  }

  // Kill count
  if (totalKills > 0) {
    ctx.fillStyle = '#666666';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SPORES:' + totalKills, GW - 4, 20);
  }
}

function drawTouchHints() {
  if (!isMobile) return;
  ctx.globalAlpha = 0.15;

  ctx.fillStyle = statB.color || '#00ff88';
  ctx.strokeStyle = statB.color || '#00ff88';
  ctx.setLineDash([4, 4]);
  ctx.strokeRect(4, 20, GW*0.6, GH - 50);
  ctx.setLineDash([]);

  ctx.fillStyle = '#ff8844';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('A: FIRE', GW*0.82, GH*0.4);
  ctx.fillText('B: POWER', GW*0.82, GH*0.82);

  ctx.globalAlpha = 1;
}

// ============================================================
// TITLE SCREEN (Baseling themed)
// ============================================================
function drawTitleScreen() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); }
  }
  drawStars();

  // Title background effects — spore energy glow
  for (var i = 0; i < 3; i++) {
    var rx = GW/2 + Math.sin(frameCount*0.01 + i*2) * 80;
    var ry = GH*0.35 + Math.cos(frameCount*0.015 + i) * 20;
    ctx.fillStyle = 'rgba(168, 85, 247, ' + (0.03 + Math.sin(frameCount*0.02+i)*0.02) + ')';
    ctx.beginPath();
    ctx.arc(rx, ry, 40 + i*15, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.textAlign = 'center';

  // NES pixel title shadow
  ctx.fillStyle = '#2a0a3a';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('REACTOR', GW/2 + 2, 62);
  ctx.fillText('FORCE', GW/2 + 2, 92);

  // NES pixel title
  ctx.fillStyle = '#a855f7';
  ctx.fillText('REACTOR', GW/2, 60);
  ctx.fillStyle = '#38d973';
  ctx.fillText('FORCE', GW/2, 90);

  // Subtitle with Baseling flavor
  ctx.fillStyle = '#7a444a';
  ctx.font = '9px monospace';
  ctx.fillText('Defend the Spore Reactor Gardens', GW/2, 108);
  ctx.fillStyle = '#3cacd7';
  ctx.font = '7px monospace';
  ctx.fillText('A Baseling Adventure in Tasern', GW/2, 120);

  // NES control layout
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '8px monospace';
  var instY = 136;
  ctx.fillText('D-PAD / ARROWS / WASD ..... Move', GW/2, instY);
  ctx.fillText('A BUTTON (Z / SPACE) ...... Fire', GW/2, instY + 13);
  ctx.fillText('B BUTTON (X / SHIFT) ...... Use Power', GW/2, instY + 26);
  ctx.fillText('SELECT   (C / BACKSPACE) .. Cycle Power', GW/2, instY + 39);
  ctx.fillText('START    (A / ESC) ........ Auto-Fire', GW/2, instY + 52);

  // Power bar preview
  ctx.fillStyle = '#555555';
  ctx.font = '7px monospace';
  ctx.fillText('SPEED > MISSILE > DOUBLE > LASER > OPTION > SHIELD', GW/2, instY + 70);
  ctx.fillStyle = '#7a444a';
  ctx.font = '6px monospace';
  ctx.fillText('Collect spore gems to power your baseling ship!', GW/2, instY + 80);

  // Selected baseling name + 5 arcade stat bars (Base-blue accents)
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 8px monospace';
  ctx.fillText((sel ? sel.charName : (statB.name || 'WIMMPLE')) + (sel && sel.tokenId != null ? ' #' + sel.tokenId : ''), GW/2, instY + 96);
  if (sel && sel.stats && window.BaselingPlayer && BaselingPlayer.STAT_META) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 110;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = sel.stats[_keys[_i]] || 0, _bx = _x0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, instY + 106);
      ctx.fillStyle = '#222222'; ctx.fillRect(_bx, instY + 109, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, instY + 109, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, instY + 124);
  }

  // NFT character
  if (window.NftLoader && window.NftLoader.selectedCharacter) {
    ctx.fillStyle = window.NftLoader.selectedCharacter.color;
    ctx.font = '8px monospace';
    ctx.fillText('Your Baseling: ' + window.NftLoader.selectedCharacter.name, GW/2, instY + 138);
  }

  // Character-select prompt (Base blue) — title-only; in-game C still cycles power
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';

  // Start prompt (NES blink)
  var blink = Math.floor(frameCount / 30) % 2;
  if (blink) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('PRESS START', GW/2, GH - 24);
  }

  // Decorative baseling ship — selected baseling rides it
  var shipX = GW/2 + Math.sin(frameCount*0.02) * 30;
  var shipY = GH*0.28 + Math.cos(frameCount*0.015) * 10;
  var palette = getShipPalette();
  drawPixelSprite(shipX - 8, shipY - 6, SHIP_PIXELS, palette, 1);
  drawSelectedBaseling(ctx, shipX, shipY - 12, 16, { anim: 'idle', frame: frameCount });

  // Engine trail on title ship
  if (frameCount % 3 === 0) {
    spawnTrailParticle(shipX - 10, shipY, statB.color || '#44dd88');

  drawParticles();
  updateParticles();

  frameCount++;
  updateStars();
}

// ============================================================
// GAME OVER
// ============================================================
function drawGameOver() {
  // Art background
  var _goArt = false;
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); _goArt = true; }
  }
  if (!_goArt) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, GW, GH); }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN LOST', GW/2, GH/2 - 40);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('SCORE: ' + score, GW/2, GH/2 - 10);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frameCount*0.08)*0.3+0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffcc00';
    ctx.font = '10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, GH/2 + 10);

  } else {
    ctx.fillStyle = '#888888';
    ctx.font = '9px monospace';
    ctx.fillText('BEST: ' + highScore, GW/2, GH/2 + 10);
  }

  ctx.fillStyle = '#ffffff';
  ctx.font = '9px monospace';
  ctx.fillText('GARDEN REACHED: ' + stage, GW/2, GH/2 + 30);
  ctx.fillText('SPORES CLEARED: ' + totalKills, GW/2, GH/2 + 44);

  // Stat summary
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = '7px monospace';
  ctx.fillText(statB.name + ' | STR ' + statB.str + ' DEX ' + statB.dex + ' CON ' + statB.con + ' INT ' + statB.int + ' WIS ' + statB.wis + ' CHA ' + statB.cha, GW/2, GH/2 + 60);

  // NES blink restart
  var blink = Math.floor(frameCount / 30) % 2;
  if (blink) {
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('PRESS START', GW/2, GH - 24);
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function gameLoop() {
  update();
  draw();
  if (state === 'playing' || state === 'dying' || state === 'stageClear' || state === 'gameOver') {
    frameCount++;
    updateStars();
    updateShake();
  }
  requestAnimationFrame(gameLoop);
}

initTerrain();
initFog();
requestAnimationFrame(gameLoop);

})();
