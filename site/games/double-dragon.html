<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Double Dragon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }

</style>

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// CONSTANTS
// ============================================================
const GW = 480, GH = 270;
const ctx = TAS.ctx;
const FLOOR_TOP = 155, FLOOR_BOT = 245;
const GRAVITY = 900;
const SCROLL_MARGIN = 200;
const PLAYER_SPEED = 90;
const JUMP_FORCE = -320;
const COMBO_WINDOW = 400;
const HITSTUN = 300;
const KNOCKBACK_SPD = 180;
const GRAB_RANGE = 22;
const WEAPON_DURABILITY = { bat: 8, knife: 12, chain: 10, barrel: 1 };
const XP_LEVELS = [0, 80, 200, 400, 700, 1100, 1600];
const MOVE_NAMES = ['Punch Combo','Kick','Jump Kick','Grab & Throw','Spin Kick','Uppercut','Flying Knee'];

// ============================================================
// INIT
// ============================================================
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b','c'], labels: { a: 'PUNCH', b: 'KICK', c: 'JUMP' } });

let state = 'title';
let score = 0;
let highScore = TAS.score.load('doubledragon_hi');
let frame = 0;
let stageNum = 0;
let player = null;
let enemies = [];
let weapons = [];
let projectiles = [];
let scrollX = 0;
let stageWidth = 0;
let scrollLock = false;
let scrollTarget = 0;
let waveIndex = 0;
let waveEnemiesAlive = 0;
let stageComplete = false;
let stageCompleteTimer = 0;
let comboCount = 0;
let comboTimer = 0;
let xp = 0;
let playerLevel = 1;
let deathTimer = 0;
let goArrowTimer = 0;
let bossDefeated = false;

// Input buffering
const justPressed = {};
const prevKeys = {};

// ============================================================
// STAGES
// ============================================================
const STAGES = [
  { name: 'City Streets', width: 1400, bg: '#1a1a2e', floor: '#2a2a3a', buildings: '#222244',
    waves: [
      { x: 400, enemies: [{t:'thug'},{t:'thug'}] },

      { x: 1000, enemies: [{t:'thug'},{t:'heavy'}] },

    ]},

    waves: [
      { x: 350, enemies: [{t:'thug'},{t:'heavy'}] },

      { x: 1050, enemies: [{t:'heavy'},{t:'heavy'}] },

    ]},
  { name: 'Bridge', width: 1300, bg: '#0a0a2e', floor: '#3a3a2a', buildings: '#1a1a3a',
    waves: [
      { x: 350, enemies: [{t:'thug'},{t:'whip_guy'}] },

    ]},
  { name: 'Cave', width: 1500, bg: '#0a0808', floor: '#2a2018', buildings: '#1a1008',
    waves: [
      { x: 400, enemies: [{t:'heavy'},{t:'thug'},{t:'thug'}] },
      { x: 750, enemies: [{t:'ninja'},{t:'heavy'},{t:'knife_girl'}] },
      { x: 1050, enemies: [{t:'heavy'},{t:'heavy'},{t:'whip_guy'}] },
      { x: 1400, enemies: [{t:'heavy',boss:true},{t:'heavy'}], boss: true }
    ]},
  { name: 'Mansion', width: 1600, bg: '#1a0a1a', floor: '#3a2a2a', buildings: '#2a1a2a',
    waves: [
      { x: 400, enemies: [{t:'knife_girl'},{t:'knife_girl'},{t:'thug'}] },

      { x: 1150, enemies: [{t:'heavy'},{t:'ninja'},{t:'knife_girl'}] },
      { x: 1500, enemies: [{t:'knife_girl',boss:true},{t:'ninja'},{t:'knife_girl'}], boss: true }
    ]},
  { name: 'Tower', width: 1400, bg: '#0a0a1a', floor: '#2a2a3a', buildings: '#1a1a2a',
    waves: [
      { x: 350, enemies: [{t:'ninja'},{t:'ninja'},{t:'ninja'}] },
      { x: 700, enemies: [{t:'whip_guy'},{t:'heavy'},{t:'ninja'}] },
      { x: 1000, enemies: [{t:'knife_girl'},{t:'knife_girl'},{t:'heavy'},{t:'ninja'}] },
      { x: 1300, enemies: [{t:'ninja',boss:true},{t:'whip_guy'},{t:'ninja'}], boss: true }
    ]},
  { name: 'Final Hideout', width: 1800, bg: '#1a0000', floor: '#2a1a1a', buildings: '#2a0a0a',
    waves: [
      { x: 400, enemies: [{t:'heavy'},{t:'ninja'},{t:'whip_guy'}] },
      { x: 800, enemies: [{t:'knife_girl'},{t:'heavy'},{t:'ninja'},{t:'thug'}] },
      { x: 1200, enemies: [{t:'whip_guy'},{t:'whip_guy'},{t:'heavy'}] },
      { x: 1600, enemies: [{t:'heavy',boss:true},{t:'ninja'},{t:'knife_girl'},{t:'whip_guy'}], boss: true }
    ]}
];

// ============================================================
// ENEMY TEMPLATES
// ============================================================
const ENEMY_DEFS = {
  thug: { hp: 30, speed: 45, color: '#cc6644', w: 14, h: 36, damage: 8, xp: 10, atkRange: 20, atkCd: 1200 },
  heavy: { hp: 70, speed: 30, color: '#886644', w: 18, h: 38, damage: 15, xp: 20, atkRange: 24, atkCd: 1800 },
  ninja: { hp: 25, speed: 70, color: '#4444aa', w: 12, h: 34, damage: 12, xp: 15, atkRange: 22, atkCd: 900 },
  knife_girl: { hp: 22, speed: 60, color: '#cc44aa', w: 12, h: 32, damage: 10, xp: 15, atkRange: 18, atkCd: 700 },
  whip_guy: { hp: 35, speed: 40, color: '#44aa44', w: 14, h: 36, damage: 12, xp: 18, atkRange: 50, atkCd: 1500 }
};

// ============================================================
// SOUND EFFECTS
// ============================================================
const SFX = {
  punch1() { TAS.audio.playNoise(0.04, 0.08, 700); TAS.audio.playTone(200, 0.04, 'square', 0.05, 100); },
  punch2() { TAS.audio.playNoise(0.05, 0.1, 800); TAS.audio.playTone(250, 0.05, 'square', 0.06, 120); },
  punch3() { TAS.audio.playNoise(0.07, 0.13, 1000); TAS.audio.playTone(320, 0.06, 'square', 0.08, 160); },
  kick() { TAS.audio.playNoise(0.07, 0.12, 500); TAS.audio.playTone(160, 0.07, 'triangle', 0.07, 70); },
  jumpKick() { TAS.audio.playNoise(0.06, 0.1, 900); TAS.audio.playTone(280, 0.06, 'sawtooth', 0.07, 140); },
  grab() { TAS.audio.playTone(120, 0.08, 'triangle', 0.05); TAS.audio.playNoise(0.03, 0.04, 300); },
  throw_() { TAS.audio.playTone(300, 0.1, 'sine', 0.05, 600); },
  slam() { TAS.audio.playTone(80, 0.15, 'triangle', 0.1, 30); TAS.audio.playNoise(0.1, 0.12, 400); },
  weaponHit() { TAS.audio.playTone(400, 0.06, 'square', 0.1, 150); TAS.audio.playNoise(0.06, 0.1, 2000); },
  spin() { TAS.audio.playTone(500, 0.15, 'sawtooth', 0.06, 200); TAS.audio.playNoise(0.1, 0.06, 800); },
  uppercut() { TAS.audio.playTone(200, 0.12, 'square', 0.08, 600); TAS.audio.playNoise(0.06, 0.08, 1000); },
  flyingKnee() { TAS.audio.playTone(350, 0.1, 'sawtooth', 0.07, 150); TAS.audio.playNoise(0.08, 0.1, 700); },
  enemyDie() { TAS.audio.playTone(300, 0.15, 'sawtooth', 0.06, 60); TAS.audio.playNoise(0.1, 0.06, 500); },
  playerHurt() { TAS.audio.playTone(250, 0.1, 'sawtooth', 0.07, 80); },
  pickup() { TAS.audio.playTone(440, 0.06, 'square', 0.06); setTimeout(function(){ TAS.audio.playTone(660, 0.08, 'square', 0.06); }, 60); },
  levelUp() { TAS.audio.playTone(523, 0.1, 'square', 0.07); setTimeout(function(){ TAS.audio.playTone(659, 0.1, 'square', 0.07); }, 100); setTimeout(function(){ TAS.audio.playTone(784, 0.15, 'square', 0.08); }, 200); },
  stageComplete() { [523,659,784,1047].forEach(function(n,i){ setTimeout(function(){ TAS.audio.playTone(n, 0.12, 'square', 0.07); }, i*100); }); },
  gameOver() { [440,349,293,220].forEach(function(n,i){ setTimeout(function(){ TAS.audio.playTone(n, 0.2, 'sawtooth', 0.07); }, i*160); }); }
};

// ============================================================
// PLAYER
// ============================================================
function createPlayer() {
  return {
    x: 60, y: 200, vx: 0, vy: 0, w: 14, h: 38,
    hp: 100, maxHp: 100,
    facing: 1,
    grounded: true,
    jumping: false,
    attacking: false,
    atkType: '',
    atkFrame: 0,
    atkDuration: 0,
    comboStep: 0,
    comboTimer: 0,
    stunned: false,
    stunTimer: 0,
    invincible: false,
    invTimer: 0,
    grabbing: null,
    grabTimer: 0,
    weapon: null,
    weaponUses: 0,
    running: false,
    runTimer: 0,
    lastDir: 0,
    lastDirTime: 0,
    hitThisAtk: false,
    spinAngle: 0
  };
}

// ============================================================
// ENEMY FACTORY
// ============================================================
function createEnemy(type, x, y, isBoss) {
  var def = ENEMY_DEFS[type];
  var bossScale = isBoss ? 2.2 : 1;
  return {
    type: type,
    x: x, y: y, vx: 0, vy: 0,
    w: def.w * (isBoss ? 1.4 : 1), h: def.h * (isBoss ? 1.3 : 1),
    hp: Math.floor(def.hp * bossScale),
    maxHp: Math.floor(def.hp * bossScale),
    speed: def.speed * (isBoss ? 0.85 : 1),
    color: def.color,
    damage: Math.floor(def.damage * (isBoss ? 1.5 : 1)),
    xpValue: Math.floor(def.xp * (isBoss ? 3 : 1)),
    atkRange: def.atkRange * (isBoss ? 1.3 : 1),
    atkCd: def.atkCd * (isBoss ? 0.8 : 1),
    facing: -1,
    grounded: true,
    attacking: false,
    atkFrame: 0,
    atkDuration: 0,
    stunned: false,
    stunTimer: 0,
    knockback: false,
    kbVx: 0, kbVy: 0,
    dead: false,
    deathTimer: 0,
    atkCooldown: Math.random() * 500 + 300,
    isBoss: !!isBoss,
    aiState: 'approach',
    aiTimer: 0,
    flashTimer: 0
  };
}

// ============================================================
// GAME START / STAGE INIT
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  xp = 0;
  playerLevel = 1;
  stageNum = 0;
  comboCount = 0;
  comboTimer = 0;
  player = createPlayer();
  initStage();
}

function initStage() {
  var stage = STAGES[stageNum];
  stageWidth = stage.width;
  scrollX = 0;
  waveIndex = 0;
  waveEnemiesAlive = 0;
  enemies = [];
  weapons = [];
  projectiles = [];
  scrollLock = false;
  stageComplete = false;
  stageCompleteTimer = 0;
  bossDefeated = false;
  goArrowTimer = 0;
  player.x = 60;
  player.y = 200;
  player.vx = 0;
  player.vy = 0;
  player.grounded = true;
  player.attacking = false;
  player.grabbing = null;
  player.stunned = false;
  player.invincible = false;
  TAS.particles.clear();
  // Spawn initial weapon pickup
  if (stageNum > 0) {
    var wTypes = ['bat','knife','chain'];
    weapons.push({ type: wTypes[stageNum % 3], x: 150 + Math.random()*100, y: FLOOR_TOP + Math.random()*(FLOOR_BOT-FLOOR_TOP) });
  }
}

// ============================================================
// INPUT HANDLING
// ============================================================
function updateInput() {
  var inp = TAS.input;
  var dx = 0, dy = 0, punch = false, kick = false, jump = false;

  if (inp.keys['ArrowLeft'] || inp.keys['KeyA'] || inp.touch.left) dx = -1;
  if (inp.keys['ArrowRight'] || inp.keys['KeyD'] || inp.touch.right) dx = 1;
  if (inp.keys['ArrowUp'] || inp.keys['KeyW'] || inp.touch.up) dy = -1;
  if (inp.keys['ArrowDown'] || inp.keys['KeyS'] || inp.touch.down) dy = 1;

  // Just-pressed detection
  var punchKeys = ['KeyZ','KeyJ'];
  var kickKeys = ['KeyX','KeyK'];
  var jumpKeys = ['Space','KeyC','KeyL'];

  for (var i = 0; i < punchKeys.length; i++) {
    if (inp.keys[punchKeys[i]] && !prevKeys[punchKeys[i]]) punch = true;
  }
  for (var i = 0; i < kickKeys.length; i++) {
    if (inp.keys[kickKeys[i]] && !prevKeys[kickKeys[i]]) kick = true;
  }
  for (var i = 0; i < jumpKeys.length; i++) {
    if (inp.keys[jumpKeys[i]] && !prevKeys[jumpKeys[i]]) jump = true;
  }

  // Touch buttons
  if (inp.touch.a && !prevKeys._ta) punch = true;
  if (inp.touch.b && !prevKeys._tb) kick = true;
  if (inp.touch.c && !prevKeys._tc) jump = true;

  // Store prev
  for (var k in inp.keys) prevKeys[k] = inp.keys[k];
  prevKeys._ta = inp.touch.a;
  prevKeys._tb = inp.touch.b;
  prevKeys._tc = inp.touch.c;

  return { dx: dx, dy: dy, punch: punch, kick: kick, jump: jump };
}

function anyInput() {
  var inp = TAS.input;
  if (Object.values(inp.keys).some(Boolean)) return true;
  if (inp.touch.a || inp.touch.b || inp.touch.c || inp.touch.left || inp.touch.right) return true;
  return false;
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt, input) {
  var p = player;

  // Invincibility timer
  if (p.invincible) {
    p.invTimer -= dt * 1000;
    if (p.invTimer <= 0) { p.invincible = false; p.invTimer = 0; }
  }

  // Stun recovery
  if (p.stunned) {
    p.stunTimer -= dt * 1000;
    if (p.stunTimer <= 0) { p.stunned = false; }
    p.vx *= 0.9;
    p.x += p.vx * dt;
    applyGravity(p, dt);
    clampPlayer();
    return;
  }

  // Grab update
  if (p.grabbing) {
    p.grabTimer -= dt * 1000;
    var ge = p.grabbing;
    ge.x = p.x + p.facing * 20;
    ge.y = p.y;
    if (p.grabTimer <= 0) {
      // Release
      p.grabbing = null;
    }
    // Grab attacks: punch = knee, left/right = throw
    if (input.punch) {
      // Knee strike
      ge.hp -= 15;
      ge.flashTimer = 100;
      SFX.punch2();
      TAS.particles.spawn(ge.x, ge.y - ge.h/2, '#ffff00', 4, 2);
      score += 50;
      comboHit();
      if (ge.hp <= 0) { killEnemy(ge); p.grabbing = null; }
    }
    if (input.dx !== 0) {
      // Throw
      var throwDir = input.dx;
      ge.knockback = true;
      ge.kbVx = throwDir * 250;
      ge.kbVy = -100;
      ge.stunned = true;
      ge.stunTimer = 800;
      ge.hp -= 20;
      SFX.throw_();
      score += 80;
      comboHit();
      p.grabbing = null;
      if (ge.hp <= 0) killEnemy(ge);
    }
    return;
  }

  // Attack state
  if (p.attacking) {
    p.atkFrame += dt * 1000;
    if (p.atkFrame >= p.atkDuration) {
      p.attacking = false;
      p.hitThisAtk = false;
    }
    applyGravity(p, dt);
    // Slide during attack
    p.x += p.vx * dt;
    clampPlayer();
    return;
  }

  // Double-tap run detection
  if (input.dx !== 0 && input.dx === p.lastDir && (Date.now() - p.lastDirTime) < 250 && !p.running) {
    p.running = true;
    p.runTimer = 0;
  }
  if (input.dx !== 0) {
    if (input.dx !== p.lastDir) { p.lastDirTime = Date.now(); }
    p.lastDir = input.dx;
  } else {
    p.running = false;
  }

  // Movement
  var speed = p.running ? PLAYER_SPEED * 1.6 : PLAYER_SPEED;
  if (input.dx !== 0) {
    p.facing = input.dx;
    p.x += input.dx * speed * dt;
  }
  if (input.dy !== 0 && p.grounded) {
    p.y += input.dy * speed * 0.6 * dt;
  }

  // Clamp Y to floor plane
  p.y = TAS.math.clamp(p.y, FLOOR_TOP, FLOOR_BOT);

  // Jump
  if (input.jump && p.grounded) {
    p.vy = JUMP_FORCE;
    p.grounded = false;
    p.jumping = true;
  }

  // Flying knee (running + punch, level 7)
  if (input.punch && p.running && playerLevel >= 7) {
    startAttack(p, 'flyingKnee', 350);
    p.vx = p.facing * 200;
    SFX.flyingKnee();
    return;
  }

  // Jump kick (level 3)
  if ((input.punch || input.kick) && !p.grounded && playerLevel >= 3) {
    startAttack(p, 'jumpKick', 300);
    p.vx = p.facing * 80;
    SFX.jumpKick();
    return;
  }

  // Spinning kick (level 5) - kick while stationary
  if (input.kick && p.grounded && input.dx === 0 && playerLevel >= 5 && comboCount >= 3) {
    startAttack(p, 'spinKick', 400);
    p.spinAngle = 0;
    SFX.spin();
    return;
  }

  // Uppercut (level 6) - down + punch
  if (input.punch && input.dy === -1 && p.grounded && playerLevel >= 6) {
    startAttack(p, 'uppercut', 350);
    p.vx = p.facing * 40;
    SFX.uppercut();
    return;
  }

  // Kick (level 2)
  if (input.kick && p.grounded && playerLevel >= 2) {
    startAttack(p, 'kick', 350);
    p.vx = p.facing * 30;
    SFX.kick();
    return;
  }

  // Punch combo
  if (input.punch && p.grounded) {
    var step = 0;
    if (p.comboTimer > 0 && p.comboStep < 2) {
      step = p.comboStep + 1;
    }
    p.comboStep = step;
    p.comboTimer = COMBO_WINDOW;
    var dur = step === 2 ? 300 : 250;
    startAttack(p, 'punch' + step, dur);
    p.vx = p.facing * (20 + step * 10);
    if (step === 0) SFX.punch1();
    else if (step === 1) SFX.punch2();
    else SFX.punch3();
    return;
  }

  // Combo timer decay
  if (p.comboTimer > 0) {
    p.comboTimer -= dt * 1000;
    if (p.comboTimer <= 0) { p.comboStep = 0; }
  }

  applyGravity(p, dt);
  clampPlayer();

  // Scroll
  var screenX = p.x - scrollX;
  if (screenX > GW - SCROLL_MARGIN && !scrollLock) {
    scrollX = p.x - (GW - SCROLL_MARGIN);
  }
  scrollX = TAS.math.clamp(scrollX, 0, stageWidth - GW);
  p.x = TAS.math.clamp(p.x, scrollX + 20, scrollLock ? scrollX + GW - 20 : stageWidth - 20);
}

function startAttack(p, type, duration) {
  p.attacking = true;
  p.atkType = type;
  p.atkFrame = 0;
  p.atkDuration = duration;
  p.hitThisAtk = false;
}

function applyGravity(entity, dt) {
  if (!entity.grounded) {
    entity.vy += GRAVITY * dt;
    entity.y += entity.vy * dt;
    // Landing (pseudo - Y represents depth when grounded)
    // We use a "ground height" relative to floor position
    if (entity._groundY === undefined) entity._groundY = entity.y;
    if (entity.vy > 0 && entity.y >= entity._groundY) {
      entity.y = entity._groundY;
      entity.vy = 0;
      entity.grounded = true;
      entity.jumping = false;
    }
  } else {
    entity._groundY = entity.y;
  }
}

function clampPlayer() {
  player.x = TAS.math.clamp(player.x, scrollX + 10, Math.min(scrollX + GW - 10, stageWidth - 10));
  player.y = TAS.math.clamp(player.y, FLOOR_TOP, FLOOR_BOT);
}

// ============================================================
// COMBAT - HIT DETECTION
// ============================================================
function checkPlayerAttacks() {
  var p = player;
  if (!p.attacking || p.hitThisAtk) return;

  // Attack hitbox timing (hit on middle frames)
  var progress = p.atkFrame / p.atkDuration;
  if (progress < 0.2 || progress > 0.7) return;

  var atkData = getAttackData(p.atkType);
  var hx = p.x + p.facing * atkData.reach;
  var hy = p.y - p.h / 2;
  var hw = atkData.width;
  var hh = atkData.height;
  var isSpinKick = p.atkType === 'spinKick';

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.dead) continue;

    var inRange = false;
    if (isSpinKick) {
      // 360 spin hits all nearby
      inRange = Math.abs(e.x - p.x) < atkData.reach + e.w && Math.abs(e.y - p.y) < 25;
    } else {
      inRange = TAS.hit.rectOverlap(hx - hw/2, hy - hh/2, hw, hh, e.x - e.w/2, e.y - e.h, e.w, e.h);
    }

    if (inRange && Math.abs(e.y - p.y) < 25) {
      hitEnemy(e, atkData.damage, atkData.knockback, p.facing);
      if (!isSpinKick) p.hitThisAtk = true;

      // Try grab (level 4, stunned enemy, close)
      if (playerLevel >= 4 && e.stunned && !e.dead && Math.abs(e.x - p.x) < GRAB_RANGE && p.grounded) {
        p.grabbing = e;
        p.grabTimer = 3000;
        p.attacking = false;
        SFX.grab();
        return;
      }
    }
  }

  // Weapon attacks
  if (p.weapon) {
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.dead) continue;
      var wReach = p.weapon === 'chain' ? 55 : p.weapon === 'bat' ? 40 : 30;
      if (Math.abs(e.x - (p.x + p.facing * wReach)) < 20 && Math.abs(e.y - p.y) < 25) {
        var wDmg = p.weapon === 'knife' ? 18 : p.weapon === 'bat' ? 22 : p.weapon === 'chain' ? 15 : 35;
        hitEnemy(e, wDmg, 120, p.facing);
        SFX.weaponHit();
        p.weaponUses--;
        if (p.weaponUses <= 0) { p.weapon = null; }
        p.hitThisAtk = true;
        break;
      }
    }
  }
}

function getAttackData(type) {
  switch(type) {
    case 'punch0': return { reach: 18, width: 16, height: 20, damage: 8, knockback: 40 };
    case 'punch1': return { reach: 20, width: 18, height: 20, damage: 10, knockback: 60 };
    case 'punch2': return { reach: 24, width: 20, height: 22, damage: 14, knockback: 100 };
    case 'kick': return { reach: 28, width: 20, height: 24, damage: 16, knockback: 130 };
    case 'jumpKick': return { reach: 22, width: 22, height: 28, damage: 20, knockback: 150 };
    case 'spinKick': return { reach: 35, width: 40, height: 30, damage: 18, knockback: 120 };
    case 'uppercut': return { reach: 16, width: 18, height: 30, damage: 22, knockback: 80 };
    case 'flyingKnee': return { reach: 24, width: 22, height: 26, damage: 25, knockback: 160 };
    default: return { reach: 18, width: 16, height: 20, damage: 8, knockback: 40 };
  }
}

function hitEnemy(e, damage, knockback, dir) {
  e.hp -= damage;
  e.stunned = true;
  e.stunTimer = HITSTUN;
  e.flashTimer = 80;
  e.knockback = true;
  e.kbVx = dir * knockback;
  e.kbVy = 0;
  e.attacking = false;

  TAS.particles.spawn(e.x, e.y - e.h/2, '#ffff00', 5, 3, { size: 1, sizeVar: 2 });
  TAS.fx.shake(2, 0.85);

  comboHit();
  score += 10 * comboCount;

  if (e.hp <= 0) {
    killEnemy(e);
  }
}

function killEnemy(e) {
  e.dead = true;
  e.deathTimer = 600;
  e.kbVx = player.facing * 100;
  e.kbVy = -150;
  e.grounded = false;
  waveEnemiesAlive--;

  var bonus = e.xpValue * (1 + comboCount * 0.1);
  xp += Math.floor(bonus);
  score += e.xpValue * 5;
  checkLevelUp();

  TAS.particles.spawn(e.x, e.y - e.h/2, e.color, 10, 4, { size: 2, sizeVar: 3, gravity: 1 });
  TAS.fx.flash('#fff', 0.15);
  SFX.enemyDie();

  // Random weapon drop
  if (Math.random() < 0.15 && !e.isBoss) {
    var wTypes = ['bat','knife','chain'];
    weapons.push({ type: wTypes[TAS.math.randInt(0,2)], x: e.x, y: e.y });
  }

  if (e.isBoss) {
    bossDefeated = true;
    score += 500;
    TAS.fx.shake(6, 0.8);
  }
}

function comboHit() {
  comboCount++;
  comboTimer = 2000;
}

function checkLevelUp() {
  while (playerLevel < 7 && xp >= XP_LEVELS[playerLevel]) {
    playerLevel++;
    SFX.levelUp();
    TAS.fx.flash('#44ff88', 0.3);
    TAS.particles.spawn(player.x, player.y - player.h, '#44ff88', 15, 4, { size: 2, sizeVar: 3 });
  }
}

// ============================================================
// ENEMY AI
// ============================================================
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];

    if (e.dead) {
      e.deathTimer -= dt * 1000;
      // Fall
      if (!e.grounded) {
        e.vy += GRAVITY * dt;
        e.x += e.kbVx * dt;
        e.y += e.vy * dt;
        if (e.y >= FLOOR_BOT + 20) { e.y = FLOOR_BOT + 20; e.grounded = true; }
      }
      if (e.deathTimer <= 0) {
        enemies.splice(i, 1);
      }
      continue;
    }

    // Flash timer
    if (e.flashTimer > 0) e.flashTimer -= dt * 1000;

    // Knockback
    if (e.knockback) {
      e.x += e.kbVx * dt;
      e.y += e.kbVy * dt;
      e.kbVx *= 0.92;
      if (Math.abs(e.kbVx) < 5) { e.knockback = false; e.kbVx = 0; }
      e.y = TAS.math.clamp(e.y, FLOOR_TOP, FLOOR_BOT);
      e.x = TAS.math.clamp(e.x, scrollX - 20, scrollX + GW + 20);
      continue;
    }

    // Stun
    if (e.stunned) {
      e.stunTimer -= dt * 1000;
      if (e.stunTimer <= 0) { e.stunned = false; }
      continue;
    }

    // Attack animation
    if (e.attacking) {
      e.atkFrame += dt * 1000;
      if (e.atkFrame >= e.atkDuration) {
        e.attacking = false;
      }
      // Hit player at midpoint
      if (e.atkFrame > e.atkDuration * 0.4 && e.atkFrame < e.atkDuration * 0.6) {
        var dist = Math.abs(e.x - player.x);
        var yClose = Math.abs(e.y - player.y) < 20;
        if (dist < e.atkRange + 10 && yClose && !player.invincible && !player.stunned) {
          damagePlayer(e.damage, e.x < player.x ? 1 : -1);
        }
      }
      continue;
    }

    // AI cooldown
    e.atkCooldown -= dt * 1000;

    // AI behavior
    var dx = player.x - e.x;
    var dy = player.y - e.y;
    var distToPlayer = Math.sqrt(dx*dx + dy*dy);

    e.facing = dx > 0 ? 1 : -1;

    // Type-specific behaviors
    if (e.type === 'ninja' && distToPlayer > 100 && Math.random() < 0.005) {
      // Ninja jump approach
      e.vy = -250;
      e.grounded = false;
      e.x += e.facing * 40;
    }

    if (e.type === 'whip_guy' && distToPlayer < e.atkRange && distToPlayer > 30 && e.atkCooldown <= 0) {
      // Whip attack at range
      e.attacking = true;
      e.atkFrame = 0;
      e.atkDuration = 500;
      e.atkCooldown = e.atkCd;
      continue;
    }

    // Approach player
    if (distToPlayer > e.atkRange) {
      var moveX = (dx > 0 ? 1 : -1) * e.speed * dt;
      var moveY = (dy > 0 ? 1 : -1) * e.speed * 0.5 * dt;
      e.x += moveX;
      if (Math.abs(dy) > 8) e.y += moveY;
    } else if (e.atkCooldown <= 0 && Math.abs(dy) < 15) {
      // Attack
      e.attacking = true;
      e.atkFrame = 0;
      e.atkDuration = 400;
      e.atkCooldown = e.atkCd + Math.random() * 300;
    } else {
      // Strafe
      e.aiTimer += dt * 1000;
      if (e.aiTimer > 600) {
        e.aiTimer = 0;
        e.y += (Math.random() > 0.5 ? 1 : -1) * 15;
      }
    }

    // Keep in bounds
    e.y = TAS.math.clamp(e.y, FLOOR_TOP, FLOOR_BOT);
    e.x = TAS.math.clamp(e.x, scrollX - 30, scrollX + GW + 30);

    applyGravity(e, dt);
  }
}

function damagePlayer(dmg, dir) {
  if (player.invincible || player.stunned) return;
  player.hp -= dmg;
  player.stunned = true;
  player.stunTimer = 300;
  player.vx = dir * 80;
  player.invincible = true;
  player.invTimer = 800;
  player.attacking = false;
  player.grabbing = null;
  comboCount = 0;
  comboTimer = 0;

  TAS.fx.shake(4, 0.85);
  TAS.fx.flash('#ff0000', 0.2);
  TAS.particles.spawn(player.x, player.y - player.h/2, '#ff4444', 6, 3);
  SFX.playerHurt();

  if (player.hp <= 0) {
    player.hp = 0;
    state = 'dying';
    deathTimer = 2000;
    SFX.gameOver();
  }
}

// ============================================================
// WAVE SPAWNING
// ============================================================
function updateWaves() {
  var stage = STAGES[stageNum];
  if (waveIndex >= stage.waves.length) {
    // All waves done
    if (enemies.length === 0 && !stageComplete) {
      stageComplete = true;
      stageCompleteTimer = 3000;
      SFX.stageComplete();
      // No-damage bonus
      if (player.hp === player.maxHp) {
        score += 1000;
      }
    }
    return;
  }

  var wave = stage.waves[waveIndex];

  // Trigger wave when player reaches wave X
  if (scrollX + GW * 0.6 >= wave.x && waveEnemiesAlive <= 0) {
    // Spawn this wave
    scrollLock = true;
    scrollTarget = Math.min(wave.x - GW * 0.3, stageWidth - GW);

    for (var i = 0; i < wave.enemies.length; i++) {
      var edef = wave.enemies[i];
      var spawnX = scrollX + GW + 20 + i * 40;
      var spawnY = FLOOR_TOP + Math.random() * (FLOOR_BOT - FLOOR_TOP);
      enemies.push(createEnemy(edef.t, spawnX, spawnY, edef.boss));
      waveEnemiesAlive++;
    }
    waveIndex++;
  }

  // Unlock scroll when wave cleared
  if (scrollLock && waveEnemiesAlive <= 0 && waveIndex <= stage.waves.length) {
    scrollLock = false;
    goArrowTimer = 2000;
  }
}

// ============================================================
// WEAPONS / PICKUPS
// ============================================================
function checkPickups() {
  for (var i = weapons.length - 1; i >= 0; i--) {
    var w = weapons[i];
    if (Math.abs(w.x - player.x) < 18 && Math.abs(w.y - player.y) < 18) {
      if (w.type === 'barrel') {
        // Throw barrel immediately
        launchBarrel(player.facing);
        weapons.splice(i, 1);
      } else {
        player.weapon = w.type;
        player.weaponUses = WEAPON_DURABILITY[w.type];
        weapons.splice(i, 1);
        SFX.pickup();
      }
    }
  }
}

function launchBarrel(dir) {
  projectiles.push({
    x: player.x + dir * 20, y: player.y - 10,
    vx: dir * 250, vy: -50,
    damage: 35, life: 1500, type: 'barrel'
  });
  SFX.throw_();
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.vy += 200 * dt;
    p.y += p.vy * dt;
    p.life -= dt * 1000;

    if (p.life <= 0 || p.y > FLOOR_BOT + 30) {
      projectiles.splice(i, 1);
      continue;
    }

    // Hit enemies
    for (var j = 0; j < enemies.length; j++) {
      var e = enemies[j];
      if (e.dead) continue;
      if (Math.abs(e.x - p.x) < 20 && Math.abs(e.y - p.y) < 25) {
        hitEnemy(e, p.damage, 180, p.vx > 0 ? 1 : -1);
        TAS.fx.shake(4, 0.85);
        SFX.slam();
        projectiles.splice(i, 1);
        break;
      }
    }
  }
}

// ============================================================
// BACK ATTACK
// ============================================================
function checkBackAttack(input) {
  if (!input.punch || player.attacking || !player.grounded) return;
  // Check if enemy is behind player
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (e.dead || e.stunned) continue;
    var behind = (player.facing === 1 && e.x < player.x - 10) || (player.facing === -1 && e.x > player.x + 10);
    if (behind && Math.abs(e.x - player.x) < 30 && Math.abs(e.y - player.y) < 20) {
      // Elbow strike backwards
      startAttack(player, 'punch2', 300);
      player.facing = -player.facing;
      SFX.punch3();
      return true;
    }
  }
  return false;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt * 1000;
    if (comboTimer <= 0) { comboCount = 0; }
  }

  if (state === 'title') {
    if (anyInput()) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (anyInput()) {
      state = 'title';
    }
    return;
  }

  if (state === 'stageIntro') {
    stageCompleteTimer -= dt * 1000;
    if (stageCompleteTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt * 1000;
    if (deathTimer <= 0) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('doubledragon_hi', highScore);
      }
      state = 'gameOver';
    }
    return;
  }

  if (state === 'stageComplete') {
    stageCompleteTimer -= dt * 1000;
    if (stageCompleteTimer <= 0) {
      stageNum++;
      if (stageNum >= STAGES.length) {
        // Game won!
        score += 5000;
        if (score > highScore) { highScore = score; TAS.score.save('doubledragon_hi', highScore); }
        state = 'gameOver';
      } else {
        // Heal partially
        player.hp = Math.min(player.maxHp, player.hp + 30);
        initStage();
        state = 'stageIntro';
        stageCompleteTimer = 2000;
      }
    }
    return;
  }

  if (state === 'playing') {
    var input = updateInput();

    // Back attack check first
    if (!checkBackAttack(input)) {
      updatePlayer(dt, input);
    }

    checkPlayerAttacks();
    updateEnemies(dt);
    updateWaves();
    checkPickups();
    updateProjectiles(dt);

    // Go arrow timer
    if (goArrowTimer > 0) goArrowTimer -= dt * 1000;

    // Stage complete
    if (stageComplete) {
      stageCompleteTimer -= dt * 1000;
      if (stageCompleteTimer <= 0) {
        state = 'stageComplete';
        stageCompleteTimer = 2500;
      }
    }
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawWeapons();
  drawProjectiles();

  // Sort all entities by Y for depth
  var entities = [];
  if (player.hp > 0) entities.push({ type: 'player', y: player.y, obj: player });
  for (var i = 0; i < enemies.length; i++) {
    entities.push({ type: 'enemy', y: enemies[i].y, obj: enemies[i] });
  }
  entities.sort(function(a,b) { return a.y - b.y; });

  for (var i = 0; i < entities.length; i++) {
    if (entities[i].type === 'player') drawPlayer();
    else drawEnemy(entities[i].obj);
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawCombo();

  if (goArrowTimer > 0) drawGoArrow();
  if (state === 'dying') drawDeathOverlay();
  if (stageComplete) drawStageCompleteOverlay();

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// BACKGROUND RENDERING
// ============================================================
function drawBackground() {
  var stage = STAGES[stageNum];
  var ox = -scrollX;

  // Sky
  ctx.fillStyle = stage.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax buildings (back layer)
  ctx.fillStyle = stage.buildings;
  var bOff = ox * 0.3;
  for (var i = 0; i < 20; i++) {
    var bx = i * 120 + bOff;
    if (bx > -120 && bx < GW + 10) {
      var bh = 40 + (i * 37 % 50);
      ctx.fillRect(bx, FLOOR_TOP - bh + 30, 80, bh);
      // Windows
      ctx.fillStyle = '#ffcc33';
      for (var wy = 0; wy < bh - 15; wy += 12) {
        for (var wx = 8; wx < 70; wx += 16) {
          if (Math.random() > 0.3 || (frame + i + wy) % 120 < 60) {
            ctx.fillRect(bx + wx, FLOOR_TOP - bh + 35 + wy, 6, 8);
          }
        }
      }
      ctx.fillStyle = stage.buildings;
    }
  }

  // Mid layer details
  ctx.fillStyle = stage.floor;
  var mOff = ox * 0.6;
  for (var i = 0; i < 15; i++) {
    var mx = i * 150 + mOff;
    if (mx > -60 && mx < GW + 10) {
      ctx.fillRect(mx, FLOOR_TOP - 5, 60, 10);
    }
  }

  // Floor plane
  ctx.fillStyle = stage.floor;
  ctx.fillRect(0, FLOOR_TOP + 5, GW, FLOOR_BOT - FLOOR_TOP + 20);

  // Floor lines for depth
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (var ly = FLOOR_TOP + 15; ly <= FLOOR_BOT; ly += 12) {
    ctx.beginPath();
    ctx.moveTo(0, ly);
    ctx.lineTo(GW, ly);
    ctx.stroke();
  }

  // Stage-specific decoration
  if (stageNum === 3) {
    // Bridge railings
    ctx.fillStyle = '#554433';
    ctx.fillRect(0, FLOOR_TOP - 8, GW, 4);
    ctx.fillRect(0, FLOOR_BOT + 5, GW, 4);
    for (var rx = 0 + (ox % 30); rx < GW; rx += 30) {
      ctx.fillRect(rx, FLOOR_TOP - 20, 3, 16);
      ctx.fillRect(rx, FLOOR_BOT + 5, 3, 12);
    }
  }

  if (stageNum === 4) {
    // Cave stalactites
    ctx.fillStyle = '#3a2a18';
    for (var sx = 0; sx < GW; sx += 45) {
      var sh = 15 + (sx * 7 % 25);
      ctx.beginPath();
      ctx.moveTo(sx + ((ox*0.5) % 45), 0);
      ctx.lineTo(sx + 8 + ((ox*0.5) % 45), sh);
      ctx.lineTo(sx - 8 + ((ox*0.5) % 45), sh);
      ctx.fill();
    }
  }
}

// ============================================================
// ENTITY DRAWING
// ============================================================
function drawPlayer() {
  var p = player;
  var sx = p.x - scrollX;
  var drawY = p.grounded ? p.y : p.y;

  // Invincibility flash
  if (p.invincible && Math.floor(frame / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(sx, drawY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 10, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  var bodyColor = '#44aaff';
  var headColor = '#ffcc88';
  var pantsColor = '#2244aa';

  if (p.stunned) bodyColor = '#aa4444';

  // Jumping offset
  var jumpOff = p.grounded ? 0 : -20 + (p.vy > 0 ? 5 : -5);

  // Spin kick rotation
  if (p.attacking && p.atkType === 'spinKick') {
    p.spinAngle += 0.3;
    ctx.rotate(p.spinAngle);
  }

  // Legs
  ctx.fillStyle = pantsColor;
  if (p.attacking && (p.atkType === 'kick' || p.atkType === 'jumpKick')) {
    // Extended kick leg
    ctx.fillRect(p.facing * 2, -14 + jumpOff, p.facing * 18, 6);
    ctx.fillRect(-4, -8 + jumpOff, 8, 10);
  } else {
    ctx.fillRect(-5, -10 + jumpOff, 5, 12);
    ctx.fillRect(1, -10 + jumpOff, 5, 12);
  }

  // Torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-7, -28 + jumpOff, 14, 18);

  // Arms
  if (p.attacking) {
    var progress = p.atkFrame / p.atkDuration;
    if (p.atkType.startsWith('punch')) {
      // Punch arm extension
      var ext = Math.sin(progress * Math.PI) * 16;
      ctx.fillRect(p.facing > 0 ? 5 : -5 - ext, -26 + jumpOff, ext + 4, 5);
    } else if (p.atkType === 'uppercut') {
      var ext = Math.sin(progress * Math.PI) * 14;
      ctx.fillRect(-2, -28 - ext + jumpOff, 5, ext + 4);
    } else if (p.atkType === 'flyingKnee') {
      ctx.fillRect(-6, -24 + jumpOff, 12, 5);
    }
  } else {
    ctx.fillRect(-9, -26 + jumpOff, 4, 10);
    ctx.fillRect(5, -26 + jumpOff, 4, 10);
  }

  // Head
  ctx.fillStyle = headColor;
  ctx.fillRect(-5, -36 + jumpOff, 10, 10);

  // Headband
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(-6, -34 + jumpOff, 12, 3);

  // Weapon in hand
  if (p.weapon) {
    ctx.fillStyle = p.weapon === 'bat' ? '#aa8844' : p.weapon === 'knife' ? '#cccccc' : '#888888';
    var wLen = p.weapon === 'chain' ? 25 : p.weapon === 'bat' ? 20 : 12;
    ctx.fillRect(p.facing * 8, -30 + jumpOff, p.facing * wLen, 3);
  }

  ctx.restore();

  // Draw grab indicator
  if (p.grabbing && !p.grabbing.dead) {
    ctx.fillStyle = '#ffff44';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GRAB!', sx, drawY - 44);
  }
}

function drawEnemy(e) {
  var sx = e.x - scrollX;
  if (sx < -40 || sx > GW + 40) return;

  ctx.save();
  ctx.translate(sx, e.y);

  var jumpOff = e.grounded ? 0 : Math.min(0, e.vy * 0.02);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 2, e.w * 0.7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Death animation
  if (e.dead) {
    var deathProg = 1 - (e.deathTimer / 600);
    ctx.globalAlpha = Math.max(0, 1 - deathProg);
    jumpOff += deathProg * -30;
  }

  // Flash white when hit
  var col = (e.flashTimer > 0) ? '#ffffff' : e.color;
  var bossScale = e.isBoss ? 1.3 : 1;

  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(-4 * bossScale, -8 + jumpOff, 4 * bossScale, 10 * bossScale);
  ctx.fillRect(1 * bossScale, -8 + jumpOff, 4 * bossScale, 10 * bossScale);

  // Body
  ctx.fillStyle = col;
  ctx.fillRect(-6 * bossScale, -24 * bossScale + jumpOff, 12 * bossScale, 16 * bossScale);

  // Arms
  if (e.attacking) {
    var ap = e.atkFrame / e.atkDuration;
    var ext = Math.sin(ap * Math.PI) * 14 * bossScale;
    ctx.fillRect(e.facing > 0 ? 4*bossScale : -4*bossScale - ext, -22*bossScale + jumpOff, ext + 3, 4 * bossScale);
  } else {
    ctx.fillRect(-8 * bossScale, -22 * bossScale + jumpOff, 3 * bossScale, 8 * bossScale);
    ctx.fillRect(5 * bossScale, -22 * bossScale + jumpOff, 3 * bossScale, 8 * bossScale);
  }

  // Head
  ctx.fillStyle = e.type === 'ninja' ? '#222244' : '#ddaa88';
  ctx.fillRect(-4 * bossScale, -32 * bossScale + jumpOff, 8 * bossScale, 8 * bossScale);

  // Type indicators
  if (e.type === 'ninja') {
    ctx.fillStyle = '#222';
    ctx.fillRect(-5 * bossScale, -30 * bossScale + jumpOff, 10 * bossScale, 3);
  }
  if (e.type === 'knife_girl') {
    ctx.fillStyle = '#ffaacc';
    ctx.fillRect(-5 * bossScale, -34 * bossScale + jumpOff, 10 * bossScale, 3);
  }
  if (e.type === 'whip_guy') {
    ctx.fillStyle = '#888';
    ctx.fillRect(e.facing * 6 * bossScale, -20 * bossScale + jumpOff, e.facing * 20, 2);
  }
  if (e.type === 'heavy') {
    // Bigger shoulders
    ctx.fillStyle = col;
    ctx.fillRect(-8 * bossScale, -24 * bossScale + jumpOff, 16 * bossScale, 6 * bossScale);
  }

  // Boss crown
  if (e.isBoss) {
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(-4, -36 * bossScale + jumpOff, 8, 4);
    ctx.fillRect(-2, -39 * bossScale + jumpOff, 2, 4);
    ctx.fillRect(1, -39 * bossScale + jumpOff, 2, 4);
  }

  // Stunned stars
  if (e.stunned && !e.dead) {
    ctx.fillStyle = '#ffff00';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    var starOff = Math.sin(frame * 0.15) * 3;
    ctx.fillText('*', starOff - 5, -34 * bossScale + jumpOff);
    ctx.fillText('*', starOff + 5, -36 * bossScale + jumpOff);
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Health bar for bosses and damaged enemies
  if ((e.isBoss || e.hp < e.maxHp) && !e.dead) {
    var barW = e.isBoss ? 40 : 24;
    var barH = 3;
    var barX = sx - barW/2;
    var barY = e.y - e.h * (e.isBoss ? 1.5 : 1.2) - 5;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = e.isBoss ? '#ff4444' : '#44ff44';
    ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
  }
}

function drawWeapons() {
  for (var i = 0; i < weapons.length; i++) {
    var w = weapons[i];
    var sx = w.x - scrollX;
    if (sx < -20 || sx > GW + 20) continue;

    var bob = Math.sin(frame * 0.08 + i) * 2;
    ctx.save();
    ctx.translate(sx, w.y + bob);

    ctx.fillStyle = '#888';
    ctx.fillRect(-2, 2, 4, 4); // shadow

    switch(w.type) {
      case 'bat':
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(-10, -3, 20, 4);
        ctx.fillRect(8, -5, 4, 8);
        break;
      case 'knife':
        ctx.fillStyle = '#cccccc';
        ctx.fillRect(-6, -2, 12, 3);
        ctx.fillStyle = '#886633';
        ctx.fillRect(-8, -3, 4, 5);
        break;
      case 'chain':
        ctx.fillStyle = '#999999';
        for (var c = -8; c < 10; c += 4) {
          ctx.fillRect(c, -2, 3, 3);
        }
        break;
      case 'barrel':
        ctx.fillStyle = '#885522';
        ctx.fillRect(-8, -10, 16, 14);
        ctx.fillStyle = '#666';
        ctx.fillRect(-9, -8, 18, 2);
        ctx.fillRect(-9, -2, 18, 2);
        break;
    }

    // Pickup glow
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.2;
    ctx.fillStyle = '#ffff88';
    ctx.beginPath();
    ctx.arc(0, -2, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    var sx = p.x - scrollX;
    ctx.fillStyle = '#885522';
    ctx.fillRect(sx - 8, p.y - 10, 16, 14);
    ctx.fillStyle = '#666';
    ctx.fillRect(sx - 9, p.y - 8, 18, 2);
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 32);

  // Player health
  ctx.fillStyle = '#444';
  ctx.fillRect(6, 4, 100, 10);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(6, 4, 100 * hpPct, 10);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(6, 4, 100, 10);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 8, 12);

  // Player level & XP
  ctx.fillStyle = '#88ccff';
  ctx.fillText('LV' + playerLevel, 6, 26);

  // XP bar
  var xpNext = playerLevel < 7 ? XP_LEVELS[playerLevel] : XP_LEVELS[6];
  var xpPrev = playerLevel > 1 ? XP_LEVELS[playerLevel - 1] : 0;
  var xpPct = playerLevel >= 7 ? 1 : (xp - xpPrev) / (xpNext - xpPrev);
  ctx.fillStyle = '#333';
  ctx.fillRect(32, 19, 50, 6);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(32, 19, 50 * xpPct, 6);

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('SCORE: ' + score, GW/2, 12);

  // Stage
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('Stage ' + (stageNum + 1) + ' - ' + STAGES[stageNum].name, GW/2, 26);

  // High score
  ctx.fillStyle = '#888';
  ctx.textAlign = 'right';
  ctx.font = '8px monospace';
  ctx.fillText('HI: ' + highScore, GW - 6, 12);

  // Weapon indicator
  if (player.weapon) {
    ctx.fillStyle = '#ffcc44';
    ctx.textAlign = 'right';
    ctx.fillText(player.weapon.toUpperCase() + ' x' + player.weaponUses, GW - 6, 26);
  }

  // Move unlocks display
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  var moveY = GH - 8;
  for (var i = 0; i < MOVE_NAMES.length; i++) {
    var unlocked = (i + 1) <= playerLevel;
    ctx.fillStyle = unlocked ? '#44cc44' : '#333';
    if (i < 4) ctx.fillText((unlocked ? '>' : ' ') + MOVE_NAMES[i], 4, moveY - (3-i) * 9);
  }
}

function drawCombo() {
  if (comboCount < 2) return;

  var alpha = Math.min(1, comboTimer / 500);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(comboCount + ' HIT COMBO!', GW/2, 50);

  if (comboCount >= 5) {
    ctx.fillStyle = '#ff8844';
    ctx.font = '10px monospace';
    ctx.fillText('x' + (1 + comboCount * 0.1).toFixed(1) + ' BONUS', GW/2, 64);
  }
  ctx.globalAlpha = 1;
}

function drawGoArrow() {
  var alpha = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('GO >>>', GW - 20, GH/2);
  ctx.globalAlpha = 1;
}

// ============================================================
// SCREEN STATES
// ============================================================
function drawTitle() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Gritty city bg
  ctx.fillStyle = '#1a1a2a';
  for (var i = 0; i < 8; i++) {
    var bh = 50 + (i * 23 % 40);
    ctx.fillRect(i * 65 + 10, GH - 100 - bh, 50, bh + 100);
  }

  // Floor
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(0, GH - 50, GW, 50);

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DOUBLE DRAGON', GW/2 + 2, 62);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('DOUBLE DRAGON', GW/2, 60);

  // Subtitle
  ctx.fillStyle = '#ffcc44';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Arcade Brawler', GW/2, 82);

  // Controls
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD = Move  |  Z/J = Punch  |  X/K = Kick  |  SPACE/C = Jump', GW/2, 130);
  ctx.fillText('Walk into stunned enemy to GRAB  |  Double-tap to RUN', GW/2, 144);

  // XP system info
  ctx.fillStyle = '#88ccff';
  ctx.font = '8px monospace';
  ctx.fillText('Earn XP to unlock moves: Kick > Jump Kick > Grab > Spin > Uppercut > Flying Knee', GW/2, 168);

  // Highscore
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 200);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, 235);
  ctx.globalAlpha = 1;
}

function drawStageIntro() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stageNum + 1), GW/2, GH/2 - 20);

  ctx.fillStyle = '#ffcc44';
  ctx.font = '12px monospace';
  ctx.fillText(STAGES[stageNum].name, GW/2, GH/2 + 10);

  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Get ready...', GW/2, GH/2 + 40);
}

function drawStageCompleteOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, GH);

  var pulse = Math.sin(frame * 0.08) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE CLEAR!', GW/2, GH/2 - 10);

  if (player.hp === player.maxHp) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('PERFECT! +1000', GW/2, GH/2 + 15);
  }
  ctx.globalAlpha = 1;
}

function drawDeathOverlay() {
  var alpha = Math.min(0.7, (2000 - deathTimer) / 2000);
  ctx.fillStyle = 'rgba(80,0,0,' + alpha + ')';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DEFEATED', GW/2, GH/2);
}

function drawGameOverScreen() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, GW, GH);

  if (stageNum >= STAGES.length) {
    // Victory!
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('VICTORY!', GW/2, 60);

    ctx.fillStyle = '#44ff44';
    ctx.font = '12px monospace';
    ctx.fillText('You have conquered all 8 stages!', GW/2, 90);
  } else {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', GW/2, 60);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score, GW/2, 120);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 140);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, 140);
  }

  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.fillText('Stage reached: ' + (stageNum + 1) + '/8', GW/2, 165);
  ctx.fillText('Level: ' + playerLevel + '/7', GW/2, 180);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, 230);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME LOOP START
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
