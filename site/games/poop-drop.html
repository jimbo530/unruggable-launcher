var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSize = audioCtx.sampleRate * dur;
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  var filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 600;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

// ============================================================
// PARTICLES (Enhanced)
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = (speed || 2) * (0.5 + Math.random());
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, color: color,
      size: 2 + Math.random() * 4,
      type: 'circle'
    });
  }
}

// Spore-themed particle burst
function spawnSporeParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 3;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1.5,
      life: 1, color: color,
      size: 1 + Math.random() * 3,
      type: 'spore',
      wobble: Math.random() * Math.PI * 2
    });
  }
}

// Star burst for big combos
function spawnStarBurst(x, y, count) {
  var colors = ['#FFD700', '#FFA500', '#FF6347', '#FF69B4', '#9B59B6'];
  for (var i = 0; i < count; i++) {
    var angle = (Math.PI * 2 / count) * i;
    var spd = 3 + Math.random() * 2;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, color: colors[i % colors.length],
      size: 3 + Math.random() * 3,
      type: 'star'
    });
  }
}

// Column fire particles for slam effect (STR)
function spawnSlamParticles(col) {
  var px = BOARD_X + col * CELL + CELL / 2;
  for (var r = 0; r < ROWS; r++) {
    var py = BOARD_Y + r * CELL + CELL / 2;
    particles.push({
      x: px + (Math.random() - 0.5) * CELL,
      y: py,
      vx: (Math.random() - 0.5) * 2,
      vy: -2 - Math.random() * 3,
      life: 0.5 + Math.random() * 0.5,
      color: Math.random() > 0.5 ? '#FF6347' : '#FFD700',
      size: 2 + Math.random() * 3,
      type: 'circle'
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    if (p.type === 'spore') {
      p.wobble += dt * 5;
      p.x += Math.sin(p.wobble) * 0.5;
      p.vy += 0.02 * dt * 60;
    } else {
      p.vy += 0.08 * dt * 60;
    }
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      drawStar(p.x, p.y, p.size, p.size * 0.5, 5);
    } else if (p.type === 'spore') {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawStar(cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var r = i % 2 === 0 ? outerR : innerR;
    var angle = (Math.PI * 2 / (points * 2)) * i - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    else ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
  }
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// SCREEN SHAKE
// ============================================================
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDur = 0;

function triggerShake(magnitude, duration) {
  shakeMag = magnitude;
  shakeDur = duration;
}

function updateShake(dt) {
  if (shakeDur > 0) {
    shakeDur -= dt;
    var intensity = shakeMag * (shakeDur / 0.3);
    shakeX = (Math.random() - 0.5) * intensity * 2;
    shakeY = (Math.random() - 0.5) * intensity * 2;
  } else {
    shakeX = 0;
    shakeY = 0;
    shakeMag = 0;
  }
}

// ============================================================
// SCREEN FLASH
// ============================================================
var flashAlpha = 0, flashColor = '#fff';
function flash(color) { flashColor = color || '#fff'; flashAlpha = 0.3; }
function updateFlash(dt) { flashAlpha = Math.max(0, flashAlpha - dt * 3); }
function drawFlash() {
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

var scorePopups = [];

function addScorePopup(x, y, text, color, big) {
  scorePopups.push({
    x: x, y: y,
    text: text,
    color: color || '#FFD700',
    life: 1.5,
    maxLife: 1.5,
    big: big || false,
    vy: -1.5
  });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt * 60;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    var size = p.big ? Math.floor(CELL * 0.9) : Math.floor(CELL * 0.6);
    ctx.font = 'bold ' + size + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function updateBgSpores(dt) {
  for (var i = 0; i < bgSpores.length; i++) {
    var s = bgSpores[i];
    s.y -= s.speed * dt * 60;
    s.wobble += s.wobbleSpeed * dt;
    s.x += Math.sin(s.wobble) * 0.3;
    if (s.y < -10) { s.y = H + 10; s.x = Math.random() * W; }
  }
}

function drawBgSpores(theme) {
  for (var i = 0; i < bgSpores.length; i++) {
    var s = bgSpores[i];
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = theme.border;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function createBoard() {
  board = [];
  for (var r = 0; r < ROWS; r++) {
    board[r] = [];
    for (var c = 0; c < COLS; c++) {
      board[r][c] = null;

function isValid(type, rotation, px, py) {
  var cells = SHAPES[type][rotation];
  for (var ci = 0; ci < cells.length; ci++) {
    var cell = cells[ci];
    var x = px + cell[0];
    var y = py + cell[1];
    if (x < 0 || x >= COLS || y >= ROWS) return false;
    if (y < 0) continue;
    if (board[y][x] !== null) return false;
  }
  return true;
}

function getGhostY(piece) {
  var gy = piece.y;
  while (isValid(piece.type, piece.rotation, piece.x, gy + 1)) {
    gy++;
  }
  return gy;
}

// ============================================================
// BAG RANDOMIZER (7-bag with CHA luck weighting)
// ============================================================
var bag = [];
function fillBag() {
  var types = ['I', 'O', 'T', 'S', 'Z', 'L', 'J'];
  // Fisher-Yates shuffle
  for (var i = types.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = types[i]; types[i] = types[j]; types[j] = tmp;
  }

  // CHA luck: higher CHA biases toward higher-point pieces being earlier in bag
  if (CHA_BONUS > 0 && Math.random() < CHA_BONUS) {
    // Bubble one high-value piece toward front
    for (var k = types.length - 1; k > 0; k--) {
      if (POOP_TYPES[types[k]].points >= 2 && Math.random() < 0.5) {
        var temp = types[k];
        types[k] = types[k - 1];
        types[k - 1] = temp;
        break;
      }
    }
  }

  bag = bag.concat(types);
}

function nextPiece() {
  while (bag.length < 7) fillBag();
  return bag.shift();
}

function fillQueue() {
  while (nextQueue.length < MAX_PREVIEW) {
    nextQueue.push(nextPiece());
  }
}

// ============================================================
// PIECE SPAWN
// ============================================================
function spawnPiece(type) {
  if (!type) {
    fillQueue();
    type = nextQueue.shift();
    fillQueue();
  }
  var startX = 3;
  var startY = -1;
  current = { type: type, rotation: 0, x: startX, y: startY };
  ghostY = getGhostY(current);
  lockTimer = 0;
  lockActive = false;
  slamActive = false;

  // CON buffer: allow spawning higher above board
  var bufferAttempts = CON_BUFFER_ROWS;
  if (!isValid(type, 0, startX, startY)) {
    for (var attempt = 1; attempt <= bufferAttempts + 1; attempt++) {
      if (isValid(type, 0, startX, startY - attempt)) {
        current.y = startY - attempt;
        return;
      }
    }
    doGameOver();
    return;
  }
}

// ============================================================
// MOVEMENT
// ============================================================
function movePiece(dx, dy) {
  if (!current) return false;
  if (isValid(current.type, current.rotation, current.x + dx, current.y + dy)) {
    current.x += dx;
    current.y += dy;
    ghostY = getGhostY(current);
    if (dy === 0) {
      SFX.move();
      if (lockActive) { lockTimer = 0; }
    }
    return true;
  }
  return false;
}

function rotatePiece(dir) {
  if (!current) return;
  if (current.type === 'O') return;

  var oldRot = current.rotation;
  var newRot = (oldRot + dir + 4) % 4;
  var kicks = current.type === 'I' ? KICKS_I[oldRot] : KICKS_NORMAL[oldRot];

  for (var ki = 0; ki < kicks.length; ki++) {
    var kick = kicks[ki];
    var kx = dir === 1 ? kick[0] : -kick[0];
    var ky = dir === 1 ? kick[1] : -kick[1];
    if (isValid(current.type, newRot, current.x + kx, current.y + ky)) {
      current.rotation = newRot;
      current.x += kx;
      current.y += ky;
      ghostY = getGhostY(current);
      SFX.rotate();
      if (lockActive) { lockTimer = 0; }
      return;
    }
  }
}

function hardDrop() {
  if (!current) return;
  var dropDist = 0;
  while (isValid(current.type, current.rotation, current.x, current.y + 1)) {
    current.y++;
    dropDist++;
  }
  score += Math.floor(dropDist * 2 * INT_BONUS);  // INT: score multiplier
  SFX.drop();

  // STR: slam effect on hard drop
  if (STR_BONUS > 0 && dropDist >= 5) {
    slamActive = true;
    triggerShake(2 + STR_BONUS * 3, 0.15);
    SFX.slam();
    // Slam particles on the columns we hit
    var cells = SHAPES[current.type][current.rotation];
    var slamCols = {};
    for (var ci = 0; ci < cells.length; ci++) {
      slamCols[current.x + cells[ci][0]] = true;
    }
    for (var col in slamCols) {
      spawnSlamParticles(parseInt(col));
    }
  }

  lockPiece();
}

function softDrop() {
  if (!current) return;
  if (movePiece(0, 1)) {
    score += Math.floor(1 * INT_BONUS);  // INT: score multiplier
  }
}

// ============================================================
// LOCK PIECE
// ============================================================
function lockPiece() {
  if (!current) return;
  var cells = SHAPES[current.type][current.rotation];
  var aboveBoard = true;

  for (var ci = 0; ci < cells.length; ci++) {
    var cell = cells[ci];
    var x = current.x + cell[0];
    var y = current.y + cell[1];
    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
      board[y][x] = current.type;
      aboveBoard = false;
    }
  }

  if (aboveBoard) {
    doGameOver();
    return;
  }

  SFX.lock();
  totalPiecesPlaced++;

  // Check for line clears
  checkLines();

  // Reset hold with WIS cooldown reduction
  holdUsed = false;
  holdCooldown = Math.max(0, holdCooldown - WIS_BONUS);
  current = null;

  // Spawn next
  setTimeout(function() {
    if (state === 'playing' && !current) {
      spawnPiece();
    }
  }, linesClearAnim.length > 0 ? 400 : 50);
}

// ============================================================
// LINE CLEAR
// ============================================================
function checkLines() {
  var cleared = [];
  for (var r = 0; r < ROWS; r++) {
    var full = true;
    for (var c = 0; c < COLS; c++) {
      if (board[r][c] === null) { full = false; break; }
    }
    if (full) cleared.push(r);
  }

  if (cleared.length === 0) {
    combo = -1;
    lastClearWasTetris = false;
    return;
  }

  combo++;
  if (combo > stats.maxCombo) stats.maxCombo = combo;

  // Track statistics
  if (cleared.length === 1) stats.singles++;
  else if (cleared.length === 2) stats.doubles++;
  else if (cleared.length === 3) stats.triples++;
  else if (cleared.length === 4) stats.tetrises++;

  // Back-to-back tetris tracking
  var isTetris = cleared.length === 4;
  if (isTetris && lastClearWasTetris) {
    backToBack++;
  } else if (!isTetris) {
    backToBack = 0;
  }
  lastClearWasTetris = isTetris;

  // Shake effect based on lines cleared
  if (cleared.length >= 4) {
    triggerShake(6, 0.3);
  } else if (cleared.length >= 2) {
    triggerShake(3, 0.2);
  } else {
    triggerShake(1.5, 0.1);
  }

  // Animate
  for (var li = 0; li < cleared.length; li++) {
    var row = cleared[li];
    linesClearAnim.push({ row: row, timer: 0.4 });
    for (var c2 = 0; c2 < COLS; c2++) {
      var px = BOARD_X + c2 * CELL + CELL / 2;
      var py = BOARD_Y + row * CELL + CELL / 2;
      var type = board[row][c2];
      var color = type ? POOP_TYPES[type].fill : '#888';
      spawnParticles(px, py, color, 3, 2);
      if (cleared.length >= 4) {
        spawnSporeParticles(px, py, POOP_TYPES[type].highlight, 2);
      }
    }
  }

  // Big combo star burst
  if (combo >= 3) {
    spawnStarBurst(BOARD_X + COLS * CELL / 2, BOARD_Y + cleared[0] * CELL, 12 + combo * 2);
  }

  // Clear rows after brief delay
  setTimeout(function() {
    cleared.sort(function(a, b) { return a - b; });
    for (var i = cleared.length - 1; i >= 0; i--) {
      board.splice(cleared[i], 1);
      var newRow = [];
      for (var c3 = 0; c3 < COLS; c3++) newRow.push(null);
      board.unshift(newRow);
    }
    linesClearAnim = [];
  }, 350);

  // Scoring with INT multiplier and STR slam bonus
  var lineScores = [0, 100, 300, 500, 800];
  var baseScore = lineScores[cleared.length] || 800;
  var comboBonus = combo > 0 ? combo * 50 * level : 0;
  var slamBonus = slamActive ? Math.floor(baseScore * STR_BONUS * 0.5) : 0;  // STR: slam bonus
  var b2bBonus = backToBack > 0 && isTetris ? Math.floor(baseScore * 0.5) : 0;
  var modeScoreMult = CHALLENGE_MODES[currentMode].scoreMult || 1;
  var totalLineScore = Math.floor((baseScore * level + comboBonus + slamBonus + b2bBonus) * INT_BONUS * modeScoreMult);
  score += totalLineScore;

  // Score popup
  var popX = BOARD_X + COLS * CELL / 2;
  var popY = BOARD_Y + cleared[Math.floor(cleared.length / 2)] * CELL;
  addScorePopup(popX, popY, '+' + totalLineScore, '#FFD700', cleared.length >= 4);

  // Combo name popup
  if (combo > 0 && combo < COMBO_NAMES.length) {
    addScorePopup(popX, popY - CELL, COMBO_NAMES[combo], '#FF69B4', combo >= 5);
  }

  // Slam popup
  if (slamBonus > 0) {
    addScorePopup(popX, popY + CELL, 'SLAM +' + slamBonus, '#FF6347', true);
  }

  // B2B popup
  if (b2bBonus > 0) {
    addScorePopup(popX, popY - CELL * 2, 'BACK-TO-BACK!', '#9B59B6', true);
  }

  // Clear type names
  var clearNames = ['', 'Single', 'Double', 'Triple', 'TETRIS!'];
  if (cleared.length >= 1 && cleared.length <= 4) {
    addScorePopup(popX, popY - CELL * (combo > 0 ? 1.5 : 0.5), clearNames[cleared.length], '#fff', cleared.length >= 3);
  }

  // Sound
  if (cleared.length === 4) {
    SFX.clear4();
    flash('#FFD700');
    if (combo >= 3) SFX.comboHigh();
  } else if (cleared.length >= 2) {
    SFX.clear2();
    flash('#8B4513');
  } else {
    SFX.clear1();
  }

  // Lines and level
  lines += cleared.length;
  var newLevel = Math.floor(lines / 10) + 1;
  if (newLevel > level) {
    level = newLevel;
    SFX.levelUp();
    flash('#6B2FA0');
    addScorePopup(BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2, 'LEVEL ' + level + '!', '#9B4FD0', true);
    // Show level theme name
    var themeIdx = Math.min(level - 1, LEVEL_THEMES.length - 1);
    addScorePopup(BOARD_X + COLS * CELL / 2, BOARD_Y + ROWS * CELL / 2 + CELL * 1.5, LEVEL_THEMES[themeIdx].name, '#888', false);
  }

  // Sprint mode check
  if (currentMode === 'sprint' && lines >= CHALLENGE_MODES.sprint.lineGoal) {
    doGameOver();
  }
}

// ============================================================
// HOLD PIECE
// ============================================================
function doHold() {
  if (!current || holdUsed) return;
  // WIS: reduces the number of times hold is locked per sequence
  holdUsed = true;
  SFX.hold();

  var type = current.type;
  if (holdPiece) {
    var held = holdPiece;
    holdPiece = type;
    current = null;
    spawnPiece(held);
  } else {
    holdPiece = type;
    current = null;
    spawnPiece();
  }
}

// ============================================================
// GRAVITY & TIMING
// ============================================================
function getDropInterval() {
  var speeds = [0.8, 0.72, 0.63, 0.55, 0.47, 0.38, 0.3, 0.22, 0.15, 0.1, 0.08, 0.07, 0.06, 0.05, 0.04, 0.03];
  var idx = Math.min(level - 1, speeds.length - 1);
  var base = speeds[idx];
  // DEX: slightly faster gravity response (piece feels snappier)
  base *= (1 - DEX_BONUS * 0.05);
  // Mode speed multiplier
  base /= CHALLENGE_MODES[currentMode].speedMult || 1;
  // Survival mode: speed increases with pieces placed
  if (currentMode === 'survival') {
    base *= Math.max(0.2, 1 - totalPiecesPlaced * 0.002);
  }
  return Math.max(0.02, base);
}

// ============================================================
// GAME OVER
// ============================================================
function doGameOver() {
  state = 'gameOver';
  saveHighScore();
  SFX.gameOver();
  triggerShake(4, 0.5);
}

// ============================================================
// DRAWING -- POOP CELL
// ============================================================
function drawPoopCell(px, py, type, alpha) {
  if (!type) return;
  var info = POOP_TYPES[type];
  var s = CELL - 1;
  ctx.globalAlpha = alpha || 1;

  // Main body
  ctx.fillStyle = info.fill;
  ctx.beginPath();
  ctx.moveTo(px + s * 0.5, py + s * 0.05);
  ctx.bezierCurveTo(px + s * 0.8, py + s * 0.05, px + s * 0.95, py + s * 0.3, px + s * 0.9, py + s * 0.5);
  ctx.bezierCurveTo(px + s * 0.95, py + s * 0.75, px + s * 0.8, py + s * 0.95, px + s * 0.5, py + s * 0.95);
  ctx.bezierCurveTo(px + s * 0.2, py + s * 0.95, px + s * 0.05, py + s * 0.75, px + s * 0.1, py + s * 0.5);
  ctx.bezierCurveTo(px + s * 0.05, py + s * 0.3, px + s * 0.2, py + s * 0.05, px + s * 0.5, py + s * 0.05);
  ctx.closePath();
  ctx.fill();

  // Outline
  ctx.strokeStyle = info.stroke;
  ctx.lineWidth = 1;
  ctx.stroke();

  // Highlight blob
  ctx.fillStyle = info.highlight;
  ctx.globalAlpha = (alpha || 1) * 0.5;
  ctx.beginPath();
  ctx.ellipse(px + s * 0.35, py + s * 0.3, s * 0.12, s * 0.08, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Swirl lines for poop texture
  ctx.strokeStyle = info.stroke;
  ctx.lineWidth = 0.8;
  ctx.globalAlpha = (alpha || 1) * 0.4;
  ctx.beginPath();
  ctx.arc(px + s * 0.5, py + s * 0.55, s * 0.2, 0.5, 2.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(px + s * 0.5, py + s * 0.65, s * 0.15, -0.5, 1.5);
  ctx.stroke();

  ctx.globalAlpha = 1;
}

// ============================================================
// DRAWING -- BOARD
// ============================================================
function getTheme() {
  var idx = Math.min(level - 1, LEVEL_THEMES.length - 1);
  return LEVEL_THEMES[idx];
}

function drawBoard() {
  var theme = getTheme();

  // Board background with gradient
  var grad = ctx.createLinearGradient(BOARD_X, BOARD_Y, BOARD_X, BOARD_Y + ROWS * CELL);
  grad.addColorStop(0, theme.bg1);
  grad.addColorStop(1, theme.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);

  // Grid lines
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 0.5;
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X, BOARD_Y + r * CELL);
    ctx.lineTo(BOARD_X + COLS * CELL, BOARD_Y + r * CELL);
    ctx.stroke();
  }
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BOARD_X + c * CELL, BOARD_Y);
    ctx.lineTo(BOARD_X + c * CELL, BOARD_Y + ROWS * CELL);
    ctx.stroke();
  }

  // Board border
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(BOARD_X, BOARD_Y, COLS * CELL, ROWS * CELL);

  // Placed pieces
  for (var r2 = 0; r2 < ROWS; r2++) {
    for (var c2 = 0; c2 < COLS; c2++) {
      if (board[r2][c2] !== null) {
        var clearing = false;
        for (var la = 0; la < linesClearAnim.length; la++) {
          if (linesClearAnim[la].row === r2) { clearing = true; break; }
        }
        if (clearing) {
          var flashPhase = Math.sin(Date.now() * 0.02) > 0;
          if (flashPhase) {
            ctx.fillStyle = '#fff';
            ctx.fillRect(BOARD_X + c2 * CELL, BOARD_Y + r2 * CELL, CELL - 1, CELL - 1);
          } else {
            drawPoopCell(BOARD_X + c2 * CELL, BOARD_Y + r2 * CELL, board[r2][c2], 0.5);
          }
        } else {
          drawPoopCell(BOARD_X + c2 * CELL, BOARD_Y + r2 * CELL, board[r2][c2], 1);
        }
      }
    }
  }

  // Danger zone indicator (top rows glow red when board is high)
  var highestRow = ROWS;
  for (var r3 = 0; r3 < ROWS; r3++) {
    for (var c3 = 0; c3 < COLS; c3++) {
      if (board[r3][c3] !== null) { highestRow = r3; r3 = ROWS; break; }
    }
  }
  if (highestRow < 5) {
    var dangerAlpha = (5 - highestRow) / 5 * 0.15 * (0.5 + Math.sin(Date.now() * 0.005) * 0.5);
    ctx.fillStyle = 'rgba(255, 0, 0, ' + dangerAlpha + ')';
    ctx.fillRect(BOARD_X, BOARD_Y, COLS * CELL, 5 * CELL);
  }
}

// ============================================================
// DRAWING -- GHOST PIECE
// ============================================================
function drawGhost() {
  if (!current || ghostY === current.y) return;
  var cells = SHAPES[current.type][current.rotation];
  for (var ci = 0; ci < cells.length; ci++) {
    var cell = cells[ci];
    var x = current.x + cell[0];
    var y = ghostY + cell[1];
    if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
      var px = BOARD_X + x * CELL;
      var py = BOARD_Y + y * CELL;
      ctx.strokeStyle = POOP_TYPES[current.type].fill;
      ctx.globalAlpha = 0.3;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(px + 2, py + 2, CELL - 5, CELL - 5);
      ctx.globalAlpha = 1;
    }
  }
}

// ============================================================
// DRAWING -- CURRENT PIECE
// ============================================================
function drawCurrent() {
  if (!current) return;
  var cells = SHAPES[current.type][current.rotation];
  for (var ci = 0; ci < cells.length; ci++) {
    var cell = cells[ci];
    var x = current.x + cell[0];
    var y = current.y + cell[1];
    if (y >= 0) {
      drawPoopCell(BOARD_X + x * CELL, BOARD_Y + y * CELL, current.type, 1);
    }
  }
}

// ============================================================
// DRAWING -- PREVIEW (mini piece)
// ============================================================
function drawMiniPiece(type, cx, cy, scale) {
  var cells = SHAPES[type][0];
  var minX = 9, maxX = 0, minY = 9, maxY = 0;
  for (var ci = 0; ci < cells.length; ci++) {
    var cell = cells[ci];
    minX = Math.min(minX, cell[0]);
    maxX = Math.max(maxX, cell[0]);
    minY = Math.min(minY, cell[1]);
    maxY = Math.max(maxY, cell[1]);
  }
  var pw = (maxX - minX + 1) * scale;
  var ph = (maxY - minY + 1) * scale;
  var offsetX = cx - pw / 2;
  var offsetY = cy - ph / 2;

  for (var ci2 = 0; ci2 < cells.length; ci2++) {
    var cell2 = cells[ci2];
    var x = (cell2[0] - minX) * scale + offsetX;
    var y = (cell2[1] - minY) * scale + offsetY;
    drawPoopCell(x, y, type, 1);
  }
}

// ============================================================
// DRAWING -- SIDE PANELS
// ============================================================
function drawSidePanels() {
  var theme = getTheme();
  var fontSize = Math.max(10, Math.floor(CELL * 0.55));
  var smallFont = Math.max(8, Math.floor(CELL * 0.45));

  // === LEFT PANEL: Hold + Score ===
  var leftX = CELL * 0.5;

  // Hold box
  ctx.fillStyle = '#181818';
  ctx.fillRect(leftX, BOARD_Y, SIDE_W - CELL, CELL * 4);
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = 1;
  ctx.strokeRect(leftX, BOARD_Y, SIDE_W - CELL, CELL * 4);

  ctx.fillStyle = '#888';
  ctx.font = smallFont + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOLD', leftX + (SIDE_W - CELL) / 2, BOARD_Y + fontSize);

  if (holdPiece) {
    var miniScale = Math.floor(CELL * 0.7);
    drawMiniPiece(holdPiece, leftX + (SIDE_W - CELL) / 2, BOARD_Y + CELL * 2.5, miniScale);
    if (holdUsed) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(leftX, BOARD_Y + CELL, SIDE_W - CELL, CELL * 3);
    }
  }

  // Score section
  var scoreY = BOARD_Y + CELL * 5;
  ctx.fillStyle = '#DAA520';
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE', leftX + (SIDE_W - CELL) / 2, scoreY);
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.fillText(String(score), leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 1.3);

  // High score
  ctx.fillStyle = '#666';
  ctx.font = smallFont + 'px monospace';
  ctx.fillText('BEST', leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 3);
  ctx.fillStyle = '#888';
  ctx.fillText(String(highScore), leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 4.2);

  // Level + theme name
  ctx.fillStyle = '#6B2FA0';
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.fillText('LV ' + level, leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 6);
  var themeIdx = Math.min(level - 1, LEVEL_THEMES.length - 1);
  ctx.fillStyle = '#555';
  ctx.font = Math.max(7, Math.floor(CELL * 0.35)) + 'px monospace';
  ctx.fillText(LEVEL_THEMES[themeIdx].name, leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 7);

  // Lines
  ctx.fillStyle = '#666';
  ctx.font = smallFont + 'px monospace';
  ctx.fillText('LINES', leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 8.2);
  ctx.fillStyle = '#aaa';
  ctx.fillText(String(lines), leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 9.4);

  // Combo
  if (combo > 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold ' + fontSize + 'px monospace';
    var comboName = combo < COMBO_NAMES.length ? COMBO_NAMES[combo] : 'GODLIKE!';
    ctx.fillText(comboName, leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 10.8);
    ctx.fillStyle = '#DAA520';
    ctx.font = smallFont + 'px monospace';
    ctx.fillText('x' + combo, leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 12);
  }

  // Mode timer display
  if (currentMode === 'blitz' && state === 'playing') {
    var timeLeft = Math.max(0, CHALLENGE_MODES.blitz.timeLimit - modeTimer);
    var mins = Math.floor(timeLeft / 60);
    var secs = Math.floor(timeLeft % 60);
    var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
    ctx.fillStyle = timeLeft < 30 ? '#FF6347' : '#4fc3f7';
    ctx.font = 'bold ' + fontSize + 'px monospace';
    ctx.fillText(timeStr, leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 13.5);
  }

  // Sprint lines remaining
  if (currentMode === 'sprint' && state === 'playing') {
    var remaining = Math.max(0, CHALLENGE_MODES.sprint.lineGoal - lines);
    ctx.fillStyle = remaining < 10 ? '#FFD700' : '#4fc3f7';
    ctx.font = 'bold ' + fontSize + 'px monospace';
    ctx.fillText(remaining + ' left', leftX + (SIDE_W - CELL) / 2, scoreY + fontSize * 13.5);
  }

  // Stat bonuses indicator (if any active)
  if (statB.level > 0) {
    var statY = BOARD_Y + ROWS * CELL - CELL * 3;
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = Math.max(7, Math.floor(CELL * 0.35)) + 'px monospace';
    ctx.fillText(statB.name || 'Baseling', leftX + (SIDE_W - CELL) / 2, statY);
    ctx.fillStyle = '#666';
    ctx.fillText('Lv' + statB.level, leftX + (SIDE_W - CELL) / 2, statY + fontSize * 0.8);
    // Show active bonuses
    var bonusY = statY + fontSize * 1.6;
    if (STR_BONUS > 0) { ctx.fillStyle = '#FF6347'; ctx.fillText('STR+', leftX + (SIDE_W - CELL) / 2, bonusY); bonusY += fontSize * 0.7; }
    if (DEX_BONUS > 0) { ctx.fillStyle = '#4fc3f7'; ctx.fillText('DEX+', leftX + (SIDE_W - CELL) / 2, bonusY); bonusY += fontSize * 0.7; }
    if (CON_BONUS > 0) { ctx.fillStyle = '#66BB6A'; ctx.fillText('CON+', leftX + (SIDE_W - CELL) / 2, bonusY); bonusY += fontSize * 0.7; }
    if (INT_BONUS > 1) { ctx.fillStyle = '#AB47BC'; ctx.fillText('INT+', leftX + (SIDE_W - CELL) / 2, bonusY); bonusY += fontSize * 0.7; }
    if (WIS_BONUS > 0) { ctx.fillStyle = '#FFD700'; ctx.fillText('WIS+', leftX + (SIDE_W - CELL) / 2, bonusY); bonusY += fontSize * 0.7; }
    if (CHA_BONUS > 0) { ctx.fillStyle = '#FF69B4'; ctx.fillText('CHA+', leftX + (SIDE_W - CELL) / 2, bonusY); }
  }

  // === RIGHT PANEL: Next Queue ===
  var rightX = BOARD_X + COLS * CELL + CELL * 0.5;

  ctx.fillStyle = '#181818';
  ctx.fillRect(rightX, BOARD_Y, SIDE_W - CELL, CELL * 14);
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = 1;
  ctx.strokeRect(rightX, BOARD_Y, SIDE_W - CELL, CELL * 14);

  ctx.fillStyle = '#888';
  ctx.font = smallFont + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', rightX + (SIDE_W - CELL) / 2, BOARD_Y + fontSize);

  // Draw next queue (WIS determines count)
  var previewCount = Math.min(MAX_PREVIEW, nextQueue.length);
  for (var i = 0; i < previewCount; i++) {
    var miniSc = Math.floor(CELL * (i === 0 ? 0.7 : 0.55));
    var ny = BOARD_Y + CELL * 2 + i * CELL * 2.5;
    drawMiniPiece(nextQueue[i], rightX + (SIDE_W - CELL) / 2, ny, miniSc);
    // Show piece name for first preview
    if (i === 0) {
      ctx.fillStyle = POOP_TYPES[nextQueue[i]].fill;
      ctx.font = Math.max(7, Math.floor(CELL * 0.3)) + 'px monospace';
      ctx.fillText(POOP_TYPES[nextQueue[i]].name, rightX + (SIDE_W - CELL) / 2, ny + CELL * 1.1);
    }
  }

  // Piece count display below queue
  var pcY = BOARD_Y + CELL * 15;
  ctx.fillStyle = '#555';
  ctx.font = Math.max(7, Math.floor(CELL * 0.35)) + 'px monospace';
  ctx.fillText('Pieces: ' + totalPiecesPlaced, rightX + (SIDE_W - CELL) / 2, pcY);
}

var isMobile = false;
function checkMobile() {
  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}
checkMobile();

var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
var touchMoveDist = 0;
var touchCols = 0;

function getTouchPos(touch) {
  var rect = canvas.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function drawTouchControls() {
  if (!isMobile) return;

  var btnSize = CELL * 1.8;
  var margin = CELL * 0.5;
  var bottomY = BOARD_Y + ROWS * CELL + margin;

  ctx.globalAlpha = 0.25;

  ctx.fillStyle = '#444';
  ctx.fillRect(BOARD_X, bottomY, btnSize, btnSize);
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold ' + Math.floor(btnSize * 0.5) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('<', BOARD_X + btnSize / 2, bottomY + btnSize * 0.65);

  ctx.fillRect(BOARD_X + btnSize + margin, bottomY, btnSize, btnSize);
  ctx.fillText('>', BOARD_X + btnSize * 1.5 + margin, bottomY + btnSize * 0.65);

  ctx.fillStyle = '#664';
  ctx.fillRect(BOARD_X + COLS * CELL - btnSize * 2 - margin, bottomY, btnSize, btnSize);
  ctx.fillStyle = '#aaa';
  ctx.fillText('R', BOARD_X + COLS * CELL - btnSize * 1.5 - margin, bottomY + btnSize * 0.65);

  ctx.fillStyle = '#644';
  ctx.fillRect(BOARD_X + COLS * CELL - btnSize, bottomY, btnSize, btnSize);
  ctx.fillStyle = '#aaa';
  ctx.fillText('V', BOARD_X + COLS * CELL - btnSize / 2, bottomY + btnSize * 0.65);

  ctx.globalAlpha = 1;
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();

  if (state === 'title') { startGame(); return; }
  if (state === 'gameOver') { startGame(); return; }
  if (state === 'tutorial') { tutorialStep++; if (tutorialStep >= TUTORIAL_STEPS.length) { state = 'title'; tutorialStep = 0; } return; }

  var touch = e.changedTouches[0];
  var pos = getTouchPos(touch);
  touchStartX = pos.x;
  touchStartY = pos.y;
  touchStartTime = Date.now();
  touchMoveDist = 0;
  touchCols = 0;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (state !== 'playing' || !current) return;

  var touch = e.changedTouches[0];
  var pos = getTouchPos(touch);
  var dx = pos.x - touchStartX;
  var dy = pos.y - touchStartY;

  var colsMoved = Math.floor(dx / CELL);
  if (colsMoved !== touchCols) {
    var diff = colsMoved - touchCols;
    for (var i = 0; i < Math.abs(diff); i++) {
      movePiece(diff > 0 ? 1 : -1, 0);
    }
    touchCols = colsMoved;
  }

  if (dy > CELL * 2 && dy > Math.abs(dx)) {
    softDrop();
    touchStartY += CELL;
  }

  touchMoveDist = Math.abs(dx) + Math.abs(dy);
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (state !== 'playing' || !current) return;

  var elapsed = Date.now() - touchStartTime;

  if (elapsed < 200 && touchMoveDist < CELL) {
    var pos = getTouchPos(e.changedTouches[0]);
    if (pos.x < W / 2) {
      rotatePiece(-1);
    } else {
      rotatePiece(1);
    }
  }

  if (elapsed < 150 && (getTouchPos(e.changedTouches[0]).y - touchStartY) > CELL * 3) {
    hardDrop();
  }
}, { passive: false });

var keys = {};

window.addEventListener('keydown', function(e) {
  ensureAudio();

  // Title screen
  if (state === 'title') {
    if (e.code === 'Enter' || e.code === 'Space') {
      startGame();
    } else if (e.code === 'KeyM') {
      state = 'modeSelect';
      modeMenuIndex = 0;
      SFX.modeSelect();
    } else if (e.code === 'KeyT') {
      state = 'tutorial';
      tutorialStep = 0;
      SFX.tutorial();
    }
    return;
  }

  // Tutorial navigation
  if (state === 'tutorial') {
    if (e.code === 'Enter' || e.code === 'ArrowRight' || e.code === 'Space') {
      tutorialStep++;
      SFX.tutorial();
      if (tutorialStep >= TUTORIAL_STEPS.length) {
        state = 'title';
        tutorialStep = 0;
        tutorialShown = true;
      }
    } else if (e.code === 'ArrowLeft' && tutorialStep > 0) {
      tutorialStep--;
      SFX.tutorial();
    } else if (e.code === 'Escape') {
      state = 'title';
      tutorialStep = 0;
      tutorialShown = true;
    }
    return;
  }

  // Mode select
  if (state === 'modeSelect') {
    var modes = Object.keys(CHALLENGE_MODES);
    if (e.code === 'ArrowUp') {
      modeMenuIndex = (modeMenuIndex - 1 + modes.length) % modes.length;
      SFX.move();
    } else if (e.code === 'ArrowDown') {
      modeMenuIndex = (modeMenuIndex + 1) % modes.length;
      SFX.move();
    } else if (e.code === 'Enter' || e.code === 'Space') {
      currentMode = modes[modeMenuIndex];
      highScore = highScores[currentMode] || 0;
      SFX.modeSelect();
      startGame();
    } else if (e.code === 'Escape') {
      state = 'title';
      SFX.move();
    }
    return;
  }

  // Game over
  if (state === 'gameOver') {
    if (e.code === 'Enter' || e.code === 'Space') {
      startGame();
    } else if (e.code === 'Escape') {
      state = 'title';
    }
    return;
  }

  // Pause toggle
  if (state === 'playing' && (e.code === 'KeyP' || e.code === 'Escape')) {
    state = 'paused';
    return;
  }
  if (state === 'paused' && (e.code === 'KeyP' || e.code === 'Escape')) {
    state = 'playing';
    return;
  }

  if (state !== 'playing') return;

  if (keys[e.code]) return;
  keys[e.code] = true;

  switch (e.code) {
    case 'ArrowLeft':
    case 'KeyA':
      e.preventDefault();
      movePiece(-1, 0);
      dasDir = -1;
      dasTimer = 0;
      dasActive = false;
      break;
    case 'ArrowRight':
    case 'KeyD':
      e.preventDefault();
      movePiece(1, 0);
      dasDir = 1;
      dasTimer = 0;
      dasActive = false;
      break;
    case 'ArrowDown':
    case 'KeyS':
      e.preventDefault();
      softDropping = true;
      softDrop();
      break;
    case 'ArrowUp':
    case 'KeyX':
    case 'KeyW':
      e.preventDefault();
      rotatePiece(1);
      break;
    case 'KeyZ':
      e.preventDefault();
      rotatePiece(-1);
      break;
    case 'Space':
      e.preventDefault();
      hardDrop();
      break;
    case 'KeyC':
    case 'ShiftLeft':
    case 'ShiftRight':
      e.preventDefault();
      doHold();
      break;
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;

  switch (e.code) {
    case 'ArrowLeft':
    case 'KeyA':
      if (dasDir === -1) { dasDir = 0; dasActive = false; }
      break;
    case 'ArrowRight':
    case 'KeyD':
      if (dasDir === 1) { dasDir = 0; dasActive = false; }
      break;
    case 'ArrowDown':
    case 'KeyS':
      softDropping = false;
      break;
  }
});

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  level = 1;
  lines = 0;
  combo = -1;
  holdPiece = null;
  holdUsed = false;
  holdCooldown = 0;
  totalPiecesPlaced = 0;
  bag = [];
  nextQueue = [];
  particles = [];
  scorePopups = [];
  linesClearAnim = [];
  dropTimer = 0;
  lockTimer = 0;
  lockActive = false;
  dasDir = 0;
  dasActive = false;
  softDropping = false;
  slamActive = false;
  lastClearWasTetris = false;
  backToBack = 0;
  modeTimer = 0;
  stats = { singles: 0, doubles: 0, triples: 0, tetrises: 0, maxCombo: 0, tSpins: 0 };

  createBoard();
  fillQueue();
  spawnPiece();
}

// ============================================================
// MAIN LOOP
// ============================================================
var lastTime = 0;

function gameLoop(timestamp) {
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  // Update background spores always
  updateBgSpores(dt);

  // Clear
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'modeSelect') {
    drawModeSelect();
  } else if (state === 'tutorial') {
    drawTitle();
    drawTutorial();
  } else if (state === 'playing') {
    // Mode timer
    modeTimer += dt;
    if (currentMode === 'blitz' && modeTimer >= CHALLENGE_MODES.blitz.timeLimit) {
      doGameOver();
    }

    // DAS (auto-repeat) -- DEX makes it faster
    if (dasDir !== 0) {
      dasTimer += dt * 1000;
      if (!dasActive && dasTimer >= DAS_DELAY) {
        dasActive = true;
        dasTimer = 0;
      }
      if (dasActive && dasTimer >= DAS_RATE) {
        dasTimer -= DAS_RATE;
        movePiece(dasDir, 0);
      }
    }

    // Gravity
    if (current) {
      var interval = softDropping ? getDropInterval() * 0.1 : getDropInterval();
      dropTimer += dt;
      if (dropTimer >= interval) {
        dropTimer -= interval;
        if (!movePiece(0, 1)) {
          if (!lockActive) {
            lockActive = true;
            lockTimer = 0;
          }
        } else {
          lockActive = false;
          lockTimer = 0;
          if (softDropping) score += Math.floor(1 * INT_BONUS);
        }
      }

      // Lock timer
      if (lockActive) {
        lockTimer += dt * 1000;
        if (lockTimer >= LOCK_DELAY) {
          lockPiece();
        }
      }
    }

    // Update visual effects
    updateParticles(dt);
    updateFlash(dt);
    updateShake(dt);
    updateScorePopups(dt);

    // Animate line clears
    for (var i = linesClearAnim.length - 1; i >= 0; i--) {
      linesClearAnim[i].timer -= dt;
      if (linesClearAnim[i].timer <= 0) {
        linesClearAnim.splice(i, 1);
      }
    }

    // Apply screen shake
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Draw game
    drawHUD();
    var theme = getTheme();
    drawBgSpores(theme);
    drawBoard();
    drawGhost();
    drawCurrent();
    drawSidePanels();
    drawParticles();
    drawScorePopups();
    drawFlash();
    drawTouchControls();

    ctx.restore();

  } else if (state === 'paused') {
    drawHUD();
    drawBoard();
    drawSidePanels();
    drawPauseOverlay();
  } else if (state === 'gameOver') {
    // Keep updating particles for visual flair
    updateParticles(dt);
    updateScorePopups(dt);

    drawHUD();
    drawBoard();
    drawSidePanels();
    drawParticles();
    drawScorePopups();
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

// Kick off
requestAnimationFrame(gameLoop);

})();
</script>
