<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'GROW', b: 'SPORE' } });

// ============================================================
// PASS 1 -- STAT BONUSES
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) { console.warn('statB load failed', e); }

// Stat helper functions
function strDmgMult() { return statB.damage * (1 + (statB.str - 10) * 0.05); }
function dexSpeedMult() { return statB.speed * (1 + (statB.dex - 10) * 0.03); }
function dexHandlingMult() { return 1 + (statB.dex - 10) * 0.04; }
function conHpMult() { return statB.hpMult * (1 + (statB.con - 10) * 0.06); }
function conArmorBonus() { return Math.floor((statB.con - 10) * 0.15); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisCooldownMult() { return statB.cooldown * Math.max(0.2, 1 - (statB.wis - 10) * 0.03); }
function chaVanFreqMult() { return Math.max(0.3, 1 - (statB.cha - 10) * 0.04); }
function chaLuckMult() { return statB.luck * (1 + (statB.cha - 10) * 0.03); }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 12) * 0.25); }

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('spyhunter_hi');
var lives = 3;
var frame = 0;
var distance = 0;
var zoneTimer = 0;
var zoneIndex = 0;
var stageNumber = 1;
var difficulty = 1;
var invincTimer = 0;
var deathTimer = 0;
var weaponVanTimer = 0;
var bossActive = null;
var bossWarningTimer = 0;
var shakeIntensity = 0;
var shakeDecay = 0;

// ============================================================
// PASS 3 -- TASERN ZONE NAMES + THEMES
// ============================================================
var ZONES = ['highway', 'country', 'bridge', 'mountain', 'night', 'mycelial', 'reactor', 'sporeswamp'];
var ZONE_NAMES = [
  'GARDEN HIGHWAY', 'FUNGAL FOOTHILLS', 'POOP BRIDGE',
  'SPORE MOUNTAIN PASS', 'BIOLUME NIGHT', 'MYCELIAL NETWORK',
  'REACTOR CORRIDOR', 'COMPOST SWAMP'
];
var zoneFlashTimer = 0;

// Road state
var roadOffset = 0;
var roadCurve = 0;
var roadCurveTarget = 0;
var roadWidth = 200;
var roadWidthTarget = 200;
var roadCenterX = GW / 2;
var roadCenterTarget = GW / 2;
var laneCount = 4;

// Player
var player = { x: GW / 2, y: GH - 80, speed: 0, maxSpeed: 280, hp: 3, maxHp: 3 };
var playerWidth = 18, playerHeight = 28;
var steering = 0;

// ============================================================
// PASS 2 -- EXPANDED WEAPONS
// ============================================================
var WEAPONS = ['machinegun', 'missile', 'oilslick', 'smokescreen', 'sporespray', 'reactormissile'];
var WEAPON_NAMES = ['MYCELIUM GUN', 'SPORE MISSILES', 'GOO SLICK', 'FUNGAL FOG', 'SPORE SPRAY', 'GARDEN ROCKETS'];
var currentWeapon = 0;
var missileAmmo = 5;
var oilAmmo = 3;
var smokeAmmo = 3;
var sporeAmmo = 0;
var reactorMissileAmmo = 0;
var fireTimer = 0;
var fireCooldown = 0;

// Bullets
var bullets = [];
// Dropped items (oil, smoke, spore puddles, toxic trails)
var drops = [];
// Enemies
var enemies = [];
// Civilians
var civilians = [];
// Hazards
var hazards = [];
// Weapon van
var weaponVan = null;
// Road scenery
var scenery = [];
// Enemy bullets (from enforcer)
var enemyBullets = [];
// Bombs (from copter / spore chopper)
var bombs = [];
// Exhaust particles (PASS 3)
var exhaustParticles = [];

// Spawn timers
var enemySpawnTimer = 0;
var civilianSpawnTimer = 0;
var hazardSpawnTimer = 0;
var scenerySpawnTimer = 0;

// Road segments for curves
var roadSegments = [];
var SEGMENT_COUNT = 60;

// ============================================================
// PASS 3 -- ZONE COLORS + THEMES
// ============================================================
function getZoneColors() {
  switch(ZONES[zoneIndex]) {
    case 'highway': return { road: '#333', line: '#fff', shoulder: '#555', grass: '#1a5c1a', sky: '#112' };
    case 'country': return { road: '#3a3a2a', line: '#ddd', shoulder: '#5a4a2a', grass: '#2a6a1a', sky: '#0a1a0a' };
    case 'bridge': return { road: '#444', line: '#ff0', shoulder: '#666', grass: '#1a3a6a', sky: '#0a0a2a' };
    case 'mountain': return { road: '#2a2a2a', line: '#fff', shoulder: '#4a3a2a', grass: '#3a3a3a', sky: '#1a0a1a' };
    case 'night': return { road: '#1a1a1a', line: '#555', shoulder: '#222', grass: '#0a1a0a', sky: '#000' };
    case 'mycelial': return { road: '#2a1a3a', line: '#a0f', shoulder: '#3a2a4a', grass: '#1a0a2a', sky: '#0a0518' };
    case 'reactor': return { road: '#2a2a1a', line: '#0f0', shoulder: '#4a3a1a', grass: '#1a2a0a', sky: '#0a1a00' };
    case 'sporeswamp': return { road: '#2a3a2a', line: '#8f8', shoulder: '#3a4a3a', grass: '#0a3a1a', sky: '#001a0a' };
    default: return { road: '#333', line: '#fff', shoulder: '#555', grass: '#1a5c1a', sky: '#112' };
  }
}

function getRoadWidth() {
  switch(ZONES[zoneIndex]) {
    case 'highway': return 210;
    case 'country': return 170;
    case 'bridge': return 120;
    case 'mountain': return 150;
    case 'night': return 190;
    case 'mycelial': return 180;
    case 'reactor': return 160;
    case 'sporeswamp': return 140;
    default: return 200;
  }
}

// === INIT ===
function initRoadSegments() {
  roadSegments = [];
  for (var i = 0; i < SEGMENT_COUNT; i++) {
    roadSegments.push({ curve: 0, width: roadWidth });
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + bonusLives();
  distance = 0;
  frame = 0;
  zoneTimer = 0;
  zoneIndex = 0;
  stageNumber = 1;
  difficulty = 1;
  invincTimer = 0;
  deathTimer = 0;
  bossActive = null;
  bossWarningTimer = 0;
  shakeIntensity = 0;
  player.x = GW / 2;
  player.y = GH - 80;
  player.speed = 0;
  player.maxHp = Math.floor(3 * conHpMult());
  player.hp = player.maxHp;
  player.maxSpeed = Math.floor(280 * dexSpeedMult());
  currentWeapon = 0;
  missileAmmo = 5;
  oilAmmo = 3;
  smokeAmmo = 3;
  sporeAmmo = 0;
  reactorMissileAmmo = 0;
  fireTimer = 0;
  fireCooldown = 0;
  roadCurve = 0;
  roadCurveTarget = 0;
  roadWidth = getRoadWidth();
  roadWidthTarget = roadWidth;
  roadCenterX = GW / 2;
  roadCenterTarget = GW / 2;
  steering = 0;
  bullets = [];
  drops = [];
  enemies = [];
  civilians = [];
  hazards = [];
  weaponVan = null;
  weaponVanTimer = Math.floor(8 * chaVanFreqMult());
  scenery = [];
  enemyBullets = [];
  bombs = [];
  exhaustParticles = [];
  enemySpawnTimer = 2;
  civilianSpawnTimer = 1.5;
  hazardSpawnTimer = 4;
  scenerySpawnTimer = 0;
  zoneFlashTimer = 0;
  TAS.particles.clear();
  initRoadSegments();
}

// === HELPERS ===
function getRoadLeft(y) {
  var t = 1 - (y / GH);
  var perspective = 0.5 + t * 0.5;
  var w = roadWidth * perspective;
  var cx = roadCenterX + roadCurve * t * t * 80;
  return Math.floor(cx - w / 2);
}

function getRoadRight(y) {
  var t = 1 - (y / GH);
  var perspective = 0.5 + t * 0.5;
  var w = roadWidth * perspective;
  var cx = roadCenterX + roadCurve * t * t * 80;
  return Math.floor(cx + w / 2);
}

function getRoadCenterAt(y) {
  var t = 1 - (y / GH);
  return Math.floor(roadCenterX + roadCurve * t * t * 80);
}

function getRoadWidthAt(y) {
  var t = 1 - (y / GH);
  return Math.floor(roadWidth * (0.5 + t * 0.5));
}

function isOnRoad(x, y, margin) {
  margin = margin || 0;
  var left = getRoadLeft(y) - margin;
  var right = getRoadRight(y) + margin;
  return x >= left && x <= right;
}

function getLaneX(lane, y) {
  var left = getRoadLeft(y);
  var right = getRoadRight(y);
  var w = right - left;
  return Math.floor(left + w * (lane + 0.5) / laneCount);
}

// ============================================================
// PASS 3 -- SCREEN SHAKE HELPER
// ============================================================
function triggerShake(intensity, dur) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
  shakeDecay = dur || 0.4;
}

// ============================================================
// PASS 3 -- EXHAUST / EXPLOSION PARTICLES
// ============================================================
function spawnExhaust(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    exhaustParticles.push({
      x: x + (Math.random() - 0.5) * 4,
      y: y,
      vx: (Math.random() - 0.5) * 20,
      vy: Math.random() * 40 + 10,
      life: 0.2 + Math.random() * 0.3,
      maxLife: 0.4,
      color: color,
      size: 1 + Math.random() * 2
    });
  }
}

function spawnExplosion(x, y, count, big) {
  var colors = ['#ff4400', '#ffaa00', '#ff6600', '#ff8800', '#fff'];
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = (big ? 80 : 40) + Math.random() * (big ? 120 : 60);
    exhaustParticles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 0.3 + Math.random() * 0.4,
      maxLife: 0.6,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: big ? 2 + Math.random() * 3 : 1 + Math.random() * 2
    });
  }
  triggerShake(big ? 8 : 4, big ? 0.5 : 0.3);
}

// === SPAWNERS ===
function spawnEnemy() {
  if (bossActive) return;
  var types = ['roadforce', 'roadforce', 'enforcer'];
  if (difficulty > 1.5) types.push('bulletproof', 'switchblade');
  if (difficulty > 2.5) types.push('copter');
  // PASS 2 -- Tasern enemies
  if (difficulty > 1.3) types.push('reactortruck');
  if (difficulty > 2.0) types.push('sporechopper');
  if (difficulty > 3.0) types.push('mycetank');
  var type = types[TAS.math.randInt(0, types.length - 1)];
  var lane = TAS.math.randInt(0, laneCount - 1);
  var e = {
    type: type,
    x: getLaneX(lane, 0),
    y: -40,
    lane: lane,
    speed: TAS.math.randRange(100, 160) * difficulty * 0.7,
    hp: type === 'bulletproof' ? 3 : type === 'mycetank' ? 6 : 1,
    w: 16, h: 26,
    timer: 0,
    swerveDir: Math.random() < 0.5 ? -1 : 1,
    bladeOut: false,
    isBoss: false,
    trailTimer: 0
  };
  if (type === 'copter' || type === 'sporechopper') {
    e.y = -30;
    e.speed = TAS.math.randRange(60, 100);
    e.w = 20;
    e.h = 20;
    e.bombTimer = type === 'sporechopper' ? 1.5 : 2;
  }
  if (type === 'switchblade') {
    e.w = 22;
    e.bladeTimer = 0;
  }
  if (type === 'reactortruck') {
    e.w = 18;
    e.h = 30;
    e.hp = 2;
    e.speed *= 0.85;
    e.trailTimer = 0;
  }
  if (type === 'mycetank') {
    e.w = 22;
    e.h = 32;
    e.speed *= 0.5;
  }
  enemies.push(e);
}

// ============================================================
// PASS 2 -- BOSS SPAWNER (every 5 stages)
// ============================================================
function spawnBoss() {
  var bossTypes = ['reactor_commander', 'spore_overlord', 'mycelial_juggernaut'];
  var type = bossTypes[(stageNumber / 5 - 1) % bossTypes.length];
  var e = {
    type: type,
    x: GW / 2,
    y: -60,
    lane: 1,
    speed: 40 + difficulty * 10,
    hp: Math.floor((10 + difficulty * 5) * conHpMult()),
    maxHp: Math.floor((10 + difficulty * 5) * conHpMult()),
    w: 32, h: 44,
    timer: 0,
    swerveDir: 1,
    bladeOut: false,
    isBoss: true,
    trailTimer: 0,
    phase: 0,
    attackTimer: 2,
    patternTimer: 0
  };
  if (type === 'mycelial_juggernaut') {
    e.w = 36;
    e.h = 48;
    e.hp = Math.floor(e.hp * 1.5);
    e.maxHp = e.hp;
    e.speed *= 0.6;
  }
  enemies.push(e);
  bossActive = e;
  bossWarningTimer = 0;
}

function spawnCivilian() {
  var lane = TAS.math.randInt(0, laneCount - 1);
  var fromTop = Math.random() < 0.7;
  civilians.push({
    x: getLaneX(lane, fromTop ? 0 : GH),
    y: fromTop ? -30 : GH + 30,
    lane: lane,
    speed: fromTop ? TAS.math.randRange(60, 100) : TAS.math.randRange(-80, -40),
    w: 14, h: 24,
    color: ['#33aa55', '#3377cc', '#cc7733', '#aa33aa', '#aaaa33'][TAS.math.randInt(0, 4)],
    alive: true
  });
}

// ============================================================
// PASS 2 -- EXPANDED HAZARDS
// ============================================================
function spawnHazard() {
  var types = ['oil', 'pothole', 'ice', 'tree', 'gooslick', 'sporecloud', 'reactordebris'];
  if (ZONES[zoneIndex] === 'mycelial') { types.push('sporecloud', 'sporecloud'); }
  if (ZONES[zoneIndex] === 'reactor') { types.push('reactordebris', 'reactordebris'); }
  if (ZONES[zoneIndex] === 'sporeswamp') { types.push('gooslick', 'gooslick'); }
  var type = types[TAS.math.randInt(0, types.length - 1)];
  var lane = TAS.math.randInt(0, laneCount - 1);
  hazards.push({
    type: type,
    x: getLaneX(lane, 0),
    y: -20,
    w: type === 'tree' ? 20 : type === 'reactordebris' ? 22 : type === 'sporecloud' ? 24 : 16,
    h: type === 'tree' ? 20 : type === 'reactordebris' ? 18 : type === 'sporecloud' ? 20 : 12,
    lane: lane,
    hp: type === 'tree' ? 2 : type === 'reactordebris' ? 3 : 99,
    timer: 0
  });
}

function spawnWeaponVan() {
  weaponVan = {
    x: getRoadLeft(0) - 20,
    y: -50,
    w: 22, h: 34,
    speed: 80
  };
}

function spawnScenery() {
  var side = Math.random() < 0.5 ? 'left' : 'right';
  var types = ['tree', 'bush', 'rock', 'sign'];
  if (ZONES[zoneIndex] === 'bridge') types = ['post', 'light'];
  if (ZONES[zoneIndex] === 'mountain') types = ['rock', 'boulder', 'pine'];
  if (ZONES[zoneIndex] === 'mycelial') types = ['mushroom', 'glowcap', 'mycelium'];
  if (ZONES[zoneIndex] === 'reactor') types = ['pipe', 'barrel', 'tower'];
  if (ZONES[zoneIndex] === 'sporeswamp') types = ['fungus', 'sporepod', 'vine'];
  scenery.push({
    type: types[TAS.math.randInt(0, types.length - 1)],
    side: side,
    y: -20,
    size: TAS.math.randRange(8, 16)
  });
}

// ============================================================
// PASS 2 -- EXPANDED FIRE WEAPON
// ============================================================
function fireWeapon() {
  if (fireCooldown > 0) return;
  var cd = wisCooldownMult();
  switch(currentWeapon) {
    case 0: // machine gun
      bullets.push({ x: Math.floor(player.x - 3), y: Math.floor(player.y - playerHeight / 2), vy: -400, type: 'bullet', dmg: strDmgMult() });
      bullets.push({ x: Math.floor(player.x + 3), y: Math.floor(player.y - playerHeight / 2), vy: -400, type: 'bullet', dmg: strDmgMult() });
      fireCooldown = 0.1 * cd;
      TAS.audio.playNoise(0.03, 0.06, 3000);
      break;
    case 1: // missile
      if (missileAmmo > 0) {
        missileAmmo--;
        bullets.push({ x: Math.floor(player.x), y: Math.floor(player.y - playerHeight / 2), vy: -500, type: 'missile', pierce: true, dmg: strDmgMult() * 2 });
        fireCooldown = 0.4 * cd;
        TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 50);
      }
      break;
    case 2: // oil slick
      if (oilAmmo > 0) {
        oilAmmo--;
        drops.push({ x: Math.floor(player.x), y: Math.floor(player.y + playerHeight / 2 + 5), type: 'oil', life: 6, w: 14, h: 10 });
        fireCooldown = 0.5 * cd;
        TAS.audio.playNoise(0.1, 0.04, 800);
      }
      break;
    case 3: // smoke screen
      if (smokeAmmo > 0) {
        smokeAmmo--;
        drops.push({ x: Math.floor(player.x), y: Math.floor(player.y + playerHeight / 2 + 5), type: 'smoke', life: 4, w: 30, h: 20 });
        fireCooldown = 0.6 * cd;
        TAS.audio.playNoise(0.2, 0.03, 400);
      }
      break;
    case 4: // spore spray -- wide spread forward
      if (sporeAmmo > 0) {
        sporeAmmo--;
        for (var si = -2; si <= 2; si++) {
          bullets.push({
            x: Math.floor(player.x + si * 6),
            y: Math.floor(player.y - playerHeight / 2),
            vy: -350,
            vx: si * 40,
            type: 'spore',
            dmg: strDmgMult() * 0.7,
            life: 1.2
          });
        }
        fireCooldown = 0.35 * cd;
        TAS.audio.playNoise(0.15, 0.05, 1800);
      }
      break;
    case 5: // reactor missiles -- homing pair
      if (reactorMissileAmmo > 0) {
        reactorMissileAmmo--;
        bullets.push({ x: Math.floor(player.x - 6), y: Math.floor(player.y - playerHeight / 2), vy: -300, vx: -30, type: 'reactormissile', dmg: strDmgMult() * 3, pierce: true, homing: true, life: 3 });
        bullets.push({ x: Math.floor(player.x + 6), y: Math.floor(player.y - playerHeight / 2), vy: -300, vx: 30, type: 'reactormissile', dmg: strDmgMult() * 3, pierce: true, homing: true, life: 3 });
        fireCooldown = 0.6 * cd;
        TAS.audio.playTone(300, 0.3, 'sawtooth', 0.1, 80);
      }
      break;
  }
}

// === DAMAGE PLAYER ===
function damagePlayer(amount) {
  if (invincTimer > 0) return;
  var reduced = Math.max(1, amount - conArmorBonus());
  player.hp -= reduced;
  triggerShake(6, 0.4);
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#f00', 0.3);
  TAS.audio.playNoise(0.2, 0.1, 1500);
  if (player.hp <= 0) {
    killPlayer();
  } else {
    invincTimer = 1.0;
  }
}

function killPlayer() {
  lives--;
  spawnExplosion(player.x, player.y, 25, true);
  TAS.particles.spawn(player.x, player.y, '#ff4400', 20, 4, { size: 3, gravity: 0.5 });
  TAS.particles.spawn(player.x, player.y, '#ffaa00', 15, 3, { size: 2 });
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#fff', 0.5);
  TAS.audio.playNoise(0.5, 0.15, 2000);
  TAS.audio.playTone(100, 0.4, 'sawtooth', 0.1, 40);
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('spyhunter_hi', highScore);
    }
  } else {
    deathTimer = 2.0;
    player.maxHp = Math.floor(3 * conHpMult());
    player.hp = player.maxHp;
    player.speed = 0;
    invincTimer = 3.0;
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Screen shake decay
  if (shakeIntensity > 0) {
    shakeDecay -= dt;
    if (shakeDecay <= 0) { shakeIntensity = 0; }
  }

  // Update exhaust particles
  for (var ep = exhaustParticles.length - 1; ep >= 0; ep--) {
    var p = exhaustParticles[ep];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) exhaustParticles.splice(ep, 1);
  }

  if (state === 'title') {
    roadOffset += dt * 100;
    // NES controls: Start = Enter, A = Z/Space, B = X
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.keys['z'] ||
        TAS.input.keys['Z'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (TAS.input.keys['Space'] || TAS.input.keys['Enter'] ||
        TAS.input.keys['KeyZ'] || TAS.input.keys['z'] || TAS.input.keys['Z'] ||
        TAS.input.touch.a || TAS.input.touch.b)) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Death respawn timer
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      player.x = GW / 2;
      player.y = GH - 80;
    }
    return;
  }

  // Boss warning
  if (bossWarningTimer > 0) {
    bossWarningTimer -= dt;
    if (bossWarningTimer <= 0 && !bossActive) {
      spawnBoss();
    }
    return;
  }

  // Invincibility timer
  if (invincTimer > 0) invincTimer -= dt;
  if (fireCooldown > 0) fireCooldown -= dt;

  // --- INPUT (PASS 3: NES-style) ---
  var accel = 0;
  var steerInput = 0;
  var firing = false;
  var switchWeapon = false;

  // D-pad: arrows or WASD
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left) steerInput -= 1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right) steerInput += 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.a || TAS.input.touch.up) accel = 1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down) accel = -1;
  // A button = Z/Space = fire, B button = X = switch weapon
  if (TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.keys['z'] || TAS.input.keys['Z'] || TAS.input.touch.b) firing = true;
  if (TAS.input.justPressed && (TAS.input.justPressed['KeyX'] || TAS.input.justPressed['x'] || TAS.input.justPressed['X'])) {
    switchWeapon = true;
  }

  // Weapon cycling with X/B
  if (switchWeapon) {
    currentWeapon = (currentWeapon + 1) % WEAPONS.length;
    TAS.audio.playTone(600, 0.05, 'square', 0.03);
  }

  // Speed (PASS 1: DEX scales max speed)
  player.maxSpeed = Math.floor(280 * dexSpeedMult());
  if (accel > 0) {
    player.speed = Math.min(player.speed + 300 * dt, player.maxSpeed);
  } else if (accel < 0) {
    player.speed = Math.max(player.speed - 400 * dt, 40);
  } else {
    player.speed = Math.max(player.speed - 80 * dt, 80);
  }

  // Steering (PASS 1: DEX scales handling)
  var steerSpeed = (160 + player.speed * 0.3) * dexHandlingMult();
  steering = TAS.math.lerp(steering, steerInput, dt * 8);
  player.x += Math.floor(steering * steerSpeed * dt);

  // Road curve pushes player
  player.x -= Math.floor(roadCurve * player.speed * 0.003);

  // Clamp to screen
  player.x = TAS.math.clamp(player.x, 10, GW - 10);

  // Check if on road
  if (!isOnRoad(player.x, player.y, 5)) {
    player.speed *= 0.95;
    if (player.speed > 180) {
      damagePlayer(3);
    }
  }

  // Distance / score (PASS 1: INT scales score)
  var scrollSpeed = player.speed * dt;
  distance += scrollSpeed;
  score = Math.floor(distance / 10 * intScoreMult());

  // --- ROAD CURVES ---
  zoneTimer += dt;
  if (zoneTimer >= 60) {
    zoneTimer = 0;
    zoneIndex = (zoneIndex + 1) % ZONES.length;
    stageNumber++;
    roadWidthTarget = getRoadWidth();
    zoneFlashTimer = 3;
    difficulty += 0.3;

    // PASS 2: Boss every 5 stages
    if (stageNumber % 5 === 0 && !bossActive) {
      bossWarningTimer = 3;
    }
  }
  if (zoneFlashTimer > 0) zoneFlashTimer -= dt;

  // Curve changes
  if (Math.random() < dt * 0.3) {
    roadCurveTarget = TAS.math.randRange(-1.5, 1.5) * difficulty * 0.5;
    if (ZONES[zoneIndex] === 'mountain') roadCurveTarget *= 1.5;
    if (ZONES[zoneIndex] === 'highway') roadCurveTarget *= 0.4;
    if (ZONES[zoneIndex] === 'sporeswamp') roadCurveTarget *= 1.3;
  }
  roadCurve = TAS.math.lerp(roadCurve, roadCurveTarget, dt * 0.8);
  roadWidth = TAS.math.lerp(roadWidth, roadWidthTarget, dt * 2);
  roadCenterX = TAS.math.lerp(roadCenterX, roadCenterTarget, dt * 1.5);

  if (Math.random() < dt * 0.1) {
    roadCenterTarget = GW / 2 + TAS.math.randRange(-30, 30);
  }

  // Difficulty scaling
  difficulty = 1 + distance / 5000;

  roadOffset += scrollSpeed;

  // --- EXHAUST PARTICLES (PASS 3) ---
  if (player.speed > 100 && frame % 3 === 0 && deathTimer <= 0) {
    var exColor = player.speed > 200 ? '#f80' : '#888';
    spawnExhaust(Math.floor(player.x - 3), Math.floor(player.y + playerHeight / 2), exColor, 1);
    spawnExhaust(Math.floor(player.x + 3), Math.floor(player.y + playerHeight / 2), exColor, 1);
  }

  // --- FIRE ---
  if (firing) {
    fireWeapon();
  }

  // --- WEAPON VAN (PASS 1: CHA scales frequency) ---
  weaponVanTimer -= dt;
  if (weaponVanTimer <= 0 && !weaponVan) {
    spawnWeaponVan();
    weaponVanTimer = TAS.math.randRange(15, 25) * chaVanFreqMult();
  }
  if (weaponVan) {
    weaponVan.y += weaponVan.speed * dt;
    weaponVan.x = Math.floor(getRoadRight(weaponVan.y) + 15);
    if (weaponVan.y > GH + 50) {
      weaponVan = null;
    } else if (TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      weaponVan.x - weaponVan.w / 2, weaponVan.y - weaponVan.h / 2, weaponVan.w, weaponVan.h
    )) {
      currentWeapon = (currentWeapon + 1) % WEAPONS.length;
      if (currentWeapon === 1) missileAmmo += 5;
      if (currentWeapon === 2) oilAmmo += 3;
      if (currentWeapon === 3) smokeAmmo += 3;
      if (currentWeapon === 4) sporeAmmo += 8;
      if (currentWeapon === 5) reactorMissileAmmo += 4;
      // CHA luck: chance for double ammo
      if (Math.random() < (chaLuckMult() - 1) * 0.5) {
        if (currentWeapon === 1) missileAmmo += 3;
        if (currentWeapon === 2) oilAmmo += 2;
        if (currentWeapon === 3) smokeAmmo += 2;
        if (currentWeapon === 4) sporeAmmo += 4;
        if (currentWeapon === 5) reactorMissileAmmo += 2;
      }
      invincTimer = Math.max(invincTimer, 2.0);
      weaponVan = null;
      TAS.audio.playMelody([[880, 0.08], [1100, 0.08], [1320, 0.12]], 80);
      TAS.particles.spawn(player.x, player.y, '#a855f7', 10, 2, { size: 2 });
    }
  }

  // --- BULLETS ---
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.y += b.vy * dt;
    if (b.vx) b.x += b.vx * dt;
    if (b.life !== undefined) { b.life -= dt; if (b.life <= 0) { bullets.splice(i, 1); continue; } }

    // Homing (reactor missiles)
    if (b.homing && enemies.length > 0) {
      var nearest = null;
      var nearDist = 999;
      for (var nh = 0; nh < enemies.length; nh++) {
        var ed = TAS.math.dist(b.x, b.y, enemies[nh].x, enemies[nh].y);
        if (ed < nearDist) { nearDist = ed; nearest = enemies[nh]; }
      }
      if (nearest && nearDist < 150) {
        var dx = nearest.x - b.x;
        var dy = nearest.y - b.y;
        var len = Math.sqrt(dx * dx + dy * dy) || 1;
        b.vx = TAS.math.lerp(b.vx || 0, (dx / len) * 300, dt * 5);
        b.vy = TAS.math.lerp(b.vy, (dy / len) * 300, dt * 5);
      }
      // Trail
      if (frame % 2 === 0) {
        spawnExhaust(Math.floor(b.x), Math.floor(b.y), '#0f0', 1);
      }
    }

    // Spore bullet trail
    if (b.type === 'spore' && frame % 3 === 0) {
      spawnExhaust(Math.floor(b.x), Math.floor(b.y), '#8f4', 1);
    }

    if (b.y < -20 || b.y > GH + 20 || b.x < -20 || b.x > GW + 20) { bullets.splice(i, 1); continue; }

    // Hit enemies
    var hitSomething = false;
    for (var j = enemies.length - 1; j >= 0; j--) {
      var e = enemies[j];
      if (TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
        var dmg = b.dmg || 1;
        e.hp -= dmg;
        if (e.hp <= 0) {
          var killScore = e.isBoss ? Math.floor(500 * intScoreMult()) :
                          e.type === 'bulletproof' ? Math.floor(50 * intScoreMult()) :
                          e.type === 'copter' || e.type === 'sporechopper' ? Math.floor(75 * intScoreMult()) :
                          e.type === 'mycetank' ? Math.floor(100 * intScoreMult()) :
                          e.type === 'reactortruck' ? Math.floor(40 * intScoreMult()) :
                          Math.floor(25 * intScoreMult());
          score += killScore;
          spawnExplosion(Math.floor(e.x), Math.floor(e.y), e.isBoss ? 30 : 12, e.isBoss);
          TAS.particles.spawn(e.x, e.y, '#ff6600', 12, 3, { size: 2, gravity: 0.3 });
          TAS.audio.playNoise(0.15, 0.08, 2000);
          if (e.isBoss) {
            bossActive = null;
            score += Math.floor(1000 * intScoreMult());
            TAS.audio.playMelody([[440, 0.1], [660, 0.1], [880, 0.1], [1100, 0.2]], 100);
          }
          enemies.splice(j, 1);
        } else {
          TAS.particles.spawn(e.x, e.y, '#fff', 4, 2, { size: 1 });
        }
        if (!b.pierce) hitSomething = true;
        break;
      }
    }
    // Hit hazard trees / reactor debris
    if (!hitSomething) {
      for (var j2 = hazards.length - 1; j2 >= 0; j2--) {
        var h = hazards[j2];
        if ((h.type === 'tree' || h.type === 'reactordebris') &&
            TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, h.x - h.w / 2, h.y - h.h / 2, h.w, h.h)) {
          h.hp -= (b.dmg || 1);
          if (h.hp <= 0) {
            var debrisColor = h.type === 'reactordebris' ? '#0f0' : '#4a2';
            TAS.particles.spawn(h.x, h.y, debrisColor, 8, 2, { size: 2 });
            if (h.type === 'reactordebris') spawnExplosion(Math.floor(h.x), Math.floor(h.y), 6, false);
            hazards.splice(j2, 1);
          }
          hitSomething = true;
          break;
        }
      }
    }
    // Hit civilians (penalty!)
    if (!hitSomething) {
      for (var j3 = civilians.length - 1; j3 >= 0; j3--) {
        var c = civilians[j3];
        if (c.alive && TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, c.x - c.w / 2, c.y - c.h / 2, c.w, c.h)) {
          c.alive = false;
          score = Math.max(0, score - Math.floor(100 * intScoreMult()));
          TAS.particles.spawn(c.x, c.y, '#f00', 8, 2, { size: 2 });
          TAS.fx.flash('#f00', 0.2);
          TAS.audio.playTone(200, 0.3, 'sine', 0.08, 100);
          hitSomething = true;
          break;
        }
      }
    }
    if (hitSomething && !b.pierce) bullets.splice(i, 1);
  }

  // --- ENEMY BULLETS ---
  for (var i2 = enemyBullets.length - 1; i2 >= 0; i2--) {
    var eb = enemyBullets[i2];
    eb.y += eb.vy * dt;
    eb.x += (eb.vx || 0) * dt;
    if (eb.y > GH + 20 || eb.y < -20) { enemyBullets.splice(i2, 1); continue; }
    if (TAS.hit.rectOverlap(eb.x - 2, eb.y - 2, 4, 4,
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight)) {
      damagePlayer(eb.dmg || 1);
      enemyBullets.splice(i2, 1);
    }
  }

  // --- BOMBS ---
  for (var i3 = bombs.length - 1; i3 >= 0; i3--) {
    var bomb = bombs[i3];
    bomb.y += bomb.vy * dt;
    bomb.size += dt * 10;
    if (bomb.y >= bomb.targetY) {
      spawnExplosion(Math.floor(bomb.x), Math.floor(bomb.y), 15, false);
      TAS.particles.spawn(bomb.x, bomb.y, bomb.color || '#ff4400', 15, 4, { size: 3, gravity: 0.5 });
      TAS.audio.playNoise(0.3, 0.12, 1200);
      if (TAS.math.dist(bomb.x, bomb.y, player.x, player.y) < 30) {
        damagePlayer(1);
      }
      // Spore bombs leave a hazard puddle
      if (bomb.isSpore) {
        drops.push({ x: Math.floor(bomb.x), y: Math.floor(bomb.y), type: 'sporepuddle', life: 5, w: 20, h: 14 });
      }
      bombs.splice(i3, 1);
    }
  }

  // --- DROPS (oil/smoke/spore puddles/toxic trails) ---
  for (var i4 = drops.length - 1; i4 >= 0; i4--) {
    var d = drops[i4];
    d.y += scrollSpeed * 0.3;
    d.life -= dt;
    if (d.life <= 0 || d.y > GH + 30) { drops.splice(i4, 1); continue; }

    // Player hitting toxic/spore puddles
    if ((d.type === 'toxictrail' || d.type === 'sporepuddle') &&
        TAS.hit.rectOverlap(player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
          d.x - d.w / 2, d.y - d.h / 2, d.w, d.h)) {
      if (invincTimer <= 0) {
        damagePlayer(1);
        d.life = 0;
      }
    }

    // Check enemies hitting drops
    for (var j4 = enemies.length - 1; j4 >= 0; j4--) {
      var e2 = enemies[j4];
      if (e2.type === 'copter' || e2.type === 'sporechopper') continue;
      if (TAS.hit.rectOverlap(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h,
        e2.x - e2.w / 2, e2.y - e2.h / 2, e2.w, e2.h)) {
        if (d.type === 'oil') {
          e2.hp = 0;
          score += Math.floor(20 * intScoreMult());
          TAS.particles.spawn(e2.x, e2.y, '#440', 8, 3, { size: 2 });
          if (e2.isBoss) { bossActive = null; }
          enemies.splice(j4, 1);
        } else if (d.type === 'smoke') {
          e2.swerveDir = Math.random() < 0.5 ? -3 : 3;
          e2.speed *= 0.5;
        }
      }
    }
  }

  // --- ENEMIES ---
  if (!bossActive) {
    enemySpawnTimer -= dt;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = TAS.math.randRange(1.5, 3.5) / difficulty;
    }
  }

  for (var i5 = enemies.length - 1; i5 >= 0; i5--) {
    var en = enemies[i5];
    en.timer += dt;

    // PASS 2: Boss AI
    if (en.isBoss) {
      // Boss stays at top portion of screen
      if (en.y < 60) en.y += 60 * dt;
      // Weave back and forth
      en.patternTimer += dt;
      en.x += Math.sin(en.patternTimer * 1.5) * 100 * dt;
      en.x = TAS.math.clamp(en.x, getRoadLeft(en.y) + en.w, getRoadRight(en.y) - en.w);

      // Boss attack patterns
      en.attackTimer -= dt;
      if (en.attackTimer <= 0) {
        en.attackTimer = Math.max(0.8, 2.5 - difficulty * 0.2);
        if (en.type === 'reactor_commander') {
          // Spread shot
          for (var bs = -2; bs <= 2; bs++) {
            enemyBullets.push({ x: Math.floor(en.x + bs * 8), y: Math.floor(en.y + en.h / 2), vy: 250, vx: bs * 40, dmg: 1 });
          }
          TAS.audio.playTone(500, 0.08, 'square', 0.05);
        } else if (en.type === 'spore_overlord') {
          // Drop spore bombs
          bombs.push({ x: Math.floor(en.x - 20), y: Math.floor(en.y), vy: 180, targetY: player.y, size: 3, isSpore: true, color: '#4a4' });
          bombs.push({ x: Math.floor(en.x + 20), y: Math.floor(en.y), vy: 180, targetY: player.y, size: 3, isSpore: true, color: '#4a4' });
          TAS.audio.playTone(250, 0.15, 'sine', 0.06, 100);
        } else if (en.type === 'mycelial_juggernaut') {
          // Charge toward player
          en.speed = 200;
          en.x = TAS.math.lerp(en.x, player.x, 0.3);
          // Also fires
          enemyBullets.push({ x: Math.floor(en.x), y: Math.floor(en.y + en.h / 2), vy: 300, vx: 0, dmg: 2 });
          TAS.audio.playNoise(0.2, 0.1, 800);
        }
      }
      // Keep boss on screen
      if (en.y > 120) en.y -= 40 * dt;
      // Don't remove boss if off-screen top
      continue;
    }

    if (en.type === 'copter') {
      en.y += en.speed * dt;
      en.x = TAS.math.lerp(en.x, player.x, dt * 0.8);
      en.bombTimer -= dt;
      if (en.bombTimer <= 0) {
        en.bombTimer = TAS.math.randRange(1.5, 3.0);
        bombs.push({ x: Math.floor(en.x), y: Math.floor(en.y), vy: 200, targetY: player.y, size: 3 });
        TAS.audio.playTone(400, 0.1, 'sine', 0.05, 200);
      }
    } else if (en.type === 'sporechopper') {
      // PASS 2: Spore Chopper -- drops spore bombs
      en.y += en.speed * dt;
      en.x = TAS.math.lerp(en.x, player.x, dt * 0.6);
      en.bombTimer -= dt;
      if (en.bombTimer <= 0) {
        en.bombTimer = TAS.math.randRange(1.0, 2.5);
        bombs.push({ x: Math.floor(en.x), y: Math.floor(en.y), vy: 180, targetY: player.y + 20, size: 4, isSpore: true, color: '#4a4' });
        TAS.audio.playTone(250, 0.1, 'sine', 0.05, 150);
      }
    } else if (en.type === 'reactortruck') {
      // PASS 2: Reactor Truck -- leaves toxic trail
      en.y += (en.speed - player.speed * 0.3) * dt;
      en.trailTimer -= dt;
      if (en.trailTimer <= 0) {
        en.trailTimer = 0.3;
        drops.push({ x: Math.floor(en.x), y: Math.floor(en.y + en.h / 2), type: 'toxictrail', life: 4, w: 12, h: 8 });
      }
      if (Math.abs(en.y - player.y) < 100) {
        en.x = TAS.math.lerp(en.x, player.x, dt * 0.8);
      }
    } else if (en.type === 'mycetank') {
      // PASS 2: Mycelial Tank -- slow, armored, fires
      en.y += (en.speed - player.speed * 0.3) * dt;
      en.timer += dt;
      if (en.timer > 2.0 && Math.abs(en.y - player.y) < 200) {
        en.timer = 0;
        enemyBullets.push({ x: Math.floor(en.x), y: Math.floor(en.y + en.h / 2), vy: 200, vx: (player.x - en.x) * 0.5, dmg: 2 });
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08);
      }
    } else {
      // Ground vehicles scroll with road
      en.y += (en.speed - player.speed * 0.3) * dt;

      if (en.type === 'roadforce') {
        if (Math.abs(en.y - player.y) < 100) {
          en.x = TAS.math.lerp(en.x, player.x, dt * 2);
        }
      } else if (en.type === 'bulletproof') {
        en.x += Math.sin(en.timer * 3) * 80 * dt;
      } else if (en.type === 'switchblade') {
        if (Math.abs(en.y - player.y) < 60) {
          en.bladeOut = true;
          en.w = 36;
        } else {
          en.bladeOut = false;
          en.w = 22;
        }
        en.x = TAS.math.lerp(en.x, player.x, dt * 1.5);
      } else if (en.type === 'enforcer') {
        if (en.timer > 1.5 && en.y < player.y - 40) {
          en.timer = 0;
          enemyBullets.push({ x: Math.floor(en.x), y: Math.floor(en.y + en.h / 2), vy: 250, vx: 0 });
          TAS.audio.playTone(600, 0.05, 'square', 0.04);
        }
      }

      en.x += en.swerveDir * 20 * dt;
    }

    // Remove if off screen
    if (en.y > GH + 60 || en.y < -80) { enemies.splice(i5, 1); continue; }

    // Collision with player
    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      en.x - en.w / 2, en.y - en.h / 2, en.w, en.h)) {
      var collisionDmg = en.type === 'mycetank' ? 2 : 1;
      damagePlayer(collisionDmg);
      triggerShake(collisionDmg * 4, 0.3);
      en.hp -= strDmgMult();
      if (en.hp <= 0) {
        spawnExplosion(Math.floor(en.x), Math.floor(en.y), en.isBoss ? 25 : 10, en.isBoss);
        TAS.particles.spawn(en.x, en.y, '#ff6600', 8, 3, { size: 2 });
        if (en.isBoss) bossActive = null;
        enemies.splice(i5, 1);
      }
    }
  }

  // --- CIVILIANS ---
  civilianSpawnTimer -= dt;
  if (civilianSpawnTimer <= 0) {
    spawnCivilian();
    civilianSpawnTimer = TAS.math.randRange(2, 4) / difficulty;
  }

  for (var i6 = civilians.length - 1; i6 >= 0; i6--) {
    var civ = civilians[i6];
    civ.y += (civ.speed - player.speed * 0.3) * dt;
    if (civ.y > GH + 50 || civ.y < -50) { civilians.splice(i6, 1); continue; }
    if (!civ.alive) { civilians.splice(i6, 1); continue; }

    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      civ.x - civ.w / 2, civ.y - civ.h / 2, civ.w, civ.h)) {
      score = Math.max(0, score - Math.floor(50 * intScoreMult()));
      damagePlayer(1);
      civ.alive = false;
      TAS.particles.spawn(civ.x, civ.y, civ.color, 8, 2, { size: 2 });
      triggerShake(4, 0.3);
    }
  }

  // --- HAZARDS ---
  hazardSpawnTimer -= dt;
  if (hazardSpawnTimer <= 0) {
    spawnHazard();
    hazardSpawnTimer = TAS.math.randRange(3, 6) / difficulty;
  }

  for (var i7 = hazards.length - 1; i7 >= 0; i7--) {
    var hz = hazards[i7];
    hz.y += scrollSpeed * 0.8;
    if (hz.timer !== undefined) hz.timer += dt;
    if (hz.y > GH + 30) { hazards.splice(i7, 1); continue; }

    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      hz.x - hz.w / 2, hz.y - hz.h / 2, hz.w, hz.h)) {
      switch(hz.type) {
        case 'oil':
          player.x += Math.floor((Math.random() < 0.5 ? -1 : 1) * 40);
          TAS.audio.playNoise(0.1, 0.04, 600);
          break;
        case 'pothole':
          if (player.speed > 150) damagePlayer(1);
          player.speed *= 0.6;
          TAS.audio.playNoise(0.08, 0.06, 1000);
          triggerShake(3, 0.2);
          break;
        case 'ice':
          steering += (Math.random() < 0.5 ? -1 : 1) * 0.5;
          break;
        case 'tree':
          damagePlayer(1);
          player.speed *= 0.3;
          hz.hp = 0;
          TAS.particles.spawn(hz.x, hz.y, '#4a2', 10, 2, { size: 2 });
          triggerShake(5, 0.3);
          break;
        // PASS 2: New hazards
        case 'gooslick':
          player.x += Math.floor((Math.random() < 0.5 ? -1 : 1) * 60);
          steering += (Math.random() < 0.5 ? -1 : 1) * 0.8;
          player.speed *= 0.7;
          TAS.audio.playNoise(0.15, 0.05, 500);
          TAS.particles.spawn(hz.x, hz.y, '#4a0', 6, 2, { size: 2 });
          break;
        case 'sporecloud':
          player.speed *= 0.5;
          steering += (Math.random() - 0.5) * 1.2;
          invincTimer = Math.max(invincTimer, 0.5);
          TAS.particles.spawn(hz.x, hz.y, '#8a4', 10, 3, { size: 3 });
          TAS.audio.playNoise(0.2, 0.04, 300);
          break;
        case 'reactordebris':
          damagePlayer(2);
          player.speed *= 0.4;
          hz.hp = 0;
          spawnExplosion(Math.floor(hz.x), Math.floor(hz.y), 10, false);
          TAS.audio.playNoise(0.2, 0.1, 1500);
          break;
      }
      if (hz.type === 'tree' || hz.type === 'reactordebris') {
        if (hz.hp <= 0) hazards.splice(i7, 1);
      } else {
        hazards.splice(i7, 1);
      }
    }
  }

  // --- SCENERY ---
  scenerySpawnTimer -= dt;
  if (scenerySpawnTimer <= 0) {
    spawnScenery();
    scenerySpawnTimer = TAS.math.randRange(0.1, 0.4);
  }
  for (var i8 = scenery.length - 1; i8 >= 0; i8--) {
    scenery[i8].y += scrollSpeed * 0.9;
    if (scenery[i8].y > GH + 30) scenery.splice(i8, 1);
  }

  // --- ENGINE SOUND ---
  if (frame % 12 === 0) {
    var pitch = 40 + player.speed * 0.3;
    TAS.audio.playTone(pitch, 0.15, 'sawtooth', 0.015);
  }
}

// === DRAW ===
function draw(dt) {
  var colors = getZoneColors();

  // Sky / background
  ctx.fillStyle = colors.sky;
  ctx.fillRect(0, 0, GW, GH);

  // Draw road with perspective
  var segH = GH / 40;
  for (var i = 0; i < 40; i++) {
    var y = Math.floor(i * segH);
    var t = 1 - (y / GH);
    var perspective = 0.5 + t * 0.5;
    var w = Math.floor(roadWidth * perspective);
    var cx = Math.floor(roadCenterX + roadCurve * t * t * 80);
    var left = Math.floor(cx - w / 2);
    var right = Math.floor(cx + w / 2);

    // Grass / off-road
    ctx.fillStyle = colors.grass;
    ctx.fillRect(0, y, left, Math.floor(segH) + 1);
    ctx.fillRect(right, y, GW - right, Math.floor(segH) + 1);

    // Shoulder
    ctx.fillStyle = colors.shoulder;
    var shoulderW = Math.floor(6 * perspective);
    ctx.fillRect(left, y, shoulderW, Math.floor(segH) + 1);
    ctx.fillRect(right - shoulderW, y, shoulderW, Math.floor(segH) + 1);

    // Road
    ctx.fillStyle = colors.road;
    ctx.fillRect(left + shoulderW, y, w - shoulderW * 2, Math.floor(segH) + 1);

    // Lane lines (dashed)
    if ((Math.floor((y + roadOffset) / 10)) % 2 === 0) {
      ctx.fillStyle = colors.line;
      for (var lane = 1; lane < laneCount; lane++) {
        var lx = Math.floor(left + (w / laneCount) * lane);
        ctx.fillRect(lx - 1, y, Math.floor(2 * perspective), Math.floor(segH * 0.6));
      }
    }

    // Center line
    if (ZONES[zoneIndex] !== 'bridge') {
      ctx.fillStyle = ZONES[zoneIndex] === 'reactor' ? '#0f0' : ZONES[zoneIndex] === 'mycelial' ? '#a0f' : '#aa0';
      var clW = Math.floor(3 * perspective);
      ctx.fillRect(cx - Math.floor(clW / 2), y, clW, Math.floor(segH) + 1);
    }
  }

  // Night mode / biolume visibility cone
  if (ZONES[zoneIndex] === 'night') {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalCompositeOperation = 'lighter';
    var grd = ctx.createRadialGradient(player.x, player.y - 60, 10, player.x, player.y - 20, 140);
    grd.addColorStop(0, 'rgba(200,255,200,0.7)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, GW, GH);
    ctx.restore();
  }

  // Mycelial zone glow effect
  if (ZONES[zoneIndex] === 'mycelial' || ZONES[zoneIndex] === 'sporeswamp') {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.05 + Math.sin(frame * 0.02) * 0.03;
    ctx.fillStyle = ZONES[zoneIndex] === 'mycelial' ? '#604080' : '#208040';
    ctx.fillRect(0, 0, GW, GH);
    ctx.restore();
  }

  ctx.save();
  // PASS 3: Apply screen shake
  if (shakeIntensity > 0) {
    var sx = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    var sy = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    ctx.translate(sx, sy);
  }
  TAS.fx.applyShake();

  // Scenery (PASS 3: themed per zone)
  for (var s = 0; s < scenery.length; s++) {
    var sc = scenery[s];
    var scX = Math.floor(sc.side === 'left' ? getRoadLeft(sc.y) - sc.size - 5 : getRoadRight(sc.y) + 5);
    var scY = Math.floor(sc.y);

    if (sc.type === 'mushroom' || sc.type === 'glowcap' || sc.type === 'fungus' || sc.type === 'sporepod') {
      // Mushroom/fungal scenery
      ctx.fillStyle = sc.type === 'glowcap' ? '#a060ff' : sc.type === 'sporepod' ? '#40aa40' : '#8a4a6a';
      ctx.beginPath();
      ctx.arc(scX + sc.size / 2, scY - sc.size / 3, sc.size / 2, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#553';
      ctx.fillRect(Math.floor(scX + sc.size / 2 - 2), scY - 2, 4, sc.size / 2);
      // Glow
      if (sc.type === 'glowcap') {
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05 + scX) * 0.15;
        ctx.fillStyle = '#c080ff';
        ctx.beginPath();
        ctx.arc(scX + sc.size / 2, scY - sc.size / 3, sc.size / 2 + 3, Math.PI, 0);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (sc.type === 'mycelium' || sc.type === 'vine') {
      ctx.strokeStyle = sc.type === 'mycelium' ? '#604080' : '#2a6a2a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(scX, scY);
      ctx.bezierCurveTo(scX + sc.size / 2, scY - sc.size, scX + sc.size, scY - sc.size / 2, scX + sc.size, scY);
      ctx.stroke();
    } else if (sc.type === 'pipe' || sc.type === 'barrel' || sc.type === 'tower') {
      ctx.fillStyle = sc.type === 'pipe' ? '#666' : sc.type === 'barrel' ? '#884' : '#555';
      ctx.fillRect(scX, Math.floor(scY - sc.size / 2), sc.size, Math.floor(sc.size * 0.7));
      if (sc.type === 'tower') {
        ctx.fillStyle = frame % 30 < 15 ? '#f00' : '#400';
        ctx.fillRect(Math.floor(scX + sc.size / 2 - 1), Math.floor(scY - sc.size), 3, 3);
      }
    } else {
      // Original scenery types
      ctx.fillStyle = sc.type === 'tree' || sc.type === 'pine' || sc.type === 'bush' ? '#2a5a2a' :
                      sc.type === 'rock' || sc.type === 'boulder' ? '#555' :
                      sc.type === 'post' || sc.type === 'light' ? '#888' : '#774';
      if (sc.type === 'tree' || sc.type === 'pine') {
        ctx.beginPath();
        ctx.moveTo(scX + sc.size / 2, scY - sc.size);
        ctx.lineTo(scX, scY);
        ctx.lineTo(scX + sc.size, scY);
        ctx.fill();
        ctx.fillStyle = '#531';
        ctx.fillRect(Math.floor(scX + sc.size / 2 - 2), scY, 4, 6);
      } else if (sc.type === 'bush') {
        ctx.beginPath();
        ctx.arc(scX + sc.size / 2, scY, sc.size / 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(scX, Math.floor(scY - sc.size / 2), sc.size, Math.floor(sc.size * 0.7));
      }
    }
  }

  // Hazards
  for (var hi = 0; hi < hazards.length; hi++) {
    var haz = hazards[hi];
    var hx = Math.floor(haz.x);
    var hy = Math.floor(haz.y);
    switch(haz.type) {
      case 'oil':
        ctx.fillStyle = '#220';
        ctx.beginPath();
        ctx.ellipse(hx, hy, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#440';
        ctx.beginPath();
        ctx.ellipse(hx - 2, hy - 1, haz.w / 3, haz.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'pothole':
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.ellipse(hx, hy, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;
      case 'ice':
        ctx.fillStyle = 'rgba(150,200,255,0.5)';
        ctx.beginPath();
        ctx.ellipse(hx, hy, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'tree':
        ctx.fillStyle = '#2a5a1a';
        ctx.beginPath();
        ctx.moveTo(hx, hy - 12);
        ctx.lineTo(hx - 10, hy + 8);
        ctx.lineTo(hx + 10, hy + 8);
        ctx.fill();
        ctx.fillStyle = '#531';
        ctx.fillRect(hx - 2, hy + 8, 4, 5);
        break;
      // PASS 2: New hazard visuals
      case 'gooslick':
        ctx.fillStyle = '#3a5a10';
        ctx.beginPath();
        ctx.ellipse(hx, hy, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#5a8a20';
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.2;
        ctx.beginPath();
        ctx.ellipse(hx + 2, hy - 1, haz.w / 3, haz.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'sporecloud':
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.08 + hx) * 0.2;
        ctx.fillStyle = '#6a8a40';
        for (var sp = 0; sp < 4; sp++) {
          ctx.beginPath();
          ctx.arc(hx + Math.sin(sp * 1.5 + frame * 0.03) * 6,
                  hy + Math.cos(sp * 1.2 + frame * 0.04) * 4,
                  5 + Math.sin(frame * 0.06 + sp) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        break;
      case 'reactordebris':
        ctx.fillStyle = '#555';
        ctx.fillRect(hx - haz.w / 2, hy - haz.h / 2, haz.w, haz.h);
        ctx.fillStyle = '#333';
        ctx.fillRect(hx - haz.w / 2 + 2, hy - haz.h / 2 + 2, haz.w - 4, haz.h - 4);
        // Glow
        ctx.fillStyle = frame % 10 < 5 ? '#0f0' : '#080';
        ctx.fillRect(hx - 2, hy - 2, 4, 4);
        break;
    }
  }

  // Drops (oil/smoke/toxic/spore on ground)
  for (var di = 0; di < drops.length; di++) {
    var dr = drops[di];
    var drx = Math.floor(dr.x);
    var dry = Math.floor(dr.y);
    ctx.globalAlpha = Math.min(1, dr.life / 2);
    if (dr.type === 'oil') {
      ctx.fillStyle = '#330';
      ctx.beginPath();
      ctx.ellipse(drx, dry, dr.w / 2, dr.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (dr.type === 'smoke') {
      ctx.fillStyle = '#888';
      for (var si2 = 0; si2 < 5; si2++) {
        ctx.beginPath();
        ctx.arc(drx + Math.floor(Math.sin(si2 * 1.3) * 8), dry + Math.floor(Math.cos(si2 * 0.9) * 5),
                4 + Math.sin(frame * 0.1 + si2) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (dr.type === 'toxictrail') {
      ctx.fillStyle = '#2a4a0a';
      ctx.beginPath();
      ctx.ellipse(drx, dry, dr.w / 2, dr.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4a8a1a';
      ctx.globalAlpha *= 0.5;
      ctx.beginPath();
      ctx.ellipse(drx, dry, dr.w / 3, dr.h / 3, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (dr.type === 'sporepuddle') {
      ctx.fillStyle = '#3a6a2a';
      ctx.beginPath();
      ctx.ellipse(drx, dry, dr.w / 2, dr.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Pulsing spore effect
      ctx.fillStyle = '#8aff4a';
      ctx.globalAlpha *= (0.3 + Math.sin(frame * 0.1) * 0.2);
      ctx.beginPath();
      ctx.ellipse(drx, dry, dr.w / 3, dr.h / 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Civilians
  for (var ci = 0; ci < civilians.length; ci++) {
    var civ2 = civilians[ci];
    if (!civ2.alive) continue;
    drawCar(Math.floor(civ2.x), Math.floor(civ2.y), civ2.w, civ2.h, civ2.color, false, civ2.speed < 0);
  }

  // Weapon van
  if (weaponVan) {
    var vx = Math.floor(weaponVan.x);
    var vy = Math.floor(weaponVan.y);
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(vx - weaponVan.w / 2, vy - weaponVan.h / 2, weaponVan.w, weaponVan.h);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(vx - weaponVan.w / 2 + 2, vy - weaponVan.h / 2 + 2, weaponVan.w - 4, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SEED', vx, vy + 2);
    if (frame % 20 < 10) {
      ctx.strokeStyle = '#38d973';
      ctx.lineWidth = 1;
      ctx.strokeRect(vx - weaponVan.w / 2 - 2, vy - weaponVan.h / 2 - 2,
                     weaponVan.w + 4, weaponVan.h + 4);
    }
  }

  // Enemies
  for (var ei = 0; ei < enemies.length; ei++) {
    var en2 = enemies[ei];
    var ex = Math.floor(en2.x);
    var ey = Math.floor(en2.y);

    // PASS 2: Boss vehicles
    if (en2.isBoss) {
      drawBoss(ex, ey, en2);
      continue;
    }

    switch(en2.type) {
      case 'roadforce':
        drawCar(ex, ey, en2.w, en2.h, '#111', true, false);
        break;
      case 'bulletproof':
        ctx.fillStyle = '#555';
        ctx.fillRect(ex - en2.w / 2, ey - en2.h / 2, en2.w, en2.h);
        ctx.fillStyle = '#666';
        ctx.fillRect(ex - en2.w / 2 + 1, ey - en2.h / 2, en2.w - 2, en2.h);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.strokeRect(ex - en2.w / 2, ey - en2.h / 2, en2.w, en2.h);
        // Armor plating detail
        ctx.fillStyle = '#777';
        ctx.fillRect(ex - en2.w / 2 + 2, ey - en2.h / 2 + 2, en2.w - 4, 4);
        ctx.fillRect(ex - en2.w / 2 + 2, ey + en2.h / 2 - 6, en2.w - 4, 4);
        break;
      case 'switchblade':
        drawCar(ex, ey, 16, en2.h, '#600', true, false);
        if (en2.bladeOut) {
          ctx.fillStyle = '#aaa';
          ctx.fillRect(ex - 18, ey - 2, 8, 4);
          ctx.fillRect(ex + 10, ey - 2, 8, 4);
          ctx.fillStyle = '#fff';
          ctx.fillRect(ex - 18, ey - 1, 2, 2);
          ctx.fillRect(ex + 16, ey - 1, 2, 2);
        }
        break;
      case 'copter':
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(ex + 3, ey + 15, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.ellipse(ex, ey, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#666';
        ctx.fillRect(ex - 1, ey - 8, 2, 6);
        var rotAngle = frame * 0.4;
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ex - Math.floor(Math.cos(rotAngle) * 12), ey - 8);
        ctx.lineTo(ex + Math.floor(Math.cos(rotAngle) * 12), ey - 8);
        ctx.stroke();
        break;
      case 'enforcer':
        drawCar(ex, ey, en2.w, en2.h, '#303', true, false);
        ctx.fillStyle = '#666';
        ctx.fillRect(ex - 3, ey + en2.h / 2 - 4, 6, 8);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(ex - 1, ey + en2.h / 2 + 2, 2, 5);
        break;
      // PASS 2: Tasern enemy vehicles
      case 'reactortruck':
        drawReactorTruck(ex, ey, en2);
        break;
      case 'sporechopper':
        drawSporeChopper(ex, ey, en2);
        break;
      case 'mycetank':
        drawMyceTank(ex, ey, en2);
        break;
    }
  }

  // Bombs
  for (var bi = 0; bi < bombs.length; bi++) {
    var bm = bombs[bi];
    var bmx = Math.floor(bm.x);
    var bmy = Math.floor(bm.y);
    ctx.fillStyle = bm.isSpore ? '#4a4' : '#f00';
    ctx.beginPath();
    ctx.arc(bmx, bmy, bm.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = frame % 8 < 4 ? (bm.isSpore ? '#0f0' : '#f00') : '#ff0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bmx, Math.floor(bm.targetY), 12, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Enemy bullets
  for (var ebi = 0; ebi < enemyBullets.length; ebi++) {
    var ebul = enemyBullets[ebi];
    ctx.fillStyle = '#f44';
    ctx.fillRect(Math.floor(ebul.x) - 1, Math.floor(ebul.y) - 3, 3, 6);
  }

  // Bullets
  for (var bi2 = 0; bi2 < bullets.length; bi2++) {
    var bul = bullets[bi2];
    var bx = Math.floor(bul.x);
    var by = Math.floor(bul.y);
    if (bul.type === 'missile') {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(bx - 2, by - 5, 4, 10);
      ctx.fillStyle = '#f80';
      ctx.fillRect(bx - 1, by + 3, 2, 4);
    } else if (bul.type === 'spore') {
      ctx.fillStyle = '#8f4';
      ctx.beginPath();
      ctx.arc(bx, by, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#af8';
      ctx.beginPath();
      ctx.arc(bx, by, 1, 0, Math.PI * 2);
      ctx.fill();
    } else if (bul.type === 'reactormissile') {
      ctx.fillStyle = '#0f0';
      ctx.fillRect(bx - 2, by - 6, 4, 12);
      ctx.fillStyle = '#0a0';
      ctx.fillRect(bx - 3, by - 2, 6, 4);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(bx - 1, by + 4, 2, 4);
    } else {
      ctx.fillStyle = '#ff8';
      ctx.fillRect(bx - 1, by - 3, 2, 6);
    }
  }

  // Exhaust particles (PASS 3)
  for (var epi = 0; epi < exhaustParticles.length; epi++) {
    var ep2 = exhaustParticles[epi];
    ctx.globalAlpha = Math.max(0, ep2.life / ep2.maxLife);
    ctx.fillStyle = ep2.color;
    ctx.fillRect(Math.floor(ep2.x), Math.floor(ep2.y), Math.floor(ep2.size), Math.floor(ep2.size));
  }
  ctx.globalAlpha = 1;

  // Player car (PASS 3: improved sprite)
  if (deathTimer <= 0) {
    var blink = invincTimer > 0 && frame % 6 < 3;
    if (!blink) {
      drawPlayerCar(Math.floor(player.x), Math.floor(player.y), playerWidth, playerHeight);
    }
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Boss HP bar
  if (bossActive && bossActive.hp > 0) {
    drawBossHP();
  }

  // Boss warning
  if (bossWarningTimer > 0) {
    ctx.globalAlpha = Math.sin(frame * 0.2) * 0.3 + 0.7;
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING', GW / 2, GH / 2 - 30);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('FUNGAL BOSS INCOMING', GW / 2, GH / 2 - 10);
    ctx.globalAlpha = 1;
  }

  // Zone flash announcement
  if (zoneFlashTimer > 0 && state === 'playing') {
    ctx.globalAlpha = Math.min(1, zoneFlashTimer / 1.5);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ZONE_NAMES[zoneIndex], GW / 2 + 1, GH / 2 - 19);
    ctx.fillStyle = '#fff';
    ctx.fillText(ZONE_NAMES[zoneIndex], GW / 2, GH / 2 - 20);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('STAGE ' + stageNumber, GW / 2, GH / 2 - 4);
    ctx.globalAlpha = 1;
  }

  // Title / game over screens
  if (state === 'title') {
    drawTitleScreen();
  } else if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Garden Path: ' + Math.floor(distance) + 'm' });
  }

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// PASS 3 -- IMPROVED DRAW HELPERS
// ============================================================
function drawCar(x, y, w, h, color, isEnemy, facingDown) {
  x = Math.floor(x);
  y = Math.floor(y);
  // Car body
  ctx.fillStyle = color;
  ctx.fillRect(x - Math.floor(w / 2), y - Math.floor(h / 2), w, h);

  // Windshield
  ctx.fillStyle = isEnemy ? '#600' : '#aaf';
  var windY = facingDown ? y + Math.floor(h / 4) : y - Math.floor(h / 4);
  ctx.fillRect(x - Math.floor(w / 3), windY - 3, Math.floor(w * 0.66), 6);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - Math.floor(w / 2) - 2, y - Math.floor(h / 3), 3, 6);
  ctx.fillRect(x + Math.floor(w / 2) - 1, y - Math.floor(h / 3), 3, 6);
  ctx.fillRect(x - Math.floor(w / 2) - 2, y + Math.floor(h / 4), 3, 6);
  ctx.fillRect(x + Math.floor(w / 2) - 1, y + Math.floor(h / 4), 3, 6);

  // Headlights or taillights
  if (!facingDown) {
    ctx.fillStyle = isEnemy ? '#f00' : '#ff0';
    ctx.fillRect(x - Math.floor(w / 3), y - Math.floor(h / 2), 3, 3);
    ctx.fillRect(x + Math.floor(w / 3) - 3, y - Math.floor(h / 2), 3, 3);
  } else {
    ctx.fillStyle = '#f00';
    ctx.fillRect(x - Math.floor(w / 3), y + Math.floor(h / 2) - 3, 3, 3);
    ctx.fillRect(x + Math.floor(w / 3) - 3, y + Math.floor(h / 2) - 3, 3, 3);
  }
}

function drawPlayerCar(x, y, w, h) {
  x = Math.floor(x);
  y = Math.floor(y);
  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, x, y, Math.max(w, h), { flipX: false, frame: frame })) {
  // Body with stat-based tint
  var bodyColor = statB.color || '#a855f7';
  ctx.fillStyle = bodyColor;
  ctx.fillRect(x - Math.floor(w / 2), y - Math.floor(h / 2), w, h);

  // Cockpit
  ctx.fillStyle = '#3af';
  ctx.fillRect(x - Math.floor(w / 3), y - Math.floor(h / 6), Math.floor(w * 0.66), Math.floor(h * 0.3));

  // Front nose
  ctx.fillStyle = '#5a2a8a';
  ctx.beginPath();
  ctx.moveTo(x - Math.floor(w / 3), y - Math.floor(h / 2));
  ctx.lineTo(x, y - Math.floor(h / 2) - 4);
  ctx.lineTo(x + Math.floor(w / 3), y - Math.floor(h / 2));
  ctx.fill();

  // Spoiler
  ctx.fillStyle = '#1a0a2a';
  ctx.fillRect(x - Math.floor(w / 2) + 1, y + Math.floor(h / 2) - 4, w - 2, 4);

  // Side stripes (speed indication)
  if (player.speed > player.maxSpeed * 0.5) {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.3;
    ctx.fillRect(x - Math.floor(w / 2), y - Math.floor(h / 4), 2, Math.floor(h / 2));
    ctx.fillRect(x + Math.floor(w / 2) - 2, y - Math.floor(h / 4), 2, Math.floor(h / 2));
    ctx.globalAlpha = 1;
  }

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - Math.floor(w / 2) - 2, y - Math.floor(h / 3), 3, 7);
  ctx.fillRect(x + Math.floor(w / 2) - 1, y - Math.floor(h / 3), 3, 7);
  ctx.fillRect(x - Math.floor(w / 2) - 2, y + Math.floor(h / 4), 3, 7);
  ctx.fillRect(x + Math.floor(w / 2) - 1, y + Math.floor(h / 4), 3, 7);

  // Exhaust glow when fast (PASS 3: improved)
  if (player.speed > 150) {
    var exC = frame % 4 < 2 ? '#f80' : '#f40';
    ctx.fillStyle = exC;
    ctx.fillRect(x - 3, y + Math.floor(h / 2) + 1, 2, 3 + Math.floor(player.speed / 100));
    ctx.fillRect(x + 1, y + Math.floor(h / 2) + 1, 2, 3 + Math.floor(player.speed / 100));
  }

  // Headlights
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - Math.floor(w / 3), y - Math.floor(h / 2) - 1, 3, 2);
  ctx.fillRect(x + Math.floor(w / 3) - 3, y - Math.floor(h / 2) - 1, 3, 2);
  }

  // Gun barrel
  if (currentWeapon === 0 || currentWeapon === 1 || currentWeapon === 5) {
    ctx.fillStyle = currentWeapon === 5 ? '#0f0' : '#888';
    ctx.fillRect(x - 1, y - Math.floor(h / 2) - 5, 2, 5);
  }
  // Spore nozzle
  if (currentWeapon === 4) {
    ctx.fillStyle = '#4a4';
    ctx.fillRect(x - 4, y - Math.floor(h / 2) - 3, 3, 3);
    ctx.fillRect(x + 1, y - Math.floor(h / 2) - 3, 3, 3);
  }
}

// ============================================================
// PASS 2 -- TASERN VEHICLE DRAW FUNCTIONS
// ============================================================
function drawReactorTruck(x, y, en) {
  // Reactor Truck: green/dark, boxy, glowing rear
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(x - en.w / 2, y - en.h / 2, en.w, en.h);
  // Cab
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(x - en.w / 2 + 2, y - en.h / 2, en.w - 4, 8);
  // Reactor tank
  ctx.fillStyle = '#0a2a0a';
  ctx.fillRect(x - en.w / 2 + 3, y - en.h / 2 + 10, en.w - 6, en.h - 14);
  // Glowing reactor
  ctx.fillStyle = frame % 6 < 3 ? '#0f0' : '#080';
  ctx.fillRect(x - 3, y + en.h / 2 - 6, 6, 4);
  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - en.w / 2 - 2, y - en.h / 3, 3, 6);
  ctx.fillRect(x + en.w / 2 - 1, y - en.h / 3, 3, 6);
  ctx.fillRect(x - en.w / 2 - 2, y + en.h / 4, 3, 6);
  ctx.fillRect(x + en.w / 2 - 1, y + en.h / 4, 3, 6);
  // Red headlights
  ctx.fillStyle = '#f00';
  ctx.fillRect(x - en.w / 3, y - en.h / 2, 3, 3);
  ctx.fillRect(x + en.w / 3 - 3, y - en.h / 2, 3, 3);
}

function drawSporeChopper(x, y, en) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 15, 8, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body (organic brown-green)
  ctx.fillStyle = '#3a4a2a';
  ctx.beginPath();
  ctx.ellipse(x, y, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Spore pods underneath
  ctx.fillStyle = '#5a8a3a';
  ctx.fillRect(x - 6, y + 4, 4, 4);
  ctx.fillRect(x + 2, y + 4, 4, 4);
  // Mast
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x - 1, y - 9, 2, 6);
  // Rotor (organic, uneven)
  var rot = frame * 0.5;
  ctx.strokeStyle = '#6a8a4a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - Math.floor(Math.cos(rot) * 14), y - 9);
  ctx.lineTo(x + Math.floor(Math.cos(rot) * 14), y - 9);
  ctx.stroke();
  // Spore glow
  ctx.fillStyle = '#8f4';
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.15;
  ctx.beginPath();
  ctx.arc(x, y + 4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawMyceTank(x, y, en) {
  // Large armored mycelial tank
  ctx.fillStyle = '#3a2a4a';
  ctx.fillRect(x - en.w / 2, y - en.h / 2, en.w, en.h);
  // Armor plates
  ctx.fillStyle = '#4a3a5a';
  ctx.fillRect(x - en.w / 2 + 2, y - en.h / 2 + 2, en.w - 4, 6);
  ctx.fillRect(x - en.w / 2 + 2, y + en.h / 2 - 8, en.w - 4, 6);
  // Turret
  ctx.fillStyle = '#5a4a6a';
  ctx.fillRect(x - 5, y - 6, 10, 12);
  // Cannon
  ctx.fillStyle = '#666';
  ctx.fillRect(x - 1, y + 6, 2, 10);
  // Mycelial glow
  ctx.fillStyle = '#a060ff';
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.08) * 0.2;
  ctx.fillRect(x - en.w / 2 + 1, y - 2, en.w - 2, 4);
  ctx.globalAlpha = 1;
  // Treads
  ctx.fillStyle = '#222';
  ctx.fillRect(x - en.w / 2 - 3, y - en.h / 2, 4, en.h);
  ctx.fillRect(x + en.w / 2 - 1, y - en.h / 2, 4, en.h);
  // Tread marks
  ctx.fillStyle = '#333';
  for (var t = 0; t < 5; t++) {
    var ty = y - en.h / 2 + t * Math.floor(en.h / 5);
    ctx.fillRect(x - en.w / 2 - 3, ty, 4, 2);
    ctx.fillRect(x + en.w / 2 - 1, ty, 4, 2);
  }
}

// ============================================================
// PASS 2 -- BOSS DRAW
// ============================================================
function drawBoss(x, y, en) {
  x = Math.floor(x);
  y = Math.floor(y);
  if (en.type === 'reactor_commander') {
    // Large reactor vehicle
    ctx.fillStyle = '#1a4a1a';
    ctx.fillRect(x - en.w / 2, y - en.h / 2, en.w, en.h);
    ctx.fillStyle = '#2a6a2a';
    ctx.fillRect(x - en.w / 2 + 3, y - en.h / 2, en.w - 6, 10);
    // Reactor core
    ctx.fillStyle = frame % 8 < 4 ? '#0f0' : '#0a0';
    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fill();
    // Gun mounts
    ctx.fillStyle = '#888';
    ctx.fillRect(x - en.w / 2 - 4, y - 4, 6, 8);
    ctx.fillRect(x + en.w / 2 - 2, y - 4, 6, 8);
    // Cannon barrels
    ctx.fillStyle = '#aaa';
    ctx.fillRect(x - en.w / 2 - 4, y + 4, 2, 8);
    ctx.fillRect(x + en.w / 2 + 2, y + 4, 2, 8);
  } else if (en.type === 'spore_overlord') {
    // Organic flying boss
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + 4, y + 20, 14, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3a5a2a';
    ctx.beginPath();
    ctx.ellipse(x, y, en.w / 2, en.h / 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Spore sacs
    ctx.fillStyle = '#5a8a3a';
    ctx.beginPath();
    ctx.arc(x - 10, y + 4, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 10, y + 4, 5, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff0';
    ctx.fillRect(x - 5, y - 6, 3, 3);
    ctx.fillRect(x + 2, y - 6, 3, 3);
    // Spore aura
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.05) * 0.1;
    ctx.fillStyle = '#8f4';
    ctx.beginPath();
    ctx.arc(x, y, en.w / 2 + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if (en.type === 'mycelial_juggernaut') {
    // Massive tank
    ctx.fillStyle = '#2a1a3a';
    ctx.fillRect(x - en.w / 2, y - en.h / 2, en.w, en.h);
    // Armor layers
    ctx.fillStyle = '#3a2a4a';
    ctx.fillRect(x - en.w / 2 + 3, y - en.h / 2 + 3, en.w - 6, en.h - 6);
    // Core
    ctx.fillStyle = '#a060ff';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06) * 0.3;
    ctx.beginPath();
    ctx.arc(x, y - 4, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Twin cannons
    ctx.fillStyle = '#666';
    ctx.fillRect(x - 6, y + en.h / 2 - 4, 4, 12);
    ctx.fillRect(x + 2, y + en.h / 2 - 4, 4, 12);
    // Treads
    ctx.fillStyle = '#222';
    ctx.fillRect(x - en.w / 2 - 4, y - en.h / 2, 5, en.h);
    ctx.fillRect(x + en.w / 2 - 1, y - en.h / 2, 5, en.h);
    // Tread marks
    ctx.fillStyle = '#333';
    for (var bt = 0; bt < 7; bt++) {
      var bty = Math.floor(y - en.h / 2 + bt * (en.h / 7));
      ctx.fillRect(x - en.w / 2 - 4, bty, 5, 2);
      ctx.fillRect(x + en.w / 2 - 1, bty, 5, 2);
    }
  }

  // Boss damage flash
  if (en.hp < en.maxHp && frame % 4 < 2) {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - en.w / 2, y - en.h / 2, en.w, en.h);
    ctx.globalAlpha = 1;
  }
}

function drawBossHP() {
  var barW = 160;
  var barH = 8;
  var barX = Math.floor((GW - barW) / 2);
  var barY = 34;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, barH);
  var pct = Math.max(0, bossActive.hp / bossActive.maxHp);
  ctx.fillStyle = pct > 0.5 ? '#f44' : pct > 0.25 ? '#f84' : '#ff4';
  ctx.fillRect(barX, barY, Math.floor(barW * pct), barH);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  var bossName = bossActive.type === 'reactor_commander' ? 'MOLD COMMANDER' :
                 bossActive.type === 'spore_overlord' ? 'SPORE OVERLORD' : 'FUNGI JUGGERNAUT';
  ctx.fillText(bossName, GW / 2, barY - 4);
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, 30);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('SCORE: ' + score, 4, 12);

  // Distance
  ctx.fillStyle = '#3cacd7';
  ctx.fillText(Math.floor(distance) + 'm', 4, 26);

  // Stage number
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('STG ' + stageNumber, 80, 26);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#4d8';
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 12 - i * 14, 3, 10, 5);
    ctx.fillStyle = statB.color || '#a855f7';
    ctx.fillRect(GW - 11 - i * 14, 4, 8, 3);
    ctx.fillStyle = '#4d8';
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(GW - 60, 14, 52, 6);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#4d8' : hpPct > 0.25 ? '#da4' : '#f44';
  ctx.fillRect(GW - 59, 15, Math.floor(50 * hpPct), 4);

  // Speed bar
  ctx.fillStyle = '#333';
  ctx.fillRect(GW - 60, 22, 52, 5);
  var spdPct = player.speed / player.maxSpeed;
  ctx.fillStyle = '#48f';
  ctx.fillRect(GW - 59, 23, Math.floor(50 * spdPct), 3);

  // Weapon indicator (bottom)
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GH - 22, GW, 22);
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  var weaponText = WEAPON_NAMES[currentWeapon];
  if (currentWeapon === 1) weaponText += ' x' + missileAmmo;
  if (currentWeapon === 2) weaponText += ' x' + oilAmmo;
  if (currentWeapon === 3) weaponText += ' x' + smokeAmmo;
  if (currentWeapon === 4) weaponText += ' x' + sporeAmmo;
  if (currentWeapon === 5) weaponText += ' x' + reactorMissileAmmo;
  ctx.fillText(weaponText, GW / 2, GH - 8);

  // Zone indicator
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(ZONE_NAMES[zoneIndex], 4, GH - 8);

  // High score
  if (highScore > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    ctx.fillText('HI: ' + highScore, GW - 4, GH - 8);
  }
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Dim background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE HUNTER', GW / 2 + 2, 72);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE HUNTER', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Tale', GW / 2, 95);

  // Car preview
  drawPlayerCar(GW / 2, 145, 24, 36);

  // NES-style controls (PASS 3)
  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('D-PAD / ARROWS - Steer & Speed', GW / 2, 190);
  ctx.fillText('A / Z / SPACE - Fire Weapon', GW / 2, 205);
  ctx.fillText('B / X - Switch Weapon', GW / 2, 220);
  ctx.fillText('Drive into SEED VAN for upgrades', GW / 2, 240);

  // Enemy types (PASS 2: includes Tasern enemies)
  ctx.fillStyle = '#7a444a';
  ctx.font = '9px monospace';
  ctx.fillText('Fungal Enemies:', GW / 2, 265);
  ctx.fillStyle = '#666';
  ctx.fillText('Mold Car - Armored Truffle - Blade Beetle', GW / 2, 279);
  ctx.fillText('Toxic Enforcer - Fungi Copter', GW / 2, 293);
  ctx.fillStyle = '#38d973';
  ctx.fillText('Reactor Hauler - Spore Chopper', GW / 2, 307);
  ctx.fillText('Mycelial Tank', GW / 2, 321);

  // Stat bonuses display
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#4d8';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(statB.name + ' Lv.' + statB.level + ' BONUSES ACTIVE', GW / 2, 345);
  }

  // Warning
  ctx.fillStyle = '#e6482e';
  ctx.font = '9px monospace';
  ctx.fillText('DO NOT HIT FRIENDLY BASELINGS!', GW / 2, 365);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 395);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS START', GW / 2, 430);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
