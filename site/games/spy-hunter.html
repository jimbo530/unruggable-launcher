<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spy Hunter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'GAS', b: 'FIRE' } });

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('spyhunter_hi');
var lives = 3;
var frame = 0;
var distance = 0;
var zoneTimer = 0;
var zoneIndex = 0;
var difficulty = 1;
var invincTimer = 0;
var deathTimer = 0;
var weaponVanTimer = 0;

// Zones cycle
var ZONES = ['highway', 'country', 'bridge', 'mountain', 'night'];
var ZONE_NAMES = ['HIGHWAY', 'COUNTRY ROAD', 'BRIDGE', 'MOUNTAIN PASS', 'NIGHT MODE'];
var zoneFlashTimer = 0;

// Road state
var roadOffset = 0;
var roadCurve = 0;
var roadCurveTarget = 0;
var roadWidth = 200;
var roadWidthTarget = 200;
var roadCenterX = GW / 2;
var roadCenterTarget = GW / 2;
var laneCount = 4;

// Player
var player = { x: GW / 2, y: GH - 80, speed: 0, maxSpeed: 280, hp: 3, maxHp: 3 };
var playerWidth = 18, playerHeight = 28;
var steering = 0;

// Weapons
var WEAPONS = ['machinegun', 'missile', 'oilslick', 'smokescreen'];
var WEAPON_NAMES = ['MACHINE GUN', 'MISSILES', 'OIL SLICK', 'SMOKE SCREEN'];
var currentWeapon = 0;
var missileAmmo = 5;
var oilAmmo = 3;
var smokeAmmo = 3;
var fireTimer = 0;
var fireCooldown = 0;

// Bullets
var bullets = [];
// Dropped items (oil, smoke)
var drops = [];
// Enemies
var enemies = [];
// Civilians
var civilians = [];
// Hazards
var hazards = [];
// Weapon van
var weaponVan = null;
// Road scenery
var scenery = [];
// Enemy bullets (from enforcer)
var enemyBullets = [];
// Bombs (from copter)
var bombs = [];

// Spawn timers
var enemySpawnTimer = 0;
var civilianSpawnTimer = 0;
var hazardSpawnTimer = 0;
var scenerySpawnTimer = 0;

// Road segments for curves
var roadSegments = [];
var SEGMENT_COUNT = 60;

// Colors per zone
function getZoneColors() {
  switch(ZONES[zoneIndex]) {
    case 'highway': return { road: '#333', line: '#fff', shoulder: '#555', grass: '#1a5c1a', sky: '#112' };
    case 'country': return { road: '#3a3a2a', line: '#ddd', shoulder: '#5a4a2a', grass: '#2a6a1a', sky: '#0a1a0a' };
    case 'bridge': return { road: '#444', line: '#ff0', shoulder: '#666', grass: '#1a3a6a', sky: '#0a0a2a' };
    case 'mountain': return { road: '#2a2a2a', line: '#fff', shoulder: '#4a3a2a', grass: '#3a3a3a', sky: '#1a0a1a' };
    case 'night': return { road: '#1a1a1a', line: '#555', shoulder: '#222', grass: '#0a1a0a', sky: '#000' };
    default: return { road: '#333', line: '#fff', shoulder: '#555', grass: '#1a5c1a', sky: '#112' };
  }
}

function getRoadWidth() {
  switch(ZONES[zoneIndex]) {
    case 'highway': return 210;
    case 'country': return 170;
    case 'bridge': return 120;
    case 'mountain': return 150;
    case 'night': return 190;
    default: return 200;
  }
}

// === INIT ===
function initRoadSegments() {
  roadSegments = [];
  for (var i = 0; i < SEGMENT_COUNT; i++) {
    roadSegments.push({ curve: 0, width: roadWidth });
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  distance = 0;
  frame = 0;
  zoneTimer = 0;
  zoneIndex = 0;
  difficulty = 1;
  invincTimer = 0;
  deathTimer = 0;
  player.x = GW / 2;
  player.y = GH - 80;
  player.speed = 0;
  player.hp = 3;
  currentWeapon = 0;
  missileAmmo = 5;
  oilAmmo = 3;
  smokeAmmo = 3;
  fireTimer = 0;
  fireCooldown = 0;
  roadCurve = 0;
  roadCurveTarget = 0;
  roadWidth = getRoadWidth();
  roadWidthTarget = roadWidth;
  roadCenterX = GW / 2;
  roadCenterTarget = GW / 2;
  steering = 0;
  bullets = [];
  drops = [];
  enemies = [];
  civilians = [];
  hazards = [];
  weaponVan = null;
  weaponVanTimer = 8;
  scenery = [];
  enemyBullets = [];
  bombs = [];
  enemySpawnTimer = 2;
  civilianSpawnTimer = 1.5;
  hazardSpawnTimer = 4;
  scenerySpawnTimer = 0;
  zoneFlashTimer = 0;
  TAS.particles.clear();
  initRoadSegments();
}

// === HELPERS ===
function getRoadLeft(y) {
  var t = 1 - (y / GH);
  var perspective = 0.5 + t * 0.5;
  var w = roadWidth * perspective;
  var cx = roadCenterX + roadCurve * t * t * 80;
  return cx - w / 2;
}

function getRoadRight(y) {
  var t = 1 - (y / GH);
  var perspective = 0.5 + t * 0.5;
  var w = roadWidth * perspective;
  var cx = roadCenterX + roadCurve * t * t * 80;
  return cx + w / 2;
}

function getRoadCenterAt(y) {
  var t = 1 - (y / GH);
  return roadCenterX + roadCurve * t * t * 80;
}

function getRoadWidthAt(y) {
  var t = 1 - (y / GH);
  return roadWidth * (0.5 + t * 0.5);
}

function isOnRoad(x, y, margin) {
  margin = margin || 0;
  var left = getRoadLeft(y) - margin;
  var right = getRoadRight(y) + margin;
  return x >= left && x <= right;
}

function getLaneX(lane, y) {
  var left = getRoadLeft(y);
  var right = getRoadRight(y);
  var w = right - left;
  return left + w * (lane + 0.5) / laneCount;
}

// === SPAWNERS ===
function spawnEnemy() {
  var types = ['roadforce', 'roadforce', 'enforcer'];
  if (difficulty > 1.5) types.push('bulletproof', 'switchblade');
  if (difficulty > 2.5) types.push('copter');
  var type = types[TAS.math.randInt(0, types.length - 1)];
  var lane = TAS.math.randInt(0, laneCount - 1);
  var e = {
    type: type,
    x: getLaneX(lane, 0),
    y: -40,
    lane: lane,
    speed: TAS.math.randRange(100, 160) * difficulty * 0.7,
    hp: type === 'bulletproof' ? 3 : 1,
    w: 16, h: 26,
    timer: 0,
    swerveDir: Math.random() < 0.5 ? -1 : 1,
    bladeOut: false
  };
  if (type === 'copter') {
    e.y = -30;
    e.speed = TAS.math.randRange(60, 100);
    e.w = 20;
    e.h = 20;
    e.bombTimer = 2;
  }
  if (type === 'switchblade') {
    e.w = 22;
    e.bladeTimer = 0;
  }
  enemies.push(e);
}

function spawnCivilian() {
  var lane = TAS.math.randInt(0, laneCount - 1);
  var fromTop = Math.random() < 0.7;
  civilians.push({
    x: getLaneX(lane, fromTop ? 0 : GH),
    y: fromTop ? -30 : GH + 30,
    lane: lane,
    speed: fromTop ? TAS.math.randRange(60, 100) : TAS.math.randRange(-80, -40),
    w: 14, h: 24,
    color: ['#33aa55', '#3377cc', '#cc7733', '#aa33aa', '#aaaa33'][TAS.math.randInt(0, 4)],
    alive: true
  });
}

function spawnHazard() {
  var types = ['oil', 'pothole', 'ice', 'tree'];
  var type = types[TAS.math.randInt(0, types.length - 1)];
  var lane = TAS.math.randInt(0, laneCount - 1);
  hazards.push({
    type: type,
    x: getLaneX(lane, 0),
    y: -20,
    w: type === 'tree' ? 20 : 16,
    h: type === 'tree' ? 20 : 12,
    lane: lane,
    hp: type === 'tree' ? 2 : 99
  });
}

function spawnWeaponVan() {
  weaponVan = {
    x: getRoadLeft(0) - 20,
    y: -50,
    w: 22, h: 34,
    speed: 80
  };
}

function spawnScenery() {
  var side = Math.random() < 0.5 ? 'left' : 'right';
  var types = ['tree', 'bush', 'rock', 'sign'];
  if (ZONES[zoneIndex] === 'bridge') types = ['post', 'light'];
  if (ZONES[zoneIndex] === 'mountain') types = ['rock', 'boulder', 'pine'];
  scenery.push({
    type: types[TAS.math.randInt(0, types.length - 1)],
    side: side,
    y: -20,
    size: TAS.math.randRange(8, 16)
  });
}

// === FIRE WEAPON ===
function fireWeapon() {
  if (fireCooldown > 0) return;
  switch(currentWeapon) {
    case 0: // machine gun
      bullets.push({ x: player.x - 3, y: player.y - playerHeight / 2, vy: -400, type: 'bullet' });
      bullets.push({ x: player.x + 3, y: player.y - playerHeight / 2, vy: -400, type: 'bullet' });
      fireCooldown = 0.1;
      TAS.audio.playNoise(0.03, 0.06, 3000);
      break;
    case 1: // missile
      if (missileAmmo > 0) {
        missileAmmo--;
        bullets.push({ x: player.x, y: player.y - playerHeight / 2, vy: -500, type: 'missile', pierce: true });
        fireCooldown = 0.4;
        TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 50);
      }
      break;
    case 2: // oil slick
      if (oilAmmo > 0) {
        oilAmmo--;
        drops.push({ x: player.x, y: player.y + playerHeight / 2 + 5, type: 'oil', life: 6, w: 14, h: 10 });
        fireCooldown = 0.5;
        TAS.audio.playNoise(0.1, 0.04, 800);
      }
      break;
    case 3: // smoke screen
      if (smokeAmmo > 0) {
        smokeAmmo--;
        drops.push({ x: player.x, y: player.y + playerHeight / 2 + 5, type: 'smoke', life: 4, w: 30, h: 20 });
        fireCooldown = 0.6;
        TAS.audio.playNoise(0.2, 0.03, 400);
      }
      break;
  }
}

// === DAMAGE PLAYER ===
function damagePlayer(amount) {
  if (invincTimer > 0) return;
  player.hp -= amount;
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#f00', 0.3);
  TAS.audio.playNoise(0.2, 0.1, 1500);
  if (player.hp <= 0) {
    killPlayer();
  } else {
    invincTimer = 1.0;
  }
}

function killPlayer() {
  lives--;
  TAS.particles.spawn(player.x, player.y, '#ff4400', 20, 4, { size: 3, gravity: 0.5 });
  TAS.particles.spawn(player.x, player.y, '#ffaa00', 15, 3, { size: 2 });
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#fff', 0.5);
  TAS.audio.playNoise(0.5, 0.15, 2000);
  TAS.audio.playTone(100, 0.4, 'sawtooth', 0.1, 40);
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('spyhunter_hi', highScore);
    }
  } else {
    deathTimer = 2.0;
    player.hp = player.maxHp;
    player.speed = 0;
    invincTimer = 3.0;
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    roadOffset += dt * 100;
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.keys['z'] ||
        TAS.input.keys['Z'] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (TAS.input.keys['Space'] || TAS.input.keys['Enter'] ||
        TAS.input.touch.a || TAS.input.touch.b)) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Death respawn timer
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      player.x = GW / 2;
      player.y = GH - 80;
    }
    return;
  }

  // Invincibility timer
  if (invincTimer > 0) invincTimer -= dt;
  if (fireCooldown > 0) fireCooldown -= dt;

  // --- INPUT ---
  var accel = 0;
  var steerInput = 0;
  var firing = false;

  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left) steerInput -= 1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right) steerInput += 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.a || TAS.input.touch.up) accel = 1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down) accel = -1;
  if (TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.keys['z'] || TAS.input.touch.b) firing = true;

  // Speed
  if (accel > 0) {
    player.speed = Math.min(player.speed + 300 * dt, player.maxSpeed);
  } else if (accel < 0) {
    player.speed = Math.max(player.speed - 400 * dt, 40);
  } else {
    player.speed = Math.max(player.speed - 80 * dt, 80);
  }

  // Steering
  var steerSpeed = 160 + player.speed * 0.3;
  steering = TAS.math.lerp(steering, steerInput, dt * 8);
  player.x += steering * steerSpeed * dt;

  // Road curve pushes player
  player.x -= roadCurve * player.speed * 0.003;

  // Clamp to screen
  player.x = TAS.math.clamp(player.x, 10, GW - 10);

  // Check if on road
  if (!isOnRoad(player.x, player.y, 5)) {
    // Off road - slow down and take damage at high speed
    player.speed *= 0.95;
    if (player.speed > 180) {
      damagePlayer(3); // instant death at high speed off road
    }
  }

  // Distance / score
  var scrollSpeed = player.speed * dt;
  distance += scrollSpeed;
  score = Math.floor(distance / 10);

  // --- ROAD CURVES ---
  zoneTimer += dt;
  if (zoneTimer >= 60) {
    zoneTimer = 0;
    zoneIndex = (zoneIndex + 1) % ZONES.length;
    roadWidthTarget = getRoadWidth();
    zoneFlashTimer = 3;
    difficulty += 0.3;
  }
  if (zoneFlashTimer > 0) zoneFlashTimer -= dt;

  // Curve changes
  if (Math.random() < dt * 0.3) {
    roadCurveTarget = TAS.math.randRange(-1.5, 1.5) * difficulty * 0.5;
    if (ZONES[zoneIndex] === 'mountain') roadCurveTarget *= 1.5;
    if (ZONES[zoneIndex] === 'highway') roadCurveTarget *= 0.4;
  }
  roadCurve = TAS.math.lerp(roadCurve, roadCurveTarget, dt * 0.8);
  roadWidth = TAS.math.lerp(roadWidth, roadWidthTarget, dt * 2);
  roadCenterX = TAS.math.lerp(roadCenterX, roadCenterTarget, dt * 1.5);

  // Occasionally shift center
  if (Math.random() < dt * 0.1) {
    roadCenterTarget = GW / 2 + TAS.math.randRange(-30, 30);
  }

  // Difficulty scaling
  difficulty = 1 + distance / 5000;

  // Road offset for visual scroll
  roadOffset += scrollSpeed;

  // --- FIRE ---
  if (firing) {
    fireWeapon();
  }

  // --- WEAPON VAN ---
  weaponVanTimer -= dt;
  if (weaponVanTimer <= 0 && !weaponVan) {
    spawnWeaponVan();
    weaponVanTimer = TAS.math.randRange(15, 25);
  }
  if (weaponVan) {
    weaponVan.y += weaponVan.speed * dt;
    // Position van on road shoulder
    weaponVan.x = getRoadRight(weaponVan.y) + 15;
    if (weaponVan.y > GH + 50) {
      weaponVan = null;
    } else if (TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      weaponVan.x - weaponVan.w / 2, weaponVan.y - weaponVan.h / 2, weaponVan.w, weaponVan.h
    )) {
      // Pick up weapon
      currentWeapon = (currentWeapon + 1) % WEAPONS.length;
      if (currentWeapon === 1) missileAmmo += 5;
      if (currentWeapon === 2) oilAmmo += 3;
      if (currentWeapon === 3) smokeAmmo += 3;
      invincTimer = Math.max(invincTimer, 2.0);
      weaponVan = null;
      TAS.audio.playMelody([[880, 0.08], [1100, 0.08], [1320, 0.12]], 80);
      TAS.particles.spawn(player.x, player.y, '#0ff', 10, 2, { size: 2 });
    }
  }

  // --- BULLETS ---
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.y += b.vy * dt;
    if (b.y < -20 || b.y > GH + 20) { bullets.splice(i, 1); continue; }

    // Hit enemies
    var hitSomething = false;
    for (var j = enemies.length - 1; j >= 0; j--) {
      var e = enemies[j];
      if (TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
        e.hp--;
        if (e.hp <= 0) {
          score += e.type === 'bulletproof' ? 50 : e.type === 'copter' ? 75 : 25;
          TAS.particles.spawn(e.x, e.y, '#ff6600', 12, 3, { size: 2, gravity: 0.3 });
          TAS.audio.playNoise(0.15, 0.08, 2000);
          enemies.splice(j, 1);
        } else {
          TAS.particles.spawn(e.x, e.y, '#fff', 4, 2, { size: 1 });
        }
        if (!b.pierce) hitSomething = true;
        break;
      }
    }
    // Hit hazard trees
    if (!hitSomething) {
      for (var j2 = hazards.length - 1; j2 >= 0; j2--) {
        var h = hazards[j2];
        if (h.type === 'tree' && TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, h.x - h.w / 2, h.y - h.h / 2, h.w, h.h)) {
          h.hp--;
          if (h.hp <= 0) {
            TAS.particles.spawn(h.x, h.y, '#4a2', 8, 2, { size: 2 });
            hazards.splice(j2, 1);
          }
          hitSomething = true;
          break;
        }
      }
    }
    // Hit civilians (penalty!)
    if (!hitSomething) {
      for (var j3 = civilians.length - 1; j3 >= 0; j3--) {
        var c = civilians[j3];
        if (c.alive && TAS.hit.rectOverlap(b.x - 2, b.y - 3, 4, 6, c.x - c.w / 2, c.y - c.h / 2, c.w, c.h)) {
          c.alive = false;
          score = Math.max(0, score - 100);
          TAS.particles.spawn(c.x, c.y, '#f00', 8, 2, { size: 2 });
          TAS.fx.flash('#f00', 0.2);
          TAS.audio.playTone(200, 0.3, 'sine', 0.08, 100);
          hitSomething = true;
          break;
        }
      }
    }
    if (hitSomething && !b.pierce) bullets.splice(i, 1);
  }

  // --- ENEMY BULLETS ---
  for (var i2 = enemyBullets.length - 1; i2 >= 0; i2--) {
    var eb = enemyBullets[i2];
    eb.y += eb.vy * dt;
    eb.x += (eb.vx || 0) * dt;
    if (eb.y > GH + 20 || eb.y < -20) { enemyBullets.splice(i2, 1); continue; }
    if (TAS.hit.rectOverlap(eb.x - 2, eb.y - 2, 4, 4,
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight)) {
      damagePlayer(1);
      enemyBullets.splice(i2, 1);
    }
  }

  // --- BOMBS ---
  for (var i3 = bombs.length - 1; i3 >= 0; i3--) {
    var bomb = bombs[i3];
    bomb.y += bomb.vy * dt;
    bomb.size += dt * 10;
    if (bomb.y >= bomb.targetY) {
      // Explode
      TAS.particles.spawn(bomb.x, bomb.y, '#ff4400', 15, 4, { size: 3, gravity: 0.5 });
      TAS.audio.playNoise(0.3, 0.12, 1200);
      if (TAS.math.dist(bomb.x, bomb.y, player.x, player.y) < 30) {
        damagePlayer(1);
      }
      bombs.splice(i3, 1);
    }
  }

  // --- DROPS (oil/smoke) ---
  for (var i4 = drops.length - 1; i4 >= 0; i4--) {
    var d = drops[i4];
    d.y += scrollSpeed * 0.3;
    d.life -= dt;
    if (d.life <= 0 || d.y > GH + 30) { drops.splice(i4, 1); continue; }

    // Check enemies hitting drops
    for (var j4 = enemies.length - 1; j4 >= 0; j4--) {
      var e2 = enemies[j4];
      if (e2.type === 'copter') continue;
      if (TAS.hit.rectOverlap(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h,
        e2.x - e2.w / 2, e2.y - e2.h / 2, e2.w, e2.h)) {
        if (d.type === 'oil') {
          // Spin out
          e2.hp = 0;
          score += 20;
          TAS.particles.spawn(e2.x, e2.y, '#440', 8, 3, { size: 2 });
          enemies.splice(j4, 1);
        } else if (d.type === 'smoke') {
          // Lose tracking, drift off
          e2.swerveDir = Math.random() < 0.5 ? -3 : 3;
          e2.speed *= 0.5;
        }
      }
    }
  }

  // --- ENEMIES ---
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = TAS.math.randRange(1.5, 3.5) / difficulty;
  }

  for (var i5 = enemies.length - 1; i5 >= 0; i5--) {
    var en = enemies[i5];
    en.timer += dt;

    if (en.type === 'copter') {
      // Copter flies independently
      en.y += en.speed * dt;
      en.x = TAS.math.lerp(en.x, player.x, dt * 0.8);
      en.bombTimer -= dt;
      if (en.bombTimer <= 0) {
        en.bombTimer = TAS.math.randRange(1.5, 3.0);
        bombs.push({ x: en.x, y: en.y, vy: 200, targetY: player.y, size: 3 });
        TAS.audio.playTone(400, 0.1, 'sine', 0.05, 200);
      }
    } else {
      // Ground vehicles scroll with road
      en.y += (en.speed - player.speed * 0.3) * dt;

      // AI behavior
      if (en.type === 'roadforce') {
        // Try to sideswipe player
        if (Math.abs(en.y - player.y) < 100) {
          en.x = TAS.math.lerp(en.x, player.x, dt * 2);
        }
      } else if (en.type === 'bulletproof') {
        // Aggressive weaving
        en.x += Math.sin(en.timer * 3) * 80 * dt;
      } else if (en.type === 'switchblade') {
        // Drive near then extend blades
        if (Math.abs(en.y - player.y) < 60) {
          en.bladeOut = true;
          en.w = 36;
        } else {
          en.bladeOut = false;
          en.w = 22;
        }
        en.x = TAS.math.lerp(en.x, player.x, dt * 1.5);
      } else if (en.type === 'enforcer') {
        // Shoot backward at player
        if (en.timer > 1.5 && en.y < player.y - 40) {
          en.timer = 0;
          enemyBullets.push({ x: en.x, y: en.y + en.h / 2, vy: 250, vx: 0 });
          TAS.audio.playTone(600, 0.05, 'square', 0.04);
        }
      }

      // Apply swerve
      en.x += en.swerveDir * 20 * dt;
    }

    // Remove if off screen
    if (en.y > GH + 60 || en.y < -80) { enemies.splice(i5, 1); continue; }

    // Collision with player
    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      en.x - en.w / 2, en.y - en.h / 2, en.w, en.h)) {
      damagePlayer(1);
      en.hp--;
      if (en.hp <= 0) {
        TAS.particles.spawn(en.x, en.y, '#ff6600', 8, 3, { size: 2 });
        enemies.splice(i5, 1);
      }
    }
  }

  // --- CIVILIANS ---
  civilianSpawnTimer -= dt;
  if (civilianSpawnTimer <= 0) {
    spawnCivilian();
    civilianSpawnTimer = TAS.math.randRange(2, 4) / difficulty;
  }

  for (var i6 = civilians.length - 1; i6 >= 0; i6--) {
    var civ = civilians[i6];
    civ.y += (civ.speed - player.speed * 0.3) * dt;
    if (civ.y > GH + 50 || civ.y < -50) { civilians.splice(i6, 1); continue; }
    if (!civ.alive) { civilians.splice(i6, 1); continue; }

    // Collision with player
    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      civ.x - civ.w / 2, civ.y - civ.h / 2, civ.w, civ.h)) {
      score = Math.max(0, score - 50);
      damagePlayer(1);
      civ.alive = false;
      TAS.particles.spawn(civ.x, civ.y, civ.color, 8, 2, { size: 2 });
    }
  }

  // --- HAZARDS ---
  hazardSpawnTimer -= dt;
  if (hazardSpawnTimer <= 0) {
    spawnHazard();
    hazardSpawnTimer = TAS.math.randRange(3, 6) / difficulty;
  }

  for (var i7 = hazards.length - 1; i7 >= 0; i7--) {
    var hz = hazards[i7];
    hz.y += scrollSpeed * 0.8;
    if (hz.y > GH + 30) { hazards.splice(i7, 1); continue; }

    if (invincTimer <= 0 && TAS.hit.rectOverlap(
      player.x - playerWidth / 2, player.y - playerHeight / 2, playerWidth, playerHeight,
      hz.x - hz.w / 2, hz.y - hz.h / 2, hz.w, hz.h)) {
      switch(hz.type) {
        case 'oil':
          // Slide
          player.x += (Math.random() < 0.5 ? -1 : 1) * 40;
          TAS.audio.playNoise(0.1, 0.04, 600);
          break;
        case 'pothole':
          if (player.speed > 150) damagePlayer(1);
          player.speed *= 0.6;
          TAS.audio.playNoise(0.08, 0.06, 1000);
          break;
        case 'ice':
          steering += (Math.random() < 0.5 ? -1 : 1) * 0.5;
          break;
        case 'tree':
          damagePlayer(1);
          player.speed *= 0.3;
          hz.hp = 0;
          TAS.particles.spawn(hz.x, hz.y, '#4a2', 10, 2, { size: 2 });
          break;
      }
      if (hz.type !== 'tree') hazards.splice(i7, 1);
      else if (hz.hp <= 0) hazards.splice(i7, 1);
    }
  }

  // --- SCENERY ---
  scenerySpawnTimer -= dt;
  if (scenerySpawnTimer <= 0) {
    spawnScenery();
    scenerySpawnTimer = TAS.math.randRange(0.1, 0.4);
  }
  for (var i8 = scenery.length - 1; i8 >= 0; i8--) {
    scenery[i8].y += scrollSpeed * 0.9;
    if (scenery[i8].y > GH + 30) scenery.splice(i8, 1);
  }

  // --- ENGINE SOUND ---
  if (frame % 12 === 0) {
    var pitch = 40 + player.speed * 0.3;
    TAS.audio.playTone(pitch, 0.15, 'sawtooth', 0.015);
  }
}

// === DRAW ===
function draw(dt) {
  var colors = getZoneColors();

  // Sky / background
  ctx.fillStyle = colors.sky;
  ctx.fillRect(0, 0, GW, GH);

  // Draw road with perspective
  var segH = GH / 40;
  for (var i = 0; i < 40; i++) {
    var y = i * segH;
    var t = 1 - (y / GH);
    var perspective = 0.5 + t * 0.5;
    var w = roadWidth * perspective;
    var cx = roadCenterX + roadCurve * t * t * 80;
    var left = cx - w / 2;
    var right = cx + w / 2;

    // Grass / off-road
    ctx.fillStyle = colors.grass;
    ctx.fillRect(0, y, left, segH + 1);
    ctx.fillRect(right, y, GW - right, segH + 1);

    // Shoulder
    ctx.fillStyle = colors.shoulder;
    ctx.fillRect(left, y, 6 * perspective, segH + 1);
    ctx.fillRect(right - 6 * perspective, y, 6 * perspective, segH + 1);

    // Road
    ctx.fillStyle = colors.road;
    ctx.fillRect(left + 6 * perspective, y, w - 12 * perspective, segH + 1);

    // Lane lines (dashed)
    var dashOffset = (roadOffset * 0.5) % 20;
    var segY = y + dashOffset;
    if ((Math.floor((y + roadOffset) / 10)) % 2 === 0) {
      ctx.fillStyle = colors.line;
      for (var lane = 1; lane < laneCount; lane++) {
        var lx = left + (w / laneCount) * lane;
        ctx.fillRect(lx - 1, y, 2 * perspective, segH * 0.6);
      }
    }

    // Center line (solid yellow for highway/country)
    if (ZONES[zoneIndex] !== 'bridge') {
      ctx.fillStyle = '#aa0';
      var centerLine = cx;
      ctx.fillRect(centerLine - 1.5 * perspective, y, 3 * perspective, segH + 1);
    }
  }

  // Night mode visibility cone
  if (ZONES[zoneIndex] === 'night') {
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalCompositeOperation = 'lighter';
    var grd = ctx.createRadialGradient(player.x, player.y - 60, 10, player.x, player.y - 20, 140);
    grd.addColorStop(0, 'rgba(255,255,200,0.7)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, GW, GH);
    ctx.restore();
  }

  ctx.save();
  TAS.fx.applyShake();

  // Scenery
  for (var s = 0; s < scenery.length; s++) {
    var sc = scenery[s];
    var scX = sc.side === 'left' ? getRoadLeft(sc.y) - sc.size - 5 : getRoadRight(sc.y) + 5;
    ctx.fillStyle = sc.type === 'tree' || sc.type === 'pine' || sc.type === 'bush' ? '#2a5a2a' :
                    sc.type === 'rock' || sc.type === 'boulder' ? '#555' :
                    sc.type === 'post' || sc.type === 'light' ? '#888' : '#774';
    if (sc.type === 'tree' || sc.type === 'pine') {
      ctx.beginPath();
      ctx.moveTo(scX + sc.size / 2, sc.y - sc.size);
      ctx.lineTo(scX, sc.y);
      ctx.lineTo(scX + sc.size, sc.y);
      ctx.fill();
      ctx.fillStyle = '#531';
      ctx.fillRect(scX + sc.size / 2 - 2, sc.y, 4, 6);
    } else if (sc.type === 'bush') {
      ctx.beginPath();
      ctx.arc(scX + sc.size / 2, sc.y, sc.size / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(scX, sc.y - sc.size / 2, sc.size, sc.size * 0.7);
    }
  }

  // Hazards
  for (var hi = 0; hi < hazards.length; hi++) {
    var haz = hazards[hi];
    switch(haz.type) {
      case 'oil':
        ctx.fillStyle = '#220';
        ctx.beginPath();
        ctx.ellipse(haz.x, haz.y, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#440';
        ctx.beginPath();
        ctx.ellipse(haz.x - 2, haz.y - 1, haz.w / 3, haz.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'pothole':
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.ellipse(haz.x, haz.y, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;
      case 'ice':
        ctx.fillStyle = 'rgba(150,200,255,0.5)';
        ctx.beginPath();
        ctx.ellipse(haz.x, haz.y, haz.w / 2, haz.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'tree':
        ctx.fillStyle = '#2a5a1a';
        ctx.beginPath();
        ctx.moveTo(haz.x, haz.y - 12);
        ctx.lineTo(haz.x - 10, haz.y + 8);
        ctx.lineTo(haz.x + 10, haz.y + 8);
        ctx.fill();
        ctx.fillStyle = '#531';
        ctx.fillRect(haz.x - 2, haz.y + 8, 4, 5);
        break;
    }
  }

  // Drops (oil/smoke on ground)
  for (var di = 0; di < drops.length; di++) {
    var dr = drops[di];
    ctx.globalAlpha = Math.min(1, dr.life / 2);
    if (dr.type === 'oil') {
      ctx.fillStyle = '#330';
      ctx.beginPath();
      ctx.ellipse(dr.x, dr.y, dr.w / 2, dr.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#888';
      for (var si = 0; si < 5; si++) {
        ctx.beginPath();
        ctx.arc(dr.x + Math.sin(si * 1.3) * 8, dr.y + Math.cos(si * 0.9) * 5,
                4 + Math.sin(frame * 0.1 + si) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  // Civilians
  for (var ci = 0; ci < civilians.length; ci++) {
    var civ2 = civilians[ci];
    if (!civ2.alive) continue;
    drawCar(civ2.x, civ2.y, civ2.w, civ2.h, civ2.color, false, civ2.speed < 0);
  }

  // Weapon van
  if (weaponVan) {
    ctx.fillStyle = '#226';
    ctx.fillRect(weaponVan.x - weaponVan.w / 2, weaponVan.y - weaponVan.h / 2, weaponVan.w, weaponVan.h);
    ctx.fillStyle = '#55f';
    ctx.fillRect(weaponVan.x - weaponVan.w / 2 + 2, weaponVan.y - weaponVan.h / 2 + 2, weaponVan.w - 4, 8);
    ctx.fillStyle = '#fff';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WPN', weaponVan.x, weaponVan.y + 2);
    // Flashing indicator
    if (frame % 20 < 10) {
      ctx.strokeStyle = '#0ff';
      ctx.lineWidth = 1;
      ctx.strokeRect(weaponVan.x - weaponVan.w / 2 - 2, weaponVan.y - weaponVan.h / 2 - 2,
                     weaponVan.w + 4, weaponVan.h + 4);
    }
  }

  // Enemies
  for (var ei = 0; ei < enemies.length; ei++) {
    var en2 = enemies[ei];
    switch(en2.type) {
      case 'roadforce':
        drawCar(en2.x, en2.y, en2.w, en2.h, '#111', true, false);
        break;
      case 'bulletproof':
        ctx.fillStyle = '#333';
        ctx.fillRect(en2.x - en2.w / 2, en2.y - en2.h / 2, en2.w, en2.h);
        ctx.fillStyle = '#555';
        ctx.fillRect(en2.x - en2.w / 2 + 2, en2.y - en2.h / 2 + 2, en2.w - 4, 6);
        ctx.fillStyle = '#666';
        ctx.fillRect(en2.x - en2.w / 2 + 1, en2.y - en2.h / 2, en2.w - 2, en2.h);
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
        ctx.strokeRect(en2.x - en2.w / 2, en2.y - en2.h / 2, en2.w, en2.h);
        break;
      case 'switchblade':
        drawCar(en2.x, en2.y, 16, en2.h, '#600', true, false);
        if (en2.bladeOut) {
          ctx.fillStyle = '#aaa';
          ctx.fillRect(en2.x - 18, en2.y - 2, 8, 4);
          ctx.fillRect(en2.x + 10, en2.y - 2, 8, 4);
          // Blade tips
          ctx.fillStyle = '#fff';
          ctx.fillRect(en2.x - 18, en2.y - 1, 2, 2);
          ctx.fillRect(en2.x + 16, en2.y - 1, 2, 2);
        }
        break;
      case 'copter':
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(en2.x + 3, en2.y + 15, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Body
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.ellipse(en2.x, en2.y, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#666';
        ctx.fillRect(en2.x - 1, en2.y - 8, 2, 6);
        // Rotor
        var rotAngle = frame * 0.4;
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(en2.x - Math.cos(rotAngle) * 12, en2.y - 8);
        ctx.lineTo(en2.x + Math.cos(rotAngle) * 12, en2.y - 8);
        ctx.stroke();
        break;
      case 'enforcer':
        drawCar(en2.x, en2.y, en2.w, en2.h, '#303', true, false);
        // Rear gun turret
        ctx.fillStyle = '#666';
        ctx.fillRect(en2.x - 3, en2.y + en2.h / 2 - 4, 6, 8);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(en2.x - 1, en2.y + en2.h / 2 + 2, 2, 5);
        break;
    }
  }

  // Bombs
  for (var bi = 0; bi < bombs.length; bi++) {
    var bm = bombs[bi];
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(bm.x, bm.y, bm.size, 0, Math.PI * 2);
    ctx.fill();
    // Warning marker on ground
    ctx.strokeStyle = frame % 8 < 4 ? '#f00' : '#ff0';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bm.x, bm.targetY, 12, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Enemy bullets
  for (var ebi = 0; ebi < enemyBullets.length; ebi++) {
    var ebul = enemyBullets[ebi];
    ctx.fillStyle = '#f44';
    ctx.fillRect(ebul.x - 1.5, ebul.y - 3, 3, 6);
  }

  // Bullets
  for (var bi2 = 0; bi2 < bullets.length; bi2++) {
    var bul = bullets[bi2];
    if (bul.type === 'missile') {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(bul.x - 2, bul.y - 5, 4, 10);
      ctx.fillStyle = '#f80';
      ctx.fillRect(bul.x - 1, bul.y + 3, 2, 4);
    } else {
      ctx.fillStyle = '#ff8';
      ctx.fillRect(bul.x - 1, bul.y - 3, 2, 6);
    }
  }

  // Player car
  if (deathTimer <= 0) {
    var blink = invincTimer > 0 && frame % 6 < 3;
    if (!blink) {
      drawPlayerCar(player.x, player.y, playerWidth, playerHeight);
    }
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Zone flash announcement
  if (zoneFlashTimer > 0 && state === 'playing') {
    ctx.globalAlpha = Math.min(1, zoneFlashTimer / 1.5);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ZONE_NAMES[zoneIndex], GW / 2, GH / 2 - 20);
    ctx.globalAlpha = 1;
  }

  // Title / game over screens
  if (state === 'title') {
    drawTitleScreen();
  } else if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Distance: ' + Math.floor(distance) + 'm' });
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW HELPERS ===
function drawCar(x, y, w, h, color, isEnemy, facingDown) {
  // Car body
  ctx.fillStyle = color;
  ctx.fillRect(x - w / 2, y - h / 2, w, h);

  // Windshield
  ctx.fillStyle = isEnemy ? '#600' : '#aaf';
  var windY = facingDown ? y + h / 4 : y - h / 4;
  ctx.fillRect(x - w / 3, windY - 3, w * 0.66, 6);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - w / 2 - 2, y - h / 3, 3, 6);
  ctx.fillRect(x + w / 2 - 1, y - h / 3, 3, 6);
  ctx.fillRect(x - w / 2 - 2, y + h / 4, 3, 6);
  ctx.fillRect(x + w / 2 - 1, y + h / 4, 3, 6);

  // Headlights or taillights
  if (!facingDown) {
    ctx.fillStyle = isEnemy ? '#f00' : '#ff0';
    ctx.fillRect(x - w / 3, y - h / 2, 3, 3);
    ctx.fillRect(x + w / 3 - 3, y - h / 2, 3, 3);
  } else {
    ctx.fillStyle = '#f00';
    ctx.fillRect(x - w / 3, y + h / 2 - 3, 3, 3);
    ctx.fillRect(x + w / 3 - 3, y + h / 2 - 3, 3, 3);
  }
}

function drawPlayerCar(x, y, w, h) {
  // Body
  ctx.fillStyle = '#1a6aff';
  ctx.fillRect(x - w / 2, y - h / 2, w, h);

  // Cockpit
  ctx.fillStyle = '#3af';
  ctx.fillRect(x - w / 3, y - h / 6, w * 0.66, h * 0.3);

  // Front nose
  ctx.fillStyle = '#0044aa';
  ctx.beginPath();
  ctx.moveTo(x - w / 3, y - h / 2);
  ctx.lineTo(x, y - h / 2 - 4);
  ctx.lineTo(x + w / 3, y - h / 2);
  ctx.fill();

  // Spoiler
  ctx.fillStyle = '#003';
  ctx.fillRect(x - w / 2 + 1, y + h / 2 - 4, w - 2, 4);

  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(x - w / 2 - 2, y - h / 3, 3, 7);
  ctx.fillRect(x + w / 2 - 1, y - h / 3, 3, 7);
  ctx.fillRect(x - w / 2 - 2, y + h / 4, 3, 7);
  ctx.fillRect(x + w / 2 - 1, y + h / 4, 3, 7);

  // Exhaust glow when fast
  if (player.speed > 150) {
    ctx.fillStyle = frame % 4 < 2 ? '#f80' : '#f40';
    ctx.fillRect(x - 3, y + h / 2 + 1, 2, 3);
    ctx.fillRect(x + 1, y + h / 2 + 1, 2, 3);
  }

  // Headlights
  ctx.fillStyle = '#fff';
  ctx.fillRect(x - w / 3, y - h / 2 - 1, 3, 2);
  ctx.fillRect(x + w / 3 - 3, y - h / 2 - 1, 3, 2);

  // Gun barrel
  if (currentWeapon === 0 || currentWeapon === 1) {
    ctx.fillStyle = '#888';
    ctx.fillRect(x - 1, y - h / 2 - 5, 2, 5);
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, 30);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('SCORE: ' + score, 4, 12);

  // Distance
  ctx.fillStyle = '#88ccff';
  ctx.fillText(Math.floor(distance) + 'm', 4, 26);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#4d8';
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 12 - i * 14, 3, 10, 5);
    ctx.fillStyle = '#1a6aff';
    ctx.fillRect(GW - 11 - i * 14, 4, 8, 3);
    ctx.fillStyle = '#4d8';
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(GW - 60, 14, 52, 6);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#4d8' : hpPct > 0.25 ? '#da4' : '#f44';
  ctx.fillRect(GW - 59, 15, 50 * hpPct, 4);

  // Speed bar
  ctx.fillStyle = '#333';
  ctx.fillRect(GW - 60, 22, 52, 5);
  var spdPct = player.speed / player.maxSpeed;
  ctx.fillStyle = '#48f';
  ctx.fillRect(GW - 59, 23, 50 * spdPct, 3);

  // Weapon indicator (bottom)
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GH - 22, GW, 22);
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0ff';
  var weaponText = WEAPON_NAMES[currentWeapon];
  if (currentWeapon === 1) weaponText += ' x' + missileAmmo;
  if (currentWeapon === 2) weaponText += ' x' + oilAmmo;
  if (currentWeapon === 3) weaponText += ' x' + smokeAmmo;
  ctx.fillText(weaponText, GW / 2, GH - 8);

  // Zone indicator
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(ZONE_NAMES[zoneIndex], 4, GH - 8);

  // High score
  if (highScore > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    ctx.fillText('HI: ' + highScore, GW - 4, GH - 8);
  }
}

function drawTitleScreen() {
  // Dim background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPY HUNTER', GW / 2 + 2, 82);
  ctx.fillStyle = '#1a6aff';
  ctx.fillText('SPY HUNTER', GW / 2, 80);

  // Subtitle
  ctx.fillStyle = '#4d8';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 105);

  // Car preview
  drawPlayerCar(GW / 2, 160, 24, 36);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('LEFT/RIGHT - Steer', GW / 2, 210);
  ctx.fillText('UP - Accelerate  DOWN - Brake', GW / 2, 225);
  ctx.fillText('SPACE/Z - Fire Weapon', GW / 2, 240);
  ctx.fillText('Drive into WEAPON VAN for upgrades', GW / 2, 260);

  // Enemy types
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Enemies:', GW / 2, 290);
  ctx.fillStyle = '#666';
  ctx.fillText('Road Force - Bullet Proof - Switch Blade', GW / 2, 304);
  ctx.fillText('Enforcer - Copter', GW / 2, 318);

  // Warning
  ctx.fillStyle = '#f88';
  ctx.font = '9px monospace';
  ctx.fillText('DO NOT SHOOT CIVILIANS!', GW / 2, 345);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 380);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 430);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
