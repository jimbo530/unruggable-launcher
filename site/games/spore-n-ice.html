// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,luck,
// swim}, clamped to the single-player band (0.8–1.6). Spore-n-Ice's many helpers below read
// D&D-style fields on statB, so we keep statB's shape and synthesize its fields from the
// five bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20). Not a wager
// game -> default band. recomputeStats() re-runs after a title-screen character pick.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#66bbee', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[spore-n-ice] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage);    // STR -> ice/fire power, push force
  statB.dex = dnd(m.moveSpeed); // DEX -> move speed / input cooldown
  statB.con = dnd(m.health);    // CON -> undos, lives, hazard shield
  statB.int = dnd(m.luck);      // INT -> score / hints (luck flavor)
  statB.wis = dnd(m.luck);      // WIS -> element cooldown (luck flavor)
  statB.cha = dnd(m.luck);      // CHA -> bonus drops/items
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-n-ice] player init failed:', e && e.message); });
}

// --- statB helper functions ---
// STR: ice/fire power - stronger ice pushes farther, fire does more damage to stacks
function strIcePower() { return 1 + (statB.str - 10) * 0.05; }
function strPushForce() { return Math.max(1, Math.floor(1 + (statB.str - 10) * 0.15)); }
function strFireResist() { return Math.min(0.4, Math.max(0, (statB.str - 10) * 0.02)); }
// DEX: movement speed - lower input cooldown, faster animations
function dexSpeedMult() { return Math.max(0.4, 1 - (statB.dex - 10) * 0.03); }
function dexMoveCooldown() { return Math.max(3, Math.floor(8 * dexSpeedMult())); }
// CON: HP/lives - more undos, survive hazards, extra lives
function conMaxUndo() { return 20 + Math.floor(Math.max(0, statB.con - 10) * 1.5); }
function conBonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function conHazardShield() { return Math.min(0.3, Math.max(0, (statB.con - 10) * 0.015)); }
// INT: score multiplier + puzzle hints
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function intShowHint() { return statB.int >= 14; }
function intBonusMoves() { return Math.floor(Math.max(0, statB.int - 12) * 0.5); }
// WIS: element cooldown - faster ice creation, shorter spring delay
function wisElementCooldown() { return Math.max(0.4, statB.cooldown * (1 - (statB.wis - 10) * 0.03)); }
function wisIceCooldown() { return Math.max(3, Math.floor(8 * wisElementCooldown())); }
function wisSpringBoost() { return Math.floor(4 + Math.max(0, statB.wis - 10) * 0.3); }
// CHA: bonus drops and items
function chaDropChance() { return Math.min(0.5, 0.08 + (statB.cha - 10) * 0.02) * statB.luck; }
function chaBonusItem() { return Math.random() < chaDropChance(); }
function chaStartBonus() { return Math.floor(Math.max(0, statB.cha - 12) * 0.5); }

// Enemy state
var enemies = [];

function spawnEnemies() {
  enemies = [];
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] === T_REACTOR_FLAME) {
        enemies.push({ type: 'reactor_flame', x: c, y: r, dir: 1, moveTimer: 0, phase: 0 });
        grid[r][c] = T_EMPTY;
      } else if (grid[r][c] === T_SPORE_ICE) {
        enemies.push({ type: 'spore_ice', x: c, y: r, dir: -1, moveTimer: 0, phase: 0 });
        grid[r][c] = T_EMPTY;
      }
    }
  }
}

// === HELPERS ===
function cloneGrid(g) {
  var out = [];
  for (var r = 0; r < ROWS; r++) { out.push(g[r].slice()); }
  return out;
}

function countFires() {
  var c = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var col = 0; col < COLS; col++) {
      if (grid[r][col] === T_FIRE) c++;
    }
  }
  return c;
}

function isSolid(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
  var t = grid[row][col];
  return t === T_PLATFORM || t === T_ICE || t === T_REACTOR || t === T_SPORE || t === T_MYCELIUM;
}

function isEmpty(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
  return grid[row][col] === T_EMPTY;
}

function pushUndo() {
  undoStack.push({
    grid: cloneGrid(grid),
    px: player.x,
    py: player.y,
    dir: player.dir,
    moves: moves,
    enemies: enemies.map(function(e) { return { type: e.type, x: e.x, y: e.y, dir: e.dir, moveTimer: e.moveTimer, phase: e.phase }; }),
    score: score
  });
  if (undoStack.length > maxUndo) undoStack.shift();
}

function popUndo() {
  if (undoStack.length === 0) return;
  var snap = undoStack.pop();
  grid = snap.grid;
  player.x = snap.px;
  player.y = snap.py;
  player.dir = snap.dir;
  moves = snap.moves;
  score = snap.score;
  if (snap.enemies) {
    enemies = snap.enemies;
  }
  TAS.audio.playTone(300, 0.1, 'sine', 0.05);
}

// === LEVEL LOADING ===
function loadLevel(idx) {
  var lv = LEVELS[idx];
  grid = cloneGrid(lv.grid);
  player.x = lv.px;
  player.y = lv.py;
  player.dir = 1;
  player.animFrame = 0;
  player.moving = false;
  player.stunTimer = 0;
  moves = 0;
  undoStack = [];
  animQueue = [];
  animating = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  level = idx;
  combo = 0;
  comboTimer = 0;
  hintTimer = 0;
  iceCooldownTimer = 0;
  bonusItems = [];
  shakeTimer = 0;
  state = 'playing';
  spawnEnemies();
  // CHA start bonus: extra pre-placed ice
  var chaBonus = chaStartBonus();
  if (chaBonus > 0) {
    for (var b = 0; b < chaBonus; b++) {
      var bx = player.x + player.dir * (b + 1);
      if (bx >= 0 && bx < COLS && grid[player.y][bx] === T_EMPTY) {
        grid[player.y][bx] = T_ICE;
      }
    }
  }
}

// === PHYSICS: GRAVITY FOR ICE ===
function applyGravity() {
  var moved = true;
  while (moved) {
    moved = false;
    for (var r = ROWS - 2; r >= 0; r--) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] === T_ICE) {
          var below = r + 1;
          if (below < ROWS) {
            if (grid[below][c] === T_EMPTY) {
              grid[below][c] = T_ICE;
              grid[r][c] = T_EMPTY;
              moved = true;
            } else if (grid[below][c] === T_FIRE) {
              grid[r][c] = T_EMPTY;
              grid[below][c] = T_EMPTY;
              spawnExtinguish(c * TS + TS / 2, below * TS + TS / 2);
              sfxExtinguish();
              addScore(100);
              addCombo();
              moved = true;
            } else if (grid[below][c] === T_SPRING) {
              grid[r][c] = T_EMPTY;
              var bounceY = r - wisSpringBoost();
              if (bounceY < 0) bounceY = 0;
              for (var by = bounceY; by <= r; by++) {
                if (by + 1 < ROWS && isSolid(c, by + 1)) {
                  if (grid[by][c] === T_EMPTY) {
                    grid[by][c] = T_ICE;
                  } else if (grid[by][c] === T_FIRE) {
                    grid[by][c] = T_EMPTY;
                    spawnExtinguish(c * TS + TS / 2, by * TS + TS / 2);
                    sfxExtinguish();
                    addScore(150);
                    addCombo();
                  }
                  break;
                }
                if (by === r) {
                  if (grid[bounceY][c] === T_EMPTY) {
                    grid[bounceY][c] = T_ICE;
                  } else if (grid[bounceY][c] === T_FIRE) {
                    grid[bounceY][c] = T_EMPTY;
                    spawnExtinguish(c * TS + TS / 2, bounceY * TS + TS / 2);
                    sfxExtinguish();
                    addScore(150);
                    addCombo();
                  }
                }
              }
              spawnSpringBounce(c * TS + TS / 2, (r + 1) * TS);
              sfxSpring();
              moved = true;
            }
          }
        }
      }
    }
  }
  // Check for pipe redirects
  for (var r2 = 0; r2 < ROWS; r2++) {
    for (var c2 = 0; c2 < COLS; c2++) {
      if (grid[r2][c2] === T_ICE) {
        if (r2 + 1 < ROWS && grid[r2 + 1][c2] === T_PIPE_L) {
          slideIce(c2, r2, -1);
        } else if (r2 + 1 < ROWS && grid[r2 + 1][c2] === T_PIPE_R) {
          slideIce(c2, r2, 1);
        }
      }
    }
  }
}

function slideIce(col, row, dir) {
  grid[row][col] = T_EMPTY;
  var c = col + dir;
  while (c >= 0 && c < COLS) {
    if (grid[row][c] === T_FIRE) {
      grid[row][c] = T_EMPTY;
      spawnExtinguish(c * TS + TS / 2, row * TS + TS / 2);
      sfxExtinguish();
      addScore(100);
      addCombo();
      return;
    }
    if (isSolid(c, row)) {
      grid[row][c - dir] = T_ICE;
      spawnIceShatter(c * TS + (dir > 0 ? 0 : TS), row * TS + TS / 2);
      return;
    }
    if (row + 1 < ROWS && !isSolid(c, row + 1) && grid[row + 1][c] !== T_SPRING && grid[row + 1][c] !== T_PIPE_L && grid[row + 1][c] !== T_PIPE_R) {
      grid[row][c] = T_ICE;
      applyGravity();
      return;
    }
    c += dir;
  }
  grid[row][col] = T_ICE;
}

// === SCORING & COMBO ===
function addScore(pts) {
  var mult = combo > 1 ? combo : 1;
  score += Math.floor(pts * mult * intScoreMult());
}

function addCombo() {
  combo++;
  comboTimer = 90;
  if (combo >= 3) {
    triggerShake(3, 4);
    // CHA bonus item on combos
    if (chaBonusItem()) {
      spawnBonusItem();
    }
  }
}

function spawnBonusItem() {
  var bx = Math.floor(Math.random() * COLS);
  var by = 0;
  bonusItems.push({ x: bx * TS + TS / 2, y: by * TS, vy: 1, timer: 180, type: Math.random() < 0.5 ? 'star' : 'crystal' });
}

function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
}

// === ENEMY UPDATE ===
function updateEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    e.moveTimer++;
    e.phase += 0.05;
    if (e.type === 'reactor_flame') {
      // Patrols horizontally on its row, melts ice on contact
      if (e.moveTimer >= 30) {
        e.moveTimer = 0;
        var nx = e.x + e.dir;
        if (nx < 0 || nx >= COLS || isSolid(nx, e.y)) {
          e.dir *= -1;
        } else {
          e.x = nx;
        }
        // Melt adjacent ice
        if (e.x + 1 < COLS && grid[e.y][e.x + 1] === T_ICE) {
          grid[e.y][e.x + 1] = T_EMPTY;
          spawnFireMelt(e.x * TS + TS, e.y * TS + TS / 2);
        }
        if (e.x - 1 >= 0 && grid[e.y][e.x - 1] === T_ICE) {
          grid[e.y][e.x - 1] = T_EMPTY;
          spawnFireMelt(e.x * TS, e.y * TS + TS / 2);
        }
      }
      // Check if player is adjacent - stun player
      if (Math.abs(e.x - player.x) <= 1 && e.y === player.y && player.stunTimer <= 0) {
        if (Math.random() > conHazardShield()) {
          player.stunTimer = 30;
          triggerShake(4, 6);
          sfxHit();
        }
      }
    } else if (e.type === 'spore_ice') {
      // Drops spore frost periodically, slowing nearby ice physics
      if (e.moveTimer >= 45) {
        e.moveTimer = 0;
        var nx2 = e.x + e.dir;
        if (nx2 < 0 || nx2 >= COLS || isSolid(nx2, e.y)) {
          e.dir *= -1;
        } else {
          e.x = nx2;
        }
      }
      // Occasionally freeze an empty tile below
      if (e.moveTimer === 20 && e.y + 1 < ROWS && grid[e.y + 1][e.x] === T_EMPTY) {
        // Spore ice enemy can create temporary obstacles
        spawnSporeFrost(e.x * TS + TS / 2, (e.y + 1) * TS + TS / 2);
      }
    }
    // Remove enemy if hit by ice block (pushed into them)
    if (grid[e.y] && grid[e.y][e.x] === T_ICE) {
      spawnEnemyDefeat(e.x * TS + TS / 2, e.y * TS + TS / 2);
      sfxEnemyDefeat();
      addScore(200);
      enemies.splice(i, 1);
      i--;
    }
  }
}

// === PLAYER ACTIONS ===
function tryMove(dir) {
  if (player.stunTimer > 0) return;
  var nx = player.x + dir;
  if (nx < 0 || nx >= COLS) return;
  var ny = player.y;

  if (isSolid(nx, ny)) {
    if (grid[ny][nx] === T_ICE) {
      // STR determines push force
      var force = strPushForce();
      var pushX = nx + dir;
      if (pushX >= 0 && pushX < COLS) {
        if (grid[ny][pushX] === T_EMPTY) {
          pushUndo();
          grid[ny][pushX] = T_ICE;
          grid[ny][nx] = T_EMPTY;
          player.x = nx;
          player.dir = dir;
          moves++;
          addScore(10);
          sfxPush();
          applyGravity();
          checkWin();
          return;
        } else if (grid[ny][pushX] === T_FIRE) {
          pushUndo();
          grid[ny][pushX] = T_EMPTY;
          grid[ny][nx] = T_EMPTY;
          player.x = nx;
          player.dir = dir;
          moves++;
          addScore(100);
          addCombo();
          spawnExtinguish(pushX * TS + TS / 2, ny * TS + TS / 2);
          sfxExtinguish();
          applyGravity();
          checkWin();
          return;
        }
      }
    }
    return;
  }

  pushUndo();
  player.x = nx;
  player.dir = dir;
  moves++;

  while (player.y + 1 < ROWS && !isSolid(player.x, player.y + 1)) {
    player.y++;
  }
  // Pick up bonus items
  checkBonusPickup();
  checkWin();
}

function tryJump() {
  if (player.stunTimer > 0) return;
  var above = player.y - 1;
  if (above < 0) return;
  if (isSolid(player.x, above)) return;

  if (player.y + 1 >= ROWS || isSolid(player.x, player.y + 1)) {
    pushUndo();
    player.y = above;
    moves++;
    sfxJump();
    checkBonusPickup();
  }
}

function tryCreateIce() {
  if (player.stunTimer > 0) return;
  if (iceCooldownTimer > 0) return;
  var iceX = player.x + player.dir;
  var iceY = player.y;
  if (iceX < 0 || iceX >= COLS) return;
  if (grid[iceY][iceX] === T_EMPTY) {
    pushUndo();
    grid[iceY][iceX] = T_ICE;
    moves++;
    addScore(5);
    spawnIceCreate(iceX * TS + TS / 2, iceY * TS + TS / 2);
    sfxCreate();
    iceCooldownTimer = wisIceCooldown();
    applyGravity();
    checkWin();
  } else if (grid[iceY][iceX] === T_ICE) {
    pushUndo();
    grid[iceY][iceX] = T_EMPTY;
    moves++;
    spawnIceShatter(iceX * TS + TS / 2, iceY * TS + TS / 2);
    sfxCreate();
    iceCooldownTimer = wisIceCooldown();
    applyGravity();
  }
}

function checkBonusPickup() {
  for (var i = bonusItems.length - 1; i >= 0; i--) {
    var bi = bonusItems[i];
    var bCol = Math.floor(bi.x / TS);
    var bRow = Math.floor(bi.y / TS);
    if (bCol === player.x && bRow === player.y) {
      addScore(bi.type === 'star' ? 500 : 250);
      spawnItemPickup(bi.x, bi.y);
      sfxPickup();
      bonusItems.splice(i, 1);
    }
  }
}

function checkWin() {
  if (countFires() === 0) {
    levelComplete = true;
    levelCompleteTimer = 120;
    // INT bonus moves reduce effective move count
    var effectiveMoves = Math.max(1, moves - intBonusMoves());
    if (progress.indexOf(level) === -1) {
      progress.push(level);
      saveProgress();
    }
    totalMoves += effectiveMoves;
    if (bestMoves === 0 || totalMoves < bestMoves) {
      bestMoves = totalMoves;
      saveBestMoves();
    }
    if (score > bestScore) {
      bestScore = score;
      saveBestScore();
    }
    sfxClear();
    TAS.fx.flash('#38d973', 0.4);
    triggerShake(5, 8);
  }
}

function playerGravity() {
  while (player.y + 1 < ROWS && !isSolid(player.x, player.y + 1)) {
    player.y++;
  }
}

// === DRAWING ===
function drawTile(col, row) {
  var x = col * TS, y = row * TS;
  var tile = grid[row][col];

  if (tile === T_PLATFORM) {
    ctx.fillStyle = '#5a3038';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(x + 1, y + 1, TS - 2, TS - 2);
    ctx.strokeStyle = '#4a2a32';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, y + TS / 2); ctx.lineTo(x + TS, y + TS / 2);
    ctx.moveTo(x + TS / 2, y); ctx.lineTo(x + TS / 2, y + TS);
    ctx.stroke();
  } else if (tile === T_FIRE) {
    var flicker = Math.sin(frame * 0.15 + col * 2 + row) * 3;
    var flicker2 = Math.cos(frame * 0.2 + col) * 2;
    ctx.fillStyle = 'rgba(255,100,0,0.3)';
    ctx.beginPath();
    ctx.arc(x + TS / 2, y + TS / 2, TS / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(x + 6, y + TS - 4);
    ctx.quadraticCurveTo(x + TS / 2 + flicker2, y + 4 + flicker, x + TS - 6, y + TS - 4);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(x + 10, y + TS - 4);
    ctx.quadraticCurveTo(x + TS / 2 - flicker2, y + 10 - flicker, x + TS - 10, y + TS - 4);
    ctx.fill();
    ctx.fillStyle = '#fff8dd';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS - 10, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Fire particle shimmer
    if (frame % 4 === 0) {
      TAS.particles.spawn(x + TS / 2, y + 4, '#ff8800', 1, 0.8, { size: 1, sizeVar: 1, gravity: -1.5 });
    }
  } else if (tile === T_ICE) {
    var shimmer = Math.sin(frame * 0.08 + col + row * 3) * 10;
    // STR affects ice appearance - stronger = more opaque
    var iceAlpha = Math.min(1, 0.7 + strIcePower() * 0.05);
    ctx.fillStyle = 'rgba(100,200,255,' + iceAlpha + ')';
    ctx.fillRect(x + 2, y + 2, TS - 4, TS - 4);
    ctx.fillStyle = 'rgba(200,240,255,0.6)';
    ctx.fillRect(x + 4, y + 4, 8, 8);
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.4 + shimmer / 40) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 16); ctx.lineTo(x + 16, y + 4);
    ctx.moveTo(x + 12, y + 28); ctx.lineTo(x + 28, y + 12);
    ctx.stroke();
    ctx.strokeStyle = '#88ddff';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 2, y + 2, TS - 4, TS - 4);
  } else if (tile === T_PIPE_L || tile === T_PIPE_R) {
    ctx.fillStyle = '#4a4a5a';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = '#5a5a6a';
    ctx.fillRect(x + 2, y + 8, TS - 4, TS - 16);
    ctx.fillStyle = '#88aacc';
    var arrowDir = (tile === T_PIPE_L) ? -1 : 1;
    ctx.beginPath();
    var ax = x + TS / 2 + arrowDir * 8;
    ctx.moveTo(ax, y + TS / 2);
    ctx.lineTo(ax - arrowDir * 8, y + TS / 2 - 5);
    ctx.lineTo(ax - arrowDir * 8, y + TS / 2 + 5);
    ctx.fill();
  } else if (tile === T_SPRING) {
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(x, y + TS / 2, TS, TS / 2);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    var springAnim = Math.sin(frame * 0.1) * 2;
    ctx.beginPath();
    for (var i = 0; i < 4; i++) {
      var sy = y + TS / 2 + i * 4 + 2 + springAnim * (i === 0 ? 1 : 0);
      ctx.moveTo(x + 6, sy); ctx.lineTo(x + TS - 6, sy);
    }
    ctx.stroke();
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(x + 4, y + TS / 2 - 2 + springAnim, TS - 8, 4);
  } else if (tile === T_REACTOR) {
    // Reactor Heat tile - glowing orange/red platform
    var rPulse = Math.sin(frame * 0.12 + col + row) * 0.15;
    ctx.fillStyle = '#3a1a0a';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = 'rgba(255,80,20,' + (0.4 + rPulse) + ')';
    ctx.fillRect(x + 1, y + 1, TS - 2, TS - 2);
    // Heat lines
    ctx.strokeStyle = '#ff4400';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + TS / 2 + Math.sin(frame * 0.1 + col) * 3);
    ctx.lineTo(x + TS - 4, y + TS / 2 - Math.sin(frame * 0.1 + col) * 3);
    ctx.stroke();
    // Glow particles
    if (frame % 8 === 0) {
      TAS.particles.spawn(x + TS / 2, y, '#ff6600', 1, 0.5, { size: 1, sizeVar: 1, gravity: -0.8 });
    }
  } else if (tile === T_SPORE) {
    // Spore tile - green organic platform
    var sPulse = Math.sin(frame * 0.08 + col * 1.5 + row) * 0.1;
    ctx.fillStyle = '#0a2a0a';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = 'rgba(40,180,60,' + (0.5 + sPulse) + ')';
    ctx.fillRect(x + 1, y + 1, TS - 2, TS - 2);
    // Spore dots
    ctx.fillStyle = '#88ff88';
    for (var sd = 0; sd < 3; sd++) {
      var sdx = x + 8 + sd * 8 + Math.sin(frame * 0.05 + sd) * 2;
      var sdy = y + TS / 2 + Math.cos(frame * 0.06 + sd * 2) * 3;
      ctx.beginPath();
      ctx.arc(sdx, sdy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Spore mist
    if (frame % 12 === 0) {
      TAS.particles.spawn(x + TS / 2, y, '#44ff66', 1, 0.4, { size: 1, sizeVar: 1, gravity: -0.5 });
    }
  } else if (tile === T_MYCELIUM) {
    // Mycelial Growth tile - purple network platform
    var mPulse = Math.sin(frame * 0.06 + col * 2 + row * 1.5) * 0.12;
    ctx.fillStyle = '#1a0a2a';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = 'rgba(140,60,200,' + (0.45 + mPulse) + ')';
    ctx.fillRect(x + 1, y + 1, TS - 2, TS - 2);
    // Mycelium network lines
    ctx.strokeStyle = 'rgba(200,140,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 8); ctx.lineTo(x + 16, y + 16);
    ctx.lineTo(x + 28, y + 10); ctx.lineTo(x + 20, y + 24);
    ctx.lineTo(x + 8, y + 20);
    ctx.stroke();
    // Glow nodes
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath();
    ctx.arc(x + 16, y + 16, 2 + Math.sin(frame * 0.1) * 0.5, 0, Math.PI * 2);
    ctx.fill();
    if (frame % 15 === 0) {
      TAS.particles.spawn(x + TS / 2, y + TS / 2, '#aa66ff', 1, 0.3, { size: 1, sizeVar: 1, gravity: -0.3 });
    }
  }
}

function drawEnemy(e) {
  var x = e.x * TS, y = e.y * TS;
  var bob = Math.sin(frame * 0.12 + e.phase) * 2;
  if (e.type === 'reactor_flame') {
    // Reactor Flame - floating fire enemy
    ctx.fillStyle = 'rgba(255,60,0,0.3)';
    ctx.beginPath();
    ctx.arc(x + TS / 2, y + TS / 2 + bob, TS / 2 + 3, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + bob, 10, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Inner glow
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + bob, 6, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 4, y + TS / 2 - 2 + bob, 2.5, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 4, y + TS / 2 - 2 + bob, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#220000';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 4 + e.dir, y + TS / 2 - 2 + bob, 1.2, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 4 + e.dir, y + TS / 2 - 2 + bob, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Flame particles
    if (frame % 3 === 0) {
      TAS.particles.spawn(x + TS / 2, y + bob, '#ff6600', 1, 1, { size: 2, sizeVar: 1, gravity: -1.5 });
    }
  } else if (e.type === 'spore_ice') {
    // Spore Ice - floating green/blue enemy
    ctx.fillStyle = 'rgba(40,200,120,0.25)';
    ctx.beginPath();
    ctx.arc(x + TS / 2, y + TS / 2 + bob, TS / 2 + 2, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = '#44bb88';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + bob, 10, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    // Frost pattern
    ctx.fillStyle = '#88ffcc';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + bob, 6, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ddf';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 4, y + TS / 2 - 2 + bob, 2.5, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 4, y + TS / 2 - 2 + bob, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#113322';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 4 + e.dir, y + TS / 2 - 2 + bob, 1.2, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 4 + e.dir, y + TS / 2 - 2 + bob, 1.2, 0, Math.PI * 2);
    ctx.fill();
    // Spore particles
    if (frame % 5 === 0) {
      TAS.particles.spawn(x + TS / 2, y + TS + bob, '#66ffaa', 1, 0.6, { size: 1, sizeVar: 1, gravity: 0.3 });
    }
  }
}

function drawPlayer() {
  var x = player.x * TS, y = player.y * TS;
  var bob = Math.sin(frame * 0.1) * 1;

  // Stun flash
  if (player.stunTimer > 0 && frame % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  // === BASELING SPRITE ===
  var _anim = player.stunTimer > 0 ? 'hurt' : (player.moving ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, x + TS / 2, y + TS / 2, TS, { flipX: player.dir < 0, frame: frame, anim: _anim })) {
    // Body - frost baseling
    ctx.fillStyle = statB.color || '#66bbee';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + 2 + bob, 11, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lighter belly
    ctx.fillStyle = '#aaddff';
    ctx.beginPath();
    ctx.ellipse(x + TS / 2, y + TS / 2 + 4 + bob, 7, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    var eyeOff = player.dir * 3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 4 + eyeOff, y + TS / 2 - 2 + bob, 3.5, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 4 + eyeOff, y + TS / 2 - 2 + bob, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#112244';
    ctx.beginPath();
    ctx.arc(x + TS / 2 - 3 + eyeOff + player.dir, y + TS / 2 - 2 + bob, 1.8, 0, Math.PI * 2);
    ctx.arc(x + TS / 2 + 5 + eyeOff + player.dir, y + TS / 2 - 2 + bob, 1.8, 0, Math.PI * 2);
    ctx.fill();

    // Ice crystals on head
    ctx.fillStyle = '#ccf0ff';
    ctx.beginPath();
    ctx.moveTo(x + TS / 2 - 6, y + 6 + bob); ctx.lineTo(x + TS / 2 - 4, y + bob); ctx.lineTo(x + TS / 2 - 2, y + 6 + bob);
    ctx.moveTo(x + TS / 2 + 2, y + 5 + bob); ctx.lineTo(x + TS / 2 + 5, y - 1 + bob); ctx.lineTo(x + TS / 2 + 8, y + 5 + bob);
    ctx.fill();
  }

  // Direction indicator (frost aura on facing side)
  var auraX = x + TS / 2 + player.dir * 14;
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.1;
  ctx.fillStyle = '#3cacd7';
  ctx.beginPath();
  ctx.arc(auraX, y + TS / 2 + bob, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Ice cooldown indicator
  if (iceCooldownTimer > 0) {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#4488aa';
    ctx.fillRect(x + 4, y + TS - 4, (TS - 8) * (iceCooldownTimer / wisIceCooldown()), 3);
    ctx.globalAlpha = 1;
  }
}

function drawBackground() {
  var w = getCurrentWorld();
  var grd = ctx.createLinearGradient(0, 0, 0, GH);
  grd.addColorStop(0, w.bg1);
  grd.addColorStop(1, w.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  // Atmospheric particles per world
  ctx.fillStyle = w.snowColor;
  for (var i = 0; i < 20; i++) {
    var sx = ((frame * 0.3 + i * 47) % GW);
    var sy = ((frame * 0.5 + i * 31) % GH);
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Additional world-specific bg elements
  if (w.name === 'LAVA FUNGI DEPTHS') {
    // Heat shimmer lines
    ctx.strokeStyle = 'rgba(255,80,20,0.06)';
    ctx.lineWidth = 1;
    for (var h = 0; h < 3; h++) {
      var hy = 50 + h * 100 + Math.sin(frame * 0.02 + h) * 10;
      ctx.beginPath();
      ctx.moveTo(0, hy);
      for (var hx = 0; hx < GW; hx += 20) {
        ctx.lineTo(hx, hy + Math.sin(frame * 0.05 + hx * 0.02 + h) * 5);
      }
      ctx.stroke();
    }
  } else if (w.name === 'GARDEN OF DECAY') {
    // Floating spore particles in background
    ctx.fillStyle = 'rgba(100,255,120,0.04)';
    for (var sp = 0; sp < 8; sp++) {
      var spx = ((frame * 0.15 + sp * 67) % GW);
      var spy = ((frame * 0.25 + sp * 43) % GH);
      ctx.beginPath();
      ctx.arc(spx, spy, 3 + Math.sin(frame * 0.03 + sp) * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (w.name === 'MYCELIUM ABYSS') {
    // Network veins in background
    ctx.strokeStyle = 'rgba(140,60,200,0.04)';
    ctx.lineWidth = 1;
    for (var mv = 0; mv < 5; mv++) {
      ctx.beginPath();
      var mvx1 = (mv * 80 + frame * 0.1) % GW;
      var mvy1 = 30 + mv * 60;
      ctx.moveTo(mvx1, mvy1);
      ctx.lineTo(mvx1 + 40 + Math.sin(frame * 0.02 + mv) * 20, mvy1 + 30);
      ctx.lineTo(mvx1 + 80, mvy1 + Math.sin(frame * 0.03 + mv) * 15);
      ctx.stroke();
    }
  } else if (w.name === 'THE GRAND MYCELIUM') {
    // Combine all elements
    ctx.fillStyle = 'rgba(255,200,80,0.03)';
    for (var gn = 0; gn < 5; gn++) {
      var gnx = ((frame * 0.2 + gn * 83) % GW);
      var gny = ((frame * 0.3 + gn * 57) % GH);
      ctx.beginPath();
      ctx.arc(gnx, gny, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawGrid() {
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] !== T_EMPTY) {
        drawTile(c, r);
      }
    }
  }
}

function drawBonusItems() {
  for (var i = 0; i < bonusItems.length; i++) {
    var bi = bonusItems[i];
    var bPulse = Math.sin(frame * 0.1 + i) * 2;
    if (bi.type === 'star') {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      var sx = bi.x, sy = bi.y + bPulse;
      for (var p = 0; p < 5; p++) {
        var a = -Math.PI / 2 + p * Math.PI * 2 / 5;
        var ai = a + Math.PI / 5;
        ctx.lineTo(sx + Math.cos(a) * 8, sy + Math.sin(a) * 8);
        ctx.lineTo(sx + Math.cos(ai) * 3, sy + Math.sin(ai) * 3);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = '#a855f7';
      ctx.save();
      ctx.translate(bi.x, bi.y + bPulse);
      ctx.rotate(frame * 0.05);
      ctx.fillRect(-5, -5, 10, 10);
      ctx.restore();
    }
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(26,28,44,0.8)';
  ctx.fillRect(0, 0, GW, 24);
  ctx.font = 'bold 11px monospace';

  // World name + level
  var w = getCurrentWorld();
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'left';
  ctx.fillText('LV' + (level + 1) + ' ' + w.name, 6, 16);

  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'center';
  ctx.fillText('MOVES:' + moves + '  SCORE:' + score, GW / 2, 16);

  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText('R=RESET Z=UNDO', GW - 6, 16);

  // Fire counter
  var fires = countFires();
  if (fires > 0) {
    ctx.fillStyle = '#e6482e';
    ctx.textAlign = 'center';
    ctx.fillText('FLAME MOLD: ' + fires, GW / 2, GH - 8);
  }

  // Combo display
  if (combo >= 2 && comboTimer > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px monospace';
    ctx.globalAlpha = comboTimer / 90;
    ctx.fillText('SPORE COMBO x' + combo + '!', GW / 2, GH - 24);
    ctx.globalAlpha = 1;
  }

  // INT hint indicator
  if (intShowHint() && hintTimer > 0) {
    ctx.fillStyle = 'rgba(68,136,255,0.5)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('[HINT ACTIVE]', 6, GH - 24);
  }

  // Persistent controls legend (desktop only; title legend is hidden behind NFT gate).
  // Brighter on the first level, faint thereafter so it never distracts.
  if (!('ontouchstart' in window)) {
    ctx.globalAlpha = (level === 0) ? 0.85 : 0.4;
    ctx.fillStyle = '#aabbcc';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS Move   W Jump   S Spore   Z Undo   R Reset', GW / 2, GH - 2);
    ctx.globalAlpha = 1;
  }
}

// === TITLE SCREEN ===
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  drawBackground();

  // Decorative ice/fire/elements
  var elementColors = ['#e6482e', '#3cacd7', '#38d973', '#a855f7', '#f4b41b'];
  for (var i = 0; i < 5; i++) {
    var fx = 60 + i * 70;
    var fy = 200 + Math.sin(frame * 0.05 + i) * 10;
    ctx.fillStyle = elementColors[i];
    ctx.beginPath();
    ctx.arc(fx, fy, 8 + Math.sin(frame * 0.1 + i) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.textAlign = 'center';

  // Title shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE N ICE', GW / 2 + 2, 82);

  // Baseling-themed title gradient
  var tgrd = ctx.createLinearGradient(GW / 2 - 80, 60, GW / 2 + 80, 90);
  tgrd.addColorStop(0, '#e6482e');
  tgrd.addColorStop(0.35, '#f4b41b');
  tgrd.addColorStop(0.65, '#3cacd7');
  tgrd.addColorStop(1, '#a855f7');
  ctx.fillStyle = tgrd;
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE N ICE', GW / 2, 80);

  ctx.fillStyle = '#a855f7';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Arcade Puzzle', GW / 2, 105);

  ctx.fillStyle = '#38d973';
  ctx.font = '11px monospace';
  ctx.fillText('Freeze and crush flame mold', GW / 2, 135);
  ctx.fillText('to cleanse the spore gardens!', GW / 2, 150);

  // Selected baseling preview (idle bob) — falls back to title deco for Wimmple.
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  TAS.drawBaseling(ctx, GW / 2, 172, 26, { anim: 'idle', frame: frame });

  // Selected baseling name (Base-blue accent)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 194);

  // 5 stat bars in their canonical colors (bar fill = stat / 200)
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW / 2 - 92;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 38;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 206);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 209, 32, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 209, 32 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // Best score
  if (bestScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('BEST POOP SCORE: ' + bestScore, GW / 2, 228);
  }

  ctx.fillStyle = '#667788';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS = Move   W = Jump   S = Spore   Z = Undo   R = Reset', GW / 2, 248);

  // SELECT BASELING prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 46);

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO EXPLORE', GW / 2, GH - 24);
  ctx.globalAlpha = 1;
}

// === LEVEL SELECT ===
function drawLevelSelect() {
  drawBackground();
  ctx.textAlign = 'center';

  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('SELECT GARDEN', GW / 2, 28);

  // Show current world name
  var curWorld = null;
  for (var wi = 0; wi < WORLDS.length; wi++) {
    if (WORLDS[wi].levels.indexOf(selectCursor) !== -1) { curWorld = WORLDS[wi]; break; }
  }
  if (curWorld) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '11px monospace';
    ctx.fillText(curWorld.name, GW / 2, 42);
  }

  // Grid of level buttons: 6 columns x 5 rows
  var cols = 6, startX = 42, startY = 52, cellW = 54, cellH = 42;
  for (var i = 0; i < 30; i++) {
    var col = i % cols;
    var row = Math.floor(i / cols);
    var bx = startX + col * cellW;
    var by = startY + row * cellH;
    var beaten = progress.indexOf(i) !== -1;
    var unlocked = (i === 0) || (progress.indexOf(i - 1) !== -1);
    var selected = (i === selectCursor);

    // World color coding
    var worldIdx = Math.floor(i / 6);
    var worldColors = ['#3cacd7', '#e6482e', '#38d973', '#a855f7', '#f4b41b'];
    var wColor = worldColors[worldIdx];

    if (selected) {
      ctx.fillStyle = wColor;
      ctx.globalAlpha = 0.4;
      ctx.fillRect(bx - 2, by - 2, 44, 34);
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = beaten ? '#1a3a2a' : (unlocked ? '#222233' : '#1a1c2c');
    ctx.fillRect(bx, by, 40, 30);

    ctx.strokeStyle = beaten ? '#38d973' : (unlocked ? wColor : '#333');
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(bx, by, 40, 30);

    ctx.fillStyle = beaten ? '#38d973' : (unlocked ? '#aabbcc' : '#444');
    ctx.font = 'bold 12px monospace';
    ctx.fillText(String(i + 1), bx + 20, by + 19);
  }

  ctx.fillStyle = '#667788';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS to select, ENTER/A to enter', GW / 2, GH - 18);

  ctx.fillStyle = '#38d973';
  ctx.font = '11px monospace';
  ctx.fillText('Gardens Cleansed: ' + progress.length + '/30   Score: ' + score, GW / 2, GH - 36);
}

// === LEVEL COMPLETE OVERLAY ===
function drawLevelComplete() {
  ctx.fillStyle = 'rgba(26,28,44,0.75)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('SPORES CLEANSED!', GW / 2, GH / 2 - 40);

  var w = getCurrentWorld();
  ctx.fillStyle = '#a855f7';
  ctx.font = '11px monospace';
  ctx.fillText(w.name, GW / 2, GH / 2 - 20);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '14px monospace';
  ctx.fillText('Moves: ' + moves + '  Score: ' + score, GW / 2, GH / 2 + 10);

  if (combo >= 2) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '11px monospace';
    ctx.fillText('Best Combo: x' + combo, GW / 2, GH / 2 + 30);
  }

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#3cacd7';
  ctx.font = '12px monospace';
  if (level < 29) {
    ctx.fillText('Press any key for next garden', GW / 2, GH / 2 + 55);
  } else {
    ctx.fillText('The mycelium is purified!', GW / 2, GH / 2 + 55);
  }
  ctx.globalAlpha = 1;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (inputCooldown > 0) inputCooldown--;
  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }
  if (hintTimer > 0) hintTimer--;
  if (iceCooldownTimer > 0) iceCooldownTimer--;
  if (player.stunTimer > 0) player.stunTimer--;
  if (shakeTimer > 0) shakeTimer--;

  // Update bonus items
  for (var bi = bonusItems.length - 1; bi >= 0; bi--) {
    bonusItems[bi].y += bonusItems[bi].vy;
    bonusItems[bi].timer--;
    if (bonusItems[bi].timer <= 0 || bonusItems[bi].y > GH) {
      bonusItems.splice(bi, 1);
    }
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; // consume so it doesn't also advance
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (anyKey()) {
      TAS.audio.ensureAudio();
      state = 'select';
      selectCursor = 0;
      inputCooldown = 15;
    }
    return;
  }

  if (state === 'select') {
    if (inputCooldown > 0) return;
    var cols = 6;
    if (keyDown('ArrowRight') || TAS.input.touch.right) { selectCursor = Math.min(29, selectCursor + 1); inputCooldown = 10; }
    if (keyDown('ArrowLeft') || TAS.input.touch.left) { selectCursor = Math.max(0, selectCursor - 1); inputCooldown = 10; }
    if (keyDown('ArrowDown') || TAS.input.touch.down) { selectCursor = Math.min(29, selectCursor + cols); inputCooldown = 10; }
    if (keyDown('ArrowUp') || TAS.input.touch.up) { selectCursor = Math.max(0, selectCursor - cols); inputCooldown = 10; }
    if (keyDown('Enter') || keyDown('x') || keyDown('X') || TAS.input.touch.a || TAS.input.touch.b) {
      var unlocked = (selectCursor === 0) || (progress.indexOf(selectCursor - 1) !== -1);
      if (unlocked) {
        loadLevel(selectCursor);
        inputCooldown = 15;
      }
    }
    if (keyDown('Escape')) { state = 'title'; inputCooldown = 15; }
    return;
  }

  if (state === 'playing') {
    // Update enemies
    updateEnemies();

    if (levelComplete) {
      levelCompleteTimer--;
      if (levelCompleteTimer <= 0 && anyKey()) {
        if (level < 29) {
          loadLevel(level + 1);
        } else {
          state = 'select';
        }
        inputCooldown = 15;
      }
      return;
    }

    if (inputCooldown > 0) return;

    // Reset
    if (keyDown('r') || keyDown('R')) {
      loadLevel(level);
      inputCooldown = 10;
      return;
    }
    // Undo
    if (keyDown('z') || keyDown('Z')) {
      popUndo();
      playerGravity();
      inputCooldown = 8;
      return;
    }
    // Escape to menu
    if (keyDown('Escape')) {
      state = 'select';
      inputCooldown = 15;
      return;
    }

    // INT hint - press H to show hint direction
    if (keyDown('h') || keyDown('H')) {
      if (intShowHint() && hintTimer <= 0) {
        hintTimer = 60;
        // Simple hint: point toward nearest fire
        var nearDist = 999, nearDir2 = 0;
        for (var hr = 0; hr < ROWS; hr++) {
          for (var hc = 0; hc < COLS; hc++) {
            if (grid[hr][hc] === T_FIRE) {
              var d = Math.abs(hc - player.x) + Math.abs(hr - player.y);
              if (d < nearDist) {
                nearDist = d;
                nearDir2 = (hc > player.x) ? 1 : -1;
              }
            }
          }
        }
        hintDir = nearDir2;
      }
    }

    // Movement - DEX affects cooldown
    var moveCd = dexMoveCooldown();
    if (keyDown('ArrowLeft') || TAS.input.touch.left) {
      tryMove(-1);
      inputCooldown = moveCd;
    } else if (keyDown('ArrowRight') || TAS.input.touch.right) {
      tryMove(1);
      inputCooldown = moveCd;
    }

    // Jump - W = jump (action cluster), Up arrow = move-up alias, legacy
    if (keyDown('ArrowUp') || keyDown('w') || keyDown('W') || TAS.input.touch.up || TAS.input.touch.a) {
      if (!jumpPressed) {
        tryJump();
        jumpPressed = true;
        inputCooldown = moveCd;
      }
    } else {
      jumpPressed = false;
    }

    // Create/destroy spore-ice - WIS affects cooldown. S = spore (action cluster),
    // Space = action, X = legacy hidden alt
    if (keyDown('s') || keyDown('S') || keyDown('x') || keyDown('X') || keyDown(' ') || TAS.input.touch.b) {
      if (!icePressed) {
        tryCreateIce();
        icePressed = true;
        inputCooldown = moveCd;
      }
    } else {
      icePressed = false;
    }
  }
}

function anyKey() {
  if (TAS.input.touch.a || TAS.input.touch.b || TAS.input.touch.left || TAS.input.touch.right || TAS.input.touch.up || TAS.input.touch.down) return true;
  for (var k in TAS.input.keys) { if (TAS.input.keys[k]) return true; }
  return false;
}

function keyDown(k) {
  return TAS.input.keys[k];
}

// === DRAW ===
function draw(dt) {
  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'select') {
    drawLevelSelect();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'playing') {
    drawBackground();
    ctx.save();
    // Screen shake
    if (shakeTimer > 0) {
      var sx = (Math.random() - 0.5) * shakeIntensity * 2;
      var sy = (Math.random() - 0.5) * shakeIntensity * 2;
      ctx.translate(sx, sy);
    }
    TAS.fx.applyShake();
    drawGrid();
    drawBonusItems();
    // Draw enemies
    for (var ei = 0; ei < enemies.length; ei++) {
      drawEnemy(enemies[ei]);
    }
    drawPlayer();
    // INT hint arrow
    if (hintTimer > 0 && hintDir !== 0) {
      ctx.globalAlpha = hintTimer / 60;
      ctx.fillStyle = '#4488ff';
      var hx = player.x * TS + TS / 2 + hintDir * 20;
      var hy = player.y * TS + TS / 2;
      ctx.beginPath();
      ctx.moveTo(hx + hintDir * 10, hy);
      ctx.lineTo(hx - hintDir * 4, hy - 6);
      ctx.lineTo(hx - hintDir * 4, hy + 6);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    TAS.particles.draw();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    if (levelComplete) {
      drawLevelComplete();
    }
    TAS.input.drawTouchControls(GW, GH);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
