<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sporegoyle Quest</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #7a444a; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #a855f7; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === STATB SYSTEM ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM unused (no water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[gargoyle-quest] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[gargoyle-quest] player init failed:', e && e.message); });
}

// STR -> fire breath damage
function strFireDmg(base) { return Math.floor(base * statB.damage * (0.5 + statB.str / 20) * 10) / 10; }
// DEX -> fly speed & move speed
function dexFlySpeed() { return Math.floor(FLY_SPEED_BASE * (0.8 + statB.dex / 50) * statB.speed); }
function dexMoveSpeed() { return Math.floor(MOVE_SPEED_BASE * (0.8 + statB.dex / 50) * statB.speed); }
// CON -> max HP & bonus lives
function conMaxHp(base) { return Math.floor(base * statB.hpMult * (0.8 + statB.con / 50)); }
function conBonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
// INT -> score multiplier
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function intScore(base) { return Math.floor(base * intScoreMult()); }
// WIS -> fire cooldown & Spore Wings flight time
function wisCooldown(base) { return base * statB.cooldown * (1.2 - statB.wis / 50); }
function wisFlightBonus() { return Math.floor((statB.wis - 10) * 0.05 * 10) / 10; }
// CHA -> item drop rate
function chaDropChance(base) { return Math.min(1, base * statB.luck * (0.8 + statB.cha / 50)); }

// === GAME CONSTANTS ===
var GW = 384, GH = 256;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'FIRE', c: 'PICK' } });

var TILE = 16;
var COLS = Math.ceil(GW / TILE) + 2;
var ROWS = Math.floor(GH / TILE);
var GRAVITY = 550;
var JUMP_VEL = -220;
var MOVE_SPEED_BASE = 100;
var MAX_FALL = 300;
var FLY_SPEED_BASE = 100;
var FIREBALL_SPEED = 200;
var INVULN_TIME = 1.5;

// === SOUND EFFECTS ===
var SFX = {
  flap: function() { TAS.audio.playTone(300, 0.05, 'triangle', 0.04, 400); },
  fire: function() { TAS.audio.playTone(800, 0.12, 'sawtooth', 0.08, 200); TAS.audio.playNoise(0.08, 0.05, 1200); },
  cling: function() { TAS.audio.playNoise(0.06, 0.08, 600); TAS.audio.playTone(100, 0.04, 'square', 0.06); },
  headbutt: function() { TAS.audio.playNoise(0.1, 0.12, 400); TAS.audio.playTone(120, 0.08, 'square', 0.1, 60); },
  hit: function() { TAS.audio.playNoise(0.08, 0.1, 500); TAS.audio.playTone(150, 0.06, 'square', 0.08, 80); },
  enemyDie: function() { TAS.audio.playTone(400, 0.1, 'square', 0.07, 100); TAS.audio.playNoise(0.1, 0.06, 800); },
  upgrade: function() { TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.15]], 100); },
  bossRoar: function() { TAS.audio.playTone(80, 0.4, 'sawtooth', 0.12, 40); TAS.audio.playNoise(0.3, 0.1, 200); },
  die: function() { TAS.audio.playTone(300, 0.3, 'sawtooth', 0.1, 60); setTimeout(function(){ TAS.audio.playTone(150, 0.4, 'square', 0.08, 30); }, 200); },
  clear: function() { TAS.audio.playMelody([[392,0.12],[523,0.12],[659,0.12],[784,0.12],[1047,0.2]], 130); },
  jump: function() { TAS.audio.playTone(250, 0.08, 'triangle', 0.06, 400); },
  sporeWings: function() { TAS.audio.playTone(200, 0.15, 'triangle', 0.06, 350); TAS.audio.playTone(260, 0.1, 'sine', 0.04, 300); },
  reactorBreath: function() { TAS.audio.playTone(120, 0.3, 'sawtooth', 0.1, 600); TAS.audio.playNoise(0.15, 0.08, 1500); TAS.audio.playTone(900, 0.15, 'square', 0.06, 200); },
  hazardBurn: function() { TAS.audio.playNoise(0.06, 0.06, 900); TAS.audio.playTone(200, 0.04, 'sawtooth', 0.05); },
  sporeCloud: function() { TAS.audio.playNoise(0.12, 0.04, 300); TAS.audio.playTone(160, 0.08, 'sine', 0.03); }
};

// === STAGE DEFINITIONS (Tasern-themed) ===
var STAGES = [
  { name: 'POOP Hollows', bg1: '#0c0814', bg2: '#1a102a', tile: '#3a2a4a', accent: '#a855f7', hasBoss: false, bgType: 'spore' },
  { name: 'Reactor Graveyard', bg1: '#0a0a14', bg2: '#141428', tile: '#2a2a4a', accent: '#3cacd7', hasBoss: true, bgType: 'reactor' },
  { name: 'Haunted Garden', bg1: '#060e08', bg2: '#0c1a10', tile: '#1a3a1a', accent: '#38d973', hasBoss: false, bgType: 'mycelial' },
  { name: 'Crystal Catacombs', bg1: '#0a0a1a', bg2: '#14142a', tile: '#2a3a5a', accent: '#3cacd7', hasBoss: true, bgType: 'crystal' },
  { name: 'Charred Caldera', bg1: '#1a0a04', bg2: '#2a1408', tile: '#4a2a1a', accent: '#e6482e', hasBoss: false, bgType: 'caldera' },
  { name: 'Fungal Nexus', bg1: '#0a0408', bg2: '#1a0810', tile: '#3a1a2a', accent: '#a855f7', hasBoss: true, bgType: 'nexus' }
];

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('gargoylequest_hi');
var stageIdx = 0;
var player = null;
var camera = { x: 0, y: 0 };
var tiles = [];
var enemies = [];
var fireballs = [];
var items = [];
var hazards = [];
var levelWidth = 0;
var levelHeight = 0;
var bossActive = null;
var stageCompleteTimer = 0;
var deathTimer = 0;
var msgText = '';
var msgTimer = 0;
var pauseTimer = 0;
var lives = 0;

// RPG upgrades (still tracked, but scaled by statB)
var upgrades = {
  flightTime: 1.5,
  maxHp: 2,
  fireLevel: 1,
  jumpBoost: 0,
  clawRange: 0
};

// Reactor Breath charge state
var reactorCharge = 0;
var reactorCharging = false;
var REACTOR_CHARGE_MAX = 1.2;

// Spore Wings state
var sporeWingsActive = false;
var sporeWingsTimer = 0;

// Save/load
function saveGame() {
  try {
    localStorage.setItem('gargoylequest_save', JSON.stringify({ stageIdx: stageIdx, upgrades: upgrades, score: score }));
  } catch(e) { console.warn('Save failed:', e); }
}
function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem('gargoylequest_save'));
    if (d) { stageIdx = d.stageIdx || 0; upgrades = d.upgrades || upgrades; score = d.score || 0; return true; }
  } catch(e) { console.warn('Load failed:', e); }
  return false;
}

// === PLAYER ===
function createPlayer(x, y) {
  var baseMaxHp = conMaxHp(upgrades.maxHp);
  var baseFlight = upgrades.flightTime + wisFlightBonus();
  return {
    x: x, y: y, w: 12, h: 14,
    vx: 0, vy: 0,
    onGround: false,
    flying: false,
    flightMeter: baseFlight,
    flightMax: baseFlight,
    clinging: false,
    clingDir: 0,
    facing: 1,
    hp: baseMaxHp,
    maxHp: baseMaxHp,
    invuln: 0,
    wingFrame: 0,
    wingTimer: 0,
    attackCooldown: 0,
    headbuttCooldown: 0,
    animState: 'idle',
    animTimer: 0,
    walkFrame: 0
  };
}

// === LEVEL GENERATION ===
function generateLevel(stageNum) {
  tiles = [];
  enemies = [];
  items = [];
  fireballs = [];
  hazards = [];
  bossActive = null;
  reactorCharge = 0;
  reactorCharging = false;
  sporeWingsActive = false;
  sporeWingsTimer = 0;

  var wide = 80 + stageNum * 15;
  var tall = 16;
  levelWidth = wide * TILE;
  levelHeight = tall * TILE;

  // Init empty
  for (var r = 0; r < tall; r++) {
    tiles[r] = [];
    for (var c = 0; c < wide; c++) {
      tiles[r][c] = 0;
    }
  }

  // Floor
  for (var c = 0; c < wide; c++) {
    tiles[tall - 1][c] = 1;
    if (Math.random() < 0.3) tiles[tall - 2][c] = 1;
  }

  // Platforms and walls
  var numPlats = 30 + stageNum * 8;
  for (var i = 0; i < numPlats; i++) {
    var px = TAS.math.randInt(3, wide - 5);
    var py = TAS.math.randInt(3, tall - 4);
    var pw = TAS.math.randInt(2, 6);
    for (var pc = 0; pc < pw && px + pc < wide; pc++) {
      tiles[py][px + pc] = 1;
    }
  }

  // Walls (for clinging)
  var numWalls = 10 + stageNum * 4;
  for (var i = 0; i < numWalls; i++) {
    var wx = TAS.math.randInt(4, wide - 4);
    var wy = TAS.math.randInt(2, tall - 5);
    var wh = TAS.math.randInt(3, 6);
    for (var wr = 0; wr < wh && wy + wr < tall - 1; wr++) {
      tiles[wy + wr][wx] = 1;
    }
  }

  // Breakable ceiling blocks (for headbutt)
  var numBreak = 5 + stageNum * 2;
  for (var i = 0; i < numBreak; i++) {
    var bx = TAS.math.randInt(5, wide - 5);
    var by = TAS.math.randInt(2, tall - 6);
    tiles[by][bx] = 2;
    if (Math.random() < 0.4) {
      tiles[by - 1][bx] = 0;
    }
  }

  // Clear starting area
  for (var r = tall - 5; r < tall - 1; r++) {
    for (var c = 0; c < 5; c++) {
      tiles[r][c] = 0;
    }
  }
  tiles[tall - 1][0] = 1; tiles[tall - 1][1] = 1; tiles[tall - 1][2] = 1;

  // Spawn enemies
  spawnEnemies(stageNum, wide, tall);

  // Spawn upgrade items
  spawnItems(stageNum, wide, tall);

  // Spawn environmental hazards
  spawnHazards(stageNum, wide, tall);

  // Boss at end of boss stages
  if (STAGES[stageNum].hasBoss) {
    var bossX = (wide - 6) * TILE;
    var bossY = (tall - 5) * TILE;
    for (var r = tall - 6; r < tall - 1; r++) {
      for (var c = wide - 8; c < wide; c++) {
        if (c >= 0) tiles[r][c] = 0;
      }
    }
    bossActive = createBoss(stageNum, bossX, bossY);
  }

  // Create player
  player = createPlayer(2 * TILE, (tall - 3) * TILE);
  camera.x = 0;
  camera.y = 0;
}

function spawnEnemies(stageNum, wide, tall) {
  var count = 12 + stageNum * 5;
  for (var i = 0; i < count; i++) {
    var ex = TAS.math.randInt(8, wide - 3) * TILE;
    var ey = TAS.math.randInt(2, tall - 3) * TILE;
    var type = pickEnemyType(stageNum);
    enemies.push(createEnemy(type, ex, ey));
  }
}

function pickEnemyType(stageNum) {
  var pool = ['reactorImp'];
  if (stageNum >= 1) pool.push('sporePhantom', 'sporePhantom');
  if (stageNum >= 2) pool.push('sporeBat', 'sporeBat');
  if (stageNum >= 3) pool.push('toxicSlime', 'crystalGolem');
  if (stageNum >= 4) pool.push('emberSpirit', 'emberSpirit');
  if (stageNum >= 5) pool.push('mycelialDragonlet', 'voidEye');
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

function createEnemy(type, x, y) {
  var e = { type: type, x: x, y: y, vx: 0, vy: 0, hp: 1, w: 12, h: 12, facing: -1, timer: 0, state: 'patrol', animFrame: 0 };
  switch(type) {
    case 'reactorImp': e.hp = 2; e.w = 12; e.h = 14; e.speed = 30; break;
    case 'sporePhantom': e.hp = 1; e.w = 14; e.h = 14; e.speed = 25; e.floatY = y; e.phase = Math.random() * 6.28; break;
    case 'sporeBat': e.hp = 1; e.w = 14; e.h = 8; e.speed = 60; e.swoopTimer = Math.random() * 3; e.baseY = y; break;
    case 'toxicSlime': e.hp = 2; e.w = 12; e.h = 10; e.speed = 15; e.jumpTimer = Math.random() * 2; break;
    case 'crystalGolem': e.hp = 3; e.w = 14; e.h = 14; e.speed = 20; break;
    case 'emberSpirit': e.hp = 2; e.w = 12; e.h = 12; e.speed = 40; e.immune = true; break;
    case 'mycelialDragonlet': e.hp = 3; e.w = 14; e.h = 16; e.speed = 35; e.shootTimer = 2; break;
    case 'voidEye': e.hp = 2; e.w = 12; e.h = 12; e.speed = 45; break;
  }
  return e;
}

function createBoss(stageNum, x, y) {
  var bossHp = 10 + stageNum * 5;
  var b = {
    x: x, y: y, w: 32, h: 32,
    hp: bossHp, maxHp: bossHp,
    vx: 0, vy: 0, phase: 0, timer: 0,
    attackTimer: 2, state: 'idle', stageNum: stageNum,
    invuln: 0, projections: [],
    enragePhase: false, dashTimer: 0, summonTimer: 8
  };
  return b;
}

function spawnItems(stageNum, wide, tall) {
  var upgradeTypes = ['flight', 'hp', 'fire', 'jump', 'claw'];
  var avail = [];
  if (upgrades.flightTime < 4) avail.push('flight');
  if (upgrades.maxHp < 6) avail.push('hp');
  if (upgrades.fireLevel < 4) avail.push('fire');
  if (upgrades.jumpBoost < 2) avail.push('jump');
  if (upgrades.clawRange < 2) avail.push('claw');

  // Tasern-specific items
  avail.push('sporeWings');
  avail.push('reactorShard');

  if (avail.length > 0) {
    var itype = avail[TAS.math.randInt(0, avail.length - 1)];
    var ix = TAS.math.randInt(Math.floor(wide * 0.4), wide - 5) * TILE;
    var iy = TAS.math.randInt(3, tall - 4) * TILE;
    items.push({ type: itype, x: ix, y: iy, w: 10, h: 10, collected: false, bob: Math.random() * 6.28 });
  }

  // Health pickups (CHA-scaled count)
  var hpCount = 2 + stageNum;
  var bonusDrops = Math.floor(chaDropChance(1) * 3);
  hpCount += bonusDrops;
  for (var i = 0; i < hpCount; i++) {
    var hx = TAS.math.randInt(5, wide - 3) * TILE;
    var hy = TAS.math.randInt(3, tall - 4) * TILE;
    items.push({ type: 'health', x: hx, y: hy, w: 8, h: 8, collected: false, bob: Math.random() * 6.28 });
  }

  // CHA: bonus score orbs
  var orbCount = Math.floor(chaDropChance(0.5) * (3 + stageNum));
  for (var i = 0; i < orbCount; i++) {
    var ox = TAS.math.randInt(5, wide - 3) * TILE;
    var oy = TAS.math.randInt(3, tall - 4) * TILE;
    items.push({ type: 'scoreOrb', x: ox, y: oy, w: 8, h: 8, collected: false, bob: Math.random() * 6.28 });
  }
}

// === ENVIRONMENTAL HAZARDS ===
function spawnHazards(stageNum, wide, tall) {
  // Spore clouds
  var sporeCount = 2 + stageNum;
  for (var i = 0; i < sporeCount; i++) {
    var sx = TAS.math.randInt(10, wide - 5) * TILE;
    var sy = TAS.math.randInt(3, tall - 4) * TILE;
    hazards.push({ type: 'sporeCloud', x: sx, y: sy, w: 24, h: 20, timer: Math.random() * 4, active: true });
  }

  // Reactor vents (fire pillars)
  if (stageNum >= 2) {
    var ventCount = 1 + Math.floor(stageNum / 2);
    for (var i = 0; i < ventCount; i++) {
      var vx = TAS.math.randInt(8, wide - 5) * TILE;
      hazards.push({ type: 'reactorVent', x: vx, y: (tall - 2) * TILE, w: 16, h: 48, timer: Math.random() * 3, active: false, period: 2.5 + Math.random() });
    }
  }

  // Mycelial tendrils (grab zones)
  if (stageNum >= 3) {
    var tendrilCount = 2 + Math.floor(stageNum / 2);
    for (var i = 0; i < tendrilCount; i++) {
      var tx = TAS.math.randInt(8, wide - 5) * TILE;
      var ty = TAS.math.randInt(4, tall - 4) * TILE;
      hazards.push({ type: 'tendril', x: tx, y: ty, w: 16, h: 32, timer: 0, active: true, grabTimer: 0 });
    }
  }
}

function updateHazards(dt) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    h.timer += dt;

    switch(h.type) {
      case 'sporeCloud':
        // Pulsates, slows player
        h.active = Math.sin(h.timer * 1.5) > -0.3;
        if (h.active && player && player.invuln <= 0) {
          if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x - 4, h.y - 4, h.w + 8, h.h + 8)) {
            // Slow player movement
            player.vx *= 0.85;
            player.vy *= 0.9;
            // Small periodic damage
            if (Math.floor(h.timer * 2) % 4 === 0 && Math.floor((h.timer - dt) * 2) % 4 !== 0) {
              playerDie();
              SFX.sporeCloud();
            }
          }
        }
        break;

      case 'reactorVent':
        // Periodic fire column
        h.active = (h.timer % h.period) < 1.0;
        if (h.active && player && player.invuln <= 0) {
          if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y - h.h, h.w, h.h)) {
            playerDie();
            SFX.hazardBurn();
          }
        }
        break;

      case 'tendril':
        // Grabs and holds player briefly
        if (player && player.invuln <= 0 && h.grabTimer <= 0) {
          if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y, h.w, h.h)) {
            h.grabTimer = 1.5;
            player.vx = 0;
            player.vy = 0;
            player.flying = false;
            player.clinging = false;
            SFX.sporeCloud();
          }
        }
        if (h.grabTimer > 0) {
          h.grabTimer -= dt;
          if (player) {
            player.vx *= 0.3;
            player.vy *= 0.3;
          }
        }
        break;
    }
  }
}

// === TILE COLLISION ===
function getTile(r, c) {
  if (r < 0 || r >= tiles.length || c < 0 || c >= tiles[0].length) return 1;
  return tiles[r][c];
}

function isSolid(r, c) {
  var t = getTile(r, c);
  return t === 1 || t === 2;
}

function worldCollide(x, y, w, h) {
  var left = Math.floor(x / TILE);
  var right = Math.floor((x + w - 1) / TILE);
  var top = Math.floor(y / TILE);
  var bot = Math.floor((y + h - 1) / TILE);
  for (var r = top; r <= bot; r++) {
    for (var c = left; c <= right; c++) {
      if (isSolid(r, c)) return true;
    }
  }
  return false;
}

function checkWallCling(px, py, pw, ph, dir) {
  var cx = dir > 0 ? Math.floor((px + pw + 1) / TILE) : Math.floor((px - 2) / TILE);
  var topR = Math.floor(py / TILE);
  var botR = Math.floor((py + ph - 1) / TILE);
  for (var r = topR; r <= botR; r++) {
    if (isSolid(r, cx)) return true;
  }
  return false;
}

// === UPDATE PLAYER ===
function updatePlayer(dt) {
  if (!player || deathTimer > 0) return;

  var inp = TAS.input;
  var left = inp.keys['ArrowLeft'] || inp.keys['KeyA'] || inp.touch.left;
  var right = inp.keys['ArrowRight'] || inp.keys['KeyD'] || inp.touch.right;
  var up = inp.keys['ArrowUp'] || inp.keys['KeyW'] || inp.touch.up;
  var down = inp.keys['ArrowDown'] || inp.keys['KeyS'] || inp.touch.down;
  var jumpBtn = inp.keys['Space'] || inp.keys['KeyZ'] || inp.touch.a;
  var fireBtn = inp.keys['KeyX'] || inp.keys['KeyC'] || inp.touch.b;

  var moveSpd = dexMoveSpeed();
  var flySpd = dexFlySpeed();

  player.invuln = Math.max(0, player.invuln - dt);
  player.attackCooldown = Math.max(0, player.attackCooldown - dt);
  player.headbuttCooldown = Math.max(0, player.headbuttCooldown - dt);
  player.animTimer += dt;

  // Spore Wings timer
  if (sporeWingsActive) {
    sporeWingsTimer -= dt;
    if (sporeWingsTimer <= 0) {
      sporeWingsActive = false;
    }
  }

  // Reactor Breath charging
  if (fireBtn && down && !reactorCharging && player.attackCooldown <= 0) {
    reactorCharging = true;
    reactorCharge = 0;
  }
  if (reactorCharging) {
    if (fireBtn && down) {
      reactorCharge = Math.min(REACTOR_CHARGE_MAX, reactorCharge + dt);
    } else {
      // Release charged shot
      if (reactorCharge > 0.3) {
        doReactorBreath();
      }
      reactorCharging = false;
      reactorCharge = 0;
    }
  }

  // Horizontal movement
  if (player.clinging) {
    player.vx = 0;
    player.vy = 0;
    if (jumpBtn && !player._jumpHeld) {
      player.clinging = false;
      player.vx = -player.clingDir * moveSpd * 1.5;
      player.vy = JUMP_VEL * 0.8;
      player.facing = -player.clingDir;
      SFX.jump();
      player._jumpHeld = true;
    }
    if (down) {
      player.clinging = false;
    }
  } else if (player.flying) {
    player.flightMeter -= dt;
    player.wingTimer += dt;
    if (player.wingTimer > 0.1) {
      player.wingTimer = 0;
      player.wingFrame = (player.wingFrame + 1) % 4;
      if (player.wingFrame === 0) SFX.flap();
    }

    if (left) { player.vx = -flySpd; player.facing = -1; }
    else if (right) { player.vx = flySpd; player.facing = 1; }
    else { player.vx *= 0.85; }

    if (up) player.vy = -flySpd;
    else if (down && !reactorCharging) player.vy = flySpd * 0.7;
    else player.vy *= 0.85;

    // Spore Wings: extended flight with WIS
    var flightEnd = sporeWingsActive ? player.flightMeter <= -wisFlightBonus() : player.flightMeter <= 0;
    if (flightEnd || (!jumpBtn && player._jumpHeld)) {
      player.flying = false;
      player.flightMeter = Math.max(0, player.flightMeter);
    }
  } else {
    if (left) { player.vx = -moveSpd; player.facing = -1; }
    else if (right) { player.vx = moveSpd; player.facing = 1; }
    else { player.vx *= 0.7; }

    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;

    if (jumpBtn && !player._jumpHeld) {
      if (player.onGround) {
        player.vy = JUMP_VEL - upgrades.jumpBoost * 30;
        player.onGround = false;
        SFX.jump();
        player._jumpHeld = true;
      } else if (player.flightMeter > 0.1) {
        player.flying = true;
        player.vy = -40;
        player._jumpHeld = true;
      }
    }

    if (player.onGround) {
      player.flightMeter = Math.min(player.flightMax, player.flightMeter + dt * 1.2);
    }

    if (!player.onGround && player.vy > 0) {
      if (left && checkWallCling(player.x, player.y, player.w, player.h, -1)) {
        player.clinging = true;
        player.clingDir = -1;
        player.vy = 0;
        player.vx = 0;
        player.facing = 1;
        SFX.cling();
      } else if (right && checkWallCling(player.x, player.y, player.w, player.h, 1)) {
        player.clinging = true;
        player.clingDir = 1;
        player.vy = 0;
        player.vx = 0;
        player.facing = -1;
        SFX.cling();
      }
    }
  }

  if (!jumpBtn) player._jumpHeld = false;

  // Fire breath (not while charging reactor breath)
  if (fireBtn && player.attackCooldown <= 0 && !reactorCharging) {
    if (up && player.headbuttCooldown <= 0) {
      doHeadbutt();
    } else if (!down) {
      doFireBreath();
    }
  }

  moveWithCollision(dt);

  // Walk animation
  if (player.onGround && Math.abs(player.vx) > 10) {
    player.walkFrame = Math.floor(player.animTimer * 8) % 4;
    player.animState = 'walk';
  } else if (player.flying) {
    player.animState = 'fly';
  } else if (player.clinging) {
    player.animState = 'cling';
  } else if (!player.onGround) {
    player.animState = 'air';
  } else {
    player.animState = 'idle';
    player.walkFrame = 0;
  }

  // Fall death
  if (player.y > levelHeight + 32) {
    playerDie();
  }
}

function moveWithCollision(dt) {
  var newX = player.x + player.vx * dt;
  if (!worldCollide(newX, player.y, player.w, player.h)) {
    player.x = newX;
  } else {
    player.vx = 0;
  }

  var newY = player.y + player.vy * dt;
  player.onGround = false;
  if (!worldCollide(player.x, newY, player.w, player.h)) {
    player.y = newY;
  } else {
    if (player.vy > 0) {
      player.onGround = true;
      player.y = Math.floor((newY + player.h) / TILE) * TILE - player.h;
      player.flightMeter = Math.min(player.flightMax, player.flightMeter + dt * 2);
    } else {
      player.y = Math.floor(player.y / TILE) * TILE + TILE;
    }
    player.vy = 0;
  }

  player.x = TAS.math.clamp(player.x, 0, levelWidth - player.w);
  if (player.y < 0) { player.y = 0; player.vy = 0; }
}

function doFireBreath() {
  player.attackCooldown = wisCooldown(0.25);
  SFX.fire();
  var fx = player.x + (player.facing > 0 ? player.w : -6);
  var fy = player.y + player.h * 0.3;
  var dmg = strFireDmg(1);

  if (upgrades.fireLevel >= 4) {
    fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED, vy: 0, size: 5, life: 2.5, homing: true, dmg: Math.floor(dmg * 2) });
  } else if (upgrades.fireLevel >= 3) {
    fireballs.push({ x: fx, y: fy - 6, vx: player.facing * FIREBALL_SPEED, vy: -30, size: 4, life: 1.8, dmg: Math.floor(dmg) });
    fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED, vy: 0, size: 4, life: 1.8, dmg: Math.floor(dmg) });
    fireballs.push({ x: fx, y: fy + 6, vx: player.facing * FIREBALL_SPEED, vy: 30, size: 4, life: 1.8, dmg: Math.floor(dmg) });
  } else if (upgrades.fireLevel >= 2) {
    fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED * 1.1, vy: 0, size: 6, life: 2, dmg: Math.floor(dmg * 2) });
  } else {
    fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED, vy: 0, size: 3, life: 1.5, dmg: Math.max(1, Math.floor(dmg)) });
  }

  TAS.particles.spawn(fx, fy, '#ff8800', 4, 2, { size: 2, gravity: 0 });
}

// Reactor Breath: charged fire attack (STR + WIS scaled)
function doReactorBreath() {
  var chargePct = reactorCharge / REACTOR_CHARGE_MAX;
  player.attackCooldown = wisCooldown(0.6);
  SFX.reactorBreath();
  TAS.fx.shake(Math.floor(3 + chargePct * 5), 0.88);

  var fx = player.x + (player.facing > 0 ? player.w + 2 : -10);
  var fy = player.y + player.h * 0.3;
  var baseDmg = strFireDmg(2 + chargePct * 4);
  var sz = Math.floor(4 + chargePct * 6);

  // Main blast
  fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED * 1.4, vy: 0, size: sz, life: 2.5, dmg: Math.floor(baseDmg), reactor: true });

  // Shrapnel at higher charge
  if (chargePct > 0.5) {
    for (var i = -1; i <= 1; i += 2) {
      fireballs.push({ x: fx, y: fy, vx: player.facing * FIREBALL_SPEED * 1.1, vy: i * 50 * chargePct, size: Math.floor(sz * 0.5), life: 1.5, dmg: Math.max(1, Math.floor(baseDmg * 0.4)) });
    }
  }

  TAS.particles.spawn(fx, fy, '#44ffaa', 8, 3, { size: 3, gravity: 0 });
  TAS.particles.spawn(fx, fy, '#ff8800', 6, 2, { size: 2, gravity: 0 });
}

function doHeadbutt() {
  player.headbuttCooldown = wisCooldown(0.5);
  player.attackCooldown = wisCooldown(0.3);
  SFX.headbutt();

  var cr = Math.floor((player.y - 2) / TILE);
  var cl = Math.floor((player.x + player.w / 2) / TILE);
  if (cr >= 0 && cr < tiles.length && cl >= 0 && cl < tiles[0].length) {
    if (tiles[cr][cl] === 2) {
      tiles[cr][cl] = 0;
      TAS.particles.spawn((cl + 0.5) * TILE, (cr + 0.5) * TILE, '#aa88cc', 8, 3, { size: 3, gravity: 2 });
      TAS.fx.shake(4, 0.85);
      score += intScore(25);
    }
  }

  var headDmg = Math.max(1, Math.floor(strFireDmg(2)));
  var hbx = player.x - 4;
  var hby = player.y - 14;
  var hbw = player.w + 8;
  var hbh = 16;
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (TAS.hit.rectOverlap(hbx, hby, hbw, hbh, e.x, e.y, e.w, e.h)) {
      damageEnemy(i, headDmg);
    }
  }
  if (bossActive) {
    if (TAS.hit.rectOverlap(hbx, hby, hbw, hbh, bossActive.x, bossActive.y, bossActive.w, bossActive.h)) {
      damageBoss(headDmg);
    }
  }

  TAS.particles.spawn(player.x + player.w / 2, player.y - 4, '#ffff88', 5, 2, { size: 2 });
}

function playerDie() {
  if (deathTimer > 0) return;
  player.hp--;
  if (player.hp <= 0) {
    if (lives > 0) {
      lives--;
      player.hp = player.maxHp;
      player.invuln = INVULN_TIME * 2;
      player.y -= 20;
      player.vy = -150;
      player.flying = false;
      player.clinging = false;
      SFX.hit();
      TAS.fx.shake(6, 0.9);
      TAS.fx.flash('#ff8800', 0.4);
      showMsg('EXTRA BASELING!');
    } else {
      deathTimer = 2;
      SFX.die();
      TAS.fx.shake(8, 0.9);
      TAS.fx.flash('#ff0000', 0.5);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 20, 3, { size: 3, gravity: 2 });
    }
  } else {
    player.invuln = INVULN_TIME;
    player.y -= 20;
    player.vy = -150;
    player.flying = false;
    player.clinging = false;
    SFX.hit();
    TAS.fx.shake(4, 0.88);
    TAS.fx.flash('#ff4444', 0.3);
  }
}

// === ENEMIES ===
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.timer += dt;
    e.animFrame = Math.floor(e.timer * 4) % 4;

    var dx = e.x - camera.x;
    var dy = e.y - camera.y;
    if (dx < -80 || dx > GW + 80 || dy < -80 || dy > GH + 80) continue;

    switch(e.type) {
      case 'reactorImp':
        e.vx = e.speed * e.facing;
        e.vy += GRAVITY * dt * 0.5;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (worldCollide(e.x, e.y + e.h + 1, e.w, 2)) {
          e.vy = 0;
          e.y = Math.floor((e.y + e.h) / TILE) * TILE - e.h;
        }
        if (worldCollide(e.x + e.vx * dt * 3, e.y, e.w, e.h) || !worldCollide(e.x + e.facing * 16, e.y + e.h + 2, 2, 2)) {
          e.facing *= -1;
        }
        break;

      case 'sporePhantom':
        e.phase += dt * 2;
        e.x += e.speed * e.facing * dt;
        e.y = e.floatY + Math.sin(e.phase) * 20;
        if (e.timer > 3) { e.facing *= -1; e.timer = 0; }
        // Spore trail
        if (frame % 12 === 0) TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#66aa66', 1, 1.5, { size: 2, gravity: -0.5 });
        break;

      case 'sporeBat':
        e.swoopTimer -= dt;
        if (e.swoopTimer <= 0) {
          if (player) {
            var ag = TAS.math.angle(e.x, e.y, player.x, player.y);
            e.vx = Math.cos(ag) * e.speed * 2;
            e.vy = Math.sin(ag) * e.speed * 2;
          }
          e.swoopTimer = 2 + Math.random() * 2;
        } else {
          e.vx *= 0.95;
          e.vy += (e.baseY - e.y) * 0.5 * dt;
          e.vy *= 0.95;
        }
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        break;

      case 'toxicSlime':
        e.jumpTimer -= dt;
        if (e.jumpTimer <= 0 && worldCollide(e.x, e.y + e.h + 1, e.w, 2)) {
          e.vy = -150;
          e.vx = (Math.random() - 0.5) * 80;
          e.jumpTimer = 1.5 + Math.random();
        }
        e.vy += GRAVITY * dt * 0.6;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (worldCollide(e.x, e.y + e.h, e.w, 2)) {
          e.vy = 0;
          e.vx *= 0.8;
          e.y = Math.floor((e.y + e.h) / TILE) * TILE - e.h;
        }
        break;

      case 'crystalGolem':
        e.vx = e.speed * e.facing;
        e.x += e.vx * dt;
        if (worldCollide(e.x + e.vx * dt * 2, e.y, e.w, e.h)) { e.facing *= -1; }
        break;

      case 'emberSpirit':
        e.phase = (e.phase || 0) + dt * 3;
        e.x += Math.cos(e.phase) * e.speed * dt;
        e.y += Math.sin(e.phase * 0.7) * e.speed * 0.5 * dt;
        // Ember trail
        if (frame % 4 === 0) TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#ff4400', 1, 1, { size: 2, gravity: -1 });
        break;

      case 'mycelialDragonlet':
        e.vx = e.speed * e.facing;
        e.x += e.vx * dt;
        if (worldCollide(e.x + e.vx * dt * 2, e.y, e.w, e.h)) { e.facing *= -1; }
        e.shootTimer = (e.shootTimer || 2) - dt;
        if (e.shootTimer <= 0 && player) {
          e.shootTimer = 2.5;
          var ag2 = TAS.math.angle(e.x, e.y, player.x, player.y);
          fireballs.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, vx: Math.cos(ag2) * 120, vy: Math.sin(ag2) * 120, size: 4, life: 3, dmg: 1, enemy: true });
        }
        break;

      case 'voidEye':
        if (player) {
          var ag3 = TAS.math.angle(e.x, e.y, player.x, player.y);
          e.vx += Math.cos(ag3) * e.speed * dt * 2;
          e.vy += Math.sin(ag3) * e.speed * dt * 2;
          var spd = Math.sqrt(e.vx * e.vx + e.vy * e.vy);
          if (spd > e.speed) { e.vx = e.vx / spd * e.speed; e.vy = e.vy / spd * e.speed; }
        }
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        break;
    }

    // Hit player
    if (player && player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      playerDie();
    }
  }
}

function damageEnemy(idx, dmg) {
  var e = enemies[idx];
  if (e.immune) {
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#666666', 3, 1);
    return;
  }
  e.hp -= dmg;
  if (e.hp <= 0) {
    SFX.enemyDie();
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, getEnemyColor(e.type), 10, 2.5, { size: 2, gravity: 1 });
    score += intScore(getEnemyScore(e.type));
    enemies.splice(idx, 1);
    TAS.fx.shake(2, 0.92);
  } else {
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffffff', 4, 1.5);
  }
}

function getEnemyColor(type) {
  switch(type) {
    case 'reactorImp': return '#ff6644';
    case 'sporePhantom': return '#66cc88';
    case 'sporeBat': return '#886644';
    case 'toxicSlime': return '#44cc44';
    case 'crystalGolem': return '#88aaff';
    case 'emberSpirit': return '#ff8844';
    case 'mycelialDragonlet': return '#cc44cc';
    case 'voidEye': return '#ff44ff';
    default: return '#ffffff';
  }
}

function getEnemyScore(type) {
  switch(type) {
    case 'reactorImp': return 50;
    case 'sporePhantom': return 40;
    case 'sporeBat': return 30;
    case 'toxicSlime': return 35;
    case 'crystalGolem': return 60;
    case 'emberSpirit': return 70;
    case 'mycelialDragonlet': return 80;
    case 'voidEye': return 60;
    default: return 25;
  }
}

// === BOSS (Enhanced) ===
function updateBoss(dt) {
  if (!bossActive) return;
  var b = bossActive;
  b.timer += dt;
  b.invuln = Math.max(0, b.invuln - dt);
  b.attackTimer -= dt;

  // Enrage at 30% HP
  if (!b.enragePhase && b.hp <= b.maxHp * 0.3) {
    b.enragePhase = true;
    SFX.bossRoar();
    TAS.fx.shake(6, 0.9);
    TAS.fx.flash('#ff440044', 0.4);
    showMsg('FUNGAL LORD ENRAGED!');
  }

  var speedMult = b.enragePhase ? 1.6 : 1;

  // Movement
  if (player) {
    var dist = player.x - b.x;
    if (Math.abs(dist) > 40) {
      b.vx = (dist > 0 ? 1 : -1) * 40 * speedMult;
    } else {
      b.vx *= 0.9;
    }
  }

  // Dash attack when enraged
  if (b.enragePhase) {
    b.dashTimer -= dt;
    if (b.dashTimer <= 0 && player) {
      b.dashTimer = 3 + Math.random() * 2;
      var dashDir = player.x > b.x ? 1 : -1;
      b.vx = dashDir * 150;
      TAS.fx.shake(3, 0.9);
    }
  }

  // Summon minions when enraged
  if (b.enragePhase) {
    b.summonTimer -= dt;
    if (b.summonTimer <= 0) {
      b.summonTimer = 6 + Math.random() * 3;
      var mtype = b.stageNum >= 4 ? 'emberSpirit' : 'reactorImp';
      enemies.push(createEnemy(mtype, b.x + b.w / 2, b.y - 16));
      SFX.bossRoar();
      TAS.particles.spawn(b.x + b.w / 2, b.y, '#ff8800', 6, 2, { size: 2 });
    }
  }

  b.x += b.vx * dt;
  b.y += b.vy * dt;

  b.x = TAS.math.clamp(b.x, (tiles[0].length - 8) * TILE, (tiles[0].length - 2) * TILE);
  b.y = TAS.math.clamp(b.y, 2 * TILE, (tiles.length - 3) * TILE);

  if (b.attackTimer <= 0) {
    b.attackTimer = b.enragePhase ? 0.8 + Math.random() * 0.5 : 1.5 + Math.random();
    bossFire(b);
  }

  b.vy = Math.sin(b.timer * 2 * speedMult) * 60 * speedMult;

  if (player && player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
    playerDie();
  }

  for (var i = b.projections.length - 1; i >= 0; i--) {
    var p = b.projections[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { b.projections.splice(i, 1); continue; }
    if (player && player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x - 4, p.y - 4, 8, 8)) {
      playerDie();
      b.projections.splice(i, 1);
    }
  }
}

function bossFire(b) {
  if (!player) return;
  SFX.bossRoar();
  var count = 3 + Math.floor(b.stageNum / 2);
  if (b.enragePhase) count += 2;

  for (var i = 0; i < count; i++) {
    var ag = TAS.math.angle(b.x + b.w / 2, b.y + b.h / 2, player.x, player.y);
    ag += (i - count / 2) * 0.3;
    var spd = b.enragePhase ? 160 : 130;
    b.projections.push({
      x: b.x + b.w / 2, y: b.y + b.h / 2,
      vx: Math.cos(ag) * spd, vy: Math.sin(ag) * spd,
      life: 3
    });
  }
}

function damageBoss(dmg) {
  if (!bossActive || bossActive.invuln > 0) return;
  bossActive.hp -= dmg;
  bossActive.invuln = 0.3;
  TAS.fx.shake(5, 0.88);
  TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, '#ff8800', 10, 3);

  if (bossActive.hp <= 0) {
    SFX.clear();
    TAS.fx.shake(12, 0.92);
    TAS.fx.flash('#ffffff', 0.6);
    TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, '#ffaa00', 30, 4, { size: 4, gravity: 1 });
    TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, statB.color, 15, 3, { size: 3, gravity: 0.5 });
    score += intScore(500 + bossActive.stageNum * 200);
    bossActive = null;
    stageCompleteTimer = 3;
  }
}

// === FIREBALLS ===
function updateFireballs(dt) {
  for (var i = fireballs.length - 1; i >= 0; i--) {
    var fb = fireballs[i];
    fb.life -= dt;
    if (fb.life <= 0) { fireballs.splice(i, 1); continue; }

    // Homing
    if (fb.homing && !fb.enemy && enemies.length > 0) {
      var closest = null;
      var closestDist = 999;
      for (var j = 0; j < enemies.length; j++) {
        var d = TAS.math.dist(fb.x, fb.y, enemies[j].x, enemies[j].y);
        if (d < closestDist) { closestDist = d; closest = enemies[j]; }
      }
      if (closest && closestDist < 120) {
        var ag = TAS.math.angle(fb.x, fb.y, closest.x + closest.w / 2, closest.y + closest.h / 2);
        fb.vx += Math.cos(ag) * 400 * dt;
        fb.vy += Math.sin(ag) * 400 * dt;
        var spd = Math.sqrt(fb.vx * fb.vx + fb.vy * fb.vy);
        if (spd > FIREBALL_SPEED * 1.3) {
          fb.vx = fb.vx / spd * FIREBALL_SPEED * 1.3;
          fb.vy = fb.vy / spd * FIREBALL_SPEED * 1.3;
        }
      }
    }

    fb.x += fb.vx * dt;
    fb.y += fb.vy * dt;

    var tr = Math.floor(fb.y / TILE);
    var tc = Math.floor(fb.x / TILE);
    if (isSolid(tr, tc)) {
      // Reactor breath breaks breakable tiles
      if (fb.reactor && getTile(tr, tc) === 2) {
        tiles[tr][tc] = 0;
        TAS.particles.spawn((tc + 0.5) * TILE, (tr + 0.5) * TILE, '#44ffaa', 6, 2, { size: 2, gravity: 1 });
        score += intScore(15);
      }
      fireballs.splice(i, 1);
      TAS.particles.spawn(fb.x, fb.y, fb.reactor ? '#44ffaa' : '#ff6600', 4, 1.5);
      continue;
    }

    if (fb.enemy) {
      if (player && player.invuln <= 0 && TAS.hit.circleOverlap(fb.x, fb.y, fb.size, player.x + player.w / 2, player.y + player.h / 2, 7)) {
        playerDie();
        fireballs.splice(i, 1);
      }
    } else {
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e = enemies[j];
        if (TAS.hit.circleOverlap(fb.x, fb.y, fb.size, e.x + e.w / 2, e.y + e.h / 2, e.w * 0.6)) {
          damageEnemy(j, fb.dmg || 1);
          fireballs.splice(i, 1);
          break;
        }
      }
      if (bossActive && fireballs[i]) {
        if (TAS.hit.circleOverlap(fb.x, fb.y, fb.size, bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, bossActive.w * 0.5)) {
          damageBoss(fb.dmg || 1);
          fireballs.splice(i, 1);
        }
      }
    }
  }
}

// === ITEMS ===
function updateItems(dt) {
  for (var i = items.length - 1; i >= 0; i--) {
    var it = items[i];
    if (it.collected) continue;
    it.bob += dt * 3;

    if (player && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, it.x, it.y + Math.sin(it.bob) * 3, it.w, it.h)) {
      it.collected = true;
      collectItem(it);
    }
  }
}

function collectItem(it) {
  SFX.upgrade();
  TAS.particles.spawn(it.x + it.w / 2, it.y + it.h / 2, '#ffff44', 12, 2.5, { size: 3 });

  switch(it.type) {
    case 'health':
      player.hp = Math.min(player.maxHp, player.hp + 1);
      showMsg('+1 POOP TOKEN');
      break;
    case 'flight':
      upgrades.flightTime = Math.min(4, upgrades.flightTime + 0.5);
      player.flightMax = upgrades.flightTime + wisFlightBonus();
      showMsg('SPORE WINGS UP!');
      score += intScore(100);
      break;
    case 'hp':
      upgrades.maxHp = Math.min(6, upgrades.maxHp + 1);
      player.maxHp = conMaxHp(upgrades.maxHp);
      player.hp = player.maxHp;
      showMsg('GARDEN SEED!');
      score += intScore(100);
      break;
    case 'fire':
      upgrades.fireLevel = Math.min(4, upgrades.fireLevel + 1);
      var names = ['', 'SPORE PELLET', 'POOP BLAST', 'TRIPLE SPORE', 'HOMING MYCELIUM'];
      showMsg(names[upgrades.fireLevel] + '!');
      score += intScore(100);
      break;
    case 'jump':
      upgrades.jumpBoost = Math.min(2, upgrades.jumpBoost + 1);
      showMsg('MYCELIUM BOOST!');
      score += intScore(100);
      break;
    case 'claw':
      upgrades.clawRange = Math.min(2, upgrades.clawRange + 1);
      showMsg('SPORE CLAW!');
      score += intScore(100);
      break;
    case 'sporeWings':
      sporeWingsActive = true;
      sporeWingsTimer = 15 + wisFlightBonus() * 5;
      player.flightMeter = player.flightMax;
      SFX.sporeWings();
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#44ff88', 15, 3, { size: 3, gravity: -0.5 });
      showMsg('SPORE WINGS!');
      score += intScore(75);
      break;
    case 'reactorShard':
      // Temporary STR boost via extra fire damage
      player.attackCooldown = 0;
      upgrades.fireLevel = Math.min(4, upgrades.fireLevel + 1);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff8844', 15, 3, { size: 3 });
      showMsg('SPORE GEM!');
      score += intScore(150);
      TAS.fx.shake(3, 0.9);
      break;
    case 'scoreOrb':
      score += intScore(50);
      showMsg('+' + intScore(50));
      TAS.particles.spawn(it.x + it.w / 2, it.y + it.h / 2, statB.color, 8, 2, { size: 2 });
      break;
  }
}

function showMsg(txt) {
  msgText = txt;
  msgTimer = 2;
}

// === CAMERA ===
function updateCamera() {
  if (!player) return;
  var targetX = player.x - GW / 2 + player.w / 2;
  var targetY = player.y - GH / 2 + player.h / 2;
  camera.x = TAS.math.lerp(camera.x, targetX, 0.08);
  camera.y = TAS.math.lerp(camera.y, targetY, 0.08);
  camera.x = TAS.math.clamp(camera.x, 0, levelWidth - GW);
  camera.y = TAS.math.clamp(camera.y, 0, levelHeight - GH);
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'stageIntro') {
    pauseTimer -= dt;
    if (pauseTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'playing') {
    if (stageCompleteTimer > 0) {
      stageCompleteTimer -= dt;
      if (stageCompleteTimer <= 0) {
        advanceStage();
      }
      return;
    }

    if (deathTimer > 0) {
      deathTimer -= dt;
      if (deathTimer <= 0) {
        if (player.hp <= 0) {
          state = 'gameOver';
          if (score > highScore) {
            highScore = score;
            TAS.score.save('gargoylequest_hi', highScore);
          }
        } else {
          generateLevel(stageIdx);
        }
      }
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateFireballs(dt);
    updateItems(dt);
    updateHazards(dt);
    updateBoss(dt);
    updateCamera();

    if (!STAGES[stageIdx].hasBoss && player && player.x > levelWidth - TILE * 3) {
      stageCompleteTimer = 2;
      SFX.clear();
      score += intScore(200);
    }

    if (msgTimer > 0) msgTimer -= dt;
  }
}

function startGame() {
  state = 'stageIntro';
  stageIdx = 0;
  score = 0;
  lives = conBonusLives();
  upgrades = { flightTime: 1.5, maxHp: 2, fireLevel: 1, jumpBoost: 0, clawRange: 0 };
  loadGame();
  generateLevel(stageIdx);
  pauseTimer = 2;
  deathTimer = 0;
  stageCompleteTimer = 0;
}

function advanceStage() {
  stageIdx++;
  if (stageIdx >= STAGES.length) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('gargoylequest_hi', highScore);
    }
    saveGame();
    return;
  }
  saveGame();
  generateLevel(stageIdx);
  state = 'stageIntro';
  pauseTimer = 2;
}

// === DRAWING ===
function draw(dt) {
  var stg = STAGES[stageIdx] || STAGES[0];

  ctx.fillStyle = stg.bg1;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage ' + (stageIdx + 1) + ': ' + stg.name });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground(stg);
  drawHazards();
  drawTiles(stg);
  drawItems();
  drawEnemies();
  drawBoss();
  drawFireballs();
  drawPlayer();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD(stg);
  drawMessage();
  drawReactorCharge();
  TAS.input.drawTouchControls(GW, GH);
}

function drawBackground(stg) {
  var px1 = camera.x * 0.2;
  var px2 = camera.x * 0.4;

  switch(stg.bgType) {
    case 'spore':
      // Mushroom stalks and spore clouds
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        var bh = 40 + Math.sin(i * 1.3) * 20;
        ctx.fillRect(bx + 30, GH - bh - 30, 10, bh + 30);
        // Mushroom cap
        ctx.beginPath();
        ctx.arc(bx + 35, GH - bh - 30, 20, Math.PI, 0);
        ctx.fill();
      }
      // Floating spores
      ctx.fillStyle = '#3a2a4a44';
      for (var i = 0; i < 12; i++) {
        var sx = (i * 37 + frame * 0.15) % (GW + 40) - 20;
        var sy = (GH * 0.3) + Math.sin(frame * 0.02 + i * 1.7) * 30;
        ctx.beginPath();
        ctx.arc(sx, sy, 3 + Math.sin(i) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    case 'reactor':
      // Industrial pipes and reactor cores
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        // Pipe
        ctx.fillRect(bx + 10, GH - 80, 8, 80);
        ctx.fillRect(bx + 50, GH - 60, 8, 60);
        // Reactor glow
        ctx.fillStyle = '#4a4a6a22';
        ctx.beginPath();
        ctx.arc(bx + 35, GH - 50, 12 + Math.sin(frame * 0.03 + i) * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = stg.bg2;
      }
      break;

    case 'mycelial':
      // Dense mycelial network, branching tendrils
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 10; i++) {
        var bx = i * 60 - (px1 % 60);
        // Tree trunk
        ctx.fillRect(bx + 20, GH - 70, 6, 70);
        // Branches
        ctx.fillStyle = stg.accent + '44';
        ctx.fillRect(bx + 10, GH - 50, 26, 4);
        ctx.fillRect(bx + 14, GH - 65, 18, 4);
        // Mycelial glow dots
        ctx.fillStyle = '#2a5a2a44';
        ctx.fillRect(bx + 8, GH - 45 + Math.sin(frame * 0.02 + i) * 3, 4, 4);
        ctx.fillStyle = stg.bg2;
      }
      break;

    case 'crystal':
      // Crystalline formations
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        // Crystal pillars
        ctx.beginPath();
        ctx.moveTo(bx + 30, GH);
        ctx.lineTo(bx + 40, GH - 60 - Math.sin(i * 2) * 15);
        ctx.lineTo(bx + 50, GH);
        ctx.fill();
        ctx.fillStyle = '#4a6a9a22';
        ctx.beginPath();
        ctx.moveTo(bx + 55, GH);
        ctx.lineTo(bx + 60, GH - 35);
        ctx.lineTo(bx + 65, GH);
        ctx.fill();
        ctx.fillStyle = stg.bg2;
      }
      break;

    case 'caldera':
      // Volcanic terrain with lava glow
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        var bh = 30 + Math.sin(i * 1.8) * 15;
        ctx.fillRect(bx, GH - bh, 70, bh);
      }
      // Lava glow at bottom
      ctx.fillStyle = '#4a1a0a' + (Math.floor(Math.sin(frame * 0.04) * 2 + 5)).toString(16) + '0';
      ctx.fillRect(0, GH - 8, GW, 8);
      // Embers floating up
      ctx.fillStyle = '#ff440044';
      for (var i = 0; i < 8; i++) {
        var ex = (i * 53 + frame * 0.3) % GW;
        var ey = GH - 20 - (frame * 0.4 + i * 30) % (GH * 0.6);
        ctx.fillRect(Math.floor(ex), Math.floor(ey), 2, 2);
      }
      break;

    case 'nexus':
      // Dark dragon nexus with energy lines
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        ctx.fillRect(bx + 10, 0, 4, GH);
        ctx.fillRect(bx + 60, 0, 4, GH);
      }
      // Energy pulses
      ctx.fillStyle = '#6a2a4a33';
      for (var i = 0; i < 5; i++) {
        var py = (frame * 0.5 + i * 60) % GH;
        ctx.fillRect(0, Math.floor(py), GW, 2);
      }
      break;

    default:
      // Fallback parallax
      ctx.fillStyle = stg.bg2;
      for (var i = -1; i < 8; i++) {
        var bx = i * 80 - (px1 % 80);
        var bh = 40 + Math.sin(i * 1.3) * 20;
        ctx.fillRect(bx, GH - bh - 30, 70, bh + 30);
      }
      break;
  }

  // Mid bg layer (universal)
  ctx.fillStyle = stg.accent + '33';
  for (var i = -1; i < 12; i++) {
    var bx2 = i * 50 - (px2 % 50);
    var bh2 = 30 + Math.sin(i * 2.1 + 1) * 15;
    ctx.fillRect(bx2 + 10, GH - bh2, 12, bh2);
    ctx.fillRect(bx2, GH - bh2 - 8, 32, 10);
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var hx = h.x - camera.x;
    var hy = h.y - camera.y;

    if (hx < -40 || hx > GW + 40 || hy < -60 || hy > GH + 40) continue;

    switch(h.type) {
      case 'sporeCloud':
        var alpha = h.active ? (0.3 + Math.sin(h.timer * 1.5) * 0.15) : 0.1;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#44aa44';
        ctx.beginPath();
        ctx.arc(hx + h.w / 2, hy + h.h / 2, h.w / 2 + Math.sin(h.timer * 2) * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#66cc66';
        ctx.beginPath();
        ctx.arc(hx + h.w / 2 + 4, hy + h.h / 2 - 3, h.w / 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Spore particles
        if (h.active && frame % 8 === 0) {
          TAS.particles.spawn(h.x + Math.random() * h.w, h.y + Math.random() * h.h, '#88dd88', 1, 2, { size: 1, gravity: -0.3 });
        }
        break;

      case 'reactorVent':
        // Base vent
        ctx.fillStyle = '#555533';
        ctx.fillRect(hx + 2, hy - 4, h.w - 4, 8);
        ctx.fillStyle = '#666644';
        ctx.fillRect(hx + 4, hy - 2, h.w - 8, 4);
        // Fire column when active
        if (h.active) {
          var fireH = h.h * Math.min(1, (h.timer % h.period) * 3);
          for (var j = 0; j < Math.floor(fireH / 4); j++) {
            var fy = hy - 4 - j * 4;
            var fw = h.w - 4 - j * 0.5;
            var flicker = Math.sin(frame * 0.6 + j * 0.8) * 2;
            ctx.fillStyle = j < 3 ? '#ff8844' : j < 6 ? '#ff6622' : '#ff4400';
            ctx.fillRect(hx + (h.w - fw) / 2 + flicker, fy, Math.floor(fw), 5);
          }
          ctx.fillStyle = '#ffdd4444';
          ctx.beginPath();
          ctx.arc(hx + h.w / 2, hy - Math.floor(fireH * 0.6), 6, 0, Math.PI * 2);
          ctx.fill();
        }
        break;

      case 'tendril':
        // Mycelial tendril
        ctx.fillStyle = h.grabTimer > 0 ? '#cc6644' : '#886644';
        var wave = Math.sin(h.timer * 2) * 3;
        ctx.fillRect(hx + 6 + wave, hy, 4, h.h);
        ctx.fillRect(hx + 2 + wave * 0.5, hy + 8, 12, 4);
        ctx.fillRect(hx + wave * 0.7, hy + 16, 16, 4);
        ctx.fillRect(hx + 4 + wave * 0.3, hy + 24, 8, 4);
        // Glow when grabbing
        if (h.grabTimer > 0) {
          ctx.fillStyle = '#ff664433';
          ctx.beginPath();
          ctx.arc(hx + h.w / 2, hy + h.h / 2, 12, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
    }
  }
}

function drawTiles(stg) {
  var startC = Math.floor(camera.x / TILE);
  var startR = Math.floor(camera.y / TILE);
  var endC = startC + COLS + 1;
  var endR = startR + ROWS + 1;

  for (var r = startR; r <= endR; r++) {
    for (var c = startC; c <= endC; c++) {
      var t = getTile(r, c);
      if (t === 0) continue;
      var sx = Math.floor(c * TILE - camera.x);
      var sy = Math.floor(r * TILE - camera.y);

      if (t === 1) {
        ctx.fillStyle = stg.tile;
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.fillStyle = stg.accent;
        ctx.fillRect(sx, sy, TILE, 2);
        ctx.fillRect(sx, sy, 2, TILE);
        ctx.fillStyle = '#00000044';
        ctx.fillRect(sx + TILE - 2, sy, 2, TILE);
        ctx.fillRect(sx, sy + TILE - 2, TILE, 2);
      } else if (t === 2) {
        ctx.fillStyle = '#665544';
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.strokeStyle = '#88774433';
        ctx.strokeRect(sx + 2, sy + 2, TILE - 4, TILE - 4);
        ctx.strokeStyle = '#44332244';
        ctx.beginPath();
        ctx.moveTo(sx + 4, sy + 4); ctx.lineTo(sx + 12, sy + 12);
        ctx.moveTo(sx + 12, sy + 3); ctx.lineTo(sx + 5, sy + 11);
        ctx.stroke();
      }
    }
  }
}

function drawPlayer() {
  if (!player || deathTimer > 0) return;
  if (player.invuln > 0 && Math.floor(player.invuln * 10) % 2 === 0) return;

  var px = Math.floor(player.x - camera.x);
  var py = Math.floor(player.y - camera.y);
  var f = player.facing;

  // === BASELING SPRITE ===
  var _anim = (player.hp <= 0) ? 'ko' : (!player.onGround || player.clinging) ? 'jump' : (Math.abs(player.vx) > 1 ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, Math.max(player.w, player.h), { flipX: f < 0, frame: frame, anim: _anim })) {
    ctx.save();
    ctx.translate(px + player.w / 2, py + player.h / 2);
    if (f < 0) ctx.scale(-1, 1);

    // Body
    ctx.fillStyle = statB.color || '#a855f7';
    ctx.fillRect(-6, -4, 12, 14);

  // Head
  var headColor = statB.color || '#a855f7';
  ctx.fillStyle = headColor;
  ctx.fillRect(-5, -7, 10, 7);

  // Horns
  ctx.fillStyle = '#38d973';
  ctx.fillRect(-6, -10, 3, 4);
  ctx.fillRect(3, -10, 3, 4);

  // Eyes (glowing, red when charging reactor breath)
  ctx.fillStyle = reactorCharging ? '#44ffaa' : '#ff4444';
  ctx.fillRect(-3, -5, 2, 2);
  ctx.fillRect(1, -5, 2, 2);

  // Wings
  if (player.flying || player.animState === 'air') {
    var wingY = Math.sin(frame * 0.3) * 3;
    ctx.fillStyle = sporeWingsActive ? '#38d973' : '#7a444a';
    ctx.beginPath();
    ctx.moveTo(-6, -2);
    ctx.lineTo(-14, -6 + wingY);
    ctx.lineTo(-12, 4 + wingY);
    ctx.lineTo(-6, 4);
    ctx.fill();
    // Spore Wings sparkle
    if (sporeWingsActive && frame % 6 === 0) {
      TAS.particles.spawn(px + player.w / 2 - 10 * f, py + player.h / 2 + wingY, '#88ffaa', 1, 1, { size: 1.5, gravity: -0.5 });
    }
  } else if (player.clinging) {
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(-8, -3, 3, 10);
  } else {
    ctx.fillStyle = '#7a444a';
    ctx.beginPath();
    ctx.moveTo(-6, -2);
    ctx.lineTo(-10, 0);
    ctx.lineTo(-8, 8);
    ctx.lineTo(-6, 6);
    ctx.fill();
  }

  // Legs
  ctx.fillStyle = '#7a444a';
  if (player.animState === 'walk') {
    var legOff = Math.sin(player.walkFrame * 1.5) * 3;
    ctx.fillRect(-4, 10, 3, Math.floor(4 + legOff));
    ctx.fillRect(1, 10, 3, Math.floor(4 - legOff));
  } else {
    ctx.fillRect(-4, 10, 3, 4);
    ctx.fillRect(1, 10, 3, 4);
  }

  // Claws (if upgraded)
  if (upgrades.clawRange > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(5, 2, 2 + upgrades.clawRange, 2);
    ctx.fillRect(5, 5, 2 + upgrades.clawRange, 2);
  }

  // Reactor charge glow
  if (reactorCharging && reactorCharge > 0.1) {
    var chargeAlpha = Math.min(0.6, reactorCharge / REACTOR_CHARGE_MAX * 0.6);
    ctx.globalAlpha = chargeAlpha;
    ctx.fillStyle = '#44ffaa';
    ctx.beginPath();
    ctx.arc(4, 0, 4 + reactorCharge * 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

    ctx.restore();
  }

  // Cling sparks
  if (player.clinging) {
    if (frame % 10 === 0) {
      TAS.particles.spawn(px + (player.clingDir > 0 ? player.w + 2 : -2), py + Math.random() * player.h, '#ffff88', 1, 0.5, { size: 1 });
    }
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var ex = Math.floor(e.x - camera.x);
    var ey = Math.floor(e.y - camera.y);
    if (ex < -20 || ex > GW + 20 || ey < -20 || ey > GH + 20) continue;

    switch(e.type) {
      case 'reactorImp':
        // Small imp with reactor core body
        ctx.fillStyle = '#cc4422';
        ctx.fillRect(ex + 1, ey + 2, 10, 10);
        // Head
        ctx.fillStyle = '#dd5533';
        ctx.fillRect(ex + 2, ey, 8, 5);
        // Reactor core (glowing belly)
        ctx.fillStyle = '#ff8844';
        ctx.fillRect(ex + 4, ey + 5, 4, 4);
        ctx.fillStyle = '#ffcc66';
        ctx.fillRect(ex + 5, ey + 6, 2, 2);
        // Horns
        ctx.fillStyle = '#aa2211';
        ctx.fillRect(ex + 1, ey - 2, 2, 3);
        ctx.fillRect(ex + 9, ey - 2, 2, 3);
        // Eyes
        ctx.fillStyle = '#ffff44';
        ctx.fillRect(ex + 3, ey + 1, 2, 2);
        ctx.fillRect(ex + 7, ey + 1, 2, 2);
        // Legs
        ctx.fillStyle = '#993311';
        var impLeg = Math.sin(e.timer * 6) * 2;
        ctx.fillRect(ex + 2, ey + 12, 3, Math.floor(2 + impLeg));
        ctx.fillRect(ex + 7, ey + 12, 3, Math.floor(2 - impLeg));
        break;

      case 'sporePhantom':
        // Ghostly mushroom entity
        ctx.globalAlpha = 0.5 + Math.sin(e.phase) * 0.2;
        ctx.fillStyle = '#66cc88';
        // Cap shape
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, ey + 5, 7, Math.PI, 0);
        ctx.fill();
        // Body trail
        ctx.fillStyle = '#44aa66';
        ctx.fillRect(ex + 3, ey + 5, e.w - 6, 8 + Math.sin(frame * 0.2) * 2);
        // Spore dots
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(ex + 4, ey + 3, 2, 2);
        ctx.fillRect(ex + 8, ey + 3, 2, 2);
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex + 4, ey + 7, 2, 2);
        ctx.fillRect(ex + 8, ey + 7, 2, 2);
        ctx.globalAlpha = 1;
        break;

      case 'sporeBat':
        // Bat with spore-dusted wings
        ctx.fillStyle = '#664422';
        ctx.fillRect(ex + 4, ey + 2, 6, 5);
        var bw = Math.sin(frame * 0.4) * 4;
        ctx.fillStyle = '#553311';
        ctx.fillRect(ex - 2, ey + Math.floor(bw), 5, 4);
        ctx.fillRect(ex + 11, ey + Math.floor(bw), 5, 4);
        // Spore dust on wings
        ctx.fillStyle = '#88aa6644';
        ctx.fillRect(ex - 1, ey + Math.floor(bw) + 1, 3, 2);
        ctx.fillRect(ex + 12, ey + Math.floor(bw) + 1, 3, 2);
        // Eyes
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 5, ey + 3, 2, 1);
        ctx.fillRect(ex + 8, ey + 3, 2, 1);
        break;

      case 'toxicSlime':
        // Green toxic slime with bubbles
        ctx.fillStyle = '#33aa33';
        ctx.beginPath();
        ctx.ellipse(ex + e.w / 2, ey + e.h - 2, e.w / 2, Math.floor(e.h / 2 + Math.sin(e.timer * 3) * 2), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#55cc55';
        ctx.beginPath();
        ctx.ellipse(ex + e.w / 2, ey + e.h - 4, e.w / 3, e.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Toxic bubbles
        ctx.fillStyle = '#aaff44';
        ctx.beginPath();
        ctx.arc(ex + 3, ey + 2 + Math.sin(e.timer * 4) * 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex + 9, ey + 1 + Math.cos(e.timer * 3) * 2, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex + 3, ey + 4, 3, 2);
        ctx.fillRect(ex + 7, ey + 4, 3, 2);
        break;

      case 'crystalGolem':
        // Diamond-shaped crystal body
        ctx.fillStyle = '#6688cc';
        ctx.beginPath();
        ctx.moveTo(ex + e.w / 2, ey);
        ctx.lineTo(ex + e.w, ey + e.h / 2);
        ctx.lineTo(ex + e.w / 2, ey + e.h);
        ctx.lineTo(ex, ey + e.h / 2);
        ctx.fill();
        // Inner facet
        ctx.fillStyle = '#88aaee';
        ctx.beginPath();
        ctx.moveTo(ex + e.w / 2, ey + 3);
        ctx.lineTo(ex + e.w - 3, ey + e.h / 2);
        ctx.lineTo(ex + e.w / 2, ey + e.h - 3);
        ctx.fill();
        // Crystal gleam
        ctx.fillStyle = '#ffffff44';
        ctx.fillRect(ex + 4, ey + 3, 2, 2);
        break;

      case 'emberSpirit':
        // Fire spirit with reactor core
        var flicker = Math.sin(frame * 0.5) * 2;
        ctx.fillStyle = '#ff6622';
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, ey + e.h / 2 + Math.floor(flicker), e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, ey + e.h / 2 + Math.floor(flicker), e.w / 3, 0, Math.PI * 2);
        ctx.fill();
        // Reactor symbol in core
        ctx.fillStyle = '#ffff88';
        ctx.fillRect(ex + 4, ey + 4 + Math.floor(flicker), 4, 3);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex + 5, ey + 5 + Math.floor(flicker), 2, 1);
        break;

      case 'mycelialDragonlet':
        // Small dragon with mycelial texture
        ctx.fillStyle = '#882266';
        ctx.fillRect(ex + 1, ey + 2, 12, 12);
        // Head
        ctx.fillStyle = '#aa3388';
        ctx.fillRect(ex + 2, ey, 10, 6);
        // Mycelial texture (vein lines)
        ctx.fillStyle = '#cc44aa44';
        ctx.fillRect(ex + 3, ey + 4, 1, 8);
        ctx.fillRect(ex + 7, ey + 3, 1, 9);
        ctx.fillRect(ex + 10, ey + 5, 1, 6);
        // Wings
        ctx.fillStyle = '#661144';
        ctx.fillRect(ex - 3, ey + 4, 4, 8);
        ctx.fillRect(ex + 13, ey + 4, 4, 8);
        // Eyes
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(ex + 3, ey + 1, 3, 2);
        ctx.fillRect(ex + 8, ey + 1, 3, 2);
        // Mouth glow (when shooting)
        if ((e.shootTimer || 2) < 0.5) {
          ctx.fillStyle = '#ff44ff';
          ctx.fillRect(ex + 5, ey + 4, 4, 2);
        }
        break;

      case 'voidEye':
        // Purple void eye
        ctx.fillStyle = '#cc44cc';
        ctx.beginPath();
        ctx.arc(ex + e.w / 2, ey + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Void tendrils
        ctx.fillStyle = '#aa22aa44';
        for (var t = 0; t < 4; t++) {
          var ta = (frame * 0.04 + t * 1.57);
          var tx = Math.cos(ta) * 8;
          var ty = Math.sin(ta) * 8;
          ctx.fillRect(ex + e.w / 2 + Math.floor(tx) - 1, ey + e.h / 2 + Math.floor(ty) - 1, 2, 2);
        }
        // Pupil
        var pupX = 0, pupY = 0;
        if (player) {
          var a = TAS.math.angle(ex, ey, player.x - camera.x, player.y - camera.y);
          pupX = Math.cos(a) * 2;
          pupY = Math.sin(a) * 2;
        }
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(ex + e.w / 2 + pupX, ey + e.h / 2 + pupY, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff00ff';
        ctx.beginPath();
        ctx.arc(ex + e.w / 2 + pupX, ey + e.h / 2 + pupY, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

function drawBoss() {
  if (!bossActive) return;
  var b = bossActive;
  var bx = Math.floor(b.x - camera.x);
  var by = Math.floor(b.y - camera.y);

  // Flash when hit
  if (b.invuln > 0 && Math.floor(b.invuln * 20) % 2 === 0) {
    ctx.fillStyle = '#ffffff';
  } else {
    ctx.fillStyle = b.enragePhase ? '#aa0044' : '#880044';
  }

  // Body
  ctx.fillRect(bx + 4, by + 4, 24, 24);

  // Head
  ctx.fillStyle = b.enragePhase ? '#dd0088' : '#aa0066';
  ctx.fillRect(bx + 6, by, 20, 12);

  // Horns (bigger when enraged)
  ctx.fillStyle = '#cc2288';
  var hornH = b.enragePhase ? 10 : 8;
  ctx.fillRect(bx + 2, by - hornH + 2, 5, hornH);
  ctx.fillRect(bx + 25, by - hornH + 2, 5, hornH);

  // Wings
  ctx.fillStyle = b.enragePhase ? '#880044' : '#660033';
  var wingOff = Math.sin(frame * 0.15) * 4;
  ctx.beginPath();
  ctx.moveTo(bx, by + 8);
  ctx.lineTo(bx - 12, by + 4 + Math.floor(wingOff));
  ctx.lineTo(bx - 8, by + 24 + Math.floor(wingOff));
  ctx.lineTo(bx + 4, by + 20);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx + 32, by + 8);
  ctx.lineTo(bx + 44, by + 4 + Math.floor(wingOff));
  ctx.lineTo(bx + 40, by + 24 + Math.floor(wingOff));
  ctx.lineTo(bx + 28, by + 20);
  ctx.fill();

  // Eyes (glow brighter when enraged)
  ctx.fillStyle = b.enragePhase ? '#ff4444' : '#ffff00';
  ctx.fillRect(bx + 10, by + 4, 4, 4);
  ctx.fillRect(bx + 20, by + 4, 4, 4);

  // Mouth
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(bx + 12, by + 10, 8, 3);

  // Enrage aura
  if (b.enragePhase) {
    ctx.fillStyle = '#ff004422';
    ctx.beginPath();
    ctx.arc(bx + 16, by + 16, 24 + Math.sin(frame * 0.1) * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(bx - 4, by - 14, 40, 5);
  ctx.fillStyle = b.enragePhase ? '#ff0044' : '#ff2222';
  ctx.fillRect(bx - 4, by - 14, Math.floor(40 * (b.hp / b.maxHp)), 5);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(bx - 4, by - 14, 40, 5);

  // Boss projectiles
  for (var i = 0; i < b.projections.length; i++) {
    var p = b.projections[i];
    var ppx = Math.floor(p.x - camera.x);
    var ppy = Math.floor(p.y - camera.y);
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(ppx, ppy, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaacc';
    ctx.beginPath();
    ctx.arc(ppx, ppy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFireballs() {
  for (var i = 0; i < fireballs.length; i++) {
    var fb = fireballs[i];
    var fx = Math.floor(fb.x - camera.x);
    var fy = Math.floor(fb.y - camera.y);

    if (fb.enemy) {
      ctx.fillStyle = '#ff2266';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff88aa';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (fb.reactor) {
      // Reactor breath: green-orange
      ctx.fillStyle = '#44ffaa44';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size + 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#44ffaa';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(fx, fy, Math.floor(fb.size * 0.4), 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#ff880044';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size + 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(fx, fy, fb.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(fx, fy, Math.floor(fb.size * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }

    // Trail particles
    if (frame % 3 === 0) {
      var trailColor = fb.reactor ? '#44ffaa' : fb.enemy ? '#ff4488' : '#ff8800';
      TAS.particles.spawn(fx + camera.x, fy + camera.y, trailColor, 1, 0.8, { size: 1.5, gravity: 0 });
    }
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (it.collected) continue;
    var ix = Math.floor(it.x - camera.x);
    var iy = Math.floor(it.y + Math.sin(it.bob) * 3 - camera.y);

    // Glow
    ctx.fillStyle = '#ffff4422';
    ctx.beginPath();
    ctx.arc(ix + it.w / 2, iy + it.h / 2, it.w, 0, Math.PI * 2);
    ctx.fill();

    switch(it.type) {
      case 'health':
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ix + 2, iy, 4, 8);
        ctx.fillRect(ix, iy + 2, 8, 4);
        break;
      case 'flight':
        ctx.fillStyle = '#88ccff';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy);
        ctx.lineTo(ix + 10, iy + 3);
        ctx.lineTo(ix + 8, iy + 8);
        ctx.lineTo(ix + 2, iy + 6);
        ctx.lineTo(ix, iy + 2);
        ctx.fill();
        break;
      case 'hp':
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(ix + 1, iy + 1, 8, 8);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ix + 3, iy + 2, 4, 1);
        ctx.fillRect(ix + 4, iy + 1, 2, 3);
        break;
      case 'fire':
        ctx.fillStyle = '#ff8800';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy);
        ctx.lineTo(ix + 9, iy + 6);
        ctx.lineTo(ix + 7, iy + 10);
        ctx.lineTo(ix + 3, iy + 10);
        ctx.lineTo(ix + 1, iy + 6);
        ctx.fill();
        ctx.fillStyle = '#ffdd44';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy + 3);
        ctx.lineTo(ix + 7, iy + 6);
        ctx.lineTo(ix + 5, iy + 9);
        ctx.lineTo(ix + 3, iy + 6);
        ctx.fill();
        break;
      case 'jump':
        ctx.fillStyle = '#ffff44';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy);
        ctx.lineTo(ix + 9, iy + 4);
        ctx.lineTo(ix + 7, iy + 4);
        ctx.lineTo(ix + 7, iy + 10);
        ctx.lineTo(ix + 3, iy + 10);
        ctx.lineTo(ix + 3, iy + 4);
        ctx.lineTo(ix + 1, iy + 4);
        ctx.fill();
        break;
      case 'claw':
        ctx.fillStyle = '#cc88ff';
        ctx.fillRect(ix + 1, iy + 2, 8, 2);
        ctx.fillRect(ix + 1, iy + 5, 8, 2);
        ctx.fillRect(ix + 1, iy + 8, 6, 2);
        ctx.fillRect(ix + 8, iy + 1, 2, 2);
        ctx.fillRect(ix + 8, iy + 4, 2, 2);
        ctx.fillRect(ix + 6, iy + 7, 2, 2);
        break;
      case 'sporeWings':
        // Glowing green wing shape
        ctx.fillStyle = '#44ff88';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy + 2);
        ctx.lineTo(ix + 10, iy);
        ctx.lineTo(ix + 9, iy + 5);
        ctx.lineTo(ix + 5, iy + 8);
        ctx.lineTo(ix + 1, iy + 5);
        ctx.lineTo(ix, iy);
        ctx.fill();
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(ix + 4, iy + 3, 2, 2);
        break;
      case 'reactorShard':
        // Orange-green crystal shard
        ctx.fillStyle = '#ff8844';
        ctx.beginPath();
        ctx.moveTo(ix + 5, iy);
        ctx.lineTo(ix + 9, iy + 5);
        ctx.lineTo(ix + 5, iy + 10);
        ctx.lineTo(ix + 1, iy + 5);
        ctx.fill();
        ctx.fillStyle = '#44ffaa';
        ctx.fillRect(ix + 4, iy + 3, 2, 4);
        break;
      case 'scoreOrb':
        // Glowing orb in statB color
        ctx.fillStyle = statB.color || '#ffdd44';
        ctx.beginPath();
        ctx.arc(ix + 4, iy + 4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff88';
        ctx.beginPath();
        ctx.arc(ix + 3, iy + 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

function drawHUD(stg) {
  // Top bar
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, 26);

  // HP hearts
  for (var i = 0; i < player.maxHp; i++) {
    var hx = 6 + i * 14;
    ctx.fillStyle = i < player.hp ? '#ff4444' : '#442222';
    ctx.beginPath();
    ctx.arc(hx + 4, 10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(hx + 10, 10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx + 1, 12);
    ctx.lineTo(hx + 7, 18);
    ctx.lineTo(hx + 13, 12);
    ctx.fill();
  }

  // Lives counter
  if (lives > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('x' + lives, 6 + player.maxHp * 14 + 4, 14);
  }

  // Flight meter
  var meterX = Math.floor(GW / 2 - 30);
  var meterW = 60;
  ctx.fillStyle = '#222244';
  ctx.fillRect(meterX, 6, meterW, 8);
  var fillPct = player.flightMeter / player.flightMax;
  ctx.fillStyle = sporeWingsActive ? '#38d973' : (fillPct > 0.3 ? '#3cacd7' : '#e6482e');
  ctx.fillRect(meterX, 6, Math.floor(meterW * Math.max(0, fillPct)), 8);
  ctx.strokeStyle = '#a855f7';
  ctx.strokeRect(meterX, 6, meterW, 8);
  ctx.fillStyle = sporeWingsActive ? '#38d973' : '#3cacd7';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(sporeWingsActive ? 'SPORE' : 'FLY', meterX + meterW / 2, 13);

  // Fire level
  ctx.fillStyle = '#e6482e';
  ctx.textAlign = 'left';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('SPORE:' + upgrades.fireLevel, meterX + meterW + 8, 13);

  // Score (INT-scaled display)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'right';
  ctx.font = 'bold 10px monospace';
  ctx.fillText(String(score), GW - 6, 14);

  // Stage name
  ctx.fillStyle = '#7a444a';
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  ctx.fillText((stageIdx + 1) + '-' + stg.name, GW / 2, GH - 4);

  // Spore Wings indicator
  if (sporeWingsActive) {
    ctx.fillStyle = '#38d97366';
    ctx.fillRect(meterX, 16, Math.floor(meterW * (sporeWingsTimer / (15 + wisFlightBonus() * 5))), 3);
  }
}

function drawReactorCharge() {
  if (!reactorCharging || reactorCharge < 0.05) return;
  var pct = reactorCharge / REACTOR_CHARGE_MAX;
  var barW = 40;
  var barX = Math.floor(GW / 2 - barW / 2);
  var barY = GH - 28;

  ctx.fillStyle = '#222';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, 6);
  ctx.fillStyle = pct > 0.7 ? '#38d973' : '#e6482e';
  ctx.fillRect(barX, barY, Math.floor(barW * pct), 4);
  ctx.strokeStyle = '#a855f7';
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, 6);

  ctx.fillStyle = '#3cacd7';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR', barX + barW / 2, barY - 3);
}

function drawMessage() {
  if (msgTimer <= 0) return;
  var alpha = Math.min(1, msgTimer);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#000000';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgText, GW / 2 + 1, GH / 2 - 19);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText(msgText, GW / 2, GH / 2 - 20);
  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Atmospheric spore particles
  for (var i = 0; i < 20; i++) {
    var sx = (i * 47 + frame * 0.2) % GW;
    var sy = (i * 31 + Math.sin(frame * 0.01 + i) * 20) % GH;
    ctx.fillStyle = i % 3 === 0 ? '#38d973' : '#a855f7';
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
  }

  // Baseling silhouette
  ctx.fillStyle = '#7a444a';
  ctx.beginPath();
  ctx.moveTo(GW / 2, 60);
  ctx.lineTo(GW / 2 + 30, 100);
  ctx.lineTo(GW / 2 + 50, 80);
  ctx.lineTo(GW / 2 + 40, 130);
  ctx.lineTo(GW / 2 + 20, 140);
  ctx.lineTo(GW / 2 - 20, 140);
  ctx.lineTo(GW / 2 - 40, 130);
  ctx.lineTo(GW / 2 - 50, 80);
  ctx.lineTo(GW / 2 - 30, 100);
  ctx.closePath();
  ctx.fill();

  // Glowing eyes
  var eyeGlow = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = eyeGlow;
  ctx.fillStyle = '#38d973';
  ctx.fillRect(GW / 2 - 8, 95, 4, 4);
  ctx.fillRect(GW / 2 + 4, 95, 4, 4);
  ctx.globalAlpha = 1;

  // Title with shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPOREGOYLE QUEST', GW / 2 + 2, 42);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPOREGOYLE QUEST', GW / 2, 40);

  // Subtitle
  ctx.fillStyle = '#7a444a';
  ctx.font = '10px monospace';
  ctx.fillText('Baseling of the Stone Gardens', GW / 2, 55);

  // Selected baseling preview (idle bob) + name + 5 stat bars
  if (!TAS.drawBaseling(ctx, GW / 2, 110, 24, { anim: 'idle', frame: frame })) {
    if (statB.level > 0) {
      ctx.fillStyle = statB.color;
      ctx.font = '9px monospace';
      ctx.fillText(statB.icon + ' ' + statB.name + ' Lv.' + statB.level, GW / 2, 112);
    }
  }
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 130);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW / 2 - 92;
    ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 37;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 142);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 145, 30, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 145, 30 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, 158);

  // NES-style controls
  ctx.fillStyle = '#3cacd7';
  ctx.font = '9px monospace';
  ctx.fillText('D-PAD: Move | A: Jump/Fly | B: Spore Fire', GW / 2, 170);
  ctx.fillText('Hold wall to CLING | UP+B: Headbutt', GW / 2, 183);
  ctx.fillText('DOWN+B Hold: Reactor Breath', GW / 2, 196);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS START', GW / 2, 222);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.fillText('HI-SCORE: ' + highScore, GW / 2, 240);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawStageIntro() {
  var stg = STAGES[stageIdx];
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Border decoration
  ctx.strokeStyle = stg.accent + '66';
  ctx.strokeRect(20, 20, GW - 40, GH - 40);
  ctx.strokeRect(22, 22, GW - 44, GH - 44);

  ctx.fillStyle = stg.accent;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stageIdx + 1), GW / 2, GH / 2 - 30);

  ctx.fillStyle = '#cccccc';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(stg.name, GW / 2, GH / 2 + 5);

  // StatB-scaled stats display
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('HP:' + conMaxHp(upgrades.maxHp) + ' | FLY:' + (upgrades.flightTime + wisFlightBonus()).toFixed(1) + 's | FIRE:Lv' + upgrades.fireLevel, GW / 2, GH / 2 + 28);

  // Stat bar mini-display
  var stats = [
    { label: 'STR', val: statB.str, color: '#ff4444' },
    { label: 'DEX', val: statB.dex, color: '#44ff44' },
    { label: 'CON', val: statB.con, color: '#ffaa00' },
    { label: 'INT', val: statB.int, color: '#4488ff' },
    { label: 'WIS', val: statB.wis, color: '#aa44ff' },
    { label: 'CHA', val: statB.cha, color: '#ff44aa' }
  ];
  var barStartX = Math.floor(GW / 2 - 90);
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  for (var i = 0; i < stats.length; i++) {
    var sx = barStartX + i * 30;
    var sy = Math.floor(GH / 2 + 42);
    ctx.fillStyle = stats[i].color;
    ctx.fillText(stats[i].label, sx, sy);
    ctx.fillStyle = '#333';
    ctx.fillRect(sx, sy + 2, 24, 3);
    ctx.fillStyle = stats[i].color;
    ctx.fillRect(sx, sy + 2, Math.floor(Math.min(24, stats[i].val / 20 * 24)), 3);
  }

  if (STAGES[stageIdx].hasBoss) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('-- BOSS STAGE --', GW / 2, GH / 2 + 65);
  }
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  var pulse = Math.sin(frame * 0.04) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GW / 2, GH / 2 - 40);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('The Fungal Nexus has fallen.', GW / 2, GH / 2 - 10);
  ctx.fillText('Your baseling freed the Stone Gardens!', GW / 2, GH / 2 + 8);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, GH / 2 + 40);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#e6482e';
    ctx.font = '10px monospace';
    ctx.fillText('NEW HI-SCORE!', GW / 2, GH / 2 + 58);
  }

  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Press START to return', GW / 2, GH / 2 + 85);

  // Firework particles
  if (frame % 30 === 0) {
    var fx = TAS.math.randRange(50, GW - 50);
    var fy = TAS.math.randRange(30, GH - 60);
    var colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff'];
    TAS.particles.spawn(fx, fy, colors[TAS.math.randInt(0, 5)], 12, 3, { size: 2, gravity: 1 });
  }

  TAS.particles.draw();

  if (frame > 90 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
    state = 'title';
    frame = 0;
    try { localStorage.removeItem('gargoylequest_save'); } catch(e) { console.warn('Clear save failed:', e); }
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
