<script>
(function() {
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
var GW = 480, GH = 320;
var ctx = TAS.ctx;

var COLS = 11;
var ROWS = 5;
var ALIEN_W = 16, ALIEN_H = 12;
var ALIEN_HGAP = 28, ALIEN_VGAP = 22;
var GRID_TOP = 48;
var GRID_LEFT_BASE = 40;

var PLAYER_W = 20, PLAYER_H = 10;
var PLAYER_Y = GH - 30;
var PLAYER_SPEED = 3;

var BULLET_SPEED = 5;
var ALIEN_BULLET_SPEED = 2.2;

var BUNKER_COUNT = 4;
var BUNKER_W = 36, BUNKER_H = 20;
var BUNKER_Y = GH - 60;

// Row scoring: bottom row = 10, top row = 40
var ROW_SCORES = [40, 30, 20, 20, 10];

// Mystery ship
var MYSTERY_SCORES = [50, 100, 150, 200, 300];

// New alien type scores
var SPECIAL_SCORES = { reactorDrone: 35, mycelialHive: 60, sporeBomber: 45 };

// Zone names for wave display
var ZONE_NAMES = ['Garden Outskirts', 'POOP Pipeline', 'Mycelial Nebula', 'The Motherspore Hive'];

// ============================================================
// BASELING STATS (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Single-player (default 0.8–1.6 band). recomputeStats() puts each clamped mult in the
// high-level statB.* field and keeps the D&D fields NEUTRAL (10) so the few D&D reads
// (str>=15 piercing, cha bonus) stay off — each mult applies exactly once. Shmup wiring:
// speed<-moveSpeed, hpMult<-health, scoreMult/luck<-luck, cooldown<-1/moveSpeed (fire
// cadence). No water (SWM untouched).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[spore-swarm] NftLoader display info failed:', e && e.message); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health;
  statB.scoreMult = m.luck; statB.luck = m.luck; statB.cooldown = 1 / m.moveSpeed;
  statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = 10; statB.dex = 10; statB.con = 10; statB.int = 10; statB.wis = 10; statB.cha = 10;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}

// ============================================================
// INIT
// ============================================================
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'c'], labels: { a: 'FIRE', c: 'PICK' } });

recomputeStats();
var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-swarm] player init failed:', e && e.message); });
}

// ============================================================
// AUDIO
// ============================================================
var SFX = {
  shoot: function() { TAS.audio.playTone(880, 0.06, 'square', 0.06, 440); },
  alienDie: function() { TAS.audio.playTone(200, 0.12, 'sawtooth', 0.08, 60); },
  playerDie: function() { TAS.audio.playTone(400, 0.5, 'sawtooth', 0.12, 40); TAS.audio.playNoise(0.3, 0.15); },
  alienShoot: function() { TAS.audio.playTone(120, 0.08, 'triangle', 0.04, 200); },
  mystery: function() { TAS.audio.playTone(300, 0.08, 'sine', 0.05, 320); },
  mysteryHit: function() { TAS.audio.playTone(600, 0.15, 'square', 0.08, 200); TAS.audio.playNoise(0.15, 0.1); },
  bunkerHit: function() { TAS.audio.playNoise(0.06, 0.04, 800); },
  bossHit: function() { TAS.audio.playTone(150, 0.08, 'sawtooth', 0.06, 80); },
  bossAppear: function() { TAS.audio.playTone(80, 0.4, 'square', 0.1, 40); TAS.audio.playNoise(0.2, 0.08); },
  bossDie: function() {
    [200,300,400,500,600].forEach(function(n, i) {
      setTimeout(function() { TAS.audio.playTone(n, 0.15, 'sawtooth', 0.1, n/2); TAS.audio.playNoise(0.15, 0.12); }, i * 120);
    });
  },
  levelUp: function() {
    TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.15]], 100);
  },
  gameOver: function() {
    TAS.audio.playMelody([[440,0.2,'sawtooth',0.1],[349,0.2,'sawtooth',0.1],[293,0.2,'sawtooth',0.1],[220,0.3,'sawtooth',0.12]], 200);
  },
  march: function(pitch) { TAS.audio.playTone(pitch, 0.04, 'square', 0.03); },
  powerUp: function() { TAS.audio.playMelody([[660,0.08],[880,0.08],[1100,0.1]], 60); },
  hiveSplit: function() { TAS.audio.playTone(250, 0.1, 'sawtooth', 0.06, 150); TAS.audio.playNoise(0.08, 0.05); },
  dive: function() { TAS.audio.playTone(600, 0.15, 'square', 0.08, 100); },
  hazard: function() { TAS.audio.playNoise(0.04, 0.03, 600); }
};

// March rhythm: 4 tones cycling
var MARCH_NOTES = [80, 100, 80, 60];

// ============================================================
// GAME STATE
// ============================================================
var state = 'title';
var score = 0;
var highScore = TAS.score.load('spore_swarm_hi');
var lives = 3;
var level = 1;
var frame = 0;

// Player
var player = { x: GW / 2, dead: false, respawnTimer: 0 };
var shotCooldown = 0;
var playerShield = false;

// Alien grid
var aliens = [];
var alienDir = 1;
var alienMoveTimer = 0;
var alienMoveInterval = 40;
var alienStepSize = 3;
var alienDropAmount = 8;
var alienNeedDrop = false;
var alienBullets = [];
var alienFireRate = 120;
var alienFireTimer = 0;
var aliensAlive = 0;
var marchIdx = 0;

// Player bullets (array for triple shot)
var bullets = [];
var maxBullets = 1;

// Bunkers
var bunkers = [];

// Mystery ship
var mystery = null;
var mysteryTimer = 0;
var mysteryScoreDisplay = null;

// Boss
var boss = null;
var bossActive = false;
var bossWarning = 0;

// Floor hazards (from Reactor Drones)
var floorHazards = [];

// Power-ups
var powerUps = [];
var activePowerUps = { tripleShot: 0, reactorShield: 0, sporeMagnet: 0 };

// Wave announcement
var waveAnnounce = 0;

// Parallax starfields
var starLayers = [];
function createParallaxStars() {
  starLayers = [
    TAS.bg.createStarfield(30, GW, GH),
    TAS.bg.createStarfield(20, GW, GH),
    TAS.bg.createStarfield(15, GW, GH)
  ];
}
createParallaxStars();

// Background nebula color per zone
function getZoneIndex() {
  if (level <= 4) return 0;
  if (level <= 9) return 1;
  if (level <= 14) return 2;
  return 3;
}

function getZoneName() {
  return ZONE_NAMES[getZoneIndex()];
}

function getZoneBgColor() {
  var colors = ['#1a1c2c', '#1c1a24', '#181c28', '#241a20'];
  return colors[getZoneIndex()];
}

function getZoneNebulaColor() {
  var colors = [
    'rgba(56,217,115,0.08)',
    'rgba(168,85,247,0.08)',
    'rgba(60,172,215,0.08)',
    'rgba(230,72,46,0.08)'
  ];
  return colors[getZoneIndex()];
}

// ============================================================
// BUNKER PIXEL DATA
// ============================================================
function createBunkerPixels() {
  var pw = BUNKER_W;
  var ph = BUNKER_H;
  var pixels = [];
  for (var y = 0; y < ph; y++) {
    pixels[y] = [];
    for (var x = 0; x < pw; x++) {
      var cx = pw / 2;
      var inBody = y >= 4;
      var inArch = y < 8 && Math.abs(x - cx) <= (pw / 2 - y * 0.5);
      var inCutout = y >= ph - 7 && Math.abs(x - cx) < 6 - (ph - 1 - y) * 0.4;
      pixels[y][x] = (inBody || inArch) && !inCutout;
    }
  }
  return pixels;
}

function initBunkers() {
  bunkers = [];
  var spacing = GW / (BUNKER_COUNT + 1);
  for (var i = 0; i < BUNKER_COUNT; i++) {
    bunkers.push({
      x: Math.floor(spacing * (i + 1) - BUNKER_W / 2),
      y: BUNKER_Y,
      pixels: createBunkerPixels(),
      hp: Math.floor(statB.hpMult * 100)
    });
  }
}

function drawBunker(b) {
  var hpRatio = b.hp / Math.floor(statB.hpMult * 100);
  for (var y = 0; y < BUNKER_H; y++) {
    for (var x = 0; x < BUNKER_W; x++) {
      if (b.pixels[y][x]) {
        var shade = 40 + ((x * 3 + y * 7) % 30);
        var g = Math.floor((100 + shade) * hpRatio);
        ctx.fillStyle = 'rgb(' + shade + ',' + g + ',' + (shade + 20) + ')';
        ctx.fillRect(b.x + x, b.y + y, 1, 1);
      }
    }
  }
}

function damageBunker(b, hitX, hitY, radius) {
  var lx = Math.floor(hitX - b.x);
  var ly = Math.floor(hitY - b.y);
  var damaged = false;
  for (var dy = -radius; dy <= radius; dy++) {
    for (var dx = -radius; dx <= radius; dx++) {
      if (dx * dx + dy * dy <= radius * radius) {
        var px = lx + dx;
        var py = ly + dy;
        if (px >= 0 && px < BUNKER_W && py >= 0 && py < BUNKER_H) {
          if (b.pixels[py][px]) {
            b.pixels[py][px] = false;
            damaged = true;
          }
        }
      }
    }
  }
  if (damaged) b.hp = Math.max(0, b.hp - 1);
  return damaged;
}

function bunkerPixelAt(b, wx, wy) {
  var lx = Math.floor(wx - b.x);
  var ly = Math.floor(wy - b.y);
  if (lx < 0 || lx >= BUNKER_W || ly < 0 || ly >= BUNKER_H) return false;
  return b.pixels[ly][lx];
}

// ============================================================
// ALIEN GRID (with new types)
// ============================================================
function initAliens() {
  aliens = [];
  var extraDrop = Math.min(level - 1, 8) * (ALIEN_VGAP * 0.4);
  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      var atype = row; // 0-4 standard types
      aliens.push({
        row: row,
        col: col,
        x: GRID_LEFT_BASE + col * ALIEN_HGAP,
        y: GRID_TOP + row * ALIEN_VGAP + extraDrop,
        alive: true,
        type: atype,
        specialType: null,
        frame: 0,
        hp: 1,
        diving: false,
        diveSpeed: 0
      });
    }
  }

  // Inject special aliens based on wave
  if (level >= 3) injectSpecials('reactorDrone', Math.min(3, Math.floor(level / 3)));
  if (level >= 5 && !isBossLevel()) injectSpecials('mycelialHive', Math.min(2, Math.floor((level - 3) / 3)));
  if (level >= 4) injectSpecials('sporeBomber', Math.min(3, Math.floor((level - 2) / 2)));

  aliensAlive = 0;
  for (var i = 0; i < aliens.length; i++) {
    if (aliens[i].alive) aliensAlive++;
  }
  alienDir = 1;
  alienMoveTimer = 0;
  alienNeedDrop = false;
  marchIdx = 0;

  alienMoveInterval = Math.max(8, 40 - (level - 1) * 3);
  alienFireRate = Math.max(30, 120 - (level - 1) * 10);
  alienFireTimer = alienFireRate;
}

function injectSpecials(specialType, count) {
  var candidates = [];
  for (var i = 0; i < aliens.length; i++) {
    if (aliens[i].alive && !aliens[i].specialType) candidates.push(i);
  }
  for (var c = 0; c < count && candidates.length > 0; c++) {
    var idx = candidates.splice(TAS.math.randInt(0, candidates.length - 1), 1)[0];
    aliens[idx].specialType = specialType;
    if (specialType === 'mycelialHive') {
      aliens[idx].hp = 2;
    }
  }
}

// ============================================================
// ALIEN DRAWING (NES-style pixel sprites)
// ============================================================
function drawAlien(a) {
  var x = Math.floor(a.x), y = Math.floor(a.y);
  var f = a.frame;

  ctx.save();
  ctx.translate(x, y);

  // Special type overrides
  if (a.specialType === 'reactorDrone') {
    drawReactorDrone(f);
    ctx.restore();
    return;
  }
  if (a.specialType === 'mycelialHive') {
    drawMycelialHive(f, a.hp);
    ctx.restore();
    return;
  }
  if (a.specialType === 'sporeBomber') {
    drawSporeBomber(f, a.diving);
    ctx.restore();
    return;
  }

  switch (a.type) {
    case 0: // Top row: alien mold cap (40pts)
      ctx.fillStyle = '#ff4466';
      ctx.beginPath();
      ctx.ellipse(0, -2, 5, 4, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#cc2244';
      ctx.fillRect(-2, -2, 4, 5);
      // Spots
      ctx.fillStyle = '#ff8899';
      ctx.fillRect(-3, -4, 2, 1);
      ctx.fillRect(2, -3, 1, 1);
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3, 0, 2, 2);
      ctx.fillRect(1, 0, 2, 2);
      ctx.fillStyle = '#220000';
      ctx.fillRect(-2, 1, 1, 1);
      ctx.fillRect(2, 1, 1, 1);
      // Legs (animated)
      ctx.fillStyle = '#ff4466';
      if (f) {
        ctx.fillRect(-5, 3, 2, 2);
        ctx.fillRect(3, 3, 2, 2);
      } else {
        ctx.fillRect(-4, 4, 2, 2);
        ctx.fillRect(2, 4, 2, 2);
      }
      break;

    case 1: // Row 2: space spore with tendrils (30pts)
      ctx.fillStyle = '#aa44ff';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc88ff';
      ctx.fillRect(-2, -3, 2, 2);
      ctx.fillRect(1, -1, 2, 2);
      // Eyes with detail
      ctx.fillStyle = '#fff';
      ctx.fillRect(-4, -2, 2, 2);
      ctx.fillRect(2, -2, 2, 2);
      ctx.fillStyle = '#220033';
      ctx.fillRect(-3, -1, 1, 1);
      ctx.fillRect(3, -1, 1, 1);
      // Tendrils (animated)
      ctx.fillStyle = '#8822cc';
      if (f) {
        ctx.fillRect(-7, 2, 2, 3);
        ctx.fillRect(5, 2, 2, 3);
        ctx.fillRect(-2, 5, 2, 2);
        ctx.fillRect(1, 5, 2, 2);
      } else {
        ctx.fillRect(-6, 3, 2, 3);
        ctx.fillRect(4, 3, 2, 3);
        ctx.fillRect(-3, 5, 2, 2);
        ctx.fillRect(2, 5, 2, 2);
      }
      break;

    case 2: // Row 3: cosmic fungi blob (20pts)
      ctx.fillStyle = '#44cc88';
      ctx.fillRect(-6, -4, 12, 8);
      ctx.fillRect(-7, -2, 14, 4);
      ctx.fillStyle = '#66eebb';
      ctx.fillRect(-4, -5, 3, 2);
      ctx.fillRect(2, -5, 3, 2);
      // Eyes with pupils
      ctx.fillStyle = '#fff';
      ctx.fillRect(-4, -2, 2, 2);
      ctx.fillRect(3, -2, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(-3, -1, 1, 1);
      ctx.fillRect(4, -1, 1, 1);
      // Mouth
      ctx.fillStyle = '#228855';
      ctx.fillRect(-2, 1, 4, 1);
      // Feet (animated)
      ctx.fillStyle = '#33aa66';
      if (f) {
        ctx.fillRect(-7, 4, 3, 2);
        ctx.fillRect(5, 4, 3, 2);
      } else {
        ctx.fillRect(-5, 4, 3, 2);
        ctx.fillRect(3, 4, 3, 2);
      }
      break;

    case 3: // Row 4: garden puffball (20pts)
      ctx.fillStyle = '#cc8844';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#eebb66';
      ctx.fillRect(-3, -3, 2, 2);
      ctx.fillRect(2, 0, 2, 2);
      ctx.fillRect(-1, 2, 2, 2);
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3, -1, 2, 2);
      ctx.fillRect(2, -1, 2, 2);
      ctx.fillStyle = '#331100';
      ctx.fillRect(-2, 0, 1, 1);
      ctx.fillRect(3, 0, 1, 1);
      // Arms (animated)
      ctx.fillStyle = '#aa6622';
      if (f) {
        ctx.fillRect(-8, -1, 2, 3);
        ctx.fillRect(6, -1, 2, 3);
      } else {
        ctx.fillRect(-8, 1, 2, 3);
        ctx.fillRect(6, 1, 2, 3);
      }
      break;

    case 4: // Bottom row: spore grunt (10pts)
      ctx.fillStyle = '#88aacc';
      ctx.fillRect(-5, -4, 10, 8);
      ctx.fillRect(-6, -2, 12, 4);
      // Antenna
      ctx.fillStyle = '#aaccee';
      ctx.fillRect(-4, -6, 1, 3);
      ctx.fillRect(3, -6, 1, 3);
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3, -2, 2, 2);
      ctx.fillRect(2, -2, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(-2, -1, 1, 1);
      ctx.fillRect(3, -1, 1, 1);
      // Legs (animated)
      ctx.fillStyle = '#6688aa';
      if (f) {
        ctx.fillRect(-5, 4, 2, 2);
        ctx.fillRect(4, 4, 2, 2);
      } else {
        ctx.fillRect(-3, 4, 2, 2);
        ctx.fillRect(2, 4, 2, 2);
      }
      break;
  }

  ctx.restore();
}

// --- ALIEN TYPE: Toxic Drone (green, toxic POOP bombs) ---
function drawReactorDrone(f) {
  // Glowing green body
  ctx.fillStyle = '#22ff66';
  ctx.fillRect(-5, -4, 10, 8);
  // Reactor core glow
  ctx.fillStyle = '#88ffaa';
  ctx.fillRect(-2, -2, 4, 4);
  // Wings
  ctx.fillStyle = '#11cc44';
  if (f) {
    ctx.fillRect(-8, -2, 3, 5);
    ctx.fillRect(5, -2, 3, 5);
  } else {
    ctx.fillRect(-8, -1, 3, 4);
    ctx.fillRect(5, -1, 3, 4);
  }
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(-3, -1, 2, 2);
  ctx.fillRect(2, -1, 2, 2);
  // Toxic drip
  ctx.fillStyle = '#44ff88';
  var dripY = (f ? 5 : 4);
  ctx.fillRect(-1, dripY, 2, 2);
}

// --- ALIEN TYPE: Mycelial Hive (large, splits on death) ---
function drawMycelialHive(f, hp) {
  // 2-wide alien body
  ctx.fillStyle = hp > 1 ? '#cc66ff' : '#ff6688';
  ctx.fillRect(-10, -5, 20, 10);
  ctx.fillRect(-12, -3, 24, 6);
  // Network veins
  ctx.fillStyle = hp > 1 ? '#dd88ff' : '#ff8899';
  ctx.fillRect(-8, -4, 2, 8);
  ctx.fillRect(-3, -4, 2, 8);
  ctx.fillRect(2, -4, 2, 8);
  ctx.fillRect(7, -4, 2, 8);
  // Eyes (2 pairs for large creature)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-8, -2, 2, 2);
  ctx.fillRect(-3, -2, 2, 2);
  ctx.fillRect(2, -2, 2, 2);
  ctx.fillRect(7, -2, 2, 2);
  // Tendrils (animated)
  ctx.fillStyle = hp > 1 ? '#9933cc' : '#cc3355';
  if (f) {
    ctx.fillRect(-11, 5, 2, 3);
    ctx.fillRect(-4, 5, 2, 3);
    ctx.fillRect(3, 5, 2, 3);
    ctx.fillRect(10, 5, 2, 3);
  } else {
    ctx.fillRect(-10, 6, 2, 3);
    ctx.fillRect(-3, 6, 2, 3);
    ctx.fillRect(4, 6, 2, 3);
    ctx.fillRect(11, 6, 2, 3);
  }
  // Damage cracks when hp=1
  if (hp <= 1) {
    ctx.fillStyle = '#000';
    ctx.fillRect(-6, -3, 1, 6);
    ctx.fillRect(5, -2, 1, 5);
  }
}

// --- ALIEN TYPE: Dive Bomber (fast kamikaze diver) ---
function drawSporeBomber(f, diving) {
  // Streamlined body
  ctx.fillStyle = diving ? '#ff4400' : '#ff8822';
  // Pointed nose
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-4, 5);
  ctx.lineTo(4, 5);
  ctx.lineTo(5, 0);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.fillStyle = diving ? '#ffcc00' : '#ffaa44';
  ctx.fillRect(-3, 3, 6, 3);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-3, -2, 2, 2);
  ctx.fillRect(1, -2, 2, 2);
  // Fins (animated)
  ctx.fillStyle = diving ? '#cc2200' : '#cc6611';
  if (f) {
    ctx.fillRect(-7, 0, 2, 4);
    ctx.fillRect(5, 0, 2, 4);
  } else {
    ctx.fillRect(-7, 1, 2, 3);
    ctx.fillRect(5, 1, 2, 3);
  }
  // Dive trail
  if (diving) {
    ctx.fillStyle = 'rgba(255,100,0,0.4)';
    ctx.fillRect(-2, 6, 4, 4);
    ctx.fillStyle = 'rgba(255,200,0,0.3)';
    ctx.fillRect(-1, 9, 2, 3);
  }
}

// ============================================================
// BASELING SHIP
// ============================================================
function drawPlayer() {
  if (player.dead) return;

  var x = Math.floor(player.x), y = PLAYER_Y;

  // Shield effect
  if (playerShield || activePowerUps.reactorShield > 0) {
    ctx.strokeStyle = 'rgba(68,238,187,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y - 2, 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(68,238,187,' + (0.2 + Math.sin(frame * 0.1) * 0.15) + ')';
    ctx.beginPath();
    ctx.arc(x, y - 2, 16, 0, Math.PI * 2);
    ctx.stroke();
  }

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, x, y - 2, Math.max(PLAYER_W, PLAYER_H), { frame: frame })) {
    // Base
    ctx.fillStyle = statB.color || '#22aa66';
    ctx.fillRect(x - 10, y, 20, 6);
    // Mid body
    ctx.fillStyle = '#33cc88';
    ctx.fillRect(x - 6, y - 4, 12, 5);
    // Barrel (wider with high STR)
    var barrelW = statB.str >= 15 ? 5 : 3;
    ctx.fillStyle = '#44eebb';
    ctx.fillRect(Math.floor(x - barrelW / 2), y - 10, barrelW, 7);
    // Barrel tip glow
    ctx.fillStyle = '#88ffdd';
    ctx.fillRect(Math.floor(x - barrelW / 2), y - 11, barrelW, 2);
    // Details
    ctx.fillStyle = '#116644';
    ctx.fillRect(x - 8, y + 1, 4, 2);
    ctx.fillRect(x + 4, y + 1, 4, 2);
  }

  // Triple shot indicator
  if (activePowerUps.tripleShot > 0) {
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(x - 12, y - 8, 2, 5);
    ctx.fillRect(x + 10, y - 8, 2, 5);
  }
}

// ============================================================
// COSMIC FUNGUS (MYSTERY SHIP)
// ============================================================
function spawnMystery() {
  var goRight = Math.random() > 0.5;
  mystery = {
    x: goRight ? -20 : GW + 20,
    y: 20,
    dir: goRight ? 1 : -1,
    speed: 1.5,
    score: MYSTERY_SCORES[TAS.math.randInt(0, MYSTERY_SCORES.length - 1)]
  };

  mystery.score = Math.floor(mystery.score * statB.luck);
}

function drawMystery() {
  if (!mystery) return;
  var x = Math.floor(mystery.x), y = Math.floor(mystery.y);

  var pulse = Math.sin(frame * 0.15) * 0.15 + 0.85;
  ctx.globalAlpha = pulse;

  // Dome
  ctx.fillStyle = '#ff2266';
  ctx.beginPath();
  ctx.ellipse(x, y - 3, 8, 5, 0, Math.PI, 0);

  ctx.fillStyle = '#cc1144';

  ctx.ellipse(x, y, 14, 5, 0, 0, Math.PI * 2);

  var blink = Math.floor(frame / 6) % 3;

// ============================================================
// POWER-UPS
// ============================================================
function spawnPowerUp(x, y) {
  var types = ['tripleShot', 'reactorShield', 'sporeMagnet'];
  var type = types[TAS.math.randInt(0, types.length - 1)];
  powerUps.push({ x: x, y: y, type: type, timer: 300, vy: 0.8 });
}

function drawPowerUp(p) {
  var px = Math.floor(p.x), py = Math.floor(p.y);
  var glow = Math.sin(frame * 0.12) * 0.3 + 0.7;
  ctx.globalAlpha = glow;

  switch (p.type) {
    case 'tripleShot':
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(px - 4, py - 4, 8, 8);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px - 1, py - 3, 2, 6);
      ctx.fillRect(px - 3, py - 3, 2, 6);
      ctx.fillRect(px + 1, py - 3, 2, 6);
      break;
    case 'reactorShield':
      ctx.fillStyle = '#44eebb';
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88ffdd';
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'sporeMagnet':
      ctx.fillStyle = '#ff44ff';
      ctx.fillRect(px - 4, py - 4, 8, 8);
      ctx.fillStyle = '#ff88ff';
      ctx.fillRect(px - 2, py - 6, 4, 2);
      ctx.fillRect(px - 2, py + 4, 4, 2);
      break;
  }
  ctx.globalAlpha = 1;
}

function collectPowerUp(p) {
  SFX.powerUp();
  switch (p.type) {
    case 'tripleShot':
      activePowerUps.tripleShot = 900; // 15 seconds at 60fps
      break;
    case 'reactorShield':
      activePowerUps.reactorShield = 1; // one-hit
      break;
    case 'sporeMagnet':
      activePowerUps.sporeMagnet = 600; // 10 seconds
      break;
  }
  TAS.particles.spawn(p.x, p.y, '#ffff00', 10, 2, { shape: 'rect', size: 1 });
}

// ============================================================
// FLOOR HAZARDS (from Reactor Drones)
// ============================================================
function drawFloorHazard(h) {
  ctx.fillStyle = 'rgba(34,255,102,' + (h.alpha * 0.5) + ')';
  ctx.fillRect(Math.floor(h.x - h.radius), Math.floor(h.y - 1), Math.floor(h.radius * 2), 3);
  ctx.fillStyle = 'rgba(68,255,136,' + (h.alpha * 0.3) + ')';
  ctx.fillRect(Math.floor(h.x - h.radius + 1), Math.floor(h.y), Math.floor(h.radius * 2 - 2), 1);

// ============================================================
// BOSS SYSTEM (enhanced: 2 boss types)
// ============================================================
function isBossLevel() {
  return level % 5 === 0;
}

function getBossType() {
  if (level % 10 === 0) return 'mothership';
  return 'reactor';
}

function initBoss() {
  var btype = getBossType();
  var hp = btype === 'mothership' ? (30 + level * 5) : (20 + level * 5);
  boss = {
    x: GW / 2,
    y: -40,
    w: btype === 'mothership' ? 100 : 60,
    h: btype === 'mothership' ? 30 : 40,
    hp: hp,
    maxHp: hp,
    phase: 0,
    timer: 0,
    fireTimer: 0,
    entering: true,
    dead: false,
    type: btype,
    tentacles: [],
    drones: []
  };
  // Mothership tentacles
  if (btype === 'mothership') {
    for (var i = 0; i < 5; i++) {
      boss.tentacles.push({ x: -40 + i * 20, len: 20 + Math.random() * 30, phase: Math.random() * Math.PI * 2 });
    }
  }
  bossActive = true;
  bossWarning = 0;
  SFX.bossAppear();
}

function updateBoss(dt) {
  if (!boss || boss.dead) return;

  boss.timer++;

  if (boss.entering) {
    boss.y += 1;
    var targetY = boss.type === 'mothership' ? 35 : 50;
    if (boss.y >= targetY) {
      boss.entering = false;
    }
    return;
  }

  if (boss.type === 'reactor') {
    updateReactorBoss();
  } else {
    updateMothershipBoss();
  }
}

function updateReactorBoss() {
  // Movement
  var phase = Math.floor(boss.timer / 200) % 3;
  switch (phase) {
    case 0:
      boss.x += Math.cos(boss.timer * 0.03) * 2;
      break;
    case 1:
      boss.x += Math.cos(boss.timer * 0.05) * 3;
      break;
    case 2:
      boss.y = 50 + Math.sin(boss.timer * 0.02) * 25;
      boss.x += Math.cos(boss.timer * 0.04) * 2;
      break;
  }

  boss.x = TAS.math.clamp(boss.x, 40, GW - 40);
  boss.y = TAS.math.clamp(boss.y, 30, 120);

  // Spawn shield drones periodically
  if (boss.timer % 300 === 150 && boss.drones.length < 3) {
    boss.drones.push({
      x: boss.x + (Math.random() - 0.5) * 40,
      y: boss.y + 20,
      hp: 2,
      angle: Math.random() * Math.PI * 2
    });
  }

  // Update drones
  for (var d = boss.drones.length - 1; d >= 0; d--) {
    var drone = boss.drones[d];
    drone.angle += 0.03;
    drone.x = boss.x + Math.cos(drone.angle) * 30;
    drone.y = boss.y + Math.sin(drone.angle) * 15 + 15;
  }

  // Firing
  boss.fireTimer--;
  if (boss.fireTimer <= 0) {
    boss.fireTimer = Math.max(15, 50 - level);
    var pattern = Math.floor(boss.timer / 100) % 4;

    switch (pattern) {
      case 0:
        {
          var dx = player.x - boss.x;
          var dy = PLAYER_Y - (boss.y + boss.h / 2);
          var d = Math.sqrt(dx * dx + dy * dy);
          if (d > 0) {
            alienBullets.push({ x: boss.x, y: boss.y + boss.h / 2, vx: dx / d * 3, vy: dy / d * 3 });
          }
        }
        break;
      case 1:
        for (var i = -1; i <= 1; i++) {
          alienBullets.push({ x: boss.x + i * 15, y: boss.y + boss.h / 2, vx: i * 0.8, vy: 2.5 });
        }
        break;
      case 2:
        {
          var dx2 = player.x - boss.x;
          var dy2 = PLAYER_Y - (boss.y + boss.h / 2);
          var d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          if (d2 > 0) {
            alienBullets.push({ x: boss.x - 15, y: boss.y + boss.h / 2, vx: dx2 / d2 * 2.5, vy: dy2 / d2 * 2.5 });
            alienBullets.push({ x: boss.x + 15, y: boss.y + boss.h / 2, vx: dx2 / d2 * 2.5, vy: dy2 / d2 * 2.5 });
          }
        }
        break;
      case 3:
        for (var j = -2; j <= 2; j++) {
          alienBullets.push({ x: boss.x + j * 10, y: boss.y + boss.h / 2, vx: 0, vy: 2 + Math.random() });
        }
        boss.fireTimer = 40;
        break;
    }
    SFX.alienShoot();
  }
}

function updateMothershipBoss() {
  // Slow side-to-side spanning the screen
  boss.x = GW / 2 + Math.cos(boss.timer * 0.01) * (GW / 2 - 60);
  boss.y = TAS.math.clamp(35 + Math.sin(boss.timer * 0.008) * 10, 25, 50);

  // Tentacle extension
  for (var t = 0; t < boss.tentacles.length; t++) {
    var tent = boss.tentacles[t];
    tent.len = 25 + Math.sin(boss.timer * 0.02 + tent.phase) * 20;
  }

  // Spore rain attack
  boss.fireTimer--;
  if (boss.fireTimer <= 0) {
    boss.fireTimer = Math.max(8, 30 - Math.floor(level / 5));
    // Drop spores from random positions along the body
    var rx = boss.x + (Math.random() - 0.5) * boss.w;
    alienBullets.push({ x: rx, y: boss.y + boss.h / 2, vx: (Math.random() - 0.5) * 0.5, vy: 1.5 + Math.random() * 1.5 });
    if (frame % 4 === 0) SFX.alienShoot();
  }

  // Tentacle tip attacks every 120 frames
  if (boss.timer % 120 === 0) {
    for (var i = 0; i < boss.tentacles.length; i++) {
      var tentTip = boss.tentacles[i];
      var tipX = boss.x + tentTip.x + Math.sin(boss.timer * 0.03 + tentTip.phase) * 8;
      var tipY = boss.y + boss.h / 2 + tentTip.len;
      alienBullets.push({ x: tipX, y: tipY, vx: (Math.random() - 0.5) * 2, vy: 2 });
    }
    SFX.alienShoot();
  }
}

function drawBoss() {
  if (!boss || boss.dead) return;
  var x = Math.floor(boss.x), y = Math.floor(boss.y);

  if (boss.type === 'mothership') {
    drawMothershipBoss(x, y);
  } else {
    drawReactorCoreBoss(x, y);
  }
}

function drawReactorCoreBoss(x, y) {
  // Giant mushroom body
  ctx.fillStyle = '#661144';
  ctx.beginPath();
  ctx.ellipse(x, y - 5, 30, 18, 0, Math.PI, 0);
  ctx.fill();

  ctx.fillStyle = '#882266';
  ctx.beginPath();
  ctx.ellipse(x, y - 8, 22, 12, 0, Math.PI, 0);
  ctx.fill();

  // Spots on cap
  ctx.fillStyle = '#ff44aa';
  ctx.beginPath(); ctx.arc(x - 12, y - 14, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8, y - 16, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x - 3, y - 18, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 16, y - 10, 2.5, 0, Math.PI * 2); ctx.fill();

  // Stem/body
  ctx.fillStyle = '#551133';
  ctx.fillRect(x - 18, y - 5, 36, 20);
  ctx.fillRect(x - 12, y + 15, 24, 6);

  // Eyes
  ctx.fillStyle = '#ff0066';
  var eyePulse = Math.sin(frame * 0.1) * 2;
  ctx.beginPath(); ctx.arc(x - 8, y + 2, 4 + eyePulse * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8, y + 2, 4 + eyePulse * 0.3, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 8, y + 2, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 8, y + 2, 2, 0, Math.PI * 2); ctx.fill();

  // Mouth
  ctx.fillStyle = '#220011';
  ctx.beginPath();
  ctx.ellipse(x, y + 10, 8, 3 + Math.sin(frame * 0.08) * 1.5, 0, 0, Math.PI);
  ctx.fill();

  // Tendrils
  ctx.fillStyle = '#441133';
  for (var i = -2; i <= 2; i++) {
    var tx = x + i * 8;
    var sway = Math.sin(frame * 0.04 + i) * 3;
    ctx.fillRect(Math.floor(tx + sway - 1), y + 18, 3, 5 + Math.abs(i));
  }

  // Shield drones
  for (var d = 0; d < boss.drones.length; d++) {
    var drone = boss.drones[d];
    ctx.fillStyle = '#aa44ff';
    ctx.beginPath();
    ctx.arc(Math.floor(drone.x), Math.floor(drone.y), 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#dd88ff';
    ctx.beginPath();
    ctx.arc(Math.floor(drone.x), Math.floor(drone.y), 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar
  drawBossHPBar(x, y, 'CORRUPTED REACTOR LV' + level);
}

function drawMothershipBoss(x, y) {
  // Giant organic mass filling top of screen
  ctx.fillStyle = '#442266';
  ctx.beginPath();
  ctx.ellipse(x, y, 50, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  // Inner mass
  ctx.fillStyle = '#553388';
  ctx.beginPath();
  ctx.ellipse(x, y, 40, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pulsing veins
  ctx.fillStyle = '#7744aa';
  for (var v = 0; v < 6; v++) {
    var vx = x - 35 + v * 14;
    var vy = y - 10 + Math.sin(frame * 0.03 + v) * 5;
    ctx.fillRect(Math.floor(vx), Math.floor(vy), 2, 20);
  }

  // Eyes across the surface
  ctx.fillStyle = '#ff44aa';
  for (var e = 0; e < 4; e++) {
    var ex = x - 30 + e * 20;
    var ey = y - 3 + Math.sin(frame * 0.05 + e * 1.5) * 2;
    ctx.beginPath(); ctx.arc(Math.floor(ex), Math.floor(ey), 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(Math.floor(ex), Math.floor(ey), 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff44aa';
  }

  // Tentacles hanging down
  ctx.fillStyle = '#553377';
  for (var t = 0; t < boss.tentacles.length; t++) {
    var tent = boss.tentacles[t];
    var tentBaseX = x + tent.x;
    var tentBaseY = y + 15;
    var sway = Math.sin(frame * 0.03 + tent.phase) * 8;

    for (var seg = 0; seg < tent.len; seg += 3) {
      var segSway = Math.sin(frame * 0.04 + tent.phase + seg * 0.1) * (seg / tent.len) * 10;
      var segX = Math.floor(tentBaseX + segSway);
      var segY = Math.floor(tentBaseY + seg);
      var segW = Math.max(1, Math.floor(3 - (seg / tent.len) * 2));
      ctx.fillRect(segX - 1, segY, segW, 3);
    }

    // Tentacle tip glow
    var tipX = Math.floor(tentBaseX + sway);
    var tipY = Math.floor(tentBaseY + tent.len);
    ctx.fillStyle = '#ff66cc';
    ctx.fillRect(tipX - 1, tipY, 3, 3);
    ctx.fillStyle = '#553377';
  }

  // HP bar
  drawBossHPBar(x, y, 'MOTHERSPORE PARASITE LV' + level);
}

function drawBossHPBar(x, y, name) {
  var barW = 50;
  var barX = x - barW / 2;
  var barY = y - 28;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, barY, barW, 4);
  var hpRatio = boss.hp / boss.maxHp;
  ctx.fillStyle = hpRatio > 0.3 ? '#ff3366' : '#ff0000';
  ctx.fillRect(barX, barY, Math.floor(barW * hpRatio), 4);

  ctx.fillStyle = '#a855f7';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(name, x, barY - 3);
}

// ============================================================
// GAME INIT
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + statB.lives;
  level = 1;
  frame = 0;
  player = { x: GW / 2, dead: false, respawnTimer: 0 };
  bullets = [];
  shotCooldown = 0;
  playerShield = false;
  alienBullets = [];
  mystery = null;
  mysteryTimer = 600 + Math.floor(Math.random() * 400);
  mysteryScoreDisplay = null;
  boss = null;
  bossActive = false;
  bossWarning = 0;
  floorHazards = [];
  powerUps = [];
  activePowerUps = { tripleShot: 0, reactorShield: 0, sporeMagnet: 0 };
  waveAnnounce = 120;
  TAS.particles.clear();
  createParallaxStars();

  initBunkers();
  initAliens();
}

function startLevel() {
  bullets = [];
  shotCooldown = 0;
  alienBullets = [];
  mystery = null;
  mysteryTimer = 600 + Math.floor(Math.random() * 400);
  // CHA: mystery appears more often
  var chaBonus = Math.max(0, statB.cha - 10) * 15;
  mysteryTimer = Math.max(200, mysteryTimer - chaBonus);
  mysteryScoreDisplay = null;
  player.dead = false;
  player.respawnTimer = 0;
  boss = null;
  bossActive = false;
  bossWarning = 0;
  floorHazards = [];
  powerUps = [];
  waveAnnounce = 120;
  TAS.particles.clear();

  if (isBossLevel()) {
    aliens = [];
    aliensAlive = 0;
    initBunkers();
    bossWarning = 180;
  } else {
    initAliens();
    initBunkers();
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Power-up timers
  if (activePowerUps.tripleShot > 0) activePowerUps.tripleShot--;
  if (activePowerUps.sporeMagnet > 0) activePowerUps.sporeMagnet--;

  // Parallax starfield scroll
  for (var layer = 0; layer < starLayers.length; layer++) {
    var speed = (layer + 1) * 0.15;
    var stars = starLayers[layer].stars;
    for (var si = 0; si < stars.length; si++) {
      stars[si].y += stars[si].speed * speed;
      if (stars[si].y > GH) { stars[si].y = 0; stars[si].x = Math.random() * GW; }
    }
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.left || TAS.input.touch.right) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'levelClear') {
    if (frame > 120) {
      level++;
      startLevel();
      state = 'playing';
    }
    return;
  }

  if (state === 'dying') {
    player.respawnTimer--;
    if (player.respawnTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        frame = 0;
        if (score > highScore) {
          highScore = score;
          TAS.score.save('spore_swarm_hi', highScore);
        }
        SFX.gameOver();
      } else {
        player.dead = false;
        player.x = GW / 2;
        alienBullets = [];
        state = 'playing';
      }
    }
    return;
  }

  if (state !== 'playing') return;

  // Wave announcement countdown
  if (waveAnnounce > 0) {
    waveAnnounce--;
    if (waveAnnounce > 60) return; // pause during first half of announcement
  }

  // Boss warning countdown
  if (bossWarning > 0) {
    bossWarning--;
    if (bossWarning <= 0 && isBossLevel() && !bossActive) {
      initBoss();
    }
    return;
  }

  // --- Player movement --- (DEX/speed stat)
  if (!player.dead) {
    var left = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
    var right = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;

    var moveSpeed = PLAYER_SPEED * statB.speed;
    if (left) player.x -= moveSpeed;
    if (right) player.x += moveSpeed;

    player.x = TAS.math.clamp(player.x, 14, GW - 14);

    // Fire (WIS reduces cooldown via statB.cooldown)
    var fire = TAS.input.keys['Space'] || TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.a || TAS.input.touch.up;
    var maxActive = activePowerUps.tripleShot > 0 ? 3 : 1;
    var cooldownTime = Math.floor(10 * statB.cooldown);
    if (shotCooldown > 0) shotCooldown--;

    if (fire && bullets.length < maxActive && shotCooldown <= 0) {
      if (activePowerUps.tripleShot > 0) {
        bullets.push({ x: player.x, y: PLAYER_Y - 11, vx: 0, piercing: statB.str >= 15 });
        bullets.push({ x: player.x - 8, y: PLAYER_Y - 9, vx: -0.5, piercing: statB.str >= 15 });
        bullets.push({ x: player.x + 8, y: PLAYER_Y - 9, vx: 0.5, piercing: statB.str >= 15 });
      } else {
        bullets.push({ x: player.x, y: PLAYER_Y - 11, vx: 0, piercing: statB.str >= 15 });
      }
      shotCooldown = cooldownTime;
      SFX.shoot();
    }
  }

  // --- Player bullets ---
  for (var bi = bullets.length - 1; bi >= 0; bi--) {
    var bul = bullets[bi];
    bul.y -= BULLET_SPEED;
    bul.x += bul.vx || 0;
    if (bul.y < 0 || bul.x < 0 || bul.x > GW) {
      bullets.splice(bi, 1);
      continue;
    }

    var bulletHit = false;
    // STR: bullet size scales
    var bulW = 2 + Math.floor(Math.max(0, statB.str - 10) / 5);
    var bulH = 6;

    // Check vs aliens
    for (var ai = 0; ai < aliens.length; ai++) {
      var a = aliens[ai];
      if (!a.alive) continue;
      var aw = a.specialType === 'mycelialHive' ? ALIEN_W * 1.5 : ALIEN_W;
      if (TAS.hit.rectOverlap(bul.x - bulW / 2, bul.y - bulH / 2, bulW, bulH, a.x - aw / 2, a.y - ALIEN_H / 2, aw, ALIEN_H)) {
        a.hp--;
        if (a.hp <= 0) {
          a.alive = false;
          aliensAlive--;
          var alienScore = a.specialType ? (SPECIAL_SCORES[a.specialType] || 20) : ROW_SCORES[a.row];
          score += Math.floor(alienScore * statB.scoreMult);
          TAS.particles.spawn(a.x, a.y, getAlienColor(a.type, a.specialType), 12, 2.5, { shape: 'rect', size: 1, sizeVar: 2 });
          TAS.fx.shake(2, 0.9);
          SFX.alienDie();

          // Mycelial Hive: splits into 2 smaller aliens
          if (a.specialType === 'mycelialHive') {
            SFX.hiveSplit();
            TAS.particles.spawn(a.x, a.y, '#cc66ff', 8, 2);
            aliens.push({
              row: a.row, col: a.col, x: a.x - 10, y: a.y, alive: true,
              type: a.type, specialType: null, frame: 0, hp: 1, diving: false, diveSpeed: 0
            });
            aliens.push({
              row: a.row, col: a.col, x: a.x + 10, y: a.y, alive: true,
              type: a.type, specialType: null, frame: 0, hp: 1, diving: false, diveSpeed: 0
            });
            aliensAlive += 2;
          }

          // Reactor Drone: leaves floor hazard
          if (a.specialType === 'reactorDrone') {
            floorHazards.push({ x: a.x, y: BUNKER_Y + BUNKER_H + 5, radius: 10, alpha: 1, timer: 600 });
          }

          recalcAlienSpeed();

          if (aliensAlive <= 0 && !bossActive) {
            state = 'levelClear';
            frame = 0;
            SFX.levelUp();
          }
        } else {
          // Hit but not dead (hive)
          TAS.particles.spawn(a.x, a.y, '#ff88aa', 5, 1.5);
          SFX.bossHit();
        }
        if (!bul.piercing) {
          bulletHit = true;
          break;
        }
      }
    }

    if (bulletHit) {
      bullets.splice(bi, 1);
      continue;
    }

    // Check vs bunkers
    var hitBunkerB = false;
    for (var bki = 0; bki < bunkers.length; bki++) {
      var bk = bunkers[bki];
      if (bul.x >= bk.x && bul.x < bk.x + BUNKER_W && bul.y >= bk.y && bul.y < bk.y + BUNKER_H) {
        if (bunkerPixelAt(bk, bul.x, bul.y)) {
          damageBunker(bk, bul.x, bul.y, 3);
          TAS.particles.spawn(bul.x, bul.y, '#55aa77', 4, 1, { shape: 'rect', size: 1 });
          SFX.bunkerHit();
          hitBunkerB = true;
          break;
        }
      }
    }
    if (hitBunkerB) {
      bullets.splice(bi, 1);
      continue;
    }

    // Check vs mystery ship
    if (mystery) {
      if (TAS.hit.rectOverlap(bul.x - bulW / 2, bul.y - bulH / 2, bulW, bulH, mystery.x - 14, mystery.y - 5, 28, 10)) {
        score += Math.floor(mystery.score * statB.scoreMult);
        mysteryScoreDisplay = { x: mystery.x, y: mystery.y, score: Math.floor(mystery.score * statB.scoreMult), timer: 60 };
        TAS.particles.spawn(mystery.x, mystery.y, '#ff2266', 15, 3, { shape: 'rect' });
        TAS.fx.shake(3, 0.85);
        SFX.mysteryHit();
        // Power-up drop from mystery
        spawnPowerUp(mystery.x, mystery.y);
        mystery = null;
        bullets.splice(bi, 1);
        continue;
      }
    }

    // Check vs boss
    if (boss && !boss.dead && !boss.entering) {
      // Check drones first
      var hitDrone = false;
      for (var di = boss.drones.length - 1; di >= 0; di--) {
        var drone = boss.drones[di];
        if (TAS.hit.rectOverlap(bul.x - bulW / 2, bul.y - bulH / 2, bulW, bulH, drone.x - 5, drone.y - 5, 10, 10)) {
          drone.hp--;
          TAS.particles.spawn(drone.x, drone.y, '#aa44ff', 5, 2);
          if (drone.hp <= 0) {
            boss.drones.splice(di, 1);
            score += Math.floor(25 * statB.scoreMult);
          }
          hitDrone = true;
          break;
        }
      }
      if (hitDrone) {
        bullets.splice(bi, 1);
        continue;
      }

      if (TAS.hit.rectOverlap(bul.x - bulW / 2, bul.y - bulH / 2, bulW, bulH, boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
        boss.hp--;
        TAS.particles.spawn(bul.x, bul.y, '#ff44aa', 5, 2);
        TAS.fx.shake(2, 0.92);
        SFX.bossHit();
        bullets.splice(bi, 1);

        if (boss.hp <= 0) {
          boss.dead = true;
          bossActive = false;
          score += Math.floor((500 + level * 100) * statB.scoreMult);
          TAS.particles.spawn(boss.x, boss.y, '#ff2266', 30, 4, { size: 2, sizeVar: 3 });
          TAS.particles.spawn(boss.x, boss.y, '#ffaa44', 20, 3);
          TAS.fx.shake(8, 0.85);
          TAS.fx.flash('#ff2266', 0.4);
          SFX.bossDie();
          // Drop power-up from boss
          spawnPowerUp(boss.x, boss.y);
          setTimeout(function() {
            if (state === 'playing') {
              state = 'levelClear';
              frame = 0;
              SFX.levelUp();
            }
          }, 1000);
        }
        continue;
      }
    }
  }

  // --- Alien movement ---
  if (aliensAlive > 0) {
    alienMoveTimer++;
    if (alienMoveTimer >= alienMoveInterval) {
      alienMoveTimer = 0;

      for (var ami = 0; ami < aliens.length; ami++) {
        if (aliens[ami].alive && !aliens[ami].diving) aliens[ami].frame = aliens[ami].frame ? 0 : 1;
      }

      SFX.march(MARCH_NOTES[marchIdx % MARCH_NOTES.length]);
      marchIdx++;

      if (alienNeedDrop) {
        for (var adi = 0; adi < aliens.length; adi++) {
          if (aliens[adi].alive && !aliens[adi].diving) aliens[adi].y += alienDropAmount;
        }
        alienDir = -alienDir;
        alienNeedDrop = false;

        for (var aci = 0; aci < aliens.length; aci++) {
          if (aliens[aci].alive && aliens[aci].y + ALIEN_H / 2 >= PLAYER_Y - 5) {
            killPlayer();
            lives = 0;
            return;
          }
        }
      } else {
        var hitEdge = false;
        for (var asi = 0; asi < aliens.length; asi++) {
          if (aliens[asi].alive && !aliens[asi].diving) {
            aliens[asi].x += alienStepSize * alienDir;
            if (aliens[asi].x + ALIEN_W / 2 >= GW - 8 || aliens[asi].x - ALIEN_W / 2 <= 8) {
              hitEdge = true;
            }
          }
        }
        if (hitEdge) {
          alienNeedDrop = true;
        }
      }
    }

    // --- Spore Bomber dive logic ---
    for (var sbi = 0; sbi < aliens.length; sbi++) {
      var sb = aliens[sbi];
      if (!sb.alive || sb.specialType !== 'sporeBomber') continue;
      if (sb.diving) {
        sb.y += sb.diveSpeed;
        sb.diveSpeed += 0.1;
        // Hit player directly
        if (!player.dead && TAS.hit.rectOverlap(sb.x - 6, sb.y - 6, 12, 12, player.x - 10, PLAYER_Y - 4, 20, 10)) {
          sb.alive = false;
          aliensAlive--;
          TAS.particles.spawn(sb.x, sb.y, '#ff8822', 15, 3);
          killPlayer();
          return;
        }
        // Hit ground
        if (sb.y > GH) {
          sb.alive = false;
          aliensAlive--;
          TAS.particles.spawn(sb.x, GH - 10, '#ff4400', 8, 2);
        }
        continue;
      }
      // Check if this bomber's column is the last (trigger dive)
      if (!sb.diving && aliensAlive <= Math.max(3, Math.floor(ROWS * COLS * 0.15))) {
        var colHasOthers = false;
        for (var oci = 0; oci < aliens.length; oci++) {
          if (aliens[oci] !== sb && aliens[oci].alive && aliens[oci].col === sb.col && !aliens[oci].diving) {
            colHasOthers = true;
            break;
          }
        }
        if (!colHasOthers && Math.random() < 0.02) {
          sb.diving = true;
          sb.diveSpeed = 2;
          SFX.dive();
        }
      }
    }

    // --- Reactor Drone toxic bomb drops ---
    if (frame % 90 === 0) {
      for (var rdi = 0; rdi < aliens.length; rdi++) {
        var rd = aliens[rdi];
        if (rd.alive && rd.specialType === 'reactorDrone' && Math.random() < 0.3) {
          alienBullets.push({ x: rd.x, y: rd.y + ALIEN_H / 2, vx: 0, vy: ALIEN_BULLET_SPEED * 0.8, toxic: true });
          SFX.alienShoot();
        }
      }
    }

    // --- Alien firing ---
    alienFireTimer--;
    if (alienFireTimer <= 0) {
      alienFireTimer = Math.max(15, alienFireRate - Math.floor((ROWS * COLS - aliensAlive) * 0.8));
      fireAlienBullet();
    }
  }

  // --- Alien bullets ---
  for (var abi = alienBullets.length - 1; abi >= 0; abi--) {
    var ab = alienBullets[abi];
    ab.x += ab.vx || 0;
    ab.y += ab.vy || ALIEN_BULLET_SPEED;
    if (ab.y > GH + 10 || ab.y < -10 || ab.x < -10 || ab.x > GW + 10) {
      // Toxic bullets leave floor hazards
      if (ab.toxic && ab.y >= GH - 10) {
        floorHazards.push({ x: ab.x, y: GH - 8, radius: 8, alpha: 1, timer: 400 });
        SFX.hazard();
      }
      alienBullets.splice(abi, 1);
      continue;
    }

    // Hit bunker
    var hitBunkerA = false;
    for (var bj = 0; bj < bunkers.length; bj++) {
      var bkj = bunkers[bj];
      if (ab.x >= bkj.x && ab.x < bkj.x + BUNKER_W && ab.y >= bkj.y && ab.y < bkj.y + BUNKER_H) {
        if (bunkerPixelAt(bkj, ab.x, ab.y)) {
          damageBunker(bkj, ab.x, ab.y, ab.toxic ? 5 : 3);
          TAS.particles.spawn(ab.x, ab.y, ab.toxic ? '#22ff66' : '#55aa77', 3, 1, { shape: 'rect', size: 1 });
          SFX.bunkerHit();
          alienBullets.splice(abi, 1);
          hitBunkerA = true;
          break;
        }
      }
    }
    if (hitBunkerA) continue;

    // Hit player
    if (!player.dead && TAS.hit.rectOverlap(ab.x - 2, ab.y - 2, 4, 4, player.x - 10, PLAYER_Y - 4, 20, 10)) {
      alienBullets.splice(abi, 1);
      // Reactor shield absorbs one hit
      if (activePowerUps.reactorShield > 0) {
        activePowerUps.reactorShield = 0;
        TAS.particles.spawn(player.x, PLAYER_Y, '#44eebb', 10, 2);
        TAS.fx.shake(2, 0.92);
      } else {
        killPlayer();
        return;
      }
    }
  }

  // --- Floor hazards ---
  for (var fhi = floorHazards.length - 1; fhi >= 0; fhi--) {
    var fh = floorHazards[fhi];
    fh.timer--;
    fh.alpha = Math.min(1, fh.timer / 100);
    if (fh.timer <= 0) {
      floorHazards.splice(fhi, 1);
      continue;
    }
    // Damage player walking through
    if (!player.dead && Math.abs(player.x - fh.x) < fh.radius && PLAYER_Y >= fh.y - 3 && PLAYER_Y <= fh.y + 3) {
      if (activePowerUps.reactorShield > 0) {
        activePowerUps.reactorShield = 0;
        TAS.particles.spawn(player.x, PLAYER_Y, '#44eebb', 6, 2);
      } else if (frame % 60 === 0) {
        killPlayer();
        return;
      }
    }
  }

  // --- Power-ups ---
  for (var pi = powerUps.length - 1; pi >= 0; pi--) {
    var pu = powerUps[pi];
    pu.y += pu.vy;
    pu.timer--;

    // Spore magnet: attract to player
    if (activePowerUps.sporeMagnet > 0) {
      var pdx = player.x - pu.x;
      var pdy = PLAYER_Y - pu.y;
      var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
      if (pdist > 2) {
        pu.x += (pdx / pdist) * 3;
        pu.y += (pdy / pdist) * 3;
      }
    }

    if (pu.timer <= 0 || pu.y > GH) {
      powerUps.splice(pi, 1);
      continue;
    }

    // Collect
    if (!player.dead && TAS.hit.rectOverlap(pu.x - 5, pu.y - 5, 10, 10, player.x - 10, PLAYER_Y - 4, 20, 10)) {
      collectPowerUp(pu);
      powerUps.splice(pi, 1);
    }
  }

  // --- Aliens collide with bunkers ---
  for (var aci2 = 0; aci2 < aliens.length; aci2++) {
    var ac = aliens[aci2];
    if (!ac.alive) continue;
    for (var bci = 0; bci < bunkers.length; bci++) {
      var bc = bunkers[bci];
      if (TAS.hit.rectOverlap(ac.x - ALIEN_W / 2, ac.y - ALIEN_H / 2, ALIEN_W, ALIEN_H, bc.x, bc.y, BUNKER_W, BUNKER_H)) {
        for (var dy = 0; dy < BUNKER_H; dy++) {
          for (var dx = 0; dx < BUNKER_W; dx++) {
            var wx = bc.x + dx;
            var wy = bc.y + dy;
            if (TAS.hit.pointInRect(wx, wy, ac.x - ALIEN_W / 2, ac.y - ALIEN_H / 2, ALIEN_W, ALIEN_H)) {
              bc.pixels[dy][dx] = false;
            }
          }
        }
      }
    }
  }

  // --- Mystery ship ---
  if (mystery) {
    mystery.x += mystery.dir * mystery.speed;
    if ((mystery.dir > 0 && mystery.x > GW + 30) || (mystery.dir < 0 && mystery.x < -30)) {
      mystery = null;
    }
  } else if (!bossActive) {
    mysteryTimer--;
    if (mysteryTimer <= 0) {
      spawnMystery();
      var chaReduction = Math.max(0, statB.cha - 10) * 20;
      mysteryTimer = Math.max(200, 600 + Math.floor(Math.random() * 600) - chaReduction);
    }
  }

  if (mystery && frame % 8 === 0) {
    SFX.mystery();
  }

  if (mysteryScoreDisplay) {
    mysteryScoreDisplay.timer--;
    if (mysteryScoreDisplay.timer <= 0) mysteryScoreDisplay = null;
  }

  // --- Boss update ---
  if (bossActive && boss && !boss.dead) {
    updateBoss(dt);
  }
}

function fireAlienBullet() {
  var bottomAliens = [];
  for (var col = 0; col < COLS; col++) {
    var lowest = null;
    for (var i = 0; i < aliens.length; i++) {
      var a = aliens[i];
      if (a.alive && a.col === col && !a.diving) {
        if (!lowest || a.row > lowest.row) lowest = a;
      }
    }
    if (lowest) bottomAliens.push(lowest);
  }
  if (bottomAliens.length === 0) return;

  var shooter = bottomAliens[TAS.math.randInt(0, bottomAliens.length - 1)];
  alienBullets.push({ x: shooter.x, y: shooter.y + ALIEN_H / 2, vx: 0, vy: ALIEN_BULLET_SPEED + (level - 1) * 0.15 });
  SFX.alienShoot();
}

function recalcAlienSpeed() {
  if (aliensAlive <= 1) {
    alienMoveInterval = 2;
  } else if (aliensAlive <= 5) {
    alienMoveInterval = 4;
  } else if (aliensAlive <= 10) {
    alienMoveInterval = 8;
  } else if (aliensAlive <= 20) {
    alienMoveInterval = 14;
  } else if (aliensAlive <= 30) {
    alienMoveInterval = 20;
  } else {
    alienMoveInterval = Math.max(8, 40 - (level - 1) * 3);
  }
}

function getAlienColor(type, specialType) {
  if (specialType === 'reactorDrone') return '#22ff66';
  if (specialType === 'mycelialHive') return '#cc66ff';
  if (specialType === 'sporeBomber') return '#ff8822';
  var colors = ['#ff4466', '#aa44ff', '#44cc88', '#cc8844', '#88aacc'];
  return colors[type] || '#ffffff';
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  lives--;
  TAS.particles.spawn(player.x, PLAYER_Y, '#44eebb', 20, 3, { shape: 'rect', size: 1, sizeVar: 3 });
  TAS.particles.spawn(player.x, PLAYER_Y, '#ffcc00', 10, 2);
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#ff4444', 0.3);
  SFX.playerDie();
  bullets = [];
  state = 'dying';
  player.respawnTimer = 90;
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  // Zone-based background
  ctx.fillStyle = getZoneBgColor();
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  // Parallax starfield
  for (var li = 0; li < starLayers.length; li++) {
    ctx.globalAlpha = 0.4 + li * 0.2;
    starLayers[li].draw();
  }
  ctx.globalAlpha = 1;

  // Nebula overlay
  ctx.fillStyle = getZoneNebulaColor();
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Floor hazards (under everything)
  for (var fhi = 0; fhi < floorHazards.length; fhi++) {
    drawFloorHazard(floorHazards[fhi]);
  }

  // Bunkers
  for (var bi = 0; bi < bunkers.length; bi++) drawBunker(bunkers[bi]);

  // Aliens
  for (var ai = 0; ai < aliens.length; ai++) {
    if (aliens[ai].alive) drawAlien(aliens[ai]);
  }

  // Mystery ship
  drawMystery();

  // Mystery score popup
  if (mysteryScoreDisplay) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(mysteryScoreDisplay.score.toString(), Math.floor(mysteryScoreDisplay.x), Math.floor(mysteryScoreDisplay.y));
  }

  // Boss
  if (bossActive) drawBoss();

  // Power-ups
  for (var pi = 0; pi < powerUps.length; pi++) {
    drawPowerUp(powerUps[pi]);
  }

  // Player bullets
  for (var bui = 0; bui < bullets.length; bui++) {
    var bul = bullets[bui];
    var bulW = 2 + Math.floor(Math.max(0, statB.str - 10) / 5);
    ctx.fillStyle = bul.piercing ? '#aaffee' : '#88ffdd';
    ctx.fillRect(Math.floor(bul.x - bulW / 2), Math.floor(bul.y - 3), bulW, 6);
    ctx.fillStyle = 'rgba(100, 255, 200, 0.3)';
    ctx.fillRect(Math.floor(bul.x - bulW / 2 - 1), Math.floor(bul.y - 5), bulW + 2, 10);
  }

  // Alien bullets
  for (var abi = 0; abi < alienBullets.length; abi++) {
    var ab = alienBullets[abi];
    if (ab.toxic) {
      ctx.fillStyle = '#22ff66';
      ctx.fillRect(Math.floor(ab.x - 2), Math.floor(ab.y - 3), 4, 6);
      ctx.fillStyle = '#88ffaa';
      ctx.fillRect(Math.floor(ab.x - 1), Math.floor(ab.y - 1), 2, 3);
    } else {
      ctx.fillStyle = '#ff4488';
      ctx.fillRect(Math.floor(ab.x - 1), Math.floor(ab.y - 3), 3, 6);
      ctx.fillStyle = '#ff88aa';
      ctx.fillRect(Math.floor(ab.x), Math.floor(ab.y - 1), 1, 3);
    }
  }

  // Player
  drawPlayer();

  // Particles
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Boss warning overlay
  if (bossWarning > 0) {
    if (Math.floor(frame / 10) % 2) {
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      var bossName = getBossType() === 'mothership' ? 'MOTHERSPORE PARASITE' : 'CORRUPTED REACTOR';
      ctx.fillText('WARNING', GW / 2, GH / 2 - 10);
      ctx.font = '10px monospace';
      ctx.fillText(bossName + ' INCOMING', GW / 2, GH / 2 + 10);
    }
  }

  // Wave announcement overlay
  if (waveAnnounce > 0) {
    var anAlpha = waveAnnounce > 90 ? 1 : waveAnnounce / 90;
    ctx.globalAlpha = anAlpha;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, GH / 2 - 30, GW, 60);
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WAVE ' + level, GW / 2, GH / 2 - 5);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '10px monospace';
    ctx.fillText(getZoneName(), GW / 2, GH / 2 + 15);
    ctx.globalAlpha = 1;
  }

  // Level clear overlay
  if (state === 'levelClear') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARDEN DEFENDED', GW / 2, GH / 2 - 25);
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    var bonus = Math.floor(level * 500 * statB.scoreMult);
    ctx.fillText('POOP BONUS: ' + bonus, GW / 2, GH / 2);
    if (frame === 1) score += bonus;
    ctx.fillStyle = '#fff';
    ctx.fillText('POOP: ' + score, GW / 2, GH / 2 + 18);
    // Active power-ups display
    var puText = '';
    if (activePowerUps.tripleShot > 0) puText += 'TRIPLE SPORE ';
    if (activePowerUps.reactorShield > 0) puText += 'GARDEN SHIELD ';
    if (activePowerUps.sporeMagnet > 0) puText += 'SEED MAGNET ';
    if (puText) {
      ctx.fillStyle = '#f4b41b';
      ctx.fillText(puText.trim(), GW / 2, GH / 2 + 36);
    }
  }

  // HUD
  drawHUD();

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  var barH = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 9px monospace';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('POOP: ' + score, 4, barH - 4);

  // Level + zone
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.fillText('LV ' + level, GW / 2 - 30, barH - 4);

  // High score
  ctx.fillStyle = '#7a444a';
  ctx.textAlign = 'center';
  ctx.fillText('HI: ' + highScore, GW / 2 + 50, barH - 4);

  // Lives
  ctx.textAlign = 'right';
  for (var i = 0; i < lives; i++) {
    var lx = GW - 8 - i * 14;
    var ly = Math.floor(barH / 2);
    ctx.fillStyle = '#38d973';
    ctx.fillRect(lx - 4, ly, 8, 3);
    ctx.fillRect(lx - 1, ly - 3, 2, 3);
  }

  // Active power-up indicators
  var puX = 4;
  var puY = barH + 4;
  if (activePowerUps.tripleShot > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('3x ' + Math.ceil(activePowerUps.tripleShot / 60) + 's', puX, puY + 6);
    puX += 36;
  }
  if (activePowerUps.reactorShield > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('GRD', puX, puY + 6);
    puX += 28;
  }
  if (activePowerUps.sporeMagnet > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SEED ' + Math.ceil(activePowerUps.sporeMagnet / 60) + 's', puX, puY + 6);
  }

  // Ground line (garden soil)
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(0, GH - 6, GW, 1);
  ctx.fillStyle = '#4a2a2e';
  ctx.fillRect(0, GH - 5, GW, 5);
}

// ============================================================
// TITLE SCREEN (NES-style controls + stat bar)
// ============================================================
function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Parallax stars
  for (var li = 0; li < starLayers.length; li++) {
    ctx.globalAlpha = 0.3 + li * 0.2;
    starLayers[li].draw();
  }
  ctx.globalAlpha = 1;

  // Nebula tint
  ctx.fillStyle = getZoneNebulaColor();
  ctx.fillRect(0, 0, GW, GH);

  // Decorative aliens floating
  ctx.save();
  for (var i = 0; i < 5; i++) {
    var ax = 80 + i * 80;
    var ay = 50 + Math.sin(frame * 0.03 + i * 1.2) * 15;
    var fakeAlien = { x: ax, y: ay, type: i, frame: Math.floor(frame / 30) % 2, specialType: null, hp: 1, diving: false };
    drawAlien(fakeAlien);
  }
  ctx.restore();

  ctx.textAlign = 'center';

  // Title shadow
  ctx.fillStyle = '#1a1c2c';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('SPORE', GW / 2 + 2, 102);
  ctx.fillText('SWARM', GW / 2 + 2, 132);

  // Title
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE', GW / 2, 100);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SWARM', GW / 2, 130);

  // Subtitle
  ctx.fillStyle = '#3cacd7';
  ctx.font = '9px monospace';
  ctx.fillText('Defend the Gardens of Tasern', GW / 2, 146);

  // NES-style controls
  var ctrlY = 156;
  ctx.font = '7px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText('A / Z ............ FIRE SPORES', GW / 2, ctrlY);
  ctx.fillText('LEFT / RIGHT ..... MOVE BASELING', GW / 2, ctrlY + 10);
  ctx.fillText('SPACE ............ DEPLOY', GW / 2, ctrlY + 20);
  ctx.fillStyle = '#7a444a';
  ctx.fillText('MOBILE: TAP BUTTONS', GW / 2, ctrlY + 32);

  // Score table
  var tableY = ctrlY + 48;
  ctx.font = '8px monospace';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('--- POOP BOUNTIES ---', GW / 2, tableY);

  ctx.fillStyle = '#e6482e';
  ctx.fillText('? COSMIC FUNGUS = 50-300', GW / 2, tableY + 12);
  ctx.fillStyle = '#e6482e';
  ctx.fillText('ALIEN MOLD CAP = 40', GW / 2, tableY + 22);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPACE SPORE = 30', GW / 2, tableY + 32);
  ctx.fillStyle = '#38d973';
  ctx.fillText('TOXIC DRONE = 35', GW / 2, tableY + 42);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('DIVE BOMBER = 45', GW / 2, tableY + 52);

  // Selected baseling name (Base-blue) + 5 arcade stat bars
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  var statY = tableY + 66;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, statY);
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bx0 = GW / 2 - 75;
    ctx.textAlign = 'left'; ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k], _bx = _bx0 + _i * 30;
      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, statY + 12);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, statY + 15, 24, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, statY + 15, 24 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.fillText('GARDEN RECORD: ' + highScore, GW / 2, GH - 34);
  }

  // Start prompt + select-baseling prompt (Base-blue)
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('DEPLOY YOUR BASELING', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 7);
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  ctx.textAlign = 'center';

  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN LOST', GW / 2, GH * 0.28);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('POOP Collected: ' + score, GW / 2, GH * 0.42);

  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('Wave: ' + level + ' - ' + getZoneName(), GW / 2, GH * 0.50);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('NEW GARDEN RECORD!', GW / 2, GH * 0.58);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#7a444a';
    ctx.font = '10px monospace';
    ctx.fillText('Garden Record: ' + highScore, GW / 2, GH * 0.58);
  }

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY TO REPLANT', GW / 2, GH * 0.78);
  ctx.globalAlpha = 1;
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
