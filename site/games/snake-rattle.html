<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Rattle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 400, GH = 400;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a'], labels: { a: 'TONGUE' } });

// Isometric tile dimensions
var TW = 32; // tile width (iso)
var TH = 16; // tile height (iso)
var TD = 10; // tile depth (height layer)
var GRID_SIZE = 12; // tiles per side per level

// Movement
var MOVE_SPEED = 2.2; // grid cells per second
var TONGUE_RANGE = 1.8; // grid cells reach

// Game state
var state = 'title';
var score = 0;
var highScore = TAS.score.load('snakerattle_hi');
var level = 1;
var frame = 0;
var timeLeft = 0;
var lives = 3;

// Snake
var snake = [];    // [{gx,gy,height,px,py}] head is [0]
var snakeDir = 0;  // 0=NE,1=SE,2=SW,3=NW
var moveCooldown = 0;
var tongueTimer = 0;
var tongueDir = 0;
var targetLength = 1; // desired segment count (head included)

// Level data
var tiles = [];     // 2D array [row][col] = {height, type}
var nibbleys = [];  // [{gx,gy,height,bounceT,color,value,speed,timer}]
var hazards = [];   // [{gx,gy,type,height}]
var exitGate = null; // {gx,gy,height,open}
var requiredLength = 5;
var enemies = [];   // [{gx,gy,height,dir,timer}]

// Camera
var camX = 0, camY = 0;

// Tile types
var TILE_NORMAL = 0;
var TILE_RAMP_NE = 1;
var TILE_RAMP_SE = 2;
var TILE_RAMP_SW = 3;
var TILE_RAMP_NW = 4;
var TILE_ICE = 5;
var TILE_WATER = 6;
var TILE_SPIKE = 7;
var TILE_EMPTY = 8;
var TILE_MOVING = 9;

// Direction vectors (grid-space: NE, SE, SW, NW)
var DIR_DX = [1, 0, -1, 0];
var DIR_DY = [0, 1, 0, -1];

// Colors
var COLORS = {
  tile: ['#5a7a5a', '#4a6a4a', '#3a5a3a'],
  tileEdge: '#2a3a2a',
  ice: '#88ccee',
  water: '#2244aa',
  spike: '#aa3333',
  snake: '#44cc44',
  snakeHead: '#66ff66',
  exit: '#ffcc00',
  exitClosed: '#886600'
};

// === ISOMETRIC PROJECTION ===
function isoX(gx, gy) {
  return (gx - gy) * (TW / 2) + GW / 2;
}

function isoY(gx, gy, height) {
  return (gx + gy) * (TH / 2) - (height || 0) * TD + GH / 3;
}

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  tiles = [];
  nibbleys = [];
  hazards = [];
  enemies = [];
  exitGate = null;

  var size = GRID_SIZE;
  var baseHeight = 0;

  // Create base grid
  for (var r = 0; r < size; r++) {
    tiles[r] = [];
    for (var c = 0; c < size; c++) {
      tiles[r][c] = { height: baseHeight, type: TILE_NORMAL };
    }
  }

  // Add height variation based on level
  if (lvl >= 4) {
    var platforms = 2 + Math.floor(lvl / 3);
    for (var p = 0; p < platforms; p++) {
      var px = TAS.math.randInt(1, size - 3);
      var py = TAS.math.randInt(1, size - 3);
      var pw = TAS.math.randInt(2, 4);
      var ph = TAS.math.randInt(2, 4);
      var pHeight = TAS.math.randInt(1, 2);
      for (var rr = py; rr < Math.min(py + ph, size); rr++) {
        for (var cc = px; cc < Math.min(px + pw, size); cc++) {
          tiles[rr][cc].height = pHeight;
        }
      }
    }
  }

  // Add hazards based on level
  if (lvl >= 2) {
    // Water tiles
    var waterCount = Math.min(lvl - 1, 5);
    for (var w = 0; w < waterCount; w++) {
      var wx = TAS.math.randInt(2, size - 3);
      var wy = TAS.math.randInt(2, size - 3);
      if (!(wx === 1 && wy === 1)) { // don't block spawn
        tiles[wy][wx].type = TILE_WATER;
      }
    }
  }

  if (lvl >= 3) {
    // Spike tiles
    var spikeCount = Math.min(lvl - 2, 6);
    for (var s = 0; s < spikeCount; s++) {
      var sx = TAS.math.randInt(1, size - 2);
      var sy = TAS.math.randInt(1, size - 2);
      if (tiles[sy][sx].type === TILE_NORMAL && !(sx === 1 && sy === 1)) {
        tiles[sy][sx].type = TILE_SPIKE;
      }
    }
  }

  if (lvl >= 5) {
    // Ice tiles
    var iceCount = Math.min(lvl - 3, 8);
    for (var ic = 0; ic < iceCount; ic++) {
      var ix = TAS.math.randInt(0, size - 1);
      var iy = TAS.math.randInt(0, size - 1);
      if (tiles[iy][ix].type === TILE_NORMAL && !(ix === 1 && iy === 1)) {
        tiles[iy][ix].type = TILE_ICE;
      }
    }
  }

  // Empty tiles (edges to fall off)
  if (lvl >= 4) {
    var emptyCount = Math.min(lvl, 8);
    for (var e = 0; e < emptyCount; e++) {
      var ex = TAS.math.randInt(0, size - 1);
      var ey = TAS.math.randInt(0, size - 1);
      if ((ex === 0 || ex === size - 1 || ey === 0 || ey === size - 1) && !(ex === 1 && ey === 1)) {
        tiles[ey][ex].type = TILE_EMPTY;
      }
    }
  }

  // Enemies (stomping feet)
  if (lvl >= 4) {
    var enemyCount = Math.min(lvl - 3, 4);
    for (var en = 0; en < enemyCount; en++) {
      enemies.push({
        gx: TAS.math.randInt(3, size - 3),
        gy: TAS.math.randInt(3, size - 3),
        height: 0,
        dir: TAS.math.randInt(0, 3),
        timer: TAS.math.randRange(0, 3),
        moveTimer: 0
      });
    }
  }

  // Spawn nibbleys
  var nibCount = Math.max(15 - lvl, 6);
  spawnNibbleys(nibCount, size, lvl);

  // Required length to open gate
  requiredLength = 4 + lvl * 2;

  // Time limit
  timeLeft = 45 + (10 - lvl) * 5;
  if (timeLeft < 30) timeLeft = 30;

  // Exit gate position
  exitGate = {
    gx: size - 2,
    gy: size - 2,
    height: tiles[size - 2][size - 2].height,
    open: false
  };

  // Make sure exit tile is normal
  tiles[size - 2][size - 2].type = TILE_NORMAL;

  // Snake spawn
  snake = [{ gx: 1, gy: 1, height: tiles[1][1].height, px: isoX(1, 1), py: isoY(1, 1, tiles[1][1].height) }];
  targetLength = 1;
  snakeDir = 1; // facing SE
  moveCooldown = 0;
}

function spawnNibbleys(count, size, lvl) {
  for (var i = 0; i < count; i++) {
    var nx = TAS.math.randInt(0, size - 1);
    var ny = TAS.math.randInt(0, size - 1);
    // Don't spawn on water/empty/exit
    if (tiles[ny] && tiles[ny][nx] && tiles[ny][nx].type !== TILE_WATER && tiles[ny][nx].type !== TILE_EMPTY) {
      if (!(nx === 1 && ny === 1)) { // not on spawn
        var color, value, speed;
        var roll = Math.random();
        if (roll < 0.05 && lvl >= 3) {
          // Gold (rare)
          color = '#ffdd00';
          value = 5;
          speed = 0;
        } else if (roll < 0.15 && lvl >= 2) {
          // Red (fast)
          color = '#ff4444';
          value = 3;
          speed = 2.5;
        } else if (roll < 0.35) {
          // Blue
          color = '#4488ff';
          value = 2;
          speed = 1.2;
        } else {
          // Green (common)
          color = '#44dd44';
          value = 1;
          speed = 0.8;
        }
        nibbleys.push({
          gx: nx + Math.random() * 0.5 - 0.25,
          gy: ny + Math.random() * 0.5 - 0.25,
          height: tiles[ny][nx].height,
          bounceT: Math.random() * Math.PI * 2,
          color: color,
          value: value,
          speed: speed,
          timer: color === '#ffdd00' ? 8 + Math.random() * 4 : 999,
          dx: (Math.random() - 0.5) * speed,
          dy: (Math.random() - 0.5) * speed
        });
      }
    }
  }
}

// === GAME INIT ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  TAS.particles.clear();
  generateLevel(level);
  playLevelStart();
}

function nextLevel() {
  level++;
  if (level > 10) {
    // Game complete!
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('snakerattle_hi', highScore);
    }
    playVictoryFanfare();
    return;
  }
  generateLevel(level);
  playLevelStart();
}

function loseLife() {
  lives--;
  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#ff0000', 0.4);
  playDeath();
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('snakerattle_hi', highScore);
    }
  } else {
    // Respawn
    snake = [{ gx: 1, gy: 1, height: tiles[1][1].height, px: isoX(1, 1), py: isoY(1, 1, tiles[1][1].height) }];
    targetLength = 1;
    snakeDir = 1;
    moveCooldown = 0.5;
  }
}

function loseSegments(count) {
  var removed = Math.min(count, snake.length - 1);
  if (removed > 0) {
    for (var i = 0; i < removed; i++) {
      var seg = snake.pop();
      TAS.particles.spawn(seg.px, seg.py, '#44cc44', 5, 2, { gravity: 0.5 });
    }
    targetLength = snake.length;
    TAS.fx.shake(3, 0.9);
    playSegmentLoss();
  }
  if (snake.length <= 0) {
    loseLife();
  }
}

// === SOUND EFFECTS ===
function playEat(value) {
  TAS.audio.ensureAudio();
  var baseFreq = 400 + value * 100;
  TAS.audio.playTone(baseFreq, 0.08, 'square', 0.08);
  TAS.audio.playTone(baseFreq * 1.5, 0.08, 'square', 0.06);
  if (value >= 3) {
    setTimeout(function() { TAS.audio.playTone(baseFreq * 2, 0.12, 'sine', 0.07); }, 80);
  }
}

function playTongueSnap() {
  TAS.audio.ensureAudio();
  TAS.audio.playNoise(0.05, 0.06, 2000);
  TAS.audio.playTone(800, 0.04, 'sawtooth', 0.05, 400);
}

function playDeath() {
  TAS.audio.ensureAudio();
  TAS.audio.playTone(300, 0.15, 'square', 0.1, 80);
  setTimeout(function() { TAS.audio.playTone(150, 0.3, 'sawtooth', 0.08, 50); }, 150);
}

function playSegmentLoss() {
  TAS.audio.ensureAudio();
  TAS.audio.playTone(500, 0.1, 'square', 0.06, 200);
}

function playGateOpen() {
  TAS.audio.ensureAudio();
  TAS.audio.playMelody([
    [523, 0.1, 'sine', 0.08],
    [659, 0.1, 'sine', 0.08],
    [784, 0.15, 'sine', 0.1]
  ], 100);
}

function playLevelClear() {
  TAS.audio.ensureAudio();
  TAS.audio.playMelody([
    [523, 0.12, 'square', 0.08],
    [659, 0.12, 'square', 0.08],
    [784, 0.12, 'square', 0.08],
    [1047, 0.25, 'square', 0.1]
  ], 120);
}

function playLevelStart() {
  TAS.audio.ensureAudio();
  TAS.audio.playMelody([
    [330, 0.08, 'square', 0.06],
    [440, 0.08, 'square', 0.06],
    [550, 0.12, 'square', 0.08]
  ], 100);
}

function playBounce() {
  TAS.audio.ensureAudio();
  TAS.audio.playTone(200 + Math.random() * 100, 0.04, 'sine', 0.03);
}

function playFall() {
  TAS.audio.ensureAudio();
  TAS.audio.playTone(600, 0.3, 'sine', 0.07, 100);
}

function playVictoryFanfare() {
  TAS.audio.ensureAudio();
  TAS.audio.playMelody([
    [523, 0.12, 'square', 0.09],
    [587, 0.12, 'square', 0.09],
    [659, 0.12, 'square', 0.09],
    [784, 0.12, 'square', 0.09],
    [1047, 0.3, 'square', 0.12],
    [784, 0.1, 'square', 0.08],
    [1047, 0.4, 'square', 0.12]
  ], 140);
}

// === INPUT HANDLING ===
var inputDir = -1; // -1 = no input
var tonguePressed = false;
var prevTongue = false;

function readInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;

  inputDir = -1;

  // Isometric mapping: Up=NE, Right=SE, Down=SW, Left=NW
  if (k['ArrowUp'] || k['KeyW'] || t.up) inputDir = 0; // NE
  else if (k['ArrowRight'] || k['KeyD'] || t.right) inputDir = 1; // SE
  else if (k['ArrowDown'] || k['KeyS'] || t.down) inputDir = 2; // SW
  else if (k['ArrowLeft'] || k['KeyA'] || t.left) inputDir = 3; // NW

  var nowTongue = k['Space'] || k['KeyZ'] || k['KeyX'] || t.a;
  tonguePressed = nowTongue && !prevTongue;
  prevTongue = nowTongue;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'levelClear') {
    if (frame > 90) {
      nextLevel();
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  readInput();

  // Timer
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    loseLife();
    if (state === 'playing') {
      timeLeft = 30; // bonus time on respawn
    }
    return;
  }

  // Move snake
  moveCooldown -= dt;
  if (moveCooldown <= 0 && inputDir >= 0) {
    snakeDir = inputDir;
    moveSnake();
    moveCooldown = 1.0 / MOVE_SPEED;

    // Ice: auto-slide
    var head = snake[0];
    var hgx = Math.round(head.gx);
    var hgy = Math.round(head.gy);
    if (hgx >= 0 && hgx < GRID_SIZE && hgy >= 0 && hgy < GRID_SIZE) {
      if (tiles[hgy][hgx].type === TILE_ICE) {
        moveCooldown = 0.15 / MOVE_SPEED; // faster on ice
      }
    }
  } else if (moveCooldown <= 0) {
    // On ice, keep sliding
    var head2 = snake[0];
    var hgx2 = Math.round(head2.gx);
    var hgy2 = Math.round(head2.gy);
    if (hgx2 >= 0 && hgx2 < GRID_SIZE && hgy2 >= 0 && hgy2 < GRID_SIZE) {
      if (tiles[hgy2][hgx2].type === TILE_ICE) {
        moveSnake();
        moveCooldown = 0.2 / MOVE_SPEED;
      }
    }
  }

  // Tongue attack
  if (tonguePressed && tongueTimer <= 0) {
    tongueTimer = 0.3;
    tongueDir = snakeDir;
    playTongueSnap();
    checkTongueHit();
  }
  if (tongueTimer > 0) tongueTimer -= dt;

  // Update nibbleys
  updateNibbleys(dt);

  // Update enemies
  updateEnemies(dt);

  // Check gate status
  if (exitGate && !exitGate.open && snake.length >= requiredLength) {
    exitGate.open = true;
    playGateOpen();
    TAS.particles.spawn(
      isoX(exitGate.gx, exitGate.gy),
      isoY(exitGate.gx, exitGate.gy, exitGate.height),
      '#ffcc00', 15, 3, { gravity: -0.5 }
    );
  }

  // Check if snake reached exit
  if (exitGate && exitGate.open) {
    var headG = snake[0];
    if (Math.abs(headG.gx - exitGate.gx) < 0.6 && Math.abs(headG.gy - exitGate.gy) < 0.6) {
      // Level clear!
      score += Math.floor(timeLeft) * 10 + snake.length * 50;
      state = 'levelClear';
      frame = 0;
      playLevelClear();
      TAS.fx.flash('#ffffff', 0.3);
    }
  }

  // Animate segment positions (smooth follow)
  for (var i = 0; i < snake.length; i++) {
    var seg = snake[i];
    var targetPx = isoX(seg.gx, seg.gy);
    var targetPy = isoY(seg.gx, seg.gy, seg.height);
    seg.px = TAS.math.lerp(seg.px, targetPx, dt * 12);
    seg.py = TAS.math.lerp(seg.py, targetPy, dt * 12);
  }

  // Update camera
  if (snake.length > 0) {
    var headS = snake[0];
    camX = TAS.math.lerp(camX, headS.px - GW / 2, dt * 4);
    camY = TAS.math.lerp(camY, headS.py - GH / 2.5, dt * 4);
  }
}

function moveSnake() {
  var head = snake[0];
  var newGX = head.gx + DIR_DX[snakeDir];
  var newGY = head.gy + DIR_DY[snakeDir];

  // Bounds check
  var ngx = Math.round(newGX);
  var ngy = Math.round(newGY);

  if (ngx < 0 || ngx >= GRID_SIZE || ngy < 0 || ngy >= GRID_SIZE) {
    // Fall off edge
    playFall();
    loseSegments(2);
    return;
  }

  var tile = tiles[ngy][ngx];

  // Check tile type
  if (tile.type === TILE_EMPTY) {
    playFall();
    loseSegments(2);
    return;
  }

  if (tile.type === TILE_WATER) {
    playFall();
    TAS.particles.spawn(isoX(newGX, newGY), isoY(newGX, newGY, tile.height), '#4488ff', 10, 2, { gravity: 1 });
    loseLife();
    return;
  }

  if (tile.type === TILE_SPIKE) {
    TAS.fx.flash('#ff4444', 0.2);
    loseSegments(1);
    // Still move onto it
  }

  // Move body segments (each takes position of the one ahead)
  for (var i = snake.length - 1; i > 0; i--) {
    snake[i].gx = snake[i - 1].gx;
    snake[i].gy = snake[i - 1].gy;
    snake[i].height = snake[i - 1].height;
  }

  // Move head
  head.gx = newGX;
  head.gy = newGY;
  head.height = tile.height;

  // Check nibbley collision at new position
  checkNibbleysAtHead();

  // Check enemy collision
  for (var e = 0; e < enemies.length; e++) {
    var en = enemies[e];
    if (Math.abs(head.gx - en.gx) < 0.7 && Math.abs(head.gy - en.gy) < 0.7) {
      TAS.fx.shake(5, 0.88);
      loseSegments(2);
      break;
    }
  }

  // Grow if needed
  if (snake.length < targetLength) {
    var last = snake[snake.length - 1];
    snake.push({
      gx: last.gx,
      gy: last.gy,
      height: last.height,
      px: last.px,
      py: last.py
    });
  }
}

function checkNibbleysAtHead() {
  if (snake.length === 0) return;
  var head = snake[0];

  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    var dx = head.gx - nib.gx;
    var dy = head.gy - nib.gy;
    if (dx * dx + dy * dy < 0.8) {
      eatNibbley(i);
    }
  }
}

function checkTongueHit() {
  if (snake.length === 0) return;
  var head = snake[0];
  var tx = head.gx + DIR_DX[tongueDir] * TONGUE_RANGE;
  var ty = head.gy + DIR_DY[tongueDir] * TONGUE_RANGE;

  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    var dx = tx - nib.gx;
    var dy = ty - nib.gy;
    // Check along tongue line
    var hdx = nib.gx - head.gx;
    var hdy = nib.gy - head.gy;
    var along = hdx * DIR_DX[tongueDir] + hdy * DIR_DY[tongueDir];
    var perp = Math.abs(hdx * DIR_DY[tongueDir] - hdy * DIR_DX[tongueDir]);
    if (along > 0 && along < TONGUE_RANGE && perp < 0.6) {
      eatNibbley(i);
    }
  }
}

function eatNibbley(index) {
  var nib = nibbleys[index];
  targetLength += nib.value;
  score += nib.value * 100;
  playEat(nib.value);
  TAS.particles.spawn(
    isoX(nib.gx, nib.gy),
    isoY(nib.gx, nib.gy, nib.height) - 5,
    nib.color, 8, 2.5, { gravity: 0.3, size: 2 }
  );
  nibbleys.splice(index, 1);

  // Respawn nibbleys if running low
  if (nibbleys.length < 3) {
    spawnNibbleys(5, GRID_SIZE, level);
  }
}

function updateNibbleys(dt) {
  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    nib.bounceT += dt * 4;

    // Move
    if (nib.speed > 0) {
      nib.gx += nib.dx * dt;
      nib.gy += nib.dy * dt;

      // Bounce off edges
      if (nib.gx < 0.5 || nib.gx > GRID_SIZE - 1.5) {
        nib.dx = -nib.dx;
        nib.gx = TAS.math.clamp(nib.gx, 0.5, GRID_SIZE - 1.5);
        playBounce();
      }
      if (nib.gy < 0.5 || nib.gy > GRID_SIZE - 1.5) {
        nib.dy = -nib.dy;
        nib.gy = TAS.math.clamp(nib.gy, 0.5, GRID_SIZE - 1.5);
        playBounce();
      }

      // Check tile validity
      var ngx = Math.round(nib.gx);
      var ngy = Math.round(nib.gy);
      if (ngx >= 0 && ngx < GRID_SIZE && ngy >= 0 && ngy < GRID_SIZE) {
        var t = tiles[ngy][ngx];
        if (t.type === TILE_WATER || t.type === TILE_EMPTY) {
          nib.dx = -nib.dx;
          nib.dy = -nib.dy;
          nib.gx += nib.dx * dt * 2;
          nib.gy += nib.dy * dt * 2;
        }
        nib.height = t.height;
      }

      // Random direction changes
      if (Math.random() < dt * 0.5) {
        nib.dx += (Math.random() - 0.5) * nib.speed * 0.5;
        nib.dy += (Math.random() - 0.5) * nib.speed * 0.5;
        var spd = Math.sqrt(nib.dx * nib.dx + nib.dy * nib.dy);
        if (spd > nib.speed) {
          nib.dx = (nib.dx / spd) * nib.speed;
          nib.dy = (nib.dy / spd) * nib.speed;
        }
      }
    }

    // Gold timer
    if (nib.timer < 999) {
      nib.timer -= dt;
      if (nib.timer <= 0) {
        TAS.particles.spawn(
          isoX(nib.gx, nib.gy),
          isoY(nib.gx, nib.gy, nib.height),
          '#ffdd00', 6, 1.5
        );
        nibbleys.splice(i, 1);
      }
    }
  }
}

function updateEnemies(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    en.timer += dt;
    en.moveTimer += dt;

    // Move every 2 seconds
    if (en.moveTimer > 2.0) {
      en.moveTimer = 0;
      en.dir = TAS.math.randInt(0, 3);
      var nx = en.gx + DIR_DX[en.dir];
      var ny = en.gy + DIR_DY[en.dir];
      if (nx >= 1 && nx < GRID_SIZE - 1 && ny >= 1 && ny < GRID_SIZE - 1) {
        var tile = tiles[Math.round(ny)][Math.round(nx)];
        if (tile.type === TILE_NORMAL || tile.type === TILE_ICE) {
          en.gx = nx;
          en.gy = ny;
          en.height = tile.height;
        }
      }
    }

    // Stomp check vs snake
    if (snake.length > 0) {
      var head = snake[0];
      if (Math.abs(head.gx - en.gx) < 0.6 && Math.abs(head.gy - en.gy) < 0.6) {
        // Already handled in moveSnake
      }
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level ' + level + ' | Length: ' + snake.length });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-camX, -camY);

  // Draw tiles (back to front for proper overlap)
  drawTiles();

  // Draw nibbleys
  drawNibbleys();

  // Draw enemies
  drawEnemies();

  // Draw exit gate
  drawExitGate();

  // Draw snake
  drawSnake();

  // Draw tongue
  if (tongueTimer > 0) {
    drawTongue();
  }

  // Particles
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Level clear overlay
  if (state === 'levelClear') {
    drawLevelClear();
  }
}

function drawTiles() {
  for (var r = 0; r < GRID_SIZE; r++) {
    for (var c = 0; c < GRID_SIZE; c++) {
      var tile = tiles[r][c];
      if (tile.type === TILE_EMPTY) continue;

      var sx = isoX(c, r);
      var sy = isoY(c, r, tile.height);

      // Tile top face
      var tileColor;
      switch (tile.type) {
        case TILE_ICE: tileColor = COLORS.ice; break;
        case TILE_WATER: tileColor = '#2255aa'; break;
        case TILE_SPIKE: tileColor = '#663333'; break;
        default:
          var shade = ((c + r) % 2 === 0) ? 0 : 1;
          tileColor = COLORS.tile[shade];
      }

      // Draw diamond (top face)
      ctx.fillStyle = tileColor;
      ctx.beginPath();
      ctx.moveTo(sx, sy - TH / 2);
      ctx.lineTo(sx + TW / 2, sy);
      ctx.lineTo(sx, sy + TH / 2);
      ctx.lineTo(sx - TW / 2, sy);
      ctx.closePath();
      ctx.fill();

      // Draw sides (depth)
      if (tile.height > 0 || true) {
        // Right face
        ctx.fillStyle = shadeColor(tileColor, -30);
        ctx.beginPath();
        ctx.moveTo(sx + TW / 2, sy);
        ctx.lineTo(sx, sy + TH / 2);
        ctx.lineTo(sx, sy + TH / 2 + TD);
        ctx.lineTo(sx + TW / 2, sy + TD);
        ctx.closePath();
        ctx.fill();

        // Left face
        ctx.fillStyle = shadeColor(tileColor, -50);
        ctx.beginPath();
        ctx.moveTo(sx - TW / 2, sy);
        ctx.lineTo(sx, sy + TH / 2);
        ctx.lineTo(sx, sy + TH / 2 + TD);
        ctx.lineTo(sx - TW / 2, sy + TD);
        ctx.closePath();
        ctx.fill();
      }

      // Draw extra details
      if (tile.type === TILE_SPIKE) {
        drawSpikes(sx, sy);
      }
      if (tile.type === TILE_WATER) {
        drawWater(sx, sy);
      }
      if (tile.type === TILE_ICE) {
        drawIceShine(sx, sy);
      }
    }
  }
}

function drawSpikes(sx, sy) {
  ctx.fillStyle = '#cc4444';
  for (var i = 0; i < 3; i++) {
    var ox = (i - 1) * 6;
    ctx.beginPath();
    ctx.moveTo(sx + ox - 2, sy);
    ctx.lineTo(sx + ox + 2, sy);
    ctx.lineTo(sx + ox, sy - 7);
    ctx.closePath();
    ctx.fill();
  }
}

function drawWater(sx, sy) {
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08) * 0.1;
  ctx.fillStyle = '#66aaff';
  ctx.beginPath();
  ctx.moveTo(sx, sy - TH / 2 + 2);
  ctx.lineTo(sx + TW / 2 - 3, sy);
  ctx.lineTo(sx, sy + TH / 2 - 2);
  ctx.lineTo(sx - TW / 2 + 3, sy);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawIceShine(sx, sy) {
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(sx - 3, sy - 2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + 4, sy + 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawNibbleys() {
  for (var i = 0; i < nibbleys.length; i++) {
    var nib = nibbleys[i];
    var sx = isoX(nib.gx, nib.gy);
    var sy = isoY(nib.gx, nib.gy, nib.height);
    var bounce = Math.abs(Math.sin(nib.bounceT)) * 8;

    // Shadow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Ball
    var radius = 3 + nib.value * 0.5;
    var by = sy - bounce - radius;

    // Gold nibbleys blink when about to vanish
    if (nib.timer < 999 && nib.timer < 3) {
      if (Math.floor(frame / 4) % 2 === 0) continue;
    }

    ctx.fillStyle = nib.color;
    ctx.beginPath();
    ctx.arc(sx, by, radius, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(sx - radius * 0.3, by - radius * 0.3, radius * 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    var sx = isoX(en.gx, en.gy);
    var sy = isoY(en.gx, en.gy, en.height);

    // Stomping foot animation
    var stomp = Math.abs(Math.sin(en.timer * 3)) * 12;

    // Shadow
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Foot/boot shape
    var footY = sy - stomp - 6;
    ctx.fillStyle = '#664422';
    ctx.beginPath();
    ctx.ellipse(sx, footY, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Boot detail
    ctx.fillStyle = '#442211';
    ctx.fillRect(sx - 3, footY - 10, 6, 10);

    // Sole
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(sx, footY + 3, 7, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Stomp impact
    if (stomp < 1) {
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, 10 + Math.random() * 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

function drawExitGate() {
  if (!exitGate) return;

  var sx = isoX(exitGate.gx, exitGate.gy);
  var sy = isoY(exitGate.gx, exitGate.gy, exitGate.height);

  // Gate base
  ctx.fillStyle = exitGate.open ? COLORS.exit : COLORS.exitClosed;

  // Scale/gate structure
  ctx.fillRect(sx - 8, sy - 20, 3, 20);
  ctx.fillRect(sx + 5, sy - 20, 3, 20);

  // Top bar
  ctx.fillRect(sx - 9, sy - 22, 18, 3);

  // Gate door (open/closed)
  if (exitGate.open) {
    // Open - glowing
    var pulse = Math.sin(frame * 0.1) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffee44';
    ctx.fillRect(sx - 5, sy - 19, 10, 17);
    ctx.globalAlpha = 1;

    // Glow particles
    if (frame % 10 === 0) {
      TAS.particles.spawn(sx, sy - 10, '#ffdd44', 1, 1, { gravity: -0.3, size: 1 });
    }

    // Arrow indicator
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(sx, sy - 28);
    ctx.lineTo(sx - 5, sy - 24);
    ctx.lineTo(sx + 5, sy - 24);
    ctx.closePath();
    ctx.fill();
  } else {
    // Closed - dark
    ctx.fillStyle = '#333';
    ctx.fillRect(sx - 5, sy - 19, 10, 17);

    // Lock
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(sx, sy - 11, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Required length indicator
  if (!exitGate.open) {
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(snake.length + '/' + requiredLength, sx, sy + 10);
  }
}

function drawSnake() {
  if (snake.length === 0) return;

  // Draw from tail to head for proper overlap
  for (var i = snake.length - 1; i >= 0; i--) {
    var seg = snake[i];
    var sx = seg.px;
    var sy = seg.py;
    var radius = i === 0 ? 6 : 5 - (i * 0.15);
    if (radius < 3) radius = 3;

    // Shadow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 2, radius, radius * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Body segment (sphere-like)
    var color = i === 0 ? COLORS.snakeHead : COLORS.snake;
    var gradient = ctx.createRadialGradient(sx - radius * 0.3, sy - radius * 0.5 - radius * 0.3, 0, sx, sy - radius * 0.5, radius);
    gradient.addColorStop(0, lightenColor(color, 40));
    gradient.addColorStop(1, shadeColor(color, -30));
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(sx, sy - radius * 0.5, radius, 0, Math.PI * 2);
    ctx.fill();

    // Head details
    if (i === 0) {
      // Eyes
      var eyeOff = DIR_DX[snakeDir] * 2;
      var eyeOffY = DIR_DY[snakeDir] * 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx + eyeOff - 2, sy - radius * 0.5 + eyeOffY - 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sx + eyeOff + 2, sy - radius * 0.5 + eyeOffY - 2, 2, 0, Math.PI * 2);
      ctx.fill();

      // Pupils
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(sx + eyeOff - 2 + DIR_DX[snakeDir] * 0.8, sy - radius * 0.5 + eyeOffY - 2 + DIR_DY[snakeDir] * 0.5, 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sx + eyeOff + 2 + DIR_DX[snakeDir] * 0.8, sy - radius * 0.5 + eyeOffY - 2 + DIR_DY[snakeDir] * 0.5, 1, 0, Math.PI * 2);
      ctx.fill();

      // Rattle pattern on head
      ctx.strokeStyle = '#228822';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(sx, sy - radius * 0.5, radius - 1, Math.PI * 0.6, Math.PI * 0.8);
      ctx.stroke();
    }

    // Body pattern (diamond shapes)
    if (i > 0 && i % 2 === 0) {
      ctx.fillStyle = 'rgba(0,80,0,0.3)';
      ctx.beginPath();
      ctx.moveTo(sx, sy - radius - 1);
      ctx.lineTo(sx + 2, sy - radius * 0.5);
      ctx.lineTo(sx, sy);
      ctx.lineTo(sx - 2, sy - radius * 0.5);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Rattle tail
  if (snake.length > 2) {
    var tail = snake[snake.length - 1];
    var rattleT = frame * 0.3;
    ctx.fillStyle = '#ccaa44';
    for (var r = 0; r < 3; r++) {
      var rx = tail.px + Math.sin(rattleT + r * 0.8) * 2;
      var ry = tail.py - 2 + r * 2;
      ctx.beginPath();
      ctx.ellipse(rx, ry, 2.5 - r * 0.3, 1.5, Math.sin(rattleT) * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawTongue() {
  if (snake.length === 0) return;
  var head = snake[0];
  var sx = head.px;
  var sy = head.py - 3;
  var tongueLen = TONGUE_RANGE * TW * 0.5 * (tongueTimer / 0.3);
  var tdx = DIR_DX[tongueDir];
  var tdy = DIR_DY[tongueDir];

  // Tongue in iso space
  var endX = sx + (tdx - tdy) * tongueLen;
  var endY = sy + (tdx + tdy) * tongueLen * 0.5;

  ctx.strokeStyle = '#ff4466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(endX, endY);
  ctx.stroke();

  // Forked tip
  ctx.beginPath();
  ctx.moveTo(endX, endY);
  ctx.lineTo(endX - 3, endY - 2);
  ctx.moveTo(endX, endY);
  ctx.lineTo(endX + 2, endY - 3);
  ctx.stroke();
}

function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 32);

  ctx.font = 'bold 11px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 13);

  // Level
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('LV ' + level, GW / 2, 13);

  // Timer
  var timerColor = timeLeft < 10 ? '#ff4444' : '#44dd88';
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'right';
  ctx.fillText(Math.ceil(timeLeft) + 's', GW - 6, 13);

  // Snake length bar
  var barX = 6;
  var barY = 19;
  var barW = GW - 12;
  var barH = 8;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);

  var fillRatio = Math.min(snake.length / requiredLength, 1);
  var barColor = fillRatio >= 1 ? '#ffcc00' : '#44cc44';
  ctx.fillStyle = barColor;
  ctx.fillRect(barX, barY, barW * fillRatio, barH);

  // Length text
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(snake.length + '/' + requiredLength, GW / 2, barY + 7);

  // Lives
  ctx.textAlign = 'left';
  for (var i = 0; i < lives; i++) {
    ctx.fillStyle = '#44dd88';
    ctx.beginPath();
    ctx.arc(12 + i * 14, barY + 14, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTitleScreen() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative iso tiles
  for (var r = 0; r < 6; r++) {
    for (var c = 0; c < 6; c++) {
      var sx = isoX(c + 3, r + 3) - 10;
      var sy = isoY(c + 3, r + 3, 0) + 50;
      ctx.fillStyle = (c + r) % 2 === 0 ? '#1a3a1a' : '#152a15';
      ctx.beginPath();
      ctx.moveTo(sx, sy - TH / 2);
      ctx.lineTo(sx + TW / 2, sy);
      ctx.lineTo(sx, sy + TH / 2);
      ctx.lineTo(sx - TW / 2, sy);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SNAKE RATTLE', GW / 2 + 2, 72);
  ctx.fillStyle = '#44ff66';
  ctx.fillText('SNAKE RATTLE', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 92);

  // Animated snake
  var titleSnakeLen = 8;
  for (var ts = 0; ts < titleSnakeLen; ts++) {
    var angle = frame * 0.03 + ts * 0.6;
    var tsx = GW / 2 + Math.cos(angle) * (40 + ts * 5);
    var tsy = 160 + Math.sin(angle * 1.5) * 15 + ts * 2;
    var trad = ts === 0 ? 7 : 5.5 - ts * 0.2;
    ctx.fillStyle = ts === 0 ? '#66ff88' : '#44cc44';
    ctx.beginPath();
    ctx.arc(tsx, tsy, trad, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bouncing nibbley
  var nibY = 250 + Math.abs(Math.sin(frame * 0.06)) * 20;
  ctx.fillStyle = '#44dd44';
  ctx.beginPath();
  ctx.arc(GW / 2, nibY, 5, 0, Math.PI * 2);
  ctx.fill();

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Eat nibbleys to grow - Reach the exit gate!', GW / 2, 300);
  ctx.fillText('ARROWS/DPAD: Move  |  SPACE/TONGUE: Lick', GW / 2, 316);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.fillText('Best: ' + highScore, GW / 2, 340);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('LEVEL CLEAR!', GW / 2, GH / 2 - 20);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Time Bonus: ' + (Math.floor(timeLeft) * 10), GW / 2, GH / 2 + 10);
  ctx.fillText('Length Bonus: ' + (snake.length * 50), GW / 2, GH / 2 + 30);
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < 30; i++) {
    var sx = (i * 137 + frame) % GW;
    var sy = (i * 89) % GH;
    ctx.fillStyle = '#ffdd44';
    ctx.globalAlpha = Math.sin(frame * 0.02 + i) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 80);

  ctx.fillStyle = '#44ff66';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('ALL 10 LEVELS COMPLETE', GW / 2, 120);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 170);

  if (score >= highScore) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff88ff';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 200);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('The snake rattles with triumph!', GW / 2, 250);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// === COLOR HELPERS ===
function shadeColor(color, amount) {
  var r = parseInt(color.slice(1, 3), 16) + amount;
  var g = parseInt(color.slice(3, 5), 16) + amount;
  var b = parseInt(color.slice(5, 7), 16) + amount;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function lightenColor(color, amount) {
  return shadeColor(color, amount);
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
