<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Guerrilla War</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'FIRE', b: 'GRENADE' } });

// Directions: 8 compass points
const DIR8 = [
  { x: 0, y: -1 },  // up
  { x: 1, y: -1 },  // up-right
  { x: 1, y: 0 },   // right
  { x: 1, y: 1 },   // down-right
  { x: 0, y: 1 },   // down
  { x: -1, y: 1 },  // down-left
  { x: -1, y: 0 },  // left
  { x: -1, y: -1 }  // up-left
];

// Stage definitions
const STAGES = [
  { name: 'Beach Landing', bg: '#1a3a2a', ground: '#c2a060', water: '#1a4a6a', trees: 4, bunkers: 2, hostages: 5 },
  { name: 'Jungle Path', bg: '#0f2f1a', ground: '#2a5a2a', water: null, trees: 12, bunkers: 1, hostages: 6 },
  { name: 'River Crossing', bg: '#1a3a2a', ground: '#3a6a3a', water: '#1a5a7a', trees: 6, bunkers: 3, hostages: 4 },
  { name: 'Mountain Pass', bg: '#2a2a3a', ground: '#5a5a4a', water: null, trees: 3, bunkers: 4, hostages: 5 },
  { name: 'Enemy Base', bg: '#1a1a2a', ground: '#3a3a3a', water: null, trees: 2, bunkers: 5, hostages: 7 },
  { name: 'Command Center', bg: '#0a0a1a', ground: '#2a2a2a', water: null, trees: 0, bunkers: 6, hostages: 8 }
];

// Weapon types
const WEAPONS = {
  machinegun: { name: 'Machine Gun', rate: 6, speed: 7, damage: 1, spread: 0.15, color: '#ffdd44', size: 2, pierce: false },
  flamethrower: { name: 'Flamethrower', rate: 2, speed: 4, damage: 0.5, spread: 0.4, color: '#ff6622', size: 4, pierce: true, range: 80 },
  rocket: { name: 'Rocket Launcher', rate: 30, speed: 5, damage: 5, spread: 0, color: '#ff2222', size: 4, pierce: false, aoe: 30 },
  laser: { name: 'Laser', rate: 12, speed: 12, damage: 2, spread: 0, color: '#44ffff', size: 1, pierce: true }
};

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('guerrilla_war_hi');
let lives = 3;
let stage = 0;
let frame = 0;
let stageScroll = 0;
let stageLength = 0;
let stageComplete = false;
let stageTransTimer = 0;
let bossActive = false;
let boss = null;

// Player
let player = null;
let playerBullets = [];
let grenades = [];
let grenadeCount = 0;
let weapon = 'machinegun';
let weaponTimer = 0;
let fireCooldown = 0;
let invincible = 0;
let aimDir = { x: 0, y: -1 };

// Vehicle
let vehicle = null;
let vehicles = [];

// Enemies & objects
let enemies = [];
let enemyBullets = [];
let hostages = [];
let crates = [];
let obstacles = [];
let waterZones = [];
let explosions = [];
let spawnQueue = [];

// Terrain
let terrainTiles = [];

// === HELPER FUNCTIONS ===
function normalize(x, y) {
  const len = Math.sqrt(x * x + y * y);
  if (len === 0) return { x: 0, y: 0 };
  return { x: x / len, y: y / len };
}

function distBetween(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function inWater(x, y) {
  for (const wz of waterZones) {
    if (x > wz.x && x < wz.x + wz.w && y > wz.y && y < wz.y + wz.h) return true;
  }
  return false;
}

// === SOUND EFFECTS ===
const SFX = {
  shoot() { TAS.audio.playTone(880, 0.03, 'square', 0.05, 440); },
  rocket() { TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08, 60); },
  flame() { TAS.audio.playNoise(0.06, 0.04, 800); },
  laser() { TAS.audio.playTone(1200, 0.08, 'sine', 0.06, 2400); },
  explode() { TAS.audio.playNoise(0.25, 0.12); TAS.audio.playTone(80, 0.2, 'sawtooth', 0.08, 30); },
  playerHit() { TAS.audio.playTone(200, 0.15, 'sawtooth', 0.1, 80); },
  playerDie() { TAS.audio.playTone(400, 0.4, 'sawtooth', 0.12, 40); TAS.audio.playNoise(0.3, 0.15); },
  rescue() { TAS.audio.playTone(523, 0.08, 'square', 0.07); setTimeout(function(){TAS.audio.playTone(784, 0.1, 'square', 0.08);}, 80); },
  hostageKill() { TAS.audio.playTone(200, 0.3, 'triangle', 0.08, 100); },
  pickup() { TAS.audio.playTone(660, 0.06, 'square', 0.06); setTimeout(function(){TAS.audio.playTone(880, 0.08, 'square', 0.07);}, 70); },
  grenade() { TAS.audio.playTone(300, 0.08, 'triangle', 0.06, 150); },
  vehicleEnter() { TAS.audio.playTone(220, 0.1, 'square', 0.06, 440); },
  bossWarn() { TAS.audio.playTone(80, 0.4, 'square', 0.1, 40); TAS.audio.playNoise(0.2, 0.08); },
  stageClear() { TAS.audio.playMelody([[523,0.12],[659,0.12],[784,0.12],[1047,0.2]], 130); }
};

// === INITIALIZATION ===
function createPlayer() {
  return {
    x: GW / 2,
    y: GH - 60,
    w: 12,
    h: 14,
    hp: 5,
    maxHp: 5,
    speed: 2.2,
    facing: 0 // angle in radians
  };
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  stage = 0;
  frame = 0;
  TAS.particles.clear();
  initStage();
}

function initStage() {
  player = createPlayer();
  playerBullets = [];
  enemyBullets = [];
  grenades = [];
  grenadeCount = 5;
  weapon = 'machinegun';
  weaponTimer = 0;
  fireCooldown = 0;
  invincible = 90;
  aimDir = { x: 0, y: -1 };
  enemies = [];
  hostages = [];
  crates = [];
  obstacles = [];
  waterZones = [];
  vehicles = [];
  vehicle = null;
  explosions = [];
  spawnQueue = [];
  stageScroll = 0;
  stageLength = 2400 + stage * 400;
  stageComplete = false;
  stageTransTimer = 0;
  bossActive = false;
  boss = null;
  terrainTiles = [];

  generateStage();
}

function generateStage() {
  const sd = STAGES[stage];

  // Generate water zones
  if (sd.water) {
    const numWater = stage === 2 ? 3 : (sd.water ? 1 : 0);
    for (let i = 0; i < numWater; i++) {
      waterZones.push({
        x: TAS.math.randRange(40, GW - 140),
        y: TAS.math.randRange(200, stageLength - 400),
        w: TAS.math.randRange(80, 160),
        h: TAS.math.randRange(60, 120)
      });
    }
  }

  // Generate obstacles (trees, rocks, walls)
  for (let i = 0; i < sd.trees + sd.bunkers * 2 + 10; i++) {
    const ty = TAS.math.randRange(100, stageLength - 200);
    obstacles.push({
      x: TAS.math.randRange(20, GW - 40),
      y: ty,
      w: TAS.math.randRange(16, 32),
      h: TAS.math.randRange(16, 32),
      type: i < sd.trees ? 'tree' : (i < sd.trees + sd.bunkers * 2 ? 'wall' : 'rock'),
      hp: i < sd.trees ? 2 : 5,
      destructible: i >= sd.trees
    });
  }

  // Generate hostages spread throughout stage
  for (let i = 0; i < sd.hostages; i++) {
    hostages.push({
      x: TAS.math.randRange(40, GW - 40),
      y: TAS.math.randRange(200, stageLength - 300),
      freed: false,
      dead: false,
      runTimer: 0
    });
  }

  // Generate weapon crates
  const crateCount = 3 + Math.floor(stage * 0.5);
  const weaponKeys = ['flamethrower', 'rocket', 'laser'];
  for (let i = 0; i < crateCount; i++) {
    crates.push({
      x: TAS.math.randRange(30, GW - 50),
      y: TAS.math.randRange(300, stageLength - 400),
      type: weaponKeys[i % weaponKeys.length],
      collected: false
    });
  }

  // Generate vehicles
  if (stage >= 1) {
    const vCount = stage >= 3 ? 2 : 1;
    for (let i = 0; i < vCount; i++) {
      vehicles.push({
        x: TAS.math.randRange(60, GW - 80),
        y: TAS.math.randRange(400, stageLength - 600),
        type: i === 0 ? 'tank' : 'jeep',
        hp: i === 0 ? 12 : 6,
        maxHp: i === 0 ? 12 : 6,
        occupied: false,
        destroyed: false
      });
    }
  }

  // Build spawn queue for enemies
  const enemyDensity = 8 + stage * 4;
  const interval = Math.floor(stageLength / enemyDensity);
  for (let i = 0; i < enemyDensity; i++) {
    const scrollTrigger = interval * (i + 1);
    const etype = pickEnemyType(i, enemyDensity);
    spawnQueue.push({
      scrollY: scrollTrigger,
      type: etype,
      x: TAS.math.randRange(20, GW - 40),
      spawned: false
    });
  }

  // Add bunker enemies
  for (let i = 0; i < sd.bunkers; i++) {
    spawnQueue.push({
      scrollY: TAS.math.randRange(300, stageLength - 400),
      type: 'bunker',
      x: TAS.math.randRange(30, GW - 50),
      spawned: false
    });
  }

  // Sort spawn queue
  spawnQueue.sort(function(a, b) { return a.scrollY - b.scrollY; });
}

function pickEnemyType(idx, total) {
  const r = Math.random();
  const diff = stage * 0.05;
  if (r < 0.45 - diff) return 'soldier';
  if (r < 0.65) return 'grenadier';
  if (r < 0.80 + diff) return 'sniper';
  if (r < 0.90 + diff && stage >= 2) return 'tank';
  if (r < 0.95 + diff && stage >= 3) return 'helicopter';
  return 'soldier';
}

function spawnEnemy(type, x, scrollY) {
  const baseHP = { soldier: 1, grenadier: 2, sniper: 1, tank: 8, helicopter: 6, bunker: 10 };
  const baseSpeed = { soldier: 1.2, grenadier: 0.9, sniper: 0.6, tank: 0.5, helicopter: 1.5, bunker: 0 };

  const ey = scrollY - stageScroll;
  enemies.push({
    x: x,
    y: Math.min(ey, -16),
    w: type === 'tank' ? 24 : (type === 'helicopter' ? 20 : (type === 'bunker' ? 28 : 12)),
    h: type === 'tank' ? 28 : (type === 'helicopter' ? 20 : (type === 'bunker' ? 24 : 14)),
    type: type,
    hp: baseHP[type] || 1,
    maxHp: baseHP[type] || 1,
    speed: baseSpeed[type] || 1,
    fireTimer: TAS.math.randInt(30, 90),
    fireRate: type === 'sniper' ? 90 : (type === 'bunker' ? 40 : 60),
    moveTimer: 0,
    moveDir: { x: 0, y: 1 },
    active: true
  });
}

function spawnBoss() {
  bossActive = true;
  SFX.bossWarn();
  TAS.fx.shake(8, 0.92);

  const bossType = stage < 2 ? 'mech' : (stage < 4 ? 'fortress' : 'warship');
  const bossHP = 30 + stage * 15;

  boss = {
    x: GW / 2,
    y: -80,
    w: 64,
    h: 72,
    hp: bossHP,
    maxHp: bossHP,
    type: bossType,
    phase: 0,
    timer: 0,
    fireTimer: 0,
    moveDir: 1,
    speed: 0.8,
    weakPoints: [],
    entering: true
  };

  // Create weak points
  const wpCount = 2 + Math.floor(stage / 2);
  for (let i = 0; i < wpCount; i++) {
    boss.weakPoints.push({
      ox: (i - (wpCount - 1) / 2) * 20,
      oy: TAS.math.randRange(-10, 20),
      hp: Math.floor(bossHP / wpCount),
      maxHp: Math.floor(bossHP / wpCount),
      size: 8,
      active: true
    });
  }
}

// === UPDATE LOGIC ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'stageClear') {
    stageTransTimer--;
    if (stageTransTimer <= 0) {
      stage++;
      if (stage >= 6) {
        // Victory!
        state = 'victory';
        frame = 0;
        if (score > highScore) { highScore = score; TAS.score.save('guerrilla_war_hi', highScore); }
      } else {
        initStage();
        state = 'playing';
      }
    }
    return;
  }

  if (state === 'victory') {
    if (frame > 90 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
  }
}

function updatePlaying(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // Scroll stage
  if (!bossActive && !stageComplete) {
    const scrollSpeed = 0.8 + stage * 0.1;
    stageScroll += scrollSpeed;

    // Check stage end
    if (stageScroll >= stageLength) {
      if (stage === 1 || stage === 3 || stage === 5) {
        // Boss stage
        spawnBoss();
      } else {
        stageComplete = true;
        stageTransTimer = 120;
        state = 'stageClear';
        SFX.stageClear();
        score += 1000;
        if (score > highScore) { highScore = score; TAS.score.save('guerrilla_war_hi', highScore); }
      }
    }
  }

  // Spawn enemies from queue
  for (let i = 0; i < spawnQueue.length; i++) {
    const sq = spawnQueue[i];
    if (!sq.spawned && stageScroll >= sq.scrollY) {
      sq.spawned = true;
      spawnEnemy(sq.type, sq.x, sq.scrollY);
    }
  }

  // Player movement
  if (player) {
    let mx = 0, my = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) mx -= 1;
    if (keys['ArrowRight'] || keys['KeyD'] || touch.right) mx += 1;
    if (keys['ArrowUp'] || keys['KeyW'] || touch.up) my -= 1;
    if (keys['ArrowDown'] || keys['KeyS'] || touch.down) my += 1;

    let speed = vehicle ? (vehicle.type === 'tank' ? 1.5 : 3.0) : player.speed;
    if (!vehicle && inWater(player.x, player.y)) speed *= 0.6;

    if (mx || my) {
      const norm = normalize(mx, my);
      player.x += norm.x * speed;
      player.y += norm.y * speed;
      // Update facing based on movement if not firing
      if (!keys['Space'] && !keys['KeyZ'] && !touch.a) {
        aimDir = norm;
      }
    }

    // Clamp position
    player.x = TAS.math.clamp(player.x, 10, GW - 10);
    player.y = TAS.math.clamp(player.y, 40, GH - 20);

    // Auto-aim at nearest enemy
    if (!mx && !my) {
      const nearest = findNearestEnemy();
      if (nearest) {
        const dx = nearest.x - player.x;
        const dy = nearest.y - player.y;
        aimDir = normalize(dx, dy);
      }
    }

    // Firing
    if (fireCooldown > 0) fireCooldown--;
    const firing = keys['Space'] || keys['KeyZ'] || touch.a;
    if (firing && fireCooldown <= 0) {
      fireWeapon();
    }

    // Grenades
    if ((keys['KeyX'] || keys['KeyC'] || touch.b) && grenadeCount > 0 && grenades.length < 3) {
      throwGrenade();
      grenadeCount--;
    }

    // Vehicle interaction
    if (keys['KeyE'] || keys['Enter']) {
      if (vehicle) {
        exitVehicle();
      } else {
        enterNearbyVehicle();
      }
      keys['KeyE'] = false;
      keys['Enter'] = false;
    }

    // Weapon timer
    if (weaponTimer > 0) {
      weaponTimer--;
      if (weaponTimer <= 0) weapon = 'machinegun';
    }

    // Invincibility
    if (invincible > 0) invincible--;
  }

  // Update player bullets
  updatePlayerBullets();

  // Update grenades
  updateGrenades();

  // Update enemies
  updateEnemies();

  // Update enemy bullets
  updateEnemyBullets();

  // Update boss
  if (bossActive && boss) {
    updateBoss();
  }

  // Update hostages
  updateHostages();

  // Update explosions
  updateExplosions();

  // Update vehicles (scroll them)
  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    if (!v.occupied && !v.destroyed) {
      v.y += 0.8 + stage * 0.1; // scroll with stage
    }
    if (v.y > GH + 50) vehicles.splice(i, 1);
  }

  // Scroll obstacles, hostages, crates, water
  const scrollAmt = 0.8 + stage * 0.1;
  if (!bossActive) {
    for (const ob of obstacles) ob.y += scrollAmt;
    for (const h of hostages) { if (!h.freed) h.y += scrollAmt; }
    for (const c of crates) c.y += scrollAmt;
    for (const wz of waterZones) wz.y += scrollAmt;
  }

  // Collect crates
  if (player) {
    for (const c of crates) {
      if (!c.collected && Math.abs(player.x - c.x) < 16 && Math.abs(player.y - c.y) < 16) {
        c.collected = true;
        weapon = c.type;
        weaponTimer = 1800; // 30 seconds at 60fps
        SFX.pickup();
        score += 100;
      }
    }
  }

  // Remove off-screen objects
  obstacles = obstacles.filter(function(o) { return o.y < GH + 50 && o.y > -50; });
  hostages = hostages.filter(function(h) { return h.y < GH + 50 && (h.freed ? h.runTimer < 120 : true); });
  crates = crates.filter(function(c) { return c.y < GH + 50 && !c.collected; });
}

function findNearestEnemy() {
  let best = null, bestDist = 999;
  for (const e of enemies) {
    if (!e.active) continue;
    const d = distBetween(player, e);
    if (d < bestDist) { bestDist = d; best = e; }
  }
  if (bossActive && boss) {
    const d = distBetween(player, boss);
    if (d < bestDist) { best = boss; }
  }
  return best;
}

function fireWeapon() {
  const wp = WEAPONS[weapon];
  fireCooldown = vehicle ? Math.floor(wp.rate * 0.7) : wp.rate;

  const bx = player.x;
  const by = player.y - (vehicle ? 14 : 6);

  if (weapon === 'machinegun') {
    const spread = (Math.random() - 0.5) * wp.spread;
    const dir = normalize(aimDir.x + spread, aimDir.y + spread * 0.5);
    playerBullets.push({ x: bx, y: by, vx: dir.x * wp.speed, vy: dir.y * wp.speed, damage: wp.damage + (vehicle ? 1 : 0), color: wp.color, size: wp.size, pierce: wp.pierce, life: 80 });
    SFX.shoot();
  } else if (weapon === 'flamethrower') {
    for (let i = 0; i < 3; i++) {
      const spread = (Math.random() - 0.5) * wp.spread;
      const dir = normalize(aimDir.x + spread, aimDir.y + spread);
      playerBullets.push({ x: bx + (Math.random()-0.5)*4, y: by, vx: dir.x * wp.speed * (0.8+Math.random()*0.4), vy: dir.y * wp.speed * (0.8+Math.random()*0.4), damage: wp.damage, color: Math.random() > 0.5 ? '#ff6622' : '#ffaa00', size: wp.size + Math.random()*3, pierce: true, life: 20 });
    }
    SFX.flame();
  } else if (weapon === 'rocket') {
    const dir = normalize(aimDir.x, aimDir.y);
    playerBullets.push({ x: bx, y: by, vx: dir.x * wp.speed, vy: dir.y * wp.speed, damage: wp.damage, color: wp.color, size: wp.size, pierce: false, life: 100, aoe: wp.aoe, isRocket: true });
    SFX.rocket();
  } else if (weapon === 'laser') {
    const dir = normalize(aimDir.x, aimDir.y);
    playerBullets.push({ x: bx, y: by, vx: dir.x * wp.speed, vy: dir.y * wp.speed, damage: wp.damage, color: wp.color, size: wp.size, pierce: true, life: 60, isLaser: true });
    SFX.laser();
  }

  // Vehicle extra gun
  if (vehicle && vehicle.type === 'tank') {
    fireCooldown = 20;
    const dir = normalize(aimDir.x, aimDir.y);
    playerBullets.push({ x: bx, y: by - 8, vx: dir.x * 6, vy: dir.y * 6, damage: 3, color: '#ffaa22', size: 5, pierce: false, life: 80, aoe: 20, isRocket: true });
  }
}

function throwGrenade() {
  const gx = player.x;
  const gy = player.y;
  const tx = player.x + aimDir.x * 80;
  const ty = player.y + aimDir.y * 80;
  grenades.push({
    x: gx, y: gy,
    tx: tx, ty: ty,
    timer: 45,
    vx: (tx - gx) / 45,
    vy: (ty - gy) / 45
  });
  SFX.grenade();
}

function updatePlayerBullets() {
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    if (b.life <= 0 || b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      if (b.isRocket && b.aoe) {
        createExplosion(b.x, b.y, b.aoe);
      }
      playerBullets.splice(i, 1);
      continue;
    }

    // Check hits on enemies
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (!e.active) continue;
      if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size*2, b.size*2, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        e.hp -= b.damage;
        TAS.particles.spawn(b.x, b.y, '#ff8844', 3, 2);
        if (e.hp <= 0) {
          killEnemy(j);
        }
        if (!b.pierce) { hit = true; break; }
      }
    }

    // Check hits on boss weak points
    if (bossActive && boss && !hit) {
      for (const wp of boss.weakPoints) {
        if (!wp.active) continue;
        const wpx = boss.x + wp.ox;
        const wpy = boss.y + wp.oy;
        if (TAS.hit.circleOverlap(b.x, b.y, b.size, wpx, wpy, wp.size)) {
          wp.hp -= b.damage;
          TAS.particles.spawn(b.x, b.y, '#ffff44', 4, 3);
          if (wp.hp <= 0) {
            wp.active = false;
            createExplosion(wpx, wpy, 20);
            score += 500;
            boss.hp -= wp.maxHp;
          }
          if (!b.pierce) { hit = true; break; }
        }
      }
      // Also check boss body
      if (!hit && TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size*2, b.size*2, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
        boss.hp -= b.damage * 0.3; // reduced body damage
        TAS.particles.spawn(b.x, b.y, '#888', 2, 1);
        if (!b.pierce) hit = true;
      }
    }

    // Check hits on hostages (bad!)
    if (!hit) {
      for (const h of hostages) {
        if (h.freed || h.dead) continue;
        if (TAS.hit.circleOverlap(b.x, b.y, b.size, h.x, h.y, 8)) {
          h.dead = true;
          score = Math.max(0, score - 200);
          SFX.hostageKill();
          TAS.particles.spawn(h.x, h.y, '#ff4444', 8, 2);
          if (!b.pierce) hit = true;
          break;
        }
      }
    }

    // Check obstacle hits
    if (!hit) {
      for (let j = obstacles.length - 1; j >= 0; j--) {
        const ob = obstacles[j];
        if (TAS.hit.rectOverlap(b.x - b.size, b.y - b.size, b.size*2, b.size*2, ob.x - ob.w/2, ob.y - ob.h/2, ob.w, ob.h)) {
          if (ob.destructible) {
            ob.hp -= b.damage;
            if (ob.hp <= 0) {
              TAS.particles.spawn(ob.x, ob.y, '#886644', 6, 2);
              obstacles.splice(j, 1);
            }
          }
          if (!b.pierce) { hit = true; break; }
        }
      }
    }

    if (hit && !b.pierce) {
      if (b.isRocket && b.aoe) {
        createExplosion(b.x, b.y, b.aoe);
      }
      playerBullets.splice(i, 1);
    }
  }
}

function updateGrenades() {
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.x += g.vx;
    g.y += g.vy;
    g.timer--;

    if (g.timer <= 0) {
      createExplosion(g.x, g.y, 35);
      grenades.splice(i, 1);
    }
  }
}

function createExplosion(x, y, radius) {
  SFX.explode();
  TAS.fx.shake(4, 0.88);
  TAS.fx.flash('#ff8844', 0.15);
  TAS.particles.spawn(x, y, '#ff6622', 12, 3, { size: 3, sizeVar: 4 });
  TAS.particles.spawn(x, y, '#ffcc22', 8, 2, { size: 2, sizeVar: 3 });
  explosions.push({ x: x, y: y, radius: radius, timer: 8 });

  // Damage enemies in radius
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.active) continue;
    if (distBetween({ x: x, y: y }, e) < radius) {
      e.hp -= 4;
      if (e.hp <= 0) killEnemy(i);
    }
  }

  // Damage boss
  if (bossActive && boss) {
    if (distBetween({ x: x, y: y }, boss) < radius + 30) {
      boss.hp -= 3;
      for (const wp of boss.weakPoints) {
        if (!wp.active) continue;
        const wpx = boss.x + wp.ox;
        const wpy = boss.y + wp.oy;
        if (TAS.math.dist(x, y, wpx, wpy) < radius) {
          wp.hp -= 4;
          if (wp.hp <= 0) { wp.active = false; score += 500; boss.hp -= wp.maxHp * 0.5; }
        }
      }
    }
  }

  // Free hostages in radius (shooting their ropes)
  for (const h of hostages) {
    if (h.freed || h.dead) continue;
    if (TAS.math.dist(x, y, h.x, h.y) < radius) {
      h.freed = true;
      h.runTimer = 0;
      score += 500;
      SFX.rescue();
    }
  }
}

function killEnemy(idx) {
  const e = enemies[idx];
  const points = { soldier: 100, grenadier: 150, sniper: 200, tank: 500, helicopter: 400, bunker: 300 };
  score += points[e.type] || 100;
  TAS.particles.spawn(e.x, e.y, '#ff6622', 8, 3);
  TAS.particles.spawn(e.x, e.y, '#ffcc22', 5, 2);
  if (e.type === 'tank' || e.type === 'helicopter') {
    createExplosion(e.x, e.y, 20);
  }
  enemies.splice(idx, 1);

  // Chance to drop grenade
  if (Math.random() < 0.15) {
    grenadeCount = Math.min(grenadeCount + 1, 9);
  }
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.active) continue;

    // Remove off-screen
    if (e.y > GH + 40) {
      enemies.splice(i, 1);
      continue;
    }

    // Movement
    e.moveTimer++;
    if (e.type === 'soldier') {
      if (e.moveTimer % 60 === 0) {
        e.moveDir = normalize(player.x - e.x + (Math.random()-0.5)*60, player.y - e.y + (Math.random()-0.5)*40);
      }
      e.x += e.moveDir.x * e.speed;
      e.y += e.moveDir.y * e.speed * 0.5 + 0.3;
    } else if (e.type === 'grenadier') {
      if (e.moveTimer % 90 === 0) {
        e.moveDir = normalize((Math.random()-0.5)*2, 1);
      }
      e.x += e.moveDir.x * e.speed;
      e.y += 0.4;
    } else if (e.type === 'sniper') {
      e.y += 0.2;
      // Snipers stay still mostly
    } else if (e.type === 'tank') {
      e.y += e.speed * 0.3;
      if (e.moveTimer % 120 === 0) {
        e.moveDir.x = Math.sign(player.x - e.x) * 0.5;
      }
      e.x += e.moveDir.x * e.speed;
    } else if (e.type === 'helicopter') {
      // Helicopters strafe
      e.y += 0.2;
      e.x += Math.sin(e.moveTimer * 0.03) * 1.5;
    } else if (e.type === 'bunker') {
      e.y += 0.8 + stage * 0.1; // only scrolls
    }

    // Clamp x
    e.x = TAS.math.clamp(e.x, e.w/2, GW - e.w/2);

    // Firing
    if (player && e.y > 0 && e.y < GH) {
      e.fireTimer--;
      if (e.fireTimer <= 0) {
        e.fireTimer = e.fireRate + TAS.math.randInt(-10, 10);
        enemyFire(e);
      }
    }

    // Collision with player
    if (player && invincible <= 0 && !vehicle) {
      if (TAS.hit.rectOverlap(player.x - player.w/2, player.y - player.h/2, player.w, player.h,
                              e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        hitPlayer(1);
      }
    }
  }
}

function enemyFire(e) {
  if (!player) return;
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dir = normalize(dx, dy);

  if (e.type === 'grenadier') {
    // Arcing grenade
    enemyBullets.push({
      x: e.x, y: e.y,
      vx: dir.x * 2,
      vy: dir.y * 2 - 1,
      damage: 2,
      type: 'grenade',
      timer: 50,
      gravity: 0.04
    });
  } else if (e.type === 'sniper') {
    // Precise aimed shot
    enemyBullets.push({
      x: e.x, y: e.y,
      vx: dir.x * 5,
      vy: dir.y * 5,
      damage: 2,
      type: 'sniper',
      timer: 80
    });
  } else if (e.type === 'tank') {
    // Cannon shot
    enemyBullets.push({
      x: e.x, y: e.y + e.h/2,
      vx: dir.x * 3.5,
      vy: dir.y * 3.5,
      damage: 3,
      type: 'cannon',
      timer: 90,
      size: 4
    });
  } else if (e.type === 'helicopter') {
    // Rapid fire
    for (let i = 0; i < 3; i++) {
      setTimeout(function() {
        if (!player) return;
        const d2 = normalize(player.x - e.x + (Math.random()-0.5)*30, player.y - e.y);
        enemyBullets.push({
          x: e.x, y: e.y + 10,
          vx: d2.x * 4,
          vy: d2.y * 4,
          damage: 1,
          type: 'bullet',
          timer: 60
        });
      }, i * 80);
    }
  } else if (e.type === 'bunker') {
    // Spread fire
    for (let s = -1; s <= 1; s++) {
      const spread = s * 0.3;
      enemyBullets.push({
        x: e.x, y: e.y + e.h/2,
        vx: (dir.x + spread) * 3,
        vy: dir.y * 3,
        damage: 1,
        type: 'bullet',
        timer: 70
      });
    }
  } else {
    // Regular soldier
    enemyBullets.push({
      x: e.x, y: e.y + 6,
      vx: dir.x * 3,
      vy: dir.y * 3,
      damage: 1,
      type: 'bullet',
      timer: 70
    });
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.gravity) b.vy += b.gravity;
    b.timer--;

    if (b.timer <= 0 || b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      if (b.type === 'grenade') {
        createExplosion(b.x, b.y, 25);
      }
      enemyBullets.splice(i, 1);
      continue;
    }

    // Hit player
    if (player && invincible <= 0) {
      const pw = vehicle ? 20 : player.w;
      const ph = vehicle ? 24 : player.h;
      if (TAS.hit.rectOverlap(b.x - 3, b.y - 3, 6, 6, player.x - pw/2, player.y - ph/2, pw, ph)) {
        if (vehicle) {
          vehicle.hp -= b.damage;
          if (vehicle.hp <= 0) {
            destroyVehicle();
          }
          TAS.particles.spawn(b.x, b.y, '#ff8844', 3, 2);
        } else {
          hitPlayer(b.damage);
        }
        enemyBullets.splice(i, 1);
      }
    }
  }
}

function hitPlayer(damage) {
  if (invincible > 0) return;
  player.hp -= damage;
  invincible = 45;
  SFX.playerHit();
  TAS.fx.shake(3, 0.85);
  TAS.particles.spawn(player.x, player.y, '#ff4444', 5, 2);

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  SFX.playerDie();
  TAS.fx.shake(8, 0.9);
  TAS.fx.flash('#ff2222', 0.3);
  TAS.particles.spawn(player.x, player.y, '#ff6622', 15, 4);
  TAS.particles.spawn(player.x, player.y, '#ffcc22', 10, 3);

  lives--;
  weapon = 'machinegun';
  weaponTimer = 0;

  if (vehicle) {
    vehicle.occupied = false;
    vehicle = null;
  }

  if (lives <= 0) {
    state = 'gameOver';
    frame = 0;
    if (score > highScore) { highScore = score; TAS.score.save('guerrilla_war_hi', highScore); }
    player = null;
  } else {
    // Respawn
    player = createPlayer();
    invincible = 120;
  }
}

function enterNearbyVehicle() {
  for (const v of vehicles) {
    if (v.destroyed || v.occupied) continue;
    if (distBetween(player, v) < 30) {
      vehicle = v;
      v.occupied = true;
      player.maxHp = 8;
      player.hp = 8;
      SFX.vehicleEnter();
      return;
    }
  }
}

function exitVehicle() {
  if (!vehicle) return;
  vehicle.occupied = false;
  vehicle = null;
  player.maxHp = 5;
  player.hp = Math.min(player.hp, 5);
}

function destroyVehicle() {
  createExplosion(player.x, player.y, 25);
  vehicle.destroyed = true;
  vehicle.occupied = false;
  vehicle = null;
  player.maxHp = 5;
  player.hp = 3;
  invincible = 90;
}

function updateBoss() {
  if (boss.entering) {
    boss.y += 0.5;
    if (boss.y >= 50) {
      boss.entering = false;
    }
    return;
  }

  boss.timer++;

  // Movement
  boss.x += boss.moveDir * boss.speed;
  if (boss.x > GW - 50) boss.moveDir = -1;
  if (boss.x < 50) boss.moveDir = 1;

  // Firing patterns
  boss.fireTimer++;
  const fireInterval = boss.hp < boss.maxHp * 0.5 ? 30 : 50;

  if (boss.fireTimer >= fireInterval) {
    boss.fireTimer = 0;
    bossFire();
  }

  // Phase changes
  if (boss.hp < boss.maxHp * 0.5 && boss.phase === 0) {
    boss.phase = 1;
    boss.speed = 1.2;
    TAS.fx.shake(6, 0.9);
  }
  if (boss.hp < boss.maxHp * 0.25 && boss.phase === 1) {
    boss.phase = 2;
    boss.speed = 1.6;
  }

  // Boss death
  if (boss.hp <= 0) {
    for (let i = 0; i < 5; i++) {
      setTimeout(function() {
        createExplosion(
          boss.x + (Math.random()-0.5) * 50,
          boss.y + (Math.random()-0.5) * 50,
          30
        );
      }, i * 200);
    }
    score += 2000 + stage * 1000;
    bossActive = false;
    boss = null;
    stageComplete = true;
    stageTransTimer = 150;
    setTimeout(function() {
      state = 'stageClear';
      SFX.stageClear();
      if (score > highScore) { highScore = score; TAS.score.save('guerrilla_war_hi', highScore); }
    }, 1000);
  }
}

function bossFire() {
  if (!player) return;

  const pattern = boss.timer % 3;
  if (pattern === 0) {
    // Spread shot
    for (let i = -2; i <= 2; i++) {
      const angle = Math.atan2(player.y - boss.y, player.x - boss.x) + i * 0.25;
      enemyBullets.push({
        x: boss.x, y: boss.y + boss.h/2,
        vx: Math.cos(angle) * 3,
        vy: Math.sin(angle) * 3,
        damage: 2,
        type: 'cannon',
        timer: 90,
        size: 3
      });
    }
  } else if (pattern === 1) {
    // Aimed missiles
    const dir = normalize(player.x - boss.x, player.y - boss.y);
    enemyBullets.push({
      x: boss.x - 20, y: boss.y + boss.h/2,
      vx: dir.x * 2.5, vy: dir.y * 2.5,
      damage: 3, type: 'cannon', timer: 100, size: 4
    });
    enemyBullets.push({
      x: boss.x + 20, y: boss.y + boss.h/2,
      vx: dir.x * 2.5, vy: dir.y * 2.5,
      damage: 3, type: 'cannon', timer: 100, size: 4
    });
  } else {
    // Ring burst
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i + boss.timer * 0.02;
      enemyBullets.push({
        x: boss.x, y: boss.y,
        vx: Math.cos(angle) * 2.5,
        vy: Math.sin(angle) * 2.5,
        damage: 1, type: 'bullet', timer: 80
      });
    }
  }
}

function updateHostages() {
  for (const h of hostages) {
    if (h.dead) continue;
    if (h.freed) {
      h.runTimer++;
      h.y += 2; // run off-screen downward
    } else {
      // Check if player shoots their ropes (bullets near but not direct hit)
      for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        const dist = TAS.math.dist(b.x, b.y, h.x, h.y);
        if (dist < 12 && dist > 5) {
          h.freed = true;
          h.runTimer = 0;
          score += 500;
          SFX.rescue();
          TAS.particles.spawn(h.x, h.y, '#44ff44', 6, 2);
          break;
        }
      }
    }
  }
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].timer--;
    if (explosions[i].timer <= 0) explosions.splice(i, 1);
  }
}

// === DRAW ===
function draw(dt) {
  const sd = STAGES[stage] || STAGES[0];

  // Background
  ctx.fillStyle = sd.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGES[stage].name });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  if (state === 'stageClear') {
    drawStageClear();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  // Draw ground texture
  drawGround(sd);

  // Draw water zones
  drawWater();

  // Draw obstacles
  drawObstacles();

  // Draw crates
  drawCrates();

  // Draw vehicles
  drawVehicles();

  // Draw hostages
  drawHostages();

  // Draw enemies
  drawEnemies();

  // Draw boss
  if (bossActive && boss) drawBoss();

  // Draw grenades
  drawGrenades();

  // Draw player bullets
  drawPlayerBullets();

  // Draw enemy bullets
  drawEnemyBullets();

  // Draw player
  if (player) drawPlayer();

  // Draw explosions
  drawExplosionEffects();

  // Particles
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  // Background military camo pattern
  for (let i = 0; i < 20; i++) {
    ctx.fillStyle = ['#1a3a1a', '#2a4a2a', '#0f2f0f'][i % 3];
    ctx.fillRect(
      Math.sin(i * 1.7 + frame * 0.01) * 100 + GW/2,
      Math.cos(i * 2.3 + frame * 0.008) * 80 + GH/2,
      40 + i * 3, 30 + i * 2
    );
  }

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('GUERRILLA WAR', GW/2 + 2, 72);
  ctx.fillStyle = '#44dd44';
  ctx.fillText('GUERRILLA WAR', GW/2, 70);

  // Subtitle
  ctx.fillStyle = '#88aa88';
  ctx.font = '11px monospace';
  ctx.fillText('Baseling Commando - Rescue Mission', GW/2, 95);

  // Player sprite preview
  drawBaselingCommando(GW/2, 150, 2, 0);

  // Controls
  ctx.fillStyle = '#aaccaa';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS/WASD = Move | SPACE = Fire', GW/2, 210);
  ctx.fillText('X = Grenade | E = Enter/Exit Vehicle', GW/2, 225);
  ctx.fillText('Auto-aim at nearest enemy', GW/2, 240);

  // Start prompt
  const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, 290);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('MISSION COMPLETE!', GW/2, 80);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Final Score: ' + score, GW/2, 130);

  if (score >= highScore) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 155);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('All allies rescued. The fungal regime falls.', GW/2, 190);

  drawBaselingCommando(GW/2, 240, 2.5, frame);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, 300);
  ctx.globalAlpha = 1;
}

function drawStageClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#44ff44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('STAGE ' + (stage + 1) + ' CLEAR!', GW/2, GH/2 - 20);

  ctx.fillStyle = '#ffdd44';
  ctx.font = '14px monospace';
  ctx.fillText(STAGES[stage].name, GW/2, GH/2 + 10);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH/2 + 40);
}

function drawGround(sd) {
  // Scrolling ground texture
  const tileH = 40;
  const offset = (stageScroll * 0.3) % tileH;

  for (let y = -tileH; y < GH + tileH; y += tileH) {
    for (let x = 0; x < GW; x += 40) {
      const noise = Math.sin(x * 0.1 + y * 0.05 + stageScroll * 0.01) * 20;
      const r = parseInt(sd.ground.slice(1, 3), 16) + noise;
      const g = parseInt(sd.ground.slice(3, 5), 16) + noise;
      const b = parseInt(sd.ground.slice(5, 7), 16) + noise * 0.5;
      ctx.fillStyle = 'rgb(' + Math.floor(TAS.math.clamp(r, 0, 255)) + ',' + Math.floor(TAS.math.clamp(g, 0, 255)) + ',' + Math.floor(TAS.math.clamp(b, 0, 255)) + ')';
      ctx.fillRect(x, y + offset, 40, tileH);
    }
  }

  // Path markings
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  const pathOff = (stageScroll * 0.5) % 60;
  for (let y = -60; y < GH + 60; y += 60) {
    ctx.fillRect(GW/2 - 30, y + pathOff, 60, 30);
  }
}

function drawWater() {
  for (const wz of waterZones) {
    if (wz.y > GH + 10 || wz.y + wz.h < -10) continue;
    const wave = Math.sin(frame * 0.05 + wz.x * 0.1) * 2;
    ctx.fillStyle = '#1a5a8a';
    ctx.fillRect(wz.x, wz.y + wave, wz.w, wz.h);
    ctx.fillStyle = 'rgba(100,180,255,0.3)';
    for (let wy = 0; wy < wz.h; wy += 8) {
      const wx = Math.sin(frame * 0.03 + wy * 0.2) * 3;
      ctx.fillRect(wz.x + wx + 5, wz.y + wy + wave, wz.w - 10, 2);
    }
  }
}

function drawObstacles() {
  for (const ob of obstacles) {
    if (ob.y > GH + 20 || ob.y < -30) continue;
    if (ob.type === 'tree') {
      // Trunk
      ctx.fillStyle = '#4a3020';
      ctx.fillRect(ob.x - 3, ob.y - 2, 6, ob.h * 0.6);
      // Canopy
      ctx.fillStyle = '#2a6a2a';
      ctx.beginPath();
      ctx.arc(ob.x, ob.y - ob.h * 0.3, ob.w * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a8a3a';
      ctx.beginPath();
      ctx.arc(ob.x + 3, ob.y - ob.h * 0.35, ob.w * 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else if (ob.type === 'wall') {
      ctx.fillStyle = '#5a5a5a';
      ctx.fillRect(ob.x - ob.w/2, ob.y - ob.h/2, ob.w, ob.h);
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(ob.x - ob.w/2, ob.y - ob.h/2, ob.w, 3);
      // Damage cracks
      if (ob.hp < 3) {
        ctx.strokeStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(ob.x - 3, ob.y - 4);
        ctx.lineTo(ob.x + 2, ob.y + 3);
        ctx.stroke();
      }
    } else {
      // Rock
      ctx.fillStyle = '#6a6a5a';
      ctx.beginPath();
      ctx.ellipse(ob.x, ob.y, ob.w/2, ob.h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8a8a7a';
      ctx.beginPath();
      ctx.ellipse(ob.x - 2, ob.y - 2, ob.w*0.3, ob.h*0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawCrates() {
  for (const c of crates) {
    if (c.collected || c.y > GH + 10 || c.y < -10) continue;
    // Crate box
    ctx.fillStyle = '#8a6a2a';
    ctx.fillRect(c.x - 8, c.y - 8, 16, 16);
    ctx.strokeStyle = '#ffcc44';
    ctx.strokeRect(c.x - 8, c.y - 8, 16, 16);
    // Weapon icon
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    const label = c.type === 'flamethrower' ? 'F' : (c.type === 'rocket' ? 'R' : 'L');
    ctx.fillText(label, c.x, c.y + 3);
  }
}

function drawVehicles() {
  for (const v of vehicles) {
    if (v.destroyed) {
      // Wreckage
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(v.x - 12, v.y - 10, 24, 20);
      ctx.fillStyle = '#222';
      ctx.fillRect(v.x - 8, v.y - 6, 16, 12);
      continue;
    }
    if (v.occupied) continue; // drawn with player

    if (v.type === 'tank') {
      drawTank(v.x, v.y, '#4a6a4a', false);
    } else {
      drawJeep(v.x, v.y, '#5a7a5a', false);
    }

    // "ENTER" prompt if player nearby
    if (player && distBetween(player, v) < 35) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('[E] ENTER', v.x, v.y - 20);
    }
  }
}

function drawTank(x, y, color, occupied) {
  // Treads
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x - 14, y - 14, 6, 28);
  ctx.fillRect(x + 8, y - 14, 6, 28);
  // Body
  ctx.fillStyle = color;
  ctx.fillRect(x - 10, y - 10, 20, 22);
  // Turret
  ctx.fillStyle = occupied ? '#5a8a5a' : '#3a5a3a';
  ctx.beginPath();
  ctx.arc(x, y - 2, 7, 0, Math.PI * 2);
  ctx.fill();
  // Barrel
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(x - 2, y - 16, 4, 14);
}

function drawJeep(x, y, color, occupied) {
  // Body
  ctx.fillStyle = color;
  ctx.fillRect(x - 10, y - 8, 20, 18);
  // Windshield
  ctx.fillStyle = '#88aacc';
  ctx.fillRect(x - 6, y - 6, 12, 5);
  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(x - 8, y + 8, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 8, y + 8, 4, 0, Math.PI * 2);
  ctx.fill();
  // Gun mount
  if (occupied) {
    ctx.fillStyle = '#444';
    ctx.fillRect(x - 2, y - 12, 4, 8);
  }
}

function drawHostages() {
  for (const h of hostages) {
    if (h.dead) continue;
    if (h.y > GH + 10 || h.y < -10) continue;

    if (h.freed) {
      // Running freed hostage
      const bob = Math.sin(h.runTimer * 0.3) * 2;
      ctx.fillStyle = '#44cc44';
      ctx.beginPath();
      ctx.arc(h.x + bob, h.y, 5, 0, Math.PI * 2);
      ctx.fill();
      // Arms up celebrating
      ctx.strokeStyle = '#44cc44';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(h.x - 3, h.y);
      ctx.lineTo(h.x - 6, h.y - 5);
      ctx.moveTo(h.x + 3, h.y);
      ctx.lineTo(h.x + 6, h.y - 5);
      ctx.stroke();
      ctx.lineWidth = 1;
      // +500 floating text
      if (h.runTimer < 30) {
        ctx.fillStyle = '#44ff44';
        ctx.font = 'bold 9px monospace';
        ctx.textAlign = 'center';
        ctx.globalAlpha = 1 - h.runTimer / 30;
        ctx.fillText('+500', h.x, h.y - 12 - h.runTimer * 0.5);
        ctx.globalAlpha = 1;
      }
    } else {
      // Tied up hostage
      const wiggle = Math.sin(frame * 0.1 + h.x) * 1;
      // Body
      ctx.fillStyle = '#ccaa44';
      ctx.beginPath();
      ctx.arc(h.x + wiggle, h.y, 5, 0, Math.PI * 2);
      ctx.fill();
      // Ropes
      ctx.strokeStyle = '#886633';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(h.x - 6, h.y - 2);
      ctx.lineTo(h.x + 6, h.y - 2);
      ctx.moveTo(h.x - 5, h.y + 2);
      ctx.lineTo(h.x + 5, h.y + 2);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Exclamation mark
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', h.x, h.y - 10);
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.active) continue;
    if (e.y > GH + 20 || e.y < -30) continue;

    if (e.type === 'soldier') {
      drawEnemySoldier(e.x, e.y);
    } else if (e.type === 'grenadier') {
      drawEnemyGrenadier(e.x, e.y);
    } else if (e.type === 'sniper') {
      drawEnemySniper(e.x, e.y);
    } else if (e.type === 'tank') {
      drawEnemyTank(e.x, e.y);
    } else if (e.type === 'helicopter') {
      drawEnemyHelicopter(e.x, e.y);
    } else if (e.type === 'bunker') {
      drawEnemyBunker(e.x, e.y);
    }

    // Health bar for tough enemies
    if (e.maxHp > 2) {
      const barW = e.w;
      const hpRatio = e.hp / e.maxHp;
      ctx.fillStyle = '#400';
      ctx.fillRect(e.x - barW/2, e.y - e.h/2 - 6, barW, 3);
      ctx.fillStyle = hpRatio > 0.5 ? '#4a4' : '#a44';
      ctx.fillRect(e.x - barW/2, e.y - e.h/2 - 6, barW * hpRatio, 3);
    }
  }
}

function drawEnemySoldier(x, y) {
  // Body (reddish-brown fungal soldier)
  ctx.fillStyle = '#8a3a3a';
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.fillStyle = '#aa5544';
  ctx.beginPath();
  ctx.arc(x, y - 5, 3, 0, Math.PI * 2);
  ctx.fill();
  // Gun
  ctx.fillStyle = '#333';
  ctx.fillRect(x + 3, y - 2, 5, 2);
}

function drawEnemyGrenadier(x, y) {
  // Bulkier body
  ctx.fillStyle = '#6a4a2a';
  ctx.beginPath();
  ctx.arc(x, y, 7, 0, Math.PI * 2);
  ctx.fill();
  // Helmet
  ctx.fillStyle = '#4a3a1a';
  ctx.beginPath();
  ctx.arc(x, y - 5, 4, Math.PI, 0);
  ctx.fill();
  // Grenade in hand
  ctx.fillStyle = '#2a5a2a';
  ctx.beginPath();
  ctx.arc(x + 5, y - 2, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemySniper(x, y) {
  // Prone/crouched
  ctx.fillStyle = '#5a5a4a';
  ctx.fillRect(x - 7, y - 3, 14, 6);
  // Scope glint
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(x + 7, y - 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Long rifle
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 2, y - 4, 12, 2);
}

function drawEnemyTank(x, y) {
  // Treads
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 12, y - 14, 5, 28);
  ctx.fillRect(x + 7, y - 14, 5, 28);
  // Body
  ctx.fillStyle = '#6a4a3a';
  ctx.fillRect(x - 9, y - 10, 18, 22);
  // Turret
  ctx.fillStyle = '#8a5a4a';
  ctx.beginPath();
  ctx.arc(x, y - 2, 6, 0, Math.PI * 2);
  ctx.fill();
  // Barrel
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 2, y - 14, 4, 12);
}

function drawEnemyHelicopter(x, y) {
  // Body
  ctx.fillStyle = '#5a5a6a';
  ctx.beginPath();
  ctx.ellipse(x, y, 10, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(x + 8, y - 2, 10, 4);
  // Rotor (spinning)
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  const rotorAngle = frame * 0.3;
  ctx.beginPath();
  ctx.moveTo(x - Math.cos(rotorAngle) * 14, y - 5 - Math.sin(rotorAngle) * 2);
  ctx.lineTo(x + Math.cos(rotorAngle) * 14, y - 5 + Math.sin(rotorAngle) * 2);
  ctx.stroke();
  ctx.lineWidth = 1;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 15, 8, 4, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemyBunker(x, y) {
  // Sandbag walls
  ctx.fillStyle = '#6a5a3a';
  ctx.fillRect(x - 14, y - 8, 28, 16);
  ctx.fillRect(x - 16, y, 32, 8);
  // Opening
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x - 6, y - 6, 12, 8);
  // Gun barrel
  ctx.fillStyle = '#333';
  ctx.fillRect(x - 1, y + 4, 3, 8);
  // Sandbag texture
  ctx.strokeStyle = '#5a4a2a';
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    ctx.moveTo(x - 14, y - 4 + i * 5);
    ctx.lineTo(x + 14, y - 4 + i * 5);
  }
  ctx.stroke();
}

function drawBoss() {
  if (!boss) return;

  if (boss.type === 'mech') {
    // Giant mech
    ctx.fillStyle = '#4a4a5a';
    ctx.fillRect(boss.x - 30, boss.y - 30, 60, 65);
    // Legs
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(boss.x - 25, boss.y + 20, 12, 20);
    ctx.fillRect(boss.x + 13, boss.y + 20, 12, 20);
    // Cockpit
    ctx.fillStyle = '#225588';
    ctx.beginPath();
    ctx.arc(boss.x, boss.y - 15, 12, 0, Math.PI * 2);
    ctx.fill();
    // Arms/Guns
    ctx.fillStyle = '#555';
    ctx.fillRect(boss.x - 38, boss.y - 10, 8, 30);
    ctx.fillRect(boss.x + 30, boss.y - 10, 8, 30);
  } else if (boss.type === 'fortress') {
    // Mobile fortress
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(boss.x - 32, boss.y - 35, 64, 70);
    // Turrets
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(boss.x - 18, boss.y - 20, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(boss.x + 18, boss.y - 20, 8, 0, Math.PI * 2);
    ctx.fill();
    // Central cannon
    ctx.fillStyle = '#333';
    ctx.fillRect(boss.x - 4, boss.y + 20, 8, 18);
    // Treads
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(boss.x - 34, boss.y - 30, 8, 60);
    ctx.fillRect(boss.x + 26, boss.y - 30, 8, 60);
  } else {
    // Warship
    ctx.fillStyle = '#3a4a5a';
    ctx.beginPath();
    ctx.moveTo(boss.x, boss.y - 36);
    ctx.lineTo(boss.x + 32, boss.y + 10);
    ctx.lineTo(boss.x + 28, boss.y + 36);
    ctx.lineTo(boss.x - 28, boss.y + 36);
    ctx.lineTo(boss.x - 32, boss.y + 10);
    ctx.closePath();
    ctx.fill();
    // Bridge
    ctx.fillStyle = '#2a3a4a';
    ctx.fillRect(boss.x - 12, boss.y - 20, 24, 20);
    // Engines glow
    ctx.fillStyle = '#ff6622';
    ctx.beginPath();
    ctx.arc(boss.x - 10, boss.y + 34, 4 + Math.sin(frame*0.2), 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(boss.x + 10, boss.y + 34, 4 + Math.sin(frame*0.2+1), 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw weak points
  for (const wp of boss.weakPoints) {
    if (!wp.active) continue;
    const wpx = boss.x + wp.ox;
    const wpy = boss.y + wp.oy;
    // Glowing weak point
    const pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(255,50,50,' + pulse + ')';
    ctx.beginPath();
    ctx.arc(wpx, wpy, wp.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff8844';
    ctx.beginPath();
    ctx.arc(wpx, wpy, wp.size * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boss HP bar
  const barW = 100;
  const hpRatio = boss.hp / boss.maxHp;
  ctx.fillStyle = '#400';
  ctx.fillRect(GW/2 - barW/2, 32, barW, 6);
  ctx.fillStyle = hpRatio > 0.5 ? '#cc4444' : '#ff2222';
  ctx.fillRect(GW/2 - barW/2, 32, barW * Math.max(0, hpRatio), 6);
  ctx.strokeStyle = '#888';
  ctx.strokeRect(GW/2 - barW/2, 32, barW, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', GW/2, 30);
}

function drawGrenades() {
  for (const g of grenades) {
    const progress = 1 - g.timer / 45;
    const height = Math.sin(progress * Math.PI) * 15;
    ctx.fillStyle = '#4a6a2a';
    ctx.beginPath();
    ctx.arc(g.x, g.y - height, 4, 0, Math.PI * 2);
    ctx.fill();
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(g.x, g.y + 2, 3, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayerBullets() {
  for (const b of playerBullets) {
    if (b.isLaser) {
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - b.vx * 3, b.y - b.vy * 3);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.globalAlpha = 1;
    } else if (b.isRocket) {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x - 3, b.y - 4, 6, 8);
      // Exhaust
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(b.x, b.y + 5, 2 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = b.color;
      ctx.globalAlpha = Math.min(1, b.life / 10);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawEnemyBullets() {
  for (const b of enemyBullets) {
    if (b.type === 'grenade') {
      const arc = Math.sin((1 - b.timer/50) * Math.PI) * 10;
      ctx.fillStyle = '#6a2a2a';
      ctx.beginPath();
      ctx.arc(b.x, b.y - arc, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (b.type === 'cannon') {
      ctx.fillStyle = '#ff4422';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size || 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(b.x, b.y, (b.size || 3) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (b.type === 'sniper') {
      ctx.strokeStyle = '#ff2222';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - b.vx * 2, b.y - b.vy * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    } else {
      ctx.fillStyle = '#ff8844';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  if (!player) return;

  // Blinking when invincible
  if (invincible > 0 && frame % 6 < 3) return;

  if (vehicle) {
    if (vehicle.type === 'tank') {
      drawTank(player.x, player.y, '#4a8a4a', true);
    } else {
      drawJeep(player.x, player.y, '#4a8a4a', true);
    }
    // Draw aim direction
    ctx.strokeStyle = 'rgba(68,255,68,0.4)';
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 8);
    ctx.lineTo(player.x + aimDir.x * 30, player.y - 8 + aimDir.y * 30);
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    drawBaselingCommando(player.x, player.y, 1, frame);
    // Draw aim indicator
    ctx.strokeStyle = 'rgba(68,255,68,0.5)';
    ctx.setLineDash([2, 2]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y - 4);
    ctx.lineTo(player.x + aimDir.x * 20, player.y - 4 + aimDir.y * 20);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Weapon indicator
  if (weapon !== 'machinegun') {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    const timeLeft = Math.ceil(weaponTimer / 60);
    ctx.fillText(WEAPONS[weapon].name + ' ' + timeLeft + 's', player.x, player.y + 14);
  }
}

function drawBaselingCommando(x, y, scale, aFrame) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  const bob = Math.sin(aFrame * 0.15) * 1;

  // Body (round baseling shape)
  ctx.fillStyle = '#3a8a3a';
  ctx.beginPath();
  ctx.arc(0, bob, 7, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#5aaa5a';
  ctx.beginPath();
  ctx.arc(0, bob + 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-3, bob - 3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, bob - 3, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-3, bob - 3, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, bob - 3, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Bandana
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(-6, bob - 6, 12, 3);
  // Bandana tails
  ctx.beginPath();
  ctx.moveTo(5, bob - 5);
  ctx.lineTo(9, bob - 3 + Math.sin(aFrame * 0.1) * 1);
  ctx.lineTo(8, bob - 6);
  ctx.fill();

  // Gun
  ctx.fillStyle = '#444';
  ctx.fillRect(4, bob - 1, 7, 2);
  ctx.fillStyle = '#666';
  ctx.fillRect(9, bob - 2, 2, 4);

  // Feet
  ctx.fillStyle = '#2a6a2a';
  const footOff = Math.sin(aFrame * 0.2) * 2;
  ctx.beginPath();
  ctx.arc(-3, bob + 7 + footOff, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, bob + 7 - footOff, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawExplosionEffects() {
  for (const ex of explosions) {
    const progress = 1 - ex.timer / 8;
    const radius = ex.radius * (0.5 + progress * 0.5);
    ctx.globalAlpha = 1 - progress;
    ctx.fillStyle = '#ff6622';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 11px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Stage
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stage + 1), GW/2, 18);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#44dd88';
  for (let i = 0; i < lives; i++) {
    ctx.beginPath();
    ctx.arc(GW - 10 - i * 16, 14, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bottom HUD
  // Health bar
  if (player) {
    const barX = 10, barY = GH - 16, barW = 60, barH = 8;
    const hpRatio = player.hp / player.maxHp;
    ctx.fillStyle = '#400';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = hpRatio > 0.4 ? '#4a4' : '#a22';
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    ctx.strokeStyle = '#666';
    ctx.strokeRect(barX, barY, barW, barH);
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('HP', barX + 2, barY + 7);
  }

  // Grenades
  ctx.fillStyle = '#aaccaa';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('GRN: ' + grenadeCount, GW - 10, GH - 8);

  // Weapon indicator
  if (weapon !== 'machinegun') {
    ctx.fillStyle = '#ffcc44';
    ctx.textAlign = 'center';
    ctx.fillText(WEAPONS[weapon].name.toUpperCase() + ' [' + Math.ceil(weaponTimer/60) + 's]', GW/2, GH - 8);
  }

  // High score
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('HI: ' + highScore, GW - 10, 26);

  // Stage progress bar (thin line at very top)
  if (!bossActive) {
    const progress = stageScroll / stageLength;
    ctx.fillStyle = 'rgba(68,221,136,0.4)';
    ctx.fillRect(0, 0, GW * progress, 2);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
