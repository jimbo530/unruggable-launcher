<script>
(function(){
"use strict";

// ============================================================
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,
// luck,swim}, already clamped to the single-player band (0.8–1.6). RPG, not a wager
// game -> default band. This game's many helpers read the old D&D fields (statB.str/
// dex/con/...), so we synthesize those from the bounded multipliers inside
// recomputeStats() — every gameplay number still traces back to a clamped getMults().
//   SPD -> move speed,  STA -> HP + bonus life,  PWR -> attack damage,
//   LCK -> drop/loot rate,  SWM unused (no water gameplay).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// Keep the display fields (color/name/icon) from NftLoader if present; never fatal.
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[crystal-quest] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
  statB.damage = m.damage;      // PWR -> attack damage
  statB.speed = m.moveSpeed;    // SPD -> move speed
  statB.hpMult = m.health;      // STA -> max HP
  statB.luck = m.luck;          // LCK -> drop/loot rate
  statB.scoreMult = 1;          // score is not a stat in the new system
  statB.cooldown = 1 / m.moveSpeed; // SPD -> faster charge (lower cooldown)
  statB.lives = m.health > 1.3 ? 1 : 0; // STA buys a cushion life
  statB.str = dnd(m.damage);    // STR helpers -> attack
  statB.dex = dnd(m.moveSpeed); // DEX helpers -> speed
  statB.con = dnd(m.health);    // CON helpers -> HP / lives
  statB.int = dnd(m.luck);      // INT helpers -> score/loot (luck flavor)
  statB.wis = dnd(m.luck);      // WIS helpers -> MP/charge (luck flavor)
  statB.cha = dnd(m.luck);      // CHA helpers -> drop rate
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[crystal-quest] player init failed:', e && e.message); });
}

// ============================================================
// CONSTANTS
// ============================================================
const GW = 320, GH = 288;
const TILE = 16;
const COLS = 20, ROWS = 16; // play area tiles (20x16 = 320x256)
const HUD_H = 32; // bottom HUD
const PLAY_H = GH - HUD_H; // 256px play area
const OW_W = 6, OW_H = 6; // overworld screens
const DIR_UP = 0, DIR_RIGHT = 1, DIR_DOWN = 2, DIR_LEFT = 3;
const DX = [0, 1, 0, -1], DY = [-1, 0, 1, 0];
const SAVE_KEY = 'crystalquest_save';

const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'ATK', b: 'USE', c: 'PICK' } });

// ============================================================
// COLORS / PALETTES
// ============================================================
const PAL = {
  grass: '#2d5a1e', grassL: '#3a7a28', tree: '#1a3a0e', treeTop: '#2e6e1a',
  sand: '#c4a65a', sandL: '#d4b86a', water: '#2244aa', waterL: '#3366cc',
  mountain: '#555', mountainL: '#777', snow: '#cde', lava: '#ff4422',
  swamp: '#3a4a20', swampL: '#4a5a30', path: '#8a7a5a',
  wall: '#444', wallL: '#666', floor: '#222', floorL: '#333',
  wind: '#38d973', fire: '#e6482e', ice: '#3cacd7', earth: '#7a444a',
  crystal: ['#38d973', '#e6482e', '#3cacd7', '#7a444a'],
  hud: '#111', hudBorder: '#444',
  // Pass 3: Zone-specific palettes
  forestAmbient: '#1a3a0e',
  desertAmbient: '#aa8844',
  volcanoAmbient: '#441100',
  snowAmbient: '#aabbcc',
  swampAmbient: '#223311',
  dungeonAmbient: '#110022'
};

// ============================================================
// TILE TYPES
// ============================================================
const T = {
  EMPTY: 0, GRASS: 1, TREE: 2, WATER: 3, SAND: 4, MOUNTAIN: 5,
  PATH: 6, SWAMP: 7, LAVA: 8, WALL: 9, FLOOR: 10, DOOR: 11,
  BARRIER_WIND: 12, BARRIER_FIRE: 13, BARRIER_WATER: 14, BARRIER_EARTH: 15,
  CHEST: 16, NPC: 17, STAIRS_DOWN: 18, STAIRS_UP: 19, HOUSE: 20,
  DUNGEON_ENTRANCE: 21, SHOP: 22, SAVE_POINT: 23, CAVE_WALL: 24,
  BRIDGE: 25, FLOWER: 26, SIGN: 27, VOLCANO: 28, POISON_POOL: 29,
  MUSHROOM_CLUSTER: 30, SPORE_VENT: 31
};

const SOLID = new Set([T.TREE, T.WATER, T.MOUNTAIN, T.WALL, T.LAVA,
  T.BARRIER_WIND, T.BARRIER_FIRE, T.BARRIER_WATER, T.BARRIER_EARTH,
  T.CAVE_WALL, T.VOLCANO]);

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let frame = 0;
let player = null;
let enemies = [];
let projectiles = [];
let pickups = [];
let npcs = [];
let screenX = 2, screenY = 4; // start screen
let overworldData = null;
let currentMap = null; // the active screen tiles
let inDungeon = false;
let dungeonId = -1;
let dungeonRoom = 0;
let transitionTimer = 0;
let transitionDir = -1;
let dialogText = '';
let dialogTimer = 0;
let dialogQueue = [];
let shopOpen = false;
let shopItems = [];
let shopCursor = 0;
let menuOpen = false;
let menuCursor = 0;
let deathTimer = 0;
let bossActive = null;
let victoryTimer = 0;
let totalScore = 0; // Pass 2: score tracking
let comboCount = 0; // Pass 2: combo kills
let comboTimer = 0;
let scorePopups = []; // Pass 2: floating score text
let screensExplored = 0; // Pass 2: overworld boss trigger
let showTutorial = true; // Pass 3: first-play tutorial
let tutorialStep = 0;
let tutorialTimer = 0;
let ambientParticles = []; // Pass 3: biome ambient effects
let bonusLives = 0; // Pass 1: CON bonus lives (statB.lives)
let overworldBoss = null; // Pass 2: overworld mini-boss

// ============================================================
// PLAYER (Pass 1: statB wired into base stats)
// ============================================================
function createPlayer() {
  // STR -> base attack (*statB.damage)
  // DEX -> speed (*statB.speed)
  // CON -> HP (*statB.hpMult), bonus lives (statB.lives)
  // INT -> score multiplier (*statB.scoreMult)
  // WIS -> charge/cooldown reduction (*statB.cooldown)
  // CHA -> drop rate (*statB.luck)
  const baseHp = Math.floor(6 * statB.hpMult); // ref 1: CON -> HP
  const baseSpeed = Math.floor(80 * statB.speed); // ref 2: DEX -> speed
  const baseMp = 20 + (statB.wis > 12 ? Math.floor((statB.wis - 10) * 2) : 0); // ref 3: WIS -> MP pool
  bonusLives = statB.lives; // ref 4: CON -> bonus lives

  return {
    x: 160, y: 128, w: 14, h: 14,
    dir: DIR_DOWN, speed: baseSpeed,
    hp: baseHp, maxHp: baseHp,
    mp: baseMp, maxMp: baseMp,
    xp: 0, level: 1, xpToNext: 20,
    attack: Math.max(1, Math.floor(1 * statB.damage)), // ref 5: STR -> base attack
    defense: 0,
    crystals: [false, false, false, false],
    activeCrystal: -1,
    chargeLevel: 0, charging: false, chargeTime: 0,
    swinging: false, swingTimer: 0, swingDir: 0,
    invincible: 0,
    gold: 0,
    armor: 0, shield: 0, boots: false,
    potions: 2,
    keys: 0,
    moveTimer: 0,
    animFrame: 0,
    stepTimer: 0,
    poisonTimer: 0, // Pass 2: poison hazard
    poisonDamageTimer: 0
  };
}

// ============================================================
// SCORE POPUP SYSTEM (Pass 2)
// ============================================================
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ff0', life: 1.2, vy: -40 });
}

function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.y += sp.vy * dt;
    sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.life * 2);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// AMBIENT PARTICLE SYSTEM (Pass 3)
// ============================================================
function spawnAmbientParticles(biome) {
  ambientParticles = [];
  var count = 0;
  var color = '#fff';
  var speedMult = 1;

  switch (biome) {
    case 'forest':
      count = 8; color = '#4a4'; speedMult = 0.3; break;
    case 'snow':
      count = 15; color = '#ddf'; speedMult = 0.5; break;
    case 'volcano':
      count = 10; color = '#f84'; speedMult = 1.2; break;
    case 'swamp':
      count = 6; color = '#8a8'; speedMult = 0.2; break;
    case 'desert':
      count = 5; color = '#dc9'; speedMult = 0.8; break;
    case 'coast':
      count = 7; color = '#8cf'; speedMult = 0.4; break;
    default:
      count = 3; color = '#888'; speedMult = 0.3;
  }

  for (var i = 0; i < count; i++) {
    ambientParticles.push({
      x: Math.random() * GW,
      y: Math.random() * PLAY_H,
      vx: (Math.random() - 0.5) * 20 * speedMult,
      vy: (Math.random() - 0.5) * 15 * speedMult + (biome === 'snow' ? 15 : 0),
      color: color,
      size: 1 + Math.random() * 2,
      alpha: 0.2 + Math.random() * 0.4
    });
  }
}

function updateAmbientParticles(dt) {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < 0) p.x = GW;
    if (p.x > GW) p.x = 0;
    if (p.y < 0) p.y = PLAY_H;
    if (p.y > PLAY_H) p.y = 0;
  }
}

function drawAmbientParticles() {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    ctx.globalAlpha = p.alpha * (0.5 + Math.sin(frame * 0.03 + i) * 0.3);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// OVERWORLD GENERATION
// ============================================================
function generateOverworld() {
  // 6x6 grid, each cell has a biome type
  const biomes = [
    // Row 0 (top): mountains/snow
    ['mountain','mountain','mountain','snow','snow','volcano'],
    // Row 1: forest/mountains
    ['forest','forest','mountain','forest','mountain','volcano'],
    // Row 2: forest/plains
    ['forest','plains','forest','plains','desert','mountain'],
    // Row 3: plains/water
    ['plains','town','plains','forest','desert','desert'],
    // Row 4: swamp/coast
    ['swamp','plains','town_start','plains','coast','coast'],
    // Row 5 (bottom): swamp/coast
    ['swamp','swamp','coast','coast','coast','coast']
  ];

  const data = [];
  for (let sy = 0; sy < OW_H; sy++) {
    data[sy] = [];
    for (let sx = 0; sx < OW_W; sx++) {
      data[sy][sx] = generateScreen(biomes[sy][sx], sx, sy);
    }
  }
  return data;
}

function generateScreen(biome, sx, sy) {
  const tiles = [];
  for (let r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      tiles[r][c] = generateTile(biome, c, r, sx, sy);
    }
  }
  // Add connections (openings at edges for adjacent screens)
  addEdgeOpenings(tiles, biome);
  // Place special features
  placeFeatures(tiles, biome, sx, sy);
  return tiles;
}

function generateTile(biome, c, r, sx, sy) {
  const rng = seededRandom(sx * 1000 + sy * 100 + r * 20 + c);
  switch (biome) {
    case 'forest':
      if (rng < 0.35) return T.TREE;
      if (rng < 0.05 + 0.35) return T.FLOWER;
      if (rng < 0.42) return T.MUSHROOM_CLUSTER; // Pass 2: mushroom clusters
      return T.GRASS;
    case 'plains':
      if (rng < 0.08) return T.TREE;
      if (rng < 0.15) return T.FLOWER;
      return T.GRASS;
    case 'mountain':
      if (rng < 0.45) return T.MOUNTAIN;
      if (rng < 0.55) return T.TREE;
      return T.GRASS;
    case 'snow':
      if (rng < 0.4) return T.MOUNTAIN;
      return T.GRASS;
    case 'desert':
      if (rng < 0.1) return T.MOUNTAIN;
      return T.SAND;
    case 'swamp':
      if (rng < 0.25) return T.WATER;
      if (rng < 0.30) return T.POISON_POOL; // Pass 2: poison pools
      if (rng < 0.40) return T.TREE;
      return T.SWAMP;
    case 'coast':
      if (r > 10 || (r > 6 && rng < 0.3 + (r - 6) * 0.1)) return T.WATER;
      if (rng < 0.05) return T.TREE;
      return T.SAND;
    case 'volcano':
      if (rng < 0.35) return T.MOUNTAIN;
      if (rng < 0.15 + 0.35) return T.LAVA;
      if (rng < 0.52) return T.SPORE_VENT; // Pass 2: spore vents
      return T.GRASS;
    case 'town': case 'town_start':
      return T.PATH;
    default:
      return T.GRASS;
  }
}

function seededRandom(seed) {
  let s = seed + 12345;
  s = (s * 1103515245 + 12345) & 0x7fffffff;
  return (s % 10000) / 10000;
}

function addEdgeOpenings(tiles, biome) {
  // Clear middle of each edge for passage
  const mid = Math.floor(COLS / 2);
  const midR = Math.floor(ROWS / 2);
  for (let i = -2; i <= 2; i++) {
    // Top edge
    if (midR + i >= 0 && mid + i >= 0 && mid + i < COLS) {
      if (tiles[0][mid + i] !== T.WATER) tiles[0][mid + i] = T.GRASS;
      if (tiles[1][mid + i] !== T.WATER) tiles[1][mid + i] = T.GRASS;
    }
    // Bottom edge
    if (mid + i >= 0 && mid + i < COLS) {
      if (tiles[ROWS-1][mid + i] !== T.WATER) tiles[ROWS-1][mid + i] = T.GRASS;
      if (tiles[ROWS-2][mid + i] !== T.WATER) tiles[ROWS-2][mid + i] = T.GRASS;
    }
    // Left edge
    if (midR + i >= 0 && midR + i < ROWS) {
      if (tiles[midR + i][0] !== T.WATER) tiles[midR + i][0] = T.GRASS;
      if (tiles[midR + i][1] !== T.WATER) tiles[midR + i][1] = T.GRASS;
    }
    // Right edge
    if (midR + i >= 0 && midR + i < ROWS) {
      if (tiles[midR + i][COLS-1] !== T.WATER) tiles[midR + i][COLS-1] = T.GRASS;
      if (tiles[midR + i][COLS-2] !== T.WATER) tiles[midR + i][COLS-2] = T.GRASS;
    }
  }
}

function placeFeatures(tiles, biome, sx, sy) {
  // Dungeon entrances at specific locations
  if (sx === 0 && sy === 1) { // Wind Temple - forest top-left
    tiles[8][10] = T.DUNGEON_ENTRANCE;
    if (!hasCrystal(0)) tiles[6][14] = T.BARRIER_FIRE; // blocked path
  }
  if (sx === 4 && sy === 0) { // Fire Cavern - snow/mountain
    tiles[10][8] = T.DUNGEON_ENTRANCE;
  }
  if (sx === 5 && sy === 5) { // Water Shrine - coast bottom-right
    tiles[5][12] = T.DUNGEON_ENTRANCE;
  }
  if (sx === 0 && sy === 5) { // Earth Fortress - swamp
    tiles[6][5] = T.DUNGEON_ENTRANCE;
  }
  if (sx === 5 && sy === 0) { // Final dungeon - volcano
    tiles[8][10] = T.DUNGEON_ENTRANCE;
    // Requires all 4 crystals
  }

  // Towns
  if (biome === 'town_start') {
    clearArea(tiles, 5, 4, 10, 8, T.PATH);
    tiles[5][8] = T.HOUSE;
    tiles[5][12] = T.HOUSE;
    tiles[7][6] = T.NPC;
    tiles[9][10] = T.SHOP;
    tiles[4][10] = T.SIGN;
    tiles[6][14] = T.SAVE_POINT;
  }
  if (biome === 'town' && sx === 1 && sy === 3) {
    clearArea(tiles, 4, 3, 12, 10, T.PATH);
    tiles[4][7] = T.HOUSE;
    tiles[4][11] = T.HOUSE;
    tiles[6][9] = T.NPC;
    tiles[8][6] = T.SHOP;
    tiles[5][13] = T.NPC;
    tiles[7][12] = T.SAVE_POINT;
  }

  // Barriers requiring crystals
  if (sx === 3 && sy === 2) tiles[8][5] = T.BARRIER_WIND;
  if (sx === 4 && sy === 1) tiles[10][10] = T.BARRIER_FIRE;
  if (sx === 5 && sy === 4) tiles[8][3] = T.BARRIER_WATER;
  if (sx === 1 && sy === 5) tiles[5][10] = T.BARRIER_EARTH;
}

function clearArea(tiles, x1, y1, x2, y2, tile) {
  for (let r = y1; r <= y2 && r < ROWS; r++)
    for (let c = x1; c <= x2 && c < COLS; c++)
      tiles[r][c] = tile;
}

function hasCrystal(idx) {
  return player && player.crystals[idx];
}

// ============================================================
// DUNGEON GENERATION
// ============================================================
const DUNGEONS = [
  { name: 'Spore Gale Shrine', rooms: 8, element: 0, bossHp: 30, color: '#38d973' },
  { name: 'Ember Mold Cavern', rooms: 9, element: 1, bossHp: 40, color: '#e6482e' },
  { name: 'Tidepool Fungarium', rooms: 8, element: 2, bossHp: 45, color: '#3cacd7' },
  { name: 'Root Crystal Fortress', rooms: 10, element: 3, bossHp: 50, color: '#7a444a' },
  { name: 'Spore Tower', rooms: 12, element: 4, bossHp: 80, color: '#a855f7' }
];

function generateDungeonRoom(dungeonIdx, roomIdx) {
  const tiles = [];
  const dungeon = DUNGEONS[dungeonIdx];

  // Walls around edges, floor inside
  for (let r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (let c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) {
        tiles[r][c] = T.CAVE_WALL;
      } else {
        tiles[r][c] = T.FLOOR;
      }
    }
  }

  // Door at bottom (entrance) unless first room
  if (roomIdx > 0) {
    tiles[ROWS-1][9] = T.DOOR;
    tiles[ROWS-1][10] = T.DOOR;
  }

  // Door at top (exit) unless last room
  if (roomIdx < dungeon.rooms - 1) {
    tiles[0][9] = T.DOOR;
    tiles[0][10] = T.DOOR;
  }

  // Internal walls/obstacles based on dungeon theme
  const seed = dungeonIdx * 100 + roomIdx;
  addDungeonObstacles(tiles, dungeonIdx, roomIdx, seed);

  // Boss room is last room
  if (roomIdx === dungeon.rooms - 1) {
    // Clear center for boss fight
    clearArea(tiles, 4, 4, 15, 12, T.FLOOR);
  }

  // Chest in some rooms
  if (roomIdx === 3 || roomIdx === 6) {
    tiles[4][15] = T.CHEST;
  }

  return tiles;
}

function addDungeonObstacles(tiles, dIdx, rIdx, seed) {
  // Add themed internal structures
  const rng = (n) => seededRandom(seed + n);

  if (dIdx === 0) { // Wind - floating platforms feel
    for (let i = 0; i < 4; i++) {
      const px = 3 + Math.floor(rng(i * 10) * 14);
      const py = 3 + Math.floor(rng(i * 10 + 1) * 10);
      tiles[py][px] = T.CAVE_WALL;
      if (px + 1 < COLS - 1) tiles[py][px + 1] = T.CAVE_WALL;
    }
    // Pass 2: add spore vents in wind dungeon
    if (rIdx > 2) {
      const vx = 5 + Math.floor(rng(99) * 10);
      const vy = 5 + Math.floor(rng(98) * 6);
      tiles[vy][vx] = T.SPORE_VENT;
    }
  } else if (dIdx === 1) { // Fire - lava pools
    for (let i = 0; i < 5; i++) {
      const px = 3 + Math.floor(rng(i * 7) * 13);
      const py = 3 + Math.floor(rng(i * 7 + 2) * 9);
      tiles[py][px] = T.LAVA;
      if (px + 1 < COLS - 1) tiles[py][px + 1] = T.LAVA;
      if (py + 1 < ROWS - 1) tiles[py + 1][px] = T.LAVA;
    }
  } else if (dIdx === 2) { // Water - pools
    for (let i = 0; i < 4; i++) {
      const px = 4 + Math.floor(rng(i * 5) * 11);
      const py = 4 + Math.floor(rng(i * 5 + 3) * 7);
      tiles[py][px] = T.WATER;
      if (px + 1 < COLS - 1) tiles[py][px + 1] = T.WATER;
    }
  } else if (dIdx === 3) { // Earth - thick walls
    for (let i = 0; i < 6; i++) {
      const px = 2 + Math.floor(rng(i * 3) * 15);
      const py = 2 + Math.floor(rng(i * 3 + 1) * 11);
      tiles[py][px] = T.CAVE_WALL;
    }
    // Pass 2: mushroom clusters in earth dungeon
    if (rIdx > 1) {
      const mx = 4 + Math.floor(rng(77) * 10);
      const my = 4 + Math.floor(rng(78) * 7);
      tiles[my][mx] = T.MUSHROOM_CLUSTER;
    }
  } else { // Spore Tower - mixed
    for (let i = 0; i < 3; i++) {
      const px = 3 + Math.floor(rng(i * 4) * 13);
      const py = 3 + Math.floor(rng(i * 4 + 1) * 9);
      const t = [T.LAVA, T.WATER, T.CAVE_WALL][i % 3];
      tiles[py][px] = t;
      if (px + 1 < COLS - 1) tiles[py][px + 1] = t;
    }
    // Pass 2: poison pools in Spore Tower
    if (rIdx > 3) {
      const ppx = 6 + Math.floor(rng(55) * 8);
      const ppy = 5 + Math.floor(rng(56) * 5);
      tiles[ppy][ppx] = T.POISON_POOL;
      if (ppx + 1 < COLS - 1) tiles[ppy][ppx + 1] = T.POISON_POOL;
    }
  }
}

function spawnEnemiesForScreen() {
  enemies = [];
  if (inDungeon) {
    spawnDungeonEnemies();
    return;
  }

  const biome = getBiome(screenX, screenY);
  const count = TAS.math.randInt(2, 5);
  const types = getEnemyTypesForBiome(biome);

  for (let i = 0; i < count; i++) {
    const type = types[TAS.math.randInt(0, types.length - 1)];
    spawnEnemy(type);
  }

  // Pass 2: overworld boss every 5 screens explored
  screensExplored++;
  if (screensExplored % 5 === 0 && !overworldBoss) {
    spawnOverworldBoss(biome);
  }
}

function getEnemyTypesForBiome(biome) {
  switch (biome) {
    case 'forest': return ['slime', 'bat', 'skeleton', 'mushroomKnight', 'sporeHound'];
    case 'plains': return ['slime', 'bat', 'toxicSlug'];
    case 'mountain': case 'snow': return ['golem', 'bat', 'skeleton', 'fungalTitan'];
    case 'desert': return ['skeleton', 'fireImp', 'wizard', 'moldWraith'];
    case 'swamp': return ['slime', 'waterNymph', 'skeleton', 'toxicSlug', 'moldWraith'];
    case 'coast': return ['waterNymph', 'bat', 'sporeHound'];
    case 'volcano': return ['fireImp', 'golem', 'wizard', 'myceliumMage'];
    default: return ['slime'];
  }
}

function spawnDungeonEnemies() {
  const dungeon = DUNGEONS[dungeonId];
  if (dungeonRoom === dungeon.rooms - 1) {
    // Boss room
    spawnBoss();
    return;
  }
  const count = TAS.math.randInt(3, 5);
  const types = getDungeonEnemyTypes(dungeonId);
  for (let i = 0; i < count; i++) {
    spawnEnemy(types[TAS.math.randInt(0, types.length - 1)]);
  }
}

function getDungeonEnemyTypes(dIdx) {
  switch (dIdx) {
    case 0: return ['windSprite', 'bat', 'slime', 'sporeHound'];
    case 1: return ['fireImp', 'skeleton', 'wizard', 'mushroomKnight'];
    case 2: return ['waterNymph', 'slime', 'bat', 'moldWraith'];
    case 3: return ['rockBeast', 'golem', 'skeleton', 'fungalTitan'];
    case 4: return ['sporeling', 'wizard', 'golem', 'fireImp', 'myceliumMage', 'toxicSlug'];
    default: return ['slime'];
  }
}

function spawnEnemy(type) {
  const def = ENEMY_DEFS[type];
  let ex, ey, attempts = 0;
  do {
    ex = TAS.math.randInt(3, COLS - 4) * TILE;
    ey = TAS.math.randInt(3, ROWS - 4) * TILE;
    attempts++;
  } while (attempts < 20 && (TAS.math.dist(ex, ey, player.x, player.y) < 60 ||
           isSolidAt(ex, ey)));

  enemies.push({
    type, x: ex, y: ey, w: def.w, h: def.h,
    hp: def.hp, maxHp: def.hp, speed: def.speed,
    damage: def.damage, xp: def.xp, color: def.color,
    pattern: def.pattern, element: def.element || -1,
    poisonous: def.poisonous || false,
    dir: TAS.math.randInt(0, 3), moveTimer: 0,
    shootTimer: 0, chargeTimer: 0, stunTimer: 0,
    animFrame: 0, flash: 0
  });
}

function spawnOverworldBoss(biome) {
  var bossTypes = {
    'forest': { name: 'Crystal Mold Titan', hp: 25, color: '#38d973', damage: 3, speed: 35 },
    'plains': { name: 'Feral Baseling Alpha', hp: 20, color: statB.color, damage: 2, speed: 45 },
    'mountain': { name: 'Gem Parasite Golem', hp: 35, color: '#7a444a', damage: 4, speed: 20 },
    'desert': { name: 'Shard Spore Wyrm', hp: 28, color: '#f4b41b', damage: 3, speed: 40 },
    'swamp': { name: 'Rot Mother Fungus', hp: 30, color: '#585', damage: 3, speed: 25 },
    'coast': { name: 'Tidepool Sporeling', hp: 22, color: '#3cacd7', damage: 2, speed: 50 },
    'volcano': { name: 'Ember Mold Beast', hp: 35, color: '#e6482e', damage: 4, speed: 30 },
    'snow': { name: 'Frost Spore Stalker', hp: 28, color: '#a855f7', damage: 3, speed: 38 }
  };
  var def = bossTypes[biome] || bossTypes['plains'];

  overworldBoss = {
    x: GW / 2 - 12, y: 60, w: 24, h: 24,
    hp: def.hp, maxHp: def.hp,
    damage: def.damage, speed: def.speed,
    color: def.color, name: def.name,
    pattern: 'boss', phase: 0, phaseTimer: 0,
    moveTimer: 0, shootTimer: 0, dir: DIR_DOWN,
    flash: 0, invincible: 0
  };
  showDialog('A ' + def.name + ' appears!');
  TAS.fx.shake(5, 0.9);
  TAS.audio.playMelody([[196, 0.2], [175, 0.2], [165, 0.3]], 200);
}

function updateOverworldBoss(dt) {
  if (!overworldBoss) return;
  var b = overworldBoss;
  if (b.flash > 0) b.flash -= dt;
  if (b.invincible > 0) b.invincible -= dt;
  b.phaseTimer += dt;
  b.moveTimer += dt;
  b.shootTimer += dt;

  if (b.hp < b.maxHp * 0.5 && b.phase === 0) {
    b.phase = 1;
    b.speed *= 1.3;
    TAS.fx.flash(b.color, 0.4);
  }

  // Chase player
  var dx = player.x - b.x;
  var dy = player.y - b.y;
  var dist = Math.sqrt(dx * dx + dy * dy) || 1;
  var spd = b.speed * dt;
  b.x += (dx / dist) * spd * 0.6;
  b.y += (dy / dist) * spd * 0.6;
  b.x = TAS.math.clamp(b.x, TILE, (COLS - 2) * TILE);
  b.y = TAS.math.clamp(b.y, TILE, (ROWS - 3) * TILE);

  // Shoot at player
  if (b.shootTimer > (b.phase === 0 ? 2.0 : 1.2)) {
    b.shootTimer = 0;
    var angle = TAS.math.angle(b.x + b.w/2, b.y + b.h/2, player.x + player.w/2, player.y + player.h/2);
    var shots = b.phase === 0 ? 1 : 3;
    for (var i = 0; i < shots; i++) {
      var a = angle + (i - Math.floor(shots/2)) * 0.4;
      projectiles.push({
        x: b.x + b.w/2, y: b.y + b.h/2,
        vx: Math.cos(a) * 90, vy: Math.sin(a) * 90,
        damage: b.damage, color: b.color, element: -1,
        size: 5, life: 2.0, friendly: false
      });
    }
    TAS.audio.playTone(180, 0.08, 'sawtooth', 0.06);
  }

  // Contact damage
  if (player.invincible <= 0 && TAS.hit.rectOverlap(b.x, b.y, b.w, b.h,
      player.x, player.y, player.w, player.h)) {
    damagePlayer(b.damage);
  }
}

function damageOverworldBoss(damage) {
  if (!overworldBoss || overworldBoss.invincible > 0) return;
  overworldBoss.hp -= damage;
  overworldBoss.flash = 0.2;
  overworldBoss.invincible = 0.3;
  TAS.fx.shake(3, 0.85);
  TAS.audio.playTone(220, 0.08, 'sawtooth', 0.1, 100);
  TAS.particles.spawn(overworldBoss.x + overworldBoss.w/2, overworldBoss.y + overworldBoss.h/2, '#fff', 6, 4);

  if (overworldBoss.hp <= 0) {
    var xpReward = 20 + player.level * 5;
    var goldReward = TAS.math.randInt(15, 35);
    var scoreReward = 500;

    TAS.fx.flash('#fff', 0.6);
    TAS.fx.shake(6, 0.9);
    TAS.particles.spawn(overworldBoss.x + 12, overworldBoss.y + 12, overworldBoss.color, 25, 6);
    TAS.audio.playMelody([[440, 0.12], [554, 0.12], [659, 0.12], [880, 0.2]], 120);

    player.xp += Math.floor(xpReward * statB.scoreMult); // ref 6: INT -> boss XP
    player.gold += goldReward;
    totalScore += Math.floor(scoreReward * statB.scoreMult); // ref 7: INT -> boss score
    addScorePopup(overworldBoss.x + 12, overworldBoss.y, '+' + Math.floor(scoreReward * statB.scoreMult), '#ff0');
    addScorePopup(overworldBoss.x + 12, overworldBoss.y - 14, overworldBoss.name + ' defeated!', '#fff');

    checkLevelUp();
    overworldBoss = null;
  }
}

function drawOverworldBoss() {
  if (!overworldBoss) return;
  var b = overworldBoss;
  var bx = Math.floor(b.x);
  var by = Math.floor(b.y);

  if (b.invincible > 0 && Math.floor(frame * 0.3) % 2 === 0) return;

  // Aura (Pass 3)
  ctx.globalAlpha = 0.15 + Math.sin(frame * 0.06) * 0.08;
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.arc(bx + b.w/2, by + b.h/2, b.w + 6 + Math.sin(frame * 0.04) * 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = b.flash > 0 ? '#fff' : b.color;
  ctx.fillRect(bx + 2, by + 3, b.w - 4, b.h - 3);
  // Eyes
  ctx.fillStyle = b.flash > 0 ? '#fff' : '#200';
  ctx.fillRect(bx + 5, by + 8, 3, 3);
  ctx.fillRect(bx + b.w - 8, by + 8, 3, 3);
  // Crown marks
  ctx.fillStyle = '#ff0';
  ctx.fillRect(bx + 4, by, 3, 4);
  ctx.fillRect(bx + b.w - 7, by, 3, 4);
  ctx.fillRect(bx + b.w/2 - 1, by - 2, 3, 5);

  // Phase 2 aura ring
  if (b.phase > 0) {
    ctx.globalAlpha = 0.25 + Math.sin(frame * 0.08) * 0.1;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx + b.w/2, by + b.h/2, b.w/2 + 8 + Math.sin(frame * 0.05) * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.globalAlpha = 1;
  }

  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(bx - 6, by - 10, b.w + 12, 5);
  ctx.fillStyle = b.color;
  ctx.fillRect(bx - 6, by - 10, (b.w + 12) * (b.hp / b.maxHp), 5);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(bx - 6, by - 10, b.w + 12, 5);
  // Name
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, bx + b.w/2, by - 14);
}

function spawnBoss() {
  const dungeon = DUNGEONS[dungeonId];
  bossActive = {
    x: GW / 2 - 16, y: 60, w: 32, h: 32,

    damage: 3 + dungeonId, speed: 30 + dungeonId * 10,
    color: dungeon.color, element: dungeon.element,
    pattern: 'boss', phase: 0, phaseTimer: 0,
    moveTimer: 0, shootTimer: 0, dir: DIR_DOWN,
    flash: 0, invincible: 0
  };
}

// ============================================================
// MAP HELPERS
// ============================================================
function getBiome(sx, sy) {
  const biomes = [
    ['mountain','mountain','mountain','snow','snow','volcano'],
    ['forest','forest','mountain','forest','mountain','volcano'],
    ['forest','plains','forest','plains','desert','mountain'],
    ['plains','town','plains','forest','desert','desert'],
    ['swamp','plains','town_start','plains','coast','coast'],
    ['swamp','swamp','coast','coast','coast','coast']
  ];
  if (sy >= 0 && sy < 6 && sx >= 0 && sx < 6) return biomes[sy][sx];
  return 'plains';
}

function loadScreen(sx, sy) {
  if (!overworldData) return;
  if (sy >= 0 && sy < OW_H && sx >= 0 && sx < OW_W) {
    currentMap = overworldData[sy][sx];
  }
}

function isSolidAt(px, py) {
  const col = Math.floor(px / TILE);
  const row = Math.floor(py / TILE);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
  const tile = currentMap[row][col];
  if (SOLID.has(tile)) {
    // Check if player has crystal to pass barrier
    if (tile === T.BARRIER_WIND && player.crystals[0]) return false;
    if (tile === T.BARRIER_FIRE && player.crystals[1]) return false;
    if (tile === T.BARRIER_WATER && player.crystals[2]) return false;
    if (tile === T.BARRIER_EARTH && player.crystals[3]) return false;
    return true;
  }
  return false;
}

function isSolidTile(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return true;
  const tile = currentMap[row][col];
  if (SOLID.has(tile)) {
    if (tile === T.BARRIER_WIND && player.crystals[0]) return false;
    if (tile === T.BARRIER_FIRE && player.crystals[1]) return false;
    if (tile === T.BARRIER_WATER && player.crystals[2]) return false;
    if (tile === T.BARRIER_EARTH && player.crystals[3]) return false;
    return true;
  }
  return false;
}

function getTileAt(px, py) {
  const col = Math.floor(px / TILE);
  const row = Math.floor(py / TILE);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return T.WALL;
  return currentMap[row][col];
}

function startGame(loadSave) {
  player = createPlayer();
  overworldData = generateOverworld();
  totalScore = 0;
  comboCount = 0;
  comboTimer = 0;
  screensExplored = 0;
  overworldBoss = null;
  bonusLives = statB.lives; // ref 4 (init)

  if (loadSave) {
    loadGameState();
  }

  screenX = 2; screenY = 4;
  inDungeon = false;
  dungeonId = -1;
  dungeonRoom = 0;
  loadScreen(screenX, screenY);
  player.x = 10 * TILE;
  player.y = 12 * TILE;
  enemies = [];
  projectiles = [];
  pickups = [];
  bossActive = null;
  spawnEnemiesForScreen();
  spawnAmbientParticles(getBiome(screenX, screenY));
  state = 'playing';
  dialogText = '';
  dialogTimer = 0;

  // Pass 3: Show tutorial on first play
  if (!loadSave && showTutorial) {
    tutorialStep = 0;
    tutorialTimer = 6;
  }
}

// SAVE / LOAD
// ============================================================
function saveGameState() {
  const data = {
    level: player.level, xp: player.xp, hp: player.hp, maxHp: player.maxHp,
    mp: player.mp, maxMp: player.maxMp, gold: player.gold,
    crystals: player.crystals, activeCrystal: player.activeCrystal,
    armor: player.armor, shield: player.shield, boots: player.boots,
    potions: player.potions, keys: player.keys,
    screenX, screenY, attack: player.attack, defense: player.defense,
    totalScore: totalScore, bonusLives: bonusLives
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }
  catch (e) { console.error('Save failed:', e); }
}

function loadGameState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    player.level = data.level || 1;
    player.xp = data.xp || 0;
    player.hp = data.hp || 6;
    player.maxHp = data.maxHp || 6;
    player.mp = data.mp || 20;
    player.maxMp = data.maxMp || 20;
    player.gold = data.gold || 0;
    player.crystals = data.crystals || [false, false, false, false];
    player.activeCrystal = data.activeCrystal !== undefined ? data.activeCrystal : -1;
    player.armor = data.armor || 0;
    player.shield = data.shield || 0;
    player.boots = data.boots || false;
    player.potions = data.potions || 2;
    player.keys = data.keys || 0;
    player.attack = data.attack || 1;
    player.defense = data.defense || 0;
    screenX = data.screenX || 2;
    screenY = data.screenY || 4;
    player.xpToNext = 20 + (player.level - 1) * 15;
    totalScore = data.totalScore || 0;
    bonusLives = data.bonusLives !== undefined ? data.bonusLives : statB.lives;
  } catch (e) { console.error('Load failed:', e); }
}

function hasSave() {
  try { return !!localStorage.getItem(SAVE_KEY); }
  catch (e) { return false; }
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt) {
  if (player.invincible > 0) player.invincible -= dt;
  if (player.swinging) {
    player.swingTimer -= dt;
    if (player.swingTimer <= 0) player.swinging = false;
  }

  // MP regen (ref 8: WIS -> faster MP regen)
  if (player.mp < player.maxMp) {
    var regenRate = 2 * (1 + (statB.wis > 12 ? (statB.wis - 10) * 0.1 : 0));
    player.mp = Math.min(player.maxMp, player.mp + dt * regenRate);
  }

  // Pass 2: Poison damage over time
  if (player.poisonTimer > 0) {
    player.poisonTimer -= dt;
    player.poisonDamageTimer -= dt;
    if (player.poisonDamageTimer <= 0) {
      player.poisonDamageTimer = 1.0;
      player.hp -= 1;
      TAS.particles.spawn(player.x + 7, player.y + 7, '#6a4', 3, 2);
      addScorePopup(player.x + 7, player.y, '-1 POISON', '#6a4');
      if (player.hp <= 0) {
        player.hp = 0;
        deathTimer = 2;
        state = 'death';
        TAS.audio.playMelody([[440, 0.2], [392, 0.2], [349, 0.2], [330, 0.4]], 250);
      }
    }
  }

  // Movement (ref 2: DEX -> speed already applied in createPlayer)
  let dx = 0, dy = 0;
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) dx = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) dx = 1;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) dy = -1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) dy = 1;

  // Direction
  if (dx !== 0 || dy !== 0) {
    if (Math.abs(dx) >= Math.abs(dy)) {
      player.dir = dx > 0 ? DIR_RIGHT : DIR_LEFT;
    } else {
      player.dir = dy > 0 ? DIR_DOWN : DIR_UP;
    }
  }

  // Move with collision
  const spd = (player.boots ? player.speed * 1.4 : player.speed) * dt;
  if (dx !== 0) {
    const nx = player.x + dx * spd;
    if (!isSolidAt(nx, player.y) && !isSolidAt(nx + player.w - 1, player.y) &&
        !isSolidAt(nx, player.y + player.h - 1) && !isSolidAt(nx + player.w - 1, player.y + player.h - 1)) {
      player.x = nx;
    }
  }
  if (dy !== 0) {
    const ny = player.y + dy * spd;
    if (!isSolidAt(player.x, ny) && !isSolidAt(player.x + player.w - 1, ny) &&
        !isSolidAt(player.x, ny + player.h - 1) && !isSolidAt(player.x + player.w - 1, ny + player.h - 1)) {
      player.y = ny;
    }
  }

  // Step animation
  player.moving = (dx !== 0 || dy !== 0);
  if (player.moving) {
    player.stepTimer += dt;
    if (player.stepTimer > 0.15) {
      player.stepTimer = 0;
      player.animFrame = (player.animFrame + 1) % 4;
    }
  }

  // Charging (ref 9: WIS -> faster charge via statB.cooldown)
  if (keys['KeyX'] || keys['Space'] || touch.a) {
    if (!player.swinging && !player.charging) {
      player.charging = true;
      player.chargeTime = 0;
    }
    if (player.charging) {
      player.chargeTime += dt * (1 / statB.cooldown); // WIS reduces charge time
      if (player.chargeTime >= 2.0) player.chargeLevel = 3;
      else if (player.chargeTime >= 1.0) player.chargeLevel = 2;
      else if (player.chargeTime >= 0.3) player.chargeLevel = 1;
      else player.chargeLevel = 0;
    }
  } else if (player.charging) {
    // Release - attack!
    player.charging = false;
    performAttack();
  }

  // Use item (B button)
  if (keys['KeyZ'] || keys['KeyC'] || touch.b) {
    if (!player._bPressed) {
      player._bPressed = true;
      useItem();
    }
  } else {
    player._bPressed = false;
  }

  // Screen transitions
  if (player.x < 0) {
    if (screenX > 0 && !inDungeon) {
      transitionScreen(DIR_LEFT);
    } else { player.x = 0; }
  }
  if (player.x + player.w > COLS * TILE) {
    if (screenX < OW_W - 1 && !inDungeon) {
      transitionScreen(DIR_RIGHT);
    } else { player.x = COLS * TILE - player.w; }
  }
  if (player.y < 0) {
    if (inDungeon) {
      // Move to next dungeon room
      advanceDungeonRoom(1);
    } else if (screenY > 0) {
      transitionScreen(DIR_UP);
    } else { player.y = 0; }
  }
  if (player.y + player.h > ROWS * TILE) {
    if (inDungeon && dungeonRoom > 0) {
      advanceDungeonRoom(-1);
    } else if (screenY < OW_H - 1 && !inDungeon) {
      transitionScreen(DIR_DOWN);
    } else { player.y = ROWS * TILE - player.h; }
  }

  // Tile interactions
  checkTileInteraction();
}

function performAttack() {
  if (player.chargeLevel === 0) {
    // Quick sword swing (ref 5: STR -> damage already on player.attack)
    player.swinging = true;
    player.swingTimer = 0.2;
    player.swingDir = player.dir;
    TAS.audio.playTone(200, 0.08, 'sawtooth', 0.1, 300);
    checkSwordHit(1);
  } else if (player.activeCrystal >= 0 && player.crystals[player.activeCrystal]) {
    // Crystal projectile
    const mpCost = player.chargeLevel * 3;
    if (player.mp >= mpCost) {
      player.mp -= mpCost;
      fireCrystalShot(player.chargeLevel);
      TAS.audio.playTone(400 + player.activeCrystal * 100, 0.15, 'sine', 0.12, 800);
    } else {
      // Not enough MP, do sword
      player.swinging = true;
      player.swingTimer = 0.2;
      player.swingDir = player.dir;
      checkSwordHit(player.chargeLevel);
      TAS.audio.playTone(200, 0.08, 'sawtooth', 0.1, 300);
    }
  } else {
    // Charged sword
    player.swinging = true;
    player.swingTimer = 0.25;
    player.swingDir = player.dir;
    checkSwordHit(player.chargeLevel);
    TAS.audio.playTone(150, 0.12, 'sawtooth', 0.12, 400);
  }
  player.chargeLevel = 0;
  player.chargeTime = 0;
}

function checkSwordHit(power) {
  const range = 20;
  const sx = player.x + player.w / 2 + DX[player.dir] * range;
  const sy = player.y + player.h / 2 + DY[player.dir] * range;
  const hitW = 20, hitH = 20;

  // ref 10: STR -> sword damage multiplied by statB.damage
  var totalDmg = Math.floor((power + player.attack) * statB.damage);

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (TAS.hit.rectOverlap(sx - hitW/2, sy - hitH/2, hitW, hitH, e.x, e.y, e.w, e.h)) {
      damageEnemy(i, totalDmg);
    }
  }

  if (bossActive) {
    if (TAS.hit.rectOverlap(sx - hitW/2, sy - hitH/2, hitW, hitH,
        bossActive.x, bossActive.y, bossActive.w, bossActive.h)) {
      damageBoss(totalDmg);
    }
  }

  // Pass 2: hit overworld boss
  if (overworldBoss) {
    if (TAS.hit.rectOverlap(sx - hitW/2, sy - hitH/2, hitW, hitH,
        overworldBoss.x, overworldBoss.y, overworldBoss.w, overworldBoss.h)) {
      damageOverworldBoss(totalDmg);
    }
  }
}

function fireCrystalShot(power) {
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;
  const speed = 150 + power * 30;
  const colors = PAL.crystal;
  const crystal = player.activeCrystal;
  // ref 11: STR -> crystal projectile damage
  var projDmg = Math.floor((power + player.attack) * statB.damage) + (crystal === 1 ? 1 : 0);

  if (crystal === 2 && power >= 2) {
    // Water spread shot
    for (let a = -1; a <= 1; a++) {
      const angle = Math.atan2(DY[player.dir], DX[player.dir]) + a * 0.3;
      projectiles.push({
        x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        damage: projDmg, color: colors[crystal], element: crystal,
        size: 4 + power, life: 1.5, friendly: true
      });
    }
  } else {
    projectiles.push({
      x: cx, y: cy, vx: DX[player.dir] * speed, vy: DY[player.dir] * speed,
      damage: projDmg, color: colors[crystal], element: crystal,
      size: 4 + power * 2, life: crystal === 0 ? 2.0 : 1.5,
      friendly: true
    });
  }
}

function useItem() {
  if (player.potions > 0 && player.hp < player.maxHp) {
    player.potions--;
    player.hp = Math.min(player.maxHp, player.hp + 6);
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100);
    showDialog('Spore tonic used! Your baseling feels restored.');
    addScorePopup(player.x + 7, player.y - 5, '+HP', '#f88');
  } else if (player.potions <= 0) {
    showDialog('No spore tonics left!');
  } else {
    // Cycle active crystal
    cycleCrystal();
  }
}

function cycleCrystal() {
  let next = player.activeCrystal + 1;
  let attempts = 0;
  while (attempts < 5) {
    if (next > 3) next = -1;
    if (next === -1 || player.crystals[next]) {
      player.activeCrystal = next;
      const names = ['Gale Spore', 'Ember Spore', 'Tide Spore', 'Root Spore'];
      if (next === -1) showDialog('Mycelium blade equipped');
      else showDialog(names[next] + ' Crystal equipped');
      TAS.audio.playTone(440, 0.05, 'sine', 0.08);
      return;
    }
    next++;
    attempts++;
  }
}

function checkTileInteraction() {
  const tcx = Math.floor((player.x + player.w/2) / TILE);
  const tcy = Math.floor((player.y + player.h/2) / TILE);
  const tile = currentMap[tcy] ? currentMap[tcy][tcx] : T.EMPTY;

  switch (tile) {
    case T.DUNGEON_ENTRANCE:
      enterDungeon(tcx, tcy);
      break;
    case T.NPC:
      if (TAS.input.keys['KeyX'] || TAS.input.keys['Space'] || TAS.input.touch.a) {
        talkToNPC();
      }
      break;
    case T.SHOP:
      if (TAS.input.keys['KeyX'] || TAS.input.keys['Space'] || TAS.input.touch.a) {
        openShop();
      }
      break;
    case T.CHEST:
      openChest(tcx, tcy);
      break;
    case T.SAVE_POINT:
      saveGameState();
      showDialog('Game saved!');
      currentMap[tcy][tcx] = T.PATH; // prevent re-trigger
      setTimeout(() => { if (currentMap[tcy]) currentMap[tcy][tcx] = T.SAVE_POINT; }, 2000);
      break;
    case T.SIGN:
      showDialog('Welcome to Spore Village! Your baseling must find the 4 spore crystals to save the garden realm.');
      break;
    // Pass 2: hazard tile interactions
    case T.POISON_POOL:
      if (player.poisonTimer <= 0) {
        player.poisonTimer = 3;
        player.poisonDamageTimer = 1.0;
        addScorePopup(player.x + 7, player.y - 5, 'POISONED!', '#6a4');
        TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08, 80);
      }
      break;
    case T.SPORE_VENT:
      if (Math.random() < 0.02) {
        TAS.particles.spawn(tcx * TILE + 8, tcy * TILE + 4, '#c6f', 5, 3);
        damagePlayer(1);
        addScorePopup(player.x + 7, player.y - 5, 'SPORE BURST!', '#c6f');
      }
      break;
    case T.MUSHROOM_CLUSTER:
      // Small heal chance
      if (Math.random() < 0.01 && player.hp < player.maxHp) {
        player.hp = Math.min(player.maxHp, player.hp + 1);
        addScorePopup(player.x + 7, player.y - 5, '+1 HEAL', '#4c4');
        TAS.audio.playTone(600, 0.05, 'sine', 0.05);
      }
      break;
  }
}

// ============================================================
// SCREEN TRANSITIONS (Pass 3: enhanced transition)
// ============================================================
function transitionScreen(dir) {
  transitionDir = dir;
  transitionTimer = 0.3;

  switch (dir) {
    case DIR_LEFT:
      screenX--;
      player.x = COLS * TILE - player.w - 4;
      break;
    case DIR_RIGHT:
      screenX++;
      player.x = 4;
      break;
    case DIR_UP:
      screenY--;
      player.y = ROWS * TILE - player.h - 4;
      break;
    case DIR_DOWN:
      screenY++;
      player.y = 4;
      break;
  }

  loadScreen(screenX, screenY);
  enemies = [];
  projectiles = [];
  pickups = [];
  bossActive = null;
  overworldBoss = null;
  spawnEnemiesForScreen();
  spawnAmbientParticles(getBiome(screenX, screenY)); // Pass 3
}

function advanceDungeonRoom(direction) {
  dungeonRoom += direction;
  if (dungeonRoom < 0) {
    // Exit dungeon
    exitDungeon();
    return;
  }
  currentMap = generateDungeonRoom(dungeonId, dungeonRoom);
  if (direction > 0) {
    player.y = (ROWS - 3) * TILE;
  } else {
    player.y = 2 * TILE;
  }
  player.x = 9 * TILE;
  enemies = [];
  projectiles = [];
  pickups = [];
  bossActive = null;
  spawnEnemiesForScreen();
  TAS.audio.playTone(200, 0.1, 'square', 0.05);
}

function enterDungeon() {
  // Determine which dungeon based on screen
  if (screenX === 0 && screenY === 1) dungeonId = 0;
  else if (screenX === 4 && screenY === 0) dungeonId = 1;
  else if (screenX === 5 && screenY === 5) dungeonId = 2;
  else if (screenX === 0 && screenY === 5) dungeonId = 3;
  else if (screenX === 5 && screenY === 0) {
    // Final dungeon requires all crystals
    if (!player.crystals.every(c => c)) {
      showDialog('The Spore Tower requires all 4 spore crystal powers to enter...');
      return;
    }
    dungeonId = 4;
  } else return;

  inDungeon = true;
  dungeonRoom = 0;
  currentMap = generateDungeonRoom(dungeonId, dungeonRoom);
  player.x = 9 * TILE;
  player.y = (ROWS - 3) * TILE;
  enemies = [];
  projectiles = [];
  pickups = [];
  bossActive = null;
  overworldBoss = null;
  spawnEnemiesForScreen();
  spawnAmbientParticles('dungeon'); // Pass 3
  showDialog('Entering ' + DUNGEONS[dungeonId].name + '...');
  TAS.audio.playMelody([[220, 0.2], [196, 0.2], [175, 0.3]], 200);
}

function exitDungeon() {
  inDungeon = false;
  dungeonId = -1;
  dungeonRoom = 0;
  loadScreen(screenX, screenY);
  player.x = 10 * TILE;
  player.y = 6 * TILE;
  enemies = [];
  projectiles = [];
  pickups = [];
  bossActive = null;
  overworldBoss = null;
  spawnEnemiesForScreen();
  spawnAmbientParticles(getBiome(screenX, screenY)); // Pass 3
  showDialog('Your baseling escaped the fungal depths.');
}

// ============================================================
// COMBAT (Pass 1: statB wired into damage/drops/score)
// ============================================================
function damageEnemy(idx, damage) {
  const e = enemies[idx];
  if (e.stunTimer > 0) return;

  // Element weakness bonus
  if (player.activeCrystal >= 0) {
    const weakness = (player.activeCrystal + 2) % 4;
    if (e.element === weakness) damage = Math.floor(damage * 1.5);
  }

  e.hp -= damage;
  e.flash = 0.15;
  e.stunTimer = 0.2;
  TAS.audio.playTone(300, 0.05, 'square', 0.08, 100);
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#fff', 4, 3);

  // Pass 2: damage popup
  addScorePopup(e.x + e.w/2, e.y - 5, '-' + damage, '#f88');

  if (e.hp <= 0) {
    killEnemy(idx);
  }
}

function killEnemy(idx) {
  const e = enemies[idx];
  // Pass 3: bigger kill particles
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, e.color, 14, 5);
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#fff', 6, 3);
  TAS.audio.playTone(500, 0.1, 'sine', 0.08, 200);

  // ref 12: INT -> XP multiplier
  var xpGain = Math.floor(e.xp * statB.scoreMult);
  player.xp += xpGain;

  // Pass 2: score and combo
  comboCount++;
  comboTimer = 2.0;
  var killScore = Math.floor((e.xp * 10 + comboCount * 5) * statB.scoreMult); // ref 13: INT -> kill score
  totalScore += killScore;
  if (comboCount > 1) {
    addScorePopup(e.x + e.w/2, e.y - 10, '+' + killScore + ' x' + comboCount, '#ff0');
  } else {
    addScorePopup(e.x + e.w/2, e.y - 10, '+' + killScore, '#ff0');
  }

  checkLevelUp();

  // ref 14: CHA -> drop rate multiplied by statB.luck
  var dropChance = Math.random();
  var heartChance = 0.2 * statB.luck;
  var goldChance = 0.15 * statB.luck;
  var mpChance = 0.1 * statB.luck;
  var xpOrbChance = 0.08 * statB.luck;
  var sporeGemChance = 0.05 * statB.luck;

  if (dropChance < heartChance) {
    spawnPickup(e.x, e.y, 'heart');
  } else if (dropChance < heartChance + goldChance) {
    spawnPickup(e.x, e.y, 'gold');
  } else if (dropChance < heartChance + goldChance + mpChance) {
    spawnPickup(e.x, e.y, 'mp');
  } else if (dropChance < heartChance + goldChance + mpChance + xpOrbChance) {
    spawnPickup(e.x, e.y, 'xpOrb'); // Pass 2: new pickup
  } else if (dropChance < heartChance + goldChance + mpChance + xpOrbChance + sporeGemChance) {
    spawnPickup(e.x, e.y, 'sporeGem'); // Pass 2: new pickup
  }

  // Pass 2: poisonous enemies leave poison on death
  if (e.poisonous) {
    player.poisonTimer = 2;
    player.poisonDamageTimer = 1.0;
    addScorePopup(player.x + 7, player.y - 5, 'TOXIC SPLASH!', '#6a4');
  }

  enemies.splice(idx, 1);
}

function damageBoss(damage) {
  if (bossActive.invincible > 0) return;

  // Element weakness
  const bossWeak = (bossActive.element + 2) % 4;
  if (player.activeCrystal === bossWeak) damage = Math.floor(damage * 2);

  bossActive.hp -= damage;
  bossActive.flash = 0.2;
  bossActive.invincible = 0.3;
  TAS.fx.shake(3, 0.85);
  TAS.audio.playTone(200, 0.1, 'sawtooth', 0.12, 100);
  TAS.particles.spawn(bossActive.x + bossActive.w/2, bossActive.y + bossActive.h/2, '#fff', 8, 5);

  // Pass 2: boss damage popup
  addScorePopup(bossActive.x + bossActive.w/2, bossActive.y - 10, '-' + damage, '#f44');

  if (bossActive.hp <= 0) {
    defeatBoss();
  }
}

function defeatBoss() {
  TAS.fx.flash('#fff', 0.8);
  TAS.fx.shake(8, 0.9);
  TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]], 150);
  TAS.particles.spawn(bossActive.x + 16, bossActive.y + 16, bossActive.color, 30, 6);

  // Pass 2: boss score
  var bossScore = Math.floor(1000 * (1 + dungeonId * 0.5) * statB.scoreMult); // ref 15: INT -> boss score
  totalScore += bossScore;
  addScorePopup(bossActive.x + 16, bossActive.y - 20, '+' + bossScore + ' BOSS!', '#ff0');

  if (dungeonId < 4) {
    // Grant crystal
    player.crystals[dungeonId] = true;
    player.activeCrystal = dungeonId;
    const names = ['Gale Spore', 'Ember Spore', 'Tide Spore', 'Root Spore'];
    showDialog('You found the ' + names[dungeonId] + ' Crystal! Its mycelium power flows through your baseling.');
    player.xp += Math.floor((30 + dungeonId * 10) * statB.scoreMult); // ref 6 again
    checkLevelUp();
  } else {
    // Final boss defeated!
    victoryTimer = 5;
    state = 'victory';
  }

  bossActive = null;
  saveGameState();
}

function damagePlayer(amount) {
  if (player.invincible > 0) return;
  const reduction = player.defense + player.armor + Math.floor(player.shield * 0.5);
  const finalDmg = Math.max(1, amount - reduction);
  player.hp -= finalDmg;
  player.invincible = 1.0;
  TAS.fx.flash('#f00', 0.3);
  TAS.fx.shake(4, 0.85);
  TAS.audio.playTone(100, 0.15, 'sawtooth', 0.12, 50);
  addScorePopup(player.x + 7, player.y - 10, '-' + finalDmg, '#f44');

  if (player.hp <= 0) {
    player.hp = 0;
    // Pass 1: bonus lives from CON (statB.lives)
    if (bonusLives > 0) {
      bonusLives--;
      player.hp = Math.floor(player.maxHp * 0.3);
      player.invincible = 2.0;
      TAS.fx.flash('#ff0', 0.6);
      TAS.audio.playMelody([[440, 0.1], [554, 0.1], [659, 0.15]], 100);
      showDialog('Baseling resilience! Spore energy restored. ' + bonusLives + ' lives remaining.');
      addScorePopup(player.x + 7, player.y - 20, 'EXTRA LIFE!', '#ff0');
      return;
    }
    deathTimer = 2;
    state = 'death';
    TAS.audio.playMelody([[440, 0.2], [392, 0.2], [349, 0.2], [330, 0.4]], 250);
  }
}

function checkLevelUp() {
  while (player.xp >= player.xpToNext && player.level < 10) {
    player.level++;
    player.xp -= player.xpToNext;
    player.xpToNext = 20 + (player.level - 1) * 15;
    player.maxHp += 2;
    player.hp = player.maxHp;
    player.attack++;
    player.maxMp += 5;
    player.mp = player.maxMp;
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
    TAS.fx.flash('#ff0', 0.4);
    showDialog('Level up! Now level ' + player.level + '!');
    addScorePopup(player.x + 7, player.y - 20, 'LEVEL ' + player.level + '!', '#ff0');
    // Pass 3: level up particle burst
    TAS.particles.spawn(player.x + 7, player.y + 7, '#ff0', 15, 5);
    TAS.particles.spawn(player.x + 7, player.y + 7, '#fff', 8, 3);
  }
}

// ============================================================
// ENEMY AI
// ============================================================
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.flash > 0) e.flash -= dt;
    if (e.stunTimer > 0) { e.stunTimer -= dt; continue; }

    e.moveTimer += dt;
    e.animFrame = Math.floor(e.moveTimer * 4) % 2;

    switch (e.pattern) {
      case 'wander':
        updateWander(e, dt);
        break;
      case 'chase':
        updateChase(e, dt);
        break;
      case 'swoop':
        updateSwoop(e, dt);
        break;
      case 'shoot':
        updateShooter(e, dt);
        break;
      case 'charge':
        updateCharger(e, dt);
        break;
    }

    // Check collision with player
    if (player.invincible <= 0 && TAS.hit.rectOverlap(e.x, e.y, e.w, e.h,
        player.x, player.y, player.w, player.h)) {
      damagePlayer(e.damage);
    }
  }
}

function updateWander(e, dt) {
  if (Math.floor(e.moveTimer * 2) % 3 === 0) {
    if (Math.random() < dt * 2) {
      e.dir = TAS.math.randInt(0, 3);
    }
  }
  const spd = e.speed * dt;
  const nx = e.x + DX[e.dir] * spd;
  const ny = e.y + DY[e.dir] * spd;
  if (!isSolidAt(nx, ny) && nx > TILE && nx < (COLS-2)*TILE && ny > TILE && ny < (ROWS-2)*TILE) {
    e.x = nx; e.y = ny;
  } else {
    e.dir = (e.dir + TAS.math.randInt(1, 3)) % 4;
  }
}

function updateChase(e, dt) {
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 150 && dist > 0) {
    const spd = e.speed * dt;
    e.x += (dx / dist) * spd;
    e.y += (dy / dist) * spd;
  } else {
    updateWander(e, dt);
  }
}

function updateSwoop(e, dt) {
  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  // Swoop in sine pattern
  const spd = e.speed * dt;
  e.x += Math.sin(e.moveTimer * 3) * spd * 0.5;
  if (dist < 120) {
    e.x += (dx / dist) * spd * 0.7;
    e.y += (dy / dist) * spd * 0.7;
  } else {
    e.y += Math.cos(e.moveTimer * 2) * spd * 0.5;
    updateWander(e, dt);
  }
}

function updateShooter(e, dt) {
  e.shootTimer += dt;
  const dist = TAS.math.dist(e.x, e.y, player.x, player.y);

  if (dist < 120) {
    // Move away
    const dx = e.x - player.x;
    const dy = e.y - player.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    const spd = e.speed * dt * 0.5;
    const nx = e.x + (dx / d) * spd;
    const ny = e.y + (dy / d) * spd;
    if (!isSolidAt(nx, ny)) { e.x = nx; e.y = ny; }
  }

  if (e.shootTimer > 2.0 && dist < 160) {
    e.shootTimer = 0;
    const angle = TAS.math.angle(e.x, e.y, player.x, player.y);
    projectiles.push({
      x: e.x + e.w/2, y: e.y + e.h/2,
      vx: Math.cos(angle) * 80, vy: Math.sin(angle) * 80,
      damage: e.damage, color: e.color, element: e.element,
      size: 4, life: 2.0, friendly: false
    });
    TAS.audio.playTone(300, 0.05, 'sine', 0.04);
  }
}

function updateCharger(e, dt) {
  e.chargeTimer += dt;
  const dist = TAS.math.dist(e.x, e.y, player.x, player.y);

  if (dist < 100 && e.chargeTimer > 1.5) {
    // Charge at player
    e.chargeTimer = 0;
    const angle = TAS.math.angle(e.x, e.y, player.x, player.y);
    e._chargeVX = Math.cos(angle) * e.speed * 3;
    e._chargeVY = Math.sin(angle) * e.speed * 3;
    e._charging = 0.5;
  }

  if (e._charging > 0) {
    e._charging -= dt;
    e.x += e._chargeVX * dt;
    e.y += e._chargeVY * dt;
    // Clamp to bounds
    e.x = TAS.math.clamp(e.x, TILE, (COLS-2) * TILE);
    e.y = TAS.math.clamp(e.y, TILE, (ROWS-2) * TILE);
  } else {
    updateWander(e, dt);
  }
}

// ============================================================
// BOSS AI
// ============================================================
function updateBoss(dt) {
  if (!bossActive) return;
  const b = bossActive;
  if (b.flash > 0) b.flash -= dt;
  if (b.invincible > 0) b.invincible -= dt;

  b.phaseTimer += dt;
  b.moveTimer += dt;
  b.shootTimer += dt;

  // Phase changes
  if (b.hp < b.maxHp * 0.5 && b.phase === 0) {
    b.phase = 1;
    b.speed *= 1.5;
    TAS.fx.flash(b.color, 0.5);
  }

  // Movement - circle player
  const angle = b.moveTimer * (1 + b.phase * 0.5);
  const targetX = GW/2 + Math.cos(angle) * 80 - b.w/2;
  const targetY = 40 + Math.sin(angle * 0.7) * 50;
  b.x += (targetX - b.x) * dt * 2;
  b.y += (targetY - b.y) * dt * 2;

  // Attacks
  if (b.shootTimer > (b.phase === 0 ? 1.5 : 0.8)) {
    b.shootTimer = 0;

    if (b.phase === 0) {
      // Single aimed shot
      const a = TAS.math.angle(b.x + b.w/2, b.y + b.h/2, player.x + player.w/2, player.y + player.h/2);
      projectiles.push({
        x: b.x + b.w/2, y: b.y + b.h/2,
        vx: Math.cos(a) * 100, vy: Math.sin(a) * 100,
        damage: b.damage, color: b.color, element: b.element,
        size: 6, life: 2.5, friendly: false
      });
    } else {
      // Spread shot
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 + b.moveTimer;
        projectiles.push({
          x: b.x + b.w/2, y: b.y + b.h/2,
          vx: Math.cos(a) * 80, vy: Math.sin(a) * 80,
          damage: b.damage, color: b.color, element: b.element,
          size: 5, life: 2, friendly: false
        });
      }
    }
    TAS.audio.playTone(150, 0.1, 'sawtooth', 0.08);
  }

  // Contact damage
  if (player.invincible <= 0 && TAS.hit.rectOverlap(b.x, b.y, b.w, b.h,
      player.x, player.y, player.w, player.h)) {
    damagePlayer(b.damage);
  }
}

// ============================================================
// PROJECTILES
// ============================================================
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.life <= 0 || p.x < -10 || p.x > GW + 10 || p.y < -10 || p.y > GH + 10) {
      projectiles.splice(i, 1);
      continue;
    }

    // Collision check
    if (p.friendly) {
      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (TAS.hit.circleOverlap(p.x, p.y, p.size, e.x + e.w/2, e.y + e.h/2, e.w/2)) {
          damageEnemy(j, p.damage);
          TAS.particles.spawn(p.x, p.y, p.color, 4, 2);
          projectiles.splice(i, 1);
          break;
        }
      }
      // Hit boss
      if (bossActive && projectiles[i]) {
        if (TAS.hit.circleOverlap(p.x, p.y, p.size, bossActive.x + bossActive.w/2,
            bossActive.y + bossActive.h/2, bossActive.w/2)) {
          damageBoss(p.damage);
          TAS.particles.spawn(p.x, p.y, p.color, 4, 2);
          projectiles.splice(i, 1);
        }
      }
      // Hit overworld boss
      if (overworldBoss && projectiles[i]) {
        if (TAS.hit.circleOverlap(p.x, p.y, p.size, overworldBoss.x + overworldBoss.w/2,
            overworldBoss.y + overworldBoss.h/2, overworldBoss.w/2)) {
          damageOverworldBoss(p.damage);
          TAS.particles.spawn(p.x, p.y, p.color, 4, 2);
          projectiles.splice(i, 1);
        }
      }
    } else {
      // Hit player
      if (player.invincible <= 0 && TAS.hit.circleOverlap(p.x, p.y, p.size,
          player.x + player.w/2, player.y + player.h/2, player.w/2)) {
        damagePlayer(p.damage);
        TAS.particles.spawn(p.x, p.y, p.color, 4, 2);
        projectiles.splice(i, 1);
      }
    }
  }
}

// ============================================================
// PICKUPS (Pass 2: new pickup types)
// ============================================================
function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.timer -= dt * 60;
    if (p.timer <= 0) { pickups.splice(i, 1); continue; }

    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, 12, 12)) {
      switch (p.type) {
        case 'heart':
          player.hp = Math.min(player.maxHp, player.hp + 2);
          TAS.audio.playTone(600, 0.08, 'sine', 0.08);
          addScorePopup(p.x + 6, p.y, '+HP', '#f88');
          break;
        case 'gold':
          var goldAmt = TAS.math.randInt(3, 8);
          player.gold += goldAmt;
          TAS.audio.playTone(800, 0.05, 'sine', 0.06);
          addScorePopup(p.x + 6, p.y, '+' + goldAmt + 'P', '#f4b41b');
          break;
        case 'mp':
          player.mp = Math.min(player.maxMp, player.mp + 8);
          TAS.audio.playTone(700, 0.08, 'triangle', 0.07);
          addScorePopup(p.x + 6, p.y, '+MP', '#88f');
          break;
        case 'xpOrb': // Pass 2
          var xpAmt = Math.floor(TAS.math.randInt(5, 12) * statB.scoreMult);
          player.xp += xpAmt;
          TAS.audio.playMelody([[400, 0.05], [600, 0.08]], 60);
          addScorePopup(p.x + 6, p.y, '+' + xpAmt + ' XP', '#af4');
          checkLevelUp();
          break;
        case 'sporeGem': // Pass 2
          var gemScore = Math.floor(100 * statB.scoreMult);
          totalScore += gemScore;
          player.mp = Math.min(player.maxMp, player.mp + 4);
          TAS.audio.playMelody([[523, 0.06], [784, 0.1]], 80);
          addScorePopup(p.x + 6, p.y, '+' + gemScore + ' SPORE GEM', '#a855f7');
          TAS.particles.spawn(p.x + 6, p.y + 6, '#c4f', 8, 3);
          break;
      }
      TAS.particles.spawn(p.x + 6, p.y + 6, '#ff0', 5, 2);
      pickups.splice(i, 1);
    }
  }
}

function updateShop(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowUp'] || touch.up) {
    if (!player._shopUp) { shopCursor = Math.max(0, shopCursor - 1); player._shopUp = true; }
  } else { player._shopUp = false; }

  if (keys['ArrowDown'] || touch.down) {
    if (!player._shopDown) { shopCursor = Math.min(shopItems.length - 1, shopCursor + 1); player._shopDown = true; }
  } else { player._shopDown = false; }

  if (keys['KeyX'] || keys['Space'] || touch.a) {
    if (!player._shopBuy) {
      player._shopBuy = true;
      const item = shopItems[shopCursor];
      if (player.gold >= item.cost) {
        player.gold -= item.cost;
        item.action();
        TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.12]], 80);
        showDialog('Bought ' + item.name + '!');
        shopOpen = false;
      } else {
        showDialog('Not enough POOP! Need ' + item.cost + 'P.');
      }
    }
  } else { player._shopBuy = false; }

  if (keys['Escape'] || keys['KeyZ'] || touch.b) {
    shopOpen = false;
  }
}

function openChest(cx, cy) {
  currentMap[cy][cx] = T.FLOOR; // remove chest
  TAS.audio.playMelody([[440, 0.1], [554, 0.1], [659, 0.15]], 120);
  TAS.particles.spawn(cx * TILE + 8, cy * TILE + 8, '#ff0', 10, 3);
