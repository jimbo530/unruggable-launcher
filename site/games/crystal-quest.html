  TAS.particles.spawn(cx * TILE + 8, cy * TILE + 8, '#fff', 6, 2);

  // Random reward (ref 14: CHA -> better chest loot via statB.luck)
  const roll = Math.random();
  var luckBonus = statB.luck > 1 ? 0.1 : 0;
  if (roll < 0.3 + luckBonus) {
    var potCount = statB.luck > 1.2 ? 3 : 2;
    player.potions += potCount;
    showDialog('Found ' + potCount + ' spore tonics!');
    addScorePopup(cx * TILE + 8, cy * TILE, '+' + potCount + ' TONIC', '#f88');
  } else if (roll < 0.6 + luckBonus) {
    const gold = TAS.math.randInt(15, Math.floor(40 * statB.luck));
    player.gold += gold;
    showDialog('Found ' + gold + ' POOP tokens!');
    addScorePopup(cx * TILE + 8, cy * TILE, '+' + gold + 'P', '#f4b41b');
  } else if (roll < 0.8) {
    player.keys++;
    showDialog('Found a garden seed key!');
    addScorePopup(cx * TILE + 8, cy * TILE, '+SEED KEY', '#f4b41b');
  } else {
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    showDialog('Found a mycelium crystal! Full restore!');
    addScorePopup(cx * TILE + 8, cy * TILE, 'FULL RESTORE!', '#a855f7');
    TAS.particles.spawn(cx * TILE + 8, cy * TILE + 8, '#4ff', 12, 4);
  }
}

// ============================================================
// MENU
// ============================================================
function updateMenu(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowUp'] || touch.up) {
    if (!player._menuUp) { menuCursor = Math.max(0, menuCursor - 1); player._menuUp = true; }
  } else { player._menuUp = false; }

  if (keys['ArrowDown'] || touch.down) {
    if (!player._menuDown) { menuCursor = Math.min(3, menuCursor + 1); player._menuDown = true; }
  } else { player._menuDown = false; }

  if (keys['Escape'] || keys['KeyM'] || touch.b) {
    if (!player._menuClose) { menuOpen = false; player._menuClose = true; }
  } else { player._menuClose = false; }

  if (keys['KeyX'] || keys['Space'] || touch.a) {
    if (!player._menuSelect) {
      player._menuSelect = true;
      switch (menuCursor) {
        case 0: useItem(); menuOpen = false; break;
        case 1: cycleCrystal(); menuOpen = false; break;
        case 2: saveGameState(); showDialog('Game saved!'); menuOpen = false; break;
        case 3: menuOpen = false; break;
      }
    }
  } else { player._menuSelect = false; }
}

// ============================================================
// TUTORIAL (Pass 3)
// ============================================================
function updateTutorial(dt) {
  if (!showTutorial || tutorialTimer <= 0) return;
  tutorialTimer -= dt;
  if (tutorialTimer <= 0) {
    tutorialStep++;
    if (tutorialStep >= 4) {
      showTutorial = false;
    } else {
      tutorialTimer = 5;
    }
  }
  // Skip tutorial on any button press
  if (TAS.input.keys['Space'] || TAS.input.keys['KeyX'] || TAS.input.touch.a) {
    showTutorial = false;
    tutorialTimer = 0;
  }
}

function drawTutorial() {
  if (!showTutorial || tutorialTimer <= 0) return;

  ctx.fillStyle = 'rgba(0,0,20,0.85)';
  ctx.fillRect(20, 20, GW - 40, 60);
  ctx.strokeStyle = '#a855f7';
  ctx.strokeRect(20, 20, GW - 40, 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';

  var messages = [
    ['MOVE with Arrow Keys or WASD', 'Guide your baseling through crystal gardens!'],
    ['ATTACK with X/Space (hold to charge)', 'Defeat spore creatures to earn XP and POOP!'],
    ['USE TONIC with Z/C when hurt', 'Open MENU with M or Escape'],
    ['Find all 4 SPORE CRYSTALS to unlock', 'the final Spore Tower dungeon!']
  ];

  var step = Math.min(tutorialStep, messages.length - 1);
  ctx.fillText(messages[step][0], GW / 2, 42);
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText(messages[step][1], GW / 2, 58);

  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  ctx.fillText('Press A to skip tutorial', GW / 2, 74);
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateAmbientParticles(dt);

  // Pass 2: combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    // C key / C touch button opens the baseling picker
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.keys['KeyX'] || TAS.input.touch.a) {
      if (!player) {
        TAS.audio.ensureAudio();
        if (hasSave()) startGame(true);
        else startGame(false);
      }
    }
    return;
  }

  if (state === 'death') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      // Respawn with half HP at save point
      player.hp = Math.floor(player.maxHp / 2);
      player.gold = Math.floor(player.gold * 0.8);
      if (inDungeon) exitDungeon();
      screenX = 2; screenY = 4;
      loadScreen(screenX, screenY);
      player.x = 10 * TILE; player.y = 12 * TILE;
      enemies = []; projectiles = []; pickups = [];
      overworldBoss = null;
      spawnEnemiesForScreen();
      spawnAmbientParticles(getBiome(screenX, screenY));
      state = 'playing';
    }
    return;
  }

  if (state === 'victory') {
    victoryTimer -= dt;
    if (victoryTimer <= 0) {
      state = 'credits';
    }
    return;
  }

  if (state === 'credits') {
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.touch.a) {
      state = 'title';
      player = null;
    }
    return;
  }

  if (state !== 'playing') return;

  // Pass 3: tutorial
  updateTutorial(dt);

  // Dialog
  if (dialogTimer > 0) {
    dialogTimer -= dt;
    if (TAS.input.keys['KeyX'] || TAS.input.keys['Space'] || TAS.input.touch.a) {
      dialogTimer = Math.min(dialogTimer, 0.3);
    }
    return; // pause gameplay during dialog
  }

  // Shop
  if (shopOpen) {
    updateShop(dt);
    return;
  }

  // Menu
  if (TAS.input.keys['Escape'] || TAS.input.keys['KeyM']) {
    if (!player._menuToggle) { menuOpen = !menuOpen; menuCursor = 0; player._menuToggle = true; }
  } else { player._menuToggle = false; }

  if (menuOpen) {
    updateMenu(dt);
    return;
  }

  // Transition
  if (transitionTimer > 0) {
    transitionTimer -= dt;
    return;
  }

  updatePlayer(dt);
  updateEnemies(dt);
  updateBoss(dt);
  updateOverworldBoss(dt);
  updateProjectiles(dt);
  updatePickups(dt);
}

// ============================================================
// DRAWING
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'credits') {
    drawCredits();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Draw map
  drawMap();

  // Pass 3: ambient particles behind entities
  drawAmbientParticles();

  // Draw pickups
  drawPickups();

  // Draw enemies
  drawEnemies();

  // Draw boss
  if (bossActive) drawBoss();

  // Draw overworld boss
  drawOverworldBoss();

  // Draw projectiles
  drawProjectiles();

  // Draw player (Pass 1: baseling appearance)
  drawPlayer();

  // Particles
  TAS.particles.draw();

  // Pass 2: score popups
  drawScorePopups();

  ctx.restore();

  // Screen flash
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Dialog
  if (dialogTimer > 0) drawDialog();

  // Shop
  if (shopOpen) drawShop();

  // Menu
  if (menuOpen) drawMenu();

  // Pass 3: Tutorial overlay
  drawTutorial();

  // Death overlay (Pass 3: enhanced)
  if (state === 'death') {
    var deathAlpha = (1 - deathTimer / 2) * 0.7;
    ctx.fillStyle = 'rgba(80,0,0,' + deathAlpha + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('BASELING DOWN', GW/2, GH/2 - 20);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText('Returning to Spore Village...', GW/2, GH/2 + 5);
    if (bonusLives <= 0) {
      ctx.fillStyle = '#888';
      ctx.font = '8px monospace';
      ctx.fillText('Score: ' + totalScore, GW/2, GH/2 + 25);
    }
  }

  // Victory (Pass 3: enhanced)
  if (state === 'victory') {
    var vicAlpha = (1 - victoryTimer / 5) * 0.8;
    ctx.fillStyle = 'rgba(255,255,255,' + vicAlpha + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('VICTORY!', GW/2, GH/2 - 30);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('The Spore Tower crumbles...', GW/2, GH/2 - 5);
    ctx.fillText('The crystal gardens bloom again.', GW/2, GH/2 + 12);
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.fillText('Final Score: ' + totalScore, GW/2, GH/2 + 35);
    // Pass 3: victory sparkles
    for (var vs = 0; vs < 8; vs++) {
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.04 + vs) * 0.3;
      ctx.fillStyle = PAL.crystal[vs % 4];
      var vsx = GW/2 + Math.cos(frame * 0.02 + vs * 0.8) * 80;
      var vsy = GH/2 + Math.sin(frame * 0.025 + vs * 0.8) * 50;
      ctx.fillRect(vsx, vsy, 3, 3);
    }
    ctx.globalAlpha = 1;
  }

  // Transition wipe (Pass 3: directional wipe)
  if (transitionTimer > 0) {
    const progress = transitionTimer / 0.3;
    ctx.fillStyle = '#000';
    if (transitionDir === DIR_LEFT || transitionDir === DIR_RIGHT) {
      var wipeW = GW * progress;
      ctx.fillRect(transitionDir === DIR_RIGHT ? 0 : GW - wipeW, 0, wipeW, GH);
    } else if (transitionDir === DIR_UP || transitionDir === DIR_DOWN) {
      var wipeH = GH * progress;
      ctx.fillRect(0, transitionDir === DIR_DOWN ? 0 : GH - wipeH, GW, wipeH);
    } else {
      ctx.globalAlpha = progress;
      ctx.fillRect(0, 0, GW, GH);
      ctx.globalAlpha = 1;
    }
  }

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// DRAW MAP (Pass 3: zone-tinted backgrounds)
// ============================================================
function drawMap() {
  if (!currentMap) return;

  // Pass 3: subtle zone tint overlay
  var biome = inDungeon ? 'dungeon' : getBiome(screenX, screenY);
  var tint = null;
  switch (biome) {
    case 'volcano': tint = 'rgba(255,40,0,0.04)'; break;
    case 'snow': tint = 'rgba(180,200,240,0.06)'; break;
    case 'swamp': tint = 'rgba(40,80,20,0.05)'; break;
    case 'dungeon': tint = 'rgba(30,0,60,0.06)'; break;
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = currentMap[r][c];
      const x = c * TILE;
      const y = r * TILE;
      drawTile(tile, x, y, c, r);
    }
  }

  // Apply zone tint over map
  if (tint) {
    ctx.fillStyle = tint;
    ctx.fillRect(0, 0, GW, PLAY_H);
  }
}

function drawTile(tile, x, y, c, r) {
  switch (tile) {
    case T.GRASS:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.grass : PAL.grassL;
      ctx.fillRect(x, y, TILE, TILE);
      break;
    case T.TREE:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      // Trunk
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(x + 6, y + 10, 4, 6);
      // Canopy
      ctx.fillStyle = PAL.treeTop;
      ctx.fillRect(x + 2, y + 2, 12, 10);
      ctx.fillStyle = '#3a8a2a';
      ctx.fillRect(x + 4, y + 4, 8, 6);
      break;
    case T.WATER:
      ctx.fillStyle = ((c + r + Math.floor(frame * 0.02)) % 2 === 0) ? PAL.water : PAL.waterL;
      ctx.fillRect(x, y, TILE, TILE);
      // Wave lines
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.moveTo(x + 2, y + 6 + Math.sin(frame * 0.05 + c) * 2);
      ctx.lineTo(x + 14, y + 6 + Math.sin(frame * 0.05 + c + 1) * 2);
      ctx.stroke();
      break;
    case T.SAND:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.sand : PAL.sandL;
      ctx.fillRect(x, y, TILE, TILE);
      // Pass 3: sand grain detail
      if ((c * 7 + r * 3) % 5 === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(x + 5, y + 5, 1, 1);
        ctx.fillRect(x + 10, y + 11, 1, 1);
      }
      break;
    case T.MOUNTAIN:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.mountain;
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 2);
      ctx.lineTo(x + 14, y + 14);
      ctx.lineTo(x + 2, y + 14);
      ctx.fill();
      ctx.fillStyle = PAL.mountainL;
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 2);
      ctx.lineTo(x + 11, y + 8);
      ctx.lineTo(x + 5, y + 8);
      ctx.fill();
      break;
    case T.PATH:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      if ((c + r) % 3 === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(x + 4, y + 4, 3, 3);
      }
      break;
    case T.SWAMP:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.swamp : PAL.swampL;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = 'rgba(0,100,0,0.3)';
      ctx.fillRect(x + 3, y + 10, 2, 4);
      break;
    case T.LAVA:
      ctx.fillStyle = '#cc2200';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#ff' + (Math.floor(Math.sin(frame * 0.1 + c * r) * 30 + 60)).toString(16) + '00';
      ctx.fillRect(x + 2, y + 2, 12, 12);
      // Pass 3: lava glow
      ctx.globalAlpha = 0.1 + Math.sin(frame * 0.08 + c) * 0.05;
      ctx.fillStyle = '#f80';
      ctx.fillRect(x - 1, y - 1, TILE + 2, TILE + 2);
      ctx.globalAlpha = 1;
      break;
    case T.WALL: case T.CAVE_WALL:
      ctx.fillStyle = PAL.wall;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.wallL;
      ctx.fillRect(x + 1, y + 1, 6, 6);
      ctx.fillRect(x + 9, y + 9, 6, 6);
      break;
    case T.FLOOR:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.floor : PAL.floorL;
      ctx.fillRect(x, y, TILE, TILE);
      break;
    case T.DOOR:
      ctx.fillStyle = '#553311';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#aa8844';
      ctx.fillRect(x + 3, y + 2, 10, 12);
      break;
    case T.BARRIER_WIND:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.wind;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
      ctx.fillRect(x + 2, y + 2, 12, 12);
      ctx.globalAlpha = 1;
      break;
    case T.BARRIER_FIRE:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.fire;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
      ctx.fillRect(x + 2, y + 2, 12, 12);
      ctx.globalAlpha = 1;
      break;
    case T.BARRIER_WATER:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.ice;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.07) * 0.3;
      ctx.fillRect(x + 2, y + 2, 12, 12);
      ctx.globalAlpha = 1;
      break;
    case T.BARRIER_EARTH:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = PAL.earth;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06) * 0.3;
      ctx.fillRect(x + 2, y + 2, 12, 12);
      ctx.globalAlpha = 1;
      break;
    case T.CHEST:
      ctx.fillStyle = PAL.floor;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#886622';
      ctx.fillRect(x + 2, y + 5, 12, 9);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(x + 6, y + 8, 4, 3);
      // Pass 3: chest sparkle
      if (Math.floor(frame * 0.04) % 3 === 0) {
        ctx.fillStyle = '#ff0';
        ctx.fillRect(x + 3 + (frame % 8), y + 4, 2, 2);
      }
      break;
    case T.NPC:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      // Person
      ctx.fillStyle = '#eeb';
      ctx.fillRect(x + 5, y + 2, 6, 5); // head
      ctx.fillStyle = '#44c';
      ctx.fillRect(x + 4, y + 7, 8, 8); // body
      break;
    case T.SHOP:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#664422';
      ctx.fillRect(x + 1, y + 4, 14, 11);
      ctx.fillStyle = '#f4b41b';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('S', x + 8, y + 12);
      break;
    case T.SAVE_POINT:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = 'hsl(' + (frame % 360) + ', 80%, 60%)';
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 5 + Math.sin(frame * 0.05) * 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case T.HOUSE:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#553322';
      ctx.fillRect(x + 1, y + 6, 14, 10);
      // Roof
      ctx.fillStyle = '#882222';
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 1);
      ctx.lineTo(x + 15, y + 7);
      ctx.lineTo(x + 1, y + 7);
      ctx.fill();
      break;
    case T.DUNGEON_ENTRANCE:
      ctx.fillStyle = inDungeon ? PAL.floor : PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 3, y + 3, 10, 10);
      ctx.fillStyle = '#111';
      ctx.fillRect(x + 5, y + 5, 6, 6);
      // Glow
      const glowColor = DUNGEONS[getDungeonAtScreen()] ? DUNGEONS[getDungeonAtScreen()].color : '#888';
      ctx.strokeStyle = glowColor;
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.strokeRect(x + 3, y + 3, 10, 10);
      ctx.globalAlpha = 1;
      break;
    case T.FLOWER:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.grass : PAL.grassL;
      ctx.fillRect(x, y, TILE, TILE);
      const fc = ['#f4a', '#ff4', '#f84', '#4af'][(c * 3 + r * 7) % 4];
      ctx.fillStyle = fc;
      ctx.fillRect(x + 6, y + 5, 4, 4);
      ctx.fillStyle = '#2a4';
      ctx.fillRect(x + 7, y + 9, 2, 5);
      break;
    case T.SIGN:
      ctx.fillStyle = PAL.path;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#664';
      ctx.fillRect(x + 7, y + 8, 2, 7);
      ctx.fillRect(x + 3, y + 3, 10, 6);
      break;
    case T.BRIDGE:
      ctx.fillStyle = PAL.water;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#886644';
      ctx.fillRect(x + 2, y + 4, 12, 8);
      break;
    case T.VOLCANO:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#443';
      ctx.beginPath();
      ctx.moveTo(x + 8, y + 1);
      ctx.lineTo(x + 15, y + 15);
      ctx.lineTo(x + 1, y + 15);
      ctx.fill();
      ctx.fillStyle = '#f40';
      ctx.fillRect(x + 6, y + 1, 4, 3);
      break;
    // Pass 2: new hazard tiles
    case T.POISON_POOL:
      ctx.fillStyle = '#2a3a15';
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#4a6';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06 + c * 2) * 0.2;
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Bubble
      if (Math.floor(frame * 0.02 + c) % 5 === 0) {
        ctx.fillStyle = '#8c8';
        ctx.beginPath();
        ctx.arc(x + 5 + (frame % 6), y + 5, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case T.MUSHROOM_CLUSTER:
      ctx.fillStyle = ((c + r) % 2 === 0) ? PAL.grass : PAL.grassL;
      ctx.fillRect(x, y, TILE, TILE);
      // Mushroom caps
      ctx.fillStyle = '#c84';
      ctx.beginPath();
      ctx.arc(x + 5, y + 8, 4, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#a64';
      ctx.beginPath();
      ctx.arc(x + 11, y + 10, 3, Math.PI, 0);
      ctx.fill();
      // Stems
      ctx.fillStyle = '#eec';
      ctx.fillRect(x + 4, y + 8, 2, 5);
      ctx.fillRect(x + 10, y + 10, 2, 4);
      // Spots
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 4, y + 6, 1, 1);
      ctx.fillRect(x + 6, y + 7, 1, 1);
      break;
    case T.SPORE_VENT:
      ctx.fillStyle = PAL.grass;
      ctx.fillRect(x, y, TILE, TILE);
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(x + 8, y + 10, 4, 0, Math.PI * 2);
      ctx.fill();
      // Spore puff
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08 + r) * 0.15;
      ctx.fillStyle = '#c6f';
      ctx.beginPath();
      ctx.arc(x + 8, y + 4 - Math.sin(frame * 0.04) * 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    default:
      ctx.fillStyle = '#111';
      ctx.fillRect(x, y, TILE, TILE);
  }
}

function getDungeonAtScreen() {
  if (screenX === 0 && screenY === 1) return 0;
  if (screenX === 4 && screenY === 0) return 1;
  if (screenX === 5 && screenY === 5) return 2;
  if (screenX === 0 && screenY === 5) return 3;
  if (screenX === 5 && screenY === 0) return 4;
  return -1;
}

// ============================================================
// DRAW PLAYER (Pass 1: player IS a baseling)
// ============================================================
function drawPlayer() {
  if (!player) return;
  const px = Math.floor(player.x);
  const py = Math.floor(player.y);

  // Blink during invincibility
  if (player.invincible > 0 && Math.floor(frame * 0.3) % 2 === 0) return;

  // Pass 2: poison visual
  if (player.poisonTimer > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#6a4';
    ctx.beginPath();
    ctx.arc(px + 7, py + 7, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  var _anim = (player.hp <= 0) ? 'ko' : (player.swinging || player.charging) ? 'attack' : (player.moving ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, px + 7, py + 7, 14, { flipX: player.dir === DIR_LEFT, frame: frame, anim: _anim })) {
    // Body - baseling color from statB
    ctx.fillStyle = statB.color;
    ctx.fillRect(px + 2, py + 4, 10, 10);

    // Head - slightly lighter baseling
    ctx.fillStyle = statB.color;
    ctx.fillRect(px + 3, py, 8, 6);
    // Highlight on head
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.15;
    ctx.fillRect(px + 4, py + 1, 4, 2);
    ctx.globalAlpha = 1;

    // Eyes
    ctx.fillStyle = '#222';
    if (player.dir === DIR_DOWN || player.dir === DIR_LEFT) ctx.fillRect(px + 4, py + 2, 2, 2);
    if (player.dir === DIR_DOWN || player.dir === DIR_RIGHT) ctx.fillRect(px + 8, py + 2, 2, 2);
    if (player.dir === DIR_UP) {
      ctx.fillRect(px + 4, py + 1, 2, 2);
      ctx.fillRect(px + 8, py + 1, 2, 2);
    }
    // Eye shine
    ctx.fillStyle = '#fff';
    if (player.dir === DIR_DOWN || player.dir === DIR_LEFT) ctx.fillRect(px + 4, py + 2, 1, 1);
    if (player.dir === DIR_DOWN || player.dir === DIR_RIGHT) ctx.fillRect(px + 8, py + 2, 1, 1);

    // Baseling icon letter on body
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5;
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, px + 7, py + 12);
    ctx.globalAlpha = 1;

    // Legs (animate)
    ctx.fillStyle = statB.color;
    const legOff = player.animFrame % 2 === 0 ? 0 : 2;
    ctx.fillRect(px + 3, py + 12, 3, 3 - legOff);
    ctx.fillRect(px + 8, py + 12, 3, 1 + legOff);
  }

  // Sword swing
  if (player.swinging) {
    ctx.fillStyle = '#ddd';
    const sLen = 10;
    const sx = px + 7 + DX[player.swingDir] * sLen;
    const sy = py + 7 + DY[player.swingDir] * sLen;
    ctx.fillRect(sx - 2, sy - 2, 5, 5);
    // Swing arc
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px + 7, py + 7, 12,
      Math.atan2(DY[player.swingDir], DX[player.swingDir]) - 0.5,
      Math.atan2(DY[player.swingDir], DX[player.swingDir]) + 0.5);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Charge indicator
  if (player.charging && player.chargeLevel > 0) {
    const colors = ['#8f8', '#ff8', '#f88'];
    ctx.strokeStyle = colors[player.chargeLevel - 1];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px + 7, py + 7, 10 + player.chargeLevel * 2, 0, Math.PI * 2 * (player.chargeTime / 2));
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Active crystal glow
  if (player.activeCrystal >= 0) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = PAL.crystal[player.activeCrystal];
    ctx.beginPath();
    ctx.arc(px + 7, py + 7, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAW ENEMIES (Pass 2: new enemy sprites, Pass 3: enhanced visuals)
// ============================================================
function drawEnemies() {
  for (const e of enemies) {
    const ex = Math.floor(e.x);
    const ey = Math.floor(e.y);

    if (e.flash > 0) {
      ctx.fillStyle = '#fff';
    } else {
      ctx.fillStyle = e.color;
    }

    // Basic enemy shape based on type
    switch (e.type) {
      case 'slime':
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + e.h/2 + 2, e.w/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + 3, ey + 4, 2, 2);
        ctx.fillRect(ex + 7, ey + 4, 2, 2);
        break;
      case 'bat':
        ctx.fillRect(ex + 3, ey + 3, 4, 4);
        // Wings
        const wingOff = Math.sin(frame * 0.2) * 3;
        ctx.fillRect(ex - 2, ey + 2 + wingOff, 4, 3);
        ctx.fillRect(ex + 8, ey + 2 - wingOff, 4, 3);
        break;
      case 'skeleton':
        ctx.fillRect(ex + 3, ey, 8, 6); // skull
        ctx.fillRect(ex + 4, ey + 6, 6, 8); // body
        ctx.fillStyle = '#222';
        ctx.fillRect(ex + 4, ey + 2, 2, 2);
        ctx.fillRect(ex + 8, ey + 2, 2, 2);
        break;
      case 'wizard':
        ctx.fillRect(ex + 3, ey + 4, 8, 10);
        // Hat
        ctx.beginPath();
        ctx.moveTo(ex + e.w/2, ey);
        ctx.lineTo(ex + e.w - 2, ey + 5);
        ctx.lineTo(ex + 2, ey + 5);
        ctx.fill();
        break;
      case 'golem':
        ctx.fillRect(ex, ey + 2, e.w, e.h - 2);
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#543';
        ctx.fillRect(ex + 3, ey + 5, 3, 3);
        ctx.fillRect(ex + 10, ey + 5, 3, 3);
        break;
      // Pass 2: new enemy sprites
      case 'mushroomKnight':
        // Cap
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + 4, 7, Math.PI, 0);
        ctx.fill();
        // Body
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#eec';
        ctx.fillRect(ex + 4, ey + 4, e.w - 8, e.h - 4);
        // Shield
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#886';
        ctx.fillRect(ex, ey + 6, 4, 6);
        // Spots on cap
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + 5, ey + 1, 2, 2);
        ctx.fillRect(ex + 9, ey + 2, 2, 2);
        break;
      case 'sporeHound':
        // Body
        ctx.fillRect(ex + 2, ey + 3, e.w - 4, e.h - 5);
        // Head
        ctx.fillRect(ex + e.w - 5, ey + 1, 5, 5);
        // Legs (animated)
        var legA = Math.sin(frame * 0.15) * 2;
        ctx.fillRect(ex + 3, ey + e.h - 3 + legA, 2, 3);
        ctx.fillRect(ex + e.w - 5, ey + e.h - 3 - legA, 2, 3);
        // Eyes
        ctx.fillStyle = '#ff0';
        ctx.fillRect(ex + e.w - 4, ey + 2, 1, 1);
        break;
      case 'moldWraith':
        // Ghostly body
        ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08) * 0.2;
        ctx.fillRect(ex + 3, ey + 2, e.w - 6, e.h - 2);
        // Hood
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + 4, 5, Math.PI, 0);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Eyes
        ctx.fillStyle = '#f44';
        ctx.fillRect(ex + 5, ey + 5, 2, 2);
        ctx.fillRect(ex + e.w - 7, ey + 5, 2, 2);
        // Trailing wisps
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = e.color;
        ctx.fillRect(ex + 4, ey + e.h - 2, 2, 3 + Math.sin(frame * 0.1) * 2);
        ctx.fillRect(ex + e.w - 6, ey + e.h - 2, 2, 3 + Math.cos(frame * 0.1) * 2);
        ctx.globalAlpha = 1;
        break;
      case 'fungalTitan':
        // Massive body
        ctx.fillRect(ex + 1, ey + 4, e.w - 2, e.h - 4);
        // Mushroom head
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + 5, e.w/2 - 1, Math.PI, 0);
        ctx.fill();
        // Eyes
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#300';
        ctx.fillRect(ex + 4, ey + 7, 3, 3);
        ctx.fillRect(ex + e.w - 7, ey + 7, 3, 3);
        // Spots
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + 5, ey + 1, 2, 2);
        ctx.fillRect(ex + e.w/2, ey, 2, 2);
        ctx.fillRect(ex + e.w - 7, ey + 2, 2, 2);
        break;
      case 'toxicSlug':
        // Body
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + e.h/2 + 1, e.w/2 - 1, 0, Math.PI);
        ctx.fill();
        ctx.fillRect(ex + 2, ey + e.h/2 - 1, e.w - 4, e.h/2 + 1);
        // Antennae
        ctx.fillRect(ex + 3, ey + 1, 1, 3);
        ctx.fillRect(ex + e.w - 4, ey + 1, 1, 3);
        // Eyes
        ctx.fillStyle = '#ff0';
        ctx.fillRect(ex + 4, ey + 3, 2, 2);
        ctx.fillRect(ex + e.w - 6, ey + 3, 2, 2);
        // Trail
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#6a4';
        ctx.fillRect(ex + 2, ey + e.h - 1, e.w - 4, 2);
        ctx.globalAlpha = 1;
        break;
      case 'myceliumMage':
        // Robe
        ctx.fillRect(ex + 3, ey + 4, e.w - 6, e.h - 4);
        // Tall mushroom hat
        ctx.beginPath();
        ctx.arc(ex + e.w/2, ey + 3, 5, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(ex + e.w/2 - 2, ey - 2, 4, 5);
        // Staff
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#a86';
        ctx.fillRect(ex - 1, ey + 2, 2, e.h - 2);
        ctx.fillStyle = '#c4f';
        ctx.fillRect(ex - 2, ey, 4, 3);
        // Eyes
        ctx.fillStyle = '#ff0';
        ctx.fillRect(ex + 4, ey + 5, 2, 2);
        ctx.fillRect(ex + e.w - 6, ey + 5, 2, 2);
        break;
      default:
        ctx.fillRect(ex, ey, e.w, e.h);
        break;
    }

    // HP bar for damaged enemies
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#400';
      ctx.fillRect(ex, ey - 4, e.w, 3);
      ctx.fillStyle = '#f44';
      ctx.fillRect(ex, ey - 4, e.w * (e.hp / e.maxHp), 3);
    }
  }
}

// ============================================================
// DRAW BOSS (Pass 3: enhanced boss visuals)
// ============================================================
function drawBoss() {
  const b = bossActive;
  const bx = Math.floor(b.x);
  const by = Math.floor(b.y);

  if (b.invincible > 0 && Math.floor(frame * 0.3) % 2 === 0) return;

  // Pass 3: ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(bx + 16, by + 34, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pass 3: outer aura
  ctx.globalAlpha = 0.1 + Math.sin(frame * 0.05) * 0.05;
  ctx.fillStyle = b.color;
  ctx.beginPath();
  ctx.arc(bx + 16, by + 16, 28 + Math.sin(frame * 0.03) * 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = b.flash > 0 ? '#fff' : b.color;
  // Large body
  ctx.fillRect(bx + 2, by + 4, 28, 24);
  // Head features
  ctx.fillStyle = b.flash > 0 ? '#fff' : '#222';
  ctx.fillRect(bx + 7, by + 10, 5, 5);
  ctx.fillRect(bx + 20, by + 10, 5, 5);
  // Eye glow (Pass 3)
  ctx.fillStyle = '#f44';
  ctx.fillRect(bx + 8, by + 11, 3, 3);
  ctx.fillRect(bx + 21, by + 11, 3, 3);
  // Crown/horns
  ctx.fillStyle = b.flash > 0 ? '#fff' : '#ff0';
  ctx.fillRect(bx + 6, by, 4, 6);
  ctx.fillRect(bx + 22, by, 4, 6);
  ctx.fillRect(bx + 14, by - 2, 4, 6);

  // Phase 2 aura
  if (b.phase > 0) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx + 16, by + 16, 22 + Math.sin(frame * 0.05) * 4, 0, Math.PI * 2);
    ctx.stroke();
    // Pass 3: phase 2 sparks
    for (var sp = 0; sp < 4; sp++) {
      var sparkAngle = frame * 0.03 + sp * Math.PI / 2;
      var sparkR = 24 + Math.sin(frame * 0.05 + sp) * 4;
      ctx.fillStyle = b.color;
      ctx.fillRect(bx + 16 + Math.cos(sparkAngle) * sparkR, by + 16 + Math.sin(sparkAngle) * sparkR, 3, 3);
    }
    ctx.lineWidth = 1;
    ctx.globalAlpha = 1;
  }

  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(bx - 10, by - 14, 52, 5);
  ctx.fillStyle = b.color;
  ctx.fillRect(bx - 10, by - 14, 52 * (b.hp / b.maxHp), 5);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(bx - 10, by - 14, 52, 5);
  // Boss name (Pass 3)
  if (dungeonId >= 0 && dungeonId < DUNGEONS.length) {
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(DUNGEONS[dungeonId].name + ' Boss', bx + 16, by - 18);
  }
}

// ============================================================
// DRAW PROJECTILES
// ============================================================
function drawProjectiles() {
  for (const p of projectiles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(p.x - p.vx * 0.02, p.y - p.vy * 0.02, p.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
    // Pass 3: second trail
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(p.x - p.vx * 0.04, p.y - p.vy * 0.04, p.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAW PICKUPS (Pass 2: new pickup sprites)
// ============================================================
function drawPickups() {
  for (const p of pickups) {
    const bob = Math.sin(frame * 0.08 + p.x) * 2;
    switch (p.type) {
      case 'heart':
        ctx.fillStyle = '#f44';
        ctx.beginPath();
        ctx.arc(p.x + 4, p.y + 4 + bob, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#faa';
        ctx.fillRect(p.x + 3, p.y + 3 + bob, 2, 2);
        break;
      case 'gold':
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.arc(p.x + 6, p.y + 6 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#7a444a';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('P', p.x + 6, p.y + 9 + bob);
        break;
      case 'mp':
        ctx.fillStyle = '#44f';
        ctx.beginPath();
        ctx.arc(p.x + 6, p.y + 6 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#aaf';
        ctx.fillRect(p.x + 4, p.y + 4 + bob, 4, 4);
        break;
      case 'xpOrb': // Pass 2
        ctx.fillStyle = '#af4';
        ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1 + p.x) * 0.3;
        ctx.beginPath();
        ctx.arc(p.x + 6, p.y + 6 + bob, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#fff';
        ctx.font = '6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('XP', p.x + 6, p.y + 8 + bob);
        break;
      case 'sporeGem': // Pass 2
        // Diamond shape
        ctx.fillStyle = '#a855f7';
        ctx.globalAlpha = 0.8 + Math.sin(frame * 0.12 + p.y) * 0.2;
        ctx.beginPath();
        ctx.moveTo(p.x + 6, p.y + 1 + bob);
        ctx.lineTo(p.x + 10, p.y + 6 + bob);
        ctx.lineTo(p.x + 6, p.y + 11 + bob);
        ctx.lineTo(p.x + 2, p.y + 6 + bob);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        // Sparkle
        ctx.fillStyle = '#fff';
        ctx.fillRect(p.x + 5, p.y + 4 + bob, 2, 2);
        break;
    }
  }
}

// ============================================================
// HUD (Pass 1: baseling stats display, Pass 2: score/combo)
// ============================================================
function drawHUD() {
  const hudY = PLAY_H;

  // Background
  ctx.fillStyle = PAL.hud;
  ctx.fillRect(0, hudY, GW, HUD_H);
  ctx.strokeStyle = PAL.hudBorder;
  ctx.strokeRect(0, hudY, GW, HUD_H);

  if (!player) return;

  // Hearts
  const hearts = Math.ceil(player.maxHp / 2);
  for (let i = 0; i < hearts; i++) {
    const hx = 4 + i * 14;
    const hy = hudY + 4;
    if (player.hp >= (i + 1) * 2) {
      // Full heart
      ctx.fillStyle = '#f44';
      drawHeart(hx, hy, 10);
    } else if (player.hp >= i * 2 + 1) {
      // Half heart
      ctx.fillStyle = '#822';
      drawHeart(hx, hy, 10);
      ctx.fillStyle = '#f44';
      ctx.save();
      ctx.beginPath();
      ctx.rect(hx, hy, 5, 12);
      ctx.clip();
      drawHeart(hx, hy, 10);
      ctx.restore();
    } else {
      // Empty heart
      ctx.fillStyle = '#333';
      drawHeart(hx, hy, 10);
    }
  }

  // MP bar
  ctx.fillStyle = '#224';
  ctx.fillRect(4, hudY + 18, 80, 6);
  ctx.fillStyle = '#44f';
  ctx.fillRect(4, hudY + 18, 80 * (player.mp / player.maxMp), 6);
  ctx.strokeStyle = '#448';
  ctx.strokeRect(4, hudY + 18, 80, 6);
  ctx.fillStyle = '#88f';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('MP', 6, hudY + 24);

  // XP bar
  ctx.fillStyle = '#242';
  ctx.fillRect(4, hudY + 26, 80, 4);
  ctx.fillStyle = '#4a4';
  ctx.fillRect(4, hudY + 26, 80 * (player.xp / player.xpToNext), 4);

  // Level and POOP
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('LV' + player.level, 90, hudY + 10);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText(player.gold + 'P', 90, hudY + 22);

  // Pass 2: Score display
  ctx.fillStyle = '#38d973';
  ctx.font = '7px monospace';
  ctx.fillText(totalScore + 'pts', 90, hudY + 30);

  // Active crystal / equipment
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  const crystalNames = ['GALE', 'EMBER', 'TIDE', 'ROOT'];
  if (player.activeCrystal >= 0) {
    ctx.fillStyle = PAL.crystal[player.activeCrystal];
    ctx.fillText(crystalNames[player.activeCrystal], 155, hudY + 10);
    // Draw crystal icon
    ctx.fillRect(148, hudY + 14, 14, 14);
    ctx.fillStyle = '#fff';
    ctx.fillRect(152, hudY + 18, 6, 6);
  } else {
    ctx.fillStyle = '#ccc';
    ctx.fillText('BLADE', 155, hudY + 10);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(152, hudY + 14, 2, 12);
    ctx.fillRect(148, hudY + 14, 10, 3);
  }

  // Potions
  ctx.fillStyle = '#f88';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('TNK:' + player.potions, 180, hudY + 10);

  // Keys
  ctx.fillStyle = '#ff0';
  ctx.fillText('SEED:' + player.keys, 180, hudY + 22);

  // Pass 1: bonus lives indicator
  if (bonusLives > 0) {
    ctx.fillStyle = statB.color;
    ctx.fillText('x' + bonusLives, 218, hudY + 10);
  }

  // Pass 2: combo indicator
  if (comboCount > 1) {
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('x' + comboCount, 218, hudY + 22);
  }

  // Pass 2: poison indicator
  if (player.poisonTimer > 0) {
    ctx.fillStyle = '#6a4';
    ctx.font = '7px monospace';
    ctx.fillText('PSN', 218, hudY + 30);
  }

  // Location
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  if (inDungeon) {
    ctx.fillText(DUNGEONS[dungeonId].name + ' R' + (dungeonRoom + 1), GW - 4, hudY + 10);
  } else {
    ctx.fillText('(' + screenX + ',' + screenY + ')', GW - 4, hudY + 10);
  }

  // Crystals collected indicator
  ctx.textAlign = 'right';
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = player.crystals[i] ? PAL.crystal[i] : '#333';
    ctx.fillRect(GW - 4 - (3 - i) * 10, hudY + 16, 8, 8);
  }

  // Charge level indicator
  if (player.charging && player.chargeLevel > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CHG:' + player.chargeLevel, GW / 2, hudY + 28);
  }

  // Pass 1: baseling name/level in corner
  ctx.fillStyle = statB.color;
  ctx.font = '6px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(statB.name + ' L' + statB.level, GW - 4, hudY + 30);
}

function drawHeart(x, y, size) {
  const s = size / 10;
  ctx.beginPath();
  ctx.arc(x + 2.5 * s, y + 2.5 * s, 2.5 * s, 0, Math.PI * 2);
  ctx.arc(x + 7.5 * s, y + 2.5 * s, 2.5 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x, y + 3 * s);
  ctx.lineTo(x + 5 * s, y + 10 * s);
  ctx.lineTo(x + 10 * s, y + 3 * s);
  ctx.fill();
}

// DIALOG BOX
// ============================================================
function drawDialog() {
  const boxH = 50;
  const boxY = PLAY_H - boxH - 4;
  ctx.fillStyle = 'rgba(0,0,20,0.9)';
  ctx.fillRect(8, boxY, GW - 16, boxH);
  ctx.strokeStyle = '#a855f7';
  ctx.strokeRect(8, boxY, GW - 16, boxH);

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';

  // Word wrap
  const words = dialogText.split(' ');
  let line = '';
  let lineY = boxY + 14;
  const maxWidth = GW - 32;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth) {
      ctx.fillText(line, 14, lineY);
      line = word + ' ';
      lineY += 12;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 14, lineY);

  // Continue indicator
  const pulse = Math.sin(frame * 0.1) * 0.4 + 0.6;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#a855f7';
  ctx.fillText('...', GW - 28, boxY + boxH - 6);
  ctx.globalAlpha = 1;
}

  ctx.font = 'bold 12px monospace';
  ctx.fillText('CONGRATULATIONS!', GW/2, 55);

  // Pass 3: baseling on credits
  var credBx = GW/2 - 7;
  var credBy = 65;
  ctx.fillStyle = statB.color;
  ctx.fillRect(credBx + 2, credBy + 4, 10, 10);
  ctx.fillRect(credBx + 3, credBy, 8, 6);
  ctx.fillStyle = '#222';
  ctx.fillRect(credBx + 4, credBy + 2, 2, 2);
  ctx.fillRect(credBx + 8, credBy + 2, 2, 2);

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.fillText('Your baseling toppled the Spore Tower', GW/2, 95);
  ctx.fillText('and restored the crystal gardens.', GW/2, 110);
  ctx.fillText('The four spore crystals shine', GW/2, 130);
  ctx.fillText('with renewed mycelium power.', GW/2, 145);

  ctx.fillStyle = '#888';
  ctx.fillText('A MfT Arcade Game', GW/2, 170);
  ctx.fillText('Baseling Universe', GW/2, 185);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '9px monospace';
  ctx.fillText('Final Level: ' + player.level, GW/2, 210);
  ctx.fillText('POOP Earned: ' + player.gold, GW/2, 225);
  ctx.fillText('Final Score: ' + totalScore, GW/2, 240);

  // Pass 3: baseling stat summary
  ctx.fillStyle = statB.color;
  ctx.font = '8px monospace';
  ctx.fillText(statB.name + ' - Hero of the Crystal Gardens', GW/2, 258);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Press any key', GW/2, 278);
  ctx.globalAlpha = 1;

  // Pass 3: victory sparkles on credits
  for (var ci = 0; ci < 12; ci++) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + ci * 0.5) * 0.2;
    ctx.fillStyle = PAL.crystal[ci % 4];
    var cpx = (Math.sin(frame * 0.012 + ci * 1.1) * 0.5 + 0.5) * GW;
    var cpy = (Math.cos(frame * 0.009 + ci * 1.4) * 0.5 + 0.5) * GH;
    ctx.fillRect(cpx, cpy, 2, 2);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
