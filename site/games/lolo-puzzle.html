// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,luck,
// swim}, clamped to the single-player band (0.8–1.6). Lolo's helpers read D&D-style fields
// on statB, so we keep statB's shape and synthesize its fields from the five bounded
// multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20). Not a wager game ->
// default band. recomputeStats() re-runs after a title-screen character pick.
var statB = {damage:1,speed:1,lives:0,hpMult:1,scoreMult:1,cooldown:1,luck:1,str:10,dex:10,con:10,int:10,wis:10,cha:10,level:0,color:'#44dd88',name:'Baseling',icon:'B'};

  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[lolo] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
}

  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[lolo] player init failed:', e && e.message); });

function dexMoveSpeed() { return Math.max(0.04, 0.12 - (statB.dex - 10) * 0.004); } // lower = faster move repeat
function conExtraTries() { return Math.floor(Math.max(0, statB.con - 10) / 4); } // extra retries before game over
function conHpMult() { return statB.hpMult * (1 + (statB.con - 10) * 0.05); }
function intHintCharges() { return Math.floor(Math.max(0, statB.int - 8) / 3); } // hint flashes at INT 11+

function wisUndoCharges() { return Math.floor(Math.max(0, statB.wis - 8) / 3); } // undo moves at WIS 11+
function chaItemSpawns() { return Math.floor(Math.max(0, statB.cha - 10) / 4); } // bonus items on floor

// === LOAD ROOM ===
function loadRoom(idx) {
  if (idx >= ROOMS.length) idx = ROOMS.length - 1;
  var r = ROOMS[idx];
  grid = [];
  hearts = [];
  enemies = [];
  eggs = [];
  bullets = [];
  fireballs = [];
  heartsCollected = 0;
  heartsTotal = 0;
  dead = false;
  cleared = false;
  clearedTimer = 0;
  deadTimer = 0;
  allHeartsGot = false;
  chest.open = false;
  player.shots = 0;
  player.moving = false;
  player.dir = 3;
  inputLock = false;
  undoStack = [];
  sporeTurnCounter = 0;
  reactorChainTimer = 0;
  reactorChainTiles = [];
  floorNameTimer = 120;
  celebrationTimer = 0;
  bossHP = 0;
  bossMaxHP = 0;
  hintFlash = 0;
  hintTarget = null;
  shieldActive = 0;
  speedBoost = 0;
  starActive = 0;

  // Stat-based charges
  undoCharges = wisUndoCharges();
  hintCharges = intHintCharges();

  for (var row = 0; row < ROWS; row++) {
    grid[row] = [];
    var line = r.map[row];
    for (var col = 0; col < COLS; col++) {
      var ch = line[col];
      switch (ch) {
        case '#': grid[row][col] = T.WALL; break;
        case 'E': grid[row][col] = T.EMERALD; break;
        case 'H':
          grid[row][col] = T.FLOOR;
          hearts.push({ x: col, y: row, collected: false });
          heartsTotal++;
          break;
        case 'C':
          grid[row][col] = T.FLOOR;
          chest.x = col; chest.y = row;
          break;
        case '~': grid[row][col] = T.WATER; break;
        case '^': grid[row][col] = T.ARROW_U; break;
        case 'v': grid[row][col] = T.ARROW_D; break;
        case '<': grid[row][col] = T.ARROW_L; break;
        case '>': grid[row][col] = T.ARROW_R; break;
        case 'B': grid[row][col] = T.BUSH; break;
        case 'R': grid[row][col] = T.REACTOR; break;
        case 'S': grid[row][col] = T.SPORE; break;
        case 'M': grid[row][col] = T.MYCELIAL; break;
        case 'P':
          grid[row][col] = T.FLOOR;
          player.x = col; player.y = row;
          break;
        default: grid[row][col] = T.FLOOR; break;
      }
    }
  }

  // Spawn enemies
  for (var i = 0; i < r.enemies.length; i++) {
    var e = r.enemies[i];
    var en = {
      type: e.type, x: e.x, y: e.y,
      dir: e.dir !== undefined ? e.dir : 0,
      awake: e.type !== E.ARMADILLO && e.type !== E.ROCKY,
      fireTimer: 0, moveTimer: 0, hp: 1, phaseTimer: 0
    };
    if (e.type === E.BOSS_CORE) {
      en.hp = 3 + Math.floor(idx / 10);
      bossHP = en.hp;
      bossMaxHP = en.hp;
    }
    if (e.type === E.SPORE_GHOST) {
      en.phaseTimer = 0;
    }
    enemies.push(en);
  }

  // CHA bonus items
  var bonusItems = chaItemSpawns();
  for (var bi = 0; bi < bonusItems; bi++) {
    var placed = false;
    for (var attempt = 0; attempt < 50 && !placed; attempt++) {
      var ix = 1 + Math.floor(Math.random() * (COLS - 2));
      var iy = 1 + Math.floor(Math.random() * (ROWS - 2));
      if (grid[iy][ix] === T.FLOOR && !(ix === player.x && iy === player.y) && !(ix === chest.x && iy === chest.y) && !heartAt(ix, iy)) {
        var itemTypes = [T.ITEM_STAR, T.ITEM_SHIELD, T.ITEM_SPEED];
        grid[iy][ix] = itemTypes[Math.floor(Math.random() * itemTypes.length)];
        placed = true;
      }
    }
  }
}

// === HELPERS ===
function isSolid(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return true;
  var t = grid[gy][gx];
  return t === T.WALL || t === T.EMERALD || t === T.WATER || t === T.BUSH || t === T.REACTOR || t === T.SPORE;
}

function isWalkable(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return false;
  var t = grid[gy][gx];
  return t === T.FLOOR || t === T.BRIDGE || t === T.MYCELIAL ||
    t === T.ARROW_U || t === T.ARROW_D || t === T.ARROW_L || t === T.ARROW_R ||
    t === T.ITEM_STAR || t === T.ITEM_SHIELD || t === T.ITEM_SPEED;
}

function canPassArrow(gx, gy, dirIdx) {
  var t = grid[gy][gx];
  if (t === T.ARROW_U && dirIdx !== 0) return false;
  if (t === T.ARROW_D && dirIdx !== 1) return false;
  if (t === T.ARROW_L && dirIdx !== 2) return false;
  if (t === T.ARROW_R && dirIdx !== 3) return false;
  return true;
}

function blocksLineOfSight(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return true;
  var t = grid[gy][gx];
  return t === T.WALL || t === T.EMERALD || t === T.REACTOR;
}

function blocksForEnemy(gx, gy) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return true;
  var t = grid[gy][gx];
  return t === T.WALL || t === T.EMERALD || t === T.WATER || t === T.BUSH || t === T.REACTOR || t === T.SPORE;
}

function hasLineOfSight(x1, y1, x2, y2) {
  if (x1 !== x2 && y1 !== y2) return false;
  if (x1 === x2 && y1 === y2) return false;
  var dx = x2 > x1 ? 1 : x2 < x1 ? -1 : 0;
  var dy = y2 > y1 ? 1 : y2 < y1 ? -1 : 0;
  var cx = x1 + dx, cy = y1 + dy;
  while (cx !== x2 || cy !== y2) {
    if (blocksLineOfSight(cx, cy)) return false;
    for (var i = 0; i < eggs.length; i++) {
      if (eggs[i].x === cx && eggs[i].y === cy) return false;
    }
    cx += dx; cy += dy;
  }
  return true;
}

function heartAt(gx, gy) {
  for (var i = 0; i < hearts.length; i++) {
    if (hearts[i].x === gx && hearts[i].y === gy && !hearts[i].collected) return hearts[i];
  }
  return null;
}

function enemyAt(gx, gy) {
  for (var i = 0; i < enemies.length; i++) {
    if (enemies[i].x === gx && enemies[i].y === gy) return i;
  }
  return -1;
}

function eggAt(gx, gy) {
  for (var i = 0; i < eggs.length; i++) {
    if (eggs[i].x === gx && eggs[i].y === gy) return i;
  }
  return -1;
}

function isPushable(t) {
  return t === T.EMERALD || t === T.REACTOR;
}

// === UNDO SYSTEM (WIS) ===
function saveUndoState() {
  if (undoCharges <= 0) return;
  var snap = {
    px: player.x, py: player.y, pdir: player.dir, pshots: player.shots,
    grid: [], hearts: [], heartsCollected: heartsCollected,
    allHeartsGot: allHeartsGot, chestOpen: chest.open, sporeTurnCounter: sporeTurnCounter
  };
  for (var r = 0; r < ROWS; r++) {
    snap.grid[r] = grid[r].slice();
  }
  for (var i = 0; i < hearts.length; i++) {
    snap.hearts.push({ x: hearts[i].x, y: hearts[i].y, collected: hearts[i].collected });
  }
  undoStack.push(snap);
  if (undoStack.length > 20) undoStack.shift();
}

function doUndo() {
  if (undoCharges <= 0 || undoStack.length === 0 || dead || cleared) return;
  undoCharges--;
  var snap = undoStack.pop();
  player.x = snap.px; player.y = snap.py; player.dir = snap.pdir; player.shots = snap.pshots;
  heartsCollected = snap.heartsCollected;
  allHeartsGot = snap.allHeartsGot;
  chest.open = snap.chestOpen;
  sporeTurnCounter = snap.sporeTurnCounter;
  for (var r = 0; r < ROWS; r++) {
    grid[r] = snap.grid[r].slice();
  }
  for (var i = 0; i < hearts.length; i++) {
    hearts[i].collected = snap.hearts[i].collected;
  }
  TAS.audio.playTone(600, 0.1, 'sine', 0.05, 800);
  TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#88ccff', 8, 2);
}

// === HINT SYSTEM (INT) ===
function useHint() {
  if (hintCharges <= 0 || dead || cleared) return;
  hintCharges--;
  hintFlash = 90;
  // Find nearest uncollected heart
  var bestDist = 999, bestH = null;
  for (var i = 0; i < hearts.length; i++) {
    if (!hearts[i].collected) {
      var dist = Math.abs(hearts[i].x - player.x) + Math.abs(hearts[i].y - player.y);
      if (dist < bestDist) { bestDist = dist; bestH = hearts[i]; }
    }
  }
  if (allHeartsGot) {
    hintTarget = { x: chest.x, y: chest.y };
  } else if (bestH) {
    hintTarget = { x: bestH.x, y: bestH.y };
  }
  TAS.audio.playMelody([[880, 0.06], [1100, 0.06], [1320, 0.1]], 60);
}

// === REACTOR BLOCK MECHANICS (PASS 2) ===
function checkReactorChain(gx, gy) {
  // When two reactor blocks are adjacent, they explode
  var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  for (var d = 0; d < dirs.length; d++) {
    var nx = gx + dirs[d][0], ny = gy + dirs[d][1];
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[ny][nx] === T.REACTOR) {
      // Chain reaction - both explode
      grid[gy][gx] = T.FLOOR;
      grid[ny][nx] = T.FLOOR;
      reactorChainTimer = 30;
      reactorChainTiles.push({ x: gx, y: gy }, { x: nx, y: ny });
      TAS.audio.playTone(150, 0.4, 'sawtooth', 0.15, 30);
      TAS.fx.shake(8, 0.8);
      TAS.fx.flash('#ff6600', 0.3);
      TAS.particles.spawn(gx * TS + Math.floor(TS / 2), gy * TS + Math.floor(TS / 2) + HUD_H, '#ff4400', 15, 4);
      TAS.particles.spawn(nx * TS + Math.floor(TS / 2), ny * TS + Math.floor(TS / 2) + HUD_H, '#ff4400', 15, 4);
      // Kill enemies in blast radius (2 tiles)
      for (var ei = enemies.length - 1; ei >= 0; ei--) {
        var ex = enemies[ei].x, ey = enemies[ei].y;
        if ((Math.abs(ex - gx) <= 2 && Math.abs(ey - gy) <= 2) ||
            (Math.abs(ex - nx) <= 2 && Math.abs(ey - ny) <= 2)) {
          if (enemies[ei].type === E.BOSS_CORE) {
            enemies[ei].hp--;
            bossHP = enemies[ei].hp;
            if (enemies[ei].hp <= 0) {
              TAS.particles.spawn(ex * TS + Math.floor(TS / 2), ey * TS + Math.floor(TS / 2) + HUD_H, '#ffaa00', 20, 5);
              enemies.splice(ei, 1);
              score += Math.floor(500 * intScoreMult());
            }
          } else {
            eggs.push({ x: ex, y: ey, timer: 300, enemyType: enemies[ei].type, enemyDir: enemies[ei].dir || 0 });
            enemies.splice(ei, 1);
          }
        }
      }
      score += Math.floor(100 * intScoreMult());
      return true;
    }
  }
  return false;
}

// === SPORE TILE MECHANICS (PASS 2) ===
function updateSpores() {
  sporeTurnCounter++;
  if (sporeTurnCounter % 3 !== 0) return; // spread every 3 player moves
  var newSpores = [];
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] === T.SPORE) {
        var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
        for (var d = 0; d < dirs.length; d++) {
          var nr = r + dirs[d][1], nc = c + dirs[d][0];
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === T.FLOOR) {
            if (!(nc === player.x && nr === player.y) && !(nc === chest.x && nr === chest.y) && !heartAt(nc, nr)) {
              if (Math.random() < 0.3) {
                newSpores.push({ x: nc, y: nr });
              }
            }
          }
        }
      }
    }
  }
  for (var i = 0; i < newSpores.length; i++) {
    grid[newSpores[i].y][newSpores[i].x] = T.SPORE;
    TAS.particles.spawn(newSpores[i].x * TS + Math.floor(TS / 2), newSpores[i].y * TS + Math.floor(TS / 2) + HUD_H, '#66cc44', 4, 1);
  }
}

// === MYCELIAL BRIDGE (PASS 2) ===
function updateMycelialBridges() {
  // Mycelial tiles grow toward nearby water after player moves near them
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] === T.MYCELIAL) {
        // Check if player is within 3 tiles
        if (Math.abs(player.x - c) + Math.abs(player.y - r) <= 3) {
          var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
          for (var d = 0; d < dirs.length; d++) {
            var nr = r + dirs[d][1], nc = c + dirs[d][0];
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === T.WATER) {
              if (Math.random() < 0.15) {
                grid[nr][nc] = T.BRIDGE;
                TAS.particles.spawn(nc * TS + Math.floor(TS / 2), nr * TS + Math.floor(TS / 2) + HUD_H, '#88ff88', 6, 2);
                TAS.audio.playTone(400, 0.1, 'sine', 0.05, 600);
              }
            }
          }
        }
      }
    }
  }
}

// === PLAYER MOVEMENT ===
function tryMove(dirIdx) {
  if (dead || cleared || inputLock) return;

  saveUndoState();
  player.dir = dirIdx;
  var nx = player.x + DX[dirIdx];
  var ny = player.y + DY[dirIdx];

  // Check arrow at current position
  var curTile = grid[player.y][player.x];
  if (curTile === T.ARROW_U || curTile === T.ARROW_D || curTile === T.ARROW_L || curTile === T.ARROW_R) {
    if (!canPassArrow(player.x, player.y, dirIdx)) return;
  }

  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;

  var target = grid[ny][nx];

  // Push block (emerald or reactor)
  if (isPushable(target)) {
    var pushDist = strPushPower();
    var bx = nx + DX[dirIdx];
    var by = ny + DY[dirIdx];
    if (bx >= 0 && bx < COLS && by >= 0 && by < ROWS) {
      var bt = grid[by][bx];
      if (bt === T.WATER) {
        grid[ny][nx] = T.FLOOR;
        grid[by][bx] = T.BRIDGE;
        TAS.audio.playTone(200, 0.3, 'triangle', 0.08, 100);
        TAS.particles.spawn(bx * TS + Math.floor(TS / 2), by * TS + Math.floor(TS / 2) + HUD_H, '#66ccff', 8, 2);
      } else if (bt === T.FLOOR || bt === T.BRIDGE) {
        if (enemyAt(bx, by) === -1 && eggAt(bx, by) === -1) {
          var wasReactor = (target === T.REACTOR);
          grid[ny][nx] = T.FLOOR;
          grid[by][bx] = target;
          TAS.audio.playTone(150, 0.1, 'sawtooth', 0.06);
          // STR multi-push: push further blocks in line
          if (pushDist > 1) {
            var furtherX = bx + DX[dirIdx];
            var furtherY = by + DY[dirIdx];
            if (furtherX >= 0 && furtherX < COLS && furtherY >= 0 && furtherY < ROWS) {
              if (isPushable(grid[furtherY][furtherX]) && pushDist >= 2) {
                var fx2 = furtherX + DX[dirIdx];
                var fy2 = furtherY + DY[dirIdx];
                if (fx2 >= 0 && fx2 < COLS && fy2 >= 0 && fy2 < ROWS) {
                  var ft2 = grid[fy2][fx2];
                  if (ft2 === T.FLOOR || ft2 === T.BRIDGE || ft2 === T.WATER) {
                    var pushed = grid[furtherY][furtherX];
                    grid[furtherY][furtherX] = T.FLOOR;
                    if (ft2 === T.WATER) {
                      grid[fy2][fx2] = T.BRIDGE;
                    } else {
                      grid[fy2][fx2] = pushed;
                    }
                    TAS.audio.playTone(120, 0.1, 'sawtooth', 0.06);
                    if (pushed === T.REACTOR) checkReactorChain(fx2, fy2);
                  }
                }
              }
            }
          }
          if (wasReactor) checkReactorChain(bx, by);
        } else {
          return;
        }
      } else {
        return;
      }
    } else {
      return;
    }
    player.x = nx;
    player.y = ny;
    TAS.audio.playTone(440, 0.05, 'sine', 0.04);
    onPlayerMove();
    return;
  }

  // Check for egg blocking
  if (eggAt(nx, ny) !== -1) return;

  // Normal walkable check
  if (!isWalkable(nx, ny)) return;

  player.x = nx;
  player.y = ny;
  TAS.audio.playTone(440, 0.05, 'sine', 0.04);
  onPlayerMove();
}

function onPlayerMove() {
  // Collect heart
  var h = heartAt(player.x, player.y);
  if (h) {
    h.collected = true;
    heartsCollected++;
    score += Math.floor(50 * intScoreMult());
    if (heartsCollected % 2 === 0) player.shots++;
    TAS.audio.playMelody([[880, 0.08], [1100, 0.08], [1320, 0.12]], 80);
    TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#38d973', 10, 3);

    if (heartsCollected >= heartsTotal) {
      allHeartsGot = true;
      chest.open = true;
      TAS.audio.playMelody([[660, 0.1], [880, 0.1], [1100, 0.15]], 100);
      for (var i = 0; i < enemies.length; i++) {
        if (enemies[i].type === E.ARMADILLO || enemies[i].type === E.ROCKY) {
          enemies[i].awake = true;
        }
      }
    }
  }

  // Collect items (PASS 2)
  var tile = grid[player.y][player.x];
  if (tile === T.ITEM_STAR) {
    starActive = 180;
    grid[player.y][player.x] = T.FLOOR;
    TAS.audio.playMelody([[1000, 0.06], [1200, 0.06], [1400, 0.08]], 60);
    TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#ffff00', 12, 3);
    score += Math.floor(25 * intScoreMult());
  } else if (tile === T.ITEM_SHIELD) {
    shieldActive = 300;
    grid[player.y][player.x] = T.FLOOR;
    TAS.audio.playMelody([[600, 0.08], [800, 0.08]], 80);
    TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#44aaff', 10, 2);
    score += Math.floor(25 * intScoreMult());
  } else if (tile === T.ITEM_SPEED) {
    speedBoost = 300;
    grid[player.y][player.x] = T.FLOOR;
    TAS.audio.playMelody([[700, 0.06], [900, 0.08]], 60);
    TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#88ff44', 10, 2);
    score += Math.floor(25 * intScoreMult());
  }

  // Reach chest
  if (player.x === chest.x && player.y === chest.y && chest.open) {
    cleared = true;
    clearedTimer = 120;
    celebrationTimer = 120;
    score += Math.floor(200 * intScoreMult());
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 120);
    TAS.fx.flash('#f4b41b', 0.4);
    TAS.fx.shake(4, 0.9);
    if (room >= progress) {
      progress = room + 1;
      try { localStorage.setItem('lolopuzzle_progress', String(progress)); } catch(e) { console.warn('[lolo] save progress:', e.message || e); }
    }
  }

  // Spore spreading
  updateSpores();

  // Mycelial bridge growth
  updateMycelialBridges();

  // Rocky moves on player move
  if (allHeartsGot) {
    for (var i = 0; i < enemies.length; i++) {
      var en = enemies[i];
      if (en.type === E.ROCKY && en.awake) {
        moveRockyToward(en);
      }
    }
  }
}

function moveRockyToward(en) {
  var dx = player.x - en.x;
  var dy = player.y - en.y;
  var mx = 0, my = 0;
  if (Math.abs(dx) >= Math.abs(dy)) {
    mx = dx > 0 ? 1 : -1;
  } else {
    my = dy > 0 ? 1 : -1;
  }
  var nx = en.x + mx;
  var ny = en.y + my;
  if (isWalkable(nx, ny) && enemyAt(nx, ny) === -1 && eggAt(nx, ny) === -1) {
    en.x = nx; en.y = ny;
  }
}

// === SHOOTING ===
function shoot() {
  if (dead || cleared || player.shots <= 0) return;
  player.shots--;
  bullets.push({ x: player.x, y: player.y, dx: DX[player.dir], dy: DY[player.dir], timer: 0 });
  TAS.audio.playTone(880, 0.1, 'square', 0.07, 440);
}

function updateBullets() {
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.timer++;
    if (b.timer % 3 === 0) {
      b.x += b.dx;
      b.y += b.dy;

      if (b.x < 0 || b.x >= COLS || b.y < 0 || b.y >= ROWS || blocksLineOfSight(b.x, b.y)) {
        bullets.splice(i, 1);
        continue;
      }

      // Hit enemy
      var ei = enemyAt(b.x, b.y);
      if (ei !== -1) {
        var en = enemies[ei];
        if (en.type === E.BOSS_CORE) {
          en.hp--;
          bossHP = en.hp;
          TAS.fx.shake(3, 0.9);
          if (en.hp <= 0) {
            TAS.particles.spawn(en.x * TS + Math.floor(TS / 2), en.y * TS + Math.floor(TS / 2) + HUD_H, '#ffaa00', 20, 5);
            enemies.splice(ei, 1);
            score += Math.floor(500 * intScoreMult());
            TAS.audio.playMelody([[300, 0.1], [200, 0.1], [100, 0.2]], 80);
          } else {
            TAS.audio.playTone(200, 0.15, 'square', 0.08);
          }
        } else if (en.type === E.SPORE_GHOST && en.phaseTimer > 0) {
          // Ghost is phased - bullet passes through
          TAS.particles.spawn(en.x * TS + Math.floor(TS / 2), en.y * TS + Math.floor(TS / 2) + HUD_H, '#88ff8844', 4, 1);
        } else {
          eggs.push({ x: en.x, y: en.y, timer: 300, enemyType: en.type, enemyDir: en.dir || 0 });
          enemies.splice(ei, 1);
          score += Math.floor(75 * intScoreMult());
          TAS.audio.playTone(300, 0.2, 'triangle', 0.08, 600);
          TAS.particles.spawn(en.x * TS + Math.floor(TS / 2), en.y * TS + Math.floor(TS / 2) + HUD_H, '#aaffaa', 8, 2);
        }
        bullets.splice(i, 1);
        continue;
      }

      // Hit egg
      var egi = eggAt(b.x, b.y);
      if (egi !== -1) {
        TAS.particles.spawn(eggs[egi].x * TS + Math.floor(TS / 2), eggs[egi].y * TS + Math.floor(TS / 2) + HUD_H, '#ffffff', 12, 3);
        eggs.splice(egi, 1);
        bullets.splice(i, 1);
        score += Math.floor(25 * intScoreMult());
        TAS.audio.playTone(600, 0.15, 'sawtooth', 0.06, 100);
        continue;
      }
    }
  }
}

// === EGGS ===
function updateEggs(dt) {
  for (var i = eggs.length - 1; i >= 0; i--) {
    eggs[i].timer--;
    if (eggs[i].timer <= 0) {
      var eg = eggs[i];
      enemies.push({
        type: eg.enemyType, x: eg.x, y: eg.y,
        dir: eg.enemyDir || 0,
        awake: true, fireTimer: 0, moveTimer: 0, hp: 1, phaseTimer: 0
      });
      eggs.splice(i, 1);
    }
  }
}

// === ENEMIES ===
function updateEnemies(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    if (!en.awake) continue;

    switch (en.type) {
      case E.MEDUSA:
        if (hasLineOfSight(en.x, en.y, player.x, player.y)) {
          killPlayer();
        }
        break;

      case E.SKULL:
        en.fireTimer++;
        if (en.fireTimer >= 90) {
          en.fireTimer = 0;
          if (en.x === player.x || en.y === player.y) {
            var fdx = 0, fdy = 0;
            if (player.x > en.x) fdx = 1;
            else if (player.x < en.x) fdx = -1;
            else if (player.y > en.y) fdy = 1;
            else if (player.y < en.y) fdy = -1;
            if (fdx !== 0 || fdy !== 0) {
              fireballs.push({ x: en.x, y: en.y, dx: fdx, dy: fdy, timer: 0 });
              TAS.audio.playTone(200, 0.15, 'sawtooth', 0.05, 100);
            }
          }
        }
        break;

      case E.DRAGON:
        var ddx = DX[en.dir], ddy = DY[en.dir];
        var cx = en.x + ddx, cy = en.y + ddy;
        while (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS) {
          if (blocksLineOfSight(cx, cy)) break;
          if (cx === player.x && cy === player.y) {
            killPlayer();
            break;
          }
          cx += ddx; cy += ddy;
        }
        break;

      case E.ARMADILLO:
        en.moveTimer++;
        if (en.moveTimer >= 30) {
          en.moveTimer = 0;
          var adx = player.x - en.x;
          var ady = player.y - en.y;
          var amx = 0, amy = 0;
          if (Math.abs(adx) >= Math.abs(ady)) {
            amx = adx > 0 ? 1 : -1;
          } else {
            amy = ady > 0 ? 1 : -1;
          }
          var anx = en.x + amx;
          var any_val = en.y + amy;
          if (isWalkable(anx, any_val) && enemyAt(anx, any_val) === -1 && eggAt(anx, any_val) === -1) {
            en.x = anx; en.y = any_val;
          }
        }
        if (en.x === player.x && en.y === player.y) killPlayer();
        break;

      case E.ROCKY:
        if (en.x === player.x && en.y === player.y) killPlayer();
        break;

      // PASS 2: Reactor Turret - fires in 4 directions periodically
      case E.REACTOR_TURRET:
        en.fireTimer++;
        if (en.fireTimer >= 120) {
          en.fireTimer = 0;
          for (var d = 0; d < 4; d++) {
            fireballs.push({ x: en.x, y: en.y, dx: DX[d], dy: DY[d], timer: 0 });
          }
          TAS.audio.playTone(180, 0.2, 'square', 0.08, 60);
          TAS.particles.spawn(en.x * TS + Math.floor(TS / 2), en.y * TS + Math.floor(TS / 2) + HUD_H, '#ff8800', 6, 2);
        }
        break;

      // PASS 2: Spore Ghost - phases in and out, moves when solid
      case E.SPORE_GHOST:
        en.phaseTimer++;
        if (en.phaseTimer >= 60) en.phaseTimer = -60; // phase cycle
        en.moveTimer++;
        if (en.moveTimer >= 45 && en.phaseTimer <= 0) {
          en.moveTimer = 0;
          // Move toward player
          var gdx = player.x - en.x;
          var gdy = player.y - en.y;
          var gmx = 0, gmy = 0;
          if (Math.abs(gdx) >= Math.abs(gdy)) {
            gmx = gdx > 0 ? 1 : -1;
          } else {
            gmy = gdy > 0 ? 1 : -1;
          }
          var gnx = en.x + gmx;
          var gny = en.y + gmy;
          // Ghost can move through walls when phased
          if (en.phaseTimer > 0 || (isWalkable(gnx, gny) && enemyAt(gnx, gny) === -1)) {
            en.x = gnx; en.y = gny;
          }
        }
        // Touch kill when solid
        if (en.phaseTimer <= 0 && en.x === player.x && en.y === player.y) killPlayer();
        break;

      // PASS 2: Boss Core - stationary, spawns minions, needs multiple hits
      case E.BOSS_CORE:
        en.fireTimer++;
        if (en.fireTimer >= 150) {
          en.fireTimer = 0;
          // Shoot in a random direction
          var bd = Math.floor(Math.random() * 4);
          fireballs.push({ x: en.x, y: en.y, dx: DX[bd], dy: DY[bd], timer: 0 });
          TAS.audio.playTone(150, 0.2, 'sawtooth', 0.1, 50);
        }
        break;
    }
  }
}

// === FIREBALLS ===
function updateFireballs() {
  for (var i = fireballs.length - 1; i >= 0; i--) {
    var f = fireballs[i];
    f.timer++;
    if (f.timer % 6 === 0) {
      f.x += f.dx;
      f.y += f.dy;
      if (f.x < 0 || f.x >= COLS || f.y < 0 || f.y >= ROWS || blocksLineOfSight(f.x, f.y)) {
        fireballs.splice(i, 1);
        continue;
      }
      if (f.x === player.x && f.y === player.y) {
        killPlayer();
        fireballs.splice(i, 1);
      }
    }
  }
}

// === REACTOR CHAIN UPDATE ===
function updateReactorChain(dt) {
  if (reactorChainTimer > 0) {
    reactorChainTimer--;
    if (reactorChainTimer <= 0) {
      reactorChainTiles = [];
    }
  }
}

// === PLAYER DEATH ===
function killPlayer() {
  if (dead || cleared) return;
  // Shield absorbs one hit
  if (shieldActive > 0) {
    shieldActive = 0;
    TAS.audio.playTone(800, 0.15, 'triangle', 0.08, 400);
    TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#44aaff', 12, 3);
    TAS.fx.flash('#4488ff', 0.2);
    return;
  }
  // Star invincibility
  if (starActive > 0) return;

  dead = true;
  deadTimer = 90;
  tries++;
  TAS.audio.playTone(200, 0.4, 'sawtooth', 0.1, 50);
  TAS.fx.shake(6, 0.85);
  TAS.particles.spawn(player.x * TS + Math.floor(TS / 2), player.y * TS + Math.floor(TS / 2) + HUD_H, '#ff4444', 15, 3);
}

// === INPUT ===
var prevShoot = false;
var prevUndo = false;
var prevHint = false;

function handleInput(dt) {
  if (state !== 'playing') return;

  var up = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up;
  var down = TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down;
  var left = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
  var right = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
  var shootBtn = TAS.input.keys['Space'] || TAS.input.keys[' '] || TAS.input.keys['KeyZ'] || TAS.input.touch.a;
  var undoBtn = TAS.input.keys['KeyR'] || TAS.input.touch.b;
  var hintBtn = TAS.input.keys['KeyH'] || TAS.input.keys['KeyX'];
  var resetBtn = TAS.input.keys['Escape'];

  // Shoot (on press)
  if (shootBtn && !prevShoot) {
    shoot();
  }
  prevShoot = shootBtn;

  // Undo (on press) - WIS powered
  if (undoBtn && !prevUndo) {
    if (undoCharges > 0) {
      doUndo();
    } else {
      // Fallback: reset room
      loadRoom(room);
      return;
    }
  }
  prevUndo = undoBtn;

  // Hint (on press) - INT powered
  if (hintBtn && !prevHint) {
    useHint();
  }
  prevHint = hintBtn;

  // Hard reset
  if (resetBtn) {
    loadRoom(room);
    return;
  }

  // Movement with stat-based speed
  moveDelay -= dt;
  if (moveDelay > 0) return;

  var moved = false;
  if (up) { tryMove(0); moved = true; }
  else if (down) { tryMove(1); moved = true; }
  else if (left) { tryMove(2); moved = true; }
  else if (right) { tryMove(3); moved = true; }

  if (moved) {
    var baseSpeed = dexMoveSpeed();
    if (speedBoost > 0) baseSpeed *= 0.6;
    moveDelay = baseSpeed;
  }
}

// === DRAWING ===
function getTheme() {
  return FLOOR_THEMES[room] || FLOOR_THEMES[0];
}

function drawTile(col, row) {
  var x = col * TS;
  var y = row * TS + HUD_H;
  var t = grid[row][col];
  var theme = getTheme();

  switch (t) {
    case T.FLOOR:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.strokeRect(x, y, TS, TS);
      break;

    case T.WALL:
      ctx.fillStyle = theme.wall;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = theme.wallTop;
      ctx.fillRect(x + 2, y + 2, TS - 4, TS - 8);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(x, y + TS - 4, TS, 4);
      break;

    case T.EMERALD:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(x + 3, y + 3, TS - 6, TS - 6);
      ctx.fillStyle = '#a8666e';
      ctx.fillRect(x + 5, y + 5, 6, 6);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x + 3, y + TS - 7, TS - 6, 4);
      break;

    case T.WATER:
      ctx.fillStyle = '#1a3a5a';
      ctx.fillRect(x, y, TS, TS);
      var waveOff = Math.sin(frame * 0.05 + col * 0.8) * 2;
      ctx.fillStyle = '#3cacd7';
      ctx.fillRect(Math.floor(x + 4), Math.floor(y + 10 + waveOff), 8, 3);
      ctx.fillRect(Math.floor(x + 18), Math.floor(y + 20 - waveOff), 6, 2);
      break;

    case T.BRIDGE:
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(x + 4, y + 8, TS - 8, 3);
      ctx.fillRect(x + 4, y + 20, TS - 8, 3);
      break;

    case T.ARROW_U:
    case T.ARROW_D:
    case T.ARROW_L:
    case T.ARROW_R:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = '#888888';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      var acx = Math.floor(x + TS / 2), acy = Math.floor(y + TS / 2);
      if (t === T.ARROW_U) {
        ctx.moveTo(acx, acy - 10); ctx.lineTo(acx - 8, acy + 6); ctx.lineTo(acx + 8, acy + 6);
      } else if (t === T.ARROW_D) {
        ctx.moveTo(acx, acy + 10); ctx.lineTo(acx - 8, acy - 6); ctx.lineTo(acx + 8, acy - 6);
      } else if (t === T.ARROW_L) {
        ctx.moveTo(acx - 10, acy); ctx.lineTo(acx + 6, acy - 8); ctx.lineTo(acx + 6, acy + 8);
      } else {
        ctx.moveTo(acx + 10, acy); ctx.lineTo(acx - 6, acy - 8); ctx.lineTo(acx - 6, acy + 8);
      }
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    case T.BUSH:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = '#2a5a3a';
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2), Math.floor(y + TS / 2 + 2), 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2 - 3), Math.floor(y + TS / 2 - 3), 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2 + 5), Math.floor(y + TS / 2), 4, 0, Math.PI * 2);
      ctx.fill();
      break;

    // PASS 2: Reactor Block
    case T.REACTOR:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = '#cc4400';
      ctx.fillRect(x + 3, y + 3, TS - 6, TS - 6);
      // Pulsing core
      var rPulse = Math.sin(frame * 0.12) * 0.3 + 0.7;
      ctx.fillStyle = 'rgba(255,150,0,' + rPulse + ')';
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2), Math.floor(y + TS / 2), 6, 0, Math.PI * 2);
      ctx.fill();
      // Warning glow
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(x + 8, y + 8, 4, 4);
      ctx.fillRect(x + TS - 12, y + TS - 12, 4, 4);
      // Hazard stripes
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + 3, y + 3); ctx.lineTo(x + TS - 3, y + TS - 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + TS - 3, y + 3); ctx.lineTo(x + 3, y + TS - 3);
      ctx.stroke();
      break;

    // PASS 2: Spore Tile
    case T.SPORE:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      ctx.fillStyle = '#2a4a2a';
      ctx.fillRect(x + 2, y + 2, TS - 4, TS - 4);
      // Spore dots
      var sAnim = Math.sin(frame * 0.06 + col + row) * 2;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(Math.floor(x + 8 + sAnim), Math.floor(y + 10), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(Math.floor(x + 20 - sAnim), Math.floor(y + 18), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(Math.floor(x + 14), Math.floor(y + 24 + sAnim), 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    // PASS 2: Mycelial Tile
    case T.MYCELIAL:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      // Glowing network lines
      ctx.strokeStyle = '#38d973';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 4, Math.floor(y + TS / 2));
      ctx.lineTo(Math.floor(x + TS / 2), y + 4);
      ctx.lineTo(x + TS - 4, Math.floor(y + TS / 2));
      ctx.lineTo(Math.floor(x + TS / 2), y + TS - 4);
      ctx.closePath();
      ctx.stroke();
      ctx.fillStyle = '#6bf5a0';
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2), Math.floor(y + TS / 2), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 1;
      break;

    // Items
    case T.ITEM_STAR:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      drawStarItem(Math.floor(x + TS / 2), Math.floor(y + TS / 2));
      break;
    case T.ITEM_SHIELD:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      drawShieldItem(Math.floor(x + TS / 2), Math.floor(y + TS / 2));
      break;
    case T.ITEM_SPEED:
      ctx.fillStyle = theme.floor;
      ctx.fillRect(x, y, TS, TS);
      drawSpeedItem(Math.floor(x + TS / 2), Math.floor(y + TS / 2));
      break;
  }
}

function drawStarItem(cx, cy) {
  var pulse = Math.sin(frame * 0.1) * 2;
  ctx.fillStyle = '#f4b41b';
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var angle = (i * 4 * Math.PI / 5) - Math.PI / 2;
    var r = i % 2 === 0 ? (8 + pulse) : 4;
    var sx = cx + Math.cos(angle) * r;
    var sy = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(Math.floor(sx), Math.floor(sy));
    else ctx.lineTo(Math.floor(sx), Math.floor(sy));
    var angle2 = angle + 2 * Math.PI / 5;
    var r2 = i % 2 === 0 ? 4 : (8 + pulse);
    ctx.lineTo(Math.floor(cx + Math.cos(angle2) * r2), Math.floor(cy + Math.sin(angle2) * r2));
  }
  ctx.closePath();
  ctx.fill();
}

function drawShieldItem(cx, cy) {
  ctx.fillStyle = '#3cacd7';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 10);
  ctx.lineTo(cx + 8, cy - 5);
  ctx.lineTo(cx + 8, cy + 3);
  ctx.lineTo(cx, cy + 10);
  ctx.lineTo(cx - 8, cy + 3);
  ctx.lineTo(cx - 8, cy - 5);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#6dc8e6';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 6);
  ctx.lineTo(cx + 4, cy - 3);
  ctx.lineTo(cx + 4, cy + 1);
  ctx.lineTo(cx, cy + 6);
  ctx.lineTo(cx - 4, cy + 1);
  ctx.lineTo(cx - 4, cy - 3);
  ctx.closePath();
  ctx.fill();
}

function drawSpeedItem(cx, cy) {
  ctx.fillStyle = '#38d973';
  // Lightning bolt
  ctx.beginPath();
  ctx.moveTo(cx + 2, cy - 10);
  ctx.lineTo(cx - 4, cy);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx - 2, cy + 10);
  ctx.lineTo(cx + 4, cy);
  ctx.lineTo(cx, cy);
  ctx.closePath();
  ctx.fill();
}

function drawHeart(h) {
  if (h.collected) return;
  var x = Math.floor(h.x * TS + TS / 2);
  var y = Math.floor(h.y * TS + TS / 2 + HUD_H);
  var pulse = Math.sin(frame * 0.08 + h.x * 2) * 2;

  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  var s = 8 + pulse * 0.5;
  ctx.moveTo(x, Math.floor(y + s * 0.4));
  ctx.bezierCurveTo(x, Math.floor(y - s * 0.4), Math.floor(x - s), Math.floor(y - s * 0.4), Math.floor(x - s), Math.floor(y + s * 0.1));
  ctx.bezierCurveTo(Math.floor(x - s), Math.floor(y + s * 0.6), x, Math.floor(y + s * 0.9), x, Math.floor(y + s));
  ctx.bezierCurveTo(x, Math.floor(y + s * 0.9), Math.floor(x + s), Math.floor(y + s * 0.6), Math.floor(x + s), Math.floor(y + s * 0.1));
  ctx.bezierCurveTo(Math.floor(x + s), Math.floor(y - s * 0.4), x, Math.floor(y - s * 0.4), x, Math.floor(y + s * 0.4));
  ctx.fill();

  if (frame % 20 < 5) {
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(x - 3, y - 5, 2, 2);
    ctx.globalAlpha = 1;
  }

  // Hint flash arrow
  if (hintFlash > 0 && hintTarget && hintTarget.x === h.x && hintTarget.y === h.y) {
    ctx.fillStyle = 'rgba(255,255,100,' + (Math.sin(frame * 0.3) * 0.3 + 0.5) + ')';
    ctx.beginPath();
    ctx.arc(x, y - 18, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(x - 1, y - 16, 2, 6);
  }
}

function drawChest() {
  var x = Math.floor(chest.x * TS);
  var y = Math.floor(chest.y * TS + HUD_H);

  if (chest.open) {
    var glow = Math.sin(frame * 0.1) * 0.2 + 0.8;
    ctx.fillStyle = '#f4b41b';
    ctx.globalAlpha = glow;
    ctx.fillRect(x + 4, y + 4, TS - 8, TS - 8);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(x + 6, y + 14, TS - 12, TS - 18);
    ctx.fillStyle = '#d4a017';
    ctx.fillRect(x + 4, y + 4, TS - 8, 10);
    ctx.fillStyle = '#f4d03f';
    ctx.fillRect(x + 12, y + 6, 8, 6);

    // Hint flash
    if (hintFlash > 0 && hintTarget && hintTarget.x === chest.x && hintTarget.y === chest.y) {
      ctx.fillStyle = 'rgba(255,255,100,' + (Math.sin(frame * 0.3) * 0.3 + 0.5) + ')';
      ctx.beginPath();
      ctx.arc(Math.floor(x + TS / 2), y - 4, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.fillStyle = '#b8860b';
    ctx.fillRect(x + 4, y + 8, TS - 8, TS - 12);
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(x + 4, y + 8, TS - 8, 8);
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(x + 12, y + 10, 8, 4);
  }
}

function drawPlayer() {
  if (dead) {
    if (deadTimer % 10 < 5) return;
  }
  var x = Math.floor(player.x * TS + TS / 2);
  var y = Math.floor(player.y * TS + TS / 2 + HUD_H);

  // Shield aura
  if (shieldActive > 0) {
    ctx.strokeStyle = 'rgba(68,170,255,' + (0.3 + Math.sin(frame * 0.15) * 0.2) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Star sparkle
  if (starActive > 0) {
    ctx.fillStyle = 'rgba(255,255,100,' + (0.3 + Math.sin(frame * 0.2) * 0.2) + ')';
    ctx.beginPath();
    ctx.arc(x, y, 17, 0, Math.PI * 2);
    ctx.fill();
  }

  // === BASELING SPRITE ===
  var _anim = player.moving ? 'walk' : 'idle';
  if (!TAS.drawBaseling(ctx, x, y, 24, { flipX: player.dir === 2, frame: frame, anim: _anim })) {
    // Body - colored by statB
    ctx.fillStyle = statB.color || '#6688ff';
    ctx.beginPath();
    ctx.arc(x, y + 2, 12, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    var bodyColor = statB.color || '#6688ff';
    ctx.fillStyle = lightenColor(bodyColor, 40);
    ctx.beginPath();
    ctx.arc(x - 3, y - 2, 5, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#ffffff';
    var eyeOffX = DX[player.dir] * 3;
    var eyeOffY = DY[player.dir] * 2;
    ctx.beginPath();
    ctx.arc(Math.floor(x - 4 + eyeOffX), Math.floor(y - 1 + eyeOffY), 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(Math.floor(x + 4 + eyeOffX), Math.floor(y - 1 + eyeOffY), 4, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#222244';
    ctx.beginPath();
    ctx.arc(Math.floor(x - 4 + eyeOffX * 1.3), Math.floor(y - 1 + eyeOffY * 1.3), 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(Math.floor(x + 4 + eyeOffX * 1.3), Math.floor(y - 1 + eyeOffY * 1.3), 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed lines
  if (speedBoost > 0) {
    ctx.strokeStyle = 'rgba(136,255,68,0.5)';
    ctx.lineWidth = 1;
    for (var sl = 0; sl < 3; sl++) {
      var slx = x - DX[player.dir] * (8 + sl * 5);
      var sly = y - DY[player.dir] * (8 + sl * 5) + (sl - 1) * 4;
      ctx.beginPath();
      ctx.moveTo(Math.floor(slx), Math.floor(sly));
      ctx.lineTo(Math.floor(slx - DX[player.dir] * 6), Math.floor(sly - DY[player.dir] * 6));
      ctx.stroke();
    }
  }
}

function lightenColor(hex, amt) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = Math.min(255, parseInt(hex.substr(0,2),16) + amt);
  var g = Math.min(255, parseInt(hex.substr(2,2),16) + amt);
  var b = Math.min(255, parseInt(hex.substr(4,2),16) + amt);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function drawEnemy(en) {
  var x = Math.floor(en.x * TS + TS / 2);
  var y = Math.floor(en.y * TS + TS / 2 + HUD_H);

  switch (en.type) {
    case E.MEDUSA:
      ctx.fillStyle = '#7a444a';
      ctx.beginPath();
      ctx.arc(x, y, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(x - 4, y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 4, y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e6482e';
      ctx.beginPath();
      ctx.arc(x - 4, y - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 4, y - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#a8666e';
      ctx.lineWidth = 2;
      for (var i = 0; i < 3; i++) {
        var tx = x - 6 + i * 6;
        var wiggle = Math.sin(frame * 0.1 + i) * 3;
        ctx.beginPath();
        ctx.moveTo(tx, y + 8);
        ctx.lineTo(Math.floor(tx + wiggle), y + 14);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      if (!dead && hasLineOfSight(en.x, en.y, player.x, player.y)) {
        ctx.strokeStyle = 'rgba(255,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(Math.floor(player.x * TS + TS / 2), Math.floor(player.y * TS + TS / 2 + HUD_H));
        ctx.stroke();
        ctx.lineWidth = 1;
      }
      break;

    case E.SKULL:
      ctx.fillStyle = '#dddddd';
      ctx.beginPath();
      ctx.arc(x, y, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111111';
      ctx.beginPath();
      ctx.arc(x - 4, y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 4, y - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(x - 5, y + 5, 10, 3);
      if (en.fireTimer > 70) {
        ctx.fillStyle = 'rgba(255,100,0,' + ((en.fireTimer - 70) / 20 * 0.5) + ')';
        ctx.beginPath();
        ctx.arc(x, y, 13, 0, Math.PI * 2);
        ctx.fill();
      }
      break;

    case E.DRAGON:
      ctx.fillStyle = '#e6482e';
      ctx.beginPath();
      ctx.arc(x, y, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4724a';
      ctx.beginPath();
      ctx.arc(x - 2, y - 4, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(x - 3, y - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 3, y - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,100,0,0.4)';
      ctx.lineWidth = 3;
      var dfdx = DX[en.dir], dfdy = DY[en.dir];
      ctx.beginPath();
      ctx.moveTo(Math.floor(x + dfdx * 10), Math.floor(y + dfdy * 10));
      var fireDist = 0;
      var dfcx = en.x + dfdx, dfcy = en.y + dfdy;
      while (dfcx >= 0 && dfcx < COLS && dfcy >= 0 && dfcy < ROWS && !blocksLineOfSight(dfcx, dfcy)) {
        fireDist++;
        dfcx += dfdx; dfcy += dfdy;
      }
      if (fireDist > 0) {
        ctx.lineTo(Math.floor(x + dfdx * (10 + fireDist * TS)), Math.floor(y + dfdy * (10 + fireDist * TS)));
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      break;

    case E.ARMADILLO:
      ctx.fillStyle = en.awake ? '#7a444a' : '#5a3a3a';
      ctx.beginPath();
      ctx.arc(x, y, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = en.awake ? '#a8666e' : '#4a3333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
      if (en.awake) {
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(x - 3, y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 3, y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        var zOff = Math.sin(frame * 0.05) * 2;
        ctx.fillText('z', x + 8, Math.floor(y - 8 + zOff));
      }
      break;

    case E.ROCKY:
      ctx.fillStyle = en.awake ? '#888888' : '#666666';
      ctx.beginPath();
      ctx.moveTo(x, y - 12);
      ctx.lineTo(x + 10, y - 4);
      ctx.lineTo(x + 10, y + 8);
      ctx.lineTo(x - 10, y + 8);
      ctx.lineTo(x - 10, y - 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x - 3, y - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 3, y - 1, 2, 0, Math.PI * 2);
      ctx.fill();
      if (!en.awake) {
        ctx.fillStyle = '#aaaaaa';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('z', x + 8, Math.floor(y - 10 + Math.sin(frame * 0.04) * 2));
      }
      break;

    // PASS 2: Reactor Turret
    case E.REACTOR_TURRET:
      // Orange mechanical turret
      ctx.fillStyle = '#cc6600';
      ctx.fillRect(x - 10, y - 10, 20, 20);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(x - 7, y - 7, 14, 14);
      // Barrel glow when charging
      var tCharge = en.fireTimer / 120;
      if (tCharge > 0.7) {
        ctx.fillStyle = 'rgba(255,100,0,' + ((tCharge - 0.7) / 0.3) + ')';
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      // Cross hairs
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x - 6, y); ctx.lineTo(x + 6, y);
      ctx.moveTo(x, y - 6); ctx.lineTo(x, y + 6);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Center eye
      ctx.fillStyle = '#ff3300';
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    // PASS 2: Spore Ghost
    case E.SPORE_GHOST:
      var phased = en.phaseTimer > 0;
      ctx.globalAlpha = phased ? 0.35 : 0.9;
      ctx.fillStyle = phased ? '#66cc88' : '#44aa66';
      ctx.beginPath();
      ctx.arc(x, y - 2, 10, Math.PI, 0);
      ctx.lineTo(x + 10, y + 8);
      // Wavy bottom
      for (var wi = 4; wi >= -4; wi -= 2) {
        ctx.lineTo(Math.floor(x + wi * 2.5), Math.floor(y + 8 + Math.sin(frame * 0.15 + wi) * 3));
      }
      ctx.lineTo(x - 10, y + 8);
      ctx.closePath();
      ctx.fill();
      // Eyes
      ctx.fillStyle = phased ? 'rgba(255,255,255,0.5)' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x - 3, y - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 3, y - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = phased ? 'rgba(0,50,0,0.5)' : '#003300';
      ctx.beginPath();
      ctx.arc(x - 3, y - 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 3, y - 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    // PASS 2: Boss Core
    case E.BOSS_CORE:
      // Large pulsing core
      var bPulse = Math.sin(frame * 0.08) * 3;
      ctx.fillStyle = '#5b1a8a';
      ctx.beginPath();
      ctx.arc(x, y, 14 + bPulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.arc(x, y, 10 + bPulse * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d4a0ff';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      // Orbiting dots
      for (var oi = 0; oi < 4; oi++) {
        var oAngle = frame * 0.05 + oi * Math.PI / 2;
        var ox = Math.floor(x + Math.cos(oAngle) * (12 + bPulse));
        var oy = Math.floor(y + Math.sin(oAngle) * (12 + bPulse));
        ctx.fillStyle = '#c488ff';
        ctx.beginPath();
        ctx.arc(ox, oy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // HP bar
      if (bossMaxHP > 0) {
        var barW = 28;
        var barH = 4;
        ctx.fillStyle = '#2a1040';
        ctx.fillRect(Math.floor(x - barW / 2), y - 20, barW, barH);
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(Math.floor(x - barW / 2), y - 20, Math.floor(barW * (en.hp / bossMaxHP)), barH);
      }
      break;
  }
}

function drawEgg(eg) {
  var x = Math.floor(eg.x * TS + TS / 2);
  var y = Math.floor(eg.y * TS + TS / 2 + HUD_H);
  ctx.fillStyle = eg.timer < 60 ? '#ffaaaa' : '#ffffff';
  ctx.beginPath();
  ctx.ellipse(x, y, 9, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#aaaaaa';
  ctx.beginPath();
  ctx.moveTo(x - 3, y - 4);
  ctx.lineTo(x, y - 1);
  ctx.lineTo(x + 2, y - 5);
  ctx.stroke();
}

function drawBullet(b) {
  var x = Math.floor(b.x * TS + TS / 2);
  var y = Math.floor(b.y * TS + TS / 2 + HUD_H);
  ctx.fillStyle = '#ffff88';
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawFireball(f) {
  var x = Math.floor(f.x * TS + TS / 2);
  var y = Math.floor(f.y * TS + TS / 2 + HUD_H);
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(x, y, Math.floor(5 + Math.sin(frame * 0.3) * 2), 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.arc(x, y, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawGameHUD() {
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, HUD_H);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a855f7';
  ctx.fillText('F' + (room + 1), 4, 12);

  // Spore gem counter
  ctx.fillStyle = '#38d973';
  ctx.textAlign = 'center';
  var heartStr = '';
  for (var hi = 0; hi < heartsTotal; hi++) {
    heartStr += hi < heartsCollected ? '*' : 'o';
  }
  ctx.fillText(heartStr, Math.floor(GW / 2), 12);

  // Shots + score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#f4b41b';
  if (player.shots > 0) ctx.fillText('S:' + player.shots, GW - 4, 12);

  // Bottom row: undo, hints, score
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  if (undoCharges > 0) {
    ctx.fillStyle = '#3cacd7';
    ctx.fillText('UNDO:' + undoCharges, 4, 26);
  }
  if (hintCharges > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('HINT:' + hintCharges, 60, 26);
  }
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText(String(score), GW - 4, 26);

  // Shield/Star/Speed indicators
  ctx.textAlign = 'center';
  var indX = Math.floor(GW / 2);
  if (shieldActive > 0) {
    ctx.fillStyle = '#3cacd7';
    ctx.fillText('SHIELD', indX - 40, 26);
  }
  if (starActive > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('SPORE', indX, 26);
  }
  if (speedBoost > 0) {
    ctx.fillStyle = '#38d973';
    ctx.fillText('FAST', indX + 40, 26);
  }

  // Boss HP bar
  if (bossMaxHP > 0 && bossHP > 0) {
    var bw = 100, bh = 4, bx = Math.floor((GW - bw) / 2), by = 29;
    ctx.fillStyle = '#2a1040';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(bx, by, Math.floor(bw * bossHP / bossMaxHP), bh);
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; // consume so it doesn't also start the game
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
      room = 0;
      score = 0;
      tries = 0;
      maxTries = 3 + conExtraTries();
      loadRoom(room);
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'complete') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    // Decrement timers
    if (shieldActive > 0) shieldActive--;
    if (speedBoost > 0) speedBoost--;
    if (starActive > 0) starActive--;
    if (hintFlash > 0) hintFlash--;
    if (floorNameTimer > 0) floorNameTimer--;
    if (celebrationTimer > 0) celebrationTimer--;
    updateReactorChain(dt);

    if (dead) {
      deadTimer--;
      if (deadTimer <= 0) {
        loadRoom(room);
      }
      return;
    }

    if (cleared) {
      clearedTimer--;
      // Celebration particles
      if (celebrationTimer > 0 && frame % 4 === 0) {
        var cpx = Math.floor(Math.random() * GW);
        var colors = ['#f4b41b', '#38d973', '#a855f7', '#3cacd7', '#e6482e'];
        TAS.particles.spawn(cpx, Math.floor(GH / 2), colors[Math.floor(Math.random() * colors.length)], 5, 3);
      }
      if (clearedTimer <= 0) {
        room++;
        if (room >= ROOMS.length) {
          state = 'complete';
        } else {
          loadRoom(room);
        }
      }
      return;
    }

    handleInput(dt);
    updateBullets();
    updateEggs(dt);
    updateEnemies(dt);
    updateFireballs();
  }
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'complete') {
    drawCompleteScreen();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Draw grid
  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      drawTile(col, row);
    }
  }

  // Reactor chain explosions
  if (reactorChainTimer > 0) {
    for (var ri = 0; ri < reactorChainTiles.length; ri++) {
      var rt = reactorChainTiles[ri];
      var rAlpha = reactorChainTimer / 30;
      ctx.fillStyle = 'rgba(255,100,0,' + (rAlpha * 0.5) + ')';
      ctx.beginPath();
      ctx.arc(Math.floor(rt.x * TS + TS / 2), Math.floor(rt.y * TS + TS / 2 + HUD_H), Math.floor(TS * (1.5 - rAlpha)), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  drawChest();

  for (var i = 0; i < hearts.length; i++) {
    drawHeart(hearts[i]);
  }

  for (var i = 0; i < eggs.length; i++) {
    drawEgg(eggs[i]);
  }

  for (var i = 0; i < enemies.length; i++) {
    drawEnemy(enemies[i]);
  }

  for (var i = 0; i < bullets.length; i++) {
    drawBullet(bullets[i]);
  }

  for (var i = 0; i < fireballs.length; i++) {
    drawFireball(fireballs[i]);
  }

  drawPlayer();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawGameHUD();

  // Floor name overlay (PASS 3)
  if (floorNameTimer > 0) {
    var fnAlpha = Math.min(1, floorNameTimer / 30);
    ctx.globalAlpha = fnAlpha;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, Math.floor(GH / 2 - 20), GW, 40);
    ctx.textAlign = 'center';
    ctx.fillStyle = getTheme().accent || '#88ccff';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Floor ' + (room + 1) + ': ' + (FLOOR_NAMES[room] || 'Unknown'), Math.floor(GW / 2), Math.floor(GH / 2));
    // Boss indicator
    if ((room + 1) % 10 === 0) {
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('-- BLIGHT CORE --', Math.floor(GW / 2), Math.floor(GH / 2 + 14));
    }
    ctx.globalAlpha = 1;
  }

  // Cleared overlay (PASS 3 improved)
  if (cleared) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 24px monospace';
    var clearY = Math.floor(GH / 2);
    ctx.fillText('SPORES CLEARED!', Math.floor(GW / 2), clearY - 8);
    ctx.fillStyle = '#38d973';
    ctx.font = '12px monospace';
    ctx.fillText('+' + Math.floor(200 * intScoreMult()) + ' pts', Math.floor(GW / 2), clearY + 12);
  }

  // Dead overlay
  if (dead) {
    ctx.fillStyle = 'rgba(80,0,0,0.3)';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Animated background grid
  ctx.strokeStyle = 'rgba(168,85,247,0.12)';
  for (var i = 0; i < 12; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 32, 0); ctx.lineTo(i * 32, GH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * 32); ctx.lineTo(GW, i * 32);
    ctx.stroke();
  }

  // Floating particles on title
  if (frame % 10 === 0) {
    TAS.particles.spawn(Math.floor(Math.random() * GW), GH, 'rgba(56,217,115,0.5)', 2, 1);
  }
  TAS.particles.draw();

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('SPORE LOLO', Math.floor(GW / 2 + 2), 72);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE LOLO', Math.floor(GW / 2), 70);

  ctx.fillStyle = '#7a444a';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Puzzle Adventure', Math.floor(GW / 2), 92);

  // Selected baseling preview (idle bob) — falls back to a procedural mascot for Wimmple.
  var bcx = Math.floor(GW / 2), bcy = 130;
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (!TAS.drawBaseling(ctx, bcx, bcy, 36, { anim: 'idle', frame: frame })) {
    ctx.fillStyle = statB.color || '#6688ff';
    ctx.beginPath();
    ctx.arc(bcx, bcy, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = lightenColor(statB.color || '#6688ff', 40);
    ctx.beginPath();
    ctx.arc(bcx - 4, bcy - 5, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(bcx - 5, bcy - 2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bcx + 5, bcy - 2, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(bcx - 4, bcy - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bcx + 6, bcy - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Selected baseling name (Base-blue accent)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), Math.floor(GW / 2), 158);

  // 5 stat bars in their canonical colors (bar fill = stat / 200)
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = Math.floor(GW / 2) - 84;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 35;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 168);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 171, 28, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 171, 28 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  var iy = 185;
  ctx.fillText('Collect spore gems to open the gate', Math.floor(GW / 2), iy);
  ctx.fillText('Push mycelium blocks to solve puzzles', Math.floor(GW / 2), iy + 15);
  ctx.fillText('2 gems = 1 spore shot (Z/SPACE)', Math.floor(GW / 2), iy + 30);

  // SELECT BASELING prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  var sy = iy + 50;
  ctx.fillText('[C] SELECT BASELING', Math.floor(GW / 2), sy);
  ctx.fillStyle = '#777';
  ctx.font = '9px monospace';
  ctx.fillText('A fed baseling plays a little stronger', Math.floor(GW / 2), sy + 12);

  // Controls legend
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD: Move  Z/SPACE: Shoot', Math.floor(GW / 2), sy + 30);
  ctx.fillText('R: Undo  H/X: Hint  ESC: Reset', Math.floor(GW / 2), sy + 42);

  // Progress
  if (progress > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '11px monospace';
    ctx.fillText('Progress: Floor ' + progress + '/' + ROOMS.length, Math.floor(GW / 2), sy + 62);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', Math.floor(GW / 2), GH - 30);
  ctx.globalAlpha = 1;
}

function drawCompleteScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('ALL SPORES', Math.floor(GW / 2), 80);
  ctx.fillText('PURGED!', Math.floor(GW / 2), 115);

  ctx.fillStyle = '#38d973';
  ctx.font = '14px monospace';
  ctx.fillText('The fungal dungeon is cleansed!', Math.floor(GW / 2), 155);
  ctx.fillText('Your baseling solved all ' + ROOMS.length + ' puzzles!', Math.floor(GW / 2), 178);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '12px monospace';
  ctx.fillText('Final Score: ' + score, Math.floor(GW / 2), 205);

  // Celebration baseling
  var bounce = Math.sin(frame * 0.1) * 5;
  ctx.fillStyle = statB.color || '#6688ff';
  ctx.beginPath();
  ctx.arc(Math.floor(GW / 2), Math.floor(240 + bounce), 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(Math.floor(GW / 2 - 5), Math.floor(236 + bounce), 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(Math.floor(GW / 2 + 5), Math.floor(236 + bounce), 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(Math.floor(GW / 2), Math.floor(242 + bounce), 6, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
  ctx.lineWidth = 1;

  // Confetti particles
  if (frame % 8 === 0) {
    var px = Math.floor(Math.random() * GW);
    var colors = ['#f4b41b', '#38d973', '#a855f7', '#3cacd7', '#e6482e', '#7a444a'];
    TAS.particles.spawn(px, 50, colors[Math.floor(Math.random() * colors.length)], 4, 3);
  }
  TAS.particles.draw();

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY', Math.floor(GW / 2), 320);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
