<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Bowl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'PASS', b: 'JUKE' } });

const SAVE_KEY = 'bbowl';
const FIELD_LEFT = 30;
const FIELD_RIGHT = 450;
const FIELD_TOP = 40;
const FIELD_BOTTOM = 280;
const FIELD_WIDTH = FIELD_RIGHT - FIELD_LEFT;
const FIELD_HEIGHT = FIELD_BOTTOM - FIELD_TOP;
const END_ZONE_W = 40;
const YARD_PX = (FIELD_WIDTH - END_ZONE_W * 2) / 100;
const PLAYER_R = 6;
const TACKLE_DIST = 10;
const INTERCEPTION_CHANCE = 0.25;
const FUMBLE_CHANCE = 0.06;
const QUARTER_TIME = 120;
const PLAY_CLOCK = 25;

// === TEAMS ===
const TEAMS = [
  { name: "Spore Stormers", abbr: "SPR", colors: ['#44cc88', '#227744'], speed: 7, power: 6, passing: 8, defense: 6 },
  { name: "Fungal Fury", abbr: "FNG", colors: ['#aa44cc', '#662288'], speed: 6, power: 8, passing: 6, defense: 7 },
  { name: "Reactor Bolts", abbr: "RCT", colors: ['#44aaff', '#2266bb'], speed: 8, power: 5, passing: 7, defense: 6 },
  { name: "Token Titans", abbr: "TKN", colors: ['#ffcc22', '#aa8800'], speed: 5, power: 9, passing: 6, defense: 8 },
  { name: "Poop Piledrivers", abbr: "PPD", colors: ['#996633', '#553311'], speed: 6, power: 9, passing: 5, defense: 7 },
  { name: "Crystal Crushers", abbr: "CRS", colors: ['#66ddff', '#3399bb'], speed: 7, power: 7, passing: 7, defense: 7 },
  { name: "Hex Hawks", abbr: "HEX", colors: ['#ff6644', '#aa3311'], speed: 9, power: 5, passing: 8, defense: 5 },
  { name: "Dark Dragoons", abbr: "DRG", colors: ['#8844aa', '#441166'], speed: 6, power: 7, passing: 6, defense: 9 }
];

// === PLAY DEFINITIONS ===
const OFFENSE_PLAYS = [
  { name: "Short Pass", type: 'pass', routes: 'short' },
  { name: "Long Bomb", type: 'pass', routes: 'long' },
  { name: "Run Left", type: 'run', dir: -1 },
  { name: "Run Right", type: 'run', dir: 1 }
];

const DEFENSE_PLAYS = [
  { name: "Blitz", type: 'blitz', rush: 5, coverDist: 30 },
  { name: "Zone", type: 'zone', rush: 3, coverDist: 60 },
  { name: "Man", type: 'man', rush: 3, coverDist: 45 },
  { name: "Prevent", type: 'prevent', rush: 2, coverDist: 80 }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let highScore = parseInt(localStorage.getItem(SAVE_KEY + '_hi')) || 0;

// Season state
let season = null;
let playerTeamIdx = 0;

// Match state
let match = null;

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2); }
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function yardToX(yard, direction) {
  return FIELD_LEFT + END_ZONE_W + yard * YARD_PX;
}

// === SEASON MANAGEMENT ===
function createSeason(teamIdx) {
  const schedule = [];
  const opponents = [];
  for (let i = 0; i < 8; i++) { if (i !== teamIdx) opponents.push(i); }
  // Shuffle opponents for variety
  for (let i = opponents.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opponents[i], opponents[j]] = [opponents[j], opponents[i]];
  }
  for (let i = 0; i < 7; i++) schedule.push(opponents[i]);

  return {
    teamIdx: teamIdx,
    week: 0,
    schedule: schedule,
    wins: 0,
    losses: 0,
    pointsFor: 0,
    pointsAgainst: 0,
    phase: 'season', // season, semi, final, champion
    playoffOpponents: [],
    results: []
  };
}

function advanceSeason() {
  if (season.phase === 'season') {
    season.week++;
    if (season.week >= 7) {
      if (season.wins >= 4) {
        season.phase = 'semi';
        // Pick 2 random opponents for playoffs
        const pool = [];
        for (let i = 0; i < 8; i++) { if (i !== season.teamIdx) pool.push(i); }
        for (let i = pool.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [pool[i], pool[j]] = [pool[j], pool[i]];
        }
        season.playoffOpponents = [pool[0], pool[1]];
        season.week = 0;
      } else {
        state = 'seasonEnd';
        return;
      }
    }
  } else if (season.phase === 'semi') {
    season.phase = 'final';
  } else if (season.phase === 'final') {
    season.phase = 'champion';
    state = 'champion';
    const totalWins = season.wins;
    if (totalWins > highScore) {
      highScore = totalWins;
      localStorage.setItem(SAVE_KEY + '_hi', highScore);
    }
    return;
  }
}

function getCurrentOpponent() {
  if (season.phase === 'season') return season.schedule[season.week];
  if (season.phase === 'semi') return season.playoffOpponents[0];
  if (season.phase === 'final') return season.playoffOpponents[1];
  return 0;
}

// === MATCH MANAGEMENT ===
function createMatch(homeIdx, awayIdx, playerIsHome) {
  const homeTeam = TEAMS[homeIdx];
  const awayTeam = TEAMS[awayIdx];

  return {
    home: homeIdx,
    away: awayIdx,
    playerIsHome: playerIsHome,
    homeScore: 0,
    awayScore: 0,
    quarter: 1,
    clock: QUARTER_TIME,
    playClock: PLAY_CLOCK,
    possession: 'home', // who has ball
    down: 1,
    yardsToGo: 10,
    lineOfScrimmage: 20, // yards from possession team's end zone
    direction: 1, // 1 = going right, -1 = going left
    phase: 'playSelect', // playSelect, presnap, snap, play, tackle, scoring, turnover, punt, fieldGoal, halftime, quarterEnd, gameOver
    offensePlay: null,
    defensePlay: null,
    players: [],
    ball: null,
    ballCarrier: null,
    passTarget: null,
    passInFlight: false,
    passOrigin: null,
    passDestX: 0,
    passDestY: 0,
    passProgress: 0,
    resultText: '',
    resultTimer: 0,
    breakaway: false,
    breakawayTimer: 0,
    breakawayRunner: null,
    kickMeter: 0,
    kickDir: 1,
    kickPhase: 0,
    crowdNoise: 0,
    playTimer: 0,
    playerControlIdx: -1,
    aiSelectTimer: 0,
    cursor: 0,
    jukeTimer: 0,
    passHighlight: -1,
    passSelectTimer: 0
  };
}

function createPlayers(m) {
  m.players = [];
  const offTeamIdx = m.possession === 'home' ? m.home : m.away;
  const defTeamIdx = m.possession === 'home' ? m.away : m.home;
  const offTeam = TEAMS[offTeamIdx];
  const defTeam = TEAMS[defTeamIdx];
  const losX = yardToX(m.lineOfScrimmage * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
  const dir = m.direction;

  // Offense: QB, 2 WR, 1 RB, 1 TE (5 players)
  // QB
  m.players.push({
    x: losX - dir * 20, y: GH / 2,
    vx: 0, vy: 0,
    team: 'offense', role: 'qb',
    speed: 1.5 + offTeam.speed * 0.15,
    power: offTeam.power,
    teamIdx: offTeamIdx,
    routeX: 0, routeY: 0, routePhase: 0,
    hasBall: true, controlled: false
  });
  // WR1 (top)
  m.players.push({
    x: losX + dir * 5, y: FIELD_TOP + 30,
    vx: 0, vy: 0,
    team: 'offense', role: 'wr',
    speed: 2.0 + offTeam.speed * 0.2,
    power: offTeam.power * 0.6,
    teamIdx: offTeamIdx,
    routeX: 0, routeY: 0, routePhase: 0,
    hasBall: false, controlled: false
  });
  // WR2 (bottom)
  m.players.push({
    x: losX + dir * 5, y: FIELD_BOTTOM - 30,
    vx: 0, vy: 0,
    team: 'offense', role: 'wr',
    speed: 2.0 + offTeam.speed * 0.2,
    power: offTeam.power * 0.6,
    teamIdx: offTeamIdx,
    routeX: 0, routeY: 0, routePhase: 0,
    hasBall: false, controlled: false
  });
  // RB
  m.players.push({
    x: losX - dir * 35, y: GH / 2 + 15,
    vx: 0, vy: 0,
    team: 'offense', role: 'rb',
    speed: 1.8 + offTeam.speed * 0.18,
    power: offTeam.power * 1.2,
    teamIdx: offTeamIdx,
    routeX: 0, routeY: 0, routePhase: 0,
    hasBall: false, controlled: false
  });
  // TE
  m.players.push({
    x: losX + dir * 3, y: GH / 2 - 25,
    vx: 0, vy: 0,
    team: 'offense', role: 'te',
    speed: 1.5 + offTeam.speed * 0.12,
    power: offTeam.power * 0.9,
    teamIdx: offTeamIdx,
    routeX: 0, routeY: 0, routePhase: 0,
    hasBall: false, controlled: false
  });

  // Defense: 5 players
  for (let i = 0; i < 5; i++) {
    const spacing = FIELD_HEIGHT / 6;
    m.players.push({
      x: losX + dir * (30 + Math.random() * 20),
      y: FIELD_TOP + spacing + i * spacing,
      vx: 0, vy: 0,
      team: 'defense', role: i < 2 ? 'dl' : (i < 4 ? 'lb' : 'db'),
      speed: 1.6 + defTeam.speed * 0.16,
      power: defTeam.power,
      teamIdx: defTeamIdx,
      routeX: 0, routeY: 0, routePhase: 0,
      hasBall: false, controlled: false
    });
  }

  // Ball
  m.ball = { x: m.players[0].x, y: m.players[0].y, visible: false };
  m.ballCarrier = 0;
  m.playerControlIdx = 0;
  m.players[0].controlled = true;
}

function setRoutes(m) {
  const play = m.offensePlay;
  const dir = m.direction;
  const losX = m.players[0].x + dir * 20;

  if (play.type === 'pass') {
    if (play.routes === 'short') {
      // WR1: slant
      m.players[1].routeX = losX + dir * 60;
      m.players[1].routeY = GH / 2 - 20;
      // WR2: out route
      m.players[2].routeX = losX + dir * 40;
      m.players[2].routeY = FIELD_BOTTOM - 15;
      // TE: hook
      m.players[4].routeX = losX + dir * 35;
      m.players[4].routeY = GH / 2 - 40;
    } else {
      // WR1: fly
      m.players[1].routeX = losX + dir * 140;
      m.players[1].routeY = FIELD_TOP + 40;
      // WR2: post
      m.players[2].routeX = losX + dir * 120;
      m.players[2].routeY = GH / 2;
      // TE: deep cross
      m.players[4].routeX = losX + dir * 80;
      m.players[4].routeY = FIELD_BOTTOM - 50;
    }
    // RB stays to block
    m.players[3].routeX = m.players[3].x + dir * 10;
    m.players[3].routeY = m.players[3].y;
  } else {
    // Run play - RB gets handoff
    const runDir = play.dir;
    m.players[3].routeX = losX + dir * 50;
    m.players[3].routeY = GH / 2 + runDir * 50;
    // Receivers block
    m.players[1].routeX = m.players[1].x + dir * 20;
    m.players[1].routeY = m.players[1].y + runDir * 10;
    m.players[2].routeX = m.players[2].x + dir * 20;
    m.players[2].routeY = m.players[2].y + runDir * 10;
    m.players[4].routeX = m.players[4].x + dir * 15;
    m.players[4].routeY = m.players[4].y + runDir * 15;
  }
}

function setDefensePositions(m) {
  const dPlay = m.defensePlay;
  const dir = m.direction;
  const losX = m.players[0].x;

  for (let i = 5; i < 10; i++) {
    const p = m.players[i];
    if (dPlay.type === 'blitz') {
      p.routeX = losX;
      p.routeY = p.y + rnd(-20, 20);
    } else if (dPlay.type === 'zone') {
      p.routeX = losX + dir * (40 + (i - 5) * 20);
      p.routeY = FIELD_TOP + (i - 5) * (FIELD_HEIGHT / 5) + FIELD_HEIGHT / 10;
    } else if (dPlay.type === 'man') {
      if (i - 5 < 5) {
        const target = m.players[i - 5];
        p.routeX = target.x + dir * 10;
        p.routeY = target.y;
      }
    } else { // prevent
      p.routeX = losX + dir * (60 + (i - 5) * 25);
      p.routeY = FIELD_TOP + (i - 5) * (FIELD_HEIGHT / 5) + FIELD_HEIGHT / 10;
    }
  }
}

function isPlayerControlled(m) {
  const offTeamIdx = m.possession === 'home' ? m.home : m.away;
  const isPlayerOnOffense = (offTeamIdx === season.teamIdx);
  if (m.phase === 'play') {
    if (isPlayerOnOffense) return true;
    return false; // player controls defense otherwise handled separately
  }
  return false;
}

function getPlayerTeamSide(m) {
  if (m.possession === 'home' && m.home === season.teamIdx) return 'offense';
  if (m.possession === 'away' && m.away === season.teamIdx) return 'offense';
  return 'defense';
}

// === SNAP AND PLAY LOGIC ===
function snapBall(m) {
  m.phase = 'play';
  m.playTimer = 0;
  m.passInFlight = false;
  m.passTarget = null;
  m.breakaway = false;
  m.jukeTimer = 0;
  m.passHighlight = -1;
  m.passSelectTimer = 0;

  const play = m.offensePlay;
  if (play.type === 'run') {
    // Hand off to RB after short delay
    setTimeout(function() {
      if (m.phase === 'play' && m.ballCarrier === 0) {
        m.players[0].hasBall = false;
        m.players[3].hasBall = true;
        m.ballCarrier = 3;
        if (getPlayerTeamSide(m) === 'offense') {
          m.playerControlIdx = 3;
          m.players.forEach(function(p) { p.controlled = false; });
          m.players[3].controlled = true;
        }
      }
    }, 300);
  }

  setRoutes(m);
  setDefensePositions(m);
}

function throwPass(m, targetIdx) {
  if (m.passInFlight || m.ballCarrier !== 0) return;
  const qb = m.players[0];
  const target = m.players[targetIdx];
  m.passInFlight = true;
  m.passTarget = targetIdx;
  m.passOrigin = { x: qb.x, y: qb.y };
  m.passDestX = target.routeX || target.x;
  m.passDestY = target.routeY || target.y;
  m.passProgress = 0;
  qb.hasBall = false;
  m.ballCarrier = -1;
  m.ball.visible = true;

  TAS.audio.playTone(600, 0.1, 'sine', 0.08);
}

function completeCatch(m, receiverIdx) {
  m.passInFlight = false;
  m.ball.visible = false;
  m.players[receiverIdx].hasBall = true;
  m.ballCarrier = receiverIdx;

  if (getPlayerTeamSide(m) === 'offense') {
    m.playerControlIdx = receiverIdx;
    m.players.forEach(function(p) { p.controlled = false; });
    m.players[receiverIdx].controlled = true;
  }

  TAS.audio.playTone(800, 0.15, 'square', 0.06);
  m.crowdNoise = Math.min(m.crowdNoise + 0.2, 1);
}

function interception(m) {
  m.passInFlight = false;
  m.ball.visible = false;
  m.resultText = "INTERCEPTED!";
  m.resultTimer = 90;
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1);
  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#ff0000', 0.4);
  m.crowdNoise = 1;

  setTimeout(function() { turnover(m); }, 1500);
}

function fumble(m) {
  m.resultText = "FUMBLE!";
  m.resultTimer = 90;
  if (m.ballCarrier >= 0) m.players[m.ballCarrier].hasBall = false;
  m.ballCarrier = -1;
  TAS.audio.playTone(150, 0.4, 'sawtooth', 0.12);
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#ffaa00', 0.5);

  setTimeout(function() { turnover(m); }, 1500);
}

function turnover(m) {
  m.possession = m.possession === 'home' ? 'away' : 'home';
  m.direction *= -1;
  m.lineOfScrimmage = 100 - m.lineOfScrimmage;
  m.down = 1;
  m.yardsToGo = 10;
  m.phase = 'playSelect';
  m.cursor = 0;
  createPlayers(m);
}

function tackle(m, gainedYards) {
  m.phase = 'tackle';
  m.lineOfScrimmage += gainedYards;
  m.resultTimer = 60;

  if (m.lineOfScrimmage >= 100) {
    // TOUCHDOWN!
    touchdown(m);
    return;
  }

  if (m.lineOfScrimmage <= 0) {
    // Safety
    safety(m);
    return;
  }

  m.down++;
  m.yardsToGo -= gainedYards;

  if (m.yardsToGo <= 0) {
    m.resultText = "FIRST DOWN!";
    m.down = 1;
    m.yardsToGo = 10;
    TAS.audio.playTone(500, 0.1, 'square', 0.06);
  } else if (m.down > 4) {
    m.resultText = "TURNOVER ON DOWNS";
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08);
    setTimeout(function() { turnover(m); }, 1200);
    return;
  } else {
    m.resultText = ordinal(m.down) + " & " + Math.ceil(m.yardsToGo);
    TAS.audio.playNoise(0.1, 0.05, 400);
  }

  setTimeout(function() {
    if (m.phase === 'tackle') {
      m.phase = 'playSelect';
      m.cursor = 0;
      createPlayers(m);
    }
  }, 1200);
}

function touchdown(m) {
  m.phase = 'scoring';
  m.resultText = "TOUCHDOWN!";
  m.resultTimer = 120;
  m.crowdNoise = 1;

  if (m.possession === 'home') m.homeScore += 7;
  else m.awayScore += 7;

  TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
  TAS.fx.shake(6, 0.9);
  TAS.fx.flash('#ffff00', 0.5);
  TAS.particles.spawn(GW / 2, GH / 2, '#ffcc00', 30, 4, { gravity: 0.1 });
  TAS.particles.spawn(GW / 2, GH / 2, '#ff4444', 20, 3, { gravity: 0.1 });

  setTimeout(function() { kickoff(m); }, 2500);
}

function safety(m) {
  m.phase = 'scoring';
  m.resultText = "SAFETY!";
  m.resultTimer = 90;

  if (m.possession === 'home') m.awayScore += 2;
  else m.homeScore += 2;

  TAS.audio.playTone(300, 0.3, 'triangle', 0.08);

  setTimeout(function() { kickoff(m); }, 2000);
}

function fieldGoalAttempt(m) {
  m.phase = 'fieldGoal';
  m.kickMeter = 0;
  m.kickDir = 1;
  m.kickPhase = 0;
}

function resolveFieldGoal(m, accuracy) {
  const distance = 100 - m.lineOfScrimmage;
  const difficulty = distance / 100;
  const success = accuracy > 0.35 && accuracy < 0.65 && distance < 50;

  if (success) {
    m.resultText = "FIELD GOAL GOOD!";
    if (m.possession === 'home') m.homeScore += 3;
    else m.awayScore += 3;
    TAS.audio.playMelody([[400, 0.1], [600, 0.15]], 120);
    m.crowdNoise = 0.7;
  } else {
    m.resultText = "NO GOOD!";
    TAS.audio.playTone(200, 0.3, 'sawtooth', 0.06);
  }
  m.resultTimer = 90;
  m.phase = 'scoring';

  setTimeout(function() { kickoff(m); }, 2000);
}

function punt(m) {
  const puntDist = 30 + Math.random() * 20;
  m.lineOfScrimmage += puntDist;
  if (m.lineOfScrimmage > 95) m.lineOfScrimmage = 80;
  m.resultText = "PUNT";
  m.resultTimer = 60;
  TAS.audio.playTone(400, 0.15, 'sine', 0.06, 200);

  setTimeout(function() { turnover(m); }, 1200);
}

function kickoff(m) {
  m.possession = m.possession === 'home' ? 'away' : 'home';
  m.direction *= -1;
  m.lineOfScrimmage = 25;
  m.down = 1;
  m.yardsToGo = 10;
  m.phase = 'playSelect';
  m.cursor = 0;
  createPlayers(m);
}

function endQuarter(m) {
  m.quarter++;
  if (m.quarter === 3) {
    m.phase = 'halftime';
    m.resultText = "HALFTIME";
    m.resultTimer = 120;
    setTimeout(function() {
      m.clock = QUARTER_TIME;
      m.phase = 'playSelect';
      m.cursor = 0;
    }, 3000);
  } else if (m.quarter > 4) {
    m.phase = 'gameOver';
    m.resultText = m.homeScore > m.awayScore ?
      TEAMS[m.home].abbr + " WINS!" :
      (m.awayScore > m.homeScore ? TEAMS[m.away].abbr + " WINS!" : "TIE GAME!");
  } else {
    m.clock = QUARTER_TIME;
    m.phase = 'quarterEnd';
    m.resultText = "END Q" + (m.quarter - 1);
    m.resultTimer = 60;
    setTimeout(function() {
      m.phase = 'playSelect';
      m.cursor = 0;
    }, 1500);
  }
}

function ordinal(n) {
  if (n === 1) return "1st";
  if (n === 2) return "2nd";
  if (n === 3) return "3rd";
  return n + "th";
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      state = 'teamSelect';
      playerTeamIdx = 0;
    }
    return;
  }

  if (state === 'teamSelect') {
    updateTeamSelect(dt);
    return;
  }

  if (state === 'schedule') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      startMatch();
    }
    return;
  }

  if (state === 'playing') {
    updateMatch(dt);
    return;
  }

  if (state === 'matchEnd') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      if (season.phase === 'champion') {
        state = 'champion';
      } else {
        state = 'schedule';
      }
    }
    return;
  }

  if (state === 'seasonEnd' || state === 'champion') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }
}

let selectCooldown = 0;

function updateTeamSelect(dt) {
  selectCooldown = Math.max(0, selectCooldown - 1);
  if (selectCooldown > 0) return;

  if (TAS.input.keys['ArrowDown'] || TAS.input.touch.down) {
    playerTeamIdx = (playerTeamIdx + 1) % 8;
    selectCooldown = 12;
    TAS.audio.playTone(300, 0.05, 'square', 0.04);
  }
  if (TAS.input.keys['ArrowUp'] || TAS.input.touch.up) {
    playerTeamIdx = (playerTeamIdx + 7) % 8;
    selectCooldown = 12;
    TAS.audio.playTone(300, 0.05, 'square', 0.04);
  }
  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    season = createSeason(playerTeamIdx);
    state = 'schedule';
    selectCooldown = 20;
    TAS.audio.playTone(600, 0.1, 'square', 0.06);
  }
}

function startMatch() {
  const oppIdx = getCurrentOpponent();
  const playerIsHome = Math.random() > 0.5;
  const homeIdx = playerIsHome ? season.teamIdx : oppIdx;
  const awayIdx = playerIsHome ? oppIdx : season.teamIdx;
  match = createMatch(homeIdx, awayIdx, playerIsHome);
  match.possession = 'home';
  match.direction = 1;
  createPlayers(match);
  state = 'playing';
}

function updateMatch(dt) {
  if (!match) return;
  const m = match;

  // Clock management
  if (m.phase === 'play' || m.phase === 'fieldGoal') {
    m.clock -= dt;
    if (m.clock <= 0) {
      m.clock = 0;
      if (m.phase === 'play') {
        m.phase = 'tackle';
        m.resultTimer = 60;
        setTimeout(function() { endQuarter(m); }, 1000);
        return;
      }
    }
  }

  m.playTimer += dt;

  // Crowd noise decay
  m.crowdNoise = Math.max(0, m.crowdNoise - dt * 0.1);

  if (m.phase === 'playSelect') {
    updatePlaySelect(m, dt);
    return;
  }

  if (m.phase === 'play') {
    updatePlay(m, dt);
    return;
  }

  if (m.phase === 'fieldGoal') {
    updateFieldGoal(m, dt);
    return;
  }

  if (m.phase === 'tackle' || m.phase === 'scoring' || m.phase === 'halftime' || m.phase === 'quarterEnd') {
    m.resultTimer--;
    return;
  }

  if (m.phase === 'gameOver') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      // Record result
      const playerScore = m.home === season.teamIdx ? m.homeScore : m.awayScore;
      const oppScore = m.home === season.teamIdx ? m.awayScore : m.homeScore;
      season.pointsFor += playerScore;
      season.pointsAgainst += oppScore;
      if (playerScore > oppScore) season.wins++;
      else season.losses++;
      season.results.push({ pf: playerScore, pa: oppScore, opp: getCurrentOpponent() });

      advanceSeason();
      if (state === 'playing') state = 'matchEnd';
    }
    return;
  }
}

function updatePlaySelect(m, dt) {
  selectCooldown = Math.max(0, selectCooldown - 1);
  if (selectCooldown > 0) return;

  const side = getPlayerTeamSide(m);
  const plays = side === 'offense' ? OFFENSE_PLAYS : DEFENSE_PLAYS;

  if (TAS.input.keys['ArrowDown'] || TAS.input.touch.down) {
    m.cursor = (m.cursor + 1) % plays.length;
    selectCooldown = 10;
    TAS.audio.playTone(250, 0.04, 'square', 0.03);
  }
  if (TAS.input.keys['ArrowUp'] || TAS.input.touch.up) {
    m.cursor = (m.cursor + plays.length - 1) % plays.length;
    selectCooldown = 10;
    TAS.audio.playTone(250, 0.04, 'square', 0.03);
  }
  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    if (side === 'offense') {
      m.offensePlay = plays[m.cursor];
      // AI picks defense
      m.defensePlay = DEFENSE_PLAYS[Math.floor(Math.random() * 4)];
    } else {
      m.defensePlay = plays[m.cursor];
      // AI picks offense
      m.offensePlay = OFFENSE_PLAYS[Math.floor(Math.random() * 4)];
    }

    // Check 4th down special options
    if (side === 'offense' && m.down === 4) {
      // Auto-punt if not going for it on long yardage
      if (m.cursor < 2 && m.yardsToGo > 5 && m.lineOfScrimmage < 60) {
        punt(m);
        return;
      }
    }

    snapBall(m);
    selectCooldown = 15;
    TAS.audio.playTone(400, 0.08, 'square', 0.05);
  }

  // Field goal / punt on 4th down
  if (m.down === 4 && side === 'offense') {
    if (TAS.input.keys['KeyB'] || TAS.input.keys['b'] || TAS.input.touch.b) {
      if (m.lineOfScrimmage > 55) {
        fieldGoalAttempt(m);
      } else {
        punt(m);
      }
      selectCooldown = 15;
    }
  }
}

function updatePlay(m, dt) {
  const side = getPlayerTeamSide(m);

  // Move offensive players along routes
  for (let i = 0; i < 5; i++) {
    const p = m.players[i];
    if (p.controlled && p.hasBall) continue; // player controls ball carrier

    if (i === 0 && p.hasBall) {
      // QB controlled by player on offense
      if (side === 'offense' && p.controlled) continue;
      // AI QB
      if (side === 'defense') {
        aiQBLogic(m, p, dt);
      }
      continue;
    }

    // Receivers run routes
    if (p.routeX || p.routeY) {
      const dx = p.routeX - p.x;
      const dy = p.routeY - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 3) {
        p.x += (dx / d) * p.speed * dt * 60;
        p.y += (dy / d) * p.speed * dt * 60;
      }
    }
  }

  // Move defensive players
  for (let i = 5; i < 10; i++) {
    const p = m.players[i];
    if (side === 'defense' && p.controlled) continue; // player controls one defender

    const target = getBallCarrierPos(m);
    const dPlay = m.defensePlay;

    if (dPlay.type === 'blitz' || m.playTimer > 1.5) {
      // Rush the ball carrier
      const dx = target.x - p.x;
      const dy = target.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 5) {
        p.x += (dx / d) * p.speed * dt * 60 * (dPlay.type === 'blitz' ? 1.2 : 0.9);
        p.y += (dy / d) * p.speed * dt * 60 * (dPlay.type === 'blitz' ? 1.2 : 0.9);
      }
    } else if (dPlay.type === 'man' && i - 5 < 5) {
      // Follow assigned receiver
      const assignedOff = m.players[i - 5];
      const dx = assignedOff.x - p.x;
      const dy = assignedOff.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 10) {
        p.x += (dx / d) * p.speed * dt * 60 * 0.85;
        p.y += (dy / d) * p.speed * dt * 60 * 0.85;
      }
    } else {
      // Zone - move to zone position then track ball
      const dx = p.routeX - p.x;
      const dy = p.routeY - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 5) {
        p.x += (dx / d) * p.speed * dt * 60 * 0.7;
        p.y += (dy / d) * p.speed * dt * 60 * 0.7;
      } else {
        // Drift toward ball
        const bdx = target.x - p.x;
        const bdy = target.y - p.y;
        const bd = Math.sqrt(bdx * bdx + bdy * bdy);
        if (bd > 30) {
          p.x += (bdx / bd) * p.speed * dt * 60 * 0.4;
          p.y += (bdy / bd) * p.speed * dt * 60 * 0.4;
        }
      }
    }

    // Boundary clamp
    p.x = clamp(p.x, FIELD_LEFT, FIELD_RIGHT);
    p.y = clamp(p.y, FIELD_TOP, FIELD_BOTTOM);
  }

  // Player control
  if (side === 'offense') {
    updatePlayerControlOffense(m, dt);
  } else {
    updatePlayerControlDefense(m, dt);
  }

  // Pass in flight
  if (m.passInFlight) {
    m.passProgress += dt * 3.5;
    m.ball.x = lerp(m.passOrigin.x, m.passDestX, m.passProgress);
    m.ball.y = lerp(m.passOrigin.y, m.passDestY, m.passProgress) - Math.sin(m.passProgress * Math.PI) * 20;

    // Check if caught
    if (m.passProgress >= 0.9) {
      const receiver = m.players[m.passTarget];
      const d = dist(m.ball.x, m.ball.y, receiver.x, receiver.y);
      if (d < 25) {
        completeCatch(m, m.passTarget);
      } else {
        // Incomplete
        m.passInFlight = false;
        m.ball.visible = false;
        m.resultText = "INCOMPLETE";
        m.resultTimer = 60;
        m.down++;
        TAS.audio.playNoise(0.15, 0.06, 600);

        if (m.down > 4) {
          m.resultText = "TURNOVER ON DOWNS";
          setTimeout(function() { turnover(m); }, 1200);
        } else {
          setTimeout(function() {
            m.phase = 'playSelect';
            m.cursor = 0;
            createPlayers(m);
          }, 1000);
        }
        return;
      }
    }

    // Interception check
    if (m.passProgress > 0.3 && m.passProgress < 0.85) {
      for (let i = 5; i < 10; i++) {
        const d = dist(m.ball.x, m.ball.y, m.players[i].x, m.players[i].y);
        if (d < 18) {
          if (Math.random() < INTERCEPTION_CHANCE) {
            interception(m);
            return;
          }
        }
      }
    }
  }

  // Tackle detection
  if (m.ballCarrier >= 0 && m.ballCarrier < 5) {
    const carrier = m.players[m.ballCarrier];
    for (let i = 5; i < 10; i++) {
      const d = dist(carrier.x, carrier.y, m.players[i].x, m.players[i].y);
      if (d < TACKLE_DIST) {
        if (m.jukeTimer > 0) {
          // Juke dodges tackle
          m.jukeTimer = 0;
          TAS.audio.playTone(700, 0.08, 'sine', 0.05);
          m.crowdNoise = Math.min(m.crowdNoise + 0.3, 1);
          continue;
        }
        // Tackle!
        const startX = yardToX(m.lineOfScrimmage * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
        const gainedYards = (carrier.x - startX) / YARD_PX * m.direction;

        // Fumble chance on big hits
        if (Math.random() < FUMBLE_CHANCE && gainedYards > 5) {
          fumble(m);
          return;
        }

        TAS.audio.playNoise(0.12, 0.08, 300);
        TAS.fx.shake(4, 0.88);
        TAS.particles.spawn(carrier.x, carrier.y, '#ffffff', 6, 2);
        tackle(m, gainedYards);
        return;
      }
    }

    // Touchdown detection
    const tdZoneX = m.direction === 1 ? FIELD_RIGHT - END_ZONE_W : FIELD_LEFT + END_ZONE_W;
    if ((m.direction === 1 && carrier.x >= tdZoneX) || (m.direction === -1 && carrier.x <= tdZoneX)) {
      touchdown(m);
      return;
    }

    // Breakaway detection
    if (!m.breakaway) {
      let closest = 999;
      for (let i = 5; i < 10; i++) {
        const d = dist(carrier.x, carrier.y, m.players[i].x, m.players[i].y);
        if (d < closest) closest = d;
      }
      if (closest > 60 && Math.abs(carrier.x - tdZoneX) < 150) {
        m.breakaway = true;
        m.breakawayTimer = 60;
        m.breakawayRunner = m.ballCarrier;
        m.crowdNoise = 1;
        TAS.audio.playTone(800, 0.05, 'square', 0.04);
        TAS.audio.playTone(1000, 0.05, 'square', 0.04);
      }
    }
  }

  // Sack detection (QB holding ball too long)
  if (m.ballCarrier === 0 && m.playTimer > 3.0) {
    const qb = m.players[0];
    for (let i = 5; i < 10; i++) {
      const d = dist(qb.x, qb.y, m.players[i].x, m.players[i].y);
      if (d < TACKLE_DIST + 5) {
        m.resultText = "SACKED!";
        m.resultTimer = 60;
        TAS.audio.playNoise(0.2, 0.1, 200);
        TAS.fx.shake(6, 0.85);
        const startX = yardToX(m.lineOfScrimmage * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
        const loss = (qb.x - startX) / YARD_PX * m.direction;
        tackle(m, loss);
        return;
      }
    }
  }

  // Defense sack on AI offense
  if (side === 'defense' && m.ballCarrier === 0) {
    const qb = m.players[0];
    for (let i = 5; i < 10; i++) {
      if (!m.players[i].controlled) continue;
      const d = dist(qb.x, qb.y, m.players[i].x, m.players[i].y);
      if (d < TACKLE_DIST + 3) {
        m.resultText = "SACKED!";
        m.resultTimer = 60;
        TAS.audio.playNoise(0.2, 0.1, 200);
        TAS.fx.shake(6, 0.85);
        const startX = yardToX(m.lineOfScrimmage * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
        const loss = (qb.x - startX) / YARD_PX * m.direction;
        tackle(m, loss);
        return;
      }
    }
  }

  // Boundary clamp for all
  for (let i = 0; i < m.players.length; i++) {
    m.players[i].x = clamp(m.players[i].x, FIELD_LEFT, FIELD_RIGHT);
    m.players[i].y = clamp(m.players[i].y, FIELD_TOP, FIELD_BOTTOM);
  }
}

function getBallCarrierPos(m) {
  if (m.ballCarrier >= 0) return m.players[m.ballCarrier];
  if (m.passInFlight) return { x: m.ball.x, y: m.ball.y };
  return m.players[0];
}

function updatePlayerControlOffense(m, dt) {
  const idx = m.playerControlIdx;
  if (idx < 0 || idx >= m.players.length) return;
  const p = m.players[idx];
  const spd = p.speed * dt * 60;

  // Movement
  let mx = 0, my = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.touch.left) mx -= 1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.touch.right) mx += 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.touch.up) my -= 1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.touch.down) my += 1;

  if (mx || my) {
    const len = Math.sqrt(mx * mx + my * my);
    p.x += (mx / len) * spd;
    p.y += (my / len) * spd;
  }

  // Pass (A button) - only QB
  if (idx === 0 && p.hasBall && !m.passInFlight) {
    m.passSelectTimer++;
    // Cycle through receivers with direction
    if (TAS.input.keys['KeyA'] || TAS.input.keys['a'] || TAS.input.touch.a) {
      // Find nearest receiver in direction pressed
      let bestTarget = -1;
      let bestDist = 999;

      for (let i = 1; i < 5; i++) {
        if (m.players[i].role === 'rb' && m.offensePlay.type !== 'pass') continue;
        const d = dist(p.x, p.y, m.players[i].x, m.players[i].y);
        if (i === 1 || i === 2 || i === 4) { // WR1, WR2, TE
          if (my < 0 && m.players[i].y < p.y && d < bestDist) { bestTarget = i; bestDist = d; }
          else if (my > 0 && m.players[i].y > p.y && d < bestDist) { bestTarget = i; bestDist = d; }
          else if (my === 0 && mx !== 0 && d < bestDist) { bestTarget = i; bestDist = d; }
          else if (mx === 0 && my === 0) {
            // No direction - throw to highlighted or nearest
            if (m.passHighlight >= 0) { bestTarget = m.passHighlight; break; }
            if (d < bestDist) { bestTarget = i; bestDist = d; }
          }
        }
      }

      if (bestTarget < 0) {
        // Default to nearest receiver
        for (let i = 1; i < 5; i++) {
          if (m.players[i].role === 'wr' || m.players[i].role === 'te') {
            const d = dist(p.x, p.y, m.players[i].x, m.players[i].y);
            if (d < bestDist) { bestTarget = i; bestDist = d; }
          }
        }
      }

      if (bestTarget >= 0) {
        throwPass(m, bestTarget);
      }
    }

    // Highlight receivers for pass (cycle with frames)
    if (m.passSelectTimer % 40 < 20) m.passHighlight = 1;
    else if (m.passSelectTimer % 40 < 30) m.passHighlight = 2;
    else m.passHighlight = 4;
  }

  // Juke (B button) - ball carrier after catch/handoff
  if (p.hasBall && idx !== 0) {
    if ((TAS.input.keys['KeyB'] || TAS.input.keys['b'] || TAS.input.touch.b) && m.jukeTimer <= 0) {
      m.jukeTimer = 15;
      // Quick lateral burst
      if (my !== 0) p.y += my * 20;
      else p.y += (Math.random() > 0.5 ? 1 : -1) * 18;
      TAS.audio.playTone(500, 0.06, 'sine', 0.04);
      TAS.particles.spawn(p.x, p.y, '#ffffff', 4, 1.5);
    }
  }

  if (m.jukeTimer > 0) m.jukeTimer--;
}

function updatePlayerControlDefense(m, dt) {
  // Find controlled defender
  let ctrlIdx = -1;
  for (let i = 5; i < 10; i++) {
    if (m.players[i].controlled) { ctrlIdx = i; break; }
  }

  // Auto-select closest to ball carrier
  if (ctrlIdx < 0) {
    const target = getBallCarrierPos(m);
    let best = 999;
    for (let i = 5; i < 10; i++) {
      const d = dist(m.players[i].x, m.players[i].y, target.x, target.y);
      if (d < best) { best = d; ctrlIdx = i; }
    }
    if (ctrlIdx >= 0) {
      m.players[ctrlIdx].controlled = true;
      m.playerControlIdx = ctrlIdx;
    }
  }

  if (ctrlIdx < 0) return;
  const p = m.players[ctrlIdx];
  const spd = p.speed * dt * 60 * 1.1; // Slight speed boost for controlled defender

  let mx = 0, my = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.touch.left) mx -= 1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.touch.right) mx += 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.touch.up) my -= 1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.touch.down) my += 1;

  if (mx || my) {
    const len = Math.sqrt(mx * mx + my * my);
    p.x += (mx / len) * spd;
    p.y += (my / len) * spd;
  }

  // Switch controlled player (B button)
  if (TAS.input.keys['KeyB'] || TAS.input.keys['b'] || TAS.input.touch.b) {
    const target = getBallCarrierPos(m);
    let nextIdx = -1;
    let bestDist = 999;
    for (let i = 5; i < 10; i++) {
      if (i === ctrlIdx) continue;
      const d = dist(m.players[i].x, m.players[i].y, target.x, target.y);
      if (d < bestDist) { bestDist = d; nextIdx = i; }
    }
    if (nextIdx >= 0) {
      m.players[ctrlIdx].controlled = false;
      m.players[nextIdx].controlled = true;
      m.playerControlIdx = nextIdx;
      TAS.audio.playTone(400, 0.04, 'square', 0.03);
    }
  }
}

function aiQBLogic(m, qb, dt) {
  // AI quarterback decision making
  m.aiSelectTimer += dt;

  // After 1.5 seconds, throw
  if (m.aiSelectTimer > 1.2 + Math.random() * 0.8) {
    // Find best receiver (most open)
    let bestTarget = -1;
    let bestOpenness = -999;

    for (let i = 1; i < 5; i++) {
      if (m.players[i].role !== 'wr' && m.players[i].role !== 'te') continue;
      const receiver = m.players[i];
      let minDefDist = 999;
      for (let j = 5; j < 10; j++) {
        const d = dist(receiver.x, receiver.y, m.players[j].x, m.players[j].y);
        if (d < minDefDist) minDefDist = d;
      }
      if (minDefDist > bestOpenness) {
        bestOpenness = minDefDist;
        bestTarget = i;
      }
    }

    if (bestTarget >= 0 && bestOpenness > 20) {
      throwPass(m, bestTarget);
    } else {
      // Scramble
      qb.x += m.direction * qb.speed * dt * 60 * 0.5;
      qb.y += (Math.random() - 0.5) * qb.speed * dt * 60;
    }
    m.aiSelectTimer = 0;
  }
}

function updateFieldGoal(m, dt) {
  m.kickMeter += m.kickDir * dt * 3;
  if (m.kickMeter >= 1) { m.kickMeter = 1; m.kickDir = -1; }
  if (m.kickMeter <= 0) { m.kickMeter = 0; m.kickDir = 1; }

  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    resolveFieldGoal(m, m.kickMeter);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'teamSelect') {
    drawTeamSelect();
    return;
  }

  if (state === 'schedule') {
    drawSchedule();
    return;
  }

  if (state === 'playing') {
    drawMatch();
    return;
  }

  if (state === 'matchEnd') {
    drawMatchEnd();
    return;
  }

  if (state === 'seasonEnd') {
    drawSeasonEnd();
    return;
  }

  if (state === 'champion') {
    drawChampion();
    return;
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitle() {
  // Background field
  ctx.fillStyle = '#1a4d1a';
  ctx.fillRect(0, 0, GW, GH);

  // Field lines
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 11; i++) {
    const x = 40 + i * 40;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
  }

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASELING BOWL', GW / 2, 90);

  ctx.fillStyle = '#88ff88';
  ctx.font = '14px monospace';
  ctx.fillText('Tasern Football League', GW / 2, 115);

  // Football icon
  drawFootball(GW / 2, 160, 20);

  // Trophy shimmer
  const shimmer = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(255, 204, 0, ${shimmer})`;
  ctx.font = '12px monospace';
  ctx.fillText('8 Teams  -  7 Game Season  -  Playoffs', GW / 2, 200);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';

    ctx.font = '10px monospace';

}

function drawSchedule() {

  const team = TEAMS[season.teamIdx];
  ctx.fillStyle = team.colors[0];
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';

  if (season.phase === 'season') {
    ctx.fillText(team.name + ' - Week ' + (season.week + 1), GW / 2, 30);
  } else if (season.phase === 'semi') {
    ctx.fillText('SEMIFINALS', GW / 2, 30);
  } else if (season.phase === 'final') {
    ctx.fillText('CHAMPIONSHIP GAME', GW / 2, 30);
  }

  // Record
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '12px monospace';
  ctx.fillText('Record: ' + season.wins + '-' + season.losses, GW / 2, 55);

  // Upcoming matchup
  const oppIdx = getCurrentOpponent();
  const opp = TEAMS[oppIdx];

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('NEXT GAME', GW / 2, 90);

  // VS display
  ctx.fillStyle = team.colors[0];
  ctx.font = 'bold 20px monospace';
  ctx.fillText(team.abbr, GW / 2 - 60, 140);

  ctx.fillStyle = '#666666';
  ctx.font = '16px monospace';
  ctx.fillText('vs', GW / 2, 140);

  ctx.fillStyle = opp.colors[0];
  ctx.font = 'bold 20px monospace';
  ctx.fillText(opp.abbr, GW / 2 + 60, 140);

  ctx.fillStyle = '#888888';
  ctx.font = '11px monospace';
  ctx.fillText(team.name, GW / 2 - 60, 158);
  ctx.fillText(opp.name, GW / 2 + 60, 158);

  // Past results
  if (season.results.length > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('Results:', GW / 2, 190);
    for (let i = 0; i < season.results.length && i < 5; i++) {
      const r = season.results[i];
      const won = r.pf > r.pa;
      ctx.fillStyle = won ? '#44cc44' : '#cc4444';
      ctx.fillText((won ? 'W' : 'L') + ' ' + r.pf + '-' + r.pa + ' vs ' + TEAMS[r.opp].abbr, GW / 2, 206 + i * 14);

    ctx.fillStyle = '#ffffff';
    ctx.font = '12px monospace';
    ctx.fillText('PRESS START TO PLAY', GW / 2, 295);

}

function drawMatch() {
  if (!match) return;
  const m = match;

  ctx.save();
  TAS.fx.applyShake();

  // Draw field
  drawField(m);

  // Draw players
  drawPlayers(m);

  // Draw ball in flight
  if (m.passInFlight && m.ball.visible) {
    drawFootball(m.ball.x, m.ball.y, 5);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(m.ball.x, m.ball.y + 10, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Breakaway effect
  if (m.breakaway && m.breakawayTimer > 0) {
    m.breakawayTimer--;
    ctx.fillStyle = `rgba(255, 255, 0, ${m.breakawayTimer / 60 * 0.3})`;
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BREAKAWAY!', GW / 2, GH / 2 - 40);
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawMatchHUD(m);

  // Play select overlay
  if (m.phase === 'playSelect') {
    drawPlaySelect(m);
  }

  // Field goal meter
  if (m.phase === 'fieldGoal') {
    drawKickMeter(m);
  }

  // Result text
  if (m.resultTimer > 0) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, m.resultTimer / 30);
    ctx.fillText(m.resultText, GW / 2, GH / 2);
    ctx.globalAlpha = 1;
  }

  // Game over
  if (m.phase === 'gameOver') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FINAL SCORE', GW / 2, 100);

    ctx.fillStyle = TEAMS[m.home].colors[0];
    ctx.font = 'bold 28px monospace';
    ctx.fillText(TEAMS[m.home].abbr + ' ' + m.homeScore, GW / 2 - 60, 150);
    ctx.fillStyle = TEAMS[m.away].colors[0];
    ctx.fillText(TEAMS[m.away].abbr + ' ' + m.awayScore, GW / 2 + 60, 150);

    ctx.fillStyle = '#ffcc00';
    ctx.font = '14px monospace';
    ctx.fillText(m.resultText, GW / 2, 190);

    if (frame % 60 < 40) {
      ctx.fillStyle = '#aaa';
      ctx.font = '11px monospace';
      ctx.fillText('[PRESS START TO CONTINUE]', GW / 2, 250);
    }
  }

  // Halftime
  if (m.phase === 'halftime') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HALFTIME', GW / 2, 120);
    ctx.fillStyle = TEAMS[m.home].colors[0];
    ctx.font = '18px monospace';
    ctx.fillText(TEAMS[m.home].abbr + ': ' + m.homeScore, GW / 2, 165);
    ctx.fillStyle = TEAMS[m.away].colors[0];
    ctx.fillText(TEAMS[m.away].abbr + ': ' + m.awayScore, GW / 2, 195);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawField(m) {
  // Field green
  ctx.fillStyle = '#1a6b1a';
  ctx.fillRect(FIELD_LEFT, FIELD_TOP, FIELD_WIDTH, FIELD_HEIGHT);

  // End zones
  const leftColor = m.direction === 1 ?
    (m.possession === 'home' ? TEAMS[m.away].colors[1] : TEAMS[m.home].colors[1]) :
    (m.possession === 'home' ? TEAMS[m.home].colors[1] : TEAMS[m.away].colors[1]);
  const rightColor = m.direction === 1 ?
    (m.possession === 'home' ? TEAMS[m.home].colors[1] : TEAMS[m.away].colors[1]) :
    (m.possession === 'home' ? TEAMS[m.away].colors[1] : TEAMS[m.home].colors[1]);

  ctx.fillStyle = leftColor;
  ctx.globalAlpha = 0.4;
  ctx.fillRect(FIELD_LEFT, FIELD_TOP, END_ZONE_W, FIELD_HEIGHT);
  ctx.fillStyle = rightColor;
  ctx.fillRect(FIELD_RIGHT - END_ZONE_W, FIELD_TOP, END_ZONE_W, FIELD_HEIGHT);
  ctx.globalAlpha = 1;

  // Yard lines
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const x = FIELD_LEFT + END_ZONE_W + i * (FIELD_WIDTH - END_ZONE_W * 2) / 10;
    ctx.beginPath();
    ctx.moveTo(x, FIELD_TOP);
    ctx.lineTo(x, FIELD_BOTTOM);
    ctx.stroke();
  }

  // Hash marks
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  for (let i = 0; i <= 50; i++) {
    const x = FIELD_LEFT + END_ZONE_W + i * (FIELD_WIDTH - END_ZONE_W * 2) / 50;
    ctx.beginPath();
    ctx.moveTo(x, FIELD_TOP + FIELD_HEIGHT * 0.33 - 3);
    ctx.lineTo(x, FIELD_TOP + FIELD_HEIGHT * 0.33 + 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, FIELD_TOP + FIELD_HEIGHT * 0.67 - 3);
    ctx.lineTo(x, FIELD_TOP + FIELD_HEIGHT * 0.67 + 3);
    ctx.stroke();
  }

  // Line of scrimmage
  const losX = yardToX(m.lineOfScrimmage * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
  ctx.strokeStyle = 'rgba(0, 150, 255, 0.6)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(losX, FIELD_TOP);
  ctx.lineTo(losX, FIELD_BOTTOM);
  ctx.stroke();

  // First down line
  const fdYard = m.lineOfScrimmage + m.yardsToGo;
  if (fdYard < 100) {
    const fdX = yardToX(fdYard * m.direction + 50 * (m.direction === 1 ? 0 : 1), m.direction);
    ctx.strokeStyle = 'rgba(255, 200, 0, 0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(fdX, FIELD_TOP);
    ctx.lineTo(fdX, FIELD_BOTTOM);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Boundary
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_LEFT, FIELD_TOP, FIELD_WIDTH, FIELD_HEIGHT);
}

function drawPlayers(m) {
  for (let i = 0; i < m.players.length; i++) {
    const p = m.players[i];
    const team = TEAMS[p.teamIdx];
    const isControlled = p.controlled;
    const hasBall = p.hasBall;

    // Player body
    ctx.fillStyle = team.colors[0];
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI * 2);
    ctx.fill();

    // Inner color
    ctx.fillStyle = team.colors[1];
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R - 2, 0, Math.PI * 2);
    ctx.fill();

    // Position indicator
    ctx.fillStyle = '#ffffff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    if (p.role === 'qb') ctx.fillText('Q', p.x, p.y + 2);
    else if (p.role === 'wr') ctx.fillText('W', p.x, p.y + 2);
    else if (p.role === 'rb') ctx.fillText('R', p.x, p.y + 2);
    else if (p.role === 'te') ctx.fillText('T', p.x, p.y + 2);
    else if (p.role === 'dl') ctx.fillText('D', p.x, p.y + 2);
    else if (p.role === 'lb') ctx.fillText('L', p.x, p.y + 2);
    else if (p.role === 'db') ctx.fillText('B', p.x, p.y + 2);

    // Controlled highlight
    if (isControlled) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_R + 3, 0, Math.PI * 2);
      ctx.stroke();

      // Arrow indicator
      const arrowY = p.y - PLAYER_R - 8;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(p.x, arrowY);
      ctx.lineTo(p.x - 4, arrowY - 6);
      ctx.lineTo(p.x + 4, arrowY - 6);
      ctx.fill();
    }

    // Ball carrier indicator
    if (hasBall) {
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.ellipse(p.x + 5, p.y - 4, 4, 2.5, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Pass target highlight (receivers during pass play)
    if (m.phase === 'play' && m.ballCarrier === 0 && !m.passInFlight &&
        getPlayerTeamSide(m) === 'offense' &&
        (p.role === 'wr' || p.role === 'te') && i === m.passHighlight) {
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_R + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw routes briefly after snap (first 30 frames)
  if (m.phase === 'play' && m.playTimer < 0.5 && getPlayerTeamSide(m) === 'offense') {
    ctx.strokeStyle = 'rgba(255, 255, 100, 0.4)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    for (let i = 1; i < 5; i++) {
      const p = m.players[i];
      if (p.routeX && p.routeY) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.routeX, p.routeY);
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  }
}

function drawFootball(x, y, size) {
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(x, y, size, size * 0.6, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Laces
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - size * 0.3, y - 1);
  ctx.lineTo(x + size * 0.3, y - 1);
  ctx.stroke();
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * size * 0.12, y - 1);
    ctx.lineTo(x + i * size * 0.12, y - 3);
    ctx.stroke();
  }
}

function drawMatchHUD(m) {
  // Scoreboard bar
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, 36);

  // Home team
  ctx.fillStyle = TEAMS[m.home].colors[0];
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(TEAMS[m.home].abbr, 8, 14);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('' + m.homeScore, 50, 16);

  // Away team
  ctx.fillStyle = TEAMS[m.away].colors[0];
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(TEAMS[m.away].abbr, GW - 8, 14);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('' + m.awayScore, GW - 45, 16);

  // Clock
  ctx.fillStyle = '#ffcc00';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  const mins = Math.floor(m.clock / 60);
  const secs = Math.floor(m.clock % 60);
  ctx.fillText('Q' + m.quarter + ' ' + mins + ':' + (secs < 10 ? '0' : '') + secs, GW / 2, 14);

  // Down and distance
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '10px monospace';
  ctx.fillText(ordinal(m.down) + ' & ' + Math.ceil(m.yardsToGo) + ' at ' + Math.round(m.lineOfScrimmage), GW / 2, 28);

  // Possession indicator
  const possTeam = m.possession === 'home' ? m.home : m.away;
  ctx.fillStyle = TEAMS[possTeam].colors[0];
  ctx.beginPath();
  ctx.arc(GW / 2 - 60, 20, 4, 0, Math.PI * 2);
  ctx.fill();

  // Bottom bar - field position
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GH - 22, GW, 22);
  // Mini field
  const miniLeft = 60;
  const miniRight = GW - 60;
  const miniW = miniRight - miniLeft;
  ctx.fillStyle = '#1a4d1a';
  ctx.fillRect(miniLeft, GH - 18, miniW, 14);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(miniLeft, GH - 18, miniW, 14);

  // Ball position on mini field
  const ballPosNorm = m.lineOfScrimmage / 100;
  const ballMiniX = miniLeft + (m.direction === 1 ? ballPosNorm : (1 - ballPosNorm)) * miniW;
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.arc(ballMiniX, GH - 11, 3, 0, Math.PI * 2);
  ctx.fill();

  // Crowd noise meter
  if (m.crowdNoise > 0.1) {
    ctx.fillStyle = `rgba(255, 200, 0, ${m.crowdNoise * 0.5})`;
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    const level = Math.ceil(m.crowdNoise * 5);
    ctx.fillText('CROWD:' + '!'.repeat(level), GW - 10, GH - 6);
  }
}

function drawPlaySelect(m) {
  const side = getPlayerTeamSide(m);
  const plays = side === 'offense' ? OFFENSE_PLAYS : DEFENSE_PLAYS;
  const title = side === 'offense' ? 'CALL PLAY' : 'PICK DEFENSE';

  // Overlay
  ctx.fillStyle = 'rgba(0, 0, 20, 0.85)';
  ctx.fillRect(GW / 2 - 100, 60, 200, 180);
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.strokeRect(GW / 2 - 100, 60, 200, 180);

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(title, GW / 2, 80);

  for (let i = 0; i < plays.length; i++) {
    const y = 105 + i * 30;
    const selected = i === m.cursor;
    if (selected) {
      ctx.fillStyle = 'rgba(255,200,0,0.2)';
      ctx.fillRect(GW / 2 - 85, y - 12, 170, 24);
      ctx.fillStyle = '#ffcc00';
      ctx.fillText('>', GW / 2 - 75, y + 4);

    ctx.font = '9px monospace';

function drawChampion() {
  ctx.fillStyle = '#0a0a1a';

  // Confetti
  for (let i = 0; i < 30; i++) {
    const cx = (frame * (i + 1) * 1.3 + i * 47) % GW;
    const cy = (frame * 0.8 + i * 31) % GH;
    ctx.fillStyle = ['#ffcc00', '#44cc44', '#4488ff', '#ff4444', '#cc44ff'][i % 5];
    ctx.fillRect(cx, cy, 4, 4);
  }

  ctx.fillStyle = '#ffcc00';

  ctx.textAlign = 'center';
  ctx.fillText('CHAMPIONS!', GW / 2, 80);

  const team = TEAMS[season.teamIdx];
  ctx.fillStyle = team.colors[0];
  ctx.font = 'bold 18px monospace';
  ctx.fillText(team.name, GW / 2, 120);

  // Trophy
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(GW / 2 - 15, 140, 30, 40);
  ctx.fillRect(GW / 2 - 25, 140, 50, 10);
  ctx.fillRect(GW / 2 - 10, 180, 20, 15);
  ctx.fillRect(GW / 2 - 20, 195, 40, 8);

  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('Season Record: ' + season.wins + '-' + season.losses, GW / 2, 225);
  ctx.fillText('Points For: ' + season.pointsFor, GW / 2, 245);

  if (frame % 60 < 40) {
    ctx.fillStyle = '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText('[PRESS START]', GW / 2, 290);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
