<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Bowl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'ROLL', b: 'SPIN' } });

// === BASELING STAT INTEGRATION (PASS 1) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat multipliers from baseling stats
var STR_MULT = 0.8 + (statB.str / 10) * 0.2;   // Ball power / pin knockdown force
var DEX_MULT = 0.8 + (statB.dex / 10) * 0.2;   // Aim precision / speed control
var CON_MULT = 0.8 + (statB.con / 10) * 0.2;    // Stamina: extra frames in long games
var INT_MULT = 0.8 + (statB.int / 10) * 0.2;    // Score multiplier on all points
var WIS_MULT = 0.8 + (statB.wis / 10) * 0.2;    // Timing window width for power meter
var CHA_MULT = 0.8 + (statB.cha / 10) * 0.2;    // Strike luck / bonus pin wobble

const SAVE_KEY = 'bbowl';

// === PIN LAYOUT (standard 10-pin triangle) ===
const PIN_ROWS = [
  [0],           // row 0: headpin
  [-1, 1],       // row 1
  [-2, 0, 2],    // row 2
  [-3, -1, 1, 3] // row 3: back row
];
const PIN_SPACING_X = 14;
const PIN_SPACING_Y = 14;
const PIN_RADIUS = 5;
const BALL_RADIUS = 7;

// Lane geometry
const LANE_LEFT = 140;
const LANE_RIGHT = 340;
const LANE_WIDTH = LANE_RIGHT - LANE_LEFT;
const LANE_TOP = 20;
const LANE_BOTTOM = 300;
const LANE_LENGTH = LANE_BOTTOM - LANE_TOP;
const GUTTER_W = 12;
const PIN_CENTER_X = (LANE_LEFT + LANE_RIGHT) / 2;
const PIN_CENTER_Y = LANE_TOP + 50;
const FOUL_LINE_Y = LANE_BOTTOM - 60;

// === ALLEY ZONE THEMES (PASS 3) ===
const ALLEY_ZONES = [
  { name: "Mycelium Lanes", bg1: '#1a2a1a', bg2: '#0d1f0d', lane: '#3a2810', accent: '#44dd88', desc: 'Where it all begins' },
  { name: "Spore Cavern", bg1: '#1a1a2a', bg2: '#0d0d1f', lane: '#2a1830', accent: '#aa44cc', desc: 'Deep underground' },
  { name: "Reactor Core", bg1: '#1a1a1a', bg2: '#0f1520', lane: '#102838', accent: '#44aaff', desc: 'Powered by yield' },
  { name: "Poop Pit Alley", bg1: '#2a1a0a', bg2: '#1f0d00', lane: '#3a2a10', accent: '#aa8844', desc: 'It stinks in here' },
  { name: "Crystal Grove", bg1: '#0a1a2a', bg2: '#001020', lane: '#183028', accent: '#66ddff', desc: 'The final challenge' }
];

// === TRICK SHOTS (PASS 2) ===
const TRICK_SHOTS = [
  { name: 'Spore Spin', desc: 'Heavy curve with fungal force', spinMult: 2.0, powerMult: 0.9, color: '#44dd88' },
  { name: 'Reactor Strike', desc: 'Maximum power, no spin', spinMult: 0, powerMult: 1.5, color: '#44aaff' },
  { name: 'Mycelium Thread', desc: 'Precise aim, gentle power', spinMult: 0.5, powerMult: 0.7, color: '#cc88ff' },
  { name: 'Poop Bomb', desc: 'Explosive pin scatter', spinMult: 1.0, powerMult: 1.2, color: '#aa6622' },
  { name: 'Fungal Fury', desc: 'Wild spin, wild power', spinMult: 2.5, powerMult: 1.3, color: '#ff4488' }
];

// === LANE HAZARDS (PASS 2) ===
const HAZARD_TYPES = [
  { name: 'Slime Patch', color: 'rgba(68,221,136,0.4)', effect: 'slow', mult: 0.6 },
  { name: 'Spore Cloud', color: 'rgba(170,68,204,0.3)', effect: 'curve', mult: 1.5 },
  { name: 'Reactor Vent', color: 'rgba(68,170,255,0.3)', effect: 'boost', mult: 1.4 },
  { name: 'Mushroom Bump', color: 'rgba(180,120,60,0.5)', effect: 'deflect', mult: 1.0 }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let highScore = parseInt(localStorage.getItem(SAVE_KEY + '_hi')) || 0;
let showTutorial = !localStorage.getItem(SAVE_KEY + '_played');
let tutorialStep = 0;
let tutorialTimer = 0;

// Game session
let currentZone = 0;
let currentFrame = 1;    // bowling frame (1-10)
let currentRoll = 1;     // 1st or 2nd roll in frame
let totalScore = 0;
let frameScores = [];     // array of {roll1, roll2, roll3, bonus, total, strike, spare}
let pins = [];            // current pin states
let ball = null;          // ball state during roll
let aimAngle = 0;         // current aim angle
let aimDir = 1;           // aim sweep direction
let aimSpeed = 0.02;      // base aim speed (modified by DEX_MULT)
let powerMeter = 0;       // 0-1 power charge
let powerDir = 1;         // power meter direction
let powerSpeed = 0.025;   // base power speed
let spinMeter = 0;        // -1 to 1 spin
let spinDir = 1;
let rollPhase = 'aim';    // aim, power, spin, rolling, settling, score
let settleTimer = 0;
let scorePopups = [];
let comboCount = 0;
let consecutiveStrikes = 0;
let selectedTrick = -1;   // -1 = normal, 0-4 = trick shot index
let trickUnlocked = [true, false, false, false, false];
let hazards = [];         // active lane hazards for this frame
let bossFrame = false;    // is this a boss/challenge frame?
let bossType = 0;
let bossDefeated = 0;
let particles = [];       // local particle array for pin effects
let shakeAmount = 0;
let shakeDecay = 0.9;
let flashColor = null;
let flashAlpha = 0;

// Stamina system (CON_MULT)
let stamina = 100;
let maxStamina = 100 * CON_MULT;   // statB.con controls max stamina

// Pin physics
let pinBodies = [];       // physics bodies for pins during roll

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2); }
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// === PIN SETUP ===
function createPins() {
  pins = [];
  let id = 0;
  for (let row = 0; row < PIN_ROWS.length; row++) {
    for (let col = 0; col < PIN_ROWS[row].length; col++) {
      pins.push({
        id: id++,
        x: PIN_CENTER_X + PIN_ROWS[row][col] * PIN_SPACING_X,
        y: PIN_CENTER_Y + row * PIN_SPACING_Y,
        standing: true,
        wobble: 0,
        wobbleDir: 0,
        hitTimer: 0,
        row: row,
        col: col
      });
    }
  }
}

function createPinBodies() {
  pinBodies = pins.map(function(p) {
    return {
      x: p.x,
      y: p.y,
      vx: 0,
      vy: 0,
      standing: p.standing,
      rotation: 0,
      rotVel: 0,
      mass: 1.0,
      radius: PIN_RADIUS,
      pinId: p.id
    };
  });
}

function countStandingPins() {
  var count = 0;
  for (var i = 0; i < pins.length; i++) {
    if (pins[i].standing) count++;
  }
  return count;
}

// === HAZARD GENERATION (PASS 2) ===
function generateHazards() {
  hazards = [];
  // No hazards in first 2 frames
  if (currentFrame <= 2) return;
  // More hazards in later zones and frames
  var maxHazards = Math.min(3, Math.floor(currentFrame / 3) + currentZone);
  for (var i = 0; i < maxHazards; i++) {
    if (Math.random() < 0.5) {
      var hType = HAZARD_TYPES[rndInt(0, HAZARD_TYPES.length - 1)];
      hazards.push({
        type: hType,
        x: rnd(LANE_LEFT + 20, LANE_RIGHT - 20),
        y: rnd(LANE_TOP + 100, FOUL_LINE_Y - 40),
        radius: rnd(15, 25),
        pulsePhase: rnd(0, Math.PI * 2)
      });
    }
  }
}

// === BOSS FRAME LOGIC (PASS 3) ===
function checkBossFrame() {
  // Boss frames every 5th frame (5 and 10)
  bossFrame = (currentFrame === 5 || currentFrame === 10);
  if (bossFrame) {
    bossType = currentFrame === 5 ? 0 : 1;
  }
}

function getBossConfig() {
  if (bossType === 0) {
    return { name: 'Sporegon', desc: 'The pins fight back!', pinHP: 2, extraPins: true, color: '#aa44cc' };
  } else {
    return { name: 'Reactor King', desc: 'Maximum defense!', pinHP: 3, extraPins: true, color: '#44aaff' };
  }
}

// === FRAME MANAGEMENT ===
function initNewFrame() {
  createPins();
  currentRoll = 1;
  rollPhase = 'aim';
  aimAngle = 0;
  aimDir = 1;
  powerMeter = 0;
  powerDir = 1;
  spinMeter = 0;
  ball = null;
  settleTimer = 0;
  selectedTrick = -1;
  generateHazards();
  checkBossFrame();

  // Boss frames: pins may have extra HP
  if (bossFrame) {
    var cfg = getBossConfig();
    for (var i = 0; i < pins.length; i++) {
      pins[i].hp = cfg.pinHP;
      // CHA_MULT reduces boss pin HP
      if (CHA_MULT > 1.1 && Math.random() < (CHA_MULT - 1) * 0.5) {
        pins[i].hp = Math.max(1, pins[i].hp - 1);
      }
    }
  }

  // Zone transitions every 2 frames
  currentZone = Math.min(ALLEY_ZONES.length - 1, Math.floor((currentFrame - 1) / 2));

  // Unlock trick shots based on progress
  if (currentFrame >= 3) trickUnlocked[1] = true;
  if (currentFrame >= 5) trickUnlocked[2] = true;
  if (currentFrame >= 7) trickUnlocked[3] = true;
  if (currentFrame >= 9) trickUnlocked[4] = true;

  // Stamina regen between frames (CON_MULT)
  stamina = Math.min(maxStamina, stamina + 15 * CON_MULT);
}

function initNewGame() {
  currentFrame = 1;
  currentRoll = 1;
  totalScore = 0;
  frameScores = [];
  consecutiveStrikes = 0;
  comboCount = 0;
  currentZone = 0;
  stamina = maxStamina;
  bossDefeated = 0;
  trickUnlocked = [true, false, false, false, false];
  for (var i = 0; i < 10; i++) {
    frameScores.push({ roll1: -1, roll2: -1, roll3: -1, bonus: 0, total: 0, strike: false, spare: false, scored: false });
  }
  initNewFrame();
}

// === SCORING ===
function calculateScore() {
  totalScore = 0;
  for (var i = 0; i < 10; i++) {
    var f = frameScores[i];
    if (f.roll1 < 0) break;

    var frameTotal = 0;

    if (f.strike) {
      frameTotal = 10;
      // Add next two rolls as bonus
      var bonus = getNextRolls(i, 2);
      frameTotal += bonus;
    } else if (f.spare) {
      frameTotal = 10;
      // Add next one roll as bonus
      var bonus2 = getNextRolls(i, 1);
      frameTotal += bonus2;
    } else {
      frameTotal = (f.roll1 >= 0 ? f.roll1 : 0) + (f.roll2 >= 0 ? f.roll2 : 0);
    }

    // 10th frame special
    if (i === 9) {
      frameTotal = (f.roll1 >= 0 ? f.roll1 : 0) + (f.roll2 >= 0 ? f.roll2 : 0) + (f.roll3 >= 0 ? f.roll3 : 0);
    }

    // INT_MULT: score multiplier (statB.int)
    frameTotal = Math.round(frameTotal * INT_MULT);

    f.total = frameTotal;
    totalScore += frameTotal;
  }
}

function getNextRolls(frameIdx, count) {
  var rolls = [];
  for (var i = frameIdx + 1; i < 10 && rolls.length < count; i++) {
    if (frameScores[i].roll1 >= 0) rolls.push(frameScores[i].roll1);
    if (rolls.length < count && frameScores[i].roll2 >= 0) rolls.push(frameScores[i].roll2);
  }
  // 10th frame extra roll
  if (rolls.length < count && frameIdx === 8 && frameScores[9].roll3 >= 0) {
    rolls.push(frameScores[9].roll3);
  }
  var total = 0;
  for (var j = 0; j < rolls.length; j++) total += rolls[j];
  return total;
}

function recordRoll(pinsKnocked) {
  var f = frameScores[currentFrame - 1];

  if (currentFrame === 10) {
    // 10th frame special rules
    if (f.roll1 < 0) {
      f.roll1 = pinsKnocked;
      if (pinsKnocked === 10) {
        f.strike = true;
        createPins(); // reset pins for 2nd roll
        currentRoll = 2;
      } else {
        currentRoll = 2;
      }
    } else if (f.roll2 < 0) {
      f.roll2 = pinsKnocked;
      if (f.strike && pinsKnocked === 10) {
        createPins(); // reset for 3rd roll
        currentRoll = 3;
      } else if (!f.strike && f.roll1 + pinsKnocked === 10) {
        f.spare = true;
        createPins(); // reset for 3rd roll
        currentRoll = 3;
      } else if (f.strike) {
        currentRoll = 3;
        if (pinsKnocked < 10) {
          // Don't reset pins
        }
      } else {
        // No bonus roll
        endFrame();
        return;
      }
    } else {
      f.roll3 = pinsKnocked;
      endFrame();
      return;
    }
  } else {
    if (currentRoll === 1) {
      f.roll1 = pinsKnocked;
      if (pinsKnocked === 10) {
        f.strike = true;
        consecutiveStrikes++;
        comboCount++;
        addScorePopup('STRIKE!', PIN_CENTER_X, PIN_CENTER_Y, '#ffcc00', 36);
        if (consecutiveStrikes >= 2) {
          addScorePopup(getStrikeComboName(consecutiveStrikes), PIN_CENTER_X, PIN_CENTER_Y + 30, '#ff4488', 20);
        }
        TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.08], [1047, 0.15]], 90);
        triggerShake(8);
        triggerFlash('#ffcc00', 0.5);
        spawnPinExplosion(PIN_CENTER_X, PIN_CENTER_Y, 25);
        endFrame();
        return;
      } else {
        consecutiveStrikes = 0;
        currentRoll = 2;
        rollPhase = 'aim';
        aimAngle = 0;
        aimDir = 1;
        powerMeter = 0;
        spinMeter = 0;
        ball = null;
      }
    } else {
      f.roll2 = pinsKnocked;
      if (f.roll1 + pinsKnocked === 10) {
        f.spare = true;
        comboCount++;
        addScorePopup('SPARE!', PIN_CENTER_X, PIN_CENTER_Y, '#44dd88', 28);
        TAS.audio.playMelody([[400, 0.1], [600, 0.12]], 110);
        triggerShake(4);
        spawnPinExplosion(PIN_CENTER_X, PIN_CENTER_Y, 12);
      } else {
        comboCount = 0;
      }
      endFrame();
      return;
    }
  }

  calculateScore();
  rollPhase = 'aim';
}

function endFrame() {
  calculateScore();
  rollPhase = 'score';
  settleTimer = 90;

  if (bossFrame && countStandingPins() === 0) {
    bossDefeated++;
    addScorePopup('BOSS DEFEATED!', GW / 2, GH / 2, '#ffcc00', 30);
  }
}

function getStrikeComboName(count) {
  if (count === 2) return 'DOUBLE!';
  if (count === 3) return 'TURKEY!';
  if (count === 4) return 'FOUR-BAGGER!';
  if (count === 5) return 'FIVE-BAGGER!';
  if (count >= 6) return 'ON FIRE!';
  return '';
}

function advanceFrame() {
  if (currentFrame >= 10) {
    // Game over
    if (totalScore > highScore) {
      highScore = totalScore;
      localStorage.setItem(SAVE_KEY + '_hi', highScore);
    }
    state = 'gameOver';
    return;
  }
  currentFrame++;
  initNewFrame();
}

// === BALL PHYSICS ===
function launchBall(power, angle, spin) {
  // STR_MULT affects ball power and pin knockdown
  var effectivePower = power * STR_MULT * 6.0;
  // DEX_MULT affects precision (less random deviation)
  var aimJitter = (1.0 - DEX_MULT * 0.3) * 0.02;
  var jitteredAngle = angle + rnd(-aimJitter, aimJitter);

  // Apply trick shot modifiers
  var spinMult = 1.0;
  var powerMult = 1.0;
  if (selectedTrick >= 0 && selectedTrick < TRICK_SHOTS.length) {
    spinMult = TRICK_SHOTS[selectedTrick].spinMult;
    powerMult = TRICK_SHOTS[selectedTrick].powerMult;
  }

  ball = {
    x: (LANE_LEFT + LANE_RIGHT) / 2,
    y: FOUL_LINE_Y,
    vx: Math.sin(jitteredAngle) * effectivePower * 0.3 * powerMult,
    vy: -effectivePower * powerMult,
    spin: spin * 0.15 * spinMult * DEX_MULT,   // DEX_MULT also affects spin control
    radius: BALL_RADIUS,
    active: true,
    trail: [],
    power: power * STR_MULT * powerMult,        // STR_MULT for knockdown force
    trickIdx: selectedTrick
  };

  // Stamina cost (CON_MULT reduces cost)
  stamina = Math.max(0, stamina - (10 / CON_MULT));

  createPinBodies();
  rollPhase = 'rolling';
  TAS.audio.playTone(200, 0.15, 'sine', 0.08, 150);
}

function updateBall(dt) {
  if (!ball || !ball.active) return;

  // Apply spin as lateral curve
  ball.vx += ball.spin * dt * 60;

  // Apply hazard effects
  for (var h = 0; h < hazards.length; h++) {
    var haz = hazards[h];
    var d = dist(ball.x, ball.y, haz.x, haz.y);
    if (d < haz.radius + ball.radius) {
      if (haz.type.effect === 'slow') {
        ball.vy *= (1.0 - (1.0 - haz.type.mult) * dt * 60);
        ball.vx *= (1.0 - (1.0 - haz.type.mult) * dt * 60);
      } else if (haz.type.effect === 'curve') {
        ball.vx += (haz.x > ball.x ? -1 : 1) * haz.type.mult * dt * 60;
      } else if (haz.type.effect === 'boost') {
        ball.vy *= (1.0 + (haz.type.mult - 1.0) * dt * 60 * 0.1);
      } else if (haz.type.effect === 'deflect') {
        ball.vx += rnd(-0.5, 0.5) * dt * 60;
      }
    }
  }

  // Move ball
  ball.x += ball.vx * dt * 60;
  ball.y += ball.vy * dt * 60;

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y, age: 0 });
  if (ball.trail.length > 20) ball.trail.shift();
  for (var t = 0; t < ball.trail.length; t++) ball.trail[t].age += dt;

  // Gutter detection
  if (ball.x < LANE_LEFT + GUTTER_W || ball.x > LANE_RIGHT - GUTTER_W) {
    ball.active = false;
    TAS.audio.playNoise(0.15, 0.06, 400);
    addScorePopup('GUTTER!', ball.x, ball.y, '#ff4444', 22);
    settleTimer = 40;
    rollPhase = 'settling';
    return;
  }

  // Off screen (past pins)
  if (ball.y < LANE_TOP - 20) {
    ball.active = false;
    settleTimer = 40;
    rollPhase = 'settling';
    return;
  }

  // Pin collision
  checkPinCollisions();
}

function checkPinCollisions() {
  if (!ball || !ball.active) return;

  for (var i = 0; i < pinBodies.length; i++) {
    var pb = pinBodies[i];
    if (!pb.standing) continue;

    var d = dist(ball.x, ball.y, pb.x, pb.y);
    if (d < ball.radius + pb.radius) {
      // Collision! STR_MULT determines knockdown force
      var knockForce = ball.power * STR_MULT * 1.5;

      // CHA_MULT: luck-based bonus knockdown
      if (Math.random() < (CHA_MULT - 0.8) * 0.3) {
        knockForce *= 1.5;
        addScorePopup('LUCKY!', pb.x, pb.y - 15, '#ffcc00', 14);
      }

      // Boss pins need more hits
      var pin = pins[pb.pinId];
      if (pin.hp && pin.hp > 1) {
        pin.hp--;
        pb.vx += (pb.x - ball.x) / d * knockForce * 0.3;
        pb.vy += (pb.y - ball.y) / d * knockForce * 0.3;
        pin.wobble = 5;
        pin.wobbleDir = (ball.x < pb.x) ? 1 : -1;
        pin.hitTimer = 10;
        TAS.audio.playTone(300, 0.05, 'square', 0.04);
        continue;
      }

      // Knock down the pin
      pb.standing = false;
      pin.standing = false;
      pin.hitTimer = 20;

      // Velocity from impact
      var nx = (pb.x - ball.x) / d;
      var ny = (pb.y - ball.y) / d;
      pb.vx = nx * knockForce * 2;
      pb.vy = ny * knockForce * 2;
      pb.rotVel = rnd(-0.3, 0.3);

      // Ball loses some energy
      ball.vx *= 0.85;
      ball.vy *= 0.92;

      // Pin-to-pin chain collisions
      checkPinChainCollisions(i);

      // Effects
      TAS.audio.playTone(400 + Math.random() * 200, 0.08, 'square', 0.05);
      spawnPinHitParticles(pb.x, pb.y);
      triggerShake(2);
    }
  }
}

function checkPinChainCollisions(hitIdx) {
  // Knocked pin can hit other standing pins
  var hitPb = pinBodies[hitIdx];
  for (var j = 0; j < pinBodies.length; j++) {
    if (j === hitIdx || !pinBodies[j].standing) continue;
    var d = dist(hitPb.x + hitPb.vx * 2, hitPb.y + hitPb.vy * 2, pinBodies[j].x, pinBodies[j].y);
    if (d < PIN_RADIUS * 3) {
      // Chain knockdown chance based on force + CHA_MULT for luck
      var chainChance = 0.6 + CHA_MULT * 0.15;
      if (Math.random() < chainChance) {
        pinBodies[j].standing = false;
        pins[pinBodies[j].pinId].standing = false;
        pins[pinBodies[j].pinId].hitTimer = 15;
        var nx = (pinBodies[j].x - hitPb.x) / Math.max(1, d);
        var ny = (pinBodies[j].y - hitPb.y) / Math.max(1, d);
        pinBodies[j].vx = nx * Math.abs(hitPb.vx) * 0.6;
        pinBodies[j].vy = ny * Math.abs(hitPb.vy) * 0.6;
        pinBodies[j].rotVel = rnd(-0.2, 0.2);
        TAS.audio.playTone(350, 0.05, 'square', 0.03);
        spawnPinHitParticles(pinBodies[j].x, pinBodies[j].y);
      }
    }
  }
}

function updatePinBodies(dt) {
  for (var i = 0; i < pinBodies.length; i++) {
    var pb = pinBodies[i];
    if (pb.standing) continue;
    pb.x += pb.vx * dt * 60;
    pb.y += pb.vy * dt * 60;
    pb.rotation += pb.rotVel * dt * 60;
    pb.vx *= 0.95;
    pb.vy *= 0.95;
    pb.rotVel *= 0.95;
  }
}

// === PARTICLE EFFECTS (PASS 3) ===
function spawnPinHitParticles(x, y) {
  var zone = ALLEY_ZONES[currentZone];
  for (var i = 0; i < 6; i++) {
    particles.push({
      x: x, y: y,
      vx: rnd(-3, 3), vy: rnd(-4, 1),
      life: rnd(15, 30),
      maxLife: 30,
      color: i % 2 === 0 ? zone.accent : '#ffffff',
      size: rnd(1.5, 3)
    });
  }
}

function spawnPinExplosion(x, y, count) {
  var zone = ALLEY_ZONES[currentZone];
  var colors = [zone.accent, '#ffcc00', '#ff4488', '#ffffff', '#44aaff'];
  for (var i = 0; i < count; i++) {
    var angle = rnd(0, Math.PI * 2);
    var speed = rnd(1, 5);
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: rnd(20, 50),
      maxLife: 50,
      color: colors[i % colors.length],
      size: rnd(2, 5)
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.1 * dt * 60;
    p.life -= dt * 60;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// === SCORE POPUPS (PASS 2) ===
function addScorePopup(text, x, y, color, size) {
  scorePopups.push({
    text: text, x: x, y: y, color: color, size: size || 18,
    life: 60, maxLife: 60
  });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.y -= 0.5 * dt * 60;
    sp.life -= dt * 60;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = clamp(sp.life / sp.maxLife, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold ' + sp.size + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === SCREEN EFFECTS (PASS 3) ===
function triggerShake(amount) {
  shakeAmount = amount;
}

function triggerFlash(color, alpha) {
  flashColor = color;
  flashAlpha = alpha;
}

function applyShake() {
  if (shakeAmount > 0.5) {
    ctx.translate(rnd(-shakeAmount, shakeAmount), rnd(-shakeAmount, shakeAmount));
    shakeAmount *= shakeDecay;
  } else {
    shakeAmount = 0;
  }
}

function drawFlash() {
  if (flashAlpha > 0.01) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    flashAlpha *= 0.9;
  }
}

// === BASELING DRAWING (PASS 2) ===
function drawBaseling(x, y, size, facing) {
  // The bowler IS a baseling (mushroom creature)
  var s = size || 12;
  var dir = facing || 1;

  // Body (mushroom stem)
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.beginPath();
  ctx.ellipse(x, y + s * 0.3, s * 0.35, s * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cap (mushroom top)
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.ellipse(x, y - s * 0.2, s * 0.55, s * 0.4, 0, Math.PI, 0);
  ctx.fill();

  // Cap spots
  ctx.fillStyle = '#ffdddd';
  ctx.beginPath();
  ctx.arc(x - s * 0.15, y - s * 0.35, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + s * 0.2, y - s * 0.28, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x - s * 0.12, y, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + s * 0.12, y, s * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(x - s * 0.12 + dir * s * 0.03, y, s * 0.04, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + s * 0.12 + dir * s * 0.03, y, s * 0.04, 0, Math.PI * 2);
  ctx.fill();

  // Mouth (determined expression while bowling)
  ctx.strokeStyle = '#111111';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y + s * 0.12, s * 0.08, 0.1, Math.PI - 0.1);
  ctx.stroke();
}

// === MUSHROOM PIN DRAWING (PASS 2) ===
function drawMushroomPin(x, y, standing, wobble, hitTimer, bossPin) {
  ctx.save();
  ctx.translate(x, y);

  if (wobble) {
    ctx.rotate(Math.sin(frame * 0.3) * wobble * 0.05);
  }

  if (!standing) {
    ctx.globalAlpha = 0.3;
    ctx.rotate(0.5);
  }

  var glow = hitTimer > 0 ? hitTimer / 20 : 0;

  // Pin glow on hit
  if (glow > 0) {
    ctx.fillStyle = 'rgba(255,255,200,' + (glow * 0.5) + ')';
    ctx.beginPath();
    ctx.arc(0, 0, PIN_RADIUS + 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stem
  ctx.fillStyle = bossPin ? '#8844aa' : '#ddccaa';
  ctx.fillRect(-2, -2, 4, 7);

  // Cap
  ctx.fillStyle = bossPin ? '#cc44ff' : '#dd6644';
  ctx.beginPath();
  ctx.arc(0, -3, PIN_RADIUS, Math.PI, 0);
  ctx.fill();

  // Cap top
  ctx.fillStyle = bossPin ? '#aa22dd' : '#bb4422';
  ctx.beginPath();
  ctx.arc(0, -4, PIN_RADIUS - 1, Math.PI, 0);
  ctx.fill();

  // Spots on cap
  ctx.fillStyle = bossPin ? '#dd88ff' : '#ffaa88';
  ctx.beginPath();
  ctx.arc(-1, -5, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(2, -4, 1, 0, Math.PI * 2);
  ctx.fill();

  // Boss pin: extra glow ring
  if (bossPin) {
    ctx.strokeStyle = 'rgba(204,68,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, -1, PIN_RADIUS + 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

// === BOWLING BALL DRAWING ===
function drawBowlingBall(x, y, trickIdx) {
  // Ball color based on trick shot or baseling color
  var color = statB.color || '#44dd88';
  if (trickIdx >= 0 && trickIdx < TRICK_SHOTS.length) {
    color = TRICK_SHOTS[trickIdx].color;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + 2, y + 3, BALL_RADIUS, BALL_RADIUS * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Ball body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, BALL_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x - 2, y - 2, BALL_RADIUS * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // Finger holes
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.arc(x - 1, y - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 2, y - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 0.5, y + 1, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateParticles(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      if (showTutorial) {
        state = 'tutorial';
        tutorialStep = 0;
        tutorialTimer = 0;
      } else {
        state = 'playing';
        initNewGame();
      }
    }
    return;
  }

  if (state === 'tutorial') {
    updateTutorial(dt);
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
    return;
  }

  if (state === 'gameOver') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }
}

// === TUTORIAL (PASS 3) ===
function updateTutorial(dt) {
  tutorialTimer += dt;
  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    tutorialStep++;
    tutorialTimer = 0;
    if (tutorialStep > 4) {
      state = 'playing';
      initNewGame();
      showTutorial = false;
      localStorage.setItem(SAVE_KEY + '_played', '1');
    }
  }
}

// === PLAYING UPDATE ===
let inputCooldown = 0;

function updatePlaying(dt) {
  inputCooldown = Math.max(0, inputCooldown - 1);

  if (rollPhase === 'aim') {
    updateAim(dt);
  } else if (rollPhase === 'power') {
    updatePower(dt);
  } else if (rollPhase === 'spin') {
    updateSpin(dt);
  } else if (rollPhase === 'rolling') {
    updateBall(dt);
    updatePinBodies(dt);
    // Check if ball stopped or off-lane
    if (ball && !ball.active) {
      rollPhase = 'settling';
      settleTimer = 40;
    }
  } else if (rollPhase === 'settling') {
    updatePinBodies(dt);
    settleTimer--;
    if (settleTimer <= 0) {
      // Count knocked pins
      var knocked = 10 - countStandingPins();
      var thisRollKnocked = knocked;
      if (currentRoll === 2) {
        thisRollKnocked = knocked - (frameScores[currentFrame - 1].roll1 || 0);
      }
      if (currentRoll === 3 && currentFrame === 10) {
        var prev = (frameScores[9].roll1 || 0) + (frameScores[9].roll2 || 0);
        thisRollKnocked = Math.max(0, knocked - prev);
        // If pins were reset, count directly
        if (frameScores[9].strike || frameScores[9].spare) {
          thisRollKnocked = 10 - countStandingPins();
        }
      }
      thisRollKnocked = Math.max(0, thisRollKnocked);
      if (thisRollKnocked > 0) {
        addScorePopup('+' + Math.round(thisRollKnocked * INT_MULT), PIN_CENTER_X, PIN_CENTER_Y - 20, '#ffffff', 18);
      }
      recordRoll(thisRollKnocked);
    }
  } else if (rollPhase === 'score') {
    settleTimer--;
    if (settleTimer <= 0) {
      advanceFrame();
    }
  }

  // Trick shot selection with B button during aim
  if (rollPhase === 'aim' && inputCooldown <= 0) {
    if (TAS.input.keys['KeyB'] || TAS.input.keys['b'] || TAS.input.touch.b) {
      // Cycle through unlocked tricks
      var next = selectedTrick + 1;
      while (next < TRICK_SHOTS.length && !trickUnlocked[next]) next++;
      if (next >= TRICK_SHOTS.length) next = -1;
      selectedTrick = next;
      inputCooldown = 12;
      TAS.audio.playTone(300, 0.04, 'square', 0.03);
    }
  }

  // Update pin wobble (WIS_MULT affects timing, CHA_MULT affects wobble)
  for (var i = 0; i < pins.length; i++) {
    if (pins[i].wobble > 0) {
      pins[i].wobble = Math.max(0, pins[i].wobble - dt * 60 * 0.1);
    }
    if (pins[i].hitTimer > 0) {
      pins[i].hitTimer = Math.max(0, pins[i].hitTimer - dt * 60);
    }
  }
}

function updateAim(dt) {
  // WIS_MULT controls aim speed (slower = more precise with high WIS)
  var effectiveAimSpeed = aimSpeed / (WIS_MULT * 0.8);

  // Low stamina makes aiming harder
  var staminaPenalty = stamina < 30 ? 1.5 : 1.0;
  effectiveAimSpeed *= staminaPenalty;

  aimAngle += aimDir * effectiveAimSpeed * dt * 60;
  if (aimAngle > 0.4) { aimAngle = 0.4; aimDir = -1; }
  if (aimAngle < -0.4) { aimAngle = -0.4; aimDir = 1; }

  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    rollPhase = 'power';
    powerMeter = 0;
    powerDir = 1;
    TAS.audio.playTone(400, 0.05, 'sine', 0.04);
  }
}

function updatePower(dt) {
  // WIS_MULT makes the power meter move slower (wider timing window)
  var effectivePowerSpeed = powerSpeed / (WIS_MULT * 0.7);

  powerMeter += powerDir * effectivePowerSpeed * dt * 60;
  if (powerMeter >= 1) { powerMeter = 1; powerDir = -1; }
  if (powerMeter <= 0) { powerMeter = 0; powerDir = 1; }

  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    rollPhase = 'spin';
    spinMeter = 0;
    spinDir = 1;
    TAS.audio.playTone(500, 0.05, 'sine', 0.04);
  }
}

function updateSpin(dt) {
  // DEX_MULT affects spin meter speed
  var effectiveSpinSpeed = 0.03 / (DEX_MULT * 0.6);

  spinMeter += spinDir * effectiveSpinSpeed * dt * 60;
  if (spinMeter >= 1) { spinMeter = 1; spinDir = -1; }
  if (spinMeter <= -1) { spinMeter = -1; spinDir = 1; }

  if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
    launchBall(powerMeter, aimAngle, spinMeter);
    TAS.audio.playTone(300, 0.08, 'triangle', 0.06);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'tutorial') {
    drawTutorial();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'playing') {
    drawPlaying();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }
}

// === TITLE SCREEN ===
function drawTitle() {
  var zone = ALLEY_ZONES[0];
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 0, GW, GH);

  // Animated mushroom lane lines
  ctx.strokeStyle = 'rgba(68,221,136,0.1)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 15; i++) {
    var x = 30 + i * 30;
    var offset = Math.sin(frame * 0.02 + i * 0.5) * 5;
    ctx.beginPath();
    ctx.moveTo(x + offset, 0);
    ctx.lineTo(x - offset, GH);
    ctx.stroke();
  }

  // Spore particles floating
  for (var s = 0; s < 20; s++) {
    var sx = (frame * 0.3 + s * 47) % GW;
    var sy = (Math.sin(frame * 0.015 + s) * 30 + s * 16) % GH;
    ctx.fillStyle = 'rgba(68,221,136,' + (0.2 + Math.sin(frame * 0.05 + s) * 0.1) + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASELING BOWL', GW / 2, 65);

  // Subtitle
  ctx.fillStyle = '#44dd88';
  ctx.font = '12px monospace';
  ctx.fillText('Tasern Mushroom Bowling League', GW / 2, 85);

  // Draw a baseling and bowling ball
  drawBaseling(GW / 2 - 40, 130, 20, 1);
  drawBowlingBall(GW / 2 + 30, 135, -1);

  // Decorative mushroom pins
  for (var p = 0; p < 4; p++) {
    drawMushroomPin(GW / 2 + 50 + p * 16, 125 - (p % 2) * 8, true, Math.sin(frame * 0.04 + p) * 0.5, 0, false);
  }

  // Controls instructions with dotted leaders
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  var instY = 170;
  var instLines = [
    ['ARROWS / D-PAD', 'Move & Aim'],
    ['A / ENTER / SPACE', 'Confirm / Roll'],
    ['B / SHIFT', 'Trick Shot Select'],
    ['AIM', 'Set direction'],
    ['POWER', 'Set ball speed'],
    ['SPIN', 'Set ball curve']
  ];
  for (var il = 0; il < instLines.length; il++) {
    var label = instLines[il][0];
    var desc = instLines[il][1];
    ctx.fillStyle = '#ffcc00';
    ctx.fillText(label, 80, instY + il * 14);
    // Dotted leader
    ctx.fillStyle = '#444';
    var leaderStart = 80 + label.length * 6 + 5;
    for (var dot = leaderStart; dot < 310; dot += 5) {
      ctx.fillRect(dot, instY + il * 14 - 2, 1, 1);
    }
    ctx.fillStyle = '#aaaaaa';
    ctx.textAlign = 'right';
    ctx.fillText(desc, 400, instY + il * 14);
    ctx.textAlign = 'left';
  }

  // Stat bonuses display
  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con +
    ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 265);
  ctx.fillText(statB.name + ' (Lv.' + statB.level + ')', GW / 2, 278);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText('High Score: ' + highScore, GW / 2, 295);
  }

  // Blink prompt
  if (frame % 60 < 40) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px monospace';
    ctx.fillText('PRESS START', GW / 2, 310);
  }
}

// === MAIN GAME DRAW ===
function drawPlaying() {
  var zone = ALLEY_ZONES[currentZone];

  ctx.save();
  applyShake();

  // Background
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, zone.bg1);
  grad.addColorStop(1, zone.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Background spore particles
  for (var s = 0; s < 8; s++) {
    var sx = (frame * 0.2 + s * 60) % GW;
    var sy = (Math.sin(frame * 0.01 + s * 2) * 20 + 50 + s * 35) % GH;
    ctx.fillStyle = 'rgba(' + hexToRgb(zone.accent) + ',0.15)';
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw lane
  drawLane(zone);

  // Draw hazards
  drawHazards();

  // Draw pins
  drawPins();

  // Draw ball trail
  if (ball) {
    for (var t = 0; t < ball.trail.length; t++) {
      var tr = ball.trail[t];
      var alpha = 1 - tr.age * 3;
      if (alpha > 0) {
        ctx.fillStyle = 'rgba(' + hexToRgb(zone.accent) + ',' + (alpha * 0.3) + ')';
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, BALL_RADIUS * (1 - tr.age * 2), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Draw ball
  if (ball && ball.active) {
    drawBowlingBall(ball.x, ball.y, ball.trickIdx);
  }

  // Draw baseling bowler during aim/power/spin
  if (rollPhase === 'aim' || rollPhase === 'power' || rollPhase === 'spin') {
    var bowlerX = (LANE_LEFT + LANE_RIGHT) / 2;
    var bowlerY = FOUL_LINE_Y + 25;
    drawBaseling(bowlerX, bowlerY, 14, aimAngle > 0 ? 1 : -1);

    // Ball in hand
    if (rollPhase !== 'rolling') {
      drawBowlingBall(bowlerX + 8, bowlerY + 2, selectedTrick);
    }
  }

  // Draw aim arrow
  if (rollPhase === 'aim') {
    drawAimArrow((LANE_LEFT + LANE_RIGHT) / 2, FOUL_LINE_Y, aimAngle, 80);
  }

  // Draw power meter
  if (rollPhase === 'power') {
    drawPowerMeterUI(LANE_RIGHT + 15, LANE_TOP + 40, 20, 200, powerMeter);
  }

  // Draw spin meter
  if (rollPhase === 'spin') {
    drawSpinMeterUI(LANE_LEFT - 50, GH / 2 - 10, 30, 20, spinMeter);
  }

  // Particles
  drawParticles();
  TAS.particles.draw();

  ctx.restore();

  // Flash effect
  drawFlash();

  // HUD
  drawHUD(zone);

  // Score popups
  drawScorePopups();

  // Boss frame overlay
  if (bossFrame && rollPhase === 'aim' && currentRoll === 1) {
    drawBossIntro();
  }

  // Trick shot display
  if (selectedTrick >= 0 && rollPhase === 'aim') {
    drawTrickShotInfo();
  }

  // Zone name on transition
  if (currentRoll === 1 && rollPhase === 'aim' && settleTimer <= 0) {
    var zoneFlash = Math.max(0, 60 - (frame % 300));
    if (zoneFlash > 0 && (frame % 300) < 60) {
      ctx.globalAlpha = zoneFlash / 60;
      ctx.fillStyle = zone.accent;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(zone.name, GW / 2, GH - 35);
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      ctx.fillText(zone.desc, GW / 2, GH - 22);
      ctx.globalAlpha = 1;
    }
  }
}

function hexToRgb(hex) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return r + ',' + g + ',' + b;
}

// === LANE DRAWING ===
function drawLane(zone) {
  // Gutter (left)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(LANE_LEFT - GUTTER_W, LANE_TOP, GUTTER_W, LANE_LENGTH);
  // Gutter (right)
  ctx.fillRect(LANE_RIGHT, LANE_TOP, GUTTER_W, LANE_LENGTH);

  // Lane surface
  var laneGrad = ctx.createLinearGradient(LANE_LEFT, 0, LANE_RIGHT, 0);
  laneGrad.addColorStop(0, zone.lane);
  laneGrad.addColorStop(0.5, lightenColor(zone.lane, 20));
  laneGrad.addColorStop(1, zone.lane);
  ctx.fillStyle = laneGrad;
  ctx.fillRect(LANE_LEFT, LANE_TOP, LANE_WIDTH, LANE_LENGTH);

  // Lane boards (vertical lines)
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (var b = 0; b < 10; b++) {
    var bx = LANE_LEFT + b * (LANE_WIDTH / 10);
    ctx.beginPath();
    ctx.moveTo(bx, LANE_TOP);
    ctx.lineTo(bx, LANE_BOTTOM);
    ctx.stroke();
  }

  // Arrow markers (standard bowling arrows)
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  var arrowY = FOUL_LINE_Y - 60;
  for (var a = 0; a < 7; a++) {
    var ax = LANE_LEFT + 30 + a * (LANE_WIDTH - 60) / 6;
    ctx.beginPath();
    ctx.moveTo(ax, arrowY);
    ctx.lineTo(ax - 3, arrowY + 8);
    ctx.lineTo(ax + 3, arrowY + 8);
    ctx.fill();
  }

  // Foul line
  ctx.strokeStyle = '#cc4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(LANE_LEFT, FOUL_LINE_Y);
  ctx.lineTo(LANE_RIGHT, FOUL_LINE_Y);
  ctx.stroke();

  // Approach dots
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  for (var d = 0; d < 5; d++) {
    var dx = LANE_LEFT + 40 + d * (LANE_WIDTH - 80) / 4;
    ctx.beginPath();
    ctx.arc(dx, FOUL_LINE_Y + 20, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Pin deck area
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(LANE_LEFT, LANE_TOP, LANE_WIDTH, 70);

  // Mycelium decoration along edges (Tasern themed)
  ctx.strokeStyle = 'rgba(' + hexToRgb(ALLEY_ZONES[currentZone].accent) + ',0.15)';
  ctx.lineWidth = 1;
  for (var m = 0; m < 8; m++) {
    var my = LANE_TOP + m * (LANE_LENGTH / 8);
    var wave = Math.sin(frame * 0.02 + m) * 3;
    ctx.beginPath();
    ctx.moveTo(LANE_LEFT - GUTTER_W - 5, my);
    ctx.quadraticCurveTo(LANE_LEFT - GUTTER_W + wave, my + 15, LANE_LEFT - GUTTER_W - 3, my + LANE_LENGTH / 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(LANE_RIGHT + GUTTER_W + 5, my);
    ctx.quadraticCurveTo(LANE_RIGHT + GUTTER_W - wave, my + 15, LANE_RIGHT + GUTTER_W + 3, my + LANE_LENGTH / 8);
    ctx.stroke();
  }

  // Lane boundary
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(LANE_LEFT, LANE_TOP, LANE_WIDTH, LANE_LENGTH);
}

function lightenColor(hex, amount) {
  var r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
  var g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
  var b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

// === HAZARD DRAWING ===
function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var pulse = Math.sin(frame * 0.05 + h.pulsePhase) * 0.2 + 0.8;
    ctx.fillStyle = h.type.color;
    ctx.globalAlpha = 0.4 * pulse;
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.radius * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Hazard label
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#ffffff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(h.type.name, h.x, h.y + h.radius + 8);
    ctx.globalAlpha = 1;
  }
}

// === PIN DRAWING ===
function drawPins() {
  for (var i = 0; i < pins.length; i++) {
    var pin = pins[i];
    var px = pin.x;
    var py = pin.y;

    // Use physics body position if rolling
    if (pinBodies.length > 0) {
      px = pinBodies[i].x;
      py = pinBodies[i].y;
    }

    var isBoss = bossFrame && pin.hp && pin.hp > 1;
    drawMushroomPin(px, py, pin.standing, pin.wobble, pin.hitTimer, isBoss);

    // Boss pin HP indicator
    if (bossFrame && pin.standing && pin.hp && pin.hp > 1) {
      ctx.fillStyle = '#ff4488';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('x' + pin.hp, px, py + 12);
    }
  }
}

// === AIM ARROW ===
function drawAimArrow(x, y, angle, length) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, -length);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrow head
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath();
  ctx.moveTo(0, -length);
  ctx.lineTo(-5, -length + 10);
  ctx.lineTo(5, -length + 10);
  ctx.fill();

  ctx.restore();
}

// === POWER METER UI ===
function drawPowerMeterUI(x, y, w, h, value) {
  // Background
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);

  // Power gradient fill (bottom up)
  var fillH = h * value;
  var pGrad = ctx.createLinearGradient(x, y + h, x, y);
  pGrad.addColorStop(0, '#44dd88');
  pGrad.addColorStop(0.6, '#ffcc00');
  pGrad.addColorStop(1, '#ff4444');
  ctx.fillStyle = pGrad;
  ctx.fillRect(x + 1, y + h - fillH, w - 2, fillH);

  // Sweet spot zone (affected by WIS_MULT)
  var sweetW = 0.15 * WIS_MULT;   // WIS_MULT widens sweet spot
  var sweetTop = y + h * (1 - 0.85);
  var sweetBot = y + h * (1 - 0.85 + sweetW);
  ctx.strokeStyle = 'rgba(255,255,0,0.6)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, sweetTop, w, sweetBot - sweetTop);

  // Label
  ctx.fillStyle = '#ffffff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PWR', x + w / 2, y - 4);

  // STR indicator
  ctx.fillStyle = '#ff8844';
  ctx.font = '7px monospace';
  ctx.fillText('STR:' + statB.str, x + w / 2, y + h + 10);
}

// === SPIN METER UI ===
function drawSpinMeterUI(x, y, w, h, value) {
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);

  // Center line
  ctx.strokeStyle = '#444';
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y);
  ctx.lineTo(x + w / 2, y + h);
  ctx.stroke();

  // Spin indicator
  var indicatorX = x + w / 2 + (value * w / 2);
  ctx.fillStyle = value > 0 ? '#44aaff' : '#ff4488';
  ctx.fillRect(indicatorX - 2, y + 1, 4, h - 2);

  // Label
  ctx.fillStyle = '#ffffff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPIN', x + w / 2, y - 4);

  // Left/Right indicators
  ctx.fillStyle = '#ff4488';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('L', x + 2, y + h + 10);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#44aaff';
  ctx.fillText('R', x + w - 2, y + h + 10);
  ctx.textAlign = 'center';
}

// === SCORE CARD ===
function drawScoreCard() {
  var cardY = GH - 40;
  var cardH = 26;
  var cellW = (GW - 20) / 10;

  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(10, cardY, GW - 20, cardH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, cardY, GW - 20, cardH);

  for (var i = 0; i < 10; i++) {
    var cx = 10 + i * cellW;
    var f = frameScores[i];

    // Frame divider
    if (i > 0) {
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(cx, cardY);
      ctx.lineTo(cx, cardY + cardH);
      ctx.stroke();
    }

    // Frame number
    ctx.fillStyle = i === currentFrame - 1 ? '#ffcc00' : '#555';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('' + (i + 1), cx + cellW / 2, cardY + 8);

    // Roll results
    if (f.roll1 >= 0) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';

      if (f.strike) {
        ctx.fillStyle = '#ffcc00';
        ctx.fillText('X', cx + cellW / 2, cardY + 18);
      } else if (f.spare) {
        ctx.fillText('' + f.roll1, cx + cellW / 3, cardY + 18);
        ctx.fillStyle = '#44dd88';
        ctx.fillText('/', cx + cellW * 2 / 3, cardY + 18);
      } else {
        ctx.fillText('' + f.roll1, cx + cellW / 3, cardY + 18);
        if (f.roll2 >= 0) {
          ctx.fillText('' + f.roll2, cx + cellW * 2 / 3, cardY + 18);
        }
      }

      // 10th frame 3rd roll
      if (i === 9 && f.roll3 >= 0) {
        ctx.fillStyle = '#ff8844';
        ctx.font = '6px monospace';
        ctx.fillText(f.roll3 === 10 ? 'X' : '' + f.roll3, cx + cellW - 4, cardY + 10);
      }
    }

    // Running total
    if (f.total > 0) {
      ctx.fillStyle = '#888';
      ctx.font = '6px monospace';
      var runTotal = 0;
      for (var rt = 0; rt <= i; rt++) runTotal += frameScores[rt].total;
      ctx.fillText('' + runTotal, cx + cellW / 2, cardY + cardH - 2);
    }
  }
}

// === GAME OVER ===
function drawGameOver() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Confetti
  for (var i = 0; i < 25; i++) {
    var cx = (frame * (i + 1) * 1.1 + i * 43) % GW;
    var cy = (frame * 0.6 + i * 29) % GH;
    ctx.fillStyle = ['#ffcc00', '#44dd88', '#44aaff', '#ff4488', '#aa44cc'][i % 5];
    ctx.fillRect(cx, cy, 3, 3);
  }

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GW / 2, 50);

  // Baseling
  drawBaseling(GW / 2, 85, 18, 1);

  // Final score
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('FINAL SCORE: ' + totalScore, GW / 2, 120);

  // Score breakdown
  ctx.fillStyle = '#44dd88';
  ctx.font = '11px monospace';
  var strikes = 0;
  var spares = 0;
  for (var f = 0; f < 10; f++) {
    if (frameScores[f].strike) strikes++;
    if (frameScores[f].spare) spares++;
  }
  ctx.fillText('Strikes: ' + strikes + '  Spares: ' + spares, GW / 2, 145);

  if (bossDefeated > 0) {
    ctx.fillStyle = '#ff4488';
    ctx.fillText('Bosses Defeated: ' + bossDefeated, GW / 2, 162);
  }

  // Stat contribution display
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('STR x' + STR_MULT.toFixed(1) + ' | DEX x' + DEX_MULT.toFixed(1) +
    ' | INT x' + INT_MULT.toFixed(1) + ' | WIS x' + WIS_MULT.toFixed(1), GW / 2, 185);

  // Score card
  drawFinalScoreCard();

  // High score
  if (totalScore >= highScore) {
    var glow = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(255,204,0,' + glow + ')';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 260);
  } else {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('High Score: ' + highScore, GW / 2, 260);
  }

  if (frame % 60 < 40) {
    ctx.fillStyle = '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText('[PRESS START]', GW / 2, 290);
  }
}

function drawFinalScoreCard() {
  var cardY = 200;
  var cardH = 32;
  var cardX = 30;
  var cardW = GW - 60;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';

  for (var i = 0; i < 10; i++) {
    var cx = cardX + i * cellW;

    if (i > 0) {
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(cx, cardY);
      ctx.lineTo(cx, cardY + cardH);
      ctx.stroke();
    }

    ctx.fillStyle = '#555';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('' + (i + 1), cx + cellW / 2, cardY + 9);

    if (f.roll1 >= 0) {
      ctx.font = '9px monospace';
      if (f.strike) {
        ctx.fillStyle = '#ffcc00';
        ctx.fillText('X', cx + cellW / 2, cardY + 20);
      } else if (f.spare) {
        ctx.fillStyle = '#ffffff';
        ctx.fillText('' + f.roll1, cx + cellW / 3, cardY + 20);
        ctx.fillStyle = '#44dd88';
        ctx.fillText('/', cx + cellW * 2 / 3, cardY + 20);
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.fillText('' + f.roll1, cx + cellW / 3, cardY + 20);
        if (f.roll2 >= 0) ctx.fillText('' + f.roll2, cx + cellW * 2 / 3, cardY + 20);
      }
    }

    if (f.total > 0) {
      ctx.fillStyle = '#888';
      ctx.font = '6px monospace';
      var runTotal = 0;
      for (var rt = 0; rt <= i; rt++) runTotal += frameScores[rt].total;
      ctx.fillText('' + runTotal, cx + cellW / 2, cardY + cardH - 2);
    }
  }
}

// === LEAGUE SEASON WRAPPER ===
let league = null;

  { name: 'Spore Rollers', abbr: 'SPR', color: '#44dd88', skill: 6 },
  { name: 'Fungal Strikers', abbr: 'FNG', color: '#aa44cc', skill: 7 },
  { name: 'Reactor Pins', abbr: 'RCT', color: '#44aaff', skill: 5 },
  { name: 'Poop Gutters', abbr: 'PPD', color: '#aa6622', skill: 4 },

  { name: 'Mycelium Mashers', abbr: 'MYC', color: '#88ff44', skill: 6 }
];

function simulateOpponentScore(skill) {
  // Simulate a full 10-frame bowling game for AI opponent
  var score = 0;
  for (var f = 0; f < 10; f++) {
    var r1 = Math.min(10, Math.floor(Math.random() * (skill + 4)));
    if (r1 === 10) {
      score += 10 + Math.min(10, Math.floor(Math.random() * (skill + 2))) + Math.min(10, Math.floor(Math.random() * (skill + 1)));
    } else {
      var r2 = Math.min(10 - r1, Math.floor(Math.random() * (skill + 2)));
      if (r1 + r2 === 10) {
        score += 10 + Math.min(10, Math.floor(Math.random() * (skill + 1)));
      } else {
        score += r1 + r2;
      }
    }
  }
  return Math.min(300, score);
}

// === NES-STYLE PIXEL MUSHROOM DECORATIONS ===
function drawPixelMushroom(x, y, scale, capColor) {
  var s = scale || 1;
  var cc = capColor || '#dd4444';
  // Stem
  ctx.fillStyle = '#ccbb99';
  ctx.fillRect(x - 2 * s, y, 4 * s, 5 * s);
  // Cap
  ctx.fillStyle = cc;
  ctx.fillRect(x - 4 * s, y - 2 * s, 8 * s, 3 * s);
  ctx.fillRect(x - 3 * s, y - 4 * s, 6 * s, 2 * s);
  // Spots
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x - 2 * s, y - 3 * s, 2 * s, 1 * s);
  ctx.fillRect(x + 1 * s, y - 2 * s, 1 * s, 1 * s);
}

function drawPixelTree(x, y, scale) {
  var s = scale || 1;
  // Trunk
  ctx.fillStyle = '#664422';
  ctx.fillRect(x - 1 * s, y, 2 * s, 6 * s);
  // Canopy
  ctx.fillStyle = '#227744';
  ctx.fillRect(x - 4 * s, y - 3 * s, 8 * s, 4 * s);
  ctx.fillRect(x - 3 * s, y - 5 * s, 6 * s, 2 * s);
  ctx.fillRect(x - 2 * s, y - 6 * s, 4 * s, 1 * s);
}

function drawPixelCrystal(x, y, scale, color) {
  var s = scale || 1;
  var c = color || '#66ddff';
  ctx.fillStyle = c;
  ctx.fillRect(x - 1 * s, y - 6 * s, 2 * s, 6 * s);
  ctx.fillRect(x - 2 * s, y - 4 * s, 4 * s, 3 * s);
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(x - 1 * s, y - 5 * s, 1 * s, 2 * s);
}

// === ALLEY ZONE BACKGROUND DECORATIONS (PASS 3) ===
function drawZoneDecorations(zone, zoneIdx) {
  if (zoneIdx === 0) {
    // Mycelium Lanes: mushrooms and roots
    for (var i = 0; i < 5; i++) {
      drawPixelMushroom(20 + i * 25, 80 + Math.sin(i * 1.5) * 20, 1.5, '#dd4444');
      drawPixelMushroom(GW - 20 - i * 25, 100 + Math.cos(i * 1.2) * 15, 1.2, '#ffaa44');
    }
    // Mycelium threads
    ctx.strokeStyle = 'rgba(68,221,136,0.12)';
    ctx.lineWidth = 1;
    for (var r = 0; r < 6; r++) {
      ctx.beginPath();
      ctx.moveTo(0, 50 + r * 50);
      for (var seg = 0; seg < 8; seg++) {
        ctx.lineTo(seg * 18, 50 + r * 50 + Math.sin(frame * 0.01 + r + seg) * 8);
      }
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(GW, 70 + r * 45);
      for (var seg2 = 0; seg2 < 8; seg2++) {
        ctx.lineTo(GW - seg2 * 18, 70 + r * 45 + Math.cos(frame * 0.012 + r + seg2) * 7);
      }
      ctx.stroke();
    }
  } else if (zoneIdx === 1) {
    // Spore Cavern: stalactites and glowing spores
    for (var st = 0; st < 8; st++) {
      var stx = 15 + st * 60;
      var stLen = 15 + Math.sin(st * 2.3) * 8;
      ctx.fillStyle = '#333355';
      ctx.beginPath();
      ctx.moveTo(stx - 4, 0);
      ctx.lineTo(stx + 4, 0);
      ctx.lineTo(stx, stLen);
      ctx.fill();
    }
    // Floating spores
    for (var sp = 0; sp < 12; sp++) {
      var spx = (frame * 0.15 * (sp % 3 + 1) + sp * 41) % GW;
      var spy = (frame * 0.08 + sp * 27 + Math.sin(frame * 0.02 + sp) * 15) % GH;
      var spAlpha = 0.15 + Math.sin(frame * 0.04 + sp) * 0.1;
      ctx.fillStyle = 'rgba(170,68,204,' + spAlpha + ')';
      ctx.beginPath();
      ctx.arc(spx, spy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (zoneIdx === 2) {
    // Reactor Core: glowing pipes and energy arcs
    ctx.strokeStyle = 'rgba(68,170,255,0.15)';
    ctx.lineWidth = 2;
    // Horizontal pipes
    for (var pipe = 0; pipe < 4; pipe++) {
      var py2 = 30 + pipe * 75;
      ctx.beginPath();
      ctx.moveTo(0, py2);
      ctx.lineTo(LANE_LEFT - 15, py2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(LANE_RIGHT + 15, py2);
      ctx.lineTo(GW, py2);
      ctx.stroke();
      // Energy nodes
      var pulseR = 3 + Math.sin(frame * 0.06 + pipe) * 1.5;
      ctx.fillStyle = 'rgba(68,170,255,0.3)';
      ctx.beginPath();
      ctx.arc(LANE_LEFT - 18, py2, pulseR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(LANE_RIGHT + 18, py2, pulseR, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (zoneIdx === 3) {
    // Poop Pit: steam vents and brown puddles
    for (var pp = 0; pp < 6; pp++) {
      var ppx = 15 + pp * 75 + (pp > 3 ? 40 : 0);
      if (ppx > LANE_LEFT - 10 && ppx < LANE_RIGHT + 10) continue;
      // Puddle
      ctx.fillStyle = 'rgba(120,80,30,0.2)';
      ctx.beginPath();
      ctx.ellipse(ppx, GH - 20, 12, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Steam
      var steamAlpha = 0.1 + Math.sin(frame * 0.03 + pp) * 0.05;
      ctx.fillStyle = 'rgba(200,180,120,' + steamAlpha + ')';
      for (var sv = 0; sv < 3; sv++) {
        var svx = ppx + Math.sin(frame * 0.02 + pp + sv * 1.5) * 4;
        var svy = GH - 25 - sv * 8 - (frame * 0.3 + pp * 10) % 20;
        ctx.beginPath();
        ctx.arc(svx, svy, 2 + sv, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (zoneIdx === 4) {
    // Crystal Grove: crystal formations and prismatic light
    for (var cr = 0; cr < 6; cr++) {
      var crx = 15 + cr * 80;
      if (crx > LANE_LEFT - 15 && crx < LANE_RIGHT + 15) continue;
      var crColor = ['#66ddff', '#ff66dd', '#66ffdd', '#ddff66'][cr % 4];
      drawPixelCrystal(crx, GH - 15, 1.5, crColor);
    }
    // Prismatic light beams
    ctx.globalAlpha = 0.04;
    for (var beam = 0; beam < 3; beam++) {
      var bx = 50 + beam * 180;
      var bAngle = Math.sin(frame * 0.008 + beam) * 0.2;
      ctx.save();
      ctx.translate(bx, 0);
      ctx.rotate(bAngle);
      var bGrad = ctx.createLinearGradient(0, 0, 0, GH);
      bGrad.addColorStop(0, '#ffffff');
      bGrad.addColorStop(0.5, ['#ff4488', '#44ff88', '#4488ff'][beam]);
      bGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = bGrad;
      ctx.fillRect(-8, 0, 16, GH);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }
}

// === ENHANCED PLAYING DRAW (insert zone decorations) ===
var _originalDrawPlaying = drawPlaying;
drawPlaying = function() {
  var zone = ALLEY_ZONES[currentZone];

  ctx.save();
  applyShake();

  // Background
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, zone.bg1);
  grad.addColorStop(1, zone.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Background spore particles
  for (var s = 0; s < 8; s++) {
    var sx = (frame * 0.2 + s * 60) % GW;
    var sy = (Math.sin(frame * 0.01 + s * 2) * 20 + 50 + s * 35) % GH;
    ctx.fillStyle = 'rgba(' + hexToRgb(zone.accent) + ',0.15)';
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Zone-specific decorations
  drawZoneDecorations(zone, currentZone);

  // Draw lane
  drawLane(zone);

  // Draw hazards
  drawHazards();

  // Draw pins
  drawPins();

  // Draw ball trail
  if (ball) {
    for (var t = 0; t < ball.trail.length; t++) {
      var tr = ball.trail[t];
      var alpha = 1 - tr.age * 3;
      if (alpha > 0) {
        ctx.fillStyle = 'rgba(' + hexToRgb(zone.accent) + ',' + (alpha * 0.3) + ')';
        ctx.beginPath();
        ctx.arc(tr.x, tr.y, BALL_RADIUS * (1 - tr.age * 2), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Draw ball
  if (ball && ball.active) {
    drawBowlingBall(ball.x, ball.y, ball.trickIdx);
  }

  // Draw baseling bowler during aim/power/spin
  if (rollPhase === 'aim' || rollPhase === 'power' || rollPhase === 'spin') {
    var bowlerX = (LANE_LEFT + LANE_RIGHT) / 2;
    var bowlerY = FOUL_LINE_Y + 25;
    drawBaseling(bowlerX, bowlerY, 14, aimAngle > 0 ? 1 : -1);
    if (rollPhase !== 'rolling') {
      drawBowlingBall(bowlerX + 8, bowlerY + 2, selectedTrick);
    }
  }

  // Draw aim arrow
  if (rollPhase === 'aim') {
    drawAimArrow((LANE_LEFT + LANE_RIGHT) / 2, FOUL_LINE_Y, aimAngle, 80);
  }

  // Draw power meter
  if (rollPhase === 'power') {
    drawPowerMeterUI(LANE_RIGHT + 15, LANE_TOP + 40, 20, 200, powerMeter);
  }

  // Draw spin meter
  if (rollPhase === 'spin') {
    drawSpinMeterUI(LANE_LEFT - 50, GH / 2 - 10, 30, 20, spinMeter);
  }

  // Particles
  drawParticles();
  TAS.particles.draw();

  ctx.restore();

  // Flash effect
  drawFlash();

  // HUD
  drawHUD(zone);

  // Score popups
  drawScorePopups();

  // Boss frame overlay
  if (bossFrame && rollPhase === 'aim' && currentRoll === 1) {
    drawBossIntro();
  }

  // Trick shot display
  if (selectedTrick >= 0 && rollPhase === 'aim') {
    drawTrickShotInfo();
  }

  // Zone name on transition
  if (currentRoll === 1 && rollPhase === 'aim' && settleTimer <= 0) {
    var zoneFlash = Math.max(0, 60 - (frame % 300));
    if (zoneFlash > 0 && (frame % 300) < 60) {
      ctx.globalAlpha = zoneFlash / 60;
      ctx.fillStyle = zone.accent;
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(zone.name, GW / 2, GH - 50);
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      ctx.fillText(zone.desc, GW / 2, GH - 38);
      ctx.globalAlpha = 1;
    }
  }

  // Consecutive strike fire effect
  if (consecutiveStrikes >= 2) {
    var fireAlpha = 0.1 + Math.sin(frame * 0.1) * 0.05;
    ctx.fillStyle = 'rgba(255,100,0,' + fireAlpha + ')';
    ctx.fillRect(LANE_LEFT, LANE_BOTTOM - 10, LANE_WIDTH, 10);
    ctx.fillStyle = '#ffcc00';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STREAK: ' + consecutiveStrikes, GW / 2, LANE_BOTTOM + 8);
  }

  // Stat summary during score reveal
  drawStatSummary();

  // Zone transition overlay
  drawZoneTransition();
};

// === FRAME TRANSITION ANIMATION ===
let transitionTimer = 0;
let transitionZoneFrom = 0;
let transitionZoneTo = 0;
let showingTransition = false;

function startZoneTransition(fromZ, toZ) {
  if (fromZ !== toZ) {
    showingTransition = true;
    transitionTimer = 45;
    transitionZoneFrom = fromZ;
    transitionZoneTo = toZ;
  }
}

function drawZoneTransition() {
  if (!showingTransition) return;
  transitionTimer--;
  if (transitionTimer <= 0) {
    showingTransition = false;
    return;
  }
  var alpha = transitionTimer / 45;
  ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
  ctx.fillRect(0, 0, GW, GH);

  var zone = ALLEY_ZONES[transitionZoneTo];
  ctx.fillStyle = zone.accent;
  ctx.globalAlpha = 1 - alpha;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(zone.name, GW / 2, GH / 2 - 10);
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText(zone.desc, GW / 2, GH / 2 + 10);
  ctx.globalAlpha = 1;
}

// === STAT SUMMARY PANEL (shown during score phase) ===
function drawStatSummary() {
  if (rollPhase !== 'score') return;
  var panelX = 10;
  var panelY = LANE_TOP + 5;
  var panelW = 115;
  var panelH = 85;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(panelX, panelY, panelW, panelH);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelW, panelH);

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('STAT BONUSES', panelX + 4, panelY + 10);

  var stats = [
    { label: 'STR (Power)', val: STR_MULT, color: '#ff4444' },
    { label: 'DEX (Aim)', val: DEX_MULT, color: '#44ff44' },
    { label: 'CON (Stamina)', val: CON_MULT, color: '#ffaa44' },
    { label: 'INT (Score)', val: INT_MULT, color: '#4488ff' },
    { label: 'WIS (Timing)', val: WIS_MULT, color: '#aa44ff' },
    { label: 'CHA (Luck)', val: CHA_MULT, color: '#ff44aa' }
  ];

  for (var i = 0; i < stats.length; i++) {
    var sy = panelY + 20 + i * 10;
    ctx.fillStyle = stats[i].color;
    ctx.font = '7px monospace';
    ctx.fillText(stats[i].label, panelX + 4, sy);
    // Bar
    var barW = Math.min(30, stats[i].val * 20);
    ctx.fillRect(panelX + 75, sy - 5, barW, 4);
    ctx.fillStyle = '#888';
    ctx.fillText('x' + stats[i].val.toFixed(1), panelX + 75 + barW + 2, sy);
  }
}

// === PERFECT GAME DETECTION ===
function checkPerfectGame() {
  if (currentFrame < 10) return false;
  for (var i = 0; i < 10; i++) {
    if (!frameScores[i].strike) return false;
  }
  return true;
}

// === ENHANCED GAME OVER with perfect game detection ===
var _originalDrawGameOver = drawGameOver;
drawGameOver = function() {
  _originalDrawGameOver();

  if (checkPerfectGame()) {
    // Perfect game celebration
    var glow = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(255,204,0,' + glow + ')';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PERFECT GAME! 300!', GW / 2, 175);
    // Extra confetti
    for (var i = 0; i < 15; i++) {
      var px = (frame * 2.1 + i * 33) % GW;
      var py = (frame * 1.2 + i * 21) % GH;
      ctx.fillStyle = ['#ffcc00', '#ff4488', '#44ffaa'][i % 3];
      ctx.fillRect(px, py, 4, 4);
    }
  }

  // Draw stat summary on game over
  var panelX = GW / 2 - 100;
  var panelY2 = 273;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(panelX, panelY2, 200, 12);
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.name + ' Lv.' + statB.level + ' | Bosses: ' + bossDefeated + ' | Stamina used: ' + Math.round(maxStamina - stamina), GW / 2, panelY2 + 9);
};

// === START ===
TAS.loop.start(update, draw);

})();
</script>
