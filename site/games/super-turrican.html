<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Turrican</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// ============================================================
// BASELING STAT BLOCK (from NftLoader)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// ============================================================
// STAT HELPERS — derive gameplay values from D&D stats
// ============================================================
function statMod(val) { return Math.floor((val - 10) / 2); }
function strDamage() { return statB.damage + Math.max(0, statMod(statB.str)); }
function dexSpeed() { return statB.speed * (1 + statMod(statB.dex) * 0.06); }
function conHP() { return Math.floor(statB.hpMult * (8 + Math.max(0, statMod(statB.con)) * 2)); }
function conLives() { return 3 + statB.lives + Math.max(0, Math.floor(statMod(statB.con) / 3)); }
function intWeaponBonus() { return Math.max(0, Math.floor(statMod(statB.int) / 2)); }
function intLaserRange() { return 1 + statMod(statB.int) * 0.08; }
function wisComboDecay() { return Math.max(60, 120 - statMod(statB.wis) * 8); }
function wisSecretReveal() { return 50 + statMod(statB.wis) * 15; }
function chaScoreMult() { return statB.scoreMult * (1 + Math.max(0, statMod(statB.cha)) * 0.1); }
function chaPickupRadius() { return 12 + Math.max(0, statMod(statB.cha)) * 4; }
function dexFireRate() { return Math.max(0.4, statB.cooldown - statMod(statB.dex) * 0.05); }
function dexIframes() { return Math.max(40, 90 - statMod(statB.dex) * 4); }
function strGroundPound() { return 500 + Math.max(0, statMod(statB.str)) * 30; }
function luckCritChance() { return 0.05 + statB.luck * 0.03; }
function conDefense() { return Math.max(0, Math.floor(statMod(statB.con) / 3)); }

// === BASELING PLAYER MODULE (TAS bridge) ===
// All the stat helpers above read statB live, so synthesizing statB from the
// clamped getMults() is the whole migration — every gameplay number traces to it.
var picking = false; // character-select overlay open
function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  statB.lives = 0; statB.scoreMult = 1; statB.cooldown = 1;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel && sel.charName) statB.name = sel.charName;
}
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[super-turrican] player init failed:', e && e.message); });
}

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
const TILE = 16;
const COLS = 30, ROWS = 20;
const HUD_H = 28;
const GRAVITY = 1400;
const JUMP_VEL = -420;
const BASE_SPEED = 150;
const MAX_BOMBS = 3;
const IFRAMES_BASE = 90;
const STAGE_COUNT = 6;

const STAGE_NAMES = [
  'Mycelium Meadows',
  'Spore Caverns',
  'Compost Reactor',
  'Garden Hive',
  'Canopy Fortress',
  'Void Blight'
];

const STAGE_COLORS = [
  { bg: '#1a1c2c', tile: '#2a5e2a', accent: '#38d973', fog: 'rgba(56,217,115,0.04)' },
  { bg: '#1a1c2c', tile: '#3c5a7a', accent: '#3cacd7', fog: 'rgba(60,172,215,0.05)' },
  { bg: '#1a1c2c', tile: '#7a444a', accent: '#e6482e', fog: 'rgba(230,72,46,0.04)' },
  { bg: '#1a1c2c', tile: '#3a6644', accent: '#38d973', fog: 'rgba(56,217,115,0.05)' },
  { bg: '#1a1c2c', tile: '#6a5a30', accent: '#f4b41b', fog: 'rgba(244,180,27,0.04)' },
  { bg: '#1a1c2c', tile: '#5a3080', accent: '#a855f7', fog: 'rgba(168,85,247,0.05)' }
];

const STAGE_LORE = [
  'The mycelium network hums beneath Tasern...',
  'Spore crystals pulse deep in the fungal dark...',
  'The compost reactor churns with POOP fuel...',
  'Mech gardens bloom with corrupted yield flowers...',
  'Fungal machines patrol the canopy towers...',
  'The Void Blight devours all living spores...'
];

const WEAPON_NAMES = ['SPORE SHOT', 'MYCELIUM LASER', 'GARDEN SEED'];

// Parallax star layers
const STAR_LAYERS = [[], [], []];
for (let layer = 0; layer < 3; layer++) {
  for (let i = 0; i < 30 + layer * 15; i++) {
    STAR_LAYERS[layer].push({
      x: Math.random() * 960,
      y: Math.random() * 640,
      size: 1 + Math.random() * (layer === 2 ? 2 : 1),
      bright: 0.3 + Math.random() * 0.5
    });
  }
}

// ============================================================
// INIT
// ============================================================
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'FIRE', c: 'PICK' } });

// ============================================================
// SCORE POPUP SYSTEM
// ============================================================
let scorePopups = [];

function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#ffdd44', life: 60, vy: -1.2 });
}

function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// TUTORIAL SYSTEM
// ============================================================
let tutorialStep = 0;
let tutorialTimer = 0;
let tutorialShown = false;
const TUTORIAL_STEPS = [
  { text: 'ARROWS / D-PAD: Move', duration: 180 },
  { text: 'A / Z / SPACE: Jump', duration: 150 },
  { text: 'B / X: Fire Weapon', duration: 150 },
  { text: 'SELECT / C: Switch Weapon', duration: 150 },
  { text: 'START / Q: Smart Bomb', duration: 150 },
  { text: 'DOWN x2: Morph Ball | DOWN (air): Slam', duration: 180 },
  { text: 'UP+FIRE (air): Grapple Beam', duration: 180 },
  { text: 'Explore the spore network! WIS reveals secrets...', duration: 200 }
];

function updateTutorial() {
  if (tutorialShown || stage > 0) return;
  tutorialTimer++;
  if (tutorialTimer >= TUTORIAL_STEPS[tutorialStep].duration) {
    tutorialTimer = 0;
    tutorialStep++;
    if (tutorialStep >= TUTORIAL_STEPS.length) {
      tutorialShown = true;
    }
  }
}

function drawTutorial() {
  if (tutorialShown || stage > 0) return;
  if (tutorialStep >= TUTORIAL_STEPS.length) return;
  var step = TUTORIAL_STEPS[tutorialStep];
  var alpha = 1;
  if (tutorialTimer < 20) alpha = tutorialTimer / 20;
  else if (tutorialTimer > step.duration - 30) alpha = (step.duration - tutorialTimer) / 30;
  alpha = Math.max(0, Math.min(1, alpha));

  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  var tw = ctx.measureText(step.text).width + 30 || 220;
  ctx.fillRect(GW / 2 - tw / 2 - 5, GH - 62, tw + 10, 22);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(step.text, GW / 2, GH - 46);
  ctx.restore();
}

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('spore_turrican_hi');
let lives = 3;
let stage = 0;
let frame = 0;

// Player state
let px, py, pvx, pvy;
let pFacing; // 1=right, -1=left
let grounded, onPlatform;
let hp, maxHP, iframes;
let weapon, weaponLevel;
let bombs;
let morphBall, morphTimer;
let grapple, grappleX, grappleY, grappleLen, grappleAngle, grappleVel;
let groundPound;
let fireTimer, laserActive;
let combo, comboTimer;
let downTapTimer, downTapCount;

// Level
let tiles;
let levelW, levelH;
let camX, camY;
let enemies, bullets, eBullets, pickups, mines;
let boss, miniBoss, bossActive;
let stageComplete, stageTransition, deathTimer;
let exitX, exitY;

// Environment
let envParticles = [];
let ambientTimer = 0;

// ============================================================
// LEVEL GENERATION
// ============================================================
function generateStage(stageNum) {
  levelW = 90 + stageNum * 15;
  levelH = 50 + stageNum * 5;
  tiles = [];
  enemies = [];
  bullets = [];
  eBullets = [];
  pickups = [];
  mines = [];
  scorePopups = [];
  envParticles = [];
  boss = null;
  miniBoss = null;
  bossActive = false;
  stageComplete = false;
  stageTransition = 0;
  deathTimer = 0;
  ambientTimer = 0;

  for (let c = 0; c < levelW; c++) {
    tiles[c] = [];
    for (let r = 0; r < levelH; r++) {
      tiles[c][r] = 0;
    }
  }

  // Floor and ceiling
  for (let c = 0; c < levelW; c++) {
    tiles[c][0] = 1;
    tiles[c][1] = 1;
    tiles[c][levelH - 1] = 1;
    tiles[c][levelH - 2] = 1;
  }

  // Walls on sides
  for (let r = 0; r < levelH; r++) {
    tiles[0][r] = 1;
    tiles[1][r] = 1;
    tiles[levelW - 1][r] = 1;
    tiles[levelW - 2][r] = 1;
  }

  // Generate terrain sections
  var sections = 6 + stageNum * 2;
  var sectionW = Math.floor((levelW - 4) / sections);

  for (let s = 0; s < sections; s++) {
    var sx = 3 + s * sectionW;
    var sType = TAS.math.randInt(0, 5);

    switch (sType) {
      case 0: generatePlatformSection(sx, sectionW); break;
      case 1: generateShaftSection(sx, sectionW); break;
      case 2: generateCavernSection(sx, sectionW); break;
      case 3: generateCorridorSection(sx, sectionW); break;
      case 4: generatePillarSection(sx, sectionW); break;
      case 5: generateSecretSection(sx, sectionW); break;
    }

    // Scatter hazards based on stage
    if (stageNum >= 1) {
      placeHazards(sx, sectionW, stageNum);
    }

    spawnSectionEnemies(sx, sectionW, stageNum, s);
  }

  // Mini-boss at midpoint
  var midX = Math.floor(levelW / 2) * TILE;
  var midY = Math.floor(levelH / 2) * TILE;
  miniBoss = createMiniBoss(midX, midY, stageNum);

  // Boss room at end
  createBossRoom(stageNum);

  // Place exit
  exitX = (levelW - 5) * TILE;
  exitY = (levelH - 5) * TILE;

  // Scatter pickups — WIS affects secret detection (more pickups revealed)
  var pickupCount = 15 + stageNum * 3 + Math.max(0, statMod(statB.wis));
  for (let i = 0; i < pickupCount; i++) {
    var pc = TAS.math.randInt(4, levelW - 4);
    var pr = TAS.math.randInt(4, levelH - 4);
    if (tiles[pc][pr] === 0 && tiles[pc][pr + 1] !== 0) {
      var roll = Math.random();
      var type = roll < 0.3 ? 'spore_crystal' : roll < 0.5 ? 'mycelium_orb' : roll < 0.65 ? 'healing_moss' : roll < 0.8 ? 'bomb_cap' : 'life_fungus';
      pickups.push({ x: pc * TILE + 4, y: pr * TILE + 4, w: 8, h: 8, type: type, alive: true });
    }
  }

  // Player start
  px = 4 * TILE;
  py = (levelH - 5) * TILE;
  pvx = 0;
  pvy = 0;
  pFacing = 1;
  camX = 0;
  camY = (levelH * TILE) - GH;
}

function placeHazards(sx, w, stageNum) {
  var count = 1 + Math.floor(stageNum / 2);
  for (let i = 0; i < count; i++) {
    var hx = sx + TAS.math.randInt(2, w - 2);
    var hy = levelH - 3;
    if (hx < levelW - 2 && tiles[hx][hy] === 0) {
      tiles[hx][hy] = 4;
      if (hx + 1 < levelW - 2) tiles[hx + 1][hy] = 4;
    }
  }
}

function generatePlatformSection(sx, w) {
  for (let i = 0; i < 5; i++) {
    var platX = sx + TAS.math.randInt(1, w - 6);
    var platY = TAS.math.randInt(5, levelH - 8);
    var platLen = TAS.math.randInt(3, 7);
    for (let j = 0; j < platLen && platX + j < levelW - 2; j++) {
      tiles[platX + j][platY] = 3;
    }
  }
  var groundY = levelH - 4;
  for (let c = sx; c < sx + w && c < levelW - 2; c++) {
    if (Math.random() > 0.3) tiles[c][groundY] = 1;
  }
}

function generateShaftSection(sx, w) {
  var shaftX = sx + Math.floor(w / 2) - 2;
  for (let r = 4; r < levelH - 4; r++) {
    for (let c = shaftX; c < shaftX + 4 && c < levelW - 2; c++) {
      tiles[c][r] = 0;
    }
  }
  for (let r = 6; r < levelH - 6; r += 4) {
    var side = (r % 8 < 4) ? shaftX : shaftX + 2;
    tiles[side][r] = 3;
    tiles[side + 1][r] = 3;
  }
  for (let r = 4; r < levelH - 4; r++) {
    if (shaftX - 1 >= 0) tiles[shaftX - 1][r] = 1;
    if (shaftX + 4 < levelW) tiles[shaftX + 4][r] = 1;
  }
}

function generateCavernSection(sx, w) {
  var floorH = levelH - 5;
  var ceilH = 4;
  for (let c = sx; c < sx + w && c < levelW - 2; c++) {
    floorH += TAS.math.randInt(-1, 1);
    floorH = TAS.math.clamp(floorH, levelH - 10, levelH - 3);
    ceilH += TAS.math.randInt(-1, 1);
    ceilH = TAS.math.clamp(ceilH, 3, 10);
    for (let r = floorH; r < levelH - 2; r++) tiles[c][r] = 1;
    for (let r = 2; r < ceilH; r++) tiles[c][r] = 1;
  }
}

function generateCorridorSection(sx, w) {
  var corridors = [Math.floor(levelH * 0.3), Math.floor(levelH * 0.5), Math.floor(levelH * 0.7)];
  for (var ci = 0; ci < corridors.length; ci++) {
    var cy = corridors[ci];
    for (let c = sx; c < sx + w && c < levelW - 2; c++) {
      tiles[c][cy] = 1;
      tiles[c][cy + 3] = 1;
    }
    var gapX = sx + TAS.math.randInt(2, w - 4);
    for (let g = 0; g < 3; g++) {
      if (gapX + g < levelW) tiles[gapX + g][cy] = 0;
    }
  }
  var bx = sx + Math.floor(w / 2);
  for (let r = corridors[0]; r < corridors[2] + 4 && r < levelH; r++) {
    if (bx < levelW) tiles[bx][r] = 2;
  }
}

function generatePillarSection(sx, w) {
  var groundY = levelH - 4;
  for (let c = sx; c < sx + w && c < levelW - 2; c++) {
    tiles[c][groundY] = 1;
  }
  for (let i = 0; i < 4; i++) {
    var pillarX = sx + 2 + i * Math.floor(w / 4);
    if (pillarX >= levelW - 2) continue;
    var pillarH = TAS.math.randInt(4, 10);
    for (let r = groundY - pillarH; r < groundY; r++) {
      if (r >= 0) tiles[pillarX][r] = 1;
    }
  }
}

function generateSecretSection(sx, w) {
  var groundY = levelH - 4;
  for (let c = sx; c < sx + w && c < levelW - 2; c++) {
    tiles[c][groundY] = 1;
  }
  var roomX = sx + 2;
  var roomY = groundY - 6;
  for (let c = roomX; c < roomX + 5 && c < levelW - 2; c++) {
    for (let r = roomY; r < roomY + 5 && r < levelH; r++) {
      if (c === roomX || c === roomX + 4 || r === roomY || r === roomY + 4) {
        tiles[c][r] = (c === roomX + 4) ? 5 : 1;
      } else {
        tiles[c][r] = 0;
      }
    }
  }
  pickups.push({ x: (roomX + 2) * TILE + 4, y: (roomY + 2) * TILE + 4, w: 8, h: 8, type: 'life_fungus', alive: true });
}

// ============================================================
// SPORE ENEMIES
// ============================================================
function spawnSectionEnemies(sx, w, stageNum, section) {
  var count = 3 + stageNum;
  for (let i = 0; i < count; i++) {
    var ec = sx + TAS.math.randInt(2, w - 2);
    var er = TAS.math.randInt(5, levelH - 6);
    if (ec >= levelW - 2) continue;
    if (tiles[ec][er] !== 0) continue;

    var types = ['sporecrawler', 'gloomcap', 'mycelium_turret', 'shield_fungus', 'tunnelworm', 'bloom_bomber'];
    var typeIdx = TAS.math.randInt(0, Math.min(stageNum + 2, 5));
    enemies.push(createEnemy(ec * TILE, er * TILE, types[typeIdx], stageNum));
  }
}

function createEnemy(x, y, type, difficulty) {
  var baseHP = {
    sporecrawler: 2, gloomcap: 1, mycelium_turret: 4,
    shield_fungus: 5, tunnelworm: 3, bloom_bomber: 2
  };
  return {
    x: x, y: y, w: 14, h: 14, type: type,
    hp: (baseHP[type] || 2) + difficulty,
    maxHp: (baseHP[type] || 2) + difficulty,
    vx: type === 'sporecrawler' ? (Math.random() > 0.5 ? 1 : -1) * 40 : 0,
    vy: type === 'gloomcap' ? -20 + Math.random() * 10 : 0,
    alive: true, timer: 0, dir: 1,
    shielded: type === 'shield_fungus',
    phase: 0
  };
}

function createMiniBoss(x, y, stageNum) {
  var names = ['Mold Mech', 'Spore Walker', 'Toxic Turret', 'Fungi Tank', 'Canopy Sentinel', 'Blight Herald'];
  return {
    x: x, y: y, w: 32, h: 32,
    hp: 20 + stageNum * 8,
    maxHp: 20 + stageNum * 8,
    alive: true, timer: 0, phase: 0,
    type: 'miniboss', vx: 0, vy: 0,
    bossName: names[stageNum] || 'Guardian'
  };
}

function createBossRoom(stageNum) {
  var bx = levelW - 15;
  var by = Math.floor(levelH / 2) - 5;
  for (let c = bx; c < levelW - 2; c++) {
    for (let r = by; r < by + 10 && r < levelH - 2; r++) {
      tiles[c][r] = 0;
    }
  }
  for (let c = bx; c < levelW - 2; c++) {
    tiles[c][by - 1] = 1;
    tiles[c][by + 10] = 1;
  }

  var bossNames = ['Rot Colossus', 'Spore Hydra', 'Compost Overlord', 'Queen Mycelia', 'Garden Engine', 'Void Maw'];
  boss = {
    x: (levelW - 7) * TILE, y: (by + 3) * TILE,
    w: 40, h: 48,
    hp: 40 + stageNum * 15,
    maxHp: 40 + stageNum * 15,
    alive: true, timer: 0, phase: 0,
    type: 'boss', vx: 0, vy: 0, pattern: 0,
    bossName: bossNames[stageNum] || 'Dark One'
  };
}

// ============================================================
// PLAYER MECHANICS
// ============================================================
function resetPlayer() {
  maxHP = conHP();
  hp = maxHP;
  iframes = 0;
  weapon = 0;
  weaponLevel = intWeaponBonus();
  bombs = MAX_BOMBS;
  morphBall = false;
  morphTimer = 0;
  grapple = false;
  grappleX = 0; grappleY = 0;
  groundPound = false;
  fireTimer = 0;
  laserActive = false;
  combo = 0;
  comboTimer = 0;
  downTapTimer = 0;
  downTapCount = 0;
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = conLives();
  stage = 0;
  combo = 0;
  comboTimer = 0;
  tutorialStep = 0;
  tutorialTimer = 0;
  tutorialShown = false;
  resetPlayer();
  generateStage(stage);
  TAS.particles.clear();
}

function nextStage() {
  stage++;
  if (stage >= STAGE_COUNT) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('spore_turrican_hi', highScore);
    }
    return;
  }
  resetPlayer();
  generateStage(stage);
  stageTransition = 180;
}

function addScore(points, x, y, color) {
  var final = Math.floor(points * chaScoreMult());
  score += final;
  if (x !== undefined && y !== undefined) {
    addScorePopup(x, y, '+' + final, color || '#ffdd44');
  }
}

function playerDie() {
  lives--;
  TAS.fx.shake(15, 0.8);
  TAS.fx.flash('#ff0000', 0.6);
  TAS.audio.playNoise(0.4, 0.15);
  TAS.particles.spawn(px + 8, py + 8, '#ff4444', 40, 5, { gravity: 0.1 });
  TAS.particles.spawn(px + 8, py + 8, statB.color, 20, 3, { gravity: 0.08 });
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('spore_turrican_hi', highScore);
    }
  } else {
    deathTimer = 90;
    resetPlayer();
    px = 4 * TILE;
    py = (levelH - 5) * TILE;
    pvx = 0; pvy = 0;
  }
}

// ============================================================
// COLLISION
// ============================================================
function tileAt(tx, ty) {
  if (tx < 0 || tx >= levelW || ty < 0 || ty >= levelH) return 1;
  return tiles[tx][ty];
}

function isSolid(tx, ty) {
  var t = tileAt(tx, ty);
  return t === 1 || t === 2 || t === 5;
}

function collidesWorld(x, y, w, h) {
  var left = Math.floor(x / TILE);
  var right = Math.floor((x + w - 1) / TILE);
  var top = Math.floor(y / TILE);
  var bottom = Math.floor((y + h - 1) / TILE);
  for (let c = left; c <= right; c++) {
    for (let r = top; r <= bottom; r++) {
      if (isSolid(c, r)) return true;
    }
  }
  return false;
}

function onPlatformCheck(x, y, w, h, vy) {
  if (vy < 0) return false;
  var bottom = Math.floor((y + h) / TILE);
  var left = Math.floor(x / TILE);
  var right = Math.floor((x + w - 1) / TILE);
  for (let c = left; c <= right; c++) {
    if (tileAt(c, bottom) === 3) {
      var platTop = bottom * TILE;
      if (y + h >= platTop && y + h <= platTop + 6) return true;
    }
  }
  return false;
}

// ============================================================
// WEAPONS — STR for damage, DEX for fire rate, INT for range/level
// ============================================================
function fireWeapon() {
  var bx = px + (pFacing > 0 ? 14 : -4);
  var by = py + (morphBall ? 6 : 7);

  switch (weapon) {
    case 0: fireSpread(bx, by); break;
    case 1: fireLaser(bx, by); break;
    case 2: fireBounce(bx, by); break;
  }
  TAS.audio.playTone(400 + weapon * 200, 0.08, 'square', 0.06, 200);
}

function fireSpread(bx, by) {
  var lvl = Math.min(2, weaponLevel);
  var angles = lvl === 0 ? [0] : lvl === 1 ? [-0.2, 0, 0.2] : [-0.3, -0.15, 0, 0.15, 0.3];
  var speed = 350;
  for (var ai = 0; ai < angles.length; ai++) {
    var a = angles[ai];
    bullets.push({
      x: bx, y: by, w: 6, h: 3,
      vx: Math.cos(a) * speed * pFacing,
      vy: Math.sin(a) * speed,
      type: 'spread', damage: strDamage() + lvl,
      life: 60, bounces: 0
    });
  }
}

function fireLaser(bx, by) {
  var lvl = Math.min(2, weaponLevel);
  var len = Math.floor((200 + lvl * 80) * intLaserRange());
  bullets.push({
    x: bx, y: by - 1, w: len, h: 3 + lvl * 2,
    vx: 0, vy: 0,
    type: 'laser', damage: strDamage() + lvl * 2 + 1,
    life: 3, bounces: 0, dir: pFacing
  });
}

function fireBounce(bx, by) {
  var lvl = Math.min(2, weaponLevel);
  var speed = 280;
  bullets.push({
    x: bx, y: by, w: 5, h: 5,
    vx: speed * pFacing,
    vy: -80 + Math.random() * 40,
    type: 'bounce', damage: strDamage() + lvl + 1,
    life: 180, bounces: 3 + lvl * 2
  });
}

function dropMine() {
  mines.push({
    x: px + 4, y: py + 12, w: 8, h: 6,
    timer: 120, damage: strDamage() + 4, alive: true
  });
  TAS.audio.playTone(150, 0.1, 'triangle', 0.05);
}

function useBomb() {
  if (bombs <= 0) return;
  bombs--;
  TAS.fx.flash('#ffff88', 0.8);
  TAS.fx.shake(16, 0.75);
  TAS.audio.playNoise(0.5, 0.2);
  // Screen-wide damage — STR boosts bomb damage
  var bombDmg = 50 + Math.max(0, statMod(statB.str)) * 5;
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var sx = e.x - camX;
    var sy = e.y - camY;
    if (sx > -50 && sx < GW + 50 && sy > -50 && sy < GH + 50) {
      e.hp -= bombDmg;
      if (e.hp <= 0) {
        e.alive = false;
        var pts = (50 + stage * 20) * getComboMultiplier();
        addScore(pts, e.x + 7, e.y, '#ff8844');
        addCombo();
        TAS.particles.spawn(e.x + 7, e.y + 7, '#ffaa00', 15, 3);
      }
    }
  }
  if (boss && boss.alive) {
    boss.hp -= Math.floor(bombDmg * 0.3);
    if (boss.hp <= 0) killBoss();
  }
  if (miniBoss && miniBoss.alive) {
    miniBoss.hp -= Math.floor(bombDmg * 0.3);
    if (miniBoss.hp <= 0) killMiniBoss();
  }
}

// ============================================================
// GRAPPLE BEAM
// ============================================================
function shootGrapple() {
  if (grapple) return;
  for (let i = 1; i < 15; i++) {
    var checkY = py - i * TILE;
    var checkTX = Math.floor((px + 8) / TILE);
    var checkTY = Math.floor(checkY / TILE);
    if (isSolid(checkTX, checkTY)) {
      grapple = true;
      grappleX = (checkTX + 0.5) * TILE;
      grappleY = (checkTY + 1) * TILE;
      grappleLen = py - grappleY;
      grappleAngle = -Math.PI / 2;
      grappleVel = pvx * 0.01;
      TAS.audio.playTone(600, 0.1, 'sawtooth', 0.05, 1200);
      return;
    }
  }
  TAS.audio.playTone(200, 0.05, 'square', 0.03);
}

// ============================================================
// COMBO SYSTEM — WIS extends combo window
// ============================================================
function addCombo() {
  combo++;
  comboTimer = wisComboDecay();
}

function getComboMultiplier() {
  if (combo < 3) return 1;
  if (combo < 6) return 2;
  if (combo < 10) return 3;
  if (combo < 20) return 5;
  return 10;
}

// ============================================================
// ENEMY AI — Spore-themed behaviors
// ============================================================
function updateEnemy(e, dt) {
  if (!e.alive) return;
  e.timer++;

  switch (e.type) {
    case 'sporecrawler':
      e.x += e.vx * dt;
      var belowC = Math.floor((e.x + 7) / TILE);
      var belowR = Math.floor((e.y + 16) / TILE);
      if (!isSolid(belowC, belowR) && tileAt(belowC, belowR) !== 3) {
        e.y += 120 * dt;
      }
      var frontC = Math.floor((e.x + (e.vx > 0 ? 14 : 0)) / TILE);
      var frontR = Math.floor((e.y + 7) / TILE);
      if (isSolid(frontC, frontR)) e.vx = -e.vx;
      // Spore trail
      if (e.timer % 15 === 0) {
        TAS.particles.spawn(e.x + 7, e.y + 12, '#88aa44', 1, 0.3, { size: 1 });
      }
      break;

    case 'gloomcap':
      e.x += Math.sin(e.timer * 0.03) * 30 * dt;
      e.y += e.vy * dt;
      if (e.timer % 90 === 0) {
        var dx = px - e.x, dy = py - e.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200) {
          eBullets.push({ x: e.x + 7, y: e.y + 14, vx: (dx / dist) * 100, vy: (dy / dist) * 100, life: 120 });
        }
      }
      if (e.y < 3 * TILE || e.y > (levelH - 4) * TILE) e.vy = -e.vy;
      // Glowing particles
      if (e.timer % 8 === 0) {
        TAS.particles.spawn(e.x + 7, e.y + 7, '#cc66ff', 1, 0.5, { size: 1.5 });
      }
      break;

    case 'mycelium_turret':
      if (e.timer % 60 === 0) {
        var dx = px - e.x, dy = py - e.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 250) {
          eBullets.push({ x: e.x + 7, y: e.y + 7, vx: (dx / dist) * 150, vy: (dy / dist) * 150, life: 90 });
          TAS.audio.playTone(180, 0.05, 'square', 0.02);
        }
      }
      break;

    case 'shield_fungus':
      var sdx = px - e.x;
      var sdy = py - e.y;
      var sdist = Math.sqrt(sdx * sdx + sdy * sdy);
      if (sdist < 200 && sdist > 30) {
        e.x += (sdx / sdist) * 30 * dt;
        e.y += (sdy / sdist) * 30 * dt;
      }
      e.shielded = (e.timer % 120) < 80;
      if (e.timer % 100 === 0 && sdist < 180) {
        eBullets.push({ x: e.x + 7, y: e.y + 7, vx: (sdx / sdist) * 120, vy: (sdy / sdist) * 120, life: 60 });
      }
      break;

    case 'tunnelworm':
      e.x += e.vx * dt;
      if (e.vx === 0) e.vx = 35;
      var mFront = Math.floor((e.x + (e.vx > 0 ? 14 : 0)) / TILE);
      var mRow = Math.floor((e.y + 7) / TILE);
      if (isSolid(mFront, mRow)) e.vx = -e.vx;
      if (e.timer % 80 === 0) {
        mines.push({ x: e.x + 4, y: e.y + 12, w: 8, h: 6, timer: 180, damage: 3, alive: true, enemy: true });
      }
      // Burrowing particles
      if (e.timer % 6 === 0) {
        TAS.particles.spawn(e.x + 7, e.y + 14, '#aa8844', 1, 0.4, { size: 1 });
      }
      break;

    case 'bloom_bomber':
      var bdx = px - e.x, bdy = py - e.y;
      var bdist = Math.sqrt(bdx * bdx + bdy * bdy);
      if (bdist > 20) {
        e.x += (bdx / bdist) * 80 * dt;
        e.y += (bdy / bdist) * 80 * dt;
      }
      // Pulsing glow
      if (e.timer % 4 === 0) {
        TAS.particles.spawn(e.x + 7, e.y + 7, '#ff6644', 1, 0.3, { size: 1 });
      }
      if (bdist < 25) {
        e.alive = false;
        TAS.particles.spawn(e.x + 7, e.y + 7, '#ff8800', 25, 5, { gravity: 0.05 });
        TAS.particles.spawn(e.x + 7, e.y + 7, '#ffcc00', 10, 3, { gravity: 0.03 });
        TAS.fx.shake(6, 0.85);
        TAS.audio.playNoise(0.25, 0.12);
        if (iframes <= 0) {
          var dmg = Math.max(1, 2 - conDefense());
          hp -= dmg;
          iframes = dexIframes();
          if (hp <= 0) playerDie();
        }
      }
      break;
  }
}

function updateMiniBoss(mb, dt) {
  if (!mb || !mb.alive) return;
  mb.timer++;

  mb.x += Math.sin(mb.timer * 0.02) * 60 * dt;
  mb.y += Math.cos(mb.timer * 0.015) * 40 * dt;

  if (mb.timer % 45 === 0) {
    var dx = px - mb.x, dy = py - mb.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 300) {
      for (let i = 0; i < 3; i++) {
        var angle = Math.atan2(dy, dx) + (i - 1) * 0.3;
        eBullets.push({
          x: mb.x + 16, y: mb.y + 16,
          vx: Math.cos(angle) * 130,
          vy: Math.sin(angle) * 130,
          life: 90
        });
      }
      TAS.audio.playTone(120, 0.1, 'sawtooth', 0.04);
    }
  }

  // Aura particles
  if (mb.timer % 10 === 0) {
    var ang = Math.random() * Math.PI * 2;
    TAS.particles.spawn(
      mb.x + 16 + Math.cos(ang) * 18,
      mb.y + 16 + Math.sin(ang) * 18,
      STAGE_COLORS[stage].accent, 1, 1, { size: 2 }
    );
  }
}

function updateBoss(b, dt) {
  if (!b || !b.alive) return;
  b.timer++;

  var cx = (levelW - 7) * TILE;
  var cy = Math.floor(levelH / 2) * TILE;
  b.x = cx + Math.sin(b.timer * 0.015) * 40;
  b.y = cy + Math.cos(b.timer * 0.02) * 60;

  var hpRatio = b.hp / b.maxHp;
  var fireRate = hpRatio > 0.5 ? 40 : 20;

  if (b.timer % fireRate === 0) {
    var dx = px - b.x, dy = py - b.y;
    var angle = Math.atan2(dy, dx);

    if (b.pattern === 0) {
      for (let i = -2; i <= 2; i++) {
        eBullets.push({
          x: b.x + 20, y: b.y + 24,
          vx: Math.cos(angle + i * 0.25) * 140,
          vy: Math.sin(angle + i * 0.25) * 140,
          life: 120
        });
      }
    } else if (b.pattern === 1) {
      for (let i = 0; i < 8; i++) {
        var a = (i / 8) * Math.PI * 2;
        eBullets.push({
          x: b.x + 20, y: b.y + 24,
          vx: Math.cos(a) * 100,
          vy: Math.sin(a) * 100,
          life: 90
        });
      }
    } else {
      for (let i = 0; i < 4; i++) {
        (function(idx) {
          setTimeout(function() {
            if (!b.alive) return;
            var dx2 = px - b.x, dy2 = py - b.y;
            var a2 = Math.atan2(dy2, dx2);
            eBullets.push({
              x: b.x + 20, y: b.y + 24,
              vx: Math.cos(a2) * 170,
              vy: Math.sin(a2) * 170,
              life: 100
            });
          }, idx * 100);
        })(i);
      }
    }
    TAS.audio.playTone(80, 0.15, 'sawtooth', 0.05);
  }

  if (b.timer % 180 === 0) {
    b.pattern = (b.pattern + 1) % 3;
  }

  // Boss aura particles
  if (b.timer % 5 === 0) {
    var ang = Math.random() * Math.PI * 2;
    TAS.particles.spawn(
      b.x + 20 + Math.cos(ang) * 28,
      b.y + 24 + Math.sin(ang) * 28,
      hpRatio > 0.5 ? '#8833aa' : '#ff2200', 1, 1.5, { size: 2 }
    );
  }
}

function killMiniBoss() {
  if (!miniBoss) return;
  miniBoss.alive = false;
  var pts = 2000 * getComboMultiplier();
  addScore(pts, miniBoss.x + 16, miniBoss.y, '#ffdd00');
  addCombo();
  TAS.particles.spawn(miniBoss.x + 16, miniBoss.y + 16, '#ffdd00', 50, 6, { gravity: 0.05 });
  TAS.particles.spawn(miniBoss.x + 16, miniBoss.y + 16, STAGE_COLORS[stage].accent, 25, 4, { gravity: 0.03 });
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#ffaa00', 0.5);
  TAS.audio.playNoise(0.4, 0.15);
  pickups.push({ x: miniBoss.x + 8, y: miniBoss.y + 8, w: 12, h: 12, type: 'mycelium_orb', alive: true });
}

function killBoss() {
  if (!boss) return;
  boss.alive = false;
  var pts = 5000 * getComboMultiplier();
  addScore(pts, boss.x + 20, boss.y, '#ffdd00');
  TAS.particles.spawn(boss.x + 20, boss.y + 24, '#ffdd00', 80, 7, { gravity: 0.03 });
  TAS.particles.spawn(boss.x + 20, boss.y + 24, '#ff4444', 40, 5, { gravity: 0.05 });
  TAS.particles.spawn(boss.x + 20, boss.y + 24, '#ffffff', 20, 4, { gravity: 0.02 });
  TAS.fx.shake(20, 0.75);
  TAS.fx.flash('#ffffff', 0.8);
  TAS.audio.playNoise(0.6, 0.2);
  TAS.audio.playTone(800, 0.3, 'square', 0.08, 200);
  stageComplete = true;
  stageTransition = 180;
}

// ============================================================
// ENVIRONMENT PARTICLES
// ============================================================
function updateEnvironment(dt) {
  ambientTimer++;

  // Stage-specific ambient effects
  if (ambientTimer % 20 === 0) {
    var sx = camX + Math.random() * GW;
    var sy = camY + Math.random() * GH;

    switch (stage) {
      case 0: // Mycelium — floating spores
        envParticles.push({ x: sx, y: sy, vx: Math.random() * 10 - 5, vy: -8 - Math.random() * 5, life: 120, color: '#44dd8844', size: 2 });
        break;
      case 1: // Spore Caverns — sparkles
        envParticles.push({ x: sx, y: sy, vx: 0, vy: 0, life: 40 + Math.random() * 40, color: '#88ddff', size: 1.5 });
        break;
      case 2: // Compost Reactor — embers
        envParticles.push({ x: sx, y: sy + GH * 0.7, vx: Math.random() * 20 - 10, vy: -20 - Math.random() * 15, life: 80, color: '#ff884488', size: 2 });
        break;
      case 3: // Garden Hive — floating cells
        envParticles.push({ x: sx, y: sy, vx: Math.sin(ambientTimer * 0.01) * 5, vy: -3, life: 150, color: '#44ffaa44', size: 3 });
        break;
      case 4: // Canopy — clouds/wind
        envParticles.push({ x: camX - 10, y: sy, vx: 30 + Math.random() * 20, vy: 0, life: 200, color: '#aaddff22', size: 4 });
        break;
      case 5: // Void Blight — void wisps
        envParticles.push({ x: sx, y: sy, vx: Math.sin(ambientTimer * 0.02 + sx) * 8, vy: Math.cos(ambientTimer * 0.015 + sy) * 8, life: 100, color: '#dd44ff44', size: 2.5 });
        break;
    }
  }

  for (var i = envParticles.length - 1; i >= 0; i--) {
    var p = envParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life--;
    if (p.life <= 0) envParticles.splice(i, 1);
  }

  // Cap particles
  if (envParticles.length > 60) envParticles.splice(0, envParticles.length - 60);
}

function drawEnvironmentParticles() {
  for (var i = 0; i < envParticles.length; i++) {
    var p = envParticles[i];
    var alpha = Math.min(1, p.life / 30);
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// PARALLAX BACKGROUND
// ============================================================
function drawParallax() {
  var colors = STAGE_COLORS[stage] || STAGE_COLORS[0];

  // Layer 0 — far stars (slow)
  ctx.fillStyle = colors.accent;
  for (var i = 0; i < STAR_LAYERS[0].length; i++) {
    var s = STAR_LAYERS[0][i];
    var sx = ((s.x - camX * 0.05) % GW + GW) % GW;
    var sy = ((s.y - camY * 0.05) % GH + GH) % GH;
    ctx.globalAlpha = s.bright * 0.3;
    ctx.fillRect(sx, sy, s.size, s.size);
  }

  // Layer 1 — mid (medium)
  for (var i = 0; i < STAR_LAYERS[1].length; i++) {
    var s = STAR_LAYERS[1][i];
    var sx = ((s.x - camX * 0.15) % GW + GW) % GW;
    var sy = ((s.y - camY * 0.15) % GH + GH) % GH;
    ctx.globalAlpha = s.bright * 0.5;
    ctx.fillRect(sx, sy, s.size, s.size);
  }

  // Layer 2 — near (faster)
  for (var i = 0; i < STAR_LAYERS[2].length; i++) {
    var s = STAR_LAYERS[2][i];
    var sx = ((s.x - camX * 0.3) % GW + GW) % GW;
    var sy = ((s.y - camY * 0.3) % GH + GH) % GH;
    ctx.globalAlpha = s.bright * 0.7;
    ctx.fillRect(sx, sy, s.size, s.size);
  }

  ctx.globalAlpha = 1;
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (TAS.input.touch) TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    var anyStart = Object.keys(TAS.input.keys).some(function (k) { return k !== 'KeyC' && TAS.input.keys[k]; });
    if (anyStart || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  // Stage transition
  if (stageTransition > 0) {
    stageTransition--;
    if (stageTransition === 0 && stageComplete) {
      nextStage();
    }
    return;
  }

  // Death respawn
  if (deathTimer > 0) {
    deathTimer--;
    return;
  }

  // Tutorial
  updateTutorial();

  // Combo decay — WIS extends
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }

  // Score popups
  updateScorePopups(dt);

  // Environment
  updateEnvironment(dt);

  // === INPUT — NES mapping: A=jump, B=fire, Start=bomb, Select=weapon ===
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var left = keys['ArrowLeft'] || keys['KeyA'] || touch.left;
  var right = keys['ArrowRight'] || keys['KeyD'] || touch.right;
  var up = keys['ArrowUp'] || keys['KeyW'] || touch.up;
  var down = keys['ArrowDown'] || keys['KeyS'] || touch.down;
  var jump = keys['Space'] || keys['KeyZ'] || touch.a;       // A button
  var fire = keys['KeyX'] || keys['ShiftLeft'] || touch.b;    // B button

  // DEX affects player speed
  var PLAYER_SPEED = Math.floor(BASE_SPEED * dexSpeed());

  // === MORPH BALL TOGGLE ===
  if (down && !morphBall) {
    downTapTimer++;
    if (downTapTimer > 5 && downTapTimer < 15) {
      downTapCount++;
      if (downTapCount >= 2) {
        morphBall = true;
        morphTimer = 0;
        downTapCount = 0;
        TAS.audio.playTone(300, 0.1, 'triangle', 0.05, 150);
      }
    }
  } else if (!down) {
    if (downTapTimer > 0 && downTapTimer < 15) downTapCount++;
    else downTapCount = 0;
    downTapTimer = 0;
  }

  if (morphBall && (jump || up)) {
    morphBall = false;
    TAS.audio.playTone(150, 0.1, 'triangle', 0.05, 300);
  }

  // === GROUND POUND — STR boosts velocity ===
  if (down && !grounded && !morphBall && !grapple && pvy > 0) {
    groundPound = true;
    pvy = strGroundPound();
  }

  // === GRAPPLE ===
  if (grapple) {
    grappleAngle += grappleVel;
    if (left) grappleVel -= 0.003;
    if (right) grappleVel += 0.003;
    grappleVel *= 0.98;

    px = grappleX + Math.sin(grappleAngle) * grappleLen - 8;
    py = grappleY + Math.cos(grappleAngle) * grappleLen;

    if (jump || down) {
      grapple = false;
      pvx = Math.sin(grappleAngle) * grappleVel * 3000;
      pvy = -200;
      TAS.audio.playTone(400, 0.05, 'triangle', 0.04);
    }
  } else if (morphBall) {
    var morphSpeed = PLAYER_SPEED * 1.3;
    if (left) pvx = -morphSpeed;
    else if (right) pvx = morphSpeed;
    else pvx *= 0.85;

    pvy += GRAVITY * dt;
    var newX = px + pvx * dt;
    var newY = py + pvy * dt;

    if (!collidesWorld(newX, py, 12, 10)) px = newX;
    else pvx = 0;
    if (!collidesWorld(px, newY, 12, 10)) py = newY;
    else {
      if (pvy > 0) grounded = true;
      pvy = 0;
    }

    grounded = collidesWorld(px, py + 1, 12, 10) || onPlatformCheck(px, py, 12, 10, 1);

    if (fire && fireTimer <= 0) {
      dropMine();
      fireTimer = 20;
    }
  } else {
    // Normal movement — DEX affects speed
    if (left) { pvx = -PLAYER_SPEED; pFacing = -1; }
    else if (right) { pvx = PLAYER_SPEED; pFacing = 1; }
    else pvx *= 0.7;

    if (jump && grounded) {
      pvy = JUMP_VEL;
      grounded = false;
      TAS.audio.playTone(500, 0.08, 'square', 0.04, 700);
    }

    pvy += GRAVITY * dt;
    if (pvy > 600) pvy = 600;

    var newX = px + pvx * dt;
    if (!collidesWorld(newX, py, 14, 16)) px = newX;
    else pvx = 0;

    var newY = py + pvy * dt;
    if (!collidesWorld(px, newY, 14, 16)) {
      py = newY;
      grounded = false;
    } else {
      if (pvy > 0) {
        grounded = true;
        // Ground pound impact — STR-enhanced
        if (groundPound || pvy > 400) {
          groundPound = false;
          var gc = Math.floor((px + 7) / TILE);
          var gr = Math.floor((py + 18) / TILE);
          if (tileAt(gc, gr) === 2) {
            tiles[gc][gr] = 0;
            TAS.particles.spawn(gc * TILE + 8, gr * TILE + 8, STAGE_COLORS[stage].accent, 12, 4);
            TAS.fx.shake(4, 0.9);
            TAS.audio.playNoise(0.12, 0.06);
            addScore(10, gc * TILE + 8, gr * TILE);
          }
          // Slam shockwave — damages nearby enemies
          if (groundPound) {
            TAS.fx.shake(6, 0.85);
            TAS.particles.spawn(px + 7, py + 16, STAGE_COLORS[stage].accent, 8, 3);
          }
        }
      }
      pvy = 0;
    }

    // Platform check
    if (!grounded && pvy >= 0) {
      if (onPlatformCheck(px, py, 14, 16, pvy)) {
        grounded = true;
        pvy = 0;
        var platR = Math.floor((py + 16) / TILE);
        py = platR * TILE - 16;
      }
    }

    // Grapple (UP + FIRE)
    if (up && fire && !grounded) {
      shootGrapple();
    }

    // Fire weapon — DEX affects fire rate
    var fireDelay = Math.floor((weapon === 1 ? 5 : 12) * dexFireRate());
    if (fire && fireTimer <= 0 && !(up && !grounded)) {
      // Luck-based crit chance
      if (Math.random() < luckCritChance()) {
        TAS.fx.flash('#ffffff', 0.15);
      }
      fireWeapon();
      fireTimer = fireDelay;
    }

    // Weapon cycle — SELECT / C / V (NES Select button)
    if (keys['KeyC'] || keys['KeyV']) {
      weapon = (weapon + 1) % 3;
      keys['KeyC'] = false;
      keys['KeyV'] = false;
      TAS.audio.playTone(600, 0.05, 'triangle', 0.04, 800);
    }

    // Smart bomb — START / Q / Enter (NES Start button)
    if (keys['KeyQ'] || keys['Enter']) {
      useBomb();
      keys['KeyQ'] = false;
      keys['Enter'] = false;
    }
  }

  if (fireTimer > 0) fireTimer--;
  if (iframes > 0) iframes--;

  // === UPDATE BULLETS ===
  for (let i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.life--;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    if (b.type === 'laser') {
      b.x = px + (b.dir > 0 ? 14 : -b.w);
      b.y = py + 6;
    } else {
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      if (b.type === 'bounce') {
        b.vy += 200 * dt;
        var btx = Math.floor(b.x / TILE);
        var bty = Math.floor(b.y / TILE);
        if (isSolid(btx, bty)) {
          if (b.bounces > 0) {
            b.bounces--;
            b.vx = -b.vx * 0.9;
            b.vy = -b.vy * 0.7;
            TAS.audio.playTone(800, 0.03, 'square', 0.02);
            TAS.particles.spawn(b.x, b.y, '#88ff88', 4, 1.5);
          } else {
            bullets.splice(i, 1); continue;
          }
        }
      } else {
        var btx = Math.floor(b.x / TILE);
        var bty = Math.floor(b.y / TILE);
        if (isSolid(btx, bty)) {
          if (tileAt(btx, bty) === 2 || tileAt(btx, bty) === 5) {
            tiles[btx][bty] = 0;
            TAS.particles.spawn(btx * TILE + 8, bty * TILE + 8, STAGE_COLORS[stage].accent, 8, 3);
            TAS.audio.playNoise(0.05, 0.04);
            addScore(25, btx * TILE + 8, bty * TILE);
          }
          bullets.splice(i, 1); continue;
        }
      }
    }

    // Hit enemies
    for (var ei = 0; ei < enemies.length; ei++) {
      var e = enemies[ei];
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(b.x, b.y, b.w || 6, b.h || 4, e.x, e.y, e.w, e.h)) {
        if (e.shielded && b.type !== 'laser') continue;
        e.hp -= b.damage;
        if (b.type !== 'laser') { bullets.splice(i, 1); }
        if (e.hp <= 0) {
          e.alive = false;
          var pts = (50 + stage * 20) * getComboMultiplier();
          addScore(pts, e.x + 7, e.y, '#ffaa44');
          addCombo();
          TAS.particles.spawn(e.x + 7, e.y + 7, '#ffaa44', 12, 3);
          TAS.particles.spawn(e.x + 7, e.y + 7, STAGE_COLORS[stage].accent, 6, 2);
          TAS.audio.playTone(200, 0.1, 'square', 0.05, 80);
        } else {
          TAS.particles.spawn(e.x + 7, e.y + 7, '#fff', 4, 1.5);
          TAS.fx.shake(1, 0.95);
        }
        break;
      }
    }

    // Hit mini-boss
    if (miniBoss && miniBoss.alive) {
      if (TAS.hit.rectOverlap(b.x, b.y, b.w || 6, b.h || 4, miniBoss.x, miniBoss.y, miniBoss.w, miniBoss.h)) {
        miniBoss.hp -= b.damage;
        if (b.type !== 'laser') bullets.splice(i, 1);
        if (miniBoss.hp <= 0) killMiniBoss();
        else {
          TAS.particles.spawn(miniBoss.x + 16, miniBoss.y + 16, '#fff', 5, 2);
          TAS.fx.shake(2, 0.92);
        }
        break;
      }
    }

    // Hit boss
    if (boss && boss.alive) {
      if (TAS.hit.rectOverlap(b.x, b.y, b.w || 6, b.h || 4, boss.x, boss.y, boss.w, boss.h)) {
        boss.hp -= b.damage;
        if (b.type !== 'laser') bullets.splice(i, 1);
        if (boss.hp <= 0) killBoss();
        else {
          TAS.particles.spawn(boss.x + 20, boss.y + 24, '#fff', 6, 2);
          TAS.fx.shake(3, 0.9);
        }
        break;
      }
    }
  }

  // === UPDATE ENEMY BULLETS ===
  for (let i = eBullets.length - 1; i >= 0; i--) {
    var b = eBullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life--;
    if (b.life <= 0) { eBullets.splice(i, 1); continue; }

    // Hit player — CON reduces damage
    var pw = morphBall ? 12 : 14;
    var ph = morphBall ? 10 : 16;
    if (iframes <= 0 && TAS.hit.rectOverlap(b.x - 3, b.y - 3, 6, 6, px, py, pw, ph)) {
      var dmg = Math.max(1, 1 - conDefense());
      hp -= dmg;
      iframes = dexIframes();
      eBullets.splice(i, 1);
      TAS.fx.shake(4, 0.88);
      TAS.audio.playTone(150, 0.1, 'square', 0.06, 80);
      if (hp <= 0) playerDie();
      continue;
    }

    var tx = Math.floor(b.x / TILE);
    var ty = Math.floor(b.y / TILE);
    if (isSolid(tx, ty)) { eBullets.splice(i, 1); }
  }

  // === UPDATE MINES ===
  for (let i = mines.length - 1; i >= 0; i--) {
    var m = mines[i];
    if (!m.alive) { mines.splice(i, 1); continue; }
    m.timer--;
    if (m.timer <= 0) {
      m.alive = false;
      TAS.particles.spawn(m.x + 4, m.y + 3, '#ff8800', 18, 4, { gravity: 0.05 });
      TAS.particles.spawn(m.x + 4, m.y + 3, '#ffcc44', 8, 3, { gravity: 0.03 });
      TAS.audio.playNoise(0.15, 0.08);
      TAS.fx.shake(3, 0.92);
      for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        var dist = TAS.math.dist(m.x, m.y, e.x + 7, e.y + 7);
        if (dist < 40) {
          e.hp -= m.damage;
          if (e.hp <= 0) {
            e.alive = false;
            var pts = (50 + stage * 20) * getComboMultiplier();
            addScore(pts, e.x + 7, e.y, '#ff8844');
            addCombo();
            TAS.particles.spawn(e.x + 7, e.y + 7, '#ffaa44', 12, 3);
          }
        }
      }
      if (m.enemy) {
        var pdist = TAS.math.dist(m.x, m.y, px + 7, py + 8);
        if (pdist < 30 && iframes <= 0) {
          var dmg = Math.max(1, 1 - conDefense());
          hp -= dmg;
          iframes = dexIframes();
          TAS.fx.shake(4, 0.88);
          if (hp <= 0) playerDie();
        }
      }
      mines.splice(i, 1);
    }
  }

  // === UPDATE ENEMIES ===
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var sx = e.x - camX;
    var sy = e.y - camY;
    if (sx > -100 && sx < GW + 100 && sy > -100 && sy < GH + 100) {
      updateEnemy(e, dt);

      // Contact damage — CON reduces
      var pw = morphBall ? 12 : 14;
      var ph = morphBall ? 10 : 16;
      if (iframes <= 0 && TAS.hit.rectOverlap(px, py, pw, ph, e.x, e.y, e.w, e.h)) {
        var dmg = Math.max(1, 1 - conDefense());
        hp -= dmg;
        iframes = dexIframes();
        TAS.fx.shake(4, 0.88);
        TAS.audio.playTone(150, 0.1, 'square', 0.06, 80);
        if (hp <= 0) playerDie();
      }
    }
  }

  updateMiniBoss(miniBoss, dt);
  updateBoss(boss, dt);

  // Boss contact damage
  if (boss && boss.alive && iframes <= 0) {
    if (TAS.hit.rectOverlap(px, py, 14, 16, boss.x, boss.y, boss.w, boss.h)) {
      var dmg = Math.max(1, 2 - conDefense());
      hp -= dmg;
      iframes = dexIframes();
      TAS.fx.shake(6, 0.82);
      if (hp <= 0) playerDie();
    }
  }

  // === PICKUPS — CHA increases pickup radius ===
  var pickRadius = chaPickupRadius();
  for (var pi = 0; pi < pickups.length; pi++) {
    var p = pickups[pi];
    if (!p.alive) continue;
    var pw = morphBall ? 12 : 14;
    var ph = morphBall ? 10 : 16;

    // CHA magnetism — pull pickups toward player
    var pdx = (px + 7) - (p.x + 4);
    var pdy = (py + 8) - (p.y + 4);
    var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (pdist < pickRadius && pdist > 2) {
      p.x += (pdx / pdist) * 1.5;
      p.y += (pdy / pdist) * 1.5;
    }

    if (TAS.hit.rectOverlap(px, py, pw, ph, p.x, p.y, p.w, p.h)) {
      p.alive = false;
      switch (p.type) {
        case 'spore_crystal':
          addScore(100 * getComboMultiplier(), p.x + 4, p.y, '#44ddff');
          TAS.audio.playTone(800, 0.08, 'triangle', 0.05, 1200);
          TAS.particles.spawn(p.x + 4, p.y + 4, '#44ddff', 6, 2);
          break;
        case 'mycelium_orb':
          weaponLevel = Math.min(2, weaponLevel + 1);
          addScorePopup(p.x + 4, p.y, 'SPORE GEM!', '#ffff44');
          TAS.audio.playTone(600, 0.15, 'triangle', 0.06, 1000);
          TAS.particles.spawn(px + 7, py + 8, '#ffff44', 15, 3);
          break;
        case 'healing_moss':
          hp = Math.min(maxHP, hp + 2 + Math.max(0, Math.floor(statMod(statB.con) / 2)));
          addScorePopup(p.x + 4, p.y, '+MOSS HP', '#44ff88');
          TAS.audio.playTone(440, 0.1, 'sine', 0.05, 660);
          TAS.particles.spawn(p.x + 4, p.y + 4, '#44ff88', 8, 2);
          break;
        case 'bomb_cap':
          bombs = Math.min(MAX_BOMBS, bombs + 1);
          addScorePopup(p.x + 4, p.y, '+SPORE BOMB', '#ff8800');
          TAS.audio.playTone(200, 0.1, 'triangle', 0.05, 400);
          break;
        case 'life_fungus':
          lives++;
          addScorePopup(p.x + 4, p.y, '1UP!', '#44ff44');
          TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100);
          TAS.particles.spawn(px + 7, py + 8, '#44ff44', 25, 4);
          break;
      }
    }
  }

  // === HAZARDS ===
  var ptx = Math.floor((px + 7) / TILE);
  var pty = Math.floor((py + 14) / TILE);
  if (tileAt(ptx, pty) === 4 && iframes <= 0) {
    var dmg = Math.max(1, 1 - conDefense());
    hp -= dmg;
    iframes = dexIframes();
    pvy = JUMP_VEL;
    TAS.fx.flash('#ff4400', 0.4);
    TAS.fx.shake(4, 0.9);
    TAS.particles.spawn(px + 7, py + 14, '#ff4422', 8, 2);
    if (hp <= 0) playerDie();
  }

  // === SECRET WALL REVEAL — WIS detection range ===
  var revealDist = wisSecretReveal();
  for (var c = Math.max(0, Math.floor(camX / TILE) - 1); c < Math.min(levelW, Math.floor((camX + GW) / TILE) + 2); c++) {
    for (var r = Math.max(0, Math.floor(camY / TILE) - 1); r < Math.min(levelH, Math.floor((camY + GH) / TILE) + 2); r++) {
      if (tiles[c][r] === 5) {
        var dx = (c * TILE + 8) - (px + 7);
        var dy = (r * TILE + 8) - (py + 8);
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < revealDist && frame % 10 === 0) {
          TAS.particles.spawn(c * TILE + 8, r * TILE + 8, '#ffff6644', 1, 0.5, { size: 1.5 });
        }
      }
    }
  }

  // === CAMERA ===
  var targetCamX = px - GW / 2 + 7;
  var targetCamY = py - GH / 2 + 8;
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;
  camX = TAS.math.clamp(camX, 0, levelW * TILE - GW);
  camY = TAS.math.clamp(camY, 0, levelH * TILE - GH);

  // === CHECK BOSS TRIGGER ===
  if (boss && boss.alive && !bossActive) {
    var dist = TAS.math.dist(px, py, boss.x, boss.y);
    if (dist < 200) {
      bossActive = true;
      TAS.fx.flash('#ff0000', 0.3);
      TAS.fx.shake(5, 0.9);
      TAS.audio.playTone(100, 0.3, 'sawtooth', 0.08, 50);
      addScorePopup(GW / 2 + camX, GH / 2 + camY - 30, 'WARNING: ' + boss.bossName, '#ff4444');
    }
  }
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  var colors = STAGE_COLORS[stage] || STAGE_COLORS[0];
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + STAGE_NAMES[stage] });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  // === GAME RENDERING ===

  // Parallax behind everything
  drawParallax();

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  // Environment particles (behind tiles)
  drawEnvironmentParticles();

  // Tiles
  drawTiles(colors);

  // Pickups
  drawPickups();

  // Mines
  drawMines();

  // Enemies
  drawEnemies();

  // Mini-boss
  if (miniBoss && miniBoss.alive) drawMiniBoss();

  // Boss
  if (boss && boss.alive) drawBoss();

  // Bullets
  drawBullets();

  // Enemy bullets
  drawEBullets();

  // Grapple rope
  if (grapple) {
    ctx.strokeStyle = statB.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px + 8, py);
    ctx.lineTo(grappleX, grappleY);
    ctx.stroke();
    // Grapple point glow
    ctx.fillStyle = statB.color;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(grappleX, grappleY, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Player (the baseling!)
  drawPlayer();

  // Score popups (in world space)
  drawScorePopups();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Fog overlay per zone
  ctx.fillStyle = colors.fog;
  ctx.fillRect(0, 0, GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Tutorial
  drawTutorial();

  // Stage transition overlay
  if (stageTransition > 0 && stageComplete) {
    var alpha = Math.min(1, stageTransition / 60);
    ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 30);
    ctx.fillStyle = '#88ccff';
    ctx.font = '14px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_LORE[stage] || '', GW / 2, GH / 2 + 22);
  } else if (stageTransition > 0 && !stageComplete) {
    var alpha = Math.min(1, stageTransition / 60);
    ctx.fillStyle = 'rgba(0,0,0,' + (alpha * 0.7) + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = colors.accent;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 30);
    ctx.fillStyle = '#fff';
    ctx.font = '13px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2);
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText(STAGE_LORE[stage] || '', GW / 2, GH / 2 + 20);
  }
}

// ============================================================
// DRAW TILES — zone-themed with variation
// ============================================================
function drawTiles(colors) {
  var startC = Math.max(0, Math.floor(camX / TILE) - 1);
  var endC = Math.min(levelW, Math.floor((camX + GW) / TILE) + 2);
  var startR = Math.max(0, Math.floor(camY / TILE) - 1);
  var endR = Math.min(levelH, Math.floor((camY + GH) / TILE) + 2);

  for (let c = startC; c < endC; c++) {
    for (let r = startR; r < endR; r++) {
      var t = tiles[c][r];
      if (t === 0) continue;
      var tx = c * TILE;
      var ty = r * TILE;

      switch (t) {
        case 1: // Solid
          ctx.fillStyle = colors.tile;
          ctx.fillRect(tx, ty, TILE, TILE);
          // Top highlight
          ctx.fillStyle = 'rgba(255,255,255,0.08)';
          ctx.fillRect(tx, ty, TILE, 2);
          // Bottom shadow
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.fillRect(tx, ty + TILE - 2, TILE, 2);
          // Stage-specific tile detail
          if (stage === 0 && (c + r) % 7 === 0) {
            ctx.fillStyle = 'rgba(100,200,100,0.15)';
            ctx.fillRect(tx + 3, ty + 3, 4, 4);
          } else if (stage === 1 && (c * 3 + r * 7) % 11 === 0) {
            ctx.fillStyle = 'rgba(150,150,255,0.2)';
            ctx.beginPath();
            ctx.moveTo(tx + 8, ty + 2);
            ctx.lineTo(tx + 12, ty + 8);
            ctx.lineTo(tx + 4, ty + 8);
            ctx.fill();
          } else if (stage === 2 && (c + r) % 5 === 0) {
            ctx.fillStyle = 'rgba(255,100,0,0.12)';
            ctx.fillRect(tx + 2, ty + 6, 12, 4);
          } else if (stage === 3 && (c * 2 + r) % 6 === 0) {
            ctx.fillStyle = 'rgba(0,200,100,0.15)';
            ctx.beginPath();
            ctx.arc(tx + 8, ty + 8, 3, 0, Math.PI * 2);
            ctx.fill();
          } else if (stage === 4 && (c + r * 3) % 8 === 0) {
            ctx.fillStyle = 'rgba(150,180,220,0.1)';
            ctx.fillRect(tx, ty + 7, TILE, 2);
          } else if (stage === 5 && (c * 5 + r * 3) % 9 === 0) {
            ctx.fillStyle = 'rgba(200,50,255,0.15)';
            ctx.fillRect(tx + 4, ty + 4, 8, 8);
          }
          break;
        case 2: // Breakable — cracked mycelium wall
          ctx.fillStyle = colors.tile;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.strokeStyle = 'rgba(255,255,255,0.3)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(tx + 3, ty + 3);
          ctx.lineTo(tx + 8, ty + 8);
          ctx.lineTo(tx + 13, ty + 5);
          ctx.moveTo(tx + 5, ty + 10);
          ctx.lineTo(tx + 11, ty + 13);
          ctx.stroke();
          // Subtle pulsing
          if (frame % 40 < 20) {
            ctx.fillStyle = 'rgba(255,200,100,0.06)';
            ctx.fillRect(tx, ty, TILE, TILE);
          }
          break;
        case 3: // Platform — mycelium bridge
          ctx.fillStyle = colors.accent;
          ctx.fillRect(tx, ty, TILE, 4);
          ctx.fillStyle = 'rgba(0,0,0,0.3)';
          ctx.fillRect(tx, ty + 4, TILE, 2);
          // Tendrils hanging down
          if ((c + r) % 3 === 0) {
            ctx.strokeStyle = colors.accent;
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tx + 8, ty + 6);
            ctx.lineTo(tx + 8, ty + 10 + Math.sin(frame * 0.04 + c) * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
          }
          break;
        case 4: // Hazard — thorn vines / acid pools
          if (stage === 2) {
            // Reactor — lava/acid pool
            ctx.fillStyle = '#ff4422';
            ctx.fillRect(tx, ty + 8, TILE, 8);
            ctx.fillStyle = '#ff8844';
            ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06 + c) * 0.3;
            ctx.fillRect(tx, ty + 6, TILE, 4);
            ctx.globalAlpha = 1;
          } else {
            // Thorn vines
            ctx.fillStyle = '#884422';
            ctx.fillRect(tx, ty + 10, TILE, 6);
            ctx.fillStyle = '#44aa22';
            for (let s = 0; s < 4; s++) {
              ctx.beginPath();
              ctx.moveTo(tx + s * 4, ty + 10);
              ctx.lineTo(tx + s * 4 + 2, ty + 3);
              ctx.lineTo(tx + s * 4 + 4, ty + 10);
              ctx.fill();
            }
            // Thorn tips
            ctx.fillStyle = '#ff6644';
            for (let s = 0; s < 4; s++) {
              ctx.fillRect(tx + s * 4 + 1, ty + 3, 2, 2);
            }
          }
          break;
        case 5: // Secret wall — WIS makes shimmer stronger
          ctx.fillStyle = colors.tile;
          ctx.fillRect(tx, ty, TILE, TILE);
          var shimmerStr = 0.03 + Math.max(0, statMod(statB.wis)) * 0.02;
          if (frame % 60 < 30) {
            ctx.fillStyle = 'rgba(255,255,100,' + shimmerStr + ')';
            ctx.fillRect(tx, ty, TILE, TILE);
          }
          break;
      }
    }
  }
}

// ============================================================
// DRAW PLAYER — the baseling in its exosuit
// ============================================================
function drawPlayer() {
  if (iframes > 0 && frame % 4 < 2) return;

  var x = Math.floor(px);
  var y = Math.floor(py);
  var col = statB.color;

  // === BASELING SPRITE ===
  var anim = 'idle';
  if (iframes > 0) anim = 'hurt';
  else if (!grounded) anim = 'jump';
  else if (pvx) anim = 'walk';
  if (!TAS.drawBaseling(ctx, x + 7, y + 9, 18, { flipX: pFacing < 0, frame: frame, anim: anim })) {
  if (morphBall) {
    // Ball shape in baseling color
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x + 6, y + 6, 6, 0, Math.PI * 2);
    ctx.fill();
    // Inner eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + 6 + Math.cos(frame * 0.2) * 3, y + 6 + Math.sin(frame * 0.2) * 3, 2, 0, Math.PI * 2);
    ctx.fill();
    // Baseling icon
    ctx.fillStyle = '#000';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, x + 6, y + 8);
    // Trail in baseling color
    TAS.particles.spawn(x + 6, y + 10, col, 1, 0.5, { size: 1, sizeVar: 1 });
  } else {

  // Baseling body (colored by NFT)
  ctx.fillStyle = col;
  ctx.fillRect(x + 3, y + 4, 8, 10);

  // Head
  var headColor = col;
  ctx.fillStyle = headColor;
  ctx.fillRect(x + 4, y, 6, 5);

  // Eyes/visor
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x + 5, y + 1, 4, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + (pFacing > 0 ? 7 : 5), y + 1, 1, 2);

  // Baseling icon on body
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.4;
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon, x + 7, y + 12);
  ctx.globalAlpha = 1;

  // Legs
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.7;
  var legOffset = grounded ? Math.sin(frame * 0.15) * 2 : 0;
  ctx.fillRect(x + 3, y + 14, 3, 3);
  ctx.fillRect(x + 8, y + 14, 3, 3);
  ctx.globalAlpha = 1;
  }
  }

  // Arm/gun
  ctx.fillStyle = '#888';
  var gunX = pFacing > 0 ? x + 11 : x - 3;
  ctx.fillRect(gunX, y + 5, 5, 3);
  // Weapon glow
  var weapColors = ['#ffdd44', '#ff4444', '#44ff44'];
  ctx.fillStyle = weapColors[weapon];
  ctx.fillRect(gunX + (pFacing > 0 ? 4 : 0), y + 5, 2, 3);

  // Core glow (baseling energy)
  ctx.fillStyle = col;
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
  ctx.beginPath();
  ctx.arc(x + 7, y + 8, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Level indicator (small dots above head)
  if (statB.level > 0) {
    ctx.fillStyle = col;
    var dots = Math.min(5, statB.level);
    for (var di = 0; di < dots; di++) {
      ctx.fillRect(x + 4 + di * 2, y - 3, 1, 1);
    }
  }
}

// ============================================================
// DRAW SPORE ENEMIES
// ============================================================
function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var sx = e.x - camX;
    var sy = e.y - camY;
    if (sx < -20 || sx > GW + 20 || sy < -20 || sy > GH + 20) continue;

    switch (e.type) {
      case 'sporecrawler':
        // Fungal beetle
        ctx.fillStyle = '#88aa44';
        ctx.fillRect(e.x + 2, e.y + 4, 10, 8);
        ctx.fillStyle = '#aacc66';
        ctx.fillRect(e.x + 3, e.y + 2, 3, 3);
        ctx.fillRect(e.x + 8, e.y + 2, 3, 3);
        // Antennae
        ctx.strokeStyle = '#668833';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x + 4, e.y + 2);
        ctx.lineTo(e.x + 2, e.y - 2);
        ctx.moveTo(e.x + 10, e.y + 2);
        ctx.lineTo(e.x + 12, e.y - 2);
        ctx.stroke();
        // Legs
        ctx.fillStyle = '#668833';
        for (let l = 0; l < 3; l++) {
          ctx.fillRect(e.x + 2 + l * 4, e.y + 12, 2, 2);
        }
        break;

      case 'gloomcap':
        // Floating mushroom
        ctx.fillStyle = '#cc66ff';
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y + 5, 7, Math.PI, 0);
        ctx.fill();
        // Stem
        ctx.fillStyle = '#9944cc';
        ctx.fillRect(e.x + 5, e.y + 5, 4, 7);
        // Glow spots
        ctx.fillStyle = '#ff88ff';
        ctx.beginPath();
        ctx.arc(e.x + 5, e.y + 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x + 9, e.y + 4, 1, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'mycelium_turret':
        // Rooted turret
        ctx.fillStyle = '#666655';
        ctx.fillRect(e.x + 1, e.y + 6, 12, 8);
        ctx.fillStyle = '#887766';
        ctx.fillRect(e.x + 4, e.y + 2, 6, 6);
        // Barrel aims at player
        var tdx = px - e.x, tdy = py - e.y;
        var ta = Math.atan2(tdy, tdx);
        ctx.fillStyle = '#555544';
        ctx.save();
        ctx.translate(e.x + 7, e.y + 7);
        ctx.rotate(ta);
        ctx.fillRect(0, -1, 10, 3);
        ctx.restore();
        // Root tendrils
        ctx.strokeStyle = '#44662244';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x + 3, e.y + 14);
        ctx.lineTo(e.x + 1, e.y + 18);
        ctx.moveTo(e.x + 11, e.y + 14);
        ctx.lineTo(e.x + 13, e.y + 18);
        ctx.stroke();
        break;

      case 'shield_fungus':
        // Mushroom with shield cap
        if (e.shielded) {
          ctx.fillStyle = 'rgba(100,255,200,0.35)';
          ctx.beginPath();
          ctx.arc(e.x + 7, e.y + 7, 10, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#44aaaa';
        ctx.fillRect(e.x + 2, e.y + 2, 10, 10);
        ctx.fillStyle = '#227766';
        ctx.fillRect(e.x + 4, e.y + 4, 6, 6);
        // Cap
        ctx.fillStyle = '#66ccbb';
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y + 2, 6, Math.PI, 0);
        ctx.fill();
        break;

      case 'tunnelworm':
        // Segmented worm
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(e.x + 1, e.y + 3, 12, 9);
        // Segments
        ctx.strokeStyle = '#886633';
        ctx.lineWidth = 1;
        for (let seg = 0; seg < 3; seg++) {
          ctx.beginPath();
          ctx.moveTo(e.x + 3 + seg * 4, e.y + 3);
          ctx.lineTo(e.x + 3 + seg * 4, e.y + 12);
          ctx.stroke();
        }
        // Head
        ctx.fillStyle = '#cc9955';
        ctx.fillRect(e.x + (e.vx > 0 ? 10 : 0), e.y + 4, 4, 7);
        // Eyes
        ctx.fillStyle = '#ffcc44';
        ctx.fillRect(e.x + (e.vx > 0 ? 12 : 1), e.y + 5, 2, 2);
        break;

      case 'bloom_bomber':
        // Exploding flower bud
        ctx.fillStyle = '#ff6644';
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y + 7, 6, 0, Math.PI * 2);
        ctx.fill();
        // Petal details
        ctx.fillStyle = '#ffaa44';
        for (let pt = 0; pt < 5; pt++) {
          var pa = (pt / 5) * Math.PI * 2 + frame * 0.03;
          ctx.beginPath();
          ctx.arc(e.x + 7 + Math.cos(pa) * 4, e.y + 7 + Math.sin(pa) * 4, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        // Center eye
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y + 7, 2, 0, Math.PI * 2);
        ctx.fill();
        // Pulse aura
        ctx.strokeStyle = 'rgba(255,100,0,' + (0.3 + Math.sin(e.timer * 0.1) * 0.3) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y + 7, 8 + Math.sin(e.timer * 0.1) * 2, 0, Math.PI * 2);
        ctx.stroke();
        break;
    }

    // HP bar for enemies with > 3 hp
    if (e.maxHp > 3) {
      var hpPct = e.hp / e.maxHp;
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x, e.y - 4, 14, 2);
      ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : '#ff4444';
      ctx.fillRect(e.x, e.y - 4, 14 * hpPct, 2);
    }
  }
}

// ============================================================
// DRAW MINI-BOSS — Spore-themed per stage
// ============================================================
function drawMiniBoss() {
  var mb = miniBoss;
  var stageCol = STAGE_COLORS[stage];

  // Body
  ctx.fillStyle = stageCol.accent;
  ctx.globalAlpha = 0.8;
  ctx.fillRect(mb.x + 4, mb.y + 4, 24, 24);
  ctx.globalAlpha = 1;

  // Armored head
  ctx.fillStyle = stageCol.tile;
  ctx.fillRect(mb.x + 8, mb.y, 16, 8);

  // Eyes — glow with menace
  ctx.fillStyle = '#ffff44';
  ctx.fillRect(mb.x + 10, mb.y + 10, 4, 4);
  ctx.fillRect(mb.x + 18, mb.y + 10, 4, 4);
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(mb.x + 11, mb.y + 11, 2, 2);
  ctx.fillRect(mb.x + 19, mb.y + 11, 2, 2);

  // Mandibles
  ctx.fillStyle = stageCol.accent;
  ctx.fillRect(mb.x + 8, mb.y + 24, 4, 6);
  ctx.fillRect(mb.x + 20, mb.y + 24, 4, 6);

  // HP bar
  var hpPct = mb.hp / mb.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(mb.x, mb.y - 10, 32, 3);
  ctx.fillStyle = hpPct > 0.5 ? '#ffdd00' : '#ff4400';
  ctx.fillRect(mb.x, mb.y - 10, 32 * hpPct, 3);

  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(mb.bossName, mb.x + 16, mb.y - 12);

  // Aura
  ctx.strokeStyle = 'rgba(255,100,0,' + (0.2 + Math.sin(frame * 0.05) * 0.15) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mb.x + 16, mb.y + 16, 20 + Math.sin(frame * 0.08) * 3, 0, Math.PI * 2);
  ctx.stroke();
}

// ============================================================
// DRAW BOSS — stage-themed final enemy
// ============================================================
function drawBoss() {
  var b = boss;
  var stageCol = STAGE_COLORS[stage];

  // Body
  ctx.fillStyle = stageCol.tile;
  ctx.fillRect(b.x + 4, b.y + 8, 32, 32);

  // Head
  ctx.fillStyle = stageCol.accent;
  ctx.globalAlpha = 0.85;
  ctx.fillRect(b.x + 8, b.y, 24, 16);
  ctx.globalAlpha = 1;

  // Horns/crown
  ctx.fillStyle = '#ffaa00';
  ctx.fillRect(b.x + 10, b.y - 6, 4, 8);
  ctx.fillRect(b.x + 26, b.y - 6, 4, 8);

  // Eyes — glow intensifies at low HP
  var hpRatio = b.hp / b.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#ff4400' : '#ff0000';
  ctx.fillRect(b.x + 14, b.y + 6, 5, 4);
  ctx.fillRect(b.x + 23, b.y + 6, 5, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(b.x + 15, b.y + 7, 2, 2);
  ctx.fillRect(b.x + 25, b.y + 7, 2, 2);

  // Arms
  ctx.fillStyle = stageCol.tile;
  ctx.globalAlpha = 0.8;
  ctx.fillRect(b.x, b.y + 14, 6, 20);
  ctx.fillRect(b.x + 34, b.y + 14, 6, 20);
  ctx.globalAlpha = 1;

  // Core reactor
  ctx.fillStyle = hpRatio > 0.5 ? stageCol.accent : '#ff4444';
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
  ctx.beginPath();
  ctx.arc(b.x + 20, b.y + 24, 6 + (hpRatio < 0.3 ? Math.sin(frame * 0.2) * 2 : 0), 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // HP bar
  var hpPct = b.hp / b.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(b.x - 4, b.y - 16, 48, 4);
  ctx.fillStyle = hpPct > 0.5 ? '#ff8800' : '#ff2200';
  ctx.fillRect(b.x - 4, b.y - 16, 48 * hpPct, 4);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.x - 4, b.y - 16, 48, 4);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.bossName, b.x + 20, b.y - 19);
}

// ============================================================
// DRAW BULLETS
// ============================================================
function drawBullets() {
  for (var bi = 0; bi < bullets.length; bi++) {
    var b = bullets[bi];
    switch (b.type) {
      case 'spread':
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(b.x, b.y, 6, 3);
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x + 1, b.y + 1, 2, 1);
        break;
      case 'laser':
        var lx = b.dir > 0 ? b.x : b.x - b.w;
        ctx.fillStyle = 'rgba(255,80,80,0.5)';
        ctx.fillRect(lx, b.y - 2, b.w, b.h + 4);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(lx, b.y, b.w, b.h);
        ctx.fillStyle = '#fff';
        ctx.fillRect(lx, b.y + 1, b.w, 1);
        break;
      case 'bounce':
        ctx.fillStyle = '#44ff88';
        ctx.beginPath();
        ctx.arc(b.x + 2, b.y + 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88ffbb';
        ctx.beginPath();
        ctx.arc(b.x + 2, b.y + 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

// ============================================================
// DRAW ENEMY BULLETS
// ============================================================
function drawEBullets() {
  for (var bi = 0; bi < eBullets.length; bi++) {
    var b = eBullets[bi];
    ctx.fillStyle = '#ff6688';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaacc';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// DRAW SPORE PICKUPS
// ============================================================
function drawPickups() {
  for (var pi = 0; pi < pickups.length; pi++) {
    var p = pickups[pi];
    if (!p.alive) continue;
    var sx = p.x - camX;
    var sy = p.y - camY;
    if (sx < -20 || sx > GW + 20 || sy < -20 || sy > GH + 20) continue;

    var bob = Math.sin(frame * 0.06 + p.x) * 2;
    var py2 = p.y + bob;

    switch (p.type) {
      case 'spore_crystal':
        // Glowing crystal shard
        ctx.fillStyle = '#44ddff';
        ctx.beginPath();
        ctx.moveTo(p.x + 4, py2);
        ctx.lineTo(p.x + 8, py2 + 4);
        ctx.lineTo(p.x + 4, py2 + 8);
        ctx.lineTo(p.x, py2 + 4);
        ctx.fill();
        ctx.fillStyle = '#88eeff';
        ctx.beginPath();
        ctx.moveTo(p.x + 4, py2 + 1);
        ctx.lineTo(p.x + 6, py2 + 4);
        ctx.lineTo(p.x + 4, py2 + 7);
        ctx.lineTo(p.x + 2, py2 + 4);
        ctx.fill();
        break;

      case 'mycelium_orb':
        // Pulsing power orb
        ctx.fillStyle = '#ffdd00';
        ctx.beginPath();
        ctx.arc(p.x + 4, py2 + 4, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.x + 3, py2 + 3, 2, 0, Math.PI * 2);
        ctx.fill();
        // Tendrils
        ctx.strokeStyle = '#ffdd0066';
        ctx.lineWidth = 1;
        for (var ti = 0; ti < 3; ti++) {
          var ta = (ti / 3) * Math.PI * 2 + frame * 0.05;
          ctx.beginPath();
          ctx.moveTo(p.x + 4, py2 + 4);
          ctx.lineTo(p.x + 4 + Math.cos(ta) * 7, py2 + 4 + Math.sin(ta) * 7);
          ctx.stroke();
        }
        break;

      case 'healing_moss':
        // Green cross with moss texture
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(p.x + 1, py2 + 3, 6, 2);
        ctx.fillRect(p.x + 3, py2 + 1, 2, 6);
        ctx.fillStyle = '#66cc66';
        ctx.fillRect(p.x + 2, py2 + 3, 4, 1);
        ctx.fillRect(p.x + 3, py2 + 2, 1, 4);
        break;

      case 'bomb_cap':
        // Mushroom bomb cap
        ctx.fillStyle = '#ff8800';
        ctx.beginPath();
        ctx.arc(p.x + 4, py2 + 5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(p.x + 4, py2 + 3, 3, Math.PI, 0);
        ctx.fill();
        // Fuse
        ctx.strokeStyle = '#ffcc44';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.x + 4, py2 + 1);
        ctx.lineTo(p.x + 6, py2 - 2);
        ctx.stroke();
        // Spark
        if (frame % 10 < 5) {
          ctx.fillStyle = '#ffff88';
          ctx.fillRect(p.x + 5, py2 - 3, 2, 2);
        }
        break;

      case 'life_fungus':
        // Glowing life mushroom
        ctx.fillStyle = '#44ff44';
        ctx.beginPath();
        ctx.arc(p.x + 4, py2 + 3, 4, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#228822';
        ctx.fillRect(p.x + 3, py2 + 3, 2, 4);
        ctx.fillStyle = '#88ff88';
        ctx.beginPath();
        ctx.arc(p.x + 3, py2 + 2, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // 1UP text
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('1UP', p.x + 4, py2 + 10);
        break;
    }
  }
}

// ============================================================
// DRAW MINES
// ============================================================
function drawMines() {
  for (var mi = 0; mi < mines.length; mi++) {
    var m = mines[mi];
    if (!m.alive) continue;
    var flash = m.timer < 30 && frame % 4 < 2;
    ctx.fillStyle = flash ? '#ff4444' : (m.enemy ? '#ff8844' : statB.color);
    ctx.fillRect(m.x, m.y, m.w, m.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(m.x + 3, m.y + 2, 2, 2);
    // Danger ring when about to explode
    if (m.timer < 30) {
      ctx.strokeStyle = 'rgba(255,0,0,' + (0.3 + Math.sin(frame * 0.2) * 0.3) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(m.x + 4, m.y + 3, 12, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

// ============================================================
// DRAW HUD — with stat indicators
// ============================================================
function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(10,5,20,0.88)';
  ctx.fillRect(0, 0, GW, HUD_H);

  // Score — CHA multiplier shown
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 12);

  // Stage name
  ctx.fillStyle = STAGE_COLORS[stage].accent;
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGE_NAMES[stage], GW / 2, 10);

  // Weapon indicator
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(WEAPON_NAMES[weapon] + ' Lv' + (weaponLevel + 1), GW / 2, 22);

  // HP bar — CON-scaled
  ctx.fillStyle = '#333';
  ctx.fillRect(6, 18, 80, 6);
  var hpPct = hp / maxHP;
  ctx.fillStyle = hpPct > 0.5 ? statB.color : hpPct > 0.25 ? '#ddaa44' : '#dd4444';
  ctx.fillRect(6, 18, 80 * hpPct, 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(6, 18, 80, 6);
  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(hp + '/' + maxHP, 46, 24);

  // Lives — baseling icons
  ctx.textAlign = 'right';
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 8px monospace';
  for (let i = 0; i < Math.min(lives, 8); i++) {
    ctx.fillText(statB.icon, GW - 6 - i * 12, 14);
  }

  // Bombs
  ctx.fillStyle = '#ff8800';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('B:' + bombs, GW - 6, 24);

  // Combo
  if (combo >= 3) {
    ctx.fillStyle = '#ffdd00';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.3;
    ctx.fillText('x' + getComboMultiplier() + ' COMBO (' + combo + ')', 100, 12);
    ctx.globalAlpha = 1;
  }

  // Baseling name (small, right side)
  ctx.fillStyle = statB.color;
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.globalAlpha = 0.6;
  ctx.fillText(statB.name, GW - 50, 24);
  ctx.globalAlpha = 1;
}
