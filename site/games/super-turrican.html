// ============================================================
// DRAW TITLE SCREEN
// ============================================================
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Parallax background on title too
  for (var i = 0; i < STAR_LAYERS[0].length; i++) {
    var s = STAR_LAYERS[0][i];
    ctx.fillStyle = '#a855f7';
    ctx.globalAlpha = s.bright * 0.3;
    ctx.fillRect(((s.x + frame * 0.1) % GW + GW) % GW, s.y % GH, s.size, s.size);
  }
  ctx.globalAlpha = 1;

  // Animated fungal background
  for (let i = 0; i < 20; i++) {
    var fx = (i * 50 + frame * 0.3) % GW;
    var fy = GH - 40 - Math.sin(i * 1.5 + frame * 0.02) * 20;
    ctx.fillStyle = 'rgba(56,217,115,' + (0.15 + Math.sin(i + frame * 0.01) * 0.1) + ')';
    ctx.beginPath();
    ctx.arc(fx, fy, 15 + Math.sin(i * 2) * 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE TURRICAN', GW / 2 + 2, 72);
  ctx.fillStyle = statB.color;
  ctx.fillText('SPORE TURRICAN', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '11px monospace';
  ctx.fillText('A Baseling Adventure on Spore Planet', GW / 2, 92);

  // Baseling character preview
  var cx = GW / 2;
  var cy = 140;
  // Body
  ctx.fillStyle = statB.color;
  ctx.fillRect(cx - 4, cy + 4, 8, 10);
  // Head
  ctx.fillRect(cx - 3, cy, 6, 5);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 2, cy + 1, 4, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(cx, cy + 1, 1, 2);
  // Icon on chest
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.5;
  ctx.font = 'bold 6px monospace';
  ctx.fillText(statB.icon, cx, cy + 12);
  ctx.globalAlpha = 1;
  // Gun
  ctx.fillStyle = '#888';
  ctx.fillRect(cx + 4, cy + 5, 8, 3);
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(cx + 11, cy + 5, 2, 3);
  // Core glow
  ctx.fillStyle = statB.color;
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
  ctx.beginPath();
  ctx.arc(cx, cy + 8, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Selected baseling preview (covers the procedural mini-figure when loaded)
  TAS.drawBaseling(ctx, cx, cy + 8, 24, { anim: 'idle', frame: frame });

  // Baseling name (Base blue)
  var selT = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText((selT ? selT.charName : statB.name) + (selT && selT.tokenId != null ? ' #' + selT.tokenId : ''), cx, cy + 26);

  // 5 arcade stat bars in canonical colors
  if (selT && selT.stats && window.BaselingPlayer && BaselingPlayer.STAT_META) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = cx - 110;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = selT.stats[_keys[_i]] || 0, _bx = _x0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, cy + 36);
      ctx.fillStyle = '#222222'; ctx.fillRect(_bx, cy + 39, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, cy + 39, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING (title only)', cx, cy + 54);

  // Controls info — NES-style
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('D-PAD: Move | A(Z/Space): Jump | B(X): Fire', GW / 2, 205);
  ctx.fillText('SELECT(C): Switch Weapon | START(Q): Bomb', GW / 2, 218);
  ctx.fillText('DOWN x2: Morph Ball | DOWN(air): Slam | UP+B(air): Grapple', GW / 2, 231);

  // Stat bonuses explained
  ctx.fillStyle = '#555';
  ctx.font = '7px monospace';
  ctx.fillText('STR=Damage  DEX=Speed  CON=HP  INT=Weapons  WIS=Secrets  CHA=Score', GW / 2, 248);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 268);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 40);
  ctx.globalAlpha = 1;

  // Credit
  ctx.fillStyle = '#444';
  ctx.font = '8px monospace';
  ctx.fillText('Baseling Universe - MfT Arcade', GW / 2, GH - 15);
}

// ============================================================
// DRAW VICTORY
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  if (frame % 5 === 0) {
    TAS.particles.spawn(
      TAS.math.randRange(50, GW - 50),
      TAS.math.randRange(50, GH - 50),
      ['#ffdd00', '#ff4488', '#44ffdd', '#88ff44', statB.color][TAS.math.randInt(0, 4)],
      4, 2, { gravity: 0.02 }
    );
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 70);

  ctx.fillStyle = statB.color;
  ctx.font = '14px monospace';
  ctx.fillText('The Void Blight is purged!', GW / 2, 100);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText(statB.name + ' has saved the Spore Network!', GW / 2, 125);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 160);

  // Stat contribution summary
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 185);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 210);
    ctx.globalAlpha = 1;
  }

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 50);
  ctx.globalAlpha = 1;
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
