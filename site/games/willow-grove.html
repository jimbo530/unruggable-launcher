// ============================================================
// BOSS FACTORY
// ============================================================
function createBoss(stageNum) {
  var floorY = GH - 32;
  var b = { x: 360, y: floorY - 40, w: 36, h: 40, hp: 0, maxHp: 0, phase: 0,
    timer: 0, attackTimer: 2, vx: 0, vy: 0, dir: -1, type: '', active: true,
    invTimer: 0, flashTimer: 0 };
  switch(stageNum) {
    case 1:
      b.type = 'forestGuardian'; b.hp = 20; b.maxHp = 20; b.w = 30; b.h = 44; b.y = floorY - 44; break;
    case 3:
      b.type = 'lakeSerpent'; b.hp = 25; b.maxHp = 25; b.w = 40; b.h = 20; b.y = floorY - 40; break;
    case 5:
      b.type = 'dungeonWarden'; b.hp = 30; b.maxHp = 30; b.w = 28; b.h = 36; b.y = floorY - 36; break;
    case 7:
      b.type = 'darkQueen'; b.hp = 40; b.maxHp = 40; b.w = 24; b.h = 34; b.y = floorY - 34;
      b.phase = 0; break;
  }
  return b;
}

// ============================================================
// COLLISION
// ============================================================
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

// ============================================================
// START / SAVE / LOAD
// ============================================================
function startGame(fromSave) {
  state = 'playing';
  score = 0;
  frame = 0;
  comboCount = 0;
  comboTimer = 0;
  bossDialogShown = {};
  if (!fromSave) {
    stage = 0; screenIdx = 0;
    lives = 3 + statB.lives + Math.floor(conMod); // [3] CON
    hearts = maxHearts;
    magic = MAGIC_MAX; swordLevel = 0; spells = []; activeSpell = 0;
  }
  resetPlayer();
  generateStage(stage, screenIdx);
  transitionTimer = 1.0;
  transitionDir = 1;
  TAS.particles.clear();
  if (showTutorial) { tutorialTimer = 8; showTutorial = false; localStorage.setItem('spore_tut_seen', '1'); }
}

function saveGame() {
  var data = { stage: stage, screen: screenIdx, lives: lives, hearts: hearts,
    maxHearts: maxHearts, swordLevel: swordLevel, spells: spells, score: score };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d) {
      stage = d.stage || 0; screenIdx = d.screen || 0; lives = d.lives || 3;
      hearts = d.hearts || 3; maxHearts = d.maxHearts || 3;
      swordLevel = d.swordLevel || 0; spells = d.spells || []; score = d.score || 0;
      return true;
    }
  } catch(e) { console.error('Load failed:', e); }
  return false;
}

// ============================================================
// ADVANCE / DEATH
// ============================================================
function advanceScreen() {
  screenIdx++;
  if (screenIdx >= screensPerStage[stage]) {
    stage++;
    screenIdx = 0;
    if (stage >= STAGE_COUNT) {
      state = 'victory';
      if (score > highScore) { highScore = score; TAS.score.save('sporegrove_hi', highScore); }
      saveGame();
      return;
    }
    zoneTransAlpha = 1.5;
  }
  saveGame();
  resetPlayer();
  generateStage(stage, screenIdx);
  transitionTimer = 1.0;
  transitionDir = 1;
}

function killPlayer() {
  player.dead = true;
  deathTimer = 1.5;
  sfxDeath();
  TAS.fx.shake(10, 0.5);
  for (var i = 0; i < 20; i++) {
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2,
      (Math.random() - 0.5) * 180, (Math.random() - 0.5) * 180,
      0.6 + Math.random() * 0.5, i % 2 === 0 ? statB.color : '#ffaa00', 3);
  }
}

function respawn() {
  lives--;
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) { highScore = score; TAS.score.save('sporegrove_hi', highScore); }
    return;
  }
  hearts = maxHearts;
  magic = MAGIC_MAX;
  resetPlayer();
  generateStage(stage, screenIdx);
  invTimer = 2.0;
}

// ============================================================
// DAMAGE
// ============================================================
function damagePlayer(dmg) {
  if (invTimer > 0 || shieldTimer > 0 || player.dead) return;
  // [2] DEX: dodge chance
  if (Math.random() < DODGE_CHANCE) {
    sfxDodge();
    addScorePopup(player.x + player.w / 2, player.y - 10, 'DODGE!', '#88ff88');
    return;
  }
  // [3] CON: damage reduction
  var actualDmg = Math.max(1, Math.round(dmg * (1 - DMG_REDUCTION)));
  hearts -= actualDmg;
  invTimer = 1.5;
  sfxHit();
  TAS.fx.flash('#ff0000', 0.15);
  TAS.fx.shake(4, 0.15);
  if (hearts <= 0) { hearts = 0; killPlayer(); }
}

function damageEnemy(e, dmg) {
  // [6] CHA: pacify chance
  if (Math.random() < PACIFY_CHANCE && e.transformable) {
    sfxPacify();
    transformEnemy(e);
    addScorePopup(e.x + e.w / 2, e.y - 10, 'PACIFIED!', '#88ffcc');
    return;
  }
  // [1] STR: bonus damage, [2] DEX: crit
  var totalDmg = dmg + SWORD_DMG_BONUS;
  var isCrit = Math.random() < CRIT_CHANCE;
  if (isCrit) { totalDmg = Math.ceil(totalDmg * 2); sfxCrit(); }

  e.hp -= totalDmg;
  TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, 0, -30, 0.3, '#fff', 2);
  TAS.fx.shake(2, 0.08);

  if (e.hp <= 0) {
    e.active = false;
    var baseScore = Math.round(e.scoreVal * SCORE_MULT * XP_MULT);
    // Combo system
    comboCount++;
    comboTimer = 2.0;
    var comboMult = 1;
    if (comboCount >= 3) { comboMult = 1.5; sfxCombo(); }
    if (comboCount >= 6) comboMult = 2;
    if (comboCount >= 10) comboMult = 3;
    var finalScore = Math.round(baseScore * comboMult);
    score += finalScore;
    sfxHit();

    var popText = '+' + finalScore;
    if (isCrit) popText += ' CRIT!';
    if (comboCount >= 3) popText += ' x' + comboCount;
    addScorePopup(e.x + e.w / 2, e.y - 5, popText, isCrit ? '#ff4444' : '#ffcc00');

    for (var i = 0; i < 8; i++) {
      TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2,
        (Math.random() - 0.5) * 120, (Math.random() - 0.5) * 120,
        0.4, i % 2 === 0 ? '#ffcc00' : statB.color, 2);
    }

    // Luck drop: chance for pickup [luck stat]
    if (Math.random() < statB.luck * 0.03) {
      var drops = ['healthPotion', 'magicPotion', 'sporeOrb'];
      pickups.push({ x: e.x, y: e.y, type: drops[Math.floor(Math.random() * drops.length)] });
    }
  }
}

function damageBoss(dmg) {
  if (!boss || boss.invTimer > 0) return;
  var totalDmg = dmg + SWORD_DMG_BONUS; // [1] STR
  var isCrit = Math.random() < CRIT_CHANCE; // [2] DEX
  if (isCrit) { totalDmg = Math.ceil(totalDmg * 2); sfxCrit(); }

  boss.hp -= totalDmg;
  boss.invTimer = 0.3;
  boss.flashTimer = 0.2;
  sfxBossHit();
  TAS.fx.shake(5, 0.25);
  var bossScore = Math.round(5 * SCORE_MULT);
  score += bossScore;
  addScorePopup(boss.x + boss.w / 2, boss.y - 10, '+' + bossScore + (isCrit ? ' CRIT!' : ''), isCrit ? '#ff4444' : '#ffcc00');

  if (boss.hp <= 0) {
    boss.active = false;
    bossActive = false;
    var clearScore = Math.round(200 * SCORE_MULT);
    score += clearScore;
    stageComplete = true;
    stageCompleteTimer = 3.0;
    addScorePopup(boss.x + boss.w / 2, boss.y - 20, '+' + clearScore + ' BOSS CLEAR!', '#ff88ff');
    TAS.fx.shake(12, 0.6);
    for (var i = 0; i < 40; i++) {
      TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2,
        (Math.random() - 0.5) * 250, (Math.random() - 0.5) * 250,
        0.8 + Math.random() * 0.6, ['#ff4400', '#ffcc00', '#ff88ff', statB.color][i % 4], 4);
    }
  }
}

// ============================================================
// TRANSFORM ENEMY
// ============================================================
function transformEnemy(e) {
  e.active = false;
  sfxTransform();
  var tScore = Math.round(25 * SCORE_MULT);
  score += tScore;
  addScorePopup(e.x + e.w / 2, e.y - 10, '+' + tScore + ' TRANSFORM', '#aa44ff');
  var tType = 'frog';
  if (stage >= 2 && stage <= 3) tType = 'snowflake';
  if (stage >= 5) tType = 'flower';
  var isKey = (stage === 5 && screenIdx >= 2);
  if (isKey) tType = 'key';
  transformedObjs.push({ x: e.x, y: e.y + e.h - 12, w: 12, h: 12, type: tType, timer: 0 });
  for (var i = 0; i < 14; i++) {
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2,
      (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 100,
      0.6, i % 3 === 0 ? '#aa44ff' : (i % 3 === 1 ? '#ffaaff' : '#ffffff'), 3);
  }
}

// ============================================================
// SPELL CASTING
// ============================================================
function castSpell() {
  if (spells.length === 0) return;
  var spellIdx = spells[activeSpell];
  var cost = Math.floor(MAGIC_COSTS[spellIdx] * SPELL_COST_MULT); // [5] WIS: cheaper
  if (magic < cost) return;
  magic -= cost;

  var spellDmgBonus = Math.floor(intMod * 2); // [4] INT: spell damage

  if (spellIdx === 0) { // Thunder
    sfxThunder();
    TAS.fx.shake(6, 0.2);
    var closest = null, closestDist = 999;
    for (var i = 0; i < enemies.length; i++) {
      if (!enemies[i].active) continue;
      var dx = enemies[i].x - player.x;
      var dy = enemies[i].y - player.y;
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < closestDist) { closestDist = d; closest = enemies[i]; }
    }
    if (closest && closestDist < 200) {
      damageEnemy(closest, 3 + spellDmgBonus);
      for (var i = 0; i < 10; i++) {
        TAS.particles.spawn(closest.x + closest.w / 2, closest.y - 20 - i * 15,
          (Math.random() - 0.5) * 30, -15, 0.3, '#88ccff', 2);
      }
      TAS.fx.flash('#aaddff', 0.12);
    }
    if (bossActive && boss && closestDist >= 200) {
      damageBoss(3 + spellDmgBonus);
      for (var i = 0; i < 10; i++) {
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y - 20 - i * 15,
          (Math.random() - 0.5) * 30, -15, 0.3, '#88ccff', 2);
      }
      TAS.fx.flash('#aaddff', 0.12);
    }
  } else if (spellIdx === 1) { // Bombard
    sfxBombard();
    TAS.fx.shake(4, 0.15);
    for (var i = 0; i < 5; i++) {
      projectiles.push({ x: player.x + (i - 2) * 40 + Math.random() * 30, y: -10 - i * 20,
        vx: (Math.random() - 0.5) * 30, vy: 200 + Math.random() * 100,
        w: 8, h: 8, type: 'bomb', timer: 0, dmg: 2 + spellDmgBonus, friendly: true });
    }
  } else if (spellIdx === 2) { // Transform
    sfxTransform();
    var closest = null, closestDist = 999;
    for (var i = 0; i < enemies.length; i++) {
      if (!enemies[i].active || !enemies[i].transformable) continue;
      var d = Math.abs(enemies[i].x - player.x) + Math.abs(enemies[i].y - player.y);
      if (d < closestDist) { closestDist = d; closest = enemies[i]; }
    }
    if (closest && closestDist < TRANSFORM_RANGE) { // [4] INT: range
      transformEnemy(closest);
    }
  } else if (spellIdx === 3) { // Nockmaar
    sfxNockmaar();
    TAS.fx.shake(5, 0.2);
    var dir = player.dir;
    projectiles.push({ x: player.x + (dir > 0 ? player.w : -20), y: player.y + 4,
      vx: dir * 250, vy: 0, w: 20, h: 14, type: 'fire', timer: 0, dmg: 5 + spellDmgBonus, friendly: true });
    TAS.fx.flash('#ff4400', 0.1);
  }
  sfxMagic();
}

// ============================================================
// INPUT HANDLING
// ============================================================
var keys = {};
var prevKeys = {};
function keyDown(k) { return TAS.input.keys[k]; }
function keyJustPressed(k) { return TAS.input.keys[k] && !prevKeys[k]; }

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      if (loadGame()) startGame(true);
      else startGame(false);
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial timer
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // Zone transition overlay
  if (zoneTransAlpha > 0) zoneTransAlpha -= dt;

  // Transition
  if (transitionTimer > 0) { transitionTimer -= dt; return; }

  // Stage complete
  if (stageComplete) {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) {
      stageComplete = false;
      advanceScreen();
    }
    updateScorePopups(dt);
    return;
  }

  // Death
  if (player.dead) {
    deathTimer -= dt;
    if (deathTimer <= 0) respawn();
    TAS.particles.update(dt);
    updateScorePopups(dt);
    return;
  }

  // Dialog
  if (dialogTimer > 0) {
    dialogTimer -= dt;
    if (dialogTimer <= 0) dialogText = '';
    return;
  }

  // Timers
  if (invTimer > 0) invTimer -= dt;
  if (shieldTimer > 0) shieldTimer -= dt;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Magic regen [4] INT
  magic = Math.min(MAGIC_MAX, magic + MAGIC_REGEN * dt);

  // === PLAYER MOVEMENT ===
  var moveL = keyDown('ArrowLeft') || TAS.input.touch.left;
  var moveR = keyDown('ArrowRight') || TAS.input.touch.right;
  var jumpBtn = keyDown('ArrowUp') || keyJustPressed(' ') || TAS.input.touch.a;
  var attackBtn = keyJustPressed('z') || keyJustPressed('Z');
  var magicBtn = keyJustPressed('x') || keyJustPressed('X') || TAS.input.touch.b;
  var spellSwitch = keyJustPressed('c') || keyJustPressed('C');

  if (moveL) { player.vx = -(underwater ? SWIM_SPEED : WALK_SPEED); player.dir = -1; }
  else if (moveR) { player.vx = (underwater ? SWIM_SPEED : WALK_SPEED); player.dir = 1; }
  else { player.vx = 0; }

  // Run animation
  if (player.vx !== 0) player.runFrame += dt * 8;
  else player.runFrame = 0;

  // Swimming
  if (underwater) {
    var swimUp = keyDown('ArrowUp') || TAS.input.touch.a;
    var swimDown = keyDown('ArrowDown');
    if (swimUp) player.vy = -SWIM_SPEED;
    else if (swimDown) player.vy = SWIM_SPEED;
    else player.vy *= 0.9;
    player.swimming = true;
  } else {
    player.swimming = false;
    if (jumpBtn && player.onGround) {
      player.vy = JUMP_VEL; // [2] DEX: jump height
      player.onGround = false;
      sfxJump();
    }
    player.vy += GRAVITY * dt;
  }

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Platform collision
  player.onGround = false;
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'door') continue;
    // Hazard platforms
    if (p.type === 'toxic' || p.type === 'vent') {
      if (rectOverlap(player, { x: p.x, y: p.y - 4, w: p.w, h: p.h + 4 })) {
        damagePlayer(1);
      }
      continue;
    }
    if (p.type === 'reactorDebris') {
      if (rectOverlap(player, p)) {
        damagePlayer(1);
      }
      continue;
    }
    if (rectOverlap({ x: player.x, y: player.y, w: player.w, h: player.h }, p)) {
      if (player.vy > 0 && player.y + player.h - player.vy * dt <= p.y + 4) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        if (p.type === 'ice' && player.vx === 0) {
          player.x += player.dir * 20 * dt;
        }
        // Mushroom bounce
        if (p.type === 'mushroom') {
          player.vy = JUMP_VEL * 1.3;
          player.onGround = false;
          sfxJump();
          TAS.fx.shake(2, 0.1);
          for (var j = 0; j < 4; j++) {
            TAS.particles.spawn(player.x + player.w / 2, p.y,
              (Math.random() - 0.5) * 40, -20, 0.3, '#88ff44', 2);
          }
        }
      } else if (player.vy < 0 && p.type === 'ground') {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Bounds
  if (player.x < 0) player.x = 0;
  if (player.x > GW - player.w) {
    if (!bossActive) {
      advanceScreen();
      return;
    }
    player.x = GW - player.w;
  }
  if (player.y > GH + 20) { killPlayer(); return; }
  if (player.y < 0 && !underwater) player.y = 0;

  // === SWORD ATTACK ===
  if (attackBtn && player.swordTimer <= 0) {
    player.swordTimer = SWORD_DUR;
    sfxSword();
    // Sword slash particles
    var sx = player.dir > 0 ? player.x + player.w : player.x - 10;
    for (var i = 0; i < 3; i++) {
      TAS.particles.spawn(sx + Math.random() * 10, player.y + 4 + Math.random() * 6,
        player.dir * (30 + Math.random() * 20), (Math.random() - 0.5) * 20,
        0.2, swordLevel === 2 ? '#88ccff' : '#ffcc88', 1);
    }
  }
  if (player.swordTimer > 0) {
    player.swordTimer -= dt;
    var sx = player.dir > 0 ? player.x + player.w : player.x - SWORD_RANGE[swordLevel];
    var sy = player.y + 4;
    var sw = SWORD_RANGE[swordLevel];
    var sh = 10;
    var swordRect = { x: sx, y: sy, w: sw, h: sh };
    for (var i = 0; i < enemies.length; i++) {
      if (!enemies[i].active) continue;
      if (rectOverlap(swordRect, enemies[i])) {
        damageEnemy(enemies[i], 1 + swordLevel); // STR bonus applied in damageEnemy
      }
    }
    if (bossActive && boss && boss.active) {
      if (rectOverlap(swordRect, boss)) {
        damageBoss(1 + swordLevel);
      }
    }
  }

  // === MAGIC ===
  if (magicBtn) castSpell();
  if (spellSwitch && spells.length > 0) {
    activeSpell = (activeSpell + 1) % spells.length;
  }

  // === ENEMIES ===
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active) continue;
    e.timer += dt;

    switch(e.type) {
      case 'sporeling':
      case 'goblin':
      case 'skeleton':
      case 'knight':
      case 'darkKnight':
        e.x += e.vx * dt;
        if (e.x < 20 || e.x > GW - 30) { e.vx = -e.vx; e.dir = -e.dir; }
        break;
      case 'treant':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > 40) e.vx = -e.vx;
        break;
      case 'eagle':
      case 'bat':
      case 'gargoyle':
        e.x += Math.cos(e.timer * 2) * 60 * dt;
        e.y = e.startY + Math.sin(e.timer * 3) * 25;
        break;
      case 'ghost':
        e.x += Math.sin(e.timer * 1.5) * 40 * dt;
        e.y = e.startY + Math.cos(e.timer * 2) * 20;
        break;
      case 'jellyfish':
        e.y = e.startY + Math.sin(e.timer * 2) * 20;
        e.x += Math.cos(e.timer) * 15 * dt;
        break;
      case 'fish':
        e.x += e.vx * dt;
        if (e.x < 10 || e.x > GW - 20) e.vx = -e.vx;
        break;
      case 'iceSprite':
        e.x += e.vx * dt;
        if (e.x < 20 || e.x > GW - 30) e.vx = -e.vx;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = 2.5;
          var dx = player.x - e.x;
          projectiles.push({ x: e.x, y: e.y, vx: dx > 0 ? 100 : -100, vy: 0, w: 6, h: 6, type: 'ice', timer: 0, dmg: 1, friendly: false });
        }
        break;
      case 'sporeArcher':
        e.shootTimer -= dt;
        if (e.shootTimer <= 0) {
          e.shootTimer = 2.0;
          var dx = player.x - e.x;
          projectiles.push({ x: e.x, y: e.y + 4, vx: dx > 0 ? 140 : -140, vy: -40, w: 8, h: 4, type: 'sporeArrow', timer: 0, dmg: 1, friendly: false });
        }
        break;
      case 'vine':
        if (Math.sin(e.timer * 3) > 0.8) {
          e.w = 20;
        } else {
          e.w = 8;
        }
        break;
    }

    if (rectOverlap(player, e)) {
      damagePlayer(1);
    }
  }

  // === BOSS AI ===
  if (bossActive && boss && boss.active) {
    // Boss dialog on first encounter
    if (!bossDialogShown[boss.type]) {
      bossDialogShown[boss.type] = true;
      dialogText = BOSS_DIALOG[boss.type] || 'A POWERFUL FOE APPROACHES!';
      dialogTimer = 2.5;
      TAS.fx.shake(6, 0.3);
    }

    boss.timer += dt;
    if (boss.invTimer > 0) boss.invTimer -= dt;
    if (boss.flashTimer > 0) boss.flashTimer -= dt;
    boss.attackTimer -= dt;

    switch(boss.type) {
      case 'forestGuardian':
        boss.x = 300 + Math.sin(boss.timer * 0.8) * 60;
        boss.y = GH - 32 - boss.h + Math.sin(boss.timer * 1.2) * 10;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 2.0;
          for (var i = 0; i < 3; i++) {
            projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + 10,
              vx: -80 - i * 20, vy: -30 + i * 20, w: 8, h: 8, type: 'leaf', timer: 0, dmg: 1, friendly: false });
          }
        }
        break;
      case 'lakeSerpent':
        boss.x = 280 + Math.sin(boss.timer) * 80;
        boss.y = GH - 80 + Math.cos(boss.timer * 1.5) * 30;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 1.5;
          projectiles.push({ x: boss.x, y: boss.y,
            vx: (player.x - boss.x) * 0.8, vy: (player.y - boss.y) * 0.8,
            w: 10, h: 10, type: 'bubble', timer: 0, dmg: 1, friendly: false });
        }
        break;
      case 'dungeonWarden':
        if (boss.timer % 4 < 2) {
          boss.x += (boss.x > player.x ? -1 : 1) * 50 * dt;
        }
        boss.y = GH - 32 - boss.h;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 1.8;
          for (var i = 0; i < 4; i++) {
            var angle = (i / 4) * Math.PI * 2;
            projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
              vx: Math.cos(angle) * 100, vy: Math.sin(angle) * 100,
              w: 6, h: 6, type: 'dark', timer: 0, dmg: 1, friendly: false });
          }
        }
        break;
      case 'darkQueen':
        if (boss.hp > boss.maxHp * 0.6) {
          boss.phase = 0;
          boss.x = 350 + Math.sin(boss.timer) * 50;
          boss.y = GH - 32 - boss.h;
        } else if (boss.hp > boss.maxHp * 0.3) {
          boss.phase = 1;
          boss.x = 250 + Math.sin(boss.timer * 1.5) * 100;
          boss.y = GH - 80 + Math.sin(boss.timer * 2) * 30;
        } else {
          boss.phase = 2;
          boss.x = 240 + Math.cos(boss.timer * 2) * 120;
          boss.y = GH - 100 + Math.sin(boss.timer * 3) * 40;
        }
        if (boss.attackTimer <= 0) {
          boss.attackTimer = boss.phase === 2 ? 0.8 : (boss.phase === 1 ? 1.2 : 1.8);
          var numProj = 2 + boss.phase * 2;
          for (var i = 0; i < numProj; i++) {
            var angle = (i / numProj) * Math.PI * 2 + boss.timer;
            projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
              vx: Math.cos(angle) * (80 + boss.phase * 30),
              vy: Math.sin(angle) * (80 + boss.phase * 30),
              w: 7, h: 7, type: 'darkMagic', timer: 0, dmg: 1, friendly: false });
          }
          if (boss.phase === 2 && Math.random() < 0.3) {
            enemies.push(createEnemy('ghost', boss.x + (Math.random() - 0.5) * 60, boss.y));
          }
        }
        break;
    }

    if (rectOverlap(player, boss)) {
      damagePlayer(2);
    }
  }

  // === PROJECTILES ===
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.timer += dt;
    if (p.type === 'bomb') p.vy += 300 * dt;

    if (p.x < -20 || p.x > GW + 20 || p.y < -40 || p.y > GH + 20 || p.timer > 4) {
      projectiles.splice(i, 1);
      continue;
    }

    if (p.friendly) {
      for (var j = 0; j < enemies.length; j++) {
        if (!enemies[j].active) continue;
        if (rectOverlap(p, enemies[j])) {
          damageEnemy(enemies[j], p.dmg);
          projectiles.splice(i, 1);
          i = -1; break;
        }
      }
      if (i < 0) continue;
      if (bossActive && boss && boss.active && rectOverlap(p, boss)) {
        damageBoss(p.dmg);
        projectiles.splice(i, 1);
        continue;
      }
      if (p.type === 'bomb') {
        for (var j = 0; j < platforms.length; j++) {
          if (platforms[j].type === 'toxic' || platforms[j].type === 'vent' || platforms[j].type === 'reactorDebris') continue;
          if (rectOverlap(p, platforms[j])) {
            for (var k = 0; k < 8; k++) {
              TAS.particles.spawn(p.x, p.y, (Math.random() - 0.5) * 120, -Math.random() * 100, 0.4, '#ff6600', 3);
            }
            projectiles.splice(i, 1);
            sfxBombard();
            TAS.fx.shake(4, 0.15);
            for (var k = 0; k < enemies.length; k++) {
              if (!enemies[k].active) continue;
              var edx = enemies[k].x - p.x;
              var edy = enemies[k].y - p.y;
              if (Math.sqrt(edx * edx + edy * edy) < 40) {
                damageEnemy(enemies[k], p.dmg);
              }
            }
            if (bossActive && boss && boss.active) {
              var bdx = boss.x - p.x;
              var bdy = boss.y - p.y;
              if (Math.sqrt(bdx * bdx + bdy * bdy) < 50) damageBoss(p.dmg);
            }
            break;
          }
        }
      }
    } else {
      if (rectOverlap(p, player)) {
        // [2] DEX: arrow rain dodge
        if (p.type === 'sporeArrow' && Math.random() < DODGE_CHANCE * 2) {
          sfxDodge();
          addScorePopup(player.x + player.w / 2, player.y - 10, 'DODGE!', '#88ff88');
        } else {
          damagePlayer(p.dmg);
        }
        projectiles.splice(i, 1);
      }
    }
  }

  // === ARROW RAIN (stage 4) ===
  for (var i = 0; i < arrowRain.length; i++) {
    arrowRain[i].timer -= dt;
    if (arrowRain[i].timer <= 0) {
      arrowRain[i].timer = 1.5 + Math.random() * 2;
      for (var j = 0; j < 3; j++) {
        projectiles.push({ x: 50 + Math.random() * 380, y: -10,
          vx: (Math.random() - 0.5) * 20, vy: 150 + Math.random() * 50,
          w: 3, h: 10, type: 'sporeArrow', timer: 0, dmg: 1, friendly: false });
      }
    }
  }

  // === PICKUPS (with magnetism [5] WIS) ===
  for (var i = pickups.length - 1; i >= 0; i--) {
    var pk = pickups[i];
    // Magnetism pull
    var mdx = player.x + player.w / 2 - pk.x;
    var mdy = player.y + player.h / 2 - pk.y;
    var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mdist < PICKUP_MAGNET && mdist > 0) {
      pk.x += (mdx / mdist) * 80 * dt;
      pk.y += (mdy / mdist) * 80 * dt;
    }

    if (rectOverlap(player, pk)) {
      sfxPickup();
      var pkScore = 0;
      switch(pk.type) {
        case 'sporeOrb': pkScore = Math.round(50 * SCORE_MULT); score += pkScore; break;
        case 'healthPotion': hearts = Math.min(maxHearts, hearts + 2); pkScore = 10; score += pkScore; break;
        case 'magicPotion': magic = Math.min(MAGIC_MAX, magic + 40); pkScore = 10; score += pkScore; break;
        case 'shield': shieldTimer = 8 + SHIELD_DUR_BONUS; pkScore = 20; score += pkScore; break; // [5] WIS
        case 'heartUp': maxHearts = Math.min(6 + Math.floor(conMod), maxHearts + 1); hearts = maxHearts; pkScore = 100; score += pkScore; sfxLevelUp(); break;
        case 'mushroomCap': hearts = Math.min(maxHearts, hearts + 1); pkScore = 15; score += pkScore; break;
        case 'reactorShard': magic = MAGIC_MAX; pkScore = Math.round(75 * SCORE_MULT); score += pkScore; sfxLevelUp(); break;
      }
      if (pkScore > 0) addScorePopup(pk.x, pk.y - 5, '+' + pkScore, '#88ffcc');
      for (var j = 0; j < 5; j++) {
        TAS.particles.spawn(pk.x, pk.y, (Math.random() - 0.5) * 40, -20 - Math.random() * 20,
          0.4, statB.color, 2);
      }
      pickups.splice(i, 1);
    }
  }

  // === NPCS ===
  for (var i = 0; i < npcs.length; i++) {
    var n = npcs[i];
    if (rectOverlap(player, { x: n.x - 10, y: n.y - 10, w: 30, h: 30 })) {
      dialogText = n.msg;
      dialogTimer = 2.5;
      switch(n.gives) {
        case 'sword': swordLevel = 0; break;
        case 'sword1': swordLevel = 1; break;
        case 'sword2': swordLevel = 2; break;
        case 'thunder': if (spells.indexOf(0) < 0) spells.push(0); break;
        case 'bombard': if (spells.indexOf(1) < 0) spells.push(1); break;
        case 'transform': if (spells.indexOf(2) < 0) spells.push(2); break;
        case 'nockmaar': if (spells.indexOf(3) < 0) spells.push(3); break;
      }
      npcs.splice(i, 1);
      sfxLevelUp();
      TAS.fx.flash('#ffffff', 0.15);
      addScorePopup(n.x, n.y - 20, 'NEW ABILITY!', '#ffcc00');
      break;
    }
  }

  // === TRANSFORMED OBJECTS ===
  for (var i = 0; i < transformedObjs.length; i++) {
    transformedObjs[i].timer += dt;
    if (transformedObjs[i].type === 'key') {
      if (rectOverlap(player, transformedObjs[i])) {
        for (var j = platforms.length - 1; j >= 0; j--) {
          if (platforms[j].type === 'door') platforms.splice(j, 1);
        }
        transformedObjs.splice(i, 1);
        sfxPickup();
        var keyScore = Math.round(50 * SCORE_MULT);
        score += keyScore;
        addScorePopup(player.x, player.y - 10, '+' + keyScore + ' KEY!', '#ffcc00');
        break;
      }
    }
    if (transformedObjs[i] && (transformedObjs[i].type === 'frog' || transformedObjs[i].type === 'flower')) {
      var to = transformedObjs[i];
      if (player.vy > 0 && player.y + player.h >= to.y && player.y + player.h <= to.y + 8 &&
          player.x + player.w > to.x && player.x < to.x + to.w) {
        player.y = to.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // === DOOR COLLISION ===
  for (var i = 0; i < platforms.length; i++) {
    if (platforms[i].type === 'door') {
      if (rectOverlap(player, platforms[i])) {
        if (player.vx > 0) player.x = platforms[i].x - player.w;
        else if (player.vx < 0) player.x = platforms[i].x + platforms[i].w;
      }
    }
  }

  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateAmbientParticles(dt);

  prevKeys = {};
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawPlayer() {
  if (player.dead) return;
  if (invTimer > 0 && Math.floor(invTimer * 10) % 2 === 0) return;

  var px = player.x, py = player.y;
  var bobY = player.onGround && player.vx !== 0 ? Math.sin(player.runFrame) * 1.5 : 0;
  py += bobY;

  // === BASELING SPRITE ===
  var _anim = player.dead ? 'ko' : (player.swordTimer > 0 ? 'attack' : ((!player.onGround || underwater) ? 'jump' : (Math.abs(player.vx) > 1 ? 'walk' : 'idle')));
  if (!TAS.drawBaseling(ctx, px + 7, py + 9, 24, { flipX: player.dir < 0, frame: frame, anim: _anim })) {
  // Body — baseling with stat color
  ctx.fillStyle = shieldTimer > 0 ? '#66aaff' : statB.color;
  ctx.fillRect(px + 2, py + 6, 10, 12);
  // Head
  ctx.fillStyle = shieldTimer > 0 ? '#aaccff' : adjustColor(statB.color, 40);
  ctx.beginPath();
  ctx.arc(px + 7, py + 5, 5, 0, Math.PI * 2);
  ctx.fill();
  // Hat (wizard)
  ctx.fillStyle = shieldTimer > 0 ? '#4466aa' : adjustColor(statB.color, -60);
  ctx.beginPath();
  ctx.moveTo(px + 3, py + 2);
  ctx.lineTo(px + 7, py - 6);
  ctx.lineTo(px + 11, py + 2);
  ctx.fill();
  // Hat star
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(px + 6, py - 3, 2, 2);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + (player.dir > 0 ? 8 : 4), py + 4, 2, 2);
  // Pupil
  ctx.fillStyle = '#000';
  ctx.fillRect(px + (player.dir > 0 ? 9 : 4), py + 4, 1, 1);
  // Baseling icon on body
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon, px + 7, py + 14);
  ctx.textAlign = 'left';
  }

  // Sword
  if (player.swordTimer > 0) {
    ctx.fillStyle = swordLevel === 2 ? '#88ccff' : (swordLevel === 1 ? '#cccccc' : '#aa8844');
    var sLen = SWORD_RANGE[swordLevel];
    var sx = player.dir > 0 ? px + player.w : px - sLen;
    ctx.fillRect(sx, py + 6, sLen, 3);
    ctx.fillStyle = 'rgba(255,255,200,0.3)';
    ctx.fillRect(sx, py + 4, sLen, 7);
    // Blade tip sparkle
    ctx.fillStyle = '#fff';
    var tipX = player.dir > 0 ? sx + sLen - 2 : sx;
    ctx.fillRect(tipX, py + 5, 2, 2);
  }

  // Shield glow
  if (shieldTimer > 0) {
    ctx.strokeStyle = 'rgba(100,180,255,' + (0.3 + Math.sin(frame * 0.2) * 0.2) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px + 7, py + 11, 14, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Combo indicator
  if (comboCount >= 3) {
    ctx.fillStyle = comboCount >= 10 ? '#ff4444' : (comboCount >= 6 ? '#ffaa00' : '#ffcc00');
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('x' + comboCount, px + 7, py - 10);
    ctx.textAlign = 'left';
  }
}

function adjustColor(hex, amount) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

function drawEnemy(e) {
  if (!e.active) return;
  var ex = e.x, ey = e.y;
  switch(e.type) {
    case 'sporeling':
      ctx.fillStyle = '#44cc44';
      ctx.beginPath();
      ctx.ellipse(ex + e.w / 2, ey + e.h, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Spore spots
      ctx.fillStyle = '#66ff66';
      ctx.fillRect(ex + 2, ey + 3, 3, 3);
      ctx.fillRect(ex + 7, ey + 5, 2, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex + 3, ey + 4, 2, 2);
      ctx.fillRect(ex + 7, ey + 4, 2, 2);
      break;
    case 'goblin':
      ctx.fillStyle = '#448844';
      ctx.fillRect(ex + 2, ey + 6, 10, 12);
      ctx.fillStyle = '#66aa66';
      ctx.beginPath(); ctx.arc(ex + 7, ey + 5, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex + 5, ey + 3, 2, 2);
      ctx.fillRect(ex + 8, ey + 3, 2, 2);
      // Ears
      ctx.fillStyle = '#448844';
      ctx.beginPath(); ctx.moveTo(ex + 1, ey + 5); ctx.lineTo(ex - 2, ey + 1); ctx.lineTo(ex + 3, ey + 3); ctx.fill();
      ctx.beginPath(); ctx.moveTo(ex + 13, ey + 5); ctx.lineTo(ex + 16, ey + 1); ctx.lineTo(ex + 11, ey + 3); ctx.fill();
      break;
    case 'treant':
      ctx.fillStyle = '#554422';
      ctx.fillRect(ex + 4, ey + 8, 12, 20);
      ctx.fillStyle = '#336622';
      ctx.beginPath(); ctx.arc(ex + 10, ey + 6, 8, 0, Math.PI * 2); ctx.fill();
      // Mushroom spots on canopy
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(ex + 6, ey + 4, 3, 2);
      ctx.fillRect(ex + 12, ey + 4, 3, 2);
      // Roots
      ctx.fillStyle = '#443311';
      ctx.fillRect(ex + 2, ey + 26, 4, 4);
      ctx.fillRect(ex + 14, ey + 26, 4, 4);
      break;
    case 'vine':
      ctx.fillStyle = '#228822';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#44ff44';
      for (var vi = 0; vi < 3; vi++) ctx.fillRect(ex + 2, ey + vi * 10, 4, 4);
      // Thorns
      ctx.fillStyle = '#ff6644';
      if (e.w > 10) {
        ctx.fillRect(ex - 2, ey + 5, 3, 2);
        ctx.fillRect(ex + e.w - 1, ey + 15, 3, 2);
      }
      break;
    case 'iceSprite':
      ctx.fillStyle = '#88ccff';
      ctx.beginPath(); ctx.arc(ex + e.w / 2, ey + e.h / 2, 6, 0, Math.PI * 2); ctx.fill();
      // Inner glow
      ctx.fillStyle = '#ccf0ff';
      ctx.beginPath(); ctx.arc(ex + e.w / 2, ey + e.h / 2, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex + 4, ey + 4, 2, 2);
      ctx.fillRect(ex + 8, ey + 4, 2, 2);
      break;
    case 'eagle':
      ctx.fillStyle = '#884400';
      ctx.beginPath();
      ctx.moveTo(ex, ey + e.h / 2);
      ctx.lineTo(ex + e.w / 2, ey);
      ctx.lineTo(ex + e.w, ey + e.h / 2);
      ctx.lineTo(ex + e.w / 2, ey + e.h);
      ctx.fill();
      // Wing flap
      ctx.fillStyle = '#aa5500';
      var wingOff = Math.sin(e.timer * 6) * 3;
      ctx.fillRect(ex - 2, ey + e.h / 2 + wingOff, 4, 2);
      ctx.fillRect(ex + e.w - 2, ey + e.h / 2 - wingOff, 4, 2);
      break;
    case 'jellyfish':
      ctx.fillStyle = '#cc66ff';
      ctx.beginPath(); ctx.arc(ex + e.w / 2, ey + 5, 6, Math.PI, 0); ctx.fill();
      ctx.strokeStyle = '#aa44dd';
      ctx.lineWidth = 1;
      for (var ji = 0; ji < 4; ji++) {
        ctx.beginPath(); ctx.moveTo(ex + 2 + ji * 3, ey + 8);
        ctx.lineTo(ex + 2 + ji * 3 + Math.sin(frame * 0.1 + ji) * 2, ey + 14);
        ctx.stroke();
      }
      break;
    case 'fish':
      ctx.fillStyle = '#4488aa';
      ctx.beginPath();
      ctx.ellipse(ex + e.w / 2, ey + e.h / 2, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tail fin
      ctx.fillStyle = '#3377aa';
      ctx.beginPath(); ctx.moveTo(ex, ey + 2); ctx.lineTo(ex - 4, ey); ctx.lineTo(ex - 4, ey + e.h); ctx.lineTo(ex, ey + e.h - 2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(ex + 10, ey + 2, 2, 2);
      break;
    case 'sporeArcher':
      ctx.fillStyle = '#884444';
      ctx.fillRect(ex + 2, ey + 4, 10, 14);
      ctx.fillStyle = '#aa6644';
      ctx.beginPath(); ctx.arc(ex + 7, ey + 3, 4, 0, Math.PI * 2); ctx.fill();
      // Spore bow
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(ex + 12, ey + 4, 6, 2);
      ctx.fillStyle = '#228822';
      ctx.fillRect(ex + 16, ey + 2, 2, 6);
      break;
    case 'knight':
      ctx.fillStyle = '#555566';
      ctx.fillRect(ex + 2, ey + 4, 12, 18);
      ctx.fillStyle = '#8888aa';
      ctx.fillRect(ex + 3, ey, 10, 6);
      // Visor slit
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex + 6, ey + 2, 3, 2);
      // Sword
      ctx.fillStyle = '#aaaacc';
      ctx.fillRect(ex + (e.vx < 0 ? -4 : 14), ey + 8, 4, 2);
      break;
    case 'ghost':
      ctx.fillStyle = 'rgba(200,200,255,' + (0.5 + Math.sin(frame * 0.1) * 0.2) + ')';
      ctx.beginPath(); ctx.arc(ex + e.w / 2, ey + 5, 7, Math.PI, 0); ctx.fill();
      ctx.fillRect(ex + 2, ey + 5, 10, 10);
      // Wavy bottom
      for (var gi = 0; gi < 3; gi++) {
        ctx.beginPath();
        ctx.arc(ex + 3 + gi * 4, ey + 15, 2, 0, Math.PI);
        ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.fillRect(ex + 4, ey + 4, 2, 3);
      ctx.fillRect(ex + 9, ey + 4, 2, 3);
      break;
    case 'skeleton':
      ctx.fillStyle = '#ccccaa';
      ctx.fillRect(ex + 4, ey + 6, 6, 12);
      // Ribs
      ctx.fillStyle = '#aaaa88';
      ctx.fillRect(ex + 3, ey + 8, 8, 1);
      ctx.fillRect(ex + 3, ey + 11, 8, 1);
      ctx.fillStyle = '#eeeedd';
      ctx.beginPath(); ctx.arc(ex + 7, ey + 4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(ex + 5, ey + 3, 2, 2);
      ctx.fillRect(ex + 8, ey + 3, 2, 2);
      // Jaw
      ctx.fillRect(ex + 6, ey + 6, 3, 1);
      break;
    case 'bat':
      ctx.fillStyle = '#442244';
      var bwSpread = Math.sin(e.timer * 8) * 2;
      ctx.beginPath();
      ctx.moveTo(ex - bwSpread, ey + e.h / 2);
      ctx.quadraticCurveTo(ex + e.w / 4, ey - bwSpread, ex + e.w / 2, ey + e.h / 2);
      ctx.quadraticCurveTo(ex + e.w * 3 / 4, ey - bwSpread, ex + e.w + bwSpread, ey + e.h / 2);
      ctx.lineTo(ex + e.w / 2, ey + e.h);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(ex + 4, ey + 3, 1, 1);
      ctx.fillRect(ex + 7, ey + 3, 1, 1);
      break;
    case 'gargoyle':
      ctx.fillStyle = '#556677';
      ctx.fillRect(ex + 3, ey + 5, 10, 13);
      ctx.fillStyle = '#778899';
      ctx.beginPath(); ctx.arc(ex + 8, ey + 4, 5, 0, Math.PI * 2); ctx.fill();
      // Horns
      ctx.fillStyle = '#445566';
      ctx.beginPath(); ctx.moveTo(ex + 4, ey + 1); ctx.lineTo(ex + 2, ey - 4); ctx.lineTo(ex + 6, ey + 1); ctx.fill();
      ctx.beginPath(); ctx.moveTo(ex + 10, ey + 1); ctx.lineTo(ex + 14, ey - 4); ctx.lineTo(ex + 12, ey + 1); ctx.fill();
      // Wings
      ctx.beginPath();
      ctx.moveTo(ex, ey + 8);
      ctx.lineTo(ex - 4, ey + 3);
      ctx.lineTo(ex + 3, ey + 6);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + e.w, ey + 8);
      ctx.lineTo(ex + e.w + 4, ey + 3);
      ctx.lineTo(ex + e.w - 3, ey + 6);
      ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(ex + 5, ey + 3, 2, 2);
      ctx.fillRect(ex + 9, ey + 3, 2, 2);
      break;
    case 'darkKnight':
      ctx.fillStyle = '#222233';
      ctx.fillRect(ex + 2, ey + 4, 14, 20);
      // Cape
      ctx.fillStyle = '#330033';
      ctx.beginPath(); ctx.moveTo(ex + 4, ey + 6); ctx.lineTo(ex, ey + 24); ctx.lineTo(ex + 18, ey + 24); ctx.lineTo(ex + 14, ey + 6); ctx.fill();
      ctx.fillStyle = '#333344';
      ctx.fillRect(ex + 4, ey, 10, 7);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(ex + 7, ey + 2, 4, 3);
      // Sword glow
      ctx.fillStyle = '#8866ff';
      ctx.fillRect(ex + (e.vx < 0 ? -8 : 18), ey + 8, 8, 2);
      break;
  }
}

function drawBoss() {
  if (!boss || !boss.active) return;
  var bx = boss.x, by = boss.y;
  if (boss.flashTimer > 0 && Math.floor(boss.flashTimer * 20) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }

  switch(boss.type) {
    case 'forestGuardian':
      // Mycoforest Guardian — giant fungal tree
      ctx.fillStyle = '#442200';
      ctx.fillRect(bx + 8, by + 14, 14, 30);
      ctx.fillStyle = '#225500';
      ctx.beginPath(); ctx.arc(bx + 15, by + 10, 14, 0, Math.PI * 2); ctx.fill();
      // Mushroom caps on crown
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.arc(bx + 8, by + 4, 5, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 22, by + 6, 4, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(bx + 9, by + 6, 4, 4);
      ctx.fillRect(bx + 17, by + 6, 4, 4);
      // Branches with spore tips
      ctx.strokeStyle = '#553300';
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(bx + 5, by + 20); ctx.lineTo(bx - 8, by + 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx + 25, by + 20); ctx.lineTo(bx + 38, by + 10); ctx.stroke();
      ctx.fillStyle = '#88ff44';
      ctx.beginPath(); ctx.arc(bx - 8, by + 10, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 38, by + 10, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'lakeSerpent':
      // Reactor Serpent — glowing segments
      ctx.fillStyle = '#2244aa';
      for (var si = 0; si < 5; si++) {
        ctx.beginPath();
        ctx.arc(bx + si * 8, by + Math.sin(frame * 0.1 + si) * 5, 8 - si, 0, Math.PI * 2);
        ctx.fill();
      }
      // Reactor glow core
      ctx.fillStyle = 'rgba(68,136,255,' + (0.3 + Math.sin(frame * 0.08) * 0.2) + ')';
      ctx.beginPath(); ctx.arc(bx + 16, by, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(bx + 2, by - 3, 3, 3);
      ctx.fillRect(bx + 8, by - 3, 3, 3);
      break;
    case 'dungeonWarden':
      // Spore Warden — fungal chains
      ctx.fillStyle = '#442222';
      ctx.fillRect(bx + 4, by + 8, 20, 28);
      ctx.fillStyle = '#663333';
      ctx.fillRect(bx + 6, by, 16, 12);
      // Spore eye clusters
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(bx + 10, by + 3, 3, 4);
      ctx.fillRect(bx + 16, by + 3, 3, 4);
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(bx + 13, by + 5, 2, 2);
      // Chains with spore growth
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(bx + 2, by + 15); ctx.lineTo(bx - 8, by + 25); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx + 26, by + 15); ctx.lineTo(bx + 36, by + 25); ctx.stroke();
      ctx.fillStyle = '#44cc44';
      ctx.beginPath(); ctx.arc(bx - 6, by + 22, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 34, by + 22, 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'darkQueen':
      // The Dark Mycologist
      // Spore crown
      ctx.fillStyle = boss.phase === 2 ? '#ff0044' : '#ffcc00';
      ctx.beginPath();
      ctx.moveTo(bx + 4, by + 2);
      ctx.lineTo(bx + 7, by - 6);
      ctx.lineTo(bx + 10, by);
      ctx.lineTo(bx + 13, by - 8);
      ctx.lineTo(bx + 16, by);
      ctx.lineTo(bx + 19, by - 6);
      ctx.lineTo(bx + 22, by + 2);
      ctx.fill();
      // Head
      ctx.fillStyle = '#220022';
      ctx.beginPath(); ctx.arc(bx + 12, by + 6, 7, 0, Math.PI * 2); ctx.fill();
      // Mycelial dress
      ctx.fillStyle = boss.phase >= 1 ? '#660044' : '#440044';
      ctx.beginPath();
      ctx.moveTo(bx + 4, by + 12);
      ctx.lineTo(bx + 20, by + 12);
      ctx.lineTo(bx + 24, by + 34);
      ctx.lineTo(bx, by + 34);
      ctx.fill();
      // Mycelial tendrils on dress
      ctx.strokeStyle = '#88006644';
      ctx.lineWidth = 1;
      for (var ti = 0; ti < 3; ti++) {
        ctx.beginPath();
        ctx.moveTo(bx + 4 + ti * 8, by + 20);
        ctx.lineTo(bx + 2 + ti * 8 + Math.sin(frame * 0.05 + ti) * 3, by + 34);
        ctx.stroke();
      }
      // Eyes
      ctx.fillStyle = boss.phase === 2 ? '#ff0000' : '#ff44ff';
      ctx.fillRect(bx + 8, by + 5, 3, 3);
      ctx.fillRect(bx + 14, by + 5, 3, 3);
      // Aura in later phases
      if (boss.phase >= 1) {
        ctx.strokeStyle = 'rgba(255,0,100,' + (0.3 + Math.sin(frame * 0.15) * 0.2) + ')';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(bx + 12, by + 17, 20 + boss.phase * 5, 0, Math.PI * 2); ctx.stroke();
      }
      // Phase 2 spore cloud
      if (boss.phase === 2) {
        ctx.fillStyle = 'rgba(128,0,64,' + (0.15 + Math.sin(frame * 0.1) * 0.1) + ')';
        ctx.beginPath(); ctx.arc(bx + 12, by + 10, 30, 0, Math.PI * 2); ctx.fill();
      }
      break;
  }
  ctx.globalAlpha = 1.0;

  // Boss HP bar with name
  var bossName = boss.type === 'forestGuardian' ? 'GROVE MOLD GUARDIAN' :
    boss.type === 'lakeSerpent' ? 'REACTOR SERPENT' :
    boss.type === 'dungeonWarden' ? 'WILLOW SPORE WARDEN' : 'DARK MYCOLOGIST';
  ctx.fillStyle = '#000';
  ctx.fillRect(GW / 2 - 82, GH - 26, 164, 18);
  ctx.fillStyle = '#333';
  ctx.fillRect(GW / 2 - 80, GH - 24, 160, 14);
  ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#cc2222' : '#ff4444';
  ctx.fillRect(GW / 2 - 80, GH - 24, 160 * (boss.hp / boss.maxHp), 14);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 80, GH - 24, 160, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(bossName, GW / 2, GH - 15);
  ctx.textAlign = 'left';
}

function drawProjectile(p) {
  switch(p.type) {
    case 'bomb':
      ctx.fillStyle = '#ff6600';
      ctx.beginPath(); ctx.arc(p.x + 4, p.y + 4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(p.x + 4, p.y + 4, 2, 0, Math.PI * 2); ctx.fill();
      // Trail
      TAS.particles.spawn(p.x + 4, p.y + 4, (Math.random() - 0.5) * 10, 5, 0.15, '#ff8800', 1);
      break;
    case 'fire':
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(p.x + 4, p.y + 3, p.w - 8, p.h - 6);
      TAS.particles.spawn(p.x + Math.random() * p.w, p.y + Math.random() * p.h,
        (Math.random() - 0.5) * 20, -20, 0.2, '#ff8800', 2);
      break;
    case 'sporeArrow':
      ctx.fillStyle = '#447744';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#88ff44';
      ctx.fillRect(p.x, p.y, 2, p.h);
      break;
    case 'ice':
      ctx.fillStyle = '#88ddff';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ccf0ff';
      ctx.fillRect(p.x + 1, p.y + 1, 2, 2);
      break;
    case 'leaf':
      ctx.fillStyle = '#44aa22';
      ctx.beginPath(); ctx.ellipse(p.x + 4, p.y + 4, 4, 2, p.timer * 3, 0, Math.PI * 2); ctx.fill();
      break;
    case 'bubble':
      ctx.strokeStyle = '#66aaff';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(p.x + 5, p.y + 5, 5, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = 'rgba(100,170,255,0.2)';
      ctx.beginPath(); ctx.arc(p.x + 5, p.y + 5, 4, 0, Math.PI * 2); ctx.fill();
      break;
    case 'dark':
    case 'darkMagic':
      ctx.fillStyle = '#aa00aa';
      ctx.beginPath(); ctx.arc(p.x + 3, p.y + 3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath(); ctx.arc(p.x + 3, p.y + 3, 1.5, 0, Math.PI * 2); ctx.fill();
      TAS.particles.spawn(p.x + 3, p.y + 3, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0.15, '#cc00cc', 1);
      break;
  }
}

function drawTransformed(t) {
  var tx = t.x, ty = t.y;
  var bob = Math.sin(t.timer * 3) * 2;
  switch(t.type) {
    case 'frog':
      ctx.fillStyle = '#44cc44';
      ctx.beginPath(); ctx.ellipse(tx + 6, ty + 8 + bob, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#66ff66';
      ctx.fillRect(tx + 3, ty + 5 + bob, 2, 2);
      ctx.fillRect(tx + 8, ty + 5 + bob, 2, 2);
      break;
    case 'flower':
      ctx.fillStyle = '#228822';
      ctx.fillRect(tx + 5, ty + 6, 2, 6);
      ctx.fillStyle = '#ff66aa';
      for (var pi = 0; pi < 5; pi++) {
        var pa = (pi / 5) * Math.PI * 2 + t.timer;
        ctx.beginPath();
        ctx.arc(tx + 6 + Math.cos(pa) * 3, ty + 4 + Math.sin(pa) * 3, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(tx + 6, ty + 4, 2, 0, Math.PI * 2); ctx.fill();
      break;
    case 'snowflake':
      ctx.strokeStyle = '#aaddff';
      ctx.lineWidth = 1;
      for (var si = 0; si < 6; si++) {
        var a = (si / 6) * Math.PI * 2 + t.timer;
        ctx.beginPath();
        ctx.moveTo(tx + 6, ty + 6);
        ctx.lineTo(tx + 6 + Math.cos(a) * 5, ty + 6 + Math.sin(a) * 5);
        ctx.stroke();
      }
      break;
    case 'key':
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(tx + 2, ty + 3, 8, 3);
      ctx.fillRect(tx + 8, ty + 1, 3, 7);
      ctx.fillRect(tx + 1, ty + 2, 3, 5);
      if (Math.floor(t.timer * 4) % 2 === 0) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(tx + 4, ty, 2, 2);
      }
      break;
  }
}

function drawNPC(n) {
  var nx = n.x, ny = n.y;
  switch(n.type) {
    case 'elder':
    case 'wizard':
      ctx.fillStyle = '#4444aa';
      ctx.fillRect(nx + 2, ny + 6, 10, 14);
      ctx.fillStyle = '#6666cc';
      ctx.beginPath(); ctx.arc(nx + 7, ny + 5, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#3333aa';
      ctx.beginPath(); ctx.moveTo(nx + 3, ny + 2); ctx.lineTo(nx + 7, ny - 6); ctx.lineTo(nx + 11, ny + 2); ctx.fill();
      // Star on hat
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(nx + 6, ny - 3, 2, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(nx + 5, ny + 4, 2, 2);
      ctx.fillRect(nx + 8, ny + 4, 2, 2);
      break;
    case 'fairy':
      ctx.fillStyle = '#ffaaff';
      ctx.beginPath(); ctx.arc(nx + 6, ny + 6, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,200,255,' + (0.3 + Math.sin(frame * 0.2) * 0.2) + ')';
      ctx.beginPath(); ctx.arc(nx + 6, ny + 6, 8, 0, Math.PI * 2); ctx.fill();
      // Wings
      ctx.strokeStyle = 'rgba(255,200,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(nx + 1, ny + 5, 4, 6, -0.3, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(nx + 11, ny + 5, 4, 6, 0.3, 0, Math.PI * 2); ctx.stroke();
      break;
    case 'merman':
      ctx.fillStyle = '#22aaaa';
      ctx.fillRect(nx + 2, ny + 4, 10, 12);
      ctx.fillStyle = '#44cccc';
      ctx.beginPath(); ctx.arc(nx + 7, ny + 4, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#88ffff';
      ctx.fillRect(nx + 1, ny + 14, 12, 6);
      // Tail fin
      ctx.beginPath(); ctx.moveTo(nx + 3, ny + 20); ctx.lineTo(nx, ny + 24); ctx.lineTo(nx + 14, ny + 24); ctx.lineTo(nx + 11, ny + 20); ctx.fill();
      break;
    case 'prisoner':
      ctx.fillStyle = '#888866';
      ctx.fillRect(nx + 2, ny + 6, 10, 14);
      ctx.fillStyle = '#aaaa88';
      ctx.beginPath(); ctx.arc(nx + 7, ny + 5, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(nx + 2, ny + 8); ctx.lineTo(nx + 12, ny + 8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(nx + 2, ny + 12); ctx.lineTo(nx + 12, ny + 12); ctx.stroke();
      break;
    case 'smith':
      ctx.fillStyle = '#884422';
      ctx.fillRect(nx + 2, ny + 5, 12, 15);
      ctx.fillStyle = '#aa6644';
      ctx.beginPath(); ctx.arc(nx + 8, ny + 4, 5, 0, Math.PI * 2); ctx.fill();
      // Hammer with reactor glow
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(nx + 13, ny + 6, 3, 8);
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(nx + 12, ny + 4, 5, 3);
      break;
  }
  // Exclamation with glow
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('!', nx + 5, ny - 6 + Math.sin(frame * 0.1) * 2);
}

function drawPickup(pk) {
  var bob = Math.sin(frame * 0.08 + pk.x) * 2;
  switch(pk.type) {
    case 'sporeOrb':
      ctx.fillStyle = '#44ff44';
      ctx.beginPath(); ctx.arc(pk.x + 5, pk.y + 5 + bob, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#88ff88';
      ctx.beginPath(); ctx.arc(pk.x + 4, pk.y + 4 + bob, 2, 0, Math.PI * 2); ctx.fill();
      // Sparkle
      ctx.fillStyle = 'rgba(68,255,68,' + (0.3 + Math.sin(frame * 0.15 + pk.x) * 0.3) + ')';
      ctx.beginPath(); ctx.arc(pk.x + 5, pk.y + 5 + bob, 6, 0, Math.PI * 2); ctx.fill();
      break;
    case 'healthPotion':
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(pk.x + 3, pk.y + 3 + bob, 6, 8);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(pk.x + 4, pk.y + bob, 4, 4);
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(pk.x + 5, pk.y + 5 + bob, 2, 4);
      break;
    case 'magicPotion':
      ctx.fillStyle = '#4444ff';
      ctx.fillRect(pk.x + 3, pk.y + 3 + bob, 6, 8);
      ctx.fillStyle = '#aaaaff';
      ctx.fillRect(pk.x + 4, pk.y + bob, 4, 4);
      // Bubbles
      ctx.fillStyle = '#8888ff';
      ctx.fillRect(pk.x + 4, pk.y + 5 + bob + Math.sin(frame * 0.1) * 2, 2, 2);
      break;
    case 'shield':
      ctx.fillStyle = '#66aaff';
      ctx.beginPath();
      ctx.moveTo(pk.x + 5, pk.y + bob);
      ctx.lineTo(pk.x + 10, pk.y + 3 + bob);
      ctx.lineTo(pk.x + 10, pk.y + 8 + bob);
      ctx.lineTo(pk.x + 5, pk.y + 11 + bob);
      ctx.lineTo(pk.x, pk.y + 8 + bob);
      ctx.lineTo(pk.x, pk.y + 3 + bob);
      ctx.fill();
      // Emblem
      ctx.fillStyle = '#aaddff';
      ctx.fillRect(pk.x + 4, pk.y + 4 + bob, 2, 4);
      break;
    case 'mushroomCap':
      ctx.fillStyle = '#cc4444';
      ctx.beginPath(); ctx.arc(pk.x + 5, pk.y + 4 + bob, 5, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#ffcc88';
      ctx.fillRect(pk.x + 3, pk.y + 4 + bob, 4, 5);
      // Spots
      ctx.fillStyle = '#fff';
      ctx.fillRect(pk.x + 3, pk.y + 2 + bob, 2, 2);
      ctx.fillRect(pk.x + 7, pk.y + 1 + bob, 2, 2);
      break;
    case 'reactorShard':
      ctx.fillStyle = '#8844ff';
      ctx.beginPath();
      ctx.moveTo(pk.x + 5, pk.y + bob);
      ctx.lineTo(pk.x + 9, pk.y + 5 + bob);
      ctx.lineTo(pk.x + 7, pk.y + 5 + bob);
      ctx.lineTo(pk.x + 8, pk.y + 11 + bob);
      ctx.lineTo(pk.x + 3, pk.y + 6 + bob);
      ctx.lineTo(pk.x + 5, pk.y + 6 + bob);
      ctx.fill();
      // Glow
      ctx.fillStyle = 'rgba(136,68,255,' + (0.2 + Math.sin(frame * 0.1) * 0.2) + ')';
      ctx.beginPath(); ctx.arc(pk.x + 5, pk.y + 5 + bob, 7, 0, Math.PI * 2); ctx.fill();
      break;
    case 'heartUp':
      // Pulsing heart
      var pulse = 1 + Math.sin(frame * 0.15) * 0.15;
      ctx.fillStyle = '#ff66aa';
      ctx.save();
      ctx.translate(pk.x + 5, pk.y + 5 + bob);
      ctx.scale(pulse, pulse);
      ctx.beginPath();
      ctx.arc(-2, -2, 3, Math.PI, 0);
      ctx.arc(2, -2, 3, Math.PI, 0);
      ctx.lineTo(5, 0);
      ctx.lineTo(0, 5);
      ctx.lineTo(-5, 0);
      ctx.fill();
      ctx.restore();
      break;
  }
}

// ============================================================
// BACKGROUND DRAWING (Tasern-themed zones)
// ============================================================
function drawBackground() {
  var theme = STAGE_THEMES[stage];
  // Sky gradient
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(1, theme.bg);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  if (stage === 0 || stage === 1) {
    // Giant mushroom trees
    for (var i = 0; i < 5; i++) {
      var tx = 30 + i * 100 + Math.sin(i * 2.5) * 20;
      // Stem
      ctx.fillStyle = '#3a2211';
      ctx.fillRect(tx - 1, GH - 80, 8, 48);
      // Mushroom cap
      ctx.fillStyle = stage === 1 ? '#116633' : '#337722';
      ctx.beginPath(); ctx.arc(tx + 3, GH - 82, 18, Math.PI, 0); ctx.fill();
      ctx.fillRect(tx - 15, GH - 82, 36, 6);
      // Spots
      ctx.fillStyle = stage === 1 ? '#22aa44' : '#55aa33';
      ctx.fillRect(tx - 5, GH - 88, 3, 3);
      ctx.fillRect(tx + 7, GH - 86, 3, 3);
      // Bioluminescent dots
      ctx.fillStyle = 'rgba(68,255,68,' + (0.2 + Math.sin(frame * 0.02 + i) * 0.15) + ')';
      ctx.beginPath(); ctx.arc(tx - 8, GH - 78, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(tx + 14, GH - 76, 2, 0, Math.PI * 2); ctx.fill();
    }
    // Ground mycelium network
    ctx.strokeStyle = 'rgba(68,255,68,0.08)';
    ctx.lineWidth = 1;
    for (var i = 0; i < 8; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 60, GH - 32);
      ctx.quadraticCurveTo(i * 60 + 30, GH - 40 - Math.sin(i) * 10, (i + 1) * 60, GH - 32);
      ctx.stroke();
    }
  } else if (stage === 2) {
    // Crystal mountains
    ctx.fillStyle = '#3a4455';
    ctx.beginPath();
    ctx.moveTo(0, GH - 60);
    ctx.lineTo(80, GH - 140);
    ctx.lineTo(160, GH - 80);
    ctx.lineTo(250, GH - 160);
    ctx.lineTo(350, GH - 90);
    ctx.lineTo(430, GH - 130);
    ctx.lineTo(GW, GH - 70);
    ctx.lineTo(GW, GH);
    ctx.lineTo(0, GH);
    ctx.fill();
    // Snow caps
    ctx.fillStyle = '#ccddee';
    ctx.beginPath(); ctx.arc(80, GH - 140, 10, Math.PI, 0); ctx.fill();
    ctx.beginPath(); ctx.arc(250, GH - 160, 12, Math.PI, 0); ctx.fill();
    // Crystal formations
    for (var i = 0; i < 4; i++) {
      var cx = 60 + i * 120;
      ctx.fillStyle = 'rgba(136,204,255,' + (0.2 + Math.sin(frame * 0.03 + i) * 0.1) + ')';
      ctx.beginPath();
      ctx.moveTo(cx, GH - 50);
      ctx.lineTo(cx + 5, GH - 70 - i * 5);
      ctx.lineTo(cx + 10, GH - 50);
      ctx.fill();
    }
  } else if (stage === 3) {
    // Sunken reactor — water + reactor glow
    ctx.fillStyle = 'rgba(30,60,120,0.3)';
    ctx.fillRect(0, 0, GW, GH);
    // Reactor glow from below
    ctx.fillStyle = 'rgba(68,136,255,' + (0.05 + Math.sin(frame * 0.04) * 0.03) + ')';
    ctx.beginPath(); ctx.arc(GW / 2, GH + 20, 120, 0, Math.PI * 2); ctx.fill();
    // Bubbles
    for (var i = 0; i < 10; i++) {
      var bx = (i * 67 + frame * 0.3) % GW;
      var by = GH - ((i * 43 + frame * 0.5) % GH);
      ctx.strokeStyle = 'rgba(100,180,255,0.3)';
      ctx.beginPath(); ctx.arc(bx, by, 3 + i % 3, 0, Math.PI * 2); ctx.stroke();
    }
    // Underwater debris
    ctx.fillStyle = 'rgba(40,80,160,0.15)';
    for (var i = 0; i < 3; i++) {
      ctx.fillRect(50 + i * 150, GH - 50, 30, 20);
    }
  } else if (stage === 4 || stage === 5 || stage === 6 || stage === 7) {
    // Spore fortress / reactor tower
    for (var i = 0; i < 3; i++) {
      var bx = 50 + i * 170;
      ctx.fillStyle = theme.ground;
      ctx.fillRect(bx, GH - 120 - i * 20, 40, 120 + i * 20);
      // Battlements with spore tips
      for (var j = 0; j < 4; j++) {
        ctx.fillRect(bx + j * 10, GH - 130 - i * 20, 7, 10);
        // Spore glow on top
        if (stage >= 6) {
          ctx.fillStyle = 'rgba(170,100,255,' + (0.3 + Math.sin(frame * 0.05 + j) * 0.2) + ')';
          ctx.beginPath(); ctx.arc(bx + j * 10 + 3, GH - 132 - i * 20, 2, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = theme.ground;
        }
      }
      // Window with reactor glow
      ctx.fillStyle = stage >= 6 ? '#442266' : '#220000';
      ctx.fillRect(bx + 15, GH - 100 - i * 20, 10, 14);
      ctx.fillStyle = stage >= 6 ? '#aa66ff' : '#ffaa00';
      if (Math.sin(frame * 0.05 + i) > 0) {
        ctx.fillRect(bx + 17, GH - 98 - i * 20, 6, 10);
      }
    }
    // Mycelial veins on walls (stage 7)
    if (stage === 7) {
      ctx.strokeStyle = 'rgba(255,0,100,0.12)';
      ctx.lineWidth = 1;
      for (var i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 80, GH);
        ctx.quadraticCurveTo(i * 80 + 40 + Math.sin(frame * 0.02 + i) * 10, GH - 60, i * 80 + 80, GH);
        ctx.stroke();
      }
    }
  }
}

function drawPlatforms() {
  var theme = STAGE_THEMES[stage];
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'ground') {
      ctx.fillStyle = theme.ground;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, 3);
      if (stage < 4) {
        for (var j = 0; j < p.w; j += 12) {
          ctx.fillStyle = '#44aa33';
          ctx.fillRect(p.x + j, p.y - 3, 3, 4);
          ctx.fillRect(p.x + j + 5, p.y - 2, 2, 3);
        }
      }
    } else if (p.type === 'ice') {
      ctx.fillStyle = '#aaccee';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ddeeff';
      ctx.fillRect(p.x + 2, p.y, p.w - 4, 2);
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(p.x + 4, p.y + 1, 6, 1);
    } else if (p.type === 'crystal') {
      ctx.fillStyle = '#88aaff';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = 'rgba(136,170,255,' + (0.3 + Math.sin(frame * 0.05) * 0.2) + ')';
      ctx.fillRect(p.x - 2, p.y - 2, p.w + 4, p.h + 4);
    } else if (p.type === 'mushroom') {
      // Mushroom platform
      ctx.fillStyle = '#cc4444';
      ctx.beginPath();
      ctx.arc(p.x + p.w / 2, p.y + 2, p.w / 2, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x + p.w / 4, p.y - 2, 3, 3);
      ctx.fillRect(p.x + p.w * 3 / 4 - 2, p.y - 1, 3, 3);
      ctx.fillStyle = '#aa8866';
      ctx.fillRect(p.x + p.w / 2 - 3, p.y + 2, 6, 6);
    } else if (p.type === 'door') {
      ctx.fillStyle = '#553311';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#aa8844';
      ctx.fillRect(p.x + 4, p.y + 10, 8, 8);
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.arc(p.x + 8, p.y + 25, 3, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'toxic') {
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // Bubble effect
      ctx.fillStyle = '#88ff44';
      ctx.beginPath(); ctx.arc(p.x + p.w / 3, p.y - 1 - Math.abs(Math.sin(frame * 0.1)) * 3, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(p.x + p.w * 2 / 3, p.y - 2 - Math.abs(Math.cos(frame * 0.08)) * 3, 1.5, 0, Math.PI * 2); ctx.fill();
    } else if (p.type === 'vent') {
      ctx.fillStyle = '#666';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // Steam
      if (Math.sin(frame * 0.06) > 0) {
        for (var vi = 0; vi < 3; vi++) {
          ctx.fillStyle = 'rgba(200,200,200,' + (0.2 - vi * 0.05) + ')';
          ctx.beginPath(); ctx.arc(p.x + p.w / 2 + (Math.random() - 0.5) * 6, p.y - 5 - vi * 8, 3, 0, Math.PI * 2); ctx.fill();
        }
      }
    } else if (p.type === 'reactorDebris') {
      ctx.fillStyle = '#334455';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = 'rgba(68,136,255,' + (0.3 + Math.sin(frame * 0.06) * 0.2) + ')';
      ctx.fillRect(p.x + 4, p.y + 4, p.w - 8, p.h - 8);
    } else {
      ctx.fillStyle = theme.accent;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = theme.ground;
      ctx.fillRect(p.x + 1, p.y + 2, p.w - 2, p.h - 2);
    }
  }
}

// ============================================================
// HUD (stat-aware)
// ============================================================
function drawHUD() {
  // Hearts
  for (var i = 0; i < maxHearts; i++) {
    ctx.fillStyle = i < hearts ? '#ff2222' : '#333';
    ctx.beginPath();
    var hx = 10 + i * 16, hy = 10;
    ctx.arc(hx + 3, hy + 3, 3, Math.PI, 0);
    ctx.arc(hx + 9, hy + 3, 3, Math.PI, 0);
    ctx.lineTo(hx + 12, hy + 4);
    ctx.lineTo(hx + 6, hy + 11);
    ctx.lineTo(hx, hy + 4);
    ctx.fill();
  }

  // Magic meter
  ctx.fillStyle = '#222';
  ctx.fillRect(10, 22, 60, 6);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(10, 22, 60 * (magic / MAGIC_MAX), 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 22, 60, 6);

  // Active spell with cost
  if (spells.length > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    var spellCost = Math.floor(MAGIC_COSTS[spells[activeSpell]] * SPELL_COST_MULT);
    ctx.fillText(SPELL_NAMES[spells[activeSpell]] + ' (' + spellCost + ')', 10, 38);
  }

  // Sword level
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  var swordName = swordLevel === 0 ? 'MYCELIAL' : (swordLevel === 1 ? 'SPORE-FORGED' : 'REACTOR');
  ctx.fillText('SWD:' + swordName, 10, 48);

  // Baseling name + level
  ctx.fillStyle = statB.color;
  ctx.font = '8px monospace';
  ctx.fillText(statB.name + ' Lv.' + statB.level, 10, 58);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE:' + score, GW - 10, 14);
  ctx.fillText('LIVES:' + lives, GW - 10, 26);
  ctx.textAlign = 'left';

  // Stage name
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGE_THEMES[stage].name + ' ' + (screenIdx + 1) + '/' + screensPerStage[stage], GW / 2, 12);
  ctx.textAlign = 'left';

  // Mini-map
  var mmX = GW - 80, mmY = 34, mmW = 70, mmH = 10;
  ctx.fillStyle = '#222';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  var totalScreens = 0;
  for (var i = 0; i < STAGE_COUNT; i++) totalScreens += screensPerStage[i];
  var currentScreen = 0;
  for (var i = 0; i < stage; i++) currentScreen += screensPerStage[i];
  currentScreen += screenIdx;
  var progW = (currentScreen / totalScreens) * mmW;
  ctx.fillStyle = statB.color;
  ctx.fillRect(mmX, mmY, progW, mmH);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(mmX, mmY, mmW, mmH);
  var acc = 0;
  for (var i = 0; i < STAGE_COUNT; i++) {
    acc += screensPerStage[i];
    var mx = mmX + (acc / totalScreens) * mmW;
    ctx.fillStyle = '#888';
    ctx.fillRect(mx, mmY, 1, mmH);
  }

  // Shield indicator
  if (shieldTimer > 0) {
    ctx.fillStyle = '#66aaff';
    ctx.font = '8px monospace';
    ctx.fillText('SHIELD:' + Math.ceil(shieldTimer), GW - 80, 56);
  }

  // Combo indicator in HUD
  if (comboCount >= 3) {
    ctx.fillStyle = comboCount >= 10 ? '#ff4444' : (comboCount >= 6 ? '#ffaa00' : '#ffcc00');
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('COMBO x' + comboCount, GW - 10, 56);
    ctx.textAlign = 'left';
  }
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawAmbientParticles();
  drawPlatforms();

  for (var i = 0; i < transformedObjs.length; i++) drawTransformed(transformedObjs[i]);
  for (var i = 0; i < npcs.length; i++) drawNPC(npcs[i]);
  for (var i = 0; i < pickups.length; i++) drawPickup(pickups[i]);
  for (var i = 0; i < enemies.length; i++) drawEnemy(enemies[i]);

  if (bossActive) drawBoss();

  drawPlayer();

  for (var i = 0; i < projectiles.length; i++) drawProjectile(projectiles[i]);

  TAS.particles.draw();
  drawScorePopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  drawHUD();

  // Dialog
  if (dialogTimer > 0 && dialogText) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(40, GH - 60, GW - 80, 40);
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    ctx.strokeRect(40, GH - 60, GW - 80, 40);
    // Decorative corners
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(40, GH - 60, 4, 4);
    ctx.fillRect(GW - 44, GH - 60, 4, 4);
    ctx.fillRect(40, GH - 24, 4, 4);
    ctx.fillRect(GW - 44, GH - 24, 4, 4);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dialogText, GW / 2, GH - 36);
    ctx.textAlign = 'left';
  }

  // Tutorial overlay
  if (tutorialTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, tutorialTimer * 0.2) + ')';
    ctx.fillRect(60, 60, GW - 120, 200);
    ctx.strokeStyle = statB.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(60, 60, GW - 120, 200);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HOW TO PLAY', GW / 2, 85);
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.fillText('ARROWS = Move & Jump', GW / 2, 110);
    ctx.fillText('Z = Sword Attack', GW / 2, 125);
    ctx.fillText('X = Cast Spell', GW / 2, 140);
    ctx.fillText('C = Cycle Spells', GW / 2, 155);
    ctx.fillStyle = '#aaa';
    ctx.fillText('Reclaim the garden seeds stolen by', GW / 2, 180);
    ctx.fillText('the Dark Mycologist of the Spore Grove!', GW / 2, 195);
    ctx.fillStyle = statB.color;
    ctx.fillText('Your baseling\'s stats affect gameplay!', GW / 2, 220);
    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    ctx.fillText('Press any key to dismiss', GW / 2, 245);
    ctx.textAlign = 'left';
    // Dismiss on key
    if (Object.values(TAS.input.keys).some(Boolean)) tutorialTimer = Math.min(tutorialTimer, 0.3);
  }

  // Transition fade
  if (transitionTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,' + Math.min(1, transitionTimer) + ')';
    ctx.fillRect(0, 0, GW, GH);
    if (transitionTimer > 0.5) {
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(STAGE_THEMES[stage].name, GW / 2, GH / 2 - 16);
      ctx.fillStyle = '#888';
      ctx.font = '9px monospace';
      ctx.fillText(STAGE_THEMES[stage].desc, GW / 2, GH / 2 + 4);
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.fillText('Stage ' + (stage + 1) + '-' + (screenIdx + 1), GW / 2, GH / 2 + 22);
      ctx.textAlign = 'left';
    }
  }

  // Zone transition flash
  if (zoneTransAlpha > 0) {
    ctx.fillStyle = 'rgba(255,255,255,' + Math.min(0.3, zoneTransAlpha * 0.2) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Stage complete
  if (stageComplete) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 16);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('+' + Math.round(200 * SCORE_MULT) + ' SCORE', GW / 2, GH / 2 + 4);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.fillText('The grove mold recedes... POOP collected!', GW / 2, GH / 2 + 22);
    ctx.textAlign = 'left';
  }

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// TITLE / GAME OVER / VICTORY SCREENS
// ============================================================

  grad.addColorStop(0, '#2a1040');
  grad.addColorStop(1, '#1a1c2c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }

  // Sparkles

  }

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE GROVE', GW / 2, 75);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';

    ctx.lineTo(GW / 2, 114);
    ctx.lineTo(GW / 2 + 5, 123);

    ctx.fillRect(GW / 2 - 1, 117, 2, 2);

    ctx.fillRect(GW / 2 + 1, 126, 2, 2);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Your baseling must rescue the stolen', GW / 2, 165);

  // Selected baseling name + 5 arcade stat bars (Base-blue accent)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 198);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW / 2 - 110;
    ctx.font = '8px monospace';
    for (var _si = 0; _si < _keys.length; _si++) {
      var _mm = _meta[_keys[_si]], _v = _sel.stats[_keys[_si]], _bx = _x0 + _si * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 210);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 213, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 213, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, 228);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 244);

  if (localStorage.getItem(SAVE_KEY)) {
    ctx.fillStyle = '#88ff88';
    ctx.font = '9px monospace';
    ctx.fillText('(Save data found - will resume)', GW / 2, 258);
  }

  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS=Move  Z=Sword  X=Magic  C=Cycle Spell', GW / 2, 285);
  ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 300);
  ctx.textAlign = 'left';
}

function drawGameOverScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  // Death particles
  for (var i = 0; i < 15; i++) {
    var sx = (i * 37 + frame * 0.2) % GW;
    var sy = GH - ((i * 29 + frame * 0.3) % (GH / 2));
    ctx.fillStyle = 'rgba(230,72,46,' + (0.1 + Math.sin(frame * 0.03 + i) * 0.08) + ')';
    ctx.fillRect(sx, sy, 2, 2);
  }

  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GW / 2, 90);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('The root parasites have claimed your baseling...', GW / 2, 115);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + score, GW / 2, 145);
  ctx.fillText('High Score: ' + highScore, GW / 2, 165);
  ctx.fillText('Stage: ' + STAGE_THEMES[stage].name, GW / 2, 185);

  // Stats summary
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Your baseling ' + statB.name + ' fought bravely.', GW / 2, 210);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Press any key to continue', GW / 2, 250);
  ctx.textAlign = 'left';
}

function drawVictoryScreen() {
  var grad = ctx.createRadialGradient(GW / 2, GH / 2, 10, GW / 2, GH / 2, 200);
  grad.addColorStop(0, '#221144');
  grad.addColorStop(1, '#1a1c2c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Sparkles
  for (var i = 0; i < 35; i++) {
    var sx = (i * 37 + frame) % GW;
    var sy = (i * 23 + frame * 0.3) % GH;
    ctx.fillStyle = ['#f4b41b', '#a855f7', '#38d973', '#3cacd7', statB.color][i % 5];
    ctx.fillRect(sx, sy, 3, 3);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GW / 2, 55);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('The Dark Mycologist is defeated!', GW / 2, 85);
  ctx.fillText('The garden seeds are restored!', GW / 2, 105);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('The Spore Grove flourishes once more.', GW / 2, 125);

  ctx.fillStyle = '#a855f7';
  ctx.font = '12px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 155);
  ctx.fillText('High Score: ' + highScore, GW / 2, 175);

  // Baby baselings celebrating with varied colors
  for (var i = 0; i < 5; i++) {
    var bx = GW / 2 - 60 + i * 30;
    var by = 205 + Math.sin(frame * 0.1 + i) * 5;
    ctx.fillStyle = ['#ff88aa', '#88ff88', '#88aaff', '#ffcc44', '#cc88ff'][i];
    ctx.beginPath(); ctx.arc(bx, by, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = adjustColor(['#ff88aa', '#88ff88', '#88aaff', '#ffcc44', '#cc88ff'][i], -40);
    ctx.beginPath(); ctx.arc(bx, by - 3, 3, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(bx - 1, by - 2, 2, 2);
    ctx.fillRect(bx + 1, by - 2, 2, 2);
  }

  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText('Your baseling ' + statB.name + ' is victorious!', GW / 2, 240);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Press any key to return to title', GW / 2, 270);
  ctx.textAlign = 'left';
}

TAS.loop.start(update, draw);

})();
