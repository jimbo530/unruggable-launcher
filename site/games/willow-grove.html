<script>
(function(){
"use strict";

// ============================================================
// BASELING STAT INTEGRATION (NftLoader)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move/jump, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM->swim speed in underwater sections (this game has water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[willow-grove] NftLoader display info failed:', e && e.message); }
var swimMult = 1; // SWM -> underwater swim speed (set in recomputeStats)
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  swimMult = m.swim;
  // Recompute the cached gameplay constants so a title-screen pick takes effect.
  if (typeof dexMod !== 'undefined') {
    dexMod = (statB.dex - 10) / 10; strMod = (statB.str - 10) / 10; conMod = (statB.con - 10) / 10;
    intMod = (statB.int - 10) / 10; wisMod = (statB.wis - 10) / 10; chaMod = (statB.cha - 10) / 10;
    JUMP_VEL = -320 - dexMod * 30;
    WALK_SPEED = 110 + dexMod * 25;
    SWIM_SPEED = (70 + dexMod * 15) * swimMult; // SWM scales underwater speed
  }
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[willow-grove] player init failed:', e && e.message); });
}

// Stat helpers — all 6 D&D stats wired
// [1] STR: melee damage, sword knockback, boss stagger
// [2] DEX: walk speed, dodge chance, critical hit chance, arrow rain dodge
// [3] CON: max hearts, lives, damage reduction, poison resist
// [4] INT: magic pool, spell damage, magic regen rate, transform range
// [5] WIS: spell efficiency (lower cost), shield duration, XP bonus, pickup magnetism
// [6] CHA: NPC gift quality, shop prices, score multiplier, enemy pacify chance
var strMod = (statB.str - 10) / 10;   // -1.0 to +2.0 range
var dexMod = (statB.dex - 10) / 10;
var conMod = (statB.con - 10) / 10;
var intMod = (statB.int - 10) / 10;
var wisMod = (statB.wis - 10) / 10;
var chaMod = (statB.cha - 10) / 10;

// ============================================================
// CONSTANTS (stat-influenced)
// ============================================================
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'MAGIC', c: 'PICK' } });

var TILE = 16;
var GRAVITY = 850;
var JUMP_VEL = -320 - dexMod * 30;                  // [2] DEX: higher jump
var WALK_SPEED = 110 + dexMod * 25;                  // [2] DEX: faster walk
var SWIM_SPEED = 70 + dexMod * 15;                   // [2] DEX: faster swim
var SWORD_DUR = 0.25 / Math.max(0.5, statB.cooldown);// cooldown stat
var SWORD_RANGE = [28, 38, 50];
var SWORD_DMG_BONUS = Math.floor(strMod * 2);         // [1] STR: extra melee dmg
var MAGIC_MAX = 100 + Math.floor(intMod * 40);        // [4] INT: bigger pool
var MAGIC_REGEN = 5 + intMod * 3;                     // [4] INT: faster regen
var MAGIC_COSTS = [20, 30, 35, 50];
var SPELL_NAMES = ['SPOREBOLT', 'COMPOST RAIN', 'MYCELIATE', 'FUNGAL FIRE'];
var STAGE_COUNT = 8;
var SAVE_KEY = 'spore_grove_save';
var CRIT_CHANCE = 0.05 + dexMod * 0.08;               // [2] DEX: crit chance
var DODGE_CHANCE = dexMod * 0.05;                      // [2] DEX: dodge hits
var SCORE_MULT = statB.scoreMult * (1 + chaMod * 0.15);// [6] CHA: score bonus
var TRANSFORM_RANGE = 150 + Math.floor(intMod * 50);   // [4] INT: transform range
var SHIELD_DUR_BONUS = wisMod * 3;                      // [5] WIS: shield lasts longer
var PICKUP_MAGNET = 20 + Math.floor(wisMod * 15);       // [5] WIS: pickup magnetism
var PACIFY_CHANCE = chaMod * 0.04;                       // [6] CHA: pacify enemies
var XP_MULT = 1 + wisMod * 0.1;                          // [5] WIS: XP/score bonus on kills
var SPELL_COST_MULT = Math.max(0.5, 1 - wisMod * 0.1);   // [5] WIS: cheaper spells
var DMG_REDUCTION = conMod * 0.15;                         // [3] CON: damage reduction

// ============================================================
// GAME STATE
// ============================================================
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('sporegrove_hi');
var showTutorial = !localStorage.getItem('spore_tut_seen');
var tutorialTimer = 0;

var player = {};
var enemies = [];
var platforms = [];
var projectiles = [];
var pickups = [];
var particles = [];
var npcs = [];
var transformedObjs = [];
var arrowRain = [];
var scorePopups = [];
var ambientParticles = [];

var stage = 0;
var screenIdx = 0;
var screensPerStage = [2, 3, 3, 3, 3, 4, 4, 3];
var lives = 3 + statB.lives + Math.floor(conMod);     // [3] CON: extra lives
var hearts = 3;
var maxHearts = 3 + Math.floor(conMod);                // [3] CON: extra hearts
var magic = MAGIC_MAX;
var swordLevel = 0;
var spells = [];
var activeSpell = 0;
var camX = 0;
var stageWidth = 0;
var bossActive = false;
var boss = null;
var stageComplete = false;
var stageCompleteTimer = 0;
var deathTimer = 0;
var invTimer = 0;
var shieldTimer = 0;
var underwater = false;
var dialogText = '';
var dialogTimer = 0;
var transitionTimer = 0;
var transitionDir = 0;
var flashTimer = 0;
var shakeTimer = 0;
var shakeAmt = 0;
var comboCount = 0;
var comboTimer = 0;
var bossDialogShown = {};
var zoneTransAlpha = 0;

// ============================================================
// STAGE THEMES (Tasern-flavored)
// ============================================================
var STAGE_THEMES = [
  { name: 'POOP Fields', bg: '#1a1c2c', ground: '#3a5520', accent: '#38d973', sky: '#1a3322',
    desc: 'The garden outskirts where baselings forage', ambient: '#38d973' },
  { name: 'Enchanted Spore Grove', bg: '#0a1a0a', ground: '#224411', accent: '#38d973', sky: '#0a2a10',
    desc: 'Ancient fungi tower over the mycelium network', ambient: '#88ff88' },
  { name: 'Crystal Ridge', bg: '#1a1c2c', ground: '#4a5566', accent: '#3cacd7', sky: '#1a2535',
    desc: 'Frozen spore gems hum with reactor energy', ambient: '#3cacd7' },
  { name: 'Sunken Reactor', bg: '#0a0a20', ground: '#1a2244', accent: '#3cacd7', sky: '#050510',
    desc: 'A flooded reactor core leaking garden seeds', ambient: '#4488ff' },
  { name: 'Root Parasite Gate', bg: '#1a1c2c', ground: '#7a444a', accent: '#e6482e', sky: '#200808',
    desc: 'The outer walls crawl with root parasites', ambient: '#e6482e' },
  { name: 'Fungal Dungeons', bg: '#0a0808', ground: '#7a444a', accent: '#f4b41b', sky: '#0a0606',
    desc: 'Captured baselings feed the compost machines', ambient: '#f4b41b' },
  { name: 'Reactor Tower', bg: '#140a1a', ground: '#332244', accent: '#a855f7', sky: '#1a0a20',
    desc: 'The tower channels POOP into dark spore energy', ambient: '#a855f7' },
  { name: 'Throne of Mycosis', bg: '#1a0010', ground: '#440022', accent: '#e6482e', sky: '#200015',
    desc: 'Where the Dark Mycologist hoards all the POOP', ambient: '#ff0066' }
];

// ============================================================
// BOSS DIALOG
// ============================================================
var BOSS_DIALOG = {
  forestGuardian: 'THE GROVE MOLD GUARDIAN AWAKENS!',
  lakeSerpent: 'THE REACTOR SERPENT STIRS FROM THE DEEP!',
  dungeonWarden: 'THE WILLOW SPORE WARDEN GUARDS THE COMPOST!',
  darkQueen: 'THE DARK MYCOLOGIST REVEALS HER TRUE FORM!'
};

// ============================================================
// SEEDED RNG
// ============================================================
var rngSeed = 42;
function seedRng(s) { rngSeed = s; }
function rng() { rngSeed = (rngSeed * 1664525 + 1013904223) & 0x7FFFFFFF; return rngSeed / 0x7FFFFFFF; }

// ============================================================
// AUDIO
// ============================================================
function sfxJump() { TAS.audio.playTone(280, 0.1, 'square', 0.08, 420); }
function sfxSword() { TAS.audio.playTone(180, 0.08, 'sawtooth', 0.1, 90); }
function sfxHit() { TAS.audio.playTone(120, 0.15, 'square', 0.12, 60); }
function sfxMagic() { TAS.audio.playTone(440, 0.3, 'sine', 0.1, 880); }
function sfxTransform() { TAS.audio.playTone(660, 0.4, 'sine', 0.08, 1320); }
function sfxPickup() { TAS.audio.playTone(520, 0.1, 'square', 0.08, 780); }
function sfxBossHit() { TAS.audio.playTone(80, 0.2, 'sawtooth', 0.15, 40); }
function sfxDeath() { TAS.audio.playTone(200, 0.5, 'sawtooth', 0.15, 50); }
function sfxThunder() { TAS.audio.playTone(60, 0.4, 'sawtooth', 0.2, 30); }
function sfxBombard() { TAS.audio.playTone(100, 0.3, 'square', 0.15, 50); }
function sfxNockmaar() { TAS.audio.playTone(150, 0.5, 'sawtooth', 0.2, 300); }
function sfxCrit() { TAS.audio.playTone(600, 0.15, 'square', 0.1, 900); }
function sfxDodge() { TAS.audio.playTone(400, 0.08, 'sine', 0.06, 600); }
function sfxCombo() { TAS.audio.playTone(500, 0.12, 'square', 0.08, 750); }
function sfxPacify() { TAS.audio.playTone(350, 0.3, 'sine', 0.1, 700); }
function sfxLevelUp() { TAS.audio.playTone(440, 0.15, 'square', 0.08, 660); TAS.audio.playTone(660, 0.2, 'square', 0.06, 880); }

// ============================================================
// SCORE POPUPS
// ============================================================
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffcc00', timer: 1.2, vy: -40 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt;
    p.timer -= dt;
    if (p.timer <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.timer / 0.3);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// AMBIENT PARTICLES
// ============================================================
function spawnAmbientParticles() {
  ambientParticles = [];
  var theme = STAGE_THEMES[stage];
  for (var i = 0; i < 15; i++) {
    ambientParticles.push({
      x: Math.random() * GW, y: Math.random() * GH,
      vx: (Math.random() - 0.5) * 10, vy: -5 - Math.random() * 10,
      size: 1 + Math.random() * 2, color: theme.ambient,
      alpha: 0.2 + Math.random() * 0.3, phase: Math.random() * 6.28
    });
  }
}

function updateAmbientParticles(dt) {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    p.x += p.vx * dt + Math.sin(frame * 0.02 + p.phase) * 5 * dt;
    p.y += p.vy * dt;
    if (p.y < -10) { p.y = GH + 5; p.x = Math.random() * GW; }
    if (p.x < -10) p.x = GW + 5;
    if (p.x > GW + 10) p.x = -5;
  }
}

function drawAmbientParticles() {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    ctx.globalAlpha = p.alpha * (0.5 + Math.sin(frame * 0.03 + p.phase) * 0.5);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// PLAYER INIT
// ============================================================
function resetPlayer() {
  player = {
    x: 40, y: 200, vx: 0, vy: 0, w: 14, h: 22,
    dir: 1, onGround: false, swordTimer: 0,
    dead: false, swimming: false, runFrame: 0
  };
}

// ============================================================
// LEVEL GENERATION (Tasern-themed)
// ============================================================
function generateStage(stageNum, screenNum) {
  platforms = [];
  enemies = [];
  projectiles = [];
  pickups = [];
  npcs = [];
  transformedObjs = [];
  arrowRain = [];

  seedRng(stageNum * 1000 + screenNum * 77 + 13);
  var floorY = GH - 32;
  stageWidth = GW;
  var isLast = screenNum === screensPerStage[stageNum] - 1;

  // Ground
  platforms.push({ x: 0, y: floorY, w: stageWidth, h: 32, type: 'ground' });

  if (stageNum === 0) { // POOP Fields
    platforms.push({ x: 80, y: floorY - 40, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 200, y: floorY - 70, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 340, y: floorY - 50, w: 60, h: 8, type: 'plat' });
    if (screenNum === 0) {
      npcs.push({ x: 350, y: floorY - 24, type: 'elder', msg: 'Take this mycelial blade, brave baseling!', gives: 'sword' });
      enemies.push(createEnemy('sporeling', 150, floorY - 16));
      enemies.push(createEnemy('sporeling', 260, floorY - 16));
    } else {
      for (var i = 0; i < 3 + screenNum; i++) {
        enemies.push(createEnemy(rng() < 0.5 ? 'sporeling' : 'goblin', 80 + rng() * 340, floorY - 16));
      }
      pickups.push({ x: 200 + rng() * 100, y: floorY - 80, type: 'sporeOrb' });
    }
    // Tasern hazard: toxic puddles
    if (screenNum > 0) {
      platforms.push({ x: 130 + rng() * 100, y: floorY - 2, w: 30, h: 4, type: 'toxic' });
    }
  } else if (stageNum === 1) { // Enchanted Spore Grove
    platforms.push({ x: 40, y: floorY - 55, w: 50, h: 8, type: 'plat' });
    platforms.push({ x: 140, y: floorY - 95, w: 60, h: 8, type: 'mushroom' });
    platforms.push({ x: 260, y: floorY - 65, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 360, y: floorY - 110, w: 50, h: 8, type: 'mushroom' });
    if (screenNum === 0) {
      npcs.push({ x: 400, y: floorY - 24, type: 'fairy', msg: 'Sporebolt unlocked! Channel the grove!', gives: 'thunder' });
    }
    for (var i = 0; i < 3 + screenNum; i++) {
      var t = rng() < 0.4 ? 'treant' : (rng() < 0.5 ? 'vine' : 'goblin');
      enemies.push(createEnemy(t, 80 + rng() * 350, t === 'vine' ? floorY - 50 - rng() * 40 : floorY - 16));
    }
    if (screenNum > 0) pickups.push({ x: 150 + rng() * 200, y: floorY - 100, type: 'sporeOrb' });
    if (rng() < 0.5) pickups.push({ x: 300 + rng() * 80, y: floorY - 70, type: 'mushroomCap' });
    if (isLast) { boss = createBoss(stageNum); bossActive = true; }
  } else if (stageNum === 2) { // Crystal Ridge
    platforms.push({ x: 30, y: floorY - 50, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 130, y: floorY - 90, w: 50, h: 8, type: 'ice' });
    platforms.push({ x: 240, y: floorY - 60, w: 60, h: 8, type: 'ice' });
    platforms.push({ x: 350, y: floorY - 100, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 180, y: floorY - 140, w: 50, h: 8, type: 'crystal' });
    for (var i = 0; i < 2 + screenNum * 2; i++) {
      var t = rng() < 0.5 ? 'iceSprite' : 'eagle';
      enemies.push(createEnemy(t, 80 + rng() * 350, t === 'eagle' ? floorY - 100 - rng() * 60 : floorY - 16));
    }
    if (rng() < 0.4) pickups.push({ x: 200 + rng() * 100, y: floorY - 130, type: 'healthPotion' });
    pickups.push({ x: 100 + rng() * 200, y: floorY - 80, type: 'sporeOrb' });
    if (rng() < 0.3) pickups.push({ x: 350, y: floorY - 50, type: 'reactorShard' });
  } else if (stageNum === 3) { // Sunken Reactor
    underwater = true;
    platforms[0].y = GH - 20;
    platforms.push({ x: 50, y: floorY - 30, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 200, y: floorY - 70, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 330, y: floorY - 45, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 120, y: floorY - 110, w: 55, h: 8, type: 'plat' });
    if (screenNum === 1) {
      npcs.push({ x: 380, y: floorY - 44, type: 'merman', msg: 'Compost Rain unlocked! POOP from the sky!', gives: 'bombard' });
    }
    for (var i = 0; i < 3 + screenNum; i++) {
      var t = rng() < 0.5 ? 'jellyfish' : 'fish';
      enemies.push(createEnemy(t, 60 + rng() * 360, floorY - 30 - rng() * 80));
    }
    if (isLast) { boss = createBoss(stageNum); bossActive = true; }
    pickups.push({ x: 250 + rng() * 100, y: floorY - 90, type: 'magicPotion' });
    // Reactor debris hazard
    platforms.push({ x: 160 + rng() * 80, y: floorY - 60, w: 20, h: 20, type: 'reactorDebris' });
  } else if (stageNum === 4) { // Root Parasite Gate
    platforms.push({ x: 60, y: floorY - 55, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 180, y: floorY - 90, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 300, y: floorY - 60, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 400, y: floorY - 110, w: 50, h: 8, type: 'plat' });
    for (var i = 0; i < 3 + screenNum * 2; i++) {
      var t = rng() < 0.3 ? 'sporeArcher' : (rng() < 0.5 ? 'knight' : 'goblin');
      enemies.push(createEnemy(t, 80 + rng() * 350, floorY - 16));
    }
    if (screenNum >= 1) { arrowRain = [{ timer: 2 + rng() * 3 }]; }
    if (rng() < 0.3) pickups.push({ x: 200, y: floorY - 100, type: 'shield' });
    pickups.push({ x: 350 + rng() * 80, y: floorY - 70, type: 'sporeOrb' });
    if (rng() < 0.3) pickups.push({ x: 100, y: floorY - 60, type: 'reactorShard' });
  } else if (stageNum === 5) { // Fungal Dungeons
    platforms.push({ x: 40, y: floorY - 45, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 150, y: floorY - 85, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 270, y: floorY - 55, w: 65, h: 8, type: 'plat' });
    platforms.push({ x: 370, y: floorY - 105, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 100, y: floorY - 135, w: 50, h: 8, type: 'plat' });
    if (screenNum === 0) {
      npcs.push({ x: 420, y: floorY - 24, type: 'prisoner', msg: 'Myceliate unlocked! Turn foes to garden seeds!', gives: 'transform' });
    }
    for (var i = 0; i < 3 + screenNum; i++) {
      var t = rng() < 0.4 ? 'ghost' : (rng() < 0.5 ? 'knight' : 'skeleton');
      enemies.push(createEnemy(t, 80 + rng() * 350, t === 'ghost' ? floorY - 60 - rng() * 50 : floorY - 16));
    }
    if (screenNum >= 2) {
      platforms.push({ x: 420, y: floorY - 60, w: 16, h: 60, type: 'door' });
    }
    if (rng() < 0.4) pickups.push({ x: 200 + rng() * 100, y: floorY - 100, type: 'mushroomCap' });
    if (isLast) { boss = createBoss(stageNum); bossActive = true; }
  } else if (stageNum === 6) { // Reactor Tower
    platforms.push({ x: 30, y: floorY - 50, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 150, y: floorY - 100, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 280, y: floorY - 60, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 80, y: floorY - 145, w: 50, h: 8, type: 'plat' });
    platforms.push({ x: 220, y: floorY - 140, w: 55, h: 8, type: 'plat' });
    platforms.push({ x: 350, y: floorY - 120, w: 50, h: 8, type: 'crystal' });
    platforms.push({ x: 130, y: floorY - 185, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 300, y: floorY - 180, w: 50, h: 8, type: 'plat' });
    for (var i = 0; i < 4 + screenNum; i++) {
      var t = rng() < 0.5 ? 'bat' : 'gargoyle';
      enemies.push(createEnemy(t, 60 + rng() * 360, floorY - 50 - rng() * 150));
    }
    if (screenNum === 2) {
      npcs.push({ x: 300, y: floorY - 204, type: 'wizard', msg: 'Fungal Fire unlocked! Burn the parasites!', gives: 'nockmaar' });
    }
    if (rng() < 0.4) pickups.push({ x: 200, y: floorY - 160, type: 'healthPotion' });
    if (rng() < 0.3) pickups.push({ x: 100, y: floorY - 120, type: 'reactorShard' });
    // Reactor vent hazards
    platforms.push({ x: 180, y: floorY - 4, w: 24, h: 6, type: 'vent' });
  } else if (stageNum === 7) { // Throne of Mycosis
    platforms.push({ x: 80, y: floorY - 50, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 220, y: floorY - 90, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 360, y: floorY - 60, w: 65, h: 8, type: 'plat' });
    platforms.push({ x: 140, y: floorY - 130, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 300, y: floorY - 140, w: 55, h: 8, type: 'plat' });
    if (!isLast) {
      for (var i = 0; i < 4 + screenNum * 2; i++) {
        var t = rng() < 0.3 ? 'darkKnight' : (rng() < 0.5 ? 'ghost' : 'gargoyle');
        enemies.push(createEnemy(t, 80 + rng() * 350, t === 'ghost' || t === 'gargoyle' ? floorY - 60 - rng() * 60 : floorY - 16));
      }
    }
    if (isLast) { boss = createBoss(stageNum); bossActive = true; }
  }

  // Sword upgrade NPCs
  if (stageNum === 2 && screenNum === 0 && swordLevel < 1) {
    npcs.push({ x: 60, y: floorY - 24, type: 'smith', msg: 'Spore-forged Blade! More range, baseling!', gives: 'sword1' });
  }
  if (stageNum === 4 && screenNum === 0 && swordLevel < 2) {
    npcs.push({ x: 60, y: floorY - 24, type: 'smith', msg: 'Reactor Mycelium Blade! Maximum power!', gives: 'sword2' });
  }

  // Heart-up pickup gated by CHA [6]
  if (stageNum === 3 && screenNum === 0 && chaMod > 0) {
    pickups.push({ x: 380, y: floorY - 80, type: 'heartUp' });
  }
  if (stageNum === 6 && screenNum === 1) {
    pickups.push({ x: 350, y: floorY - 150, type: 'heartUp' });
  }

  spawnAmbientParticles();
}

// ============================================================
// ENEMY FACTORY (Tasern-themed)
// ============================================================
function createEnemy(type, x, y) {

    timer: 0, startX: x, startY: y, active: true, shootTimer: 2 + Math.random() * 3,
    transformable: true, scoreVal: 10 };
  switch(type) {
    case 'sporeling':
      e.hp = 1; e.vx = -25; e.w = 12; e.h = 10; e.scoreVal = 5; break;
    case 'goblin':
      e.hp = 2; e.vx = -40; e.scoreVal = 15; break;
    case 'treant':
      e.hp = 4; e.vx = -15; e.w = 20; e.h = 28; e.scoreVal = 30; break;
    case 'vine':
      e.hp = 2; e.w = 8; e.h = 30; e.vx = 0; e.scoreVal = 20; break;
    case 'iceSprite':
      e.hp = 2; e.vx = -35; e.w = 12; e.h = 14; e.scoreVal = 20; break;
    case 'eagle':
      e.hp = 1; e.w = 16; e.h = 10; e.timer = Math.random() * 6.28; e.scoreVal = 15; break;
    case 'jellyfish':
      e.hp = 2; e.w = 12; e.h = 14; e.timer = Math.random() * 6.28; e.scoreVal = 20; break;
    case 'fish':
      e.hp = 1; e.vx = -50; e.w = 14; e.h = 8; e.scoreVal = 10; break;
    case 'sporeArcher':
      e.hp = 3; e.vx = 0; e.shootTimer = 2; e.scoreVal = 25; break;
    case 'knight':
      e.hp = 4; e.vx = -30; e.w = 16; e.h = 22; e.scoreVal = 30; break;
    case 'ghost':
      e.hp = 2; e.w = 14; e.h = 16; e.timer = Math.random() * 6.28; e.scoreVal = 20; break;
    case 'skeleton':
      e.hp = 2; e.vx = -35; e.scoreVal = 15; break;
    case 'bat':
      e.hp = 1; e.w = 12; e.h = 8; e.timer = Math.random() * 6.28; e.scoreVal = 10; break;
    case 'gargoyle':
      e.hp = 3; e.w = 16; e.h = 18; e.timer = Math.random() * 6.28; e.scoreVal = 25; break;
    case 'darkKnight':
