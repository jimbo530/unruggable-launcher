<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Bounce</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

const GW = 384, GH = 256;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'INHALE' } });

const TILE = 16;
const COLS = 80;
const ROWS = 16;
const GRAVITY = 680;
const FLOAT_GRAVITY = -80;
const MAX_FALL = 300;
const JUMP_VEL = -260;
const WALK_SPEED = 100;
const FLOAT_SPEED = 60;
const INHALE_RANGE = 60;
const INHALE_WIDTH = 28;

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: TAS.player.mults() -> {moveSpeed,health,damage,luck,swim}
// clamped to the single-player band (0.8–1.6). statB keeps its shape (inline code reads
// statB.damage/speed/hpMult/luck/etc.) but is recomputed from the bounded multipliers.
// Not a wager game -> default band. recomputeStats() re-runs after a title-screen pick.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, color: '#44dd88', name: 'Baseling', icon: 'B' };
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.damage = m.damage;          // PWR -> attack/knockback
  statB.speed = m.moveSpeed;        // SPD -> move/jump
  statB.hpMult = m.health;          // STA -> max HP
  statB.luck = m.luck;              // LCK -> drops
  statB.cooldown = 1 / m.moveSpeed; // SPD -> faster ability cadence
  statB.lives = m.health > 1.3 ? 1 : 0; // STA buys a cushion life
  statB.scoreMult = 1;              // score is not a stat
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[baseling-bounce] NftLoader display info failed:', e && e.message); }
recomputeStats();
var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[baseling-bounce] player init failed:', e && e.message); });
}

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('baselingbounce_hi');
let lives = 3;
let hp = 6;
let maxHp = 6;
let world = 1;
let stage = 1;
let frame = 0;
let camX = 0;
let levelData = [];
let entities = [];
let projectiles = [];
let items = [];
let doorX = 0;
let stageCleared = false;
let clearTimer = 0;
let bossActive = false;
let boss = null;
let transitionTimer = 0;
let transState = '';
let showTutorial = true;
let tutorialTimer = 0;
let tutorialDismissed = false;

// === SCORE POPUP SYSTEM (Pass 2) ===
let scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#ffdd44', life: 1.2, vy: -40 });
}
function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (const p of scorePopups) {
    const sx = p.x - camX;
    if (sx < -30 || sx > GW + 30) continue;
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, sx, p.y);
    ctx.globalAlpha = 1;
  }
}

// === PLAYER STATE ===
let player = null;
function resetPlayer() {
  player = {
    x: 40, y: GH - 64,
    vx: 0, vy: 0,
    w: 14, h: 14,
    dir: 1,
    onGround: false,
    floating: false,
    floatFrame: 0,
    inhaling: false,
    inhaleTimer: 0,
    hasEnemy: false,
    enemyType: null,
    ability: null,
    abilityActive: false,
    abilityTimer: 0,
    invincible: 0,
    stoneMode: false,
    slideTimer: 0,
    lostStar: null,
    animFrame: 0,
    sporeShield: 0,
    webbed: 0,
    combo: 0,
    comboTimer: 0
  };
}

// === COPY ABILITIES ===
const ABILITIES = ['fire', 'ice', 'sword', 'stone', 'spark', 'beam', 'spore', 'reactor'];
const ABILITY_COLORS = {
  fire: '#ff4422', ice: '#66ddff', sword: '#dddddd', stone: '#886644',
  spark: '#ffff44', beam: '#ff88ff', spore: '#44ff88', reactor: '#ff6600'
};

// === ENEMY DEFINITIONS ===
const ENEMY_TYPES = {
  waddle:      { color: '#dd8844', w: 12, h: 12, speed: 30, hp: 1, ability: null },
  parasol:     { color: '#ff88cc', w: 12, h: 14, speed: 20, hp: 1, ability: null, floats: true },
  firePuff:    { color: '#ff4422', w: 12, h: 12, speed: 35, hp: 2, ability: 'fire', shoots: true },
  iceCube:     { color: '#66ddff', w: 14, h: 14, speed: 25, hp: 2, ability: 'ice' },
  bladeKnight: { color: '#aaaacc', w: 14, h: 16, speed: 40, hp: 3, ability: 'sword', lunges: true },
  rocky:       { color: '#886644', w: 16, h: 14, speed: 20, hp: 4, ability: 'stone' },
  sparky:      { color: '#ffff44', w: 12, h: 12, speed: 30, hp: 2, ability: 'spark', orbit: true },
  beamMage:    { color: '#ff88ff', w: 12, h: 14, speed: 25, hp: 2, ability: 'beam', shoots: true },
  // --- Tasern enemies (Pass 2) ---
  sporeCrawler:  { color: '#22cc66', w: 14, h: 10, speed: 22, hp: 2, ability: 'spore', crawls: true },
  reactorBug:    { color: '#ff6600', w: 12, h: 12, speed: 45, hp: 3, ability: 'reactor', shoots: true, erratic: true },
  mycoGrunt:     { color: '#88aa44', w: 13, h: 13, speed: 28, hp: 2, ability: null, splits: true },
  fungalBomber:  { color: '#aa44aa', w: 14, h: 14, speed: 18, hp: 3, ability: null, bomber: true }
};

// === WORLD THEMES (Pass 3 — enhanced with zone visuals) ===
const WORLD_THEMES = [
  { name: 'Mushroom Meadows', bg1: '#88cc44', bg2: '#226622', sky: '#88ddff', ground: '#44aa22', block: '#886644',
    deco: 'mushrooms', decoCol1: '#ff6688', decoCol2: '#ffaacc', ambientColor: '#ddffdd' },
  { name: 'Crystal Canopy', bg1: '#aaddff', bg2: '#6688cc', sky: '#cceeff', ground: '#ddddee', block: '#8899bb',
    deco: 'crystals', decoCol1: '#88ddff', decoCol2: '#aaeeff', ambientColor: '#eeffff' },
  { name: 'Coral Depths', bg1: '#2266aa', bg2: '#113355', sky: '#44aadd', ground: '#ccaa66', block: '#448866',
    deco: 'coral', decoCol1: '#ff6688', decoCol2: '#44ccaa', ambientColor: '#88ddff' },
  { name: 'Phantom Hollow', bg1: '#332244', bg2: '#110022', sky: '#221133', ground: '#554466', block: '#443355',
    deco: 'lanterns', decoCol1: '#aa66ff', decoCol2: '#66ffaa', ambientColor: '#442266' },
  { name: 'Reactor Ruins', bg1: '#333344', bg2: '#111122', sky: '#222233', ground: '#555566', block: '#666677',
    deco: 'pipes', decoCol1: '#ff6600', decoCol2: '#ffaa44', ambientColor: '#443322' },
  { name: 'Spore Citadel', bg1: '#220033', bg2: '#110011', sky: '#110022', ground: '#442255', block: '#553366',
    deco: 'spores', decoCol1: '#ff44aa', decoCol2: '#44ffaa', ambientColor: '#331144' }
];

// === BOSS DEFINITIONS (Pass 3 — enhanced patterns) ===
const BOSSES = [
  { name: 'Elder Rootwood', color: '#44aa22', w: 40, h: 60, maxHp: 12, pattern: 'whispy' },
  { name: 'Crystal Mycelium', color: '#6688cc', w: 36, h: 36, maxHp: 14, pattern: 'cloud' },
  { name: 'Depth Creeper', color: '#226688', w: 48, h: 48, maxHp: 16, pattern: 'kraken' },
  { name: 'Phantom Fungus', color: '#8844aa', w: 30, h: 36, maxHp: 18, pattern: 'phantom' },
  { name: 'Reactor Core', color: '#ff4444', w: 44, h: 44, maxHp: 20, pattern: 'reactor' },
  { name: 'Spore Lord', color: '#aa22ff', w: 40, h: 50, maxHp: 24, pattern: 'spore' }
];

// === LEVEL GENERATION ===
function generateLevel(w, s) {
  levelData = [];
  entities = [];
  projectiles = [];
  items = [];
  scorePopups = [];
  stageCleared = false;
  bossActive = false;
  boss = null;

  const isBoss = (s === 4);
  const cols = isBoss ? 26 : COLS;
  const theme = WORLD_THEMES[w - 1];

  for (let r = 0; r < ROWS; r++) {
    levelData[r] = [];
    for (let c = 0; c < cols; c++) {
      if (r >= ROWS - 2) {
        levelData[r][c] = 1;
      } else {
        levelData[r][c] = 0;
      }
    }
  }

  if (!isBoss) {
    // Add platforms
    const platCount = 12 + w * 3 + s * 2;
    for (let i = 0; i < platCount; i++) {
      const px = TAS.math.randInt(4, cols - 8);
      const py = TAS.math.randInt(4, ROWS - 5);
      const pw = TAS.math.randInt(3, 7);
      for (let t = 0; t < pw; t++) {
        if (px + t < cols) levelData[py][px + t] = 2;
      }
    }

    // Add breakable blocks with items
    const breakCount = 4 + w + s;
    for (let i = 0; i < breakCount; i++) {
      const bx = TAS.math.randInt(5, cols - 5);
      const by = TAS.math.randInt(3, ROWS - 5);
      if (levelData[by][bx] === 0) {
        levelData[by][bx] = 3;
      }
    }

    // Toxic spore patches (Pass 2 — new hazard, worlds 3+)
    if (w >= 3) {
      const toxCount = 1 + w;
      for (let i = 0; i < toxCount; i++) {
        const tx = TAS.math.randInt(8, cols - 8);
        const tw = TAS.math.randInt(2, 5);
        for (let t = 0; t < tw; t++) {
          if (tx + t < cols && levelData[ROWS - 3][tx + t] === 0) {
            levelData[ROWS - 3][tx + t] = 5; // toxic spore tile
          }
        }
      }
    }

    // Spawn enemies
    const enemyCount = 6 + w * 2 + s;
    const availableTypes = getEnemyTypesForWorld(w);
    for (let i = 0; i < enemyCount; i++) {
      const ex = TAS.math.randInt(8, cols - 4) * TILE;
      const ey = findGround(ex / TILE) * TILE - 14;
      const type = availableTypes[TAS.math.randInt(0, availableTypes.length - 1)];
      spawnEnemy(type, ex, ey);
    }

    // Place door at end
    doorX = (cols - 3) * TILE;

    // Gaps in ground for some worlds
    if (w >= 2) {
      const gapCount = 2 + w;
      for (let i = 0; i < gapCount; i++) {
        const gx = TAS.math.randInt(8, cols - 10);
        const gw = TAS.math.randInt(2, 4);
        for (let g = 0; g < gw; g++) {
          if (gx + g < cols) {
            levelData[ROWS - 2][gx + g] = 0;
            levelData[ROWS - 1][gx + g] = 0;
          }
        }
      }
    }

    // Water sections for world 3
    if (w === 3) {
      for (let r = ROWS - 4; r < ROWS - 2; r++) {
        for (let c = 10; c < 30; c++) {
          if (levelData[r][c] === 0) levelData[r][c] = 4;
        }
      }
    }

    // Reactor vents for world 5 (Pass 2 — new hazard)
    if (w === 5) {
      for (let i = 0; i < 4; i++) {
        const vx = TAS.math.randInt(10, cols - 10);
        if (levelData[ROWS - 3][vx] === 0) {
          levelData[ROWS - 3][vx] = 6; // reactor vent
        }
      }
    }
  } else {
    // Boss room
    const bDef = BOSSES[w - 1];
    boss = {
      x: cols * TILE - 80, y: (ROWS - 2) * TILE - bDef.h - 4,
      vx: 0, vy: 0,
      w: bDef.w, h: bDef.h,
      hp: bDef.maxHp, maxHp: bDef.maxHp,
      name: bDef.name, color: bDef.color,
      pattern: bDef.pattern,
      timer: 0, phase: 0, dir: -1,
      invincible: 0, enraged: false, deathTimer: 0
    };
    bossActive = true;
    doorX = (cols - 3) * TILE;
  }

  resetPlayer();
  // Apply CON stat to maxHp and lives (statB ref 1,2)
  maxHp = Math.floor(6 * statB.hpMult);
  if (maxHp < 1) maxHp = 1;
  hp = maxHp;
  player.x = 40;
  player.y = (ROWS - 4) * TILE;
  camX = 0;
}

function getEnemyTypesForWorld(w) {
  const base = ['waddle', 'parasol'];
  if (w >= 1) base.push('firePuff', 'iceCube');
  if (w >= 2) base.push('sparky', 'beamMage', 'mycoGrunt');
  if (w >= 3) base.push('bladeKnight', 'sporeCrawler');
  if (w >= 4) base.push('rocky', 'reactorBug');
  if (w >= 5) base.push('fungalBomber');
  return base;
}

function findGround(col) {
  for (let r = 0; r < ROWS; r++) {
    if (levelData[r] && levelData[r][Math.floor(col)] >= 1 && levelData[r][Math.floor(col)] !== 4 && levelData[r][Math.floor(col)] !== 5 && levelData[r][Math.floor(col)] !== 6) return r;
  }
  return ROWS - 2;
}

function spawnEnemy(type, x, y) {
  const def = ENEMY_TYPES[type];
  if (!def) return;
  entities.push({
    type: type,
    x: x, y: y,
    vx: def.speed * (Math.random() < 0.5 ? 1 : -1),
    vy: 0,
    w: def.w, h: def.h,
    hp: def.hp,
    color: def.color,
    ability: def.ability,
    dir: 1,
    timer: 0,
    frozen: 0,
    dead: false,
    splitDone: false,
    bombTimer: 0
  });
}

// === TILE COLLISION ===
function isSolid(col, row) {
  if (row < 0 || col < 0) return false;
  if (row >= ROWS) return true;
  if (col >= (levelData[0] ? levelData[0].length : 0)) return true;
  const t = levelData[row] ? levelData[row][col] : 0;
  return t === 1 || t === 2 || t === 3;
}

function tileAt(px, py) {
  const col = Math.floor(px / TILE);
  const row = Math.floor(py / TILE);
  if (row < 0 || row >= ROWS || col < 0) return 0;
  if (col >= (levelData[0] ? levelData[0].length : 0)) return 0;
  return levelData[row] ? levelData[row][col] : 0;
}

function breakBlock(col, row) {
  if (levelData[row] && levelData[row][col] === 3) {
    levelData[row][col] = 0;
    // STR affects block break particles (statB ref 3)
    TAS.particles.spawn(col * TILE + 8, row * TILE + 8, '#aa8844', 8 + Math.floor(statB.damage), 3, { gravity: 0.1 });
    TAS.audio.playTone(200, 0.1, 'square', 0.06);
    // CHA/luck affects drop rate (statB ref 4)
    if (Math.random() < 0.5 * statB.luck) {
      const roll = Math.random();
      if (roll < 0.15 * statB.luck) {
        // Rare: spore shield or reactor core (Pass 2)
        items.push({ x: col * TILE + 4, y: row * TILE, type: roll < 0.07 * statB.luck ? 'reactorCore' : 'sporeShield', vy: -50 });
      } else {
        items.push({ x: col * TILE + 4, y: row * TILE, type: 'food', vy: -50 });
      }
    }
  }
}

// === INPUT HELPERS ===
function inputLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function inputJump() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a; }
function inputAttack() { return TAS.input.keys['KeyZ'] || TAS.input.keys['KeyX'] || TAS.input.keys['KeyJ'] || TAS.input.touch.b; }
function inputDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }

let prevJump = false;
let prevAttack = false;
function jumpPressed() { const v = inputJump() && !prevJump; return v; }
function attackPressed() { const v = inputAttack() && !prevAttack; return v; }

// === SOUND EFFECTS ===
function sfxJump() { TAS.audio.playTone(330, 0.08, 'square', 0.06, 500); }
function sfxFloat() { TAS.audio.playTone(440, 0.05, 'sine', 0.03, 520); }
function sfxInhale() { TAS.audio.playNoise(0.15, 0.04, 300); }
function sfxSwallow() { TAS.audio.playTone(180, 0.12, 'square', 0.06, 100); }
function sfxSpit() { TAS.audio.playTone(600, 0.08, 'square', 0.06, 200); }
function sfxHit() { TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08, 80); }
function sfxPowerUp() { TAS.audio.playMelody([[440,0.08],[550,0.08],[660,0.08],[880,0.15]], 80); }
function sfxBossHit() { TAS.audio.playTone(100, 0.2, 'sawtooth', 0.07, 60); }
function sfxLand() { TAS.audio.playTone(150, 0.04, 'triangle', 0.04); }
function sfxDeath() { TAS.audio.playMelody([[400,0.1],[300,0.1],[200,0.1],[100,0.2]], 120); }
function sfxClear() { TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.2]], 100); }
function sfxFire() { TAS.audio.playNoise(0.1, 0.05, 800); }
function sfxIce() { TAS.audio.playTone(800, 0.1, 'sine', 0.04, 1200); }
function sfxSword() { TAS.audio.playNoise(0.06, 0.04, 2000); }
function sfxSpark() { TAS.audio.playTone(600, 0.05, 'square', 0.03, 900); }
function sfxBeam() { TAS.audio.playTone(500, 0.12, 'sawtooth', 0.05, 800); }
function sfxPoison() { TAS.audio.playTone(180, 0.08, 'sawtooth', 0.04, 120); }
function sfxShield() { TAS.audio.playMelody([[600,0.05],[800,0.05],[1000,0.08]], 60); }
function sfxCombo() { TAS.audio.playTone(700 + player.combo * 100, 0.06, 'square', 0.04); }
function sfxBossExplode() { TAS.audio.playNoise(0.4, 0.12, 200); }

// === GAME START ===
function startGame() {
  state = 'playing';
  score = 0;
  // CON gives bonus lives (statB ref 5)
  lives = 3 + statB.lives;
  world = 1;
  stage = 1;
  TAS.particles.clear();
  generateLevel(world, stage);
  transState = 'stageIntro';
  transitionTimer = 2.0;
  // Show tutorial on first play
  if (showTutorial && !tutorialDismissed) {
    tutorialTimer = 0;
    state = 'tutorial';
  }
}

function nextStage() {
  stage++;
  if (stage > 4) {
    stage = 1;
    world++;
    if (world > 6) {
      if (score > highScore) { highScore = score; TAS.score.save('baselingbounce_hi', score); }
      state = 'win';
      return;
    }
  }
  hp = Math.min(hp + 2, maxHp);
  generateLevel(world, stage);
  transState = 'stageIntro';
  transitionTimer = 2.0;
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    if (score > highScore) { highScore = score; TAS.score.save('baselingbounce_hi', score); }
    state = 'gameOver';
    sfxDeath();
  } else {
    hp = maxHp;
    resetPlayer();
    player.x = 40;
    player.y = (ROWS - 4) * TILE;
    player.invincible = 2.0;
    camX = 0;
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  // Combo timer
  if (player.comboTimer > 0) {
    player.comboTimer -= dt;
    if (player.comboTimer <= 0) player.combo = 0;
  }

  // Webbed slowdown (Pass 2 — Mycelium Web hazard)
  if (player.webbed > 0) player.webbed -= dt;
  const webMult = player.webbed > 0 ? 0.5 : 1.0;

  // Spore shield timer
  if (player.sporeShield > 0) player.sporeShield -= dt;

  if (player.stoneMode) {
    // STR multiplies stone drop damage (statB ref 6)
    player.vy += GRAVITY * 2 * dt;
    player.vy = Math.min(player.vy, 500);
    player.vx = 0;
    moveEntity(player, dt);
    if (player.onGround) {
      TAS.fx.shake(4 + Math.floor(statB.damage), 0.85);
      TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#886644', 12, 3, { gravity: 0.05 });
      for (const e of entities) {
        if (!e.dead && Math.abs(e.x - player.x) < 24 && Math.abs(e.y - player.y) < 30) {
          damageEnemy(e, Math.ceil(4 * statB.damage));
        }
      }
      player.stoneMode = false;
      // WIS affects cooldown recovery (statB ref 7)
      player.abilityTimer = 0.3 * statB.cooldown;
    }
    return;
  }

  // DEX affects movement speed (statB ref 8)
  const spd = (player.floating ? FLOAT_SPEED : WALK_SPEED) * statB.speed * webMult;
  if (inputLeft()) { player.vx = -spd; player.dir = -1; }
  else if (inputRight()) { player.vx = spd; player.dir = 1; }
  else { player.vx = TAS.math.lerp(player.vx, 0, dt * 10); }

  // Slide
  if (player.slideTimer > 0) {
    player.slideTimer -= dt;
    // DEX scales slide speed (statB ref 9)
    player.vx = player.dir * 180 * statB.speed;
    player.vy = 0;
    moveEntity(player, dt);
    for (const e of entities) {
      if (!e.dead && TAS.hit.rectOverlap(player.x-2, player.y, player.w+4, player.h, e.x, e.y, e.w, e.h)) {
        damageEnemy(e, Math.ceil(1 * statB.damage));
      }
    }
    return;
  }

  // Jumping — STR + DEX combine for jump power (statB ref 10)
  const jp = jumpPressed();
  const jumpPower = JUMP_VEL * (0.5 + 0.3 * (statB.damage) + 0.2 * (statB.speed));
  if (jp && player.onGround && !player.floating) {
    player.vy = Math.max(jumpPower, -400);
    player.onGround = false;
    sfxJump();
  } else if (inputJump() && !player.onGround && player.vy > -50) {
    if (!player.floating) {
      player.floating = true;
      player.floatFrame = 0;
      sfxFloat();
    }
  }

  if (player.floating) {
    player.floatFrame += dt;
    if (inputJump()) {
      player.vy = FLOAT_GRAVITY;
    } else {
      player.floating = false;
      player.vy = 50;
      projectiles.push({
        x: player.x + (player.dir > 0 ? player.w : -8),
        y: player.y + player.h/2 - 4,
        vx: player.dir * 200,
        vy: 0,
        w: 8, h: 8,
        type: 'airPuff',
        color: '#ccddff',
        life: 0.5,
        // STR affects puff damage (statB ref 11)
        damage: Math.ceil(1 * statB.damage)
      });
      sfxSpit();
    }
  }

  // Gravity
  if (!player.floating) {
    player.vy += GRAVITY * dt;
    player.vy = Math.min(player.vy, MAX_FALL);
  }

  // Inhale
  if (inputAttack() && !player.hasEnemy && !player.ability) {
    player.inhaling = true;
    player.inhaleTimer += dt;
    if (Math.floor(player.inhaleTimer * 10) % 3 === 0) sfxInhale();
  } else if (player.inhaling) {
    player.inhaling = false;
    player.inhaleTimer = 0;
  }

  // Use ability / swallow / spit
  const ap = attackPressed();
  if (ap && player.hasEnemy) {
    if (inputDown()) {
      projectiles.push({
        x: player.x + (player.dir > 0 ? player.w : -12),
        y: player.y,
        vx: player.dir * 250,
        vy: 0,
        w: 12, h: 12,
        type: 'star',
        color: '#ffdd44',
        life: 1.5,
        // STR scales spit damage (statB ref 12)
        damage: Math.ceil(3 * statB.damage)
      });
      player.hasEnemy = false;
      player.enemyType = null;
      sfxSpit();
    } else {
      if (player.enemyType && ENEMY_TYPES[player.enemyType] && ENEMY_TYPES[player.enemyType].ability) {
        player.ability = ENEMY_TYPES[player.enemyType].ability;
        sfxPowerUp();
        TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, ABILITY_COLORS[player.ability], 15, 3);
      } else {
        sfxSwallow();
      }
      player.hasEnemy = false;
      player.enemyType = null;
    }
  } else if (ap && player.ability && !player.inhaling) {
    useAbility();
  }

  // Slide: down + attack on ground
  if (inputDown() && ap && player.onGround && !player.hasEnemy && !player.ability) {
    player.slideTimer = 0.3;
    TAS.audio.playNoise(0.08, 0.03, 500);
  }

  moveEntity(player, dt);

  // Invincibility timer
  if (player.invincible > 0) player.invincible -= dt;
  if (player.abilityTimer > 0) player.abilityTimer -= dt;

  // Animation
  player.animFrame += dt * 8;

  // Fall death
  if (player.y > ROWS * TILE + 32) {
    loseLife();
  }

  // Check hazard tiles under player
  const pcol = Math.floor((player.x + player.w/2) / TILE);
  const prow = Math.floor((player.y + player.h) / TILE);
  const tileBelow = tileAt(player.x + player.w/2, player.y + player.h + 2);
  // Toxic spore tile damage (Pass 2)
  if (tileBelow === 5 && player.invincible <= 0 && player.sporeShield <= 0) {
    hitPlayer();
    sfxPoison();
    TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#44ff44', 6, 2);
  }
  // Reactor vent — launches player up (Pass 2)
  if (tileBelow === 6 && player.onGround) {
    player.vy = -350;
    player.onGround = false;
    TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#ff6600', 8, 2, { gravity: -0.1 });
    TAS.audio.playTone(400, 0.1, 'sawtooth', 0.05, 600);
  }

  // Inhale suction
  if (player.inhaling) {
    const sx = player.x + (player.dir > 0 ? player.w : -INHALE_RANGE);
    const sy = player.y - INHALE_WIDTH/2;
    for (const e of entities) {
      if (e.dead || e.frozen > 0) continue;
      if (TAS.hit.rectOverlap(sx, sy, INHALE_RANGE, player.h + INHALE_WIDTH, e.x, e.y, e.w, e.h)) {
        const pull = 120 * dt * player.dir * -1;
        e.x += pull;
        if (Math.abs(e.x - player.x) < 16 && Math.abs(e.y - player.y) < 16) {
          player.hasEnemy = true;
          player.enemyType = e.type;
          e.dead = true;
          sfxSwallow();
        }
      }
    }
    // Inhale items too (Pass 2)
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (TAS.hit.rectOverlap(sx, sy, INHALE_RANGE, player.h + INHALE_WIDTH, it.x, it.y, 10, 10)) {
        it.x += 120 * dt * player.dir * -1;
      }
    }
  }

  // Lost star pickup
  if (player.lostStar) {
    player.lostStar.life -= dt;
    player.lostStar.x += player.lostStar.vx * dt;
    player.lostStar.y += player.lostStar.vy * dt;
    player.lostStar.vy += 200 * dt;
    if (player.lostStar.life <= 0) player.lostStar = null;
    else if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h,
        player.lostStar.x, player.lostStar.y, 10, 10)) {
      player.ability = player.lostStar.ability;
      player.lostStar = null;
      sfxPowerUp();
    }
  }
}

function useAbility() {
  if (player.abilityTimer > 0) return;
  // STR scales all ability damage (statB ref 13)
  const dmg = statB.damage;
  // WIS scales all cooldowns (statB ref 14)
  const cd = statB.cooldown;
  switch (player.ability) {
    case 'fire':
      for (let i = 0; i < 3; i++) {
        projectiles.push({
          x: player.x + (player.dir > 0 ? player.w : -6),
          y: player.y + player.h/2 - 3 + (i-1)*6,
          vx: player.dir * (180 + i*30),
          vy: (i-1) * 20,
          w: 8, h: 6,
          type: 'fire',
          color: '#ff' + (i===1?'6600':'4400'),
          life: 0.5,
          damage: Math.ceil(1 * dmg)
        });
      }
      player.abilityTimer = 0.15 * cd;
      sfxFire();
      break;
    case 'ice':
      projectiles.push({
        x: player.x + (player.dir > 0 ? player.w : -16),
        y: player.y + player.h/2 - 6,
        vx: player.dir * 160,
        vy: 0,
        w: 16, h: 12,
        type: 'ice',
        color: '#aaeeff',
        life: 0.6,
        damage: Math.ceil(1 * dmg)
      });
      player.abilityTimer = 0.25 * cd;
      sfxIce();
      break;
    case 'sword':
      projectiles.push({
        x: player.x + (player.dir > 0 ? player.w - 2 : -20),
        y: player.y - 4,
        vx: player.dir * 20,
        vy: 0,
        w: 22, h: 18,
        type: 'sword',
        color: '#ddddff',
        life: 0.15,
        damage: Math.ceil(2 * dmg)
      });
      player.abilityTimer = 0.2 * cd;
      sfxSword();
      break;
    case 'stone':
      if (!player.onGround) {
        player.stoneMode = true;
        player.vy = 50;
        player.invincible = 2.0;
      }
      player.abilityTimer = 0.5 * cd;
      break;
    case 'spark':
      for (let a = 0; a < 8; a++) {
        const ang = (a / 8) * Math.PI * 2 + frame * 0.1;
        projectiles.push({
          x: player.x + player.w/2 + Math.cos(ang) * 18,
          y: player.y + player.h/2 + Math.sin(ang) * 18,
          vx: Math.cos(ang) * 40,
          vy: Math.sin(ang) * 40,
          w: 6, h: 6,
          type: 'spark',
          color: '#ffff44',
          life: 0.3,
          damage: Math.ceil(1 * dmg)
        });
      }
      player.abilityTimer = 0.4 * cd;
      sfxSpark();
      break;
    case 'beam':
      for (let i = 0; i < 5; i++) {
        const ang = player.dir > 0 ? -0.4 + i*0.2 : Math.PI - 0.4 + i*0.2;
        projectiles.push({
          x: player.x + player.w/2 + Math.cos(ang) * (15 + i*8),
          y: player.y + player.h/2 + Math.sin(ang) * (15 + i*8),
          vx: Math.cos(ang) * 60,
          vy: Math.sin(ang) * 60,
          w: 6, h: 6,
          type: 'beam',
          color: '#ff88ff',
          life: 0.3 + i*0.05,
          damage: Math.ceil(1 * dmg)
        });
      }
      player.abilityTimer = 0.3 * cd;
      sfxBeam();
      break;
    // --- New Tasern abilities (Pass 2) ---
    case 'spore':
      // Spore cloud — lingering damage zone
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2;
        projectiles.push({
          x: player.x + player.w/2,
          y: player.y + player.h/2,
          vx: Math.cos(ang) * 50,
          vy: Math.sin(ang) * 50 - 20,
          w: 8, h: 8,
          type: 'sporeCloud',
          color: '#44ff88',
          life: 0.8,
          damage: Math.ceil(1 * dmg)
        });
      }
      player.abilityTimer = 0.35 * cd;
      TAS.audio.playTone(300, 0.1, 'sine', 0.05, 200);
      break;
    case 'reactor':
      // Reactor beam — penetrating laser
      projectiles.push({
        x: player.x + (player.dir > 0 ? player.w : -30),
        y: player.y + player.h/2 - 2,
        vx: player.dir * 300,
        vy: 0,
        w: 30, h: 4,
        type: 'reactorBeam',
        color: '#ff6600',
        life: 0.4,
        damage: Math.ceil(3 * dmg)
      });
      player.abilityTimer = 0.5 * cd;
      TAS.audio.playTone(200, 0.15, 'sawtooth', 0.08, 100);
      TAS.fx.shake(2, 0.9);
      break;
  }
}

// === ENTITY PHYSICS ===
function moveEntity(ent, dt) {
  ent.onGround = false;
  const dx = ent.vx * dt;
  ent.x += dx;
  if (ent.vx > 0) {
    const rc = Math.floor((ent.x + ent.w) / TILE);
    const rt = Math.floor(ent.y / TILE);
    const rb = Math.floor((ent.y + ent.h - 1) / TILE);
    if (isSolid(rc, rt) || isSolid(rc, rb)) {
      ent.x = rc * TILE - ent.w;
      ent.vx = ent === player ? 0 : -ent.vx;
    }
  } else if (ent.vx < 0) {
    const lc = Math.floor(ent.x / TILE);
    const rt = Math.floor(ent.y / TILE);
    const rb = Math.floor((ent.y + ent.h - 1) / TILE);
    if (isSolid(lc, rt) || isSolid(lc, rb)) {
      ent.x = (lc + 1) * TILE;
      ent.vx = ent === player ? 0 : -ent.vx;
    }
  }
  ent.y += ent.vy * dt;
  if (ent.vy > 0) {
    const bc = Math.floor((ent.x + ent.w/2) / TILE);
    const bl = Math.floor(ent.x / TILE);
    const br = Math.floor((ent.x + ent.w - 1) / TILE);
    const br2 = Math.floor((ent.y + ent.h) / TILE);
    if (isSolid(bc, br2) || isSolid(bl, br2) || isSolid(br, br2)) {
      ent.y = br2 * TILE - ent.h;
      ent.vy = 0;
      ent.onGround = true;
    }
  } else if (ent.vy < 0) {
    const tc = Math.floor((ent.x + ent.w/2) / TILE);
    const tl = Math.floor(ent.x / TILE);
    const tr2 = Math.floor((ent.x + ent.w - 1) / TILE);
    const tr = Math.floor(ent.y / TILE);
    if (isSolid(tc, tr) || isSolid(tl, tr) || isSolid(tr2, tr)) {
      ent.y = (tr + 1) * TILE;
      ent.vy = 0;
      if (ent === player) {
        breakBlock(tc, tr);
        breakBlock(tl, tr);
        breakBlock(tr2, tr);
      }
    }
  }
}

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  for (const e of entities) {
    if (e.dead) continue;
    if (e.frozen > 0) { e.frozen -= dt; continue; }

    e.timer += dt;
    e.vy += GRAVITY * dt;
    e.vy = Math.min(e.vy, MAX_FALL);

    const def = ENEMY_TYPES[e.type];
    if (def && def.floats) {
      e.vy = Math.sin(e.timer * 2) * 30;
    }
    if (def && def.shoots && e.timer > 2.0) {
      e.timer = 0;
      const dx = player.x - e.x;
      const dirToPlayer = dx > 0 ? 1 : -1;
      const shotColor = e.type === 'reactorBug' ? '#ff6600' : (def.ability === 'fire' ? '#ff4400' : '#ff88ff');
      projectiles.push({
        x: e.x + e.w/2, y: e.y + e.h/2,
        vx: dirToPlayer * 120,
        vy: -20,
        w: 6, h: 6,
        type: 'enemyShot',
        color: shotColor,
        life: 2.0,
        damage: 1
      });
    }
    if (def && def.lunges && Math.abs(player.x - e.x) < 60) {
      e.vx = (player.x > e.x ? 1 : -1) * def.speed * 2;
    }
    // Erratic movement for reactor bugs (Pass 2)
    if (def && def.erratic && Math.random() < 0.02) {
      e.vx = (Math.random() < 0.5 ? 1 : -1) * def.speed * (1 + Math.random());
      if (e.onGround && Math.random() < 0.3) e.vy = -180;
    }
    // Crawling on walls (Pass 2 — Spore Crawler)
    if (def && def.crawls) {
      // Crawlers move along ground and up walls slightly
      if (e.onGround && Math.random() < 0.01) {
        e.vy = -120;
      }
    }
    // Fungal Bomber timer (Pass 2)
    if (def && def.bomber) {
      e.bombTimer += dt;
      if (e.bombTimer > 3.0 && Math.abs(player.x - e.x) < 100) {
        e.bombTimer = 0;
        // Drop a spore bomb
        projectiles.push({
          x: e.x + e.w/2, y: e.y,
          vx: (player.x > e.x ? 1 : -1) * 60,
          vy: -100,
          w: 8, h: 8,
          type: 'sporeBomb',
          color: '#aa44aa',
          life: 1.5,
          damage: 2
        });
        TAS.audio.playTone(250, 0.08, 'square', 0.04, 150);
      }
    }

    moveEntity(e, dt);

    if (e.y > ROWS * TILE + 50) e.dead = true;

    if (player.invincible <= 0 && !player.stoneMode && !player.inhaling && player.sporeShield <= 0) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        hitPlayer();
      }
    }
  }
  for (let i = entities.length - 1; i >= 0; i--) {
    if (entities[i].dead) entities.splice(i, 1);
  }
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, e.color, 6, 2);
  if (e.hp <= 0) {
    e.dead = true;
    // INT scales score (statB ref 15)
    const pts = Math.floor(100 * statB.scoreMult);
    // Combo system (Pass 3)
    player.combo++;
    player.comboTimer = 2.0;
    const comboBonus = player.combo > 1 ? Math.floor(pts * (player.combo - 1) * 0.25) : 0;
    const totalPts = pts + comboBonus;
    score += totalPts;
    if (player.combo > 1) sfxCombo();
    spawnScorePopup(e.x + e.w/2, e.y, '+' + totalPts + (player.combo > 1 ? ' x' + player.combo : ''), player.combo > 2 ? '#ff44ff' : '#ffdd44');
    // Death particles (Pass 3 — enhanced)
    TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ffdd44', 10, 3);
    TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, e.color, 8, 4, { gravity: 0.08 });
    TAS.audio.playTone(500, 0.08, 'square', 0.05);
    // CHA/luck affects drop rate (statB ref 16)
    const dropRoll = Math.random();
    if (dropRoll < 0.15 * statB.luck) {
      items.push({ x: e.x, y: e.y, type: 'food', vy: -80 });
    } else if (dropRoll < 0.05 * statB.luck) {
      items.push({ x: e.x, y: e.y, type: 'sporeShield', vy: -80 });
    }
    // Myco Grunt splits into 2 smaller enemies (Pass 2)
    if (e.type === 'mycoGrunt' && !e.splitDone) {
      for (let s = 0; s < 2; s++) {
        const child = {
          type: 'waddle', x: e.x + (s === 0 ? -10 : 10), y: e.y,
          vx: (s === 0 ? -1 : 1) * 40, vy: -80,
          w: 8, h: 8, hp: 1, color: '#aacc66',
          ability: null, dir: s === 0 ? -1 : 1,
          timer: 0, frozen: 0, dead: false, splitDone: true, bombTimer: 0
        };
        entities.push(child);
      }
    }
  } else {
    sfxHit();
  }
}

function hitPlayer() {
  if (player.invincible > 0) return;
  // Spore shield absorbs hit (Pass 2)
  if (player.sporeShield > 0) {
    player.sporeShield = 0;
    TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#44ff88', 10, 3);
    TAS.audio.playTone(400, 0.08, 'sine', 0.04, 600);
    player.invincible = 0.5;
    return;
  }
  hp--;
  player.invincible = 1.5;
  TAS.fx.shake(5, 0.82);
  TAS.fx.flash('#ff0000', 0.3);
  sfxHit();
  player.combo = 0;

  if (player.ability) {
    player.lostStar = {
      x: player.x, y: player.y - 10,
      vx: -player.dir * 80, vy: -150,
      ability: player.ability,
      life: 3.0
    };
    player.ability = null;
  }

  if (hp <= 0) loseLife();
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!boss) return;
  // Boss death explosion sequence (Pass 3)
  if (!bossActive && boss.deathTimer > 0) {
    boss.deathTimer -= dt;
    if (Math.random() < 0.3) {
      const rx = boss.x + TAS.math.randRange(-boss.w/2, boss.w/2);
      const ry = boss.y + TAS.math.randRange(-boss.h/2, boss.h/2);
      TAS.particles.spawn(rx, ry, '#ffdd44', 6, 3);
      if (Math.random() < 0.2) {
        TAS.fx.shake(3, 0.9);
        sfxBossExplode();
      }
    }
    if (boss.deathTimer <= 0) {
      TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffffff', 30, 6);
      TAS.fx.shake(10, 0.75);
      TAS.fx.flash('#ffffff', 0.6);
      boss = null;
      stageCleared = true;
      clearTimer = 2.5;
    }
    return;
  }
  if (!bossActive) return;

  boss.timer += dt;
  if (boss.invincible > 0) boss.invincible -= dt;

  // Enrage at low HP (Pass 3)
  if (!boss.enraged && boss.hp <= boss.maxHp * 0.3) {
    boss.enraged = true;
    TAS.fx.flash('#ff4444', 0.4);
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ff0000', 20, 4);
  }
  const speedMult = boss.enraged ? 1.5 : 1.0;

  switch (boss.pattern) {
    case 'whispy':
      if (boss.timer > (boss.enraged ? 0.8 : 1.5)) {
        boss.timer = 0;
        projectiles.push({
          x: boss.x + TAS.math.randRange(0, boss.w),
          y: boss.y,
          vx: TAS.math.randRange(-40, 40),
          vy: 30,
          w: 8, h: 8, type: 'enemyShot', color: '#ff2222', life: 3, damage: 1
        });
        if (Math.random() < (boss.enraged ? 0.6 : 0.3)) {
          projectiles.push({
            x: boss.x - 20, y: boss.y + boss.h/2,
            vx: -100 * speedMult, vy: TAS.math.randRange(-20, 20),
            w: 10, h: 10, type: 'enemyShot', color: '#aaddaa', life: 2, damage: 1
          });
        }
      }
      break;
    case 'cloud':
      boss.x += Math.sin(boss.timer * 1.5 * speedMult) * 80 * speedMult * dt;
      if (boss.timer > (boss.enraged ? 0.6 : 1.2)) {
        boss.timer = 0;
        const bolts = boss.enraged ? 3 : 1;
        for (let b = 0; b < bolts; b++) {
          projectiles.push({
            x: boss.x + boss.w/2 + (b-1)*20, y: boss.y + boss.h,
            vx: 0, vy: 200,
            w: 4, h: 20, type: 'enemyShot', color: '#ffff44', life: 1.5, damage: 1
          });
        }
      }
      break;
    case 'kraken':
      boss.y = (ROWS - 2) * TILE - boss.h - 4 + Math.sin(boss.timer * 2) * 10;
      if (boss.timer > (boss.enraged ? 1.0 : 1.8)) {
        boss.timer = 0;
        const tentacles = boss.enraged ? 5 : 3;
        for (let i = 0; i < tentacles; i++) {
          projectiles.push({
            x: TAS.math.randRange(40, 26*TILE - 40),
            y: -10,
            vx: 0, vy: 180 * speedMult,
            w: 10, h: 24, type: 'enemyShot', color: '#448888', life: 2, damage: 1
          });
        }
      }
      break;
    case 'phantom':
      if (boss.timer > (boss.enraged ? 1.2 : 2.0)) {
        boss.timer = 0;
        boss.x = TAS.math.randRange(60, 26*TILE - 100);
        boss.y = TAS.math.randRange(40, (ROWS-4)*TILE);
        TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#aa44ff', 10, 3);
        const shots = boss.enraged ? 8 : 4;
        for (let i = 0; i < shots; i++) {
          const a = (i/shots) * Math.PI * 2;
          projectiles.push({
            x: boss.x + boss.w/2, y: boss.y + boss.h/2,
            vx: Math.cos(a) * 100, vy: Math.sin(a) * 100,
            w: 6, h: 6, type: 'enemyShot', color: '#cc66ff', life: 2, damage: 1
          });
        }
      }
      break;
    case 'reactor':
      boss.x += boss.dir * 50 * speedMult * dt;
      if (boss.x < 60 || boss.x > 26*TILE - 100) boss.dir *= -1;
      if (boss.timer > (boss.enraged ? 0.6 : 1.0)) {
        boss.timer = 0;
        boss.phase = (boss.phase + 1) % 3;
        if (boss.phase === 0) {
          projectiles.push({
            x: boss.x + boss.w/2, y: boss.y + boss.h/2,
            vx: (player.x < boss.x ? -1 : 1) * 200 * speedMult, vy: 0,
            w: 20, h: 4, type: 'enemyShot', color: '#ff4444', life: 2, damage: 1
          });
          if (boss.enraged) {
            projectiles.push({
              x: boss.x + boss.w/2, y: boss.y + boss.h/2,
              vx: (player.x < boss.x ? -1 : 1) * 180, vy: -40,
              w: 16, h: 4, type: 'enemyShot', color: '#ff8844', life: 2, damage: 1
            });
          }
        } else {
          spawnEnemy('sparky', boss.x, boss.y - 20);
        }
      }
      break;
    case 'spore':
      boss.x += Math.sin(boss.timer * 1.2 * speedMult) * 60 * speedMult * dt;
      boss.y = (ROWS - 2) * TILE - boss.h - 4 + Math.sin(boss.timer * 3) * 15;
      if (boss.timer > (boss.enraged ? 0.6 : 1.0)) {
        boss.timer = 0;
        boss.phase = (boss.phase + 1) % 5;
        const colors = ['#ff4422', '#66ddff', '#ffff44', '#ff88ff', '#44ff44'];
        const count = boss.enraged ? 5 + boss.phase : 3 + Math.floor(boss.phase);
        for (let i = 0; i < count; i++) {
          const a = TAS.math.randRange(0, Math.PI * 2);
          projectiles.push({
            x: boss.x + boss.w/2, y: boss.y + boss.h/2,
            vx: Math.cos(a) * 120 * speedMult, vy: Math.sin(a) * 120 * speedMult,
            w: 7, h: 7, type: 'enemyShot', color: colors[boss.phase], life: 2.5, damage: 1
          });
        }
        // Spore Lord also spawns enemies when enraged
        if (boss.enraged && boss.phase === 0) {
          spawnEnemy('sporeCrawler', boss.x - 20, boss.y);
        }
      }
      break;
  }

  if (player.invincible <= 0 && !player.stoneMode && player.sporeShield <= 0) {
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
      hitPlayer();
    }
  }
}

function damageBoss(dmg) {
  if (!boss || boss.invincible > 0) return;
  boss.hp -= dmg;
  boss.invincible = 0.4;
  TAS.fx.shake(3, 0.9);
  sfxBossHit();
  TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffdd44', 8, 3);
  // INT scales boss kill score (statB ref 17)
  spawnScorePopup(boss.x + boss.w/2, boss.y, '-' + dmg + ' HP', '#ff4444');
  if (boss.hp <= 0) {
    bossActive = false;
    const bossScore = Math.floor(2000 * statB.scoreMult);
    score += bossScore;
    spawnScorePopup(boss.x + boss.w/2, boss.y - 20, '+' + bossScore + '!', '#ffdd44');
    sfxClear();
    // Start death explosion sequence (Pass 3)
    boss.deathTimer = 2.0;
  }
}

// === PROJECTILE UPDATE ===
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.type === 'enemyShot') {
      p.vy += 30 * dt;
    }
    // Spore bomb arcs and explodes (Pass 2)
    if (p.type === 'sporeBomb') {
      p.vy += 200 * dt;
      if (p.life <= 0 || (p.y > (ROWS - 2) * TILE - 5)) {
        // Explode into spore cloud
        for (let j = 0; j < 4; j++) {
          const ang = (j/4) * Math.PI * 2;
          projectiles.push({
            x: p.x, y: p.y,
            vx: Math.cos(ang) * 40, vy: Math.sin(ang) * 40 - 20,
            w: 6, h: 6, type: 'enemyShot', color: '#aa66cc', life: 1.0, damage: 1
          });
        }
        TAS.particles.spawn(p.x, p.y, '#aa44aa', 8, 3);
        TAS.audio.playTone(200, 0.1, 'sawtooth', 0.05, 100);
        projectiles.splice(i, 1);
        continue;
      }
    }
    // Spore cloud fades and slows (Pass 2)
    if (p.type === 'sporeCloud') {
      p.vx *= 0.97;
      p.vy *= 0.97;
    }
    // Reactor beam pierces (Pass 2)
    if (p.type === 'reactorBeam') {
      TAS.particles.spawn(p.x, p.y + p.h/2, '#ff660044', 1, 1);
    }

    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    // Player projectiles hit enemies
    if (p.type !== 'enemyShot' && p.type !== 'sporeBomb') {
      for (const e of entities) {
        if (e.dead) continue;
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, e.x, e.y, e.w, e.h)) {
          if (p.type === 'ice') {
            e.frozen = 3.0;
            e.vx = 0;
          }
          damageEnemy(e, p.damage);
          // Reactor beam and spark pierce (Pass 2)
          if (p.type !== 'spark' && p.type !== 'reactorBeam') { projectiles.splice(i, 1); break; }
          if (p.type !== 'reactorBeam') p.life = 0;
          break;
        }
      }
      if (boss && bossActive) {
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
          damageBoss(p.damage);
          if (p.type !== 'spark' && p.type !== 'reactorBeam') projectiles.splice(i, 1);
          continue;
        }
      }
    }

    // Enemy projectiles hit player
    if ((p.type === 'enemyShot' || p.type === 'sporeBomb') && player.invincible <= 0 && !player.stoneMode) {
      if (player.sporeShield > 0) {
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
          projectiles.splice(i, 1);
          continue;
        }
      } else if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        hitPlayer();
        projectiles.splice(i, 1);
        continue;
      }
    }

    if (p.x < camX - 30 || p.x > camX + GW + 30 || p.y < -30 || p.y > ROWS*TILE + 30) {
      projectiles.splice(i, 1);
    }
  }
}

// === ITEMS UPDATE ===
function updateItems(dt) {
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy += 300 * dt;
    it.y += it.vy * dt;
    const row = Math.floor((it.y + 10) / TILE);
    const col = Math.floor(it.x / TILE);
    if (isSolid(col, row)) {
      it.y = row * TILE - 10;
      it.vy = 0;
    }
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, it.x, it.y, 10, 10)) {
      if (it.type === 'food') {
        hp = Math.min(hp + 1, maxHp);
        // INT scales food score (statB ref 18)
        const pts = Math.floor(50 * statB.scoreMult);
        score += pts;
        spawnScorePopup(it.x, it.y, '+' + pts + ' POOP', '#f4b41b');
        TAS.audio.playTone(600, 0.06, 'sine', 0.05);
        TAS.particles.spawn(it.x + 5, it.y + 5, '#f4b41b', 5, 2);
      } else if (it.type === 'sporeShield') {
        // Spore Shield — absorbs next hit (Pass 2)
        player.sporeShield = 15;
        spawnScorePopup(it.x, it.y, 'SPORE SHIELD!', '#38d973');
        sfxShield();
        TAS.particles.spawn(it.x + 5, it.y + 5, '#44ff88', 8, 3);
      } else if (it.type === 'reactorCore') {
        // Reactor Core — big score + brief invincibility (Pass 2)
        const pts = Math.floor(500 * statB.scoreMult);
        score += pts;
        player.invincible = Math.max(player.invincible, 3.0);
        spawnScorePopup(it.x, it.y, '+' + pts + ' REACTOR!', '#ff6600');
        sfxPowerUp();
        TAS.particles.spawn(it.x + 5, it.y + 5, '#ff6600', 12, 4);
        TAS.fx.flash('#ff660044', 0.3);
      } else if (it.type === 'myceliumWeb') {
        // Mycelium Web — bad pickup, slows player (Pass 2)
        player.webbed = 3.0;
        spawnScorePopup(it.x, it.y, 'MYCELIUM TRAP!', '#886688');
        TAS.audio.playTone(200, 0.1, 'sawtooth', 0.04, 100);
      }
      items.splice(i, 1);
    }
  }
}

// === CAMERA ===
function updateCamera() {
  const targetX = player.x - GW / 3;
  const maxCam = (levelData[0] ? levelData[0].length : COLS) * TILE - GW;
  camX = TAS.math.lerp(camX, TAS.math.clamp(targetX, 0, Math.max(0, maxCam)), 0.08);
}

// === DOOR CHECK ===
function checkDoor() {
  if (stageCleared) return;
  if (!bossActive && Math.abs(player.x - doorX) < 20 && Math.abs(player.y - ((ROWS-3)*TILE)) < 30) {
    stageCleared = true;
    clearTimer = 2.0;
    // INT scales clear score (statB ref 19)
    const pts = Math.floor(500 * statB.scoreMult);
    score += pts;
    spawnScorePopup(player.x, player.y - 20, '+' + pts + ' CLEAR!', '#f4b41b');
    sfxClear();
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC']) {
      TAS.input.keys['KeyC'] = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'tutorial') {
    tutorialTimer += dt;
    if ((Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) && tutorialTimer > 0.5) {
      tutorialDismissed = true;
      state = 'playing';
      transState = 'stageIntro';
      transitionTimer = 2.0;
    }
    return;
  }

  if (state === 'gameOver' || state === 'win') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (transState === 'stageIntro') {
    transitionTimer -= dt;
    if (transitionTimer <= 0) transState = '';
    return;
  }

  if (state === 'playing') {
    if (stageCleared) {
      clearTimer -= dt;
      if (clearTimer <= 0) nextStage();
      updateScorePopups(dt);
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateProjectiles(dt);
    updateItems(dt);
    updateCamera();
    updateScorePopups(dt);
    checkDoor();

    // Spawn mycelium web traps in later worlds (Pass 2)
    if (world >= 4 && Math.random() < 0.001) {
      const wx = camX + TAS.math.randRange(50, GW - 50);
      const wy = findGround(wx / TILE) * TILE - 10;
      items.push({ x: wx, y: wy, type: 'myceliumWeb', vy: 0 });
    }
  }

  prevJump = inputJump();
  prevAttack = inputAttack();
}

// === DRAWING ===
function drawBackground() {
  const theme = WORLD_THEMES[(world - 1) % 6];
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(1, theme.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax hills
  ctx.fillStyle = theme.bg1 + '44';
  for (let i = 0; i < 6; i++) {
    const hx = ((i * 120) - camX * 0.2) % (GW + 120) - 60;
    const hh = 40 + (i % 3) * 20;
    ctx.beginPath();
    ctx.ellipse(hx, GH - 30, 70, hh, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Zone-specific background decorations (Pass 3)
  drawZoneDecorations(theme);

  // Background clouds
  ctx.fillStyle = '#ffffff22';
  for (let i = 0; i < 5; i++) {
    const cx = ((i * 150 + 30) - camX * 0.1) % (GW + 100) - 50;
    const cy = 20 + (i * 17) % 60;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 30 + i*5, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === ZONE DECORATIONS (Pass 3) ===
function drawZoneDecorations(theme) {
  const deco = theme.deco;
  const c1 = theme.decoCol1;
  const c2 = theme.decoCol2;

  switch (deco) {
    case 'mushrooms':
      // Background mushrooms of various sizes
      for (let i = 0; i < 8; i++) {
        const mx = ((i * 80 + 20) - camX * 0.15) % (GW + 80) - 40;
        const my = GH - 50 - (i % 3) * 15;
        const mh = 12 + (i % 4) * 5;
        ctx.fillStyle = c2 + '66';
        ctx.fillRect(mx + 3, my, 4, mh);
        ctx.fillStyle = c1 + '66';
        ctx.beginPath();
        ctx.ellipse(mx + 5, my, 8 + (i % 3) * 2, 5, 0, Math.PI, 0);
        ctx.fill();
        // Spots
        ctx.fillStyle = '#ffffff33';
        ctx.beginPath(); ctx.arc(mx + 3, my - 2, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(mx + 7, my - 1, 1, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'crystals':
      // Glowing crystals in background
      for (let i = 0; i < 6; i++) {
        const cx = ((i * 90 + 40) - camX * 0.12) % (GW + 90) - 45;
        const cy = GH - 40 - (i % 4) * 20;
        const ch = 15 + (i % 3) * 8;
        ctx.fillStyle = c1 + '44';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx - 4, cy + ch);
        ctx.lineTo(cx + 4, cy + ch);
        ctx.closePath();
        ctx.fill();
        // Glow
        ctx.fillStyle = c2 + '22';
        ctx.beginPath();
        ctx.arc(cx, cy + ch/3, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'coral':
      // Coral formations
      for (let i = 0; i < 7; i++) {
        const cx = ((i * 75 + 10) - camX * 0.18) % (GW + 75) - 35;
        const cy = GH - 35;
        ctx.fillStyle = (i % 2 === 0 ? c1 : c2) + '44';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.bezierCurveTo(cx - 5, cy - 20, cx + 3, cy - 25, cx + 2, cy - 30 - (i%3)*5);
        ctx.bezierCurveTo(cx + 8, cy - 20, cx + 12, cy - 15, cx + 8, cy);
        ctx.closePath();
        ctx.fill();
      }
      // Bubbles
      ctx.fillStyle = '#ffffff22';
      for (let i = 0; i < 10; i++) {
        const bx = ((i * 50 + frame * 0.3) % (GW + 40)) - 20;
        const by = GH - 60 - ((i * 30 + frame * 0.5) % 100);
        ctx.beginPath();
        ctx.arc(bx, by, 2 + (i%3), 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'lanterns':
      // Ghost lanterns floating
      for (let i = 0; i < 5; i++) {
        const lx = ((i * 100 + 30) - camX * 0.1) % (GW + 100) - 50;
        const ly = 40 + (i * 25) % 80 + Math.sin(frame * 0.02 + i) * 8;
        ctx.fillStyle = c2 + '44';
        ctx.beginPath();
        ctx.arc(lx, ly, 5, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.fillStyle = c1 + '11';
        ctx.beginPath();
        ctx.arc(lx, ly, 12, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'pipes':
      // Industrial pipes and gears
      for (let i = 0; i < 6; i++) {
        const px = ((i * 85 + 15) - camX * 0.13) % (GW + 85) - 42;
        const py = GH - 55 - (i % 3) * 25;
        // Pipe
        ctx.fillStyle = '#55555544';
        ctx.fillRect(px, py, 8, 40);
        ctx.fillStyle = c1 + '33';
        ctx.fillRect(px - 2, py, 12, 3);
        ctx.fillRect(px - 2, py + 15, 12, 3);
        // Steam puffs
        if (i % 2 === 0) {
          ctx.fillStyle = '#ffffff11';
          const sy = py - 5 - Math.sin(frame * 0.03 + i) * 4;
          ctx.beginPath();
          ctx.arc(px + 4, sy, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      break;
    case 'spores':
      // Floating spore particles
      for (let i = 0; i < 15; i++) {
        const sx = ((i * 40 + frame * 0.2) % (GW + 40)) - 20;
        const sy = ((i * 35 + frame * 0.15) % (GH - 40)) + 10;
        ctx.fillStyle = (i % 2 === 0 ? c1 : c2) + '33';
        ctx.beginPath();
        ctx.arc(sx, sy, 2 + (i % 3), 0, Math.PI * 2);
        ctx.fill();
      }
      // Giant mushroom silhouettes
      for (let i = 0; i < 3; i++) {
        const mx = ((i * 150 + 50) - camX * 0.08) % (GW + 150) - 75;
        const my = GH - 30;
        ctx.fillStyle = c1 + '15';
        ctx.fillRect(mx + 10, my - 40, 10, 40);
        ctx.beginPath();
        ctx.ellipse(mx + 15, my - 40, 25, 15, 0, Math.PI, 0);
        ctx.fill();
      }
      break;
  }
}

function drawTiles() {
  const theme = WORLD_THEMES[(world - 1) % 6];
  const startCol = Math.max(0, Math.floor(camX / TILE) - 1);
  const endCol = Math.min(levelData[0] ? levelData[0].length : 0, startCol + Math.ceil(GW / TILE) + 2);

  for (let r = 0; r < ROWS; r++) {
    for (let c = startCol; c < endCol; c++) {
      const t = levelData[r] ? levelData[r][c] : 0;
      if (t === 0) continue;
      const tx = c * TILE - camX;
      const ty = r * TILE;
      if (t === 1) {
        ctx.fillStyle = theme.ground;
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = theme.ground + '88';
        ctx.fillRect(tx, ty, TILE, 2);
        // Grass tufts on top edge (Pass 3)
        if (r > 0 && levelData[r-1] && levelData[r-1][c] === 0) {
          ctx.fillStyle = theme.ground;
          ctx.fillRect(tx + 2, ty - 2, 3, 3);
          ctx.fillRect(tx + 8, ty - 3, 2, 3);
          ctx.fillRect(tx + 13, ty - 2, 2, 2);
        }
      } else if (t === 2) {
        ctx.fillStyle = theme.block;
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.strokeStyle = '#00000033';
        ctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        // Block highlight (Pass 3)
        ctx.fillStyle = '#ffffff18';
        ctx.fillRect(tx + 1, ty + 1, TILE - 2, 2);
      } else if (t === 3) {
        ctx.fillStyle = '#ccaa44';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#ffdd66';
        ctx.fillRect(tx + 2, ty + 2, 4, 4);
        ctx.fillRect(tx + 10, ty + 10, 4, 4);
        // Question mark (Pass 3)
        ctx.fillStyle = '#886622';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('?', tx + 8, ty + 12);
      } else if (t === 4) {
        ctx.fillStyle = '#2244aa44';
        ctx.fillRect(tx, ty, TILE, TILE);
        const wave = Math.sin((c + frame * 0.05) * 2) * 2;
        ctx.fillStyle = '#4488ff44';
        ctx.fillRect(tx, ty + wave, TILE, 3);
      } else if (t === 5) {
        // Toxic spore patch (Pass 2)
        ctx.fillStyle = '#22663322';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#44ff4444';
        const bob = Math.sin((c * 2 + frame * 0.06)) * 2;
        ctx.beginPath();
        ctx.arc(tx + 4, ty + 6 + bob, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(tx + 12, ty + 8 - bob, 2, 0, Math.PI * 2);
        ctx.fill();
        // Skull icon
        ctx.fillStyle = '#88ff8844';
        ctx.fillRect(tx + 6, ty + 2, 4, 3);
      } else if (t === 6) {
        // Reactor vent (Pass 2)
        ctx.fillStyle = '#44444488';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#ff660044';
        const ventPulse = Math.sin(frame * 0.1 + c) * 0.3 + 0.7;
        ctx.globalAlpha = ventPulse;
        ctx.fillRect(tx + 3, ty, 3, TILE);
        ctx.fillRect(tx + 10, ty, 3, TILE);
        ctx.globalAlpha = 1;
        // Steam particles above
        ctx.fillStyle = '#ff660022';
        ctx.beginPath();
        ctx.arc(tx + 8, ty - 4 - Math.sin(frame * 0.08 + c) * 3, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Door
  if (!bossActive || !boss) {
    const dx = doorX - camX;
    const dy = (ROWS - 4) * TILE;
    ctx.fillStyle = '#332200';
    ctx.fillRect(dx, dy, 14, 24);
    ctx.fillStyle = '#664400';
    ctx.fillRect(dx + 2, dy + 2, 10, 20);
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(dx + 9, dy + 11, 2, 2);
    const starPulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = starPulse;
    ctx.fillStyle = '#ffdd44';
    drawStar(dx + 7, dy - 8, 5, 5, 2.5);
    ctx.globalAlpha = 1;
  }
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const px = player.x - camX;
  const py = player.y;

  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px + player.w/2, py + player.h/2);

  // Stone mode
  if (player.stoneMode) {
    ctx.fillStyle = '#886644';
    ctx.fillRect(-player.w/2 - 2, -player.h/2 - 2, player.w + 4, player.h + 4);
    ctx.fillStyle = '#664422';
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.restore();
    return;
  }

  const puff = (player.floating || player.hasEnemy) ? 1.3 : 1.0;
  const bobble = player.floating ? Math.sin(player.floatFrame * 6) * 2 : 0;
  ctx.translate(0, bobble);

  // Spore shield glow (Pass 2)
  if (player.sporeShield > 0) {
    ctx.globalAlpha = 0.25 + Math.sin(frame * 0.12) * 0.1;
    ctx.fillStyle = '#44ff88';
    ctx.beginPath();
    ctx.arc(0, 0, player.w * puff + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Ability glow
  if (player.ability) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.15;
    ctx.fillStyle = ABILITY_COLORS[player.ability];
    ctx.beginPath();
    ctx.arc(0, 0, player.w * puff * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  // Animation from player state: hurt (invincible) > jump (airborne) > attack (ability) > walk > idle.
  var _anim = 'idle';
  if (player.invincible > 0) _anim = 'hurt';
  else if (!player.onGround) _anim = 'jump';
  else if (player.abilityTimer > 0) _anim = 'attack';
  else if (player.vx !== 0) _anim = 'walk';
  if (!TAS.drawBaseling(ctx, 0, 0, Math.max(player.w, player.h) + 4, { flipX: player.dir < 0, frame: frame, anim: _anim })) {
    // Mushroom cap (baseling = mushroom creature)
    const capColor = player.ability ? ABILITY_COLORS[player.ability] : '#ff6688';
    ctx.fillStyle = capColor;
    ctx.beginPath();
    ctx.ellipse(0, -3, (player.w/2 + 3) * puff, (player.h/3 + 2) * puff, 0, Math.PI, 0);
    ctx.fill();
    // Cap spots
    ctx.fillStyle = '#ffffff55';
    ctx.beginPath(); ctx.arc(-3, -5 * puff, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -4 * puff, 1.5, 0, Math.PI * 2); ctx.fill();

    // Main body (stem)
    ctx.fillStyle = player.ability ? ABILITY_COLORS[player.ability] : '#ffccaa';
    ctx.beginPath();
    ctx.ellipse(0, 2, player.w/2.5 * puff, player.h/2.2 * puff, 0, 0, Math.PI * 2);
    ctx.fill();

    // Lighter belly
    ctx.fillStyle = '#ffddcc';
    ctx.beginPath();
    ctx.ellipse(0, 3, player.w/3.5 * puff, player.h/3.5 * puff, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    const eyeX = player.dir * 2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(eyeX - 2, -1, 3, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(eyeX + 3, -1, 3, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(eyeX - 2 + player.dir, -1, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeX + 3 + player.dir, -1, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Blush
    ctx.fillStyle = '#ff668844';
    ctx.beginPath();
    ctx.ellipse(-5 * player.dir, 3, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    if (player.inhaling) {
      ctx.fillStyle = '#440000';
      ctx.beginPath();
      ctx.ellipse(player.dir * 5, 2, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (player.hasEnemy) {
      ctx.fillStyle = '#884444';
      ctx.beginPath();
      ctx.ellipse(player.dir * 3, 3, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#cc4466';
      ctx.beginPath();
      ctx.arc(player.dir * 2, 4, 2, 0, Math.PI);
      ctx.fill();
    }

    // Feet (little nubs)
    if (!player.floating) {
      ctx.fillStyle = '#cc8866';
      const walkBob = player.onGround ? Math.sin(player.animFrame * 2) * 1 : 0;
      ctx.fillRect(-4, player.h/2 * puff - 1, 4, 3 + walkBob);
      ctx.fillRect(2, player.h/2 * puff - 1, 4, 3 - walkBob);
    }
  }

  // Slide visual
  if (player.slideTimer > 0) {
    ctx.fillStyle = '#ffdd4488';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(-player.dir * (8 + i*5), -1, 4, 3);
    }
  }

  // Webbed visual (Pass 2)
  if (player.webbed > 0) {
    ctx.strokeStyle = '#88668866';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-6, -4 + i*4);
      ctx.lineTo(6, -2 + i*4);
      ctx.stroke();
    }
  }

  // Inhale cone
  if (player.inhaling) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.3) * 0.1;
    ctx.fillStyle = '#aaddff';
    ctx.beginPath();
    ctx.moveTo(player.dir * 8, 0);
    ctx.lineTo(player.dir * (8 + INHALE_RANGE * 0.6), -INHALE_WIDTH/2);
    ctx.lineTo(player.dir * (8 + INHALE_RANGE * 0.6), INHALE_WIDTH/2);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawEntities() {
  for (const e of entities) {
    if (e.dead) continue;
    const ex = e.x - camX;
    const ey = e.y;

    if (ex < -20 || ex > GW + 20) continue;

    ctx.save();
    ctx.translate(ex + e.w/2, ey + e.h/2);

    if (e.frozen > 0) {
      ctx.fillStyle = '#aaeeff';
      ctx.fillRect(-e.w/2 - 1, -e.h/2 - 1, e.w + 2, e.h + 2);
      ctx.fillStyle = '#66bbdd';
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      ctx.restore();
      continue;
    }

    // Body
    ctx.fillStyle = e.color;
    if (e.type === 'rocky') {
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      ctx.fillStyle = '#aa8866';
      ctx.fillRect(-e.w/2 + 2, -e.h/2 + 2, 4, 3);
      ctx.fillRect(e.w/2 - 6, e.h/2 - 5, 4, 3);
    } else if (e.type === 'sporeCrawler') {
      // Mushroom-like crawler (Pass 2)
      ctx.beginPath();
      ctx.ellipse(0, 2, e.w/2, e.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#33aa55';
      ctx.beginPath();
      ctx.ellipse(0, -2, e.w/2.5, e.h/3, 0, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = '#ffffff44';
      ctx.beginPath(); ctx.arc(-2, -3, 1.5, 0, Math.PI * 2); ctx.fill();
    } else if (e.type === 'reactorBug') {
      // Glowing mechanical bug (Pass 2)
      ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
      ctx.fillStyle = '#ffaa00';
      const glow = Math.sin(frame * 0.15 + e.timer) * 2 + 4;
      ctx.beginPath();
      ctx.arc(0, 0, glow, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#442200';
      ctx.fillRect(-e.w/2 + 1, -e.h/2 + 1, e.w - 2, e.h - 2);
    } else if (e.type === 'mycoGrunt') {
      // Small mushroom soldier (Pass 2)
      ctx.beginPath();
      ctx.ellipse(0, 1, e.w/2, e.h/2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#668833';
      ctx.beginPath();
      ctx.ellipse(0, -3, e.w/2.5, e.h/4, 0, Math.PI, 0);
      ctx.fill();
    } else if (e.type === 'fungalBomber') {
      // Puffball-like bomber (Pass 2)
      ctx.beginPath();
      ctx.arc(0, 0, e.w/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc66cc';
      ctx.beginPath();
      ctx.arc(0, -2, e.w/3, 0, Math.PI * 2);
      ctx.fill();
      // Fuse on top
      ctx.strokeStyle = '#ffaa44';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -e.h/2);
      ctx.lineTo(2, -e.h/2 - 5);
      ctx.stroke();
      if (e.bombTimer > 2.0) {
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.arc(2, -e.h/2 - 6, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      ctx.ellipse(0, 0, e.w/2, e.h/2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-3, -3, 3, 3);
    ctx.fillRect(1, -3, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(-2, -2, 1.5, 1.5);
    ctx.fillRect(2, -2, 1.5, 1.5);

    // Type-specific details
    if (e.type === 'bladeKnight') {
      ctx.fillStyle = '#ccccdd';
      ctx.fillRect(e.w/2 - 2, -e.h/2, 3, e.h);
    }
    if (e.type === 'sparky') {
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 1;
      const ang = frame * 0.15;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang) * 9, Math.sin(ang) * 9);
      ctx.lineTo(Math.cos(ang + 2) * 9, Math.sin(ang + 2) * 9);
      ctx.stroke();
    }
    if (e.type === 'parasol') {
      ctx.fillStyle = '#ffaacc';
      ctx.beginPath();
      ctx.arc(0, -e.h/2 - 4, 7, Math.PI, 0);
      ctx.fill();
      ctx.strokeStyle = '#cc6699';
      ctx.beginPath();
      ctx.moveTo(0, -e.h/2);
      ctx.lineTo(0, -e.h/2 - 8);
      ctx.stroke();
    }
    if (e.type === 'beamMage') {
      ctx.fillStyle = '#cc66ff';
      ctx.beginPath();
      ctx.moveTo(-4, -e.h/2 - 2);
      ctx.lineTo(0, -e.h/2 - 7);
      ctx.lineTo(4, -e.h/2 - 2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawBoss() {
  if (!boss) return;
  const bx = boss.x - camX;
  const by = boss.y;

  ctx.save();
  ctx.translate(bx + boss.w/2, by + boss.h/2);

  if (boss.invincible > 0 && Math.floor(boss.invincible * 15) % 2 === 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = boss.color;
  }

  // Enrage aura (Pass 3)
  if (boss.enraged) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#ff220044';
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(boss.w, boss.h) * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = boss.invincible > 0 && Math.floor(boss.invincible * 15) % 2 === 0 ? '#fff' : boss.color;
  }

  switch (boss.pattern) {
    case 'whispy':
      ctx.fillRect(-boss.w/4, -10, boss.w/2, boss.h/2 + 10);
      ctx.fillStyle = boss.enraged ? '#cc4422' : '#22aa22';
      ctx.beginPath();
      ctx.ellipse(0, -boss.h/4, boss.w/2, boss.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(-8, -2, 4, 4);
      ctx.fillRect(4, -2, 4, 4);
      ctx.fillRect(-3, 8, 6, 3);
      break;
    case 'cloud':
      ctx.beginPath();
      ctx.ellipse(0, 0, boss.w/2, boss.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-10, -5, 12, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(10, -3, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Crystal crown (Pass 3)
      ctx.fillStyle = '#88ddff';
      ctx.beginPath();
      ctx.moveTo(-6, -boss.h/3 - 2);
      ctx.lineTo(-3, -boss.h/3 - 8);
      ctx.lineTo(0, -boss.h/3 - 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(2, -boss.h/3 - 2);
      ctx.lineTo(5, -boss.h/3 - 7);
      ctx.lineTo(8, -boss.h/3 - 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(-8, -3, 4, 4);
      ctx.fillRect(4, -3, 4, 4);
      break;
    case 'kraken':
      ctx.beginPath();
      ctx.ellipse(0, -5, boss.w/2.5, boss.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 5; i++) {
        const tx = -16 + i * 8;
        const wave = Math.sin(frame * 0.08 + i) * 5;
        ctx.fillRect(tx, boss.h/4, 5, 12 + wave);
      }
      ctx.fillStyle = '#aadddd';
      ctx.fillRect(-6, -8, 4, 5);
      ctx.fillRect(3, -8, 4, 5);
      break;
    case 'phantom':
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.05) * 0.2;
      ctx.beginPath();
      ctx.ellipse(0, -5, boss.w/2, boss.h/3, 0, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 4; i++) {
        const wave = Math.sin(frame * 0.1 + i * 0.8) * 3;
        ctx.fillRect(-10 + i * 7, boss.h/4, 5, 8 + wave);
      }
      ctx.globalAlpha = 1;
      // Crown (Pass 3)
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.moveTo(-8, -boss.h/3);
      ctx.lineTo(-4, -boss.h/3 - 6);
      ctx.lineTo(0, -boss.h/3);
      ctx.lineTo(4, -boss.h/3 - 6);
      ctx.lineTo(8, -boss.h/3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-6, -6, 4, 4);
      ctx.fillRect(3, -6, 4, 4);
      break;
    case 'reactor':
      ctx.fillRect(-boss.w/2, -boss.h/2, boss.w, boss.h);
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.fillRect(-boss.w/2 + 3, -boss.h/2 + 3, boss.w - 6, boss.h - 6);
      ctx.fillStyle = boss.enraged ? '#ff0000' : '#ff4444';
      const pulse = Math.sin(frame * 0.1) * 3 + 7;
      ctx.beginPath();
      ctx.arc(0, 0, pulse, 0, Math.PI * 2);
      ctx.fill();
      // Warning stripes (Pass 3)
      ctx.fillStyle = '#ffaa0044';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(-boss.w/2 + i * 12, -boss.h/2, 6, boss.h);
      }
      break;
    case 'spore':
      ctx.beginPath();
      ctx.ellipse(0, 5, boss.w/2.5, boss.h/2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = boss.invincible > 0 ? '#fff' : (boss.enraged ? '#ff0066' : '#ff22aa');
      ctx.beginPath();
      ctx.ellipse(0, -boss.h/4, boss.w/2, boss.h/4, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-8, -boss.h/4 - 5, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(6, -boss.h/4 - 3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-2, -boss.h/4 - 7, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(-7, 2, 5, 4);
      ctx.fillRect(3, 2, 5, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(-5, 3, 2, 2);
      ctx.fillRect(5, 3, 2, 2);
      // Spore particles around boss (Pass 3)
      ctx.fillStyle = '#44ff4444';
      for (let i = 0; i < 6; i++) {
        const ang = (i / 6) * Math.PI * 2 + frame * 0.02;
        const dist = 25 + Math.sin(frame * 0.05 + i) * 5;
        ctx.beginPath();
        ctx.arc(Math.cos(ang) * dist, Math.sin(ang) * dist, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
  }

  ctx.restore();

  // HP bar
  if (bossActive && boss) {
    const barW = 80;
    const barX = GW/2 - barW/2;
    const barY = 34;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, 6);
    const hpRatio = boss.hp / boss.maxHp;
    ctx.fillStyle = hpRatio < 0.3 ? '#ff2222' : (hpRatio < 0.6 ? '#ffaa22' : '#ff4444');
    ctx.fillRect(barX, barY, barW * hpRatio, 6);
    ctx.strokeStyle = '#666';
    ctx.strokeRect(barX, barY, barW, 6);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name + (boss.enraged ? ' [ENRAGED]' : ''), GW/2, barY - 2);
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    const px = p.x - camX;
    const py = p.y;
    if (px < -20 || px > GW + 20) continue;

    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      drawStar(px + p.w/2, py + p.h/2, 5, p.w/2, p.w/4);
    } else if (p.type === 'fire') {
      ctx.globalAlpha = p.life * 2;
      ctx.beginPath();
      ctx.ellipse(px + p.w/2, py + p.h/2, p.w/2, p.h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'sword') {
      ctx.fillStyle = '#ddddff';
      ctx.save();
      ctx.translate(px + p.w/2, py + p.h/2);
      ctx.rotate(frame * 0.3);
      ctx.fillRect(-p.w/2, -2, p.w, 4);
      ctx.restore();
    } else if (p.type === 'beam') {
      ctx.beginPath();
      ctx.arc(px + p.w/2, py + p.h/2, p.w/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff88';
      ctx.beginPath();
      ctx.arc(px + p.w/2, py + p.h/2, p.w/3, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'sporeCloud') {
      // Spore cloud with fade (Pass 2)
      ctx.globalAlpha = p.life * 0.8;
      ctx.beginPath();
      ctx.arc(px + p.w/2, py + p.h/2, p.w/2 + (1 - p.life) * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'reactorBeam') {
      // Orange laser beam (Pass 2)
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(px, py, p.w, p.h);
      ctx.fillStyle = '#ffaa44';
      ctx.fillRect(px, py + 1, p.w, 2);
    } else if (p.type === 'sporeBomb') {
      // Pulsing bomb (Pass 2)
      const bombPulse = Math.sin(frame * 0.2) * 2 + p.w/2;
      ctx.beginPath();
      ctx.arc(px + p.w/2, py + p.h/2, bombPulse, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(px, py, p.w, p.h);
    }
  }
}

function drawItems() {
  for (const it of items) {
    const ix = it.x - camX;
    const iy = it.y;
    if (ix < -10 || ix > GW + 10) continue;
    if (it.type === 'food') {
      ctx.fillStyle = '#8B6914';
      ctx.beginPath();
      ctx.arc(ix + 5, iy + 5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4b41b';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P', ix + 5, iy + 8);
    } else if (it.type === 'sporeShield') {
      // Green mushroom shield (Pass 2)
      const bob = Math.sin(frame * 0.08) * 2;
      ctx.fillStyle = '#44ff88';
      ctx.beginPath();
      ctx.arc(ix + 5, iy + 5 + bob, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff66';
      ctx.beginPath(); ctx.arc(ix + 4, iy + 3 + bob, 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#228844';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('S', ix + 5, iy + 7 + bob);
    } else if (it.type === 'reactorCore') {
      // Glowing orange core (Pass 2)
      const glow = Math.sin(frame * 0.1) * 2 + 6;
      ctx.fillStyle = '#ff660033';
      ctx.beginPath();
      ctx.arc(ix + 5, iy + 5, glow, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(ix + 5, iy + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(ix + 5, iy + 5, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (it.type === 'myceliumWeb') {
      // Web trap (Pass 2)
      ctx.strokeStyle = '#886688';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(ix, iy);
      ctx.lineTo(ix + 10, iy + 10);
      ctx.moveTo(ix + 10, iy);
      ctx.lineTo(ix, iy + 10);
      ctx.moveTo(ix + 5, iy);
      ctx.lineTo(ix + 5, iy + 10);
      ctx.stroke();
    }
  }
}

function drawLostStar() {
  if (!player.lostStar) return;
  const s = player.lostStar;
  const sx = s.x - camX;
  const pulse = Math.sin(frame * 0.2) * 0.3 + 0.7;
  ctx.globalAlpha = pulse * Math.min(1, s.life);
  ctx.fillStyle = ABILITY_COLORS[s.ability] || '#ffdd44';
  drawStar(sx + 5, s.y + 5, 5, 7, 3);
  ctx.globalAlpha = 1;
}

function drawHPBar() {
  const barY = 30;
  ctx.fillStyle = '#333';
  for (let i = 0; i < maxHp; i++) {
    ctx.fillRect(6 + i * 13, barY, 11, 8);
  }
  ctx.fillStyle = '#a855f7';
  for (let i = 0; i < hp; i++) {
    ctx.fillRect(7 + i * 13, barY + 1, 9, 6);
  }
  // Spore shield indicator (Pass 2)
  if (player.sporeShield > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPORE SHIELD', 6, barY + 18);
  }
  // Combo counter (Pass 3)
  if (player.combo > 1) {
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('x' + player.combo + ' COMBO', 6, barY + (player.sporeShield > 0 ? 28 : 18));
  }
}

function drawAbilityIcon() {
  if (!player.ability) return;
  const ix = GW - 30;
  const iy = 30;
  ctx.fillStyle = '#222';
  ctx.fillRect(ix, iy, 20, 20);
  ctx.fillStyle = ABILITY_COLORS[player.ability];
  ctx.fillRect(ix + 2, iy + 2, 16, 16);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(player.ability.slice(0,3).toUpperCase(), ix + 10, iy + 12);
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'tutorial') {
    drawTutorialOverlay();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'World ' + world + '-' + stage });
    return;
  }

  if (state === 'win') {
    drawWinScreen();
    return;
  }

  if (transState === 'stageIntro') {
    drawStageIntro();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawTiles();
  drawItems();
  drawEntities();
  drawBoss();
  drawProjectiles();
  drawLostStar();
  drawPlayer();
  drawScorePopups();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  TAS.ui.drawHUD(score, world + '-' + stage, lives, GW, { scoreLabel: 'PTS' });
  drawHPBar();
  drawAbilityIcon();

  // Baseling stat level display (statB ref 20)
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '7px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('LV' + statB.level + ' ' + (statB.name || 'Baseling'), GW - 6, 50);
  }

  // Has enemy indicator
  if (player.hasEnemy) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPIT: DOWN+B  |  ABSORB: B', GW/2, GH - 8);
  }

  // Stage cleared
  if (stageCleared) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARDEN CLEARED!', GW/2, GH/2);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
