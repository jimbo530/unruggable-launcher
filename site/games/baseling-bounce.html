  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#a855f7');
  grad.addColorStop(0.5, '#38d973');
  grad.addColorStop(1, '#1a4d2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Ground
  ctx.fillStyle = '#38d973';
  ctx.fillRect(0, GH - 40, GW, 40);
  ctx.fillStyle = '#2a9d54';
  for (let i = 0; i < GW; i += 12) {
    ctx.fillRect(i, GH - 42 + Math.sin(i*0.2 + frame*0.02) * 2, 8, 4);
  }

  // Background mushrooms (Pass 3)
  for (let i = 0; i < 5; i++) {
    const mx = 40 + i * 80;
    const my = GH - 50 - (i % 3) * 8;
    ctx.fillStyle = '#d4a0f744';
    ctx.fillRect(mx + 3, my, 4, 12);
    ctx.fillStyle = '#a855f744';
    ctx.beginPath();
    ctx.ellipse(mx + 5, my, 8 + (i%2)*3, 5, 0, Math.PI, 0);
    ctx.fill();
  }

  // Bouncing baseling — selected baseling sprite (idle bob), else procedural mushroom.
  const bx = GW/2;
  const by = GH/2 - 10 + Math.sin(frame * 0.06) * 15;
  const pf = 1.0 + Math.sin(frame * 0.06) * 0.15;
  if (!TAS.drawBaseling(ctx, bx, by, 48, { anim: 'idle', frame: frame })) {
  // Cap
  ctx.fillStyle = '#ff6688';
  ctx.beginPath();
  ctx.ellipse(bx, by - 6, 22 * pf, 10 * pf, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#ffffff44';
  ctx.beginPath(); ctx.arc(bx - 6, by - 10 * pf, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + 8, by - 8 * pf, 2, 0, Math.PI * 2); ctx.fill();
  // Stem/body
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.ellipse(bx, by + 2, 14 * pf, 12 * pf, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffddcc';
  ctx.beginPath();
  ctx.ellipse(bx, by + 5, 8 * pf, 7 * pf, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(bx - 5, by, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 5, by, 5, 6, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(bx - 4, by + 1, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(bx + 6, by + 1, 2.5, 0, Math.PI * 2); ctx.fill();
  // Blush
  ctx.fillStyle = '#ff668866';
  ctx.beginPath(); ctx.ellipse(bx - 12, by + 4, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + 12, by + 4, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
  // Smile
  ctx.fillStyle = '#cc4466';
  ctx.beginPath(); ctx.arc(bx + 2, by + 7, 4, 0, Math.PI); ctx.fill();
  // Feet
  ctx.fillStyle = '#cc8866';
  ctx.fillRect(bx - 8, by + 12, 5, 3);
  ctx.fillRect(bx + 4, by + 12, 5, 3);
  }

  // Selected baseling name + select prompt (Base-blue)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), bx, by + 32);
  ctx.fillText('[C] SELECT BASELING', bx, GH - 112);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('BASELING BOUNCE', bx + 1, 30 + 1);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('BASELING BOUNCE', bx, 30);

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.fillText('Protect the Gardens! Inhale Spores!', bx, 46);

  // NES-style dotted-leader controls (Pass 1)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ddd';
  ctx.font = '8px monospace';
  const controlY = GH - 100;
  const controls = [
    ['MOVE', 'ARROWS / WASD'],
    ['JUMP', 'SPACE / UP'],
    ['FLOAT', 'HOLD JUMP'],
    ['INHALE', 'Z / X / J'],
    ['ABILITY', 'Z / X / J'],
    ['SLIDE', 'DOWN + ATTACK'],
    ['SPIT', 'DOWN + ATTACK'],
    ['SWALLOW', 'ATTACK']
  ];
  for (let i = 0; i < controls.length; i++) {
    const label = controls[i][0];
    const action = controls[i][1];
    const y = controlY + i * 10;
    ctx.fillStyle = '#38d973';
    ctx.textAlign = 'left';
    ctx.fillText(label, bx - 130, y);
    // Dotted leaders
    ctx.fillStyle = '#666';
    const labelW = ctx.measureText(label).width;
    const actionW = ctx.measureText(action).width;
    const dotsStart = bx - 130 + labelW + 4;
    const dotsEnd = bx + 130 - actionW - 4;
    for (let dx = dotsStart; dx < dotsEnd; dx += 5) {
      ctx.fillRect(dx, y - 2, 2, 1);
    }
    ctx.fillStyle = '#ddd';
    ctx.textAlign = 'right';
    ctx.fillText(action, bx + 130, y);
  }

  // Start prompt
  const puls = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = puls;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS ANY KEY TO START', bx, GH - 8);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORE: ' + highScore, bx, GH - 18);
  }
}

// === TUTORIAL OVERLAY (Pass 3) ===
function drawTutorialOverlay() {
  ctx.fillStyle = '#111111ee';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('HOW TO PLAY', GW/2, 30);

  ctx.font = '9px monospace';
  ctx.fillStyle = '#fff';
  const tips = [
    'You are a Baseling - born from the gardens!',
    '',
    'JUMP and HOLD to FLOAT with your spore cap.',
    'Release to shoot a spore puff.',
    '',
    'Press INHALE to suck in wild spores.',
    'SWALLOW to absorb their fungal power!',
    'Or SPIT them as a powerful star.',
    '',
    'SLIDE on the ground with DOWN + ATTACK.',
    '',
    'Reach the DOOR to clear each stage.',
    'Defeat the BOSS every 4th stage!',
    '',
    'Collect POOP to heal, shields to protect.'
  ];
  for (let i = 0; i < tips.length; i++) {
    ctx.fillText(tips[i], GW/2, 52 + i * 12);
  }

  // Baseling icon
  ctx.fillStyle = '#ff6688';
  ctx.beginPath();
  ctx.ellipse(GW/2, GH - 40, 10, 6, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.ellipse(GW/2, GH - 34, 7, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(GW/2 - 2, GH - 35, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(GW/2 + 2, GH - 35, 2, 0, Math.PI * 2); ctx.fill();

  const puls = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = puls;
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('PRESS ANY KEY TO BEGIN', GW/2, GH - 14);
  ctx.globalAlpha = 1;
}

function drawStageIntro() {
  const theme = WORLD_THEMES[(world - 1) % 6];
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  // Zone-themed border (Pass 3)
  ctx.fillStyle = theme.ambientColor + '22';
  ctx.fillRect(0, 0, GW, 4);
  ctx.fillRect(0, GH - 4, GW, 4);
  ctx.fillRect(0, 0, 4, GH);
  ctx.fillRect(GW - 4, 0, 4, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = theme.sky;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('WORLD ' + world + '-' + stage, GW/2, GH/2 - 20);

  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.fillText(theme.name, GW/2, GH/2 + 5);

  if (stage === 4) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('BOSS BATTLE!', GW/2, GH/2 + 25);
    // Boss name preview
    const bName = BOSSES[world - 1] ? BOSSES[world - 1].name : '';
    ctx.fillStyle = '#ffaa44';
    ctx.font = '9px monospace';
    ctx.fillText('VS. ' + bName.toUpperCase(), GW/2, GH/2 + 38);
  }

  // Zone decoration hint (Pass 3)
  ctx.fillStyle = theme.decoCol1 + '44';
  for (let i = 0; i < 8; i++) {
    const sx = 30 + i * 48;
    const sy = GH - 30 + Math.sin(frame * 0.03 + i) * 3;
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  const alpha = transitionTimer < 0.5 ? transitionTimer * 2 : 1;
  if (alpha < 1) {
    ctx.fillStyle = 'rgba(17,17,17,' + (1 - alpha) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }
}

function drawWinScreen() {
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#2d0a4e');
  grad.addColorStop(1, '#a855f7');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 47 + frame * 0.5) % GW;
    const sy = (i * 31) % GH;
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Floating spores (Pass 3)
  for (let i = 0; i < 10; i++) {
    const sx = (i * 40 + frame * 0.3) % GW;
    const sy = GH - (i * 25 + frame * 0.2) % GH;
    ctx.fillStyle = '#44ff8822';
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('CONGRATULATIONS!', GW/2, 45);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('You defeated the Spore Lord!', GW/2, 72);
  ctx.fillText('The mushroom forests are saved!', GW/2, 90);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW/2, 118);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('NEW HIGH SCORE!', GW/2, 138);
    ctx.globalAlpha = 1;
  }

  // Baseling victory pose (mushroom)
  const by = 178 + Math.sin(frame * 0.04) * 5;
  // Cap
  ctx.fillStyle = '#ff6688';
  ctx.beginPath();
  ctx.ellipse(GW/2, by - 6, 18, 8, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#ffffff44';
  ctx.beginPath(); ctx.arc(GW/2 - 5, by - 9, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(GW/2 + 6, by - 8, 2, 0, Math.PI * 2); ctx.fill();
  // Body
  ctx.fillStyle = '#ffccaa';
  ctx.beginPath();
  ctx.ellipse(GW/2, by + 2, 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffddcc';
  ctx.beginPath();
  ctx.ellipse(GW/2, by + 4, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(GW/2 - 4, by, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(GW/2 + 4, by, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(GW/2 - 3, by + 1, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(GW/2 + 5, by + 1, 2, 0, Math.PI * 2); ctx.fill();
  // Victory crown
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  ctx.moveTo(GW/2 - 10, by - 14);
  ctx.lineTo(GW/2 - 6, by - 22);
  ctx.lineTo(GW/2 - 2, by - 16);
  ctx.lineTo(GW/2 + 2, by - 22);
  ctx.lineTo(GW/2 + 6, by - 16);
  ctx.lineTo(GW/2 + 10, by - 22);
  ctx.lineTo(GW/2 + 14, by - 14);
  ctx.closePath();
  ctx.fill();

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 16);
  ctx.globalAlpha = 1;
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
