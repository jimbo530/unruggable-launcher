<script>
(function(){
"use strict";

// === BASELING STATS (BaselingPlayer.getMults, see ARCADE-STATS.md) ===
// The single source of stat math, clamped to the single-player band (0.8-1.6). The snake's
// derived globals read a D&D-style statB; rather than rewrite them, we synthesize statB from
// the five bounded multipliers and recompute the derived globals in recomputeStats(), re-run
// after a title-screen pick. The snake HEAD is the selected baseling; body stays procedural.
//   SPD -> move speed,  STA -> lives,  PWR -> tongue damage/range,  LCK -> score/spawns.
//   SWM is unused: water tiles are hazards here, not a traversable speed zone (don't fake it).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
var strMod = 0, dexMod = 0, conMod = 0, intMod = 0, wisMod = 0, chaMod = 0;
function syncMods() {
  strMod = Math.floor((statB.str - 10) / 2);
  dexMod = Math.floor((statB.dex - 10) / 2);
  conMod = Math.floor((statB.con - 10) / 2);
  intMod = Math.floor((statB.int - 10) / 2);
  wisMod = Math.floor((statB.wis - 10) / 2);
  chaMod = Math.floor((statB.cha - 10) / 2);
}
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck; statB.scoreMult = 1;
  statB.str = dnd(m.damage);    // STR -> tongue damage/range, segment loss reduction
  statB.dex = dnd(m.moveSpeed); // DEX -> move speed
  statB.con = dnd(m.health);    // CON -> extra lives
  statB.int = dnd(m.luck);      // INT -> score multiplier (luck flavor)
  statB.wis = dnd(m.luck);      // WIS -> detection/spawn (luck flavor)
  statB.cha = dnd(m.luck);      // CHA -> nibbley value, spawns
  syncMods();
  // Recompute the derived movement/combat globals from the refreshed mods.
  MOVE_SPEED = BASE_MOVE_SPEED + dexMod * 0.15; if (MOVE_SPEED < 1.5) MOVE_SPEED = 1.5;
  TONGUE_RANGE = BASE_TONGUE_RANGE + strMod * 0.2; if (TONGUE_RANGE < 1.2) TONGUE_RANGE = 1.2;
  TONGUE_DAMAGE = Math.max(1, statB.damage + Math.floor(strMod * 0.5));
  SCORE_MULT = Math.max(1, statB.scoreMult + intMod * 0.1);
  if (typeof COLORS !== 'undefined') {
    COLORS.snake = statB.color || '#2bb3a6';
    COLORS.snakeHead = lightenColorSafe(statB.color || '#2bb3a6', 40);
  }
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch(e) { console.warn('[sea-serpent] NftLoader display info failed:', e && e.message); }

// === SEA RESKIN ART (Sea Serpent) — preloaded images, procedural fallback ===
var SEA_ART = {};
['fish','gold-coins','gem-emerald'].forEach(function(n){
  var im = new Image(); im.src = 'art/sea/' + n + '.png'; SEA_ART[n] = im;
});
function seaImg(n){ var im = SEA_ART[n]; return (im && im.complete && im.naturalWidth > 0) ? im : null; }
syncMods();
var picking = false; // baseling character-select overlay open

// === CONSTANTS ===
var GW = 400, GH = 400;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'c'], labels: { a: 'TONGUE', c: 'PICK' } });

// Isometric tile dimensions
var TW = 32;
var TH = 16;
var TD = 10;
var GRID_SIZE = 12;

// Movement - DEX scales speed
var BASE_MOVE_SPEED = 2.2;
var MOVE_SPEED = BASE_MOVE_SPEED + dexMod * 0.15;
if (MOVE_SPEED < 1.5) MOVE_SPEED = 1.5;

// Tongue - STR scales range and damage
var BASE_TONGUE_RANGE = 1.8;
var TONGUE_RANGE = BASE_TONGUE_RANGE + strMod * 0.2;
if (TONGUE_RANGE < 1.2) TONGUE_RANGE = 1.2;
var TONGUE_DAMAGE = Math.max(1, statB.damage + Math.floor(strMod * 0.5));

// Score multiplier - INT
var SCORE_MULT = Math.max(1, statB.scoreMult + intMod * 0.1);

// Game state
var state = 'title';
var score = 0;
var highScore = TAS.score.load('seaserpent_hi');
var level = 1;
var frame = 0;
var timeLeft = 0;
var BASE_LIVES = 3;
var lives = BASE_LIVES + conMod + statB.lives; // CON gives extra lives
if (lives < 1) lives = 1;
var showTutorial = true;
var tutorialTimer = 0;

// Snake
var snake = [];
var snakeDir = 0;
var moveCooldown = 0;
var tongueTimer = 0;
var tongueDir = 0;
var targetLength = 1;

// Level data
var tiles = [];
var nibbleys = [];
var hazards = [];
var exitGate = null;
var requiredLength = 5;
var enemies = [];
var bosses = [];
var items = [];
var scorePopups = [];

// Camera
var camX = 0, camY = 0;

// Tile types
var TILE_NORMAL = 0;
var TILE_RAMP_NE = 1;
var TILE_RAMP_SE = 2;
var TILE_RAMP_SW = 3;
var TILE_RAMP_NW = 4;
var TILE_ICE = 5;
var TILE_WATER = 6;
var TILE_SPIKE = 7;
var TILE_EMPTY = 8;
var TILE_MOVING = 9;
var TILE_POISON = 10;
var TILE_MUD = 11;
var TILE_LAVA = 12;
var TILE_CRYSTAL = 13;

// Direction vectors (grid-space: NE, SE, SW, NW)
var DIR_DX = [1, 0, -1, 0];
var DIR_DY = [0, 1, 0, -1];

// === ZONE THEMES ===
// Each zone has distinct palette and visuals
var ZONES = [
  { // Zone 1: Sporewood (levels 1-2)
    name: 'Sporewood',
    bg: '#1a1c2c',
    tile: ['#3a5a3a', '#2a4a2a', '#1a3a1a'],
    tileEdge: '#1a2a0a',
    accent: '#38d973',
    particle: '#38d973',
    waterColor: '#225588',
    desc: 'The fungal forest floor'
  },
  { // Zone 2: Moldvein (levels 3-4)
    name: 'Moldvein',
    bg: '#1a1c2c',
    tile: ['#4a4a5a', '#3a3a4a', '#2a2a3a'],
    tileEdge: '#1a1a2a',
    accent: '#a855f7',
    particle: '#a855f7',
    waterColor: '#112244',
    desc: 'Echoing spore chambers'
  },
  { // Zone 3: Rotgarden (levels 5-6)
    name: 'Rotgarden',
    bg: '#1a1c2c',
    tile: ['#3a4a3a', '#2a3a2a', '#1a2a1a'],
    tileEdge: '#0a1a0a',
    accent: '#38d973',
    particle: '#38d973',
    waterColor: '#224422',
    desc: 'Fetid compost beds'
  },
  { // Zone 4: Cinderbloom (levels 7-8)
    name: 'Cinderbloom',
    bg: '#1a1c2c',
    tile: ['#5a3a2a', '#4a2a1a', '#3a1a0a'],
    tileEdge: '#2a0a0a',
    accent: '#e6482e',
    particle: '#e6482e',
    waterColor: '#cc3300',
    desc: 'Rivers of molten spore'
  },
  { // Zone 5: Mycelium Throne (levels 9-10)
    name: 'Mycelium Throne',
    bg: '#1a1c2c',
    tile: ['#3a4a6a', '#2a3a5a', '#1a2a4a'],
    tileEdge: '#0a1a2a',
    accent: '#3cacd7',
    particle: '#3cacd7',
    waterColor: '#1144aa',
    desc: 'The crystal mycelium'
  }
];

function getZone(lvl) {
  if (lvl <= 2) return ZONES[0];
  if (lvl <= 4) return ZONES[1];
  if (lvl <= 6) return ZONES[2];
  if (lvl <= 8) return ZONES[3];
  return ZONES[4];
}

// Colors (base, overridden per zone)
var COLORS = {
  tile: ['#5a7a5a', '#4a6a4a', '#3a5a3a'],
  tileEdge: '#2a3a2a',
  ice: '#88ccee',
  water: '#2244aa',
  spike: '#aa3333',
  snake: statB.color || '#2bb3a6',
  snakeHead: lightenColorSafe(statB.color || '#2bb3a6', 40),
  exit: '#f4b41b',
  exitClosed: '#7a444a',
  poison: '#77aa33',
  mud: '#665533',
  lava: '#ff4400',
  crystal: '#aaddff'
};

// Now that COLORS exists, do a full stat recompute (also refreshes snake colors) and boot
// the shared player module (silent — never pops a wallet dialog).
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[sea-serpent] player init failed:', e && e.message); });
}

// === BASELING ENEMY TYPES ===
var ENEMY_TYPES = [
  { name: 'Mold Crawler', color: '#7a444a', accentColor: '#887755', hp: 1, speed: 1.8, size: 6, pattern: 'wander', scoreVal: 150, desc: 'Squelchy garden dwellers' },
  { name: 'Spore Bat', color: '#444466', accentColor: '#a855f7', hp: 1, speed: 1.2, size: 5, pattern: 'swoop', scoreVal: 200, desc: 'Blind but fast' },
  { name: 'Rot Leech', color: '#336633', accentColor: '#38d973', hp: 2, speed: 2.5, size: 7, pattern: 'chase', scoreVal: 250, desc: 'Drains your segments' },
  { name: 'Ember Spore', color: '#e6482e', accentColor: '#ff6644', hp: 2, speed: 1.5, size: 6, pattern: 'fireball', scoreVal: 300, desc: 'Throws burning spores' },
  { name: 'Mycelium Sentry', color: '#3cacd7', accentColor: '#66aaee', hp: 3, speed: 3.0, size: 8, pattern: 'patrol', scoreVal: 400, desc: 'Guards the mycelium' }
];

// === BASELING BOSS TYPES ===
var BOSS_TYPES = [
  { name: 'Sporeback Beetle', color: '#556633', accentColor: '#38d973', hp: 5, size: 14, pattern: 'charge', scoreVal: 1000, zone: 0 },
  { name: 'Moldvein Wyrm', color: '#555577', accentColor: '#a855f7', hp: 8, size: 16, pattern: 'burrow', scoreVal: 1500, zone: 1 },
  { name: 'Compost Toad', color: '#336644', accentColor: '#38d973', hp: 10, size: 18, pattern: 'tongue', scoreVal: 2000, zone: 2 },
  { name: 'Cinderspore Drake', color: '#e6482e', accentColor: '#ff5533', hp: 12, size: 20, pattern: 'breath', scoreVal: 2500, zone: 3 },
  { name: 'Mycelium Colossus', color: '#3cacd7', accentColor: '#5588cc', hp: 15, size: 22, pattern: 'shatter', scoreVal: 5000, zone: 4 }
];

// === BASELING ITEM TYPES ===
var ITEM_TYPES = [
  { name: 'Garden Moss', color: '#38d973', effect: 'heal', value: 1, icon: '+', desc: 'Restores a life' },
  { name: 'Spore Rush', color: '#f4b41b', effect: 'speed', value: 3, icon: '>', desc: 'Temporary speed boost' },
  { name: 'POOP Shield', color: '#3cacd7', effect: 'shield', value: 5, icon: 'O', desc: 'Absorbs one hit' },
  { name: 'Spore Gem', color: '#f4b41b', effect: 'score', value: 500, icon: '*', desc: 'Bonus POOP tokens' },
  { name: 'Spore Thorn', color: '#e6482e', effect: 'tongue', value: 3, icon: 'T', desc: 'Extended tongue range' },
  { name: 'Phantom Spore', color: '#a855f7', effect: 'phase', value: 4, icon: '~', desc: 'Phase through hazards' }
];

// Active power-up state
var powerUps = { speed: 0, shield: 0, tongue: 0, phase: 0 };

// === PIXEL ART HELPERS (NES-style) ===
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function drawPixelCircle(cx, cy, r, color) {
  ctx.fillStyle = color;
  var x0 = Math.floor(cx - r);
  var y0 = Math.floor(cy - r);
  var d = Math.ceil(r * 2);
  for (var py = 0; py < d; py += 2) {
    for (var px = 0; px < d; px += 2) {
      var dx = px - r + 1;
      var dy = py - r + 1;
      if (dx * dx + dy * dy <= r * r) {
        ctx.fillRect(x0 + px, y0 + py, 2, 2);
      }
    }
  }
}

function drawPixelDiamond(cx, cy, w, h, color) {
  ctx.fillStyle = color;
  var hw = Math.floor(w / 2);
  var hh = Math.floor(h / 2);
  for (var py = -hh; py <= hh; py += 2) {
    var ratio = 1 - Math.abs(py) / hh;
    var rowW = Math.floor(hw * ratio);
    ctx.fillRect(Math.floor(cx - rowW), Math.floor(cy + py), rowW * 2, 2);
  }
}

// NES-style sprite: 8x8 pixel grid
function drawPixelSprite(x, y, pixels, palette, scale) {
  scale = scale || 1;
  for (var row = 0; row < pixels.length; row++) {
    var line = pixels[row];
    for (var col = 0; col < line.length; col++) {
      var ch = line[col];
      if (ch !== '.' && palette[ch]) {
        ctx.fillStyle = palette[ch];
        ctx.fillRect(Math.floor(x + col * scale), Math.floor(y + row * scale), scale, scale);
      }
    }
  }
}

// === ISOMETRIC PROJECTION ===
function isoX(gx, gy) {
  return (gx - gy) * (TW / 2) + GW / 2;
}

function isoY(gx, gy, height) {
  return (gx + gy) * (TH / 2) - (height || 0) * TD + GH / 3;
}

// === SCORE POPUP SYSTEM ===
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({
    x: x, y: y,
    text: text,
    color: color || '#ffdd44',
    life: 1.2,
    maxLife: 1.2
  });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.life -= dt;
    p.y -= dt * 40;
    if (p.life <= 0) {
      scorePopups.splice(i, 1);
    }
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  tiles = [];
  nibbleys = [];
  hazards = [];
  enemies = [];
  bosses = [];
  items = [];
  scorePopups = [];
  powerUps = { speed: 0, shield: 0, tongue: 0, phase: 0 };

  var zone = getZone(lvl);
  COLORS.tile = zone.tile;
  COLORS.tileEdge = zone.tileEdge;
  COLORS.water = zone.waterColor;

  var size = GRID_SIZE;
  var baseHeight = 0;

  // Create base grid
  for (var r = 0; r < size; r++) {
    tiles[r] = [];
    for (var c = 0; c < size; c++) {
      tiles[r][c] = { height: baseHeight, type: TILE_NORMAL };
    }
  }

  // Add height variation based on level
  if (lvl >= 4) {
    var platforms = 2 + Math.floor(lvl / 3);
    for (var p = 0; p < platforms; p++) {
      var px = TAS.math.randInt(1, size - 3);
      var py = TAS.math.randInt(1, size - 3);
      var pw = TAS.math.randInt(2, 4);
      var ph = TAS.math.randInt(2, 4);
      var pHeight = TAS.math.randInt(1, 2);
      for (var rr = py; rr < Math.min(py + ph, size); rr++) {
        for (var cc = px; cc < Math.min(px + pw, size); cc++) {
          tiles[rr][cc].height = pHeight;
        }
      }
    }
  }

  // Zone-specific tiles
  if (lvl >= 5 && lvl <= 6) {
    // Swamp: poison and mud tiles
    var poisonCount = Math.min(lvl - 3, 6);
    for (var pi = 0; pi < poisonCount; pi++) {
      var ppx = TAS.math.randInt(2, size - 3);
      var ppy = TAS.math.randInt(2, size - 3);
      if (!(ppx === 1 && ppy === 1) && tiles[ppy][ppx].type === TILE_NORMAL) {
        tiles[ppy][ppx].type = TILE_POISON;
      }
    }
    var mudCount = Math.min(lvl - 3, 5);
    for (var mi = 0; mi < mudCount; mi++) {
      var mpx = TAS.math.randInt(1, size - 2);
      var mpy = TAS.math.randInt(1, size - 2);
      if (!(mpx === 1 && mpy === 1) && tiles[mpy][mpx].type === TILE_NORMAL) {
        tiles[mpy][mpx].type = TILE_MUD;
      }
    }
  }

  if (lvl >= 7 && lvl <= 8) {
    // Lava zone: lava tiles replace water
    var lavaCount = Math.min(lvl - 4, 8);
    for (var li = 0; li < lavaCount; li++) {
      var lx = TAS.math.randInt(2, size - 3);
      var ly = TAS.math.randInt(2, size - 3);
      if (!(lx === 1 && ly === 1) && tiles[ly][lx].type === TILE_NORMAL) {
        tiles[ly][lx].type = TILE_LAVA;
      }
    }
  }

  if (lvl >= 9) {
    // Crystal zone: crystal tiles
    var crystalCount = Math.min(lvl - 6, 10);
    for (var ci = 0; ci < crystalCount; ci++) {
      var crx = TAS.math.randInt(1, size - 2);
      var cry = TAS.math.randInt(1, size - 2);
      if (!(crx === 1 && cry === 1) && tiles[cry][crx].type === TILE_NORMAL) {
        tiles[cry][crx].type = TILE_CRYSTAL;
      }
    }
  }

  // Water tiles (forest/cavern)
  if (lvl >= 2 && lvl <= 6) {
    var waterCount = Math.min(lvl - 1, 5);
    for (var w = 0; w < waterCount; w++) {
      var wx = TAS.math.randInt(2, size - 3);
      var wy = TAS.math.randInt(2, size - 3);
      if (!(wx === 1 && wy === 1)) {
        tiles[wy][wx].type = TILE_WATER;
      }
    }
  }

  // Spike tiles
  if (lvl >= 3) {
    var spikeCount = Math.min(lvl - 2, 6);
    for (var s = 0; s < spikeCount; s++) {
      var sx = TAS.math.randInt(1, size - 2);
      var sy = TAS.math.randInt(1, size - 2);
      if (tiles[sy][sx].type === TILE_NORMAL && !(sx === 1 && sy === 1)) {
        tiles[sy][sx].type = TILE_SPIKE;
      }
    }
  }

  // Ice tiles (cavern+)
  if (lvl >= 3 && lvl <= 4) {
    var iceCount = Math.min(lvl, 8);
    for (var ic = 0; ic < iceCount; ic++) {
      var ix = TAS.math.randInt(0, size - 1);
      var iy = TAS.math.randInt(0, size - 1);
      if (tiles[iy][ix].type === TILE_NORMAL && !(ix === 1 && iy === 1)) {
        tiles[iy][ix].type = TILE_ICE;
      }
    }
  }

  // Empty tiles (edges)
  if (lvl >= 4) {
    var emptyCount = Math.min(lvl, 8);
    for (var e = 0; e < emptyCount; e++) {
      var ex = TAS.math.randInt(0, size - 1);
      var ey = TAS.math.randInt(0, size - 1);
      if ((ex === 0 || ex === size - 1 || ey === 0 || ey === size - 1) && !(ex === 1 && ey === 1)) {
        tiles[ey][ex].type = TILE_EMPTY;
      }
    }
  }

  // Spawn baseling enemies based on zone
  var zoneIdx = Math.floor((lvl - 1) / 2);
  if (zoneIdx > 4) zoneIdx = 4;
  if (lvl >= 2) {
    var enemyCount = Math.min(lvl - 1, 5);
    // CHA: enemies hesitate (fewer spawn)
    enemyCount = Math.max(1, enemyCount - Math.floor(chaMod / 2));
    for (var en = 0; en < enemyCount; en++) {
      var etype = ENEMY_TYPES[zoneIdx];
      enemies.push({
        gx: TAS.math.randInt(3, size - 3),
        gy: TAS.math.randInt(3, size - 3),
        height: 0,
        dir: TAS.math.randInt(0, 3),
        timer: TAS.math.randRange(0, 3),
        moveTimer: 0,
        type: etype,
        hp: etype.hp,
        flash: 0,
        px: 0, py: 0,
        attackTimer: 0,
        projectiles: []
      });
    }
  }

  // Boss every even level
  if (lvl % 2 === 0 && lvl >= 2) {
    var bossType = BOSS_TYPES[Math.min(zoneIdx, BOSS_TYPES.length - 1)];
    bosses.push({
      gx: size - 4,
      gy: size - 4,
      height: 0,
      dir: 2,
      timer: 0,
      moveTimer: 0,
      type: bossType,
      hp: bossType.hp,
      maxHp: bossType.hp,
      flash: 0,
      px: 0, py: 0,
      attackTimer: 0,
      phase: 0,
      shakeTimer: 0
    });
  }

  // Spawn items (WIS increases gold/item rate)
  var itemCount = 1 + Math.floor(lvl / 3) + Math.max(0, Math.floor(wisMod / 2));
  for (var it = 0; it < itemCount; it++) {
    var itx = TAS.math.randInt(1, size - 2);
    var ity = TAS.math.randInt(1, size - 2);
    if (tiles[ity][itx].type === TILE_NORMAL && !(itx === 1 && ity === 1)) {
      var itemType = ITEM_TYPES[TAS.math.randInt(0, ITEM_TYPES.length - 1)];
      items.push({
        gx: itx + Math.random() * 0.4 - 0.2,
        gy: ity + Math.random() * 0.4 - 0.2,
        height: tiles[ity][itx].height,
        type: itemType,
        bounceT: Math.random() * Math.PI * 2,
        collected: false
      });
    }
  }

  // Spawn nibbleys - CHA boosts value, WIS boosts gold chance
  var nibCount = Math.max(15 - lvl, 6);
  spawnNibbleys(nibCount, size, lvl);

  // Required length to open gate - WIS reduces requirement slightly
  requiredLength = Math.max(3, 4 + lvl * 2 - Math.max(0, wisMod));

  // Time limit - INT gives bonus time
  timeLeft = 45 + (10 - lvl) * 5 + Math.max(0, intMod * 3);
  if (timeLeft < 30) timeLeft = 30;

  // Exit gate
  exitGate = {
    gx: size - 2,
    gy: size - 2,
    height: tiles[size - 2][size - 2].height,
    open: false
  };
  tiles[size - 2][size - 2].type = TILE_NORMAL;

  // Snake spawn - player IS the baseling
  snake = [{ gx: 1, gy: 1, height: tiles[1][1].height, px: isoX(1, 1), py: isoY(1, 1, tiles[1][1].height) }];
  targetLength = 1;
  snakeDir = 1;
  moveCooldown = 0;
}

function spawnNibbleys(count, size, lvl) {
  var goldBoost = Math.max(0, wisMod) * 0.02; // WIS boosts gold chance
  var chaBoost = Math.max(0, chaMod); // CHA boosts value

  for (var i = 0; i < count; i++) {
    var nx = TAS.math.randInt(0, size - 1);
    var ny = TAS.math.randInt(0, size - 1);
    if (tiles[ny] && tiles[ny][nx] && tiles[ny][nx].type !== TILE_WATER && tiles[ny][nx].type !== TILE_EMPTY && tiles[ny][nx].type !== TILE_LAVA) {
      if (!(nx === 1 && ny === 1)) {
        var color, value, speed;
        var roll = Math.random();
        if (roll < 0.05 + goldBoost && lvl >= 3) {
          color = '#ffdd00';
          value = 5 + chaBoost;
          speed = 0;
        } else if (roll < 0.15 && lvl >= 2) {
          color = '#ff4444';
          value = 3 + Math.floor(chaBoost / 2);
          speed = 2.5;
        } else if (roll < 0.35) {
          color = '#4488ff';
          value = 2 + Math.floor(chaBoost / 3);
          speed = 1.2;
        } else {
          color = '#44dd44';
          value = 1;
          speed = 0.8;
        }
        nibbleys.push({
          gx: nx + Math.random() * 0.5 - 0.25,
          gy: ny + Math.random() * 0.5 - 0.25,
          height: tiles[ny][nx].height,
          bounceT: Math.random() * Math.PI * 2,
          color: color,
          value: value,
          speed: speed,
          timer: color === '#ffdd00' ? 8 + Math.random() * 4 : 999,
          dx: (Math.random() - 0.5) * speed,
          dy: (Math.random() - 0.5) * speed
        });
      }
    }
  }
}

// === GAME INIT ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = BASE_LIVES + conMod + statB.lives; // CON: extra lives
  if (lives < 1) lives = 1;
  level = 1;
  TAS.particles.clear();
  generateLevel(level);
  playLevelStart();
  if (showTutorial) {
    tutorialTimer = 6;
    showTutorial = false;
  }
}

function nextLevel() {
  level++;
  if (level > 10) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('seaserpent_hi', highScore);
    }
    playVictoryFanfare();
    return;
  }
  generateLevel(level);
  playLevelStart();
}

function loseLife() {
  // CON: spike resistance (chance to survive with 0 dmg)
  if (conMod > 0 && Math.random() < conMod * 0.08) {
    TAS.fx.flash('#4488ff', 0.2);
    spawnScorePopup(snake[0].px, snake[0].py - 20, 'TOUGH!', '#4488ff');
    return;
  }

  lives--;
  TAS.fx.shake(12, 0.82);
  TAS.fx.flash('#ff0000', 0.4);
  playDeath();

  // Spawn death particles
  if (snake.length > 0) {
    var head = snake[0];
    TAS.particles.spawn(head.px, head.py, '#ff4444', 20, 3, { gravity: 0.8, size: 2 });
  }

  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('seaserpent_hi', highScore);
    }
  } else {
    snake = [{ gx: 1, gy: 1, height: tiles[1][1].height, px: isoX(1, 1), py: isoY(1, 1, tiles[1][1].height) }];
    targetLength = 1;
    snakeDir = 1;
    moveCooldown = 0.5;
  }
}

function loseSegments(count) {
  // STR: reduce segment loss
  count = Math.max(1, count - Math.floor(strMod / 2));

  var removed = Math.min(count, snake.length - 1);
  if (removed > 0) {
    for (var i = 0; i < removed; i++) {
      var seg = snake.pop();
      TAS.particles.spawn(seg.px, seg.py, statB.color, 8, 2.5, { gravity: 0.5, size: 2 });
    }
    targetLength = snake.length;
    TAS.fx.shake(5, 0.88);
    playSegmentLoss();
  }
  if (snake.length <= 0) {
    loseLife();
  }
}

// === INPUT HANDLING ===
var inputDir = -1;
var tonguePressed = false;
var prevTongue = false;

function readInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;

  inputDir = -1;

  // NES-style: arrows/WASD + touch dpad
  if (k['ArrowUp'] || k['KeyW'] || t.up) inputDir = 0;
  else if (k['ArrowRight'] || k['KeyD'] || t.right) inputDir = 1;
  else if (k['ArrowDown'] || k['KeyS'] || t.down) inputDir = 2;
  else if (k['ArrowLeft'] || k['KeyA'] || t.left) inputDir = 3;

  var nowTongue = k['Space'] || k['KeyZ'] || k['KeyX'] || t.a;
  tonguePressed = nowTongue && !prevTongue;
  prevTongue = nowTongue;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    if (picking) return; // baseling picker overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'levelClear') {
    if (frame > 90) {
      nextLevel();
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial countdown
  if (tutorialTimer > 0) tutorialTimer -= dt;

  readInput();

  // Update power-up timers
  for (var pkey in powerUps) {
    if (powerUps[pkey] > 0) powerUps[pkey] -= dt;
  }

  // Timer - INT gives awareness of remaining time
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    loseLife();
    if (state === 'playing') {
      timeLeft = 30;
    }
    return;
  }

  // Move snake - DEX modifies speed, powerups stack
  var currentSpeed = MOVE_SPEED;
  if (powerUps.speed > 0) currentSpeed *= 1.5;

  moveCooldown -= dt;
  if (moveCooldown <= 0 && inputDir >= 0) {
    snakeDir = inputDir;
    moveSnake();
    moveCooldown = 1.0 / currentSpeed;

    // Ice: auto-slide - DEX gives better control
    var head = snake[0];
    var hgx = Math.round(head.gx);
    var hgy = Math.round(head.gy);
    if (hgx >= 0 && hgx < GRID_SIZE && hgy >= 0 && hgy < GRID_SIZE) {
      if (tiles[hgy][hgx].type === TILE_ICE) {
        // DEX: better ice control (longer cooldown = more control)
        var iceSpeed = 0.15 + Math.max(0, dexMod) * 0.05;
        moveCooldown = iceSpeed / currentSpeed;
      }
      // MUD: slows movement
      if (tiles[hgy][hgx].type === TILE_MUD) {
        moveCooldown *= 1.8;
      }
    }
  } else if (moveCooldown <= 0) {
    // On ice, keep sliding
    var head2 = snake[0];
    var hgx2 = Math.round(head2.gx);
    var hgy2 = Math.round(head2.gy);
    if (hgx2 >= 0 && hgx2 < GRID_SIZE && hgy2 >= 0 && hgy2 < GRID_SIZE) {
      if (tiles[hgy2][hgx2].type === TILE_ICE) {
        moveSnake();
        moveCooldown = 0.2 / currentSpeed;
      }
    }
  }

  // Tongue attack - cooldown modified by STR
  var tongueCooldown = Math.max(0.15, 0.3 - strMod * 0.02);
  if (powerUps.tongue > 0) tongueCooldown *= 0.6;

  if (tonguePressed && tongueTimer <= 0) {
    tongueTimer = tongueCooldown;
    tongueDir = snakeDir;
    playTongueSnap();
    checkTongueHit();
    checkTongueEnemy();
    checkTongueBoss();
  }
  if (tongueTimer > 0) tongueTimer -= dt;

  // Update nibbleys
  updateNibbleys(dt);

  // Update enemies
  updateEnemies(dt);

  // Update bosses
  updateBosses(dt);

  // Check item pickup
  checkItemPickup();

  // Check gate status - WIS: see progress toward gate
  if (exitGate && !exitGate.open && snake.length >= requiredLength) {
    exitGate.open = true;
    playGateOpen();
    TAS.particles.spawn(
      isoX(exitGate.gx, exitGate.gy),
      isoY(exitGate.gx, exitGate.gy, exitGate.height),
      '#f4b41b', 20, 4, { gravity: -0.5, size: 2 }
    );
    spawnScorePopup(isoX(exitGate.gx, exitGate.gy), isoY(exitGate.gx, exitGate.gy, exitGate.height) - 20, 'GATE OPEN!', '#f4b41b');
  }

  // Check exit
  if (exitGate && exitGate.open) {
    var headG = snake[0];
    if (Math.abs(headG.gx - exitGate.gx) < 0.6 && Math.abs(headG.gy - exitGate.gy) < 0.6) {
      // INT: score multiplier on level clear
      var timeBonus = Math.floor(timeLeft) * 10;
      var lengthBonus = snake.length * 50;
      var clearScore = Math.floor((timeBonus + lengthBonus) * SCORE_MULT);
      score += clearScore;
      state = 'levelClear';
      frame = 0;
      playLevelClear();
      TAS.fx.flash('#ffffff', 0.3);
      TAS.fx.shake(3, 0.95);
    }
  }

  // Animate segment positions
  for (var i = 0; i < snake.length; i++) {
    var seg = snake[i];
    var targetPx = isoX(seg.gx, seg.gy);
    var targetPy = isoY(seg.gx, seg.gy, seg.height);
    seg.px = TAS.math.lerp(seg.px, targetPx, dt * 12);
    seg.py = TAS.math.lerp(seg.py, targetPy, dt * 12);
  }

  // Update camera
  if (snake.length > 0) {
    var headS = snake[0];
    camX = TAS.math.lerp(camX, headS.px - GW / 2, dt * 4);
    camY = TAS.math.lerp(camY, headS.py - GH / 2.5, dt * 4);
  }
}

function moveSnake() {
  var head = snake[0];
  var newGX = head.gx + DIR_DX[snakeDir];
  var newGY = head.gy + DIR_DY[snakeDir];

  var ngx = Math.round(newGX);
  var ngy = Math.round(newGY);

  if (ngx < 0 || ngx >= GRID_SIZE || ngy < 0 || ngy >= GRID_SIZE) {
    playFall();
    loseSegments(2);
    return;
  }

  var tile = tiles[ngy][ngx];

  if (tile.type === TILE_EMPTY) {
    playFall();
    loseSegments(2);
    return;
  }

  if (tile.type === TILE_WATER || tile.type === TILE_LAVA) {
    if (powerUps.phase > 0) {
      // Ghost pepper: phase through
      spawnScorePopup(isoX(newGX, newGY), isoY(newGX, newGY, tile.height) - 10, 'PHASE!', '#cc44ff');
    } else {
      playFall();
      var splashColor = tile.type === TILE_LAVA ? '#ff6622' : '#4488ff';
      TAS.particles.spawn(isoX(newGX, newGY), isoY(newGX, newGY, tile.height), splashColor, 15, 3, { gravity: 1, size: 2 });
      if (tile.type === TILE_LAVA) TAS.fx.shake(8, 0.85);
      loseLife();
      return;
    }
  }

  if (tile.type === TILE_SPIKE) {
    if (powerUps.phase <= 0) {
      // CON: chance to resist spike damage
      if (conMod >= 2 && Math.random() < 0.3) {
        spawnScorePopup(isoX(newGX, newGY), isoY(newGX, newGY, tile.height) - 10, 'RESIST!', '#4488ff');
      } else {
        TAS.fx.flash('#ff4444', 0.2);
        TAS.fx.shake(3, 0.92);
        loseSegments(1);
      }
    }
  }

  if (tile.type === TILE_POISON) {
    if (powerUps.phase <= 0) {
      // Poison: lose 1 segment slowly
      TAS.fx.flash('#88cc44', 0.15);
      if (Math.random() < 0.4) loseSegments(1);
    }
  }

  // Move body segments
  for (var i = snake.length - 1; i > 0; i--) {
    snake[i].gx = snake[i - 1].gx;
    snake[i].gy = snake[i - 1].gy;
    snake[i].height = snake[i - 1].height;
  }

  head.gx = newGX;
  head.gy = newGY;
  head.height = tile.height;

  checkNibbleysAtHead();

  // Check enemy collision
  for (var e = 0; e < enemies.length; e++) {
    var en = enemies[e];
    if (Math.abs(head.gx - en.gx) < 0.7 && Math.abs(head.gy - en.gy) < 0.7) {
      if (powerUps.shield > 0) {
        // Shield absorbs hit
        powerUps.shield = 0;
        spawnScorePopup(head.px || isoX(head.gx, head.gy), (head.py || isoY(head.gx, head.gy, head.height)) - 15, 'BLOCKED!', '#4488cc');
        TAS.fx.flash('#4488cc', 0.2);
      } else {
        TAS.fx.shake(6, 0.86);
        loseSegments(2);
      }
      break;
    }
  }

  // Boss collision
  for (var b = 0; b < bosses.length; b++) {
    var boss = bosses[b];
    if (Math.abs(head.gx - boss.gx) < 1.2 && Math.abs(head.gy - boss.gy) < 1.2) {
      if (powerUps.shield > 0) {
        powerUps.shield = 0;
        spawnScorePopup(head.px || isoX(head.gx, head.gy), (head.py || isoY(head.gx, head.gy, head.height)) - 15, 'BLOCKED!', '#4488cc');
      } else {
        TAS.fx.shake(10, 0.82);
        loseSegments(3);
      }
      break;
    }
  }

  // Grow if needed
  if (snake.length < targetLength) {
    var last = snake[snake.length - 1];
    snake.push({
      gx: last.gx,
      gy: last.gy,
      height: last.height,
      px: last.px,
      py: last.py
    });
  }
}

function checkNibbleysAtHead() {
  if (snake.length === 0) return;
  var head = snake[0];

  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    var dx = head.gx - nib.gx;
    var dy = head.gy - nib.gy;
    if (dx * dx + dy * dy < 0.8) {
      eatNibbley(i);
    }
  }
}

function checkTongueHit() {
  if (snake.length === 0) return;
  var head = snake[0];
  var range = TONGUE_RANGE;
  if (powerUps.tongue > 0) range *= 1.4;

  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    var hdx = nib.gx - head.gx;
    var hdy = nib.gy - head.gy;
    var along = hdx * DIR_DX[tongueDir] + hdy * DIR_DY[tongueDir];
    var perp = Math.abs(hdx * DIR_DY[tongueDir] - hdy * DIR_DX[tongueDir]);
    if (along > 0 && along < range && perp < 0.6) {
      eatNibbley(i);
    }
  }
}

function checkTongueEnemy() {
  if (snake.length === 0) return;
  var head = snake[0];
  var range = TONGUE_RANGE;
  if (powerUps.tongue > 0) range *= 1.4;

  for (var i = enemies.length - 1; i >= 0; i--) {
    var en = enemies[i];
    var hdx = en.gx - head.gx;
    var hdy = en.gy - head.gy;
    var along = hdx * DIR_DX[tongueDir] + hdy * DIR_DY[tongueDir];
    var perp = Math.abs(hdx * DIR_DY[tongueDir] - hdy * DIR_DX[tongueDir]);
    if (along > 0 && along < range && perp < 0.8) {
      // STR: tongue damage
      en.hp -= TONGUE_DAMAGE;
      en.flash = 0.2;
      TAS.fx.shake(2, 0.95);
      TAS.particles.spawn(isoX(en.gx, en.gy), isoY(en.gx, en.gy, en.height) - 5, '#ff4444', 6, 2, { gravity: 0.5, size: 1 });
      if (en.hp <= 0) {
        var points = Math.floor(en.type.scoreVal * SCORE_MULT);
        score += points;
        spawnScorePopup(isoX(en.gx, en.gy), isoY(en.gx, en.gy, en.height) - 15, '+' + points, '#ff8844');
        TAS.particles.spawn(isoX(en.gx, en.gy), isoY(en.gx, en.gy, en.height), en.type.color, 15, 3, { gravity: 0.8, size: 2 });
        enemies.splice(i, 1);
      }
    }
  }
}

function checkTongueBoss() {
  if (snake.length === 0) return;
  var head = snake[0];
  var range = TONGUE_RANGE;
  if (powerUps.tongue > 0) range *= 1.4;

  for (var i = bosses.length - 1; i >= 0; i--) {
    var boss = bosses[i];
    var hdx = boss.gx - head.gx;
    var hdy = boss.gy - head.gy;
    var along = hdx * DIR_DX[tongueDir] + hdy * DIR_DY[tongueDir];
    var perp = Math.abs(hdx * DIR_DY[tongueDir] - hdy * DIR_DX[tongueDir]);
    if (along > 0 && along < range + 0.5 && perp < 1.2) {
      boss.hp -= TONGUE_DAMAGE;
      boss.flash = 0.3;
      boss.shakeTimer = 0.2;
      playBossHit();
      TAS.fx.shake(4, 0.9);
      TAS.particles.spawn(isoX(boss.gx, boss.gy), isoY(boss.gx, boss.gy, boss.height) - 8, '#ffaa00', 10, 3, { gravity: 0.6, size: 2 });
      spawnScorePopup(isoX(boss.gx, boss.gy), isoY(boss.gx, boss.gy, boss.height) - 25, '-' + TONGUE_DAMAGE + ' HP', '#ff4444');
      if (boss.hp <= 0) {
        var bpoints = Math.floor(boss.type.scoreVal * SCORE_MULT);
        score += bpoints;
        spawnScorePopup(isoX(boss.gx, boss.gy), isoY(boss.gx, boss.gy, boss.height) - 35, '+' + bpoints + '!', '#ffdd44');
        TAS.particles.spawn(isoX(boss.gx, boss.gy), isoY(boss.gx, boss.gy, boss.height), boss.type.accentColor, 30, 5, { gravity: 0.5, size: 3 });
        TAS.fx.shake(15, 0.78);
        TAS.fx.flash('#ffffff', 0.5);
        playBossDeath();
        bosses.splice(i, 1);
        // Boss drop: extra nibbleys
        spawnNibbleys(8, GRID_SIZE, level);
      }
    }
  }
}

function checkItemPickup() {
  if (snake.length === 0) return;
  var head = snake[0];

  for (var i = items.length - 1; i >= 0; i--) {
    var item = items[i];
    if (item.collected) continue;
    var dx = head.gx - item.gx;
    var dy = head.gy - item.gy;
    if (dx * dx + dy * dy < 0.7) {
      item.collected = true;
      playItemPickup();
      var itype = item.type;
      spawnScorePopup(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height) - 15, itype.name, itype.color);
      TAS.particles.spawn(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height), itype.color, 10, 2, { gravity: -0.3, size: 2 });

      switch (itype.effect) {
        case 'heal':
          lives = Math.min(lives + 1, BASE_LIVES + conMod + statB.lives + 2);
          spawnScorePopup(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height) - 25, '+1 LIFE', '#55cc55');
          break;
        case 'speed':
          powerUps.speed = itype.value;
          break;
        case 'shield':
          powerUps.shield = itype.value;
          spawnScorePopup(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height) - 25, 'SHIELD!', '#4488cc');
          break;
        case 'score':
          var starPoints = Math.floor(itype.value * SCORE_MULT);
          score += starPoints;
          spawnScorePopup(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height) - 25, '+' + starPoints, '#ffdd44');
          break;
        case 'tongue':
          powerUps.tongue = itype.value;
          break;
        case 'phase':
          powerUps.phase = itype.value;
          spawnScorePopup(isoX(item.gx, item.gy), isoY(item.gx, item.gy, item.height) - 25, 'PHASE!', '#cc44ff');
          break;
      }
      items.splice(i, 1);
    }
  }
}

function eatNibbley(index) {
  var nib = nibbleys[index];
  targetLength += nib.value;
  var points = Math.floor(nib.value * 100 * SCORE_MULT);
  score += points;
  playEat(nib.value);

  // Score popup
  spawnScorePopup(
    isoX(nib.gx, nib.gy),
    isoY(nib.gx, nib.gy, nib.height) - 10,
    '+' + points,
    nib.color
  );

  TAS.particles.spawn(
    isoX(nib.gx, nib.gy),
    isoY(nib.gx, nib.gy, nib.height) - 5,
    nib.color, 10, 3, { gravity: 0.3, size: 2 }
  );
  nibbleys.splice(index, 1);

  if (nibbleys.length < 3) {
    spawnNibbleys(5, GRID_SIZE, level);
  }
}

function updateNibbleys(dt) {
  for (var i = nibbleys.length - 1; i >= 0; i--) {
    var nib = nibbleys[i];
    nib.bounceT += dt * 4;

    if (nib.speed > 0) {
      nib.gx += nib.dx * dt;
      nib.gy += nib.dy * dt;

      if (nib.gx < 0.5 || nib.gx > GRID_SIZE - 1.5) {
        nib.dx = -nib.dx;
        nib.gx = TAS.math.clamp(nib.gx, 0.5, GRID_SIZE - 1.5);
        playBounce();
      }
      if (nib.gy < 0.5 || nib.gy > GRID_SIZE - 1.5) {
        nib.dy = -nib.dy;
        nib.gy = TAS.math.clamp(nib.gy, 0.5, GRID_SIZE - 1.5);
        playBounce();
      }

      var ngx = Math.round(nib.gx);
      var ngy = Math.round(nib.gy);
      if (ngx >= 0 && ngx < GRID_SIZE && ngy >= 0 && ngy < GRID_SIZE) {
        var t = tiles[ngy][ngx];
        if (t.type === TILE_WATER || t.type === TILE_EMPTY || t.type === TILE_LAVA) {
          nib.dx = -nib.dx;
          nib.dy = -nib.dy;
          nib.gx += nib.dx * dt * 2;
          nib.gy += nib.dy * dt * 2;
        }
        nib.height = t.height;
      }

      if (Math.random() < dt * 0.5) {
        nib.dx += (Math.random() - 0.5) * nib.speed * 0.5;
        nib.dy += (Math.random() - 0.5) * nib.speed * 0.5;
        var spd = Math.sqrt(nib.dx * nib.dx + nib.dy * nib.dy);
        if (spd > nib.speed) {
          nib.dx = (nib.dx / spd) * nib.speed;
          nib.dy = (nib.dy / spd) * nib.speed;
        }
      }
    }

    if (nib.timer < 999) {
      nib.timer -= dt;
      if (nib.timer <= 0) {
        TAS.particles.spawn(
          isoX(nib.gx, nib.gy),
          isoY(nib.gx, nib.gy, nib.height),
          '#ffdd00', 8, 2
        );
        nibbleys.splice(i, 1);
      }
    }
  }
}

function updateEnemies(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    en.timer += dt;
    en.moveTimer += dt;
    if (en.flash > 0) en.flash -= dt;

    // Update pixel position for drawing
    en.px = isoX(en.gx, en.gy);
    en.py = isoY(en.gx, en.gy, en.height);

    // Move based on pattern
    var moveInterval = en.type.speed;
    if (en.moveTimer > moveInterval) {
      en.moveTimer = 0;

      if (en.type.pattern === 'chase' && snake.length > 0) {
        // Chase player
        var head = snake[0];
        var cdx = head.gx - en.gx;
        var cdy = head.gy - en.gy;
        if (Math.abs(cdx) > Math.abs(cdy)) {
          en.dir = cdx > 0 ? 0 : 2;
        } else {
          en.dir = cdy > 0 ? 1 : 3;
        }
      } else if (en.type.pattern === 'swoop') {
        // Swoop: move 2 tiles at once
        en.dir = TAS.math.randInt(0, 3);
      } else {
        en.dir = TAS.math.randInt(0, 3);
      }

      var steps = en.type.pattern === 'swoop' ? 2 : 1;
      for (var st = 0; st < steps; st++) {
        var nx = en.gx + DIR_DX[en.dir];
        var ny = en.gy + DIR_DY[en.dir];
        if (nx >= 1 && nx < GRID_SIZE - 1 && ny >= 1 && ny < GRID_SIZE - 1) {
          var tile = tiles[Math.round(ny)][Math.round(nx)];
          if (tile.type === TILE_NORMAL || tile.type === TILE_ICE || tile.type === TILE_MUD || tile.type === TILE_CRYSTAL) {
            en.gx = nx;
            en.gy = ny;
            en.height = tile.height;
          }
        }
      }
    }
  }
}

function updateBosses(dt) {
  for (var i = 0; i < bosses.length; i++) {
    var boss = bosses[i];
    boss.timer += dt;
    boss.moveTimer += dt;
    if (boss.flash > 0) boss.flash -= dt;
    if (boss.shakeTimer > 0) boss.shakeTimer -= dt;

    boss.px = isoX(boss.gx, boss.gy);
    boss.py = isoY(boss.gx, boss.gy, boss.height);

    // Boss AI: move every 3 seconds, chase player
    if (boss.moveTimer > 3.0) {
      boss.moveTimer = 0;
      if (snake.length > 0) {
        var head = snake[0];
        var bdx = head.gx - boss.gx;
        var bdy = head.gy - boss.gy;
        if (Math.abs(bdx) > Math.abs(bdy)) {
          boss.dir = bdx > 0 ? 0 : 2;
        } else {
          boss.dir = bdy > 0 ? 1 : 3;
        }
      }
      var bnx = boss.gx + DIR_DX[boss.dir];
      var bny = boss.gy + DIR_DY[boss.dir];
      if (bnx >= 1 && bnx < GRID_SIZE - 1 && bny >= 1 && bny < GRID_SIZE - 1) {
        var btile = tiles[Math.round(bny)][Math.round(bnx)];
        if (btile.type !== TILE_WATER && btile.type !== TILE_EMPTY && btile.type !== TILE_LAVA) {
          boss.gx = bnx;
          boss.gy = bny;
          boss.height = btile.height;
          TAS.fx.shake(2, 0.96);
        }
      }
    }

    // Boss attacks
    boss.attackTimer += dt;
    if (boss.attackTimer > 4.0 && snake.length > 0) {
      boss.attackTimer = 0;
      // Ranged attack toward player
      TAS.particles.spawn(boss.px, boss.py - 10, boss.type.accentColor, 8, 3, { gravity: 0.3, size: 2 });
    }
  }
}

// === DRAW ===
function draw(dt) {
  var zone = getZone(level);
  ctx.fillStyle = zone.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level ' + level + ' | Baseling ' + statB.name + ': Len ' + snake.length });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-camX, -camY);

  drawTiles();
  drawItems();
  drawNibbleys();
  drawEnemies();
  drawBosses();
  drawExitGate();
  drawSnake();

  if (tongueTimer > 0) {
    drawTongue();
  }

  // Score popups (in world space)
  drawScorePopups();

  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Tutorial overlay
  if (tutorialTimer > 0) {
    drawTutorial();
  }

  if (state === 'levelClear') {
    drawLevelClear();
  }
}

function drawTiles() {
  var zone = getZone(level);
  for (var r = 0; r < GRID_SIZE; r++) {
    for (var c = 0; c < GRID_SIZE; c++) {
      var tile = tiles[r][c];
      if (tile.type === TILE_EMPTY) continue;

      var sx = isoX(c, r);
      var sy = isoY(c, r, tile.height);

      var tileColor;
      switch (tile.type) {
        case TILE_ICE: tileColor = COLORS.ice; break;
        case TILE_WATER: tileColor = zone.waterColor; break;
        case TILE_SPIKE: tileColor = '#663333'; break;
        case TILE_POISON: tileColor = '#445522'; break;
        case TILE_MUD: tileColor = '#554422'; break;
        case TILE_LAVA: tileColor = '#662200'; break;
        case TILE_CRYSTAL: tileColor = '#334466'; break;
        default:
          var shade = ((c + r) % 2 === 0) ? 0 : 1;
          tileColor = zone.tile[shade];
      }

      // NES-style pixelated tile top face
      drawPixelDiamond(sx, sy, TW, TH, tileColor);

      // Depth sides
      drawPixelRect(sx, sy + TH / 2 - 1, TW / 2, TD + 1, shadeColor(tileColor, -30));
      drawPixelRect(sx - TW / 2, sy, TW / 2, TD + TH / 2, shadeColor(tileColor, -50));

      // Tile details
      if (tile.type === TILE_SPIKE) drawSpikes(sx, sy);
      if (tile.type === TILE_WATER) drawWater(sx, sy);
      if (tile.type === TILE_ICE) drawIceShine(sx, sy);
      if (tile.type === TILE_POISON) drawPoison(sx, sy);
      if (tile.type === TILE_MUD) drawMud(sx, sy);
      if (tile.type === TILE_LAVA) drawLava(sx, sy);
      if (tile.type === TILE_CRYSTAL) drawCrystal(sx, sy);

      // WIS: hazard sense - show warning indicators near dangerous tiles
      if (wisMod >= 1 && snake.length > 0) {
        var head = snake[0];
        var distToHead = Math.abs(head.gx - c) + Math.abs(head.gy - r);
        if (distToHead <= 2 && (tile.type === TILE_SPIKE || tile.type === TILE_WATER || tile.type === TILE_LAVA || tile.type === TILE_POISON)) {
          ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.15;
          ctx.fillStyle = '#ff4444';
          ctx.font = 'bold 8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', sx, sy - TH / 2 - 4);
          ctx.globalAlpha = 1;
        }
      }
    }
  }
}

function drawSpikes(sx, sy) {
  ctx.fillStyle = '#cc4444';
  for (var i = 0; i < 3; i++) {
    var ox = (i - 1) * 6;
    drawPixelRect(sx + ox - 1, sy - 6, 2, 6, '#cc4444');
    drawPixelRect(sx + ox, sy - 7, 1, 1, '#ff6666');
  }
}

function drawWater(sx, sy) {
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08) * 0.1;
  drawPixelDiamond(sx, sy, TW - 6, TH - 4, '#66aaff');
  // Ripple pixels
  var rip = Math.sin(frame * 0.06) * 3;
  drawPixelRect(sx - 4 + rip, sy - 1, 2, 1, '#88ccff');
  drawPixelRect(sx + 2 - rip, sy + 1, 2, 1, '#88ccff');
  ctx.globalAlpha = 1;
}

function drawIceShine(sx, sy) {
  ctx.globalAlpha = 0.5;
  drawPixelRect(sx - 4, sy - 3, 2, 2, '#ffffff');
  drawPixelRect(sx + 3, sy + 1, 2, 2, '#ddddff');
  ctx.globalAlpha = 1;
}

function drawPoison(sx, sy) {
  ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.1;
  drawPixelDiamond(sx, sy, TW - 8, TH - 5, '#88cc44');
  // Bubble pixels
  var bub = Math.sin(frame * 0.12 + sx) * 2;
  drawPixelRect(sx - 2, sy - 3 + bub, 2, 2, '#aaee66');
  drawPixelRect(sx + 3, sy - 1 - bub, 1, 1, '#aaee66');
  ctx.globalAlpha = 1;
}

function drawMud(sx, sy) {
  drawPixelDiamond(sx, sy, TW - 4, TH - 2, '#665533');
  // Mud splotches
  drawPixelRect(sx - 3, sy - 1, 3, 2, '#554422');
  drawPixelRect(sx + 2, sy + 1, 2, 2, '#776644');
}

function drawLava(sx, sy) {
  var pulse = Math.sin(frame * 0.08 + sx * 0.3) * 0.15 + 0.85;
  ctx.globalAlpha = pulse;
  drawPixelDiamond(sx, sy, TW - 4, TH - 2, '#ff4400');
  // Bright spots
  drawPixelRect(sx - 3 + Math.sin(frame * 0.1) * 2, sy - 1, 2, 2, '#ffaa22');
  drawPixelRect(sx + 2, sy + Math.sin(frame * 0.13) * 2, 2, 1, '#ffcc44');
  ctx.globalAlpha = 1;
  // Embers
  if (frame % 20 === 0) {
    TAS.particles.spawn(sx, sy - 3, '#ff6622', 1, 1, { gravity: -0.5, size: 1 });
  }
}

function drawCrystal(sx, sy) {
  drawPixelDiamond(sx, sy, TW - 4, TH - 2, '#334466');
  // Crystal spikes
  var sparkle = Math.sin(frame * 0.06 + sx) > 0.5;
  ctx.globalAlpha = sparkle ? 0.9 : 0.5;
  drawPixelRect(sx - 2, sy - 5, 2, 5, '#66aadd');
  drawPixelRect(sx + 1, sy - 4, 2, 4, '#88ccff');
  drawPixelRect(sx - 1, sy - 6, 1, 2, '#aaeeff');
  ctx.globalAlpha = 1;
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (item.collected) continue;

    item.bounceT += 0.05;
    var sx = isoX(item.gx, item.gy);
    var sy = isoY(item.gx, item.gy, item.height);
    var bounce = Math.abs(Math.sin(item.bounceT)) * 6;

    // Shadow
    ctx.globalAlpha = 0.3;
    drawPixelRect(sx - 3, sy, 6, 2, '#000');
    ctx.globalAlpha = 1;

    // Item glow
    var glowPulse = Math.sin(item.bounceT * 2) * 0.2 + 0.3;
    ctx.globalAlpha = glowPulse;
    drawPixelCircle(sx, sy - bounce - 4, 6, item.type.color);
    ctx.globalAlpha = 1;

    // Sea reskin: treasure (emerald) sprite, procedural fallback
    var _itm = seaImg('gem-emerald');
    if (_itm) {
      var is = 14;
      ctx.drawImage(_itm, sx - is / 2, sy - bounce - 4 - is / 2, is, is);
    } else {
    // Item body (NES pixel style)
    drawPixelCircle(sx, sy - bounce - 4, 4, item.type.color);
    drawPixelRect(sx - 1, sy - bounce - 6, 2, 2, lightenColor(item.type.color, 60));

    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(item.type.icon, sx, sy - bounce - 2);
    }
  }
}

function drawNibbleys() {
  for (var i = 0; i < nibbleys.length; i++) {
    var nib = nibbleys[i];
    var sx = isoX(nib.gx, nib.gy);
    var sy = isoY(nib.gx, nib.gy, nib.height);
    var bounce = Math.abs(Math.sin(nib.bounceT)) * 8;

    // Shadow
    ctx.globalAlpha = 0.3;
    drawPixelRect(sx - 3, sy - 1, 6, 2, '#000');
    ctx.globalAlpha = 1;

    var radius = 3 + nib.value * 0.5;
    var by = sy - bounce - radius;

    // Gold blink
    if (nib.timer < 999 && nib.timer < 3) {
      if (Math.floor(frame / 4) % 2 === 0) continue;
    }

    // Sea reskin: fish food sprite, procedural pellet fallback
    var _food = seaImg('fish');
    if (_food) {
      var fs = (radius + 3) * 2;
      ctx.drawImage(_food, sx - fs / 2, by - fs / 2, fs, fs);
    } else {
    // NES pixel ball
    drawPixelCircle(sx, by, radius, nib.color);
    // Highlight pixel
    drawPixelRect(sx - 1, by - radius + 1, 2, 2, 'rgba(255,255,255,0.5)');
    }
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    var sx = en.px || isoX(en.gx, en.gy);
    var sy = en.py || isoY(en.gx, en.gy, en.height);

    // Shadow
    ctx.globalAlpha = 0.4;
    drawPixelRect(sx - 6, sy - 1, 12, 3, '#000');
    ctx.globalAlpha = 1;

    // Flash on hit
    var bodyColor = en.flash > 0 ? '#ffffff' : en.type.color;
    var accentCol = en.flash > 0 ? '#ffaaaa' : en.type.accentColor;

    // NES-style enemy sprite based on type
    var bobY = Math.sin(en.timer * 3) * 3;
    var eSize = en.type.size;

    // Body
    drawPixelCircle(sx, sy - eSize - bobY, eSize, bodyColor);

    // Eyes
    var eyeDir = DIR_DX[en.dir];
    drawPixelRect(sx - 2 + eyeDir, sy - eSize - bobY - 2, 2, 2, '#fff');
    drawPixelRect(sx + 1 + eyeDir, sy - eSize - bobY - 2, 2, 2, '#fff');
    drawPixelRect(sx - 1 + eyeDir, sy - eSize - bobY - 1, 1, 1, '#111');
    drawPixelRect(sx + 2 + eyeDir, sy - eSize - bobY - 1, 1, 1, '#111');

    // Type-specific details
    if (en.type.pattern === 'swoop') {
      // Wings for bats
      var wingSpread = Math.sin(en.timer * 8) * 4;
      drawPixelRect(sx - eSize - wingSpread, sy - eSize - bobY - 1, eSize - 1, 2, accentCol);
      drawPixelRect(sx + 2 + wingSpread, sy - eSize - bobY - 1, eSize - 1, 2, accentCol);
    } else if (en.type.pattern === 'chase') {
      // Tentacles for leeches
      for (var tt = 0; tt < 3; tt++) {
        var tx = sx - 3 + tt * 3;
        var ty = sy - 2 + Math.sin(en.timer * 4 + tt) * 2;
        drawPixelRect(tx, ty, 1, 3, accentCol);
      }
    } else if (en.type.pattern === 'fireball') {
      // Horns for imps
      drawPixelRect(sx - 3, sy - eSize * 2 - bobY, 2, 3, accentCol);
      drawPixelRect(sx + 2, sy - eSize * 2 - bobY, 2, 3, accentCol);
    } else if (en.type.pattern === 'patrol') {
      // Crystal armor
      drawPixelRect(sx - eSize + 1, sy - eSize - bobY - 1, 2, eSize, accentCol);
      drawPixelRect(sx + eSize - 2, sy - eSize - bobY - 1, 2, eSize, accentCol);
    } else {
      // Legs for crawlers
      var legOff = Math.sin(en.timer * 5) * 2;
      drawPixelRect(sx - 3, sy - 1 + legOff, 2, 3, accentCol);
      drawPixelRect(sx + 2, sy - 1 - legOff, 2, 3, accentCol);
    }

    // HP bar for enemies with >1 HP
    if (en.type.hp > 1) {
      var hpW = eSize * 2;
      var hpRatio = en.hp / en.type.hp;
      drawPixelRect(sx - hpW / 2, sy - eSize * 2 - bobY - 6, hpW, 2, '#333');
      drawPixelRect(sx - hpW / 2, sy - eSize * 2 - bobY - 6, Math.floor(hpW * hpRatio), 2, hpRatio > 0.5 ? '#38d973' : '#e6482e');
    }
  }
}

function drawBosses() {
  for (var i = 0; i < bosses.length; i++) {
    var boss = bosses[i];
    var sx = boss.px || isoX(boss.gx, boss.gy);
    var sy = boss.py || isoY(boss.gx, boss.gy, boss.height);

    // Boss shake
    if (boss.shakeTimer > 0) {
      sx += (Math.random() - 0.5) * 4;
      sy += (Math.random() - 0.5) * 4;
    }

    var bSize = boss.type.size;
    var bodyColor = boss.flash > 0 ? '#ffffff' : boss.type.color;
    var accentCol = boss.flash > 0 ? '#ffaaaa' : boss.type.accentColor;

    // Large shadow
    ctx.globalAlpha = 0.5;
    drawPixelRect(sx - bSize, sy - 2, bSize * 2, 4, '#000');
    ctx.globalAlpha = 1;

    // Boss body (large NES sprite)
    var bobY = Math.sin(boss.timer * 1.5) * 4;
    drawPixelCircle(sx, sy - bSize - bobY, bSize, bodyColor);

    // Accent details
    drawPixelCircle(sx, sy - bSize - bobY, bSize - 3, accentCol);

    // Eyes (bigger, angrier)
    drawPixelRect(sx - 4, sy - bSize - bobY - 3, 3, 3, '#fff');
    drawPixelRect(sx + 2, sy - bSize - bobY - 3, 3, 3, '#fff');
    drawPixelRect(sx - 3, sy - bSize - bobY - 2, 2, 2, '#ff0000');
    drawPixelRect(sx + 3, sy - bSize - bobY - 2, 2, 2, '#ff0000');

    // Boss name
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.type.name, sx, sy - bSize * 2 - bobY - 12);

    // HP bar
    var hpW = bSize * 2 + 4;
    var hpRatio = boss.hp / boss.maxHp;
    drawPixelRect(sx - hpW / 2, sy - bSize * 2 - bobY - 8, hpW, 3, '#333');
    drawPixelRect(sx - hpW / 2, sy - bSize * 2 - bobY - 8, Math.floor(hpW * hpRatio), 3, hpRatio > 0.5 ? '#38d973' : (hpRatio > 0.25 ? '#f4b41b' : '#e6482e'));

    // HP text
    ctx.fillStyle = '#fff';
    ctx.font = '6px monospace';
    ctx.fillText(boss.hp + '/' + boss.maxHp, sx, sy - bSize * 2 - bobY - 2);

    // Type-specific decorations
    if (boss.type.pattern === 'charge') {
      // Horn
      drawPixelRect(sx - 1, sy - bSize * 2 - bobY - 2, 2, 5, accentCol);
    } else if (boss.type.pattern === 'burrow') {
      // Segments
      for (var seg = 1; seg <= 3; seg++) {
        drawPixelCircle(sx - seg * 4, sy - bSize + seg * 3 - bobY, bSize - seg * 2, bodyColor);
      }
    } else if (boss.type.pattern === 'breath') {
      // Flame particles
      if (frame % 8 === 0) {
        TAS.particles.spawn(sx + DIR_DX[boss.dir] * bSize, sy - bSize - bobY, '#ff6622', 2, 1.5, { gravity: -0.3, size: 2 });
      }
    } else if (boss.type.pattern === 'shatter') {
      // Crystal spines
      for (var sp = 0; sp < 4; sp++) {
        var angle = sp * Math.PI / 2 + boss.timer * 0.3;
        var spx = sx + Math.cos(angle) * (bSize + 2);
        var spy = sy - bSize - bobY + Math.sin(angle) * (bSize + 2);
        drawPixelRect(spx - 1, spy - 1, 3, 3, accentCol);
      }
    }
  }
}

function drawExitGate() {
  if (!exitGate) return;

  var sx = isoX(exitGate.gx, exitGate.gy);
  var sy = isoY(exitGate.gx, exitGate.gy, exitGate.height);

  var gateColor = exitGate.open ? COLORS.exit : COLORS.exitClosed;

  // NES pixel gate pillars
  drawPixelRect(sx - 8, sy - 20, 3, 20, gateColor);
  drawPixelRect(sx + 5, sy - 20, 3, 20, gateColor);

  // Top bar
  drawPixelRect(sx - 9, sy - 22, 18, 3, gateColor);

  if (exitGate.open) {
    var pulse = Math.sin(frame * 0.1) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    drawPixelRect(sx - 5, sy - 19, 10, 17, '#f4b41b');
    ctx.globalAlpha = 1;

    if (frame % 10 === 0) {
      TAS.particles.spawn(sx, sy - 10, '#f4b41b', 2, 1.5, { gravity: -0.3, size: 1 });
    }

    // Arrow
    drawPixelRect(sx - 1, sy - 28, 2, 4, '#f4b41b');
    drawPixelRect(sx - 3, sy - 24, 6, 2, '#f4b41b');
  } else {
    drawPixelRect(sx - 5, sy - 19, 10, 17, '#333');
    // Lock
    drawPixelCircle(sx, sy - 11, 3, '#888');
  }

  // Length indicator
  if (!exitGate.open) {
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(snake.length + '/' + requiredLength, sx, sy + 10);
  }
}

function drawSnake() {
  if (snake.length === 0) return;

  // Draw from tail to head
  for (var i = snake.length - 1; i >= 0; i--) {
    var seg = snake[i];
    var sx = seg.px;
    var sy = seg.py;
    var radius = i === 0 ? 6 : 5 - (i * 0.15);
    if (radius < 3) radius = 3;

    // Shadow
    ctx.globalAlpha = 0.25;
    drawPixelRect(sx - radius, sy + 1, radius * 2, 2, '#000');
    ctx.globalAlpha = 1;

    // Body color from statB
    var segColor = i === 0 ? COLORS.snakeHead : COLORS.snake;

    // Power-up glow
    if (powerUps.shield > 0 && i === 0) {
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.15) * 0.15;
      drawPixelCircle(sx, sy - radius * 0.5, radius + 3, '#4488cc');
      ctx.globalAlpha = 1;
    }
    if (powerUps.phase > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.2) * 0.2;
    }

    // === BASELING SPRITE on the HEAD === (body segments stay procedural spheres).
    var _headSprite = false;
    if (i === 0 && window.TAS && TAS.drawBaseling) {
      var _hAnim = (powerUps.speed > 0) ? 'walk' : 'idle';
      _headSprite = TAS.drawBaseling(ctx, sx, sy - radius * 0.5, radius * 2.5,
        { flipX: DIR_DX[snakeDir] < 0, frame: frame, anim: _hAnim });
    }

    if (!_headSprite) {
      // NES pixel sphere body
      drawPixelCircle(sx, sy - radius * 0.5, radius, segColor);
      // Highlight
      drawPixelRect(sx - radius * 0.4, sy - radius, 2, 2, lightenColor(segColor, 50));
    }

    if (powerUps.phase > 0) ctx.globalAlpha = 1;

    // Head details (procedural eyes only when the sprite didn't draw)
    if (i === 0) {
      if (!_headSprite) {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 5px monospace';
        ctx.textAlign = 'center';
        // Eyes (NES pixel)
        var eyeOff = DIR_DX[snakeDir] * 2;
        var eyeOffY = DIR_DY[snakeDir] * 1;
        drawPixelRect(sx + eyeOff - 3, sy - radius * 0.5 + eyeOffY - 3, 2, 2, '#fff');
        drawPixelRect(sx + eyeOff + 1, sy - radius * 0.5 + eyeOffY - 3, 2, 2, '#fff');
        // Pupils
        drawPixelRect(sx + eyeOff - 2 + DIR_DX[snakeDir], sy - radius * 0.5 + eyeOffY - 2, 1, 1, '#111');
        drawPixelRect(sx + eyeOff + 2 + DIR_DX[snakeDir], sy - radius * 0.5 + eyeOffY - 2, 1, 1, '#111');
      }

      // Speed boost trail
      if (powerUps.speed > 0) {
        ctx.globalAlpha = 0.3;
        drawPixelCircle(sx - DIR_DX[snakeDir] * 4, sy - radius * 0.5 - DIR_DY[snakeDir] * 2, radius - 1, '#ffaa33');
        ctx.globalAlpha = 1;
      }
    }

    // Body pattern (diamond shapes)
    if (i > 0 && i % 2 === 0) {
      ctx.globalAlpha = 0.3;
      drawPixelRect(sx - 1, sy - radius, 2, radius, shadeColor(segColor, -40));
      ctx.globalAlpha = 1;
    }
  }

  // Rattle tail (NES style)
  if (snake.length > 2) {
    var tail = snake[snake.length - 1];
    var rattleT = frame * 0.3;
    for (var r = 0; r < 3; r++) {
      var rx = tail.px + Math.sin(rattleT + r * 0.8) * 2;
      var ry = tail.py - 2 + r * 2;
      drawPixelRect(rx - 2, ry - 1, 4, 2, '#f4b41b');
    }
  }
}

function drawTongue() {
  if (snake.length === 0) return;
  var head = snake[0];
  var sx = head.px;
  var sy = head.py - 3;
  var range = TONGUE_RANGE;
  if (powerUps.tongue > 0) range *= 1.4;
  var tongueLen = range * TW * 0.5 * (tongueTimer / 0.3);
  var tdx = DIR_DX[tongueDir];
  var tdy = DIR_DY[tongueDir];

  var endX = sx + (tdx - tdy) * tongueLen;
  var endY = sy + (tdx + tdy) * tongueLen * 0.5;

  // NES pixel tongue
  ctx.strokeStyle = powerUps.tongue > 0 ? '#ff88aa' : '#ff4466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(Math.floor(sx), Math.floor(sy));
  ctx.lineTo(Math.floor(endX), Math.floor(endY));
  ctx.stroke();

  // Forked tip (pixel)
  drawPixelRect(endX - 2, endY - 2, 2, 2, '#ff4466');
  drawPixelRect(endX + 1, endY - 2, 2, 2, '#ff4466');
}

function drawHUD() {
  // Background bar
  drawPixelRect(0, 0, GW, 34, 'rgba(26,28,44,0.9)');

  ctx.font = 'bold 10px monospace';

  // Baseling name + icon
  ctx.fillStyle = statB.color;
  ctx.textAlign = 'left';
  ctx.fillText(statB.icon + ' ' + statB.name, 6, 12);

  // Score (INT multiplier shown)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'center';
  var scoreText = 'SCORE:' + score;
  if (SCORE_MULT > 1) scoreText += ' x' + SCORE_MULT.toFixed(1);
  ctx.fillText(scoreText, GW / 2, 12);

  // Level + zone name
  var zone = getZone(level);
  ctx.fillStyle = zone.accent;
  ctx.textAlign = 'right';
  ctx.fillText('LV' + level + ' ' + zone.name, GW - 6, 12);

  // Timer bar
  var timerColor = timeLeft < 10 ? '#e6482e' : '#38d973';
  var timerW = GW - 12;
  var timerFill = Math.min(timeLeft / 60, 1);
  drawPixelRect(6, 16, timerW, 4, '#222');
  drawPixelRect(6, 16, Math.floor(timerW * timerFill), 4, timerColor);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(Math.ceil(timeLeft) + 's', GW - 6, 28);

  // Snake length bar
  var barX = 6;
  var barY = 22;
  var barW = GW / 2 - 12;
  var barH = 6;
  drawPixelRect(barX, barY, barW, barH, '#222');
  var fillRatio = Math.min(snake.length / requiredLength, 1);
  var barColor = fillRatio >= 1 ? '#ffcc00' : statB.color;
  drawPixelRect(barX, barY, Math.floor(barW * fillRatio), barH, barColor);
  ctx.fillStyle = '#fff';
  ctx.font = '6px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(snake.length + '/' + requiredLength, barX + 2, barY + 5);

  // Lives (NES pixel hearts)
  var livesX = GW / 2 + 6;
  for (var i = 0; i < lives; i++) {
    drawPixelRect(livesX + i * 10, barY, 3, 3, statB.color);
    drawPixelRect(livesX + i * 10 + 4, barY, 3, 3, statB.color);
    drawPixelRect(livesX + i * 10 + 1, barY + 2, 5, 3, statB.color);
    drawPixelRect(livesX + i * 10 + 2, barY + 4, 3, 1, statB.color);
  }

  // Active power-ups display
  var puX = 6;
  var puY = 31;
  if (powerUps.speed > 0) {
    ctx.fillStyle = '#ffaa33';
    ctx.font = '6px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPD ' + Math.ceil(powerUps.speed), puX, puY);
    puX += 32;
  }
  if (powerUps.shield > 0) {
    ctx.fillStyle = '#4488cc';
    ctx.fillText('SHD ' + Math.ceil(powerUps.shield), puX, puY);
    puX += 32;
  }
  if (powerUps.tongue > 0) {
    ctx.fillStyle = '#ff4466';
    ctx.fillText('TNG ' + Math.ceil(powerUps.tongue), puX, puY);
    puX += 32;
  }
  if (powerUps.phase > 0) {
    ctx.fillStyle = '#cc44ff';
    ctx.fillText('PHS ' + Math.ceil(powerUps.phase), puX, puY);
  }
}

function drawTutorial() {
  var alpha = Math.min(1, tutorialTimer / 0.5);
  ctx.globalAlpha = alpha * 0.85;
  drawPixelRect(GW / 2 - 120, GH / 2 - 70, 240, 140, '#111122');
  ctx.globalAlpha = alpha;

  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 11px monospace';
  ctx.fillText('HOW TO PLAY', GW / 2, GH / 2 - 50);

  ctx.fillStyle = '#ccc';
  ctx.font = '9px monospace';
  var lines = [
    'ARROWS/WASD: Move your baseling snake',
    'SPACE/Z/X: Tongue Attack',
    '',
    'Eat spore pellets to grow longer',
    'Reach required length to open gate',
    'Enter the gate to clear the level',
    '',
    'Collect garden seeds for power-ups',
    'Hit enemies with your tongue!'
  ];
  for (var li = 0; li < lines.length; li++) {
    ctx.fillText(lines[li], GW / 2, GH / 2 - 34 + li * 12);
  }

  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  var zone = ZONES[0];
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // NES pixel iso tiles background
  for (var r = 0; r < 6; r++) {
    for (var c = 0; c < 6; c++) {
      var sx = isoX(c + 3, r + 3) - 10;
      var sy = isoY(c + 3, r + 3, 0) + 50;
      var bgCol = (c + r) % 2 === 0 ? '#1a3a1a' : '#152a15';
      drawPixelDiamond(sx, sy, TW, TH, bgCol);
    }
  }

  // Title shadow + text
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('SEA SERPENT', GW / 2 + 2, 72);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SEA SERPENT', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#38d973';
  ctx.font = '11px monospace';
  ctx.fillText('A Harbor Monster Tale', GW / 2, 90);

  // Selected baseling name (Base-blue) + 5 ARCADE stat bars
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 108);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    var _bw = 38, _bx0 = GW / 2 - (_keys.length * (_bw + 8)) / 2, _by = 122;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _bx0 + _i * (_bw + 8);
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _by);
      drawPixelRect(_bx, _by + 3, _bw, 5, '#222');
      drawPixelRect(_bx, _by + 3, Math.floor(_bw * Math.max(0.04, Math.min(1, _v / 200))), 5, _mm.color);
    }
    ctx.textAlign = 'center';
  }

  // Animated NES pixel snake
  var titleSnakeLen = 8;
  for (var ts = 0; ts < titleSnakeLen; ts++) {
    var angle = frame * 0.03 + ts * 0.6;
    var tsx = GW / 2 + Math.cos(angle) * (40 + ts * 5);
    var tsy = 170 + Math.sin(angle * 1.5) * 15 + ts * 2;
    var trad = ts === 0 ? 6 : 5 - ts * 0.2;
    var tsColor = ts === 0 ? COLORS.snakeHead : COLORS.snake;
    if (ts === 0 && window.TAS && TAS.drawBaseling &&
        TAS.drawBaseling(ctx, tsx, tsy, trad * 2.5, { anim: 'idle', frame: frame })) {
      // baseling head drawn
    } else {
      drawPixelCircle(tsx, tsy, trad, tsColor);
      if (ts === 0) {
        drawPixelRect(tsx - 1, tsy - 3, 2, 2, '#fff');
        drawPixelRect(tsx + 1, tsy - 3, 2, 2, '#fff');
      }
    }
  }

  // Bouncing nibbley
  var nibY = 240 + Math.abs(Math.sin(frame * 0.06)) * 20;
  drawPixelCircle(GW / 2, nibY, 5, '#38d973');

  // Zone preview list
  ctx.fillStyle = '#777';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ZONES: Sporewood > Moldvein > Rotgarden > Cinderbloom > Mycelium Throne', GW / 2, 270);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Eat fish and treasure to grow - Defeat enemies - Clear the gate!', GW / 2, 292);
  ctx.fillText('ARROWS: Move  |  SPACE: Tongue Attack', GW / 2, 306);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.fillText('Best: ' + highScore, GW / 2, 326);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 14);
}

function drawLevelClear() {
  ctx.globalAlpha = 0.6;
  drawPixelRect(0, 0, GW, GH, '#000');
  ctx.globalAlpha = 1;

  var zone = getZone(level);
  ctx.textAlign = 'center';
  ctx.fillStyle = zone.accent;
  ctx.font = 'bold 20px monospace';
  ctx.fillText(zone.name.toUpperCase() + ' CLEAR!', GW / 2, GH / 2 - 30);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('LEVEL ' + level + ' COMPLETE', GW / 2, GH / 2 - 8);

  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  var timeBonus = Math.floor(timeLeft) * 10;
  var lengthBonus = snake.length * 50;
  ctx.fillText('Time Bonus: ' + timeBonus, GW / 2, GH / 2 + 16);
  ctx.fillText('Length Bonus: ' + lengthBonus, GW / 2, GH / 2 + 30);
  if (SCORE_MULT > 1) {
    ctx.fillStyle = '#3cacd7';
    ctx.fillText('INT Multiplier: x' + SCORE_MULT.toFixed(1), GW / 2, GH / 2 + 44);
  }

  // Next zone preview
  if (level < 10) {
    var nextZone = getZone(level + 1);
    ctx.fillStyle = nextZone.accent;
    ctx.font = '9px monospace';
    ctx.fillText('Next: ' + nextZone.name + ' - ' + nextZone.desc, GW / 2, GH / 2 + 64);
  }
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // NES pixel stars
  for (var i = 0; i < 40; i++) {
    var starX = (i * 137 + frame * 0.5) % GW;
    var starY = (i * 89 + frame * 0.2) % GH;
    ctx.globalAlpha = Math.sin(frame * 0.02 + i) * 0.3 + 0.7;
    drawPixelRect(starX, starY, 2, 2, '#f4b41b');
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('VICTORY!', GW / 2, 70);

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(statB.name + ' CONQUERS ALL 10 LEVELS', GW / 2, 100);

  // All zone names cleared
  for (var zi = 0; zi < ZONES.length; zi++) {
    ctx.fillStyle = ZONES[zi].accent;
    ctx.font = '9px monospace';
    ctx.fillText(ZONES[zi].name + ' - Cleared', GW / 2, 130 + zi * 14);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 215);

  // Stat summary
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 240);

  if (score >= highScore && highScore > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 265);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('The ' + statB.name + ' spreads spores of triumph!', GW / 2, 300);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// === COLOR HELPERS ===
function shadeColor(color, amount) {
  if (!color || color.length < 7) return color || '#000';
  var r = parseInt(color.slice(1, 3), 16) + amount;
  var g = parseInt(color.slice(3, 5), 16) + amount;
  var b = parseInt(color.slice(5, 7), 16) + amount;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function lightenColor(color, amount) {
  return shadeColor(color, amount);
}

function lightenColorSafe(color, amount) {
  if (!color || color.length < 7) return '#88ffaa';
  return shadeColor(color, amount);
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
