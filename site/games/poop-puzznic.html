"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,luck,
// swim}, clamped to the single-player band (0.8–1.6). This game derives ~17 gameplay
// values from D&D-style fields on statB; we keep statB's shape, synthesize its fields from
// the five bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20), and
// recompute the derived values inside recomputeStats() so a title-screen pick applies.
// Not a wager game -> default band.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[poop-puzznic] NftLoader display info failed:', e && e.message); }

// Stat-derived gameplay values — reassigned in recomputeStats() so a pick takes effect.
var grabRange, pushForce, baseCooldown, cursorSpeed, bonusMoves, shieldChance,
    showPreview, catalystReveal, hintTimer, comboBonus, chainDecay, scoreMult,
    particleBoost, luckyMatchChance, levelSkip, critMatchChance, wisdomSight;
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  grabRange = 1 + Math.floor((statB.str - 10) / 5);            // STR grab range
  pushForce = Math.max(1, Math.floor(statB.str / 8));          // STR push force
  baseCooldown = Math.max(0.04, 0.12 - (statB.dex - 10) * 0.004); // DEX input cooldown
  cursorSpeed = 1 + Math.floor((statB.dex - 10) / 6);          // DEX cursor agility
  bonusMoves = Math.floor((statB.con - 10) / 3);               // CON bonus moves
  shieldChance = Math.min(0.3, (statB.con - 10) * 0.015);      // CON shield
  showPreview = statB.int >= 14;                                // INT match preview
  catalystReveal = statB.int >= 18;                             // INT catalyst reveal
  hintTimer = Math.max(3, 10 - Math.floor((statB.int - 10) / 2)); // INT hint speed
  comboBonus = 1 + (statB.wis - 10) * 0.08;                    // WIS combo mult
  chainDecay = Math.max(0.5, 2.0 - (statB.wis - 10) * 0.06);   // WIS chain window
  scoreMult = statB.scoreMult * (1 + (statB.cha - 10) * 0.05); // CHA score mult
  particleBoost = 1 + Math.floor((statB.cha - 10) / 4);        // CHA particle count
  luckyMatchChance = Math.min(0.2, statB.luck * 0.02);         // luck bonus match
  levelSkip = statB.level >= 10;                                // level unlocks skip
  critMatchChance = Math.min(0.15, (statB.str - 10) * 0.01 + statB.luck * 0.005); // STR+luck crit
  wisdomSight = statB.wis >= 16;                                // WIS see hidden blocks
}
recomputeStats();
var picking = false; // baseling character-select overlay is open

// Floating text system (for zone flavor)

  floatingTexts.push({
    x: x, y: y, text: text,
    color: color || '#888', size: size || 8,
    life: 2.5, vx: (Math.random() - 0.5) * 10, vy: -15 - Math.random() * 10,
    alpha: 1
  });
}

// Environmental hazard system per zone
function spawnEnvHazard(zone) {
  var type = Math.floor(Math.random() * 3);
  var hz = {
    x: Math.random() * GW, y: -10,
    vx: (Math.random() - 0.5) * 20,
    vy: 10 + Math.random() * 20,
    size: 2 + Math.random() * 3,
    life: 4, type: type,
    color: zone.particle
  };
  envHazards.push(hz);
}

// Star rating calculation
function calcStarRating(movesUsed, movesMax, combosBest) {
  var ratio = movesUsed / movesMax;
  if (ratio <= 0.4 && combosBest >= 3) return 3;
  if (ratio <= 0.65) return 2;
  return 1;
}

// Score popup system

var LEVELS = makeLevels();

// === GAME FUNCTIONS ===

function loadLevel(n) {
  var lvl = LEVELS[Math.min(n - 1, LEVELS.length - 1)];
  grid = [];
  for (var r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (var c = 0; c < COLS; c++) {
      grid[r][c] = lvl.grid[r][c];
    }
  }
  cursorX = Math.floor(COLS / 2);
  cursorY = Math.floor(ROWS / 2);
  grabbed = false;
  grabbedBlock = 0;
  combo = 0;
  comboTimer = 0;
  animating = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  moves = 0;
  maxMoves = lvl.moves + bonusMoves; // ref CON: bonus moves applied
  matchDelay = 0;
  scorePopups = [];
  hintTime = 0;
  hintCells = [];
  shieldActive = false;
  critFlash = 0;

  // Boss setup
  isBossLevel = !!lvl.boss;
  if (isBossLevel) {
    bossHP = lvl.boss.hp;
    bossMaxHP = lvl.boss.hp;
    bossName = lvl.boss.name;
  } else {
    bossHP = 0;
    bossMaxHP = 0;
    bossName = '';
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  level = savedLevel;
  TAS.particles.clear();
  scorePopups = [];
  loadLevel(level);
  if (showTutorial && level === 1) {
    tutorialStep = 0;
    tutorialTimer = 0;
  }
}

function countBlocks() {
  var count = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var v = grid[r][c];
      if (v > 0 && v !== WALL && v !== CATALYST && v !== WILDCARD) count++;
    }
  }
  return count;
}

function countAllActive() {
  var count = 0;
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var v = grid[r][c];
      if (v > 0 && v !== WALL) count++;
    }
  }
  return count;
}

function applyGravity() {
  var fell = false;
  for (var c = 0; c < COLS; c++) {
    for (var r = ROWS - 2; r >= 0; r--) {
      if (grid[r][c] > 0 && grid[r][c] !== WALL) {
        var targetR = r;
        while (targetR + 1 < ROWS && grid[targetR + 1][c] === 0) {
          targetR++;
        }
        if (targetR !== r) {
          grid[targetR][c] = grid[r][c];
          grid[r][c] = 0;
          fell = true;
        }
      }
    }
  }
  return fell;
}

function findMatches() {
  var matched = [];
  var visited = [];
  for (var r = 0; r < ROWS; r++) {
    visited[r] = [];
    for (var c = 0; c < COLS; c++) {
      visited[r][c] = false;
    }
  }

  function flood(r, c, type) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return [];
    if (visited[r][c]) return [];
    var cell = grid[r][c];
    if (cell !== type && cell !== WILDCARD) return [];
    if (cell === 0 || cell === WALL) return [];
    visited[r][c] = true;
    var group = [{r: r, c: c}];
    group = group.concat(flood(r - 1, c, type));
    group = group.concat(flood(r + 1, c, type));
    group = group.concat(flood(r, c - 1, type));
    group = group.concat(flood(r, c + 1, type));
    return group;
  }

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var cell = grid[r][c];
      if (cell > 0 && cell <= 6 && !visited[r][c]) {
        var group = flood(r, c, cell);
        if (group.length >= 2) {
          matched.push(group);
        }
      }
    }
  }
  return matched;
}

function findHints() {
  // INT stat: find possible moves for hint display
  hintCells = [];
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var v = grid[r][c];
      if (v > 0 && v <= 6) {
        // Check if moving left or right could create a match
        if (c > 0 && grid[r][c - 1] === 0) {
          // Simulate move left
          grid[r][c - 1] = v; grid[r][c] = 0;
          var testFell = true;
          while (testFell) { testFell = false; for (var tc = 0; tc < COLS; tc++) { for (var tr = ROWS - 2; tr >= 0; tr--) { if (grid[tr][tc] > 0 && grid[tr][tc] !== WALL && tr + 1 < ROWS && grid[tr + 1][tc] === 0) { grid[tr + 1][tc] = grid[tr][tc]; grid[tr][tc] = 0; testFell = true; }}}}
          if (findMatches().length > 0) hintCells.push({r: r, c: c});
          // Restore (reload from level is too expensive, just undo roughly)
          grid[r][c] = v; grid[r][c - 1] = 0;
        }
      }
    }
  }
}

function processCatalyst(matches) {
  // Check if any matched group contains a catalyst block adjacent
  var catalystTriggered = false;
  for (var mi = 0; mi < matches.length; mi++) {
    var group = matches[mi];
    for (var gi = 0; gi < group.length; gi++) {
      var cr = group[gi].r;
      var cc = group[gi].c;
      // Check neighbors for catalyst
      var neighbors = [[cr-1,cc],[cr+1,cc],[cr,cc-1],[cr,cc+1]];
      for (var ni = 0; ni < neighbors.length; ni++) {
        var nr = neighbors[ni][0], nc = neighbors[ni][1];
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === CATALYST) {
          // Catalyst detonates: clear all blocks of the matched color
          var targetType = grid[group[0].r][group[0].c];
          if (targetType === WILDCARD) continue;
          grid[nr][nc] = 0;
          catalystTriggered = true;
          for (var dr = 0; dr < ROWS; dr++) {
            for (var dc = 0; dc < COLS; dc++) {
              if (grid[dr][dc] === targetType) {
                var px = GRID_X + dc * CELL + CELL / 2;
                var py = GRID_Y + dr * CELL + CELL / 2;
                TAS.particles.spawn(px, py, '#FF4444', 12 * particleBoost, 4, { size: 4, sizeVar: 3, gravity: 0.08, shape: 'circle' });
                addScorePopup(px, py - 10, '+50', '#FF6644');
                grid[dr][dc] = 0;
                score += Math.round(50 * scoreMult);
              }
            }
          }
          TAS.fx.shake(6, 0.8);
          TAS.audio.playTone(600, 0.2, 'sawtooth', 0.1);
          setTimeout(function() { TAS.audio.playTone(800, 0.15, 'square', 0.08); }, 80);
        }
      }
    }
  }
  return catalystTriggered;
}

function clearMatches(matches) {
  var points = 0;
  var isCrit = Math.random() < critMatchChance; // ref STR+luck: crit match
  var critMult = isCrit ? 2.5 : 1;
  if (isCrit) critFlash = 0.4;

  processCatalyst(matches);

  for (var mi = 0; mi < matches.length; mi++) {
    var group = matches[mi];
    var type = grid[group[0].r][group[0].c];
    if (type === WILDCARD) type = 1;
    var color = BLOCK_COLORS[type] ? BLOCK_COLORS[type].particle : '#fff';
    var groupPts = 0;
    for (var gi = 0; gi < group.length; gi++) {
      var cell = group[gi];
      var px = GRID_X + cell.c * CELL + CELL / 2;
      var py = GRID_Y + cell.r * CELL + CELL / 2;
      var pCount = (8 + combo * 2) * particleBoost; // ref CHA: more particles on match
      TAS.particles.spawn(px, py, color, pCount, 3, { size: 3, sizeVar: 3, gravity: 0.1, shape: 'circle' });
      grid[cell.r][cell.c] = 0;
    }
    var basePoints = group.length * 10 * (combo + 1);
    basePoints = Math.round(basePoints * comboBonus * critMult); // ref WIS: combo multiplier applied
    groupPts = Math.round(basePoints * scoreMult);               // ref CHA: score multiplier applied
    points += groupPts;

    // Score popup
    var cx = 0, cy = 0;
    for (var si = 0; si < group.length; si++) { cx += group[si].c; cy += group[si].r; }
    cx = GRID_X + (cx / group.length) * CELL + CELL / 2;
    cy = GRID_Y + (cy / group.length) * CELL;
    var popText = '+' + groupPts;
    if (isCrit) popText = 'CRIT! ' + popText;
    addScorePopup(cx, cy, popText, isCrit ? '#FF4444' : color);

    // Boss damage
    if (isBossLevel && bossHP > 0) {
      var dmg = group.length + (combo > 0 ? combo : 0);
      bossHP = Math.max(0, bossHP - dmg);
      if (bossHP <= 0) {
        addScorePopup(GW / 2, 30, 'BOSS COMPOSTED!', '#f4b41b');
        var bossBonus = Math.round(bossMaxHP * 100 * scoreMult);
        score += bossBonus;
        addScorePopup(GW / 2, 50, '+' + bossBonus, '#FF8844');
      }
    }
  }
  return points;
}

  if (comboLevel > 1) {
    setTimeout(function() { TAS.audio.playTone(baseFreq * 1.5, 0.15, 'square', 0.07); }, 100);

}

// Input state tracking
var prevKeys = {};
var prevTouch = {};

function justPressed(key) {
  var current = TAS.input.keys[key] || false;
  var prev = prevKeys[key] || false;
  return current && !prev;
}

function justTouched(dir) {
  var current = TAS.input.touch[dir] || false;
  var prev = prevTouch[dir] || false;
  return current && !prev;
}

function saveInputState() {
  prevKeys = {};
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
  prevTouch = {};
  for (var k in TAS.input.touch) prevTouch[k] = TAS.input.touch[k];
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (inputCooldown > 0) inputCooldown -= dt;
  if (comboTextTimer > 0) comboTextTimer -= dt;
  if (critFlash > 0) critFlash -= dt;
  if (zoneTransTimer > 0) zoneTransTimer -= dt;
  titleAnim += dt;

  // Update score popups
  for (var pi = scorePopups.length - 1; pi >= 0; pi--) {
    scorePopups[pi].life -= dt;
    scorePopups[pi].y += scorePopups[pi].vy * dt;
    scorePopups[pi].vy *= 0.95;
    if (scorePopups[pi].life <= 0) scorePopups.splice(pi, 1);
  }

  // Update floating texts
  for (var fi = floatingTexts.length - 1; fi >= 0; fi--) {
    floatingTexts[fi].life -= dt;
    floatingTexts[fi].x += floatingTexts[fi].vx * dt;
    floatingTexts[fi].y += floatingTexts[fi].vy * dt;
    floatingTexts[fi].alpha = Math.min(1, floatingTexts[fi].life);
    if (floatingTexts[fi].life <= 0) floatingTexts.splice(fi, 1);
  }

  // Update environmental hazards
  for (var ei = envHazards.length - 1; ei >= 0; ei--) {
    envHazards[ei].life -= dt;
    envHazards[ei].x += envHazards[ei].vx * dt;
    envHazards[ei].y += envHazards[ei].vy * dt;
    if (envHazards[ei].life <= 0) envHazards.splice(ei, 1);
  }

  // Spawn ambient environmental particles
  if (state === 'playing') {
    ambientTimer -= dt;
    if (ambientTimer <= 0) {
      ambientTimer = 1.5 + Math.random() * 2;
      var zone = getZone(level);
      spawnEnvHazard(zone);
    }

    // Boss attack timer (boss levels get periodic pressure)
    if (isBossLevel && bossHP > 0) {
      bossAttackTimer -= dt;
      if (bossAttackTimer <= 0) {
        bossAttackTimer = 4 + Math.random() * 3;
        bossPhase = (bossPhase + 1) % 3;
        // Boss spawns environmental pressure
        var bzone = getZone(level);
        for (var bi = 0; bi < 3; bi++) {
          spawnEnvHazard(bzone);
        }
        addFloatingText(GW / 2, 50, bossName + ' spreads spores!', '#e6482e', 10);
        TAS.audio.playTone(120, 0.1, 'sawtooth', 0.06);
      }
    }
  }

  // Update hint timer (INT stat)
  if (state === 'playing' && !animating && hintTime > 0) {
    hintTime -= dt;
    if (hintTime <= 0 && showPreview) { // ref INT: show match preview when idle
      findHints();
    }
  }

  if (state === 'title') {
    if (picking) { saveInputState(); return; } // overlay open — swallow game input
    if (justPressed('KeyC') || justTouched('c')) {
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      saveInputState();
      return;
    }
    if (justPressed('Space') || justPressed('Enter') || justPressed('KeyZ') ||
        justTouched('a') || justPressed('ArrowUp')) {
      TAS.audio.ensureAudio();
      startGame();
    }
    saveInputState();
    return;
  }

  if (state === 'gameOver') {
    if (justPressed('Space') || justPressed('Enter') || justPressed('KeyZ') || justTouched('a')) {
      state = 'title';
    }
    saveInputState();
    return;
  }

  if (state === 'levelClear') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      var prevZone = Math.floor((level - 1) / 5) % ZONES.length;
      level++;
      if (level > maxLevel) {
        maxLevel = level;
        try { localStorage.setItem('poop_puzznic_level', String(maxLevel)); } catch(e) { console.warn('Save failed:', e); }
      }
      if (level > LEVELS.length) {
        state = 'victory';
      } else {
        var newZone = Math.floor((level - 1) / 5) % ZONES.length;
        if (newZone !== prevZone) {
          zoneTransTimer = 2.0;
          zoneTransName = ZONES[newZone].name;
          playZoneSound();
        }
        loadLevel(level);
        state = 'playing';
      }
    }
    saveInputState();
    return;
  }

  if (state === 'victory') {
    if (justPressed('Space') || justPressed('Enter') || justTouched('a')) {
      state = 'title';
    }
    saveInputState();
    return;
  }

  if (state === 'playing') {
    // Process gravity and matches
    if (matchDelay > 0) {
      matchDelay -= dt;
      if (matchDelay <= 0) {
        var fell = applyGravity();
        if (fell) {
          matchDelay = 0.2;
          TAS.audio.playNoise(0.05, 0.03, 800);
        } else {
          var matches = findMatches();
          if (matches.length > 0) {
            combo++;
            var pts = clearMatches(matches);
            score += pts;
            if (score > highScore) {
              highScore = score;
              TAS.score.save('poop_puzznic_hi', highScore);
            }
            playMatchSound(combo);

            // Lucky bonus match chance (ref luck stat)
            if (Math.random() < luckyMatchChance && combo > 0) {
              addScorePopup(GW / 2, GH / 2 - 20, 'LUCKY SPORE!', '#38d973');
              score += Math.round(100 * scoreMult);
            }

            // Track chain record
            if (combo > sessionChainBest) sessionChainBest = combo;

            if (combo > 1) {
              var shakeAmt = Math.min(combo * 2, 10);
              TAS.fx.shake(shakeAmt, 0.85);
              comboText = 'COMBO x' + combo + '!';
              comboTextTimer = chainDecay; // ref WIS: chain window duration
              // Extra flavor text for big combos
              if (combo >= 4) {
                addFloatingText(GW / 2, GH / 2 + 30, 'SPORE SURGE!', '#f4b41b', 14);
              } else if (combo >= 3) {
                addFloatingText(GW / 2, GH / 2 + 30, 'POOP COMBO!', '#38d973', 12);
              }
            }
            matchDelay = 0.3;

            // Boss hit effect
            if (isBossLevel && bossHP > 0) {
              playBossHitSound();
              TAS.fx.shake(4, 0.9);
            }
          } else {
            combo = 0;
            animating = false;
            hintTime = hintTimer; // ref INT: reset hint timer after action

            // Check win conditions
            var blocksLeft = countAllActive();
            var normalBlocks = countBlocks();
            var levelWon = false;

            if (isBossLevel) {
              levelWon = bossHP <= 0;
            } else {
              levelWon = normalBlocks === 0;
            }

            if (levelWon) {
              levelComplete = true;
              levelCompleteTimer = 2.0;
              state = 'levelClear';
              var moveBonus = Math.max(0, (maxMoves - moves)) * 50;
              score += Math.round(moveBonus * scoreMult); // ref CHA: score mult on clear
              if (score > highScore) {
                highScore = score;
                TAS.score.save('poop_puzznic_hi', highScore);
              }
              playVictoryMelody();
              TAS.fx.flash('#f4b41b', 0.4);
              for (var i = 0; i < 8 * particleBoost; i++) { // ref CHA: more victory particles
                TAS.particles.spawn(GW / 2 + TAS.math.randRange(-80, 80), GH / 2, '#38d973', 12, 4, { size: 2, sizeVar: 3, gravity: 0.15 });
              }
              // Tutorial complete
              if (showTutorial && level === 1) {
                showTutorial = false;
                try { localStorage.setItem('poop_puzznic_tutorial', 'done'); } catch(e) { console.warn('Tutorial save failed:', e); }
              }
            } else if (moves >= maxMoves) {
              // Shield check (ref CON: chance to survive)
              if (!shieldActive && Math.random() < shieldChance) {
                shieldActive = true;
                maxMoves += 3;
                addScorePopup(GW / 2, GH / 2, 'SPORE SHIELD! +3 MOVES', '#38d973');
                TAS.fx.flash('#38d973', 0.3);
                TAS.audio.playTone(600, 0.15, 'triangle', 0.08);
              } else {
                playFailSound();
                state = 'gameOver';
              }
            }
          }
        }
      }
      saveInputState();
      return;
    }

    if (animating) {
      saveInputState();
      return;
    }

    // Player input
    if (inputCooldown <= 0) {
      var moved = false;

      // Cursor movement
      if (justPressed('ArrowLeft') || justPressed('KeyA') || justTouched('left')) {
        if (grabbed && cursorX > 0 && grid[cursorY][cursorX - 1] === 0) {
          grid[cursorY][cursorX - 1] = grabbedBlock;
          grid[cursorY][cursorX] = 0;
          cursorX--;
          moves++;
          moved = true;
          playMoveSound();
          animating = true;
          matchDelay = 0.15;
          hintTime = hintTimer;
        } else if (!grabbed && cursorX > 0) {
          cursorX--;
          moved = true;
          playMoveSound();
        }
      }
      if (justPressed('ArrowRight') || justPressed('KeyD') || justTouched('right')) {
        if (grabbed && cursorX < COLS - 1 && grid[cursorY][cursorX + 1] === 0) {
          grid[cursorY][cursorX + 1] = grabbedBlock;
          grid[cursorY][cursorX] = 0;
          cursorX++;
          moves++;
          moved = true;
          playMoveSound();
          animating = true;
          matchDelay = 0.15;
          hintTime = hintTimer;
        } else if (!grabbed && cursorX < COLS - 1) {
          cursorX++;
          moved = true;
          playMoveSound();
        }
      }
      if (!grabbed) {
        if (justPressed('ArrowUp') || justPressed('KeyW') || justTouched('up')) {
          if (cursorY > 0) { cursorY--; moved = true; playMoveSound(); }
        }
        if (justPressed('ArrowDown') || justPressed('KeyS') || justTouched('down')) {
          if (cursorY < ROWS - 1) { cursorY++; moved = true; playMoveSound(); }
        }
      }

      // Grab/release (A button or Z key)
      if (justPressed('KeyZ') || justPressed('Space') || justTouched('a')) {
        if (!grabbed) {
          // Try to grab block at cursor (or within STR range)
          var foundGrab = false;
          if (grid[cursorY][cursorX] > 0 && grid[cursorY][cursorX] !== WALL) {
            grabbed = true;
            grabbedBlock = grid[cursorY][cursorX];
            playGrabSound();
            foundGrab = true;
          } else if (grabRange > 1) { // ref STR: extended grab range
            // Check adjacent cells within grab range
            for (var gr = -grabRange; gr <= grabRange && !foundGrab; gr++) {
              for (var gc = -grabRange; gc <= grabRange && !foundGrab; gc++) {
                if (gr === 0 && gc === 0) continue;
                var tr = cursorY + gr, tc = cursorX + gc;
                if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
                  if (grid[tr][tc] > 0 && grid[tr][tc] !== WALL) {
                    // Teleport block to cursor if empty
                    if (grid[cursorY][cursorX] === 0) {
                      grid[cursorY][cursorX] = grid[tr][tc];
                      grid[tr][tc] = 0;
                      grabbed = true;
                      grabbedBlock = grid[cursorY][cursorX];
                      playGrabSound();
                      TAS.audio.playTone(500, 0.05, 'triangle', 0.05);
                      foundGrab = true;
                    }
                  }
                }
              }
            }
          }
        } else {
          // Release block
          grabbed = false;
          grabbedBlock = 0;
          playDropSound();
          animating = true;
          matchDelay = 0.15;
          hintTime = hintTimer;
        }
      }

      // Drop (B button or X key)
      if (justPressed('KeyX') || justTouched('b')) {
        if (grabbed) {
          grabbed = false;
          grabbedBlock = 0;
          playDropSound();
          animating = true;
          matchDelay = 0.15;
          hintTime = hintTimer;
        }
      }

      if (moved) {
        inputCooldown = baseCooldown; // ref DEX: faster cooldown
        hintTime = hintTimer;
        hintCells = [];
      }
    }
  }

  saveInputState();
}

// === DRAW FUNCTIONS ===

function drawBlock(x, y, type, highlight) {
  if (type === WALL) {
    var zone = getZone(level);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = zone.accent;
    ctx.globalAlpha = 0.4;
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
    ctx.globalAlpha = 1;
    // Brick pattern
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2, y + 2); ctx.lineTo(x + CELL / 2, y + CELL / 3);
    ctx.moveTo(x + 2, y + CELL / 3); ctx.lineTo(x + CELL - 2, y + CELL / 3);
    ctx.moveTo(x + CELL / 4, y + CELL / 3); ctx.lineTo(x + CELL / 4, y + 2 * CELL / 3);
    ctx.moveTo(x + 3 * CELL / 4, y + CELL / 3); ctx.lineTo(x + 3 * CELL / 4, y + 2 * CELL / 3);
    ctx.moveTo(x + 2, y + 2 * CELL / 3); ctx.lineTo(x + CELL - 2, y + 2 * CELL / 3);
    ctx.moveTo(x + CELL / 2, y + 2 * CELL / 3); ctx.lineTo(x + CELL / 2, y + CELL - 2);
    ctx.strokeStyle = '#444';
    ctx.stroke();
    return;
  }

  // Catalyst block (special)
  if (type === CATALYST) {
    var cPulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.fillStyle = '#FF4444';
    ctx.globalAlpha = cPulse;
    ctx.beginPath();
    ctx.arc(x + CELL / 2, y + CELL / 2, CELL / 2 - 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#FF8888';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Inner star
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('*', x + CELL / 2, y + CELL / 2 + 6);
    // Reveal text for INT
    if (catalystReveal) { // ref INT: catalyst identification
      ctx.font = '6px monospace';
      ctx.fillStyle = '#FFF';
      ctx.fillText('CAT', x + CELL / 2, y + CELL - 3);
    }
    if (highlight) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
      ctx.setLineDash([]);
    }
    return;
  }

  // Wildcard block
  if (type === WILDCARD) {
    var wPulse = Math.sin(frame * 0.06) * 0.2 + 0.8;
    // Rainbow cycling
    var hue = (frame * 2) % 360;
    ctx.fillStyle = 'hsl(' + hue + ', 70%, 50%)';
    ctx.globalAlpha = wPulse;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 2);
    ctx.quadraticCurveTo(x + CELL / 2, y - 2, x + CELL - 4, y + 2);
    ctx.lineTo(x + CELL - 2, y + CELL - 4);
    ctx.quadraticCurveTo(x + CELL / 2, y + CELL + 2, x + 2, y + CELL - 4);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = 'hsl(' + ((hue + 60) % 360) + ', 80%, 60%)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Question mark
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('?', x + CELL / 2, y + CELL / 2 + 5);
    if (highlight) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
      ctx.setLineDash([]);
    }
    return;
  }

  var color = BLOCK_COLORS[type];
  if (!color) return;

  // Glow effect for blocks
  var glowAlpha = 0.15 + Math.sin(frame * 0.04 + type) * 0.08;
  ctx.fillStyle = color.glow;
  ctx.globalAlpha = glowAlpha;
  ctx.fillRect(x - 2, y - 2, CELL + 4, CELL + 4);
  ctx.globalAlpha = 1;

  // Main block body (poop shape)
  ctx.fillStyle = color.fill;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 2);
  ctx.quadraticCurveTo(x + CELL / 2, y - 2, x + CELL - 4, y + 2);
  ctx.lineTo(x + CELL - 2, y + CELL - 4);
  ctx.quadraticCurveTo(x + CELL / 2, y + CELL + 2, x + 2, y + CELL - 4);
  ctx.closePath();
  ctx.fill();

  // Border
  ctx.strokeStyle = color.stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Type-specific decorations
  if (type === 1) {
    // Mold: small dots
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    for (var di = 0; di < 4; di++) {
      ctx.beginPath();
      ctx.arc(x + 8 + di * 5, y + 6 + (di % 2) * 4, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (type === 2) {
    // Spore: energy ring
    ctx.strokeStyle = 'rgba(0,255,127,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x + CELL / 2, y + CELL / 2, 8 + Math.sin(frame * 0.1) * 2, 0, Math.PI * 2);
    ctx.stroke();
  } else if (type === 3) {
    // Mycelium: tendrils
    ctx.strokeStyle = 'rgba(255,215,0,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 6, y + CELL - 4);
    ctx.quadraticCurveTo(x + CELL / 2, y + CELL / 2, x + CELL - 6, y + 4);
    ctx.stroke();
  } else if (type === 4) {
    // Fungal: bubbles
    ctx.fillStyle = 'rgba(191,95,255,0.2)';
    ctx.beginPath();
    ctx.arc(x + 10, y + 8, 3, 0, Math.PI * 2);
    ctx.arc(x + CELL - 8, y + CELL - 10, 2, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === 5) {
    // Compost: embers
    if (frame % 20 < 10) {
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      ctx.beginPath();
      ctx.arc(x + 8, y + 10, 1.5, 0, Math.PI * 2);
      ctx.arc(x + CELL - 10, y + 8, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (type === 6) {
    // Garden: shimmer line
    var shimX = (frame * 0.5 + type * 10) % (CELL - 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 2 + shimX, y + 3);
    ctx.lineTo(x + 2 + shimX, y + CELL - 3);
    ctx.stroke();
  }

  // Highlight swirl (poop shape)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 3, y + CELL / 2 - 4, 5, 0, Math.PI, true);
  ctx.arc(x + CELL / 2 + 2, y + CELL / 2 - 2, 4, 0, Math.PI, true);
  ctx.fill();

  // Shine dot
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 5, y + 8, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 4, y + CELL / 2 + 2, 3, 0, Math.PI * 2);
  ctx.arc(x + CELL / 2 + 4, y + CELL / 2 + 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 4, y + CELL / 2 + 2, 1.5, 0, Math.PI * 2);
  ctx.arc(x + CELL / 2 + 4, y + CELL / 2 + 2, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Type icon (small letter)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(color.icon, x + CELL / 2, y + CELL - 4);

  // Grab highlight
  if (highlight) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
    ctx.setLineDash([]);
  }
}

function drawCursor(x, y) {
  var px = GRID_X + x * CELL;
  var py = GRID_Y + y * CELL;
  var pulse = Math.sin(frame * 0.1) * 2;

  // === BASELING SPRITE === the player's baseling rides the selector cell.
  TAS.drawBaseling(ctx, px + CELL / 2, py + CELL / 2, CELL - 4, { anim: grabbed ? 'attack' : 'idle', frame: frame });

  ctx.strokeStyle = grabbed ? '#f4b41b' : statB.color;
  ctx.lineWidth = 2;
  ctx.setLineDash([]);

  var sz = 8;
  var off = pulse;
  ctx.beginPath();
  ctx.moveTo(px - off, py + sz - off); ctx.lineTo(px - off, py - off); ctx.lineTo(px + sz - off, py - off);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px + CELL - sz + off, py - off); ctx.lineTo(px + CELL + off, py - off); ctx.lineTo(px + CELL + off, py + sz - off);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px - off, py + CELL - sz + off); ctx.lineTo(px - off, py + CELL + off); ctx.lineTo(px + sz - off, py + CELL + off);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(px + CELL - sz + off, py + CELL + off); ctx.lineTo(px + CELL + off, py + CELL + off); ctx.lineTo(px + CELL + off, py + CELL - sz + off);
  ctx.stroke();

  // STR grab range indicator
  if (grabRange > 1 && !grabbed) {
    ctx.strokeStyle = 'rgba(244,180,27,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 4]);
    ctx.strokeRect(
      px - (grabRange - 1) * CELL, py - (grabRange - 1) * CELL,
      CELL + (grabRange - 1) * 2 * CELL, CELL + (grabRange - 1) * 2 * CELL
    );
    ctx.setLineDash([]);
  }
}

function drawGrid() {
  var zone = getZone(level);

  // Grid background
  ctx.fillStyle = zone.grid;
  ctx.fillRect(GRID_X - 2, GRID_Y - 2, COLS * CELL + 4, ROWS * CELL + 4);

  // Grid border glow
  ctx.strokeStyle = zone.accent;
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.02) * 0.1;
  ctx.lineWidth = 2;
  ctx.strokeRect(GRID_X - 3, GRID_Y - 3, COLS * CELL + 6, ROWS * CELL + 6);
  ctx.globalAlpha = 1;

  // Grid lines
  ctx.strokeStyle = 'rgba(80,60,40,0.2)';
  ctx.lineWidth = 0.5;
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(GRID_X, GRID_Y + r * CELL);
    ctx.lineTo(GRID_X + COLS * CELL, GRID_Y + r * CELL);
    ctx.stroke();
  }
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(GRID_X + c * CELL, GRID_Y);
    ctx.lineTo(GRID_X + c * CELL, GRID_Y + ROWS * CELL);
    ctx.stroke();
  }

  // Hint cells (INT stat preview)
  if (hintCells.length > 0 && showPreview) {
    var hintAlpha = Math.sin(frame * 0.15) * 0.15 + 0.2;
    ctx.fillStyle = 'rgba(56,217,115,' + hintAlpha + ')';
    for (var hi = 0; hi < hintCells.length; hi++) {
      ctx.fillRect(GRID_X + hintCells[hi].c * CELL + 2, GRID_Y + hintCells[hi].r * CELL + 2, CELL - 4, CELL - 4);
    }
  }

  // Blocks
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      if (grid[r][c] > 0) {
        var bx = GRID_X + c * CELL;
        var by = GRID_Y + r * CELL;
        var isGrabbed = grabbed && c === cursorX && r === cursorY;
        drawBlock(bx, by, grid[r][c], isGrabbed);
      }
    }
  }
}

function drawBossBar() {
  if (!isBossLevel || bossMaxHP <= 0) return;

  var bw = 180;
  var bh = 12;
  var bx = GRID_X + (COLS * CELL - bw) / 2;
  var by = GRID_Y - 22;

  // Boss name
  ctx.textAlign = 'center';
  ctx.font = 'bold 9px monospace';
  ctx.fillStyle = '#e6482e';
  ctx.fillText(bossName, GRID_X + COLS * CELL / 2, by - 4);

  // Bar background
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, bw, bh);

  // Bar fill
  var fillW = Math.max(0, (bossHP / bossMaxHP) * (bw - 2));
  var hpRatio = bossHP / bossMaxHP;
  var barColor = hpRatio > 0.5 ? '#FF4444' : hpRatio > 0.25 ? '#FF8800' : '#FFDD00';
  ctx.fillStyle = barColor;
  ctx.fillRect(bx + 1, by + 1, fillW, bh - 2);

  // Border
  ctx.strokeStyle = '#e6482e';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  // HP text
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 8px monospace';
  ctx.fillText(bossHP + '/' + bossMaxHP, GRID_X + COLS * CELL / 2, by + bh - 2);
}

function drawSidebar() {
  var sx = GRID_X + COLS * CELL + 12;
  var sy = GRID_Y + 4;

  ctx.textAlign = 'left';

  // Zone name
  var zone = getZone(level);
  ctx.font = 'bold 8px monospace';
  ctx.fillStyle = zone.accent;
  ctx.fillText(zone.name, sx, sy);

  // Moves remaining
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('MOVES', sx, sy + 16);
  ctx.fillStyle = moves >= maxMoves - 5 ? '#e6482e' : '#38d973';
  ctx.font = 'bold 14px monospace';
  ctx.fillText((maxMoves - moves) + '/' + maxMoves, sx, sy + 30);

  // Blocks remaining
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('FUNGI', sx, sy + 50);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(String(countBlocks()), sx, sy + 64);

  // Baseling stat display — the 5 ARCADE stats in their canonical colors.
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.font = 'bold 8px monospace';
  ctx.fillStyle = '#0052FF';
  ctx.fillText('-- ' + (_sel ? _sel.charName.toUpperCase() : 'WIMMPLE') + ' --', sx, sy + 84);

  var statY = sy + 96;
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    for (var si = 0; si < _keys.length; si++) {
      var _mm = _meta[_keys[si]], _v = _sel.stats[_keys[si]];
      ctx.fillStyle = _mm.color;
      ctx.fillText(_mm.label, sx, statY + si * 11);
      ctx.fillStyle = '#222'; ctx.fillRect(sx + 26, statY + si * 11 - 5, 30, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(sx + 26, statY + si * 11 - 5, 30 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
  }

  // Active bonuses
  var bonusY = statY + stats.length * 11 + 8;
  ctx.font = '7px monospace';
  ctx.fillStyle = '#555';
  if (grabRange > 1) { ctx.fillText('Grab+' + (grabRange - 1), sx, bonusY); bonusY += 9; }
  if (bonusMoves > 0) { ctx.fillText('Moves+' + bonusMoves, sx, bonusY); bonusY += 9; }
  if (showPreview) { ctx.fillText('Hints ON', sx, bonusY); bonusY += 9; }
  if (scoreMult > 1.05) { ctx.fillText('Score x' + scoreMult.toFixed(1), sx, bonusY); bonusY += 9; }

  // Combo display
  if (comboTextTimer > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px monospace';
    ctx.globalAlpha = Math.min(1, comboTextTimer);
    ctx.fillStyle = '#f4b41b';
    ctx.fillText(comboText, GW / 2, GH - 16);
    ctx.restore();
  }
}

function drawScorePopups() {
  ctx.textAlign = 'center';
  for (var pi = 0; pi < scorePopups.length; pi++) {
    var p = scorePopups[pi];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  var zone = getZone(level);
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 0, GW, GH);

  // Animated background particles (spores/energy)
  for (var bi = 0; bi < bgStars.length; bi++) {
    var s = bgStars[bi];
    s.y -= s.speed;
    if (s.y < -5) { s.y = GH + 5; s.x = Math.random() * GW; }
    ctx.fillStyle = zone.particle;
    ctx.globalAlpha = s.alpha;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawEnvHazards() {
  for (var ei = 0; ei < envHazards.length; ei++) {
    var hz = envHazards[ei];
    ctx.globalAlpha = Math.min(1, hz.life * 0.5);
    ctx.fillStyle = hz.color;
    ctx.beginPath();
    if (hz.type === 0) {
      // Fungal spore - small circle
      ctx.arc(hz.x, hz.y, hz.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (hz.type === 1) {
      // Garden seed - diamond shape
      ctx.moveTo(hz.x, hz.y - hz.size);
      ctx.lineTo(hz.x + hz.size * 0.6, hz.y);
      ctx.lineTo(hz.x, hz.y + hz.size);
      ctx.lineTo(hz.x - hz.size * 0.6, hz.y);
      ctx.closePath();
      ctx.fill();
    } else {
      // Spore gem - flickering square
      var flicker = Math.sin(frame * 0.3 + ei) * 0.5;
      ctx.fillRect(hz.x - hz.size / 2, hz.y - hz.size / 2, hz.size + flicker, hz.size + flicker);
    }
  }
  ctx.globalAlpha = 1;
}

function drawFloatingTexts() {
  ctx.textAlign = 'center';
  for (var fi = 0; fi < floatingTexts.length; fi++) {
    var ft = floatingTexts[fi];
    ctx.globalAlpha = ft.alpha;
    ctx.font = 'bold ' + ft.size + 'px monospace';
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

function drawStarRating(x, y, stars) {
  ctx.textAlign = 'center';
  ctx.font = '18px monospace';
  for (var si = 0; si < 3; si++) {
    if (si < stars) {
      ctx.fillStyle = '#f4b41b';
      ctx.fillText('*', x - 24 + si * 24, y);
    } else {
      ctx.fillStyle = '#444';
      ctx.fillText('*', x - 24 + si * 24, y);
    }
  }
}

function drawBlockLegend() {
  // Draw small legend showing block types in sidebar area
  var lx = GRID_X + COLS * CELL + 12;
  var ly = GRID_Y + ROWS * CELL - 30;
  ctx.textAlign = 'left';
  ctx.font = '6px monospace';
  ctx.fillStyle = '#444';
  ctx.fillText('FUNGI TYPES:', lx, ly);
  var typeKeys = [1, 2, 3, 4, 5, 6];
  for (var ti = 0; ti < typeKeys.length; ti++) {
    var bt = BLOCK_COLORS[typeKeys[ti]];
    if (!bt) continue;
    var bly = ly + 8 + ti * 8;
    ctx.fillStyle = bt.fill;
    ctx.fillRect(lx, bly - 4, 5, 5);
    ctx.fillStyle = '#555';
    ctx.fillText(bt.icon + ':' + bt.name, lx + 7, bly);
  }
}

function drawMiniMap() {
  // Mini representation of the grid in corner
  var mx = GW - 55;
  var my = GH - 55;
  var ms = 5; // mini cell size

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(mx - 2, my - 2, COLS * ms + 4, ROWS * ms + 4);

  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var v = grid[r][c];
      if (v === 0) continue;
      if (v === WALL) {
        ctx.fillStyle = '#333';
      } else if (v === CATALYST) {
        ctx.fillStyle = '#FF4444';
      } else if (v === WILDCARD) {
        ctx.fillStyle = 'hsl(' + ((frame * 2) % 360) + ', 70%, 50%)';
      } else if (BLOCK_COLORS[v]) {
        ctx.fillStyle = BLOCK_COLORS[v].fill;
      } else {
        ctx.fillStyle = '#666';
      }
      ctx.fillRect(mx + c * ms, my + r * ms, ms - 1, ms - 1);
    }
  }

  // Cursor on minimap
  ctx.strokeStyle = grabbed ? '#f4b41b' : '#38d973';
  ctx.lineWidth = 1;
  ctx.strokeRect(mx + cursorX * ms - 1, my + cursorY * ms - 1, ms + 1, ms + 1);
}

function drawTutorial() {
  if (!showTutorial || level !== 1 || state !== 'playing') return;

  var tutMessages = [
    'Use ARROWS/WASD to guide your baseling',
    'Press Z/SPACE to grab a spore block',
    'Move LEFT/RIGHT to slide the fungi tile',
    'Match 2+ same tiles to harvest POOP!',
    'Clear ALL tiles to complete the garden'
  ];

  var step = Math.min(Math.floor(frame / 180), tutMessages.length - 1);

  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(GW / 2 - 160, GH - 44, 320, 28);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 160, GH - 44, 320, 28);
  ctx.font = '10px monospace';
  ctx.fillStyle = '#38d973';
  ctx.fillText(tutMessages[step], GW / 2, GH - 27);
  ctx.font = '7px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('(' + (step + 1) + '/' + tutMessages.length + ')', GW / 2, GH - 18);
  ctx.restore();
}

function drawZoneTransition() {
  if (zoneTransTimer <= 0) return;

  ctx.save();
  var alpha = zoneTransTimer > 1 ? 1 : zoneTransTimer;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, GH / 2 - 30, GW, 60);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('ENTERING', GW / 2, GH / 2 - 8);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(zoneTransName.toUpperCase(), GW / 2, GH / 2 + 18);
  ctx.restore();
}

// === DRAW ===
function draw(dt) {
  drawBackground();

  if (state === 'title') {
    // Decorative blocks on title (zone-themed)
    for (var i = 1; i <= 6; i++) {
      var bx = 30 + i * 60;
      var by = 180 + Math.sin(frame * 0.03 + i) * 10;
      drawBlock(bx, by, i, false);
    }

    TAS.ui.drawTitle('POOP PUZZNIC', 'A Baseling Puzzle', GW, GH, { frame: frame, titleColor: '#a855f7' });

    // Game description
    ctx.textAlign = 'center';
    ctx.font = '11px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('Match 2+ fungi tiles to earn POOP tokens!', GW / 2, GH * 0.58);
    ctx.fillText('Guide your baseling through 6 garden zones.', GW / 2, GH * 0.64);

    // NES Controls display
    ctx.font = 'bold 9px monospace';
    ctx.fillStyle = '#38d973';
    ctx.fillText('--- CONTROLS ---', GW / 2, GH * 0.72);
    ctx.font = '9px monospace';
    ctx.fillStyle = '#777';
    ctx.fillText('ARROWS/WASD: Move  |  Z/SPACE: Grab  |  X: Drop', GW / 2, GH * 0.78);

    if (maxLevel > 1) {
      ctx.fillStyle = '#38d973';
      ctx.font = '10px monospace';
      ctx.fillText('Continue from Level ' + Math.min(maxLevel, LEVELS.length) + ' / ' + LEVELS.length, GW / 2, GH * 0.85);
    }

    // Selected baseling preview (idle bob) + name (Base-blue) + 5 stat bars.
    var _selT = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
    TAS.drawBaseling(ctx, GW / 2, GH * 0.50, 28, { anim: 'idle', frame: frame });
    ctx.fillStyle = '#0052FF';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText((_selT ? _selT.charName : 'WIMMPLE') + (_selT && _selT.tokenId != null ? ' #' + _selT.tokenId : ''), GW / 2, GH * 0.50 + 26);
    if (_selT && _selT.stats && window.BaselingPlayer) {
      var _metaT = BaselingPlayer.STAT_META, _keysT = BaselingPlayer.STAT_KEYS, _x0T = GW / 2 - 115;
      ctx.font = '8px monospace';
      for (var _iT = 0; _iT < _keysT.length; _iT++) {
        var _mmT = _metaT[_keysT[_iT]], _vT = _selT.stats[_keysT[_iT]], _bxT = _x0T + _iT * 47;
        ctx.fillStyle = _mmT.color; ctx.textAlign = 'left'; ctx.fillText(_mmT.label, _bxT, GH * 0.50 + 40);
        ctx.fillStyle = '#222'; ctx.fillRect(_bxT, GH * 0.50 + 43, 40, 5);
        ctx.fillStyle = _mmT.color; ctx.fillRect(_bxT, GH * 0.50 + 43, 40 * Math.max(0.04, Math.min(1, _vT / 200)), 5);
      }
      ctx.textAlign = 'center';
    }

    // SELECT BASELING prompt (Base-blue)
    ctx.fillStyle = '#0052FF';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('[C] SELECT BASELING', GW / 2, GH * 0.92);

    TAS.particles.draw();
    saveInputState();
    return;
  }

  if (state === 'gameOver') {
    drawGrid();
    TAS.particles.draw();
    drawScorePopups();
    var zone = getZone(level);
    TAS.ui.drawGameOver(score, highScore, GW, GH, {
      frame: frame,
      extra: zone.name + ' - Level ' + level + ' - Your baseling ran out of moves!'
    });
    saveInputState();
    return;
  }

  if (state === 'victory') {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('GARDEN MASTER!', GW / 2, GH * 0.2);

    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('Your baseling cleared all ' + LEVELS.length + ' gardens', GW / 2, GH * 0.32);
    ctx.fillText('across 6 zones of the fungal kingdom!', GW / 2, GH * 0.38);

    // Zone names scroll
    for (var zi = 0; zi < ZONES.length; zi++) {
      ctx.fillStyle = ZONES[zi].accent;
      ctx.font = '10px monospace';
      ctx.fillText(ZONES[zi].name, GW / 2, GH * 0.46 + zi * 14);
    }

    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('Total POOP: ' + score, GW / 2, GH * 0.78);

    var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.9);
    ctx.globalAlpha = 1;

    TAS.particles.draw();
    if (frame % 8 === 0) {
      var zi2 = Math.floor(Math.random() * ZONES.length);
      TAS.particles.spawn(TAS.math.randRange(50, GW - 50), TAS.math.randRange(50, GH - 50), ZONES[zi2].particle, 5, 2, { size: 2, sizeVar: 2, gravity: 0.05 });
    }
    saveInputState();
    return;
  }

  if (state === 'levelClear') {
    ctx.save();
    drawGrid();
    TAS.particles.draw();
    ctx.restore();

    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';

    if (isBossLevel) {
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 24px monospace';
      ctx.fillText('BOSS COMPOSTED!', GW / 2, GH * 0.3);
      ctx.fillStyle = '#f4b41b';
      ctx.font = '12px monospace';
      ctx.fillText(bossName + ' has been mulched!', GW / 2, GH * 0.42);
    } else {
      ctx.fillStyle = '#f4b41b';
      ctx.font = 'bold 22px monospace';
      ctx.fillText('GARDEN CLEARED!', GW / 2, GH * 0.3);
    }

    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText('Seed bonus: +' + Math.round(Math.max(0, maxMoves - moves) * 50 * scoreMult), GW / 2, GH * 0.50);

    // Chain record display
    if (sessionChainBest > 1) {
      ctx.fillStyle = '#f4b41b';
      ctx.font = '10px monospace';
      ctx.fillText('Best spore chain: x' + sessionChainBest, GW / 2, GH * 0.57);
    }

    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('POOP: ' + score, GW / 2, GH * 0.64);

    // Star rating
    starRating = calcStarRating(moves, maxMoves, sessionChainBest);
    drawStarRating(GW / 2, GH * 0.74, starRating);

    // Rating description
    ctx.font = '9px monospace';
    ctx.fillStyle = '#aaa';
    var ratingDesc = starRating === 3 ? 'PERFECT HARVEST!' : starRating === 2 ? 'Great composting!' : 'Garden tended';
    ctx.fillText(ratingDesc, GW / 2, GH * 0.80);

    // WIS bonus display
    if (comboBonus > 1.05) {
      ctx.fillStyle = '#a855f7';
      ctx.font = '8px monospace';
      ctx.fillText('WIS spore bonus: x' + comboBonus.toFixed(2), GW / 2, GH * 0.86);
    }

    drawScorePopups();
    drawFloatingTexts();
    saveInputState();
    return;
  }

  // === PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  // Crit flash overlay
  if (critFlash > 0) {
    ctx.fillStyle = 'rgba(255,68,68,' + (critFlash * 0.3) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  drawEnvHazards();
  drawBossBar();
  drawGrid();
  drawCursor(cursorX, cursorY);
  drawSidebar();
  drawBlockLegend();
  drawScorePopups();
  drawFloatingTexts();
  drawMiniMap();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  TAS.ui.drawHUD(score, level, undefined, GW, { scoreLabel: 'POOP' });

  // Level + zone indicator in HUD
  ctx.textAlign = 'center';
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('LV ' + level + '/' + LEVELS.length, GW / 2, 18);

  drawTutorial();
  drawZoneTransition();

  TAS.input.drawTouchControls(GW, GH);
  saveInputState();
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
