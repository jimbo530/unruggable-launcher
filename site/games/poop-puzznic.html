const LEVELS = makeLevels();

// === GAME FUNCTIONS ===

function loadLevel(n) {
  const lvl = LEVELS[Math.min(n - 1, LEVELS.length - 1)];
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = lvl.grid[r][c];
    }
  }
  cursorX = Math.floor(COLS / 2);
  cursorY = Math.floor(ROWS / 2);
  grabbed = false;
  grabbedBlock = 0;
  combo = 0;
  comboTimer = 0;
  animating = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  moves = 0;
  maxMoves = lvl.moves;
  matchDelay = 0;
}

function startGame() {
  state = 'playing';
  score = 0;
  level = savedLevel;
  TAS.particles.clear();
  loadLevel(level);
}

function countBlocks() {
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] > 0 && grid[r][c] !== WALL) count++;
    }
  }
  return count;
}

function applyGravity() {
  let fell = false;
  for (let c = 0; c < COLS; c++) {
    for (let r = ROWS - 2; r >= 0; r--) {
      if (grid[r][c] > 0 && grid[r][c] !== WALL) {
        let targetR = r;
        while (targetR + 1 < ROWS && grid[targetR + 1][c] === 0) {
          targetR++;
        }
        if (targetR !== r) {
          grid[targetR][c] = grid[r][c];
          grid[r][c] = 0;
          fell = true;
        }
      }
    }
  }
  return fell;
}

function findMatches() {
  let matched = [];
  let visited = [];
  for (let r = 0; r < ROWS; r++) {
    visited[r] = [];
    for (let c = 0; c < COLS; c++) {
      visited[r][c] = false;
    }
  }

  function flood(r, c, type) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return [];
    if (visited[r][c]) return [];
    if (grid[r][c] !== type) return [];
    visited[r][c] = true;
    let group = [{r: r, c: c}];
    group = group.concat(flood(r - 1, c, type));
    group = group.concat(flood(r + 1, c, type));
    group = group.concat(flood(r, c - 1, type));
    group = group.concat(flood(r, c + 1, type));
    return group;
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] > 0 && grid[r][c] !== WALL && !visited[r][c]) {
        let group = flood(r, c, grid[r][c]);
        if (group.length >= 2) {
          matched.push(group);
        }
      }
    }
  }
  return matched;
}

function clearMatches(matches) {
  let points = 0;
  for (const group of matches) {
    const type = grid[group[0].r][group[0].c];
    const color = BLOCK_COLORS[type] ? BLOCK_COLORS[type].particle : '#fff';
    for (const cell of group) {
      const px = GRID_X + cell.c * CELL + CELL / 2;
      const py = GRID_Y + cell.r * CELL + CELL / 2;
      TAS.particles.spawn(px, py, color, 8, 3, { size: 3, sizeVar: 3, gravity: 0.1, shape: 'circle' });
      grid[cell.r][cell.c] = 0;
    }
    points += group.length * 10 * (combo + 1);
  }
  return points;
}

function playMatchSound(comboLevel) {
  const baseFreq = 300 + comboLevel * 80;
  TAS.audio.playTone(baseFreq, 0.1, 'square', 0.08);
  setTimeout(function() { TAS.audio.playTone(baseFreq * 1.25, 0.1, 'square', 0.06); }, 50);
  if (comboLevel > 1) {
    setTimeout(function() { TAS.audio.playTone(baseFreq * 1.5, 0.15, 'square', 0.07); }, 100);
  }
}

function playGrabSound() {
  TAS.audio.playTone(200, 0.05, 'square', 0.06);
}

function playDropSound() {
  TAS.audio.playTone(150, 0.08, 'triangle', 0.06);
}

function playMoveSound() {
  TAS.audio.playTone(400, 0.03, 'square', 0.04);
}

function playVictoryMelody() {
  TAS.audio.playMelody([
    [523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2],
    [784, 0.1], [1047, 0.3]
  ], 100);
}

function playFailSound() {
  TAS.audio.playMelody([
    [300, 0.15], [250, 0.15], [200, 0.2]
  ], 150);
}

// Input state tracking
let prevKeys = {};
let prevTouch = {};

function justPressed(key) {
  let current = TAS.input.keys[key] || false;
  let prev = prevKeys[key] || false;
  return current && !prev;
}

function justTouched(dir) {
  let current = TAS.input.touch[dir] || false;
  let prev = prevTouch[dir] || false;
  return current && !prev;
}

function saveInputState() {
  prevKeys = {};
  for (let k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
  prevTouch = {};
  for (let k in TAS.input.touch) prevTouch[k] = TAS.input.touch[k];
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (inputCooldown > 0) inputCooldown -= dt;

  if (comboTextTimer > 0) comboTextTimer -= dt;

  if (state === 'title') {
    if (justPressed('Space') || justPressed('Enter') || justPressed('KeyZ') ||
        justTouched('a') || justPressed('ArrowUp')) {
      TAS.audio.ensureAudio();
      startGame();
    }
    saveInputState();
    return;
  }

  if (state === 'gameOver') {
    if (justPressed('Space') || justPressed('Enter') || justPressed('KeyZ') || justTouched('a')) {
      state = 'title';
    }
    saveInputState();
    return;
  }

  if (state === 'levelClear') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      level++;
      if (level > maxLevel) {
        maxLevel = level;
        try { localStorage.setItem('poop_puzznic_level', String(maxLevel)); } catch(e) { /* storage error */ }
      }
      if (level > LEVELS.length) {
        // Beat the game!
        state = 'victory';
      } else {
        loadLevel(level);
        state = 'playing';
      }
    }
    saveInputState();
    return;
  }

  if (state === 'victory') {
    if (justPressed('Space') || justPressed('Enter') || justTouched('a')) {
      state = 'title';
    }
    saveInputState();
    return;
  }

  if (state === 'playing') {
    // Process gravity and matches
    if (matchDelay > 0) {
      matchDelay -= dt;
      if (matchDelay <= 0) {
        let fell = applyGravity();
        if (fell) {
          matchDelay = 0.2;
          TAS.audio.playNoise(0.05, 0.03, 800);
        } else {
          let matches = findMatches();
          if (matches.length > 0) {
            combo++;
            let pts = clearMatches(matches);
            score += pts;
            if (score > highScore) {
              highScore = score;
              TAS.score.save('poop_puzznic_hi', highScore);
            }
            playMatchSound(combo);
            if (combo > 1) {
              TAS.fx.shake(combo * 2, 0.85);
              comboText = 'COMBO x' + combo + '!';
              comboTextTimer = 1.5;
            }
            matchDelay = 0.3;
          } else {
            combo = 0;
            animating = false;
            // Check if level is clear
            if (countBlocks() === 0) {
              levelComplete = true;
              levelCompleteTimer = 2.0;
              state = 'levelClear';
              score += Math.max(0, (maxMoves - moves)) * 50;
              if (score > highScore) {
                highScore = score;
                TAS.score.save('poop_puzznic_hi', highScore);
              }
              playVictoryMelody();
              TAS.fx.flash('#ffdd44', 0.4);
              // Big particle burst
              for (let i = 0; i < 5; i++) {
                TAS.particles.spawn(GW / 2 + TAS.math.randRange(-80, 80), GH / 2, '#FFD700', 12, 4, { size: 2, sizeVar: 3, gravity: 0.15 });
              }
            } else if (moves >= maxMoves) {
              // Out of moves
              playFailSound();
              state = 'gameOver';
            }
          }
        }
      }
      saveInputState();
      return;
    }

    if (animating) {
      saveInputState();
      return;
    }

    // Player input
    if (inputCooldown <= 0) {
      let moved = false;

      // Cursor movement
      if (justPressed('ArrowLeft') || justPressed('KeyA') || justTouched('left')) {
        if (grabbed && cursorX > 0 && grid[cursorY][cursorX - 1] === 0) {
          // Move grabbed block
          grid[cursorY][cursorX - 1] = grabbedBlock;
          grid[cursorY][cursorX] = 0;
          cursorX--;
          moves++;
          moved = true;
          playMoveSound();
          // Check for gravity/matches after move
          animating = true;
          matchDelay = 0.15;
        } else if (!grabbed && cursorX > 0) {
          cursorX--;
          moved = true;
          playMoveSound();
        }
      }
      if (justPressed('ArrowRight') || justPressed('KeyD') || justTouched('right')) {
        if (grabbed && cursorX < COLS - 1 && grid[cursorY][cursorX + 1] === 0) {
          grid[cursorY][cursorX + 1] = grabbedBlock;
          grid[cursorY][cursorX] = 0;
          cursorX++;
          moves++;
          moved = true;
          playMoveSound();
          animating = true;
          matchDelay = 0.15;
        } else if (!grabbed && cursorX < COLS - 1) {
          cursorX++;
          moved = true;
          playMoveSound();
        }
      }
      if (!grabbed) {
        if (justPressed('ArrowUp') || justPressed('KeyW') || justTouched('up')) {
          if (cursorY > 0) { cursorY--; moved = true; playMoveSound(); }
        }
        if (justPressed('ArrowDown') || justPressed('KeyS') || justTouched('down')) {
          if (cursorY < ROWS - 1) { cursorY++; moved = true; playMoveSound(); }
        }
      }

      // Grab/release (A button or Z key)
      if (justPressed('KeyZ') || justPressed('Space') || justTouched('a')) {
        if (!grabbed) {
          // Try to grab block at cursor
          if (grid[cursorY][cursorX] > 0 && grid[cursorY][cursorX] !== WALL) {
            grabbed = true;
            grabbedBlock = grid[cursorY][cursorX];
            playGrabSound();
          }
        } else {
          // Release block
          grabbed = false;
          grabbedBlock = 0;
          playDropSound();
          // Trigger gravity check
          animating = true;
          matchDelay = 0.15;
        }
      }

      // Drop (B button or X key) — release + gravity
      if (justPressed('KeyX') || justTouched('b')) {
        if (grabbed) {
          grabbed = false;
          grabbedBlock = 0;
          playDropSound();
          animating = true;
          matchDelay = 0.15;
        }
      }

      if (moved) {
        inputCooldown = 0.12;
      }
    }
  }

  saveInputState();
}

// === DRAW FUNCTIONS ===

function drawBlock(x, y, type, highlight) {
  if (type === WALL) {
    // Wall block — brick pattern
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
    // Brick lines
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2, y + 2); ctx.lineTo(x + CELL / 2, y + CELL / 3);
    ctx.moveTo(x + 2, y + CELL / 3); ctx.lineTo(x + CELL - 2, y + CELL / 3);
    ctx.moveTo(x + CELL / 4, y + CELL / 3); ctx.lineTo(x + CELL / 4, y + 2 * CELL / 3);
    ctx.moveTo(x + 3 * CELL / 4, y + CELL / 3); ctx.lineTo(x + 3 * CELL / 4, y + 2 * CELL / 3);
    ctx.moveTo(x + 2, y + 2 * CELL / 3); ctx.lineTo(x + CELL - 2, y + 2 * CELL / 3);
    ctx.moveTo(x + CELL / 2, y + 2 * CELL / 3); ctx.lineTo(x + CELL / 2, y + CELL - 2);
    ctx.strokeStyle = '#444';
    ctx.stroke();
    return;
  }

  const color = BLOCK_COLORS[type];
  if (!color) return;

  // Main block body
  ctx.fillStyle = color.fill;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 2);
  ctx.quadraticCurveTo(x + CELL / 2, y - 2, x + CELL - 4, y + 2);
  ctx.lineTo(x + CELL - 2, y + CELL - 4);
  ctx.quadraticCurveTo(x + CELL / 2, y + CELL + 2, x + 2, y + CELL - 4);
  ctx.closePath();
  ctx.fill();

  // Border
  ctx.strokeStyle = color.stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Highlight swirl (poop shape)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 3, y + CELL / 2 - 4, 5, 0, Math.PI, true);
  ctx.arc(x + CELL / 2 + 2, y + CELL / 2 - 2, 4, 0, Math.PI, true);
  ctx.fill();

  // Shine dot
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 5, y + 8, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes on the poop
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 4, y + CELL / 2 + 2, 3, 0, Math.PI * 2);
  ctx.arc(x + CELL / 2 + 4, y + CELL / 2 + 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(x + CELL / 2 - 4, y + CELL / 2 + 2, 1.5, 0, Math.PI * 2);
  ctx.arc(x + CELL / 2 + 4, y + CELL / 2 + 2, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Grab highlight
  if (highlight) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
    ctx.setLineDash([]);
  }
}

function drawCursor(x, y) {
  const px = GRID_X + x * CELL;
  const py = GRID_Y + y * CELL;
  const pulse = Math.sin(frame * 0.1) * 2;

  ctx.strokeStyle = grabbed ? '#ff8844' : '#44ff88';
  ctx.lineWidth = 2;
  ctx.setLineDash([]);

  // Corner brackets
  const sz = 8;
  const off = pulse;
  // Top-left
  ctx.beginPath();
  ctx.moveTo(px - off, py + sz - off); ctx.lineTo(px - off, py - off); ctx.lineTo(px + sz - off, py - off);
  ctx.stroke();
  // Top-right
  ctx.beginPath();
  ctx.moveTo(px + CELL - sz + off, py - off); ctx.lineTo(px + CELL + off, py - off); ctx.lineTo(px + CELL + off, py + sz - off);
  ctx.stroke();
  // Bottom-left
  ctx.beginPath();
  ctx.moveTo(px - off, py + CELL - sz + off); ctx.lineTo(px - off, py + CELL + off); ctx.lineTo(px + sz - off, py + CELL + off);
  ctx.stroke();
  // Bottom-right
  ctx.beginPath();
  ctx.moveTo(px + CELL - sz + off, py + CELL + off); ctx.lineTo(px + CELL + off, py + CELL + off); ctx.lineTo(px + CELL + off, py + CELL - sz + off);
  ctx.stroke();
}

function drawGrid() {
  // Grid background
  ctx.fillStyle = '#1a0f0a';
  ctx.fillRect(GRID_X - 2, GRID_Y - 2, COLS * CELL + 4, ROWS * CELL + 4);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(80,60,40,0.3)';
  ctx.lineWidth = 0.5;
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(GRID_X, GRID_Y + r * CELL);
    ctx.lineTo(GRID_X + COLS * CELL, GRID_Y + r * CELL);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(GRID_X + c * CELL, GRID_Y);
    ctx.lineTo(GRID_X + c * CELL, GRID_Y + ROWS * CELL);
    ctx.stroke();
  }

  // Blocks
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] > 0) {
        const px = GRID_X + c * CELL;
        const py = GRID_Y + r * CELL;
        const isGrabbed = grabbed && c === cursorX && r === cursorY;
        drawBlock(px, py, grid[r][c], isGrabbed);
      }
    }
  }
}

function drawSidebar() {
  const sx = GRID_X + COLS * CELL + 16;
  const sy = GRID_Y + 8;

  ctx.textAlign = 'left';
  ctx.font = 'bold 11px monospace';

  // Moves remaining
  ctx.fillStyle = '#aaa';
  ctx.fillText('MOVES', sx, sy);
  ctx.fillStyle = moves >= maxMoves - 5 ? '#ff6644' : '#44ff88';
  ctx.font = 'bold 16px monospace';
  ctx.fillText((maxMoves - moves) + '/' + maxMoves, sx, sy + 18);

  // Blocks remaining
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('BLOCKS', sx, sy + 48);
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(String(countBlocks()), sx, sy + 66);

  // Controls hint
  ctx.font = '9px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('ARROWS:Move', sx, sy + 100);
  ctx.fillText('Z/A: Grab', sx, sy + 114);
  ctx.fillText('X/B: Drop', sx, sy + 128);

  // Combo display
  if (comboTextTimer > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px monospace';
    ctx.globalAlpha = Math.min(1, comboTextTimer);
    ctx.fillStyle = '#ff8844';
    ctx.fillText(comboText, GW / 2, GH - 20);
    ctx.restore();
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0604';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    // Draw some decorative blocks on title
    for (let i = 1; i <= 5; i++) {
      const bx = 60 + i * 65;
      const by = 180 + Math.sin(frame * 0.03 + i) * 10;
      drawBlock(bx, by, i, false);
    }

    TAS.ui.drawTitle('POOP PUZZNIC', 'A Tasern Tale', GW, GH, { frame: frame, titleColor: '#8B4513' });

    // Instructions
    ctx.textAlign = 'center';
    ctx.font = '11px monospace';
    ctx.fillStyle = '#888';
    ctx.fillText('Match 2+ same-color poops to clear them!', GW / 2, GH * 0.65);
    ctx.fillText('Clear all blocks to advance.', GW / 2, GH * 0.72);

    if (maxLevel > 1) {
      ctx.fillStyle = '#556B2F';
      ctx.fillText('Continue from Level ' + Math.min(maxLevel, LEVELS.length), GW / 2, GH * 0.80);
    }

    TAS.particles.draw();
    saveInputState();
    return;
  }

  if (state === 'gameOver') {
    drawGrid();
    TAS.particles.draw();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level ' + level + ' - Out of moves!' });
    saveInputState();
    return;
  }

  if (state === 'victory') {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('CONGRATULATIONS!', GW / 2, GH * 0.25);
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('You cleared all ' + LEVELS.length + ' levels!', GW / 2, GH * 0.4);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('Final Score: ' + score, GW / 2, GH * 0.55);

    const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#88ccff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.8);
    ctx.globalAlpha = 1;

    TAS.particles.draw();
    // Keep spawning victory particles
    if (frame % 10 === 0) {
      TAS.particles.spawn(TAS.math.randRange(50, GW - 50), TAS.math.randRange(50, GH - 50), '#FFD700', 5, 2, { size: 2, sizeVar: 2, gravity: 0.05 });
    }
    saveInputState();
    return;
  }

  if (state === 'levelClear') {
    ctx.save();
    drawGrid();
    TAS.particles.draw();
    ctx.restore();

    // Level complete overlay
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('LEVEL CLEAR!', GW / 2, GH * 0.35);
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('Moves bonus: +' + (Math.max(0, maxMoves - moves) * 50), GW / 2, GH * 0.5);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Score: ' + score, GW / 2, GH * 0.62);
    saveInputState();
    return;
  }

  // === PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  drawGrid();
  drawCursor(cursorX, cursorY);
  drawSidebar();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  TAS.ui.drawHUD(score, level, undefined, GW, { scoreLabel: 'SCORE' });

  // Level indicator in HUD
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('LV ' + level + '/' + LEVELS.length, GW / 2, 18);

  TAS.input.drawTouchControls(GW, GH);
  saveInputState();
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
