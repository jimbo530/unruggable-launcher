const LEVELS = makeLevels();

// === LOAD ROOM ===
function loadRoom(idx) {
  if (idx >= LEVELS.length) idx = LEVELS.length - 1;
  const lv = LEVELS[idx];
  grid = [];
  items = [];
  enemies = [];
  playerFireballs = [];
  enemyFireballs = [];
  blockCreateAnims = [];
  blockDestroyAnims = [];
  hasKey = false;
  freezeTimer = 0;
  invincTimer = 0;
  actionCooldown = 0;
  timer = lv.time;
  timerMax = lv.time;

  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = lv.map[r][c];
      switch(ch) {
        case 'S': grid[r][c] = T.STONE; break;
        case 'L': grid[r][c] = T.LAVA; break;
        case 'P':
          grid[r][c] = T.EMPTY;
          px = c * TS + 6; py = r * TS + 4;
          pvx = 0; pvy = 0; pdir = 1; pgrounded = false; pjumping = false;
          break;
        case 'K':
          grid[r][c] = T.EMPTY;
          items.push({type:'key', x:c, y:r, collected:false});
          break;
        case 'D':
          grid[r][c] = T.EMPTY;
          items.push({type:'door', x:c, y:r});
          break;
        case 'G':
          grid[r][c] = T.EMPTY;
          items.push({type:'gem', x:c, y:r, collected:false});
          break;
        case 'J':
          grid[r][c] = T.EMPTY;
          items.push({type:'jar', x:c, y:r, collected:false});
          break;
        case 'H':
          grid[r][c] = T.EMPTY;
          items.push({type:'hourglass', x:c, y:r, collected:false});
          break;
        case '*':
          grid[r][c] = T.EMPTY;
          items.push({type:'star', x:c, y:r, collected:false});
          break;
        default: grid[r][c] = T.EMPTY;
      }
    }
  }

  // Spawn enemies
  for (const e of lv.enemies) {
    enemies.push(spawnEnemy(e.type, e.x * TS + TS/2, e.y * TS + TS/2));
  }
}

function spawnEnemy(type, x, y) {
  const base = { type, x, y, vx: 0, vy: 0, dir: 1, alive: true, frame: 0, fireTimer: 0 };
  switch(type) {
    case 'spark':
      base.vx = 40 * (Math.random() > 0.5 ? 1 : -1);
      base.vy = 0;
      base.bouncing = true;
      break;
    case 'ghost':
      base.vx = 30 * (Math.random() > 0.5 ? 1 : -1);
      base.vy = 20 * (Math.random() > 0.5 ? 1 : -1);
      base.phase = Math.random() * Math.PI * 2;
      break;
    case 'demon':
      base.vx = 35 * (Math.random() > 0.5 ? 1 : -1);
      base.fireTimer = 60 + Math.random() * 60;
      break;
    case 'dragon':
      base.vx = 0; base.vy = 0;
      base.fireTimer = 40 + Math.random() * 40;
      base.fireDir = x < GW/2 ? 1 : -1;
      break;
    case 'mirror':
      base.vx = 30 * (Math.random() > 0.5 ? 1 : -1);
      break;
  }
  return base;
}

// === GRID HELPERS ===
function isSolid(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return true;
  return grid[r][c] === T.STONE || grid[r][c] === T.BLOCK;
}

function isLava(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  return grid[r][c] === T.LAVA;
}

function gridAt(px, py) {
  return { c: Math.floor(px / TS), r: Math.floor(py / TS) };
}

// === BLOCK CREATE/DESTROY ===
function createBlock(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (grid[r][c] !== T.EMPTY) return false;
  // Check no enemy at that spot (squish check done separately)
  grid[r][c] = T.BLOCK;
  blockCreateAnims.push({ c, r, t: 0.3 });
  TAS.audio.playTone(200, 0.15, 'triangle', 0.08);
  TAS.audio.playTone(400, 0.1, 'square', 0.05);
  TAS.particles.spawn(c * TS + TS/2, r * TS + TS/2, '#c8a2ff', 6, 1.5, { size: 2, shape: 'rect' });

  // Squish enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) continue;
    const ec = Math.floor(e.x / TS), er = Math.floor(e.y / TS);
    if (ec === c && er === r) {
      killEnemy(i);
      score += 200;
    }
  }
  return true;
}

function destroyBlock(c, r) {
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
  if (grid[r][c] !== T.BLOCK) return false;
  grid[r][c] = T.EMPTY;
  blockDestroyAnims.push({ c, r, t: 0.3 });
  TAS.audio.playNoise(0.12, 0.06, 800);
  TAS.audio.playTone(150, 0.1, 'sawtooth', 0.05);
  TAS.particles.spawn(c * TS + TS/2, r * TS + TS/2, '#8866aa', 8, 2, { size: 3, gravity: 2, shape: 'rect' });
  return true;
}

function killEnemy(idx) {
  const e = enemies[idx];
  e.alive = false;
  TAS.particles.spawn(e.x, e.y, '#ff6644', 12, 3, { size: 3 });
  TAS.audio.playTone(300, 0.1, 'square', 0.06);
  TAS.audio.playTone(150, 0.15, 'sawtooth', 0.04);
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  room = savedProgress;
  fireballs = 2;
  deathAnim = 0;
  winAnim = 0;
  TAS.particles.clear();
  loadRoom(room);
}

// === PLAYER DEATH ===
function playerDie() {
  if (invincTimer > 0) return;
  lives--;
  deathAnim = 1.0;
  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#ff0000', 0.4);
  TAS.audio.playTone(400, 0.1, 'square', 0.1);
  TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 80);
  TAS.audio.playTone(100, 0.3, 'sawtooth', 0.06, 40);
  TAS.particles.spawn(px + PW/2, py + PH/2, '#ff4444', 20, 4, { size: 3 });
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('solomonkey_hi', highScore);
    }
  } else {
    loadRoom(room);
  }
}

// === ROOM WIN ===
function roomWin() {
  winAnim = 1.5;
  score += Math.floor(timer) * 10;
  room++;
  if (room > savedProgress) {
    savedProgress = room;
    try { localStorage.setItem('solomonkey_progress', String(savedProgress)); } catch(e2) { /* storage full */ }
  }
  if (room >= LEVELS.length) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('solomonkey_hi', highScore);
    }
  } else {
    TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.15]], 100);
    loadRoom(room);
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Animate block effects
  for (let i = blockCreateAnims.length - 1; i >= 0; i--) {
    blockCreateAnims[i].t -= dt;
    if (blockCreateAnims[i].t <= 0) blockCreateAnims.splice(i, 1);
  }
  for (let i = blockDestroyAnims.length - 1; i >= 0; i--) {
    blockDestroyAnims[i].t -= dt;
    if (blockDestroyAnims[i].t <= 0) blockDestroyAnims.splice(i, 1);
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (deathAnim > 0) {
    deathAnim -= dt;
    return;
  }
  if (winAnim > 0) {
    winAnim -= dt;
    return;
  }

  if (state !== 'playing') return;

  // Timer
  timer -= dt;
  if (timer <= 0) {
    playerDie();
    return;
  }

  // Freeze/invinc
  if (freezeTimer > 0) freezeTimer -= dt;
  if (invincTimer > 0) invincTimer -= dt;
  if (actionCooldown > 0) actionCooldown -= dt;

  // === INPUT ===
  const kl = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
  const kr = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
  const ku = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up;
  const jumpKey = TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a;
  const blockKey = TAS.input.keys['KeyX'] || TAS.input.keys['ShiftLeft'] || TAS.input.touch.b;

  const lv = LEVELS[room];
  const icy = lv && lv.icy;

  // Horizontal movement
  if (kl) { pvx = icy ? TAS.math.lerp(pvx, -PSPEED, dt * 4) : -PSPEED; pdir = -1; }
  else if (kr) { pvx = icy ? TAS.math.lerp(pvx, PSPEED, dt * 4) : PSPEED; pdir = 1; }
  else { pvx = icy ? TAS.math.lerp(pvx, 0, dt * 3) : 0; }

  // Jump
  if (jumpKey && !jumpPressed && pgrounded) {
    pvy = PJUMP;
    pgrounded = false;
    pjumping = true;
    TAS.audio.playTone(280, 0.08, 'square', 0.05, 400);
  }
  jumpPressed = jumpKey;

  // Block create/destroy action
  if (blockKey && !blockPressed && actionCooldown <= 0) {
    blockPressed = true;
    actionCooldown = 0.2;
    const playerCenterC = Math.floor((px + PW/2) / TS);
    const playerCenterR = Math.floor((py + PH/2) / TS);
    let targetC, targetR;

    if (ku) {
      // Fireball
      if (fireballs > 0) {
        fireballs--;
        playerFireballs.push({ x: px + PW/2, y: py + PH/4, vx: pdir * 200, vy: 0, life: 2 });
        TAS.audio.playTone(600, 0.12, 'sawtooth', 0.07, 200);
        TAS.audio.playNoise(0.08, 0.04, 2000);
      }
    } else {
      // Block create/destroy
      targetC = playerCenterC + pdir;
      targetR = playerCenterR;
      if (targetC >= 0 && targetC < COLS && targetR >= 0 && targetR < ROWS) {
        if (grid[targetR][targetC] === T.BLOCK) {
          destroyBlock(targetC, targetR);
          // Mirror knight reacts
          for (const e of enemies) {
            if (e.type === 'mirror' && e.alive) {
              const ec = Math.floor(e.x / TS);
              const er = Math.floor(e.y / TS);
              const mc = ec + (Math.random() > 0.5 ? 1 : -1);
              if (mc >= 0 && mc < COLS && grid[er][mc] === T.EMPTY) {
                setTimeout(function() { createBlock(mc, er); }, 300);
              }
            }
          }
        } else if (grid[targetR][targetC] === T.EMPTY) {
          createBlock(targetC, targetR);
          // Mirror knight reacts
          for (const e of enemies) {
            if (e.type === 'mirror' && e.alive) {
              const ec = Math.floor(e.x / TS);
              const er = Math.floor(e.y / TS);
              const mc = ec + (Math.random() > 0.5 ? 1 : -1);
              if (mc >= 0 && mc < COLS && grid[er][mc] === T.BLOCK) {
                setTimeout(function() { destroyBlock(mc, er); }, 300);
              }
            }
          }
        }
      }
    }
  }
  if (!blockKey) blockPressed = false;

  // Gravity
  pvy += PGRAV * dt;
  if (pvy > 400) pvy = 400;

  // Move X
  px += pvx * dt;
  // Collide X
  const pLeft = Math.floor(px / TS);
  const pRight = Math.floor((px + PW - 1) / TS);
  const pTop = Math.floor(py / TS);
  const pBot = Math.floor((py + PH - 1) / TS);

  if (pvx < 0) {
    const c = Math.floor(px / TS);
    for (let r = pTop; r <= pBot; r++) {
      if (isSolid(c, r)) {
        px = (c + 1) * TS;
        pvx = 0;
        break;
      }
    }
  } else if (pvx > 0) {
    const c = Math.floor((px + PW - 1) / TS);
    for (let r = pTop; r <= pBot; r++) {
      if (isSolid(c, r)) {
        px = c * TS - PW;
        pvx = 0;
        break;
      }
    }
  }

  // Move Y
  py += pvy * dt;
  pgrounded = false;

  const pTop2 = Math.floor(py / TS);
  const pBot2 = Math.floor((py + PH - 1) / TS);
  const pLeft2 = Math.floor(px / TS);
  const pRight2 = Math.floor((px + PW - 1) / TS);

  if (pvy > 0) {
    const r = Math.floor((py + PH - 1) / TS);
    for (let c = pLeft2; c <= pRight2; c++) {
      if (isSolid(c, r)) {
        py = r * TS - PH;
        pvy = 0;
        pgrounded = true;
        pjumping = false;
        break;
      }
    }
  } else if (pvy < 0) {
    const r = Math.floor(py / TS);
    for (let c = pLeft2; c <= pRight2; c++) {
      if (isSolid(c, r)) {
        py = (r + 1) * TS;
        pvy = 0;
        break;
      }
    }
  }

  // Lava check
  const lavaR = Math.floor((py + PH - 1) / TS);
  const lavaC = Math.floor((px + PW/2) / TS);
  if (isLava(lavaC, lavaR)) {
    playerDie();
    return;
  }

  // Bounds
  px = TAS.math.clamp(px, 0, GW - PW);
  py = TAS.math.clamp(py, 0, GH - PH);

  // === ITEMS ===
  for (const item of items) {
    if (item.collected) continue;
    const ix = item.x * TS, iy = item.y * TS;
    if (TAS.hit.rectOverlap(px, py, PW, PH, ix + 4, iy + 4, TS - 8, TS - 8)) {
      switch(item.type) {
        case 'key':
          item.collected = true;
          hasKey = true;
          score += 100;
          TAS.audio.playMelody([[523,0.08],[659,0.08],[784,0.12]], 80);
          TAS.particles.spawn(ix + TS/2, iy + TS/2, '#ffdd44', 10, 2, { size: 2 });
          break;
        case 'door':
          if (hasKey) {
            TAS.audio.playTone(150, 0.3, 'triangle', 0.06);
            TAS.audio.playTone(200, 0.2, 'triangle', 0.05);
            roomWin();
            return;
          }
          break;
        case 'gem':
          item.collected = true;
          score += 500;
          TAS.audio.playTone(880, 0.1, 'sine', 0.06);
          TAS.particles.spawn(ix + TS/2, iy + TS/2, '#44ffaa', 8, 2, { size: 2 });
          break;
        case 'jar':
          item.collected = true;
          fireballs += 3;
          TAS.audio.playTone(440, 0.1, 'triangle', 0.06);
          TAS.particles.spawn(ix + TS/2, iy + TS/2, '#ff8844', 6, 1.5);
          break;
        case 'hourglass':
          item.collected = true;
          freezeTimer = 5;
          TAS.audio.playTone(330, 0.15, 'sine', 0.05);
          TAS.particles.spawn(ix + TS/2, iy + TS/2, '#88ccff', 8, 1.5);
          break;
        case 'star':
          item.collected = true;
          invincTimer = 6;
          score += 50;
          TAS.audio.playMelody([[392,0.06],[494,0.06],[587,0.06],[784,0.1]], 60);
          TAS.particles.spawn(ix + TS/2, iy + TS/2, '#ffff44', 12, 3);
          break;
      }
    }
  }

  // === ENEMIES ===
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) continue;
    e.frame++;

    if (freezeTimer > 0 && e.type !== 'ghost') continue;

    switch(e.type) {
      case 'spark': {
        e.x += e.vx * dt;
        // Gravity for spark
        e.vy += PGRAV * 0.7 * dt;
        e.y += e.vy * dt;
        // Floor collision
        const er = Math.floor((e.y + 12) / TS);
        const ec = Math.floor(e.x / TS);
        if (isSolid(ec, er)) {
          e.y = (er - 1) * TS + TS - 12;
          e.vy = 0;
        }
        // Wall collision
        const ewc = Math.floor((e.x + (e.vx > 0 ? 10 : -10)) / TS);
        const ewr = Math.floor(e.y / TS);
        if (isSolid(ewc, ewr)) {
          e.vx = -e.vx;
        }
        // Edge detection - turn at platform edges
        const aheadC = Math.floor((e.x + (e.vx > 0 ? 14 : -14)) / TS);
        const belowR = Math.floor((e.y + 14) / TS);
        if (!isSolid(aheadC, belowR) && e.vy === 0) {
          e.vx = -e.vx;
        }
        break;
      }
      case 'ghost': {
        e.phase += dt * 2;
        e.x += e.vx * dt;
        e.y += Math.sin(e.phase) * 30 * dt;
        // Bounce off walls (ghosts pass through blocks but not walls)
        if (e.x < TS || e.x > GW - TS) e.vx = -e.vx;
        if (e.y < TS || e.y > GH - TS) e.vy = -e.vy;
        e.x = TAS.math.clamp(e.x, TS, GW - TS);
        e.y = TAS.math.clamp(e.y, TS, GH - TS);
        break;
      }
      case 'demon': {
        e.x += e.vx * dt;
        e.vy += PGRAV * 0.7 * dt;
        e.y += e.vy * dt;
        // Floor
        const dr = Math.floor((e.y + 12) / TS);
        const dc = Math.floor(e.x / TS);
        if (isSolid(dc, dr)) {
          e.y = (dr - 1) * TS + TS - 12;
          e.vy = 0;
        }
        // Wall
        const dwc = Math.floor((e.x + (e.vx > 0 ? 12 : -12)) / TS);
        const dwr = Math.floor(e.y / TS);
        if (isSolid(dwc, dwr)) {
          e.vx = -e.vx;
        }
        // Edge
        const daC = Math.floor((e.x + (e.vx > 0 ? 14 : -14)) / TS);
        const dbR = Math.floor((e.y + 14) / TS);
        if (!isSolid(daC, dbR) && e.vy === 0) {
          e.vx = -e.vx;
        }
        // Fire
        e.fireTimer -= dt * 60;
        if (e.fireTimer <= 0) {
          e.fireTimer = 80 + Math.random() * 40;
          const dirToPlayer = px > e.x ? 1 : -1;
          enemyFireballs.push({ x: e.x, y: e.y, vx: dirToPlayer * 120, vy: 0, life: 3 });
          TAS.audio.playTone(200, 0.08, 'sawtooth', 0.03);
        }
        break;
      }
      case 'dragon': {
        e.fireTimer -= dt * 60;
        if (e.fireTimer <= 0) {
          e.fireTimer = 70 + Math.random() * 30;
          enemyFireballs.push({ x: e.x + e.fireDir * 16, y: e.y, vx: e.fireDir * 150, vy: 0, life: 2.5 });
          TAS.audio.playTone(120, 0.15, 'sawtooth', 0.04);
        }
        break;
      }
      case 'mirror': {
        e.x += e.vx * dt;
        e.vy += PGRAV * 0.7 * dt;
        e.y += e.vy * dt;
        const mr = Math.floor((e.y + 12) / TS);
        const mc = Math.floor(e.x / TS);
        if (isSolid(mc, mr)) {
          e.y = (mr - 1) * TS + TS - 12;
          e.vy = 0;
        }
        const mwc = Math.floor((e.x + (e.vx > 0 ? 12 : -12)) / TS);
        const mwr = Math.floor(e.y / TS);
        if (isSolid(mwc, mwr)) {
          e.vx = -e.vx;
        }
        const maC = Math.floor((e.x + (e.vx > 0 ? 14 : -14)) / TS);
        const mbR = Math.floor((e.y + 14) / TS);
        if (!isSolid(maC, mbR) && e.vy === 0) {
          e.vx = -e.vx;
        }
        break;
      }
    }

    // Collision with player
    if (e.alive && invincTimer <= 0) {
      const eSize = e.type === 'dragon' ? 14 : 10;
      if (TAS.hit.rectOverlap(px, py, PW, PH, e.x - eSize, e.y - eSize, eSize * 2, eSize * 2)) {
        playerDie();
        return;
      }
    }
  }

  // === PLAYER FIREBALLS ===
  for (let i = playerFireballs.length - 1; i >= 0; i--) {
    const f = playerFireballs[i];
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.life -= dt;
    // Hit walls
    const fc = Math.floor(f.x / TS), fr = Math.floor(f.y / TS);
    if (isSolid(fc, fr) || f.life <= 0) {
      TAS.particles.spawn(f.x, f.y, '#ff8844', 5, 1.5);
      playerFireballs.splice(i, 1);
      continue;
    }
    // Hit enemies
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (!e.alive) continue;
      if (TAS.math.dist(f.x, f.y, e.x, e.y) < 16) {
        killEnemy(j);
        score += 300;
        hit = true;
        break;
      }
    }
    if (hit) {
      TAS.particles.spawn(f.x, f.y, '#ffaa00', 8, 2);
      playerFireballs.splice(i, 1);
    }
  }

  // === ENEMY FIREBALLS ===
  for (let i = enemyFireballs.length - 1; i >= 0; i--) {
    const f = enemyFireballs[i];
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.life -= dt;
    const fc = Math.floor(f.x / TS), fr = Math.floor(f.y / TS);
    if (isSolid(fc, fr) || f.life <= 0 || f.x < 0 || f.x > GW) {
      enemyFireballs.splice(i, 1);
      continue;
    }
    // Hit player
    if (invincTimer <= 0 && TAS.hit.rectOverlap(px, py, PW, PH, f.x - 4, f.y - 4, 8, 8)) {
      enemyFireballs.splice(i, 1);
      playerDie();
      return;
    }
  }
}

// === DRAW ===
function draw(dt) {
  const worldIdx = Math.floor(room / 5);
  const pal = WORLD_PALETTES[worldIdx] || WORLD_PALETTES[0];
  const lv = LEVELS[room] || LEVELS[0];

  // Background
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Room: ' + (room + 1) });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  // Dark mode (limited visibility)
  const isDark = lv && lv.dark;

  // Draw grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TS, y = r * TS;
      const tile = grid[r][c];

      if (isDark) {
        const distToPlayer = TAS.math.dist(x + TS/2, y + TS/2, px + PW/2, py + PH/2);
        if (distToPlayer > 100) continue;
      }

      if (tile === T.STONE) {
        drawStone(x, y, pal);
      } else if (tile === T.BLOCK) {
        drawBlock(x, y, pal);
      } else if (tile === T.LAVA) {
        drawLava(x, y);
      }
    }
  }

  // Block create animations
  for (const a of blockCreateAnims) {
    const x = a.c * TS, y = a.y * TS;
    const progress = 1 - (a.t / 0.3);
    ctx.globalAlpha = 0.5 * (1 - progress);
    ctx.fillStyle = '#ffffff';
    const expand = (1 - progress) * 8;
    ctx.fillRect(a.c * TS - expand, a.r * TS - expand, TS + expand * 2, TS + expand * 2);
    ctx.globalAlpha = 1;
  }

  // Block destroy animations
  for (const a of blockDestroyAnims) {
    const progress = 1 - (a.t / 0.3);
    ctx.globalAlpha = 0.4 * (1 - progress);
    ctx.fillStyle = pal.block;
    const shrink = progress * 16;
    ctx.fillRect(a.c * TS + shrink, a.r * TS + shrink, TS - shrink * 2, TS - shrink * 2);
    ctx.globalAlpha = 1;
  }

  // Items
  for (const item of items) {
    if (item.collected) continue;
    if (isDark) {
      const distToPlayer = TAS.math.dist(item.x * TS + TS/2, item.y * TS + TS/2, px + PW/2, py + PH/2);
      if (distToPlayer > 100) continue;
    }
    drawItem(item);
  }

  // Player fireballs
  for (const f of playerFireballs) {
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(f.x, f.y, 5 + Math.sin(frame * 0.3) * 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(f.x, f.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemy fireballs
  for (const f of enemyFireballs) {
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.arc(f.x, f.y, 4 + Math.sin(frame * 0.4) * 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    if (isDark) {
      const distToPlayer = TAS.math.dist(e.x, e.y, px + PW/2, py + PH/2);
      if (distToPlayer > 110) continue;
    }
    drawEnemy(e);
  }

  // Player
  if (deathAnim <= 0) {
    drawPlayer();
  }

  // Dark overlay
  if (isDark) {
    drawDarkOverlay();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW HELPERS ===
function drawStone(x, y, pal) {
  ctx.fillStyle = pal.stone;
  ctx.fillRect(x, y, TS, TS);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x, y + TS - 3, TS, 3);
  ctx.fillRect(x + TS - 3, y, 3, TS);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x + 1, y + 1, TS - 2, 2);
  ctx.fillRect(x + 1, y + 1, 2, TS - 2);
  // Brick lines
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y + TS/2); ctx.lineTo(x + TS, y + TS/2);
  ctx.moveTo(x + TS/2, y); ctx.lineTo(x + TS/2, y + TS/2);
  ctx.moveTo(x + TS/4, y + TS/2); ctx.lineTo(x + TS/4, y + TS);
  ctx.moveTo(x + TS * 3/4, y + TS/2); ctx.lineTo(x + TS * 3/4, y + TS);
  ctx.stroke();
}

function drawBlock(x, y, pal) {
  ctx.fillStyle = pal.block;
  ctx.fillRect(x + 1, y + 1, TS - 2, TS - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x + 2, y + 2, TS - 4, 3);
  ctx.fillRect(x + 2, y + 2, 3, TS - 4);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x + 1, y + TS - 4, TS - 2, 3);
  // Sparkle
  const sparkle = Math.sin(frame * 0.08 + x + y) * 0.3 + 0.5;
  ctx.fillStyle = 'rgba(200,162,255,' + sparkle * 0.4 + ')';
  ctx.fillRect(x + TS/2 - 2, y + TS/2 - 2, 4, 4);
}

function drawLava(x, y) {
  const wave = Math.sin(frame * 0.06 + x * 0.1) * 3;
  ctx.fillStyle = '#441100';
  ctx.fillRect(x, y, TS, TS);
  ctx.fillStyle = '#cc3300';
  ctx.fillRect(x, y + 4 + wave, TS, TS - 4);
  ctx.fillStyle = '#ff6600';
  ctx.fillRect(x + 4, y + 8 + wave, TS - 8, 4);
  ctx.fillStyle = '#ffaa00';
  const bubble = Math.sin(frame * 0.1 + x) > 0.8 ? 3 : 0;
  if (bubble) {
    ctx.beginPath();
    ctx.arc(x + TS/2 + Math.sin(x) * 8, y + 12 + wave, bubble, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawItem(item) {
  const x = item.x * TS, y = item.y * TS;
  const bob = Math.sin(frame * 0.06 + item.x + item.y) * 2;

  switch(item.type) {
    case 'key':
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(x + 10, y + 8 + bob, 12, 6);
      ctx.fillRect(x + 8, y + 6 + bob, 6, 10);
      ctx.fillRect(x + 18, y + 14 + bob, 4, 8);
      ctx.fillRect(x + 18, y + 18 + bob, 6, 3);
      ctx.fillStyle = '#ffff88';
      ctx.fillRect(x + 9, y + 7 + bob, 4, 4);
      break;
    case 'door':
      ctx.fillStyle = hasKey ? '#886622' : '#443311';
      ctx.fillRect(x + 4, y + 2, TS - 8, TS - 4);
      ctx.fillStyle = '#aa8844';
      ctx.fillRect(x + 6, y + 4, TS - 12, TS - 8);
      ctx.fillStyle = hasKey ? '#ffdd44' : '#666';
      ctx.beginPath();
      ctx.arc(x + TS - 10, y + TS/2, 3, 0, Math.PI * 2);
      ctx.fill();
      // Arch
      ctx.fillStyle = '#664422';
      ctx.fillRect(x + 4, y + 2, TS - 8, 4);
      break;
    case 'gem':
      ctx.fillStyle = '#44ffaa';
      ctx.beginPath();
      ctx.moveTo(x + TS/2, y + 6 + bob);
      ctx.lineTo(x + TS/2 + 8, y + TS/2 + bob);
      ctx.lineTo(x + TS/2, y + TS - 6 + bob);
      ctx.lineTo(x + TS/2 - 8, y + TS/2 + bob);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#88ffcc';
      ctx.beginPath();
      ctx.moveTo(x + TS/2, y + 8 + bob);
      ctx.lineTo(x + TS/2 + 4, y + TS/2 - 2 + bob);
      ctx.lineTo(x + TS/2, y + TS/2 + bob);
      ctx.lineTo(x + TS/2 - 4, y + TS/2 - 2 + bob);
      ctx.closePath();
      ctx.fill();
      break;
    case 'jar':
      ctx.fillStyle = '#cc6622';
      ctx.fillRect(x + 10, y + 10 + bob, 12, 16);
      ctx.fillRect(x + 12, y + 6 + bob, 8, 6);
      ctx.fillStyle = '#ff8844';
      ctx.fillRect(x + 12, y + 12 + bob, 8, 10);
      // Flame icon
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(x + TS/2, y + 16 + bob, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'hourglass':
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(x + 10, y + 6 + bob, 12, 3);
      ctx.fillRect(x + 10, y + 23 + bob, 12, 3);
      ctx.beginPath();
      ctx.moveTo(x + 11, y + 9 + bob);
      ctx.lineTo(x + 21, y + 9 + bob);
      ctx.lineTo(x + TS/2, y + TS/2 + bob);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + 11, y + 23 + bob);
      ctx.lineTo(x + 21, y + 23 + bob);
      ctx.lineTo(x + TS/2, y + TS/2 + bob);
      ctx.closePath();
      ctx.fill();
      break;
    case 'star':
      ctx.fillStyle = '#ffff44';
      drawStar(x + TS/2, y + TS/2 + bob, 5, 10, 5);
      ctx.fillStyle = '#ffffff';
      drawStar(x + TS/2, y + TS/2 + bob, 5, 5, 3);
      break;
  }
}

function drawStar(cx, cy, points, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
}

function drawEnemy(e) {
  const bob = Math.sin(e.frame * 0.1) * 2;

  switch(e.type) {
    case 'spark':
      // Electric spark ball
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(e.x, e.y + bob, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(e.x, e.y + bob, 4, 0, Math.PI * 2);
      ctx.fill();
      // Lightning bolts
      ctx.strokeStyle = '#ffff88';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const a = (frame * 0.1 + i * Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(e.x, e.y + bob);
        ctx.lineTo(e.x + Math.cos(a) * 12, e.y + bob + Math.sin(a) * 12);
        ctx.stroke();
      }
      break;
    case 'ghost':
      // Translucent ghost
      ctx.globalAlpha = 0.6 + Math.sin(e.frame * 0.05) * 0.2;
      ctx.fillStyle = '#aabbff';
      ctx.beginPath();
      ctx.arc(e.x, e.y - 4 + bob, 10, Math.PI, 0);
      ctx.lineTo(e.x + 10, e.y + 10 + bob);
      ctx.lineTo(e.x + 6, e.y + 6 + bob);
      ctx.lineTo(e.x + 2, e.y + 10 + bob);
      ctx.lineTo(e.x - 2, e.y + 6 + bob);
      ctx.lineTo(e.x - 6, e.y + 10 + bob);
      ctx.lineTo(e.x - 10, e.y + 10 + bob);
      ctx.closePath();
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x - 5, e.y - 4 + bob, 3, 4);
      ctx.fillRect(e.x + 2, e.y - 4 + bob, 3, 4);
      ctx.globalAlpha = 1;
      break;
    case 'demon':
      // Red demon
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(e.x - 8, e.y - 8 + bob, 16, 18);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.x - 6, e.y - 6 + bob, 12, 14);
      // Horns
      ctx.fillStyle = '#880000';
      ctx.fillRect(e.x - 8, e.y - 12 + bob, 4, 6);
      ctx.fillRect(e.x + 4, e.y - 12 + bob, 4, 6);
      // Eyes
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(e.x - 4, e.y - 4 + bob, 3, 3);
      ctx.fillRect(e.x + 2, e.y - 4 + bob, 3, 3);
      break;
    case 'dragon':
      // Dragon head (fixed)
      ctx.fillStyle = '#22aa22';
      ctx.fillRect(e.x - 12, e.y - 10, 24, 20);
      ctx.fillStyle = '#44cc44';
      ctx.fillRect(e.x - 10, e.y - 8, 20, 16);
      // Snout
      ctx.fillStyle = '#22aa22';
      ctx.fillRect(e.x + e.fireDir * 10, e.y - 4, 8 * Math.abs(e.fireDir), 10);
      // Eye
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(e.x + e.fireDir * 2, e.y - 6, 4, 4);
      // Mouth fire hint
      if (e.fireTimer < 20) {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(e.x + e.fireDir * 18, e.y + 2, 4 + Math.sin(frame * 0.3) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'mirror':
      // Mirror knight - silvery
      ctx.fillStyle = '#8888aa';
      ctx.fillRect(e.x - 8, e.y - 10 + bob, 16, 20);
      ctx.fillStyle = '#aaaacc';
      ctx.fillRect(e.x - 6, e.y - 8 + bob, 12, 16);
      // Shield (mirror)
      ctx.fillStyle = '#ccccff';
      ctx.fillRect(e.x - 10, e.y - 4 + bob, 4, 12);
      // Helmet
      ctx.fillStyle = '#666688';
      ctx.fillRect(e.x - 7, e.y - 12 + bob, 14, 5);
      // Eyes (glowing)
      const glow = Math.sin(frame * 0.08) * 0.3 + 0.7;
      ctx.fillStyle = 'rgba(200,200,255,' + glow + ')';
      ctx.fillRect(e.x - 3, e.y - 6 + bob, 3, 3);
      ctx.fillRect(e.x + 1, e.y - 6 + bob, 3, 3);
      break;
  }
}

function drawPlayer() {
  const bob = pgrounded ? 0 : -2;
  const blink = invincTimer > 0 && Math.floor(frame / 4) % 2 === 0;
  if (blink) return;

  const x = px, y = py + bob;
  const facing = pdir;

  // Body (robe)
  ctx.fillStyle = '#6633aa';
  ctx.fillRect(x + 3, y + 10, PW - 6, PH - 12);

  // Robe detail
  ctx.fillStyle = '#7744bb';
  ctx.fillRect(x + 5, y + 12, PW - 10, PH - 14);

  // Head
  ctx.fillStyle = '#dda866';
  ctx.fillRect(x + 5, y + 4, 10, 10);

  // Hat (pointy wizard hat)
  ctx.fillStyle = '#4422aa';
  ctx.beginPath();
  ctx.moveTo(x + PW/2, y - 8);
  ctx.lineTo(x + 2, y + 6);
  ctx.lineTo(x + PW - 2, y + 6);
  ctx.closePath();
  ctx.fill();

  // Hat brim
  ctx.fillStyle = '#5533bb';
  ctx.fillRect(x + 1, y + 4, PW - 2, 4);

  // Hat star
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(x + PW/2 - 2, y - 2, 4, 4);

  // Eyes
  ctx.fillStyle = '#000';
  if (facing > 0) {
    ctx.fillRect(x + 10, y + 7, 2, 3);
  } else {
    ctx.fillRect(x + 8, y + 7, 2, 3);
  }

  // Staff
  ctx.fillStyle = '#8B4513';
  const staffX = facing > 0 ? x + PW - 3 : x;
  ctx.fillRect(staffX, y + 2, 3, PH - 4);
  // Staff orb
  ctx.fillStyle = '#aa44ff';
  ctx.beginPath();
  ctx.arc(staffX + 1, y + 2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#cc88ff';
  ctx.beginPath();
  ctx.arc(staffX + 1, y + 1, 2, 0, Math.PI * 2);
  ctx.fill();

  // Feet
  ctx.fillStyle = '#3a1f5e';
  ctx.fillRect(x + 4, y + PH - 4, 5, 4);
  ctx.fillRect(x + PW - 9, y + PH - 4, 5, 4);
}

function drawDarkOverlay() {
  // Radial gradient darkness
  const cx = px + PW/2, cy = py + PH/2;
  const grad = ctx.createRadialGradient(cx, cy, 40, cx, cy, 100);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0.7)');
  grad.addColorStop(1, 'rgba(0,0,0,0.95)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);
}

function drawHUD() {
  const barH = 28;
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 13px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Room
  const worldIdx = Math.floor(room / 5) + 1;
  const roomInWorld = (room % 5) + 1;
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('W' + worldIdx + '-' + roomInWorld, GW/2 - 40, 18);

  // Timer
  ctx.fillStyle = timer < 15 ? '#ff4444' : '#44dd88';
  ctx.fillText(Math.ceil(timer) + 's', GW/2 + 20, 18);

  // Key indicator
  if (hasKey) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('KEY', GW/2 + 60, 18);
  }

  // Fireballs
  ctx.fillStyle = '#ff8844';
  ctx.textAlign = 'right';
  ctx.fillText('FB:' + fireballs, GW - 60, 18);

  // Lives
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#aa44ff';
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 18, 14, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 18, 13, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTitleScreen() {
  // Background decoration
  const pal = WORLD_PALETTES[0];
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Decorative blocks
  for (let i = 0; i < 12; i++) {
    const bx = i * TS, by = GH - TS;
    drawStone(bx, by, pal);
  }
  for (let i = 0; i < 12; i++) {
    const bx = i * TS, by = 0;
    drawStone(bx, by, pal);
  }
  // Side columns
  for (let i = 1; i < 9; i++) {
    drawStone(0, i * TS, pal);
    drawStone(GW - TS, i * TS, pal);
  }
  // Floating blocks
  for (let i = 0; i < 4; i++) {
    const bx = 64 + i * 80 + Math.sin(frame * 0.02 + i) * 5;
    const by = 220 + Math.cos(frame * 0.03 + i) * 3;
    drawBlock(bx, by, pal);
  }

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText("SOLOMON'S KEY", GW/2 + 2, 80 + 2);
  ctx.fillStyle = '#c8a2ff';
  ctx.fillText("SOLOMON'S KEY", GW/2, 80);

  // Subtitle
  ctx.fillStyle = '#8866aa';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW/2, 100);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Arrows/WASD: Move    Space/Z: Jump', GW/2, 140);
  ctx.fillText('X/Shift: Create/Destroy Block', GW/2, 156);
  ctx.fillText('Up + Block: Shoot Fireball', GW/2, 172);
  ctx.fillText('Collect KEY then reach DOOR', GW/2, 192);

  // Progress
  if (savedProgress > 0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = '11px monospace';
    ctx.fillText('Continue from Room ' + (savedProgress + 1), GW/2, 250);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, 280);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a0a2e';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW/2, 80);

  ctx.fillStyle = '#c8a2ff';
  ctx.font = '14px monospace';
  ctx.fillText("Solomon's Tower is conquered!", GW/2, 120);

  ctx.fillStyle = '#44dd88';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Final Score: ' + score, GW/2, 170);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 200);
    ctx.globalAlpha = 1;
  }

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, 260);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
