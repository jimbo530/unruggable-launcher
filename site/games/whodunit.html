// ============================================================
// PARTICLE SYSTEM
// ============================================================
var particles = [];
var MAX_PARTICLES = 200;

function spawnParticle(x, y, color, type, count) {
  for (var i = 0; i < (count || 1); i++) {
    if (particles.length >= MAX_PARTICLES) particles.shift();
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.5 + Math.random() * 2;
    particles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed * (type === "burst" ? 2.5 : 1),
      vy: Math.sin(angle) * speed * (type === "burst" ? 2.5 : 1) - (type === "rise" ? 1.5 : 0),
      life: 1.0,
      decay: 0.008 + Math.random() * 0.015,
      color: color,
      size: type === "spore" ? 2 + Math.random() * 4 : 1 + Math.random() * 3,
      type: type || "default",
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.02 + Math.random() * 0.04
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.wobble += p.wobbleSpeed;
    if (p.type === "spore") {
      p.x += Math.sin(p.wobble) * 0.5;
      p.vy *= 0.98;
    }
    if (p.type === "rise") {
      p.vy -= 0.02;
    }
    p.vx *= 0.99;
    p.vy *= 0.99;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(c) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    c.globalAlpha = p.life * 0.8;
    c.fillStyle = p.color;
    if (p.type === "spore") {
      c.beginPath();
      c.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      c.fill();
    } else {
      c.fillRect(p.x - p.size/2, p.y - p.size/2, p.size * p.life, p.size * p.life);
    }
  }
  c.globalAlpha = 1;
}

var shakeAmount = 0;
var shakeDecay = 0.9;

function triggerShake(amount) {
  shakeAmount = Math.max(shakeAmount, amount);
}

function getShakeOffset() {
  if (shakeAmount < 0.5) { shakeAmount = 0; return {x:0,y:0}; }
  var ox = (Math.random() - 0.5) * shakeAmount * 2;
  var oy = (Math.random() - 0.5) * shakeAmount * 2;
  shakeAmount *= shakeDecay;
  return {x:ox, y:oy};
}

      if (charData[row][col]) {
        c.fillRect(x + col * size, y + row * size, size, size);
      }
    }
  }
}

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.warn("Web Audio unavailable:", e); }
  }
}

function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) { console.warn("Audio error:", e); }
}

function newGame(numAI, playerSuspectIdx) {
  var totalPlayers = 1 + numAI;

  // Build and separate solution
  var solSuspect = Math.floor(Math.random() * 6);
  var solWeapon = Math.floor(Math.random() * 6);
  var solRoom = Math.floor(Math.random() * 9);

  // Build remaining deck
  var deck = [];
  for (var i = 0; i < 6; i++) if (i !== solSuspect) deck.push({ type: "suspect", index: i });
  for (var i = 0; i < 6; i++) if (i !== solWeapon) deck.push({ type: "weapon", index: i });
  for (var i = 0; i < 9; i++) if (i !== solRoom) deck.push({ type: "room", index: i });

  // Shuffle
  for (var i = deck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = deck[i]; deck[i] = deck[j]; deck[j] = tmp;
  }

  // Assign suspect tokens to players
  var usedSuspects = {};
  usedSuspects[playerSuspectIdx] = true;
  var playerSuspects = [playerSuspectIdx];
  for (var i = 0; i < numAI; i++) {
    var s;
    do { s = Math.floor(Math.random() * 6); } while (usedSuspects[s]);
    usedSuspects[s] = true;
    playerSuspects.push(s);
  }

  // Deal cards
  var hands = [];
  for (var i = 0; i < totalPlayers; i++) hands.push([]);
  for (var i = 0; i < deck.length; i++) hands[i % totalPlayers].push(deck[i]);

  // Starting positions -- hallways around the board edges
  var startPositions = [
    {hx:1,hy:0},{hx:3,hy:0},{hx:0,hy:1},
    {hx:4,hy:1},{hx:1,hy:4},{hx:3,hy:4}
  ];

  var players = [];
  for (var i = 0; i < totalPlayers; i++) {
    var sp = startPositions[playerSuspects[i] % startPositions.length];
    players.push({
      suspectIdx: playerSuspects[i],
      hand: hands[i],
      isHuman: i === 0,
      alive: true,
      inRoom: -1,
      hallX: sp.hx,
      hallY: sp.hy,
      known: {
        hasSuspect: [false,false,false,false,false,false],
        hasWeapon: [false,false,false,false,false,false],
        hasRoom: [false,false,false,false,false,false,false,false,false],
        shownBy: {}
      }
    });
    // AI marks own cards as known
    if (i > 0) {
      hands[i].forEach(function(c) {
        if (c.type === "suspect") players[i].known.hasSuspect[c.index] = true;
        if (c.type === "weapon") players[i].known.hasWeapon[c.index] = true;
        if (c.type === "room") players[i].known.hasRoom[c.index] = true;
      });
    }
  }

  // Player notepad: 0=blank, 1=have/confirmed, 2=eliminated, 3=maybe
  var notepad = {};
  for (var i = 0; i < 6; i++) {
    notepad["s"+i] = {};
    for (var p = 0; p < totalPlayers; p++) notepad["s"+i][p] = 0;
    notepad["s"+i].sol = 0;
  }
  for (var i = 0; i < 6; i++) {
    notepad["w"+i] = {};
    for (var p = 0; p < totalPlayers; p++) notepad["w"+i][p] = 0;
    notepad["w"+i].sol = 0;
  }
  for (var i = 0; i < 9; i++) {
    notepad["r"+i] = {};
    for (var p = 0; p < totalPlayers; p++) notepad["r"+i][p] = 0;
    notepad["r"+i].sol = 0;
  }

  // Auto-mark own cards
  hands[0].forEach(function(c) {
    var key = (c.type === "suspect" ? "s" : c.type === "weapon" ? "w" : "r") + c.index;
    notepad[key][0] = 1;
    for (var p = 1; p < totalPlayers; p++) notepad[key][p] = 2;
    notepad[key].sol = 2;
  });

  G = {
    solution: { suspect: solSuspect, weapon: solWeapon, room: solRoom },
    players: players,
    totalPlayers: totalPlayers,
    currentPlayer: 0,
    phase: "roll", // roll, move, suggest, endturn, gameover
    diceResult: [0,0],
    diceTotal: 0,
    notepad: notepad,
    turnCount: 1,
    gameOver: false,
    winner: -1,
    suggestedThisTurn: false,
    animatingDice: false,
    diceAnim: null
  };

  score = 0;
  hintsGiven = 0;
  survivedAccusation = false;
  logEntries = [];
  addLog("The Spore Mansion garden has been poisoned!");
  addLog(statB.name + " enters the investigation. " + totalPlayers + " baseling detectives.");
  addLog("You hold " + hands[0].length + " mycelium evidence cards.");

  // INT clue discovery — auto-eliminate one random notepad entry at game start (ref#7)
  if (Math.random() < getClueChance()) {
    var clueResult = autoDiscoverClue();
    if (clueResult) {
      sfxClue();
      addLog("INT insight: " + clueResult, "good");
    }
  }

  addLog("--- Your turn ---", "hl");

  reachableSpots = [];
  showNotepad = false;
  showingDialog = null;
  showingResult = null;
  messageQueue = [];
  currentMessage = null;

  // Welcome message with stat summary
  var statSummary = "STR:" + statB.str + " DEX:" + statB.dex + " CON:" + statB.con + " INT:" + statB.int + " WIS:" + statB.wis + " CHA:" + statB.cha;
  showMessage(statB.name + " the Baseling Detective | " + statSummary, 4000);

  saveGame();
}

// INT auto-discover clue (ref#7 usage)
function autoDiscoverClue() {
  if (!G) return null;
  // Pick a random non-solution card and mark it eliminated in notepad
  var candidates = [];
  for (var i = 0; i < 6; i++) {
    if (i !== G.solution.suspect && G.notepad["s"+i].sol !== 2) candidates.push("s"+i);
  }
  for (var i = 0; i < 6; i++) {
    if (i !== G.solution.weapon && G.notepad["w"+i].sol !== 2) candidates.push("w"+i);
  }
  for (var i = 0; i < 9; i++) {
    if (i !== G.solution.room && G.notepad["r"+i].sol !== 2) candidates.push("r"+i);
  }
  if (candidates.length === 0) return null;
  var pick = candidates[Math.floor(Math.random() * candidates.length)];
  G.notepad[pick].sol = 2;
  var type = pick[0];
  var idx = parseInt(pick.substring(1));
  if (type === "s") return SUSPECTS[idx].short + " is NOT the culprit";
  if (type === "w") return WEAPONS[idx] + " was NOT the weapon";
  return ROOMS[idx] + " was NOT the location";
}

// ============================================================
// BOARD GEOMETRY - 5x5 grid, rooms at even coords, hallways at odd
// ============================================================
function computeLayout() {
  MARGIN = W * 0.03;
  boardSz = W - MARGIN * 2;
  boardOX = MARGIN;
  boardOY = MARGIN;
  cellW = boardSz / 5;
  cellH = boardSz / 5;
}

function roomPixelRect(roomIdx) {
  var g = ROOM_GRID[roomIdx];
  var x = boardOX + g.c * 2 * cellW;
  var y = boardOY + g.r * 2 * cellH;
  return { x: x + 2, y: y + 2, w: cellW - 4, h: cellH - 4 };
}

function hallPixelCenter(hx, hy) {
  return {
    x: boardOX + hx * cellW + cellW / 2,
    y: boardOY + hy * cellH + cellH / 2
  };
}

function isHallwayCell(hx, hy) {
  if (hx < 0 || hx > 4 || hy < 0 || hy > 4) return false;
  if (hx % 2 === 0 && hy % 2 === 0) return false;
  return true;
}

function roomDoors(roomIdx) {
  var g = ROOM_GRID[roomIdx];
  var cx = g.c * 2, cy = g.r * 2;
  var doors = [];
  if (cy > 0) doors.push({hx:cx, hy:cy-1});
  if (cy < 4) doors.push({hx:cx, hy:cy+1});
  if (cx > 0) doors.push({hx:cx-1, hy:cy});
  if (cx < 4) doors.push({hx:cx+1, hy:cy});
  return doors;
}

function hallAdjacentRooms(hx, hy) {
  var rooms = [];
  for (var i = 0; i < 9; i++) {
    var doors = roomDoors(i);
    for (var d = 0; d < doors.length; d++) {
      if (doors[d].hx === hx && doors[d].hy === hy) { rooms.push(i); break; }
    }
  }
  return rooms;
}

function hallNeighbors(hx, hy) {
  var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
  var result = [];
  for (var i = 0; i < dirs.length; i++) {
    var nx = hx + dirs[i][0], ny = hy + dirs[i][1];
    if (nx < 0 || nx > 4 || ny < 0 || ny > 4) continue;
    if (isHallwayCell(nx, ny)) {
      result.push({hx:nx, hy:ny, room:-1});
    } else {
      for (var r = 0; r < 9; r++) {
        var g = ROOM_GRID[r];
        if (g.c*2 === nx && g.r*2 === ny) { result.push({hx:nx, hy:ny, room:r}); break; }
      }
    }
  }
  return result;
}

// BFS from player position with given number of steps
function getReachable(player, steps) {
  if (steps <= 0) return [];
  var results = [];
  var visited = {};

  var starts = [];
  if (player.inRoom >= 0) {
    var doors = roomDoors(player.inRoom);
    for (var i = 0; i < doors.length; i++) {
      starts.push({hx: doors[i].hx, hy: doors[i].hy, dist: 1});
    }
    // Secret passage (mycelium tunnel)
    if (SECRET_PASSAGES[player.inRoom] !== undefined) {
      results.push({hx:-1, hy:-1, room: SECRET_PASSAGES[player.inRoom], dist:1, secret:true});
    }
  } else {
    starts.push({hx: player.hallX, hy: player.hallY, dist: 0});
  }

  var queue = [];
  for (var i = 0; i < starts.length; i++) {
    var s = starts[i];
    var key = s.hx + "," + s.hy;
    if (visited[key]) continue;
    visited[key] = true;
    queue.push(s);
    if (s.dist > 0 && s.dist <= steps) {
      results.push({hx:s.hx, hy:s.hy, room:-1, dist:s.dist});
      var adjR = hallAdjacentRooms(s.hx, s.hy);
      for (var j = 0; j < adjR.length; j++) {
        if (adjR[j] !== player.inRoom) {
          results.push({hx:s.hx, hy:s.hy, room:adjR[j], dist:s.dist});
        }
      }
    }
  }

  while (queue.length > 0) {
    var cur = queue.shift();
    if (cur.dist >= steps) continue;
    var neighbors = hallNeighbors(cur.hx, cur.hy);
    for (var n = 0; n < neighbors.length; n++) {
      var nb = neighbors[n];
      if (nb.room >= 0) {
        if (nb.room !== player.inRoom) {
          results.push({hx:cur.hx, hy:cur.hy, room:nb.room, dist:cur.dist+1});
        }
      } else {
        var nkey = nb.hx + "," + nb.hy;
        if (!visited[nkey]) {
          visited[nkey] = true;
          var nd = cur.dist + 1;
          if (nd <= steps) {
            results.push({hx:nb.hx, hy:nb.hy, room:-1, dist:nd});
            var adjR2 = hallAdjacentRooms(nb.hx, nb.hy);
            for (var j = 0; j < adjR2.length; j++) {
              if (adjR2[j] !== player.inRoom) {
                results.push({hx:nb.hx, hy:nb.hy, room:adjR2[j], dist:nd});
              }
            }
          }
          queue.push({hx:nb.hx, hy:nb.hy, dist:nd});
        }
      }
    }
  }

  // Deduplicate
  var seenRooms = {}, seenHalls = {};
  var deduped = [];
  for (var i = 0; i < results.length; i++) {
    var r = results[i];
    if (r.room >= 0) {
      if (!seenRooms[r.room]) { seenRooms[r.room] = true; deduped.push(r); }
    } else {
      var hk = r.hx+","+r.hy;
      if (!seenHalls[hk]) { seenHalls[hk] = true; deduped.push(r); }
    }
  }
  return deduped;
}

// ============================================================
// RENDERING — BOARD
// ============================================================
function drawBoard() {
  computeLayout();
  var c = ctx;

  // Background — dark fungal cavern
  c.fillStyle = "#1a1c2c";
  c.fillRect(0, 0, W, H);

  // Ambient mycelium network lines (subtle background)
  c.strokeStyle = "#0e0e1e";
  c.lineWidth = 1;
  var t = Date.now() * 0.0003;
  for (var i = 0; i < 12; i++) {
    var sx = W * (0.1 + 0.8 * ((i * 97) % 100) / 100);
    var sy = H * (0.1 + 0.8 * ((i * 53) % 100) / 100);
    var ex = sx + Math.sin(t + i) * 60;
    var ey = sy + Math.cos(t + i * 1.3) * 60;
    c.beginPath();
    c.moveTo(sx, sy);
    c.quadraticCurveTo(sx + 30 * Math.sin(t * 2 + i), sy + 30 * Math.cos(t * 2 + i), ex, ey);
    c.stroke();
  }

  // Subtle grid glow
  c.strokeStyle = "#121222";
  c.lineWidth = 1;
  for (var x = 0; x <= 5; x++) {
    c.beginPath();
    c.moveTo(boardOX + x*cellW, boardOY);
    c.lineTo(boardOX + x*cellW, boardOY + boardSz);
    c.stroke();
  }
  for (var y = 0; y <= 5; y++) {
    c.beginPath();
    c.moveTo(boardOX, boardOY + y*cellH);
    c.lineTo(boardOX + boardSz, boardOY + y*cellH);
    c.stroke();
  }

  // Hallway paths (mycelium tunnels)
  c.strokeStyle = "#181828";
  c.lineWidth = Math.max(3, cellW * 0.25);
  c.lineCap = "round";
  for (var hy = 0; hy <= 4; hy++) {
    for (var hx = 0; hx <= 4; hx++) {
      if (!isHallwayCell(hx, hy)) continue;
      var p = hallPixelCenter(hx, hy);
      var nbs = hallNeighbors(hx, hy);
      for (var n = 0; n < nbs.length; n++) {
        if (nbs[n].room < 0 && (nbs[n].hx > hx || nbs[n].hy > hy)) {
          var p2 = hallPixelCenter(nbs[n].hx, nbs[n].hy);
          c.beginPath();
          c.moveTo(p.x, p.y);
          c.lineTo(p2.x, p2.y);
          c.stroke();
        }
      }
      // Ambient spore dots on hallways
      if (Math.sin(Date.now() * 0.001 + hx * 3 + hy * 7) > 0.7) {
        c.fillStyle = "#38d97315";
        c.beginPath();
        c.arc(p.x, p.y, 3, 0, Math.PI * 2);
        c.fill();
      }
    }
  }

  // Rooms
  for (var i = 0; i < 9; i++) {
    var rr = roomPixelRect(i);
    var isReachable = false;
    for (var j = 0; j < reachableSpots.length; j++) {
      if (reachableSpots[j].room === i) { isReachable = true; break; }
    }
    var isHover = hoverRoom === i && isReachable;

    // WIS aura detection — glow if this is the solution room (ref#12)
    var isSolutionRoom = G && canSenseAura() && i === G.solution.room;
    var auraGlow = isSolutionRoom ? Math.sin(Date.now() * 0.003) * 0.3 + 0.5 : 0;

    // Glow effect for reachable rooms
    if (isReachable || isSolutionRoom) {
      c.save();
      c.shadowColor = isSolutionRoom ? "#f4b41b" : ROOM_GLOW[i];
      c.shadowBlur = isHover ? 25 : (isSolutionRoom ? 8 + auraGlow * 12 : 12);
      c.fillStyle = lighten(ROOM_COLORS[i], isHover ? 40 : (isSolutionRoom ? 10 + Math.floor(auraGlow * 15) : 18));
      roundRect(c, rr.x, rr.y, rr.w, rr.h, 6);
      c.fill();
      c.restore();
      c.strokeStyle = isSolutionRoom && !isReachable ? "#f4b41b66" : ROOM_GLOW[i];
      c.lineWidth = isHover ? 3 : 1.5;
    } else {
      c.fillStyle = ROOM_COLORS[i];
      c.strokeStyle = "#2a2a3a";
      c.lineWidth = 1;
    }
    roundRect(c, rr.x, rr.y, rr.w, rr.h, 6);
    if (!isReachable || isSolutionRoom) c.fill();
    c.stroke();

    // Room pixel art decoration
    var spriteSize = Math.max(1, Math.floor(rr.w / 56));
    var sprite = ROOM_SPRITES[i];
    var spriteX = rr.x + rr.w - sprite[0].length * spriteSize - 4;
    var spriteY = rr.y + 4;
    drawPixelChar(c, spriteX, spriteY, spriteSize, ROOM_GLOW[i] + "44", sprite);

    // Room name
    var fs = Math.max(8, Math.min(13, rr.w * 0.1));
    c.font = fs + "px monospace";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillStyle = isReachable ? "#ddd" : "#777";
    var lines = wordWrap(ROOMS[i], rr.w - 10, c);
    var lh = fs * 1.3;
    var startY = rr.y + rr.h * 0.35 - (lines.length - 1) * lh / 2;
    for (var li = 0; li < lines.length; li++) {
      c.fillText(lines[li], rr.x + rr.w / 2, startY + li * lh);
    }

    // Secret passage indicator (mycelium tunnel)
    if (SECRET_PASSAGES[i] !== undefined) {
      c.fillStyle = "#38d97377";
      c.font = Math.max(7, fs * 0.7) + "px monospace";
      c.fillText("[passage]", rr.x + rr.w / 2, rr.y + rr.h - fs);
    }

    // Door indicators (spore-lit)
    var doors = roomDoors(i);
    for (var d = 0; d < doors.length; d++) {
      var dp = hallPixelCenter(doors[d].hx, doors[d].hy);
      var rcx = rr.x + rr.w/2, rcy = rr.y + rr.h/2;
      var dx = dp.x - rcx, dy = dp.y - rcy;
      var len = Math.sqrt(dx*dx + dy*dy) || 1;
      var doorX = rcx + dx/len * (rr.w/2);
      var doorY = rcy + dy/len * (rr.h/2);
      c.fillStyle = isReachable ? ROOM_GLOW[i] : "#3a3a4a";
      c.fillRect(doorX - 3, doorY - 3, 6, 6);
    }
  }

  // Reachable hallway spots (spore markers)
  for (var i = 0; i < reachableSpots.length; i++) {
    var rs = reachableSpots[i];
    if (rs.room < 0) {
      var hp = hallPixelCenter(rs.hx, rs.hy);
      c.fillStyle = "#38d97344";
      c.beginPath();
      c.arc(hp.x, hp.y, cellW * 0.12, 0, Math.PI * 2);
      c.fill();
      c.strokeStyle = "#38d97366";
      c.lineWidth = 1;
      c.stroke();
    }
  }

  // Draw players
  var roomOccupants = {};
  for (var i = 0; i < G.players.length; i++) {
    if (!G.players[i].alive) continue;
    if (G.players[i].inRoom >= 0) {
      if (!roomOccupants[G.players[i].inRoom]) roomOccupants[G.players[i].inRoom] = [];
      roomOccupants[G.players[i].inRoom].push(i);
    }
  }

  for (var i = 0; i < G.players.length; i++) {
    var pl = G.players[i];
    if (!pl.alive) continue;
    var sus = SUSPECTS[pl.suspectIdx];
    var px, py;
    var radius = Math.max(8, cellW * 0.12);

    if (pl.inRoom >= 0) {
      var rr2 = roomPixelRect(pl.inRoom);
      var occ = roomOccupants[pl.inRoom] || [i];
      var idx = occ.indexOf(i);
      var cols = Math.min(occ.length, 3);
      var row = Math.floor(idx / 3);
      var col = idx % 3;
      var spacing = rr2.w / (cols + 1);
      px = rr2.x + spacing * (col + 1);
      py = rr2.y + rr2.h * 0.6 + row * (radius * 2.8);
    } else {
      var hp2 = hallPixelCenter(pl.hallX, pl.hallY);
      px = hp2.x;
      py = hp2.y;
    }

    // Shadow
    c.fillStyle = "rgba(0,0,0,0.5)";
    c.beginPath();
    c.arc(px + 2, py + 2, radius, 0, Math.PI * 2);
    c.fill();

    // === BASELING SPRITE ===
    if (!pl.isHuman || !TAS.drawBaseling(c, px, py, radius * 2, { flipX: false, frame: Date.now() * 0.06 })) {
    // Token — NES pixel-style circle
    var grad = c.createRadialGradient(px - radius*0.3, py - radius*0.3, 0, px, py, radius);
    grad.addColorStop(0, lighten(sus.color, 40));
    grad.addColorStop(1, sus.color);
    c.fillStyle = grad;
    c.beginPath();
    c.arc(px, py, radius, 0, Math.PI * 2);
    c.fill();

    // Pixel border for NES feel
    c.strokeStyle = darken(sus.color, 40);
    c.lineWidth = 2;
    c.beginPath();
    c.arc(px, py, radius, 0, Math.PI * 2);
    c.stroke();
    }

    // Current player ring with pulse
    if (i === G.currentPlayer) {
      c.strokeStyle = "#ffffff";
      c.lineWidth = 2.5;
      c.beginPath();
      c.arc(px, py, radius + 3, 0, Math.PI * 2);
      c.stroke();

      // Pulse glow
      c.save();
      c.shadowColor = sus.color;
      c.shadowBlur = 8 + Math.sin(Date.now()/300)*4;
      c.strokeStyle = sus.color;
      c.lineWidth = 1;
      c.beginPath();
      c.arc(px, py, radius + 5, 0, Math.PI * 2);
      c.stroke();
      c.restore();

      // Spore trail particles for current player
      if (i === 0 && Math.random() < 0.15) {
        spawnParticle(px, py + radius, sus.color, "spore", 1);
      }
    }

    // Letter
    c.fillStyle = "#1a1c2c";
    c.font = "bold " + (radius * 1.2) + "px monospace";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(pl.isHuman ? statB.icon : sus.icon, px, py + 1);
  }
}

function drawHUD() {
  var c = ctx;
  var hudH = W * 0.065;
  var hudY = W - hudH - 2;
  var fs = Math.max(9, hudH * 0.4);

  // Semi-transparent bar at bottom — darker for NES feel
  c.fillStyle = "rgba(8,8,16,0.94)";
  c.fillRect(0, hudY, W, hudH + 2);
  c.strokeStyle = "#1a1a2a";
  c.lineWidth = 1;
  c.beginPath();
  c.moveTo(0, hudY);
  c.lineTo(W, hudY);
  c.stroke();

  // Turn info left
  var pl = G.players[G.currentPlayer];
  var sus = SUSPECTS[pl.suspectIdx];
  c.font = "bold " + fs + "px monospace";
  c.textAlign = "left";
  c.textBaseline = "middle";
  c.fillStyle = pl.isHuman ? statB.color : sus.color;
  var turnText = pl.isHuman ? statB.name.toUpperCase() + "'S TURN" : sus.short + "'s turn";
  if (G.gameOver) turnText = "CASE CLOSED";
  c.fillText(turnText, 8, hudY + hudH/2);

  // Phase info
  c.font = (fs * 0.75) + "px monospace";
  c.fillStyle = "#555";
  var phaseText = "";
  if (!G.gameOver) {
    if (G.phase === "roll") phaseText = "[Roll dice]";
    else if (G.phase === "move") phaseText = "[Move: " + G.diceTotal + " steps]";
    else if (G.phase === "suggest") phaseText = "[Investigate/Accuse/End]";
    else if (G.phase === "endturn") phaseText = "[End turn]";
  }
  c.textAlign = "center";
  c.fillText(phaseText, W/2, hudY + hudH/2);

  // Score and turn counter right
  c.textAlign = "right";
  c.fillStyle = "#f4b41b";
  c.font = (fs * 0.7) + "px monospace";
  c.fillText("Score: " + Math.floor(score), W - 8, hudY + hudH/2 - fs * 0.4);
  c.fillStyle = "#555";
  c.fillText("Turn " + G.turnCount, W - 8, hudY + hudH/2 + fs * 0.4);

  // Dice display (top-left corner)
  var diceY = 6;
  var diceSize = Math.max(20, W * 0.04);
  drawDie(8, diceY, diceSize, G.diceResult[0]);
  drawDie(8 + diceSize + 6, diceY, diceSize, G.diceResult[1]);
  if (G.diceResult[0] > 0) {
    c.font = (diceSize*0.5) + "px monospace";
    c.textAlign = "left";
    c.fillStyle = "#38d973";
    var bonusText = getMovementBonus() > 0 ? "=" + G.diceTotal + "(+" + getMovementBonus() + " DEX)" : "=" + G.diceTotal;
    c.fillText(bonusText, 8 + diceSize*2 + 14, diceY + diceSize/2 + 1);
  }

  // Stat bar (compact, below dice)
  var statY = diceY + diceSize + 4;
  var statFs = Math.max(7, W * 0.014);
  c.font = statFs + "px monospace";
  c.textAlign = "left";
  var stats = [
    {l:"STR",v:statB.str,c:"#e6482e"},{l:"DEX",v:statB.dex,c:"#38d973"},
    {l:"CON",v:statB.con,c:"#f4b41b"},{l:"INT",v:statB.int,c:"#3cacd7"},
    {l:"WIS",v:statB.wis,c:"#a855f7"},{l:"CHA",v:statB.cha,c:"#e6482e"}
  ];
  for (var si = 0; si < stats.length; si++) {
    var sx = 8 + si * (statFs * 4.2);
    c.fillStyle = stats[si].c + "88";
    c.fillText(stats[si].l, sx, statY + statFs * 0.7);
    c.fillStyle = stats[si].c;
    c.fillText(stats[si].v, sx + statFs * 2.2, statY + statFs * 0.7);
  }

  // Action buttons (top-right)
  drawActionButtons();

  // Cards display (below stats on left)
  drawPlayerCards();
}

function drawDie(x, y, sz, val) {
  var c = ctx;
  // NES-style pixelated die
  c.fillStyle = "#141420";
  roundRect(c, x, y, sz, sz, 3);
  c.fill();
  c.strokeStyle = val > 0 ? "#38d973" : "#2a2a3a";
  c.lineWidth = 2;
  roundRect(c, x, y, sz, sz, 3);
  c.stroke();
  // Inner highlight for NES feel
  c.strokeStyle = val > 0 ? "#38d97333" : "#1a1a2a";
  c.lineWidth = 1;
  roundRect(c, x+2, y+2, sz-4, sz-4, 2);
  c.stroke();
  c.fillStyle = val > 0 ? "#38d973" : "#444";
  c.font = "bold " + (sz*0.55) + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillText(val > 0 ? val : "?", x + sz/2, y + sz/2);
}

var btnRects = {};

function drawActionButtons() {
  var c = ctx;
  var btnH = Math.max(18, W * 0.032);
  var btnW = Math.max(50, W * 0.1);
  var gap = 4;
  var startX = W - 8;
  var y = 6;
  var isHuman = G.currentPlayer === 0 && !G.gameOver;

  var buttons = [];
  buttons.push({ id: "notepad", label: "Notepad", enabled: true, color: "#a855f7" });

  if (!G.gameOver) {
    buttons.push({ id: "roll", label: "Roll", enabled: isHuman && G.phase === "roll", color: "#38d973" });
    buttons.push({ id: "suggest", label: "Suggest", enabled: isHuman && G.phase === "suggest" && G.players[0].inRoom >= 0 && !G.suggestedThisTurn, color: "#3cacd7" });
    buttons.push({ id: "accuse", label: "Accuse!", enabled: isHuman && (G.phase === "suggest" || G.phase === "roll" || G.phase === "endturn"), color: "#e6482e" });
    buttons.push({ id: "endturn", label: "End Turn", enabled: isHuman && (G.phase === "endturn" || G.phase === "suggest"), color: "#f4b41b" });
  } else {
    buttons.push({ id: "newgame", label: "New Game", enabled: true, color: "#38d973" });
  }

  // Draw right to left
  var bx = startX;
  for (var i = buttons.length - 1; i >= 0; i--) {
    var b = buttons[i];
    bx -= btnW;
    c.fillStyle = b.enabled ? "#121220" : "#0a0a14";
    roundRect(c, bx, y, btnW, btnH, 4);
    c.fill();
    c.strokeStyle = b.enabled ? b.color : "#1a1a2a";
    c.lineWidth = b.enabled ? 2 : 1;
    roundRect(c, bx, y, btnW, btnH, 4);
    c.stroke();
    c.fillStyle = b.enabled ? b.color : "#333";
    c.font = (btnH * 0.5) + "px monospace";
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(b.label, bx + btnW/2, y + btnH/2);

    btnRects[b.id] = { x: bx, y: y, w: btnW, h: btnH, enabled: b.enabled };
    bx -= gap;
  }
}

function drawPlayerCards() {
  if (!G) return;
  var c = ctx;
  var hand = G.players[0].hand;
  var cardH = Math.max(14, W * 0.022);
  var cardW = Math.max(50, W * 0.1);
  var startY = Math.max(46, W * 0.072);
  var x = 8;

  c.font = (cardH * 0.6) + "px monospace";
  c.textAlign = "left";
  c.textBaseline = "middle";
  c.fillStyle = "#555";
  c.fillText("EVIDENCE:", x, startY);

  for (var i = 0; i < hand.length; i++) {
    var card = hand[i];
    var cy = startY + (i + 1) * (cardH + 2);
    var bgColor, borderColor, label;
    if (card.type === "suspect") {
      bgColor = "#1a1025"; borderColor = "#a855f7"; label = SUSPECTS[card.index].short;
    } else if (card.type === "weapon") {
      bgColor = "#0f1a15"; borderColor = "#38d973"; label = WEAPONS[card.index];
    } else {
      bgColor = "#0f1520"; borderColor = "#3cacd7"; label = ROOMS[card.index];
    }

    var maxChars = Math.floor(cardW / (cardH * 0.3));
    if (label.length > maxChars) label = label.substring(0, maxChars - 1) + "..";

    c.fillStyle = bgColor;
    roundRect(c, x, cy, cardW, cardH, 3);
    c.fill();
    c.strokeStyle = borderColor;
    c.lineWidth = 1;
    roundRect(c, x, cy, cardW, cardH, 3);
    c.stroke();
    c.fillStyle = borderColor;
    c.font = (cardH * 0.55) + "px monospace";
    c.fillText(label, x + 4, cy + cardH/2);
  }
}

function drawLog() {
  if (!G) return;
  var c = ctx;
  var logH = Math.max(14, W * 0.018);
  var logW = W * 0.42;
  var logX = W - logW - 6;
  var logY = Math.max(46, W * 0.072);
  var maxLines = Math.min(logEntries.length, Math.floor((W * 0.45) / (logH + 1)));
  var entries = logEntries.slice(-maxLines);

  c.font = (logH * 0.7) + "px monospace";
  c.textAlign = "left";
  c.textBaseline = "top";
  c.fillStyle = "#444";
  c.fillText("INVESTIGATION LOG:", logX, logY - logH);

  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var ey = logY + i * (logH + 1);

    // Fade older entries
    var age = Math.min(1, (Date.now() - e.time) / 10000);
    var alpha = 1 - age * 0.4;

    if (e.cls === "hl") c.fillStyle = "rgba(255,204,0," + alpha + ")";
    else if (e.cls === "good") c.fillStyle = "rgba(68,221,136," + alpha + ")";
    else if (e.cls === "bad") c.fillStyle = "rgba(255,68,68," + alpha + ")";
    else if (e.cls === "hint") c.fillStyle = "rgba(170,102,255," + alpha + ")";
    else if (e.cls === "clue") c.fillStyle = "rgba(0,204,255," + alpha + ")";
    else c.fillStyle = "rgba(102,102,102," + alpha + ")";

    var text = e.msg;
    var maxW = logW - 4;
    while (c.measureText(text).width > maxW && text.length > 3) {
      text = text.substring(0, text.length - 4) + "..";
    }
    c.fillText(text, logX, ey);
  }
}

var notepadScroll = 0;
var notepadCells = [];

function drawNotepad() {
  var c = ctx;
  var pad = W * 0.04;
  var panelW = W - pad * 2;
  var panelH = H - pad * 2;
  var px = pad, py = pad;

  // Overlay
  c.fillStyle = "rgba(0,0,0,0.90)";
  c.fillRect(0, 0, W, H);

  // Panel — NES-styled
  c.fillStyle = "#0c0c16";
  roundRect(c, px, py, panelW, panelH, 6);
  c.fill();
  c.strokeStyle = "#38d973";
  c.lineWidth = 2;
  roundRect(c, px, py, panelW, panelH, 6);
  c.stroke();
  // Inner border for NES style
  c.strokeStyle = "#38d97333";
  c.lineWidth = 1;
  roundRect(c, px+3, py+3, panelW-6, panelH-6, 4);
  c.stroke();

  // Title
  var titleFs = Math.max(12, W * 0.025);
  c.font = "bold " + titleFs + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillStyle = "#38d973";
  c.fillText("DEDUCTION NOTEPAD", W/2, py + titleFs + 4);

  // Close button
  var closeSize = titleFs * 1.5;
  var closeX = px + panelW - closeSize - 4;
  var closeY = py + 4;
  btnRects.closeNotepad = { x: closeX, y: closeY, w: closeSize, h: closeSize, enabled: true };
  c.fillStyle = "#1a1a2a";
  roundRect(c, closeX, closeY, closeSize, closeSize, 4);
  c.fill();
  c.strokeStyle = "#e6482e";
  c.lineWidth = 1;
  roundRect(c, closeX, closeY, closeSize, closeSize, 4);
  c.stroke();
  c.fillStyle = "#e6482e";
  c.font = "bold " + (closeSize*0.6) + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillText("X", closeX + closeSize/2, closeY + closeSize/2);

  // Legend
  c.font = (titleFs * 0.55) + "px monospace";
  c.textAlign = "left";
  c.fillStyle = "#555";
  c.fillText("Click cells: blank > ? > X > check", px + 10, py + titleFs * 2 + 6);

  // Table
  var tableY = py + titleFs * 2.8;
  var rowH = Math.max(16, (panelH - titleFs * 3.5) / (6 + 6 + 9 + 3 + 1));
  var labelW = Math.max(100, panelW * 0.28);
  var colW = Math.max(24, (panelW - labelW - 10) / (G.totalPlayers + 1));
  var tableX = px + 8;

  notepadCells = [];

  // Header row
  c.font = (rowH * 0.5) + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  for (var p = 0; p < G.totalPlayers; p++) {
    var s = SUSPECTS[G.players[p].suspectIdx];
    c.fillStyle = p === 0 ? statB.color : s.color;
    var colX = tableX + labelW + p * colW;
    c.save();
    c.translate(colX + colW/2, tableY - 2);
    c.rotate(-Math.PI/4);
    c.fillText(p === 0 ? "You" : s.short, 0, 0);
    c.restore();
  }
  // Solution column
  c.fillStyle = "#f4b41b";
  c.save();
  c.translate(tableX + labelW + G.totalPlayers * colW + colW/2, tableY - 2);
  c.rotate(-Math.PI/4);
  c.fillText("Sol?", 0, 0);
  c.restore();

  var curY = tableY + rowH * 0.3;

  // Sections
  var sections = [
    { label: "SUSPECTS", prefix: "s", items: SUSPECTS.map(function(s,i){return{name:s.short,color:s.color,idx:i};}), count: 6 },
    { label: "WEAPONS", prefix: "w", items: WEAPONS.map(function(w,i){return{name:w.length>18?w.substring(0,16)+"..":w,color:"#38d973",idx:i};}), count: 6 },
    { label: "ROOMS", prefix: "r", items: ROOMS.map(function(r,i){return{name:r.length>18?r.substring(0,16)+"..":r,color:"#3cacd7",idx:i};}), count: 9 }
  ];

  for (var s = 0; s < sections.length; s++) {
    var sec = sections[s];
    c.fillStyle = "#111120";
    c.fillRect(tableX, curY, panelW - 16, rowH);
    c.fillStyle = "#666";
    c.font = (rowH * 0.45) + "px monospace";
    c.textAlign = "left";
    c.fillText(sec.label, tableX + 4, curY + rowH/2);
    curY += rowH;

    for (var r = 0; r < sec.count; r++) {
      var item = sec.items[r];
      var key = sec.prefix + item.idx;

      c.fillStyle = r % 2 === 0 ? "#0a0a14" : "#0d0d18";
      c.fillRect(tableX, curY, panelW - 16, rowH);

      // Label
      c.fillStyle = item.color;
      c.font = (rowH * 0.5) + "px monospace";
      c.textAlign = "left";
      c.fillText(item.name, tableX + 4, curY + rowH/2);

      // Player columns
      for (var p = 0; p < G.totalPlayers; p++) {
        var val = G.notepad[key] ? G.notepad[key][p] || 0 : 0;
        var colX = tableX + labelW + p * colW;

        if (val === 1) c.fillStyle = "#0a2a0a";
        else if (val === 2) c.fillStyle = "#2a0a0a";
        else c.fillStyle = "transparent";
        if (val === 1 || val === 2) {
          c.fillRect(colX, curY, colW, rowH);
        }

        c.strokeStyle = "#1a1a2a";
        c.lineWidth = 0.5;
        c.strokeRect(colX, curY, colW, rowH);

        c.font = (rowH * 0.55) + "px monospace";
        c.textAlign = "center";
        if (val === 1) { c.fillStyle = "#38d973"; c.fillText("\u2713", colX + colW/2, curY + rowH/2); }
        else if (val === 2) { c.fillStyle = "#e6482e"; c.fillText("\u2717", colX + colW/2, curY + rowH/2); }
        else if (val === 3) { c.fillStyle = "#f4b41b"; c.fillText("?", colX + colW/2, curY + rowH/2); }

        notepadCells.push({ x: colX, y: curY, w: colW, h: rowH, key: key, player: p, isSol: false });
      }

      // Solution column
      var solVal = G.notepad[key] ? G.notepad[key].sol || 0 : 0;
      var solX = tableX + labelW + G.totalPlayers * colW;
      if (solVal === 1) c.fillStyle = "#0a2a0a";
      else if (solVal === 2) c.fillStyle = "#2a0a0a";
      else c.fillStyle = "transparent";
      if (solVal === 1 || solVal === 2) c.fillRect(solX, curY, colW, rowH);
      c.strokeStyle = "#2a2a3a";
      c.lineWidth = 0.5;
      c.strokeRect(solX, curY, colW, rowH);
      c.font = (rowH * 0.55) + "px monospace";
      c.textAlign = "center";
      if (solVal === 1) { c.fillStyle = "#38d973"; c.fillText("\u2713", solX + colW/2, curY + rowH/2); }
      else if (solVal === 2) { c.fillStyle = "#e6482e"; c.fillText("\u2717", solX + colW/2, curY + rowH/2); }
      else if (solVal === 3) { c.fillStyle = "#f4b41b"; c.fillText("?", solX + colW/2, curY + rowH/2); }

      notepadCells.push({ x: solX, y: curY, w: colW, h: rowH, key: key, player: -1, isSol: true });

      curY += rowH;
    }
  }
}

var dialogBtnRects = {};

function drawDialog() {
  if (!showingDialog) return;
  var c = ctx;

  c.fillStyle = "rgba(0,0,0,0.88)";
  c.fillRect(0, 0, W, H);

  var dlgW = Math.min(380, W * 0.82);
  var dlgH = showingDialog === "accuse" ? 340 : 280;
  var dlgX = (W - dlgW) / 2;
  var dlgY = (H - dlgH) / 2;

  c.fillStyle = "#0c0c16";
  roundRect(c, dlgX, dlgY, dlgW, dlgH, 8);
  c.fill();
  c.strokeStyle = showingDialog === "accuse" ? "#e6482e" : "#3cacd7";
  c.lineWidth = 2;
  roundRect(c, dlgX, dlgY, dlgW, dlgH, 8);
  c.stroke();
  // NES inner border
  c.strokeStyle = (showingDialog === "accuse" ? "#e6482e" : "#3cacd7") + "33";
  c.lineWidth = 1;
  roundRect(c, dlgX+3, dlgY+3, dlgW-6, dlgH-6, 6);
  c.stroke();

  // Title
  var fs = Math.max(12, dlgW * 0.045);
  c.font = "bold " + (fs * 1.2) + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillStyle = showingDialog === "accuse" ? "#e6482e" : "#3cacd7";
  var title = showingDialog === "accuse" ? "BASELING ACCUSATION" : "INTERROGATE SUSPECTS";
  c.fillText(title, W/2, dlgY + 30);

  if (showingDialog === "suggest") {
    c.font = (fs * 0.7) + "px monospace";
    c.fillStyle = "#666";
    c.fillText("in " + ROOMS[G.players[0].inRoom], W/2, dlgY + 50);
    // STR interrogation power indicator (ref#1)
    if (getInterrogationPower() > 2) {
      c.fillStyle = "#e6482e88";
      c.fillText("STR boost: enhanced interrogation", W/2, dlgY + 65);
    }
  }

  var optY = dlgY + (showingDialog === "suggest" && getInterrogationPower() > 2 ? 78 : 68);
  var optH = 28;
  var optW = dlgW - 40;
  var optX = dlgX + 20;

  // Suspect selector
  c.fillStyle = "#888";
  c.font = (fs * 0.7) + "px monospace";
  c.textAlign = "left";
  c.fillText("Suspect:", optX, optY);
  optY += 14;
  drawSelector(optX, optY, optW, optH, "dlg_suspect", SUSPECTS.map(function(s){return s.name;}), dialogSelections.suspect);
  optY += optH + 10;

  // Weapon selector
  c.fillStyle = "#888";
  c.fillText("Weapon:", optX, optY);
  optY += 14;
  drawSelector(optX, optY, optW, optH, "dlg_weapon", WEAPONS, dialogSelections.weapon);
  optY += optH + 10;

  // Room selector (accusation only)
  if (showingDialog === "accuse") {
    c.fillStyle = "#888";
    c.fillText("Location:", optX, optY);
    optY += 14;
    drawSelector(optX, optY, optW, optH, "dlg_room", ROOMS, dialogSelections.room);
    optY += optH + 10;
  }

  // Buttons
  var btnW2 = (dlgW - 50) / 2;
  var btnH2 = 34;
  var btnY = dlgY + dlgH - btnH2 - 16;

  // Cancel
  c.fillStyle = "#1a1a2a";
  roundRect(c, dlgX + 15, btnY, btnW2, btnH2, 4);
  c.fill();
  c.strokeStyle = "#555";
  c.lineWidth = 1;
  roundRect(c, dlgX + 15, btnY, btnW2, btnH2, 4);
  c.stroke();
  c.fillStyle = "#aaa";
  c.font = (btnH2 * 0.5) + "px monospace";
  c.textAlign = "center";
  c.fillText("Cancel", dlgX + 15 + btnW2/2, btnY + btnH2/2);
  dialogBtnRects.cancel = { x: dlgX+15, y: btnY, w: btnW2, h: btnH2, enabled: true };

  var confirmColor = showingDialog === "accuse" ? "#e6482e" : "#38d973";
  c.fillStyle = confirmColor;
  roundRect(c, dlgX + 15 + btnW2 + 20, btnY, btnW2, btnH2, 4);
  c.fill();
  c.fillStyle = "#1a1c2c";
  c.font = "bold " + (btnH2 * 0.5) + "px monospace";
  c.fillText("Confirm", dlgX + 15 + btnW2 + 20 + btnW2/2, btnY + btnH2/2);

  // CON survival warning for accusation (ref#6)
  if (showingDialog === "accuse" && canSurviveAccusation() && !survivedAccusation) {
    c.font = (fs * 0.55) + "px monospace";
    c.fillStyle = "#f4b41b88";
    c.textAlign = "center";
    c.fillText("CON 16+: You survive one wrong accusation", W/2, btnY - 14);
  }
}

function drawSelector(x, y, w, h, id, options, selectedIdx) {
  var c = ctx;
  c.fillStyle = "#141420";
  roundRect(c, x, y, w, h, 4);
  c.fill();
  c.strokeStyle = "#3a3a4a";
  c.lineWidth = 1;
  roundRect(c, x, y, w, h, 4);
  c.stroke();

  var text = options[selectedIdx] || "???";
  if (text.length > 28) text = text.substring(0, 26) + "..";
  c.fillStyle = "#ddd";
  c.font = (h * 0.5) + "px monospace";
  c.textAlign = "left";
  c.textBaseline = "middle";
  c.fillText(text, x + 8, y + h/2);

  var arrowW = h;
  c.fillStyle = "#38d973";
  c.font = (h * 0.6) + "px monospace";
  c.textAlign = "center";
  c.fillText("<", x + w - arrowW*2, y + h/2);
  c.fillText(">", x + w - arrowW*0.5, y + h/2);

  dialogBtnRects[id + "_left"] = { x: x + w - arrowW*2.5, y: y, w: arrowW, h: h, enabled: true };
  dialogBtnRects[id + "_right"] = { x: x + w - arrowW, y: y, w: arrowW, h: h, enabled: true };
}

// TUTORIAL OVERLAY
// ============================================================
function drawTutorial() {
  var c = ctx;
  c.fillStyle = "#1a1c2c";
  c.fillRect(0, 0, W, H);

  var page = TUTORIAL_PAGES[tutorialPage];
  var titleFs = Math.min(36, W * 0.055);
  var bodyFs = Math.max(11, W * 0.022);
  var padX = W * 0.1;

  // Title
  c.font = "bold " + titleFs + "px monospace";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillStyle = "#38d973";
  c.fillText(page.title, W/2, H * 0.12);

  // Pixel sprite
  if (page.sprite) {
    var sprSz = Math.max(4, Math.floor(W * 0.012));
    var sprW = page.sprite[0].length * sprSz;
    var sprH = page.sprite.length * sprSz;
    drawPixelChar(c, W/2 - sprW/2, H * 0.2 - sprH/2, sprSz, "#38d973", page.sprite);
  }

  // Body text
  c.font = bodyFs + "px monospace";
  c.fillStyle = "#aaa";
  var bodyLines = wordWrap(page.text, W - padX * 2, c);
  for (var i = 0; i < bodyLines.length; i++) {
    c.fillText(bodyLines[i], W/2, H * 0.32 + i * (bodyFs * 1.6));
  }

  // Page indicator
  c.fillStyle = "#555";
  c.font = (bodyFs * 0.8) + "px monospace";
  c.fillText("Page " + (tutorialPage + 1) + " of " + TUTORIAL_PAGES.length, W/2, H * 0.78);

  // Navigation buttons
  var navBtnW = Math.min(140, W * 0.25);
  var navBtnH = 36;
  var navY = H * 0.84;

  // Back
  if (tutorialPage > 0) {
    c.fillStyle = "#1a1a2a";
    roundRect(c, W/2 - navBtnW - 10, navY, navBtnW, navBtnH, 6);
    c.fill();
    c.strokeStyle = "#555";
    c.lineWidth = 1;
    roundRect(c, W/2 - navBtnW - 10, navY, navBtnW, navBtnH, 6);
    c.stroke();
    c.fillStyle = "#aaa";
    c.font = (navBtnH * 0.45) + "px monospace";
    c.fillText("< Back", W/2 - navBtnW/2 - 10, navY + navBtnH/2);
    btnRects.tutBack = { x: W/2 - navBtnW - 10, y: navY, w: navBtnW, h: navBtnH, enabled: true };
  }

  // Next / Start
  var isLast = tutorialPage >= TUTORIAL_PAGES.length - 1;
  c.fillStyle = isLast ? "#38d973" : "#1a1a2a";
  roundRect(c, W/2 + 10, navY, navBtnW, navBtnH, 6);
  c.fill();
  c.strokeStyle = isLast ? "#38d973" : "#38d973";
  c.lineWidth = 1;
  roundRect(c, W/2 + 10, navY, navBtnW, navBtnH, 6);
  c.stroke();
  c.fillStyle = isLast ? "#1a1c2c" : "#38d973";
  c.font = (navBtnH * 0.45) + "px monospace";
  c.fillText(isLast ? "START" : "Next >", W/2 + navBtnW/2 + 10, navY + navBtnH/2);
  btnRects.tutNext = { x: W/2 + 10, y: navY, w: navBtnW, h: navBtnH, enabled: true };

  // Skip
  c.fillStyle = "#444";
  c.font = (bodyFs * 0.7) + "px monospace";
  c.fillText("Press ENTER or click to skip", W/2, H * 0.94);

  // Ambient particles
  if (Math.random() < 0.1) {
    spawnParticle(Math.random() * W, H * 0.95, "#38d97344", "rise", 1);
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function rollDice() {
  if (!G || G.phase !== "roll" || G.currentPlayer !== 0) return;
  sfxDice();
  G.animatingDice = true;
  var ticks = 0;
  var interval = setInterval(function() {
    ticks++;
    var d1 = Math.floor(Math.random()*6)+1;
    var d2 = Math.floor(Math.random()*6)+1;
    G.diceResult = [d1, d2];
    if (ticks >= 10) {
      clearInterval(interval);
      G.animatingDice = false;

      // CHA dice floor — minimum roll value (ref#14)
      var floor = getDiceFloor();
      if (d1 + d2 < floor && floor > 0) {
        d1 = Math.max(d1, Math.ceil(floor / 2));
        d2 = Math.max(d2, Math.floor(floor / 2));
        G.diceResult = [d1, d2];
        addLog("CHA luck: dice boosted to minimum " + floor + "!", "good");
      }

      // DEX movement bonus (ref#3)
      var bonus = getMovementBonus();
      G.diceTotal = d1 + d2 + bonus;
      if (bonus > 0) {
        addLog("You rolled " + d1 + "+" + d2 + "+" + bonus + "(DEX) = " + G.diceTotal);
      } else {
        addLog("You rolled " + d1 + " + " + d2 + " = " + G.diceTotal);
      }
      G.phase = "move";
      reachableSpots = getReachable(G.players[0], G.diceTotal);

      // Trigger spore particles on roll
      spawnParticle(W * 0.1, 20, "#38d973", "burst", 5);
    }
  }, 70);
}

function movePlayerTo(playerIdx, target) {
  var p = G.players[playerIdx];
  if (target.room >= 0) {
    p.inRoom = target.room;
    p.hallX = -1;
    p.hallY = -1;
    if (p.isHuman) {
      sfxEnterRoom();
      var passageText = target.secret ? " (Secret fungal passage!)" : "";
      addLog("You entered " + ROOMS[target.room] + "." + passageText);
      G.phase = "suggest";
      G.suggestedThisTurn = false;

      // Room entry particles
      var rr = roomPixelRect(target.room);
      spawnParticle(rr.x + rr.w/2, rr.y + rr.h/2, ROOM_GLOW[target.room], "burst", 8);

      // INT clue discovery on room entry (ref#7)
      if (Math.random() < getClueChance()) {
        sfxClue();
        var clue = SPORE_CLUES[Math.floor(Math.random() * SPORE_CLUES.length)];
        addLog("INT discovery: " + clue, "clue");
        var autoClue = autoDiscoverClue();
        if (autoClue) {
          addLog("Deduction: " + autoClue, "good");
          score += 50 * getScoreMultiplier(); // ref#8
        }
      }

      // WIS hint system — periodic hints about solution (ref#10)
      if (G.turnCount > 0 && G.turnCount % getHintInterval() === 0) {
        giveWisdomHint();
      }

      // Show room description as flavor text
      showMessage(ROOM_DESCRIPTIONS[target.room], 2500);
    }
  } else {
    p.inRoom = -1;
    p.hallX = target.hx;
    p.hallY = target.hy;
    if (p.isHuman) {
      sfxMove();
      addLog("Your baseling moves through the mansion hallways.");
      G.phase = "endturn";
    }
  }
  reachableSpots = [];
  hoverRoom = -1;
}

// WIS hint system (ref#10, ref#11)
function giveWisdomHint() {
  if (!G) return;
  hintsGiven++;
  sfxHint();

  var hints = [];
  // Hint about solution suspect
  if (Math.random() < 0.4) {
    var notSus = [];
    for (var i = 0; i < 6; i++) {
      if (i !== G.solution.suspect) notSus.push(i);
    }
    var pick = notSus[Math.floor(Math.random() * notSus.length)];
    hints.push("WIS sense: " + SUSPECTS[pick].short + " seems innocent...");
    G.notepad["s" + pick].sol = 2;
  }
  // Hint about solution weapon
  if (Math.random() < 0.3) {
    var notWep = [];
    for (var i = 0; i < 6; i++) {
      if (i !== G.solution.weapon) notWep.push(i);
    }
    var pickW = notWep[Math.floor(Math.random() * notWep.length)];
    hints.push("WIS sense: The " + WEAPONS[pickW] + " was not used...");
    G.notepad["w" + pickW].sol = 2;
  }

  if (hints.length > 0) {
    addLog(hints[0], "hint");
    spawnParticle(W/2, H/2, "#a855f7", "spore", 6);
  }
}

function makeSuggestion(playerIdx, suspectIdx, weaponIdx, roomIdx) {
  var p = G.players[playerIdx];
  var pName = p.isHuman ? statB.name : SUSPECTS[p.suspectIdx].name;
  var sName = SUSPECTS[suspectIdx].name;
  var wName = WEAPONS[weaponIdx];
  var rName = ROOMS[roomIdx];

  sfxSuggest();
  addLog(pName + " suggest" + (p.isHuman ? "" : "s") + ": " + sName + " with " + wName + " in " + rName, "hl");
  G.suggestedThisTurn = true;

  // Score for making suggestion (ref#8)
  if (p.isHuman) {
    score += 25 * getScoreMultiplier();
  }

  // Move named suspect to room (if they are a player)
  for (var i = 0; i < G.players.length; i++) {
    if (G.players[i].suspectIdx === suspectIdx && i !== playerIdx && G.players[i].alive) {
      G.players[i].inRoom = roomIdx;
      G.players[i].hallX = -1;
      G.players[i].hallY = -1;
    }
  }

  // Ask each other player clockwise
  var shown = false;
  for (var offset = 1; offset < G.totalPlayers; offset++) {
    var askIdx = (playerIdx + offset) % G.totalPlayers;
    var askP = G.players[askIdx];
    if (!askP.alive) continue;

    var matching = [];
    for (var ci = 0; ci < askP.hand.length; ci++) {
      var card = askP.hand[ci];
      if ((card.type === "suspect" && card.index === suspectIdx) ||
          (card.type === "weapon" && card.index === weaponIdx) ||
          (card.type === "room" && card.index === roomIdx)) {
        matching.push(card);
      }
    }

    var askName = askP.isHuman ? statB.name : SUSPECTS[askP.suspectIdx].name;

    if (matching.length > 0) {
      // CHA cooperation — shown the most helpful card (ref#13)
      var showCard;
      if (playerIdx === 0 && Math.random() < getCoopBonus()) {
        // CHA: show the card that helps most (prefer one we don't know yet)
        var unknownCards = matching.filter(function(mc) {
          var key = (mc.type === "suspect" ? "s" : mc.type === "weapon" ? "w" : "r") + mc.index;
          return G.notepad[key].sol !== 2;
        });
        showCard = unknownCards.length > 0 ? unknownCards[0] : matching[0];
      } else {
        showCard = matching[Math.floor(Math.random() * matching.length)];
      }

      var cardName = showCard.type === "suspect" ? SUSPECTS[showCard.index].name :
                     showCard.type === "weapon" ? WEAPONS[showCard.index] : ROOMS[showCard.index];

      if (playerIdx === 0) {
        sfxShowCard();
        addLog(askName + " shows you: " + cardName, "good");
        autoMarkNotepad(showCard.type, showCard.index, askIdx);
        score += 50 * getScoreMultiplier(); // ref#8

        // CHA double-show — chance to see a second card (ref#15)
        if (canGetDoubleShow() && matching.length > 1) {
          var secondCard = matching.filter(function(mc) { return mc !== showCard; })[0];
          if (secondCard && Math.random() < 0.4) {
            var secondName = secondCard.type === "suspect" ? SUSPECTS[secondCard.index].name :
                             secondCard.type === "weapon" ? WEAPONS[secondCard.index] : ROOMS[secondCard.index];
            addLog("CHA charm! " + askName + " also reveals: " + secondName, "good");
            autoMarkNotepad(secondCard.type, secondCard.index, askIdx);
            score += 75 * getScoreMultiplier();
          }
        }

        // INT extra info — chance to learn who DOESN'T have other cards (ref#9)
        if (Math.random() < getExtraInfoChance()) {
          addLog("INT insight: You notice something about their remaining hand...", "clue");
          var clueResult2 = autoDiscoverClue();
          if (clueResult2) addLog("Deduction: " + clueResult2, "good");
        }

        // CHA persuade — chance for AI to reveal extra info (ref#16)
        if (Math.random() < getPersuadeChance()) {
          addLog("CHA persuasion: " + askName + " whispers a hint...", "good");
          var clueResult3 = autoDiscoverClue();
          if (clueResult3) addLog("Extra intel: " + clueResult3, "good");
        }
      } else if (askIdx === 0) {
        addLog("You show " + SUSPECTS[G.players[playerIdx].suspectIdx].name + ": " + cardName);
        aiLearnCard(playerIdx, showCard.type, showCard.index);
      } else {
        addLog(askName + " shows a card to " + pName + " (hidden).");
        aiLearnCard(playerIdx, showCard.type, showCard.index);
      }
      shown = true;

      // Particles for card show
      if (playerIdx === 0 || askIdx === 0) {
        spawnParticle(W/2, H/2, "#38d973", "burst", 4);
      }

      break;
    } else {
      sfxNoCard();
      addLog(askName + " ha" + (askP.isHuman ? "ve" : "s") + " nothing to show.");

      for (var ai = 0; ai < G.totalPlayers; ai++) {
        if (ai === 0 || !G.players[ai].alive) continue;
        aiLearnNone(ai, askIdx, suspectIdx, weaponIdx, roomIdx);
      }

      // WIS sense — detect if no-one having cards means something (ref#11)
      if (playerIdx === 0 && Math.random() < getSenseChance()) {
        addLog("WIS sense: Something about their denial feels revealing...", "hint");
        var clueResult4 = autoDiscoverClue();
        if (clueResult4) addLog("Insight: " + clueResult4, "good");
      }
    }
  }

  if (!shown) {
    addLog("Nobody could disprove it!", "hl");
    spawnParticle(W/2, H/2, "#f4b41b", "burst", 10);
    if (playerIdx === 0) {
      score += 100 * getScoreMultiplier();
      triggerShake(3);
    }
  }

  G.phase = "endturn";
  saveGame();
}

function makeAccusation(playerIdx, suspectIdx, weaponIdx, roomIdx) {
  var p = G.players[playerIdx];
  var pName = p.isHuman ? statB.name : SUSPECTS[p.suspectIdx].name;

  sfxAccuse();
  addLog(pName + " ACCUSE" + (p.isHuman ? "" : "S") + ": " + SUSPECTS[suspectIdx].name + " with " + WEAPONS[weaponIdx] + " in " + ROOMS[roomIdx] + "!", "hl");

  var correct = suspectIdx === G.solution.suspect &&
                weaponIdx === G.solution.weapon &&
                roomIdx === G.solution.room;

  if (correct) {
    G.gameOver = true;
    G.winner = playerIdx;
    G.phase = "gameover";
    if (p.isHuman) {
      // Calculate final score with STR accusation weight (ref#2)
      var finalScore = score + (500 * getScoreMultiplier() * getAccusationWeight());
      // Bonus for fewer turns
      finalScore += Math.max(0, (50 - G.turnCount) * 10) * getScoreMultiplier();
      score = finalScore;

      sfxWin();
      addLog("CORRECT! Your baseling solved the Spore Mansion mystery!", "good");
      spawnParticle(W/2, H/3, "#38d973", "burst", 30);
      spawnParticle(W/2, H/3, "#f4b41b", "burst", 20);
      showingResult = {
        won: true,
        text: "SPORE MYSTERY SOLVED!",
        sub: "It was " + SUSPECTS[G.solution.suspect].name + " with the " + WEAPONS[G.solution.weapon] + " in " + ROOMS[G.solution.room] + "!",
        score: Math.floor(score)
      };
    } else {
      sfxLose();
      addLog(pName + " solved the mystery!", "bad");
      showingResult = {
        won: false,
        text: "CASE CLOSED",
        sub: pName + " cracked it! It was " + SUSPECTS[G.solution.suspect].name + " with the " + WEAPONS[G.solution.weapon] + " in " + ROOMS[G.solution.room] + ".",
        score: Math.floor(score)
      };
    }
  } else {
    // CON survival — survive one wrong accusation (ref#6)
    if (p.isHuman && canSurviveAccusation() && !survivedAccusation) {
      survivedAccusation = true;
      sfxSurvive();
      addLog("WRONG! But CON 16+ saves you! You survive this time!", "hl");
      addLog("You will NOT survive a second wrong accusation.", "bad");
      triggerShake(6);
      spawnParticle(W/2, H/2, "#f4b41b", "burst", 12);
      score -= 100;
    } else {
      sfxEliminate();
      addLog("WRONG! " + pName + (p.isHuman ? " are" : " is") + " eliminated!", "bad");
      p.alive = false;
      spawnParticle(W/2, H/2, "#e6482e", "burst", 15);

      if (p.isHuman) {
        addLog("Truth: " + SUSPECTS[G.solution.suspect].name + ", " + WEAPONS[G.solution.weapon] + ", " + ROOMS[G.solution.room], "hl");
      }

      // Check if only one player left
      var aliveCount = 0, lastAlive = -1;
      for (var i = 0; i < G.players.length; i++) {
        if (G.players[i].alive) { aliveCount++; lastAlive = i; }
      }
      if (aliveCount <= 1) {
        G.gameOver = true;
        G.winner = lastAlive;
        G.phase = "gameover";
        var wName = lastAlive >= 0 ? (G.players[lastAlive].isHuman ? statB.name : SUSPECTS[G.players[lastAlive].suspectIdx].name) : "Nobody";
        addLog(wName + " wins by default!");
        var isHumanWin = lastAlive >= 0 && G.players[lastAlive].isHuman;
        showingResult = {
          won: isHumanWin,
          text: isHumanWin ? "YOU WIN!" : "CASE CLOSED",
          sub: "The truth: " + SUSPECTS[G.solution.suspect].name + " with the " + WEAPONS[G.solution.weapon] + " in " + ROOMS[G.solution.room] + ".",
          score: Math.floor(score)
        };
      }
    }
  }

  G.phase = "endturn";
  saveGame();
}

function autoMarkNotepad(cardType, cardIndex, playerIdx) {
  var key = (cardType === "suspect" ? "s" : cardType === "weapon" ? "w" : "r") + cardIndex;
  if (!G.notepad[key]) G.notepad[key] = {};
  G.notepad[key][playerIdx] = 1;
  for (var p = 0; p < G.totalPlayers; p++) {
    if (p !== playerIdx) G.notepad[key][p] = 2;
  }
  G.notepad[key].sol = 2;
}

// ============================================================
// AI LOGIC
// ============================================================
function aiLearnCard(aiIdx, cardType, cardIndex) {
  var ai = G.players[aiIdx];
  if (!ai.known) return;
  if (cardType === "suspect") ai.known.hasSuspect[cardIndex] = true;
  if (cardType === "weapon") ai.known.hasWeapon[cardIndex] = true;
  if (cardType === "room") ai.known.hasRoom[cardIndex] = true;
}

function aiLearnNone(aiIdx, noPlayerIdx, suspectIdx, weaponIdx, roomIdx) {
  var ai = G.players[aiIdx];
  if (!ai.known) return;
  var key = "none_" + noPlayerIdx + "_" + suspectIdx + "_" + weaponIdx + "_" + roomIdx;
  if (!ai.known.shownBy) ai.known.shownBy = {};
  ai.known.shownBy[key] = true;
}

function aiPickSuspect(aiIdx) {
  var ai = G.players[aiIdx];
  var unknowns = [];
  for (var i = 0; i < 6; i++) {
    if (!ai.known.hasSuspect[i]) unknowns.push(i);
  }
  if (unknowns.length > 0) return unknowns[Math.floor(Math.random() * unknowns.length)];
  return Math.floor(Math.random() * 6);
}

function aiPickWeapon(aiIdx) {
  var ai = G.players[aiIdx];
  var unknowns = [];
  for (var i = 0; i < 6; i++) {
    if (!ai.known.hasWeapon[i]) unknowns.push(i);
  }
  if (unknowns.length > 0) return unknowns[Math.floor(Math.random() * unknowns.length)];
  return Math.floor(Math.random() * 6);
}

function aiGetSolution(aiIdx) {
  var ai = G.players[aiIdx];
  var solS = [], solW = [], solR = [];
  for (var i = 0; i < 6; i++) if (!ai.known.hasSuspect[i]) solS.push(i);
  for (var i = 0; i < 6; i++) if (!ai.known.hasWeapon[i]) solW.push(i);
  for (var i = 0; i < 9; i++) if (!ai.known.hasRoom[i]) solR.push(i);
  if (solS.length === 1 && solW.length === 1 && solR.length === 1) {
    return { suspect: solS[0], weapon: solW[0], room: solR[0] };
  }
  return null;
}

function aiTurn(playerIdx) {
  var p = G.players[playerIdx];
  if (!p.alive || G.gameOver) { endTurn(); return; }

  var name = SUSPECTS[p.suspectIdx].name;
  addLog(name + "'s turn...");

  // Roll dice
  var d1 = Math.floor(Math.random()*6)+1;
  var d2 = Math.floor(Math.random()*6)+1;
  var total = d1 + d2;
  G.diceResult = [d1, d2];
  G.diceTotal = total;

  setTimeout(function() {
    sfxDice();
    addLog(name + " rolls " + total + ".");

    var reachable = getReachable(p, total);
    var reachableRooms = [];
    for (var i = 0; i < reachable.length; i++) {
      if (reachable[i].room >= 0) reachableRooms.push(reachable[i]);
    }

    var targetRoom = -1;
    if (reachableRooms.length > 0) {
      var unknown = [];
      for (var i = 0; i < reachableRooms.length; i++) {
        if (!p.known.hasRoom[reachableRooms[i].room]) unknown.push(reachableRooms[i]);
      }
      if (unknown.length > 0) {
        var diff = [];
        for (var i = 0; i < unknown.length; i++) {
          if (unknown[i].room !== p.inRoom) diff.push(unknown[i]);
        }
        targetRoom = (diff.length > 0 ? diff : unknown)[Math.floor(Math.random() * (diff.length > 0 ? diff : unknown).length)].room;
      } else {
        var diff2 = [];
        for (var i = 0; i < reachableRooms.length; i++) {
          if (reachableRooms[i].room !== p.inRoom) diff2.push(reachableRooms[i]);
        }
        targetRoom = (diff2.length > 0 ? diff2 : reachableRooms)[Math.floor(Math.random() * (diff2.length > 0 ? diff2 : reachableRooms).length)].room;
      }
    }

    if (targetRoom >= 0) {
      p.inRoom = targetRoom;
      p.hallX = -1;
      p.hallY = -1;
      addLog(name + " enters " + ROOMS[targetRoom] + ".");

      // Room entry particles for AI
      var rrAI = roomPixelRect(targetRoom);
      spawnParticle(rrAI.x + rrAI.w/2, rrAI.y + rrAI.h/2, SUSPECTS[p.suspectIdx].color, "burst", 4);

      setTimeout(function() {
        var sg = aiPickSuspect(playerIdx);
        var wg = aiPickWeapon(playerIdx);
        makeSuggestion(playerIdx, sg, wg, targetRoom);

        setTimeout(function() {
          // CON stamina bonus — AI waits longer before accusing (ref#5 — affects pacing)
          var sol = aiGetSolution(playerIdx);
          if (sol && G.turnCount > (3 + getStaminaBonus())) {
            makeAccusation(playerIdx, sol.suspect, sol.weapon, sol.room);
          }
          if (!G.gameOver) {
            setTimeout(function(){ endTurn(); }, 400);
          }
        }, 400);
      }, 500);
    } else {
      var hallSpots = [];
      for (var i = 0; i < reachable.length; i++) {
        if (reachable[i].room < 0) hallSpots.push(reachable[i]);
      }
      if (hallSpots.length > 0) {
        var spot = hallSpots[Math.floor(Math.random() * hallSpots.length)];
        p.inRoom = -1;
        p.hallX = spot.hx;
        p.hallY = spot.hy;
        addLog(name + " moves through the mansion hallways.");
      } else {
        addLog(name + " stays put.");
      }
      setTimeout(function(){ endTurn(); }, 500);
    }
  }, 500);
}

function endTurn() {
  if (G.gameOver) return;
  G.turnCount++;
  reachableSpots = [];
  hoverRoom = -1;

  var next = (G.currentPlayer + 1) % G.totalPlayers;
  var safety = 0;
  while (!G.players[next].alive && safety < G.totalPlayers) {
    next = (next + 1) % G.totalPlayers;
    safety++;
  }

  G.currentPlayer = next;
  G.phase = "roll";
  G.suggestedThisTurn = false;
  G.diceResult = [0, 0];
  G.diceTotal = 0;

  if (next !== 0) {
    setTimeout(function() { aiTurn(next); }, 600);
  } else {
    addLog("--- Your turn ---", "hl");

    // WIS periodic hints on player's turn (ref#10)
    if (G.turnCount > 1 && G.turnCount % getHintInterval() === 0) {
      giveWisdomHint();
    }
  }

  saveGame();
}

// ============================================================
// INPUT HANDLING
// ============================================================
function hitTest(px, py, rect) {
  return rect && px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
}

function handleInput(px, py) {
  initAudio();

  // Tutorial screen
  if (screen === SCREEN_TUTORIAL) {
    if (btnRects.tutBack && hitTest(px, py, btnRects.tutBack) && tutorialPage > 0) {
      tutorialPage--;
      return;
    }
    if (btnRects.tutNext && hitTest(px, py, btnRects.tutNext)) {
      if (tutorialPage >= TUTORIAL_PAGES.length - 1) {
        screen = SCREEN_MENU;
      } else {
        tutorialPage++;
      }
      return;
    }
    return;
  }

  // Result overlay
  if (showingResult) {
    if (btnRects.resultNewGame && hitTest(px, py, btnRects.resultNewGame)) {
      showingResult = null;
      screen = SCREEN_MENU;
      G = null;
      clearSave();
    }
    return;
  }

  // Notepad
  if (showNotepad) {
    if (btnRects.closeNotepad && hitTest(px, py, btnRects.closeNotepad)) {
      showNotepad = false;
      return;
    }
    for (var i = 0; i < notepadCells.length; i++) {
      var cell = notepadCells[i];
      if (hitTest(px, py, cell)) {
        if (cell.isSol) {
          var cur = G.notepad[cell.key].sol || 0;
          G.notepad[cell.key].sol = [3,0,1,2][cur];
        } else {
          var cur2 = G.notepad[cell.key][cell.player] || 0;
          if (cell.player === 0 && cur2 === 1) return;
          G.notepad[cell.key][cell.player] = [3,0,1,2][cur2];
        }
        saveGame();
        return;
      }
    }
    return;
  }

  // Dialog
  if (showingDialog) {
    if (hitTest(px, py, dialogBtnRects.dlg_suspect_left)) {
      dialogSelections.suspect = (dialogSelections.suspect + 5) % 6;
      return;
    }
    if (hitTest(px, py, dialogBtnRects.dlg_suspect_right)) {
      dialogSelections.suspect = (dialogSelections.suspect + 1) % 6;
      return;
    }
    if (hitTest(px, py, dialogBtnRects.dlg_weapon_left)) {
      dialogSelections.weapon = (dialogSelections.weapon + 5) % 6;
      return;
    }
    if (hitTest(px, py, dialogBtnRects.dlg_weapon_right)) {
      dialogSelections.weapon = (dialogSelections.weapon + 1) % 6;
      return;
    }
    if (showingDialog === "accuse") {
      if (hitTest(px, py, dialogBtnRects.dlg_room_left)) {
        dialogSelections.room = (dialogSelections.room + 8) % 9;
        return;
      }
      if (hitTest(px, py, dialogBtnRects.dlg_room_right)) {
        dialogSelections.room = (dialogSelections.room + 1) % 9;
        return;
      }
    }
    if (hitTest(px, py, dialogBtnRects.cancel)) {
      showingDialog = null;
      return;
    }
    if (hitTest(px, py, dialogBtnRects.confirm)) {
      if (showingDialog === "suggest") {
        showingDialog = null;
        makeSuggestion(0, dialogSelections.suspect, dialogSelections.weapon, G.players[0].inRoom);
      } else if (showingDialog === "accuse") {
        showingDialog = null;
        makeAccusation(0, dialogSelections.suspect, dialogSelections.weapon, dialogSelections.room);
      }
      return;
    }
    return;
  }

  // Menu screen
  if (screen === SCREEN_MENU) {
    if (hitTest(px, py, menuBtnRects.aiMinus)) {
      menuSelection.numAI = Math.max(2, menuSelection.numAI - 1);
      return;
    }
    if (hitTest(px, py, menuBtnRects.aiPlus)) {
      menuSelection.numAI = Math.min(5, menuSelection.numAI + 1);
      return;
    }
    if (hitTest(px, py, menuBtnRects.susMinus)) {
      menuSelection.playerSuspect = (menuSelection.playerSuspect + 5) % 6;
      return;
    }
    if (hitTest(px, py, menuBtnRects.susPlus)) {
      menuSelection.playerSuspect = (menuSelection.playerSuspect + 1) % 6;
      return;
    }
    if (hitTest(px, py, menuBtnRects.start)) {
      screen = SCREEN_GAME;
      newGame(menuSelection.numAI, menuSelection.playerSuspect);
      return;
    }
    if (menuBtnRects.tutorial && hitTest(px, py, menuBtnRects.tutorial)) {
      screen = SCREEN_TUTORIAL;
      tutorialPage = 0;
      return;
    }
    if (menuBtnRects.resume && hitTest(px, py, menuBtnRects.resume)) {
      if (loadGame()) {
        screen = SCREEN_GAME;
        reachableSpots = [];
        showNotepad = false;
        showingDialog = null;
        showingResult = null;
        if (G.currentPlayer !== 0 && !G.gameOver) {
          setTimeout(function(){ aiTurn(G.currentPlayer); }, 500);
        }
      }
      return;
    }
    return;
  }

  // Game screen buttons
  if (btnRects.notepad && hitTest(px, py, btnRects.notepad) && btnRects.notepad.enabled) {
    showNotepad = true;
    return;
  }
  if (btnRects.roll && hitTest(px, py, btnRects.roll) && btnRects.roll.enabled) {
    rollDice();
    return;
  }
  if (btnRects.suggest && hitTest(px, py, btnRects.suggest) && btnRects.suggest.enabled) {
    dialogSelections.suspect = 0;
    dialogSelections.weapon = 0;
    showingDialog = "suggest";
    return;
  }
  if (btnRects.accuse && hitTest(px, py, btnRects.accuse) && btnRects.accuse.enabled) {
    dialogSelections.suspect = 0;
    dialogSelections.weapon = 0;
    dialogSelections.room = 0;
    showingDialog = "accuse";
    return;
  }
  if (btnRects.endturn && hitTest(px, py, btnRects.endturn) && btnRects.endturn.enabled) {
    endTurn();
    return;
  }
  if (btnRects.newgame && hitTest(px, py, btnRects.newgame) && btnRects.newgame.enabled) {
    screen = SCREEN_MENU;
    G = null;
    clearSave();
    return;
  }

  // Board clicks (movement)
  if (G && G.phase === "move" && G.currentPlayer === 0) {
    computeLayout();
    for (var i = 0; i < reachableSpots.length; i++) {
      var rs = reachableSpots[i];
      if (rs.room >= 0) {
        var rr = roomPixelRect(rs.room);
        if (px >= rr.x && px <= rr.x + rr.w && py >= rr.y && py <= rr.y + rr.h) {
          movePlayerTo(0, rs);
          return;
        }
      }
    }
    for (var i = 0; i < reachableSpots.length; i++) {
      var rs2 = reachableSpots[i];
      if (rs2.room < 0) {
        var hp = hallPixelCenter(rs2.hx, rs2.hy);
        var dx = px - hp.x, dy = py - hp.y;
        if (Math.sqrt(dx*dx + dy*dy) < cellW * 0.2) {
          movePlayerTo(0, rs2);
          return;
        }
      }
    }
  }
}

function handleHover(px, py) {
  if (screen !== SCREEN_GAME || !G || G.phase !== "move" || G.currentPlayer !== 0) {
    hoverRoom = -1;
    return;
  }
  if (showNotepad || showingDialog || showingResult) { hoverRoom = -1; return; }

  computeLayout();
  var found = -1;
  for (var i = 0; i < reachableSpots.length; i++) {
    if (reachableSpots[i].room >= 0) {
      var rr = roomPixelRect(reachableSpots[i].room);
      if (px >= rr.x && px <= rr.x + rr.w && py >= rr.y && py <= rr.y + rr.h) {
        found = reachableSpots[i].room;
        break;
      }
    }
  }
  hoverRoom = found;
}

// NES Keyboard controls
function handleKeyDown(e) {
  keysDown[e.key] = true;

  // Tutorial navigation
  if (screen === SCREEN_TUTORIAL) {
    if (e.key === "Enter" || e.key === " ") {
      if (tutorialPage >= TUTORIAL_PAGES.length - 1) {
        screen = SCREEN_MENU;
      } else {
        tutorialPage++;
      }
      e.preventDefault();
      return;
    }
    if (e.key === "ArrowLeft" || e.key === "a") {
      if (tutorialPage > 0) tutorialPage--;
      e.preventDefault();
      return;
    }
    if (e.key === "ArrowRight" || e.key === "d") {
      if (tutorialPage < TUTORIAL_PAGES.length - 1) tutorialPage++;
      e.preventDefault();
      return;
    }
    return;
  }

  if (screen !== SCREEN_GAME || !G || G.currentPlayer !== 0 || G.gameOver) return;

  // NES-style controls
  if (e.key === " " || e.key === "Enter") {
    // A button — context action
    if (G.phase === "roll") {
      rollDice();
      e.preventDefault();
    } else if (G.phase === "suggest" && G.players[0].inRoom >= 0 && !G.suggestedThisTurn) {
      dialogSelections.suspect = 0;
      dialogSelections.weapon = 0;
      showingDialog = "suggest";
      e.preventDefault();
    } else if (G.phase === "endturn" || G.phase === "suggest") {
      endTurn();
      e.preventDefault();
    }
    return;
  }

  if (e.key === "n" || e.key === "N") {
    showNotepad = !showNotepad;
    e.preventDefault();
    return;
  }

  if (e.key === "Escape") {
    if (showNotepad) { showNotepad = false; e.preventDefault(); return; }
    if (showingDialog) { showingDialog = null; e.preventDefault(); return; }
  }

  // Dialog navigation
  if (showingDialog) {
    if (e.key === "ArrowLeft" || e.key === "a") {
      dialogSelections.suspect = (dialogSelections.suspect + 5) % 6;
      e.preventDefault();
    } else if (e.key === "ArrowRight" || e.key === "d") {
      dialogSelections.suspect = (dialogSelections.suspect + 1) % 6;
      e.preventDefault();
    } else if (e.key === "ArrowUp" || e.key === "w") {
      dialogSelections.weapon = (dialogSelections.weapon + 5) % 6;
      e.preventDefault();
    } else if (e.key === "ArrowDown" || e.key === "s") {
      dialogSelections.weapon = (dialogSelections.weapon + 1) % 6;
      e.preventDefault();
    }
    return;
  }
}

function handleKeyUp(e) {
  keysDown[e.key] = false;
}

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() {
  if (!G) return;
  try {
    localStorage.setItem("whodunit-save", JSON.stringify({
      solution: G.solution,
      players: G.players,
      totalPlayers: G.totalPlayers,
      currentPlayer: G.currentPlayer,
      phase: G.phase,
      diceResult: G.diceResult,
      diceTotal: G.diceTotal,
      notepad: G.notepad,
      turnCount: G.turnCount,
      gameOver: G.gameOver,
      winner: G.winner,
      suggestedThisTurn: G.suggestedThisTurn,
      score: score,
      survivedAccusation: survivedAccusation,
      hintsGiven: hintsGiven
    }));
  } catch(e) { console.warn("Save failed:", e); }
}

function loadGame() {
  try {
    var data = localStorage.getItem("whodunit-save");
    if (data) {
      var parsed = JSON.parse(data);
      G = parsed;
      G.animatingDice = false;
      G.diceAnim = null;
      score = parsed.score || 0;
      survivedAccusation = parsed.survivedAccusation || false;
      hintsGiven = parsed.hintsGiven || 0;
      logEntries = [{ msg: "Baseling case resumed from save.", cls: "hl", time: Date.now() }];
      return true;
    }
  } catch(e) { console.warn("Load failed:", e); }
  return false;
}

function clearSave() {
  try { localStorage.removeItem("whodunit-save"); } catch(e) { console.warn("Clear save failed:", e); }
}

// ============================================================
// UTILITY
// ============================================================
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.arcTo(x + w, y, x + w, y + r, r);
  c.lineTo(x + w, y + h - r);
  c.arcTo(x + w, y + h, x + w - r, y + h, r);
  c.lineTo(x + r, y + h);
  c.arcTo(x, y + h, x, y + h - r, r);
  c.lineTo(x, y + r);
  c.arcTo(x, y, x + r, y, r);
  c.closePath();
}

function lighten(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return "#" + [r,g,b].map(function(v){ return v.toString(16).padStart(2,"0"); }).join("");
}

function darken(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return "#" + [r,g,b].map(function(v){ return v.toString(16).padStart(2,"0"); }).join("");
}

function wordWrap(text, maxW, c) {
  var words = text.split(" ");
  var lines = [];
  var line = "";
  for (var i = 0; i < words.length; i++) {
    var test = line ? line + " " + words[i] : words[i];
    if (c.measureText(test).width > maxW && line) {
      lines.push(line);
      line = words[i];
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

  handleInput(e.offsetX, e.offsetY);
});

document.addEventListener("keyup", handleKeyUp);

// ============================================================
// GAME LOOP
// ============================================================
function frame() {
  resize();

  // Update particles
  updateParticles();

  // Screen shake
  var shake = getShakeOffset();

  if (shake.x !== 0 || shake.y !== 0) {
    ctx.save();
    ctx.translate(shake.x, shake.y);
  }

  if (screen === SCREEN_MENU) {
    drawMenu();
  } else if (screen === SCREEN_TUTORIAL) {
    drawTutorial();
  } else if (screen === SCREEN_GAME && G) {
    drawBoard();
    drawHUD();
    drawLog();
    drawPlayerCards();

    if (showNotepad) drawNotepad();
    if (showingDialog) drawDialog();
    if (showingResult) drawResultOverlay();
    if (currentMessage && !showNotepad && !showingDialog && !showingResult) drawMessage();

    // Ambient spore particles in game
    ambientTimer++;
    if (ambientTimer % 30 === 0 && G && !G.gameOver) {
      var ax = Math.random() * W;
      spawnParticle(ax, H + 5, "#38d97311", "rise", 1);
    }
  }

  // Draw particles on top
  drawParticles(ctx);

  if (shake.x !== 0 || shake.y !== 0) {
    ctx.restore();
  }

  requestAnimationFrame(frame);
}

window.addEventListener("resize", resize);
resize();
requestAnimationFrame(frame);

})();
</script>
</body>
</html>
