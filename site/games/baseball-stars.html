(function() {
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'SWING', b: 'PITCH', c: 'PICK' } });

const SAVE_KEY = 'bstars';

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single-player (default 0.8–1.6 band). Derived *_MULT constants are reassigned from the
// clamped mults in recomputeStats() so a menu character change takes effect. Sports wiring:
// STR<-damage (bat power), DEX<-moveSpeed (run/field), CON<-health (stamina), INT/CHA<-luck
// (score/crit), WIS<-luck (pitch accuracy). No water section, so SWM is untouched.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[baseball-stars] NftLoader display info failed:', e && e.message); }

// Derived stat multipliers — assigned in recomputeStats() from the clamped mults.
var STR_MULT, DEX_MULT, CON_MULT, INT_MULT, WIS_MULT, CHA_MULT, BASELING_LEVEL, BASELING_COLOR, BASELING_NAME;

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  STR_MULT = m.damage;     // bat power / hit distance
  DEX_MULT = m.moveSpeed;  // running speed / fielding speed
  CON_MULT = m.health;     // stamina / endurance
  INT_MULT = m.luck;       // score multiplier / strategy bonus
  WIS_MULT = m.luck;       // pitch accuracy (skill/luck bias)
  CHA_MULT = m.luck;       // crowd bonus / luck / critical hits
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  BASELING_LEVEL = sel ? (typeof sel.stage === 'number' ? sel.stage : 0) : 0;
  BASELING_COLOR = statB.color;
  BASELING_NAME = sel ? (sel.charName || statB.name) : statB.name;
  statB.name = BASELING_NAME; statB.level = BASELING_LEVEL;
}
recomputeStats();

var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[baseball-stars] player init failed:', e && e.message); });
}

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2); }
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// === SCORE POPUP SYSTEM (Pass 2) ===
var scorePopups = [];
function addPopup(text, x, y, color) {
  scorePopups.push({ text: text, x: x, y: y, color: color || '#ffcc00', life: 60, maxLife: 60 });
}
function updatePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 0.8 * dt * 60;
    scorePopups[i].life -= dt * 60;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawPopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
}

// === TEAMS — Baseling Themed ===
var TEAMS = [

  { name: "POOP Bombers", abbr: "PPB", colors: ['#a855f7', '#6b21a8'], mascot: 'Bear', lore: 'Bear baselings who fling POOP with fearsome power' },

// === BOSS TEAMS (Pass 3) ===
var BOSS_TEAMS = [

  { name: "Yieldling Terrors", abbr: "YLD", colors: ['#ff3333', '#661111'], boss: true, difficulty: 1.5, lore: 'Evolved yieldlings of terrifying strength', specialPitch: 'Dragonfire Heater' },

];

// === SPECIAL PITCHES — Baseling Themed ===
var PITCHES = [

  { name: "Garden Curve", speed: 5, breakX: 0, breakY: 2.8, color: '#a855f7', desc: 'Bends like a growing vine' },

// === POSITIONS ===
var POS = ['P','C','1B','2B','3B','SS','LF','CF','RF'];

// === STADIUM ZONES (Pass 3) ===
var STADIUM_ZONES = [
  { name: 'Garden Field', sky1: '#0a1a3a', sky2: '#1a3a2a', grass: '#1a5a2a', dirt: '#8a6a3a', wall: '#1a4a1a', crowd: ['#556','#667','#778','#889'], desc: 'Home of the Garden Growers' },
  { name: 'Reactor Park', sky1: '#0a1a4a', sky2: '#1a2a5a', grass: '#1a4a5a', dirt: '#6a7a8a', wall: '#1144aa', crowd: ['#44a','#55b','#66c','#77d'], desc: 'Glowing with reactor energy' },
  { name: 'Compost Diamond', sky1: '#3a1a0a', sky2: '#2a1a0a', grass: '#3a3a1a', dirt: '#aa6a2a', wall: '#aa3311', crowd: ['#a55','#b66','#c77','#d88'], desc: 'The smell of victory and POOP' },
  { name: 'POOP Park', sky1: '#0a0a0a', sky2: '#1a1a0a', grass: '#1a2a1a', dirt: '#5a4a3a', wall: '#333322', crowd: ['#454','#343','#565','#676'], desc: 'Where the haulers play ball' },
  { name: 'Nanny Stadium', sky1: '#1a0a2a', sky2: '#0a1a2a', grass: '#2a2a4a', dirt: '#7a6a9a', wall: '#6b21a8', crowd: ['#a4f','#b5f','#c6f','#d7f'], desc: 'Night games under purple skies' }
];
var currentZone = 0;

// === BASELING CREATURE PLAYER NAMES ===
var FIRST_NAMES = [
  'Bun','Paws','Fern','Sprout','Scoot','Dash','Pip','Nubs','Flop','Twig',
  'Moss','Ruff','Mochi','Chip','Zippy','Acorn','Clover','Digby','Waddle','Patch',
  'Snoot','Fuzzy','Tumble','Bean','Wiggles','Nibble','Muddy','Poppy','Doodle','Scruff',
  'Hops','Grunt','Pudge','Spritz','Chomp','Bumble','Flick','Snuffy','Wobble','Tater'
];
var LAST_NAMES = [
  'Poopsworth','McSnoot','Gardenroot','Dunghill','Ironpaw','Compostberg','Vineclaw',
  'Leafbloom','Thornpaw','Petalfur','Mudweave','Seedpaw','Burrowhold','Mossgate',
  'Fertwell','Yieldmore','Baseborn','Sproutcap','Rootpaw','Gardenfin','Hauledown',
  'Poopball','Nannyhorn','Shovelpaw','Greenleaf','Growmore','Sporewalker','Diggerton'
];

function genName() {
  return pick(FIRST_NAMES) + ' ' + pick(LAST_NAMES);
}

// === PLAYER GENERATION ===
function genPlayer(pos, tier) {
  var base = tier === 'boss' ? 80 : tier === 'star' ? 60 : tier === 'good' ? 40 : 25;
  var variance = 20;
  return {
    name: genName(),
    pos: pos,
    power: clamp(base + rndInt(-variance, variance), 10, 99),
    contact: clamp(base + rndInt(-variance, variance), 10, 99),
    speed: clamp(base + rndInt(-variance, variance), 10, 99),
    arm: clamp(base + rndInt(-variance, variance), 10, 99),
    fielding: clamp(base + rndInt(-variance, variance), 10, 99),
    stamina: pos === 'P' ? clamp(base + rndInt(-variance, variance), 30, 99) : 99,
    hr: 0, rbi: 0, hits: 0, ab: 0, era: 0, ip: 0, er: 0, wins: 0, losses: 0, saves: 0,
    // Baseling flavor
    ability: pick(['Poop Fling','Garden Dash','Nanny Shield','Compost Spin','Root Whip','Seed Burst','Fertilize','Dig In','Yield Boost','Evolve']),
    mushType: pick(['bunny','bear','puppy','fox','hamster','turtle','owl','cat','frog','hedgehog'])
  };
}

function genRoster(teamIdx, boss) {
  var roster = [];
  var tierBase = boss ? 'boss' : 'star';
  var tierMid = boss ? 'star' : 'good';
  var tierLow = boss ? 'good' : 'avg';
  for (var i = 0; i < 9; i++) {
    var tier = i < 2 ? tierBase : i < 5 ? tierMid : tierLow;
    roster.push(genPlayer(POS[i], tier));
  }
  // Bench
  for (var i = 0; i < 3; i++) roster.push(genPlayer('P', tierLow));
  for (var i = 0; i < 2; i++) roster.push(genPlayer(pick(['1B','2B','SS','LF','CF','RF']), tierLow));
  return roster;
}

// === GAME STATE ===
var state = 'title';
var frame = 0;
var season = null;
var match = null;
var menuState = null;
var menuIdx = 0;
var subMenuIdx = 0;
var teamSelectIdx = 0;
var confirmTimer = 0;
var showTutorial = !localStorage.getItem('bstars_tut');
var tutorialPage = 0;
var titleBounce = 0;
var bossEncounter = null;

// === SAVE/LOAD ===
function saveSeason() {
  if (season) localStorage.setItem(SAVE_KEY, JSON.stringify(season));
}

function loadSeason() {
  try {
    var d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.teams) return d;
  } catch(e) { console.error('Load failed:', e); }
  return null;
}

// === SEASON INIT ===
function newSeason(playerTeamIdx) {
  var teams = TEAMS.map(function(t, i) {
    return {
      name: t.name, abbr: t.abbr, colors: t.colors, mascot: t.mascot, lore: t.lore,
      idx: i,
      roster: genRoster(i, false),
      wins: 0, losses: 0,
      money: i === playerTeamIdx ? 500 : 0
    };
  });
  season = {
    teams: teams,
    playerTeam: playerTeamIdx,
    week: 0,
    schedule: genSchedule(),
    playoffs: false,
    champion: null,
    bossesDefeated: 0,
    totalRuns: 0,
    totalHR: 0
  };
  saveSeason();
}

function genSchedule() {
  var sched = [];
  for (var w = 0; w < 14; w++) {
    var pairs = [];
    var order = [0,1,2,3,4,5,6,7].sort(function() { return Math.random() - 0.5; });
    for (var i = 0; i < 8; i += 2) {
      pairs.push([order[i], order[i+1]]);
    }
    sched.push(pairs);
  }
  return sched;
}

// === FIELD POSITIONS ===
var DIAMOND_CX = 240, DIAMOND_CY = 200;
var BASE_DIST = 70;
var BASES = [
  { x: 240, y: 270 },
  { x: 310, y: 200 },
  { x: 240, y: 130 },
  { x: 170, y: 200 }
];
var FIELD_POS = [
  { x: 240, y: 230 },
  { x: 240, y: 278 },
  { x: 320, y: 210 },
  { x: 280, y: 160 },
  { x: 160, y: 210 },
  { x: 200, y: 160 },
  { x: 100, y: 100 },
  { x: 240, y: 70 },
  { x: 380, y: 100 }
];

// === MATCH STATE ===
function initMatch(homeIdx, awayIdx, playerBatting, bossTeam) {
  // Pick stadium zone based on home team or boss
  currentZone = bossTeam ? (3 + rndInt(0, 1)) : homeIdx % STADIUM_ZONES.length;

  match = {
    home: homeIdx, away: awayIdx,
    homeScore: 0, awayScore: 0,
    inning: 1, half: 0,
    outs: 0, strikes: 0, balls: 0,
    bases: [null, null, null],
    batterIdx: 0,
    lineups: [
      [0,1,2,3,4,5,6,7,8],
      [0,1,2,3,4,5,6,7,8]
    ],
    pitcherStamina: [100, 100],
    phase: 'pitch_select',
    ball: { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, active: false },
    pitcher: { x: 240, y: 100, windUp: 0 },
    batter: { x: 240, y: 250, swingTimer: -1, powerHold: 0, swingResult: null },
    selectedPitch: 0,
    pitchAimX: 0, pitchAimY: 0,
    batView: true,
    fielders: [],
    runners: [],
    hitResult: null,
    resultTimer: 0,
    resultText: '',
    celebTimer: 0,
    isPlayerBatting: playerBatting,
    pitchTimer: 0,
    autoFieldTimer: 0,
    flyBall: false,
    catchTarget: null,
    throwTarget: null,
    throwBall: { x: 0, y: 0, active: false, tx: 0, ty: 0 },
    mercyRule: false,
    gameLog: [],
    isBoss: !!bossTeam,
    bossData: bossTeam || null,
    comboHits: 0,
    streakBonus: 0,
    crowdMeter: 50,
    shakeFrames: 0,
    shakeIntensity: 0
  };
  initFielders();
}

function initFielders() {
  match.fielders = FIELD_POS.map(function(p, i) {
    return {
      x: p.x, y: p.y, homeX: p.x, homeY: p.y,
      hasBall: i === 0, targetX: p.x, targetY: p.y
    };
  });
}

function getBattingTeam() { return match.half === 0 ? season.teams[match.away] : season.teams[match.home]; }
function getPitchingTeam() { return match.half === 0 ? season.teams[match.home] : season.teams[match.away]; }
function getCurrentBatter() {
  var team = getBattingTeam();
  var li = match.lineups[match.half];
  return team.roster[li[match.batterIdx % 9]];
}
function getCurrentPitcher() {
  var team = getPitchingTeam();
  return team.roster[0];
}
function isPlayerAtBat() {
  var batTeam = match.half === 0 ? match.away : match.home;
  return batTeam === season.playerTeam;
}
function isPlayerPitching() {
  var pitchTeam = match.half === 0 ? match.home : match.away;
  return pitchTeam === season.playerTeam;
}

// === CROWD METER — CHA scales crowd bonus (Pass 1) ===
function updateCrowd(event) {
  var chaBoost = CHA_MULT;  // statB.luck / CHA influence
  if (event === 'hr') match.crowdMeter = Math.min(100, match.crowdMeter + 25 * chaBoost);
  else if (event === 'hit') match.crowdMeter = Math.min(100, match.crowdMeter + 8 * chaBoost);
  else if (event === 'strikeout') match.crowdMeter = Math.max(0, match.crowdMeter - 10);
  else if (event === 'out') match.crowdMeter = Math.max(0, match.crowdMeter - 5);
  // Crowd meter above 80 gives bonus to player team — CHA driven
  if (match.crowdMeter > 80) match.streakBonus = 0.1 * chaBoost;
  else match.streakBonus = 0;
}

// === PITCH MECHANICS ===
function throwPitch() {
  var pitcher = getCurrentPitcher();
  var pitch = PITCHES[match.selectedPitch];
  // Boss teams can use special pitches
  if (match.isBoss && match.bossData && !isPlayerPitching()) {
    if (Math.random() < 0.3) {
      var bp = BOSS_PITCHES.find(function(p) { return p.name === match.bossData.specialPitch; });
      if (bp) pitch = bp;
    }
  }
  var staminaMod = match.pitcherStamina[match.half === 0 ? 1 : 0] / 100;
  var armMod = pitcher.arm / 100;
  // WIS_MULT (statB.cooldown) improves pitch accuracy when player pitches
  var wisBonus = isPlayerPitching() ? WIS_MULT : 1;
  var speed = pitch.speed * staminaMod * (0.8 + armMod * 0.4) * wisBonus;
  var accuracy = armMod * staminaMod * wisBonus;
  var aimOffX = match.pitchAimX * 30 + rnd(-1, 1) * (1 - accuracy) * 20;
  var aimOffY = match.pitchAimY * 20 + rnd(-1, 1) * (1 - accuracy) * 15;
  // CON_MULT (statB.hpMult) reduces stamina drain
  var staminaDrain = (0.5 + (1 - staminaMod) * 0.5) / CON_MULT;

  match.ball = {
    x: 240, y: 100, z: 0,
    vx: aimOffX * 0.02 + pitch.breakX * 0.3 * (Math.random() > 0.5 ? 1 : -1),
    vy: speed * 1.5,
    vz: 0,
    targetX: 240 + aimOffX,
    targetY: 250 + aimOffY,
    active: true,
    t: 0,
    startX: 240, startY: 100,
    breakX: pitch.breakX * (Math.random() > 0.5 ? 1 : -1),
    breakY: pitch.breakY,
    speed: speed,
    pitchColor: pitch.color || '#fff'
  };
  match.phase = 'pitching';
  match.batter.swingTimer = -1;
  match.batter.powerHold = 0;
  match.pitcherStamina[match.half === 0 ? 1 : 0] -= staminaDrain;
  TAS.audio.playTone(200, 0.05, 'square');

  // Spore trail particles for pitch
  for (var i = 0; i < 3; i++) {
    TAS.particles.spawn(240 + rnd(-5, 5), 105 + rnd(-5, 5), {
      count: 1, color: pitch.color || '#8f8', speed: 0.5, life: 15
    });
  }
}

function attemptSwing(power) {
  var batter = getCurrentBatter();
  var ball = match.ball;
  var timing = ball.t;
  var sweetSpot = timing > 0.72 && timing < 0.88;
  var contactChance = batter.contact / 100;
  var isStrike = Math.abs(ball.targetX - 240) < 25 && Math.abs(ball.targetY - 250) < 20;

  // CHA_MULT (statB.luck) widens sweet spot for player
  var sweetLo = 0.72 - (CHA_MULT - 1) * 0.04;
  var sweetHi = 0.88 + (CHA_MULT - 1) * 0.04;
  if (isPlayerAtBat()) sweetSpot = timing > sweetLo && timing < sweetHi;

  var hitQuality = 0;
  if (sweetSpot) {
    hitQuality = 0.5 + contactChance * 0.5 + rnd(-0.1, 0.1);
  } else {
    hitQuality = Math.max(0, contactChance * 0.3 - Math.abs(timing - 0.8) * 2 + rnd(-0.2, 0.1));
  }

  // DEX_MULT (statB.speed) boosts contact quality for player
  if (isPlayerAtBat()) hitQuality *= (0.8 + DEX_MULT * 0.2);

  var pullDir = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.touch.left) pullDir = -1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.touch.right) pullDir = 1;

  match.batter.swingTimer = 8;
  TAS.audio.playTone(300, 0.04, 'square');

  if (hitQuality < 0.15) {
    match.batter.swingResult = 'miss';
    match.strikes++;
    updateCrowd('strikeout');
    // Miss particles — whiff of spores
    TAS.particles.spawn(250, 270, { count: 4, color: '#886', speed: 1.5, life: 12 });
    if (match.strikes >= 3) {
      match.comboHits = 0;
      recordOut('K');
    }
    return;
  }

  // Contact made
  TAS.audio.playTone(800, 0.08, 'square');
  // STR_MULT (statB.damage) amplifies bat power for player team
  var strBonus = isPlayerAtBat() ? STR_MULT : 1;
  var powerMod = (batter.power / 100) * power * strBonus;
  var angle = rnd(-40, 40) + pullDir * 25;
  var launchAngle = hitQuality * 45 + rnd(-10, 10);
  var hitPower = hitQuality * powerMod;

  // Contact particle burst
  var sparkColor = hitPower > 0.6 ? '#ffcc00' : '#fff';
  TAS.particles.spawn(240, 265, { count: 8, color: sparkColor, speed: 3, life: 15 });
  TAS.fx.shake(3 + hitPower * 5, 4);

  // Foul ball check — CHA_MULT reduces foul chance
  var foulThreshold = 50 - (CHA_MULT - 1) * 5;
  if (Math.abs(angle) > foulThreshold || (hitQuality < 0.25 && Math.random() < 0.4 / CHA_MULT)) {
    match.batter.swingResult = 'foul';
    if (match.strikes < 2) match.strikes++;
    match.resultText = 'FOUL BALL';
    match.resultTimer = 40;
    TAS.particles.spawn(240, 250, { count: 5, color: '#fff', speed: 2, life: 20 });
    return;
  }

  // Ball is in play
  match.batter.swingResult = 'hit';
  match.comboHits++;
  updateCrowd('hit');
  var speedFactor = 3 + hitPower * 8;
  var rad = (angle - 90) * Math.PI / 180;
  match.ball = {
    x: 240, y: 270, z: 10,
    vx: Math.cos(rad) * speedFactor,
    vy: Math.sin(rad) * speedFactor * -1,
    vz: Math.sin(launchAngle * Math.PI / 180) * speedFactor * 0.7,
    active: true, hitPower: hitPower, angle: angle, launchAngle: launchAngle
  };
  match.flyBall = launchAngle > 25;

  // HR check — STR_MULT lowers HR threshold for player
  var hrThreshold = isPlayerAtBat() ? Math.max(0.4, 0.7 - (STR_MULT - 1) * 0.1) : 0.7;
  if (hitPower > hrThreshold && launchAngle > 20 && launchAngle < 50) {
    match.hitResult = 'HR';
    match.phase = 'hit_flight';
    match.celebTimer = 90;
    homeRun();
    return;
  }

  match.phase = 'fielding';
  match.batView = false;
  match.autoFieldTimer = 0;

  // DEX_MULT (statB.speed) boosts runner speed for player team
  var runSpeedBonus = isPlayerAtBat() ? DEX_MULT : 1;
  match.runners = [{ base: 0, x: BASES[0].x, y: BASES[0].y, targetBase: 1, speed: batter.speed / 15 * runSpeedBonus }];
  for (var i = 2; i >= 0; i--) {
    if (match.bases[i]) {
      var r = match.bases[i];
      match.runners.push({ base: i + 1, x: BASES[i+1].x, y: BASES[i+1].y, targetBase: i + 2, speed: r.speed / 15 * runSpeedBonus });
      match.bases[i] = null;
    }
  }
}

function homeRun() {
  var batter = getCurrentBatter();
  var runs = 1;
  for (var i = 0; i < 3; i++) {
    if (match.bases[i]) { runs++; match.bases[i] = null; }
  }
  // INT_MULT (statB.scoreMult) gives bonus runs on grand slams for player
  var bonusRun = 0;
  if (isPlayerAtBat() && runs >= 4 && INT_MULT > 1.2 && Math.random() < 0.3) {
    bonusRun = 1;
    addPopup('STRATEGY BONUS +1!', 240, 100, '#00ffcc');
  }
  var totalRuns = runs + bonusRun;
  if (match.half === 0) match.awayScore += totalRuns;
  else match.homeScore += totalRuns;
  batter.hr++;
  batter.rbi += totalRuns;
  batter.hits++;
  batter.ab++;
  if (season) {
    season.totalRuns = (season.totalRuns || 0) + totalRuns;
    season.totalHR = (season.totalHR || 0) + 1;
  }

  match.resultText = runs === 4 ? 'GRAND SLAM!' : runs > 1 ? runs + '-RUN HOMER!' : 'HOME RUN!';
  match.resultTimer = 90;
  match.gameLog.push(match.resultText);
  updateCrowd('hr');

  // Score popup — INT_MULT multiplies displayed points
  var displayRuns = Math.floor(totalRuns * INT_MULT);
  addPopup('+' + displayRuns + ' RUNS!', 240, 130, '#ffcc00');

  // Screen shake — bigger for player with STR
  var shakeAmt = isPlayerAtBat() ? 8 * STR_MULT : 8;
  TAS.fx.shake(Math.min(15, shakeAmt), 15);
  match.shakeFrames = 20;
  match.shakeIntensity = shakeAmt;

  TAS.audio.playTone(500, 0.15, 'square');
  setTimeout(function() { TAS.audio.playTone(700, 0.1, 'square'); }, 100);
  setTimeout(function() { TAS.audio.playTone(900, 0.12, 'square'); }, 200);

  // Fireworks — more particles for combo hits
  var particleCount = 30 + match.comboHits * 5;
  for (var i = 0; i < particleCount; i++) {
    TAS.particles.spawn(rnd(60, 420), rnd(10, 130), {
      count: 3, color: pick(['#ff0','#f80','#f00','#0ff','#fff','#4f4',BASELING_COLOR]),
      speed: rnd(1, 5), life: rnd(30, 70), gravity: 0.05
    });
  }

  // Mushroom explosion effect
  for (var i = 0; i < 8; i++) {
    var a = (i / 8) * Math.PI * 2;
    TAS.particles.spawn(240 + Math.cos(a) * 30, 150 + Math.sin(a) * 20, {
      count: 2, color: BASELING_COLOR, speed: 2, life: 40, gravity: 0.02
    });
  }
}

function recordOut(type) {
  match.outs++;
  match.strikes = 0;
  match.balls = 0;
  match.resultText = type === 'K' ? 'STRIKEOUT!' : type === 'fly' ? 'FLY OUT!' : type === 'ground' ? 'GROUND OUT!' : 'OUT!';
  match.resultTimer = 50;
  match.gameLog.push(match.resultText);
  getCurrentBatter().ab++;
  updateCrowd('out');

  // Catch particles
  if (type === 'fly') {
    TAS.particles.spawn(match.ball.x || 240, match.ball.y || 150, {
      count: 6, color: '#fff', speed: 2, life: 15
    });
  }

  if (match.outs >= 3) {
    endHalfInning();
  } else {
    nextBatter();
  }
  TAS.audio.playTone(150, 0.1, 'triangle');
}

function recordHit(bases) {
  var batter = getCurrentBatter();
  batter.hits++;
  batter.ab++;
  var names = ['', 'SINGLE!', 'DOUBLE!', 'TRIPLE!'];
  match.resultText = names[bases];
  match.resultTimer = 50;
  match.gameLog.push(batter.name.split(' ')[1] + ' - ' + names[bases]);
  match.comboHits++;
  updateCrowd('hit');

  // Hit popup with combo counter
  if (match.comboHits > 1) {
    addPopup('COMBO x' + match.comboHits + '!', 240, 180, '#00ff88');
  }
  addPopup(names[bases], 240, 150, '#ffcc00');

  var runs = 0;
  for (var i = 2; i >= 0; i--) {
    if (match.bases[i]) {
      var newBase = i + 1 + bases;
      if (newBase > 3) { runs++; match.bases[i] = null; }
      else { match.bases[newBase - 1] = match.bases[i]; match.bases[i] = null; }
    }
  }
  if (bases >= 4) { runs++; }
  else { match.bases[bases - 1] = batter; }

  if (runs > 0) {
    // INT_MULT (statB.scoreMult) adds score bonus for player
    var scoreBonus = isPlayerAtBat() ? Math.floor(runs * (INT_MULT - 1)) : 0;
    var totalRuns = runs + scoreBonus;
    if (match.half === 0) match.awayScore += totalRuns;
    else match.homeScore += totalRuns;
    batter.rbi += totalRuns;
    if (season) season.totalRuns = (season.totalRuns || 0) + totalRuns;
    if (scoreBonus > 0) addPopup('INT BONUS +' + scoreBonus + '!', 240, 120, '#44aaff');
    addPopup('+' + totalRuns + ' RUNS', 240, 100, '#ffcc00');
  }

  TAS.audio.playTone(600, 0.08, 'square');
  nextBatter();
}

function nextBatter() {
  match.batterIdx = (match.batterIdx + 1) % 9;
  match.strikes = 0;
  match.balls = 0;
  match.phase = 'pitch_select';
  match.batView = true;
  match.batter.swingTimer = -1;
  match.batter.powerHold = 0;
  initFielders();
}

function endHalfInning() {
  match.outs = 0;
  match.strikes = 0;
  match.balls = 0;
  match.bases = [null, null, null];
  match.runners = [];
  match.batView = true;
  match.comboHits = 0;

  if (match.half === 0) {
    match.half = 1;
    match.batterIdx = 0;
  } else {
    match.half = 0;
    match.batterIdx = 0;
    match.inning++;
  }

  if (match.inning > 9 || (match.inning > 5 && Math.abs(match.homeScore - match.awayScore) >= 10)) {
    if (match.inning > 9 && match.homeScore !== match.awayScore) {
      match.phase = 'game_over';
      match.mercyRule = Math.abs(match.homeScore - match.awayScore) >= 10;
      endGame();
      return;
    }
    if (match.inning > 5 && Math.abs(match.homeScore - match.awayScore) >= 10) {
      match.phase = 'game_over';
      match.mercyRule = true;
      endGame();
      return;
    }
  }

  // Stamina recovery between innings — CON_MULT helps
  var conRecovery = 3 * CON_MULT;
  match.pitcherStamina[0] = Math.min(100, match.pitcherStamina[0] + conRecovery);
  match.pitcherStamina[1] = Math.min(100, match.pitcherStamina[1] + conRecovery);

  match.phase = 'inning_change';
  match.resultText = match.half === 0 ? 'TOP ' + match.inning : 'BOTTOM ' + match.inning;
  match.resultTimer = 60;
  initFielders();
}

function endGame() {
  var winner = match.homeScore > match.awayScore ? match.home : match.away;
  var loser = winner === match.home ? match.away : match.home;
  season.teams[winner].wins++;
  season.teams[loser].losses++;

  // Win money — INT_MULT gives player more money
  var winMoney = winner === season.playerTeam ? Math.floor(200 * INT_MULT) : 0;
  var loseMoney = loser === season.playerTeam ? 50 : 0;
  var bossBonus = match.isBoss && winner === season.playerTeam ? 500 : 0;
  season.teams[season.playerTeam].money += winMoney + loseMoney + bossBonus;

  if (match.isBoss && winner === season.playerTeam) {
    season.bossesDefeated = (season.bossesDefeated || 0) + 1;
    addPopup('BOSS DEFEATED!', 240, 80, '#ff3333');
  }

  match.resultText = season.teams[winner].name + ' WIN!';
  match.resultTimer = 120;
  match.gameLog.push(match.resultText);
}

// === AI LOGIC ===
function aiPitch() {
  // Boss AI uses more pitch variety
  var maxPitch = match.isBoss ? Math.min(5, PITCHES.length - 1) : 3;
  match.selectedPitch = rndInt(0, maxPitch);
  match.pitchAimX = rnd(-1, 1);
  match.pitchAimY = rnd(-0.5, 0.5);
  // Boss teams aim more accurately
  if (match.isBoss) {
    match.pitchAimX *= 0.6;
    match.pitchAimY *= 0.6;
  }
  throwPitch();
}

function aiBat() {
  var ball = match.ball;
  if (!ball.active) return;
  if (ball.t > 0.7 && ball.t < 0.9) {
    var batter = getCurrentBatter();
    var swingChance = batter.contact / 130;
    // Boss batters are more dangerous
    if (match.isBoss) swingChance *= (match.bossData ? match.bossData.difficulty : 1.3);
    if (Math.random() < swingChance) {
      attemptSwing(rnd(0.5, 1.0));
    }
  } else if (ball.t > 0.95) {
    if (Math.random() < 0.2) attemptSwing(rnd(0.3, 0.7));
  }
}

function aiField() {
  if (!match.ball.active) return;
  var minD = Infinity, closest = -1;
  for (var i = 0; i < match.fielders.length; i++) {
    var f = match.fielders[i];
    var d = dist(f.x, f.y, match.ball.x, match.ball.y);
    if (d < minD) { minD = d; closest = i; }
  }
  if (closest >= 0) {
    match.fielders[closest].targetX = match.ball.x;
    match.fielders[closest].targetY = match.ball.y;
  }
}

// === FIELDING UPDATE ===
function updateFielding(dt) {
  var ball = match.ball;
  if (!ball.active) return;

  ball.x += ball.vx * dt * 60;
  ball.y += ball.vy * dt * 60;
  ball.z += ball.vz * dt * 60;
  ball.vz -= 0.15 * dt * 60;
  ball.vx *= 0.99;
  ball.vy *= 0.99;

  // DEX_MULT (statB.speed) boosts fielder speed when player is pitching/fielding
  var fieldSpeedBonus = isPlayerPitching() ? DEX_MULT : 1;
  for (var i = 0; i < match.fielders.length; i++) {
    var f = match.fielders[i];
    var spd = 2.5 * dt * 60 * fieldSpeedBonus;
    var dx = f.targetX - f.x;
    var dy = f.targetY - f.y;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d > 2) {
      f.x += (dx / d) * spd;
      f.y += (dy / d) * spd;
    }
  }

  for (var i = match.runners.length - 1; i >= 0; i--) {
    var r = match.runners[i];
    if (r.targetBase > 3) {
      var homeX = BASES[0].x, homeY = BASES[0].y;
      var dx = homeX - r.x, dy = homeY - r.y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < 5) {
        if (match.half === 0) match.awayScore++;
        else match.homeScore++;
        match.runners.splice(i, 1);
        addPopup('RUN SCORED!', homeX, homeY - 20, '#ffcc00');
        TAS.audio.playTone(700, 0.06, 'square');
        continue;
      }
      r.x += (dx / d) * r.speed * dt * 60;
      r.y += (dy / d) * r.speed * dt * 60;
    } else {
      var tgt = BASES[r.targetBase];
      var dx = tgt.x - r.x, dy = tgt.y - r.y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < 5) {
        r.base = r.targetBase;
        r.x = tgt.x;
        r.y = tgt.y;
      } else {
        r.x += (dx / d) * r.speed * dt * 60;
        r.y += (dy / d) * r.speed * dt * 60;
      }
    }
  }

  aiField();

  if (ball.z <= 0 && ball.vz < 0) {
    ball.z = 0;
    ball.vz = 0;
    ball.vx *= 0.7;
    ball.vy *= 0.7;

    for (var i = 0; i < match.fielders.length; i++) {
      var f = match.fielders[i];
      // DEX_MULT widens catch radius for player fielding
      var catchRadius = isPlayerPitching() ? 15 * (0.8 + DEX_MULT * 0.2) : 15;
      if (dist(f.x, f.y, ball.x, ball.y) < catchRadius) {
        f.hasBall = true;
        ball.active = false;

        // Catch particles
        TAS.particles.spawn(f.x, f.y, { count: 5, color: '#fff', speed: 1.5, life: 12 });

        if (match.flyBall && match.autoFieldTimer < 40) {
          recordOut('fly');
          match.batView = true;
          return;
        }

        if (match.runners.length > 0) {
          var lead = match.runners[0];
          if (lead.targetBase <= 1) {
            var d = dist(f.x, f.y, BASES[1].x, BASES[1].y);
            var armSpd = getPitchingTeam().roster[i] ? getPitchingTeam().roster[i].arm / 20 : 3;
            var throwTime = d / (armSpd * 60);
            var runnerDist = dist(lead.x, lead.y, BASES[1].x, BASES[1].y);
            var runTime = runnerDist / (lead.speed * 60);
            if (throwTime < runTime + 0.3) {
              recordOut('ground');
              match.batView = true;
              return;
            }
          }
        }

        var hitDist = dist(240, 270, ball.x, ball.y);
        var basesHit = 1;
        if (hitDist > 200) basesHit = 3;
        else if (hitDist > 140) basesHit = 2;
        recordHit(basesHit);
        match.batView = true;
        return;
      }
    }
  }

  if (ball.x < 20 || ball.x > 460 || ball.y < 10) {
    if (ball.y < 10 && Math.abs(ball.x - 240) < 150) {
      ball.active = false;
      homeRun();
      match.celebTimer = 90;
    } else {
      ball.active = false;
      if (match.strikes < 2) match.strikes++;
      match.resultText = 'FOUL BALL';
      match.resultTimer = 40;
      match.phase = 'pitch_select';
      match.batView = true;
      match.runners = [];
    }
    return;
  }

  match.autoFieldTimer++;
  if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1 && ball.z < 1) {
    ball.active = false;
    var hitDist = dist(240, 270, ball.x, ball.y);
    var basesHit = 1;
    if (hitDist > 200) basesHit = 3;
    else if (hitDist > 140) basesHit = 2;
    recordHit(basesHit);
    match.batView = true;
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updatePopups(dt);
  if (confirmTimer > 0) confirmTimer--;
  if (match && match.shakeFrames > 0) match.shakeFrames--;

  var keys = TAS.input.keys;
  var aPress = TAS.input.justPressed('a') || TAS.input.touch.a;
  var bPress = TAS.input.justPressed('b') || TAS.input.touch.b;
  var up = keys['ArrowUp'] || TAS.input.touch.up;
  var down = keys['ArrowDown'] || TAS.input.touch.down;
  var left = keys['ArrowLeft'] || TAS.input.touch.left;
  var right = keys['ArrowRight'] || TAS.input.touch.right;

  // Tutorial overlay state
  if (state === 'tutorial') {
    if (aPress || bPress) {
      tutorialPage++;
      if (tutorialPage >= TUTORIAL_PAGES.length) {
        localStorage.setItem('bstars_tut', '1');
        showTutorial = false;
        state = 'title';
      }
    }
    return;
  }

  if (state === 'title') {
    titleBounce += dt * 2;
    if (picking) return; // character-select overlay open — swallow game input
    if (keys['KeyC'] || TAS.input.touch.c) {
      keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (aPress) {
      if (showTutorial) {
        state = 'tutorial';
        tutorialPage = 0;
        return;
      }
      var saved = loadSeason();
      if (saved) {
        state = 'main_menu';
        season = saved;
        menuIdx = 0;
      } else {
        state = 'team_select';
        teamSelectIdx = 0;
      }
    }
    return;
  }

  if (state === 'team_select') {
    if (TAS.input.justPressed('ArrowUp')) teamSelectIdx = (teamSelectIdx + 7) % 8;
    if (TAS.input.justPressed('ArrowDown')) teamSelectIdx = (teamSelectIdx + 1) % 8;
    if (aPress) {
      newSeason(teamSelectIdx);
      state = 'main_menu';
      menuIdx = 0;
    }
    return;
  }

  if (state === 'main_menu') {
    var opts = ['Next Game', 'Standings', 'Team Roster', 'Upgrade Stats', 'Free Agents', 'Boss Challenge', 'New Season'];
    if (TAS.input.justPressed('ArrowUp')) menuIdx = (menuIdx + opts.length - 1) % opts.length;
    if (TAS.input.justPressed('ArrowDown')) menuIdx = (menuIdx + 1) % opts.length;
    if (aPress) {
      if (menuIdx === 0) startNextGame();
      else if (menuIdx === 1) state = 'standings';
      else if (menuIdx === 2) { state = 'roster'; subMenuIdx = 0; }
      else if (menuIdx === 3) { state = 'upgrade'; subMenuIdx = 0; }
      else if (menuIdx === 4) { state = 'free_agents'; subMenuIdx = 0; generateFreeAgents(); }
      else if (menuIdx === 5) { startBossChallenge(); }
      else if (menuIdx === 6) { state = 'team_select'; teamSelectIdx = season.playerTeam; }
    }
    return;
  }

  if (state === 'standings' || state === 'roster') {
    if (bPress || aPress) { state = 'main_menu'; }
    return;
  }

  if (state === 'upgrade') {
    updateUpgradeMenu(dt);
    return;
  }

  if (state === 'free_agents') {
    updateFreeAgentMenu(dt);
    return;
  }

  if (state === 'playing') {
    updateMatch(dt);
    return;
  }

  if (state === 'post_game') {
    if (aPress) {
      season.week++;
      saveSeason();
      if (season.week >= 14) {
        state = 'standings';
      } else {
        state = 'main_menu';
      }
    }
    return;
  }
}

// === FREE AGENTS ===
var freeAgents = [];
function generateFreeAgents() {
  freeAgents = [];
  for (var i = 0; i < 6; i++) {
    var p = genPlayer(pick(POS), pick(['good', 'star']));
    p.cost = Math.floor((p.power + p.contact + p.speed + p.arm + p.fielding) / 5 * 3 + rndInt(50, 150));
    freeAgents.push(p);
  }
}

function updateFreeAgentMenu(dt) {
  if (TAS.input.justPressed('ArrowUp')) subMenuIdx = Math.max(0, subMenuIdx - 1);
  if (TAS.input.justPressed('ArrowDown')) subMenuIdx = Math.min(freeAgents.length - 1, subMenuIdx + 1);
  if (TAS.input.justPressed('b') || TAS.input.touch.b) { state = 'main_menu'; return; }
  if (TAS.input.justPressed('a') || TAS.input.touch.a) {
    var fa = freeAgents[subMenuIdx];
    var team = season.teams[season.playerTeam];
    if (team.money >= fa.cost) {
      team.money -= fa.cost;
      var weakest = -1, weakStat = Infinity;
      for (var i = 0; i < team.roster.length; i++) {
        var r = team.roster[i];
        var total = r.power + r.contact + r.speed + r.arm + r.fielding;
        if (total < weakStat) { weakStat = total; weakest = i; }
      }
      if (weakest >= 0 && team.roster.length >= 14) {
        team.roster[weakest] = fa;
      } else {
        team.roster.push(fa);
      }
      freeAgents.splice(subMenuIdx, 1);
      if (subMenuIdx >= freeAgents.length) subMenuIdx = Math.max(0, freeAgents.length - 1);
      TAS.audio.playTone(800, 0.08, 'square');
      saveSeason();
    } else {
      TAS.audio.playTone(100, 0.1, 'triangle');
    }

// === MATCH UPDATE ===
function updateMatch(dt) {
  if (match.resultTimer > 0) {
    match.resultTimer -= dt * 60;
    if (match.resultTimer <= 0 && match.phase === 'game_over') {
      state = 'post_game';
    }
    if (match.resultTimer <= 0 && match.phase === 'inning_change') {
      match.phase = 'pitch_select';
    }
    return;
  }

  if (match.celebTimer > 0) {
    match.celebTimer -= dt * 60;
    if (frame % 5 === 0) {
      TAS.particles.spawn(rnd(50, 430), rnd(10, 100), {
        count: 2, color: pick(['#ff0','#f80','#0ff','#fff',BASELING_COLOR]),
        speed: rnd(1, 3), life: rnd(20, 40), gravity: 0.05
      });
    }
    if (match.celebTimer <= 0) {
      nextBatter();
    }
    return;
  }

  if (match.phase === 'pitch_select') {
    if (isPlayerPitching()) {
      if (TAS.input.justPressed('b') || TAS.input.touch.b) {
        match.selectedPitch = (match.selectedPitch + 1) % PITCHES.length;
        TAS.audio.playTone(400, 0.03, 'square');
      }
      if (TAS.input.keys['ArrowLeft'] || TAS.input.touch.left) match.pitchAimX = clamp(match.pitchAimX - 0.05, -1, 1);
      if (TAS.input.keys['ArrowRight'] || TAS.input.touch.right) match.pitchAimX = clamp(match.pitchAimX + 0.05, -1, 1);
      if (TAS.input.keys['ArrowUp'] || TAS.input.touch.up) match.pitchAimY = clamp(match.pitchAimY - 0.05, -1, 1);
      if (TAS.input.keys['ArrowDown'] || TAS.input.touch.down) match.pitchAimY = clamp(match.pitchAimY + 0.05, -1, 1);
      if (TAS.input.justPressed('a') || TAS.input.touch.a) {
        throwPitch();
      }
    } else {
      match.pitchTimer++;
      if (match.pitchTimer > 30) {
        match.pitchTimer = 0;
        aiPitch();
      }
    }
    return;
  }

  if (match.phase === 'pitching') {
    var ball = match.ball;
    // WIS_MULT affects pitch speed perception for player
    var speedMod = isPlayerPitching() ? ball.speed * 0.12 : ball.speed * 0.12;
    ball.t += dt * speedMod;
    ball.x = lerp(ball.startX, ball.targetX, ball.t) + Math.sin(ball.t * Math.PI) * ball.breakX * 15;
    ball.y = lerp(ball.startY, ball.targetY, ball.t) + Math.sin(ball.t * Math.PI) * ball.breakY * 10;

    // Pitch trail particles
    if (frame % 3 === 0 && ball.active) {
      TAS.particles.spawn(ball.x, ball.y, {
        count: 1, color: ball.pitchColor || '#8f8', speed: 0.3, life: 8
      });
    }

    if (isPlayerAtBat()) {
      if (TAS.input.keys['a'] || TAS.input.touch.a) {
        match.batter.powerHold = Math.min(match.batter.powerHold + dt * 2, 1.0);
      }
      if (TAS.input.justReleased('a') || (!TAS.input.touch.a && match.batter.powerHold > 0)) {
        if (match.batter.powerHold > 0.05) {
          attemptSwing(match.batter.powerHold);
          match.batter.powerHold = 0;
        }
      }
    } else {
      aiBat();
    }

    if (ball.t >= 1.0) {
      ball.active = false;
      if (match.batter.swingResult === null) {
        var isStrike = Math.abs(ball.targetX - 240) < 25 && Math.abs(ball.targetY - 250) < 20;
        if (isStrike) {
          match.strikes++;
          match.resultText = 'STRIKE ' + match.strikes;
          if (match.strikes >= 3) { recordOut('K'); return; }
        } else {
          match.balls++;
          match.resultText = 'BALL ' + match.balls;
          if (match.balls >= 4) {
            match.resultText = 'WALK';
            match.gameLog.push('Walk');
            if (match.bases[0] && match.bases[1] && match.bases[2]) {
              if (match.half === 0) match.awayScore++;
              else match.homeScore++;
              match.bases[2] = null;
            }
            if (match.bases[0] && match.bases[1]) match.bases[2] = match.bases[1];
            if (match.bases[0]) match.bases[1] = match.bases[0];
            match.bases[0] = getCurrentBatter();
            nextBatter();
          }
        }
        match.resultTimer = 30;
        if (match.phase !== 'game_over') match.phase = 'pitch_select';
      }
      match.batter.swingResult = null;
    }
    return;
  }

  if (match.phase === 'fielding') {
    updateFielding(dt);
    return;
  }

  if (match.phase === 'hit_flight') {
    match.ball.y -= 3 * dt * 60;
    match.ball.x += match.ball.vx * 0.3 * dt * 60;
    if (match.ball.y < 0) match.ball.active = false;
    // Trail particles for HR ball
    if (frame % 2 === 0) {
      TAS.particles.spawn(match.ball.x, match.ball.y, {
        count: 1, color: '#ffcc00', speed: 1, life: 20, gravity: 0.05
      });
    }
    return;
  }
}

function startNextGame() {
  if (season.week >= 14) { state = 'standings'; return; }
  var week = season.schedule[season.week];
  var gameFound = false;
  for (var p = 0; p < week.length; p++) {
    var pair = week[p];
    if (pair[0] === season.playerTeam || pair[1] === season.playerTeam) {
      var home = pair[0] === season.playerTeam ? pair[0] : pair[1];
      var away = pair[0] === season.playerTeam ? pair[1] : pair[0];
      initMatch(home, away, true, null);
      state = 'playing';
      gameFound = true;
      break;
    }
  }
  if (!gameFound) {
    season.week++;
    saveSeason();
  }
  for (var p = 0; p < week.length; p++) {
    var pair = week[p];
    if (pair[0] !== season.playerTeam && pair[1] !== season.playerTeam) {
      var winner = Math.random() > 0.5 ? pair[0] : pair[1];
      var loser = winner === pair[0] ? pair[1] : pair[0];
      season.teams[winner].wins++;
      season.teams[loser].losses++;
    }
  }
}

  ctx.fillRect(x - 7, y + 4 + bob, 5, 3);

}

    ctx.font = (sel ? 'bold ' : '') + '13px monospace';
    ctx.textAlign = 'center';
    // Boss challenge special color
    if (i === 5) ctx.fillStyle = sel ? '#ff4444' : '#883333';
    ctx.fillText(opts[i], 240, y + 7);
  }
  TAS.input.drawTouchControls(GW, GH);
}

function drawStandings() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STANDINGS', 240, 25);

  var sorted = season.teams.filter(function(t) { return t && t.idx < 90; }).sort(function(a, b) { return b.wins - a.wins || a.losses - b.losses; });
  ctx.font = '10px monospace';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'left';
  ctx.fillText('TEAM', 60, 48);
  ctx.textAlign = 'right';
  ctx.fillText('W', 340, 48);
  ctx.fillText('L', 380, 48);
  ctx.fillText('PCT', 420, 48);

  for (var i = 0; i < sorted.length; i++) {
    var t = sorted[i];
    var y = 65 + i * 28;
    var isPlayer = t.idx === season.playerTeam;
    if (isPlayer) {
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(50, y - 10, 380, 24);
    }
    drawMiniMushroom(62, y + 1, t.colors[0]);
    ctx.fillStyle = isPlayer ? '#fff' : '#aaa';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(t.name, 78, y + 5);
    ctx.textAlign = 'right';
    ctx.fillText('' + t.wins, 340, y + 5);
    ctx.fillText('' + t.losses, 380, y + 5);
    var pct = (t.wins + t.losses > 0) ? (t.wins / (t.wins + t.losses)).toFixed(3) : '.000';
    ctx.fillText(pct, 425, y + 5);
  }

  // Season stats
  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Total Runs: ' + (season.totalRuns || 0) + ' | HRs: ' + (season.totalHR || 0) + ' | Bosses: ' + (season.bossesDefeated || 0), 240, 295);

  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('Press A/B to return', 240, 310);
  TAS.input.drawTouchControls(GW, GH);
}

function drawRoster() {

function drawUpgrade() {

function drawUpgradePlayer() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);
  if (!menuState) { state = 'upgrade'; return; }

  var team = season.teams[season.playerTeam];
  var p = team.roster[menuState.playerIdx];
  var stats = ['power', 'contact', 'speed', 'arm', 'fielding'];
  var statNames = ['POWER', 'CONTACT', 'SPEED', 'ARM', 'FIELDING'];

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.name + ' (' + p.pos + ')', 240, 25);
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Money: $' + team.money, 240, 45);
  if (p.ability) {
    ctx.fillStyle = '#38d973';
    ctx.font = '9px monospace';
    ctx.fillText('Ability: ' + p.ability + ' | Type: ' + (p.mushType || 'unknown'), 240, 60);
  }

  for (var i = 0; i < 5; i++) {
    var y = 80 + i * 40;
    var sel = i === menuState.statIdx;
    var val = p[stats[i]];
    var cost = Math.floor(val * 0.5 + 10);

    if (sel) {
      ctx.fillStyle = '#1a2a1a';
      ctx.fillRect(80, y - 8, 320, 34);
    }

    ctx.fillStyle = sel ? '#fff' : '#999';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(statNames[i], 95, y + 5);

    ctx.fillStyle = '#222';
    ctx.fillRect(200, y - 2, 150, 14);
    var barColor = val > 70 ? '#4c4' : val > 40 ? '#cc4' : '#c44';
    ctx.fillStyle = barColor;
    ctx.fillRect(200, y - 2, val * 1.5, 14);

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.fillText('' + val, 380, y + 5);
    if (sel) {
      ctx.fillStyle = '#8f8';
      ctx.fillText('$' + cost, 420, y + 5);
    }

    ctx.fillStyle = '#555';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    if (sel) ctx.fillText('+1 for $' + cost, 200, y + 20);
  }

  if (TAS.input.justPressed('ArrowUp')) menuState.statIdx = (menuState.statIdx + 4) % 5;
  if (TAS.input.justPressed('ArrowDown')) menuState.statIdx = (menuState.statIdx + 1) % 5;
  if (TAS.input.justPressed('a') || TAS.input.touch.a) {
    var stat = stats[menuState.statIdx];
    var cost = Math.floor(p[stat] * 0.5 + 10);
    if (team.money >= cost && p[stat] < 99) {
      team.money -= cost;
      p[stat] = Math.min(99, p[stat] + 1);
      TAS.audio.playTone(600 + p[stat] * 5, 0.06, 'square');
      saveSeason();
    } else {
      TAS.audio.playTone(100, 0.1, 'triangle');
    }
  }
  if (TAS.input.justPressed('b') || TAS.input.touch.b) { state = 'upgrade'; }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('A=upgrade stat  B=back', 240, 310);
  TAS.input.drawTouchControls(GW, GH);
}

// === MATCH DRAWING ===
function drawMatch() {
  // Apply screen shake
  ctx.save();
  if (match.shakeFrames > 0) {
    var sx = (Math.random() - 0.5) * match.shakeIntensity;
    var sy = (Math.random() - 0.5) * match.shakeIntensity;
    ctx.translate(sx, sy);
  }

  if (match.batView) {
    drawBattingView();
  } else {
    drawFieldingView();
  }

  // Scoreboard
  drawScoreboard();

  // Crowd meter bar
  drawCrowdMeter();

  // Result text overlay
  if (match.resultTimer > 0) {
    var alpha = Math.min(1, match.resultTimer / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(100, 130, 280, 60);
    ctx.strokeStyle = match.isBoss ? '#ff3333' : '#f4b41b';
    ctx.lineWidth = 2;
    ctx.strokeRect(100, 130, 280, 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(match.resultText, 240, 165);
    ctx.restore();
  }

  // Score popups
  drawPopups();

  ctx.restore(); // End screen shake

  TAS.particles.draw();
  TAS.fx.drawFlash(GW, GH);
  TAS.input.drawTouchControls(GW, GH);
}

function drawCrowdMeter() {
  if (!match) return;
  // Small crowd energy bar at top right
  ctx.fillStyle = '#0008';
  ctx.fillRect(GW - 65, 20, 55, 8);
  var meterColor = match.crowdMeter > 80 ? '#ff0' : match.crowdMeter > 50 ? '#4c4' : '#666';
  ctx.fillStyle = meterColor;
  ctx.fillRect(GW - 65, 20, match.crowdMeter * 0.55, 8);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW - 65, 20, 55, 8);
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('CROWD', GW - 12, 19);
}

function drawBattingView() {
  var zone = STADIUM_ZONES[currentZone] || STADIUM_ZONES[0];

  // Sky gradient — themed per stadium
  var grad = ctx.createLinearGradient(0, 0, 0, 160);
  grad.addColorStop(0, zone.sky1);
  grad.addColorStop(1, zone.sky2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, 160);

  // Stars for night games
  if (zone.sky1 === '#0a0a0a' || zone.sky1 === '#1a0a2a') {
    for (var i = 0; i < 20; i++) {
      var sx = (i * 37 + frame * 0.1) % GW;
      var sy = (i * 13) % 50;
      ctx.fillStyle = (frame + i * 7) % 60 < 50 ? '#fff' : '#888';
      ctx.fillRect(sx, sy, 1, 1);
    }
  }

  // Outfield wall — themed
  ctx.fillStyle = zone.wall;
  ctx.fillRect(0, 50, GW, 110);
  ctx.fillStyle = zone.wall + '88';
  ctx.fillRect(0, 50, GW, 4);

  // Stadium name on wall
  ctx.fillStyle = '#ffffff33';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(zone.name, 240, 62);

  // Boss warning banner
  if (match.isBoss) {
    ctx.fillStyle = '#ff000044';
    ctx.fillRect(0, 42, GW, 14);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('!! BOSS ENCOUNTER: ' + (match.bossData ? match.bossData.name : 'UNKNOWN') + ' !!', 240, 52);
  }

  // Stadium crowd — animated baselings in stands (Pass 3)
  for (var i = 0; i < 50; i++) {
    var cx = 15 + i * 9.5;
    var cy = 28 + Math.sin(i * 0.7 + frame * 0.06) * 3;
    // Crowd are mini mushroom heads
    var crowdColor = zone.crowd[i % zone.crowd.length];
    ctx.fillStyle = crowdColor;
    ctx.beginPath();
    ctx.arc(cx, cy - 1, 3, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#ddd';
    ctx.fillRect(cx - 1, cy - 1, 2, 4);
    // Wave effect when crowd meter is high
    if (match.crowdMeter > 75 && Math.sin(frame * 0.1 + i * 0.3) > 0.5) {
      ctx.fillStyle = crowdColor;
      ctx.fillRect(cx - 1, cy - 6, 2, 3);
    }
  }

  // Dirt/grass — themed
  ctx.fillStyle = zone.grass;
  ctx.fillRect(0, 160, GW, 160);
  ctx.fillStyle = zone.dirt;
  ctx.beginPath();
  ctx.moveTo(160, 320);
  ctx.lineTo(240, 160);
  ctx.lineTo(320, 320);
  ctx.closePath();
  ctx.fill();

  // Decorative mushrooms along foul lines (Pass 2)
  for (var i = 0; i < 4; i++) {
    drawMiniMushroom(135 - i * 10, 310 - i * 25, zone.crowd[i % zone.crowd.length]);
    drawMiniMushroom(345 + i * 10, 310 - i * 25, zone.crowd[(i + 2) % zone.crowd.length]);
  }

  // Mound
  ctx.fillStyle = zone.dirt;
  ctx.beginPath();
  ctx.ellipse(240, 180, 20, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Rubber on mound
  ctx.fillStyle = '#fff';
  ctx.fillRect(237, 179, 6, 2);

  // Pitcher — as baseling
  var pitchTeam = getPitchingTeam();
  drawBaselingPitcher(240, 185, pitchTeam.colors, match.phase === 'pitching', frame);

  // Batter box
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(218, 260, 44, 50);

  // Home plate
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(240, 275);
  ctx.lineTo(248, 280);
  ctx.lineTo(248, 290);
  ctx.lineTo(232, 290);
  ctx.lineTo(232, 280);
  ctx.closePath();
  ctx.fill();

  // Batter — as baseling
  var batTeam = getBattingTeam();
  var swinging = match.batter.swingTimer > 0;
  drawBaselingBatter(252, 275, batTeam.colors, swinging, frame);

  // Ball in flight — with colored trail per pitch type
  if (match.ball.active && match.phase === 'pitching') {
    var sz = 4 + (1 - match.ball.t) * 3;
    // Pitch trail
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, sz, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    // Colored glow from pitch type
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, sz + 2, 0, Math.PI * 2);
    ctx.strokeStyle = match.ball.pitchColor || '#8f8';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Seam lines
    ctx.strokeStyle = '#c00';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, sz, 0.3, 1.2);
    ctx.stroke();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(match.ball.x, 290, sz * 0.7, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // HR ball flying
  if (match.phase === 'hit_flight' && match.ball.active) {
    var sz = 6 - match.ball.y * 0.01;
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, Math.max(2, sz), 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    // Trail
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, Math.max(4, sz + 2), 0, Math.PI * 2);
    ctx.strokeStyle = '#ffcc0066';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Power meter — styled with baseling color
  if (match.batter.powerHold > 0 && isPlayerAtBat()) {
    ctx.fillStyle = '#333';
    ctx.fillRect(188, 200, 10, 52);
    var h = match.batter.powerHold * 50;
    var pmColor = match.batter.powerHold > 0.8 ? '#f00' : match.batter.powerHold > 0.5 ? '#ff0' : BASELING_COLOR;
    ctx.fillStyle = pmColor;
    ctx.fillRect(189, 251 - h, 8, h);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(188, 200, 10, 52);
    // Power label
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PWR', 193, 197);
  }

  // Pitch selection indicator
  if (match.phase === 'pitch_select' && isPlayerPitching()) {
    ctx.fillStyle = '#000c';
    ctx.fillRect(8, 30, 135, 14 + PITCHES.length * 14);
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SELECT PITCH:', 12, 42);
    for (var i = 0; i < PITCHES.length; i++) {
      var selected = i === match.selectedPitch;
      ctx.fillStyle = selected ? PITCHES[i].color : '#555';
      ctx.font = (selected ? 'bold ' : '') + '8px monospace';
      ctx.fillText((selected ? '>' : ' ') + PITCHES[i].name, 12, 55 + i * 13);
    }
    // Aim crosshair
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 1;
    var aimX = 240 + match.pitchAimX * 30;
    var aimY = 280 + match.pitchAimY * 20;
    ctx.beginPath();
    ctx.moveTo(aimX - 6, aimY); ctx.lineTo(aimX + 6, aimY);
    ctx.moveTo(aimX, aimY - 6); ctx.lineTo(aimX, aimY + 6);
    ctx.stroke();
    // Outer circle
    ctx.beginPath();
    ctx.arc(aimX, aimY, 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Strike zone
  if (match.phase === 'pitching' || match.phase === 'pitch_select') {
    ctx.strokeStyle = 'rgba(255,255,0,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(215, 260, 50, 40);
  }

  // Count display
  ctx.fillStyle = '#000c';
  ctx.fillRect(378, 248, 94, 64);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(378, 248, 94, 64);
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  // Ball indicators
  ctx.fillText('B:', 385, 266);
  for (var i = 0; i < 4; i++) {
    ctx.fillStyle = i < match.balls ? '#4f4' : '#333';
    ctx.fillRect(405 + i * 12, 257, 8, 8);
  }
  // Strike indicators
  ctx.fillStyle = '#fff';
  ctx.fillText('S:', 385, 282);
  for (var i = 0; i < 3; i++) {
    ctx.fillStyle = i < match.strikes ? '#ff0' : '#333';
    ctx.fillRect(405 + i * 12, 273, 8, 8);
  }
  // Out indicators
  ctx.fillStyle = '#fff';
  ctx.fillText('O:', 385, 298);
  for (var i = 0; i < 3; i++) {
    ctx.fillStyle = i < match.outs ? '#f44' : '#333';
    ctx.fillRect(405 + i * 12, 289, 8, 8);
  }

  drawBasesIndicator(440, 35);

  // Batter name tag
  var batter = getCurrentBatter();
  ctx.fillStyle = '#0008';
  ctx.fillRect(260, 295, 110, 14);
  ctx.fillStyle = '#ccc';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(batter.name.substring(0, 15), 264, 305);
}

function drawFieldingView() {
  var zone = STADIUM_ZONES[currentZone] || STADIUM_ZONES[0];

  // Green field — themed
  ctx.fillStyle = zone.grass;
  ctx.fillRect(0, 0, GW, GH);

  // Grass pattern
  for (var i = 0; i < 8; i++) {
    ctx.fillStyle = i % 2 === 0 ? zone.grass : (zone.grass + '88');
    var stripW = GW / 8;
    ctx.fillRect(i * stripW, 0, stripW, GH);
  }

  // Outfield arc / fence
  ctx.beginPath();
  ctx.arc(240, 270, 220, Math.PI + 0.3, -0.3);
  ctx.strokeStyle = zone.wall;
  ctx.lineWidth = 4;
  ctx.stroke();
  // Warning track
  ctx.beginPath();
  ctx.arc(240, 270, 210, Math.PI + 0.3, -0.3);
  ctx.strokeStyle = zone.dirt + '44';
  ctx.lineWidth = 8;
  ctx.stroke();

  // Infield dirt
  ctx.beginPath();
  ctx.arc(240, 200, 75, 0, Math.PI * 2);
  ctx.fillStyle = zone.dirt + '44';
  ctx.fill();

  // Diamond basepaths
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(BASES[0].x, BASES[0].y);
  ctx.lineTo(BASES[1].x, BASES[1].y);
  ctx.lineTo(BASES[2].x, BASES[2].y);
  ctx.lineTo(BASES[3].x, BASES[3].y);
  ctx.closePath();
  ctx.stroke();

  // Bases
  for (var i = 0; i < 4; i++) {
    ctx.fillStyle = '#fff';
    ctx.save();
    ctx.translate(BASES[i].x, BASES[i].y);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-5, -5, 10, 10);
    ctx.restore();
  }

  // Mound
  ctx.beginPath();
  ctx.arc(240, 230, 8, 0, Math.PI * 2);
  ctx.fillStyle = zone.dirt;
  ctx.fill();

  // Fielders — as baseling top-down sprites
  var pitchTeam = getPitchingTeam();
  for (var i = 0; i < match.fielders.length; i++) {
    var f = match.fielders[i];
    drawBaselingFielder(f.x, f.y, pitchTeam.colors, f.hasBall);
  }

  // Runners — as baseling runners
  var batTeam = getBattingTeam();
  for (var r = 0; r < match.runners.length; r++) {
    drawBaselingRunner(match.runners[r].x, match.runners[r].y, batTeam.colors);
  }

  // Ball with shadow
  if (match.ball.active) {
    var shadowY = match.ball.y + match.ball.z * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(match.ball.x, shadowY + 3, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y - match.ball.z, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    // Height indicator glow
    if (match.ball.z > 5) {
      ctx.beginPath();
      ctx.arc(match.ball.x, match.ball.y - match.ball.z, 6, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffcc0044';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  drawBasesIndicator(440, 35);
}

function drawBasesIndicator(x, y) {
  ctx.fillStyle = '#0008';
  ctx.fillRect(x - 22, y - 7, 44, 44);
  var bx = x, by = y + 20;
  var bs = 11;
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bx, by + bs);
  ctx.lineTo(bx + bs, by);
  ctx.lineTo(bx, by - bs);
  ctx.lineTo(bx - bs, by);
  ctx.closePath();
  ctx.stroke();
  // Highlighted bases
  if (match.bases[0]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx + bs - 4, by - 4, 8, 8); }
  if (match.bases[1]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx - 4, by - bs - 4, 8, 8); }
  if (match.bases[2]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx - bs - 4, by - 4, 8, 8); }
  // Home plate always white
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx - 3, by + bs - 3, 6, 6);
}

function drawScoreboard() {
  ctx.fillStyle = '#000e';
  ctx.fillRect(0, 0, GW, 18);
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';

  var away = season.teams[match.away] || { abbr: '???', colors: ['#fff'], name: 'Unknown' };
  var home = season.teams[match.home] || { abbr: '???', colors: ['#fff'], name: 'Unknown' };

  // Away score
  ctx.fillStyle = away.colors[0];
  ctx.fillText(away.abbr + ': ' + match.awayScore, 10, 13);
  // Home score
  ctx.fillStyle = home.colors[0];
  ctx.fillText(home.abbr + ': ' + match.homeScore, 95, 13);

  // Inning
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  var halfStr = match.half === 0 ? 'TOP' : 'BOT';
  ctx.fillText(halfStr + ' ' + match.inning, 200, 13);

  // Batter info
  var batter = getCurrentBatter();
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText(batter.name.split(' ')[1] + ' (' + batter.pos + ') ' + batter.ability, 380, 13);
}

function drawPostGame() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  var winner = match.homeScore > match.awayScore ? match.home : match.away;
  var winTeam = season.teams[winner] || season.teams[season.playerTeam];

  // Celebration particles
  if (winner === season.playerTeam && frame % 8 === 0) {
    TAS.particles.spawn(rnd(50, 430), rnd(10, 60), {
      count: 2, color: pick(['#ff0','#0ff','#f80',BASELING_COLOR]),
      speed: rnd(1, 3), life: rnd(20, 40), gravity: 0.05
    });
  }

  // Victory baseling
  drawBaselingSprite(240, 50, winTeam.colors[0], frame);

  ctx.fillStyle = winTeam.colors[0];
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', 240, 80);

  var awayTeam = season.teams[match.away] || { name: 'Boss' };
  var homeTeam = season.teams[match.home] || { name: 'Player' };
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(awayTeam.name + '  ' + match.awayScore, 240, 105);
  ctx.fillText('vs', 240, 122);
  ctx.fillText(homeTeam.name + '  ' + match.homeScore, 240, 139);

  ctx.fillStyle = winTeam.colors[0];
  ctx.font = '13px monospace';
  ctx.fillText(winTeam.name + ' WIN!', 240, 163);

  // Money earned — scaled by INT
  if (winner === season.playerTeam) {
    var winMoney = Math.floor(200 * INT_MULT);
    ctx.fillStyle = '#4f4';
    ctx.fillText('+$' + winMoney + ' Win Bonus', 240, 183);
    if (match.isBoss) {
      ctx.fillStyle = '#ff4';
      ctx.fillText('+$500 Boss Bonus!', 240, 198);
    }
  } else {
    ctx.fillStyle = '#f84';
    ctx.fillText('+$50 Participation', 240, 183);
  }

  // Season stats
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Season Runs: ' + (season.totalRuns || 0) + ' | HRs: ' + (season.totalHR || 0), 240, 218);

  // Game log
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  var log = match.gameLog.slice(-6);
  for (var i = 0; i < log.length; i++) {
    ctx.fillText(log[i], 110, 236 + i * 12);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = (frame % 60 < 40) ? '#fff' : '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Press A to continue', 240, 310);

  TAS.particles.draw();
  TAS.input.drawTouchControls(GW, GH);
}

// === INPUT HELPERS ===
var prevKeys = {};
TAS.input.justPressed = function(key) {
  var cur = TAS.input.keys[key] || false;
  var prev = prevKeys[key] || false;
  return cur && !prev;
};
TAS.input.justReleased = function(key) {
  var cur = TAS.input.keys[key] || false;
  var prev = prevKeys[key] || false;
  return !cur && prev;
};

function postUpdate() {
  prevKeys = {};
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}

// === MAIN LOOP ===
TAS.loop.start(function(dt) {
  update(dt);
  postUpdate();
}, draw);

})();
</script>
