<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseball Stars</title>
<style>

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'SWING', b: 'PITCH' } });

const SAVE_KEY = 'bstars';

// === HELPERS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) { return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2); }
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// === TEAMS ===
const TEAMS = [
  { name: "Spore Sluggers", abbr: "SPR", colors: ['#44cc88', '#1a7744'] },
  { name: "Reactor Rockets", abbr: "RCT", colors: ['#44aaff', '#1a66bb'] },
  { name: "Fungal Flames", abbr: "FNG", colors: ['#ff6633', '#aa3311'] },
  { name: "Token Tigers", abbr: "TKN", colors: ['#ffcc22', '#aa8800'] },
  { name: "Poop Pirates", abbr: "PPP", colors: ['#996633', '#553311'] },
  { name: "Crystal Cubs", abbr: "CRS", colors: ['#66ddff', '#2299bb'] },
  { name: "Hex Hawks", abbr: "HEX", colors: ['#cc44ff', '#7711aa'] },
  { name: "Dark Dragons", abbr: "DRG", colors: ['#aa2222', '#551111'] }
];

// === PITCH TYPES ===
const PITCHES = [
  { name: "Fastball", speed: 8, breakX: 0, breakY: 0 },
  { name: "Curve", speed: 5, breakX: 0, breakY: 2.5 },
  { name: "Slider", speed: 6, breakX: 2, breakY: 0.5 },
  { name: "Change", speed: 4, breakX: 0, breakY: 1 }
];

// === POSITIONS ===
const POS = ['P','C','1B','2B','3B','SS','LF','CF','RF'];
const POS_NAMES = ['Pitcher','Catcher','First Base','Second Base','Third Base','Shortstop','Left Field','Center Field','Right Field'];

// === PLAYER GENERATION ===
function genName() {
  const first = pick(['Spork','Gill','Myco','Thorn','Ash','Flux','Bolt','Drip','Fern','Hex','Moss','Rust','Nyx','Char','Zap','Cob','Silt','Wort','Rune','Blot']);
  const last = pick(['Fungsworth','McSpore','Toxwood','Deeproot','Ironbark','Moldberg','Vineclaw','Ashbloom','Thornwick','Petalstorm','Rotweave','Capstem','Lichhold','Mossgate','Dustwell','Bogmore']);
  return first + ' ' + last;
}

function genPlayer(pos, tier) {
  const base = tier === 'star' ? 60 : tier === 'good' ? 40 : 25;
  const variance = 20;
  return {
    name: genName(),
    pos: pos,
    power: clamp(base + rndInt(-variance, variance), 10, 99),
    contact: clamp(base + rndInt(-variance, variance), 10, 99),
    speed: clamp(base + rndInt(-variance, variance), 10, 99),
    arm: clamp(base + rndInt(-variance, variance), 10, 99),
    fielding: clamp(base + rndInt(-variance, variance), 10, 99),
    stamina: pos === 'P' ? clamp(base + rndInt(-variance, variance), 30, 99) : 99,
    hr: 0, rbi: 0, hits: 0, ab: 0, era: 0, ip: 0, er: 0, wins: 0, losses: 0, saves: 0
  };
}

function genRoster(teamIdx) {
  const roster = [];
  for (let i = 0; i < 9; i++) {
    const tier = i < 2 ? 'star' : i < 5 ? 'good' : 'avg';
    roster.push(genPlayer(POS[i], tier));
  }
  // Bench: 3 extra pitchers, 2 utility
  for (let i = 0; i < 3; i++) roster.push(genPlayer('P', 'avg'));
  for (let i = 0; i < 2; i++) roster.push(genPlayer(pick(['1B','2B','SS','LF','CF','RF']), 'avg'));
  return roster;
}

// === GAME STATE ===
let state = 'title';
let frame = 0;
let season = null;
let match = null;
let menuState = null;
let menuIdx = 0;
let subMenuIdx = 0;
let teamSelectIdx = 0;
let confirmTimer = 0;

// === SAVE/LOAD ===
function saveSeason() {
  if (season) localStorage.setItem(SAVE_KEY, JSON.stringify(season));
}

function loadSeason() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.teams) return d;
  } catch(e) { console.error('Load failed:', e); }
  return null;
}

// === SEASON INIT ===
function newSeason(playerTeamIdx) {
  const teams = TEAMS.map((t, i) => ({
    ...t,
    idx: i,
    roster: genRoster(i),
    wins: 0, losses: 0,
    money: i === playerTeamIdx ? 500 : 0
  }));
  season = {
    teams: teams,
    playerTeam: playerTeamIdx,
    week: 0,
    schedule: genSchedule(),
    playoffs: false,
    champion: null
  };
  saveSeason();
}

function genSchedule() {
  const sched = [];
  for (let w = 0; w < 14; w++) {
    const pairs = [];
    const used = [];
    const order = [0,1,2,3,4,5,6,7].sort(() => Math.random() - 0.5);
    for (let i = 0; i < 8; i += 2) {
      pairs.push([order[i], order[i+1]]);
    }
    sched.push(pairs);
  }
  return sched;
}

// === FIELD POSITIONS (top-down fielding view) ===
const DIAMOND_CX = 240, DIAMOND_CY = 200;
const BASE_DIST = 70;
const BASES = [
  { x: 240, y: 270 },   // home
  { x: 310, y: 200 },   // 1st
  { x: 240, y: 130 },   // 2nd
  { x: 170, y: 200 }    // 3rd
];
const FIELD_POS = [
  { x: 240, y: 230 },   // P (mound)
  { x: 240, y: 278 },   // C
  { x: 320, y: 210 },   // 1B
  { x: 280, y: 160 },   // 2B
  { x: 160, y: 210 },   // 3B
  { x: 200, y: 160 },   // SS
  { x: 100, y: 100 },   // LF
  { x: 240, y: 70 },    // CF
  { x: 380, y: 100 }    // RF
];

// === MATCH STATE ===
function initMatch(homeIdx, awayIdx, playerBatting) {
  match = {
    home: homeIdx, away: awayIdx,
    homeScore: 0, awayScore: 0,
    inning: 1, half: 0, // 0=top, 1=bottom
    outs: 0, strikes: 0, balls: 0,
    bases: [null, null, null], // runners on 1st, 2nd, 3rd
    batterIdx: 0, // lineup position for current batting team
    lineups: [
      [0,1,2,3,4,5,6,7,8], // away lineup
      [0,1,2,3,4,5,6,7,8]  // home lineup
    ],
    pitcherStamina: [100, 100],
    phase: 'pitch_select', // pitch_select, pitching, batting, hit_flight, fielding, result, inning_change, game_over
    ball: { x: 0, y: 0, z: 0, vx: 0, vy: 0, vz: 0, active: false },
    pitcher: { x: 240, y: 100, windUp: 0 },
    batter: { x: 240, y: 250, swingTimer: -1, powerHold: 0, swingResult: null },
    selectedPitch: 0,
    pitchAimX: 0, pitchAimY: 0,
    batView: true, // true = side batting view, false = top-down fielding
    fielders: [],
    runners: [],
    hitResult: null,
    resultTimer: 0,
    resultText: '',
    celebTimer: 0,
    isPlayerBatting: playerBatting,
    pitchTimer: 0,
    autoFieldTimer: 0,
    flyBall: false,
    catchTarget: null,
    throwTarget: null,
    throwBall: { x: 0, y: 0, active: false, tx: 0, ty: 0 },
    mercyRule: false,
    gameLog: []
  };
  initFielders();
}

function initFielders() {
  match.fielders = FIELD_POS.map((p, i) => ({
    x: p.x, y: p.y, homeX: p.x, homeY: p.y,
    hasBall: i === 0, targetX: p.x, targetY: p.y
  }));
}

function getBattingTeam() { return match.half === 0 ? season.teams[match.away] : season.teams[match.home]; }
function getPitchingTeam() { return match.half === 0 ? season.teams[match.home] : season.teams[match.away]; }
function getCurrentBatter() {
  const team = getBattingTeam();
  const li = match.lineups[match.half];
  return team.roster[li[match.batterIdx % 9]];
}
function getCurrentPitcher() {
  const team = getPitchingTeam();
  return team.roster[0]; // pitcher is always roster[0]
}
function isPlayerAtBat() {
  const batTeam = match.half === 0 ? match.away : match.home;
  return batTeam === season.playerTeam;
}
function isPlayerPitching() {
  const pitchTeam = match.half === 0 ? match.home : match.away;
  return pitchTeam === season.playerTeam;
}

// === PITCH MECHANICS ===
function throwPitch() {
  const pitcher = getCurrentPitcher();
  const pitch = PITCHES[match.selectedPitch];
  const staminaMod = match.pitcherStamina[match.half === 0 ? 1 : 0] / 100;
  const armMod = pitcher.arm / 100;
  const speed = pitch.speed * staminaMod * (0.8 + armMod * 0.4);
  const accuracy = armMod * staminaMod;
  const aimOffX = match.pitchAimX * 30 + rnd(-1, 1) * (1 - accuracy) * 20;
  const aimOffY = match.pitchAimY * 20 + rnd(-1, 1) * (1 - accuracy) * 15;

  match.ball = {
    x: 240, y: 100, z: 0,
    vx: aimOffX * 0.02 + pitch.breakX * 0.3 * (Math.random() > 0.5 ? 1 : -1),
    vy: speed * 1.5,
    vz: 0,
    targetX: 240 + aimOffX,
    targetY: 250 + aimOffY,
    active: true,
    t: 0,
    startX: 240, startY: 100,
    breakX: pitch.breakX * (Math.random() > 0.5 ? 1 : -1),
    breakY: pitch.breakY,
    speed: speed
  };
  match.phase = 'pitching';
  match.batter.swingTimer = -1;
  match.batter.powerHold = 0;
  match.pitcherStamina[match.half === 0 ? 1 : 0] -= 0.5 + (1 - staminaMod) * 0.5;
  TAS.audio.playTone(200, 0.05, 'square');
}

function attemptSwing(power) {
  const batter = getCurrentBatter();
  const ball = match.ball;
  const timing = ball.t; // 0=too early, 0.75-0.85=perfect, 1=too late
  const sweetSpot = timing > 0.72 && timing < 0.88;
  const contactChance = batter.contact / 100;
  const dx = Math.abs(ball.x - 240); // how centered is the ball
  const isStrike = Math.abs(ball.targetX - 240) < 25 && Math.abs(ball.targetY - 250) < 20;

  let hitQuality = 0;
  if (sweetSpot) {
    hitQuality = 0.5 + contactChance * 0.5 + rnd(-0.1, 0.1);
  } else {
    hitQuality = Math.max(0, contactChance * 0.3 - Math.abs(timing - 0.8) * 2 + rnd(-0.2, 0.1));
  }

  // Direction from d-pad
  let pullDir = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.touch.left) pullDir = -1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.touch.right) pullDir = 1;

  match.batter.swingTimer = 8;
  TAS.audio.playTone(300, 0.04, 'square');

  if (hitQuality < 0.15) {
    // Miss
    match.batter.swingResult = 'miss';
    match.strikes++;
    if (match.strikes >= 3) {
      recordOut('K');
    }
    return;
  }

  // Contact made
  TAS.audio.playTone(800, 0.08, 'square');
  TAS.fx.shake(3, 4);
  const powerMod = (batter.power / 100) * power;
  const angle = rnd(-40, 40) + pullDir * 25;
  const launchAngle = hitQuality * 45 + rnd(-10, 10);
  const hitPower = hitQuality * powerMod;

  // Foul ball check
  if (Math.abs(angle) > 50 || (hitQuality < 0.25 && Math.random() < 0.4)) {
    match.batter.swingResult = 'foul';
    if (match.strikes < 2) match.strikes++;
    match.resultText = 'FOUL BALL';
    match.resultTimer = 40;
    TAS.particles.spawn(240, 250, { count: 5, color: '#fff', speed: 2, life: 20 });
    return;
  }

  // Ball is in play
  match.batter.swingResult = 'hit';
  const speedFactor = 3 + hitPower * 8;
  const rad = (angle - 90) * Math.PI / 180;
  match.ball = {
    x: 240, y: 270, z: 10,
    vx: Math.cos(rad) * speedFactor,
    vy: Math.sin(rad) * speedFactor * -1,
    vz: Math.sin(launchAngle * Math.PI / 180) * speedFactor * 0.7,
    active: true, hitPower: hitPower, angle: angle, launchAngle: launchAngle
  };
  match.flyBall = launchAngle > 25;

  // HR check
  if (hitPower > 0.7 && launchAngle > 20 && launchAngle < 50) {
    match.hitResult = 'HR';
    match.phase = 'hit_flight';
    match.celebTimer = 90;
    homeRun();
    return;
  }

  match.phase = 'fielding';
  match.batView = false;
  match.autoFieldTimer = 0;

  // Place runner at home heading to 1st
  match.runners = [{ base: 0, x: BASES[0].x, y: BASES[0].y, targetBase: 1, speed: batter.speed / 15 }];
  // Advance existing runners
  for (let i = 2; i >= 0; i--) {
    if (match.bases[i]) {
      const r = match.bases[i];
      match.runners.push({ base: i + 1, x: BASES[i+1].x, y: BASES[i+1].y, targetBase: i + 2, speed: r.speed / 15 });
      match.bases[i] = null;
    }
  }
}

function homeRun() {
  const batter = getCurrentBatter();
  let runs = 1;
  for (let i = 0; i < 3; i++) {
    if (match.bases[i]) { runs++; match.bases[i] = null; }
  }
  if (match.half === 0) match.awayScore += runs;
  else match.homeScore += runs;
  batter.hr++;
  batter.rbi += runs;
  batter.hits++;
  batter.ab++;

  match.resultText = runs === 4 ? 'GRAND SLAM!' : runs > 1 ? runs + '-RUN HOMER!' : 'HOME RUN!';
  match.resultTimer = 90;
  match.gameLog.push(match.resultText);

  TAS.fx.shake(8, 15);
  TAS.audio.playTone(500, 0.15, 'square');
  setTimeout(() => TAS.audio.playTone(700, 0.1, 'square'), 100);
  setTimeout(() => TAS.audio.playTone(900, 0.12, 'square'), 200);

  // Fireworks
  for (let i = 0; i < 30; i++) {
    TAS.particles.spawn(rnd(100, 380), rnd(20, 120), {
      count: 3, color: pick(['#ff0','#f80','#f00','#0ff','#fff']),
      speed: rnd(1, 4), life: rnd(30, 60), gravity: 0.05
    });
  }
}

function recordOut(type) {
  match.outs++;
  match.strikes = 0;
  match.balls = 0;
  match.resultText = type === 'K' ? 'STRIKEOUT!' : type === 'fly' ? 'FLY OUT!' : type === 'ground' ? 'GROUND OUT!' : 'OUT!';
  match.resultTimer = 50;
  match.gameLog.push(match.resultText);
  getCurrentBatter().ab++;

  if (match.outs >= 3) {
    endHalfInning();
  } else {
    nextBatter();
  }
  TAS.audio.playTone(150, 0.1, 'triangle');
}

function recordHit(bases) {
  const batter = getCurrentBatter();
  batter.hits++;
  batter.ab++;
  const names = ['', 'SINGLE!', 'DOUBLE!', 'TRIPLE!'];
  match.resultText = names[bases];
  match.resultTimer = 50;
  match.gameLog.push(batter.name.split(' ')[1] + ' - ' + names[bases]);

  // Score runners
  let runs = 0;
  for (let i = 2; i >= 0; i--) {
    if (match.bases[i]) {
      const newBase = i + 1 + bases;
      if (newBase > 3) { runs++; match.bases[i] = null; }
      else { match.bases[newBase - 1] = match.bases[i]; match.bases[i] = null; }
    }
  }
  if (bases >= 4) { runs++; }
  else { match.bases[bases - 1] = batter; }

  if (runs > 0) {
    if (match.half === 0) match.awayScore += runs;
    else match.homeScore += runs;
    batter.rbi += runs;
  }

  TAS.audio.playTone(600, 0.08, 'square');
  nextBatter();
}

function nextBatter() {
  match.batterIdx = (match.batterIdx + 1) % 9;
  match.strikes = 0;
  match.balls = 0;
  match.phase = 'pitch_select';
  match.batView = true;
  match.batter.swingTimer = -1;
  match.batter.powerHold = 0;
  initFielders();
}

function endHalfInning() {
  match.outs = 0;
  match.strikes = 0;
  match.balls = 0;
  match.bases = [null, null, null];
  match.runners = [];
  match.batView = true;

  if (match.half === 0) {
    match.half = 1;
    match.batterIdx = 0;
  } else {
    match.half = 0;
    match.batterIdx = 0;
    match.inning++;
  }

  // Check game end
  if (match.inning > 9 || (match.inning > 5 && Math.abs(match.homeScore - match.awayScore) >= 10)) {
    if (match.inning > 9 && match.homeScore !== match.awayScore) {
      match.phase = 'game_over';
      match.mercyRule = Math.abs(match.homeScore - match.awayScore) >= 10;
      endGame();
      return;
    }
    if (match.inning > 5 && Math.abs(match.homeScore - match.awayScore) >= 10) {
      match.phase = 'game_over';
      match.mercyRule = true;
      endGame();
      return;
    }
  }

  match.phase = 'inning_change';
  match.resultText = match.half === 0 ? 'TOP ' + match.inning : 'BOTTOM ' + match.inning;
  match.resultTimer = 60;
  initFielders();
}

function endGame() {
  const winner = match.homeScore > match.awayScore ? match.home : match.away;
  const loser = winner === match.home ? match.away : match.home;
  season.teams[winner].wins++;
  season.teams[loser].losses++;

  const winMoney = winner === season.playerTeam ? 200 : 0;
  const loseMoney = loser === season.playerTeam ? 50 : 0;
  season.teams[season.playerTeam].money += winMoney + loseMoney;

  match.resultText = season.teams[winner].name + ' WIN!';
  match.resultTimer = 120;
  match.gameLog.push(match.resultText);
}

// === AI LOGIC ===
function aiPitch() {
  match.selectedPitch = rndInt(0, 3);
  match.pitchAimX = rnd(-1, 1);
  match.pitchAimY = rnd(-0.5, 0.5);
  throwPitch();
}

function aiBat() {
  const ball = match.ball;
  if (!ball.active) return;
  // AI swings based on timing and contact stat
  if (ball.t > 0.7 && ball.t < 0.9) {
    const batter = getCurrentBatter();
    const swingChance = batter.contact / 130;
    if (Math.random() < swingChance) {
      attemptSwing(rnd(0.5, 1.0));
    }
  } else if (ball.t > 0.95) {
    // Sometimes chase bad pitches
    if (Math.random() < 0.2) attemptSwing(rnd(0.3, 0.7));
  }
}

function aiField() {
  if (!match.ball.active) return;
  // Move closest fielder to ball
  let minD = Infinity, closest = -1;
  for (let i = 0; i < match.fielders.length; i++) {
    const f = match.fielders[i];
    const d = dist(f.x, f.y, match.ball.x, match.ball.y);
    if (d < minD) { minD = d; closest = i; }
  }
  if (closest >= 0) {
    match.fielders[closest].targetX = match.ball.x;
    match.fielders[closest].targetY = match.ball.y;
  }
}

// === FIELDING UPDATE ===
function updateFielding(dt) {
  const ball = match.ball;
  if (!ball.active) return;

  // Ball physics
  ball.x += ball.vx * dt * 60;
  ball.y += ball.vy * dt * 60;
  ball.z += ball.vz * dt * 60;
  ball.vz -= 0.15 * dt * 60; // gravity
  ball.vx *= 0.99;
  ball.vy *= 0.99;

  // Move fielders toward targets
  for (let i = 0; i < match.fielders.length; i++) {
    const f = match.fielders[i];
    const spd = 2.5 * dt * 60;
    const dx = f.targetX - f.x;
    const dy = f.targetY - f.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > 2) {
      f.x += (dx / d) * spd;
      f.y += (dy / d) * spd;
    }
  }

  // Move runners
  for (let i = match.runners.length - 1; i >= 0; i--) {
    const r = match.runners[i];
    if (r.targetBase > 3) {
      // Scoring
      const homeX = BASES[0].x, homeY = BASES[0].y;
      const dx = homeX - r.x, dy = homeY - r.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 5) {
        if (match.half === 0) match.awayScore++;
        else match.homeScore++;
        match.runners.splice(i, 1);
        TAS.audio.playTone(700, 0.06, 'square');
        continue;
      }
      r.x += (dx / d) * r.speed * dt * 60;
      r.y += (dy / d) * r.speed * dt * 60;
    } else {
      const tgt = BASES[r.targetBase];
      const dx = tgt.x - r.x, dy = tgt.y - r.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 5) {
        r.base = r.targetBase;
        r.x = tgt.x;
        r.y = tgt.y;
      } else {
        r.x += (dx / d) * r.speed * dt * 60;
        r.y += (dy / d) * r.speed * dt * 60;
      }
    }
  }

  aiField();

  // Check if ball is caught or lands
  if (ball.z <= 0 && ball.vz < 0) {
    ball.z = 0;
    ball.vz = 0;
    ball.vx *= 0.7;
    ball.vy *= 0.7;

    // Check fielder catch
    for (let i = 0; i < match.fielders.length; i++) {
      const f = match.fielders[i];
      if (dist(f.x, f.y, ball.x, ball.y) < 15) {
        f.hasBall = true;
        ball.active = false;

        if (match.flyBall && match.autoFieldTimer < 40) {
          // Fly out
          recordOut('fly');
          match.batView = true;
          return;
        }

        // Ground out: try to throw to first
        if (match.runners.length > 0) {
          const lead = match.runners[0];
          if (lead.targetBase <= 1) {
            const d = dist(f.x, f.y, BASES[1].x, BASES[1].y);
            const armSpd = getPitchingTeam().roster[i] ? getPitchingTeam().roster[i].arm / 20 : 3;
            const throwTime = d / (armSpd * 60);
            const runnerDist = dist(lead.x, lead.y, BASES[1].x, BASES[1].y);
            const runTime = runnerDist / (lead.speed * 60);
            if (throwTime < runTime + 0.3) {
              recordOut('ground');
              match.batView = true;
              return;
            }
          }
        }

        // Hit - determine bases
        const hitDist = dist(240, 270, ball.x, ball.y);
        let basesHit = 1;
        if (hitDist > 200) basesHit = 3;
        else if (hitDist > 140) basesHit = 2;
        recordHit(basesHit);
        match.batView = true;
        return;
      }
    }
  }

  // Ball out of bounds = HR or foul
  if (ball.x < 20 || ball.x > 460 || ball.y < 10) {
    if (ball.y < 10 && Math.abs(ball.x - 240) < 150) {
      // Over the fence - HR
      ball.active = false;
      homeRun();
      match.celebTimer = 90;
    } else {
      // Foul
      ball.active = false;
      if (match.strikes < 2) match.strikes++;
      match.resultText = 'FOUL BALL';
      match.resultTimer = 40;
      match.phase = 'pitch_select';
      match.batView = true;
      match.runners = [];
    }
    return;
  }

  match.autoFieldTimer++;
  // Timeout: if ball stops moving
  if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1 && ball.z < 1) {
    ball.active = false;
    const hitDist = dist(240, 270, ball.x, ball.y);
    let basesHit = 1;
    if (hitDist > 200) basesHit = 3;
    else if (hitDist > 140) basesHit = 2;
    recordHit(basesHit);
    match.batView = true;
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  if (confirmTimer > 0) confirmTimer--;

  const keys = TAS.input.keys;
  const aPress = TAS.input.justPressed('a') || TAS.input.touch.a;
  const bPress = TAS.input.justPressed('b') || TAS.input.touch.b;
  const up = keys['ArrowUp'] || TAS.input.touch.up;
  const down = keys['ArrowDown'] || TAS.input.touch.down;
  const left = keys['ArrowLeft'] || TAS.input.touch.left;
  const right = keys['ArrowRight'] || TAS.input.touch.right;

  if (state === 'title') {
    if (aPress) {
      const saved = loadSeason();
      if (saved) {
        state = 'main_menu';
        season = saved;
        menuIdx = 0;
      } else {
        state = 'team_select';
        teamSelectIdx = 0;
      }
    }
    return;
  }

  if (state === 'team_select') {
    if (TAS.input.justPressed('ArrowUp')) teamSelectIdx = (teamSelectIdx + 7) % 8;
    if (TAS.input.justPressed('ArrowDown')) teamSelectIdx = (teamSelectIdx + 1) % 8;
    if (aPress) {
      newSeason(teamSelectIdx);
      state = 'main_menu';
      menuIdx = 0;
    }
    return;
  }

  if (state === 'main_menu') {
    const opts = ['Next Game', 'Standings', 'Team Roster', 'Upgrade Stats', 'Free Agents', 'New Season'];
    if (TAS.input.justPressed('ArrowUp')) menuIdx = (menuIdx + opts.length - 1) % opts.length;
    if (TAS.input.justPressed('ArrowDown')) menuIdx = (menuIdx + 1) % opts.length;
    if (aPress) {
      if (menuIdx === 0) startNextGame();
      else if (menuIdx === 1) state = 'standings';
      else if (menuIdx === 2) { state = 'roster'; subMenuIdx = 0; }
      else if (menuIdx === 3) { state = 'upgrade'; subMenuIdx = 0; }
      else if (menuIdx === 4) { state = 'free_agents'; subMenuIdx = 0; generateFreeAgents(); }
      else if (menuIdx === 5) { state = 'team_select'; teamSelectIdx = season.playerTeam; }
    }
    return;
  }

  if (state === 'standings' || state === 'roster') {
    if (bPress || aPress) { state = 'main_menu'; }
    return;
  }

  if (state === 'upgrade') {
    updateUpgradeMenu(dt);
    return;
  }

  if (state === 'free_agents') {
    updateFreeAgentMenu(dt);
    return;
  }

  if (state === 'playing') {
    updateMatch(dt);
    return;
  }

  if (state === 'post_game') {
    if (aPress) {
      season.week++;
      saveSeason();
      if (season.week >= 14) {
        state = 'standings';
        // TODO: playoffs
      } else {
        state = 'main_menu';
      }
    }
    return;
  }
}

// === FREE AGENTS ===
let freeAgents = [];
function generateFreeAgents() {
  freeAgents = [];
  for (let i = 0; i < 6; i++) {
    const p = genPlayer(pick(POS), pick(['good', 'star']));
    p.cost = Math.floor((p.power + p.contact + p.speed + p.arm + p.fielding) / 5 * 3 + rndInt(50, 150));
    freeAgents.push(p);
  }
}

function updateFreeAgentMenu(dt) {
  if (TAS.input.justPressed('ArrowUp')) subMenuIdx = Math.max(0, subMenuIdx - 1);
  if (TAS.input.justPressed('ArrowDown')) subMenuIdx = Math.min(freeAgents.length - 1, subMenuIdx + 1);
  if (TAS.input.justPressed('b') || TAS.input.touch.b) { state = 'main_menu'; return; }
  if (TAS.input.justPressed('a') || TAS.input.touch.a) {
    const fa = freeAgents[subMenuIdx];
    const team = season.teams[season.playerTeam];
    if (team.money >= fa.cost) {
      team.money -= fa.cost;
      // Replace weakest player at that position or add to bench
      let weakest = -1, weakStat = Infinity;
      for (let i = 0; i < team.roster.length; i++) {
        const r = team.roster[i];
        const total = r.power + r.contact + r.speed + r.arm + r.fielding;
        if (total < weakStat) { weakStat = total; weakest = i; }
      }
      if (weakest >= 0 && team.roster.length >= 14) {
        team.roster[weakest] = fa;
      } else {
        team.roster.push(fa);
      }
      freeAgents.splice(subMenuIdx, 1);
      if (subMenuIdx >= freeAgents.length) subMenuIdx = Math.max(0, freeAgents.length - 1);
      TAS.audio.playTone(800, 0.08, 'square');
      saveSeason();
    } else {
      TAS.audio.playTone(100, 0.1, 'triangle');
    }
  }
}

function updateUpgradeMenu(dt) {
  const team = season.teams[season.playerTeam];
  const roster = team.roster;
  if (TAS.input.justPressed('ArrowUp')) subMenuIdx = Math.max(0, subMenuIdx - 1);
  if (TAS.input.justPressed('ArrowDown')) subMenuIdx = Math.min(roster.length - 1, subMenuIdx + 1);
  if (TAS.input.justPressed('b') || TAS.input.touch.b) { state = 'main_menu'; return; }
  if (TAS.input.justPressed('a') || TAS.input.touch.a) {
    state = 'upgrade_player';
    menuState = { playerIdx: subMenuIdx, statIdx: 0 };
  }
}

// === MATCH UPDATE ===
function updateMatch(dt) {
  if (match.resultTimer > 0) {
    match.resultTimer -= dt * 60;
    if (match.resultTimer <= 0 && match.phase === 'game_over') {
      state = 'post_game';
    }
    if (match.resultTimer <= 0 && match.phase === 'inning_change') {
      match.phase = 'pitch_select';
    }
    return;
  }

  if (match.celebTimer > 0) {
    match.celebTimer -= dt * 60;
    if (frame % 5 === 0) {
      TAS.particles.spawn(rnd(50, 430), rnd(10, 100), {
        count: 2, color: pick(['#ff0','#f80','#0ff','#fff']),
        speed: rnd(1, 3), life: rnd(20, 40), gravity: 0.05
      });
    }
    if (match.celebTimer <= 0) {
      nextBatter();
    }
    return;
  }

  if (match.phase === 'pitch_select') {
    if (isPlayerPitching()) {
      // Player pitching
      if (TAS.input.justPressed('b') || TAS.input.touch.b) {
        match.selectedPitch = (match.selectedPitch + 1) % 4;
        TAS.audio.playTone(400, 0.03, 'square');
      }
      if (left) match.pitchAimX = clamp(match.pitchAimX - 0.05, -1, 1);
      if (right) match.pitchAimX = clamp(match.pitchAimX + 0.05, -1, 1);
      if (up) match.pitchAimY = clamp(match.pitchAimY - 0.05, -1, 1);
      if (down) match.pitchAimY = clamp(match.pitchAimY + 0.05, -1, 1);
      if (TAS.input.justPressed('a') || TAS.input.touch.a) {
        throwPitch();
      }
    } else {
      // AI pitching
      match.pitchTimer++;
      if (match.pitchTimer > 30) {
        match.pitchTimer = 0;
        aiPitch();
      }
    }
    return;
  }

  if (match.phase === 'pitching') {
    // Ball in flight toward batter
    const ball = match.ball;
    ball.t += dt * ball.speed * 0.12;
    ball.x = lerp(ball.startX, ball.targetX, ball.t) + Math.sin(ball.t * Math.PI) * ball.breakX * 15;
    ball.y = lerp(ball.startY, ball.targetY, ball.t) + Math.sin(ball.t * Math.PI) * ball.breakY * 10;

    if (isPlayerAtBat()) {
      // Player batting
      if (TAS.input.keys['a'] || TAS.input.touch.a) {
        match.batter.powerHold = Math.min(match.batter.powerHold + dt * 2, 1.0);
      }
      if (TAS.input.justReleased('a') || (!TAS.input.touch.a && match.batter.powerHold > 0)) {
        if (match.batter.powerHold > 0.05) {
          attemptSwing(match.batter.powerHold);
          match.batter.powerHold = 0;
        }
      }
    } else {
      // AI batting
      aiBat();
    }

    // Ball reaches plate
    if (ball.t >= 1.0) {
      ball.active = false;
      if (match.batter.swingResult === null) {
        // Batter didn't swing
        const isStrike = Math.abs(ball.targetX - 240) < 25 && Math.abs(ball.targetY - 250) < 20;
        if (isStrike) {
          match.strikes++;
          match.resultText = 'STRIKE ' + match.strikes;
          if (match.strikes >= 3) { recordOut('K'); return; }
        } else {
          match.balls++;
          match.resultText = 'BALL ' + match.balls;
          if (match.balls >= 4) {
            // Walk
            match.resultText = 'WALK';
            match.gameLog.push('Walk');
            // Advance runners for walk
            if (match.bases[0] && match.bases[1] && match.bases[2]) {
              if (match.half === 0) match.awayScore++;
              else match.homeScore++;
              match.bases[2] = null;
            }
            if (match.bases[0] && match.bases[1]) match.bases[2] = match.bases[1];
            if (match.bases[0]) match.bases[1] = match.bases[0];
            match.bases[0] = getCurrentBatter();
            nextBatter();
          }
        }
        match.resultTimer = 30;
        if (match.phase !== 'game_over') match.phase = 'pitch_select';
      }
      match.batter.swingResult = null;
    }
    return;
  }

  if (match.phase === 'fielding') {
    updateFielding(dt);
    return;
  }

  if (match.phase === 'hit_flight') {
    // HR ball flying animation
    match.ball.y -= 3 * dt * 60;
    match.ball.x += match.ball.vx * 0.3 * dt * 60;
    if (match.ball.y < 0) match.ball.active = false;
    return;
  }
}

function startNextGame() {
  if (season.week >= 14) { state = 'standings'; return; }
  const week = season.schedule[season.week];
  let gameFound = false;
  for (const pair of week) {
    if (pair[0] === season.playerTeam || pair[1] === season.playerTeam) {
      const home = pair[0] === season.playerTeam ? pair[0] : pair[1];
      const away = pair[0] === season.playerTeam ? pair[1] : pair[0];
      initMatch(home, away, true);
      state = 'playing';
      gameFound = true;
      break;
    }
  }
  if (!gameFound) {
    // Sim other games and advance
    season.week++;
    saveSeason();
  }
  // Sim non-player games
  for (const pair of week) {
    if (pair[0] !== season.playerTeam && pair[1] !== season.playerTeam) {
      const winner = Math.random() > 0.5 ? pair[0] : pair[1];
      const loser = winner === pair[0] ? pair[1] : pair[0];
      season.teams[winner].wins++;
      season.teams[loser].losses++;
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') { drawTitle(); return; }
  if (state === 'team_select') { drawTeamSelect(); return; }
  if (state === 'main_menu') { drawMainMenu(); return; }
  if (state === 'standings') { drawStandings(); return; }
  if (state === 'roster') { drawRoster(); return; }
  if (state === 'upgrade') { drawUpgrade(); return; }
  if (state === 'upgrade_player') { drawUpgradePlayer(); return; }
  if (state === 'free_agents') { drawFreeAgents(); return; }
  if (state === 'playing') { drawMatch(); return; }
  if (state === 'post_game') { drawPostGame(); return; }
}

function drawTitle() {
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, GW, GH);

  // Diamond background
  ctx.save();
  ctx.translate(240, 200);
  ctx.rotate(Math.PI / 4);
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 2;
  ctx.strokeRect(-60, -60, 120, 120);
  ctx.restore();

  // Title
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASEBALL STARS', 240, 80);

  ctx.fillStyle = '#88cc88';
  ctx.font = '14px monospace';
  ctx.fillText('Tales of Tasern League', 240, 110);

  // Animated ball
  const bx = 240 + Math.sin(frame * 0.03) * 80;
  const by = 150 + Math.cos(frame * 0.04) * 10;
  ctx.beginPath();
  ctx.arc(bx, by, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#c00';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(bx, by, 8, 0.3, 1.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(bx, by, 8, 3.4, 4.3);
  ctx.stroke();

  // Teams scroll
  const scrollY = (frame * 0.5) % (TEAMS.length * 20);
  for (let i = 0; i < TEAMS.length; i++) {
    const y = 190 + i * 20 - scrollY;
    if (y > 170 && y < 290) {
      ctx.fillStyle = TEAMS[i].colors[0];
      ctx.font = '11px monospace';
      ctx.fillText(TEAMS[i].name, 240, y);
    }
  }

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Press A to Start', 240, 305);
  TAS.input.drawTouchControls(GW, GH);
}

    }

    ctx.fillStyle = '#555';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    if (sel) ctx.fillText('+1 for $' + cost, 200, y + 22);
  }

  // Handle input for upgrade player
  if (TAS.input.justPressed('ArrowUp')) menuState.statIdx = (menuState.statIdx + 4) % 5;
  if (TAS.input.justPressed('ArrowDown')) menuState.statIdx = (menuState.statIdx + 1) % 5;
  if (TAS.input.justPressed('a') || TAS.input.touch.a) {
    const stat = stats[menuState.statIdx];
    const cost = Math.floor(p[stat] * 0.5 + 10);
    if (team.money >= cost && p[stat] < 99) {
      team.money -= cost;
      p[stat] = Math.min(99, p[stat] + 1);
      TAS.audio.playTone(600 + p[stat] * 5, 0.06, 'square');
      saveSeason();
    } else {
      TAS.audio.playTone(100, 0.1, 'triangle');
    }
  }
  if (TAS.input.justPressed('b') || TAS.input.touch.b) { state = 'upgrade'; }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('A=upgrade stat  B=back', 240, 310);
  TAS.input.drawTouchControls(GW, GH);
}

function drawFreeAgents() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);
  const team = season.teams[season.playerTeam];
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FREE AGENTS  -  $' + team.money, 240, 20);

  if (freeAgents.length === 0) {
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('No free agents available', 240, 160);
  }

  for (let i = 0; i < freeAgents.length; i++) {
    const p = freeAgents[i];
    const y = 50 + i * 40;
    const sel = i === subMenuIdx;
    if (sel) {
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(30, y - 8, 420, 35);
    }
    ctx.fillStyle = sel ? '#fff' : '#999';
    ctx.font = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(p.pos + ' ' + p.name, 40, y + 5);
    ctx.fillStyle = sel ? '#8f8' : '#666';
    ctx.font = '10px monospace';
    ctx.fillText('PWR:' + p.power + ' CON:' + p.contact + ' SPD:' + p.speed + ' ARM:' + p.arm + ' FLD:' + p.fielding, 40, y + 20);
    ctx.textAlign = 'right';
    ctx.fillStyle = team.money >= p.cost ? '#4f4' : '#f44';
    ctx.fillText('$' + p.cost, 430, y + 5);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('A=hire  B=back', 240, 310);
  TAS.input.drawTouchControls(GW, GH);
}

// === MATCH DRAWING ===
function drawMatch() {
  if (match.batView) {
    drawBattingView();
  } else {
    drawFieldingView();
  }

  // Scoreboard
  drawScoreboard();

  // Result text overlay
  if (match.resultTimer > 0) {
    const alpha = Math.min(1, match.resultTimer / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(100, 130, 280, 60);
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 2;
    ctx.strokeRect(100, 130, 280, 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(match.resultText, 240, 165);
    ctx.restore();
  }

  TAS.particles.draw();
  TAS.fx.drawFlash(GW, GH);
  TAS.input.drawTouchControls(GW, GH);
}

function drawBattingView() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 160);
  grad.addColorStop(0, '#0a1a3a');
  grad.addColorStop(1, '#1a3a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, 160);

  // Outfield wall
  ctx.fillStyle = '#1a4a1a';
  ctx.fillRect(0, 50, GW, 110);
  ctx.fillStyle = '#0a2a0a';
  ctx.fillRect(0, 50, GW, 4);

  // Stadium crowd
  for (let i = 0; i < 60; i++) {
    const cx = 20 + i * 8;
    const cy = 30 + Math.sin(i * 0.7 + frame * 0.05) * 3;
    ctx.fillStyle = pick(['#555','#666','#777','#888']);
    ctx.fillRect(cx, cy, 5, 8);
  }

  // Dirt/grass
  ctx.fillStyle = '#3a6a3a';
  ctx.fillRect(0, 160, GW, 160);
  ctx.fillStyle = '#8a6a3a';
  ctx.beginPath();
  ctx.moveTo(160, 320);
  ctx.lineTo(240, 160);
  ctx.lineTo(320, 320);
  ctx.closePath();
  ctx.fill();

  // Mound
  ctx.fillStyle = '#9a7a4a';
  ctx.beginPath();
  ctx.ellipse(240, 180, 20, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pitcher
  const pitcher = getCurrentPitcher();
  const pitchTeam = getPitchingTeam();
  drawPlayer(240, 175, pitchTeam.colors, false, match.phase === 'pitching');

  // Batter box
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(218, 260, 44, 50);

  // Home plate
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(240, 275);
  ctx.lineTo(248, 280);
  ctx.lineTo(248, 290);
  ctx.lineTo(232, 290);
  ctx.lineTo(232, 280);
  ctx.closePath();
  ctx.fill();

  // Batter
  const batTeam = getBattingTeam();
  const swinging = match.batter.swingTimer > 0;
  drawBatter(250, 270, batTeam.colors, swinging);

  // Ball in flight
  if (match.ball.active && match.phase === 'pitching') {
    const sz = 4 + (1 - match.ball.t) * 3;
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, sz, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#c00';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    // Ball shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(match.ball.x, 290, sz * 0.7, 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // HR ball flying
  if (match.phase === 'hit_flight' && match.ball.active) {
    const sz = 6 - match.ball.y * 0.01;
    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y, Math.max(2, sz), 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // Power meter
  if (match.batter.powerHold > 0 && isPlayerAtBat()) {
    ctx.fillStyle = '#333';
    ctx.fillRect(190, 250, 8, -50);
    const h = match.batter.powerHold * 50;
    ctx.fillStyle = match.batter.powerHold > 0.8 ? '#f00' : match.batter.powerHold > 0.5 ? '#ff0' : '#0f0';
    ctx.fillRect(190, 250, 8, -h);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.strokeRect(190, 200, 8, 50);
  }

  // Pitch selection indicator (when player is pitching)
  if (match.phase === 'pitch_select' && isPlayerPitching()) {
    ctx.fillStyle = '#000a';
    ctx.fillRect(10, 10, 120, 70);
    ctx.fillStyle = '#ffcc00';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('PITCH:', 15, 25);
    for (let i = 0; i < PITCHES.length; i++) {
      ctx.fillStyle = i === match.selectedPitch ? '#fff' : '#555';
      ctx.fillText((i === match.selectedPitch ? '>' : ' ') + PITCHES[i].name, 15, 40 + i * 12);
    }
    // Aim crosshair
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 1;
    const aimX = 240 + match.pitchAimX * 30;
    const aimY = 280 + match.pitchAimY * 20;
    ctx.beginPath();
    ctx.moveTo(aimX - 5, aimY);
    ctx.lineTo(aimX + 5, aimY);
    ctx.moveTo(aimX, aimY - 5);
    ctx.lineTo(aimX, aimY + 5);
    ctx.stroke();
  }

  // Strike zone indicator
  if (match.phase === 'pitching' || match.phase === 'pitch_select') {
    ctx.strokeStyle = 'rgba(255,255,0,0.2)';
    ctx.lineWidth = 1;
    ctx.strokeRect(215, 260, 50, 40);
  }

  // Count display
  ctx.fillStyle = '#000a';
  ctx.fillRect(380, 250, 90, 60);
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('B: ' + match.balls, 390, 268);
  ctx.fillText('S: ' + match.strikes, 390, 283);
  ctx.fillText('O: ' + match.outs, 390, 298);

  // Bases indicator
  drawBasesIndicator(420, 25);
}

function drawFieldingView() {
  // Green field
  ctx.fillStyle = '#2a6a2a';
  ctx.fillRect(0, 0, GW, GH);

  // Outfield arc
  ctx.beginPath();
  ctx.arc(240, 270, 220, Math.PI + 0.3, -0.3);
  ctx.strokeStyle = '#1a4a1a';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Diamond
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(BASES[0].x, BASES[0].y);
  ctx.lineTo(BASES[1].x, BASES[1].y);
  ctx.lineTo(BASES[2].x, BASES[2].y);
  ctx.lineTo(BASES[3].x, BASES[3].y);
  ctx.closePath();
  ctx.stroke();

  // Bases
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = '#fff';
    ctx.save();
    ctx.translate(BASES[i].x, BASES[i].y);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-5, -5, 10, 10);
    ctx.restore();
  }

  // Infield dirt
  ctx.beginPath();
  ctx.arc(240, 200, 75, 0, Math.PI * 2);
  ctx.fillStyle = '#8a6a3a44';
  ctx.fill();

  // Mound
  ctx.beginPath();
  ctx.arc(240, 230, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#9a7a4a';
  ctx.fill();

  // Fielders
  const pitchTeam = getPitchingTeam();
  for (let i = 0; i < match.fielders.length; i++) {
    const f = match.fielders[i];
    drawPlayerTop(f.x, f.y, pitchTeam.colors, f.hasBall);
  }

  // Runners
  const batTeam = getBattingTeam();
  for (const r of match.runners) {
    drawPlayerTop(r.x, r.y, batTeam.colors, false);
  }

  // Ball
  if (match.ball.active) {
    const shadowY = match.ball.y + match.ball.z * 0.5;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(match.ball.x, shadowY + 3, 4, 2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(match.ball.x, match.ball.y - match.ball.z, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  drawBasesIndicator(420, 25);
}

function drawPlayer(x, y, colors, batting, throwing) {
  // Simple side-view player
  ctx.fillStyle = colors[0];
  ctx.fillRect(x - 4, y - 16, 8, 12); // body
  ctx.fillStyle = colors[1];
  ctx.fillRect(x - 3, y - 4, 6, 8); // legs
  ctx.fillStyle = '#fda';
  ctx.beginPath();
  ctx.arc(x, y - 20, 5, 0, Math.PI * 2); // head
  ctx.fill();
  ctx.fillStyle = colors[0];
  ctx.fillRect(x - 5, y - 24, 10, 3); // cap

  if (throwing) {
    ctx.strokeStyle = colors[1];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 4, y - 14);
    ctx.lineTo(x + 12, y - 22);
    ctx.stroke();
  }
}

function drawBatter(x, y, colors, swinging) {
  ctx.fillStyle = colors[0];
  ctx.fillRect(x - 4, y - 16, 8, 12);
  ctx.fillStyle = colors[1];
  ctx.fillRect(x - 3, y - 4, 6, 8);
  ctx.fillStyle = '#fda';
  ctx.beginPath();
  ctx.arc(x, y - 20, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = colors[0];
  ctx.fillRect(x - 6, y - 24, 12, 3); // helmet

  // Bat
  ctx.strokeStyle = '#c90';
  ctx.lineWidth = 3;
  ctx.beginPath();
  if (swinging) {
    ctx.moveTo(x - 4, y - 12);
    ctx.lineTo(x - 20, y - 6);
  } else {
    ctx.moveTo(x - 4, y - 14);
    ctx.lineTo(x - 8, y - 30);
  }
  ctx.stroke();
}

function drawPlayerTop(x, y, colors, hasBall) {
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = colors[0];
  ctx.fill();
  ctx.strokeStyle = colors[1];
  ctx.lineWidth = 2;
  ctx.stroke();
  if (hasBall) {
    ctx.beginPath();
    ctx.arc(x + 5, y - 5, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

function drawBasesIndicator(x, y) {
  ctx.fillStyle = '#0008';
  ctx.fillRect(x - 20, y - 5, 40, 40);
  // Diamond shape for bases
  const bx = x, by = y + 20;
  const bs = 10;
  // Draw diamond outline
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bx, by + bs); // home
  ctx.lineTo(bx + bs, by);
  ctx.lineTo(bx, by - bs);
  ctx.lineTo(bx - bs, by);
  ctx.closePath();
  ctx.stroke();
  // Filled bases
  if (match.bases[0]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx + bs - 3, by - 3, 6, 6); }
  if (match.bases[1]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx - 3, by - bs - 3, 6, 6); }
  if (match.bases[2]) { ctx.fillStyle = '#ff0'; ctx.fillRect(bx - bs - 3, by - 3, 6, 6); }
}

function drawScoreboard() {
  ctx.fillStyle = '#000c';
  ctx.fillRect(0, 0, GW, 18);
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';

  const away = season.teams[match.away];
  const home = season.teams[match.home];
  ctx.fillStyle = away.colors[0];
  ctx.fillText(away.abbr + ': ' + match.awayScore, 10, 13);
  ctx.fillStyle = home.colors[0];
  ctx.fillText(home.abbr + ': ' + match.homeScore, 90, 13);

  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  const halfStr = match.half === 0 ? 'TOP' : 'BOT';
  ctx.fillText(halfStr + ' ' + match.inning, 200, 13);

  // Batter info
  const batter = getCurrentBatter();
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText(batter.name.split(' ')[1] + ' (' + batter.pos + ')', 470, 13);
}

function drawPostGame() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  const winner = match.homeScore > match.awayScore ? match.home : match.away;
  const winTeam = season.teams[winner];

  ctx.fillStyle = winTeam.colors[0];
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', 240, 40);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(season.teams[match.away].name + '  ' + match.awayScore, 240, 80);
  ctx.fillText('vs', 240, 100);
  ctx.fillText(season.teams[match.home].name + '  ' + match.homeScore, 240, 120);

  ctx.fillStyle = winTeam.colors[0];
  ctx.font = '14px monospace';
  ctx.fillText(winTeam.name + ' WIN!', 240, 155);

  if (winner === season.playerTeam) {
    ctx.fillStyle = '#4f4';
    ctx.fillText('+$200 Win Bonus', 240, 180);
  } else {
    ctx.fillStyle = '#f84';
    ctx.fillText('+$50 Participation', 240, 180);
  }

  // Game log
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  const log = match.gameLog.slice(-8);
  for (let i = 0; i < log.length; i++) {
    ctx.fillText(log[i], 100, 210 + i * 13);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('Press A to continue', 240, 310);
  TAS.input.drawTouchControls(GW, GH);
}

// === INPUT HELPERS (justPressed tracking) ===
let prevKeys = {};
TAS.input.justPressed = function(key) {
  const cur = TAS.input.keys[key] || false;
  const prev = prevKeys[key] || false;
  return cur && !prev;
};
TAS.input.justReleased = function(key) {
  const cur = TAS.input.keys[key] || false;
  const prev = prevKeys[key] || false;
  return !cur && prev;
};

function postUpdate() {
  prevKeys = {};
  for (const k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}

// === MAIN LOOP ===
const origLoop = TAS.loop.start;
TAS.loop.start(function(dt) {
  update(dt);
  postUpdate();
}, draw);

})();
</script>
