<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crisis Force</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 320, GH = 480;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'FIRE', b: 'FORM' } });

const FORMS = { SPEED: 0, POWER: 1, SHIELD: 2 };
const FORM_NAMES = ['SPEED', 'POWER', 'SHIELD'];
const FORM_COLORS = ['#00ffcc', '#ff4488', '#4488ff'];
const STAGE_COUNT = 7;
const STAGE_LENGTH = 2400; // frames per stage before boss
const MAX_LIVES = 3;
const MAX_BOMBS = 2;
const INVULN_TIME = 120;
const MEGA_MAX = 100;

// ============================================================
// PASS 1 — STAT BONUSES
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Stat helper functions
function strDmgMult() { return statB.damage * (1 + (statB.str - 10) * 0.05); }
function strBombMult() { return 1 + (statB.str - 10) * 0.06; }
function dexSpeedMult() { return statB.speed * (1 + (statB.dex - 10) * 0.03); }
function conHpMult() { return statB.hpMult * (1 + (statB.con - 10) * 0.06); }
function conMaxHp() { return Math.floor(3 * conHpMult()); }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisFireRateMult() { return Math.max(0.4, statB.cooldown * (1 - (statB.wis - 10) * 0.03)); }
function chaDropChance() { return Math.min(0.5, 0.12 + (statB.cha - 10) * 0.02) * statB.luck; }

// Stage definitions — PASS 2/3 enhanced
const STAGES = [
  { name: 'Tasern Outskirts', subtitle: 'THE SPORE FRONT', bgTop: '#0a0a2a', bgBot: '#1a0a1a', accent: '#3344aa', groundColor: '#222244' },
  { name: 'Dark Ocean', subtitle: 'REACTOR DEBRIS FIELD', bgTop: '#001122', bgBot: '#000811', accent: '#114466', groundColor: '#0a2233' },
  { name: 'Volcanic Reach', subtitle: 'MOLTEN CORE', bgTop: '#1a0800', bgBot: '#0a0400', accent: '#883311', groundColor: '#331100' },
  { name: 'Sky Fortress', subtitle: 'ASTEROID APPROACH', bgTop: '#101830', bgBot: '#080c18', accent: '#4466aa', groundColor: '#2a3355' },
  { name: 'Spore Hive', subtitle: 'MYCELIAL NETWORK', bgTop: '#0a1a0a', bgBot: '#041004', accent: '#33aa44', groundColor: '#1a3322' },
  { name: 'Crystal Dimension', subtitle: 'REACTOR CORE', bgTop: '#1a0a2a', bgBot: '#0a0418', accent: '#aa44cc', groundColor: '#331155' },
  { name: 'Mothership', subtitle: 'FINAL CONFRONTATION', bgTop: '#0a0a0a', bgBot: '#000000', accent: '#cc2244', groundColor: '#1a0a0a' }
];

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('crisisforce_hi');
let lives = MAX_LIVES;
let bombs = MAX_BOMBS;
let stage = 0;
let frame = 0;
let stageTimer = 0;
let bossActive = false;
let bossSpawned = false;
let stageCleared = false;
let stageClearTimer = 0;
let stageIntroTimer = 0;
let gameOverTimer = 0;

// Player state
let px, py;
let currentForm = FORMS.SPEED;
let formLevels = [1, 1, 1];
let megaMeter = 0;
let megaActive = 0;
let invuln = 0;
let hp = 3;
let maxHp = 3;
let fireTimer = 0;
let formSwitchCooldown = 0;
let shieldAngle = 0;
let streakMultiplier = 1;
let streakCount = 0;
let bombFlash = 0;
let lpShieldTimer = 0;
let tripleShotTimer = 0;

// Object pools
let pBullets = [];
let eBullets = [];
let enemies = [];
let powerups = [];
let explosions = [];
let bgElements = [];
let bgParallax = [];
let boss = null;

// Scroll
let scrollY = 0;
let scrollSpeed = 1.5;

// Screen shake (PASS 3)
let shakeX = 0, shakeY = 0, shakeIntensity = 0;

// Input tracking
let lastBPress = false;
let fireHeld = false;

// ============================================================
// UTILITY
// ============================================================
function rng(min, max) { return min + Math.random() * (max - min); }
function rngInt(min, max) { return Math.floor(rng(min, max + 1)); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function dist(x1, y1, x2, y2) { const dx = x2-x1, dy = y2-y1; return Math.sqrt(dx*dx+dy*dy); }
function angleTo(x1, y1, x2, y2) { return Math.atan2(y2-y1, x2-x1); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ============================================================
// AUDIO HELPERS
// ============================================================
function sfxShoot() { TAS.audio.playTone(800 + currentForm * 200, 0.05, 'square', 0.04, 400); }
function sfxHit() { TAS.audio.playTone(200, 0.15, 'sawtooth', 0.08, 50); }
function sfxExplode() { TAS.audio.playNoise(0.2, 0.08, 800); }
function sfxBigExplode() { TAS.audio.playNoise(0.4, 0.12, 400); }
function sfxPowerup() { TAS.audio.playTone(880, 0.08, 'sine', 0.06, 1760); }
function sfxTransform() { TAS.audio.playTone(440, 0.1, 'sawtooth', 0.06, 880); TAS.audio.playTone(660, 0.1, 'square', 0.04, 1320); }
function sfxMega() { TAS.audio.playTone(220, 0.3, 'sawtooth', 0.1, 110); TAS.audio.playNoise(0.5, 0.1, 2000); }
function sfxBomb() { TAS.audio.playNoise(0.6, 0.12, 300); TAS.audio.playTone(100, 0.4, 'sine', 0.08, 30); }
function sfxDie() { TAS.audio.playTone(300, 0.3, 'sawtooth', 0.1, 50); TAS.audio.playNoise(0.4, 0.1, 600); }
function sfxSporeSpread() { TAS.audio.playTone(300, 0.08, 'sawtooth', 0.05, 600); TAS.audio.playNoise(0.1, 0.04, 1200); }
function sfxReactorBeam() { TAS.audio.playTone(150, 0.2, 'square', 0.08, 75); }

// ============================================================
// GAME INIT
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  maxHp = conMaxHp();
  lives = MAX_LIVES + bonusLives();
  bombs = MAX_BOMBS;
  hp = maxHp;
  stage = 0;
  stageTimer = 0;
  frame = 0;
  currentForm = FORMS.SPEED;
  formLevels = [1, 1, 1];
  megaMeter = 0;
  megaActive = 0;
  invuln = 60;
  streakMultiplier = 1;
  streakCount = 0;
  px = Math.floor(GW / 2);
  py = Math.floor(GH - 80);
  pBullets = [];
  eBullets = [];
  enemies = [];
  powerups = [];
  explosions = [];
  bgElements = [];
  bgParallax = [];
  boss = null;
  bossActive = false;
  bossSpawned = false;
  stageCleared = false;
  stageClearTimer = 0;
  stageIntroTimer = 120;
  bombFlash = 0;
  lpShieldTimer = 0;
  tripleShotTimer = 0;
  shakeIntensity = 0;
  TAS.particles.clear();
  initBgElements();
}

function initBgElements() {
  bgElements = [];
  for (let i = 0; i < 40; i++) {
    bgElements.push({
      x: rng(0, GW),
      y: rng(0, GH),
      speed: rng(0.3, 1.5),
      size: rng(1, 3),
      bright: rng(0.3, 1)
    });
  }
  // PASS 3 — parallax layers
  bgParallax = [];
  for (let i = 0; i < 15; i++) {
    bgParallax.push({
      x: rng(0, GW),
      y: rng(0, GH),
      speed: rng(0.1, 0.5),
      size: rng(4, 10),
      bright: rng(0.05, 0.15),
      type: rngInt(0, 2)
    });
  }
}

// ============================================================
// PLAYER SHIP DRAWING — PASS 3 improved sprites
// ============================================================
function drawShip(x, y, form, flash) {
  ctx.save();
  ctx.translate(Math.floor(x), Math.floor(y));

  const glow = Math.sin(frame * 0.1) * 0.2 + 0.8;
  const baseColor = FORM_COLORS[form];

  if (flash && frame % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  // LP Shield aura (PASS 2)
  if (lpShieldTimer > 0) {
    ctx.globalAlpha = Math.min(1, lpShieldTimer / 30) * 0.4;
    ctx.strokeStyle = '#44ffaa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 22 + Math.sin(frame * 0.15) * 3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = flash && frame % 4 < 2 ? 0.5 : 1;
  }

  if (form === FORMS.SPEED) {
    // Sleek narrow ship — NES-style detail
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(-6, 8);
    ctx.lineTo(-3, 12);
    ctx.lineTo(3, 12);
    ctx.lineTo(6, 8);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#aaffee';
    ctx.fillRect(-2, -8, 4, 4);
    // Engine glow
    ctx.fillStyle = '#ffff00';
    ctx.globalAlpha = glow * 0.8;
    ctx.beginPath();
    ctx.moveTo(-2, 12);
    ctx.lineTo(2, 12);
    ctx.lineTo(0, 12 + 6 + Math.sin(frame * 0.3) * 3);
    ctx.fill();
    ctx.globalAlpha = flash && frame % 4 < 2 ? 0.5 : 1;
    // Wing tips with pulse
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-7, 4, 2, 2);
    ctx.fillRect(5, 4, 2, 2);
    // Triple shot indicator
    if (tripleShotTimer > 0) {
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(-9, 0, 2, 3);
      ctx.fillRect(7, 0, 2, 3);
    }
  } else if (form === FORMS.POWER) {
    // Wide aggressive ship
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(-12, 4);
    ctx.lineTo(-14, 10);
    ctx.lineTo(-8, 12);
    ctx.lineTo(-3, 8);
    ctx.lineTo(3, 8);
    ctx.lineTo(8, 12);
    ctx.lineTo(14, 10);
    ctx.lineTo(12, 4);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#ffccdd';
    ctx.fillRect(-2, -6, 4, 4);
    // Cannons with glow
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(-14, 6, 3, 6);
    ctx.fillRect(11, 6, 3, 6);
    ctx.fillStyle = '#ff8800';
    ctx.globalAlpha = glow * 0.6;
    ctx.fillRect(-14, 11, 3, 2);
    ctx.fillRect(11, 11, 3, 2);
    ctx.globalAlpha = flash && frame % 4 < 2 ? 0.5 : 1;
    // Engine
    ctx.fillStyle = '#ff6600';
    ctx.globalAlpha = glow * 0.8;
    ctx.fillRect(-4, 10, 8, 3 + Math.sin(frame * 0.2) * 2);
    ctx.globalAlpha = 1;
  } else {
    // Bulky shield ship
    ctx.fillStyle = baseColor;
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(-10, 0);
    ctx.lineTo(-12, 10);
    ctx.lineTo(-6, 14);
    ctx.lineTo(6, 14);
    ctx.lineTo(12, 10);
    ctx.lineTo(10, 0);
    ctx.closePath();
    ctx.fill();
    // Cockpit
    ctx.fillStyle = '#aaccff';
    ctx.fillRect(-2, -4, 4, 4);
    // Shield panels
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.3;
    ctx.beginPath();
    ctx.arc(0, 2, 16, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    // Rotating barrier
    shieldAngle += 0.05;
    for (let i = 0; i < 4; i++) {
      const a = shieldAngle + (Math.PI * 2 / 4) * i;
      const sx = Math.floor(Math.cos(a) * 20);
      const sy = Math.floor(Math.sin(a) * 20);
      ctx.fillStyle = '#88ddff';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Engine
    ctx.fillStyle = '#4466ff';
    ctx.globalAlpha = glow * 0.7;
    ctx.fillRect(-3, 14, 6, 3);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// PLAYER SHOOTING — PASS 1 stats wired, PASS 2 new weapons
// ============================================================
function getFireRate() {
  const base = currentForm === FORMS.SPEED ? 5 : currentForm === FORMS.POWER ? 8 : 10;
  return Math.max(2, Math.floor((base - formLevels[currentForm]) * wisFireRateMult()));
}

function getPlayerSpeed() {
  const base = currentForm === FORMS.SPEED ? 4.5 : currentForm === FORMS.POWER ? 3.0 : 2.2;
  return base * dexSpeedMult();
}

function fireWeapon() {
  const lv = formLevels[currentForm];
  const dmgMult = strDmgMult();
  const tripleActive = tripleShotTimer > 0;
  sfxShoot();

  if (currentForm === FORMS.SPEED) {
    // Focused forward shot — STR scales damage
    pBullets.push({ x: px, y: py - 16, vx: 0, vy: -8, w: 3, h: 10, dmg: Math.floor(2 * dmgMult), color: '#00ffcc' });
    if (lv >= 2 || tripleActive) {
      pBullets.push({ x: px - 6, y: py - 12, vx: -0.5, vy: -7.5, w: 2, h: 8, dmg: Math.floor(1 * dmgMult), color: '#00ddaa' });
      pBullets.push({ x: px + 6, y: py - 12, vx: 0.5, vy: -7.5, w: 2, h: 8, dmg: Math.floor(1 * dmgMult), color: '#00ddaa' });
    }
    if (lv >= 3) {
      // Reactor Beam — PASS 2 weapon at max level
      pBullets.push({ x: px, y: py - 18, vx: 0, vy: -9, w: 5, h: 16, dmg: Math.floor(4 * dmgMult), color: '#aaffee', beam: true });
    }
  } else if (currentForm === FORMS.POWER) {
    // Spore Spread — PASS 2 weapon (was just "wide spread")
    const spread = lv >= 2 ? 5 : 3;
    const extra = tripleActive ? 2 : 0;
    for (let i = 0; i < spread + extra; i++) {
      const angle = -Math.PI/2 + (i - (spread + extra - 1)/2) * 0.18;
      pBullets.push({ x: px, y: py - 10, vx: Math.cos(angle) * 6, vy: Math.sin(angle) * 6, w: 4, h: 4, dmg: Math.floor(1.5 * dmgMult), color: '#ff4488' });
    }
    if (lv >= 2) {
      pBullets.push({ x: px - 10, y: py + 8, vx: -1, vy: 5, w: 3, h: 3, dmg: Math.floor(1 * dmgMult), color: '#ff8844' });
      pBullets.push({ x: px + 10, y: py + 8, vx: 1, vy: 5, w: 3, h: 3, dmg: Math.floor(1 * dmgMult), color: '#ff8844' });
    }
    if (lv >= 3) {
      // Homing spore missiles
      if (frame % 20 === 0) {
        pBullets.push({ x: px - 12, y: py, vx: -2, vy: -4, w: 3, h: 6, dmg: Math.floor(3 * dmgMult), color: '#44cc44', homing: true });
        pBullets.push({ x: px + 12, y: py, vx: 2, vy: -4, w: 3, h: 6, dmg: Math.floor(3 * dmgMult), color: '#44cc44', homing: true });
      }
    }
  } else {
    // Shield form: pulse shots
    pBullets.push({ x: px, y: py - 12, vx: 0, vy: -5, w: 6, h: 6, dmg: Math.floor(2 * dmgMult), color: '#4488ff' });
    if (lv >= 2 || tripleActive) {
      pBullets.push({ x: px - 12, y: py, vx: -3, vy: -3, w: 4, h: 4, dmg: Math.floor(1.5 * dmgMult), color: '#6688ff' });
      pBullets.push({ x: px + 12, y: py, vx: 3, vy: -3, w: 4, h: 4, dmg: Math.floor(1.5 * dmgMult), color: '#6688ff' });
    }
    if (lv >= 3) {
      pBullets.push({ x: px, y: py - 14, vx: 0, vy: -6, w: 8, h: 8, dmg: Math.floor(4 * dmgMult), color: '#aaccff' });
    }
  }
}

// ============================================================
// MEGA ATTACK
// ============================================================
function fireMega() {
  if (megaMeter < MEGA_MAX) return;
  megaMeter = 0;
  megaActive = 90;
  sfxMega();
  TAS.fx.flash('#ffffff', 0.5);
  TAS.fx.shake(8, 0.92);
  triggerShake(10);
}

function updateMega(dt) {
  if (megaActive <= 0) return;
  megaActive--;
  const dmg = strDmgMult();

  if (currentForm === FORMS.SPEED) {
    for (let e of enemies) {
      if (Math.abs(e.x - px) < 30) {
        e.hp -= 0.5 * dmg;
      }
    }
    if (boss && Math.abs(boss.x - px) < 40) boss.hp -= 0.8 * dmg;
  } else if (currentForm === FORMS.POWER) {
    for (let e of enemies) {
      e.hp -= 0.3 * dmg;
    }
    if (boss) boss.hp -= 0.4 * dmg;
    eBullets = [];
  } else {
    invuln = Math.max(invuln, 5);
    for (let e of enemies) {
      if (dist(px, py, e.x, e.y) < 80) e.hp -= 0.4 * dmg;
    }
    if (boss && dist(px, py, boss.x, boss.y) < 100) boss.hp -= 0.3 * dmg;
    eBullets = eBullets.filter(b => dist(px, py, b.x, b.y) > 60);
  }
}

function drawMega() {
  if (megaActive <= 0) return;
  const alpha = megaActive / 90;

  if (currentForm === FORMS.SPEED) {
    const w = 20 + Math.sin(frame * 0.5) * 8;
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(Math.floor(px - w/2), 0, Math.floor(w), Math.floor(py - 14));
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.floor(px - w/4), 0, Math.floor(w/2), Math.floor(py - 14));
    ctx.globalAlpha = 1;
  } else if (currentForm === FORMS.POWER) {
    const radius = (90 - megaActive) * 4;
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = '#ff4488';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(Math.floor(px), Math.floor(py), Math.floor(radius), 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#ffcc00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(Math.floor(px), Math.floor(py), Math.floor(radius * 0.7), 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    ctx.globalAlpha = alpha * 0.5;
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.arc(Math.floor(px), Math.floor(py), Math.floor(60 + Math.sin(frame * 0.2) * 10), 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#aaccff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(Math.floor(px), Math.floor(py), 70, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// ENEMIES — PASS 2: new Tasern enemies
// ============================================================
function spawnEnemy(type, x, y, opts) {
  opts = opts || {};
  const e = { type, x: Math.floor(x), y: Math.floor(y), hp: 1, maxHp: 1, vx: 0, vy: 1, w: 12, h: 12, fireTimer: 0, fireRate: 60, age: 0, phase: 0 };

  switch (type) {
    case 'drone':
      e.hp = e.maxHp = 2; e.vy = 1.5; e.w = 10; e.h = 10; e.fireRate = 90; break;
    case 'spinner':
      e.hp = e.maxHp = 4; e.w = 14; e.h = 14; e.vy = 0.8; e.fireRate = 45; break;
    case 'blade':
      e.hp = e.maxHp = 3; e.w = 16; e.h = 8; e.vy = 2; e.vx = opts.vx || 0; break;
    case 'turret':
      e.hp = e.maxHp = 6; e.w = 16; e.h = 16; e.vy = 0.5; e.fireRate = 30; break;
    case 'fungal':
      e.hp = e.maxHp = 3; e.w = 12; e.h = 14; e.vy = 1.2; e.fireRate = 70; break;
    case 'heavy':
      e.hp = e.maxHp = 8; e.w = 20; e.h = 20; e.vy = 0.6; e.fireRate = 25; break;
    case 'snake':
      e.hp = e.maxHp = 2; e.w = 8; e.h = 8; e.vy = 1.8; e.phase = opts.phase || 0; break;
    case 'midboss':
      e.hp = e.maxHp = 40; e.w = 40; e.h = 30; e.vy = 0.3; e.fireRate = 20; break;
    // PASS 2 — new Tasern enemies
    case 'reactor_turret':
      e.hp = e.maxHp = 10; e.w = 18; e.h = 18; e.vy = 0.4; e.fireRate = 20; break;
    case 'spore_cloud':
      e.hp = e.maxHp = 2; e.w = 10; e.h = 10; e.vy = 1.0; e.phase = opts.phase || 0; e.leader = opts.leader || false; break;
    case 'mycelial_tentacle':
      e.hp = e.maxHp = 12; e.w = 10; e.h = 30; e.vy = 0.3; e.fireRate = 40; e.segments = 5; break;
  }
  enemies.push(e);
}

function updateEnemies(dt) {
  const m = dt * 60;
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.age++;
    e.x += e.vx * m;
    e.y += e.vy * m;

    // Movement patterns
    if (e.type === 'snake') {
      e.x += Math.sin((e.age + e.phase) * 0.05) * 2;
    } else if (e.type === 'spinner') {
      e.x += Math.sin(e.age * 0.03) * 1.5;
    } else if (e.type === 'midboss') {
      e.x = Math.floor(GW/2 + Math.sin(e.age * 0.02) * 80);
      if (e.y > 60) e.vy = 0;
    } else if (e.type === 'spore_cloud') {
      // Formation: sine wave, offset by phase
      e.x += Math.sin((e.age + e.phase) * 0.04) * 1.8;
    } else if (e.type === 'mycelial_tentacle') {
      // Sway side to side, track player loosely
      e.x += Math.sin(e.age * 0.02) * 0.8;
      e.x += (px - e.x) * 0.003 * m;
      if (e.y > 100) e.vy = 0;
    } else if (e.type === 'reactor_turret') {
      // Slow descent then park
      if (e.y > 50 + (e.phase * 30)) e.vy = 0;
      e.x += Math.sin(e.age * 0.015) * 0.5;
    }

    // Firing
    e.fireTimer++;
    if (e.fireTimer >= e.fireRate && e.y > 0 && e.y < GH - 30) {
      e.fireTimer = 0;
      enemyFire(e);
    }

    // Remove offscreen
    if (e.y > GH + 30 || e.x < -30 || e.x > GW + 30) {
      enemies.splice(i, 1);
      continue;
    }

    // Death check
    if (e.hp <= 0) {
      spawnExplosion(e.x, e.y, e.w);
      const baseScore = getEnemyScore(e.type);
      score += Math.floor(baseScore * streakMultiplier * intScoreMult());
      streakCount++;
      if (streakCount % 10 === 0 && streakMultiplier < 8) streakMultiplier++;
      megaMeter = Math.min(MEGA_MAX, megaMeter + (e.type === 'midboss' ? 20 : 3));
      // CHA-scaled drop chance
      if (Math.random() < chaDropChance() || e.type === 'midboss') {
        spawnPowerup(e.x, e.y);
      }
      // PASS 3 — extra particles on death
      if (e.w >= 16) {
        for (let p = 0; p < 3; p++) {
          TAS.particles.spawn(e.x + rng(-8, 8), e.y + rng(-8, 8), '#ff8844', 4, 2, { size: 2 });
        }
        triggerShake(3);
      }
      enemies.splice(i, 1);
    }
  }
}

function getEnemyScore(type) {
  switch (type) {
    case 'drone': return 100;
    case 'spinner': return 200;
    case 'blade': return 150;
    case 'turret': return 300;
    case 'fungal': return 180;
    case 'heavy': return 400;
    case 'snake': return 80;
    case 'midboss': return 2000;
    case 'reactor_turret': return 500;
    case 'spore_cloud': return 60;
    case 'mycelial_tentacle': return 600;
    default: return 100;
  }
}

function enemyFire(e) {
  const a = angleTo(e.x, e.y, px, py);
  const speed = 3 + stage * 0.3;

  if (e.type === 'turret' || e.type === 'heavy') {
    for (let i = -1; i <= 1; i++) {
      const sa = a + i * 0.25;
      eBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * speed, vy: Math.sin(sa) * speed, r: 3, color: '#ff6644' });
    }
  } else if (e.type === 'spinner') {
    for (let i = 0; i < 6; i++) {
      const sa = (Math.PI * 2 / 6) * i + e.age * 0.02;
      eBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * 2.5, vy: Math.sin(sa) * 2.5, r: 2, color: '#ffaa00' });
    }
  } else if (e.type === 'reactor_turret') {
    // 5-way burst with alternating patterns
    const pattern = e.age % 80 < 40 ? 'fan' : 'aimed';
    if (pattern === 'fan') {
      for (let i = -2; i <= 2; i++) {
        const sa = a + i * 0.2;
        eBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * (speed + 0.5), vy: Math.sin(sa) * (speed + 0.5), r: 3, color: '#44ffaa' });
      }
    } else {
      eBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * (speed + 1), vy: Math.sin(a) * (speed + 1), r: 4, color: '#88ffcc' });
      eBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * speed * 0.7, vy: Math.sin(a) * speed * 0.7, r: 3, color: '#44ffaa' });
    }
  } else if (e.type === 'spore_cloud') {
    // Spore clouds fire slow poison puffs downward
    if (e.leader) {
      eBullets.push({ x: e.x, y: e.y, vx: rng(-0.5, 0.5), vy: 2, r: 4, color: '#66cc44' });
    }
  } else if (e.type === 'mycelial_tentacle') {
    // Whip attack — fast aimed shot from tip
    const tipY = e.y + 15;
    eBullets.push({ x: e.x, y: tipY, vx: Math.cos(a) * (speed + 1), vy: Math.sin(a) * (speed + 1), r: 3, color: '#33aa66' });
    // Side spores
    eBullets.push({ x: e.x - 8, y: e.y, vx: -1.5, vy: 2, r: 2, color: '#44cc44' });
    eBullets.push({ x: e.x + 8, y: e.y, vx: 1.5, vy: 2, r: 2, color: '#44cc44' });
  } else if (e.type === 'midboss') {
    const pattern = (e.age % 180 < 60) ? 'aimed' : (e.age % 180 < 120) ? 'spiral' : 'spread';
    if (pattern === 'aimed') {
      eBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r: 4, color: '#ff2244' });
      eBullets.push({ x: e.x-15, y: e.y, vx: Math.cos(a) * speed*0.9, vy: Math.sin(a) * speed*0.9, r: 3, color: '#ff4466' });
      eBullets.push({ x: e.x+15, y: e.y, vx: Math.cos(a) * speed*0.9, vy: Math.sin(a) * speed*0.9, r: 3, color: '#ff4466' });
    } else if (pattern === 'spiral') {
      for (let i = 0; i < 3; i++) {
        const sa = e.age * 0.08 + (Math.PI * 2 / 3) * i;
        eBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * 3, vy: Math.sin(sa) * 3, r: 3, color: '#ccaa00' });
      }
    } else {
      for (let i = 0; i < 8; i++) {
        const sa = (Math.PI * 2 / 8) * i;
        eBullets.push({ x: e.x, y: e.y, vx: Math.cos(sa) * 2.5, vy: Math.sin(sa) * 2.5, r: 2, color: '#ff8844' });
      }
    }
  } else {
    eBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, r: 2, color: '#ff4444' });
  }
}

// ============================================================
// DRAW ENEMIES — PASS 3 improved sprites
// ============================================================
function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    ctx.translate(Math.floor(e.x), Math.floor(e.y));
    const hpRatio = e.hp / e.maxHp;
    const flash = (e.hp < e.maxHp && frame % 4 < 2) ? 0.5 : 0;

    if (e.type === 'drone') {
      ctx.fillStyle = flash ? '#fff' : '#88ff44';
      ctx.beginPath();
      ctx.moveTo(0, -6); ctx.lineTo(-6, 4); ctx.lineTo(6, 4);
      ctx.closePath(); ctx.fill();
      // Eye
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-1, -2, 2, 2);
    } else if (e.type === 'spinner') {
      ctx.rotate(e.age * 0.08);
      ctx.fillStyle = flash ? '#fff' : '#ffaa00';
      ctx.fillRect(-7, -7, 14, 14);
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(-4, -4, 8, 8);
      ctx.fillStyle = '#ffcc44';
      ctx.fillRect(-2, -2, 4, 4);
    } else if (e.type === 'blade') {
      ctx.rotate(e.age * 0.15);
      ctx.fillStyle = flash ? '#fff' : '#cc44cc';
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = (Math.PI/2) * i;
        ctx.lineTo(Math.floor(Math.cos(a)*8), Math.floor(Math.sin(a)*8));
        ctx.lineTo(Math.floor(Math.cos(a + Math.PI/4)*4), Math.floor(Math.sin(a + Math.PI/4)*4));
      }
      ctx.closePath(); ctx.fill();
    } else if (e.type === 'turret') {
      ctx.fillStyle = flash ? '#fff' : '#666688';
      ctx.fillRect(-8, -8, 16, 16);
      ctx.fillStyle = '#888899';
      ctx.fillRect(-6, -6, 12, 12);
      // Gun barrel pointing at player
      const ga = angleTo(0, 0, px - e.x, py - e.y);
      ctx.fillStyle = '#ff4444';
      ctx.save();
      ctx.rotate(ga);
      ctx.fillRect(0, -2, 12, 4);
      ctx.restore();
    } else if (e.type === 'fungal') {
      ctx.fillStyle = flash ? '#fff' : '#44aa66';
      ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#22cc44';
      ctx.beginPath(); ctx.arc(-3, -3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(3, -2, 2, 0, Math.PI * 2); ctx.fill();
      // Spore particles
      if (frame % 10 < 3) {
        ctx.fillStyle = '#88ff88';
        ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.arc(rng(-5, 5), rng(-5, 5), 1, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (e.type === 'heavy') {
      ctx.fillStyle = flash ? '#fff' : '#884444';
      ctx.fillRect(-10, -10, 20, 20);
      ctx.fillStyle = '#aa5544';
      ctx.fillRect(-8, -8, 16, 16);
      ctx.fillStyle = '#cc6644';
      ctx.fillRect(-6, -12, 4, 6);
      ctx.fillRect(2, -12, 4, 6);
      // Armor detail
      ctx.fillStyle = '#664433';
      ctx.fillRect(-4, -4, 8, 8);
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(-10, -14, 20, 2);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-10, -14, Math.floor(20 * hpRatio), 2);
    } else if (e.type === 'snake') {
      ctx.fillStyle = flash ? '#fff' : '#66ddaa';
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#44aa88';
      ctx.fillRect(-2, 2, 4, 4);
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-2, -2, 1, 1);
      ctx.fillRect(1, -2, 1, 1);
    } else if (e.type === 'reactor_turret') {
      // PASS 2 — Reactor Turret: hexagonal base with rotating cannon
      ctx.fillStyle = flash ? '#fff' : '#338866';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const rx = Math.floor(Math.cos(a) * 9);
        const ry = Math.floor(Math.sin(a) * 9);
        if (i === 0) ctx.moveTo(rx, ry); else ctx.lineTo(rx, ry);
      }
      ctx.closePath(); ctx.fill();
      // Inner core glow
      ctx.fillStyle = '#44ffaa';
      ctx.globalAlpha = 0.6 + Math.sin(e.age * 0.1) * 0.3;
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // Cannon barrel
      const ta = angleTo(0, 0, px - e.x, py - e.y);
      ctx.save();
      ctx.rotate(ta);
      ctx.fillStyle = '#226644';
      ctx.fillRect(0, -2, 14, 4);
      ctx.fillStyle = '#44ffaa';
      ctx.fillRect(12, -1, 3, 2);
      ctx.restore();
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(-9, -13, 18, 2);
      ctx.fillStyle = '#44ffaa';
      ctx.fillRect(-9, -13, Math.floor(18 * hpRatio), 2);
    } else if (e.type === 'spore_cloud') {
      // PASS 2 — Spore Cloud: translucent blob with spore particles
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = flash ? '#fff' : '#66aa44';
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#88cc66';
      ctx.globalAlpha = 0.4 + Math.sin(e.age * 0.08) * 0.2;
      ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // Floating spores
      for (let s = 0; s < 3; s++) {
        const sa = e.age * 0.05 + s * 2.1;
        const sd = 4 + Math.sin(e.age * 0.03 + s) * 2;
        ctx.fillStyle = '#aaff88';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(Math.floor(Math.cos(sa) * sd), Math.floor(Math.sin(sa) * sd), 2, 2);
      }
      ctx.globalAlpha = 1;
      if (e.leader) {
        ctx.fillStyle = '#ffcc44';
        ctx.fillRect(-1, -1, 2, 2);
      }
    } else if (e.type === 'mycelial_tentacle') {
      // PASS 2 — Mycelial Tentacle: segmented vine with glow tip
      const segs = e.segments || 5;
      for (let s = 0; s < segs; s++) {
        const segY = Math.floor(-12 + s * 6);
        const sway = Math.sin(e.age * 0.04 + s * 0.5) * (s * 1.5);
        const segX = Math.floor(sway);
        const segSize = Math.max(2, 5 - s * 0.5);
        ctx.fillStyle = flash ? '#fff' : (s === segs - 1 ? '#88ff66' : '#44884' + (4 + s));
        if (s === segs - 1) ctx.fillStyle = flash ? '#fff' : '#88ff66';
        else ctx.fillStyle = flash ? '#fff' : '#448844';
        ctx.beginPath(); ctx.arc(segX, segY, segSize, 0, Math.PI * 2); ctx.fill();
        // Connector
        if (s > 0) {
          const prevSway = Math.sin(e.age * 0.04 + (s-1) * 0.5) * ((s-1) * 1.5);
          ctx.strokeStyle = '#336633';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(Math.floor(prevSway), Math.floor(-12 + (s-1) * 6));
          ctx.lineTo(segX, segY);
          ctx.stroke();
        }
      }
      // Glowing tip
      ctx.fillStyle = '#ccff88';
      ctx.globalAlpha = 0.5 + Math.sin(e.age * 0.1) * 0.3;
      const tipSway = Math.sin(e.age * 0.04 + (segs-1) * 0.5) * ((segs-1) * 1.5);
      ctx.beginPath(); ctx.arc(Math.floor(tipSway), Math.floor(-12 + (segs-1) * 6), 3, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(-8, -18, 16, 2);
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(-8, -18, Math.floor(16 * hpRatio), 2);
    } else if (e.type === 'midboss') {
      ctx.fillStyle = flash ? '#fff' : '#aa4488';
      ctx.fillRect(-20, -15, 40, 30);
      ctx.fillStyle = '#cc66aa';
      ctx.fillRect(-16, -20, 8, 10);
      ctx.fillRect(8, -20, 8, 10);
      ctx.fillStyle = '#ff88cc';
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();
      // Armor plates
      ctx.fillStyle = '#884466';
      ctx.fillRect(-18, -4, 6, 8);
      ctx.fillRect(12, -4, 6, 8);
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(-20, -24, 40, 3);
      ctx.fillStyle = '#ff44aa';
      ctx.fillRect(-20, -24, Math.floor(40 * hpRatio), 3);
    }
    ctx.restore();
  }
}

// ============================================================
// BOSS SYSTEM — PASS 2 enhanced
// ============================================================
function spawnBoss() {
  bossSpawned = true;
  bossActive = true;
  const bossHp = 80 + stage * 30;
  boss = {
    x: Math.floor(GW / 2), y: -50, targetY: 60,
    hp: bossHp, maxHp: bossHp,
    w: 60, h: 40,
    phase: 0, phaseTimer: 0,
    fireTimer: 0, age: 0,
    parts: [
      { x: -25, y: 10, hp: 20, maxHp: 20, w: 12, h: 12, alive: true },
      { x: 25, y: 10, hp: 20, maxHp: 20, w: 12, h: 12, alive: true },
      { x: 0, y: -15, hp: 30, maxHp: 30, w: 16, h: 16, alive: true }
    ]
  };
  triggerShake(6);
}

function updateBoss(dt) {
  if (!boss) return;
  const m = dt * 60;
  boss.age++;

  // Enter
  if (boss.y < boss.targetY) {
    boss.y += 0.5 * m;
    return;
  }

  // Movement patterns based on phase
  boss.phaseTimer++;
  if (boss.phaseTimer > 300) {
    boss.phase = (boss.phase + 1) % 3;
    boss.phaseTimer = 0;
  }

  if (boss.phase === 0) {
    boss.x = Math.floor(GW/2 + Math.sin(boss.age * 0.015) * 100);
  } else if (boss.phase === 1) {
    boss.x += (px - boss.x) * 0.01 * m;
    boss.x = Math.floor(boss.x);
  } else {
    boss.x = Math.floor(GW/2 + Math.cos(boss.age * 0.03) * 60);
    boss.y = Math.floor(60 + Math.sin(boss.age * 0.02) * 20);
  }

  // Firing
  boss.fireTimer++;
  const rate = boss.hp < boss.maxHp * 0.3 ? 8 : boss.hp < boss.maxHp * 0.6 ? 12 : 18;
  if (boss.fireTimer >= rate) {
    boss.fireTimer = 0;
    bossFire();
  }

  // Part destruction
  for (const part of boss.parts) {
    if (!part.alive) continue;
    if (part.hp <= 0) {
      part.alive = false;
      spawnExplosion(boss.x + part.x, boss.y + part.y, 20);
      score += Math.floor(500 * streakMultiplier * intScoreMult());
      sfxBigExplode();
      triggerShake(5);
    }
  }

  // Boss death
  if (boss.hp <= 0) {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        if (boss) {
          spawnExplosion(boss.x + rng(-30, 30), boss.y + rng(-20, 20), 25);
        }
      }, i * 80);
    }
    score += Math.floor(5000 * streakMultiplier * intScoreMult());
    sfxBigExplode();
    TAS.fx.shake(12, 0.9);
    TAS.fx.flash('#ffffff', 0.7);
    triggerShake(15);
    boss = null;
    bossActive = false;
    stageCleared = true;
    stageClearTimer = 180;
    eBullets = [];
  }
}

function bossFire() {
  if (!boss) return;
  const a = angleTo(boss.x, boss.y, px, py);
  const spd = 3 + stage * 0.2;

  if (boss.phase === 0) {
    for (let i = 0; i < 3; i++) {
      const sa = a + (i - 1) * 0.15;
      eBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(sa) * spd, vy: Math.sin(sa) * spd, r: 4, color: '#ff2244' });
    }
  } else if (boss.phase === 1) {
    for (let i = 0; i < 5; i++) {
      const sa = boss.age * 0.06 + (Math.PI * 2 / 5) * i;
      eBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(sa) * spd, vy: Math.sin(sa) * spd, r: 3, color: '#ffaa22' });
    }
    // PASS 2 — spore cloud burst during spiral phase
    if (boss.age % 60 === 0) {
      for (let i = 0; i < 4; i++) {
        const sa = (Math.PI * 2 / 4) * i + boss.age * 0.02;
        eBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(sa) * 1.5, vy: Math.sin(sa) * 1.5, r: 5, color: '#66cc44' });
      }
    }
  } else {
    for (let i = 0; i < 8; i++) {
      const bx = Math.floor((GW / 9) * (i + 1));
      eBullets.push({ x: bx, y: boss.y + 25, vx: 0, vy: spd, r: 3, color: '#ff6644' });
    }
    eBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(a) * (spd + 1), vy: Math.sin(a) * (spd + 1), r: 5, color: '#ff0044' });
  }

  // Parts fire independently
  for (const part of boss.parts) {
    if (!part.alive) continue;
    if (boss.age % 30 === 0) {
      const pa = angleTo(boss.x + part.x, boss.y + part.y, px, py);
      eBullets.push({ x: boss.x + part.x, y: boss.y + part.y, vx: Math.cos(pa) * 2.5, vy: Math.sin(pa) * 2.5, r: 3, color: '#cc44ff' });
    }
  }
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(Math.floor(boss.x), Math.floor(boss.y));

  const flash = frame % 6 < 2 && boss.hp < boss.maxHp * 0.3;
  const pulse = Math.sin(frame * 0.08) * 0.3 + 0.7;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-32, -22, 64, 44);

  // Main body
  ctx.fillStyle = flash ? '#ffffff' : STAGES[stage].accent;
  ctx.fillRect(-30, -20, 60, 40);
  ctx.fillStyle = flash ? '#ffcccc' : '#442233';
  ctx.fillRect(-24, -16, 48, 32);
  // Armor detail
  ctx.fillStyle = '#553344';
  ctx.fillRect(-28, -6, 4, 12);
  ctx.fillRect(24, -6, 4, 12);

  // Core
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ff2266';
  ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff88aa';
  ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  // Parts
  for (const part of boss.parts) {
    if (!part.alive) continue;
    ctx.fillStyle = '#aa6688';
    ctx.fillRect(Math.floor(part.x - part.w/2), Math.floor(part.y - part.h/2), part.w, part.h);
    ctx.fillStyle = '#ff4488';
    ctx.beginPath(); ctx.arc(Math.floor(part.x), Math.floor(part.y), 4, 0, Math.PI * 2); ctx.fill();
    // Part HP indicator
    ctx.fillStyle = '#ff88aa';
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(Math.floor(part.x), Math.floor(part.y), 2, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Damage sparks
  if (boss.hp < boss.maxHp * 0.5 && frame % 8 < 3) {
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(Math.floor(rng(-20, 20)), Math.floor(rng(-15, 15)), 2, 2);
  }

  ctx.restore();

  // HP bar at top
  const barW = 100;
  const barX = Math.floor(GW/2 - barW/2);
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, 32, barW, 5);
  const hpColor = boss.hp > boss.maxHp * 0.6 ? '#ff4488' : boss.hp > boss.maxHp * 0.3 ? '#ffaa44' : '#ff0000';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, 32, Math.floor(barW * (boss.hp / boss.maxHp)), 5);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGES[stage].name.toUpperCase() + ' BOSS', Math.floor(GW/2), 30);
}

// ============================================================
// POWERUPS — PASS 2: LP Shield, Myco Bomb, Triple Shot
// ============================================================
function spawnPowerup(x, y) {
  const types = ['weapon', 'mega', 'bomb', 'heal', 'lp_shield', 'myco_bomb', 'triple_shot'];
  const weights = [0.35, 0.2, 0.08, 0.1, 0.1, 0.07, 0.1];
  let r = Math.random(), acc = 0;
  let type = 'weapon';
  for (let i = 0; i < types.length; i++) {
    acc += weights[i];
    if (r < acc) { type = types[i]; break; }
  }
  powerups.push({ x: Math.floor(x), y: Math.floor(y), type, vy: 1.5, age: 0 });
}

function updatePowerups(dt) {
  const m = dt * 60;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * m;
    p.age++;
    if (p.y > GH + 10) { powerups.splice(i, 1); continue; }

    // Collect
    if (TAS.hit.rectOverlap(px - 10, py - 10, 20, 20, p.x - 8, p.y - 8, 16, 16)) {
      sfxPowerup();
      if (p.type === 'weapon') {
        formLevels[currentForm] = Math.min(3, formLevels[currentForm] + 1);
      } else if (p.type === 'mega') {
        megaMeter = Math.min(MEGA_MAX, megaMeter + 25);
      } else if (p.type === 'bomb') {
        bombs = Math.min(MAX_BOMBS + 1, bombs + 1);
      } else if (p.type === 'heal') {
        hp = Math.min(maxHp, hp + 1);
      } else if (p.type === 'lp_shield') {
        lpShieldTimer = 600; // 10 seconds at 60fps
      } else if (p.type === 'myco_bomb') {
        // Instant area damage to all enemies
        sfxBigExplode();
        triggerShake(8);
        TAS.fx.flash('#44ff44', 0.4);
        for (const e of enemies) e.hp -= Math.floor(4 * strBombMult());
        if (boss) boss.hp -= Math.floor(8 * strBombMult());
        eBullets = eBullets.filter(b => dist(px, py, b.x, b.y) > 100);
        // Spore explosion particles
        for (let s = 0; s < 12; s++) {
          TAS.particles.spawn(px + rng(-40, 40), py + rng(-40, 40), '#88ff44', 5, 3, { size: 3 });
        }
      } else if (p.type === 'triple_shot') {
        tripleShotTimer = 480; // 8 seconds
      }
      TAS.particles.spawn(p.x, p.y, '#ffffff', 8, 2, { size: 2 });
      powerups.splice(i, 1);
    }
  }
}

function drawPowerups() {
  for (const p of powerups) {
    const bob = Math.sin(p.age * 0.1) * 2;
    ctx.save();
    ctx.translate(Math.floor(p.x), Math.floor(p.y + bob));

    if (p.type === 'weapon') {
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(-6, -6, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('W', 0, 3);
    } else if (p.type === 'mega') {
      ctx.fillStyle = '#ff44ff';
      ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('M', 0, 3);
    } else if (p.type === 'bomb') {
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(-5, -5, 10, 10);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('B', 0, 3);
    } else if (p.type === 'heal') {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('+', 0, 3);
    } else if (p.type === 'lp_shield') {
      // LP Shield — green hexagonal
      ctx.fillStyle = '#44ffaa';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI / 3) * i - Math.PI / 6;
        const hx = Math.floor(Math.cos(a) * 7);
        const hy = Math.floor(Math.sin(a) * 7);
        if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LP', 0, 2);
    } else if (p.type === 'myco_bomb') {
      // Myco Bomb — spore circle
      ctx.fillStyle = '#88cc44';
      ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ccff88';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#223311';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('S', 0, 3);
    } else if (p.type === 'triple_shot') {
      // Triple Shot — orange triangle
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.moveTo(0, -7); ctx.lineTo(-7, 5); ctx.lineTo(7, 5);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('3x', 0, 3);
    }
    ctx.restore();
  }
}

// ============================================================
// EXPLOSIONS — PASS 3 enhanced particles
// ============================================================
function spawnExplosion(x, y, size) {
  explosions.push({ x: Math.floor(x), y: Math.floor(y), size: size || 12, age: 0, maxAge: 24 });
  TAS.particles.spawn(x, y, '#ffaa44', 10, 3, { size: 3, sizeVar: 2 });
  TAS.particles.spawn(x, y, '#ff4444', 6, 2, { size: 2 });
  TAS.particles.spawn(x, y, '#ffffff', 4, 4, { size: 1 });
  sfxExplode();
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    explosions[i].age++;
    if (explosions[i].age > explosions[i].maxAge) explosions.splice(i, 1);
  }
}

function drawExplosions() {
  for (const e of explosions) {
    const t = e.age / e.maxAge;
    const r = e.size * (0.5 + t * 0.8);
    // PASS 3 — multi-layer explosion
    ctx.globalAlpha = (1 - t) * 0.8;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(Math.floor(e.x), Math.floor(e.y), Math.floor(r * 0.4), 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle = t < 0.3 ? '#ffffff' : t < 0.5 ? '#ffdd44' : t < 0.7 ? '#ffaa44' : '#ff4400';
    ctx.beginPath(); ctx.arc(Math.floor(e.x), Math.floor(e.y), Math.floor(r), 0, Math.PI * 2); ctx.fill();
    // Outer ring
    if (t > 0.2 && t < 0.8) {
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.strokeStyle = '#ff8844';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(Math.floor(e.x), Math.floor(e.y), Math.floor(r * 1.5), 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// SCREEN SHAKE — PASS 3
// ============================================================
function triggerShake(intensity) {
  shakeIntensity = Math.max(shakeIntensity, intensity);
}

function updateShake() {
  if (shakeIntensity > 0) {
    shakeX = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    shakeY = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    shakeIntensity *= 0.9;
    if (shakeIntensity < 0.5) { shakeIntensity = 0; shakeX = 0; shakeY = 0; }
  }
}

// ============================================================
// BULLET UPDATES
// ============================================================
function updateBullets(dt) {
  const m = dt * 60;

  // Player bullets
  for (let i = pBullets.length - 1; i >= 0; i--) {
    const b = pBullets[i];

    // Homing logic
    if (b.homing && enemies.length > 0) {
      let closest = null, closestD = Infinity;
      for (const e of enemies) {
        const d = dist(b.x, b.y, e.x, e.y);
        if (d < closestD) { closestD = d; closest = e; }
      }
      if (closest) {
        const a = angleTo(b.x, b.y, closest.x, closest.y);
        b.vx += Math.cos(a) * 0.3;
        b.vy += Math.sin(a) * 0.3;
        const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (spd > 5) { b.vx = (b.vx/spd)*5; b.vy = (b.vy/spd)*5; }
      }
    }

    b.x += b.vx * m;
    b.y += b.vy * m;

    if (b.y < -10 || b.y > GH + 10 || b.x < -10 || b.x > GW + 10) {
      pBullets.splice(i, 1);
      continue;
    }

    // Hit enemies
    let hit = false;
    for (const e of enemies) {
      if (TAS.hit.rectOverlap(b.x - b.w/2, b.y - b.h/2, b.w, b.h, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        e.hp -= b.dmg;
        hit = !b.beam; // Beam pierces through
        sfxHit();
        TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y), b.color, 3, 1.5, { size: 1 });
        if (!b.beam) break;
      }
    }

    // Hit boss
    if (!hit && boss) {
      if (TAS.hit.rectOverlap(b.x - b.w/2, b.y - b.h/2, b.w, b.h, boss.x - boss.w/2, boss.y - boss.h/2, boss.w, boss.h)) {
        boss.hp -= b.dmg;
        hit = !b.beam;
        sfxHit();
        TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y), '#ffffff', 2, 1, { size: 1 });
      }
      if (!hit) {
        for (const part of boss.parts) {
          if (!part.alive) continue;
          if (TAS.hit.rectOverlap(b.x - b.w/2, b.y - b.h/2, b.w, b.h,
            boss.x + part.x - part.w/2, boss.y + part.y - part.h/2, part.w, part.h)) {
            part.hp -= b.dmg;
            boss.hp -= b.dmg * 0.5;
            hit = !b.beam;
            sfxHit();
            if (!b.beam) break;
          }
        }
      }
    }

    if (hit) pBullets.splice(i, 1);
  }

  // Enemy bullets
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.x += b.vx * m;
    b.y += b.vy * m;

    if (b.y < -10 || b.y > GH + 10 || b.x < -10 || b.x > GW + 10) {
      eBullets.splice(i, 1);
      continue;
    }

    // LP Shield blocks bullets (PASS 2)
    if (lpShieldTimer > 0) {
      if (dist(px, py, b.x, b.y) < 26) {
        eBullets.splice(i, 1);
        TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y), '#44ffaa', 3, 1, { size: 1 });
        score += Math.floor(5 * intScoreMult());
        continue;
      }
    }

    // Shield form barrier blocks bullets
    if (currentForm === FORMS.SHIELD && invuln <= 0) {
      const sd = dist(px, py, b.x, b.y);
      if (sd < 24 && sd > 12) {
        for (let si = 0; si < 4; si++) {
          const sa = shieldAngle + (Math.PI * 2 / 4) * si;
          const sx = px + Math.cos(sa) * 20;
          const sy = py + Math.sin(sa) * 20;
          if (dist(sx, sy, b.x, b.y) < 8) {
            eBullets.splice(i, 1);
            TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y), '#88ccff', 3, 1, { size: 1 });
            score += Math.floor(10 * streakMultiplier * intScoreMult());
            break;
          }
        }
        continue;
      }
    }

    // Hit player
    if (invuln <= 0 && megaActive <= 0) {
      if (dist(px, py, b.x, b.y) < 8 + b.r) {
        playerHit();
        eBullets.splice(i, 1);
      }
    }
  }
}

// ============================================================
// PLAYER DAMAGE — PASS 1 CON wired
// ============================================================
function playerHit() {
  hp--;
  invuln = INVULN_TIME;
  streakCount = 0;
  streakMultiplier = 1;
  sfxDie();
  TAS.fx.shake(6, 0.9);
  TAS.fx.flash('#ff0000', 0.3);
  triggerShake(6);
  TAS.particles.spawn(Math.floor(px), Math.floor(py), '#ff4444', 12, 3, { size: 2 });

  if (hp <= 0) {
    lives--;
    if (lives <= 0) {
      gameOver();
    } else {
      hp = maxHp;
      bombs = MAX_BOMBS;
      invuln = 180;
      eBullets = [];
    }
  }
}

function gameOver() {
  state = 'gameOver';
  gameOverTimer = 0;
  if (score > highScore) {
    highScore = score;
    TAS.score.save('crisisforce_hi', highScore);
  }
}

function useBomb() {
  if (bombs <= 0) return;
  bombs--;
  bombFlash = 30;
  sfxBomb();
  TAS.fx.flash('#ffffff', 0.6);
  TAS.fx.shake(10, 0.88);
  triggerShake(12);

  // STR scales bomb power
  const bMult = strBombMult();
  eBullets = [];
  for (const e of enemies) e.hp -= Math.floor(5 * bMult);
  if (boss) boss.hp -= Math.floor(10 * bMult);
  invuln = Math.max(invuln, 60);
}

// ============================================================
// WAVE SPAWNER — PASS 2 new enemies added
// ============================================================
function spawnWave() {
  const t = stageTimer;
  const difficulty = stage + 1;
  const rate = Math.max(20, 60 - stage * 5);

  // Basic drones every rate frames
  if (t % rate === 0) {
    const count = rngInt(1, 2 + Math.floor(difficulty / 2));
    for (let i = 0; i < count; i++) {
      spawnEnemy('drone', rng(30, GW - 30), -20 - i * 30);
    }
  }

  // Spinners
  if (t % (rate * 3) === 0 && t > 100) {
    spawnEnemy('spinner', rng(40, GW - 40), -20);
  }

  // Blades sweep
  if (t % (rate * 4) === 0 && t > 200) {
    const dir = Math.random() > 0.5 ? 1 : -1;
    for (let i = 0; i < 3; i++) {
      spawnEnemy('blade', dir > 0 ? -20 : GW + 20, 40 + i * 30, { vx: dir * 2.5 });
    }
  }

  // Turrets
  if (t % (rate * 5) === 0 && t > 400) {
    spawnEnemy('turret', rng(40, GW - 40), -20);
  }

  // Stage-specific enemies
  if (stage >= 1 && t % (rate * 2) === 0) {
    spawnEnemy('fungal', rng(20, GW - 20), -20);
  }
  if (stage >= 2 && t % (rate * 6) === 0 && t > 300) {
    spawnEnemy('heavy', rng(50, GW - 50), -30);
  }
  if (stage >= 3 && t % (rate * 2.5 | 0) === 0) {
    const count = 4 + stage;
    for (let i = 0; i < count; i++) {
      spawnEnemy('snake', rng(20, GW - 20), -20 - i * 15, { phase: i * 20 });
    }
  }

  // PASS 2 — Reactor Turrets (stage 2+)
  if (stage >= 2 && t % (rate * 7) === 0 && t > 500) {
    spawnEnemy('reactor_turret', rng(50, GW - 50), -25);
  }

  // PASS 2 — Spore Cloud formations (stage 1+)
  if (stage >= 1 && t % (rate * 5) === 0 && t > 250) {
    const cx = rng(60, GW - 60);
    const count = 4 + Math.floor(stage / 2);
    for (let i = 0; i < count; i++) {
      spawnEnemy('spore_cloud', cx + (i - count/2) * 14, -20 - i * 10, { phase: i * 30, leader: i === 0 });
    }
  }

  // PASS 2 — Mycelial Tentacles (stage 3+)
  if (stage >= 3 && t % (rate * 8) === 0 && t > 600) {
    spawnEnemy('mycelial_tentacle', rng(40, GW - 40), -40);
  }

  // Midboss at 50%
  if (t === Math.floor(STAGE_LENGTH * 0.5) && !bossActive) {
    spawnEnemy('midboss', Math.floor(GW / 2), -40);
  }
}

// ============================================================
// BACKGROUND — PASS 3: parallax + environmental variety
// ============================================================
function drawBackground() {
  const s = STAGES[stage];

  // Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, s.bgTop);
  grad.addColorStop(1, s.bgBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // PASS 3 — deep parallax layer (slow, behind everything)
  for (const el of bgParallax) {
    el.y += el.speed;
    if (el.y > GH + 20) { el.y = -20; el.x = rng(0, GW); }
    ctx.globalAlpha = el.bright;
    ctx.fillStyle = s.groundColor;
    if (el.type === 0) {
      ctx.fillRect(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size * 2), Math.floor(el.size * 3));
    } else if (el.type === 1) {
      ctx.beginPath(); ctx.arc(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size), 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillRect(Math.floor(el.x - el.size/2), Math.floor(el.y), Math.floor(el.size), Math.floor(el.size * 4));
    }
    ctx.globalAlpha = 1;
  }

  // Scrolling elements (mid-layer)
  scrollY += scrollSpeed;
  for (const el of bgElements) {
    el.y += el.speed;
    if (el.y > GH + 10) {
      el.y = -10;
      el.x = rng(0, GW);
    }
    ctx.globalAlpha = el.bright * 0.4;
    ctx.fillStyle = s.accent;
    if (stage === 0) {
      // City buildings
      ctx.fillRect(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size * 3), Math.floor(el.size * 6));
      ctx.fillStyle = '#ffff44';
      if (Math.random() > 0.7) ctx.fillRect(Math.floor(el.x + 1), Math.floor(el.y + 2), 1, 1);
    } else if (stage === 1) {
      // PASS 2 — Reactor debris field
      ctx.fillStyle = '#446688';
      ctx.globalAlpha = el.bright * 0.5;
      ctx.save();
      ctx.translate(Math.floor(el.x), Math.floor(el.y));
      ctx.rotate(el.bright * Math.PI + frame * 0.002);
      ctx.fillRect(Math.floor(-el.size), Math.floor(-el.size/2), Math.floor(el.size * 2), Math.floor(el.size));
      ctx.restore();
      // Sparking debris
      if (Math.random() > 0.98) {
        ctx.fillStyle = '#88aacc';
        ctx.fillRect(Math.floor(el.x + rng(-3, 3)), Math.floor(el.y + rng(-3, 3)), 1, 1);
      }
    } else if (stage === 2) {
      // Lava rocks
      ctx.fillStyle = '#ff4400';
      ctx.globalAlpha = el.bright * 0.3;
      ctx.beginPath(); ctx.arc(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size * 2), 0, Math.PI * 2); ctx.fill();
      // Ember particles
      if (Math.random() > 0.95) {
        ctx.fillStyle = '#ffaa00';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(Math.floor(el.x + rng(-5, 5)), Math.floor(el.y - rng(2, 8)), 1, 1);
      }
    } else if (stage === 3) {
      // PASS 2 — Asteroid field
      ctx.fillStyle = '#556688';
      ctx.globalAlpha = el.bright * 0.4;
      ctx.save();
      ctx.translate(Math.floor(el.x), Math.floor(el.y));
      ctx.rotate(el.bright * 3);
      // Irregular asteroid shape
      ctx.beginPath();
      const as = el.size * 2;
      ctx.moveTo(-as, -as * 0.6);
      ctx.lineTo(-as * 0.3, -as);
      ctx.lineTo(as * 0.5, -as * 0.7);
      ctx.lineTo(as, 0);
      ctx.lineTo(as * 0.7, as * 0.8);
      ctx.lineTo(-as * 0.5, as * 0.6);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (stage === 4) {
      // PASS 2 — Spore clouds in background
      ctx.fillStyle = '#44aa33';
      ctx.globalAlpha = el.bright * 0.25;
      ctx.beginPath(); ctx.arc(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size * 3), 0, Math.PI * 2); ctx.fill();
      // Floating spore particles
      ctx.fillStyle = '#88ff44';
      ctx.globalAlpha = el.bright * 0.4;
      const sporeOff = Math.sin(frame * 0.02 + el.bright * 10) * 5;
      ctx.fillRect(Math.floor(el.x + sporeOff), Math.floor(el.y - 2), 2, 2);
      // Tendrils
      ctx.strokeStyle = '#338833';
      ctx.globalAlpha = el.bright * 0.3;
      ctx.lineWidth = el.size;
      ctx.beginPath();
      ctx.moveTo(Math.floor(el.x), Math.floor(el.y));
      ctx.bezierCurveTo(
        Math.floor(el.x + 10), Math.floor(el.y + 5),
        Math.floor(el.x - 10), Math.floor(el.y + 15),
        Math.floor(el.x), Math.floor(el.y + 20)
      );
      ctx.stroke();
    } else if (stage === 5) {
      // Crystal shards
      ctx.fillStyle = '#cc88ff';
      ctx.globalAlpha = el.bright * 0.5;
      ctx.save();
      ctx.translate(Math.floor(el.x), Math.floor(el.y));
      ctx.rotate(el.bright * Math.PI);
      ctx.fillRect(-1, Math.floor(-el.size * 3), 2, Math.floor(el.size * 6));
      // Crystal gleam
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05 + el.bright * 20) * 0.2;
      ctx.fillRect(0, Math.floor(-el.size * 2), 1, 2);
      ctx.restore();
    } else {
      // Mothership interior — pipes/panels
      ctx.fillStyle = '#442222';
      ctx.globalAlpha = el.bright * 0.5;
      ctx.fillRect(Math.floor(el.x), Math.floor(el.y), Math.floor(el.size * 2), Math.floor(el.size * 8));
      // Warning lights
      if (Math.sin(frame * 0.05 + el.bright * 10) > 0.7) {
        ctx.fillStyle = '#ff2222';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(Math.floor(el.x + el.size), Math.floor(el.y + el.size * 2), 2, 2);
      }
    }
    ctx.globalAlpha = 1;
  }

  // Stars always present — PASS 3 twinkle
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 30; i++) {
    const sx = Math.floor((i * 73 + frame * 0.1) % GW);
    const sy = Math.floor((i * 47 + frame * (0.2 + i * 0.01)) % GH);
    const twinkle = Math.sin(frame * 0.1 + i * 1.7);
    ctx.globalAlpha = 0.2 + (i % 3) * 0.15 + twinkle * 0.1;
    ctx.fillRect(sx, sy, 1, 1);
    // Occasional brighter star
    if (i % 7 === 0 && twinkle > 0.8) {
      ctx.fillRect(sx - 1, sy, 3, 1);
      ctx.fillRect(sx, sy - 1, 1, 3);
    }
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW BULLETS — PASS 3 improved visuals
// ============================================================
function drawBullets() {
  // Player bullets
  for (const b of pBullets) {
    ctx.fillStyle = b.color;
    if (b.beam) {
      // Reactor Beam — glowing elongated bolt
      ctx.globalAlpha = 0.4;
      ctx.fillRect(Math.floor(b.x - b.w/2 - 2), Math.floor(b.y - b.h/2), b.w + 4, b.h);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(Math.floor(b.x - 1), Math.floor(b.y - b.h/2), 2, b.h);
      ctx.fillStyle = b.color;
      ctx.fillRect(Math.floor(b.x - b.w/2), Math.floor(b.y - b.h/2), b.w, b.h);
    } else if (b.homing) {
      ctx.beginPath();
      ctx.moveTo(Math.floor(b.x), Math.floor(b.y - b.h/2));
      ctx.lineTo(Math.floor(b.x - b.w/2), Math.floor(b.y + b.h/2));
      ctx.lineTo(Math.floor(b.x + b.w/2), Math.floor(b.y + b.h/2));
      ctx.closePath();
      ctx.fill();
      // Trail
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#88ff88';
      ctx.fillRect(Math.floor(b.x - 1), Math.floor(b.y + b.h/2), 2, 4);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillRect(Math.floor(b.x - b.w/2), Math.floor(b.y - b.h/2), b.w, b.h);
    }
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = b.color;
    ctx.fillRect(Math.floor(b.x - b.w/2 - 1), Math.floor(b.y - b.h/2 - 1), b.w + 2, b.h + 2);
    ctx.globalAlpha = 1;
  }

  // Enemy bullets
  for (const b of eBullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(Math.floor(b.x), Math.floor(b.y), b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(Math.floor(b.x), Math.floor(b.y), Math.floor(b.r * 0.4), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// HUD — PASS 1 stat-aware
// ============================================================
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GW, 28);

  // Score — INT multiplied
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('SCORE: ' + score, 4, 11);

  // Stage
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88ccff';
  ctx.fillText('STAGE ' + (stage + 1), Math.floor(GW / 2), 11);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#44ff88';
  for (let i = 0; i < lives; i++) {
    ctx.fillRect(GW - 10 - i * 12, 3, 8, 8);
  }

  // Bottom HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, GH - 36, GW, 36);

  // Form indicator
  ctx.fillStyle = FORM_COLORS[currentForm];
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(FORM_NAMES[currentForm] + ' Lv' + formLevels[currentForm], 4, GH - 24);

  // HP bar — CON scaled
  ctx.fillStyle = '#333';
  ctx.fillRect(4, GH - 18, 60, 6);
  ctx.fillStyle = hp > Math.floor(maxHp * 0.33) ? '#44ff88' : '#ff4444';
  ctx.fillRect(4, GH - 18, Math.floor(60 * (hp / maxHp)), 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText('HP', 4, GH - 7);

  // Mega meter
  ctx.fillStyle = '#333';
  ctx.fillRect(70, GH - 18, 60, 6);
  const megaColor = megaMeter >= MEGA_MAX ? '#ff44ff' : '#884488';
  ctx.fillStyle = megaColor;
  ctx.fillRect(70, GH - 18, Math.floor(60 * (megaMeter / MEGA_MAX)), 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText('MEGA', 70, GH - 7);

  // Bombs
  ctx.fillStyle = '#44ff44';
  ctx.textAlign = 'right';
  ctx.font = '8px monospace';
  ctx.fillText('BOMB:' + bombs, GW - 4, GH - 7);

  // Multiplier — INT boosted
  if (streakMultiplier > 1) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('x' + streakMultiplier, GW - 4, GH - 22);
  }

  // Active power-up indicators
  if (lpShieldTimer > 0) {
    ctx.fillStyle = '#44ffaa';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LP SHIELD', Math.floor(GW/2), GH - 24);
  }
  if (tripleShotTimer > 0) {
    ctx.fillStyle = '#ffaa44';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('3x SHOT', Math.floor(GW/2), GH - 16);
  }

  // Second row
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('HP:' + hp + '/' + maxHp + '  LV:' + lives, 4, 22);
}

// ============================================================
// TOUCH / INPUT (drag-to-move + button overlay)
// ============================================================
const canvas = TAS.canvas;
let dragActive = false;
let lastTouchX = 0, lastTouchY = 0;

function canvasCoords(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const scaleX = (canvas.width / dpr) / rect.width;
  const scaleY = (canvas.height / dpr) / rect.height;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  TAS.audio.ensureAudio();
  if (state === 'title') { startGame(); return; }
  if (state === 'gameOver') { state = 'title'; return; }
  const t = e.touches[0];
  const c = canvasCoords(t.clientX, t.clientY);
  dragActive = true;
  lastTouchX = c.x;
  lastTouchY = c.y;
  fireHeld = true;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!dragActive || state !== 'playing') return;
  const t = e.touches[0];
  const c = canvasCoords(t.clientX, t.clientY);
  px += (c.x - lastTouchX);
  py += (c.y - lastTouchY);
  lastTouchX = c.x;
  lastTouchY = c.y;
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  dragActive = false;
  fireHeld = false;
}, { passive: false });

// Mouse
let mouseDown = false;
canvas.addEventListener('mousedown', function(e) {
  TAS.audio.ensureAudio();
  if (state === 'title') { startGame(); return; }
  if (state === 'gameOver') { state = 'title'; return; }
  mouseDown = true;
  const c = canvasCoords(e.clientX, e.clientY);
  lastTouchX = c.x; lastTouchY = c.y;
});
canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown || state !== 'playing') return;
  const c = canvasCoords(e.clientX, e.clientY);
  px += (c.x - lastTouchX);
  py += (c.y - lastTouchY);
  lastTouchX = c.x; lastTouchY = c.y;
});
canvas.addEventListener('mouseup', function() { mouseDown = false; });

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateExplosions(dt);
  updateShake();

  if (state === 'title') {
    if (TAS.input.keys['Enter'] || TAS.input.keys['Space'] || TAS.input.keys[' ']) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    gameOverTimer++;
    if (gameOverTimer > 60 && (TAS.input.keys['Enter'] || TAS.input.keys['Space'] || TAS.input.keys[' '])) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Stage intro
  if (stageIntroTimer > 0) {
    stageIntroTimer--;
    return;
  }

  // Stage cleared transition
  if (stageCleared) {
    stageClearTimer--;
    if (stageClearTimer <= 0) {
      stage++;
      if (stage >= STAGE_COUNT) {
        state = 'victory';
        if (score > highScore) {
          highScore = score;
          TAS.score.save('crisisforce_hi', highScore);
        }
        return;
      }
      stageTimer = 0;
      bossActive = false;
      bossSpawned = false;
      stageCleared = false;
      stageIntroTimer = 120;
      enemies = [];
      eBullets = [];
      initBgElements();
    }
    return;
  }

  const m = dt * 60;

  // Player movement (keyboard) — DEX scales speed
  const spd = getPlayerSpeed();
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['a'] || TAS.input.touch.left) px -= spd * m;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['d'] || TAS.input.touch.right) px += spd * m;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['w'] || TAS.input.touch.up) py -= spd * m;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['s'] || TAS.input.touch.down) py += spd * m;
  px = clamp(px, 14, GW - 14);
  py = clamp(py, 40, GH - 50);

  // Fire (auto-fire on touch, Z key, or A button) — WIS scales cooldown
  fireTimer++;
  const shouldFire = TAS.input.keys['z'] || TAS.input.keys['Z'] || TAS.input.touch.a || fireHeld || mouseDown;
  if (shouldFire && fireTimer >= getFireRate()) {
    fireTimer = 0;
    fireWeapon();
  }

  // Form switch (X key or B button)
  const bPress = TAS.input.keys['x'] || TAS.input.keys['X'] || TAS.input.touch.b;
  if (bPress && !lastBPress && formSwitchCooldown <= 0) {
    currentForm = (currentForm + 1) % 3;
    formSwitchCooldown = 20;
    sfxTransform();
    TAS.fx.flash(FORM_COLORS[currentForm], 0.2);
    TAS.particles.spawn(Math.floor(px), Math.floor(py), FORM_COLORS[currentForm], 15, 3, { size: 2, sizeVar: 2 });
  }
  lastBPress = bPress;
  if (formSwitchCooldown > 0) formSwitchCooldown--;

  // Mega attack (Z+X together)
  if ((TAS.input.keys['z'] || TAS.input.keys['Z']) && (TAS.input.keys['x'] || TAS.input.keys['X']) && megaMeter >= MEGA_MAX) {
    fireMega();
  }
  if (TAS.input.touch.a && TAS.input.touch.b && megaMeter >= MEGA_MAX) {
    fireMega();
  }

  // Bomb (C key)
  if (TAS.input.keys['c'] || TAS.input.keys['C']) {
    if (bombs > 0) useBomb();
    TAS.input.keys['c'] = false;
    TAS.input.keys['C'] = false;
  }

  // Invulnerability
  if (invuln > 0) invuln--;

  // LP Shield timer
  if (lpShieldTimer > 0) lpShieldTimer--;

  // Triple Shot timer
  if (tripleShotTimer > 0) tripleShotTimer--;

  // Mega
  updateMega(dt);

  // Bomb flash
  if (bombFlash > 0) bombFlash--;

  // Stage timer
  stageTimer++;
  if (!bossActive && !bossSpawned) {
    spawnWave();
    if (stageTimer >= STAGE_LENGTH) {
      if (enemies.length === 0 || stageTimer > STAGE_LENGTH + 120) {
        spawnBoss();
      }
    }
  }

  // Updates
  updateEnemies(dt);
  updateBullets(dt);
  updateBoss(dt);
  updatePowerups(dt);

  // Collision with enemies (ramming)
  if (invuln <= 0 && megaActive <= 0) {
    for (const e of enemies) {
      if (TAS.hit.rectOverlap(px - 6, py - 8, 12, 16, e.x - e.w/2, e.y - e.h/2, e.w, e.h)) {
        playerHit();
        e.hp -= 2;
        break;
      }
    }
  }
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawBackground();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + (stage + 1) });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  // Game rendering — PASS 3 shake applied
  ctx.save();
  ctx.translate(shakeX, shakeY);
  TAS.fx.applyShake();

  drawBackground();

  // PASS 3 — Stage intro overlay with subtitle
  if (stageIntroTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';

    // Stage number with accent color
    ctx.fillStyle = STAGES[stage].accent;
    ctx.font = 'bold 10px monospace';
    ctx.fillText('--- STAGE ' + (stage + 1) + ' ---', Math.floor(GW/2), Math.floor(GH/2 - 30));

    ctx.fillStyle = FORM_COLORS[0];
    ctx.font = 'bold 16px monospace';
    ctx.fillText(STAGES[stage].name.toUpperCase(), Math.floor(GW/2), Math.floor(GH/2));

    ctx.fillStyle = '#ffffff';
    ctx.font = '10px monospace';
    ctx.fillText(STAGES[stage].subtitle, Math.floor(GW/2), Math.floor(GH/2 + 20));

    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('DESTROY THE FUNGAL INVASION', Math.floor(GW/2), Math.floor(GH/2 + 45));

    // Warning flash
    if (stageIntroTimer < 30 && frame % 8 < 4) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 9px monospace';
      ctx.fillText('WARNING', Math.floor(GW/2), Math.floor(GH/2 + 65));
    }

    ctx.restore();
    drawHUD();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // PASS 3 — Stage clear with stats
  if (stageCleared) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('STAGE CLEAR!', Math.floor(GW/2), Math.floor(GH/2 - 20));

    ctx.fillStyle = STAGES[stage].accent;
    ctx.font = '10px monospace';
    ctx.fillText(STAGES[stage].name.toUpperCase() + ' SECURED', Math.floor(GW/2), Math.floor(GH/2 + 5));

    const bonus = (stage + 1) * 1000;
    ctx.fillStyle = '#ffffff';
    ctx.font = '10px monospace';
    ctx.fillText('BONUS: ' + Math.floor(bonus * intScoreMult()), Math.floor(GW/2), Math.floor(GH/2 + 25));

    if (stageClearTimer === 170) score += Math.floor(bonus * intScoreMult());

    // Next stage preview
    if (stage + 1 < STAGE_COUNT && stageClearTimer < 120) {
      ctx.fillStyle = '#888';
      ctx.font = '8px monospace';
      ctx.fillText('NEXT: ' + STAGES[stage + 1].name.toUpperCase(), Math.floor(GW/2), Math.floor(GH/2 + 50));
    }
  }

  drawBullets();
  drawEnemies();
  drawBoss();
  drawPowerups();
  drawExplosions();

  // Player
  if (invuln <= 0 || frame % 4 < 3) {
    drawShip(px, py, currentForm, invuln > 0);
  }

  // Mega effect
  drawMega();

  TAS.particles.draw();
  ctx.restore();

  // Bomb flash overlay
  if (bombFlash > 0) {
    ctx.globalAlpha = bombFlash / 30 * 0.5;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// TITLE SCREEN — PASS 1 stat bar, PASS 3 NES controls
// ============================================================
function drawTitleScreen() {
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0a0020');
  grad.addColorStop(1, '#000010');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (let i = 0; i < 50; i++) {
    const sx = Math.floor((i * 73 + frame * 0.3) % GW);
    const sy = Math.floor((i * 47 + frame * (0.5 + i * 0.01)) % GH);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.2 + (i % 4) * 0.15;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Title shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('CRISIS FORCE', Math.floor(GW/2 + 2), 82);

  // Title with color cycling
  const hue = (frame * 2) % 360;
  ctx.fillStyle = 'hsl(' + hue + ', 100%, 65%)';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('CRISIS FORCE', Math.floor(GW/2), 80);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('A Tasern Universe Tale', Math.floor(GW/2), 100);

  // Ship demo
  drawShip(Math.floor(GW/2), 145, Math.floor(frame / 90) % 3, false);

  // Form names
  ctx.fillStyle = FORM_COLORS[Math.floor(frame / 90) % 3];
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(FORM_NAMES[Math.floor(frame / 90) % 3] + ' FORM', Math.floor(GW/2), 170);

  // PASS 1 — Stat bar
  drawStatBar(195);

  // PASS 3 — NES-style controls
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[D-PAD] / WASD : Move', Math.floor(GW/2), 260);
  ctx.fillText('[A] / Z : Fire', Math.floor(GW/2), 275);
  ctx.fillText('[B] / X : Transform', Math.floor(GW/2), 290);
  ctx.fillText('[SELECT] / C : Bomb', Math.floor(GW/2), 305);
  ctx.fillText('[A]+[B] / Z+X : Mega Attack', Math.floor(GW/2), 320);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, Math.floor(GW/2), 350);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS START', Math.floor(GW/2), 400);
  ctx.globalAlpha = 1;

  // Credits
  ctx.fillStyle = '#444';
  ctx.font = '7px monospace';
  ctx.fillText('MfT Arcade 2026', Math.floor(GW/2), GH - 20);
}

// PASS 1 — Stat bar function
function drawStatBar(y) {
  const stats = [
    { label: 'STR', val: statB.str, color: '#ff4444' },
    { label: 'DEX', val: statB.dex, color: '#44ff44' },
    { label: 'CON', val: statB.con, color: '#ffaa44' },
    { label: 'INT', val: statB.int, color: '#4488ff' },
    { label: 'WIS', val: statB.wis, color: '#aa44ff' },
    { label: 'CHA', val: statB.cha, color: '#ff44aa' }
  ];

  const barW = 30, barH = 5, gap = 6;
  const totalW = stats.length * (barW + 22 + gap);
  const sx = Math.floor(GW/2 - totalW/2);

  ctx.font = '7px monospace';
  for (let i = 0; i < stats.length; i++) {
    const s = stats[i];
    const bx = sx + i * (barW + 22 + gap);

    ctx.fillStyle = '#888';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, bx, y + 4);

    ctx.fillStyle = '#222';
    ctx.fillRect(bx + 22, y - 2, barW, barH);
    const fill = Math.min(1, s.val / 20);
    ctx.fillStyle = s.color;
    ctx.fillRect(bx + 22, y - 2, Math.floor(barW * fill), barH);
  }

  // Baseling name + level
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  if (statB.level > 0) {
    ctx.fillText(statB.name + ' Lv' + statB.level, Math.floor(GW/2), y + 18);
  }
}

// ============================================================
// VICTORY SCREEN — PASS 3 enhanced
// ============================================================
function drawVictoryScreen() {
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#001030');
  grad.addColorStop(1, '#000010');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Particles
  if (frame % 5 === 0) {
    TAS.particles.spawn(rng(0, GW), rng(0, GH), '#ffdd44', 2, 1, { size: 1 });
  }
  if (frame % 8 === 0) {
    TAS.particles.spawn(rng(0, GW), rng(0, GH), '#44ffaa', 2, 1, { size: 1 });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';

  // Victory banner
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', Math.floor(GW/2), 90);

  ctx.fillStyle = '#ffffff';
  ctx.font = '11px monospace';
  ctx.fillText('The Fungal Invasion is defeated!', Math.floor(GW/2), 130);
  ctx.fillText('Tasern is saved!', Math.floor(GW/2), 150);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('FINAL SCORE: ' + score, Math.floor(GW/2), 195);

  if (score >= highScore) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff44ff';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(GW/2), 220);
    ctx.globalAlpha = 1;
  }

  // Detailed stats
  ctx.fillStyle = '#88ccff';
  ctx.font = '9px monospace';
  ctx.fillText('Best Multiplier: x' + streakMultiplier, Math.floor(GW/2), 265);
  ctx.fillText('Lives Remaining: ' + lives, Math.floor(GW/2), 285);
  ctx.fillText('Max HP: ' + maxHp + ' (CON: ' + statB.con + ')', Math.floor(GW/2), 305);

  // Stat contribution summary
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  if (statB.level > 0) {
    ctx.fillText(statB.name + ' Lv' + statB.level + ' contributed!', Math.floor(GW/2), 335);
  }

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS START TO CONTINUE', Math.floor(GW/2), 400);
  ctx.globalAlpha = 1;

  if (TAS.input.keys['Enter'] || TAS.input.keys['Space'] || TAS.input.keys[' ']) {
    state = 'title';
  }
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
