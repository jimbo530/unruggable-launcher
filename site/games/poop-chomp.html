<html lang="en">

<title>Poop Chomp</title>
<style>

  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;

</style>

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a'], labels: { a: 'BOOST' } });

const TILE = 16;
const COLS = 28;
const ROWS = 17;
const MAZE_OX = Math.floor((GW - COLS * TILE) / 2);
const MAZE_OY = 30;
const HUD_H = 28;

// Tile types
const W = 1; // wall
const D = 2; // dot (mushroom spore)
const P = 3; // power pellet
const E = 0; // empty
const T = 4; // tunnel (wrap)
const G = 5; // ghost house door

// Classic 28x17 maze layout (compressed from 28x31 to fit 320h)
// Each row is 28 tiles wide
const MAZE_TEMPLATE = [
  [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
  [W,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,W],
  [W,D,W,W,W,D,W,W,W,W,W,D,D,W,W,D,D,W,W,W,W,W,D,W,W,W,D,W],
  [W,P,W,W,W,D,W,W,W,W,W,D,D,D,D,D,D,W,W,W,W,W,D,W,W,W,P,W],
  [W,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,W],
  [W,D,W,W,W,D,W,D,W,W,W,W,D,W,W,D,W,W,W,W,D,W,D,W,W,W,D,W],
  [W,D,D,D,D,D,W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W,D,D,D,D,D,W],
  [W,W,W,W,W,D,W,W,W,D,W,E,E,E,E,E,E,W,D,W,W,W,D,W,W,W,W,W],
  [T,E,E,E,E,D,W,E,E,E,W,G,G,G,G,G,G,W,E,E,E,W,D,E,E,E,E,T],
  [W,W,W,W,W,D,W,E,W,E,E,E,E,E,E,E,E,E,E,W,E,W,D,W,W,W,W,W],
  [W,D,D,D,D,D,D,D,W,E,E,E,E,E,E,E,E,E,E,W,D,D,D,D,D,D,D,W],
  [W,D,W,W,W,D,W,D,W,W,W,W,W,W,W,W,W,W,W,W,D,W,D,W,W,W,D,W],
  [W,D,D,D,W,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,W,D,D,D,W],
  [W,W,W,D,W,D,W,D,W,W,W,W,D,D,D,D,W,W,W,W,D,W,D,W,D,W,W,W],
  [W,D,D,D,D,D,W,D,D,D,D,D,D,W,W,D,D,D,D,D,D,W,D,D,D,D,D,W],
  [W,P,W,W,W,D,W,W,W,W,W,W,D,W,W,D,W,W,W,W,W,W,D,W,W,W,P,W],
  [W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
];

// Fruit definitions per level
const FRUITS = [
  { name: 'cherry',     pts: 100,  color: '#ff2244' },
  { name: 'strawberry', pts: 300,  color: '#ff4488' },
  { name: 'orange',     pts: 500,  color: '#ff8800' },
  { name: 'apple',      pts: 700,  color: '#44dd44' },
  { name: 'melon',      pts: 1000, color: '#44ffaa' },
  { name: 'galaxian',   pts: 2000, color: '#4488ff' },
  { name: 'bell',       pts: 3000, color: '#ffdd44' },
  { name: 'key',        pts: 5000, color: '#aabbff' },
];

// Ghost colors
const GHOST_COLORS = ['#ff0000', '#ffb8ff', '#00ffff', '#ffb852']; // blinky, pinky, inky, clyde
const GHOST_NAMES  = ['Blinky', 'Pinky', 'Inky', 'Clyde'];
const GHOST_SCARED_COLOR = '#2244ff';
const GHOST_FLASH_COLOR  = '#ffffff';

// ============================================================
// STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('poop_chomp_hi');
let lives = 3;
let level = 1;
let frame = 0;
let maze = [];
let dotsLeft = 0;
let totalDots = 0;
let player = null;
let ghosts = [];
let fruitActive = false;
let fruitTimer = 0;
let fruitType = 0;
let fruitEaten = 0;
let powerTimer = 0;
let ghostCombo = 0;
let freezeTimer = 0;
let deathTimer = 0;
let readyTimer = 0;
let levelClearTimer = 0;
let cutSceneTimer = 0;
let cutSceneLevel = 0;
let extraLifeGiven = false;
let boostTimer = 0;
let boostCooldown = 0;
let wakaToggle = false;
let sirenTimer = 0;
let floatingTexts = [];

// Speed config per level (base pixels/sec)
function getSpeed(lv) {
  const base = 60 + Math.min(lv - 1, 10) * 4;
  return base;
}

function getGhostSpeed(lv, scared) {
  if (scared) return getSpeed(lv) * 0.5;
  return getSpeed(lv) * (0.85 + Math.min(lv - 1, 10) * 0.02);
}

// ============================================================
// MAZE
// ============================================================
function buildMaze() {
  maze = [];
  dotsLeft = 0;
  totalDots = 0;
  for (let r = 0; r < ROWS; r++) {
    maze[r] = [];
    for (let c = 0; c < COLS; c++) {
      maze[r][c] = MAZE_TEMPLATE[r][c];
      if (maze[r][c] === D || maze[r][c] === P) {
        dotsLeft++;
        totalDots++;
      }
    }
  }
}

function isWall(col, row) {
  if (row < 0 || row >= ROWS) return true;
  // Wrap horizontally for tunnels
  if (col < 0 || col >= COLS) return false; // tunnel area
  const t = maze[row][col];
  return t === W || t === G;
}

function canMove(col, row, isGhost) {
  if (row < 0 || row >= ROWS) return false;
  if (col < 0 || col >= COLS) return true; // tunnel
  const t = maze[row][col];
  if (t === W) return false;
  if (t === G && !isGhost) return false;
  return true;
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer() {
  return {
    col: 13, row: 10, // start position
    px: 0, py: 0,     // pixel position (center of tile)
    dir: 0,           // 0=right, 1=down, 2=left, 3=up
    nextDir: -1,      // queued direction
    moving: false,
    mouthAngle: 0,
    mouthOpen: true,
  };
}

function resetPlayerPos() {
  player.col = 13;
  player.row = 10;
  player.px = (player.col + 0.5) * TILE;
  player.py = (player.row + 0.5) * TILE;
  player.dir = 0;
  player.nextDir = -1;
  player.moving = false;
}

const DIR_DX = [1, 0, -1, 0];
const DIR_DY = [0, 1, 0, -1];

function tileCenter(col, row) {
  return { x: (col + 0.5) * TILE, y: (row + 0.5) * TILE };
}

// ============================================================
// GHOSTS
// ============================================================
function createGhost(idx) {
  // Start positions in ghost house
  const startCols = [13, 12, 14, 11];
  const startRows = [8,  9,  9,  8];
  return {
    idx: idx,
    col: startCols[idx],
    row: startRows[idx],
    px: 0, py: 0,
    dir: idx % 2 === 0 ? 0 : 2,
    scared: false,
    eaten: false,
    inHouse: idx > 0, // blinky starts outside
    houseTimer: idx * 3, // stagger exit
    flashTimer: 0,
  };
}

function resetGhosts() {
  ghosts = [];
  for (let i = 0; i < 4; i++) {
    const g = createGhost(i);
    g.px = (g.col + 0.5) * TILE;
    g.py = (g.row + 0.5) * TILE;
    ghosts.push(g);
  }
  // Blinky starts just above ghost house
  ghosts[0].row = 7;
  ghosts[0].col = 13;
  ghosts[0].px = (13 + 0.5) * TILE;
  ghosts[0].py = (7 + 0.5) * TILE;
  ghosts[0].inHouse = false;
  ghosts[0].dir = 2;
}

function getGhostTarget(g, playerCol, playerRow, playerDir) {
  if (g.eaten) {
    // Return to ghost house
    return { col: 13, row: 8 };
  }

  if (g.scared) {
    // Random target (scatter)
    return { col: TAS.math.randInt(0, COLS - 1), row: TAS.math.randInt(0, ROWS - 1) };
  }

  switch (g.idx) {
    case 0: // Blinky - direct chase
      return { col: playerCol, row: playerRow };

    case 1: // Pinky - ambush (4 tiles ahead of player)
      return {
        col: playerCol + DIR_DX[playerDir] * 4,
        row: playerRow + DIR_DY[playerDir] * 4
      };

    case 2: { // Inky - flanking (double vector from blinky through 2 ahead of player)
      const aheadCol = playerCol + DIR_DX[playerDir] * 2;
      const aheadRow = playerRow + DIR_DY[playerDir] * 2;
      const blinky = ghosts[0];
      return {
        col: aheadCol + (aheadCol - blinky.col),
        row: aheadRow + (aheadRow - blinky.row)
      };
    }

    case 3: { // Clyde - chase when far, scatter when close
      const dist = Math.abs(g.col - playerCol) + Math.abs(g.row - playerRow);
      if (dist > 8) {
        return { col: playerCol, row: playerRow };
      }
      return { col: 0, row: ROWS - 1 }; // scatter to bottom-left
    }

    default:
      return { col: playerCol, row: playerRow };
  }
}

function moveGhost(g, dt) {
  if (g.inHouse) {
    g.houseTimer -= dt;
    if (g.houseTimer <= 0) {
      // Move to exit
      g.col = 13;
      g.row = 7;
      g.px = (13 + 0.5) * TILE;
      g.py = (7 + 0.5) * TILE;
      g.inHouse = false;
      g.dir = 2;
    } else {
      // Bob up and down in house
      g.py += Math.sin(frame * 0.1 + g.idx) * 0.5;
    }
    return;
  }

  const speed = g.eaten ? getSpeed(level) * 2 :
                g.scared ? getGhostSpeed(level, true) :
                getGhostSpeed(level, false);

  const moveAmt = speed * dt;
  const cx = (g.col + 0.5) * TILE;
  const cy = (g.row + 0.5) * TILE;
  const distToCenter = Math.abs(g.px - cx) + Math.abs(g.py - cy);

  // At tile center, pick new direction
  if (distToCenter < moveAmt + 0.5) {
    g.px = cx;
    g.py = cy;

    // Check if ghost returned to house after being eaten
    if (g.eaten && g.row >= 8 && g.row <= 9 && g.col >= 12 && g.col <= 14) {
      g.eaten = false;
      g.scared = false;
      g.inHouse = true;
      g.houseTimer = 1;
      return;
    }

    // Wrap through tunnel
    if (g.col < 0) { g.col = COLS - 1; g.px = (g.col + 0.5) * TILE; }
    if (g.col >= COLS) { g.col = 0; g.px = 0.5 * TILE; }

    const target = getGhostTarget(g, player.col, player.row, player.dir);
    const reverseDir = (g.dir + 2) % 4;

    // Try all directions, pick the one closest to target (no reversing)
    let bestDir = g.dir;
    let bestDist = 999999;
    for (let d = 0; d < 4; d++) {
      if (d === reverseDir) continue; // no reversing
      const nc = g.col + DIR_DX[d];
      const nr = g.row + DIR_DY[d];
      if (!canMove(nc, nr, !g.eaten)) continue; // eaten ghosts can pass through gate
      const dx = nc - target.col;
      const dy = nr - target.row;
      const dist = dx * dx + dy * dy;
      if (dist < bestDist) {
        bestDist = dist;
        bestDir = d;
      }
    }
    g.dir = bestDir;
  }

  // Move in current direction
  g.px += DIR_DX[g.dir] * moveAmt;
  g.py += DIR_DY[g.dir] * moveAmt;

  // Update tile position
  g.col = Math.floor(g.px / TILE);
  g.row = Math.floor(g.py / TILE);

  // Tunnel wrap
  if (g.px < -TILE) { g.px = COLS * TILE; g.col = COLS - 1; }
  if (g.px > (COLS + 1) * TILE) { g.px = 0; g.col = 0; }
}

// ============================================================
// AUDIO
// ============================================================
function playWaka() {
  wakaToggle = !wakaToggle;
  TAS.audio.playTone(wakaToggle ? 260 : 330, 0.06, 'square', 0.06);
}

function playSiren(dt) {
  sirenTimer -= dt;
  if (sirenTimer <= 0) {
    sirenTimer = 0.35;
    if (powerTimer > 0) {
      TAS.audio.playTone(180, 0.15, 'sine', 0.03, 120);
    } else {
      TAS.audio.playTone(200 + Math.sin(frame * 0.02) * 60, 0.2, 'sine', 0.02);
    }
  }
}

function playEatGhost() {
  TAS.audio.playTone(600, 0.1, 'square', 0.08, 1200);
  TAS.audio.playTone(900, 0.15, 'square', 0.06, 300);
}

function playDeath() {
  TAS.audio.playMelody([
    [400, 0.15], [350, 0.15], [300, 0.15], [250, 0.15],
    [200, 0.2],  [150, 0.3],  [100, 0.4]
  ], 100);
}

function playPowerUp() {
  TAS.audio.playMelody([
    [300, 0.08], [400, 0.08], [500, 0.08], [600, 0.1]
  ], 60);
}

function playLevelClear() {
  TAS.audio.playMelody([
    [400, 0.1], [500, 0.1], [600, 0.1], [700, 0.1], [800, 0.15], [1000, 0.2]
  ], 80);
}

function playFruitEat() {
  TAS.audio.playTone(800, 0.1, 'square', 0.08);
  setTimeout(function() { TAS.audio.playTone(1200, 0.15, 'square', 0.06); }, 80);
}

function playExtraLife() {
  TAS.audio.playMelody([
    [523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]
  ], 100);
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawWall(x, y) {
  ctx.fillStyle = '#1133aa';
  ctx.fillRect(x, y, TILE, TILE);
  // Inner highlight
  ctx.fillStyle = '#2255dd';
  ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
  ctx.fillStyle = '#1133aa';
  ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
}

function drawDot(x, y) {
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.arc(x + TILE / 2, y + TILE / 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawPowerPellet(x, y) {
  const pulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffee88';
  ctx.beginPath();
  ctx.arc(x + TILE / 2, y + TILE / 2, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGhostDoor(x, y) {
  ctx.fillStyle = '#ff88cc';
  ctx.fillRect(x + 2, y + 6, TILE - 4, 3);
}

function drawPlayer(px, py, dir, mouthAngle) {
  const cx = MAZE_OX + px;
  const cy = MAZE_OY + py;
  const r = TILE / 2 - 1;

  // Body - mushroom-cap shaped baseling
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  const startAngle = dir * Math.PI / 2 + mouthAngle;
  const endAngle = dir * Math.PI / 2 - mouthAngle + Math.PI * 2;
  ctx.arc(cx, cy, r, startAngle, endAngle);
  ctx.lineTo(cx, cy);
  ctx.fill();

  // Eye
  if (mouthAngle < 0.3) {
    const eyeAngle = dir * Math.PI / 2 - 0.4;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(cx + Math.cos(eyeAngle) * r * 0.45, cy + Math.sin(eyeAngle) * r * 0.45, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boost glow
  if (boostTimer > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#44ffff';
    ctx.beginPath();
    ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawGhost(g) {
  const cx = MAZE_OX + g.px;
  const cy = MAZE_OY + g.py;
  const r = TILE / 2 - 1;

  if (g.eaten) {
    // Just eyes floating back
    drawGhostEyes(cx, cy, g.dir);
    return;
  }

  let bodyColor;
  if (g.scared) {
    if (g.flashTimer > 0 && Math.floor(g.flashTimer * 8) % 2 === 0) {
      bodyColor = GHOST_FLASH_COLOR;
    } else {
      bodyColor = GHOST_SCARED_COLOR;
    }
  } else {
    bodyColor = GHOST_COLORS[g.idx];
  }

  // Ghost body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(cx, cy - 2, r, Math.PI, 0);
  ctx.lineTo(cx + r, cy + r);
  // Wavy bottom
  const wave = Math.sin(frame * 0.15 + g.idx) * 2;
  for (let i = 0; i < 3; i++) {
    const sx = cx + r - (i * 2 + 1) * (r * 2 / 6);
    ctx.lineTo(sx, cy + r - 2 + wave * (i % 2 === 0 ? 1 : -1));
  }
  ctx.lineTo(cx - r, cy + r);
  ctx.fill();

  // Eyes
  if (g.scared) {
    // Scared face
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
    ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    // Wavy mouth
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 4, cy + 2);
    for (let i = 0; i < 4; i++) {
      ctx.lineTo(cx - 4 + i * 2.5, cy + (i % 2 === 0 ? 2 : 4));
    }
    ctx.stroke();
  } else {
    drawGhostEyes(cx, cy, g.dir);
  }
}

function drawGhostEyes(cx, cy, dir) {
  // White of eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(cx - 3, cy - 3, 3, 4, 0, 0, Math.PI * 2);
  ctx.ellipse(cx + 3, cy - 3, 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (look in direction of movement)
  const pdx = DIR_DX[dir] * 1.5;
  const pdy = DIR_DY[dir] * 1.5;
  ctx.fillStyle = '#2222cc';
  ctx.beginPath();
  ctx.arc(cx - 3 + pdx, cy - 3 + pdy, 1.5, 0, Math.PI * 2);
  ctx.arc(cx + 3 + pdx, cy - 3 + pdy, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawFruit(col, row) {
  if (!fruitActive) return;
  const ft = FRUITS[Math.min(fruitType, FRUITS.length - 1)];
  const cx = MAZE_OX + (col + 0.5) * TILE;
  const cy = MAZE_OY + (row + 0.5) * TILE;

  // Simple fruit shape
  ctx.fillStyle = ft.color;
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fill();

  // Stem
  ctx.fillStyle = '#44aa22';
  ctx.fillRect(cx - 1, cy - 7, 2, 3);
}

function drawMaze() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = MAZE_OX + c * TILE;
      const y = MAZE_OY + r * TILE;
      const t = maze[r][c];
      if (t === W) drawWall(x, y);
      else if (t === D) drawDot(x, y);
      else if (t === P) drawPowerPellet(x, y);
      else if (t === G) drawGhostDoor(x, y);
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  extraLifeGiven = false;
  TAS.particles.clear();
  floatingTexts = [];
  buildMaze();
  player = createPlayer();
  resetPlayerPos();
  resetGhosts();
  fruitActive = false;
  fruitEaten = 0;
  powerTimer = 0;
  ghostCombo = 0;
  boostTimer = 0;
  boostCooldown = 0;
  readyTimer = 2.0;
  deathTimer = 0;
  levelClearTimer = 0;
  cutSceneTimer = 0;
}

function nextLevel() {
  level++;
  buildMaze();
  resetPlayerPos();
  resetGhosts();
  fruitActive = false;
  fruitEaten = 0;
  powerTimer = 0;
  ghostCombo = 0;
  boostTimer = 0;
  boostCooldown = 0;
  readyTimer = 2.0;
  deathTimer = 0;
  levelClearTimer = 0;

  // Cut-scene after levels 2, 5, 9
  if (level === 3 || level === 6 || level === 10) {
    cutSceneTimer = 3.0;
    cutSceneLevel = level;
  }
}

function loseLife() {
  lives--;
  playDeath();
  deathTimer = 2.0;
  if (lives <= 0) {
    if (score > highScore) {
      highScore = score;
      TAS.score.save('poop_chomp_hi', highScore);
    }
    state = 'gameOver';
    deathTimer = 0;
  }
}

function addScore(pts) {
  score += pts;
  if (!extraLifeGiven && score >= 10000) {
    extraLifeGiven = true;
    lives++;
    playExtraLife();
    floatingTexts.push({ text: '1UP!', x: GW / 2, y: GH / 2 - 30, life: 2.0, color: '#44ff44' });
  }
}

function spawnFloatingText(text, col, row, color) {
  floatingTexts.push({
    text: text,
    x: MAZE_OX + (col + 0.5) * TILE,
    y: MAZE_OY + (row + 0.5) * TILE,
    life: 1.5,
    color: color || '#fff'
  });
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Update floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].life -= dt;
    floatingTexts[i].y -= dt * 20;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a ||
        TAS.input.touch.up || TAS.input.touch.down || TAS.input.touch.left || TAS.input.touch.right) {
      startGame();
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Cut-scene
  if (cutSceneTimer > 0) {
    cutSceneTimer -= dt;
    return;
  }

  // Ready screen
  if (readyTimer > 0) {
    readyTimer -= dt;
    return;
  }

  // Death animation
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      resetPlayerPos();
      resetGhosts();
      powerTimer = 0;
      readyTimer = 1.5;
    }
    return;
  }

  // Level clear
  if (levelClearTimer > 0) {
    levelClearTimer -= dt;
    if (levelClearTimer <= 0) {
      nextLevel();
    }
    return;
  }

  // Freeze (after eating a ghost)
  if (freezeTimer > 0) {
    freezeTimer -= dt;
    return;
  }

  // --- PLAYER INPUT ---
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) player.nextDir = 2;
  else if (keys['ArrowRight'] || keys['KeyD'] || tch.right) player.nextDir = 0;
  else if (keys['ArrowUp'] || keys['KeyW'] || tch.up) player.nextDir = 3;
  else if (keys['ArrowDown'] || keys['KeyS'] || tch.down) player.nextDir = 1;

  // Boost
  if ((keys['Space'] || tch.a) && boostCooldown <= 0 && boostTimer <= 0) {
    boostTimer = 0.5;
    boostCooldown = 3.0;
  }
  if (boostTimer > 0) boostTimer -= dt;
  if (boostCooldown > 0) boostCooldown -= dt;

  // --- PLAYER MOVEMENT ---
  let speed = getSpeed(level);
  if (boostTimer > 0) speed *= 1.5;
  const moveAmt = speed * dt;

  const cx = (player.col + 0.5) * TILE;
  const cy = (player.row + 0.5) * TILE;
  const distToCenter = Math.abs(player.px - cx) + Math.abs(player.py - cy);

  if (distToCenter < moveAmt + 0.5) {
    player.px = cx;
    player.py = cy;

    // Wrap tunnel
    if (player.col < 0) { player.col = COLS - 1; player.px = (COLS - 0.5) * TILE; }
    if (player.col >= COLS) { player.col = 0; player.px = 0.5 * TILE; }

    // Try queued direction
    if (player.nextDir >= 0) {
      const nc = player.col + DIR_DX[player.nextDir];
      const nr = player.row + DIR_DY[player.nextDir];
      if (canMove(nc, nr, false)) {
        player.dir = player.nextDir;
        player.nextDir = -1;
        player.moving = true;
      }
    }

    // Check if current direction is still valid
    const fc = player.col + DIR_DX[player.dir];
    const fr = player.row + DIR_DY[player.dir];
    if (!canMove(fc, fr, false)) {
      player.moving = false;
    } else {
      player.moving = true;
    }

    // Eat dot
    if (player.row >= 0 && player.row < ROWS && player.col >= 0 && player.col < COLS) {
      const tile = maze[player.row][player.col];
      if (tile === D) {
        maze[player.row][player.col] = E;
        dotsLeft--;
        addScore(10);
        playWaka();
      } else if (tile === P) {
        maze[player.row][player.col] = E;
        dotsLeft--;
        addScore(50);
        powerTimer = 8.0;
        ghostCombo = 0;
        playPowerUp();
        // Scare all ghosts
        for (const g of ghosts) {
          if (!g.eaten && !g.inHouse) {
            g.scared = true;
            g.flashTimer = 0;
            // Reverse direction
            g.dir = (g.dir + 2) % 4;
          }
        }
      }

      // Fruit spawn check
      if (!fruitActive && fruitEaten < 2 && (dotsLeft === totalDots - 70 || dotsLeft === totalDots - 170)) {
        fruitActive = true;
        fruitTimer = 10.0;
        fruitType = Math.min(level - 1, FRUITS.length - 1);
      }

      // Level clear
      if (dotsLeft <= 0) {
        levelClearTimer = 2.0;
        playLevelClear();
        return;
      }
    }

    // Eat fruit
    if (fruitActive && player.col === 13 && player.row === 10) {
      const ft = FRUITS[Math.min(fruitType, FRUITS.length - 1)];
      addScore(ft.pts);
      fruitActive = false;
      fruitEaten++;
      spawnFloatingText(ft.pts.toString(), 13, 10, ft.color);
      playFruitEat();
      TAS.particles.spawn(MAZE_OX + 13.5 * TILE, MAZE_OY + 10.5 * TILE, ft.color, 12, 3);
    }
  }

  if (player.moving) {
    player.px += DIR_DX[player.dir] * moveAmt;
    player.py += DIR_DY[player.dir] * moveAmt;
    player.col = Math.floor(player.px / TILE);
    player.row = Math.floor(player.py / TILE);

    // Tunnel wrap (pixel level)
    if (player.px < -TILE) { player.px = COLS * TILE; player.col = COLS - 1; }
    if (player.px > (COLS + 1) * TILE) { player.px = 0; player.col = 0; }
  }

  // Mouth animation
  if (player.moving) {
    player.mouthAngle = Math.abs(Math.sin(frame * 0.2)) * 0.5;
  } else {
    player.mouthAngle = 0.1;
  }

  // --- POWER TIMER ---
  if (powerTimer > 0) {
    powerTimer -= dt;
    if (powerTimer <= 0) {
      for (const g of ghosts) {
        g.scared = false;
        g.flashTimer = 0;
      }
    } else if (powerTimer < 2.5) {
      // Flash warning
      for (const g of ghosts) {
        if (g.scared && !g.eaten) {
          g.flashTimer = powerTimer;
        }
      }
    }
  }

  // --- FRUIT TIMER ---
  if (fruitActive) {
    fruitTimer -= dt;
    if (fruitTimer <= 0) fruitActive = false;
  }

  // --- GHOST MOVEMENT ---
  for (const g of ghosts) {
    moveGhost(g, dt);
  }

  // --- GHOST COLLISION ---
  for (const g of ghosts) {
    if (g.inHouse) continue;
    const dx = player.px - g.px;
    const dy = player.py - g.py;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < TILE * 0.8) {
      if (g.scared && !g.eaten) {
        // Eat ghost
        g.eaten = true;
        g.scared = false;
        ghostCombo++;
        const pts = 200 * Math.pow(2, ghostCombo - 1);
        addScore(pts);
        spawnFloatingText(pts.toString(), g.col, g.row, '#44ffff');
        playEatGhost();
        freezeTimer = 0.5;
        TAS.particles.spawn(MAZE_OX + g.px, MAZE_OY + g.py, '#44ffff', 8, 3);
      } else if (!g.eaten) {
        // Player dies
        loseLife();
        TAS.fx.shake(6, 0.85);
        TAS.fx.flash('#ff0000', 0.4);
        TAS.particles.spawn(MAZE_OX + player.px, MAZE_OY + player.py, '#ffdd44', 20, 4);
        return;
      }
    }
  }

  // Siren sound
  playSiren(dt);
}

// ============================================================
// DRAW
// ============================================================
function draw(dt) {
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level: ' + level });
    return;
  }

  // Cut-scene
  if (cutSceneTimer > 0) {
    drawCutScene();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Draw maze
  drawMaze();

  // Draw fruit
  drawFruit(13, 10);

  // Draw player (not during death)
  if (deathTimer <= 0) {
    drawPlayer(player.px, player.py, player.dir, player.mouthAngle);
  } else {
    // Death spin animation
    const t = 1 - (deathTimer / 2.0);
    const shrink = Math.max(0, 1 - t * 1.5);
    if (shrink > 0) {
      ctx.save();
      ctx.translate(MAZE_OX + player.px, MAZE_OY + player.py);
      ctx.scale(shrink, shrink);
      ctx.translate(-(MAZE_OX + player.px), -(MAZE_OY + player.py));
      drawPlayer(player.px, player.py, player.dir, t * Math.PI);
      ctx.restore();
    }
  }

  // Draw ghosts
  if (deathTimer <= 0) {
    for (const g of ghosts) {
      drawGhost(g);
    }
  }

  // Floating texts
  for (const ft of floatingTexts) {
    ctx.globalAlpha = Math.min(1, ft.life);
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Ready text
  if (readyTimer > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('READY!', GW / 2, GH / 2 + 5);
  }

  // Level clear flash
  if (levelClearTimer > 0) {
    const flash = Math.floor(levelClearTimer * 6) % 2;
    if (flash) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, GW, GH);
      ctx.globalAlpha = 1;
    }
  }

  // HUD
  drawHUD();

  TAS.input.drawTouchControls(GW, GH);
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, HUD_H);

  ctx.font = 'bold 13px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Level
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('LV ' + level, GW / 2, 18);

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 20, 14, 6, 0.3, Math.PI * 2 - 0.3);
    ctx.lineTo(GW - 12 - i * 20, 14);
    ctx.fill();
  }

  // Bottom info bar
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(0, GH - 16, GW, 16);

  // Boost cooldown indicator
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  if (boostCooldown > 0) {
    ctx.fillStyle = '#666';
    ctx.fillText('BOOST: ' + Math.ceil(boostCooldown) + 's', 6, GH - 4);
  } else {
    ctx.fillStyle = '#44ffff';
    ctx.fillText('BOOST: READY', 6, GH - 4);
  }

  // Dots remaining
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText('DOTS: ' + dotsLeft, GW - 6, GH - 4);

  // High score
  ctx.fillStyle = '#888';
  ctx.textAlign = 'center';
  ctx.fillText('HI: ' + highScore, GW / 2, GH - 4);
}

function drawTitleScreen() {
  // Animated background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative maze snippet in background
  ctx.globalAlpha = 0.15;
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 30; c++) {
      if ((r + c + Math.floor(frame * 0.02)) % 3 === 0) {
        ctx.fillStyle = '#1133aa';
        ctx.fillRect(c * 16, 180 + r * 16, 14, 14);
      }
    }
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('POOP CHOMP', GW / 2 + 2, 72);
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('POOP CHOMP', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 92);

  // Animated player
  const pmx = GW / 2 - 60 + Math.sin(frame * 0.03) * 40;
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  const ma = Math.abs(Math.sin(frame * 0.15)) * 0.5;
  ctx.arc(pmx, 130, 12, ma, Math.PI * 2 - ma);
  ctx.lineTo(pmx, 130);
  ctx.fill();

  // Chasing dots
  for (let i = 0; i < 8; i++) {
    const dx = pmx + 20 + i * 14;
    if (dx < GW - 20 && dx > 20) {
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.arc(dx, 130, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Ghost parade
  for (let i = 0; i < 4; i++) {
    const gx = GW / 2 + 80 - i * 22 + Math.sin(frame * 0.025 + i) * 30;
    ctx.fillStyle = GHOST_COLORS[i];
    ctx.beginPath();
    ctx.arc(gx, 130, 10, Math.PI, 0);
    ctx.lineTo(gx + 10, 142);
    ctx.lineTo(gx + 5, 140);
    ctx.lineTo(gx, 142);
    ctx.lineTo(gx - 5, 140);
    ctx.lineTo(gx - 10, 142);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(gx - 3, 128, 2.5, 0, Math.PI * 2);
    ctx.arc(gx + 3, 128, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#22c';
    ctx.beginPath();
    ctx.arc(gx - 4, 128, 1, 0, Math.PI * 2);
    ctx.arc(gx + 2, 128, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ghost names
  ctx.font = '9px monospace';
  for (let i = 0; i < 4; i++) {
    ctx.fillStyle = GHOST_COLORS[i];
    ctx.fillText(GHOST_NAMES[i], 80 + i * 85, 170);
  }

  // Controls info
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Arrow Keys / D-Pad to move', GW / 2, 210);
  ctx.fillText('Space / BOOST for speed burst', GW / 2, 224);
  ctx.fillText('Eat all dots -- Avoid ghosts!', GW / 2, 238);
  ctx.fillText('Power pellets let you eat ghosts', GW / 2, 252);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 275);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 300);
  ctx.globalAlpha = 1;
}

function drawCutScene() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  const t = 1 - (cutSceneTimer / 3.0);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('LEVEL ' + cutSceneLevel, GW / 2, 80);

  // Animated chase scene
  const px = -30 + t * (GW + 60);
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  const cma = Math.abs(Math.sin(frame * 0.2)) * 0.5;
  ctx.arc(px, GH / 2, 14, cma, Math.PI * 2 - cma);
  ctx.lineTo(px, GH / 2);
  ctx.fill();

  // Ghosts chasing (or running if powered)
  const powered = t > 0.5;
  for (let i = 0; i < 4; i++) {
    const gx = powered ? px + 30 + i * 25 : px - 30 - i * 25;
    const gc = powered ? GHOST_SCARED_COLOR : GHOST_COLORS[i];
    ctx.fillStyle = gc;
    ctx.beginPath();
    ctx.arc(gx, GH / 2, 12, Math.PI, 0);
    ctx.lineTo(gx + 12, GH / 2 + 12);
    ctx.lineTo(gx + 6, GH / 2 + 10);
    ctx.lineTo(gx, GH / 2 + 12);
    ctx.lineTo(gx - 6, GH / 2 + 10);
    ctx.lineTo(gx - 12, GH / 2 + 12);
    ctx.fill();
  }

  // Level info
  const ft = FRUITS[Math.min(cutSceneLevel - 1, FRUITS.length - 1)];
  ctx.fillStyle = '#aaa';
  ctx.font = '12px monospace';
  ctx.fillText('Bonus Fruit: ' + ft.name.toUpperCase() + ' (' + ft.pts + ' pts)', GW / 2, GH - 60);

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Speed: ' + Math.round(getSpeed(cutSceneLevel)) + ' px/s', GW / 2, GH - 40);
}

// ============================================================
// START
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
