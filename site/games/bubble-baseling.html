function drawTitle() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H); }
  }

  drawBackground();

  // Floating bubbles decoration
  for (let i = 0; i < 15; i++) {
    const bx = (Math.sin(frameCount * 0.01 + i * 1.3) * 0.4 + 0.5) * W;
    const by = ((frameCount * 0.3 + i * 80) % H);
    const br = 8 + i * 2;
    ctx.strokeStyle = i % 2 === 0 ? '#38d973' : '#ff69b4';
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(bx, H - by, br, 0, Math.PI * 2);
    ctx.stroke();
    // Highlight dot
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.2;
    ctx.fillRect(Math.floor(bx - br * 0.3), Math.floor(H - by - br * 0.3), 2, 2);
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';

  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold ' + Math.floor(TILE * 2) + 'px monospace';
  ctx.fillText('BUBBLE', W / 2 + 3, H * 0.2 + 3);
  ctx.fillText('BASELING', W / 2 + 3, H * 0.2 + TILE * 2.2 + 3);

  // Main title
  ctx.fillStyle = '#38d973';
  ctx.fillText('BUBBLE', W / 2, H * 0.2);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('BASELING', W / 2, H * 0.2 + TILE * 2.2);

  // Subtitle
  ctx.font = Math.floor(TILE * 0.5) + 'px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Spore Bubbles in the Garden Tower', W / 2, H * 0.2 + TILE * 3.2);

  // NES-style controls display
  var ctrlFont = Math.max(8, Math.floor(TILE * 0.38));

  instY += lineH + 2;

  ctx.fillStyle = '#ccc';

    ['ARROWS/WASD', 'MOVE'],
    ['UP / W',      'JUMP'],
    ['SPACE / X',   'SHOOT'],

  ];
  // Show stat-gated controls if stats qualify
  if (statB.str >= 10 || statB.damage >= 1.5) {
    controls.push(['HOLD SHOOT', 'Mega Spore (STR 10+)']);

  if (statB.dex >= 8 || statB.speed >= 1.3) {
    controls.push(['DBL-TAP DIR', 'Garden Dash (DEX 8+)']);

  for (var ci = 0; ci < controls.length; ci++) {

  // Selected baseling preview (idle bob) + name (Base-blue) + 5 stat bars.
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;

  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), W / 2, H * 0.74 + TILE * 1.3);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bw = Math.min(W * 0.13, TILE * 2), _x0 = W / 2 - _bw * 2.5;
    ctx.font = Math.max(7, Math.floor(TILE * 0.32)) + 'px monospace';

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();

  if (state === 'title') {
    if (picking) return; // overlay open — swallow
    // Tap the lower "[C] SELECT BASELING" band to open the picker; tap elsewhere starts.
    var _rect = canvas.getBoundingClientRect();
    var _ty = (e.changedTouches[0] ? e.changedTouches[0].clientY - _rect.top : 0);
    if (_ty > H * 0.84 && _ty < H * 0.92) {
      picking = true;
      BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      return;
    }
    startGame();
    return;
  }
  if (state === 'gameOver') { state = 'title'; return; }
  if (state === 'paused') { state = 'playing'; return; }

  for (let t = 0; t < e.changedTouches.length; t++) {
    const touch = e.changedTouches[t];
    const rect = canvas.getBoundingClientRect();
    const px = touch.clientX - rect.left;
    const py = touch.clientY - rect.top;

    const dpadX = 20 + DPAD_SIZE / 2;
    const dpadY = H - 20 - DPAD_SIZE / 2;
    const jumpX = W - 20 - BTN_SIZE / 2;
    const jumpY = H - 20 - BTN_SIZE * 1.8;
    const shootX = W - 20 - BTN_SIZE / 2;
    const shootY = H - 20 - BTN_SIZE / 2;

    if (Math.sqrt((px - jumpX) ** 2 + (py - jumpY) ** 2) < BTN_SIZE) {
      inputJump = true;
      continue;
    }
    if (Math.sqrt((px - shootX) ** 2 + (py - shootY) ** 2) < BTN_SIZE) {
      inputShoot = true;
      continue;
    }
    const ddx = px - dpadX;
    const ddy = py - dpadY;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < DPAD_SIZE) {
      if (ddx < -15) inputLeft = true;
      else if (ddx > 15) inputRight = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  inputLeft = false;
  inputRight = false;

  for (let t = 0; t < e.touches.length; t++) {
    const touch = e.touches[t];
    const rect = canvas.getBoundingClientRect();
    const px = touch.clientX - rect.left;
    const py = touch.clientY - rect.top;

    const dpadX = 20 + DPAD_SIZE / 2;
    const dpadY = H - 20 - DPAD_SIZE / 2;
    const ddx = px - dpadX;
    const ddy = py - dpadY;
    if (Math.sqrt(ddx * ddx + ddy * ddy) < DPAD_SIZE * 1.5) {
      if (ddx < -15) inputLeft = true;
      else if (ddx > 15) inputRight = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    inputLeft = false;
    inputRight = false;
    inputJump = false;
    inputShoot = false;
  } else {
    inputJump = false;
    inputShoot = false;
    inputLeft = false;
    inputRight = false;
    for (let t = 0; t < e.touches.length; t++) {
      const touch = e.touches[t];
      const rect = canvas.getBoundingClientRect();
      const px = touch.clientX - rect.left;
      const py = touch.clientY - rect.top;
      const dpadX = 20 + DPAD_SIZE / 2;

      const jumpX = W - 20 - BTN_SIZE / 2;
      const jumpY = H - 20 - BTN_SIZE * 1.8;

      const shootY = H - 20 - BTN_SIZE / 2;
      if (Math.sqrt((px - jumpX) ** 2 + (py - jumpY) ** 2) < BTN_SIZE) inputJump = true;
      if (Math.sqrt((px - shootX) ** 2 + (py - shootY) ** 2) < BTN_SIZE) inputShoot = true;
      const ddx = px - dpadX;
      if (Math.sqrt(ddx * ddx + (py - dpadY) ** 2) < DPAD_SIZE) {

      }

// KEYBOARD INPUT
// ============================================================
window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;

  // Prevent page scroll for game keys
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].indexOf(e.code) !== -1) {
    e.preventDefault();
  }

  // Title: C opens the baseling picker; Enter/Space starts the game.
  if (state === 'title') {
    if (picking) return; // overlay open — swallow game input
    if (e.code === 'KeyC') {
      picking = true;
      BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (e.code === 'Enter' || e.code === 'Space') startGame();
    return;
  }
  // Game over: Enter/Space returns to title
  if (state === 'gameOver') {
    if (e.code === 'Enter' || e.code === 'Space') state = 'title';
    return;
  }
  // Pause toggle
  if (state === 'playing' && (e.code === 'Escape' || e.code === 'KeyP')) {
    state = 'paused'; return;
  }
  if (state === 'paused') {
    if (e.code === 'Escape' || e.code === 'KeyP' || e.code === 'Enter' || e.code === 'Space') {
      state = 'playing';
    }
    return;
  }

  // Dash: double-tap left/right (DEX >= 8)
  if (state === 'playing' && (statB.dex >= 8 || statB.speed >= 1.3) && dashTimer <= 0 && dashCooldown <= 0) {
    var tapDir = 0;
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') tapDir = -1;
    if (e.code === 'ArrowRight' || e.code === 'KeyD') tapDir = 1;
    if (tapDir !== 0) {
      if (tapDir === lastDirTap && frameCount - lastDirTime < 12) {
        dashTimer = 12;
        dashCooldown = Math.max(30, Math.floor(60 * statB.cooldown));
        player.dir = tapDir;
        SFX.dash();
        triggerShake(2, 4);
      }
      lastDirTap = tapDir;
      lastDirTime = frameCount;
    }
  }

  if (e.code === 'ArrowLeft' || e.code === 'KeyA') inputLeft = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') inputRight = true;
  if (e.code === 'ArrowUp' || e.code === 'KeyW') inputJump = true;
  if (e.code === 'Space' || e.code === 'KeyX') inputShoot = true;
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;

  if (e.code === 'ArrowLeft' || e.code === 'KeyA') inputLeft = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') inputRight = false;
  if (e.code === 'ArrowUp' || e.code === 'KeyW') inputJump = false;
  if (e.code === 'Space' || e.code === 'KeyX') inputShoot = false;
});

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  // NFT stat bonuses + color
  statB = (window.NftLoader && window.NftLoader.getStatBonuses) ? NftLoader.getStatBonuses() : {damage:1,speed:1,lives:0,hpMult:1,scoreMult:1,cooldown:1,luck:1,level:0};
  lives += statB.lives;
  // Use NFT color if available
  if (window.NftLoader && NftLoader.getColor) {
    var c = NftLoader.getColor();
    if (c) {
      playerColor = c;
      playerColorLight = c.replace(/[0-9a-f]{2}/gi, function(m) {
        return ('0' + Math.min(255, parseInt(m, 16) + 60).toString(16)).slice(-2);
      });
      playerColorDark = c.replace(/[0-9a-f]{2}/gi, function(m) {
        return ('0' + Math.max(0, parseInt(m, 16) - 40).toString(16)).slice(-2);
      });
    }
  }
  initLevel();
}

function nextLevel() {
  // Mark tutorial complete after level 2
  if (firstPlay && level >= 2) {
    firstPlay = false;
    try { localStorage.setItem('bb_played', '1'); } catch(e) { /* ok */ }
  }
  level++;
  if (level > MAX_LEVEL) level = 1;
  // Start transition wipe (closing)
  transitionTimer = 15;
  transitionDir = 1;
  state = 'transition';
  stateTimer = 30; // 15 close + 15 open
}

// ============================================================
// MAIN LOOP
// ============================================================
function gameLoop() {
  frameCount++;
  updateScreenEffects();

  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'playing') {
    updatePlayer();
    updateEnemies();
    updateBubbles();
    updateBoss();
    updateItems();
    updateSporeRain();
    updateParticles();
    updateFloatTexts();
    updateTutorialHints();

    // Tutorial triggers
    if (firstPlay && level === 1) {
      if (bubbles.length > 0 && !tutorialShown.bubble) {
        showTutorialHint('bubble', 'SPORE BUBBLES TRAP INVADERS');
      }
      var trappedAny = enemies.some(function(e) { return e.trapped; });
      if (trappedAny && !tutorialShown.pop) {
        showTutorialHint('pop', 'POP TRAPPED INVADERS FOR POINTS');
      }
    }
    if (firstPlay && level === 2) {
      if ((statB.str >= 10 || statB.damage >= 1.5) && !tutorialShown.charge) {
        showTutorialHint('charge', 'HOLD SHOOT FOR MEGA SPORE');
      }
      if ((statB.dex >= 8 || statB.speed >= 1.3) && !tutorialShown.dash) {
        showTutorialHint('dash', 'DOUBLE-TAP TO GARDEN DASH');
      }
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    drawPlatforms();
    drawGooTiles();
    drawItems();
    drawPowerups();
    drawBubbles();
    drawSporeRain();
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawBaseling();
    drawChargeIndicator();
    drawParticles();
    drawFloatTexts();
    drawFlash();
    ctx.restore();
    drawHUD();
    drawBossHPBar();
    drawZoneName();
    drawTutorialHints();
    drawTouchControls();
  } else if (state === 'dying') {
    stateTimer--;
    updateParticles();
    updateBubbles();
    updateBoss();
    updateSporeRain();
    updateFloatTexts();

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    drawPlatforms();
    drawGooTiles();
    drawItems();
    drawBubbles();
    drawSporeRain();
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawParticles();
    drawFloatTexts();
    drawFlash();
    ctx.restore();
    drawHUD();
    drawBossHPBar();

    if (stateTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('bubblebaseling_hi', String(highScore)); } catch(e) { /* storage full */ }
        }
        SFX.gameOver();
      } else {
        player.dead = false;
        player.x = COLS / 2 * TILE;
        player.y = (ROWS - 2) * TILE;
        player.vx = 0;
        player.vy = 0;
        player.invincible = 120;
        state = 'playing';
      }
    }
  } else if (state === 'levelComplete') {
    stateTimer--;
    updateParticles();

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    drawPlatforms();
    drawItems();
    drawBaseling();
    drawParticles();
    ctx.restore();
    drawHUD();
    drawLevelComplete();

    if (stateTimer <= 0) {
      nextLevel();
    }
  } else if (state === 'transition') {
    stateTimer--;
    // At midpoint: init the new level and switch to opening
    if (stateTimer === 15) {
      initLevel();
      transitionDir = -1;
      transitionTimer = 15;
    }
    // Draw the level behind the wipe
    ctx.save();
    drawBackground();
    drawPlatforms();
    ctx.restore();
    drawTransition();
    if (stateTimer <= 0) {
      transitionTimer = 0;
      state = 'playing';
    }
  } else if (state === 'paused') {
    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    drawPlatforms();
    drawGooTiles();
    drawItems();
    drawPowerups();
    drawBubbles();
    drawSporeRain();
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawBaseling();
    ctx.restore();
    drawHUD();
    drawBossHPBar();
    drawTouchControls();

    // Pause overlay (drawn outside shake so text is stable)
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold ' + Math.floor(TILE * 1.5) + 'px monospace';
    ctx.fillText('PAUSED', W / 2, H * 0.4);
    var pausePulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pausePulse;
    ctx.fillStyle = '#ccc';
    ctx.font = Math.floor(TILE * 0.45) + 'px monospace';
    ctx.fillText(isMobile ? 'TAP TO RESUME' : 'ESC / P TO RESUME', W / 2, H * 0.55);
    ctx.globalAlpha = 1;
  } else if (state === 'gameOver') {
    drawBackground();
    drawPlatforms();
    drawHUD();
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
