// ============================================================
// LEVEL GENERATION
// ============================================================
const LEVEL_LAYOUTS = [];

function generateLevelLayouts() {
  for (let lv = 0; lv < MAX_LEVEL; lv++) {
    const layout = [];
    // Floor
    layout.push({ x: 0, y: ROWS - 1, w: COLS, h: 1 });
    // Walls (left and right with gaps for wrap-around)
    for (let y = 0; y < ROWS - 1; y++) {
      if (y % 6 !== 0) {
        layout.push({ x: 0, y: y, w: 1, h: 1 });
        layout.push({ x: COLS - 1, y: y, w: 1, h: 1 });
      }
    }

    // Determine zone (0-4) and pick pattern
    var zone = Math.floor(lv / 5);
    var inZone = lv % 5;
    var pattern;

    // Boss levels (lv 4,9,14,19,24 = level 5,10,15,20,25) use pattern 0 (open arena)
    if (inZone === 4) {
      pattern = 0;
    }
    // Cave pattern: zones 1 and 3 (levels 6-10, 16-20), non-boss
    else if ((zone === 1 || zone === 3) && inZone < 3) {
      pattern = 5; // cave
    }
    // Fungal forest: zones 1 and 3, later levels in zone
    else if ((zone === 1 || zone === 3) && inZone >= 3) {
      pattern = 6; // fungal forest
    }
    else {
      pattern = lv % 5;
    }

    const numRows = 3 + Math.floor(lv / 5);
    const rowSpacing = Math.floor((ROWS - 4) / (numRows + 1));

    if (pattern === 5) {
      // CAVE PATTERN: curved arcs, overhangs, stalactites
      for (let row = 0; row < numRows; row++) {
        const py = ROWS - 3 - row * rowSpacing;
        if (py < 3) continue;
        // Organic arc: multiple small segments forming a curve
        var arcCx = 3 + Math.floor(Math.random() * (COLS - 8));
        var arcLen = 5 + Math.floor(Math.random() * 4);
        for (var seg = 0; seg < arcLen; seg++) {
          var segX = arcCx + seg;
          var segY = py + Math.round(Math.sin(seg / arcLen * Math.PI) * 1.5);
          if (segX >= 1 && segX < COLS - 1 && segY > 2 && segY < ROWS - 2) {
            layout.push({ x: segX, y: segY, w: 1, h: 1 });
          }
        }
        // Overhang on alternating rows
        if (row % 2 === 1) {
          var ohX = COLS - 3 - Math.floor(Math.random() * (COLS - 8));
          var ohLen = 3 + Math.floor(Math.random() * 3);
          for (var oi = 0; oi < ohLen; oi++) {
            if (ohX + oi >= 1 && ohX + oi < COLS - 1) {
              layout.push({ x: ohX + oi, y: py - 1, w: 1, h: 1 });
            }
          }
        }
      }
      // Stalactites from ceiling
      for (var st = 0; st < 4; st++) {
        var stX = 3 + Math.floor(Math.random() * (COLS - 6));
        var stLen = 2 + Math.floor(Math.random() * 2);
        for (var si = 0; si < stLen; si++) {
          layout.push({ x: stX, y: 1 + si, w: 1, h: 1 });
        }
      }
    } else if (pattern === 6) {
      // FUNGAL FOREST: tall trunks with canopy platforms on top
      var trunkCount = 3 + Math.floor(Math.random() * 2);
      var trunkSpacing = Math.floor((COLS - 4) / trunkCount);
      for (var ti = 0; ti < trunkCount; ti++) {
        var tx = 3 + ti * trunkSpacing + Math.floor(Math.random() * 2);
        var trunkH = 4 + Math.floor(Math.random() * 3);
        var trunkTop = ROWS - 2 - trunkH;
        // Trunk (1-wide column)
        for (var th = 0; th < trunkH; th++) {
          layout.push({ x: tx, y: trunkTop + th, w: 1, h: 1 });
        }
        // Canopy (wide mushroom cap)
        var capW = 3 + Math.floor(Math.random() * 3);
        var capX = Math.max(1, tx - Math.floor(capW / 2));
        if (capX + capW > COLS - 1) capX = COLS - 1 - capW;
        if (trunkTop - 1 > 2) {
          layout.push({ x: capX, y: trunkTop - 1, w: capW, h: 1 });
        }
      }
      // Extra mushroom-shaped platforms at mid-height
      for (var mi = 0; mi < 2; mi++) {
        var mx = 4 + Math.floor(Math.random() * (COLS - 8));
        var my = 5 + Math.floor(Math.random() * 5);
        layout.push({ x: mx, y: my, w: 4, h: 1 });
        layout.push({ x: mx + 1, y: my + 1, w: 2, h: 1 });
      }
    } else {
      // Original patterns (0-4)
      for (let row = 0; row < numRows; row++) {
        const py = ROWS - 3 - row * rowSpacing;
        if (py < 3) continue;

        if (pattern === 0) {
          const pw = 4 + Math.floor(Math.random() * 4);
          const gap = 3 + Math.floor(Math.random() * 3);
          const startL = 2 + Math.floor(Math.random() * 3);
          layout.push({ x: startL, y: py, w: pw, h: 1 });
          layout.push({ x: COLS - startL - pw, y: py, w: pw, h: 1 });
          if (row % 2 === 0 && COLS / 2 - gap / 2 > startL + pw) {
            layout.push({ x: Math.floor(COLS / 2 - 2), y: py, w: 4, h: 1 });
          }
        } else if (pattern === 1) {
          const pw = 5 + Math.floor(Math.random() * 3);
          const offset = (row % 2 === 0) ? 2 + row : COLS - 2 - pw - row;
          layout.push({ x: Math.max(1, Math.min(offset, COLS - pw - 1)), y: py, w: pw, h: 1 });
        } else if (pattern === 2) {
          const count = 3 + Math.floor(Math.random() * 2);
          const spacing = Math.floor((COLS - 4) / count);
          for (let c = 0; c < count; c++) {
            const px = 2 + c * spacing + Math.floor(Math.random() * 2);
            layout.push({ x: px, y: py, w: 3, h: 1 });
          }
        } else if (pattern === 3) {
          if (row % 2 === 0) {
            layout.push({ x: 2, y: py, w: COLS - 4, h: 1 });
          } else {
            layout.push({ x: 2, y: py, w: 5, h: 1 });
            layout.push({ x: COLS - 7, y: py, w: 5, h: 1 });
          }
        } else {
          const pw = 6 + Math.floor(Math.random() * 3);
          const offset = (row % 2 === 0) ? 2 : COLS - pw - 2;
          layout.push({ x: offset, y: py, w: pw, h: 1 });
        }
      }
    }

    LEVEL_LAYOUTS.push(layout);
  }
}
generateLevelLayouts();

function initLevel() {
  bubbles = [];
  items = [];
  powerups = [];
  particles = [];
  enemies = [];
  gooTiles = [];
  sporeDrops = [];
  sporeRainTimer = 0;
  dashTimer = 0;
  dashCooldown = 0;
  chargeTimer = 0;
  chargeReady = false;
  shootCooldown = 0;
  rapidFire = 0;
  speedBoost = 0;
  lightningBubble = 0;

  // Reset boss state
  boss = null;
  bossActive = false;
  bossFlash = 0;

  // Zone name display on zone entry (levels 1, 6, 11, 16, 21)
  var zoneIdx = Math.floor((level - 1) / 5);
  if ((level - 1) % 5 === 0) {
    currentZoneName = ZONE_NAMES[zoneIdx] || '';
    zoneNameTimer = 120; // 2 seconds
  }

  // Load platforms from layout
  const layoutIdx = (level - 1) % LEVEL_LAYOUTS.length;
  platforms = JSON.parse(JSON.stringify(LEVEL_LAYOUTS[layoutIdx]));

  // Spawn enemies (reactor bugs from level 3+)
  const enemyCount = Math.min(2 + level, 10);
  var enemyTypes2 = ['spore', 'slime', 'shroom'];
  if (level >= 3) enemyTypes2.push('reactor');
  for (let i = 0; i < enemyCount; i++) {
    let ex, ey;
    let attempts = 0;
    do {
      ex = 3 + Math.floor(Math.random() * (COLS - 6));
      ey = 2 + Math.floor(Math.random() * (ROWS - 6));
      attempts++;
    } while (attempts < 50 && isOnPlatform(ex * TILE, ey * TILE, TILE * 0.8, TILE));

    const typeIdx = Math.floor(Math.random() * Math.min(1 + Math.floor(level / 4), enemyTypes2.length));
    var eSpd = (1 + Math.random() * 0.5 + level * 0.1);
    var eType = enemyTypes2[typeIdx];
    if (eType === 'reactor') eSpd *= 1.4;
    enemies.push({
      x: ex * TILE,
      y: ey * TILE,
      vx: (Math.random() > 0.5 ? 1 : -1) * eSpd,
      vy: 0,
      w: TILE * 0.8,
      h: TILE * 0.9,
      type: eType,
      trapped: false,
      trapTimer: 0,
      trapBubble: null,
      dead: false,
      animFrame: 0,
      dir: 1,
      onGround: false,
      jumpTimer: Math.random() * 120,
      gooTimer: 0
    });
  }

  // Spore rain on every 5th level
  if (level % 5 === 0) sporeRainTimer = 600;

  // Player spawn at bottom
  player = {
    x: COLS / 2 * TILE,
    y: (ROWS - 2) * TILE,
    vx: 0,
    vy: 0,
    w: TILE * 0.7,
    h: TILE * 0.9,
    dir: 1,
    onGround: false,
    animFrame: 0,
    dead: false,
    invincible: 120,
    shootAnim: 0
  };

  // Spawn power-up on some levels (CHA = better spawn chance)
  if (level % 3 === 0 || Math.random() < 0.3 * statB.luck) {
    const puTypes = ['speed', 'rapid', 'lightning'];
    const puType = puTypes[Math.floor(Math.random() * puTypes.length)];
    const px = 3 + Math.floor(Math.random() * (COLS - 6));
    const py = 3 + Math.floor(Math.random() * (ROWS - 8));
    powerups.push({
      x: px * TILE + TILE / 2,
      y: py * TILE + TILE / 2,
      type: puType,
      collected: false,
      bobPhase: Math.random() * Math.PI * 2
    });
  }
}

// ============================================================
// COLLISION HELPERS
// ============================================================
function isOnPlatform(x, y, w, h) {
  for (const p of platforms) {
    const px = p.x * TILE, py = p.y * TILE;
    const pw = p.w * TILE, ph = p.h * TILE;
    if (x + w > px && x < px + pw && y + h > py && y + h < py + ph + 4 && y + h - 4 <= py) {
      return true;
    }
  }
  return false;
}

function collidesWithPlatform(x, y, w, h) {
  for (const p of platforms) {
    const px = p.x * TILE, py = p.y * TILE;
    const pw = p.w * TILE, ph = p.h * TILE;
    if (x + w > px && x < px + pw && y + h > py && y < py + ph) {
      return true;
    }
  }
  return false;
}

function resolveCollision(entity) {
  for (const p of platforms) {
    const px = p.x * TILE, py = p.y * TILE;
    const pw = p.w * TILE, ph = p.h * TILE;

    if (entity.x + entity.w > px && entity.x < px + pw) {
      if (entity.vy >= 0 && entity.y + entity.h > py && entity.y + entity.h < py + ph + entity.vy + 2) {
        entity.y = py - entity.h;
        entity.vy = 0;
        entity.onGround = true;
      }
      else if (entity.vy < 0 && entity.y < py + ph && entity.y > py) {
        entity.y = py + ph;
        entity.vy = 0;
      }
    }
  }
}

// ============================================================
// PLAYER LOGIC
// ============================================================
function updatePlayer() {
  if (player.dead) return;
  if (player.invincible > 0) player.invincible--;
  if (player.shootAnim > 0) player.shootAnim--;

  const spd = (speedBoost > 0 ? MOVE_SPEED * 1.5 : MOVE_SPEED) * statB.speed;
  if (inputLeft) {
    player.vx = -spd;
    player.dir = -1;
  } else if (inputRight) {
    player.vx = spd;
    player.dir = 1;
  } else {
    player.vx *= 0.7;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  if (inputJump && player.onGround) {
    player.vy = JUMP_FORCE * (1 + (statB.speed - 1) * 0.5);
    player.onGround = false;
    SFX.jump();
  }

  player.vy += GRAVITY;
  if (player.vy > 10) player.vy = 10;

  player.x += player.vx;

  if (player.x + player.w < 0) player.x = W;
  if (player.x > W) player.x = -player.w;

  for (const p of platforms) {
    const px = p.x * TILE, py = p.y * TILE;
    const pw = p.w * TILE, ph = p.h * TILE;
    if (player.x + player.w > px && player.x < px + pw &&
        player.y + player.h > py && player.y < py + ph) {
      if (player.vx > 0) player.x = px - player.w;
      else if (player.vx < 0) player.x = px + pw;
      player.vx = 0;
    }
  }

  player.onGround = false;
  player.y += player.vy;

  resolveCollision(player);

  if (player.y + player.h > (ROWS - 1) * TILE) {
    player.y = (ROWS - 1) * TILE - player.h;
    player.vy = 0;
    player.onGround = true;
  }

  if (player.y < 0) {
    player.y = 0;
    player.vy = 0;
  }

  // Landing squash trigger
  if (player.onGround && wasInAir) landSquash = 6;
  wasInAir = !player.onGround;
  if (landSquash > 0) landSquash--;

  // Shoot + charged bubble (STR >= 10: hold shoot 30 frames for big bubble)
  if (shootCooldown > 0) shootCooldown--;
  if (inputShoot) {
    if (statB.str >= 10 || statB.damage >= 1.5) {
      chargeTimer++;
      if (chargeTimer >= 30 && !chargeReady) {
        chargeReady = true;
        SFX.powerup();
      }
    }
    if (shootCooldown <= 0 && !chargeReady) {
      shootBubble();
      shootCooldown = Math.max(3, Math.floor((rapidFire > 0 ? 6 : 15) * statB.cooldown));
    }
  } else {
    if (chargeReady) {
      shootChargedBubble();
      shootCooldown = Math.max(6, Math.floor(30 * statB.cooldown));
    }
    chargeTimer = 0;
    chargeReady = false;
  }

  // Dash (DEX >= 8: double-tap direction, WIS scales cooldown)
  if (dashTimer > 0) {
    dashTimer--;
    player.vx = player.dir * MOVE_SPEED * 3 * statB.speed;
    player.invincible = Math.max(player.invincible, 1); // invincible during dash
    if (frameCount % 2 === 0) spawnParticles(player.x + player.w / 2, player.y + player.h / 2, playerColor, 2, 1);
  }
  if (dashCooldown > 0) dashCooldown--;

  if (Math.abs(player.vx) > 0.5) {
    player.animFrame = (player.animFrame + 0.15) % 4;
  } else {
    player.animFrame = 0;
  }

  if (rapidFire > 0) rapidFire--;
  if (speedBoost > 0) speedBoost--;
  if (lightningBubble > 0) lightningBubble--;
}

function shootBubble() {
  const bx = player.x + player.w / 2 + player.dir * TILE * 0.3;
  const by = player.y + player.h * 0.3;
  bubbles.push({
    x: bx,
    y: by,
    vx: player.dir * BUBBLE_SPEED,
    vy: 0,
    radius: TILE * 0.4,
    life: BUBBLE_LIFETIME,
    floating: false,
    trapped: null,
    lightning: lightningBubble > 0,
    color: lightningBubble > 0 ? '#ffff44' : (Math.random() > 0.5 ? '#38d973' : '#ff69b4'),
    age: 0
  });
  player.shootAnim = 8;
  SFX.shoot();
}

function shootChargedBubble() {
  var bx = player.x + player.w / 2 + player.dir * TILE * 0.5;
  var by = player.y + player.h * 0.3;
  bubbles.push({
    x: bx,
    y: by,
    vx: player.dir * BUBBLE_SPEED * 0.6,
    vy: 0,
    radius: TILE * 0.7,
    life: BUBBLE_LIFETIME * 1.5,
    floating: false,
    trapped: null,
    lightning: false,
    color: '#ff6622',
    age: 0,
    charged: true,
    trappedCount: 0
  });
  player.shootAnim = 12;
  SFX.chargeShoot();
  triggerShake(3, 5);
  spawnParticles(bx, by, '#ff6622', 8, 2);
}

// ============================================================
// ENEMY LOGIC
// ============================================================
function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.dead) continue;

    if (e.trapped) {
      e.trapTimer++;
      e.y += BUBBLE_FLOAT_SPEED * 0.5;
      e.x += Math.sin(frameCount * 0.05 + i) * 0.3;

      if (e.trapTimer > BUBBLE_TRAP_TIME) {
        e.trapped = false;
        e.trapTimer = 0;
        if (e.trapBubble) {
          e.trapBubble.life = 0;
          e.trapBubble = null;
        }
      }

      if (e.y < TILE) e.y = TILE;
      continue;
    }

    e.vy += GRAVITY;
    if (e.vy > 8) e.vy = 8;

    e.x += e.vx;
    e.y += e.vy;

    if (e.x + e.w < 0) e.x = W;
    if (e.x > W) e.x = -e.w;

    e.onGround = false;
    resolveCollision(e);

    let hitWall = false;
    for (const p of platforms) {
      const px = p.x * TILE, py = p.y * TILE;
      const pw = p.w * TILE, ph = p.h * TILE;
      if (e.x + e.w > px && e.x < px + pw && e.y + e.h > py && e.y < py + ph) {
        if (e.vx > 0) { e.x = px - e.w; hitWall = true; }
        else if (e.vx < 0) { e.x = px + pw; hitWall = true; }
      }
    }
    if (hitWall) {
      e.vx = -e.vx;
      e.dir = e.vx > 0 ? 1 : -1;
    }

    if (e.y + e.h > (ROWS - 1) * TILE) {
      e.y = (ROWS - 1) * TILE - e.h;
      e.vy = 0;
      e.onGround = true;
    }

    if (e.onGround && e.type !== 'slime') {
      e.jumpTimer--;
      if (e.jumpTimer <= 0) {
        e.vy = JUMP_FORCE * 0.7;
        e.jumpTimer = 60 + Math.floor(Math.random() * 120);
      }
    }

    if (e.type === 'slime' && e.onGround) {
      e.jumpTimer--;
      if (e.jumpTimer <= 0) {
        e.vy = JUMP_FORCE * 0.5;
        e.jumpTimer = 30 + Math.floor(Math.random() * 40);
      }
    }

    // Reactor bug: drop toxic goo trail while on ground
    if (e.type === 'reactor' && e.onGround) {
      e.gooTimer++;
      if (e.gooTimer >= 15) {
        e.gooTimer = 0;
        gooTiles.push({ x: e.x + e.w / 2, y: e.y + e.h, life: 420 }); // 7 seconds
      }
    }

    // Reactor bug: doesn't jump, moves fast and changes direction more often
    if (e.type === 'reactor' && e.onGround) {
      e.jumpTimer--;
      if (e.jumpTimer <= 0) {
        e.vx = -e.vx; // direction change instead of jump
        e.dir = e.vx > 0 ? 1 : -1;
        e.jumpTimer = 40 + Math.floor(Math.random() * 60);
      }
    }

    if (!player.dead && player.invincible <= 0) {
      if (player.x + player.w > e.x && player.x < e.x + e.w &&
          player.y + player.h > e.y && player.y < e.y + e.h) {
        playerDie();
      }
    }

    e.animFrame = (e.animFrame + 0.1) % 4;
  }

  // Update goo tiles + player collision (DEX speed lets you outrun)
  for (var gi = gooTiles.length - 1; gi >= 0; gi--) {
    gooTiles[gi].life--;
    if (gooTiles[gi].life <= 0) { gooTiles.splice(gi, 1); continue; }
    // Player steps on goo
    if (!player.dead && player.invincible <= 0 && dashTimer <= 0) {
      var gx = gooTiles[gi].x, gy = gooTiles[gi].y;
      var gdx = Math.abs(player.x + player.w / 2 - gx);
      var gdy = Math.abs(player.y + player.h - gy);
      if (gdx < TILE * 0.5 && gdy < TILE * 0.4) {
        playerDie();
        SFX.gooSplat();
        break;
      }
    }
  }
}

// ============================================================
// BUBBLE LOGIC
// ============================================================
function updateBubbles() {
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.life--;
    b.age++;

    if (b.life <= 0) {
      if (b.trapped) {
        b.trapped.trapped = false;
        b.trapped.trapTimer = 0;
        b.trapped.trapBubble = null;
      }
      spawnParticles(b.x, b.y, b.color, 5, 1);
      bubbles.splice(i, 1);
      continue;
    }

    if (b.trapped) {
      b.x = b.trapped.x + b.trapped.w / 2;
      b.y = b.trapped.y + b.trapped.h / 2;

      if (!player.dead) {
        const dx = player.x + player.w / 2 - b.x;
        const dy = player.y + player.h / 2 - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < (b.radius + TILE * 0.5) * statB.damage) {
          popBubble(b, i);
          continue;
        }
      }
    } else {
      b.x += b.vx;
      b.y += b.vy;

      b.vx *= 0.97;
      if (Math.abs(b.vx) < 0.3) {
        b.floating = true;
        b.vx = 0;
        b.vy = BUBBLE_FLOAT_SPEED;
      }

      if (b.x < TILE || b.x > W - TILE) {
        b.vx = -b.vx;
        b.x = Math.max(TILE, Math.min(W - TILE, b.x));
      }
      if (b.y < TILE) {
        b.y = TILE;
        b.vy = 0;
        b.vx = Math.sin(frameCount * 0.02 + i) * 0.3;
      }

      for (const e of enemies) {
        if (e.dead || e.trapped) continue;
        const dx = e.x + e.w / 2 - b.x;
        const dy = e.y + e.h / 2 - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b.radius + TILE * 0.4) {
          e.trapped = true;
          e.trapTimer = 0;
          e.trapBubble = b;
          e.vx = 0;
          e.vy = 0;
          // Charged bubble: instant kill all enemies it touches, 2x score
          if (b.charged) {
            e.dead = true; e.trapped = false; e.trapBubble = null;
            var cBase = e.type === 'reactor' ? 400 : (e.type === 'shroom' ? 300 : (e.type === 'slime' ? 200 : 100));
            var cScore = Math.floor(cBase * 2 * statB.scoreMult * statB.damage);
            score += cScore;
            spawnFloatText(e.x + e.w / 2, e.y - 10, '+' + cScore, '#ff6622');
            SFX.pop();
            spawnRing(e.x + e.w / 2, e.y + e.h / 2, '#ff6622', TILE);
            spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff6622', 10, 3);
            triggerShake(3, 6);
            var cFoods = ['burger','rice','berry','cake','fish','myco_cap','spore_fruit','reactor_candy','goo_jelly'];
            items.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, vy: -2, type: cFoods[Math.floor(Math.random() * cFoods.length)], life: 300, collected: false });
            var aliveCheck = enemies.filter(function(en) { return !en.dead; });
            if (aliveCheck.length === 0 && !bossActive) {
              checkLevelClearOrBoss();
            }
            continue; // charged bubble plows through all enemies
          }
          if (!b.trapped) b.trapped = e;
          b.vx = 0;
          b.vy = BUBBLE_FLOAT_SPEED * 0.3;
          b.life = BUBBLE_TRAP_TIME + 60;
          SFX.trap();
          triggerShake(2, 6);

          if (b.lightning) {
            for (const e2 of enemies) {
              if (e2 !== e && !e2.dead && !e2.trapped) {
                const d2 = Math.sqrt((e2.x - e.x) ** 2 + (e2.y - e.y) ** 2);
                if (d2 < TILE * 4) {
                  e2.trapped = true;
                  e2.trapTimer = 0;
                  const nb = {
                    x: e2.x + e2.w / 2, y: e2.y + e2.h / 2,
                    vx: 0, vy: BUBBLE_FLOAT_SPEED * 0.3,
                    radius: TILE * 0.4, life: BUBBLE_TRAP_TIME + 60,
                    floating: true, trapped: e2, lightning: false,
                    color: '#ffff44', age: 0
                  };
                  e2.trapBubble = nb;
                  bubbles.push(nb);
                  spawnParticles(e2.x + e2.w / 2, e2.y + e2.h / 2, '#ffff44', 8, 3);
                }
              }
            }
          }
          break;
        }
      }
    }
  }
}

function popBubble(bubble, idx) {
  const enemy = bubble.trapped;
  if (enemy) {
    enemy.dead = true;
    enemy.trapped = false;
    enemy.trapBubble = null;

    var foodTypes = ['sporeCake', 'fungalStew', 'reactorJuice', 'lpNectar', 'mycoTruffle', 'myco_cap', 'spore_fruit', 'reactor_candy', 'goo_jelly'];
    var roll = Math.random() / statB.luck;
    var foodIdx = Math.min(Math.floor(roll * foodTypes.length), foodTypes.length - 1);
    var foodType = foodTypes[foodTypes.length - 1 - foodIdx];
    items.push({
      x: bubble.x,
      y: bubble.y,
      vy: -2,
      type: foodType,
      life: 300,
      collected: false
    });
    if (Math.random() < (statB.luck - 1) * 0.4) {
      items.push({
        x: bubble.x + (Math.random() - 0.5) * TILE,
        y: bubble.y,
        vy: -3,
        type: foodTypes[Math.floor(Math.random() * foodTypes.length)],
        life: 300,
        collected: false
      });
    }

    const baseScore = enemy.type === 'reactor' ? 400 : (enemy.type === 'shroom' ? 300 : (enemy.type === 'slime' ? 200 : 100));
    var earnedScore = Math.floor(baseScore * statB.scoreMult * statB.damage);
    score += earnedScore;
    spawnFloatText(bubble.x, bubble.y - 10, '+' + earnedScore, '#ffdd44');

    SFX.pop();
    // NES-style pop: ring + burst
    spawnRing(bubble.x, bubble.y, bubble.color, bubble.radius * 2);
    spawnParticles(bubble.x, bubble.y, bubble.color, 12, 3);
    spawnParticles(bubble.x, bubble.y, '#fff', 8, 2);
    triggerShake(4, 8);
    triggerFlash(0.3);
  } else {
    spawnParticles(bubble.x, bubble.y, bubble.color, 5, 1.5);
  }

  bubbles.splice(idx, 1);

  const alive = enemies.filter(function(e) { return !e.dead; });
  if (alive.length === 0 && !bossActive) {
    checkLevelClearOrBoss();
  }
}

// ============================================================
// BOSS FIGHT SYSTEM
// ============================================================
function isBossLevel() {
  return level % 5 === 0;
}

function checkLevelClearOrBoss() {
  if (isBossLevel() && !boss) {
    spawnBoss();
  } else if (!bossActive) {
    state = 'levelComplete';
    stateTimer = 150;
    SFX.levelComplete();
    score += Math.floor(level * 50 * statB.scoreMult);
    triggerShake(6, 15);
  }
}

function spawnBoss() {
  var tier = Math.floor(level / 5); // 1-5
  var bossType = (level <= 5) ? 'queen' : 'hive';
  var baseHP = bossType === 'queen' ? 5 : 8;
  var hp = baseHP + (tier - 1) * 3; // scale HP per tier

  boss = {
    type: bossType,
    x: W / 2,
    y: TILE * 4,
    w: TILE * 2.4,
    h: TILE * 2.4,
    hp: hp,
    maxHp: hp,
    vx: 1.5 + tier * 0.3,
    vy: 0,
    dir: 1,
    phase: 0,          // AI phase counter
    attackTimer: 60,    // frames until next attack
    spawnTimer: 180,    // frames until next minion spawn
    chargeTimer: 0,     // for hive charge attack
    charging: false,
    animFrame: 0,
    flashTimer: 0
  };
  bossActive = true;
  SFX.bossRoar();
  triggerShake(8, 20);

  // Show boss fight text
  spawnFloatText(W / 2, H * 0.3, 'GARDEN BOSS!', '#ff4444');
  // Controls reminder
  if (lightningBubble > 0) {
    spawnFloatText(W / 2, H * 0.38, 'Rainbow spores are strong!', '#ff69b4');
  } else if (statB.str >= 10 || statB.damage >= 1.5) {
    spawnFloatText(W / 2, H * 0.38, 'Hold SHOOT for mega spore!', '#ff6622');
  }
}

function updateBoss() {
  if (!boss || !bossActive) return;
  var tier = Math.floor(level / 5);

  boss.animFrame = (boss.animFrame + 0.05) % 4;
  if (boss.flashTimer > 0) boss.flashTimer--;

  // Movement: bounce side to side
  if (!boss.charging) {
    boss.x += boss.vx * boss.dir;
    // Vertical bob
    boss.y += Math.sin(frameCount * 0.02) * 0.5;
    // Bounce off walls
    if (boss.x - boss.w / 2 < TILE * 2) { boss.dir = 1; }
    if (boss.x + boss.w / 2 > W - TILE * 2) { boss.dir = -1; }
  }

  // Attack patterns
  boss.attackTimer--;
  if (boss.attackTimer <= 0) {
    if (boss.type === 'queen') {
      // Spore projectile spread
      var spreadCount = 3 + tier;
      for (var si = 0; si < spreadCount; si++) {
        var angle = -Math.PI / 2 + (si / (spreadCount - 1) - 0.5) * Math.PI * 0.8;
        sporeDrops.push({
          x: boss.x,
          y: boss.y + boss.h / 2,
          vy: Math.sin(angle) * 2.5 + 1.5,
          vxSpore: Math.cos(angle) * 2
        });
      }
      SFX.sporeHit();
    } else if (boss.type === 'hive') {
      // Goo pool wave
      var poolCount = 3 + tier;
      for (var gi = 0; gi < poolCount; gi++) {
        gooTiles.push({
          x: TILE * 3 + Math.random() * (W - TILE * 6),
          y: (ROWS - 1) * TILE,
          life: 300
        });
      }
      SFX.gooSplat();
      // Charge attack every 3rd cycle
      boss.phase++;
      if (boss.phase % 3 === 0 && !boss.charging) {
        boss.charging = true;
        boss.chargeTimer = 40;
        boss.dir = (player.x < boss.x) ? -1 : 1;
        boss.vx *= 3;
      }
    }
    boss.attackTimer = Math.max(40, 90 - tier * 10);
  }

  // Hive charge movement
  if (boss.charging) {
    boss.x += boss.vx * boss.dir;
    boss.chargeTimer--;
    if (boss.chargeTimer <= 0) {
      boss.charging = false;
      boss.vx = 1.5 + tier * 0.3;
      // Bounce back to center-ish
      if (boss.x < W * 0.3) boss.dir = 1;
      if (boss.x > W * 0.7) boss.dir = -1;
    }
    // Clamp to screen
    boss.x = Math.max(TILE * 2, Math.min(W - TILE * 2, boss.x));
  }

  // Spawn minions periodically
  boss.spawnTimer--;
  if (boss.spawnTimer <= 0) {
    var minionType = boss.type === 'queen' ? 'shroom' : 'reactor';
    var mx = boss.x + (Math.random() - 0.5) * TILE * 3;
    var my = boss.y + boss.h / 2;
    var mSpd = 1 + Math.random() * 0.5 + level * 0.05;
    if (minionType === 'reactor') mSpd *= 1.4;
    enemies.push({
      x: mx, y: my, vx: (Math.random() > 0.5 ? 1 : -1) * mSpd, vy: 0,
      w: TILE * 0.8, h: TILE * 0.9, type: minionType,
      trapped: false, trapTimer: 0, trapBubble: null, dead: false,
      animFrame: 0, dir: 1, onGround: false,
      jumpTimer: Math.random() * 120, gooTimer: 0
    });
    boss.spawnTimer = Math.max(120, 240 - tier * 30);
  }

  // Collision with player
  if (!player.dead && player.invincible <= 0 && dashTimer <= 0) {
    var bdx = Math.abs(player.x + player.w / 2 - boss.x);
    var bdy = Math.abs(player.y + player.h / 2 - boss.y);
    if (bdx < (boss.w / 2 + player.w / 2) * 0.8 && bdy < (boss.h / 2 + player.h / 2) * 0.8) {
      playerDie();
    }
  }

  // Check bubble hits on boss
  for (var bi = bubbles.length - 1; bi >= 0; bi--) {
    var bb = bubbles[bi];
    if (bb.trapped) continue; // already trapping an enemy
    var hitDx = Math.abs(bb.x - boss.x);
    var hitDy = Math.abs(bb.y - boss.y);
    if (hitDx < boss.w / 2 + bb.radius && hitDy < boss.h / 2 + bb.radius) {
      var dmg = 1;
      if (bb.charged) dmg = 2;
      if (bb.lightning && boss.type === 'hive') dmg = 2;
      boss.hp -= dmg;
      boss.flashTimer = 8;
      SFX.bossHit();
      spawnParticles(bb.x, bb.y, bb.charged ? '#ff6622' : bb.color, 8, 2);
      triggerShake(3, 5);
      spawnFloatText(bb.x, bb.y - 10, '-' + dmg, '#ff4444');
      bubbles.splice(bi, 1);

      if (boss.hp <= 0) {
        bossDeath();
        return;
      }
    }
  }
}

function bossDeath() {
  SFX.bossDie();
  triggerShake(10, 30);
  triggerFlash(0.8);

  // Big explosion particles
  for (var i = 0; i < 40; i++) {
    var angle = (i / 40) * Math.PI * 2;
    var spd = 2 + Math.random() * 4;
    var colors = ['#ff4444', '#ffdd44', '#ff8800', '#aa44ff', '#ffffff'];
    particles.push({
      x: boss.x, y: boss.y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, color: colors[i % colors.length], size: 3 + Math.random() * 4
    });
  }

  // Bonus score
  var bossScore = Math.floor(1000 * level * statB.scoreMult);
  score += bossScore;
  spawnFloatText(boss.x, boss.y - 20, '+' + bossScore, '#ffdd44');

  // Drop 5 food items
  var bFoods = ['mycoTruffle', 'lpNectar', 'reactorJuice', 'myco_cap', 'spore_fruit'];
  for (var fi = 0; fi < 5; fi++) {
    items.push({
      x: boss.x + (fi - 2) * TILE * 0.8,
      y: boss.y,
      vy: -3 - Math.random() * 2,
      type: bFoods[fi % bFoods.length],
      life: 400,
      collected: false
    });
  }

  boss = null;
  bossActive = false;

  // Now complete the level
  state = 'levelComplete';
  stateTimer = 150;
  SFX.levelComplete();
  score += Math.floor(level * 50 * statB.scoreMult);
}

function drawBossHPBar() {
  if (!boss || !bossActive) return;
  var barW = W * 0.5;
  var barH = Math.floor(TILE * 0.35);
  var barX = Math.floor(W / 2 - barW / 2);
  var barY = Math.floor(TILE * 1.5);
  var hpPct = boss.hp / boss.maxHp;

  // Dark outline
  ctx.fillStyle = '#111';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  // Background
  ctx.fillStyle = '#331111';
  ctx.fillRect(barX, barY, barW, barH);
  // HP fill
  var hpColor = hpPct > 0.5 ? '#cc44ff' : (hpPct > 0.25 ? '#ff8844' : '#ff2222');
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, Math.floor(barW * hpPct), barH);
  // Bright edge
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.fillRect(barX, barY, Math.floor(barW * hpPct), 1);
  ctx.globalAlpha = 1;
  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.textAlign = 'center';
  var bossName = boss.type === 'queen' ? 'Fungal Bloom Queen' : 'Spore Hive Lord';
  ctx.fillText(bossName, W / 2, barY - 4);
}

function drawBoss() {
  if (!boss || !bossActive) return;
  ctx.save();
  ctx.translate(Math.floor(boss.x), Math.floor(boss.y));

  // Flash white when hit
  if (boss.flashTimer > 0 && boss.flashTimer % 2 === 0) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, boss.w / 2 + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  var bw = boss.w / 2;
  var bh = boss.h / 2;
  var pulse = Math.sin(frameCount * 0.04) * 0.05 + 1;

  if (boss.type === 'queen') {
    // MYCELIAL QUEEN: large purple mushroom with golden spots, multiple eyes, root-tentacles
    ctx.scale(pulse, pulse);

    // Root-tentacles (4 total, wave animation)
    ctx.strokeStyle = '#553388';
    ctx.lineWidth = 3;
    for (var rt = 0; rt < 4; rt++) {
      var rtAngle = (rt / 4) * Math.PI + Math.PI * 0.5;
      var rtWave = Math.sin(frameCount * 0.06 + rt * 1.5) * 8;
      ctx.beginPath();
      ctx.moveTo(Math.cos(rtAngle) * bw * 0.4, bh * 0.5);
      ctx.quadraticCurveTo(
        Math.cos(rtAngle) * bw * 0.8 + rtWave,
        bh * 0.8,
        Math.cos(rtAngle) * bw * 1.1 + rtWave * 1.5,
        bh * 1.1
      );
      ctx.stroke();
    }

    // Stem
    ctx.fillStyle = '#ddccbb';
    ctx.fillRect(Math.floor(-bw * 0.2), Math.floor(-bh * 0.1), Math.ceil(bw * 0.4), Math.ceil(bh * 0.7));

    // Cap outline
    ctx.fillStyle = '#220022';
    ctx.beginPath();
    ctx.arc(0, -bh * 0.15, bw + 2, Math.PI, 0);
    ctx.fill();
    // Cap
    ctx.fillStyle = '#8822cc';
    ctx.beginPath();
    ctx.arc(0, -bh * 0.15, bw, Math.PI, 0);
    ctx.fill();

    // Golden spots on cap
    ctx.fillStyle = '#ddaa22';
    var spotPositions = [[-0.5, -0.4], [0.3, -0.5], [-0.2, -0.6], [0.5, -0.35], [0, -0.65]];
    for (var sp = 0; sp < spotPositions.length; sp++) {
      ctx.beginPath();
      ctx.arc(spotPositions[sp][0] * bw, spotPositions[sp][1] * bh, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Multiple eyes (5 eyes in an arc)
    for (var ei = 0; ei < 5; ei++) {
      var eyeX = (ei - 2) * bw * 0.25;
      var eyeY = bh * 0.05;
      // White
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, bw * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Pupil - track player
      var pupDir = player.x < boss.x ? -1 : 1;
      ctx.fillStyle = '#880066';
      ctx.beginPath();
      ctx.arc(eyeX + pupDir * 2, eyeY, bw * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }

    // Mouth
    ctx.strokeStyle = '#ff44aa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, bh * 0.2, bw * 0.2, 0, Math.PI);
    ctx.stroke();

  } else if (boss.type === 'hive') {
    // REACTOR HIVE: segmented green-black carapace, antennae, glowing reactor core
    var chargePulse = boss.charging ? (Math.sin(frameCount * 0.3) * 0.3 + 1.2) : pulse;
    ctx.scale(chargePulse, chargePulse);

    // Glow aura
    ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.05) * 0.08;
    ctx.fillStyle = '#44cc00';
    ctx.beginPath();
    ctx.ellipse(0, 0, bw + 8, bh + 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Multiple antennae (4)
    ctx.strokeStyle = '#226600';
    ctx.lineWidth = 2;
    for (var ai = 0; ai < 4; ai++) {
      var ax = (ai - 1.5) * bw * 0.35;
      var aWave = Math.sin(frameCount * 0.08 + ai) * 5;
      ctx.beginPath();
      ctx.moveTo(ax, -bh * 0.8);
      ctx.quadraticCurveTo(ax + aWave, -bh * 1.3, ax + aWave * 1.5, -bh * 1.5);
      ctx.stroke();
      // Antenna tips
      ctx.fillStyle = '#88ff22';
      ctx.beginPath();
      ctx.arc(ax + aWave * 1.5, -bh * 1.5, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Body outline (segmented)
    ctx.fillStyle = '#112200';
    ctx.beginPath();
    ctx.ellipse(0, 0, bw + 2, bh + 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Carapace segments
    for (var seg = 0; seg < 3; seg++) {
      var segY = (seg - 1) * bh * 0.55;
      ctx.fillStyle = seg % 2 === 0 ? '#338800' : '#225500';
      ctx.beginPath();
      ctx.ellipse(0, segY, bw * 0.9, bh * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      // Segment line
      ctx.strokeStyle = '#113300';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-bw * 0.85, segY);
      ctx.lineTo(bw * 0.85, segY);
      ctx.stroke();
    }

    // Glowing reactor core in center
    var corePulse = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = corePulse;
    ctx.fillStyle = '#88ff22';
    ctx.beginPath();
    ctx.arc(0, 0, bw * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(0, 0, bw * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Red compound eyes
    ctx.fillStyle = '#ff2200';
    ctx.beginPath();
    ctx.arc(-bw * 0.5, -bh * 0.3, bw * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bw * 0.5, -bh * 0.3, bw * 0.18, 0, Math.PI * 2);
    ctx.fill();
    // Eye shine
    ctx.fillStyle = '#ff8866';
    ctx.fillRect(Math.floor(-bw * 0.55), Math.floor(-bh * 0.4), 2, 2);
    ctx.fillRect(Math.floor(bw * 0.45), Math.floor(-bh * 0.4), 2, 2);

    // Legs (4 per side)
    ctx.strokeStyle = '#226600';
    ctx.lineWidth = 2;
    for (var leg = 0; leg < 4; leg++) {
      var legY = -bh * 0.4 + leg * bh * 0.3;
      var legAnim = Math.sin(frameCount * 0.1 + leg * 1.5) * 5;
      ctx.beginPath();
      ctx.moveTo(-bw * 0.85, legY);
      ctx.lineTo(-bw * 1.3 - legAnim, legY + bh * 0.25);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bw * 0.85, legY);
      ctx.lineTo(bw * 1.3 + legAnim, legY + bh * 0.25);
      ctx.stroke();
    }

    // Mandibles
    ctx.strokeStyle = '#88ff22';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-bw * 0.3, bh * 0.7);
    ctx.lineTo(-bw * 0.5, bh * 1.1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bw * 0.3, bh * 0.7);
    ctx.lineTo(bw * 0.5, bh * 1.1);
    ctx.stroke();
  }

  ctx.restore();
}

// ============================================================
// SPORE RAIN (every 5th level, 10 seconds)
// ============================================================
function updateSporeRain() {
  if (sporeRainTimer > 0) {
    sporeRainTimer--;
    if (frameCount % 8 === 0) {
      sporeDrops.push({ x: TILE + Math.random() * (W - TILE * 2), y: TILE, vy: 1.5 + Math.random() * 1.5 });
    }
  }
  for (var si = sporeDrops.length - 1; si >= 0; si--) {
    var sd = sporeDrops[si];
    sd.y += sd.vy;
    // Boss spore projectiles have horizontal velocity
    if (sd.vxSpore) sd.x += sd.vxSpore;
    else sd.x += Math.sin(frameCount * 0.03 + si) * 0.5;
    if (sd.y > H || sd.x < 0 || sd.x > W) { sporeDrops.splice(si, 1); continue; }
    if (!player.dead && player.invincible <= 0 && dashTimer <= 0) {
      var sdx = Math.abs(player.x + player.w / 2 - sd.x);
      var sdy = Math.abs(player.y + player.h / 2 - sd.y);
      if (sdx < TILE * 0.4 && sdy < TILE * 0.5) {
        sporeDrops.splice(si, 1);
        if (Math.random() < (statB.hpMult - 1)) {
          spawnParticles(sd.x, sd.y, '#88ff88', 4, 1);
        } else { playerDie(); SFX.sporeHit(); }
        continue;
      }
    }
  }
}

// ============================================================
// ITEMS
// ============================================================
function updateItems() {
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    if (item.collected) { items.splice(i, 1); continue; }

    item.vy += 0.15;
    item.y += item.vy;
    item.life--;

    if (item.y > (ROWS - 2) * TILE) {
      item.y = (ROWS - 2) * TILE;
      item.vy = -item.vy * 0.5;
      if (Math.abs(item.vy) < 0.5) item.vy = 0;
    }

    if (item.life <= 0) { items.splice(i, 1); continue; }

    if (!player.dead) {
      const dx = player.x + player.w / 2 - item.x;
      const dy = player.y + player.h / 2 - item.y;
      if (Math.abs(dx) < TILE * 0.7 && Math.abs(dy) < TILE * 0.7) {
        item.collected = true;
        var foodBase = item.type==="mycoTruffle"?150:(item.type==="lpNectar"?100:(item.type==="reactorJuice"?75:50));
        var foodScore = Math.floor(foodBase * statB.scoreMult);
        score += foodScore;
        spawnFloatText(item.x, item.y - 8, '+' + foodScore, '#88ffbb');
        SFX.collect();
        spawnParticles(item.x, item.y, '#ffdd44', 8, 2);
      }
    }
  }

  for (const pu of powerups) {
    if (pu.collected) continue;
    pu.bobPhase += 0.05;
    if (!player.dead) {
      const dx = player.x + player.w / 2 - pu.x;
      const dy = player.y + player.h / 2 - pu.y;
      if (Math.abs(dx) < TILE * 0.8 && Math.abs(dy) < TILE * 0.8) {
        pu.collected = true;
        SFX.powerup();
        if (pu.type === 'speed') speedBoost = 600;
        else if (pu.type === 'rapid') rapidFire = 480;
        else if (pu.type === 'lightning') lightningBubble = 360;
        spawnParticles(pu.x, pu.y, '#ffdd00', 10, 3);
        triggerFlash(0.2);
      }
    }
  }
}

// ============================================================
// PLAYER DEATH
// ============================================================
function playerDie() {
  if (player.dead || player.invincible > 0) return;
  player.dead = true;
  lives--;
  SFX.die();
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, playerColor, 20, 3);
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#fff', 8, 2);
  triggerShake(6, 12);
  triggerFlash(0.6);
  stateTimer = 120;
  state = 'dying';
}

// ============================================================
// DRAWING
// ============================================================
function drawBackground() {
  var zone = Math.min(4, Math.floor((level - 1) / 5));
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);

  if (zone === 0) {
    // ZONE 1: Dark cellar, brick walls, dripping water
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = '#332211';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    // Brick pattern on walls
    ctx.fillStyle = '#2a1a0a';
    for (var by = 0; by < ROWS; by++) {
      var brickOff = (by % 2) * TILE / 2;
      for (var bx = 0; bx < 3; bx++) {
        ctx.globalAlpha = 0.08;
        ctx.fillRect(Math.floor(bx * TILE * 1.5 + brickOff), by * TILE, Math.floor(TILE * 1.4), TILE - 1);
        ctx.fillRect(Math.floor(W - (bx + 1) * TILE * 1.5 + brickOff), by * TILE, Math.floor(TILE * 1.4), TILE - 1);
      }
    }
    ctx.globalAlpha = 1;
    // Dripping water particles
    for (var di = 0; di < 5; di++) {
      var dx = ((di * 173 + level * 41) % (COLS - 4)) * TILE + TILE * 2;
      var dy = ((frameCount * 0.8 + di * 200) % (H - TILE * 2)) + TILE;
      ctx.fillStyle = '#4466aa';
      ctx.globalAlpha = 0.3;
      ctx.fillRect(Math.floor(dx), Math.floor(dy), 1, 3);
    }
    ctx.globalAlpha = 1;

  } else if (zone === 1) {
    // ZONE 2: Deep cave, blue-purple crystals, ambient glow
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#110022';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#000033';
    ctx.fillRect(0, H * 0.5, W, H * 0.5);
    ctx.globalAlpha = 1;
    // Crystal formations on walls
    for (var ci = 0; ci < 8; ci++) {
      var cx = (ci < 4) ? TILE * (0.5 + ci * 0.3) : W - TILE * (0.5 + (ci - 4) * 0.3);
      var cy = ((ci * 137 + level * 29) % (ROWS - 6)) * TILE + TILE * 3;
      var cSize = TILE * (0.3 + (ci % 3) * 0.15);
      ctx.fillStyle = ci % 2 === 0 ? '#6644aa' : '#4466cc';
      ctx.globalAlpha = 0.25;
      // Crystal shape (diamond)
      ctx.beginPath();
      ctx.moveTo(Math.floor(cx), Math.floor(cy - cSize));
      ctx.lineTo(Math.floor(cx + cSize * 0.4), Math.floor(cy));
      ctx.lineTo(Math.floor(cx), Math.floor(cy + cSize * 0.6));
      ctx.lineTo(Math.floor(cx - cSize * 0.4), Math.floor(cy));
      ctx.closePath();
      ctx.fill();
      // Glow
      ctx.fillStyle = '#8888ff';
      ctx.globalAlpha = 0.06 + Math.sin(frameCount * 0.02 + ci) * 0.03;
      ctx.beginPath();
      ctx.arc(Math.floor(cx), Math.floor(cy), cSize * 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (zone === 2) {
    // ZONE 3: Reactor tunnels, pulsing pipes, toxic drips
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#002200';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    // Horizontal pipes
    for (var pi = 0; pi < 3; pi++) {
      var py = TILE * 2 + pi * TILE * 5;
      var pipePulse = Math.sin(frameCount * 0.03 + pi * 2) * 0.1 + 0.15;
      ctx.fillStyle = '#224400';
      ctx.globalAlpha = pipePulse;
      ctx.fillRect(0, Math.floor(py), TILE * 2, Math.floor(TILE * 0.4));
      ctx.fillRect(W - TILE * 2, Math.floor(py), TILE * 2, Math.floor(TILE * 0.4));
      // Pipe highlight
      ctx.fillStyle = '#44aa00';
      ctx.globalAlpha = pipePulse * 0.5;
      ctx.fillRect(0, Math.floor(py), TILE * 2, 1);
      ctx.fillRect(W - TILE * 2, Math.floor(py), TILE * 2, 1);
    }
    // Toxic drips
    for (var td = 0; td < 4; td++) {
      var tdx = ((td * 191 + level * 47) % (COLS - 4)) * TILE + TILE * 2;
      var tdy = ((frameCount * 0.6 + td * 180) % (H - TILE * 2)) + TILE;
      ctx.fillStyle = '#44ff22';
      ctx.globalAlpha = 0.2;
      ctx.fillRect(Math.floor(tdx), Math.floor(tdy), 1, 4);
    }
    ctx.globalAlpha = 1;

  } else if (zone === 3) {
    // ZONE 4: Organic hive, amber walls, pulsing veins
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = '#221100';
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
    // Amber wall tint
    ctx.fillStyle = '#442200';
    ctx.globalAlpha = 0.08;
    ctx.fillRect(0, 0, TILE * 3, H);
    ctx.fillRect(W - TILE * 3, 0, TILE * 3, H);
    ctx.globalAlpha = 1;
    // Pulsing veins
    ctx.strokeStyle = '#884400';
    ctx.lineWidth = 2;
    for (var vi = 0; vi < 6; vi++) {
      var vx = (vi < 3) ? TILE * (1 + vi * 0.5) : W - TILE * (1 + (vi - 3) * 0.5);
      var vPulse = Math.sin(frameCount * 0.025 + vi * 1.7) * 0.15 + 0.2;
      ctx.globalAlpha = vPulse;
      ctx.beginPath();
      ctx.moveTo(Math.floor(vx), 0);
      for (var vy = 0; vy < ROWS; vy++) {
        var vWobble = Math.sin(vy * 0.8 + frameCount * 0.02 + vi) * TILE * 0.3;
        ctx.lineTo(Math.floor(vx + vWobble), vy * TILE);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else {
    // ZONE 5: Dark void, distant stars, Namaris ship silhouette
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);
    // Many stars
    for (var si = 0; si < 40; si++) {
      var sx = ((si * 173 + level * 37) % COLS) * TILE + TILE / 2;
      var sy = ((si * 97 + level * 19 + Math.floor(frameCount * 0.01)) % (ROWS - 2)) * TILE;
      var twinkle = Math.sin(frameCount * 0.02 + si * 1.7) * 0.3 + 0.5;
      ctx.globalAlpha = twinkle * 0.4;
      ctx.fillStyle = si % 5 === 0 ? '#aaccff' : '#ffffff';
      ctx.fillRect(Math.floor(sx), Math.floor(sy), si % 7 === 0 ? 2 : 1, 1);
    }
    // Namaris ship silhouette (large dark shape in background)
    ctx.fillStyle = '#0a0a18';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(Math.floor(W * 0.3), Math.floor(H * 0.15));
    ctx.lineTo(Math.floor(W * 0.7), Math.floor(H * 0.15));
    ctx.lineTo(Math.floor(W * 0.75), Math.floor(H * 0.25));
    ctx.lineTo(Math.floor(W * 0.6), Math.floor(H * 0.3));
    ctx.lineTo(Math.floor(W * 0.4), Math.floor(H * 0.3));
    ctx.lineTo(Math.floor(W * 0.25), Math.floor(H * 0.25));
    ctx.closePath();
    ctx.fill();
    // Ship window lights
    ctx.fillStyle = '#4488ff';
    ctx.globalAlpha = 0.2 + Math.sin(frameCount * 0.03) * 0.1;
    for (var wi = 0; wi < 5; wi++) {
      ctx.fillRect(Math.floor(W * 0.38 + wi * W * 0.05), Math.floor(H * 0.2), 3, 2);
    }
    ctx.globalAlpha = 1;
  }
}

function drawSporeRain() {
  if (sporeRainTimer <= 0 && sporeDrops.length === 0) return;
  // Warning tint
  if (sporeRainTimer > 0) {
    ctx.fillStyle = "rgba(80,40,120,0.08)";
    ctx.fillRect(0, 0, W, H);
  }
  ctx.fillStyle = "#aa66dd";
  ctx.strokeStyle = "#aa66dd";
  ctx.lineWidth = 1;
  for (var si = 0; si < sporeDrops.length; si++) {
    var sd = sporeDrops[si];
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(Math.floor(sd.x), Math.floor(sd.y), 3, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(Math.floor(sd.x), Math.floor(sd.y));
    ctx.lineTo(Math.floor(sd.x + Math.sin(frameCount * 0.05 + si) * 2), Math.floor(sd.y - 8));
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // HUD warning
  if (sporeRainTimer > 0) {
    ctx.fillStyle = "#ff69b4";
    ctx.font = Math.floor(TILE * 0.35) + "px monospace";
    ctx.textAlign = "center";
    ctx.fillText("SPORE STORM! " + Math.ceil(sporeRainTimer / 60) + "s", W / 2, TILE * 1.6);
  }
}

function drawZoneName() {
  if (zoneNameTimer <= 0) return;
  zoneNameTimer--;
  var alpha = zoneNameTimer > 90 ? (120 - zoneNameTimer) / 30 : (zoneNameTimer > 30 ? 1 : zoneNameTimer / 30);
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  // Zone name
  ctx.fillStyle = '#000';
  ctx.font = 'bold ' + Math.floor(TILE * 1) + 'px monospace';
  ctx.fillText(currentZoneName, W / 2 + 2, H * 0.45 + 2);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText(currentZoneName, W / 2, H * 0.45);
  // Sub-line
  ctx.fillStyle = '#888';
  ctx.font = Math.floor(TILE * 0.4) + 'px monospace';
  var zoneIdx = Math.floor((level - 1) / 5);
  ctx.fillText('Zone ' + (zoneIdx + 1) + ' of 5', W / 2, H * 0.45 + TILE * 1.2);
  ctx.globalAlpha = 1;
}

function showTutorialHint(key, text) {
  if (tutorialShown[key]) return;
  tutorialShown[key] = true;
  tutorialQueue.push({ text: text, timer: 180 });
}

function updateTutorialHints() {
  if (!firstPlay) return;
  for (var ti = tutorialQueue.length - 1; ti >= 0; ti--) {
    tutorialQueue[ti].timer--;
    if (tutorialQueue[ti].timer <= 0) tutorialQueue.splice(ti, 1);
  }
}

function drawTutorialHints() {
  if (tutorialQueue.length === 0) return;
  var hint = tutorialQueue[0];
  var alpha = hint.timer > 150 ? (180 - hint.timer) / 30 : (hint.timer > 30 ? 1 : hint.timer / 30);
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.font = 'bold ' + Math.floor(TILE * 0.45) + 'px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText(hint.text, W / 2 + 1, H * 0.2 + 1);
  ctx.fillStyle = '#ffff88';
  ctx.fillText(hint.text, W / 2, H * 0.2);
  ctx.globalAlpha = 1;
}

function drawTransition() {
  if (transitionTimer <= 0) return;
  transitionTimer--;
  var progress;
  if (transitionDir === 1) {
    // Closing: bars grow from top/bottom
    progress = 1 - (transitionTimer / 15);
  } else {
    // Opening: bars shrink
    progress = transitionTimer / 15;
  }
  progress = Math.max(0, Math.min(1, progress));
  var barH = Math.floor(H / 2 * progress);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, barH);
  ctx.fillRect(0, H - barH, W, barH);
}

function drawChargeIndicator() {
  if (chargeTimer <= 0 || (statB.damage < 1.5 && !(statB.str >= 10))) return;
  var pct = Math.min(1, chargeTimer / 60);
  var cx = player.x + player.w / 2;
  var cy = player.y - 8;
  // Background bar
  ctx.fillStyle = "#333";
  ctx.fillRect(Math.floor(cx - TILE * 0.5), Math.floor(cy - 2), Math.ceil(TILE), 4);
  // Fill
  ctx.fillStyle = chargeReady ? "#ff88ff" : "#aa44aa";
  ctx.fillRect(Math.floor(cx - TILE * 0.5), Math.floor(cy - 2), Math.ceil(TILE * pct), 4);
  if (chargeReady) {
    ctx.fillStyle = "#ff88ff";
    ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
    ctx.beginPath();
    ctx.arc(cx, player.y + player.h / 2, TILE * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const px = p.x * TILE, py = p.y * TILE;
    const pw = p.w * TILE, ph = p.h * TILE;

    // Main body
    ctx.fillStyle = C_PLATFORM;
    ctx.fillRect(px, py, pw, ph);

    // Bright top edge (2px)
    ctx.fillStyle = C_PLATFORM_TOP;
    ctx.fillRect(px, py, pw, 2);

    // Dark bottom/face edge
    ctx.fillStyle = C_PLATFORM_FACE;
    ctx.fillRect(px, py + ph - 2, pw, 2);

    // Left/right edges
    ctx.fillStyle = C_WALL;
    ctx.fillRect(px, py, 2, ph);
    ctx.fillRect(px + pw - 2, py, 2, ph);

    // Brick-line pattern (vertical lines every TILE)
    ctx.fillStyle = C_BRICK_LINE;
    for (let bx = px + TILE; bx < px + pw - 1; bx += TILE) {
      ctx.fillRect(bx, py + 2, 1, ph - 4);
    }
    // Horizontal mid-line
    if (ph > 6) {
      ctx.fillRect(px + 2, py + Math.floor(ph / 2), pw - 4, 1);
    }

    // Garden vine spots
    ctx.fillStyle = '#38d973';
    for (let mx = px; mx < px + pw; mx += TILE) {
      if ((mx / TILE + p.y) % 3 === 0) {
        ctx.fillRect(mx + 4, py + 2, 3, 1);
      }
    }
  }
}

function drawGooTiles() {
  for (var gi = 0; gi < gooTiles.length; gi++) {
    var gt = gooTiles[gi];
    var gAlpha = gt.life / 420;
    var wobble = Math.sin(frameCount * 0.08 + gi * 1.7) * 1.5;
    ctx.save();
    ctx.translate(Math.floor(gt.x + wobble), Math.floor(gt.y));
    ctx.globalAlpha = gAlpha;
    // Dark green puddle
    ctx.fillStyle = '#113300';
    ctx.beginPath();
    ctx.ellipse(0, 0, TILE * 0.35, TILE * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Lighter green highlight
    ctx.fillStyle = '#33aa00';
    ctx.beginPath();
    ctx.ellipse(-2, -1, TILE * 0.15, TILE * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawBaseling() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2) return;

  const px = player.x;
  const py = player.y;
  const w = player.w;
  const h = player.h;
  const cx = px + w / 2;
  const cy = py + h / 2;

  // Squash/stretch for jump + landing
  let scaleX = 1, scaleY = 1;
  if (landSquash > 0) {
    var lsF = landSquash / 6;
    scaleX = 1 + lsF * 0.2;
    scaleY = 1 - lsF * 0.15;
  } else if (!player.onGround) {
    if (player.vy < -2) { scaleX = 0.85; scaleY = 1.15; }  // rising = stretch
    else if (player.vy > 2) { scaleX = 1.15; scaleY = 0.85; } // falling = squash
  }

  const walkBounce = Math.sin(player.animFrame * Math.PI) * 2;

  ctx.save();
  ctx.translate(cx, cy + walkBounce);
  ctx.scale(scaleX, scaleY);

  // === BASELING SPRITE === the player's selected baseling (procedural body is fallback).
  var _anim = player.invincible > 0 ? 'hurt' : (!player.onGround ? 'jump' : (Math.abs(player.vx) > 0.5 ? 'walk' : 'idle'));
  if (drawSelectedBaseling(ctx, 0, 0, Math.max(w, h) + 2, { anim: _anim, frame: frameCount, flipX: player.dir < 0 })) {
    ctx.restore();
    return;
  }

  const bodyR = w * 0.55;

  // Dark outline (NES-style 1px outline around body)
  ctx.fillStyle = playerColorDark;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.05, bodyR + 1.5, bodyR * 0.9 + 1.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = playerColor;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.05, bodyR, bodyR * 0.9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly highlight
  ctx.fillStyle = playerColorLight;
  ctx.beginPath();
  ctx.ellipse(0, h * 0.12, bodyR * 0.55, bodyR * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body highlight dot (NES specular)
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.4;
  ctx.fillRect(Math.floor(-bodyR * 0.35), Math.floor(-bodyR * 0.3), 3, 3);
  ctx.globalAlpha = 1;

  // Eyes - follow movement direction
  const eyeLookX = player.dir * 3;
  const eyeLookY = player.vy > 3 ? 1 : (player.vy < -3 ? -1 : 0);

  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-w * 0.15 + eyeLookX * 0.3, -h * 0.1, w * 0.14, w * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.15 + eyeLookX * 0.3, -h * 0.1, w * 0.14, w * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (track direction + vertical movement)
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-w * 0.12 + eyeLookX, -h * 0.1 + eyeLookY, w * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w * 0.18 + eyeLookX, -h * 0.1 + eyeLookY, w * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Pupil shine dots
  ctx.fillStyle = '#fff';
  ctx.fillRect(Math.floor(-w * 0.14 + eyeLookX), Math.floor(-h * 0.14 + eyeLookY), 2, 2);
  ctx.fillRect(Math.floor(w * 0.16 + eyeLookX), Math.floor(-h * 0.14 + eyeLookY), 2, 2);

  // NES-style cheek dots (not gradients)
  ctx.fillStyle = '#ff8899';
  ctx.fillRect(Math.floor(-w * 0.28), Math.floor(h * 0.01), 3, 2);
  ctx.fillRect(Math.floor(w * 0.22), Math.floor(h * 0.01), 3, 2);

  // Smile
  ctx.strokeStyle = playerColorDark;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, h * 0.05, w * 0.1, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  // Feet with walk animation
  const footBounce = Math.sin(player.animFrame * Math.PI * 0.5) * 3;
  ctx.fillStyle = playerColorDark;
  ctx.beginPath();
  ctx.ellipse(-w * 0.2, h * 0.37 + footBounce, w * 0.14, w * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.2, h * 0.37 - footBounce, w * 0.14, w * 0.07, 0, 0, Math.PI * 2);
  ctx.fill();

  // Sprout antenna
  ctx.strokeStyle = playerColorDark;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.35);
  const sproutSway = Math.sin(frameCount * 0.06) * 2;
  ctx.quadraticCurveTo(3 + sproutSway, -h * 0.5, -2 + sproutSway, -h * 0.55);
  ctx.stroke();
  ctx.fillStyle = playerColorLight;
  ctx.beginPath();
  ctx.arc(-2 + sproutSway, -h * 0.55, 3, 0, Math.PI * 2);
  ctx.fill();

  // Shoot pose: puff cheeks
  if (player.shootAnim > 0) {
    ctx.fillStyle = playerColor;
    ctx.beginPath();
    ctx.arc(player.dir * w * 0.35, h * 0.02, w * 0.1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed boost aura
  if (speedBoost > 0) {
    ctx.strokeStyle = 'rgba(255, 200, 0, 0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, bodyR + 4 + Math.sin(frameCount * 0.15) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (e.dead) return;
  const cx = e.x + e.w / 2;
  const cy = e.y + e.h / 2;
  const wobble = e.trapped ? Math.sin(frameCount * 0.15) * 3 : 0;

  ctx.save();
  ctx.translate(cx + wobble, cy);

  // Squash/stretch for slime
  if (e.type === 'slime' && !e.trapped) {
    const squash = 1 + Math.sin(e.animFrame * Math.PI * 0.5) * 0.15;
    ctx.scale(squash, 1 / squash);
  }

  if (e.type === 'spore') {
    const r = e.w * 0.45;
    // Dark outline
    ctx.fillStyle = '#220000';
    ctx.beginPath();
    ctx.ellipse(0, -e.h * 0.15, r + 1, r * 0.7 + 1, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Cap
    ctx.fillStyle = e.trapped ? '#886644' : '#cc4444';
    ctx.beginPath();
    ctx.ellipse(0, -e.h * 0.15, r, r * 0.7, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Spots
    ctx.fillStyle = e.trapped ? '#aa8866' : '#ff8888';
    ctx.fillRect(Math.floor(-r * 0.4), Math.floor(-e.h * 0.28), 3, 3);
    ctx.fillRect(Math.floor(r * 0.15), Math.floor(-e.h * 0.33), 2, 2);
    // Stem
    ctx.fillStyle = e.trapped ? '#998877' : '#ffddbb';
    ctx.fillRect(Math.floor(-e.w * 0.15), Math.floor(-e.h * 0.15), Math.ceil(e.w * 0.3), Math.ceil(e.h * 0.4));
    // Eyes
    if (e.trapped) {
      // Dizzy spiral eyes
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      for (let side = -1; side <= 1; side += 2) {
        ctx.beginPath();
        const ex = side * e.w * 0.1;
        const ey = e.h * 0.0;
        for (let a = 0; a < 4; a++) {
          const ang = frameCount * 0.08 + a * 1.5;
          const sr = e.w * 0.02 + a * e.w * 0.02;
          ctx.lineTo(ex + Math.cos(ang) * sr, ey + Math.sin(ang) * sr);
        }
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-e.w * 0.1, e.h * 0.0, e.w * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.1, e.h * 0.0, e.w * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Angry pupils
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(-e.w * 0.1, e.h * 0.0, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.1, e.h * 0.0, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      // Angry eyebrow lines
      ctx.strokeStyle = '#880000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-e.w * 0.2, -e.h * 0.08);
      ctx.lineTo(-e.w * 0.03, -e.h * 0.04);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.w * 0.2, -e.h * 0.08);
      ctx.lineTo(e.w * 0.03, -e.h * 0.04);
      ctx.stroke();
    }
    // Feet with walk bob
    ctx.fillStyle = e.trapped ? '#776655' : '#dd8866';
    const ff = Math.sin(e.animFrame * Math.PI) * 2;
    ctx.beginPath();
    ctx.ellipse(-e.w * 0.15, e.h * 0.3 + ff, e.w * 0.1, e.w * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(e.w * 0.15, e.h * 0.3 - ff, e.w * 0.1, e.w * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

  } else if (e.type === 'slime') {
    // Dark outline
    ctx.fillStyle = '#002200';
    ctx.beginPath();
    ctx.ellipse(0, e.h * 0.1, e.w * 0.47, e.h * 0.37, 0, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = e.trapped ? '#556644' : '#44cc66';
    ctx.beginPath();
    ctx.ellipse(0, e.h * 0.1, e.w * 0.45, e.h * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = e.trapped ? '#778866' : '#88ff99';
    ctx.fillRect(Math.floor(-e.w * 0.15), Math.floor(-e.h * 0.08), 4, 3);
    // Eyes
    if (e.trapped) {
      // X eyes when trapped
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      for (let side = -1; side <= 1; side += 2) {
        const ex = side * e.w * 0.12;
        ctx.beginPath();
        ctx.moveTo(ex - 3, -3); ctx.lineTo(ex + 3, 3);
        ctx.moveTo(ex + 3, -3); ctx.lineTo(ex - 3, 3);
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-e.w * 0.12, -e.h * 0.0, e.w * 0.09, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.12, -e.h * 0.0, e.w * 0.09, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#880088';
      ctx.beginPath();
      ctx.arc(-e.w * 0.12, -e.h * 0.0, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.12, -e.h * 0.0, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      // Angry V brows
      ctx.strokeStyle = '#440044';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-e.w * 0.22, -e.h * 0.1);
      ctx.lineTo(-e.w * 0.05, -e.h * 0.06);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.w * 0.22, -e.h * 0.1);
      ctx.lineTo(e.w * 0.05, -e.h * 0.06);
      ctx.stroke();
    }
    // Drip
    ctx.fillStyle = e.trapped ? '#556644' : '#44cc66';
    ctx.beginPath();
    ctx.moveTo(e.w * 0.2, e.h * 0.3);
    ctx.quadraticCurveTo(e.w * 0.22, e.h * 0.45, e.w * 0.18, e.h * 0.45);
    ctx.quadraticCurveTo(e.w * 0.15, e.h * 0.3, e.w * 0.2, e.h * 0.3);
    ctx.fill();

  } else if (e.type === 'shroom') {
    const r = e.w * 0.5;
    // Menacing sway
    const sway = e.trapped ? 0 : Math.sin(frameCount * 0.04 + e.x) * 0.05;
    ctx.rotate(sway);
    // Dark outline
    ctx.fillStyle = '#110011';
    ctx.beginPath();
    ctx.arc(0, -e.h * 0.1, r + 1, Math.PI, 0);
    ctx.fill();
    // Cap
    ctx.fillStyle = e.trapped ? '#554433' : '#9922cc';
    ctx.beginPath();
    ctx.arc(0, -e.h * 0.1, r, Math.PI, 0);
    ctx.fill();
    // Cap spots (pixel squares)
    ctx.fillStyle = e.trapped ? '#776655' : '#cc44ff';
    for (let sp = 0; sp < 5; sp++) {
      const angle = Math.PI + (sp / 5) * Math.PI;
      const spx = Math.cos(angle) * r * 0.7;
      const spy = -e.h * 0.1 + Math.sin(angle) * r * 0.7;
      ctx.fillRect(Math.floor(spx - 2), Math.floor(spy - 2), 4, 4);
    }
    // Stem
    ctx.fillStyle = e.trapped ? '#887766' : '#eeddcc';
    ctx.fillRect(Math.floor(-e.w * 0.2), Math.floor(-e.h * 0.1), Math.ceil(e.w * 0.4), Math.ceil(e.h * 0.45));
    // Evil eyes
    if (e.trapped) {
      // Spiral dizzy
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1;
      for (let side = -1; side <= 1; side += 2) {
        ctx.beginPath();
        const ex = side * e.w * 0.1;
        for (let a = 0; a < 5; a++) {
          const ang = frameCount * 0.1 + a * 1.3;
          const sr = e.w * 0.02 + a * e.w * 0.02;
          ctx.lineTo(ex + Math.cos(ang) * sr, e.h * 0.05 + Math.sin(ang) * sr);
        }
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(-e.w * 0.1, e.h * 0.05, e.w * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.1, e.h * 0.05, e.w * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#440000';
      ctx.beginPath();
      ctx.arc(-e.w * 0.1, e.h * 0.05, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.w * 0.1, e.h * 0.05, e.w * 0.05, 0, Math.PI * 2);
      ctx.fill();
      // Menacing brows
      ctx.strokeStyle = '#440000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-e.w * 0.22, -e.h * 0.02);
      ctx.lineTo(-e.w * 0.02, e.h * 0.02);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.w * 0.22, -e.h * 0.02);
      ctx.lineTo(e.w * 0.02, e.h * 0.02);
      ctx.stroke();
    }
    // Mouth
    ctx.strokeStyle = e.trapped ? '#444' : '#ff4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, e.h * 0.15, e.w * 0.12, 0, Math.PI);
    ctx.stroke();

  } else if (e.type === 'reactor') {
    // NES-style reactor bug sprite
    var bugW = e.w * 0.45, bugH = e.h * 0.35;
    // Pulsing glow
    ctx.globalAlpha = 0.15 + Math.sin(frameCount * 0.06) * 0.05;
    ctx.fillStyle = e.trapped ? '#333' : '#44cc00';
    ctx.beginPath();
    ctx.ellipse(0, 0, bugW + 4, bugH + 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Body outline
    ctx.fillStyle = e.trapped ? '#222211' : '#113300';
    ctx.beginPath();
    ctx.ellipse(0, 0, bugW + 1.5, bugH + 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Body
    ctx.fillStyle = e.trapped ? '#555544' : '#44cc00';
    ctx.beginPath();
    ctx.ellipse(0, 0, bugW, bugH, 0, 0, Math.PI * 2);
    ctx.fill();
    // Antennae
    ctx.strokeStyle = e.trapped ? '#444' : '#226600';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-bugW * 0.3, -bugH * 0.8);
    ctx.lineTo(-bugW * 0.5, -bugH * 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bugW * 0.3, -bugH * 0.8);
    ctx.lineTo(bugW * 0.5, -bugH * 1.5);
    ctx.stroke();
    // Antenna tips
    ctx.fillStyle = e.trapped ? '#666' : '#88ff22';
    ctx.beginPath();
    ctx.arc(-bugW * 0.5, -bugH * 1.5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bugW * 0.5, -bugH * 1.5, 2, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    if (e.trapped) {
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      for (var side = -1; side <= 1; side += 2) {
        ctx.beginPath();
        var bex = side * bugW * 0.35;
        for (var ba = 0; ba < 5; ba++) {
          var bang = frameCount * 0.1 + ba * 1.3;
          var bsr = 1.5 + ba * 1.5;
          ctx.lineTo(bex + Math.cos(bang) * bsr, -bugH * 0.2 + Math.sin(bang) * bsr);
        }
        ctx.stroke();
      }
    } else {
      // Red compound eyes
      ctx.fillStyle = '#ff2200';
      ctx.beginPath();
      ctx.arc(-bugW * 0.35, -bugH * 0.2, bugW * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bugW * 0.35, -bugH * 0.2, bugW * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8866';
      ctx.fillRect(Math.floor(-bugW * 0.4), Math.floor(-bugH * 0.35), 2, 2);
      ctx.fillRect(Math.floor(bugW * 0.3), Math.floor(-bugH * 0.35), 2, 2);
    }
    // Legs (3 per side, animated)
    ctx.strokeStyle = e.trapped ? '#444' : '#226600';
    ctx.lineWidth = 1.5;
    for (var leg = 0; leg < 3; leg++) {
      var legY = -bugH * 0.3 + leg * bugH * 0.35;
      var legAnim = Math.sin(frameCount * 0.12 + leg * 2) * 3;
      // Left leg
      ctx.beginPath();
      ctx.moveTo(-bugW * 0.8, legY);
      ctx.lineTo(-bugW * 1.2 - legAnim, legY + bugH * 0.3);
      ctx.stroke();
      // Right leg
      ctx.beginPath();
      ctx.moveTo(bugW * 0.8, legY);
      ctx.lineTo(bugW * 1.2 + legAnim, legY + bugH * 0.3);
      ctx.stroke();
    }
    // Mandibles
    ctx.strokeStyle = e.trapped ? '#555' : '#88ff22';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-bugW * 0.2, bugH * 0.7);
    ctx.lineTo(-bugW * 0.4, bugH * 1.1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bugW * 0.2, bugH * 0.7);
    ctx.lineTo(bugW * 0.4, bugH * 1.1);
    ctx.stroke();
  }

  ctx.restore();
}

function drawBubbles() {
  for (const b of bubbles) {
    ctx.save();
    ctx.translate(b.x, b.y);

    const pulse = 1 + Math.sin(frameCount * 0.08 + b.age * 0.1) * 0.04;
    const r = b.radius * pulse;

    // Charged bubble glow
    if (b.charged) {
      ctx.strokeStyle = '#ff88ff';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.4 + Math.sin(frameCount * 0.12) * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, r + 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = '#ffccff';
      ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
      var sparkA = frameCount * 0.05;
      ctx.fillRect(Math.floor(Math.cos(sparkA) * r * 0.5) - 1, Math.floor(Math.sin(sparkA) * r * 0.5) - 1, 3, 3);
      ctx.fillRect(Math.floor(Math.cos(sparkA + Math.PI) * r * 0.5) - 1, Math.floor(Math.sin(sparkA + Math.PI) * r * 0.5) - 1, 3, 3);
    }

    // Outer ring
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner fill
    ctx.fillStyle = b.color;
    ctx.globalAlpha = 0.12;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    // Primary highlight (top-left)
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.55;
    ctx.fillRect(Math.floor(-r * 0.35), Math.floor(-r * 0.35), 3, 3);

    // Secondary highlight (smaller, offset)
    ctx.globalAlpha = 0.3;
    ctx.fillRect(Math.floor(-r * 0.1), Math.floor(-r * 0.5), 2, 2);

    // Rainbow shimmer on surface (rotating highlight arc)
    ctx.globalAlpha = 0.2;
    const shimmerAngle = frameCount * 0.03 + b.age * 0.05;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.85, shimmerAngle, shimmerAngle + 0.8);
    ctx.stroke();

    // Lightning effect
    if (b.lightning) {
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.6 + Math.sin(frameCount * 0.2) * 0.3;
      ctx.beginPath();
      ctx.moveTo(-r * 0.5, 0);
      ctx.lineTo(-r * 0.2, -r * 0.3);
      ctx.lineTo(0, r * 0.1);
      ctx.lineTo(r * 0.3, -r * 0.2);
      ctx.lineTo(r * 0.5, 0);
      ctx.stroke();
    }

    // Trapped enemy wobble indicator (pulsing ring when about to escape)
    if (b.trapped && b.trapped.trapTimer > BUBBLE_TRAP_TIME * 0.7) {
      const urgency = (b.trapped.trapTimer - BUBBLE_TRAP_TIME * 0.7) / (BUBBLE_TRAP_TIME * 0.3);
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 1;
      ctx.globalAlpha = urgency * (Math.sin(frameCount * 0.3) * 0.4 + 0.5);
      ctx.beginPath();
      ctx.arc(0, 0, r + 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawItems() {
  for (const item of items) {
    if (item.collected) continue;
    const ix = item.x;
    const iy = item.y;
    const s = TILE * 0.4;
    const fade = item.life < 60 ? item.life / 60 : 1;
    // Item bob
    const bob = Math.sin(frameCount * 0.06 + item.x * 0.1) * 1.5;
    ctx.globalAlpha = fade;

    ctx.save();
    ctx.translate(ix, iy + bob);

    // Dark outline backing for readability
    ctx.fillStyle = '#000';
    ctx.globalAlpha = fade * 0.35;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = fade;

    if (item.type === "sporeCake" || item.type === "burger") {
      ctx.fillStyle = '#cc8833';
      ctx.beginPath();
      ctx.arc(0, -s * 0.2, s * 0.7, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#663311';
      ctx.fillRect(-s * 0.65, -s * 0.1, s * 1.3, s * 0.3);
      ctx.fillStyle = '#44aa33';
      ctx.fillRect(-s * 0.6, s * 0.05, s * 1.2, s * 0.15);
      ctx.fillStyle = '#cc8833';
      ctx.fillRect(-s * 0.6, s * 0.15, s * 1.2, s * 0.25);
    } else if (item.type === "fungalStew" || item.type === "rice") {
      ctx.fillStyle = '#dd6633';
      ctx.beginPath();
      ctx.arc(0, s * 0.1, s * 0.6, 0, Math.PI);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, s * 0.5, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#eeeedd';
      ctx.fillRect(-s * 0.2, -s * 0.2, 2, 3);
      ctx.fillRect(s * 0.1, -s * 0.15, 2, 3);
    } else if (item.type === "reactorJuice" || item.type === "berry") {
      ctx.fillStyle = '#aa22aa';
      ctx.beginPath();
      ctx.arc(-s * 0.15, 0, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.15, 0, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, -s * 0.2, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Highlight dots
      ctx.fillStyle = '#dd66dd';
      ctx.fillRect(Math.floor(-s * 0.2), Math.floor(-s * 0.05), 2, 2);
      ctx.fillRect(Math.floor(s * 0.1), Math.floor(-s * 0.25), 2, 2);
      ctx.fillStyle = '#33aa33';
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.45, s * 0.2, s * 0.1, 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (item.type === "lpNectar" || item.type === "cake") {
      ctx.fillStyle = '#ffccaa';
      ctx.fillRect(-s * 0.5, -s * 0.1, s * 1, s * 0.5);
      ctx.fillStyle = '#ff88cc';
      ctx.fillRect(-s * 0.5, -s * 0.2, s * 1, s * 0.15);
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(0, -s * 0.35, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      // Candle
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(-1, Math.floor(-s * 0.5), 2, Math.ceil(s * 0.15));
    } else if (item.type === "mycoTruffle" || item.type === "fish") {
      ctx.fillStyle = '#4488cc';
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.6, s * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-s * 0.5, 0);
      ctx.lineTo(-s * 0.8, -s * 0.3);
      ctx.lineTo(-s * 0.8, s * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s * 0.2, -s * 0.05, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.fillRect(Math.floor(s * 0.2), Math.floor(-s * 0.08), 2, 2);
    } else if (item.type === 'sporeCake' || item.type === 'spore_fruit') {
      // Green spore with spots
      ctx.fillStyle = '#33aa44';
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88ff66';
      ctx.fillRect(Math.floor(-s * 0.2), Math.floor(-s * 0.2), 3, 3);
      ctx.fillRect(Math.floor(s * 0.1), Math.floor(s * 0.05), 2, 2);
      // Stem
      ctx.fillStyle = '#226622';
      ctx.fillRect(-1, Math.floor(-s * 0.55), 2, Math.ceil(s * 0.2));
    } else if (item.type === 'fungalStew' || item.type === 'goo_jelly') {
      // Bowl of green goo
      ctx.fillStyle = '#886644';
      ctx.beginPath();
      ctx.arc(0, s * 0.1, s * 0.55, 0, Math.PI);
      ctx.fill();
      ctx.fillStyle = '#44cc22';
      ctx.beginPath();
      ctx.ellipse(0, s * 0.0, s * 0.45, s * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88ff44';
      ctx.fillRect(Math.floor(-s * 0.1), Math.floor(-s * 0.08), 3, 2);
    } else if (item.type === 'reactorJuice' || item.type === 'reactor_candy') {
      // Glowing candy/vial
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(Math.floor(-s * 0.2), Math.floor(-s * 0.4), Math.ceil(s * 0.4), Math.ceil(s * 0.7));
      ctx.fillStyle = '#ffaa44';
      ctx.fillRect(Math.floor(-s * 0.15), Math.floor(-s * 0.35), Math.ceil(s * 0.3), Math.ceil(s * 0.15));
      // Cap
      ctx.fillStyle = '#cc4400';
      ctx.fillRect(Math.floor(-s * 0.25), Math.floor(-s * 0.45), Math.ceil(s * 0.5), Math.ceil(s * 0.1));
      // Glow dot
      ctx.fillStyle = '#ffff88';
      ctx.fillRect(Math.floor(-s * 0.05), Math.floor(-s * 0.15), 2, 2);
    } else if (item.type === 'lpNectar') {
      // Golden nectar drop
      ctx.fillStyle = '#ddaa00';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.5);
      ctx.quadraticCurveTo(s * 0.5, 0, 0, s * 0.45);
      ctx.quadraticCurveTo(-s * 0.5, 0, 0, -s * 0.5);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(Math.floor(-s * 0.1), Math.floor(-s * 0.15), 2, 3);
    } else if (item.type === 'mycoTruffle' || item.type === 'myco_cap') {
      // Mushroom cap
      ctx.fillStyle = '#7744aa';
      ctx.beginPath();
      ctx.arc(0, -s * 0.15, s * 0.55, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#aa66dd';
      ctx.fillRect(Math.floor(-s * 0.15), Math.floor(-s * 0.3), 3, 3);
      ctx.fillRect(Math.floor(s * 0.1), Math.floor(-s * 0.25), 2, 2);
      // Stem
      ctx.fillStyle = '#ddccbb';
      ctx.fillRect(Math.floor(-s * 0.15), Math.floor(-s * 0.1), Math.ceil(s * 0.3), Math.ceil(s * 0.35));
    }

    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

function drawPowerups() {
  for (const pu of powerups) {
    if (pu.collected) continue;
    const bob = Math.sin(pu.bobPhase) * 4;
    const px = pu.x;
    const py = pu.y + bob;
    const s = TILE * 0.4;
    const pulse = 0.9 + Math.sin(frameCount * 0.05) * 0.1;

    ctx.save();
    ctx.translate(px, py);
    ctx.scale(pulse, pulse);

    // Glow
    ctx.fillStyle = pu.type === 'speed' ? 'rgba(255,200,0,0.2)' :
                    pu.type === 'rapid' ? 'rgba(255,100,100,0.2)' : 'rgba(100,100,255,0.2)';
    ctx.beginPath();
    ctx.arc(0, 0, s * 1.5, 0, Math.PI * 2);
    ctx.fill();

    if (pu.type === 'speed') {
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.ellipse(0, s * 0.1, s * 0.6, s * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(-s * 0.1, -s * 0.3, s * 0.4, s * 0.4);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(s * 0.3, -s * 0.1);
      ctx.lineTo(s * 0.7, -s * 0.4);
      ctx.lineTo(s * 0.5, s * 0.1);
      ctx.closePath();
      ctx.fill();
    } else if (pu.type === 'rapid') {
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-s * 0.3, 0, s * 0.25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, -s * 0.2, s * 0.25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(s * 0.3, 0, s * 0.25, 0, Math.PI * 2);
      ctx.stroke();
    } else if (pu.type === 'lightning') {
      ctx.fillStyle = '#4444ff';
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, -s * 0.6);
      ctx.lineTo(s * 0.2, -s * 0.1);
      ctx.lineTo(-s * 0.05, -s * 0.1);
      ctx.lineTo(s * 0.1, s * 0.6);
      ctx.lineTo(-s * 0.2, s * 0.1);
      ctx.lineTo(s * 0.05, s * 0.1);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }
}

function drawHUD() {
  // HUD background
  ctx.fillStyle = 'rgba(10, 5, 20, 0.8)';
  ctx.fillRect(0, 0, W, TILE * 1.2);
  // Separator line
  ctx.fillStyle = '#8b5cf6';
  ctx.fillRect(0, Math.floor(TILE * 1.2) - 1, W, 1);

  ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px monospace';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, TILE * 0.3, TILE * 0.7);

  // Level
  ctx.fillStyle = '#a855f7';
  ctx.textAlign = 'center';
  ctx.fillText('FLOOR ' + level, W / 2, TILE * 0.7);

  // Lives as mini baseling icons
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    const lx = W - TILE * 0.5 - i * TILE * 0.9;
    const ly = TILE * 0.55;
    const lr = TILE * 0.22;
    // Body
    ctx.fillStyle = playerColorDark;
    ctx.beginPath();
    ctx.arc(lx, ly, lr + 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = playerColor;
    ctx.beginPath();
    ctx.arc(lx, ly, lr, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(lx - 3, ly - 2, 2, 2);
    ctx.fillRect(lx + 2, ly - 2, 2, 2);
    // Pupils
    ctx.fillStyle = '#111';
    ctx.fillRect(lx - 2, ly - 1, 1, 1);
    ctx.fillRect(lx + 3, ly - 1, 1, 1);
  }

  // Power-up indicators
  let puY = TILE * 1.0;
  ctx.font = Math.floor(TILE * 0.35) + 'px monospace';
  ctx.textAlign = 'left';
  if (rapidFire > 0) {
    ctx.fillStyle = '#ff6666';
    ctx.fillText('SPORE BURST ' + Math.ceil(rapidFire / 60) + 's', TILE * 0.3, puY);
    puY += TILE * 0.4;
  }
  if (speedBoost > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('GARDEN DASH ' + Math.ceil(speedBoost / 60) + 's', TILE * 0.3, puY);
    puY += TILE * 0.4;
  }
  if (lightningBubble > 0) {
    ctx.fillStyle = '#ff69b4';
    ctx.fillText('RAINBOW SPORE ' + Math.ceil(lightningBubble / 60) + 's', TILE * 0.3, puY);
  }
}
