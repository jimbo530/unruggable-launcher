// ============================================================
// CANVAS SETUP

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, TILE, SCALE;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / (COLS * BASE_TILE), sh / (ROWS * BASE_TILE));
  TILE = Math.floor(BASE_TILE * SCALE);
  W = COLS * TILE;
  H = ROWS * TILE;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, Math.floor((sh - H) / 2)) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  shoot() { playTone(600, 0.1, 'sine', 0.08, 300); playTone(800, 0.08, 'triangle', 0.05, 400); },
  trap() { playTone(500, 0.15, 'square', 0.06, 800); playTone(300, 0.1, 'sine', 0.04, 600); },
  pop() { playTone(1000, 0.12, 'sine', 0.1, 200); playNoise(0.08, 0.06); },
  jump() { playTone(250, 0.12, 'square', 0.06, 500); },
  die() { playTone(400, 0.4, 'sawtooth', 0.1, 60); setTimeout(function() { playTone(200, 0.3, 'square', 0.08, 40); }, 200); },
  powerup() { playTone(440, 0.08, 'square', 0.08); setTimeout(function() { playTone(660, 0.08, 'square', 0.08); }, 80); setTimeout(function() { playTone(880, 0.12, 'square', 0.1); }, 160); },
  levelComplete() {
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(n, i) { setTimeout(function() { playTone(n, 0.15, 'square', 0.08); }, i * 120); });
  },
  collect() { playTone(880, 0.08, 'sine', 0.08, 1200); },
  gameOver() {
    var notes = [440, 349, 293, 220];
    notes.forEach(function(n, i) { setTimeout(function() { playTone(n, 0.25, 'sawtooth', 0.1); }, i * 200); });
  },
  dash() { playTone(800, 0.06, 'square', 0.07, 1200); playNoise(0.04, 0.04); },
  chargeShoot() { playTone(300, 0.2, 'sawtooth', 0.1, 900); playTone(600, 0.15, 'square', 0.08, 1200); },
  sporeHit() { playTone(200, 0.15, 'sawtooth', 0.06, 100); },
  gooSplat() { playNoise(0.08, 0.04); playTone(150, 0.1, 'sine', 0.04, 80); },
  bossHit() { playTone(200, 0.08, 'square', 0.1, 100); playNoise(0.06, 0.05); },
  bossRoar() { playTone(80, 0.5, 'sawtooth', 0.12, 40); playNoise(0.2, 0.06); },
  bossDie() {
    for (var bi = 0; bi < 6; bi++) {
      setTimeout(function() { playTone(600 + bi * 100, 0.15, 'square', 0.1, 100); playNoise(0.1, 0.08); }, bi * 100);
    }
  }
};

// ============================================================
// SCREEN EFFECTS
// ============================================================
let shakeX = 0, shakeY = 0, shakeMag = 0, shakeDur = 0;
let flashAlpha = 0;

function triggerShake(mag, dur) {
  shakeMag = mag;
  shakeDur = dur;
}

function triggerFlash(a) {
  flashAlpha = a || 0.5;
}

function updateScreenEffects() {
  if (shakeDur > 0) {
    shakeDur--;
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.9;
  } else {
    shakeX = 0;
    shakeY = 0;
  }
  if (flashAlpha > 0) flashAlpha -= 0.04;
}

function drawFlash() {
  if (flashAlpha > 0) {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = Math.max(0, flashAlpha);
    ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// PARTICLES
// ============================================================
let particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.5 + Math.random());
    particles.push({ x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, color: color, size: 2 + Math.random() * 3 });
  }
}

function spawnRing(x, y, color, radius) {
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    particles.push({
      x: x + Math.cos(angle) * radius * 0.3,
      y: y + Math.sin(angle) * radius * 0.3,
      vx: Math.cos(angle) * 3.5,
      vy: Math.sin(angle) * 3.5,
      life: 0.5,
      color: color,
      size: 2
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    const s = Math.max(1, Math.ceil(p.size));
    ctx.fillRect(Math.floor(p.x - s / 2), Math.floor(p.y - s / 2), s, s);
  }
  ctx.globalAlpha = 1;
}

// Float text (score popups)
let floatTexts = [];
function spawnFloatText(x, y, text, color) {
  floatTexts.push({ x: x, y: y, text: text, color: color || '#fff', life: 1 });
}
function updateFloatTexts() {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    floatTexts[i].y -= 0.8;
    floatTexts[i].life -= 0.018;
    if (floatTexts[i].life <= 0) floatTexts.splice(i, 1);
  }
}
function drawFloatTexts() {
  ctx.font = 'bold ' + Math.floor(TILE * 0.4) + 'px monospace';
  ctx.textAlign = 'center';
  for (const ft of floatTexts) {
    ctx.globalAlpha = ft.life;
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, ft.x + 1, ft.y + 1);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME STATE
// ============================================================

let level = 1;
let score = 0;

let lives = 3;

let frameCount = 0;

let platforms = [];
let player = {};

let items = [];

let keys = {};
let inputLeft = false, inputRight = false, inputJump = false, inputShoot = false;
let shootCooldown = 0;

// Power-up states
let rapidFire = 0;
let speedBoost = 0;
let lightningBubble = 0;

// NFT stat bonuses (loaded once at game start)
// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Bespoke engine (no TAS): talk to BaselingPlayer directly. getMults() -> {moveSpeed,
// health,damage,luck,swim}, clamped to the single-player band (0.8–1.6). statB is read live
// throughout (speed/damage/luck/cooldown/hpMult/lives + str/dex unlock thresholds); we map
// the five bounded multipliers onto those fields. Not a wager game -> default band.
// recomputeStats() re-runs after a title-screen character pick.
var statB = {damage:1,speed:1,lives:0,hpMult:1,scoreMult:1,cooldown:1,luck:1,level:0,str:10,dex:10};
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed;        // SPD -> move/jump/dash speed
  statB.damage = m.damage;          // PWR -> bubble pop radius / charged shot
  statB.luck = m.luck;              // LCK -> item & bonus drop odds
  statB.cooldown = 1 / m.moveSpeed; // SPD -> faster shoot cadence (lower cooldown)
  statB.hpMult = m.health;          // STA -> survivability (bonus-life chance)
  statB.lives = m.health > 1.3 ? 1 : 0; // STA buys a cushion life
  statB.scoreMult = 1;              // score is not a stat in the new system
  statB.str = dnd(m.damage);        // STR unlock threshold -> from PWR
  statB.dex = dnd(m.moveSpeed);     // DEX unlock threshold -> from SPD
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[bubble-baseling] player init failed:', e && e.message); });
}
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}
