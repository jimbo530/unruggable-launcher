<title>MfT Arcade - Seasonal Gauntlet</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
canvas#game {
  display: block;
  width: 100vw;
  height: 100vh;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 160px;
  pointer-events: none;
  z-index: 50;
}
.dpad {
  position: absolute;
  left: 20px;
  bottom: 20px;
  width: 130px;
  height: 130px;
  pointer-events: auto;
}
.dpad-btn {
  position: absolute;
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
.dpad-btn:active { background: rgba(255,255,255,0.3); }
.dpad-up { left: 43px; top: 0; }
.dpad-down { left: 43px; bottom: 0; }
.dpad-left { left: 0; top: 43px; }
.dpad-right { right: 0; top: 43px; }
.action-btns {
  position: absolute;
  right: 20px;
  bottom: 30px;
  pointer-events: auto;
}
.action-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 900;
  color: rgba(255,255,255,0.5);
  margin-left: 12px;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { background: rgba(255,255,255,0.3); }
.btn-b { color: rgba(255,100,100,0.6); border-color: rgba(255,100,100,0.3); }
.btn-a { color: rgba(100,255,100,0.6); border-color: rgba(100,255,100,0.3); }
@media (pointer: coarse) {
  #touch-controls { display: block; }
}
</style>

function resizeCanvas() {
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var aspect = GW / GH;
  var w, h;
  if (vw / vh > aspect) {
    h = vh; w = h * aspect;
  } else {
    w = vw; h = w / aspect;
  }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = GW;
  canvas.height = GH;
  ctx.imageSmoothingEnabled = false;
}

function getDamage() { return Math.max(1, Math.floor(statB.damage + (statB.str - 10) * 0.3)); }  // ref #1

function getMoveSpeed() { return 1.8 + statB.speed * 0.15 + (statB.dex - 10) * 0.06; }  // ref #2

// [CON] — max HP
function getMaxHP() { return Math.max(3, Math.floor(5 * statB.hpMult + (statB.con - 10) * 0.5)); }  // ref #3

// [DEX] — dodge chance (0-30%)
function getDodgeChance() { return Math.min(0.3, (statB.dex - 10) * 0.015); }  // ref #4

function getXPMult() { return 1 + (statB.int - 10) * 0.04; }  // ref #6

function getScoreMult() { return statB.scoreMult + (statB.cha - 10) * 0.025; }  // ref #8

function getAttackCooldown() { return Math.max(8, Math.floor(ATTACK_COOLDOWN_BASE * statB.cooldown - (statB.dex - 10) * 0.8)); }  // ref #9

// [CON] — invulnerability duration after hit
function getInvulnTime() { return Math.floor(INVULN_TIME + (statB.con - 10) * 2); }  // ref #10

// [STR] — critical hit chance (0-25%)
function getCritChance() { return Math.min(0.25, 0.05 + (statB.str - 10) * 0.01); }  // ref #11

// [INT] — special attack charge rate
function getSpecialRate() { return 1 + (statB.int - 10) * 0.05; }  // ref #12

// [WIS] — heal amount from pickups
function getHealAmount() { return Math.max(1, Math.floor(1 + (statB.wis - 10) * 0.15)); }  // ref #13

// [CHA] — shop discount (future use in pickup value)
function getPickupValue() { return Math.max(1, Math.floor(10 + (statB.cha - 10) * 0.5)); }  // ref #14

function getDefense() { return Math.max(0, Math.floor((statB.con - 10) * 0.2)); }  // ref #15

var keys = { left: false, right: false, up: false, down: false, a: false, b: false, start: false, select: false };
var keysJustPressed = {};

var KEY_MAP = {
  'ArrowLeft': 'left', 'ArrowRight': 'right', 'ArrowUp': 'up', 'ArrowDown': 'down',
  'a': 'left', 'd': 'right', 'w': 'up', 's': 'down',
  'z': 'b', 'x': 'a', 'j': 'b', 'k': 'a',
  ' ': 'a', 'Enter': 'start', 'Shift': 'select',
  'Escape': 'start'
};

document.addEventListener('keydown', function(e) {
  var k = KEY_MAP[e.key];
  if (k) {
    if (!keys[k]) keysJustPressed[k] = true;
    keys[k] = true;
    e.preventDefault();
  }
});
document.addEventListener('keyup', function(e) {
  var k = KEY_MAP[e.key];
  if (k) { keys[k] = false; e.preventDefault(); }
});

// Touch controls
(function() {
  var touchDirs = {};
  var touchActions = {};

  function handleTouchStart(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      var el = document.elementFromPoint(t.clientX, t.clientY);
      if (!el) continue;
      if (el.dataset.dir) {
        touchDirs[t.identifier] = el.dataset.dir;
        keys[el.dataset.dir] = true;
        keysJustPressed[el.dataset.dir] = true;
      }
      if (el.dataset.action) {
        touchActions[t.identifier] = el.dataset.action;
        keys[el.dataset.action] = true;
        keysJustPressed[el.dataset.action] = true;
      }
    }
  }

  function handleTouchEnd(e) {
    e.preventDefault();
    for (var i = 0; i < e.changedTouches.length; i++) {
      var t = e.changedTouches[i];
      if (touchDirs[t.identifier]) {
        keys[touchDirs[t.identifier]] = false;
        delete touchDirs[t.identifier];
      }
      if (touchActions[t.identifier]) {
        keys[touchActions[t.identifier]] = false;
        delete touchActions[t.identifier];
      }
    }
  }

  var tc = document.getElementById('touch-controls');
  tc.addEventListener('touchstart', handleTouchStart, { passive: false });
  tc.addEventListener('touchend', handleTouchEnd, { passive: false });
  tc.addEventListener('touchcancel', handleTouchEnd, { passive: false });
})();

// =====================================================================
// AUDIO — Simple beep synth
// =====================================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { /* no audio */ }
  }
}

function beep(freq, dur, vol, type) {
  ensureAudio();
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (dur || 0.1));
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + (dur || 0.1));
  } catch(e) { /* audio failed silently */ }
}

var spriteCache = {};

function drawPixelSprite(data, x, y, scale, flipX) {
  var rows = data.length;
  var cols = data[0].length;
  var s = scale || 1;
  ctx.save();
  if (flipX) {
    ctx.translate(x + cols * s, y);
    ctx.scale(-1, 1);
    x = 0; y = 0;
  }
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      var color = data[r][c];
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x + c * s, y + r * s, s, s);
      }
    }
  }
  ctx.restore();
}

// =====================================================================
// LEVEL GENERATION
// =====================================================================
var levelSeed = 1;

function pseudoRandom() {
  levelSeed = (levelSeed * 16807 + 0) % 2147483647;
  return (levelSeed & 0x7fffffff) / 2147483647;
}

function generatePlatforms() {
  platforms = [];
  // Ground is always there (implicit at y=GH-TILE)
  // Generate floating platforms
  var numPlats = 6 + Math.floor(pseudoRandom() * 4);
  for (var i = 0; i < numPlats; i++) {
    var pw = 3 + Math.floor(pseudoRandom() * 4);
    platforms.push({
      x: 40 + pseudoRandom() * (GW - 80),
      y: 60 + pseudoRandom() * (GH - 100),
      w: pw * TILE,
      h: TILE,
      moving: pseudoRandom() < 0.2,
      moveRange: 30 + pseudoRandom() * 30,
      moveSpeed: 0.3 + pseudoRandom() * 0.3,
      origX: 0, origY: 0, phase: pseudoRandom() * Math.PI * 2
    });
    platforms[platforms.length - 1].origX = platforms[platforms.length - 1].x;
    platforms[platforms.length - 1].origY = platforms[platforms.length - 1].y;
  }
}

function spawnEnemies() {
  var zone = ZONES[game.zone];
  var numEnemies = 3 + Math.floor(game.zone * 1.5) + Math.floor(pseudoRandom() * 3);
  for (var i = 0; i < numEnemies; i++) {
    var enemyType = zone.enemies[Math.floor(pseudoRandom() * zone.enemies.length)];
    var def = ENEMY_DEFS[enemyType];
    if (!def) continue;
    var ex = 60 + pseudoRandom() * (GW - 120);
    var ey = def.behavior === 'fly_sine' ? (40 + pseudoRandom() * (GH - 120)) : (GH - TILE - def.h);
    enemies.push({
      type: enemyType,
      x: ex, y: ey,
      vx: (pseudoRandom() < 0.5 ? -1 : 1) * def.speed,
      vy: 0,
      w: def.w, h: def.h,
      hp: def.hp + Math.floor(game.zone * 0.5),
      maxHP: def.hp + Math.floor(game.zone * 0.5),
      damage: def.damage,
      score: def.score,
      xp: def.xp,
      behavior: def.behavior,
      sprite: def.sprite,
      color: def.color,
      facing: pseudoRandom() < 0.5 ? -1 : 1,
      animFrame: 0,
      animTimer: 0,
      flashTimer: 0,
      sinePhase: pseudoRandom() * Math.PI * 2,
      sineAmp: 20 + pseudoRandom() * 20,
      origY: ey,
      attackTimer: 60 + Math.floor(pseudoRandom() * 60),
      isBoss: false
    });
  }
}

function addParticle(x, y, color, count, spread, life, size) {

    particles.push({

    });

}

    color: color || '#ffffff',
    life: duration || 60,
    maxLife: duration || 60,
    vy: -0.8
  });
}

function screenShake(amount) {

}

// =====================================================================
// COLLISION HELPERS
// =====================================================================
function boxOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function pointInBox(px, py, b) {
  return px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h;
}

// =====================================================================
// PLAYER UPDATE
// =====================================================================
function updatePlayer() {
  var spd = getMoveSpeed();  // DEX ref
  var jumpForce = JUMP_FORCE - (statB.dex - 10) * 0.05;  // DEX slight jump bonus

  // Horizontal movement
  if (player.dashTimer <= 0) {
    player.vx = 0;
    if (keys.left) { player.vx = -spd; player.facing = -1; }
    if (keys.right) { player.vx = spd; player.facing = 1; }
  } else {
    player.vx = player.dashDir * DASH_SPEED;
    player.dashTimer--;
    if (player.dashTimer % 2 === 0) {
      addParticle(player.x + player.w / 2, player.y + player.h / 2, BC(), 1, 0.5, 10, 2);
    }
  }

  // Gravity
  if (!player.grounded) {
    player.vy += GRAVITY;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }

  // Jump (A button)
  if (keysJustPressed.a && player.grounded && player.dashTimer <= 0) {
    player.vy = jumpForce;
    player.grounded = false;
    sfxJump();
  }

  // Attack (B button)
  if (keysJustPressed.b && player.attackCooldown <= 0 && player.dashTimer <= 0) {
    player.attackTimer = ATTACK_DURATION;
    player.attackCooldown = getAttackCooldown();  // DEX ref
    sfxAttack();
  }

  // Dash (down + B)
  if (keysJustPressed.b && keys.down && player.dashCooldown <= 0) {
    player.dashTimer = DASH_DURATION;
    player.dashCooldown = DASH_COOLDOWN;
    player.dashDir = player.facing;
    sfxDash();
  }

  // Apply velocity
  player.x += player.vx;
  player.y += player.vy;

  // Platform collision
  player.grounded = false;

  // Ground
  if (player.y + player.h >= GH - TILE) {
    player.y = GH - TILE - player.h;
    player.vy = 0;
    player.grounded = true;
  }

  // Platforms
  for (var pi = 0; pi < platforms.length; pi++) {
    var plat = platforms[pi];
    if (player.vy >= 0 &&
        player.x + player.w > plat.x && player.x < plat.x + plat.w &&
        player.y + player.h >= plat.y && player.y + player.h <= plat.y + plat.h + 4) {
      player.y = plat.y - player.h;
      player.vy = 0;
      player.grounded = true;
    }
  }

  // Screen bounds
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > GW) player.x = GW - player.w;
  if (player.y < 0) { player.y = 0; player.vy = 0; }

  // Cooldowns
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (player.attackTimer > 0) player.attackTimer--;
  if (player.invuln > 0) player.invuln--;
  if (player.dashCooldown > 0) player.dashCooldown--;
  if (player.comboTimer > 0) { player.comboTimer--; } else { player.combo = 0; }

  // Animation
  player.animTimer++;
  if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 2; }

  // Attack hitbox check
  if (player.attackTimer > 0) {
    var atkBox = {
      x: player.facing > 0 ? player.x + player.w : player.x - 16,
      y: player.y + 2,
      w: 16,
      h: player.h - 4
    };

    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var en = enemies[ei];
      if (boxOverlap(atkBox, en) && en.flashTimer <= 0) {
        var dmg = getDamage();  // STR ref
        var isCrit = Math.random() < getCritChance();  // STR crit ref
        if (isCrit) {
          dmg = Math.floor(dmg * 2.5);
          sfxCrit();
          addPopup(en.x + en.w / 2, en.y - 8, 'CRIT! ' + dmg, '#ff4444', 45);
          screenShake(6);
          addParticle(en.x + en.w / 2, en.y + en.h / 2, '#ff4444', 8, 3, 20, 3);
        } else {
          addPopup(en.x + en.w / 2, en.y - 4, '-' + dmg, '#ffffff', 30);
          screenShake(3);
        }
        en.hp -= dmg;
        en.flashTimer = 8;
        player.totalDamageDealt += dmg;
        player.combo++;
        player.comboTimer = 90;

        // Knockback (STR ref)
        var kb = getKnockback();
        en.x += player.facing * kb;

        addParticle(en.x + en.w / 2, en.y + en.h / 2, en.color, 4, 2, 15, 2);

        if (en.hp <= 0) {
          killEnemy(ei);
        }
      }
    }
  }

  // Special charge
  player.special = Math.min(player.maxSpecial, player.special + 0.005 * getSpecialRate());  // INT ref
}

function killEnemy(idx) {
  var en = enemies[idx];
  var baseScore = en.score;
  var comboMult = 1 + player.combo * 0.1;
  var finalScore = Math.floor(baseScore * getScoreMult() * comboMult);  // CHA ref

  game.score += finalScore;
  player.kills++;

  // XP gain
  var xpGain = Math.floor(en.xp * getXPMult());  // INT ref
  player.xp += xpGain;
  checkLevelUp();

  addPopup(en.x + en.w / 2, en.y - 10, '+' + finalScore, '#ffd700', 40);
  if (player.combo > 2) {
    addPopup(en.x + en.w / 2, en.y - 24, player.combo + 'x COMBO!', '#ff8844', 50);
  }
  addParticle(en.x + en.w / 2, en.y + en.h / 2, en.color, 12, 3, 25, 2);
  screenShake(en.isBoss ? 12 : 4);
  sfxHit();

  // Item drop chance (WIS ref)
  if (Math.random() < 0.3 * getItemLuck()) {
    var zone = ZONES[game.zone];
    var dropType = zone.items[Math.floor(Math.random() * zone.items.length)];
    var def = ITEM_DEFS[dropType];
    if (def) {
      items.push({
        type: dropType,
        x: en.x + en.w / 2 - 4, y: en.y,
        w: def.w, h: def.h,
        color: def.color,
        score: def.score,
        itemType: def.type,
        sprite: def.sprite,
        bobPhase: Math.random() * Math.PI * 2,
        collected: false
      });
    }
  }

  if (en.isBoss) {
    game.state = STATE_ZONE_CLEAR;
    game.flashTimer = 20;
    game.flashColor = '#ffd700';
    addPopup(GW / 2, GH / 2 - 20, 'ZONE CLEAR!', '#ffd700', 120);
    addParticle(en.x + en.w / 2, en.y + en.h / 2, '#ffd700', 30, 5, 40, 3);
  }

  enemies.splice(idx, 1);
}

function checkLevelUp() {
  while (player.xp >= player.xpToNext) {
    player.xp -= player.xpToNext;
    player.playerLevel++;
    player.xpToNext = Math.floor(player.xpToNext * 1.5);
    player.hp = Math.min(player.hp + 2, player.maxHP);
    sfxLevelUp();
    addPopup(player.x + player.w / 2, player.y - 20, 'LEVEL UP! Lv.' + player.playerLevel, '#44ff44', 80);
    addParticle(player.x + player.w / 2, player.y + player.h / 2, '#44ff44', 15, 3, 30, 2);
    screenShake(5);
  }
}

function damagePlayer(amount) {
  if (player.invuln > 0) return;
  if (player.dashTimer > 0) return;  // i-frames during dash

  // Dodge check (DEX ref)
  if (Math.random() < getDodgeChance()) {
    addPopup(player.x + player.w / 2, player.y - 8, 'DODGE!', '#44ddff', 40);
    return;
  }

  // Defense reduction (CON ref)
  var def = getDefense();
  var finalDmg = Math.max(1, amount - def);

  // Hazard resistance (WIS ref) — handled at call site

  player.hp -= finalDmg;
  player.invuln = getInvulnTime();  // CON ref
  sfxHit();
  screenShake(6);
  addParticle(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 8, 3, 20, 2);
  addPopup(player.x + player.w / 2, player.y - 8, '-' + finalDmg, '#ff4444', 30);
  game.flashTimer = 5;
  game.flashColor = '#ff0000';

  if (player.hp <= 0) {
    player.hp = 0;
    game.state = STATE_DEAD;
    game.deathTimer = 120;
    sfxDeath();
    addParticle(player.x + player.w / 2, player.y + player.h / 2, BC(), 25, 4, 40, 3);
    screenShake(15);
  }
}

// =====================================================================
// ENEMY UPDATE
// =====================================================================
function updateEnemies() {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var en = enemies[i];

    // Animation
    en.animTimer++;
    if (en.animTimer > 10) { en.animTimer = 0; en.animFrame = (en.animFrame + 1) % 2; }
    if (en.flashTimer > 0) en.flashTimer--;

    // Behavior
    switch (en.behavior) {
      case 'patrol':
        en.x += en.vx;
        if (en.x <= 4 || en.x + en.w >= GW - 4) {
          en.vx = -en.vx;
          en.facing = en.vx > 0 ? 1 : -1;
        }
        // Ground check for non-flying
        if (en.y + en.h < GH - TILE) {
          en.vy = (en.vy || 0) + GRAVITY;
          en.y += en.vy;
          if (en.y + en.h >= GH - TILE) { en.y = GH - TILE - en.h; en.vy = 0; }
        }
        break;

      case 'fly_sine':
        en.sinePhase += 0.04;
        en.x += en.vx;
        en.y = en.origY + Math.sin(en.sinePhase) * en.sineAmp;
        if (en.x <= 4 || en.x + en.w >= GW - 4) {
          en.vx = -en.vx;
          en.facing = en.vx > 0 ? 1 : -1;
        }
        break;

      case 'chase':
        var dx = player.x - en.x;
        var dy = player.y - en.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          var spd = Math.abs(en.vx) || 1;
          en.x += (dx / dist) * spd;
          if (en.y + en.h < GH - TILE) {
            en.vy = (en.vy || 0) + GRAVITY * 0.5;
            en.y += en.vy;
            if (en.y + en.h >= GH - TILE) { en.y = GH - TILE - en.h; en.vy = 0; }
          }
          en.facing = dx > 0 ? 1 : -1;
        }
        break;

      case 'turret':
        en.attackTimer--;
        if (en.attackTimer <= 0) {
          en.attackTimer = 90 - game.zone * 5;
          // Shoot projectile at player
          var pdx = player.x - en.x;
          var pdy = player.y - en.y;
          var pDist = Math.sqrt(pdx * pdx + pdy * pdy);
          if (pDist > 0) {
            projectiles.push({
              x: en.x + en.w / 2 - 2, y: en.y + 4,
              vx: (pdx / pDist) * 2,
              vy: (pdy / pDist) * 2,
              w: 4, h: 4,
              damage: en.damage,
              color: en.color,
              life: 180,
              fromEnemy: true
            });
          }
        }
        break;
    }

    // Boss phase check
    if (en.isBoss && en.phases) {
      var hpPct = en.hp / en.maxHP;
      for (var pi = en.phases.length - 1; pi >= 0; pi--) {
        if (hpPct <= en.phases[pi].hpThreshold && en.phaseIndex < pi) {
          en.phaseIndex = pi;
          en.behavior = en.phases[pi].pattern;
          var newSpeed = en.phases[pi].speed;
          en.vx = en.facing * newSpeed;
          addPopup(en.x + en.w / 2, en.y - 16, 'ENRAGED!', '#ff0000', 60);
          screenShake(8);
          addParticle(en.x + en.w / 2, en.y + en.h / 2, '#ff4444', 15, 4, 25, 3);
        }
      }

      // Boss projectile attack
      en.attackTimer--;
      if (en.attackTimer <= 0) {
        en.attackTimer = en.attackInterval || 60;
        var angle = Math.atan2(player.y - en.y, player.x - en.x);
        for (var bi = -1; bi <= 1; bi++) {
          var a = angle + bi * 0.3;
          projectiles.push({
            x: en.x + en.w / 2 - 2, y: en.y + en.h / 2 - 2,
            vx: Math.cos(a) * 2.5,
            vy: Math.sin(a) * 2.5,
            w: 4, h: 4,
            damage: en.damage,
            color: en.color,
            life: 200,
            fromEnemy: true
          });
        }
      }
    }

    // Collision with player
    if (player.invuln <= 0 && player.dashTimer <= 0 && boxOverlap(player, en)) {
      damagePlayer(en.damage);
    }

    // Off screen cleanup for non-boss
    if (!en.isBoss && (en.y > GH + 50 || en.y < -100)) {
      enemies.splice(i, 1);
    }
  }
}

// =====================================================================
// PROJECTILE UPDATE
// =====================================================================
function updateProjectiles() {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    if (p.life <= 0 || p.x < -10 || p.x > GW + 10 || p.y < -10 || p.y > GH + 10) {
      projectiles.splice(i, 1);
      continue;
    }

    if (p.fromEnemy && boxOverlap(p, player)) {
      // Hazard resist doesn't apply to direct projectiles
      damagePlayer(p.damage);
      projectiles.splice(i, 1);
      continue;
    }
  }
}

// =====================================================================
// ITEM UPDATE
// =====================================================================
function updateItems() {
  for (var i = items.length - 1; i >= 0; i--) {
    var item = items[i];
    item.bobPhase += 0.05;

    if (boxOverlap(player, item) && !item.collected) {
      item.collected = true;
      sfxPickup();

      switch (item.itemType) {
        case 'score':
          var pts = Math.floor(item.score * getScoreMult());  // CHA ref for pickups
          var pVal = getPickupValue();  // CHA ref #14
          pts = Math.floor(pts * (pVal / 10));
          game.score += pts;
          addPopup(item.x, item.y - 8, '+' + pts, item.color, 30);
          break;
        case 'heal':
          var heal = getHealAmount();  // WIS ref
          player.hp = Math.min(player.maxHP, player.hp + heal);
          addPopup(item.x, item.y - 8, '+' + heal + ' HP', '#ff88aa', 30);
          addParticle(player.x + player.w / 2, player.y + player.h / 2, '#ff88aa', 6, 2, 15, 2);
          break;
        case 'special':
          player.special = Math.min(player.maxSpecial, player.special + 2);
          addPopup(item.x, item.y - 8, '+SP', '#44ff44', 30);
          break;
      }

      addParticle(item.x + item.w / 2, item.y + item.h / 2, item.color, 6, 2, 15, 2);
      items.splice(i, 1);
    }
  }
}

// =====================================================================
// HAZARD UPDATE
// =====================================================================
function updateHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    h.timer++;

    // Pulsing hazard — active every 3 seconds for 1 second
    var cycle = h.timer % 180;
    h.active = cycle < 60;

    if (h.active && boxOverlap(player, h)) {
      // WIS hazard resistance
      if (Math.random() >= getHazardResist()) {  // WIS ref #17
        damagePlayer(1);
      } else {
        addPopup(player.x + player.w / 2, player.y - 8, 'RESIST!', '#44ddff', 30);
      }
    }

    // Spawn warning particles when about to activate
    if (cycle > 150 && cycle % 5 === 0) {
      addParticle(h.x + h.w / 2, h.y - 2, '#ff4444', 1, 1, 10, 1);
    }
  }
}

// =====================================================================
// PARTICLE + POPUP UPDATE
// =====================================================================
function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (var j = popups.length - 1; j >= 0; j--) {
    var pp = popups[j];
    pp.y += pp.vy;
    pp.life--;
    if (pp.life <= 0) popups.splice(j, 1);
  }
}

// =====================================================================
// PLATFORM UPDATE
// =====================================================================
function updatePlatforms() {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.moving) {
      p.phase += p.moveSpeed * 0.03;
      p.x = p.origX + Math.sin(p.phase) * p.moveRange;
    }
  }
}

// =====================================================================
// ZONE PROGRESS
// =====================================================================
function updateZoneProgress() {
  if (game.state !== STATE_PLAYING && game.state !== STATE_BOSS) return;

  // Track kills vs spawns
  if (game.state === STATE_PLAYING) {
    // If all enemies dead and not boss yet, advance or spawn more
    if (enemies.length === 0 && !game.bossTriggered) {
      game.zoneProgress++;
      if (game.zoneProgress >= 3) {
        // Boss time
        game.bossTriggered = true;
        // Clear stage
        items = [];
        hazards = [];
        projectiles = [];
        generatePlatforms();
        spawnBoss();
      } else {
        // Next wave
        generatePlatforms();
        spawnEnemies();
        spawnItems();
        spawnHazards();
        addPopup(GW / 2, 30, 'WAVE ' + (game.zoneProgress + 1), '#ffd700', 60);
      }
    }
  }
}

// =====================================================================
// SCREEN SHAKE UPDATE
// =====================================================================
function updateScreenShake() {
  if (game.screenShake > 0) {
    game.screenShakeX = (Math.random() - 0.5) * game.screenShake;
    game.screenShakeY = (Math.random() - 0.5) * game.screenShake;
    game.screenShake *= 0.85;
    if (game.screenShake < 0.5) game.screenShake = 0;
  } else {
    game.screenShakeX = 0;
    game.screenShakeY = 0;
  }
  if (game.flashTimer > 0) game.flashTimer--;
}

// =====================================================================
// DRAWING
// =====================================================================
function drawBackground() {
  var zone = ZONES[game.zone];

  // Sky gradient
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, zone.bg1);
  grad.addColorStop(0.5, zone.bg2);
  grad.addColorStop(1, zone.bg3);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Background stars/particles
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    s.x -= s.speed;
    if (s.x < 0) { s.x = GW; s.y = Math.random() * GH; }
    ctx.globalAlpha = s.alpha + Math.sin(game.frame * 0.03 + i) * 0.15;
    ctx.fillStyle = zone.particles[i % zone.particles.length];
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.size), Math.ceil(s.size));
  }
  ctx.globalAlpha = 1;

  // Ground
  ctx.fillStyle = zone.ground;
  ctx.fillRect(0, GH - TILE, GW, TILE);
  ctx.fillStyle = zone.groundTop;
  ctx.fillRect(0, GH - TILE, GW, 2);

  // Ground detail
  for (var gx = 0; gx < GW; gx += 8) {
    var gSeed = (gx * 31 + game.zone * 7) % 255;
    if (gSeed % 5 === 0) {
      ctx.fillStyle = zone.groundTop;
      ctx.fillRect(gx, GH - TILE - 2, 2, 2);
    }
  }
}

function drawPlatforms() {
  var zone = ZONES[game.zone];
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    ctx.fillStyle = zone.platform;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, p.h);
    ctx.fillStyle = zone.platformTop;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, 2);
    // Edge highlights
    ctx.fillStyle = zone.platformTop;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 1, p.h);
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var alpha = h.active ? 0.8 : 0.2 + Math.sin(h.timer * 0.1) * 0.1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = h.active ? '#ff4444' : '#882222';
    ctx.fillRect(Math.floor(h.x), Math.floor(h.y), h.w, h.h);
    // Glow
    if (h.active) {
      ctx.fillStyle = 'rgba(255,68,68,0.3)';
      ctx.fillRect(Math.floor(h.x) - 2, Math.floor(h.y) - 4, h.w + 4, h.h + 8);
    }
    ctx.globalAlpha = 1;
  }
}

function drawPlayer() {
  if (player.invuln > 0 && Math.floor(player.invuln / 3) % 2 === 0) return;  // blink

  var sprite = getBaselingSprite(player.animFrame);
  var px = Math.floor(player.x);
  var py = Math.floor(player.y);

  // Dash trail
  if (player.dashTimer > 0) {
    ctx.globalAlpha = 0.3;
    drawPixelSprite(sprite, px - player.dashDir * 6, py, 1, player.facing < 0);
    ctx.globalAlpha = 1;
  }

  drawPixelSprite(sprite, px, py, 1, player.facing < 0);

  // Attack slash
  if (player.attackTimer > 0) {
    var sx = player.facing > 0 ? px + player.w : px - 8;
    var sy = py + 2;
    ctx.globalAlpha = player.attackTimer / ATTACK_DURATION;
    drawPixelSprite(getSlashSprite(), sx, sy, 1, player.facing < 0);
    ctx.globalAlpha = 1;
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    var ex = Math.floor(en.x);
    var ey = Math.floor(en.y);

    if (en.flashTimer > 0 && en.flashTimer % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }

    if (en.isBoss) {
      // Draw boss as colored rect with face (no custom sprite defined for brevity)
      ctx.fillStyle = en.color;
      ctx.fillRect(ex, ey, en.w, en.h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex + 6, ey + 6, 4, 4);
      ctx.fillRect(ex + en.w - 10, ey + 6, 4, 4);
      ctx.fillStyle = '#000000';
      ctx.fillRect(ex + 7, ey + 7, 2, 2);
      ctx.fillRect(ex + en.w - 9, ey + 7, 2, 2);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex + 8, ey + 16, en.w - 16, 3);

      // Boss HP bar
      ctx.fillStyle = '#333333';
      ctx.fillRect(ex, ey - 6, en.w, 3);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex, ey - 6, Math.floor(en.w * (en.hp / en.maxHP)), 3);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex, ey - 6, Math.floor(en.w * (en.hp / en.maxHP)), 1);
    } else if (en.sprite) {
      var sprite = en.sprite(en.animFrame);
      drawPixelSprite(sprite, ex, ey, 1, en.facing < 0);
    } else {
      ctx.fillStyle = en.color;
      ctx.fillRect(ex, ey, en.w, en.h);
    }

    ctx.globalAlpha = 1;

    // Enemy HP bar (non-boss, if damaged)
    if (!en.isBoss && en.hp < en.maxHP) {
      ctx.fillStyle = '#333333';
      ctx.fillRect(ex, ey - 4, en.w, 2);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex, ey - 4, Math.floor(en.w * (en.hp / en.maxHP)), 2);
    }
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var bob = Math.sin(item.bobPhase) * 2;
    var ix = Math.floor(item.x);
    var iy = Math.floor(item.y + bob);

    if (item.sprite) {
      drawPixelSprite(item.sprite(), ix, iy, 1, false);
    } else {
      ctx.fillStyle = item.color;
      ctx.fillRect(ix, iy, item.w, item.h);
    }
  }
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    drawPixelSprite(getProjectileSprite(p.color), Math.floor(p.x), Math.floor(p.y), 1, false);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

function drawPopups() {
  ctx.textAlign = 'center';
  for (var i = 0; i < popups.length; i++) {
    var pp = popups[i];
    var alpha = Math.min(1, pp.life / 15);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 7px monospace';
    ctx.fillText(pp.text, Math.floor(pp.x) + 1, Math.floor(pp.y) + 1);
    ctx.fillStyle = pp.color;
    ctx.fillText(pp.text, Math.floor(pp.x), Math.floor(pp.y));
  }
  ctx.globalAlpha = 1;
}

// HUD
// =====================================================================
function drawHUD() {
  ctx.textAlign = 'left';
  ctx.font = 'bold 7px monospace';

  // HP Bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(4, 4, 50, 5);
  ctx.fillStyle = player.hp > player.maxHP * 0.3 ? '#44dd88' : '#ff4444';
  ctx.fillRect(4, 4, Math.floor(50 * (player.hp / player.maxHP)), 5);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(4, 4, Math.floor(50 * (player.hp / player.maxHP)), 1);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('HP', 4, 17);

  // Special bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(4, 20, 50, 3);
  ctx.fillStyle = '#b366ff';
  ctx.fillRect(4, 20, Math.floor(50 * (player.special / player.maxSpecial)), 3);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('SP', 4, 31);

  // XP bar
  ctx.fillStyle = '#333333';
  ctx.fillRect(4, 33, 50, 2);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(4, 33, Math.floor(50 * (player.xp / player.xpToNext)), 2);

  // Level
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Lv.' + player.playerLevel, 4, 43);

  // Score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('SCORE ' + game.score, GW - 4, 11);

  // Hi Score
  ctx.fillStyle = '#888888';
  ctx.fillText('HI ' + Math.max(game.hiScore, game.score), GW - 4, 21);

  // Zone name
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '6px monospace';
  ctx.fillText(ZONES[game.zone].name, GW / 2, 10);

  // Wave indicator
  if (game.state === STATE_PLAYING) {
    ctx.fillStyle = '#666666';
    ctx.fillText('WAVE ' + (game.zoneProgress + 1) + '/3', GW / 2, 19);
  }

  // Combo display
  if (player.combo > 1) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 8px monospace';
    ctx.fillText(player.combo + 'x', 60, 11);
  }

  // Boss HP bar (bottom of screen)
  if (game.state === STATE_BOSS) {
    for (var i = 0; i < enemies.length; i++) {
      if (enemies[i].isBoss) {
        var boss = enemies[i];
        ctx.fillStyle = '#222222';
        ctx.fillRect(20, GH - 24, GW - 40, 6);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(20, GH - 24, Math.floor((GW - 40) * (boss.hp / boss.maxHP)), 6);
        ctx.fillStyle = '#ff8888';
        ctx.fillRect(20, GH - 24, Math.floor((GW - 40) * (boss.hp / boss.maxHP)), 2);
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 7px monospace';
        ctx.fillText(boss.bossName, GW / 2, GH - 14);
        break;
      }
    }
  }

  // Stat icons (bottom left)
  ctx.textAlign = 'left';
  ctx.font = '5px monospace';
  ctx.fillStyle = '#555555';
  var statY = GH - 10;
  ctx.fillText('S' + statB.str + ' D' + statB.dex + ' C' + statB.con + ' I' + statB.int + ' W' + statB.wis + ' Ch' + statB.cha, 4, statY);
}

          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 8px monospace';
          ctx.fillText('PRESS START', GW / 2, 175);
        }
      }
    }
  }

  // Celebration particles
  if (game.victoryCelebration % 3 === 0) {
    addParticle(Math.random() * GW, Math.random() * GH * 0.5, '#ffd700', 2, 2, 20, 2);
  }
}

// =====================================================================
// VICTORY SCREEN
// =====================================================================
function drawVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('VICTORY!', GW / 2, 50);

  ctx.fillStyle = '#b366ff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('The Gauntlet is Complete', GW / 2, 70);

  ctx.fillStyle = '#ffffff';
  ctx.font = '8px monospace';
  ctx.fillText('Final Score: ' + game.score, GW / 2, 100);
  ctx.fillStyle = '#44dd88';
  ctx.fillText('Baseling: ' + statB.name, GW / 2, 115);
  ctx.fillStyle = '#888888';
  ctx.fillText('Level: ' + player.playerLevel, GW / 2, 130);
  ctx.fillText('Enemies Defeated: ' + player.kills, GW / 2, 142);
  ctx.fillText('Damage Dealt: ' + player.totalDamageDealt, GW / 2, 154);

  if (game.score > game.hiScore) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 175);
  }

  if (Math.floor(game.frame / 25) % 2 === 0) {
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px monospace';
    ctx.fillText('PRESS START TO PLAY AGAIN', GW / 2, 200);
  }

  // Celebration
  if (game.frame % 5 === 0) {
    addParticle(Math.random() * GW, GH, ['#ffd700', '#b366ff', '#44dd88'][Math.floor(Math.random() * 3)], 3, 2, 40, 2);
  }
}

// =====================================================================
// PAUSE SCREEN
// =====================================================================
function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PAUSED', GW / 2, GH / 2 - 10);
  ctx.font = '7px monospace';
  ctx.fillStyle = '#888888';
  ctx.fillText('Press ESC or ENTER to resume', GW / 2, GH / 2 + 10);
}

// =====================================================================
// GAME RESET
// =====================================================================
function startNewGame() {
  game.state = STATE_PLAYING;
  game.score = 0;
  game.zone = 0;
  game.zoneProgress = 0;
  game.bossTriggered = false;
  game.flashTimer = 0;
  game.transition = 0;
  game.deathTimer = 0;
  game.victoryCelebration = 0;

  player.x = 40; player.y = 160;
  player.vx = 0; player.vy = 0;
  player.hp = getMaxHP();
  player.maxHP = getMaxHP();
  player.special = 0;
  player.maxSpecial = getMaxSpecial();
  player.xp = 0; player.xpToNext = 50; player.playerLevel = 1;
  player.facing = 1;
  player.grounded = false;
  player.invuln = 0;
  player.attackTimer = 0;
  player.attackCooldown = 0;
  player.dashTimer = 0;
  player.dashCooldown = 0;
  player.combo = 0;
  player.comboTimer = 0;
  player.kills = 0;
  player.totalDamageDealt = 0;

  enemies = [];
  items = [];
  projectiles = [];
  particles = [];
  popups = [];
  hazards = [];

  levelSeed = Date.now() % 2147483647;
  generatePlatforms();
  spawnEnemies();
  spawnItems();
  spawnHazards();

  addPopup(GW / 2, 50, ZONES[0].name, '#ffd700', 90);
  addPopup(GW / 2, 65, 'WAVE 1', '#ffffff', 60);
}

function nextZone() {
  game.zone++;
  game.zoneProgress = 0;
  game.bossTriggered = false;
  game.state = STATE_PLAYING;
  game.victoryCelebration = 0;

  player.x = 40; player.y = 160;
  player.vx = 0; player.vy = 0;
  player.hp = Math.min(player.maxHP, player.hp + 3);  // Partial heal between zones
  player.invuln = 60;

  enemies = [];
  items = [];
  projectiles = [];
  hazards = [];

  levelSeed = (levelSeed * 7 + game.zone * 31) % 2147483647;
  generatePlatforms();
  spawnEnemies();
  spawnItems();
  spawnHazards();

  addPopup(GW / 2, 50, ZONES[game.zone].name, '#ffd700', 90);
  addPopup(GW / 2, 65, 'WAVE 1', '#ffffff', 60);
}

// =====================================================================
// MAIN UPDATE
// =====================================================================
function update() {
  game.frame++;

  switch (game.state) {
    case STATE_TITLE:
      if (keysJustPressed.start || keysJustPressed.a) {
        ensureAudio();
        if (!game.shownTutorial) {
          game.state = STATE_TUTORIAL;
          game.shownTutorial = true;
        } else {
          startNewGame();
        }
      }
      break;

    case STATE_TUTORIAL:
      if (keysJustPressed.start || keysJustPressed.a || keysJustPressed.b) {
        startNewGame();
      }
      break;

    case STATE_PLAYING:
    case STATE_BOSS:
      if (keysJustPressed.start) {
        game.state = STATE_PAUSED;
        break;
      }
      updatePlayer();
      updateEnemies();
      updateProjectiles();
      updateItems();
      updateHazards();
      updatePlatforms();
      updateParticles();
      updateZoneProgress();
      updateScreenShake();
      break;

    case STATE_DEAD:
      updateParticles();
      updateScreenShake();
      if (game.deathTimer > 0) game.deathTimer--;
      if (game.deathTimer <= 0 && (keysJustPressed.start || keysJustPressed.a)) {
        // Save hi score
        if (game.score > game.hiScore) {
          game.hiScore = game.score;
          try { localStorage.setItem('hi_seasons', String(game.hiScore)); } catch(e) { console.warn('Hi score save failed:', e); }
        }
        game.state = STATE_TITLE;
      }
      break;

    case STATE_ZONE_CLEAR:
      game.victoryCelebration++;
      updateParticles();
      updateScreenShake();
      if (game.victoryCelebration > 90 && (keysJustPressed.start || keysJustPressed.a)) {
        if (game.zone < ZONES.length - 1) {
          nextZone();
        } else {
          // Beat the game!
          if (game.score > game.hiScore) {
            game.hiScore = game.score;
            try { localStorage.setItem('hi_seasons', String(game.hiScore)); } catch(e) { console.warn('Hi score save failed:', e); }
          }
          game.state = STATE_VICTORY;
        }
      }
      break;

    case STATE_VICTORY:
      updateParticles();
      if (keysJustPressed.start || keysJustPressed.a) {
        game.state = STATE_TITLE;
      }
      break;

    case STATE_PAUSED:
      if (keysJustPressed.start) {
        game.state = game.bossTriggered ? STATE_BOSS : STATE_PLAYING;
      }
      break;
  }

  // Clear just-pressed
  keysJustPressed = {};
}

// =====================================================================
// MAIN DRAW
// =====================================================================
function draw() {
  ctx.save();

  // Screen shake offset
  if (game.screenShake > 0) {
    ctx.translate(Math.floor(game.screenShakeX), Math.floor(game.screenShakeY));
  }

  switch (game.state) {
    case STATE_TITLE:
      drawTitle();
      break;

    case STATE_TUTORIAL:
      drawTitle();
      drawTutorial();
      break;

    case STATE_PLAYING:
    case STATE_BOSS:
      drawBackground();
      drawPlatforms();
      drawHazards();
      drawItems();
      drawEnemies();
      drawPlayer();
      drawProjectiles();
      drawParticles();
      drawPopups();
      drawHUD();
      break;

    case STATE_DEAD:
      drawBackground();
      drawPlatforms();
      drawHazards();
      drawItems();
      drawEnemies();
      drawParticles();
      drawPopups();
      drawHUD();
      drawDeathScreen();
      break;

    case STATE_ZONE_CLEAR:
      drawBackground();
      drawPlatforms();
      drawItems();
      drawPlayer();
      drawParticles();
      drawPopups();
      drawHUD();
      drawZoneClear();
      break;

    case STATE_VICTORY:
      drawBackground();
      drawParticles();
      drawVictory();
      break;

    case STATE_PAUSED:
      drawBackground();
      drawPlatforms();
      drawHazards();
      drawItems();
      drawEnemies();
      drawPlayer();
      drawProjectiles();
      drawHUD();
      drawPause();
      break;
  }

  // Flash overlay
  if (game.flashTimer > 0) {
    ctx.globalAlpha = game.flashTimer * 0.05;
    ctx.fillStyle = game.flashColor;
    ctx.fillRect(-10, -10, GW + 20, GH + 20);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// =====================================================================
// GAME LOOP
// =====================================================================
var lastTime = 0;
var accumulator = 0;

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  var delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  // Cap to prevent spiral of death
  if (accumulator > FRAME_TIME * 5) accumulator = FRAME_TIME * 5;

  while (accumulator >= FRAME_TIME) {
    update();
    accumulator -= FRAME_TIME;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);

})();
</script>
