<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Depths</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'SONAR', b: 'CHARGE' } });

// === STAT B LOADING (NFT bonuses) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// === STAT-DERIVED CONSTANTS ===
const TILE = 32;
const BASE_MAX_AIR = 20;
const BASE_MAX_HP = 5;
const BASE_CHARGE_COOLDOWN = 1.5;
const BASE_SONAR_COOLDOWN = 2.0;
const SONAR_RADIUS_MAX = 200;
const BASE_PLAYER_ACCEL = 280;
const BASE_PLAYER_MAX_SPEED = 150;
const PLAYER_DRAG = 0.97;
const BASE_CHARGE_SPEED = 350;
const CHARGE_DURATION = 0.35;

// STR -> charge damage multiplier
function chargeDmgMult() { return statB.damage * (0.8 + statB.str * 0.02); }
// DEX -> swim speed multiplier
function swimSpeedMult() { return statB.speed * (0.8 + statB.dex * 0.02); }
// CON -> air capacity and HP
function maxAir() { return Math.floor(BASE_MAX_AIR * (0.8 + statB.con * 0.04)); }
function maxHP() { return Math.floor(BASE_MAX_HP * statB.hpMult * (0.8 + statB.con * 0.02)); }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 12) / 4); }
// INT -> score multiplier and sonar reveal radius
function scoreMult() { return statB.scoreMult * (0.8 + statB.int * 0.02); }
function sonarRadiusBonus() { return 1 + (statB.int - 10) * 0.04; }
// WIS -> sonar cooldown reduction
function sonarCooldown() { return Math.max(0.4, BASE_SONAR_COOLDOWN * statB.cooldown * (1.2 - statB.wis * 0.02)); }
function chargeCooldown() { return Math.max(0.3, BASE_CHARGE_COOLDOWN * (1.2 - statB.wis * 0.015)); }
// CHA -> fish spawns, item drops, NPC friendliness
function spawnChanceMult() { return 1 + (statB.cha - 10) * 0.03; }
function itemDropMult() { return Math.min(2, statB.luck * (0.8 + statB.cha * 0.02)); }

const PLAYER_ACCEL = Math.floor(BASE_PLAYER_ACCEL * swimSpeedMult());
const PLAYER_MAX_SPEED = Math.floor(BASE_PLAYER_MAX_SPEED * swimSpeedMult());
const CHARGE_SPEED = Math.floor(BASE_CHARGE_SPEED * (0.9 + statB.str * 0.01));
const MAX_HP = maxHP();
const MAX_AIR = maxAir();

let state = 'title';
let frame = 0;
let level = 0;
let score = 0;
let highScore = TAS.score.load('eccodeep_hi');

// === PLAYER ===
let player = {};
let camera = { x: 0, y: 0 };

// === LEVEL DATA ===
let map = [];
let mapW = 0, mapH = 0;
let enemies = [];
let npcs = [];
let airPockets = [];
let crystals = [];
let shells = [];
let gates = [];
let currents = [];
let items = [];
let exitZone = null;
let surfaceY = 0;
let sonarPings = [];
let bubbles = [];
let levelDarkness = 0;
let levelName = '';
let bossActive = null;

// === TASERN ZONE DEFINITIONS ===
const LEVELS = [
  { name: 'Shallow Spore Pools', w: 20, h: 12, dark: 0, surface: 1, enemies: 3, npcs: 3, shells: 2, zone: 'shallows' },
  { name: 'Sunken Garden Beds', w: 25, h: 15, dark: 0.1, surface: 1, enemies: 6, npcs: 1, shells: 2, zone: 'kelp' },
  { name: 'The POOP Trench', w: 22, h: 20, dark: 0.7, surface: 0, enemies: 8, npcs: 0, shells: 3, zone: 'trench' },
  { name: 'Drowned Baseling Houses', w: 24, h: 16, dark: 0.4, surface: 0, enemies: 5, npcs: 1, shells: 2, zone: 'grotto' },
  { name: 'Reactor Vent Fields', w: 26, h: 14, dark: 0.2, surface: 1, enemies: 7, npcs: 0, shells: 3, zone: 'vents' },
  { name: 'Sunken Power Plant', w: 28, h: 16, dark: 0.5, surface: 0, enemies: 10, npcs: 1, shells: 3, zone: 'reactor' },
  { name: 'Abyssal Mycelium', w: 30, h: 18, dark: 0.85, surface: 0, enemies: 5, npcs: 0, shells: 4, zone: 'abyss' },
  { name: 'The Spore Queen Hive', w: 24, h: 20, dark: 0.6, surface: 0, enemies: 12, npcs: 0, shells: 4, zone: 'hive' }
];

// === SEEDED RANDOM ===
let seed = 1;
function seededRandom() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }

// === GENERATE LEVEL ===
function generateLevel(idx) {
  const def = LEVELS[idx];
  seed = (idx + 1) * 7919;
  mapW = def.w;
  mapH = def.h;
  surfaceY = def.surface ? TILE : -999;
  levelDarkness = def.dark;
  levelName = def.name;
  map = [];
  enemies = [];
  npcs = [];
  airPockets = [];
  crystals = [];
  shells = [];
  gates = [];
  currents = [];
  items = [];
  sonarPings = [];
  bubbles = [];
  exitZone = null;
  bossActive = null;

  // Generate map: 0=water, 1=wall, 2=coral, 3=kelp, 4=crystal, 5=vent, 6=mycelial_coral, 7=spore_vent
  for (let y = 0; y < mapH; y++) {
    map[y] = [];
    for (let x = 0; x < mapW; x++) {
      if (x === 0 || x === mapW - 1 || y === mapH - 1) {
        map[y][x] = 1;
      } else if (y === 0 && def.surface) {
        map[y][x] = 0;
      } else if (y === 0) {
        map[y][x] = 1;
      } else {
        const r = seededRandom();
        if (r < 0.12) map[y][x] = 1;
        else if (r < 0.16 && idx >= 1) map[y][x] = 3;
        else if (r < 0.18 && idx >= 3) map[y][x] = 4;
        else if (r < 0.19 && idx === 4) map[y][x] = 5;
        else if (r < 0.21 && idx >= 2) map[y][x] = 6; // mycelial coral
        else if (r < 0.22 && idx >= 4) map[y][x] = 7; // spore vent
        else map[y][x] = 0;
      }
    }
  }

  // Carve paths
  const startX = 2, startY = def.surface ? 2 : Math.floor(mapH / 2);
  const endX = mapW - 3, endY = Math.floor(mapH / 2);
  carvePath(startX, startY, endX, endY);
  carvePath(startX, startY, Math.floor(mapW / 2), mapH - 3);
  carvePath(Math.floor(mapW / 2), mapH - 3, endX, endY);

  // Add coral decorations
  for (let y = 1; y < mapH - 1; y++) {
    for (let x = 1; x < mapW - 1; x++) {
      if (map[y][x] === 0 && map[y + 1] && map[y + 1][x] === 1 && seededRandom() < 0.25) {
        map[y][x] = 2;
      }
    }
  }

  // Place exit
  exitZone = { x: (endX) * TILE, y: endY * TILE, w: TILE * 2, h: TILE * 2 };

  // Place air pockets in deep levels
  if (!def.surface) {
    const pocketCount = 3 + idx;
    for (let i = 0; i < pocketCount; i++) {
      const ax = Math.floor(seededRandom() * (mapW - 4)) + 2;
      const ay = Math.floor(seededRandom() * (mapH - 4)) + 2;
      if (map[ay][ax] === 0) {
        airPockets.push({ x: ax * TILE + TILE / 2, y: ay * TILE + TILE / 2, used: false, regen: 0 });
      }
    }
  }

  // Place shells (healing) - CHA increases shell count
  const shellCount = def.shells + Math.floor(Math.max(0, statB.cha - 10) * 0.2);
  for (let i = 0; i < shellCount; i++) {
    const sx = Math.floor(seededRandom() * (mapW - 4)) + 2;
    const sy = Math.floor(seededRandom() * (mapH - 4)) + 2;
    if (map[sy][sx] === 0) {
      shells.push({ x: sx * TILE + TILE / 2, y: sy * TILE + TILE / 2, active: true });
    }
  }

  // Place items (CHA increases item spawns)
  const itemCount = 2 + Math.floor(spawnChanceMult() * 2);
  for (let i = 0; i < itemCount; i++) {
    const ix = Math.floor(seededRandom() * (mapW - 4)) + 2;
    const iy = Math.floor(seededRandom() * (mapH - 4)) + 2;
    if (map[iy][ix] === 0) {
      const types = ['spore_pearl', 'reactor_shard', 'myco_essence', 'goo_orb'];
      const type = types[Math.floor(seededRandom() * types.length)];
      items.push({ x: ix * TILE + TILE / 2, y: iy * TILE + TILE / 2, type, active: true, bob: seededRandom() * 6.28 });
    }
  }

  // Place enemies
  for (let i = 0; i < def.enemies; i++) {
    spawnEnemy(idx);
  }

  // Spawn boss on levels 5 and 7
  if (idx === 5 || idx === 7) {
    spawnBoss(idx);
  }

  // Place NPCs - CHA gives more NPCs
  const npcCount = def.npcs + (statB.cha >= 14 ? 1 : 0);
  for (let i = 0; i < npcCount; i++) {
    const nx = Math.floor(seededRandom() * (mapW - 6)) + 3;
    const ny = Math.floor(seededRandom() * (mapH - 4)) + 2;
    if (map[ny][nx] === 0) {
      npcs.push({ x: nx * TILE, y: ny * TILE, msg: getNPCMessage(idx, i), showMsg: 0 });
    }
  }

  // Place currents - goo currents in multiple levels now
  if (idx >= 4) {
    const cCount = idx === 4 ? 5 : 3;
    for (let i = 0; i < cCount; i++) {
      const cx = Math.floor(seededRandom() * (mapW - 6)) + 3;
      const cy = Math.floor(seededRandom() * (mapH - 4)) + 2;
      const isGoo = idx >= 5;
      currents.push({
        x: cx * TILE, y: cy * TILE, w: TILE * 3, h: TILE,
        dir: seededRandom() < 0.5 ? -1 : 1,
        str: 120 + seededRandom() * 80,
        timer: 0, active: true, goo: isGoo
      });
    }
  }

  // Place crystals for puzzle
  if (idx === 3) {
    for (let i = 0; i < 4; i++) {
      const cx = Math.floor(seededRandom() * (mapW - 6)) + 3;
      const cy = Math.floor(seededRandom() * (mapH - 4)) + 2;
      if (map[cy][cx] === 0) {
        crystals.push({ x: cx * TILE, y: cy * TILE, vx: 0, vy: 0, lit: false });
      }
    }
  }

  // Init player
  player = {
    x: startX * TILE, y: startY * TILE,
    vx: 0, vy: 0,
    angle: 0, targetAngle: 0,
    w: 24, h: 12,
    hp: player.hp || MAX_HP,
    air: MAX_AIR,
    charging: false, chargeTimer: 0, chargeCooldown: 0,
    sonarCooldown: 0,
    invuln: 0,
    tailPhase: 0,
    powerup: null, powerupTimer: 0
  };
  camera.x = player.x - GW / 2;
  camera.y = player.y - GH / 2;
}

function carvePath(x1, y1, x2, y2) {
  let cx = x1, cy = y1;
  while (cx !== x2 || cy !== y2) {
    if (cx >= 0 && cx < mapW && cy >= 0 && cy < mapH) {
      map[cy][cx] = 0;
      if (cy > 0) map[cy - 1][cx] = 0;
      if (cx + 1 < mapW) map[cy][cx + 1] = 0;
    }
    if (seededRandom() < 0.6) {
      cx += cx < x2 ? 1 : cx > x2 ? -1 : 0;
    } else {
      cy += cy < y2 ? 1 : cy > y2 ? -1 : 0;
    }
  }
}

function spawnEnemy(levelIdx) {
  const ex = Math.floor(seededRandom() * (mapW - 6)) + 3;
  const ey = Math.floor(seededRandom() * (mapH - 4)) + 2;
  if (map[ey][ex] !== 0) return;

  // Tasern sea creature pools
  let pool;
  if (levelIdx <= 1) pool = ['spore_jelly', 'pufferfish', 'goo_minnow'];
  else if (levelIdx <= 3) pool = ['spore_jelly', 'reef_shark', 'reactor_eel'];
  else if (levelIdx === 5) pool = ['reactor_drone', 'reef_shark', 'reactor_eel'];
  else if (levelIdx === 6) pool = ['reef_shark', 'fungal_octopus', 'spore_jelly'];
  else pool = ['spore_jelly', 'reef_shark', 'pufferfish', 'reactor_eel', 'fungal_octopus'];

  const type = pool[Math.floor(seededRandom() * pool.length)];
  const hpTable = { reef_shark: 3, fungal_octopus: 4, reactor_eel: 2, reactor_drone: 2, spore_jelly: 1, pufferfish: 1, goo_minnow: 1 };
  const wTable = { reef_shark: 28, fungal_octopus: 24, reactor_drone: 18, reactor_eel: 20, pufferfish: 16, spore_jelly: 16, goo_minnow: 12 };
  const hTable = { reef_shark: 14, fungal_octopus: 24, reactor_drone: 18, reactor_eel: 12, pufferfish: 16, spore_jelly: 16, goo_minnow: 10 };
  enemies.push({
    type, x: ex * TILE, y: ey * TILE,
    vx: (seededRandom() - 0.5) * 40,
    vy: (seededRandom() - 0.5) * 30,
    hp: hpTable[type] || 1,
    maxHp: hpTable[type] || 1,
    w: wTable[type] || 16,
    h: hTable[type] || 16,
    stunned: 0, phase: seededRandom() * 6.28,
    inflated: false, lunging: false, grabbing: false,
    homeX: ex * TILE, homeY: ey * TILE,
    sporeTimer: 0
  });
}

function spawnBoss(levelIdx) {
  const bx = Math.floor(mapW * 0.7);
  const by = Math.floor(mapH * 0.5);
  if (levelIdx === 5) {
    bossActive = {
      type: 'reactor_leviathan', x: bx * TILE, y: by * TILE,
      vx: 0, vy: 0, hp: 12 + level * 2, maxHp: 12 + level * 2,
      w: 48, h: 28, stunned: 0, phase: 0,
      attackTimer: 0, pattern: 0, enraged: false
    };
  } else {
    bossActive = {
      type: 'spore_queen', x: bx * TILE, y: by * TILE,
      vx: 0, vy: 0, hp: 16 + level * 2, maxHp: 16 + level * 2,
      w: 40, h: 40, stunned: 0, phase: 0,
      attackTimer: 0, pattern: 0, enraged: false,
      tentacles: []
    };
    for (let t = 0; t < 6; t++) {
      bossActive.tentacles.push({ angle: t * Math.PI / 3, len: 30, phase: t * 0.5 });
    }
  }
}

function getNPCMessage(level, idx) {
  const msgs = [
    ['Welcome, little baseling! Use SONAR to reveal hidden garden paths.', 'The POOP Trench holds ancient fertilizer cores...', 'Follow the spore current to find the way.'],
    ['Beware the garden tangles ahead.', 'Charge through mycelial obstacles, baseling!'],
    ['Fungal crystals redirect bioluminescent beams down here.'],
    ['The sunken power plant still burns POOP for energy...', 'Find air pockets to survive the depths!'],
    ['Something enormous guards the deep gardens...'],
    ['The Spore Queen Hive awaits. Brace yourself, baseling.'],
    ['Surface to breathe! Your house misses you.', 'Hidden grottoes hold garden seeds.'],
    ['The exit glows beyond the living spore reef.']
  ];
  const pool = msgs[level] || msgs[0];
  return pool[idx % pool.length];
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  level = 0;
  player.hp = MAX_HP;
  generateLevel(0);
  TAS.particles.clear();
}

function nextLevel() {
  level++;
  if (level >= 8) {
    state = 'victory';
    if (score > highScore) { highScore = score; TAS.score.save('eccodeep_hi', score); }
    return;
  }
  generateLevel(level);
  state = 'levelIntro';
  frame = 0;
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) { highScore = score; TAS.score.save('eccodeep_hi', score); }
}

// === COLLISION WITH MAP ===
function isSolid(px, py) {
  const tx = Math.floor(px / TILE);
  const ty = Math.floor(py / TILE);
  if (tx < 0 || tx >= mapW || ty < 0 || ty >= mapH) return true;
  return map[ty][tx] === 1;
}

function isInWater(px, py) {
  return py > surfaceY;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Ambient bubbles - more frequent, varied sizes
  if (frame % 10 === 0 && state === 'playing') {
    const bx = camera.x + Math.random() * GW;
    const by = camera.y + Math.random() * GH;
    if (!isSolid(bx, by)) {
      bubbles.push({ x: bx, y: by, vy: -15 - Math.random() * 40, vx: (Math.random() - 0.5) * 8, size: 1 + Math.random() * 4, life: 2 + Math.random() * 3, wobble: Math.random() * 6.28 });
    }
  }

  // Update bubbles with wobble
  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.y += b.vy * dt;
    b.wobble = (b.wobble || 0) + dt * 3;
    b.x += Math.sin(b.wobble) * 0.6 + (b.vx || 0) * dt;
    if (b.vx) b.vx *= 0.98;
    b.life -= dt;
    if (b.life <= 0 || b.y < surfaceY) bubbles.splice(i, 1);
  }

  // Update sonar pings - INT affects expansion speed
  const sonarExpand = 200 * sonarRadiusBonus();
  for (let i = sonarPings.length - 1; i >= 0; i--) {
    sonarPings[i].radius += sonarExpand * dt;
    sonarPings[i].alpha -= dt * 1.0;
    if (sonarPings[i].alpha <= 0) sonarPings.splice(i, 1);
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
      state = 'levelIntro';
      frame = 0;
    }
    return;
  }

  if (state === 'levelIntro') {
    if (frame > 120 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // === PLAYER INPUT ===
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  let ax = 0, ay = 0;

  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) ax -= 1;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) ax += 1;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) ay -= 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) ay += 1;

  // Sonar - WIS reduces cooldown
  if ((keys['KeyZ'] || keys['Space'] || touch.a) && player.sonarCooldown <= 0) {
    fireSonar();
    player.sonarCooldown = sonarCooldown();
  }

  // Charge - STR boosts damage, WIS reduces cooldown
  if ((keys['KeyX'] || keys['Shift'] || touch.b) && player.chargeCooldown <= 0 && !player.charging) {
    player.charging = true;
    player.chargeTimer = CHARGE_DURATION;
    player.chargeCooldown = chargeCooldown();
    const ca = player.angle;
    player.vx = Math.cos(ca) * CHARGE_SPEED;
    player.vy = Math.sin(ca) * CHARGE_SPEED;
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 400);
    TAS.audio.playNoise(0.15, 0.05, 800);
    // Charge burst particles
    for (let p = 0; p < 4; p++) {
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#88eeff', 3, 1.5, { size: 2, gravity: 0 });
    }
  }

  // Cooldowns
  if (player.sonarCooldown > 0) player.sonarCooldown -= dt;
  if (player.chargeCooldown > 0) player.chargeCooldown -= dt;
  if (player.invuln > 0) player.invuln -= dt;
  if (player.powerupTimer > 0) {
    player.powerupTimer -= dt;
    if (player.powerupTimer <= 0) player.powerup = null;
  }

  // Charging state
  if (player.charging) {
    player.chargeTimer -= dt;
    if (player.chargeTimer <= 0) player.charging = false;
    TAS.particles.spawn(player.x, player.y, '#88eeff', 2, 1, { size: 2, gravity: 0 });
  } else {
    // Normal movement - DEX affects acceleration
    if (ax !== 0 || ay !== 0) {
      const len = Math.sqrt(ax * ax + ay * ay);
      ax /= len; ay /= len;
      player.vx += ax * PLAYER_ACCEL * dt;
      player.vy += ay * PLAYER_ACCEL * dt;
      player.targetAngle = Math.atan2(ay, ax);
    }
  }

  // Drag
  player.vx *= Math.pow(PLAYER_DRAG, dt * 60);
  player.vy *= Math.pow(PLAYER_DRAG, dt * 60);

  // Speed cap - DEX raises max speed
  const spd = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (!player.charging && spd > PLAYER_MAX_SPEED) {
    player.vx *= PLAYER_MAX_SPEED / spd;
    player.vy *= PLAYER_MAX_SPEED / spd;
  }

  // Smooth angle rotation
  if (spd > 5) {
    player.targetAngle = Math.atan2(player.vy, player.vx);
  }
  let angleDiff = player.targetAngle - player.angle;
  while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
  while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
  player.angle += angleDiff * Math.min(1, dt * 8);

  // Move with collision
  const newX = player.x + player.vx * dt;
  const newY = player.y + player.vy * dt;

  if (!isSolid(newX, player.y) && !isSolid(newX + player.w, player.y) &&
      !isSolid(newX, player.y + player.h) && !isSolid(newX + player.w, player.y + player.h)) {
    player.x = newX;
  } else {
    player.vx *= -0.3;
    if (player.charging) {
      player.charging = false;
      TAS.fx.shake(2, 0.9);
    }
  }

  if (!isSolid(player.x, newY) && !isSolid(player.x + player.w, newY) &&
      !isSolid(player.x, newY + player.h) && !isSolid(player.x + player.w, newY + player.h)) {
    player.y = newY;
  } else {
    player.vy *= -0.3;
    if (player.charging) {
      player.charging = false;
      TAS.fx.shake(2, 0.9);
    }
  }

  // Tail animation
  player.tailPhase += dt * (spd * 0.05 + 3);

  // === AIR MANAGEMENT === CON affects air capacity
  if (isInWater(player.x, player.y)) {
    const airDrain = player.powerup === 'myco_essence' ? 0.5 : 1;
    player.air -= dt * airDrain;
    if (player.air <= 0) {
      player.air = 0;
      player.hp--;
      player.invuln = 1;
      TAS.fx.flash('#004488', 0.4);
      TAS.fx.shake(4, 0.9);
      if (player.hp <= 0) { gameOver(); return; }
      player.air = 5;
    }
  } else {
    // At surface - refill air (CON speeds refill)
    const refillRate = 8 * (0.8 + statB.con * 0.02);
    player.air = Math.min(MAX_AIR, player.air + dt * refillRate);
    // Breach particles
    if (player.vy < -50) {
      for (let p = 0; p < 8; p++) {
        TAS.particles.spawn(player.x + player.w / 2 + (Math.random()-0.5)*10, player.y + player.h, '#ffffff', 5, 3, { size: 2, gravity: 2 });
      }
      TAS.audio.playNoise(0.3, 0.06, 400);
      TAS.fx.shake(2, 0.95);
    }
  }

  // Air pockets
  for (const ap of airPockets) {
    if (ap.used && ap.regen > 0) { ap.regen -= dt; if (ap.regen <= 0) ap.used = false; }
    if (!ap.used) {
      const d = TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, ap.x, ap.y);
      if (d < 24) {
        player.air = MAX_AIR;
        ap.used = true;
        ap.regen = 15;
        for (let p = 0; p < 10; p++) {
          TAS.particles.spawn(ap.x + (Math.random()-0.5)*10, ap.y + (Math.random()-0.5)*10, '#88ddff', 8, 2, { size: 3, gravity: -1 });
        }
        TAS.audio.playTone(600, 0.15, 'sine', 0.06);
        TAS.audio.playTone(800, 0.15, 'sine', 0.04);
      }
    }
  }

  // Healing shells
  for (const sh of shells) {
    if (!sh.active) continue;
    const d = TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, sh.x, sh.y);
    if (d < 20) {
      player.hp = Math.min(MAX_HP, player.hp + 1);
      sh.active = false;
      score += Math.floor(50 * scoreMult());
      TAS.particles.spawn(sh.x, sh.y, '#ff88cc', 6, 2, { size: 3 });
      TAS.audio.playTone(523, 0.1, 'sine', 0.06);
      TAS.audio.playTone(659, 0.1, 'sine', 0.06);
    }
  }

  // === ITEMS ===
  for (const item of items) {
    if (!item.active) continue;
    item.bob += dt * 2;
    const d = TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, item.x, item.y);
    if (d < 22) {
      item.active = false;
      let pts = 0;
      switch (item.type) {
        case 'spore_pearl':
          pts = 150; break;
        case 'reactor_shard':
          pts = 200;
          player.powerup = 'reactor_shard';
          player.powerupTimer = 8;
          break;
        case 'myco_essence':
          pts = 100;
          player.powerup = 'myco_essence';
          player.powerupTimer = 12;
          break;
        case 'goo_orb':
          pts = 75;
          player.hp = Math.min(MAX_HP, player.hp + 1);
          player.air = Math.min(MAX_AIR, player.air + 5);
          break;
      }
      score += Math.floor(pts * scoreMult() * itemDropMult());
      TAS.particles.spawn(item.x, item.y, '#aaffdd', 8, 2.5, { size: 3 });
      TAS.audio.playTone(700, 0.1, 'sine', 0.05);
      TAS.audio.playTone(900, 0.1, 'sine', 0.05);
    }
  }

  // === CURRENTS (goo currents slow + damage) ===
  for (const c of currents) {
    c.timer += dt;
    c.active = Math.sin(c.timer * 1.5) > -0.3;
    if (c.active && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, c.x, c.y, c.w, c.h)) {
      player.vy += c.dir * c.str * dt;
      // Goo currents slow and slightly damage
      if (c.goo) {
        player.vx *= 0.95;
        player.vy *= 0.95;
        if (frame % 120 === 0 && player.invuln <= 0) {
          player.hp--;
          player.invuln = 1;
          TAS.fx.flash('#44aa00', 0.2);
          if (player.hp <= 0) { gameOver(); return; }
        }
      }
    }
  }

  // === CRYSTALS (pushable) ===
  for (const cr of crystals) {
    const d = TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, cr.x + TILE / 2, cr.y + TILE / 2);
    if (d < 30 && player.charging) {
      cr.vx = player.vx * 0.5;
      cr.vy = player.vy * 0.5;
      cr.lit = true;
    }
    cr.x += cr.vx * dt;
    cr.y += cr.vy * dt;
    cr.vx *= 0.95;
    cr.vy *= 0.95;
    if (isSolid(cr.x, cr.y) || isSolid(cr.x + TILE, cr.y + TILE)) {
      cr.vx = 0; cr.vy = 0;
    }
  }

  // === ENEMIES ===
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.phase += dt * 3;

    if (e.stunned > 0) { e.stunned -= dt; continue; }

    const dist = TAS.math.dist(player.x, player.y, e.x, e.y);

    switch (e.type) {
      case 'spore_jelly':
        e.x += Math.sin(e.phase) * 20 * dt;
        e.y += Math.cos(e.phase * 0.7) * 15 * dt;
        // Emit spore particles periodically
        e.sporeTimer = (e.sporeTimer || 0) + dt;
        if (e.sporeTimer > 2) {
          e.sporeTimer = 0;
          if (dist < 100) {
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#cc44ff', 3, 2, { size: 2, gravity: -0.5 });
          }
        }
        break;
      case 'reef_shark':
        if (dist < 180) {
          const a = TAS.math.angle(e.x, e.y, player.x, player.y);
          e.vx += Math.cos(a) * 100 * dt;
          e.vy += Math.sin(a) * 100 * dt;
        } else {
          e.vx += (e.homeX - e.x) * 0.5 * dt;
          e.vy += (e.homeY - e.y) * 0.5 * dt;
        }
        e.vx *= 0.98; e.vy *= 0.98;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        break;
      case 'pufferfish':
        if (dist < 80) {
          e.inflated = true;
          e.w = 24; e.h = 24;
        } else {
          e.inflated = false;
          e.w = 16; e.h = 16;
        }
        e.x += Math.sin(e.phase * 0.5) * 10 * dt;
        e.y += Math.cos(e.phase * 0.3) * 8 * dt;
        break;
      case 'reactor_eel':
        if (dist < 120 && !e.lunging) {
          e.lunging = true;
          const a = TAS.math.angle(e.x, e.y, player.x, player.y);
          e.vx = Math.cos(a) * 220;
          e.vy = Math.sin(a) * 220;
          // Electric spark on lunge
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffff44', 4, 1, { size: 2, gravity: 0 });
        }
        if (e.lunging) {
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          e.vx *= 0.95; e.vy *= 0.95;
          if (Math.abs(e.vx) < 10 && Math.abs(e.vy) < 10) e.lunging = false;
        }
        break;
      case 'fungal_octopus':
        e.x += Math.sin(e.phase * 0.4) * 25 * dt;
        e.y += Math.cos(e.phase * 0.6) * 20 * dt;
        if (dist < 60) {
          const a = TAS.math.angle(player.x, player.y, e.x, e.y);
          player.vx += Math.cos(a) * 50 * dt;
          player.vy += Math.sin(a) * 50 * dt;
        }
        break;
      case 'reactor_drone':
        if (dist < 200) {
          const a = TAS.math.angle(e.x, e.y, player.x, player.y);
          e.vx = Math.cos(a) * 60;
          e.vy = Math.sin(a) * 60;
        }
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.vx *= 0.96; e.vy *= 0.96;
        break;
      case 'goo_minnow':
        // Small, fast, erratic
        e.x += Math.sin(e.phase * 2) * 35 * dt;
        e.y += Math.cos(e.phase * 1.5) * 25 * dt;
        if (dist < 60) {
          const a = TAS.math.angle(e.x, e.y, player.x, player.y);
          e.x -= Math.cos(a) * 40 * dt;
          e.y -= Math.sin(a) * 40 * dt;
        }
        break;
    }

    // Keep enemies in bounds
    e.x = TAS.math.clamp(e.x, TILE, (mapW - 2) * TILE);
    e.y = TAS.math.clamp(e.y, TILE, (mapH - 2) * TILE);

    // Player collision with enemy
    if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      if (player.charging) {
        // STR affects charge damage
        const dmg = Math.max(1, Math.floor(chargeDmgMult()));
        const bonusDmg = player.powerup === 'reactor_shard' ? 1 : 0;
        e.hp -= (dmg + bonusDmg);
        e.stunned = 1;
        score += Math.floor(100 * scoreMult());
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffaa00', 10, 3, { size: 3 });
        TAS.fx.shake(4, 0.85);
        TAS.audio.playTone(150, 0.2, 'sawtooth', 0.08);
        if (e.hp <= 0) {
          enemies.splice(i, 1);
          score += Math.floor(200 * scoreMult());
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 15, 4, { size: 4, gravity: 1 });
          TAS.fx.shake(6, 0.9);
          // CHA chance to drop item on kill
          if (Math.random() < itemDropMult() * 0.15) {
            const types = ['spore_pearl', 'goo_orb'];
            items.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, type: types[Math.floor(Math.random() * types.length)], active: true, bob: 0 });
          }
        }
      } else {
        player.hp--;
        player.invuln = 1.5;
        TAS.fx.flash('#ff0000', 0.3);
        TAS.fx.shake(6, 0.9);
        TAS.audio.playTone(100, 0.3, 'square', 0.1, 50);
        const ka = TAS.math.angle(e.x, e.y, player.x, player.y);
        player.vx += Math.cos(ka) * 150;
        player.vy += Math.sin(ka) * 150;
        if (player.hp <= 0) { gameOver(); return; }
      }
    }
  }

  // === BOSS UPDATE ===
  if (bossActive) {
    updateBoss(dt);
  }

  // === SPORE VENT TILES DAMAGE ===
  const ptx = Math.floor((player.x + player.w / 2) / TILE);
  const pty = Math.floor((player.y + player.h / 2) / TILE);
  if (ptx >= 0 && ptx < mapW && pty >= 0 && pty < mapH) {
    if (map[pty][ptx] === 7 && player.invuln <= 0) {
      // Spore vent damages and pushes up
      if (frame % 60 === 0) {
        player.hp--;
        player.invuln = 0.5;
        TAS.fx.flash('#88ff44', 0.2);
        if (player.hp <= 0) { gameOver(); return; }
      }
      player.vy -= 80 * dt;
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h, '#aaff44', 2, 1, { size: 2, gravity: -2 });
    }
  }

  // === EXIT CHECK ===
  if (exitZone && !bossActive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, exitZone.x, exitZone.y, exitZone.w, exitZone.h)) {
    score += Math.floor(500 * scoreMult());
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100);
    nextLevel();
  }

  // === CAMERA ===
  const targetCX = player.x + player.w / 2 - GW / 2;
  const targetCY = player.y + player.h / 2 - GH / 2;
  camera.x += (targetCX - camera.x) * Math.min(1, dt * 4);
  camera.y += (targetCY - camera.y) * Math.min(1, dt * 4);
  camera.x = TAS.math.clamp(camera.x, 0, mapW * TILE - GW);
  camera.y = TAS.math.clamp(camera.y, 0, mapH * TILE - GH);
}

function updateBoss(dt) {
  const b = bossActive;
  b.phase += dt * 2;
  b.attackTimer += dt;

  if (b.stunned > 0) { b.stunned -= dt; return; }

  if (!b.enraged && b.hp <= b.maxHp * 0.4) {
    b.enraged = true;
    TAS.fx.flash('#ff4400', 0.5);
    TAS.fx.shake(8, 0.85);
  }

  const dist = TAS.math.dist(player.x, player.y, b.x, b.y);
  const speed = b.enraged ? 80 : 50;

  // Chase player
  if (dist > 30) {
    const a = TAS.math.angle(b.x, b.y, player.x, player.y);
    b.vx += Math.cos(a) * speed * dt;
    b.vy += Math.sin(a) * speed * dt;
  }
  b.vx *= 0.97; b.vy *= 0.97;
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  b.x = TAS.math.clamp(b.x, TILE, (mapW - 2) * TILE);
  b.y = TAS.math.clamp(b.y, TILE, (mapH - 2) * TILE);

  // Attack patterns
  const atkInterval = b.enraged ? 2 : 3.5;
  if (b.attackTimer > atkInterval) {
    b.attackTimer = 0;
    b.pattern = (b.pattern + 1) % 3;
    if (b.pattern === 0) {
      // Shockwave
      sonarPings.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, radius: 10, alpha: 0.8, hostile: true });
      TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1);
      TAS.fx.shake(5, 0.9);
    } else if (b.pattern === 1) {
      // Spawn minions
      for (let m = 0; m < (b.enraged ? 3 : 2); m++) {
        enemies.push({
          type: 'spore_jelly', x: b.x + (Math.random()-0.5)*60, y: b.y + (Math.random()-0.5)*60,
          vx: (Math.random()-0.5)*40, vy: (Math.random()-0.5)*30,
          hp: 1, maxHp: 1, w: 14, h: 14, stunned: 0, phase: Math.random()*6.28,
          inflated: false, lunging: false, grabbing: false,
          homeX: b.x, homeY: b.y, sporeTimer: 0
        });
      }
    } else {
      // Charge at player
      const a = TAS.math.angle(b.x, b.y, player.x, player.y);
      b.vx = Math.cos(a) * 250;
      b.vy = Math.sin(a) * 250;
      TAS.audio.playTone(80, 0.4, 'square', 0.12);
    }
  }

  // Hostile sonar pings damage player
  for (let i = sonarPings.length - 1; i >= 0; i--) {
    const p = sonarPings[i];
    if (p.hostile) {
      const pd = TAS.math.dist(player.x + player.w/2, player.y + player.h/2, p.x, p.y);
      if (Math.abs(pd - p.radius) < 15 && player.invuln <= 0) {
        player.hp--;
        player.invuln = 1;
        TAS.fx.flash('#ff4400', 0.3);
        TAS.fx.shake(4, 0.9);
        if (player.hp <= 0) { gameOver(); return; }
      }
    }
  }

  // Boss collision (charge hits boss)
  if (player.charging && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
    const dmg = Math.max(1, Math.floor(chargeDmgMult()));
    b.hp -= dmg;
    b.stunned = 1.5;
    score += Math.floor(150 * scoreMult());
    TAS.particles.spawn(b.x + b.w/2, b.y + b.h/2, '#ffaa00', 15, 4, { size: 4 });
    TAS.fx.shake(8, 0.85);
    TAS.audio.playTone(120, 0.3, 'sawtooth', 0.1);
    if (b.hp <= 0) {
      score += Math.floor(2000 * scoreMult());
      TAS.particles.spawn(b.x + b.w/2, b.y + b.h/2, '#ff4444', 30, 5, { size: 5, gravity: 1 });
      TAS.fx.flash('#ffffff', 0.6);
      TAS.fx.shake(12, 0.8);
      TAS.audio.playMelody([[200, 0.1],[300, 0.1],[400, 0.1],[600, 0.2]], 80);
      bossActive = null;
    }
  } else if (!player.charging && player.invuln <= 0 &&
    TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
    player.hp -= 2;
    player.invuln = 2;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(8, 0.85);
    const ka = TAS.math.angle(b.x, b.y, player.x, player.y);
    player.vx += Math.cos(ka) * 200;
    player.vy += Math.sin(ka) * 200;
    if (player.hp <= 0) { gameOver(); return; }
  }

  // Update tentacles for spore queen
  if (b.tentacles) {
    for (const t of b.tentacles) {
      t.phase += dt * 3;
      t.angle += Math.sin(t.phase) * dt * 0.5;
    }
  }
}

// === SONAR ===
function fireSonar() {
  sonarPings.push({
    x: player.x + player.w / 2,
    y: player.y + player.h / 2,
    radius: 10,
    alpha: 1
  });
  TAS.audio.playTone(880, 0.4, 'sine', 0.06, 440);
  TAS.audio.playTone(660, 0.5, 'sine', 0.03, 330);

  // INT affects stun radius
  const stunRange = 120 * sonarRadiusBonus();
  for (const e of enemies) {
    const d = TAS.math.dist(player.x, player.y, e.x, e.y);
    if (d < stunRange) {
      e.stunned = 2;
      TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#aaddff', 5, 1.5);
    }
  }

  // Stun boss too
  if (bossActive) {
    const d = TAS.math.dist(player.x, player.y, bossActive.x, bossActive.y);
    if (d < stunRange * 0.7) {
      bossActive.stunned = 1;
      TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, '#aaddff', 8, 2);
    }
  }

  // Trigger NPC messages
  for (const npc of npcs) {
    const d = TAS.math.dist(player.x, player.y, npc.x, npc.y);
    if (d < 150) {
      npc.showMsg = 4;
    }
  }

  score += Math.floor(10 * scoreMult());
}

// === DRAW ===
function draw(dt) {
  // Background gradient - zone-specific
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  const def = LEVELS[level] || LEVELS[0];
  switch (def.zone) {
    case 'shallows':
      grad.addColorStop(0, '#0a2a3a'); grad.addColorStop(1, '#1a1c2c'); break;
    case 'kelp':
      grad.addColorStop(0, '#0a2a18'); grad.addColorStop(1, '#1a1c2c'); break;
    case 'trench':
      grad.addColorStop(0, '#1a1020'); grad.addColorStop(1, '#0a0810'); break;
    case 'grotto':
      grad.addColorStop(0, '#2a0a30'); grad.addColorStop(1, '#1a1c2c'); break;
    case 'vents':
      grad.addColorStop(0, '#2a1a0a'); grad.addColorStop(1, '#1a1c2c'); break;
    case 'reactor':
      grad.addColorStop(0, '#0a2a0a'); grad.addColorStop(1, '#1a1c2c'); break;
    case 'abyss':
      grad.addColorStop(0, '#0a0410'); grad.addColorStop(1, '#050208'); break;
    case 'hive':
      grad.addColorStop(0, '#2a0a3a'); grad.addColorStop(1, '#1a1c2c'); break;
    default:
      grad.addColorStop(0, '#1a1c2c'); grad.addColorStop(1, '#0a0810'); break;
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
    drawTitleScreen();
    return;
  }

  if (state === 'levelIntro') {
    drawLevelIntro();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Zone ' + (level + 1) + ': ' + levelName });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  // === GAME RENDER ===
  ctx.save();
  TAS.fx.applyShake();

  drawParallaxFar();

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  drawMap();
  drawCurrents();
  drawAirPockets();
  drawShells();
  drawItems();
  drawCrystals();
  drawExit();
  drawNPCs();
  drawEnemies();
  if (bossActive) drawBoss();
  drawPlayer();
  drawBubbles();
  drawSonarPings();
  TAS.particles.draw();

  ctx.restore();

  if (levelDarkness > 0) {
    drawDarkness();
  }

  if (surfaceY > 0 && camera.y < TILE * 4) {
    drawLightRays();
  }

  drawCaustics();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW FUNCTIONS ===

function drawTitleScreen() {
  // Animated deep water bg
  for (let i = 0; i < 10; i++) {
    const y = GH * 0.3 + Math.sin(frame * 0.02 + i * 0.8) * 20 + i * 25;
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = i % 2 === 0 ? '#a855f7' : '#3cacd7';
    ctx.beginPath();
    ctx.ellipse(GW / 2, y, 220, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floating spore particles
  for (let i = 0; i < 12; i++) {
    const sx = (frame * 0.3 + i * 47) % GW;
    const sy = (frame * 0.15 + i * 31) % GH;
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.03 + i) * 0.1;
    ctx.fillStyle = i % 3 === 0 ? '#a855f7' : '#7a444a';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5 + Math.sin(frame * 0.02 + i) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw swimming creature
  const px = GW / 2 + Math.sin(frame * 0.03) * 60;
  const py = GH * 0.5 + Math.cos(frame * 0.02) * 20;
  drawBaseling(px, py, Math.sin(frame * 0.03) > 0 ? 0 : Math.PI, frame * 0.1, false);

  // Bubbles
  for (let i = 0; i < 6; i++) {
    const bx = GW * 0.15 + i * GW * 0.14;
    const by = GH - ((frame * 0.5 + i * 50) % GH);
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx + Math.sin(frame * 0.02 + i) * 10, by, 2 + i * 0.8, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('BASELING DEPTHS', GW / 2 + 2, 52);
  ctx.fillStyle = '#38d973';
  ctx.fillText('BASELING DEPTHS', GW / 2, 50);

  ctx.fillStyle = '#a855f7';
  ctx.font = '12px monospace';
  ctx.fillText('A Spore Deep Tale', GW / 2, 72);

  // Stat badge
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = '10px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + ' Lv.' + statB.level, GW / 2, 90);

  // NES-style control labels
  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('[D-PAD] Swim   [A] Sonar   [B] Charge', GW / 2, GH - 65);
  ctx.fillStyle = '#7a444a';
  ctx.font = '9px monospace';
  ctx.fillText('Arrow Keys / WASD    Z / Space    X / Shift', GW / 2, GH - 50);

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS START', GW / 2, GH - 28);
  ctx.globalAlpha = 1;

  if (highScore > 0) {
    ctx.fillStyle = '#7a444a';
    ctx.font = '10px monospace';
    ctx.fillText('BEST POOP: ' + highScore, GW / 2, GH - 10);
  }
}

function drawLevelIntro() {
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('Zone ' + (level + 1), GW / 2, GH * 0.3);

  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(levelName, GW / 2, GH * 0.43);

  // Zone description
  const def = LEVELS[level];
  if (def.dark > 0.5) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '11px monospace';
    ctx.fillText('Press [A] SONAR to see in the dark!', GW / 2, GH * 0.56);
  }
  if (!def.surface) {
    ctx.fillStyle = '#3cacd7';
    ctx.font = '11px monospace';
    ctx.fillText('Find air pockets to breathe, baseling!', GW / 2, GH * 0.63);
  }
  if (bossActive) {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('WARNING: Boss guards this depth!', GW / 2, GH * 0.7);

  // Stat bar
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, GH * 0.78);

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText('PRESS START', GW / 2, GH * 0.88);
  ctx.globalAlpha = 1;
}

function drawVictory() {
  ctx.fillStyle = 'rgba(26,28,44,0.92)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, GH * 0.2);

  ctx.fillStyle = '#3cacd7';
  ctx.font = '14px monospace';
  ctx.fillText('The gardens bloom again in the deep.', GW / 2, GH * 0.35);

  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('Your baseling ' + statB.name + ' triumphs!', GW / 2, GH * 0.45);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('POOP COLLECTED: ' + score, GW / 2, GH * 0.58);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';

function drawParallaxFar() {
  const def = LEVELS[level] || LEVELS[0];
  ctx.globalAlpha = 0.15;

  // Distant ocean floor mounds
  for (let i = 0; i < 5; i++) {
    const ox = -(camera.x * 0.1) + i * 180;
    const oy = GH * 0.6 - camera.y * 0.05;
    ctx.fillStyle = i % 2 === 0 ? '#224466' : '#1a3355';
    ctx.beginPath();
    ctx.ellipse(ox, oy + 50, 130, 50, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mid-distance seaweed / mycelial tendrils
  for (let i = 0; i < 8; i++) {
    const ox = -(camera.x * 0.3) + i * 100;
    const baseY = GH * 0.7 - camera.y * 0.15;
    const sway = Math.sin(frame * 0.02 + i * 1.5) * 8;
    const isMycelial = def.zone === 'grotto' || def.zone === 'hive' || def.zone === 'abyss';
    ctx.fillStyle = isMycelial ? '#2a1a44' : '#1a4422';
    ctx.fillRect(ox + sway, baseY, 3, 35 + i * 8);
    ctx.fillRect(ox + 18 + sway * 0.7, baseY + 10, 2, 25 + i * 6);
    if (isMycelial) {
      // Bioluminescent dots
      ctx.globalAlpha = 0.25 + Math.sin(frame * 0.04 + i) * 0.15;
      ctx.fillStyle = '#88aaff';
      ctx.beginPath();
      ctx.arc(ox + sway + 1, baseY - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    }
  }
  ctx.globalAlpha = 1;
}

function drawMap() {
  const startX = Math.max(0, Math.floor(camera.x / TILE));
  const startY = Math.max(0, Math.floor(camera.y / TILE));
  const endX = Math.min(mapW, Math.ceil((camera.x + GW) / TILE) + 1);
  const endY = Math.min(mapH, Math.ceil((camera.y + GH) / TILE) + 1);

  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      const tile = map[y][x];
      const tx = x * TILE, ty = y * TILE;

      if (tile === 1) {
        const shade = ((x + y) % 3 === 0) ? '#2a3a4a' : ((x * y) % 5 === 0) ? '#3a4a5a' : '#1a2a3a';
        ctx.fillStyle = shade;
        ctx.fillRect(tx, ty, TILE, TILE);
        if (y > 0 && map[y - 1][x] === 0) {
          ctx.fillStyle = '#4a5a6a';
          ctx.fillRect(tx, ty, TILE, 2);
        }
        // Bottom edge shadow
        if (y < mapH - 1 && map[y + 1][x] === 0) {
          ctx.fillStyle = '#0a1a2a';
          ctx.fillRect(tx, ty + TILE - 2, TILE, 2);
        }
      } else if (tile === 2) {
        // Regular coral
        const hue = ((x * 7 + y * 13) % 4);
        const colors = ['#a855f7', '#e6482e', '#f4b41b', '#3cacd7'];
        ctx.fillStyle = colors[hue];
        ctx.beginPath();
        ctx.arc(tx + TILE / 2, ty + TILE * 0.7, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(tx + TILE / 2 - 2, ty + TILE * 0.7, 4, TILE * 0.3);
        ctx.beginPath();
        ctx.arc(tx + TILE * 0.3, ty + TILE * 0.8, 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (tile === 3) {
        // Kelp
        const sway = Math.sin(frame * 0.03 + x * 0.5) * 5;
        ctx.strokeStyle = '#2a7744';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(tx + TILE / 2, ty + TILE);
        ctx.quadraticCurveTo(tx + TILE / 2 + sway, ty + TILE * 0.5, tx + TILE / 2 + sway * 1.5, ty);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.fillStyle = '#3a9955';
        ctx.beginPath();
        ctx.ellipse(tx + TILE / 2 + sway, ty + TILE * 0.3, 6, 3, sway * 0.1, 0, Math.PI * 2);
        ctx.fill();
      } else if (tile === 4) {
        // Crystal
        ctx.fillStyle = '#88aaff';
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.05 + x + y) * 0.3;
        ctx.beginPath();
        ctx.moveTo(tx + TILE / 2, ty);
        ctx.lineTo(tx + TILE * 0.8, ty + TILE * 0.6);
        ctx.lineTo(tx + TILE / 2, ty + TILE);
        ctx.lineTo(tx + TILE * 0.2, ty + TILE * 0.6);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (tile === 5) {
        // Thermal vent
        ctx.fillStyle = '#443322';
        ctx.fillRect(tx + 8, ty + 16, 16, 16);
        if (Math.sin(frame * 0.05 + x) > 0) {
          ctx.globalAlpha = 0.4;
          ctx.fillStyle = '#ffaa44';
          for (let b = 0; b < 3; b++) {
            const boff = (frame * 2 + b * 20) % 40;
            ctx.beginPath();
            ctx.arc(tx + TILE / 2 + Math.sin(frame * 0.1 + b) * 4, ty + 16 - boff, 3 - b * 0.5, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      } else if (tile === 6) {
        // Mycelial coral - bioluminescent pulsing
        const glow = 0.4 + Math.sin(frame * 0.04 + x * 0.7 + y * 0.3) * 0.3;
        ctx.globalAlpha = glow;
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(tx + TILE / 2, ty + TILE * 0.6, 9, 0, Math.PI * 2);
        ctx.fill();
        // Tendrils
        ctx.strokeStyle = '#a855f7';
        ctx.lineWidth = 2;
        const sway = Math.sin(frame * 0.025 + x) * 4;
        for (let t = 0; t < 3; t++) {
          ctx.beginPath();
          ctx.moveTo(tx + TILE / 2 + (t - 1) * 6, ty + TILE * 0.6);
          ctx.quadraticCurveTo(tx + TILE / 2 + (t - 1) * 8 + sway, ty + TILE * 0.3, tx + TILE / 2 + (t - 1) * 5 + sway * 1.5, ty);
          ctx.stroke();
        }
        ctx.lineWidth = 1;
        // Spore dots
        ctx.fillStyle = '#f4b41b';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06 + x + y) * 0.3;
        ctx.beginPath();
        ctx.arc(tx + TILE * 0.3 + sway, ty + TILE * 0.2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(tx + TILE * 0.7 + sway * 0.5, ty + TILE * 0.15, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (tile === 7) {
        // Spore vent (hazard)
        ctx.fillStyle = '#332211';
        ctx.fillRect(tx + 6, ty + 16, 20, 16);
        // Toxic spore plume
        ctx.globalAlpha = 0.5;
        const puff = Math.sin(frame * 0.04 + x) * 0.5 + 0.5;
        ctx.fillStyle = '#88cc22';
        for (let s = 0; s < 4; s++) {
          const sy2 = ty + 14 - (frame * 1.5 + s * 12) % 35;
          const sx2 = tx + TILE / 2 + Math.sin(frame * 0.08 + s * 2) * 6;
          ctx.beginPath();
          ctx.arc(sx2, sy2, 3 * puff + s * 0.3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Surface water line
      if (y === 0 && surfaceY > 0) {
        ctx.fillStyle = '#44aacc';
        ctx.globalAlpha = 0.4;
        const waveY = ty + TILE - 4 + Math.sin(frame * 0.04 + x * 0.5) * 3;
        ctx.fillRect(tx, waveY, TILE, 4);
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawCurrents() {
  for (const c of currents) {
    if (!c.active) continue;
    ctx.globalAlpha = 0.3;
    if (c.goo) {
      // Goo currents - green toxic look
      ctx.fillStyle = '#44aa22';
      ctx.fillRect(c.x, c.y, c.w, c.h);
      // Goo bubbles
      for (let i = 0; i < 4; i++) {
        const gx = c.x + (frame * 1.5 + i * c.w / 4) % c.w;
        const gy = c.y + c.h / 2 + Math.sin(frame * 0.05 + i) * 4;
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#88ff44';
        ctx.beginPath();
        ctx.arc(gx, gy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      ctx.fillStyle = c.dir < 0 ? '#4488ff' : '#ff8844';
      ctx.fillRect(c.x, c.y, c.w, c.h);
      for (let i = 0; i < 3; i++) {
        const ax = c.x + (frame * 2 + i * c.w / 3) % c.w;
        const ay = c.y + c.h / 2;
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.moveTo(ax, ay - 4);
        ctx.lineTo(ax, ay + 4);
        ctx.lineTo(ax + 8 * (c.dir < 0 ? -1 : 1), ay);
        ctx.closePath();
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
}

function drawAirPockets() {
  for (const ap of airPockets) {
    if (ap.used) continue;
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.06) * 0.2;
    ctx.fillStyle = '#aaeeff';
    ctx.beginPath();
    ctx.arc(ap.x, ap.y, 10 + Math.sin(frame * 0.04) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
    for (let b = 0; b < 3; b++) {
      const by = ap.y - 15 - ((frame + b * 25) % 40);
      const bx = ap.x + Math.sin(frame * 0.05 + b * 1.2) * 6;
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#aaeeff';
      ctx.beginPath();
      ctx.arc(bx, by, 1.5 + b * 0.3, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawShells() {
  for (const sh of shells) {
    if (!sh.active) continue;
    const bob = Math.sin(frame * 0.04) * 3;
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(sh.x, sh.y + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#7a444a';
    ctx.beginPath();
    ctx.arc(sh.x - 2, sh.y + bob - 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = Math.abs(Math.sin(frame * 0.08));
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sh.x + 4, sh.y + bob - 5, 2, 2);
    ctx.globalAlpha = 1;
  }
}

function drawItems() {
  for (const item of items) {
    if (!item.active) continue;
    const bob = Math.sin(item.bob) * 4;
    const glow = 0.6 + Math.sin(frame * 0.06 + item.bob) * 0.2;
    ctx.globalAlpha = glow;
    switch (item.type) {
      case 'spore_pearl':
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.arc(item.x, item.y + bob, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = glow * 0.5;
        ctx.beginPath();
        ctx.arc(item.x - 2, item.y + bob - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'reactor_shard':
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.moveTo(item.x, item.y + bob - 7);
        ctx.lineTo(item.x + 5, item.y + bob);
        ctx.lineTo(item.x, item.y + bob + 7);
        ctx.lineTo(item.x - 5, item.y + bob);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#f4b41b';
        ctx.lineWidth = 1;
        ctx.stroke();
        break;
      case 'myco_essence':
        ctx.fillStyle = '#7a444a';
        ctx.beginPath();
        ctx.arc(item.x, item.y + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        // Swirl
        ctx.strokeStyle = '#a855f7';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(item.x, item.y + bob, 8, frame * 0.05, frame * 0.05 + Math.PI);
        ctx.stroke();
        break;
      case 'goo_orb':
        ctx.fillStyle = '#3cacd7';
        ctx.beginPath();
        ctx.arc(item.x, item.y + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
    ctx.globalAlpha = 1;
  }
}

function drawCrystals() {
  for (const cr of crystals) {
    ctx.save();
    ctx.translate(cr.x + TILE / 2, cr.y + TILE / 2);
    ctx.globalAlpha = cr.lit ? 0.9 : 0.6;
    ctx.fillStyle = cr.lit ? '#aaddff' : '#6688aa';
    ctx.beginPath();
    ctx.moveTo(0, -14);
    ctx.lineTo(10, 0);
    ctx.lineTo(0, 14);
    ctx.lineTo(-10, 0);
    ctx.closePath();
    ctx.fill();
    if (cr.lit) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(0, 0, 20, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawExit() {
  if (!exitZone) return;
  if (bossActive) {
    // Locked exit when boss alive
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(exitZone.x, exitZone.y, exitZone.w, exitZone.h);
    ctx.strokeStyle = '#ff6666';
    ctx.lineWidth = 2;
    ctx.strokeRect(exitZone.x, exitZone.y, exitZone.w, exitZone.h);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS!', exitZone.x + exitZone.w / 2, exitZone.y + exitZone.h / 2 + 4);
    return;
  }
  const pulse = Math.sin(frame * 0.06) * 0.2 + 0.5;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.fillRect(exitZone.x, exitZone.y, exitZone.w, exitZone.h);
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.strokeRect(exitZone.x, exitZone.y, exitZone.w, exitZone.h);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', exitZone.x + exitZone.w / 2, exitZone.y + exitZone.h / 2 + 5);
}

function drawNPCs() {
  for (const npc of npcs) {
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.ellipse(npc.x + 12, npc.y + 10, 10, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(npc.x + 18, npc.y + 8, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#3cacd7';
    ctx.beginPath();
    ctx.moveTo(npc.x + 2, npc.y + 10);
    ctx.lineTo(npc.x - 5, npc.y + 4);
    ctx.lineTo(npc.x - 5, npc.y + 16);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
    ctx.fillStyle = '#38d973';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('~', npc.x + 12, npc.y - 4);
    ctx.globalAlpha = 1;

    if (npc.showMsg > 0) {
      npc.showMsg -= 1 / 60;
      ctx.fillStyle = 'rgba(26,28,44,0.9)';
      const tw = ctx.measureText(npc.msg).width + 12;
      ctx.fillRect(npc.x + 12 - tw / 2, npc.y - 24, tw, 16);
      ctx.fillStyle = '#f4b41b';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(npc.msg, npc.x + 12, npc.y - 13);
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.stunned > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
    }

    switch (e.type) {
      case 'spore_jelly':
        // Bioluminescent spore jellyfish
        ctx.fillStyle = '#a855f7';
        ctx.globalAlpha = (e.stunned > 0 ? 0.4 : 0.7);
        ctx.beginPath();
        ctx.ellipse(e.x + e.w / 2, e.y + 6, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        // Bioluminescent core
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08) * 0.2;
        ctx.fillStyle = '#ff88ff';
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + 6, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = (e.stunned > 0 ? 0.4 : 0.7);
        // Tentacles with spore tips
        ctx.strokeStyle = '#aa33dd';
        ctx.lineWidth = 1;
        for (let t = 0; t < 4; t++) {
          const ttx = e.x + 4 + t * 4;
          ctx.beginPath();
          ctx.moveTo(ttx, e.y + 10);
          ctx.quadraticCurveTo(ttx + Math.sin(frame * 0.08 + t) * 4, e.y + 17, ttx + Math.sin(frame * 0.06 + t * 0.7) * 2, e.y + 24);
          ctx.stroke();
          // Spore dot at tip
          ctx.fillStyle = '#ff66ff';
          ctx.beginPath();
          ctx.arc(ttx + Math.sin(frame * 0.06 + t * 0.7) * 2, e.y + 24, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        break;

      case 'reef_shark':
        ctx.fillStyle = e.stunned > 0 ? '#556677' : '#667788';
        ctx.beginPath();
        ctx.ellipse(e.x + e.w / 2, e.y + e.h / 2, 14, 7, Math.atan2(e.vy || 0, e.vx || 1), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#778899';
        ctx.beginPath();
        ctx.moveTo(e.x + e.w / 2, e.y);
        ctx.lineTo(e.x + e.w / 2 - 4, e.y - 8);
        ctx.lineTo(e.x + e.w / 2 + 6, e.y);
        ctx.closePath();
        ctx.fill();
        // Scar marks
        ctx.strokeStyle = '#445566';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x + e.w * 0.4, e.y + e.h * 0.3);
        ctx.lineTo(e.x + e.w * 0.5, e.y + e.h * 0.5);
        ctx.stroke();
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.7, e.y + e.h * 0.4, 2, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'pufferfish':
        ctx.fillStyle = e.inflated ? '#ffaa44' : '#ddaa33';
        const r = e.inflated ? 12 : 8;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, r, 0, Math.PI * 2);
        ctx.fill();
        if (e.inflated) {
          ctx.strokeStyle = '#ff6622';
          ctx.lineWidth = 1.5;
          for (let s = 0; s < 8; s++) {
            const sa = s * Math.PI / 4;
            ctx.beginPath();
            ctx.moveTo(e.x + e.w / 2 + Math.cos(sa) * r, e.y + e.h / 2 + Math.sin(sa) * r);
            ctx.lineTo(e.x + e.w / 2 + Math.cos(sa) * (r + 5), e.y + e.h / 2 + Math.sin(sa) * (r + 5));
            ctx.stroke();
          }
        }
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2 + 3, e.y + e.h / 2 - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'reactor_eel':
        // Electric eel with reactor glow
        ctx.strokeStyle = e.stunned > 0 ? '#555533' : '#88aa33';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y + e.h / 2);
        for (let s = 0; s < 6; s++) {
          ctx.lineTo(e.x + s * 4, e.y + e.h / 2 + Math.sin(frame * 0.12 + s) * 5);
        }
        ctx.stroke();
        ctx.lineWidth = 1;
        // Reactor core glow
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.fillStyle = '#44ff88';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.5, e.y + e.h / 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = e.stunned > 0 ? 0.5 : 1;
        // Head
        ctx.fillStyle = '#aacc44';
        ctx.beginPath();
        ctx.arc(e.x + e.w, e.y + e.h / 2, 5, 0, Math.PI * 2);
        ctx.fill();
        // Electric arcs when lunging
        if (e.lunging) {
          ctx.strokeStyle = '#ffff44';
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.6;
          for (let a = 0; a < 3; a++) {
            ctx.beginPath();
            ctx.moveTo(e.x + e.w, e.y + e.h / 2);
            ctx.lineTo(e.x + e.w + 8 + Math.random() * 6, e.y + e.h / 2 + (Math.random() - 0.5) * 12);
            ctx.stroke();
          }
        }
        ctx.fillStyle = '#ff4400';
        ctx.globalAlpha = e.stunned > 0 ? 0.5 : 1;
        ctx.beginPath();
        ctx.arc(e.x + e.w + 2, e.y + e.h / 2 - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'fungal_octopus':
        // Purple-green fungal octopus
        ctx.fillStyle = e.stunned > 0 ? '#664444' : '#664466';
        ctx.beginPath();
        ctx.ellipse(e.x + e.w / 2, e.y + 8, 10, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Fungal spots
        ctx.fillStyle = '#44aa66';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.3, e.y + 5, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.6, e.y + 8, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = e.stunned > 0 ? 0.5 : 1;
        // Tentacles
        ctx.strokeStyle = '#aa5577';
        ctx.lineWidth = 2;
        for (let t = 0; t < 6; t++) {
          const baseX = e.x + 4 + t * 4;
          ctx.beginPath();
          ctx.moveTo(baseX, e.y + 14);
          ctx.quadraticCurveTo(
            baseX + Math.sin(frame * 0.06 + t * 1.2) * 8,
            e.y + 20,
            baseX + Math.sin(frame * 0.04 + t) * 5,
            e.y + 28
          );
          ctx.stroke();
        }
        ctx.lineWidth = 1;
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.35, e.y + 6, 3, 0, Math.PI * 2);
        ctx.arc(e.x + e.w * 0.65, e.y + 6, 3, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'reactor_drone':
        ctx.fillStyle = e.stunned > 0 ? '#444444' : '#556677';
        ctx.fillRect(e.x + 2, e.y + 2, e.w - 4, e.h - 4);
        ctx.strokeStyle = '#88aacc';
        ctx.strokeRect(e.x + 2, e.y + 2, e.w - 4, e.h - 4);
        // Reactor core
        ctx.fillStyle = '#44ffaa';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = e.stunned > 0 ? 0.5 : 1;
        ctx.strokeStyle = '#aaccdd';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(e.x + 2, e.y + e.h);
        ctx.lineTo(e.x - 3, e.y + e.h + 4);
        ctx.moveTo(e.x + e.w - 2, e.y + e.h);
        ctx.lineTo(e.x + e.w + 3, e.y + e.h + 4);
        ctx.stroke();
        break;

      case 'goo_minnow':
        // Small, fast, green goo fish
        ctx.fillStyle = e.stunned > 0 ? '#335533' : '#44aa44';
        ctx.beginPath();
        ctx.ellipse(e.x + e.w / 2, e.y + e.h / 2, 6, 4, Math.sin(e.phase * 2) * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88ff88';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.7, e.y + e.h * 0.4, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Goo trail
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#44cc44';
        ctx.beginPath();
        ctx.arc(e.x - 2, e.y + e.h / 2, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
    ctx.globalAlpha = 1;
  }
}

function drawBoss() {
  const b = bossActive;
  if (!b) return;

  if (b.stunned > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
  }

  if (b.type === 'reactor_leviathan') {
    // Massive reactor-fused sea serpent
    ctx.fillStyle = b.enraged ? '#886644' : '#667755';
    ctx.beginPath();
    ctx.ellipse(b.x + b.w / 2, b.y + b.h / 2, 24, 14, Math.atan2(b.vy || 0, b.vx || 1), 0, Math.PI * 2);
    ctx.fill();
    // Reactor plates
    ctx.fillStyle = '#445566';
    for (let p = 0; p < 3; p++) {
      ctx.fillRect(b.x + 8 + p * 12, b.y + 4, 8, 4);
    }
    // Glowing reactor core
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
    ctx.fillStyle = b.enraged ? '#ff4444' : '#44ffaa';
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = b.stunned > 0 ? 0.5 : 1;
    // Eyes
    ctx.fillStyle = b.enraged ? '#ff0000' : '#ffaa00';
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.8, b.y + b.h * 0.3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.8, b.y + b.h * 0.6, 3, 0, Math.PI * 2);
    ctx.fill();
    // Tail segments
    for (let s = 0; s < 4; s++) {
      const tx2 = b.x - 10 - s * 12 + Math.sin(b.phase + s * 0.5) * 6;
      const ty2 = b.y + b.h / 2 + Math.cos(b.phase + s * 0.3) * 4;
      ctx.fillStyle = '#556644';
      ctx.beginPath();
      ctx.ellipse(tx2, ty2, 8 - s, 6 - s * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (b.type === 'spore_queen') {
    // Giant fungal organism
    ctx.fillStyle = b.enraged ? '#884466' : '#664488';
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, 20, 0, Math.PI * 2);
    ctx.fill();
    // Fungal crown
    ctx.fillStyle = '#aa66cc';
    for (let c = 0; c < 5; c++) {
      const ca = c * Math.PI * 2 / 5 + b.phase * 0.2;
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2 + Math.cos(ca) * 18, b.y + b.h / 2 + Math.sin(ca) * 18 - 5, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    // Spore glow
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05) * 0.2;
    ctx.fillStyle = b.enraged ? '#ff88ff' : '#88ffaa';
    ctx.beginPath();
    ctx.arc(b.x + b.w / 2, b.y + b.h / 2, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = b.stunned > 0 ? 0.5 : 1;
    // Tentacles
    if (b.tentacles) {
      ctx.strokeStyle = '#aa5588';
      ctx.lineWidth = 3;
      for (const t of b.tentacles) {
        const endX = b.x + b.w / 2 + Math.cos(t.angle) * t.len;
        const endY = b.y + b.h / 2 + Math.sin(t.angle) * t.len;
        const midX = b.x + b.w / 2 + Math.cos(t.angle) * t.len * 0.5 + Math.sin(t.phase) * 6;
        const midY = b.y + b.h / 2 + Math.sin(t.angle) * t.len * 0.5 + Math.cos(t.phase) * 6;
        ctx.beginPath();
        ctx.moveTo(b.x + b.w / 2, b.y + b.h / 2);
        ctx.quadraticCurveTo(midX, midY, endX, endY);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    }
    // Eyes
    ctx.fillStyle = b.enraged ? '#ff4444' : '#ffcc44';
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.35, b.y + b.h * 0.4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.65, b.y + b.h * 0.4, 4, 0, Math.PI * 2);
    ctx.fill();
    // Pupils
    ctx.fillStyle = '#000';
    const pa = TAS.math.angle(b.x + b.w / 2, b.y + b.h / 2, player.x, player.y);
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.35 + Math.cos(pa) * 2, b.y + b.h * 0.4 + Math.sin(pa) * 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x + b.w * 0.65 + Math.cos(pa) * 2, b.y + b.h * 0.4 + Math.sin(pa) * 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boss HP bar
  ctx.globalAlpha = 1;
  const barW = 60;
  const barX = b.x + b.w / 2 - barW / 2;
  const barY = b.y - 12;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, 5);
  const hpPct = b.hp / b.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffaa44' : '#ff4444';
  ctx.fillRect(barX + 1, barY + 1, (barW - 2) * hpPct, 3);
}

function drawBaseling(x, y, angle, tailPhase, invuln) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  if (invuln) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.4) * 0.3;
  }

  // Body
  ctx.fillStyle = statB.color || '#44aadd';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#88ddff';
  ctx.beginPath();
  ctx.ellipse(2, 2, 8, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Dorsal fin
  ctx.fillStyle = '#3388bb';
  ctx.beginPath();
  ctx.moveTo(-2, -6);
  ctx.lineTo(4, -10);
  ctx.lineTo(8, -6);
  ctx.closePath();
  ctx.fill();

  // Tail
  const tailSway = Math.sin(tailPhase) * 4;
  ctx.fillStyle = '#3399cc';
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(-18, -5 + tailSway);
  ctx.lineTo(-18, 5 + tailSway);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(8, -2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#112233';
  ctx.beginPath();
  ctx.arc(9, -2, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Pectoral fins
  ctx.fillStyle = '#55bbdd';
  ctx.beginPath();
  ctx.ellipse(2, 5, 4, 2, Math.sin(tailPhase * 0.5) * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Powerup glow
  if (player.powerup === 'reactor_shard') {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.15;
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.powerup === 'myco_essence') {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.08) * 0.1;
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPlayer() {
  const px = player.x + player.w / 2;
  const py = player.y + player.h / 2;

  // Charge trail - enhanced
  if (player.charging) {
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = '#88eeff';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(px - Math.cos(player.angle) * 18, py - Math.sin(player.angle) * 18);
    ctx.lineTo(px - Math.cos(player.angle) * 38, py - Math.sin(player.angle) * 38);
    ctx.stroke();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(px - Math.cos(player.angle) * 15, py - Math.sin(player.angle) * 15);
    ctx.lineTo(px - Math.cos(player.angle) * 30, py - Math.sin(player.angle) * 30);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, px, py, Math.max(player.w, player.h), { flipX: Math.cos(player.angle) < 0, frame: frame })) {
    drawBaseling(px, py, player.angle, player.tailPhase, player.invuln > 0);
  }

  // Bubble trail - enhanced wobble
  if (Math.abs(player.vx) > 20 || Math.abs(player.vy) > 20) {
    if (frame % 3 === 0) {
      bubbles.push({
        x: px - Math.cos(player.angle) * 14 + (Math.random() - 0.5) * 4,
        y: py - Math.sin(player.angle) * 14 + (Math.random() - 0.5) * 4,
        vy: -15 - Math.random() * 15,
        vx: (Math.random() - 0.5) * 6,
        size: 1 + Math.random() * 2.5,
        life: 1.5 + Math.random(),
        wobble: Math.random() * 6.28
      });
    }
  }
}

function drawBubbles() {
  ctx.lineWidth = 1;
  for (const b of bubbles) {
    ctx.globalAlpha = Math.min(b.life * 0.4, 0.5);
    // Gradient-like bubble effect
    ctx.strokeStyle = '#88ccee';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.stroke();
    // Highlight
    if (b.size > 2) {
      ctx.globalAlpha = Math.min(b.life * 0.2, 0.3);
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(b.x - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawSonarPings() {
  for (const ping of sonarPings) {
    const color = ping.hostile ? '#ff4444' : '#88ddff';
    ctx.globalAlpha = ping.alpha * 0.6;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(ping.x, ping.y, ping.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = ping.alpha * 0.3;
    ctx.beginPath();
    ctx.arc(ping.x, ping.y, ping.radius * 0.6, 0, Math.PI * 2);
    ctx.stroke();
    // Third inner ring for more detail
    ctx.globalAlpha = ping.alpha * 0.15;
    ctx.beginPath();
    ctx.arc(ping.x, ping.y, ping.radius * 0.3, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  ctx.globalAlpha = 1;
}

function drawDarkness() {
  const px = player.x + player.w / 2 - camera.x;
  const py = player.y + player.h / 2 - camera.y;

  // INT affects base light radius via sonar bonus
  let lightRadius = 60 * sonarRadiusBonus();
  for (const ping of sonarPings) {
    const pingR = ping.radius - TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, ping.x, ping.y);
    if (pingR > 0) lightRadius = Math.max(lightRadius, (pingR + 60) * sonarRadiusBonus());
  }

  const grad = ctx.createRadialGradient(px, py, lightRadius * 0.3, px, py, lightRadius);
  grad.addColorStop(0, 'rgba(0,5,15,0)');
  grad.addColorStop(0.7, 'rgba(0,5,15,' + (levelDarkness * 0.7) + ')');
  grad.addColorStop(1, 'rgba(0,5,15,' + levelDarkness + ')');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);
}

function drawLightRays() {
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#aaeeff';
  for (let i = 0; i < 6; i++) {
    const rx = (i * 100 + frame * 0.15) % (GW + 100) - 50;
    const rw = 15 + Math.sin(frame * 0.01 + i) * 8;
    ctx.beginPath();
    ctx.moveTo(rx, 0);
    ctx.lineTo(rx + rw, 0);
    ctx.lineTo(rx + rw * 2.5, GH);
    ctx.lineTo(rx + rw * 1.5, GH);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawCaustics() {
  ctx.globalAlpha = 0.04;
  ctx.strokeStyle = '#88ddff';
  ctx.lineWidth = 1;
  for (let i = 0; i < 10; i++) {
    const ccx = (i * 70 + Math.sin(frame * 0.015 + i) * 30) % GW;
    const ccy = (i * 50 + Math.cos(frame * 0.012 + i * 0.7) * 20) % GH;
    ctx.beginPath();
    ctx.moveTo(ccx, ccy);
    ctx.quadraticCurveTo(ccx + 15, ccy + Math.sin(frame * 0.02 + i) * 10, ccx + 35, ccy);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const barH = 30;
  ctx.fillStyle = 'rgba(26,28,44,0.85)';
  ctx.fillRect(0, 0, GW, barH);

  // Score - INT boosts display
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('POOP ' + score, 6, 12);

  // Level / zone
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.fillText('ZONE ' + (level + 1), GW / 2, 12);

  // HP Hearts
  ctx.textAlign = 'right';
  for (let i = 0; i < MAX_HP; i++) {
    ctx.fillStyle = i < player.hp ? '#e6482e' : '#333';
    ctx.beginPath();
    const hx = GW - 10 - i * 16;
    ctx.arc(hx - 3, 8, 4, 0, Math.PI * 2);
    ctx.arc(hx + 3, 8, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx - 7, 9);
    ctx.lineTo(hx, 16);
    ctx.lineTo(hx + 7, 9);
    ctx.closePath();
    ctx.fill();
  }

  // Air meter
  const airW = 80;
  const airX = GW / 2 - airW / 2;
  const airY = 18;
  const airH = 8;
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(airX, airY, airW, airH);
  const airPct = player.air / MAX_AIR;
  const airColor = airPct > 0.5 ? '#3cacd7' : airPct > 0.25 ? '#f4b41b' : '#e6482e';
  ctx.fillStyle = airColor;
  ctx.fillRect(airX + 1, airY + 1, (airW - 2) * airPct, airH - 2);
  ctx.fillStyle = '#3cacd7';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('AIR', GW / 2, airY + airH - 1);

  // Sonar cooldown - NES style
  if (player.sonarCooldown > 0) {
    ctx.fillStyle = '#7a444a';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('[A] ' + player.sonarCooldown.toFixed(1), 6, 26);
  } else {
    ctx.fillStyle = '#38d973';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('[A] RDY', 6, 26);
  }

  // Charge cooldown
  if (player.chargeCooldown > 0) {
    ctx.fillStyle = '#7a444a';
    ctx.font = '8px monospace';
    ctx.fillText('[B] ' + player.chargeCooldown.toFixed(1), 68, 26);
  } else {
    ctx.fillStyle = '#a855f7';
    ctx.font = '8px monospace';
    ctx.fillText('[B] RDY', 68, 26);
  }

  // Powerup indicator
  if (player.powerup) {
    const pName = player.powerup === 'reactor_shard' ? 'POOP SHARD' : 'GARDEN SPORE';
    const pColor = player.powerup === 'reactor_shard' ? '#38d973' : '#a855f7';
    ctx.fillStyle = pColor;
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pName + ' ' + Math.ceil(player.powerupTimer) + 's', GW / 2, GH - 36);
  }

  // Boss HP bar at top center
  if (bossActive) {
    const bossBarW = 120;
    const bossBarX = GW / 2 - bossBarW / 2;
    const bossBarY = barH + 4;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bossBarX - 2, bossBarY - 2, bossBarW + 4, 12);
    ctx.fillStyle = '#222';
    ctx.fillRect(bossBarX, bossBarY, bossBarW, 8);
    const bhpPct = bossActive.hp / bossActive.maxHp;
    ctx.fillStyle = bhpPct > 0.5 ? '#ff4466' : bhpPct > 0.25 ? '#ffaa44' : '#ff4444';
    ctx.fillRect(bossBarX + 1, bossBarY + 1, (bossBarW - 2) * bhpPct, 6);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    const bossName = bossActive.type === 'reactor_leviathan' ? 'POOP LEVIATHAN' : 'SPORE QUEEN';
    ctx.fillText(bossName, GW / 2, bossBarY + 7);
  }

  // Mini compass to exit
  if (exitZone && state === 'playing') {
    const dx = exitZone.x + exitZone.w / 2 - (player.x + player.w / 2);
    const dy = exitZone.y + exitZone.h / 2 - (player.y + player.h / 2);
    const a = Math.atan2(dy, dx);
    const compassX = GW - 30;
    const compassY = GH - 30;
    ctx.strokeStyle = bossActive ? '#e6482e' : '#38d973';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(compassX, compassY, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(compassX, compassY);
    ctx.lineTo(compassX + Math.cos(a) * 10, compassY + Math.sin(a) * 10);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.fillStyle = bossActive ? '#e6482e' : '#38d973';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(bossActive ? 'BOSS' : 'EXIT', compassX, compassY + 22);
  }
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
