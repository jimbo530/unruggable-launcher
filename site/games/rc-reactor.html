// DEX<-moveSpeed, CON<-health, INT<-luck, WIS<-luck, CHA<-luck. Tracks are land (forest/cave/

function statMod(val) { return Math.floor((val - 10) / 2); }
function statPct(val) { return val / 20; } // 0.5 at 10, 1.0 at 20
function strBonus() { return 1 + statMod(statB.str) * 0.08; }   // barrier smash, ram damage
function dexBonus() { return 1 + statMod(statB.dex) * 0.06; }   // steering, spin recovery
function conBonus() { return 1 + statMod(statB.con) * 0.05; }   // shield duration, hit resist
function intBonus() { return 1 + statMod(statB.int) * 0.07; }   // item effectiveness, missile speed
function wisBonus() { return 1 + statMod(statB.wis) * 0.05; }   // hazard detection, shortcut bonus
function chaBonus() { return 1 + statMod(statB.cha) * 0.04; }   // score mult, item luck

// === TRACK DEFINITIONS ===
function generateTrackPath(waypoints, segments) {
  var path = [];
  for (var i = 0; i < waypoints.length; i++) {
    var a = waypoints[i];
    var b = waypoints[(i + 1) % waypoints.length];
    for (var t = 0; t < segments; t++) {
      path.push({
        x: a.x + (b.x - a.x) * (t / segments),
        y: a.y + (b.y - a.y) * (t / segments)
      });
    }
  }
  return path;
}

function buildOval() {
  var pts = [];
  for (var i = 0; i < 40; i++) {
    var a = (i / 40) * Math.PI * 2;
    pts.push({ x: 10 + Math.cos(a) * 6, y: 10 + Math.sin(a) * 4 });
  }
  return pts;
}

function buildFigure8() {
  var pts = [];
  for (var i = 0; i < 50; i++) {
    var a = (i / 50) * Math.PI * 2;
    var r = 4;
    pts.push({ x: 10 + Math.sin(a) * r, y: 10 + Math.sin(2 * a) * (r * 0.6) });
  }
  return pts;
}

function buildChicane() {
  var pts = [];
  for (var i = 0; i < 48; i++) {
    var t = i / 48;
    var a = t * Math.PI * 2;
    var wobble = Math.sin(a * 3) * 1.5;
    pts.push({ x: 10 + Math.cos(a) * (5 + wobble), y: 10 + Math.sin(a) * (4 + wobble * 0.5) });
  }
  return pts;
}

function buildJumps() {
  var pts = [];
  for (var i = 0; i < 44; i++) {
    var a = (i / 44) * Math.PI * 2;
    var r = 5 + Math.abs(Math.sin(a * 4)) * 1.2;
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.7) });
  }
  return pts;
}

function buildRain() {
  var pts = buildOval();
  for (var i = 0; i < pts.length; i += 5) {
    pts[i].x += (Math.random() - 0.5) * 0.8;
    pts[i].y += (Math.random() - 0.5) * 0.5;
  }
  return pts;
}

function buildNight() {
  var pts = [];
  for (var i = 0; i < 52; i++) {
    var a = (i / 52) * Math.PI * 2;
    var r = 5.5 + Math.sin(a * 2) * 1.5;
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.65) });
  }
  return pts;
}

function buildShortcuts() {
  var pts = [];
  for (var i = 0; i < 46; i++) {
    var a = (i / 46) * Math.PI * 2;
    var r = 5 + ((i % 12) < 3 ? -1.5 : 0);
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.7) });
  }
  return pts;
}

function buildDestructible() {
  var pts = [];
  for (var i = 0; i < 44; i++) {
    var a = (i / 44) * Math.PI * 2;
    var sq = Math.max(Math.abs(Math.cos(a)), Math.abs(Math.sin(a)));
    var r = 5 / sq * 0.85;
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.65) });
  }
  return pts;
}

function buildFrozen() {
  var pts = [];
  for (var i = 0; i < 48; i++) {
    var a = (i / 48) * Math.PI * 2;
    var r = 5 + Math.sin(a * 5) * 0.8;
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.7) });
  }
  return pts;
}

function buildFinalCircuit() {
  var pts = [];
  for (var i = 0; i < 56; i++) {
    var a = (i / 56) * Math.PI * 2;
    var r = 6 + Math.sin(a * 3) * 1.2 + Math.cos(a * 5) * 0.8;
    pts.push({ x: 10 + Math.cos(a) * r, y: 10 + Math.sin(a) * (r * 0.6) });
  }
  return pts;
}

// === ISOMETRIC HELPERS ===
function toIso(gx, gy) {
  return {
    x: GW / 2 + (gx - gy) * ISO_TX,
    y: 80 + (gx + gy) * ISO_TY
  };
}

function getTrackScreenPos(pathIdx, lane) {
  var idx = ((pathIdx % trackPath.length) + trackPath.length) % trackPath.length;
  var pt = trackPath[idx];
  var nextIdx = (idx + 1) % trackPath.length;
  var npt = trackPath[nextIdx];
  var dx = npt.x - pt.x;
  var dy = npt.y - pt.y;
  var len = Math.sqrt(dx * dx + dy * dy) || 1;
  var nx = -dy / len;
  var ny = dx / len;
  var laneOff = (lane - 1) * 0.4;
  var gx = pt.x + nx * laneOff;
  var gy = pt.y + ny * laneOff;
  return toIso(gx, gy);
}

// === SCORE POPUP SYSTEM ===
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, vy: -1.5 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.life -= dt;
    p.y += p.vy;
    p.vy -= 0.02;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

      // Swamp reed
      px(bx, by - 6, 1, 6, '#4a6a2a');
      px(bx - 1, by - 7, 3, 2, '#3a5a1a');
      if (d.variant === 1) {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#88aa44';
        ctx.beginPath();
        ctx.ellipse(bx, by, 4, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (d.type === 'cave') {
      // Stalactite/stalagmite
      px(bx - 1, by - 6, 3, 6, '#4a4a4a');
      px(bx, by - 8, 1, 3, '#5a5a5a');
      if (d.variant === 2) {
        px(bx - 1, by - 4, 1, 1, '#ffcc44'); // glowing ore
      }
    } else if (d.type === 'reactor') {
      // Glowing pipe
      px(bx - 1, by - 5, 2, 5, '#3a3a4a');
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08 + i * 0.5) * 0.3;
      px(bx - 1, by - 5, 2, 1, '#44ffaa');
      ctx.globalAlpha = 1;
    } else if (d.type === 'tundra') {
      // Ice crystal
      px(bx, by - 5, 1, 5, '#88ccff');
      px(bx - 2, by - 3, 5, 1, '#aaddff');
      px(bx - 1, by - 4, 3, 1, '#cceeFF');
    } else if (d.type === 'volcano') {
      // Lava rock
      px(bx - 2, by - 3, 4, 3, '#4a2a1a');
      if (d.variant === 0) {
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1 + i) * 0.3;
        px(bx - 1, by - 2, 2, 1, '#ff4422');
        ctx.globalAlpha = 1;
      }
    } else if (d.type === 'ruins') {
      // Broken pillar
      px(bx - 1, by - 7, 3, 7, '#6a5a4a');
      px(bx - 2, by - 8, 5, 2, '#7a6a5a');
      if (d.variant === 1) px(bx, by - 9, 1, 2, '#5a4a3a');
    } else if (d.type === 'crystal') {
      // Crystal cluster
      px(bx, by - 6, 1, 6, '#44ddff');
      px(bx - 2, by - 4, 1, 4, '#66eeff');
      px(bx + 1, by - 5, 1, 5, '#88ffff');
      ctx.globalAlpha = 0.3;
      px(bx - 1, by - 5, 3, 3, '#aaffff');
      ctx.globalAlpha = 1;
    } else if (d.type === 'void') {
      // Void rift
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.06 + i * 0.7) * 0.3;
      ctx.fillStyle = '#ff44ff';
      ctx.beginPath();
      ctx.ellipse(bx, by - 2, 3, 5, Math.sin(frame * 0.02 + i) * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// === TRACK INITIALIZATION ===
function initTrack(trackIdx) {
  trackPath = TRACK_BUILDERS[trackIdx]();
  trackHazards = [];
  trackBarriers = [];
  items = [];
  projectiles = [];
  skidMarks = [];
  rainDrops = [];
  enemies = [];
  boss = null;
  nightAlpha = trackIdx === 5 ? 0.7 : 0;
  zoneType = TRACK_ZONES[trackIdx];
  zonePalette = ZONE_PALETTES[zoneType];

  generateZoneDecorations(trackIdx);

  var pathLen = trackPath.length;

  // Place hazards — WIS ref #1: high WIS reduces hazard count
  var hazardReduction = Math.max(0, Math.floor(statMod(statB.wis)));

  if (trackIdx === 3) {
    for (var i = 0; i < 4; i++) trackHazards.push({ pos: Math.floor(pathLen * (i + 1) / 5), type: 'ramp' });
  }
  if (trackIdx === 4) {
    for (var i = 0; i < 200; i++) rainDrops.push({ x: Math.random() * GW, y: Math.random() * GH, speed: 3 + Math.random() * 4 });
  }
  if (trackIdx === 6) {
    for (var i = 0; i < 3; i++) trackHazards.push({ pos: Math.floor(pathLen * (i * 3 + 2) / 10), type: 'shortcut', len: 4 });
  }
  if (trackIdx === 7) {
    var barrierCount = Math.max(2, 6 - hazardReduction);
    for (var i = 0; i < barrierCount; i++) trackBarriers.push({ pos: Math.floor(pathLen * (i + 1) / 7), lane: TAS.math.randInt(0, 2), hp: 2 });
  }
  if (trackIdx === 8) {
    var iceCount = Math.max(3, 8 - hazardReduction);
    for (var i = 0; i < iceCount; i++) trackHazards.push({ pos: Math.floor(pathLen * i / 8), type: 'ice', len: 3 });
  }
  if (trackIdx === 9) {
    for (var i = 0; i < 3; i++) trackHazards.push({ pos: Math.floor(pathLen * i / 8), type: 'ramp' });
    for (var i = 0; i < 4; i++) trackHazards.push({ pos: Math.floor(pathLen * (i + 3) / 8), type: 'ice', len: 2 });
    for (var i = 0; i < 3; i++) trackBarriers.push({ pos: Math.floor(pathLen * (i + 1) / 5), lane: TAS.math.randInt(0, 2), hp: 2 });
  }

  // Tasern hazards — spore clouds and mushroom patches
  if (zoneType === 'spore_field' || zoneType === 'forest') {
    var sporeCount = 2 + Math.floor(trackIdx / 3);
    for (var i = 0; i < sporeCount; i++) {
      trackHazards.push({ pos: TAS.math.randInt(5, pathLen - 5), type: 'spore_cloud' });
    }
  }

  // Oil slicks on most tracks
  if (trackIdx >= 2 && trackIdx !== 8) {
    var oilCount = Math.max(1, 2 + Math.floor(trackIdx / 3) - hazardReduction);
    for (var i = 0; i < oilCount; i++) {
      trackHazards.push({ pos: TAS.math.randInt(5, pathLen - 5), type: 'oil' });
    }
  }

  // Boost pads
  var boostCount = 2 + Math.floor(trackIdx / 4);
  for (var i = 0; i < boostCount; i++) {
    trackHazards.push({ pos: TAS.math.randInt(3, pathLen - 3), type: 'boostpad' });
  }

  // Spawn items and enemies
  spawnTrackItems();
  spawnEnemies(trackIdx);
  spawnBoss(trackIdx);
}

function spawnTrackItems() {
  items = [];
  var pathLen = trackPath.length;
  // CHA ref #1: higher CHA = more items spawn
  var numItems = 6 + currentTrack + Math.floor(statMod(statB.cha));
  for (var i = 0; i < numItems; i++) {
    var pos = TAS.math.randInt(3, pathLen - 3);
    var lane = TAS.math.randInt(0, 2);
    var types = ['missile', 'bomb', 'boost', 'shield', 'letterR', 'letterC', 'spore_pod', 'reactor_cell'];
    // CHA ref #2: luck affects rare item weight
    var luckMod = statPct(statB.cha) * statB.luck;
    var weights = [3, 2, 3, 2, 1, 1, Math.floor(1 + luckMod), Math.floor(1 + luckMod)];
    var total = 0;
    for (var j = 0; j < weights.length; j++) total += weights[j];
    var r = Math.random() * total;
    var type = types[0];
    for (var j = 0; j < weights.length; j++) {
      r -= weights[j];
      if (r <= 0) { type = types[j]; break; }
    }
    items.push({ pos: pos, lane: lane, type: type, active: true, respawn: 300 + TAS.math.randInt(0, 200), timer: 0 });
  }
}

function spawnEnemies(trackIdx) {
  enemies = [];
  var pathLen = trackPath.length;
  var zone = TRACK_ZONES[trackIdx];
  // Enemy types by zone
  var zoneEnemies = {
    forest: ['goblin', 'slime', 'mushfolk'],
    spore_field: ['spore', 'mushfolk', 'slime'],
    swamp: ['slime', 'goblin', 'spore'],
    cave: ['golem', 'wraith', 'drake'],
    reactor: ['spore', 'wraith', 'golem'],
    tundra: ['golem', 'slime', 'wraith'],
    volcano: ['drake', 'golem', 'wraith'],
    ruins: ['wraith', 'goblin', 'mushfolk'],
    crystal: ['golem', 'spore', 'wraith'],
    void: ['wraith', 'drake', 'spore']
  };
  var available = zoneEnemies[zone] || ['goblin', 'slime'];
  // INT ref #1: higher INT = fewer enemies (smarter pathing avoids them)
  var enemyCount = Math.max(2, 4 + Math.floor(trackIdx / 2) - Math.floor(statMod(statB.int) * 0.5));

  for (var i = 0; i < enemyCount; i++) {
    var etype = available[Math.floor(Math.random() * available.length)];
    var template = ENEMY_TYPES[etype];
    enemies.push({
      pos: TAS.math.randInt(5, pathLen - 5),
      lane: TAS.math.randInt(0, 2),
      type: etype,
      hp: template.hp,
      maxHp: template.hp,
      speed: template.speed * (0.8 + trackIdx * 0.03),
      score: template.score,
      color: template.color,
      dir: Math.random() < 0.5 ? 1 : -1,
      active: true,
      hitCooldown: 0,
      flashTimer: 0
    });
  }
}

function spawnBoss(trackIdx) {
  boss = null;
  var bossTemplate = TRACK_BOSSES[trackIdx];
  if (!bossTemplate) return;
  var pathLen = trackPath.length;
  boss = {
    pos: Math.floor(pathLen / 2),
    lane: 1,
    type: bossTemplate.type,
    hp: bossTemplate.hp,
    maxHp: bossTemplate.hp,
    speed: bossTemplate.speed,
    score: bossTemplate.score,
    color: bossTemplate.color,
    icon: bossTemplate.icon,
    size: bossTemplate.size,
    dir: 1,
    active: true,
    attackTimer: 3.0,
    flashTimer: 0,
    phase: 0
  };
}

// === RACE INITIALIZATION ===
function initRace() {
  var pathLen;
  playerPos = 0;
  playerLane = 1;
  playerSpeed = 0;
  playerLap = 0;
  playerItem = null;
  playerShield = false;
  playerBoostTimer = 0;
  playerSpinTimer = 0;
  playerFinished = false;
  // CON ref #2: max HP scales with CON
  playerMaxHP = Math.max(2, 3 + Math.floor(statMod(statB.con)));
  playerHP = playerMaxHP;
  playerInvuln = 0;
  raceFinishOrder = [];
  raceTime = 0;
  countdownTimer = 3.5;
  showResults = false;
  scorePopups = [];
  comboCount = 0;
  comboTimer = 0;

  initTrack(currentTrack);
  pathLen = trackPath.length;

  aiCars = [];
  for (var i = 0; i < 3; i++) {
    // CHA ref #3: higher charisma makes AI slightly less aggressive
    var skill = 0.6 + currentTrack * 0.035 + i * 0.05 - statMod(statB.cha) * 0.01;
    skill = Math.max(0.4, Math.min(skill, 1.0));
    aiCars.push({
      pos: pathLen - (i + 1) * 4,
      lane: i,
      speed: 0,
      maxSpeed: CAR_SPEEDS[Math.min(playerTier, 3)] * (0.85 + skill * 0.2),
      accel: CAR_ACCEL[Math.min(playerTier, 3)] * (0.8 + skill * 0.25),
      lap: 0,
      color: AI_COLORS[i],
      spinTimer: 0,
      finished: false,
      skill: skill,
      laneTimer: 0,
      shieldTimer: 0
    });
  }

  // Show tutorial on first race
  if (!tutorialShown && currentTrack === 0) {
    tutorialStep = 1;
    tutorialTimer = 0;
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  if (countdownTimer > 0 || playerFinished) return;

  // Invulnerability countdown
  if (playerInvuln > 0) playerInvuln -= dt;

  if (playerSpinTimer > 0) {
    // DEX ref #2: faster spin recovery with high DEX
    playerSpinTimer -= dt * dexBonus();
    playerSpeed *= 0.95;
    return;
  }

  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var tier = Math.min(playerTier, 3);
  // STR ref #2: boost effectiveness scales with STR
  var boostMult = playerBoostTimer > 0 ? (1.3 + strBonus() * 0.2) : 1.0;
  var maxSpd = CAR_SPEEDS[tier] * boostMult;
  var accel = CAR_ACCEL[tier];
  var isIce = currentTrack === 8 || currentTrack === 9;
  var isRain = currentTrack === 4;
  // DEX ref #3: better grip on ice/rain with high DEX
  var gripBonus = (dexBonus() - 1) * 0.5;
  var friction = isIce ? (0.003 + gripBonus * 0.002) : (isRain ? (0.008 + gripBonus * 0.003) : 0.012);

  // Accelerate — NES controls: ArrowUp/W/touch.up/A button
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up || touch.a) {
    playerSpeed = Math.min(playerSpeed + accel * 60 * dt, maxSpd);
  } else {
    playerSpeed = Math.max(0, playerSpeed - friction * 60 * dt);
  }

  // Brake — ArrowDown/S
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) {
    playerSpeed = Math.max(0, playerSpeed - 0.04 * 60 * dt);
  }

  // Steer — DEX ref #4: steering responsiveness
  var steerRate = isIce ? 0.6 : (isRain ? 0.75 : 1.0);
  steerRate *= dexBonus();
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) {
    if (playerLane > 0) {
      playerLane = Math.max(0, playerLane - 2.5 * steerRate * dt);
      if (playerSpeed > 1.0) {
        var sp = getTrackScreenPos(Math.floor(playerPos), Math.round(playerLane));
        skidMarks.push({ x: sp.x, y: sp.y, life: 1.5 });
      }
    }
  }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) {
    if (playerLane < 2) {
      playerLane = Math.min(2, playerLane + 2.5 * steerRate * dt);
      if (playerSpeed > 1.0) {
        var sp = getTrackScreenPos(Math.floor(playerPos), Math.round(playerLane));
        skidMarks.push({ x: sp.x, y: sp.y, life: 1.5 });
      }
    }
  }

  // Use item — NES B button / Space
  if ((keys['Space'] || keys[' '] || touch.b) && playerItem) {
    useItem();
  }

  // Move along path
  var prevPos = playerPos;
  playerPos += playerSpeed * 60 * dt;
  var pathLen = trackPath.length;

  // Lap detection
  if (playerPos >= pathLen) {
    playerPos -= pathLen;
    playerLap++;
    if (playerLap >= LAPS_TO_WIN) {
      playerFinished = true;
      if (!raceFinishOrder.includes('player')) raceFinishOrder.push('player');
      TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 100);
      var lapScore = Math.floor(200 * chaBonus() * statB.scoreMult);
      totalScore += lapScore;
      var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
      addScorePopup(psp.x, psp.y - 20, '+' + lapScore + ' FINISH!', '#38d973');
    } else {
      TAS.audio.playTone(660, 0.15, 'square', 0.08);
      // INT ref #2: lap completion bonus scales with INT
      var lapBonus = Math.floor(50 * intBonus() * statB.scoreMult);
      totalScore += lapBonus;
      var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
      addScorePopup(psp.x, psp.y - 15, '+' + lapBonus, '#f4b41b');
    }
  }

  // Boost timer
  if (playerBoostTimer > 0) playerBoostTimer -= dt;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Check hazards, items, enemies
  checkPlayerHazards();
  checkPlayerItems();
  checkPlayerEnemies();
  checkPlayerBoss();
}

function useItem() {
  var pathLen = trackPath.length;
  // INT ref #3: missile speed and bomb blast scale with INT
  var intMult = intBonus();

  if (playerItem === 'missile') {
    projectiles.push({ pos: playerPos, lane: Math.round(playerLane), dir: 1, speed: 5 * intMult, type: 'missile', owner: 'player', life: 2 * intMult, damage: Math.ceil(statB.damage * intMult) });
    TAS.audio.playTone(880, 0.15, 'sawtooth', 0.08, 440);
  } else if (playerItem === 'bomb') {
    projectiles.push({ pos: playerPos - 2, lane: Math.round(playerLane), dir: 0, speed: 0, type: 'bomb', owner: 'player', life: 5, damage: Math.ceil(statB.damage * 1.5 * intMult) });
    TAS.audio.playTone(220, 0.2, 'square', 0.06);
  } else if (playerItem === 'boost') {
    // STR ref #3: boost duration scales
    playerBoostTimer = 2.0 * strBonus();
    playerSpeed = CAR_SPEEDS[Math.min(playerTier, 3)] * 1.4;
    TAS.audio.playNoise(0.3, 0.08, 2000);
  } else if (playerItem === 'shield') {
    // CON ref #3: shield is more protective with high CON
    playerShield = true;
    playerInvuln = 0.5 * conBonus();
    TAS.audio.playTone(440, 0.2, 'sine', 0.06, 880);
  } else if (playerItem === 'spore_pod') {
    // Spore pod: area slow on enemies + damage
    for (var i = 0; i < enemies.length; i++) {
      var e = enemies[i];
      if (e.active && Math.abs(e.pos - playerPos) < 8) {
        e.speed *= 0.4;
        e.hp -= statB.damage;
        if (e.hp <= 0) {
          e.active = false;
          var esp = getTrackScreenPos(e.pos, e.lane);
          var pts = Math.floor(e.score * chaBonus() * getComboMult() * statB.scoreMult);
          totalScore += pts;
          addScorePopup(esp.x, esp.y - 10, '+' + pts, '#aa44ff');
          addCombo();
          TAS.particles.spawn(esp.x, esp.y, '#aa44ff', 10, 2.5, { gravity: 0.1 });
        }
      }
    }
    TAS.audio.playTone(300, 0.2, 'sine', 0.06, 150);
    var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
    TAS.particles.spawn(psp.x, psp.y, '#aa44ff', 15, 3, { gravity: 0.05 });
  } else if (playerItem === 'reactor_cell') {
    // Reactor cell: huge speed burst + shield
    playerBoostTimer = 3.0 * strBonus();
    playerSpeed = CAR_SPEEDS[Math.min(playerTier, 3)] * 1.6;
    playerShield = true;
    playerInvuln = 1.0;
    TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.12]], 60);
    var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
    TAS.particles.spawn(psp.x, psp.y, '#44ffaa', 20, 3, { gravity: 0.05 });
    addScorePopup(psp.x, psp.y - 20, 'REACTOR BOOST!', '#38d973');
  }
  playerItem = null;
}

function checkPlayerHazards() {
  var pIdx = Math.floor(playerPos) % trackPath.length;
  for (var i = 0; i < trackHazards.length; i++) {
    var h = trackHazards[i];
    var dist = Math.abs(pIdx - h.pos);
    if (dist > 3) continue;

    if (h.type === 'oil' && dist < 2) {
      if (playerInvuln <= 0) {
        // WIS ref #2: reduced spin from oil with high WIS
        playerSpinTimer = Math.max(0.3, 0.8 - wisBonus() * 0.1);
        TAS.audio.playNoise(0.2, 0.04, 500);
        triggerShake(3, 0.9);
      }
    }
    if (h.type === 'spore_cloud' && dist < 2) {
      if (playerInvuln <= 0) {
        // WIS ref #3: spore clouds less effective with high WIS
        playerSpeed *= Math.max(0.5, 0.7 + wisBonus() * 0.05);
        if (Math.random() < 0.3 / wisBonus()) {
          playerSpinTimer = 0.4;
        }
      }
    }
    if (h.type === 'boostpad' && dist < 2) {
      // DEX ref #5: better boost pad usage
      playerSpeed = Math.min(playerSpeed + 0.8 * dexBonus(), CAR_SPEEDS[Math.min(playerTier, 3)] * 1.6);
      TAS.audio.playTone(600, 0.1, 'sine', 0.05, 1200);
    }
    if (h.type === 'ramp' && dist < 1) {
      playerSpeed = Math.min(playerSpeed + 0.3, CAR_SPEEDS[Math.min(playerTier, 3)] * 1.3);
      // WIS ref #4: ramps give bonus score if high WIS
      if (statB.wis >= 14) {
        var psp = getTrackScreenPos(pIdx, playerLane);
        var rampScore = Math.floor(15 * wisBonus() * statB.scoreMult);
        totalScore += rampScore;
        addScorePopup(psp.x, psp.y - 10, '+' + rampScore + ' AIR!', '#ffaa44');
      }
    }
    if (h.type === 'shortcut' && dist < 2) {
      // WIS ref #5: shortcuts give bigger speed bonus with WIS
      playerSpeed = Math.min(playerSpeed + 0.2 * wisBonus(), CAR_SPEEDS[Math.min(playerTier, 3)] * 1.2);
    }
  }

  // Barriers — STR ref #4: smash through barriers easier with STR
  for (var i = 0; i < trackBarriers.length; i++) {
    var b = trackBarriers[i];
    if (b.hp <= 0) continue;
    var dist = Math.abs(pIdx - b.pos);
    if (dist < 2 && Math.abs(Math.round(playerLane) - b.lane) < 1) {
      if (playerSpeed > 1.5) {
        // STR ref #5: stronger hits do more barrier damage
        var smashDmg = Math.max(1, Math.ceil(strBonus()));
        b.hp -= smashDmg;
        playerSpeed *= (0.3 + strBonus() * 0.1);
        triggerShake(5, 0.85);
        TAS.audio.playNoise(0.15, 0.08, 300);
        var sp = getTrackScreenPos(b.pos, b.lane);
        TAS.particles.spawn(sp.x, sp.y, '#aa6633', 8 + smashDmg * 2, 2, { gravity: 0.1 });
        if (b.hp <= 0) {
          var smashScore = Math.floor(30 * strBonus() * statB.scoreMult);
          totalScore += smashScore;
          addScorePopup(sp.x, sp.y - 10, '+' + smashScore + ' SMASH!', '#ff8844');
          addCombo();
        }
      } else {
        playerSpeed = 0;
      }
    }
  }
}

function checkPlayerItems() {
  var pIdx = Math.floor(playerPos) % trackPath.length;
  var pLane = Math.round(playerLane);
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (!item.active) continue;
    var dist = Math.abs(pIdx - item.pos);
    if (dist < 2 && Math.abs(pLane - item.lane) <= 1) {
      if (item.type === 'letterR') {
        rcLetters[0] = true;
        checkUpgrade();
        TAS.audio.playTone(880, 0.12, 'square', 0.07);
        var sp = getTrackScreenPos(item.pos, item.lane);
        addScorePopup(sp.x, sp.y - 10, 'R!', '#f4b41b');
      } else if (item.type === 'letterC') {
        rcLetters[1] = true;
        checkUpgrade();
        TAS.audio.playTone(988, 0.12, 'square', 0.07);
        var sp = getTrackScreenPos(item.pos, item.lane);
        addScorePopup(sp.x, sp.y - 10, 'C!', '#f4b41b');
      } else if (!playerItem) {
        playerItem = item.type;
        TAS.audio.playTone(660, 0.08, 'sine', 0.06);
        var sp = getTrackScreenPos(item.pos, item.lane);
        var itemNames = { missile: 'SPORE DART', bomb: 'POOP BOMB', boost: 'MYCO NITRO', shield: 'GARDEN WARD', spore_pod: 'SPORE POD', reactor_cell: 'REACTOR CELL' };
        addScorePopup(sp.x, sp.y - 8, itemNames[item.type] || item.type.toUpperCase(), '#aaddff');
      }
      item.active = false;
      item.timer = item.respawn;
    }
  }
}

// === ENEMY COLLISION ===
function checkPlayerEnemies() {
  var pIdx = Math.floor(playerPos) % trackPath.length;
  var pLane = Math.round(playerLane);

  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active || e.hitCooldown > 0) continue;
    var dist = Math.abs(pIdx - e.pos);
    if (dist < 3 && Math.abs(pLane - e.lane) <= 1) {
      // STR ref #6: ram damage scales with STR and speed
      var ramDamage = Math.floor(playerSpeed * strBonus());
      if (ramDamage > 0 && playerSpeed > 1.0) {
        e.hp -= ramDamage;
        e.hitCooldown = 0.5;
        e.flashTimer = 0.3;
        var esp = getTrackScreenPos(e.pos, e.lane);

        if (e.hp <= 0) {
          e.active = false;
          var pts = Math.floor(e.score * chaBonus() * getComboMult() * statB.scoreMult);
          totalScore += pts;
          addScorePopup(esp.x, esp.y - 10, '+' + pts, e.color);
          addCombo();
          TAS.particles.spawn(esp.x, esp.y, e.color, 12, 2.5, { gravity: 0.1 });
          TAS.audio.playTone(440, 0.1, 'square', 0.06);
        } else {
          addScorePopup(esp.x, esp.y - 8, '-' + ramDamage + 'HP', '#ff8844');
          TAS.audio.playNoise(0.1, 0.04, 400);
        }

        // Player takes some damage too unless shielded
        if (!playerShield && playerInvuln <= 0) {
          // CON ref #4: damage resistance
          var incomingDmg = Math.max(0, 1 - Math.floor(statMod(statB.con) * 0.3));
          if (incomingDmg > 0) {
            playerHP -= incomingDmg;
            playerInvuln = 0.8;
            triggerShake(3, 0.9);
            if (playerHP <= 0) {
              playerHP = 0;
              playerSpinTimer = 2.0;
              playerSpeed = 0;
            }
          }
        }
        playerSpeed *= 0.7;
      }
    }
  }
}

// === BOSS COLLISION ===
function checkPlayerBoss() {
  if (!boss || !boss.active) return;
  var pIdx = Math.floor(playerPos) % trackPath.length;
  var pLane = Math.round(playerLane);
  var dist = Math.abs(pIdx - boss.pos);

  if (dist < 4 && Math.abs(pLane - boss.lane) <= 1) {
    if (!playerShield && playerInvuln <= 0) {
      // CON ref #5: boss hit damage reduced by CON
      var dmg = Math.max(1, 2 - Math.floor(statMod(statB.con) * 0.3));
      playerHP -= dmg;
      playerInvuln = 1.5;
      playerSpeed *= 0.3;
      playerSpinTimer = 1.0;
      triggerShake(8, 0.8);
      TAS.audio.playNoise(0.3, 0.1, 250);
      if (playerHP <= 0) {
        playerHP = 0;
        playerSpinTimer = 3.0;
        playerSpeed = 0;
      }
    } else if (playerShield) {
      playerShield = false;
      TAS.audio.playTone(330, 0.2, 'sine', 0.05);
    }
  }
}

function checkUpgrade() {
  if (rcLetters[0] && rcLetters[1]) {
    if (playerTier < 3) {
      playerTier++;
      TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 80);
      TAS.fx.flash('#ffff44', 0.4);
      var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
      addScorePopup(psp.x, psp.y - 25, 'UPGRADE! ' + CAR_TIERS[playerTier], '#f4b41b');
      // INT ref #4: upgrade gives score bonus based on INT
      var upgradeScore = Math.floor(100 * intBonus() * statB.scoreMult);
      totalScore += upgradeScore;
      addScorePopup(psp.x, psp.y - 40, '+' + upgradeScore, '#38d973');
    }
    rcLetters = [false, false];
  }
}

// === AI UPDATE ===
function updateAI(dt) {
  if (countdownTimer > 0) return;
  var pathLen = trackPath.length;

  for (var i = 0; i < aiCars.length; i++) {
    var ai = aiCars[i];
    if (ai.finished) continue;
    if (ai.spinTimer > 0) {
      ai.spinTimer -= dt;
      ai.speed *= 0.95;
      continue;
    }

    var targetSpeed = ai.maxSpeed * (0.85 + Math.sin(frame * 0.02 + i * 2) * 0.15);
    if (ai.speed < targetSpeed) {
      ai.speed = Math.min(ai.speed + ai.accel * 60 * dt, targetSpeed);
    }

    ai.laneTimer -= dt;
    if (ai.laneTimer <= 0) {
      ai.laneTimer = 0.5 + Math.random() * 2;
      var aiIdx = Math.floor(ai.pos) % pathLen;
      var targetLane = ai.lane;
      for (var j = 0; j < trackHazards.length; j++) {
        var h = trackHazards[j];
        if ((h.type === 'oil' || h.type === 'spore_cloud') && Math.abs(aiIdx - h.pos + 5) < 6) {
          targetLane = h.pos % 3 === ai.lane ? (ai.lane + 1) % 3 : ai.lane;
        }
      }
      for (var j = 0; j < trackBarriers.length; j++) {
        var b = trackBarriers[j];
        if (b.hp > 0 && Math.abs(aiIdx - b.pos + 4) < 5 && b.lane === ai.lane) {
          targetLane = (ai.lane + 1) % 3;
        }
      }
      // AI dodges enemies
      for (var j = 0; j < enemies.length; j++) {
        var e = enemies[j];
        if (e.active && Math.abs(aiIdx - e.pos + 4) < 5 && e.lane === ai.lane) {
          targetLane = (ai.lane + 1) % 3;
        }
      }
      if (Math.random() < 0.3) targetLane = TAS.math.randInt(0, 2);
      ai.lane = targetLane;
    }

    ai.pos += ai.speed * 60 * dt;
    if (ai.pos >= pathLen) {
      ai.pos -= pathLen;
      ai.lap++;
      if (ai.lap >= LAPS_TO_WIN) {
        ai.finished = true;
        if (!raceFinishOrder.includes(i)) raceFinishOrder.push(i);
      }
    }

    var aiIdx2 = Math.floor(ai.pos) % pathLen;
    for (var j = 0; j < trackHazards.length; j++) {
      var h = trackHazards[j];
      if (h.type === 'boostpad' && Math.abs(aiIdx2 - h.pos) < 2) {
        ai.speed = Math.min(ai.speed + 0.5, ai.maxSpeed * 1.4);
      }
      if (h.type === 'oil' && Math.abs(aiIdx2 - h.pos) < 1 && Math.random() < 0.4) {
        ai.spinTimer = 0.5;
      }
      if (h.type === 'spore_cloud' && Math.abs(aiIdx2 - h.pos) < 1 && Math.random() < 0.3) {
        ai.speed *= 0.6;
      }
    }
  }
}

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  var pathLen = trackPath.length;
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active) continue;
    if (e.hitCooldown > 0) e.hitCooldown -= dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Move along track
    e.pos += e.speed * e.dir * dt;
    if (e.pos < 0) e.pos += pathLen;
    if (e.pos >= pathLen) e.pos -= pathLen;

    // Randomly change direction
    if (Math.random() < 0.005) e.dir *= -1;
    // Randomly change lane
    if (Math.random() < 0.01) e.lane = TAS.math.randInt(0, 2);
  }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!boss || !boss.active) return;
  var pathLen = trackPath.length;

  // Boss moves along track
  boss.pos += boss.speed * boss.dir * dt * 60;
  if (boss.pos >= pathLen) boss.pos -= pathLen;
  if (boss.pos < 0) boss.pos += pathLen;

  // Change direction periodically
  if (Math.random() < 0.008) boss.dir *= -1;
  // Change lane
  if (Math.random() < 0.015) boss.lane = TAS.math.randInt(0, 2);

  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  // Boss attack — spawns projectiles
  boss.attackTimer -= dt;
  if (boss.attackTimer <= 0) {
    boss.attackTimer = 2.0 + Math.random() * 2;
    // Spawn projectile toward player
    projectiles.push({
      pos: boss.pos,
      lane: Math.round(playerLane),
      dir: playerPos > boss.pos ? 1 : -1,
      speed: 3,
      type: 'bomb',
      owner: 'boss',
      life: 4,
      damage: 1
    });
    TAS.audio.playTone(180, 0.15, 'square', 0.06);
  }

  // Phase changes
  if (boss.hp <= boss.maxHp * 0.5 && boss.phase === 0) {
    boss.phase = 1;
    boss.speed *= 1.5;
    boss.attackTimer = 0.5;
    var bsp = getTrackScreenPos(boss.pos, boss.lane);
    addScorePopup(bsp.x, bsp.y - 20, 'ENRAGED!', '#e6482e');
    triggerShake(6, 0.85);
  }
}

// === PROJECTILE UPDATE ===
function updateProjectiles(dt) {
  var pathLen = trackPath.length;
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    p.pos += p.speed * p.dir * 60 * dt;
    if (p.pos < 0) p.pos += pathLen;
    if (p.pos >= pathLen) p.pos -= pathLen;

    // Missile hits
    if (p.type === 'missile') {
      if (p.owner === 'player') {
        // Hit AI cars
        for (var j = 0; j < aiCars.length; j++) {
          var ai = aiCars[j];
          if (ai.finished || ai.spinTimer > 0) continue;
          if (Math.abs(ai.pos - p.pos) < 3 && Math.abs(ai.lane - p.lane) <= 1) {
            ai.spinTimer = 1.2;
            ai.speed *= 0.2;
            var sp = getTrackScreenPos(Math.floor(ai.pos), ai.lane);
            TAS.particles.spawn(sp.x, sp.y, '#ff8800', 12, 3, { gravity: 0.1 });
            TAS.audio.playNoise(0.2, 0.08, 400);
            triggerShake(4, 0.88);
            addScorePopup(sp.x, sp.y - 10, 'HIT!', '#ff4444');
            projectiles.splice(i, 1);
            break;
          }
        }
        // Hit enemies — INT ref #5: missile damage
        if (projectiles[i]) { // not yet removed
          for (var j = 0; j < enemies.length; j++) {
            var e = enemies[j];
            if (!e.active) continue;
            if (Math.abs(e.pos - p.pos) < 3 && Math.abs(e.lane - p.lane) <= 1) {
              e.hp -= (p.damage || 1);
              e.flashTimer = 0.3;
              var esp = getTrackScreenPos(e.pos, e.lane);
              if (e.hp <= 0) {
                e.active = false;
                var pts = Math.floor(e.score * chaBonus() * getComboMult() * statB.scoreMult);
                totalScore += pts;
                addScorePopup(esp.x, esp.y - 10, '+' + pts, e.color);
                addCombo();
                TAS.particles.spawn(esp.x, esp.y, e.color, 12, 2.5, { gravity: 0.1 });
              } else {
                addScorePopup(esp.x, esp.y - 8, '-' + (p.damage || 1), '#ff8844');
              }
              TAS.audio.playNoise(0.15, 0.06, 350);
              projectiles.splice(i, 1);
              break;
            }
          }
        }
        // Hit boss
        if (projectiles[i] && boss && boss.active) {
          if (Math.abs(boss.pos - p.pos) < 5 && Math.abs(boss.lane - p.lane) <= 1) {
            boss.hp -= (p.damage || 1);
            boss.flashTimer = 0.3;
            var bsp = getTrackScreenPos(boss.pos, boss.lane);
            if (boss.hp <= 0) {
              boss.active = false;
              var pts = Math.floor(boss.score * chaBonus() * statB.scoreMult);
              totalScore += pts;
              addScorePopup(bsp.x, bsp.y - 15, '+' + pts + ' BOSS!', '#f4b41b');
              TAS.particles.spawn(bsp.x, bsp.y, boss.color, 25, 4, { gravity: 0.08 });
              TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 80);
              triggerShake(10, 0.8);
            } else {
              addScorePopup(bsp.x, bsp.y - 10, '-' + (p.damage || 1), '#ff8844');
              TAS.audio.playNoise(0.15, 0.08, 400);
            }
            projectiles.splice(i, 1);
            continue;
          }
        }
      }
    }

    // Bomb hits
    if (p.type === 'bomb' && projectiles[i]) {
      // Boss/enemy bombs hit player
      if (p.owner !== 'player') {
        if (Math.abs(playerPos - p.pos) < 3 && Math.abs(Math.round(playerLane) - p.lane) <= 1) {
          hitPlayer(p.damage || 1);
          var sp = getTrackScreenPos(Math.floor(p.pos), p.lane);
          TAS.particles.spawn(sp.x, sp.y, '#ff4400', 15, 3, { gravity: 0.15 });
          projectiles.splice(i, 1);
          continue;
        }
      }
      // Player bombs hit AI
      for (var j = 0; j < aiCars.length; j++) {
        var ai = aiCars[j];
        if (ai.finished || ai.spinTimer > 0) continue;
        if (Math.abs(ai.pos - p.pos) < 3 && Math.abs(ai.lane - p.lane) <= 1) {
          ai.spinTimer = 1.0;
          ai.speed *= 0.2;
          var sp = getTrackScreenPos(Math.floor(p.pos), p.lane);
          TAS.particles.spawn(sp.x, sp.y, '#ff4400', 10, 2.5);
          TAS.audio.playNoise(0.15, 0.06, 350);
          addScorePopup(sp.x, sp.y - 10, 'BOOM!', '#ff4400');
          projectiles.splice(i, 1);
          break;
        }
      }
      // Player bombs hit enemies
      if (projectiles[i] && p.owner === 'player') {
        for (var j = 0; j < enemies.length; j++) {
          var e = enemies[j];
          if (!e.active) continue;
          if (Math.abs(e.pos - p.pos) < 4 && Math.abs(e.lane - p.lane) <= 1) {
            e.hp -= (p.damage || 1);
            e.flashTimer = 0.3;
            var esp = getTrackScreenPos(e.pos, e.lane);
            TAS.particles.spawn(esp.x, esp.y, '#ff4400', 8, 2, { gravity: 0.1 });
            if (e.hp <= 0) {
              e.active = false;
              var pts = Math.floor(e.score * chaBonus() * getComboMult() * statB.scoreMult);
              totalScore += pts;
              addScorePopup(esp.x, esp.y - 10, '+' + pts, e.color);
              addCombo();
            }
            projectiles.splice(i, 1);
            break;
          }
        }
      }
      // Player bombs hit boss
      if (projectiles[i] && p.owner === 'player' && boss && boss.active) {
        if (Math.abs(boss.pos - p.pos) < 5 && Math.abs(boss.lane - p.lane) <= 1) {
          boss.hp -= (p.damage || 1);
          boss.flashTimer = 0.3;
          var bsp = getTrackScreenPos(boss.pos, boss.lane);
          TAS.particles.spawn(bsp.x, bsp.y, '#ff4400', 15, 3, { gravity: 0.1 });
          if (boss.hp <= 0) {
            boss.active = false;
            var pts = Math.floor(boss.score * chaBonus() * statB.scoreMult);
            totalScore += pts;
            addScorePopup(bsp.x, bsp.y - 15, '+' + pts + ' BOSS!', '#f4b41b');
            TAS.particles.spawn(bsp.x, bsp.y, boss.color, 25, 4, { gravity: 0.08 });
            TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 80);
            triggerShake(10, 0.8);
          }
          projectiles.splice(i, 1);
          continue;
        }
      }
    }
  }
}

function hitPlayer(dmg) {
  if (playerShield) {
    playerShield = false;
    TAS.audio.playTone(330, 0.2, 'sine', 0.05);
    return;
  }
  if (playerInvuln > 0) return;
  // CON ref #6: damage reduction from CON
  dmg = Math.max(0, (dmg || 1) - Math.floor(statMod(statB.con) * 0.2));
  if (dmg <= 0) {
    var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
    addScorePopup(psp.x, psp.y - 10, 'BLOCKED!', '#3cacd7');
    return;
  }
  playerHP -= dmg;
  playerInvuln = 1.0;
  playerSpinTimer = 1.0;
  playerSpeed *= 0.2;
  triggerShake(6, 0.85);
  TAS.audio.playNoise(0.25, 0.1, 300);
  if (playerHP <= 0) {
    playerHP = 0;
    playerSpinTimer = 3.0;
    playerSpeed = 0;
  }
}

// === ITEM RESPAWN ===
function updateItems(dt) {
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (!item.active) {
      item.timer -= dt * 60;
      if (item.timer <= 0) {
        item.active = true;
        item.pos = TAS.math.randInt(3, trackPath.length - 3);
        item.lane = TAS.math.randInt(0, 2);
      }
    }
  }
}

// === POSITION TRACKING ===
function updatePositions() {
  var pathLen = trackPath.length;
  var getScore = function(pos, lap) { return lap * pathLen + pos; };
  var pScore = getScore(playerPos, playerLap);
  racePositions = [];
  racePositions.push({ id: 'player', score: pScore, name: statB.name || 'YOU' });
  for (var i = 0; i < aiCars.length; i++) {
    racePositions.push({ id: i, score: getScore(aiCars[i].pos, aiCars[i].lap), name: 'CPU ' + (i + 1) });
  }
  racePositions.sort(function(a, b) { return b.score - a.score; });
}

function getPlayerPosition() {
  for (var i = 0; i < racePositions.length; i++) {
    if (racePositions[i].id === 'player') return i + 1;
  }
  return 4;
}

// === TUTORIAL SYSTEM ===
function updateTutorial(dt) {
  if (tutorialStep === 0) return;
  tutorialTimer += dt;
  if (tutorialTimer > 4) {
    tutorialStep++;
    tutorialTimer = 0;
    if (tutorialStep > 5) {
      tutorialStep = 0;
      tutorialShown = true;
    }
  }
}

function drawTutorial() {
  if (tutorialStep === 0) return;
  var msgs = [
    '',
    'UP / A = GAS YOUR BASELING    DOWN / S = BRAKE',
    'LEFT / RIGHT = STEER THROUGH SPORES',
    'SPACE / B = USE ITEM (POOP BOMBS, SPORE DARTS...)',
    'COLLECT R + C TO UPGRADE YOUR BASELING CAR',
    'FINISH TOP 3 TO REACH THE NEXT REACTOR!'
  ];
  if (tutorialStep >= msgs.length) return;
  var msg = msgs[tutorialStep];
  var alpha = Math.min(1, tutorialTimer * 2) * (tutorialTimer < 3.5 ? 1 : Math.max(0, (4 - tutorialTimer) * 2));

  ctx.save();
  ctx.globalAlpha = alpha * 0.8;
  ctx.fillStyle = '#000';
  ctx.fillRect(GW / 2 - 160, GH - 80, 320, 36);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 160, GH - 80, 320, 36);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msg, GW / 2, GH - 58);
  ctx.restore();
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'results') {
    resultTimer -= dt;
    if (resultTimer <= 0 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      if (getPlayerPosition() <= 3) {
        currentTrack++;
        if (currentTrack >= TRACK_COUNT) {
          state = 'victory';
          if (totalScore > highScore) {
            highScore = totalScore;
            TAS.score.save('rcreactor_hi', highScore);
          }
          return;
        }
        state = 'prerace';
      } else {
        state = 'prerace';
      }
    }
    return;
  }

  if (state === 'prerace') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      initRace();
      state = 'racing';
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'racing') {
    if (countdownTimer > 0) {
      countdownTimer -= dt;
      return;
    }
    raceTime += dt;
    updatePlayer(dt);
    updateAI(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateProjectiles(dt);
    updateItems(dt);
    updatePositions();
    updateTutorial(dt);

    // HP regen if alive — CON ref #7: slow regen
    if (playerHP > 0 && playerHP < playerMaxHP && statB.con >= 14) {
      if (frame % 300 === 0) {
        playerHP = Math.min(playerHP + 1, playerMaxHP);
        var psp = getTrackScreenPos(Math.floor(playerPos), playerLane);
        addScorePopup(psp.x, psp.y - 12, '+1 HP', '#38d973');
      }
    }

    // Skid marks
    for (var i = skidMarks.length - 1; i >= 0; i--) {
      skidMarks[i].life -= dt;
      if (skidMarks[i].life <= 0) skidMarks.splice(i, 1);
    }
    if (skidMarks.length > 60) skidMarks.splice(0, skidMarks.length - 60);

    // Engine sound
    if (frame % 8 === 0 && playerSpeed > 0.5) {
      var pitch = 80 + playerSpeed * 60;
      TAS.audio.playTone(pitch, 0.05, 'sawtooth', 0.015);
    }

    // Check race end
    if (playerFinished || raceFinishOrder.length >= 3) {
      if (!playerFinished && !raceFinishOrder.includes('player')) {
        raceFinishOrder.push('player');
        playerFinished = true;
      }
      if (playerFinished) {
        var pos = getPlayerPosition();
        // CHA ref #4: score multiplier from CHA + level
        var posScore = Math.floor(Math.max(0, (4 - pos) * 100 + Math.floor(100 - raceTime)) * chaBonus() * statB.scoreMult);
        totalScore += posScore;
        state = 'results';
        resultTimer = 1.5;
      }
    }

    // Rain
    if (currentTrack === 4 || currentTrack === 9) {
      for (var i = 0; i < rainDrops.length; i++) {
        var drop = rainDrops[i];
        drop.y += drop.speed * dt * 60;
        if (drop.y > GH) { drop.y = 0; drop.x = Math.random() * GW; }
      }
    }

    // Zone ambient particles
    if (frame % 20 === 0) {
      if (zoneType === 'spore_field') {
        TAS.particles.spawn(Math.random() * GW, GH, '#aa44ff', 2, 0.5, { gravity: -0.02 });
      } else if (zoneType === 'reactor') {
        TAS.particles.spawn(Math.random() * GW, Math.random() * GH, '#44ffaa', 1, 0.3, { gravity: 0 });
      } else if (zoneType === 'void') {
        TAS.particles.spawn(Math.random() * GW, Math.random() * GH, '#ff44ff', 2, 0.4, { gravity: 0 });
      } else if (zoneType === 'volcano') {
        TAS.particles.spawn(50 + Math.random() * (GW - 100), GH, '#ff4422', 2, 0.6, { gravity: -0.03 });
      }
    }
  }
}

function startGame() {
  state = 'prerace';
  currentTrack = 0;
  playerTier = 0;
  rcLetters = [false, false];
  totalScore = 0;
  comboCount = 0;
  comboTimer = 0;
  TAS.audio.ensureAudio();
}

// === DRAW FUNCTIONS ===
function drawTrack() {
  var theme = TRACK_THEMES[currentTrack];
  var pathLen = trackPath.length;

  // Draw zone-themed background
  ctx.fillStyle = theme.grass;
  ctx.fillRect(0, 0, GW, GH);

  // Zone fog effect
  if (zonePalette.fog) {
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.01) * 0.05;
    ctx.fillStyle = zonePalette.fog;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  // Zone decorations behind track
  drawZoneDecorations();

  // Track surface
  ctx.lineWidth = 14;
  ctx.strokeStyle = theme.road;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.beginPath();
  for (var i = 0; i < pathLen; i++) {
    var sp = toIso(trackPath[i].x, trackPath[i].y);
    if (i === 0) ctx.moveTo(sp.x, sp.y);
    else ctx.lineTo(sp.x, sp.y);
  }
  ctx.closePath();
  ctx.stroke();

  // Track edge lines
  ctx.lineWidth = 1;
  ctx.strokeStyle = theme.accent;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  for (var i = 0; i < pathLen; i++) {
    var sp = getTrackScreenPos(i, -0.3);
    if (i === 0) ctx.moveTo(sp.x, sp.y);
    else ctx.lineTo(sp.x, sp.y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  for (var i = 0; i < pathLen; i++) {
    var sp = getTrackScreenPos(i, 2.3);
    if (i === 0) ctx.moveTo(sp.x, sp.y);
    else ctx.lineTo(sp.x, sp.y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Start/finish line — NES checkered pattern
  var sfPos = toIso(trackPath[0].x, trackPath[0].y);
  for (var cx = -4; cx < 4; cx++) {
    for (var cy = -1; cy < 2; cy++) {
      ctx.fillStyle = (cx + cy) % 2 === 0 ? '#fff' : '#111';
      pxRect(sfPos.x + cx * 2, sfPos.y + cy * 2, 2, 2, ctx.fillStyle);
    }
  }

  // Draw hazards
  for (var i = 0; i < trackHazards.length; i++) {
    var h = trackHazards[i];
    var sp = toIso(trackPath[h.pos % pathLen].x, trackPath[h.pos % pathLen].y);
    if (h.type === 'oil') {
      ctx.fillStyle = '#1a1a2a';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(sp.x, sp.y, 6, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (h.type === 'spore_cloud') {
      ctx.globalAlpha = 0.4 + Math.sin(frame * 0.06 + h.pos) * 0.2;
      ctx.fillStyle = '#aa44ff';
      ctx.beginPath();
      ctx.ellipse(sp.x, sp.y, 8, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Inner spore particles
      ctx.fillStyle = '#cc66ff';
      for (var j = 0; j < 3; j++) {
        var ox = Math.sin(frame * 0.04 + j * 2 + h.pos) * 4;
        var oy = Math.cos(frame * 0.05 + j * 3 + h.pos) * 2;
        ctx.beginPath();
        ctx.arc(sp.x + ox, sp.y + oy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (h.type === 'boostpad') {
      ctx.fillStyle = theme.accent;
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.2;
      // NES arrow shape
      pxRect(sp.x - 4, sp.y - 1, 8, 2, theme.accent);
      pxRect(sp.x + 2, sp.y - 3, 2, 6, theme.accent);
      pxRect(sp.x + 4, sp.y - 2, 2, 4, theme.accent);
      ctx.globalAlpha = 1;
    } else if (h.type === 'ramp') {
      // Pixel ramp
      pxRect(sp.x - 5, sp.y - 4, 10, 6, '#aa7733');
      pxRect(sp.x - 4, sp.y - 3, 2, 4, '#ffcc44');
      pxRect(sp.x - 1, sp.y - 3, 2, 4, '#ffcc44');
      pxRect(sp.x + 2, sp.y - 3, 2, 4, '#ffcc44');
    } else if (h.type === 'ice') {
      ctx.fillStyle = '#aaddff';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.ellipse(sp.x, sp.y, 8, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Ice crystal details
      pxRect(sp.x - 2, sp.y - 1, 1, 2, '#cceeFF');
      pxRect(sp.x + 1, sp.y - 2, 1, 3, '#cceeFF');
      ctx.globalAlpha = 1;
    }
  }

  // Barriers — NES style blocks
  for (var i = 0; i < trackBarriers.length; i++) {
    var b = trackBarriers[i];
    if (b.hp <= 0) continue;
    var sp = getTrackScreenPos(b.pos, b.lane);
    var bColor = b.hp > 1 ? '#886633' : '#aa4422';
    pxRect(sp.x - 5, sp.y - 6, 10, 8, bColor);
    pxRect(sp.x - 4, sp.y - 5, 8, 2, '#ffcc00');
    // Crack marks for damaged barriers
    if (b.hp === 1) {
      pxRect(sp.x - 2, sp.y - 3, 1, 3, '#333');
      pxRect(sp.x + 1, sp.y - 4, 1, 2, '#333');
    }
  }

  // Skid marks
  ctx.fillStyle = '#222';
  for (var i = 0; i < skidMarks.length; i++) {
    var s = skidMarks[i];
    ctx.globalAlpha = s.life * 0.2;
    pxRect(s.x - 1, s.y - 1, 2, 2, '#222');
  }
  ctx.globalAlpha = 1;
}

function drawItems() {
  var pathLen = trackPath.length;
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (!item.active) continue;
    var sp = getTrackScreenPos(item.pos % pathLen, item.lane);
    var bob = Math.sin(frame * 0.08 + item.pos) * 2;
    var spriteData = ITEM_SPRITES[item.type];
    if (spriteData) {
      drawSprite(sp.x - 5, sp.y - 5 + bob, spriteData, 2);
    } else {
      // Fallback: draw colored box
      pxRect(sp.x - 4, sp.y - 4 + bob, 8, 8, '#ffdd44');
    }
    // Glow effect for special items
    if (item.type === 'reactor_cell' || item.type === 'spore_pod') {
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1 + item.pos) * 0.15;
      ctx.fillStyle = item.type === 'reactor_cell' ? '#44ffaa' : '#aa44ff';
      ctx.beginPath();
      ctx.arc(sp.x, sp.y + bob, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawEnemies() {
  var pathLen = trackPath.length;
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active) continue;
    var sp = getTrackScreenPos(Math.floor(e.pos) % pathLen, e.lane);

    // Flash white when hit
    if (e.flashTimer > 0 && Math.floor(e.flashTimer * 10) % 2 === 0) {
      pxRect(sp.x - 5, sp.y - 5, 10, 10, '#fff');
      continue;
    }

    var spriteData = ENEMY_SPRITES[e.type];
    if (spriteData) {
      drawSprite(sp.x - 5, sp.y - 5, spriteData, 2);
    } else {
      pxRect(sp.x - 4, sp.y - 4, 8, 8, e.color);
    }

    // HP bar for enemies with > 1 hp
    if (e.maxHp > 1) {
      var hpPct = e.hp / e.maxHp;
      pxRect(sp.x - 5, sp.y - 8, 10, 2, '#333');
      pxRect(sp.x - 5, sp.y - 8, Math.floor(10 * hpPct), 2, hpPct > 0.5 ? '#44ff44' : '#ff4444');
    }
  }
}

function drawBoss() {
  if (!boss || !boss.active) return;
  var pathLen = trackPath.length;
  var sp = getTrackScreenPos(Math.floor(boss.pos) % pathLen, boss.lane);
  var sz = boss.size;

  // Flash when hit
  if (boss.flashTimer > 0 && Math.floor(boss.flashTimer * 10) % 2 === 0) {
    pxRect(sp.x - sz, sp.y - sz, sz * 2, sz * 2, '#fff');
  } else {
    var spriteData = BOSS_SPRITES[boss.type];
    if (spriteData) {
      drawSprite(sp.x - sz, sp.y - sz, spriteData, Math.ceil(sz / 3));
    } else {
      pxRect(sp.x - sz, sp.y - sz, sz * 2, sz * 2, boss.color);
    }
  }

  // Phase 2 aura
  if (boss.phase >= 1) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sz + 4 + Math.sin(frame * 0.15) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Boss HP bar
  var hpPct = boss.hp / boss.maxHp;
  var barW = 40;
  pxRect(sp.x - barW / 2, sp.y - sz - 6, barW, 4, '#333');
  pxRect(sp.x - barW / 2, sp.y - sz - 6, Math.floor(barW * hpPct), 4, hpPct > 0.3 ? '#44ff44' : '#ff4444');
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.type, sp.x, sp.y - sz - 8);
}

function drawCar(screenPos, color, tier, spinTimer, hasShield, isPlayer) {
  var sx = screenPos.x;
  var sy = screenPos.y;
  var size = 4 + tier * 1.5;
  var spin = spinTimer > 0;
  var tierName = CAR_TIERS[Math.min(tier, 3)];
  var spriteData = CAR_SPRITES[tierName];

  ctx.save();
  ctx.translate(sx, sy);
  if (spin) ctx.rotate(frame * 0.5);

  // Player blinks when invulnerable
  if (isPlayer && playerInvuln > 0 && Math.floor(playerInvuln * 10) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  // NES pixel car sprite
  if (spriteData) {
    var scale = 2;
    var w = spriteData[0].length * scale;
    var h = spriteData.length * scale;
    drawSprite(-w / 2, -h / 2, spriteData, scale);
  } else {
    // Fallback diamond
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, -size);
    ctx.lineTo(size * 0.7, 0);
    ctx.lineTo(0, size * 0.6);
    ctx.lineTo(-size * 0.7, 0);
    ctx.closePath();
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Shield effect — pixel ring
  if (hasShield) {
    ctx.strokeStyle = '#3cacd7';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.3;
    ctx.beginPath();
    ctx.ellipse(sx, sy, size + 4, size * 0.6 + 3, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Corner dots for NES style
    var r = size + 4;
    for (var a = 0; a < 4; a++) {
      var ax = sx + Math.cos(frame * 0.08 + a * Math.PI / 2) * r;
      var ay = sy + Math.sin(frame * 0.08 + a * Math.PI / 2) * (r * 0.6);
      pxRect(ax - 1, ay - 1, 2, 2, '#3cacd7');
    }
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  // Boost flame — pixel fire
  if (isPlayer && playerBoostTimer > 0) {
    var flameH = 4 + Math.random() * 4;
    pxRect(sx - 2, sy + size * 0.6, 4, 2, '#ff4400');
    pxRect(sx - 1, sy + size * 0.6 + 2, 2, Math.floor(flameH), '#ffaa00');
    pxRect(sx, sy + size * 0.6 + 2 + Math.floor(flameH), 1, 2, '#ff8800');
  }

  // Player: the selected baseling rides the RC car (focal entity). Drawn upright so it
  // doesn't spin with the car; falls back to the baseling-color icon if no sprite.
  if (isPlayer) {
    var _alpha = (playerInvuln > 0 && Math.floor(playerInvuln * 10) % 2 === 0) ? 0.4 : 1;
    var _da = (playerBoostTimer > 0) ? 'walk' : 'idle';
    if (!TAS.drawBaseling(ctx, sx, sy - size + 1, size * 2.6, { anim: _da, frame: frame, flipX: false, alpha: _alpha })) {
      ctx.fillStyle = statB.color;
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(statB.icon, sx, sy - size - 4);
    }
  }
}

function drawProjectiles() {
  var pathLen = trackPath.length;
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    var sp = getTrackScreenPos(Math.floor(p.pos) % pathLen, p.lane);
    if (p.type === 'missile') {
      // NES pixel missile
      pxRect(sp.x - 3, sp.y - 1, 6, 2, '#ff4444');
      pxRect(sp.x + 3, sp.y, 2, 1, '#ffaa00');
      pxRect(sp.x - 4, sp.y, 1, 1, '#ff8800');
    } else if (p.type === 'bomb') {
      var pulse = Math.sin(frame * 0.2) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      var bColor = p.owner === 'boss' ? '#ff2200' : '#ff8800';
      pxRect(sp.x - 3, sp.y - 3, 6, 6, bColor);
      pxRect(sp.x - 1, sp.y - 5, 2, 3, '#ffcc00');
      ctx.globalAlpha = 1;
    }
  }
}

function drawCars() {
  var pathLen = trackPath.length;
  var carList = [];

  // Player
  var psp = getTrackScreenPos(Math.floor(playerPos) % pathLen, playerLane);
  carList.push({ y: psp.y, draw: function() {
    drawCar(psp, statB.color, playerTier, playerSpinTimer, playerShield, true);
  }});

  // AI
  for (var i = 0; i < aiCars.length; i++) {
    var ai = aiCars[i];
    var asp = getTrackScreenPos(Math.floor(ai.pos) % pathLen, ai.lane);
    (function(car, sp) {
      carList.push({ y: sp.y, draw: function() {
        drawCar(sp, car.color, Math.min(playerTier, 3), car.spinTimer, car.shieldTimer > 0, false);
      }});
    })(ai, asp);
  }

  carList.sort(function(a, b) { return a.y - b.y; });
  for (var i = 0; i < carList.length; i++) carList[i].draw();
}

function drawRain() {
  if (rainDrops.length === 0) return;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  for (var i = 0; i < rainDrops.length; i++) {
    var drop = rainDrops[i];
    // Pixel rain streaks
    pxRect(drop.x, drop.y, 1, Math.floor(drop.speed), '#8899aa');
  }
  ctx.globalAlpha = 1;
}

function drawNightOverlay() {
  if (nightAlpha <= 0) return;
  var pathLen = trackPath.length;
  var psp = getTrackScreenPos(Math.floor(playerPos) % pathLen, playerLane);

  ctx.fillStyle = '#000';
  ctx.globalAlpha = nightAlpha;
  ctx.fillRect(0, 0, GW, GH);
  ctx.globalAlpha = 1;

  // WIS ref #6: larger visibility cone with high WIS
  var visCone = 50 + wisBonus() * 15;

  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  var grad = ctx.createRadialGradient(psp.x, psp.y - 10, 5, psp.x, psp.y - 10, visCone);
  grad.addColorStop(0, 'rgba(0,0,0,1)');
  grad.addColorStop(0.7, 'rgba(0,0,0,0.8)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(psp.x, psp.y - 10, visCone, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawHUD() {
  var pos = getPlayerPosition();
  var posStr = pos + (pos === 1 ? 'st' : pos === 2 ? 'nd' : pos === 3 ? 'rd' : 'th');

  // HUD background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 48);

  // NES-style border
  pxRect(0, 48, GW, 1, TRACK_THEMES[currentTrack].accent);

  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = pos <= 3 ? '#38d973' : '#e6482e';
  ctx.fillText(posStr, 8, 14);

  ctx.fillStyle = '#fff';
  ctx.fillText('LAP ' + Math.min(playerLap + 1, LAPS_TO_WIN) + '/' + LAPS_TO_WIN, 50, 14);

  // Track name + zone
  ctx.textAlign = 'center';
  ctx.fillStyle = TRACK_THEMES[currentTrack].accent;
  ctx.font = '10px monospace';
  ctx.fillText(TRACK_NAMES[currentTrack], GW / 2, 14);

  // HP bar — pixel hearts
  var hearts = playerMaxHP;
  for (var h = 0; h < hearts; h++) {
    var hx = 8 + h * 12;
    var hy = 20;
    if (h < playerHP) {
      pxRect(hx, hy, 4, 4, '#ff4444');
      pxRect(hx + 4, hy, 4, 4, '#ff4444');
      pxRect(hx - 1, hy + 3, 10, 4, '#ff4444');
      pxRect(hx, hy + 6, 8, 2, '#ff4444');
      pxRect(hx + 1, hy + 8, 6, 1, '#ff4444');
      pxRect(hx + 2, hy + 9, 4, 1, '#ff4444');
    } else {
      pxRect(hx, hy, 4, 4, '#444');
      pxRect(hx + 4, hy, 4, 4, '#444');
      pxRect(hx - 1, hy + 3, 10, 4, '#444');
    }
  }

  // Item display
  if (playerItem) {
    pxRect(GW - 72, 3, 64, 28, '#222');
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 1;
    ctx.strokeRect(GW - 72, 3, 64, 28);
    // Draw item sprite mini
    var spriteData = ITEM_SPRITES[playerItem];
    if (spriteData) {
      drawSprite(GW - 70, 6, spriteData, 2);
    }
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'right';
    var hudItemNames = { missile: 'SPORE DART', bomb: 'POOP BOMB', boost: 'MYCO NITRO', shield: 'GARDEN WARD', spore_pod: 'SPORE POD', reactor_cell: 'REACTOR CELL' };
    ctx.fillText(hudItemNames[playerItem] || playerItem.toUpperCase(), GW - 10, 22);
  }

  // Speed bar — NES pixel style
  var maxSpd = CAR_SPEEDS[Math.min(playerTier, 3)];
  var spdPct = playerSpeed / maxSpd;
  pxRect(8, 34, 62, 6, '#222');
  var spdColor = spdPct > 1 ? '#ff4400' : (spdPct > 0.7 ? '#ffdd44' : '#44cc44');
  pxRect(8, 34, Math.min(62, Math.floor(62 * Math.min(spdPct, 1.5))), 6, spdColor);
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SPD', 72, 40);

  // RC letters — pixel style
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = rcLetters[0] ? '#f4b41b' : '#444';
  ctx.fillText('R', GW - 36, 46);
  ctx.fillStyle = rcLetters[1] ? '#f4b41b' : '#444';
  ctx.fillText('C', GW - 22, 46);

  // Car tier
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(CAR_TIERS[Math.min(playerTier, 3)], GW - 38, 46);

  // Score + combo
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  var scoreText = 'SCORE: ' + totalScore;
  if (comboCount >= 2) {
    scoreText += '  x' + getComboMult().toFixed(1);
  }
  ctx.fillText(scoreText, GW / 2, 42);

  // Stat display (small) — shows active stat bonuses
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#666';
  var lvlText = statB.name + ' Lv' + statB.level;
  ctx.fillText(lvlText, GW - 8, 42);

  // Combo counter
  if (comboCount >= 2) {
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    var comboAlpha = Math.min(1, comboTimer);
    ctx.globalAlpha = comboAlpha;
    ctx.fillText(comboCount + ' COMBO!', 8, GH - 60);
    ctx.globalAlpha = 1;
  }

  // Boss HP bar at top of screen
  if (boss && boss.active) {
    var bHpPct = boss.hp / boss.maxHp;
    pxRect(GW / 2 - 80, 52, 160, 8, '#333');
    pxRect(GW / 2 - 80, 52, Math.floor(160 * bHpPct), 8, bHpPct > 0.3 ? '#ff4444' : '#ff8800');
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.type + ' [' + boss.hp + '/' + boss.maxHp + ']', GW / 2, 50);
  }

  // Mini position indicators
  pxRect(GW / 2 - 40, 24, 80, 8, '#222');
  for (var i = 0; i < racePositions.length; i++) {
    var rp = racePositions[i];
    var col = rp.id === 'player' ? statB.color : AI_COLORS[rp.id] || '#888';
    pxRect(GW / 2 - 38 + i * 20, 25, 16, 6, col);
    ctx.fillStyle = '#fff';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(rp.id === 'player' ? statB.icon : String(rp.id + 1), GW / 2 - 30 + i * 20, 30);
  }
}

function drawCountdown() {
  if (countdownTimer <= 0) return;
  var num = Math.ceil(countdownTimer);
  ctx.textAlign = 'center';
  ctx.font = 'bold 48px monospace';
  var scale = 1 + (countdownTimer % 1) * 0.3;
  ctx.save();
  ctx.translate(GW / 2, GH / 2);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#000';
  ctx.fillText(num > 3 ? '' : num === 0 ? 'GO!' : String(num), 2, 2);
  ctx.fillStyle = num === 0 ? '#38d973' : '#f4b41b';
  ctx.fillText(num > 3 ? '' : num === 0 ? 'GO!' : String(num), 0, 0);
  ctx.restore();
}

function drawResults() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  var pos = getPlayerPosition();

  // NES-style border
  ctx.strokeStyle = pos <= 3 ? '#38d973' : '#e6482e';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, 40, GW - 80, GH - 80);

  ctx.fillStyle = pos <= 3 ? '#38d973' : '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(pos <= 3 ? 'REACTOR CLEARED!' : 'SPORED OUT - RETRY', GW / 2, 100);

  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('RESULTS', GW / 2, 145);

  // Show finish order with pixel badges
  ctx.font = '14px monospace';
  for (var i = 0; i < raceFinishOrder.length; i++) {
    var rid = raceFinishOrder[i];
    var name = rid === 'player' ? (statB.name || 'YOU') : 'CPU ' + (rid + 1);
    var col = rid === 'player' ? statB.color : AI_COLORS[rid] || '#888';
    // Medal pixels
    var medals = ['#f4b41b', '#aaaaaa', '#7a444a', '#666666'];
    pxRect(GW / 2 - 60, 168 + i * 24, 8, 8, medals[i] || '#444');
    ctx.fillStyle = col;
    ctx.textAlign = 'left';
    ctx.fillText((i + 1) + '. ' + name, GW / 2 - 45, 177 + i * 24);
  }

  ctx.textAlign = 'center';

  // Stats summary
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('CAR: ' + CAR_TIERS[Math.min(playerTier, 3)], GW / 2, 290);
  ctx.fillText('SCORE: ' + totalScore, GW / 2, 310);
  ctx.fillText('TIME: ' + raceTime.toFixed(1) + 's', GW / 2, 330);

  // Show stat bonuses
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 350);

  if (resultTimer <= 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(pos <= 3 ? 'PRESS ANY KEY FOR NEXT REACTOR' : 'PRESS ANY KEY TO RETRY', GW / 2, 390);
    ctx.globalAlpha = 1;
  }
}

function drawPrerace() {
  ctx.fillStyle = zonePalette ? zonePalette.sky : '#111';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = TRACK_THEMES[currentTrack].accent;
  ctx.font = 'bold 20px monospace';
  ctx.fillText('REACTOR ' + (currentTrack + 1), GW / 2, 80);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(TRACK_NAMES[currentTrack], GW / 2, 110);

  // Zone type label
  ctx.fillStyle = TRACK_THEMES[currentTrack].accent;
  ctx.font = '10px monospace';
  ctx.fillText('[ ' + TRACK_ZONES[currentTrack].toUpperCase().replace('_', ' ') + ' ZONE ]', GW / 2, 128);

  // Track preview
  ctx.save();
  ctx.translate(GW / 2 - 80, 140);
  ctx.scale(0.5, 0.5);
  var preview = TRACK_BUILDERS[currentTrack]();
  ctx.strokeStyle = TRACK_THEMES[currentTrack].road;
  ctx.lineWidth = 6;
  ctx.beginPath();
  for (var i = 0; i < preview.length; i++) {
    var sp = { x: (preview[i].x - 10) * 16 + 160, y: (preview[i].y - 10) * 12 + 100 };
    if (i === 0) ctx.moveTo(sp.x, sp.y);
    else ctx.lineTo(sp.x, sp.y);
  }
  ctx.closePath();
  ctx.stroke();
  // Track accent border
  ctx.strokeStyle = TRACK_THEMES[currentTrack].accent;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  // Track features — Tasern themed descriptions
  var features = [
    'A gentle lap through the mushwood - get your baseling car rolling',
    'Spore clouds drift across the crossover - dodge the toxic haze!',
    'Mycelium threads weave tight S-curves - hug the fungal walls',
    'Launch off poop chute ramps - collect POOP tokens in the air!',
    'Garden irrigation gone wrong - spore oil slicks everywhere',
    'Deep beneath the reactor - your headlights barely pierce the dark',
    'Risky seed paths branch off the main track - high risk, high reward',
    'Smash through mold barriers in the reactor core!',
    'Frozen spore crystals coat the track - drift or die',
    'The Void Circuit - all hazards, all spores, no mercy!'
  ];
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText(features[currentTrack], GW / 2, 320);

  // Boss warning
  if (TRACK_BOSSES[currentTrack]) {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('!! FUNGAL BOSS: ' + TRACK_BOSSES[currentTrack].type + ' !!', GW / 2, 340);
  }

  // Enemy preview
  var zone = TRACK_ZONES[currentTrack];
  var zoneEnemyMap = {
    forest: ['goblin', 'slime'], spore_field: ['spore', 'mushfolk'], swamp: ['slime', 'goblin'],
    cave: ['golem', 'wraith'], reactor: ['spore', 'wraith'], tundra: ['golem', 'slime'],
    volcano: ['drake', 'golem'], ruins: ['wraith', 'goblin'], crystal: ['golem', 'spore'], void: ['wraith', 'drake']
  };
  var zoneEnemyList = zoneEnemyMap[zone] || ['goblin'];
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('HAZARDS: ' + zoneEnemyList.map(function(e) { return ENEMY_TYPES[e].name; }).join(', '), GW / 2, 358);

  ctx.fillStyle = '#555';
  ctx.fillText('CAR: ' + CAR_TIERS[Math.min(playerTier, 3)] + '  |  LAPS: ' + LAPS_TO_WIN + '  |  ' + statB.name + ' Lv' + statB.level, GW / 2, 378);

  // Stat bar preview
  var stats = [
    { name: 'STR', val: statB.str, col: '#ff4444' },
    { name: 'DEX', val: statB.dex, col: '#44ff44' },
    { name: 'CON', val: statB.con, col: '#ffaa44' },
    { name: 'INT', val: statB.int, col: '#4488ff' },
    { name: 'WIS', val: statB.wis, col: '#aa44ff' },
    { name: 'CHA', val: statB.cha, col: '#ff44aa' }
  ];
  var barY = 394;
  ctx.font = '7px monospace';
  for (var i = 0; i < stats.length; i++) {
    var sx = GW / 2 - 90 + i * 30;
    ctx.fillStyle = '#444';
    ctx.textAlign = 'center';
    ctx.fillText(stats[i].name, sx + 10, barY);
    pxRect(sx, barY + 2, 20, 4, '#222');
    pxRect(sx, barY + 2, Math.floor(20 * Math.min(1, stats[i].val / 20)), 4, stats[i].col);
  }

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS ANY KEY TO RACE', GW / 2, 430);
  ctx.globalAlpha = 1;
}

function drawVictory() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Celebration particles
  if (frame % 8 === 0) {
    var cols = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffaa'];
    TAS.particles.spawn(TAS.math.randRange(50, GW - 50), 50, cols[frame % cols.length], 5, 2, { gravity: 0.05 });
  }
  TAS.particles.draw();

  // NES trophy pixel art
  pxRect(GW / 2 - 8, 65, 16, 4, '#f4b41b');
  pxRect(GW / 2 - 12, 69, 24, 12, '#f4b41b');
  pxRect(GW / 2 - 16, 69, 4, 8, '#f4b41b');
  pxRect(GW / 2 + 12, 69, 4, 8, '#f4b41b');
  pxRect(GW / 2 - 4, 81, 8, 8, '#f4b41b');
  pxRect(GW / 2 - 10, 89, 20, 4, '#f4b41b');

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE CHAMPION!', GW / 2, 130);

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('ALL REACTORS CONQUERED', GW / 2, 170);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + totalScore, GW / 2, 220);

  if (totalScore >= highScore && totalScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 255);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('BEST: ' + highScore, GW / 2, 255);
  }

  // Final stat summary
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText(statB.name + ' Lv' + statB.level + '  |  CAR: ' + CAR_TIERS[Math.min(playerTier, 3)], GW / 2, 290);
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 310);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, 400);
  ctx.globalAlpha = 1;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'prerace') {
    drawPrerace();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'results') {
    drawResults();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'racing') {
    ctx.save();
    TAS.fx.applyShake();

    drawTrack();
    drawEnemies();
    drawBoss();
    drawItems();
    drawProjectiles();
    drawCars();
    TAS.particles.draw();
    drawRain();
    drawNightOverlay();
    drawScorePopups();

    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    drawCountdown();
    drawTutorial();
    TAS.input.drawTouchControls(GW, GH);
  }
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Animated zone-colored stripes
  for (var i = 0; i < 6; i++) {
    var y = ((frame * 1.5 + i * 80) % (GH + 100)) - 50;
    var cols = ['rgba(40,20,60,0.2)', 'rgba(20,60,40,0.15)', 'rgba(60,20,20,0.15)', 'rgba(20,40,60,0.2)', 'rgba(60,40,20,0.15)', 'rgba(40,60,20,0.15)'];
    ctx.fillStyle = cols[i];
    ctx.fillRect(0, y, GW, 24);
  }

  // Isometric track preview loop
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 8;
  ctx.beginPath();
  for (var i = 0; i < 40; i++) {
    var a = (i / 40) * Math.PI * 2 + frame * 0.005;
    var x = GW / 2 + Math.cos(a) * 100;
    var y = GH / 2 + 40 + Math.sin(a) * 50;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Animated car, with the selected baseling driving it.
  var carAngle = (frame * 0.03) % (Math.PI * 2);
  var carX = GW / 2 + Math.cos(carAngle) * 100;
  var carY = GH / 2 + 40 + Math.sin(carAngle) * 50;
  drawCar({ x: carX, y: carY }, statB.color, 2, 0, false, false);
  TAS.drawBaseling(ctx, carX, carY - 6, 20, { anim: 'idle', frame: frame, flipX: false });

  // Spore particles on title
  if (frame % 15 === 0) {
    TAS.particles.spawn(Math.random() * GW, GH, '#aa44ff', 2, 0.5, { gravity: -0.02 });
  }
  TAS.particles.draw();

  // Title — NES pixel shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('RC REACTOR', GW / 2 + 2, 92);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('RC REACTOR', GW / 2, 90);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '12px monospace';
  ctx.fillText('BASELING SPORE TRACK RACING', GW / 2, 118);

  // Selected baseling name (Base-blue) + 5 arcade stat bars
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('RACER: ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 140);
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bx0 = GW / 2 - 110;
    ctx.textAlign = 'left'; ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k], _bx = _bx0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, 158);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 161, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 161, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // NES-style control layout
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  var y0 = 340;
  // D-pad
  pxRect(GW / 2 - 140, y0, 12, 12, '#333');
  pxRect(GW / 2 - 140 + 12, y0 - 12, 12, 12, '#333');
  pxRect(GW / 2 - 140 + 12, y0 + 12, 12, 12, '#333');
  pxRect(GW / 2 - 140 + 24, y0, 12, 12, '#333');
  pxRect(GW / 2 - 140 + 12, y0, 12, 12, '#555');
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('UP', GW / 2 - 122, y0 - 4);
  ctx.fillText('DN', GW / 2 - 122, y0 + 22);
  ctx.fillText('L', GW / 2 - 134, y0 + 9);
  ctx.fillText('R', GW / 2 - 110, y0 + 9);

  // A/B buttons
  pxRect(GW / 2 + 80, y0, 16, 16, '#ff4444');
  pxRect(GW / 2 + 105, y0, 16, 16, '#44ff88');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('A', GW / 2 + 88, y0 + 12);
  ctx.fillText('B', GW / 2 + 113, y0 + 12);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('A/UP = GAS   B/SPACE = USE ITEM   D-PAD = STEER', GW / 2, y0 + 36);
  ctx.fillText('COLLECT R+C = UPGRADE  |  TOP 3 = NEXT REACTOR', GW / 2, y0 + 52);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 420);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 34);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 16);

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
