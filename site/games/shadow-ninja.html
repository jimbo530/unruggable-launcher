<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Ninja</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === BASELING STATS (BaselingPlayer.getMults, see ARCADE-STATS.md) ===
// The single source of stat math, clamped to the single-player band (0.8-1.6). The helpers
// below read D&D-style fields on statB; rather than rewrite them, we synthesize statB from
// the five bounded multipliers in recomputeStats():
//   SPD -> ninja speed,  STA -> HP/lives,  PWR -> sword/shuriken damage,  LCK -> drops/score.
// recomputeStats() re-runs after a title-screen baseling pick. Not a wager game.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#38d973', name: 'Baseling', icon: 'B' };
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage);    // STR helpers -> sword/shuriken damage
  statB.dex = dnd(m.moveSpeed); // DEX helpers -> ninja speed, wall slide
  statB.con = dnd(m.health);    // CON helpers -> HP, bonus lives
  statB.int = dnd(m.luck);      // INT helpers -> score (luck flavor)
  statB.wis = dnd(m.luck);      // WIS helpers -> cooldown/charge (luck flavor)
  statB.cha = dnd(m.luck);      // CHA helpers -> drops, pickups
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch(e) { console.warn('[shadow-ninja] NftLoader display info failed:', e && e.message); }
recomputeStats();
var picking = false; // baseling character-select overlay open

// === STAT SCALING HELPERS ===
// STR: sword/shuriken damage multiplier (10 = 1x, 20 = 1.5x)
function strDmgMult() { return 1 + (statB.str - 10) * 0.05; }
// DEX: ninja speed multiplier + wall cling slide reduction (10 = 1x, 20 = 1.5x)
function dexSpeedMult() { return 1 + (statB.dex - 10) * 0.05; }
// DEX: wall slide is slower (better cling) with higher DEX
function dexWallSlide() { return Math.max(10, WALL_SLIDE_VY - (statB.dex - 10) * 2); }
// CON: HP multiplier (10 = 1x, 20 = 1.5x) and bonus lives
function conHpMult() { return 1 + (statB.con - 10) * 0.05; }
function conBonusLives() { return Math.floor((statB.con - 10) / 5); }
// INT: score multiplier (10 = 1x, 20 = 1.5x)
function intScoreMult() { return 1 + (statB.int - 10) * 0.05; }
// WIS: cooldown reduction (10 = 1x, 20 = 0.5x attack timer)
function wisCooldownMult() { return Math.max(0.3, 1 - (statB.wis - 10) * 0.05); }
// CHA: item/ammo drop chance bonus (10 = 1x, 20 = 2x)
function chaDropMult() { return 1 + (statB.cha - 10) * 0.1; }
// CHA: pickup value multiplier
function chaPickupMult() { return 1 + (statB.cha - 10) * 0.03; }

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'ATTACK', c: 'PICK' } });
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[shadow-ninja] player init failed:', e && e.message); });
}

var TILE = 16;
var GRAV = 980;
var MAX_VX = 140;
var JUMP_VY = -320;
var WALL_SLIDE_VY = 40;
var DASH_SPEED = 280;
var DASH_DUR = 0.15;
var IFRAME_DUR = 0.8;
var LEVEL_W = 60;
var LEVEL_H = 20;

// === COLORS (Baseling-universe per dojo) ===
var C = {
  bg:     ['#1a1c2c','#1a1c2c','#1a1c2c','#1a1c2c','#1a1c2c','#1a1c2c','#1a1c2c','#1a1c2c'],
  accent: ['#38d973','#a855f7','#f4b41b','#e6482e','#3cacd7','#a855f7','#38d973','#3cacd7'],
  wall:   ['#2a1f30','#2a2a18','#1a3020','#3a1a1a','#2a2010','#1a2040','#2a1a30','#1a2030'],
  floor:  ['#332244','#334422','#224422','#442222','#443300','#223355','#332244','#224455'],
  spore:  ['#38d973','#a855f7','#f4b41b','#e6482e','#3cacd7','#a855f7','#38d973','#3cacd7'],
  mycel:  ['#225544','#3a255a','#443322','#442222','#2a4050','#3a255a','#225544','#2a4050']
};

// === DOJO THEMES ===
var STAGE_NAMES = [
  'POOP Sewers',
  'Spore Warehouse',
  'Shadow Garden',
  'Hyphae Barracks',
  'Reactor Core',
  'Bioluminescent Lab',
  'Throne of the Spore King',
  'Canopy of Tasern'
];
var BOSS_STAGES = [1, 3, 5, 7];

// Dojo flavor text shown on intro
var DOJO_FLAVOR = [
  'The POOP pipeline pulses beneath the streets...',
  'Spores drift through the old supply crates...',
  'Shadow gardens glow with forbidden fungi...',
  'Hyphae tendrils guard every passage of Tasern...',
  'Reactor cores hum with baseling energy...',
  'Strange light emanates from the spore vats...',
  'The Spore King awaits atop his fungal throne...',
  'Wind carries garden seeds across the canopy...'
];

// Boss names (mycelium themed)
var BOSS_NAMES = {
  1: 'Shadow Mold Warden',
  3: 'General Dark Fungi',
  5: 'Dr. Smoke Parasite',
  7: 'The Spore King'
};

// === STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('shadow_ninja_hi');
var lives = 3;
var stage = 0;
var frame = 0;
var camX = 0;
var checkpoint = 0;
var bossActive = false;
var stageComplete = false;
var completeTimer = 0;
var tutorialShown = false;
var tutorialTimer = 0;
var tutorialStep = 0;
var deathParticles = [];
var envParticles = [];

// === PLAYER ===
var P = {};
function resetPlayer(x, y) {
  var baseHp = Math.floor(6 * conHpMult() * statB.hpMult); // CON + statB.hpMult
  P = {
    x: x || 32, y: y || 240,
    vx: 0, vy: 0,
    w: 12, h: 22,
    dir: 1,
    hp: baseHp, maxHp: baseHp,
    grounded: false,
    walling: 0,
    ceiling: false,
    dashing: 0, dashDir: 0,
    iframes: 0,
    attackTimer: 0, attackDir: 0, attackUp: false,
    weapon: 0, // 0=katana, 1=chain, 2=spore-shuriken
    weaponLevel: [0, 0, 0],
    shurikenAmmo: 15,
    combo: 0, comboTimer: 0,
    anim: 0, slashTrail: [],
    ninjutsuCharge: 0, // WIS-based special meter
    kunaiStock: 0 // reactor kunai pickup
  };
}
resetPlayer();

// === LEVEL DATA ===
var tiles = [];
var enemies = [];
var pickups = [];
var projectiles = [];
var boss = null;
var bgParticles = [];

// === LEVEL GENERATION ===
function generateLevel(stg) {
  tiles = [];
  enemies = [];
  pickups = [];
  projectiles = [];
  boss = null;
  bgParticles = [];
  deathParticles = [];
  envParticles = [];
  bossActive = false;
  stageComplete = false;
  completeTimer = 0;

  var w = LEVEL_W;
  var h = LEVEL_H;

  for (var y = 0; y < h; y++) {
    tiles[y] = [];
    for (var x = 0; x < w; x++) {
      tiles[y][x] = 0;
    }
  }

  // Floor
  for (var x = 0; x < w; x++) {
    tiles[h - 1][x] = 1;
    tiles[h - 2][x] = 1;
  }

  // Ceiling
  for (var x = 0; x < w; x++) {
    tiles[0][x] = 1;
    tiles[1][x] = 1;
  }

  // Walls at edges
  for (var y = 0; y < h; y++) {
    tiles[y][0] = 1;
    tiles[y][1] = 1;
    tiles[y][w - 1] = 1;
    tiles[y][w - 2] = 1;
  }

  var seed = stg * 1337;
  var rng = seedRng(seed);

  // Generate platforms
  var numPlats = 8 + stg * 2;
  for (var i = 0; i < numPlats; i++) {
    var px = 4 + Math.floor(rng() * (w - 10));
    var py = 4 + Math.floor(rng() * (h - 7));
    var pw = 2 + Math.floor(rng() * 4);
    for (var dx = 0; dx < pw; dx++) {
      if (px + dx < w - 2) tiles[py][px + dx] = 1;
    }
  }

  // Walls for clinging
  var numWalls = 3 + stg;
  for (var i = 0; i < numWalls; i++) {
    var wx = 4 + Math.floor(rng() * (w - 8));
    var wy = 4 + Math.floor(rng() * (h - 8));
    var wh = 3 + Math.floor(rng() * 4);
    for (var dy = 0; dy < wh; dy++) {
      if (wy + dy < h - 2) tiles[wy + dy][wx] = 1;
    }
  }

  // Ceiling segments for hanging
  for (var i = 0; i < 4; i++) {
    var cx = 5 + Math.floor(rng() * (w - 12));
    var cw = 3 + Math.floor(rng() * 5);
    for (var dx = 0; dx < cw; dx++) {
      if (cx + dx < w - 2) tiles[2][cx + dx] = 1;
    }
  }

  // Mycelium patches on walls (type 3 = decorative fungus)
  for (var y = 3; y < h - 2; y++) {
    for (var x = 3; x < w - 3; x++) {
      if (tiles[y][x] === 0 && rng() < 0.02) {
        // Check if adjacent to a wall
        if ((x > 0 && tiles[y][x-1] === 1) || (x < w-1 && tiles[y][x+1] === 1) ||
            (y > 0 && tiles[y-1][x] === 1) || (y < h-1 && tiles[y+1][x] === 1)) {
          tiles[y][x] = 3; // mycelium decoration
        }
      }
    }
  }

  // Hazard tiles (type 2) - toxic spores in sewers, reactor glow in lab
  if (stg === 0 || stg === 4 || stg === 5) {
    for (var x = 3; x < w - 3; x++) {
      if (rng() < 0.1) {
        tiles[h - 3][x] = 2;
      }
    }
  }

  // Spawn enemies (mycelial types)
  var enemyCount = 5 + stg * 3;
  for (var i = 0; i < enemyCount; i++) {
    var ex = 80 + Math.floor(rng() * (w * TILE - 160));
    var ey = findGround(ex / TILE | 0) * TILE - 20;
    if (ey > 48) {
      enemies.push(createEnemy(ex, ey, stg, rng));
    }
  }

  // Spawn pickups (CHA affects quantity)
  var pickupCount = Math.floor(4 * chaDropMult());
  for (var i = 0; i < pickupCount; i++) {
    var px2 = 60 + Math.floor(rng() * (w * TILE - 120));
    var py2 = findGround(px2 / TILE | 0) * TILE - 24;
    if (py2 > 48) {
      var roll = rng();
      var type;
      if (roll < 0.2) type = 'crystal';
      else if (roll < 0.4) type = 'ammo';
      else if (roll < 0.55) type = 'weapon';
      else if (roll < 0.7) type = 'kunai'; // reactor kunai pickup
      else type = 'spore_boost'; // temporary speed boost
      pickups.push({ x: px2, y: py2, type: type, weapon: Math.floor(rng() * 3), alive: true, anim: 0 });
    }
  }

  // Health pickup
  pickups.push({
    x: (w / 2) * TILE,
    y: findGround(w / 2) * TILE - 24,
    type: 'health', alive: true, anim: 0
  });

  // Boss at end of boss stages
  if (BOSS_STAGES.indexOf(stg) !== -1) {
    var bx = (w - 6) * TILE;
    var by = findGround(w - 6) * TILE - 40;
    boss = createBoss(stg, bx, by);
  }

  // Background particles (floating spores)
  for (var i = 0; i < 30; i++) {
    bgParticles.push({
      x: rng() * w * TILE,
      y: rng() * h * TILE,
      vx: (rng() - 0.5) * 8,
      vy: rng() * -3 - 1, // spores float upward
      size: 1 + rng() * 3,
      alpha: 0.1 + rng() * 0.3,
      pulse: rng() * Math.PI * 2
    });
  }

  // Environmental particles (dojo-specific)
  spawnEnvParticles(stg, w, h, rng);

  var baseHp = Math.floor(6 * conHpMult() * statB.hpMult);
  resetPlayer(48, findGround(3) * TILE - 28);
  camX = 0;
  checkpoint = 48;
}

// Dojo-specific environment particles
function spawnEnvParticles(stg, w, h, rng) {
  envParticles = [];
  var count = 15;
  for (var i = 0; i < count; i++) {
    var ep = {
      x: rng() * w * TILE,
      y: rng() * h * TILE,
      vx: 0, vy: 0,
      size: 1 + rng() * 2,
      alpha: 0.15 + rng() * 0.2,
      life: 999,
      type: 'generic'
    };
    if (stg === 0) {
      // Sewers: dripping water
      ep.type = 'drip';
      ep.vy = 20 + rng() * 30;
      ep.size = 1;
    } else if (stg === 2) {
      // Garden: floating pollen
      ep.type = 'pollen';
      ep.vx = (rng() - 0.5) * 10;
      ep.vy = (rng() - 0.5) * 5;
      ep.size = 2 + rng() * 2;
    } else if (stg === 4) {
      // Arsenal: sparks
      ep.type = 'spark';
      ep.vx = (rng() - 0.5) * 40;
      ep.vy = -10 - rng() * 20;
      ep.alpha = 0.6;
      ep.size = 1;
    } else if (stg === 5) {
      // Lab: bioluminescent glow
      ep.type = 'glow';
      ep.size = 3 + rng() * 4;
      ep.alpha = 0.1 + rng() * 0.15;
      ep.vx = (rng() - 0.5) * 3;
      ep.vy = (rng() - 0.5) * 3;
    } else if (stg === 7) {
      // Rooftop: wind particles
      ep.type = 'wind';
      ep.vx = 20 + rng() * 30;
      ep.vy = -2 + rng() * 4;
      ep.size = 1;
    }
    envParticles.push(ep);
  }
}

function findGround(tx) {
  tx = Math.max(0, Math.min(LEVEL_W - 1, tx));
  for (var y = 3; y < LEVEL_H; y++) {
    if (tiles[y][tx] === 1) return y;
  }
  return LEVEL_H - 2;
}

function seedRng(s) {
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

// === ENEMIES (mycelial themed) ===
function createEnemy(x, y, stg, rng) {
  var pool;
  if (stg < 2) pool = ['spore_grunt', 'spore_grunt', 'mycel_archer'];
  else if (stg < 4) pool = ['spore_grunt', 'mycel_archer', 'fungal_shield', 'shadow_ninja'];
  else if (stg < 6) pool = ['spore_grunt', 'mycel_archer', 'fungal_shield', 'shadow_ninja', 'spore_drone'];
  else pool = ['shadow_ninja', 'fungal_shield', 'spore_drone', 'shadow_ninja', 'mycel_archer'];

  var type = pool[Math.floor(rng() * pool.length)];
  var e = {
    x: x, y: y, vx: 0, vy: 0,
    w: 14, h: 20,
    type: type,
    hp: type === 'fungal_shield' ? 4 : (type === 'shadow_ninja' ? 3 : 2),
    maxHp: type === 'fungal_shield' ? 4 : (type === 'shadow_ninja' ? 3 : 2),
    dir: rng() < 0.5 ? -1 : 1,
    alive: true,
    anim: 0,
    attackCd: 0,
    patrolTimer: 0,
    state: 'patrol',
    stunTimer: 0,
    flying: type === 'spore_drone',
    sporeTrail: [] // visual trail for mycelial enemies
  };
  if (type === 'spore_drone') { e.y = y - 40; e.h = 14; e.w = 16; }
  return e;
}

function createBoss(stg, x, y) {
  var bossIdx = BOSS_STAGES.indexOf(stg);
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: 32, h: 40,
    hp: 12 + bossIdx * 4,
    maxHp: 12 + bossIdx * 4,
    name: BOSS_NAMES[stg] || 'Dark Fungi Boss',
    phase: 0,
    dir: -1,
    anim: 0,
    attackCd: 2,
    pattern: 0,
    alive: true,
    stunTimer: 0,
    flashTimer: 0,
    stg: stg,
    sporeCloud: 0 // boss-specific spore cloud timer
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // baseling picker overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    updateDeathParticles(dt);
    if (frame % 2 === 0 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state === 'stageIntro') {
    completeTimer -= dt;
    if (completeTimer <= 0) {
      state = 'playing';
      if (!tutorialShown && stage === 0) {
        tutorialTimer = 8;
        tutorialStep = 0;
        tutorialShown = true;
      }
    }
    return;
  }

  if (state === 'stageClear') {
    completeTimer -= dt;
    if (completeTimer <= 0) {
      stage++;
      if (stage >= 8) {
        var bonusScore = Math.floor(5000 * intScoreMult()); // INT bonus on victory
        score += bonusScore;
        if (score > highScore) { highScore = score; TAS.score.save('shadow_ninja_hi', highScore); }
        state = 'victory';
        completeTimer = 5;
      } else {
        generateLevel(stage);
        state = 'stageIntro';
        completeTimer = 2;
      }
    }
    return;
  }

  if (state === 'victory') {
    completeTimer -= dt;
    if (completeTimer <= 0) state = 'title';
    return;
  }

  if (state === 'playing') {
    // Tutorial timer
    if (tutorialTimer > 0) {
      tutorialTimer -= dt;
      if (tutorialTimer < 6 && tutorialStep === 0) tutorialStep = 1;
      if (tutorialTimer < 4 && tutorialStep === 1) tutorialStep = 2;
      if (tutorialTimer < 2 && tutorialStep === 2) tutorialStep = 3;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateProjectiles(dt);
    updatePickups(dt);
    updateBgParticles(dt);
    updateEnvParticles(dt);
    updateDeathParticles(dt);
    updateCamera(dt);

    // Ninjutsu charge (WIS affects charge rate)
    P.ninjutsuCharge = Math.min(100, P.ninjutsuCharge + dt * 5 * (1 + (statB.wis - 10) * 0.1));

    // Check stage complete
    if (!bossActive && !boss && P.x > (LEVEL_W - 5) * TILE) {
      stageComplete = true;
      state = 'stageClear';
      completeTimer = 2;
      var clearScore = Math.floor(1000 * intScoreMult()); // INT multiplied
      score += clearScore;
      TAS.audio.playTone(440, 0.15, 'square', 0.08);
      TAS.audio.playTone(660, 0.15, 'square', 0.08);
      setTimeout(function() { TAS.audio.playTone(880, 0.2, 'square', 0.08); }, 200);
    }

    // Boss trigger
    if (boss && boss.alive && P.x > boss.x - 120 && !bossActive) {
      bossActive = true;
      TAS.fx.shake(6, 0.9);
      TAS.audio.playTone(80, 0.4, 'sawtooth', 0.1, 40);
    }
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  var K = TAS.input.keys;
  var T = TAS.input.touch;

  P.anim += dt;
  if (P.iframes > 0) P.iframes -= dt;
  if (P.attackTimer > 0) P.attackTimer -= dt;
  if (P.comboTimer > 0) { P.comboTimer -= dt; if (P.comboTimer <= 0) P.combo = 0; }

  // DEX-modified speed
  var moveSpeed = MAX_VX * dexSpeedMult() * statB.speed;
  var wallSlide = dexWallSlide(); // DEX reduces slide speed

  // Dash update
  if (P.dashing > 0) {
    P.dashing -= dt;
    P.vx = P.dashDir * DASH_SPEED * dexSpeedMult(); // DEX boosts dash
    P.vy = 0;
    if (frame % 2 === 0) {
      P.slashTrail.push({ x: P.x, y: P.y, life: 0.3 });
    }
    applyMovement(dt);
    updateTrail(dt);
    return;
  }

  // NES-style controls
  var left = K['ArrowLeft'] || K['KeyA'] || T.left;
  var right = K['ArrowRight'] || K['KeyD'] || T.right;
  var up = K['ArrowUp'] || K['KeyW'] || T.up;
  var down = K['ArrowDown'] || K['KeyS'] || T.down;
  var jump = K['KeyZ'] || K['Space'] || T.a;
  var attack = K['KeyX'] || K['KeyC'] || T.b;

  // Movement
  if (P.ceiling) {
    var ceilSpeed = 80 * dexSpeedMult(); // DEX on ceiling
    if (left) { P.x -= ceilSpeed * dt; P.dir = -1; }
    if (right) { P.x += ceilSpeed * dt; P.dir = 1; }
    if (down || jump) {
      P.ceiling = false;
      P.vy = 50;
      if (attack) {
        P.attackTimer = 0.3 * wisCooldownMult(); // WIS reduces cooldown
        P.attackDir = P.dir;
        P.vy = 250;
      }
    }
    var tx = Math.floor(P.x / TILE);
    var ty = Math.floor((P.y - P.h / 2 - 2) / TILE);
    if (ty < 0 || ty >= LEVEL_H || tx < 0 || tx >= LEVEL_W || tiles[ty][tx] !== 1) {
      P.ceiling = false;
    }
  } else if (P.walling !== 0) {
    P.vy = wallSlide; // DEX-modified wall slide
    if (jump) {
      P.vx = -P.walling * 180 * dexSpeedMult(); // DEX wall jump power
      P.vy = JUMP_VY * 0.85;
      P.dir = -P.walling;
      P.walling = 0;
      TAS.audio.playTone(350, 0.08, 'square', 0.06);
    }
    if ((P.walling === -1 && right) || (P.walling === 1 && left)) {
      P.walling = 0;
    }
    if (down) { P.walling = 0; P.vy = 100; }
    applyMovement(dt);
  } else {
    if (left) { P.vx = -moveSpeed; P.dir = -1; }
    else if (right) { P.vx = moveSpeed; P.dir = 1; }
    else { P.vx *= 0.8; if (Math.abs(P.vx) < 5) P.vx = 0; }

    if (jump && P.grounded) {
      P.vy = JUMP_VY;
      P.grounded = false;
      TAS.audio.playTone(280, 0.08, 'triangle', 0.05);
    }

    if (!P.grounded) {
      P.vy += GRAV * dt;
      if (P.vy > 500) P.vy = 500;

      // Ceiling grab
      if (P.vy < 0 && up) {
        var tx = Math.floor(P.x / TILE);
        var ty = Math.floor((P.y - P.h / 2 - 4) / TILE);
        if (ty >= 0 && ty < LEVEL_H && tx >= 0 && tx < LEVEL_W && tiles[ty][tx] === 1) {
          P.ceiling = true;
          P.vy = 0;
          P.y = (ty + 1) * TILE + P.h / 2 + 1;
          TAS.audio.playTone(200, 0.05, 'square', 0.04);
        }
      }

      // Wall cling check (DEX improves detection range slightly)
      if (!P.grounded && (left || right)) {
        var side = left ? -1 : 1;
        var clingRange = P.w / 2 + 2 + (statB.dex > 14 ? 1 : 0); // DEX bonus reach
        var tx = Math.floor((P.x + side * clingRange) / TILE);
        var ty = Math.floor(P.y / TILE);
        if (tx >= 0 && tx < LEVEL_W && ty >= 0 && ty < LEVEL_H && tiles[ty][tx] === 1) {
          P.walling = side;
          P.vy = 0;
          TAS.audio.playTone(150, 0.04, 'square', 0.03);
        }
      }
    }

    applyMovement(dt);
  }

  // Dash
  if ((K['ShiftLeft'] || K['ShiftRight']) && P.dashing <= 0 && P.grounded) {
    P.dashing = DASH_DUR;
    P.dashDir = P.dir;
    P.iframes = DASH_DUR;
    TAS.audio.playTone(180, 0.1, 'sawtooth', 0.06, 80);
  }

  // Ninjutsu special (Select/Tab = ninjutsu, WIS-gated)
  if ((K['Tab'] || K['Backquote']) && P.ninjutsuCharge >= 50) {
    performNinjutsu();
  }

  // Reactor kunai throw (hold up + attack with kunai stock)
  if (attack && up && P.kunaiStock > 0 && P.attackTimer <= 0) {
    throwReactorKunai();
  } else if (attack && P.attackTimer <= 0) {
    performAttack(up);
  }

  // Hazard check
  var htx = Math.floor(P.x / TILE);
  var hty = Math.floor((P.y + P.h / 2) / TILE);
  if (htx >= 0 && htx < LEVEL_W && hty >= 0 && hty < LEVEL_H && tiles[hty][htx] === 2) {
    hurtPlayer(1);
  }

  updateTrail(dt);
}

// Ninjutsu special attack (WIS-powered)
function performNinjutsu() {
  P.ninjutsuCharge -= 50;
  TAS.fx.flash(statB.color || '#38d973', 0.3);
  TAS.fx.shake(4, 0.8);
  TAS.audio.playTone(220, 0.2, 'sawtooth', 0.08, 440);
  TAS.audio.playTone(440, 0.15, 'triangle', 0.06);

  // Spore burst: damages all enemies on screen
  var burstDmg = Math.floor(2 * strDmgMult() * statB.damage);
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (Math.abs(e.x - P.x) < GW / 2 && Math.abs(e.y - P.y) < GH / 2) {
      damageEnemy(e, burstDmg);
    }
  }

  // Particle burst
  TAS.particles.spawn(P.x, P.y, C.spore[stage], 20, 5, { gravity: 0.5 });
  for (var i = 0; i < 12; i++) {
    var angle = (Math.PI * 2 / 12) * i;
    projectiles.push({
      x: P.x, y: P.y,
      vx: Math.cos(angle) * 120,
      vy: Math.sin(angle) * 120,
      w: 4, h: 4, dmg: 1,
      owner: 'player', type: 'spore_burst', life: 0.6, anim: 0
    });
  }
}

// Reactor kunai (special pickup projectile)
function throwReactorKunai() {
  P.kunaiStock--;
  P.attackTimer = 0.15 * wisCooldownMult();
  var kx = P.x + P.dir * 10;
  var ky = P.y - 4;
  projectiles.push({
    x: kx, y: ky,
    vx: P.dir * 300,
    vy: -30,
    w: 8, h: 4,
    dmg: Math.floor(4 * strDmgMult() * statB.damage), // STR-boosted heavy damage
    owner: 'player', type: 'reactor_kunai', life: 2.5, anim: 0
  });
  TAS.audio.playTone(600, 0.08, 'sawtooth', 0.07, 1000);
  TAS.audio.playTone(900, 0.04, 'square', 0.05);
  TAS.fx.shake(2, 0.9);
}

function applyMovement(dt) {
  P.x += P.vx * dt;

  var hw = P.w / 2;
  var hh = P.h / 2;

  // Left wall
  var tx = Math.floor((P.x - hw) / TILE);
  var ty1 = Math.floor((P.y - hh + 2) / TILE);
  var ty2 = Math.floor((P.y + hh - 2) / TILE);
  for (var ty = ty1; ty <= ty2; ty++) {
    if (tx >= 0 && tx < LEVEL_W && ty >= 0 && ty < LEVEL_H && tiles[ty][tx] === 1) {
      P.x = (tx + 1) * TILE + hw;
      P.vx = 0;
      break;
    }
  }
  // Right wall
  tx = Math.floor((P.x + hw) / TILE);
  for (var ty = ty1; ty <= ty2; ty++) {
    if (tx >= 0 && tx < LEVEL_W && ty >= 0 && ty < LEVEL_H && tiles[ty][tx] === 1) {
      P.x = tx * TILE - hw;
      P.vx = 0;
      break;
    }
  }

  // Y movement
  P.y += P.vy * dt;
  P.grounded = false;

  // Floor
  var tx1 = Math.floor((P.x - hw + 2) / TILE);
  var tx2 = Math.floor((P.x + hw - 2) / TILE);
  var ty = Math.floor((P.y + hh) / TILE);
  for (var txx = tx1; txx <= tx2; txx++) {
    if (ty >= 0 && ty < LEVEL_H && txx >= 0 && txx < LEVEL_W && tiles[ty][txx] === 1) {
      P.y = ty * TILE - hh;
      P.vy = 0;
      P.grounded = true;
      break;
    }
  }

  // Ceiling collision
  if (!P.ceiling) {
    ty = Math.floor((P.y - hh) / TILE);
    for (var txx = tx1; txx <= tx2; txx++) {
      if (ty >= 0 && ty < LEVEL_H && txx >= 0 && txx < LEVEL_W && tiles[ty][txx] === 1) {
        P.y = (ty + 1) * TILE + hh;
        P.vy = 0;
        break;
      }
    }
  }
}

function performAttack(upHeld) {
  var wep = P.weapon;
  var lvl = P.weaponLevel[wep];
  P.attackUp = upHeld;
  P.attackDir = P.dir;

  var cdMult = wisCooldownMult(); // WIS reduces all attack cooldowns
  var dmgMult = strDmgMult() * statB.damage; // STR + statB.damage

  if (wep === 0) {
    // Katana (STR scales damage)
    P.attackTimer = (lvl ? 0.2 : 0.25) * cdMult;
    TAS.audio.playTone(600, 0.06, 'sawtooth', 0.07, 1200);
    var katanaDmg = Math.max(1, Math.floor((lvl ? 3 : 2) * dmgMult));
    slashHit(upHeld ? 0 : P.dir, lvl ? 32 : 24, katanaDmg);
  } else if (wep === 1) {
    // Kusarigama / Mycelial Chain
    P.attackTimer = (lvl ? 0.28 : 0.35) * cdMult;
    TAS.audio.playTone(200, 0.12, 'triangle', 0.06, 400);
    var chainDmg = Math.max(1, Math.floor((lvl ? 3 : 2) * dmgMult));
    chainHit(upHeld, lvl ? 48 : 36, chainDmg);
  } else if (wep === 2) {
    // Spore Shuriken (STR scales damage)
    if (P.shurikenAmmo > 0) {
      P.attackTimer = (lvl ? 0.12 : 0.18) * cdMult;
      P.shurikenAmmo--;
      var sx = P.x + P.dir * 10;
      var sy = upHeld ? P.y - 12 : P.y;
      var svx = upHeld ? P.dir * 150 : P.dir * 250;
      var svy = upHeld ? -200 : 0;
      var sporeDmg = Math.max(1, Math.floor((lvl ? 2 : 1) * dmgMult));
      projectiles.push({
        x: sx, y: sy, vx: svx, vy: svy,
        w: 6, h: 6, dmg: sporeDmg,
        owner: 'player', type: 'spore_shuriken', life: 2, anim: 0
      });
      TAS.audio.playTone(800, 0.05, 'square', 0.05, 1200);
    }
  }

  P.slashTrail.push({ x: P.x + P.dir * 12, y: P.y - 4, life: 0.2 });
}

function slashHit(dir, range, dmg) {
  var hx = dir === 0 ? P.x : P.x + dir * range / 2;
  var hy = dir === 0 ? P.y - range / 2 : P.y;
  var hw = dir === 0 ? P.w + 8 : range;
  var hh = dir === 0 ? range : P.h + 4;
  hitEnemiesInArea(hx - hw / 2, hy - hh / 2, hw, hh, dmg);
}

function chainHit(upward, range, dmg) {
  var hx = P.x + P.dir * range / 3;
  var hy = upward ? P.y - range / 2 : P.y;
  var hw = range;
  var hh = range * 0.7;
  hitEnemiesInArea(hx - hw / 2, hy - hh / 2, hw, hh, dmg);
}

function hitEnemiesInArea(ax, ay, aw, ah, dmg) {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (TAS.hit.rectOverlap(ax, ay, aw, ah, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
      damageEnemy(e, dmg);
    }
  }
  if (boss && boss.alive && bossActive) {
    if (TAS.hit.rectOverlap(ax, ay, aw, ah, boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
      damageBoss(dmg);
    }
  }
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  e.stunTimer = 0.3;
  TAS.fx.shake(3, 0.85);

  if (e.hp <= 0) {
    e.alive = false;
    var baseScore;
    if (e.type === 'shadow_ninja') baseScore = 200;
    else if (e.type === 'fungal_shield') baseScore = 150;
    else if (e.type === 'spore_drone') baseScore = 175;
    else baseScore = 100;
    score += Math.floor(baseScore * intScoreMult() * statB.scoreMult); // INT + scoreMult
    P.combo++;
    P.comboTimer = 2;
    if (P.combo > 1) score += Math.floor(P.combo * 25 * intScoreMult());

    // Death particles (spore explosion)
    spawnDeathSpores(e.x, e.y, 8);
    TAS.particles.spawn(e.x, e.y, C.spore[stage], 8, 3, { gravity: 1.5 });
    TAS.audio.playTone(300, 0.1, 'square', 0.08, 100);

    // Ammo drop chance (CHA boosts)
    if (Math.random() < 0.3 * chaDropMult()) {
      pickups.push({ x: e.x, y: e.y, type: 'ammo', alive: true, anim: 0 });
    }
    // CHA: rare health drop on kill
    if (Math.random() < 0.05 * chaDropMult()) {
      pickups.push({ x: e.x, y: e.y - 8, type: 'health', alive: true, anim: 0 });
    }
  } else {
    TAS.particles.spawn(e.x, e.y, '#f4b41b', 4, 2);
    TAS.audio.playTone(400, 0.05, 'square', 0.06);
  }
}

function spawnDeathSpores(x, y, count) {
  for (var i = 0; i < count; i++) {
    deathParticles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 80,
      vy: -Math.random() * 60 - 20,
      size: 2 + Math.random() * 3,
      life: 0.5 + Math.random() * 0.5,
      color: C.spore[stage]
    });
  }
}

function damageBoss(dmg) {
  if (boss.stunTimer > 0) return;
  boss.hp -= dmg;
  boss.stunTimer = 0.2;
  boss.flashTimer = 0.15;
  TAS.fx.shake(5, 0.75);
  TAS.particles.spawn(boss.x, boss.y, '#f4b41b', 6, 3);
  TAS.audio.playTone(200, 0.1, 'sawtooth', 0.08, 80);

  if (boss.hp <= 0) {
    boss.alive = false;
    bossActive = false;
    var bossScore = Math.floor((2000 + stage * 500) * intScoreMult() * statB.scoreMult);
    score += bossScore;
    TAS.fx.flash('#f4b41b', 0.6);
    TAS.fx.shake(10, 0.6);
    spawnDeathSpores(boss.x, boss.y, 25);
    TAS.particles.spawn(boss.x, boss.y, '#f4b41b', 20, 5, { gravity: 2 });
    TAS.audio.playTone(200, 0.3, 'square', 0.1, 50);
    setTimeout(function() { TAS.audio.playTone(400, 0.3, 'square', 0.08); }, 300);
    setTimeout(function() { TAS.audio.playTone(600, 0.2, 'triangle', 0.06); }, 500);
  }
}

function hurtPlayer(dmg) {
  if (P.iframes > 0) return;
  P.hp -= dmg;
  P.iframes = IFRAME_DUR;
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(6, 0.75);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.1, 50);

  if (P.hp <= 0) {
    lives--;
    spawnDeathSpores(P.x, P.y, 15);
    if (lives <= 0) {
      if (score > highScore) { highScore = score; TAS.score.save('shadow_ninja_hi', highScore); }
      state = 'gameOver';
      TAS.fx.shake(12, 0.5);
    } else {
      P.hp = P.maxHp;
      P.x = checkpoint;
      P.y = findGround(checkpoint / TILE | 0) * TILE - 28;
      P.vx = 0; P.vy = 0;
      P.iframes = 2;
    }
  }
}

function updateTrail(dt) {
  for (var i = P.slashTrail.length - 1; i >= 0; i--) {
    P.slashTrail[i].life -= dt;
    if (P.slashTrail[i].life <= 0) P.slashTrail.splice(i, 1);
  }
}

// === DEATH/SPORE PARTICLES ===
function updateDeathParticles(dt) {
  for (var i = deathParticles.length - 1; i >= 0; i--) {
    var dp = deathParticles[i];
    dp.x += dp.vx * dt;
    dp.y += dp.vy * dt;
    dp.vy += 40 * dt;
    dp.life -= dt;
    if (dp.life <= 0) deathParticles.splice(i, 1);
  }
}

// === ENVIRONMENT PARTICLES ===
function updateEnvParticles(dt) {
  for (var i = 0; i < envParticles.length; i++) {
    var ep = envParticles[i];
    ep.x += ep.vx * dt;
    ep.y += ep.vy * dt;

    if (ep.type === 'drip') {
      if (ep.y > LEVEL_H * TILE) { ep.y = 32; ep.x = Math.random() * LEVEL_W * TILE; }
    } else if (ep.type === 'spark') {
      ep.vy += 60 * dt;
      ep.alpha -= dt * 0.5;
      if (ep.alpha <= 0) {
        ep.x = Math.random() * LEVEL_W * TILE;
        ep.y = Math.random() * LEVEL_H * TILE;
        ep.vy = -10 - Math.random() * 20;
        ep.alpha = 0.6;
      }
    } else {
      if (ep.x < 0) ep.x += LEVEL_W * TILE;
      if (ep.x > LEVEL_W * TILE) ep.x -= LEVEL_W * TILE;
      if (ep.y < 0) ep.y += LEVEL_H * TILE;
      if (ep.y > LEVEL_H * TILE) ep.y -= LEVEL_H * TILE;
    }
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    e.anim += dt;
    if (e.stunTimer > 0) { e.stunTimer -= dt; continue; }
    if (e.attackCd > 0) e.attackCd -= dt;

    var distToPlayer = Math.abs(e.x - P.x);
    var inRange = distToPlayer < 200;

    // Spore trail particles for mycelial enemies
    if (frame % 8 === 0 && e.type !== 'spore_drone') {
      if (e.sporeTrail.length > 5) e.sporeTrail.shift();
      e.sporeTrail.push({ x: e.x, y: e.y + e.h / 2 - 2, life: 0.8 });
    }
    for (var si = e.sporeTrail.length - 1; si >= 0; si--) {
      e.sporeTrail[si].life -= dt;
      if (e.sporeTrail[si].life <= 0) e.sporeTrail.splice(si, 1);
    }

    if (e.type === 'spore_grunt') {
      if (inRange) {
        e.dir = P.x < e.x ? -1 : 1;
        e.vx = e.dir * 60;
        if (distToPlayer < 28 && e.attackCd <= 0) {
          e.attackCd = 1.2;
          if (distToPlayer < 28) hurtPlayer(1);
        }
      } else {
        e.patrolTimer += dt;
        if (e.patrolTimer > 2) { e.dir *= -1; e.patrolTimer = 0; }
        e.vx = e.dir * 30;
      }
    } else if (e.type === 'mycel_archer') {
      if (inRange && e.attackCd <= 0) {
        e.dir = P.x < e.x ? -1 : 1;
        e.attackCd = 1.8;
        // Fires spore arrows
        projectiles.push({
          x: e.x + e.dir * 10, y: e.y,
          vx: e.dir * 160, vy: 0,
          w: 8, h: 3, dmg: 1,
          owner: 'enemy', type: 'spore_arrow', life: 3, anim: 0
        });
        TAS.audio.playTone(500, 0.04, 'square', 0.03);
      }
      e.vx = 0;
    } else if (e.type === 'fungal_shield') {
      if (inRange) {
        e.dir = P.x < e.x ? -1 : 1;
        e.vx = e.dir * 35;
        if (distToPlayer < 24 && e.attackCd <= 0) {
          e.attackCd = 2.0;
          hurtPlayer(1);
        }
      } else {
        e.vx = 0;
      }
    } else if (e.type === 'shadow_ninja') {
      if (inRange) {
        e.dir = P.x < e.x ? -1 : 1;
        e.vx = e.dir * 100;
        if (distToPlayer < 22 && e.attackCd <= 0) {
          e.attackCd = 0.8;
          hurtPlayer(1);
        }
        if (distToPlayer > 60 && distToPlayer < 150 && e.attackCd <= 0) {
          e.attackCd = 1.5;
          projectiles.push({
            x: e.x + e.dir * 8, y: e.y - 4,
            vx: e.dir * 200, vy: 0,
            w: 6, h: 6, dmg: 1,
            owner: 'enemy', type: 'enemy_shuriken', life: 2, anim: 0
          });
        }
      } else {
        e.patrolTimer += dt;
        if (e.patrolTimer > 1.5) { e.dir *= -1; e.patrolTimer = 0; }
        e.vx = e.dir * 50;
      }
    } else if (e.type === 'spore_drone') {
      var dy = P.y - e.y;
      var dx = P.x - e.x;
      if (inRange) {
        e.vx = (dx > 0 ? 1 : -1) * 70;
        e.vy = (dy > 0 ? 1 : -1) * 50;
        e.dir = dx > 0 ? 1 : -1;
        if (distToPlayer < 30 && e.attackCd <= 0) {
          e.attackCd = 1.5;
          hurtPlayer(1);
          // Spore cloud on contact
          TAS.particles.spawn(e.x, e.y, C.spore[stage], 5, 2);
        }
      } else {
        e.vy = Math.sin(e.anim * 2) * 30;
        e.vx = e.dir * 20;
      }
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      continue;
    }

    // Ground enemy physics
    if (!e.flying) {
      e.x += e.vx * dt;
      e.vy = (e.vy || 0) + GRAV * dt;
      e.y += e.vy * dt;

      var ty = Math.floor((e.y + e.h / 2) / TILE);
      var tx = Math.floor(e.x / TILE);
      if (ty >= 0 && ty < LEVEL_H && tx >= 0 && tx < LEVEL_W && tiles[ty][tx] === 1) {
        e.y = ty * TILE - e.h / 2;
        e.vy = 0;
      }

      var wtx = Math.floor((e.x + e.dir * e.w / 2) / TILE);
      var wty = Math.floor(e.y / TILE);
      if (wtx >= 0 && wtx < LEVEL_W && wty >= 0 && wty < LEVEL_H && tiles[wty][wtx] === 1) {
        e.dir *= -1;
        e.vx *= -1;
      }
    }

    // Contact damage
    if (TAS.hit.rectOverlap(P.x - P.w / 2, P.y - P.h / 2, P.w, P.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
      hurtPlayer(1);
    }
  }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!boss || !boss.alive || !bossActive) return;
  boss.anim += dt;
  if (boss.stunTimer > 0) { boss.stunTimer -= dt; return; }
  if (boss.flashTimer > 0) boss.flashTimer -= dt;
  if (boss.attackCd > 0) { boss.attackCd -= dt; return; }

  var dx = P.x - boss.x;
  boss.dir = dx < 0 ? -1 : 1;
  var dist = Math.abs(dx);

  // Phase change at half health
  if (boss.hp < boss.maxHp / 2 && boss.phase === 0) {
    boss.phase = 1;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(8, 0.7);
    TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1, 200);
    // Spawn spore cloud
    boss.sporeCloud = 3;
  }

  // Spore cloud (phase 2 passive damage)
  if (boss.sporeCloud > 0) {
    boss.sporeCloud -= dt;
    if (frame % 10 === 0) {
      TAS.particles.spawn(boss.x + (Math.random() - 0.5) * 40,
        boss.y + (Math.random() - 0.5) * 30, C.spore[stage], 2, 2);
    }
    if (dist < 50) hurtPlayer(1);
  }

  var speed = boss.phase === 0 ? 50 : 80;
  var atkRate = boss.phase === 0 ? 2.0 : 1.2;

  if (dist > 60) {
    boss.x += boss.dir * speed * dt;
  }

  boss.pattern = (boss.pattern + 1) % 4;

  if (boss.pattern === 0) {
    // Lunge attack
    boss.attackCd = atkRate;
    if (dist < 50) hurtPlayer(2);
    TAS.fx.shake(3, 0.85);
    TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08);
  } else if (boss.pattern === 1) {
    // Spore spray
    boss.attackCd = atkRate;
    var count = boss.phase === 0 ? 3 : 5;
    for (var i = 0; i < count; i++) {
      var angle = -0.5 + (1.0 * i / (count - 1));
      projectiles.push({
        x: boss.x + boss.dir * 20, y: boss.y - 8,
        vx: boss.dir * 150 * Math.cos(angle),
        vy: -100 * Math.sin(angle) - 30,
        w: 8, h: 8, dmg: 1,
        owner: 'enemy', type: 'boss_spore', life: 3, anim: 0
      });
    }
    TAS.audio.playTone(300, 0.1, 'square', 0.07, 600);
  } else if (boss.pattern === 2) {
    // Jump slam with shockwave
    boss.attackCd = atkRate * 1.5;
    boss.vy = -300;
    boss.vx = boss.dir * 100;
    TAS.audio.playTone(150, 0.08, 'triangle', 0.06);
  } else if (boss.pattern === 3) {
    // Mycelial tendril attack (phase 2 only, otherwise just lunges)
    if (boss.phase === 1) {
      boss.attackCd = atkRate * 0.8;
      // Fires tendril projectiles that track player slightly
      for (var i = 0; i < 2; i++) {
        var tvy = (P.y - boss.y) * 0.5;
        projectiles.push({
          x: boss.x + boss.dir * 16, y: boss.y - 4 + i * 12,
          vx: boss.dir * 120, vy: tvy * 0.3,
          w: 12, h: 4, dmg: 1,
          owner: 'enemy', type: 'tendril', life: 2, anim: 0
        });
      }
      TAS.audio.playTone(180, 0.12, 'sawtooth', 0.06, 360);
    } else {
      boss.attackCd = atkRate;
      if (dist < 50) hurtPlayer(1);
    }
  }

  // Boss physics
  boss.vy = (boss.vy || 0) + GRAV * dt;
  boss.y += boss.vy * dt;
  boss.x += (boss.vx || 0) * dt;
  if (boss.vx) boss.vx *= 0.95;

  var ty = Math.floor((boss.y + boss.h / 2) / TILE);
  if (ty >= 0 && ty < LEVEL_H) {
    var tx = Math.floor(boss.x / TILE);
    if (tx >= 0 && tx < LEVEL_W && tiles[ty][tx] === 1) {
      // Shockwave on landing from jump
      if (boss.vy > 200) {
        TAS.fx.shake(6, 0.8);
        TAS.audio.playTone(80, 0.15, 'sawtooth', 0.08);
        if (dist < 80) hurtPlayer(1);
        TAS.particles.spawn(boss.x, boss.y + boss.h / 2, C.mycel[stage], 10, 3);
      }
      boss.y = ty * TILE - boss.h / 2;
      boss.vy = 0;
    }
  }

  // Contact damage
  if (TAS.hit.rectOverlap(P.x - P.w / 2, P.y - P.h / 2, P.w, P.h,
      boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
    hurtPlayer(1);
  }
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.anim += dt;

    // Gravity on certain types
    if (p.type === 'spore_arrow') {
      p.vy += 100 * dt;
    }
    // Spore burst fades
    if (p.type === 'spore_burst') {
      p.vx *= 0.97;
      p.vy *= 0.97;
    }
    // Tendrils curve slightly
    if (p.type === 'tendril') {
      p.vy += (P.y - p.y) * 0.5 * dt;
    }

    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    // Tile collision
    var tx = Math.floor(p.x / TILE);
    var ty = Math.floor(p.y / TILE);
    if (tx < 0 || tx >= LEVEL_W || ty < 0 || ty >= LEVEL_H || tiles[ty][tx] === 1) {
      if (p.type === 'reactor_kunai') {
        TAS.particles.spawn(p.x, p.y, '#f4b41b', 6, 2);
        TAS.fx.shake(2, 0.9);
      }
      projectiles.splice(i, 1);
      continue;
    }

    if (p.owner === 'enemy') {
      if (TAS.hit.rectOverlap(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h,
          P.x - P.w / 2, P.y - P.h / 2, P.w, P.h)) {
        hurtPlayer(p.dmg);
        projectiles.splice(i, 1);
      }
    } else if (p.owner === 'player') {
      var hit = false;
      for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h,
            e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
          damageEnemy(e, p.dmg);
          hit = true;
          // Reactor kunai pierces through enemies
          if (p.type !== 'reactor_kunai') break;
        }
      }
      if (!hit && boss && boss.alive && bossActive) {
        if (TAS.hit.rectOverlap(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h,
            boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
          damageBoss(p.dmg);
          hit = true;
        }
      }
      if (hit && p.type !== 'reactor_kunai') projectiles.splice(i, 1);
    }
  }
}

// === PICKUPS ===
function updatePickups(dt) {
  for (var pi = 0; pi < pickups.length; pi++) {
    var pk = pickups[pi];
    if (!pk.alive) continue;
    pk.anim += dt;

    if (TAS.hit.rectOverlap(P.x - P.w / 2, P.y - P.h / 2, P.w, P.h,
        pk.x - 8, pk.y - 8, 16, 16)) {
      pk.alive = false;
      var pickMult = chaPickupMult(); // CHA improves pickup value
      if (pk.type === 'weapon') {
        P.weapon = pk.weapon;
        TAS.audio.playTone(660, 0.1, 'square', 0.07);
        TAS.audio.playTone(880, 0.1, 'square', 0.07);
      } else if (pk.type === 'crystal') {
        P.weaponLevel[P.weapon] = 1;
        TAS.audio.playTone(440, 0.08, 'triangle', 0.07);
        TAS.audio.playTone(880, 0.12, 'triangle', 0.08);
        TAS.particles.spawn(P.x, P.y, '#f4b41b', 10, 3);
      } else if (pk.type === 'ammo') {
        var ammoGain = Math.floor(5 * pickMult); // CHA more ammo
        P.shurikenAmmo = Math.min(P.shurikenAmmo + ammoGain, 30);
        TAS.audio.playTone(500, 0.06, 'square', 0.05);
      } else if (pk.type === 'health') {
        var healAmt = Math.floor(2 * pickMult); // CHA more healing
        P.hp = Math.min(P.hp + healAmt, P.maxHp);
        TAS.audio.playTone(440, 0.1, 'triangle', 0.06);
        TAS.particles.spawn(P.x, P.y, '#38d973', 6, 2);
      } else if (pk.type === 'kunai') {
        P.kunaiStock = Math.min(P.kunaiStock + 3, 9);
        TAS.audio.playTone(700, 0.08, 'sawtooth', 0.06);
        TAS.particles.spawn(P.x, P.y, '#f4b41b', 6, 2);
      } else if (pk.type === 'spore_boost') {
        // Temporary speed buff
        P.iframes = 1.5;
        TAS.audio.playTone(550, 0.08, 'triangle', 0.05);
        TAS.particles.spawn(P.x, P.y, C.spore[stage], 8, 3);
      }
      score += Math.floor(50 * intScoreMult() * statB.scoreMult);
    }
  }
}

// === CAMERA ===
function updateCamera(dt) {
  var target = P.x - GW / 3;
  camX += (target - camX) * 4 * dt;
  camX = TAS.math.clamp(camX, 0, LEVEL_W * TILE - GW);
  if (P.x > checkpoint + 200) {
    checkpoint = P.x;
  }
}

// === BACKGROUND PARTICLES (floating spores) ===
function updateBgParticles(dt) {
  for (var i = 0; i < bgParticles.length; i++) {
    var bp = bgParticles[i];
    bp.x += bp.vx * dt;
    bp.y += bp.vy * dt;
    bp.pulse += dt * 2;
    // Spores float up and wrap
    if (bp.y < 0) { bp.y = LEVEL_H * TILE; bp.x = Math.random() * LEVEL_W * TILE; }
    if (bp.x < 0) bp.x = LEVEL_W * TILE;
    if (bp.x > LEVEL_W * TILE) bp.x = 0;
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = C.bg[stage] || '#0a0e14';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  if (state === 'stageClear') {
    drawStageClear();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();
  ctx.save();
  ctx.translate(-camX, 0);

  // Background spore particles
  for (var i = 0; i < bgParticles.length; i++) {
    var bp = bgParticles[i];
    ctx.fillStyle = C.spore[stage];
    ctx.globalAlpha = bp.alpha * (0.5 + Math.sin(bp.pulse) * 0.3);
    ctx.beginPath();
    ctx.arc(bp.x, bp.y, bp.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Environment particles
  drawEnvParticles();

  // Draw tiles
  drawTiles();

  // Draw mycelium decorations
  drawMyceliumDecor();

  // Draw pickups
  drawPickups();

  // Draw enemy spore trails
  drawEnemyTrails();

  // Draw enemies
  drawEnemies();

  // Draw boss
  drawBoss();

  // Draw projectiles
  drawProjectiles();

  // Draw death spore particles
  drawDeathParticles();

  // Draw player
  drawPlayer();

  // Engine particles
  TAS.particles.draw();

  ctx.restore(); // camera
  ctx.restore(); // shake

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Tutorial overlay
  if (tutorialTimer > 0) drawTutorial();

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW ENV PARTICLES ===
function drawEnvParticles() {
  for (var i = 0; i < envParticles.length; i++) {
    var ep = envParticles[i];
    if (ep.x < camX - 20 || ep.x > camX + GW + 20) continue;
    ctx.globalAlpha = ep.alpha;
    if (ep.type === 'drip') {
      ctx.fillStyle = '#3cacd7';
      ctx.fillRect(ep.x, ep.y, 1, 3);
    } else if (ep.type === 'pollen') {
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(ep.x, ep.y, ep.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (ep.type === 'spark') {
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(ep.x, ep.y, ep.size, ep.size);
    } else if (ep.type === 'glow') {
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(ep.x, ep.y, ep.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (ep.type === 'wind') {
      ctx.fillStyle = '#aabbcc';
      ctx.fillRect(ep.x, ep.y, 4, 1);
    }
  }
  ctx.globalAlpha = 1;
}

// === DRAW TILES ===
function drawTiles() {
  var startX = Math.max(0, Math.floor(camX / TILE));
  var endX = Math.min(LEVEL_W, startX + Math.ceil(GW / TILE) + 2);

  for (var y = 0; y < LEVEL_H; y++) {
    for (var x = startX; x < endX; x++) {
      var t = tiles[y][x];
      if (t === 1) {
        var px = x * TILE;
        var py = y * TILE;
        ctx.fillStyle = C.wall[stage];
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = C.floor[stage];
        ctx.fillRect(px, py, TILE, 2);
        ctx.fillRect(px, py, 2, TILE);
        // Occasional mycelium highlight
        if ((x + y * 7) % 11 === 0) {
          ctx.fillStyle = C.mycel[stage];
          ctx.globalAlpha = 0.2;
          ctx.fillRect(px + 2, py + 2, 12, 12);
          ctx.globalAlpha = 1;
        }
        // Fungal vein detail
        if ((x * 3 + y * 5) % 17 === 0) {
          ctx.strokeStyle = C.spore[stage];
          ctx.globalAlpha = 0.1;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px, py + 8);
          ctx.lineTo(px + TILE, py + 8 + ((x % 2) ? 3 : -3));
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      } else if (t === 2) {
        var px = x * TILE;
        var py = y * TILE;
        // Hazard (toxic spore pools / reactor glow)
        ctx.fillStyle = stage === 5 ? '#3cacd7' : (stage === 4 ? '#f4b41b' : '#38d973');
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1 + x) * 0.3;
        ctx.fillRect(px, py, TILE, TILE);
        // Hazard bubbles
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.2;
        var bubX = px + 4 + Math.sin(frame * 0.05 + x * 2) * 4;
        var bubY = py + 4 + Math.cos(frame * 0.07 + x) * 3;
        ctx.beginPath();
        ctx.arc(bubX, bubY, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
}

// === DRAW MYCELIUM DECORATIONS (type 3 tiles) ===
function drawMyceliumDecor() {
  var startX = Math.max(0, Math.floor(camX / TILE));
  var endX = Math.min(LEVEL_W, startX + Math.ceil(GW / TILE) + 2);

  for (var y = 0; y < LEVEL_H; y++) {
    for (var x = startX; x < endX; x++) {
      if (tiles[y][x] === 3) {
        var px = x * TILE;
        var py = y * TILE;
        // Small mushroom / fungal growth
        ctx.fillStyle = C.mycel[stage];
        ctx.fillRect(px + 5, py + 6, 6, 10);
        ctx.fillStyle = C.spore[stage];
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.04 + x + y) * 0.2;
        ctx.beginPath();
        ctx.arc(px + 8, py + 5, 5, Math.PI, 0);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Tiny spore dots
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(px + 6, py + 3, 1, 1);
        ctx.fillRect(px + 9, py + 4, 1, 1);
        ctx.globalAlpha = 1;
      }
    }
  }
}

// === DRAW ENEMY SPORE TRAILS ===
function drawEnemyTrails() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    for (var si = 0; si < e.sporeTrail.length; si++) {
      var st = e.sporeTrail[si];
      ctx.fillStyle = C.mycel[stage];
      ctx.globalAlpha = st.life * 0.3;
      ctx.beginPath();
      ctx.arc(st.x, st.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// === DRAW DEATH SPORE PARTICLES ===
function drawDeathParticles() {
  for (var i = 0; i < deathParticles.length; i++) {
    var dp = deathParticles[i];
    ctx.fillStyle = dp.color;
    ctx.globalAlpha = dp.life;
    ctx.beginPath();
    ctx.arc(dp.x, dp.y, dp.size * dp.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === DRAW PLAYER ===
function drawPlayer() {
  if (P.iframes > 0 && Math.floor(frame / 4) % 2 === 0) return;

  var px = P.x;
  var py = P.y;

  // Slash trail
  for (var i = 0; i < P.slashTrail.length; i++) {
    var tr = P.slashTrail[i];
    ctx.globalAlpha = tr.life * 2;
    ctx.fillStyle = statB.color || C.accent[stage];
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, 6 * tr.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Dash afterimage
  if (P.dashing > 0) {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = statB.color || C.accent[stage];
    ctx.fillRect(px - P.w / 2 - P.dashDir * 8, py - P.h / 2, P.w, P.h);
    ctx.globalAlpha = 1;
  }

  ctx.save();
  ctx.translate(px, py);
  if (P.dir === -1) ctx.scale(-1, 1);

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, 0, -1, 28, { flipX: false, frame: frame })) {
  // Body (ninja outfit in baseling color)
  var bodyColor = shadeColor(statB.color || '#38d973', -0.6);
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-5, -10, 10, 18);

  // Head
  ctx.fillStyle = shadeColor(statB.color || '#38d973', -0.5);
  ctx.fillRect(-4, -14, 8, 8);

  // Eye (baseling accent)
  ctx.fillStyle = statB.color || C.accent[stage];
  ctx.fillRect(1, -12, 3, 2);

  // Headband
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(-5, -12, 10, 2);
  ctx.fillStyle = '#7c3aed';
  ctx.fillRect(-7, -12, 3, 1);
  ctx.fillRect(-9, -11, 2, 1);

  // Baseling icon on chest
  ctx.fillStyle = statB.color || '#38d973';
  ctx.globalAlpha = 0.6;
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon || 'B', 0, -2);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;

  // Arms
  ctx.fillStyle = bodyColor;
  if (P.attackTimer > 0) {
    if (P.attackUp) {
      ctx.fillRect(-2, -20, 4, 10);
      drawWeaponSprite(0, -24, true);
    } else {
      ctx.fillRect(4, -8, 12, 4);
      drawWeaponSprite(14, -8, false);
    }
  } else {
    ctx.fillRect(3, -6, 4, 8);
    ctx.fillRect(-6, -4, 4, 6);
  }

  // Legs
  ctx.fillStyle = shadeColor(statB.color || '#38d973', -0.7);
  var legAnim = P.grounded ? Math.sin(P.anim * 8) * 2 : 3;
  ctx.fillRect(-4, 6, 4, 6 + legAnim);
  ctx.fillRect(1, 6, 4, 6 - legAnim);
  }

  // Wall cling indicator
  if (P.walling !== 0) {
    ctx.fillStyle = statB.color || C.accent[stage];
    ctx.globalAlpha = 0.6;
    ctx.fillRect(-6, -14, 12, 2);
    ctx.globalAlpha = 1;
  }

  // Ceiling hang indicator
  if (P.ceiling) {
    ctx.fillStyle = statB.color || C.accent[stage];
    ctx.fillRect(-4, -16, 8, 3);
  }

  ctx.restore();

  // Weapon glow trail (colored by baseling)
  if (P.attackTimer > 0) {
    var glowColors = ['#e6482e', '#3cacd7', C.spore[stage]];
    ctx.strokeStyle = glowColors[P.weapon];
    ctx.lineWidth = 2;
    ctx.globalAlpha = P.attackTimer * 4;
    ctx.beginPath();
    if (P.attackUp) {
      ctx.arc(px, py - 16, 18, -Math.PI * 0.8, -Math.PI * 0.2);
    } else {
      var sx = px + P.attackDir * 6;
      var arcDir = P.attackDir > 0 ? 1 : -1;
      ctx.arc(sx + arcDir * 10, py - 4, 16, -Math.PI * 0.5 * arcDir, Math.PI * 0.3 * arcDir);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  // Ninjutsu charge indicator (small bar above player)
  if (P.ninjutsuCharge > 0 && P.ninjutsuCharge < 100) {
    ctx.fillStyle = '#333';
    ctx.fillRect(px - 10, py - P.h / 2 - 8, 20, 3);
    ctx.fillStyle = statB.color || '#38d973';
    ctx.fillRect(px - 10, py - P.h / 2 - 8, 20 * (P.ninjutsuCharge / 100), 3);
  }
}

// Color shade helper
function shadeColor(hex, pct) {
  var num = parseInt(hex.replace('#', ''), 16);
  var r = Math.max(0, Math.min(255, ((num >> 16) & 0xFF) + Math.floor(((num >> 16) & 0xFF) * pct)));
  var g = Math.max(0, Math.min(255, ((num >> 8) & 0xFF) + Math.floor(((num >> 8) & 0xFF) * pct)));
  var b = Math.max(0, Math.min(255, (num & 0xFF) + Math.floor((num & 0xFF) * pct)));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawWeaponSprite(ox, oy, up) {
  var wep = P.weapon;
  if (wep === 0) {
    // Katana
    ctx.fillStyle = '#aabbcc';
    if (up) {
      ctx.fillRect(ox - 1, oy - 12, 2, 14);
      ctx.fillStyle = '#ddeeff';
      ctx.fillRect(ox - 1, oy - 12, 2, 3);
    } else {
      ctx.fillRect(ox, oy - 1, 14, 2);
      ctx.fillStyle = '#ddeeff';
      ctx.fillRect(ox + 10, oy - 1, 4, 2);
    }
  } else if (wep === 1) {
    // Mycelial Chain
    ctx.fillStyle = '#888888';
    for (var i = 0; i < 5; i++) {
      var cx = up ? ox + Math.sin(i * 0.8) * 2 : ox + i * 3;
      var cy = up ? oy - i * 3 : oy + Math.sin(i * 0.6) * 2;
      ctx.fillRect(cx, cy, 2, 2);
    }
    // Spore tip
    ctx.fillStyle = C.spore[stage];
    var endX = up ? ox : ox + 14;
    var endY = up ? oy - 14 : oy;
    ctx.beginPath();
    ctx.arc(endX, endY, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW ENEMIES (mycelial themed) ===
function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var ex = e.x;
    var ey = e.y;

    if (ex < camX - 20 || ex > camX + GW + 20) continue;

    ctx.save();
    ctx.translate(ex, ey);
    if (e.dir === -1) ctx.scale(-1, 1);

    if (e.stunTimer > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.3;
    }

    if (e.type === 'spore_grunt') {
      // Fungal soldier with mushroom cap
      ctx.fillStyle = '#445533';
      ctx.fillRect(-6, -8, 12, 16);
      ctx.fillStyle = '#556644';
      ctx.fillRect(-5, -12, 10, 6);
      // Mushroom cap helmet
      ctx.fillStyle = C.spore[stage];
      ctx.beginPath();
      ctx.arc(0, -13, 7, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(-3, -15, 2, 2);
      ctx.fillRect(2, -14, 1, 1);
      ctx.globalAlpha = 1;
      // Spore club
      ctx.fillStyle = '#776644';
      ctx.fillRect(5, -6, 8, 3);
      ctx.fillStyle = C.mycel[stage];
      ctx.fillRect(11, -8, 4, 6);
    } else if (e.type === 'mycel_archer') {
      // Fungal archer with tendril bow
      ctx.fillStyle = '#224422';
      ctx.fillRect(-5, -8, 10, 16);
      ctx.fillStyle = '#335533';
      ctx.fillRect(-4, -12, 8, 6);
      // Tendril bow
      ctx.strokeStyle = C.mycel[stage];
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(6, -2, 8, -1.2, 1.2);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Glowing spore eyes
      ctx.fillStyle = C.spore[stage];
      ctx.fillRect(-1, -10, 2, 2);
      ctx.fillRect(3, -10, 2, 2);
    } else if (e.type === 'fungal_shield') {
      // Mushroom tank with cap shield
      ctx.fillStyle = '#333344';
      ctx.fillRect(-7, -9, 14, 18);
      ctx.fillStyle = '#444466';
      ctx.fillRect(-6, -13, 12, 7);
      // Mushroom cap shield
      ctx.fillStyle = C.spore[stage];
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(-6, -2, 8, Math.PI * 0.3, Math.PI * 1.7);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Shield spots
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.3;
      ctx.fillRect(-10, -4, 2, 2);
      ctx.fillRect(-8, 2, 2, 2);
      ctx.globalAlpha = 1;
    } else if (e.type === 'shadow_ninja') {
      // Dark ninja with spore-tipped blade
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(-5, -8, 10, 16);
      ctx.fillStyle = '#222222';
      ctx.fillRect(-4, -12, 8, 6);
      // Glowing spore eyes
      ctx.fillStyle = C.spore[stage];
      ctx.fillRect(0, -10, 3, 2);
      // Spore-tipped blade
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(4, -8, 10, 1.5);
      ctx.fillStyle = C.spore[stage];
      ctx.fillRect(12, -9, 3, 3);
    } else if (e.type === 'spore_drone') {
      // Flying fungal spore pod
      ctx.fillStyle = C.mycel[stage];
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      // Inner glow
      ctx.fillStyle = C.spore[stage];
      ctx.globalAlpha = 0.5 + Math.sin(e.anim * 5) * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Trailing tendrils
      ctx.strokeStyle = C.mycel[stage];
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 1;
      for (var ti = 0; ti < 3; ti++) {
        ctx.beginPath();
        ctx.moveTo(-3 + ti * 3, 6);
        ctx.lineTo(-3 + ti * 3 + Math.sin(e.anim * 3 + ti) * 3, 14);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    ctx.globalAlpha = 1;
    ctx.restore();

    // HP bar for damaged enemies
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#222';
      ctx.fillRect(ex - 8, ey - e.h / 2 - 6, 16, 3);
      ctx.fillStyle = '#e6482e';
      ctx.fillRect(ex - 8, ey - e.h / 2 - 6, 16 * (e.hp / e.maxHp), 3);
    }
  }
}

// === DRAW BOSS (mycelium themed) ===
function drawBoss() {
  if (!boss || !boss.alive || !bossActive) return;

  var bx = boss.x;
  var by = boss.y;

  if (boss.flashTimer > 0 && Math.floor(frame / 2) % 2 === 0) {
    ctx.globalAlpha = 0.7;
  }

  ctx.save();
  ctx.translate(bx, by);
  if (boss.dir === -1) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = '#2a1828';
  ctx.fillRect(-14, -16, 28, 32);

  // Fungal armor
  ctx.fillStyle = C.mycel[stage];
  ctx.fillRect(-16, -12, 32, 24);

  // Head
  ctx.fillStyle = '#221828';
  ctx.fillRect(-10, -22, 20, 12);

  // Mushroom crown
  ctx.fillStyle = C.spore[stage];
  ctx.beginPath();
  ctx.arc(0, -24, 14, Math.PI, 0);
  ctx.fill();
  // Crown spots
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 0.3;
  ctx.fillRect(-6, -28, 3, 3);
  ctx.fillRect(4, -26, 2, 2);
  ctx.fillRect(-1, -30, 2, 2);
  ctx.globalAlpha = 1;

  // Eyes
  ctx.fillStyle = boss.phase === 1 ? '#e6482e' : C.spore[stage];
  ctx.fillRect(-6, -18, 4, 3);
  ctx.fillRect(3, -18, 4, 3);

  // Mycelium cape
  ctx.fillStyle = C.mycel[stage];
  ctx.globalAlpha = 0.7;
  var capeWave = Math.sin(boss.anim * 3) * 3;
  ctx.beginPath();
  ctx.moveTo(-14, -8);
  ctx.lineTo(-18 + capeWave, 18);
  ctx.lineTo(18 - capeWave, 18);
  ctx.lineTo(14, -8);
  ctx.fill();
  // Cape tendrils
  for (var ti = 0; ti < 4; ti++) {
    ctx.beginPath();
    ctx.moveTo(-10 + ti * 7, 16);
    ctx.lineTo(-10 + ti * 7 + Math.sin(boss.anim * 2 + ti) * 4, 24);
    ctx.strokeStyle = C.spore[stage];
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.lineWidth = 1;

  // Weapon (fungal staff)
  ctx.fillStyle = '#776644';
  ctx.fillRect(12, -14, 4, 24);
  ctx.fillStyle = C.spore[stage];
  ctx.beginPath();
  ctx.arc(14, -18, 5, 0, Math.PI * 2);
  ctx.fill();

  // Phase 2 spore aura
  if (boss.phase === 1) {
    ctx.strokeStyle = C.spore[stage];
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.3 + Math.sin(boss.anim * 4) * 0.2;
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.stroke();
    // Inner spore ring
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  ctx.restore();

  // Boss HP bar
  ctx.fillStyle = '#000';
  ctx.fillRect(bx - 24, by - boss.h / 2 - 12, 48, 6);
  ctx.fillStyle = boss.phase === 1 ? '#e6482e' : C.spore[stage];
  ctx.fillRect(bx - 23, by - boss.h / 2 - 11, 46 * (boss.hp / boss.maxHp), 4);

  // Boss name
  ctx.fillStyle = C.spore[stage];
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, bx, by - boss.h / 2 - 16);
  ctx.textAlign = 'left';

  ctx.globalAlpha = 1;
}

// === DRAW PROJECTILES ===
function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    if (p.x < camX - 20 || p.x > camX + GW + 20) continue;

    if (p.type === 'spore_arrow') {
      ctx.fillStyle = C.mycel[stage];
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      ctx.fillRect(-6, -1, 12, 2);
      ctx.fillStyle = C.spore[stage];
      ctx.fillRect(4, -2, 3, 4);
      ctx.restore();
    } else if (p.type === 'spore_shuriken') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.anim * 12);
      ctx.fillStyle = C.spore[stage];
      // Four-pointed spore star
      ctx.fillRect(-4, -1, 8, 2);
      ctx.fillRect(-1, -4, 2, 8);
      // Glow
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    } else if (p.type === 'enemy_shuriken') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.anim * 12);
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(-4, -1, 8, 2);
      ctx.fillRect(-1, -4, 2, 8);
      ctx.restore();
    } else if (p.type === 'boss_spore' || p.type === 'spore_burst') {
      ctx.fillStyle = C.spore[stage];
      ctx.globalAlpha = Math.min(1, p.life) * 0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.type === 'spore_burst' ? 3 : 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = Math.min(1, p.life) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.type === 'spore_burst' ? 5 : 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'reactor_kunai') {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(Math.atan2(p.vy, p.vx));
      // Reactor-powered kunai
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-4, -3);
      ctx.lineTo(-2, 0);
      ctx.lineTo(-4, 3);
      ctx.closePath();
      ctx.fill();
      // Energy trail
      ctx.fillStyle = '#f4b41b';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(-8, -1, 6, 2);
      ctx.globalAlpha = 0.3;
      ctx.fillRect(-14, -0.5, 6, 1);
      ctx.globalAlpha = 1;
      ctx.restore();
    } else if (p.type === 'tendril') {
      ctx.strokeStyle = C.mycel[stage];
      ctx.lineWidth = 3;
      ctx.globalAlpha = Math.min(1, p.life) * 0.7;
      ctx.beginPath();
      ctx.moveTo(p.x - p.vx * 0.02, p.y - p.vy * 0.02);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      ctx.fillStyle = C.spore[stage];
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 1;
    }
  }
}

// === DRAW PICKUPS ===
function drawPickups() {
  for (var pi = 0; pi < pickups.length; pi++) {
    var pk = pickups[pi];
    if (!pk.alive) continue;
    if (pk.x < camX - 20 || pk.x > camX + GW + 20) continue;

    var bob = Math.sin(pk.anim * 3) * 3;
    var px = pk.x;
    var py = pk.y + bob;

    if (pk.type === 'weapon') {
      var cols = ['#e6482e', '#3cacd7', C.spore[stage]];
      ctx.fillStyle = cols[pk.weapon] || '#fff';
      ctx.fillRect(px - 6, py - 4, 12, 8);
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(['K', 'C', 'S'][pk.weapon], px, py + 2);
    } else if (pk.type === 'crystal') {
      ctx.fillStyle = '#f4b41b';
      ctx.globalAlpha = 0.7 + Math.sin(pk.anim * 5) * 0.3;
      ctx.beginPath();
      ctx.moveTo(px, py - 8);
      ctx.lineTo(px + 5, py);
      ctx.lineTo(px, py + 8);
      ctx.lineTo(px - 5, py);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (pk.type === 'ammo') {
      // Spore ammo
      ctx.fillStyle = C.spore[stage];
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('+', px, py + 2);
    } else if (pk.type === 'health') {
      ctx.fillStyle = '#38d973';
      ctx.fillRect(px - 3, py - 6, 6, 12);
      ctx.fillRect(px - 6, py - 3, 12, 6);
    } else if (pk.type === 'kunai') {
      // Reactor kunai pickup
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.moveTo(px + 6, py);
      ctx.lineTo(px - 4, py - 3);
      ctx.lineTo(px - 2, py);
      ctx.lineTo(px - 4, py + 3);
      ctx.closePath();
      ctx.fill();
      // Glow
      ctx.globalAlpha = 0.3 + Math.sin(pk.anim * 4) * 0.2;
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (pk.type === 'spore_boost') {
      // Speed boost mushroom
      ctx.fillStyle = C.mycel[stage];
      ctx.fillRect(px - 2, py, 4, 6);
      ctx.fillStyle = C.spore[stage];
      ctx.globalAlpha = 0.7 + Math.sin(pk.anim * 6) * 0.3;
      ctx.beginPath();
      ctx.arc(px, py - 2, 5, Math.PI, 0);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.textAlign = 'left';
  }
}

// === HUD ===
function drawHUD() {
  // Top bar background
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, 28);

  // Score (INT-boosted display)
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 12);

  // Stage name
  ctx.fillStyle = C.accent[stage];
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stage + 1), GW / 2, 12);

  // Lives (CON bonus shown)
  ctx.textAlign = 'right';
  ctx.fillStyle = statB.color || '#38d973';
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 12 - i * 14, 4, 10, 10);
    ctx.fillStyle = '#222';
    ctx.fillRect(GW - 10 - i * 14, 6, 6, 6);
    ctx.fillStyle = statB.color || '#38d973';
  }

  // HP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(6, 16, 62, 8);
  var hpPct = P.hp / P.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#38d973' : (hpPct > 0.25 ? '#f4b41b' : '#e6482e');
  ctx.fillRect(7, 17, 60 * hpPct, 6);

  // Weapon indicator
  var wepNames = ['KATANA', 'MYCEL', 'SPORE'];
  var wepCols = ['#e6482e', '#3cacd7', C.spore[stage]];
  ctx.fillStyle = wepCols[P.weapon];
  ctx.textAlign = 'left';
  ctx.font = '8px monospace';
  ctx.fillText(wepNames[P.weapon] + (P.weaponLevel[P.weapon] ? '+' : ''), 72, 22);

  // Ammo
  if (P.weapon === 2) {
    ctx.fillStyle = '#aaa';
    ctx.fillText('x' + P.shurikenAmmo, 112, 22);
  }

  // Kunai stock
  if (P.kunaiStock > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('K:' + P.kunaiStock, 135, 22);
  }

  // Ninjutsu bar
  ctx.fillStyle = '#222';
  ctx.fillRect(GW / 2 - 30, 18, 60, 5);
  ctx.fillStyle = P.ninjutsuCharge >= 50 ? (statB.color || '#38d973') : '#1a5a30';
  ctx.fillRect(GW / 2 - 29, 19, 58 * (P.ninjutsuCharge / 100), 3);
  if (P.ninjutsuCharge >= 50) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('NINJUTSU', GW / 2, 17);
  }

  // Combo
  if (P.combo > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(P.combo + 'x COMBO', GW - 6, 24);
  }

  // Baseling name in corner
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(statB.name || 'Baseling', GW - 4, GH - 22);

  // Boss HP at bottom
  if (boss && boss.alive && bossActive) {
    ctx.fillStyle = 'rgba(10,5,20,0.8)';
    ctx.fillRect(GW / 2 - 80, GH - 18, 160, 14);
    ctx.fillStyle = '#333';
    ctx.fillRect(GW / 2 - 78, GH - 16, 156, 10);
    var bhp = boss.hp / boss.maxHp;
    ctx.fillStyle = bhp > 0.5 ? C.spore[stage] : '#e6482e';
    ctx.fillRect(GW / 2 - 78, GH - 16, 156 * bhp, 10);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, GW / 2, GH - 8);
  }

  ctx.textAlign = 'left';
}

// === TUTORIAL OVERLAY ===
function drawTutorial() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, GH - 40, GW, 40);

  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';

  if (tutorialStep === 0) {
    ctx.fillText('ARROWS / WASD: Move your baseling ninja', GW / 2, GH - 26);
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText('Z/SPACE: Jump | X/C: Attack | SHIFT: Dash', GW / 2, GH - 14);
  } else if (tutorialStep === 1) {
    ctx.fillText('Wall-cling by jumping into walls | UP to grab ceilings', GW / 2, GH - 26);
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText('TAB: Ninjutsu burst (mycelium shuriken storm when charged)', GW / 2, GH - 14);
  } else if (tutorialStep === 2) {
    ctx.fillText('Collect garden seeds and POOP tokens for power', GW / 2, GH - 26);
    ctx.fillStyle = '#f4b41b';
    ctx.font = '7px monospace';
    ctx.fillText('UP + ATTACK to throw kunai | Mycelium shurikens are ranged', GW / 2, GH - 14);
  } else {
    ctx.fillText('Defeat the Spore King to save the shadow gardens!', GW / 2, GH - 26);
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText('Your baseling stats boost all abilities', GW / 2, GH - 14);
  }
  ctx.textAlign = 'left';
}

// === GAME OVER SCREEN ===
function drawGameOverScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Draw remaining death spores
  for (var i = 0; i < deathParticles.length; i++) {
    var dp = deathParticles[i];
    ctx.fillStyle = dp.color;
    ctx.globalAlpha = dp.life;
    ctx.beginPath();
    ctx.arc(dp.x - camX, dp.y, dp.size * dp.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGE_NAMES[stage] });
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Mycelium network background
  ctx.strokeStyle = C.mycel[0];
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = 1;
  for (var i = 0; i < 20; i++) {
    var mx = 40 + (i * 23) % GW;
    var my = 60 + (i * 37) % (GH - 80);
    ctx.beginPath();
    ctx.moveTo(mx, my);
    ctx.lineTo(mx + Math.sin(frame * 0.01 + i) * 30, my + 20 + Math.cos(frame * 0.015 + i) * 15);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Floating spores on title
  ctx.fillStyle = C.spore[0];
  for (var i = 0; i < 8; i++) {
    var sx = GW / 2 + Math.sin(frame * 0.02 + i * 0.8) * 120;
    var sy = 60 + Math.cos(frame * 0.015 + i * 1.1) * 40 + i * 25;
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.03 + i) * 0.1;
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + i * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Tower silhouette with fungal growth
  ctx.fillStyle = '#2a1f3a';
  ctx.fillRect(GW / 2 - 30, 60, 60, GH - 60);
  ctx.fillRect(GW / 2 - 40, 50, 80, 20);
  ctx.fillRect(GW / 2 - 20, 30, 40, 30);

  // Mushroom growths on tower
  ctx.fillStyle = C.mycel[0];
  ctx.beginPath();
  ctx.arc(GW / 2 - 30, 120, 8, Math.PI, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(GW / 2 + 30, 180, 6, Math.PI, 0);
  ctx.fill();

  // Windows with spore glow
  for (var i = 0; i < 6; i++) {
    ctx.fillStyle = C.spore[0];
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.2;
    ctx.fillRect(GW / 2 - 10, 80 + i * 35, 8, 12);
    ctx.fillRect(GW / 2 + 4, 80 + i * 35, 8, 12);
  }
  ctx.globalAlpha = 1;

  // Lightning flash
  if (frame % 180 < 3) {
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.1;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('SPORE NINJA', GW / 2 + 2, 102);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE NINJA', GW / 2, 100);

  // Subtitle
  ctx.fillStyle = C.spore[0];
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Tale from Tasern', GW / 2, 118);

  // Baseling ninja silhouettes
  ctx.fillStyle = shadeColor(statB.color || '#38d973', -0.6);
  ctx.fillRect(GW / 2 - 80, 180, 10, 22);
  ctx.fillRect(GW / 2 - 78, 174, 8, 8);
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(GW / 2 - 82, 176, 6, 2);

  ctx.fillStyle = shadeColor(statB.color || '#38d973', -0.6);
  ctx.fillRect(GW / 2 + 70, 180, 10, 22);
  ctx.fillRect(GW / 2 + 72, 174, 8, 8);
  ctx.fillStyle = C.spore[0];
  ctx.fillRect(GW / 2 + 78, 176, 6, 2);

  // Selected baseling preview (idle bob) between the silhouettes.
  if (!TAS.drawBaseling(ctx, GW / 2, 190, 40, { anim: 'idle', frame: frame })) { /* Wimmple: silhouettes carry it */ }

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS: Move | Z: Jump | X: Attack | SHIFT: Dash', GW / 2, 230);
  ctx.fillText('WALL+JUMP: Wall Jump | UP: Ceiling | TAB: Ninjutsu', GW / 2, 242);

  // Selected baseling name + 5 ARCADE stat bars (Base-blue accents)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 256);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    var _bw = 38, _bx0 = GW / 2 - (_keys.length * (_bw + 8)) / 2, _by = 266;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _bx0 + _i * (_bw + 8);
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _by);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _by + 3, _bw, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _by + 3, _bw * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 30);
  ctx.globalAlpha = 1;

  // [C] SELECT BASELING prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 14);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH - 22);
  }
  ctx.textAlign = 'left';
}

// === STAGE INTRO ===
function drawStageIntro() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Spore particles on intro
  for (var i = 0; i < 6; i++) {
    ctx.fillStyle = C.spore[stage];
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.04 + i) * 0.15;
    var sx = GW / 2 + Math.sin(frame * 0.03 + i * 1.2) * 100;
    var sy = GH / 2 + Math.cos(frame * 0.025 + i * 0.9) * 60;
    ctx.beginPath();
    ctx.arc(sx, sy, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = C.accent[stage];
  ctx.font = 'bold 14px monospace';
  ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2);

  // Dojo flavor text
  ctx.fillStyle = C.spore[stage];
  ctx.font = '8px monospace';
  ctx.fillText(DOJO_FLAVOR[stage], GW / 2, GH / 2 + 20);

  if (BOSS_STAGES.indexOf(stage) !== -1) {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('BOSS: ' + (BOSS_NAMES[stage] || 'Dark Fungi Boss'), GW / 2, GH / 2 + 45);
  }
  ctx.textAlign = 'left';
}

// === STAGE CLEAR ===
function drawStageClear() {
  ctx.fillStyle = 'rgba(10,8,20,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  // Victory spores
  for (var i = 0; i < 10; i++) {
    ctx.fillStyle = C.spore[stage];
    ctx.globalAlpha = 0.3;
    var sx = GW / 2 + Math.sin(frame * 0.05 + i * 0.6) * (50 + i * 10);
    var sy = GH / 2 + Math.cos(frame * 0.04 + i * 0.8) * 30;
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 10);

  var clearPts = Math.floor(1000 * intScoreMult());
  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText('+' + clearPts + ' POINTS', GW / 2, GH / 2 + 20);
  ctx.textAlign = 'left';
}

// === VICTORY ===
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration spores
  for (var i = 0; i < 20; i++) {
    ctx.fillStyle = C.spore[i % 8];
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i * 0.5) * 0.2;
    var sx = (frame * 0.5 + i * 24) % GW;
    var sy = GH - (frame * 0.3 + i * 16) % GH;
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, GH / 2 - 40);

  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('The Spore King Falls!', GW / 2, GH / 2 - 15);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, GH / 2 + 15);

  // Stat contribution summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name + ' guided your baseling through the shadow gardens', GW / 2, GH / 2 + 35);
  }

  if (score >= highScore) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, GH / 2 + 55);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';
}

// === START GAME ===
function startGame() {
  state = 'stageIntro';
  score = 0;
  lives = 3 + conBonusLives() + statB.lives; // CON + statB bonus lives
  stage = 0;
  frame = 0;
  completeTimer = 2;
  deathParticles = [];
  TAS.particles.clear();
  generateLevel(0);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
