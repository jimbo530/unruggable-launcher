// === DRAW: RINK ===
function drawRink() {
  const oy = -camY;
  const zone = ZONES[currentZone];

  // Ice surface with zone coloring
  ctx.fillStyle = zone.iceColor;
  ctx.fillRect(RINK_X, RINK_Y + oy, RINK_W, RINK_H);

  // Zone fog overlay
  ctx.fillStyle = zone.fogColor;
  ctx.fillRect(RINK_X, RINK_Y + oy, RINK_W, RINK_H);

  // Ice texture lines (NES-style)
  ctx.strokeStyle = 'rgba(200,220,240,0.15)';
  ctx.lineWidth = 1;
  for (let iy = 0; iy < RINK_H; iy += 16) {
    ctx.beginPath();
    ctx.moveTo(RINK_X, RINK_Y + iy + oy);
    ctx.lineTo(RINK_X + RINK_W, RINK_Y + iy + oy);
    ctx.stroke();
  }

  // Boards with zone color
  ctx.strokeStyle = zone.boardColor;
  ctx.lineWidth = 4;
  ctx.strokeRect(RINK_X, RINK_Y + oy, RINK_W, RINK_H);

  // Rounded corners
  const cr = 20;
  ctx.fillStyle = zone.boardColor;
  ctx.fillRect(RINK_X, RINK_Y + oy, cr, cr);
  ctx.fillStyle = zone.iceColor;
  ctx.beginPath();
  ctx.arc(RINK_X + cr, RINK_Y + cr + oy, cr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = zone.boardColor;
  ctx.fillRect(RINK_X + RINK_W - cr, RINK_Y + oy, cr, cr);
  ctx.fillStyle = zone.iceColor;
  ctx.beginPath();
  ctx.arc(RINK_X + RINK_W - cr, RINK_Y + cr + oy, cr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = zone.boardColor;
  ctx.fillRect(RINK_X, RINK_Y + RINK_H - cr + oy, cr, cr);
  ctx.fillStyle = zone.iceColor;
  ctx.beginPath();
  ctx.arc(RINK_X + cr, RINK_Y + RINK_H - cr + oy, cr, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = zone.boardColor;
  ctx.fillRect(RINK_X + RINK_W - cr, RINK_Y + RINK_H - cr + oy, cr, cr);
  ctx.fillStyle = zone.iceColor;
  ctx.beginPath();
  ctx.arc(RINK_X + RINK_W - cr, RINK_Y + RINK_H - cr + oy, cr, 0, Math.PI * 2);
  ctx.fill();

  // Center line with zone color
  ctx.strokeStyle = zone.lineColor;
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(RINK_X, CENTER_Y + oy);
  ctx.lineTo(RINK_X + RINK_W, CENTER_Y + oy);
  ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.beginPath();
  ctx.arc(RINK_X + RINK_W / 2, CENTER_Y + oy, 35, 0, Math.PI * 2);
  ctx.strokeStyle = zone.lineColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center dot
  ctx.fillStyle = zone.lineColor;
  ctx.beginPath();
  ctx.arc(RINK_X + RINK_W / 2, CENTER_Y + oy, 4, 0, Math.PI * 2);
  ctx.fill();

  // Blue lines
  ctx.strokeStyle = zone.boardColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(RINK_X, BLUE_LINE_TOP + oy);
  ctx.lineTo(RINK_X + RINK_W, BLUE_LINE_TOP + oy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(RINK_X, BLUE_LINE_BOT + oy);
  ctx.lineTo(RINK_X + RINK_W, BLUE_LINE_BOT + oy);
  ctx.stroke();

  // Goal creases
  const goalX = RINK_X + RINK_W / 2;

  // Top goal
  ctx.fillStyle = 'rgba(100,150,255,0.2)';
  ctx.fillRect(goalX - GOAL_W / 2, RINK_Y + oy, GOAL_W, GOAL_H + 8);
  ctx.strokeStyle = zone.lineColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(goalX - GOAL_W / 2, RINK_Y + oy - 2, GOAL_W, GOAL_H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(goalX - GOAL_W / 2 + 2, RINK_Y + oy - 1, GOAL_W - 4, GOAL_H - 2);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < GOAL_W; i += 6) {
    ctx.beginPath();
    ctx.moveTo(goalX - GOAL_W / 2 + i, RINK_Y + oy);
    ctx.lineTo(goalX - GOAL_W / 2 + i, RINK_Y + oy + GOAL_H - 2);
    ctx.stroke();
  }

  // Bottom goal
  ctx.fillStyle = 'rgba(100,150,255,0.2)';
  ctx.fillRect(goalX - GOAL_W / 2, RINK_Y + RINK_H - GOAL_H - 8 + oy, GOAL_W, GOAL_H + 8);
  ctx.strokeStyle = zone.lineColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(goalX - GOAL_W / 2, RINK_Y + RINK_H - GOAL_H + 2 + oy, GOAL_W, GOAL_H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(goalX - GOAL_W / 2 + 2, RINK_Y + RINK_H - GOAL_H + 3 + oy, GOAL_W - 4, GOAL_H - 2);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < GOAL_W; i += 6) {
    ctx.beginPath();
    ctx.moveTo(goalX - GOAL_W / 2 + i, RINK_Y + RINK_H - GOAL_H + 3 + oy);
    ctx.lineTo(goalX - GOAL_W / 2 + i, RINK_Y + RINK_H + oy);
    ctx.stroke();
  }

  // Faceoff circles
  const faceoffSpots = [
    { x: RINK_X + RINK_W * 0.25, y: RINK_H * 0.2 },
    { x: RINK_X + RINK_W * 0.75, y: RINK_H * 0.2 },
    { x: RINK_X + RINK_W * 0.25, y: RINK_H * 0.8 },
    { x: RINK_X + RINK_W * 0.75, y: RINK_H * 0.8 }
  ];
  for (const spot of faceoffSpots) {
    ctx.beginPath();
    ctx.arc(spot.x, spot.y + oy, 20, 0, Math.PI * 2);
    ctx.strokeStyle = zone.lineColor;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = zone.lineColor;
    ctx.beginPath();
    ctx.arc(spot.x, spot.y + oy, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW: HAZARDS ===
function drawHazards() {
  const oy = -camY;
  for (const h of hazards) {
    const hx = h.x, hy = h.y + oy;
    if (hy < -30 || hy > GH + 30) continue;

    if (h.type === 'goo_trail') {
      // Green goo puddle
      ctx.fillStyle = 'rgba(50,180,50,0.4)';
      ctx.beginPath();
      ctx.ellipse(hx, hy, h.radius, h.radius * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(80,220,80,0.3)';
      ctx.beginPath();
      ctx.ellipse(hx - 3, hy - 2, h.radius * 0.5, h.radius * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (h.type === 'spore_rain') {
      // Falling spore cluster
      ctx.fillStyle = 'rgba(100,255,100,0.5)';
      for (let s = 0; s < 5; s++) {
        const sx = hx + Math.sin(frame * 0.1 + s) * 8;
        const sy = hy + Math.cos(frame * 0.08 + s * 2) * 6;
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (h.type === 'reactor_vent') {
      // Pulsing orange vent
      const pulse = 0.7 + Math.sin(frame * 0.15) * 0.3;
      ctx.fillStyle = 'rgba(255,120,40,' + (0.3 * pulse) + ')';
      ctx.beginPath();
      ctx.arc(hx, hy, h.radius * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,80,20,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hx, hy, h.radius * 0.5, 0, Math.PI * 2);
      ctx.stroke();
      // Vent glow center
      ctx.fillStyle = 'rgba(255,200,100,0.5)';
      ctx.beginPath();
      ctx.arc(hx, hy, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === DRAW: PICKUPS ===
function drawPickups() {
  const oy = -camY;
  for (const pk of pickups) {
    const px = pk.x, py = pk.y + oy;
    if (py < -20 || py > GH + 20) continue;

    const bob = Math.sin(frame * 0.08 + pk.x) * 3;
    const sparkle = Math.sin(frame * 0.12) * 0.3 + 0.7;

    if (pk.type === 'spore_shield') {
      ctx.fillStyle = 'rgba(68,255,170,' + sparkle + ')';
      ctx.beginPath();
      ctx.arc(px, py + bob, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#44ffaa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      // Shield shape
      ctx.moveTo(px, py + bob - 8);
      ctx.lineTo(px + 6, py + bob - 4);
      ctx.lineTo(px + 6, py + bob + 3);
      ctx.lineTo(px, py + bob + 8);
      ctx.lineTo(px - 6, py + bob + 3);
      ctx.lineTo(px - 6, py + bob - 4);
      ctx.closePath();
      ctx.stroke();
    } else if (pk.type === 'reactor_core') {
      ctx.fillStyle = 'rgba(255,136,68,' + sparkle + ')';
      ctx.beginPath();
      ctx.arc(px, py + bob, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(px, py + bob, 3, 0, Math.PI * 2);
      ctx.fill();
      // Radiation lines
      ctx.strokeStyle = '#ff8844';
      ctx.lineWidth = 1;
      for (let r = 0; r < 4; r++) {
        const ra = frame * 0.05 + r * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(px + Math.cos(ra) * 5, py + bob + Math.sin(ra) * 5);
        ctx.lineTo(px + Math.cos(ra) * 10, py + bob + Math.sin(ra) * 10);
        ctx.stroke();
      }
    } else if (pk.type === 'fungal_extract') {
      ctx.fillStyle = 'rgba(136,204,68,' + sparkle + ')';
      ctx.beginPath();
      ctx.ellipse(px, py + bob, 6, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Potion bottle shape
      ctx.fillStyle = '#88cc44';
      ctx.fillRect(px - 2, py + bob - 10, 4, 4);
    } else if (pk.type === 'speed_mushroom') {
      // Pink mushroom
      ctx.fillStyle = 'rgba(255,68,255,' + sparkle + ')';
      ctx.beginPath();
      ctx.ellipse(px, py + bob - 3, 7, 5, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#eed';
      ctx.fillRect(px - 3, py + bob - 2, 6, 6);
      // Speed lines
      ctx.strokeStyle = '#ff44ff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(px - 10, py + bob);
      ctx.lineTo(px - 14, py + bob);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px - 10, py + bob - 3);
      ctx.lineTo(px - 13, py + bob - 3);
      ctx.stroke();
    }
  }
}

// === DRAW: ENEMIES ===
function drawEnemies() {
  const oy = -camY;
  for (const e of enemies) {
    const ex = e.x, ey = e.y + oy;
    if (ey < -20 || ey > GH + 20) continue;

    const def = e.def;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(ex, ey + def.radius, def.radius, def.radius * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    if (def.name === 'Reactor Bug') {
      // Spiky bug
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.arc(ex, ey, def.radius, 0, Math.PI * 2);
      ctx.fill();
      // Legs
      ctx.strokeStyle = '#aa2211';
      ctx.lineWidth = 1;
      for (let l = 0; l < 4; l++) {
        const la = frame * 0.15 + l * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(ex, ey);
        ctx.lineTo(ex + Math.cos(la) * 10, ey + Math.sin(la) * 10);
        ctx.stroke();
      }
      // Eyes
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ex - 3, ey - 2, 2, 2);
      ctx.fillRect(ex + 1, ey - 2, 2, 2);
    } else if (def.name === 'Spore Crawler') {
      // Slug-like with mushroom cap
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.ellipse(ex, ey, def.radius, def.radius * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#66dd66';
      ctx.beginPath();
      ctx.ellipse(ex, ey - 4, def.radius * 0.7, 4, 0, Math.PI, 0);
      ctx.fill();
      // Trail
      ctx.fillStyle = 'rgba(80,200,80,0.3)';
      ctx.beginPath();
      ctx.ellipse(ex - e.vx * 0.1, ey - e.vy * 0.1, 4, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (def.name === 'Mycelial Worm') {
      // Segmented worm
      for (let s = 0; s < 4; s++) {
        const wx = ex - s * 4 * Math.sign(e.vx || 1);
        const wy = ey + Math.sin(frame * 0.2 + s) * 3;
        ctx.fillStyle = s === 0 ? def.color : '#6633aa';
        ctx.beginPath();
        ctx.arc(wx, wy, def.radius - s * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // Head eyes
      ctx.fillStyle = '#ff88ff';
      ctx.fillRect(ex - 2, ey - 2, 2, 2);
      ctx.fillRect(ex + 1, ey - 2, 2, 2);
    } else if (def.name === 'Fungal Lurker') {
      // Big mushroom monster
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.ellipse(ex, ey - 4, def.radius, def.radius * 0.7, 0, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(ex - 4, ey - 6, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 3, ey - 8, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillStyle = '#336633';
      ctx.fillRect(ex - 5, ey - 2, 10, 8);
      // Eyes (angry)
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(ex - 4, ey, 3, 2);
      ctx.fillRect(ex + 1, ey, 3, 2);
    }
  }
}

// === DRAW: BOSS ===
function drawBoss() {
  if (!boss || !bossActive) return;
  const oy = -camY;
  const bx = boss.x, by = boss.y + oy;
  if (by < -40 || by > GH + 40) return;

  const def = boss.def;
  const flash = boss.hitFlash > 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(bx, by + 20, 25, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Boss body
  ctx.fillStyle = flash ? '#fff' : def.color;
  if (def.pattern === 'charge') {
    // Golem - big rectangle with mushroom head
    ctx.fillRect(bx - 18, by - 10, 36, 30);
    ctx.beginPath();
    ctx.ellipse(bx, by - 15, 20, 14, 0, Math.PI, 0);
    ctx.fill();
    // Cap spots
    if (!flash) {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(bx - 8, by - 20, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx + 5, by - 22, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Arms
    ctx.fillStyle = flash ? '#ddd' : '#338833';
    ctx.fillRect(bx - 26, by - 5, 8, 20);
    ctx.fillRect(bx + 18, by - 5, 8, 20);
    // Angry eyes
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(bx - 8, by - 4, 5, 4);
    ctx.fillRect(bx + 3, by - 4, 5, 4);
  } else if (def.pattern === 'orbit') {
    // Overlord - orb with tendrils
    ctx.beginPath();
    ctx.arc(bx, by, 18, 0, Math.PI * 2);
    ctx.fill();
    // Tendrils
    ctx.strokeStyle = flash ? '#ddd' : '#cc4411';
    ctx.lineWidth = 3;
    for (let t = 0; t < 6; t++) {
      const ta = frame * 0.03 + t * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.quadraticCurveTo(
        bx + Math.cos(ta) * 20, by + Math.sin(ta) * 20,
        bx + Math.cos(ta + 0.5) * 30, by + Math.sin(ta + 0.5) * 30
      );
      ctx.stroke();
    }
    // Core eye
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(bx, by, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff2222';
    ctx.beginPath();
    ctx.arc(bx, by, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (def.pattern === 'slam') {
    // Titan - huge mushroom
    ctx.beginPath();
    ctx.ellipse(bx, by - 10, 24, 18, 0, Math.PI, 0);
    ctx.fill();
    // Body
    ctx.fillStyle = flash ? '#ddd' : '#5588cc';
    ctx.fillRect(bx - 14, by - 8, 28, 28);
    // Feet
    ctx.fillStyle = flash ? '#ccc' : '#4466aa';
    ctx.fillRect(bx - 16, by + 18, 12, 6);
    ctx.fillRect(bx + 4, by + 18, 12, 6);
    // Face
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(bx - 8, by, 5, 5);
    ctx.fillRect(bx + 3, by, 5, 5);
    // Mouth
    ctx.fillStyle = '#222';
    ctx.fillRect(bx - 6, by + 8, 12, 3);
  }

  // Boss HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(bx - 30, by - 35, 60, 6);
  ctx.fillStyle = boss.hp > boss.maxHp * 0.3 ? '#ff4444' : '#ff0000';
  ctx.fillRect(bx - 30, by - 35, 60 * (boss.hp / boss.maxHp), 6);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx - 30, by - 35, 60, 6);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(def.name, bx, by - 40);
}

// === DRAW: PLAYERS ===
function drawPlayers() {
  const oy = -camY;

  for (const p of homePlayers) {
    if (p.penalized) continue;
    drawSkater(p, homeTeam, oy, p === controlledPlayer);
  }

  for (const p of awayPlayers) {
    if (p.penalized) continue;
    drawSkater(p, awayTeam, oy, false);
  }

  drawGoalieSprite(homeGoalie, homeTeam, oy);
  drawGoalieSprite(awayGoalie, awayTeam, oy);
}

function drawSkater(p, team, oy, isControlled) {
  const sx = p.x, sy = p.y + oy;

  if (sy < -20 || sy > GH + 20) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 8, 7, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Baseling mushroom player (NES-style)
  // Mushroom cap
  ctx.fillStyle = team.color1;
  ctx.beginPath();
  ctx.ellipse(sx, sy - 3, 8, 6, 0, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(sx - 3, sy - 6, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(sx + 2, sy - 7, 1, 0, Math.PI * 2);
  ctx.fill();

  // Body/stem
  ctx.fillStyle = '#eed';
  ctx.fillRect(sx - 4, sy - 2, 8, 6);

  // Jersey overlay
  ctx.fillStyle = team.color1;
  ctx.fillRect(sx - 5, sy + 1, 10, 5);
  ctx.fillStyle = team.color2;
  ctx.fillRect(sx - 5, sy + 1, 10, 2);

  // Eyes
  ctx.fillStyle = '#111';
  ctx.fillRect(sx - 3, sy - 1, 2, 2);
  ctx.fillRect(sx + 1, sy - 1, 2, 2);

  // Stick
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2;
  const stickDir = p.vy > 0 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(sx + 5, sy + 2);
  ctx.lineTo(sx + 11, sy + 6 * stickDir);
  ctx.stroke();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx + 11, sy + 6 * stickDir);
  ctx.lineTo(sx + 15, sy + 6 * stickDir);
  ctx.stroke();

  // Skates
  ctx.fillStyle = '#444';
  ctx.fillRect(sx - 5, sy + 6, 4, 2);
  ctx.fillRect(sx + 1, sy + 6, 4, 2);
  // Blades
  ctx.fillStyle = '#aaa';
  ctx.fillRect(sx - 5, sy + 8, 5, 1);
  ctx.fillRect(sx + 1, sy + 8, 5, 1);

  // Shield effect
  if (p.shielded) {
    ctx.strokeStyle = 'rgba(68,255,170,' + (0.5 + Math.sin(frame * 0.1) * 0.3) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, PLAYER_RADIUS + 6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Selection indicator
  if (isControlled) {
    ctx.strokeStyle = '#ffdd44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, PLAYER_RADIUS + 4, 0, Math.PI * 2);
    ctx.stroke();

    const bob = Math.sin(frame * 0.1) * 2;
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.moveTo(sx, sy - 16 + bob);
    ctx.lineTo(sx - 4, sy - 12 + bob);
    ctx.lineTo(sx + 4, sy - 12 + bob);
    ctx.closePath();
    ctx.fill();
  }

  // Stun effect - stars
  if (p.stunTimer > 0) {
    ctx.fillStyle = '#ffff00';
    const starAngle = frame * 0.2;
    for (let i = 0; i < 3; i++) {
      const a = starAngle + i * (Math.PI * 2 / 3);
      const stX = sx + Math.cos(a) * 10;
      const stY = sy - 8 + Math.sin(a) * 4;
      // 4-point star
      ctx.beginPath();
      ctx.moveTo(stX, stY - 3);
      ctx.lineTo(stX + 1, stY - 1);
      ctx.lineTo(stX + 3, stY);
      ctx.lineTo(stX + 1, stY + 1);
      ctx.lineTo(stX, stY + 3);
      ctx.lineTo(stX - 1, stY + 1);
      ctx.lineTo(stX - 3, stY);
      ctx.lineTo(stX - 1, stY - 1);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Speed mushroom trails
  if (activePickup && activePickup.type === 'speed_mushroom' && isControlled) {
    if (frame % 3 === 0) {
      TAS.particles.spawn(sx, sy + 4, '#ff44ff', 1, 1, { size: 2, gravity: 0 });
    }
  }
}

function drawGoalieSprite(g, team, oy) {
  const sx = g.x, sy = g.y + oy;
  if (sy < -20 || sy > GH + 20) return;

  // Baseling goalie - wider mushroom
  ctx.fillStyle = team.color1;
  ctx.beginPath();
  ctx.ellipse(sx, sy - 4, 12, 8, 0, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(sx - 5, sy - 7, 2, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#eed';
  ctx.fillRect(sx - 7, sy - 2, 14, 8);
  ctx.fillStyle = team.color1;
  ctx.fillRect(sx - 8, sy + 1, 16, 6);
  ctx.fillStyle = team.color2;
  ctx.fillRect(sx - 8, sy + 1, 16, 3);

  // Mask
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx - 4, sy - 4, 8, 4);

  // Eyes through mask
  ctx.fillStyle = '#111';
  ctx.fillRect(sx - 3, sy - 3, 2, 2);
  ctx.fillRect(sx + 1, sy - 3, 2, 2);

  // Pads
  ctx.fillStyle = '#ddd';
  ctx.fillRect(sx - 10, sy + 4, 5, 8);
  ctx.fillRect(sx + 5, sy + 4, 5, 8);

  // Glove
  ctx.fillStyle = team.color1;
  ctx.beginPath();
  ctx.arc(sx - 12, sy + 2, 4, 0, Math.PI * 2);
  ctx.fill();
  // Blocker
  ctx.fillRect(sx + 9, sy - 2, 5, 8);
}

// === DRAW: PUCK ===
function drawPuck() {
  const oy = -camY;
  const px = puck.x, py = puck.y + oy;

  if (py < -10 || py > GH + 10) return;

  // Puck trail when moving fast
  if (puck.speed > 150) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const trail = Math.min(puck.speed / 50, 8);
    for (let i = 1; i <= 3; i++) {
      ctx.beginPath();
      ctx.ellipse(
        px - (puck.vx / puck.speed) * i * trail,
        py - (puck.vy / puck.speed) * i * trail,
        PUCK_RADIUS - i * 0.5, PUCK_RADIUS - i * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Puck
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(px, py, PUCK_RADIUS + 1, PUCK_RADIUS, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Puck glow when reactor core active
  if (activePickup && activePickup.type === 'reactor_core') {
    ctx.strokeStyle = 'rgba(255,136,68,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, py, PUCK_RADIUS + 4, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// === DRAW: SHOT METER ===
function drawShotMeter() {
  if (!shotCharging || shotPower <= 0) return;

  const px = controlledPlayer.x;
  const py = controlledPlayer.y - camY - 20;
  const w = 30, h = 5;
  const fill = shotPower / SHOT_POWER_MAX;

  ctx.fillStyle = '#333';
  ctx.fillRect(px - w / 2, py, w, h);
  ctx.fillStyle = fill < 0.5 ? '#44cc44' : fill < 0.8 ? '#ffcc44' : '#ff4444';
  ctx.fillRect(px - w / 2, py, w * fill, h);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(px - w / 2, py, w, h);
}

// === DRAW: SCORE POPUPS ===
function drawScorePopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  for (const sp of scorePopups) {
    ctx.globalAlpha = Math.min(1, sp.timer * 2);
    ctx.fillStyle = '#000';
    ctx.fillText(sp.text, sp.x + 1, sp.y + 1);
    ctx.fillStyle = sp.color;
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === DRAW: HUD ===
function drawHUD() {
  // Scoreboard background
  ctx.fillStyle = 'rgba(10,5,30,0.85)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';

  // Home team
  ctx.fillStyle = homeTeam.color1;
  ctx.fillText(homeTeam.abbr, 8, 18);
  ctx.fillStyle = '#fff';
  ctx.fillText(String(homeScore), 50, 18);

  ctx.fillStyle = '#666';
  ctx.fillText('-', 62, 18);

  ctx.fillStyle = '#fff';
  ctx.fillText(String(awayScore), 72, 18);
  ctx.fillStyle = awayTeam.color1;
  ctx.fillText(awayTeam.abbr, 85, 18);

  // Period and time
  ctx.textAlign = 'center';
  ctx.fillStyle = '#88aacc';
  const mins = Math.floor(periodTimer / 60);
  const secs = Math.floor(periodTimer % 60);
  const timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  const perStr = overtime ? 'OT' : 'P' + period;
  ctx.fillText(perStr + ' ' + timeStr, GW / 2, 18);

  // Power play indicator
  const homePen = penaltyBox.filter(function(p) { return p.team === 'home'; }).length;
  const awayPen = penaltyBox.filter(function(p) { return p.team === 'away'; }).length;
  if (awayPen > homePen) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('POWER PLAY!', GW - 8, 18);
  } else if (homePen > awayPen) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SHORT HANDED', GW - 8, 18);
  }

  // Active pickup indicator
  if (activePickup) {
    ctx.textAlign = 'center';
    ctx.fillStyle = activePickup.type === 'reactor_core' ? '#ff8844' : '#ff44ff';
    ctx.font = 'bold 9px monospace';
    const pickupName = activePickup.type === 'reactor_core' ? 'REACTOR CORE' : 'SPEED SHROOM';
    ctx.fillText(pickupName + ' ' + Math.ceil(activePickup.timer) + 's', GW / 2, GH - 24);
  }

  // Zone name (subtle)
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(150,180,200,0.3)';
  ctx.font = '8px monospace';
  ctx.fillText(ZONES[currentZone].name, 4, GH - 4);

  // Penalty box display
  if (penaltyBox.length > 0) {
    ctx.font = '9px monospace';
    ctx.textAlign = 'right';
    let penY = 38;
    for (const p of penaltyBox) {
      const team = p.team === 'home' ? homeTeam : awayTeam;
      ctx.fillStyle = team.color1;
      const penTime = Math.ceil(p.timer);
      ctx.fillText(team.abbr + ' #' + (p.player.idx + 1) + ' ' + penTime + 's', GW - 8, penY);
      penY += 11;
    }
  }

  // Boss HP bar at top if active
  if (bossActive && boss) {
    ctx.fillStyle = 'rgba(10,5,30,0.8)';
    ctx.fillRect(GW * 0.25, 28, GW * 0.5, 10);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(GW * 0.25, 28, GW * 0.5 * (boss.hp / boss.maxHp), 10);
    ctx.strokeStyle = '#ff8844';
    ctx.lineWidth = 1;
    ctx.strokeRect(GW * 0.25, 28, GW * 0.5, 10);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.def.name, GW / 2, 36);
  }
}

// === DRAW: FACEOFF OVERLAY ===
function drawFaceoffOverlay() {
  if (faceoffTimer <= 0) return;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px monospace';
  const num = Math.ceil(faceoffTimer);
  ctx.fillText(num > 0 ? String(num) : 'GO!', GW / 2, GH / 2);
}

// === DRAW: TUTORIAL OVERLAY ===
function drawTutorialOverlay() {
  if (!showTutorial) return;

  ctx.fillStyle = 'rgba(0,0,10,0.85)';
  ctx.fillRect(20, 30, GW - 40, GH - 60);
  ctx.strokeStyle = '#44aaff';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 30, GW - 40, GH - 60);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('HOW TO PLAY', GW / 2, 58);

  ctx.fillStyle = '#ccc';
  ctx.font = '10px monospace';
  const tips = [
    'ARROWS/WASD to skate around the rink',
    'HOLD Z/SPACE to charge a shot, release to fire',
    'TAP Z/SPACE briefly to pass to a teammate',
    'X/SHIFT to body check opponents (knock puck loose)',
    '3 checks on same player triggers a FIGHT!',
    'Collect pickups for shields, speed, and power',
    'Watch out for reactor vents and spore rain!',
    'Score goals to advance through the tournament',
    'Boss fights appear at period 3!'
  ];
  let ty = 80;
  for (const tip of tips) {
    ctx.fillText(tip, GW / 2, ty);
    ty += 16;
  }

  const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY BUTTON TO START', GW / 2, GH - 42);
  ctx.globalAlpha = 1;
}

// === DRAW: FIGHT ===
function drawFight() {
  const zone = ZONES[currentZone];
  // Dark arena background with zone tint
  ctx.fillStyle = '#1a0a0a';
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = zone.fogColor;
  ctx.fillRect(0, 0, GW, GH);

  // Ring floor
  ctx.fillStyle = zone.iceColor;
  ctx.fillRect(40, GH * 0.6, GW - 80, GH * 0.35);

  // Ropes
  ctx.strokeStyle = zone.lineColor;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(40, GH * 0.4);
  ctx.lineTo(GW - 40, GH * 0.4);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('FIGHT!', GW / 2, 30);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText(Math.ceil(fightState.timer) + 's', GW / 2, 50);

  const p1x = GW * 0.3, p1y = GH * 0.55;
  drawFighter(p1x, p1y, homeTeam, fightState.p1Action, fightState.hitTimer1, fightState.p1Block, true);

  const p2x = GW * 0.7, p2y = GH * 0.55;
  drawFighter(p2x, p2y, awayTeam, fightState.p2Action, fightState.hitTimer2, fightState.p2Block, false);

  // Health bars
  ctx.fillStyle = '#333';
  ctx.fillRect(40, GH * 0.15, 160, 16);
  ctx.fillStyle = fightState.hp1 > fightState.maxHp1 * 0.3 ? '#44cc44' : '#ff4444';
  ctx.fillRect(40, GH * 0.15, 160 * (fightState.hp1 / fightState.maxHp1), 16);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(40, GH * 0.15, 160, 16);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(homeTeam.abbr, 45, GH * 0.15 + 12);

  ctx.fillStyle = '#333';
  ctx.fillRect(GW - 200, GH * 0.15, 160, 16);
  ctx.fillStyle = fightState.hp2 > fightState.maxHp2 * 0.3 ? '#44cc44' : '#ff4444';
  ctx.fillRect(GW - 200, GH * 0.15, 160 * (fightState.hp2 / fightState.maxHp2), 16);
  ctx.strokeStyle = '#fff';
  ctx.strokeRect(GW - 200, GH * 0.15, 160, 16);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.fillText(awayTeam.abbr, GW - 45, GH * 0.15 + 12);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('UP+A: High | DOWN+A: Low | A: Mid | B: Block', GW / 2, GH - 10);
}

function drawFighter(x, y, team, action, hitTimer, blocking, facingRight) {
  const dir = facingRight ? 1 : -1;

  // Baseling fighter - mushroom creature
  // Mushroom cap
  ctx.fillStyle = team.color1;
  ctx.beginPath();
  ctx.ellipse(x, y - 22, 14, 10, 0, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.arc(x - 5, y - 26, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 4, y - 28, 2, 0, Math.PI * 2);
  ctx.fill();

  // Face
  ctx.fillStyle = '#eed';
  ctx.fillRect(x - 8, y - 18, 16, 10);
  // Eyes
  ctx.fillStyle = '#111';
  ctx.fillRect(x - 5, y - 14, 3, 3);
  ctx.fillRect(x + 2, y - 14, 3, 3);

  // Body
  ctx.fillStyle = team.color1;
  ctx.fillRect(x - 12, y - 10, 24, 35);
  ctx.fillStyle = team.color2;
  ctx.fillRect(x - 12, y - 10, 24, 8);

  // Arms based on action
  ctx.strokeStyle = '#eed';
  ctx.lineWidth = 4;

  if (blocking) {
    ctx.beginPath();
    ctx.moveTo(x - 8 * dir, y - 5);
    ctx.lineTo(x + 15 * dir, y - 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 8 * dir, y + 5);
    ctx.lineTo(x + 15 * dir, y - 2);
    ctx.stroke();
    ctx.fillStyle = team.color1;
    ctx.beginPath();
    ctx.arc(x + 15 * dir, y - 5, 5, 0, Math.PI * 2);
    ctx.fill();
  } else if (hitTimer > 0) {
    const extend = (1 - hitTimer / 0.4) * 20;
    if (action === 'highPunch') {
      ctx.beginPath();
      ctx.moveTo(x, y - 5);
      ctx.lineTo(x + (20 + extend) * dir, y - 15);
      ctx.stroke();
      ctx.fillStyle = team.color1;
      ctx.beginPath();
      ctx.arc(x + (20 + extend) * dir, y - 15, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (action === 'lowPunch') {
      ctx.beginPath();
      ctx.moveTo(x, y + 5);
      ctx.lineTo(x + (20 + extend) * dir, y + 10);
      ctx.stroke();
      ctx.fillStyle = team.color1;
      ctx.beginPath();
      ctx.arc(x + (20 + extend) * dir, y + 10, 5, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + (20 + extend) * dir, y - 2);
      ctx.stroke();
      ctx.fillStyle = team.color1;
      ctx.beginPath();
      ctx.arc(x + (20 + extend) * dir, y - 2, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.beginPath();
    ctx.moveTo(x, y - 3);
    ctx.lineTo(x + 12 * dir, y - 8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y + 3);
    ctx.lineTo(x + 10 * dir, y + 8);
    ctx.stroke();
    ctx.fillStyle = team.color1;
    ctx.beginPath();
    ctx.arc(x + 12 * dir, y - 8, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 10 * dir, y + 8, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Legs
  ctx.strokeStyle = team.color2;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x - 5, y + 25);
  ctx.lineTo(x - 5, y + 40);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 5, y + 25);
  ctx.lineTo(x + 5, y + 40);
  ctx.stroke();

  // Skates
  ctx.fillStyle = '#222';
  ctx.fillRect(x - 8, y + 38, 8, 5);
  ctx.fillRect(x + 2, y + 38, 8, 5);
  // Blades
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x - 8, y + 43, 9, 1);
  ctx.fillRect(x + 2, y + 43, 9, 1);
}

// === DRAW: MATCH END ===
function drawMatchEnd() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  const won = homeScore > awayScore;
  ctx.fillStyle = won ? '#44dd88' : '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(won ? 'YOU WIN!' : 'YOU LOSE!', GW / 2, GH * 0.3);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(homeTeam.abbr + ' ' + homeScore + ' - ' + awayScore + ' ' + awayTeam.abbr, GW / 2, GH * 0.5);

  if (tournament && tournament.playerAlive && won) {
    const roundNames = ['Quarter-Final', 'Semi-Final', 'Final'];
    ctx.fillStyle = '#88aacc';
    ctx.font = '12px monospace';
    ctx.fillText(roundNames[tournament.currentRound] + ' Complete!', GW / 2, GH * 0.62);
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('Tournament Goals: ' + totalTournamentGoals, GW / 2, GH * 0.7);
  }

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.85);
  ctx.globalAlpha = 1;
}

// === DRAW: TOURNAMENT WIN ===
function drawTournamentWin() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  // Confetti
  for (let i = 0; i < 30; i++) {
    const cx = (frame * (i + 1) * 1.3 + i * 50) % GW;
    const cy = (frame * (i + 1) * 0.7 + i * 30) % GH;
    ctx.fillStyle = ['#ff4444', '#44dd88', '#ffdd44', '#44aaff', '#ff88cc'][i % 5];
    ctx.fillRect(cx, cy, 4, 4);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('CHAMPIONS!', GW / 2, GH * 0.2);

  ctx.fillStyle = homeTeam ? homeTeam.color1 : '#fff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(TEAMS[playerTeamIdx].name, GW / 2, GH * 0.32);

  // Trophy
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(GW / 2 - 15, GH * 0.4, 30, 40);
  ctx.fillRect(GW / 2 - 25, GH * 0.38, 50, 10);
  ctx.fillRect(GW / 2 - 10, GH * 0.4 + 40, 20, 10);
  ctx.fillRect(GW / 2 - 20, GH * 0.4 + 50, 40, 6);

  ctx.strokeStyle = '#ffdd44';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(GW / 2 - 25, GH * 0.45, 10, -Math.PI / 2, Math.PI / 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(GW / 2 + 25, GH * 0.45, 10, Math.PI / 2, -Math.PI / 2);
  ctx.stroke();

  // Winning baseling next to trophy
  drawBaselingMascot(GW / 2 - 50, GH * 0.48);
  drawBaselingMascot(GW / 2 + 50, GH * 0.48);

  ctx.fillStyle = '#88aacc';
  ctx.font = '12px monospace';
  ctx.fillText('Tournament Goals: ' + totalTournamentGoals, GW / 2, GH * 0.78);
  ctx.fillText('Goals Record: ' + highScore, GW / 2, GH * 0.83);

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.92);
  ctx.globalAlpha = 1;
}

// === DRAW: TOURNAMENT LOSS ===
function drawTournamentLoss() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('ELIMINATED', GW / 2, GH * 0.25);

  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  const roundNames = ['Quarter-Finals', 'Semi-Finals', 'Final'];
  ctx.fillText('Knocked out in the ' + (roundNames[tournament.currentRound] || 'Tournament'), GW / 2, GH * 0.45);

  ctx.fillStyle = '#ffdd44';
  ctx.font = '12px monospace';
  ctx.fillText('Final Score: ' + homeScore + ' - ' + awayScore, GW / 2, GH * 0.55);
  ctx.fillText('Tournament Goals: ' + totalTournamentGoals, GW / 2, GH * 0.63);

  // Sad baseling
  const bx = GW / 2, by = GH * 0.75;
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.ellipse(bx, by - 6, 14, 10, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#eed';
  ctx.fillRect(bx - 6, by - 4, 12, 12);
  // Sad eyes
  ctx.fillStyle = '#111';
  ctx.fillRect(bx - 4, by + 1, 3, 2);
  ctx.fillRect(bx + 1, by + 1, 3, 2);
  // Frown
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(bx, by + 8, 4, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.92);
  ctx.globalAlpha = 1;
}

// === SAVE/LOAD TOURNAMENT ===
function saveTournament() {
  try {
    localStorage.setItem('blades_poop_tournament', JSON.stringify({
      tournament: tournament, playerTeamIdx: playerTeamIdx, homeScore: homeScore, awayScore: awayScore
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadTournament() {
  try {
    const data = localStorage.getItem('blades_poop_tournament');
    if (data) return JSON.parse(data);
  } catch(e) { console.warn('Load failed:', e); }
  return null;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
