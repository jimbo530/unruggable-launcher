<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Blades of Poop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Rink dimensions (vertical orientation - top to bottom)
const RINK_X = 40, RINK_Y = 0;
const RINK_W = 400, RINK_H = 800;
const GOAL_W = 60, GOAL_H = 12;
const CENTER_Y = RINK_H / 2;
const BLUE_LINE_TOP = RINK_H * 0.33;
const BLUE_LINE_BOT = RINK_H * 0.67;

// Camera scroll
const CAM_SPEED = 8;
let camY = 0;
const CAM_MIN = 0;
const CAM_MAX = RINK_H - GH;

// Player physics - statB.speed (DEX) scales movement
const SKATE_SPEED = 180;
const SKATE_ACCEL = 600;
const FRICTION = 0.92;
const PUCK_SPEED = 320;
const PASS_SPEED = 250;
const SHOT_POWER_MAX = 450;
const SHOT_CHARGE_RATE = 600;
const CHECK_SPEED = 280;
const CHECK_RANGE = 22;
const CHECK_COOLDOWN = 0.5;
const PLAYER_RADIUS = 8;
const PUCK_RADIUS = 4;
const GOALIE_SPEED = 120;

// Timing
const PERIOD_LENGTH = 120;
const PENALTY_TIME = 60;
const FACEOFF_DELAY = 1.5;
const FIGHT_HP = 100;

// === ZONE SYSTEM (5 themed zones based on tournament round) ===
const ZONES = [
  { name: 'Frozen Spore Fields',  iceColor: '#d8eef8', boardColor: '#2244aa', lineColor: '#cc2222', fogColor: 'rgba(100,200,150,0.04)', particleColor: '#88ffaa' },
  { name: 'Reactor Core Arena',   iceColor: '#e0ddf0', boardColor: '#6622aa', lineColor: '#ff6600', fogColor: 'rgba(255,100,50,0.04)',  particleColor: '#ff8844' },
  { name: 'Mycelial Caverns',     iceColor: '#d4e8d8', boardColor: '#225522', lineColor: '#88cc44', fogColor: 'rgba(80,200,80,0.06)',   particleColor: '#44ff88' },
  { name: 'Fungal Abyss',         iceColor: '#d8d4e8', boardColor: '#442266', lineColor: '#cc44ff', fogColor: 'rgba(180,80,255,0.05)',  particleColor: '#cc88ff' },
  { name: 'Championship Nexus',   iceColor: '#f0e8d0', boardColor: '#886611', lineColor: '#ffdd44', fogColor: 'rgba(255,220,80,0.05)',  particleColor: '#ffdd44' }
];
let currentZone = 0;

// === HAZARD SYSTEM ===
let hazards = []; // { type, x, y, vx, vy, timer, radius }
let hazardSpawnTimer = 0;
const HAZARD_TYPES = ['goo_trail', 'spore_rain', 'reactor_vent'];

// === PICKUP SYSTEM ===
let pickups = []; // { type, x, y, timer }
let pickupSpawnTimer = 0;
const PICKUP_TYPES = ['spore_shield', 'reactor_core', 'fungal_extract', 'speed_mushroom'];
let activePickup = null; // { type, timer }

// === SCORE POPUP SYSTEM ===
let scorePopups = []; // { text, x, y, timer, color }

// === BOSS SYSTEM ===
let bossActive = false;
let boss = null; // { type, x, y, hp, maxHp, timer, phase, attackTimer }
const BOSS_TYPES = [
  { name: 'Mycelial Golem',    color: '#44aa44', hp: 200, speed: 40,  pattern: 'charge' },
  { name: 'Reactor Overlord',  color: '#ff6622', hp: 250, speed: 50,  pattern: 'orbit' },
  { name: 'Spore Titan',       color: '#88ccff', hp: 300, speed: 35,  pattern: 'slam' }
];

// === ENEMY SYSTEM (rink hazard enemies) ===
let enemies = []; // { type, x, y, vx, vy, hp, timer }
let enemySpawnTimer = 0;
const ENEMY_TYPES = [
  { name: 'Reactor Bug',     color: '#ff4422', radius: 6,  speed: 80,  hp: 1 },
  { name: 'Spore Crawler',   color: '#44cc44', radius: 8,  speed: 50,  hp: 2 },
  { name: 'Mycelial Worm',   color: '#8844cc', radius: 5,  speed: 120, hp: 1 },
  { name: 'Fungal Lurker',   color: '#448844', radius: 10, speed: 30,  hp: 3 }
];

// === TUTORIAL STATE ===
let tutorialShown = false;
let showTutorial = false;
let tutorialTimer = 0;

// === SCREEN SHAKE ENHANCEMENT ===
let impactShakeX = 0, impactShakeY = 0;

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'SHOOT', b: 'CHECK' } });

// === TEAMS ===
const TEAMS = [
  { name: 'Spore Slashers',   abbr: 'SPR', color1: '#44dd88', color2: '#226644', speed: 8, shot: 7, fight: 6, goalie: 7 },
  { name: 'Fungal Flames',    abbr: 'FNG', color1: '#ff6644', color2: '#882211', speed: 7, shot: 8, fight: 7, goalie: 6 },
  { name: 'Reactor Rockets',  abbr: 'RKT', color1: '#44aaff', color2: '#1144aa', speed: 9, shot: 6, fight: 5, goalie: 7 },
  { name: 'Crystal Blades',   abbr: 'CRY', color1: '#cc88ff', color2: '#5522aa', speed: 6, shot: 9, fight: 6, goalie: 8 },
  { name: 'Poop Panthers',    abbr: 'POO', color1: '#aa8844', color2: '#554422', speed: 7, shot: 7, fight: 9, goalie: 6 },
  { name: 'Token Tigers',     abbr: 'TKN', color1: '#ffcc44', color2: '#886611', speed: 8, shot: 8, fight: 5, goalie: 6 },
  { name: 'Hex Hounds',       abbr: 'HEX', color1: '#ff44aa', color2: '#881155', speed: 9, shot: 5, fight: 8, goalie: 7 },
  { name: 'Dark Destroyers',  abbr: 'DRK', color1: '#8888aa', color2: '#333355', speed: 6, shot: 7, fight: 8, goalie: 9 }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let highScore = TAS.score.load('blades_poop_hi');
let totalTournamentGoals = 0;

// Tournament state
let tournament = null;
let playerTeamIdx = 0;
let currentMatch = null;

// Match state
let homeTeam = null, awayTeam = null;
let homePlayers = [], awayPlayers = [];
let homeGoalie = null, awayGoalie = null;
let puck = null;
let homeScore = 0, awayScore = 0;
let period = 1, periodTimer = PERIOD_LENGTH;
let controlledPlayer = null;
let shotCharging = false, shotPower = 0;
let faceoffTimer = 0;
let penaltyBox = [];
let checkCounts = {};
let overtime = false;
let matchNumber = 0;

// Fight state
let fightState = null;

// === HELPER FUNCTIONS ===
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return v < min ? min : v > max ? max : v; }
function dist(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1; return Math.sqrt(dx * dx + dy * dy); }
function angle(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1); }
function randRange(a, b) { return a + Math.random() * (b - a); }

// === SCORE POPUP HELPER ===
function spawnScorePopup(text, x, y, color) {
  scorePopups.push({ text: text, x: x, y: y, timer: 1.2, color: color || '#ffdd44' });
}

// === PLAYER FACTORY ===
function createPlayer(team, idx, x, y, isHome) {
  // CON (statB.hpMult) boosts stun resistance for home team
  return {
    team, idx, x, y,
    vx: 0, vy: 0,
    hasPuck: false,
    checkCooldown: 0,
    isHome,
    stunTimer: 0,
    penalized: false,
    fightAggro: 0,
    shielded: false,
    shieldTimer: 0
  };
}

function createGoalie(team, x, y, isHome) {
  return {
    team, x, y, baseX: x, baseY: y,
    vx: 0, vy: 0,
    isHome,
    hasPuck: false,
    saveTimer: 0
  };
}

function createPuck(x, y) {
  return { x, y, vx: 0, vy: 0, owner: null, loose: true, speed: 0 };
}

// === MATCH SETUP ===
function setupMatch(home, away) {
  homeTeam = home;
  awayTeam = away;
  homeScore = 0;
  awayScore = 0;
  period = 1;
  periodTimer = PERIOD_LENGTH;
  overtime = false;
  penaltyBox = [];
  checkCounts = {};
  hazards = [];
  pickups = [];
  enemies = [];
  scorePopups = [];
  activePickup = null;
  hazardSpawnTimer = 8;
  pickupSpawnTimer = 12;
  enemySpawnTimer = 15;
  bossActive = false;
  boss = null;
  // Zone based on tournament round
  if (tournament) {
    currentZone = Math.min(tournament.currentRound, ZONES.length - 1);
    if (tournament.currentRound >= 2) currentZone = 4; // Championship
  }
  setupPeriod();
}

function setupPeriod() {
  homePlayers = [];
  awayPlayers = [];

  const homeActive = 3 - penaltyBox.filter(function(p) { return p.team === 'home'; }).length;
  const awayActive = 3 - penaltyBox.filter(function(p) { return p.team === 'away'; }).length;

  for (let i = 0; i < 3; i++) {
    const penalized = i >= homeActive;
    const p = createPlayer(homeTeam, i,
      RINK_X + RINK_W * 0.3 + i * (RINK_W * 0.2),
      CENTER_Y - 40 - i * 20,
      true);
    p.penalized = penalized;
    homePlayers.push(p);
  }

  for (let i = 0; i < 3; i++) {
    const penalized = i >= awayActive;
    const p = createPlayer(awayTeam, i,
      RINK_X + RINK_W * 0.3 + i * (RINK_W * 0.2),
      CENTER_Y + 40 + i * 20,
      false);
    p.penalized = penalized;
    awayPlayers.push(p);
  }

  homeGoalie = createGoalie(homeTeam, RINK_X + RINK_W / 2, RINK_Y + 30, true);
  awayGoalie = createGoalie(awayTeam, RINK_X + RINK_W / 2, RINK_Y + RINK_H - 30, false);

  puck = createPuck(RINK_X + RINK_W / 2, CENTER_Y);
  controlledPlayer = homePlayers[0];
  shotCharging = false;
  shotPower = 0;
  faceoffTimer = FACEOFF_DELAY;
}

function faceoff(x, y) {
  puck.x = x;
  puck.y = y;
  puck.vx = 0;
  puck.vy = 0;
  puck.owner = null;
  puck.loose = true;
  faceoffTimer = FACEOFF_DELAY;
  shotCharging = false;
  shotPower = 0;

  const cx = x, cy = y;
  for (let i = 0; i < homePlayers.length; i++) {
    if (!homePlayers[i].penalized) {
      homePlayers[i].x = cx - 30 + i * 30;
      homePlayers[i].y = cy - 25;
      homePlayers[i].vx = 0;
      homePlayers[i].vy = 0;
    }
  }
  for (let i = 0; i < awayPlayers.length; i++) {
    if (!awayPlayers[i].penalized) {
      awayPlayers[i].x = cx - 30 + i * 30;
      awayPlayers[i].y = cy + 25;
      awayPlayers[i].vx = 0;
      awayPlayers[i].vy = 0;
    }
  }
  controlledPlayer = homePlayers.find(function(p) { return !p.penalized; }) || homePlayers[0];
}

// === INPUT ===
function inputLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function inputUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function inputDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function inputA() { return TAS.input.keys['KeyZ'] || TAS.input.keys['Space'] || TAS.input.touch.a; }
function inputB() { return TAS.input.keys['KeyX'] || TAS.input.keys['ShiftLeft'] || TAS.input.touch.b; }

let prevA = false, prevB = false;
function inputAPressed() { const v = inputA() && !prevA; return v; }
function inputBPressed() { const v = inputB() && !prevB; return v; }

// === TOURNAMENT ===
function resetTournament(teamIdx) {
  playerTeamIdx = teamIdx;
  totalTournamentGoals = 0;
  matchNumber = 0;
  const seeds = [];
  for (let i = 0; i < 8; i++) seeds.push(i);
  for (let i = 7; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [seeds[i], seeds[j]] = [seeds[j], seeds[i]];
  }
  tournament = {
    rounds: [seeds, [], []],
    currentRound: 0,
    currentGame: 0,
    playerAlive: true
  };
  // Show tutorial on first ever play
  if (!tutorialShown) {
    showTutorial = true;
    tutorialTimer = 6;
    tutorialShown = true;
  }
  playNextTournamentGame();
}

function playNextTournamentGame() {
  const round = tournament.rounds[tournament.currentRound];
  const gi = tournament.currentGame * 2;

  if (gi + 1 >= round.length) {
    tournament.currentRound++;
    tournament.currentGame = 0;
    if (tournament.currentRound >= 3 || tournament.rounds[tournament.currentRound].length < 2) {
      if (tournament.playerAlive) {
        state = 'tournamentWin';
        if (totalTournamentGoals > highScore) {
          highScore = totalTournamentGoals;
          TAS.score.save('blades_poop_hi', highScore);
        }
      } else {
        state = 'tournamentLoss';
      }
      return;
    }
    playNextTournamentGame();
    return;
  }

  const t1 = round[gi];
  const t2 = round[gi + 1];
  const playerInvolved = (t1 === playerTeamIdx || t2 === playerTeamIdx);

  if (playerInvolved && tournament.playerAlive) {
    const oppIdx = t1 === playerTeamIdx ? t2 : t1;
    matchNumber++;
    setupMatch(TEAMS[playerTeamIdx], TEAMS[oppIdx]);
    state = 'matchIntro';
  } else {
    const s1 = TEAMS[t1].speed + TEAMS[t1].shot + TEAMS[t1].goalie;
    const s2 = TEAMS[t2].speed + TEAMS[t2].shot + TEAMS[t2].goalie;
    const winner = Math.random() < s1 / (s1 + s2) ? t1 : t2;
    if (!tournament.rounds[tournament.currentRound + 1]) tournament.rounds.push([]);
    tournament.rounds[tournament.currentRound + 1].push(winner);
    if ((t1 === playerTeamIdx || t2 === playerTeamIdx) && winner !== playerTeamIdx) {
      tournament.playerAlive = false;
    }
    tournament.currentGame++;
    playNextTournamentGame();
  }
}

// === AI LOGIC ===
function updateAI(player, allTeammates, opponents, dt) {
  if (player === controlledPlayer || player.penalized || player.stunTimer > 0) return;

  // DEX (statB.speed) scales AI teammate speed too
  const baseSpeed = (player.isHome ? homeTeam.speed : awayTeam.speed) * 18;
  const speed = player.isHome ? baseSpeed * statB.speed : baseSpeed;

  if (player.hasPuck) {
    const goalY = player.isHome ? RINK_Y + RINK_H - 40 : RINK_Y + 40;
    const goalX = RINK_X + RINK_W / 2;
    const distToGoal = dist(player.x, player.y, goalX, goalY);

    if (distToGoal < 150) {
      // STR (statB.damage) scales shot power
      const shotSpd = PUCK_SPEED * ((player.isHome ? homeTeam.shot : awayTeam.shot) / 10) * (player.isHome ? statB.damage : 1);
      const ang = angle(player.x, player.y, goalX + randRange(-20, 20), goalY);
      shootPuck(player, ang, shotSpd);
    } else {
      const ang = angle(player.x, player.y, goalX + randRange(-40, 40), goalY);
      player.vx += Math.cos(ang) * speed * dt;
      player.vy += Math.sin(ang) * speed * dt;
    }
  } else if (puck.loose) {
    const ang = angle(player.x, player.y, puck.x, puck.y);
    player.vx += Math.cos(ang) * speed * dt;
    player.vy += Math.sin(ang) * speed * dt;
  } else {
    const teamHasPuck = allTeammates.some(function(p) { return p.hasPuck; });
    if (teamHasPuck) {
      const targetX = RINK_X + RINK_W * (0.25 + player.idx * 0.25);
      const targetY = player.isHome ?
        CENTER_Y + 50 + player.idx * 40 :
        CENTER_Y - 50 - player.idx * 40;
      const ang = angle(player.x, player.y, targetX, targetY);
      const d = dist(player.x, player.y, targetX, targetY);
      if (d > 20) {
        player.vx += Math.cos(ang) * speed * 0.7 * dt;
        player.vy += Math.sin(ang) * speed * 0.7 * dt;
      }
    } else {
      const carrier = opponents.find(function(p) { return p.hasPuck; });
      if (carrier) {
        const myGoalY = player.isHome ? RINK_Y + 30 : RINK_Y + RINK_H - 30;
        const targetX = (carrier.x + RINK_X + RINK_W / 2) / 2;
        const targetY = (carrier.y + myGoalY) / 2;
        const ang = angle(player.x, player.y, targetX, targetY);
        player.vx += Math.cos(ang) * speed * dt;
        player.vy += Math.sin(ang) * speed * dt;

        if (dist(player.x, player.y, carrier.x, carrier.y) < CHECK_RANGE && player.checkCooldown <= 0) {
          performCheck(player, carrier);
        }
      }
    }
  }
}

// === GOALIE AI ===
function updateGoalie(goalie, team, dt) {
  const goalY = goalie.baseY;
  const goalX = goalie.baseX;
  const rating = (goalie.isHome ? homeTeam.goalie : awayTeam.goalie) / 10;
  // CON (statB.hpMult) makes home goalie slightly better
  const conBonus = goalie.isHome ? (1 + (statB.hpMult - 1) * 0.15) : 1;

  let targetX = puck.x;
  let targetY = goalY;

  const puckMovingToward = goalie.isHome ?
    (puck.vy < -50) : (puck.vy > 50);

  if (puckMovingToward) {
    const timeToGoal = Math.abs(goalY - puck.y) / Math.abs(puck.vy);
    targetX = puck.x + puck.vx * timeToGoal * rating * conBonus;
  }

  targetX = clamp(targetX, goalX - GOAL_W / 2 + 10, goalX + GOAL_W / 2 - 10);

  const gdx = targetX - goalie.x;
  const gdy = targetY - goalie.y;
  const gspd = GOALIE_SPEED * rating * conBonus;

  if (Math.abs(gdx) > 2) goalie.x += Math.sign(gdx) * gspd * dt;
  if (Math.abs(gdy) > 2) goalie.y += Math.sign(gdy) * gspd * dt;

  goalie.x = clamp(goalie.x, goalX - GOAL_W, goalX + GOAL_W);

  if (goalie.saveTimer <= 0) {
    const d = dist(goalie.x, goalie.y, puck.x, puck.y);
    if (d < 18 && puck.loose && puck.speed > 100) {
      goalie.saveTimer = 0.5;
      goalie.hasPuck = true;
      puck.owner = goalie;
      puck.loose = false;
      puck.vx = 0;
      puck.vy = 0;
      TAS.audio.playTone(200, 0.1, 'square', 0.08);
      setTimeout(function() {
        if (goalie.hasPuck) {
          goalie.hasPuck = false;
          puck.loose = true;
          puck.vx = (Math.random() - 0.5) * 100;
          puck.vy = goalie.isHome ? 80 : -80;
          puck.owner = null;
        }
      }, 800);
    }
  } else {
    goalie.saveTimer -= dt;
  }
}

// === SHOOTING ===
function shootPuck(player, ang, speed) {
  // STR (statB.damage) amplifies shot power for home team
  const finalSpeed = player.isHome ? speed * statB.damage : speed;
  player.hasPuck = false;
  puck.owner = null;
  puck.loose = true;
  puck.vx = Math.cos(ang) * finalSpeed;
  puck.vy = Math.sin(ang) * finalSpeed;
  puck.speed = finalSpeed;
  TAS.audio.playTone(400, 0.15, 'sawtooth', 0.1, 200);
  TAS.particles.spawn(puck.x, puck.y, '#88ccff', 5, 3);
}

function passPuck(player) {
  const teammates = player.isHome ? homePlayers : awayPlayers;
  let nearest = null, nearDist = Infinity;
  for (const t of teammates) {
    if (t === player || t.penalized) continue;
    const d = dist(player.x, player.y, t.x, t.y);
    if (d < nearDist) { nearDist = d; nearest = t; }
  }
  if (nearest) {
    const ang = angle(player.x, player.y, nearest.x, nearest.y);
    // DEX (statB.speed) scales pass speed for home team
    const passSpd = player.isHome ? PASS_SPEED * statB.speed : PASS_SPEED;
    player.hasPuck = false;
    puck.owner = null;
    puck.loose = true;
    puck.vx = Math.cos(ang) * passSpd;
    puck.vy = Math.sin(ang) * passSpd;
    puck.speed = passSpd;
    TAS.audio.playTone(300, 0.08, 'square', 0.06);
  }
}

// === BODY CHECK ===
function performCheck(checker, target) {
  if (checker.checkCooldown > 0) return;
  // WIS (statB.cooldown) reduces check cooldown for home team
  checker.checkCooldown = checker.isHome ? CHECK_COOLDOWN * statB.cooldown : CHECK_COOLDOWN;

  const d = dist(checker.x, checker.y, target.x, target.y);
  if (d > CHECK_RANGE * 1.5) return;

  // Spore shield blocks check
  if (target.shielded) {
    TAS.audio.playTone(600, 0.1, 'sine', 0.08);
    TAS.particles.spawn(target.x, target.y - camY, '#44ffaa', 8, 3);
    target.shielded = false;
    target.shieldTimer = 0;
    return;
  }

  const ang = angle(checker.x, checker.y, target.x, target.y);
  // STR (statB.damage) scales check knockback for home team
  const checkPow = checker.isHome ? CHECK_SPEED * statB.damage : CHECK_SPEED;
  target.vx += Math.cos(ang) * checkPow;
  target.vy += Math.sin(ang) * checkPow;
  // CON (statB.hpMult) reduces stun duration when being checked (home team)
  target.stunTimer = target.isHome ? 0.3 / statB.hpMult : 0.3;

  if (target.hasPuck) {
    target.hasPuck = false;
    puck.owner = null;
    puck.loose = true;
    puck.vx = (Math.random() - 0.5) * 100;
    puck.vy = (Math.random() - 0.5) * 100;
    puck.speed = 80;
  }

  // Enhanced screen shake
  TAS.fx.shake(4, 0.85);
  impactShakeX = (Math.random() - 0.5) * 6;
  impactShakeY = (Math.random() - 0.5) * 6;
  TAS.audio.playNoise(0.12, 0.15, 800);
  TAS.audio.playTone(150, 0.1, 'square', 0.08);
  // Death/hit particles based on zone
  const zone = ZONES[currentZone];
  TAS.particles.spawn(target.x, target.y - camY, '#fff', 8, 4);
  TAS.particles.spawn(target.x, target.y - camY, zone.particleColor, 4, 3);

  // INT (statB.scoreMult) gives bonus score on checks for home team
  if (checker.isHome) {
    const checkScore = Math.round(5 * statB.scoreMult);
    spawnScorePopup('+' + checkScore, target.x, target.y - camY, '#88ccff');
  }

  const key = checker.isHome + '_' + checker.idx + '_' + target.idx;
  checkCounts[key] = (checkCounts[key] || 0) + 1;
  target.fightAggro++;

  if (checkCounts[key] >= 3) {
    startFight(checker, target);
    checkCounts[key] = 0;
  }
}

// === FIGHT SYSTEM ===
function startFight(p1, p2) {
  // CON (statB.hpMult) scales fight HP for home player
  const p1Hp = p1.isHome ? Math.round(FIGHT_HP * statB.hpMult) : FIGHT_HP;
  const p2Hp = p2.isHome ? Math.round(FIGHT_HP * statB.hpMult) : FIGHT_HP;
  fightState = {
    player1: p1, player2: p2,
    hp1: p1Hp, hp2: p2Hp,
    maxHp1: p1Hp, maxHp2: p2Hp,
    timer: 10,
    p1Action: 'idle', p2Action: 'idle',
    hitTimer1: 0, hitTimer2: 0,
    p1Block: false, p2Block: false,
    aiTimer: 0
  };
  state = 'fighting';
  TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1, 50);
}

function updateFight(dt) {
  if (!fightState) return;
  fightState.timer -= dt;
  fightState.hitTimer1 = Math.max(0, fightState.hitTimer1 - dt);
  fightState.hitTimer2 = Math.max(0, fightState.hitTimer2 - dt);
  fightState.aiTimer -= dt;

  fightState.p1Block = inputB();
  if (!fightState.p1Block && fightState.hitTimer1 <= 0) {
    if (inputUp() && inputAPressed()) {
      fightState.p1Action = 'highPunch';
      // WIS (statB.cooldown) speeds up punch recovery
      fightState.hitTimer1 = 0.4 * statB.cooldown;
      if (!fightState.p2Block) {
        // STR (statB.damage) amplifies fight damage
        const dmg = Math.round((12 + Math.floor(Math.random() * 8)) * statB.damage);
        fightState.hp2 -= dmg;
        TAS.audio.playTone(200, 0.1, 'square', 0.12);
        TAS.fx.shake(3, 0.9);
        TAS.particles.spawn(GW * 0.65, GH * 0.45, '#ff4444', 4, 3);
        spawnScorePopup('-' + dmg, GW * 0.65, GH * 0.45, '#ff4444');
      } else {
        TAS.audio.playTone(100, 0.05, 'square', 0.05);
      }
    } else if (inputDown() && inputAPressed()) {
      fightState.p1Action = 'lowPunch';
      fightState.hitTimer1 = 0.35 * statB.cooldown;
      if (!fightState.p2Block) {
        const dmg = Math.round((8 + Math.floor(Math.random() * 6)) * statB.damage);
        fightState.hp2 -= dmg;
        TAS.audio.playTone(250, 0.08, 'square', 0.1);
        TAS.fx.shake(2, 0.9);
        TAS.particles.spawn(GW * 0.65, GH * 0.55, '#ff4444', 3, 2);
        spawnScorePopup('-' + dmg, GW * 0.65, GH * 0.55, '#ff4444');
      } else {
        TAS.audio.playTone(100, 0.05, 'square', 0.05);
      }
    } else if (inputAPressed()) {
      fightState.p1Action = 'midPunch';
      fightState.hitTimer1 = 0.35 * statB.cooldown;
      if (!fightState.p2Block) {
        const dmg = Math.round((10 + Math.floor(Math.random() * 5)) * statB.damage);
        fightState.hp2 -= dmg;
        TAS.audio.playTone(220, 0.09, 'square', 0.11);
        TAS.fx.shake(2, 0.9);
        TAS.particles.spawn(GW * 0.65, GH * 0.5, '#ff4444', 3, 2);
        spawnScorePopup('-' + dmg, GW * 0.65, GH * 0.5, '#ff4444');
      } else {
        TAS.audio.playTone(100, 0.05, 'square', 0.05);
      }
    }
  }

  // AI controls (player2)
  if (fightState.aiTimer <= 0 && fightState.hitTimer2 <= 0) {
    const fightSkill = (fightState.player2.isHome ? homeTeam.fight : awayTeam.fight) / 10;
    const action = Math.random();

    if (action < 0.3 * fightSkill) {
      fightState.p2Action = Math.random() < 0.5 ? 'highPunch' : 'lowPunch';
      fightState.hitTimer2 = 0.4;
      if (!fightState.p1Block) {
        const dmg = Math.floor((8 + Math.random() * 10) * fightSkill);
        fightState.hp1 -= dmg;
        TAS.audio.playTone(180, 0.1, 'square', 0.1);
        TAS.fx.shake(2, 0.9);
        TAS.particles.spawn(GW * 0.35, GH * 0.5, '#ff4444', 3, 2);
        spawnScorePopup('-' + dmg, GW * 0.35, GH * 0.5, '#ff4444');
      }
      fightState.aiTimer = 0.3 + Math.random() * 0.4;
    } else if (action < 0.5) {
      fightState.p2Block = true;
      fightState.aiTimer = 0.3 + Math.random() * 0.5;
    } else {
      fightState.p2Block = false;
      fightState.aiTimer = 0.2 + Math.random() * 0.3;
    }
  }

  if (fightState.hp1 <= 0 || fightState.hp2 <= 0 || fightState.timer <= 0) {
    endFight();
  }
}

function endFight() {
  const loser = fightState.hp1 <= fightState.hp2 ? fightState.player1 : fightState.player2;
  loser.penalized = true;
  penaltyBox.push({ team: loser.isHome ? 'home' : 'away', timer: PENALTY_TIME, player: loser });

  // INT (statB.scoreMult) bonus points for winning fight
  if (loser !== fightState.player1 && fightState.player1.isHome) {
    const fightBonus = Math.round(25 * statB.scoreMult);
    spawnScorePopup('+' + fightBonus + ' FIGHT WIN', GW / 2, GH / 2, '#44ff44');
  }

  TAS.audio.playMelody([[200, 0.15], [150, 0.15], [100, 0.3]], 180);

  fightState = null;
  state = 'playing';
  faceoff(RINK_X + RINK_W / 2, CENTER_Y);
}

// === GOAL DETECTION ===
function checkGoals() {
  const homeGoalX = RINK_X + RINK_W / 2;
  const homeGoalY = RINK_Y + 10;
  if (puck.y < homeGoalY + GOAL_H && puck.y > homeGoalY - 5 &&
      Math.abs(puck.x - homeGoalX) < GOAL_W / 2 && puck.loose) {
    awayScore++;
    goalScored(false);
    return true;
  }

  const awayGoalY = RINK_Y + RINK_H - 10;
  if (puck.y > awayGoalY - GOAL_H && puck.y < awayGoalY + 5 &&
      Math.abs(puck.x - homeGoalX) < GOAL_W / 2 && puck.loose) {
    homeScore++;
    totalTournamentGoals++;
    goalScored(true);
    return true;
  }
  return false;
}

function goalScored(homeScored) {
  TAS.fx.flash('#fff', 0.5);
  TAS.fx.shake(8, 0.9);
  impactShakeX = (Math.random() - 0.5) * 10;
  impactShakeY = (Math.random() - 0.5) * 10;
  TAS.audio.playTone(220, 0.8, 'sawtooth', 0.12);
  TAS.audio.playTone(277, 0.8, 'sawtooth', 0.08);
  TAS.audio.playTone(330, 0.8, 'sawtooth', 0.06);
  TAS.audio.playNoise(1.5, 0.1, 2000);

  const zone = ZONES[currentZone];
  TAS.particles.spawn(puck.x, puck.y - camY, '#ffdd44', 30, 5, { size: 3, sizeVar: 3 });
  TAS.particles.spawn(puck.x, puck.y - camY, '#ff4444', 20, 4, { size: 2 });
  TAS.particles.spawn(puck.x, puck.y - camY, zone.particleColor, 15, 4, { size: 2 });

  // INT (statB.scoreMult) bonus on goals
  if (homeScored) {
    const goalScore = Math.round(50 * statB.scoreMult);
    spawnScorePopup('+' + goalScore + ' GOAL!', puck.x, puck.y - camY - 20, '#ffdd44');
    // CHA (statB.luck) chance for bonus pickup on goal
    if (Math.random() < 0.15 * statB.luck) {
      spawnPickupAt(puck.x, CENTER_Y);
      spawnScorePopup('LUCKY DROP!', puck.x, puck.y - camY - 40, '#44ff88');
    }
  }

  // Release penalties on goal against
  if (homeScored) {
    penaltyBox = penaltyBox.filter(function(p) {
      if (p.team === 'away') { p.player.penalized = false; return false; }
      return true;
    });
  } else {
    penaltyBox = penaltyBox.filter(function(p) {
      if (p.team === 'home') { p.player.penalized = false; return false; }
      return true;
    });
  }

  if (overtime) {
    endMatch();
  } else {
    setTimeout(function() {
      faceoff(RINK_X + RINK_W / 2, CENTER_Y);
    }, 1500);
  }
}

// === ICING ===
function checkIcing() {
  if (!puck.loose) return false;
  return false;
}

// === PUCK PHYSICS ===
function updatePuck(dt) {
  if (puck.owner) {
    puck.x = puck.owner.x;
    puck.y = puck.owner.y + (puck.owner.isHome === undefined ? 0 : (puck.owner.isHome ? 8 : -8));
    puck.vx = 0;
    puck.vy = 0;
    return;
  }

  puck.x += puck.vx * dt;
  puck.y += puck.vy * dt;

  puck.vx *= 0.995;
  puck.vy *= 0.995;
  puck.speed = Math.sqrt(puck.vx * puck.vx + puck.vy * puck.vy);

  if (puck.x < RINK_X + PUCK_RADIUS) { puck.x = RINK_X + PUCK_RADIUS; puck.vx = Math.abs(puck.vx) * 0.7; }
  if (puck.x > RINK_X + RINK_W - PUCK_RADIUS) { puck.x = RINK_X + RINK_W - PUCK_RADIUS; puck.vx = -Math.abs(puck.vx) * 0.7; }

  const goalX = RINK_X + RINK_W / 2;
  if (puck.y < RINK_Y + PUCK_RADIUS) {
    if (Math.abs(puck.x - goalX) > GOAL_W / 2) {
      puck.y = RINK_Y + PUCK_RADIUS;
      puck.vy = Math.abs(puck.vy) * 0.7;
    }
  }
  if (puck.y > RINK_Y + RINK_H - PUCK_RADIUS) {
    if (Math.abs(puck.x - goalX) > GOAL_W / 2) {
      puck.y = RINK_Y + RINK_H - PUCK_RADIUS;
      puck.vy = -Math.abs(puck.vy) * 0.7;
    }
  }

  // Pickup detection
  if (puck.loose && faceoffTimer <= 0) {
    const allPlayers = homePlayers.concat(awayPlayers);
    for (const p of allPlayers) {
      if (p.penalized || p.stunTimer > 0) continue;
      if (dist(p.x, p.y, puck.x, puck.y) < PLAYER_RADIUS + PUCK_RADIUS + 4) {
        p.hasPuck = true;
        puck.owner = p;
        puck.loose = false;
        puck.vx = 0;
        puck.vy = 0;
        if (p === controlledPlayer || p.isHome) {
          TAS.audio.playTone(500, 0.05, 'square', 0.04);
        }
        break;
      }
    }
  }
}

// === PLAYER PHYSICS ===
function updatePlayer(player, dt) {
  if (player.penalized) return;
  if (player.stunTimer > 0) {
    player.stunTimer -= dt;
  }
  player.checkCooldown = Math.max(0, player.checkCooldown - dt);

  // Shield timer
  if (player.shieldTimer > 0) {
    player.shieldTimer -= dt;
    if (player.shieldTimer <= 0) {
      player.shielded = false;
    }
  }

  player.vx *= FRICTION;
  player.vy *= FRICTION;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  player.x = clamp(player.x, RINK_X + PLAYER_RADIUS, RINK_X + RINK_W - PLAYER_RADIUS);
  player.y = clamp(player.y, RINK_Y + PLAYER_RADIUS + 15, RINK_Y + RINK_H - PLAYER_RADIUS - 15);

  // Hazard collision for players
  if (player.isHome) {
    for (let i = hazards.length - 1; i >= 0; i--) {
      const h = hazards[i];
      if (h.type === 'goo_trail' && dist(player.x, player.y, h.x, h.y) < h.radius + PLAYER_RADIUS) {
        // Goo slows player
        player.vx *= 0.8;
        player.vy *= 0.8;
      }
      if (h.type === 'reactor_vent' && dist(player.x, player.y, h.x, h.y) < h.radius + PLAYER_RADIUS) {
        // Vent pushes player away
        const pushAng = angle(h.x, h.y, player.x, player.y);
        player.vx += Math.cos(pushAng) * 150 * dt;
        player.vy += Math.sin(pushAng) * 150 * dt;
      }
    }
  }
}

// === CONTROLLED PLAYER ===
function updateControlled(dt) {
  if (!controlledPlayer || controlledPlayer.penalized) {
    controlledPlayer = homePlayers.find(function(p) { return !p.penalized; }) || homePlayers[0];
  }

  if (controlledPlayer.stunTimer > 0) return;

  // DEX (statB.speed) scales player acceleration and max speed
  const speed = SKATE_ACCEL * (homeTeam.speed / 8) * statB.speed;

  if (inputLeft()) controlledPlayer.vx -= speed * dt;
  if (inputRight()) controlledPlayer.vx += speed * dt;
  if (inputUp()) controlledPlayer.vy -= speed * dt;
  if (inputDown()) controlledPlayer.vy += speed * dt;

  const spd = Math.sqrt(controlledPlayer.vx * controlledPlayer.vx + controlledPlayer.vy * controlledPlayer.vy);
  const maxSpd = SKATE_SPEED * (homeTeam.speed / 8) * statB.speed;
  if (spd > maxSpd) {
    controlledPlayer.vx = (controlledPlayer.vx / spd) * maxSpd;
    controlledPlayer.vy = (controlledPlayer.vy / spd) * maxSpd;
  }

  // Shooting / Passing
  if (controlledPlayer.hasPuck) {
    if (inputA()) {
      if (!shotCharging) {
        shotCharging = true;
        shotPower = 0;
      }
      // WIS (statB.cooldown) speeds up shot charge
      shotPower = Math.min(shotPower + SHOT_CHARGE_RATE * (1 / statB.cooldown) * dt, SHOT_POWER_MAX);
    } else if (shotCharging) {
      const ang = controlledPlayer.isHome ? Math.PI / 2 : -Math.PI / 2;
      const aimOff = controlledPlayer.vx * 0.003;
      // STR (statB.damage) amplifies shot power
      shootPuck(controlledPlayer, ang + aimOff, shotPower * (homeTeam.shot / 8) * statB.damage);
      shotCharging = false;
      shotPower = 0;
    }

    if (!inputA() && shotCharging && shotPower < 80) {
      shotCharging = false;
      shotPower = 0;
      passPuck(controlledPlayer);
    }
  } else {
    shotCharging = false;
    shotPower = 0;

    if (puck.loose || (puck.owner && !puck.owner.isHome)) {
      let nearestDist = dist(controlledPlayer.x, controlledPlayer.y, puck.x, puck.y);
      for (const p of homePlayers) {
        if (p.penalized) continue;
        const d = dist(p.x, p.y, puck.x, puck.y);
        if (d < nearestDist - 30) {
          nearestDist = d;
          controlledPlayer = p;
        }
      }
    }
  }

  // Body check - WIS (statB.cooldown) reduces check cooldown
  if (inputB() && controlledPlayer.checkCooldown <= 0) {
    let nearest = null, nearDist = Infinity;
    for (const p of awayPlayers) {
      if (p.penalized) continue;
      const d = dist(controlledPlayer.x, controlledPlayer.y, p.x, p.y);
      if (d < nearDist) { nearDist = d; nearest = p; }
    }
    if (nearest && nearDist < CHECK_RANGE * 1.5) {
      performCheck(controlledPlayer, nearest);
    }

    // Also check enemies with body check
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (dist(controlledPlayer.x, controlledPlayer.y, e.x, e.y) < CHECK_RANGE * 2) {
        e.hp -= statB.damage;
        TAS.fx.shake(2, 0.9);
        TAS.particles.spawn(e.x, e.y - camY, e.def.color, 6, 3);
        if (e.hp <= 0) {
          // CHA (statB.luck) bonus drop chance from enemies
          const dropScore = Math.round(15 * statB.scoreMult);
          spawnScorePopup('+' + dropScore, e.x, e.y - camY, '#ff8844');
          if (Math.random() < 0.25 * statB.luck) {
            spawnPickupAt(e.x, e.y);
          }
          TAS.particles.spawn(e.x, e.y - camY, '#ff4444', 10, 4);
          enemies.splice(i, 1);
        }
        break;
      }
    }
  }
}

// === CAMERA ===
function updateCamera(dt) {
  const targetY = puck.y - GH / 2;
  camY = lerp(camY, clamp(targetY, CAM_MIN, CAM_MAX), CAM_SPEED * dt);
}

// === HAZARD SYSTEM ===
function updateHazards(dt) {
  hazardSpawnTimer -= dt;
  if (hazardSpawnTimer <= 0) {
    // WIS (statB.cooldown) affects hazard spawn frequency - lower = less frequent
    hazardSpawnTimer = randRange(6, 12) / statB.cooldown;
    const type = HAZARD_TYPES[Math.floor(Math.random() * HAZARD_TYPES.length)];
    const hx = RINK_X + randRange(40, RINK_W - 40);
    const hy = randRange(RINK_Y + 60, RINK_Y + RINK_H - 60);
    hazards.push({
      type: type,
      x: hx, y: hy,
      vx: 0, vy: 0,
      timer: type === 'spore_rain' ? 3 : 8,
      radius: type === 'reactor_vent' ? 25 : 15
    });
  }

  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.timer -= dt;
    if (h.type === 'spore_rain') {
      // Spore rain drifts down
      h.y += 30 * dt;
      if (frame % 6 === 0) {
        TAS.particles.spawn(h.x + randRange(-10, 10), h.y - camY, '#88ff88', 1, 1, { size: 1, gravity: 20 });
      }
    }
    if (h.timer <= 0) {
      hazards.splice(i, 1);
    }
  }
}

// === PICKUP SYSTEM ===
function spawnPickupAt(px, py) {
  const type = PICKUP_TYPES[Math.floor(Math.random() * PICKUP_TYPES.length)];
  pickups.push({ type: type, x: px, y: py, timer: 10 });
}

function updatePickups(dt) {
  pickupSpawnTimer -= dt;
  // CHA (statB.luck) increases pickup frequency
  if (pickupSpawnTimer <= 0) {
    pickupSpawnTimer = randRange(10, 18) / statB.luck;
    const px = RINK_X + randRange(60, RINK_W - 60);
    const py = randRange(RINK_Y + 80, RINK_Y + RINK_H - 80);
    spawnPickupAt(px, py);
  }

  // Check player collision with pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    pk.timer -= dt;
    if (pk.timer <= 0) {
      pickups.splice(i, 1);
      continue;
    }
    // Only home players can pick up
    for (const p of homePlayers) {
      if (p.penalized) continue;
      if (dist(p.x, p.y, pk.x, pk.y) < PLAYER_RADIUS + 12) {
        activatePickup(pk.type, p);
        pickups.splice(i, 1);
        break;
      }
    }
  }

  // Active pickup timer
  if (activePickup) {
    activePickup.timer -= dt;
    if (activePickup.timer <= 0) {
      activePickup = null;
    }
  }
}

function activatePickup(type, player) {
  TAS.audio.playTone(800, 0.1, 'sine', 0.08);
  TAS.audio.playTone(1000, 0.08, 'sine', 0.06);
  TAS.particles.spawn(player.x, player.y - camY, '#ffff44', 10, 4);

  if (type === 'spore_shield') {
    player.shielded = true;
    player.shieldTimer = 8;
    spawnScorePopup('SPORE SHIELD!', player.x, player.y - camY - 15, '#44ffaa');
  } else if (type === 'reactor_core') {
    // Temporary shot power boost
    activePickup = { type: 'reactor_core', timer: 6 };
    spawnScorePopup('REACTOR CORE!', player.x, player.y - camY - 15, '#ff8844');
  } else if (type === 'fungal_extract') {
    // Heal stun and clear penalty timer
    for (const hp of homePlayers) {
      hp.stunTimer = 0;
    }
    // Reduce penalty timers
    for (const pen of penaltyBox) {
      if (pen.team === 'home') pen.timer = Math.max(0, pen.timer - 15);
    }
    spawnScorePopup('FUNGAL EXTRACT!', player.x, player.y - camY - 15, '#88cc44');
  } else if (type === 'speed_mushroom') {
    activePickup = { type: 'speed_mushroom', timer: 5 };
    spawnScorePopup('SPEED SHROOM!', player.x, player.y - camY - 15, '#ff44ff');
  }
}

// === ENEMY SYSTEM ===
function updateEnemies(dt) {
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0 && !bossActive && enemies.length < 4) {
    enemySpawnTimer = randRange(8, 15);
    const def = ENEMY_TYPES[Math.floor(Math.random() * ENEMY_TYPES.length)];
    const ex = RINK_X + randRange(40, RINK_W - 40);
    const ey = Math.random() < 0.5 ? RINK_Y + 40 : RINK_Y + RINK_H - 40;
    enemies.push({
      def: def,
      x: ex, y: ey,
      vx: (Math.random() - 0.5) * def.speed,
      vy: (Math.random() - 0.5) * def.speed,
      hp: def.hp,
      timer: 20
    });
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.timer -= dt;

    // Move toward nearest home player
    let nearestP = null, nearD = Infinity;
    for (const p of homePlayers) {
      if (p.penalized) continue;
      const d = dist(p.x, p.y, e.x, e.y);
      if (d < nearD) { nearD = d; nearestP = p; }
    }
    if (nearestP) {
      const ang = angle(e.x, e.y, nearestP.x, nearestP.y);
      e.vx = Math.cos(ang) * e.def.speed;
      e.vy = Math.sin(ang) * e.def.speed;
    }

    e.x += e.vx * dt;
    e.y += e.vy * dt;
    e.x = clamp(e.x, RINK_X + 10, RINK_X + RINK_W - 10);
    e.y = clamp(e.y, RINK_Y + 20, RINK_Y + RINK_H - 20);

    // Collision with home players - stun on contact
    for (const p of homePlayers) {
      if (p.penalized || p.shielded) continue;
      if (dist(p.x, p.y, e.x, e.y) < PLAYER_RADIUS + e.def.radius) {
        // CON (statB.hpMult) reduces enemy stun duration
        p.stunTimer = Math.max(p.stunTimer, 0.5 / statB.hpMult);
        if (p.hasPuck) {
          p.hasPuck = false;
          puck.owner = null;
          puck.loose = true;
          puck.vx = (Math.random() - 0.5) * 80;
          puck.vy = (Math.random() - 0.5) * 80;
          puck.speed = 60;
        }
        TAS.audio.playTone(150, 0.08, 'square', 0.08);
        TAS.particles.spawn(p.x, p.y - camY, '#ff4444', 4, 2);
      }
    }

    // Puck kills enemies
    if (puck.loose && puck.speed > 150) {
      if (dist(puck.x, puck.y, e.x, e.y) < PUCK_RADIUS + e.def.radius) {
        e.hp--;
        if (e.hp <= 0) {
          const killScore = Math.round(20 * statB.scoreMult);
          spawnScorePopup('+' + killScore, e.x, e.y - camY, '#ff8844');
          TAS.particles.spawn(e.x, e.y - camY, e.def.color, 12, 4);
          TAS.particles.spawn(e.x, e.y - camY, '#ffdd44', 6, 3);
          if (Math.random() < 0.3 * statB.luck) {
            spawnPickupAt(e.x, e.y);
          }
          enemies.splice(i, 1);
        }
      }
    }

    if (e.timer <= 0) {
      enemies.splice(i, 1);
    }
  }
}

// === BOSS SYSTEM ===
function spawnBoss() {
  const bossIdx = Math.floor(Math.random() * BOSS_TYPES.length);
  const def = BOSS_TYPES[bossIdx];
  boss = {
    def: def,
    x: RINK_X + RINK_W / 2,
    y: CENTER_Y,
    hp: def.hp,
    maxHp: def.hp,
    timer: 30,
    phase: 0,
    attackTimer: 2,
    hitFlash: 0
  };
  bossActive = true;
  enemies = [];
  TAS.audio.playTone(80, 0.5, 'sawtooth', 0.12, 40);
  TAS.audio.playTone(100, 0.5, 'sawtooth', 0.08, 50);
  spawnScorePopup(def.name.toUpperCase() + '!', GW / 2, GH * 0.3, '#ff4444');
}

function updateBoss(dt) {
  if (!boss || !bossActive) return;

  boss.timer -= dt;
  boss.attackTimer -= dt;
  boss.hitFlash = Math.max(0, boss.hitFlash - dt);

  const def = boss.def;

  // Movement based on pattern
  if (def.pattern === 'charge') {
    // Charge at puck carrier
    const target = controlledPlayer;
    if (target) {
      const ang = angle(boss.x, boss.y, target.x, target.y);
      boss.x += Math.cos(ang) * def.speed * dt;
      boss.y += Math.sin(ang) * def.speed * dt;
    }
  } else if (def.pattern === 'orbit') {
    // Orbit around center
    const orbAngle = frame * 0.02;
    boss.x = RINK_X + RINK_W / 2 + Math.cos(orbAngle) * 120;
    boss.y = CENTER_Y + Math.sin(orbAngle) * 80;
  } else if (def.pattern === 'slam') {
    // Periodic slams
    if (boss.attackTimer <= 0) {
      boss.attackTimer = 3;
      // Slam creates shockwave
      TAS.fx.shake(6, 0.85);
      TAS.audio.playTone(60, 0.3, 'sawtooth', 0.15);
      TAS.particles.spawn(boss.x, boss.y - camY, '#ff8844', 20, 5, { size: 3 });
      // Stun nearby home players
      for (const p of homePlayers) {
        if (dist(p.x, p.y, boss.x, boss.y) < 80) {
          p.stunTimer = Math.max(p.stunTimer, 0.8 / statB.hpMult);
          p.vx += (p.x - boss.x) * 3;
          p.vy += (p.y - boss.y) * 3;
        }
      }
    }
  }

  boss.x = clamp(boss.x, RINK_X + 30, RINK_X + RINK_W - 30);
  boss.y = clamp(boss.y, RINK_Y + 40, RINK_Y + RINK_H - 40);

  // Boss attacks: spawn hazards periodically
  if (boss.attackTimer <= 0 && def.pattern !== 'slam') {
    boss.attackTimer = 2.5;
    hazards.push({
      type: 'reactor_vent',
      x: boss.x + randRange(-40, 40),
      y: boss.y + randRange(-40, 40),
      vx: 0, vy: 0,
      timer: 4,
      radius: 20
    });
  }

  // Puck damages boss
  if (puck.loose && puck.speed > 100) {
    if (dist(puck.x, puck.y, boss.x, boss.y) < 25) {
      const dmg = Math.round(puck.speed / 10 * statB.damage);
      boss.hp -= dmg;
      boss.hitFlash = 0.15;
      puck.vx *= -0.5;
      puck.vy *= -0.5;
      TAS.fx.shake(4, 0.9);
      TAS.audio.playTone(300, 0.12, 'square', 0.1);
      TAS.particles.spawn(boss.x, boss.y - camY, '#ffdd44', 8, 4);
      spawnScorePopup('-' + dmg, boss.x, boss.y - camY - 20, '#ff8844');
    }
  }

  // Player check damages boss
  for (const p of homePlayers) {
    if (p.penalized) continue;
    if (dist(p.x, p.y, boss.x, boss.y) < 20) {
      // CON reduces boss contact stun
      p.stunTimer = Math.max(p.stunTimer, 0.4 / statB.hpMult);
      const pushAng = angle(boss.x, boss.y, p.x, p.y);
      p.vx += Math.cos(pushAng) * 200;
      p.vy += Math.sin(pushAng) * 200;
    }
  }

  // Boss defeated
  if (boss.hp <= 0) {
    const bossScore = Math.round(100 * statB.scoreMult);
    spawnScorePopup('+' + bossScore + ' BOSS SLAIN!', boss.x, boss.y - camY, '#ffdd44');
    TAS.particles.spawn(boss.x, boss.y - camY, '#ffdd44', 30, 6, { size: 4, sizeVar: 3 });
    TAS.particles.spawn(boss.x, boss.y - camY, boss.def.color, 20, 5, { size: 3 });
    TAS.audio.playMelody([[400, 0.1], [500, 0.1], [600, 0.1], [800, 0.3]], 200);
    // Drop multiple pickups
    for (let d = 0; d < 3; d++) {
      spawnPickupAt(boss.x + randRange(-30, 30), boss.y + randRange(-30, 30));
    }
    boss = null;
    bossActive = false;
  }

  // Boss timeout
  if (boss && boss.timer <= 0) {
    boss = null;
    bossActive = false;
    spawnScorePopup('BOSS FLED', GW / 2, GH / 2, '#888');
  }
}

// === SCORE POPUPS ===
function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].timer -= dt;
    scorePopups[i].y -= 30 * dt;
    if (scorePopups[i].timer <= 0) {
      scorePopups.splice(i, 1);
    }
  }
}

// === MATCH END ===
function endMatch() {
  state = 'matchEnd';
  if (homeScore > awayScore) {
    if (tournament) {
      if (!tournament.rounds[tournament.currentRound + 1]) tournament.rounds.push([]);
      tournament.rounds[tournament.currentRound + 1].push(playerTeamIdx);
    }
  } else {
    if (tournament) {
      tournament.playerAlive = false;
      const oppIdx = TEAMS.indexOf(awayTeam);
      if (!tournament.rounds[tournament.currentRound + 1]) tournament.rounds.push([]);
      tournament.rounds[tournament.currentRound + 1].push(oppIdx);
    }
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Decay impact shake
  impactShakeX *= 0.85;
  impactShakeY *= 0.85;

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'teamSelect';
    }
    return;
  }

  if (state === 'teamSelect') {
    return;
  }

  if (state === 'matchIntro') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
    }
    return;
  }

  if (state === 'matchEnd') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      if (tournament && tournament.playerAlive) {
        tournament.currentGame++;
        playNextTournamentGame();
      } else if (tournament && !tournament.playerAlive) {
        state = 'tournamentLoss';
      } else {
        state = 'title';
      }
    }
    return;
  }

  if (state === 'tournamentWin' || state === 'tournamentLoss') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'fighting') {
    updateFight(dt);
    updateScorePopups(dt);
    prevA = inputA();
    prevB = inputB();
    return;
  }

  if (state === 'playing') {
    // Tutorial dismiss
    if (showTutorial) {
      tutorialTimer -= dt;
      if (tutorialTimer <= 0 || inputAPressed() || inputBPressed()) {
        showTutorial = false;
      }
    }

    // Faceoff countdown
    if (faceoffTimer > 0) {
      faceoffTimer -= dt;
      prevA = inputA();
      prevB = inputB();
      return;
    }

    // Period timer
    periodTimer -= dt;
    if (periodTimer <= 0) {
      period++;
      if (period > 3) {
        if (homeScore === awayScore) {
          overtime = true;
          period = 4;
          periodTimer = PERIOD_LENGTH;
          faceoff(RINK_X + RINK_W / 2, CENTER_Y);
        } else {
          endMatch();
          return;
        }
      } else {
        periodTimer = PERIOD_LENGTH;
        faceoff(RINK_X + RINK_W / 2, CENTER_Y);
      }

      // Boss fight at period transitions (simulates "every 5 levels" for hockey)
      if (period === 3 && !bossActive) {
        spawnBoss();
      }
    }

    // Penalty timers
    for (let i = penaltyBox.length - 1; i >= 0; i--) {
      penaltyBox[i].timer -= dt;
      if (penaltyBox[i].timer <= 0) {
        penaltyBox[i].player.penalized = false;
        penaltyBox.splice(i, 1);
      }
    }

    // Update controlled player
    updateControlled(dt);

    // Update AI teammates
    for (const p of homePlayers) {
      if (p !== controlledPlayer) {
        updateAI(p, homePlayers, awayPlayers, dt);
      }
      updatePlayer(p, dt);
    }

    // Update AI opponents
    for (const p of awayPlayers) {
      updateAI(p, awayPlayers, homePlayers, dt);
      updatePlayer(p, dt);
    }

    // Update goalies
    updateGoalie(homeGoalie, homeTeam, dt);
    updateGoalie(awayGoalie, awayTeam, dt);

    // Update puck
    updatePuck(dt);

    // Check goals
    checkGoals();

    // Update camera
    updateCamera(dt);

    // Update content systems
    updateHazards(dt);
    updatePickups(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateScorePopups(dt);

    // Ice spray particles on fast turns
    if (controlledPlayer && Math.abs(controlledPlayer.vx) + Math.abs(controlledPlayer.vy) > 100) {
      if (frame % 4 === 0) {
        TAS.particles.spawn(
          controlledPlayer.x, controlledPlayer.y - camY,
          'rgba(200,220,255,0.5)', 1, 1, { size: 1, sizeVar: 1, gravity: 0 }
        );
      }
    }

    // Zone ambient particles
    if (frame % 12 === 0) {
      const zone = ZONES[currentZone];
      TAS.particles.spawn(
        RINK_X + Math.random() * RINK_W,
        Math.random() * GH,
        zone.particleColor, 1, 1, { size: 1, gravity: -5 }
      );
    }
  }

  prevA = inputA();
  prevB = inputB();
}

// === DRAWING ===
let teamSelectIdx = 0;
let teamSelectCooldown = 0;

function draw(dt) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'teamSelect') {
    drawTeamSelect(dt);
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'matchIntro') {
    drawMatchIntro();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'matchEnd') {
    drawMatchEnd();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'tournamentWin') {
    drawTournamentWin();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'tournamentLoss') {
    drawTournamentLoss();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'fighting') {
    drawFight();
    drawScorePopups();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();
  // Extra impact shake
  ctx.translate(Math.round(impactShakeX), Math.round(impactShakeY));

  drawRink();
  drawHazards();
  drawPickups();
  drawEnemies();
  drawBoss();
  drawPlayers();
  drawPuck();
  drawShotMeter();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawScorePopups();
  drawFaceoffOverlay();
  drawTutorialOverlay();
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW: TITLE ===
function drawTitle() {
  const zone = ZONES[0];
  // Ice background
  ctx.fillStyle = zone.iceColor;
  ctx.fillRect(30, 30, GW - 60, GH - 60);
  ctx.strokeStyle = zone.boardColor;
  ctx.lineWidth = 3;
  ctx.strokeRect(30, 30, GW - 60, GH - 60);

  // Center circle
  ctx.beginPath();
  ctx.arc(GW / 2, GH / 2 - 10, 40, 0, Math.PI * 2);
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#1a1a3a';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('BLADES OF POOP', GW / 2 + 2, 72);
  ctx.fillStyle = '#cc2222';
  ctx.fillText('BLADES OF POOP', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#336';
  ctx.font = '12px monospace';
  ctx.fillText('Tasern Ice Hockey', GW / 2, 88);

  // Baseling mascot (mushroom on ice)
  drawBaselingMascot(GW / 2, GH / 2 - 10);

  // NES-style control instructions with dotted leaders
  ctx.textAlign = 'left';
  ctx.font = '9px monospace';
  ctx.fillStyle = '#446';
  const instrX = 55;
  const instrX2 = GW - 55;
  let iy = GH * 0.62;
  const instructions = [
    ['ARROWS / WASD', 'SKATE'],
    ['Z / SPACE', 'SHOOT (HOLD)'],
    ['Z / SPACE (TAP)', 'PASS'],
    ['X / SHIFT', 'BODY CHECK'],
    ['UP+Z (FIGHT)', 'HIGH PUNCH'],
    ['DOWN+Z (FIGHT)', 'LOW PUNCH'],
    ['X (FIGHT)', 'BLOCK']
  ];
  for (const inst of instructions) {
    ctx.fillStyle = '#556';
    ctx.textAlign = 'left';
    ctx.fillText(inst[0], instrX, iy);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#668';
    ctx.fillText(inst[1], instrX2, iy);
    // Dotted leader
    const leftW = ctx.measureText(inst[0]).width;
    const rightW = ctx.measureText(inst[1]).width;
    const dotStart = instrX + leftW + 4;
    const dotEnd = instrX2 - rightW - 4;
    ctx.fillStyle = '#334';
    for (let dx = dotStart; dx < dotEnd; dx += 5) {
      ctx.fillRect(dx, iy - 2, 1, 1);
    }
    iy += 12;
  }

  // Teams preview
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < 4; i++) {
    const t = TEAMS[i];
    ctx.fillStyle = t.color1;
    ctx.fillText(t.abbr, GW * 0.2 + i * 45, GH * 0.89);
  }
  for (let i = 4; i < 8; i++) {
    const t = TEAMS[i];
    ctx.fillStyle = t.color1;
    ctx.fillText(t.abbr, GW * 0.2 + (i - 4) * 45, GH * 0.94);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#cc2222';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 12);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#446';
    ctx.font = '10px monospace';
    ctx.fillText('Best Tournament Goals: ' + highScore, GW / 2, GH * 0.53);
  }

  // Baseling stat display
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' Lv.' + statB.level, GW / 2, GH * 0.56);
  }
}

// === DRAW: BASELING MASCOT ===
function drawBaselingMascot(bx, by) {
  const bob = Math.sin(frame * 0.04) * 2;
  // Mushroom cap
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.ellipse(bx, by - 6 + bob, 14, 10, 0, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(bx - 5, by - 10 + bob, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bx + 4, by - 12 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  // Stem/body
  ctx.fillStyle = '#eed';
  ctx.fillRect(bx - 6, by - 4 + bob, 12, 12);
  // Eyes
  ctx.fillStyle = '#111';
  ctx.fillRect(bx - 4, by + bob, 3, 3);
  ctx.fillRect(bx + 1, by + bob, 3, 3);
  // Tiny stick
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(bx + 6, by + 2 + bob);
  ctx.lineTo(bx + 14, by + 8 + bob);
  ctx.stroke();
  ctx.strokeStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(bx + 14, by + 8 + bob);
  ctx.lineTo(bx + 18, by + 8 + bob);
  ctx.stroke();
  // Skates
  ctx.fillStyle = '#444';
  ctx.fillRect(bx - 6, by + 8 + bob, 5, 3);
  ctx.fillRect(bx + 1, by + 8 + bob, 5, 3);
  // Blade flash
  ctx.fillStyle = '#aaa';
  ctx.fillRect(bx - 7, by + 11 + bob, 7, 1);
  ctx.fillRect(bx, by + 11 + bob, 7, 1);
}

// === DRAW: TEAM SELECT ===
function drawTeamSelect(dt) {
  teamSelectCooldown = Math.max(0, teamSelectCooldown - dt);

  if (teamSelectCooldown <= 0) {
    if (inputLeft() || inputUp()) { teamSelectIdx = (teamSelectIdx + 7) % 8; teamSelectCooldown = 0.2; }
    if (inputRight() || inputDown()) { teamSelectIdx = (teamSelectIdx + 1) % 8; teamSelectCooldown = 0.2; }
    if (inputA() || inputAPressed()) {
      resetTournament(teamSelectIdx);
      teamSelectCooldown = 0.3;
      return;
    }
  }

  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#88aacc';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('SELECT YOUR TEAM', GW / 2, 30);

  for (let i = 0; i < 8; i++) {
    const t = TEAMS[i];
    const col = i % 4;
    const row = Math.floor(i / 4);
    const bx = 60 + col * 100;
    const by = 55 + row * 120;
    const selected = i === teamSelectIdx;

    ctx.fillStyle = selected ? '#223355' : '#111122';
    ctx.strokeStyle = selected ? t.color1 : '#333';
    ctx.lineWidth = selected ? 3 : 1;
    ctx.fillRect(bx - 40, by - 10, 80, 100);
    ctx.strokeRect(bx - 40, by - 10, 80, 100);

    // Baseling jersey (mushroom head with jersey)
    ctx.fillStyle = t.color1;
    ctx.beginPath();
    ctx.ellipse(bx, by + 10, 12, 8, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#eed';
    ctx.fillRect(bx - 6, by + 10, 12, 14);
    ctx.fillStyle = t.color1;
    ctx.fillRect(bx - 8, by + 14, 16, 10);
    ctx.fillStyle = t.color2;
    ctx.fillRect(bx - 8, by + 14, 16, 4);

    ctx.fillStyle = selected ? '#fff' : '#888';
    ctx.font = 'bold 9px monospace';
    ctx.fillText(t.abbr, bx, by + 55);
    ctx.font = '8px monospace';
    ctx.fillText('SPD:' + t.speed + ' SHT:' + t.shot, bx, by + 68);
    ctx.fillText('FGT:' + t.fight + ' GK:' + t.goalie, bx, by + 78);
  }

  const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS SHOOT TO SELECT', GW / 2, GH - 15);
  ctx.globalAlpha = 1;
}
