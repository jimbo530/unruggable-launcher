// ============================================================
// MOBILE TOUCH CONTROLS
// ============================================================
var isMobile = false;
var DPAD_SIZE = 120, DPAD_MARGIN = 20;
var BTN_SIZE = 60;

function checkMobile() {
  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}
checkMobile();

function getTouchPos(touch) {
  var rect = canvas.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function drawTouchControls() {
  if (!isMobile) return;

  var dpadX = DPAD_MARGIN + DPAD_SIZE / 2;
  var dpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
  var bombX = W - DPAD_MARGIN - BTN_SIZE / 2;
  var bombY = H - DPAD_MARGIN - BTN_SIZE / 2;
  var detX = W - DPAD_MARGIN - BTN_SIZE / 2;
  var detY = H - DPAD_MARGIN - BTN_SIZE * 1.5;

  ctx.globalAlpha = 0.25;

  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(dpadX, dpadY, DPAD_SIZE / 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#aaa';
  var as = 15;
  ctx.beginPath();
  ctx.moveTo(dpadX, dpadY - 30);
  ctx.lineTo(dpadX - as, dpadY - 15);
  ctx.lineTo(dpadX + as, dpadY - 15);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(dpadX, dpadY + 30);
  ctx.lineTo(dpadX - as, dpadY + 15);
  ctx.lineTo(dpadX + as, dpadY + 15);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(dpadX - 30, dpadY);
  ctx.lineTo(dpadX - 15, dpadY - as);
  ctx.lineTo(dpadX - 15, dpadY + as);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(dpadX + 30, dpadY);
  ctx.lineTo(dpadX + 15, dpadY - as);
  ctx.lineTo(dpadX + 15, dpadY + as);
  ctx.fill();

  ctx.fillStyle = '#8B4E2A';
  ctx.beginPath();
  ctx.arc(bombX, bombY, BTN_SIZE / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(BTN_SIZE * 0.3) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BOMB', bombX, bombY);

  ctx.fillStyle = '#4488FF';
  ctx.beginPath();
  ctx.arc(detX, detY, BTN_SIZE * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(BTN_SIZE * 0.25) + 'px monospace';
  ctx.fillText('DET', detX, detY);

  ctx.globalAlpha = 1;
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();

  if (state === 'title') { startGame(); return; }
  if (state === 'gameOver') { state = 'title'; return; }

  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var touch = e.changedTouches[ti];
    var pos = getTouchPos(touch);
    var tdpadX = DPAD_MARGIN + DPAD_SIZE / 2;
    var tdpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
    var tbombX = W - DPAD_MARGIN - BTN_SIZE / 2;
    var tbombY = H - DPAD_MARGIN - BTN_SIZE / 2;
    var tdetX = W - DPAD_MARGIN - BTN_SIZE / 2;
    var tdetY = H - DPAD_MARGIN - BTN_SIZE * 1.5;

    var bdx = pos.x - tbombX, bdy = pos.y - tbombY;
    if (bdx * bdx + bdy * bdy < BTN_SIZE * BTN_SIZE) {
      placeBomb(player.selectedBomb);
      continue;
    }

    var ddx2 = pos.x - tdetX, ddy2 = pos.y - tdetY;
    if (ddx2 * ddx2 + ddy2 * ddy2 < BTN_SIZE * BTN_SIZE) {
      detonateBombs();
      continue;
    }

    var tddx = pos.x - tdpadX, tddy = pos.y - tdpadY;
    if (tddx * tddx + tddy * tddy < DPAD_SIZE * DPAD_SIZE) {
      if (Math.abs(tddx) > Math.abs(tddy)) {
        inputDir = tddx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        inputDir = tddy > 0 ? DIR.DOWN : DIR.UP;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var touch = e.changedTouches[ti];
    var pos = getTouchPos(touch);
    var tdpadX = DPAD_MARGIN + DPAD_SIZE / 2;
    var tdpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
    var tddx = pos.x - tdpadX, tddy = pos.y - tdpadY;
    if (tddx * tddx + tddy * tddy < DPAD_SIZE * DPAD_SIZE * 2) {
      if (Math.abs(tddx) > Math.abs(tddy)) {
        inputDir = tddx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        inputDir = tddy > 0 ? DIR.DOWN : DIR.UP;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    inputDir = DIR.NONE;
  }
}, { passive: false });

// ============================================================
// KEYBOARD INPUT (NES-style responsive)
// ============================================================
var bombHeld = false;

window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;

  if (state === 'title') {
    // C opens the baseling picker on the title (in-game C cycles bombs instead).
    if (e.code === 'KeyC') {
      if (picking) return;
      picking = true;
      if (window.BaselingPlayer && BaselingPlayer.select) {
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      } else { picking = false; }
      return;
    }
    if ((e.code === 'KeyW') && window.NftLoader && !window.NftLoader.wallet && window.ethereum) {
      window.NftLoader.connectWallet().then(function(addr) {
        if (addr) window.NftLoader.checkNFTs().then(function(chars) {
          if (chars.length > 0) window.NftLoader.selectedCharacter = chars[0];
        });
      });
      return;
    }
    startGame(); return;
  }
  if (state === 'gameOver') {
    state = 'title';
    return;
  }

  // NES-style: immediate direction response
  if (e.code === 'ArrowUp' || e.code === 'KeyW') inputDir = DIR.UP;
  else if (e.code === 'ArrowRight' || e.code === 'KeyD') inputDir = DIR.RIGHT;
  else if (e.code === 'ArrowDown' || e.code === 'KeyS') inputDir = DIR.DOWN;
  else if (e.code === 'ArrowLeft' || e.code === 'KeyA') inputDir = DIR.LEFT;

  if (e.code === 'Space' || e.code === 'KeyX') {
    e.preventDefault();
    if (!bombHeld) {
      bombHeld = true;
      chargeTimer = 0;
      chargeReady = false;
      placeBomb(player.selectedBomb);
    }
  }

  if (e.code === 'KeyZ') {
    detonateBombs();
  }

  // C key: cycle bomb type
  if (e.code === 'KeyC') {
    if (level >= 3) {
      player.selectedBomb = (player.selectedBomb + 1) % 3;
    }
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;

  if (e.code === 'Space' || e.code === 'KeyX') {
    // On release, if charged enough and can mega, place mega bomb
    if (bombHeld && chargeReady && canMegaBomb()) {
      placeMegaBomb();
    }
    bombHeld = false;
    chargeTimer = 0;
    chargeReady = false;
  }

  if (keys['ArrowUp'] || keys['KeyW']) inputDir = DIR.UP;
  else if (keys['ArrowRight'] || keys['KeyD']) inputDir = DIR.RIGHT;
  else if (keys['ArrowDown'] || keys['KeyS']) inputDir = DIR.DOWN;
  else if (keys['ArrowLeft'] || keys['KeyA']) inputDir = DIR.LEFT;
  else inputDir = DIR.NONE;
});

// ============================================================
// KICK DETECTION
// ============================================================
function checkKick() {
  if (!player.hasKick) return;
  var dir = player.dir;
  var bx = player.x + DX[dir];
  var by = player.y + DY[dir];
  if (bx < 0 || bx >= COLS || by < 0 || by >= ROWS) return;
  if (grid[by][bx] === TILE_BOMB) {
    kickBomb(bx, by, dir);
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  recomputeStats();   // refresh from the current baseling pick (clamped getMults)
  state = 'playing';
  score = 0;
  lives = 3 + conLivesBonus();
  level = 1;
  // Boss intro for level 5
  if (level % 5 === 0) {
    state = 'bossIntro';
    stateTimer = 2;
    SFX.bossRoar();
  }
  initLevel();
}

function nextLevel() {
  var savedPower = {
    maxBombs: player.maxBombs,
    flameRange: player.flameRange,
    speed: player.speed,
    hasKick: player.hasKick,
    hasRemote: player.hasRemote,
    hasWallPass: player.hasWallPass,
    hasBombPass: player.hasBombPass,
    shieldActive: player.shieldActive,
    selectedBomb: player.selectedBomb
  };
  level++;
  initLevel();
  player.maxBombs = savedPower.maxBombs;
  player.flameRange = savedPower.flameRange;
  player.speed = savedPower.speed;
  player.hasKick = savedPower.hasKick;
  player.hasRemote = savedPower.hasRemote;
  player.hasWallPass = savedPower.hasWallPass;
  player.hasBombPass = savedPower.hasBombPass;
  player.shieldActive = savedPower.shieldActive;
  player.selectedBomb = savedPower.selectedBomb;

  if (level % 5 === 0) {
    state = 'bossIntro';
    stateTimer = 2;
    SFX.bossRoar();
  } else {
    state = 'playing';
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
var lastTime = 0;

function gameLoop(timestamp) {
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  frame++;   // animation clock for the baseling sprite

  updateShake(dt);

  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.fillStyle = C_BG;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'playing') {
    movePlayer(dt);
    checkKick();
    updateBombs(dt);
    updateExplosions(dt);
    updateGasClouds(dt);
    updateEnemies(dt);
    checkPowerups();
    updateParticles(dt);
    updateFlash(dt);

    // Charge mechanic
    if (bombHeld && canMegaBomb()) {
      chargeTimer += dt;
      if (chargeTimer >= 1.5 && !chargeReady) {
        chargeReady = true;
        SFX.chargeUp();
      }
    }

    drawGrid();
    drawGasClouds();
    drawPowerups();
    drawBombs();
    drawExplosions();
    drawEnemies();
    drawPlayer();
    drawParticles();
    drawFlash();
    drawHUD();
    drawTouchControls();

    // Bomb type indicator
    if (level >= 3) {
      var btNames = ['POOP', 'SPORE', 'FERTILIZER'];
      var btColors = ['#8B4E2A', '#38d973', '#FF8800'];
      ctx.fillStyle = btColors[player.selectedBomb];
      ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(btNames[player.selectedBomb], W - 5, HUD_H - 2);
    }
  } else if (state === 'dying') {
    stateTimer -= dt;
    updateParticles(dt);
    updateFlash(dt);
    updateExplosions(dt);

    drawGrid();
    drawGasClouds();
    drawPowerups();
    drawBombs();
    drawExplosions();
    drawEnemies();
    drawParticles();
    drawFlash();
    drawHUD();

    if (stateTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('bomberpoop_hi', String(highScore)); } catch(e) { /* storage full */ }
        }
        SFX.gameOver();
      } else {
        player.dead = false;
        player.x = 0;
        player.y = 0;
        player.px = 0;
        player.py = HUD_H;
        player.invincible = 2;
        state = 'playing';
      }
    }
  } else if (state === 'levelComplete') {
    stateTimer -= dt;
    updateParticles(dt);

    drawGrid();
    drawBombs();
    drawPlayer();
    drawParticles();
    drawHUD();
    drawLevelComplete();

    if (stateTimer <= 0) {
      nextLevel();
    }
  } else if (state === 'bossIntro') {
    stateTimer -= dt;
    drawGrid();
    drawEnemies();
    drawHUD();
    drawBossIntro();

    if (stateTimer <= 0) {
      state = 'playing';
    }
  } else if (state === 'gameOver') {
    drawGrid();
    drawHUD();
    drawGameOver();
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
