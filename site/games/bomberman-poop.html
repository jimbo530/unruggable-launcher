<script>
(function() {
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const COLS = 13, ROWS = 11, BASE_TILE = 40;
const TILE_EMPTY = 0, TILE_HARD = 1, TILE_SOFT = 2, TILE_BOMB = 3;
const TILE_GOO = 4, TILE_SPORE_WALL = 5;
const DIR = { NONE: -1, UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1], DY = [-1, 0, 1, 0];

// Power-up types
const PU_BOMB = 0, PU_FLAME = 1, PU_SPEED = 2, PU_KICK = 3;
const PU_REMOTE = 4, PU_WALLPASS = 5, PU_BOMBPASS = 6, PU_SHIELD = 7;
const PU_NAMES = ['POOP+', 'BLAST+', 'SPORES+', 'KICK', 'REMOTE', 'ROOTPASS', 'BOMBPASS', 'GARDEN SHIELD'];
const PU_COLORS = ['#f4b41b', '#FF8800', '#f4b41b', '#38d973', '#4488FF', '#a855f7', '#FF44AA', '#38d973'];

// Bomb types
const BOMB_NORMAL = 0, BOMB_SPORE = 1, BOMB_REACTOR = 2, BOMB_MEGA = 3;

// Enemy types - Baseling garden themed
const EN_REACTOR_BALLOON = 0, EN_SPORE_SLIME = 1, EN_MYCELIAL_BLOB = 2, EN_SPEEDSTER = 3, EN_BOSS = 4;

// World names - every 5 levels is a new world
const WORLDS = [
  { name: 'BACKYARD GARDEN',  bg1: '#1a1a0a', bg2: '#222210', floor1: '#2a2a1a', floor2: '#262616', hard: '#38d973', soft: '#7a444a', accent: '#88AA22' },
  { name: 'SPORE GREENHOUSE', bg1: '#0a1a1a', bg2: '#102222', floor1: '#1a2a2a', floor2: '#162626', hard: '#38d973', soft: '#7a444a', accent: '#22AAAA' },
  { name: 'COMPOST HEAP',     bg1: '#1a0a0a', bg2: '#221010', floor1: '#2a1a1a', floor2: '#261616', hard: '#38d973', soft: '#7a444a', accent: '#FF4422' },
  { name: 'MUSHROOM MAZE',    bg1: '#1a0a1a', bg2: '#221022', floor1: '#2a1a2a', floor2: '#261626', hard: '#38d973', soft: '#7a444a', accent: '#a855f7' },
  { name: 'POOP SUMMIT',      bg1: '#1a1410', bg2: '#221a14', floor1: '#2a2218', floor2: '#261e14', hard: '#38d973', soft: '#7a444a', accent: '#f4b41b' },
  { name: 'THE UNDERGROWTH',  bg1: '#0a1a0a', bg2: '#102210', floor1: '#1a2a1a', floor2: '#162616', hard: '#38d973', soft: '#7a444a', accent: '#44DD44' },
  { name: 'FERTILIZER PIT',   bg1: '#151510', bg2: '#1a1a12', floor1: '#252518', floor2: '#202014', hard: '#38d973', soft: '#7a444a', accent: '#CC8800' },
  { name: 'INFINITY BLOOM',   bg1: '#10101a', bg2: '#141422', floor1: '#1a1a2a', floor2: '#161626', hard: '#38d973', soft: '#7a444a', accent: '#4488FF' }
];

// Colors (defaults, overridden by world theme)
const C_BG = '#111';

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, TILE, SCALE, HUD_H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / (COLS * BASE_TILE), sh / ((ROWS + 2) * BASE_TILE));
  TILE = Math.floor(BASE_TILE * SCALE);
  HUD_H = TILE * 2;
  W = COLS * TILE;
  H = ROWS * TILE + HUD_H;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, Math.floor((sh - H) / 2)) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  placeBomb() { playTone(100, 0.15, 'triangle', 0.08, 60); playNoise(0.05, 0.04); },
  explode() { playNoise(0.3, 0.15); playTone(60, 0.25, 'sawtooth', 0.1, 30); },
  megaExplode() { playNoise(0.5, 0.2); playTone(40, 0.4, 'sawtooth', 0.15, 20); playTone(80, 0.3, 'square', 0.1, 30); },
  sporeBomb() { playNoise(0.2, 0.1); playTone(200, 0.3, 'sine', 0.08, 80); },
  reactorBomb() { playTone(150, 0.2, 'sawtooth', 0.12, 300); playNoise(0.25, 0.12); },
  die() { playTone(400, 0.4, 'sawtooth', 0.12, 60); setTimeout(function() { playTone(200, 0.3, 'square', 0.08, 40); }, 200); },
  killEnemy() { playTone(300, 0.15, 'square', 0.1, 600); playNoise(0.1, 0.08); },
  powerup() { playTone(440, 0.08, 'square', 0.08); setTimeout(function() { playTone(660, 0.08, 'square', 0.08); }, 80); setTimeout(function() { playTone(880, 0.12, 'square', 0.1); }, 160); },
  levelComplete() {
    var notes = [523, 659, 784, 1047];
    notes.forEach(function(n, i) { setTimeout(function() { playTone(n, 0.15, 'square', 0.08); }, i * 120); });
  },
  gameOver() {
    var notes = [440, 349, 293, 220];
    notes.forEach(function(n, i) { setTimeout(function() { playTone(n, 0.25, 'sawtooth', 0.1); }, i * 200); });
  },
  kick() { playTone(200, 0.1, 'square', 0.06, 400); },
  shield() { playTone(800, 0.2, 'sine', 0.06, 400); },
  chargeUp() { playTone(100, 0.6, 'triangle', 0.06, 600); },
  gooStep() { playTone(80, 0.08, 'sine', 0.04, 40); },
  bossRoar() { playNoise(0.4, 0.18); playTone(60, 0.5, 'sawtooth', 0.15, 30); }
};

// ============================================================
// PARTICLES
// ============================================================
let particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.5 + Math.random());
    particles.push({ x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, color: color, size: 2 + Math.random() * 3 });
  }
}
function spawnExplosionParticles(x, y, intensity) {
  var count = Math.floor(6 + intensity * 4);
  var colors = ['#FF4400', '#FF8800', '#FFDD00', '#FF2200', '#FFAA00'];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (1.5 + intensity) * (0.5 + Math.random());
    const c = colors[Math.floor(Math.random() * colors.length)];
    particles.push({ x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 0.6 + Math.random() * 0.4, color: c, size: 2 + Math.random() * 4 });
  }
}
function spawnSporeParticles(x, y) {
  var colors = ['#44AA22', '#66CC44', '#88DD66'];
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * 1.5;
    const c = colors[Math.floor(Math.random() * colors.length)];
    particles.push({ x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 0.5, life: 1.5, color: c, size: 3 + Math.random() * 3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.03 * dt * 60;
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), Math.floor(p.size), Math.floor(p.size));
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SCREEN FLASH + SHAKE
// ============================================================
let flashAlpha = 0, flashColor = '#fff';
let shakeX = 0, shakeY = 0, shakeIntensity = 0;

function flash(color) { flashColor = color || '#fff'; flashAlpha = 0.4; }
function shake(intensity) { shakeIntensity = Math.max(shakeIntensity, intensity || 4); }
function updateFlash(dt) { flashAlpha = Math.max(0, flashAlpha - dt * 3); }
function updateShake(dt) {
  if (shakeIntensity > 0) {
    shakeX = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    shakeY = Math.floor((Math.random() - 0.5) * shakeIntensity * 2);
    shakeIntensity = Math.max(0, shakeIntensity - dt * 20);
  } else {
    shakeX = 0;
    shakeY = 0;
  }
}
function drawFlash() {
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// STAT-B SYSTEM
// ============================================================
// STR -> fertilizer blast radius bonus
// DEX -> baseling move speed bonus
// CON -> HP/lives bonus
// INT -> score multiplier
// WIS -> poop bomb cooldown reduction
// CHA -> power-up drop rate bonus
// Stats come from BaselingPlayer.getMults() (ARCADE-STATS.md), the single clamped
// source. Bomberman's helpers below read 0-baseline "bonus" fields on statB, so we
// synthesize them from the five multipliers: bonus(mult) = round((mult-1)*20), giving
// neutral 0 at mult 1.0, ~+12 at the 1.6 ceiling, ~-4 at the 0.8 floor. Mapping:
//   STR<-damage (blast), DEX<-moveSpeed, CON<-health (lives), INT<-luck (score flavor),
//   WIS<-luck (cooldown flavor), CHA<-luck (drop rate). Single-player -> default band.
var statB = { str: 0, dex: 0, con: 0, int: 0, wis: 0, cha: 0 };
var picking = false;   // character-select overlay open
var frame = 0;         // global animation clock (incremented each game-loop tick)

function bonusFromMult(x) { return Math.round((x - 1) * 20); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults()
        : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = bonusFromMult(m.damage);
  statB.dex = bonusFromMult(m.moveSpeed);
  statB.con = bonusFromMult(m.health);
  statB.int = bonusFromMult(m.luck);
  statB.wis = bonusFromMult(m.luck);
  statB.cha = bonusFromMult(m.luck);
}
function loadStatB() { recomputeStats(); }  // kept for existing call sites
recomputeStats();
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[bomberman-poop] player init failed:', e && e.message); });
}

// Draw the selected baseling sprite at (cx,cy) center, size px. Returns true if a
// real sprite drew; false -> caller uses the procedural baseling.
function drawSelectedBaseling(c, cx, cy, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, cx, cy, size, opts || {});
}

// Title champion: name + 5 arcade stat bars (display) + [C] picker prompt.
function drawTitleChampion(cx, topY) {
  if (!window.BaselingPlayer) return;
  var sel = BaselingPlayer.getSelected();
  var nm = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold ' + Math.floor(TILE * 0.42) + 'px monospace';
  ctx.fillText(nm, cx, topY);

  if (BaselingPlayer.getStats) {
    var stats = BaselingPlayer.getStats();
    var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
    var totalW = Math.min(240, W * 0.62), bw = totalW / keys.length, x0 = cx - totalW / 2;
    var barY = topY + Math.floor(TILE * 0.3);
    ctx.font = '9px monospace';
    for (var i = 0; i < keys.length; i++) {
      var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
      ctx.fillStyle = mm.color; ctx.textAlign = 'center';
      ctx.fillText(mm.label, bx + bw / 2, barY);
      ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, barY + 4, bw - 6, 5);
      ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, barY + 4, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
    }
  }

  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold ' + Math.floor(TILE * 0.34) + 'px monospace';
  ctx.fillText('[C] SELECT BASELING', cx, topY + Math.floor(TILE * 0.7));
}

// Derived stat helpers (unchanged formulas; statB is now synthesized from getMults)
function strBlastBonus() { return Math.floor(statB.str / 5); }
function dexSpeedBonus() { return statB.dex * 0.02; }
function conLivesBonus() { return Math.max(0, Math.floor(statB.con / 4)); } // STA buys a cushion; never removes lives
function intScoreMult() { return 1 + statB.int * 0.03; }
function wisCooldownMult() { return Math.max(0.4, 1 - statB.wis * 0.03); }
function chaDropBonus() { return statB.cha * 0.02; }
function canMegaBomb() { return statB.str >= 4; }  // ~mult 1.2+ on PWR unlocks mega bomb

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let grid = [];
let player = {};
let enemies = [];
let bombs = [];
let explosions = [];
let powerups = [];
let gasClouds = [];
let score = 0, highScore = 0, lives = 3, level = 1;
let stateTimer = 0;
let inputDir = DIR.NONE;
let inputBomb = false, inputDetonate = false;
let keys = {};
let chargeTimer = 0;
let chargeReady = false;

try { highScore = parseInt(localStorage.getItem('bomberpoop_hi') || '0', 10); } catch(e) { highScore = 0; }

function getWorld() {
  var idx = Math.floor((level - 1) / 5) % WORLDS.length;
  return WORLDS[idx];
}

// ============================================================
// LEVEL GENERATION
// ============================================================
function initLevel() {
  grid = [];
  bombs = [];
  explosions = [];
  powerups = [];
  particles = [];
  enemies = [];
  gasClouds = [];
  chargeTimer = 0;
  chargeReady = false;

  for (let y = 0; y < ROWS; y++) {
    grid[y] = [];
    for (let x = 0; x < COLS; x++) {
      if (x % 2 === 0 && y % 2 === 0 && x > 0 && y > 0 && x < COLS - 1 && y < ROWS - 1) {
        grid[y][x] = TILE_HARD;
      } else {
        grid[y][x] = TILE_EMPTY;
      }
    }
  }

  // Place soft blocks
  var density = Math.min(0.75, 0.4 + level * 0.02);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x] !== TILE_EMPTY) continue;
      if ((x === 0 && y === 0) || (x === 1 && y === 0) || (x === 0 && y === 1)) continue;
      if ((x === COLS - 1 && y === ROWS - 1) || (x === COLS - 2 && y === ROWS - 1) || (x === COLS - 1 && y === ROWS - 2)) continue;
      if (Math.random() < density) {
        grid[y][x] = TILE_SOFT;
      }
    }
  }

  // Place goo blocks (hazard - slows player) starting level 3
  if (level >= 3) {
    var gooCount = Math.min(6, Math.floor((level - 2) * 0.8));
    var emptyTiles = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] === TILE_EMPTY && !(x < 2 && y < 2)) emptyTiles.push({ x: x, y: y });
      }
    }
    shuffle(emptyTiles);
    for (let i = 0; i < Math.min(gooCount, emptyTiles.length); i++) {
      grid[emptyTiles[i].y][emptyTiles[i].x] = TILE_GOO;
    }
  }

  // Place spore walls (hazard - destructible, releases spores on break) starting level 6
  if (level >= 6) {
    var sporeCount = Math.min(5, Math.floor((level - 5) * 0.6));
    var softTilesForSpore = [];
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] === TILE_SOFT && Math.random() < 0.3) softTilesForSpore.push({ x: x, y: y });
      }
    }
    shuffle(softTilesForSpore);
    for (let i = 0; i < Math.min(sporeCount, softTilesForSpore.length); i++) {
      grid[softTilesForSpore[i].y][softTilesForSpore[i].x] = TILE_SPORE_WALL;
    }
  }

  // Place power-ups hidden under soft/spore blocks
  var baseDropRate = 0.35 + chaDropBonus();
  var puCount = Math.min(10, Math.floor(3 + level / 2 + statB.cha * 0.3));
  var softTiles = [];
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x] === TILE_SOFT || grid[y][x] === TILE_SPORE_WALL) softTiles.push({ x: x, y: y });
    }
  }
  shuffle(softTiles);
  for (let i = 0; i < Math.min(puCount, softTiles.length); i++) {
    var t = softTiles[i];
    var type;
    var r = Math.random();
    if (r < 0.25) type = PU_BOMB;
    else if (r < 0.50) type = PU_FLAME;
    else if (r < 0.65) type = PU_SPEED;
    else if (r < 0.75) type = PU_KICK;
    else if (r < 0.82) type = PU_REMOTE;
    else if (r < 0.88) type = PU_WALLPASS;
    else if (r < 0.94) type = PU_BOMBPASS;
    else type = PU_SHIELD;
    powerups.push({ x: t.x, y: t.y, type: type, revealed: false });
  }

  // Place enemies - Baseling garden themed
  var isBoss = level % 5 === 0;
  var enemyCount;
  if (isBoss) {
    enemyCount = 1 + Math.floor(level / 10);
  } else {
    enemyCount = Math.min(12, 2 + Math.floor(level * 0.8));
  }

  var enemySpots = [];
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (x < 3 && y < 3) continue;
      if (grid[y][x] === TILE_EMPTY || grid[y][x] === TILE_GOO) enemySpots.push({ x: x, y: y });
    }
  }
  shuffle(enemySpots);

  for (let i = 0; i < Math.min(enemyCount, enemySpots.length); i++) {
    var spot = enemySpots[i];
    var etype;
    if (isBoss && i === 0) {
      etype = EN_BOSS;
    } else {
      var er = Math.random();
      var blobChance = Math.min(0.2, level * 0.02);
      var slimeChance = Math.min(0.4, 0.1 + level * 0.03);
      var speedChance = Math.min(0.2, level * 0.015);
      if (er < blobChance) etype = EN_MYCELIAL_BLOB;
      else if (er < blobChance + speedChance) etype = EN_SPEEDSTER;
      else if (er < blobChance + speedChance + slimeChance) etype = EN_SPORE_SLIME;
      else etype = EN_REACTOR_BALLOON;
    }
    enemies.push(createEnemy(spot.x, spot.y, etype));
  }

  // Init player
  var baseBombTimer = 3.0 * wisCooldownMult();
  player = {
    x: 0, y: 0,
    px: 0, py: HUD_H,
    moving: false,
    dir: DIR.DOWN,
    maxBombs: 1,
    flameRange: 1 + strBlastBonus(),
    speed: 1 + dexSpeedBonus(),
    hasKick: false,
    hasRemote: false,
    hasWallPass: false,
    hasBombPass: false,
    shieldActive: false,
    dead: false,
    invincible: 2,
    animFrame: 0,
    bombTimer: baseBombTimer,
    selectedBomb: BOMB_NORMAL,
    inGoo: false
  };
}

function createEnemy(x, y, type) {
  var speed = 0.6 + level * 0.02;
  var hp = 1;
  if (type === EN_SPEEDSTER) speed *= 1.8;
  if (type === EN_SPORE_SLIME) speed *= 1.1;
  if (type === EN_MYCELIAL_BLOB) { speed *= 0.8; hp = 2; }
  if (type === EN_BOSS) { speed *= 0.7; hp = 3 + Math.floor(level / 5); }
  return {
    x: x, y: y,
    px: x * TILE, py: y * TILE + HUD_H,
    type: type,
    dir: Math.floor(Math.random() * 4),
    speed: Math.min(speed, 2.5),
    hp: hp,
    dead: false,
    moveTimer: 0,
    turnTimer: 0,
    animFrame: 0,
    stuckTimer: 0,
    lastX: x, lastY: y,
    flashTimer: 0
  };
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
}

// ============================================================
// PLAYER MOVEMENT
// ============================================================
function movePlayer(dt) {
  if (player.dead) return;
  if (player.invincible > 0) player.invincible -= dt;
  player.animFrame += dt * 8;

  // Check if in goo
  player.inGoo = (player.y >= 0 && player.y < ROWS && player.x >= 0 && player.x < COLS &&
    grid[player.y][player.x] === TILE_GOO);

  if (inputDir === DIR.NONE) return;

  player.dir = inputDir;
  var gooMult = player.inGoo ? 0.5 : 1;
  var speed = player.speed * 3.5 * TILE * dt * gooMult;
  var nx = player.px;
  var ny = player.py;

  if (inputDir === DIR.UP) ny -= speed;
  else if (inputDir === DIR.DOWN) ny += speed;
  else if (inputDir === DIR.LEFT) nx -= speed;
  else if (inputDir === DIR.RIGHT) nx += speed;

  var margin = TILE * 0.15;
  var canMove = true;

  var corners = getCorners(nx, ny, margin);
  for (var ci = 0; ci < corners.length; ci++) {
    var c = corners[ci];
    if (c.gx < 0 || c.gx >= COLS || c.gy < 0 || c.gy >= ROWS) { canMove = false; break; }
    var tile = grid[c.gy][c.gx];
    if (tile === TILE_HARD) { canMove = false; break; }
    if ((tile === TILE_SOFT || tile === TILE_SPORE_WALL) && !player.hasWallPass) { canMove = false; break; }
    if (tile === TILE_BOMB && !player.hasBombPass) {
      var pgx = Math.floor((player.px + TILE / 2) / TILE);
      var pgy = Math.floor((player.py - HUD_H + TILE / 2) / TILE);
      if (c.gx !== pgx || c.gy !== pgy) { canMove = false; break; }
    }
  }

  if (canMove) {
    player.px = nx;
    player.py = ny;
    player.x = Math.floor((player.px + TILE / 2) / TILE);
    player.y = Math.floor((player.py - HUD_H + TILE / 2) / TILE);
    if (player.inGoo && Math.random() < 0.1) SFX.gooStep();
  } else {
    slidePlayer(dt, speed, margin);
  }
}

function getCorners(px, py, margin) {
  var left = px + margin;
  var right = px + TILE - margin;
  var top = py - HUD_H + margin;
  var bottom = py - HUD_H + TILE - margin;
  return [
    { gx: Math.floor(left / TILE), gy: Math.floor(top / TILE) },
    { gx: Math.floor(right / TILE), gy: Math.floor(top / TILE) },
    { gx: Math.floor(left / TILE), gy: Math.floor(bottom / TILE) },
    { gx: Math.floor(right / TILE), gy: Math.floor(bottom / TILE) }
  ];
}

function slidePlayer(dt, speed, margin) {
  if (inputDir === DIR.UP || inputDir === DIR.DOWN) {
    var centerX = player.px + TILE / 2;
    var gridCenterX = Math.floor(centerX / TILE) * TILE + TILE / 2;
    var diff = gridCenterX - centerX;
    if (Math.abs(diff) > 2) {
      player.px += Math.sign(diff) * Math.min(speed * 0.5, Math.abs(diff));
    }
  } else {
    var centerY = player.py - HUD_H + TILE / 2;
    var gridCenterY = Math.floor(centerY / TILE) * TILE + TILE / 2;
    var diff2 = gridCenterY - centerY;
    if (Math.abs(diff2) > 2) {
      player.py += Math.sign(diff2) * Math.min(speed * 0.5, Math.abs(diff2));
    }
  }
}

function isWalkable(gx, gy, forGhost) {
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return false;
  if (forGhost) return grid[gy][gx] !== TILE_HARD;
  var tile = grid[gy][gx];
  return tile === TILE_EMPTY || tile === TILE_GOO;
}

// ============================================================
// FERTILIZER CLOUDS (Spore Bomb)
// ============================================================
function addGasCloud(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;
  if (grid[y][x] === TILE_HARD) return;
  var existing = gasClouds.find(function(g) { return g.x === x && g.y === y; });
  if (existing) { existing.timer = 4; return; }
  gasClouds.push({ x: x, y: y, timer: 4 });
}

function updateGasClouds(dt) {
  for (var i = gasClouds.length - 1; i >= 0; i--) {
    gasClouds[i].timer -= dt;
    if (gasClouds[i].timer <= 0) {
      gasClouds.splice(i, 1);
      continue;
    }
    // Damage player in gas
    if (!player.dead && player.x === gasClouds[i].x && player.y === gasClouds[i].y) {
      playerHit();
    }
    // Damage enemies in gas
    for (var j = 0; j < enemies.length; j++) {
      var e = enemies[j];
      if (!e.dead && e.x === gasClouds[i].x && e.y === gasClouds[i].y) {
        hitEnemy(e);
      }
    }
  }
}

// ============================================================
// BOMB MECHANICS
// ============================================================
function placeBomb(bombType) {
  if (player.dead) return;
  var activeBombs = bombs.filter(function(b) { return b.owner === 'player'; });
  if (activeBombs.length >= player.maxBombs) return;
  var gx = player.x;
  var gy = player.y;
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;
  if (grid[gy][gx] === TILE_BOMB) return;

  var bt = bombType || BOMB_NORMAL;
  grid[gy][gx] = TILE_BOMB;
  var timer = player.bombTimer;
  bombs.push({
    x: gx, y: gy,
    timer: timer,
    range: player.flameRange,
    owner: 'player',
    moving: false,
    moveDir: DIR.NONE,
    moveProgress: 0,
    bombType: bt
  });
  if (bt === BOMB_SPORE) SFX.sporeBomb();
  else if (bt === BOMB_REACTOR) SFX.reactorBomb();
  else SFX.placeBomb();
}

function placeMegaBomb() {
  if (!canMegaBomb()) return;
  if (player.dead) return;
  var activeBombs = bombs.filter(function(b) { return b.owner === 'player'; });
  if (activeBombs.length >= player.maxBombs) return;
  var gx = player.x;
  var gy = player.y;
  if (gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return;
  if (grid[gy][gx] === TILE_BOMB) return;

  grid[gy][gx] = TILE_BOMB;
  bombs.push({
    x: gx, y: gy,
    timer: player.bombTimer * 0.8,
    range: player.flameRange + 2 + Math.floor(statB.str / 3),
    owner: 'player',
    moving: false,
    moveDir: DIR.NONE,
    moveProgress: 0,
    bombType: BOMB_MEGA
  });
  SFX.megaExplode();
}

function detonateBombs() {
  if (!player.hasRemote) return;
  var playerBombs = bombs.filter(function(b) { return b.owner === 'player'; });
  if (playerBombs.length > 0) {
    playerBombs[0].timer = 0;
  }
}

function updateBombs(dt) {
  for (var i = bombs.length - 1; i >= 0; i--) {
    var b = bombs[i];

    if (b.moving) {
      var speed = 5 * TILE * dt;
      var dx = DX[b.moveDir];
      var dy = DY[b.moveDir];
      b.moveProgress += speed;

      if (b.moveProgress >= TILE) {
        var bnx = b.x + dx;
        var bny = b.y + dy;
        var bnnx = bnx + dx;
        var bnny = bny + dy;
        grid[b.y][b.x] = TILE_EMPTY;
        b.x = bnx;
        b.y = bny;
        b.moveProgress = 0;

        if (bnnx < 0 || bnnx >= COLS || bnny < 0 || bnny >= ROWS || (grid[bnny][bnnx] !== TILE_EMPTY && grid[bnny][bnnx] !== TILE_GOO)) {
          b.moving = false;
          grid[bny][bnx] = TILE_BOMB;
        } else {
          grid[bny][bnx] = TILE_BOMB;
        }
      }
    }

    b.timer -= dt;
    if (b.timer <= 0) {
      explodeBomb(i);
    }
  }
}

function explodeBomb(index) {
  var b = bombs[index];
  grid[b.y][b.x] = TILE_EMPTY;
  bombs.splice(index, 1);

  if (b.bombType === BOMB_SPORE) {
    // Spore bomb: smaller explosion + fertilizer cloud
    addExplosion(b.x, b.y);
    SFX.sporeBomb();
    flash('#44AA22');
    shake(3);
    spawnSporeParticles(b.x * TILE + TILE / 2, b.y * TILE + HUD_H + TILE / 2);
    for (var dir = 0; dir < 4; dir++) {
      for (var dist = 0; dist <= b.range; dist++) {
        addGasCloud(b.x + DX[dir] * dist, b.y + DY[dir] * dist);
      }
    }
    addGasCloud(b.x, b.y);
  } else if (b.bombType === BOMB_REACTOR) {
    // Fertilizer bomb: chain reaction - triggers all bombs in range
    addExplosion(b.x, b.y);
    SFX.reactorBomb();
    flash('#FF4400');
    shake(5);
    spawnExplosionParticles(b.x * TILE + TILE / 2, b.y * TILE + HUD_H + TILE / 2, 2);
    for (var rdir = 0; rdir < 4; rdir++) {
      for (var rdist = 1; rdist <= b.range + 1; rdist++) {
        var rex = b.x + DX[rdir] * rdist;
        var rey = b.y + DY[rdir] * rdist;
        if (rex < 0 || rex >= COLS || rey < 0 || rey >= ROWS) break;
        var rtile = grid[rey][rex];
        if (rtile === TILE_HARD) break;
        if (rtile === TILE_SOFT || rtile === TILE_SPORE_WALL) {
          destroyBlock(rex, rey);
          addExplosion(rex, rey);
          break;
        }
        if (rtile === TILE_BOMB) {
          var chainIdx = bombs.findIndex(function(bb) { return bb.x === rex && bb.y === rey; });
          if (chainIdx >= 0) bombs[chainIdx].timer = 0;
          break;
        }
        addExplosion(rex, rey);
      }
    }
  } else if (b.bombType === BOMB_MEGA) {
    // Mega poop: huge range, screen shake
    SFX.megaExplode();
    flash('#FFDD00');
    shake(10);
    addExplosion(b.x, b.y);
    spawnExplosionParticles(b.x * TILE + TILE / 2, b.y * TILE + HUD_H + TILE / 2, 4);
    for (var mdir = 0; mdir < 4; mdir++) {
      for (var mdist = 1; mdist <= b.range; mdist++) {
        var mex = b.x + DX[mdir] * mdist;
        var mey = b.y + DY[mdir] * mdist;
        if (mex < 0 || mex >= COLS || mey < 0 || mey >= ROWS) break;
        var mtile = grid[mey][mex];
        if (mtile === TILE_HARD) break;
        if (mtile === TILE_SOFT || mtile === TILE_SPORE_WALL) {
          destroyBlock(mex, mey);
          addExplosion(mex, mey);
          break;
        }
        if (mtile === TILE_BOMB) {
          var mchainIdx = bombs.findIndex(function(bb) { return bb.x === mex && bb.y === mey; });
          if (mchainIdx >= 0) bombs[mchainIdx].timer = 0;
          break;
        }
        addExplosion(mex, mey);
        spawnExplosionParticles(mex * TILE + TILE / 2, mey * TILE + HUD_H + TILE / 2, 1.5);
      }
    }
  } else {
    // Normal bomb
    addExplosion(b.x, b.y);
    SFX.explode();
    flash('#FF6600');
    shake(4);
    spawnExplosionParticles(b.x * TILE + TILE / 2, b.y * TILE + HUD_H + TILE / 2, 1);
    for (var ndir = 0; ndir < 4; ndir++) {
      for (var ndist = 1; ndist <= b.range; ndist++) {
        var nex = b.x + DX[ndir] * ndist;
        var ney = b.y + DY[ndir] * ndist;
        if (nex < 0 || nex >= COLS || ney < 0 || ney >= ROWS) break;
        var ntile = grid[ney][nex];
        if (ntile === TILE_HARD) break;
        if (ntile === TILE_SOFT || ntile === TILE_SPORE_WALL) {
          destroyBlock(nex, ney);
          addExplosion(nex, ney);
          break;
        }
        if (ntile === TILE_BOMB) {
          var nchainIdx = bombs.findIndex(function(bb) { return bb.x === nex && bb.y === ney; });
          if (nchainIdx >= 0) bombs[nchainIdx].timer = 0;
          break;
        }
        addExplosion(nex, ney);
      }
    }
  }
}

function destroyBlock(ex, ey) {
  var wasSporWall = grid[ey][ex] === TILE_SPORE_WALL;
  grid[ey][ex] = TILE_EMPTY;
  var w = getWorld();
  spawnParticles(ex * TILE + TILE / 2, ey * TILE + HUD_H + TILE / 2, w.soft, 8, 2);
  // Reveal power-up
  var pu = powerups.find(function(p) { return p.x === ex && p.y === ey && !p.revealed; });
  if (pu) pu.revealed = true;
  // Spore walls release gas on break
  if (wasSporWall) {
    addGasCloud(ex, ey);
    for (var sd = 0; sd < 4; sd++) {
      addGasCloud(ex + DX[sd], ey + DY[sd]);
    }
    spawnSporeParticles(ex * TILE + TILE / 2, ey * TILE + HUD_H + TILE / 2);
  }
}

function addExplosion(x, y) {
  explosions.push({ x: x, y: y, timer: 0.5 });
  if (!player.dead && player.x === x && player.y === y) {
    playerHit();
  }
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.dead && e.x === x && e.y === y) {
      hitEnemy(e);
    }
  }
}

function updateExplosions(dt) {
  for (var i = explosions.length - 1; i >= 0; i--) {
    explosions[i].timer -= dt;
    if (explosions[i].timer <= 0) {
      explosions.splice(i, 1);
    }
  }
  if (!player.dead) {
    for (var j = 0; j < explosions.length; j++) {
      var ex = explosions[j];
      if (player.x === ex.x && player.y === ex.y) {
        playerHit();
      }
    }
  }
}

function kickBomb(bx, by, dir) {
  var bomb = bombs.find(function(b) { return b.x === bx && b.y === by && !b.moving; });
  if (!bomb) return;
  var bnx = bx + DX[dir];
  var bny = by + DY[dir];
  if (bnx < 0 || bnx >= COLS || bny < 0 || bny >= ROWS) return;
  if (grid[bny][bnx] !== TILE_EMPTY && grid[bny][bnx] !== TILE_GOO) return;
  bomb.moving = true;
  bomb.moveDir = dir;
  bomb.moveProgress = 0;
  SFX.kick();
}

// ============================================================
// PLAYER HIT / DEATH
// ============================================================
function playerHit() {
  if (player.dead) return;
  if (player.invincible > 0) return;
  if (player.shieldActive) {
    player.shieldActive = false;
    player.invincible = 1.5;
    SFX.shield();
    flash('#44FFFF');
    return;
  }
  player.dead = true;
  SFX.die();
  flash('#f00');
  shake(6);
  spawnParticles(player.px + TILE / 2, player.py + TILE / 2, '#FFD700', 20, 3);
  lives--;
  state = 'dying';
  stateTimer = 2;
}

// ============================================================
// ENEMIES
// ============================================================
function hitEnemy(e) {
  e.hp--;
  e.flashTimer = 0.2;
  if (e.hp <= 0) {
    e.dead = true;
    var basePts;
    if (e.type === EN_BOSS) basePts = 1000;
    else if (e.type === EN_MYCELIAL_BLOB) basePts = 400;
    else if (e.type === EN_SPEEDSTER) basePts = 300;
    else if (e.type === EN_SPORE_SLIME) basePts = 200;
    else basePts = 100;
    var pts = Math.floor(basePts * (1 + (level - 1) * 0.1) * intScoreMult());
    score += pts;
    SFX.killEnemy();
    spawnParticles(e.px + TILE / 2, e.py + TILE / 2, getEnemyColor(e.type), 15, 3);

    // Mushroom Walker splits into 2 fungal creepers on death
    if (e.type === EN_MYCELIAL_BLOB) {
      for (var si = 0; si < 2; si++) {
        var sd = Math.floor(Math.random() * 4);
        var sx = e.x + DX[sd];
        var sy = e.y + DY[sd];
        if (isWalkable(sx, sy, false)) {
          var child = createEnemy(sx, sy, EN_SPORE_SLIME);
          child.speed *= 1.2;
          enemies.push(child);
        }
      }
    }

    if (enemies.filter(function(en) { return !en.dead; }).length === 0) {
      state = 'levelComplete';
      stateTimer = 2.5;
      SFX.levelComplete();
      score += Math.floor(level * 200 * intScoreMult());
    }
  } else {
    flash('#FF8800');
    spawnParticles(e.px + TILE / 2, e.py + TILE / 2, '#FF4444', 5, 1);
  }
}

function getEnemyColor(type) {
  if (type === EN_REACTOR_BALLOON) return '#FF6644';
  if (type === EN_SPORE_SLIME) return '#44CC44';
  if (type === EN_MYCELIAL_BLOB) return '#AA44FF';
  if (type === EN_SPEEDSTER) return '#FFDD00';
  if (type === EN_BOSS) return '#FF2200';
  return '#888';
}

function getEnemyName(type) {
  if (type === EN_REACTOR_BALLOON) return 'Spore Balloon';
  if (type === EN_SPORE_SLIME) return 'Fungal Creeper';
  if (type === EN_MYCELIAL_BLOB) return 'Mushroom Walker';
  if (type === EN_SPEEDSTER) return 'Dash Spore';
  if (type === EN_BOSS) return 'GARDEN BOSS';
  return 'Enemy';
}

function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.dead) continue;
    e.animFrame += dt * 6;
    e.moveTimer += dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    var moveInterval = 1.0 / e.speed;
    if (e.moveTimer < moveInterval) continue;
    e.moveTimer = 0;

    var dir = e.dir;
    e.turnTimer += 1;

    if (e.type === EN_REACTOR_BALLOON) {
      // Spore Balloon: wanders randomly, pops on death
      if (e.turnTimer > 2 + Math.floor(Math.random() * 4) || e.stuckTimer > 1) {
        dir = Math.floor(Math.random() * 4);
        e.turnTimer = 0;
        e.stuckTimer = 0;
      }
    } else if (e.type === EN_SPORE_SLIME) {
      // Fungal Creeper: chases player
      var sdx = player.x - e.x;
      var sdy = player.y - e.y;
      if (Math.abs(sdx) > Math.abs(sdy)) {
        dir = sdx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else if (sdy !== 0) {
        dir = sdy > 0 ? DIR.DOWN : DIR.UP;
      }
      var snx = e.x + DX[dir];
      var sny = e.y + DY[dir];
      if (!isWalkable(snx, sny, false)) {
        var salts = [0, 1, 2, 3].filter(function(d) { return d !== dir; });
        shuffle(salts);
        for (var ai = 0; ai < salts.length; ai++) {
          var sax = e.x + DX[salts[ai]];
          var say = e.y + DY[salts[ai]];
          if (isWalkable(sax, say, false)) { dir = salts[ai]; break; }
        }
      }
    } else if (e.type === EN_MYCELIAL_BLOB) {
      // Mushroom Walker: phases through fungal walls toward player
      var bdx = player.x - e.x;
      var bdy = player.y - e.y;
      if (Math.random() < 0.7) {
        if (Math.abs(bdx) > Math.abs(bdy)) {
          dir = bdx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else if (bdy !== 0) {
          dir = bdy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else {
        dir = Math.floor(Math.random() * 4);
      }
    } else if (e.type === EN_SPEEDSTER) {
      if (Math.random() < 0.4) {
        dir = Math.floor(Math.random() * 4);
      }
    } else if (e.type === EN_BOSS) {
      var bossdx = player.x - e.x;
      var bossdy = player.y - e.y;
      if (Math.random() < 0.6) {
        if (Math.abs(bossdx) > Math.abs(bossdy)) {
          dir = bossdx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else if (bossdy !== 0) {
          dir = bossdy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else {
        dir = Math.floor(Math.random() * 4);
      }
    }

    var enx = e.x + DX[dir];
    var eny = e.y + DY[dir];
    var canWalk = e.type === EN_MYCELIAL_BLOB ? isWalkable(enx, eny, true) : isWalkable(enx, eny, false);

    if (canWalk && !hasBombAt(enx, eny)) {
      e.lastX = e.x;
      e.lastY = e.y;
      e.x = enx;
      e.y = eny;
      e.px = enx * TILE;
      e.py = eny * TILE + HUD_H;
      e.dir = dir;
      e.stuckTimer = 0;
    } else {
      e.stuckTimer++;
      if (e.stuckTimer > 2) {
        e.dir = Math.floor(Math.random() * 4);
        e.stuckTimer = 0;
      }
    }

    if (!player.dead && e.x === player.x && e.y === player.y) {
      playerHit();
    }

    for (var exi = 0; exi < explosions.length; exi++) {
      var expl = explosions[exi];
      if (e.x === expl.x && e.y === expl.y) {
        hitEnemy(e);
        break;
      }
    }
  }
}

function hasBombAt(x, y) {
  return grid[y][x] === TILE_BOMB;
}

// ============================================================
// POWER-UP PICKUP
// ============================================================
function checkPowerups() {
  for (var i = powerups.length - 1; i >= 0; i--) {
    var pu = powerups[i];
    if (!pu.revealed) continue;
    if (player.x === pu.x && player.y === pu.y) {
      applyPowerup(pu.type);
      powerups.splice(i, 1);
      SFX.powerup();
    }
  }
}

function applyPowerup(type) {
  switch (type) {
    case PU_BOMB: player.maxBombs = Math.min(8, player.maxBombs + 1); break;
    case PU_FLAME: player.flameRange = Math.min(8, player.flameRange + 1); break;
    case PU_SPEED: player.speed = Math.min(2.5, player.speed + 0.25); break;
    case PU_KICK: player.hasKick = true; break;
    case PU_REMOTE: player.hasRemote = true; break;
    case PU_WALLPASS: player.hasWallPass = true; break;
    case PU_BOMBPASS: player.hasBombPass = true; break;
    case PU_SHIELD: player.shieldActive = true; break;
  }
}

// ============================================================
// DRAWING - GRID (garden themed per world)
// ============================================================
function drawGrid() {
  var w = getWorld();

  ctx.fillStyle = w.floor1;
  ctx.fillRect(0, HUD_H, W, ROWS * TILE);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      var px = x * TILE, py = y * TILE + HUD_H;
      var tile = grid[y][x];

      if (tile === TILE_EMPTY) {
        ctx.fillStyle = (x + y) % 2 === 0 ? w.floor1 : w.floor2;
        ctx.fillRect(px, py, TILE, TILE);
        // Subtle floor detail
        if ((x + y * 3) % 7 === 0) {
          ctx.fillStyle = w.accent;
          ctx.globalAlpha = 0.05;
          ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
          ctx.globalAlpha = 1;
        }
      } else if (tile === TILE_HARD) {
        // Indestructible garden hedge
        ctx.fillStyle = w.hard;
        ctx.fillRect(px, py, TILE, TILE);
        var hl = lighten(w.hard, 30);
        var sh = darken(w.hard, 30);
        ctx.fillStyle = hl;
        ctx.fillRect(px, py, TILE, 3);
        ctx.fillRect(px, py, 3, TILE);
        ctx.fillStyle = sh;
        ctx.fillRect(px + TILE - 3, py, 3, TILE);
        ctx.fillRect(px, py + TILE - 3, TILE, 3);
        ctx.fillStyle = sh;
        ctx.fillRect(px + TILE / 2 - 1, py + 4, 2, TILE - 8);
        ctx.fillRect(px + 4, py + TILE / 2 - 1, TILE - 8, 2);
      } else if (tile === TILE_SOFT) {
        ctx.fillStyle = w.soft;
        ctx.fillRect(px, py, TILE, TILE);
        var shl = lighten(w.soft, 20);
        var ssh = darken(w.soft, 30);
        ctx.fillStyle = shl;
        ctx.fillRect(px, py, TILE, 2);
        ctx.fillRect(px, py, 2, TILE);
        ctx.fillStyle = ssh;
        ctx.fillRect(px + TILE - 2, py, 2, TILE);
        ctx.fillRect(px, py + TILE - 2, TILE, 2);
        ctx.fillStyle = ssh;
        ctx.fillRect(px, py + Math.floor(TILE / 3), TILE, 1);
        ctx.fillRect(px, py + Math.floor(TILE * 2 / 3), TILE, 1);
        ctx.fillRect(px + Math.floor(TILE / 2), py, 1, Math.floor(TILE / 3));
        ctx.fillRect(px + Math.floor(TILE / 4), py + Math.floor(TILE / 3), 1, Math.floor(TILE / 3));
        ctx.fillRect(px + Math.floor(TILE * 3 / 4), py + Math.floor(TILE / 3), 1, Math.floor(TILE / 3));
        ctx.fillRect(px + Math.floor(TILE / 2), py + Math.floor(TILE * 2 / 3), 1, Math.floor(TILE / 3));
      } else if (tile === TILE_BOMB) {
        ctx.fillStyle = (x + y) % 2 === 0 ? w.floor1 : w.floor2;
        ctx.fillRect(px, py, TILE, TILE);
      } else if (tile === TILE_GOO) {
        // Compost puddle - slows movement
        ctx.fillStyle = (x + y) % 2 === 0 ? w.floor1 : w.floor2;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#335522';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(px + 2, py + 2, TILE - 4, TILE - 4);
        // Bubbling effect
        var bubbleT = (Date.now() * 0.002 + x * 3 + y * 7) % (Math.PI * 2);
        ctx.fillStyle = '#44AA22';
        ctx.globalAlpha = 0.4 + Math.sin(bubbleT) * 0.2;
        ctx.beginPath();
        ctx.arc(px + TILE * 0.3, py + TILE * 0.4 + Math.sin(bubbleT) * 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px + TILE * 0.7, py + TILE * 0.6 + Math.sin(bubbleT + 1) * 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (tile === TILE_SPORE_WALL) {
        // Fungal wall - pulsing spore cluster
        ctx.fillStyle = '#4A2A5A';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#6A3A7A';
        ctx.fillRect(px, py, TILE, 2);
        ctx.fillRect(px, py, 2, TILE);
        ctx.fillStyle = '#3A1A4A';
        ctx.fillRect(px + TILE - 2, py, 2, TILE);
        ctx.fillRect(px, py + TILE - 2, TILE, 2);
        // Spore dots
        var spT = (Date.now() * 0.003 + x + y) % (Math.PI * 2);
        ctx.fillStyle = '#88DD66';
        ctx.globalAlpha = 0.4 + Math.sin(spT) * 0.3;
        for (var si = 0; si < 3; si++) {
          var spx = px + 5 + ((si * 37 + x * 13) % (TILE - 10));
          var spy = py + 5 + ((si * 23 + y * 17) % (TILE - 10));
          ctx.beginPath();
          ctx.arc(spx, spy, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }
  }
}

// Color helpers
function lighten(hex, amt) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}
function darken(hex, amt) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ============================================================
// DRAWING - FERTILIZER CLOUDS
// ============================================================
function drawGasClouds() {
  for (var i = 0; i < gasClouds.length; i++) {
    var g = gasClouds[i];
    var gpx = g.x * TILE;
    var gpy = g.y * TILE + HUD_H;
    var alpha = Math.min(1, g.timer / 2) * 0.5;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#44AA22';
    ctx.fillRect(gpx, gpy, TILE, TILE);
    // Swirling fertilizer effect
    var t = Date.now() * 0.003 + g.x + g.y;
    ctx.fillStyle = '#66DD44';
    ctx.globalAlpha = alpha * 0.6;
    ctx.beginPath();
    ctx.arc(gpx + TILE / 2 + Math.sin(t) * TILE * 0.2, gpy + TILE / 2 + Math.cos(t) * TILE * 0.2, TILE * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(gpx + TILE / 2 + Math.sin(t + 2) * TILE * 0.15, gpy + TILE / 2 + Math.cos(t + 2) * TILE * 0.15, TILE * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - POOP BOMBS
// ============================================================
function drawBombs() {
  for (var bi = 0; bi < bombs.length; bi++) {
    var b = bombs[bi];
    var bpx = b.x * TILE;
    var bpy = b.y * TILE + HUD_H;
    var cx = bpx + TILE / 2;
    var cy = bpy + TILE / 2;
    var pulse = 1 + Math.sin(b.timer * 8) * 0.1;
    var radius = TILE * 0.35 * pulse;

    if (b.bombType === BOMB_SPORE) {
      // Spore poop bomb - green
      ctx.fillStyle = '#2A5A1F';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, radius, radius * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3A7A2A';
      ctx.beginPath();
      ctx.ellipse(cx, cy - radius * 0.3, radius * 0.6, radius * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Spore dots
      ctx.fillStyle = '#88DD44';
      for (var sd = 0; sd < 4; sd++) {
        var sa = sd * Math.PI / 2 + b.timer * 3;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(sa) * radius * 0.5, cy + Math.sin(sa) * radius * 0.5, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (b.bombType === BOMB_REACTOR) {
      // Fertilizer bomb - chain reaction
      ctx.fillStyle = '#8B3A00';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, radius, radius * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#CC5500';
      ctx.beginPath();
      ctx.ellipse(cx, cy - radius * 0.2, radius * 0.5, radius * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Energy ring
      ctx.strokeStyle = '#FF8800';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5 + Math.sin(b.timer * 10) * 0.3;
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (b.bombType === BOMB_MEGA) {
      // Mega poop bomb - golden
      var megaRadius = radius * 1.3;
      ctx.fillStyle = '#8B6914';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, megaRadius, megaRadius * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#AA8828';
      ctx.beginPath();
      ctx.ellipse(cx, cy - megaRadius * 0.3, megaRadius * 0.6, megaRadius * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8B6914';
      ctx.beginPath();
      ctx.ellipse(cx + 1, cy - megaRadius * 0.7, megaRadius * 0.35, megaRadius * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Star sparkle
      ctx.fillStyle = '#FFD700';
      ctx.globalAlpha = 0.6 + Math.sin(b.timer * 12) * 0.4;
      drawStar(cx, cy - megaRadius * 0.5, 4, 6, 3);
      ctx.globalAlpha = 1;
      // Warning glow
      if (b.timer < 1.5) {
        ctx.globalAlpha = (1.5 - b.timer) / 1.5 * 0.4;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(cx, cy, megaRadius + 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else {
      // Normal poop bomb
      ctx.fillStyle = '#6B3A1F';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 2, radius, radius * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8B4E2A';
      ctx.beginPath();
      ctx.ellipse(cx, cy - radius * 0.3, radius * 0.6, radius * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 1, cy - radius * 0.7, radius * 0.35, radius * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6B3A1F';
      ctx.beginPath();
      ctx.ellipse(cx + 1, cy - radius * 0.95, radius * 0.15, radius * 0.2, -0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Fuse spark (all bomb types)
    if (b.timer > 0 && Math.sin(b.timer * 20) > 0) {
      var sparkColor = b.bombType === BOMB_SPORE ? '#88DD44' : (b.bombType === BOMB_REACTOR ? '#FF8800' : '#FF4400');
      ctx.fillStyle = sparkColor;
      ctx.beginPath();
      ctx.arc(cx + 2, cy - radius - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFDD00';
      ctx.beginPath();
      ctx.arc(cx + 2, cy - radius - 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Timer glow
    if (b.timer < 1) {
      ctx.globalAlpha = (1 - b.timer) * 0.3;
      ctx.fillStyle = b.bombType === BOMB_SPORE ? '#44FF00' : '#FF0000';
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawStar(cx, cy, points, outer, inner) {
  ctx.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var a = (i * Math.PI / points) - Math.PI / 2;
    var r = i % 2 === 0 ? outer : inner;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// DRAWING - FERTILIZER BLASTS
// ============================================================
function drawExplosions() {
  for (var i = 0; i < explosions.length; i++) {
    var ex = explosions[i];
    var epx = ex.x * TILE;
    var epy = ex.y * TILE + HUD_H;
    var t = ex.timer / 0.5;

    ctx.globalAlpha = t * 0.6;
    ctx.fillStyle = '#FF4400';
    ctx.fillRect(epx - 2, epy - 2, TILE + 4, TILE + 4);

    ctx.globalAlpha = t * 0.9;
    ctx.fillStyle = '#FF8800';
    ctx.fillRect(epx + 2, epy + 2, TILE - 4, TILE - 4);

    ctx.globalAlpha = t;
    ctx.fillStyle = '#FFDD00';
    var inner = Math.floor(TILE * 0.2);
    ctx.fillRect(epx + inner, epy + inner, TILE - inner * 2, TILE - inner * 2);

    // Bright center flash
    ctx.globalAlpha = t * t;
    ctx.fillStyle = '#FFFFFF';
    var center = Math.floor(TILE * 0.3);
    ctx.fillRect(epx + center, epy + center, TILE - center * 2, TILE - center * 2);

    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - POWER-UPS
// ============================================================
function drawPowerups() {
  for (var i = 0; i < powerups.length; i++) {
    var pu = powerups[i];
    if (!pu.revealed) continue;
    var ppx = pu.x * TILE;
    var ppy = pu.y * TILE + HUD_H;
    var pcx = ppx + TILE / 2;
    var pcy = ppy + TILE / 2;
    var bob = Math.sin(Date.now() * 0.005 + pu.x + pu.y) * 2;

    ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003) * 0.1;
    ctx.fillStyle = PU_COLORS[pu.type];
    ctx.beginPath();
    ctx.arc(pcx, pcy + bob, TILE * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(pcx, pcy + bob, TILE * 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = PU_COLORS[pu.type];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pcx, pcy + bob, TILE * 0.3, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = PU_COLORS[pu.type];
    ctx.font = 'bold ' + Math.floor(TILE * 0.25) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    var labels = ['P+', 'B+', 'S+', 'K', 'R', 'RP', 'BP', 'GS'];
    ctx.fillText(labels[pu.type], pcx, pcy + bob);
  }
}

// ============================================================
// DRAWING - PLAYER (BASELING bomb expert)
// ============================================================
function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  var cx = player.px + TILE / 2;
  var cy = player.py + TILE / 2;
  var s = TILE * 0.85;
  var bob = Math.sin(player.animFrame * 2) * 1.5;

  ctx.save();
  ctx.translate(Math.floor(cx), Math.floor(cy + bob));

  // Shield glow
  if (player.shieldActive) {
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.005) * 0.1;
    ctx.strokeStyle = '#44FFFF';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.55, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Charge glow
  if (chargeTimer > 0 && canMegaBomb()) {
    var chargeAlpha = Math.min(1, chargeTimer / 1.5) * 0.4;
    ctx.globalAlpha = chargeAlpha;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  var anim = player.dead ? 'ko' : (inputDir !== DIR.NONE ? 'walk' : 'idle');
  if (!drawSelectedBaseling(ctx, 0, 0, s, { flipX: player.dir === DIR.LEFT, frame: frame, anim: anim })) {
    // Body
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.ellipse(0, 2, s * 0.4, s * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly highlight
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.ellipse(0, 4, s * 0.25, s * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Outline
    ctx.strokeStyle = '#7c3aed';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(0, 2, s * 0.4, s * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Eyes
    var eyeOff = player.dir === DIR.LEFT ? -3 : (player.dir === DIR.RIGHT ? 3 : 0);
    var eyeYOff = player.dir === DIR.UP ? -2 : (player.dir === DIR.DOWN ? 2 : 0);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-s * 0.12 + eyeOff, -s * 0.1 + eyeYOff, s * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.12 + eyeOff, -s * 0.1 + eyeYOff, s * 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-s * 0.1 + eyeOff, -s * 0.08 + eyeYOff, s * 0.05, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.14 + eyeOff, -s * 0.08 + eyeYOff, s * 0.05, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#6b21a8';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0 + eyeOff * 0.3, s * 0.05, s * 0.08, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Feet (animated)
    var legAnim = inputDir !== DIR.NONE ? Math.sin(player.animFrame * 4) * 3 : 0;
    ctx.fillStyle = '#7c3aed';
    ctx.beginPath();
    ctx.ellipse(-s * 0.15, s * 0.35 + legAnim, s * 0.1, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 0.15, s * 0.35 - legAnim, s * 0.1, s * 0.06, 0, 0, Math.PI * 2);
    ctx.fill();

    // Mushroom cap antenna
    ctx.strokeStyle = '#9333ea';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.3);
    ctx.quadraticCurveTo(s * 0.15, -s * 0.5, s * 0.05, -s * 0.55);
    ctx.stroke();
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.ellipse(s * 0.05, -s * 0.55, s * 0.06, s * 0.04, 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// ============================================================
// DRAWING - ENEMIES (garden pests)
// ============================================================
function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.dead) continue;
    var ecx = e.px + TILE / 2;
    var ecy = e.py + TILE / 2;
    var s = e.type === EN_BOSS ? TILE * 1.1 : (e.type === EN_MYCELIAL_BLOB ? TILE * 0.9 : TILE * 0.8);
    var bob = Math.sin(e.animFrame * 2) * 1.5;

    ctx.save();
    ctx.translate(Math.floor(ecx), Math.floor(ecy + bob));

    // Hit flash
    if (e.flashTimer > 0) {
      ctx.globalAlpha = 0.6;
    }

    if (e.type === EN_MYCELIAL_BLOB) {
      ctx.globalAlpha = Math.max(ctx.globalAlpha || 1, 0.1) * 0.7;
    }

    var color = getEnemyColor(e.type);

    if (e.type === EN_REACTOR_BALLOON) {
      // Balloon shape - round with a tie at bottom
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, -2, s * 0.35, s * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = lighten(color, 40);
      ctx.beginPath();
      ctx.ellipse(-s * 0.1, -s * 0.15, s * 0.1, s * 0.12, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Tie
      ctx.fillStyle = darken(color, 40);
      ctx.beginPath();
      ctx.moveTo(-s * 0.05, s * 0.32);
      ctx.lineTo(0, s * 0.42);
      ctx.lineTo(s * 0.05, s * 0.32);
      ctx.closePath();
      ctx.fill();
      // String
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.42);
      ctx.quadraticCurveTo(s * 0.05, s * 0.48, 0, s * 0.5);
      ctx.stroke();
      // Face
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.05, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.1, -s * 0.05, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.03, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.1, -s * 0.03, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      // Angry eyebrows
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.18, -s * 0.15);
      ctx.lineTo(-s * 0.05, -s * 0.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.18, -s * 0.15);
      ctx.lineTo(s * 0.05, -s * 0.1);
      ctx.stroke();

    } else if (e.type === EN_SPORE_SLIME) {
      // Amorphous slime blob
      var slimeWobble = Math.sin(e.animFrame * 3) * s * 0.03;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 2, s * 0.38 + slimeWobble, s * 0.3 - slimeWobble, 0, 0, Math.PI * 2);
      ctx.fill();
      // Slime drips
      ctx.fillStyle = darken(color, 20);
      for (var di = 0; di < 3; di++) {
        var drx = -s * 0.2 + di * s * 0.2;
        var dry = s * 0.25 + Math.sin(e.animFrame + di * 2) * 3;
        ctx.beginPath();
        ctx.ellipse(drx, dry, s * 0.06, s * 0.08, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // Spore spots
      ctx.fillStyle = '#88DD66';
      ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.6;
      ctx.beginPath();
      ctx.arc(-s * 0.12, -s * 0.05, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.15, s * 0.05, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = e.flashTimer > 0 ? 0.6 : 1;
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.08, s * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.1, -s * 0.08, s * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#220044';
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.06, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.1, -s * 0.06, s * 0.04, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === EN_MYCELIAL_BLOB) {
      // Large purple blob with tendrils
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.4, s * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      // Tendrils
      ctx.strokeStyle = darken(color, 20);
      ctx.lineWidth = 3;
      for (var ti = 0; ti < 4; ti++) {
        var ta = ti * Math.PI / 2 + e.animFrame * 0.5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ta) * s * 0.3, Math.sin(ta) * s * 0.25);
        ctx.quadraticCurveTo(
          Math.cos(ta) * s * 0.5 + Math.sin(e.animFrame + ti) * 3,
          Math.sin(ta) * s * 0.4 + Math.cos(e.animFrame + ti) * 3,
          Math.cos(ta) * s * 0.45,
          Math.sin(ta) * s * 0.38
        );
        ctx.stroke();
      }
      // Mycelium veins
      ctx.strokeStyle = lighten(color, 30);
      ctx.lineWidth = 1;
      ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.1, -s * 0.15);
      ctx.lineTo(s * 0.1, s * 0.1);
      ctx.moveTo(s * 0.15, -s * 0.1);
      ctx.lineTo(-s * 0.1, s * 0.12);
      ctx.stroke();
      ctx.globalAlpha = e.type === EN_MYCELIAL_BLOB ? 0.7 : 1;
      if (e.flashTimer > 0) ctx.globalAlpha = 0.6;
      // Eyes - glowing
      ctx.fillStyle = '#FF88FF';
      ctx.beginPath();
      ctx.arc(-s * 0.12, -s * 0.08, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.12, -s * 0.08, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FF00FF';
      ctx.beginPath();
      ctx.arc(-s * 0.12, -s * 0.06, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.12, -s * 0.06, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      // HP bar
      if (e.hp > 1) {
        ctx.fillStyle = '#333';
        ctx.fillRect(-s * 0.35, -s * 0.45, s * 0.7, 4);
        ctx.fillStyle = '#AA44FF';
        ctx.fillRect(-s * 0.35, -s * 0.45, s * 0.7 * (e.hp / 2), 4);
      }

    } else if (e.type === EN_SPEEDSTER) {
      // Sleek dart shape
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.3, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      // Speed trail
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.3;
      for (var li = 1; li <= 3; li++) {
        ctx.beginPath();
        ctx.moveTo(-s * 0.3 - li * 4, -s * 0.05 + li * 2);
        ctx.lineTo(-s * 0.4 - li * 6, -s * 0.05 + li * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = e.flashTimer > 0 ? 0.6 : 1;
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-s * 0.08, -s * 0.05, s * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.08, -s * 0.05, s * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(-s * 0.08, -s * 0.03, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.08, -s * 0.03, s * 0.04, 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === EN_BOSS) {
      // Boss - large, menacing, multi-layered
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, -s * 0.3);
      ctx.lineTo(s * 0.4, -s * 0.3);
      ctx.lineTo(s * 0.45, s * 0.2);
      ctx.lineTo(s * 0.3, s * 0.35);
      ctx.lineTo(-s * 0.3, s * 0.35);
      ctx.lineTo(-s * 0.45, s * 0.2);
      ctx.closePath();
      ctx.fill();
      // Outline
      ctx.strokeStyle = darken(color, 40);
      ctx.lineWidth = 2;
      ctx.stroke();
      // Horns
      ctx.fillStyle = '#CC4400';
      ctx.beginPath();
      ctx.moveTo(-s * 0.25, -s * 0.3);
      ctx.lineTo(-s * 0.15, -s * 0.5);
      ctx.lineTo(-s * 0.05, -s * 0.3);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.05, -s * 0.3);
      ctx.lineTo(s * 0.15, -s * 0.5);
      ctx.lineTo(s * 0.25, -s * 0.3);
      ctx.fill();
      // Horn tips glow
      ctx.fillStyle = '#FF8800';
      ctx.beginPath();
      ctx.arc(-s * 0.15, -s * 0.5, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.15, -s * 0.5, 3, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-s * 0.12, -s * 0.05, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.12, -s * 0.05, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Pupils track player
      var bpdx = player.px - e.px;
      var bpdy = player.py - e.py;
      var bpd = Math.sqrt(bpdx * bpdx + bpdy * bpdy) || 1;
      var bpox = (bpdx / bpd) * s * 0.03;
      var bpoy = (bpdy / bpd) * s * 0.03;
      ctx.fillStyle = '#FF0000';
      ctx.beginPath();
      ctx.arc(-s * 0.12 + bpox, -s * 0.05 + bpoy, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(s * 0.12 + bpox, -s * 0.05 + bpoy, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      // Mouth with teeth
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-s * 0.15, s * 0.12);
      ctx.lineTo(-s * 0.1, s * 0.18);
      ctx.lineTo(s * 0.1, s * 0.18);
      ctx.lineTo(s * 0.15, s * 0.12);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      for (var bt = 0; bt < 3; bt++) {
        ctx.fillRect(-s * 0.08 + bt * s * 0.08, s * 0.12, Math.floor(s * 0.04), Math.floor(s * 0.06));
      }
      // HP bar
      ctx.fillStyle = '#333';
      ctx.fillRect(-s * 0.35, -s * 0.55, s * 0.7, 5);
      ctx.fillStyle = '#FF0000';
      var maxHp = 3 + Math.floor(level / 5);
      ctx.fillRect(-s * 0.35, -s * 0.55, s * 0.7 * (e.hp / maxHp), 5);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(-s * 0.35, -s * 0.55, s * 0.7, 5);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ============================================================
// DRAWING - HUD
// ============================================================
function drawHUD() {
  var w = getWorld();
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, HUD_H);

  // World name bar
  ctx.fillStyle = w.accent;
  ctx.globalAlpha = 0.15;
  ctx.fillRect(0, 0, W, 3);
  ctx.globalAlpha = 1;

  ctx.font = 'bold ' + Math.floor(TILE * 0.45) + 'px monospace';

  // Score with INT multiplier indicator
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var scoreStr = 'SCORE: ' + score;
  if (statB.int > 0) scoreStr += ' (x' + intScoreMult().toFixed(2) + ')';
  ctx.fillText(scoreStr, Math.floor(TILE * 0.3), Math.floor(TILE * 0.15));

  // Level + World name
  ctx.fillStyle = w.accent;
  ctx.textAlign = 'center';
  ctx.fillText(w.name + ' G' + level, Math.floor(W / 2), Math.floor(TILE * 0.15));

  // Lives (CON bonus shown)
  ctx.fillStyle = '#FF4444';
  ctx.textAlign = 'right';
  for (var i = 0; i < lives; i++) {
    var lx = W - Math.floor(TILE * 0.4) - i * Math.floor(TILE * 0.6);
    ctx.beginPath();
    ctx.arc(lx - 4, Math.floor(TILE * 0.35), 4, 0, Math.PI * 2);
    ctx.arc(lx + 4, Math.floor(TILE * 0.35), 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(lx - 8, Math.floor(TILE * 0.38));
    ctx.lineTo(lx, Math.floor(TILE * 0.6));
    ctx.lineTo(lx + 8, Math.floor(TILE * 0.38));
    ctx.fill();
  }

  // Power-up indicators
  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var indX = Math.floor(TILE * 0.3);
  var indY = Math.floor(TILE * 0.85);

  ctx.fillStyle = '#f4b41b';
  ctx.fillText('P:' + player.maxBombs, indX, indY);
  indX += Math.floor(TILE * 1.5);

  ctx.fillStyle = '#FF8800';
  ctx.fillText('B:' + player.flameRange, indX, indY);
  indX += Math.floor(TILE * 1.5);

  ctx.fillStyle = '#f4b41b';
  ctx.fillText('S:' + player.speed.toFixed(1), indX, indY);
  indX += Math.floor(TILE * 1.8);

  if (player.hasKick) { ctx.fillStyle = '#38d973'; ctx.fillText('KICK', indX, indY); indX += Math.floor(TILE * 1.3); }
  if (player.hasRemote) { ctx.fillStyle = '#4488FF'; ctx.fillText('RMT', indX, indY); indX += Math.floor(TILE * 1.2); }
  if (player.hasWallPass) { ctx.fillStyle = '#a855f7'; ctx.fillText('RP', indX, indY); indX += TILE; }
  if (player.hasBombPass) { ctx.fillStyle = '#FF44AA'; ctx.fillText('BP', indX, indY); indX += TILE; }
  if (player.shieldActive) { ctx.fillStyle = '#38d973'; ctx.fillText('GS', indX, indY); indX += TILE; }
  if (canMegaBomb()) { ctx.fillStyle = '#f4b41b'; ctx.fillText('MEGA', indX, indY); }

  // High score
  ctx.fillStyle = '#666';
  ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HI: ' + highScore, Math.floor(W / 2), Math.floor(TILE * 0.85));

  // Charge bar (when holding bomb button with mega available)
  if (chargeTimer > 0 && canMegaBomb()) {
    var barW = Math.floor(W * 0.4);
    var barH = 6;
    var barX = Math.floor((W - barW) / 2);
    var barY = HUD_H - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    var fill = Math.min(1, chargeTimer / 1.5);
    ctx.fillStyle = fill >= 1 ? '#FFD700' : '#FF8800';
    ctx.fillRect(barX, barY, Math.floor(barW * fill), barH);
    if (fill >= 1) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold ' + Math.floor(TILE * 0.25) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MEGA POOP READY!', Math.floor(W / 2), barY - 2);
    }
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H); }
  }

  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);

  // Animated background pattern
  var bgTime = Date.now() * 0.001;
  for (let y = 0; y < ROWS + 2; y++) {
    for (let x = 0; x < COLS; x++) {
      var dist = Math.sin(x * 0.5 + bgTime) + Math.cos(y * 0.5 + bgTime * 0.7);
      if (dist > 0.5) {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
      }
    }
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Title shadow
  ctx.fillStyle = '#4B2A10';
  ctx.font = 'bold ' + Math.floor(TILE * 1.6) + 'px monospace';
  ctx.fillText('POOP', Math.floor(W / 2) + 2, Math.floor(H * 0.22) + 2);

  ctx.fillStyle = '#8B4E2A';
  ctx.fillText('POOP', Math.floor(W / 2), Math.floor(H * 0.22));

  ctx.fillStyle = '#3A1A0F';
  ctx.font = 'bold ' + Math.floor(TILE * 1.4) + 'px monospace';
  ctx.fillText('BOMBER', Math.floor(W / 2) + 2, Math.floor(H * 0.36) + 2);

  ctx.fillStyle = '#6B3A1F';
  ctx.fillText('BOMBER', Math.floor(W / 2), Math.floor(H * 0.36));

  // Champion preview — the selected baseling (falls back to the poop-bomb art).
  var tbx = Math.floor(W / 2), tby = Math.floor(H * 0.52);
  var tr = TILE * 0.8;
  if (!drawSelectedBaseling(ctx, tbx, tby, tr * 2, { anim: 'idle', frame: frame })) {
    ctx.fillStyle = '#6B3A1F';
    ctx.beginPath();
    ctx.ellipse(tbx, tby + 5, tr, tr * 0.85, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#8B4E2A';
    ctx.beginPath();
    ctx.ellipse(tbx, tby - tr * 0.3, tr * 0.6, tr * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(tbx + 2, tby - tr * 0.7, tr * 0.35, tr * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6B3A1F';
    ctx.beginPath();
    ctx.ellipse(tbx + 2, tby - tr * 0.95, tr * 0.15, tr * 0.2, -0.3, 0, Math.PI * 2);
    ctx.fill();
    if (Math.sin(Date.now() * 0.01) > 0) {
      ctx.fillStyle = '#FF4400';
      ctx.beginPath();
      ctx.arc(tbx + 4, tby - tr - 5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFDD00';
      ctx.beginPath();
      ctx.arc(tbx + 4, tby - tr - 5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Champion name + 5 arcade stat bars (Base-blue), and the picker prompt.
  drawTitleChampion(Math.floor(W / 2), Math.floor(H * 0.62));

  // Garden instructions
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = Math.floor(TILE * 0.38) + 'px monospace';
  ctx.fillText('ARROWS/WASD: MOVE', Math.floor(W / 2), Math.floor(H * 0.79));
  ctx.fillText('SPACE/X: DROP POOP BOMB', Math.floor(W / 2), Math.floor(H * 0.84));
  ctx.fillText('Z: DETONATE  C: CYCLE BOMB (in-game)', Math.floor(W / 2), Math.floor(H * 0.89));

  // Start prompt
  var pulse = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold ' + Math.floor(TILE * 0.55) + 'px monospace';
  ctx.fillText('PRESS START', Math.floor(W / 2), Math.floor(H * 0.94));
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME OVER SCREEN
// ============================================================
function drawGameOver() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); }
  }

  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold ' + Math.floor(TILE * 1.6) + 'px monospace';
  ctx.fillText('GARDEN', Math.floor(W / 2), Math.floor(H * 0.25));
  ctx.fillText('OVER', Math.floor(W / 2), Math.floor(H * 0.25 + TILE * 1.7));

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold ' + Math.floor(TILE * 0.65) + 'px monospace';
  ctx.fillText('Score: ' + score, Math.floor(W / 2), Math.floor(H * 0.55));

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(Date.now() * 0.005) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px monospace';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(W / 2), Math.floor(H * 0.63));
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#888';
    ctx.font = Math.floor(TILE * 0.4) + 'px monospace';
    ctx.fillText('Best: ' + highScore, Math.floor(W / 2), Math.floor(H * 0.63));
  }

  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(TILE * 0.45) + 'px monospace';
  ctx.fillText('Garden Reached: ' + level, Math.floor(W / 2), Math.floor(H * 0.72));

  // Champion (cosmetic)
  if (window.BaselingPlayer) {
    var _sel = BaselingPlayer.getSelected();
    var _nm = _sel ? (_sel.charName + (_sel.tokenId != null ? ' #' + _sel.tokenId : '')) : 'WIMMPLE';
    ctx.fillStyle = '#0052FF';
    ctx.font = Math.floor(TILE * 0.32) + 'px monospace';
    ctx.fillText('Champion: ' + _nm, Math.floor(W / 2), Math.floor(H * 0.79));
  }

  var pulse2 = Math.sin(Date.now() * 0.004) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold ' + Math.floor(TILE * 0.5) + 'px monospace';
  ctx.fillText('PRESS ANY KEY', Math.floor(W / 2), Math.floor(H * 0.88));
  ctx.globalAlpha = 1;
}

// ============================================================
// LEVEL COMPLETE SCREEN
// ============================================================
function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  var w = getWorld();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = w.accent;
  ctx.font = 'bold ' + Math.floor(TILE * 0.7) + 'px monospace';
  ctx.fillText(w.name, Math.floor(W / 2), Math.floor(H * 0.25));

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold ' + Math.floor(TILE * 1.1) + 'px monospace';
  ctx.fillText('GARDEN ' + level, Math.floor(W / 2), Math.floor(H * 0.4));
  ctx.fillText('CLEARED!', Math.floor(W / 2), Math.floor(H * 0.4 + TILE * 1.2));

  ctx.fillStyle = '#FFD700';
  ctx.font = Math.floor(TILE * 0.55) + 'px monospace';
  var bonus = Math.floor(level * 200 * intScoreMult());
  ctx.fillText('Bonus: +' + bonus, Math.floor(W / 2), Math.floor(H * 0.65));
  ctx.fillStyle = '#fff';
  ctx.fillText('Score: ' + score, Math.floor(W / 2), Math.floor(H * 0.75));

  // Boss warning for next level
  if ((level + 1) % 5 === 0) {
    var warnPulse = Math.sin(Date.now() * 0.006) * 0.3 + 0.7;
    ctx.globalAlpha = warnPulse;
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold ' + Math.floor(TILE * 0.4) + 'px monospace';
    ctx.fillText('WARNING: GARDEN BOSS AHEAD', Math.floor(W / 2), Math.floor(H * 0.85));
    ctx.globalAlpha = 1;
  }
}
