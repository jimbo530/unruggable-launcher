<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Tower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT BONUSES (from NftLoader) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM unused (no water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[solstice-tower] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[solstice-tower] player init failed:', e && e.message); });
}

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'USE', c: 'PICK' } });

// === STAT HELPERS ===
// STR: block push range, damage dealt, break cracked walls
// DEX: movement speed, dodge chance, conveyor resist
// CON: extra lives, spike/hazard damage reduction, death timer
// INT: puzzle hints, potion duration, trap reveal radius
// WIS: enemy detection range, map reveal, hidden item sense
// CHA: gem/score multiplier, shop prices, NPC interactions
function statMod(val) { return Math.floor((val - 10) / 2); }
function strMod() { return statMod(statB.str); }
function dexMod() { return statMod(statB.dex); }
function conMod() { return statMod(statB.con); }
function intMod() { return statMod(statB.int); }
function wisMod() { return statMod(statB.wis); }
function chaMod() { return statMod(statB.cha); }

// === ISOMETRIC CONSTANTS ===
const TW = 32;
const TH = 16;
const TD = 12;
const GRID_W = 9, GRID_H = 9;
const ISO_OX = GW / 2;
const ISO_OY = 60;

// === TILE TYPES ===
const T = {
  EMPTY: 0, FLOOR: 1, WALL: 2, PIT: 3, BLOCK: 4,
  PLATE: 5, DOOR_R: 6, DOOR_B: 7, DOOR_G: 8, DOOR_Y: 9,
  KEY_R: 10, KEY_B: 11, KEY_G: 12, KEY_Y: 13,
  SWITCH: 14, SWITCH_ON: 15, CONVEYOR_UL: 16, CONVEYOR_UR: 17,
  CONVEYOR_DL: 18, CONVEYOR_DR: 19, PLATFORM: 20, VANISH: 21,
  EXIT_UL: 22, EXIT_UR: 23, EXIT_DL: 24, EXIT_DR: 25,
  GEM: 26, POTION: 27, BOOTS: 28, SHIELD: 29, STAFF: 30,
  SPIKES: 31, ICE: 32, TELEPORT: 33, CRACKED: 34,
  MUSHROOM_GAS: 35, ROOT_SNARE: 36, SPORE_CLOUD: 37, HEAL_MOSS: 38
};

// === ZONE THEMES (5 floors) ===
const ZONE_NAMES = ['Poop Cellars', 'Root Caverns', 'Garden Terraces', 'Mycelium Hall', 'Spore Peak'];
const FLOOR_PALETTES = [
  { top: '#2a3a2c', left: '#1a2a1c', right: '#0e1e0e', accent: '#38d973', fog: '#0a1a0c', name: 'Poop Cellars' },
  { top: '#3a2a1c', left: '#2a1a0c', right: '#1e0e00', accent: '#7a444a', fog: '#1a0c00', name: 'Root Caverns' },
  { top: '#2c3a4c', left: '#1c2a3c', right: '#0e1a2c', accent: '#3cacd7', fog: '#0a0e1a', name: 'Garden Terraces' },
  { top: '#3a3a1c', left: '#2a2a0c', right: '#1e1e00', accent: '#f4b41b', fog: '#1a1a00', name: 'Mycelium Hall' },
  { top: '#3c2a3c', left: '#2c1a2c', right: '#1e0e1e', accent: '#a855f7', fog: '#1a0a1a', name: 'Spore Peak' }
];

const DOOR_COLORS = { 6: '#cc3333', 7: '#3333cc', 8: '#33cc33', 9: '#cccc33' };
const KEY_COLORS = { 10: '#ff4444', 11: '#4444ff', 12: '#44ff44', 13: '#ffff44' };

// === BASELING ENEMY TYPES ===
const ENEMY_TYPES = {
  spore_creeper: { color: '#38d973', eyeColor: '#ccffaa', size: 6, label: 'Garden Pest' },
  mold_lurker: { color: '#7a444a', eyeColor: '#ffddaa', size: 7, label: 'Tower Mold' },
  thorn_spinner: { color: '#e6482e', eyeColor: '#ff8844', size: 5, label: 'Thorn Spinner' },
  shade_wraith: { color: '#3cacd7', eyeColor: '#aaccff', size: 6, label: 'Spore Wraith' },
  root_guardian: { color: '#7a444a', eyeColor: '#f4b41b', size: 9, label: 'Root Guardian' },
  fungal_titan: { color: '#38d973', eyeColor: '#88ffaa', size: 10, label: 'Poop Golem' },
  canopy_warden: { color: '#f4b41b', eyeColor: '#ffff88', size: 9, label: 'Mycelium Warden' },
  spore_lord: { color: '#3cacd7', eyeColor: '#88ccff', size: 10, label: 'Spore Lord' },
  solstice_wyrm: { color: '#a855f7', eyeColor: '#ff88ff', size: 12, label: 'Isometric Fungi' }
};

// Boss per floor
const FLOOR_BOSSES = ['fungal_titan', 'root_guardian', 'spore_lord', 'canopy_warden', 'solstice_wyrm'];
// Regular enemies per floor
const FLOOR_ENEMIES = [
  ['spore_creeper', 'mold_lurker'],
  ['mold_lurker', 'thorn_spinner'],
  ['thorn_spinner', 'shade_wraith'],
  ['shade_wraith', 'spore_creeper'],
  ['thorn_spinner', 'shade_wraith', 'mold_lurker']
];

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('solsticetower_hi');
let baseLives = 5 + Math.max(0, conMod()); // CON: bonus lives
let lives = baseLives + statB.lives;
let frame = 0;
let currentFloor = 0;
let currentRoom = 0;
let roomTimer = 0;
let tutorialSeen = false;
let showTutorial = false;
let tutorialPage = 0;

// Player
let player = {
  gx: 4, gy: 4, z: 0, vz: 0,
  moving: false, moveT: 0, fromGx: 0, fromGy: 0,
  dir: 2, jumping: false, jumpT: 0,
  hasShield: false, hasBoots: false,
  hp: 3 + Math.max(0, conMod()), // CON: bonus HP
  maxHp: 3 + Math.max(0, conMod()),
  invuln: 0, // invulnerability frames after hit
  snared: 0 // root snare timer
};
let potions = 0;
let keys = { red: 0, blue: 0, green: 0, yellow: 0 };
let staffPieces = 0;
let gems = 0;

// Room state
let grid = [];
let enemies = [];
let blocks = [];
let platforms = [];
let switches = [];
let conveyors = [];
let roomSolved = false;
let deathAnim = 0;
let winAnim = 0;
let potionActive = 0;
let showMap = false;

// Score popups
let scorePopups = [];
function spawnPopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.5, vy: -30 });
}

// Screen shake
let shakeX = 0, shakeY = 0, shakeMag = 0, shakeDecay = 0.9;
function triggerShake(mag) { shakeMag = mag; }

// Ambient particles
let ambientParticles = [];

// Progress tracking
let solvedRooms = [];
let visitedRooms = [];

// NES-style pixel font cache
let pixelFontReady = false;

// === ISO CONVERSION ===
function isoX(gx, gy) { return ISO_OX + (gx - gy) * (TW / 2); }
function isoY(gx, gy, z) { return ISO_OY + (gx + gy) * (TH / 2) - (z || 0) * TD; }

// === PIXEL ART HELPERS ===
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawPixelCircle(cx, cy, r, color) {
  ctx.fillStyle = color;
  var x0 = Math.floor(cx - r);
  var y0 = Math.floor(cy - r);
  var d = r * 2;
  ctx.beginPath();
  ctx.arc(Math.floor(cx), Math.floor(cy), r, 0, Math.PI * 2);
  ctx.fill();
}

// NES-style 8x8 pixel sprite renderer
function drawSprite(sx, sy, pixels, scale) {
  scale = scale || 1;
  for (var row = 0; row < pixels.length; row++) {
    for (var col = 0; col < pixels[row].length; col++) {
      if (pixels[row][col]) {
        ctx.fillStyle = pixels[row][col];
        ctx.fillRect(Math.floor(sx + col * scale), Math.floor(sy + row * scale), scale, scale);
      }
    }
  }
}

// === ROOM GENERATION ===
function hashRoom(floor, room) {
  var h = (floor * 1337 + room * 7919 + 42) | 0;
  h = ((h >> 16) ^ h) * 0x45d9f3b | 0;
  h = ((h >> 16) ^ h) * 0x45d9f3b | 0;
  return (h >> 16) ^ h;
}

function seededRandom(seed) {
  var s = seed;
  return function() {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    return s / 0x7fffffff;
  };
}

function generateRoom(floor, room) {
  var seed = hashRoom(floor, room);
  var rng = seededRandom(seed);
  var isBoss = room === 7;
  grid = [];
  enemies = [];
  blocks = [];
  platforms = [];
  switches = [];
  conveyors = [];
  roomSolved = false;
  scorePopups = [];
  ambientParticles = [];

  // Init grid with floor tiles
  for (var y = 0; y < GRID_H; y++) {
    grid[y] = [];
    for (var x = 0; x < GRID_W; x++) {
      grid[y][x] = T.FLOOR;
    }
  }

  // Walls on edges
  for (var x2 = 0; x2 < GRID_W; x2++) { grid[0][x2] = T.WALL; grid[GRID_H-1][x2] = T.WALL; }
  for (var y2 = 0; y2 < GRID_H; y2++) { grid[y2][0] = T.WALL; grid[y2][GRID_W-1] = T.WALL; }

  // Determine exits based on adjacent rooms
  var exits = getExits(floor, room);
  for (var ei = 0; ei < exits.length; ei++) {
    var e = exits[ei];
    if (e.dir === 0) grid[0][4] = T.EXIT_UL;
    if (e.dir === 1) grid[4][GRID_W-1] = T.EXIT_UR;
    if (e.dir === 2) grid[GRID_H-1][4] = T.EXIT_DL;
    if (e.dir === 3) grid[4][0] = T.EXIT_DR;
  }

  // Place puzzle elements based on room type
  var puzzleType = getPuzzleType(floor, room);

  if (puzzleType === 'blocks') {
    generateBlockPuzzle(rng, floor);
  } else if (puzzleType === 'keys') {
    generateKeyPuzzle(rng, floor);
  } else if (puzzleType === 'switches') {
    generateSwitchPuzzle(rng, floor);
  } else if (puzzleType === 'platforms') {
    generatePlatformPuzzle(rng, floor);
  } else if (puzzleType === 'conveyors') {
    generateConveyorPuzzle(rng, floor);
  } else if (puzzleType === 'boss') {
    generateBossPuzzle(rng, floor);
  } else {
    generateMixedPuzzle(rng, floor);
  }

  // Place Tasern hazards based on floor theme
  placeHazards(rng, floor);

  // Place enemies based on floor difficulty
  var enemyCount = Math.min(floor + 1, 4) + (isBoss ? 2 : 0);
  // WIS: fewer enemies spotted (they start further away)
  for (var i = 0; i < enemyCount; i++) {
    placeEnemy(rng, floor, isBoss);
  }

  // Gems in some rooms - CHA: better gem luck
  var gemChance = 0.4 - chaMod() * 0.05;
  if (rng() > gemChance) {
    var ggx = 1 + Math.floor(rng() * (GRID_W - 2));
    var ggy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[ggy][ggx] === T.FLOOR) grid[ggy][ggx] = T.GEM;
  }

  // INT: chance for bonus gem in puzzle rooms
  if (intMod() > 0 && rng() < 0.3 * intMod()) {
    var igx = 1 + Math.floor(rng() * (GRID_W - 2));
    var igy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[igy][igx] === T.FLOOR) grid[igy][igx] = T.GEM;
  }

  // Staff piece on boss rooms of floors 0-3
  if (isBoss && floor < 4) {
    grid[1][4] = T.STAFF;
  }

  // Heal moss - CON: more healing opportunities
  if (rng() > (0.8 - conMod() * 0.05)) {
    var hx = 1 + Math.floor(rng() * (GRID_W - 2));
    var hy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[hy][hx] === T.FLOOR) grid[hy][hx] = T.HEAL_MOSS;
  }

  // Potions/boots/shields randomly
  if (rng() > 0.7 && !isBoss) {
    var pix = 1 + Math.floor(rng() * (GRID_W - 2));
    var piy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[piy][pix] === T.FLOOR) {
      var r = rng();
      if (r < 0.4) grid[piy][pix] = T.POTION;
      else if (r < 0.7) grid[piy][pix] = T.BOOTS;
      else grid[piy][pix] = T.SHIELD;
    }
  }

  // Set player start
  player.gx = 4; player.gy = 7;
  player.z = 0; player.vz = 0;
  player.moving = false; player.jumping = false;
  player.moveT = 0; player.jumpT = 0;
  player.snared = 0;

  // Make sure player start is clear
  grid[player.gy][player.gx] = T.FLOOR;
  roomTimer = 0;

  // Spawn ambient particles for zone flavor
  spawnAmbientParticles(floor);
}

// === ZONE-THEMED HAZARDS ===
function placeHazards(rng, floor) {
  var hazardCount = 1 + Math.floor(rng() * (floor + 1));
  for (var i = 0; i < hazardCount; i++) {
    var hx = 1 + Math.floor(rng() * (GRID_W - 2));
    var hy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[hy][hx] !== T.FLOOR || (hx === 4 && hy === 7)) continue;
    // Floor-themed hazards
    if (floor === 0 || floor === 2) {
      grid[hy][hx] = rng() > 0.5 ? T.MUSHROOM_GAS : T.SPORE_CLOUD;
    } else if (floor === 1 || floor === 3) {
      grid[hy][hx] = rng() > 0.5 ? T.ROOT_SNARE : T.SPIKES;
    } else {
      var hazards = [T.MUSHROOM_GAS, T.ROOT_SNARE, T.SPORE_CLOUD, T.SPIKES];
      grid[hy][hx] = hazards[Math.floor(rng() * hazards.length)];
    }
  }
}

// === AMBIENT PARTICLES ===
function spawnAmbientParticles(floor) {
  ambientParticles = [];
  var colors = [
    ['#44bb66', '#228844'],
    ['#aa7744', '#886633'],
    ['#66aadd', '#4488bb'],
    ['#ccaa44', '#aa8833'],
    ['#bb66cc', '#9944aa']
  ];
  for (var i = 0; i < 8; i++) {
    ambientParticles.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      vx: (Math.random() - 0.5) * 10,
      vy: -5 - Math.random() * 10,
      color: colors[floor][Math.floor(Math.random() * 2)],
      size: 1 + Math.random() * 2,
      life: 2 + Math.random() * 3,
      maxLife: 5
    });
  }
}

function updateAmbientParticles(dt) {
  for (var i = ambientParticles.length - 1; i >= 0; i--) {
    var p = ambientParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) {
      // Respawn
      p.x = Math.random() * GW;
      p.y = GH + 10;
      p.life = p.maxLife;
    }
  }
}

function drawAmbientParticles() {
  for (var i = 0; i < ambientParticles.length; i++) {
    var p = ambientParticles[i];
    ctx.globalAlpha = Math.min(1, p.life / p.maxLife) * 0.4;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

function getPuzzleType(floor, room) {
  if (room === 7) return 'boss';
  var types = ['blocks', 'keys', 'switches', 'platforms', 'conveyors', 'mixed', 'blocks'];
  return types[room % types.length];
}

function getExits(floor, room) {
  var exits = [];
  if (room > 0) exits.push({ dir: 3 });
  if (room < 7) exits.push({ dir: 1 });
  if (room === 7 && floor < 4) exits.push({ dir: 0 });
  if (room === 0 && floor > 0) exits.push({ dir: 2 });
  return exits;
}

function generateBlockPuzzle(rng, floor) {
  var plateCount = 1 + Math.floor(rng() * 2);
  for (var i = 0; i < plateCount; i++) {
    var px = 2 + Math.floor(rng() * 5);
    var py = 2 + Math.floor(rng() * 5);
    if (grid[py][px] === T.FLOOR) grid[py][px] = T.PLATE;
  }
  for (var y = 1; y < GRID_H - 1; y++) {
    for (var x = 1; x < GRID_W - 1; x++) {
      if (grid[y][x] === T.PLATE) {
        var bx = x + (rng() > 0.5 ? 1 : -1);
        var by = y + (rng() > 0.5 ? 1 : -1);
        if (bx > 0 && bx < GRID_W-1 && by > 0 && by < GRID_H-1 && grid[by][bx] === T.FLOOR) {
          grid[by][bx] = T.BLOCK;
          blocks.push({ gx: bx, gy: by, moving: false });
        }
      }
    }
  }
  // STR: high STR allows pushing through cracked walls
  var wallCount = 2 + Math.floor(rng() * (floor + 1));
  for (var wi = 0; wi < wallCount; wi++) {
    var wx = 1 + Math.floor(rng() * (GRID_W - 2));
    var wy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[wy][wx] === T.FLOOR && !(wx === 4 && wy === 7)) {
      // STR: some walls become cracked (breakable with STR 12+)
      grid[wy][wx] = (strMod() >= 1 && rng() > 0.6) ? T.CRACKED : T.WALL;
    }
  }
  grid[1][4] = T.DOOR_R;
}

function generateKeyPuzzle(rng, floor) {
  var keyType = 10 + Math.floor(rng() * 4);
  var doorType = keyType - 4;
  var corners = [[1,1],[1,GRID_H-2],[GRID_W-2,1],[GRID_W-2,GRID_H-2]];
  var kc = corners[Math.floor(rng() * 4)];
  grid[kc[1]][kc[0]] = keyType;
  grid[4][GRID_W-2] = doorType;
  var wallCount = 3 + Math.floor(rng() * floor);
  for (var i = 0; i < wallCount; i++) {
    var wx = 1 + Math.floor(rng() * (GRID_W - 2));
    var wy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[wy][wx] === T.FLOOR && !(wx === 4 && wy === 7)) {
      grid[wy][wx] = rng() > 0.5 ? T.WALL : T.PIT;
    }
  }
}

function generateSwitchPuzzle(rng, floor) {
  var switchCount = 2 + Math.floor(rng() * 2);
  for (var i = 0; i < switchCount; i++) {
    var sx = 1 + Math.floor(rng() * (GRID_W - 2));
    var sy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[sy][sx] === T.FLOOR && !(sx === 4 && sy === 7)) {
      grid[sy][sx] = T.SWITCH;
      switches.push({ gx: sx, gy: sy, on: false, order: i });
    }
  }
  for (var wi = 0; wi < 4; wi++) {
    var wx = 1 + Math.floor(rng() * (GRID_W - 2));
    var wy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[wy][wx] === T.FLOOR && !(wx === 4 && wy === 7)) grid[wy][wx] = T.WALL;
  }
  grid[1][4] = T.DOOR_B;
}

function generatePlatformPuzzle(rng, floor) {
  for (var y = 2; y < GRID_H - 2; y++) {
    for (var x = 2; x < GRID_W - 2; x++) {
      if (rng() > 0.6 && !(x === 4 && y === 7)) {
        grid[y][x] = T.PIT;
      }
    }
  }
  var platCount = 2 + Math.floor(rng() * 3);
  for (var pi = 0; pi < platCount; pi++) {
    var ppx = 2 + Math.floor(rng() * 5);
    var ppy = 2 + Math.floor(rng() * 5);
    if (grid[ppy][ppx] === T.PIT) {
      grid[ppy][ppx] = T.PLATFORM;
      platforms.push({ gx: ppx, gy: ppy, startGx: ppx, startGy: ppy, dir: Math.floor(rng() * 4), speed: 0.5 + rng() * 0.5, t: rng() * Math.PI * 2, range: 2 });
    }
  }
  for (var vy = 2; vy < GRID_H - 2; vy++) {
    for (var vx = 2; vx < GRID_W - 2; vx++) {
      if (grid[vy][vx] === T.PIT && rng() > 0.7) {
        grid[vy][vx] = T.VANISH;
      }
    }
  }
  grid[3][4] = T.FLOOR; grid[5][4] = T.FLOOR;
  grid[4][3] = T.FLOOR; grid[4][5] = T.FLOOR;
}

function generateConveyorPuzzle(rng, floor) {
  var dirs = [T.CONVEYOR_UL, T.CONVEYOR_UR, T.CONVEYOR_DL, T.CONVEYOR_DR];
  for (var y = 2; y < GRID_H - 2; y++) {
    for (var x = 2; x < GRID_W - 2; x++) {
      if (rng() > 0.6 && !(x === 4 && y === 7)) {
        var ct = dirs[Math.floor(rng() * 4)];
        grid[y][x] = ct;
        conveyors.push({ gx: x, gy: y, type: ct });
      }
    }
  }
  grid[4][4] = T.BLOCK;
  blocks.push({ gx: 4, gy: 4, moving: false });
  grid[2][2] = T.PLATE;
  grid[1][4] = T.DOOR_G;
}

function generateBossPuzzle(rng, floor) {
  generateBlockPuzzle(rng, floor);
  var sx = 2 + Math.floor(rng() * 3);
  var sy = 2 + Math.floor(rng() * 3);
  if (grid[sy][sx] === T.FLOOR) {
    grid[sy][sx] = T.SWITCH;
    switches.push({ gx: sx, gy: sy, on: false, order: 0 });
  }
  for (var i = 0; i < 3; i++) {
    var ppx = 1 + Math.floor(rng() * (GRID_W - 2));
    var ppy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[ppy][ppx] === T.FLOOR && !(ppx === 4 && ppy === 7)) grid[ppy][ppx] = T.PIT;
  }
}

function generateMixedPuzzle(rng, floor) {
  if (rng() > 0.5) generateBlockPuzzle(rng, floor);
  else generateKeyPuzzle(rng, floor);
  for (var i = 0; i < 2; i++) {
    var sx = 1 + Math.floor(rng() * (GRID_W - 2));
    var sy = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[sy][sx] === T.FLOOR && !(sx === 4 && sy === 7)) grid[sy][sx] = T.SPIKES;
  }
}

function placeEnemy(rng, floor, isBoss) {
  var attempts = 20;
  while (attempts-- > 0) {
    var ex = 1 + Math.floor(rng() * (GRID_W - 2));
    var ey = 1 + Math.floor(rng() * (GRID_H - 2));
    if (grid[ey][ex] === T.FLOOR && !(ex === player.gx && ey === player.gy) && Math.abs(ex - 4) + Math.abs(ey - 7) > 3) {
      var typePool = FLOOR_ENEMIES[floor];
      var typeName;
      if (isBoss && enemies.length === 0) {
        typeName = FLOOR_BOSSES[floor];
      } else {
        typeName = typePool[Math.floor(rng() * typePool.length)];
      }
      var etype = ENEMY_TYPES[typeName];
      // WIS: enemies start further from player
      var wisBonus = Math.max(0, wisMod());
      var baseSpeed = 0.3 + rng() * 0.3 + floor * 0.05;
      // DEX: player moves faster so enemies feel slower relatively
      enemies.push({
        gx: ex, gy: ey, x: ex, y: ey,
        type: typeName,
        dir: Math.floor(rng() * 4),
        speed: baseSpeed,
        t: rng() * Math.PI * 2,
        patrolDist: 2 + Math.floor(rng() * 2) + wisBonus,
        startX: ex, startY: ey,
        hp: isBoss && enemies.length === 0 ? 3 + floor : 1,
        maxHp: isBoss && enemies.length === 0 ? 3 + floor : 1,
        isBoss: isBoss && enemies.length === 0,
        hitFlash: 0,
        label: etype.label
      });
      return;
    }
  }
}

// === CHECK ROOM SOLVED ===
function checkRoomSolved() {
  var allPlates = true;
  for (var y = 0; y < GRID_H; y++) {
    for (var x = 0; x < GRID_W; x++) {
      if (grid[y][x] === T.PLATE) {
        var hasBlock = blocks.some(function(b) { return b.gx === x && b.gy === y; });
        if (!hasBlock) allPlates = false;
      }
    }
  }
  var allSwitches = switches.length > 0 ? switches.every(function(s) { return s.on; }) : true;
  if (switches.length > 0 && allSwitches) {
    openDoors();
    return true;
  }
  if (allPlates && blocks.length > 0) {
    openDoors();
    return true;
  }
  var hasDoor = false;
  for (var dy = 0; dy < GRID_H; dy++) {
    for (var dx = 0; dx < GRID_W; dx++) {
      if (grid[dy][dx] >= T.DOOR_R && grid[dy][dx] <= T.DOOR_Y) hasDoor = true;
    }
  }
  if (!hasDoor && blocks.length === 0 && switches.length === 0) return true;
  return false;
}

function openDoors() {
  for (var y = 0; y < GRID_H; y++) {
    for (var x = 0; x < GRID_W; x++) {
      if (grid[y][x] >= T.DOOR_R && grid[y][x] <= T.DOOR_Y) {
        grid[y][x] = T.FLOOR;
      }
    }
  }
  TAS.audio.playTone(523, 0.15, 'square', 0.08);
  TAS.audio.playTone(659, 0.15, 'square', 0.08);
  setTimeout(function() { TAS.audio.playTone(784, 0.2, 'square', 0.08); }, 150);
}

// === PLAYER MOVEMENT ===
function movePlayer(dx, dy) {
  if (player.moving || player.jumping || deathAnim > 0 || player.snared > 0) return;
  var nx = player.gx + dx;
  var ny = player.gy + dy;
  player.dir = dx === -1 && dy === 0 ? 3 : dx === 1 && dy === 0 ? 1 : dx === 0 && dy === -1 ? 0 : 2;

  if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) {
    if (tryExit(nx, ny)) return;
    return;
  }

  var tile = grid[ny][nx];

  // Walls block
  if (tile === T.WALL) return;

  // Cracked walls - STR check
  if (tile === T.CRACKED) {
    if (strMod() >= 1) {
      grid[ny][nx] = T.FLOOR;
      TAS.audio.playNoise(0.2, 0.06, 300);
      triggerShake(3);
      TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#887766', 8, 2);
      spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, 'SMASH!', '#ffaa44');
      score += 25;
    } else {
      return;
    }
  }

  // Doors with keys
  if (tile >= T.DOOR_R && tile <= T.DOOR_Y) {
    var keyName = ['red', 'blue', 'green', 'yellow'][tile - T.DOOR_R];
    if (keys[keyName] > 0) {
      keys[keyName]--;
      grid[ny][nx] = T.FLOOR;
      TAS.audio.playTone(440, 0.1, 'square', 0.07);
    }
    return;
  }

  // Block pushing - STR: push further
  if (tile === T.BLOCK) {
    var bx = nx + dx;
    var by = ny + dy;
    if (bx >= 0 && bx < GRID_W && by >= 0 && by < GRID_H) {
      var behindTile = grid[by][bx];
      if (behindTile === T.FLOOR || behindTile === T.PLATE || behindTile === T.PIT ||
          (behindTile >= T.CONVEYOR_UL && behindTile <= T.CONVEYOR_DR)) {
        var block = blocks.find(function(b) { return b.gx === nx && b.gy === ny; });
        if (block) {
          grid[ny][nx] = T.FLOOR;
          if (behindTile === T.PIT) {
            grid[by][bx] = T.FLOOR;
            var idx = blocks.indexOf(block);
            blocks.splice(idx, 1);
            TAS.audio.playNoise(0.2, 0.06, 200);
            triggerShake(2);
          } else {
            block.gx = bx; block.gy = by;
            grid[by][bx] = T.BLOCK;
            TAS.audio.playTone(150, 0.08, 'square', 0.06);
          }
        }
      } else {
        return;
      }
    } else {
      return;
    }
  }

  // Pits
  if (tile === T.PIT) {
    if (player.jumping || player.hasBoots) {
      // Can pass
    } else {
      startDeath();
      return;
    }
  }

  // Spikes - CON: damage reduction
  if (tile === T.SPIKES) {
    if (player.hasShield) {
      player.hasShield = false;
      TAS.audio.playNoise(0.15, 0.05, 400);
    } else if (!player.jumping) {
      if (conMod() >= 2 && player.invuln <= 0) {
        // CON 14+: survive spikes with damage instead of death
        playerTakeDamage(1);
      } else if (player.invuln <= 0) {
        startDeath();
        return;
      }
    }
  }

  // Mushroom gas - INT: resist
  if (tile === T.MUSHROOM_GAS) {
    if (intMod() >= 1) {
      // INT 12+: immune to gas
      spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, 'RESISTED', '#88ffff');
    } else if (player.invuln <= 0 && !player.jumping) {
      playerTakeDamage(1);
      TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#88cc44', 6, 2);
    }
  }

  // Root snare - DEX: escape faster
  if (tile === T.ROOT_SNARE) {
    if (dexMod() >= 2) {
      // DEX 14+: break free instantly
      grid[ny][nx] = T.FLOOR;
      spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, 'DODGED', '#44ff88');
    } else {
      player.snared = 1.5 - dexMod() * 0.3; // DEX reduces snare time
      TAS.audio.playTone(200, 0.1, 'sine', 0.05);
    }
  }

  // Spore cloud - WIS: see through
  if (tile === T.SPORE_CLOUD) {
    if (wisMod() < 1 && !player.jumping) {
      // Disoriented - random push
      TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#aaddff', 8, 2);
    }
  }

  // Heal moss - CON: bonus healing
  if (tile === T.HEAL_MOSS) {
    grid[ny][nx] = T.FLOOR;
    var healAmt = 1 + Math.max(0, conMod());
    player.hp = Math.min(player.maxHp, player.hp + healAmt);
    TAS.audio.playTone(600, 0.12, 'sine', 0.06);
    TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#44ff88', 6, 2);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, '+' + healAmt + 'HP', '#44ff88');
  }

  // Collectibles
  if (tile >= T.KEY_R && tile <= T.KEY_Y) {
    var kn = ['red', 'blue', 'green', 'yellow'][tile - T.KEY_R];
    keys[kn]++;
    grid[ny][nx] = T.FLOOR;
    TAS.audio.playTone(880, 0.1, 'triangle', 0.07);
    var keyScore = 50;
    score += keyScore;
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, '+' + keyScore, '#ffdd44');
  }
  if (tile === T.GEM) {
    grid[ny][nx] = T.FLOOR;
    gems++;
    // CHA: gem score multiplier
    var gemScore = Math.floor(100 * (1 + chaMod() * 0.25) * statB.scoreMult);
    score += gemScore;
    TAS.audio.playTone(1047, 0.08, 'sine', 0.06);
    TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#ffff44', 8, 2);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, '+' + gemScore, '#44ffcc');
  }
  if (tile === T.POTION) {
    grid[ny][nx] = T.FLOOR;
    potions++;
    TAS.audio.playTone(600, 0.12, 'sine', 0.06);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, '+POOP ELIXIR', '#4488ff');
  }
  if (tile === T.BOOTS) {
    grid[ny][nx] = T.FLOOR;
    player.hasBoots = true;
    TAS.audio.playTone(350, 0.1, 'square', 0.06);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, 'GARDEN BOOTS!', '#ffaa22');
  }
  if (tile === T.SHIELD) {
    grid[ny][nx] = T.FLOOR;
    player.hasShield = true;
    TAS.audio.playTone(300, 0.15, 'triangle', 0.06);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, 'SPORE SHIELD!', '#4488cc');
  }
  if (tile === T.STAFF) {
    grid[ny][nx] = T.FLOOR;
    staffPieces++;
    var staffScore = Math.floor(500 * statB.scoreMult);
    score += staffScore;
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 120);
    TAS.particles.spawn(isoX(nx, ny), isoY(nx, ny), '#ff88ff', 16, 3);
    TAS.fx.flash('#ffffff', 0.4);
    triggerShake(4);
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 20, 'MYCELIUM SHARD!', '#ff88ff');
    spawnPopup(isoX(nx, ny), isoY(nx, ny) - 10, '+' + staffScore, '#ffdd44');
  }

  // Switch
  if (tile === T.SWITCH) {
    grid[ny][nx] = T.SWITCH_ON;
    var sw = switches.find(function(s) { return s.gx === nx && s.gy === ny; });
    if (sw) sw.on = true;
    TAS.audio.playTone(660, 0.08, 'square', 0.06);
  }

  // Move
  player.fromGx = player.gx;
  player.fromGy = player.gy;
  player.gx = nx;
  player.gy = ny;
  player.moving = true;
  player.moveT = 0;
}

// === PLAYER DAMAGE ===
function playerTakeDamage(amt) {
  if (player.invuln > 0) return;
  if (player.hasShield) {
    player.hasShield = false;
    TAS.audio.playNoise(0.15, 0.05, 400);
    TAS.fx.flash('#ffffff', 0.2);
    player.invuln = 0.5;
    return;
  }
  player.hp -= amt;
  player.invuln = 1.0;
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06);
  triggerShake(4);
  TAS.particles.spawn(isoX(player.gx, player.gy), isoY(player.gx, player.gy), '#ff4444', 6, 2);
  if (player.hp <= 0) {
    startDeath();
  }
}

function tryExit(nx, ny) {
  var exitDir = -1;
  if (ny < 0 && grid[0][player.gx] >= T.EXIT_UL) exitDir = 0;
  if (nx >= GRID_W && grid[player.gy][GRID_W-1] >= T.EXIT_UL) exitDir = 1;
  if (ny >= GRID_H && grid[GRID_H-1][player.gx] >= T.EXIT_UL) exitDir = 2;
  if (nx < 0 && grid[player.gy][0] >= T.EXIT_UL) exitDir = 3;

  if (exitDir >= 0) {
    if (!isRoomVisited(currentFloor, currentRoom)) {
      visitedRooms.push([currentFloor, currentRoom]);
    }
    if (checkRoomSolved() && !isRoomSolved(currentFloor, currentRoom)) {
      solvedRooms.push([currentFloor, currentRoom]);
      var roomScore = Math.floor(200 * statB.scoreMult);
      score += roomScore;
      spawnPopup(GW / 2, GH / 2, 'ROOM CLEAR +' + roomScore, '#38d973');
    }

    if (exitDir === 1 && currentRoom < 7) { currentRoom++; generateRoom(currentFloor, currentRoom); player.gx = 1; player.gy = 4; }
    else if (exitDir === 3 && currentRoom > 0) { currentRoom--; generateRoom(currentFloor, currentRoom); player.gx = GRID_W-2; player.gy = 4; }
    else if (exitDir === 0 && currentFloor < 4) { currentFloor++; currentRoom = 0; generateRoom(currentFloor, currentRoom); player.gx = 4; player.gy = GRID_H-2; }
    else if (exitDir === 2 && currentFloor > 0) { currentFloor--; currentRoom = 7; generateRoom(currentFloor, currentRoom); player.gx = 4; player.gy = 1; }

    TAS.audio.playTone(440, 0.05, 'sine', 0.05);
    saveProgress();
    return true;
  }
  return false;
}

function startDeath() {
  if (player.hasShield) {
    player.hasShield = false;
    TAS.audio.playNoise(0.2, 0.06, 500);
    TAS.fx.flash('#ffffff', 0.2);
    player.invuln = 1.0;
    return;
  }
  deathAnim = 1.0;
  lives--;
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 80);
  triggerShake(8);
  TAS.particles.spawn(isoX(player.gx, player.gy), isoY(player.gx, player.gy), '#ff4444', 12, 3);
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) { highScore = score; TAS.score.save('solsticetower_hi', score); }
  }
}

function isRoomSolved(f, r) { return solvedRooms.some(function(s) { return s[0] === f && s[1] === r; }); }
function isRoomVisited(f, r) { return visitedRooms.some(function(s) { return s[0] === f && s[1] === r; }); }

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    e.t += dt * e.speed * 3;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    if (e.type === 'spore_creeper' || e.type === 'mold_lurker') {
      // Patrol back and forth (like orb/slime)
      if (e.dir === 0 || e.dir === 2) {
        e.y = e.startY + Math.sin(e.t) * e.patrolDist;
      } else {
        e.x = e.startX + Math.sin(e.t) * e.patrolDist;
      }
    } else if (e.type === 'thorn_spinner') {
      // Circular pattern (like blade)
      e.x = e.startX + Math.cos(e.t) * e.patrolDist;
      e.y = e.startY + Math.sin(e.t) * e.patrolDist;
    } else if (e.type === 'shade_wraith') {
      // Seek player slowly (like ghost)
      var sdx = player.gx - e.x;
      var sdy = player.gy - e.y;
      var sd = Math.sqrt(sdx * sdx + sdy * sdy);
      if (sd > 0.1) {
        e.x += (sdx / sd) * e.speed * dt * 1.5;
        e.y += (sdy / sd) * e.speed * dt * 1.5;
      }
    } else if (e.isBoss) {
      // Boss: combined pattern - patrol + chase
      var bossPhase = Math.floor(e.t / 3) % 3;
      if (bossPhase === 0) {
        // Patrol
        e.x = e.startX + Math.cos(e.t * 0.8) * e.patrolDist;
        e.y = e.startY + Math.sin(e.t * 0.8) * e.patrolDist;
      } else if (bossPhase === 1) {
        // Chase player
        var bdx = player.gx - e.x;
        var bdy = player.gy - e.y;
        var bd = Math.sqrt(bdx * bdx + bdy * bdy);
        if (bd > 0.1) {
          e.x += (bdx / bd) * e.speed * dt * 2;
          e.y += (bdy / bd) * e.speed * dt * 2;
        }
      } else {
        // Pause (wind up)
        e.x += Math.sin(e.t * 8) * 0.02;
      }
    } else {
      // Default patrol
      e.x = e.startX + Math.sin(e.t) * e.patrolDist;
      e.y = e.startY + Math.cos(e.t * 1.3) * e.patrolDist;
    }

    e.gx = Math.round(e.x);
    e.gy = Math.round(e.y);

    // Check collision with player - DEX: dodge chance
    var pdx = player.gx - e.x;
    var pdy = player.gy - e.y;
    if (Math.sqrt(pdx * pdx + pdy * pdy) < 0.6 && deathAnim <= 0 && !player.jumping && player.invuln <= 0) {
      // DEX: dodge chance
      var dodgeChance = dexMod() * 0.1;
      if (Math.random() < dodgeChance) {
        spawnPopup(isoX(player.gx, player.gy), isoY(player.gx, player.gy) - 15, 'DODGE!', '#44ffaa');
        player.invuln = 0.5;
      } else {
        playerTakeDamage(e.isBoss ? 2 : 1);
      }
    }
  }
}

// === ATTACK ENEMY (jump on them) ===
function attackEnemy(e) {
  var dmg = statB.damage + Math.max(0, strMod()); // STR: bonus damage
  e.hp -= dmg;
  e.hitFlash = 0.3;
  TAS.audio.playTone(300, 0.1, 'square', 0.06);
  triggerShake(3);
  TAS.particles.spawn(isoX(e.x, e.y), isoY(e.x, e.y), '#ffaa44', 6, 2);
  if (e.hp <= 0) {
    var killScore = Math.floor((e.isBoss ? 300 : 100) * statB.scoreMult * (1 + chaMod() * 0.1));
    score += killScore;
    spawnPopup(isoX(e.x, e.y), isoY(e.x, e.y) - 15, '+' + killScore, '#ffdd44');
    spawnPopup(isoX(e.x, e.y), isoY(e.x, e.y) - 5, e.label + ' SLAIN', '#ff8844');
    TAS.particles.spawn(isoX(e.x, e.y), isoY(e.x, e.y), '#ff4444', 12, 3);
    triggerShake(e.isBoss ? 8 : 4);
    var idx = enemies.indexOf(e);
    if (idx >= 0) enemies.splice(idx, 1);
  } else {
    spawnPopup(isoX(e.x, e.y), isoY(e.x, e.y) - 10, '-' + dmg, '#ff4444');
  }
}

// === CONVEYOR LOGIC ===
function applyConveyors(dt) {
  var tile = grid[player.gy] && grid[player.gy][player.gx];
  if (!player.moving && tile >= T.CONVEYOR_UL && tile <= T.CONVEYOR_DR) {
    var convDirs = {};
    convDirs[T.CONVEYOR_UL] = [-1, -1];
    convDirs[T.CONVEYOR_UR] = [1, -1];
    convDirs[T.CONVEYOR_DL] = [-1, 1];
    convDirs[T.CONVEYOR_DR] = [1, 1];
    var cd = convDirs[tile];
    if (cd) {
      // DEX: resist conveyors
      var conveyorDelay = 0.4 + dexMod() * 0.1;
      player.conveyorTimer = (player.conveyorTimer || 0) + dt;
      if (player.conveyorTimer > conveyorDelay) {
        player.conveyorTimer = 0;
        movePlayer(cd[0], 0);
        if (!player.moving) movePlayer(0, cd[1]);
      }
    }
  }
}

// === PLATFORM UPDATE ===
function updatePlatforms(dt) {
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    p.t += dt * p.speed * 2;
    var oldGx = p.gx, oldGy = p.gy;
    if (p.dir === 0 || p.dir === 2) {
      p.gy = p.startGy + Math.round(Math.sin(p.t) * p.range);
    } else {
      p.gx = p.startGx + Math.round(Math.sin(p.t) * p.range);
    }
    p.gx = TAS.math.clamp(p.gx, 1, GRID_W - 2);
    p.gy = TAS.math.clamp(p.gy, 1, GRID_H - 2);
    if (player.gx === oldGx && player.gy === oldGy && !player.moving) {
      player.gx = p.gx;
      player.gy = p.gy;
    }
  }
}

// === VANISHING TILES ===
var vanishTimers = {};
function updateVanish(dt) {
  var key = player.gx + ',' + player.gy;
  if (grid[player.gy] && grid[player.gy][player.gx] === T.VANISH) {
    if (!vanishTimers[key]) vanishTimers[key] = 0;
    vanishTimers[key] += dt;
    if (vanishTimers[key] > 1.0) {
      grid[player.gy][player.gx] = T.PIT;
      delete vanishTimers[key];
      startDeath();
    }
  }
}

// === SCORE POPUP UPDATE ===
function updatePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) {
      scorePopups.splice(i, 1);
    }
  }
}

function drawPopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, Math.floor(p.x), Math.floor(p.y));
  }
  ctx.globalAlpha = 1;
}

// === SCREEN SHAKE UPDATE ===
function updateShake(dt) {
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= shakeDecay;
  } else {
    shakeX = 0;
    shakeY = 0;
    shakeMag = 0;
  }
}

// === SAVE/LOAD ===
function saveProgress() {
  try {
    var data = { floor: currentFloor, room: currentRoom, lives: lives, score: score, gems: gems, potions: potions, keys: keys, staffPieces: staffPieces, solvedRooms: solvedRooms, visitedRooms: visitedRooms, hp: player.hp, tutorialSeen: tutorialSeen };
    localStorage.setItem('solsticetower_save', JSON.stringify(data));
  } catch(e) { console.error('Save failed:', e); }
}

function loadProgress() {
  try {
    var raw = localStorage.getItem('solsticetower_save');
    if (raw) {
      var data = JSON.parse(raw);
      currentFloor = data.floor || 0;
      currentRoom = data.room || 0;
      lives = data.lives || baseLives;
      score = data.score || 0;
      gems = data.gems || 0;
      potions = data.potions || 0;
      keys = data.keys || { red: 0, blue: 0, green: 0, yellow: 0 };
      staffPieces = data.staffPieces || 0;
      solvedRooms = data.solvedRooms || [];
      visitedRooms = data.visitedRooms || [];
      player.hp = data.hp || player.maxHp;
      tutorialSeen = data.tutorialSeen || false;
      return true;
    }
  } catch(e) { console.error('Load failed:', e); }
  return false;
}

// === START GAME ===
function startGame() {
  state = 'playing';
  if (!loadProgress()) {
    score = 0;
    lives = baseLives + statB.lives;
    currentFloor = 0; currentRoom = 0;
    gems = 0; potions = 0; staffPieces = 0;
    keys = { red: 0, blue: 0, green: 0, yellow: 0 };
    solvedRooms = []; visitedRooms = [];
    player.hp = player.maxHp;
  }
  // Show tutorial on first play
  if (!tutorialSeen) {
    showTutorial = true;
    tutorialPage = 0;
  }
  generateRoom(currentFloor, currentRoom);
  TAS.particles.clear();
  deathAnim = 0;
}

function newGame() {
  localStorage.removeItem('solsticetower_save');
  score = 0;
  lives = baseLives + statB.lives;
  currentFloor = 0; currentRoom = 0;
  gems = 0; potions = 0; staffPieces = 0;
  keys = { red: 0, blue: 0, green: 0, yellow: 0 };
  solvedRooms = []; visitedRooms = [];
  player.hp = player.maxHp;
  state = 'playing';
  generateRoom(currentFloor, currentRoom);
  TAS.particles.clear();
  deathAnim = 0;
}

// === INPUT HANDLING ===
var inputCooldown = 0;
var jumpPressed = false;
var usePressed = false;

function handleInput(dt) {
  inputCooldown -= dt;
  if (inputCooldown > 0) return;

  var k = TAS.input.keys;
  var t = TAS.input.touch;

  // DEX: movement speed (lower cooldown = faster)
  var moveCooldown = Math.max(0.06, 0.12 - dexMod() * 0.015);

  // NES-style D-pad: Arrow keys + WASD + touch D-pad
  // Up = iso up-left (-y), Down = iso down-right (+y)
  // Left = iso left (-x), Right = iso right (+x)
  if ((k['ArrowUp'] || k['KeyW'] || t.up) && !player.moving) {
    movePlayer(0, -1);
    inputCooldown = moveCooldown;
  } else if ((k['ArrowDown'] || k['KeyS'] || t.down) && !player.moving) {
    movePlayer(0, 1);
    inputCooldown = moveCooldown;
  } else if ((k['ArrowLeft'] || k['KeyA'] || t.left) && !player.moving) {
    movePlayer(-1, 0);
    inputCooldown = moveCooldown;
  } else if ((k['ArrowRight'] || k['KeyD'] || t.right) && !player.moving) {
    movePlayer(1, 0);
    inputCooldown = moveCooldown;
  }

  // A Button: Jump (NES A = Space/Z/touch-a)
  if ((k['Space'] || k['KeyZ'] || t.a) && !jumpPressed) {
    jumpPressed = true;
    if (!player.jumping && !player.moving) {
      player.jumping = true;
      player.jumpT = 0;
      TAS.audio.playTone(440, 0.06, 'square', 0.05, 660);
    }
  }
  if (!k['Space'] && !k['KeyZ'] && !t.a) jumpPressed = false;

  // B Button: Use potion (NES B = X/Shift/touch-b)
  // INT: longer potion effect
  if ((k['KeyX'] || k['ShiftLeft'] || t.b) && !usePressed) {
    usePressed = true;
    if (potions > 0) {
      potions--;
      potionActive = 3.0 + intMod() * 1.0; // INT: longer reveal
      TAS.audio.playTone(800, 0.15, 'sine', 0.06, 400);
      TAS.particles.spawn(isoX(player.gx, player.gy), isoY(player.gx, player.gy), '#88ffff', 10, 2);
      spawnPopup(isoX(player.gx, player.gy), isoY(player.gx, player.gy) - 15, 'SPORES REVEALED!', '#88ffff');
    }
  }
  if (!k['KeyX'] && !k['ShiftLeft'] && !t.b) usePressed = false;

  // Map toggle (M / Tab) - WIS: reveals more on map
  if (k['KeyM'] || k['Tab']) { showMap = true; } else { showMap = false; }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateShake(dt);
  updatePopups(dt);
  updateAmbientParticles(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    winAnim += dt;
    if (winAnim > 5 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    // Tutorial overlay
    if (showTutorial) {
      if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
        tutorialPage++;
        if (tutorialPage >= 4) {
          showTutorial = false;
          tutorialSeen = true;
          saveProgress();
        }
      }
      return;
    }

    roomTimer += dt;

    // Player invulnerability timer
    if (player.invuln > 0) player.invuln -= dt;

    // Snare timer
    if (player.snared > 0) {
      player.snared -= dt;
      if (player.snared <= 0) {
        spawnPopup(isoX(player.gx, player.gy), isoY(player.gx, player.gy) - 10, 'FREE!', '#44ff88');
      }
    }

    // Death animation
    if (deathAnim > 0) {
      deathAnim -= dt;
      if (deathAnim <= 0) {
        if (lives > 0) {
          player.hp = player.maxHp;
          generateRoom(currentFloor, currentRoom);
        }
      }
      return;
    }

    // Player movement interpolation
    // DEX: faster animation
    var moveSpeed = 6 + dexMod() * 0.5;
    if (player.moving) {
      player.moveT += dt * moveSpeed;
      if (player.moveT >= 1) {
        player.moving = false;
        player.moveT = 1;
        if (checkRoomSolved()) roomSolved = true;
      }
    }

    // Jump animation
    if (player.jumping) {
      player.jumpT += dt * 3;
      player.z = Math.sin(player.jumpT * Math.PI) * 1.5;
      if (player.jumpT >= 1) {
        player.jumping = false;
        player.z = 0;
        player.jumpT = 0;
        // Landing on pit check
        var tile = grid[player.gy] && grid[player.gy][player.gx];
        if (tile === T.PIT && !player.hasBoots) {
          startDeath();
        }
        // Jump attack: check enemies below
        for (var ei = enemies.length - 1; ei >= 0; ei--) {
          var e = enemies[ei];
          var adx = player.gx - e.x;
          var ady = player.gy - e.y;
          if (Math.sqrt(adx * adx + ady * ady) < 1.0) {
            attackEnemy(e);
            // STR: bounce after stomp
            if (strMod() >= 1) {
              player.jumping = true;
              player.jumpT = 0;
            }
            break;
          }
        }
      }
    }

    handleInput(dt);
    updateEnemies(dt);
    applyConveyors(dt);
    updatePlatforms(dt);
    updateVanish(dt);

    // Potion timer
    if (potionActive > 0) potionActive -= dt;

    // Victory check
    if (currentFloor === 4 && currentRoom === 7 && isRoomSolved(4, 7) && staffPieces >= 4) {
      state = 'victory';
      winAnim = 0;
      if (score > highScore) { highScore = score; TAS.score.save('solsticetower_hi', score); }
      TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1047,0.3]], 150);
    }
  }
}

// === DRAWING ===

// Darken color helper
function darken(hex, amount) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return '#' + Math.floor(r * amount).toString(16).padStart(2, '0') +
    Math.floor(g * amount).toString(16).padStart(2, '0') +
    Math.floor(b * amount).toString(16).padStart(2, '0');
}

function lighten(hex, amount) {
  var r = Math.min(255, parseInt(hex.slice(1, 3), 16) + Math.floor(amount * 255));
  var g = Math.min(255, parseInt(hex.slice(3, 5), 16) + Math.floor(amount * 255));
  var b = Math.min(255, parseInt(hex.slice(5, 7), 16) + Math.floor(amount * 255));
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

// Draw isometric tile (NES pixel style - clean edges)
function drawIsoTile(gx, gy, topColor, leftColor, rightColor, height) {
  var x = isoX(gx, gy);
  var y = isoY(gx, gy);
  var h = (height || 1) * TD;

  // Top face
  ctx.fillStyle = topColor;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), Math.floor(y - h));
  ctx.lineTo(Math.floor(x + TW/2), Math.floor(y + TH/2 - h));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH - h));
  ctx.lineTo(Math.floor(x - TW/2), Math.floor(y + TH/2 - h));
  ctx.closePath();
  ctx.fill();

  // Left face
  ctx.fillStyle = leftColor;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x - TW/2), Math.floor(y + TH/2 - h));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH - h));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH));
  ctx.lineTo(Math.floor(x - TW/2), Math.floor(y + TH/2));
  ctx.closePath();
  ctx.fill();

  // Right face
  ctx.fillStyle = rightColor;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x + TW/2), Math.floor(y + TH/2 - h));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH - h));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH));
  ctx.lineTo(Math.floor(x + TW/2), Math.floor(y + TH/2));
  ctx.closePath();
  ctx.fill();
}

// Draw flat diamond tile (no depth)
function drawIsoFlat(gx, gy, color, alpha) {
  var x = isoX(gx, gy);
  var y = isoY(gx, gy);
  ctx.globalAlpha = alpha || 1;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(Math.floor(x), Math.floor(y));
  ctx.lineTo(Math.floor(x + TW/2), Math.floor(y + TH/2));
  ctx.lineTo(Math.floor(x), Math.floor(y + TH));
  ctx.lineTo(Math.floor(x - TW/2), Math.floor(y + TH/2));
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

// Draw shadow under floating objects
function drawShadow(gx, gy, size) {
  var x = isoX(gx, gy);
  var y = isoY(gx, gy) + TH/2;
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(Math.floor(x), Math.floor(y), size * TW/4, size * TH/4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// === NES-STYLE BASELING PLAYER ===
function drawPlayer() {
  var gx = player.gx, gy = player.gy;
  if (player.moving) {
    gx = TAS.math.lerp(player.fromGx, player.gx, player.moveT);
    gy = TAS.math.lerp(player.fromGy, player.gy, player.moveT);
  }
  var x = isoX(gx, gy);
  var baseY = isoY(gx, gy);
  var jumpOff = player.z * TD;
  var y = baseY - jumpOff;

  // Shadow
  if (player.jumping) drawShadow(gx, gy, 0.6);

  // Death flash
  if (deathAnim > 0 && Math.floor(deathAnim * 10) % 2 === 0) return;

  // Invulnerability blink
  if (player.invuln > 0 && Math.floor(player.invuln * 8) % 2 === 0) return;

  // Snare indicator
  if (player.snared > 0) {
    ctx.fillStyle = '#664422';
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(Math.floor(x), Math.floor(y + 2), 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  var _anim = (deathAnim > 0) ? 'ko' : player.jumping ? 'jump' : (player.moving ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, Math.floor(x), Math.floor(y - 6), 18, { flipX: player.dir === 3, frame: frame, anim: _anim })) {
  // NES-style pixel baseling body
  var pc = statB.color || '#44dd88';
  var pcDark = darken(pc, 0.6);
  var pcLight = lighten(pc, 0.15);

  // Feet (2px blocks)
  drawPixelRect(x - 4, y + 1, 3, 2, pcDark);
  drawPixelRect(x + 1, y + 1, 3, 2, pcDark);

  // Body (round-ish pixel blob)
  drawPixelRect(x - 5, y - 6, 10, 8, pc);
  drawPixelRect(x - 6, y - 5, 12, 6, pc);
  drawPixelRect(x - 4, y - 7, 8, 1, pc);

  // Belly highlight
  drawPixelRect(x - 3, y - 4, 6, 4, pcLight);

  // Eyes (2px white dots with 1px black pupils)
  drawPixelRect(x - 3, y - 6, 2, 2, '#fff');
  drawPixelRect(x + 1, y - 6, 2, 2, '#fff');
  // Pupils face direction
  var pupX = player.dir === 3 ? -1 : player.dir === 1 ? 1 : 0;
  drawPixelRect(x - 3 + pupX, y - 6, 1, 1, '#111');
  drawPixelRect(x + 2 + pupX, y - 6, 1, 1, '#111');

  // Wizard hat (NES triangle)
  ctx.fillStyle = '#2a1566';
  drawPixelRect(x - 7, y - 9, 14, 2, '#3a2577');
  drawPixelRect(x - 5, y - 11, 10, 2, '#2a1566');
  drawPixelRect(x - 3, y - 13, 6, 2, '#2a1566');
  drawPixelRect(x - 1, y - 15, 2, 2, '#2a1566');
  // Star on hat
  drawPixelRect(x - 1, y - 13, 2, 2, '#ffdd44');

  // Baseling icon letter
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon || 'B', Math.floor(x), Math.floor(y - 1));
  }

  // Shield glow
  if (player.hasShield) {
    ctx.strokeStyle = '#44ddff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.2;
    ctx.beginPath();
    ctx.ellipse(Math.floor(x), Math.floor(y - 5), 10, 12, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Boots glow
  if (player.hasBoots) {
    ctx.fillStyle = '#ffaa22';
    ctx.globalAlpha = 0.6;
    drawPixelRect(x - 5, y + 1, 4, 2, '#ffaa22');
    drawPixelRect(x + 1, y + 1, 4, 2, '#ffaa22');
    ctx.globalAlpha = 1;
  }
}

// === NES-STYLE BASELING ENEMIES ===
function drawEnemy(e) {
  var x = isoX(e.x, e.y);
  var y = isoY(e.x, e.y);
  var bob = Math.sin(e.t * 2) * 2;
  var eInfo = ENEMY_TYPES[e.type];
  if (!eInfo) return;
  var ec = eInfo.color;
  var ecEye = eInfo.eyeColor;
  var sz = eInfo.size;

  // Hit flash
  if (e.hitFlash > 0) {
    ec = '#ffffff';
    ecEye = '#ffffff';
  }

  drawShadow(e.x, e.y, 0.5);

  if (e.type === 'spore_creeper') {
    // Mushroom-shaped creature - NES pixel style
    // Cap
    drawPixelRect(x - sz, y - sz - 2 + bob, sz * 2, sz, ec);
    drawPixelRect(x - sz + 1, y - sz - 3 + bob, sz * 2 - 2, 1, lighten(ec, 0.2));
    // Spots on cap
    drawPixelRect(x - 2, y - sz - 1 + bob, 2, 2, lighten(ec, 0.3));
    drawPixelRect(x + 2, y - sz + bob, 1, 1, lighten(ec, 0.3));
    // Stem
    drawPixelRect(x - 2, y - 2 + bob, 4, 4, darken(ec, 0.7));
    // Eyes
    drawPixelRect(x - 3, y - sz + 2 + bob, 2, 2, ecEye);
    drawPixelRect(x + 1, y - sz + 2 + bob, 2, 2, ecEye);
    drawPixelRect(x - 3, y - sz + 2 + bob, 1, 1, '#111');
    drawPixelRect(x + 2, y - sz + 2 + bob, 1, 1, '#111');
  } else if (e.type === 'mold_lurker') {
    // Blob with tendrils - NES pixel style
    var squish = 1 + Math.abs(Math.sin(e.t * 3)) * 0.2;
    drawPixelRect(x - sz, y - sz/2 + Math.abs(bob), sz * 2, Math.floor(sz * squish), ec);
    drawPixelRect(x - sz + 1, y - sz/2 - 1 + Math.abs(bob), sz * 2 - 2, 1, lighten(ec, 0.15));
    // Drip tendrils
    for (var ti = 0; ti < 3; ti++) {
      var tx = x - 4 + ti * 4;
      var tendLen = 2 + Math.floor(Math.sin(e.t * 2 + ti) * 2);
      drawPixelRect(tx, y + Math.abs(bob), 1, tendLen, darken(ec, 0.5));
    }
    // Eyes
    drawPixelRect(x - 3, y - sz/2 + 2 + Math.abs(bob), 2, 2, ecEye);
    drawPixelRect(x + 1, y - sz/2 + 2 + Math.abs(bob), 2, 2, ecEye);
    drawPixelRect(x - 2, y - sz/2 + 2 + Math.abs(bob), 1, 1, '#111');
    drawPixelRect(x + 2, y - sz/2 + 2 + Math.abs(bob), 1, 1, '#111');
  } else if (e.type === 'thorn_spinner') {
    // Spinning vine/thorn ball - NES pixel style
    var angle = e.t * 5;
    ctx.save();
    ctx.translate(Math.floor(x), Math.floor(y - 5));
    ctx.rotate(angle);
    // Core
    drawPixelRect(-3, -3, 6, 6, ec);
    // Thorns (pixel rectangles at cardinal)
    drawPixelRect(-1, -sz, 2, 4, darken(ec, 0.7));
    drawPixelRect(-1, sz - 4, 2, 4, darken(ec, 0.7));
    drawPixelRect(-sz, -1, 4, 2, darken(ec, 0.7));
    drawPixelRect(sz - 4, -1, 4, 2, darken(ec, 0.7));
    // Center eye
    drawPixelRect(-1, -1, 2, 2, ecEye);
    ctx.restore();
  } else if (e.type === 'shade_wraith') {
    // Ghostly floating form - NES pixel style
    ctx.globalAlpha = 0.6 + Math.sin(e.t * 2) * 0.2;
    // Body
    drawPixelRect(x - sz, y - sz * 2 + bob, sz * 2, sz * 2, ec);
    drawPixelRect(x - sz + 1, y - sz * 2 - 1 + bob, sz * 2 - 2, 1, lighten(ec, 0.2));
    // Wavy bottom (pixel blocks)
    for (var wi = 0; wi < 4; wi++) {
      var wy = Math.floor(Math.sin(e.t * 3 + wi * 1.5) * 2);
      drawPixelRect(x - sz + wi * 3, y + wy + bob, 2, 3, ec);
    }
    // Eyes (hollow)
    drawPixelRect(x - 3, y - sz + bob, 2, 3, '#111');
    drawPixelRect(x + 1, y - sz + bob, 2, 3, '#111');
    drawPixelRect(x - 3, y - sz + bob, 1, 1, ecEye);
    drawPixelRect(x + 2, y - sz + bob, 1, 1, ecEye);
    ctx.globalAlpha = 1;
  } else if (e.isBoss) {
    // Boss: large imposing creature
    var bSz = sz;
    var bBob = Math.sin(e.t * 1.5) * 3;
    // Large body
    drawPixelRect(x - bSz, y - bSz * 2 + bBob, bSz * 2, bSz * 2, ec);
    drawPixelRect(x - bSz - 1, y - bSz * 2 + 2 + bBob, bSz * 2 + 2, bSz * 2 - 4, ec);
    // Crown/horns
    drawPixelRect(x - bSz + 1, y - bSz * 2 - 3 + bBob, 3, 3, darken(ec, 0.6));
    drawPixelRect(x + bSz - 4, y - bSz * 2 - 3 + bBob, 3, 3, darken(ec, 0.6));
    // Face highlight
    drawPixelRect(x - bSz + 2, y - bSz + bBob, bSz * 2 - 4, bSz - 2, lighten(ec, 0.15));
    // Eyes (large, menacing)
    drawPixelRect(x - 4, y - bSz - 1 + bBob, 3, 3, ecEye);
    drawPixelRect(x + 1, y - bSz - 1 + bBob, 3, 3, ecEye);
    drawPixelRect(x - 3, y - bSz + bBob, 2, 1, '#220000');
    drawPixelRect(x + 2, y - bSz + bBob, 2, 1, '#220000');
    // Boss HP bar
    if (e.hp < e.maxHp) {
      var barW = bSz * 2 + 4;
      var barX = x - barW / 2;
      var barY = y - bSz * 2 - 8 + bBob;
      ctx.fillStyle = '#333';
      ctx.fillRect(Math.floor(barX), Math.floor(barY), barW, 3);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(Math.floor(barX), Math.floor(barY), Math.floor(barW * (e.hp / e.maxHp)), 3);
    }
    // Boss label
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(e.label, Math.floor(x), Math.floor(y - bSz * 2 - 10 + bBob));
  }
}

// === DRAW ROOM TILES ===
function drawRoom() {
  var pal = FLOOR_PALETTES[currentFloor];

  // Draw floor shadow/base
  ctx.fillStyle = '#0a0a12';
  ctx.beginPath();
  ctx.moveTo(isoX(0, 0), isoY(0, 0) + TH);
  ctx.lineTo(isoX(GRID_W, 0), isoY(GRID_W, 0) + TH);
  ctx.lineTo(isoX(GRID_W, GRID_H), isoY(GRID_W, GRID_H) + TH);
  ctx.lineTo(isoX(0, GRID_H), isoY(0, GRID_H) + TH);
  ctx.closePath();
  ctx.fill();

  // Sort draw order: back to front
  for (var gy = 0; gy < GRID_H; gy++) {
    for (var gx = 0; gx < GRID_W; gx++) {
      var tile = grid[gy][gx];
      var x = isoX(gx, gy);
      var y = isoY(gx, gy);

      if (tile === T.EMPTY || tile === T.PIT) {
        if (tile === T.PIT) {
          drawIsoFlat(gx, gy, '#0a0505', 1);
          ctx.strokeStyle = '#331111';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x + TW/2, y + TH/2); ctx.lineTo(x, y + TH); ctx.lineTo(x - TW/2, y + TH/2); ctx.closePath();
          ctx.stroke();
        }
        continue;
      }

      if (tile === T.FLOOR || tile === T.SWITCH_ON) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        if (tile === T.SWITCH_ON) {
          ctx.fillStyle = '#44ff44';
          ctx.beginPath();
          ctx.arc(Math.floor(x), Math.floor(y + TH/2 - TD * 0.5), 3, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (tile === T.WALL) {
        drawIsoTile(gx, gy, '#555566', '#333344', '#222233', 2);
        // NES-style brick pattern
        ctx.strokeStyle = '#444455';
        ctx.lineWidth = 0.5;
        var wy = y - TD * 2 + TH/2;
        ctx.beginPath();
        ctx.moveTo(x - 6, wy + 2); ctx.lineTo(x + 6, wy + 2);
        ctx.moveTo(x - 4, wy + 6); ctx.lineTo(x + 4, wy + 6);
        ctx.stroke();
      } else if (tile === T.CRACKED) {
        // Cracked wall - breakable with STR
        drawIsoTile(gx, gy, '#4a4a55', '#2a2a33', '#1a1a22', 2);
        ctx.strokeStyle = '#666677';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        var cwx = x, cwy = y - TD;
        ctx.moveTo(cwx - 3, cwy - 2); ctx.lineTo(cwx + 1, cwy + 2);
        ctx.moveTo(cwx + 2, cwy - 3); ctx.lineTo(cwx - 1, cwy + 1);
        ctx.moveTo(cwx - 2, cwy + 3); ctx.lineTo(cwx + 3, cwy);
        ctx.stroke();
        // INT: hint glow if player has potion active
        if (potionActive > 0 || strMod() >= 1) {
          ctx.fillStyle = '#ffaa44';
          ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
          ctx.beginPath();
          ctx.arc(Math.floor(x), Math.floor(y - TD), 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (tile === T.BLOCK) {
        drawIsoTile(gx, gy, '#887744', '#665522', '#554411', 1.5);
        // NES cross pattern
        ctx.strokeStyle = '#aa9955';
        ctx.lineWidth = 1;
        var bty = y + TH/2 - TD * 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 4, bty); ctx.lineTo(x + 4, bty);
        ctx.moveTo(x, bty - 3); ctx.lineTo(x, bty + 3);
        ctx.stroke();
      } else if (tile === T.PLATE) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.3);
        ctx.fillStyle = '#ffaa33';
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.2;
        drawIsoFlat(gx, gy, '#ffaa33', 0.5);
        ctx.globalAlpha = 1;
      } else if (tile >= T.DOOR_R && tile <= T.DOOR_Y) {
        var dc = DOOR_COLORS[tile];
        drawIsoTile(gx, gy, dc, darken(dc, 0.6), darken(dc, 0.4), 2);
        // Keyhole
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y + TH/2 - TD), 2, 0, Math.PI * 2);
        ctx.fill();
        drawPixelRect(x - 0.5, y + TH/2 - TD, 1, 4, '#000');
      } else if (tile >= T.KEY_R && tile <= T.KEY_Y) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        var kColor = KEY_COLORS[tile];
        var keyBob = Math.sin(frame * 0.08) * 2;
        // NES-style key
        ctx.fillStyle = kColor;
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y - 2 + keyBob), 4, 0, Math.PI * 2);
        ctx.fill();
        drawPixelRect(x - 1, y + 2 + keyBob, 2, 5, kColor);
        drawPixelRect(x - 3, y + 5 + keyBob, 3, 1.5, kColor);
      } else if (tile === T.SWITCH) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        drawPixelRect(x - 1, y + TH/2 - TD - 6, 2, 6, '#888');
        ctx.fillStyle = '#cc4444';
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y + TH/2 - TD - 7), 3, 0, Math.PI * 2);
        ctx.fill();
      } else if (tile >= T.CONVEYOR_UL && tile <= T.CONVEYOR_DR) {
        drawIsoTile(gx, gy, '#3a3a4a', '#2a2a3a', '#1e1e2e', 0.4);
        ctx.fillStyle = '#88aaff';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1 + gx + gy) * 0.3;
        var arrowMap = {};
        arrowMap[T.CONVEYOR_UL] = [-3, -2];
        arrowMap[T.CONVEYOR_UR] = [3, -2];
        arrowMap[T.CONVEYOR_DL] = [-3, 2];
        arrowMap[T.CONVEYOR_DR] = [3, 2];
        var ar = arrowMap[tile];
        ctx.beginPath();
        ctx.moveTo(x + ar[0] * 2, y + TH/2 - TD*0.4 + ar[1] * 2);
        ctx.lineTo(x + ar[0], y + TH/2 - TD*0.4 + ar[1] - 2);
        ctx.lineTo(x + ar[0], y + TH/2 - TD*0.4 + ar[1] + 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (tile === T.PLATFORM) {
        var plat = platforms.find(function(p) { return p.startGx === gx && p.startGy === gy; });
        if (plat) {
          drawIsoTile(plat.gx, plat.gy, '#6688aa', '#4466aa', '#335599', 0.6);
          ctx.fillStyle = '#aaccff';
          ctx.globalAlpha = 0.5;
          ctx.beginPath();
          ctx.arc(isoX(plat.gx, plat.gy), isoY(plat.gx, plat.gy) + TH/2 - TD*0.6, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      } else if (tile === T.VANISH) {
        var vkey = gx + ',' + gy;
        var vt = vanishTimers[vkey] || 0;
        var valpha = 1 - vt * 0.8;
        ctx.globalAlpha = valpha;
        drawIsoTile(gx, gy, '#aa6644', '#884422', '#663311', 0.5);
        ctx.globalAlpha = 1;
        if (vt > 0.3) {
          ctx.strokeStyle = '#ffaa44';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x - 3, y + TH/2 - 4); ctx.lineTo(x + 2, y + TH/2 - 2);
          ctx.moveTo(x + 1, y + TH/2 - 5); ctx.lineTo(x - 2, y + TH/2);
          ctx.stroke();
        }
      } else if (tile >= T.EXIT_UL && tile <= T.EXIT_DR) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        ctx.fillStyle = '#38d973';
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.06) * 0.2;
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y + TH/2 - TD*0.5), 5, 0, Math.PI * 2);
        ctx.fill();
        var edir = tile - T.EXIT_UL;
        var earrows = [[-2,-4],[4,-2],[-2,4],[-4,-2]];
        var ea = earrows[edir];
        ctx.beginPath();
        ctx.moveTo(x + ea[0]*2, y + TH/2 - TD*0.5 + ea[1]*2);
        ctx.lineTo(x + ea[0]*2 - 2, y + TH/2 - TD*0.5 + ea[1]*2 - 2);
        ctx.lineTo(x + ea[0]*2 + 2, y + TH/2 - TD*0.5 + ea[1]*2 + 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (tile === T.GEM) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        var gemBob = Math.sin(frame * 0.1) * 2;
        // NES-style spore gem
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.moveTo(x, y - 4 + gemBob);
        ctx.lineTo(x + 4, y + gemBob);
        ctx.lineTo(x, y + 3 + gemBob);
        ctx.lineTo(x - 4, y + gemBob);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#7affb8';
        ctx.beginPath();
        ctx.moveTo(x, y - 4 + gemBob);
        ctx.lineTo(x + 2, y - 1 + gemBob);
        ctx.lineTo(x, y + gemBob);
        ctx.lineTo(x - 2, y - 1 + gemBob);
        ctx.closePath();
        ctx.fill();
        // CHA sparkle
        if (chaMod() > 0 && frame % 20 < 5) {
          drawPixelRect(x + 3, y - 5 + gemBob, 2, 2, '#ffffff');
        }
      } else if (tile === T.POTION) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        // NES potion bottle
        drawPixelRect(x - 3, y - 2, 6, 7, '#2244aa');
        drawPixelRect(x - 2, y - 1, 4, 5, '#4488ff');
        drawPixelRect(x - 1, y - 4, 2, 3, '#886633');
        // Liquid shimmer
        if (frame % 30 < 10) drawPixelRect(x - 1, y, 2, 2, '#66aaff');
      } else if (tile === T.BOOTS) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        drawPixelRect(x - 4, y, 3, 5, '#cc6622');
        drawPixelRect(x + 1, y, 3, 5, '#cc6622');
        drawPixelRect(x - 4, y - 1, 3, 2, '#ffaa44');
        drawPixelRect(x + 1, y - 1, 3, 2, '#ffaa44');
      } else if (tile === T.SHIELD) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        ctx.fillStyle = '#4488cc';
        ctx.beginPath();
        ctx.moveTo(x, y - 5);
        ctx.lineTo(x + 5, y - 2);
        ctx.lineTo(x + 4, y + 3);
        ctx.lineTo(x, y + 5);
        ctx.lineTo(x - 4, y + 3);
        ctx.lineTo(x - 5, y - 2);
        ctx.closePath();
        ctx.fill();
        drawPixelRect(x - 1, y - 1, 2, 2, '#66aaee');
      } else if (tile === T.STAFF) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        var stBob = Math.sin(frame * 0.06) * 3;
        ctx.fillStyle = '#ff88ff';
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y - 5 + stBob), 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        drawPixelRect(x - 1, y - 8 + stBob, 2, 12, '#ffaaff');
        ctx.fillStyle = '#ff44ff';
        ctx.beginPath();
        ctx.arc(Math.floor(x), Math.floor(y - 9 + stBob), 3, 0, Math.PI * 2);
        ctx.fill();
      } else if (tile === T.SPIKES) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        ctx.fillStyle = '#999';
        for (var si = 0; si < 3; si++) {
          ctx.beginPath();
          ctx.moveTo(x - 4 + si * 4, y + TH/2 - TD*0.5);
          ctx.lineTo(x - 2 + si * 4, y + TH/2 - TD*0.5 - 5);
          ctx.lineTo(x + si * 4, y + TH/2 - TD*0.5);
          ctx.fill();
        }
      } else if (tile === T.ICE) {
        drawIsoTile(gx, gy, '#aaddff', '#88bbdd', '#6699bb', 0.5);
      } else if (tile === T.MUSHROOM_GAS) {
        // Toxic mushroom gas cloud
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        ctx.fillStyle = '#88cc44';
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08 + gx * 3) * 0.15;
        ctx.beginPath();
        ctx.arc(Math.floor(x - 2), Math.floor(y + TH/4), 5, 0, Math.PI * 2);
        ctx.arc(Math.floor(x + 3), Math.floor(y + TH/4 - 2), 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // WIS: visible warning if wisdom high
        if (wisMod() >= 1 || potionActive > 0) {
          ctx.fillStyle = '#ffaa00';
          ctx.font = 'bold 6px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', Math.floor(x), Math.floor(y - 2));
        }
      } else if (tile === T.ROOT_SNARE) {
        // Tangling roots
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        ctx.strokeStyle = '#664422';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(x - 5, y + TH/2 - 2);
        ctx.quadraticCurveTo(x, y + TH/2 - 6, x + 5, y + TH/2 - 2);
        ctx.stroke();
        ctx.moveTo(x - 3, y + TH/2);
        ctx.quadraticCurveTo(x + 2, y + TH/2 - 4, x + 4, y + TH/2 + 1);
        ctx.stroke();
        // WIS warning
        if (wisMod() >= 1 || potionActive > 0) {
          ctx.fillStyle = '#ffaa00';
          ctx.font = 'bold 6px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', Math.floor(x), Math.floor(y - 2));
        }
      } else if (tile === T.SPORE_CLOUD) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        // Floating spore particles
        ctx.globalAlpha = 0.25 + Math.sin(frame * 0.05 + gy) * 0.1;
        ctx.fillStyle = '#aaddff';
        for (var sci = 0; sci < 4; sci++) {
          var scx = x - 4 + Math.sin(frame * 0.03 + sci * 2) * 5;
          var scy = y + TH/4 - 3 + Math.cos(frame * 0.04 + sci) * 3;
          ctx.beginPath();
          ctx.arc(Math.floor(scx), Math.floor(scy), 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      } else if (tile === T.HEAL_MOSS) {
        drawIsoTile(gx, gy, pal.top, pal.left, pal.right, 0.5);
        // Glowing green moss
        ctx.fillStyle = '#44ff88';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.07) * 0.2;
        drawPixelRect(x - 4, y + TH/4 - 2, 3, 2, '#44ff88');
        drawPixelRect(x, y + TH/4 - 1, 4, 2, '#33dd66');
        drawPixelRect(x - 2, y + TH/4, 2, 1, '#66ffaa');
        ctx.globalAlpha = 1;
        // Plus symbol
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.7;
        drawPixelRect(x - 1, y - 3, 2, 5, '#44ff88');
        drawPixelRect(x - 2, y - 1, 4, 1, '#44ff88');
        ctx.globalAlpha = 1;
      }
    }

    // Draw enemies and player at correct depth
    for (var ei2 = 0; ei2 < enemies.length; ei2++) {
      if (Math.round(enemies[ei2].y) === gy) drawEnemy(enemies[ei2]);
    }
    if (Math.round(player.gy) === gy || (player.moving && Math.round(TAS.math.lerp(player.fromGy, player.gy, player.moveT)) === gy)) {
      drawPlayer();
    }
  }
}

// === DRAW HUD ===
function drawHUD() {
  var barH = 32;
  ctx.fillStyle = 'rgba(10,5,20,0.9)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';

  // Baseling name + level
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.fillText(statB.name + (statB.level > 0 ? ' Lv' + statB.level : ''), 6, 12);

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('SCORE:' + score, 6, 24);

  // Floor/Room + Zone name
  ctx.fillStyle = '#3cacd7';
  ctx.textAlign = 'center';
  ctx.fillText(ZONE_NAMES[currentFloor] + ' ' + (currentRoom + 1) + '/8', GW / 2, 12);

  // HP bar
  var hpBarW = 60;
  var hpBarX = GW / 2 - hpBarW / 2;
  ctx.fillStyle = '#333';
  ctx.fillRect(hpBarX, 18, hpBarW, 6);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#38d973' : hpPct > 0.25 ? '#f4b41b' : '#e6482e';
  ctx.fillRect(hpBarX, 18, Math.floor(hpBarW * hpPct), 6);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(hpBarX, 18, hpBarW, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText('HP ' + player.hp + '/' + player.maxHp, GW / 2, 24);

  // Lives (pixel hearts)
  ctx.textAlign = 'right';
  for (var li = 0; li < lives; li++) {
    ctx.fillStyle = '#e6482e';
    // NES heart shape
    var hx = GW - 12 - li * 14;
    drawPixelRect(hx - 3, 6, 2, 2, '#e6482e');
    drawPixelRect(hx + 1, 6, 2, 2, '#e6482e');
    drawPixelRect(hx - 4, 8, 8, 2, '#e6482e');
    drawPixelRect(hx - 3, 10, 6, 1, '#e6482e');
    drawPixelRect(hx - 2, 11, 4, 1, '#e6482e');
    drawPixelRect(hx - 1, 12, 2, 1, '#e6482e');
  }

  // Bottom bar - items
  ctx.fillStyle = 'rgba(10,5,20,0.9)';
  ctx.fillRect(0, GH - 28, GW, 28);
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';

  var ix = 6;
  // Keys with NES-style icons
  if (keys.red > 0) { drawPixelRect(ix, GH - 20, 4, 4, '#ff4444'); drawPixelRect(ix + 1, GH - 16, 2, 4, '#ff4444'); ctx.fillStyle = '#ff4444'; ctx.fillText(keys.red + '', ix + 7, GH - 11); ix += 22; }
  if (keys.blue > 0) { drawPixelRect(ix, GH - 20, 4, 4, '#4444ff'); drawPixelRect(ix + 1, GH - 16, 2, 4, '#4444ff'); ctx.fillStyle = '#4444ff'; ctx.fillText(keys.blue + '', ix + 7, GH - 11); ix += 22; }
  if (keys.green > 0) { drawPixelRect(ix, GH - 20, 4, 4, '#44ff44'); drawPixelRect(ix + 1, GH - 16, 2, 4, '#44ff44'); ctx.fillStyle = '#44ff44'; ctx.fillText(keys.green + '', ix + 7, GH - 11); ix += 22; }
  if (keys.yellow > 0) { drawPixelRect(ix, GH - 20, 4, 4, '#ffff44'); drawPixelRect(ix + 1, GH - 16, 2, 4, '#ffff44'); ctx.fillStyle = '#ffff44'; ctx.fillText(keys.yellow + '', ix + 7, GH - 11); ix += 22; }

  // Potions
  drawPixelRect(ix, GH - 20, 4, 6, '#2244aa');
  drawPixelRect(ix + 1, GH - 19, 2, 4, '#4488ff');
  ctx.fillStyle = '#4488ff';
  ctx.fillText('x' + potions, ix + 7, GH - 11);
  ix += 30;

  // Mycelium Shards
  ctx.fillStyle = '#a855f7';
  ctx.textAlign = 'right';
  ctx.fillText('SHARD ' + staffPieces + '/4', GW - 6, GH - 11);

  // Spore Gems
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE ' + gems, GW - 80, GH - 11);

  // Stat bar (small) at very bottom
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#666';
  var _sth = (window.BaselingPlayer && BaselingPlayer.getStats) ? BaselingPlayer.getStats() : { speed: 10, stamina: 10, power: 10, luck: 10, swim: 10 };
  var statStr = 'PWR' + _sth.power + ' SPD' + _sth.speed + ' STA' + _sth.stamina + ' LCK' + _sth.luck;
  ctx.fillText(statStr, 6, GH - 2);
}

// === DRAW MINIMAP ===
function drawMap() {
  var mw = 180, mh = 110;
  var mx = (GW - mw) / 2, my = (GH - mh) / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(mx - 2, my - 20, mw + 4, mh + 24);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(mx - 2, my - 20, mw + 4, mh + 24);

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE TOWER MAP', GW / 2, my - 7);

  for (var f = 0; f < 5; f++) {
    var fy = my + (4 - f) * 21;
    ctx.fillStyle = FLOOR_PALETTES[f].accent;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(ZONE_NAMES[f].substring(0, 6), mx + 1, fy + 10);

    for (var r = 0; r < 8; r++) {
      var rx = mx + 38 + r * 17;
      var ry = fy + 2;

      if (isRoomSolved(f, r)) {
        ctx.fillStyle = '#38d973';
      } else if (isRoomVisited(f, r)) {
        ctx.fillStyle = '#555';
      } else if (wisMod() >= 2) {
        // WIS 14+: reveal unvisited rooms on map
        ctx.fillStyle = '#2a2a3a';
      } else {
        ctx.fillStyle = '#1a1a1a';
      }
      ctx.fillRect(rx, ry, 14, 13);
      ctx.strokeStyle = '#444';
      ctx.strokeRect(rx, ry, 14, 13);

      if (f === currentFloor && r === currentRoom) {
        ctx.fillStyle = statB.color || '#ffdd44';
        ctx.beginPath();
        ctx.arc(rx + 7, ry + 6, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      if (r === 7) {
        ctx.fillStyle = '#ff4444';
        ctx.font = '7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('B', rx + 7, ry + 10);
      }
    }
  }
}
