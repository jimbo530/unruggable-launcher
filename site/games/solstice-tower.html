  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('HOW TO PLAY', GW / 2, 40);

  ctx.font = '10px monospace';
  ctx.fillStyle = '#ccc';

  var pages = [
    [
      'MOVEMENT',
      '',
      'Arrow Keys / WASD = Move',
      'Your baseling explores the',
      'fungal tower on an iso grid.',
      '',
      'Hold M or Tab = View Map',
      '',
      'STR affects block pushing',
      'DEX affects movement speed'
    ],
    [
      'ACTIONS',
      '',
      'Space / Z = Jump (A Button)',
      'Jump over pits and stomp pests!',
      'X / Shift = POOP Elixir (B Btn)',
      'Elixirs reveal hidden dangers.',
      '',
      'CON gives bonus HP and lives',
      'INT extends elixir duration'
    ],
    [
      'PUZZLES',
      '',
      'Push BLOCKS onto PLATES',
      'Flip SWITCHES in order',
      'Find KEYS for colored DOORS',
      'Ride PLATFORMS over PITS',
      '',
      'WIS reveals hazards on the map',
      'CHA boosts spore gem values'
    ],
    [
      'THE QUEST',
      '',
      'Climb 5 floors of the',
      'Spore Tower in Tasern. Defeat',
      'each floor boss to earn a',
      'Mycelium Shard. Collect all 4',
      'to forge the Mycelium Staff!',
      '',
      'Beware: Tower Mold, Poop',
      'Golems, and worse lurk within...'
    ]
  ];

  var page = pages[Math.min(tutorialPage, pages.length - 1)];
  for (var li = 0; li < page.length; li++) {
    ctx.fillStyle = li === 0 ? '#ffdd44' : '#bbb';
    ctx.fillText(page[li], GW / 2, 70 + li * 18);
  }

  // Page indicator
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Page ' + (tutorialPage + 1) + '/4  -  Press any key', GW / 2, GH - 30);

  // NES-style decorative border
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 20, GW - 40, GH - 40);
  ctx.strokeStyle = '#556';
  ctx.lineWidth = 1;
  ctx.strokeRect(22, 22, GW - 44, GH - 44);
}

// === DRAW TITLE SCREEN ===
function drawTitle() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Tower silhouette with zone colors
  ctx.fillStyle = '#1a1c2c';
  ctx.beginPath();
  ctx.moveTo(GW/2 - 45, GH - 20);
  ctx.lineTo(GW/2 - 40, 130);
  ctx.lineTo(GW/2 - 25, 100);
  ctx.lineTo(GW/2 - 10, 80);
  ctx.lineTo(GW/2, 65);
  ctx.lineTo(GW/2 + 10, 80);
  ctx.lineTo(GW/2 + 25, 100);
  ctx.lineTo(GW/2 + 40, 130);
  ctx.lineTo(GW/2 + 45, GH - 20);
  ctx.closePath();
  ctx.fill();

  // Zone-colored windows (NES pixel style)
  for (var fi = 0; fi < 5; fi++) {
    ctx.fillStyle = FLOOR_PALETTES[fi].accent;
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03 + fi) * 0.2;
    var wy = 95 + fi * 38;
    // Pixel windows
    drawPixelRect(GW/2 - 9, wy, 6, 8, FLOOR_PALETTES[fi].accent);
    drawPixelRect(GW/2 + 3, wy, 6, 8, FLOOR_PALETTES[fi].accent);
    // Zone label
    ctx.font = '6px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ZONE_NAMES[fi], GW/2 - 50, wy + 6);
  }
  ctx.globalAlpha = 1;

  // Decorative iso tiles around tower base
  for (var di = 0; di < 5; di++) {
    for (var dj = 0; dj < 3; dj++) {
      var dpal = FLOOR_PALETTES[di];
      var dox = GW/2 - 110 + dj * 45;
      var doy = 185 + di * 22 - dj * 11;
      ctx.fillStyle = dpal.top;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(dox, doy); ctx.lineTo(dox + 20, doy + 10); ctx.lineTo(dox, doy + 20); ctx.lineTo(dox - 20, doy + 10);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Title
  TAS.ui.drawTitle('SPORE TOWER', 'A ' + statB.name + '\'s Fungal Quest', GW, GH, { frame: frame, titleColor: '#a855f7' });

  // Selected baseling preview (idle bob) + name + 5 arcade stat bars
  TAS.drawBaseling(ctx, GW/2, GH * 0.56, 24, { anim: 'idle', frame: frame });
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW/2, GH * 0.64);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 110;
    ctx.font = '8px monospace';
    var _by = GH * 0.70;
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _by);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _by + 3, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _by + 3, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW/2, GH * 0.78);

  // Continue prompt
  try {
    if (localStorage.getItem('solsticetower_save')) {
      ctx.fillStyle = '#666';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('(saved game found)', GW/2, GH * 0.84);
    }
  } catch(e) { console.error('localStorage check failed:', e); }
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: ZONE_NAMES[currentFloor] + ' Room ' + (currentRoom + 1) });
    return;
  }

  if (state === 'victory') {
    ctx.fillStyle = '#1a1c2c';
    ctx.fillRect(0, 0, GW, GH);

    if (frame % 5 === 0) {
      TAS.particles.spawn(TAS.math.randRange(50, GW-50), TAS.math.randRange(50, GH-50), ['#ff88ff','#44ffcc','#ffdd44','#88ccff'][TAS.math.randInt(0,3)], 3, 2);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('SPORE TOWER CLEARED!', GW/2, 70);

    ctx.fillStyle = '#a855f7';
    ctx.font = '12px monospace';
    ctx.fillText('Your ' + statB.name + ' has forged', GW/2, 110);
    ctx.fillText('the Mycelium Staff!', GW/2, 130);

    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('SCORE: ' + score, GW/2, 170);

    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText('Rooms solved: ' + solvedRooms.length + '/40', GW/2, 200);
    ctx.fillText('Spore Gems: ' + gems, GW/2, 218);
    var _stv = (window.BaselingPlayer && BaselingPlayer.getStats) ? BaselingPlayer.getStats() : { speed: 10, stamina: 10, power: 10, luck: 10, swim: 10 };
    ctx.fillText('Stats: PWR' + _stv.power + ' SPD' + _stv.speed + ' STA' + _stv.stamina + ' LCK' + _stv.luck + ' SWM' + _stv.swim, GW/2, 236);

    var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('PRESS ANY KEY', GW/2, 270);
    ctx.globalAlpha = 1;

    TAS.particles.draw();
    return;
  }

  // Playing state
  ctx.save();
  // Apply screen shake
  ctx.translate(Math.floor(shakeX), Math.floor(shakeY));
  TAS.fx.applyShake();

  // Background gradient for current zone
  var pal = FLOOR_PALETTES[currentFloor];
  var bgGrad = ctx.createLinearGradient(0, 0, 0, GH);
  bgGrad.addColorStop(0, pal.fog);
  bgGrad.addColorStop(1, darken(pal.top, 0.3));
  ctx.fillStyle = bgGrad;
  ctx.fillRect(-10, -10, GW + 20, GH + 20);

  // Ambient particles behind room
  drawAmbientParticles();

  // Potion reveal glow
  if (potionActive > 0) {
    ctx.globalAlpha = Math.min(potionActive, 1) * 0.1;
    ctx.fillStyle = '#88ffff';
    ctx.fillRect(-10, -10, GW + 20, GH + 20);
    ctx.globalAlpha = 1;
  }

  drawRoom();
  TAS.particles.draw();
  drawPopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Map overlay
  if (showMap) drawMap();

  // Tutorial overlay
  if (showTutorial) drawTutorial();

  TAS.input.drawTouchControls(GW, GH);

  // Room solved indicator
  if (roomSolved) {
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.2;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ROOM CLEAR!', GW/2, GH - 34);
    ctx.globalAlpha = 1;
  }

  // Zone name flash on room entry
  if (roomTimer < 2.0) {
    ctx.globalAlpha = Math.max(0, 1 - roomTimer * 0.7);
    ctx.fillStyle = pal.accent;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ZONE_NAMES[currentFloor], GW / 2, 50);
    ctx.globalAlpha = 1;
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
</html>
