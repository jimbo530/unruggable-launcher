<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Legendary Wings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'FIRE', b: 'JUMP' } });

const TILE = 16;
const PLAYER_SPEED = 3;
const PLAYER_SPEED_SIDE = 2.5;
const GRAVITY = 600;
const JUMP_VEL = -260;
const MAX_FALL = 320;
const BULLET_SPEED = 5;
const FIRE_COOLDOWN = 8;
const STAGE_COUNT = 5;
const VERTICAL_LENGTH = 2400;
const SIDE_LENGTH = 800;

// Weapon tier names
const WEAPON_NAMES = ['SINGLE', 'DOUBLE', 'SPREAD', 'FIRE WAVE', 'LASER+HOMING'];

// Stage color themes
const STAGE_THEMES = [
  { sky: '#4488cc', ground: '#446622', cave: '#221100', name: 'VERDANT SKY' },
  { sky: '#6644aa', ground: '#554433', cave: '#110022', name: 'TWILIGHT PEAKS' },
  { sky: '#cc6633', ground: '#664422', cave: '#220000', name: 'VOLCANIC ASCENT' },
  { sky: '#224466', ground: '#223344', cave: '#001122', name: 'FROZEN DEPTHS' },
  { sky: '#442266', ground: '#332244', cave: '#110011', name: 'DARK PALACE' }
];

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('legwings_hi');
let lives = 3;
let stage = 0;
let frame = 0;
let mode = 'vertical'; // 'vertical' or 'side'
let transitionTimer = 0;
let transitionType = ''; // 'entering' or 'exiting'

// Player
let px, py, pvx, pvy;
let weaponTier = 0;
let fireCooldown = 0;
let invuln = 0;
let wingFlap = 0;
let sideHP = 3;
let comboCount = 0;
let comboTimer = 0;
let playerDead = false;
let deathTimer = 0;

// Vertical mode
let scrollY = 0;
let groundTiles = [];
let groundMouths = [];
let powerPods = [];

// Side-scroll mode
let sideScrollX = 0;
let sidePlatforms = [];
let sideWalls = [];
let sideBoss = null;
let sideBossDefeated = false;
let sideExitX = 0;

// Shared
let bullets = [];
let enemies = [];
let enemyBullets = [];
let pickups = [];

// ============================================================
// INIT / RESET
// ============================================================
function startGame() {
  state = 'playing';
  mode = 'vertical';
  score = 0;
  lives = 3;
  stage = 0;
  weaponTier = 0;
  TAS.particles.clear();
  initStage();
}

function initStage() {
  mode = 'vertical';
  transitionTimer = 0;
  transitionType = '';
  scrollY = 0;
  px = GW / 2;
  py = GH - 60;
  pvx = 0;
  pvy = 0;
  fireCooldown = 0;
  invuln = 60;
  wingFlap = 0;
  sideHP = 3;
  comboCount = 0;
  comboTimer = 0;
  playerDead = false;
  deathTimer = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  pickups = [];
  generateVerticalStage();
}

function initSideSection(mouthType) {
  mode = 'side';
  sideScrollX = 0;
  px = 40;
  py = GH - 80;
  pvx = 0;
  pvy = 0;
  sideHP = 3;
  fireCooldown = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  pickups = [];
  sideBoss = null;
  sideBossDefeated = false;
  generateSideSection(mouthType);
}

// ============================================================
// VERTICAL STAGE GENERATION
// ============================================================
function generateVerticalStage() {
  groundTiles = [];
  groundMouths = [];
  powerPods = [];

  // Generate ground features along the scroll length
  const segCount = Math.floor(VERTICAL_LENGTH / 80);
  for (let i = 0; i < segCount; i++) {
    const sy = i * 80;
    // Ground texture blocks
    const gCount = TAS.math.randInt(2, 5);
    for (let j = 0; j < gCount; j++) {
      groundTiles.push({
        x: TAS.math.randRange(0, GW - 48),
        y: sy + TAS.math.randRange(0, 60),
        w: TAS.math.randInt(32, 64),
        h: TAS.math.randInt(24, 40),
        type: TAS.math.randInt(0, 3) // building/turret/tree/rock
      });
    }

    // Ground mouths (traps and bonuses)
    if (i > 2 && Math.random() < 0.2) {
      const isGold = Math.random() < 0.3;
      groundMouths.push({
        x: TAS.math.randRange(60, GW - 60),
        y: sy + TAS.math.randRange(20, 60),
        w: 40, h: 30,
        gold: isGold,
        animFrame: 0,
        active: true
      });
    }

    // Power pods
    if (Math.random() < 0.15) {
      powerPods.push({
        x: TAS.math.randRange(40, GW - 40),
        y: sy + TAS.math.randRange(10, 70),
        alive: true
      });
    }
  }

  // Spawn waves of enemies
  spawnVerticalEnemies();
}

function spawnVerticalEnemies() {
  const waveCount = 8 + stage * 4;
  for (let i = 0; i < waveCount; i++) {
    const spawnY = TAS.math.randRange(200, VERTICAL_LENGTH - 200);
    const etype = TAS.math.randInt(0, 4);
    const count = TAS.math.randInt(3, 6);
    for (let j = 0; j < count; j++) {
      enemies.push(createEnemy(etype, TAS.math.randRange(20, GW - 20), spawnY + j * 30, 'vertical'));
    }
  }
  // Ground enemies (turrets, tanks)
  for (const tile of groundTiles) {
    if (tile.type <= 1 && Math.random() < 0.4) {
      enemies.push(createGroundEnemy(tile));
    }
  }
}

// ============================================================
// SIDE SECTION GENERATION
// ============================================================
function generateSideSection(mouthType) {
  sidePlatforms = [];
  sideWalls = [];
  const len = mouthType === 'gold' ? SIDE_LENGTH * 0.7 : SIDE_LENGTH;
  sideExitX = len - 60;

  // Floor
  sidePlatforms.push({ x: 0, y: GH - 32, w: len + 200, h: 32 });

  // Platforms
  const platCount = Math.floor(len / 80);
  for (let i = 0; i < platCount; i++) {
    const px2 = 100 + i * 80 + TAS.math.randRange(-20, 20);
    const py2 = GH - 60 - TAS.math.randRange(40, 140);
    sidePlatforms.push({ x: px2, y: py2, w: TAS.math.randInt(48, 96), h: 12 });
  }

  // Ceiling blocks
  for (let i = 0; i < platCount; i++) {
    if (Math.random() < 0.4) {
      sideWalls.push({
        x: 60 + i * 80 + TAS.math.randRange(-10, 10),
        y: 0,
        w: TAS.math.randInt(24, 48),
        h: TAS.math.randInt(40, 80)
      });
    }
  }

  // Side enemies
  const eCount = 6 + stage * 3;
  for (let i = 0; i < eCount; i++) {
    const ex = TAS.math.randRange(200, len - 200);
    const ey = TAS.math.randRange(60, GH - 80);
    const etype = TAS.math.randInt(0, 3);
    enemies.push(createEnemy(etype, ex, ey, 'side'));
  }

  // Boss at the end
  if (mouthType !== 'gold') {
    sideBoss = createBoss(stage, len - 150);
  }

  // Bonus pickups in gold rooms
  if (mouthType === 'gold') {
    for (let i = 0; i < 8; i++) {
      pickups.push({
        x: 100 + i * 70,
        y: GH - 80 - TAS.math.randRange(20, 100),
        type: Math.random() < 0.5 ? 'score' : 'weapon',
        alive: true
      });
    }
  }
}

// ============================================================
// ENEMY FACTORY
// ============================================================
function createEnemy(type, x, y, mode2) {
  const base = { x, y, type, mode: mode2, hp: 1 + Math.floor(stage * 0.5), alive: true, frame: 0, fireTimer: 0 };
  switch (type) {
    case 0: // bat swarm
      return Object.assign(base, { name: 'bat', w: 14, h: 10, speed: 1.5 + stage * 0.2, pattern: 'sine', phase: Math.random() * Math.PI * 2 });
    case 1: // floating eye
      return Object.assign(base, { name: 'eye', w: 16, h: 16, speed: 0.8, pattern: 'track', hp: 2 + stage });
    case 2: // dive bomber
      return Object.assign(base, { name: 'diver', w: 12, h: 18, speed: 3, pattern: 'dive', diveY: y, diving: false });
    case 3: // spinning disc
      return Object.assign(base, { name: 'disc', w: 14, h: 14, speed: 2, pattern: 'circle', angle: Math.random() * Math.PI * 2, radius: 30 + Math.random() * 40, cx: x, cy: y });
    case 4: // homing orb
      return Object.assign(base, { name: 'orb', w: 10, h: 10, speed: 1.2 + stage * 0.3, pattern: 'homing', hp: 1 });
    default:
      return Object.assign(base, { name: 'bat', w: 14, h: 10, speed: 1.5, pattern: 'sine', phase: 0 });
  }
}

function createGroundEnemy(tile) {
  return {
    x: tile.x + tile.w / 2,
    y: tile.y,
    type: 5,
    name: tile.type === 0 ? 'turret' : 'tank',
    w: 20, h: 16,
    hp: 3 + stage,
    alive: true,
    frame: 0,
    fireTimer: TAS.math.randInt(30, 90),
    mode: 'vertical',
    speed: tile.type === 1 ? 0.5 : 0,
    pattern: 'ground'
  };
}

function createBoss(stageNum, x) {
  const bossHP = 30 + stageNum * 15;
  return {
    x: x, y: GH / 2 - 30,
    w: 60, h: 50,
    hp: bossHP, maxHP: bossHP,
    phase: 0, timer: 0,
    alive: true,
    name: 'boss_' + stageNum,
    speed: 1 + stageNum * 0.3,
    fireRate: Math.max(20, 50 - stageNum * 8),
    fireTimer: 0,
    pattern: stageNum % 2 === 0 ? 'sweep' : 'bounce',
    dir: 1
  };
}

// ============================================================
// WEAPON SYSTEM
// ============================================================
function fireWeapon() {
  if (fireCooldown > 0) return;
  fireCooldown = FIRE_COOLDOWN - Math.min(4, weaponTier);

  const bx = px;
  const by = py - (mode === 'vertical' ? 10 : 0);
  const dir = mode === 'vertical' ? -1 : 1; // down in vertical is positive y, shoot "up" screen

  TAS.audio.playTone(400 + weaponTier * 100, 0.06, 'square', 0.05);

  switch (weaponTier) {
    case 0: // single
      bullets.push(makeBullet(bx, by, dir));
      break;
    case 1: // double
      bullets.push(makeBullet(bx - 6, by, dir));
      bullets.push(makeBullet(bx + 6, by, dir));
      break;
    case 2: // triple spread
      bullets.push(makeBullet(bx, by, dir));
      bullets.push(makeBullet(bx - 4, by, dir, -0.5));
      bullets.push(makeBullet(bx + 4, by, dir, 0.5));
      break;
    case 3: // fire wave
      bullets.push({ x: bx, y: by, vx: mode === 'side' ? BULLET_SPEED : 0, vy: mode === 'vertical' ? -BULLET_SPEED : 0, w: 20, h: 8, damage: 2, pierce: true, type: 'fire' });
      break;
    case 4: // laser + homing
      bullets.push({ x: bx, y: by, vx: mode === 'side' ? BULLET_SPEED * 1.5 : 0, vy: mode === 'vertical' ? -BULLET_SPEED * 1.5 : 0, w: 4, h: 16, damage: 3, pierce: true, type: 'laser' });
      // homing orbs
      if (frame % 3 === 0) {
        bullets.push({ x: bx, y: by, vx: 0, vy: 0, w: 8, h: 8, damage: 1, pierce: false, type: 'homing', life: 120 });
      }
      break;
  }
}

function makeBullet(x, y, dir, spread) {
  const vx = mode === 'side' ? BULLET_SPEED : (spread || 0);
  const vy = mode === 'vertical' ? -BULLET_SPEED : (spread ? spread * 0.5 : 0);
  return { x, y, vx, vy, w: 4, h: 8, damage: 1, pierce: false, type: 'normal' };
}

// ============================================================
// UPDATE - MAIN
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'stageComplete') {
    deathTimer++;
    if (deathTimer > 120) {
      stage++;
      if (stage >= STAGE_COUNT) {
        state = 'victory';
        frame = 0;
      } else {
        initStage();
        state = 'playing';
      }
    }
    return;
  }

  if (state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      if (score > highScore) { highScore = score; TAS.score.save('legwings_hi', score); }
      state = 'title';
      frame = 0;
    }
    return;
  }

  // Transition animation
  if (transitionTimer > 0) {
    transitionTimer--;
    if (transitionTimer <= 0) {
      if (transitionType === 'entering') {
        // Already in side mode
      } else if (transitionType === 'exiting') {
        mode = 'vertical';
        py = GH - 80;
        invuln = 60;
      }
      transitionType = '';
    }
    return;
  }

  if (playerDead) {
    deathTimer++;
    if (deathTimer > 90) {
      lives--;
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('legwings_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        playerDead = false;
        deathTimer = 0;
        if (weaponTier > 0) weaponTier--;
        invuln = 120;
        if (mode === 'vertical') {
          px = GW / 2;
          py = GH - 60;
        } else {
          sideHP = 3;
          px = Math.max(sideScrollX + 40, px - 100);
        }
      }
    }
    return;
  }

  if (mode === 'vertical') {
    updateVertical(dt);
  } else {
    updateSide(dt);
  }

  // Invulnerability countdown
  if (invuln > 0) invuln--;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }
}

// ============================================================
// UPDATE - VERTICAL MODE
// ============================================================
function updateVertical(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Movement (free fly in all directions)
  let mx = 0, my = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) mx -= 1;
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) mx += 1;
  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) my -= 1;
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) my += 1;

  px += mx * PLAYER_SPEED;
  py += my * PLAYER_SPEED;
  px = TAS.math.clamp(px, 16, GW - 16);
  py = TAS.math.clamp(py, 40, GH - 16);

  wingFlap += 0.15;

  // Auto-scroll upward
  scrollY += 1 + stage * 0.3;

  // Check stage completion
  if (scrollY >= VERTICAL_LENGTH) {
    state = 'stageComplete';
    deathTimer = 0;
    score += 1000 * (stage + 1);
    TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.2]], 150);
    return;
  }

  // Fire
  if (keys['KeyZ'] || keys['Space'] || tch.a) {
    fireWeapon();
  }
  if (fireCooldown > 0) fireCooldown--;

  // Update bullets
  updateBullets();

  // Update enemies
  updateVerticalEnemies();

  // Update enemy bullets
  updateEnemyBullets();

  // Check mouth collisions
  for (const mouth of groundMouths) {
    if (!mouth.active) continue;
    const mWorldY = mouth.y - scrollY + GH;
    if (mWorldY > -50 && mWorldY < GH + 50) {
      mouth.animFrame++;
      // Suction zone
      if (TAS.hit.rectOverlap(px - 8, py - 8, 16, 16, mouth.x - 20, mWorldY - 20, 40, 40)) {
        mouth.active = false;
        transitionType = 'entering';
        transitionTimer = 45;
        TAS.audio.playTone(200, 0.4, 'sawtooth', 0.1, 80);
        TAS.fx.shake(8, 0.85);
        setTimeout(function() { initSideSection(mouth.gold ? 'gold' : 'trap'); }, 50);
      }
    }
  }

  // Power pod collisions
  for (const pod of powerPods) {
    if (!pod.alive) continue;
    const podWorldY = pod.y - scrollY + GH;
    if (podWorldY > -20 && podWorldY < GH + 20) {
      // Check if bullet hits pod
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (TAS.hit.rectOverlap(b.x - 4, b.y - 4, 8, 8, pod.x - 10, podWorldY - 10, 20, 20)) {
          pod.alive = false;
          if (!b.pierce) bullets.splice(i, 1);
          // Drop upgrade pickup
          pickups.push({ x: pod.x, y: podWorldY, type: 'weapon', alive: true, vy: 0.5 });
          TAS.audio.playTone(600, 0.1, 'triangle', 0.06);
          TAS.particles.spawn(pod.x, podWorldY, '#ffdd44', 8, 2);
          break;
        }
      }
    }
  }

  // Pickup collisions
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    if (!pk.alive) { pickups.splice(i, 1); continue; }
    pk.y += pk.vy || 0;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 20, 20, pk.x - 8, pk.y - 8, 16, 16)) {
      pk.alive = false;
      pickups.splice(i, 1);
      if (pk.type === 'weapon') {
        weaponTier = Math.min(4, weaponTier + 1);
        TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.1]], 80);
      } else {
        score += 200;
        TAS.audio.playTone(800, 0.08, 'triangle', 0.05);
      }
    }
  }
}

function updateVerticalEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    // Only process enemies near screen
    const eWorldY = e.mode === 'vertical' ? e.y - scrollY + GH : e.y;
    if (eWorldY < -80 || eWorldY > GH + 80) continue;

    e.frame++;

    // Movement patterns
    switch (e.pattern) {
      case 'sine':
        e.x += Math.sin(e.frame * 0.05 + e.phase) * e.speed;
        e.y += 0.3;
        break;
      case 'track':
        const dx = px - e.x, dy = (py + scrollY - GH) - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        e.x += (dx / d) * e.speed;
        e.y += (dy / d) * e.speed;
        break;
      case 'dive':
        if (!e.diving && eWorldY < GH * 0.6 && Math.abs(e.x - px) < 40) {
          e.diving = true;
        }
        if (e.diving) {
          e.y += e.speed;
        } else {
          e.x += Math.sin(e.frame * 0.03) * 1.5;
        }
        break;
      case 'circle':
        e.angle += 0.03;
        e.x = e.cx + Math.cos(e.angle) * e.radius;
        e.y = e.cy + Math.sin(e.angle) * e.radius * 0.5;
        break;
      case 'homing':
        const hdx = px - e.x, hdy = (py + scrollY - GH) - e.y;
        const hd = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
        e.x += (hdx / hd) * e.speed;
        e.y += (hdy / hd) * e.speed;
        break;
      case 'ground':
        e.x += e.speed * (Math.sin(e.frame * 0.02) > 0 ? 1 : -1);
        e.fireTimer--;
        if (e.fireTimer <= 0) {
          e.fireTimer = 60 - stage * 5;
          const gy = e.y - scrollY + GH;
          if (gy > 0 && gy < GH) {
            const ang = TAS.math.angle(e.x, gy, px, py);
            enemyBullets.push({ x: e.x, y: gy, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5 });
          }
        }
        break;
    }

    // Shooting enemies (non-ground)
    if (e.pattern !== 'ground' && e.frame % (80 - stage * 10) === 0 && eWorldY > 30 && eWorldY < GH - 30) {
      if (Math.random() < 0.3 + stage * 0.1) {
        const ang = TAS.math.angle(e.x, eWorldY, px, py);
        enemyBullets.push({ x: e.x, y: eWorldY, vx: Math.cos(ang) * 2, vy: Math.sin(ang) * 2 });
      }
    }

    // Collision with player bullets
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, e.x - e.w / 2, eWorldY - e.h / 2, e.w, e.h)) {
        e.hp -= b.damage;
        if (!b.pierce) bullets.splice(j, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += 50 + comboCount * 10;
          comboCount++;
          comboTimer = 60;
          TAS.particles.spawn(e.x, eWorldY, '#ff8844', 6, 2, { gravity: 0.5 });
          TAS.audio.playTone(300, 0.1, 'sawtooth', 0.04, 100);
          if (Math.random() < 0.1) {
            pickups.push({ x: e.x, y: eWorldY, type: Math.random() < 0.5 ? 'weapon' : 'score', alive: true, vy: 0.5 });
          }
        } else {
          TAS.particles.spawn(e.x, eWorldY, '#ffffff', 3, 1);
        }
        break;
      }
    }

    // Collision with player
    if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 8, 16, 16, e.x - e.w / 2, eWorldY - e.h / 2, e.w, e.h)) {
      playerHit();
    }
  }
}

// ============================================================
// UPDATE - SIDE SCROLL MODE
// ============================================================
function updateSide(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Horizontal movement
  let mx = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) mx -= 1;
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) mx += 1;

  pvx = mx * PLAYER_SPEED_SIDE;
  px += pvx;

  // Gravity
  pvy += GRAVITY * dt;
  if (pvy > MAX_FALL) pvy = MAX_FALL;

  // Jump / glide (wings slow fall)
  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || tch.b || tch.up;
  if (jumpPressed) {
    if (isOnGround()) {
      pvy = JUMP_VEL;
      TAS.audio.playTone(350, 0.08, 'triangle', 0.04, 500);
    } else if (pvy > 0) {
      // Wing glide - slow fall
      pvy *= 0.85;
      wingFlap += 0.2;
    }
  }

  py += pvy * dt;
  wingFlap += 0.1;

  // Platform collision
  resolveSidePlatforms();

  // Wall collision
  for (const wall of sideWalls) {
    const wx = wall.x - sideScrollX;
    if (TAS.hit.rectOverlap(px - 8, py - 14, 16, 28, wx, wall.y, wall.w, wall.h)) {
      // Push player out
      if (px < wx + wall.w / 2) {
        px = wx - 8;
      } else {
        px = wx + wall.w + 8;
      }
    }
  }

  // Keep player on screen
  px = TAS.math.clamp(px, 12, GW - 12);
  if (py > GH + 20) {
    playerHit();
    py = GH - 80;
    pvy = 0;
  }

  // Auto-scroll in side sections (camera follows player)
  if (px > GW * 0.6) {
    const scrollAmount = px - GW * 0.6;
    sideScrollX += scrollAmount;
    px = GW * 0.6;
  }

  // Fire
  if (keys['KeyZ'] || tch.a) {
    fireWeapon();
  }
  if (fireCooldown > 0) fireCooldown--;

  // Update bullets
  updateBullets();

  // Update side enemies
  updateSideEnemies();

  // Update enemy bullets
  updateEnemyBullets();

  // Update boss
  if (sideBoss && sideBoss.alive) {
    updateBoss();
  }

  // Check exit
  if (sideBossDefeated || !sideBoss) {
    if (px + sideScrollX > sideExitX) {
      // Return to vertical
      transitionType = 'exiting';
      transitionTimer = 45;
      TAS.audio.playTone(400, 0.3, 'triangle', 0.08, 800);
      TAS.fx.flash('#fff', 0.4);
      score += 500;
    }
  }

  // Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    if (!pk.alive) { pickups.splice(i, 1); continue; }
    const pkScreenX = pk.x - sideScrollX;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 20, 20, pkScreenX - 8, pk.y - 8, 16, 16)) {
      pk.alive = false;
      if (pk.type === 'weapon') {
        weaponTier = Math.min(4, weaponTier + 1);
        TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.1]], 80);
      } else {
        score += 200;
        TAS.audio.playTone(800, 0.08, 'triangle', 0.05);
      }
      pickups.splice(i, 1);
    }
  }
}

function isOnGround() {
  for (const plat of sidePlatforms) {
    const platX = plat.x - sideScrollX;
    if (py + 14 >= plat.y && py + 14 <= plat.y + 8 && px + 8 > platX && px - 8 < platX + plat.w && pvy >= 0) {
      return true;
    }
  }
  return false;
}

function resolveSidePlatforms() {
  for (const plat of sidePlatforms) {
    const platX = plat.x - sideScrollX;
    if (px + 8 > platX && px - 8 < platX + plat.w) {
      // Landing on top
      if (py + 14 >= plat.y && py + 14 <= plat.y + plat.h && pvy >= 0) {
        py = plat.y - 14;
        pvy = 0;
      }
    }
  }
}

function updateSideEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    const eScreenX = e.x - sideScrollX;
    if (eScreenX < -60 || eScreenX > GW + 60) continue;

    e.frame++;

    // Side enemy patterns
    switch (e.pattern) {
      case 'sine':
        e.x += Math.sin(e.frame * 0.04 + e.phase) * e.speed * 0.5;
        e.y += Math.cos(e.frame * 0.03) * e.speed * 0.3;
        break;
      case 'track':
        if (eScreenX > px) e.x -= e.speed;
        else e.x += e.speed;
        break;
      case 'dive':
        e.y += Math.sin(e.frame * 0.05) * 2;
        e.x -= 0.5;
        break;
      case 'circle':
        e.angle += 0.04;
        e.x = e.cx + Math.cos(e.angle) * e.radius;
        e.y = e.cy + Math.sin(e.angle) * e.radius;
        break;
      case 'homing':
        const hdx = (px + sideScrollX) - e.x;
        const hdy = py - e.y;
        const hd = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
        e.x += (hdx / hd) * e.speed;
        e.y += (hdy / hd) * e.speed;
        break;
    }

    // Shooting
    if (e.frame % (90 - stage * 10) === 0 && Math.random() < 0.4) {
      const ang = TAS.math.angle(eScreenX, e.y, px, py);
      enemyBullets.push({ x: eScreenX, y: e.y, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5 });
    }

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, eScreenX - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
        e.hp -= b.damage;
        if (!b.pierce) bullets.splice(j, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += 50 + comboCount * 10;
          comboCount++;
          comboTimer = 60;
          TAS.particles.spawn(eScreenX, e.y, '#ff8844', 6, 2, { gravity: 0.5 });
          TAS.audio.playTone(300, 0.1, 'sawtooth', 0.04, 100);
        } else {
          TAS.particles.spawn(eScreenX, e.y, '#fff', 3, 1);
        }
        break;
      }
    }

    // Player collision
    if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 10, 16, 24, eScreenX - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
      playerHitSide();
    }
  }
}

// ============================================================
// BOSS UPDATE
// ============================================================
function updateBoss() {
  const b = sideBoss;
  if (!b.alive) return;

  const bScreenX = b.x - sideScrollX;
  b.timer++;
  b.fireTimer--;

  // Movement pattern
  if (b.pattern === 'sweep') {
    b.y += b.dir * b.speed;
    if (b.y < 60 || b.y > GH - 70) b.dir *= -1;
  } else {
    b.y += Math.sin(b.timer * 0.03) * b.speed * 2;
    b.x += Math.cos(b.timer * 0.02) * b.speed * 0.5;
  }

  // Phase changes
  if (b.hp < b.maxHP * 0.5 && b.phase === 0) {
    b.phase = 1;
    b.speed *= 1.5;
    b.fireRate = Math.max(10, b.fireRate - 10);
    TAS.fx.flash('#ff0000', 0.3);
  }

  // Firing
  if (b.fireTimer <= 0) {
    b.fireTimer = b.fireRate;
    const patterns = b.phase === 0 ? 2 : 4;
    for (let i = 0; i < patterns; i++) {
      const ang = TAS.math.angle(bScreenX, b.y, px, py) + (i - patterns / 2) * 0.3;
      enemyBullets.push({ x: bScreenX, y: b.y, vx: Math.cos(ang) * 3, vy: Math.sin(ang) * 3 });
    }
    TAS.audio.playTone(150, 0.1, 'sawtooth', 0.03);
  }

  // Bullet collision with boss
  for (let j = bullets.length - 1; j >= 0; j--) {
    const bl = bullets[j];
    if (TAS.hit.rectOverlap(bl.x - bl.w / 2, bl.y - bl.h / 2, bl.w, bl.h, bScreenX - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
      b.hp -= bl.damage;
      if (!bl.pierce) bullets.splice(j, 1);
      TAS.particles.spawn(bl.x, bl.y, '#ffaa00', 3, 1);

      if (b.hp <= 0) {
        b.alive = false;
        sideBossDefeated = true;
        score += 2000 + stage * 500;
        TAS.fx.shake(12, 0.9);
        TAS.fx.flash('#ff8800', 0.5);
        TAS.audio.playMelody([[200, 0.2], [150, 0.2], [100, 0.3]], 200);
        // Explosion particles
        for (let k = 0; k < 20; k++) {
          TAS.particles.spawn(bScreenX + TAS.math.randRange(-20, 20), b.y + TAS.math.randRange(-20, 20), ['#ff4400', '#ffaa00', '#ffff00'][k % 3], 5, 3, { gravity: 1 });
        }
      }
      break;
    }
  }

  // Boss collision with player
  if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 10, 16, 24, bScreenX - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
    playerHitSide();
  }
}

// ============================================================
// BULLETS & COLLISION
// ============================================================
function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.type === 'homing') {
      b.life--;
      if (b.life <= 0) { bullets.splice(i, 1); continue; }
      // Find nearest enemy
      let nearest = null, nearDist = 999;
      for (const e of enemies) {
        if (!e.alive) continue;
        const esx = mode === 'side' ? e.x - sideScrollX : e.x;
        const esy = mode === 'vertical' ? e.y - scrollY + GH : e.y;
        const d = TAS.math.dist(b.x, b.y, esx, esy);
        if (d < nearDist) { nearDist = d; nearest = { x: esx, y: esy }; }
      }
      if (nearest) {
        const ang = TAS.math.angle(b.x, b.y, nearest.x, nearest.y);
        b.vx += Math.cos(ang) * 0.3;
        b.vy += Math.sin(ang) * 0.3;
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        if (spd > 4) { b.vx = (b.vx / spd) * 4; b.vy = (b.vy / spd) * 4; }
      }
    }
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > GW + 20 || b.y < -20 || b.y > GH + 20) {
      bullets.splice(i, 1);
    }
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      enemyBullets.splice(i, 1);
      continue;
    }
    // Hit player
    if (invuln <= 0 && TAS.hit.circleOverlap(b.x, b.y, 4, px, py, 8)) {
      enemyBullets.splice(i, 1);
      if (mode === 'vertical') {
        playerHit();
      } else {
        playerHitSide();
      }
    }
  }
}

// ============================================================
// DAMAGE
// ============================================================
function playerHit() {
  if (invuln > 0 || playerDead) return;
  if (weaponTier > 0) {
    // Downgrade weapon instead of dying
    weaponTier--;
    invuln = 60;
    TAS.fx.flash('#ff0000', 0.3);
    TAS.fx.shake(5, 0.85);
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 100);
    TAS.particles.spawn(px, py, '#ff4444', 8, 2);
  } else {
    // Death at tier 0
    playerDead = true;
    deathTimer = 0;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(10, 0.9);
    TAS.audio.playNoise(0.4, 0.1, 200);
    TAS.particles.spawn(px, py, '#ff4400', 15, 3, { gravity: 1.5 });
  }
}

function playerHitSide() {
  if (invuln > 0 || playerDead) return;
  sideHP--;
  invuln = 45;
  TAS.fx.flash('#ff0000', 0.2);
  TAS.fx.shake(4, 0.85);
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 100);
  TAS.particles.spawn(px, py, '#ff4444', 5, 2);
  if (sideHP <= 0) {
    playerDead = true;
    deathTimer = 0;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(10, 0.9);
    TAS.audio.playNoise(0.4, 0.1, 200);
    TAS.particles.spawn(px, py, '#ff4400', 15, 3, { gravity: 1.5 });
  }
}

// ============================================================
// DRAW - MAIN
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + (stage + 1) + ' | Weapon: ' + WEAPON_NAMES[weaponTier] });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'stageComplete') {
    drawStageComplete();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // Transition effect
  if (transitionTimer > 0) {
    drawTransition();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  if (mode === 'vertical') {
    drawVertical();
  } else {
    drawSide();
  }

  // Draw bullets
  drawBullets();

  // Draw enemy bullets
  drawEnemyBullets();

  // Draw pickups
  drawPickups();

  // Draw player
  if (!playerDead) {
    drawPlayer();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// DRAW - TITLE
// ============================================================
function drawTitle() {
  // Animated sky background
  const t = frame * 0.02;
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#224488');
  grad.addColorStop(0.5, '#4488cc');
  grad.addColorStop(1, '#88bbee');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Scrolling clouds
  for (let i = 0; i < 6; i++) {
    const cx = ((frame * (0.3 + i * 0.1) + i * 90) % (GW + 80)) - 40;
    const cy = 60 + i * 40;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(cx, cy, 20 + i * 5, 0, Math.PI * 2);
    ctx.arc(cx + 20, cy - 5, 15 + i * 3, 0, Math.PI * 2);
    ctx.arc(cx - 15, cy + 3, 12 + i * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('LEGENDARY WINGS', GW / 2 + 2, 72);
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('LEGENDARY WINGS', GW / 2, 70);

  ctx.fillStyle = '#ddeeff';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 95);

  // Draw animated winged baseling
  drawWingedBaseling(GW / 2, 160, 2, frame);

  // Controls
  ctx.fillStyle = '#aaccff';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS/WASD = Move | Z/A-Button = Fire | UP/B-Button = Jump/Glide', GW / 2, 230);
  ctx.fillText('Fly through skies, dive into caves, defeat bosses!', GW / 2, 248);

  // Start prompt
  const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffff88';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 290);
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW - VERTICAL MODE
// ============================================================
function drawVertical() {
  const theme = STAGE_THEMES[stage];

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(1, '#88bbdd');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax clouds
  for (let i = 0; i < 8; i++) {
    const cloudY = ((i * 50 + scrollY * 0.2) % (GH + 60)) - 30;
    const cloudX = (i * 70 + Math.sin(frame * 0.01 + i) * 20) % GW;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath();
    ctx.arc(cloudX, cloudY, 25, 0, Math.PI * 2);
    ctx.arc(cloudX + 18, cloudY - 4, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground tiles
  for (const tile of groundTiles) {
    const ty = tile.y - scrollY + GH;
    if (ty < -50 || ty > GH + 50) continue;
    drawGroundTile(tile, ty, theme);
  }

  // Ground mouths
  for (const mouth of groundMouths) {
    if (!mouth.active) continue;
    const my = mouth.y - scrollY + GH;
    if (my < -40 || my > GH + 40) continue;
    drawMouth(mouth, my);
  }

  // Power pods
  for (const pod of powerPods) {
    if (!pod.alive) continue;
    const podY = pod.y - scrollY + GH;
    if (podY < -20 || podY > GH + 20) continue;
    ctx.fillStyle = '#ffdd00';
    ctx.strokeStyle = '#aa8800';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pod.x, podY, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('P', pod.x, podY + 3);
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const ey = e.y - scrollY + GH;
    if (ey < -30 || ey > GH + 30) continue;
    drawEnemy(e, e.x, ey);
  }
}

function drawGroundTile(tile, ty, theme) {
  ctx.fillStyle = theme.ground;
  ctx.fillRect(tile.x, ty, tile.w, tile.h);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.strokeRect(tile.x, ty, tile.w, tile.h);

  // Decoration based on type
  switch (tile.type) {
    case 0: // building
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(tile.x + 4, ty + 4, 8, 8);
      ctx.fillRect(tile.x + tile.w - 12, ty + 4, 8, 8);
      break;
    case 1: // turret
      ctx.fillStyle = '#666';
      ctx.fillRect(tile.x + tile.w / 2 - 4, ty - 6, 8, 8);
      ctx.fillStyle = '#444';
      ctx.fillRect(tile.x + tile.w / 2 - 2, ty - 10, 4, 6);
      break;
    case 2: // tree
      ctx.fillStyle = '#2a6622';
      ctx.beginPath();
      ctx.arc(tile.x + tile.w / 2, ty - 8, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#553311';
      ctx.fillRect(tile.x + tile.w / 2 - 2, ty - 2, 4, tile.h + 2);
      break;
    case 3: // rock
      ctx.fillStyle = 'rgba(100,100,100,0.5)';
      ctx.beginPath();
      ctx.moveTo(tile.x + 5, ty + tile.h);
      ctx.lineTo(tile.x + tile.w / 2, ty);
      ctx.lineTo(tile.x + tile.w - 5, ty + tile.h);
      ctx.fill();
      break;
  }
}

function drawMouth(mouth, my) {
  const openAmt = Math.sin(mouth.animFrame * 0.05) * 0.3 + 0.7;

  if (mouth.gold) {
    ctx.fillStyle = '#886600';
    ctx.strokeStyle = '#ffdd00';
  } else {
    ctx.fillStyle = '#440000';
    ctx.strokeStyle = '#ff4444';
  }

  // Draw mouth shape (elliptical opening)
  ctx.beginPath();
  ctx.ellipse(mouth.x, my, mouth.w / 2, mouth.h / 2 * openAmt, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.stroke();

  // Teeth
  ctx.fillStyle = mouth.gold ? '#ffdd00' : '#ff6666';
  const teeth = 5;
  for (let i = 0; i < teeth; i++) {
    const tx = mouth.x - mouth.w / 2 + (i + 0.5) * (mouth.w / teeth);
    const topY = my - mouth.h / 2 * openAmt;
    const botY = my + mouth.h / 2 * openAmt;
    ctx.beginPath();
    ctx.moveTo(tx - 3, topY);
    ctx.lineTo(tx, topY + 6);
    ctx.lineTo(tx + 3, topY);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx - 3, botY);
    ctx.lineTo(tx, botY - 6);
    ctx.lineTo(tx + 3, botY);
    ctx.fill();
  }

  // Glow effect
  ctx.globalAlpha = 0.3 + Math.sin(mouth.animFrame * 0.08) * 0.15;
  ctx.fillStyle = mouth.gold ? '#ffdd00' : '#ff0000';
  ctx.beginPath();
  ctx.arc(mouth.x, my, mouth.w / 2 + 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW - SIDE SCROLL MODE
// ============================================================
function drawSide() {
  const theme = STAGE_THEMES[stage];

  // Cave background
  const caveGrad = ctx.createLinearGradient(0, 0, 0, GH);
  caveGrad.addColorStop(0, theme.cave);
  caveGrad.addColorStop(0.5, '#111');
  caveGrad.addColorStop(1, theme.cave);
  ctx.fillStyle = caveGrad;
  ctx.fillRect(0, 0, GW, GH);

  // Cave texture (stalactites/stalagmites)
  for (let i = 0; i < 12; i++) {
    const sx = ((i * 50 - sideScrollX * 0.3) % (GW + 40)) - 20;
    ctx.fillStyle = 'rgba(60,40,30,0.4)';
    // Stalactite
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + 8, 30 + i * 3);
    ctx.lineTo(sx - 8, 0);
    ctx.fill();
    // Stalagmite
    ctx.beginPath();
    ctx.moveTo(sx + 25, GH);
    ctx.lineTo(sx + 33, GH - 25 - i * 2);
    ctx.lineTo(sx + 17, GH);
    ctx.fill();
  }

  // Platforms
  for (const plat of sidePlatforms) {
    const platX = plat.x - sideScrollX;
    if (platX + plat.w < -10 || platX > GW + 10) continue;
    ctx.fillStyle = '#554433';
    ctx.fillRect(platX, plat.y, plat.w, plat.h);
    ctx.fillStyle = '#776655';
    ctx.fillRect(platX, plat.y, plat.w, 3);
    // Texture
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (let t = 0; t < plat.w; t += 12) {
      ctx.fillRect(platX + t, plat.y + 4, 1, plat.h - 4);
    }
  }

  // Walls
  for (const wall of sideWalls) {
    const wx = wall.x - sideScrollX;
    if (wx + wall.w < -10 || wx > GW + 10) continue;
    ctx.fillStyle = '#443322';
    ctx.fillRect(wx, wall.y, wall.w, wall.h);
    ctx.fillStyle = '#332211';
    ctx.fillRect(wx, wall.y + wall.h - 4, wall.w, 4);
  }

  // Boss
  if (sideBoss && sideBoss.alive) {
    drawBoss();
  }

  // Exit indicator
  if (sideBossDefeated || !sideBoss) {
    const exitScreenX = sideExitX - sideScrollX;
    if (exitScreenX > -20 && exitScreenX < GW + 20) {
      ctx.fillStyle = 'rgba(255,255,100,' + (0.3 + Math.sin(frame * 0.08) * 0.2) + ')';
      ctx.beginPath();
      ctx.moveTo(exitScreenX, GH - 50);
      ctx.lineTo(exitScreenX + 20, GH - 80);
      ctx.lineTo(exitScreenX + 40, GH - 50);
      ctx.lineTo(exitScreenX + 40, GH - 32);
      ctx.lineTo(exitScreenX, GH - 32);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', exitScreenX + 20, GH - 56);
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    const esx = e.x - sideScrollX;
    if (esx < -30 || esx > GW + 30) continue;
    drawEnemy(e, esx, e.y);
  }
}

// ============================================================
// DRAW - ENTITIES
// ============================================================
function drawPlayer() {
  if (invuln > 0 && Math.floor(invuln / 4) % 2 === 0) return;

  const wingOffset = Math.sin(wingFlap) * 4;

  if (mode === 'vertical') {
    drawWingedBaseling(px, py, 1, frame);
  } else {
    // Side view baseling
    ctx.fillStyle = '#66aadd';
    ctx.beginPath();
    ctx.ellipse(px, py - 4, 7, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#88ccee';
    ctx.beginPath();
    ctx.arc(px, py - 14, 6, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 2, py - 16, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 3, py - 15, 2, 2);
    // Wings (folded on side)
    ctx.fillStyle = 'rgba(200,230,255,0.7)';
    ctx.beginPath();
    ctx.moveTo(px - 5, py - 8);
    ctx.lineTo(px - 18, py - 14 + wingOffset);
    ctx.lineTo(px - 12, py + 2);
    ctx.fill();
    // Legs
    ctx.fillStyle = '#4488aa';
    ctx.fillRect(px - 4, py + 6, 3, 6);
    ctx.fillRect(px + 1, py + 6, 3, 6);
  }
}

function drawWingedBaseling(x, y, scale, f) {
  const wingOffset = Math.sin(f * 0.15) * 5 * scale;

  ctx.save();
  ctx.translate(x, y);

  // Wings
  ctx.fillStyle = 'rgba(180,220,255,0.8)';
  ctx.beginPath();
  ctx.moveTo(-6 * scale, -2 * scale);
  ctx.lineTo(-22 * scale, -12 * scale + wingOffset);
  ctx.lineTo(-18 * scale, 6 * scale);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(6 * scale, -2 * scale);
  ctx.lineTo(22 * scale, -12 * scale + wingOffset);
  ctx.lineTo(18 * scale, 6 * scale);
  ctx.fill();

  // Wing detail
  ctx.strokeStyle = 'rgba(100,180,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-10 * scale, -4 * scale);
  ctx.lineTo(-20 * scale, -8 * scale + wingOffset);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10 * scale, -4 * scale);
  ctx.lineTo(20 * scale, -8 * scale + wingOffset);
  ctx.stroke();

  // Body
  ctx.fillStyle = '#5599cc';
  ctx.beginPath();
  ctx.ellipse(0, 2 * scale, 7 * scale, 10 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#77bbdd';
  ctx.beginPath();
  ctx.arc(0, -10 * scale, 6 * scale, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-4 * scale, -12 * scale, 3 * scale, 3 * scale);
  ctx.fillRect(1 * scale, -12 * scale, 3 * scale, 3 * scale);
  ctx.fillStyle = '#222';
  ctx.fillRect(-3 * scale, -11 * scale, 2 * scale, 2 * scale);
  ctx.fillRect(2 * scale, -11 * scale, 2 * scale, 2 * scale);

  // Feet
  ctx.fillStyle = '#3377aa';
  ctx.fillRect(-4 * scale, 10 * scale, 3 * scale, 4 * scale);
  ctx.fillRect(1 * scale, 10 * scale, 3 * scale, 4 * scale);

  ctx.restore();
}

function drawEnemy(e, ex, ey) {
  ctx.save();
  ctx.translate(ex, ey);

  switch (e.name) {
    case 'bat':
      ctx.fillStyle = '#884488';
      const bwing = Math.sin(e.frame * 0.2) * 4;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-8, -4 + bwing);
      ctx.lineTo(-6, 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(8, -4 + bwing);
      ctx.lineTo(6, 2);
      ctx.fill();
      ctx.fillStyle = '#662266';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(-2, -2, 2, 2);
      ctx.fillRect(1, -2, 2, 2);
      break;

    case 'eye':
      ctx.fillStyle = '#ddddaa';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aa2222';
      ctx.beginPath();
      ctx.arc(Math.cos(e.frame * 0.05) * 2, Math.sin(e.frame * 0.05) * 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(Math.cos(e.frame * 0.05) * 2, Math.sin(e.frame * 0.05) * 2, 2, 0, Math.PI * 2);
      ctx.fill();
      // Veins
      ctx.strokeStyle = '#cc4444';
      ctx.lineWidth = 0.5;
      for (let v = 0; v < 5; v++) {
        const va = v * Math.PI * 2 / 5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(va) * 4, Math.sin(va) * 4);
        ctx.lineTo(Math.cos(va) * 7, Math.sin(va) * 7);
        ctx.stroke();
      }
      break;

    case 'diver':
      ctx.fillStyle = '#cc6622';
      ctx.beginPath();
      ctx.moveTo(0, -9);
      ctx.lineTo(-6, 6);
      ctx.lineTo(6, 6);
      ctx.fill();
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.moveTo(0, -5);
      ctx.lineTo(-4, 4);
      ctx.lineTo(4, 4);
      ctx.fill();
      // Flame trail when diving
      if (e.diving) {
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.moveTo(-3, 6);
        ctx.lineTo(0, 12 + Math.random() * 4);
        ctx.lineTo(3, 6);
        ctx.fill();
      }
      break;

    case 'disc':
      const rot = e.frame * 0.1;
      ctx.fillStyle = '#888888';
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#aaaaaa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 5, rot, rot + Math.PI);
      ctx.stroke();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'orb':
      const orbPulse = Math.sin(e.frame * 0.1) * 2;
      ctx.fillStyle = '#4444ff';
      ctx.beginPath();
      ctx.arc(0, 0, 5 + orbPulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8888ff';
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'turret':
      ctx.fillStyle = '#666666';
      ctx.fillRect(-10, -6, 20, 12);
      ctx.fillStyle = '#888888';
      ctx.fillRect(-3, -12, 6, 8);
      ctx.fillStyle = '#aa0000';
      ctx.fillRect(-2, -14, 4, 4);
      break;

    case 'tank':
      ctx.fillStyle = '#556644';
      ctx.fillRect(-10, -5, 20, 10);
      ctx.fillStyle = '#667755';
      ctx.fillRect(-6, -9, 12, 6);
      ctx.fillStyle = '#444';
      ctx.fillRect(4, -12, 3, 6);
      // Treads
      ctx.fillStyle = '#333';
      ctx.fillRect(-10, 3, 20, 3);
      break;
  }

  ctx.restore();
}

function drawBoss() {
  const b = sideBoss;
  const bx = b.x - sideScrollX;

  ctx.save();
  ctx.translate(bx, b.y);

  // Phase color
  const baseColor = b.phase === 0 ? '#884422' : '#aa2222';

  // Main body (mechanical/organic hybrid)
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Armor plates
  ctx.fillStyle = '#666';
  ctx.fillRect(-25, -10, 12, 20);
  ctx.fillRect(13, -10, 12, 20);

  // Core (glowing)
  const corePulse = Math.sin(frame * 0.08) * 3;
  ctx.fillStyle = b.phase === 0 ? '#ff8844' : '#ff2222';
  ctx.beginPath();
  ctx.arc(0, 0, 10 + corePulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffddaa';
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fill();

  // Tentacles/arms
  ctx.strokeStyle = baseColor;
  ctx.lineWidth = 4;
  for (let i = 0; i < 4; i++) {
    const ang = (i / 4) * Math.PI * 2 + frame * 0.02;
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang) * 20, Math.sin(ang) * 18);
    ctx.lineTo(Math.cos(ang) * 35, Math.sin(ang) * 30 + Math.sin(frame * 0.05 + i) * 5);
    ctx.stroke();
  }

  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(-8, -8, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -8, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-8, -8, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -8, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // HP bar
  const hpPct = b.hp / b.maxHP;
  ctx.fillStyle = '#333';
  ctx.fillRect(bx - 30, b.y - b.h / 2 - 14, 60, 6);
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(bx - 30, b.y - b.h / 2 - 14, 60 * hpPct, 6);
}

function drawBullets() {
  for (const b of bullets) {
    switch (b.type) {
      case 'normal':
        ctx.fillStyle = '#88ddff';
        ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
        ctx.fillStyle = '#fff';
        ctx.fillRect(b.x - 1, b.y - 2, 2, 4);
        break;
      case 'fire':
        ctx.fillStyle = '#ff6600';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, b.w / 2, b.h / 2, mode === 'side' ? 0 : Math.PI / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, b.w / 4, b.h / 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'laser':
        ctx.fillStyle = '#00ffff';
        ctx.globalAlpha = 0.9;
        if (mode === 'vertical') {
          ctx.fillRect(b.x - 2, b.y - 8, 4, 16);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(b.x - 1, b.y - 6, 2, 12);
        } else {
          ctx.fillRect(b.x - 8, b.y - 2, 16, 4);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(b.x - 6, b.y - 1, 12, 2);
        }
        ctx.globalAlpha = 1;
        break;
      case 'homing':
        ctx.fillStyle = '#aa44ff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#dd88ff';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

function drawEnemyBullets() {
  ctx.fillStyle = '#ff4444';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaaaa';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4444';
  }
}

function drawPickups() {
  for (const pk of pickups) {
    if (!pk.alive) continue;
    const pkx = mode === 'side' ? pk.x - sideScrollX : pk.x;
    const pky = pk.y;
    if (pkx < -10 || pkx > GW + 10) continue;

    const bob = Math.sin(frame * 0.08) * 3;
    if (pk.type === 'weapon') {
      ctx.fillStyle = '#ff8800';
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(pkx, pky + bob, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('W', pkx, pky + bob + 3);
    } else {
      ctx.fillStyle = '#44dd44';
      ctx.beginPath();
      ctx.arc(pkx, pky + bob, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('$', pkx, pky + bob + 3);
    }
  }
}

// ============================================================
// DRAW - TRANSITION
// ============================================================
function drawTransition() {
  const progress = 1 - (transitionTimer / 45);

  if (transitionType === 'entering') {
    // Sucking into ground effect - shrinking circle wipe
    const theme = STAGE_THEMES[stage];
    const grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, theme.sky);
    grad.addColorStop(1, '#88bbdd');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    // Shrinking viewport
    ctx.fillStyle = '#000';
    const radius = GW * (1 - progress);
    ctx.beginPath();
    ctx.rect(0, 0, GW, GH);
    ctx.arc(GW / 2, GH / 2, radius, 0, Math.PI * 2, true);
    ctx.fill();

    // Swirl effect
    ctx.strokeStyle = '#ff4400';
    ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      const a = progress * Math.PI * 4 + i * Math.PI / 2;
      const r = radius * 0.8;
      ctx.beginPath();
      ctx.arc(GW / 2 + Math.cos(a) * r * 0.3, GH / 2 + Math.sin(a) * r * 0.3, r * 0.2, 0, Math.PI);
      ctx.stroke();
    }

    // Text
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ENTERING CAVERN', GW / 2, GH / 2 - 10);
  } else {
    // Emerging from underground - expanding circle
    ctx.fillStyle = STAGE_THEMES[stage].cave;
    ctx.fillRect(0, 0, GW, GH);

    const radius = GW * progress;
    ctx.fillStyle = STAGE_THEMES[stage].sky;
    ctx.beginPath();
    ctx.arc(GW / 2, GH / 2, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BACK TO THE SKY', GW / 2, GH / 2 - 10);
  }
}

// ============================================================
// DRAW - HUD
// ============================================================
function drawHUD() {
  const barH = 28;
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 12px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Stage + mode
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  const modeText = mode === 'vertical' ? 'SKY' : 'CAVE';
  ctx.fillText('STG ' + (stage + 1) + ' [' + modeText + ']', GW / 2, 18);

  // Lives
  ctx.textAlign = 'right';
  ctx.fillStyle = '#44dd88';
  for (let i = 0; i < lives; i++) {
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 18, 14, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Weapon tier indicator (bottom of screen)
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(0, GH - 20, GW, 20);
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('WEAPON: ', 6, GH - 7);

  // Tier boxes
  for (let i = 0; i < 5; i++) {
    const bx = 65 + i * 22;
    ctx.fillStyle = i <= weaponTier ? ['#88ccff', '#44ff44', '#ffaa00', '#ff4400', '#ff00ff'][i] : '#333';
    ctx.fillRect(bx, GH - 16, 18, 10);
    if (i === weaponTier) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, GH - 16, 18, 10);
    }
  }

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(WEAPON_NAMES[weaponTier], 180, GH - 7);

  // Side mode HP
  if (mode === 'side') {
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'right';
    ctx.font = '10px monospace';
    ctx.fillText('HP:', GW - 60, GH - 7);
    for (let i = 0; i < sideHP; i++) {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(GW - 50 + i * 14, GH - 14, 10, 8);
    }
  }

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = comboTimer / 60;
    ctx.fillText('COMBO x' + comboCount, GW / 2, 42);
    ctx.globalAlpha = 1;
  }

  // Scroll progress bar (vertical mode)
  if (mode === 'vertical') {
    const progressPct = scrollY / VERTICAL_LENGTH;
    ctx.fillStyle = '#333';
    ctx.fillRect(GW - 6, 30, 4, GH - 55);
    ctx.fillStyle = '#44cc88';
    ctx.fillRect(GW - 6, 30 + (GH - 55) * (1 - progressPct), 4, (GH - 55) * progressPct);
  }
}

// ============================================================
// DRAW - STAGE COMPLETE / VICTORY
// ============================================================
function drawStageComplete() {
  const theme = STAGE_THEMES[stage];
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('STAGE ' + (stage + 1) + ' CLEAR!', GW / 2, GH * 0.3);

  ctx.fillStyle = '#88ccff';
  ctx.font = '14px monospace';
  ctx.fillText(STAGE_THEMES[stage].name, GW / 2, GH * 0.42);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + score, GW / 2, GH * 0.58);
  ctx.fillText('Weapon: ' + WEAPON_NAMES[weaponTier], GW / 2, GH * 0.66);

  if (deathTimer > 60) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffff88';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEXT STAGE...', GW / 2, GH * 0.82);
    ctx.globalAlpha = 1;
  }
}

function drawVictory() {
  // Epic background
  const t = frame * 0.01;
  ctx.fillStyle = '#110022';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 37 + frame * 0.2) % GW;
    const sy = (i * 23 + frame * 0.1) % GH;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(frame * 0.05 + i) * 0.3) + ')';
    ctx.fillRect(sx, sy, 2, 2);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#88ccff';
  ctx.font = '14px monospace';
  ctx.fillText('The skies of Tasern are free!', GW / 2, 100);

  drawWingedBaseling(GW / 2, 160, 1.5, frame);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 220);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 245);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('Press any key to return', GW / 2, 290);
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
