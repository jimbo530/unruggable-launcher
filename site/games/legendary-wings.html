<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Sky Patrol</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// ============================================================
// BASELING STATS (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Single-player (default 0.8–1.6 band). recomputeStats() puts the clamped mult in the
// high-level statB.* field and keeps the D&D fields NEUTRAL (10) so the helper terms = 1 and
// each mult applies exactly once. Shmup wiring: speed<-moveSpeed, damage<-damage, hpMult<-
// health, scoreMult/luck<-luck, cooldown<-1/moveSpeed (fire cadence). No water (SWM untouched).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[legendary-wings] NftLoader display info failed:', e && e.message); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health;
  statB.scoreMult = m.luck; statB.luck = m.luck; statB.cooldown = 1 / m.moveSpeed;
  statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = 10; statB.dex = 10; statB.con = 10; statB.int = 10; statB.wis = 10; statB.cha = 10;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}

// Stat helper functions
function strDmgMult() { return statB.damage * (1 + (statB.str - 10) * 0.05); }
function dexSpeedMult() { return statB.speed * (1 + (statB.dex - 10) * 0.03); }
function conHpMult() { return statB.hpMult * (1 + (statB.con - 10) * 0.06); }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisFireRateMult() { return statB.cooldown * (1.2 - statB.wis / 50); }
function chaDropChance(base) { return Math.min(1, base * statB.luck * (0.8 + statB.cha / 50)); }

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'JUMP', c: 'PICK' } });

recomputeStats();
var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[legendary-wings] player init failed:', e && e.message); });
}

const TILE = 16;
const PLAYER_SPEED = 3;
const PLAYER_SPEED_SIDE = 2.5;
const GRAVITY = 600;
const JUMP_VEL = -260;
const MAX_FALL = 320;
const BULLET_SPEED = 5;
const FIRE_COOLDOWN = 8;
const STAGE_COUNT = 5;
const VERTICAL_LENGTH = 2400;
const SIDE_LENGTH = 800;

// Weapon tier names (Baseling-themed)
const WEAPON_NAMES = ['POOP PELLET', 'TWIN POOP', 'GARDEN SPREAD', 'MYCELIUM BEAM', 'SPORE STORM'];

// Stage color themes (Baseling areas)
const STAGE_THEMES = [
  { sky: '#1a3322', ground: '#2a4422', cave: '#0a1108', name: 'SKY GARDEN CANOPY', stars: false },
  { sky: '#3b1f6e', ground: '#2a1a44', cave: '#110022', name: 'SPORE HIGHLANDS', stars: false },
  { sky: '#7a444a', ground: '#4a2a2e', cave: '#1a0c0e', name: 'POOP REACTOR FORGE', stars: false },
  { sky: '#1a3355', ground: '#1a2233', cave: '#001122', name: 'FROZEN COMPOST', stars: true },
  { sky: '#1a1c2c', ground: '#221133', cave: '#0a000f', name: 'THE DARK GARDEN', stars: true }
];

// ============================================================
// GAME STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('legwings_hi');
let lives = 3;
let stage = 0;
let frame = 0;
let mode = 'vertical'; // 'vertical' or 'side'
let transitionTimer = 0;
let transitionType = ''; // 'entering' or 'exiting'

// Player
let px, py, pvx, pvy;
let weaponTier = 0;
let fireCooldown = 0;
let invuln = 0;
let wingFlap = 0;
let sideHP = 3;
let comboCount = 0;
let comboTimer = 0;
let playerDead = false;
let deathTimer = 0;

// Vertical mode
let scrollY = 0;
let groundTiles = [];
let groundMouths = [];
let powerPods = [];

// Side-scroll mode
let sideScrollX = 0;
let sidePlatforms = [];
let sideWalls = [];
let sideBoss = null;
let sideBossDefeated = false;
let sideExitX = 0;

// Shared
let bullets = [];
let enemies = [];
let enemyBullets = [];
let pickups = [];

// Background stars (generated once)
let bgStars = [];
for (let i = 0; i < 50; i++) {
  bgStars.push({ x: Math.random() * GW, y: Math.random() * GH, size: 1 + Math.random() * 1.5, speed: 0.2 + Math.random() * 0.5, twinkle: Math.random() * Math.PI * 2 });
}

// ============================================================
// INIT / RESET
// ============================================================
function startGame() {
  state = 'playing';
  mode = 'vertical';
  score = 0;
  lives = 3 + bonusLives();
  stage = 0;
  weaponTier = 0;
  TAS.particles.clear();
  initStage();
}

function initStage() {
  mode = 'vertical';
  transitionTimer = 0;
  transitionType = '';
  scrollY = 0;
  px = GW / 2;
  py = GH - 60;
  pvx = 0;
  pvy = 0;
  fireCooldown = 0;
  invuln = 60;
  wingFlap = 0;
  sideHP = Math.floor(3 * conHpMult());
  comboCount = 0;
  comboTimer = 0;
  playerDead = false;
  deathTimer = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  pickups = [];
  generateVerticalStage();
}

function initSideSection(mouthType) {
  mode = 'side';
  sideScrollX = 0;
  px = 40;
  py = GH - 80;
  pvx = 0;
  pvy = 0;
  sideHP = Math.floor(3 * conHpMult());
  fireCooldown = 0;
  bullets = [];
  enemies = [];
  enemyBullets = [];
  pickups = [];
  sideBoss = null;
  sideBossDefeated = false;
  generateSideSection(mouthType);
}

// ============================================================
// VERTICAL STAGE GENERATION
// ============================================================
function generateVerticalStage() {
  groundTiles = [];
  groundMouths = [];
  powerPods = [];

  // Generate ground features along the scroll length
  const segCount = Math.floor(VERTICAL_LENGTH / 80);
  for (let i = 0; i < segCount; i++) {
    const sy = i * 80;
    // Ground texture blocks
    const gCount = TAS.math.randInt(2, 5);
    for (let j = 0; j < gCount; j++) {
      groundTiles.push({
        x: TAS.math.randRange(0, GW - 48),
        y: sy + TAS.math.randRange(0, 60),
        w: TAS.math.randInt(32, 64),
        h: TAS.math.randInt(24, 40),
        type: TAS.math.randInt(0, 3) // mushroom cluster/spore turret/mycelial tree/reactor rock
      });
    }

    // Ground mouths (garden portals)
    if (i > 2 && Math.random() < 0.2) {
      const isGold = Math.random() < 0.3;
      groundMouths.push({
        x: TAS.math.randRange(60, GW - 60),
        y: sy + TAS.math.randRange(20, 60),
        w: 40, h: 30,
        gold: isGold,
        animFrame: 0,
        active: true
      });
    }

    // Power pods (spore pods)
    if (Math.random() < 0.15) {
      powerPods.push({
        x: TAS.math.randRange(40, GW - 40),
        y: sy + TAS.math.randRange(10, 70),
        alive: true
      });
    }
  }

  // Spawn waves of enemies
  spawnVerticalEnemies();
}

function spawnVerticalEnemies() {
  const waveCount = 8 + stage * 4;
  for (let i = 0; i < waveCount; i++) {
    const spawnY = TAS.math.randRange(200, VERTICAL_LENGTH - 200);
    const etype = TAS.math.randInt(0, 4);
    const count = TAS.math.randInt(3, 6);
    for (let j = 0; j < count; j++) {
      enemies.push(createEnemy(etype, TAS.math.randRange(20, GW - 20), spawnY + j * 30, 'vertical'));
    }
  }
  // Ground enemies (turrets, tanks)
  for (const tile of groundTiles) {
    if (tile.type <= 1 && Math.random() < 0.4) {
      enemies.push(createGroundEnemy(tile));
    }
  }
}

// ============================================================
// SIDE SECTION GENERATION
// ============================================================
function generateSideSection(mouthType) {
  sidePlatforms = [];
  sideWalls = [];
  const len = mouthType === 'gold' ? SIDE_LENGTH * 0.7 : SIDE_LENGTH;
  sideExitX = len - 60;

  // Floor
  sidePlatforms.push({ x: 0, y: GH - 32, w: len + 200, h: 32 });

  // Platforms
  const platCount = Math.floor(len / 80);
  for (let i = 0; i < platCount; i++) {
    const px2 = 100 + i * 80 + TAS.math.randRange(-20, 20);
    const py2 = GH - 60 - TAS.math.randRange(40, 140);
    sidePlatforms.push({ x: px2, y: py2, w: TAS.math.randInt(48, 96), h: 12 });
  }

  // Ceiling blocks (stalactites)
  for (let i = 0; i < platCount; i++) {
    if (Math.random() < 0.4) {
      sideWalls.push({
        x: 60 + i * 80 + TAS.math.randRange(-10, 10),
        y: 0,
        w: TAS.math.randInt(24, 48),
        h: TAS.math.randInt(40, 80)
      });
    }
  }

  // Side enemies
  const eCount = 6 + stage * 3;
  for (let i = 0; i < eCount; i++) {
    const ex = TAS.math.randRange(200, len - 200);
    const ey = TAS.math.randRange(60, GH - 80);
    const etype = TAS.math.randInt(0, 3);
    enemies.push(createEnemy(etype, ex, ey, 'side'));
  }

  // Boss at the end
  if (mouthType !== 'gold') {
    sideBoss = createBoss(stage, len - 150);
  }

  // Bonus pickups in gold rooms
  if (mouthType === 'gold') {
    for (let i = 0; i < 8; i++) {
      pickups.push({
        x: 100 + i * 70,
        y: GH - 80 - TAS.math.randRange(20, 100),
        type: Math.random() < 0.5 ? 'score' : 'weapon',
        alive: true
      });
    }
  }
}

// ============================================================
// ENEMY FACTORY (Baseling-themed)
// ============================================================
function createEnemy(type, x, y, mode2) {
  const base = { x, y, type, mode: mode2, hp: 1 + Math.floor(stage * 0.5), alive: true, frame: 0, fireTimer: 0 };
  switch (type) {
    case 0: // Sky Mold
      return Object.assign(base, { name: 'sky_mold', w: 14, h: 10, speed: 1.5 + stage * 0.2, pattern: 'sine', phase: Math.random() * Math.PI * 2 });
    case 1: // Wing Spore
      return Object.assign(base, { name: 'wing_spore', w: 18, h: 18, speed: 0.8, pattern: 'track', hp: 2 + stage });
    case 2: // Aerial Fungus (dive bomber)
      return Object.assign(base, { name: 'aerial_fungus', w: 14, h: 18, speed: 3, pattern: 'dive', diveY: y, diving: false });
    case 3: // Cloud Parasite
      return Object.assign(base, { name: 'cloud_parasite', w: 14, h: 14, speed: 2, pattern: 'circle', angle: Math.random() * Math.PI * 2, radius: 30 + Math.random() * 40, cx: x, cy: y });
    case 4: // Homing Spore
      return Object.assign(base, { name: 'homing_spore', w: 10, h: 10, speed: 1.2 + stage * 0.3, pattern: 'homing', hp: 1 });
    default:
      return Object.assign(base, { name: 'sky_mold', w: 14, h: 10, speed: 1.5, pattern: 'sine', phase: 0 });
  }
}

function createGroundEnemy(tile) {
  return {
    x: tile.x + tile.w / 2,
    y: tile.y,
    type: 5,
    name: tile.type === 0 ? 'garden_turret' : 'compost_tank',
    w: 20, h: 16,
    hp: 3 + stage,
    alive: true,
    frame: 0,
    fireTimer: TAS.math.randInt(30, 90),
    mode: 'vertical',
    speed: tile.type === 1 ? 0.5 : 0,
    pattern: 'ground'
  };
}

function createBoss(stageNum, x) {
  const bossHP = 30 + stageNum * 15;
  const bossNames = ['SKY MOLD WYRM', 'CLOUD PARASITE LORD', 'POOP GOLEM', 'FROST FUNGUS', 'GARDEN SHADE KING'];
  return {
    x: x, y: GH / 2 - 30,
    w: 64, h: 54,
    hp: bossHP, maxHP: bossHP,
    phase: 0, timer: 0,
    alive: true,
    bossName: bossNames[stageNum] || 'SKY MOLD WYRM',
    name: 'boss_' + stageNum,
    speed: 1 + stageNum * 0.3,
    fireRate: Math.max(20, 50 - stageNum * 8),
    fireTimer: 0,
    pattern: stageNum % 2 === 0 ? 'sweep' : 'bounce',
    dir: 1
  };
}

// ============================================================
// WEAPON SYSTEM (stat-scaled)
// ============================================================
function fireWeapon() {
  if (fireCooldown > 0) return;
  fireCooldown = Math.max(2, Math.floor((FIRE_COOLDOWN - Math.min(4, weaponTier)) * wisFireRateMult()));

  const bx = px;
  const by = py - (mode === 'vertical' ? 10 : 0);
  const dmgMult = strDmgMult();

  TAS.audio.playTone(400 + weaponTier * 100, 0.06, 'square', 0.05);

  switch (weaponTier) {
    case 0: // POOP Pellet
      bullets.push(makeBullet(bx, by, -1, 0, dmgMult));
      break;
    case 1: // Twin POOP
      bullets.push(makeBullet(bx - 6, by, -1, 0, dmgMult));
      bullets.push(makeBullet(bx + 6, by, -1, 0, dmgMult));
      break;
    case 2: // Garden Spread
      bullets.push(makeBullet(bx, by, -1, 0, dmgMult));
      bullets.push(makeBullet(bx - 4, by, -1, -0.5, dmgMult));
      bullets.push(makeBullet(bx + 4, by, -1, 0.5, dmgMult));
      break;
    case 3: // Mycelium Beam
      bullets.push({ x: bx, y: by, vx: mode === 'side' ? BULLET_SPEED : 0, vy: mode === 'vertical' ? -BULLET_SPEED : 0, w: 22, h: 10, damage: Math.ceil(2 * dmgMult), pierce: true, type: 'fire' });
      break;
    case 4: // Spore Storm (mycelium laser + homing)
      bullets.push({ x: bx, y: by, vx: mode === 'side' ? BULLET_SPEED * 1.5 : 0, vy: mode === 'vertical' ? -BULLET_SPEED * 1.5 : 0, w: 4, h: 16, damage: Math.ceil(3 * dmgMult), pierce: true, type: 'laser' });
      if (frame % 3 === 0) {
        bullets.push({ x: bx, y: by, vx: 0, vy: 0, w: 8, h: 8, damage: Math.ceil(1 * dmgMult), pierce: false, type: 'homing', life: 120 });
      }
      break;
  }
}

function makeBullet(x, y, dir, spread, dmgMult) {
  const vx = mode === 'side' ? BULLET_SPEED : (spread || 0);
  const vy = mode === 'vertical' ? -BULLET_SPEED : (spread ? spread * 0.5 : 0);
  return { x, y, vx, vy, w: 4, h: 8, damage: Math.ceil(1 * (dmgMult || 1)), pierce: false, type: 'normal' };
}

// ============================================================
// UPDATE - MAIN
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state === 'stageComplete') {
    deathTimer++;
    if (deathTimer > 120) {
      stage++;
      if (stage >= STAGE_COUNT) {
        state = 'victory';
        frame = 0;
      } else {
        initStage();
        state = 'playing';
      }
    }
    return;
  }

  if (state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      if (score > highScore) { highScore = score; TAS.score.save('legwings_hi', score); }
      state = 'title';
      frame = 0;
    }
    return;
  }

  // Transition animation
  if (transitionTimer > 0) {
    transitionTimer--;
    if (transitionTimer <= 0) {
      if (transitionType === 'entering') {
        // Already in side mode
      } else if (transitionType === 'exiting') {
        mode = 'vertical';
        py = GH - 80;
        invuln = 60;
      }
      transitionType = '';
    }
    return;
  }

  if (playerDead) {
    deathTimer++;
    if (deathTimer > 90) {
      lives--;
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('legwings_hi', score); }
        state = 'gameOver';
        frame = 0;
      } else {
        playerDead = false;
        deathTimer = 0;
        if (weaponTier > 0) weaponTier--;
        invuln = 120;
        if (mode === 'vertical') {
          px = GW / 2;
          py = GH - 60;
        } else {
          sideHP = Math.floor(3 * conHpMult());
          px = Math.max(sideScrollX + 40, px - 100);
        }
      }
    }
    return;
  }

  if (mode === 'vertical') {
    updateVertical(dt);
  } else {
    updateSide(dt);
  }

  // Invulnerability countdown
  if (invuln > 0) invuln--;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }
}

// ============================================================
// UPDATE - VERTICAL MODE
// ============================================================
function updateVertical(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Movement (free fly in all directions) - DEX scales speed
  let mx = 0, my = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) mx -= 1;
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) mx += 1;
  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) my -= 1;
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) my += 1;

  const moveSpeed = PLAYER_SPEED * dexSpeedMult();
  px += mx * moveSpeed;
  py += my * moveSpeed;
  px = TAS.math.clamp(px, 16, GW - 16);
  py = TAS.math.clamp(py, 40, GH - 16);

  wingFlap += 0.15;

  // Auto-scroll upward
  scrollY += 1 + stage * 0.3;

  // Check stage completion
  if (scrollY >= VERTICAL_LENGTH) {
    state = 'stageComplete';
    deathTimer = 0;
    score += Math.floor(1000 * (stage + 1) * intScoreMult());
    TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.2]], 150);
    return;
  }

  // Fire (Z, Space, or A button)
  if (keys['KeyZ'] || keys['Space'] || tch.a) {
    fireWeapon();
  }
  if (fireCooldown > 0) fireCooldown--;

  // Update bullets
  updateBullets();

  // Update enemies
  updateVerticalEnemies();

  // Update enemy bullets
  updateEnemyBullets();

  // Check mouth collisions (garden portals)
  for (const mouth of groundMouths) {
    if (!mouth.active) continue;
    const mWorldY = mouth.y - scrollY + GH;
    if (mWorldY > -50 && mWorldY < GH + 50) {
      mouth.animFrame++;
      // Suction zone
      if (TAS.hit.rectOverlap(px - 8, py - 8, 16, 16, mouth.x - 20, mWorldY - 20, 40, 40)) {
        mouth.active = false;
        transitionType = 'entering';
        transitionTimer = 45;
        TAS.audio.playTone(200, 0.4, 'sawtooth', 0.1, 80);
        TAS.fx.shake(8, 0.85);
        setTimeout(function() { initSideSection(mouth.gold ? 'gold' : 'trap'); }, 50);
      }
    }
  }

  // Power pod collisions (spore pods)
  for (const pod of powerPods) {
    if (!pod.alive) continue;
    const podWorldY = pod.y - scrollY + GH;
    if (podWorldY > -20 && podWorldY < GH + 20) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (TAS.hit.rectOverlap(b.x - 4, b.y - 4, 8, 8, pod.x - 10, podWorldY - 10, 20, 20)) {
          pod.alive = false;
          if (!b.pierce) bullets.splice(i, 1);
          pickups.push({ x: pod.x, y: podWorldY, type: 'weapon', alive: true, vy: 0.5 });
          TAS.audio.playTone(600, 0.1, 'triangle', 0.06);
          TAS.particles.spawn(pod.x, podWorldY, '#88ff44', 10, 2.5);
          break;
        }
      }
    }
  }

  // Pickup collisions - CHA affects drop chances earlier, here just collection
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    if (!pk.alive) { pickups.splice(i, 1); continue; }
    pk.y += pk.vy || 0;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 20, 20, pk.x - 8, pk.y - 8, 16, 16)) {
      pk.alive = false;
      pickups.splice(i, 1);
      if (pk.type === 'weapon') {
        weaponTier = Math.min(4, weaponTier + 1);
        TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.1]], 80);
      } else {
        score += Math.floor(200 * intScoreMult());
        TAS.audio.playTone(800, 0.08, 'triangle', 0.05);
      }
    }
  }
}

function updateVerticalEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    const eWorldY = e.mode === 'vertical' ? e.y - scrollY + GH : e.y;
    if (eWorldY < -80 || eWorldY > GH + 80) continue;

    e.frame++;

    // Movement patterns
    switch (e.pattern) {
      case 'sine':
        e.x += Math.sin(e.frame * 0.05 + e.phase) * e.speed;
        e.y += 0.3;
        break;
      case 'track':
        var dx = px - e.x, dy = (py + scrollY - GH) - e.y;
        var d = Math.sqrt(dx * dx + dy * dy) || 1;
        e.x += (dx / d) * e.speed;
        e.y += (dy / d) * e.speed;
        break;
      case 'dive':
        if (!e.diving && eWorldY < GH * 0.6 && Math.abs(e.x - px) < 40) {
          e.diving = true;
        }
        if (e.diving) {
          e.y += e.speed;
        } else {
          e.x += Math.sin(e.frame * 0.03) * 1.5;
        }
        break;
      case 'circle':
        e.angle += 0.03;
        e.x = e.cx + Math.cos(e.angle) * e.radius;
        e.y = e.cy + Math.sin(e.angle) * e.radius * 0.5;
        break;
      case 'homing':
        var hdx = px - e.x, hdy = (py + scrollY - GH) - e.y;
        var hd = Math.sqrt(hdx * hdx + hdy * hdy) || 1;
        e.x += (hdx / hd) * e.speed;
        e.y += (hdy / hd) * e.speed;
        break;
      case 'ground':
        e.x += e.speed * (Math.sin(e.frame * 0.02) > 0 ? 1 : -1);
        e.fireTimer--;
        if (e.fireTimer <= 0) {
          e.fireTimer = 60 - stage * 5;
          var gy = e.y - scrollY + GH;
          if (gy > 0 && gy < GH) {
            var ang = TAS.math.angle(e.x, gy, px, py);
            enemyBullets.push({ x: e.x, y: gy, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5 });
          }
        }
        break;
    }

    // Shooting enemies (non-ground)
    if (e.pattern !== 'ground' && e.frame % (80 - stage * 10) === 0 && eWorldY > 30 && eWorldY < GH - 30) {
      if (Math.random() < 0.3 + stage * 0.1) {
        var ang2 = TAS.math.angle(e.x, eWorldY, px, py);
        enemyBullets.push({ x: e.x, y: eWorldY, vx: Math.cos(ang2) * 2, vy: Math.sin(ang2) * 2 });
      }
    }

    // Collision with player bullets
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, e.x - e.w / 2, eWorldY - e.h / 2, e.w, e.h)) {
        e.hp -= b.damage;
        if (!b.pierce) bullets.splice(j, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += Math.floor((50 + comboCount * 10) * intScoreMult());
          comboCount++;
          comboTimer = 60;
          spawnDeathExplosion(e.x, eWorldY, e.name);
          TAS.audio.playTone(300, 0.1, 'sawtooth', 0.04, 100);
          // CHA-scaled drop chance
          if (Math.random() < chaDropChance(0.1)) {
            pickups.push({ x: e.x, y: eWorldY, type: Math.random() < 0.5 ? 'weapon' : 'score', alive: true, vy: 0.5 });
          }
        } else {
          TAS.particles.spawn(e.x, eWorldY, '#ffffff', 3, 1);
        }
        break;
      }
    }

    // Collision with player
    if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 8, 16, 16, e.x - e.w / 2, eWorldY - e.h / 2, e.w, e.h)) {
      playerHit();
    }
  }
}

// ============================================================
// UPDATE - SIDE SCROLL MODE
// ============================================================
function updateSide(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Horizontal movement - DEX scales speed
  let mx = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) mx -= 1;
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) mx += 1;

  pvx = mx * PLAYER_SPEED_SIDE * dexSpeedMult();
  px += pvx;

  // Gravity
  pvy += GRAVITY * dt;
  if (pvy > MAX_FALL) pvy = MAX_FALL;

  // Jump / glide (wings slow fall)
  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || tch.b || tch.up;
  if (jumpPressed) {
    if (isOnGround()) {
      pvy = JUMP_VEL;
      TAS.audio.playTone(350, 0.08, 'triangle', 0.04, 500);
    } else if (pvy > 0) {
      pvy *= 0.85;
      wingFlap += 0.2;
    }
  }

  py += pvy * dt;
  wingFlap += 0.1;

  // Platform collision
  resolveSidePlatforms();

  // Wall collision
  for (const wall of sideWalls) {
    const wx = wall.x - sideScrollX;
    if (TAS.hit.rectOverlap(px - 8, py - 14, 16, 28, wx, wall.y, wall.w, wall.h)) {
      if (px < wx + wall.w / 2) {
        px = wx - 8;
      } else {
        px = wx + wall.w + 8;
      }
    }
  }

  // Keep player on screen
  px = TAS.math.clamp(px, 12, GW - 12);
  if (py > GH + 20) {
    playerHit();
    py = GH - 80;
    pvy = 0;
  }

  // Auto-scroll in side sections (camera follows player)
  if (px > GW * 0.6) {
    const scrollAmount = px - GW * 0.6;
    sideScrollX += scrollAmount;
    px = GW * 0.6;
  }

  // Fire
  if (keys['KeyZ'] || tch.a) {
    fireWeapon();
  }
  if (fireCooldown > 0) fireCooldown--;

  updateBullets();
  updateSideEnemies();
  updateEnemyBullets();

  if (sideBoss && sideBoss.alive) {
    updateBoss();
  }

  // Check exit
  if (sideBossDefeated || !sideBoss) {
    if (px + sideScrollX > sideExitX) {
      transitionType = 'exiting';
      transitionTimer = 45;
      TAS.audio.playTone(400, 0.3, 'triangle', 0.08, 800);
      TAS.fx.flash('#fff', 0.4);
      score += Math.floor(500 * intScoreMult());
    }
  }

  // Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const pk = pickups[i];
    if (!pk.alive) { pickups.splice(i, 1); continue; }
    const pkScreenX = pk.x - sideScrollX;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 20, 20, pkScreenX - 8, pk.y - 8, 16, 16)) {
      pk.alive = false;
      if (pk.type === 'weapon') {
        weaponTier = Math.min(4, weaponTier + 1);
        TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.1]], 80);
      } else {
        score += Math.floor(200 * intScoreMult());
        TAS.audio.playTone(800, 0.08, 'triangle', 0.05);
      }
      pickups.splice(i, 1);
    }
  }
}

function isOnGround() {
  for (const plat of sidePlatforms) {
    const platX = plat.x - sideScrollX;
    if (py + 14 >= plat.y && py + 14 <= plat.y + 8 && px + 8 > platX && px - 8 < platX + plat.w && pvy >= 0) {
      return true;
    }
  }
  return false;
}

function resolveSidePlatforms() {
  for (const plat of sidePlatforms) {
    const platX = plat.x - sideScrollX;
    if (px + 8 > platX && px - 8 < platX + plat.w) {
      if (py + 14 >= plat.y && py + 14 <= plat.y + plat.h && pvy >= 0) {
        py = plat.y - 14;
        pvy = 0;
      }
    }
  }
}

function updateSideEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) { enemies.splice(i, 1); continue; }

    const eScreenX = e.x - sideScrollX;
    if (eScreenX < -60 || eScreenX > GW + 60) continue;

    e.frame++;

    switch (e.pattern) {
      case 'sine':
        e.x += Math.sin(e.frame * 0.04 + e.phase) * e.speed * 0.5;
        e.y += Math.cos(e.frame * 0.03) * e.speed * 0.3;
        break;
      case 'track':
        if (eScreenX > px) e.x -= e.speed;
        else e.x += e.speed;
        break;
      case 'dive':
        e.y += Math.sin(e.frame * 0.05) * 2;
        e.x -= 0.5;
        break;
      case 'circle':
        e.angle += 0.04;
        e.x = e.cx + Math.cos(e.angle) * e.radius;
        e.y = e.cy + Math.sin(e.angle) * e.radius;
        break;
      case 'homing':
        var hdx2 = (px + sideScrollX) - e.x;
        var hdy2 = py - e.y;
        var hd2 = Math.sqrt(hdx2 * hdx2 + hdy2 * hdy2) || 1;
        e.x += (hdx2 / hd2) * e.speed;
        e.y += (hdy2 / hd2) * e.speed;
        break;
    }

    // Shooting
    if (e.frame % (90 - stage * 10) === 0 && Math.random() < 0.4) {
      var ang3 = TAS.math.angle(eScreenX, e.y, px, py);
      enemyBullets.push({ x: eScreenX, y: e.y, vx: Math.cos(ang3) * 2.5, vy: Math.sin(ang3) * 2.5 });
    }

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      if (TAS.hit.rectOverlap(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, eScreenX - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
        e.hp -= b.damage;
        if (!b.pierce) bullets.splice(j, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += Math.floor((50 + comboCount * 10) * intScoreMult());
          comboCount++;
          comboTimer = 60;
          spawnDeathExplosion(eScreenX, e.y, e.name);
          TAS.audio.playTone(300, 0.1, 'sawtooth', 0.04, 100);
        } else {
          TAS.particles.spawn(eScreenX, e.y, '#fff', 3, 1);
        }
        break;
      }
    }

    // Player collision
    if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 10, 16, 24, eScreenX - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
      playerHitSide();
    }
  }
}

// ============================================================
// BOSS UPDATE
// ============================================================
function updateBoss() {
  const b = sideBoss;
  if (!b.alive) return;

  const bScreenX = b.x - sideScrollX;
  b.timer++;
  b.fireTimer--;

  if (b.pattern === 'sweep') {
    b.y += b.dir * b.speed;
    if (b.y < 60 || b.y > GH - 70) b.dir *= -1;
  } else {
    b.y += Math.sin(b.timer * 0.03) * b.speed * 2;
    b.x += Math.cos(b.timer * 0.02) * b.speed * 0.5;
  }

  // Phase changes
  if (b.hp < b.maxHP * 0.5 && b.phase === 0) {
    b.phase = 1;
    b.speed *= 1.5;
    b.fireRate = Math.max(10, b.fireRate - 10);
    TAS.fx.flash('#ff0000', 0.3);
    TAS.fx.shake(6, 0.9);
  }

  // Firing
  if (b.fireTimer <= 0) {
    b.fireTimer = b.fireRate;
    const patterns = b.phase === 0 ? 2 : 4;
    for (let i = 0; i < patterns; i++) {
      var ang4 = TAS.math.angle(bScreenX, b.y, px, py) + (i - patterns / 2) * 0.3;
      enemyBullets.push({ x: bScreenX, y: b.y, vx: Math.cos(ang4) * 3, vy: Math.sin(ang4) * 3 });
    }
    // Phase 1: extra ring attack
    if (b.phase === 1 && b.timer % 3 === 0) {
      for (let r = 0; r < 8; r++) {
        var ringAng = (r / 8) * Math.PI * 2 + b.timer * 0.05;
        enemyBullets.push({ x: bScreenX, y: b.y, vx: Math.cos(ringAng) * 2, vy: Math.sin(ringAng) * 2 });
      }
    }
    TAS.audio.playTone(150, 0.1, 'sawtooth', 0.03);
  }

  // Bullet collision with boss
  for (let j = bullets.length - 1; j >= 0; j--) {
    const bl = bullets[j];
    if (TAS.hit.rectOverlap(bl.x - bl.w / 2, bl.y - bl.h / 2, bl.w, bl.h, bScreenX - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
      b.hp -= bl.damage;
      if (!bl.pierce) bullets.splice(j, 1);
      TAS.particles.spawn(bl.x, bl.y, '#ffaa00', 4, 1.5);

      if (b.hp <= 0) {
        b.alive = false;
        sideBossDefeated = true;
        score += Math.floor((2000 + stage * 500) * intScoreMult());
        TAS.fx.shake(14, 0.92);
        TAS.fx.flash('#ff8800', 0.5);
        TAS.audio.playMelody([[200, 0.2], [150, 0.2], [100, 0.3]], 200);
        // Big boss explosion
        for (let k = 0; k < 30; k++) {
          const ex = bScreenX + TAS.math.randRange(-30, 30);
          const ey = b.y + TAS.math.randRange(-25, 25);
          TAS.particles.spawn(ex, ey, ['#ff4400', '#ffaa00', '#ffff00', '#44ff44', '#ff00ff'][k % 5], 6, 3.5, { gravity: 1.2 });
        }
      }
      break;
    }
  }

  // Boss collision with player
  if (invuln <= 0 && TAS.hit.rectOverlap(px - 8, py - 10, 16, 24, bScreenX - b.w / 2, b.y - b.h / 2, b.w, b.h)) {
    playerHitSide();
  }
}

// ============================================================
// BULLETS & COLLISION
// ============================================================
function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.type === 'homing') {
      b.life--;
      if (b.life <= 0) { bullets.splice(i, 1); continue; }
      let nearest = null, nearDist = 999;
      for (const e of enemies) {
        if (!e.alive) continue;
        const esx = mode === 'side' ? e.x - sideScrollX : e.x;
        const esy = mode === 'vertical' ? e.y - scrollY + GH : e.y;
        const dd = TAS.math.dist(b.x, b.y, esx, esy);
        if (dd < nearDist) { nearDist = dd; nearest = { x: esx, y: esy }; }
      }
      if (nearest) {
        var ha = TAS.math.angle(b.x, b.y, nearest.x, nearest.y);
        b.vx += Math.cos(ha) * 0.3;
        b.vy += Math.sin(ha) * 0.3;
        var spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        if (spd > 4) { b.vx = (b.vx / spd) * 4; b.vy = (b.vy / spd) * 4; }
      }
    }
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -20 || b.x > GW + 20 || b.y < -20 || b.y > GH + 20) {
      bullets.splice(i, 1);
    }
  }
}

function updateEnemyBullets() {
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (invuln <= 0 && TAS.hit.circleOverlap(b.x, b.y, 4, px, py, 8)) {
      enemyBullets.splice(i, 1);
      if (mode === 'vertical') {
        playerHit();
      } else {
        playerHitSide();
      }
    }
  }
}

// ============================================================
// DEATH EXPLOSION (themed per enemy)
// ============================================================
function spawnDeathExplosion(x, y, enemyName) {
  var colors, count;
  switch (enemyName) {
    case 'wing_spore':
      colors = ['#f4b41b', '#ffffff', '#3cacd7']; count = 10; break;
    case 'aerial_fungus':
      colors = ['#e6482e', '#7a444a', '#f4b41b']; count = 8; break;
    case 'sky_mold':
      colors = ['#38d973', '#88ff88', '#227722']; count = 6; break;
    case 'cloud_parasite':
      colors = ['#a855f7', '#cccccc', '#f4b41b']; count = 7; break;
    case 'homing_spore':
      colors = ['#3cacd7', '#a855f7', '#aaffff']; count = 5; break;
    case 'garden_turret':
      colors = ['#666666', '#38d973', '#f4b41b']; count = 8; break;
    case 'compost_tank':
      colors = ['#7a444a', '#e6482e', '#888888']; count = 9; break;
    default:
      colors = ['#ff8844', '#ffaa00', '#ffff00']; count = 6; break;
  }
  for (var k = 0; k < count; k++) {
    TAS.particles.spawn(x + TAS.math.randRange(-6, 6), y + TAS.math.randRange(-6, 6), colors[k % colors.length], 4 + Math.random() * 3, 2, { gravity: 0.6 + Math.random() * 0.5 });
  }
}

// ============================================================
// DAMAGE
// ============================================================
function playerHit() {
  if (invuln > 0 || playerDead) return;
  if (weaponTier > 0) {
    weaponTier--;
    invuln = 60;
    TAS.fx.flash('#ff0000', 0.3);
    TAS.fx.shake(6, 0.85);
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 100);
    TAS.particles.spawn(px, py, '#ff4444', 8, 2);
  } else {
    playerDead = true;
    deathTimer = 0;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(12, 0.92);
    TAS.audio.playNoise(0.4, 0.1, 200);
    // Multi-color death explosion
    for (var d = 0; d < 18; d++) {
      TAS.particles.spawn(px + TAS.math.randRange(-8, 8), py + TAS.math.randRange(-8, 8), ['#ff4400', '#ffaa00', '#ff0044', statB.color][d % 4], 5, 3, { gravity: 1.5 });
    }
  }
}

function playerHitSide() {
  if (invuln > 0 || playerDead) return;
  sideHP--;
  invuln = 45;
  TAS.fx.flash('#ff0000', 0.2);
  TAS.fx.shake(5, 0.85);
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 100);
  TAS.particles.spawn(px, py, '#ff4444', 5, 2);
  if (sideHP <= 0) {
    playerDead = true;
    deathTimer = 0;
    TAS.fx.flash('#ff0000', 0.5);
    TAS.fx.shake(12, 0.92);
    TAS.audio.playNoise(0.4, 0.1, 200);
    for (var d2 = 0; d2 < 18; d2++) {
      TAS.particles.spawn(px + TAS.math.randRange(-8, 8), py + TAS.math.randRange(-8, 8), ['#ff4400', '#ffaa00', '#ff0044', statB.color][d2 % 4], 5, 3, { gravity: 1.5 });
    }
  }
}

// ============================================================
// DRAW - MAIN
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + (stage + 1) + ' | Weapon: ' + WEAPON_NAMES[weaponTier] });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'stageComplete') {
    drawStageComplete();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (transitionTimer > 0) {
    drawTransition();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  if (mode === 'vertical') {
    drawVertical();
  } else {
    drawSide();
  }

  drawBullets();
  drawEnemyBullets();
  drawPickups();

  if (!playerDead) {
    drawPlayer();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// DRAW - TITLE
// ============================================================
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // NES-style sky gradient
  var t = frame * 0.02;
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#1a1c2c');
  grad.addColorStop(0.4, '#3b1f6e');
  grad.addColorStop(0.8, '#3cacd7');
  grad.addColorStop(1, '#38d973');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Animated spore particles in background
  for (var i = 0; i < 20; i++) {
    var sx = ((frame * (0.4 + i * 0.08) + i * 60) % (GW + 30)) - 15;
    var sy = ((frame * 0.3 + i * 40) % (GH + 20)) - 10;
    ctx.fillStyle = 'rgba(168,85,247,' + (0.08 + Math.sin(frame * 0.04 + i) * 0.04) + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + Math.sin(i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Scrolling clouds
  for (var ci = 0; ci < 6; ci++) {
    var cx = ((frame * (0.3 + ci * 0.1) + ci * 90) % (GW + 80)) - 40;
    var cy = 60 + ci * 40;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(cx, cy, 20 + ci * 5, 0, Math.PI * 2);
    ctx.arc(cx + 20, cy - 5, 15 + ci * 3, 0, Math.PI * 2);
    ctx.arc(cx - 15, cy + 3, 12 + ci * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title with NES-style shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('BASELING SKY PATROL', GW / 2 + 2, 62);
  ctx.fillStyle = '#3b1f6e';
  ctx.fillText('BASELING SKY PATROL', GW / 2 + 1, 61);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('BASELING SKY PATROL', GW / 2, 60);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('Defenders of the Sky Garden', GW / 2, 82);

  // Draw animated winged baseling
  drawWingedBaseling(GW / 2, 150, 2, frame);

  // Selected baseling name (Base-blue) + 5 arcade stat bars
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 200);
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bx0 = GW / 2 - 110;
    ctx.textAlign = 'left'; ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k], _bx = _bx0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, 213);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 216, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 216, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }

  // Controls
  ctx.fillStyle = '#3cacd7';

  ctx.fillText('Patrol the sky gardens! Purge the fungal invaders!', GW / 2, 265);

// ============================================================
// DRAW - VERTICAL MODE
// ============================================================
function drawVertical() {
  var theme = STAGE_THEMES[stage];

  // Sky gradient (Baseling-themed)
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(0.7, theme.sky);
  grad.addColorStop(1, '#88bbdd');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Stars for later stages
  if (theme.stars) {
    for (var si = 0; si < bgStars.length; si++) {
      var star = bgStars[si];
      var sy = ((star.y + scrollY * star.speed * 0.1) % GH);
      var alpha = 0.3 + Math.sin(frame * 0.03 + star.twinkle) * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fillRect(star.x, sy, star.size, star.size);
    }
  }

  // Parallax clouds / spore haze
  for (var ci = 0; ci < 8; ci++) {
    var cloudY = ((ci * 50 + scrollY * 0.2) % (GH + 60)) - 30;
    var cloudX = (ci * 70 + Math.sin(frame * 0.01 + ci) * 20) % GW;
    ctx.fillStyle = stage < 2 ? 'rgba(136,255,136,0.08)' : 'rgba(255,255,255,0.1)';
    ctx.beginPath();
    ctx.arc(cloudX, cloudY, 25, 0, Math.PI * 2);
    ctx.arc(cloudX + 18, cloudY - 4, 18, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground tiles (garden terrain)
  for (var ti = 0; ti < groundTiles.length; ti++) {
    var tile = groundTiles[ti];
    var ty = tile.y - scrollY + GH;
    if (ty < -50 || ty > GH + 50) continue;
    drawGroundTile(tile, ty, theme);
  }

  // Ground mouths (garden portals)
  for (var mi = 0; mi < groundMouths.length; mi++) {
    var mouth = groundMouths[mi];
    if (!mouth.active) continue;
    var my = mouth.y - scrollY + GH;
    if (my < -40 || my > GH + 40) continue;
    drawMouth(mouth, my);
  }

  // Power pods (spore capsules)
  for (var pi = 0; pi < powerPods.length; pi++) {
    var pod = powerPods[pi];
    if (!pod.alive) continue;
    var podY = pod.y - scrollY + GH;
    if (podY < -20 || podY > GH + 20) continue;
    // Glowing garden pod
    ctx.fillStyle = '#38d973';
    ctx.strokeStyle = '#1a6e3a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(pod.x, podY, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Garden glow
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08) * 0.15;
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(pod.x, podY, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('P', pod.x, podY + 3);
  }

  // Enemies
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var ey = e.y - scrollY + GH;
    if (ey < -30 || ey > GH + 30) continue;
    drawEnemy(e, e.x, ey);
  }
}

function drawGroundTile(tile, ty, theme) {
  ctx.fillStyle = theme.ground;
  ctx.fillRect(tile.x, ty, tile.w, tile.h);
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.strokeRect(tile.x, ty, tile.w, tile.h);

  switch (tile.type) {
    case 0: // Garden mushroom cluster
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.arc(tile.x + tile.w * 0.3, ty - 4, 8, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(tile.x + tile.w * 0.7, ty - 2, 6, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#3b1f6e';
      ctx.fillRect(tile.x + tile.w * 0.3 - 2, ty - 4, 4, 8);
      ctx.fillRect(tile.x + tile.w * 0.7 - 2, ty - 2, 3, 6);
      // Spore dots
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(tile.x + tile.w * 0.3 - 4, ty - 6, 2, 2);
      ctx.fillRect(tile.x + tile.w * 0.3 + 2, ty - 8, 2, 2);
      ctx.fillRect(tile.x + tile.w * 0.7 + 1, ty - 5, 2, 2);
      break;
    case 1: // Garden turret base
      ctx.fillStyle = '#38d973';
      ctx.fillRect(tile.x + tile.w / 2 - 5, ty - 8, 10, 10);
      ctx.fillStyle = '#1a6e3a';
      ctx.fillRect(tile.x + tile.w / 2 - 2, ty - 12, 4, 6);
      ctx.fillStyle = '#38d973';
      ctx.fillRect(tile.x + tile.w / 2 - 1, ty - 14, 2, 3);
      break;
    case 2: // Mycelial tree
      ctx.fillStyle = '#3a7744';
      ctx.beginPath();
      ctx.arc(tile.x + tile.w / 2, ty - 10, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#553311';
      ctx.fillRect(tile.x + tile.w / 2 - 3, ty - 2, 6, tile.h + 2);
      // Glowing mycelium veins
      ctx.strokeStyle = '#38d973';
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(tile.x + tile.w / 2, ty);
      ctx.lineTo(tile.x + tile.w / 2 - 10, ty + tile.h);
      ctx.moveTo(tile.x + tile.w / 2, ty);
      ctx.lineTo(tile.x + tile.w / 2 + 8, ty + tile.h - 5);
      ctx.stroke();
      ctx.globalAlpha = 1;
      break;
    case 3: // POOP crystal formation
      ctx.fillStyle = '#7a444a';
      ctx.beginPath();
      ctx.moveTo(tile.x + 5, ty + tile.h);
      ctx.lineTo(tile.x + tile.w * 0.3, ty);
      ctx.lineTo(tile.x + tile.w * 0.5, ty + tile.h * 0.3);
      ctx.lineTo(tile.x + tile.w * 0.7, ty - 2);
      ctx.lineTo(tile.x + tile.w - 5, ty + tile.h);
      ctx.fill();
      // Crystal glow
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#3cacd7';
      ctx.fillRect(tile.x + tile.w * 0.4, ty + 2, 4, 6);
      ctx.globalAlpha = 1;
      break;
  }
}

function drawMouth(mouth, my) {
  var openAmt = Math.sin(mouth.animFrame * 0.05) * 0.3 + 0.7;

  if (mouth.gold) {
    ctx.fillStyle = '#886600';
    ctx.strokeStyle = '#ffdd00';
  } else {
    ctx.fillStyle = '#440022';
    ctx.strokeStyle = '#ff4488';
  }

  // Portal shape
  ctx.beginPath();
  ctx.ellipse(mouth.x, my, mouth.w / 2, mouth.h / 2 * openAmt, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.stroke();

  // Spore teeth
  ctx.fillStyle = mouth.gold ? '#ffdd00' : '#ff6688';
  var teeth = 5;
  for (var i = 0; i < teeth; i++) {
    var tx = mouth.x - mouth.w / 2 + (i + 0.5) * (mouth.w / teeth);
    var topY = my - mouth.h / 2 * openAmt;
    var botY = my + mouth.h / 2 * openAmt;
    ctx.beginPath();
    ctx.moveTo(tx - 3, topY);
    ctx.lineTo(tx, topY + 6);
    ctx.lineTo(tx + 3, topY);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx - 3, botY);
    ctx.lineTo(tx, botY - 6);
    ctx.lineTo(tx + 3, botY);
    ctx.fill();
  }

  // Portal energy glow
  ctx.globalAlpha = 0.3 + Math.sin(mouth.animFrame * 0.08) * 0.15;
  ctx.fillStyle = mouth.gold ? '#ffdd00' : '#ff0044';
  ctx.beginPath();
  ctx.arc(mouth.x, my, mouth.w / 2 + 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW - SIDE SCROLL MODE (Dungeon/Cave)
// ============================================================
function drawSide() {
  var theme = STAGE_THEMES[stage];

  // Cave background with depth
  var caveGrad = ctx.createLinearGradient(0, 0, 0, GH);
  caveGrad.addColorStop(0, theme.cave);
  caveGrad.addColorStop(0.3, '#0a0a0a');
  caveGrad.addColorStop(0.7, '#0a0a0a');
  caveGrad.addColorStop(1, theme.cave);
  ctx.fillStyle = caveGrad;
  ctx.fillRect(0, 0, GW, GH);

  // Mycelium wall veins (parallax background)
  ctx.strokeStyle = 'rgba(168,85,247,0.06)';
  ctx.lineWidth = 2;
  for (var vi = 0; vi < 8; vi++) {
    var vx = ((vi * 80 - sideScrollX * 0.15) % (GW + 60)) - 30;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    ctx.bezierCurveTo(vx + 20, GH * 0.3, vx - 15, GH * 0.6, vx + 10, GH);
    ctx.stroke();
  }

  // Cave texture (stalactites/stalagmites)
  for (var ci = 0; ci < 12; ci++) {
    var sx = ((ci * 50 - sideScrollX * 0.3) % (GW + 40)) - 20;
    ctx.fillStyle = 'rgba(60,40,30,0.4)';
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx + 8, 30 + ci * 3);
    ctx.lineTo(sx - 8, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + 25, GH);
    ctx.lineTo(sx + 33, GH - 25 - ci * 2);
    ctx.lineTo(sx + 17, GH);
    ctx.fill();
    // Drip glow
    if (ci % 3 === 0) {
      ctx.fillStyle = 'rgba(56,217,115,0.1)';
      ctx.beginPath();
      ctx.arc(sx, 30 + ci * 3 + Math.sin(frame * 0.05 + ci) * 3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Platforms (organic cave floors)
  for (var pi = 0; pi < sidePlatforms.length; pi++) {
    var plat = sidePlatforms[pi];
    var platX = plat.x - sideScrollX;
    if (platX + plat.w < -10 || platX > GW + 10) continue;
    ctx.fillStyle = '#443322';
    ctx.fillRect(platX, plat.y, plat.w, plat.h);
    ctx.fillStyle = '#665544';
    ctx.fillRect(platX, plat.y, plat.w, 3);
    // Moss/mycelium on top
    ctx.fillStyle = 'rgba(68,136,68,0.3)';
    for (var mt = 0; mt < plat.w; mt += 8) {
      ctx.fillRect(platX + mt, plat.y - 1, 4, 2);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    for (var t = 0; t < plat.w; t += 12) {
      ctx.fillRect(platX + t, plat.y + 4, 1, plat.h - 4);
    }
  }

  // Walls
  for (var wi = 0; wi < sideWalls.length; wi++) {
    var wall = sideWalls[wi];
    var wx = wall.x - sideScrollX;
    if (wx + wall.w < -10 || wx > GW + 10) continue;
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(wx, wall.y, wall.w, wall.h);
    ctx.fillStyle = '#2a1a0a';
    ctx.fillRect(wx, wall.y + wall.h - 4, wall.w, 4);
  }

  // Boss
  if (sideBoss && sideBoss.alive) {
    drawBoss();
  }

  // Exit indicator (portal)
  if (sideBossDefeated || !sideBoss) {
    var exitScreenX = sideExitX - sideScrollX;
    if (exitScreenX > -20 && exitScreenX < GW + 20) {
      // Glowing portal
      ctx.fillStyle = 'rgba(168,85,247,' + (0.3 + Math.sin(frame * 0.08) * 0.2) + ')';
      ctx.beginPath();
      ctx.ellipse(exitScreenX + 20, GH - 55, 18, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', exitScreenX + 20, GH - 56);
    }
  }

  // Enemies
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.alive) continue;
    var esx = e.x - sideScrollX;
    if (esx < -30 || esx > GW + 30) continue;
    drawEnemy(e, esx, e.y);
  }
}

// ============================================================
// DRAW - ENTITIES (Baseling-themed sprites)
// ============================================================
function drawPlayer() {
  if (invuln > 0 && Math.floor(invuln / 4) % 2 === 0) return;

  var wingOffset = Math.sin(wingFlap) * 4;

  // === BASELING SPRITE ===
  if (TAS.drawBaseling(ctx, px, py, 20, { flipX: false, frame: frame })) {
    // baseling sprite drawn
  } else if (mode === 'vertical') {
    drawWingedBaseling(px, py, 1, frame);
  } else {
    // Side view baseling using statB color
    var bodyCol = statB.color;
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.ellipse(px, py - 4, 7, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = bodyCol;
    ctx.beginPath();
    ctx.arc(px, py - 14, 6, 0, Math.PI * 2);
    ctx.fill();
    // Eyes (NES bright)
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 2, py - 16, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 3, py - 15, 2, 2);
    // Wings
    ctx.fillStyle = 'rgba(200,255,220,0.7)';
    ctx.beginPath();
    ctx.moveTo(px - 5, py - 8);
    ctx.lineTo(px - 18, py - 14 + wingOffset);
    ctx.lineTo(px - 12, py + 2);
    ctx.fill();
    // Legs
    ctx.fillStyle = bodyCol;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(px - 4, py + 6, 3, 6);
    ctx.fillRect(px + 1, py + 6, 3, 6);
    ctx.globalAlpha = 1;
  }
}

function drawWingedBaseling(x, y, scale, f) {
  var wingOffset = Math.sin(f * 0.15) * 5 * scale;
  var bodyCol = statB.color;

  ctx.save();
  ctx.translate(x, y);

  // Title mascot: the selected baseling rides between the wings (falls back to the
  // procedural winged body below).
  var _rode = TAS.drawBaseling(ctx, 0, 0, 22 * scale, { anim: 'idle', frame: f, flipX: false });
  if (_rode) {
    // Keep the flapping wings around the sprite for the winged-patrol look.
    ctx.fillStyle = 'rgba(180,255,200,0.8)';
    ctx.beginPath();
    ctx.moveTo(-8 * scale, -2 * scale);
    ctx.lineTo(-22 * scale, -12 * scale + wingOffset);
    ctx.lineTo(-18 * scale, 6 * scale);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(8 * scale, -2 * scale);
    ctx.lineTo(22 * scale, -12 * scale + wingOffset);
    ctx.lineTo(18 * scale, 6 * scale);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    return;
  }

  // Wings (bright NES palette)
  ctx.fillStyle = 'rgba(180,255,200,0.8)';
  ctx.beginPath();
  ctx.moveTo(-6 * scale, -2 * scale);
  ctx.lineTo(-22 * scale, -12 * scale + wingOffset);
  ctx.lineTo(-18 * scale, 6 * scale);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(6 * scale, -2 * scale);
  ctx.lineTo(22 * scale, -12 * scale + wingOffset);
  ctx.lineTo(18 * scale, 6 * scale);
  ctx.fill();

  // Wing detail (mycelial veins)
  ctx.strokeStyle = 'rgba(68,255,136,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-10 * scale, -4 * scale);
  ctx.lineTo(-20 * scale, -8 * scale + wingOffset);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(10 * scale, -4 * scale);
  ctx.lineTo(20 * scale, -8 * scale + wingOffset);
  ctx.stroke();

  // Body (uses statB color)
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.ellipse(0, 2 * scale, 7 * scale, 10 * scale, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.arc(0, -10 * scale, 6 * scale, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (NES-sharp)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-4 * scale, -12 * scale, 3 * scale, 3 * scale);
  ctx.fillRect(1 * scale, -12 * scale, 3 * scale, 3 * scale);
  ctx.fillStyle = '#111';
  ctx.fillRect(-3 * scale, -11 * scale, 2 * scale, 2 * scale);
  ctx.fillRect(2 * scale, -11 * scale, 2 * scale, 2 * scale);

  // Feet
  ctx.fillStyle = bodyCol;
  ctx.globalAlpha = 0.7;
  ctx.fillRect(-4 * scale, 10 * scale, 3 * scale, 4 * scale);
  ctx.fillRect(1 * scale, 10 * scale, 3 * scale, 4 * scale);
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawEnemy(e, ex, ey) {
  ctx.save();
  ctx.translate(ex, ey);

  switch (e.name) {
    case 'sky_mold':
      // Tiny flying sky mold with pulsing glow
      ctx.fillStyle = '#38d973';
      var bwing = Math.sin(e.frame * 0.2) * 4;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(-8, -4 + bwing);
      ctx.lineTo(-5, 3);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(8, -4 + bwing);
      ctx.lineTo(5, 3);
      ctx.fill();
      ctx.fillStyle = '#1a6e3a';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      // Mold glow
      ctx.fillStyle = '#38d973';
      ctx.globalAlpha = 0.4 + Math.sin(e.frame * 0.1) * 0.2;
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(-2, -2, 2, 2);
      ctx.fillRect(1, -2, 2, 2);
      break;

    case 'wing_spore':
      // Glowing winged spore guardian
      var aWing = Math.sin(e.frame * 0.12) * 6;
      // Wings (spore energy)
      ctx.fillStyle = 'rgba(168,85,247,0.6)';
      ctx.beginPath();
      ctx.moveTo(-4, 0);
      ctx.lineTo(-14, -10 + aWing);
      ctx.lineTo(-10, 6);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(4, 0);
      ctx.lineTo(14, -10 + aWing);
      ctx.lineTo(10, 6);
      ctx.fill();
      // Body (spore core)
      ctx.fillStyle = '#c4a0f7';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      // Halo
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(0, -10, 7, 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Core eye
      ctx.fillStyle = '#e6482e';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'aerial_fungus':
      // Horned diving fungus with trailing spores
      ctx.fillStyle = '#7a444a';
      ctx.beginPath();
      ctx.moveTo(0, -9);
      ctx.lineTo(-7, 6);
      ctx.lineTo(7, 6);
      ctx.fill();
      // Inner detail
      ctx.fillStyle = '#e6482e';
      ctx.beginPath();
      ctx.moveTo(0, -5);
      ctx.lineTo(-4, 4);
      ctx.lineTo(4, 4);
      ctx.fill();
      // Fungal horns
      ctx.fillStyle = '#4a1a22';
      ctx.beginPath();
      ctx.moveTo(-4, -6);
      ctx.lineTo(-7, -12);
      ctx.lineTo(-2, -7);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(4, -6);
      ctx.lineTo(7, -12);
      ctx.lineTo(2, -7);
      ctx.fill();
      // Dive trail
      if (e.diving) {
        ctx.fillStyle = '#ff2200';
        ctx.beginPath();
        ctx.moveTo(-3, 6);
        ctx.lineTo(0, 14 + Math.random() * 5);
        ctx.lineTo(3, 6);
        ctx.fill();
        ctx.fillStyle = '#ffaa00';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.moveTo(-2, 6);
        ctx.lineTo(0, 10 + Math.random() * 3);
        ctx.lineTo(2, 6);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;

    case 'cloud_parasite':
      // Spinning cloud parasite with mycelium tendrils
      var rot = e.frame * 0.1;
      ctx.fillStyle = '#3cacd7';
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#5bc8e8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 5, rot, rot + Math.PI);
      ctx.stroke();
      // Parasite tendrils
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 1;
      for (var td = 0; td < 3; td++) {
        var ta = rot + td * Math.PI * 2 / 3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ta) * 7, Math.sin(ta) * 7);
        ctx.lineTo(Math.cos(ta) * 11, Math.sin(ta) * 11);
        ctx.stroke();
      }
      // Core
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      break;

    case 'homing_spore':
      // Pulsing toxic spore
      var orbPulse = Math.sin(e.frame * 0.1) * 2;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(0, 0, 5 + orbPulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(0, 0, 3, 0, Math.PI * 2);
      ctx.fill();
      // Trail particles
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(-3, 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;

    case 'garden_turret':
      // Garden turret growing from ground
      ctx.fillStyle = '#38d973';
      ctx.fillRect(-10, -6, 20, 12);
      ctx.fillStyle = '#1a6e3a';
      ctx.fillRect(-3, -12, 6, 8);
      // Glowing tip
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(-2, -14, 4, 4);
      break;

    case 'compost_tank':
      // Compost crawler
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(-10, -5, 20, 10);
      ctx.fillStyle = '#8a5454';
      ctx.fillRect(-6, -9, 12, 6);
      // Compost glow
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(0, -6, 3, 0, Math.PI * 2);
      ctx.fill();
      // Cannon
      ctx.fillStyle = '#334';
      ctx.fillRect(4, -12, 3, 6);
      // Treads
      ctx.fillStyle = '#223';
      ctx.fillRect(-10, 3, 20, 3);
      break;
  }

  ctx.restore();
}

function drawBoss() {
  var b = sideBoss;
  var bx = b.x - sideScrollX;

  ctx.save();
  ctx.translate(bx, b.y);

  // Sky Garden boss design
  var baseColor = b.phase === 0 ? '#3b1f6e' : '#7a444a';
  var glowColor = b.phase === 0 ? '#a855f7' : '#e6482e';

  // Main body (organic mass)
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Armor plates (bark/shell)
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(-28, -12, 14, 24);
  ctx.fillRect(14, -12, 14, 24);

  // Mycelium tendrils
  ctx.strokeStyle = glowColor;
  ctx.lineWidth = 3;
  ctx.globalAlpha = 0.6;
  for (var i = 0; i < 6; i++) {
    var tAng = (i / 6) * Math.PI * 2 + frame * 0.02;
    ctx.beginPath();
    ctx.moveTo(Math.cos(tAng) * 22, Math.sin(tAng) * 20);
    ctx.quadraticCurveTo(
      Math.cos(tAng + 0.5) * 35, Math.sin(tAng + 0.5) * 30 + Math.sin(frame * 0.05 + i) * 6,
      Math.cos(tAng) * 40, Math.sin(tAng) * 35
    );
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Core (reactor glow)
  var corePulse = Math.sin(frame * 0.08) * 4;
  ctx.fillStyle = glowColor;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.arc(0, 0, 14 + corePulse, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = b.phase === 0 ? '#38d973' : '#f4b41b';
  ctx.beginPath();
  ctx.arc(0, 0, 8 + corePulse * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (menacing, reptilian)
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.ellipse(-10, -10, 5, 3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10, -10, 5, 3, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Pupils (slit)
  ctx.fillStyle = '#000';
  ctx.fillRect(-11, -11, 2, 4);
  ctx.fillRect(9, -11, 2, 4);

  // Horns/crown
  ctx.fillStyle = baseColor;
  ctx.beginPath();
  ctx.moveTo(-8, -22);
  ctx.lineTo(-4, -28);
  ctx.lineTo(0, -20);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, -22);
  ctx.lineTo(4, -28);
  ctx.lineTo(0, -20);
  ctx.fill();

  ctx.restore();

  // HP bar
  var hpPct = b.hp / b.maxHP;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx - 32, b.y - b.h / 2 - 18, 64, 8);
  ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffcc00' : '#ff4400';
  ctx.fillRect(bx - 32, b.y - b.h / 2 - 18, 64 * hpPct, 8);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx - 32, b.y - b.h / 2 - 18, 64, 8);

  // Boss name
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.bossName, bx, b.y - b.h / 2 - 22);
}

function drawBullets() {
  for (var bi = 0; bi < bullets.length; bi++) {
    var b = bullets[bi];
    switch (b.type) {
      case 'normal':
        // POOP pellet (brown/gold glow)
        ctx.fillStyle = '#7a444a';
        ctx.fillRect(b.x - 2, b.y - 4, 4, 8);
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(b.x - 1, b.y - 2, 2, 4);
        break;
      case 'fire':
        // Mycelium Beam (purple energy)
        ctx.fillStyle = '#a855f7';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, b.w / 2, b.h / 2, mode === 'side' ? 0 : Math.PI / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.ellipse(b.x, b.y, b.w / 4, b.h / 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'laser':
        // Spore laser (bright purple)
        ctx.fillStyle = '#a855f7';
        ctx.globalAlpha = 0.9;
        if (mode === 'vertical') {
          ctx.fillRect(b.x - 2, b.y - 8, 4, 16);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(b.x - 1, b.y - 6, 2, 12);
        } else {
          ctx.fillRect(b.x - 8, b.y - 2, 16, 4);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(b.x - 6, b.y - 1, 12, 2);
        }
        ctx.globalAlpha = 1;
        break;
      case 'homing':
        // Homing spore orb (green-gold)
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
    }
  }
}

function drawEnemyBullets() {
  ctx.fillStyle = '#e6482e';
  for (var bi = 0; bi < enemyBullets.length; bi++) {
    var b = enemyBullets[bi];
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e6482e';
  }
}

function drawPickups() {
  for (var pi = 0; pi < pickups.length; pi++) {
    var pk = pickups[pi];
    if (!pk.alive) continue;
    var pkx = mode === 'side' ? pk.x - sideScrollX : pk.x;
    var pky = pk.y;
    if (pkx < -10 || pkx > GW + 10) continue;

    var bob = Math.sin(frame * 0.08) * 3;
    if (pk.type === 'weapon') {
      // Garden seed pickup
      ctx.fillStyle = '#38d973';
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(pkx, pky + bob, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P', pkx, pky + bob + 3);
    } else {
      // Spore gem
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      // Diamond shape
      ctx.moveTo(pkx, pky + bob - 6);
      ctx.lineTo(pkx + 5, pky + bob);
      ctx.lineTo(pkx, pky + bob + 6);
      ctx.lineTo(pkx - 5, pky + bob);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('M', pkx, pky + bob + 3);
    }
  }
}

// ============================================================
// DRAW - TRANSITION
// ============================================================
function drawTransition() {
  var progress = 1 - (transitionTimer / 45);

  if (transitionType === 'entering') {
    var theme = STAGE_THEMES[stage];
    var grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, theme.sky);
    grad.addColorStop(1, '#88bbdd');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    ctx.fillStyle = '#000';
    var radius = GW * (1 - progress);
    ctx.beginPath();
    ctx.rect(0, 0, GW, GH);
    ctx.arc(GW / 2, GH / 2, radius, 0, Math.PI * 2, true);
    ctx.fill();

    // Spore swirl
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 3;
    for (var si = 0; si < 4; si++) {
      var a = progress * Math.PI * 4 + si * Math.PI / 2;
      var r = radius * 0.8;
      ctx.beginPath();
      ctx.arc(GW / 2 + Math.cos(a) * r * 0.3, GH / 2 + Math.sin(a) * r * 0.3, r * 0.2, 0, Math.PI);
      ctx.stroke();
    }

    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DESCENDING INTO THE ROOTS...', GW / 2, GH / 2 - 10);
  } else {
    ctx.fillStyle = STAGE_THEMES[stage].cave;
    ctx.fillRect(0, 0, GW, GH);

    var radius2 = GW * progress;
    ctx.fillStyle = STAGE_THEMES[stage].sky;
    ctx.beginPath();
    ctx.arc(GW / 2, GH / 2, radius2, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('RISING TO THE SKY GARDEN', GW / 2, GH / 2 - 10);
  }
}

// ============================================================
// DRAW - HUD (NES-styled)
// ============================================================
function drawHUD() {
  var barH = 28;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GW, barH);
  // Thin colored line under HUD
  ctx.fillStyle = statB.color;
  ctx.fillRect(0, barH - 1, GW, 1);

  ctx.font = 'bold 11px monospace';

  // Score (INT-boosted)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 6, 17);

  // Stage + area name
  ctx.fillStyle = '#38d973';
  ctx.textAlign = 'center';
  var modeText = mode === 'vertical' ? 'SKY' : 'CAVE';
  ctx.fillText('STG ' + (stage + 1) + ' [' + modeText + ']', GW / 2, 12);
  // Area name small
  ctx.fillStyle = '#a855f7';
  ctx.font = '8px monospace';
  ctx.fillText(STAGE_THEMES[stage].name, GW / 2, 23);

  // Lives (baseling icons)
  ctx.textAlign = 'right';
  for (var li = 0; li < lives; li++) {
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(GW - 12 - li * 16, 14, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(GW - 14 - li * 16, 12, 2, 2);
    ctx.fillRect(GW - 11 - li * 16, 12, 2, 2);
  }

  // Bottom bar: weapon tier
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, GH - 22, GW, 22);
  ctx.fillStyle = statB.color;
  ctx.fillRect(0, GH - 22, GW, 1);

  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('WPN:', 6, GH - 8);

  // Tier boxes (NES color coded)
  for (var ti = 0; ti < 5; ti++) {
    var tbx = 40 + ti * 22;
    ctx.fillStyle = ti <= weaponTier ? ['#44ff44', '#88ffaa', '#ffaa00', '#ff6600', '#ff44ff'][ti] : '#222';
    ctx.fillRect(tbx, GH - 17, 18, 10);
    if (ti === weaponTier) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(tbx, GH - 17, 18, 10);
    }
  }

  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(WEAPON_NAMES[weaponTier], 155, GH - 8);

  // Side mode HP (CON-boosted)
  if (mode === 'side') {
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'right';
    ctx.font = '9px monospace';
    ctx.fillText('HP', GW - 58, GH - 8);
    var maxSideHP = Math.floor(3 * conHpMult());
    for (var hi = 0; hi < maxSideHP; hi++) {
      ctx.fillStyle = hi < sideHP ? '#ff4444' : '#331111';
      ctx.fillRect(GW - 50 + hi * 11, GH - 15, 8, 8);
    }
  }

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = comboTimer / 60;
    ctx.fillText('COMBO x' + comboCount + ' (' + Math.floor(intScoreMult() * 100) + '%)', GW / 2, 42);
    ctx.globalAlpha = 1;
  }

  // Scroll progress bar (vertical mode)
  if (mode === 'vertical') {
    var progressPct = scrollY / VERTICAL_LENGTH;
    ctx.fillStyle = '#222';
    ctx.fillRect(GW - 6, 30, 4, GH - 55);
    ctx.fillStyle = '#38d973';
    ctx.fillRect(GW - 6, 30 + (GH - 55) * (1 - progressPct), 4, (GH - 55) * progressPct);
    // Arrow marker
    ctx.fillStyle = '#fff';
    var markerY = 30 + (GH - 55) * (1 - progressPct);
    ctx.fillRect(GW - 8, markerY - 1, 8, 2);
  }
}

// ============================================================
// DRAW - STAGE COMPLETE / VICTORY
// ============================================================
function drawStageComplete() {
  var theme = STAGE_THEMES[stage];
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, theme.sky);
  grad.addColorStop(1, '#000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('STAGE ' + (stage + 1) + ' CLEAR!', GW / 2, GH * 0.3);

  ctx.fillStyle = '#a855f7';
  ctx.font = '14px monospace';
  ctx.fillText(STAGE_THEMES[stage].name, GW / 2, GH * 0.42);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + score, GW / 2, GH * 0.56);
  ctx.fillText('Weapon: ' + WEAPON_NAMES[weaponTier], GW / 2, GH * 0.64);

  // Show stat contribution
  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + ' Lv.' + statB.level, GW / 2, GH * 0.73);

  if (deathTimer > 60) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEXT STAGE...', GW / 2, GH * 0.85);
    ctx.globalAlpha = 1;
  }
}

function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var si = 0; si < 40; si++) {
    var sx = (si * 37 + frame * 0.2) % GW;
    var sy = (si * 23 + frame * 0.1) % GH;
    ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(frame * 0.05 + si) * 0.3) + ')';
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Floating spore particles
  for (var pi = 0; pi < 15; pi++) {
    var px2 = ((frame * 0.5 + pi * 50) % GW);
    var py2 = ((frame * 0.3 + pi * 30) % GH);
    ctx.fillStyle = 'rgba(168,85,247,0.15)';
    ctx.beginPath();
    ctx.arc(px2, py2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 55);

  ctx.fillStyle = '#38d973';
  ctx.font = '13px monospace';
  ctx.fillText('The sky gardens are safe once more!', GW / 2, 85);
  ctx.fillText('Your baseling has purged the fungal invaders.', GW / 2, 102);

  drawWingedBaseling(GW / 2, 155, 1.5, frame);

  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + ' Lv.' + statB.level, GW / 2, 195);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 220);

  if (score >= highScore && score > 0) {
    var pulse2 = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 242);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#3cacd7';
  ctx.font = '11px monospace';
  ctx.fillText('Press any key to return', GW / 2, 290);
}

// ============================================================
// START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
