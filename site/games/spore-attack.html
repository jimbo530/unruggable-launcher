<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>S.P.O.R.E. Attack</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// ============================================================
// NFT STAT BONUSES — player IS baseling
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// Shmup, not a wager game -> single-player band 0.8–1.6. SPD->ship speed, STA->shield/HP,
// PWR->shot damage, LCK->powerup drops, SWM unused. This game's helpers read old D&D
// fields, so we synthesize them from the clamped multipliers; every gameplay number
// traces back to a clamped getMults().
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[scat-attack] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[scat-attack] player init failed:', e && e.message); });
}

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'LOCK', c: 'PICK' } });

const STAGE_COUNT = 7;
const BASE_MAX_HP = 4;
const BASE_MAX_LIVES = 3;
const STAGE_LENGTH = 2400;
const ORB_ORBIT_RADIUS = 28;
const ORB_ORBIT_SPEED = 0.04;
const BASE_PLAYER_ACCEL = 0.35;
const PLAYER_FRICTION = 0.92;
const BASE_PLAYER_MAX_SPEED = 3.2;
const BASE_FIRE_COOLDOWN = 8;
const ORB_FIRE_COOLDOWN = 12;
const COMBO_DECAY = 120;

// --- Derived from statB (15+ stat references) ---
// STR -> damage multiplier
var DAMAGE_MULT = statB.damage;                                    // ref 1: STR
// DEX -> movement speed
var PLAYER_ACCEL = BASE_PLAYER_ACCEL * statB.speed;                // ref 2: DEX
var PLAYER_MAX_SPEED = BASE_PLAYER_MAX_SPEED * statB.speed;        // ref 3: DEX
// CON -> HP and lives
var MAX_HP = Math.floor(BASE_MAX_HP * statB.hpMult);               // ref 4: CON
var MAX_LIVES = BASE_MAX_LIVES + statB.lives;                      // ref 5: CON
// INT -> score multiplier
var SCORE_MULT = statB.scoreMult;                                  // ref 6: INT
// WIS -> fire cooldown
var FIRE_COOLDOWN = Math.max(3, Math.floor(BASE_FIRE_COOLDOWN * statB.cooldown)); // ref 7: WIS
// CHA -> luck / drop rate
var LUCK_MULT = statB.luck;                                        // ref 8: CHA

// Player identity from NFT
var PLAYER_COLOR = statB.color || '#44dd88';
var PLAYER_NAME = statB.name || 'Baseling';
var PLAYER_ICON = statB.icon || 'B';
var PLAYER_LEVEL = statB.level || 0;

// Baseling-themed stage names and colors
const STAGE_NAMES = [
  'Garden Outpost', 'The POOP Pipeline', 'Compost Ruins',
  'Root Cellar Warrens', 'Spore Hive Core', 'Brine Flats', 'The Motherspore Nest'
];
const STAGE_COLORS = [
  { bg: '#1a1c2c', mid: '#2a1c3c', fg: '#3a2c4c', accent: '#a855f7' },
  { bg: '#1a1c2c', mid: '#2c1a1a', fg: '#3a2a2a', accent: '#38d973' },
  { bg: '#1a1c2c', mid: '#1c1c1c', fg: '#2a2a2a', accent: '#f4b41b' },
  { bg: '#1a1c2c', mid: '#1a1a10', fg: '#333320', accent: '#38d973' },
  { bg: '#1a1c2c', mid: '#1a2a1a', fg: '#224422', accent: '#3cacd7' },
  { bg: '#1a1c2c', mid: '#0a2030', fg: '#153040', accent: '#3cacd7' },
  { bg: '#1a1c2c', mid: '#2a0a2a', fg: '#441444', accent: '#e6482e' }
];
const SCROLL_SPEEDS = [1.2, 1.8, 1.0, 0.8, 1.0, 1.4, 1.6];

// Baseling-universe boss names
const BOSS_NAMES = [
  'Scat Mold King', 'Toxic Bomber', 'Compost Titan', 'Rootmaw the Foul',
  'Hivequeen Sporella', 'Brine Colossus', 'The Motherspore'
];

// ============================================================
// SCORE POPUPS
// ============================================================
var scorePopups = [];

function spawnScorePopup(x, y, value, color) {
  scorePopups.push({ x: x, y: y, value: value, color: color || '#ffdd44', life: 60, maxLife: 60 });
}

function updateScorePopups(dt) {
  var spd = dt * 60;
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y -= 0.8 * spd;
    p.life -= spd;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + p.value, p.x, p.y);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// TUTORIAL OVERLAY
// ============================================================
var tutorialTimer = 0;
var tutorialShown = false;

function drawTutorial() {
  if (tutorialShown || tutorialTimer > 300) { tutorialShown = true; return; }
  var alpha = tutorialTimer < 30 ? tutorialTimer / 30 : tutorialTimer > 240 ? (300 - tutorialTimer) / 60 : 1;
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = '#000';
  ctx.fillRect(GW / 2 - 120, 50, 240, 100);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = PLAYER_COLOR;
  ctx.lineWidth = 1;
  ctx.strokeRect(GW / 2 - 120, 50, 240, 100);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOW TO PLAY', GW / 2, 68);
  ctx.font = '8px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('ARROWS / WASD : Move', GW / 2, 84);
  ctx.fillText('Z / SPACE : Fire main gun + orbs', GW / 2, 96);
  ctx.fillText('X / SHIFT : Lock / Unlock orbs', GW / 2, 108);
  ctx.fillText('Collect POOP tokens from defeated foes', GW / 2, 120);
  ctx.fillStyle = '#666';
  ctx.fillText('Defend the Aerial Gardens!', GW / 2, 138);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME STATE
// ============================================================
var state = 'title';
var score = 0;
var highScore = TAS.score.load('spore_attack_hi');
var lives = MAX_LIVES;
var hp = MAX_HP;
var stage = 0;
var frame = 0;
var stageFrame = 0;
var combo = 1;
var comboTimer = 0;
var invincible = 0;
var deathTimer = 0;
var bossActive = false;
var bossWarning = 0;
var stageTransition = 0;
var scrollX = 0;

// Player
var player = { x: 60, y: GH / 2, vx: 0, vy: 0, w: 16, h: 12 };
var mainGunLevel = 0;
var fireTimer = 0;
var orbFireTimer = 0;

// Orbs
var orbs = [
  { angle: 0, locked: false, lockAngle: 0, weaponType: 'normal' },
  { angle: Math.PI, locked: false, lockAngle: Math.PI, weaponType: 'normal' }
];
var orbsLocked = false;
var bPressedLast = false;

// Bullets
var playerBullets = [];
var orbBullets = [];
var enemyBullets = [];

// Enemies & boss
var enemies = [];
var boss = null;
var powerUps = [];
var hazards = [];

// Background
var starfield = TAS.bg.createStarfield(80, GW, GH);
var bgElements = [];

// ============================================================
// HELPER FUNCTIONS
// ============================================================
function anyKey() {
  return Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b;
}

function wrapAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

function spawnExplosion(x, y, color, count, speed) {
  TAS.particles.spawn(x, y, color, count || 8, speed || 3, { size: 2, sizeVar: 2 });
}

// Enhanced particle burst for Baseling theme
function spawnSpores(x, y, count) {
  var colors = ['#44ff44', '#88ff44', '#22cc44', '#66ff88'];
  for (var i = 0; i < (count || 5); i++) {
    var c = colors[Math.floor(Math.random() * colors.length)];
    TAS.particles.spawn(x + TAS.math.randRange(-8, 8), y + TAS.math.randRange(-8, 8), c, 1, 0.5, { size: 2, sizeVar: 1 });
  }
}

function spawnEmbers(x, y, count, color) {
  for (var i = 0; i < (count || 4); i++) {
    TAS.particles.spawn(x, y, color || '#ff8844', 1, TAS.math.randRange(1, 3), { size: 1, sizeVar: 1 });
  }
}

// ============================================================
// AUDIO (NES-style bleeps)
// ============================================================
function playShoot() { TAS.audio.playTone(800, 0.05, 'square', 0.06, 400); }
function playOrbShoot() { TAS.audio.playTone(600, 0.04, 'triangle', 0.04, 300); }
function playHit() { TAS.audio.playTone(200, 0.1, 'sawtooth', 0.08, 80); }
function playExplosion() { TAS.audio.playNoise(0.2, 0.08, 800); }
function playPowerUp() { TAS.audio.playTone(440, 0.1, 'sine', 0.08, 880); }
function playBossWarn() { TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1, 100); }
function playLock() { TAS.audio.playTone(1200, 0.08, 'sine', 0.06, 600); }
function playUnlock() { TAS.audio.playTone(600, 0.08, 'sine', 0.06, 1200); }
function playDeath() { TAS.audio.playNoise(0.4, 0.12, 400); }
function playLaser() { TAS.audio.playTone(1000, 0.12, 'sawtooth', 0.04, 2000); }
function playBomb() { TAS.audio.playTone(100, 0.2, 'square', 0.07, 50); }
function playCombo() { TAS.audio.playTone(660, 0.06, 'triangle', 0.05, 880); }
function playBossDeath() { TAS.audio.playNoise(0.5, 0.15, 300); }
function playHazardWarn() { TAS.audio.playTone(300, 0.15, 'square', 0.04, 200); }

// ============================================================
// NES-STYLE PIXEL DRAWING HELPERS
// ============================================================
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawPixelCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(Math.floor(x), Math.floor(y), r, 0, Math.PI * 2);
  ctx.fill();
}

// Draw NES-style sprite from a simple pixel map (array of rows, each row is string of hex color indices)
// palette is array of colors, '.' = transparent
function drawPixelSprite(x, y, scale, rows, palette) {
  var s = scale || 1;
  for (var row = 0; row < rows.length; row++) {
    for (var col = 0; col < rows[row].length; col++) {
      var ch = rows[row][col];
      if (ch === '.') continue;
      var idx = parseInt(ch, 16);
      if (idx < palette.length) {
        ctx.fillStyle = palette[idx];
        ctx.fillRect(Math.floor(x + col * s), Math.floor(y + row * s), s, s);
      }
    }
  }
}

// ============================================================
// INITIALIZATION
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES;
  hp = MAX_HP;
  stage = 0;
  frame = 0;
  stageFrame = 0;
  combo = 1;
  comboTimer = 0;
  invincible = 60;
  mainGunLevel = 0;
  orbsLocked = false;
  tutorialTimer = 0;
  tutorialShown = false;
  scorePopups = [];
  orbs = [
    { angle: 0, locked: false, lockAngle: 0, weaponType: 'normal' },
    { angle: Math.PI, locked: false, lockAngle: Math.PI, weaponType: 'normal' }
  ];
  player = { x: 60, y: GH / 2, vx: 0, vy: 0, w: 16, h: 12 };
  playerBullets = [];
  orbBullets = [];
  enemyBullets = [];
  enemies = [];
  boss = null;
  bossActive = false;
  bossWarning = 0;
  powerUps = [];
  hazards = [];
  bgElements = [];
  scrollX = 0;
  stageTransition = 0;
  TAS.particles.clear();
  generateBgElements();
}

function generateBgElements() {
  bgElements = [];
  for (var i = 0; i < 20; i++) {
    bgElements.push({
      x: Math.random() * GW * 3,
      y: Math.random() * GH,
      size: 4 + Math.random() * 12,
      speed: 0.3 + Math.random() * 0.5,
      type: Math.floor(Math.random() * 3)
    });
  }
}

// ============================================================
// PLAYER DRAWING (NES pixel-art baseling astronaut)
// ============================================================
// Baseling astronaut pixel sprite (16x12 grid at 1px per cell)
var baselingSprite = [
  '....0000....',
  '...011110...',
  '..01222110..',
  '..01233110..',
  '.0111111110.',
  '.0444444440.',
  '05044444050',
  '05044444050',
  '.0444444440.',
  '..04444440..',
  '...066660...',
  '....0..0....'
];

function getBaselingPalette() {
  return [
    '#222',       // 0 = outline
    '#4488cc',    // 1 = visor
    '#88ccff',    // 2 = visor highlight
    '#aaddff',    // 3 = visor bright
    PLAYER_COLOR, // 4 = body (from NFT)
    '#556677',    // 5 = jetpack
    '#ff8800'     // 6 = flame
  ];
}

function drawPlayer(px, py) {
  var flash = invincible > 0 && Math.floor(invincible / 3) % 2 === 0;
  if (flash) return;

  ctx.save();
  ctx.translate(Math.floor(px) - 6, Math.floor(py) - 6);

  // Jetpack flame (animated)
  var flicker = Math.sin(frame * 0.5) * 2;
  var flameLen = 4 + flicker;
  drawPixelRect(-flameLen - 1, 3, flameLen, 3, '#ff8800');
  drawPixelRect(-flameLen + 1, 4, flameLen - 2, 1, '#ffdd00');

  // === BASELING SPRITE ===
  var _anim = (invincible > 0) ? 'hurt' : ((Math.abs(player.vx) > 1 || Math.abs(player.vy) > 1) ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, 6, 6, 12, { flipX: false, frame: frame, anim: _anim })) {
  // Draw baseling sprite
  var pal = getBaselingPalette();
  drawPixelSprite(0, 0, 1, baselingSprite, pal);
  }

  // Gun barrel
  drawPixelRect(11, 4, 5, 2, '#aabbcc');
  drawPixelRect(15, 5, 2, 1, '#ffdd44');

  ctx.restore();
}

// ============================================================
// ORB DRAWING & LOGIC
// ============================================================
function getOrbPosition(orbIdx) {
  var orb = orbs[orbIdx];
  var a = orbsLocked ? orb.lockAngle : orb.angle;
  return {
    x: player.x + Math.cos(a) * ORB_ORBIT_RADIUS,
    y: player.y + Math.sin(a) * ORB_ORBIT_RADIUS
  };
}

function drawOrb(x, y, weaponType, locked) {
  var glowColor = locked ? 'rgba(255,100,100,0.3)' : 'rgba(100,200,255,0.3)';
  drawPixelCircle(x, y, 8, glowColor);

  var coreColor = '#88ddff';
  if (weaponType === 'laser') coreColor = '#ff4444';
  else if (weaponType === 'bomb') coreColor = '#ffaa22';
  else if (weaponType === 'wave') coreColor = '#44ff88';

  drawPixelCircle(x, y, 5, coreColor);
  drawPixelCircle(x - 1, y - 1, 2, '#ffffff');

  if (locked) {
    ctx.strokeStyle = '#ff6666';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(Math.floor(x), Math.floor(y), 7, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.strokeStyle = locked ? 'rgba(255,100,100,0.2)' : 'rgba(100,200,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(Math.floor(player.x), Math.floor(player.y));
  ctx.lineTo(Math.floor(x), Math.floor(y));
  ctx.stroke();
}

function updateOrbs(dt) {
  var spd = dt * 60;
  for (var i = 0; i < orbs.length; i++) {
    if (!orbsLocked) {
      orbs[i].angle += ORB_ORBIT_SPEED * spd;
      orbs[i].lockAngle = orbs[i].angle;
    }
  }
}

// ============================================================
// BULLET SYSTEMS
// ============================================================
function fireMainGun() {
  if (fireTimer > 0) return;
  fireTimer = FIRE_COOLDOWN;
  playShoot();

  var bx = player.x + 10;
  var by = player.y;
  var dmg = Math.ceil(1 * DAMAGE_MULT);                              // ref 9: STR damage

  if (mainGunLevel === 0) {
    playerBullets.push({ x: bx, y: by, vx: 7, vy: 0, w: 8, h: 2, dmg: dmg, color: '#ffdd44' });
  } else if (mainGunLevel === 1) {
    playerBullets.push({ x: bx, y: by - 3, vx: 7, vy: 0, w: 8, h: 2, dmg: dmg, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by + 3, vx: 7, vy: 0, w: 8, h: 2, dmg: dmg, color: '#ffdd44' });
  } else {
    playerBullets.push({ x: bx, y: by, vx: 7, vy: 0, w: 8, h: 2, dmg: dmg, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by - 2, vx: 6.8, vy: -1.2, w: 6, h: 2, dmg: dmg, color: '#ffdd44' });
    playerBullets.push({ x: bx, y: by + 2, vx: 6.8, vy: 1.2, w: 6, h: 2, dmg: dmg, color: '#ffdd44' });
  }
}

function fireOrbs() {
  if (orbFireTimer > 0) return;
  orbFireTimer = Math.max(6, Math.floor(ORB_FIRE_COOLDOWN * statB.cooldown)); // ref 10: WIS cooldown

  for (var i = 0; i < orbs.length; i++) {
    var pos = getOrbPosition(i);
    var orb = orbs[i];
    var a = orbsLocked ? orb.lockAngle : orb.angle;
    var fireAngle = orbsLocked ? a : 0;
    var orbDmg = Math.ceil(1 * DAMAGE_MULT);                          // ref 11: STR orb damage

    if (orb.weaponType === 'normal') {
      playOrbShoot();
      var speed = 6;
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * speed,
        vy: Math.sin(fireAngle) * speed,
        w: 6, h: 3, dmg: orbDmg, life: 80,
        type: 'normal', color: '#88ddff'
      });
    } else if (orb.weaponType === 'laser') {
      playLaser();
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 12,
        vy: Math.sin(fireAngle) * 12,
        w: 20, h: 3, dmg: Math.ceil(2 * DAMAGE_MULT), life: 30,       // ref 12: STR laser
        type: 'laser', color: '#ff4444', pierce: true
      });
    } else if (orb.weaponType === 'bomb') {
      playBomb();
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 4,
        vy: Math.sin(fireAngle) * 4 - 1,
        w: 6, h: 6, dmg: Math.ceil(3 * DAMAGE_MULT), life: 60,        // ref 13: STR bomb
        type: 'bomb', color: '#ffaa22', gravity: 0.08
      });
    } else if (orb.weaponType === 'wave') {
      orbBullets.push({
        x: pos.x, y: pos.y,
        vx: Math.cos(fireAngle) * 5,
        vy: Math.sin(fireAngle) * 5,
        w: 6, h: 6, dmg: orbDmg, life: 90,
        type: 'wave', color: '#44ff88',
        waveAmp: 3, waveFreq: 0.15, wavePhase: 0, baseVy: Math.sin(fireAngle) * 5
      });
    }
  }
}

function updateBullets(dt) {
  var spd = dt * 60;

  for (var i = playerBullets.length - 1; i >= 0; i--) {
    var b = playerBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x > GW + 20 || b.x < -20 || b.y < -20 || b.y > GH + 20) {
      playerBullets.splice(i, 1);
    }
  }

  for (var i = orbBullets.length - 1; i >= 0; i--) {
    var b = orbBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.gravity) b.vy += b.gravity * spd;
    if (b.type === 'wave') {
      b.wavePhase += b.waveFreq * spd;
      b.y += Math.sin(b.wavePhase) * b.waveAmp;
    }
    b.life -= spd;
    if (b.life <= 0 || b.x > GW + 20 || b.x < -20 || b.y < -20 || b.y > GH + 20) {
      if (b.type === 'bomb') {
        spawnExplosion(b.x, b.y, '#ffaa22', 12, 4);
        TAS.fx.shake(3, 0.92);
        for (var e = enemies.length - 1; e >= 0; e--) {
          if (TAS.math.dist(b.x, b.y, enemies[e].x, enemies[e].y) < 30) {
            damageEnemy(e, Math.ceil(2 * DAMAGE_MULT));               // ref 14: STR splash
          }
        }
      }
      orbBullets.splice(i, 1);
    }
  }

  for (var i = enemyBullets.length - 1; i >= 0; i--) {
    var b = enemyBullets[i];
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x > GW + 20 || b.x < -40 || b.y < -20 || b.y > GH + 20) {
      enemyBullets.splice(i, 1);
    }
  }
}

function drawBullets() {
  for (var i = 0; i < playerBullets.length; i++) {
    var b = playerBullets[i];
    drawPixelRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, b.color);
    drawPixelRect(b.x - b.w / 2 + 1, b.y - b.h / 2, b.w - 3, 1, '#fff');
  }

  for (var i = 0; i < orbBullets.length; i++) {
    var b = orbBullets[i];
    if (b.type === 'laser') {
      ctx.globalAlpha = 0.8;
      drawPixelRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, b.color);
      drawPixelRect(b.x - b.w / 2, b.y, b.w, 1, '#fff');
      ctx.globalAlpha = 1;
    } else if (b.type === 'bomb') {
      drawPixelCircle(b.x, b.y, b.w / 2, b.color);
      drawPixelCircle(b.x - 1, b.y - 1, 2, '#ffdd00');
    } else if (b.type === 'wave') {
      drawPixelCircle(b.x, b.y, 4, b.color);
      ctx.globalAlpha = 0.4;
      drawPixelCircle(b.x, b.y, 6, b.color);
      ctx.globalAlpha = 1;
    } else {
      drawPixelCircle(b.x, b.y, 3, b.color);
    }
  }

  for (var i = 0; i < enemyBullets.length; i++) {
    var b = enemyBullets[i];
    drawPixelCircle(b.x, b.y, b.r || 3, b.color || '#ff4466');
    drawPixelCircle(b.x, b.y, 1, '#fff');
  }
}

// ============================================================
// ENEMY SYSTEM (Baseling-universe creatures)
// ============================================================
function spawnEnemy(type, x, y, opts) {
  opts = opts || {};
  var e = {
    type: type, x: x, y: y,
    vx: opts.vx || -2, vy: opts.vy || 0,
    hp: opts.hp || 2, maxHp: opts.hp || 2,
    w: opts.w || 16, h: opts.h || 12,
    timer: 0, phase: 0,
    score: opts.score || 100,
    fireRate: opts.fireRate || 90,
    color: opts.color || '#44aa66',
    parts: opts.parts || null,
    chain: opts.chain || null
  };
  enemies.push(e);
  return e;
}

function damageEnemy(idx, dmg) {
  var e = enemies[idx];
  e.hp -= dmg;
  TAS.particles.spawn(e.x, e.y, '#fff', 3, 2);

  if (e.hp <= 0) {
    killEnemy(idx);
  }
}

function killEnemy(idx) {
  var e = enemies[idx];
  spawnExplosion(e.x, e.y, e.color, 10, 3);
  spawnSpores(e.x, e.y, 3);
  playExplosion();
  var points = Math.floor(e.score * combo * SCORE_MULT);               // ref 15: INT score
  score += points;
  spawnScorePopup(e.x, e.y - 10, points, combo > 1 ? '#ffaa00' : '#ffdd44');
  comboTimer = COMBO_DECAY;
  if (combo < 8) { combo++; playCombo(); }

  // Drop power-up with CHA luck                                       // ref 16: CHA drops
  var dropChance = 0.12 * LUCK_MULT;
  if (Math.random() < dropChance) {
    spawnPowerUp(e.x, e.y);
  }

  enemies.splice(idx, 1);
}

function updateEnemies(dt) {
  var spd = dt * 60;

  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.timer += spd;

    switch (e.type) {
      case 'spore_drone':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.05) * 0.8 * spd;
        if (e.timer % e.fireRate < spd && Math.random() < 0.3) {
          enemyShoot(e, -4, 0);
        }
        break;

      case 'mycelium_swooper':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.03) * 2 * spd;
        break;

      case 'turret_floor':
      case 'turret_ceil':
        e.x += (SCROLL_SPEEDS[stage] * -0.5) * spd;
        if (e.timer % e.fireRate < spd) {
          var angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyShoot(e, Math.cos(angle) * 3, Math.sin(angle) * 3);
        }
        break;

      case 'fungal_turret':
        e.x += (SCROLL_SPEEDS[stage] * -0.3) * spd;
        if (e.timer % e.fireRate < spd) {
          enemyShoot(e, -3, 0);
          enemyShoot(e, -3, 1);
          enemyShoot(e, -3, -1);
        }
        break;

      case 'tendril_head':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.04) * 1.5 * spd;
        if (e.chain) {
          for (var c = 0; c < e.chain.length; c++) {
            var prev = c === 0 ? e : e.chain[c - 1];
            var seg = e.chain[c];
            var dx = prev.x - seg.x, dy = prev.y - seg.y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d > 12) {
              seg.x += (dx / d) * (d - 12) * 0.5 * spd;
              seg.y += (dy / d) * (d - 12) * 0.5 * spd;
            }
          }
        }
        break;

      case 'shroom_shield':
        e.x += e.vx * spd;
        e.phase += 0.02 * spd;
        if (e.timer % (e.fireRate * 2) < spd) {
          enemyShoot(e, -3, 0);
        }
        break;

      case 'sporebomber':
        e.x += e.vx * spd;
        if (e.timer % e.fireRate < spd) {
          enemyBullets.push({ x: e.x, y: e.y + 8, vx: 0, vy: 3, r: 5, color: '#ff8800' });
          spawnSpores(e.x, e.y + 8, 2);
        }
        break;

      case 'spore_cloud':
        e.x += e.vx * 0.5 * spd;
        e.y += Math.sin(e.timer * 0.02) * 0.5 * spd;
        if (e.timer % 40 < spd) {
          TAS.particles.spawn(e.x, e.y, '#44ff44', 1, 0.5, { size: 3 });
        }
        break;

      case 'brinewalker':
        e.x += e.vx * spd;
        e.y += Math.sin(e.timer * 0.015) * 0.8 * spd;
        if (e.timer % e.fireRate < spd) {
          var angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 3.5, vy: Math.sin(angle) * 3.5, r: 4, color: '#44ddff' });
        }
        break;

      case 'rootmaw':
        e.x += Math.sin(e.timer * 0.015) * 0.8 * spd;
        e.y += Math.sin(e.timer * 0.025) * 1.2 * spd;
        if (e.x > GW - 80) e.x = GW - 80;
        if (e.timer % 30 < spd) {
          var angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyShoot(e, Math.cos(angle) * 4, Math.sin(angle) * 4);
        }
        break;

      // Tasern unique enemies
      case 'sporeling':
        e.x += e.vx * spd;
        e.y += Math.cos(e.timer * 0.06) * 0.6 * spd;
        // Splits on death (handled in killEnemy override)
        break;

      case 'toxin_jelly':
        e.x += e.vx * 0.7 * spd;
        e.y += Math.sin(e.timer * 0.025) * 1.5 * spd;
        // Leaves trail hazards
        if (e.timer % 50 < spd) {
          hazards.push({ x: e.x, y: e.y, r: 10, life: 180, color: '#88ff00', type: 'toxin' });
        }
        break;

      case 'fungal_eye':
        // Hovers and tracks player, fires aimed shot
        var trackSpeed = 0.015;
        e.y += (player.y - e.y) * trackSpeed * spd;
        e.x += e.vx * 0.5 * spd;
        if (e.timer % e.fireRate < spd) {
          var angle = TAS.math.angle(e.x, e.y, player.x, player.y);
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4, r: 3, color: '#ff00ff' });
        }
        break;
    }

    if (e.x < -40) {
      enemies.splice(i, 1);
    }
  }
}

function enemyShoot(e, vx, vy) {
  enemyBullets.push({ x: e.x, y: e.y, vx: vx, vy: vy, r: 3, color: '#ff4466' });
}

        drawPixelRect(6, -2, 4, 4, '#ff4444');

        drawPixelRect(-4, 2, 2, 3, '#fff');
        drawPixelRect(4, 2, 2, 3, '#fff');

// ============================================================
// HAZARD SYSTEM
// ============================================================
function updateHazards(dt) {
  var spd = dt * 60;
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.life -= spd;
    h.x -= SCROLL_SPEEDS[stage] * 0.3 * spd;
    if (h.life <= 0 || h.x < -20) {
      hazards.splice(i, 1);
      continue;
    }
    // Toxin hazard damages player
    if (h.type === 'toxin' && invincible <= 0) {
      if (TAS.math.dist(player.x, player.y, h.x, h.y) < h.r + 6) {
        playerHit();
      }
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var alpha = Math.min(1, h.life / 60);
    ctx.globalAlpha = alpha * 0.4;
    drawPixelCircle(h.x, h.y, h.r, h.color);
    ctx.globalAlpha = alpha * 0.2;
    drawPixelCircle(h.x, h.y, h.r + 3, h.color);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// BOSS SYSTEM (Baseling-universe bosses)
// ============================================================
function spawnBoss() {
  bossActive = true;
  // CON affects effective boss HP scaling (lower CON = slightly less boss HP)
  var conScale = 0.8 + (statB.con / 50);                              // ref 17: CON boss scaling
  var bossHp = Math.floor((40 + stage * 15) * conScale);
  boss = {
    x: GW + 40, y: GH / 2,
    targetX: GW - 60, targetY: GH / 2,
    w: 48, h: 36,
    hp: bossHp, maxHp: bossHp,
    timer: 0, phase: 0, pattern: 0,
    score: 5000 + stage * 2000,
    color: STAGE_COLORS[stage].accent,
    name: BOSS_NAMES[stage],
    parts: [],
    defeated: false
  };

  for (var i = 0; i < 2 + stage; i++) {
    boss.parts.push({
      x: 0, y: 0, angle: (i / (2 + stage)) * Math.PI * 2,
      hp: 8, maxHp: 8, radius: 20 + stage * 3,
      active: true
    });
  }
}

function updateBoss(dt) {
  if (!boss || boss.defeated) return;
  var spd = dt * 60;
  boss.timer += spd;

  boss.x += (boss.targetX - boss.x) * 0.02 * spd;
  boss.y += (boss.targetY - boss.y) * 0.02 * spd;
  boss.targetY = GH / 2 + Math.sin(boss.timer * 0.015) * 80;

  var phaseTime = 180;
  boss.phase = Math.floor(boss.timer / phaseTime) % 4;

  switch (boss.phase) {
    case 0: // Spore spread
      if (boss.timer % 30 < spd) {
        for (var i = -2; i <= 2; i++) {
          var angle = Math.PI + i * 0.25;
          enemyBullets.push({
            x: boss.x - 20, y: boss.y,
            vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
            r: 4, color: boss.color
          });
        }
        spawnSpores(boss.x - 20, boss.y, 2);
      }
      break;
    case 1: // Aimed mycelium shots
      if (boss.timer % 20 < spd) {
        var angle = TAS.math.angle(boss.x, boss.y, player.x, player.y);
        enemyBullets.push({
          x: boss.x - 20, y: boss.y,
          vx: Math.cos(angle) * 4, vy: Math.sin(angle) * 4,
          r: 4, color: '#ff8844'
        });
      }
      break;
    case 2: // Fungal spiral
      if (boss.timer % 6 < spd) {
        var angle = boss.timer * 0.1;
        enemyBullets.push({
          x: boss.x, y: boss.y,
          vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3,
          r: 3, color: '#ff44ff'
        });
      }
      break;
    case 3: // Spore burst
      if (boss.timer % 45 < spd) {
        for (var i = 0; i < 8; i++) {
          var a = (i / 8) * Math.PI * 2;
          enemyBullets.push({
            x: boss.x + Math.cos(a) * 20, y: boss.y + Math.sin(a) * 20,
            vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5,
            r: 3, color: '#ffdd44'
          });
        }
        spawnSpores(boss.x, boss.y, 8);
      }
      break;
  }

  for (var pi = 0; pi < boss.parts.length; pi++) {
    var part = boss.parts[pi];
    if (!part.active) continue;
    part.angle += 0.02 * spd;
    part.x = boss.x + Math.cos(part.angle) * part.radius;
    part.y = boss.y + Math.sin(part.angle) * part.radius;
  }

  if (boss.hp <= 0) {
    boss.defeated = true;
    var bossPoints = Math.floor(boss.score * combo * SCORE_MULT);      // ref 18: INT boss score
    score += bossPoints;
    spawnScorePopup(boss.x, boss.y - 20, bossPoints, '#ff44ff');
    playBossDeath();
    for (var i = 0; i < 30; i++) {
      (function(idx) {
        setTimeout(function() {
          if (boss) {
            spawnExplosion(
              boss.x + TAS.math.randRange(-30, 30),
              boss.y + TAS.math.randRange(-20, 20),
              boss.color, 8, 4
            );
            spawnSpores(boss.x + TAS.math.randRange(-20, 20), boss.y + TAS.math.randRange(-15, 15), 3);
            playExplosion();
          }
        }, idx * 80);
      })(i);
    }
    TAS.fx.shake(12, 0.90);
    TAS.fx.flash(boss.color, 0.5);
    stageTransition = 180;
  }
}

function drawBoss() {
  if (!boss || boss.defeated) return;

  ctx.save();
  ctx.translate(Math.floor(boss.x), Math.floor(boss.y));

  // Pulsing spore aura
  var auraPulse = Math.sin(boss.timer * 0.03) * 5;
  ctx.globalAlpha = 0.15;
  drawPixelCircle(0, 0, boss.w + auraPulse + 8, boss.color);
  ctx.globalAlpha = 0.25;
  drawPixelCircle(0, 0, boss.w + auraPulse, boss.color);
  ctx.globalAlpha = 1;

  // Core body
  drawPixelCircle(0, 0, boss.w * 0.6, '#222');
  drawPixelCircle(0, 0, boss.w * 0.5, '#333');
  drawPixelCircle(0, 0, boss.w * 0.4, boss.color);

  // Eye/core detail
  var pulse = Math.sin(boss.timer * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  drawPixelCircle(0, 0, boss.w * 0.15, '#fff');
  drawPixelCircle(-3, -2, boss.w * 0.08, '#ff0000');
  ctx.globalAlpha = 1;

  // Tendrils
  for (var t = 0; t < 6; t++) {
    var ta = boss.timer * 0.02 + (t / 6) * Math.PI * 2;
    var tx = Math.cos(ta) * (boss.w * 0.7);
    var ty = Math.sin(ta) * (boss.w * 0.7);
    drawPixelCircle(tx, ty, 3, boss.color);
  }

  ctx.restore();

  // Draw parts
  for (var pi = 0; pi < boss.parts.length; pi++) {
    var part = boss.parts[pi];
    if (!part.active) continue;
    drawPixelCircle(part.x, part.y, 8, boss.color);
    drawPixelCircle(part.x, part.y, 4, '#ddd');
    drawPixelCircle(part.x - 1, part.y - 1, 2, '#fff');
  }

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, GW / 2, GH - 22);

  // Health bar
  var hpRatio = boss.hp / boss.maxHp;
  drawPixelRect(GW / 2 - 80, GH - 16, 160, 6, '#333');
  drawPixelRect(GW / 2 - 80, GH - 16, Math.floor(160 * hpRatio), 6, hpRatio > 0.3 ? boss.color : '#ff4444');
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', GW / 2, GH - 8);
}

// ============================================================
// POWER-UP SYSTEM (Baseling garden items)
// ============================================================
var POWERUP_NAMES = {
  gun: 'Mycelium Missile', laser: 'Spore Beam', bomb: 'POOP Bomb',
  wave: 'Garden Seed Pulse', health: 'Spore Gem', shield: 'Bark Shield'
};

function spawnPowerUp(x, y) {
  var types = ['gun', 'laser', 'bomb', 'wave', 'health', 'shield'];
  var weights = [25, 18, 18, 18, 12, 9];
  var total = 0;
  for (var w = 0; w < weights.length; w++) total += weights[w];
  var r = Math.random() * total;
  var type = types[0];
  for (var j = 0; j < weights.length; j++) {
    r -= weights[j];
    if (r <= 0) { type = types[j]; break; }
  }
  powerUps.push({ x: x, y: y, type: type, timer: 0, w: 12, h: 12 });
}

function updatePowerUps(dt) {
  var spd = dt * 60;
  for (var i = powerUps.length - 1; i >= 0; i--) {
    var p = powerUps[i];
    p.x -= SCROLL_SPEEDS[stage] * 0.5 * spd;
    p.timer += spd;
    if (p.x < -20) {
      powerUps.splice(i, 1);
      continue;
    }
    if (TAS.hit.rectOverlap(
      player.x - player.w / 2, player.y - player.h / 2, player.w, player.h,
      p.x - p.w / 2, p.y - p.h / 2, p.w, p.h
    )) {
      applyPowerUp(p.type);
      powerUps.splice(i, 1);
    }
  }
}

function applyPowerUp(type) {
  playPowerUp();
  TAS.particles.spawn(player.x, player.y, '#ffdd44', 8, 3);
  spawnScorePopup(player.x, player.y - 16, POWERUP_NAMES[type] || type, '#88ffaa');

  switch (type) {
    case 'gun':
      mainGunLevel = Math.min(mainGunLevel + 1, 2);
      break;
    case 'laser':
      orbs[0].weaponType = 'laser';
      orbs[1].weaponType = 'laser';
      break;
    case 'bomb':
      orbs[0].weaponType = 'bomb';
      orbs[1].weaponType = 'bomb';
      break;
    case 'wave':
      orbs[0].weaponType = 'wave';
      orbs[1].weaponType = 'wave';
      break;
    case 'health':
      hp = Math.min(hp + 1, MAX_HP);
      break;
    case 'shield':
      invincible = Math.max(invincible, 180);
      TAS.fx.flash('#44ddff', 0.2);
      break;
  }
}

function drawPowerUps() {
  for (var i = 0; i < powerUps.length; i++) {
    var p = powerUps[i];
    var bob = Math.sin(p.timer * 0.08) * 2;
    ctx.save();
    ctx.translate(Math.floor(p.x), Math.floor(p.y + bob));

    // Glow
    ctx.globalAlpha = 0.4;
    drawPixelCircle(0, 0, 10, '#ffff66');
    ctx.globalAlpha = 1;

    // Box (mushroom shaped)
    drawPixelRect(-5, -2, 10, 8, '#333');
    drawPixelCircle(0, -4, 6, '#555');

    // Letter
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    var label = 'P';
    if (p.type === 'gun') label = 'G';
    else if (p.type === 'laser') label = 'L';
    else if (p.type === 'bomb') label = 'B';
    else if (p.type === 'wave') label = 'W';
    else if (p.type === 'health') label = '+';
    else if (p.type === 'shield') label = 'S';
    ctx.fillText(label, 0, 5);

    ctx.restore();
  }
}

// ============================================================
// WAVE SPAWNER (Baseling-universe enemies)
// ============================================================
function spawnWave() {
  var progress = stageFrame / STAGE_LENGTH;
  var difficulty = stage + progress * 2;

  var roll = Math.random();

  if (roll < 0.2) {
    // Spore drone formation
    var count = 3 + Math.floor(difficulty * 0.5);
    for (var i = 0; i < count; i++) {
      spawnEnemy('spore_drone', GW + 20 + i * 30, 40 + Math.random() * (GH - 80), {
        hp: 2 + Math.floor(stage * 0.5),
        vx: -1.5 - Math.random() * 1,
        color: STAGE_COLORS[stage].accent,
        fireRate: 100 - stage * 8
      });
    }
  } else if (roll < 0.32) {
    // Mycelium swooper wave
    var count = 4 + stage;
    for (var i = 0; i < count; i++) {
      spawnEnemy('mycelium_swooper', GW + 20 + i * 25, GH / 2, {
        hp: 1, vx: -3, vy: 0,
        color: '#ffaa44', score: 80
      });
    }
  } else if (roll < 0.44) {
    // Floor/ceiling turrets
    if (stage >= 1) {
      var ty = Math.random() < 0.5 ? 20 : GH - 20;
      spawnEnemy(ty < GH / 2 ? 'turret_ceil' : 'turret_floor', GW + 10, ty, {
        hp: 5 + stage, vx: 0,
        color: '#888', w: 16, h: 16, fireRate: 60 - stage * 5,
        score: 200
      });
    }
  } else if (roll < 0.52) {
    // Tendril chain
    if (stage >= 1) {
      var head = spawnEnemy('tendril_head', GW + 20, GH / 4 + Math.random() * GH / 2, {
        hp: 6 + stage * 2, vx: -1.2, color: '#88ff44', w: 16, h: 16, score: 500
      });
      head.chain = [];
      for (var c = 0; c < 4 + stage; c++) {
        head.chain.push({ x: head.x + (c + 1) * 12, y: head.y, hp: 1 });
      }
    }
  } else if (roll < 0.60) {
    // Shroom shield carriers
    if (stage >= 2) {
      spawnEnemy('shroom_shield', GW + 20, GH / 3 + Math.random() * GH / 3, {
        hp: 8 + stage * 2, vx: -1, color: '#4488cc', w: 20, h: 16, score: 300,
        fireRate: 80
      });
    }
  } else if (roll < 0.68) {
    // Sporebombers
    spawnEnemy('sporebomber', GW + 20, 30 + Math.random() * 40, {
      hp: 4 + stage, vx: -1.5, color: '#886644', w: 24, h: 12,
      fireRate: 45, score: 250
    });
  } else if (roll < 0.76) {
    // Sporelings (split on death)
    for (var i = 0; i < 3; i++) {
      spawnEnemy('sporeling', GW + 20 + i * 20, GH / 3 + Math.random() * GH / 3, {
        hp: 1, vx: -2, color: '#aaff44', w: 10, h: 10, score: 60
      });
    }
  } else if (roll < 0.84) {
    // Stage-specific enemies
    if (stage === 4 || stage === 3) {
      spawnEnemy('spore_cloud', GW + 20, 40 + Math.random() * (GH - 80), {
        hp: 3, vx: -0.5, color: '#44ff44', w: 24, h: 24, score: 50
      });
    } else if (stage === 5) {
      spawnEnemy('brinewalker', GW + 20, GH - 60 + Math.random() * 40, {
        hp: 6, vx: -1, color: '#335566', w: 28, h: 12, fireRate: 70, score: 300
      });
    } else if (stage >= 2) {
      // Fungal eye
      spawnEnemy('fungal_eye', GW + 20, 60 + Math.random() * (GH - 120), {
        hp: 4 + stage, vx: -0.8, color: '#aa44aa', w: 14, h: 14, fireRate: 50, score: 250
      });
    }
  } else if (roll < 0.90) {
    // Toxin jellies
    if (stage >= 3) {
      spawnEnemy('toxin_jelly', GW + 20, 80 + Math.random() * (GH - 160), {
        hp: 5, vx: -0.6, color: '#88ff00', w: 16, h: 16, score: 200
      });
    }
  } else if (roll < 0.95) {
    // Fungal turret wall
    if (stage >= 2) {
      spawnEnemy('fungal_turret', GW + 10, Math.random() < 0.5 ? 30 : GH - 30, {
        hp: 6 + stage, vx: 0, color: '#556633', w: 12, h: 20, fireRate: 50, score: 250
      });
    }
  } else {
    // Rootmaw mini-boss (rare)
    if (progress > 0.4 && progress < 0.6 && Math.random() < 0.3) {
      spawnEnemy('rootmaw', GW + 30, GH / 2, {
        hp: 15 + stage * 5, vx: -0.5,
        color: STAGE_COLORS[stage].accent,
        w: 32, h: 24, score: 2000, fireRate: 30
      });
    }
  }
}

// ============================================================
// COLLISIONS
// ============================================================
function checkCollisions() {
  // Player bullets vs enemies
  for (var bi = playerBullets.length - 1; bi >= 0; bi--) {
    var b = playerBullets[bi];
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var e = enemies[ei];
      if (TAS.hit.rectOverlap(
        b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        damageEnemy(ei, b.dmg);
        playerBullets.splice(bi, 1);
        break;
      }
    }
  }

  // Orb bullets vs enemies
  for (var bi = orbBullets.length - 1; bi >= 0; bi--) {
    var b = orbBullets[bi];
    var hit = false;
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
      var e = enemies[ei];
      if (TAS.hit.rectOverlap(
        b.x - b.w / 2, b.y - b.h / 2, b.w, b.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        damageEnemy(ei, b.dmg);
        if (!b.pierce) { hit = true; break; }
      }
    }
    if (hit) orbBullets.splice(bi, 1);
  }

  // Player bullets vs boss
  if (boss && !boss.defeated) {
    for (var bi = playerBullets.length - 1; bi >= 0; bi--) {
      var b = playerBullets[bi];
      var hitPart = false;
      for (var pi = 0; pi < boss.parts.length; pi++) {
        var part = boss.parts[pi];
        if (!part.active) continue;
        if (TAS.hit.circleOverlap(b.x, b.y, 4, part.x, part.y, 8)) {
          part.hp -= b.dmg;
          if (part.hp <= 0) {
            part.active = false;
            spawnExplosion(part.x, part.y, boss.color, 8, 3);
            var partPts = Math.floor(500 * SCORE_MULT);
            score += partPts;
            spawnScorePopup(part.x, part.y - 8, partPts, boss.color);
          }
          playerBullets.splice(bi, 1);
          hitPart = true;
          break;
        }
      }
      if (hitPart) continue;
      if (TAS.hit.circleOverlap(b.x, b.y, 4, boss.x, boss.y, boss.w * 0.6)) {
        boss.hp -= b.dmg;
        TAS.particles.spawn(b.x, b.y, '#fff', 2, 2);
        playerBullets.splice(bi, 1);
      }
    }

    // Orb bullets vs boss
    for (var bi = orbBullets.length - 1; bi >= 0; bi--) {
      var b = orbBullets[bi];
      if (TAS.hit.circleOverlap(b.x, b.y, b.w / 2, boss.x, boss.y, boss.w * 0.6)) {
        boss.hp -= b.dmg;
        TAS.particles.spawn(b.x, b.y, '#fff', 2, 2);
        if (!b.pierce) orbBullets.splice(bi, 1);
      }
    }
  }

  // Enemy bullets vs player — DEX dodge chance                        // ref 19: DEX dodge
  if (invincible <= 0) {
    var dodgeChance = Math.min(0.25, (statB.dex - 10) * 0.01);
    for (var bi = enemyBullets.length - 1; bi >= 0; bi--) {
      var b = enemyBullets[bi];
      if (TAS.hit.circleOverlap(b.x, b.y, b.r || 3, player.x, player.y, 6)) {
        if (dodgeChance > 0 && Math.random() < dodgeChance) {
          // Dodge! DEX saves you
          spawnScorePopup(player.x, player.y - 12, 'DODGE!', '#44ff44');
          enemyBullets.splice(bi, 1);
          continue;
        }
        playerHit();
        enemyBullets.splice(bi, 1);
        break;
      }
    }

    // Enemies vs player collision
    for (var ei = 0; ei < enemies.length; ei++) {
      var e = enemies[ei];
      if (TAS.hit.rectOverlap(
        player.x - player.w / 2, player.y - player.h / 2, player.w, player.h,
        e.x - e.w / 2, e.y - e.h / 2, e.w, e.h
      )) {
        playerHit();
        break;
      }
    }

    // Boss parts vs player
    if (boss && !boss.defeated) {
      for (var pi = 0; pi < boss.parts.length; pi++) {
        var part = boss.parts[pi];
        if (!part.active) continue;
        if (TAS.hit.circleOverlap(player.x, player.y, 6, part.x, part.y, 8)) {
          playerHit();
          break;
        }
      }
    }
  }
}

function playerHit() {
  hp--;
  invincible = 90;
  combo = 1;
  comboTimer = 0;
  playHit();
  TAS.fx.shake(8, 0.88);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.particles.spawn(player.x, player.y, '#ff8844', 12, 3);
  spawnEmbers(player.x, player.y, 6, '#ff4444');

  if (hp <= 0) {
    lives--;
    playDeath();
    TAS.fx.shake(12, 0.85);
    if (lives <= 0) {
      gameOver();
    } else {
      hp = MAX_HP;
      invincible = 120;
      player.x = 60;
      player.y = GH / 2;
      player.vx = 0;
      player.vy = 0;
      mainGunLevel = Math.max(0, mainGunLevel - 1);
      enemyBullets = [];
    }
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('spore_attack_hi', highScore);
  }
}

// ============================================================
// STAGE BACKGROUNDS (Baseling garden zones with parallax)
// ============================================================
function drawBackground() {
  var colors = STAGE_COLORS[stage];
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  switch (stage) {
    case 0: // Garden Outpost — stars, distant spore planet
      starfield.update(SCROLL_SPEEDS[stage]);
      starfield.draw();
      drawPixelCircle(GW * 0.7, GH * 0.8, 60, '#1a2244');
      drawPixelCircle(GW * 0.7, GH * 0.8, 55, '#223355');
      // Spore dust
      for (var i = 0; i < 4; i++) {
        var sx = ((frame * 0.5 + i * 120) % GW);
        drawPixelCircle(sx, 50 + i * 70, 1, 'rgba(68,136,255,0.3)');
      }
      break;

    case 1: // The POOP Pipeline — heat streaks, spore clouds
      starfield.update(SCROLL_SPEEDS[stage] * 0.5);
      starfield.draw();
      for (var i = 0; i < 5; i++) {
        var sy = ((frame * 3 + i * 67) % GH);
        ctx.strokeStyle = 'rgba(255,136,0,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(GW, sy + 20);
        ctx.stroke();
      }
      // Floating spore particles
      for (var i = 0; i < 6; i++) {
        var px = ((frame * 0.8 + i * 80) % (GW + 20)) - 10;
        var py = GH * 0.3 + Math.sin(frame * 0.01 + i) * 40;
        ctx.globalAlpha = 0.15;
        drawPixelCircle(px, py, 8 + i * 2, '#ff8844');
        ctx.globalAlpha = 1;
      }
      break;

    case 2: // Compost Ruins — broken buildings, mushrooms
      for (var i = 0; i < bgElements.length; i++) {
        var el = bgElements[i];
        el.x -= el.speed * SCROLL_SPEEDS[stage];
        if (el.x < -el.size * 3) el.x = GW + el.size;
        drawPixelRect(el.x, GH - el.size * 3, el.size, el.size * 3, colors.mid);
        drawPixelRect(el.x + 2, GH - el.size * 3 + 2, el.size - 4, el.size * 3 - 2, colors.fg);
        // Mushrooms on buildings
        if (el.type === 1) {
          drawPixelCircle(el.x + el.size / 2, GH - el.size * 3 - 4, 5, '#446644');
          drawPixelRect(el.x + el.size / 2 - 1, GH - el.size * 3 - 2, 2, 4, '#335533');
        }
      }
      drawPixelRect(0, GH - 15, GW, 15, colors.fg);
      break;

    case 3: // Root Cellar Warrens — ceiling/floor with roots
      drawPixelRect(0, 0, GW, 30, colors.mid);
      drawPixelRect(0, GH - 30, GW, 30, colors.mid);
      for (var i = 0; i < 16; i++) {
        var ox = ((i * 32) - (frame * SCROLL_SPEEDS[stage]) % 32);
        drawPixelRect(ox, 26, 2, 6, colors.fg);
        drawPixelRect(ox, GH - 32, 2, 6, colors.fg);
        // Hanging roots
        if (i % 3 === 0) {
          var rootLen = 10 + Math.sin(i * 2.1) * 8;
          drawPixelRect(ox + 1, 30, 1, rootLen, '#334422');
        }
        // Floor mushrooms
        if (i % 4 === 1) {
          drawPixelCircle(ox + 8, GH - 34, 4, '#445533');
        }
      }
      break;

    case 4: // Spore Hive Core — organic walls, glowing tendrils
      ctx.fillStyle = colors.mid;
      for (var i = 0; i < 10; i++) {
        var ox = ((i * 50) - (frame * SCROLL_SPEEDS[stage] * 0.8) % 50);
        var h1 = 20 + Math.sin(i * 1.3) * 15;
        ctx.beginPath();
        ctx.arc(Math.floor(ox), 0, h1, 0, Math.PI);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(Math.floor(ox), GH, h1, Math.PI, 0);
        ctx.fill();
      }
      // Glowing spore veins
      ctx.strokeStyle = 'rgba(68,255,136,0.15)';
      ctx.lineWidth = 2;
      for (var i = 0; i < 5; i++) {
        var vx = ((frame * 0.3 + i * 100) % GW);
        ctx.beginPath();
        ctx.moveTo(vx, 0);
        ctx.quadraticCurveTo(vx + 20, GH / 2, vx - 10, GH);
        ctx.stroke();
      }
      break;

    case 5: // Brine Flats — waves, salt crystals
      drawPixelRect(0, GH * 0.7, GW, GH * 0.3, '#0a2030');
      for (var i = 0; i < GW; i += 4) {
        var wy = GH * 0.7 + Math.sin((i + frame * 2) * 0.03) * 5;
        drawPixelRect(i, wy, 4, 2, '#153040');
      }
      // Salt crystals
      for (var i = 0; i < 4; i++) {
        var cx = ((frame * 0.4 + i * 120) % (GW + 40)) - 20;
        drawPixelRect(cx, GH * 0.65, 3, 12, 'rgba(200,220,240,0.15)');
        drawPixelRect(cx + 1, GH * 0.63, 1, 4, 'rgba(200,220,240,0.1)');
      }
      break;

    case 6: // The Motherspore Nest — alien fungal tech
      starfield.update(SCROLL_SPEEDS[stage]);
      starfield.draw();
      // Pulsing mycelium grid
      ctx.strokeStyle = 'rgba(255,68,255,0.12)';
      ctx.lineWidth = 1;
      for (var i = 0; i < 10; i++) {
        var gx = ((i * 50) - (frame * 2) % 50);
        ctx.beginPath();
        ctx.moveTo(Math.floor(gx), 0);
        ctx.lineTo(Math.floor(gx), GH);
        ctx.stroke();
      }
      for (var i = 0; i < 7; i++) {
        var gy = ((i * 50) - (frame) % 50);
        ctx.beginPath();
        ctx.moveTo(0, Math.floor(gy));
        ctx.lineTo(GW, Math.floor(gy));
        ctx.stroke();
      }
      // Floating spore orbs
      for (var i = 0; i < 3; i++) {
        var ox = ((frame * 0.6 + i * 160) % GW);
        var oy = GH * 0.3 + Math.sin(frame * 0.02 + i * 2) * 50;
        ctx.globalAlpha = 0.1;
        drawPixelCircle(ox, oy, 12, '#ff44ff');
        ctx.globalAlpha = 1;
      }
      break;
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  TAS.ui.drawHUD(score, stage + 1, lives, GW);

  // HP bar
  var barW = 50, barH = 5;
  var bx = 6, by = 22;
  drawPixelRect(bx, by, barW, barH, '#333');
  var hpColor = hp > 2 ? '#44ff44' : hp > 1 ? '#ffdd00' : '#ff4444';
  drawPixelRect(bx, by, Math.floor(barW * (hp / MAX_HP)), barH, hpColor);

  // HP pips
  ctx.fillStyle = '#000';
  for (var p = 1; p < MAX_HP; p++) {
    ctx.fillRect(bx + Math.floor(barW * (p / MAX_HP)), by, 1, barH);
  }

  // Combo display
  if (combo > 1) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('x' + combo, 60, 27);
  }

  // Player name and level
  if (PLAYER_NAME) {
    ctx.fillStyle = PLAYER_COLOR;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(PLAYER_NAME + (PLAYER_LEVEL > 0 ? ' LV' + PLAYER_LEVEL : ''), 6, 37);
  }

  // Orb lock indicator
  if (orbsLocked) {
    ctx.fillStyle = '#ff6666';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('LOCKED', GW - 6, 27);
  }

  // Orb weapon type
  ctx.fillStyle = '#88ddff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  var wName = orbs[0].weaponType === 'normal' ? 'ORB' :
    orbs[0].weaponType === 'laser' ? 'LASER' :
    orbs[0].weaponType === 'bomb' ? 'BOMB' : 'WAVE';
  ctx.fillText(wName, GW / 2, 27);

  // Stage name (briefly at start)
  if (stageFrame < 120) {
    var alpha = stageFrame < 60 ? stageFrame / 60 : (120 - stageFrame) / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = STAGE_COLORS[stage].accent;
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 10);
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2 + 8);
    ctx.globalAlpha = 1;
  }

  // Boss warning with shake
  if (bossWarning > 0) {
    var pulse = Math.sin(frame * 0.15) * 0.4 + 0.6;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING', GW / 2, GH / 2);
    ctx.font = '10px monospace';
    ctx.fillText('SPORE BOSS APPROACHING', GW / 2, GH / 2 + 16);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    starfield.update(0.5);
    if (anyKey()) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame > 30 && anyKey()) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  var spd = dt * 60;
  stageFrame++;
  tutorialTimer++;

  // Stage transition
  if (stageTransition > 0) {
    stageTransition -= spd;
    if (stageTransition <= 0) {
      stage++;
      if (stage >= STAGE_COUNT) {
        score += Math.floor(50000 * SCORE_MULT);                       // ref 20: INT end bonus
        gameOver();
        return;
      }
      stageFrame = 0;
      bossActive = false;
      boss = null;
      bossWarning = 0;
      enemies = [];
      enemyBullets = [];
      hazards = [];
      generateBgElements();
      invincible = 60;
    }
    return;
  }

  // Combo decay — WIS extends combo window slightly
  var comboDecayRate = COMBO_DECAY + Math.floor(statB.wis * 1.5);      // ref 21: WIS combo
  if (comboTimer > 0) {
    comboTimer -= spd;
    if (comboTimer <= 0) {
      combo = 1;
    }
  }

  if (invincible > 0) invincible -= spd;

  // ---- PLAYER INPUT (NES controls: arrows/WASD + Z/X) ----
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  var ax = 0, ay = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) ax -= PLAYER_ACCEL;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) ax += PLAYER_ACCEL;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) ay -= PLAYER_ACCEL;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) ay += PLAYER_ACCEL;

  player.vx += ax;
  player.vy += ay;
  player.vx *= PLAYER_FRICTION;
  player.vy *= PLAYER_FRICTION;

  var speed = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
  if (speed > PLAYER_MAX_SPEED) {
    player.vx = (player.vx / speed) * PLAYER_MAX_SPEED;
    player.vy = (player.vy / speed) * PLAYER_MAX_SPEED;
  }

  player.x += player.vx * spd;
  player.y += player.vy * spd;

  player.x = TAS.math.clamp(player.x, 16, GW - 16);
  player.y = TAS.math.clamp(player.y, 16, GH - 16);

  // ---- ORB LOCK/UNLOCK (X / RShift = NES B button) ----
  var bPressed = keys['KeyX'] || keys['ShiftRight'] || touch.b;
  if (bPressed && !bPressedLast) {
    orbsLocked = !orbsLocked;
    if (orbsLocked) {
      for (var i = 0; i < orbs.length; i++) {
        orbs[i].lockAngle = orbs[i].angle;
      }
      playLock();
    } else {
      playUnlock();
    }
  }
  bPressedLast = bPressed;

  // ---- FIRING (Z / Space = NES A button) ----
  var firePressed = keys['KeyZ'] || keys['Space'] || touch.a;
  if (fireTimer > 0) fireTimer -= spd;
  if (orbFireTimer > 0) orbFireTimer -= spd;

  if (firePressed) {
    fireMainGun();
    fireOrbs();
  }

  updateOrbs(dt);
  updateBullets(dt);
  updateHazards(dt);

  // ---- ENEMY SPAWNING ----
  if (!bossActive) {
    var spawnRate = Math.max(30, 90 - stage * 8 - stageFrame * 0.01);
    if (stageFrame % Math.floor(spawnRate) === 0) {
      spawnWave();
    }

    if (stageFrame >= STAGE_LENGTH) {
      bossWarning = 120;
      TAS.fx.shake(2, 0.95);
    }
    if (bossWarning > 0) {
      bossWarning -= spd;
      if (bossWarning <= 0 && !bossActive) {
        spawnBoss();
        playBossWarn();
        enemies = [];
      }
    }
  }

  updateEnemies(dt);
  updateBoss(dt);
  updatePowerUps(dt);
  checkCollisions();

  scrollX += SCROLL_SPEEDS[stage] * spd;
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, {
      frame: frame, extra: 'Stage: ' + (stage + 1) + ' | Combo: x' + combo
    });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawForegroundDetails();
  drawHazards();
  drawPowerUps();
  drawEnemies();
  drawBoss();
  drawBossDetails();
  drawPlayer(player.x, player.y);

  for (var i = 0; i < orbs.length; i++) {
    var pos = getOrbPosition(i);
    drawOrb(pos.x, pos.y, orbs[i].weaponType, orbsLocked);
  }

  drawBullets();
  TAS.particles.draw();
  drawScorePopups();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Tutorial overlay (first 5 seconds)
  if (!tutorialShown) drawTutorial();

  TAS.input.drawTouchControls(GW, GH);

  // Stage transition overlay
  if (stageTransition > 0) {
    var alpha = Math.min(1, stageTransition / 60);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    if (stage < STAGE_COUNT - 1) {
      ctx.fillText('GARDEN CLEARED', GW / 2, GH / 2 - 10);
      ctx.font = '10px monospace';
      ctx.fillText('Entering: ' + STAGE_NAMES[stage + 1], GW / 2, GH / 2 + 10);
      // Stage clear bonus
      var stageBonus = Math.floor((stage + 1) * 1000 * SCORE_MULT);    // ref 22: INT stage bonus
      ctx.fillStyle = '#ffdd44';
      ctx.fillText('BONUS: +' + stageBonus, GW / 2, GH / 2 + 28);
    } else {
      ctx.fillText('SPORE INVASION REPELLED!', GW / 2, GH / 2);
    }
  }
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  starfield.update(0.5);
  starfield.draw();

  ctx.textAlign = 'center';

  // Shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('S.P.O.R.E.', GW / 2 + 2, 52);

  // Main title
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('S.P.O.R.E.', GW / 2, 50);

  // Subtitle
  ctx.fillStyle = '#3cacd7';
  ctx.font = '9px monospace';
  ctx.fillText('SPECIAL POOP OPERATIONS & RECON EXPEDITION', GW / 2, 68);

  ctx.fillStyle = '#7a444a';
  ctx.font = '8px monospace';
  ctx.fillText('Your Baseling vs. The Fungal Invasion', GW / 2, 82);

  // Draw player baseling (NES pixel art, scaled up)
  ctx.save();
  ctx.translate(GW / 2 - 6, 110);
  var pal = getBaselingPalette();
  drawPixelSprite(0, 0, 2, baselingSprite, pal);
  // Flame
  var flicker = Math.sin(frame * 0.4) * 2;
  drawPixelRect(-flicker * 2 - 4, 6, 4 + flicker, 4, '#ff8800');
  drawPixelRect(-flicker - 2, 7, 3, 2, '#ffdd00');
  ctx.restore();

  // Draw orbiting orbs on title
  var orbAngle1 = frame * 0.03;
  var orbAngle2 = frame * 0.03 + Math.PI;
  var orbRadius = 35;
  var ox1 = GW / 2 + Math.cos(orbAngle1) * orbRadius;
  var oy1 = 122 + Math.sin(orbAngle1) * orbRadius;
  var ox2 = GW / 2 + Math.cos(orbAngle2) * orbRadius;
  var oy2 = 122 + Math.sin(orbAngle2) * orbRadius;

  drawPixelCircle(ox1, oy1, 8, 'rgba(100,200,255,0.3)');
  drawPixelCircle(ox1, oy1, 5, '#88ddff');
  drawPixelCircle(ox2, oy2, 8, 'rgba(100,200,255,0.3)');
  drawPixelCircle(ox2, oy2, 5, '#88ddff');

  // Player stat bar (from NftLoader)
  if (window.NftLoader && NftLoader.drawStatBar && PLAYER_LEVEL > 0) {
    NftLoader.drawStatBar(ctx, GW / 2 - 70, 168, 140);
  }

  // Controls info
  var controlY = PLAYER_LEVEL > 0 ? 246 : 180;
  ctx.fillStyle = '#556677';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS/WASD: Move  |  Z/SPACE: Fire  |  X: Lock Orbs', GW / 2, controlY);
  ctx.fillText('[G]un  [L]aser  [B]omb  [W]ave  [+]HP  [S]hield', GW / 2, controlY + 14);

  // Character name
  if (PLAYER_NAME && PLAYER_NAME !== 'Baseling') {
    ctx.fillStyle = PLAYER_COLOR;
    ctx.font = 'bold 9px monospace';
    ctx.fillText('BASELING: ' + PLAYER_NAME, GW / 2, controlY + 30);
  }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, controlY + 46);
  }

  // Start prompt
  var promptY = controlY + 62;
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, promptY);
  ctx.globalAlpha = 1;
}

// ============================================================
// STAGE-SPECIFIC FOREGROUND DETAILS
// ============================================================
function drawForegroundDetails() {
  switch (stage) {
    case 0: // Garden Outpost — floating debris
      for (var i = 0; i < 3; i++) {
        var dx = ((frame * 0.3 + i * 160) % (GW + 30)) - 15;
        var dy = 20 + i * 90 + Math.sin(frame * 0.01 + i * 3) * 10;
        ctx.globalAlpha = 0.15;
        drawPixelRect(dx, dy, 8, 4, '#4488ff');
        drawPixelRect(dx + 2, dy + 1, 4, 2, '#6699ff');
        ctx.globalAlpha = 1;
      }
      break;

    case 1: // The POOP Pipeline — ash particles
      for (var i = 0; i < 8; i++) {
        var ax = ((frame * 1.2 + i * 60) % GW);
        var ay = ((frame * 0.4 + i * 40) % GH);
        ctx.globalAlpha = 0.2;
        drawPixelRect(ax, ay, 2, 2, '#997766');
        ctx.globalAlpha = 1;
      }
      break;

    case 2: // Compost Ruins — dust motes
      for (var i = 0; i < 6; i++) {
        var mx = ((frame * 0.2 + i * 80) % GW);
        var my = GH - 30 + Math.sin(frame * 0.03 + i) * 8;
        ctx.globalAlpha = 0.12;
        drawPixelCircle(mx, my, 1, '#aaa');
        ctx.globalAlpha = 1;
      }
      break;

    case 3: // Undergrowth — dripping water
      for (var i = 0; i < 4; i++) {
        var wx = 40 + i * 110;
        var wy = 30 + ((frame * 0.8 + i * 50) % 40);
        ctx.globalAlpha = 0.3;
        drawPixelRect(wx, wy, 1, 3, '#4488aa');
        ctx.globalAlpha = 1;
      }
      break;

    case 4: // Spore Hive Core — floating spore motes
      for (var i = 0; i < 10; i++) {
        var sx = ((frame * 0.15 + i * 48) % GW);
        var sy = ((frame * 0.1 + i * 32) % GH);
        ctx.globalAlpha = 0.15 + Math.sin(frame * 0.04 + i) * 0.1;
        drawPixelCircle(sx, sy, 1, '#44ff44');
        ctx.globalAlpha = 1;
      }
      break;

    case 5: // Brine Flats — sea foam
      for (var i = 0; i < 6; i++) {
        var fx = ((frame * 1.5 + i * 80) % GW);
        var fy = GH * 0.68 + Math.sin(frame * 0.05 + i * 2) * 3;
        ctx.globalAlpha = 0.2;
        drawPixelCircle(fx, fy, 2, '#aaddee');
        ctx.globalAlpha = 1;
      }
      break;

    case 6: // Motherspore Nest — energy sparks
      for (var i = 0; i < 5; i++) {
        var ex = ((frame * 2 + i * 96) % GW);
        var ey = ((frame * 0.5 + i * 64) % GH);
        ctx.globalAlpha = 0.3 * (0.5 + Math.sin(frame * 0.1 + i) * 0.5);
        drawPixelCircle(ex, ey, 1, '#ff88ff');
        ctx.globalAlpha = 1;
      }
      break;
  }
}

// ============================================================
// ENHANCED BOSS DRAWING PER STAGE
// ============================================================
function drawBossDetails() {
  if (!boss || boss.defeated) return;

  ctx.save();
  ctx.translate(Math.floor(boss.x), Math.floor(boss.y));

  switch (stage) {
    case 0: // Scat Mold King — mechanical spore core
      // Rotating armor plates
      for (var i = 0; i < 4; i++) {
        var pa = boss.timer * 0.015 + (i / 4) * Math.PI * 2;
        var px = Math.cos(pa) * (boss.w * 0.55);
        var py = Math.sin(pa) * (boss.w * 0.55);
        drawPixelRect(px - 4, py - 2, 8, 4, '#4488ff');
      }
      break;

    case 1: // Toxic Bomber — trailing smoke
      for (var i = 0; i < 5; i++) {
        var sx = -10 - i * 8 - Math.sin(boss.timer * 0.03 + i) * 4;
        var sy = Math.sin(boss.timer * 0.02 + i * 1.5) * 12;
        ctx.globalAlpha = 0.15 - i * 0.02;
        drawPixelCircle(sx, sy, 6 + i * 2, '#ff8844');
        ctx.globalAlpha = 1;
      }
      break;

    case 2: // Compost Titan — crumbling armor
      drawPixelRect(-boss.w * 0.5, -boss.w * 0.3, boss.w, 3, '#444');
      drawPixelRect(-boss.w * 0.5, boss.w * 0.3, boss.w, 3, '#444');
      break;

    case 3: // Rootmaw the Foul — tangling roots
      for (var i = 0; i < 6; i++) {
        var ra = boss.timer * 0.01 + (i / 6) * Math.PI * 2;
        var rx = Math.cos(ra) * (boss.w * 0.8);
        var ry = Math.sin(ra) * (boss.w * 0.8);
        ctx.strokeStyle = '#445522';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(rx * 0.5, ry * 0.5 + 5, rx, ry);
        ctx.stroke();
      }
      break;

    case 4: // Hivequeen Sporella — pulsing egg sacs
      for (var i = 0; i < 3; i++) {
        var ea = (i / 3) * Math.PI * 2 + boss.timer * 0.008;
        var ex = Math.cos(ea) * (boss.w * 0.45);
        var ey = Math.sin(ea) * (boss.w * 0.45);
        var ep = Math.sin(boss.timer * 0.05 + i) * 2;
        drawPixelCircle(ex, ey, 5 + ep, 'rgba(68,255,68,0.4)');
        drawPixelCircle(ex, ey, 3 + ep, '#88ff44');
      }
      break;

    case 5: // Brine Colossus — water jets
      for (var i = 0; i < 2; i++) {
        var jx = -20 - i * 5;
        var jy = -8 + i * 16;
        for (var j = 0; j < 4; j++) {
          ctx.globalAlpha = 0.2 - j * 0.04;
          drawPixelCircle(jx - j * 6, jy + Math.sin(boss.timer * 0.1 + j) * 2, 3, '#44ddff');
        }
        ctx.globalAlpha = 1;
      }
      break;

    case 6: // The Motherspore Nest — energy rings
      ctx.strokeStyle = 'rgba(255,68,255,0.25)';
      ctx.lineWidth = 2;
      for (var i = 0; i < 3; i++) {
        var rr = boss.w * 0.6 + i * 10 + Math.sin(boss.timer * 0.03 + i) * 5;
        ctx.beginPath();
        ctx.arc(0, 0, rr, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
  }

  ctx.restore();
}
