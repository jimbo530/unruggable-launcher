<script>
(function(){
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 384, GH = 256;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b'], labels: { a: 'JUMP', b: 'SHOOT' } });

const GRAVITY = 680;
const PLAYER_SPEED = 95;
const RUN_SPEED = 140;
const JUMP_FORCE = -260;
const GLIDE_GRAVITY = 80;
const TILE = 16;
const MAX_HP = 5;
const MAX_LIVES = 3;
const SCROLL_MARGIN = 120;
const INVULN_TIME = 1.5;

// Ammo types
const AMMO_NORMAL = 0, AMMO_ARROW = 1, AMMO_THUNDER = 2, AMMO_HEAVY = 3;
const AMMO_NAMES = ['NORMAL','ARROW','THUNDER','HEAVY'];
const AMMO_COLORS = ['#ffdd44','#44ffaa','#88ccff','#ff8844'];
const AMMO_SPEEDS = [200, 250, 150, 100];
const AMMO_DAMAGE = [1, 1, 2, 3];

// ============================================================
// STATE
// ============================================================
let state = 'title';
let score = 0;
let highScore = TAS.score.load('darkwing_hi');
let frame = 0;
let lives = MAX_LIVES;
let hp = MAX_HP;
let stageNum = 0;
let scrollX = 0;
let checkpointX = 0;
let checkpointScroll = 0;

// Player
let player = null;
let bullets = [];
let enemies = [];
let crates = [];
let grabPoints = [];
let platforms = [];
let hazards = [];
let boss = null;
let bossActive = false;

// Ammo inventory
let ammo = [Infinity, 0, 0, 0];
let currentAmmo = AMMO_NORMAL;

// Input
const justPressed = {};
const prevKeys = {};

// Stage transition
let stageComplete = false;
let stageTimer = 0;
let deathTimer = 0;
let noHitBonus = true;

// ============================================================
// PLAYER
// ============================================================
function createPlayer(x, y) {
  return {
    x: x, y: y, w: 14, h: 24,
    vx: 0, vy: 0,
    facing: 1,
    grounded: false,
    shielding: false,
    gliding: false,
    grabbing: false,
    grabPoint: null,
    shootCooldown: 0,
    invuln: 0,
    animFrame: 0,
    animTimer: 0,
    running: false,
    capeFrame: 0
  };
}

// ============================================================
// STAGE DEFINITIONS
// ============================================================
const STAGE_DEFS = [
  { name: 'CITY ROOFTOPS', width: 2400, bg: '#0a0818', skyColor: '#0d0520', platformColor: '#2a2040', hookColor: '#887766',
    enemies: [{t:'thug',x:300,y:0},{t:'thug',x:500,y:0},{t:'gunner',x:700,y:0},{t:'thug',x:900,y:0},{t:'gunner',x:1100,y:0},{t:'ninja',x:1300,y:0},{t:'thug',x:1500,y:0},{t:'thug',x:1700,y:0},{t:'gunner',x:1900,y:0},{t:'ninja',x:2100,y:0}],
    crates: [{x:250,y:0,item:'hp'},{x:600,y:0,item:'arrow'},{x:1000,y:0,item:'thunder'},{x:1600,y:0,item:'hp'}],
    boss: null },
  { name: 'THE BRIDGE', width: 2800, bg: '#081020', skyColor: '#0a1428', platformColor: '#334455', hookColor: '#99aaaa',
    enemies: [{t:'thug',x:350,y:0},{t:'bat',x:500,y:80},{t:'gunner',x:650,y:0},{t:'bat',x:800,y:60},{t:'thug',x:1000,y:0},{t:'bat',x:1200,y:70},{t:'gunner',x:1400,y:0},{t:'ninja',x:1700,y:0},{t:'bat',x:1900,y:50},{t:'gunner',x:2100,y:0},{t:'ninja',x:2300,y:0}],
    crates: [{x:400,y:0,item:'arrow'},{x:900,y:0,item:'hp'},{x:1500,y:0,item:'thunder'},{x:2000,y:0,item:'heavy'}],
    boss: {t:'bridge_boss', hp:12} },
  { name: 'THE SEWERS', width: 2600, bg: '#0a1408', skyColor: '#081208', platformColor: '#2a3a22', hookColor: '#556644',
    enemies: [{t:'thug',x:300,y:0},{t:'thug',x:550,y:0},{t:'robot',x:750,y:0},{t:'thug',x:1000,y:0},{t:'gunner',x:1200,y:0},{t:'robot',x:1500,y:0},{t:'thug',x:1800,y:0},{t:'ninja',x:2000,y:0},{t:'robot',x:2200,y:0}],
    crates: [{x:200,y:0,item:'hp'},{x:700,y:0,item:'heavy'},{x:1300,y:0,item:'arrow'},{x:1900,y:0,item:'hp'}],
    boss: null },
  { name: 'DARK FOREST', width: 3000, bg: '#080a10', skyColor: '#050810', platformColor: '#1a2818', hookColor: '#445533',
    enemies: [{t:'bat',x:300,y:60},{t:'thug',x:500,y:0},{t:'ninja',x:700,y:0},{t:'bat',x:900,y:50},{t:'thug',x:1100,y:0},{t:'bomber',x:1300,y:40},{t:'ninja',x:1600,y:0},{t:'bat',x:1900,y:70},{t:'bomber',x:2100,y:30},{t:'ninja',x:2400,y:0},{t:'robot',x:2700,y:0}],
    crates: [{x:400,y:0,item:'thunder'},{x:800,y:0,item:'hp'},{x:1400,y:0,item:'arrow'},{x:2000,y:0,item:'heavy'},{x:2500,y:0,item:'hp'}],
    boss: {t:'forest_boss', hp:16} },
  { name: 'THE FACTORY', width: 3200, bg: '#100808', skyColor: '#0c0606', platformColor: '#3a2828', hookColor: '#886644',
    enemies: [{t:'robot',x:400,y:0},{t:'robot',x:700,y:0},{t:'gunner',x:1000,y:0},{t:'robot',x:1300,y:0},{t:'bomber',x:1500,y:40},{t:'robot',x:1800,y:0},{t:'ninja',x:2100,y:0},{t:'robot',x:2400,y:0},{t:'bomber',x:2600,y:30},{t:'gunner',x:2900,y:0}],
    crates: [{x:300,y:0,item:'heavy'},{x:800,y:0,item:'hp'},{x:1200,y:0,item:'thunder'},{x:1700,y:0,item:'arrow'},{x:2200,y:0,item:'hp'},{x:2800,y:0,item:'heavy'}],
    boss: null },
  { name: "VILLAIN'S TOWER", width: 2800, bg: '#100010', skyColor: '#0a0010', platformColor: '#3a2050', hookColor: '#aa88cc',
    enemies: [{t:'ninja',x:300,y:0},{t:'gunner',x:500,y:0},{t:'ninja',x:800,y:0},{t:'robot',x:1100,y:0},{t:'bomber',x:1300,y:50},{t:'ninja',x:1600,y:0},{t:'robot',x:1900,y:0},{t:'ninja',x:2100,y:0},{t:'gunner',x:2400,y:0}],
    crates: [{x:250,y:0,item:'arrow'},{x:700,y:0,item:'hp'},{x:1200,y:0,item:'thunder'},{x:1800,y:0,item:'hp'},{x:2300,y:0,item:'heavy'}],
    boss: {t:'tower_boss', hp:20} },
  { name: 'ROOFTOP SHOWDOWN', width: 3400, bg: '#0a0520', skyColor: '#08041a', platformColor: '#2a1840', hookColor: '#cc88ff',
    enemies: [{t:'ninja',x:400,y:0},{t:'robot',x:600,y:0},{t:'bomber',x:800,y:40},{t:'ninja',x:1000,y:0},{t:'gunner',x:1200,y:0},{t:'robot',x:1500,y:0},{t:'ninja',x:1800,y:0},{t:'bomber',x:2000,y:30},{t:'robot',x:2200,y:0},{t:'ninja',x:2500,y:0},{t:'gunner',x:2800,y:0},{t:'ninja',x:3000,y:0}],
    crates: [{x:300,y:0,item:'hp'},{x:700,y:0,item:'arrow'},{x:1100,y:0,item:'thunder'},{x:1600,y:0,item:'heavy'},{x:2100,y:0,item:'hp'},{x:2600,y:0,item:'thunder'},{x:3100,y:0,item:'hp'}],
    boss: {t:'final_boss', hp:25} }
];

// ============================================================
// LEVEL GENERATION
// ============================================================
function generateStage(stageIdx) {
  const def = STAGE_DEFS[stageIdx];
  platforms = [];
  grabPoints = [];
  hazards = [];
  enemies = [];
  crates = [];
  bullets = [];
  boss = null;
  bossActive = false;
  stageComplete = false;
  noHitBonus = true;

  const floorY = 210;
  const stageW = def.width;

  // Generate floor platforms with gaps
  let fx = 0;
  while (fx < stageW) {
    const pw = TAS.math.randInt(80, 200);
    platforms.push({ x: fx, y: floorY, w: pw, h: 46 });
    fx += pw;
    // Gap sometimes
    if (Math.random() < 0.2 && fx < stageW - 200) {
      fx += TAS.math.randInt(30, 60);
    }
  }

  // Mid-level platforms
  const midCount = Math.floor(stageW / 200);
  for (let i = 0; i < midCount; i++) {
    const px = TAS.math.randInt(100, stageW - 100);
    const py = TAS.math.randInt(120, 180);
    const pw = TAS.math.randInt(48, 96);
    platforms.push({ x: px, y: py, w: pw, h: 12 });
  }

  // High platforms
  const hiCount = Math.floor(stageW / 350);
  for (let i = 0; i < hiCount; i++) {
    const px = TAS.math.randInt(150, stageW - 150);
    const py = TAS.math.randInt(60, 110);
    const pw = TAS.math.randInt(40, 80);
    platforms.push({ x: px, y: py, w: pw, h: 10 });
  }

  // Grab points (hooks/pipes)
  const hookCount = Math.floor(stageW / 250);
  for (let i = 0; i < hookCount; i++) {
    grabPoints.push({
      x: TAS.math.randInt(100, stageW - 100),
      y: TAS.math.randInt(50, 140),
      w: 20, h: 12
    });
  }

  // Hazards (spikes, electric)
  if (stageIdx >= 2) {
    const hazCount = Math.floor(stageW / 400);
    for (let i = 0; i < hazCount; i++) {
      hazards.push({
        x: TAS.math.randInt(200, stageW - 200),
        y: floorY - 8,
        w: TAS.math.randInt(32, 64),
        h: 8,
        type: stageIdx >= 4 ? 'electric' : 'spikes'
      });
    }
  }

  // Enemies
  for (const ed of def.enemies) {
    const ey = ed.y || floorY - 24;
    enemies.push(createEnemy(ed.t, ed.x, ey));
  }

  // Crates
  for (const cd of def.crates) {
    const plat = platforms.find(p => p.x <= cd.x && p.x + p.w >= cd.x);
    const cy = plat ? plat.y - 16 : floorY - 16;
    crates.push({ x: cd.x, y: cy, w: 16, h: 16, item: cd.item, alive: true });
  }

  // Boss
  if (def.boss) {
    boss = createBoss(def.boss.t, stageW - 100, floorY - 32, def.boss.hp);
  }

  player = createPlayer(32, floorY - 30);
  scrollX = 0;
  checkpointX = 32;
  checkpointScroll = 0;
}

// ============================================================
// ENEMIES
// ============================================================
function createEnemy(type, x, y) {
  const base = { type: type, x: x, y: y, vx: 0, vy: 0, alive: true, hp: 2, facing: -1, animTimer: 0, animFrame: 0, shootTimer: 0, attackTimer: 0, w: 14, h: 22 };
  switch(type) {
    case 'thug': base.hp = 2; base.speed = 40; base.w = 14; base.h = 22; break;
    case 'gunner': base.hp = 2; base.speed = 25; base.w = 14; base.h = 22; base.shootTimer = 2; break;
    case 'ninja': base.hp = 3; base.speed = 70; base.w = 12; base.h = 22; break;
    case 'robot': base.hp = 4; base.speed = 30; base.w = 16; base.h = 24; base.shootTimer = 1.5; break;
    case 'bomber': base.hp = 2; base.speed = 35; base.w = 14; base.h = 20; base.flyY = y || 60; base.y = y || 60; break;
    case 'bat': base.hp = 1; base.speed = 60; base.w = 12; base.h = 10; base.flyY = y || 70; base.y = y || 70; break;
  }
  return base;
}

function createBoss(type, x, y, bossHp) {
  return {
    type: type, x: x, y: y, w: 24, h: 32, vx: 0, vy: 0,
    hp: bossHp, maxHp: bossHp, alive: true, facing: -1,
    phase: 0, timer: 0, attackTimer: 2, attackType: 0,
    animFrame: 0, animTimer: 0, invuln: 0, flashTimer: 0
  };
}

// ============================================================
// SOUNDS
// ============================================================
function sfxShoot(ammoType) {
  TAS.audio.ensureAudio();
  switch(ammoType) {
    case AMMO_NORMAL: TAS.audio.playTone(800, 0.08, 'square', 0.06, 400); break;
    case AMMO_ARROW: TAS.audio.playTone(1200, 0.1, 'sawtooth', 0.05, 600); break;
    case AMMO_THUNDER: TAS.audio.playTone(200, 0.15, 'sawtooth', 0.07, 800); break;
    case AMMO_HEAVY: TAS.audio.playTone(150, 0.2, 'square', 0.08, 80); break;
  }
}
function sfxCapeBlock() { TAS.audio.ensureAudio(); TAS.audio.playNoise(0.1, 0.06, 2000); TAS.audio.playTone(1500, 0.08, 'sine', 0.05); }
function sfxGrab() { TAS.audio.ensureAudio(); TAS.audio.playTone(400, 0.06, 'square', 0.05, 600); }
function sfxGlide() { TAS.audio.ensureAudio(); TAS.audio.playNoise(0.15, 0.02, 800); }
function sfxHit() { TAS.audio.ensureAudio(); TAS.audio.playNoise(0.08, 0.07, 1200); TAS.audio.playTone(200, 0.1, 'square', 0.06, 80); }
function sfxEnemyHit() { TAS.audio.ensureAudio(); TAS.audio.playTone(300, 0.06, 'square', 0.06, 150); }
function sfxEnemyDie() { TAS.audio.ensureAudio(); TAS.audio.playTone(400, 0.12, 'sawtooth', 0.06, 100); TAS.audio.playNoise(0.1, 0.04); }
function sfxPickup() { TAS.audio.ensureAudio(); TAS.audio.playTone(600, 0.06, 'sine', 0.06); TAS.audio.playTone(900, 0.06, 'sine', 0.05); }
function sfxBossEntry() { TAS.audio.ensureAudio(); TAS.audio.playMelody([[200,0.2,'sawtooth',0.08],[150,0.2,'sawtooth',0.08],[100,0.3,'sawtooth',0.1]], 250); }
function sfxDeath() { TAS.audio.ensureAudio(); TAS.audio.playMelody([[400,0.15,'square',0.07],[300,0.15,'square',0.07],[200,0.2,'square',0.08],[100,0.3,'square',0.1]], 180); }
function sfxStageClear() { TAS.audio.ensureAudio(); TAS.audio.playMelody([[500,0.1,'square',0.06],[600,0.1,'square',0.06],[700,0.1,'square',0.06],[900,0.2,'square',0.08]], 130); }

// ============================================================
// GAME START
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES;
  hp = MAX_HP;
  stageNum = 0;
  ammo = [Infinity, 0, 0, 0];
  currentAmmo = AMMO_NORMAL;
  TAS.particles.clear();
  generateStage(0);
}

function respawn() {
  player = createPlayer(checkpointX, 180);
  hp = MAX_HP;
  player.invuln = INVULN_TIME;
  scrollX = checkpointScroll;
}

function nextStage() {
  stageNum++;
  if (stageNum >= STAGE_DEFS.length) {
    // Game complete
    if (score > highScore) { highScore = score; TAS.score.save('darkwing_hi', score); }
    state = 'victory';
    return;
  }
  generateStage(stageNum);
}

// ============================================================
// INPUT HELPERS
// ============================================================
function updateInput() {
  const k = TAS.input.keys;
  const t = TAS.input.touch;
  justPressed.jump = (k['Space'] || k[' '] || k['KeyZ'] || t.a) && !prevKeys.jump;
  justPressed.shoot = (k['KeyX'] || k['KeyC'] || k['Control'] || t.b) && !prevKeys.shoot;
  justPressed.switchAmmo = (k['KeyS'] || k['ShiftLeft'] || k['ShiftRight']) && !prevKeys.switchAmmo;
  prevKeys.jump = !!(k['Space'] || k[' '] || k['KeyZ'] || t.a);
  prevKeys.shoot = !!(k['KeyX'] || k['KeyC'] || k['Control'] || t.b);
  prevKeys.switchAmmo = !!(k['KeyS'] || k['ShiftLeft'] || k['ShiftRight']);
}

function inputLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function inputUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function inputDown() { return TAS.input.keys['ArrowDown'] || TAS.input.touch.down; }
function inputJumpHeld() { return TAS.input.keys['Space'] || TAS.input.keys[' '] || TAS.input.keys['KeyZ'] || TAS.input.touch.a; }

// ============================================================
// COLLISION & PHYSICS
// ============================================================
function onPlatform(ent) {
  for (const p of platforms) {
    if (ent.x + ent.w > p.x && ent.x < p.x + p.w &&
        ent.y + ent.h >= p.y && ent.y + ent.h <= p.y + 12 &&
        ent.vy >= 0) {
      return p;
    }
  }
  return null;
}

function resolveGravity(ent, dt, grav) {
  ent.vy += (grav || GRAVITY) * dt;
  ent.y += ent.vy * dt;
  ent.x += ent.vx * dt;

  const plat = onPlatform(ent);
  if (plat) {
    ent.y = plat.y - ent.h;
    ent.vy = 0;
    ent.grounded = true;
  } else {
    ent.grounded = false;
  }

  // Death pit
  if (ent.y > GH + 50) return true;
  return false;
}

// ============================================================
// UPDATE PLAYER
// ============================================================
function updatePlayer(dt) {
  const p = player;
  if (!p) return;

  p.invuln -= dt;
  p.shootCooldown -= dt;
  p.animTimer += dt;
  p.capeFrame += dt;

  // Shield (hold up while grounded or in air, can't move)
  p.shielding = inputUp() && !p.grabbing;
  if (p.shielding) {
    p.vx = 0;
    p.gliding = false;
  }

  // Grabbed state
  if (p.grabbing) {
    p.vx = 0;
    p.vy = 0;
    // Can shoot while grabbing
    if (justPressed.shoot && p.shootCooldown <= 0) {
      shootBullet(p);
    }
    // Drop
    if (inputDown()) {
      p.grabbing = false;
      p.grabPoint = null;
    }
    // Jump off
    if (justPressed.jump) {
      p.grabbing = false;
      p.grabPoint = null;
      p.vy = JUMP_FORCE * 0.8;
    }
    return;
  }

  // Movement
  if (!p.shielding) {
    if (inputLeft()) { p.vx = -PLAYER_SPEED; p.facing = -1; }
    else if (inputRight()) { p.vx = PLAYER_SPEED; p.facing = 1; }
    else { p.vx = 0; }
  }

  // Jump
  if (justPressed.jump && p.grounded) {
    p.vy = JUMP_FORCE;
    p.grounded = false;
  }

  // Variable jump height
  if (!inputJumpHeld() && p.vy < 0) {
    p.vy *= 0.5;
  }

  // Cape glide
  p.gliding = false;
  if (!p.grounded && inputJumpHeld() && p.vy > 0 && !p.shielding) {
    p.gliding = true;
  }

  // Physics
  const grav = p.gliding ? GLIDE_GRAVITY : GRAVITY;
  if (p.gliding && p.vy > 40) p.vy = 40;

  const fell = resolveGravity(p, dt, grav);
  if (fell) {
    playerDeath();
    return;
  }

  // Check grab points
  if (justPressed.jump && !p.grounded) {
    for (const gp of grabPoints) {
      if (TAS.hit.rectOverlap(p.x - 10, p.y - 10, p.w + 20, p.h + 20, gp.x, gp.y, gp.w, gp.h)) {
        p.grabbing = true;
        p.grabPoint = gp;
        p.x = gp.x + gp.w / 2 - p.w / 2;
        p.y = gp.y + gp.h;
        p.vy = 0;
        p.vx = 0;
        sfxGrab();
        break;
      }
    }
  }

  // Shoot
  if (justPressed.shoot && p.shootCooldown <= 0 && !p.shielding) {
    shootBullet(p);
  }

  // Switch ammo
  if (justPressed.switchAmmo) {
    for (let i = 1; i <= 3; i++) {
      const next = (currentAmmo + i) % 4;
      if (ammo[next] > 0 || next === AMMO_NORMAL) {
        currentAmmo = next;
        break;
      }
    }
  }

  // Hazards
  for (const h of hazards) {
    if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, h.x, h.y, h.w, h.h)) {
      if (!p.shielding) hurtPlayer(1);
    }
  }

  // Scroll camera
  const screenX = p.x - scrollX;
  if (screenX > GW - SCROLL_MARGIN) scrollX = p.x - (GW - SCROLL_MARGIN);
  if (screenX < SCROLL_MARGIN) scrollX = p.x - SCROLL_MARGIN;
  scrollX = TAS.math.clamp(scrollX, 0, STAGE_DEFS[stageNum].width - GW);
}

function shootBullet(p) {
  if (currentAmmo !== AMMO_NORMAL && ammo[currentAmmo] <= 0) {
    currentAmmo = AMMO_NORMAL;
  }
  const bx = p.x + (p.facing > 0 ? p.w : 0);
  const by = p.y + p.h / 2 - 2;
  const speed = AMMO_SPEEDS[currentAmmo] * p.facing;
  bullets.push({
    x: bx, y: by, w: currentAmmo === AMMO_HEAVY ? 10 : 6, h: currentAmmo === AMMO_HEAVY ? 6 : 4,
    vx: speed, vy: currentAmmo === AMMO_THUNDER ? -30 : 0,
    type: currentAmmo, damage: AMMO_DAMAGE[currentAmmo],
    pierce: currentAmmo === AMMO_ARROW ? 3 : 1,
    life: 2
  });
  if (currentAmmo !== AMMO_NORMAL) ammo[currentAmmo]--;
  p.shootCooldown = 0.2;
  sfxShoot(currentAmmo);
}

function hurtPlayer(dmg) {
  if (player.invuln > 0) return;
  hp -= dmg;
  player.invuln = INVULN_TIME;
  noHitBonus = false;
  TAS.fx.shake(4, 0.85);
  TAS.fx.flash('#ff0000', 0.2);
  sfxHit();
  if (hp <= 0) playerDeath();
}

function playerDeath() {
  lives--;
  sfxDeath();
  TAS.fx.shake(8, 0.9);
  TAS.particles.spawn(player.x, player.y, '#ff4444', 15, 3, { gravity: 2 });
  if (lives <= 0) {
    deathTimer = 2;
    state = 'dying';
  } else {
    deathTimer = 1;
    state = 'dying';
  }
}

// ============================================================
// UPDATE ENEMIES
// ============================================================
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.alive) continue;

    // Only update if on screen (plus margin)
    if (e.x < scrollX - 100 || e.x > scrollX + GW + 100) continue;

    e.animTimer += dt;
    const dx = player.x - e.x;
    const dist = Math.abs(dx);
    e.facing = dx > 0 ? 1 : -1;

    switch(e.type) {
      case 'thug':
        if (dist < 200 && dist > 20) {
          e.vx = e.speed * e.facing;
        } else if (dist <= 20) {
          e.vx = 0;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 5, e.y, e.w + 10, e.h)) {
              if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 5, 2); }
              else hurtPlayer(1);
            }
            e.attackTimer = 1.2;
          }
        } else { e.vx = 0; }
        resolveGravity(e, dt);
        break;

      case 'gunner':
        e.vx = 0;
        if (dist < 250) {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            bullets.push({ x: e.x + e.w/2, y: e.y + e.h/2, w: 5, h: 3, vx: 120 * e.facing, vy: 0, type: -1, damage: 1, pierce: 1, life: 3, enemy: true });
            e.shootTimer = 2;
            TAS.audio.playTone(600, 0.05, 'square', 0.03, 300);
          }
        }
        resolveGravity(e, dt);
        break;

      case 'ninja':
        if (dist < 180 && dist > 30) {
          e.vx = e.speed * e.facing;
          // Jump occasionally
          if (e.grounded && Math.random() < 0.01) e.vy = -200;
        } else if (dist <= 30) {
          e.vx = 0;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 8, e.y, e.w + 16, e.h)) {
              if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 5, 2); }
              else hurtPlayer(1);
            }
            e.attackTimer = 0.8;
          }
        } else { e.vx = 0; }
        resolveGravity(e, dt);
        break;

      case 'robot':
        if (dist < 200) {
          e.vx = e.speed * e.facing;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            bullets.push({ x: e.x + e.w/2, y: e.y + 4, w: 6, h: 4, vx: 100 * e.facing, vy: 0, type: -1, damage: 1, pierce: 1, life: 3, enemy: true });
            e.shootTimer = 2.5;
            TAS.audio.playTone(300, 0.06, 'sawtooth', 0.04, 500);
          }
        } else { e.vx = 0; }
        resolveGravity(e, dt);
        break;

      case 'bomber':
        // Flies overhead, drops bombs
        e.y = e.flyY + Math.sin(e.animTimer * 2) * 15;
        if (dist < 150) {
          e.x += e.speed * e.facing * dt * 0.3;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            bullets.push({ x: e.x + e.w/2, y: e.y + e.h, w: 6, h: 6, vx: 0, vy: 80, type: -2, damage: 1, pierce: 1, life: 3, enemy: true });
            e.attackTimer = 2;
          }
        }
        break;

      case 'bat':
        // Swooping pattern
        e.y = e.flyY + Math.sin(e.animTimer * 3) * 25;
        if (dist < 160) {
          e.x += e.speed * e.facing * dt;
          if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 3, 2); }
            else hurtPlayer(1);
            e.alive = false;
          }
        }
        break;
    }
  }
}

// ============================================================
// UPDATE BOSS
// ============================================================
function updateBoss(dt) {
  if (!boss || !boss.alive) return;

  // Activate boss when player is near
  if (!bossActive && player.x > STAGE_DEFS[stageNum].width - 250) {
    bossActive = true;
    sfxBossEntry();
    // Set checkpoint
    checkpointX = player.x - 60;
    checkpointScroll = scrollX;
  }
  if (!bossActive) return;

  boss.timer += dt;
  boss.animTimer += dt;
  boss.invuln -= dt;

  const dx = player.x - boss.x;
  boss.facing = dx > 0 ? 1 : -1;

  // Boss attack patterns
  boss.attackTimer -= dt;
  if (boss.attackTimer <= 0) {
    boss.attackType = (boss.attackType + 1) % 3;
    switch(boss.attackType) {
      case 0: // Charge
        boss.vx = 180 * boss.facing;
        setTimeout(function(){ if(boss) boss.vx = 0; }, 600);
        break;
      case 1: // Shoot spread
        for (let a = -1; a <= 1; a++) {
          bullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h/2, w: 6, h: 4, vx: 130 * boss.facing, vy: a * 40, type: -1, damage: 1, pierce: 1, life: 2.5, enemy: true });
        }
        TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 400);
        break;
      case 2: // Jump slam
        boss.vy = -250;
        boss.vx = 60 * boss.facing;
        break;
    }
    boss.attackTimer = 1.5 + Math.random();
  }

  // Physics
  resolveGravity(boss, dt);
  boss.x = TAS.math.clamp(boss.x, scrollX + 20, scrollX + GW - boss.w - 20);

  // Contact damage
  if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
    if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 8, 3); }
    else hurtPlayer(1);
  }
}

// ============================================================
// UPDATE BULLETS
// ============================================================
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    // Thunder ammo arcs
    if (b.type === AMMO_THUNDER && !b.enemy) {
      b.vy += 200 * dt;
    }
    // Bombs fall
    if (b.type === -2) {
      b.vy += 150 * dt;
    }

    if (b.life <= 0 || b.x < scrollX - 50 || b.x > scrollX + GW + 50 || b.y > GH + 20) {
      bullets.splice(i, 1);
      continue;
    }

    if (b.enemy) {
      // Hit player
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
        if (player.shielding) {
          sfxCapeBlock();
          TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 6, 2);
          bullets.splice(i, 1);
        } else {
          hurtPlayer(b.damage);
          bullets.splice(i, 1);
        }
      }
    } else {
      // Hit enemies
      let hitSomething = false;
      for (const e of enemies) {
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
          e.hp -= b.damage;
          sfxEnemyHit();
          TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ffaa44', 4, 2);
          if (e.hp <= 0) {
            e.alive = false;
            score += 100;
            sfxEnemyDie();
            TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ff6644', 10, 3, { gravity: 1.5 });
          }
          b.pierce--;
          if (b.pierce <= 0) hitSomething = true;
          break;
        }
      }
      // Hit boss
      if (boss && boss.alive && boss.invuln <= 0) {
        if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
          boss.hp -= b.damage;
          boss.invuln = 0.3;
          boss.flashTimer = 0.15;
          sfxEnemyHit();
          TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffcc44', 6, 2);
          TAS.fx.shake(2, 0.8);
          if (boss.hp <= 0) {
            boss.alive = false;
            score += 1000;
            sfxStageClear();
            TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffdd44', 25, 4, { gravity: 1 });
            TAS.fx.shake(8, 0.9);
            stageComplete = true;
            stageTimer = 3;
          }
          b.pierce--;
          if (b.pierce <= 0) hitSomething = true;
        }
      }
      if (hitSomething) bullets.splice(i, 1);
    }
  }
}

// ============================================================
// UPDATE CRATES
// ============================================================
function updateCrates() {
  for (const c of crates) {
    if (!c.alive) continue;
    // Check player bullet hit
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      if (b.enemy) continue;
      if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, c.x, c.y, c.w, c.h)) {
        c.alive = false;
        bullets.splice(i, 1);
        sfxPickup();
        TAS.particles.spawn(c.x + 8, c.y + 8, '#ffdd44', 8, 2);
        applyItem(c.item);
        break;
      }
    }
    // Player touch
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, c.x, c.y, c.w, c.h)) {
      c.alive = false;
      sfxPickup();
      TAS.particles.spawn(c.x + 8, c.y + 8, '#ffdd44', 8, 2);
      applyItem(c.item);
    }
  }
}

function applyItem(item) {
  switch(item) {
    case 'hp': hp = Math.min(MAX_HP, hp + 2); break;
    case 'arrow': ammo[AMMO_ARROW] += 10; break;
    case 'thunder': ammo[AMMO_THUNDER] += 8; break;
    case 'heavy': ammo[AMMO_HEAVY] += 5; break;
  }
  score += 50;
}

// ============================================================
// STAGE COMPLETION CHECK
// ============================================================
function checkStageEnd() {
  if (stageComplete) return;
  const def = STAGE_DEFS[stageNum];
  // If no boss, complete when reaching end
  if (!def.boss && player.x > def.width - 60) {
    stageComplete = true;
    stageTimer = 2;
    sfxStageClear();
    // Time bonus
    score += 500;
    if (noHitBonus) score += 1000;
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  updateInput();
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (justPressed.jump || justPressed.shoot) startGame();
    return;
  }

  if (state === 'victory') {
    if (justPressed.jump || justPressed.shoot) state = 'title';
    return;
  }

  if (state === 'gameOver') {
    if (justPressed.jump || justPressed.shoot) state = 'title';
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('darkwing_hi', score); }
        state = 'gameOver';
      } else {
        state = 'playing';
        respawn();
      }
    }
    return;
  }

  if (state === 'stageIntro') {
    stageTimer -= dt;
    if (stageTimer <= 0) state = 'playing';
    return;
  }

  if (state === 'playing') {
    if (stageComplete) {
      stageTimer -= dt;
      if (stageTimer <= 0) {
        nextStage();
        if (state === 'playing') {
          state = 'stageIntro';
          stageTimer = 2;
        }
      }
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateBullets(dt);
    updateCrates();
    checkStageEnd();
  }
}

// ============================================================
// DRAWING
// ============================================================
function drawBackground() {
  const def = STAGE_DEFS[stageNum];

  // Sky gradient
  ctx.fillStyle = def.skyColor;
  ctx.fillRect(0, 0, GW, GH);

  // Stars/city lights
  const seed = stageNum * 1000;
  for (let i = 0; i < 40; i++) {
    const sx = ((seed + i * 137) % (GW + 200)) - scrollX * 0.1 % (GW + 200);
    const sy = ((seed + i * 97) % 120);
    const bright = 60 + (i * 17 % 80);
    ctx.fillStyle = 'rgba(' + bright + ',' + bright + ',' + (bright + 40) + ',0.6)';
    ctx.fillRect(((sx % GW) + GW) % GW, sy, 1, 1);
  }

  // Background buildings/trees (parallax)
  ctx.fillStyle = def.bg;
  const parX = scrollX * 0.3;
  for (let i = 0; i < 12; i++) {
    const bx = i * 80 - (parX % 80);
    const bh = 40 + (i * 37 % 60);
    ctx.fillRect(bx, GH - 80 - bh, 50 + (i * 23 % 30), bh + 80);
  }

  // Neon signs (city stages)
  if (stageNum === 0 || stageNum === 6) {
    for (let i = 0; i < 5; i++) {
      const nx = i * 180 + 50 - scrollX * 0.4;
      if (nx > -60 && nx < GW + 60) {
        const flicker = Math.sin(frame * 0.1 + i * 2) > -0.3 ? 1 : 0.3;
        ctx.globalAlpha = 0.4 * flicker;
        ctx.fillStyle = ['#ff44aa','#44ffaa','#ffaa44','#44aaff','#aa44ff'][i % 5];
        ctx.fillRect(nx, 30 + i * 15, 40, 8);
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawPlatforms() {
  const def = STAGE_DEFS[stageNum];
  for (const p of platforms) {
    const sx = p.x - scrollX;
    if (sx + p.w < -10 || sx > GW + 10) continue;
    ctx.fillStyle = def.platformColor;
    ctx.fillRect(sx, p.y, p.w, p.h);
    // Top edge
    ctx.fillStyle = '#ffffff18';
    ctx.fillRect(sx, p.y, p.w, 2);
    // Detail lines
    ctx.fillStyle = '#00000030';
    for (let lx = 0; lx < p.w; lx += 16) {
      ctx.fillRect(sx + lx, p.y + 4, 1, p.h - 4);
    }
  }
}

function drawGrabPoints() {
  const def = STAGE_DEFS[stageNum];
  for (const gp of grabPoints) {
    const sx = gp.x - scrollX;
    if (sx + gp.w < -10 || sx > GW + 10) continue;
    // Pipe/hook
    ctx.fillStyle = def.hookColor;
    ctx.fillRect(sx, gp.y, gp.w, gp.h);
    // Highlight
    ctx.fillStyle = '#ffffff30';
    ctx.fillRect(sx + 2, gp.y, gp.w - 4, 3);
    // Ring/hook indicator
    const pulse = Math.sin(frame * 0.08) * 0.2 + 0.5;
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#ffdd44';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - 2, gp.y - 2, gp.w + 4, gp.h + 4);
    ctx.globalAlpha = 1;
  }
}

function drawHazards() {
  for (const h of hazards) {
    const sx = h.x - scrollX;
    if (sx + h.w < -10 || sx > GW + 10) continue;
    if (h.type === 'spikes') {
      ctx.fillStyle = '#aa4444';
      for (let x = 0; x < h.w; x += 6) {
        ctx.beginPath();
        ctx.moveTo(sx + x, h.y + h.h);
        ctx.lineTo(sx + x + 3, h.y);
        ctx.lineTo(sx + x + 6, h.y + h.h);
        ctx.fill();
      }
    } else {
      // Electric barrier
      const flicker = Math.sin(frame * 0.3) > 0;
      ctx.fillStyle = flicker ? '#44ccff' : '#2288aa';
      ctx.fillRect(sx, h.y, h.w, h.h);
      if (flicker) {
        ctx.fillStyle = '#88eeff40';
        ctx.fillRect(sx - 2, h.y - 4, h.w + 4, h.h + 8);
      }
    }
  }
}

function drawPlayer() {
  if (!player) return;
  const p = player;
  const sx = p.x - scrollX;

  // Invulnerability blink
  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(sx + p.w / 2, p.y + p.h / 2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // Cape
  if (p.shielding) {
    // Cape wrapped around (shield)
    ctx.fillStyle = '#6633aa';
    ctx.fillRect(-9, -12, 18, 24);
    ctx.fillStyle = '#8844cc';
    ctx.fillRect(-8, -10, 16, 20);
    // Shield sparkle
    const spark = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = spark;
    ctx.fillStyle = '#bb88ff';
    ctx.fillRect(-6, -8, 12, 16);
    ctx.globalAlpha = 1;
  } else if (p.gliding) {
    // Cape spread wide (gliding)
    ctx.fillStyle = '#6633aa';
    ctx.beginPath();
    ctx.moveTo(-2, -8);
    ctx.lineTo(-18, 6 + Math.sin(p.capeFrame * 8) * 3);
    ctx.lineTo(-14, 12);
    ctx.lineTo(0, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, -8);
    ctx.lineTo(14, 6 + Math.sin(p.capeFrame * 8 + 1) * 3);
    ctx.lineTo(10, 12);
    ctx.lineTo(0, 4);
    ctx.fill();
    // Body
    drawPlayerBody(p);
  } else if (p.grabbing) {
    // Hanging
    ctx.fillStyle = '#6633aa';
    ctx.fillRect(-3, -14, 6, 4);
    drawPlayerBody(p);
  } else {
    // Normal cape billowing
    const cBob = Math.sin(p.capeFrame * 5) * 2;
    ctx.fillStyle = '#6633aa';
    ctx.beginPath();
    ctx.moveTo(-2, -6);
    ctx.lineTo(-10 + cBob, 8);
    ctx.lineTo(-6, 12);
    ctx.lineTo(-1, 2);
    ctx.fill();
    drawPlayerBody(p);
  }

  ctx.restore();
}

function drawPlayerBody(p) {
  // Body
  ctx.fillStyle = '#443366';
  ctx.fillRect(-5, -8, 10, 16);
  // Head
  ctx.fillStyle = '#ddccaa';
  ctx.fillRect(-4, -12, 8, 7);
  // Fedora
  ctx.fillStyle = '#332244';
  ctx.fillRect(-6, -14, 12, 4);
  ctx.fillRect(-4, -15, 8, 2);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -11, 3, 2);
  // Legs
  const legAnim = p.grounded && p.vx !== 0 ? Math.sin(p.animTimer * 10) * 2 : 0;
  ctx.fillStyle = '#332244';
  ctx.fillRect(-4, 8, 3, 6 + legAnim);
  ctx.fillRect(1, 8, 3, 6 - legAnim);
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const sx = e.x - scrollX;
    if (sx + e.w < -20 || sx > GW + 20) continue;

    ctx.save();
    ctx.translate(sx + e.w / 2, e.y + e.h / 2);
    if (e.facing < 0) ctx.scale(-1, 1);

    switch(e.type) {
      case 'thug':
        ctx.fillStyle = '#884422';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#aa6633';
        ctx.fillRect(-5, -12, 10, 6);
        ctx.fillStyle = '#332211';
        ctx.fillRect(-5, 8, 4, 5);
        ctx.fillRect(1, 8, 4, 5);
        break;
      case 'gunner':
        ctx.fillStyle = '#445566';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#667788';
        ctx.fillRect(-4, -12, 8, 6);
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(4, -2, 6, 2);
        ctx.fillStyle = '#334455';
        ctx.fillRect(-4, 8, 4, 5);
        ctx.fillRect(1, 8, 4, 5);
        break;
      case 'ninja':
        ctx.fillStyle = '#222222';
        ctx.fillRect(-5, -8, 10, 16);
        ctx.fillStyle = '#333333';
        ctx.fillRect(-4, -12, 8, 6);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-1, -10, 5, 2);
        ctx.fillStyle = '#111111';
        ctx.fillRect(-4, 8, 3, 5);
        ctx.fillRect(1, 8, 3, 5);
        break;
      case 'robot':
        ctx.fillStyle = '#556688';
        ctx.fillRect(-7, -10, 14, 20);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-3, -8, 3, 3);
        ctx.fillRect(1, -8, 3, 3);
        ctx.fillStyle = '#445577';
        ctx.fillRect(-6, 10, 5, 5);
        ctx.fillRect(1, 10, 5, 5);
        ctx.fillStyle = '#aabbcc';
        ctx.fillRect(5, -4, 4, 3);
        break;
      case 'bomber':
        ctx.fillStyle = '#664422';
        ctx.fillRect(-6, -8, 12, 14);
        ctx.fillStyle = '#553311';
        ctx.fillRect(-8, -4, 4, 6);
        ctx.fillRect(4, -4, 4, 6);
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(-4, -11, 8, 5);
        break;
      case 'bat':
        ctx.fillStyle = '#443355';
        ctx.fillRect(-3, -3, 6, 6);
        const wing = Math.sin(e.animTimer * 10) * 4;
        ctx.fillStyle = '#332244';
        ctx.fillRect(-8, -2 + wing, 5, 4);
        ctx.fillRect(3, -2 - wing, 5, 4);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-1, -2, 1, 1);
        ctx.fillRect(1, -2, 1, 1);
        break;
    }
    ctx.restore();
  }
}

function drawBoss() {
  if (!boss || !boss.alive || !bossActive) return;
  const sx = boss.x - scrollX;

  // Flash on hit
  if (boss.flashTimer > 0) {
    boss.flashTimer -= 1/60;
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.5;
  }

  ctx.save();
  ctx.translate(sx + boss.w / 2, boss.y + boss.h / 2);
  if (boss.facing < 0) ctx.scale(-1, 1);

  // Boss body (large menacing figure)
  ctx.fillStyle = '#660022';
  ctx.fillRect(-12, -14, 24, 28);
  ctx.fillStyle = '#880033';
  ctx.fillRect(-10, -18, 20, 8);
  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(-6, -16, 4, 3);
  ctx.fillRect(2, -16, 4, 3);
  // Arms
  ctx.fillStyle = '#550020';
  ctx.fillRect(-16, -8, 6, 14);
  ctx.fillRect(10, -8, 6, 14);
  // Legs
  ctx.fillStyle = '#440018';
  ctx.fillRect(-8, 14, 7, 6);
  ctx.fillRect(2, 14, 7, 6);
  // Cape/cloak
  ctx.fillStyle = '#330015';
  ctx.beginPath();
  ctx.moveTo(-10, -10);
  ctx.lineTo(-16, 14 + Math.sin(frame * 0.05) * 3);
  ctx.lineTo(-8, 10);
  ctx.fill();

  ctx.restore();
  ctx.globalAlpha = 1;

  // Boss HP bar
  const barW = 80;
  const barX = GW / 2 - barW / 2;
  ctx.fillStyle = '#333';
  ctx.fillRect(barX, GH - 20, barW, 8);
  ctx.fillStyle = '#ff2244';
  ctx.fillRect(barX, GH - 20, barW * (boss.hp / boss.maxHp), 8);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, GH - 20, barW, 8);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', GW / 2, GH - 22);
}

function drawBullets() {
  for (const b of bullets) {
    const sx = b.x - scrollX;
    if (sx < -10 || sx > GW + 10) continue;

    if (b.enemy) {
      if (b.type === -2) {
        // Bomb
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.arc(sx, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(sx - 1, b.y - 6, 2, 3);
      } else {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(sx, b.y, b.w, b.h);
      }
    } else {
      ctx.fillStyle = AMMO_COLORS[b.type];
      if (b.type === AMMO_HEAVY) {
        ctx.beginPath();
        ctx.arc(sx + b.w/2, b.y + b.h/2, 5, 0, Math.PI * 2);
        ctx.fill();
      } else if (b.type === AMMO_THUNDER) {
        ctx.fillRect(sx, b.y, b.w, b.h);
        // Lightning trail
        ctx.globalAlpha = 0.5;
        ctx.fillRect(sx - 3, b.y + TAS.math.randInt(-3, 3), 3, 2);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillRect(sx, b.y, b.w, b.h);
      }
      // Glow
      ctx.globalAlpha = 0.3;
      ctx.fillRect(sx - 1, b.y - 1, b.w + 2, b.h + 2);
      ctx.globalAlpha = 1;
    }
  }
}

function drawCrates() {
  for (const c of crates) {
    if (!c.alive) continue;
    const sx = c.x - scrollX;
    if (sx + c.w < -10 || sx > GW + 10) continue;
    ctx.fillStyle = '#886633';
    ctx.fillRect(sx, c.y, c.w, c.h);
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(sx + 2, c.y + 2, c.w - 4, c.h - 4);
    // Item indicator
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(sx + 5, c.y + 5, 6, 6);
    // Hover glow
    const glow = Math.sin(frame * 0.06) * 0.15 + 0.2;
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(sx - 2, c.y - 2, c.w + 4, c.h + 4);
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // Top bar
  TAS.ui.drawHUD(score, stageNum + 1, lives, GW, { scoreLabel: 'SCORE', lifeColor: '#8844cc' });

  // HP bar
  const hpBarX = 6;
  const hpBarY = 32;
  ctx.fillStyle = '#222';
  ctx.fillRect(hpBarX, hpBarY, 52, 8);
  const hpPct = hp / MAX_HP;
  const hpColor = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillStyle = hpColor;
  ctx.fillRect(hpBarX + 1, hpBarY + 1, 50 * hpPct, 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, hpBarY, 52, 8);

  // Ammo indicator
  ctx.fillStyle = AMMO_COLORS[currentAmmo];
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  const ammoText = AMMO_NAMES[currentAmmo] + (currentAmmo === AMMO_NORMAL ? '' : ' x' + ammo[currentAmmo]);
  ctx.fillText(ammoText, 6, 52);

  // Stage name (during stage intro or first 2 seconds)
  if (state === 'stageIntro') {
    ctx.fillStyle = '#000000aa';
    ctx.fillRect(0, GH / 2 - 25, GW, 50);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE ' + (stageNum + 1), GW / 2, GH / 2 - 6);
    ctx.fillStyle = '#bb88ff';
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_DEFS[stageNum].name, GW / 2, GH / 2 + 12);
  }
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#0a0818';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stageNum + 1) + ' - ' + STAGE_DEFS[stageNum].name });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // Game rendering
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawPlatforms();
  drawGrabPoints();
  drawHazards();
  drawCrates();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawBullets();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  // Dark city background
  ctx.fillStyle = '#0a0520';
  ctx.fillRect(0, 0, GW, GH);

  // City silhouette
  for (let i = 0; i < 15; i++) {
    const bx = i * 30 - 10;
    const bh = 50 + (i * 37 % 80);
    ctx.fillStyle = '#1a1030';
    ctx.fillRect(bx, GH - bh, 28, bh);
    // Windows
    ctx.fillStyle = '#ffdd4430';
    for (let wy = GH - bh + 8; wy < GH - 8; wy += 12) {
      if (Math.random() < 0.4) ctx.fillRect(bx + 4, wy, 4, 4);
      if (Math.random() < 0.4) ctx.fillRect(bx + 14, wy, 4, 4);
    }
  }

  // Moon
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.arc(300, 50, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0520';
  ctx.beginPath();
  ctx.arc(308, 45, 22, 0, Math.PI * 2);
  ctx.fill();

  // Character silhouette
  const sy = 130 + Math.sin(frame * 0.03) * 5;
  ctx.fillStyle = '#1a0830';
  ctx.fillRect(180, sy, 24, 40);
  // Cape
  ctx.fillStyle = '#2a1050';
  ctx.beginPath();
  ctx.moveTo(180, sy + 5);
  ctx.lineTo(165, sy + 35 + Math.sin(frame * 0.05) * 5);
  ctx.lineTo(178, sy + 30);
  ctx.fill();
  // Fedora
  ctx.fillStyle = '#1a0830';
  ctx.fillRect(175, sy - 8, 28, 10);
  ctx.fillRect(180, sy - 12, 18, 6);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(190, sy + 2, 4, 3);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('DARK WING', GW / 2 + 2, 50 + 2);
  ctx.fillStyle = '#8844cc';
  ctx.fillText('DARK WING', GW / 2, 50);

  // Subtitle
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 68);

  // Controls
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS: Move | Z/SPACE: Jump | X: Shoot | UP: Shield', GW / 2, GH - 45);
  ctx.fillText('HOLD JUMP in air to Glide | JUMP near hooks to Grab', GW / 2, GH - 33);
  ctx.fillText('S/SHIFT: Switch Ammo', GW / 2, GH - 21);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 85);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS JUMP OR SHOOT TO START', GW / 2, GH - 6);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0520';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#bb88ff';
  ctx.font = '12px monospace';
  ctx.fillText('The city is safe once more.', GW / 2, 95);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 135);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 155);
    ctx.globalAlpha = 1;
  }

  // Character celebration
  const bobY = 175 + Math.sin(frame * 0.04) * 4;
  ctx.fillStyle = '#6633aa';
  ctx.fillRect(GW/2 - 12, bobY, 24, 30);
  ctx.fillStyle = '#332244';
  ctx.fillRect(GW/2 - 14, bobY - 8, 28, 10);
  ctx.fillStyle = '#fff';
  ctx.fillRect(GW/2 + 2, bobY + 2, 4, 3);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
}

// ============================================================
// START LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
