<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Battletoads of Tasern</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
const GROUND_Y = 250;
const GRAVITY = 900;
const COMBO_WINDOW = 0.4;
const HIT_STUN = 0.3;
const IFRAME_DUR = 1.0;
const SPEEDER_SPEED_BASE = 280;
const STAGE_NAMES = [
  'Fungal Depths', 'Spore Gauntlet', 'Turbo Tunnel',
  'Volcanic Caverns', 'Lava Fortress', 'The Descent',
  'Serpent Rapids', 'Dark Tower'
];
const STAGE_TYPES = ['brawl','brawl','speeder','brawl','brawl','rappel','snake','boss'];

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'PUNCH', b: 'KICK' } });

let state = 'title';
let score = 0;
let highScore = TAS.score.load('battletoads_hi');
let lives = 3;
let stage = 0;
let frame = 0;
let stageTimer = 0;
let checkpoint = 0;
let noDamageBonus = true;

// === PLAYER ===
let player = null;
function createPlayer() {
  return {
    x: 60, y: GROUND_Y, vx: 0, vy: 0,
    w: 24, h: 36, facing: 1,
    hp: 100, maxHp: 100,
    grounded: true, jumping: false,
    attacking: false, attackTimer: 0, attackType: 0,
    comboCount: 0, comboTimer: 0,
    hitStun: 0, iframes: 0,
    transformAnim: 0, transformType: '',
    walkFrame: 0, state: 'idle',
    rapY: 0, rapVy: 0, rapX: 60,
    snakeY: 160, snakeVy: 0
  };
}

// === ENEMIES ===
let enemies = [];
let enemySpawnTimer = 0;
let enemiesKilled = 0;
let enemiesToKill = 0;
let bossActive = false;
let bosses = [];

// === STAGE STATE ===
let scrollX = 0;
let obstacles = [];
let hazards = [];
let stageComplete = false;
let stageTransition = 0;
let deathAnim = 0;

// === SPEEDER STATE ===
let speederLane = 1;
let speederSpeed = SPEEDER_SPEED_BASE;
let speederDist = 0;
let speederGoal = 3000;
let speederWalls = [];
let speederRamps = [];

// === RAPPEL STATE ===
let rapDepth = 0;
let rapGoal = 2000;
let rapEnemies = [];
let rapPlatforms = [];

// === SNAKE STATE ===
let snakeDist = 0;
let snakeGoal = 2500;
let snakeObs = [];
let snakeWave = 0;

// === BACKGROUND ===
let bgLayers = [];
function initBg() {
  bgLayers = [];
  for (let i = 0; i < 40; i++) {
    bgLayers.push({
      x: Math.random() * GW, y: Math.random() * GH * 0.7,
      size: 2 + Math.random() * 4, speed: 0.2 + Math.random() * 0.5,
      color: ['#1a3322','#0d2218','#2a1a3a','#1a1a2a'][Math.floor(Math.random()*4)]
    });
  }
}

// === GAME INIT ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  stage = 0;
  frame = 0;
  checkpoint = 0;
  player = createPlayer();
  TAS.particles.clear();
  initStage();
}

function initStage() {
  enemies = [];
  obstacles = [];
  hazards = [];
  bosses = [];
  bossActive = false;
  scrollX = 0;
  stageComplete = false;
  stageTransition = 0;
  enemiesKilled = 0;
  noDamageBonus = true;
  enemySpawnTimer = 0;
  stageTimer = 0;
  initBg();

  const st = STAGE_TYPES[stage];
  player.x = 60;
  player.y = GROUND_Y;
  player.hp = player.maxHp;
  player.vx = 0;
  player.vy = 0;
  player.grounded = true;
  player.attacking = false;
  player.hitStun = 0;
  player.iframes = 0;

  if (st === 'brawl') {
    enemiesToKill = 8 + stage * 3;
    if (stage === 1 || stage === 4) enemiesToKill += 5;
    if (stage === 1) initBossFight(0);
    if (stage === 4) initBossFight(1);
  } else if (st === 'speeder') {
    speederLane = 1;
    speederSpeed = SPEEDER_SPEED_BASE;
    speederDist = 0;
    speederGoal = 3000 + stage * 500;
    speederWalls = [];
    speederRamps = [];
    genSpeederObstacles();
  } else if (st === 'rappel') {
    rapDepth = 0;
    rapGoal = 2000;
    rapEnemies = [];
    rapPlatforms = [];
    player.rapY = 40;
    player.rapVy = 0;
    player.rapX = GW / 2;
    genRapPlatforms();
  } else if (st === 'snake') {
    snakeDist = 0;
    snakeGoal = 2500;
    snakeObs = [];
    snakeWave = 0;
    player.snakeY = 160;
    player.snakeVy = 0;
    genSnakeObs();
  } else if (st === 'boss') {
    initBossFight(2);
  }
}

function initBossFight(bossIndex) {
  if (bossIndex === 0) {
    bosses.push(createBoss('Spore King', 200, 1));
  } else if (bossIndex === 1) {
    bosses.push(createBoss('Magma Golem', 350, 2));
  } else {
    bosses.push(createBoss('Shadow Wurm', 300, 3));
    bosses.push(createBoss('Void Knight', 400, 4));
    bosses.push(createBoss('Dark Overlord', 500, 5));
  }
  bossActive = true;
}

function createBoss(name, hp, type) {
  return {
    name, hp, maxHp: hp, type,
    x: GW - 80, y: GROUND_Y,
    w: 40, h: 50, facing: -1,
    state: 'idle', timer: 1.5,
    attackCooldown: 0, hitStun: 0,
    pattern: 0, active: true,
    phase: 1
  };
}

// === ENEMY SPAWNING ===
function spawnEnemy(type) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const e = {
    type: type || getEnemyType(),
    x: side > 0 ? GW + 20 : -20,
    y: GROUND_Y - Math.random() * 30,
    w: 20, h: 32, vx: 0, vy: 0,
    hp: getEnemyHp(type),
    facing: -side,
    state: 'walk', timer: 0,
    attackCooldown: 1 + Math.random(),
    hitStun: 0, walkFrame: 0,
    speed: 40 + Math.random() * 30 + stage * 5
  };
  enemies.push(e);
}

function getEnemyType() {
  const types = ['slime', 'spore', 'brute', 'flyer', 'bomber'];
  const maxType = Math.min(1 + Math.floor(stage / 2), types.length);
  return types[Math.floor(Math.random() * maxType)];
}

function getEnemyHp(type) {
  const base = { slime: 30, spore: 45, brute: 80, flyer: 25, bomber: 35 };
  return (base[type] || 30) + stage * 5;
}

// === SPEEDER OBSTACLES ===
function genSpeederObstacles() {
  speederWalls = [];
  speederRamps = [];
  for (let d = 300; d < speederGoal; d += 80 + Math.random() * 120) {
    const lane = Math.floor(Math.random() * 3);
    const type = Math.random() > 0.7 ? 'ramp' : 'wall';
    if (type === 'wall') {
      speederWalls.push({ dist: d, lane, w: 30, hit: false });
    } else {
      speederRamps.push({ dist: d, lane });
    }
  }
}

// === RAPPEL PLATFORMS ===
function genRapPlatforms() {
  rapPlatforms = [];
  rapEnemies = [];
  for (let d = 100; d < rapGoal; d += 60 + Math.random() * 80) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    rapPlatforms.push({ depth: d, side, w: 60 });
  }
  for (let d = 200; d < rapGoal; d += 150 + Math.random() * 100) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    rapEnemies.push({ depth: d, side, hp: 20, active: true, x: side === 'left' ? 40 : GW - 60 });
  }
}

// === SNAKE OBSTACLES ===
function genSnakeObs() {
  snakeObs = [];
  for (let d = 200; d < snakeGoal; d += 60 + Math.random() * 80) {
    const type = Math.random() > 0.6 ? 'rock' : 'log';
    snakeObs.push({ dist: d, y: 80 + Math.random() * 160, type, w: 30, h: type === 'rock' ? 30 : 20 });
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 3 === 0 && Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('battletoads_hi', highScore);
      }
      state = 'title';
    }
    return;
  }

  if (state === 'stageIntro') {
    stageTransition -= dt;
    if (stageTransition <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'playing') {
    stageTimer += dt;
    const st = STAGE_TYPES[stage];

    if (st === 'brawl' || st === 'boss') updateBrawl(dt);
    else if (st === 'speeder') updateSpeeder(dt);
    else if (st === 'rappel') updateRappel(dt);
    else if (st === 'snake') updateSnake(dt);

    // Check stage complete
    if (stageComplete && stageTransition <= 0) {
      stageTransition = 2.0;
    }
    if (stageComplete && stageTransition > 0) {
      stageTransition -= dt;
      if (stageTransition <= 0) {
        advanceStage();
      }
    }
  }
}

function advanceStage() {
  if (noDamageBonus) {
    score += 500;
    TAS.audio.playTone(880, 0.3, 'sine', 0.1);
  }
  stage++;
  checkpoint = stage;
  if (stage >= 8) {
    // Victory!
    score += 5000;
    if (score > highScore) {
      highScore = score;
      TAS.score.save('battletoads_hi', highScore);
    }
    state = 'victory';
    TAS.audio.playMelody([[440,0.2],[550,0.2],[660,0.2],[880,0.4]], 200);
    return;
  }
  state = 'stageIntro';
  stageTransition = 2.0;
  initStage();
}

// === BRAWL UPDATE ===
function updateBrawl(dt) {
  const p = player;
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // Iframes
  if (p.iframes > 0) p.iframes -= dt;
  if (p.hitStun > 0) {
    p.hitStun -= dt;
    return;
  }

  // Movement
  let mx = 0, my = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { mx = -1; p.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { mx = 1; p.facing = 1; }
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) my = -1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) my = 1;

  if (!p.attacking) {
    p.x += mx * 130 * dt;
    p.y += my * 80 * dt;
    p.x = TAS.math.clamp(p.x, 16, GW - 16);
    p.y = TAS.math.clamp(p.y, GROUND_Y - 60, GROUND_Y + 20);

    if (mx !== 0 || my !== 0) {
      p.walkFrame += dt * 8;
      p.state = 'walk';
    } else {
      p.state = 'idle';
    }
  }

  // Jump
  if ((keys['Space'] || touch.up) && p.grounded && !p.attacking) {
    p.vy = -350;
    p.grounded = false;
    p.jumping = true;
    TAS.audio.playTone(300, 0.1, 'square', 0.06, 500);
  }

  // Air physics
  if (!p.grounded) {
    p.vy += GRAVITY * dt;
    p.y += p.vy * dt;
    if (p.y >= GROUND_Y) {
      p.y = GROUND_Y;
      p.vy = 0;
      p.grounded = true;
      p.jumping = false;
    }
  }

  // Attack input
  const punchKey = keys['KeyZ'] || keys['KeyJ'] || touch.a;
  const kickKey = keys['KeyX'] || keys['KeyK'] || touch.b;

  if ((punchKey || kickKey) && !p.attacking && p.hitStun <= 0) {
    p.attacking = true;
    p.attackTimer = 0.25;
    p.comboTimer = COMBO_WINDOW;

    if (punchKey) {
      p.attackType = p.comboCount % 3;
      p.comboCount++;
    } else {
      p.attackType = 10 + (p.comboCount % 2);
      p.comboCount++;
    }

    // Transform on combo finisher (every 3rd hit)
    if (p.comboCount >= 3 && p.comboCount % 3 === 0) {
      p.transformAnim = 0.4;
      if (p.attackType < 10) p.transformType = 'fist';
      else p.transformType = Math.random() > 0.5 ? 'boot' : 'horn';
      TAS.audio.playTone(150, 0.3, 'sawtooth', 0.12, 80);
      TAS.fx.shake(8, 0.85);
    } else {
      TAS.audio.playTone(200 + p.attackType * 50, 0.08, 'square', 0.06);
    }

    // Hit detection
    const atkRange = p.transformAnim > 0 ? 50 : 32;
    const atkDmg = p.transformAnim > 0 ? 35 + stage * 3 : 12 + stage * 2;
    const atkX = p.x + p.facing * 20;
    const atkY = p.y - 16;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 20, atkRange, 40, e.x - e.w/2, e.y - e.h, e.w, e.h)) {
        damageEnemy(e, i, atkDmg);
      }
    }

    // Boss hits
    for (const b of bosses) {
      if (!b.active) continue;
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 20, atkRange, 40, b.x - b.w/2, b.y - b.h, b.w, b.h)) {
        damageBoss(b, atkDmg);
      }
    }
  }

  // Attack cooldown
  if (p.attacking) {
    p.attackTimer -= dt;
    if (p.attackTimer <= 0) p.attacking = false;
  }
  if (p.transformAnim > 0) p.transformAnim -= dt;

  // Combo timeout
  if (p.comboTimer > 0) {
    p.comboTimer -= dt;
    if (p.comboTimer <= 0) p.comboCount = 0;
  }

  // Enemy spawning
  if (!bossActive && enemiesKilled < enemiesToKill && enemies.length < 4 + Math.floor(stage / 2)) {
    enemySpawnTimer -= dt;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = 1.5 - stage * 0.1;
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    updateEnemy(enemies[i], dt, i);
  }

  // Update bosses
  for (const b of bosses) {
    if (b.active) updateBoss(b, dt);
  }

  // Hazards (stages 3-4)
  if (stage === 3 || stage === 4) updateHazards(dt);

  // Check brawl complete
  if (!bossActive && enemiesKilled >= enemiesToKill && enemies.length === 0) {
    stageComplete = true;
  }
  if (bossActive && bosses.every(b => !b.active)) {
    stageComplete = true;
    score += 1000;
    TAS.audio.playMelody([[440,0.15],[660,0.15],[880,0.3]], 150);
  }
}

function damageEnemy(e, idx, dmg) {
  e.hp -= dmg;
  e.hitStun = HIT_STUN;
  e.vx = player.facing * 100;

  TAS.particles.spawn(e.x, e.y - e.h/2, '#ffaa00', 5, 3, { size: 2 });
  TAS.audio.playTone(100 + Math.random() * 100, 0.1, 'sawtooth', 0.05);

  if (e.hp <= 0) {
    enemies.splice(idx, 1);
    enemiesKilled++;
    score += 50 + stage * 10;
    TAS.particles.spawn(e.x, e.y - e.h/2, '#ff4400', 12, 4, { size: 3, gravity: 2 });
    TAS.fx.shake(3, 0.9);
    TAS.audio.playTone(80, 0.2, 'sawtooth', 0.08, 40);
  }
}

function damageBoss(b, dmg) {
  if (b.hitStun > 0) return;
  b.hp -= dmg;
  b.hitStun = 0.2;
  TAS.particles.spawn(b.x, b.y - b.h/2, '#ff8800', 8, 3, { size: 3 });
  TAS.fx.shake(4, 0.88);
  TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08);

  if (b.hp <= 0) {
    b.active = false;
    score += 500;
    TAS.particles.spawn(b.x, b.y - b.h/2, '#ff0000', 20, 5, { size: 4, gravity: 3 });
    TAS.fx.shake(12, 0.82);
    TAS.fx.flash('#ff4400', 0.4);
    TAS.audio.playNoise(0.4, 0.1, 200);
    // Activate next boss if any
    const nextBoss = bosses.find(bb => bb.active && bb !== b);
    if (nextBoss) nextBoss.timer = 1.5;
  }
}

function updateEnemy(e, dt, idx) {
  if (e.hitStun > 0) {
    e.hitStun -= dt;
    e.x += e.vx * dt;
    e.vx *= 0.9;
    return;
  }

  const p = player;
  const dx = p.x - e.x;
  const dy = p.y - e.y;

  e.facing = dx > 0 ? 1 : -1;
  e.attackCooldown -= dt;

  // AI behavior
  const dist = Math.abs(dx);
  if (dist > 40) {
    e.x += e.facing * e.speed * dt;
    e.y += Math.sign(dy) * e.speed * 0.4 * dt;
    e.walkFrame += dt * 6;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    // Attack player
    e.state = 'attack';
    e.attackCooldown = 1.5 + Math.random();
    if (p.iframes <= 0) {
      playerHit(8 + stage * 2);
    }
  }

  e.y = TAS.math.clamp(e.y, GROUND_Y - 50, GROUND_Y + 20);

  // Flyer behavior
  if (e.type === 'flyer') {
    e.y = GROUND_Y - 40 - Math.sin(frame * 0.05 + idx) * 20;
  }
}

function updateBoss(b, dt) {
  if (b.hitStun > 0) b.hitStun -= dt;

  b.timer -= dt;
  const p = player;
  const dx = p.x - b.x;
  b.facing = dx > 0 ? 1 : -1;

  // Phase changes
  if (b.hp < b.maxHp * 0.5 && b.phase === 1) {
    b.phase = 2;
    TAS.fx.flash('#ff0000', 0.3);
  }

  if (b.timer <= 0) {
    // Boss attack patterns
    b.pattern = (b.pattern + 1) % 4;
    const speed = b.phase === 2 ? 1.5 : 1.0;

    if (b.pattern === 0) {
      // Charge
      b.state = 'charge';
      b.timer = 0.8 / speed;
      b.vx = b.facing * 200 * speed;
    } else if (b.pattern === 1) {
      // Slam
      b.state = 'slam';
      b.timer = 0.6;
      if (Math.abs(dx) < 60 && p.iframes <= 0) {
        playerHit(15 + b.type * 3);
        TAS.fx.shake(6, 0.85);
      }
    } else if (b.pattern === 2) {
      // Projectile
      b.state = 'shoot';
      b.timer = 1.0 / speed;
      spawnProjectile(b.x, b.y - 20, b.facing);
    } else {
      b.state = 'idle';
      b.timer = 0.8 / speed;
    }
  }

  // Move during charge
  if (b.state === 'charge') {
    b.x += (b.vx || 0) * dt;
    b.x = TAS.math.clamp(b.x, 40, GW - 40);
    // Collision with player during charge
    if (TAS.hit.rectOverlap(b.x - b.w/2, b.y - b.h, b.w, b.h, p.x - 12, p.y - 36, 24, 36)) {
      if (p.iframes <= 0) playerHit(12 + b.type * 2);
    }
  }
}

let projectiles = [];
function spawnProjectile(x, y, dir) {
  projectiles.push({ x, y, vx: dir * 180, w: 10, h: 8, life: 3 });
}

function updateHazards(dt) {
  // Falling rocks on stage 3-4
  if (Math.random() < 0.01 + stage * 0.005) {
    hazards.push({ x: Math.random() * GW, y: -20, vy: 100 + Math.random() * 80, size: 8 + Math.random() * 12 });
  }
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.y += h.vy * dt;
    if (h.y > GH + 20) { hazards.splice(i, 1); continue; }
    // Hit player
    if (TAS.hit.circleOverlap(h.x, h.y, h.size/2, player.x, player.y - 18, 12)) {
      if (player.iframes <= 0) {
        playerHit(10);
        hazards.splice(i, 1);
      }
    }
  }

  // Projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx * dt;
    pr.life -= dt;
    if (pr.life <= 0 || pr.x < -20 || pr.x > GW + 20) { projectiles.splice(i, 1); continue; }
    if (TAS.hit.rectOverlap(pr.x - pr.w/2, pr.y - pr.h/2, pr.w, pr.h, player.x - 12, player.y - 36, 24, 36)) {
      if (player.iframes <= 0) {
        playerHit(8);
        projectiles.splice(i, 1);
      }
    }
  }
}

// === SPEEDER UPDATE ===
function updateSpeeder(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  speederSpeed += dt * 15;
  speederDist += speederSpeed * dt;

  // Lane switching
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) {
    if (speederLane > 0) { speederLane--; keys['ArrowLeft'] = false; TAS.audio.playTone(400, 0.05, 'square', 0.04); }
  }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) {
    if (speederLane < 2) { speederLane++; keys['ArrowRight'] = false; TAS.audio.playTone(400, 0.05, 'square', 0.04); }
  }
  // Jump (duck under overhead)
  const jumping = keys['ArrowUp'] || keys['Space'] || touch.up || touch.a;

  // Check wall collisions
  for (const w of speederWalls) {
    if (w.hit) continue;
    const relDist = w.dist - speederDist;
    if (relDist < 10 && relDist > -20) {
      if (w.lane === speederLane && !jumping) {
        w.hit = true;
        playerHit(25);
        TAS.fx.shake(10, 0.8);
        TAS.audio.playNoise(0.3, 0.12, 300);
        speederSpeed *= 0.6;
      }
    }
  }

  // Ramp bonus
  for (const r of speederRamps) {
    const relDist = r.dist - speederDist;
    if (relDist < 10 && relDist > -10 && r.lane === speederLane) {
      score += 25;
      r.dist = -9999;
      TAS.audio.playTone(600, 0.1, 'sine', 0.05, 900);
      TAS.particles.spawn(GW/2, GROUND_Y - 20, '#44ff88', 6, 3);
    }
  }

  // Completion
  if (speederDist >= speederGoal) {
    stageComplete = true;
    score += 300;
  }
}

// === RAPPEL UPDATE ===
function updateRappel(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  const p = player;

  // Descend
  const descSpeed = 60;
  rapDepth += descSpeed * dt;
  p.rapVy = 0;

  // Swing left/right
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) p.rapX -= 150 * dt;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) p.rapX += 150 * dt;
  p.rapX = TAS.math.clamp(p.rapX, 30, GW - 30);

  // Kick attack
  const kickKey = keys['KeyZ'] || keys['KeyX'] || touch.a || touch.b;
  if (kickKey) {
    for (let i = rapEnemies.length - 1; i >= 0; i--) {
      const re = rapEnemies[i];
      if (!re.active) continue;
      const relDepth = re.depth - rapDepth;
      if (Math.abs(relDepth) < 30 && Math.abs(re.x - p.rapX) < 40) {
        re.active = false;
        score += 75;
        TAS.particles.spawn(re.x, GH/2, '#ffaa00', 8, 4);
        TAS.fx.shake(3, 0.9);
        TAS.audio.playTone(180, 0.12, 'sawtooth', 0.06);
      }
    }
  }

  // Enemy collision
  for (const re of rapEnemies) {
    if (!re.active) continue;
    const relDepth = re.depth - rapDepth;
    if (Math.abs(relDepth) < 20 && Math.abs(re.x - p.rapX) < 20) {
      if (p.iframes <= 0) {
        playerHit(12);
        re.active = false;
      }
    }
  }

  // Platform collision (bonk)
  for (const plat of rapPlatforms) {
    const relDepth = plat.depth - rapDepth;
    if (Math.abs(relDepth) < 15) {
      const px = plat.side === 'left' ? 30 : GW - 30 - plat.w;
      if (p.rapX > px && p.rapX < px + plat.w) {
        if (p.iframes <= 0) playerHit(5);
        p.rapX = plat.side === 'left' ? px + plat.w + 15 : px - 15;
      }
    }
  }

  if (rapDepth >= rapGoal) {
    stageComplete = true;
    score += 300;
  }
}

// === SNAKE UPDATE ===
function updateSnake(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  const p = player;

  snakeDist += 160 * dt;
  snakeWave += dt * 3;

  // Move up/down
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) p.snakeVy -= 400 * dt;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) p.snakeVy += 400 * dt;
  p.snakeVy *= 0.92;
  p.snakeY += p.snakeVy * dt;
  p.snakeY = TAS.math.clamp(p.snakeY, 50, GH - 60);

  // Obstacle collision
  for (const ob of snakeObs) {
    const relDist = ob.dist - snakeDist;
    if (relDist < 60 && relDist > -10) {
      if (TAS.hit.rectOverlap(55, p.snakeY - 10, 30, 20, relDist + 60, ob.y - ob.h/2, ob.w, ob.h)) {
        if (p.iframes <= 0) {
          playerHit(15);
          ob.dist = -9999;
          TAS.fx.shake(4, 0.9);
        }
      }
    }
  }

  // Jump over obstacles with A button
  if ((keys['Space'] || touch.a) && p.snakeVy >= -50) {
    p.snakeVy = -200;
    TAS.audio.playTone(350, 0.08, 'square', 0.04, 500);
  }

  if (snakeDist >= snakeGoal) {
    stageComplete = true;
    score += 300;
  }
}

// === PLAYER DAMAGE ===
function playerHit(dmg) {
  player.hp -= dmg;
  player.hitStun = HIT_STUN;
  player.iframes = IFRAME_DUR;
  noDamageBonus = false;
  TAS.fx.shake(5, 0.88);
  TAS.fx.flash('#ff0000', 0.2);
  TAS.audio.playTone(80, 0.15, 'sawtooth', 0.08, 40);
  TAS.particles.spawn(player.x, player.y - 18, '#ff2222', 6, 3);

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  lives--;
  TAS.fx.shake(12, 0.8);
  TAS.fx.flash('#ff0000', 0.5);
  TAS.audio.playNoise(0.5, 0.12, 200);
  TAS.particles.spawn(player.x, player.y - 18, '#ff4400', 20, 5, { size: 3, gravity: 3 });

  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('battletoads_hi', highScore);
    }
  } else {
    // Respawn at checkpoint
    player.hp = player.maxHp;
    player.x = 60;
    player.y = GROUND_Y;
    player.iframes = 2.0;
    player.hitStun = 0;
    player.attacking = false;
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGE_NAMES[stage] });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  const st = STAGE_TYPES[stage];
  if (st === 'brawl' || st === 'boss') drawBrawlScene();
  else if (st === 'speeder') drawSpeederScene();
  else if (st === 'rappel') drawRappelScene();
  else if (st === 'snake') drawSnakeScene();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Stage complete overlay
  if (stageComplete && stageTransition > 0) {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#44ff88';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE CLEAR!', GW/2, GH/2 - 10);
    if (noDamageBonus) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '14px monospace';
      ctx.fillText('NO DAMAGE BONUS +500', GW/2, GH/2 + 20);
    }
  }
}

// === DRAW BRAWL ===
function drawBrawlScene() {
  // Background
  drawBrawlBg();

  // Ground
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, GROUND_Y + 18, GW, GH - GROUND_Y - 18);
  ctx.strokeStyle = '#2a4a2a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 18);
  ctx.lineTo(GW, GROUND_Y + 18);
  ctx.stroke();

  // Hazards
  for (const h of hazards) {
    ctx.fillStyle = '#664422';
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.size/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#553311';
    ctx.beginPath();
    ctx.arc(h.x - 2, h.y - 2, h.size/4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Projectiles
  for (const pr of projectiles) {
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Bosses
  for (const b of bosses) {
    if (b.active) drawBoss(b);
  }

  // Player
  drawPlayer();
}

function drawBrawlBg() {
  // Parallax bg elements
  const stageColors = [
    ['#0d1a0d','#1a2a1a'], ['#1a0d1a','#2a1a2a'],
    ['#0d0d1a','#1a1a2a'], ['#1a0d0d','#2a1a0d'],
    ['#1a0a0a','#2a1a0a'], ['#0d0d1a','#1a1a2a'],
    ['#0a1a1a','#0d2a2a'], ['#0a0a0a','#1a0a1a']
  ];
  const colors = stageColors[stage] || stageColors[0];

  // Gradient sky
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(1, colors[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GROUND_Y + 18);

  // BG elements
  for (const b of bgLayers) {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.size, b.size * 2);
  }

  // Mushroom silhouettes
  for (let i = 0; i < 5; i++) {
    const mx = 50 + i * 100 + Math.sin(frame * 0.01 + i) * 5;
    const my = GROUND_Y - 10;
    ctx.fillStyle = '#1a3322';
    ctx.fillRect(mx - 2, my - 20, 4, 20);
    ctx.beginPath();
    ctx.arc(mx, my - 22, 12, Math.PI, 0);
    ctx.fill();
  }
}

function drawPlayer() {
  const p = player;
  if (p.iframes > 0 && Math.floor(frame / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(p.x, p.y);

  // Body
  const bob = p.state === 'walk' ? Math.sin(p.walkFrame) * 2 : 0;
  ctx.fillStyle = '#33aa55';

  // Torso
  ctx.fillRect(-8 * p.facing, -32 + bob, 16, 20);

  // Head
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(0, -36 + bob, 10, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(p.facing * 3, -38 + bob, 4, 4);
  ctx.fillStyle = '#111';
  ctx.fillRect(p.facing * 4, -37 + bob, 2, 2);

  // Legs
  const legOff = p.state === 'walk' ? Math.sin(p.walkFrame) * 4 : 0;
  ctx.fillStyle = '#228844';
  ctx.fillRect(-6, -12 + bob, 5, 14);
  ctx.fillRect(1, -12 + bob + legOff, 5, 14);

  // Arms / Attack
  if (p.attacking) {
    drawAttack(bob);
  } else {
    // Idle arms
    ctx.fillStyle = '#33aa55';
    ctx.fillRect(p.facing * 8, -28 + bob, 5 * p.facing, 12);
  }

  // Transform animation (oversized limb)
  if (p.transformAnim > 0) {
    drawTransform(bob);
  }

  ctx.restore();
}

function drawAttack(bob) {
  const p = player;
  const progress = 1 - (p.attackTimer / 0.25);

  if (p.attackType < 10) {
    // Punch combo
    const extend = Math.sin(progress * Math.PI) * 20;
    ctx.fillStyle = '#44dd77';
    ctx.fillRect(p.facing * 10, -26 + bob, p.facing * (extend + 5), 8);
    // Fist
    ctx.fillStyle = '#55ee88';
    ctx.beginPath();
    ctx.arc(p.facing * (15 + extend), -22 + bob, 6, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Kick
    const extend = Math.sin(progress * Math.PI) * 22;
    ctx.fillStyle = '#228844';
    ctx.save();
    ctx.translate(0, -8 + bob);
    ctx.rotate(p.facing * progress * 0.5);
    ctx.fillRect(p.facing * 5, 0, p.facing * (extend + 8), 7);
    // Boot
    ctx.fillStyle = '#115533';
    ctx.fillRect(p.facing * (13 + extend), -2, p.facing * 8, 10);
    ctx.restore();
  }
}

function drawTransform(bob) {
  const p = player;
  const scale = p.transformAnim / 0.4;
  const size = 18 + (1 - scale) * 20;

  ctx.globalAlpha = scale;
  if (p.transformType === 'fist') {
    // Giant fist
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(p.facing * 40, -22 + bob, size, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(p.facing * 40 - 3, -24 + bob, size * 0.6, 0, Math.PI * 2);
    ctx.fill();
    // Impact lines
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI - Math.PI/4;
      ctx.strokeStyle = '#ffff88';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(p.facing * 40 + Math.cos(angle) * size, -22 + bob + Math.sin(angle) * size);
      ctx.lineTo(p.facing * 40 + Math.cos(angle) * (size + 10), -22 + bob + Math.sin(angle) * (size + 10));
      ctx.stroke();
    }
  } else if (p.transformType === 'boot') {
    // Giant boot
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(p.facing * 25, -12 + bob, p.facing * size * 1.5, size * 0.8);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(p.facing * 30, -8 + bob, p.facing * size, size * 0.5);
  } else {
    // Horn ram
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.moveTo(p.facing * 15, -40 + bob);
    ctx.lineTo(p.facing * (15 + size * 2), -36 + bob);
    ctx.lineTo(p.facing * 15, -30 + bob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(p.facing * 18, -38 + bob);
    ctx.lineTo(p.facing * (18 + size * 1.2), -36 + bob);
    ctx.lineTo(p.facing * 18, -33 + bob);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.hitStun > 0) {
    ctx.fillStyle = '#fff';
  } else {
    const colors = { slime: '#88aa22', spore: '#aa44aa', brute: '#886633', flyer: '#4488cc', bomber: '#cc4444' };
    ctx.fillStyle = colors[e.type] || '#888';
  }

  const bob = Math.sin(e.walkFrame) * 2;

  // Body varies by type
  if (e.type === 'slime') {
    ctx.beginPath();
    ctx.arc(0, -14 + bob, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aacc33';
    ctx.beginPath();
    ctx.arc(-3 * e.facing, -18 + bob, 4, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff0';
    ctx.fillRect(e.facing * 3, -17 + bob, 3, 3);
  } else if (e.type === 'spore') {
    // Mushroom warrior
    ctx.fillRect(-7, -28 + bob, 14, 18);
    ctx.fillStyle = '#cc66cc';
    ctx.beginPath();
    ctx.arc(0, -30 + bob, 11, Math.PI, 0);
    ctx.fill();
    // Spots
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, -33 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4, -30 + bob, 2, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'brute') {
    // Big chunky enemy
    ctx.fillRect(-12, -34 + bob, 24, 28);
    ctx.fillStyle = '#997744';
    ctx.beginPath();
    ctx.arc(0, -38 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    // Angry eyes
    ctx.fillStyle = '#f00';
    ctx.fillRect(e.facing * 2 - 3, -40 + bob, 3, 3);
    ctx.fillRect(e.facing * 2 + 2, -40 + bob, 3, 3);
  } else if (e.type === 'flyer') {
    // Wings
    ctx.fillStyle = '#3377aa';
    const wingFlap = Math.sin(frame * 0.2) * 8;
    ctx.beginPath();
    ctx.moveTo(-5, -14);
    ctx.lineTo(-20, -20 + wingFlap);
    ctx.lineTo(-5, -20);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -14);
    ctx.lineTo(20, -20 + wingFlap);
    ctx.lineTo(5, -20);
    ctx.fill();
    // Body
    ctx.fillStyle = '#4488cc';
    ctx.beginPath();
    ctx.arc(0, -14, 8, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Bomber - round with fuse
    ctx.beginPath();
    ctx.arc(0, -16 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -26 + bob);
    ctx.lineTo(3, -32 + bob);
    ctx.stroke();
    // Spark
    if (frame % 6 < 3) {
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(3, -33 + bob, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  ctx.translate(b.x, b.y);

  const flash = b.hitStun > 0 && Math.floor(frame / 2) % 2 === 0;
  const pulse = Math.sin(frame * 0.05) * 2;

  if (b.type === 1) {
    // Spore King - large mushroom
    ctx.fillStyle = flash ? '#fff' : '#663388';
    ctx.fillRect(-18, -44 + pulse, 36, 30);
    ctx.fillStyle = flash ? '#fff' : '#8844aa';
    ctx.beginPath();
    ctx.arc(0, -48 + pulse, 22, Math.PI, 0);
    ctx.fill();
    // Crown spots
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.arc(-8, -55 + pulse, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, -52 + pulse, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -60 + pulse, 3, 0, Math.PI * 2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(b.facing * 4 - 4, -40 + pulse, 5, 5);
    ctx.fillRect(b.facing * 4 + 4, -40 + pulse, 5, 5);
  } else if (b.type === 2) {
    // Magma Golem
    ctx.fillStyle = flash ? '#fff' : '#553300';
    ctx.fillRect(-20, -50 + pulse, 40, 40);
    ctx.fillStyle = flash ? '#fff' : '#774411';
    ctx.beginPath();
    ctx.arc(0, -54 + pulse, 18, 0, Math.PI * 2);
    ctx.fill();
    // Lava cracks
    ctx.strokeStyle = '#ff4400';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-10, -40 + pulse); ctx.lineTo(-5, -25 + pulse);
    ctx.moveTo(5, -45 + pulse); ctx.lineTo(10, -30 + pulse);
    ctx.moveTo(-3, -30 + pulse); ctx.lineTo(3, -18 + pulse);
    ctx.stroke();
    // Glowing eyes
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(-8, -52 + pulse, 6, 4);
    ctx.fillRect(4, -52 + pulse, 6, 4);
  } else if (b.type === 3) {
    // Shadow Wurm
    ctx.fillStyle = flash ? '#fff' : '#2a1a3a';
    for (let i = 0; i < 5; i++) {
      const sx = Math.sin(frame * 0.03 + i * 0.5) * 5;
      ctx.beginPath();
      ctx.arc(sx, -10 - i * 10, 10 - i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#aa00ff';
    ctx.fillRect(-3, -52, 3, 3);
    ctx.fillRect(3, -52, 3, 3);
  } else if (b.type === 4) {
    // Void Knight
    ctx.fillStyle = flash ? '#fff' : '#1a1a4a';
    ctx.fillRect(-16, -48 + pulse, 32, 38);
    // Helmet
    ctx.fillStyle = flash ? '#fff' : '#3a3a6a';
    ctx.beginPath();
    ctx.arc(0, -52 + pulse, 14, 0, Math.PI * 2);
    ctx.fill();
    // Visor
    ctx.fillStyle = '#ff0044';
    ctx.fillRect(-8, -54 + pulse, 16, 4);
    // Sword
    ctx.fillStyle = '#8888ff';
    ctx.fillRect(b.facing * 18, -55 + pulse, 4, 40);
    ctx.fillStyle = '#aaaaff';
    ctx.fillRect(b.facing * 17, -58 + pulse, 6, 4);
  } else {
    // Dark Overlord
    ctx.fillStyle = flash ? '#fff' : '#0a0a0a';
    ctx.fillRect(-22, -55 + pulse, 44, 45);
    // Cape
    ctx.fillStyle = '#330044';
    ctx.beginPath();
    ctx.moveTo(-22, -55 + pulse);
    ctx.lineTo(-30, -10 + pulse);
    ctx.lineTo(-22, -10 + pulse);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, -55 + pulse);
    ctx.lineTo(30, -10 + pulse);
    ctx.lineTo(22, -10 + pulse);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(-10, -62 + pulse, 20, 5);
    ctx.fillRect(-8, -68 + pulse, 3, 8);
    ctx.fillRect(5, -68 + pulse, 3, 8);
    ctx.fillRect(-2, -70 + pulse, 4, 10);
    // Eyes
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(-6, -50 + pulse, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -50 + pulse, 4, 0, Math.PI * 2); ctx.fill();
  }

  // HP bar
  ctx.fillStyle = '#300';
  ctx.fillRect(-25, -b.h - 20, 50, 6);
  ctx.fillStyle = b.hp < b.maxHp * 0.3 ? '#ff2200' : '#ff8800';
  ctx.fillRect(-25, -b.h - 20, 50 * (b.hp / b.maxHp), 6);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, 0, -b.h - 24);

  ctx.restore();
}

// === DRAW SPEEDER ===
function drawSpeederScene() {
  // Road perspective
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0a0a2a');
  grad.addColorStop(0.4, '#1a1a3a');
  grad.addColorStop(1, '#2a2a4a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Speed lines
  const speedIntensity = speederSpeed / SPEEDER_SPEED_BASE;
  for (let i = 0; i < 12; i++) {
    const ly = 60 + i * 22;
    const lx = (speederDist * (0.5 + i * 0.1) + i * 73) % GW;
    ctx.strokeStyle = `rgba(100,200,255,${0.1 * speedIntensity})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(lx - 20 * speedIntensity, ly);
    ctx.stroke();
  }

  // Road lanes
  ctx.fillStyle = '#222';
  ctx.fillRect(40, GROUND_Y - 40, GW - 80, 80);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 15]);
  ctx.beginPath();
  ctx.moveTo(40, GROUND_Y - 13); ctx.lineTo(GW - 40, GROUND_Y - 13);
  ctx.moveTo(40, GROUND_Y + 14); ctx.lineTo(GW - 40, GROUND_Y + 14);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = '#ff8800';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(40, GROUND_Y - 40); ctx.lineTo(GW - 40, GROUND_Y - 40);
  ctx.moveTo(40, GROUND_Y + 40); ctx.lineTo(GW - 40, GROUND_Y + 40);
  ctx.stroke();

  // Obstacles approaching
  for (const w of speederWalls) {
    if (w.hit) continue;
    const relDist = w.dist - speederDist;
    if (relDist < 0 || relDist > 400) continue;
    const scale = 1 - relDist / 400;
    const wx = getLaneX(w.lane);
    const wy = GROUND_Y;
    const sz = 15 + scale * 25;
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(wx - sz/2, wy - sz, sz, sz);
    ctx.fillStyle = '#aa0000';
    ctx.fillRect(wx - sz/3, wy - sz * 0.8, sz * 0.6, sz * 0.6);
    // Warning stripe
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(wx - sz/2, wy - sz - 4, sz, 4);
  }

  for (const r of speederRamps) {
    const relDist = r.dist - speederDist;
    if (relDist < 0 || relDist > 400) continue;
    const scale = 1 - relDist / 400;
    const rx = getLaneX(r.lane);
    ctx.fillStyle = '#44ff88';
    const sz = 10 + scale * 15;
    ctx.beginPath();
    ctx.moveTo(rx - sz, GROUND_Y);
    ctx.lineTo(rx, GROUND_Y - sz);
    ctx.lineTo(rx + sz, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  // Player bike
  const bikeX = getLaneX(speederLane);
  const bikeY = GROUND_Y;
  ctx.fillStyle = '#33aa55';
  ctx.fillRect(bikeX - 12, bikeY - 20, 24, 16);
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(bikeX, bikeY - 24, 8, 0, Math.PI * 2);
  ctx.fill();
  // Wheels
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(bikeX - 8, bikeY, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bikeX + 8, bikeY, 6, 0, Math.PI * 2);
  ctx.fill();
  // Exhaust
  if (frame % 4 < 2) {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.arc(bikeX - 14, bikeY - 4, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Speed indicator
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SPEED: ' + Math.floor(speederSpeed), GW - 10, GH - 10);

  // Progress bar
  drawProgressBar(speederDist / speederGoal);
}

function getLaneX(lane) {
  return 120 + lane * 120;
}

// === DRAW RAPPEL ===
function drawRappelScene() {
  // Cavern walls
  const grad = ctx.createLinearGradient(0, 0, GW, 0);
  grad.addColorStop(0, '#2a1a0d');
  grad.addColorStop(0.1, '#0a0a0a');
  grad.addColorStop(0.9, '#0a0a0a');
  grad.addColorStop(1, '#2a1a0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Wall texture
  ctx.fillStyle = '#1a1008';
  for (let i = 0; i < 10; i++) {
    const wy = ((rapDepth * 0.5 + i * 40) % GH);
    ctx.fillRect(0, wy, 25 + Math.sin(i) * 10, 8);
    ctx.fillRect(GW - 25 - Math.cos(i) * 10, wy, 25 + Math.cos(i) * 10, 8);
  }

  // Rope
  ctx.strokeStyle = '#886633';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(player.rapX, 0);
  ctx.lineTo(player.rapX, GH/2 - 15);
  ctx.stroke();

  // Player hanging on rope
  const p = player;
  ctx.save();
  ctx.translate(p.rapX, GH/2);

  ctx.fillStyle = '#33aa55';
  ctx.fillRect(-8, -15, 16, 20);
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(0, -20, 8, 0, Math.PI * 2);
  ctx.fill();
  // Arms on rope
  ctx.strokeStyle = '#33aa55';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-5, -12);
  ctx.lineTo(0, -25);
  ctx.moveTo(5, -12);
  ctx.lineTo(0, -25);
  ctx.stroke();

  ctx.restore();

  // Platforms
  for (const plat of rapPlatforms) {
    const relDepth = plat.depth - rapDepth;
    const py = GH/2 + relDepth * 0.5;
    if (py < -20 || py > GH + 20) continue;
    const px = plat.side === 'left' ? 10 : GW - 10 - plat.w;
    ctx.fillStyle = '#553322';
    ctx.fillRect(px, py, plat.w, 10);
    ctx.fillStyle = '#664433';
    ctx.fillRect(px, py, plat.w, 4);
  }

  // Rappel enemies
  for (const re of rapEnemies) {
    if (!re.active) continue;
    const relDepth = re.depth - rapDepth;
    const ry = GH/2 + relDepth * 0.5;
    if (ry < -20 || ry > GH + 20) continue;
    ctx.fillStyle = '#aa2222';
    ctx.beginPath();
    ctx.arc(re.x, ry, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(re.x - 3, ry - 3, 6, 3);
  }

  // Progress
  drawProgressBar(rapDepth / rapGoal);
}

// === DRAW SNAKE ===
function drawSnakeScene() {
  // Water bg
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0a2a3a');
  grad.addColorStop(1, '#0a1a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Water waves
  ctx.strokeStyle = 'rgba(100,200,255,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    for (let x = 0; x < GW; x += 10) {
      const y = 40 + i * 35 + Math.sin((x + snakeDist + i * 30) * 0.02 + snakeWave) * 8;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Obstacles
  for (const ob of snakeObs) {
    const relDist = ob.dist - snakeDist;
    const ox = relDist + 60;
    if (ox < -40 || ox > GW + 40) continue;
    if (ob.type === 'rock') {
      ctx.fillStyle = '#445566';
      ctx.beginPath();
      ctx.arc(ox, ob.y, ob.w/2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#334455';
      ctx.beginPath();
      ctx.arc(ox - 3, ob.y - 3, ob.w/4, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#553311';
      ctx.fillRect(ox - ob.w/2, ob.y - ob.h/2, ob.w, ob.h);
      ctx.fillStyle = '#442200';
      ctx.fillRect(ox - ob.w/2 + 3, ob.y - ob.h/2 + 3, ob.w - 6, ob.h - 6);
    }
  }

  // Snake mount
  const p = player;
  const snakeBaseY = p.snakeY;
  ctx.fillStyle = '#44aa33';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const sx = 60 - i * 12;
    const sy = snakeBaseY + Math.sin(snakeWave + i * 0.5) * 5;
    ctx.arc(sx, sy, 8 - i * 0.5, 0, Math.PI * 2);
  }
  ctx.fill();

  // Snake head
  ctx.fillStyle = '#55cc44';
  ctx.beginPath();
  ctx.arc(70, snakeBaseY + Math.sin(snakeWave) * 3, 10, 0, Math.PI * 2);
  ctx.fill();
  // Snake eye
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.arc(75, snakeBaseY + Math.sin(snakeWave) * 3 - 3, 3, 0, Math.PI * 2);
  ctx.fill();

  // Player riding
  ctx.fillStyle = '#33aa55';
  ctx.fillRect(52, snakeBaseY - 25, 16, 18);
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(60, snakeBaseY - 30, 8, 0, Math.PI * 2);
  ctx.fill();

  // Splash effects
  if (frame % 8 === 0) {
    TAS.particles.spawn(30, snakeBaseY + 5, '#88ddff', 2, 1, { size: 1, gravity: 1 });
  }

  drawProgressBar(snakeDist / snakeGoal);
}

// === PROGRESS BAR ===
function drawProgressBar(pct) {
  const barW = 100, barH = 6;
  const bx = GW - barW - 10, by = GH - 14;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = '#44ff88';
  ctx.fillRect(bx, by, barW * TAS.math.clamp(pct, 0, 1), barH);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);
}

// === HUD ===
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 30);

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Stage
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('S' + (stage + 1), GW/2, 18);

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = '#44dd88';
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 18, 15, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Health bar
  const hpW = 80, hpH = 8;
  const hpX = 6, hpY = 24;
  if (player) {
    ctx.fillStyle = '#300';
    ctx.fillRect(hpX, hpY, hpW, hpH);
    const hpPct = player.hp / player.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#44dd88' : hpPct > 0.25 ? '#ddaa44' : '#dd4444';
    ctx.fillRect(hpX, hpY, hpW * hpPct, hpH);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.strokeRect(hpX, hpY, hpW, hpH);
  }

  // Combo counter
  if (player && player.comboCount > 1) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(player.comboCount + 'x COMBO', GW/2, 50);
  }
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  // Dark bg with spore particles
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  // Floating spores
  for (let i = 0; i < 20; i++) {
    const x = (frame * 0.3 + i * 30) % GW;
    const y = (Math.sin(frame * 0.01 + i) * 40) + GH/2 + i * 8;
    ctx.fillStyle = `rgba(68,220,100,${0.2 + Math.sin(frame*0.02+i)*0.1})`;
    ctx.beginPath();
    ctx.arc(x, y % GH, 2 + Math.sin(i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('BATTLETOADS', GW/2 + 2, 82);
  ctx.fillStyle = '#44dd88';
  ctx.fillText('BATTLETOADS', GW/2, 80);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('OF TASERN', GW/2 + 1, 101);
  ctx.fillStyle = '#88ffaa';
  ctx.fillText('OF TASERN', GW/2, 100);

  // Baseling warrior preview
  ctx.save();
  ctx.translate(GW/2, 170);
  ctx.fillStyle = '#33aa55';
  ctx.fillRect(-10, -30, 20, 24);
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(0, -36, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(4, -38, 5, 5);
  ctx.fillStyle = '#111';
  ctx.fillRect(5, -37, 3, 3);
  // Flex arms
  const armPump = Math.sin(frame * 0.04) * 3;
  ctx.fillStyle = '#33aa55';
  ctx.fillRect(-18, -28 + armPump, 8, 14);
  ctx.fillRect(10, -28 - armPump, 8, 14);
  // Giant fist
  ctx.fillStyle = '#ffdd44';
  ctx.beginPath();
  ctx.arc(22, -26 - armPump, 10 + Math.sin(frame*0.06)*2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Controls
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS: Move | Z: Punch | X: Kick | SPACE: Jump', GW/2, 230);
  ctx.fillText('Combo finishers transform into GIANT attacks!', GW/2, 245);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, 270);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 30);
  ctx.globalAlpha = 1;
}

// === STAGE INTRO ===
function drawStageIntro() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44dd88';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('STAGE ' + (stage + 1), GW/2, GH/2 - 30);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW/2, GH/2);

  const typeLabel = {
    brawl: 'BEAT EM UP', speeder: 'TURBO TUNNEL',
    rappel: 'VERTICAL DESCENT', snake: 'SERPENT RAPIDS', boss: 'BOSS GAUNTLET'
  };
  ctx.fillStyle = '#ff8844';
  ctx.font = '11px monospace';
  ctx.fillText(typeLabel[STAGE_TYPES[stage]], GW/2, GH/2 + 25);

  // Tips
  const tips = [
    'Combo 3 hits for transform attacks!',
    'Defeat the Spore King!',
    'Dodge walls! Hit ramps for bonus!',
    'Watch for falling rocks!',
    'Lava pits ahead!',
    'Kick enemies off the walls!',
    'Ride the serpent, avoid rocks!',
    'Three bosses await...'
  ];
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText(tips[stage], GW/2, GH/2 + 50);
}

// === VICTORY ===
function drawVictory() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  if (frame % 10 === 0) {
    const colors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'];
    TAS.particles.spawn(Math.random() * GW, Math.random() * GH/2, colors[Math.floor(Math.random()*5)], 3, 2, { gravity: 1 });
  }

  ctx.save();
  TAS.particles.draw();
  ctx.restore();

  ctx.textAlign = 'center';
  const pulse = Math.sin(frame * 0.04) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW/2, 80);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#44dd88';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('The Dark Tower has fallen!', GW/2, 120);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW/2, 160);

  if (score >= highScore) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 185);
  }

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Press any key to return', GW/2, 230);

  TAS.particles.update(1/60);

  if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
    state = 'title';
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
