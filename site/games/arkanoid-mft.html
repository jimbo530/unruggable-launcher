<script>
(function() {
"use strict";

// ============================================================
// BASELING INTEGRATION — Arkanoid MfT is a WAGER game.
// Per ARCADE-STATS.md, wagers are a contest of SKILL: every multiplier comes from
// getMults({ pvp: true }) (tight 0.95–1.10 band), so a better-fed paddle is at most
// ~10% stronger and a Wimmple starter at most ~5% behind. The baseling is the paddle
// pilot (drawn on the paddle + title). Score/cooldown are NOT stats -> fixed at 1.0.
// ============================================================
var statB = { color: '#0052FF', name: 'Baseling' };  // cosmetic display only
var picking = false;
var selName = 'WIMMPLE';
// Multiplier-derived constants — reassigned by recomputeStats() so a title pick takes
// effect. var (not const) for that reason.
var MAX_LIVES = 6;     // base 5 + up to ~1 cushion at high STA (recomputed)
var SCORE_MULT = 1;    // score is not a stat
var DAMAGE_MULT = 1;   // <- damage (brick/ball/boss damage)
var SPEED_MULT = 1;    // <- moveSpeed (paddle speed)
var LUCK_MULT = 1;     // <- luck (power-up drop bias)
var COOLDOWN_INV = 1;  // power-up duration — no dedicated stat, fixed
var HP_MULT = 1;       // boss HP fixed (never scaled by the player's pet)
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults({ pvp: true })
        : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  DAMAGE_MULT = m.damage;
  SPEED_MULT = m.moveSpeed;
  LUCK_MULT = m.luck;
  MAX_LIVES = 5;  // FLAT in wager play — no discrete advantages (#24 ruling; review finding)
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  selName = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  if (sel) statB.name = sel.charName;
}
recomputeStats();
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[arkanoid-mft] player init failed:', e && e.message); });
}

// Draw the selected baseling at (cx,cy) center, size px. Returns true if a real
// sprite drew; false -> caller uses the procedural drawing.
function drawSelectedBaseling(c, cx, cy, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, cx, cy, size, opts || {});
}

// 5 canonical arcade stat bars for the selected baseling, centered at cx (display).
function drawTitleStatBars(cx, topY, totalW) {
  if (!window.BaselingPlayer || !BaselingPlayer.getStats) return;
  var stats = BaselingPlayer.getStats();
  var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
  var bw = totalW / keys.length, x0 = cx - totalW / 2;
  ctx.font = '8px monospace';
  for (var i = 0; i < keys.length; i++) {
    var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
    ctx.fillStyle = mm.color; ctx.textAlign = 'center';
    ctx.fillText(mm.label, bx + bw / 2, topY);
    ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, topY + 3, bw - 6, 5);
    ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, topY + 3, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
  }
  ctx.textAlign = 'center';
}

// ============================================================
// CONSTANTS
// ============================================================
const GAME_W = 480, GAME_H = 720;
const BRICK_COLS = 12, BRICK_ROWS = 20;
const BRICK_W = GAME_W / BRICK_COLS;
const BRICK_H = 18;
const BRICK_TOP_OFFSET = 60;
const PADDLE_Y_OFFSET = 50;
const BALL_R = 6;
const BASE_BALL_SPEED = 320;
const POWERUP_SPEED = 150;
const POWERUP_SIZE = 20;
const LASER_SPEED = 500;
const LASER_W = 4;
const LASER_H = 14;
// MAX_LIVES / SCORE_MULT / DAMAGE_MULT / SPEED_MULT / LUCK_MULT / COOLDOWN_INV /
// HP_MULT are declared and recomputed up top from getMults({pvp:true}).
const TOTAL_LEVELS = 30;

// Brick types
const B_NONE = 0;
const B_BROWN = 1;   // 1 hit - dirt clump
const B_GREEN = 2;   // 2 hits - garden block
const B_GOLD = 3;    // 3 hits - gilded cap
const B_SILVER = 4;  // indestructible - iron ore
const B_PURPLE = 5;  // drops power-up - garden pod
const B_RED = 6;     // explosive - fire cap
const B_SPORE = 7;   // spreads spore clusters on break (2 hits)
const B_REACTOR = 8; // reactor core, 4 hits, pulses energy
const B_MYCELIAL = 9;// fungal wall, 1 hit, chains to neighbors

// Power-up types
const PU_WIDEN = 0;
const PU_MULTI = 1;
const PU_LASER = 2;
const PU_SLOW = 3;
const PU_LIFE = 4;
const PU_MAGNET = 5;
const PU_PASS = 6;
const PU_SPORE_SHIELD = 7;  // Baseling: absorbs one hit
const PU_REACTOR_BEAM = 8;  // Baseling: piercing POOP beam from paddle
const PU_FUNGAL_MULTI = 9;  // Baseling: splits into 5 spore balls

const PU_COLORS = ['#4488ff', '#38d973', '#ff4444', '#f4b41b', '#ff88cc', '#44ffff', '#ffffff', '#38d973', '#f4b41b', '#a855f7'];
const PU_NAMES = ['GROW', 'SPLIT', 'POOP', 'SLOW', 'LIFE', 'CATCH', 'GHOST', 'SPORE', 'BEAM', 'FUNGI'];

// Zone themes (every 6 levels)
const ZONES = [
  { name: 'The Nursery',      bg1: '#0a0a1a', bg2: '#0a1a0a', grid: 'rgba(40,100,60,0.12)', border: 'rgba(56,217,115,0.3)',  accent: '#38d973' },
  { name: 'Spore Caverns',    bg1: '#0a0a1a', bg2: '#1a0a1a', grid: 'rgba(100,40,100,0.12)', border: 'rgba(168,85,247,0.3)', accent: '#a855f7' },
  { name: 'POOP Depths',      bg1: '#0a0a1a', bg2: '#1a100a', grid: 'rgba(100,60,20,0.12)',  border: 'rgba(122,68,74,0.4)',  accent: '#f4b41b' },
  { name: 'Mycelial Network', bg1: '#0a0a1a', bg2: '#0a0a2a', grid: 'rgba(40,60,120,0.12)',  border: 'rgba(60,100,255,0.3)', accent: '#4488ff' },
  { name: 'The Garden',       bg1: '#0a0a1a', bg2: '#0a1a1a', grid: 'rgba(40,100,100,0.12)', border: 'rgba(56,217,115,0.3)', accent: '#38d973' }
];

function getZone() {
  return ZONES[Math.min(Math.floor((level - 1) / 6), ZONES.length - 1)];
}

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let SCALE = 1, OFFSET_X = 0, OFFSET_Y = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / GAME_W, sh / GAME_H);
  const rw = Math.floor(GAME_W * SCALE);
  const rh = Math.floor(GAME_H * SCALE);
  OFFSET_X = Math.floor((sw - rw) / 2);
  OFFSET_Y = Math.floor((sh - rh) / 2);
  canvas.width = GAME_W * dpr;
  canvas.height = GAME_H * dpr;
  canvas.style.width = rw + 'px';
  canvas.style.height = rh + 'px';
  canvas.style.marginTop = Math.max(0, OFFSET_Y) + 'px';
  canvas.style.marginLeft = OFFSET_X + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  hit() { playTone(440, 0.05, 'square', 0.08); },
  hitHard() { playTone(330, 0.08, 'square', 0.1, 220); },
  hitGold() { playTone(880, 0.06, 'triangle', 0.1); playTone(660, 0.04, 'square', 0.06); },
  hitSilver() { playTone(200, 0.1, 'sawtooth', 0.08, 100); },
  explode() { playNoise(0.2, 0.12); playTone(120, 0.2, 'sawtooth', 0.1, 40); },
  paddle() { playTone(220, 0.04, 'triangle', 0.06); },
  die() { playTone(400, 0.4, 'sawtooth', 0.12, 60); setTimeout(() => playTone(200, 0.3, 'square', 0.08, 40), 200); },
  powerup() { playTone(523, 0.06, 'square', 0.08); setTimeout(() => playTone(784, 0.08, 'square', 0.1), 60); },
  laser() { playTone(1200, 0.05, 'sawtooth', 0.06, 600); },
  sporeSpread() { playTone(300, 0.15, 'triangle', 0.07, 150); playTone(450, 0.1, 'square', 0.05); },
  reactorPulse() { playTone(100, 0.2, 'sawtooth', 0.1, 200); playNoise(0.1, 0.06); },
  mycelialChain() { [600, 700, 800].forEach((n, i) => setTimeout(() => playTone(n, 0.04, 'square', 0.06), i * 30)); },
  reactorBeam() { playTone(80, 0.3, 'sawtooth', 0.12, 400); playNoise(0.15, 0.08); },
  shieldUp() { playTone(400, 0.1, 'triangle', 0.08); playTone(600, 0.1, 'triangle', 0.08); },
  shieldBreak() { playNoise(0.15, 0.1); playTone(300, 0.1, 'square', 0.06, 100); },
  levelClear() {
    [523, 659, 784, 1047].forEach((n, i) => setTimeout(() => playTone(n, 0.12, 'square', 0.08), i * 100));
  },
  gameOver() {
    [440, 349, 293, 220].forEach((n, i) => setTimeout(() => playTone(n, 0.25, 'sawtooth', 0.1), i * 180));
  },
  bossHit() { playNoise(0.1, 0.1); playTone(150, 0.15, 'square', 0.1, 80); },
  bossDie() {
    playNoise(0.4, 0.15);
    [200, 150, 100, 80].forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sawtooth', 0.12, 40), i * 100));
  }
};

// ============================================================
// PARTICLES
// ============================================================
let particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.5 + Math.random());
    particles.push({ x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, life: 1, color, size: 2 + Math.random() * 3 });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.06 * dt * 60;
    p.life -= dt * 2.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SCORE POPUPS (floating text that fades up)
// ============================================================
let scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x, y, text, color: color || '#ffdd44', life: 1, vy: -1.5 });
}
function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy * dt * 60;
    p.life -= dt * 1.5;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  for (const p of scorePopups) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#000';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME STATE
// ============================================================
let state = 'title'; // title, tutorial, playing, paused, levelClear, dead, gameOver, win
let level = 1;
let lives = 3; // fixed starting lives (STA only raises the MAX_LIVES cushion cap)
let score = 0;
let combo = 0;
let highScore = parseInt(localStorage.getItem('spore_breaker_high') || '0');
let paddleX = GAME_W / 2;
let paddleW = 80;
let paddleBaseW = 80;
let balls = [];
let bricks = []; // 2D array [row][col]
let powerups = [];
let lasers = [];
let reactorBeams = []; // Baseling: vertical beams from paddle
let activePowers = {}; // { type: timeRemaining }
let launched = false;
let ballSpeed = BASE_BALL_SPEED;
let levelTime = 0;
let boss = null;
let bossProjectiles = [];
let flashAlpha = 0;
let flashColor = '#fff';
let shakeTime = 0;
let stateTimer = 0;
let sporeShieldActive = false; // Baseling: one-hit shield on paddle
let firstPlay = !localStorage.getItem('spore_breaker_played');
let keyLeft = false, keyRight = false;
let zPressed = false, xPressed = false;
let tutorialPage = 0;
let zonePulse = 0; // background animation timer

// ============================================================
// INPUT
// ============================================================
let inputX = GAME_W / 2;
let inputActive = false;
let spacePressed = false;

function getGameX(clientX) {
  return (clientX - OFFSET_X) / SCALE;
}

canvas.addEventListener('mousemove', e => {
  inputX = getGameX(e.clientX);
  inputActive = true;
});
canvas.addEventListener('mousedown', e => {
  ensureAudio();
  inputX = getGameX(e.clientX);
  inputActive = true;
  handleTap();
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  inputX = getGameX(e.touches[0].clientX);
  inputActive = true;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  inputX = getGameX(e.touches[0].clientX);
  inputActive = true;
  handleTap();
});

document.addEventListener('keydown', e => {
  ensureAudio();
  // C opens the baseling picker from the title (X stays the in-game special).
  if (e.code === 'KeyC' && state === 'title') {
    if (picking) return;
    picking = true;
    if (window.BaselingPlayer && BaselingPlayer.select) {
      BaselingPlayer.select(function () { recomputeStats(); picking = false; });
    } else { picking = false; }
    return;
  }
  if (e.code === 'Space' || e.code === 'KeyZ') { zPressed = true; spacePressed = true; handleTap(); }
  if (e.code === 'KeyX') { xPressed = true; handleSpecial(); }
  if (e.code === 'ArrowLeft') keyLeft = true;
  if (e.code === 'ArrowRight') keyRight = true;
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'KeyZ') { zPressed = false; spacePressed = false; }
  if (e.code === 'KeyX') xPressed = false;
  if (e.code === 'ArrowLeft') keyLeft = false;
  if (e.code === 'ArrowRight') keyRight = false;
});

function handleTap() {
  if (state === 'title') {
    if (firstPlay) { state = 'tutorial'; tutorialPage = 0; firstPlay = false; localStorage.setItem('spore_breaker_played', '1'); return; }
    startGame(); return;
  }
  if (state === 'tutorial') {
    tutorialPage++;
    if (tutorialPage >= 3) { startGame(); }
    return;
  }
  if (state === 'gameOver' || state === 'win') { state = 'title'; return; }
  if (state === 'playing' && !launched) { launchBall(); return; }
  if (state === 'levelClear') return;
  if (state === 'dead') return;
}

function handleSpecial() {
  if (state !== 'playing') return;
  // X = fire reactor beam if available
  if (activePowers[PU_REACTOR_BEAM] !== undefined) {
    fireReactorBeam();
  }
}

function fireReactorBeam() {
  reactorBeams.push({ x: paddleX, y: GAME_H - PADDLE_Y_OFFSET - 10, life: 0.4 });
  SFX.reactorBeam();
  shakeTime = 0.1;
}

// ============================================================
// LEVEL DEFINITIONS (30 levels + Baseling themes)
// ============================================================
function generateLevel(lv) {
  const grid = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < BRICK_COLS; c++) {
      grid[r][c] = B_NONE;
    }
  }

  switch (lv) {
    case 1: // The Nursery - Simple rows with spore pods
      for (let r = 2; r < 6; r++)
        for (let c = 1; c < BRICK_COLS - 1; c++)
          grid[r][c] = r === 2 ? B_GREEN : B_BROWN;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE;
      grid[4][3] = B_MYCELIAL; grid[4][8] = B_MYCELIAL;
      break;

    case 2: // Diamond of Moss
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const cx = Math.abs(c - 5.5), cy = Math.abs(r - 3.5);
          if (cx + cy < 5) grid[r + 1][c] = (cx + cy < 3) ? B_GREEN : B_BROWN;
        }
      grid[4][5] = B_GOLD; grid[4][6] = B_GOLD;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE;
      grid[2][5] = B_SPORE; grid[2][6] = B_SPORE;
      break;

    case 3: // Mycelial Cross
      for (let r = 1; r < 9; r++) {
        grid[r][5] = B_MYCELIAL; grid[r][6] = B_MYCELIAL;
      }
      for (let c = 2; c < 10; c++) {
        grid[4][c] = B_GREEN; grid[5][c] = B_GREEN;
      }
      grid[4][5] = B_GOLD; grid[5][6] = B_GOLD;
      grid[2][5] = B_PURPLE; grid[7][6] = B_PURPLE;
      break;

    case 4: // Spore Stripes
      for (let r = 1; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if (r % 2 === 0) grid[r][c] = c % 3 === 0 ? B_GREEN : B_BROWN;
      grid[4][3] = B_PURPLE; grid[6][8] = B_PURPLE; grid[8][5] = B_RED;
      grid[2][6] = B_SPORE; grid[6][3] = B_SPORE;
      break;

    case 5: // BOSS: Sporeling Sentinel
      for (let c = 2; c < 10; c++) grid[1][c] = B_SILVER;
      for (let c = 3; c < 9; c++) grid[3][c] = B_SPORE;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE;
      for (let c = 4; c < 8; c++) grid[5][c] = B_BROWN;
      break;

    case 6: // Reactor Ring
      for (let r = 0; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const dx = c - 5.5, dy = r - 4.5;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 5 && dist > 3) grid[r + 1][c] = B_GREEN;
          else if (dist <= 3 && dist > 1.5) grid[r + 1][c] = B_REACTOR;
        }
      grid[5][5] = B_RED; grid[5][6] = B_RED;
      grid[3][3] = B_PURPLE; grid[7][8] = B_PURPLE;
      break;

    case 7: // Zigzag Cavern
      for (let r = 1; r < 9; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const offset = (r % 2 === 0) ? 0 : 3;
          if ((c + offset) % 6 < 3) grid[r][c] = r < 4 ? B_GREEN : B_BROWN;
        }
      grid[3][4] = B_PURPLE; grid[5][7] = B_PURPLE; grid[7][2] = B_RED;
      grid[2][1] = B_MYCELIAL; grid[6][10] = B_MYCELIAL;
      break;

    case 8: // Mushroom Pyramid
      for (let r = 0; r < 7; r++) {
        const w = 7 - r;
        const start = 6 - w;
        for (let c = start; c < start + w * 2; c++)
          if (c >= 0 && c < BRICK_COLS) grid[r + 1][c] = r < 2 ? B_GOLD : (r < 4 ? B_GREEN : B_BROWN);
      }
      grid[1][5] = B_REACTOR; grid[1][6] = B_REACTOR;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE;
      break;

    case 9: // Spore Checkerboard
      for (let r = 1; r < 9; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if ((r + c) % 2 === 0) grid[r][c] = r < 4 ? B_SPORE : B_BROWN;
      grid[2][4] = B_PURPLE; grid[6][8] = B_PURPLE; grid[4][6] = B_RED;
      break;

    case 10: // BOSS: Mycelial Queen
      for (let c = 0; c < BRICK_COLS; c++) grid[1][c] = B_SILVER;
      for (let c = 2; c < 10; c++) grid[3][c] = B_MYCELIAL;
      for (let c = 3; c < 9; c++) grid[5][c] = B_SPORE;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE;
      grid[5][5] = B_REACTOR; grid[5][6] = B_REACTOR;
      break;

    case 11: // MfT Letters
      for (let r = 2; r < 8; r++) { grid[r][1] = B_GREEN; grid[r][4] = B_GREEN; }
      grid[3][2] = B_GREEN; grid[4][3] = B_GREEN; grid[3][3] = B_GREEN; grid[4][2] = B_GREEN;
      for (let r = 2; r < 8; r++) grid[r][6] = B_GOLD;
      grid[2][7] = B_GOLD; grid[4][7] = B_GOLD;
      for (let c = 9; c < 12; c++) grid[2][c] = B_GREEN;
      for (let r = 3; r < 8; r++) grid[r][10] = B_GREEN;
      grid[5][6] = B_PURPLE; grid[5][1] = B_PURPLE;
      break;

    case 12: // Reactor Core
      for (let r = 0; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const dx = c - 5.5, dy = r - 4.5;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 5 && dist > 2.5) grid[r + 1][c] = B_GREEN;
          else if (dist <= 2.5 && dist > 1) grid[r + 1][c] = B_REACTOR;
        }
      grid[5][5] = B_RED; grid[5][6] = B_RED;
      grid[3][3] = B_PURPLE; grid[7][8] = B_PURPLE;
      break;

    case 13: // Spore Spiral
      for (let r = 0; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const dx = c - 5.5, dy = r - 4.5;
          const angle = Math.atan2(dy, dx);
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (Math.abs((angle / Math.PI * 3 + dist) % 2) < 1 && dist < 5)
            grid[r + 1][c] = dist < 3 ? B_SPORE : B_GREEN;
        }
      grid[3][5] = B_PURPLE; grid[7][6] = B_PURPLE;
      break;

    case 14: // Fungal Heart
      for (let r = 0; r < 9; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const nx = (c - 5.5) / 5, ny = (r - 5) / 5;
          const heart = (nx * nx + ny * ny - 1);
          if (heart * heart * heart - nx * nx * ny * ny * ny < 0)
            grid[r + 1][c] = r < 4 ? B_RED : B_MYCELIAL;
        }
      grid[3][4] = B_PURPLE; grid[3][7] = B_PURPLE;
      break;

    case 15: // BOSS: Reactor Hive
      for (let c = 0; c < BRICK_COLS; c++) { grid[1][c] = B_SILVER; grid[6][c] = B_SILVER; }
      for (let r = 2; r < 6; r++)
        for (let c = 1; c < BRICK_COLS - 1; c++)
          grid[r][c] = (r + c) % 3 === 0 ? B_REACTOR : B_BROWN;
      grid[3][5] = B_GOLD; grid[3][6] = B_GOLD; grid[4][5] = B_GOLD; grid[4][6] = B_GOLD;
      grid[2][3] = B_PURPLE; grid[4][8] = B_PURPLE; grid[5][5] = B_RED;
      break;

    case 16: // Invader
      const inv = [
        '..1......1..',
        '...1....1...',
        '..1111111...',
        '.11.11111.1.',
        '111111111111',
        '1.1111111.1.',
        '1.1......1.1',
        '...11..11...'
      ];
      for (let r = 0; r < inv.length; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if (inv[r][c] === '1') grid[r + 1][c] = r < 3 ? B_GOLD : B_SPORE;
      grid[5][5] = B_PURPLE; grid[5][6] = B_PURPLE; grid[4][3] = B_RED;
      break;

    case 17: // Mycelial Waves
      for (let r = 1; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const wave = Math.sin(c * 0.8 + r * 0.5) * 2;
          if (Math.abs(r - 5 - wave) < 2) grid[r][c] = r < 5 ? B_MYCELIAL : B_BROWN;
        }
      grid[4][3] = B_PURPLE; grid[6][9] = B_PURPLE; grid[5][6] = B_RED;
      break;

    case 18: // DNA Helix
      for (let r = 0; r < 12; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const s1 = Math.sin(r * 0.7) * 3 + 5.5;
          const s2 = Math.sin(r * 0.7 + Math.PI) * 3 + 5.5;
          if (Math.abs(c - s1) < 1 || Math.abs(c - s2) < 1)
            grid[r + 1][c] = B_GREEN;
          if (r % 3 === 0 && c > Math.min(s1, s2) && c < Math.max(s1, s2))
            grid[r + 1][c] = B_SPORE;
        }
      grid[4][5] = B_PURPLE; grid[8][6] = B_PURPLE;
      break;

    case 19: // Fortress of Caps
      for (let c = 1; c < 11; c++) grid[6][c] = B_GREEN;
      for (let r = 1; r < 6; r++) { grid[r][1] = B_GREEN; grid[r][10] = B_GREEN; }
      for (let c = 1; c < 11; c += 2) grid[1][c] = B_GOLD;
      for (let r = 2; r < 6; r++) for (let c = 3; c < 9; c++) grid[r][c] = B_REACTOR;
      grid[4][5] = B_SILVER; grid[4][6] = B_SILVER; grid[5][5] = B_SILVER; grid[5][6] = B_SILVER;
      grid[2][5] = B_PURPLE; grid[2][6] = B_PURPLE; grid[3][4] = B_RED; grid[3][7] = B_RED;
      break;

    case 20: // BOSS: Canopy Guardian
      for (let c = 0; c < BRICK_COLS; c++) grid[1][c] = B_SILVER;
      for (let c = 2; c < 10; c++) grid[3][c] = B_REACTOR;
      for (let c = 4; c < 8; c++) grid[5][c] = B_SPORE;
      grid[3][5] = B_PURPLE; grid[3][6] = B_PURPLE; grid[5][5] = B_RED; grid[5][6] = B_RED;
      break;

    case 21: // Narrow Corridor
      for (let r = 1; r < 12; r++) {
        grid[r][0] = B_SILVER; grid[r][BRICK_COLS - 1] = B_SILVER;
        grid[r][3] = B_SILVER; grid[r][8] = B_SILVER;
      }
      for (let r = 1; r < 12; r++)
        for (let c = 4; c < 8; c++)
          if (grid[r][c] === B_NONE) grid[r][c] = r % 3 === 0 ? B_REACTOR : B_GREEN;
      grid[2][5] = B_PURPLE; grid[6][6] = B_PURPLE; grid[9][5] = B_RED;
      break;

    case 22: // Silver Cage
      for (let c = 0; c < BRICK_COLS; c++) { grid[1][c] = B_SILVER; grid[9][c] = B_SILVER; }
      for (let r = 1; r < 10; r++) { grid[r][0] = B_SILVER; grid[r][BRICK_COLS - 1] = B_SILVER; }
      for (let r = 2; r < 9; r++)
        for (let c = 1; c < BRICK_COLS - 1; c++)
          grid[r][c] = (r + c) % 4 === 0 ? B_GOLD : B_MYCELIAL;
      grid[5][0] = B_NONE; grid[5][BRICK_COLS - 1] = B_NONE;
      grid[3][5] = B_PURPLE; grid[7][6] = B_PURPLE; grid[5][5] = B_RED; grid[5][6] = B_RED;
      break;

    case 23: // Speed Demon
      for (let r = 2; r < 5; r++)
        for (let c = 2; c < 10; c++) grid[r][c] = B_SPORE;
      grid[3][5] = B_GOLD; grid[3][6] = B_GOLD;
      grid[2][4] = B_PURPLE; grid[4][7] = B_PURPLE;
      break;

    case 24: // Grid of Gold
      for (let r = 1; r < 8; r++)
        for (let c = 1; c < BRICK_COLS - 1; c++)
          grid[r][c] = (r + c) % 2 === 0 ? B_GOLD : B_REACTOR;
      grid[4][5] = B_RED; grid[4][6] = B_RED;
      grid[2][3] = B_PURPLE; grid[6][8] = B_PURPLE; grid[2][8] = B_PURPLE;
      break;

    case 25: // BOSS: Spore Titan
      for (let r = 1; r < 11; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if (c % 2 === 0) grid[r][c] = B_SILVER;
          else grid[r][c] = r < 4 ? B_GOLD : (r < 7 ? B_SPORE : B_MYCELIAL);
      grid[3][1] = B_PURPLE; grid[5][3] = B_PURPLE; grid[7][5] = B_PURPLE;
      grid[9][7] = B_RED; grid[5][9] = B_RED;
      break;

    case 26: // Maze of Mycelium
      for (let r = 1; r < 11; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (r === 1 || r === 10) { grid[r][c] = B_SILVER; continue; }
          if (r === 3 && c > 2) grid[r][c] = B_SILVER;
          if (r === 5 && c < 9) grid[r][c] = B_SILVER;
          if (r === 7 && c > 2) grid[r][c] = B_SILVER;
          if (r === 9 && c < 9) grid[r][c] = B_SILVER;
        }
      for (let r = 2; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++)
          if (grid[r][c] === B_NONE && Math.random() < 0.4) grid[r][c] = B_MYCELIAL;
      grid[2][5] = B_PURPLE; grid[4][3] = B_PURPLE; grid[8][7] = B_PURPLE;
      grid[6][5] = B_RED;
      break;

    case 27: // Diagonal Doom
      for (let r = 1; r < 12; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (Math.abs(r - c) < 2 || Math.abs(r - (BRICK_COLS - 1 - c)) < 2)
            grid[r][c] = B_SILVER;
          else if ((r + c) % 3 === 0) grid[r][c] = B_REACTOR;
        }
      grid[3][5] = B_PURPLE; grid[6][6] = B_PURPLE; grid[9][3] = B_PURPLE;
      grid[5][5] = B_RED; grid[7][7] = B_RED;
      break;

    case 28: // Dense Wall
      for (let r = 1; r < 10; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (r === 1 || r === 5 || r === 9) grid[r][c] = B_SILVER;
          else grid[r][c] = r % 2 === 0 ? B_GOLD : B_SPORE;
        }
      grid[1][5] = B_NONE; grid[5][3] = B_NONE; grid[5][8] = B_NONE; grid[9][6] = B_NONE;
      grid[2][2] = B_PURPLE; grid[4][9] = B_PURPLE; grid[6][5] = B_PURPLE;
      grid[3][5] = B_RED; grid[7][6] = B_RED; grid[8][3] = B_RED;
      break;

    case 29: // Final Gauntlet
      for (let r = 1; r < 13; r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          if (c === 0 || c === BRICK_COLS - 1) grid[r][c] = B_SILVER;
          else if (r % 4 === 1) grid[r][c] = B_SILVER;
          else grid[r][c] = B_REACTOR;
        }
      grid[1][5] = B_NONE; grid[5][3] = B_NONE; grid[5][8] = B_NONE;
      grid[9][6] = B_NONE; grid[9][2] = B_NONE;
      grid[2][5] = B_PURPLE; grid[6][4] = B_PURPLE; grid[10][7] = B_PURPLE;
      grid[3][6] = B_RED; grid[7][5] = B_RED; grid[11][4] = B_RED;
      break;

    case 30: // FINAL BOSS: The Mycelial Overmind
      for (let c = 0; c < BRICK_COLS; c++) { grid[1][c] = B_SILVER; grid[2][c] = B_SILVER; }
      for (let c = 3; c < 9; c++) { grid[4][c] = B_REACTOR; grid[5][c] = B_REACTOR; }
      grid[4][5] = B_RED; grid[4][6] = B_RED; grid[5][5] = B_RED; grid[5][6] = B_RED;
      grid[4][3] = B_PURPLE; grid[4][8] = B_PURPLE; grid[5][3] = B_PURPLE; grid[5][8] = B_PURPLE;
      break;

    default:
      for (let r = 1; r < 6 + Math.floor(lv / 5); r++)
        for (let c = 0; c < BRICK_COLS; c++) {
          const rand = Math.random();
          if (rand < 0.2) grid[r][c] = B_BROWN;
          else if (rand < 0.35) grid[r][c] = B_GREEN;
          else if (rand < 0.45) grid[r][c] = B_SPORE;
          else if (rand < 0.55) grid[r][c] = B_REACTOR;
          else if (rand < 0.6) grid[r][c] = B_GOLD;
          else if (rand < 0.65) grid[r][c] = B_SILVER;
        }
      break;
  }

  return grid;
}

// ============================================================
// BRICK HIT POINTS
// ============================================================
let brickHP = [];

function initBrickHP() {
  brickHP = [];
  for (let r = 0; r < BRICK_ROWS; r++) {
    brickHP[r] = [];
    for (let c = 0; c < BRICK_COLS; c++) {
      switch (bricks[r][c]) {
        case B_BROWN: brickHP[r][c] = 1; break;
        case B_GREEN: brickHP[r][c] = 2; break;
        case B_GOLD: brickHP[r][c] = 3; break;
        case B_SILVER: brickHP[r][c] = 999; break;
        case B_PURPLE: brickHP[r][c] = 1; break;
        case B_RED: brickHP[r][c] = 1; break;
        case B_SPORE: brickHP[r][c] = 2; break;
        case B_REACTOR: brickHP[r][c] = 4; break;
        case B_MYCELIAL: brickHP[r][c] = 1; break;
        default: brickHP[r][c] = 0;
      }
    }
  }
}

// ============================================================
// BOSS SYSTEM — Baseling-themed bosses every 5 levels
// ============================================================
const BOSS_NAMES = {
  5: 'GARDEN SENTINEL',
  10: 'FUNGAL QUEEN',
  15: 'POOP HIVE',
  20: 'CANOPY GUARDIAN',
  25: 'SPORE TITAN',
  30: 'BASELING OVERMIND'
};

function spawnBoss(lv) {
  const tier = Math.floor(lv / 5);
  const hp = Math.floor((15 + tier * 10) * HP_MULT); // CON: boss HP scaling
  const spd = 100 + tier * 20;
  boss = {
    x: GAME_W / 2,
    y: 80,
    w: 90 + tier * 10,
    h: 40 + tier * 4,
    hp: hp,
    maxHp: hp,
    vx: spd,
    shootTimer: 0,
    shootInterval: Math.max(0.4, 1.8 - tier * 0.2),
    phase: 0,
    flash: 0,
    name: BOSS_NAMES[lv] || 'BOSS',
    type: tier, // used for visual variety
    dashTimer: 0,
    sporeTimer: 0
  };
  bossProjectiles = [];
}

function updateBoss(dt) {
  if (!boss) return;

  // Movement patterns based on type
  if (boss.type >= 3) {
    // Higher-tier bosses do sine-wave movement
    boss.phase += dt * 2;
    boss.x += boss.vx * dt;
    boss.y = 70 + Math.sin(boss.phase) * 20;
  } else {
    boss.x += boss.vx * dt;
  }

  if (boss.x - boss.w / 2 < 0 || boss.x + boss.w / 2 > GAME_W) {
    boss.vx *= -1;
    boss.x = Math.max(boss.w / 2, Math.min(GAME_W - boss.w / 2, boss.x));
  }

  // Shooting
  boss.shootTimer += dt;
  if (boss.shootTimer >= boss.shootInterval) {
    boss.shootTimer = 0;
    // Different attack patterns per tier
    if (boss.type >= 4) {
      // Spread shot
      for (let a = -1; a <= 1; a++) {
        bossProjectiles.push({
          x: boss.x + a * 20,
          y: boss.y + boss.h / 2,
          vx: a * 60,
          vy: 200 + level * 5,
          type: 'spore'
        });
      }
    } else {
      bossProjectiles.push({
        x: boss.x + (Math.random() - 0.5) * boss.w * 0.6,
        y: boss.y + boss.h / 2,
        vx: 0,
        vy: 200 + level * 5,
        type: 'normal'
      });
    }

    // Spore drops from higher-tier bosses
    if (boss.type >= 2) {
      boss.sporeTimer += boss.shootInterval;
      if (boss.sporeTimer > 3) {
        boss.sporeTimer = 0;
        // Drop a power-up from the boss
        powerups.push({ x: boss.x, y: boss.y + boss.h / 2 + 5, type: Math.floor(Math.random() * 10), vy: POWERUP_SPEED });
      }
    }
  }

  if (boss.flash > 0) boss.flash -= dt * 5;

  // Update projectiles
  for (let i = bossProjectiles.length - 1; i >= 0; i--) {
    const p = bossProjectiles[i];
    p.y += p.vy * dt;
    p.x += (p.vx || 0) * dt;
    if (p.y > GAME_H || p.x < -10 || p.x > GAME_W + 10) {
      bossProjectiles.splice(i, 1);
      continue;
    }
    // Hit paddle?
    const py = GAME_H - PADDLE_Y_OFFSET;
    if (p.y > py - 5 && p.y < py + 10 && Math.abs(p.x - paddleX) < paddleW / 2 + 5) {
      bossProjectiles.splice(i, 1);
      if (sporeShieldActive) {
        sporeShieldActive = false;
        SFX.shieldBreak();
        spawnParticles(paddleX, py, '#38d973', 8, 3);
      } else {
        killBall(0);
      }
    }
  }
}

function drawBoss() {
  if (!boss) return;
  const bx = boss.x - boss.w / 2, by = boss.y - boss.h / 2;

  // Draw body based on boss type
  if (boss.type <= 1) {
    // Sporeling / Mycelial Queen — mushroom shape
    const grad = ctx.createLinearGradient(bx, by, bx, by + boss.h);
    grad.addColorStop(0, boss.flash > 0 ? '#fff' : '#aa44cc');
    grad.addColorStop(1, '#440066');
    ctx.fillStyle = grad;
    // Cap (dome)
    ctx.beginPath();
    ctx.ellipse(boss.x, by + boss.h * 0.4, boss.w / 2, boss.h * 0.5, 0, Math.PI, 0);
    ctx.fill();
    // Stem
    ctx.fillStyle = boss.flash > 0 ? '#eee' : '#ddccaa';
    ctx.fillRect(boss.x - boss.w * 0.2, by + boss.h * 0.35, boss.w * 0.4, boss.h * 0.65);
    // Eyes
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(boss.x - 12, boss.y - 5, 4, 0, Math.PI * 2);
    ctx.arc(boss.x + 12, boss.y - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    // Spore dots on cap
    ctx.fillStyle = 'rgba(255,255,200,0.5)';
    for (let i = 0; i < 5; i++) {
      const sx = boss.x + Math.cos(i * 1.2 + levelTime) * boss.w * 0.3;
      const sy = by + 8 + Math.sin(i * 1.5) * 6;
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (boss.type <= 3) {
    // Reactor Hive / Canopy Guardian — mechanical hive shape
    const grad = ctx.createLinearGradient(bx, by, bx, by + boss.h);
    grad.addColorStop(0, boss.flash > 0 ? '#fff' : '#ff8800');
    grad.addColorStop(1, '#662200');
    ctx.fillStyle = grad;
    ctx.fillRect(bx, by, boss.w, boss.h);
    // Reactor core glow
    ctx.fillStyle = 'rgba(255,200,0,' + (0.4 + Math.sin(levelTime * 6) * 0.2) + ')';
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, 18, 0, Math.PI * 2);
    ctx.fill();
    // Hex pattern
    ctx.strokeStyle = 'rgba(255,150,0,0.3)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + levelTime * 0.5;
      ctx.beginPath();
      ctx.moveTo(boss.x, boss.y);
      ctx.lineTo(boss.x + Math.cos(a) * boss.w * 0.4, boss.y + Math.sin(a) * boss.h * 0.4);
      ctx.stroke();
    }
    // Vent slits
    ctx.fillStyle = '#ff4400';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(bx + 10 + i * (boss.w - 20) / 3, by + boss.h - 6, 8, 4);
    }
  } else {
    // Spore Titan / Mycelial Overmind — massive organic horror
    const grad = ctx.createRadialGradient(boss.x, boss.y, 5, boss.x, boss.y, boss.w / 2);
    grad.addColorStop(0, boss.flash > 0 ? '#fff' : '#44ff44');
    grad.addColorStop(0.5, '#228822');
    grad.addColorStop(1, '#003300');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(boss.x, boss.y, boss.w / 2, boss.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tendrils
    ctx.strokeStyle = '#44aa44';
    ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const a = i * Math.PI / 3 + Math.sin(levelTime * 2 + i) * 0.3;
      ctx.beginPath();
      ctx.moveTo(boss.x + Math.cos(a) * boss.w * 0.3, boss.y + Math.sin(a) * boss.h * 0.3);
      ctx.lineTo(boss.x + Math.cos(a) * boss.w * 0.6, boss.y + Math.sin(a) * boss.h * 0.8);
      ctx.stroke();
    }
    // Multiple eyes
    ctx.fillStyle = '#ff0000';
    for (let i = 0; i < 3; i++) {
      const ex = boss.x - 15 + i * 15;
      const ey = boss.y - 4 + Math.sin(levelTime * 3 + i) * 3;
      ctx.beginPath();
      ctx.arc(ex, ey, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // HP bar
  const hpW = boss.w * 0.9;
  const hpX = boss.x - hpW / 2;
  ctx.fillStyle = '#222';
  ctx.fillRect(hpX, by - 16, hpW, 10);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpX, by - 16, hpW, 10);
  const hpRatio = boss.hp / boss.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#44ff44' : (hpRatio > 0.25 ? '#ffaa00' : '#ff4444');
  ctx.fillRect(hpX + 1, by - 15, (hpW - 2) * hpRatio, 8);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, boss.x, by - 20);

  // Projectiles
  for (const p of bossProjectiles) {
    if (p.type === 'spore') {
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(56,217,115,0.3)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
function startGame() {
  level = 1;
  lives = 3; // fixed starting lives (STA only raises the MAX_LIVES cushion cap, tiny in PvP)
  score = 0;
  combo = 0;
  startLevel();
}

function startLevel() {
  bricks = generateLevel(level);
  initBrickHP();
  paddleW = paddleBaseW;
  paddleX = GAME_W / 2;
  balls = [{ x: GAME_W / 2, y: GAME_H - PADDLE_Y_OFFSET - BALL_R - 2, vx: 0, vy: 0, stuck: true }];
  powerups = [];
  lasers = [];
  reactorBeams = [];
  activePowers = {};
  launched = false;
  particles = [];
  scorePopups = [];
  boss = null;
  bossProjectiles = [];
  sporeShieldActive = false;
  ballSpeed = BASE_BALL_SPEED + (level - 1) * 8;
  if (level === 23) ballSpeed += 100; // speed demon
  levelTime = 0;

  // Boss every 5 levels
  if (level % 5 === 0) {
    spawnBoss(level);
  }

  state = 'playing';
}

function launchBall() {
  if (launched) return;
  launched = true;
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.5;
  balls[0].vx = Math.cos(angle) * ballSpeed;
  balls[0].vy = Math.sin(angle) * ballSpeed;
  balls[0].stuck = false;
}

function resetBall() {
  balls = [{ x: paddleX, y: GAME_H - PADDLE_Y_OFFSET - BALL_R - 2, vx: 0, vy: 0, stuck: true }];
  launched = false;
  activePowers = {};
  paddleW = paddleBaseW;
  lasers = [];
  reactorBeams = [];
  sporeShieldActive = false;
}

function killBall(idx) {
  if (sporeShieldActive && balls.length <= 1) {
    // Spore shield absorbs the hit
    sporeShieldActive = false;
    SFX.shieldBreak();
    spawnParticles(paddleX, GAME_H - PADDLE_Y_OFFSET, '#38d973', 10, 3);
    return;
  }
  if (balls.length > 1) {
    balls.splice(idx, 1);
    return;
  }
  lives--;
  combo = 0;
  if (lives <= 0) {
    state = 'gameOver';
    SFX.gameOver();
    if (score > highScore) { highScore = score; localStorage.setItem('spore_breaker_high', highScore.toString()); }
    stateTimer = 0;
  } else {
    state = 'dead';
    SFX.die();
    stateTimer = 0;
  }
}

function checkLevelClear() {
  if (boss && boss.hp > 0) return false;
  for (let r = 0; r < BRICK_ROWS; r++)
    for (let c = 0; c < BRICK_COLS; c++)
      if (bricks[r][c] !== B_NONE && bricks[r][c] !== B_SILVER) return false;
  return true;
}

function hitBrick(r, c, ball) {
  if (r < 0 || r >= BRICK_ROWS || c < 0 || c >= BRICK_COLS) return;
  if (bricks[r][c] === B_NONE) return;
  if (bricks[r][c] === B_SILVER) {
    SFX.hitSilver();
    spawnParticles(c * BRICK_W + BRICK_W / 2, BRICK_TOP_OFFSET + r * BRICK_H + BRICK_H / 2, '#aaa', 3, 1);
    return;
  }

  // STR: damage multiplier — extra hits per strike
  let dmg = Math.max(1, Math.floor(DAMAGE_MULT));
  brickHP[r][c] -= dmg;

  if (brickHP[r][c] <= 0) {
    const bx = c * BRICK_W + BRICK_W / 2;
    const by = BRICK_TOP_OFFSET + r * BRICK_H + BRICK_H / 2;
    const type = bricks[r][c];

    // INT: score multiplier
    combo++;
    const basePoints = type === B_GOLD ? 30 : type === B_REACTOR ? 40 : type === B_GREEN ? 20 : type === B_SPORE ? 25 : type === B_MYCELIAL ? 15 : 10;
    const points = Math.floor(basePoints * Math.min(combo, 10) * SCORE_MULT);
    score += points;
    spawnScorePopup(bx, by - 5, '+' + points, type === B_GOLD ? '#f4b41b' : type === B_REACTOR ? '#ff8800' : type === B_SPORE ? '#38d973' : '#ffdd44');

    // Brick-type-specific effects
    if (type === B_RED) {
      SFX.explode();
      spawnParticles(bx, by, '#ff4400', 15, 4);
      flashAlpha = 0.3; flashColor = '#ff4400';
      shakeTime = 0.2;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++)
          if (dr !== 0 || dc !== 0) hitBrick(r + dr, c + dc, null);
    } else if (type === B_GOLD) {
      SFX.hitGold();
      spawnParticles(bx, by, '#f4b41b', 8, 3);
    } else if (type === B_PURPLE) {
      SFX.powerup();
      spawnParticles(bx, by, '#a855f7', 8, 2);
      dropPowerup(bx, by);
    } else if (type === B_SPORE) {
      // Spore brick: spreads spore particles and may spawn new brown bricks nearby
      SFX.sporeSpread();
      spawnParticles(bx, by, '#38d973', 12, 3);
      // 50% chance to spread a brown brick to an empty adjacent cell
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      for (const d of dirs) {
        const nr = r + d[0], nc = c + d[1];
        if (nr >= 0 && nr < BRICK_ROWS && nc >= 0 && nc < BRICK_COLS && bricks[nr][nc] === B_NONE && Math.random() < 0.3) {
          bricks[nr][nc] = B_BROWN;
          brickHP[nr][nc] = 1;
          spawnParticles(nc * BRICK_W + BRICK_W / 2, BRICK_TOP_OFFSET + nr * BRICK_H + BRICK_H / 2, '#38d973', 3, 1);
        }
      }
    } else if (type === B_REACTOR) {
      // Reactor core: energy pulse damages all bricks in a 2-cell radius
      SFX.reactorPulse();
      spawnParticles(bx, by, '#ff8800', 20, 5);
      flashAlpha = 0.2; flashColor = '#ff8800';
      shakeTime = 0.15;
      for (let dr = -2; dr <= 2; dr++)
        for (let dc = -2; dc <= 2; dc++) {
          if (dr === 0 && dc === 0) continue;
          if (Math.abs(dr) + Math.abs(dc) <= 2) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < BRICK_ROWS && nc >= 0 && nc < BRICK_COLS && bricks[nr][nc] !== B_NONE && bricks[nr][nc] !== B_SILVER) {
              brickHP[nr][nc] = Math.max(0, brickHP[nr][nc] - 1);
              if (brickHP[nr][nc] <= 0) {
                const nbx = nc * BRICK_W + BRICK_W / 2;
                const nby = BRICK_TOP_OFFSET + nr * BRICK_H + BRICK_H / 2;
                spawnParticles(nbx, nby, '#ff8800', 4, 2);
                const extraPts = Math.floor(10 * SCORE_MULT);
                score += extraPts;
                spawnScorePopup(nbx, nby - 5, '+' + extraPts, '#ff8800');
                bricks[nr][nc] = B_NONE;
              }
            }
          }
        }
    } else if (type === B_MYCELIAL) {
      // Mycelial web: chain-breaks all connected mycelial bricks
      SFX.mycelialChain();
      spawnParticles(bx, by, '#7c3aed', 8, 2);
      // BFS to find connected mycelial bricks
      const visited = new Set();
      const queue = [];
      const dirs2 = [[-1,0],[1,0],[0,-1],[0,1]];
      visited.add(r + ',' + c);
      for (const d of dirs2) {
        const nr = r + d[0], nc = c + d[1];
        if (nr >= 0 && nr < BRICK_ROWS && nc >= 0 && nc < BRICK_COLS && bricks[nr][nc] === B_MYCELIAL) {
          queue.push([nr, nc]);
          visited.add(nr + ',' + nc);
        }
      }
      while (queue.length > 0) {
        const [cr, cc] = queue.shift();
        const cbx = cc * BRICK_W + BRICK_W / 2;
        const cby = BRICK_TOP_OFFSET + cr * BRICK_H + BRICK_H / 2;
        bricks[cr][cc] = B_NONE;
        brickHP[cr][cc] = 0;
        spawnParticles(cbx, cby, '#7c3aed', 5, 2);
        const chainPts = Math.floor(15 * SCORE_MULT);
        score += chainPts;
        spawnScorePopup(cbx, cby - 5, '+' + chainPts, '#7c3aed');
        for (const d of dirs2) {
          const nr = cr + d[0], nc = cc + d[1];
          const key = nr + ',' + nc;
          if (nr >= 0 && nr < BRICK_ROWS && nc >= 0 && nc < BRICK_COLS && bricks[nr][nc] === B_MYCELIAL && !visited.has(key)) {
            queue.push([nr, nc]);
            visited.add(key);
          }
        }
      }
    } else {
      SFX.hit();
      spawnParticles(bx, by, type === B_GREEN ? '#38d973' : '#7a444a', 5, 2);
    }

    bricks[r][c] = B_NONE;
  } else {
    SFX.hitHard();
    const bx = c * BRICK_W + BRICK_W / 2;
    const by = BRICK_TOP_OFFSET + r * BRICK_H + BRICK_H / 2;
    spawnParticles(bx, by, '#fff', 2, 1);
  }
}

function dropPowerup(x, y) {
  // CHA: luck multiplier increases chance of rare power-ups
  let type;
  const roll = Math.random() * LUCK_MULT; // Higher luck = higher roll = rarer powerups
  if (roll > 1.8) {
    // Rare Tasern powerups
    type = 7 + Math.floor(Math.random() * 3); // SPORE_SHIELD, REACTOR_BEAM, FUNGAL_MULTI
  } else if (roll > 1.2) {
    type = PU_LIFE; // Extra life is semi-rare
  } else {
    type = Math.floor(Math.random() * 7);
  }
  powerups.push({ x, y, type, vy: POWERUP_SPEED });
}

function activatePower(type) {
  SFX.powerup();
  // WIS: power-up duration scaling (COOLDOWN_INV = inverse of cooldown, so higher WIS = longer)
  const durScale = COOLDOWN_INV;

  switch (type) {
    case PU_WIDEN:
      paddleW = Math.min(paddleBaseW * 1.8, paddleW + 30);
      activePowers[PU_WIDEN] = 15 * durScale; // WIS scales duration
      break;
    case PU_MULTI:
      const newBalls = [];
      for (const b of balls) {
        if (b.stuck) continue;
        for (let i = 0; i < 2; i++) {
          const angle = Math.atan2(b.vy, b.vx) + (i === 0 ? 0.4 : -0.4);
          const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          newBalls.push({ x: b.x, y: b.y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, stuck: false });
        }
      }
      balls = balls.concat(newBalls);
      break;
    case PU_LASER:
      activePowers[PU_LASER] = 12 * durScale; // WIS scales duration
      break;
    case PU_SLOW:
      ballSpeed = Math.max(200, ballSpeed * 0.65);
      for (const b of balls) {
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        if (spd > 0) { b.vx = b.vx / spd * ballSpeed; b.vy = b.vy / spd * ballSpeed; }
      }
      activePowers[PU_SLOW] = 10 * durScale; // WIS scales duration
      break;
    case PU_LIFE:
      lives = Math.min(MAX_LIVES, lives + 1);
      break;
    case PU_MAGNET:
      activePowers[PU_MAGNET] = 12 * durScale; // WIS scales duration
      break;
    case PU_PASS:
      activePowers[PU_PASS] = 8 * durScale; // WIS scales duration
      break;
    case PU_SPORE_SHIELD:
      // Baseling: absorbs one hit (ball loss or boss projectile)
      sporeShieldActive = true;
      SFX.shieldUp();
      spawnParticles(paddleX, GAME_H - PADDLE_Y_OFFSET, '#38d973', 10, 2);
      break;
    case PU_REACTOR_BEAM:
      // Baseling: press X to fire a vertical beam
      activePowers[PU_REACTOR_BEAM] = 10 * durScale; // WIS scales duration
      break;
    case PU_FUNGAL_MULTI:
      // Baseling: split into 5 spore balls
      const fungalBalls = [];
      for (const b of balls) {
        if (b.stuck) continue;
        for (let i = 0; i < 4; i++) {
          const angle = Math.atan2(b.vy, b.vx) + (i - 1.5) * 0.35;
          const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          fungalBalls.push({ x: b.x, y: b.y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, stuck: false });
        }
      }
      balls = balls.concat(fungalBalls);
      spawnParticles(balls[0].x, balls[0].y, '#a855f7', 15, 3);
      break;
  }
}

// ============================================================
// UPDATE
// ============================================================
let lastLaserTime = 0;

function update(dt) {
  zonePulse += dt;

  if (state === 'dead') {
    stateTimer += dt;
    if (stateTimer > 1.5) { resetBall(); state = 'playing'; }
    updateParticles(dt);
    updateScorePopups(dt);
    return;
  }
  if (state === 'levelClear') {
    stateTimer += dt;
    updateParticles(dt);
    updateScorePopups(dt);
    if (stateTimer > 2) {
      level++;
      if (level > TOTAL_LEVELS) {
        state = 'win';
        if (score > highScore) { highScore = score; localStorage.setItem('spore_breaker_high', highScore.toString()); }
      } else {
        startLevel();
      }
    }
    return;
  }
  if (state !== 'playing') return;

  levelTime += dt;

  // Keyboard paddle movement — DEX: speed multiplier
  const keySpeed = 400 * SPEED_MULT; // DEX scales paddle speed
  if (keyLeft) inputX = paddleX - keySpeed * dt;
  if (keyRight) inputX = paddleX + keySpeed * dt;

  // Paddle movement — DEX: interpolation speed
  const paddleLerp = 0.3 * SPEED_MULT; // DEX scales responsiveness
  paddleX += (inputX - paddleX) * Math.min(paddleLerp, 1);
  paddleX = Math.max(paddleW / 2, Math.min(GAME_W - paddleW / 2, paddleX));

  // Power timers
  for (const key in activePowers) {
    activePowers[key] -= dt;
    if (activePowers[key] <= 0) {
      delete activePowers[key];
      if (parseInt(key) === PU_WIDEN) paddleW = paddleBaseW;
      if (parseInt(key) === PU_SLOW) {
        ballSpeed = BASE_BALL_SPEED + (level - 1) * 8;
        for (const b of balls) {
          const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
          if (spd > 0) { b.vx = b.vx / spd * ballSpeed; b.vy = b.vy / spd * ballSpeed; }
        }
      }
    }
  }

  // Laser shooting
  if (activePowers[PU_LASER] !== undefined) {
    lastLaserTime += dt;
    if (lastLaserTime > 0.2) {
      lastLaserTime = 0;
      lasers.push({ x: paddleX - paddleW / 3, y: GAME_H - PADDLE_Y_OFFSET - 10 });
      lasers.push({ x: paddleX + paddleW / 3, y: GAME_H - PADDLE_Y_OFFSET - 10 });
      SFX.laser();
    }
  }

  // Update reactor beams
  for (let i = reactorBeams.length - 1; i >= 0; i--) {
    const rb = reactorBeams[i];
    rb.life -= dt;
    if (rb.life <= 0) { reactorBeams.splice(i, 1); continue; }
    // Beam hits all bricks in its column
    const beamCol = Math.floor(rb.x / BRICK_W);
    for (let rr = 0; rr < BRICK_ROWS; rr++) {
      if (beamCol >= 0 && beamCol < BRICK_COLS && bricks[rr][beamCol] !== B_NONE) {
        hitBrick(rr, beamCol, null);
      }
    }
    // Hit boss
    if (boss && Math.abs(rb.x - boss.x) < boss.w / 2) {
      boss.hp -= Math.max(1, Math.floor(DAMAGE_MULT)); // STR scales beam damage
      boss.flash = 1;
      SFX.bossHit();
      if (boss.hp <= 0) {
        SFX.bossDie();
        spawnParticles(boss.x, boss.y, '#ff4400', 30, 5);
        const bossScore = Math.floor(500 * level * SCORE_MULT); // INT scales boss score
        score += bossScore;
        spawnScorePopup(boss.x, boss.y, '+' + bossScore, '#ff8800');
        boss = null;
        bossProjectiles = [];
      }
    }
  }

  // Update lasers
  for (let i = lasers.length - 1; i >= 0; i--) {
    lasers[i].y -= LASER_SPEED * dt;
    if (lasers[i].y < 0) { lasers.splice(i, 1); continue; }
    const lc = Math.floor(lasers[i].x / BRICK_W);
    const lr = Math.floor((lasers[i].y - BRICK_TOP_OFFSET) / BRICK_H);
    if (lr >= 0 && lr < BRICK_ROWS && lc >= 0 && lc < BRICK_COLS && bricks[lr][lc] !== B_NONE) {
      hitBrick(lr, lc, null);
      lasers.splice(i, 1);
      continue;
    }
    if (boss && lasers[i].y < boss.y + boss.h / 2 && lasers[i].y > boss.y - boss.h / 2 &&
        lasers[i].x > boss.x - boss.w / 2 && lasers[i].x < boss.x + boss.w / 2) {
      boss.hp -= Math.max(1, Math.floor(DAMAGE_MULT)); // STR scales laser damage
      boss.flash = 1;
      SFX.bossHit();
      lasers.splice(i, 1);
      if (boss.hp <= 0) {
        SFX.bossDie();
        spawnParticles(boss.x, boss.y, '#ff4400', 30, 5);
        const bossScore = Math.floor(500 * level * SCORE_MULT); // INT scales boss score
        score += bossScore;
        spawnScorePopup(boss.x, boss.y, '+' + bossScore, '#ff8800');
        boss = null;
        bossProjectiles = [];
      }
    }
  }

  // Update balls
  const paddleTop = GAME_H - PADDLE_Y_OFFSET;
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];

    if (b.stuck) {
      b.x = paddleX;
      b.y = paddleTop - BALL_R - 2;
      continue;
    }

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Wall collisions
    if (b.x - BALL_R < 0) { b.x = BALL_R; b.vx = Math.abs(b.vx); }
    if (b.x + BALL_R > GAME_W) { b.x = GAME_W - BALL_R; b.vx = -Math.abs(b.vx); }
    if (b.y - BALL_R < 0) { b.y = BALL_R; b.vy = Math.abs(b.vy); }

    // Ball fell below
    if (b.y > GAME_H + BALL_R) {
      killBall(i);
      continue;
    }

    // Paddle collision
    if (b.vy > 0 && b.y + BALL_R >= paddleTop && b.y + BALL_R <= paddleTop + 15 &&
        b.x >= paddleX - paddleW / 2 - BALL_R && b.x <= paddleX + paddleW / 2 + BALL_R) {
      SFX.paddle();
      combo = 0;

      if (activePowers[PU_MAGNET] !== undefined) {
        b.stuck = true;
        b.vx = 0; b.vy = 0;
        b.x = Math.max(paddleX - paddleW / 2 + BALL_R, Math.min(paddleX + paddleW / 2 - BALL_R, b.x));
        b.y = paddleTop - BALL_R - 2;
        launched = false;
      } else {
        const hitPos = (b.x - paddleX) / (paddleW / 2);
        const angle = -Math.PI / 2 + hitPos * Math.PI / 3;
        const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        b.vx = Math.cos(angle) * spd;
        b.vy = Math.sin(angle) * spd;
        b.y = paddleTop - BALL_R - 1;
      }
      continue;
    }

    // Brick collision
    const passThrough = activePowers[PU_PASS] !== undefined;
    const bCol = Math.floor(b.x / BRICK_W);
    const bRow = Math.floor((b.y - BRICK_TOP_OFFSET) / BRICK_H);
    if (bRow >= 0 && bRow < BRICK_ROWS && bCol >= 0 && bCol < BRICK_COLS && bricks[bRow][bCol] !== B_NONE) {
      hitBrick(bRow, bCol, b);
      if (!passThrough || bricks[bRow][bCol] === B_SILVER) {
        const brickLeft = bCol * BRICK_W;
        const brickRight = brickLeft + BRICK_W;
        const brickTop = BRICK_TOP_OFFSET + bRow * BRICK_H;
        const brickBottom = brickTop + BRICK_H;

        const overlapLeft = b.x + BALL_R - brickLeft;
        const overlapRight = brickRight - (b.x - BALL_R);
        const overlapTop = b.y + BALL_R - brickTop;
        const overlapBottom = brickBottom - (b.y - BALL_R);

        const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
        if (minOverlap === overlapTop || minOverlap === overlapBottom) b.vy = -b.vy;
        else b.vx = -b.vx;
      }
    }

    // Boss collision — STR: ball damage to boss
    if (boss && b.y - BALL_R < boss.y + boss.h / 2 && b.y + BALL_R > boss.y - boss.h / 2 &&
        b.x + BALL_R > boss.x - boss.w / 2 && b.x - BALL_R < boss.x + boss.w / 2) {
      const ballDmg = Math.max(1, Math.floor(2 * DAMAGE_MULT)); // STR scales ball damage to boss
      boss.hp -= ballDmg;
      boss.flash = 1;
      SFX.bossHit();
      b.vy = Math.abs(b.vy);
      spawnParticles(b.x, b.y, '#ff6600', 5, 2);
      shakeTime = 0.08;
      if (boss.hp <= 0) {
        SFX.bossDie();
        spawnParticles(boss.x, boss.y, '#ff4400', 30, 5);
        flashAlpha = 0.4; flashColor = '#ff8800';
        shakeTime = 0.3;
        const bossScore = Math.floor(500 * level * SCORE_MULT); // INT scales boss score
        score += bossScore;
        spawnScorePopup(boss.x, boss.y, '+' + bossScore, '#ff8800');
        boss = null;
        bossProjectiles = [];
      }
    }

    // Speed correction
    const currentSpeed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
    if (Math.abs(currentSpeed - ballSpeed) > 10) {
      b.vx = b.vx / currentSpeed * ballSpeed;
      b.vy = b.vy / currentSpeed * ballSpeed;
    }
    // Prevent too-horizontal angles
    if (Math.abs(b.vy) < ballSpeed * 0.15) {
      b.vy = (b.vy < 0 ? -1 : 1) * ballSpeed * 0.15;
      const s = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      b.vx = b.vx / s * ballSpeed;
      b.vy = b.vy / s * ballSpeed;
    }
  }

  // Update powerups — CHA: luck increases extra drop chances
  for (let i = powerups.length - 1; i >= 0; i--) {
    powerups[i].y += powerups[i].vy * dt;
    if (powerups[i].y > GAME_H) { powerups.splice(i, 1); continue; }
    const pu = powerups[i];
    if (pu.y + POWERUP_SIZE / 2 > paddleTop - 5 && pu.y - POWERUP_SIZE / 2 < paddleTop + 10 &&
        Math.abs(pu.x - paddleX) < paddleW / 2 + POWERUP_SIZE / 2) {
      activatePower(pu.type);
      powerups.splice(i, 1);
      // CHA: luck chance to get a bonus second powerup
      if (Math.random() < (LUCK_MULT - 1) * 0.3) {
        const bonusType = Math.floor(Math.random() * 10);
        powerups.push({ x: paddleX + (Math.random() - 0.5) * 40, y: paddleTop - 40, type: bonusType, vy: POWERUP_SPEED });
      }
    }
  }

  // Update boss
  updateBoss(dt);

  // Update effects
  updateParticles(dt);
  updateScorePopups(dt);
  if (flashAlpha > 0) flashAlpha -= dt * 3;
  if (shakeTime > 0) shakeTime -= dt;

  // Check level clear
  if (checkLevelClear()) {
    state = 'levelClear';
    stateTimer = 0;
    SFX.levelClear();
    const clearBonus = Math.floor(100 * level * SCORE_MULT); // INT scales level clear bonus
    score += clearBonus;
    spawnScorePopup(GAME_W / 2, GAME_H / 2, '+' + clearBonus + ' CLEAR!', '#38d973');
  }
}

// ============================================================
// DRAWING
// ============================================================
function getBrickColor(type, hp) {
  switch (type) {
    case B_BROWN: return '#7a444a';
    case B_GREEN: return hp > 1 ? '#2a9e55' : '#38d973';
    case B_GOLD: return hp > 2 ? '#b8860b' : (hp > 1 ? '#d4a017' : '#f4b41b');
    case B_SILVER: return '#99aabb';
    case B_PURPLE: return '#a855f7';
    case B_RED: return '#cc2222';
    case B_SPORE: return hp > 1 ? '#2a7a3a' : '#38d973';
    case B_REACTOR: return hp > 3 ? '#7a444a' : (hp > 2 ? '#a8603a' : (hp > 1 ? '#f4b41b' : '#f7d76b'));
    case B_MYCELIAL: return '#7c3aed';
    default: return '#000';
  }
}

function getBrickHighlight(type) {
  switch (type) {
    case B_BROWN: return '#a06068';
    case B_GREEN: return '#5efa8e';
    case B_GOLD: return '#fce588';
    case B_SILVER: return '#ccddee';
    case B_PURPLE: return '#c084fc';
    case B_RED: return '#ff5555';
    case B_SPORE: return '#5efa8e';
    case B_REACTOR: return '#fce588';
    case B_MYCELIAL: return '#a78bfa';
    default: return '#fff';
  }
}

function drawBrick(r, c) {
  const type = bricks[r][c];
  if (type === B_NONE) return;
  const x = c * BRICK_W;
  const y = BRICK_TOP_OFFSET + r * BRICK_H;
  const w = BRICK_W - 2;
  const h = BRICK_H - 2;

  ctx.fillStyle = getBrickColor(type, brickHP[r][c]);
  ctx.fillRect(x + 1, y + 1, w, h);

  // Highlight
  ctx.fillStyle = getBrickHighlight(type);
  ctx.globalAlpha = 0.3;
  ctx.fillRect(x + 1, y + 1, w, 3);
  ctx.globalAlpha = 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x + 1, y + h - 2, w, 2);

  // Brick-specific icons
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  if (type === B_GOLD || type === B_GREEN) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('LP', x + BRICK_W / 2, y + BRICK_H / 2 + 3);
  } else if (type === B_RED) {
    ctx.fillStyle = 'rgba(255,200,0,0.5)';
    ctx.font = '10px monospace';
    ctx.fillText('*', x + BRICK_W / 2, y + BRICK_H / 2 + 4);
  } else if (type === B_SPORE) {
    // Spore dots
    ctx.fillStyle = 'rgba(200,255,150,0.4)';
    ctx.beginPath();
    ctx.arc(x + BRICK_W / 2 - 4, y + BRICK_H / 2, 2, 0, Math.PI * 2);
    ctx.arc(x + BRICK_W / 2 + 4, y + BRICK_H / 2, 2, 0, Math.PI * 2);
    ctx.arc(x + BRICK_W / 2, y + BRICK_H / 2 - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === B_REACTOR) {
    // Pulsing core
    const pulse = 0.3 + Math.sin(levelTime * 4 + r + c) * 0.15;
    ctx.fillStyle = 'rgba(255,200,0,' + pulse + ')';
    ctx.beginPath();
    ctx.arc(x + BRICK_W / 2, y + BRICK_H / 2, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (type === B_MYCELIAL) {
    // Web lines
    ctx.strokeStyle = 'rgba(100,180,255,0.4)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 3);
    ctx.lineTo(x + w - 2, y + h - 2);
    ctx.moveTo(x + w - 2, y + 3);
    ctx.lineTo(x + 3, y + h - 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
}

function drawPaddle() {
  const py = GAME_H - PADDLE_Y_OFFSET;
  const px = paddleX - paddleW / 2;
  const hw = paddleW / 2;

  // Baseling mushroom creature as paddle
  // Cap (dome top)
  const capH = 10;
  ctx.fillStyle = statB.color || '#a855f7';
  ctx.beginPath();
  ctx.ellipse(paddleX, py - 4, hw, capH, 0, Math.PI, 0);
  ctx.fill();

  // Cap spots
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = 0; i < 3; i++) {
    const dotX = paddleX - hw * 0.5 + i * hw * 0.5;
    ctx.beginPath();
    ctx.arc(dotX, py - 8, 2 + (i % 2), 0, Math.PI * 2);
    ctx.fill();
  }

  // Body/stem
  const bodyGrad = ctx.createLinearGradient(px, py - 4, px, py + 6);
  bodyGrad.addColorStop(0, '#eeddcc');
  bodyGrad.addColorStop(1, '#ccbbaa');
  ctx.fillStyle = bodyGrad;
  ctx.fillRect(px + 4, py - 4, paddleW - 8, 10);

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(paddleX - 8, py - 1, 2.5, 0, Math.PI * 2);
  ctx.arc(paddleX + 8, py - 1, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(paddleX - 7, py - 2, 1, 0, Math.PI * 2);
  ctx.arc(paddleX + 9, py - 2, 1, 0, Math.PI * 2);
  ctx.fill();

  // Cap edge glow
  ctx.shadowColor = statB.color || '#a855f7';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = statB.color || '#a855f7';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(paddleX, py - 4, hw, capH, 0, Math.PI, 0);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Champion pilot — the selected baseling rides centered on the paddle (cosmetic).
  drawSelectedBaseling(ctx, paddleX, py - 12, 22, { anim: 'idle', frame: Math.floor(zonePulse * 60) });

  // Spore shield indicator
  if (sporeShieldActive) {
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + Math.sin(levelTime * 6) * 0.3;
    ctx.beginPath();
    ctx.ellipse(paddleX, py, hw + 6, 14, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  // Laser indicators
  if (activePowers[PU_LASER] !== undefined) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(px + 5, py - 12, 3, 4);
    ctx.fillRect(px + paddleW - 8, py - 12, 3, 4);
  }

  // Reactor beam indicator
  if (activePowers[PU_REACTOR_BEAM] !== undefined) {
    ctx.fillStyle = '#ff8800';
    ctx.globalAlpha = 0.5 + Math.sin(levelTime * 8) * 0.3;
    ctx.fillRect(paddleX - 2, py - 14, 4, 6);
    ctx.globalAlpha = 1;
  }
}

function drawBall(b) {
  // Spore ball glow
  ctx.beginPath();
  ctx.arc(b.x, b.y, BALL_R + 2, 0, Math.PI * 2);
  ctx.fillStyle = activePowers[PU_PASS] !== undefined ? 'rgba(255,255,255,0.2)' : 'rgba(255,170,0,0.15)';
  ctx.fill();

  // Main ball
  ctx.beginPath();
  ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffdd44';
  ctx.shadowColor = activePowers[PU_PASS] !== undefined ? '#ffffff' : '#ffaa00';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Inner detail — small spore
  ctx.beginPath();
  ctx.arc(b.x, b.y, BALL_R - 2, 0, Math.PI * 2);
  ctx.fillStyle = activePowers[PU_PASS] !== undefined ? '#ffffff' : '#ffee88';
  ctx.fill();

  // Tiny cap on top
  ctx.fillStyle = statB.color || '#a855f7';
  ctx.beginPath();
  ctx.arc(b.x, b.y - 2, 3, Math.PI, 0);
  ctx.fill();
}

function drawPowerup(pu) {
  const px = pu.x - POWERUP_SIZE / 2;
  const py = pu.y - POWERUP_SIZE / 2;

  // Glow
  ctx.fillStyle = PU_COLORS[pu.type] || '#fff';
  ctx.globalAlpha = 0.15;
  ctx.beginPath();
  ctx.arc(pu.x, pu.y, POWERUP_SIZE, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.fillStyle = PU_COLORS[pu.type] || '#fff';
  ctx.globalAlpha = 0.8 + Math.sin(levelTime * 8) * 0.2;
  ctx.fillRect(px, py, POWERUP_SIZE, POWERUP_SIZE);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(px, py, POWERUP_SIZE, POWERUP_SIZE);
  // Label
  ctx.fillStyle = '#000';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(PU_NAMES[pu.type] || '?', pu.x, pu.y + 3);
}

function drawLasers() {
  ctx.fillStyle = '#ff2222';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 5;
  for (const l of lasers) {
    ctx.fillRect(l.x - LASER_W / 2, l.y - LASER_H / 2, LASER_W, LASER_H);
  }
  ctx.shadowBlur = 0;
}

function drawReactorBeams() {
  for (const rb of reactorBeams) {
    const alpha = rb.life * 2;
    ctx.globalAlpha = alpha;
    // Wide beam from paddle to top
    const beamGrad = ctx.createLinearGradient(rb.x, 0, rb.x, GAME_H - PADDLE_Y_OFFSET);
    beamGrad.addColorStop(0, 'rgba(255,136,0,0.1)');
    beamGrad.addColorStop(0.5, 'rgba(255,136,0,0.6)');
    beamGrad.addColorStop(1, 'rgba(255,200,0,0.8)');
    ctx.fillStyle = beamGrad;
    ctx.fillRect(rb.x - 10, 0, 20, GAME_H - PADDLE_Y_OFFSET);
    // Core
    ctx.fillStyle = '#fff';
    ctx.fillRect(rb.x - 2, 0, 4, GAME_H - PADDLE_Y_OFFSET);
    ctx.globalAlpha = 1;
  }
}

function drawBackground() {
  const zone = getZone();

  // Base fill
  ctx.fillStyle = zone.bg1;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Zone-tinted gradient overlay
  const bgGrad = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, 50, GAME_W / 2, GAME_H / 2, GAME_H);
  bgGrad.addColorStop(0, zone.bg2);
  bgGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bgGrad;
  ctx.globalAlpha = 0.3;
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.globalAlpha = 1;

  // Grid lines
  ctx.strokeStyle = zone.grid;
  ctx.lineWidth = 1;
  for (let x = 0; x < GAME_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GAME_H); ctx.stroke();
  }
  for (let y = 0; y < GAME_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GAME_W, y); ctx.stroke();
  }

  // Floating spore motes
  ctx.fillStyle = zone.accent;
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < 12; i++) {
    const mx = (Math.sin(zonePulse * 0.3 + i * 2.1) * 0.5 + 0.5) * GAME_W;
    const my = (Math.cos(zonePulse * 0.2 + i * 1.7) * 0.5 + 0.5) * GAME_H;
    ctx.beginPath();
    ctx.arc(mx, my, 2 + Math.sin(zonePulse + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Side borders glow
  const grad = ctx.createLinearGradient(0, 0, 8, 0);
  grad.addColorStop(0, zone.border);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 8, GAME_H);
  const grad2 = ctx.createLinearGradient(GAME_W, 0, GAME_W - 8, 0);
  grad2.addColorStop(0, zone.border);
  grad2.addColorStop(1, 'transparent');
  ctx.fillStyle = grad2;
  ctx.fillRect(GAME_W - 8, 0, 8, GAME_H);
}

      'CHA ..... Drop luck'
    ];
    for (let i = 0; i < stats.length; i++) {
      ctx.fillText(stats[i], GAME_W / 2, 300 + i * 22);
    }
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.6 + Math.sin(zonePulse * 3) * 0.4;
  ctx.fillText('TAP TO CONTINUE (' + (tutorialPage + 1) + '/3)', GAME_W / 2, 580);
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GAME_W, GAME_H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GAME_W, GAME_H); }
  }
  drawBackground();
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GAME_W / 2, 280);

  // Sad baseling
  const cx = GAME_W / 2, cy = 340;
  ctx.fillStyle = statB.color || '#a855f7';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 25, 18, 0, Math.PI, 0);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#eeddcc';
  ctx.fillRect(cx - 10, cy, 20, 20);
  ctx.fillStyle = '#222';
  ctx.fillText('x', cx - 5, cy + 12);
  ctx.fillText('x', cx + 5, cy + 12);

  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  ctx.fillText('SCORE: ' + score, GAME_W / 2, 400);
  ctx.fillText('LEVEL: ' + level, GAME_W / 2, 430);
  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('NEW HIGH SCORE!', GAME_W / 2, 470);
  }
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Tap to continue', GAME_W / 2, 530);
}

function drawWin() {
  drawBackground();
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 32px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GARDEN CLEARED!', GAME_W / 2, 240);
  ctx.fillStyle = '#38d973';
  ctx.font = '20px monospace';
  ctx.fillText('All 30 spore barriers broken!', GAME_W / 2, 280);

  // Happy baseling
  drawTitleBaseling(GAME_W / 2, 340);

  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GAME_W / 2, 420);
  if (score >= highScore) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('NEW HIGH SCORE!', GAME_W / 2, 455);
  }
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Tap to continue', GAME_W / 2, 520);
}

function draw() {
  const shakeX = shakeTime > 0 ? (Math.random() - 0.5) * 6 : 0;
  const shakeY = shakeTime > 0 ? (Math.random() - 0.5) * 6 : 0;

  ctx.save();
  if (shakeTime > 0) ctx.translate(shakeX, shakeY);

  if (state === 'title') { drawTitle(); ctx.restore(); return; }
  if (state === 'tutorial') { drawTutorial(); ctx.restore(); return; }
  if (state === 'gameOver') { drawGameOver(); ctx.restore(); return; }
  if (state === 'win') { drawWin(); ctx.restore(); return; }

  drawBackground();

  // Bricks
  for (let r = 0; r < BRICK_ROWS; r++)
    for (let c = 0; c < BRICK_COLS; c++)
      drawBrick(r, c);

  // Boss
  drawBoss();

  // Powerups
  for (const pu of powerups) drawPowerup(pu);

  // Lasers
  drawLasers();

  // Reactor beams
  drawReactorBeams();

  // Paddle
  drawPaddle();

  // Balls
  for (const b of balls) drawBall(b);

  // Particles
  drawParticles();

  // Score popups
  drawScorePopups();

  // HUD
  drawHUD();

  // Flash
  if (flashAlpha > 0) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }

  // Dead overlay
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPORE LOST', GAME_W / 2, GAME_H / 2);
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('Lives: ' + lives, GAME_W / 2, GAME_H / 2 + 30);
  }

  // Level clear overlay
  if (state === 'levelClear') {
    ctx.fillStyle = 'rgba(0,20,60,0.6)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);

    // Zone name
    const zone = getZone();
    ctx.fillStyle = zone.accent;
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + level + ' CLEAR!', GAME_W / 2, GAME_H / 2 - 30);
    ctx.fillStyle = '#aaa';
    ctx.font = '12px monospace';
    ctx.fillText(zone.name, GAME_W / 2, GAME_H / 2);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '16px monospace';
    ctx.fillText('+' + Math.floor(100 * level * SCORE_MULT) + ' bonus', GAME_W / 2, GAME_H / 2 + 25);

    // Boss preview for next level
    if ((level + 1) % 5 === 0 && level < TOTAL_LEVELS) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('BOSS APPROACHING...', GAME_W / 2, GAME_H / 2 + 55);
    }
  }

  // Launch prompt
  if (state === 'playing' && !launched) {
    ctx.fillStyle = '#aaa';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.6 + Math.sin(levelTime * 4) * 0.4;
    ctx.fillText('Z / SPACE / TAP to launch', GAME_W / 2, GAME_H - 80);
    if (activePowers[PU_REACTOR_BEAM] !== undefined) {
      ctx.fillStyle = '#f4b41b';
      ctx.fillText('X = POOP Beam', GAME_W / 2, GAME_H - 65);
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lastTime = ts; loop(ts); });

})();
</script>
</body>
</html>
