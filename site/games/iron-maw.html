(function(){
"use strict";

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat modifiers from baseling stats
var STAT_DMG_MULT = 1 + (statB.str - 10) * 0.05;        // STR -> damage
var STAT_SPD_MULT = 1 + (statB.dex - 10) * 0.03;        // DEX -> speed
var STAT_HP_MULT = statB.hpMult * (1 + (statB.con - 10) * 0.04);  // CON -> HP
var STAT_SCORE_MULT = statB.scoreMult * (1 + (statB.int - 10) * 0.05); // INT -> score
var STAT_CD_MULT = Math.max(0.3, statB.cooldown * (1 - (statB.wis - 10) * 0.03)); // WIS -> cooldowns
var STAT_LUCK = statB.luck * (1 + (statB.cha - 10) * 0.04); // CHA -> drops/luck
var STAT_EXTRA_LIVES = statB.lives + Math.max(0, Math.floor((statB.con - 14) / 4)); // CON 15+ -> extra lives
var BASELING_COLOR = statB.color || '#44dd88';
var BASELING_NAME = statB.name || 'Baseling';
var BASELING_ICON = statB.icon || 'B';
var BASELING_LEVEL = statB.level || 0;

// === CONSTANTS ===
const GW = 400, GH = 300;
const TILE = 16;
const COLS = 25, ROWS = 18;
const HUD_H = 12;

TAS.input.initTouch({ buttons: ['a','b','c','d'], labels: { a:'JUMP', b:'SHOOT', c:'MORPH', d:'MAP' } });

// === SEED RNG ===
let seed = 7919;
function srand(s){ seed = s; }
function rand(){ seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 0x7fffffff; }
function randI(min,max){ return Math.floor(rand()*(max-min+1))+min; }

// === SCORE SYSTEM ===
let score = 0;
let scorePopups = [];

function addScore(amount, x, y) {
  var pts = Math.round(amount * STAT_SCORE_MULT);
  score += pts;
  if (x !== undefined && y !== undefined) {
    scorePopups.push({ text: '+' + pts, x: x, y: y, life: 1.2, vy: -40, color: '#ff0' });
  }
}

function addScoreSpecial(amount, x, y, color) {
  var pts = Math.round(amount * STAT_SCORE_MULT);
  score += pts;
  scorePopups.push({ text: '+' + pts, x: x, y: y, life: 1.5, vy: -30, color: color || '#f4f' });
}

// === BACKGROUND PARTICLE SYSTEM ===
function initBgParticles() {
  bgParticles = [];
  for (var i = 0; i < 40; i++) {
    bgParticles.push({
      x: Math.random() * GW, y: Math.random() * GH,
      vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 8,
      size: 1 + Math.random() * 2, alpha: 0.1 + Math.random() * 0.2,
      color: '#556'
    });
  }
}
initBgParticles();

function updateBgParticles(dt, zoneIdx) {
  var zd = ZONES[Math.max(0, zoneIdx)];
  for (var i = 0; i < bgParticles.length; i++) {
    var p = bgParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < -10) p.x = GW + 10;
    if (p.x > GW + 10) p.x = -10;
    if (p.y < -10) p.y = GH + 10;
    if (p.y > GH + 10) p.y = -10;
    p.color = zd.palette[i % zd.palette.length];
  }
}

// === WORLD GENERATION ===
const WORLD_W = 20;
const WORLD_H = 20;
const ZONE_REGIONS = [
  { x:7, y:7, w:6, h:6 },
  { x:1, y:8, w:6, h:7 },
  { x:8, y:1, w:6, h:6 },
  { x:1, y:1, w:6, h:6 },
  { x:14, y:4, w:6, h:8 }
];

function getZoneAt(rx, ry) {
  for (let z = ZONE_REGIONS.length - 1; z >= 0; z--) {
    const r = ZONE_REGIONS[z];
    if (rx >= r.x && rx < r.x + r.w && ry >= r.y && ry < r.y + r.h) return z;
  }
  return -1;
}

function generateWorld() {
  world = { rooms: {}, visited: {}, saveRooms: {} };
  items = {};

  srand(42);

  for (let z = 0; z < 5; z++) {
    const reg = ZONE_REGIONS[z];
    for (let ry = reg.y; ry < reg.y + reg.h; ry++) {
      for (let rx = reg.x; rx < reg.x + reg.w; rx++) {
        const key = rx + ',' + ry;
        world.rooms[key] = generateRoom(rx, ry, z);
      }
    }
    const sx = reg.x + Math.floor(reg.w / 2);
    const sy = reg.y + Math.floor(reg.h / 2);
    const skey = sx + ',' + sy;
    world.saveRooms[skey] = true;
    if (world.rooms[skey]) {
      const room = world.rooms[skey];
      for (let ty = 2; ty < ROWS - 2; ty++) {
        for (let tx = 3; tx < COLS - 3; tx++) {
          room.tiles[ty][tx] = 0;
        }
      }
      room.isSave = true;
    }
  }

  placeUpgrades();
  placeEnergyTanks();
  placeMissileExpansions();
}

function generateRoom(rx, ry, zone) {
  srand(rx * 1000 + ry * 37 + zone * 7);
  const tiles = [];
  const template = randI(0, 5);

  for (let ty = 0; ty < ROWS; ty++) {
    tiles[ty] = [];
    for (let tx = 0; tx < COLS; tx++) {
      if (ty === 0 || ty === ROWS - 1) { tiles[ty][tx] = 1; continue; }
      if (tx === 0 || tx === COLS - 1) { tiles[ty][tx] = 1; continue; }
      tiles[ty][tx] = 0;
    }
  }

  // Door openings
  const reg = ZONE_REGIONS[zone];
  if (rx > reg.x || getZoneAt(rx - 1, ry) >= 0) {
    tiles[Math.floor(ROWS/2)][0] = 0;
    tiles[Math.floor(ROWS/2)-1][0] = 0;
  }
  if (rx < reg.x + reg.w - 1 || getZoneAt(rx + 1, ry) >= 0) {
    tiles[Math.floor(ROWS/2)][COLS-1] = 0;
    tiles[Math.floor(ROWS/2)-1][COLS-1] = 0;
  }
  if (ry > reg.y || getZoneAt(rx, ry - 1) >= 0) {
    tiles[0][Math.floor(COLS/2)] = 0;
    tiles[0][Math.floor(COLS/2)+1] = 0;
  }
  if (ry < reg.y + reg.h - 1 || getZoneAt(rx, ry + 1) >= 0) {
    tiles[ROWS-1][Math.floor(COLS/2)] = 0;
    tiles[ROWS-1][Math.floor(COLS/2)+1] = 0;
  }

  // Internal structure
  switch(template) {
    case 0:
      for (let i = 0; i < 4; i++) {
        const py = 4 + i * 3;
        const px = randI(3, 8);
        const pw = randI(4, 8);
        for (let x = px; x < Math.min(px + pw, COLS - 2); x++) tiles[py][x] = 1;
      }
      break;
    case 1:
      for (let ty = 3; ty < ROWS - 3; ty++) {
        if (ty === Math.floor(ROWS/2) || ty === Math.floor(ROWS/2)-1) continue;
        for (let tx = 2; tx < COLS - 2; tx++) {
          if ((ty < 6 || ty > ROWS - 6) && tx > 4 && tx < COLS - 4) tiles[ty][tx] = 1;
        }
      }
      for (let tx = 2; tx < COLS - 2; tx++) { tiles[4][tx] = 0; tiles[5][tx] = 0; }
      for (let tx = 2; tx < COLS - 2; tx++) { tiles[ROWS-5][tx] = 0; tiles[ROWS-6][tx] = 0; }
      break;
    case 2:
      for (let py = 4; py < ROWS - 3; py += 4) {
        for (let px = 4; px < COLS - 3; px += 5) {
          tiles[py][px] = 1;
          tiles[py-1][px] = 1;
          if (rand() > 0.5) tiles[py][px+1] = 1;
        }
      }
      break;
    case 3:
      for (let ty = ROWS - 4; ty < ROWS - 1; ty++) {
        for (let tx = 2; tx < COLS - 2; tx++) tiles[ty][tx] = 1;
      }
      for (let tx = 2; tx < COLS - 2; tx++) tiles[ROWS-3][tx] = 0;
      for (let i = 0; i < 3; i++) {
        const px = 3 + i * 7;
        for (let x = px; x < px + 5 && x < COLS - 2; x++) tiles[6 + i * 3][x] = 1;
      }
      break;
    case 4:
      for (let ty = 2; ty < ROWS - 2; ty++) {
        for (let tx = 2; tx < COLS - 2; tx++) {
          if (tx < 8 || tx > COLS - 9) tiles[ty][tx] = 1;
        }
      }
      for (let i = 0; i < 5; i++) {
        const ly = 3 + i * 3;
        const lx = (i % 2 === 0) ? 8 : COLS - 13;
        for (let x = lx; x < lx + 4; x++) tiles[ly][x] = 0;
        if (ly > 0) for (let x = lx; x < lx + 4; x++) tiles[ly-1][x] = 0;
      }
      break;
    case 5:
      for (let tx = 6; tx < COLS - 6; tx++) tiles[ROWS - 5][tx] = 1;
      tiles[7][8] = 1; tiles[7][9] = 1;
      tiles[7][COLS-9] = 1; tiles[7][COLS-10] = 1;
      break;
  }

  // Zone-specific features
  if (zone === 1 && rand() > 0.5) {
    const ty = randI(6, ROWS - 4);
    for (let tx = 3; tx < COLS - 3; tx++) { if (rand() > 0.6) tiles[ty][tx] = 3; }
  }
  if (zone === 2) {
    for (let tx = 1; tx < COLS - 1; tx++) {
      if (tiles[ROWS-2][tx] === 0 && rand() > 0.4) tiles[ROWS-2][tx] = 4;
    }
  }
  if (zone === 3) {
    for (let ty = 0; ty < ROWS; ty++) {
      for (let tx = 0; tx < COLS; tx++) {
        if (tiles[ty][tx] === 1 && rand() > 0.6) tiles[ty][tx] = 5;
      }
    }
  }
  if (zone === 4 && rand() > 0.5) {
    const ty = randI(5, ROWS - 5);
    for (let tx = 3; tx < 8; tx++) tiles[ty][tx] = 6;
  }

  // Hazards: spikes in Landing/Reactor, acid in Fungal, steam vents in Lava
  if ((zone === 0 || zone === 4) && rand() > 0.6) {
    var spikeY = ROWS - 2;
    for (let tx = randI(3,8); tx < randI(12, COLS-3); tx++) {
      if (tiles[spikeY][tx] === 0) tiles[spikeY][tx] = HAZARD_SPIKES;
    }
  }
  if (zone === 1 && rand() > 0.65) {
    for (let tx = randI(2,6); tx < randI(10, COLS-2); tx++) {
      if (tiles[ROWS-2][tx] === 0) tiles[ROWS-2][tx] = HAZARD_ACID;
    }
  }
  if (zone === 2 && rand() > 0.55) {
    var ventX = randI(4, COLS-5);
    if (tiles[ROWS-2][ventX] === 0) tiles[ROWS-2][ventX] = HAZARD_STEAM;
  }

  return { tiles, zone, template };
}

function placeUpgrades() {
  const placements = [
    { upgrade:'morphBall', zone:0, rx:8, ry:9 },
    { upgrade:'bombs', zone:1, rx:3, ry:11 },
    { upgrade:'highJump', zone:1, rx:2, ry:9 },
    { upgrade:'speedBoots', zone:0, rx:11, ry:10 },
    { upgrade:'iceBeam', zone:3, rx:2, ry:3 },
    { upgrade:'waveBeam', zone:4, rx:17, ry:6 },
    { upgrade:'missile', zone:0, rx:10, ry:8 },
    { upgrade:'grapple', zone:2, rx:11, ry:3 },
    { upgrade:'heatSuit', zone:3, rx:4, ry:2 }
  ];

  for (const p of placements) {
    const key = p.rx + ',' + p.ry;
    items[key] = items[key] || [];
    items[key].push({ type:'upgrade', upgrade: p.upgrade, x: 12 * TILE, y: 8 * TILE, collected: false });
  }
}

function placeEnergyTanks() {
  const tanks = [
    { rx:9, ry:8 }, { rx:4, ry:10 }, { rx:10, ry:3 },
    { rx:3, ry:4 }, { rx:16, ry:7 }, { rx:7, ry:12 },
    { rx:13, ry:5 }, { rx:5, ry:9 }

    const key = t.rx + ',' + t.ry;
    if (!world.rooms[key]) continue;
    items[key] = items[key] || [];
    items[key].push({ type:'etank', x: 6 * TILE, y: 5 * TILE, collected: false });

function placeMissileExpansions() {

  for (const p of packs) {

    items[key] = items[key] || [];
    items[key].push({ type:'missile', x: 18 * TILE, y: 10 * TILE, collected: false });

}

// === ENEMY SPAWNING ===
function spawnEnemiesForRoom(rx, ry) {
  const key = rx + ',' + ry;
  const room = world.rooms[key];
  if (!room || room.isSave) return [];

  const zone = room.zone;
  const zoneData = ZONES[zone];
  srand(rx * 777 + ry * 131 + zone * 17);

  const enList = [];
  const count = randI(2, 5);

  for (let i = 0; i < count; i++) {
    const type = zoneData.enemies[randI(0, zoneData.enemies.length - 1)];
    const def = ENEMY_DEFS[type] || { hp:3, w:12, h:12, speed:0.5, score:10, behavior:'patrol' };
    const ex = randI(4, COLS - 5) * TILE;
    const ey = randI(3, ROWS - 4) * TILE;

    const tx = Math.floor(ex / TILE);
    const ty = Math.floor(ey / TILE);
    if (room.tiles[ty] && room.tiles[ty][tx] !== 0) continue;

    enList.push({
      type, x: ex, y: ey,
      vx: (rand() > 0.5 ? 1 : -1) * def.speed,
      vy: def.behavior === 'fly' ? (rand() > 0.5 ? 0.3 : -0.3) : 0,
      hp: def.hp + zone * 2, maxHp: def.hp + zone * 2,
      w: def.w, h: def.h, timer: 0,
      shootTimer: randI(60, Math.round(180 * STAT_CD_MULT)),
      frozen: 0, zone, score: def.score,
      behavior: def.behavior,
      baseSpeed: def.speed,
      flashTimer: 0
    });
  }
  return enList;
}

// === BOSS DATA (Tasern-themed) ===
function spawnBoss(zone) {
  const bossHP = [80, 120, 160, 200, 400];
  return {
    zone, x: 14 * TILE, y: 6 * TILE,
    vx: 1, vy: 0, w: 32, h: 40,
    hp: bossHP[zone], maxHp: bossHP[zone],
    phase: 0, timer: 0, attackTimer: 0,
    pattern: 0, dead: false, active: true,
    name: BOSS_DATA[zone].name,
    subtitle: BOSS_DATA[zone].subtitle,
    introTimer: 2.5, // boss intro freeze
    shakeTimer: 0
  };
}

const BOSS_ROOMS = [
  { rx:12, ry:12 }, { rx:1, ry:14 }, { rx:13, ry:1 },
  { rx:1, ry:1 }, { rx:19, ry:7 }
];

// === CAMERA & TRANSITIONS ===
function initCamera() { return { x: 0, y: 0 }; }

function enterRoom(rx, ry, fromDir) {
  const key = rx + ',' + ry;
  if (!world.rooms[key]) return false;

  player.roomX = rx;
  player.roomY = ry;
  world.visited[key] = true;

  if (fromDir === 'left') { player.x = (COLS - 3) * TILE; player.y = Math.floor(ROWS/2) * TILE - player.h; }
  else if (fromDir === 'right') { player.x = 2 * TILE; player.y = Math.floor(ROWS/2) * TILE - player.h; }
  else if (fromDir === 'up') { player.x = Math.floor(COLS/2) * TILE; player.y = (ROWS - 3) * TILE; }
  else if (fromDir === 'down') { player.x = Math.floor(COLS/2) * TILE; player.y = 2 * TILE; }

  enemies = spawnEnemiesForRoom(rx, ry);
  projectiles = [];
  bombs = [];

  bossActive = null;
  for (let b = 0; b < BOSS_ROOMS.length; b++) {
    if (BOSS_ROOMS[b].rx === rx && BOSS_ROOMS[b].ry === ry) {
      const bossKey = 'boss_' + b;
      if (!player.upgrades[bossKey]) {
        bossActive = spawnBoss(b);
        enemies = [];
      }
      break;
    }
  }

  return true;
}

// === COLLISION ===
function getTile(rx, ry, tx, ty) {
  const key = rx + ',' + ry;
  const room = world.rooms[key];
  if (!room) return 1;
  if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return 1;
  return room.tiles[ty][tx];
}

function isSolid(tileType) {
  return tileType === 1 || tileType === 3 || tileType === 5 || tileType === 6;
}

function isHazard(tileType) {
  return tileType === 4 || tileType === HAZARD_SPIKES || tileType === HAZARD_ACID || tileType === HAZARD_STEAM;
}

function collidesWorld(x, y, w, h) {
  const t1x = Math.floor(x / TILE);
  const t1y = Math.floor(y / TILE);
  const t2x = Math.floor((x + w - 1) / TILE);
  const t2y = Math.floor((y + h - 1) / TILE);

  for (let ty = t1y; ty <= t2y; ty++) {
    for (let tx = t1x; tx <= t2x; tx++) {
      const tile = getTile(player.roomX, player.roomY, tx, ty);
      if (isSolid(tile)) return true;
    }
  }
  return false;
}

function isOnIce(x, y, w, h) {
  const ty = Math.floor((y + h) / TILE);
  const t1x = Math.floor(x / TILE);
  const t2x = Math.floor((x + w - 1) / TILE);
  for (let tx = t1x; tx <= t2x; tx++) {
    if (getTile(player.roomX, player.roomY, tx, ty) === 5) return true;
  }
  return false;
}

// === INPUT HELPERS ===
function keyLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function keyRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function keyUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function keyDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function keyJump() { return TAS.input.keys['KeyZ'] || TAS.input.keys['Space'] || TAS.input.touch.a; }
function keyShoot() { return TAS.input.keys['KeyX'] || TAS.input.keys['KeyJ'] || TAS.input.touch.b; }
function keyMorph() { return TAS.input.keys['KeyC'] || TAS.input.keys['KeyK'] || TAS.input.touch.c; }
function keyMap() { return TAS.input.keys['KeyM'] || TAS.input.keys['Tab'] || TAS.input.touch.d; }
function keyMissile() { return TAS.input.keys['KeyV'] || TAS.input.keys['KeyL']; }

let prevJump = false, prevShoot = false, prevMorph = false, prevMap = false, prevMissile = false;
let prevDown = false;

function justPressed(current, prev) { return current && !prev; }

// === GAME INIT ===
function startGame() {
  player = createPlayer();
  score = 0;
  scorePopups = [];
  killCombo = 0;
  comboTimer = 0;
  totalKills = 0;
  tutorialStep = 0;
  tutorialTimer = 0;
  generateWorld();
  camera = initCamera();
  projectiles = [];
  bombs = [];
  enemies = [];
  bossActive = null;
  mapOpen = false;
  deathTimer = 0;
  endTimer = 0;

  player.roomX = 10;
  player.roomY = 10;
  enterRoom(player.roomX, player.roomY, null);
  player.x = 12 * TILE;
  player.y = 10 * TILE;

  state = 'playing';
}

// === SAVE / LOAD ===
function saveGame() {
  const data = {
    px: player.x, py: player.y, roomX: player.roomX, roomY: player.roomY,
    hp: player.maxHp, missiles: player.maxMissiles,
    upgrades: player.upgrades, etanks: player.etanks, missilePacks: player.missilePacks,
    visited: world.visited, collectedItems: {},
    score: score, lives: player.lives, totalKills: totalKills
  };
  for (const key in items) {
    for (let i = 0; i < items[key].length; i++) {
      if (items[key][i].collected) {
        data.collectedItems[key + '_' + i] = true;
      }
    }
  }
  try { localStorage.setItem('ironmaw_save', JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('ironmaw_save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    startGame();
    player.roomX = data.roomX;
    player.roomY = data.roomY;
    player.x = data.px;
    player.y = data.py;
    player.maxHp = data.hp;
    player.hp = data.hp;
    player.maxMissiles = data.missiles;
    player.missiles = data.missiles;
    player.upgrades = data.upgrades || {};
    player.etanks = data.etanks || 0;
    player.missilePacks = data.missilePacks || 0;
    player.lives = data.lives !== undefined ? data.lives : STAT_EXTRA_LIVES;
    world.visited = data.visited || {};
    score = data.score || 0;
    totalKills = data.totalKills || 0;
    if (data.collectedItems) {
      for (const key in items) {
        for (let i = 0; i < items[key].length; i++) {
          if (data.collectedItems[key + '_' + i]) items[key][i].collected = true;
        }
      }
    }
    enterRoom(player.roomX, player.roomY, null);
    player.x = data.px;
    player.y = data.py;
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

function hasSaveData() {
  try { return !!localStorage.getItem('ironmaw_save'); } catch(e) { return false; }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Score popups
  for (var si = scorePopups.length - 1; si >= 0; si--) {
    var sp = scorePopups[si];
    sp.y += sp.vy * dt;
    sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(si, 1);
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { killCombo = 0; }
  }

  const jmp = keyJump(), sht = keyShoot(), mrp = keyMorph(), mp = keyMap(), mis = keyMissile();
  const dn = keyDown();

  if (state === 'title') {
    if (keyUp() && !prevJump) titleSel = 0;
    if (keyDown() && !prevDown) titleSel = hasSaveData() ? (titleSel === 0 ? 1 : 0) : 0;
    if (justPressed(jmp, prevJump) || justPressed(sht, prevShoot)) {
      TAS.audio.ensureAudio();
      if (titleSel === 1 && hasSaveData()) { loadGame(); }
      else { startGame(); }
    }
    prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
    return;
  }

  if (state === 'dead') {
    deathTimer += dt;
    if (deathTimer > 2 && player.lives > 0) {
      // Respawn with lives
      player.lives--;
      player.hp = Math.round(player.maxHp * 0.5);
      player.iframes = 2;
      enterRoom(player.roomX, player.roomY, null);
      player.x = 12 * TILE;
      player.y = 10 * TILE;
      state = 'playing';
      TAS.fx.flash('#fff', 0.3);
    } else if (deathTimer > 3) {
      state = 'title';
    }
    prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
    return;
  }

  if (state === 'ending') {
    endTimer += dt;
    if (endTimer > 8) { state = 'title'; }
    prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
    return;
  }

  if (state !== 'playing') return;

  // Tutorial progression
  if (tutorialStep < 4) {
    tutorialTimer += dt;
    if (tutorialTimer > 5) { tutorialStep++; tutorialTimer = 0; }
  }

  // Update bg particles
  var curZone = getZoneAt(player.roomX, player.roomY);
  updateBgParticles(dt, curZone);

  // Map toggle
  if (justPressed(mp, prevMap)) { mapOpen = !mapOpen; }
  if (mapOpen) { prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn; return; }

  // Item get pause
  if (pauseTimer > 0) { pauseTimer -= dt; prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn; return; }

  // Boss intro freeze
  if (bossActive && bossActive.introTimer > 0) {
    bossActive.introTimer -= dt;
    prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
    return;
  }

  // Transition
  if (transDir) {
    transTick += dt;
    if (transTick > 0.3) { transDir = null; transTick = 0; }
    prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
    return;
  }

  // === PLAYER PHYSICS (stat-modified) ===
  const GRAVITY = 600;
  const BASE_SPEED = player.dashSpeed ? 200 : 100;
  const MOVE_SPEED = BASE_SPEED * STAT_SPD_MULT;
  const JUMP_SPEED = player.upgrades.highJump ? -280 : -210;
  const MORPH_H = 10;
  const FRICTION = player.onIce ? 0.98 : 0.7;

  if (player.iframes > 0) player.iframes -= dt;

  // Heat damage in Lava Core without suit
  const currentZone = getZoneAt(player.roomX, player.roomY);
  if (currentZone === 2 && !player.upgrades.heatSuit) {
    if (frame % 60 === 0) {
      player.hp -= 5;
      TAS.fx.flash('#f40', 0.1);
    }
  }

  // Morph ball toggle
  if (player.upgrades.morphBall) {
    if (justPressed(mrp, prevMorph)) {
      player.morphed = !player.morphed;
      if (player.morphed) {
        player.h = MORPH_H;
        player.y += 14;
        TAS.audio.playTone(300, 0.05, 'sine', 0.06);
        TAS.audio.playTone(500, 0.05, 'sine', 0.06);
      } else {
        player.h = 24;
        player.y -= 14;
        if (collidesWorld(player.x, player.y, player.w, player.h)) {
          player.h = MORPH_H;
          player.y += 14;
          player.morphed = true;
        } else {
          TAS.audio.playTone(500, 0.05, 'sine', 0.06);
          TAS.audio.playTone(300, 0.05, 'sine', 0.06);
        }
      }
    }
    if (justPressed(dn, prevDown) && !player.morphed && player.grounded) {
      player.downTapTimer = 15;
    } else if (player.downTapTimer > 0) {
      player.downTapTimer--;
      if (justPressed(dn, prevDown)) {
        player.morphed = true;
        player.h = MORPH_H;
        player.y += 14;
        player.downTapTimer = 0;
        TAS.audio.playTone(300, 0.05, 'sine', 0.06);
      }
    }
  }

  // Horizontal movement
  let accel = 0;
  if (keyLeft()) { accel = -MOVE_SPEED; player.dir = -1; }
  if (keyRight()) { accel = MOVE_SPEED; player.dir = 1; }

  // Speed boots
  if (player.upgrades.speedBoots && (keyLeft() || keyRight())) {
    player.runTimer += dt;
    if (player.runTimer > 1.0) {
      player.dashSpeed = true;
      if (frame % 3 === 0) TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#ff0', 1, 1);
    }
  } else {
    player.runTimer = 0;
    player.dashSpeed = false;
  }

  if (accel !== 0) {
    player.vx += accel * dt;
    const maxSpd = (player.dashSpeed ? 200 : 100) * STAT_SPD_MULT;
    player.vx = TAS.math.clamp(player.vx, -maxSpd, maxSpd);
  } else {
    player.vx *= FRICTION;
    if (Math.abs(player.vx) < 1) player.vx = 0;
  }

  // Aiming
  player.aimUp = keyUp() && !player.morphed;
  player.aimDiag = keyUp() && (keyLeft() || keyRight()) && !player.morphed;
  player.crouching = keyDown() && player.grounded && !player.morphed;

  // Jump
  if (justPressed(jmp, prevJump) && player.grounded && !player.morphed) {
    player.vy = JUMP_SPEED;
    player.grounded = false;
    TAS.audio.playTone(250, 0.08, 'square', 0.04, 400);
  }
  if (!jmp && player.vy < -50) {
    player.vy *= 0.6;
  }

  // Bomb jump
  if (player.morphed && justPressed(jmp, prevJump) && player.upgrades.bombs) {
    bombs.push({ x: player.x + player.w/2, y: player.y + player.h/2, timer: 0.8 });
    TAS.audio.playTone(200, 0.06, 'triangle', 0.04);
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > 400) player.vy = 400;

  // Move X
  const newX = player.x + player.vx * dt;
  if (!collidesWorld(newX, player.y, player.w, player.h)) {
    player.x = newX;
  } else {
    if (player.dashSpeed && player.upgrades.speedBoots) {
      const checkTx = player.dir > 0 ? Math.floor((newX + player.w) / TILE) : Math.floor(newX / TILE);
      for (let ty = Math.floor(player.y / TILE); ty <= Math.floor((player.y + player.h - 1) / TILE); ty++) {
        if (getTile(player.roomX, player.roomY, checkTx, ty) === 6) {
          world.rooms[player.roomX + ',' + player.roomY].tiles[ty][checkTx] = 0;
          TAS.particles.spawn(checkTx * TILE + 8, ty * TILE + 8, '#ff0', 6, 3);
          TAS.audio.playNoise(0.1, 0.06, 800);
          addScore(50, checkTx * TILE, ty * TILE);
        }
      }
    }
    player.vx = 0;
  }

  // Move Y
  const newY = player.y + player.vy * dt;
  if (!collidesWorld(player.x, newY, player.w, player.h)) {
    player.y = newY;
    player.grounded = false;
  } else {
    if (player.vy > 0) {
      player.grounded = true;
      player.y = Math.floor((newY + player.h) / TILE) * TILE - player.h;
    } else {
      player.y = Math.ceil(newY / TILE) * TILE;
    }
    player.vy = 0;
  }

  // Ice check
  player.onIce = player.grounded && isOnIce(player.x, player.y, player.w, player.h);

  // Hazard damage (lava, spikes, acid, steam)
  const footTy = Math.floor((player.y + player.h + 1) / TILE);
  const footTx = Math.floor((player.x + player.w/2) / TILE);
  var footTile = getTile(player.roomX, player.roomY, footTx, footTy);
  if (footTile === 4) {
    if (player.iframes <= 0) {
      damagePlayer(15);
      player.vy = -150;
    }
  }
  if (footTile === HAZARD_SPIKES && player.iframes <= 0) {
    damagePlayer(10);
    player.vy = -120;
  }
  if (footTile === HAZARD_ACID && player.iframes <= 0) {
    damagePlayer(8);
    player.vy = -100;
    TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#4f4', 4, 2);
  }
  // Steam vent - periodic upward push
  var bodyTile = getTile(player.roomX, player.roomY, footTx, Math.floor(player.y / TILE));
  if (footTile === HAZARD_STEAM || bodyTile === HAZARD_STEAM) {
    if (frame % 90 < 30) {
      player.vy = -120;
      if (frame % 5 === 0) TAS.particles.spawn(player.x + player.w/2, player.y + player.h, '#aaa', 2, 2);
    }
  }

  // === SHOOTING (stat-modified damage) ===
  if (sht && !player.morphed) {
    player.charge += dt;
  }
  if (justPressed(sht, prevShoot) && !player.morphed) {
    player.charge = 0;
  }
  if (!sht && prevShoot && !player.morphed) {
    fireShot();
    player.charge = 0;
  }

  // Missile (WIS cooldown applied)
  if (justPressed(mis, prevMissile) && player.missiles > 0 && !player.morphed) {
    fireMissile();
    player.missiles--;
  }

  // === ROOM TRANSITIONS ===
  if (player.x < -4) {
    if (enterRoom(player.roomX - 1, player.roomY, 'left')) {
      transDir = 'left'; transTick = 0;
    } else { player.x = 0; }
  }
  if (player.x > COLS * TILE - player.w + 4) {
    if (enterRoom(player.roomX + 1, player.roomY, 'right')) {
      transDir = 'right'; transTick = 0;
    } else { player.x = COLS * TILE - player.w; }
  }
  if (player.y < -4) {
    if (enterRoom(player.roomX, player.roomY - 1, 'down')) {
      transDir = 'up'; transTick = 0;
    } else { player.y = 0; }
  }
  if (player.y > ROWS * TILE) {
    if (enterRoom(player.roomX, player.roomY + 1, 'up')) {
      transDir = 'down'; transTick = 0;
    } else { player.y = ROWS * TILE - player.h; }
  }

  // === BOMBS ===
  for (let i = bombs.length - 1; i >= 0; i--) {
    bombs[i].timer -= dt;
    if (bombs[i].timer <= 0) {
      explodeBomb(bombs[i]);
      bombs.splice(i, 1);
    }
  }

  // === PROJECTILES ===
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (!p.wave) {
      const tx = Math.floor(p.x / TILE);
      const ty = Math.floor(p.y / TILE);
      const tile = getTile(player.roomX, player.roomY, tx, ty);
      if (isSolid(tile)) {
        projectiles.splice(i, 1);
        TAS.particles.spawn(p.x, p.y, p.color || '#ff0', 3, 2);
        continue;
      }
    }

    if (p.life <= 0 || p.x < -16 || p.x > GW + 16 || p.y < -16 || p.y > GH + 16) {
      projectiles.splice(i, 1);
      continue;
    }

    // Enemy hit
    if (p.friendly) {
      for (let e = enemies.length - 1; e >= 0; e--) {
        if (TAS.hit.rectOverlap(p.x - 3, p.y - 3, 6, 6, enemies[e].x, enemies[e].y, enemies[e].w, enemies[e].h)) {
          let dmg = Math.round((p.damage || 1) * STAT_DMG_MULT);
          if (p.ice && !enemies[e].frozen) {
            enemies[e].frozen = 3;
            enemies[e].vx = 0;
            TAS.particles.spawn(enemies[e].x + 6, enemies[e].y + 6, '#8cf', 5, 2);
          }
          enemies[e].hp -= dmg;
          enemies[e].flashTimer = 0.1;
          if (enemies[e].hp <= 0) {
            killEnemy(enemies[e]);
            enemies.splice(e, 1);
          } else {
            TAS.particles.spawn(p.x, p.y, '#fff', 2, 1);
          }
          if (!p.wave) { projectiles.splice(i, 1); break; }
        }
      }
      // Boss hit
      if (bossActive && !bossActive.dead) {
        if (TAS.hit.rectOverlap(p.x - 3, p.y - 3, 6, 6, bossActive.x, bossActive.y, bossActive.w, bossActive.h)) {
          var bossDmg = Math.round((p.damage || 1) * STAT_DMG_MULT);
          bossActive.hp -= bossDmg;
          bossActive.shakeTimer = 0.1;
          TAS.particles.spawn(p.x, p.y, '#fff', 3, 2);
          addScore(10, p.x, p.y);
          if (!p.wave) projectiles.splice(i, 1);
          if (bossActive.hp <= 0) {
            bossActive.dead = true;
            bossActive.timer = 0;
            player.upgrades['boss_' + bossActive.zone] = true;
            TAS.fx.shake(8);
            TAS.fx.flash('#fff', 0.5);
            for (let k = 0; k < 20; k++) TAS.particles.spawn(bossActive.x + 16, bossActive.y + 20, '#f84', 1, 4);
            TAS.audio.playMelody([[600,0.1],[800,0.1],[1000,0.15]], 100);
            addScoreSpecial(1000 + bossActive.zone * 500, bossActive.x + 16, bossActive.y, '#ff0');
            if (bossActive.zone === 4) {
              endTimer = 0;
              state = 'ending';
            }
          }
        }
      }
    } else {
      if (player.iframes <= 0 && TAS.hit.rectOverlap(p.x - 3, p.y - 3, 6, 6, player.x, player.y, player.w, player.h)) {
        damagePlayer(p.damage || 10);
        projectiles.splice(i, 1);
      }
    }
  }

  // === ENEMIES ===
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.flashTimer > 0) e.flashTimer -= dt;
    if (e.frozen > 0) { e.frozen -= dt; continue; }

    e.timer += dt;

    // Behavior-based AI
    switch(e.behavior) {
      case 'fly':
        e.x += e.vx * 60 * dt;
        e.y += e.vy * 60 * dt;
        if (e.y < 2*TILE || e.y > (ROWS-3)*TILE) e.vy = -e.vy;
        break;
      case 'rush':
        var rdx = player.x - e.x;
        if (Math.abs(rdx) < 120) {
          e.vx = rdx > 0 ? e.baseSpeed * 1.5 : -e.baseSpeed * 1.5;
        }
        e.x += e.vx * 60 * dt;
        break;
      case 'ambush':
        var adist = Math.abs(player.x - e.x) + Math.abs(player.y - e.y);
        if (adist < 80) {
          e.x += (player.x > e.x ? 1 : -1) * e.baseSpeed * 2 * 60 * dt;
          e.y += (player.y > e.y ? 1 : -1) * e.baseSpeed * 60 * dt;
        }
        break;
      case 'spike':
        // Stationary, periodic spike attack
        break;
      case 'shoot':
        e.x += e.vx * 30 * dt; // slower patrol
        break;
      default: // patrol
        e.x += e.vx * 60 * dt;
        e.y += e.vy * 60 * dt;
    }

    // Wall bounce for non-stationary
    if (e.behavior !== 'spike') {
      var etx = Math.floor((e.x + e.w/2 + e.vx * 16) / TILE);
      if (isSolid(getTile(player.roomX, player.roomY, etx, Math.floor(e.y/TILE))) ||
          e.x < TILE || e.x > (COLS-2)*TILE) {
        e.vx = -e.vx;
      }
    }

    // Shooting enemies (shoot and ambush types shoot more)
    e.shootTimer -= dt * 60;
    if (e.shootTimer <= 0) {
      var shootRate = (e.behavior === 'shoot') ? 80 : 120;
      e.shootTimer = shootRate + Math.random() * 120;
      const dx = player.x - e.x, dy = player.y - e.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      var shootRange = (e.behavior === 'shoot') ? 280 : 200;
      if (d < shootRange && d > 0) {
        projectiles.push({
          x: e.x + e.w/2, y: e.y + e.h/2,
          vx: (dx/d) * 120, vy: (dy/d) * 120,
          life: 2, friendly: false, damage: 8 + e.zone * 2, color: '#f44'
        });
      }
    }

    // Contact damage
    if (player.iframes <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      damagePlayer(10 + e.zone * 3);
    }
  }

  // === BOSS UPDATE ===
  if (bossActive && !bossActive.dead && bossActive.introTimer <= 0) {
    updateBoss(bossActive, dt);
  }

  // === ITEMS ===
  const roomKey = player.roomX + ',' + player.roomY;
  if (items[roomKey]) {
    for (const item of items[roomKey]) {
      if (item.collected) continue;
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, item.x, item.y, 14, 14)) {
        collectItem(item);
      }
    }
  }

  // === SAVE ROOM ===
  if (world.saveRooms[roomKey] && player.grounded) {
    player.hp = player.maxHp;
    player.missiles = player.maxMissiles;
    if (frame % 120 === 0) saveGame();
  }

  // === DEATH ===
  if (player.hp <= 0) {
    player.hp = 0;
    state = 'dead';
    deathTimer = 0;
    TAS.fx.shake(6);
    TAS.fx.flash('#f00', 0.4);
    TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#f84', 15, 4);
    TAS.audio.playMelody([[400,0.15],[300,0.15],[200,0.2],[100,0.3]], 150);
  }

  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.1) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }

  prevJump = jmp; prevShoot = sht; prevMorph = mrp; prevMap = mp; prevMissile = mis; prevDown = dn;
}

function killEnemy(e) {
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, ZONES[e.zone].accent, 8, 3);
  TAS.audio.playNoise(0.08, 0.04, 600);
  totalKills++;

  // Combo system
  killCombo++;
  comboTimer = 2;
  var comboMult = Math.min(killCombo, 10);
  var baseScore = e.score || 10;
  addScore(baseScore * comboMult, e.x + e.w/2, e.y);
  if (killCombo >= 3) {
    scorePopups.push({ text: killCombo + 'x COMBO!', x: e.x, y: e.y - 12, life: 1.5, vy: -20, color: '#f80' });
  }

  // CHA-modified drops
  if (Math.random() < 0.3 * STAT_LUCK) dropPickup(e.x, e.y);
}

function fireShot() {
  let chargeLevel = 0;
  if (player.charge > 1.5 * STAT_CD_MULT) chargeLevel = 2;
  else if (player.charge > 0.6 * STAT_CD_MULT) chargeLevel = 1;

  let dx = player.dir, dy = 0;
  if (player.aimUp && !keyLeft() && !keyRight()) { dx = 0; dy = -1; }
  else if (player.aimDiag) { dy = -0.7; dx = player.dir * 0.7; }

  const speed = (250 + chargeLevel * 50) * STAT_SPD_MULT;
  const damage = (1 + chargeLevel * 2) * STAT_DMG_MULT;
  const size = 3 + chargeLevel * 2;

  projectiles.push({
    x: player.x + player.w/2 + dx * 8,
    y: player.y + (player.aimUp ? 2 : player.h/2) + dy * 8,
    vx: dx * speed, vy: dy * speed,
    life: 0.8, friendly: true, damage,
    color: chargeLevel === 2 ? '#f4f' : chargeLevel === 1 ? '#4ff' : BASELING_COLOR,
    size, wave: !!player.upgrades.waveBeam,
    ice: !!player.upgrades.iceBeam
  });

  if (chargeLevel === 2) {
    TAS.audio.playTone(150, 0.2, 'sawtooth', 0.08, 600);
    TAS.fx.shake(2);
  } else if (chargeLevel === 1) {
    TAS.audio.playTone(400, 0.1, 'square', 0.06, 600);
  } else {
    TAS.audio.playTone(800, 0.06, 'square', 0.04, 1200);
  }
}

function fireMissile() {
  let dx = player.dir, dy = 0;
  if (player.aimUp && !keyLeft() && !keyRight()) { dx = 0; dy = -1; }
  else if (player.aimDiag) { dy = -0.7; dx = player.dir * 0.7; }

  projectiles.push({
    x: player.x + player.w/2 + dx * 8,
    y: player.y + player.h/2 + dy * 8,
    vx: dx * 300, vy: dy * 300,
    life: 1.2, friendly: true, damage: Math.round(8 * STAT_DMG_MULT),
    color: '#f44', size: 5, missile: true, wave: false, ice: false
  });
  TAS.audio.playNoise(0.15, 0.08, 400);
}

function explodeBomb(bomb) {
  TAS.particles.spawn(bomb.x, bomb.y, '#ff0', 10, 3);
  TAS.audio.playNoise(0.15, 0.08, 300);
  TAS.fx.shake(3);

  const tx = Math.floor(bomb.x / TILE);
  const ty = Math.floor(bomb.y / TILE);
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const cx = tx + dx, cy = ty + dy;
      if (getTile(player.roomX, player.roomY, cx, cy) === 3) {
        world.rooms[player.roomX + ',' + player.roomY].tiles[cy][cx] = 0;
        TAS.particles.spawn(cx * TILE + 8, cy * TILE + 8, '#4a6', 4, 2);
        addScore(25, cx * TILE, cy * TILE);
      }
    }
  }

  const pdx = player.x + player.w/2 - bomb.x;
  const pdy = player.y + player.h/2 - bomb.y;
  if (Math.abs(pdx) < 24 && Math.abs(pdy) < 24) {
    player.vy = -220;
    player.grounded = false;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (TAS.math.dist(bomb.x, bomb.y, e.x + e.w/2, e.y + e.h/2) < 32) {
      e.hp -= Math.round(4 * STAT_DMG_MULT);
      if (e.hp <= 0) {
        killEnemy(e);
        enemies.splice(i, 1);
      }
    }
  }
}

function damagePlayer(amount) {
  if (player.iframes > 0) return;
  player.hp -= amount;
  player.iframes = 1.0;
  killCombo = 0;
  TAS.fx.flash('#f00', 0.2);
  TAS.fx.shake(3);
  TAS.audio.playTone(150, 0.1, 'sawtooth', 0.06, 80);
}

function collectItem(item) {
  item.collected = true;
  pauseTimer = 1.5;

  if (item.type === 'upgrade') {
    player.upgrades[item.upgrade] = true;
    if (item.upgrade === 'missile') { player.maxMissiles += 5; player.missiles = player.maxMissiles; }
    TAS.audio.playMelody([[523,0.12],[659,0.12],[784,0.12],[1047,0.2]], 130);
    TAS.fx.flash('#fff', 0.3);
    addScoreSpecial(500, item.x, item.y, '#f4f');
  } else if (item.type === 'etank') {
    player.etanks++;
    player.maxHp += Math.round(100 * STAT_HP_MULT);
    player.hp = player.maxHp;
    TAS.audio.playMelody([[440,0.1],[550,0.1],[660,0.15]], 100);
    addScore(200, item.x, item.y);
  } else if (item.type === 'missile') {
    player.missilePacks++;
    player.maxMissiles += 5;
    player.missiles = player.maxMissiles;
    TAS.audio.playMelody([[600,0.08],[700,0.08],[800,0.12]], 80);
    addScore(150, item.x, item.y);
  }
}

function dropPickup(x, y) {
  if (Math.random() < 0.5) {
    var healAmt = Math.round(10 * STAT_HP_MULT);
    player.hp = Math.min(player.hp + healAmt, player.maxHp);
    TAS.particles.spawn(x, y, '#4f4', 3, 1);
    addScore(5, x, y);
  } else if (player.maxMissiles > 0) {
    player.missiles = Math.min(player.missiles + 2, player.maxMissiles);
    TAS.particles.spawn(x, y, '#f44', 3, 1);
    addScore(5, x, y);
  }
}

// === BOSS AI ===
function updateBoss(boss, dt) {
  boss.timer += dt;
  boss.attackTimer += dt;
  if (boss.shakeTimer > 0) boss.shakeTimer -= dt;

  if (boss.hp < boss.maxHp * 0.66 && boss.phase === 0) { boss.phase = 1; TAS.fx.flash('#f80', 0.3); TAS.fx.shake(4); }
  if (boss.hp < boss.maxHp * 0.33 && boss.phase === 1) { boss.phase = 2; TAS.fx.flash('#f00', 0.4); TAS.fx.shake(6); }

  // Zone-specific boss movement
  const speed = (1 + boss.phase * 0.5) * 60;
  switch(boss.zone) {
    case 0: // Harbourmaster - horizontal slam
      boss.x += boss.vx * speed * dt;
      if (boss.x < 3 * TILE || boss.x > (COLS - 5) * TILE) boss.vx = -boss.vx;
      boss.y = 5 * TILE + Math.sin(boss.timer * 2) * 20;
      break;
    case 1: // Sporelord - slow hover, teleport
      boss.x += boss.vx * speed * 0.6 * dt;
      if (boss.x < 3 * TILE || boss.x > (COLS - 5) * TILE) boss.vx = -boss.vx;
      boss.y = 4 * TILE + Math.sin(boss.timer * 1.5) * 30;
      if (boss.phase >= 1 && Math.floor(boss.timer) % 5 === 0 && boss.timer % 1 < dt) {
        boss.x = randI(4, COLS-6) * TILE;
        TAS.particles.spawn(boss.x + 16, boss.y + 20, '#4a6', 10, 3);
      }
      break;
    case 2: // Magma King - fast charge, jump
      boss.x += boss.vx * speed * 1.3 * dt;
      if (boss.x < 3 * TILE || boss.x > (COLS - 5) * TILE) { boss.vx = -boss.vx; boss.vy = -3; }
      boss.y += boss.vy * 60 * dt;
      boss.vy += 4 * dt;
      if (boss.y > 8 * TILE) { boss.y = 8 * TILE; boss.vy = 0; }
      break;
    case 3: // Rimewarden - figure-8 pattern
      boss.x = 12 * TILE + Math.sin(boss.timer * 1.2) * 80;
      boss.y = 6 * TILE + Math.sin(boss.timer * 2.4) * 30;
      break;
    case 4: // The Iron Maw - aggressive chase
      var chaseX = player.x - boss.x;
      boss.x += (chaseX > 0 ? 1 : -1) * speed * 0.8 * dt;
      boss.y = 4 * TILE + Math.sin(boss.timer * 3) * 25;
      break;
  }

  // Attacks
  const attackRate = Math.max(0.4, (1.5 - boss.phase * 0.4) * STAT_CD_MULT);
  if (boss.attackTimer > attackRate) {
    boss.attackTimer = 0;

    const pattern = Math.floor(boss.timer * 0.5 + boss.phase) % 3;
    if (pattern === 0) {
      // Spread shot
      var spreadCount = 3 + boss.phase;
      for (let a = -Math.floor(spreadCount/2); a <= Math.floor(spreadCount/2); a++) {
        const ang = Math.PI/2 + a * 0.25;
        projectiles.push({
          x: boss.x + boss.w/2, y: boss.y + boss.h,
          vx: Math.cos(ang) * 150, vy: Math.sin(ang) * 150,
          life: 2, friendly: false, damage: 12 + boss.phase * 4, color: BOSS_DATA[boss.zone].color
        });
      }
    } else if (pattern === 1) {
      // Aimed burst
      const dx = player.x - boss.x, dy = player.y - boss.y;
      const d = Math.sqrt(dx*dx+dy*dy) || 1;
      for (let s = 0; s < 2 + boss.phase; s++) {
        projectiles.push({
          x: boss.x + boss.w/2 + (Math.random()-0.5)*16,
          y: boss.y + boss.h,
          vx: (dx/d) * (180 + s*20), vy: (dy/d) * (180 + s*20),
          life: 2, friendly: false, damage: 15, color: '#ff4'
        });
      }
    } else {
      // Zone-specific special attack
      switch(boss.zone) {
        case 1: // Spore cloud
          for (var sc = 0; sc < 5; sc++) {
            projectiles.push({
              x: boss.x + boss.w/2 + (Math.random()-0.5)*40,
              y: boss.y + boss.h,
              vx: (Math.random()-0.5) * 60, vy: 40 + Math.random() * 60,
              life: 4, friendly: false, damage: 6, color: '#4a6'
            });
          }
          break;
        case 2: // Lava rain
          for (var lr = 0; lr < 4; lr++) {
            projectiles.push({
              x: randI(3, COLS-3) * TILE, y: 0,
              vx: 0, vy: 200,
              life: 3, friendly: false, damage: 18, color: '#f84'
            });
          }
          TAS.fx.shake(2);
          break;
        case 3: // Ice wave
          for (var iw = -3; iw <= 3; iw++) {
            projectiles.push({
              x: boss.x + boss.w/2, y: boss.y + boss.h/2,
              vx: iw * 50, vy: 100,
              life: 3, friendly: false, damage: 12, color: '#8cf'
            });
          }
          break;
        default: // Drop bombs
          projectiles.push({
            x: boss.x + boss.w/2, y: boss.y + boss.h,
            vx: 0, vy: 200,
            life: 3, friendly: false, damage: 20, color: '#f44'
          });
      }
    }
    TAS.audio.playTone(100, 0.1, 'sawtooth', 0.05, 50);
  }

  // Contact damage
  if (player.iframes <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
    damagePlayer(20);
  }
}

// === DRAW ===
function draw(dt) {
  const zone = getZoneAt(player ? player.roomX : 10, player ? player.roomY : 10);
  const zoneData = ZONES[Math.max(0, zone)];

  ctx.fillStyle = state === 'title' ? '#0a0a14' : zoneData.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Background particles
  if (state === 'playing' || state === 'title') {
    for (var bi = 0; bi < bgParticles.length; bi++) {
      var bp = bgParticles[bi];
      ctx.fillStyle = bp.color;
      ctx.globalAlpha = bp.alpha;
      ctx.fillRect(bp.x, bp.y, bp.size, bp.size);
    }
    ctx.globalAlpha = 1;
  }

  if (state === 'title') { drawTitle(); return; }
  if (state === 'dead') { drawDeath(); return; }
  if (state === 'ending') { drawEnding(); return; }
  if (mapOpen) { drawMap(); return; }

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(0, HUD_H);

  drawRoom();
  drawItems();
  drawEnemies();
  if (bossActive) drawBoss();
  drawProjectiles();
  drawBombs();
  if (state === 'playing') drawPlayer();
  TAS.particles.draw();

  // Score popups
  for (var si = 0; si < scorePopups.length; si++) {
    var sp = scorePopups[si];
    ctx.globalAlpha = Math.min(1, sp.life);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Transition effect
  if (transDir) {
    const progress = transTick / 0.3;
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 1 - progress;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  if (pauseTimer > 0) { drawItemGet(); }

  // Boss intro overlay
  if (bossActive && bossActive.introTimer > 0) { drawBossIntro(); }

  // Save room indicator
  const roomKey = player.roomX + ',' + player.roomY;
  if (world.saveRooms[roomKey]) {
    ctx.fillStyle = '#4f4';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SAVE STATION - ENERGY RESTORED', GW/2, GH - 8);
  }

  // Tutorial overlay
  if (state === 'playing' && tutorialStep < 4) { drawTutorial(); }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitle() {
  // Animated background atmosphere
  for (let i = 0; i < 40; i++) {
    const x = (i * 47 + frame * 0.3) % GW;
    const y = (i * 31 + Math.sin(frame * 0.01 + i) * 20) % GH;
    ctx.fillStyle = 'rgba(255,100,50,' + (0.03 + Math.sin(frame*0.02+i)*0.02) + ')';
    ctx.fillRect(x, y, 2, 2);
  }

  // Maw teeth decoration at bottom
  for (var t = 0; t < 20; t++) {
    var tx = t * 22 - 5;
    var th = 8 + Math.sin(frame * 0.03 + t * 0.5) * 4;
    ctx.fillStyle = '#322';
    ctx.beginPath();
    ctx.moveTo(tx, GH);
    ctx.lineTo(tx + 10, GH - th);
    ctx.lineTo(tx + 20, GH);
    ctx.fill();
  }

  ctx.textAlign = 'center';

  // Title with shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('IRON MAW', GW/2 + 2, 62);
  ctx.fillStyle = '#c44';
  ctx.fillText('IRON MAW', GW/2, 60);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('The Depths Hunger', GW/2, 82);

  // Baseling info
  ctx.fillStyle = BASELING_COLOR;
  ctx.font = '9px monospace';
  ctx.fillText(BASELING_NAME + (BASELING_LEVEL > 0 ? ' Lv.' + BASELING_LEVEL : ''), GW/2, 100);

  // NES-style controls
  ctx.fillStyle = '#556';
  ctx.font = '8px monospace';
  var controlY = 118;
  var controls = [
    ['ARROWS/WASD', 'Move'],
    ['Z/SPACE', 'Jump'],
    ['X/J', 'Shoot (hold=charge)'],
    ['C/K', 'Morph Ball'],
    ['V/L', 'Missile'],
    ['M/TAB', 'Map']
  ];
  for (var ci = 0; ci < controls.length; ci++) {
    ctx.fillStyle = '#77a';
    ctx.textAlign = 'right';
    ctx.fillText(controls[ci][0], GW/2 - 8, controlY + ci * 12);
    ctx.fillStyle = '#556';
    ctx.textAlign = 'left';
    ctx.fillText(controls[ci][1], GW/2 + 8, controlY + ci * 12);
  }
  ctx.textAlign = 'center';

  // Stat summary
  if (BASELING_LEVEL > 0) {
    ctx.fillStyle = '#444';
    ctx.font = '7px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW/2, 198);
  }

  // Menu options
  var menuY = 218;
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = titleSel === 0 ? '#ffdd44' : '#666';
  ctx.fillText((titleSel === 0 ? '> ' : '  ') + 'NEW GAME' + (titleSel === 0 ? ' <' : ''), GW/2, menuY);
  if (hasSaveData()) {
    ctx.fillStyle = titleSel === 1 ? '#ffdd44' : '#666';
    ctx.fillText((titleSel === 1 ? '> ' : '  ') + 'CONTINUE' + (titleSel === 1 ? ' <' : ''), GW/2, menuY + 16);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('PRESS JUMP OR SHOOT', GW/2, 260);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#444';
  ctx.font = '8px monospace';
  ctx.fillText('A Tasern Tale', GW/2, 285);
}

function drawRoom() {
  const roomKey = player.roomX + ',' + player.roomY;
  const room = world.rooms[roomKey];
  if (!room) return;

  const zoneData = ZONES[room.zone];

  for (let ty = 0; ty < ROWS; ty++) {
    for (let tx = 0; tx < COLS; tx++) {
      const tile = room.tiles[ty][tx];
      const px = tx * TILE, py = ty * TILE;

      if (tile === 0) continue;

      if (tile === 1) {
        ctx.fillStyle = zoneData.wall;
        ctx.fillRect(px, py, TILE, TILE);
        // Pixel edge detail
        ctx.fillStyle = zoneData.accent;
        ctx.globalAlpha = 0.2;
        ctx.fillRect(px, py, TILE, 1);
        ctx.fillRect(px, py, 1, TILE);
        ctx.globalAlpha = 0.1;
        ctx.fillRect(px + TILE - 1, py, 1, TILE);
        ctx.fillRect(px, py + TILE - 1, TILE, 1);
        ctx.globalAlpha = 1;
        // Pixel noise texture
        if ((tx + ty) % 3 === 0) {
          ctx.fillStyle = zoneData.palette[0];
          ctx.globalAlpha = 0.15;
          ctx.fillRect(px + 4, py + 4, 2, 2);
          ctx.fillRect(px + 10, py + 10, 2, 2);
          ctx.globalAlpha = 1;
        }
      } else if (tile === 3) {
        ctx.fillStyle = '#4a4';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = '#6c6';
        ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
        // Crack pattern
        ctx.strokeStyle = '#384';
        ctx.beginPath();
        ctx.moveTo(px+3, py+8); ctx.lineTo(px+13, py+5);
        ctx.stroke();
      } else if (tile === 4) {
        ctx.fillStyle = '#f40';
        ctx.fillRect(px, py, TILE, TILE);
        const glow = Math.sin(frame * 0.1 + tx) * 0.3 + 0.7;
        ctx.fillStyle = 'rgba(255,200,0,' + (glow * 0.4) + ')';
        ctx.fillRect(px, py, TILE, TILE/2);
        // Lava bubbles
        if (frame % 40 < 5 && (tx + frame) % 7 === 0) {
          TAS.particles.spawn(px + 8, py + 4, '#fc6', 1, 2);
        }
      } else if (tile === 5) {
        ctx.fillStyle = '#468';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = 'rgba(150,200,255,0.3)';
        ctx.fillRect(px+2, py+2, TILE-4, 3);
        ctx.fillRect(px+6, py+8, TILE-8, 2);
      } else if (tile === 6) {
        ctx.fillStyle = '#554';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = '#ff0';
        ctx.setLineDash([2,2]);
        ctx.strokeRect(px+1, py+1, TILE-2, TILE-2);
        ctx.setLineDash([]);
      } else if (tile === HAZARD_SPIKES) {
        // Spikes
        ctx.fillStyle = '#888';
        for (var s = 0; s < 4; s++) {
          ctx.beginPath();
          ctx.moveTo(px + s*4, py + TILE);
          ctx.lineTo(px + s*4 + 2, py + 4);
          ctx.lineTo(px + s*4 + 4, py + TILE);
          ctx.fill();
        }
      } else if (tile === HAZARD_ACID) {
        ctx.fillStyle = '#2a4';
        ctx.fillRect(px, py, TILE, TILE);
        var acidGlow = Math.sin(frame * 0.08 + tx * 0.5) * 0.3 + 0.5;
        ctx.fillStyle = 'rgba(80,255,80,' + acidGlow + ')';
        ctx.fillRect(px, py, TILE, TILE/3);
        if (frame % 60 < 3 && tx % 3 === 0) TAS.particles.spawn(px + 8, py + 2, '#4f4', 1, 1);
      } else if (tile === HAZARD_STEAM) {
        ctx.fillStyle = '#445';
        ctx.fillRect(px, py, TILE, TILE);
        // Steam vent grate
        ctx.fillStyle = '#667';
        ctx.fillRect(px+2, py+2, 3, TILE-4);
        ctx.fillRect(px+7, py+2, 3, TILE-4);
        ctx.fillRect(px+12, py+2, 3, TILE-4);
        if (frame % 90 < 30 && frame % 4 === 0) {
          TAS.particles.spawn(px + 8, py - 4, '#aaa', 1, 2);
        }
      }
    }
  }

  // Save room glow
  if (room.isSave) {
    ctx.fillStyle = 'rgba(60,255,120,0.03)';
    ctx.fillRect(0, 0, COLS*TILE, ROWS*TILE);
    // Pulsing center orb
    var orbGlow = Math.sin(frame * 0.04) * 0.3 + 0.5;
    ctx.globalAlpha = orbGlow;
    ctx.fillStyle = '#4f4';
    ctx.beginPath();
    ctx.arc(COLS*TILE/2, ROWS*TILE/2, 6, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawPlayer() {
  if (player.iframes > 0 && Math.floor(player.iframes * 10) % 2 === 0) return;

  const px = Math.floor(player.x);
  const py = Math.floor(player.y);

  if (player.morphed) {
    const bobY = Math.sin(frame * 0.2) * 1;
    ctx.fillStyle = BASELING_COLOR;
    ctx.beginPath();
    ctx.arc(px + player.w/2, py + player.h/2 + bobY, 5, 0, Math.PI * 2);
    ctx.fill();
    // Baseling icon letter
    ctx.fillStyle = '#000';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(BASELING_ICON, px + player.w/2, py + player.h/2 + 2 + bobY);
    // Highlight
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(px + player.w/2 - 1, py + player.h/2 - 1 + bobY, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Baseling in armor
    // Body (colored by baseling)
    ctx.fillStyle = BASELING_COLOR;
    ctx.fillRect(px + 2, py + 8, 10, 14);
    // Helmet
    var helmColor = shadeColor(BASELING_COLOR, 30);
    ctx.fillStyle = helmColor;
    ctx.fillRect(px + 1, py, 12, 10);
    // Visor
    ctx.fillStyle = '#0f8';
    const visorX = player.dir > 0 ? px + 8 : px + 2;
    ctx.fillRect(visorX, py + 3, 5, 3);
    // Icon on helmet
    ctx.fillStyle = '#000';
    ctx.font = 'bold 5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(BASELING_ICON, px + 7, py + 8);
    // Arm cannon
    ctx.fillStyle = '#555';
    const armY = player.aimUp ? py + 2 : player.aimDiag ? py + 4 : py + 12;
    const armX = player.dir > 0 ? px + 10 : px - 4;
    ctx.fillRect(armX, armY, 6, 4);
    // Cannon tip glow
    if (player.charge > 0.3) {
      const glow = Math.min(player.charge / 1.5, 1);
      ctx.fillStyle = player.charge > 1.5 ? '#f4f' : '#4ff';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
      ctx.beginPath();
      ctx.arc(armX + (player.dir > 0 ? 6 : 0), armY + 2, 3 + glow * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    // Legs
    var legColor = shadeColor(BASELING_COLOR, -30);
    ctx.fillStyle = legColor;
    if (player.grounded && Math.abs(player.vx) > 5) {
      const legOff = Math.sin(player.animFrame * Math.PI/2) * 3;
      ctx.fillRect(px + 2, py + 20, 4, 4 + legOff);
      ctx.fillRect(px + 8, py + 20, 4, 4 - legOff);
    } else {
      ctx.fillRect(px + 2, py + 20, 4, 4);
      ctx.fillRect(px + 8, py + 20, 4, 4);
    }

    if (player.crouching) {
      ctx.fillStyle = BASELING_COLOR;
      ctx.fillRect(px + 1, py + 16, 12, 8);
    }
  }
}

function shadeColor(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16) || parseInt(hex.slice(1,2), 16) * 17;
  var g = parseInt(hex.slice(3,5), 16) || parseInt(hex.slice(2,3), 16) * 17;
  var b = parseInt(hex.slice(5,7), 16) || parseInt(hex.slice(3,4), 16) * 17;
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return '#' + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
}

function drawEnemies() {
  for (const e of enemies) {
    // Hit flash
    if (e.flashTimer > 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x, e.y, e.w, e.h);
      continue;
    }

    if (e.frozen > 0) {
      ctx.fillStyle = '#8cf';
      ctx.fillRect(e.x - 1, e.y - 1, e.w + 2, e.h + 2);
    }

    const zd = ZONES[e.zone];
    ctx.fillStyle = zd.accent;

    // Draw by behavior type for more visual variety
    switch(e.behavior) {
      case 'fly':
        // Wing-like circle
        ctx.beginPath();
        ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI * 2);
        ctx.fill();
        // Wing flaps
        var wingOff = Math.sin(frame * 0.3 + e.x) * 3;
        ctx.fillStyle = zd.palette[1] || zd.accent;
        ctx.fillRect(e.x - 3, e.y + e.h/2 - 1 + wingOff, 3, 2);
        ctx.fillRect(e.x + e.w, e.y + e.h/2 - 1 - wingOff, 3, 2);
        ctx.fillStyle = '#f00';
        ctx.fillRect(e.x + e.w/2 - 2, e.y + e.h/2 - 1, 4, 2);
        break;
      case 'rush':
        // Aggressive triangle shape
        ctx.beginPath();
        ctx.moveTo(e.x + e.w/2, e.y);
        ctx.lineTo(e.x, e.y + e.h);
        ctx.lineTo(e.x + e.w, e.y + e.h);
        ctx.fill();
        ctx.fillStyle = '#f00';
        ctx.fillRect(e.x + e.w/2 - 2, e.y + 4, 4, 3);
        break;
      case 'shoot':
        // Turret shape
        ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
        ctx.fillStyle = '#f44';
        // Barrel pointing at player
        var barrelDir = player.x > e.x ? 1 : -1;
        ctx.fillRect(e.x + (barrelDir > 0 ? e.w : -4), e.y + e.h/2 - 1, 4, 3);
        break;
      case 'spike':
        // Stationary with spikes
        ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
        ctx.fillStyle = '#ff0';
        for (let s = 0; s < 3; s++) {
          ctx.beginPath();
          ctx.moveTo(e.x + 2 + s*5, e.y + 4);
          ctx.lineTo(e.x + 4 + s*5, e.y);
          ctx.lineTo(e.x + 6 + s*5, e.y + 4);
          ctx.fill();
        }
        break;
      case 'ambush':
        // Ghostly semi-transparent
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1 + e.x) * 0.3;
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = '#f0f';
        ctx.fillRect(e.x + 2, e.y + 2, 3, 3);
        ctx.fillRect(e.x + e.w - 5, e.y + 2, 3, 3);
        ctx.globalAlpha = 1;
        break;
      default:
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = '#f00';
        ctx.fillRect(e.x + 2, e.y + 2, 3, 3);
        ctx.fillRect(e.x + e.w - 5, e.y + 2, 3, 3);
    }

    // HP pip for tough enemies
    if (e.maxHp >= 8) {
      ctx.fillStyle = '#300';
      ctx.fillRect(e.x, e.y - 3, e.w, 2);
      ctx.fillStyle = '#f44';
      ctx.fillRect(e.x, e.y - 3, e.w * (e.hp / e.maxHp), 2);
    }
  }
}

function drawBoss() {
  const b = bossActive;
  const zd = ZONES[b.zone];
  const bd = BOSS_DATA[b.zone];

  if (b.dead) {
    // Death explosion animation
    if (b.timer < 2) {
      b.timer += 0.016;
      if (frame % 4 === 0) TAS.particles.spawn(b.x + Math.random()*b.w, b.y + Math.random()*b.h, '#f84', 2, 3);
    }
    return;
  }

  // Shake offset when hit
  var shakeOff = b.shakeTimer > 0 ? (Math.random()-0.5)*4 : 0;

  ctx.save();
  ctx.translate(shakeOff, 0);

  // Boss body
  const flash = b.timer % 0.2 < 0.1 && b.hp < b.maxHp * 0.33;
  ctx.fillStyle = flash ? '#fff' : bd.color;
  ctx.fillRect(b.x, b.y, b.w, b.h);

  // Core
  ctx.fillStyle = '#f00';
  ctx.beginPath();
  ctx.arc(b.x + b.w/2, b.y + b.h/2, 8 + Math.sin(frame*0.1)*2, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (angry in later phases)
  ctx.fillStyle = b.phase >= 2 ? '#f00' : '#ff0';
  ctx.fillRect(b.x + 6, b.y + 8, 6, 4 - b.phase);
  ctx.fillRect(b.x + b.w - 12, b.y + 8, 6, 4 - b.phase);

  // Armor plates
  ctx.fillStyle = zd.wall;
  ctx.fillRect(b.x - 4, b.y + 10, 4, 20);
  ctx.fillRect(b.x + b.w, b.y + 10, 4, 20);

  // Phase indicators
  for (var pi = 0; pi <= b.phase; pi++) {
    ctx.fillStyle = '#f44';
    ctx.fillRect(b.x + b.w/2 - 6 + pi*5, b.y + b.h + 2, 3, 3);
  }

  ctx.restore();

  // HP bar
  ctx.fillStyle = '#300';
  ctx.fillRect(b.x - 4, b.y - 10, b.w + 8, 5);
  ctx.fillStyle = b.hp > b.maxHp * 0.33 ? '#f44' : '#f00';
  ctx.fillRect(b.x - 4, b.y - 10, (b.w + 8) * (b.hp / b.maxHp), 5);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(bd.name, b.x + b.w/2, b.y - 14);
}

function drawBossIntro() {
  var b = bossActive;
  var bd = BOSS_DATA[b.zone];
  var t = 2.5 - b.introTimer;

  ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, t) + ')';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  if (t > 0.5) {
    ctx.fillStyle = bd.color;
    ctx.font = 'bold 16px monospace';
    ctx.fillText(bd.name, GW/2, GH/2 - 10);
  }
  if (t > 1.2) {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText(bd.subtitle, GW/2, GH/2 + 8);
  }
  if (t > 1.8) {
    ctx.fillStyle = '#555';
    ctx.font = '7px monospace';
    ctx.fillText(bd.desc, GW/2, GH/2 + 24);
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    ctx.fillStyle = p.color || '#ff0';
    const size = p.size || 3;
    if (p.missile) {
      ctx.fillRect(p.x - size/2, p.y - 2, size, 4);
      ctx.fillStyle = 'rgba(255,100,0,0.5)';
      ctx.fillRect(p.x - size, p.y - 1, size/2, 2);
    } else if (p.wave) {
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.3) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size/2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawBombs() {
  for (const b of bombs) {
    const flash = b.timer < 0.3 && Math.floor(b.timer * 20) % 2;
    ctx.fillStyle = flash ? '#fff' : BASELING_COLOR;
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawItems() {
  const roomKey = player.roomX + ',' + player.roomY;
  if (!items[roomKey]) return;

  for (const item of items[roomKey]) {
    if (item.collected) continue;
    const bob = Math.sin(frame * 0.05 + item.x) * 2;

    if (item.type === 'upgrade') {
      ctx.fillStyle = '#f4f';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
      ctx.beginPath();
      ctx.arc(item.x + 7, item.y + 7 + bob, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(item.x + 7, item.y + 7 + bob, 5, 0, Math.PI * 2);
      ctx.fill();
    } else if (item.type === 'etank') {
      ctx.fillStyle = '#4f4';
      ctx.fillRect(item.x + 2, item.y + 3 + bob, 10, 8);
      ctx.fillStyle = '#8f8';
      ctx.fillRect(item.x + 4, item.y + 1 + bob, 6, 3);
    } else if (item.type === 'missile') {
      ctx.fillStyle = '#f44';
      ctx.fillRect(item.x + 4, item.y + 2 + bob, 6, 10);
      ctx.fillStyle = '#faa';
      ctx.beginPath();
      ctx.moveTo(item.x + 7, item.y + bob);
      ctx.lineTo(item.x + 4, item.y + 4 + bob);
      ctx.lineTo(item.x + 10, item.y + 4 + bob);
      ctx.fill();
    }
  }
}

function drawHUD() {
  if (!player) return;

  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, HUD_H);

  // Energy
  ctx.fillStyle = player.hp < player.maxHp * 0.25 ? '#f44' : '#4f4';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('E:' + player.hp + '/' + player.maxHp, 4, 9);

  // Missiles
  if (player.maxMissiles > 0) {
    ctx.fillStyle = '#f44';
    ctx.fillText('M:' + player.missiles, 100, 9);
  }

  // Score
  ctx.fillStyle = '#ff0';
  ctx.textAlign = 'center';
  ctx.fillText(score, GW/2, 9);

  // Zone name (small)
  const zone = getZoneAt(player.roomX, player.roomY);
  if (zone >= 0) {
    ctx.fillStyle = ZONES[zone].accent;
    ctx.font = '7px monospace';
    ctx.fillText(ZONES[zone].name, GW/2, GH - 2);
  }

  // Lives
  if (player.lives > 0) {
    ctx.fillStyle = BASELING_COLOR;
    ctx.textAlign = 'right';
    ctx.font = '8px monospace';
    ctx.fillText('x' + player.lives, GW - 40, 9);
  }

  // Combo
  if (killCombo >= 2) {
    ctx.fillStyle = '#f80';
    ctx.textAlign = 'right';
    ctx.font = 'bold 8px monospace';
    ctx.fillText(killCombo + 'x', GW - 4, 9);
  }

  // Charge indicator
  if (player.charge > 0.3) {
    ctx.fillStyle = player.charge > 1.5 ? '#f4f' : '#4ff';
    ctx.textAlign = 'right';
    ctx.font = '7px monospace';
    ctx.fillText('CHG', GW - 55, 9);
  }

  // Coordinates
  ctx.fillStyle = '#333';
  ctx.textAlign = 'right';
  ctx.font = '7px monospace';
  ctx.fillText(player.roomX + ',' + player.roomY, GW - 4, GH - 2);
}

function drawItemGet() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, GH/2 - 30, GW, 60);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';

  const roomKey = player.roomX + ',' + player.roomY;
  if (items[roomKey]) {
    for (const item of items[roomKey]) {
      if (item.collected) {
        if (item.type === 'upgrade') {
          ctx.fillText(UPGRADE_NAMES[item.upgrade] || item.upgrade, GW/2, GH/2 - 8);
          ctx.fillStyle = '#aaa';
          ctx.font = '9px monospace';
          ctx.fillText('ACQUIRED', GW/2, GH/2 + 10);
        } else if (item.type === 'etank') {
          ctx.fillText('ENERGY TANK', GW/2, GH/2 - 8);
          ctx.fillStyle = '#4f4';
          ctx.font = '9px monospace';
          ctx.fillText('MAX ENERGY +' + Math.round(100 * STAT_HP_MULT), GW/2, GH/2 + 10);
        } else if (item.type === 'missile') {
          ctx.fillText('MISSILE EXPANSION', GW/2, GH/2 - 8);
          ctx.fillStyle = '#f44';
          ctx.font = '9px monospace';
          ctx.fillText('MISSILES +5', GW/2, GH/2 + 10);
        }
        break;
      }
    }
  }
}

function drawTutorial() {
  var msgs = [
    'ARROWS/WASD to move - Z/SPACE to jump',
    'X/J to shoot - hold to charge!',
    'Find MORPH BALL to reach hidden tunnels',
    'M/TAB opens the map - find the bosses!'
  ];
  if (tutorialStep >= msgs.length) return;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(GW/2 - 130, 20, 260, 18);
  ctx.fillStyle = '#ff0';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgs[tutorialStep], GW/2, 32);
}

function drawMap() {
  ctx.fillStyle = 'rgba(0,0,10,0.95)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('MAP', GW/2, 15);

  const cellW = 14, cellH = 10;
  const offX = GW/2 - WORLD_W * cellW / 2;
  const offY = 25;

  for (const key in world.visited) {
    const parts = key.split(',');
    const rx = parseInt(parts[0]), ry = parseInt(parts[1]);
    const zone = getZoneAt(rx, ry);
    const zd = zone >= 0 ? ZONES[zone] : ZONES[0];

    const sx = offX + rx * cellW;
    const sy = offY + ry * cellH;

    ctx.fillStyle = zd.wall;
    ctx.fillRect(sx, sy, cellW - 1, cellH - 1);

    if (world.saveRooms[key]) {
      ctx.fillStyle = '#4f4';
      ctx.fillRect(sx + 2, sy + 2, cellW - 5, cellH - 5);
    }

    for (const br of BOSS_ROOMS) {
      if (br.rx === rx && br.ry === ry) {
        ctx.fillStyle = player.upgrades['boss_' + BOSS_ROOMS.indexOf(br)] ? '#444' : '#f44';
        ctx.fillRect(sx + 3, sy + 2, cellW - 7, cellH - 5);
      }
    }
  }

  const px = offX + player.roomX * cellW;
  const py = offY + player.roomY * cellH;
  ctx.fillStyle = (frame % 30 < 15) ? '#fff' : BASELING_COLOR;
  ctx.fillRect(px + 2, py + 1, cellW - 5, cellH - 3);

  // Legend
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('YOU', offX, GH - 50);
  ctx.fillStyle = BASELING_COLOR;
  ctx.fillRect(offX + 25, GH - 56, 6, 6);

  ctx.fillStyle = '#888';
  ctx.fillText('SAVE', offX + 50, GH - 50);
  ctx.fillStyle = '#4f4';
  ctx.fillRect(offX + 80, GH - 56, 6, 6);

  ctx.fillStyle = '#888';
  ctx.fillText('BOSS', offX + 100, GH - 50);
  ctx.fillStyle = '#f44';
  ctx.fillRect(offX + 130, GH - 56, 6, 6);

  // Stats
  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  const totalItems = 9 + 8 + 10;
  let collected = 0;
  for (const key in items) {
    for (const item of items[key]) { if (item.collected) collected++; }
  }
  ctx.fillText('ITEMS: ' + collected + '/' + totalItems + ' (' + Math.floor(collected/totalItems*100) + '%)  SCORE: ' + score + '  KILLS: ' + totalKills, GW/2, GH - 30);

  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  let ux = 10, uy = GH - 18;
  for (const upg of UPGRADES) {
    ctx.fillStyle = player.upgrades[upg] ? '#4f4' : '#333';
    ctx.fillText(UPGRADE_NAMES[upg] || upg, ux, uy);
    ux += 60;
    if (ux > GW - 60) { ux = 10; uy += 10; }
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('PRESS M/TAB TO CLOSE', GW/2, GH - 4);
}

function drawDeath() {
  ctx.fillStyle = 'rgba(20,0,0,0.8)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('DESTROYED', GW/2, GH/2 - 10);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('The Iron Maw claims another...', GW/2, GH/2 + 15);

  if (player.lives > 0) {
    ctx.fillStyle = '#ff0';
    ctx.font = '10px monospace';
    ctx.fillText('Lives remaining: ' + player.lives, GW/2, GH/2 + 35);
  }

  if (deathTimer > 2) {
    const pulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#aaa';
    ctx.fillText(player.lives > 0 ? 'Respawning...' : 'Returning to title...', GW/2, GH/2 + 55);
    ctx.globalAlpha = 1;
  }
}

function drawEnding() {
  const t = endTimer;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  if (t < 2) {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = Math.min(t, 1);
    ctx.font = 'bold 16px monospace';
    ctx.fillText('THE MAW IS SILENCED', GW/2, GH/2);
    ctx.globalAlpha = 1;
  } else if (t < 5) {
    ctx.fillStyle = '#4f4';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('MISSION COMPLETE', GW/2, 50);

    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';

    let collected = 0, total = 27;
    for (const key in items) {
      for (const item of items[key]) { if (item.collected) collected++; }
    }

    ctx.fillText(BASELING_NAME + (BASELING_LEVEL > 0 ? ' Lv.' + BASELING_LEVEL : ''), GW/2, 75);
    ctx.fillText('Score: ' + score, GW/2, 95);
    ctx.fillText('Items: ' + collected + '/' + total + ' (' + Math.floor(collected/total*100) + '%)', GW/2, 115);
    ctx.fillText('Total Kills: ' + totalKills, GW/2, 135);
    ctx.fillText('Energy Tanks: ' + player.etanks, GW/2, 155);
    ctx.fillText('Missiles: ' + player.maxMissiles, GW/2, 175);

    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    let y = 200;
    for (const upg of UPGRADES) {
      ctx.fillStyle = player.upgrades[upg] ? '#4f4' : '#633';
      ctx.fillText((player.upgrades[upg] ? '[X] ' : '[ ] ') + (UPGRADE_NAMES[upg] || upg), GW/2, y);
      y += 12;
    }
  } else {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('THE IRON MAW', GW/2, GH/2 - 20);
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('A Tasern Tale', GW/2, GH/2);
    ctx.fillText('Thanks for playing', GW/2, GH/2 + 20);

    const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#aaa';
    ctx.fillText('Press any key...', GW/2, GH - 30);
    ctx.globalAlpha = 1;
  }
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
