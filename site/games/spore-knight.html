<body>

<script src="baseling-player.js"></script>

<script src="tasern-art.js"></script>

<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: TAS.player.mults() -> {moveSpeed,health,damage,luck,swim}
// clamped to the single-player band (0.8–1.6). This game reads D&D-style statB fields and
// many derived constants, so we synthesize statB from the bounded mults (mult 1.0 -> 10,
// 0.8 -> 6, 1.6 -> 22) and recompute the mods + constants in recomputeStats(). Not a wager
// game. NOTE: keeping statB.color always defined also fixes a pre-existing crash where the
// title drew lightenColor(statB.color) with a null color when no NFT was selected.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[spore-knight] NftLoader display info failed:', e && e.message); }

// D&D mods + derived constants — (re)assigned by recomputeStats().
var strMod, dexMod, conMod, intMod, wisMod, chaMod;
var WHIP_DMG_BONUS, SPEED_MULT, JUMP_MULT, HP_BONUS, KB_RESIST, SUB_COST_REDUCE,
    HOMING_MULT, PICKUP_RANGE, DROP_LUCK, SCORE_MULT, BOSS_GOLD_MULT, DMG_MULT,
    COOLDOWN_MULT, BONUS_LIVES, CRIT_CHANCE, HP_SCALE, LEVEL_SCALE;
var picking = false; // baseling character-select overlay open
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.cooldown = 1 / m.moveSpeed; statB.scoreMult = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  statB.level = Math.round((statB.str + statB.dex + statB.con + statB.int + statB.wis + statB.cha) / 6);
  strMod = Math.floor((statB.str - 10) / 2); dexMod = Math.floor((statB.dex - 10) / 2);
  conMod = Math.floor((statB.con - 10) / 2); intMod = Math.floor((statB.int - 10) / 2);
  wisMod = Math.floor((statB.wis - 10) / 2); chaMod = Math.floor((statB.cha - 10) / 2);
  WHIP_DMG_BONUS = Math.max(0, strMod);
  SPEED_MULT = m.moveSpeed;                          // DEX -> movement speed
  JUMP_MULT = Math.min(1.25, m.moveSpeed);           // cap jump so 1.6x can't overshoot
  HP_BONUS = Math.max(0, conMod * 4);
  KB_RESIST = Math.max(0.3, 2 - m.health);           // STA -> knockback resist
  SUB_COST_REDUCE = Math.max(0, intMod);
  HOMING_MULT = 1 + Math.max(0, intMod) * 0.15;
  PICKUP_RANGE = 10 + Math.max(0, wisMod) * 3;
  DROP_LUCK = Math.max(0, (m.luck - 1) * 0.2);       // LCK -> candle drop quality
  SCORE_MULT = 1;                                    // score is not a stat
  BOSS_GOLD_MULT = m.luck;                           // LCK -> boss gold
  DMG_MULT = m.damage;
  COOLDOWN_MULT = Math.max(0.4, 1 / m.moveSpeed);    // SPD -> attack speed
  BONUS_LIVES = statB.lives;
  CRIT_CHANCE = 0.05 + (m.luck - 0.8) * 0.2;         // LCK -> crit chance
  HP_SCALE = m.health;
  LEVEL_SCALE = 1;                                   // don't scale enemy difficulty by stats
}
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-knight] player init failed:', e && e.message); });
}

// === CONSTANTS ===
var GW = 400, GH = 300;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'WHIP' } });

// === OUR ENEMY SPRITE ART (fungal-folklore set; geometric drawing kept as fallback) ===
if (window.TasernArt) {
  TasernArt.preload('enemies');
  TasernArt.load('art/sea/enemy-snake.png'); // spore_fish
}
var ENEMY_SPR = {
  myco_crawler: 'art/enemies/enemy-myconid.jpg',
  spore_bat: 'art/enemies/enemy-will-o-wisp.jpg',
  fungal_skeleton: 'art/enemies/enemy-skeleton.jpg',
  reactor_head: 'art/enemies/enemy-will-o-wisp.jpg',
  spore_armor: 'art/enemies/enemy-shroom-knight.jpg',
  myco_flea: 'art/enemies/enemy-goblin.jpg',
  spore_fish: 'art/sea/enemy-snake.png',
  bone_tower: 'art/enemies/enemy-spriggan.jpg'
};
// Boss sprites per stage: Mold Titan, Reactor Queen, Toxic Wraith Duo, Frankenspore, Garden Reaper, Fungi Lord
var BOSS_SPR = ['troll', 'root-witch', 'bog-wight', 'rot-walker', 'skeleton', 'wyrm'];
function enemySprite(path) {
  if (!path || !window.TasernArt || !TasernArt.getImg) return null;
  var im = TasernArt.getImg(path);
  return (im && im.complete && im.naturalWidth) ? im : null;
}

var TILE = 16;
var GRAVITY = 980;
var JUMP_VEL = -310 * JUMP_MULT;
var WALK_SPEED = 80 * SPEED_MULT;
var STAIR_SPEED = 55 * SPEED_MULT;
var KNOCKBACK_VX = 120;
var KNOCKBACK_VY = -160;
var INV_TIME = 1.5;
var WHIP_DUR = 0.3 * COOLDOWN_MULT;
var WHIP_RANGE = [32, 48, 64, 80];
var SUB_COST = [1, 1, 3, 1, 5];
var SUB_NAMES = ['POOP DAGGER', 'GARDEN AXE', 'HOLY SPORE', 'MYCELIUM BONE', 'CHRONO SEED'];

// === SCORE POPUPS ===
var scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', timer: 1.2, vy: -40 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.timer -= dt;
    sp.y += sp.vy * dt;
    sp.vy *= 0.96;
    if (sp.timer <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.timer * 2);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === TUTORIAL SYSTEM ===
var tutorialStep = 0;
var tutorialTimer = 0;
var tutorialShown = false;
var TUTORIAL_MSGS = [
  { msg: 'ARROWS or WASD to move', dur: 3 },
  { msg: 'Z or SPACE to jump', dur: 3 },
  { msg: 'X to whip enemies', dur: 3 },
  { msg: 'UP + X for sub-weapon', dur: 3 },
  { msg: 'Smash POOP piles for garden loot!', dur: 3 },
  { msg: 'Reach the end to face the BOSS', dur: 3 }
];

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('sporeknight_hi');
var lives = 3 + BONUS_LIVES;
var stage = 0;
var screenIdx = 0;
var hearts = 5;
var whipLevel = 0;
var subWeapon = -1;
var freezeTimer = 0;
var bossHP = 0;
var bossMaxHP = 0;
var bossActive = false;
var stageComplete = false;
var stageCompleteTimer = 0;
var critFlash = 0;
var comboCount = 0;
var comboTimer = 0;

// Hazards array
var hazards = [];

// Player
var baseMaxHp = Math.floor((16 + HP_BONUS) * HP_SCALE);
var player = { x: 0, y: 0, vx: 0, vy: 0, w: 12, h: 24, dir: 1, onGround: false, onStair: false, stairDir: 0, crouching: false, jumping: false, hp: baseMaxHp, maxHp: baseMaxHp, invTimer: 0, whipTimer: 0, dead: false, deathTimer: 0 };

// Stage data
var platforms = [];
var stairs = [];
var candles = [];
var enemies = [];
var projectiles = [];
var pickups = [];
var boss = null;
var camX = 0;

// === TASERN STAGE THEMING ===
var STAGE_NAMES = ['Mycelium Caves', 'Reactor Core', 'POOP Waterway', 'Fungal Chapel', 'Garden Lab', 'Fungi Lord Throne'];
var STAGE_COLORS = [
  { bg: '#1a1c2c', floor: '#7a444a', wall: '#2a1a0a', accent: '#6b4422', particle: '#38d973' },
  { bg: '#1a1c2c', floor: '#2a2a3a', wall: '#1a1a2a', accent: '#3cacd7', particle: '#3cacd7' },
  { bg: '#1a1c2c', floor: '#1a2a2a', wall: '#0a1a1a', accent: '#38d973', particle: '#38d973' },
  { bg: '#1a1c2c', floor: '#3a2a3a', wall: '#2a1a2a', accent: '#a855f7', particle: '#a855f7' },
  { bg: '#1a1c2c', floor: '#2a3a1a', wall: '#1a2a0a', accent: '#f4b41b', particle: '#38d973' },
  { bg: '#1a1c2c', floor: '#7a444a', wall: '#2a0a0a', accent: '#e6482e', particle: '#e6482e' }
];

var SCREENS_PER_STAGE = [3, 4, 3, 4, 3, 3];

// === LEVEL GENERATION ===
function generateScreen(stageNum, screenNum) {
  platforms = [];
  stairs = [];
  candles = [];
  enemies = [];
  projectiles = [];
  pickups = [];
  hazards = [];
  boss = null;
  bossActive = false;

  var sw = GW;
  var sh = GH - 30;
  var floorY = sh - TILE;

  platforms.push({ x: 0, y: floorY, w: sw, h: TILE, type: 'floor' });

  var seed = stageNum * 100 + screenNum * 7 + 42;
  function rng() { seed = (seed * 1664525 + 1013904223) & 0x7FFFFFFF; return seed / 0x7FFFFFFF; }

  var isLast = screenNum === SCREENS_PER_STAGE[stageNum] - 1;

  if (stageNum === 0) {
    // Mycelium Caves - mushroom shelves, hanging roots
    platforms.push({ x: 40, y: floorY - 50, w: 80, h: 8, type: 'mushroom' });
    platforms.push({ x: 160, y: floorY - 90, w: 70, h: 8, type: 'mushroom' });
    platforms.push({ x: 280, y: floorY - 60, w: 90, h: 8, type: 'mushroom' });
    if (screenNum > 0) {
      platforms.push({ x: 100, y: floorY - 130, w: 60, h: 8, type: 'mushroom' });
      stairs.push({ x: 340, y: floorY, topY: floorY - 90, dir: 1 });
    }
    // Spore piles (candles)
    for (var i = 0; i < 5 + screenNum; i++) {
      candles.push({ x: 30 + rng() * 340, y: floorY - 40 - rng() * 80, hp: 1 });
    }
    // Hazards: dripping acid
    if (screenNum >= 1) {
      hazards.push({ x: 120 + rng() * 100, y: 30, type: 'acid_drip', timer: 0 });
    }
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        var ex = 100 + rng() * 260;
        if (rng() < 0.5) enemies.push(createEnemy('myco_crawler', ex, floorY - 20));
        else enemies.push(createEnemy('spore_bat', ex, floorY - 60 - rng() * 40));
      }
    }
  } else if (stageNum === 1) {
    // Reactor Core - metal platforms, energy fields
    platforms.push({ x: 20, y: floorY - 60, w: 60, h: 8, type: 'reactor' });
    platforms.push({ x: 120, y: floorY - 110, w: 50, h: 8, type: 'reactor' });
    platforms.push({ x: 220, y: floorY - 80, w: 70, h: 8, type: 'reactor' });
    platforms.push({ x: 300, y: floorY - 140, w: 60, h: 8, type: 'reactor' });
    if (screenNum >= 1) {
      platforms.push({ x: 50, y: floorY - 160, w: 80, h: 8, type: 'reactor' });
      stairs.push({ x: 180, y: floorY, topY: floorY - 110, dir: -1 });
    }
    platforms.push({ x: 160, y: floorY - 40, w: 40, h: 8, type: 'gear', baseX: 160, range: 60, speed: 0.8 + rng() * 0.4 });
    for (var i = 0; i < 4 + screenNum; i++) candles.push({ x: 40 + rng() * 320, y: floorY - 50 - rng() * 100, hp: 1 });
    // Hazards: energy beams
    hazards.push({ x: 200, y: floorY - 160, type: 'energy_beam', timer: 0, active: false });
    if (!isLast) {
      for (var i = 0; i < 1 + screenNum; i++) {
        enemies.push(createEnemy('reactor_head', 80 + rng() * 280, floorY - 80 - rng() * 60));
      }
      if (screenNum >= 2) enemies.push(createEnemy('bone_tower', 300, floorY - 20));
    }
  } else if (stageNum === 2) {
    // Spore Waterway - slippery platforms, bubbles
    platforms.push({ x: 0, y: floorY - 40, w: 100, h: 8, type: 'wet' });
    platforms.push({ x: 140, y: floorY - 70, w: 80, h: 8, type: 'wet' });
    platforms.push({ x: 260, y: floorY - 50, w: 100, h: 8, type: 'wet' });
    if (screenNum >= 1) {
      platforms.push({ x: 60, y: floorY - 110, w: 60, h: 8, type: 'wet' });
      platforms.push({ x: 320, y: floorY - 100, w: 50, h: 8, type: 'wet' });
    }
    for (var i = 0; i < 4 + screenNum; i++) candles.push({ x: 50 + rng() * 300, y: floorY - 30 - rng() * 60, hp: 1 });
    // Hazards: toxic bubbles
    hazards.push({ x: 100 + rng() * 200, y: floorY + 5, type: 'toxic_bubble', timer: 0 });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.6) enemies.push(createEnemy('spore_fish', 80 + rng() * 280, floorY + 10));
        else enemies.push(createEnemy('fungal_skeleton', 100 + rng() * 250, floorY - 20));
      }
    }
  } else if (stageNum === 3) {
    // Fungal Chapel - stained glass, altar platforms
    platforms.push({ x: 30, y: floorY - 70, w: 70, h: 8, type: 'altar' });
    platforms.push({ x: 140, y: floorY - 120, w: 80, h: 8, type: 'altar' });
    platforms.push({ x: 270, y: floorY - 80, w: 80, h: 8, type: 'altar' });
    platforms.push({ x: 200, y: floorY - 40, w: 50, h: 8, type: 'altar' });
    if (screenNum >= 2) {
      stairs.push({ x: 60, y: floorY, topY: floorY - 120, dir: 1 });
      platforms.push({ x: 320, y: floorY - 150, w: 60, h: 8, type: 'altar' });
    }
    for (var i = 0; i < 5 + screenNum; i++) candles.push({ x: 30 + rng() * 330, y: floorY - 40 - rng() * 90, hp: 1 });
    // Hazards: unholy fire
    if (screenNum >= 1) hazards.push({ x: 180, y: floorY - 3, type: 'unholy_fire', w: 40 });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.5) enemies.push(createEnemy('spore_armor', 100 + rng() * 250, floorY - 22));
        else enemies.push(createEnemy('spore_bat', 80 + rng() * 280, floorY - 70 - rng() * 50));
      }
    }
  } else if (stageNum === 4) {
    // Alchemy Lab - bubbling vats, glowing runes
    platforms.push({ x: 50, y: floorY - 50, w: 60, h: 8, type: 'lab' });
    platforms.push({ x: 150, y: floorY - 90, w: 70, h: 8, type: 'lab' });
    platforms.push({ x: 260, y: floorY - 60, w: 80, h: 8, type: 'lab' });
    platforms.push({ x: 100, y: floorY - 140, w: 60, h: 8, type: 'lab' });
    for (var i = 0; i < 4 + screenNum; i++) candles.push({ x: 50 + rng() * 300, y: floorY - 30 - rng() * 70, hp: 1 });
    // Hazards: exploding flasks
    hazards.push({ x: 220, y: floorY - 8, type: 'flask', timer: 0, exploded: false });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.5) enemies.push(createEnemy('myco_flea', 80 + rng() * 280, floorY - 20));
        else enemies.push(createEnemy('fungal_skeleton', 100 + rng() * 250, floorY - 20));
      }
    }
  } else {
    // Fungi Lord Throne - dark pillars, pulsing mycelium
    platforms.push({ x: 60, y: floorY - 60, w: 80, h: 8, type: 'throne' });
    platforms.push({ x: 200, y: floorY - 100, w: 80, h: 8, type: 'throne' });
    platforms.push({ x: 300, y: floorY - 50, w: 70, h: 8, type: 'throne' });
    for (var i = 0; i < 3 + screenNum; i++) candles.push({ x: 60 + rng() * 280, y: floorY - 40 - rng() * 60, hp: 1 });
    if (!isLast) {
      enemies.push(createEnemy('spore_armor', 200, floorY - 22));
      enemies.push(createEnemy('reactor_head', 150, floorY - 100));
      if (screenNum >= 1) enemies.push(createEnemy('bone_tower', 320, floorY - 20));
    }
  }

  if (isLast) {
    boss = createBoss(stageNum);
    bossActive = true;
  }
}

// === ENEMY FACTORY (Tasern-themed) ===
function createEnemy(type, x, y) {
  var e = { type: type, x: x, y: y, vx: 0, vy: 0, hp: 1, w: 14, h: 20, dir: -1, timer: 0, startX: x, startY: y, active: true, shootTimer: 0 };
  var diff = LEVEL_SCALE;
  switch(type) {
    case 'myco_crawler': e.vx = -20 * diff; e.hp = Math.ceil(1 * diff); break;
    case 'spore_bat': e.hp = 1; e.w = 12; e.h = 10; e.timer = Math.random() * 6.28; break;
    case 'fungal_skeleton': e.hp = Math.ceil(2 * diff); e.shootTimer = 1 + Math.random() * 2; break;
    case 'reactor_head': e.hp = 1; e.w = 12; e.h = 12; e.vx = -40; e.timer = Math.random() * 6.28; break;
    case 'spore_armor': e.hp = Math.ceil(3 * diff); e.w = 16; e.h = 24; e.shootTimer = 2; break;
    case 'myco_flea': e.hp = 1; e.w = 10; e.h = 12; e.vy = -200; e.vx = (Math.random() < 0.5 ? -1 : 1) * 60; break;
    case 'spore_fish': e.hp = 1; e.w = 12; e.h = 18; e.vy = -250; e.active = false; e.timer = 1 + Math.random() * 3; break;
    case 'bone_tower': e.hp = Math.ceil(4 * diff); e.w = 14; e.h = 32; e.vx = 0; e.shootTimer = 1.5; break;
  }
  return e;
}

// === BOSS FACTORY (Tasern-themed) ===
function createBoss(stageNum) {
  var floorY = GH - 30 - TILE;
  var diff = LEVEL_SCALE;
  var b = { type: 'boss', x: 300, y: floorY - 40, vx: 0, vy: 0, w: 32, h: 40, hp: 0, maxHp: 0, timer: 0, phase: 0, dir: -1, shootTimer: 0, active: true, stageNum: stageNum };
  switch(stageNum) {
    case 0: b.hp = b.maxHp = Math.ceil(12 * diff); b.w = 28; b.h = 28; b.y = floorY - 80; b.name = 'MOLD TITAN'; break;
    case 1: b.hp = b.maxHp = Math.ceil(16 * diff); b.w = 24; b.h = 30; b.name = 'REACTOR QUEEN'; break;
    case 2: b.hp = b.maxHp = Math.ceil(20 * diff); b.w = 20; b.h = 28; b.name = 'TOXIC WRAITH DUO'; break;
    case 3: b.hp = b.maxHp = Math.ceil(22 * diff); b.w = 28; b.h = 34; b.name = 'FRANKENSPORE'; break;
    case 4: b.hp = b.maxHp = Math.ceil(26 * diff); b.w = 24; b.h = 30; b.name = 'GARDEN REAPER'; break;
    case 5: b.hp = b.maxHp = Math.ceil(32 * diff); b.w = 30; b.h = 40; b.name = 'FUNGI LORD'; break;
  }
  bossHP = b.hp;
  bossMaxHP = b.maxHp;
  return b;
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + BONUS_LIVES;
  stage = 0;
  screenIdx = 0;
  hearts = 5;
  whipLevel = 0;
  subWeapon = -1;
  freezeTimer = 0;
  comboCount = 0;
  comboTimer = 0;
  player.hp = baseMaxHp;
  player.maxHp = baseMaxHp;
  player.invTimer = 0;
  player.dead = false;
  player.deathTimer = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
  scorePopups = [];
  if (!tutorialShown) { tutorialStep = 0; tutorialTimer = TUTORIAL_MSGS[0].dur; }
  TAS.particles.clear();
  loadScreen();
}

function loadScreen() {
  generateScreen(stage, screenIdx);
  player.x = 20;
  player.y = GH - 30 - TILE - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.onStair = false;
  player.crouching = false;
  player.jumping = false;
  player.whipTimer = 0;
  freezeTimer = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
}

function nextScreen() {
  screenIdx++;
  if (screenIdx >= SCREENS_PER_STAGE[stage]) {
    stage++;
    screenIdx = 0;
    if (stage >= 6) {
      state = 'victory';
      if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
      return;
    }
    stageComplete = true;
    stageCompleteTimer = 2.5;
  }
  loadScreen();
}

function addScore(pts, x, y, label) {
  var actual = Math.ceil(pts * SCORE_MULT);
  score += actual;
  if (label) addScorePopup(x, y, label + ' +' + actual, '#f4b41b');
  else addScorePopup(x, y, '+' + actual, '#f4b41b');
}

function playerDie() {
  player.dead = true;
  player.deathTimer = 1.5;
  comboCount = 0;
  comboTimer = 0;
  TAS.fx.shake(12, 0.8);
  TAS.audio.playTone(120, 0.5, 'sawtooth', 0.15, 40);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 25, 3, { gravity: 1.5 });
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, statB.color, 10, 2, { gravity: 1 });
}

function respawn() {
  lives--;
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
    return;
  }
  player.hp = player.maxHp;
  player.dead = false;
  player.invTimer = 2;
  player.x = 20;
  player.y = GH - 30 - TILE - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.onStair = false;
  player.whipTimer = 0;
}

function hurtPlayer(dmg) {
  if (player.invTimer > 0 || player.dead) return;
  player.hp -= dmg;
  player.invTimer = INV_TIME;
  // ref5: CON reduces knockback
  player.vx = -player.dir * KNOCKBACK_VX * KB_RESIST;
  player.vy = KNOCKBACK_VY * KB_RESIST;
  player.onGround = false;
  player.onStair = false;
  comboCount = 0;
  comboTimer = 0;
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(6, 0.85);
  TAS.audio.playTone(200, 0.2, 'square', 0.12, 80);
  if (player.hp <= 0) {
    player.hp = 0;
    playerDie();
  }
}

// === SUB-WEAPON PROJECTILES ===
function fireSubWeapon() {
  if (subWeapon < 0) return;
  // ref6: INT reduces sub-weapon cost
  var cost = Math.max(1, SUB_COST[subWeapon] - SUB_COST_REDUCE);
  if (hearts < cost) return;
  hearts -= cost;
  var px = player.x + player.w / 2 + player.dir * 10;
  var py = player.y + 8;
  var baseDmg = DMG_MULT;
  switch(subWeapon) {
    case 0: // Spore Dagger
      projectiles.push({ x: px, y: py, vx: player.dir * 220, vy: 0, type: 'dagger', w: 8, h: 4, life: 2, dmg: Math.ceil(2 * baseDmg), friendly: true });
      TAS.audio.playTone(800, 0.08, 'square', 0.06);
      TAS.particles.spawn(px, py, '#aaddaa', 3, 0.5);
      break;
    case 1: // Myco Axe
      projectiles.push({ x: px, y: py, vx: player.dir * 100, vy: -250, type: 'axe', w: 10, h: 10, life: 2, dmg: Math.ceil(3 * baseDmg), friendly: true, spin: 0 });
      TAS.audio.playTone(300, 0.15, 'triangle', 0.08);
      break;
    case 2: // Holy Spore
      projectiles.push({ x: px, y: py, vx: player.dir * 30, vy: 0, type: 'holyspore', w: 8, h: 8, life: 4, dmg: Math.ceil(4 * baseDmg), friendly: true, timer: 0 });
      TAS.audio.playTone(600, 0.2, 'sine', 0.05);
      TAS.particles.spawn(px, py, '#88ff88', 5, 1);
      break;
    case 3: // Reactor Bone
      projectiles.push({ x: px, y: py, vx: player.dir * 150, vy: -100, type: 'bone', w: 6, h: 6, life: 3, dmg: Math.ceil(2 * baseDmg), friendly: true, bounces: 3 });
      TAS.audio.playTone(500, 0.1, 'square', 0.05);
      break;
    case 4: // Chrono Spore (stopwatch)
      freezeTimer = 3;
      TAS.audio.playTone(1000, 0.3, 'sine', 0.08, 500);
      TAS.fx.flash('#aaddff', 0.3);
      TAS.particles.spawn(GW / 2, GH / 2, '#88ccff', 30, 4, { gravity: -0.5 });
      break;
  }
}

// === WHIP ATTACK ===
function doWhip() {
  if (player.whipTimer > 0) return;
  player.whipTimer = WHIP_DUR;
  TAS.audio.playTone(150, 0.12, 'sawtooth', 0.1, 300);

  var range = WHIP_RANGE[whipLevel];
  var wx = player.x + (player.dir > 0 ? player.w : -range);
  var wy = player.crouching ? player.y + 14 : player.y + 6;
  var ww = range;
  var wh = 6;

  // ref1: STR boosts whip damage, ref12: statB.damage multiplier
  var whipDmg = Math.ceil((whipLevel >= 3 ? 2 : 1) * DMG_MULT) + WHIP_DMG_BONUS;

  // ref15: crit chance from luck
  var isCrit = Math.random() < CRIT_CHANCE;
  if (isCrit) {
    whipDmg = Math.ceil(whipDmg * 2);
    critFlash = 0.3;
    TAS.fx.flash('#ffff00', 0.15);
  }

  // Hit candles (spore piles)
  for (var i = candles.length - 1; i >= 0; i--) {
    var c = candles[i];
    if (TAS.hit.rectOverlap(wx, wy, ww, wh, c.x - 6, c.y - 6, 12, 12)) {
      candles.splice(i, 1);
      spawnCandleDrop(c.x, c.y);
      TAS.particles.spawn(c.x, c.y, '#ffaa22', 8, 1.5);
      TAS.particles.spawn(c.x, c.y, '#44dd88', 4, 1);
      TAS.audio.playTone(400, 0.08, 'square', 0.05);
      addScore(10, c.x, c.y);
    }
  }

  // Hit enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (!e.active) continue;
    if (TAS.hit.rectOverlap(wx, wy, ww, wh, e.x, e.y, e.w, e.h)) {
      hitEnemy(e, i, whipDmg, isCrit);
    }
  }

  // Hit boss
  if (boss && boss.active && TAS.hit.rectOverlap(wx, wy, ww, wh, boss.x, boss.y, boss.w, boss.h)) {
    hitBoss(whipDmg, isCrit);
  }

  // Whip particles
  var tipX = wx + (player.dir > 0 ? ww : 0);
  TAS.particles.spawn(tipX, wy, whipLevel >= 3 ? '#ff6600' : '#ccaa88', 3, 0.8);
}

function hitEnemy(e, idx, dmg, isCrit) {
  e.hp -= dmg;
  TAS.fx.flash('#ffffff', 0.08);
  TAS.fx.shake(2, 0.95);
  if (e.hp <= 0) {
    enemies.splice(idx, 1);
    comboCount++;
    comboTimer = 2;
    var pts = 50 + comboCount * 10;
    var label = isCrit ? 'CRIT!' : (comboCount > 1 ? comboCount + 'x COMBO' : '');
    addScore(pts, e.x + e.w / 2, e.y, label);
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#38d973', 12, 2);
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, statB.color, 5, 1.5);
    TAS.audio.playTone(500, 0.1, 'square', 0.06);
    // ref9: WIS boosts drop rate
    if (Math.random() < 0.3 + DROP_LUCK) {
      pickups.push({ x: e.x, y: e.y, type: 'heart', timer: 5 });
    }
    // Rare POOP token drops
    if (Math.random() < 0.08 + DROP_LUCK * 0.5) {
      pickups.push({ x: e.x + 10, y: e.y, type: 'spore_crystal', timer: 6 });
    }
  } else {
    TAS.audio.playTone(300, 0.05, 'square', 0.04);
    if (isCrit) addScorePopup(e.x + e.w / 2, e.y - 5, 'CRIT!', '#ff4444');
  }
}

function hitBoss(dmg, isCrit) {
  boss.hp -= dmg;
  bossHP = boss.hp;
  TAS.fx.flash('#ffffff', 0.15);
  TAS.fx.shake(5, 0.85);
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.1);
  if (isCrit) {
    addScorePopup(boss.x + boss.w / 2, boss.y - 10, 'CRITICAL!', '#ff4444');
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffff00', 8, 2);
  }
  if (boss.hp <= 0) {
    boss.active = false;
    // ref11: CHA boosts boss gold
    var bossScore = Math.ceil(500 * BOSS_GOLD_MULT);
    addScore(bossScore, boss.x + boss.w / 2, boss.y, 'BOSS DOWN!');
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f4b41b', 40, 4, { gravity: 0.5 });
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, statB.color, 20, 3, { gravity: 0.3 });
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 100);
    TAS.fx.shake(10, 0.75);
    stageComplete = true;
    stageCompleteTimer = 2.5;
    // Drop meat on boss kill
    pickups.push({ x: boss.x, y: boss.y, type: 'meat', timer: 8 });
    pickups.push({ x: boss.x + 20, y: boss.y, type: 'spore_crystal', timer: 8 });
  }
}

function spawnCandleDrop(x, y) {
  // ref9: WIS influences drop quality
  var r = Math.random() - DROP_LUCK * 0.3;
  if (r < 0.4) pickups.push({ x: x, y: y, type: 'heart', timer: 6 });
  else if (r < 0.6) pickups.push({ x: x, y: y, type: 'meat', timer: 6 });
  else if (r < 0.75) pickups.push({ x: x, y: y, type: 'whipup', timer: 6 });
  else if (r < 0.85) pickups.push({ x: x, y: y, type: 'spore_crystal', timer: 6 });
  else {
    var sw = TAS.math.randInt(0, 4);
    pickups.push({ x: x, y: y, type: 'subweapon', subId: sw, timer: 6 });
  }
}

// === INPUT ===
var prevAttack = false;
var prevJump = false;
var prevUp = false;

function getInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;
  return {
    left: k['ArrowLeft'] || k['KeyA'] || t.left,
    right: k['ArrowRight'] || k['KeyD'] || t.right,
    up: k['ArrowUp'] || k['KeyW'] || t.up,
    down: k['ArrowDown'] || k['KeyS'] || t.down,
    jump: k['KeyZ'] || k['Space'] || t.a,
    attack: k['KeyX'] || k['KeyC'] || t.b
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  if (critFlash > 0) critFlash -= dt;
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboCount = 0; }

  if (state === 'title') {
    // Ambient title particles
    if (frame % 20 === 0) {
      TAS.particles.spawn(Math.random() * GW, GH, '#38d97344', 1, 3, { gravity: -0.3 });
    }
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC']) {
      TAS.input.keys['KeyC'] = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial
  if (!tutorialShown && tutorialStep < TUTORIAL_MSGS.length) {
    tutorialTimer -= dt;
    if (tutorialTimer <= 0) {
      tutorialStep++;
      if (tutorialStep >= TUTORIAL_MSGS.length) {
        tutorialShown = true;
      } else {
        tutorialTimer = TUTORIAL_MSGS[tutorialStep].dur;
      }
    }
  }

  // Stage complete transition
  if (stageComplete) {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) {
      if (boss && !boss.active) {
        stage++;
        screenIdx = 0;
        if (stage >= 6) {
          state = 'victory';
          if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
          return;
        }
      } else {
        screenIdx++;
        if (screenIdx >= SCREENS_PER_STAGE[stage]) {
          stage++;
          screenIdx = 0;
          if (stage >= 6) {
            state = 'victory';
            if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
            return;
          }
        }
      }
      loadScreen();
    }
    return;
  }

  if (freezeTimer > 0) freezeTimer -= dt;

  var inp = getInput();

  // Player death
  if (player.dead) {
    player.deathTimer -= dt;
    if (player.deathTimer <= 0) respawn();
    return;
  }

  // Invincibility
  if (player.invTimer > 0) player.invTimer -= dt;

  // Attack
  var attackPressed = inp.attack && !prevAttack;
  prevAttack = inp.attack;
  var jumpPressed = inp.jump && !prevJump;
  prevJump = inp.jump;
  var upPressed = inp.up && !prevUp;
  prevUp = inp.up;

  if (attackPressed) {
    if (inp.up && subWeapon >= 0) {
      fireSubWeapon();
    } else {
      doWhip();
    }
  }

  // Whip timer
  if (player.whipTimer > 0) player.whipTimer -= dt;

  // Movement
  if (player.onStair) {
    player.vx = 0;
    player.vy = 0;
    if (inp.up) {
      player.y -= STAIR_SPEED * dt;
      player.x += player.stairDir * STAIR_SPEED * dt * 0.7;
    } else if (inp.down) {
      player.y += STAIR_SPEED * dt;
      player.x -= player.stairDir * STAIR_SPEED * dt * 0.7;
    }
    if (jumpPressed) {
      player.onStair = false;
      player.vy = JUMP_VEL;
      player.jumping = true;
    }
    var onAnyStair = false;
    for (var i = 0; i < stairs.length; i++) {
      var s = stairs[i];
      if (player.x > s.x - 20 && player.x < s.x + 20 && player.y + player.h > s.topY && player.y + player.h < s.y + 10) {
        onAnyStair = true;
        break;
      }
    }
    if (!onAnyStair) player.onStair = false;
  } else {
    // Horizontal
    player.vx = 0;
    if (inp.left && player.whipTimer <= 0) { player.vx = -WALK_SPEED; player.dir = -1; }
    if (inp.right && player.whipTimer <= 0) { player.vx = WALK_SPEED; player.dir = 1; }

    // Crouch
    player.crouching = inp.down && player.onGround;

    // Jump
    if (jumpPressed && player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      player.jumping = true;
      TAS.audio.playTone(250, 0.08, 'square', 0.04, 400);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h, '#aaa', 3, 0.5);
    }

    // Gravity
    player.vy += GRAVITY * dt;

    // Apply velocity
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Stair check
    if (inp.up && player.onGround && !player.jumping) {
      for (var i = 0; i < stairs.length; i++) {
        var s = stairs[i];
        if (Math.abs(player.x - s.x) < 16 && Math.abs((player.y + player.h) - s.y) < 10) {
          player.onStair = true;
          player.stairDir = s.dir;
          player.vy = 0;
          break;
        }
      }
    }

    // Platform collision
    player.onGround = false;
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      if (player.vy >= 0 && player.x + player.w > p.x && player.x < p.x + p.w) {
        if (player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
          player.jumping = false;
        }
      }
    }

    // Bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > GW) {
      if (!bossActive) {
        nextScreen();
        player.x = 5;
        return;
      } else {
        player.x = GW - player.w;
      }
    }

    // Fall death
    if (player.y > GH + 20) {
      playerDie();
      return;
    }
  }

  // Update gear platforms
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'gear') {
      p.x = p.baseX + Math.sin(frame * 0.02 * p.speed) * p.range;
    }
  }

  // Update hazards
  for (var i = 0; i < hazards.length; i++) {
    var hz = hazards[i];
    hz.timer += dt;
    if (hz.type === 'acid_drip') {
      if (Math.sin(hz.timer * 2) > 0.8) {
        // Drop acid
        if (Math.random() < 0.02) {
          projectiles.push({ x: hz.x + Math.random() * 20, y: hz.y, vx: 0, vy: 60, type: 'acid', w: 4, h: 4, life: 3, dmg: 1, friendly: false });
        }
      }
    } else if (hz.type === 'energy_beam') {
      hz.active = Math.sin(hz.timer * 1.5) > 0.5;
      if (hz.active && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hz.x - 4, hz.y, 8, GH - hz.y)) {
        hurtPlayer(1);
      }
    } else if (hz.type === 'toxic_bubble') {
      if (Math.sin(hz.timer * 1.2) > 0.7 && Math.random() < 0.03) {
        projectiles.push({ x: hz.x + Math.random() * 40, y: hz.y, vx: (Math.random() - 0.5) * 20, vy: -40 - Math.random() * 30, type: 'bubble', w: 6, h: 6, life: 3, dmg: 1, friendly: false });
      }
    } else if (hz.type === 'unholy_fire') {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hz.x, hz.y, hz.w || 40, 8)) {
        hurtPlayer(1);
      }
    } else if (hz.type === 'flask' && !hz.exploded) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hz.x - 6, hz.y - 6, 12, 12)) {
        hz.exploded = true;
        hurtPlayer(2);
        TAS.particles.spawn(hz.x, hz.y, '#aaff44', 15, 2, { gravity: 0.5 });
        TAS.fx.shake(6, 0.85);
        TAS.audio.playTone(150, 0.2, 'sawtooth', 0.1);
      }
    }
  }

  // Update enemies
  var floorY = GH - 30 - TILE;
  if (freezeTimer <= 0) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      e.timer += dt;

      switch(e.type) {
        case 'myco_crawler':
          e.x += e.vx * dt;
          if (e.x < -20 || e.x > GW + 20) { e.vx = -e.vx; e.dir = -e.dir; }
          // Trail particles
          if (frame % 8 === 0) TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#446633', 1, 0.5);
          break;
        case 'spore_bat':
          e.x += -30 * dt;
          e.y = e.startY + Math.sin(e.timer * 3) * 25;
          if (e.x < -20) e.x = GW + 20;
          break;
        case 'fungal_skeleton':
          e.dir = player.x < e.x ? -1 : 1;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2 + Math.random();
            projectiles.push({ x: e.x + e.w / 2, y: e.y + 4, vx: e.dir * 120, vy: -100, type: 'enemybone', w: 6, h: 6, life: 2, dmg: 2, friendly: false, bounces: 1 });
          }
          break;
        case 'reactor_head':
          e.x += e.vx * dt;
          e.y = e.startY + Math.sin(e.timer * 2.5) * 30;
          if (e.x < -20) e.x = GW + 20;
          if (e.x > GW + 20) e.x = -20;
          // Glow trail
          if (frame % 6 === 0) TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#44aaff', 1, 0.4);
          break;
        case 'spore_armor':
          e.dir = player.x < e.x ? -1 : 1;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2.5;
            projectiles.push({ x: e.x + e.w / 2, y: e.y, vx: e.dir * 100, vy: -150, type: 'enemyaxe', w: 8, h: 8, life: 2.5, dmg: 3, friendly: false, spin: 0 });
          }
          break;
        case 'myco_flea':
          e.x += e.vx * dt;
          e.vy += GRAVITY * dt * 0.7;
          e.y += e.vy * dt;
          if (e.y >= floorY - e.h) {
            e.y = floorY - e.h;
            e.vy = -180 - Math.random() * 80;
            e.vx = (player.x < e.x ? -1 : 1) * (40 + Math.random() * 40);
          }
          if (e.x < 10) e.vx = Math.abs(e.vx);
          if (e.x > GW - 20) e.vx = -Math.abs(e.vx);
          break;
        case 'spore_fish':
          if (!e.active) {
            e.timer -= dt;
            if (e.timer <= 0) {
              e.active = true;
              e.y = floorY + 10;
              e.vy = -280;
              e.x = 40 + Math.random() * 320;
              TAS.particles.spawn(e.x, floorY, '#44aacc', 5, 1);
            }
          } else {
            e.vy += GRAVITY * dt * 0.6;
            e.y += e.vy * dt;
            if (e.y >= floorY - e.h) {
              e.y = floorY - e.h;
              e.vy = 0;
              e.dir = player.x < e.x ? -1 : 1;
              e.shootTimer -= dt;
              if (e.shootTimer <= 0) {
                e.shootTimer = 1.5;
                projectiles.push({ x: e.x, y: e.y + 4, vx: e.dir * 100, vy: -50, type: 'spore_bolt', w: 6, h: 6, life: 2, dmg: 2, friendly: false });
              }
            }
          }
          break;
        case 'bone_tower':
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2;
            projectiles.push({ x: e.x + 4, y: e.y - 4, vx: 0, vy: -120, type: 'spore_bolt', w: 6, h: 6, life: 1.5, dmg: 2, friendly: false });
            projectiles.push({ x: e.x + 4, y: e.y + e.h, vx: 0, vy: 80, type: 'spore_bolt', w: 6, h: 6, life: 1.5, dmg: 2, friendly: false });
          }
          break;
      }

      // Enemy-player collision
      if (e.active && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        hurtPlayer(2);
      }
    }
  }

  // Update boss
  if (boss && boss.active && freezeTimer <= 0) {
    boss.timer += dt;
    boss.shootTimer -= dt;
    var bFloorY = floorY;

    switch(boss.stageNum) {
      case 0: // Mold Titan - swoops, drops spores
        boss.x = 200 + Math.sin(boss.timer * 1.2) * 120;
        boss.y = bFloorY - 80 + Math.sin(boss.timer * 2) * 40;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.5;
          projectiles.push({ x: boss.x, y: boss.y + boss.h, vx: (player.x - boss.x) * 0.5, vy: 80, type: 'spore_bolt', w: 6, h: 6, life: 2, dmg: 2, friendly: false });
          TAS.particles.spawn(boss.x, boss.y + boss.h, '#88aa44', 3, 1);
        }
        // Trail spores
        if (frame % 10 === 0) TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h, '#446633', 2, 0.8);
        break;
      case 1: // Reactor Queen - energy blasts
        boss.x = 250 + Math.sin(boss.timer * 0.8) * 80;
        boss.y = bFloorY - 100 + Math.cos(boss.timer * 1.5) * 30;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.2;
          for (var a = 0; a < 3; a++) {
            var ang = -0.5 + a * 0.5;
            projectiles.push({ x: boss.x, y: boss.y + 10, vx: Math.cos(ang) * -80, vy: Math.sin(ang) * 80 + 20, type: 'reactor_bolt', w: 5, h: 5, life: 2.5, dmg: 2, friendly: false });
          }
          TAS.fx.shake(2, 0.95);
        }
        if (frame % 5 === 0) TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#44aaff', 1, 0.5);
        break;
      case 2: // Toxic Wraith Duo
        boss.x = 280 + Math.sin(boss.timer * 0.6) * 60;
        boss.y = bFloorY - boss.h;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.8;
          projectiles.push({ x: boss.x, y: boss.y + 10, vx: -80, vy: Math.sin(boss.timer) * 40, type: 'spore_bolt', w: 8, h: 4, life: 3, dmg: 2, friendly: false });
          projectiles.push({ x: boss.x - 40, y: boss.y + 20, vx: -60, vy: -30, type: 'spore_bolt', w: 8, h: 4, life: 3, dmg: 2, friendly: false });
        }
        break;
      case 3: // Frankenspore + Spore Igor
        boss.x += (boss.dir > 0 ? 40 : -40) * dt;
        boss.y = bFloorY - boss.h;
        if (boss.x > GW - 50) boss.dir = -1;
        if (boss.x < 50) boss.dir = 1;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 2;
          projectiles.push({ x: boss.x + boss.dir * 30, y: boss.y - 20, vx: (player.x - boss.x) * 0.8, vy: -120, type: 'spore_bolt', w: 6, h: 6, life: 2, dmg: 3, friendly: false });
          TAS.particles.spawn(boss.x + boss.dir * 30, boss.y - 20, '#aaff44', 4, 1);
        }
        // Stomp shake
        if (frame % 30 === 0) TAS.fx.shake(2, 0.97);
        break;
      case 4: // Garden Reaper - teleports and throws scythes
        if (Math.floor(boss.timer * 2) % 8 === 0 && boss.timer - Math.floor(boss.timer) < dt * 2) {
          boss.x = 50 + Math.random() * 300;
          boss.y = bFloorY - 60 - Math.random() * 60;
          TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#884488', 10, 2);
        }
        boss.y += Math.sin(boss.timer * 3) * 0.5;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 0.8;
          var ang2 = TAS.math.angle(boss.x, boss.y, player.x, player.y);
          projectiles.push({ x: boss.x, y: boss.y + 10, vx: Math.cos(ang2) * 120, vy: Math.sin(ang2) * 120, type: 'enemyaxe', w: 8, h: 8, life: 2, dmg: 3, friendly: false, spin: 0 });
        }
        break;
      case 5: // Fungi Lord - 2 phases
        if (boss.hp > boss.maxHp / 2) {
          boss.x = 200 + Math.sin(boss.timer * 0.7) * 130;
          boss.y = bFloorY - 80 + Math.cos(boss.timer * 1.3) * 30;
          if (boss.shootTimer <= 0) {
            boss.shootTimer = 1;
            for (var a2 = 0; a2 < 5; a2++) {
              var ang3 = (a2 / 5) * Math.PI * 2 + boss.timer;
              projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + boss.h / 2, vx: Math.cos(ang3) * 70, vy: Math.sin(ang3) * 70, type: 'spore_bolt', w: 5, h: 5, life: 2.5, dmg: 3, friendly: false });
            }
            TAS.fx.shake(3, 0.9);
          }
          if (frame % 8 === 0) TAS.particles.spawn(boss.x + boss.w / 2, boss.y, '#cc0044', 1, 1);
        } else {
          // Phase 2 - true mushroom horror
          boss.w = 36; boss.h = 48;
          var targetX = player.x;
          boss.x += (targetX - boss.x) * dt * 1.5;
          boss.y = bFloorY - boss.h + Math.sin(boss.timer * 4) * 10;
          if (boss.shootTimer <= 0) {
            boss.shootTimer = 0.6;
            projectiles.push({ x: boss.x + boss.w / 2, y: boss.y, vx: (Math.random() - 0.5) * 160, vy: -150, type: 'spore_bolt', w: 7, h: 7, life: 3, dmg: 4, friendly: false });
            TAS.fx.shake(4, 0.88);
          }
          // Rage particles
          if (frame % 4 === 0) TAS.particles.spawn(boss.x + Math.random() * boss.w, boss.y, '#ff4444', 1, 0.8);
        }
        break;
    }

    // Boss-player collision
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
      hurtPlayer(3);
    }
  }

  // Update projectiles
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    if (p.type === 'axe' || p.type === 'enemyaxe') {
      p.vy += GRAVITY * dt * 0.5;
      p.spin = (p.spin || 0) + dt * 10;
    }
    if (p.type === 'bone' || p.type === 'enemybone') {
      p.vy += GRAVITY * dt * 0.4;
    }
    if (p.type === 'holyspore') {
      // ref7: INT boosts homing
      p.timer += dt;
      var closest = null;
      var closestD = 999;
      for (var j = 0; j < enemies.length; j++) {
        var d = TAS.math.dist(p.x, p.y, enemies[j].x, enemies[j].y);
        if (d < closestD) { closestD = d; closest = enemies[j]; }
      }
      if (boss && boss.active) {
        var bd = TAS.math.dist(p.x, p.y, boss.x, boss.y);
        if (bd < closestD) { closest = boss; }
      }
      if (closest) {
        var ha = TAS.math.angle(p.x, p.y, closest.x, closest.y);
        p.vx += Math.cos(ha) * 200 * HOMING_MULT * dt;
        p.vy += Math.sin(ha) * 200 * HOMING_MULT * dt;
        var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (spd > 100 * HOMING_MULT) { p.vx = p.vx / spd * 100 * HOMING_MULT; p.vy = p.vy / spd * 100 * HOMING_MULT; }
      }
      // Trail
      if (frame % 3 === 0) TAS.particles.spawn(p.x, p.y, '#88ff88', 1, 0.3);
    }
    if (p.type === 'acid' || p.type === 'bubble') {
      // Ambient hazard particles
      if (frame % 6 === 0) TAS.particles.spawn(p.x, p.y, p.type === 'acid' ? '#aaff44' : '#44ddaa', 1, 0.3);
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Bounce for bone type
    if ((p.type === 'bone' || p.type === 'enemybone') && p.y > floorY - 4) {
      p.y = floorY - 4;
      p.vy = -Math.abs(p.vy) * 0.7;
      p.bounces = (p.bounces || 1) - 1;
      if (p.bounces <= 0) { projectiles.splice(i, 1); continue; }
    }

    // Off screen
    if (p.x < -20 || p.x > GW + 20 || p.y < -40 || p.y > GH + 20) {
      projectiles.splice(i, 1);
      continue;
    }

    // Friendly projectile hits
    if (p.friendly) {
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e2 = enemies[j];
        if (e2.active && TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, e2.x, e2.y, e2.w, e2.h)) {
          hitEnemy(e2, j, p.dmg, false);
          if (p.type !== 'holyspore') { projectiles.splice(i, 1); break; }
        }
      }
      if (boss && boss.active && projectiles[i] && TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
        hitBoss(p.dmg, false);
        if (p.type !== 'holyspore') projectiles.splice(i, 1);
      }
    } else {
      if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        hurtPlayer(p.dmg);
        projectiles.splice(i, 1);
      }
    }
  }

  // Pickups - ref8: WIS boosts pickup range
  for (var i = pickups.length - 1; i >= 0; i--) {
    var pk = pickups[i];
    pk.timer -= dt;
    if (pk.timer <= 0) { pickups.splice(i, 1); continue; }
    var pr = PICKUP_RANGE;
    if (TAS.hit.rectOverlap(player.x - pr / 2, player.y - pr / 2, player.w + pr, player.h + pr, pk.x - 5, pk.y - 5, 10, 10)) {
      switch(pk.type) {
        case 'heart':
          hearts = Math.min(hearts + 3, 99);
          TAS.audio.playTone(700, 0.08, 'sine', 0.05);
          addScorePopup(pk.x, pk.y, '+3 SPORE GEMS', '#ff4488');
          break;
        case 'meat':
          var heal = 4 + Math.floor(conMod * 0.5);
          player.hp = Math.min(player.hp + heal, player.maxHp);
          TAS.audio.playTone(400, 0.15, 'triangle', 0.06);
          addScorePopup(pk.x, pk.y, '+' + heal + ' HP', '#38d973');
          TAS.particles.spawn(pk.x, pk.y, '#38d973', 5, 1);
          break;
        case 'whipup':
          whipLevel = Math.min(whipLevel + 1, 3);
          TAS.audio.playMelody([[400, 0.08], [600, 0.08], [800, 0.12]], 80);
          addScorePopup(pk.x, pk.y, 'WHIP UP!', '#f4b41b');
          TAS.particles.spawn(pk.x, pk.y, '#f4b41b', 8, 1.5);
          break;
        case 'subweapon':
          subWeapon = pk.subId;
          TAS.audio.playTone(500, 0.1, 'square', 0.05);
          addScorePopup(pk.x, pk.y, SUB_NAMES[pk.subId], '#3cacd7');
          break;
        case 'spore_crystal':
          addScore(100, pk.x, pk.y, 'POOP TOKEN');
          TAS.audio.playMelody([[600, 0.06], [800, 0.06], [1000, 0.1]], 60);
          TAS.particles.spawn(pk.x, pk.y, '#a855f7', 10, 2);
          TAS.particles.spawn(pk.x, pk.y, statB.color, 5, 1.5);
          break;
      }
      pickups.splice(i, 1);
      addScore(25, pk.x, pk.y - 10);
    }
  }

  // Ambient zone particles
  if (frame % 30 === 0) {
    var colors = STAGE_COLORS[stage];
    TAS.particles.spawn(Math.random() * GW, GH - 40 + Math.random() * 20, colors.particle, 1, 3, { gravity: -0.2 });
  }
}

// === DRAW ===
function draw(dt) {
  var colors = STAGE_COLORS[stage] || STAGE_COLORS[0];

  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }
  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGE_NAMES[stage] });
    return;
  }
  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  drawBackground(colors);

  // Draw platforms (themed per zone)
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'floor') {
      ctx.fillStyle = colors.floor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = colors.accent;
      for (var fx = 0; fx < p.w; fx += 16) {
        ctx.fillRect(p.x + fx, p.y, 1, p.h);
      }
    } else if (p.type === 'gear') {
      ctx.fillStyle = '#556';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#778';
      ctx.fillRect(p.x + 4, p.y + 1, p.w - 8, 3);
      for (var gx = 0; gx < p.w; gx += 8) {
        ctx.fillRect(p.x + gx, p.y - 2, 4, 2);
      }
    } else if (p.type === 'mushroom') {
      // Mushroom shelf platform
      ctx.fillStyle = '#553322';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#774433';
      ctx.fillRect(p.x, p.y, p.w, 3);
      // Tiny mushrooms on top
      for (var mx = p.x + 8; mx < p.x + p.w - 8; mx += 20) {
        ctx.fillStyle = '#cc4444';
        ctx.beginPath();
        ctx.arc(mx, p.y - 2, 4, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#553322';
        ctx.fillRect(mx - 1, p.y - 1, 2, 3);
      }
    } else if (p.type === 'reactor') {
      ctx.fillStyle = '#334';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(p.x, p.y, p.w, 2);
      ctx.fillStyle = '#224';
      ctx.fillRect(p.x + 2, p.y + 3, p.w - 4, p.h - 3);
      // Glow pulse
      if (frame % 60 < 30) {
        ctx.fillStyle = 'rgba(68,170,255,0.15)';
        ctx.fillRect(p.x, p.y - 2, p.w, 2);
      }
    } else if (p.type === 'wet') {
      ctx.fillStyle = '#1a3333';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#22aaaa';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Drip
      if (frame % 90 < 3) {
        ctx.fillStyle = '#22aaaa';
        ctx.fillRect(p.x + (frame * 7 % (p.w - 4)), p.y + p.h, 2, 4);
      }
    } else if (p.type === 'altar') {
      ctx.fillStyle = '#332244';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#8844aa';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Rune markings
      ctx.fillStyle = '#aa66cc';
      for (var rx = p.x + 6; rx < p.x + p.w - 6; rx += 12) {
        ctx.fillRect(rx, p.y + 3, 2, 3);
      }
    } else if (p.type === 'lab') {
      ctx.fillStyle = '#223311';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#66aa22';
      ctx.fillRect(p.x, p.y, p.w, 2);
    } else if (p.type === 'throne') {
      ctx.fillStyle = '#331111';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#aa2222';
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Blood drip effect
      if (frame % 120 < 3) {
        ctx.fillStyle = '#882222';
        ctx.fillRect(p.x + (frame * 13 % (p.w - 4)), p.y + p.h, 2, 6);
      }
    } else {
      ctx.fillStyle = colors.wall;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = colors.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
    }
  }

  // Draw stairs
  for (var i = 0; i < stairs.length; i++) {
    var s = stairs[i];
    var steps = Math.floor((s.y - s.topY) / 10);
    for (var j = 0; j < steps; j++) {
      var sy = s.y - j * 10;
      var sx = s.x + s.dir * j * 7 - 8;
      ctx.fillStyle = '#443322';
      ctx.fillRect(sx, sy - 3, 16, 3);
      ctx.fillStyle = '#554433';
      ctx.fillRect(sx, sy - 4, 16, 1);
    }
  }

  // Draw hazards
  for (var i = 0; i < hazards.length; i++) {
    var hz = hazards[i];
    if (hz.type === 'acid_drip') {
      ctx.fillStyle = '#aaff44';
      ctx.globalAlpha = 0.5 + Math.sin(hz.timer * 3) * 0.3;
      ctx.fillRect(hz.x, hz.y, 2, 8 + Math.sin(hz.timer * 2) * 4);
      ctx.globalAlpha = 1;
    } else if (hz.type === 'energy_beam') {
      if (hz.active) {
        ctx.fillStyle = 'rgba(68,170,255,0.4)';
        ctx.fillRect(hz.x - 3, hz.y, 6, GH - hz.y);
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(hz.x - 1, hz.y, 2, GH - hz.y);
      } else {
        ctx.fillStyle = 'rgba(68,170,255,0.1)';
        ctx.fillRect(hz.x - 1, hz.y, 2, GH - hz.y);
      }
    } else if (hz.type === 'unholy_fire') {
      var fw = hz.w || 40;
      for (var fi = 0; fi < fw; fi += 4) {
        var fh = 6 + Math.sin(hz.timer * 5 + fi * 0.3) * 4;
        ctx.fillStyle = '#8844aa';
        ctx.fillRect(hz.x + fi, hz.y - fh, 3, fh);
        ctx.fillStyle = '#cc66ff';
        ctx.fillRect(hz.x + fi + 1, hz.y - fh + 2, 1, fh - 2);
      }
    } else if (hz.type === 'flask' && !hz.exploded) {
      ctx.fillStyle = '#226622';
      ctx.fillRect(hz.x - 3, hz.y - 6, 6, 8);
      ctx.fillStyle = '#aaff44';
      ctx.fillRect(hz.x - 2, hz.y - 4, 4, 4);
      ctx.fillStyle = '#226622';
      ctx.fillRect(hz.x - 1, hz.y - 8, 2, 3);
    }
  }

  // Draw candles (spore piles)
  for (var i = 0; i < candles.length; i++) {
    var c = candles[i];
    drawSporePile(c.x, c.y);
  }

  // Draw pickups
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    var bob = Math.sin(frame * 0.1 + i) * 2;
    if (pk.type === 'heart') {
      ctx.fillStyle = '#ff4488';
      drawHeart(pk.x, pk.y + bob, 5);
    } else if (pk.type === 'meat') {
      // Garden seed
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(pk.x - 4, pk.y + bob - 2, 8, 4);
      ctx.fillStyle = '#9a5a5a';
      ctx.fillRect(pk.x - 3, pk.y + bob - 1, 6, 2);
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(pk.x, pk.y + bob - 4, 3, Math.PI, 0);
      ctx.fill();
    } else if (pk.type === 'whipup') {
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(pk.x - 2, pk.y + bob - 6, 4, 12);
      ctx.fillStyle = '#e6482e';
      ctx.fillRect(pk.x - 3, pk.y + bob - 7, 6, 3);
      // Glow
      ctx.fillStyle = 'rgba(244,180,27,0.3)';
      ctx.beginPath();
      ctx.arc(pk.x, pk.y + bob, 7, 0, Math.PI * 2);
      ctx.fill();
    } else if (pk.type === 'subweapon') {
      ctx.fillStyle = '#3cacd7';
      ctx.fillRect(pk.x - 4, pk.y + bob - 4, 8, 8);
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(SUB_NAMES[pk.subId][0], pk.x, pk.y + bob + 2);
    } else if (pk.type === 'spore_crystal') {
      // Glowing POOP token
      ctx.fillStyle = '#a855f7';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.12 + i) * 0.3;
      ctx.beginPath();
      ctx.moveTo(pk.x, pk.y + bob - 6);
      ctx.lineTo(pk.x + 4, pk.y + bob);
      ctx.lineTo(pk.x, pk.y + bob + 4);
      ctx.lineTo(pk.x - 4, pk.y + bob);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#d4a0ff';
      ctx.beginPath();
      ctx.arc(pk.x, pk.y + bob, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw enemies
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active) continue;
    if (freezeTimer > 0) {
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.2) * 0.2;
    }
    drawEnemy(e);
    ctx.globalAlpha = 1;
  }

  // Draw boss
  if (boss && boss.active) {
    if (freezeTimer > 0) ctx.globalAlpha = 0.6;
    drawBoss(boss);
    ctx.globalAlpha = 1;
  }

  // Draw projectiles
  for (var i = 0; i < projectiles.length; i++) {
    drawProjectile(projectiles[i]);
  }

  // Draw player
  if (!player.dead) {
    if (player.invTimer > 0 && Math.floor(player.invTimer * 10) % 2 === 0) {
      // Flicker during invincibility
    } else {
      drawPlayer();
    }
  }

  // Draw whip
  if (player.whipTimer > 0 && !player.dead) {
    drawWhip();
  }

  TAS.particles.draw();
  drawScorePopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Crit flash overlay
  if (critFlash > 0) {
    ctx.fillStyle = 'rgba(255,255,0,' + (critFlash * 0.3) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Tutorial overlay
  if (!tutorialShown && tutorialStep < TUTORIAL_MSGS.length) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(GW / 2 - 120, GH - 55, 240, 22);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(TUTORIAL_MSGS[tutorialStep].msg, GW / 2, GH - 40);
  }

  // Stage complete overlay
  if (stageComplete) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    if (boss && !boss.active) {
      ctx.fillText('BOSS DEFEATED!', GW / 2, GH / 2 - 20);
      ctx.fillStyle = statB.color;
      ctx.font = '10px monospace';
      ctx.fillText(statB.name + ' grows stronger!', GW / 2, GH / 2 + 5);
    } else {
      ctx.fillText('STAGE ' + (stage + 1) + ' CLEAR', GW / 2, GH / 2 - 10);
    }
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2 + 20);
  }

  // Combo display
  if (comboCount > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.fillText(comboCount + 'x COMBO', GW - 8, GH - 35);
    ctx.globalAlpha = 1;
  }
}

// === DRAWING HELPERS ===
function drawBackground(colors) {
  ctx.fillStyle = colors.wall;
  for (var i = 0; i < 5; i++) {
    var bx = 20 + i * 85;
    var by = 30;
    ctx.fillRect(bx, by, 4, GH - 60);
    ctx.beginPath();
    ctx.arc(bx + 35, by + 20, 33, Math.PI, 0);
    ctx.lineWidth = 3;
    ctx.strokeStyle = colors.wall;
    ctx.stroke();
  }

  // Zone-specific background effects
  if (stage === 0) {
    // Mycelium threads
    ctx.strokeStyle = 'rgba(68,170,68,0.15)';
    ctx.lineWidth = 1;
    for (var d = 0; d < 6; d++) {
      ctx.beginPath();
      ctx.moveTo(d * 70, 0);
      ctx.quadraticCurveTo(d * 70 + 20 + Math.sin(frame * 0.01 + d) * 10, GH / 2, d * 70 + 10, GH);
      ctx.stroke();
    }
  } else if (stage === 1) {
    // Reactor glow
    ctx.fillStyle = 'rgba(68,170,255,0.03)';
    ctx.beginPath();
    ctx.arc(GW / 2, GH / 2, 100 + Math.sin(frame * 0.02) * 20, 0, Math.PI * 2);
    ctx.fill();
  } else if (stage === 2) {
    // Dripping water
    ctx.fillStyle = '#2266aa';
    for (var d = 0; d < 8; d++) {
      var dx = 30 + d * 50;
      var dLen = 10 + Math.sin(frame * 0.03 + d) * 8;
      ctx.fillRect(dx, 30, 2, dLen);
    }
    // Bubbles
    ctx.fillStyle = 'rgba(68,204,204,0.2)';
    for (var b = 0; b < 3; b++) {
      var bub = Math.sin(frame * 0.04 + b * 2) * GW * 0.3 + GW * 0.3 + b * 40;
      var bubY = GH - 50 - Math.abs(Math.sin(frame * 0.02 + b)) * 40;
      ctx.beginPath();
      ctx.arc(bub, bubY, 3 + Math.sin(frame * 0.05 + b) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (stage === 3) {
    // Stained glass glow
    var glowColors = ['#8844aa', '#aa4488', '#4488aa'];
    for (var g = 0; g < 3; g++) {
      ctx.fillStyle = glowColors[g];
      ctx.globalAlpha = 0.05 + Math.sin(frame * 0.015 + g) * 0.02;
      ctx.beginPath();
      ctx.arc(80 + g * 120, 60, 30, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (stage === 4) {
    // Bubbling vats
    ctx.fillStyle = 'rgba(102,170,34,0.1)';
    ctx.fillRect(50, GH - 60, 40, 20);
    ctx.fillRect(280, GH - 60, 50, 20);
    if (frame % 20 < 5) {
      ctx.fillStyle = '#aaff44';
      ctx.beginPath();
      ctx.arc(65 + Math.sin(frame * 0.1) * 10, GH - 62, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (stage === 5) {
    // Pulsing mycelium veins
    ctx.strokeStyle = 'rgba(170,34,34,0.2)';
    ctx.lineWidth = 2;
    for (var v = 0; v < 4; v++) {
      ctx.beginPath();
      ctx.moveTo(v * 100 + 50, 0);
      var pulse = Math.sin(frame * 0.02 + v) * 15;
      ctx.quadraticCurveTo(v * 100 + 50 + pulse, GH / 2, v * 100 + 60, GH);
      ctx.stroke();
    }
  }
}

function drawSporePile(x, y) {
  // 8-bit pixel POOP pile
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(x - 5, y - 2, 10, 6);
  ctx.fillRect(x - 4, y - 5, 8, 4);
  ctx.fillRect(x - 2, y - 8, 5, 4);
  ctx.fillRect(x - 1, y - 10, 3, 3);
  // Spore glow on top
  var flicker = 0.5 + Math.sin(frame * 0.08 + x) * 0.3;
  ctx.globalAlpha = flicker;
  ctx.fillStyle = '#38d973';
  ctx.fillRect(x - 1, y - 12, 3, 3);
  ctx.globalAlpha = 1;
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.1);
  ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawPlayer() {
  var px = player.x;
  var py = player.y;
  var dir = player.dir;

  // === BASELING SPRITE ===
  // Animation from player state: ko (dead) > hurt (i-frames) > attack (whip) > jump > walk > idle.
  var _anim = 'idle';
  if (player.dead) _anim = 'ko';
  else if (player.invTimer > 0) _anim = 'hurt';
  else if (player.whipTimer > 0) _anim = 'attack';
  else if (!player.onGround) _anim = 'jump';
  else if (player.vx) _anim = 'walk';
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, player.h + 4, { flipX: dir < 0, frame: frame, anim: _anim })) {
  // 8-bit pixel baseling knight (pixel blocks)
  // Body armor - colored by statB
  var bodyColor = statB.color;
  var bodyH = player.crouching ? 14 : player.h - 8;
  var bodyY = player.crouching ? py + 10 : py + 8;

  // Armor plates (pixel style)
  ctx.fillStyle = bodyColor;
  ctx.fillRect(px + 1, bodyY, player.w - 2, bodyH);
  // Highlight
  ctx.fillStyle = lightenColor(bodyColor, 30);
  ctx.fillRect(px + 2, bodyY + 1, player.w - 4, 3);
  // Dark trim
  ctx.fillStyle = darkenColor(bodyColor, 40);
  ctx.fillRect(px + 1, bodyY + bodyH - 2, player.w - 2, 2);

  // Belt
  ctx.fillStyle = '#886644';
  ctx.fillRect(px + 1, bodyY + Math.floor(bodyH / 2), player.w - 2, 2);

  // Mushroom cap head
  ctx.fillStyle = '#cc4444';
  ctx.fillRect(px, py + 2, player.w, 6);
  ctx.fillRect(px - 1, py + 3, player.w + 2, 4);
  // Cap spots
  ctx.fillStyle = '#ff6666';
  ctx.fillRect(px + 2, py + 3, 3, 2);
  ctx.fillRect(px + 7, py + 4, 2, 2);
  // Face area
  ctx.fillStyle = '#eeddcc';
  ctx.fillRect(px + 2, py + 6, player.w - 4, 3);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(px + (dir > 0 ? 7 : 3), py + 7, 2, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + (dir > 0 ? 7 : 3), py + 7, 1, 1);

  // Legs (pixel walk cycle)
  if (!player.crouching) {
    ctx.fillStyle = '#333';
    var walk = player.vx !== 0 ? Math.floor(frame * 0.15) % 2 : 0;
    if (walk === 0) {
      ctx.fillRect(px + 2, py + player.h - 4, 3, 4);
      ctx.fillRect(px + player.w - 5, py + player.h - 4, 3, 4);
    } else {
      ctx.fillRect(px + 1, py + player.h - 4, 3, 4);
      ctx.fillRect(px + player.w - 4, py + player.h - 5, 3, 5);
    }
    // Boots
    ctx.fillStyle = '#554433';
    ctx.fillRect(px + 1, py + player.h - 2, 4, 2);
    ctx.fillRect(px + player.w - 5, py + player.h - 2, 4, 2);
  }

  // Icon badge
  ctx.fillStyle = '#000';
  ctx.fillRect(px + 4, bodyY + 4, 5, 5);
  ctx.fillStyle = statB.color;
  ctx.font = '5px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon, px + 6, bodyY + 8);
  }

  // Stair glow
  if (player.onStair) {
    ctx.fillStyle = 'rgba(255,255,100,0.15)';
    ctx.fillRect(px - 1, py - 1, player.w + 2, player.h + 2);
  }
}

function drawWhip() {
  var range = WHIP_RANGE[whipLevel];
  var progress = 1 - (player.whipTimer / WHIP_DUR);
  var wx = player.x + (player.dir > 0 ? player.w : 0);
  var wy = player.crouching ? player.y + 16 : player.y + 10;
  var endX = wx + player.dir * range * progress;
  var arcY = wy + Math.sin(progress * Math.PI) * -8;

  // Whip chain (pixel segments)
  var segments = Math.ceil(range / 8);
  for (var s = 0; s < segments; s++) {
    var t = s / segments * progress;
    var sx = wx + player.dir * range * t;
    var sy = wy + Math.sin(t * Math.PI) * -6;
    ctx.fillStyle = whipLevel >= 3 ? '#ff6600' : (whipLevel >= 2 ? '#aaaaff' : '#aa8866');
    ctx.fillRect(sx - 1, sy - 1, 3, 3);
  }

  // Whip tip
  if (whipLevel >= 3) {
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(endX - 3, arcY - 3, 6, 6);
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(endX - 1, arcY - 1, 3, 3);
    if (Math.random() < 0.5) {
      TAS.particles.spawn(endX, arcY, '#ff6600', 1, 1, { size: 1, gravity: -0.5 });
    }
  } else {
    ctx.fillStyle = '#ccaa88';
    ctx.fillRect(endX - 2, arcY - 2, 5, 5);
  }
}

function drawEnemy(e) {
  // Our own sprite art, facing the player, with a subtle bob (geometric fallback below when not loaded)
  var _im = enemySprite(ENEMY_SPR[e.type]);
  if (_im) {
    var _pad = 3;
    var _bob = Math.sin(frame * 0.12 + e.startX * 0.1) * 1.5;
    if (player.x < e.x) { // face the player
      ctx.save();
      ctx.translate(e.x + e.w + _pad, e.y - _pad + _bob);
      ctx.scale(-1, 1);
      ctx.drawImage(_im, 0, 0, e.w + _pad * 2, e.h + _pad * 2);
      ctx.restore();
    } else {
      ctx.drawImage(_im, e.x - _pad, e.y - _pad + _bob, e.w + _pad * 2, e.h + _pad * 2);
    }
    return;
  }
  switch(e.type) {
    case 'myco_crawler':
      // Mycelium zombie - green mushroom creature
      ctx.fillStyle = '#446633';
      ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
      ctx.fillStyle = '#558844';
      ctx.fillRect(e.x + 2, e.y + 6, e.w - 4, 4);
      // Mushroom cap head
      ctx.fillStyle = '#88aa44';
      ctx.fillRect(e.x - 1, e.y, e.w + 2, 6);
      ctx.fillStyle = '#aacc66';
      ctx.fillRect(e.x + 2, e.y + 1, 3, 2);
      // Arms reaching
      ctx.fillStyle = '#446633';
      ctx.fillRect(e.x - 3, e.y + 8, 3, 2);
      ctx.fillRect(e.x + e.w, e.y + 8, 3, 2);
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 8, e.y + 2, 2, 2);
      break;
    case 'spore_bat':
      // Spore-infested bat
      ctx.fillStyle = '#556644';
      var wingFlap = Math.sin(e.timer * 8) * 5;
      // Wings (pixel)
      ctx.fillRect(e.x - 4, e.y + wingFlap + 2, 5, 3);
      ctx.fillRect(e.x + e.w - 1, e.y + wingFlap + 2, 5, 3);
      // Body
      ctx.fillStyle = '#667755';
      ctx.fillRect(e.x + 1, e.y + 1, e.w - 2, e.h - 2);
      // Spore spots
      ctx.fillStyle = '#88ff44';
      ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 3, 2, 1);
      // Eyes
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(e.x + 2, e.y + 4, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 4, 2, 2);
      break;
    case 'fungal_skeleton':
      // Skeleton with fungal growths
      ctx.fillStyle = '#ddccaa';
      ctx.fillRect(e.x + 3, e.y, 8, 7); // skull
      ctx.fillRect(e.x + 4, e.y + 8, 6, 6); // ribcage
      ctx.fillRect(e.x + 5, e.y + 9, 4, 1);
      ctx.fillRect(e.x + 5, e.y + 11, 4, 1);
      ctx.fillRect(e.x + 3, e.y + 14, 3, 6); // legs
      ctx.fillRect(e.x + 8, e.y + 14, 3, 6);
      // Fungal growth
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(e.x + 1, e.y - 2, 4, 3);
      ctx.fillRect(e.x + 9, e.y + 6, 3, 3);
      // Eyes
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(e.x + 4, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 8, e.y + 2, 2, 2);
      break;
    case 'reactor_head':
      // Floating reactor head - sine-wave drifting hazard
      ctx.fillStyle = '#3366aa';
      ctx.fillRect(e.x + 1, e.y + 1, e.w - 2, e.h - 2);
      // Energy corona
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(e.x, e.y, e.w, 2);
      ctx.fillRect(e.x, e.y + e.h - 2, e.w, 2);
      // Energy tendrils
      ctx.fillStyle = '#2288cc';
      for (var tn = 0; tn < 3; tn++) {
        var ty = e.y - 3 - Math.sin(e.timer * 3 + tn) * 3;
        ctx.fillRect(e.x + 2 + tn * 3, ty, 2, 3);
      }
      // Core eye
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(e.x + 4, e.y + 4, 4, 4);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.x + 5, e.y + 5, 2, 2);
      break;
    case 'spore_armor':
      // Armored spore knight
      ctx.fillStyle = '#556677';
      ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
      // Armor details
      ctx.fillStyle = '#667788';
      ctx.fillRect(e.x + 2, e.y + 6, e.w - 4, 4);
      ctx.fillRect(e.x + 2, e.y + e.h - 6, e.w - 4, 4);
      // Helmet
      ctx.fillStyle = '#445566';
      ctx.fillRect(e.x + 1, e.y, e.w - 2, 6);
      ctx.fillRect(e.x, e.y + 1, e.w, 4);
      // Spore visor
      ctx.fillStyle = '#44ff88';
      ctx.fillRect(e.x + 3, e.y + 2, e.w - 6, 2);
      break;
    case 'myco_flea':
      // Tiny mushroom flea
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(e.x + 1, e.y + 3, e.w - 2, e.h - 3);
      // Cap
      ctx.fillStyle = '#cc6644';
      ctx.fillRect(e.x, e.y, e.w, 4);
      ctx.fillStyle = '#ee8866';
      ctx.fillRect(e.x + 2, e.y + 1, 2, 2);
      // Crazy eyes
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(e.x + 1, e.y + 4, 2, 2);
      ctx.fillRect(e.x + 6, e.y + 4, 2, 2);
      break;
    case 'spore_fish':
      // Spore fish creature
      ctx.fillStyle = '#226688';
      ctx.fillRect(e.x, e.y + 2, e.w, e.h - 2);
      ctx.fillStyle = '#44aacc';
      ctx.fillRect(e.x + 2, e.y + 4, e.w - 4, 4);
      // Fins (pixel)
      ctx.fillStyle = '#115577';
      ctx.fillRect(e.x - 3, e.y + 6, 3, 4);
      // Spore spots
      ctx.fillStyle = '#44ff88';
      ctx.fillRect(e.x + 3, e.y + 8, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 6, 2, 2);
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(e.x + 2, e.y + 3, 2, 2);
      break;
    case 'bone_tower':
      // Fungal bone tower
      ctx.fillStyle = '#ddccaa';
      for (var bp = 0; bp < 4; bp++) {
        ctx.fillRect(e.x + 2, e.y + bp * 8, e.w - 4, 7);
      }
      // Fungal growths between segments
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(e.x, e.y + 7, e.w, 2);
      ctx.fillRect(e.x + 1, e.y + 15, e.w - 2, 2);
      // Skull on top
      ctx.fillStyle = '#eeddbb';
      ctx.fillRect(e.x + 1, e.y - 3, e.w - 2, 5);
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(e.x + 3, e.y - 1, 2, 2);
      ctx.fillRect(e.x + 8, e.y - 1, 2, 2);
      break;
  }
}

function drawBoss(b) {
  var pulse = Math.sin(frame * 0.1) * 0.1;
  ctx.globalAlpha = 0.9 + pulse;

  // Our own boss sprite art, sized to the boss box and facing the player
  // (geometric fallback below when the image isn't loaded yet)
  var _bim = enemySprite('art/enemies/enemy-' + BOSS_SPR[b.stageNum] + '.jpg');
  if (_bim && window.TasernArt) {
    var _bx = b.x - 4, _by = b.y - 4, _bw = b.w + 8, _bh = b.h + 8;
    if (player.x < b.x) { // face the player
      ctx.save();
      ctx.translate(_bx + _bw, _by);
      ctx.scale(-1, 1);
      TasernArt.drawContain(ctx, _bim, 0, 0, _bw, _bh);
      ctx.restore();
    } else {
      TasernArt.drawContain(ctx, _bim, _bx, _by, _bw, _bh);
    }
    ctx.globalAlpha = 1;
    return;
  }

  switch(b.stageNum) {
    case 0: // Mold Titan
      // Giant mushroom body
      ctx.fillStyle = '#446633';
      ctx.fillRect(b.x + 2, b.y + 8, b.w - 4, b.h - 8);
      // Giant cap
      ctx.fillStyle = '#888844';
      ctx.fillRect(b.x - 6, b.y, b.w + 12, 10);
      ctx.fillRect(b.x - 4, b.y - 4, b.w + 8, 6);
      // Spots
      ctx.fillStyle = '#aaaa66';
      ctx.fillRect(b.x, b.y + 1, 4, 3);
      ctx.fillRect(b.x + 10, b.y - 2, 3, 3);
      ctx.fillRect(b.x + 20, b.y + 2, 3, 2);
      // Eyes
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(b.x + 6, b.y + 12, 4, 4);
      ctx.fillRect(b.x + 16, b.y + 12, 4, 4);
      // Tendrils
      ctx.fillStyle = '#335522';
      for (var t = 0; t < 3; t++) {
        var tx = b.x + 4 + t * 8;
        var tlen = 8 + Math.sin(b.timer * 2 + t) * 4;
        ctx.fillRect(tx, b.y + b.h, 3, tlen);
      }
      break;
    case 1: // Reactor Queen
      // Energy core body
      ctx.fillStyle = '#224488';
      ctx.fillRect(b.x + 2, b.y + 4, b.w - 4, b.h - 4);
      // Crown / antenna
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(b.x + 4, b.y - 6, 4, 8);
      ctx.fillRect(b.x + b.w - 8, b.y - 6, 4, 8);
      ctx.fillRect(b.x + b.w / 2 - 2, b.y - 8, 4, 10);
      // Energy lines
      ctx.fillStyle = '#66ccff';
      ctx.fillRect(b.x + 3, b.y + 8, b.w - 6, 2);
      ctx.fillRect(b.x + 3, b.y + 14, b.w - 6, 2);
      ctx.fillRect(b.x + 3, b.y + 20, b.w - 6, 2);
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(b.x + 6, b.y + 10, 4, 4);
      ctx.fillRect(b.x + 14, b.y + 10, 4, 4);
      // Energy aura
      ctx.fillStyle = 'rgba(68,170,255,0.15)';
      ctx.fillRect(b.x - 4, b.y - 2, b.w + 8, b.h + 4);
      break;
    case 2: // Toxic Wraith Duo
      // Two spectral forms
      ctx.fillStyle = '#448844';
      ctx.fillRect(b.x, b.y + 2, b.w / 2 - 2, b.h - 2);
      ctx.fillRect(b.x + b.w / 2 + 2, b.y + 2, b.w / 2 - 2, b.h - 2);
      // Spore halos
      ctx.fillStyle = '#66cc66';
      ctx.fillRect(b.x + 1, b.y, b.w / 2 - 4, 3);
      ctx.fillRect(b.x + b.w / 2 + 3, b.y, b.w / 2 - 4, 3);
      // Ghost trails
      ctx.fillStyle = 'rgba(68,136,68,0.3)';
      ctx.fillRect(b.x - 2, b.y + b.h - 4, b.w / 2 + 2, 6);
      ctx.fillRect(b.x + b.w / 2, b.y + b.h - 4, b.w / 2 + 2, 6);
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(b.x + 2, b.y + 6, 2, 2);
      ctx.fillRect(b.x + b.w / 2 + 4, b.y + 6, 2, 2);
      break;
    case 3: // Frankenspore
      // Big stitched body
      ctx.fillStyle = '#558855';
      ctx.fillRect(b.x, b.y + 4, b.w, b.h - 4);
      ctx.fillStyle = '#447744';
      ctx.fillRect(b.x + 4, b.y + 8, b.w - 8, 8);
      // Bolts
      ctx.fillStyle = '#888';
      ctx.fillRect(b.x - 3, b.y + 10, 5, 3);
      ctx.fillRect(b.x + b.w - 2, b.y + 10, 5, 3);
      // Flat top / cap
      ctx.fillStyle = '#446644';
      ctx.fillRect(b.x + 2, b.y, b.w - 4, 6);
      // Stitches
      ctx.fillStyle = '#333';
      ctx.fillRect(b.x + b.w / 2 - 1, b.y + 6, 2, b.h - 10);
      for (var st = 0; st < 4; st++) {
        ctx.fillRect(b.x + b.w / 2 - 4, b.y + 10 + st * 6, 8, 1);
      }
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(b.x + 6, b.y + 6, 4, 3);
      ctx.fillRect(b.x + b.w - 10, b.y + 6, 4, 3);
      // Spore Igor companion
      ctx.fillStyle = '#884444';
      ctx.fillRect(b.x + b.dir * 28, b.y - 8, 10, 12);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(b.x + b.dir * 30, b.y - 6, 2, 2);
      break;
    case 4: // Garden Reaper
      // Dark cloak (pixel)
      ctx.fillStyle = '#222';
      ctx.fillRect(b.x + 4, b.y + 6, b.w - 8, b.h - 6);
      ctx.fillRect(b.x + 2, b.y + 10, b.w - 4, b.h - 10);
      ctx.fillRect(b.x, b.y + b.h - 8, b.w, 8);
      // Hood
      ctx.fillStyle = '#111';
      ctx.fillRect(b.x + 4, b.y, b.w - 8, 10);
      ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 8);
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(b.x + 8, b.y + 4, 3, 3);
      ctx.fillRect(b.x + 14, b.y + 4, 3, 3);
      // Scythe
      ctx.fillStyle = '#666';
      ctx.fillRect(b.x + b.w + 2, b.y + 4, 2, b.h - 8);
      ctx.fillStyle = '#999';
      ctx.fillRect(b.x + b.w, b.y + 2, 8, 3);
      ctx.fillRect(b.x + b.w + 4, b.y + 4, 4, 2);
      break;
    case 5: // Fungi Lord
      var phase2 = b.hp <= b.maxHp / 2;
      if (!phase2) {
        // Phase 1 - regal dark lord
        ctx.fillStyle = '#440022';
        ctx.fillRect(b.x + 2, b.y + 6, b.w - 4, b.h - 6);
        ctx.fillStyle = '#660033';
        ctx.fillRect(b.x + 4, b.y + 8, b.w - 8, b.h - 12);
        // Cape
        ctx.fillStyle = '#220011';
        ctx.fillRect(b.x - 4, b.y + 12, 4, b.h - 8);
        ctx.fillRect(b.x + b.w, b.y + 12, 4, b.h - 8);
        // Crown
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(b.x + 4, b.y, b.w - 8, 5);
        ctx.fillRect(b.x + 6, b.y - 4, 3, 4);
        ctx.fillRect(b.x + 13, b.y - 4, 3, 4);
        ctx.fillRect(b.x + 20, b.y - 4, 3, 4);
      } else {
        // Phase 2 - true mushroom horror, massive
        ctx.fillStyle = '#880044';
        ctx.fillRect(b.x + 2, b.y + 12, b.w - 4, b.h - 12);
        // Giant mushroom cap
        ctx.fillStyle = '#cc0044';
        ctx.fillRect(b.x - 8, b.y, b.w + 16, 14);
        ctx.fillRect(b.x - 6, b.y - 4, b.w + 12, 6);
        // Spots
        ctx.fillStyle = '#ff4488';
        ctx.fillRect(b.x, b.y + 2, 4, 3);
        ctx.fillRect(b.x + b.w - 6, b.y + 3, 5, 3);
        ctx.fillRect(b.x + b.w / 2 - 1, b.y - 2, 3, 3);
        // Tendrils
        ctx.fillStyle = '#660022';
        for (var t = 0; t < 4; t++) {
          var tx = b.x + 4 + t * 8;
          var tlen = 10 + Math.sin(b.timer * 2 + t * 2) * 6;
          ctx.fillRect(tx, b.y + b.h, 3, tlen);
        }
      }
      // Eyes always glowing
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(b.x + b.w / 2 - 6, b.y + 16, 4, 4);
      ctx.fillRect(b.x + b.w / 2 + 2, b.y + 16, 4, 4);
      // Inner glow
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(b.x + b.w / 2 - 5, b.y + 17, 2, 2);
      ctx.fillRect(b.x + b.w / 2 + 3, b.y + 17, 2, 2);
      break;
  }
  ctx.globalAlpha = 1;
}

function drawProjectile(p) {
  switch(p.type) {
    case 'dagger':
      ctx.fillStyle = '#aaddaa';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ccffcc';
      ctx.fillRect(p.x + (p.vx > 0 ? p.w - 2 : 0), p.y, 2, p.h);
      break;
    case 'axe':
    case 'enemyaxe':
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.spin || 0);
      ctx.fillStyle = p.friendly ? '#888' : '#996633';
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.fillStyle = p.friendly ? '#aaa' : '#cc8844';
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w / 2, p.h / 2);
      ctx.restore();
      break;
    case 'holyspore':
      ctx.fillStyle = '#88ff88';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.2) * 0.3;
      ctx.fillRect(p.x - 3, p.y - 3, 8, 8);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#aaffaa';
      ctx.fillRect(p.x, p.y, 3, 3);
      break;
    case 'bone':
    case 'enemybone':
      ctx.fillStyle = '#ddccaa';
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(frame * 0.2);
      ctx.fillRect(-3, -1, 6, 2);
      ctx.fillRect(-1, -3, 2, 6);
      ctx.restore();
      break;
    case 'spore_bolt':
      ctx.fillStyle = '#44dd88';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#88ffaa';
      ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
      break;
    case 'reactor_bolt':
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
      break;
    case 'acid':
      ctx.fillStyle = '#aaff44';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      break;
    case 'bubble':
      ctx.fillStyle = 'rgba(68,204,170,0.5)';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#88ffcc';
      ctx.fillRect(p.x + 1, p.y + 1, 2, 2);
      break;
    default:
      ctx.fillStyle = '#ff6622';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ffaa44';
      ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
      break;
  }
}

function drawHUD() {
  var barH = 28;
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, barH);

  // Stage name
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('STAGE ' + (stage + 1) + ': ' + STAGE_NAMES[stage], 4, 10);

  // HP bar - ref4: CON scales this
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 14, 80, 8);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#38d973' : (hpPct > 0.25 ? '#f4b41b' : '#e6482e');
  ctx.fillRect(4, 14, 80 * hpPct, 8);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(4, 14, 80, 8);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText(player.hp + '/' + player.maxHp, 36, 21);

  // Hearts
  ctx.fillStyle = '#ff4488';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  drawHeart(GW / 2 - 10, 8, 4);
  ctx.fillStyle = '#fff';
  ctx.fillText(hearts, GW / 2 + 6, 14);

  // Sub weapon
  if (subWeapon >= 0) {
    ctx.fillStyle = '#3cacd7';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    var cost = Math.max(1, SUB_COST[subWeapon] - SUB_COST_REDUCE);
    ctx.fillText(SUB_NAMES[subWeapon] + '(' + cost + ')', GW / 2, 24);
  }

  // Whip level
  ctx.fillStyle = '#f4b41b';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('WHIP:' + (whipLevel + 1), GW - 60, 10);
