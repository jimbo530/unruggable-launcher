  // Score with multiplier indicator
  ctx.fillStyle = '#fff';
  ctx.fillText(score, GW - 4, 22);
  if (SCORE_MULT > 1.01) {
    ctx.fillStyle = statB.color;
    ctx.font = '6px monospace';
    ctx.fillText('x' + SCORE_MULT.toFixed(1), GW - 4, 27);
  }

  // Lives (baseling icons)
  ctx.fillStyle = statB.color;
  for (var i = 0; i < lives; i++) {
    ctx.fillRect(GW - 52 + i * 10, 13, 6, 8);
    ctx.fillStyle = '#cc4444';
    ctx.fillRect(GW - 52 + i * 10, 12, 6, 3);
    ctx.fillStyle = statB.color;
  }

  // Boss HP bar
  if (bossActive && boss && boss.active) {
    var bossBarW = 120;
    var bossBarX = (GW - bossBarW) / 2;
    var bossBarY = GH - 20;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(bossBarX - 2, bossBarY - 2, bossBarW + 4, 12);
    ctx.fillStyle = '#333';
    ctx.fillRect(bossBarX, bossBarY, bossBarW, 8);
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(bossBarX, bossBarY, bossBarW * (boss.hp / boss.maxHp), 8);
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, GW / 2, bossBarY - 4);
  }

  // Baseling name + level
  ctx.fillStyle = statB.color;
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(statB.name + (statB.level > 0 ? ' Lv' + statB.level : ''), 88, 10);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  var colors = STAGE_COLORS[0];
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Gothic arches
  ctx.strokeStyle = '#7a444a';
  ctx.lineWidth = 2;
  for (var i = 0; i < 6; i++) {
    var ax = 30 + i * 70;
    ctx.beginPath();
    ctx.arc(ax, 80, 28, Math.PI, 0);
    ctx.lineTo(ax + 28, 250);
    ctx.lineTo(ax - 28, 250);
    ctx.closePath();
    ctx.stroke();
  }

  // Floating spore particles
  for (var sp = 0; sp < 5; sp++) {
    ctx.fillStyle = 'rgba(56,217,115,0.25)';
    var spx = Math.sin(frame * 0.01 + sp * 1.3) * 150 + GW / 2;
    var spy = Math.cos(frame * 0.008 + sp * 0.9) * 80 + GH / 2;
    ctx.fillRect(spx - 1, spy - 1, 3, 3);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE KNIGHT', GW / 2 + 2, 72);
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE KNIGHT', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#7a444a';
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Arcade Tale', GW / 2, 90);

  // Knight sprite in center (8-bit pixel)
  ctx.fillStyle = statB.color;
  ctx.fillRect(GW / 2 - 6, 120, 12, 24);
  ctx.fillStyle = lightenColor(statB.color, 30);
  ctx.fillRect(GW / 2 - 4, 122, 8, 3);
  ctx.fillStyle = '#cc4444';
  ctx.fillRect(GW / 2 - 6, 113, 12, 7);
  ctx.fillRect(GW / 2 - 7, 115, 14, 4);
  ctx.fillStyle = '#ff6666';
  ctx.fillRect(GW / 2 - 3, 114, 3, 2);
  ctx.fillRect(GW / 2 + 2, 116, 2, 2);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(GW / 2 + 2, 118, 2, 2);
  // Whip
  ctx.fillStyle = '#aa8866';
  var whipX = GW / 2 + 6;
  for (var wi = 0; wi < 6; wi++) {
    ctx.fillRect(whipX + wi * 6, 130 + Math.sin(wi * 0.8 + frame * 0.05) * 3, 4, 2);
  }

  // Selected baseling preview (idle bob) over the knight mascot
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (TAS.drawBaseling(ctx, GW / 2, 120, 34, { anim: 'idle', frame: frame })) { /* sprite drew */ }

  // Selected baseling name + picker prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 158);
  ctx.fillText('[C] SELECT BASELING', GW / 2, 170);

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD: Move   Z/SPACE: Jump', GW / 2, 180);
  ctx.fillText('X: Whip   UP+X: Sub-weapon   DOWN: Crouch', GW / 2, 195);

  // Stage list
  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  for (var i = 0; i < 6; i++) {
    ctx.fillText((i + 1) + '. ' + STAGE_NAMES[i], GW / 2, 215 + i * 10);
  }

  // Start prompt
  var pulseA = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulseA;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  if (frame % 8 === 0) {
    TAS.particles.spawn(Math.random() * GW, GH, '#f4b41b', 3, 3, { gravity: -1 });
    TAS.particles.spawn(Math.random() * GW, GH, statB.color, 3, 3, { gravity: -1 });
  }

  ctx.save();
  TAS.fx.applyShake();
  TAS.particles.draw();
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, 50);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('The Fungi Lord is vanquished!', GW / 2, 85);
  ctx.fillText('The garden kingdom is saved.', GW / 2, 105);

  // Baseling tribute
  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText(statB.name + ' stands victorious!', GW / 2, 130);

  // Stats summary
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, GW / 2, 150);
  ctx.fillText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 162);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, 185);

  if (score >= highScore && score > 0) {
    var p2 = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = p2;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 205);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW / 2, 205);
  }

  var pulse3 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse3;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
}

// === COLOR UTILITIES ===
function lightenColor(hex, amt) {
  if (!hex || hex.charAt(0) !== '#' || hex.length < 7) hex = '#44dd88'; // guard null/short
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function darkenColor(hex, amt) {
  if (!hex || hex.charAt(0) !== '#' || hex.length < 7) hex = '#44dd88'; // guard null/short
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, r - amt);
  g = Math.max(0, g - amt);
  b = Math.max(0, b - amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
