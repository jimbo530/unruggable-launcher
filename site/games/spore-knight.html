<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Knight</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 400, GH = 300;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'WHIP' } });

var TILE = 16;
var GRAVITY = 980;
var JUMP_VEL = -310;
var WALK_SPEED = 80;
var STAIR_SPEED = 55;
var KNOCKBACK_VX = 120;
var KNOCKBACK_VY = -160;
var INV_TIME = 1.5;
var WHIP_DUR = 0.3;
var WHIP_RANGE = [32, 48, 64, 80];
var SUB_COST = [1, 1, 3, 1, 5];
var SUB_NAMES = ['DAGGER', 'AXE', 'HOLY SPORE', 'BONE', 'STOPWATCH'];

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('sporeknight_hi');
var lives = 3;
var stage = 0;
var screenIdx = 0;
var hearts = 5;
var whipLevel = 0;
var subWeapon = -1;
var freezeTimer = 0;
var bossHP = 0;
var bossMaxHP = 0;
var bossActive = false;
var stageComplete = false;
var stageCompleteTimer = 0;

// Player
var player = { x: 0, y: 0, vx: 0, vy: 0, w: 12, h: 24, dir: 1, onGround: false, onStair: false, stairDir: 0, crouching: false, jumping: false, hp: 16, maxHp: 16, invTimer: 0, whipTimer: 0, dead: false, deathTimer: 0 };

// Stage data
var platforms = [];
var stairs = [];
var candles = [];
var enemies = [];
var projectiles = [];
var pickups = [];
var boss = null;
var camX = 0;

// === LEVEL GENERATION ===
var STAGE_NAMES = ['Entrance Hall', 'Clock Tower', 'Underground Waterway', 'Chapel', 'Laboratory', 'Throne Room'];
var STAGE_COLORS = [
  { bg: '#0a0612', floor: '#3a2a1a', wall: '#2a1a0a', accent: '#6b4422' },
  { bg: '#080814', floor: '#2a2a3a', wall: '#1a1a2a', accent: '#5566aa' },
  { bg: '#040a14', floor: '#1a2a2a', wall: '#0a1a1a', accent: '#226688' },
  { bg: '#100818', floor: '#3a2a3a', wall: '#2a1a2a', accent: '#8844aa' },
  { bg: '#0a0a04', floor: '#2a3a1a', wall: '#1a2a0a', accent: '#66aa22' },
  { bg: '#140404', floor: '#3a1a1a', wall: '#2a0a0a', accent: '#aa2222' }
];

var SCREENS_PER_STAGE = [3, 4, 3, 4, 3, 3];

function generateScreen(stageNum, screenNum) {
  platforms = [];
  stairs = [];
  candles = [];
  enemies = [];
  projectiles = [];
  pickups = [];
  boss = null;
  bossActive = false;

  var sw = GW;
  var sh = GH - 30;
  var floorY = sh - TILE;

  // Ground floor always present
  platforms.push({ x: 0, y: floorY, w: sw, h: TILE, type: 'floor' });

  // Seed RNG from stage+screen for reproducibility
  var seed = stageNum * 100 + screenNum * 7 + 42;
  function rng() { seed = (seed * 1664525 + 1013904223) & 0x7FFFFFFF; return seed / 0x7FFFFFFF; }

  var isLast = screenNum === SCREENS_PER_STAGE[stageNum] - 1;

  // Stage-specific generation
  if (stageNum === 0) { // Entrance Hall
    platforms.push({ x: 40, y: floorY - 50, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 160, y: floorY - 90, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 280, y: floorY - 60, w: 90, h: 8, type: 'plat' });
    if (screenNum > 0) {
      platforms.push({ x: 100, y: floorY - 130, w: 60, h: 8, type: 'plat' });
      stairs.push({ x: 340, y: floorY, topY: floorY - 90, dir: 1 });
    }
    // Candles
    for (var i = 0; i < 5; i++) {
      candles.push({ x: 30 + rng() * 340, y: floorY - 40 - rng() * 80, hp: 1 });
    }
    // Enemies
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        var ex = 100 + rng() * 260;
        if (rng() < 0.5) enemies.push(createEnemy('zombie', ex, floorY - 20));
        else enemies.push(createEnemy('bat', ex, floorY - 60 - rng() * 40));
      }
    }
  } else if (stageNum === 1) { // Clock Tower
    platforms.push({ x: 20, y: floorY - 60, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 120, y: floorY - 110, w: 50, h: 8, type: 'plat' });
    platforms.push({ x: 220, y: floorY - 80, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 300, y: floorY - 140, w: 60, h: 8, type: 'plat' });
    if (screenNum >= 1) {
      platforms.push({ x: 50, y: floorY - 160, w: 80, h: 8, type: 'plat' });
      stairs.push({ x: 180, y: floorY, topY: floorY - 110, dir: -1 });
    }
    // Moving gear platforms
    platforms.push({ x: 160, y: floorY - 40, w: 40, h: 8, type: 'gear', baseX: 160, range: 60, speed: 0.8 + rng() * 0.4 });
    for (var i = 0; i < 4; i++) candles.push({ x: 40 + rng() * 320, y: floorY - 50 - rng() * 100, hp: 1 });
    if (!isLast) {
      for (var i = 0; i < 1 + screenNum; i++) {
        enemies.push(createEnemy('medusa', 80 + rng() * 280, floorY - 80 - rng() * 60));
      }
      if (screenNum >= 2) enemies.push(createEnemy('bonepillar', 300, floorY - 20));
    }
  } else if (stageNum === 2) { // Underground Waterway
    platforms.push({ x: 0, y: floorY - 40, w: 100, h: 8, type: 'plat' });
    platforms.push({ x: 140, y: floorY - 70, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 260, y: floorY - 50, w: 100, h: 8, type: 'plat' });
    if (screenNum >= 1) {
      platforms.push({ x: 60, y: floorY - 110, w: 60, h: 8, type: 'plat' });
      platforms.push({ x: 320, y: floorY - 100, w: 50, h: 8, type: 'plat' });
    }
    for (var i = 0; i < 4; i++) candles.push({ x: 50 + rng() * 300, y: floorY - 30 - rng() * 60, hp: 1 });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.6) enemies.push(createEnemy('fishman', 80 + rng() * 280, floorY + 10));
        else enemies.push(createEnemy('skeleton', 100 + rng() * 250, floorY - 20));
      }
    }
  } else if (stageNum === 3) { // Chapel
    platforms.push({ x: 30, y: floorY - 70, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 140, y: floorY - 120, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 270, y: floorY - 80, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 200, y: floorY - 40, w: 50, h: 8, type: 'plat' });
    if (screenNum >= 2) {
      stairs.push({ x: 60, y: floorY, topY: floorY - 120, dir: 1 });
      platforms.push({ x: 320, y: floorY - 150, w: 60, h: 8, type: 'plat' });
    }
    for (var i = 0; i < 5; i++) candles.push({ x: 30 + rng() * 330, y: floorY - 40 - rng() * 90, hp: 1 });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.5) enemies.push(createEnemy('axearmor', 100 + rng() * 250, floorY - 22));
        else enemies.push(createEnemy('bat', 80 + rng() * 280, floorY - 70 - rng() * 50));
      }
    }
  } else if (stageNum === 4) { // Laboratory
    platforms.push({ x: 50, y: floorY - 50, w: 60, h: 8, type: 'plat' });
    platforms.push({ x: 150, y: floorY - 90, w: 70, h: 8, type: 'plat' });
    platforms.push({ x: 260, y: floorY - 60, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 100, y: floorY - 140, w: 60, h: 8, type: 'plat' });
    for (var i = 0; i < 4; i++) candles.push({ x: 50 + rng() * 300, y: floorY - 30 - rng() * 70, hp: 1 });
    if (!isLast) {
      for (var i = 0; i < 2 + screenNum; i++) {
        if (rng() < 0.5) enemies.push(createEnemy('fleaman', 80 + rng() * 280, floorY - 20));
        else enemies.push(createEnemy('skeleton', 100 + rng() * 250, floorY - 20));
      }
    }
  } else { // Throne Room
    platforms.push({ x: 60, y: floorY - 60, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 200, y: floorY - 100, w: 80, h: 8, type: 'plat' });
    platforms.push({ x: 300, y: floorY - 50, w: 70, h: 8, type: 'plat' });
    for (var i = 0; i < 3; i++) candles.push({ x: 60 + rng() * 280, y: floorY - 40 - rng() * 60, hp: 1 });
    if (!isLast) {
      enemies.push(createEnemy('axearmor', 200, floorY - 22));
      enemies.push(createEnemy('medusa', 150, floorY - 100));
      if (screenNum >= 1) enemies.push(createEnemy('bonepillar', 320, floorY - 20));
    }
  }

  // Boss on last screen
  if (isLast) {
    boss = createBoss(stageNum);
    bossActive = true;
  }
}

// === ENEMY FACTORY ===
function createEnemy(type, x, y) {
  var e = { type: type, x: x, y: y, vx: 0, vy: 0, hp: 1, w: 14, h: 20, dir: -1, timer: 0, startX: x, startY: y, active: true, shootTimer: 0 };
  switch(type) {
    case 'zombie': e.vx = -20; e.hp = 1; break;
    case 'bat': e.hp = 1; e.w = 12; e.h = 10; e.timer = Math.random() * 6.28; break;
    case 'skeleton': e.hp = 2; e.shootTimer = 1 + Math.random() * 2; break;
    case 'medusa': e.hp = 1; e.w = 12; e.h = 12; e.vx = -40; e.timer = Math.random() * 6.28; break;
    case 'axearmor': e.hp = 3; e.w = 16; e.h = 24; e.shootTimer = 2; break;
    case 'fleaman': e.hp = 1; e.w = 10; e.h = 12; e.vy = -200; e.vx = (Math.random() < 0.5 ? -1 : 1) * 60; break;
    case 'fishman': e.hp = 1; e.w = 12; e.h = 18; e.vy = -250; e.active = false; e.timer = 1 + Math.random() * 3; break;
    case 'bonepillar': e.hp = 4; e.w = 14; e.h = 32; e.vx = 0; e.shootTimer = 1.5; break;
  }
  return e;
}

// === BOSS FACTORY ===
function createBoss(stageNum) {
  var floorY = GH - 30 - TILE;
  var b = { type: 'boss', x: 300, y: floorY - 40, vx: 0, vy: 0, w: 32, h: 40, hp: 0, maxHp: 0, timer: 0, phase: 0, dir: -1, shootTimer: 0, active: true, stageNum: stageNum };
  switch(stageNum) {
    case 0: b.hp = b.maxHp = 12; b.w = 28; b.h = 28; b.y = floorY - 80; b.name = 'GIANT BAT'; break;
    case 1: b.hp = b.maxHp = 16; b.w = 24; b.h = 30; b.name = 'MEDUSA QUEEN'; break;
    case 2: b.hp = b.maxHp = 20; b.w = 20; b.h = 28; b.name = 'MUMMY PAIR'; break;
    case 3: b.hp = b.maxHp = 22; b.w = 28; b.h = 34; b.name = 'FRANKENSPORE'; break;
    case 4: b.hp = b.maxHp = 26; b.w = 24; b.h = 30; b.name = 'REAPER'; break;
    case 5: b.hp = b.maxHp = 32; b.w = 30; b.h = 40; b.name = 'SPORE LORD'; break;
  }
  bossHP = b.hp;
  bossMaxHP = b.maxHp;
  return b;
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  stage = 0;
  screenIdx = 0;
  hearts = 5;
  whipLevel = 0;
  subWeapon = -1;
  freezeTimer = 0;
  player.hp = 16;
  player.maxHp = 16;
  player.invTimer = 0;
  player.dead = false;
  player.deathTimer = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
  TAS.particles.clear();
  loadScreen();
}

function loadScreen() {
  generateScreen(stage, screenIdx);
  player.x = 20;
  player.y = GH - 30 - TILE - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.onStair = false;
  player.crouching = false;
  player.jumping = false;
  player.whipTimer = 0;
  freezeTimer = 0;
  stageComplete = false;
  stageCompleteTimer = 0;
}

function nextScreen() {
  screenIdx++;
  if (screenIdx >= SCREENS_PER_STAGE[stage]) {
    stage++;
    screenIdx = 0;
    if (stage >= 6) {
      // Victory!
      state = 'victory';
      if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
      return;
    }
    stageComplete = true;
    stageCompleteTimer = 2.5;
  }
  loadScreen();
}

function playerDie() {
  player.dead = true;
  player.deathTimer = 1.5;
  TAS.fx.shake(8, 0.85);
  TAS.audio.playTone(120, 0.5, 'sawtooth', 0.15, 40);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 20, 3, { gravity: 1.5 });
}

function respawn() {
  lives--;
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
    return;
  }
  player.hp = player.maxHp;
  player.dead = false;
  player.invTimer = 2;
  player.x = 20;
  player.y = GH - 30 - TILE - player.h;
  player.vx = 0;
  player.vy = 0;
  player.onGround = true;
  player.onStair = false;
  player.whipTimer = 0;
}

function hurtPlayer(dmg) {
  if (player.invTimer > 0 || player.dead) return;
  player.hp -= dmg;
  player.invTimer = INV_TIME;
  player.vx = -player.dir * KNOCKBACK_VX;
  player.vy = KNOCKBACK_VY;
  player.onGround = false;
  player.onStair = false;
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(4, 0.9);
  TAS.audio.playTone(200, 0.2, 'square', 0.12, 80);
  if (player.hp <= 0) {
    player.hp = 0;
    playerDie();
  }
}

// === SUB-WEAPON PROJECTILES ===
function fireSubWeapon() {
  if (subWeapon < 0 || hearts < SUB_COST[subWeapon]) return;
  hearts -= SUB_COST[subWeapon];
  var px = player.x + player.w / 2 + player.dir * 10;
  var py = player.y + 8;
  switch(subWeapon) {
    case 0: // Dagger
      projectiles.push({ x: px, y: py, vx: player.dir * 200, vy: 0, type: 'dagger', w: 8, h: 4, life: 2, dmg: 2, friendly: true });
      TAS.audio.playTone(800, 0.08, 'square', 0.06);
      break;
    case 1: // Axe
      projectiles.push({ x: px, y: py, vx: player.dir * 100, vy: -250, type: 'axe', w: 10, h: 10, life: 2, dmg: 3, friendly: true, spin: 0 });
      TAS.audio.playTone(300, 0.15, 'triangle', 0.08);
      break;
    case 2: // Holy Spore
      projectiles.push({ x: px, y: py, vx: player.dir * 30, vy: 0, type: 'holyspore', w: 8, h: 8, life: 4, dmg: 4, friendly: true, timer: 0 });
      TAS.audio.playTone(600, 0.2, 'sine', 0.05);
      break;
    case 3: // Bone
      projectiles.push({ x: px, y: py, vx: player.dir * 150, vy: -100, type: 'bone', w: 6, h: 6, life: 3, dmg: 2, friendly: true, bounces: 3 });
      TAS.audio.playTone(500, 0.1, 'square', 0.05);
      break;
    case 4: // Stopwatch
      freezeTimer = 3;
      TAS.audio.playTone(1000, 0.3, 'sine', 0.08, 500);
      TAS.fx.flash('#aaddff', 0.3);
      break;
  }
}

// === WHIP ATTACK ===
function doWhip() {
  if (player.whipTimer > 0) return;
  player.whipTimer = WHIP_DUR;
  TAS.audio.playTone(150, 0.12, 'sawtooth', 0.1, 300);

  var range = WHIP_RANGE[whipLevel];
  var wx = player.x + (player.dir > 0 ? player.w : -range);
  var wy = player.crouching ? player.y + 14 : player.y + 6;
  var ww = range;
  var wh = 6;

  // Hit candles
  for (var i = candles.length - 1; i >= 0; i--) {
    var c = candles[i];
    if (TAS.hit.rectOverlap(wx, wy, ww, wh, c.x - 6, c.y - 6, 12, 12)) {
      candles.splice(i, 1);
      spawnCandleDrop(c.x, c.y);
      TAS.particles.spawn(c.x, c.y, '#ffaa22', 6, 1.5);
      TAS.audio.playTone(400, 0.08, 'square', 0.05);
      score += 10;
    }
  }

  // Hit enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (!e.active) continue;
    if (TAS.hit.rectOverlap(wx, wy, ww, wh, e.x, e.y, e.w, e.h)) {
      hitEnemy(e, i, whipLevel >= 3 ? 2 : 1);
    }
  }

  // Hit boss
  if (boss && boss.active && TAS.hit.rectOverlap(wx, wy, ww, wh, boss.x, boss.y, boss.w, boss.h)) {
    hitBoss(whipLevel >= 3 ? 2 : 1);
  }
}

function hitEnemy(e, idx, dmg) {
  e.hp -= dmg;
  TAS.fx.flash('#ffffff', 0.1);
  if (e.hp <= 0) {
    enemies.splice(idx, 1);
    score += 50;
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#88ff88', 8, 2);
    TAS.audio.playTone(500, 0.1, 'square', 0.06);
    // Random drop
    if (Math.random() < 0.3) {
      pickups.push({ x: e.x, y: e.y, type: 'heart', timer: 5 });
    }
  } else {
    TAS.audio.playTone(300, 0.05, 'square', 0.04);
  }
}

function hitBoss(dmg) {
  boss.hp -= dmg;
  bossHP = boss.hp;
  TAS.fx.flash('#ffffff', 0.15);
  TAS.fx.shake(3, 0.9);
  TAS.audio.playTone(200, 0.15, 'sawtooth', 0.1);
  if (boss.hp <= 0) {
    boss.active = false;
    score += 500;
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffdd44', 30, 4, { gravity: 0.5 });
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 100);
    // Proceed after delay
    stageComplete = true;
    stageCompleteTimer = 2.5;
  }
}

function spawnCandleDrop(x, y) {
  var r = Math.random();
  if (r < 0.5) pickups.push({ x: x, y: y, type: 'heart', timer: 6 });
  else if (r < 0.7) pickups.push({ x: x, y: y, type: 'meat', timer: 6 });
  else if (r < 0.85) pickups.push({ x: x, y: y, type: 'whipup', timer: 6 });
  else {
    var sw = TAS.math.randInt(0, 4);
    pickups.push({ x: x, y: y, type: 'subweapon', subId: sw, timer: 6 });
  }
}

// === INPUT ===
var prevAttack = false;
var prevJump = false;
var prevUp = false;

function getInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;
  return {
    left: k['ArrowLeft'] || k['KeyA'] || t.left,
    right: k['ArrowRight'] || k['KeyD'] || t.right,
    up: k['ArrowUp'] || k['KeyW'] || t.up,
    down: k['ArrowDown'] || k['KeyS'] || t.down,
    jump: k['KeyZ'] || k['Space'] || t.a,
    attack: k['KeyX'] || k['KeyC'] || t.b
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame > 60 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
      frame = 0;
    }
    return;
  }

  if (state !== 'playing') return;

  // Stage complete transition
  if (stageComplete) {
    stageCompleteTimer -= dt;
    if (stageCompleteTimer <= 0) {
      if (boss && !boss.active) {
        stage++;
        screenIdx = 0;
        if (stage >= 6) {
          state = 'victory';
          if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
          return;
        }
      } else {
        screenIdx++;
        if (screenIdx >= SCREENS_PER_STAGE[stage]) {
          stage++;
          screenIdx = 0;
          if (stage >= 6) {
            state = 'victory';
            if (score > highScore) { highScore = score; TAS.score.save('sporeknight_hi', score); }
            return;
          }
        }
      }
      loadScreen();
    }
    return;
  }

  if (freezeTimer > 0) freezeTimer -= dt;

  var inp = getInput();

  // Player death
  if (player.dead) {
    player.deathTimer -= dt;
    if (player.deathTimer <= 0) respawn();
    return;
  }

  // Invincibility
  if (player.invTimer > 0) player.invTimer -= dt;

  // Attack
  var attackPressed = inp.attack && !prevAttack;
  prevAttack = inp.attack;
  var jumpPressed = inp.jump && !prevJump;
  prevJump = inp.jump;
  var upPressed = inp.up && !prevUp;
  prevUp = inp.up;

  if (attackPressed) {
    if (inp.up && subWeapon >= 0) {
      fireSubWeapon();
    } else {
      doWhip();
    }
  }

  // Whip timer
  if (player.whipTimer > 0) player.whipTimer -= dt;

  // Movement
  if (player.onStair) {
    player.vx = 0;
    player.vy = 0;
    if (inp.up) {
      player.y -= STAIR_SPEED * dt;
      player.x += player.stairDir * STAIR_SPEED * dt * 0.7;
    } else if (inp.down) {
      player.y += STAIR_SPEED * dt;
      player.x -= player.stairDir * STAIR_SPEED * dt * 0.7;
    }
    if (jumpPressed) {
      player.onStair = false;
      player.vy = JUMP_VEL;
      player.jumping = true;
    }
    // Check if left stair bounds
    var onAnyStair = false;
    for (var i = 0; i < stairs.length; i++) {
      var s = stairs[i];
      if (player.x > s.x - 20 && player.x < s.x + 20 && player.y + player.h > s.topY && player.y + player.h < s.y + 10) {
        onAnyStair = true;
        break;
      }
    }
    if (!onAnyStair) player.onStair = false;
  } else {
    // Horizontal
    player.vx = 0;
    if (inp.left && player.whipTimer <= 0) { player.vx = -WALK_SPEED; player.dir = -1; }
    if (inp.right && player.whipTimer <= 0) { player.vx = WALK_SPEED; player.dir = 1; }

    // Crouch
    player.crouching = inp.down && player.onGround;

    // Jump
    if (jumpPressed && player.onGround) {
      player.vy = JUMP_VEL;
      player.onGround = false;
      player.jumping = true;
      TAS.audio.playTone(250, 0.08, 'square', 0.04, 400);
    }

    // Gravity
    player.vy += GRAVITY * dt;

    // Apply velocity
    player.x += player.vx * dt;
    player.y += player.vy * dt;

    // Stair check
    if (inp.up && player.onGround && !player.jumping) {
      for (var i = 0; i < stairs.length; i++) {
        var s = stairs[i];
        if (Math.abs(player.x - s.x) < 16 && Math.abs((player.y + player.h) - s.y) < 10) {
          player.onStair = true;
          player.stairDir = s.dir;
          player.vy = 0;
          break;
        }
      }
    }

    // Platform collision
    player.onGround = false;
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      var px = p.type === 'gear' ? p.x : p.x;
      if (player.vy >= 0 && player.x + player.w > px && player.x < px + p.w) {
        if (player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
          player.jumping = false;
        }
      }
    }

    // Bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > GW) {
      // Move to next screen
      if (!bossActive) {
        nextScreen();
        player.x = 5;
        return;
      } else {
        player.x = GW - player.w;
      }
    }

    // Fall death
    if (player.y > GH + 20) {
      playerDie();
      return;
    }
  }

  // Update gear platforms
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'gear') {
      p.x = p.baseX + Math.sin(frame * 0.02 * p.speed) * p.range;
    }
  }

  // Update enemies
  var floorY = GH - 30 - TILE;
  if (freezeTimer <= 0) {
    for (var i = enemies.length - 1; i >= 0; i--) {
      var e = enemies[i];
      e.timer += dt;

      switch(e.type) {
        case 'zombie':
          e.x += e.vx * dt;
          if (e.x < -20 || e.x > GW + 20) { e.vx = -e.vx; e.dir = -e.dir; }
          break;
        case 'bat':
          e.x += -30 * dt;
          e.y = e.startY + Math.sin(e.timer * 3) * 25;
          if (e.x < -20) e.x = GW + 20;
          break;
        case 'skeleton':
          e.dir = player.x < e.x ? -1 : 1;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2 + Math.random();
            projectiles.push({ x: e.x + e.w / 2, y: e.y + 4, vx: e.dir * 120, vy: -100, type: 'enemybone', w: 6, h: 6, life: 2, dmg: 2, friendly: false, bounces: 1 });
          }
          break;
        case 'medusa':
          e.x += e.vx * dt;
          e.y = e.startY + Math.sin(e.timer * 2.5) * 30;
          if (e.x < -20) e.x = GW + 20;
          if (e.x > GW + 20) e.x = -20;
          break;
        case 'axearmor':
          e.dir = player.x < e.x ? -1 : 1;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2.5;
            projectiles.push({ x: e.x + e.w / 2, y: e.y, vx: e.dir * 100, vy: -150, type: 'enemyaxe', w: 8, h: 8, life: 2.5, dmg: 3, friendly: false, spin: 0 });
          }
          break;
        case 'fleaman':
          e.x += e.vx * dt;
          e.vy += GRAVITY * dt * 0.7;
          e.y += e.vy * dt;
          if (e.y >= floorY - e.h) {
            e.y = floorY - e.h;
            e.vy = -180 - Math.random() * 80;
            e.vx = (player.x < e.x ? -1 : 1) * (40 + Math.random() * 40);
          }
          if (e.x < 10) e.vx = Math.abs(e.vx);
          if (e.x > GW - 20) e.vx = -Math.abs(e.vx);
          break;
        case 'fishman':
          if (!e.active) {
            e.timer -= dt;
            if (e.timer <= 0) {
              e.active = true;
              e.y = floorY + 10;
              e.vy = -280;
              e.x = 40 + Math.random() * 320;
            }
          } else {
            e.vy += GRAVITY * dt * 0.6;
            e.y += e.vy * dt;
            if (e.y >= floorY - e.h) {
              e.y = floorY - e.h;
              e.vy = 0;
              e.dir = player.x < e.x ? -1 : 1;
              e.shootTimer -= dt;
              if (e.shootTimer <= 0) {
                e.shootTimer = 1.5;
                projectiles.push({ x: e.x, y: e.y + 4, vx: e.dir * 100, vy: -50, type: 'fireball', w: 6, h: 6, life: 2, dmg: 2, friendly: false });
              }
            }
          }
          break;
        case 'bonepillar':
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            e.shootTimer = 2;
            projectiles.push({ x: e.x + 4, y: e.y - 4, vx: 0, vy: -120, type: 'fireball', w: 6, h: 6, life: 1.5, dmg: 2, friendly: false });
            projectiles.push({ x: e.x + 4, y: e.y + e.h, vx: 0, vy: 80, type: 'fireball', w: 6, h: 6, life: 1.5, dmg: 2, friendly: false });
          }
          break;
      }

      // Enemy-player collision
      if (e.active && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        hurtPlayer(2);
      }
    }
  }

  // Update boss
  if (boss && boss.active && freezeTimer <= 0) {
    boss.timer += dt;
    boss.shootTimer -= dt;
    var bFloorY = floorY;

    switch(boss.stageNum) {
      case 0: // Giant Bat - swoops around
        boss.x = 200 + Math.sin(boss.timer * 1.2) * 120;
        boss.y = bFloorY - 80 + Math.sin(boss.timer * 2) * 40;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.5;
          projectiles.push({ x: boss.x, y: boss.y + boss.h, vx: (player.x - boss.x) * 0.5, vy: 80, type: 'fireball', w: 6, h: 6, life: 2, dmg: 2, friendly: false });
        }
        break;
      case 1: // Medusa Queen - floats, shoots petrify
        boss.x = 250 + Math.sin(boss.timer * 0.8) * 80;
        boss.y = bFloorY - 100 + Math.cos(boss.timer * 1.5) * 30;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.2;
          for (var a = 0; a < 3; a++) {
            var ang = -0.5 + a * 0.5;
            projectiles.push({ x: boss.x, y: boss.y + 10, vx: Math.cos(ang) * -80, vy: Math.sin(ang) * 80 + 20, type: 'fireball', w: 5, h: 5, life: 2.5, dmg: 2, friendly: false });
          }
        }
        break;
      case 2: // Mummy Pair - two entities
        boss.x = 280 + Math.sin(boss.timer * 0.6) * 60;
        boss.y = bFloorY - boss.h;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 1.8;
          // Bandage projectile
          projectiles.push({ x: boss.x, y: boss.y + 10, vx: -80, vy: Math.sin(boss.timer) * 40, type: 'fireball', w: 8, h: 4, life: 3, dmg: 2, friendly: false });
          projectiles.push({ x: boss.x - 40, y: boss.y + 20, vx: -60, vy: -30, type: 'fireball', w: 8, h: 4, life: 3, dmg: 2, friendly: false });
        }
        break;
      case 3: // Frankenspore + companion
        boss.x += (boss.dir > 0 ? 40 : -40) * dt;
        boss.y = bFloorY - boss.h;
        if (boss.x > GW - 50) boss.dir = -1;
        if (boss.x < 50) boss.dir = 1;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 2;
          // Igor companion throws fire
          projectiles.push({ x: boss.x + boss.dir * 30, y: boss.y - 20, vx: (player.x - boss.x) * 0.8, vy: -120, type: 'fireball', w: 6, h: 6, life: 2, dmg: 3, friendly: false });
        }
        break;
      case 4: // Reaper - teleports and throws scythes
        if (Math.floor(boss.timer * 2) % 8 === 0 && boss.timer - Math.floor(boss.timer) < dt * 2) {
          boss.x = 50 + Math.random() * 300;
          boss.y = bFloorY - 60 - Math.random() * 60;
        }
        boss.y += Math.sin(boss.timer * 3) * 0.5;
        if (boss.shootTimer <= 0) {
          boss.shootTimer = 0.8;
          var ang2 = TAS.math.angle(boss.x, boss.y, player.x, player.y);
          projectiles.push({ x: boss.x, y: boss.y + 10, vx: Math.cos(ang2) * 120, vy: Math.sin(ang2) * 120, type: 'enemyaxe', w: 8, h: 8, life: 2, dmg: 3, friendly: false, spin: 0 });
        }
        break;
      case 5: // Spore Lord - 2 phases
        if (boss.hp > boss.maxHp / 2) {
          // Phase 1 - float and shoot
          boss.x = 200 + Math.sin(boss.timer * 0.7) * 130;
          boss.y = bFloorY - 80 + Math.cos(boss.timer * 1.3) * 30;
          if (boss.shootTimer <= 0) {
            boss.shootTimer = 1;
            for (var a2 = 0; a2 < 5; a2++) {
              var ang3 = (a2 / 5) * Math.PI * 2 + boss.timer;
              projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + boss.h / 2, vx: Math.cos(ang3) * 70, vy: Math.sin(ang3) * 70, type: 'fireball', w: 5, h: 5, life: 2.5, dmg: 3, friendly: false });
            }
          }
        } else {
          // Phase 2 - aggressive
          boss.w = 36; boss.h = 48;
          var targetX = player.x;
          boss.x += (targetX - boss.x) * dt * 1.5;
          boss.y = bFloorY - boss.h + Math.sin(boss.timer * 4) * 10;
          if (boss.shootTimer <= 0) {
            boss.shootTimer = 0.6;
            projectiles.push({ x: boss.x + boss.w / 2, y: boss.y, vx: (Math.random() - 0.5) * 160, vy: -150, type: 'fireball', w: 7, h: 7, life: 3, dmg: 4, friendly: false });
          }
        }
        break;
    }

    // Boss-player collision
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
      hurtPlayer(3);
    }
  }

  // Update projectiles
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    // Gravity for certain types
    if (p.type === 'axe' || p.type === 'enemyaxe') {
      p.vy += GRAVITY * dt * 0.5;
      p.spin = (p.spin || 0) + dt * 10;
    }
    if (p.type === 'bone' || p.type === 'enemybone') {
      p.vy += GRAVITY * dt * 0.4;
    }
    if (p.type === 'holyspore') {
      // Home toward nearest enemy
      p.timer += dt;
      var closest = null;
      var closestD = 999;
      for (var j = 0; j < enemies.length; j++) {
        var d = TAS.math.dist(p.x, p.y, enemies[j].x, enemies[j].y);
        if (d < closestD) { closestD = d; closest = enemies[j]; }
      }
      if (boss && boss.active) {
        var bd = TAS.math.dist(p.x, p.y, boss.x, boss.y);
        if (bd < closestD) { closest = boss; }
      }
      if (closest) {
        var ha = TAS.math.angle(p.x, p.y, closest.x, closest.y);
        p.vx += Math.cos(ha) * 200 * dt;
        p.vy += Math.sin(ha) * 200 * dt;
        var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (spd > 100) { p.vx = p.vx / spd * 100; p.vy = p.vy / spd * 100; }
      }
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Bounce for bone type
    if ((p.type === 'bone' || p.type === 'enemybone') && p.y > floorY - 4) {
      p.y = floorY - 4;
      p.vy = -Math.abs(p.vy) * 0.7;
      p.bounces = (p.bounces || 1) - 1;
      if (p.bounces <= 0) { projectiles.splice(i, 1); continue; }
    }

    // Off screen
    if (p.x < -20 || p.x > GW + 20 || p.y < -40 || p.y > GH + 20) {
      projectiles.splice(i, 1);
      continue;
    }

    // Friendly projectile hits
    if (p.friendly) {
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e2 = enemies[j];
        if (e2.active && TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, e2.x, e2.y, e2.w, e2.h)) {
          hitEnemy(e2, j, p.dmg);
          if (p.type !== 'holyspore') { projectiles.splice(i, 1); break; }
        }
      }
      if (boss && boss.active && projectiles[i] && TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
        hitBoss(p.dmg);
        if (p.type !== 'holyspore') projectiles.splice(i, 1);
      }
    } else {
      // Enemy projectile hits player
      if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        hurtPlayer(p.dmg);
        projectiles.splice(i, 1);
      }
    }
  }

  // Pickups
  for (var i = pickups.length - 1; i >= 0; i--) {
    var pk = pickups[i];
    pk.timer -= dt;
    if (pk.timer <= 0) { pickups.splice(i, 1); continue; }
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pk.x - 5, pk.y - 5, 10, 10)) {
      switch(pk.type) {
        case 'heart': hearts = Math.min(hearts + 3, 99); TAS.audio.playTone(700, 0.08, 'sine', 0.05); break;
        case 'meat': player.hp = Math.min(player.hp + 4, player.maxHp); TAS.audio.playTone(400, 0.15, 'triangle', 0.06); break;
        case 'whipup': whipLevel = Math.min(whipLevel + 1, 3); TAS.audio.playMelody([[400, 0.08], [600, 0.08], [800, 0.12]], 80); break;
        case 'subweapon': subWeapon = pk.subId; TAS.audio.playTone(500, 0.1, 'square', 0.05); break;
      }
      pickups.splice(i, 1);
      score += 25;
    }
  }
}

// === DRAW ===
function draw(dt) {
  var colors = STAGE_COLORS[stage] || STAGE_COLORS[0];

  // Background
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }
  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGE_NAMES[stage] });
    return;
  }
  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Draw background details
  drawBackground(colors);

  // Draw platforms
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'floor') {
      ctx.fillStyle = colors.floor;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      // Floor detail
      ctx.fillStyle = colors.accent;
      for (var fx = 0; fx < p.w; fx += 16) {
        ctx.fillRect(p.x + fx, p.y, 1, p.h);
      }
    } else if (p.type === 'gear') {
      ctx.fillStyle = '#555';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#777';
      ctx.fillRect(p.x + 4, p.y + 1, p.w - 8, 3);
      // Gear teeth
      for (var gx = 0; gx < p.w; gx += 8) {
        ctx.fillRect(p.x + gx, p.y - 2, 4, 2);
      }
    } else {
      ctx.fillStyle = colors.wall;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = colors.accent;
      ctx.fillRect(p.x, p.y, p.w, 2);
    }
  }

  // Draw stairs
  for (var i = 0; i < stairs.length; i++) {
    var s = stairs[i];
    ctx.strokeStyle = '#665544';
    ctx.lineWidth = 2;
    var steps = Math.floor((s.y - s.topY) / 10);
    for (var j = 0; j < steps; j++) {
      var sy = s.y - j * 10;
      var sx = s.x + s.dir * j * 7 - 8;
      ctx.fillStyle = '#443322';
      ctx.fillRect(sx, sy - 3, 16, 3);
    }
  }

  // Draw candles (poop piles)
  for (var i = 0; i < candles.length; i++) {
    var c = candles[i];
    drawPoopPile(c.x, c.y);
  }

  // Draw pickups
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    var bob = Math.sin(frame * 0.1 + i) * 2;
    if (pk.type === 'heart') {
      ctx.fillStyle = '#ff4488';
      drawHeart(pk.x, pk.y + bob, 5);
    } else if (pk.type === 'meat') {
      ctx.fillStyle = '#aa6633';
      ctx.fillRect(pk.x - 4, pk.y + bob - 2, 8, 4);
      ctx.fillStyle = '#ffaa66';
      ctx.fillRect(pk.x - 3, pk.y + bob - 1, 6, 2);
    } else if (pk.type === 'whipup') {
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(pk.x - 2, pk.y + bob - 6, 4, 12);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(pk.x - 3, pk.y + bob - 7, 6, 3);
    } else if (pk.type === 'subweapon') {
      ctx.fillStyle = '#88ddff';
      ctx.fillRect(pk.x - 4, pk.y + bob - 4, 8, 8);
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(SUB_NAMES[pk.subId][0], pk.x, pk.y + bob + 2);
    }
  }

  // Draw enemies
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.active) continue;
    if (freezeTimer > 0) {
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.2) * 0.2;
    }
    drawEnemy(e);
    ctx.globalAlpha = 1;
  }

  // Draw boss
  if (boss && boss.active) {
    if (freezeTimer > 0) ctx.globalAlpha = 0.6;
    drawBoss(boss);
    ctx.globalAlpha = 1;
  }

  // Draw projectiles
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    drawProjectile(p);
  }

  // Draw player
  if (!player.dead) {
    if (player.invTimer > 0 && Math.floor(player.invTimer * 10) % 2 === 0) {
      // Flicker during invincibility
    } else {
      drawPlayer();
    }
  }

  // Draw whip
  if (player.whipTimer > 0 && !player.dead) {
    drawWhip();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Stage complete overlay
  if (stageComplete) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    if (boss && !boss.active) {
      ctx.fillText('BOSS DEFEATED!', GW / 2, GH / 2 - 10);
    } else {
      ctx.fillText('STAGE ' + (stage + 1) + ' CLEAR', GW / 2, GH / 2 - 10);
    }
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2 + 10);
  }
}

// === DRAWING HELPERS ===
function drawBackground(colors) {
  // Gothic window/arch pattern
  ctx.fillStyle = colors.wall;
  for (var i = 0; i < 5; i++) {
    var bx = 20 + i * 85;
    var by = 30;
    ctx.fillRect(bx, by, 4, GH - 60);
    // Arch top
    ctx.beginPath();
    ctx.arc(bx + 35, by + 20, 33, Math.PI, 0);
    ctx.lineWidth = 3;
    ctx.strokeStyle = colors.wall;
    ctx.stroke();
  }
  // Dripping effect for waterway
  if (stage === 2) {
    ctx.fillStyle = '#2266aa';
    for (var d = 0; d < 8; d++) {
      var dx = 30 + d * 50;
      var dLen = 10 + Math.sin(frame * 0.03 + d) * 8;
      ctx.fillRect(dx, 30, 2, dLen);
    }
  }
}

function drawPoopPile(x, y) {
  ctx.fillStyle = '#664422';
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#553311';
  ctx.beginPath();
  ctx.arc(x - 1, y - 4, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#442200';
  ctx.beginPath();
  ctx.arc(x + 1, y - 7, 2, 0, Math.PI * 2);
  ctx.fill();
  // Glow
  var flicker = 0.5 + Math.sin(frame * 0.08 + x) * 0.3;
  ctx.globalAlpha = flicker;
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(x, y - 9, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHeart(x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x, y - s * 0.3, x - s, y - s * 0.3, x - s, y + s * 0.1);
  ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s);
  ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
  ctx.bezierCurveTo(x + s, y - s * 0.3, x, y - s * 0.3, x, y + s * 0.3);
  ctx.fill();
}

function drawPlayer() {
  var px = player.x;
  var py = player.y;
  var dir = player.dir;

  // Body - knight baseling (mushroom cap + armor)
  ctx.fillStyle = '#4466aa';
  var bodyH = player.crouching ? 14 : player.h - 8;
  var bodyY = player.crouching ? py + 10 : py + 8;
  ctx.fillRect(px + 1, bodyY, player.w - 2, bodyH);

  // Armor plates
  ctx.fillStyle = '#5577bb';
  ctx.fillRect(px + 2, bodyY + 2, player.w - 4, 4);
  ctx.fillRect(px + 2, bodyY + bodyH - 4, player.w - 4, 3);

  // Mushroom cap head
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.ellipse(px + player.w / 2, py + 5, 7, 6, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#ff6666';
  ctx.beginPath();
  ctx.arc(px + player.w / 2 - 2, py + 2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(px + player.w / 2 + 3, py + 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(px + (dir > 0 ? 7 : 3), py + 6, 3, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(px + (dir > 0 ? 8 : 4), py + 7, 2, 2);

  // Legs
  if (!player.crouching) {
    ctx.fillStyle = '#333';
    var legOff = Math.sin(frame * 0.15) * 2;
    ctx.fillRect(px + 2, py + player.h - 4, 4, 4);
    ctx.fillRect(px + player.w - 6, py + player.h - 4, 4, 4);
  }

  // On stairs indicator
  if (player.onStair) {
    ctx.fillStyle = 'rgba(255,255,100,0.3)';
    ctx.fillRect(px, py, player.w, player.h);
  }
}

function drawWhip() {
  var range = WHIP_RANGE[whipLevel];
  var progress = 1 - (player.whipTimer / WHIP_DUR);
  var wx = player.x + (player.dir > 0 ? player.w : 0);
  var wy = player.crouching ? player.y + 16 : player.y + 10;
  var endX = wx + player.dir * range * progress;
  var arcY = wy + Math.sin(progress * Math.PI) * -8;

  // Whip chain
  ctx.strokeStyle = whipLevel >= 3 ? '#ff6600' : (whipLevel >= 2 ? '#aaaaff' : '#aa8866');
  ctx.lineWidth = whipLevel >= 2 ? 3 : 2;
  ctx.beginPath();
  ctx.moveTo(wx, wy);
  ctx.quadraticCurveTo(wx + player.dir * range * 0.5, arcY - 5, endX, arcY);
  ctx.stroke();

  // Whip tip
  if (whipLevel >= 3) {
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.arc(endX, arcY, 4, 0, Math.PI * 2);
    ctx.fill();
    // Fire particles
    if (Math.random() < 0.5) {
      TAS.particles.spawn(endX, arcY, '#ff6600', 1, 1, { size: 1, gravity: -0.5 });
    }
  } else {
    ctx.fillStyle = '#ccaa88';
    ctx.beginPath();
    ctx.arc(endX, arcY, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemy(e) {
  switch(e.type) {
    case 'zombie':
      ctx.fillStyle = '#446633';
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#556644';
      ctx.fillRect(e.x + 2, e.y + 2, e.w - 4, 6);
      // Arms out
      ctx.fillRect(e.x - 4, e.y + 8, 4, 3);
      ctx.fillRect(e.x + e.w, e.y + 8, 4, 3);
      ctx.fillStyle = '#884444';
      ctx.fillRect(e.x + 4, e.y + 3, 2, 2);
      ctx.fillRect(e.x + 8, e.y + 3, 2, 2);
      break;
    case 'bat':
      ctx.fillStyle = '#553366';
      // Wings
      var wingFlap = Math.sin(e.timer * 8) * 6;
      ctx.beginPath();
      ctx.moveTo(e.x + e.w / 2, e.y + e.h / 2);
      ctx.lineTo(e.x - 4, e.y + wingFlap);
      ctx.lineTo(e.x - 2, e.y + e.h / 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(e.x + e.w / 2, e.y + e.h / 2);
      ctx.lineTo(e.x + e.w + 4, e.y + wingFlap);
      ctx.lineTo(e.x + e.w + 2, e.y + e.h / 2);
      ctx.fill();
      // Body
      ctx.fillStyle = '#664477';
      ctx.beginPath();
      ctx.ellipse(e.x + e.w / 2, e.y + e.h / 2, 5, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(e.x + 3, e.y + 3, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 3, 2, 2);
      break;
    case 'skeleton':
      ctx.fillStyle = '#ddccaa';
      ctx.fillRect(e.x + 3, e.y, 8, 8); // skull
      ctx.fillRect(e.x + 4, e.y + 8, 6, 12); // ribcage
      ctx.fillRect(e.x + 3, e.y + 14, 3, 6); // legs
      ctx.fillRect(e.x + 8, e.y + 14, 3, 6);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x + 5, e.y + 2, 2, 2); // eyes
      ctx.fillRect(e.x + 8, e.y + 2, 2, 2);
      break;
    case 'medusa':
      ctx.fillStyle = '#44aa44';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, 6, 0, Math.PI * 2);
      ctx.fill();
      // Snakes
      ctx.strokeStyle = '#228822';
      ctx.lineWidth = 1;
      for (var s = 0; s < 4; s++) {
        ctx.beginPath();
        ctx.moveTo(e.x + e.w / 2, e.y);
        ctx.quadraticCurveTo(e.x + e.w / 2 + Math.sin(e.timer * 3 + s) * 6, e.y - 6, e.x + e.w / 2 + (s - 1.5) * 4, e.y - 10);
        ctx.stroke();
      }
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(e.x + 3, e.y + 4, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 4, 2, 2);
      break;
    case 'axearmor':
      ctx.fillStyle = '#666688';
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#888899';
      ctx.fillRect(e.x + 2, e.y + 2, e.w - 4, 8);
      // Helmet
      ctx.fillStyle = '#555566';
      ctx.fillRect(e.x + 2, e.y - 2, e.w - 4, 6);
      // Visor
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(e.x + 4, e.y, e.w - 8, 2);
      break;
    case 'fleaman':
      ctx.fillStyle = '#aa4444';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc6666';
      ctx.fillRect(e.x + 2, e.y, 6, 4);
      // Crazy eyes
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(e.x + 2, e.y + 1, 2, 2);
      ctx.fillRect(e.x + 6, e.y + 1, 2, 2);
      break;
    case 'fishman':
      ctx.fillStyle = '#226688';
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = '#44aacc';
      ctx.fillRect(e.x + 2, e.y + 2, e.w - 4, 6);
      // Fins
      ctx.fillStyle = '#115577';
      ctx.beginPath();
      ctx.moveTo(e.x, e.y + 10);
      ctx.lineTo(e.x - 4, e.y + 6);
      ctx.lineTo(e.x, e.y + 4);
      ctx.fill();
      break;
    case 'bonepillar':
      ctx.fillStyle = '#ddccaa';
      for (var bp = 0; bp < 4; bp++) {
        ctx.fillRect(e.x + 2, e.y + bp * 8, e.w - 4, 7);
      }
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x + 4, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 8, e.y + 2, 2, 2);
      // Skull on top
      ctx.fillStyle = '#eeddbb';
      ctx.fillRect(e.x + 1, e.y - 2, e.w - 2, 6);
      break;
  }
}

function drawBoss(b) {
  var pulse = Math.sin(frame * 0.1) * 0.1;
  ctx.globalAlpha = 0.9 + pulse;

  switch(b.stageNum) {
    case 0: // Giant Bat
      ctx.fillStyle = '#553366';
      ctx.beginPath();
      ctx.ellipse(b.x + b.w / 2, b.y + b.h / 2, b.w / 2, b.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      var wf = Math.sin(frame * 0.1) * 12;
      ctx.fillStyle = '#442255';
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2, b.y + b.h / 2);
      ctx.lineTo(b.x - 20, b.y + wf);
      ctx.lineTo(b.x - 10, b.y + b.h / 2 + 5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2, b.y + b.h / 2);
      ctx.lineTo(b.x + b.w + 20, b.y + wf);
      ctx.lineTo(b.x + b.w + 10, b.y + b.h / 2 + 5);
      ctx.fill();
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(b.x + 8, b.y + 10, 4, 3);
      ctx.fillRect(b.x + 16, b.y + 10, 4, 3);
      break;
    case 1: // Medusa Queen
      ctx.fillStyle = '#228822';
      ctx.beginPath();
      ctx.ellipse(b.x + b.w / 2, b.y + b.h / 2, b.w / 2 + 4, b.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Snake hair
      ctx.strokeStyle = '#116611';
      ctx.lineWidth = 2;
      for (var s = 0; s < 8; s++) {
        ctx.beginPath();
        ctx.moveTo(b.x + b.w / 2, b.y);
        var snakeAng = (s / 8) * Math.PI - Math.PI / 2;
        ctx.quadraticCurveTo(b.x + b.w / 2 + Math.cos(snakeAng) * 15, b.y - 10 + Math.sin(b.timer * 2 + s) * 5, b.x + b.w / 2 + Math.cos(snakeAng) * 20, b.y - 15);
        ctx.stroke();
      }
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(b.x + 8, b.y + 12, 4, 4);
      ctx.fillRect(b.x + 16, b.y + 12, 4, 4);
      break;
    case 2: // Mummy Pair
      // Two mummies
      ctx.fillStyle = '#ccbb88';
      ctx.fillRect(b.x, b.y, b.w / 2 - 2, b.h);
      ctx.fillRect(b.x + b.w / 2 + 2, b.y, b.w / 2 - 2, b.h);
      // Wrapping lines
      ctx.strokeStyle = '#aa9966';
      ctx.lineWidth = 1;
      for (var m = 0; m < 6; m++) {
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + m * 5 + 2);
        ctx.lineTo(b.x + b.w / 2 - 2, b.y + m * 5 + 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(b.x + b.w / 2 + 2, b.y + m * 5 + 4);
        ctx.lineTo(b.x + b.w, b.y + m * 5 + 4);
        ctx.stroke();
      }
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(b.x + 3, b.y + 4, 2, 2);
      ctx.fillRect(b.x + b.w / 2 + 5, b.y + 4, 2, 2);
      break;
    case 3: // Frankenspore
      ctx.fillStyle = '#558855';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.fillStyle = '#447744';
      ctx.fillRect(b.x + 4, b.y + 4, b.w - 8, 10);
      // Bolts
      ctx.fillStyle = '#888';
      ctx.fillRect(b.x - 3, b.y + 8, 6, 4);
      ctx.fillRect(b.x + b.w - 3, b.y + 8, 6, 4);
      // Flat top
      ctx.fillStyle = '#446644';
      ctx.fillRect(b.x + 2, b.y - 4, b.w - 4, 6);
      // Igor companion
      ctx.fillStyle = '#884444';
      ctx.beginPath();
      ctx.arc(b.x + b.dir * 30, b.y - 10, 6, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 4: // Reaper
      ctx.fillStyle = '#222';
      // Cloak
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2, b.y);
      ctx.lineTo(b.x - 4, b.y + b.h);
      ctx.lineTo(b.x + b.w + 4, b.y + b.h);
      ctx.fill();
      // Hood
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2, b.y + 8, 10, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(b.x + 9, b.y + 6, 3, 3);
      ctx.fillRect(b.x + 15, b.y + 6, 3, 3);
      // Scythe
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x + b.w + 5, b.y + 5);
      ctx.lineTo(b.x + b.w + 5, b.y + b.h - 5);
      ctx.stroke();
      ctx.fillStyle = '#aaa';
      ctx.beginPath();
      ctx.arc(b.x + b.w + 5, b.y + 5, 8, Math.PI * 0.8, Math.PI * 1.8);
      ctx.fill();
      break;
    case 5: // Spore Lord
      var phase2 = b.hp <= b.maxHp / 2;
      if (!phase2) {
        // Phase 1 - regal figure
        ctx.fillStyle = '#440022';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = '#660033';
        ctx.fillRect(b.x + 4, b.y + 4, b.w - 8, b.h - 8);
        // Cape
        ctx.fillStyle = '#220011';
        ctx.beginPath();
        ctx.moveTo(b.x, b.y + 8);
        ctx.lineTo(b.x - 8, b.y + b.h + 4);
        ctx.lineTo(b.x + b.w + 8, b.y + b.h + 4);
        ctx.lineTo(b.x + b.w, b.y + 8);
        ctx.fill();
        // Crown
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(b.x + 4, b.y - 6, b.w - 8, 6);
        ctx.fillRect(b.x + 6, b.y - 10, 3, 4);
        ctx.fillRect(b.x + 13, b.y - 10, 3, 4);
        ctx.fillRect(b.x + 20, b.y - 10, 3, 4);
      } else {
        // Phase 2 - true mushroom horror
        ctx.fillStyle = '#880044';
        ctx.beginPath();
        ctx.ellipse(b.x + b.w / 2, b.y + b.h * 0.6, b.w / 2 + 6, b.h / 2 + 4, 0, 0, Math.PI * 2);
        ctx.fill();
        // Mushroom cap - huge
        ctx.fillStyle = '#cc0044';
        ctx.beginPath();
        ctx.ellipse(b.x + b.w / 2, b.y + 8, b.w / 2 + 10, 14, 0, Math.PI, 0);
        ctx.fill();
        // Spots
        ctx.fillStyle = '#ff4488';
        ctx.beginPath(); ctx.arc(b.x + 8, b.y + 2, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(b.x + b.w - 8, b.y + 4, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(b.x + b.w / 2, b.y - 2, 2, 0, Math.PI * 2); ctx.fill();
        // Tendrils
        ctx.strokeStyle = '#660022';
        ctx.lineWidth = 2;
        for (var t = 0; t < 4; t++) {
          ctx.beginPath();
          ctx.moveTo(b.x + b.w / 2, b.y + b.h);
          ctx.quadraticCurveTo(b.x + b.w / 2 + Math.sin(b.timer * 2 + t * 2) * 20, b.y + b.h + 10, b.x + b.w / 2 + (t - 1.5) * 18, b.y + b.h + 20);
          ctx.stroke();
        }
      }
      // Eyes always glowing
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2 - 5, b.y + 14, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2 + 5, b.y + 14, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
  ctx.globalAlpha = 1;
}

function drawProjectile(p) {
  switch(p.type) {
    case 'dagger':
      ctx.fillStyle = '#ccccdd';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(p.x + (p.vx > 0 ? p.w - 2 : 0), p.y, 2, p.h);
      break;
    case 'axe':
    case 'enemyaxe':
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.spin || 0);
      ctx.fillStyle = p.friendly ? '#888' : '#996633';
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.fillStyle = p.friendly ? '#aaa' : '#cc8844';
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w / 2, p.h / 2);
      ctx.restore();
      break;
    case 'holyspore':
      ctx.fillStyle = '#88ff88';
      ctx.globalAlpha = 0.7 + Math.sin(frame * 0.2) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 5 + Math.sin(frame * 0.15) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#aaffaa';
      ctx.beginPath();
      ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'bone':
    case 'enemybone':
      ctx.fillStyle = '#ddccaa';
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(frame * 0.2);
      ctx.fillRect(-3, -1, 6, 2);
      ctx.fillRect(-1, -3, 2, 6);
      ctx.restore();
      break;
    case 'fireball':
      ctx.fillStyle = '#ff6622';
      ctx.beginPath();
      ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(p.x + p.w / 2, p.y + p.h / 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

function drawHUD() {
  var barH = 28;
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, barH);

  // Stage name
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('STAGE ' + (stage + 1) + ': ' + STAGE_NAMES[stage], 4, 10);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 14, 80, 8);
  var hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : (hpPct > 0.25 ? '#ccaa22' : '#cc2222');
  ctx.fillRect(4, 14, 80 * hpPct, 8);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(4, 14, 80, 8);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.fillText(player.hp + '/' + player.maxHp, 36, 21);

  // Hearts
  ctx.fillStyle = '#ff4488';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  drawHeart(GW / 2 - 10, 8, 4);
  ctx.fillStyle = '#fff';
  ctx.fillText(hearts, GW / 2 + 6, 14);

  // Sub weapon
  if (subWeapon >= 0) {
    ctx.fillStyle = '#88ddff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(SUB_NAMES[subWeapon], GW / 2, 24);
  }

  // Whip level
  ctx.fillStyle = '#ffdd44';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('WHIP:' + (whipLevel + 1), GW - 60, 10);

  // Score
  ctx.fillStyle = '#fff';
  ctx.fillText(score, GW - 4, 22);

  // Lives
  ctx.fillStyle = '#44dd88';
  for (var i = 0; i < lives; i++) {
    ctx.beginPath();
    ctx.arc(GW - 50 + i * 12, 17, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boss HP bar
  if (bossActive && boss && boss.active) {
    var bossBarW = 120;
    var bossBarX = (GW - bossBarW) / 2;
    var bossBarY = GH - 20;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(bossBarX - 2, bossBarY - 2, bossBarW + 4, 12);
    ctx.fillStyle = '#333';
    ctx.fillRect(bossBarX, bossBarY, bossBarW, 8);
    ctx.fillStyle = '#cc2222';
    ctx.fillRect(bossBarX, bossBarY, bossBarW * (boss.hp / boss.maxHp), 8);
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, GW / 2, bossBarY - 4);
  }
}

function drawTitleScreen() {
  var colors = STAGE_COLORS[0];
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Gothic background
  ctx.strokeStyle = '#221122';
  ctx.lineWidth = 2;
  for (var i = 0; i < 6; i++) {
    var ax = 30 + i * 70;
    ctx.beginPath();
    ctx.arc(ax, 80, 28, Math.PI, 0);
    ctx.lineTo(ax + 28, 250);
    ctx.lineTo(ax - 28, 250);
    ctx.closePath();
    ctx.stroke();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE KNIGHT', GW / 2 + 2, 72);
  ctx.fillStyle = '#cc2244';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE KNIGHT', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Arcade Tale', GW / 2, 90);

  // Knight sprite in center
  ctx.fillStyle = '#4466aa';
  ctx.fillRect(GW / 2 - 6, 120, 12, 24);
  ctx.fillStyle = '#cc4444';
  ctx.beginPath();
  ctx.ellipse(GW / 2, 117, 7, 6, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#ff6666';
  ctx.beginPath(); ctx.arc(GW / 2 - 2, 114, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(GW / 2 + 3, 116, 1.5, 0, Math.PI * 2); ctx.fill();
  // Whip
  ctx.strokeStyle = '#aa8866';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(GW / 2 + 6, 130);
  ctx.quadraticCurveTo(GW / 2 + 30, 125, GW / 2 + 45, 135);
  ctx.stroke();

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS: Move   Z: Jump   X: Whip', GW / 2, 180);
  ctx.fillText('UP+X: Sub-weapon   DOWN: Crouch', GW / 2, 195);
  ctx.fillText('UP/DOWN on stairs to climb', GW / 2, 210);

  // Stage list
  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  for (var i = 0; i < 6; i++) {
    ctx.fillText((i + 1) + '. ' + STAGE_NAMES[i], GW / 2, 230 + i * 10);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0612';
  ctx.fillRect(0, 0, GW, GH);

  // Particles celebration
  if (frame % 10 === 0) {
    TAS.particles.spawn(Math.random() * GW, GH, '#ffdd44', 3, 3, { gravity: -1 });
    TAS.particles.spawn(Math.random() * GW, GH, '#44ddff', 3, 3, { gravity: -1 });
  }

  ctx.save();
  TAS.fx.applyShake();
  TAS.particles.draw();
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#88ff88';
  ctx.font = '12px monospace';
  ctx.fillText('The Spore Lord is vanquished!', GW / 2, 100);
  ctx.fillText('The kingdom is free.', GW / 2, 120);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score, GW / 2, 160);

  if (score >= highScore && score > 0) {
    var p2 = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = p2;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 185);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW / 2, 185);
  }

  var pulse3 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse3;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
