        if (target) {
          ctx.fillStyle = 'rgba(255, 80, 80, ' + alpha + ')';
        } else {
          ctx.fillStyle = 'rgba(80, 200, 80, ' + alpha + ')';
        }
        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
      }

      // Hover highlight
      if (hoverTile.row === r && hoverTile.col === c) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }

      // Keyboard cursor
      if (boardCursorVisible && boardCursor.row === r && boardCursor.col === c) {
        var cursorAlpha = Math.sin(frame * 0.1) * 0.2 + 0.5;
        ctx.strokeStyle = 'rgba(255, 255, 100, ' + cursorAlpha + ')';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Zone fog overlay
  ctx.fillStyle = zone.fogColor;
  ctx.fillRect(BOARD_OFFSET_X, BOARD_OFFSET_Y, BOARD_SIZE * TILE_SIZE, BOARD_SIZE * TILE_SIZE);

  // Spore rain ambient
  drawSporeRain();

  // Draw units
  for (var ur = 0; ur < BOARD_SIZE; ur++) {
    for (var uc = 0; uc < BOARD_SIZE; uc++) {
      var unit = board[ur][uc];
      if (unit) {
        var ux = BOARD_OFFSET_X + uc * TILE_SIZE + TILE_SIZE / 2;
        var uy = BOARD_OFFSET_Y + ur * TILE_SIZE + TILE_SIZE / 2;
        var isSelected = selectedUnit && selectedUnit.row === ur && selectedUnit.col === uc;
        // Boss unit glow
        if (unit.isBoss) {
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ff4400';
        }
        drawUnit(ux, uy, unit, TILE_SIZE, isSelected);
        ctx.shadowBlur = 0;
      }
    }
  }

  TAS.particles.draw();
  drawScorePopups();

  // Info panel (right side)
  var panelX = BOARD_OFFSET_X + BOARD_SIZE * TILE_SIZE + 12;

  // Zone name
  ctx.fillStyle = zone.accent;
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(zone.name, panelX, 18);

  ctx.fillStyle = currentTeam === LIGHT ? '#a855f7' : '#38d973';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(currentTeam === LIGHT ? 'GARDEN TURN' : 'HORDE TURN', panelX, 35);

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Turn: ' + turnCount, panelX, 48);
  ctx.fillText(['Easy','Normal','Hard'][difficulty], panelX + 50, 48);

  // Score display
  ctx.fillStyle = '#ffdd44';
  ctx.font = '9px monospace';
  ctx.fillText('Score: ' + totalScore, panelX, 60);

  if (selectedUnit) {
    var selUnit = board[selectedUnit.row][selectedUnit.col];
    if (selUnit) {
      var selDef = UNIT_DEFS[selUnit.type];
      var selName = selUnit.team === LIGHT ? selDef.name : DARK_NAMES[selUnit.type];
      if (selUnit.isBoss) selName = bossUnit.name;
      ctx.fillStyle = selUnit.team === LIGHT ? '#a855f7' : '#38d973';
      ctx.font = 'bold 10px monospace';
      ctx.fillText(selName, panelX, 78);
      ctx.fillStyle = '#aaa';
      ctx.font = '9px monospace';
      ctx.fillText('HP: ' + selUnit.hp + '/' + selUnit.maxHp, panelX, 91);
      ctx.fillText('ATK: ' + selDef.damage, panelX, 103);
      ctx.fillText('SPD: ' + selDef.speed.toFixed(1), panelX, 115);
      ctx.fillText('Type: ' + selDef.attack, panelX, 127);
      ctx.fillText('Move: ' + selDef.move, panelX, 139);
    }
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = '8px monospace';
  ctx.fillText('* = Growth Node', panelX, 156);
  ctx.fillStyle = '#556688';
  ctx.fillText('~ = Shifting Soil', panelX, 168);

  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  ctx.fillText('Capture Elder or', panelX, 186);
  ctx.fillText('hold 5 Growth Nodes', panelX, 197);

  if (!twoPlayer) {
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.fillText('Level: ' + campaignLevel + '/10', panelX, 215);
    for (var ci = 0; ci < 10; ci++) {
      ctx.fillStyle = ci < campaignLevel ? '#44dd88' : '#333';
      ctx.fillRect(panelX + ci * 12, 222, 9, 6);
      // Boss level markers
      if ((ci + 1) % 5 === 0 && ci > 0) {
        ctx.strokeStyle = '#ff6622';
        ctx.lineWidth = 1;
        ctx.strokeRect(panelX + ci * 12 - 1, 221, 11, 8);
      }
    }
  }

  var lightPower = 0, darkPower = 0;
  for (var psi = 0; psi < POWER_SQUARES.length; psi++) {
    var psU = board[POWER_SQUARES[psi][0]][POWER_SQUARES[psi][1]];
    if (psU) {
      if (psU.team === LIGHT) lightPower++;
      else darkPower++;
    }
  }
  ctx.fillStyle = '#a855f7';
  ctx.font = '9px monospace';
  ctx.fillText('G:' + lightPower, panelX, 250);
  ctx.fillStyle = '#38d973';
  ctx.fillText('H:' + darkPower, panelX + 30, 250);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('/5', panelX + 55, 250);

  // Boss HP bar if boss level
  if (bossActive && bossUnit) {
    var bossOnBoard = false;
    for (var br = 0; br < BOARD_SIZE; br++) {
      for (var bc = 0; bc < BOARD_SIZE; bc++) {
        if (board[br][bc] && board[br][bc].isBoss) {
          bossOnBoard = true;
          var bhpPct = board[br][bc].hp / board[br][bc].maxHp;
          ctx.fillStyle = '#ff4444';
          ctx.font = 'bold 8px monospace';
          ctx.fillText('BOSS', panelX, 268);
          ctx.fillStyle = '#333';
          ctx.fillRect(panelX, 272, 80, 6);
          ctx.fillStyle = bhpPct > 0.5 ? '#ff6622' : bhpPct > 0.25 ? '#ff4444' : '#ff0000';
          ctx.fillRect(panelX, 272, 80 * bhpPct, 6);
        }
      }
    }
  }

  if (!('ontouchstart' in window)) {
    ctx.fillStyle = '#444';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Arrows=Move  W/Z=Select  S/X=Cancel  ESC=Back', GW / 2, GH - 5);
    ctx.textAlign = 'left';
  }

  if (boardMessageTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(BOARD_OFFSET_X, GH / 2 - 15, BOARD_SIZE * TILE_SIZE, 30);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boardMessage, BOARD_OFFSET_X + BOARD_SIZE * TILE_SIZE / 2, GH / 2 + 4);
    ctx.textAlign = 'left';
  }
}

function drawCombatUnit(fighter, size) {
  var unit = { team: fighter.team, type: fighter.type, hp: fighter.hp, maxHp: fighter.maxHp };
  if (fighter.invuln > 0 && Math.floor(fighter.invuln * 20) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }
  var bob = Math.sin(fighter.animFrame) * 2;

  // Boss units drawn larger
  if (fighter.isBoss) {
    size = Math.floor(size * 1.4);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff4400';
  }

  drawUnit(fighter.x + ARENA_X, fighter.y + ARENA_Y + bob, unit, size, false);
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawCombat() {
  var zone = getCurrentZone();
  ctx.fillStyle = zone.bg;
  ctx.fillRect(0, 0, GW, GH);

  ctx.strokeStyle = zone.gridColor;
  ctx.lineWidth = 2;
  ctx.strokeRect(ARENA_X - 2, ARENA_Y - 2, ARENA_W + 4, ARENA_H + 4);

  var tileIsLight = combat.tileColor === 'light';
  ctx.fillStyle = tileIsLight ? zone.tileLight : zone.tileDark;
  ctx.fillRect(ARENA_X, ARENA_Y, ARENA_W, ARENA_H);

  ctx.strokeStyle = zone.gridColor;
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx < ARENA_W; gx += 20) {
    ctx.beginPath();
    ctx.moveTo(ARENA_X + gx, ARENA_Y);
    ctx.lineTo(ARENA_X + gx, ARENA_Y + ARENA_H);
    ctx.stroke();
  }
  for (var gy = 0; gy < ARENA_H; gy += 20) {
    ctx.beginPath();
    ctx.moveTo(ARENA_X, ARENA_Y + gy);
    ctx.lineTo(ARENA_X + ARENA_W, ARENA_Y + gy);
    ctx.stroke();
  }

  // Zone fog
  ctx.fillStyle = zone.fogColor;
  ctx.fillRect(ARENA_X, ARENA_Y, ARENA_W, ARENA_H);

  // Draw goo trails
  drawGooTrails();

  // Draw hazards
  drawHazards();

  // Draw pickups
  drawCombatPickups();

  // Draw projectiles with trails
  for (var pi = 0; pi < combat.projectiles.length; pi++) {
    var p = combat.projectiles[pi];
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = p.color || '#fff';
    ctx.beginPath();
    ctx.arc(p.x + ARENA_X - p.vx * 0.02, p.y + ARENA_Y - p.vy * 0.02, (p.size || 3) * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(p.x + ARENA_X - p.vx * 0.04, p.y + ARENA_Y - p.vy * 0.04, (p.size || 3) * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = p.color || '#fff';
    ctx.shadowBlur = 6;
    ctx.shadowColor = p.color || '#fff';
    ctx.beginPath();
    ctx.arc(p.x + ARENA_X, p.y + ARENA_Y, p.size || 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Draw fighters
  drawCombatUnit(combat.attacker, 36);
  drawCombatUnit(combat.defender, 36);

  // Timer
  ctx.fillStyle = combat.timer < 5 ? '#ff4444' : '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(Math.max(0, combat.timer)) + 's', GW / 2, ARENA_Y - 8);

  // Attacker HP bar
  var aHpPct = Math.max(0, combat.attacker.hp / combat.attacker.maxHp);
  var aName = combat.attacker.team === LIGHT ?
    UNIT_DEFS[combat.attacker.type].name : DARK_NAMES[combat.attacker.type];
  if (combat.attacker.isBoss && bossUnit) aName = bossUnit.name;
  ctx.fillStyle = combat.attacker.team === LIGHT ? '#a855f7' : '#38d973';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(aName, ARENA_X, ARENA_Y + ARENA_H + 15);
  ctx.fillStyle = '#333';
  ctx.fillRect(ARENA_X, ARENA_Y + ARENA_H + 20, 100, 8);
  ctx.fillStyle = aHpPct > 0.5 ? '#44dd44' : aHpPct > 0.25 ? '#dddd44' : '#dd4444';
  ctx.fillRect(ARENA_X, ARENA_Y + ARENA_H + 20, 100 * aHpPct, 8);

  // Defender HP bar
  var dHpPct = Math.max(0, combat.defender.hp / combat.defender.maxHp);
  var dName = combat.defender.team === LIGHT ?
    UNIT_DEFS[combat.defender.type].name : DARK_NAMES[combat.defender.type];
  if (combat.defender.isBoss && bossUnit) dName = bossUnit.name;
  ctx.fillStyle = combat.defender.team === LIGHT ? '#a855f7' : '#38d973';
  ctx.textAlign = 'right';
  ctx.fillText(dName, ARENA_X + ARENA_W, ARENA_Y + ARENA_H + 15);
  ctx.fillStyle = '#333';
  ctx.fillRect(ARENA_X + ARENA_W - 100, ARENA_Y + ARENA_H + 20, 100, 8);
  ctx.fillStyle = dHpPct > 0.5 ? '#44dd44' : dHpPct > 0.25 ? '#dddd44' : '#dd4444';
  ctx.fillRect(ARENA_X + ARENA_W - 100, ARENA_Y + ARENA_H + 20, 100 * dHpPct, 8);

  // VS
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VS', GW / 2, ARENA_Y + ARENA_H + 25);

  // Controls hint
  if (!('ontouchstart' in window)) {
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Arrows/WASD=Move  W/Space/Z=Attack  X=Special', GW / 2, GH - 10);
  }

  // Terrain advantage label
  ctx.fillStyle = tileIsLight ? '#c084fc' : '#4ade80';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(tileIsLight ? 'GARDEN SOIL +25%' : 'FUNGAL GROUND +25%', ARENA_X, ARENA_Y - 8);

  // Score display
  ctx.fillStyle = '#ffdd44';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Score: ' + totalScore, ARENA_X + ARENA_W, ARENA_Y - 8);

  // Player indicator
  var playerFighter = combat[combat.playerControlled];
  ctx.fillStyle = '#44ff44';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOU', playerFighter.x + ARENA_X, playerFighter.y + ARENA_Y - 22);

  // Special cooldown indicator
  if (playerFighter.specialCooldown > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '7px monospace';
    ctx.fillText('X:' + Math.ceil(playerFighter.specialCooldown) + 's', playerFighter.x + ARENA_X, playerFighter.y + ARENA_Y + 22);
  } else {
    ctx.fillStyle = '#44ff44';
    ctx.font = '7px monospace';
    ctx.fillText('X:RDY', playerFighter.x + ARENA_X, playerFighter.y + ARENA_Y + 22);
  }

  // Score popups
  drawScorePopups();

  // Combat result overlay
  if (combat.concluded) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.font = 'bold 18px monospace';
    if (combatResult === 'attacker') {
      ctx.fillStyle = combat.attacker.team === LIGHT ? '#a855f7' : '#38d973';
      var wName = combat.attacker.team === LIGHT ?
        UNIT_DEFS[combat.attacker.type].name : DARK_NAMES[combat.attacker.type];
      ctx.fillText(wName + ' WINS!', GW / 2, GH / 2);
    } else if (combatResult === 'defender') {
      ctx.fillStyle = combat.defender.team === LIGHT ? '#a855f7' : '#38d973';
      var wName2 = combat.defender.team === LIGHT ?
        UNIT_DEFS[combat.defender.type].name : DARK_NAMES[combat.defender.type];
      ctx.fillText(wName2 + ' WINS!', GW / 2, GH / 2);
    } else {
      ctx.fillStyle = '#888';
      ctx.fillText('MUTUAL DESTRUCTION!', GW / 2, GH / 2);
    }
  }

  TAS.particles.draw();
}

// MfT splash screen
function drawSplash() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  var progress = 1.0 - (splashTimer / 2.0);
  var fadeIn = Math.min(1, progress * 3);
  var fadeOut = Math.max(0, 1 - (progress - 0.7) * 4);
  var alpha = Math.min(fadeIn, fadeOut);

  ctx.globalAlpha = alpha;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44dd88';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('MfT', GW / 2, GH / 2 - 10);

  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Meme for Trees', GW / 2, GH / 2 + 12);

  var lineW = 120 * alpha;
  ctx.strokeStyle = '#44dd88';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GW / 2 - lineW / 2, GH / 2 + 22);
  ctx.lineTo(GW / 2 + lineW / 2, GH / 2 + 22);
  ctx.stroke();

  if (frame % 4 === 0 && splashTimer > 0.5) {
    TAS.particles.spawn(
      GW / 2 + (Math.random() - 0.5) * 100,
      GH / 2 + (Math.random() - 0.5) * 40,
      Math.random() > 0.5 ? '#44dd88' : '#a855f7',
      1, 0.8, { size: 1, sizeVar: 1 }
    );
  }

  TAS.particles.draw();
  ctx.globalAlpha = 1;
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  // Animated background particles
  for (var bi = 0; bi < 30; bi++) {
    var bx = (frame * 0.3 + bi * 47) % GW;
    var by = (Math.sin(frame * 0.02 + bi) * 30 + 160);
    var balpha = Math.sin(frame * 0.03 + bi * 0.5) * 0.15 + 0.15;
    ctx.fillStyle = bi % 2 === 0 ?
      'rgba(168, 85, 247, ' + balpha + ')' :
      'rgba(56, 217, 115, ' + balpha + ')';
    ctx.beginPath();
    ctx.arc(bx, by, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floating spores
  for (var si = 0; si < 12; si++) {
    var sx = (frame * 0.5 + si * 73) % GW;
    var sy = (Math.sin(frame * 0.015 + si * 1.3) * 50 + GH / 2);
    var salpha = Math.sin(frame * 0.04 + si) * 0.1 + 0.12;
    ctx.fillStyle = 'rgba(68, 221, 136, ' + salpha + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN WARS', GW / 2 + 2, 42);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('GARDEN WARS', GW / 2, 40);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Baselings vs The Fungal Horde', GW / 2, 58);

  // Draw baseling vs dark wizard
  var leftUnit = { team: LIGHT, type: WIZARD, hp: 80, maxHp: 80 };
  var rightUnit = { team: DARK, type: WIZARD, hp: 80, maxHp: 80 };
  drawUnit(GW * 0.25, 90, leftUnit, 40, false);
  drawUnit(GW * 0.75, 90, rightUnit, 40, false);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VS', GW / 2, 95);

  // NES-style control instructions with dotted leaders
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  var ctrlX = GW / 2 - 80;
  var ctrlY = 118;
  ctx.fillStyle = '#44dd88';
  ctx.fillText('ARROWS', ctrlX, ctrlY);
  ctx.fillStyle = '#555';
  ctx.fillText(' ........... ', ctrlX + 42, ctrlY);
  ctx.fillStyle = '#aaa';
  ctx.fillText('Move', ctrlX + 120, ctrlY);

  ctx.fillStyle = '#44dd88';
  ctx.fillText('Z', ctrlX, ctrlY + 12);
  ctx.fillStyle = '#555';
  ctx.fillText(' ................ ', ctrlX + 6, ctrlY + 12);
  ctx.fillStyle = '#aaa';
  ctx.fillText('Attack', ctrlX + 120, ctrlY + 12);

  ctx.fillStyle = '#44dd88';
  ctx.fillText('X', ctrlX, ctrlY + 24);
  ctx.fillStyle = '#555';
  ctx.fillText(' ................ ', ctrlX + 6, ctrlY + 24);
  ctx.fillStyle = '#aaa';
  ctx.fillText('Special', ctrlX + 120, ctrlY + 24);

  ctx.textAlign = 'center';
  ctx.font = '12px monospace';
  for (var mi = 0; mi < MENU_ITEMS.length; mi++) {
    var my = 160 + mi * 28;
    var isMenuSelected = mi === menuSelection;
    var isDifficulty = mi >= 2;

    if (isDifficulty) {
      var isActive = (mi - 2) === difficulty;
      ctx.fillStyle = isActive ? '#44dd88' : (isMenuSelected ? '#aaa' : '#555');
      if (isMenuSelected) {
        ctx.fillStyle = '#ffdd44';
        ctx.fillText('> ', GW / 2 - 60, my + 4);
      }
      ctx.fillText((isActive ? '[*] ' : '[ ] ') + MENU_ITEMS[mi], GW / 2 - 40, my + 4);
    } else {
      ctx.fillStyle = isMenuSelected ? '#ffdd44' : '#aaa';
      if (isMenuSelected) {
        ctx.fillText('> ', GW / 2 - 60, my + 4);
      }
      ctx.fillText(MENU_ITEMS[mi], GW / 2 - 40, my + 4);
    }
  }

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Campaign Best: Level ' + campaignProgress + '/10', GW / 2, 290);

  // Champion name + 5 arcade stat bars + picker prompt (combat-only stat edge)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(selName + '   [C] SELECT BASELING', GW / 2, 302);
  drawTitleStatBars(GW / 2, 311, 180);
}

  ctx.font = 'bold 16px monospace';

  ctx.font = 'bold 10px monospace';

  ctx.fillText('Select a baseling and move it on the grid.', GW / 2, 72);
  ctx.fillText('Move onto an enemy to start combat.', GW / 2, 85);
  ctx.fillText('Capture the enemy Elder or hold all 5 Growth Nodes to win.', GW / 2, 98);

  // Combat section
  ctx.fillStyle = '#ff8844';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('-- COMBAT PHASE --', GW / 2, 120);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Move with ARROWS, attack with Z, special with X.', GW / 2, 137);
  ctx.fillText('Defeat the enemy before time runs out!', GW / 2, 150);
  ctx.fillText('Grab pickups for shields, damage, heals, and speed.', GW / 2, 163);

  // Fungal Horde enemies
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('-- FUNGAL HORDE --', GW / 2, 185);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Spore Crawlers leave slowing goo trails.', GW / 2, 202);
  ctx.fillText('Reactor Bugs fire fast plasma bolts.', GW / 2, 215);
  ctx.fillText('Mycelial Worms burrow and ambush.', GW / 2, 228);

  // Boss info
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('-- BOSS FIGHTS --', GW / 2, 250);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Every 5th level features a powerful boss.', GW / 2, 267);
  ctx.fillText('Bosses summon reinforcements as they weaken.', GW / 2, 280);

  // Draw small example units
  var exL = { team: LIGHT, type: WIZARD, hp: 80, maxHp: 80 };
  drawUnit(80, 195, exL, 20, false);
  var exS = { team: DARK, type: SPORE_CRAWLER, hp: 110, maxHp: 110 };
  drawUnit(80, 218, exS, 20, false);

  // Continue prompt
  var pp = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pp;
  ctx.fillStyle = '#ffdd44';
  ctx.font = '10px monospace';
  ctx.fillText('Press ENTER or click to start', GW / 2, 305);
  ctx.globalAlpha = 1;
}

function drawVictory() {
  var zone = getCurrentZone();
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = zone.bg;
  ctx.fillRect(0, 0, GW, GH);

  var winner = checkWinCondition();
  var isLight = winner === LIGHT;

  if (frame % 8 === 0) {
    TAS.particles.spawn(
      Math.random() * GW, Math.random() * GH * 0.5,
      isLight ? '#a855f7' : '#38d973', 3, 1.5
    );
  }

  // Zone-themed victory particles
  if (frame % 12 === 0) {
    TAS.particles.spawn(
      Math.random() * GW, Math.random() * GH,
      zone.accent, 2, 1
    );
  }

  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = isLight ? '#a855f7' : '#38d973';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(boardMessage, GW / 2, GH * 0.25);

  // Zone name
  ctx.fillStyle = zone.accent;
  ctx.font = '9px monospace';
  ctx.fillText(zone.name + ' Reclaimed', GW / 2, GH * 0.32);

  if (!twoPlayer) {
    if (isLight) {
      ctx.fillStyle = '#44dd88';
      ctx.font = '12px monospace';
      if (campaignLevel < 10) {
        ctx.fillText('Level ' + campaignLevel + '/10 Complete!', GW / 2, GH * 0.42);
        if (bossActive) {
          ctx.fillStyle = '#ff6622';
          ctx.fillText('BOSS DEFEATED!', GW / 2, GH * 0.50);
        }
        ctx.fillStyle = '#ffdd44';
        ctx.font = '10px monospace';
        var pp1 = Math.sin(frame * 0.05) * 0.3 + 0.7;
        ctx.globalAlpha = pp1;
        ctx.fillText('Press ENTER for next battle...', GW / 2, GH * 0.62);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillText('CAMPAIGN COMPLETE!', GW / 2, GH * 0.42);
        ctx.fillStyle = '#ffdd44';
        ctx.font = '10px monospace';
        ctx.fillText('You have mastered the Garden Grid!', GW / 2, GH * 0.52);
        var pp2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
        ctx.globalAlpha = pp2;
        ctx.fillText('Press ENTER to return', GW / 2, GH * 0.62);
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.fillStyle = '#cc4444';
      ctx.font = '12px monospace';
      ctx.fillText('DEFEATED', GW / 2, GH * 0.42);
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      var pp3 = Math.sin(frame * 0.05) * 0.3 + 0.7;
      ctx.globalAlpha = pp3;
      ctx.fillText('Press ENTER to return', GW / 2, GH * 0.6);
      ctx.globalAlpha = 1;
    }
  } else {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    var pp4 = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pp4;
    ctx.fillText('Press ENTER to return', GW / 2, GH * 0.55);
    ctx.globalAlpha = 1;
  }

  // Score display
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.globalAlpha = 1;
  ctx.fillText('SCORE: ' + totalScore, GW / 2, GH * 0.75);

  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('Turns: ' + turnCount, GW / 2, GH * 0.82);

  drawScorePopups();
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'splash') {
    drawSplash();
    return;
  }

  if (state === 'tutorial') {
    drawTutorial();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'board') {
    ctx.save();
    TAS.fx.applyShake();
    drawBoard();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'combat') {
    ctx.save();
    TAS.fx.applyShake();
    drawCombat();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
</html>
