<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Garden Wars</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'SELECT', c: 'PICK' } });

// === BASELING STATS (BaselingPlayer.getMults — the single clamped source) ===
// Garden Wars is a board+action HYBRID: the stat edge lives in the real-time COMBAT duels
// (your LIGHT-team fighter's damage/speed/HP), which is the action skill layer. The
// board itself stays fair — bonus pieces are disabled (lives=0) and score isn't a stat.
// statB is synthesized from the five bounded multipliers; combat helpers read it directly.
// Single-player vs AI -> default band (0.8–1.6).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#0052FF', name: 'Baseling', icon: 'B' };
var picking = false;   // character-select overlay open
var selName = 'WIMMPLE';
function dnd(x) { return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = TAS.player.mults();
  statB.damage = m.damage;       // PWR -> combat damage (your team only)
  statB.speed = m.moveSpeed;     // SPD -> combat move speed (your team only)
  statB.hpMult = m.health;       // STA -> combat/board HP (your team only)
  statB.luck = m.luck;           // LCK -> combat pickup spawn bias
  statB.cooldown = 1;            // ability cooldown fixed/fair
  statB.scoreMult = 1;           // score is not a stat
  statB.lives = 0;               // no bonus board pieces — the board stays fair
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  selName = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  if (sel) statB.name = sel.charName;
}
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[garden-wars] player init failed:', e && e.message); });
}
// 5 canonical arcade stat bars centered at cx (display only).
function drawTitleStatBars(cx, topY, totalW) {
  if (!window.BaselingPlayer || !BaselingPlayer.getStats) return;
  var stats = BaselingPlayer.getStats();
  var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
  var bw = totalW / keys.length, x0 = cx - totalW / 2;
  ctx.font = '8px monospace';
  for (var i = 0; i < keys.length; i++) {
    var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
    ctx.fillStyle = mm.color; ctx.textAlign = 'center';
    ctx.fillText(mm.label, bx + bw / 2, topY);
    ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, topY + 3, bw - 6, 5);
    ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, topY + 3, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
  }
  ctx.textAlign = 'center';
}

// Board constants
var BOARD_SIZE = 9;
var TILE_SIZE = 30;
var BOARD_OFFSET_X = 15;
var BOARD_OFFSET_Y = 20;

// Combat arena constants
var ARENA_W = 280;
var ARENA_H = 200;
var ARENA_X = (GW - ARENA_W) / 2;
var ARENA_Y = (GH - ARENA_H) / 2 + 10;
var COMBAT_TIME = 15;

// Teams
var LIGHT = 0;
var DARK = 1;

// Unit types
var WIZARD = 0, VALKYRIE = 1, GOLEM = 2, ARCHER = 3;
var KNIGHT = 4, UNICORN = 5, DJINN = 6, PHOENIX = 7;
// New Tasern unit types
var SPORE_CRAWLER = 8, REACTOR_BUG = 9, MYCELIAL_WORM = 10;

// Unit definitions - STR scales damage via statB.damage, DEX scales speed via statB.speed
var UNIT_DEFS = [
  { name: 'Garden Elder',  hp: 80,  speed: 1.8, damage: 18, attack: 'magic',  range: 3, move: 'any', special: 'blink' },
  { name: 'Bunny Scout',  hp: 70,  speed: 2.5, damage: 15, attack: 'blast',  range: 5, move: 'diag', special: 'rush' },
  { name: 'Bear Champion', hp: 150, speed: 0.9, damage: 30, attack: 'melee',  range: 2, move: 'orth', special: 'stomp' },
  { name: 'Seed Slinger',  hp: 50,  speed: 2.2, damage: 12, attack: 'ranged', range: 4, move: 'any', special: 'volley' },
  { name: 'Puppy Knight',  hp: 100, speed: 1.5, damage: 22, attack: 'fire',   range: 0, move: 'L', special: 'breath' },
  { name: 'Deer Warden',   hp: 90,  speed: 2.0, damage: 16, attack: 'charge', range: 4, move: 'diag', special: 'heal' },
  { name: 'Trickster Fox',  hp: 65,  speed: 2.3, damage: 14, attack: 'copy',   range: 3, move: 'any', special: 'mimic' },
  { name: 'Bloom Sprite',  hp: 45,  speed: 3.0, damage: 10, attack: 'ranged', range: 5, move: 'any', special: 'revive' },
  // Tasern enemies
  { name: 'Spore Crawler', hp: 110, speed: 1.2, damage: 20, attack: 'spore', range: 3, move: 'orth', special: 'sporeBurst' },
  { name: 'Reactor Bug',   hp: 60,  speed: 2.8, damage: 14, attack: 'plasma', range: 4, move: 'any', special: 'overcharge' },
  { name: 'Mycelial Worm', hp: 130, speed: 0.7, damage: 25, attack: 'melee', range: 2, move: 'orth', special: 'burrow' }
];

var DARK_NAMES = ['Fungal Witch', 'Spore Banshee', 'Rot Troll', 'Thorn Shooter', 'Poison Drake', 'Mold Basilisk', 'Mimic Slime', 'Blight Imp', 'Spore Lord', 'Hive Drone', 'Root Terror'];

// Power square positions (center + 4 corners of inner area)
var POWER_SQUARES = [[4,4], [1,1], [1,7], [7,1], [7,7]];

// Shifting tiles (cycle light/dark each turn)
var SHIFTING_TILES = [[2,4],[4,2],[4,6],[6,4],[3,3],[3,5],[5,3],[5,5]];

// === ZONE SYSTEM - themed zones with distinct visuals ===
var ZONES = [
  { name: 'Sunlit Garden',     bg: '#0a1210', gridColor: '#1a3328', tileLight: '#1a2820', tileDark: '#0d1a15', accent: '#38d973', fogColor: 'rgba(40,180,100,0.03)' },
  { name: 'Compost Furnace',   bg: '#120a0a', gridColor: '#332218', tileLight: '#281a1a', tileDark: '#1a0d0d', accent: '#ff6622', fogColor: 'rgba(255,100,30,0.03)' },
  { name: 'Spore Hollows',     bg: '#0a0a18', gridColor: '#1a1833', tileLight: '#1a1a30', tileDark: '#0d0d1a', accent: '#a855f7', fogColor: 'rgba(168,85,247,0.03)' },
  { name: 'Blighted Thicket',  bg: '#10100a', gridColor: '#2a2818', tileLight: '#282518', tileDark: '#1a1a0d', accent: '#f4b41b', fogColor: 'rgba(244,180,27,0.03)' },
  { name: 'The Deep Roots',    bg: '#060612', gridColor: '#151535', tileLight: '#101028', tileDark: '#080815', accent: '#44aaff', fogColor: 'rgba(60,150,255,0.03)' }
];

// === COMBAT PICKUPS ===
var PICKUP_TYPES = [
  { name: 'Petal Shield',   color: '#a855f7', effect: 'shield',  duration: 3, icon: 'S' },
  { name: 'Compost Ember',  color: '#ff6622', effect: 'damage',  duration: 4, icon: 'R' },
  { name: 'Garden Nectar',  color: '#38d973', effect: 'heal',   amount: 25, icon: 'F' },
  { name: 'Root Rush',      color: '#44aaff', effect: 'speed',  duration: 3, icon: 'M' }
];

// === GAME STATE ===
var state = 'splash';
var splashTimer = 2.0;
var frame = 0;
var difficulty = 1;
var campaignLevel = 0;
var campaignProgress = loadProgress();
var twoPlayer = false;
var stateChangeDebounce = 0;
var totalScore = 0;
var showTutorial = true;
var tutorialTimer = 0;
var firstPlay = true;

// Board state
var board = [];
var selectedUnit = null;
var validMoves = [];
var currentTeam = LIGHT;
var turnCount = 0;
var boardMessage = '';
var boardMessageTimer = 0;
var aiTurnPending = false;
var aiTurnDelay = 0;

// Keyboard board cursor
var boardCursor = { row: 4, col: 4 };
var boardCursorVisible = false;

// Combat state
var combat = null;
var combatResult = null;
var combatReturnTimer = 0;

// Hover state
var hoverTile = { row: -1, col: -1 };

// Menu state
var menuSelection = 0;
var MENU_ITEMS = ['Campaign', '2-Player', 'Easy', 'Normal', 'Hard'];

// Score popups
var scorePopups = [];

// Zone hazards
var hazards = [];
var hazardTimer = 0;

// Goo trails (left behind by Spore Crawlers and Mycelial Worms)
var gooTrails = [];

// Spore rain particles (ambient in Spore Caverns zone)
var sporeRainParticles = [];

// Boss state
var bossActive = false;
var bossUnit = null;
var bossPhase = 0;
var bossHP = 0;
var bossMaxHP = 0;

// === HELPER FUNCTIONS ===
function loadProgress() {
  try { return parseInt(localStorage.getItem('garden_wars_campaign') || '0', 10); }
  catch(e) { console.warn('Failed to load progress:', e); return 0; }
}

function saveProgress(level) {
  try { localStorage.setItem('garden_wars_campaign', String(level)); }
  catch(e) { console.warn('Failed to save progress:', e); }
}

function getCurrentZone() {
  return ZONES[campaignLevel % ZONES.length];
}

function isPowerSquare(r, c) {
  for (var i = 0; i < POWER_SQUARES.length; i++) {
    if (POWER_SQUARES[i][0] === r && POWER_SQUARES[i][1] === c) return true;
  }
  return false;
}

function isShiftingTile(r, c) {
  for (var i = 0; i < SHIFTING_TILES.length; i++) {
    if (SHIFTING_TILES[i][0] === r && SHIFTING_TILES[i][1] === c) return true;
  }
  return false;
}

function getTileColor(r, c) {
  if (isShiftingTile(r, c)) {
    return (turnCount % 2 === 0) ? 'light' : 'dark';
  }
  return ((r + c) % 2 === 0) ? 'light' : 'dark';
}

// Score popup system - INT scales score via statB.scoreMult
function addScorePopup(x, y, points, color) {
  var scaledPoints = Math.floor(points * statB.scoreMult); // INT → score multiplier
  totalScore += scaledPoints;
  scorePopups.push({ x: x, y: y, text: '+' + scaledPoints, color: color || '#ffdd44', life: 1.2, vy: -40 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / 0.3);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';
}

// === HAZARD SYSTEM ===
function spawnHazard(type) {
  var h = { type: type, x: 0, y: 0, life: 0, radius: 0 };
  if (type === 'reactor_vent') {
    h.x = ARENA_X + 20 + Math.random() * (ARENA_W - 40);
    h.y = ARENA_Y + ARENA_H - 10;
    h.life = 2.0;
    h.radius = 15 + Math.random() * 10;
    h.vy = -30 - Math.random() * 20;
    h.damage = Math.floor(8 * statB.damage); // STR scales hazard damage for player-created hazards
  } else if (type === 'spore_rain') {
    h.x = ARENA_X + Math.random() * ARENA_W;
    h.y = ARENA_Y - 5;
    h.life = 1.5;
    h.radius = 4;
    h.vy = 60 + Math.random() * 40;
    h.damage = 5;
  } else if (type === 'goo_pool') {
    h.x = ARENA_X + 20 + Math.random() * (ARENA_W - 40);
    h.y = ARENA_Y + 20 + Math.random() * (ARENA_H - 40);
    h.life = 5.0;
    h.radius = 12 + Math.random() * 8;
    h.damage = 0;
    h.slowFactor = 0.5;
  }
  hazards.push(h);
}

function updateHazards(dt) {
  hazardTimer -= dt;
  if (hazardTimer <= 0) {
    var zone = getCurrentZone();
    if (zone.name === 'Compost Furnace') {
      spawnHazard('reactor_vent');
      hazardTimer = 1.5 + Math.random();
    } else if (zone.name === 'Spore Hollows') {
      spawnHazard('spore_rain');
      hazardTimer = 0.4 + Math.random() * 0.3;
    } else if (zone.name === 'Blighted Thicket') {
      spawnHazard('goo_pool');
      hazardTimer = 3.0 + Math.random() * 2;
    } else {
      hazardTimer = 2.0;
    }
  }

  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.life -= dt;
    if (h.vy) h.y += h.vy * dt;
    if (h.life <= 0 || h.y > ARENA_Y + ARENA_H + 20 || h.y < ARENA_Y - 30) {
      hazards.splice(i, 1);
      continue;
    }

    // Check collision with fighters
    if (combat && h.damage > 0) {
      var fighters = [combat.attacker, combat.defender];
      for (var fi = 0; fi < fighters.length; fi++) {
        var f = fighters[fi];
        var fdist = TAS.math.dist(h.x, h.y, f.x + ARENA_X, f.y + ARENA_Y);
        if (fdist < h.radius + 8 && f.invuln <= 0) {
          f.hp -= h.damage;
          f.invuln = 0.2;
          TAS.particles.spawn(f.x + ARENA_X, f.y + ARENA_Y, '#ff8800', 5, 1.5);
          if (h.type !== 'goo_pool') {
            hazards.splice(i, 1);
            break;
          }
        }
      }
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var alpha = Math.min(1, h.life / 0.5);
    ctx.globalAlpha = alpha * 0.7;
    if (h.type === 'reactor_vent') {
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8844';
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (h.type === 'spore_rain') {
      ctx.fillStyle = '#8844ff';
      ctx.beginPath();
      ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
      ctx.fill();
    } else if (h.type === 'goo_pool') {
      ctx.fillStyle = '#226633';
      ctx.beginPath();
      ctx.ellipse(h.x, h.y, h.radius * 1.3, h.radius * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#44dd88';
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.ellipse(h.x, h.y, h.radius * 0.8, h.radius * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// === COMBAT PICKUPS (spawned during combat) ===
var combatPickups = [];

function spawnCombatPickup() {
  // CHA → luck/drops: higher luck = more frequent pickups
  if (Math.random() > 0.3 * statB.luck) return; // statB.luck increases chance
  var type = PICKUP_TYPES[Math.floor(Math.random() * PICKUP_TYPES.length)];
  combatPickups.push({
    x: ARENA_X + 30 + Math.random() * (ARENA_W - 60),
    y: ARENA_Y + 30 + Math.random() * (ARENA_H - 60),
    type: type,
    life: 6.0,
    bobPhase: Math.random() * Math.PI * 2
  });
}

function updateCombatPickups(dt) {
  if (!combat || combat.concluded) return;

  for (var i = combatPickups.length - 1; i >= 0; i--) {
    var pk = combatPickups[i];
    pk.life -= dt;
    pk.bobPhase += dt * 3;
    if (pk.life <= 0) { combatPickups.splice(i, 1); continue; }

    // Check pickup by player-controlled fighter
    var player = combat[combat.playerControlled];
    var pdist = TAS.math.dist(pk.x, pk.y, player.x + ARENA_X, player.y + ARENA_Y);
    if (pdist < 18) {
      applyPickup(player, pk.type);
      addScorePopup(pk.x, pk.y, 50, pk.type.color);
      TAS.audio.playTone(600, 0.1, 'sine', 0.05, 900);
      TAS.particles.spawn(pk.x, pk.y, pk.type.color, 8, 2);
      combatPickups.splice(i, 1);
    }
  }
}

function applyPickup(fighter, type) {
  if (type.effect === 'shield') {
    fighter.invuln = type.duration * statB.cooldown; // WIS → shield duration scales with cooldown
  } else if (type.effect === 'damage') {
    fighter.damage = Math.floor(fighter.damage * 1.5 * statB.damage); // STR → boosted damage pickup
  } else if (type.effect === 'heal') {
    var healAmt = Math.floor(type.amount * statB.hpMult); // CON → heal amount
    fighter.hp = Math.min(fighter.maxHp, fighter.hp + healAmt);
  } else if (type.effect === 'speed') {
    fighter.speed *= 1.5 * statB.speed; // DEX → speed boost
  }
}

function drawCombatPickups() {
  for (var i = 0; i < combatPickups.length; i++) {
    var pk = combatPickups[i];
    var bob = Math.sin(pk.bobPhase) * 3;
    var alpha = pk.life < 1.5 ? pk.life / 1.5 : 1;
    ctx.globalAlpha = alpha;

    // Glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = pk.type.color;
    ctx.fillStyle = pk.type.color;
    ctx.beginPath();
    ctx.arc(pk.x, pk.y + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Icon letter
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pk.type.icon, pk.x, pk.y + bob + 3);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// === GOO TRAIL SYSTEM ===
function addGooTrail(x, y) {
  gooTrails.push({ x: x, y: y, life: 4.0, radius: 6 + Math.random() * 4 });
}

function updateGooTrails(dt) {
  for (var i = gooTrails.length - 1; i >= 0; i--) {
    gooTrails[i].life -= dt;
    if (gooTrails[i].life <= 0) gooTrails.splice(i, 1);
  }
}

function drawGooTrails() {
  for (var i = 0; i < gooTrails.length; i++) {
    var g = gooTrails[i];
    var alpha = Math.min(0.4, g.life / 4.0 * 0.4);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#226633';
    ctx.beginPath();
    ctx.ellipse(g.x, g.y, g.radius, g.radius * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// === SPORE RAIN AMBIENT ===
function updateSporeRain(dt) {
  var zone = getCurrentZone();
  if (state === 'board' && zone.name === 'Spore Hollows') {
    if (Math.random() < 0.3) {
      sporeRainParticles.push({
        x: BOARD_OFFSET_X + Math.random() * (BOARD_SIZE * TILE_SIZE),
        y: BOARD_OFFSET_Y - 5,
        vy: 20 + Math.random() * 15,
        life: 3.0,
        size: 1 + Math.random()
      });
    }
  }
  for (var i = sporeRainParticles.length - 1; i >= 0; i--) {
    var s = sporeRainParticles[i];
    s.y += s.vy * dt;
    s.life -= dt;
    if (s.life <= 0 || s.y > BOARD_OFFSET_Y + BOARD_SIZE * TILE_SIZE + 10) {
      sporeRainParticles.splice(i, 1);
    }
  }
}

function drawSporeRain() {
  for (var i = 0; i < sporeRainParticles.length; i++) {
    var s = sporeRainParticles[i];
    ctx.globalAlpha = Math.min(0.5, s.life / 1.0);
    ctx.fillStyle = '#8844ff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// === PARTICLE BURST for deaths/explosions ===
function deathExplosion(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = (Math.PI * 2 / count) * i;
    var speed = 40 + Math.random() * 60;
    TAS.particles.spawn(x + Math.cos(angle) * 5, y + Math.sin(angle) * 5, color, 2, 1.5);
  }
  // Secondary ring
  for (var j = 0; j < Math.floor(count / 2); j++) {
    TAS.particles.spawn(x + (Math.random() - 0.5) * 20, y + (Math.random() - 0.5) * 20,
      '#ffffff', 1, 0.8);
  }
}

// === SCREEN SHAKE HELPER ===
function impactShake(intensity) {
  TAS.fx.shake(intensity, 0.85);
}

// === BOARD INITIALIZATION ===
function initBoard() {
  board = [];
  for (var r = 0; r < BOARD_SIZE; r++) {
    board[r] = [];
    for (var c = 0; c < BOARD_SIZE; c++) {
      board[r][c] = null;
    }
  }

  // Check if this is a boss level (every 5th level starting at 5)
  bossActive = (campaignLevel > 0 && campaignLevel % 5 === 0);

  if (bossActive) {
    initBossBoard();
  } else {
    initNormalBoard();
  }

  selectedUnit = null;
  validMoves = [];
  currentTeam = LIGHT;
  turnCount = 0;
  boardMessage = '';
  boardMessageTimer = 0;
  aiTurnPending = false;
  aiTurnDelay = 0;
  boardCursor = { row: 4, col: 4 };
  hazards = [];
  hazardTimer = 1.0;
  combatPickups = [];
  gooTrails = [];
  sporeRainParticles = [];
}

function initNormalBoard() {
  bossUnit = null;
  bossPhase = 0;

  // Light side layout - CON → bonus HP via statB.hpMult
  var lightLayout = [ARCHER, KNIGHT, VALKYRIE, GOLEM, WIZARD, GOLEM, VALKYRIE, KNIGHT, ARCHER];
  var lightRow2 = [PHOENIX, UNICORN, DJINN, null, null, null, DJINN, UNICORN, PHOENIX];

  for (var c = 0; c < 9; c++) {
    if (lightLayout[c] !== undefined) {
      var def = UNIT_DEFS[lightLayout[c]];
      var bonusHP = Math.floor(def.hp * statB.hpMult); // CON → HP multiplier
      board[0][c] = { team: LIGHT, type: lightLayout[c], hp: bonusHP, maxHp: bonusHP, revived: false };
    }
    if (lightRow2[c] !== null && lightRow2[c] !== undefined) {
      var def2 = UNIT_DEFS[lightRow2[c]];
      var bonusHP2 = Math.floor(def2.hp * statB.hpMult); // CON → HP multiplier
      board[1][c] = { team: LIGHT, type: lightRow2[c], hp: bonusHP2, maxHp: bonusHP2, revived: false };
    }
  }

  // Determine if Tasern enemies should appear (campaign level 2+)
  var useTasernUnits = campaignLevel >= 2;
  var darkLayout, darkRow2;

  if (useTasernUnits) {
    darkLayout = [REACTOR_BUG, KNIGHT, SPORE_CRAWLER, MYCELIAL_WORM, WIZARD, MYCELIAL_WORM, SPORE_CRAWLER, KNIGHT, REACTOR_BUG];
    darkRow2 = [PHOENIX, REACTOR_BUG, DJINN, null, null, null, DJINN, REACTOR_BUG, PHOENIX];
  } else {
    darkLayout = [ARCHER, KNIGHT, VALKYRIE, GOLEM, WIZARD, GOLEM, VALKYRIE, KNIGHT, ARCHER];
    darkRow2 = [PHOENIX, UNICORN, DJINN, null, null, null, DJINN, UNICORN, PHOENIX];
  }

  for (var c2 = 0; c2 < 9; c2++) {
    if (darkLayout[c2] !== undefined) {
      var def3 = UNIT_DEFS[darkLayout[c2]];
      board[8][c2] = { team: DARK, type: darkLayout[c2], hp: def3.hp, maxHp: def3.hp, revived: false };
    }
    if (darkRow2[c2] !== null && darkRow2[c2] !== undefined) {
      var def4 = UNIT_DEFS[darkRow2[c2]];
      board[7][c2] = { team: DARK, type: darkRow2[c2], hp: def4.hp, maxHp: def4.hp, revived: false };
    }
  }

  // Bonus lives from CON via statB.lives
  if (statB.lives > 0) {
    // Place extra light phoenix units for bonus lives
    var livesPlaced = 0;
    var liveSlots = [[2,0],[2,8],[2,1],[2,7]];
    for (var li = 0; li < liveSlots.length && livesPlaced < statB.lives; li++) {
      var lr = liveSlots[li][0], lc = liveSlots[li][1];
      if (!board[lr][lc]) {
        var pDef = UNIT_DEFS[PHOENIX];
        var pHP = Math.floor(pDef.hp * statB.hpMult);
        board[lr][lc] = { team: LIGHT, type: PHOENIX, hp: pHP, maxHp: pHP, revived: false };
        livesPlaced++;
      }
    }
  }
}

// === BOSS SYSTEM ===
function initBossBoard() {
  var bossTypes = [
    { name: 'Blight Queen',    hp: 500, damage: 35, speed: 1.0, attack: 'spore', color: '#a855f7' },
    { name: 'Compost Goliath', hp: 600, damage: 30, speed: 0.6, attack: 'plasma', color: '#ff6622' },
    { name: 'Fungal Overlord', hp: 450, damage: 40, speed: 1.3, attack: 'magic', color: '#38d973' },
    { name: 'Root Colossus',   hp: 700, damage: 25, speed: 0.5, attack: 'melee', color: '#886622' },
    { name: 'Wild Yieldling',  hp: 550, damage: 45, speed: 1.1, attack: 'fire', color: '#ff44aa' }
  ];

  var bossIdx = Math.floor((campaignLevel / 5) - 1) % bossTypes.length;
  var bossDef = bossTypes[bossIdx];
  bossHP = bossDef.hp;
  bossMaxHP = bossDef.hp;
  bossPhase = 0;
  bossUnit = bossDef;

  // Place fewer light units for boss fight
  var lightLayout = [ARCHER, VALKYRIE, GOLEM, WIZARD, GOLEM, VALKYRIE, ARCHER];
  for (var c = 1; c < 8; c++) {
    if (lightLayout[c - 1] !== undefined) {
      var def = UNIT_DEFS[lightLayout[c - 1]];
      var bonusHP = Math.floor(def.hp * statB.hpMult);
      board[0][c] = { team: LIGHT, type: lightLayout[c - 1], hp: bonusHP, maxHp: bonusHP, revived: false };
    }
  }
  // Place boss as enhanced Wizard at center
  board[8][4] = { team: DARK, type: WIZARD, hp: bossHP, maxHp: bossMaxHP, revived: false, isBoss: true };
  // Boss minions
  board[7][2] = { team: DARK, type: SPORE_CRAWLER, hp: 150, maxHp: 150, revived: false };
  board[7][6] = { team: DARK, type: SPORE_CRAWLER, hp: 150, maxHp: 150, revived: false };
  board[8][1] = { team: DARK, type: REACTOR_BUG, hp: 80, maxHp: 80, revived: false };
  board[8][7] = { team: DARK, type: REACTOR_BUG, hp: 80, maxHp: 80, revived: false };

  // Boss spawns more minions at phase transitions
  boardMessage = 'BOSS: ' + bossDef.name + '!';
  boardMessageTimer = 3;
}

function checkBossPhase() {
  if (!bossActive || !bossUnit) return;
  // Find boss unit on board
  for (var r = 0; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      var u = board[r][c];
      if (u && u.isBoss) {
        var hpPct = u.hp / u.maxHp;
        if (hpPct < 0.66 && bossPhase < 1) {
          bossPhase = 1;
          boardMessage = bossUnit.name + ' ENRAGES!';
          boardMessageTimer = 2;
          // Spawn reinforcements
          spawnBossMinions();
          impactShake(6);
          TAS.fx.flash('#ff4400', 0.4);
        } else if (hpPct < 0.33 && bossPhase < 2) {
          bossPhase = 2;
          boardMessage = bossUnit.name + ' IS DESPERATE!';
          boardMessageTimer = 2;
          spawnBossMinions();
          impactShake(8);
          TAS.fx.flash('#ff0000', 0.5);
        }
        return;
      }
    }
  }
}

function spawnBossMinions() {
  var emptyDark = [];
  for (var r = 5; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      if (!board[r][c]) emptyDark.push({ r: r, c: c });
    }
  }
  // Spawn 2 minions
  for (var i = 0; i < 2 && emptyDark.length > 0; i++) {
    var idx = Math.floor(Math.random() * emptyDark.length);
    var pos = emptyDark.splice(idx, 1)[0];
    var mType = Math.random() > 0.5 ? SPORE_CRAWLER : REACTOR_BUG;
    var mDef = UNIT_DEFS[mType];
    board[pos.r][pos.c] = { team: DARK, type: mType, hp: mDef.hp, maxHp: mDef.hp, revived: false };
    var mx = BOARD_OFFSET_X + pos.c * TILE_SIZE + TILE_SIZE / 2;
    var my = BOARD_OFFSET_Y + pos.r * TILE_SIZE + TILE_SIZE / 2;
    TAS.particles.spawn(mx, my, '#ff4400', 10, 2);
  }
}

// === MOVEMENT LOGIC ===
function getValidMoves(row, col) {
  var unit = board[row][col];
  if (!unit) return [];
  var def = UNIT_DEFS[unit.type];
  var moves = [];
  var range = def.range;

  function inBounds(r, c) { return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE; }
  function canMoveTo(r, c) {
    if (!inBounds(r, c)) return false;
    var target = board[r][c];
    if (target && target.team === unit.team) return false;
    return true;
  }

  function addRay(dr, dc) {
    for (var i = 1; i <= range; i++) {
      var nr = row + dr * i, nc = col + dc * i;
      if (!inBounds(nr, nc)) break;
      var target = board[nr][nc];
      if (target) {
        if (target.team !== unit.team) moves.push({ row: nr, col: nc });
        break;
      }
      moves.push({ row: nr, col: nc });
    }
  }

  if (def.move === 'any' || def.move === 'adj') {
    for (var dr = -1; dr <= 1; dr++) {
      for (var dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        if (def.move === 'adj') {
          var nr = row + dr, nc = col + dc;
          if (canMoveTo(nr, nc)) moves.push({ row: nr, col: nc });
        } else {
          addRay(dr, dc);
        }
      }
    }
  } else if (def.move === 'diag') {
    addRay(-1, -1); addRay(-1, 1); addRay(1, -1); addRay(1, 1);
    var orthDirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (var oi = 0; oi < orthDirs.length; oi++) {
      var onr = row + orthDirs[oi][0], onc = col + orthDirs[oi][1];
      if (canMoveTo(onr, onc)) moves.push({ row: onr, col: onc });
    }
  } else if (def.move === 'orth') {
    addRay(-1, 0); addRay(1, 0); addRay(0, -1); addRay(0, 1);
    var diagDirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
    for (var di = 0; di < diagDirs.length; di++) {
      var dnr = row + diagDirs[di][0], dnc = col + diagDirs[di][1];
      if (canMoveTo(dnr, dnc)) moves.push({ row: dnr, col: dnc });
    }
  } else if (def.move === 'L') {
    var lMoves = [[-2,-1],[-2,1],[2,-1],[2,1],[-1,-2],[-1,2],[1,-2],[1,2]];
    for (var li = 0; li < lMoves.length; li++) {
      var lnr = row + lMoves[li][0], lnc = col + lMoves[li][1];
      if (canMoveTo(lnr, lnc)) moves.push({ row: lnr, col: lnc });
    }
    for (var kr = -1; kr <= 1; kr++) {
      for (var kc = -1; kc <= 1; kc++) {
        if (kr === 0 && kc === 0) continue;
        var knr = row + kr, knc = col + kc;
        if (canMoveTo(knr, knc)) moves.push({ row: knr, col: knc });
      }
    }
  }

  return moves;
}

// === POWER SQUARE HEALING ===
function applyPowerSquareHealing() {
  for (var i = 0; i < POWER_SQUARES.length; i++) {
    var pr = POWER_SQUARES[i][0], pc = POWER_SQUARES[i][1];
    var unit = board[pr][pc];
    if (unit) {
      unit.hp = Math.min(unit.maxHp, unit.hp + Math.floor(unit.maxHp * 0.1));
    }
  }
}

// === SHIFTING TILE HEALING ===
function applyShiftingTileHealing() {
  for (var i = 0; i < SHIFTING_TILES.length; i++) {
    var sr = SHIFTING_TILES[i][0], sc = SHIFTING_TILES[i][1];
    var unit = board[sr][sc];
    if (unit) {
      var tileColor = getTileColor(sr, sc);
      if ((unit.team === LIGHT && tileColor === 'light') || (unit.team === DARK && tileColor === 'dark')) {
        unit.hp = Math.min(unit.maxHp, unit.hp + Math.floor(unit.maxHp * 0.05));
      }
    }
  }
}

// === WIN CONDITION CHECK ===
function checkWinCondition() {
  var lightKing = false, darkKing = false;
  var lightPowerCount = 0, darkPowerCount = 0;

  for (var r = 0; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      var unit = board[r][c];
      if (unit) {
        if (unit.team === LIGHT && unit.type === WIZARD) lightKing = true;
        if (unit.team === DARK && unit.type === WIZARD) darkKing = true;
      }
    }
  }

  for (var i = 0; i < POWER_SQUARES.length; i++) {
    var pr = POWER_SQUARES[i][0], pc = POWER_SQUARES[i][1];
    var punit = board[pr][pc];
    if (punit) {
      if (punit.team === LIGHT) lightPowerCount++;
      if (punit.team === DARK) darkPowerCount++;
    }
  }

  if (!darkKing || lightPowerCount === 5) return LIGHT;
  if (!lightKing || darkPowerCount === 5) return DARK;
  return -1;
}

// === COMBAT SYSTEM ===
function initCombat(attackerRow, attackerCol, defenderRow, defenderCol) {
  var attacker = board[attackerRow][attackerCol];
  var defender = board[defenderRow][defenderCol];
  var aDef = UNIT_DEFS[attacker.type];
  var dDef = UNIT_DEFS[defender.type];

  var tileColor = getTileColor(defenderRow, defenderCol);
  var aBonus = 1.0, dBonus = 1.0;
  if (tileColor === 'light' && attacker.team === LIGHT) aBonus = 1.25;
  if (tileColor === 'dark' && attacker.team === DARK) aBonus = 1.25;
  if (tileColor === 'light' && defender.team === LIGHT) dBonus = 1.25;
  if (tileColor === 'dark' && defender.team === DARK) dBonus = 1.25;

  // STR → damage, DEX → speed, CON → HP for player's team
  var aHpMult = attacker.team === LIGHT ? statB.hpMult : 1;
  var aDmgMult = attacker.team === LIGHT ? statB.damage : 1;
  var aSpdMult = attacker.team === LIGHT ? statB.speed : 1;
  var dHpMult = defender.team === LIGHT ? statB.hpMult : 1;
  var dDmgMult = defender.team === LIGHT ? statB.damage : 1;
  var dSpdMult = defender.team === LIGHT ? statB.speed : 1;

  combat = {
    attacker: {
      x: ARENA_W * 0.25, y: ARENA_H * 0.5,
      vx: 0, vy: 0,
      hp: Math.floor(attacker.hp * aBonus), maxHp: Math.floor(attacker.maxHp * aBonus),
      type: attacker.type, team: attacker.team,
      speed: aDef.speed * 60 * aSpdMult, // DEX → movement speed
      damage: Math.floor(aDef.damage * aDmgMult), // STR → attack damage
      attackType: aDef.attack,
      special: aDef.special,
      cooldown: 0,
      specialCooldown: 0,
      revived: attacker.revived,
      facing: 1,
      animFrame: 0,
      invuln: 0,
      isBoss: attacker.isBoss || false,
      gooTimer: 0
    },
    defender: {
      x: ARENA_W * 0.75, y: ARENA_H * 0.5,
      vx: 0, vy: 0,
      hp: Math.floor(defender.hp * dBonus), maxHp: Math.floor(defender.maxHp * dBonus),
      type: defender.type, team: defender.team,
      speed: dDef.speed * 60 * dSpdMult, // DEX → movement speed
      damage: Math.floor(dDef.damage * dDmgMult), // STR → attack damage
      attackType: dDef.attack,
      special: dDef.special,
      cooldown: 0,
      specialCooldown: 0,
      revived: defender.revived,
      facing: -1,
      animFrame: 0,
      invuln: 0,
      isBoss: defender.isBoss || false,
      gooTimer: 0
    },
    timer: COMBAT_TIME,
    projectiles: [],
    effects: [],
    tileColor: tileColor,
    attackerPos: { row: attackerRow, col: attackerCol },
    defenderPos: { row: defenderRow, col: defenderCol },
    playerControlled: attacker.team === currentTeam ? 'attacker' : 'defender',
    concluded: false,
    pickupTimer: 4.0
  };

  if (twoPlayer) {
    combat.playerControlled = 'attacker';
  }

  combatResult = null;
  combatReturnTimer = 0;
  state = 'combat';
  combatPickups = [];
  gooTrails = [];
  hazards = [];
  hazardTimer = 1.0;
  TAS.particles.clear();
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.08, 400);
}

function updateCombat(dt) {
  if (combat.concluded) {
    combatReturnTimer -= dt;
    if (combatReturnTimer <= 0) {
      state = 'board';
      combat = null;
      TAS.particles.clear();
      endTurn();
    }
    return;
  }

  combat.timer -= dt;

  if (combat.timer <= 0) {
    concludeCombat();
    return;
  }

  // Pickup spawning timer
  combat.pickupTimer -= dt;
  if (combat.pickupTimer <= 0) {
    spawnCombatPickup();
    combat.pickupTimer = 5.0 + Math.random() * 3;
  }

  var player = combat[combat.playerControlled];
  var enemy = combat.playerControlled === 'attacker' ? combat.defender : combat.attacker;

  // Update invulnerability timers
  player.invuln = Math.max(0, player.invuln - dt);
  enemy.invuln = Math.max(0, enemy.invuln - dt);

  // Goo trail timers
  if (player.gooTimer > 0) player.gooTimer -= dt;
  if (enemy.gooTimer > 0) enemy.gooTimer -= dt;

  // Player input
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var pdx = 0, pdy = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) pdx = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) pdx = 1;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) pdy = -1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) pdy = 1;

  // Check if player is in goo (slow movement)
  var playerSpeedMult = 1;
  for (var gi = 0; gi < gooTrails.length; gi++) {
    var gdist = TAS.math.dist(gooTrails[gi].x, gooTrails[gi].y, player.x + ARENA_X, player.y + ARENA_Y);
    if (gdist < gooTrails[gi].radius + 6) {
      playerSpeedMult = 0.5;
      break;
    }
  }

  player.x += pdx * player.speed * dt * playerSpeedMult;
  player.y += pdy * player.speed * dt * playerSpeedMult;
  player.x = TAS.math.clamp(player.x, 10, ARENA_W - 10);
  player.y = TAS.math.clamp(player.y, 10, ARENA_H - 10);
  if (pdx !== 0) player.facing = pdx;

  // Player attack - WIS → cooldown: lower cooldown with higher WIS
  if (keys['Space'] || keys['KeyZ'] || touch.a) {
    if (player.cooldown <= 0) {
      fireAttack(player, enemy);
      player.cooldown = 0.4 * statB.cooldown; // WIS → cooldown reduction
    }
  }

  // Player special attack (X key)
  if (keys['KeyX'] || touch.b) {
    if (player.specialCooldown <= 0) {
      fireSpecial(player, enemy);
      player.specialCooldown = 2.0 * statB.cooldown; // WIS → special cooldown
    }
  }

  // AI for enemy
  updateCombatAI(enemy, player, dt);

  // Spore Crawler / Mycelial Worm leave goo trails
  if (enemy.type === SPORE_CRAWLER || enemy.type === MYCELIAL_WORM) {
    if (enemy.gooTimer <= 0) {
      addGooTrail(enemy.x + ARENA_X, enemy.y + ARENA_Y);
      enemy.gooTimer = 0.5;
    }
  }

  // Update cooldowns
  player.cooldown = Math.max(0, player.cooldown - dt);
  enemy.cooldown = Math.max(0, enemy.cooldown - dt);
  player.specialCooldown = Math.max(0, player.specialCooldown - dt);
  enemy.specialCooldown = Math.max(0, enemy.specialCooldown - dt);
  player.animFrame += dt * 8;
  enemy.animFrame += dt * 8;

  // Update projectiles
  for (var i = combat.projectiles.length - 1; i >= 0; i--) {
    var p = combat.projectiles[i];

    if (p.homing) {
      var homingTarget = p.owner === 'attacker' ? combat.defender : combat.attacker;
      var toTargetAngle = TAS.math.angle(p.x, p.y, homingTarget.x, homingTarget.y);
      var currentAngle = Math.atan2(p.vy, p.vx);
      var angleDiff = toTargetAngle - currentAngle;
      while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
      while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
      currentAngle += angleDiff * 2.0 * dt;
      var spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      p.vx = Math.cos(currentAngle) * spd;
      p.vy = Math.sin(currentAngle) * spd;
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.life <= 0 || p.x < -20 || p.x > ARENA_W + 20 || p.y < -20 || p.y > ARENA_H + 20) {
      combat.projectiles.splice(i, 1);
      continue;
    }

    var hitTarget = p.owner === 'attacker' ? combat.defender : combat.attacker;
    if (TAS.math.dist(p.x, p.y, hitTarget.x, hitTarget.y) < 15) {
      if (hitTarget.invuln > 0) {
        continue;
      }
      hitTarget.hp -= p.damage;
      hitTarget.invuln = 0.15;
      combat.projectiles.splice(i, 1);
      TAS.particles.spawn(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y, p.owner === 'attacker' ? '#ff8844' : '#8844ff', 8, 2.5);
      TAS.audio.playTone(150, 0.1, 'square', 0.06);
      impactShake(3);
      TAS.fx.flash(p.owner === 'attacker' ? '#ff4400' : '#4400ff', 0.15);

      // Score for hitting enemy - INT → score via statB.scoreMult
      if (hitTarget === enemy) {
        addScorePopup(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y - 15, 10, '#ffdd44');
      }

      // Leave goo on spore projectile impact
      if (p.isSpore) {
        addGooTrail(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y);
      }

      if (hitTarget.hp <= 0) {
        if (hitTarget.type === PHOENIX && !hitTarget.revived) {
          hitTarget.hp = Math.floor(hitTarget.maxHp * 0.4);
          hitTarget.revived = true;
          hitTarget.invuln = 0.5;
          TAS.particles.spawn(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y, '#ffdd00', 15, 3);
          TAS.audio.playTone(600, 0.3, 'sine', 0.08, 800);
        } else {
          // Death explosion particles
          deathExplosion(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y,
            hitTarget.team === LIGHT ? '#a855f7' : '#38d973', 20);

          if (hitTarget === enemy) {
            addScorePopup(hitTarget.x + ARENA_X, hitTarget.y + ARENA_Y - 30, 100, '#44ff44');
          }
          concludeCombat();
          return;
        }
      }
    }
  }

  // Update effects
  for (var ei = combat.effects.length - 1; ei >= 0; ei--) {
    combat.effects[ei].life -= dt;
    if (combat.effects[ei].life <= 0) combat.effects.splice(ei, 1);
  }

  // Update combat sub-systems
  updateCombatPickups(dt);
  updateHazards(dt);
  updateGooTrails(dt);
  updateScorePopups(dt);
}

// === SPECIAL ATTACKS ===
function fireSpecial(attacker, target) {
  var owner = attacker === combat.attacker ? 'attacker' : 'defender';
  var angle = TAS.math.angle(attacker.x, attacker.y, target.x, target.y);
  var specialDamage = Math.floor(attacker.damage * 1.5 * statB.damage); // STR → special damage

  switch (attacker.special) {
    case 'blink':
      // Teleport behind enemy
      attacker.x = target.x - Math.cos(angle) * 40;
      attacker.y = target.y - Math.sin(angle) * 40;
      attacker.x = TAS.math.clamp(attacker.x, 10, ARENA_W - 10);
      attacker.y = TAS.math.clamp(attacker.y, 10, ARENA_H - 10);
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#c084fc', 12, 2);
      TAS.audio.playTone(800, 0.1, 'sine', 0.04, 1200);
      break;
    case 'rush':
      // Dash forward dealing damage in a line
      for (var ri = 0; ri < 5; ri++) {
        var ra = angle + (Math.random() - 0.5) * 0.5;
        combat.projectiles.push({
          x: attacker.x + ri * Math.cos(angle) * 10, y: attacker.y + ri * Math.sin(angle) * 10,
          vx: Math.cos(ra) * 300, vy: Math.sin(ra) * 300,
          damage: Math.floor(specialDamage * 0.4), owner: owner, life: 0.4, color: '#ff88cc', size: 3
        });
      }
      attacker.x += Math.cos(angle) * 50;
      attacker.y += Math.sin(angle) * 50;
      attacker.x = TAS.math.clamp(attacker.x, 10, ARENA_W - 10);
      attacker.y = TAS.math.clamp(attacker.y, 10, ARENA_H - 10);
      TAS.audio.playNoise(0.15, 0.07, 1500);
      impactShake(4);
      break;
    case 'stomp':
      // AOE around self
      var sd = TAS.math.dist(attacker.x, attacker.y, target.x, target.y);
      if (sd < 60 && target.invuln <= 0) {
        target.hp -= specialDamage;
        target.invuln = 0.4;
        impactShake(6);
        TAS.fx.flash('#ff8800', 0.3);
      }
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#ffaa00', 15, 3);
      TAS.audio.playTone(60, 0.3, 'sawtooth', 0.1);
      break;
    case 'volley':
      // Fire spread of arrows
      for (var vi = -3; vi <= 3; vi++) {
        var va = angle + vi * 0.15;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(va) * 280, vy: Math.sin(va) * 280,
          damage: Math.floor(specialDamage * 0.35), owner: owner, life: 0.8, color: '#ffdd44', size: 2
        });
      }
      TAS.audio.playTone(700, 0.12, 'square', 0.06, 400);
      break;
    case 'breath':
      // Fire cone
      for (var bi = -4; bi <= 4; bi++) {
        var ba = angle + bi * 0.15;
        var bspd = 120 + Math.abs(bi) * 15;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(ba) * bspd, vy: Math.sin(ba) * bspd,
          damage: Math.floor(specialDamage * 0.3), owner: owner, life: 0.8, color: '#ff4400', size: 5
        });
      }
      TAS.audio.playNoise(0.25, 0.08, 600);
      impactShake(3);
      break;
    case 'heal':
      var healAmt = Math.floor(30 * statB.hpMult); // CON → heal amount
      attacker.hp = Math.min(attacker.maxHp, attacker.hp + healAmt);
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#44ff88', 12, 2.5);
      TAS.audio.playTone(500, 0.15, 'sine', 0.06, 700);
      break;
    case 'mimic':
      // Copy target's attack type temporarily
      attacker.attackType = target.attackType;
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#aa88ff', 10, 2);
      TAS.audio.playTone(400, 0.12, 'sine', 0.05, 600);
      break;
    case 'revive':
      // Self heal burst
      attacker.hp = Math.min(attacker.maxHp, attacker.hp + Math.floor(attacker.maxHp * 0.3));
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#ffdd00', 15, 3);
      TAS.audio.playTone(600, 0.2, 'sine', 0.07, 900);
      break;
    case 'sporeBurst':
      // Spore Crawler: burst of spore projectiles in all directions
      for (var si = 0; si < 8; si++) {
        var sa = (Math.PI * 2 / 8) * si;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(sa) * 150, vy: Math.sin(sa) * 150,
          damage: Math.floor(specialDamage * 0.4), owner: owner, life: 1.0,
          color: '#44dd88', size: 4, isSpore: true
        });
      }
      TAS.audio.playNoise(0.2, 0.06, 400);
      break;
    case 'overcharge':
      // Reactor Bug: rapid fire burst
      for (var oi = 0; oi < 6; oi++) {
        var oa = angle + (Math.random() - 0.5) * 0.6;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(oa) * (250 + Math.random() * 50), vy: Math.sin(oa) * (250 + Math.random() * 50),
          damage: Math.floor(specialDamage * 0.25), owner: owner, life: 0.6,
          color: '#ff6622', size: 3
        });
      }
      TAS.audio.playTone(1000, 0.1, 'sawtooth', 0.06, 500);
      break;
    case 'burrow':
      // Mycelial Worm: burrow underground then pop up near enemy
      attacker.invuln = 1.0;
      attacker.x = target.x + (Math.random() - 0.5) * 30;
      attacker.y = target.y + (Math.random() - 0.5) * 30;
      attacker.x = TAS.math.clamp(attacker.x, 10, ARENA_W - 10);
      attacker.y = TAS.math.clamp(attacker.y, 10, ARENA_H - 10);
      if (TAS.math.dist(attacker.x, attacker.y, target.x, target.y) < 25 && target.invuln <= 0) {
        target.hp -= specialDamage;
        target.invuln = 0.3;
        impactShake(5);
      }
      TAS.particles.spawn(attacker.x + ARENA_X, attacker.y + ARENA_Y, '#886622', 12, 2);
      TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 200);
      break;
  }
}

function fireAttack(attacker, target) {
  var owner = attacker === combat.attacker ? 'attacker' : 'defender';
  var angle = TAS.math.angle(attacker.x, attacker.y, target.x, target.y);

  switch (attacker.attackType) {
    case 'magic': {
      var mspeed = 180;
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * mspeed, vy: Math.sin(angle) * mspeed,
        damage: attacker.damage, owner: owner, life: 1.5,
        color: attacker.team === LIGHT ? '#c084fc' : '#38d973', size: 5,
        homing: true
      });
      TAS.audio.playTone(440, 0.15, 'sine', 0.06, 880);
      break;
    }
    case 'blast': {
      for (var bi = -1; bi <= 1; bi++) {
        var ba = angle + bi * 0.3;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(ba) * 200, vy: Math.sin(ba) * 200,
          damage: Math.floor(attacker.damage * 0.7), owner: owner, life: 0.5, color: '#ff88cc', size: 4
        });
      }
      TAS.audio.playNoise(0.1, 0.06, 2000);
      break;
    }
    case 'melee': {
      var md = TAS.math.dist(attacker.x, attacker.y, target.x, target.y);
      if (md < 35) {
        if (target.invuln <= 0) {
          target.hp -= attacker.damage;
          target.invuln = 0.2;
          TAS.particles.spawn(target.x + ARENA_X, target.y + ARENA_Y, '#ffaa00', 10, 2.5);
          TAS.audio.playTone(80, 0.15, 'sawtooth', 0.08);
          impactShake(4);
          TAS.fx.flash('#ff8800', 0.2);
          if (target === (combat.playerControlled === 'attacker' ? combat.defender : combat.attacker)) {
            addScorePopup(target.x + ARENA_X, target.y + ARENA_Y - 15, 15, '#ffdd44');
          }
          if (target.hp <= 0 && target.type === PHOENIX && !target.revived) {
            target.hp = Math.floor(target.maxHp * 0.4);
            target.revived = true;
            target.invuln = 0.5;
          } else if (target.hp <= 0) {
            deathExplosion(target.x + ARENA_X, target.y + ARENA_Y,
              target.team === LIGHT ? '#a855f7' : '#38d973', 20);
            concludeCombat();
          }
        }
      } else {
        attacker.x += Math.cos(angle) * 20;
        attacker.y += Math.sin(angle) * 20;
      }
      break;
    }
    case 'ranged': {
      var rspeed = 250;
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * rspeed, vy: Math.sin(angle) * rspeed,
        damage: attacker.damage, owner: owner, life: 1.2, color: '#ffdd44', size: 3
      });
      TAS.audio.playTone(800, 0.08, 'square', 0.05, 400);
      break;
    }
    case 'fire': {
      for (var fi = -2; fi <= 2; fi++) {
        var fa = angle + fi * 0.2;
        var fspeed = 150 + Math.abs(fi) * 20;
        combat.projectiles.push({
          x: attacker.x, y: attacker.y,
          vx: Math.cos(fa) * fspeed, vy: Math.sin(fa) * fspeed,
          damage: Math.floor(attacker.damage * 0.5), owner: owner, life: 0.7, color: '#ff4400', size: 4
        });
      }
      TAS.audio.playNoise(0.2, 0.07, 800);
      break;
    }
    case 'charge': {
      var cspeed = 300;
      attacker.x += Math.cos(angle) * cspeed * 0.05;
      attacker.y += Math.sin(angle) * cspeed * 0.05;
      var cd = TAS.math.dist(attacker.x, attacker.y, target.x, target.y);
      if (cd < 25 && target.invuln <= 0) {
        target.hp -= attacker.damage;
        target.invuln = 0.2;
        TAS.particles.spawn(target.x + ARENA_X, target.y + ARENA_Y, '#44ffaa', 10, 3);
        TAS.audio.playTone(300, 0.15, 'triangle', 0.07);
        impactShake(3);
        if (target.hp <= 0 && target.type === PHOENIX && !target.revived) {
          target.hp = Math.floor(target.maxHp * 0.4);
          target.revived = true;
          target.invuln = 0.5;
        } else if (target.hp <= 0) {
          deathExplosion(target.x + ARENA_X, target.y + ARENA_Y,
            target.team === LIGHT ? '#a855f7' : '#38d973', 20);
          concludeCombat();
          return;
        }
      }
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * 220, vy: Math.sin(angle) * 220,
        damage: Math.floor(attacker.damage * 0.6), owner: owner, life: 0.6, color: '#44ff88', size: 5
      });
      TAS.audio.playTone(500, 0.1, 'triangle', 0.05, 200);
      break;
    }
    case 'copy': {
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * 200, vy: Math.sin(angle) * 200,
        damage: attacker.damage, owner: owner, life: 1.0, color: '#aa88ff', size: 4
      });
      TAS.audio.playTone(600, 0.12, 'sine', 0.05, 300);
      break;
    }
    // New Tasern attack types
    case 'spore': {
      // Slow homing spore projectile that leaves goo
      var sspeed = 140;
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * sspeed, vy: Math.sin(angle) * sspeed,
        damage: attacker.damage, owner: owner, life: 2.0,
        color: '#44dd88', size: 6, homing: true, isSpore: true
      });
      TAS.audio.playTone(200, 0.15, 'sine', 0.05, 100);
      break;
    }
    case 'plasma': {
      // Fast piercing plasma bolt
      var pspeed = 320;
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(angle) * pspeed, vy: Math.sin(angle) * pspeed,
        damage: attacker.damage, owner: owner, life: 0.8,
        color: '#ff6622', size: 4
      });
      // Secondary bolt
      var pa2 = angle + (Math.random() - 0.5) * 0.4;
      combat.projectiles.push({
        x: attacker.x, y: attacker.y,
        vx: Math.cos(pa2) * (pspeed * 0.8), vy: Math.sin(pa2) * (pspeed * 0.8),
        damage: Math.floor(attacker.damage * 0.5), owner: owner, life: 0.6,
        color: '#ffaa44', size: 3
      });
      TAS.audio.playTone(1200, 0.06, 'sawtooth', 0.04, 600);
      break;
    }
  }
}

function updateCombatAI(enemy, player, dt) {
  var diffMult = [0.4, 0.7, 1.0][difficulty];
  var d = TAS.math.dist(enemy.x, enemy.y, player.x, player.y);
  var aiAngle = TAS.math.angle(enemy.x, enemy.y, player.x, player.y);

  var moveAngle = aiAngle;
  if (enemy.attackType === 'melee') {
    moveAngle = aiAngle;
  } else if (enemy.attackType === 'ranged' || enemy.attackType === 'magic' || enemy.attackType === 'plasma') {
    if (d < 60) moveAngle = aiAngle + Math.PI;
    else if (d > 120) moveAngle = aiAngle;
    else moveAngle = aiAngle + Math.PI / 2;
  } else if (enemy.attackType === 'spore') {
    // Spore attackers try to stay at medium range
    if (d < 50) moveAngle = aiAngle + Math.PI;
    else if (d > 100) moveAngle = aiAngle;
    else moveAngle = aiAngle + Math.PI / 2 + Math.sin(frame * 0.04) * 0.5;
  } else {
    if (d < 40) moveAngle = aiAngle + Math.PI * 0.7;
    else moveAngle = aiAngle + Math.sin(frame * 0.03) * 0.8;
  }

  // Dodge incoming projectiles
  for (var pi = 0; pi < combat.projectiles.length; pi++) {
    var proj = combat.projectiles[pi];
    var projOwnerFighter = proj.owner === 'attacker' ? combat.attacker : combat.defender;
    if (projOwnerFighter === enemy) continue;
    var projDist = TAS.math.dist(proj.x, proj.y, enemy.x, enemy.y);
    if (projDist < 50) {
      var projAngle = Math.atan2(proj.vy, proj.vx);
      moveAngle = projAngle + Math.PI / 2 * (Math.random() > 0.5 ? 1 : -1);
      break;
    }
  }

  moveAngle += (Math.random() - 0.5) * (1.5 - diffMult);

  // Check goo slow for enemy too
  var enemySpeedMult = 1;
  for (var gi = 0; gi < gooTrails.length; gi++) {
    var gdist = TAS.math.dist(gooTrails[gi].x, gooTrails[gi].y, enemy.x + ARENA_X, enemy.y + ARENA_Y);
    if (gdist < gooTrails[gi].radius + 6) {
      enemySpeedMult = 0.5;
      break;
    }
  }

  enemy.x += Math.cos(moveAngle) * enemy.speed * dt * diffMult * enemySpeedMult;
  enemy.y += Math.sin(moveAngle) * enemy.speed * dt * diffMult * enemySpeedMult;
  enemy.x = TAS.math.clamp(enemy.x, 10, ARENA_W - 10);
  enemy.y = TAS.math.clamp(enemy.y, 10, ARENA_H - 10);

  if (Math.cos(aiAngle) > 0) enemy.facing = 1; else enemy.facing = -1;

  var attackChance = diffMult * 0.8;
  if (enemy.cooldown <= 0 && Math.random() < attackChance * dt * 3) {
    fireAttack(enemy, player);
    enemy.cooldown = 0.5 + (1 - diffMult) * 0.5;
  }

  // AI special attack usage
  if (enemy.specialCooldown <= 0 && Math.random() < diffMult * dt * 0.5) {
    fireSpecial(enemy, player);
    enemy.specialCooldown = 3.0 + (1 - diffMult) * 2;
  }
}

function concludeCombat() {
  if (combat.concluded) return;
  combat.concluded = true;

  var attacker = combat.attacker;
  var defender = combat.defender;

  var winner;
  if (attacker.hp <= 0 && defender.hp <= 0) {
    winner = null;
  } else if (attacker.hp <= 0) {
    winner = 'defender';
  } else if (defender.hp <= 0) {
    winner = 'attacker';
  } else {
    var aPct = attacker.hp / attacker.maxHp;
    var dPct = defender.hp / defender.maxHp;
    winner = aPct >= dPct ? 'attacker' : 'defender';
  }

  combatResult = winner;

  var aPos = combat.attackerPos;
  var dPos = combat.defenderPos;

  if (winner === 'attacker') {
    var aUnit = board[aPos.row][aPos.col];
    aUnit.hp = Math.max(1, Math.floor(attacker.hp / (attacker.maxHp / aUnit.maxHp)));
    aUnit.revived = attacker.revived;
    board[dPos.row][dPos.col] = aUnit;
    board[aPos.row][aPos.col] = null;
    TAS.audio.playMelody([[440,0.1],[550,0.1],[660,0.15]], 100);
    deathExplosion(GW / 2, GH / 2, attacker.team === LIGHT ? '#a855f7' : '#38d973', 25);
    // Score for winning combat
    addScorePopup(GW / 2, GH / 2 - 30, 200, '#44ff44');
  } else if (winner === 'defender') {
    var dUnit = board[dPos.row][dPos.col];
    dUnit.hp = Math.max(1, Math.floor(defender.hp / (defender.maxHp / dUnit.maxHp)));
    dUnit.revived = defender.revived;
    board[aPos.row][aPos.col] = null;
    TAS.audio.playMelody([[300,0.1],[200,0.15]], 100);
    deathExplosion(GW / 2, GH / 2, defender.team === LIGHT ? '#a855f7' : '#38d973', 25);
  } else {
    board[aPos.row][aPos.col] = null;
    board[dPos.row][dPos.col] = null;
    TAS.audio.playTone(100, 0.3, 'sawtooth', 0.08);
    deathExplosion(GW / 2, GH / 2, '#888', 15);
  }

  impactShake(5);
  TAS.fx.flash('#fff', 0.3);
  combatReturnTimer = 1.5;
}

// === TURN MANAGEMENT ===
function endTurn() {
  turnCount++;
  applyPowerSquareHealing();
  applyShiftingTileHealing();

  // Check boss phase transitions
  checkBossPhase();

  var win = checkWinCondition();
  if (win !== -1) {
    state = 'victory';
    stateChangeDebounce = 0.5;
    boardMessage = win === LIGHT ? 'GARDEN VICTORIOUS!' : 'FUNGAL HORDE WINS!';
    if (win === LIGHT && !twoPlayer) {
      campaignLevel++;
      if (campaignLevel > campaignProgress) {
        campaignProgress = campaignLevel;
        saveProgress(campaignProgress);
      }
      // Score for winning level - INT → scoreMult
      addScorePopup(GW / 2, GH / 2, 500, '#ffdd44');
      if (bossActive) {
        addScorePopup(GW / 2, GH / 2 - 20, 1000, '#ff44ff'); // Boss kill bonus
      }
    }
    TAS.audio.playMelody([[523,0.12],[659,0.12],[784,0.12],[1047,0.2]], 150);
    TAS.particles.clear();
    return;
  }

  currentTeam = currentTeam === LIGHT ? DARK : LIGHT;
  selectedUnit = null;
  validMoves = [];

  // Score points each turn for holding power squares - INT → scoreMult
  for (var psi = 0; psi < POWER_SQUARES.length; psi++) {
    var psU = board[POWER_SQUARES[psi][0]][POWER_SQUARES[psi][1]];
    if (psU && psU.team === LIGHT) {
      addScorePopup(
        BOARD_OFFSET_X + POWER_SQUARES[psi][1] * TILE_SIZE + TILE_SIZE / 2,
        BOARD_OFFSET_Y + POWER_SQUARES[psi][0] * TILE_SIZE,
        25, '#ffdd44'
      );
    }
  }

  if (!twoPlayer && currentTeam === DARK) {
    aiTurnPending = true;
    aiTurnDelay = 0;
  }
}

function scheduleAITurn(dt) {
  if (!aiTurnPending) return;
  aiTurnDelay += dt;
  if (aiTurnDelay >= 0.5) {
    aiTurnDelay = 0;
    aiTurnPending = false;
    doAITurn();
  }
}

// === AI BOARD STRATEGY ===
function doAITurn() {
  if (state !== 'board') return;

  var myUnits = [];
  for (var r = 0; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      if (board[r][c] && board[r][c].team === DARK) {
        myUnits.push({ row: r, col: c, unit: board[r][c] });
      }
    }
  }

  if (myUnits.length === 0) return;

  var bestScore = -Infinity;
  var bestMove = null;
  var bestUnitEntry = null;

  for (var ui = 0; ui < myUnits.length; ui++) {
    var u = myUnits[ui];
    var moves = getValidMoves(u.row, u.col);
    for (var mi = 0; mi < moves.length; mi++) {
      var m = moves[mi];
      var score = 0;
      var target = board[m.row][m.col];

      if (target) {
        score += 50 + (target.hp < u.unit.hp ? 30 : -10);
        if (target.type === WIZARD) score += 200;
        if (u.unit.type === WIZARD) score -= 40;
      }

      if (isPowerSquare(m.row, m.col)) score += 25;

      var centerDist = Math.abs(m.row - 4) + Math.abs(m.col - 4);
      score += (8 - centerDist) * 2;

      score += Math.random() * [40, 20, 5][difficulty];

      if (score > bestScore) {
        bestScore = score;
        bestMove = m;
        bestUnitEntry = u;
      }
    }
  }

  if (bestMove && bestUnitEntry) {
    var aiTarget = board[bestMove.row][bestMove.col];
    if (aiTarget && aiTarget.team === LIGHT) {
      initCombat(bestUnitEntry.row, bestUnitEntry.col, bestMove.row, bestMove.col);
    } else {
      board[bestMove.row][bestMove.col] = board[bestUnitEntry.row][bestUnitEntry.col];
      board[bestUnitEntry.row][bestUnitEntry.col] = null;
      TAS.audio.playTone(200, 0.08, 'triangle', 0.04);
      var moveX = BOARD_OFFSET_X + bestMove.col * TILE_SIZE + TILE_SIZE / 2;
      var moveY = BOARD_OFFSET_Y + bestMove.row * TILE_SIZE + TILE_SIZE / 2;
      TAS.particles.spawn(moveX, moveY, '#4ade80', 4, 1.5);
      endTurn();
    }
  } else {
    endTurn();
  }
}

// === BOARD CLICK HANDLING ===
function handleBoardClick(mx, my) {
  if (state !== 'board') return;
  if (!twoPlayer && currentTeam === DARK) return;

  var col = Math.floor((mx - BOARD_OFFSET_X) / TILE_SIZE);
  var row = Math.floor((my - BOARD_OFFSET_Y) / TILE_SIZE);

  if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) {
    selectedUnit = null;
    validMoves = [];
    return;
  }

  if (selectedUnit) {
    var isValid = false;
    for (var vi = 0; vi < validMoves.length; vi++) {
      if (validMoves[vi].row === row && validMoves[vi].col === col) {
        isValid = true;
        break;
      }
    }
    if (isValid) {
      var target = board[row][col];
      if (target && target.team !== currentTeam) {
        initCombat(selectedUnit.row, selectedUnit.col, row, col);
      } else {
        board[row][col] = board[selectedUnit.row][selectedUnit.col];
        board[selectedUnit.row][selectedUnit.col] = null;
        TAS.audio.playTone(300, 0.08, 'triangle', 0.04);
        var px = BOARD_OFFSET_X + col * TILE_SIZE + TILE_SIZE / 2;
        var py = BOARD_OFFSET_Y + row * TILE_SIZE + TILE_SIZE / 2;
        TAS.particles.spawn(px, py, currentTeam === LIGHT ? '#a855f7' : '#38d973', 4, 1.5);
        selectedUnit = null;
        validMoves = [];
        endTurn();
      }
      return;
    }
  }

  var clickedUnit = board[row][col];
  if (clickedUnit && clickedUnit.team === currentTeam) {
    selectedUnit = { row: row, col: col };
    validMoves = getValidMoves(row, col);
    TAS.audio.playTone(500, 0.05, 'sine', 0.04);
  } else {
    selectedUnit = null;
    validMoves = [];
  }
}

// === MOUSE/TOUCH INPUT ===
var mouseX = 0, mouseY = 0;

TAS.canvas.addEventListener('click', function(e) {
  TAS.audio.ensureAudio();
  var rect = TAS.canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  var scaleX = (TAS.canvas.width / dpr) / rect.width;
  var scaleY = (TAS.canvas.height / dpr) / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;

  if (stateChangeDebounce > 0) return;

  if (state === 'splash') {
    splashTimer = 0;
    return;
  }

  if (state === 'tutorial') {
    state = 'title';
    stateChangeDebounce = 0.3;
    return;
  }

  if (state === 'title') {
    handleMenuClick(mouseX, mouseY);
  } else if (state === 'board') {
    handleBoardClick(mouseX, mouseY);
  } else if (state === 'victory') {
    stateChangeDebounce = 0.3;
    if (!twoPlayer && campaignLevel < 10) {
      difficulty = Math.min(2, Math.floor(campaignLevel / 3));
      startGame();
    } else {
      state = 'title';
    }
  }
});

TAS.canvas.addEventListener('mousemove', function(e) {
  var rect = TAS.canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  var scaleX = (TAS.canvas.width / dpr) / rect.width;
  var scaleY = (TAS.canvas.height / dpr) / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;

  if (state === 'board') {
    hoverTile.col = Math.floor((mouseX - BOARD_OFFSET_X) / TILE_SIZE);
    hoverTile.row = Math.floor((mouseY - BOARD_OFFSET_Y) / TILE_SIZE);
  }
});

function handleMenuClick(mx, my) {
  var startY = 160;
  for (var i = 0; i < MENU_ITEMS.length; i++) {
    var itemY = startY + i * 28;
    if (my >= itemY - 12 && my <= itemY + 12 && mx > GW * 0.3 && mx < GW * 0.7) {
      menuSelection = i;
      selectMenuItem(i);
      return;
    }
  }
}

function selectMenuItem(idx) {
  TAS.audio.playTone(400, 0.08, 'square', 0.05);
  switch(idx) {
    case 0:
      twoPlayer = false;
      campaignLevel = 0;
      totalScore = 0;
      difficulty = Math.min(2, Math.floor(campaignProgress / 3));
      if (firstPlay) {
        firstPlay = false;
        state = 'tutorial';
        tutorialTimer = 0;
        return;
      }
      startGame();
      break;
    case 1:
      twoPlayer = true;
      totalScore = 0;
      startGame();
      break;
    case 2: difficulty = 0; break;
    case 3: difficulty = 1; break;
    case 4: difficulty = 2; break;
  }
}

// === KEYBOARD INPUT DEBOUNCING ===
var lastKeyState = {};

function checkKeyPress(key) {
  var pressed = TAS.input.keys[key] && !lastKeyState[key];
  lastKeyState[key] = !!TAS.input.keys[key];
  return pressed;
}

// === GAME START ===
function startGame() {
  state = 'board';
  stateChangeDebounce = 0.3;
  initBoard();
  TAS.particles.clear();
  scorePopups = [];
  boardMessage = currentTeam === LIGHT ? 'GARDEN MOVES FIRST' : 'FUNGAL HORDE MOVES FIRST';
  boardMessageTimer = 2;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (stateChangeDebounce > 0) stateChangeDebounce -= dt;
  if (boardMessageTimer > 0) boardMessageTimer -= dt;

  updateScorePopups(dt);

  // MfT Splash screen
  if (state === 'splash') {
    splashTimer -= dt;
    if (splashTimer <= 0) {
      state = 'title';
      stateChangeDebounce = 0.3;
    }
    return;
  }

  // Tutorial overlay
  if (state === 'tutorial') {
    tutorialTimer += dt;
    if (checkKeyPress('Enter') || checkKeyPress('Space') || checkKeyPress('Escape')) {
      state = 'title';
      stateChangeDebounce = 0.3;
      selectMenuItem(0); // Start campaign after tutorial
    }
    return;
  }

  if (state === 'title') {
    if (picking) return;   // picker overlay open — swallow menu input
    if (checkKeyPress('KeyC') || checkKeyPress('c') || TAS.input.touch.c) {
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (checkKeyPress('ArrowUp') || checkKeyPress('KeyW')) {
      menuSelection = (menuSelection - 1 + MENU_ITEMS.length) % MENU_ITEMS.length;
      TAS.audio.playTone(300, 0.05, 'sine', 0.03);
    }
    if (checkKeyPress('ArrowDown') || checkKeyPress('KeyS')) {
      menuSelection = (menuSelection + 1) % MENU_ITEMS.length;
      TAS.audio.playTone(300, 0.05, 'sine', 0.03);
    }
    if (checkKeyPress('Enter') || checkKeyPress('Space')) {
      selectMenuItem(menuSelection);
    }
    return;
  }

  if (state === 'combat') {
    updateCombat(dt);
    return;
  }

  if (state === 'victory') {
    if (stateChangeDebounce <= 0) {
      if (checkKeyPress('Enter') || checkKeyPress('Space')) {
        stateChangeDebounce = 0.3;
        if (!twoPlayer && campaignLevel < 10) {
          difficulty = Math.min(2, Math.floor(campaignLevel / 3));
          startGame();
        } else {
          state = 'title';
        }
      }
    }
    return;
  }

  if (state === 'board') {
    scheduleAITurn(dt);
    updateSporeRain(dt);

    if (!(!twoPlayer && currentTeam === DARK)) {
      if (checkKeyPress('ArrowUp') || checkKeyPress('KeyW')) {
        boardCursorVisible = true;
        boardCursor.row = Math.max(0, boardCursor.row - 1);
        TAS.audio.playTone(200, 0.03, 'sine', 0.02);
      }
      if (checkKeyPress('ArrowDown') || checkKeyPress('KeyS')) {
        boardCursorVisible = true;
        boardCursor.row = Math.min(BOARD_SIZE - 1, boardCursor.row + 1);
        TAS.audio.playTone(200, 0.03, 'sine', 0.02);
      }
      if (checkKeyPress('ArrowLeft') || checkKeyPress('KeyA')) {
        boardCursorVisible = true;
        boardCursor.col = Math.max(0, boardCursor.col - 1);
        TAS.audio.playTone(200, 0.03, 'sine', 0.02);
      }
      if (checkKeyPress('ArrowRight') || checkKeyPress('KeyD')) {
        boardCursorVisible = true;
        boardCursor.col = Math.min(BOARD_SIZE - 1, boardCursor.col + 1);
        TAS.audio.playTone(200, 0.03, 'sine', 0.02);
      }
      if (checkKeyPress('Enter') || checkKeyPress('Space') || checkKeyPress('KeyZ')) {
        boardCursorVisible = true;
        var cx = BOARD_OFFSET_X + boardCursor.col * TILE_SIZE + TILE_SIZE / 2;
        var cy = BOARD_OFFSET_Y + boardCursor.row * TILE_SIZE + TILE_SIZE / 2;
        handleBoardClick(cx, cy);
      }
      if (checkKeyPress('Escape') || checkKeyPress('KeyX')) {
        if (selectedUnit) {
          selectedUnit = null;
          validMoves = [];
          TAS.audio.playTone(200, 0.05, 'sine', 0.03);
        } else {
          state = 'title';
          stateChangeDebounce = 0.3;
        }
      }
    }
  }
}

// === DRAWING FUNCTIONS ===

// Draw a baseling (mushroom creature) - the player character
function drawBaseling(x, y, size, color, accentColor) {
  var s = size * 0.4;
  ctx.save();
  ctx.translate(x, y);

  // Mushroom cap
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.2, s * 0.8, s * 0.5, 0, Math.PI, 0);
  ctx.fill();

  // Cap spots
  ctx.fillStyle = accentColor || '#ffffff';
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(-s * 0.3, -s * 0.35, s * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.2, -s * 0.45, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.1, -s * 0.25, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Stem
  ctx.fillStyle = '#ddccaa';
  ctx.fillRect(-s * 0.25, -s * 0.2, s * 0.5, s * 0.6);

  // Eyes
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(-s * 0.12, -s * 0.05, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.12, -s * 0.05, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.arc(-s * 0.1, -s * 0.03, s * 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.14, -s * 0.03, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Feet
  ctx.fillStyle = '#bbaa88';
  ctx.fillRect(-s * 0.3, s * 0.35, s * 0.2, s * 0.1);
  ctx.fillRect(s * 0.1, s * 0.35, s * 0.2, s * 0.1);

  ctx.restore();
}

// Draw Tasern enemies
function drawTasernUnit(x, y, unit, size) {
  var s = size * 0.4;
  ctx.save();
  ctx.translate(x, y);

  if (unit.type === SPORE_CRAWLER) {
    // Crawling mushroom creature - dark spored cap, many legs
    ctx.fillStyle = '#226633';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.7, s * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Spore cap on top
    ctx.fillStyle = '#44dd88';
    ctx.beginPath();
    ctx.ellipse(0, -s * 0.3, s * 0.5, s * 0.3, 0, Math.PI, 0);
    ctx.fill();
    // Spore dots
    ctx.fillStyle = '#88ffaa';
    ctx.globalAlpha = 0.6;
    for (var si = 0; si < 4; si++) {
      ctx.beginPath();
      ctx.arc((si - 1.5) * s * 0.2, -s * 0.35, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Legs
    ctx.strokeStyle = '#226633';
    ctx.lineWidth = 2;
    for (var li = -2; li <= 2; li++) {
      ctx.beginPath();
      ctx.moveTo(li * s * 0.25, s * 0.2);
      ctx.lineTo(li * s * 0.35, s * 0.5);
      ctx.stroke();
    }
    // Eyes (red)
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(-s * 0.15, -s * 0.05, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(s * 0.15, -s * 0.05, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
  } else if (unit.type === REACTOR_BUG) {
    // Glowing insectoid with reactor core
    ctx.fillStyle = '#442200';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.4, s * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Wings
    ctx.fillStyle = 'rgba(255,100,30,0.3)';
    ctx.beginPath();
    ctx.ellipse(-s * 0.5, -s * 0.1, s * 0.3, s * 0.5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 0.5, -s * 0.1, s * 0.3, s * 0.5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Core glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#ff6622';
    ctx.fillStyle = '#ff6622';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffaa44';
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
    ctx.fill();
    // Antennae
    ctx.strokeStyle = '#ff6622';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-s * 0.1, -s * 0.5);
    ctx.lineTo(-s * 0.25, -s * 0.8);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s * 0.1, -s * 0.5);
    ctx.lineTo(s * 0.25, -s * 0.8);
    ctx.stroke();
  } else if (unit.type === MYCELIAL_WORM) {
    // Large segmented worm
    ctx.fillStyle = '#554422';
    for (var wi = 0; wi < 5; wi++) {
      var wx = Math.sin(frame * 0.05 + wi * 0.5) * s * 0.1;
      var wy = (wi - 2) * s * 0.25;
      var wr = s * (0.35 - Math.abs(wi - 2) * 0.05);
      ctx.beginPath();
      ctx.arc(wx, wy, wr, 0, Math.PI * 2);
      ctx.fill();
    }
    // Head
    ctx.fillStyle = '#886644';
    ctx.beginPath();
    ctx.arc(Math.sin(frame * 0.05) * s * 0.1, -s * 0.5, s * 0.3, 0, Math.PI * 2);
    ctx.fill();
    // Mouth
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(Math.sin(frame * 0.05) * s * 0.1, -s * 0.4, s * 0.12, 0, Math.PI);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(Math.sin(frame * 0.05) * s * 0.1 - s * 0.1, -s * 0.55, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(Math.sin(frame * 0.05) * s * 0.1 + s * 0.1, -s * 0.55, s * 0.06, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawUnit(x, y, unit, size, selected) {
  var isLight = unit.team === LIGHT;
  var baseColor = isLight ? '#a855f7' : '#38d973';
  var bodyColor = isLight ? '#c084fc' : '#4ade80';
  var accentColor = isLight ? '#f3e8ff' : '#052e16';

  if (selected) {
    ctx.shadowBlur = 8;
    ctx.shadowColor = isLight ? '#a855f7' : '#38d973';
  }

  // Draw Tasern enemy types with custom sprites
  if (unit.type >= SPORE_CRAWLER) {
    drawTasernUnit(x, y, unit, size);
    ctx.shadowBlur = 0;
    // HP bar
    if (unit.hp < unit.maxHp) {
      var tbarW = size * 0.7;
      var tbarH = 3;
      var tbarX = x - tbarW / 2;
      var tbarY = y + size * 0.45;
      ctx.fillStyle = '#333';
      ctx.fillRect(tbarX, tbarY, tbarW, tbarH);
      var tpct = unit.hp / unit.maxHp;
      ctx.fillStyle = tpct > 0.5 ? '#44dd44' : tpct > 0.25 ? '#dddd44' : '#dd4444';
      ctx.fillRect(tbarX, tbarY, tbarW * tpct, tbarH);
    }
    return;
  }

  // Light team units are drawn as baselings (mushroom creatures)
  if (isLight) {
    var mushColors = ['#a855f7', '#c084fc', '#d8b4fe', '#e9d5ff', '#f4b41b', '#c084fc', '#a855f7', '#d8b4fe'];
    var mushAccents = ['#f3e8ff', '#ede9fe', '#faf5ff', '#f5f3ff', '#fef3c7', '#ede9fe', '#f3e8ff', '#faf5ff'];
    var mColor = mushColors[unit.type % mushColors.length];
    var mAccent = mushAccents[unit.type % mushAccents.length];
    // The WIZARD is the player's champion: draw the SELECTED baseling sprite when
    // ready, else fall through to the procedural mushroom (tinted Base-blue).
    if (unit.type === WIZARD) {
      mColor = statB.color;
      if (TAS.drawBaseling(ctx, x, y, size, { anim: 'idle', frame: frame })) {
        ctx.shadowBlur = 0;
        if (unit.hp < unit.maxHp) {
          var wbW = size * 0.7, wbX = x - wbW / 2, wbY = y + size * 0.45;
          ctx.fillStyle = '#333'; ctx.fillRect(wbX, wbY, wbW, 3);
          var wpct = unit.hp / unit.maxHp;
          ctx.fillStyle = wpct > 0.5 ? '#44dd44' : wpct > 0.25 ? '#dddd44' : '#dd4444';
          ctx.fillRect(wbX, wbY, wbW * wpct, 3);
        }
        return;
      }
    }
    drawBaseling(x, y, size, mColor, mAccent);
    ctx.shadowBlur = 0;
    // HP bar
    if (unit.hp < unit.maxHp) {
      var bbarW = size * 0.7;
      var bbarH = 3;
      var bbarX = x - bbarW / 2;
      var bbarY = y + size * 0.45;
      ctx.fillStyle = '#333';
      ctx.fillRect(bbarX, bbarY, bbarW, bbarH);
      var bpct = unit.hp / unit.maxHp;
      ctx.fillStyle = bpct > 0.5 ? '#44dd44' : bpct > 0.25 ? '#dddd44' : '#dd4444';
      ctx.fillRect(bbarX, bbarY, bbarW * bpct, bbarH);
    }
    return;
  }

  // Dark team units (original geometric shapes)
  var s = size * 0.4;
  ctx.save();
  ctx.translate(x, y);

  switch(unit.type) {
    case WIZARD:
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.3, -s * 0.3);
      ctx.lineTo(s, -s * 0.2);
      ctx.lineTo(s * 0.4, s * 0.2);
      ctx.lineTo(s * 0.5, s);
      ctx.lineTo(0, s * 0.5);
      ctx.lineTo(-s * 0.5, s);
      ctx.lineTo(-s * 0.4, s * 0.2);
      ctx.lineTo(-s, -s * 0.2);
      ctx.lineTo(-s * 0.3, -s * 0.3);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case VALKYRIE:
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.4, s * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = baseColor;
      ctx.beginPath();
      ctx.moveTo(-s * 0.3, -s * 0.3);
      ctx.lineTo(-s, -s * 0.8);
      ctx.lineTo(-s * 0.1, -s * 0.1);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.3, -s * 0.3);
      ctx.lineTo(s, -s * 0.8);
      ctx.lineTo(s * 0.1, -s * 0.1);
      ctx.fill();
      break;
    case GOLEM:
      ctx.fillStyle = bodyColor;
      ctx.fillRect(-s * 0.6, -s * 0.7, s * 1.2, s * 1.4);
      ctx.fillStyle = accentColor;
      ctx.fillRect(-s * 0.4, -s * 0.4, s * 0.3, s * 0.3);
      ctx.fillRect(s * 0.1, -s * 0.4, s * 0.3, s * 0.3);
      break;
    case ARCHER:
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, s * 0.3, s * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = baseColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s * 0.3, 0, s * 0.7, -Math.PI * 0.4, Math.PI * 0.4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s * 0.3, -s * 0.4);
      ctx.lineTo(s * 0.3, s * 0.4);
      ctx.stroke();
      break;
    case KNIGHT:
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.moveTo(0, -s);
      ctx.lineTo(s * 0.6, -s * 0.3);
      ctx.lineTo(s * 0.8, s * 0.2);
      ctx.lineTo(s * 0.3, s * 0.8);
      ctx.lineTo(-s * 0.3, s * 0.8);
      ctx.lineTo(-s * 0.5, s * 0.2);
      ctx.lineTo(-s * 0.3, -s * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      ctx.arc(s * 0.2, -s * 0.2, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      break;
    case UNICORN:
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, s * 0.1, s * 0.5, s * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.5);
      ctx.lineTo(s * 0.08, -s);
      ctx.lineTo(-s * 0.08, -s);
      ctx.closePath();
      ctx.fill();
      break;
    case DJINN:
      ctx.fillStyle = bodyColor;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.2, s * 0.5, s * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-s * 0.3, s * 0.1);
      ctx.quadraticCurveTo(0, s * 1.2, s * 0.3, s * 0.1);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(-s * 0.15, -s * 0.3, s * 0.1, 0, Math.PI * 2);
      ctx.arc(s * 0.15, -s * 0.3, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      break;
    case PHOENIX:
      ctx.fillStyle = isLight ? '#ff8844' : '#44cc44';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.3);
      ctx.lineTo(s, -s * 0.8);
      ctx.lineTo(s * 0.5, s * 0.1);
      ctx.lineTo(s * 0.3, s * 0.8);
      ctx.lineTo(0, s * 0.4);
      ctx.lineTo(-s * 0.3, s * 0.8);
      ctx.lineTo(-s * 0.5, s * 0.1);
      ctx.lineTo(-s, -s * 0.8);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#ffff44';
      ctx.beginPath();
      ctx.arc(0, -s * 0.1, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
      break;
  }

  ctx.restore();
  ctx.shadowBlur = 0;

  // HP bar
  if (unit.hp < unit.maxHp) {
    var barW = size * 0.7;
    var barH = 3;
    var barX = x - barW / 2;
    var barY = y + size * 0.45;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    var pct = unit.hp / unit.maxHp;
    ctx.fillStyle = pct > 0.5 ? '#44dd44' : pct > 0.25 ? '#dddd44' : '#dd4444';
    ctx.fillRect(barX, barY, barW * pct, barH);
  }
}

function drawBoard() {
  var zone = getCurrentZone();

  for (var r = 0; r < BOARD_SIZE; r++) {
    for (var c = 0; c < BOARD_SIZE; c++) {
      var x = BOARD_OFFSET_X + c * TILE_SIZE;
      var y = BOARD_OFFSET_Y + r * TILE_SIZE;
      var tileColor = getTileColor(r, c);
      var isPower = isPowerSquare(r, c);
      var isShifting = isShiftingTile(r, c);

      // Zone-themed tile colors
      if (tileColor === 'light') {
        ctx.fillStyle = isPower ? '#334455' : zone.tileLight;
      } else {
        ctx.fillStyle = isPower ? '#1a1530' : zone.tileDark;
      }
      ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

      ctx.strokeStyle = zone.gridColor;
      ctx.lineWidth = 0.5;
      ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);

      if (isPower) {
        var pulse = Math.sin(frame * 0.05) * 0.15 + 0.25;
        ctx.fillStyle = 'rgba(244, 180, 27, ' + pulse + ')';
        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
        ctx.strokeStyle = 'rgba(244, 180, 27, 0.5)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }

      if (isShifting) {
        var shimmer = Math.sin(frame * 0.08 + r + c) * 0.1 + 0.15;
        ctx.fillStyle = tileColor === 'light' ?
          'rgba(168, 85, 247, ' + shimmer + ')' :
          'rgba(56, 217, 115, ' + shimmer + ')';
        ctx.fillRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }

      // Valid move highlights
      var isValidMove = false;
      for (var vi = 0; vi < validMoves.length; vi++) {
        if (validMoves[vi].row === r && validMoves[vi].col === c) { isValidMove = true; break; }
      }
      if (isValidMove) {
        var target = board[r][c];
        var alpha = Math.sin(frame * 0.08) * 0.15 + 0.3;
