<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snow Bros</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

const GW = 320, GH = 400;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'SNOW' } });

// === CONSTANTS ===
const GRAVITY = 600;
const PLAYER_SPEED = 100;
const JUMP_FORCE = -260;
const SNOW_SPEED = 180;
const SNOWBALL_SPEED = 160;
const SNOWBALL_LIFE = 5;
const HURRY_TIME = 25;
const HUD_H = 28;

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('snowbros_hi');
let lives = 3;
let level = 1;
let frame = 0;
let levelTimer = 0;
let pumpkinActive = false;
let pumpkin = { x: 0, y: 0 };
let levelComplete = false;
let levelCompleteTimer = 0;
let player = null;
let enemies = [];
let snowPuffs = [];
let snowballs = [];
let powerups = [];
let platforms = [];
let chainCount = 0;
let scorePopups = [];
let levelIntroTimer = 0;
let comboMax = 0;
let totalKills = 0;

// === LEVEL GENERATION ===
function generatePlatforms(lvl) {
  const plats = [];
  // Floor
  plats.push({ x: 0, y: GH - 10, w: GW, h: 10 });
  // Walls
  plats.push({ x: 0, y: 0, w: 8, h: GH, wall: true });
  plats.push({ x: GW - 8, y: 0, w: 8, h: GH, wall: true });

  const tierCount = 4 + Math.min(2, Math.floor(lvl / 8));
  const spacing = (GH - HUD_H - 40) / (tierCount + 1);

  for (let t = 0; t < tierCount; t++) {
    const y = HUD_H + 40 + spacing * (t + 1);
    const seed = (lvl * 7 + t * 13) % 7;

    if (seed === 0) {
      // Two platforms with gap in middle
      const gapW = 40 + (lvl % 3) * 10;
      const gapX = GW / 2 - gapW / 2;
      plats.push({ x: 16, y: y, w: gapX - 16, h: 8 });
      plats.push({ x: gapX + gapW, y: y, w: GW - 16 - (gapX + gapW), h: 8 });
    } else if (seed === 1) {
      // Single wide platform, offset left
      plats.push({ x: 16, y: y, w: GW * 0.55, h: 8 });
    } else if (seed === 2) {
      // Single wide platform, offset right
      plats.push({ x: GW * 0.35, y: y, w: GW * 0.55 - 16, h: 8 });
    } else if (seed === 3) {
      // Three small platforms
      const pw = 60;
      plats.push({ x: 20, y: y, w: pw, h: 8 });
      plats.push({ x: GW / 2 - pw / 2, y: y, w: pw, h: 8 });
      plats.push({ x: GW - 20 - pw, y: y, w: pw, h: 8 });
    } else if (seed === 4) {
      // Staircase left to right
      const stepW = 50;
      const steps = 3;
      for (let s = 0; s < steps; s++) {
        plats.push({ x: 16 + s * (GW - 32) / steps, y: y - s * 12, w: stepW, h: 8 });
      }
    } else if (seed === 5) {
      // Two floating islands with large central gap
      const islandW = 55;
      plats.push({ x: 25, y: y, w: islandW, h: 8 });
      plats.push({ x: GW - 25 - islandW, y: y, w: islandW, h: 8 });
    } else {
      // Full platform with two gaps
      const g1 = 50 + ((lvl + t) % 3) * 15;
      const g2 = GW - 50 - ((lvl + t) % 3) * 15 - 30;
      plats.push({ x: 16, y: y, w: g1 - 16, h: 8 });
      plats.push({ x: g1 + 30, y: y, w: g2 - g1 - 30, h: 8 });
      plats.push({ x: g2 + 30, y: y, w: GW - 16 - g2 - 30, h: 8 });
    }
  }
  return plats;
}

function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, vy: -40 });
}

function getEnemyCount(lvl) {
  if (lvl <= 5) return 2 + Math.floor(lvl / 2);
  if (lvl <= 10) return 3 + Math.floor(lvl / 3);
  if (lvl <= 20) return 4 + Math.floor((lvl - 10) / 3);
  return 5 + Math.floor((lvl - 20) / 4);
}

function getEnemyType(lvl) {
  const pool = ['red'];
  if (lvl >= 4) pool.push('blue');
  if (lvl >= 8) pool.push('green');
  if (lvl >= 12) pool.push('purple');
  if (lvl >= 16) pool.push('yellow');
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

function getSnowToFill(type) {
  switch(type) {
    case 'red': return 3;
    case 'blue': return 4;
    case 'green': return 5;
    case 'purple': return 4;
    case 'yellow': return 3;
    default: return 3;
  }
}

function getEnemyColor(type) {
  switch(type) {
    case 'red': return '#ff5555';
    case 'blue': return '#5577ff';
    case 'green': return '#44aa44';
    case 'purple': return '#aa44dd';
    case 'yellow': return '#ddcc33';
    default: return '#ff5555';
  }
}

function getEnemySpeed(type, lvl) {
  const base = { red: 40, blue: 65, green: 30, purple: 45, yellow: 40 };
  return (base[type] || 40) + lvl * 1.5;
}

function spawnEnemy(type, lvl) {
  // Find a platform to place on (not the floor for variety)
  const validPlats = platforms.filter(function(p) { return !p.wall && p.y < GH - 20 && p.w > 30; });
  const plat = validPlats.length > 0 ? validPlats[TAS.math.randInt(0, validPlats.length - 1)] : platforms[0];
  return {
    x: plat.x + TAS.math.randRange(10, plat.w - 10),
    y: plat.y - 14,
    w: 14, h: 14,
    vx: getEnemySpeed(type, lvl) * (Math.random() < 0.5 ? 1 : -1),
    vy: 0,
    type: type,
    snowHits: 0,
    maxSnow: getSnowToFill(type),
    grounded: false,
    dir: 1,
    jumpTimer: 0,
    attackTimer: TAS.math.randRange(2, 4),
    teleportTimer: type === 'purple' ? TAS.math.randRange(3, 6) : 999,
    alive: true,
    frozen: false
  };
}

// === BOSS ===
function spawnBoss(lvl) {
  return {
    x: GW / 2, y: GH - 50,
    w: 28, h: 28,
    vx: 50 + lvl * 2,
    vy: 0,
    type: 'boss',
    hp: 3 + Math.floor(lvl / 10),
    maxHp: 3 + Math.floor(lvl / 10),
    snowHits: 0,
    maxSnow: 99,
    grounded: false,
    dir: 1,
    jumpTimer: 0,
    attackTimer: 2,
    teleportTimer: 999,
    alive: true,
    frozen: false,
    phase: 0,
    phaseTimer: 0
  };
}

// === PROJECTILES ===
let enemyProjectiles = [];

// === POWERUP TYPES ===
const POWERUP_TYPES = ['speed', 'power', 'range', 'blast', 'life', 'food'];
function spawnPowerup(x, y) {
  if (Math.random() > 0.35) return; // 35% drop rate
  const type = POWERUP_TYPES[TAS.math.randInt(0, POWERUP_TYPES.length - 1)];
  powerups.push({ x: x, y: y, type: type, vy: -80, life: 8, grounded: false });
}

// === PLAYER POWERUP STATE ===
let pw_speed = false, pw_power = false, pw_range = false, pw_blast = false;
let pw_timer = 0;

// === INIT LEVEL ===
function initLevel() {
  platforms = generatePlatforms(level);
  enemies = [];
  snowPuffs = [];
  snowballs = [];
  powerups = [];
  enemyProjectiles = [];
  scorePopups = [];
  pumpkinActive = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  levelTimer = 0;
  levelIntroTimer = 1.8;
  chainCount = 0;
  comboMax = 0;

  const isBoss = (level % 10 === 0);

  if (isBoss) {
    enemies.push(spawnBoss(level));
  } else {
    const count = getEnemyCount(level);
    for (let i = 0; i < count; i++) {
      enemies.push(spawnEnemy(getEnemyType(level), level));
    }
  }

  player = {
    x: GW / 2 - 7, y: GH - 24,
    w: 14, h: 14,
    vx: 0, vy: 0,
    dir: 1,
    grounded: false,
    shootCooldown: 0,
    invuln: 0,
    dead: false
  };
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  totalKills = 0;
  pw_speed = pw_power = pw_range = pw_blast = false;
  pw_timer = 0;
  TAS.particles.clear();
  initLevel();
}

// === PHYSICS HELPERS ===
function applyGravity(ent, dt) {
  ent.vy += GRAVITY * dt;
  ent.y += ent.vy * dt;
  ent.grounded = false;

  // Platform collision
  for (const p of platforms) {
    if (p.wall) continue;
    if (ent.vy >= 0 &&
        ent.x + ent.w > p.x && ent.x < p.x + p.w &&
        ent.y + ent.h > p.y && ent.y + ent.h < p.y + p.h + ent.vy * dt + 4) {
      ent.y = p.y - ent.h;
      ent.vy = 0;
      ent.grounded = true;
    }
  }

  // Wrap vertical (fall off bottom → appear at top)
  if (ent.y > GH + 20) {
    ent.y = -ent.h;
  }
}

function wallCollide(ent) {
  if (ent.x < 8) { ent.x = 8; return -1; }
  if (ent.x + ent.w > GW - 8) { ent.x = GW - 8 - ent.w; return -1; }
  return 1;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame % 3 === 0) {
      const col = state === 'victory' ? '#ffdd88' : '#aaddff';
      TAS.particles.spawn(
        TAS.math.randRange(0, GW), state === 'victory' ? GH + 5 : TAS.math.randRange(0, GH),
        col, 1, state === 'victory' ? 1.5 : 0.5, { gravity: state === 'victory' ? -1 : 0.5, size: 2, sizeVar: 2 }
      );
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    // Level intro countdown
    if (levelIntroTimer > 0) {
      levelIntroTimer -= dt;
      // Snow ambience during intro
      if (frame % 3 === 0) {
        TAS.particles.spawn(
          TAS.math.randRange(10, GW - 10), -5,
          '#ddeeff', 1, 0.4, { gravity: 0.2, size: 1, sizeVar: 2 }
        );
      }
      return;
    }

    // Update score popups
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const sp = scorePopups[i];
      sp.y += sp.vy * dt;
      sp.life -= dt;
      if (sp.life <= 0) scorePopups.splice(i, 1);
    }

    // Level complete check
    if (levelComplete) {
      levelCompleteTimer += dt;
      if (levelCompleteTimer > 2) {
        level++;
        if (level > 30) {
          // Game beaten!
          score += 5000; // Victory bonus
          state = 'victory';
          if (score > highScore) { highScore = score; TAS.score.save('snowbros_hi', score); }
        } else {
          initLevel();
        }
      }
      return;
    }

    // Player dead
    if (player.dead) {
      player.invuln -= dt;
      if (player.invuln <= 0) {
        if (lives <= 0) {
          state = 'gameOver';
          if (score > highScore) { highScore = score; TAS.score.save('snowbros_hi', score); }
        } else {
          player.dead = false;
          player.x = GW / 2 - 7;
          player.y = GH - 24;
          player.vx = 0;
          player.vy = 0;
          player.invuln = 2;
        }
      }
      return;
    }

    // Powerup timer
    if (pw_timer > 0) {
      pw_timer -= dt;
      if (pw_timer <= 0) {
        pw_speed = pw_power = pw_range = pw_blast = false;
      }
    }

    // === PLAYER INPUT ===
    const kl = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
    const kr = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
    const kj = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a;
    const ks = TAS.input.keys['KeyZ'] || TAS.input.keys['KeyX'] || TAS.input.touch.b;

    const spd = pw_speed ? PLAYER_SPEED * 1.5 : PLAYER_SPEED;
    player.vx = 0;
    if (kl) { player.vx = -spd; player.dir = -1; }
    if (kr) { player.vx = spd; player.dir = 1; }

    player.x += player.vx * dt;
    wallCollide(player);

    if (kj && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      TAS.audio.playTone(220, 0.08, 'triangle', 0.06, 300);
    }

    applyGravity(player, dt);

    // Shoot snow
    player.shootCooldown -= dt;
    if (ks && player.shootCooldown <= 0) {
      player.shootCooldown = 0.2;
      const range = pw_range ? 120 : 70;
      snowPuffs.push({
        x: player.x + (player.dir > 0 ? player.w : -6),
        y: player.y + 4,
        vx: SNOW_SPEED * player.dir,
        w: 6, h: 6,
        life: range / SNOW_SPEED,
        power: pw_power
      });
      TAS.audio.playNoise(0.06, 0.04, 2000);
    }

    // Invulnerability flicker
    if (player.invuln > 0) player.invuln -= dt;

    // === SNOW PUFFS ===
    for (let i = snowPuffs.length - 1; i >= 0; i--) {
      const s = snowPuffs[i];
      s.x += s.vx * dt;
      s.life -= dt;
      if (s.life <= 0 || s.x < 8 || s.x > GW - 8) {
        snowPuffs.splice(i, 1);
        continue;
      }
      // Hit enemies
      let hit = false;
      for (const e of enemies) {
        if (!e.alive || e.frozen) continue;
        if (TAS.hit.rectOverlap(s.x, s.y, s.w, s.h, e.x, e.y, e.w, e.h)) {
          e.snowHits += s.power ? e.maxSnow : 1;
          if (e.snowHits >= e.maxSnow && e.type !== 'boss') {
            e.frozen = true;
            e.vx = 0;
            TAS.audio.playTone(600, 0.15, 'sine', 0.06, 800);
          } else {
            TAS.audio.playTone(400, 0.05, 'triangle', 0.04);
            // Slow enemy
            e.vx *= 0.7;
          }
          TAS.particles.spawn(s.x, s.y, '#ffffff', 3, 1, { size: 2, gravity: 0.5 });
          hit = true;
          break;
        }
      }
      if (hit) snowPuffs.splice(i, 1);
    }

    // === SNOWBALLS ===
    for (let i = snowballs.length - 1; i >= 0; i--) {
      const sb = snowballs[i];
      sb.x += sb.vx * dt;
      sb.vy += GRAVITY * dt;
      sb.y += sb.vy * dt;
      sb.life -= dt;
      sb.angle += sb.vx * dt * 0.05;

      // Wall bounce
      if (sb.x < 8) { sb.x = 8; sb.vx = Math.abs(sb.vx); }
      if (sb.x + sb.r * 2 > GW - 8) { sb.x = GW - 8 - sb.r * 2; sb.vx = -Math.abs(sb.vx); }

      // Platform collision for rolling
      for (const p of platforms) {
        if (p.wall) continue;
        if (sb.vy >= 0 && sb.vx !== 0 &&
            sb.x + sb.r * 2 > p.x && sb.x < p.x + p.w &&
            sb.y + sb.r * 2 > p.y && sb.y + sb.r * 2 < p.y + 12) {
          sb.y = p.y - sb.r * 2;
          sb.vy = 0;
        }
      }

      // Wrap bottom
      if (sb.y > GH + 20) sb.y = -20;

      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (!e.alive) continue;
        if (e.frozen) continue; // Don't hit frozen (they become snowballs themselves)
        if (TAS.hit.rectOverlap(sb.x, sb.y, sb.r * 2, sb.r * 2, e.x, e.y, e.w, e.h)) {
          if (e.type === 'boss') {
            e.hp--;
            TAS.fx.shake(6, 0.85);
            TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1, 50);
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffaa00', 12, 3);
            addScorePopup(e.x + e.w / 2, e.y - 10, 'HIT!', '#ffaa00');
            if (e.hp <= 0) {
              e.alive = false;
              score += 1000;
              chainCount++;
              totalKills++;
              TAS.fx.flash('#ffdd44', 0.5);
              TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 80);
              TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffdd44', 20, 4);
              addScorePopup(e.x + e.w / 2, e.y - 10, '1000', '#ffdd44');
              spawnPowerup(e.x, e.y);
            }
          } else {
            e.alive = false;
            chainCount++;
            totalKills++;
            if (chainCount > comboMax) comboMax = chainCount;
            const pts = 100 * Math.pow(2, Math.min(chainCount - 1, 4));
            score += pts;
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, getEnemyColor(e.type), 8, 2.5);
            const pitchBonus = Math.min(chainCount, 5);
            TAS.audio.playTone(300 + pitchBonus * 100, 0.1, 'square', 0.06);
            addScorePopup(e.x + e.w / 2, e.y - 10, String(pts), chainCount > 1 ? '#ff8844' : '#ffdd44');
            spawnPowerup(e.x, e.y);
          }
          // Blast snowball
          if (pw_blast) {
            TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r, '#88ddff', 15, 4);
            TAS.fx.shake(4, 0.85);
          }
        }
      }

      if (sb.life <= 0) {
        TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r, '#ccddff', 6, 1.5);
        snowballs.splice(i, 1);
        chainCount = 0;
      }
    }

    // === FROZEN ENEMIES → KICKABLE ===
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive || !e.frozen) continue;

      applyGravity(e, dt);

      // Player kick
      if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 2, e.y - 2, e.w + 4, e.h + 4)) {
        // Kick! Create snowball
        const kickDir = (player.x + player.w / 2 < e.x + e.w / 2) ? 1 : -1;
        snowballs.push({
          x: e.x, y: e.y,
          vx: SNOWBALL_SPEED * kickDir,
          vy: -30,
          r: 8,
          life: SNOWBALL_LIFE,
          angle: 0
        });
        e.alive = false;
        chainCount = 0;
        // Satisfying kick SFX - thud + whoosh
        TAS.audio.playTone(150, 0.12, 'sawtooth', 0.08, 80);
        TAS.audio.playNoise(0.08, 0.05, 500);
        TAS.audio.playTone(80, 0.06, 'triangle', 0.1);
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#aaddff', 8, 2.5);
        TAS.particles.spawn(e.x + kickDir * 10, e.y + e.h / 2, '#ffffff', 4, 1.5, { size: 1, sizeVar: 1 });
        TAS.fx.shake(2, 0.9);
        addScorePopup(e.x + e.w / 2, e.y - 10, 'KICK!', '#88ddff');
      }
    }

    // === ENEMIES AI ===
    for (const e of enemies) {
      if (!e.alive || e.frozen) continue;

      // Move
      const slowFactor = e.snowHits > 0 ? Math.max(0.3, 1 - e.snowHits * 0.2) : 1;
      e.x += e.vx * slowFactor * dt;
      const wallHit = wallCollide(e);
      if (wallHit < 0) e.vx = -e.vx;

      applyGravity(e, dt);

      // Platform edge turn (basic enemies)
      if (e.grounded && e.type !== 'purple') {
        let onPlatform = false;
        for (const p of platforms) {
          if (p.wall) continue;
          if (e.x + e.w > p.x && e.x < p.x + p.w && Math.abs(e.y + e.h - p.y) < 2) {
            onPlatform = true;
            // Near edge?
            if (e.x < p.x + 4 && e.vx < 0) e.vx = Math.abs(e.vx);
            if (e.x + e.w > p.x + p.w - 4 && e.vx > 0) e.vx = -Math.abs(e.vx);
          }
        }
        // If somehow off platform, try to jump or reverse
        if (!onPlatform && Math.random() < 0.02) e.vx = -e.vx;
      }

      // Jumping (blue enemies jump more)
      e.jumpTimer -= dt;
      if (e.grounded && e.jumpTimer <= 0) {
        const jumpChance = e.type === 'blue' ? 0.02 : 0.005;
        if (Math.random() < jumpChance) {
          e.vy = JUMP_FORCE * 0.85;
          e.grounded = false;
          e.jumpTimer = e.type === 'blue' ? 1.5 : 3;
        }
      }

      // Attacks
      e.attackTimer -= dt;
      if (e.attackTimer <= 0 && e.type !== 'red' && e.type !== 'blue') {
        e.attackTimer = TAS.math.randRange(2.5, 5);

        if (e.type === 'green') {
          // Throw rock
          const dirToPlayer = player.x > e.x ? 1 : -1;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y,
            vx: dirToPlayer * 90, vy: -80,
            w: 6, h: 6, type: 'rock', gravity: true
          });
        } else if (e.type === 'yellow') {
          // Toss bomb
          const dirToPlayer = player.x > e.x ? 1 : -1;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y,
            vx: dirToPlayer * 60, vy: -120,
            w: 7, h: 7, type: 'bomb', gravity: true, timer: 1.5
          });
        } else if (e.type === 'purple') {
          // Fireball
          const dirToPlayer = player.x > e.x ? 1 : -1;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y + e.h / 2,
            vx: dirToPlayer * 110, vy: 0,
            w: 6, h: 6, type: 'fire', gravity: false
          });
        }
      }

      // Purple teleport
      if (e.type === 'purple') {
        e.teleportTimer -= dt;
        if (e.teleportTimer <= 0) {
          e.teleportTimer = TAS.math.randRange(3, 6);
          // Teleport to random platform
          const validPlats = platforms.filter(function(p) { return !p.wall && p.w > 20 && p.y > HUD_H + 30; });
          if (validPlats.length > 0) {
            const p = validPlats[TAS.math.randInt(0, validPlats.length - 1)];
            e.x = p.x + TAS.math.randRange(5, p.w - 15);
            e.y = p.y - e.h;
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#cc66ff', 8, 2);
          }
        }
      }

      // Boss patterns
      if (e.type === 'boss') {
        e.phaseTimer += dt;
        if (e.phaseTimer > 3) {
          e.phaseTimer = 0;
          e.phase = (e.phase + 1) % 3;
          if (e.phase === 1) {
            // Jump slam
            e.vy = JUMP_FORCE * 1.2;
            e.grounded = false;
          } else if (e.phase === 2) {
            // Barrage
            for (let b = 0; b < 3; b++) {
              setTimeout(function() {
                if (!e.alive) return;
                enemyProjectiles.push({
                  x: e.x + e.w / 2, y: e.y,
                  vx: (Math.random() - 0.5) * 120,
                  vy: -100 - Math.random() * 60,
                  w: 6, h: 6, type: 'rock', gravity: true
                });
              }, b * 300);
            }
          }
        }
        // Boss always chases player somewhat
        if (e.grounded) {
          if (player.x < e.x) e.vx = -Math.abs(e.vx);
          else e.vx = Math.abs(e.vx);
        }
      }

      // Enemy collision with player
      if (player.invuln <= 0 && !player.dead &&
          TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        killPlayer();
      }
    }

    // === ENEMY PROJECTILES ===
    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
      const p = enemyProjectiles[i];
      p.x += p.vx * dt;
      if (p.gravity) {
        p.vy += GRAVITY * 0.6 * dt;
      }
      p.y += p.vy * dt;

      // Bomb timer
      if (p.type === 'bomb') {
        p.timer -= dt;
        if (p.timer <= 0) {
          // Explode
          TAS.particles.spawn(p.x, p.y, '#ff8800', 12, 3);
          TAS.audio.playNoise(0.15, 0.08, 400);
          // Check if player in blast radius
          if (player.invuln <= 0 && !player.dead && TAS.math.dist(player.x + 7, player.y + 7, p.x, p.y) < 30) {
            killPlayer();
          }
          enemyProjectiles.splice(i, 1);
          continue;
        }
      }

      // Off screen
      if (p.x < 0 || p.x > GW || p.y > GH + 20) {
        enemyProjectiles.splice(i, 1);
        continue;
      }

      // Hit player
      if (player.invuln <= 0 && !player.dead &&
          TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x - p.w / 2, p.y - p.h / 2, p.w, p.h)) {
        killPlayer();
        enemyProjectiles.splice(i, 1);
      }
    }

    // === POWERUPS ===
    for (let i = powerups.length - 1; i >= 0; i--) {
      const pu = powerups[i];
      pu.vy += GRAVITY * 0.5 * dt;
      pu.y += pu.vy * dt;
      // Sit on platforms
      for (const p of platforms) {
        if (p.wall) continue;
        if (pu.vy >= 0 && pu.x > p.x && pu.x < p.x + p.w && pu.y > p.y - 4 && pu.y < p.y + 6) {
          pu.y = p.y - 4;
          pu.vy = 0;
          pu.grounded = true;
        }
      }
      pu.life -= dt;
      if (pu.life <= 0) { powerups.splice(i, 1); continue; }

      // Player collect
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pu.x - 6, pu.y - 6, 12, 12)) {
        applyPowerup(pu.type);
        powerups.splice(i, 1);
      }
    }

    // === HURRY UP TIMER ===
    levelTimer += dt;
    if (levelTimer > HURRY_TIME && !pumpkinActive) {
      pumpkinActive = true;
      pumpkin = { x: TAS.math.randRange(20, GW - 20), y: HUD_H + 20 };
      TAS.audio.playTone(100, 0.5, 'sawtooth', 0.08, 60);
    }
    if (pumpkinActive) {
      // Chase player
      const ang = TAS.math.angle(pumpkin.x, pumpkin.y, player.x + 7, player.y + 7);
      const pspd = 55 + level;
      pumpkin.x += Math.cos(ang) * pspd * dt;
      pumpkin.y += Math.sin(ang) * pspd * dt;

      if (player.invuln <= 0 && !player.dead &&
          TAS.math.dist(pumpkin.x, pumpkin.y, player.x + 7, player.y + 7) < 14) {
        killPlayer();
      }
    }

    // === LEVEL COMPLETE CHECK ===
    const aliveEnemies = enemies.filter(function(e) { return e.alive; });
    if (aliveEnemies.length === 0 && !levelComplete) {
      levelComplete = true;
      levelCompleteTimer = 0;
      score += 50 * level;
      TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.15]], 100);
      TAS.fx.flash('#aaddff', 0.3);
    }

    // === AMBIENT SNOW PARTICLES ===
    if (frame % 4 === 0) {
      TAS.particles.spawn(
        TAS.math.randRange(10, GW - 10), -5,
        '#ddeeff', 1, 0.3, { gravity: 0.2, size: 1, sizeVar: 2 }
      );
    }
  }
}

function killPlayer() {
  player.dead = true;
  player.invuln = 1.5;
  lives--;
  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#ff4444', 0.4);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 80);
  TAS.particles.spawn(player.x + 7, player.y + 7, '#88ccff', 12, 3);
}

function applyPowerup(type) {
  switch(type) {
    case 'speed': pw_speed = true; pw_timer = 10; break;
    case 'power': pw_power = true; pw_timer = 10; break;
    case 'range': pw_range = true; pw_timer = 10; break;
    case 'blast': pw_blast = true; pw_timer = 10; break;
    case 'life': lives = Math.min(lives + 1, 5); break;
    case 'food': score += TAS.math.randInt(1, 5) * 50; break;
  }
  TAS.audio.playTone(500, 0.1, 'sine', 0.06, 700);
  TAS.audio.playTone(700, 0.1, 'sine', 0.05, 900);
}

// === DRAW ===
function draw(dt) {
  // Background - changes per zone
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  if (state === 'playing' && level > 20) {
    grad.addColorStop(0, '#1a0a2a');
    grad.addColorStop(1, '#2a1544');
  } else if (state === 'playing' && level > 10) {
    grad.addColorStop(0, '#060a20');
    grad.addColorStop(1, '#101833');
  } else {
    grad.addColorStop(0, '#0a0a2a');
    grad.addColorStop(1, '#1a2244');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level ' + level + '  |  Enemies: ' + totalKills });
    return;
  }

  if (state === 'victory') {
    TAS.particles.draw();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('VICTORY!', GW / 2, GH * 0.2);
    ctx.fillStyle = '#88ddff';
    ctx.font = '12px monospace';
    ctx.fillText('All 30 levels cleared!', GW / 2, GH * 0.3);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Score: ' + score, GW / 2, GH * 0.43);
    ctx.fillStyle = '#44ff88';
    ctx.font = '11px monospace';
    ctx.fillText('Enemies defeated: ' + totalKills, GW / 2, GH * 0.53);
    if (score >= highScore) {
      const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('NEW HIGH SCORE!', GW / 2, GH * 0.63);
      ctx.globalAlpha = 1;
    }
    const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = '#88ccff';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.85);
    ctx.globalAlpha = 1;
    return;
  }

  // === GAME RENDER ===
  ctx.save();
  TAS.fx.applyShake();

  // Zone-based background details
  if (level <= 10) {
    // Frosty fields - soft stars
    ctx.fillStyle = '#ffffff';
    for (let i = 0; i < 12; i++) {
      const sx = ((i * 37 + frame * 0.02) % GW);
      const sy = ((i * 53 + 20) % (GH - 60)) + 40;
      ctx.globalAlpha = 0.2 + Math.sin(frame * 0.02 + i) * 0.1;
      ctx.fillRect(sx, sy, 1, 1);
    }
    ctx.globalAlpha = 1;
  } else if (level <= 20) {
    // Ice caverns - stalactites at top
    ctx.fillStyle = '#223355';
    for (let i = 0; i < 8; i++) {
      const sx = 20 + i * 40 + ((level * 7) % 20);
      const sh = 12 + (i * 3 + level) % 15;
      ctx.beginPath();
      ctx.moveTo(sx, HUD_H);
      ctx.lineTo(sx + 5, HUD_H + sh);
      ctx.lineTo(sx + 10, HUD_H);
      ctx.fill();
    }
  } else {
    // Crystal peak - glowing crystals in background
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 5; i++) {
      const cx = 30 + i * 65 + ((level * 11) % 30);
      const cy = 80 + (i * 47 + level * 3) % 200;
      const pulse = Math.sin(frame * 0.03 + i * 1.2) * 0.5 + 0.5;
      ctx.fillStyle = i % 2 === 0 ? '#44ddff' : '#ff88dd';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 10 - pulse * 3);
      ctx.lineTo(cx + 5, cy + 6);
      ctx.lineTo(cx - 5, cy + 6);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Draw platforms
  const platColor1 = level <= 10 ? '#445577' : level <= 20 ? '#334466' : '#443366';
  const platColor2 = level <= 10 ? '#88bbdd' : level <= 20 ? '#6699bb' : '#9977cc';
  const snowColor = level <= 10 ? '#ddeeff' : level <= 20 ? '#bbddee' : '#eeccff';
  for (const p of platforms) {
    if (p.wall) {
      ctx.fillStyle = level <= 20 ? '#334466' : '#332244';
      ctx.fillRect(p.x, p.y, p.w, p.h);
    } else if (p.y >= GH - 12) {
      // Floor
      ctx.fillStyle = '#556688';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = platColor2;
      ctx.fillRect(p.x, p.y, p.w, 2);
    } else {
      // Platform
      ctx.fillStyle = platColor1;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = platColor2;
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Snow on top
      ctx.fillStyle = snowColor;
      ctx.fillRect(p.x + 2, p.y - 2, p.w - 4, 3);
    }
  }

  // Draw powerups
  for (const pu of powerups) {
    const pulse = Math.sin(frame * 0.15 + pu.x) * 0.3 + 0.7;
    const colors = { speed: '#44ff88', power: '#ff44aa', range: '#44aaff', blast: '#ffaa44', life: '#ff6688', food: '#ffdd44' };
    const col = colors[pu.type] || '#fff';
    // Glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Body
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 4, 0, Math.PI * 2);
    ctx.fill();
    // Icon
    ctx.fillStyle = '#000';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    const icons = { speed: 'S', power: 'P', range: 'R', blast: 'B', life: '+', food: '$' };
    ctx.fillText(icons[pu.type] || '?', pu.x, pu.y + 2);
    // Flash effect when about to expire
    if (pu.life < 2 && Math.sin(frame * 0.2) > 0) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(pu.x, pu.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    if (e.frozen) {
      // Snowball (kickable)
      ctx.fillStyle = '#ccddff';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aabbdd';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2 - 2, e.y + e.h / 2 - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      // Kick indicator
      const blink = Math.sin(frame * 0.12) > 0;
      if (blink) {
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 4, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else {
      // Draw enemy body
      const col = getEnemyColor(e.type);
      ctx.fillStyle = col;

      if (e.type === 'boss') {
        // Boss is bigger
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Boss face
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 8, e.y + 8, 4, 4);
        ctx.fillRect(e.x + 16, e.y + 8, 4, 4);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 9, e.y + 9, 2, 2);
        ctx.fillRect(e.x + 17, e.y + 9, 2, 2);
        // HP bar
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x, e.y - 6, e.w, 3);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 3);
      } else {
        // Normal enemy - round blob
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 4, 3, 3);
        ctx.fillRect(e.x + 8, e.y + 4, 3, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 4, e.y + 5, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 5, 2, 2);
      }

      // Snow coverage overlay
      if (e.snowHits > 0) {
        const coverage = e.snowHits / e.maxSnow;
        ctx.globalAlpha = coverage * 0.6;
        ctx.fillStyle = '#ddeeff';
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw enemy projectiles
  for (const p of enemyProjectiles) {
    if (p.type === 'rock') {
      ctx.fillStyle = '#887766';
      ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
    } else if (p.type === 'bomb') {
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(p.x - 1, p.y - 6, 2, 4);
    } else if (p.type === 'fire') {
      ctx.fillStyle = frame % 4 < 2 ? '#ff4400' : '#ffaa00';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw snow puffs
  for (const s of snowPuffs) {
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(s.x + 3, s.y + 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw snowballs (rolling)
  for (const sb of snowballs) {
    ctx.save();
    ctx.translate(sb.x + sb.r, sb.y + sb.r);
    ctx.rotate(sb.angle);
    ctx.fillStyle = '#ddeeff';
    ctx.beginPath();
    ctx.arc(0, 0, sb.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aabbdd';
    ctx.beginPath();
    ctx.arc(-2, -2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#bbccee';
    ctx.beginPath();
    ctx.arc(3, 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Trail particles
    if (frame % 2 === 0) {
      TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r * 2, '#ccddff', 1, 0.5, { size: 1, sizeVar: 1 });
    }
  }

  // Draw player
  if (!player.dead) {
    const flicker = player.invuln > 0 && Math.floor(frame / 3) % 2 === 0;
    if (!flicker) {
      // Body - frost baseling
      ctx.fillStyle = '#66bbee';
      ctx.beginPath();
      ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2, 0, Math.PI * 2);
      ctx.fill();
      // Face
      ctx.fillStyle = '#fff';
      const eyeOff = player.dir > 0 ? 2 : -2;
      ctx.fillRect(player.x + 4 + eyeOff, player.y + 4, 3, 3);
      ctx.fillRect(player.x + 8 + eyeOff, player.y + 4, 3, 3);
      ctx.fillStyle = '#114466';
      ctx.fillRect(player.x + 5 + eyeOff, player.y + 5, 2, 2);
      ctx.fillRect(player.x + 9 + eyeOff, player.y + 5, 2, 2);
      // Snow cap
      ctx.fillStyle = '#ddeeff';
      ctx.beginPath();
      ctx.arc(player.x + player.w / 2, player.y + 2, 5, Math.PI, 0);
      ctx.fill();
      // Powerup glow
      if (pw_timer > 0) {
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.beginPath();
        ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2 + 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw pumpkin ghost
  if (pumpkinActive) {
    ctx.fillStyle = '#ff6600';
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.3;
    ctx.beginPath();
    ctx.arc(pumpkin.x, pumpkin.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(pumpkin.x, pumpkin.y, 7, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(pumpkin.x - 4, pumpkin.y - 3, 3, 3);
    ctx.fillRect(pumpkin.x + 1, pumpkin.y - 3, 3, 3);
    // Mouth
    ctx.fillRect(pumpkin.x - 3, pumpkin.y + 2, 6, 2);
    ctx.globalAlpha = 1;
  }

  // Draw score popups
  for (const sp of scorePopups) {
    ctx.globalAlpha = TAS.math.clamp(sp.life, 0, 1);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.globalAlpha = 1;
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  TAS.ui.drawHUD(score, level, lives, GW);

  // Enemy count indicator
  const aliveCount = enemies.filter(function(e) { return e.alive; }).length;
  if (aliveCount > 0 && levelIntroTimer <= 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#88aacc';
    ctx.font = '8px monospace';
    ctx.fillText('Enemies: ' + aliveCount, 6, HUD_H + 12);
  }

  // Level intro overlay
  if (levelIntroTimer > 0) {
    const alpha = TAS.math.clamp(levelIntroTimer / 0.5, 0, 1);
    ctx.fillStyle = 'rgba(5,10,30,' + (alpha * 0.7) + ')';
    ctx.fillRect(0, HUD_H, GW, GH - HUD_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#88ddff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('LEVEL ' + level, GW / 2, GH / 2 - 20);
    if (level % 10 === 0) {
      ctx.fillStyle = '#ff6644';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('BOSS FIGHT!', GW / 2, GH / 2 + 10);
    } else {
      const desc = level <= 10 ? 'Frosty Fields' : level <= 20 ? 'Ice Caverns' : 'Crystal Peak';
      ctx.fillStyle = '#667788';
      ctx.font = '10px monospace';
      ctx.fillText(desc, GW / 2, GH / 2 + 10);
    }
    ctx.fillStyle = '#ffdd44';
    ctx.font = '9px monospace';
    ctx.fillText('Get ready...', GW / 2, GH / 2 + 35);
  }

  // Level complete message
  if (levelComplete) {
    ctx.fillStyle = 'rgba(5,10,30,0.5)';
    ctx.fillRect(0, GH / 2 - 40, GW, 80);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('LEVEL CLEAR!', GW / 2, GH / 2 - 10);
    ctx.fillStyle = '#88ccff';
    ctx.font = '11px monospace';
    ctx.fillText('+' + (50 * level) + ' bonus', GW / 2, GH / 2 + 10);
    if (comboMax > 1) {
      ctx.fillStyle = '#ffaa44';
      ctx.font = '9px monospace';
      ctx.fillText('Best chain: x' + comboMax, GW / 2, GH / 2 + 26);
    }
  }

  // Hurry warning
  if (levelTimer > HURRY_TIME - 5 && !pumpkinActive) {
    const blink = Math.sin(frame * 0.15) > 0;
    if (blink) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('HURRY UP!', GW / 2, GH / 2 - 30);
    }
  }

  // Powerup indicator
  if (pw_timer > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffdd44';
    ctx.font = '8px monospace';
    const active = [];
    if (pw_speed) active.push('SPD');
    if (pw_power) active.push('PWR');
    if (pw_range) active.push('RNG');
    if (pw_blast) active.push('BLT');
    ctx.fillText(active.join(' ') + ' ' + Math.ceil(pw_timer) + 's', GW - 10, HUD_H + 12);
  }

  // Chain indicator
  if (chainCount > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffaa44';
    ctx.font = 'bold 10px monospace';
    ctx.globalAlpha = Math.min(1, 2 - (frame % 60) / 30);
    ctx.fillText('x' + chainCount + ' CHAIN!', GW / 2, HUD_H + 14);
    ctx.globalAlpha = 1;
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  // Snowy background
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0a1530');
  grad.addColorStop(1, '#1a2850');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Snow particles on title
  if (frame % 2 === 0) {
    TAS.particles.spawn(
      TAS.math.randRange(0, GW), -5,
      '#ddeeff', 1, 0.4, { gravity: 0.3, size: 1, sizeVar: 2 }
    );
  }
  TAS.particles.draw();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SNOW BROS', GW / 2 + 2, 82);
  ctx.fillStyle = '#88ddff';
  ctx.fillText('SNOW BROS', GW / 2, 80);

  ctx.fillStyle = '#aabbcc';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 100);

  // Instructions
  ctx.fillStyle = '#667788';
  ctx.font = '9px monospace';
  ctx.fillText('Throw snow at enemies to freeze them', GW / 2, 150);
  ctx.fillText('Kick frozen enemies to roll snowballs!', GW / 2, 165);
  ctx.fillText('Snowballs bowl over everything in their path', GW / 2, 180);

  // Scoring info
  ctx.fillStyle = '#778899';
  ctx.font = '8px monospace';
  ctx.fillText('Chain kills for massive bonus points!', GW / 2, 200);
  ctx.fillText('100 > 200 > 400 > 800 > 1600...', GW / 2, 212);

  // Controls
  ctx.fillStyle = '#556677';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS/WASD = Move   SPACE/UP = Jump', GW / 2, 235);
  ctx.fillText('Z/X = Throw Snow', GW / 2, 248);

  // Enemy types preview
  ctx.fillStyle = '#556677';
  ctx.font = '7px monospace';
  ctx.fillText('5 enemy types  |  3 boss fights  |  30 levels', GW / 2, 265);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 290);
  }

  // Demo characters
  // Player
  ctx.fillStyle = '#66bbee';
  ctx.beginPath();
  ctx.arc(GW / 2 - 50, 320, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.arc(GW / 2 - 50, 314, 5, Math.PI, 0);
  ctx.fill();

  // Enemy
  ctx.fillStyle = '#ff5555';
  ctx.beginPath();
  ctx.arc(GW / 2 + 50, 320, 8, 0, Math.PI * 2);
  ctx.fill();

  // Snowball between them
  const sbx = GW / 2 + Math.sin(frame * 0.03) * 15;
  ctx.fillStyle = '#ddeeff';
  ctx.beginPath();
  ctx.arc(sbx, 320, 6, 0, Math.PI * 2);
  ctx.fill();

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
