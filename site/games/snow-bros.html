<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Bros - A Baseling Adventure</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

const GW = 320, GH = 400;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'POOP' } });

// === CONSTANTS ===
const GRAVITY = 600;
const PLAYER_SPEED = 100;
const JUMP_FORCE = -260;
const SPORE_SPEED = 180;
const SPOREBALL_SPEED = 160;
const SPOREBALL_LIFE = 5;
const HURRY_TIME = 25;
const HUD_H = 28;

// === ZONE DEFINITIONS ===
const ZONES = [
  { name: 'Frozen Garden',       bg1: '#1a1c2c', bg2: '#2a2e3c', plat1: '#3a4a3a', plat2: '#38d973', accent: '#38d973', top: '#7a444a' },
  { name: 'POOP Reactor Depths', bg1: '#1a1c2c', bg2: '#2a1f3c', plat1: '#3a3355', plat2: '#a855f7', accent: '#a855f7', top: '#7a444a' },
  { name: 'Spore Snowfield',    bg1: '#1a1c2c', bg2: '#1c2e2a', plat1: '#2a4a2a', plat2: '#38d973', accent: '#3cacd7', top: '#7a444a' },
  { name: 'Mycelium Hive',      bg1: '#1a1c2c', bg2: '#2a2210', plat1: '#4a3a22', plat2: '#f4b41b', accent: '#f4b41b', top: '#7a444a' },
  { name: "Namaris' Frozen Hold", bg1: '#1a1c2c', bg2: '#1a0f2a', plat1: '#3a2a4a', plat2: '#a855f7', accent: '#e6482e', top: '#7a444a' }
];
function getZone(lvl) { return ZONES[Math.min(Math.floor((lvl - 1) / 10), 4)]; }
function getZoneIndex(lvl) { return Math.min(Math.floor((lvl - 1) / 10), 4); }

// === NFT STAT BONUSES ===
var statB = { str: 0, dex: 0, con: 0, int: 0, wis: 0, cha: 0, damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, color: null, name: '', icon: '', level: 0 };

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('snowbros_hi');
let lives = 3;
let level = 1;
let frame = 0;
let levelTimer = 0;
let pumpkinActive = false;
let pumpkin = { x: 0, y: 0 };
let levelComplete = false;
let levelCompleteTimer = 0;
let player = null;
let enemies = [];
let sporePuffs = [];
let sporeBalls = [];
let powerups = [];
let platforms = [];
let chainCount = 0;
let scorePopups = [];
let levelIntroTimer = 0;
let comboMax = 0;
let totalKills = 0;
let wipeTimer = 0;
let wipeDir = 1;

// Baseling food items (drop on enemy kill, CHA boosts rate)
const TASERN_FOODS = [
  { name: 'POOP Token',      color: '#7a444a', pts: 100, icon: 'P' },
  { name: 'Spore Gem',       color: '#a855f7', pts: 150, icon: 'S' },
  { name: 'Garden Seed',     color: '#38d973', pts: 200, icon: 'G' },
  { name: 'Frozen Mycelium', color: '#3cacd7', pts: 250, icon: 'M' }
];
let foodItems = [];

// === LEVEL GENERATION ===
function generatePlatforms(lvl) {
  const plats = [];
  plats.push({ x: 0, y: GH - 10, w: GW, h: 10 });
  plats.push({ x: 0, y: 0, w: 8, h: GH, wall: true });
  plats.push({ x: GW - 8, y: 0, w: 8, h: GH, wall: true });

  const tierCount = 4 + Math.min(2, Math.floor(lvl / 8));
  const spacing = (GH - HUD_H - 40) / (tierCount + 1);

  for (let t = 0; t < tierCount; t++) {
    const y = Math.floor(HUD_H + 40 + spacing * (t + 1));
    const seed = (lvl * 7 + t * 13) % 7;

    if (seed === 0) {
      const gapW = 40 + (lvl % 3) * 10;
      const gapX = Math.floor(GW / 2 - gapW / 2);
      plats.push({ x: 16, y: y, w: gapX - 16, h: 8 });
      plats.push({ x: gapX + gapW, y: y, w: GW - 16 - (gapX + gapW), h: 8 });
    } else if (seed === 1) {
      plats.push({ x: 16, y: y, w: Math.floor(GW * 0.55), h: 8 });
    } else if (seed === 2) {
      plats.push({ x: Math.floor(GW * 0.35), y: y, w: Math.floor(GW * 0.55) - 16, h: 8 });
    } else if (seed === 3) {
      const pw = 60;
      plats.push({ x: 20, y: y, w: pw, h: 8 });
      plats.push({ x: Math.floor(GW / 2 - pw / 2), y: y, w: pw, h: 8 });
      plats.push({ x: GW - 20 - pw, y: y, w: pw, h: 8 });
    } else if (seed === 4) {
      const stepW = 50;
      const steps = 3;
      for (let s = 0; s < steps; s++) {
        plats.push({ x: Math.floor(16 + s * (GW - 32) / steps), y: y - s * 12, w: stepW, h: 8 });
      }
    } else if (seed === 5) {
      const islandW = 55;
      plats.push({ x: 25, y: y, w: islandW, h: 8 });
      plats.push({ x: GW - 25 - islandW, y: y, w: islandW, h: 8 });
    } else {
      const g1 = 50 + ((lvl + t) % 3) * 15;
      const g2 = GW - 50 - ((lvl + t) % 3) * 15 - 30;
      plats.push({ x: 16, y: y, w: g1 - 16, h: 8 });
      plats.push({ x: g1 + 30, y: y, w: g2 - g1 - 30, h: 8 });
      plats.push({ x: g2 + 30, y: y, w: GW - 16 - g2 - 30, h: 8 });
    }
  }
  return plats;
}

function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: Math.floor(x), y: Math.floor(y), text: text, color: color || '#ffdd44', life: 1.2, vy: -40 });
}

function getEnemyCount(lvl) {
  if (lvl <= 5) return 2 + Math.floor(lvl / 2);
  if (lvl <= 10) return 3 + Math.floor(lvl / 3);
  if (lvl <= 20) return 4 + Math.floor((lvl - 10) / 3);
  return 5 + Math.floor((lvl - 20) / 4);
}

// Baseling enemy types
function getEnemyType(lvl) {
  const pool = ['grunt'];
  if (lvl >= 4) pool.push('wasp');
  if (lvl >= 8) pool.push('golem');
  if (lvl >= 12) pool.push('grunt', 'wasp');
  if (lvl >= 18) pool.push('golem');
  return pool[TAS.math.randInt(0, pool.length - 1)];
}

function getSporeToCoat(type) {
  switch(type) {
    case 'grunt': return 3;
    case 'wasp': return 4;
    case 'golem': return 3; // 3 full coats needed (each resets)
    default: return 3;
  }
}

function getEnemyColor(type) {
  switch(type) {
    case 'grunt': return '#55cc55';
    case 'wasp': return '#ddaa33';
    case 'golem': return '#8866aa';
    default: return '#55cc55';
  }
}

function getEnemySpeed(type, lvl) {
  const base = { grunt: 45, wasp: 70, golem: 22 };
  return (base[type] || 40) + lvl * 1.5;
}

function spawnEnemy(type, lvl) {
  const validPlats = platforms.filter(function(p) { return !p.wall && p.y < GH - 20 && p.w > 30; });
  const plat = validPlats.length > 0 ? validPlats[TAS.math.randInt(0, validPlats.length - 1)] : platforms[0];
  const isWasp = type === 'wasp';
  return {
    x: Math.floor(plat.x + TAS.math.randRange(10, plat.w - 10)),
    y: Math.floor(isWasp ? plat.y - 30 - TAS.math.randRange(0, 20) : plat.y - 14),
    w: type === 'golem' ? 18 : 14,
    h: type === 'golem' ? 18 : 14,
    vx: getEnemySpeed(type, lvl) * (Math.random() < 0.5 ? 1 : -1),
    vy: 0,
    type: type,
    sporeHits: 0,
    maxSpore: getSporeToCoat(type),
    coatCount: 0, // golem: tracks full coats
    grounded: !isWasp,
    flying: isWasp,
    dir: 1,
    jumpTimer: 0,
    attackTimer: TAS.math.randRange(2, 4),
    gooTimer: type === 'grunt' ? TAS.math.randRange(1, 3) : 999,
    alive: true,
    frozen: false,
    flyY: isWasp ? plat.y - 30 - TAS.math.randRange(0, 20) : 0,
    flyPhase: Math.random() * Math.PI * 2
  };
}

// Goo trails from Frost Molds
let gooTrails = [];

// === BOSS ===
function spawnBoss(lvl) {
  const zi = getZoneIndex(lvl);
  const isQueen = zi % 2 === 0; // queen on zones 0,2,4; giant mycelial on 1,3
  return {
    x: Math.floor(GW / 2), y: GH - 50,
    w: 28, h: 28,
    vx: 50 + lvl * 2,
    vy: 0,
    type: 'boss',
    bossType: isQueen ? 'queen' : 'mycelial',
    hp: 3 + Math.floor(lvl / 10),
    maxHp: 3 + Math.floor(lvl / 10),
    sporeHits: 0,
    maxSpore: 99,
    coatCount: 0,
    grounded: false,
    flying: false,
    dir: 1,
    jumpTimer: 0,
    attackTimer: 2,
    gooTimer: 999,
    alive: true,
    frozen: false,
    phase: 0,
    phaseTimer: 0,
    tendrilTimer: 0,
    flyY: 0,
    flyPhase: 0
  };
}

// === PROJECTILES ===
let enemyProjectiles = [];
let tendrils = []; // mycelial boss tendrils

// === POWERUP TYPES ===
const POWERUP_TYPES = ['speed', 'power', 'range', 'blast', 'life'];
function spawnPowerup(x, y) {
  // Base 35% + CHA bonus
  const dropChance = 0.35 + statB.cha * 0.015;
  if (Math.random() > dropChance) return;
  const type = POWERUP_TYPES[TAS.math.randInt(0, POWERUP_TYPES.length - 1)];
  powerups.push({ x: Math.floor(x), y: Math.floor(y), type: type, vy: -80, life: 8, grounded: false });
}

// Baseling food drop (separate from powerups, CHA boosts)
function spawnFood(x, y) {
  const foodChance = 0.2 + statB.cha * 0.02;
  if (Math.random() > foodChance) return;
  const food = TASERN_FOODS[TAS.math.randInt(0, TASERN_FOODS.length - 1)];
  foodItems.push({
    x: Math.floor(x), y: Math.floor(y),
    vy: -60, life: 10, grounded: false,
    name: food.name, color: food.color, pts: food.pts, icon: food.icon
  });
}

// === PLAYER POWERUP STATE ===
let pw_speed = false, pw_power = false, pw_range = false, pw_blast = false;
let pw_timer = 0;

// Charged spore state
let chargeTimer = 0;
let chargeReady = false;

// === INIT LEVEL ===
function initLevel() {
  platforms = generatePlatforms(level);
  enemies = [];
  sporePuffs = [];
  sporeBalls = [];
  powerups = [];
  foodItems = [];
  enemyProjectiles = [];
  tendrils = [];
  gooTrails = [];
  scorePopups = [];
  pumpkinActive = false;
  levelComplete = false;
  levelCompleteTimer = 0;
  levelTimer = 0;
  levelIntroTimer = 1.8;
  chainCount = 0;
  comboMax = 0;
  chargeTimer = 0;
  chargeReady = false;

  const isBoss = (level % 10 === 0);

  if (isBoss) {
    enemies.push(spawnBoss(level));
  } else {
    const count = getEnemyCount(level);
    for (let i = 0; i < count; i++) {
      enemies.push(spawnEnemy(getEnemyType(level), level));
    }
  }

  player = {
    x: Math.floor(GW / 2 - 7), y: GH - 24,
    w: 14, h: 14,
    vx: 0, vy: 0,
    dir: 1,
    grounded: false,
    shootCooldown: 0,
    invuln: 0,
    dead: false
  };
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  totalKills = 0;
  pw_speed = pw_power = pw_range = pw_blast = false;
  pw_timer = 0;
  // Load NFT stat bonuses
  statB = (window.NftLoader && window.NftLoader.getStatBonuses) ? NftLoader.getStatBonuses() : { str: 0, dex: 0, con: 0, int: 0, wis: 0, cha: 0, damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, color: null, name: '', icon: '', level: 0 };
  lives += statB.lives; // CON bonus lives
  TAS.particles.clear();
  initLevel();
}

// === PHYSICS HELPERS ===
function applyGravity(ent, dt) {
  ent.vy += GRAVITY * dt;
  ent.y += ent.vy * dt;
  ent.grounded = false;

  for (const p of platforms) {
    if (p.wall) continue;
    if (ent.vy >= 0 &&
        ent.x + ent.w > p.x && ent.x < p.x + p.w &&
        ent.y + ent.h > p.y && ent.y + ent.h < p.y + p.h + ent.vy * dt + 4) {
      ent.y = p.y - ent.h;
      ent.vy = 0;
      ent.grounded = true;
    }
  }

  if (ent.y > GH + 20) {
    ent.y = -ent.h;
  }
}

function wallCollide(ent) {
  if (ent.x < 8) { ent.x = 8; return -1; }
  if (ent.x + ent.w > GW - 8) { ent.x = GW - 8 - ent.w; return -1; }
  return 1;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Floor wipe transition
  if (wipeTimer > 0) {
    wipeTimer -= dt;
    return;
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (frame % 3 === 0) {
      const col = state === 'victory' ? '#88ff66' : '#66ddaa';
      TAS.particles.spawn(
        TAS.math.randRange(0, GW), state === 'victory' ? GH + 5 : TAS.math.randRange(0, GH),
        col, 1, state === 'victory' ? 1.5 : 0.5, { gravity: state === 'victory' ? -1 : 0.5, size: 2, sizeVar: 2 }
      );
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    // Level intro countdown
    if (levelIntroTimer > 0) {
      levelIntroTimer -= dt;
      if (frame % 3 === 0) {
        const zone = getZone(level);
        TAS.particles.spawn(
          TAS.math.randRange(10, GW - 10), -5,
          zone.accent, 1, 0.4, { gravity: 0.2, size: 1, sizeVar: 2 }
        );
      }
      return;
    }

    // Update score popups
    for (let i = scorePopups.length - 1; i >= 0; i--) {
      const sp = scorePopups[i];
      sp.y += sp.vy * dt;
      sp.life -= dt;
      if (sp.life <= 0) scorePopups.splice(i, 1);
    }

    // Level complete check
    if (levelComplete) {
      levelCompleteTimer += dt;
      if (levelCompleteTimer > 2) {
        level++;
        if (level > 50) {
          score += 5000;
          state = 'victory';
          if (score > highScore) { highScore = score; TAS.score.save('snowbros_hi', score); }
        } else {
          // Floor wipe transition
          wipeTimer = 0.6;
          wipeDir = (level % 2 === 0) ? 1 : -1;
          initLevel();
        }
      }
      return;
    }

    // Player dead
    if (player.dead) {
      player.invuln -= dt;
      if (player.invuln <= 0) {
        if (lives <= 0) {
          state = 'gameOver';
          if (score > highScore) { highScore = score; TAS.score.save('snowbros_hi', score); }
        } else {
          player.dead = false;
          player.x = Math.floor(GW / 2 - 7);
          player.y = GH - 24;
          player.vx = 0;
          player.vy = 0;
          player.invuln = 2;
        }
      }
      return;
    }

    // Powerup timer
    if (pw_timer > 0) {
      pw_timer -= dt;
      if (pw_timer <= 0) {
        pw_speed = pw_power = pw_range = pw_blast = false;
      }
    }

    // === PLAYER INPUT ===
    const kl = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
    const kr = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
    const kj = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a;
    const ks = TAS.input.keys['KeyZ'] || TAS.input.keys['KeyX'] || TAS.input.touch.b;

    // DEX -> move speed
    const spd = (pw_speed ? PLAYER_SPEED * 1.5 : PLAYER_SPEED) * statB.speed;
    player.vx = 0;
    if (kl) { player.vx = -spd; player.dir = -1; }
    if (kr) { player.vx = spd; player.dir = 1; }

    player.x += player.vx * dt;
    player.x = Math.floor(player.x);
    wallCollide(player);

    if (kj && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      TAS.audio.playTone(220, 0.08, 'triangle', 0.06, 300);
    }

    applyGravity(player, dt);
    player.y = Math.floor(player.y);

    // Shoot spore / charged spore (hold + STR>=10)
    player.shootCooldown -= dt;

    if (ks) {
      // Charged spore: STR >= 10 or damage >= 1.5
      if (statB.str >= 10 || statB.damage >= 1.5) {
        chargeTimer += dt;
        if (chargeTimer >= 0.5 && !chargeReady) {
          chargeReady = true;
          TAS.audio.playTone(800, 0.1, 'sine', 0.05, 1000);
        }
      }
      if (player.shootCooldown <= 0 && !chargeReady) {
        // WIS -> throw cooldown
        player.shootCooldown = Math.max(0.1, 0.2 * statB.cooldown);
        const range = pw_range ? 120 : 70;
        // STR -> spore ball size
        const sz = Math.floor(6 + statB.damage * 2);
        sporePuffs.push({
          x: player.x + (player.dir > 0 ? player.w : -sz),
          y: player.y + 4,
          vx: SPORE_SPEED * player.dir,
          w: sz, h: sz,
          life: range / SPORE_SPEED,
          power: pw_power
        });
        TAS.audio.playNoise(0.06, 0.04, 2000);
      }
    } else {
      if (chargeReady) {
        // Release charged spore ball - coats in one hit
        player.shootCooldown = Math.max(0.2, 0.5 * statB.cooldown);
        const sz = Math.floor(10 + statB.damage * 3);
        sporePuffs.push({
          x: player.x + (player.dir > 0 ? player.w : -sz),
          y: player.y + 2,
          vx: SPORE_SPEED * 0.8 * player.dir,
          w: sz, h: sz,
          life: 0.8,
          power: true,
          charged: true
        });
        TAS.audio.playTone(200, 0.2, 'sawtooth', 0.1, 400);
        TAS.fx.shake(2, 0.9);
        TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#88ff66', 6, 1.5);
      }
      chargeTimer = 0;
      chargeReady = false;
    }

    // Invulnerability flicker
    if (player.invuln > 0) player.invuln -= dt;

    // === SPORE PUFFS ===
    for (let i = sporePuffs.length - 1; i >= 0; i--) {
      const s = sporePuffs[i];
      s.x += s.vx * dt;
      s.life -= dt;
      if (s.life <= 0 || s.x < 8 || s.x > GW - 8) {
        sporePuffs.splice(i, 1);
        continue;
      }
      // Hit enemies
      let hit = false;
      for (const e of enemies) {
        if (!e.alive || e.frozen) continue;
        if (TAS.hit.rectOverlap(s.x, s.y, s.w, s.h, e.x, e.y, e.w, e.h)) {
          // STR -> damage (spore coating speed)
          const coatAmt = s.power ? e.maxSpore : Math.max(1, Math.floor(statB.damage));
          e.sporeHits += coatAmt;

          if (e.type === 'golem') {
            // Golem: needs 3 full coats
            if (e.sporeHits >= e.maxSpore) {
              e.coatCount++;
              e.sporeHits = 0;
              if (e.coatCount >= 3) {
                e.frozen = true;
                e.vx = 0;
                TAS.audio.playTone(600, 0.15, 'sine', 0.06, 800);
              } else {
                TAS.audio.playTone(400, 0.1, 'triangle', 0.06);
                TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#aa77cc', 5, 1.5);
                addScorePopup(e.x + e.w / 2, e.y - 10, 'COAT ' + e.coatCount + '/3', '#aa77cc');
              }
            } else {
              TAS.audio.playTone(400, 0.05, 'triangle', 0.04);
              e.vx *= 0.8;
            }
          } else if (e.type !== 'boss') {
            if (e.sporeHits >= e.maxSpore) {
              e.frozen = true;
              e.vx = 0;
              if (e.flying) { e.flying = false; e.vy = 0; }
              TAS.audio.playTone(600, 0.15, 'sine', 0.06, 800);
            } else {
              TAS.audio.playTone(400, 0.05, 'triangle', 0.04);
              e.vx *= 0.7;
            }
          }
          // Mycelium particles
          TAS.particles.spawn(s.x, s.y, '#88cc66', 3, 1, { size: 2, gravity: 0.5 });
          hit = true;
          break;
        }
      }
      if (hit) sporePuffs.splice(i, 1);
    }

    // === SPORE BALLS (rolling) ===
    for (let i = sporeBalls.length - 1; i >= 0; i--) {
      const sb = sporeBalls[i];
      sb.x += sb.vx * dt;
      sb.vy += GRAVITY * dt;
      sb.y += sb.vy * dt;
      sb.life -= dt;
      sb.angle += sb.vx * dt * 0.05;

      sb.x = Math.floor(sb.x);
      sb.y = Math.floor(sb.y);

      // Wall bounce
      if (sb.x < 8) { sb.x = 8; sb.vx = Math.abs(sb.vx); }
      if (sb.x + sb.r * 2 > GW - 8) { sb.x = GW - 8 - sb.r * 2; sb.vx = -Math.abs(sb.vx); }

      // Platform collision for rolling
      for (const p of platforms) {
        if (p.wall) continue;
        if (sb.vy >= 0 && sb.vx !== 0 &&
            sb.x + sb.r * 2 > p.x && sb.x < p.x + p.w &&
            sb.y + sb.r * 2 > p.y && sb.y + sb.r * 2 < p.y + 12) {
          sb.y = p.y - sb.r * 2;
          sb.vy = 0;
        }
      }

      if (sb.y > GH + 20) sb.y = -20;

      // Hit enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (!e.alive || e.frozen) continue;
        if (TAS.hit.rectOverlap(sb.x, sb.y, sb.r * 2, sb.r * 2, e.x, e.y, e.w, e.h)) {
          if (e.type === 'boss') {
            e.hp--;
            TAS.fx.shake(6, 0.85);
            TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1, 50);
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffaa00', 12, 3);
            addScorePopup(e.x + e.w / 2, e.y - 10, 'HIT!', '#ffaa00');
            if (e.hp <= 0) {
              e.alive = false;
              const bossScore = Math.floor(1000 * statB.scoreMult);
              score += bossScore;
              chainCount++;
              totalKills++;
              TAS.fx.flash('#88ff44', 0.5);
              TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 80);
              TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#88ff44', 20, 4);
              addScorePopup(e.x + e.w / 2, e.y - 10, String(bossScore), '#ffdd44');
              spawnPowerup(e.x, e.y);
              spawnFood(e.x + 10, e.y);
              spawnFood(e.x - 10, e.y);
            }
          } else {
            e.alive = false;
            chainCount++;
            totalKills++;
            if (chainCount > comboMax) comboMax = chainCount;
            // INT -> score mult
            const pts = Math.floor(100 * Math.pow(2, Math.min(chainCount - 1, 4)) * statB.scoreMult);
            score += pts;
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, getEnemyColor(e.type), 8, 2.5);
            const pitchBonus = Math.min(chainCount, 5);
            TAS.audio.playTone(300 + pitchBonus * 100, 0.1, 'square', 0.06);
            addScorePopup(e.x + e.w / 2, e.y - 10, String(pts), chainCount > 1 ? '#ff8844' : '#ffdd44');
            spawnPowerup(e.x, e.y);
            spawnFood(e.x, e.y);
          }
          if (pw_blast) {
            TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r, '#66ff88', 15, 4);
            TAS.fx.shake(4, 0.85);
          }
        }
      }

      if (sb.life <= 0) {
        TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r, '#88cc66', 6, 1.5);
        sporeBalls.splice(i, 1);
        chainCount = 0;
      }
    }

    // === FROZEN ENEMIES -> KICKABLE ===
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (!e.alive || !e.frozen) continue;

      applyGravity(e, dt);

      // Player kick
      if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 2, e.y - 2, e.w + 4, e.h + 4)) {
        const kickDir = (player.x + player.w / 2 < e.x + e.w / 2) ? 1 : -1;
        // STR -> bigger spore ball
        const ballR = Math.floor(8 + statB.damage * 2);
        sporeBalls.push({
          x: e.x, y: e.y,
          vx: SPOREBALL_SPEED * kickDir,
          vy: -30,
          r: ballR,
          life: SPOREBALL_LIFE,
          angle: 0
        });
        e.alive = false;
        chainCount = 0;
        TAS.audio.playTone(150, 0.12, 'sawtooth', 0.08, 80);
        TAS.audio.playNoise(0.08, 0.05, 500);
        TAS.audio.playTone(80, 0.06, 'triangle', 0.1);
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#88cc66', 8, 2.5);
        TAS.particles.spawn(e.x + kickDir * 10, e.y + e.h / 2, '#66aa44', 4, 1.5, { size: 1, sizeVar: 1 });
        TAS.fx.shake(3, 0.9);
        addScorePopup(e.x + e.w / 2, e.y - 10, 'KICK!', '#88ff44');
      }
    }

    // === ENEMIES AI ===
    for (const e of enemies) {
      if (!e.alive || e.frozen) continue;

      // Wasp flying behavior
      if (e.flying) {
        e.flyPhase += dt * 2;
        e.y = Math.floor(e.flyY + Math.sin(e.flyPhase) * 15);
        e.x += e.vx * dt;
        e.x = Math.floor(e.x);
        const wallHit = wallCollide(e);
        if (wallHit < 0) e.vx = -e.vx;

        // Wasp dive attack
        e.attackTimer -= dt;
        if (e.attackTimer <= 0 && Math.abs(player.x - e.x) < 40) {
          e.attackTimer = TAS.math.randRange(2, 4);
          // Shoot stinger
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y + e.h,
            vx: 0, vy: 120,
            w: 4, h: 6, type: 'stinger', gravity: false
          });
          TAS.audio.playTone(600, 0.05, 'triangle', 0.03);
        }
      } else {
        // Ground enemy movement
        const slowFactor = e.sporeHits > 0 ? Math.max(0.3, 1 - e.sporeHits * 0.2) : 1;
        e.x += e.vx * slowFactor * dt;
        e.x = Math.floor(e.x);
        const wallHit = wallCollide(e);
        if (wallHit < 0) e.vx = -e.vx;

        applyGravity(e, dt);
        e.y = Math.floor(e.y);

        // Platform edge turn
        if (e.grounded) {
          for (const p of platforms) {
            if (p.wall) continue;
            if (e.x + e.w > p.x && e.x < p.x + p.w && Math.abs(e.y + e.h - p.y) < 2) {
              if (e.x < p.x + 4 && e.vx < 0) e.vx = Math.abs(e.vx);
              if (e.x + e.w > p.x + p.w - 4 && e.vx > 0) e.vx = -Math.abs(e.vx);
            }
          }
        }

        // Frost Mold goo trail
        if (e.type === 'grunt' && e.grounded) {
          e.gooTimer -= dt;
          if (e.gooTimer <= 0) {
            e.gooTimer = TAS.math.randRange(0.5, 1.5);
            gooTrails.push({ x: Math.floor(e.x + e.w / 2), y: Math.floor(e.y + e.h), life: 6 });
          }
        }

        // Icicle Fungus ground pound (attacks)
        if (e.type === 'golem') {
          e.attackTimer -= dt;
          if (e.attackTimer <= 0 && e.grounded) {
            e.attackTimer = TAS.math.randRange(3, 5);
            // Ground pound - creates shockwave projectile
            TAS.fx.shake(3, 0.9);
            TAS.audio.playTone(80, 0.2, 'sawtooth', 0.1, 40);
            enemyProjectiles.push({
              x: e.x - 10, y: e.y + e.h - 4,
              vx: -60, vy: 0,
              w: 12, h: 4, type: 'shockwave', gravity: false, timer: 1.5
            });
            enemyProjectiles.push({
              x: e.x + e.w + 10, y: e.y + e.h - 4,
              vx: 60, vy: 0,
              w: 12, h: 4, type: 'shockwave', gravity: false, timer: 1.5
            });
          }
        }

        // Jumping
        e.jumpTimer -= dt;
        if (e.grounded && e.jumpTimer <= 0) {
          const jumpChance = e.type === 'grunt' ? 0.01 : 0.005;
          if (Math.random() < jumpChance) {
            e.vy = JUMP_FORCE * 0.85;
            e.grounded = false;
            e.jumpTimer = 2;
          }
        }
      }

      // Boss patterns
      if (e.type === 'boss') {
        e.phaseTimer += dt;
        if (e.bossType === 'queen') {
          // Blizzard Parasite: spawns minions, shoots goo
          if (e.phaseTimer > 3) {
            e.phaseTimer = 0;
            e.phase = (e.phase + 1) % 3;
            if (e.phase === 0) {
              // Spawn 1-2 mini grunts
              const minionCount = 1 + (e.hp < e.maxHp / 2 ? 1 : 0);
              for (let m = 0; m < minionCount; m++) {
                const minion = spawnEnemy('grunt', level);
                minion.w = 10; minion.h = 10;
                minion.x = Math.floor(e.x + (m === 0 ? -20 : 20));
                minion.y = Math.floor(e.y);
                enemies.push(minion);
              }
              TAS.audio.playTone(300, 0.15, 'square', 0.08);
            } else if (e.phase === 1) {
              // Jump slam
              e.vy = JUMP_FORCE * 1.2;
              e.grounded = false;
            } else {
              // Goo barrage
              for (let b = 0; b < 3; b++) {
                (function(idx) {
                  setTimeout(function() {
                    if (!e.alive) return;
                    enemyProjectiles.push({
                      x: e.x + e.w / 2, y: e.y,
                      vx: (Math.random() - 0.5) * 120,
                      vy: -100 - Math.random() * 60,
                      w: 6, h: 6, type: 'goo', gravity: true
                    });
                  }, idx * 300);
                })(b);
              }
            }
          }
        } else {
          // Frozen Mycelial: extends tendrils
          if (e.phaseTimer > 2.5) {
            e.phaseTimer = 0;
            e.phase = (e.phase + 1) % 3;
            if (e.phase === 0) {
              // Tendril sweep: 3 tendrils reach across platforms
              for (let t = 0; t < 3; t++) {
                const tx = TAS.math.randRange(20, GW - 20);
                const ty = e.y;
                tendrils.push({
                  x: Math.floor(tx), y: Math.floor(ty),
                  targetY: GH - 20,
                  progress: 0, life: 2.5
                });
              }
              TAS.audio.playTone(150, 0.3, 'sawtooth', 0.08, 80);
            } else if (e.phase === 1) {
              // Spore burst: radial projectiles
              for (let a = 0; a < 6; a++) {
                const ang = (a / 6) * Math.PI * 2;
                enemyProjectiles.push({
                  x: e.x + e.w / 2, y: e.y + e.h / 2,
                  vx: Math.cos(ang) * 80,
                  vy: Math.sin(ang) * 80,
                  w: 5, h: 5, type: 'spore_proj', gravity: false, timer: 2
                });
              }
              TAS.audio.playNoise(0.12, 0.06, 800);
            } else {
              // Jump
              e.vy = JUMP_FORCE * 1.1;
              e.grounded = false;
            }
          }
        }
        // Boss always chases player
        if (e.grounded) {
          if (player.x < e.x) e.vx = -Math.abs(e.vx);
          else e.vx = Math.abs(e.vx);
        }
      }

      // Enemy collision with player
      if (player.invuln <= 0 && !player.dead &&
          TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        killPlayer();
      }
    }

    // === GOO TRAILS ===
    for (let i = gooTrails.length - 1; i >= 0; i--) {
      gooTrails[i].life -= dt;
      if (gooTrails[i].life <= 0) { gooTrails.splice(i, 1); continue; }
      // Player steps in goo = slowed
      const g = gooTrails[i];
      if (player.invuln <= 0 && !player.dead &&
          Math.abs(player.x + player.w / 2 - g.x) < 8 &&
          Math.abs(player.y + player.h - g.y) < 6) {
        player.vx *= 0.3;
      }
    }

    // === TENDRILS (mycelial boss) ===
    for (let i = tendrils.length - 1; i >= 0; i--) {
      const t = tendrils[i];
      t.progress = Math.min(1, t.progress + dt * 1.5);
      t.life -= dt;
      if (t.life <= 0) { tendrils.splice(i, 1); continue; }
      // Check player collision with tendril line
      const curY = t.y + (t.targetY - t.y) * t.progress;
      if (player.invuln <= 0 && !player.dead &&
          Math.abs(player.x + player.w / 2 - t.x) < 6 &&
          player.y + player.h > t.y && player.y < curY) {
        killPlayer();
      }
    }

    // === ENEMY PROJECTILES ===
    for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
      const p = enemyProjectiles[i];
      p.x += p.vx * dt;
      if (p.gravity) {
        p.vy += GRAVITY * 0.6 * dt;
      }
      p.y += p.vy * dt;

      // Timer-based projectiles
      if (p.timer !== undefined) {
        p.timer -= dt;
        if (p.timer <= 0) {
          if (p.type === 'shockwave') {
            TAS.particles.spawn(p.x, p.y, '#8866aa', 4, 1);
          }
          enemyProjectiles.splice(i, 1);
          continue;
        }
      }

      // Off screen
      if (p.x < 0 || p.x > GW || p.y > GH + 20 || p.y < -20) {
        enemyProjectiles.splice(i, 1);
        continue;
      }

      // Hit player
      if (player.invuln <= 0 && !player.dead &&
          TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x - p.w / 2, p.y - p.h / 2, p.w, p.h)) {
        killPlayer();
        enemyProjectiles.splice(i, 1);
      }
    }

    // === FOOD ITEMS ===
    for (let i = foodItems.length - 1; i >= 0; i--) {
      const fi = foodItems[i];
      fi.vy += GRAVITY * 0.5 * dt;
      fi.y += fi.vy * dt;
      for (const p of platforms) {
        if (p.wall) continue;
        if (fi.vy >= 0 && fi.x > p.x && fi.x < p.x + p.w && fi.y > p.y - 4 && fi.y < p.y + 6) {
          fi.y = p.y - 4;
          fi.vy = 0;
          fi.grounded = true;
        }
      }
      fi.life -= dt;
      if (fi.life <= 0) { foodItems.splice(i, 1); continue; }

      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, fi.x - 6, fi.y - 6, 12, 12)) {
        const foodScore = Math.floor(fi.pts * statB.scoreMult);
        score += foodScore;
        addScorePopup(fi.x, fi.y - 10, fi.name + ' +' + foodScore, fi.color);
        TAS.audio.playTone(500, 0.08, 'sine', 0.04, 700);
        TAS.particles.spawn(fi.x, fi.y, fi.color, 5, 1.5);
        foodItems.splice(i, 1);
      }
    }

    // === POWERUPS ===
    for (let i = powerups.length - 1; i >= 0; i--) {
      const pu = powerups[i];
      pu.vy += GRAVITY * 0.5 * dt;
      pu.y += pu.vy * dt;
      for (const p of platforms) {
        if (p.wall) continue;
        if (pu.vy >= 0 && pu.x > p.x && pu.x < p.x + p.w && pu.y > p.y - 4 && pu.y < p.y + 6) {
          pu.y = p.y - 4;
          pu.vy = 0;
          pu.grounded = true;
        }
      }
      pu.life -= dt;
      if (pu.life <= 0) { powerups.splice(i, 1); continue; }

      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pu.x - 6, pu.y - 6, 12, 12)) {
        applyPowerup(pu.type);
        powerups.splice(i, 1);
      }
    }

    // === HURRY UP TIMER ===
    levelTimer += dt;
    if (levelTimer > HURRY_TIME && !pumpkinActive) {
      pumpkinActive = true;
      pumpkin = { x: Math.floor(TAS.math.randRange(20, GW - 20)), y: HUD_H + 20 };
      TAS.audio.playTone(100, 0.5, 'sawtooth', 0.08, 60);
    }
    if (pumpkinActive) {
      const ang = TAS.math.angle(pumpkin.x, pumpkin.y, player.x + 7, player.y + 7);
      const pspd = 55 + level;
      pumpkin.x = Math.floor(pumpkin.x + Math.cos(ang) * pspd * dt);
      pumpkin.y = Math.floor(pumpkin.y + Math.sin(ang) * pspd * dt);

      if (player.invuln <= 0 && !player.dead &&
          TAS.math.dist(pumpkin.x, pumpkin.y, player.x + 7, player.y + 7) < 14) {
        killPlayer();
      }
    }

    // === LEVEL COMPLETE CHECK ===
    const aliveEnemies = enemies.filter(function(e) { return e.alive; });
    if (aliveEnemies.length === 0 && !levelComplete) {
      levelComplete = true;
      levelCompleteTimer = 0;
      const levelBonus = Math.floor(50 * level * statB.scoreMult);
      score += levelBonus;
      TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.15]], 100);
      TAS.fx.flash('#88ff44', 0.3);
    }

    // === AMBIENT SPORE PARTICLES ===
    if (frame % 4 === 0) {
      const zone = getZone(level);
      TAS.particles.spawn(
        TAS.math.randRange(10, GW - 10), -5,
        zone.accent, 1, 0.3, { gravity: 0.2, size: 1, sizeVar: 2 }
      );
    }
  }
}

function killPlayer() {
  player.dead = true;
  player.invuln = 1.5;
  lives--;
  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#ff4444', 0.4);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 80);
  TAS.particles.spawn(player.x + 7, player.y + 7, '#66cc44', 12, 3);
}

function applyPowerup(type) {
  switch(type) {
    case 'speed': pw_speed = true; pw_timer = 10; break;
    case 'power': pw_power = true; pw_timer = 10; break;
    case 'range': pw_range = true; pw_timer = 10; break;
    case 'blast': pw_blast = true; pw_timer = 10; break;
    case 'life': lives = Math.min(lives + 1, 5 + statB.lives); break;
  }
  TAS.audio.playTone(500, 0.1, 'sine', 0.06, 700);
  TAS.audio.playTone(700, 0.1, 'sine', 0.05, 900);
}

// === DRAW ===
function draw(dt) {
  const zone = getZone(level);
  const zi = getZoneIndex(level);

  // Background gradient per zone
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  if (state === 'playing') {
    grad.addColorStop(0, zone.bg1);
    grad.addColorStop(1, zone.bg2);
  } else {
    grad.addColorStop(0, '#1a1c2c');
    grad.addColorStop(1, '#2a2e3c');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Floor ' + level + '  |  Fungi: ' + totalKills });
    return;
  }

  if (state === 'victory') {
    TAS.particles.draw();
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('VICTORY!', GW / 2, GH * 0.2);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '12px monospace';
    ctx.fillText('Your baseling cleared all 50 floors!', GW / 2, GH * 0.3);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Score: ' + score, GW / 2, GH * 0.43);
    ctx.fillStyle = '#38d973';
    ctx.font = '11px monospace';
    ctx.fillText('Frozen fungi defeated: ' + totalKills, GW / 2, GH * 0.53);
    if (score >= highScore) {
      const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#f4b41b';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('NEW HIGH SCORE!', GW / 2, GH * 0.63);
      ctx.globalAlpha = 1;
    }
    const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.85);
    ctx.globalAlpha = 1;
    return;
  }

  // === GAME RENDER ===
  ctx.save();
  TAS.fx.applyShake();

  // Zone-specific backgrounds
  if (zi === 0) {
    // Frozen Garden: hanging mushroom stalactites, spore motes
    ctx.fillStyle = '#334422';
    for (let i = 0; i < 8; i++) {
      const sx = Math.floor(20 + i * 40 + ((level * 7) % 20));
      const sh = 8 + (i * 3 + level) % 12;
      ctx.beginPath();
      ctx.moveTo(sx, HUD_H);
      ctx.lineTo(sx + 4, HUD_H + sh);
      ctx.lineTo(sx + 8, HUD_H);
      ctx.fill();
      // Mushroom cap
      ctx.fillStyle = '#556633';
      ctx.beginPath();
      ctx.arc(sx + 4, HUD_H + sh, 5, 0, Math.PI);
      ctx.fill();
      ctx.fillStyle = '#334422';
    }
    // Floating spore motes
    ctx.fillStyle = '#88cc66';
    for (let i = 0; i < 6; i++) {
      const mx = (i * 53 + frame * 0.15) % GW;
      const my = 60 + (i * 47) % 250 + Math.sin(frame * 0.02 + i) * 8;
      ctx.globalAlpha = 0.15 + Math.sin(frame * 0.03 + i) * 0.08;
      ctx.beginPath();
      ctx.arc(Math.floor(mx), Math.floor(my), 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (zi === 1) {
    // POOP Reactor Depths: glowing reactor tubes, purple energy lines
    ctx.globalAlpha = 0.12;
    for (let i = 0; i < 4; i++) {
      const tx = Math.floor(40 + i * 70 + ((level * 11) % 30));
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(tx, HUD_H);
      ctx.lineTo(tx + Math.sin(frame * 0.02 + i) * 8, GH);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Reactor glow spots
    for (let i = 0; i < 3; i++) {
      const gx = Math.floor(60 + i * 100 + ((level * 5) % 40));
      const gy = Math.floor(100 + (i * 80 + level * 3) % 200);
      const pulse = Math.sin(frame * 0.04 + i * 1.5) * 0.5 + 0.5;
      ctx.globalAlpha = 0.1 * pulse;
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.arc(gx, gy, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (zi === 2) {
    // Spore Snowfield: branching mycelium network background
    ctx.strokeStyle = '#336633';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.2;
    for (let i = 0; i < 6; i++) {
      const bx = Math.floor(15 + i * 55 + ((level * 3) % 20));
      const by = HUD_H + 10 + (i * 37) % 60;
      ctx.beginPath();
      ctx.moveTo(bx, by);
      ctx.lineTo(bx + 20 + (i % 3) * 10, by + 40 + (i % 2) * 20);
      ctx.lineTo(bx + 40, by + 80);
      ctx.stroke();
      // Branch
      ctx.beginPath();
      ctx.moveTo(bx + 20 + (i % 3) * 10, by + 40 + (i % 2) * 20);
      ctx.lineTo(bx + 50, by + 30);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Leaf motes
    ctx.fillStyle = '#66ff88';
    for (let i = 0; i < 5; i++) {
      const lx = (i * 67 + frame * 0.1) % GW;
      const ly = 50 + (i * 71) % 280 + Math.sin(frame * 0.015 + i * 2) * 10;
      ctx.globalAlpha = 0.12;
      ctx.beginPath();
      ctx.arc(Math.floor(lx), Math.floor(ly), 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (zi === 3) {
    // Mycelium Hive: honeycomb shapes, warm glow
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = '#aa8844';
    ctx.lineWidth = 1;
    for (let hy = 0; hy < 5; hy++) {
      for (let hx = 0; hx < 5; hx++) {
        const cx = Math.floor(30 + hx * 65 + (hy % 2) * 32);
        const cy = Math.floor(60 + hy * 70);
        drawHex(cx, cy, 15);
      }
    }
    ctx.globalAlpha = 1;
  } else {
    // Namaris' Frozen Hold: swirling void particles, dark crystals
    ctx.globalAlpha = 0.15;
    for (let i = 0; i < 5; i++) {
      const cx = Math.floor(30 + i * 65 + ((level * 11) % 30));
      const cy = Math.floor(80 + (i * 47 + level * 3) % 200);
      const pulse = Math.sin(frame * 0.03 + i * 1.2) * 0.5 + 0.5;
      ctx.fillStyle = i % 2 === 0 ? '#dd88ff' : '#8844cc';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 10 - pulse * 3);
      ctx.lineTo(cx + 5, cy + 6);
      ctx.lineTo(cx - 5, cy + 6);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Void swirls
    for (let i = 0; i < 4; i++) {
      const sx = (i * 83 + frame * 0.08) % GW;
      const sy = (i * 97 + frame * 0.05) % (GH - 60) + 40;
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = '#cc66ff';
      ctx.beginPath();
      ctx.arc(Math.floor(sx), Math.floor(sy), 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Draw goo trails
  for (const g of gooTrails) {
    ctx.globalAlpha = Math.min(0.6, g.life / 3);
    ctx.fillStyle = '#44aa33';
    ctx.fillRect(g.x - 4, g.y - 2, 8, 3);
    ctx.globalAlpha = 1;
  }

  // Draw platforms
  for (const p of platforms) {
    if (p.wall) {
      ctx.fillStyle = zone.top;
      ctx.fillRect(p.x, p.y, p.w, p.h);
    } else if (p.y >= GH - 12) {
      ctx.fillStyle = zone.plat1;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = zone.plat2;
      ctx.fillRect(p.x, p.y, p.w, 2);
    } else {
      ctx.fillStyle = zone.plat1;
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = zone.plat2;
      ctx.fillRect(p.x, p.y, p.w, 2);
      // Mycelium on top (instead of snow)
      ctx.fillStyle = zone.accent;
      ctx.globalAlpha = 0.5;
      ctx.fillRect(p.x + 2, p.y - 2, p.w - 4, 3);
      ctx.globalAlpha = 1;
    }
  }

  // Draw powerups
  for (const pu of powerups) {
    const pulse = Math.sin(frame * 0.15 + pu.x) * 0.3 + 0.7;
    const colors = { speed: '#44ff88', power: '#ff44aa', range: '#44aaff', blast: '#ffaa44', life: '#ff6688' };
    const col = colors[pu.type] || '#fff';
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(pu.x, pu.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    const icons = { speed: 'S', power: 'P', range: 'R', blast: 'B', life: '+' };
    ctx.fillText(icons[pu.type] || '?', pu.x, pu.y + 2);
    if (pu.life < 2 && Math.sin(frame * 0.2) > 0) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(pu.x, pu.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw food items
  for (const fi of foodItems) {
    const pulse = Math.sin(frame * 0.12 + fi.x) * 0.3 + 0.7;
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = fi.color;
    ctx.beginPath();
    ctx.arc(fi.x, fi.y, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(fi.x, fi.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = fi.color;
    ctx.beginPath();
    ctx.arc(fi.x, fi.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(fi.icon, fi.x, fi.y + 2);
    if (fi.life < 2 && Math.sin(frame * 0.2) > 0) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(fi.x, fi.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw enemies
  for (const e of enemies) {
    if (!e.alive) continue;

    if (e.frozen) {
      // Spore ball (kickable) - mycelium covered
      ctx.fillStyle = '#88cc66';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#66aa44';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2 - 2, e.y + e.h / 2 - 2, 3, 0, Math.PI * 2);
      ctx.fill();
      // Mycelium tendrils on surface
      ctx.strokeStyle = '#aaddaa';
      ctx.lineWidth = 1;
      for (let t = 0; t < 3; t++) {
        const ta = (t / 3) * Math.PI * 2 + frame * 0.02;
        const tr = e.w / 2 + 1;
        ctx.beginPath();
        ctx.moveTo(e.x + e.w / 2 + Math.cos(ta) * (tr - 2), e.y + e.h / 2 + Math.sin(ta) * (tr - 2));
        ctx.lineTo(e.x + e.w / 2 + Math.cos(ta) * (tr + 3), e.y + e.h / 2 + Math.sin(ta) * (tr + 3));
        ctx.stroke();
      }
      // Kick indicator
      const blink = Math.sin(frame * 0.12) > 0;
      if (blink) {
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 4, 0, Math.PI * 2);
        ctx.stroke();
      }
    } else {
      const col = getEnemyColor(e.type);

      if (e.type === 'boss') {
        // Boss rendering
        if (e.bossType === 'queen') {
          // Blizzard Parasite: large green body with crown
          ctx.fillStyle = '#44aa44';
          ctx.beginPath();
          ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
          ctx.fill();
          // Crown spikes
          ctx.fillStyle = '#ffaa44';
          for (let s = 0; s < 3; s++) {
            const sx = e.x + 6 + s * 8;
            ctx.fillRect(sx, e.y - 4, 3, 6);
          }
          // Eyes
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(e.x + 8, e.y + 9, 4, 4);
          ctx.fillRect(e.x + 16, e.y + 9, 4, 4);
          ctx.fillStyle = '#000';
          ctx.fillRect(e.x + 9, e.y + 10, 2, 2);
          ctx.fillRect(e.x + 17, e.y + 10, 2, 2);
        } else {
          // Frozen Mycelial: purple mass with extending tendrils
          ctx.fillStyle = '#7744aa';
          ctx.beginPath();
          ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
          ctx.fill();
          // Tendril protrusions
          ctx.fillStyle = '#9966cc';
          for (let t = 0; t < 4; t++) {
            const ta = (t / 4) * Math.PI * 2 + frame * 0.015;
            const tx = Math.floor(e.x + e.w / 2 + Math.cos(ta) * (e.w / 2 + 3));
            const ty = Math.floor(e.y + e.h / 2 + Math.sin(ta) * (e.h / 2 + 3));
            ctx.beginPath();
            ctx.arc(tx, ty, 4, 0, Math.PI * 2);
            ctx.fill();
          }
          // Eyes
          ctx.fillStyle = '#ffdd00';
          ctx.fillRect(e.x + 8, e.y + 10, 4, 4);
          ctx.fillRect(e.x + 16, e.y + 10, 4, 4);
          ctx.fillStyle = '#000';
          ctx.fillRect(e.x + 9, e.y + 11, 2, 2);
          ctx.fillRect(e.x + 17, e.y + 11, 2, 2);
        }
        // HP bar
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x, e.y - 6, e.w, 3);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(e.x, e.y - 6, Math.floor(e.w * (e.hp / e.maxHp)), 3);
      } else if (e.type === 'grunt') {
        // Frost Mold: green blob with goo drip
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Goo drip
        ctx.fillStyle = '#338833';
        ctx.fillRect(e.x + 5, e.y + e.h - 2, 3, 4);
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 4, 3, 3);
        ctx.fillRect(e.x + 8, e.y + 4, 3, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 4, e.y + 5, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 5, 2, 2);
      } else if (e.type === 'wasp') {
        // Snow Spore: yellow with wings
        ctx.fillStyle = col;
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Stripes
        ctx.fillStyle = '#553300';
        ctx.fillRect(e.x + 3, e.y + 6, e.w - 6, 2);
        ctx.fillRect(e.x + 3, e.y + 10, e.w - 6, 2);
        // Wings
        const wingFlap = Math.sin(frame * 0.4) * 3;
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.ellipse(e.x - 2, e.y + 3 + wingFlap, 5, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(e.x + e.w + 2, e.y + 3 - wingFlap, 5, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 3, 3, 3);
        ctx.fillRect(e.x + 8, e.y + 3, 3, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 4, e.y + 4, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 4, 2, 2);
        // Stinger
        ctx.fillStyle = '#ff6644';
        ctx.fillRect(e.x + 6, e.y + e.h, 2, 3);
      } else if (e.type === 'golem') {
        // Icicle Fungus: large purple mass
        ctx.fillStyle = col;
        ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + 4, e.w / 2, Math.PI, 0);
        ctx.fill();
        // Texture dots
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(e.x + 3, e.y + 8, 2, 2);
        ctx.fillRect(e.x + 10, e.y + 12, 2, 2);
        ctx.fillRect(e.x + 14, e.y + 7, 2, 2);
        // Eyes
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(e.x + 4, e.y + 6, 4, 3);
        ctx.fillRect(e.x + 10, e.y + 6, 4, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(e.x + 5, e.y + 7, 2, 2);
        ctx.fillRect(e.x + 11, e.y + 7, 2, 2);
        // Coat progress
        if (e.coatCount > 0 && !e.frozen) {
          ctx.fillStyle = '#ffdd44';
          ctx.font = '6px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(e.coatCount + '/3', e.x + e.w / 2, e.y - 2);
        }
      }

      // Spore coverage overlay (mycelium growth)
      if (e.sporeHits > 0 && e.type !== 'boss') {
        const coverage = e.type === 'golem' ? (e.sporeHits / e.maxSpore) * 0.33 + e.coatCount * 0.33 : e.sporeHits / e.maxSpore;
        ctx.globalAlpha = coverage * 0.6;
        ctx.fillStyle = '#88cc66';
        ctx.beginPath();
        ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w / 2 + 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw tendrils (mycelial boss)
  for (const t of tendrils) {
    const curY = Math.floor(t.y + (t.targetY - t.y) * t.progress);
    ctx.strokeStyle = '#9966cc';
    ctx.lineWidth = 3;
    ctx.globalAlpha = Math.min(0.8, t.life / 1.5);
    ctx.beginPath();
    ctx.moveTo(t.x, t.y);
    ctx.lineTo(t.x + Math.sin(t.progress * 4) * 6, curY);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Draw enemy projectiles
  for (const p of enemyProjectiles) {
    if (p.type === 'goo') {
      ctx.fillStyle = '#44aa33';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'stinger') {
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(p.x - 2, p.y - 3, 4, 6);
      ctx.fillStyle = '#ff6644';
      ctx.fillRect(p.x - 1, p.y + 2, 2, 3);
    } else if (p.type === 'shockwave') {
      ctx.fillStyle = frame % 4 < 2 ? '#8866aa' : '#aa88cc';
      ctx.fillRect(Math.floor(p.x - p.w / 2), Math.floor(p.y - p.h / 2), p.w, p.h);
    } else if (p.type === 'spore_proj') {
      ctx.fillStyle = frame % 4 < 2 ? '#88cc66' : '#aadd88';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw spore puffs
  for (const s of sporePuffs) {
    if (s.charged) {
      // Charged: bigger, glowing green
      ctx.fillStyle = '#88ff44';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(s.x + s.w / 2, s.y + s.h / 2, s.w / 2 + 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#44cc22';
      ctx.beginPath();
      ctx.arc(s.x + s.w / 2, s.y + s.h / 2, s.w / 2 - 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#88cc66';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(s.x + s.w / 2, s.y + s.h / 2, s.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw spore balls (rolling)
  for (const sb of sporeBalls) {
    ctx.save();
    ctx.translate(sb.x + sb.r, sb.y + sb.r);
    ctx.rotate(sb.angle);
    // Main body - mycelium green
    ctx.fillStyle = '#88cc66';
    ctx.beginPath();
    ctx.arc(0, 0, sb.r, 0, Math.PI * 2);
    ctx.fill();
    // Texture
    ctx.fillStyle = '#66aa44';
    ctx.beginPath();
    ctx.arc(-2, -2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aaddaa';
    ctx.beginPath();
    ctx.arc(3, 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Trail particles
    if (frame % 2 === 0) {
      TAS.particles.spawn(sb.x + sb.r, sb.y + sb.r * 2, '#66cc44', 1, 0.5, { size: 1, sizeVar: 1 });
    }
  }

  // Draw player
  if (!player.dead) {
    const flicker = player.invuln > 0 && Math.floor(frame / 3) % 2 === 0;
    if (!flicker) {
      const pCol = statB.color || '#3cacd7';
      // Body - your baseling
      ctx.fillStyle = pCol;
      ctx.beginPath();
      ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2, 0, Math.PI * 2);
      ctx.fill();
      // Face
      ctx.fillStyle = '#fff';
      const eyeOff = player.dir > 0 ? 2 : -2;
      ctx.fillRect(player.x + 4 + eyeOff, player.y + 4, 3, 3);
      ctx.fillRect(player.x + 8 + eyeOff, player.y + 4, 3, 3);
      ctx.fillStyle = '#114433';
      ctx.fillRect(player.x + 5 + eyeOff, player.y + 5, 2, 2);
      ctx.fillRect(player.x + 9 + eyeOff, player.y + 5, 2, 2);
      // Mushroom cap (baseling cap)
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(player.x + player.w / 2, player.y + 1, 6, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#aaddaa';
      ctx.fillRect(player.x + 5, player.y - 1, 2, 2);
      ctx.fillRect(player.x + 9, player.y, 1, 1);
      // Charge indicator
      if (chargeTimer > 0 && !chargeReady) {
        ctx.strokeStyle = '#88ff44';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4;
        const chargePct = Math.min(1, chargeTimer / 0.5);
        ctx.beginPath();
        ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2 + 3, -Math.PI / 2, -Math.PI / 2 + chargePct * Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      if (chargeReady) {
        ctx.strokeStyle = '#88ff44';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.15) * 0.3;
        ctx.beginPath();
        ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2 + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      // Powerup glow
      if (pw_timer > 0) {
        ctx.strokeStyle = '#ffdd44';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.beginPath();
        ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w / 2 + 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw hurry-up creature (blizzard parasite phantom)
  if (pumpkinActive) {
    ctx.fillStyle = '#e6482e';
    ctx.globalAlpha = 0.6 + Math.sin(frame * 0.08) * 0.3;
    ctx.beginPath();
    ctx.arc(pumpkin.x, pumpkin.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(pumpkin.x, pumpkin.y, 7, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(pumpkin.x - 4, pumpkin.y - 3, 3, 3);
    ctx.fillRect(pumpkin.x + 1, pumpkin.y - 3, 3, 3);
    // Mouth
    ctx.fillRect(pumpkin.x - 3, pumpkin.y + 2, 6, 2);
    ctx.globalAlpha = 1;
  }

  // Draw score popups
  for (const sp of scorePopups) {
    ctx.globalAlpha = TAS.math.clamp(sp.life, 0, 1);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.globalAlpha = 1;
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // === FLOOR WIPE TRANSITION ===
  if (wipeTimer > 0) {
    const prog = 1 - (wipeTimer / 0.6);
    const nextZone = getZone(level);
    if (prog < 0.5) {
      // Wipe covering screen
      const cover = prog * 2;
      ctx.fillStyle = nextZone.bg2;
      if (wipeDir > 0) {
        ctx.fillRect(0, 0, Math.floor(GW * cover), GH);
      } else {
        ctx.fillRect(Math.floor(GW * (1 - cover)), 0, Math.floor(GW * cover), GH);
      }
    } else {
      // Wipe revealing
      const reveal = (prog - 0.5) * 2;
      ctx.fillStyle = nextZone.bg2;
      if (wipeDir > 0) {
        ctx.fillRect(Math.floor(GW * reveal), 0, GW, GH);
      } else {
        ctx.fillRect(0, 0, Math.floor(GW * (1 - reveal)), GH);
      }
    }
  }

  // === HUD ===
  TAS.ui.drawHUD(score, level, lives, GW);

  // Enemy count indicator
  const aliveCount = enemies.filter(function(e) { return e.alive; }).length;
  if (aliveCount > 0 && levelIntroTimer <= 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#3cacd7';
    ctx.font = '8px monospace';
    ctx.fillText('Fungi: ' + aliveCount, 6, HUD_H + 12);
  }

  // Level intro overlay
  if (levelIntroTimer > 0) {
    const alpha = TAS.math.clamp(levelIntroTimer / 0.5, 0, 1);
    ctx.fillStyle = 'rgba(5,10,20,' + (alpha * 0.8) + ')';
    ctx.fillRect(0, HUD_H, GW, GH - HUD_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = zone.accent;
    ctx.font = 'bold 20px monospace';
    ctx.fillText('FLOOR ' + level, GW / 2, GH / 2 - 20);
    if (level % 10 === 0) {
      const bossZone = getZone(level);
      const bossName = getZoneIndex(level) % 2 === 0 ? 'BLIZZARD PARASITE' : 'FROZEN MYCELIAL';
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('BOSS: ' + bossName, GW / 2, GH / 2 + 10);
    } else {
      ctx.fillStyle = '#667788';
      ctx.font = '10px monospace';
      ctx.fillText(zone.name, GW / 2, GH / 2 + 10);
    }
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.fillText('Your baseling is ready...', GW / 2, GH / 2 + 35);
  }

  // Level complete message
  if (levelComplete) {
    ctx.fillStyle = 'rgba(5,10,20,0.5)';
    ctx.fillRect(0, GH / 2 - 40, GW, 80);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('FLOOR CLEAR!', GW / 2, GH / 2 - 10);
    ctx.fillStyle = '#3cacd7';
    ctx.font = '11px monospace';
    ctx.fillText('+' + Math.floor(50 * level * statB.scoreMult) + ' bonus', GW / 2, GH / 2 + 10);
    if (comboMax > 1) {
      ctx.fillStyle = '#ffaa44';
      ctx.font = '9px monospace';
      ctx.fillText('Best chain: x' + comboMax, GW / 2, GH / 2 + 26);
    }
  }

  // Hurry warning
  if (levelTimer > HURRY_TIME - 5 && !pumpkinActive) {
    const blink = Math.sin(frame * 0.15) > 0;
    if (blink) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('HURRY UP!', GW / 2, GH / 2 - 30);
    }
  }

  // Powerup indicator
  if (pw_timer > 0) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#f4b41b';
    ctx.font = '8px monospace';
    const active = [];
    if (pw_speed) active.push('SPD');
    if (pw_power) active.push('PWR');
    if (pw_range) active.push('RNG');
    if (pw_blast) active.push('BLT');
    ctx.fillText(active.join(' ') + ' ' + Math.ceil(pw_timer) + 's', GW - 10, HUD_H + 12);
  }

  // Chain indicator
  if (chainCount > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.globalAlpha = Math.min(1, 2 - (frame % 60) / 30);
    ctx.fillText('x' + chainCount + ' CHAIN!', GW / 2, HUD_H + 14);
    ctx.globalAlpha = 1;
  }

  TAS.input.drawTouchControls(GW, GH);
}

// Hexagon helper for hive core background
function drawHex(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
    const hx = cx + Math.cos(a) * r;
    const hy = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(Math.floor(hx), Math.floor(hy));
    else ctx.lineTo(Math.floor(hx), Math.floor(hy));
  }
  ctx.closePath();
  ctx.stroke();
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Baseling-themed background
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#1a1c2c');
  grad.addColorStop(1, '#2a2e3c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Spore particles on title
  if (frame % 2 === 0) {
    TAS.particles.spawn(
      TAS.math.randRange(0, GW), -5,
      '#88cc66', 1, 0.4, { gravity: 0.3, size: 1, sizeVar: 2 }
    );
  }
  TAS.particles.draw();

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE BROS', GW / 2 + 2, 52);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE BROS', GW / 2, 50);

  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Adventure', GW / 2, 68);

  // NFT stats display
  if (statB.name) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name + ' Lv' + statB.level, GW / 2, 82);
    ctx.fillStyle = '#888';
    ctx.font = '7px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 92);
  }

  // Stat bar (if NFT loaded)
  if (window.NftLoader && NftLoader.drawStatBar) {
    NftLoader.drawStatBar(ctx, GW * 0.15, GH * 0.24, GW * 0.7);
  }

  // Instructions
  ctx.fillStyle = '#7a8a7a';
  ctx.font = '9px monospace';
  ctx.fillText('Your baseling throws spore balls', GW / 2, 120);
  ctx.fillText('to coat frozen fungi, then kick!', GW / 2, 133);
  ctx.fillText('Spore balls roll through everything', GW / 2, 146);

  // Scoring info
  ctx.fillStyle = '#7a8a7a';
  ctx.font = '8px monospace';
  ctx.fillText('Chain kills for massive POOP bonus!', GW / 2, 164);
  ctx.fillText('100 > 200 > 400 > 800 > 1600...', GW / 2, 176);

  // NES-style controls with dotted leaders
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  var cy = 196;
  ctx.fillText('ARROW/WASD.....Move', GW / 2, cy);
  ctx.fillText('SPACE/UP.......Jump', GW / 2, cy + 11);
  ctx.fillText('Z/X............Spore', GW / 2, cy + 22);
  ctx.fillText('HOLD Z (STR>=10)..Charged Spore', GW / 2, cy + 33);

  // Enemy types preview
  ctx.fillStyle = '#a855f7';
  ctx.font = '7px monospace';
  ctx.fillText('Frost Mold  |  Snow Spore  |  Icicle Fungus', GW / 2, cy + 50);
  ctx.fillText('5 frozen zones  |  5 bosses  |  50 floors', GW / 2, cy + 62);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 290);
  }

  // Demo characters
  // Player (your baseling)
  ctx.fillStyle = '#3cacd7';
  ctx.beginPath();
  ctx.arc(GW / 2 - 50, 316, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.arc(GW / 2 - 50, 310, 5, Math.PI, 0);
  ctx.fill();

  // Frost Mold
  ctx.fillStyle = '#55cc55';
  ctx.beginPath();
  ctx.arc(GW / 2 + 50, 316, 8, 0, Math.PI * 2);
  ctx.fill();
  // Grunt eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(GW / 2 + 45, 313, 3, 3);
  ctx.fillRect(GW / 2 + 50, 313, 3, 3);

  // Spore ball between them
  const sbx = Math.floor(GW / 2 + Math.sin(frame * 0.03) * 15);
  ctx.fillStyle = '#88cc66';
  ctx.beginPath();
  ctx.arc(sbx, 316, 6, 0, Math.PI * 2);
  ctx.fill();

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
