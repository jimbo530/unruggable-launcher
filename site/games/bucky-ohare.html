<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'SWAP' } });

const TILE = 16;
const COLS = 30;
const ROWS = 20;
const GRAVITY = 980;
const JUMP_VEL = -380;
const MOVE_SPEED = 140;
const MAX_FALL = 500;
const BULLET_SPEED = 320;
const INVULN_TIME = 1.5;

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#38d973', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Bridge shared baseling stats (getMults, ARCADE-STATS.md) onto statB; helpers read statB live.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[bucky-ohare] player init failed:', e && e.message); });
}

// Derived stat modifiers from baseling stats
var STAT_DMG_MULT   = 1 + (statB.str - 10) * 0.08;   // STR -> damage output (ref 1)
var STAT_SPEED_MULT = 1 + (statB.dex - 10) * 0.05;   // DEX -> movement speed (ref 2)
var STAT_HP_BONUS   = Math.floor((statB.con - 10) * 0.5); // CON -> bonus HP (ref 3)
var STAT_LIFE_BONUS = statB.lives || 0;                // CON -> bonus lives (ref 4)
var STAT_SCORE_MULT = 1 + (statB.int - 10) * 0.06;    // INT -> score multiplier (ref 5)
var STAT_CD_MULT    = Math.max(0.3, 1 - (statB.wis - 10) * 0.04); // WIS -> cooldown reduction (ref 6)
var STAT_DROP_RATE  = 1 + (statB.cha - 10) * 0.07;    // CHA -> drop/pickup chance (ref 7)
var STAT_CRIT_CHANCE = Math.min(0.5, 0.05 + (statB.luck - 1) * 0.03); // LUCK -> crit chance (ref 8)
var STAT_BOSS_DMG   = 1 + (statB.str - 10) * 0.05;    // STR -> boss damage (ref 9)
var STAT_DODGE_CHANCE = Math.min(0.3, (statB.dex - 10) * 0.02); // DEX -> dodge chance (ref 10)
var STAT_CHARGE_SPEED = 1 + (statB.wis - 10) * 0.05;  // WIS -> charge speed (ref 11)
var STAT_SWIM_SPEED = 1 + (statB.dex - 10) * 0.04;    // DEX -> swim speed (ref 12)
var STAT_PICKUP_RANGE = 12 + (statB.cha - 10) * 2;     // CHA -> pickup magnet range (ref 13)
var STAT_XP_MULT    = 1 + (statB.int - 10) * 0.04;    // INT -> energy cell value (ref 14)
var STAT_INVULN_BONUS = (statB.con - 10) * 0.05;       // CON -> longer invuln (ref 15)
var STAT_WALL_GRIP  = 1 + (statB.str - 10) * 0.03;    // STR -> wall cling time (ref 16)

// === CHARACTER DEFINITIONS ===
const CHARS = {
  captain: { name: 'Bucky', color: '#38d973', accent: '#1a6b3a', chargeMax: 1.2, speed: 140, jumpPow: -380 },
  sparks:  { name: 'Patches',  color: '#f4b41b', accent: '#a07810', chargeMax: 0, speed: 130, jumpPow: -360 },
  aqua:    { name: 'Frostpaw',    color: '#3cacd7', accent: '#1a6080', chargeMax: 0, speed: 120, jumpPow: -350 },
  rocks:   { name: 'Grizzle',   color: '#e44', accent: '#811', chargeMax: 0, speed: 110, jumpPow: -340 }
};
const CHAR_ORDER = ['captain', 'sparks', 'aqua', 'rocks'];

// === PLANET DEFINITIONS (Spore Galaxy zones) ===
const PLANETS = [
  { name: 'Spore Planet', bg: '#0a2a0a', tileColor: '#2a5a2a', accent: '#38d973', focus: 'captain',
    enemies: 'plant', desc: 'Fungal toad breeding grounds', zone: 'fungal' },
  { name: 'Fungal Ice World', bg: '#0a1a2a', tileColor: '#2a4a6a', accent: '#3cacd7', focus: 'sparks',
    enemies: 'electric', desc: 'Frozen spore wastes', zone: 'storm' },
  { name: 'Garden Jungle', bg: '#0a1a0a', tileColor: '#2a5a3a', accent: '#4a8a4a', focus: 'aqua',
    enemies: 'fish', desc: 'Overgrown baseling gardens', zone: 'deep' },
  { name: 'Mushroom Fortress', bg: '#2a1a0a', tileColor: '#5a3a1a', accent: '#8a5a2a', focus: 'rocks',
    enemies: 'golem', desc: 'The Toad Empire stronghold', zone: 'fire' },
  { name: 'Shadow Sporelands', bg: '#0a0a0a', tileColor: '#2a2a2a', accent: '#a855f7', focus: 'sparks',
    enemies: 'shadow', desc: 'Bioluminescent toad territory', zone: 'shadow' },
  { name: 'Toad Citadel', bg: '#1a0a1a', tileColor: '#4a2a4a', accent: '#a855f7', focus: 'all',
    enemies: 'mixed', desc: 'Heart of the Toad Empire', zone: 'boss' }
];

// === TOAD EMPIRE ENEMY LORE TABLE ===
const ENEMY_LORE = {
  sporecrawler: { name: 'Fungal Toad', desc: 'Spore-infested grunt' },
  moldspitter: { name: 'Spore Trooper', desc: 'Toxic ranged toad' },
  myceliavine: { name: 'Toad Vine', desc: 'Living snare' },
  shockshroom: { name: 'Shock Toad', desc: 'Electric fungal toad' },
  sparkcap: { name: 'Spore Drone', desc: 'Orbiting spore bomb' },
  thundermoss: { name: 'Thunder Toad', desc: 'Ground-pounding toad' },
  coralcrab: { name: 'Reef Toad', desc: 'Armored aquatic toad' },
  jellyspore: { name: 'Jelly Toad', desc: 'Drifting poison toad' },
  tidescale: { name: 'Tide Toad', desc: 'Fast swimming toad' },
  magmagolem: { name: 'Mushroom Tank', desc: 'Heavy toad armor' },
  cinderboulder: { name: 'Boulder Toad', desc: 'Rolling siege toad' },
  emberspore: { name: 'Mortar Toad', desc: 'Lava-spitting toad' },
  nightshade: { name: 'Shadow Toad', desc: 'Stealth toad assassin' },
  gloomwraith: { name: 'Wraith Toad', desc: 'Phase-shifting toad' },
  phantomcap: { name: 'Phantom Toad', desc: 'Invisible toad rusher' },
  sporelord: { name: 'Toad Commander', desc: 'Elite toad guard' },
  mycotower: { name: 'Toad Turret', desc: 'Fixed toad cannon' },
  guardianmoss: { name: 'Toad Sentinel', desc: 'Living toad wall' }
};

// === BASELING ITEM DEFINITIONS ===
const TASERN_ITEMS = [
  { type: 'sporeShard', name: 'Spore Shard', color: '#38d973', score: 25, effect: 'score' },
  { type: 'myceliumOrb', name: 'Mycelium Orb', color: '#a855f7', score: 100, effect: 'heal' },
  { type: 'fungalEssence', name: 'Fungal Essence', color: '#f4b41b', score: 50, effect: 'boost' },
  { type: 'mushroomShield', name: 'Shroom Shield', color: '#3cacd7', score: 0, effect: 'shield' },
  { type: 'sporeGrenade', name: 'Spore Grenade', color: '#f84', score: 0, effect: 'bomb' }
];

// === SCORE POPUP SYSTEM ===
var scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: String(text), color: color || '#f4b41b', life: 1.2, vy: -40 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var sx = p.x - camera.x;
    if (sx < -50 || sx > GW + 50) continue;
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, sx, p.y);
    ctx.globalAlpha = 1;
  }
}

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('buckyohare_hi');
let frame = 0;
let lives = 3 + STAT_LIFE_BONUS; // CON bonus lives (ref 4)
let hp = 5 + STAT_HP_BONUS; // CON bonus HP (ref 3)
let maxHp = 5 + STAT_HP_BONUS;
let invulnTimer = 0;
let currentPlanet = 0;
let unlockedChars = ['captain'];
let clearedPlanets = [];
let badges = 0;
let energyCells = 0;
let activeChar = 'captain';
let swapCooldown = 0;
let shieldTimer = 0;
let boostTimer = 0;
let comboCount = 0;
let comboTimer = 0;
let tutorialShown = false;
let tutorialTimer = 0;
let totalKills = 0;
let bossesDefeated = 0;

// Player state
let player = null;
let camera = { x: 0, y: 0 };
let bullets = [];
let enemies = [];
let pickups = [];
let platforms = [];
let waterZones = [];
let lavaZones = [];
let darkZones = [];
let electricBarriers = [];
let crumblingTiles = [];
let hazardSpores = [];
let checkpointX = 0;
let checkpointY = 0;
let levelWidth = 0;
let levelComplete = false;
let bossActive = null;
let bossHp = 0;
let bossMaxHp = 0;
let chargeTimer = 0;
let groundPounding = false;
let wallClinging = false;
let wallDir = 0;
let sparkTrails = [];
let deathTimer = 0;
let transitionTimer = 0;
let transitionText = '';
let rescueAnim = 0;
let rescueChar = '';
let zoneBgParticles = [];

// Level generation seed
let levelSeed = 0;

// Save/load
function saveGame() {
  var data = { cleared: clearedPlanets, unlocked: unlockedChars, hi: highScore, badges: badges, kills: totalKills, bosses: bossesDefeated };
  localStorage.setItem('buckyohare_save', JSON.stringify(data));
}
function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem('buckyohare_save'));
    if (d) {
      clearedPlanets = d.cleared || [];
      unlockedChars = d.unlocked || ['captain'];
      highScore = d.hi || 0;
      badges = d.badges || 0;
      totalKills = d.kills || 0;
      bossesDefeated = d.bosses || 0;
    }
  } catch(e) { console.error('Load failed:', e); }
}
loadGame();

// === PSEUDO-RANDOM ===
function seededRand() {
  levelSeed = (levelSeed * 1103515245 + 12345) & 0x7fffffff;
  return (levelSeed % 1000) / 1000;
}

// === ZONE BACKGROUND PARTICLE SPAWNER ===
function spawnZoneBgParticles(zone) {
  zoneBgParticles = [];
  var count = 30;
  for (var i = 0; i < count; i++) {
    var p = {
      x: Math.random() * levelWidth,
      y: Math.random() * GH,
      vx: (Math.random() - 0.5) * 15,
      vy: (Math.random() - 0.5) * 10,
      size: 1 + Math.random() * 3,
      life: 0.5 + Math.random(),
      maxLife: 1,
      color: '#8f8'
    };
    switch (zone) {
      case 'fungal': p.color = Math.random() > 0.5 ? '#38d973' : '#2a8a4a'; break;
      case 'storm': p.color = Math.random() > 0.5 ? '#3cacd7' : '#2080a0'; break;
      case 'deep': p.color = Math.random() > 0.5 ? '#38d973' : '#4a8a4a'; break;
      case 'fire': p.color = Math.random() > 0.5 ? '#f80' : '#f44'; break;
      case 'shadow': p.color = Math.random() > 0.5 ? '#a855f7' : '#6b2fa0'; break;
      case 'boss': p.color = Math.random() > 0.5 ? '#a855f7' : '#7b44cc'; break;
    }
    zoneBgParticles.push(p);
  }
}

function updateZoneBgParticles(dt) {
  for (var i = 0; i < zoneBgParticles.length; i++) {
    var p = zoneBgParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 0.3;
    if (p.life <= 0) {
      p.x = camera.x + Math.random() * GW;
      p.y = Math.random() * GH;
      p.life = p.maxLife;
    }
  }
}

function drawZoneBgParticles() {
  for (var i = 0; i < zoneBgParticles.length; i++) {
    var p = zoneBgParticles[i];
    var sx = p.x - camera.x;
    if (sx < -20 || sx > GW + 20) continue;
    ctx.globalAlpha = p.life * 0.4;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === LEVEL GENERATION ===
function generateLevel(planetIdx) {
  levelSeed = (planetIdx + 1) * 7919;
  platforms = [];
  enemies = [];
  pickups = [];
  waterZones = [];
  lavaZones = [];
  darkZones = [];
  electricBarriers = [];
  crumblingTiles = [];
  sparkTrails = [];
  bullets = [];
  hazardSpores = [];
  scorePopups = [];
  bossActive = null;
  comboCount = 0;
  comboTimer = 0;

  var planet = PLANETS[planetIdx];
  levelWidth = 3200 + planetIdx * 400;
  var groundY = GH - TILE * 2;

  spawnZoneBgParticles(planet.zone);

  // Ground platforms with gaps
  var gx = 0;
  while (gx < levelWidth) {
    var segLen = 80 + Math.floor(seededRand() * 160);
    var gapChance = seededRand();
    if (gapChance > 0.75 && gx > 100) {
      var gapW = 48 + Math.floor(seededRand() * 48);
      gx += gapW;
      if (planetIdx === 3) {
        lavaZones.push({ x: gx - gapW, y: groundY, w: gapW, h: TILE * 2 });
      }
    }
    platforms.push({ x: gx, y: groundY, w: segLen, h: TILE * 2, type: 'solid' });
    gx += segLen;
  }

  // Floating platforms
  var platCount = 20 + planetIdx * 5;
  for (var i = 0; i < platCount; i++) {
    var px = 200 + Math.floor(seededRand() * (levelWidth - 400));
    var py = groundY - 60 - Math.floor(seededRand() * 160);
    var pw = 48 + Math.floor(seededRand() * 64);
    var type = (planetIdx === 3 && seededRand() > 0.7) ? 'crumble' : 'solid';
    platforms.push({ x: px, y: py, w: pw, h: TILE, type: type });
    if (type === 'crumble') {
      crumblingTiles.push({ x: px, y: py, w: pw, h: TILE, timer: 0, fallen: false });
    }
  }

  // Water zones (Planet Ocean heavy)
  if (planetIdx === 2) {
    for (var i = 0; i < 6; i++) {
      var wx = 300 + i * 450;
      waterZones.push({ x: wx, y: groundY - 120, w: 200 + Math.floor(seededRand() * 150), h: 140 });
    }
  } else if (planetIdx === 5) {
    waterZones.push({ x: 1800, y: groundY - 100, w: 300, h: 120 });
  }

  // Electric barriers (Planet Storm heavy)
  if (planetIdx === 1 || planetIdx === 5) {
    var bCount = planetIdx === 1 ? 8 : 3;
    for (var i = 0; i < bCount; i++) {
      var bx = 400 + i * 300 + Math.floor(seededRand() * 100);
      var by = groundY - 40 - Math.floor(seededRand() * 100);
      electricBarriers.push({ x: bx, y: by, w: 16, h: 64, phase: seededRand() * Math.PI * 2, active: true });
    }
  }

  // Dark zones (Planet Shadow)
  if (planetIdx === 4) {
    for (var i = 0; i < 5; i++) {
      darkZones.push({ x: 200 + i * 600, y: 0, w: 400, h: GH });
    }
  }

  // Hazard spores (Toad Empire environmental hazard)
  if (planetIdx === 0 || planetIdx === 5) {
    var sporeCount = 8 + planetIdx * 3;
    for (var i = 0; i < sporeCount; i++) {
      hazardSpores.push({
        x: 300 + Math.floor(seededRand() * (levelWidth - 600)),
        y: groundY - 30 - Math.floor(seededRand() * 120),
        radius: 10 + Math.floor(seededRand() * 8),
        phase: seededRand() * Math.PI * 2,
        active: true, timer: 0
      });
    }
  }

  // Enemies placement
  var eCount = 12 + planetIdx * 4;
  for (var i = 0; i < eCount; i++) {
    var ex = 300 + Math.floor(seededRand() * (levelWidth - 600));
    var ey = groundY - 20 - Math.floor(seededRand() * 80);
    var etype = getEnemyType(planetIdx);
    enemies.push(createEnemy(ex, ey, etype));
  }

  // Baseling pickups (CHA affects drop rate - ref 7)
  var pickupCount = Math.floor(30 * STAT_DROP_RATE);
  for (var i = 0; i < pickupCount; i++) {
    var px = 100 + Math.floor(seededRand() * (levelWidth - 200));
    var py = groundY - 40 - Math.floor(seededRand() * 140);
    var roll = seededRand();
    var ptype;
    if (roll > 0.95) ptype = 'badge';
    else if (roll > 0.88) ptype = 'myceliumOrb';
    else if (roll > 0.82) ptype = 'fungalEssence';
    else if (roll > 0.78) ptype = 'mushroomShield';
    else if (roll > 0.75) ptype = 'sporeGrenade';
    else ptype = 'cell';
    pickups.push({ x: px, y: py, w: 12, h: 12, type: ptype, collected: false });
  }

  // Boss at end
  var bossX = levelWidth - 200;
  var bossY = groundY - 60;
  bossActive = createBoss(bossX, bossY, planetIdx);
  bossHp = bossActive.hp;
  bossMaxHp = bossActive.hp;
}

function getEnemyType(planet) {
  var types = [
    ['myceliavine', 'moldspitter', 'sporecrawler'],
    ['shockshroom', 'sparkcap', 'thundermoss'],
    ['tidescale', 'jellyspore', 'coralcrab'],
    ['magmagolem', 'cinderboulder', 'emberspore'],
    ['nightshade', 'gloomwraith', 'phantomcap'],
    ['sporelord', 'mycotower', 'guardianmoss']
  ];
  var pool = types[planet];
  return pool[Math.floor(seededRand() * pool.length)];
}

function createEnemy(x, y, type) {
  var base = { x: x, y: y, w: 20, h: 20, vx: 0, vy: 0, type: type, hp: 2, maxHp: 2, dir: 1, timer: 0, dead: false, frozen: 0 };
  switch (type) {
    case 'myceliavine': base.hp = 1; base.w = 16; base.h = 32; break;
    case 'moldspitter': base.hp = 3; base.timer = 2; break;
    case 'sporecrawler': base.vx = 40; base.hp = 1; break;
    case 'shockshroom': base.hp = 2; base.w = 16; base.h = 40; break;
    case 'sparkcap': base.hp = 2; base.timer = 0; break;
    case 'thundermoss': base.hp = 3; base.vx = 60; break;
    case 'tidescale': base.hp = 1; base.vx = 50; base.w = 18; break;
    case 'jellyspore': base.hp = 2; base.vy = -20; break;
    case 'coralcrab': base.hp = 3; base.vx = 30; base.w = 24; break;
    case 'magmagolem': base.hp = 4; base.w = 28; base.h = 28; base.vx = 20; break;
    case 'cinderboulder': base.hp = 2; base.w = 24; base.h = 24; break;
    case 'emberspore': base.hp = 2; base.timer = 1.5; break;
    case 'nightshade': base.hp = 2; base.vx = 70; break;
    case 'gloomwraith': base.hp = 3; base.vy = -30; break;
    case 'phantomcap': base.hp = 4; base.vx = 50; break;
    case 'sporelord': base.hp = 5; base.vx = 40; base.w = 24; base.h = 24; break;
    case 'mycotower': base.hp = 4; base.timer = 1.5; break;
    case 'guardianmoss': base.hp = 6; base.w = 28; base.h = 28; base.vx = 30; break;
  }
  base.maxHp = base.hp;
  return base;
}

// === TOAD EMPIRE BOSS DEFINITIONS ===
var BOSS_NAMES = ['Toad Broodmother', 'Cryo Toad General', 'Garden Devourer', 'Fortress Toad King', 'Shadow Toad Lord', 'Emperor Toad Prime'];
var BOSS_COLORS = ['#38d973', '#3cacd7', '#4a8a4a', '#f60', '#a855f7', '#a855f7'];
var BOSS_ATTACK_PATTERNS = ['spread', 'jump', 'rush', 'summon', 'nova'];

function createBoss(x, y, planet) {
  return {
    x: x, y: y, w: 48, h: 48, vx: 0, vy: 0,
    hp: 15 + planet * 5,
    type: 'boss',
    name: BOSS_NAMES[planet],
    bossColor: BOSS_COLORS[planet],
    planet: planet, phase: 0, timer: 0, dir: -1,
    attackTimer: 2, pattern: 0, dead: false, flashTimer: 0,
    spawnTimer: 0, novaTimer: 0, enraged: false
  };
}

// === PLAYER INIT ===
function initPlayer(x, y) {
  player = {
    x: x, y: y, w: 14, h: 22, vx: 0, vy: 0,
    grounded: false, facing: 1, shooting: false,
    inWater: false, wallClimbing: false, wallDir: 0
  };
  chargeTimer = 0;
  groundPounding = false;
  wallClinging = false;
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + STAT_LIFE_BONUS; // CON bonus (ref 4)
  hp = 5 + STAT_HP_BONUS; // CON bonus (ref 3)
  maxHp = 5 + STAT_HP_BONUS;
  energyCells = 0;
  currentPlanet = 0;
  activeChar = 'captain';
  shieldTimer = 0;
  boostTimer = 0;
  if (!tutorialShown) {
    tutorialTimer = 6;
    tutorialShown = true;
  }
  startPlanet(0);
}

function startPlanet(idx) {
  currentPlanet = idx;
  generateLevel(idx);
  initPlayer(60, GH - TILE * 4);
  checkpointX = 60;
  checkpointY = GH - TILE * 4;
  levelComplete = false;
  invulnTimer = 0;
  transitionTimer = 2;
  transitionText = PLANETS[idx].name;
}

function respawnPlayer() {
  initPlayer(checkpointX, checkpointY);
  invulnTimer = INVULN_TIME + STAT_INVULN_BONUS; // CON extends invuln (ref 15)
}

// === INPUT HELPERS ===
function keyLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['a'] || TAS.input.touch.left; }
function keyRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['d'] || TAS.input.touch.right; }
function keyUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['w'] || TAS.input.touch.up; }
function keyDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['s'] || TAS.input.touch.down; }
function keyJump() { return TAS.input.keys[' '] || TAS.input.keys['z'] || TAS.input.touch.a; }
function keySwap() { return TAS.input.keys['x'] || TAS.input.keys['b'] || TAS.input.touch.b; }
function keyFire() { return TAS.input.keys['c'] || TAS.input.keys['f'] || TAS.input.keys['Control']; }

let prevSwap = false;
let prevJump = false;
let prevFire = false;

// === COLLISION ===
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function solidAt(x, y, w, h) {
  var box = { x: x, y: y, w: w, h: h };
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'crumble') {
      var ct = crumblingTiles.find(function(c) { return c.x === p.x && c.y === p.y; });
      if (ct && ct.fallen) continue;
    }
    if (rectOverlap(box, p)) return p;
  }
  return null;
}

function inWater(x, y, w, h) {
  var box = { x: x, y: y, w: w, h: h };
  for (var i = 0; i < waterZones.length; i++) {
    if (rectOverlap(box, waterZones[i])) return true;
  }
  return false;
}

function inLava(x, y, w, h) {
  var box = { x: x, y: y, w: w, h: h };
  for (var i = 0; i < lavaZones.length; i++) {
    if (rectOverlap(box, lavaZones[i])) return true;
  }
  return false;
}

function inDark(x, y) {
  for (var i = 0; i < darkZones.length; i++) {
    var dz = darkZones[i];
    if (x >= dz.x && x <= dz.x + dz.w && y >= dz.y && y <= dz.y + dz.h) return true;
  }
  return false;
}

// === COMBO SYSTEM ===
function addCombo() {
  comboCount++;
  comboTimer = 2;
}

function getComboMult() {
  if (comboCount < 3) return 1;
  if (comboCount < 6) return 1.5;
  if (comboCount < 10) return 2;
  return 3;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCount = 0; comboTimer = 0; }
  }

  // Tutorial timer
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // Shield/boost timers
  if (shieldTimer > 0) shieldTimer -= dt;
  if (boostTimer > 0) boostTimer -= dt;

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (keyJump() || keyFire()) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (keyJump() && !prevJump) {
      state = 'title';
    }
    prevJump = keyJump();
    return;
  }

  if (state === 'planetSelect') {
    updatePlanetSelect(dt);
    return;
  }

  if (state === 'transition') {
    transitionTimer -= dt;
    if (transitionTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'rescue') {
    rescueAnim += dt;
    if (rescueAnim > 3) {
      if (currentPlanet < 5) {
        clearedPlanets.push(currentPlanet);
        var charToUnlock = CHAR_ORDER[currentPlanet + 1];
        if (charToUnlock && !unlockedChars.includes(charToUnlock)) {
          unlockedChars.push(charToUnlock);
          rescueChar = charToUnlock;
        }
        saveGame();
        state = 'planetSelect';
      } else {
        state = 'victory';
        if (score > highScore) {
          highScore = score;
          TAS.score.save('buckyohare_hi', highScore);
          saveGame();
        }
      }
    }
    return;
  }

  if (state === 'victory') {
    if (keyJump() && !prevJump) state = 'title';
    prevJump = keyJump();
    return;
  }

  if (state === 'playing') {
    if (transitionTimer > 0) {
      transitionTimer -= dt;
      if (transitionTimer <= 0) transitionTimer = 0;
      return;
    }

    if (deathTimer > 0) {
      deathTimer -= dt;
      if (deathTimer <= 0) {
        lives--;
        if (lives <= 0) {
          state = 'gameOver';
          if (score > highScore) {
            highScore = score;
            TAS.score.save('buckyohare_hi', highScore);
            saveGame();
          }
        } else {
          hp = maxHp;
          respawnPlayer();
        }
      }
      return;
    }

    updatePlayer(dt);
    updateBullets(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updatePickups(dt);
    updateCrumbling(dt);
    updateSparkTrails(dt);
    updateHazardSpores(dt);
    updateZoneBgParticles(dt);
    updateCamera(dt);

    // Character swap - WIS reduces cooldown (ref 6)
    if (keySwap() && !prevSwap && swapCooldown <= 0) {
      swapCharacter();
      swapCooldown = 0.3 * STAT_CD_MULT;
    }
    if (swapCooldown > 0) swapCooldown -= dt;
    prevSwap = keySwap();

    // Check level complete
    if (bossActive && bossActive.dead && !levelComplete) {
      levelComplete = true;
      state = 'rescue';
      rescueAnim = 0;
      var bossScore = Math.floor(1000 * (currentPlanet + 1) * STAT_SCORE_MULT); // INT bonus (ref 5)
      score += bossScore;
      bossesDefeated++;
      spawnScorePopup(bossActive.x + bossActive.w / 2, bossActive.y, '+' + bossScore, '#f4b41b');
      TAS.audio.playTone(440, 0.3, 'square');
      TAS.audio.playTone(660, 0.3, 'square');
    }
  }
}

function swapCharacter() {
  var curIdx = CHAR_ORDER.indexOf(activeChar);
  var next = (curIdx + 1) % CHAR_ORDER.length;
  var attempts = 0;
  while (!unlockedChars.includes(CHAR_ORDER[next]) && attempts < 4) {
    next = (next + 1) % CHAR_ORDER.length;
    attempts++;
  }
  if (CHAR_ORDER[next] !== activeChar) {
    activeChar = CHAR_ORDER[next];
    TAS.audio.playTone(523, 0.08, 'square');
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, CHARS[activeChar].color, 8);
    chargeTimer = 0;
    groundPounding = false;
    wallClinging = false;
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  if (!player) return;
  var charDef = CHARS[activeChar];
  var spd = charDef.speed * STAT_SPEED_MULT; // DEX speed (ref 2)
  var jmp = charDef.jumpPow;
  if (boostTimer > 0) spd *= 1.3;

  if (invulnTimer > 0) invulnTimer -= dt;

  // Horizontal movement
  var moveX = 0;
  if (keyLeft()) { moveX = -1; player.facing = -1; }
  if (keyRight()) { moveX = 1; player.facing = 1; }

  // Wall climbing for Rocks - STR affects grip (ref 16)
  if (activeChar === 'rocks' && !player.grounded) {
    var wallCheckL = solidAt(player.x - 2, player.y, 2, player.h);
    var wallCheckR = solidAt(player.x + player.w, player.y, 2, player.h);
    if (wallCheckL && moveX === -1) {
      wallClinging = true;
      wallDir = -1;
      player.vy = Math.min(player.vy, 40 / STAT_WALL_GRIP);
    } else if (wallCheckR && moveX === 1) {
      wallClinging = true;
      wallDir = 1;
      player.vy = Math.min(player.vy, 40 / STAT_WALL_GRIP);
    } else {
      wallClinging = false;
    }
  } else {
    wallClinging = false;
  }

  player.vx = moveX * spd;

  // Water physics for Aqua - DEX swim speed (ref 12)
  player.inWater = inWater(player.x, player.y, player.w, player.h);
  if (player.inWater) {
    if (activeChar === 'aqua') {
      player.vy *= 0.9;
      if (keyUp()) player.vy -= 300 * STAT_SWIM_SPEED * dt;
      if (keyDown()) player.vy += 200 * dt;
      player.vy = Math.max(-150 * STAT_SWIM_SPEED, Math.min(150, player.vy));
    } else {
      player.vy += GRAVITY * 0.3 * dt;
      player.vy = Math.min(player.vy, 120);
      if (frame % 60 === 0) damagePlayer(1);
    }
  } else {
    if (!wallClinging) {
      player.vy += GRAVITY * dt;
    }
  }

  // Ground pound for Rocks
  if (activeChar === 'rocks' && keyDown() && !player.grounded && !groundPounding) {
    groundPounding = true;
    player.vy = 500;
    player.vx = 0;
    TAS.audio.playTone(80, 0.1, 'sawtooth');
  }

  // Jump
  if (keyJump() && !prevJump) {
    if (player.grounded) {
      player.vy = jmp;
      player.grounded = false;
      TAS.audio.playTone(300, 0.06, 'square');
    } else if (wallClinging && activeChar === 'rocks') {
      player.vy = jmp * 0.8;
      player.vx = -wallDir * spd * 1.5;
      wallClinging = false;
      TAS.audio.playTone(350, 0.06, 'square');
    } else if (player.inWater && activeChar === 'aqua') {
      player.vy = jmp * 0.6;
      TAS.audio.playTone(400, 0.05, 'sine');
    }
  }
  prevJump = keyJump();

  // Charge shot (Captain) - WIS charge speed (ref 11)
  if (activeChar === 'captain') {
    if (keyFire()) {
      chargeTimer += dt * STAT_CHARGE_SPEED;
      if (chargeTimer > charDef.chargeMax) chargeTimer = charDef.chargeMax;
    } else if (chargeTimer > 0) {
      fireWeapon(chargeTimer >= charDef.chargeMax * 0.8);
      chargeTimer = 0;
    }
  }

  // Regular fire
  if (keyFire() && !prevFire && activeChar !== 'captain') {
    fireWeapon(false);
  }
  prevFire = keyFire();

  // Clamp fall speed
  if (!player.inWater && !groundPounding) {
    player.vy = Math.min(player.vy, MAX_FALL);
  }

  // Apply movement with collision
  var newX = player.x + player.vx * dt;
  var newY = player.y + player.vy * dt;

  // Horizontal collision
  if (solidAt(newX, player.y, player.w, player.h)) {
    newX = player.x;
    player.vx = 0;
  }

  // Vertical collision
  player.grounded = false;
  if (player.vy > 0) {
    var ground = solidAt(newX, newY, player.w, player.h);
    if (ground) {
      newY = ground.y - player.h;
      player.vy = 0;
      player.grounded = true;
      if (groundPounding) {
        groundPounding = false;
        TAS.fx.shake(6, 0.2);
        TAS.audio.playTone(60, 0.2, 'sawtooth');
        for (var ei = 0; ei < enemies.length; ei++) {
          var e = enemies[ei];
          if (!e.dead && Math.abs(e.x - player.x) < 60 && Math.abs(e.y - player.y) < 40) {
            damageEnemy(e, Math.floor(3 * STAT_DMG_MULT)); // STR ground pound (ref 1)
          }
        }
      }
      var ct = crumblingTiles.find(function(c) { return c.x === ground.x && c.y === ground.y && !c.fallen; });
      if (ct) ct.timer = 0.8;
    }
  } else if (player.vy < 0) {
    if (solidAt(newX, newY, player.w, player.h)) {
      newY = player.y;
      player.vy = 0;
    }
  }

  player.x = newX;
  player.y = newY;

  // Bounds
  if (player.x < 0) player.x = 0;
  if (player.x > levelWidth - player.w) player.x = levelWidth - player.w;

  // Fall death
  if (player.y > GH + 50) {
    damagePlayer(5);
  }

  // Lava damage
  if (inLava(player.x, player.y, player.w, player.h)) {
    damagePlayer(2);
    player.vy = -200;
  }

  // Electric barrier collision
  for (var ebi = 0; ebi < electricBarriers.length; ebi++) {
    var eb = electricBarriers[ebi];
    if (!eb.active) continue;
    var pulse = Math.sin(frame * 0.05 + eb.phase);
    if (pulse > 0 && rectOverlap(player, eb)) {
      if (activeChar === 'sparks') {
        // Sparks passes through and absorbs energy
      } else {
        damagePlayer(1);
        player.vx = -player.facing * 200;
      }
    }
  }

  // Hazard spore collision
  for (var hsi = 0; hsi < hazardSpores.length; hsi++) {
    var hs = hazardSpores[hsi];
    if (!hs.active) continue;
    var dx = (player.x + player.w / 2) - hs.x;
    var dy = (player.y + player.h / 2) - hs.y;
    if (Math.sqrt(dx * dx + dy * dy) < hs.radius + 8) {
      damagePlayer(1);
      hs.active = false;
      hs.timer = 3;
      TAS.particles.spawn(hs.x, hs.y, '#8f4', 12);
      TAS.audio.playTone(200, 0.1, 'sawtooth');
    }
  }

  // Checkpoint (midlevel)
  if (player.x > levelWidth * 0.5 && checkpointX < levelWidth * 0.5) {
    checkpointX = player.x;
    checkpointY = player.y;
    TAS.audio.playTone(660, 0.1, 'sine');
    TAS.audio.playTone(880, 0.1, 'sine');
    spawnScorePopup(player.x + player.w / 2, player.y - 10, 'CHECKPOINT', '#38d973');
  }

  // Enemy collision
  for (var eci = 0; eci < enemies.length; eci++) {
    var en = enemies[eci];
    if (en.dead) continue;
    if (rectOverlap(player, en)) {
      // DEX dodge chance (ref 10)
      if (Math.random() < STAT_DODGE_CHANCE) {
        spawnScorePopup(player.x + player.w / 2, player.y - 10, 'DODGE!', '#3cacd7');
        TAS.audio.playTone(700, 0.05, 'sine');
      } else {
        damagePlayer(1);
      }
    }
  }

  // Pickup magnet - CHA range (ref 13)
  for (var pi = 0; pi < pickups.length; pi++) {
    var pk = pickups[pi];
    if (pk.collected) continue;
    var pdx = pk.x - player.x;
    var pdy = pk.y - player.y;
    var pdist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (pdist < STAT_PICKUP_RANGE && pdist > 0) {
      pk.x -= (pdx / pdist) * 100 * dt;
      pk.y -= (pdy / pdist) * 100 * dt;
    }
  }
}

function damagePlayer(amount) {
  if (invulnTimer > 0 || deathTimer > 0) return;
  if (shieldTimer > 0) {
    shieldTimer = 0;
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#3cacd7', 15);
    TAS.audio.playTone(600, 0.1, 'sine');
    spawnScorePopup(player.x + player.w / 2, player.y - 10, 'BLOCKED!', '#3cacd7');
    return;
  }
  hp -= amount;
  invulnTimer = INVULN_TIME + STAT_INVULN_BONUS; // CON invuln bonus (ref 15)
  TAS.fx.shake(4, 0.15);
  TAS.fx.flash('#f00', 0.1);
  TAS.audio.playTone(150, 0.15, 'sawtooth');
  comboCount = 0;
  if (hp <= 0) {
    hp = 0;
    deathTimer = 1.5;
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#fff', 20);
    TAS.audio.playTone(100, 0.4, 'sawtooth');
  }
}

// === WEAPON SYSTEM ===
function fireWeapon(charged) {
  if (!player) return;
  var bx = player.x + (player.facing > 0 ? player.w : -8);
  var by = player.y + player.h / 2 - 3;
  var dmgMult = STAT_DMG_MULT * (boostTimer > 0 ? 1.5 : 1); // STR damage (ref 1)

  switch (activeChar) {
    case 'captain': {
      var size = charged ? 12 : 6;
      var dmg = Math.floor((charged ? 4 : 1) * dmgMult);
      var spd = charged ? BULLET_SPEED * 1.5 : BULLET_SPEED;
      bullets.push({ x: bx, y: by, w: size, h: size, vx: player.facing * spd, vy: 0,
        type: 'charge', dmg: dmg, color: charged ? '#f4b41b' : '#38d973', life: 2, trail: charged });
      TAS.audio.playTone(charged ? 220 : 440, charged ? 0.2 : 0.08, 'square');
      break;
    }
    case 'sparks': {
      var dmg = Math.floor(2 * dmgMult);
      bullets.push({ x: bx, y: by, w: 8, h: 8, vx: player.facing * BULLET_SPEED, vy: 0,
        type: 'spark', dmg: dmg, color: '#f4b41b', life: 3, wallBounce: true, bounces: 3 });
      TAS.audio.playTone(800, 0.08, 'sawtooth');
      break;
    }
    case 'aqua': {
      var dmg = Math.floor(1 * dmgMult);
      bullets.push({ x: bx, y: by, w: 10, h: 6, vx: player.facing * BULLET_SPEED * 0.8, vy: 0,
        type: 'ice', dmg: dmg, color: '#3cacd7', life: 2.5, freeze: true });
      TAS.audio.playTone(600, 0.1, 'sine');
      break;
    }
    case 'rocks': {
      var fistDmg = Math.floor(3 * dmgMult);
      var fistRange = 30;
      var fistBox = {
        x: player.x + (player.facing > 0 ? player.w : -fistRange), y: player.y,
        w: fistRange, h: player.h
      };
      for (var i = 0; i < enemies.length; i++) {
        var e = enemies[i];
        if (!e.dead && rectOverlap(fistBox, e)) {
          damageEnemy(e, fistDmg);
        }
      }
      if (bossActive && !bossActive.dead && rectOverlap(fistBox, bossActive)) {
        damageBoss(fistDmg);
      }
      TAS.particles.spawn(bx + player.facing * 15, by, '#e44', 5);
      TAS.audio.playTone(120, 0.1, 'sawtooth');
      break;
    }
  }
}

// === BULLET UPDATE ===
function updateBullets(dt) {
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.life -= dt;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Spark wall bounce
    if (b.type === 'spark' && b.wallBounce) {
      var hit = solidAt(b.x, b.y, b.w, b.h);
      if (hit) {
        if (b.bounces > 0) {
          b.bounces--;
          if (Math.abs(b.vx) > Math.abs(b.vy)) {
            b.vy = b.vx > 0 ? -Math.abs(b.vx) : Math.abs(b.vx);
            b.vx = 0;
          } else {
            b.vx = b.vy > 0 ? Math.abs(b.vy) : -Math.abs(b.vy);
            b.vy = 0;
          }
          sparkTrails.push({ x: b.x, y: b.y, life: 0.5 });
          TAS.audio.playTone(900 + b.bounces * 200, 0.04, 'sawtooth');
        } else {
          bullets.splice(i, 1); continue;
        }
      }
    }

    // Ice freeze: create platform on enemy hit
    if (b.type === 'ice' && b.freeze) {
      for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.dead && rectOverlap(b, e)) {
          damageEnemy(e, b.dmg);
          if (e.dead) {
            platforms.push({ x: e.x - 4, y: e.y, w: e.w + 8, h: e.h, type: 'ice', life: 5 });
          }
          bullets.splice(i, 1);
          break;
        }
      }
      if (i >= bullets.length) continue;
    }

    // Hit enemies
    for (var ei2 = 0; ei2 < enemies.length; ei2++) {
      var e2 = enemies[ei2];
      if (e2.dead) continue;
      if (rectOverlap(b, e2)) {
        // LUCK crit chance (ref 8)
        var isCrit = Math.random() < STAT_CRIT_CHANCE;
        var finalDmg = isCrit ? Math.floor(b.dmg * 2) : b.dmg;
        damageEnemy(e2, finalDmg);
        if (isCrit) {
          spawnScorePopup(e2.x + e2.w / 2, e2.y - 10, 'CRIT!', '#f44');
          TAS.fx.shake(2, 0.08);
        }
        if (b.type !== 'spark') { bullets.splice(i, 1); break; }
      }
    }
    if (i >= bullets.length) continue;

    // Hit boss
    if (bossActive && !bossActive.dead && rectOverlap(b, bossActive)) {
      var isCrit = Math.random() < STAT_CRIT_CHANCE; // LUCK crit (ref 8)
      var bossDmg = isCrit ? Math.floor(b.dmg * 2) : b.dmg;
      damageBoss(bossDmg);
      if (isCrit) {
        spawnScorePopup(bossActive.x + bossActive.w / 2, bossActive.y - 10, 'CRIT!', '#f44');
      }
      if (b.type !== 'spark') bullets.splice(i, 1);
      continue;
    }

    // Out of bounds
    if (b.x < camera.x - 50 || b.x > camera.x + GW + 50 || b.y < -50 || b.y > GH + 50) {
      bullets.splice(i, 1);
    }
  }

  // Remove expired ice platforms
  for (var i = platforms.length - 1; i >= 0; i--) {
    if (platforms[i].type === 'ice') {
      platforms[i].life -= dt;
      if (platforms[i].life <= 0) platforms.splice(i, 1);
    }
  }
}

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.dead) continue;
    if (e.frozen > 0) { e.frozen -= dt; continue; }
    if (Math.abs(e.x - camera.x - GW / 2) > GW) continue;

    e.timer -= dt;

    switch (e.type) {
      case 'sporecrawler': case 'thundermoss': case 'coralcrab': case 'nightshade': case 'phantomcap':
      case 'magmagolem': case 'sporelord': case 'guardianmoss':
        e.x += e.vx * e.dir * dt;
        if (!solidAt(e.x + (e.dir > 0 ? e.w : -4), e.y + e.h, 8, 4)) {
          e.dir *= -1;
        }
        if (solidAt(e.x + e.vx * e.dir * dt, e.y, e.w, e.h)) {
          e.dir *= -1;
        }
        break;
      case 'sparkcap':
        e.timer += dt * 2;
        e.x += Math.cos(e.timer) * 60 * dt;
        e.y += Math.sin(e.timer) * 40 * dt;
        break;
      case 'jellyspore': case 'gloomwraith':
        e.y += Math.sin(frame * 0.03 + e.x * 0.01) * 30 * dt;
        break;
      case 'moldspitter': case 'mycotower': case 'emberspore':
        if (e.timer <= 0) {
          e.timer = 2 + Math.random();
          if (player && Math.abs(e.x - player.x) < 200) {
            var dx = player.x - e.x;
            var dy = player.y - e.y;
            var dist = Math.sqrt(dx * dx + dy * dy) || 1;
            bullets.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, w: 6, h: 6,
              vx: (dx / dist) * 150, vy: (dy / dist) * 150,
              type: 'enemy', dmg: 1, color: '#f80', life: 3 });
          }
        }
        break;
      case 'tidescale':
        e.x += e.vx * e.dir * dt;
        if (e.x < e.x - 80 || e.x > e.x + 80) e.dir *= -1;
        break;
    }
  }

  // Enemy bullets hitting player
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.type === 'enemy' && player && rectOverlap(b, player)) {
      damagePlayer(b.dmg);
      bullets.splice(i, 1);
    }
  }
}

function damageEnemy(e, dmg) {
  e.hp -= dmg;
  TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#fff', 4);
  if (e.hp <= 0) {
    e.dead = true;
    addCombo();
    var baseScore = 50;
    var finalScore = Math.floor(baseScore * STAT_SCORE_MULT * getComboMult()); // INT score (ref 5)
    score += finalScore;
    totalKills++;
    spawnScorePopup(e.x + e.w / 2, e.y, '+' + finalScore, comboCount >= 3 ? '#f80' : '#f4b41b');
    TAS.audio.playTone(500, 0.08, 'square');
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#f4b41b', 10);

    // CHA drop chance for bonus items (ref 7)
    if (Math.random() < 0.15 * STAT_DROP_RATE) {
      var dropType = Math.random() > 0.7 ? 'myceliumOrb' : 'fungalEssence';
      pickups.push({ x: e.x, y: e.y, w: 12, h: 12, type: dropType, collected: false });
    }
  }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!bossActive || bossActive.dead) return;

  var b = bossActive;
  b.timer += dt;
  b.attackTimer -= dt;
  if (b.flashTimer > 0) b.flashTimer -= dt;

  // Enrage at 30% HP
  if (!b.enraged && bossHp < bossMaxHp * 0.3) {
    b.enraged = true;
    TAS.fx.shake(8, 0.3);
    TAS.fx.flash('#f00', 0.2);
    TAS.audio.playTone(80, 0.4, 'sawtooth');
    spawnScorePopup(b.x + b.w / 2, b.y - 20, 'ENRAGED!', '#f00');
  }

  var speedMult = b.enraged ? 1.5 : 1;

  // Movement pattern
  switch (b.phase) {
    case 0:
      b.x += 80 * speedMult * b.dir * dt;
      if (b.timer > 2) { b.dir *= -1; b.timer = 0; }
      break;
    case 1:
      b.vy += GRAVITY * 0.8 * dt;
      b.x += 60 * speedMult * b.dir * dt;
      b.y += b.vy * dt;
      if (b.y > GH - TILE * 2 - b.h) {
        b.y = GH - TILE * 2 - b.h;
        b.vy = 0;
        b.phase = 0;
        TAS.fx.shake(4, 0.15);
      }
      break;
  }

  // Attack
  if (b.attackTimer <= 0) {
    var cooldown = (2 - currentPlanet * 0.15) * (b.enraged ? 0.6 : 1);
    b.attackTimer = cooldown;
    b.pattern = (b.pattern + 1) % (b.enraged ? 5 : 3);

    if (b.pattern === 0) {
      // Spread shot
      var spreadCount = b.enraged ? 5 : 3;
      for (var a = -Math.floor(spreadCount / 2); a <= Math.floor(spreadCount / 2); a++) {
        bullets.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, w: 8, h: 8,
          vx: b.dir * -200, vy: a * 80,
          type: 'enemy', dmg: 2, color: b.bossColor || '#f0f', life: 3 });
      }
      TAS.audio.playTone(150, 0.15, 'sawtooth');
    } else if (b.pattern === 1) {
      // Jump
      b.vy = -350 * speedMult;
      b.phase = 1;
      if (player) b.dir = player.x > b.x ? 1 : -1;
    } else if (b.pattern === 2) {
      // Rush
      b.dir = player ? (player.x > b.x ? 1 : -1) : b.dir;
      b.x += b.dir * 120 * speedMult;
      TAS.fx.shake(2, 0.1);
    } else if (b.pattern === 3) {
      // Summon minions (enraged only)
      var mType = getEnemyType(currentPlanet);
      enemies.push(createEnemy(b.x - 40, b.y, mType));
      enemies.push(createEnemy(b.x + b.w + 20, b.y, mType));
      TAS.audio.playTone(180, 0.2, 'sawtooth');
      spawnScorePopup(b.x + b.w / 2, b.y - 10, 'SUMMON!', '#f4f');
    } else if (b.pattern === 4) {
      // Nova burst (enraged only)
      for (var a = 0; a < 8; a++) {
        var angle = (a / 8) * Math.PI * 2;
        bullets.push({ x: b.x + b.w / 2, y: b.y + b.h / 2, w: 6, h: 6,
          vx: Math.cos(angle) * 180, vy: Math.sin(angle) * 180,
          type: 'enemy', dmg: 2, color: '#f44', life: 2 });
      }
      TAS.fx.shake(5, 0.2);
      TAS.audio.playTone(100, 0.25, 'sawtooth');
    }
  }

  // Boss-player collision
  if (player && rectOverlap(player, b)) {
    damagePlayer(2);
  }
}

function damageBoss(dmg) {
  if (!bossActive || bossActive.dead) return;

  // Focus character bonus
  var planet = PLANETS[currentPlanet];
  if (activeChar === planet.focus || planet.focus === 'all') dmg *= 2;
  dmg = Math.floor(dmg * STAT_BOSS_DMG); // STR boss damage (ref 9)

  bossHp -= dmg;
  bossActive.flashTimer = 0.15;
  TAS.fx.shake(3, 0.1);
  TAS.audio.playTone(200, 0.1, 'square');
  spawnScorePopup(bossActive.x + bossActive.w / 2, bossActive.y - 10, '-' + dmg, '#f88');

  if (bossHp <= 0) {
    bossActive.dead = true;
    var bossKillScore = Math.floor(2000 * STAT_SCORE_MULT); // INT score (ref 5)
    score += bossKillScore;
    spawnScorePopup(bossActive.x + bossActive.w / 2, bossActive.y - 20, '+' + bossKillScore, '#f4b41b');
    TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, '#f4b41b', 30);
    // Boss death explosion cascade
    for (var i = 0; i < 5; i++) {
      (function(idx) {
        setTimeout(function() {
          TAS.particles.spawn(
            bossActive.x + Math.random() * bossActive.w,
            bossActive.y + Math.random() * bossActive.h,
            ['#f00', '#ff0', '#f80', '#fff', '#f4f'][idx], 8
          );
        }, idx * 200);
      })(i);
    }
    TAS.audio.playTone(440, 0.3, 'square');
  }
}

// === PICKUPS (Baseling themed) ===
function updatePickups(dt) {
  if (!player) return;
  for (var i = 0; i < pickups.length; i++) {
    var p = pickups[i];
    if (p.collected) continue;
    if (rectOverlap(player, p)) {
      p.collected = true;
      switch (p.type) {
        case 'cell':
          energyCells += Math.floor(1 * STAT_XP_MULT); // INT energy value (ref 14)
          var cellScore = Math.floor(10 * STAT_SCORE_MULT);
          score += cellScore;
          if (energyCells >= 100) { energyCells -= 100; lives++; TAS.audio.playTone(880, 0.2, 'sine'); }
          TAS.audio.playTone(600, 0.05, 'sine');
          spawnScorePopup(p.x, p.y, '+' + cellScore, '#38d973');
          break;
        case 'badge':
          badges++;
          var badgeScore = Math.floor(500 * STAT_SCORE_MULT);
          score += badgeScore;
          TAS.audio.playTone(440, 0.1, 'sine');
          TAS.audio.playTone(660, 0.1, 'sine');
          spawnScorePopup(p.x, p.y, 'BADGE +' + badgeScore, '#f4b41b');
          break;
        case 'myceliumOrb':
          hp = Math.min(maxHp, hp + 2);
          var orbScore = Math.floor(100 * STAT_SCORE_MULT);
          score += orbScore;
          TAS.audio.playTone(523, 0.1, 'sine');
          TAS.audio.playTone(784, 0.1, 'sine');
          spawnScorePopup(p.x, p.y, 'HEAL +' + orbScore, '#a855f7');
          TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#a855f7', 10);
          break;
        case 'fungalEssence':
          boostTimer = 5;
          var essScore = Math.floor(50 * STAT_SCORE_MULT);
          score += essScore;
          TAS.audio.playTone(700, 0.08, 'square');
          spawnScorePopup(p.x, p.y, 'BOOST! +' + essScore, '#f4b41b');
          TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#f4b41b', 8);
          break;
        case 'mushroomShield':
          shieldTimer = 8;
          TAS.audio.playTone(400, 0.15, 'sine');
          spawnScorePopup(p.x, p.y, 'SHIELD!', '#3cacd7');
          TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#3cacd7', 12);
          break;
        case 'sporeGrenade':
          // Damage all nearby enemies
          for (var ei = 0; ei < enemies.length; ei++) {
            var e = enemies[ei];
            if (!e.dead && Math.abs(e.x - player.x) < 120 && Math.abs(e.y - player.y) < 80) {
              damageEnemy(e, Math.floor(2 * STAT_DMG_MULT));
            }
          }
          TAS.fx.shake(6, 0.2);
          TAS.audio.playTone(120, 0.2, 'sawtooth');
          TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#f84', 20);
          spawnScorePopup(p.x, p.y, 'BOOM!', '#f84');
          break;
      }
    }
  }
}

// === CRUMBLING TILES ===
function updateCrumbling(dt) {
  for (var i = 0; i < crumblingTiles.length; i++) {
    var ct = crumblingTiles[i];
    if (ct.fallen) continue;
    if (ct.timer > 0) {
      ct.timer -= dt;
      if (ct.timer <= 0) {
        ct.fallen = true;
        TAS.particles.spawn(ct.x + ct.w / 2, ct.y + ct.h / 2, '#864', 8);
        TAS.audio.playTone(80, 0.15, 'sawtooth');
      }
    }
  }
}

// === HAZARD SPORES ===
function updateHazardSpores(dt) {
  for (var i = 0; i < hazardSpores.length; i++) {
    var hs = hazardSpores[i];
    if (!hs.active) {
      hs.timer -= dt;
      if (hs.timer <= 0) hs.active = true;
    }
  }
}

// === SPARK TRAILS ===
function updateSparkTrails(dt) {
  for (var i = sparkTrails.length - 1; i >= 0; i--) {
    sparkTrails[i].life -= dt;
    if (sparkTrails[i].life <= 0) sparkTrails.splice(i, 1);
  }
}

// === CAMERA ===
function updateCamera(dt) {
  if (!player) return;
  var targetX = player.x - GW / 3;
  camera.x += (targetX - camera.x) * 4 * dt;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > levelWidth - GW) camera.x = levelWidth - GW;
}

// === PLANET SELECT ===
var selectCursor = 0;
function updatePlanetSelect(dt) {
  if (keyRight() && !TAS.input._prevRight) {
    selectCursor = Math.min(selectCursor + 1, 5);
    TAS.audio.playTone(400, 0.04, 'square');
  }
  if (keyLeft() && !TAS.input._prevLeft) {
    selectCursor = Math.max(selectCursor - 1, 0);
    TAS.audio.playTone(400, 0.04, 'square');
  }
  TAS.input._prevRight = keyRight();
  TAS.input._prevLeft = keyLeft();

  if (keyJump() && !prevJump) {
    if (!clearedPlanets.includes(selectCursor)) {
      startPlanet(selectCursor);
      state = 'transition';
      transitionTimer = 2;
      transitionText = PLANETS[selectCursor].name;
    }
  }
  prevJump = keyJump();
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: PLANETS[currentPlanet].name });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'planetSelect') {
    drawPlanetSelect();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'transition') {
    drawTransition();
    return;
  }

  if (state === 'rescue') {
    drawRescue();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'playing') {
    ctx.save();
    TAS.fx.applyShake();
    drawLevel();
    drawZoneBgParticles();
    drawHazardSpores();
    drawBullets();
    drawEnemies();
    drawBoss();
    drawPickups();
    drawPlayer();
    drawSparkTrails();
    drawScorePopups();
    TAS.particles.draw();
    ctx.restore();

    if (currentPlanet === 4) drawDarkness();

    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    if (tutorialTimer > 0) drawTutorial();
    TAS.input.drawTouchControls(GW, GH);

    // Transition overlay
    if (transitionTimer > 0) {
      var alpha = Math.min(1, transitionTimer);
      ctx.fillStyle = 'rgba(0,0,0,' + alpha + ')';
      ctx.fillRect(0, 0, GW, GH);
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(transitionText, GW / 2, GH / 2);
      ctx.font = '12px monospace';
      ctx.fillText(PLANETS[currentPlanet].desc, GW / 2, GH / 2 + 24);
    }
  }
}

  ctx.fillStyle = '#000';

// === DRAW TITLE ===
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }

  ctx.font = '9px monospace';

  // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT

      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);

  }

  // Stats
