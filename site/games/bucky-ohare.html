// === DRAW CHARACTER SPRITE ===
function drawCharSprite(x, y, charId, scale) {
  var s = scale || 1;
  var c = CHARS[charId];
  ctx.fillStyle = c.color;

  switch (charId) {
    case 'captain':
      ctx.fillRect(x + 3 * s, y + 6 * s, 8 * s, 12 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 2 * s, y, 10 * s, 8 * s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 4 * s, y + 2 * s, 3 * s, 3 * s);
      ctx.fillStyle = c.color;
      ctx.fillRect(x, y + 7 * s, 3 * s, 8 * s);
      ctx.fillRect(x + 11 * s, y + 7 * s, 3 * s, 8 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 3 * s, y + 18 * s, 4 * s, 5 * s);
      ctx.fillRect(x + 8 * s, y + 18 * s, 4 * s, 5 * s);
      ctx.fillStyle = '#888';
      ctx.fillRect(x + 12 * s, y + 9 * s, 5 * s, 3 * s);
      break;
    case 'sparks':
      ctx.fillRect(x + 4 * s, y + 5 * s, 6 * s, 11 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 3 * s, y + 1 * s, 8 * s, 6 * s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 6 * s, y, 2 * s, 3 * s);
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(x + 5 * s, y + 3 * s, 4 * s, 2 * s);
      ctx.fillStyle = c.color;
      ctx.fillRect(x + 1 * s, y + 6 * s, 3 * s, 7 * s);
      ctx.fillRect(x + 10 * s, y + 6 * s, 3 * s, 7 * s);
      if (frame % 8 < 4) {
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(x + 12 * s, y + 5 * s, 2 * s, 2 * s);
      }
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 4 * s, y + 16 * s, 3 * s, 5 * s);
      ctx.fillRect(x + 7 * s, y + 16 * s, 3 * s, 5 * s);
      break;
    case 'aqua':
      ctx.fillRect(x + 3 * s, y + 6 * s, 8 * s, 11 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 2 * s, y + 1 * s, 10 * s, 7 * s);
      ctx.fillStyle = '#3cacd7';
      ctx.fillRect(x + 5 * s, y, 4 * s, 3 * s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 4 * s, y + 3 * s, 3 * s, 2 * s);
      ctx.fillStyle = c.color;
      ctx.fillRect(x, y + 7 * s, 4 * s, 6 * s);
      ctx.fillRect(x + 10 * s, y + 7 * s, 4 * s, 6 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 3 * s, y + 17 * s, 4 * s, 5 * s);
      ctx.fillRect(x + 7 * s, y + 17 * s, 4 * s, 5 * s);
      break;
    case 'rocks':
      ctx.fillRect(x + 2 * s, y + 5 * s, 10 * s, 13 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 1 * s, y, 12 * s, 7 * s);
      ctx.fillStyle = '#fff';
      ctx.fillRect(x + 4 * s, y + 2 * s, 2 * s, 3 * s);
      ctx.fillRect(x + 8 * s, y + 2 * s, 2 * s, 3 * s);
      ctx.fillStyle = c.color;
      ctx.fillRect(x - 2 * s, y + 6 * s, 5 * s, 10 * s);
      ctx.fillRect(x + 11 * s, y + 6 * s, 5 * s, 10 * s);
      ctx.fillStyle = '#faa';
      ctx.fillRect(x - 2 * s, y + 14 * s, 5 * s, 4 * s);
      ctx.fillRect(x + 11 * s, y + 14 * s, 5 * s, 4 * s);
      ctx.fillStyle = c.accent;
      ctx.fillRect(x + 2 * s, y + 18 * s, 5 * s, 5 * s);
      ctx.fillRect(x + 7 * s, y + 18 * s, 5 * s, 5 * s);
      break;
  }
}

// === DRAW LEVEL ===
function drawLevel() {
  var planet = PLANETS[currentPlanet];
  ctx.fillStyle = planet.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax mushroom silhouettes
  for (var i = 0; i < 12; i++) {
    var bx = ((i * 150 - camera.x * 0.3) % (GW + 200)) - 50;
    var by = 40 + (i * 47) % 200;
    ctx.fillStyle = planet.accent + '22';
    // Mushroom cap shape
    ctx.beginPath();
    ctx.arc(bx, by, 20 + i * 3, Math.PI, Math.PI * 2);
    ctx.fill();
    ctx.fillRect(bx - 4, by, 8, 15 + i * 2);
  }

  // Water zones
  for (var wi = 0; wi < waterZones.length; wi++) {
    var wz = waterZones[wi];
    var wx = wz.x - camera.x;
    ctx.fillStyle = 'rgba(30, 80, 180, 0.5)';
    ctx.fillRect(wx, wz.y, wz.w, wz.h);
    ctx.strokeStyle = '#6af';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (var sx = 0; sx < wz.w; sx += 8) {
      var sy = wz.y + Math.sin((sx + frame * 2) * 0.05) * 3;
      if (sx === 0) ctx.moveTo(wx + sx, sy); else ctx.lineTo(wx + sx, sy);
    }
    ctx.stroke();
  }

  // Lava zones
  for (var li = 0; li < lavaZones.length; li++) {
    var lz = lavaZones[li];
    var lx = lz.x - camera.x;
    ctx.fillStyle = '#a30';
    ctx.fillRect(lx, lz.y, lz.w, lz.h);
    ctx.fillStyle = frame % 20 < 10 ? '#f80' : '#fa0';
    ctx.fillRect(lx, lz.y, lz.w, 4);
    // Lava bubbles
    for (var bi = 0; bi < 3; bi++) {
      var bub = Math.sin(frame * 0.04 + bi * 2 + lz.x * 0.01);
      if (bub > 0.5) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(lx + lz.w * (0.2 + bi * 0.3), lz.y - bub * 6, 2 + bub * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Platforms
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    var px = p.x - camera.x;
    if (px > GW + 20 || px + p.w < -20) continue;

    if (p.type === 'ice') {
      ctx.fillStyle = 'rgba(150,220,255,' + (p.life > 1 ? 0.7 : p.life * 0.7) + ')';
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.strokeStyle = '#aef';
      ctx.strokeRect(px, p.y, p.w, p.h);
    } else if (p.type === 'crumble') {
      var ct = crumblingTiles.find(function(c) { return c.x === p.x && c.y === p.y; });
      if (ct && ct.fallen) continue;
      ctx.fillStyle = ct && ct.timer > 0 ? '#a64' : planet.tileColor;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.strokeStyle = '#432';
      ctx.beginPath();
      ctx.moveTo(px + p.w * 0.3, p.y);
      ctx.lineTo(px + p.w * 0.5, p.y + p.h);
      ctx.moveTo(px + p.w * 0.7, p.y);
      ctx.lineTo(px + p.w * 0.6, p.y + p.h);
      ctx.stroke();
    } else {
      ctx.fillStyle = planet.tileColor;
      ctx.fillRect(px, p.y, p.w, p.h);
      ctx.fillStyle = planet.accent;
      ctx.fillRect(px, p.y, p.w, 3);
      // Mushroom grass detail on top
      if (p.h > TILE && (currentPlanet === 0 || currentPlanet === 5)) {
        for (var gi = 0; gi < p.w; gi += 12) {
          ctx.fillStyle = '#4a4';
          ctx.fillRect(px + gi + 2, p.y - 3, 3, 4);
          ctx.fillRect(px + gi + 6, p.y - 2, 2, 3);
        }
      }
    }
  }

  // Electric barriers
  for (var ebi = 0; ebi < electricBarriers.length; ebi++) {
    var eb = electricBarriers[ebi];
    var ex = eb.x - camera.x;
    var pulse = Math.sin(frame * 0.05 + eb.phase);
    if (pulse > 0) {
      ctx.fillStyle = activeChar === 'sparks' ? 'rgba(56,217,115,0.3)' : 'rgba(244,180,27,0.7)';
      ctx.fillRect(ex, eb.y, eb.w, eb.h);
      for (var sy = 0; sy < eb.h; sy += 8) {
        var sx = Math.sin((sy + frame) * 0.3) * 4;
        ctx.fillStyle = '#fff';
        ctx.fillRect(ex + sx + 4, eb.y + sy, 4, 4);
      }
    } else {
      ctx.fillStyle = 'rgba(100,100,0,0.3)';
      ctx.fillRect(ex, eb.y, eb.w, eb.h);
    }
  }
}

// === DRAW HAZARD SPORES ===
function drawHazardSpores() {
  for (var i = 0; i < hazardSpores.length; i++) {
    var hs = hazardSpores[i];
    if (!hs.active) continue;
    var sx = hs.x - camera.x;
    if (sx < -30 || sx > GW + 30) continue;
    var pulse = 0.5 + Math.sin(frame * 0.04 + hs.phase) * 0.3;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#8f4';
    ctx.beginPath();
    ctx.arc(sx, hs.y, hs.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#af6';
    ctx.beginPath();
    ctx.arc(sx, hs.y, hs.radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    // Spore particles
    for (var j = 0; j < 3; j++) {
      var angle = (frame * 0.02 + j * 2.09) + hs.phase;
      var pr = hs.radius + 4 + Math.sin(frame * 0.05 + j) * 3;
      ctx.fillStyle = 'rgba(140,255,100,0.4)';
      ctx.beginPath();
      ctx.arc(sx + Math.cos(angle) * pr, hs.y + Math.sin(angle) * pr, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// === DRAW PLAYER ===
function drawPlayer() {
  if (!player || deathTimer > 0) return;
  if (invulnTimer > 0 && Math.floor(invulnTimer * 10) % 2 === 0) return;

  var px = player.x - camera.x;
  var py = player.y;
  var c = CHARS[activeChar];

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, Math.max(player.w, player.h), { flipX: player.facing < 0, frame: frame })) {
    ctx.save();
    if (player.facing < 0) {
      ctx.translate(px + player.w, py);
      ctx.scale(-1, 1);
    } else {
      ctx.translate(px, py);
    }

    // Character body
    ctx.fillStyle = c.color;
    ctx.fillRect(2, 6, 10, 12);

    // Head
    ctx.fillStyle = c.accent;
    ctx.fillRect(1, 0, 12, 8);
    ctx.fillStyle = '#fff';
    ctx.fillRect(4, 2, 3, 3);

    // Arms
    ctx.fillStyle = c.color;
    ctx.fillRect(-1, 7, 3, 8);
    ctx.fillRect(12, 7, 3, 8);

    // Legs (animated)
    ctx.fillStyle = c.accent;
    if (player.grounded && Math.abs(player.vx) > 10) {
      var legOff = Math.sin(frame * 0.2) * 3;
      ctx.fillRect(2 + legOff, 18, 4, 5);
      ctx.fillRect(8 - legOff, 18, 4, 5);
    } else {
      ctx.fillRect(2, 18, 4, 5);
      ctx.fillRect(8, 18, 4, 5);
    }

    // Character-specific extras
    if (activeChar === 'captain' && chargeTimer > 0) {
      var r = 3 + chargeTimer * 8;
      ctx.fillStyle = 'rgba(244,180,27,' + (0.3 + chargeTimer * 0.5) + ')';
      ctx.beginPath();
      ctx.arc(14, 11, r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (activeChar === 'sparks') {
      ctx.fillStyle = frame % 6 < 3 ? '#f4b41b' : '#ffd060';
      ctx.fillRect(5, -2, 2, 3);
    }
    if (activeChar === 'aqua' && player.inWater) {
      ctx.fillStyle = 'rgba(100,200,255,0.3)';
      ctx.beginPath();
      ctx.arc(7, 11, 12, 0, Math.PI * 2);
      ctx.fill();
    }
    if (activeChar === 'rocks' && wallClinging) {
      ctx.fillStyle = '#faa';
      ctx.fillRect(-3, 8, 4, 6);
      ctx.fillRect(13, 8, 4, 6);
    }
    if (groundPounding) {
      ctx.fillStyle = 'rgba(255,100,0,0.5)';
      ctx.fillRect(-2, 20, 18, 6);
    }

    // Shield visual
    if (shieldTimer > 0) {
      ctx.strokeStyle = 'rgba(60,172,215,' + (0.4 + Math.sin(frame * 0.1) * 0.2) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(7, 11, 14, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Boost visual
    if (boostTimer > 0) {
      ctx.fillStyle = 'rgba(244,180,27,' + (0.2 + Math.sin(frame * 0.15) * 0.15) + ')';
      ctx.beginPath();
      ctx.arc(7, 11, 10, 0, Math.PI * 2);
      ctx.fill();
    }

    // Baseling icon on head
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon || 'B', 7, -1);

    ctx.restore();
  }
}

// === DRAW BULLETS ===
function drawBullets() {
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    var bx = b.x - camera.x;
    if (bx < -20 || bx > GW + 20) continue;

    ctx.fillStyle = b.color;
    if (b.type === 'charge' && b.trail) {
      // Trail particles
      ctx.fillStyle = 'rgba(255,255,0,0.3)';
      ctx.beginPath();
      ctx.arc(bx + b.w / 2 - b.vx * 0.02, b.y + b.h / 2, b.w / 2 + 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(bx + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(bx + b.w / 2, b.y + b.h / 2, b.w / 4, 0, Math.PI * 2);
      ctx.fill();
    } else if (b.type === 'spark') {
      ctx.fillRect(bx, b.y, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(bx + 2, b.y + 2, 4, 4);
    } else if (b.type === 'ice') {
      ctx.fillRect(bx, b.y, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(bx + 2, b.y + 1, 3, 2);
    } else if (b.type === 'enemy') {
      ctx.beginPath();
      ctx.arc(bx + b.w / 2, b.y + b.h / 2, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      // Enemy bullet glow
      ctx.fillStyle = 'rgba(255,128,0,0.3)';
      ctx.beginPath();
      ctx.arc(bx + b.w / 2, b.y + b.h / 2, b.w / 2 + 3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(bx, b.y, b.w, b.h);
    }
  }
}

// === DRAW ENEMIES (Toad Empire themed) ===
function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.dead) continue;
    var ex = e.x - camera.x;
    if (ex < -40 || ex > GW + 40) continue;

    var color = PLANETS[currentPlanet].accent;
    switch (e.type) {
      case 'myceliavine': color = '#7b3fa0'; break;
      case 'moldspitter': color = '#a855f7'; break;
      case 'sporecrawler': color = '#8844bb'; break;
      case 'shockshroom': color = '#3cacd7'; break;
      case 'sparkcap': color = '#2a8aaa'; break;
      case 'thundermoss': color = '#4ac0e0'; break;
      case 'tidescale': color = '#38d973'; break;
      case 'jellyspore': color = '#a855f7'; break;
      case 'coralcrab': color = '#6b3fa0'; break;
      case 'magmagolem': color = '#a855f7'; break;
      case 'cinderboulder': color = '#7b44cc'; break;
      case 'emberspore': color = '#9944dd'; break;
      case 'nightshade': color = '#6b2fa0'; break;
      case 'gloomwraith': color = '#a855f7'; break;
      case 'phantomcap': color = '#5a2a80'; break;
      case 'sporelord': color = '#c06af0'; break;
      case 'mycotower': color = '#8855bb'; break;
      case 'guardianmoss': color = '#9955cc'; break;
    }

    // Frozen tint
    if (e.frozen > 0) {
      color = '#aef';
    }

    ctx.fillStyle = color;
    // Mushroom cap shape for most enemies
    if (e.type === 'shockshroom' || e.type === 'sparkcap' || e.type === 'phantomcap' || e.type === 'sporelord') {
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + e.h * 0.3, e.w / 2, Math.PI, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(ex + e.w * 0.3, e.y + e.h * 0.3, e.w * 0.4, e.h * 0.7);
    } else {
      ctx.fillRect(ex, e.y, e.w, e.h);
    }

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(ex + e.w * 0.2, e.y + e.h * 0.2, 4, 4);
    ctx.fillRect(ex + e.w * 0.6, e.y + e.h * 0.2, 4, 4);
    ctx.fillStyle = e.frozen > 0 ? '#8af' : '#000';
    ctx.fillRect(ex + e.w * 0.25, e.y + e.h * 0.25, 2, 2);
    ctx.fillRect(ex + e.w * 0.65, e.y + e.h * 0.25, 2, 2);

    // Type-specific details
    if (e.type === 'myceliavine' || e.type === 'moldspitter') {
      ctx.fillStyle = '#2a4';
      ctx.fillRect(ex + e.w / 2 - 2, e.y - 6, 4, 6);
      // Spore dots
      ctx.fillStyle = '#8f8';
      ctx.fillRect(ex + e.w / 2 - 4, e.y - 4, 2, 2);
      ctx.fillRect(ex + e.w / 2 + 3, e.y - 3, 2, 2);
    }
    if (e.type === 'shockshroom') {
      ctx.fillStyle = frame % 4 < 2 ? '#3cacd7' : '#1a6080';
      ctx.fillRect(ex - 3, e.y, 3, e.h);
      ctx.fillRect(ex + e.w, e.y, 3, e.h);
    }
    if (e.type === 'jellyspore') {
      for (var t = 0; t < 3; t++) {
        ctx.fillStyle = 'rgba(255,150,255,0.5)';
        ctx.fillRect(ex + 3 + t * 5, e.y + e.h, 2, 8 + Math.sin(frame * 0.1 + t) * 3);
      }
    }
    if (e.type === 'magmagolem' || e.type === 'guardianmoss') {
      ctx.fillStyle = '#432';
      ctx.fillRect(ex + 2, e.y + e.h - 4, e.w - 4, 4);
    }

    // HP bar for enemies with more than 2 max HP
    if (e.maxHp > 2 && e.hp < e.maxHp) {
      ctx.fillStyle = '#300';
      ctx.fillRect(ex, e.y - 5, e.w, 3);
      ctx.fillStyle = '#f33';
      ctx.fillRect(ex, e.y - 5, e.w * (e.hp / e.maxHp), 3);
    }
  }
}

// === DRAW BOSS ===
function drawBoss() {
  if (!bossActive || bossActive.dead) return;

  var b = bossActive;
  var bx = b.x - camera.x;

  // Boss aura
  if (b.enraged) {
    ctx.fillStyle = 'rgba(255,0,0,' + (0.1 + Math.sin(frame * 0.1) * 0.05) + ')';
    ctx.beginPath();
    ctx.arc(bx + b.w / 2, b.y + b.h / 2, b.w, 0, Math.PI * 2);
    ctx.fill();
  }

  // Flash on hit
  if (b.flashTimer > 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = b.bossColor || PLANETS[currentPlanet].accent;
  }

  // Mushroom boss body shape
  ctx.beginPath();
  ctx.arc(bx + b.w / 2, b.y + b.h * 0.35, b.w / 2, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(bx + b.w * 0.25, b.y + b.h * 0.35, b.w * 0.5, b.h * 0.65);

  // Boss face
  ctx.fillStyle = '#000';
  ctx.fillRect(bx + 10, b.y + 12, 8, 8);
  ctx.fillRect(bx + 30, b.y + 12, 8, 8);
  ctx.fillStyle = b.enraged ? '#f00' : '#a855f7';
  ctx.fillRect(bx + 12, b.y + 14, 4, 4);
  ctx.fillRect(bx + 32, b.y + 14, 4, 4);

  // Crown/spore detail
  ctx.fillStyle = b.bossColor || '#a855f7';
  for (var i = 0; i < 5; i++) {
    var crownY = b.y - 6 + Math.sin(frame * 0.05 + i) * 2;
    ctx.fillRect(bx + 4 + i * 10, crownY, 6, 8);
  }

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, bx + b.w / 2, b.y - 22);

  // Boss HP bar
  var barW = 60;
  var barX = bx + b.w / 2 - barW / 2;
  ctx.fillStyle = '#300';
  ctx.fillRect(barX, b.y - 16, barW, 6);
  ctx.fillStyle = b.enraged ? '#f44' : '#f33';
  ctx.fillRect(barX, b.y - 16, barW * (bossHp / bossMaxHp), 6);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, b.y - 16, barW, 6);
}

// === DRAW PICKUPS (Baseling themed) ===
function drawPickups() {
  for (var i = 0; i < pickups.length; i++) {
    var p = pickups[i];
    if (p.collected) continue;
    var px = p.x - camera.x;
    if (px < -20 || px > GW + 20) continue;

    var bob = Math.sin(frame * 0.05 + p.x * 0.01) * 3;
    switch (p.type) {
      case 'cell':
        ctx.fillStyle = '#38d973';
        ctx.fillRect(px, p.y + bob, p.w, p.h);
        ctx.fillStyle = '#6ef0a0';
        ctx.fillRect(px + 3, p.y + bob + 3, 6, 6);
        break;
      case 'badge':
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.arc(px + 6, p.y + bob + 6, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#c08010';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('B', px + 6, p.y + bob + 9);
        break;
      case 'myceliumOrb':
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.arc(px + 6, p.y + bob + 6, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#c888ff';
        ctx.beginPath();
        ctx.arc(px + 6, p.y + bob + 4, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'fungalEssence':
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(px + 1, p.y + bob + 2, 10, 8);
        ctx.fillStyle = '#ffd060';
        ctx.fillRect(px + 3, p.y + bob + 4, 6, 4);
        break;
      case 'mushroomShield':
        ctx.fillStyle = '#3cacd7';
        ctx.beginPath();
        ctx.arc(px + 6, p.y + bob + 6, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#70d0f0';
        ctx.lineWidth = 2;
        ctx.stroke();
        break;
      case 'sporeGrenade':
        ctx.fillStyle = '#f84';
        ctx.beginPath();
        ctx.arc(px + 6, p.y + bob + 6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fa4';
        ctx.fillRect(px + 5, p.y + bob, 2, 4);
        break;
    }
  }
}

// === DRAW SPARK TRAILS ===
function drawSparkTrails() {
  for (var i = 0; i < sparkTrails.length; i++) {
    var st = sparkTrails[i];
    var sx = st.x - camera.x;
    ctx.fillStyle = 'rgba(255,220,50,' + st.life + ')';
    ctx.fillRect(sx - 3, st.y - 3, 6, 6);
  }
}

// === DRAW DARKNESS ===
function drawDarkness() {
  if (!player) return;
  var px = player.x - camera.x + player.w / 2;
  var py = player.y + player.h / 2;
  var lightRadius = activeChar === 'sparks' ? 120 : 50;

  ctx.fillStyle = 'rgba(5,0,15,0.8)';
  ctx.fillRect(0, 0, GW, GH);
  var grd = ctx.createRadialGradient(px, py, 0, px, py, lightRadius);
  grd.addColorStop(0, 'rgba(5,0,15,0)');
  grd.addColorStop(1, 'rgba(5,0,15,0.8)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(px, py, lightRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'destination-out';
  var grd2 = ctx.createRadialGradient(px, py, 0, px, py, lightRadius * 0.6);
  grd2.addColorStop(0, 'rgba(0,0,0,1)');
  grd2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd2;
  ctx.beginPath();
  ctx.arc(px, py, lightRadius * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Bioluminescent spore glow points
  for (var i = 0; i < sparkTrails.length; i++) {
    var st = sparkTrails[i];
    var sx = st.x - camera.x;
    var r = 30 * st.life;
    ctx.beginPath();
    ctx.arc(sx, st.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'source-over';
}

// === DRAW HUD ===
function drawHUD() {
  // HP bar
  ctx.fillStyle = '#300';
  ctx.fillRect(8, 8, 80, 10);
  var hpColor = hp > maxHp * 0.5 ? '#38d973' : hp > maxHp * 0.25 ? '#f4b41b' : '#f00';
  ctx.fillStyle = hpColor;
  ctx.fillRect(8, 8, 80 * (hp / maxHp), 10);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(8, 8, 80, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 10, 16);

  // Shield indicator
  if (shieldTimer > 0) {
    ctx.fillStyle = '#3cacd7';
    ctx.fillRect(8, 19, 80 * (shieldTimer / 8), 3);
  }

  // Lives
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.fillText('x' + lives, 94, 16);

  // Score
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, GW - 8, 16);

  // Energy cells
  ctx.textAlign = 'left';
  ctx.fillStyle = '#38d973';
  ctx.fillText('E:' + energyCells, 8, 34);

  // Badges
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('B:' + badges, 55, 34);

  // Combo display
  if (comboCount >= 3) {
    ctx.fillStyle = comboCount >= 10 ? '#f44' : comboCount >= 6 ? '#f80' : '#ff0';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('COMBO x' + comboCount + ' (' + getComboMult().toFixed(1) + 'x)', GW - 8, 30);
  }

  // Active character indicator
  var charDef = CHARS[activeChar];
  ctx.fillStyle = charDef.color;
  ctx.fillRect(GW / 2 - 40, 4, 80, 14);
  ctx.fillStyle = '#000';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(charDef.name.toUpperCase(), GW / 2, 14);

  // Character roster
  for (var i = 0; i < CHAR_ORDER.length; i++) {
    var cid = CHAR_ORDER[i];
    var unlocked = unlockedChars.includes(cid);
    var cx = GW / 2 - 36 + i * 20;
    ctx.fillStyle = unlocked ? CHARS[cid].color : '#333';
    ctx.fillRect(cx, 22, 14, 4);
    if (cid === activeChar) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(cx, 26, 14, 2);
    }
  }

  // Charge bar (Captain) - WIS faster charge (ref 11)
  if (activeChar === 'captain' && chargeTimer > 0) {
    var chargeRatio = chargeTimer / CHARS.captain.chargeMax;
    ctx.fillStyle = '#330';
    ctx.fillRect(8, GH - 20, 60, 8);
    ctx.fillStyle = chargeRatio > 0.8 ? '#f4b41b' : '#a07810';
    ctx.fillRect(8, GH - 20, 60 * chargeRatio, 8);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(8, GH - 20, 60, 8);
  }

  // Boost timer bar
  if (boostTimer > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(8, GH - 30, 40 * (boostTimer / 5), 6);
    ctx.strokeStyle = '#a07810';
    ctx.strokeRect(8, GH - 30, 40, 6);
  }

  // Baseling level indicator
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('Lv.' + statB.level, 8, GH - 36);
  }
}

// === PLANET SELECT SCREEN ===
function drawPlanetSelect() {
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, GW, GH);

  // Spore particles
  for (var i = 0; i < 20; i++) {
    var px = ((i * 79 + frame * 0.3) % GW);
    var py = ((i * 131 + frame * 0.1) % GH);
    ctx.fillStyle = 'rgba(56,217,115,' + (0.15 + Math.sin(frame * 0.02 + i) * 0.1) + ')';
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE GALAXY MAP', GW / 2, 30);

  for (var i = 0; i < 6; i++) {
    var px = 40 + i * 72;
    var py = 80;
    var planet = PLANETS[i];
    var cleared = clearedPlanets.includes(i);
    var selected = selectCursor === i;

    // Planet circle with zone color
    ctx.fillStyle = cleared ? '#333' : planet.accent;
    ctx.beginPath();
    ctx.arc(px + 30, py + 30, 28, 0, Math.PI * 2);
    ctx.fill();

    if (selected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Selection glow
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath();
      ctx.arc(px + 30, py + 30, 32, 0, Math.PI * 2);
      ctx.fill();
    }

    if (cleared) {
      ctx.fillStyle = '#38d973';
      ctx.font = '16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('OK', px + 30, py + 35);
    } else {
      ctx.fillStyle = '#fff';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText((i + 1).toString(), px + 30, py + 34);
    }

    ctx.fillStyle = selected ? '#fff' : '#888';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    var shortName = planet.name.replace('Spore ', '').replace('Fungal ', '').replace('Garden ', '').replace('Mushroom ', '').replace('Shadow ', '').replace('Toad ', '');
    ctx.fillText(shortName, px + 30, py + 65);
  }

  // Selected planet info
  if (selectCursor < 6) {
    var sel = PLANETS[selectCursor];
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sel.name, GW / 2, 200);
    ctx.fillStyle = '#aaa';
    ctx.font = '10px monospace';
    ctx.fillText(sel.desc, GW / 2, 220);
    ctx.fillStyle = CHARS[sel.focus] ? CHARS[sel.focus].color : '#fff';
    ctx.fillText('Focus: ' + (sel.focus === 'all' ? 'All Characters' : CHARS[sel.focus].name), GW / 2, 240);

    if (clearedPlanets.includes(selectCursor)) {
      ctx.fillStyle = '#38d973';
      ctx.fillText('CLEARED', GW / 2, 260);
    } else {
      ctx.fillStyle = '#f4b41b';
      var blink = Math.sin(frame * 0.06) > 0;
      if (blink) ctx.fillText('PRESS JUMP TO DEPLOY', GW / 2, 260);
    }
  }

  // Crew roster
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('CREW:', 10, 295);
  for (var i = 0; i < CHAR_ORDER.length; i++) {
    var cid = CHAR_ORDER[i];
    var unlocked = unlockedChars.includes(cid);
    ctx.fillStyle = unlocked ? CHARS[cid].color : '#333';
    ctx.fillText(CHARS[cid].name, 55 + i * 70, 295);
  }
}

// === DRAW TRANSITION ===
function drawTransition() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  var planet = PLANETS[currentPlanet];
  var alpha = Math.min(1, (2 - transitionTimer) * 2);

  ctx.globalAlpha = alpha;

  // Mushroom silhouette instead of plain circle
  ctx.fillStyle = planet.accent;
  ctx.beginPath();
  ctx.arc(GW / 2, GH / 2 - 10, 50, Math.PI, Math.PI * 2);
  ctx.fill();
  ctx.fillRect(GW / 2 - 12, GH / 2 - 10, 24, 30);

  // Zone particles
  for (var i = 0; i < 8; i++) {
    var angle = (i / 8) * Math.PI * 2 + frame * 0.01;
    var r = 70 + Math.sin(frame * 0.03 + i) * 10;
    ctx.fillStyle = planet.accent + '88';
    ctx.beginPath();
    ctx.arc(GW / 2 + Math.cos(angle) * r, GH / 2 + Math.sin(angle) * r, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(planet.name, GW / 2, GH / 2 + 80);
  ctx.font = '12px monospace';
  ctx.fillText(planet.desc, GW / 2, GH / 2 + 102);
  ctx.globalAlpha = 1;
}

// === DRAW RESCUE ===
function drawRescue() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < 30; i++) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + Math.sin(rescueAnim * 2 + i) * 0.4) + ')';
    ctx.fillRect((i * 97) % GW, (i * 151) % GH, 2, 2);
  }

  // Spore celebration particles
  for (var i = 0; i < 10; i++) {
    var px = GW / 2 + Math.cos(rescueAnim * 1.5 + i * 0.6) * (80 + i * 10);
    var py = 100 + Math.sin(rescueAnim * 2 + i) * 30;
    ctx.fillStyle = ['#38d973', '#f4b41b', '#f80', '#3cacd7', '#a855f7'][i % 5];
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(px, py, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';

  if (currentPlanet < 5) {
    ctx.fillText('WORLD CLEARED!', GW / 2, 80);

    var charToShow = CHAR_ORDER[currentPlanet + 1];
    if (charToShow && rescueAnim > 0.5) {
      var cy = 140 + Math.sin(rescueAnim * 2) * 5;
      drawCharSprite(GW / 2 - 14, cy, charToShow, 3);

      ctx.fillStyle = CHARS[charToShow].color;
      ctx.font = '14px monospace';
      ctx.fillText(CHARS[charToShow].name + ' RESCUED!', GW / 2, 250);
      ctx.fillStyle = '#aaa';
      ctx.font = '11px monospace';
      ctx.fillText('New baseling joins the crew!', GW / 2, 272);
    }
  } else {
    ctx.fillText('TOAD EMPIRE DEFEATED!', GW / 2, 80);
    ctx.fillStyle = '#38d973';
    ctx.font = '14px monospace';
    ctx.fillText('All baselings rescued!', GW / 2, 140);
  }

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Score: ' + score, GW / 2, 300);
}

// === DRAW VICTORY ===
function drawVictory() {
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, GW, GH);

  for (var i = 0; i < 80; i++) {
    var sx = ((i * 137 + frame * 0.3) % GW);
    var sy = ((i * 211 + frame * 0.15) % GH);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + Math.sin(frame * 0.02 + i) * 0.4) + ')';
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Celebration spore burst
  for (var i = 0; i < 12; i++) {
    var angle = (i / 12) * Math.PI * 2 + frame * 0.005;
    var r = 130 + Math.sin(frame * 0.02 + i) * 20;
    ctx.fillStyle = ['#38d973', '#f4b41b', '#3cacd7', '#a855f7'][i % 4];
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(GW / 2 + Math.cos(angle) * r, GH / 2 + Math.sin(angle) * r, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('The Baseling Crew is reunited!', GW / 2, 90);

  for (var i = 0; i < 4; i++) {
    var cx = 110 + i * 80;
    var cy = 130 + Math.sin(frame * 0.03 + i * 0.8) * 5;
    drawCharSprite(cx, cy, CHAR_ORDER[i], 2.5);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = '16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 230);

  if (badges >= 6) {
    ctx.fillStyle = '#a855f7';
    ctx.fillText('ALL BADGES - TRUE ENDING!', GW / 2, 255);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('High Score: ' + highScore + '  Kills: ' + totalKills, GW / 2, 275);

  // Baseling stat summary
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '9px monospace';
  ctx.fillText(statB.name + ' Lv.' + statB.level + ' contributed!', GW / 2, 290);

  var blink = Math.sin(frame * 0.06) > 0;
  if (blink) {
    ctx.fillStyle = '#fff';
    ctx.font = '11px monospace';
    ctx.fillText('PRESS JUMP FOR TITLE', GW / 2, 308);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
