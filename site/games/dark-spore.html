var statB={damage:1,speed:1,lives:0,hpMult:1,scoreMult:1,cooldown:1,luck:1,str:10,dex:10,con:10,int:10,wis:10,cha:10,level:0,color:'#44dd88',name:'Baseling',icon:'B'};try{if(window.NftLoader&&NftLoader.getStatBonuses)statB=NftLoader.getStatBonuses();}catch(e){}

// Bridge shared baseling stats (getMults, ARCADE-STATS.md) onto statB; helpers read statB live.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[dark-spore] player init failed:', e && e.message); });
}

// Derived stat helpers
function statDamage() { return Math.max(1, Math.floor(statB.damage * (1 + (statB.str - 10) * 0.08))); }
function statSpeed() { return Math.max(0.5, statB.speed * (1 + (statB.dex - 10) * 0.05)); }
function statMaxHP() { return Math.max(3, Math.floor(MAX_HP_BASE * statB.hpMult * (1 + (statB.con - 10) * 0.1))); }
function statBonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function statScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.06); }
function statCooldown() { return Math.max(0.05, statB.cooldown * (1 / (1 + (statB.wis - 10) * 0.05))); }
function statDropChance() { return Math.min(0.95, 0.3 * statB.luck * (1 + (statB.cha - 10) * 0.06)); }
function statChargeSpeed() { return 1 + (statB.wis - 10) * 0.04; }
function statCritChance() { return Math.min(0.4, 0.05 + (statB.dex - 10) * 0.015 + statB.luck * 0.02); }

// ============================================================
// LEVEL GENERATION
// ============================================================
function generateStage(stageIdx) {
  const def = STAGE_DEFS[stageIdx];
  platforms = [];
  grabPoints = [];
  hazards = [];
  enemies = [];
  crates = [];
  bullets = [];
  drops = [];
  boss = null;
  bossActive = false;
  stageComplete = false;
  noHitBonus = true;
  comboCount = 0;
  comboTimer = 0;
  envParticles = [];

  const floorY = 210;
  const stageW = def.width;

  // Generate floor platforms with gaps
  let fx = 0;
  while (fx < stageW) {
    const pw = TAS.math.randInt(80, 200);
    platforms.push({ x: fx, y: floorY, w: pw, h: 46 });
    fx += pw;
    if (Math.random() < 0.2 && fx < stageW - 200) {
      fx += TAS.math.randInt(30, 60);
    }
  }

  // Mid-level platforms
  const midCount = Math.floor(stageW / 200);
  for (let i = 0; i < midCount; i++) {
    const px = TAS.math.randInt(100, stageW - 100);
    const py = TAS.math.randInt(120, 180);
    const pw = TAS.math.randInt(48, 96);
    platforms.push({ x: px, y: py, w: pw, h: 12 });
  }

  // High platforms
  const hiCount = Math.floor(stageW / 350);
  for (let i = 0; i < hiCount; i++) {
    const px = TAS.math.randInt(150, stageW - 150);
    const py = TAS.math.randInt(60, 110);
    const pw = TAS.math.randInt(40, 80);
    platforms.push({ x: px, y: py, w: pw, h: 10 });
  }

  // Grab points (hooks/pipes)
  const hookCount = Math.floor(stageW / 250);
  for (let i = 0; i < hookCount; i++) {
    grabPoints.push({
      x: TAS.math.randInt(100, stageW - 100),
      y: TAS.math.randInt(50, 140),
      w: 20, h: 12
    });
  }

  // Hazards - more variety based on zone
  if (stageIdx >= 1) {
    const hazCount = Math.floor(stageW / 350);
    for (let i = 0; i < hazCount; i++) {
      let htype = 'spikes';
      if (def.zone === 'factory' || def.zone === 'tower') htype = 'electric';
      else if (def.zone === 'sewer') htype = 'acid';
      else if (def.zone === 'forest') htype = 'thorns';
      else if (def.zone === 'throne') htype = 'shadow_fire';
      hazards.push({
        x: TAS.math.randInt(200, stageW - 200),
        y: floorY - 8,
        w: TAS.math.randInt(32, 64),
        h: 8,
        type: htype,
        timer: Math.random() * 6
      });
    }
  }

  // Enemies
  for (const ed of def.enemies) {
    const ey = ed.y || floorY - 24;
    enemies.push(createEnemy(ed.t, ed.x, ey));
  }

  // Crates
  for (const cd of def.crates) {
    const plat = platforms.find(function(p) { return p.x <= cd.x && p.x + p.w >= cd.x; });
    const cy = plat ? plat.y - 16 : floorY - 16;
    crates.push({ x: cd.x, y: cy, w: 16, h: 16, item: cd.item, alive: true });
  }

  // Boss
  if (def.boss) {
    const bossHpScaled = Math.floor(def.boss.hp * (1 + statB.level * 0.1));
    boss = createBoss(def.boss.t, stageW - 100, floorY - 32, bossHpScaled);
  }

  maxHp = statMaxHP();
  player = createPlayer(32, floorY - 30);
  scrollX = 0;
  checkpointX = 32;
  checkpointScroll = 0;
}

// ============================================================
// ENEMIES - Fungal themed
// ============================================================
function createEnemy(type, x, y) {
  var base = { type: type, x: x, y: y, vx: 0, vy: 0, alive: true, hp: 2, facing: -1,
    animTimer: 0, animFrame: 0, shootTimer: 0, attackTimer: 0, w: 14, h: 22, flashTimer: 0 };
  switch(type) {
    case 'thug': base.hp = 2; base.speed = 40; base.w = 14; base.h = 22; break;
    case 'gunner': base.hp = 2; base.speed = 25; base.w = 14; base.h = 22; base.shootTimer = 2; break;
    case 'shadow': base.hp = 3; base.speed = 75; base.w = 12; base.h = 22; base.phaseTimer = 0; break;
    case 'golem': base.hp = 5; base.speed = 22; base.w = 18; base.h = 26; base.shootTimer = 1.5; base.armor = 1; break;
    case 'bomber': base.hp = 2; base.speed = 35; base.w = 14; base.h = 20; base.flyY = y || 60; base.y = y || 60; break;
    case 'spore': base.hp = 1; base.speed = 55; base.w = 12; base.h = 10; base.flyY = y || 70; base.y = y || 70; break;
  }
  // Scale HP with player level
  base.hp = Math.max(1, base.hp + Math.floor(statB.level * 0.3));
  return base;
}

function createBoss(type, x, y, bossHp) {
  return {
    type: type, x: x, y: y, w: 28, h: 36, vx: 0, vy: 0,
    hp: bossHp, maxHp: bossHp, alive: true, facing: -1,
    phase: 0, timer: 0, attackTimer: 2, attackType: 0,
    animFrame: 0, animTimer: 0, invuln: 0, flashTimer: 0,
    enraged: false, shieldActive: false, shieldTimer: 0
  };
}

// ============================================================
// DROPS (CHA-gated)
// ============================================================
function spawnDrop(x, y) {
  if (Math.random() > statDropChance()) return;
  var types = ['hp','score','ammo_arrow','ammo_thunder','ammo_heavy','M_coin'];
  var weights = [30, 25, 15, 12, 8, 10 + (statB.cha - 10) * 2];
  var total = 0;
  for (var i = 0; i < weights.length; i++) total += Math.max(1, weights[i]);
  var r = Math.random() * total, acc = 0;
  var chosen = types[0];
  for (var j = 0; j < weights.length; j++) {
    acc += Math.max(1, weights[j]);
    if (r < acc) { chosen = types[j]; break; }
  }
  drops.push({ x: x, y: y, vy: -80, type: chosen, life: 5, w: 8, h: 8 });
}

function collectDrop(d) {
  switch(d.type) {
    case 'hp': hp = Math.min(maxHp, hp + 1); break;
    case 'score': addScore(200); break;
    case 'ammo_arrow': ammo[AMMO_ARROW] += 5; break;
    case 'ammo_thunder': ammo[AMMO_THUNDER] += 4; break;
    case 'ammo_heavy': ammo[AMMO_HEAVY] += 3; break;
    case 'M_coin': addScore(500); break;
  }
  sfxPickup();
  TAS.particles.spawn(d.x, d.y, statB.color, 6, 2);
}

// ============================================================
// SCORE WITH INT MULT
// ============================================================
function addScore(base) {
  var mult = statScoreMult();
  if (comboCount > 1) mult *= (1 + comboCount * 0.1);
  score += Math.floor(base * mult);
}

// ============================================================
// GAME START
// ============================================================
function startGame() {
  state = 'playing';
  score = 0;
  maxHp = statMaxHP();
  lives = MAX_LIVES_BASE + statBonusLives();
  hp = maxHp;
  stageNum = 0;
  ammo = [Infinity, 0, 0, 0];
  currentAmmo = AMMO_NORMAL;
  comboCount = 0;
  comboTimer = 0;
  TAS.particles.clear();
  generateStage(0);
}

function respawn() {
  player = createPlayer(checkpointX, 180);
  hp = maxHp;
  player.invuln = INVULN_TIME;
  scrollX = checkpointScroll;
}

function nextStage() {
  stageNum++;
  if (stageNum >= STAGE_DEFS.length) {
    if (score > highScore) { highScore = score; TAS.score.save('darkspore_hi', score); }
    state = 'victory';
    return;
  }
  generateStage(stageNum);
}

// ============================================================
// INPUT HELPERS
// ============================================================
// CONTROL STANDARD (§7c): ARROWS = move. WASD = action cluster
//   W = Jump | A = Shoot (hold to charge) | S = Switch Ammo | D = Dash
//   UP arrow (hold) = Shield. Legacy keys (Space/Z jump, X/C shoot, Shift ammo) kept as hidden alts.
function updateInput() {
  var k = TAS.input.keys;
  var t = TAS.input.touch;
  var jumpDown = k['KeyW'] || k['Space'] || k[' '] || k['KeyZ'] || t.a;
  var shootDown = k['KeyA'] || k['KeyX'] || k['KeyC'] || k['Control'] || t.b;
  var ammoDown = k['KeyS'] || k['ShiftLeft'] || k['ShiftRight'];
  var dashDown = k['KeyD'];
  justPressed.jump = jumpDown && !prevKeys.jump;
  justPressed.shoot = shootDown && !prevKeys.shoot;
  justPressed.switchAmmo = ammoDown && !prevKeys.switchAmmo;
  justPressed.dash = dashDown && !prevKeys.dash;
  prevKeys.jump = !!jumpDown;
  prevKeys.shoot = !!shootDown;
  prevKeys.switchAmmo = !!ammoDown;
  prevKeys.dash = !!dashDown;
}

// Movement: ARROWS ONLY (WASD reserved for actions)
function inputLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.touch.right; }
function inputUp() { return TAS.input.keys['ArrowUp'] || TAS.input.touch.up; }
function inputDown() { return TAS.input.keys['ArrowDown'] || TAS.input.touch.down; }
function inputJumpHeld() { return TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.keys[' '] || TAS.input.keys['KeyZ'] || TAS.input.touch.a; }
function inputShootHeld() { return TAS.input.keys['KeyA'] || TAS.input.keys['KeyX'] || TAS.input.keys['KeyC'] || TAS.input.keys['Control'] || TAS.input.touch.b; }

// ============================================================
// COLLISION & PHYSICS
// ============================================================
function onPlatform(ent) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (ent.x + ent.w > p.x && ent.x < p.x + p.w &&
        ent.y + ent.h >= p.y && ent.y + ent.h <= p.y + 12 &&
        ent.vy >= 0) {
      return p;
    }
  }
  return null;
}

function wallCheck(ent, dir) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.h < 20) continue; // only thick platforms count as walls
    if (ent.y + ent.h > p.y + 4 && ent.y < p.y + p.h) {
      if (dir > 0 && ent.x + ent.w >= p.x && ent.x + ent.w <= p.x + 6) return p;
      if (dir < 0 && ent.x <= p.x + p.w && ent.x >= p.x + p.w - 6) return p;
    }
  }
  return null;
}

function resolveGravity(ent, dt, grav) {
  ent.vy += (grav || GRAVITY) * dt;
  ent.y += ent.vy * dt;
  ent.x += ent.vx * dt;

  var plat = onPlatform(ent);
  if (plat) {
    ent.y = plat.y - ent.h;
    ent.vy = 0;
    ent.grounded = true;
  } else {
    ent.grounded = false;
  }

  if (ent.y > GH + 50) return true;
  return false;
}

// ============================================================
// UPDATE PLAYER
// ============================================================
function updatePlayer(dt) {
  var p = player;
  if (!p) return;

  p.invuln -= dt;
  p.shootCooldown -= dt;
  p.animTimer += dt;
  p.capeFrame += dt;
  p.dashCooldown -= dt;
  p.trailTimer -= dt;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  var spd = PLAYER_SPEED_BASE * statSpeed();
  var runSpd = RUN_SPEED_BASE * statSpeed();

  // Shield (hold up, can't move)
  p.shielding = inputUp() && !p.grabbing;
  if (p.shielding) {
    p.vx = 0;
    p.gliding = false;
    p.charging = false;
    p.chargeTime = 0;
  }

  // Grabbed state
  if (p.grabbing) {
    p.vx = 0;
    p.vy = 0;
    if (justPressed.shoot && p.shootCooldown <= 0) shootBullet(p);
    if (inputDown()) { p.grabbing = false; p.grabPoint = null; }
    if (justPressed.jump) {
      p.grabbing = false;
      p.grabPoint = null;
      p.vy = JUMP_FORCE * 0.8;
      p.canDoubleJump = true;
      p.doubleJumped = false;
    }
    return;
  }

  // Dash (double-tap direction or DEX-gated)
  if (p.dashTimer > 0) {
    p.dashTimer -= dt;
    p.vx = p.facing * runSpd * 2.5;
    p.invuln = Math.max(p.invuln, 0.05);
    // Dash trail particles
    if (p.trailTimer <= 0) {
      TAS.particles.spawn(p.x + p.w/2, p.y + p.h/2, statB.color, 2, 1.5);
      p.trailTimer = 0.03;
    }
    return;
  }

  // Movement
  if (!p.shielding) {
    if (inputLeft()) { p.vx = -spd; p.facing = -1; }
    else if (inputRight()) { p.vx = spd; p.facing = 1; }
    else { p.vx = 0; }
  }

  // Dash trigger (D key) — short burst in facing direction, i-frames
  if (justPressed.dash && p.dashCooldown <= 0 && !p.shielding && !p.grabbing) {
    p.dashTimer = 0.18;
    p.dashCooldown = 0.6 * statCooldown();
    sfxDash();
  }

  // Jump
  if (justPressed.jump && p.grounded) {
    p.vy = JUMP_FORCE;
    p.grounded = false;
    p.canDoubleJump = true;
    p.doubleJumped = false;
    spawnLandingDust(p.x + p.w/2, p.y + p.h);
  }

  // Double jump (DEX >= 14)
  if (justPressed.jump && !p.grounded && !p.doubleJumped && p.canDoubleJump && statB.dex >= 14) {
    p.vy = JUMP_FORCE * 0.7;
    p.doubleJumped = true;
    TAS.particles.spawn(p.x + p.w/2, p.y + p.h, '#aaaaff', 4, 1.5);
  }

  // Variable jump height
  if (!inputJumpHeld() && p.vy < 0) p.vy *= 0.5;

  // Wall slide
  p.wallSlide = false;
  if (!p.grounded && p.vy > 0) {
    var wdir = p.vx > 0 ? 1 : (p.vx < 0 ? -1 : 0);
    if (wdir !== 0 && wallCheck(p, wdir)) {
      p.wallSlide = true;
      p.vy = Math.min(p.vy, 60);
      if (justPressed.jump) {
        p.vy = JUMP_FORCE * 0.85;
        p.vx = -wdir * spd;
        p.facing = -wdir;
        p.canDoubleJump = true;
        p.doubleJumped = false;
      }
    }
  }

  // Cape glide
  p.gliding = false;
  if (!p.grounded && inputJumpHeld() && p.vy > 0 && !p.shielding && !p.wallSlide) {
    p.gliding = true;
  }

  // Charged shot (hold shoot)
  if (inputShootHeld() && !p.shielding && p.shootCooldown <= 0) {
    p.charging = true;
    p.chargeTime += dt * statChargeSpeed();
    if (p.chargeTime >= CHARGE_TIME_MAX) p.chargeTime = CHARGE_TIME_MAX;
  }
  if (p.charging && !inputShootHeld()) {
    if (p.chargeTime >= CHARGE_TIME_MAX * 0.8) {
      shootChargedBullet(p);
    } else if (p.chargeTime > 0.1) {
      shootBullet(p);
    }
    p.charging = false;
    p.chargeTime = 0;
  }

  // Physics
  var grav = p.gliding ? GLIDE_GRAVITY : GRAVITY;
  if (p.gliding && p.vy > 40) p.vy = 40;

  var fell = resolveGravity(p, dt, grav);
  if (fell) { playerDeath(); return; }

  // Reset double jump on land
  if (p.grounded) { p.canDoubleJump = true; p.doubleJumped = false; }

  // Landing dust
  if (p.grounded && p.vy === 0 && !p._wasGrounded) {
    spawnLandingDust(p.x + p.w/2, p.y + p.h);
  }
  p._wasGrounded = p.grounded;

  // Check grab points
  if (justPressed.jump && !p.grounded) {
    for (var gi = 0; gi < grabPoints.length; gi++) {
      var gp = grabPoints[gi];
      if (TAS.hit.rectOverlap(p.x - 10, p.y - 10, p.w + 20, p.h + 20, gp.x, gp.y, gp.w, gp.h)) {
        p.grabbing = true;
        p.grabPoint = gp;
        p.x = gp.x + gp.w / 2 - p.w / 2;
        p.y = gp.y + gp.h;
        p.vy = 0;
        p.vx = 0;
        sfxGrab();
        break;
      }
    }
  }

  // Quick shoot (not charging)
  if (justPressed.shoot && p.shootCooldown <= 0 && !p.shielding && !p.charging) {
    p.charging = true;
    p.chargeTime = 0;
  }

  // Switch ammo
  if (justPressed.switchAmmo) {
    for (var si = 1; si <= 3; si++) {
      var next = (currentAmmo + si) % 4;
      if (ammo[next] > 0 || next === AMMO_NORMAL) {
        currentAmmo = next;
        break;
      }
    }
  }

  // Hazards
  for (var hi = 0; hi < hazards.length; hi++) {
    var h = hazards[hi];
    if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, h.x, h.y, h.w, h.h)) {
      if (!p.shielding) hurtPlayer(1);
    }
  }

  // Collect drops
  for (var di = drops.length - 1; di >= 0; di--) {
    var d = drops[di];
    if (TAS.hit.rectOverlap(p.x - 4, p.y - 4, p.w + 8, p.h + 8, d.x, d.y, d.w, d.h)) {
      collectDrop(d);
      drops.splice(di, 1);
    }
  }

  // Scroll camera
  var screenX = p.x - scrollX;
  if (screenX > GW - SCROLL_MARGIN) scrollX = p.x - (GW - SCROLL_MARGIN);
  if (screenX < SCROLL_MARGIN) scrollX = p.x - SCROLL_MARGIN;
  scrollX = TAS.math.clamp(scrollX, 0, STAGE_DEFS[stageNum].width - GW);
}

function shootBullet(p) {
  if (currentAmmo !== AMMO_NORMAL && ammo[currentAmmo] <= 0) currentAmmo = AMMO_NORMAL;
  var bx = p.x + (p.facing > 0 ? p.w : 0);
  var by = p.y + p.h / 2 - 2;
  var speed = AMMO_SPEEDS[currentAmmo] * p.facing;
  var dmg = AMMO_DAMAGE[currentAmmo] * statDamage();
  var isCrit = Math.random() < statCritChance();
  if (isCrit) dmg = Math.floor(dmg * 1.8);
  bullets.push({
    x: bx, y: by, w: currentAmmo === AMMO_HEAVY ? 10 : 6, h: currentAmmo === AMMO_HEAVY ? 6 : 4,
    vx: speed, vy: currentAmmo === AMMO_THUNDER ? -30 : 0,
    type: currentAmmo, damage: dmg,
    pierce: currentAmmo === AMMO_ARROW ? 3 : 1,
    life: 2, crit: isCrit
  });
  if (currentAmmo !== AMMO_NORMAL) ammo[currentAmmo]--;
  p.shootCooldown = 0.2 * statCooldown();
  sfxShoot(currentAmmo);
}

function shootChargedBullet(p) {
  if (currentAmmo !== AMMO_NORMAL && ammo[currentAmmo] <= 0) currentAmmo = AMMO_NORMAL;
  var bx = p.x + (p.facing > 0 ? p.w : 0);
  var by = p.y + p.h / 2 - 4;
  var speed = AMMO_SPEEDS[currentAmmo] * 1.4 * p.facing;
  var dmg = AMMO_DAMAGE[currentAmmo] * statDamage() * 3;
  bullets.push({
    x: bx, y: by, w: 14, h: 10,
    vx: speed, vy: 0,
    type: currentAmmo, damage: Math.floor(dmg),
    pierce: 5, life: 2.5, charged: true, crit: false
  });
  if (currentAmmo !== AMMO_NORMAL) ammo[currentAmmo] = Math.max(0, ammo[currentAmmo] - 3);
  p.shootCooldown = 0.5 * statCooldown();
  sfxCharged();
  TAS.fx.shake(3, 0.85);
  TAS.particles.spawn(bx, by, AMMO_COLORS[currentAmmo], 10, 3);
}

function spawnLandingDust(x, y) {
  for (var i = 0; i < 4; i++) {
    envParticles.push({
      x: x + TAS.math.randInt(-6, 6), y: y,
      vx: TAS.math.randInt(-30, 30), vy: TAS.math.randInt(-20, -5),
      life: 0.3 + Math.random() * 0.2, maxLife: 0.5,
      color: '#998877', size: 2
    });
  }
}

function hurtPlayer(dmg) {
  if (player.invuln > 0) return;
  hp -= dmg;
  player.invuln = INVULN_TIME;
  noHitBonus = false;
  comboCount = 0;
  comboTimer = 0;
  TAS.fx.shake(5, 0.85);
  TAS.fx.flash('#ff0000', 0.2);
  screenShakeX = (Math.random() - 0.5) * 6;
  screenShakeY = (Math.random() - 0.5) * 4;
  sfxHit();
  if (hp <= 0) playerDeath();
}

function playerDeath() {
  lives--;
  sfxDeath();
  TAS.fx.shake(10, 0.9);
  TAS.particles.spawn(player.x, player.y, '#ff4444', 20, 4, { gravity: 2 });
  TAS.particles.spawn(player.x, player.y, '#882222', 10, 2, { gravity: 1.5 });
  if (lives <= 0) {
    deathTimer = 2;
    state = 'dying';
  } else {
    deathTimer = 1;
    state = 'dying';
  }
}

// ============================================================
// UPDATE ENEMIES - Fungal themed
// ============================================================
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    if (!e.alive) continue;

    if (e.x < scrollX - 100 || e.x > scrollX + GW + 100) continue;

    e.animTimer += dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;
    var dx = player.x - e.x;
    var dist = Math.abs(dx);
    e.facing = dx > 0 ? 1 : -1;

    switch(e.type) {
      case 'thug':
        if (dist < 200 && dist > 20) {
          e.vx = e.speed * e.facing;
        } else if (dist <= 20) {
          e.vx = 0;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 5, e.y, e.w + 10, e.h)) {
              if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 5, 2); }
              else hurtPlayer(1);
            }
            e.attackTimer = 1.2;
          }
        } else { e.vx = 0; }
        resolveGravity(e, dt);
        break;

      case 'gunner':
        e.vx = 0;
        if (dist < 250) {
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            bullets.push({ x: e.x + e.w/2, y: e.y + e.h/2, w: 5, h: 3, vx: 120 * e.facing, vy: 0, type: -1, damage: 1, pierce: 1, life: 3, enemy: true });
            e.shootTimer = 2;
            TAS.audio.playTone(600, 0.05, 'square', 0.03, 300);
          }
        }
        resolveGravity(e, dt);
        break;

      case 'shadow': // Night spore wraith - phases in/out
        if (e.phaseTimer !== undefined) e.phaseTimer += dt;
        var phased = Math.sin(e.phaseTimer * 2) > 0.6;
        if (dist < 180 && dist > 30 && !phased) {
          e.vx = e.speed * e.facing;
          if (e.grounded && Math.random() < 0.015) e.vy = -220;
        } else if (dist <= 30 && !phased) {
          e.vx = 0;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x - 8, e.y, e.w + 16, e.h)) {
              if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 5, 2); }
              else hurtPlayer(1);
            }
            e.attackTimer = 0.8;
          }
        } else { e.vx = 0; }
        e._phased = phased;
        resolveGravity(e, dt);
        break;

      case 'golem': // Dark fungi golem - armored, slow, powerful
        if (dist < 200) {
          e.vx = e.speed * e.facing;
          e.shootTimer -= dt;
          if (e.shootTimer <= 0) {
            // Throws rock
            bullets.push({ x: e.x + e.w/2, y: e.y + 4, w: 8, h: 8, vx: 80 * e.facing, vy: -40, type: -3, damage: 2, pierce: 1, life: 3, enemy: true });
            e.shootTimer = 3;
            TAS.audio.playTone(200, 0.08, 'sawtooth', 0.05, 100);
          }
        } else { e.vx = 0; }
        resolveGravity(e, dt);
        break;

      case 'bomber':
        e.y = e.flyY + Math.sin(e.animTimer * 2) * 15;
        if (dist < 150) {
          e.x += e.speed * e.facing * dt * 0.3;
          e.attackTimer -= dt;
          if (e.attackTimer <= 0) {
            bullets.push({ x: e.x + e.w/2, y: e.y + e.h, w: 6, h: 6, vx: 0, vy: 80, type: -2, damage: 1, pierce: 1, life: 3, enemy: true });
            e.attackTimer = 2;
          }
        }
        break;

      case 'spore': // Drifting spore - organic, erratic
        e.y = e.flyY + Math.sin(e.animTimer * 3.5) * 20 + Math.cos(e.animTimer * 1.7) * 10;
        if (dist < 160) {
          e.x += e.speed * e.facing * dt;
          if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 3, 2); }
            else hurtPlayer(1);
            e.alive = false;
            TAS.particles.spawn(e.x, e.y, '#88cc44', 6, 2);
          }
        }
        break;
    }
  }
}

// ============================================================
// UPDATE BOSS - Enhanced patterns
// ============================================================
function updateBoss(dt) {
  if (!boss || !boss.alive) return;

  if (!bossActive && player.x > STAGE_DEFS[stageNum].width - 250) {
    bossActive = true;
    sfxBossEntry();
    checkpointX = player.x - 60;
    checkpointScroll = scrollX;
  }
  if (!bossActive) return;

  boss.timer += dt;
  boss.animTimer += dt;
  boss.invuln -= dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  // Enrage at 30% HP
  if (!boss.enraged && boss.hp <= boss.maxHp * 0.3) {
    boss.enraged = true;
    TAS.fx.flash('#ff440060', 0.4);
    TAS.fx.shake(6, 0.9);
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ff4400', 20, 4);
  }

  var atkSpeed = boss.enraged ? 0.7 : 1;
  var dx = player.x - boss.x;
  boss.facing = dx > 0 ? 1 : -1;

  // Boss shield phase (tower/final boss)
  if (boss.shieldTimer > 0) {
    boss.shieldTimer -= dt;
    boss.shieldActive = boss.shieldTimer > 0;
  }

  boss.attackTimer -= dt * (1 / atkSpeed);
  if (boss.attackTimer <= 0) {
    boss.attackType = (boss.attackType + 1) % (boss.enraged ? 5 : 3);
    switch(boss.attackType) {
      case 0: // Charge
        boss.vx = (boss.enraged ? 240 : 180) * boss.facing;
        setTimeout(function(){ if(boss) boss.vx = 0; }, boss.enraged ? 800 : 600);
        TAS.fx.shake(2, 0.8);
        break;
      case 1: // Spread shot
        var spread = boss.enraged ? 5 : 3;
        for (var a = -Math.floor(spread/2); a <= Math.floor(spread/2); a++) {
          bullets.push({ x: boss.x + boss.w/2, y: boss.y + boss.h/2, w: 6, h: 4,
            vx: 130 * boss.facing, vy: a * 35, type: -1, damage: 1, pierce: 1, life: 2.5, enemy: true });
        }
        TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 400);
        break;
      case 2: // Jump slam
        boss.vy = boss.enraged ? -300 : -250;
        boss.vx = 80 * boss.facing;
        break;
      case 3: // Enrage: shield + summon (tower/final)
        if (boss.type === 'tower_boss' || boss.type === 'final_boss') {
          boss.shieldTimer = 2;
          boss.shieldActive = true;
          enemies.push(createEnemy('shadow', boss.x + boss.facing * 40, boss.y));
        }
        break;
      case 4: // Enrage: ground pound
        boss.vy = 300;
        setTimeout(function(){
          if (boss && boss.alive) {
            TAS.fx.shake(8, 0.9);
            for (var bi = -2; bi <= 2; bi++) {
              bullets.push({ x: boss.x + boss.w/2 + bi * 30, y: boss.y + boss.h, w: 10, h: 10,
                vx: bi * 60, vy: -120, type: -2, damage: 1, pierce: 1, life: 2, enemy: true });
            }
          }
        }, 300);
        break;
    }
    boss.attackTimer = (1.5 + Math.random()) * atkSpeed;
  }

  // Physics
  resolveGravity(boss, dt);
  // Golem rock falls
  for (var bi2 = bullets.length - 1; bi2 >= 0; bi2--) {
    if (bullets[bi2].type === -3) bullets[bi2].vy += 200 * dt;
  }
  boss.x = TAS.math.clamp(boss.x, scrollX + 20, scrollX + GW - boss.w - 20);

  // Contact damage
  if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
    if (player.shielding) { sfxCapeBlock(); TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 8, 3); }
    else hurtPlayer(boss.enraged ? 2 : 1);
  }
}

// ============================================================
// UPDATE BULLETS
// ============================================================
function updateBullets(dt) {
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;

    if (b.type === AMMO_THUNDER && !b.enemy) b.vy += 200 * dt;
    if (b.type === -2) b.vy += 150 * dt;
    if (b.type === -3) b.vy += 200 * dt;

    if (b.life <= 0 || b.x < scrollX - 50 || b.x > scrollX + GW + 50 || b.y > GH + 20) {
      bullets.splice(i, 1);
      continue;
    }

    if (b.enemy) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
        if (player.shielding) {
          sfxCapeBlock();
          TAS.particles.spawn(player.x + player.w/2, player.y + player.h/2, '#88ccff', 6, 2);
          bullets.splice(i, 1);
        } else {
          hurtPlayer(b.damage);
          bullets.splice(i, 1);
        }
      }
    } else {
      var hitSomething = false;
      for (var ei = 0; ei < enemies.length; ei++) {
        var e = enemies[ei];
        if (!e.alive) continue;
        // Shadow phased = invulnerable
        if (e.type === 'shadow' && e._phased) continue;
        if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
          var actualDmg = b.damage;
          // Golem armor
          if (e.armor && !b.charged) actualDmg = Math.max(1, actualDmg - e.armor);
          e.hp -= actualDmg;
          e.flashTimer = 0.12;
          sfxEnemyHit();
          TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, b.crit ? '#ffff44' : '#ffaa44', b.crit ? 8 : 4, 2);
          if (b.crit) TAS.particles.spawn(e.x + e.w/2, e.y + e.h/3, '#ffffff', 3, 1.5);
          if (e.hp <= 0) {
            e.alive = false;
            comboCount++;
            comboTimer = 2;
            if (comboCount > 1) sfxCombo();
            addScore(100 + (e.type === 'golem' ? 100 : 0));
            sfxEnemyDie();
            TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ff6644', 12, 3, { gravity: 1.5 });
            TAS.fx.shake(2, 0.85);
            spawnDrop(e.x + e.w/2, e.y);
          }
          b.pierce--;
          if (b.pierce <= 0) hitSomething = true;
          break;
        }
      }
      // Hit boss
      if (boss && boss.alive && boss.invuln <= 0 && !boss.shieldActive) {
        if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
          boss.hp -= b.damage;
          boss.invuln = 0.3;
          boss.flashTimer = 0.15;
          sfxEnemyHit();
          TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffcc44', 8, 3);
          TAS.fx.shake(3, 0.8);
          if (boss.hp <= 0) {
            boss.alive = false;
            addScore(1000 + stageNum * 500);
            sfxStageClear();
            TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#f4b41b', 30, 5, { gravity: 1 });
            TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ff8844', 20, 4, { gravity: 1.5 });
            TAS.fx.shake(12, 0.92);
            stageComplete = true;
            stageTimer = 3;
            // Boss drops lots of loot
            for (var di = 0; di < 5; di++) spawnDrop(boss.x + TAS.math.randInt(-20, 20), boss.y);
          }
          b.pierce--;
          if (b.pierce <= 0) hitSomething = true;
        }
      }
      // Shield reflects
      if (boss && boss.shieldActive && TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, boss.x - 4, boss.y - 4, boss.w + 8, boss.h + 8)) {
        TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#8888ff', 4, 2);
        sfxCapeBlock();
        hitSomething = true;
      }
      if (hitSomething) bullets.splice(i, 1);
    }
  }
}

// ============================================================
// UPDATE CRATES
// ============================================================
function updateCrates() {
  for (var ci = 0; ci < crates.length; ci++) {
    var c = crates[ci];
    if (!c.alive) continue;
    for (var bi = bullets.length - 1; bi >= 0; bi--) {
      var b = bullets[bi];
      if (b.enemy) continue;
      if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, c.x, c.y, c.w, c.h)) {
        c.alive = false;
        bullets.splice(bi, 1);
        sfxPickup();
        TAS.particles.spawn(c.x + 8, c.y + 8, '#f4b41b', 10, 3);
        applyItem(c.item);
        break;
      }
    }
    if (c.alive && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, c.x, c.y, c.w, c.h)) {
      c.alive = false;
      sfxPickup();
      TAS.particles.spawn(c.x + 8, c.y + 8, '#f4b41b', 10, 3);
      applyItem(c.item);
    }
  }
}

function applyItem(item) {
  switch(item) {
    case 'hp': hp = Math.min(maxHp, hp + 2); break;
    case 'arrow': ammo[AMMO_ARROW] += 10; break;
    case 'thunder': ammo[AMMO_THUNDER] += 8; break;
    case 'heavy': ammo[AMMO_HEAVY] += 5; break;
  }
  addScore(50);
}

// ============================================================
// UPDATE DROPS
// ============================================================
function updateDrops(dt) {
  for (var i = drops.length - 1; i >= 0; i--) {
    var d = drops[i];
    d.vy += 300 * dt;
    d.y += d.vy * dt;
    d.life -= dt;
    // Land on platform
    var plat = onPlatform(d);
    if (plat) { d.y = plat.y - d.h; d.vy = 0; }
    if (d.life <= 0 || d.y > GH + 50) drops.splice(i, 1);
  }
}

// ============================================================
// UPDATE ENV PARTICLES (dust, fog)
// ============================================================
function updateEnvParticles(dt) {
  for (var i = envParticles.length - 1; i >= 0; i--) {
    var p = envParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) envParticles.splice(i, 1);
  }
  // Ambient particles per zone
  if (frame % 8 === 0) {
    var def = STAGE_DEFS[stageNum];
    if (def.zone === 'forest') {
      envParticles.push({ x: scrollX + Math.random() * GW, y: -5, vx: TAS.math.randInt(-10, 10), vy: TAS.math.randInt(10, 30), life: 4, maxLife: 4, color: '#44663320', size: 3 });
    } else if (def.zone === 'sewer') {
      envParticles.push({ x: scrollX + Math.random() * GW, y: GH - 50 + Math.random() * 20, vx: TAS.math.randInt(-5, 5), vy: TAS.math.randInt(-10, -3), life: 2, maxLife: 2, color: '#44884420', size: 2 });
    } else if (def.zone === 'factory') {
      if (Math.random() < 0.3) envParticles.push({ x: scrollX + Math.random() * GW, y: GH - 60 + Math.random() * 10, vx: TAS.math.randInt(5, 20), vy: TAS.math.randInt(-15, -5), life: 1.5, maxLife: 1.5, color: '#ff884430', size: 2 });
    } else if (def.zone === 'throne') {
      envParticles.push({ x: scrollX + Math.random() * GW, y: Math.random() * GH, vx: 0, vy: TAS.math.randInt(-8, -2), life: 3, maxLife: 3, color: '#a855f718', size: 4 });
    }
  }
}

// ============================================================
// STAGE COMPLETION CHECK
// ============================================================
function checkStageEnd() {
  if (stageComplete) return;
  var def = STAGE_DEFS[stageNum];
  if (!def.boss && player.x > def.width - 60) {
    stageComplete = true;
    stageTimer = 2;
    sfxStageClear();
    addScore(500);
    if (noHitBonus) addScore(1000);
  }
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function updateScreenShake(dt) {
  screenShakeX *= 0.85;
  screenShakeY *= 0.85;
  if (Math.abs(screenShakeX) < 0.1) screenShakeX = 0;
  if (Math.abs(screenShakeY) < 0.1) screenShakeY = 0;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  updateInput();
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScreenShake(dt);
  updateEnvParticles(dt);

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; justPressed.shoot = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (justPressed.jump || justPressed.shoot) startGame();
    return;
  }

  if (state === 'victory') {
    if (justPressed.jump || justPressed.shoot) state = 'title';
    return;
  }

  if (state === 'gameOver') {
    if (justPressed.jump || justPressed.shoot) state = 'title';
    return;
  }

  if (state === 'dying') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        if (score > highScore) { highScore = score; TAS.score.save('darkspore_hi', score); }
        state = 'gameOver';
      } else {
        state = 'playing';
        respawn();
      }
    }
    return;
  }

  if (state === 'stageIntro') {
    stageTimer -= dt;
    if (stageTimer <= 0) state = 'playing';
    return;
  }

  if (state === 'playing') {
    if (stageComplete) {
      stageTimer -= dt;
      if (stageTimer <= 0) {
        nextStage();
        if (state === 'playing') {
          state = 'stageIntro';
          stageTimer = 2;
        }
      }
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateBullets(dt);
    updateCrates();
    updateDrops(dt);
    checkStageEnd();
  }
}

// ============================================================
// DRAWING - NES Polished
// ============================================================
function drawBackground() {
  var def = STAGE_DEFS[stageNum];

  // Sky gradient
  ctx.fillStyle = def.skyColor;
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  var seed = stageNum * 1000;
  for (var i = 0; i < 50; i++) {
    var sx = ((seed + i * 137) % (GW + 200)) - scrollX * 0.05 % (GW + 200);
    var sy = ((seed + i * 97) % 100);
    var twinkle = Math.sin(frame * 0.03 + i) * 0.3 + 0.7;
    var bright = Math.floor((60 + (i * 17 % 80)) * twinkle);
    ctx.fillStyle = 'rgba(' + bright + ',' + bright + ',' + (bright + 40) + ',' + (0.4 + twinkle * 0.3) + ')';
    ctx.fillRect(((sx % GW) + GW) % GW, sy, 1 + (i % 3 === 0 ? 1 : 0), 1);
  }

  // Zone-specific background layers
  var parX = scrollX * 0.2;
  var parX2 = scrollX * 0.4;

  if (def.zone === 'city' || def.zone === 'throne') {
    // Far buildings
    ctx.fillStyle = def.bg;
    for (var bi = 0; bi < 15; bi++) {
      var bx = bi * 60 - (parX % 60);
      var bh = 40 + (bi * 37 % 70);
      ctx.fillRect(bx, GH - 70 - bh, 40 + (bi * 17 % 20), bh + 70);
    }
    // Near buildings
    for (var ni = 0; ni < 10; ni++) {
      var nx = ni * 80 - (parX2 % 80);
      var nh = 30 + (ni * 43 % 50);
      ctx.fillStyle = '#00000040';
      ctx.fillRect(nx, GH - 50 - nh, 55 + (ni * 19 % 25), nh + 50);
      // Windows
      ctx.fillStyle = '#38d97318';
      for (var wy = GH - 50 - nh + 8; wy < GH - 20; wy += 10) {
        if ((ni * 7 + wy) % 3 !== 0) ctx.fillRect(nx + 5, wy, 3, 3);
        if ((ni * 11 + wy) % 4 !== 0) ctx.fillRect(nx + 20, wy, 3, 3);
        if ((ni * 3 + wy) % 3 !== 0) ctx.fillRect(nx + 35, wy, 3, 3);
      }
    }
    // Neon signs
    for (var si = 0; si < 5; si++) {
      var snx = si * 180 + 50 - scrollX * 0.35;
      if (snx > -60 && snx < GW + 60) {
        var flicker = Math.sin(frame * 0.1 + si * 2) > -0.3 ? 1 : 0.3;
        ctx.globalAlpha = 0.35 * flicker;
        ctx.fillStyle = ['#ff44aa','#44ffaa','#ffaa44','#44aaff','#aa44ff'][si % 5];
        ctx.fillRect(snx, 35 + si * 12, 36, 6);
        ctx.globalAlpha = 1;
      }
    }
  } else if (def.zone === 'bridge') {
    // Water below
    ctx.fillStyle = '#0a1830';
    ctx.fillRect(0, GH - 30, GW, 30);
    for (var wi = 0; wi < 20; wi++) {
      var wx = wi * 25 - (frame * 0.3 + parX * 0.5) % 25;
      var wh = Math.sin(frame * 0.04 + wi * 0.8) * 3;
      ctx.fillStyle = '#1a284040';
      ctx.fillRect(wx, GH - 28 + wh, 18, 2);
    }
    // Bridge cables
    ctx.strokeStyle = '#33445560';
    ctx.lineWidth = 1;
    for (var ci = 0; ci < 3; ci++) {
      var cx = ci * 200 - parX * 0.3;
      ctx.beginPath();
      ctx.moveTo(cx, 0);
      ctx.quadraticCurveTo(cx + 100, 80, cx + 200, 0);
      ctx.stroke();
    }
  } else if (def.zone === 'forest') {
    // Tree silhouettes far
    for (var ti = 0; ti < 20; ti++) {
      var tx = ti * 50 - (parX % 50);
      var th = 60 + (ti * 31 % 40);
      ctx.fillStyle = '#0a140a';
      ctx.beginPath();
      ctx.moveTo(tx + 15, GH - 40 - th);
      ctx.lineTo(tx - 5, GH - 40);
      ctx.lineTo(tx + 35, GH - 40);
      ctx.fill();
      ctx.fillRect(tx + 12, GH - 40, 6, 40);
    }
    // Near trees
    for (var tni = 0; tni < 12; tni++) {
      var tnx = tni * 70 - (parX2 % 70);
      var tnh = 40 + (tni * 23 % 30);
      ctx.fillStyle = '#0c1a0c40';
      ctx.beginPath();
      ctx.moveTo(tnx + 20, GH - 30 - tnh);
      ctx.lineTo(tnx - 10, GH - 30);
      ctx.lineTo(tnx + 50, GH - 30);
      ctx.fill();
    }
  } else if (def.zone === 'sewer') {
    // Dripping pipes background
    for (var pi = 0; pi < 8; pi++) {
      var px = pi * 80 - (parX % 80);
      ctx.fillStyle = '#1a2a1a';
      ctx.fillRect(px, 20 + (pi * 17 % 30), 60, 6);
      ctx.fillRect(px + 25, 20 + (pi * 17 % 30), 6, 40);
      // Drip
      if ((frame + pi * 30) % 120 < 40) {
        var dripY = 60 + (pi * 17 % 30) + ((frame + pi * 30) % 120) * 1.5;
        ctx.fillStyle = '#44884430';
        ctx.fillRect(px + 27, dripY, 2, 4);
      }
    }
  } else if (def.zone === 'factory') {
    // Gears and pipes
    for (var gi = 0; gi < 6; gi++) {
      var gx = gi * 100 - (parX % 100) + 30;
      var gy = 40 + (gi * 29 % 50);
      ctx.strokeStyle = '#3a282820';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(gx, gy, 15 + (gi % 3) * 5, 0, Math.PI * 2);
      ctx.stroke();
      // Rotate visual
      var angle = frame * 0.01 * (gi % 2 === 0 ? 1 : -1);
      ctx.strokeStyle = '#3a282830';
      ctx.beginPath();
      ctx.moveTo(gx + Math.cos(angle) * 12, gy + Math.sin(angle) * 12);
      ctx.lineTo(gx - Math.cos(angle) * 12, gy - Math.sin(angle) * 12);
      ctx.stroke();
    }
    // Steam pipes
    ctx.fillStyle = '#2a1818';
    for (var spi = 0; spi < 4; spi++) {
      ctx.fillRect(spi * 120 - (parX % 120), 0, 8, GH - 60);
    }
  } else if (def.zone === 'tower') {
    // Gothic arches
    for (var ai = 0; ai < 8; ai++) {
      var ax = ai * 80 - (parX % 80);
      ctx.strokeStyle = '#3a205020';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ax, GH - 40);
      ctx.quadraticCurveTo(ax + 20, 20, ax + 40, GH - 40);
      ctx.stroke();
    }
    // Candle lights
    for (var cli = 0; cli < 5; cli++) {
      var clx = cli * 120 + 40 - parX * 0.3;
      if (clx > -20 && clx < GW + 20) {
        var flick = Math.sin(frame * 0.15 + cli * 3) * 0.15 + 0.85;
        ctx.globalAlpha = 0.25 * flick;
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(clx, 140, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.1 * flick;
        ctx.beginPath();
        ctx.arc(clx, 140, 20, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Fog overlay per zone
  if (def.fogColor) {
    ctx.fillStyle = def.fogColor;
    var fogOff = Math.sin(frame * 0.008) * 15;
    ctx.fillRect(-10 + fogOff, GH - 80, GW + 20, 80);
  }
}

function drawPlatforms() {
  var def = STAGE_DEFS[stageNum];
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    var sx = p.x - scrollX;
    if (sx + p.w < -10 || sx > GW + 10) continue;

    // Shadow under platform
    ctx.fillStyle = '#00000020';
    ctx.fillRect(sx + 2, p.y + 2, p.w, p.h);

    ctx.fillStyle = def.platformColor;
    ctx.fillRect(sx, p.y, p.w, p.h);
    // Top edge highlight
    ctx.fillStyle = '#ffffff18';
    ctx.fillRect(sx, p.y, p.w, 2);
    // Left edge subtle highlight
    ctx.fillStyle = '#ffffff08';
    ctx.fillRect(sx, p.y, 2, p.h);
    // Brick/detail lines
    ctx.fillStyle = '#00000025';
    for (var lx = 0; lx < p.w; lx += 16) {
      ctx.fillRect(sx + lx, p.y + 4, 1, p.h - 4);
    }
    for (var ly = 0; ly < p.h; ly += 12) {
      ctx.fillRect(sx, p.y + ly, p.w, 1);
    }
  }
}

function drawGrabPoints() {
  var def = STAGE_DEFS[stageNum];
  for (var i = 0; i < grabPoints.length; i++) {
    var gp = grabPoints[i];
    var sx = gp.x - scrollX;
    if (sx + gp.w < -10 || sx > GW + 10) continue;
    // Mounting bracket
    ctx.fillStyle = '#44444480';
    ctx.fillRect(sx + 4, gp.y - 8, gp.w - 8, 8);
    // Pipe/hook
    ctx.fillStyle = def.hookColor;
    ctx.fillRect(sx, gp.y, gp.w, gp.h);
    // Highlight
    ctx.fillStyle = '#ffffff30';
    ctx.fillRect(sx + 2, gp.y, gp.w - 4, 3);
    // Glow indicator
    var pulse = Math.sin(frame * 0.08) * 0.2 + 0.5;
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - 2, gp.y - 2, gp.w + 4, gp.h + 4);
    ctx.globalAlpha = 1;
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var sx = h.x - scrollX;
    if (sx + h.w < -10 || sx > GW + 10) continue;
    h.timer += 1/60;

    if (h.type === 'spikes') {
      ctx.fillStyle = '#aa4444';
      for (var x = 0; x < h.w; x += 6) {
        ctx.beginPath();
        ctx.moveTo(sx + x, h.y + h.h);
        ctx.lineTo(sx + x + 3, h.y);
        ctx.lineTo(sx + x + 6, h.y + h.h);
        ctx.fill();
      }
      // Metallic highlight
      ctx.fillStyle = '#cc666640';
      for (var xh = 0; xh < h.w; xh += 6) {
        ctx.fillRect(sx + xh + 2, h.y + 1, 1, 3);
      }
    } else if (h.type === 'electric') {
      var flicker = Math.sin(frame * 0.3 + h.timer) > 0;
      ctx.fillStyle = flicker ? '#44ccff' : '#2288aa';
      ctx.fillRect(sx, h.y, h.w, h.h);
      if (flicker) {
        ctx.fillStyle = '#88eeff30';
        ctx.fillRect(sx - 2, h.y - 4, h.w + 4, h.h + 8);
        // Zap lines
        ctx.strokeStyle = '#ccffff40';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + Math.random() * h.w, h.y);
        ctx.lineTo(sx + Math.random() * h.w, h.y + h.h);
        ctx.stroke();
      }
    } else if (h.type === 'acid') {
      var bubble = Math.sin(h.timer * 3) * 2;
      ctx.fillStyle = '#44aa22';
      ctx.fillRect(sx, h.y, h.w, h.h);
      ctx.fillStyle = '#66cc3360';
      ctx.fillRect(sx, h.y - 2 + bubble, h.w, 3);
      // Bubbles
      if (Math.sin(h.timer * 5 + i) > 0.8) {
        ctx.fillStyle = '#88ee4460';
        ctx.beginPath();
        ctx.arc(sx + (h.timer * 20 % h.w), h.y - 3, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (h.type === 'thorns') {
      ctx.fillStyle = '#2a5522';
      for (var xt = 0; xt < h.w; xt += 8) {
        ctx.beginPath();
        ctx.moveTo(sx + xt, h.y + h.h);
        ctx.lineTo(sx + xt + 4, h.y - 2);
        ctx.lineTo(sx + xt + 8, h.y + h.h);
        ctx.fill();
      }
      ctx.fillStyle = '#44882240';
      ctx.fillRect(sx, h.y + h.h - 2, h.w, 2);
    } else if (h.type === 'shadow_fire') {
      var sf = Math.sin(h.timer * 4);
      ctx.fillStyle = '#7c3aed';
      ctx.fillRect(sx, h.y, h.w, h.h);
      ctx.fillStyle = '#a855f7' + (sf > 0 ? '80' : '40');
      ctx.fillRect(sx, h.y - 4 - Math.abs(sf) * 4, h.w, h.h + 6);
      // Flame tips
      for (var xf = 0; xf < h.w; xf += 10) {
        var fh = 4 + Math.sin(h.timer * 6 + xf) * 3;
        ctx.fillStyle = '#aa66ff50';
        ctx.fillRect(sx + xf + 2, h.y - fh, 6, fh);
      }
    }
  }
}

function drawPlayer() {
  if (!player) return;
  var p = player;
  var sx = p.x - scrollX;

  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) return;

  // === BASELING SPRITE ===
  if (TAS.drawBaseling(ctx, sx + p.w / 2, p.y + p.h / 2, Math.max(p.w, p.h), { flipX: p.facing < 0, frame: frame })) return;

  ctx.save();
  ctx.translate(sx + p.w / 2, p.y + p.h / 2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // Charging glow
  if (p.charging && p.chargeTime > 0.2) {
    var chargeAlpha = Math.min(0.6, p.chargeTime / CHARGE_TIME_MAX);
    var chargeSize = 8 + p.chargeTime * 12;
    ctx.globalAlpha = chargeAlpha * (0.7 + Math.sin(frame * 0.3) * 0.3);
    ctx.fillStyle = AMMO_COLORS[currentAmmo];
    ctx.beginPath();
    ctx.arc(6, 0, chargeSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Charge ready flash
    if (p.chargeTime >= CHARGE_TIME_MAX * 0.8) {
      ctx.globalAlpha = Math.sin(frame * 0.4) * 0.3 + 0.4;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(6, 0, chargeSize * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Wall slide sparks
  if (p.wallSlide) {
    ctx.fillStyle = '#f4b41b80';
    for (var ws = 0; ws < 3; ws++) {
      ctx.fillRect(-7 + Math.random() * 2, -8 + Math.random() * 16, 2, 2);
    }
  }

  if (p.shielding) {
    // Cape wrapped around (shield)
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(-9, -12, 18, 24);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(-8, -10, 16, 20);
    var spark = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = spark;
    ctx.fillStyle = '#c084fc';
    ctx.fillRect(-6, -8, 12, 16);
    ctx.globalAlpha = 1;
    // Shield edge shimmer
    ctx.strokeStyle = '#c084fc40';
    ctx.lineWidth = 1;
    ctx.strokeRect(-9, -12, 18, 24);
  } else if (p.gliding) {
    // Cape spread wide
    ctx.fillStyle = '#7c3aed';
    ctx.beginPath();
    ctx.moveTo(-2, -8);
    ctx.lineTo(-18, 6 + Math.sin(p.capeFrame * 8) * 3);
    ctx.lineTo(-14, 12);
    ctx.lineTo(0, 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(2, -8);
    ctx.lineTo(14, 6 + Math.sin(p.capeFrame * 8 + 1) * 3);
    ctx.lineTo(10, 12);
    ctx.lineTo(0, 4);
    ctx.fill();
    // Cape detail
    ctx.fillStyle = '#9333ea40';
    ctx.beginPath();
    ctx.moveTo(-1, -4);
    ctx.lineTo(-12, 8 + Math.sin(p.capeFrame * 8) * 2);
    ctx.lineTo(-8, 10);
    ctx.lineTo(0, 2);
    ctx.fill();
    drawPlayerBody(p);
  } else if (p.grabbing) {
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(-3, -14, 6, 4);
    // Arms up
    ctx.fillStyle = '#443366';
    ctx.fillRect(-6, -14, 3, 6);
    ctx.fillRect(3, -14, 3, 6);
    drawPlayerBody(p);
  } else if (p.dashTimer > 0) {
    // Dash blur
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = statB.color;
    ctx.fillRect(-8, -10, 16, 20);
    ctx.globalAlpha = 1;
    drawPlayerBody(p);
  } else {
    // Normal cape billowing
    var cBob = Math.sin(p.capeFrame * 5) * 2;
    ctx.fillStyle = '#7c3aed';
    ctx.beginPath();
    ctx.moveTo(-2, -6);
    ctx.lineTo(-10 + cBob, 8);
    ctx.lineTo(-6, 12);
    ctx.lineTo(-1, 2);
    ctx.fill();
    // Cape inner detail
    ctx.fillStyle = '#9333ea30';
    ctx.beginPath();
    ctx.moveTo(-2, -4);
    ctx.lineTo(-8 + cBob, 6);
    ctx.lineTo(-5, 10);
    ctx.lineTo(-1, 1);
    ctx.fill();
    drawPlayerBody(p);
  }

  ctx.restore();
}

function drawPlayerBody(p) {
  // Shadow
  ctx.fillStyle = '#00000030';
  ctx.fillRect(-4, -7, 9, 15);
  // Body
  ctx.fillStyle = '#443366';
  ctx.fillRect(-5, -8, 10, 16);
  // Body highlight
  ctx.fillStyle = '#55447730';
  ctx.fillRect(-4, -7, 4, 14);
  // Head
  ctx.fillStyle = '#ddccaa';
  ctx.fillRect(-4, -12, 8, 7);
  // Fedora
  ctx.fillStyle = '#332244';
  ctx.fillRect(-6, -14, 12, 4);
  ctx.fillRect(-4, -15, 8, 2);
  // Fedora band
  ctx.fillStyle = '#554466';
  ctx.fillRect(-5, -12, 10, 1);
  // Eyes (white mask)
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -11, 3, 2);
  // Eye glow
  ctx.fillStyle = '#ffffff40';
  ctx.fillRect(-1, -11, 5, 2);
  // Belt
  ctx.fillStyle = '#554466';
  ctx.fillRect(-5, 4, 10, 2);
  ctx.fillStyle = '#f4b41b';
  ctx.fillRect(-1, 4, 2, 2);
  // Legs
  var legAnim = p.grounded && p.vx !== 0 ? Math.sin(p.animTimer * 10) * 2 : 0;
  ctx.fillStyle = '#332244';
  ctx.fillRect(-4, 8, 3, 6 + legAnim);
  ctx.fillRect(1, 8, 3, 6 - legAnim);
  // Boots
  ctx.fillStyle = '#221133';
  ctx.fillRect(-5, 12 + legAnim, 4, 2);
  ctx.fillRect(0, 12 - legAnim, 4, 2);
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    var sx = e.x - scrollX;
    if (sx + e.w < -20 || sx > GW + 20) continue;

    ctx.save();
    ctx.translate(sx + e.w / 2, e.y + e.h / 2);
    if (e.facing < 0) ctx.scale(-1, 1);

    // Hit flash
    if (e.flashTimer > 0) {
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.8) * 0.5;
    }

    switch(e.type) {
      case 'thug':
        // Shadow mold grunt
        ctx.fillStyle = '#884422';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#996633';
        ctx.fillRect(-5, -8, 10, 8);
        ctx.fillStyle = '#aa6633';
        ctx.fillRect(-5, -12, 10, 6);
        // Bandana
        ctx.fillStyle = '#cc4444';
        ctx.fillRect(-5, -12, 10, 3);
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, -10, 2, 2);
        ctx.fillStyle = '#332211';
        ctx.fillRect(-5, 8, 4, 5);
        ctx.fillRect(1, 8, 4, 5);
        break;
      case 'gunner':
        // Spore launcher fungoid
        ctx.fillStyle = '#445566';
        ctx.fillRect(-6, -8, 12, 16);
        ctx.fillStyle = '#556677';
        ctx.fillRect(-5, -8, 10, 8);
        ctx.fillStyle = '#667788';
        ctx.fillRect(-4, -12, 8, 6);
        // Helmet
        ctx.fillStyle = '#778899';
        ctx.fillRect(-5, -14, 10, 4);
        // Crossbow
        ctx.fillStyle = '#886644';
        ctx.fillRect(4, -2, 7, 2);
        ctx.fillStyle = '#664422';
        ctx.fillRect(7, -5, 1, 8);
        ctx.fillStyle = '#334455';
        ctx.fillRect(-4, 8, 4, 5);
        ctx.fillRect(1, 8, 4, 5);
        break;
      case 'shadow':
        // Night spore wraith
        var phaseAlpha = e._phased ? 0.25 : 0.9;
        ctx.globalAlpha *= phaseAlpha;
        ctx.fillStyle = '#1a0830';
        ctx.fillRect(-5, -8, 10, 16);
        ctx.fillStyle = '#220a40';
        ctx.fillRect(-6, -12, 12, 8);
        // Glowing eyes
        ctx.fillStyle = e._phased ? '#aa44ff40' : '#aa44ff';
        ctx.fillRect(-2, -10, 2, 2);
        ctx.fillRect(2, -10, 2, 2);
        // Wispy tendrils
        ctx.fillStyle = '#33115580';
        var tw = Math.sin(e.animTimer * 4) * 3;
        ctx.fillRect(-6, 4, 3, 8 + tw);
        ctx.fillRect(3, 4, 3, 8 - tw);
        // Shadow aura
        if (!e._phased) {
          ctx.fillStyle = '#22004410';
          ctx.fillRect(-8, -14, 16, 28);
        }
        ctx.globalAlpha = e.flashTimer > 0 ? (0.5 + Math.sin(frame * 0.8) * 0.5) : 1;
        break;
      case 'golem':
        // Dark fungi golem
        ctx.fillStyle = '#556650';
        ctx.fillRect(-8, -10, 16, 22);
        // Mossy patches
        ctx.fillStyle = '#447744';
        ctx.fillRect(-6, -6, 4, 4);
        ctx.fillRect(2, -2, 5, 3);
        // Face
        ctx.fillStyle = '#668860';
        ctx.fillRect(-6, -13, 12, 6);
        ctx.fillStyle = '#ff6644';
        ctx.fillRect(-4, -11, 3, 3);
        ctx.fillRect(2, -11, 3, 3);
        // Thick legs
        ctx.fillStyle = '#445540';
        ctx.fillRect(-7, 12, 6, 6);
        ctx.fillRect(1, 12, 6, 6);
        // Arm (fist)
        ctx.fillStyle = '#556650';
        ctx.fillRect(6, -6, 5, 10);
        // Cracks
        ctx.strokeStyle = '#33442020';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-3, -8);
        ctx.lineTo(0, 0);
        ctx.lineTo(3, 6);
        ctx.stroke();
        break;
      case 'bomber':
        // Puffball bomber
        ctx.fillStyle = '#664422';
        ctx.fillRect(-6, -8, 12, 14);
        // Wings/arms
        ctx.fillStyle = '#553311';
        var bWing = Math.sin(e.animTimer * 6) * 3;
        ctx.fillRect(-10, -4 + bWing, 4, 6);
        ctx.fillRect(6, -4 - bWing, 4, 6);
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(-4, -11, 8, 5);
        // Goggles
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(-3, -9, 3, 2);
        ctx.fillRect(1, -9, 3, 2);
        // Bomb in hand
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(0, 8, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(-1, 4, 2, 2);
        break;
      case 'spore':
        // Drifting garden spore
        ctx.fillStyle = '#446633';
        var spSize = 4 + Math.sin(e.animTimer * 2) * 1;
        ctx.beginPath();
        ctx.arc(0, 0, spSize, 0, Math.PI * 2);
        ctx.fill();
        // Inner glow
        ctx.fillStyle = '#88cc44';
        ctx.beginPath();
        ctx.arc(0, 0, spSize * 0.5, 0, Math.PI * 2);
        ctx.fill();
        // Tendrils
        ctx.fillStyle = '#335522';
        var tw2 = Math.sin(e.animTimer * 4);
        ctx.fillRect(-2, spSize, 1, 4 + tw2 * 2);
        ctx.fillRect(1, spSize, 1, 4 - tw2 * 2);
        ctx.fillRect(-4, spSize - 2, 1, 3 + tw2);
        ctx.fillRect(3, spSize - 2, 1, 3 - tw2);
        // Spore particles
        ctx.fillStyle = '#88cc4430';
        ctx.fillRect(-6 + tw2 * 2, -3, 2, 2);
        ctx.fillRect(4 - tw2 * 2, 2, 2, 2);
        break;
    }
    ctx.restore();
  }
}

function drawBoss() {
  if (!boss || !boss.alive || !bossActive) return;
  var sx = boss.x - scrollX;

  if (boss.flashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.5;
  }

  ctx.save();
  ctx.translate(sx + boss.w / 2, boss.y + boss.h / 2);
  if (boss.facing < 0) ctx.scale(-1, 1);

  // Enrage aura
  if (boss.enraged) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#ff2200';
    ctx.beginPath();
    ctx.arc(0, 0, 28, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = boss.flashTimer > 0 ? (0.5 + Math.sin(frame * 0.5) * 0.5) : 1;
  }

  // Shield visual
  if (boss.shieldActive) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.2) * 0.15;
    ctx.strokeStyle = '#8888ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 24, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = boss.flashTimer > 0 ? (0.5 + Math.sin(frame * 0.5) * 0.5) : 1;
  }

  // Boss body
  ctx.fillStyle = boss.enraged ? '#880022' : '#660022';
  ctx.fillRect(-14, -16, 28, 32);
  // Armor plates
  ctx.fillStyle = '#440015';
  ctx.fillRect(-12, -10, 6, 12);
  ctx.fillRect(6, -10, 6, 12);
  // Head
  ctx.fillStyle = boss.enraged ? '#aa0044' : '#880033';
  ctx.fillRect(-10, -20, 20, 8);
  // Crown/horns
  ctx.fillStyle = '#f4b41b';
  ctx.fillRect(-8, -24, 3, 6);
  ctx.fillRect(5, -24, 3, 6);
  ctx.fillRect(-2, -22, 4, 4);
  // Eyes
  ctx.fillStyle = boss.enraged ? '#ffff00' : '#ff0000';
  ctx.fillRect(-6, -18, 4, 3);
  ctx.fillRect(2, -18, 4, 3);
  // Arms
  ctx.fillStyle = '#550020';
  ctx.fillRect(-18, -10, 6, 16);
  ctx.fillRect(12, -10, 6, 16);
  // Fists
  ctx.fillStyle = '#660028';
  ctx.fillRect(-20, 4, 8, 6);
  ctx.fillRect(12, 4, 8, 6);
  // Legs
  ctx.fillStyle = '#440018';
  ctx.fillRect(-10, 16, 8, 7);
  ctx.fillRect(2, 16, 8, 7);
  // Cape/cloak
  ctx.fillStyle = '#330015';
  ctx.beginPath();
  ctx.moveTo(-12, -12);
  ctx.lineTo(-18, 16 + Math.sin(frame * 0.05) * 3);
  ctx.lineTo(-10, 12);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(12, -12);
  ctx.lineTo(18, 16 + Math.sin(frame * 0.05 + 1) * 3);
  ctx.lineTo(10, 12);
  ctx.fill();

  ctx.restore();
  ctx.globalAlpha = 1;

  // Boss HP bar
  var barW = 100;
  var barX = GW / 2 - barW / 2;
  ctx.fillStyle = '#222';
  ctx.fillRect(barX - 1, GH - 22, barW + 2, 12);
  // HP gradient
  var hpPct = boss.hp / boss.maxHp;
  var bossColor = boss.enraged ? '#ff2244' : (hpPct > 0.5 ? '#cc2244' : '#ff4444');
  ctx.fillStyle = bossColor;
  ctx.fillRect(barX, GH - 21, barW * hpPct, 10);
  // HP bar segments
  ctx.fillStyle = '#00000030';
  for (var seg = 1; seg < 10; seg++) {
    ctx.fillRect(barX + barW * seg / 10, GH - 21, 1, 10);
  }
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX - 1, GH - 22, barW + 2, 12);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGE_DEFS[stageNum].name + ' GUARDIAN', GW / 2, GH - 25);
}

function drawBullets() {
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    var sx = b.x - scrollX;
    if (sx < -10 || sx > GW + 10) continue;

    if (b.enemy) {
      if (b.type === -2) {
        // Bomb
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.arc(sx, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff8800';
        ctx.fillRect(sx - 1, b.y - 6, 2, 3);
        // Sparks
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(sx - 1 + Math.random() * 2, b.y - 7, 1, 1);
      } else if (b.type === -3) {
        // Rock (golem)
        ctx.fillStyle = '#887766';
        ctx.fillRect(sx - 3, b.y - 3, 8, 8);
        ctx.fillStyle = '#665544';
        ctx.fillRect(sx - 1, b.y - 1, 4, 4);
      } else {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(sx, b.y, b.w, b.h);
        ctx.fillStyle = '#ff666640';
        ctx.fillRect(sx - 1, b.y - 1, b.w + 2, b.h + 2);
      }
    } else {
      // Charged shot
      if (b.charged) {
        ctx.fillStyle = AMMO_COLORS[b.type];
        ctx.beginPath();
        ctx.arc(sx + b.w/2, b.y + b.h/2, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff60';
        ctx.beginPath();
        ctx.arc(sx + b.w/2, b.y + b.h/2, 4, 0, Math.PI * 2);
        ctx.fill();
        // Trail
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = AMMO_COLORS[b.type];
        ctx.fillRect(sx - 8, b.y + 1, 8, b.h - 2);
        ctx.globalAlpha = 0.2;
        ctx.fillRect(sx - 16, b.y + 2, 8, b.h - 4);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = AMMO_COLORS[b.type];
        if (b.type === AMMO_HEAVY) {
          ctx.beginPath();
          ctx.arc(sx + b.w/2, b.y + b.h/2, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#ffffff40';
          ctx.beginPath();
          ctx.arc(sx + b.w/2 - 1, b.y + b.h/2 - 1, 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (b.type === AMMO_THUNDER) {
          ctx.fillRect(sx, b.y, b.w, b.h);
          ctx.globalAlpha = 0.5;
          ctx.fillRect(sx - 3, b.y + TAS.math.randInt(-3, 3), 3, 2);
          ctx.fillRect(sx + b.w, b.y + TAS.math.randInt(-2, 2), 2, 2);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillRect(sx, b.y, b.w, b.h);
        }
        // Glow
        ctx.globalAlpha = 0.25;
        ctx.fillStyle = AMMO_COLORS[b.type];
        ctx.fillRect(sx - 1, b.y - 1, b.w + 2, b.h + 2);
        ctx.globalAlpha = 1;
      }
      // Crit sparkle
      if (b.crit) {
        ctx.fillStyle = '#ffff88';
        ctx.fillRect(sx + b.w/2 + TAS.math.randInt(-3, 3), b.y + TAS.math.randInt(-3, 3), 2, 2);
      }
    }
  }
}

function drawDrops() {
  for (var i = 0; i < drops.length; i++) {
    var d = drops[i];
    var sx = d.x - scrollX;
    if (sx < -10 || sx > GW + 10) continue;
    var bob = Math.sin(frame * 0.08 + i) * 2;
    // Glow
    var glowAlpha = 0.2 + Math.sin(frame * 0.06 + i * 2) * 0.1;
    ctx.globalAlpha = glowAlpha;
    ctx.fillStyle = getDropColor(d.type);
    ctx.fillRect(sx - 3, d.y - 3 + bob, d.w + 6, d.h + 6);
    ctx.globalAlpha = 1;
    // Item
    ctx.fillStyle = getDropColor(d.type);
    ctx.fillRect(sx, d.y + bob, d.w, d.h);
    ctx.fillStyle = '#ffffff60';
    ctx.fillRect(sx + 1, d.y + 1 + bob, 3, 3);
    // Blink when expiring
    if (d.life < 1.5 && Math.floor(d.life * 6) % 2 === 0) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx, d.y + bob, d.w, d.h);
      ctx.globalAlpha = 1;
    }
  }
}

function getDropColor(type) {
  switch(type) {
    case 'hp': return '#44ff44';
    case 'score': return '#f4b41b';
    case 'ammo_arrow': return '#44ffaa';
    case 'ammo_thunder': return '#88ccff';
    case 'ammo_heavy': return '#ff8844';
    case 'M_coin': return '#44dd88';
    default: return '#ffffff';
  }
}

function drawCrates() {
  for (var i = 0; i < crates.length; i++) {
    var c = crates[i];
    if (!c.alive) continue;
    var sx = c.x - scrollX;
    if (sx + c.w < -10 || sx > GW + 10) continue;
    // Shadow
    ctx.fillStyle = '#00000020';
    ctx.fillRect(sx + 2, c.y + 2, c.w, c.h);
    // Crate
    ctx.fillStyle = '#886633';
    ctx.fillRect(sx, c.y, c.w, c.h);
    ctx.fillStyle = '#aa8844';
    ctx.fillRect(sx + 2, c.y + 2, c.w - 4, c.h - 4);
    // Cross detail
    ctx.fillStyle = '#775522';
    ctx.fillRect(sx + c.w/2 - 1, c.y + 2, 2, c.h - 4);
    ctx.fillRect(sx + 2, c.y + c.h/2 - 1, c.w - 4, 2);
    // Item indicator
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(sx + 5, c.y + 5, 6, 6);
    // Hover glow
    var glow = Math.sin(frame * 0.06 + i) * 0.15 + 0.2;
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(sx - 2, c.y - 2, c.w + 4, c.h + 4);
    ctx.globalAlpha = 1;
  }
}

function drawEnvParticles() {
  for (var i = 0; i < envParticles.length; i++) {
    var ep = envParticles[i];
    var esX = ep.x - scrollX;
    if (esX < -10 || esX > GW + 10) continue;
    ctx.globalAlpha = Math.max(0, ep.life / ep.maxLife);
    ctx.fillStyle = ep.color;
    ctx.fillRect(esX, ep.y, ep.size, ep.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  TAS.ui.drawHUD(score, stageNum + 1, lives, GW, { scoreLabel: 'SCORE', lifeColor: '#a855f7' });

  // Persistent controls legend for keyboard players (title legend is behind the NFT gate)
  if (!('ontouchstart' in window)) {
    ctx.save();
    ctx.globalAlpha = (stageNum === 0) ? 0.7 : 0.32;
    ctx.fillStyle = 'rgba(10,5,20,0.7)';
    ctx.fillRect(0, GH - 11, GW, 11);
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS Move    W Jump    A Shoot    S Ammo    D Dash    UP Shield', GW / 2, GH - 3);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  // HP bar with segments
  var hpBarX = 6;
  var hpBarY = 32;
  ctx.fillStyle = '#222';
  ctx.fillRect(hpBarX, hpBarY, 52, 8);
  var hpPct = hp / maxHp;
  var hpColor = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillStyle = hpColor;
  ctx.fillRect(hpBarX + 1, hpBarY + 1, 50 * hpPct, 6);
  // HP segments
  ctx.fillStyle = '#00000030';
  for (var hs = 1; hs < maxHp; hs++) {
    ctx.fillRect(hpBarX + 1 + 50 * hs / maxHp, hpBarY + 1, 1, 6);
  }
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(hpBarX, hpBarY, 52, 8);

  // Ammo indicator
  ctx.fillStyle = AMMO_COLORS[currentAmmo];
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  var ammoText = AMMO_NAMES[currentAmmo] + (currentAmmo === AMMO_NORMAL ? '' : ' x' + ammo[currentAmmo]);
  ctx.fillText(ammoText, 6, 52);

  // Charge bar
  if (player && player.charging && player.chargeTime > 0.15) {
    var cbX = 6, cbY = 56;
    ctx.fillStyle = '#222';
    ctx.fillRect(cbX, cbY, 40, 4);
    var chPct = Math.min(1, player.chargeTime / CHARGE_TIME_MAX);
    ctx.fillStyle = chPct >= 0.8 ? '#f4b41b' : AMMO_COLORS[currentAmmo];
    ctx.fillRect(cbX, cbY, 40 * chPct, 4);
    if (chPct >= 0.8) {
      ctx.fillStyle = '#fff';
      ctx.font = '7px monospace';
      ctx.fillText('MAX', cbX + 42, cbY + 4);
    }
  }

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.fillText(comboCount + 'x COMBO', GW - 6, 46);
    ctx.globalAlpha = 1;
  }

  // statB indicator (top right)
  ctx.fillStyle = statB.color;
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(statB.icon + ' ' + statB.name, GW - 6, 32);
  if (statB.level > 0) {
    ctx.fillStyle = '#aaaaaa';
    ctx.fillText('Lv.' + statB.level, GW - 6, 42);
  }

  // Stage intro overlay
  if (state === 'stageIntro') {
    ctx.fillStyle = '#000000cc';
    ctx.fillRect(0, GH / 2 - 30, GW, 60);
    // Decorative lines
    ctx.fillStyle = '#f4b41b40';
    ctx.fillRect(20, GH / 2 - 30, GW - 40, 1);
    ctx.fillRect(20, GH / 2 + 29, GW - 40, 1);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('STAGE ' + (stageNum + 1), GW / 2, GH / 2 - 8);
    ctx.fillStyle = '#a855f7';
    ctx.font = '10px monospace';
    ctx.fillText(STAGE_DEFS[stageNum].name, GW / 2, GH / 2 + 10);
    // Zone subtitle
    ctx.fillStyle = '#666';
    ctx.font = '8px monospace';
    ctx.fillText('A Baseling Tale', GW / 2, GH / 2 + 22);
  }
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stageNum + 1) + ' - ' + STAGE_DEFS[stageNum].name });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // Game rendering with shake
  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(Math.round(screenShakeX), Math.round(screenShakeY));

  drawBackground();
  drawEnvParticles();
  drawPlatforms();
  drawGrabPoints();
  drawHazards();
  drawCrates();
  drawDrops();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawBullets();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Dark garden background
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < 30; i++) {
    var twinkle = Math.sin(frame * 0.02 + i * 1.7) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(200,200,255,' + (twinkle * 0.5) + ')';
    ctx.fillRect((i * 53 + 10) % GW, (i * 37 + 5) % 100, 1, 1);
  }

  // Shadow forest silhouette
  for (var ci = 0; ci < 15; ci++) {
    var bx = ci * 30 - 10;
    var bh = 50 + (ci * 37 % 80);
    ctx.fillStyle = '#0f1118';
    ctx.fillRect(bx, GH - bh, 28, bh);
    // Bioluminescent spores
    ctx.fillStyle = '#38d97320';
    for (var wy = GH - bh + 8; wy < GH - 8; wy += 10) {
      if ((ci * 7 + wy) % 3 !== 0) ctx.fillRect(bx + 4, wy, 3, 3);
      if ((ci * 11 + wy) % 4 !== 0) ctx.fillRect(bx + 14, wy, 3, 3);
    }
  }

  // Glowing spore moon
  ctx.fillStyle = '#c4b5fd';
  ctx.beginPath();
  ctx.arc(300, 50, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1c2c';
  ctx.beginPath();
  ctx.arc(308, 45, 22, 0, Math.PI * 2);
  ctx.fill();
  // Moon glow
  ctx.globalAlpha = 0.1;
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(300, 50, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Baseling silhouette (detailed)
  var sy = 130 + Math.sin(frame * 0.03) * 5;
  // Mycelium cape
  ctx.fillStyle = '#2a1050';
  ctx.beginPath();
  ctx.moveTo(180, sy + 5);
  ctx.lineTo(162, sy + 38 + Math.sin(frame * 0.05) * 5);
  ctx.lineTo(170, sy + 35);
  ctx.lineTo(178, sy + 30);
  ctx.fill();
  // Body
  ctx.fillStyle = '#1a0830';
  ctx.fillRect(180, sy, 24, 40);
  // Fedora
  ctx.fillStyle = '#1a0830';
  ctx.fillRect(175, sy - 8, 28, 10);
  ctx.fillRect(180, sy - 12, 18, 6);
  // Fedora band
  ctx.fillStyle = '#2a1850';
  ctx.fillRect(176, sy - 2, 26, 2);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(190, sy + 2, 4, 3);
  // Eye glow
  ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04) * 0.15;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(188, sy + 1, 8, 5);
  ctx.globalAlpha = 1;

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('DARK SPORE', GW / 2 + 2, 50 + 2);
  ctx.fillStyle = '#7c3aed';
  ctx.fillText('DARK SPORE', GW / 2 + 1, 50 + 1);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('DARK SPORE', GW / 2, 50);
  // Title underline
  ctx.fillStyle = '#a855f740';
  ctx.fillRect(GW / 2 - 80, 55, 160, 2);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Tale', GW / 2, 70);

  // NFT stat display
  if (statB.level > 0 || statB.name !== 'Baseling') {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText(statB.icon + ' ' + statB.name + (statB.level > 0 ? ' Lv.' + statB.level : ''), GW / 2, 88);
  }

  // Controls (§7c: ARROWS move, WASD action cluster)
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS: Move | W: Jump | A: Shoot (hold=charge) | S: Ammo | D: Dash', GW / 2, GH - 49);
  ctx.fillText('HOLD W in air: Glide | W near hooks: Grab | UP: Shield', GW / 2, GH - 37);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 103);
  }

  // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT
  var _sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF'; ctx.textAlign = 'center'; ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, GH - 52);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 115;
    ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = GH - 44;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _yy + 3, 40 * Math.max(0.04, Math.min(1, _v/200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS JUMP OR SHOOT TO START', GW / 2, GH - 8);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Stars celebration
  for (var i = 0; i < 20; i++) {
    var sx = (frame * 0.5 + i * 47) % GW;
    var siy = (i * 37 + frame * 0.3) % GH;
    var twinkle = Math.sin(frame * 0.05 + i) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(56,217,115,' + (twinkle * 0.6) + ')';
    ctx.fillRect(sx, siy, 2, 2);
  }

  ctx.textAlign = 'center';
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('VICTORY!', GW / 2 + 2, 58);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('VICTORY!', GW / 2, 56);

  ctx.fillStyle = '#a855f7';
  ctx.font = '11px monospace';
  ctx.fillText('The fungal tide recedes. The garden is safe.', GW / 2, 85);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 120);

  // Stat bonuses summary
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '9px monospace';
    ctx.fillText(statB.icon + ' ' + statB.name + ' Lv.' + statB.level + ' bonuses applied', GW / 2, 140);
  }

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 158);
    ctx.globalAlpha = 1;
  }

  // Baseling celebration
  var bobY = 175 + Math.sin(frame * 0.04) * 4;
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(GW/2 - 12, bobY, 24, 30);
  // Cape flourish
  ctx.fillStyle = '#7c3aed';
  var capeBob = Math.sin(frame * 0.06) * 5;
  ctx.beginPath();
  ctx.moveTo(GW/2 - 12, bobY + 5);
  ctx.lineTo(GW/2 - 24 + capeBob, bobY + 28);
  ctx.lineTo(GW/2 - 8, bobY + 24);
  ctx.fill();
  ctx.fillStyle = '#332244';
  ctx.fillRect(GW/2 - 14, bobY - 8, 28, 10);
  ctx.fillRect(GW/2 - 10, bobY - 12, 20, 6);
  ctx.fillStyle = '#fff';
  ctx.fillRect(GW/2 + 2, bobY + 2, 4, 3);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 25);
  ctx.globalAlpha = 1;
}

// ============================================================
// START LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
