<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Garden Wars: Spore Civil War</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === BASELING STATS (BaselingPlayer.getMults — the single clamped source) ===
// The scaleX() helpers read D&D fields on statB; we synthesize them from the five
// bounded multipliers (tunnel-bug pattern) so every effect traces back to a clamped
// getMults() value. str<-damage, dex<-moveSpeed, con<-health, int/wis/cha<-luck;
// dnd(mult)=round(10+(mult-1)*20). Single-player strategy game -> default band.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#0052FF', name: 'Baseling', icon: 'B' };
var picking = false;   // character-select overlay open
var selName = 'WIMMPLE';
function dnd(x) { return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = TAS.player.mults();
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  selName = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  if (sel) statB.name = sel.charName;
}
// 5 canonical arcade stat bars centered at cx (display only).
function drawTitleStatBars(cx, topY, totalW) {
  if (!window.BaselingPlayer || !BaselingPlayer.getStats) return;
  var stats = BaselingPlayer.getStats();
  var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
  var bw = totalW / keys.length, x0 = cx - totalW / 2;
  ctx.font = '8px monospace';
  for (var i = 0; i < keys.length; i++) {
    var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
    ctx.fillStyle = mm.color; ctx.textAlign = 'center';
    ctx.fillText(mm.label, bx + bw / 2, topY);
    ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, topY + 3, bw - 6, 5);
    ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, topY + 3, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
  }
  ctx.textAlign = 'center';
}

// Stat scaling helpers (unchanged formulas; statB is now synthesized from getMults)
function strScale() { return 0.8 + (statB.str - 10) * 0.04; }    // STR -> unit attack damage
function dexScale() { return 0.8 + (statB.dex - 10) * 0.04; }    // DEX -> unit movement speed
function conScale() { return 0.8 + (statB.con - 10) * 0.04; }    // CON -> unit HP multiplier
function intScale() { return 0.8 + (statB.int - 10) * 0.03; }    // INT -> score multiplier & AI weakness
function wisScale() { return 0.8 + (statB.wis - 10) * 0.04; }    // WIS -> ability cooldown reduction
function chaScale() { return 0.8 + (statB.cha - 10) * 0.03; }    // CHA -> recruit bonus & luck
function statRecruitBonus() { return statB.cha >= 15 ? 1 : 0; }   // CHA 15+ = +1 recruit per buy
function statLuckBonus() { return Math.max(0, (statB.luck - 1) * 0.05 + (statB.cha - 10) * 0.02); } // luck for crits
function statScoreMult() { return statB.scoreMult * intScale(); }  // INT boosts score

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'SWAP', c: 'PICK' } });

// Boot the player module (silent) + recompute stats once it resolves.
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[north-south-war] player init failed:', e && e.message); });
}

// === GAME STATES ===
let state = 'title'; // title, tutorial, setup, strategic, battle, siege, boss, victory, gameover
let frame = 0;
let difficulty = 1; // 0=easy, 1=medium, 2=hard
let twoPlayer = false;
let currentPlayer = 0; // 0=Spore(green), 1=Reactor(red)
let turnNumber = 1;
let selectedTerritory = -1;
let moveTarget = -1;
let weatherEvent = ''; // '', 'storm', 'drought', 'spore_bloom', 'compost_eruption'
let weatherTimer = 0;
let menuChoice = 0;
let reinforceMode = false;
let message = '';
let messageTimer = 0;
let totalScore = 0;
let showTutorial = false;
let tutorialPage = 0;

// === SCORE POPUPS ===
let scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.5, vy: -40 });
}

// === CAMPAIGN SAVE ===
const SAVE_KEY = 'nswar_campaign';

function saveCampaign() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      territories: territories.map(function(t) { return { owner: t.owner, army: t.army }; }),
      gold: gold.slice(),
      turnNumber: turnNumber, currentPlayer: currentPlayer, difficulty: difficulty,
      totalScore: totalScore
    }));
  } catch(e) { console.error('Save failed:', e); }
}

function loadCampaign() {
  try {
    var d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!d) return false;
    for (var i = 0; i < 12; i++) {
      territories[i].owner = d.territories[i].owner;
      territories[i].army = d.territories[i].army;
    }
    gold = d.gold;
    turnNumber = d.turnNumber;
    currentPlayer = d.currentPlayer;
    difficulty = d.difficulty;
    totalScore = d.totalScore || 0;
    return true;
  } catch(e) { return false; }
}

// === TERRITORY MAP (Pass 2: Tasern Factions - Spore vs Reactor) ===
// 12 territories arranged in a continent shape (3 rows of 4)
var territories = [
  // Row 1 (north) - Blight-held scorched highlands
  { name: 'Blightspore Peak', cx: 80,  cy: 55,  owner: 1, army: 4, hasFort: true,  income: 3, adjacent: [1, 4], terrain: 'volcanic' },
  { name: 'Rot Hollow',       cx: 180, cy: 50,  owner: 1, army: 3, hasFort: false, income: 2, adjacent: [0, 2, 4, 5], terrain: 'scorched' },
  { name: 'Mold Furnace',     cx: 290, cy: 50,  owner: 1, army: 3, hasFort: false, income: 2, adjacent: [1, 3, 5, 6], terrain: 'industrial' },
  { name: 'Toxin Forge',      cx: 400, cy: 55,  owner: 1, army: 4, hasFort: true,  income: 3, adjacent: [2, 6, 7], terrain: 'volcanic' },
  // Row 2 (middle) - contested garden borderlands
  { name: 'Mycelium Woods',   cx: 70,  cy: 155, owner: 0, army: 3, hasFort: false, income: 2, adjacent: [0, 1, 5, 8], terrain: 'forest' },
  { name: 'Spore Plateau',    cx: 185, cy: 150, owner: -1, army: 0, hasFort: false, income: 4, adjacent: [1, 2, 4, 6, 8, 9], terrain: 'hazard' },
  { name: 'Compost Breach',   cx: 305, cy: 150, owner: -1, army: 0, hasFort: false, income: 4, adjacent: [2, 3, 5, 7, 9, 10], terrain: 'hazard' },
  { name: 'Fungal Gate',      cx: 415, cy: 155, owner: 1, army: 3, hasFort: false, income: 2, adjacent: [3, 6, 10, 11], terrain: 'scorched' },
  // Row 3 (south) - Mycelium-held garden lowlands
  { name: 'Mushroom Marsh',   cx: 80,  cy: 245, owner: 0, army: 4, hasFort: true,  income: 3, adjacent: [4, 5, 9], terrain: 'swamp' },
  { name: 'Garden Fields',    cx: 190, cy: 250, owner: 0, army: 3, hasFort: false, income: 2, adjacent: [5, 6, 8, 10], terrain: 'fungal' },
  { name: 'POOP Flats',       cx: 310, cy: 250, owner: 0, army: 3, hasFort: false, income: 2, adjacent: [6, 7, 9, 11], terrain: 'scorched' },
  { name: 'Sporeling Crater', cx: 420, cy: 245, owner: 0, army: 4, hasFort: true,  income: 3, adjacent: [7, 10], terrain: 'fungal' }
];

var TERR_RADIUS = 45;

// Gold per faction
var gold = [10, 10];

// Train state
var train = { from: -1, to: -1, progress: 0, gold: 3, active: false };
var trainRoutes = [[0,1],[1,2],[2,3],[4,5],[5,6],[6,7],[8,9],[9,10],[10,11]];

// === BATTLE STATE ===
var battle = {
  attacker: 0, defender: 1,
  attackerArmy: 0, defenderArmy: 0,
  attackerTerr: -1, defenderTerr: -1,
  units: [], enemyUnits: [],
  activeUnit: 0,
  cannonAngle: 45,
  battleTimer: 0,
  terrain: [],
  result: '',
  battlefieldType: 'plains', // plains, volcanic, fungal, swamp, industrial
  bossActive: false,
  boss: null
};

// === SIEGE STATE ===
var siege = {
  player: { x: 20, y: 0, vy: 0, facing: 1, hp: 3, attacking: false, atkTimer: 0 },
  enemies: [],
  traps: [],
  screen: 0,
  timer: 30,
  flagX: 440,
  result: ''
};

// === COLORS (Pass 2: Spore vs Reactor themes) ===
var FACTION_COLORS = ['#38d973', '#e6482e']; // Mycelium green, Blight red
var FACTION_LIGHT = ['#55cc77', '#ee6655'];
var FACTION_DARK = ['#227744', '#992222'];
var FACTION_NAMES = ['Mycelium', 'Blight'];

// === TERRAIN HAZARD COLORS ===
var TERRAIN_COLORS = {
  volcanic: '#7a444a', scorched: '#5a3a3a', industrial: '#2a2a3c',
  forest: '#1a3a1a', hazard: '#4a3a1a', swamp: '#1a2a1a',
  fungal: '#2a1a3c', plains: '#1a2a1a'
};

// === PARALLAX STARS (Pass 3) ===
var bgStars = [];
for (var si = 0; si < 40; si++) {
  bgStars.push({ x: Math.random() * GW, y: Math.random() * 120, s: 0.5 + Math.random() * 1.5, sp: 0.1 + Math.random() * 0.3 });
}

// === HELPER FUNCTIONS ===
function anyKey() {
  return Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b;
}

function keyJustPressed(code) {
  return TAS.input.keys[code];
}

function showMessage(msg, dur) {
  message = msg;
  messageTimer = dur || 2;
}

function getTerrAtPos(mx, my) {
  for (var i = 0; i < 12; i++) {
    var t = territories[i];
    var dx = mx - t.cx, dy = my - t.cy;
    if (dx * dx + dy * dy < TERR_RADIUS * TERR_RADIUS) return i;
  }
  return -1;
}

function calcIncome(player) {
  var inc = 0;
  for (var i = 0; i < territories.length; i++) {
    if (territories[i].owner === player) inc += territories[i].income;
  }
  // INT boosts income for player 0 (human)
  if (player === 0) inc = Math.floor(inc * (1 + (statB.int - 10) * 0.02));
  return inc;
}

function countTerritories(player) {
  var c = 0;
  for (var i = 0; i < territories.length; i++) if (territories[i].owner === player) c++;
  return c;
}

function countForts(player) {
  var c = 0;
  for (var i = 0; i < territories.length; i++) if (territories[i].owner === player && territories[i].hasFort) c++;
  return c;
}

function checkVictory() {
  var f0 = countForts(0), f1 = countForts(1);
  var t0 = countTerritories(0), t1 = countTerritories(1);
  if (t1 === 0 || f1 === 0) return 0;
  if (t0 === 0 || f0 === 0) return 1;
  return -1;
}

// === MOUSE/CLICK ===
var mouseX = GW / 2, mouseY = GH / 2;
var clicked = false;
var clickX = 0, clickY = 0;

TAS.canvas.addEventListener('mousedown', function(e) {
  var rect = TAS.canvas.getBoundingClientRect();
  var sx = (TAS.canvas.width / (window.devicePixelRatio || 1)) / rect.width;
  var sy = (TAS.canvas.height / (window.devicePixelRatio || 1)) / rect.height;
  clickX = (e.clientX - rect.left) * sx;
  clickY = (e.clientY - rect.top) * sy;
  clicked = true;
  TAS.audio.ensureAudio();
});

TAS.canvas.addEventListener('mousemove', function(e) {
  var rect = TAS.canvas.getBoundingClientRect();
  var sx = (TAS.canvas.width / (window.devicePixelRatio || 1)) / rect.width;
  var sy = (TAS.canvas.height / (window.devicePixelRatio || 1)) / rect.height;
  mouseX = (e.clientX - rect.left) * sx;
  mouseY = (e.clientY - rect.top) * sy;
});

TAS.canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length > 0) {
    var rect = TAS.canvas.getBoundingClientRect();
    var sx = (TAS.canvas.width / (window.devicePixelRatio || 1)) / rect.width;
    var sy = (TAS.canvas.height / (window.devicePixelRatio || 1)) / rect.height;
    clickX = (e.touches[0].clientX - rect.left) * sx;
    clickY = (e.touches[0].clientY - rect.top) * sy;
    clicked = true;
    mouseX = clickX;
    mouseY = clickY;
  }
}, { passive: true });

// === KEYBOARD DEBOUNCE ===
var prevKeys = {};
function keyPressed(k) {
  var down = TAS.input.keys[k];
  var was = prevKeys[k];
  return down && !was;
}
function updatePrevKeys() {
  for (var k in TAS.input.keys) prevKeys[k] = TAS.input.keys[k];
}

// === START NEW GAME ===
function startNewGame() {
  territories[0].owner = 1; territories[0].army = 4;
  territories[1].owner = 1; territories[1].army = 3;
  territories[2].owner = 1; territories[2].army = 3;
  territories[3].owner = 1; territories[3].army = 4;
  territories[4].owner = 0; territories[4].army = 3 + statRecruitBonus(); // CHA bonus
  territories[5].owner = -1; territories[5].army = 0;
  territories[6].owner = -1; territories[6].army = 0;
  territories[7].owner = 1; territories[7].army = 3;
  territories[8].owner = 0; territories[8].army = 4 + statRecruitBonus(); // CHA bonus
  territories[9].owner = 0; territories[9].army = 3;
  territories[10].owner = 0; territories[10].army = 3;
  territories[11].owner = 0; territories[11].army = 4;
  gold = [10 + Math.floor(statB.cha * 0.3), 10]; // CHA starting gold bonus
  turnNumber = 1;
  currentPlayer = 0;
  selectedTerritory = -1;
  moveTarget = -1;
  weatherEvent = '';
  weatherTimer = 0;
  reinforceMode = false;
  train.active = false;
  totalScore = 0;
  state = 'strategic';
  showMessage('Your baseling army marches! Select a garden territory.', 3);
}

// === AI TURN ===
function doAITurn() {
  var player = currentPlayer;
  // Buy reinforcements with gold
  while (gold[player] >= 5) {
    var best = -1, bestScore = -1;
    for (var i = 0; i < 12; i++) {
      var t = territories[i];
      if (t.owner !== player) continue;
      var threat = 0;
      for (var a = 0; a < t.adjacent.length; a++) {
        var adj = t.adjacent[a];
        if (territories[adj].owner !== player && territories[adj].owner !== -1) threat += territories[adj].army;
      }
      var score = threat + (t.hasFort ? 2 : 0) + Math.random() * 3;
      // INT makes AI slightly weaker (player's strategic advantage)
      score -= (statB.int - 10) * 0.15;
      if (score > bestScore) { bestScore = score; best = i; }
    }
    if (best >= 0) {
      territories[best].army += 1;
      gold[player] -= 5;
    } else break;
  }

  // Move: find best attack or reinforce
  var moved = false;
  var attempts = 0;
  while (!moved && attempts < 20) {
    attempts++;
    var fromIdx = -1, toIdx = -1, bestVal = -1;
    for (var i2 = 0; i2 < 12; i2++) {
      var t2 = territories[i2];
      if (t2.owner !== player || t2.army <= 1) continue;
      for (var a2 = 0; a2 < t2.adjacent.length; a2++) {
        var adj2 = t2.adjacent[a2];
        var target = territories[adj2];
        var val = 0;
        if (target.owner !== player && target.owner !== -1) {
          val = 10 + target.income + (target.hasFort ? 3 : 0) - target.army;
          val += (difficulty + 1) * 2;
        } else if (target.owner === -1) {
          val = 8 + target.income;
        } else {
          var hasEnemy = false;
          for (var a3 = 0; a3 < target.adjacent.length; a3++) {
            if (territories[target.adjacent[a3]].owner !== player && territories[target.adjacent[a3]].owner !== -1) hasEnemy = true;
          }
          if (hasEnemy && target.army < t2.army) val = 3;
        }
        val += Math.random() * 3;
        if (val > bestVal) { bestVal = val; fromIdx = i2; toIdx = adj2; }
      }
    }
    if (fromIdx >= 0 && toIdx >= 0 && bestVal > 3) {
      var tgt = territories[toIdx];
      if (tgt.owner === player) {
        tgt.army += territories[fromIdx].army - 1;
        territories[fromIdx].army = 1;
        moved = true;
      } else if (tgt.owner === -1) {
        tgt.owner = player;
        tgt.army = territories[fromIdx].army - 1;
        territories[fromIdx].army = 1;
        moved = true;
      } else {
        battle.attacker = player;
        battle.defender = tgt.owner;
        battle.attackerArmy = territories[fromIdx].army - 1;
        battle.defenderArmy = tgt.army + (tgt.hasFort ? 2 : 0);
        battle.attackerTerr = fromIdx;
        battle.defenderTerr = toIdx;
        territories[fromIdx].army = 1;
        var atkPower = battle.attackerArmy * (1 + difficulty * 0.15);
        var defPower = battle.defenderArmy * conScale(); // CON helps defense
        if (atkPower > defPower * 0.8) {
          tgt.owner = player;
          tgt.army = Math.max(1, Math.floor(battle.attackerArmy - defPower * 0.5));
          showMessage(FACTION_NAMES[player] + ' overruns ' + tgt.name + '!', 2);
        } else {
          tgt.army = Math.max(1, Math.floor(battle.defenderArmy - battle.attackerArmy * 0.5));
          showMessage(FACTION_NAMES[player] + ' withered at ' + tgt.name + '!', 2);
          totalScore += Math.floor(20 * statScoreMult()); // INT-boosted score for defense
          addScorePopup(tgt.cx, tgt.cy - 20, '+' + Math.floor(20 * statScoreMult()), '#38d973');
        }
        moved = true;
      }
    } else {
      moved = true;
    }
  }
}

function endTurn() {
  gold[currentPlayer] += calcIncome(currentPlayer);

  var winner = checkVictory();
  if (winner >= 0) {
    state = winner === 0 ? 'victory' : 'gameover';
    if (winner === 0) totalScore += Math.floor(500 * statScoreMult());
    TAS.audio.playTone(winner === 0 ? 440 : 220, 0.5, 'square', 0.1);
    return;
  }

  currentPlayer = 1 - currentPlayer;
  if (currentPlayer === 0) turnNumber++;
  selectedTerritory = -1;
  moveTarget = -1;
  reinforceMode = false;

  // Weather (expanded with Tasern events)
  if (Math.random() < 0.12 && weatherTimer <= 0) {
    var roll = Math.random();
    if (roll < 0.3) {
      weatherEvent = 'storm';
      showMessage('POOP STORM -- no movement this turn!', 3);
    } else if (roll < 0.55) {
      weatherEvent = 'drought';
      showMessage('GARDEN DROUGHT -- reduced seed income!', 3);
    } else if (roll < 0.8) {
      weatherEvent = 'spore_bloom';
      showMessage('MYCELIUM BLOOM -- your baselings heal! WIS: ' + statB.wis, 3);
    } else {
      weatherEvent = 'compost_eruption';
      showMessage('COMPOST ERUPTION -- hazard zones deal damage!', 3);
    }
    weatherTimer = 2;
  } else if (weatherTimer > 0) {
    weatherTimer--;
    if (weatherTimer <= 0) {
      weatherEvent = '';
      showMessage('The garden air clears.', 2);
    }
  }

  // Train
  if (!train.active && Math.random() < 0.25) {
    var route = trainRoutes[TAS.math.randInt(0, trainRoutes.length - 1)];
    train.from = route[0];
    train.to = route[1];
    train.progress = 0;
    train.gold = TAS.math.randInt(2, 5);
    train.active = true;
  }

  // AI turn
  if (!twoPlayer && currentPlayer === 1) {
    setTimeout(function() {
      doAITurn();
      endTurn();
    }, 800);
  } else {
    showMessage(FACTION_NAMES[currentPlayer] + ' turn ' + turnNumber, 2);
  }

  saveCampaign();
}

// === BATTLE INIT (Pass 2: new unit types) ===
function initBattle(attackerTerr, defenderTerr) {
  var at = territories[attackerTerr];
  var dt = territories[defenderTerr];

  battle.attacker = at.owner;
  battle.defender = dt.owner;
  battle.attackerArmy = at.army - 1;
  battle.defenderArmy = dt.army + (dt.hasFort ? 2 : 0);
  battle.attackerTerr = attackerTerr;
  battle.defenderTerr = defenderTerr;
  at.army = 1;
  battle.battlefieldType = dt.terrain || 'plains';

  battle.units = [];
  battle.enemyUnits = [];
  battle.activeUnit = 0;
  battle.cannonAngle = 45;
  battle.battleTimer = 0;
  battle.result = '';
  battle.bossActive = false;
  battle.boss = null;

  // Player units (Spore faction types) -- STR/DEX/CON applied
  var atkCount = battle.attackerArmy;
  var baseHP = Math.ceil(3 * conScale()); // CON -> HP
  for (var i = 0; i < Math.min(atkCount, 3); i++) {
    battle.units.push({
      type: 'infantry', x: 30 + i * 20, y: 230,
      hp: baseHP, maxHp: baseHP, vx: 0, attacking: false, atkCd: 0
    });
  }
  if (atkCount > 3) {
    // Sporewalker (shaman-type, WIS-based healing aura)
    var shamanHP = Math.ceil(2 * conScale());
    battle.units.push({
      type: 'shaman', x: 15, y: 210,
      hp: shamanHP, maxHp: shamanHP, healCd: 3 * wisScale(), healRadius: 60
    });
  }
  if (atkCount > 4) {
    battle.units.push({
      type: 'cavalry', x: 10, y: 230,
      hp: Math.ceil(2 * conScale()), maxHp: Math.ceil(2 * conScale()),
      vx: 0, charging: false, chargeCd: Math.floor(60 * wisScale()) // WIS -> cooldowns
    });
  }
  if (atkCount > 5) {
    battle.units.push({
      type: 'cannon', x: 20, y: 200,
      hp: Math.ceil(2 * conScale()), maxHp: Math.ceil(2 * conScale()),
      angle: 45, shells: []
    });
  }

  // Enemy units (Reactor faction types)
  var defCount = battle.defenderArmy;
  for (var j = 0; j < Math.min(defCount, 3); j++) {
    battle.enemyUnits.push({
      type: 'infantry', x: 420 - j * 20, y: 230,
      hp: 3, maxHp: 3, vx: 0, attacking: false, atkCd: 0
    });
  }
  if (defCount > 3) {
    // Flame Knight (heavy melee)
    battle.enemyUnits.push({
      type: 'flame_knight', x: 440, y: 230,
      hp: 5, maxHp: 5, vx: 0, atkCd: 0, enraged: false
    });
  }
  if (defCount > 4) {
    battle.enemyUnits.push({
      type: 'cavalry', x: 460, y: 230,
      hp: 2, maxHp: 2, vx: 0, charging: false,
      chargeCd: TAS.math.randInt(60, 120)
    });
  }
  if (defCount > 5) {
    battle.enemyUnits.push({
      type: 'cannon', x: 450, y: 200,
      hp: 2, maxHp: 2, angle: 135, shells: []
    });
  }

  // Boss battle trigger: every 4 turns on hard, or when attacking a fort
  if ((turnNumber > 0 && turnNumber % 4 === 0 && difficulty >= 2) || dt.hasFort) {
    battle.bossActive = true;
    battle.boss = {
      type: dt.terrain === 'volcanic' ? 'molten_golem' : 'spore_titan',
      x: 360, y: 200, hp: 12 + difficulty * 4, maxHp: 12 + difficulty * 4,
      phase: 0, atkCd: 2, moveTimer: 0, enraged: false
    };
  }

  // Terrain features (themed by battlefield)
  battle.terrain = [];
  if (battle.battlefieldType === 'volcanic' || battle.battlefieldType === 'scorched') {
    battle.terrain.push({ type: 'lava_pool', x: TAS.math.randInt(150, 320), w: 40 });
    if (Math.random() > 0.4) battle.terrain.push({ type: 'hill', x: TAS.math.randInt(200, 350), w: 50, h: 18 });
  } else if (battle.battlefieldType === 'fungal' || battle.battlefieldType === 'swamp') {
    battle.terrain.push({ type: 'spore_cloud', x: TAS.math.randInt(160, 300), w: 50 });
    if (Math.random() > 0.5) battle.terrain.push({ type: 'river', x: TAS.math.randInt(180, 280), w: 30 });
  } else if (battle.battlefieldType === 'industrial') {
    battle.terrain.push({ type: 'barricade', x: TAS.math.randInt(180, 300), w: 20, h: 30 });
  } else {
    if (Math.random() > 0.4) battle.terrain.push({ type: 'hill', x: TAS.math.randInt(150, 320), w: 60, h: 20 });
    if (Math.random() > 0.5) battle.terrain.push({ type: 'river', x: TAS.math.randInt(180, 280), w: 30 });
  }

  state = 'battle';
  TAS.audio.playTone(220, 0.3, 'sawtooth', 0.08);
}

// === SIEGE INIT ===
function initSiege(attackerTerr, defenderTerr) {
  var sHP = 3 + statB.lives + Math.floor((statB.con - 10) * 0.2); // CON + lives bonus
  siege.player = { x: 20, y: 240, vy: 0, facing: 1, hp: sHP, maxHp: sHP, attacking: false, atkTimer: 0, grounded: true };
  siege.enemies = [];
  siege.traps = [];
  siege.screen = 0;
  siege.timer = 30 + Math.floor(statB.wis * 0.3); // WIS extends timer
  siege.flagX = 440;
  siege.result = '';
  battle.attackerTerr = attackerTerr;
  battle.defenderTerr = defenderTerr;
  battle.attacker = territories[attackerTerr].owner;
  battle.defender = territories[defenderTerr].owner;
  battle.attackerArmy = territories[attackerTerr].army - 1;
  battle.defenderArmy = territories[defenderTerr].army + 2;
  territories[attackerTerr].army = 1;

  generateSiegeScreen(0);
  state = 'siege';
  TAS.audio.playTone(330, 0.2, 'square', 0.08);
}

function generateSiegeScreen(scr) {
  siege.enemies = [];
  siege.traps = [];
  var count = 2 + scr + difficulty;
  for (var i = 0; i < count; i++) {
    var etype = (scr >= 2 && i === count - 1) ? 'heavy' : 'normal';
    siege.enemies.push({
      x: 120 + i * (300 / count),
      y: 240,
      hp: etype === 'heavy' ? 3 + difficulty : 1 + Math.floor(scr / 2),
      maxHp: etype === 'heavy' ? 3 + difficulty : 1 + Math.floor(scr / 2),
      dir: Math.random() > 0.5 ? 1 : -1,
      speed: 0.5 + difficulty * 0.3 + scr * 0.2,
      atkCd: 0,
      type: etype
    });
  }
  if (scr > 0) {
    for (var j = 0; j < scr; j++) {
      var tx = 150 + j * 100 + TAS.math.randInt(-20, 20);
      siege.traps.push({
        type: Math.random() > 0.5 ? 'spikes' : 'rocks',
        x: tx, y: siege.traps.length % 2 === 0 ? 240 : 100,
        active: true, timer: TAS.math.randInt(60, 180)
      });
    }
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (messageTimer > 0) messageTimer -= dt;

  // Update score popups
  for (var sp = scorePopups.length - 1; sp >= 0; sp--) {
    scorePopups[sp].y += scorePopups[sp].vy * dt;
    scorePopups[sp].life -= dt;
    if (scorePopups[sp].life <= 0) scorePopups.splice(sp, 1);
  }

  if (state === 'title') {
    updateTitle(dt);
  } else if (state === 'tutorial') {
    updateTutorial(dt);
  } else if (state === 'strategic') {
    updateStrategic(dt);
  } else if (state === 'battle') {
    updateBattle(dt);
  } else if (state === 'siege') {
    updateSiege(dt);
  } else if (state === 'victory' || state === 'gameover') {
    if (anyKey() && frame > 60) {
      state = 'title';
      frame = 0;
      try { localStorage.removeItem(SAVE_KEY); } catch(e) { console.error('Clear save failed:', e); }
    }
  }

  clicked = false;
  updatePrevKeys();
}

function updateTitle(dt) {
  if (picking) return;   // picker overlay open — swallow menu input
  if (keyPressed('c') || keyPressed('C') || keyPressed('KeyC') || TAS.input.touch.c) {
    TAS.input.touch.c = false;
    picking = true;
    TAS.player.select(function () { recomputeStats(); picking = false; });
    return;
  }
  if (keyPressed('ArrowUp') || keyPressed('w')) {
    menuChoice = (menuChoice - 1 + 5) % 5;
    TAS.audio.playTone(330, 0.05, 'square', 0.05);
  }
  if (keyPressed('ArrowDown') || keyPressed('s')) {
    menuChoice = (menuChoice + 1) % 5;
    TAS.audio.playTone(330, 0.05, 'square', 0.05);
  }
  if (keyPressed('Enter') || keyPressed(' ') || TAS.input.touch.a) {
    TAS.audio.playTone(440, 0.1, 'square', 0.08);
    if (menuChoice === 0) { difficulty = 0; twoPlayer = false; startNewGame(); }
    else if (menuChoice === 1) { difficulty = 1; twoPlayer = false; startNewGame(); }
    else if (menuChoice === 2) { difficulty = 2; twoPlayer = false; startNewGame(); }
    else if (menuChoice === 3) { difficulty = 1; twoPlayer = true; startNewGame(); }
    else if (menuChoice === 4) { state = 'tutorial'; tutorialPage = 0; }
  }
  if (clicked) {
    var my = clickY;
    if (my > 150 && my < 170) { menuChoice = 0; difficulty = 0; twoPlayer = false; startNewGame(); }
    else if (my > 174 && my < 194) { menuChoice = 1; difficulty = 1; twoPlayer = false; startNewGame(); }
    else if (my > 198 && my < 218) { menuChoice = 2; difficulty = 2; twoPlayer = false; startNewGame(); }
    else if (my > 222 && my < 242) { menuChoice = 3; difficulty = 1; twoPlayer = true; startNewGame(); }
    else if (my > 246 && my < 266) { menuChoice = 4; state = 'tutorial'; tutorialPage = 0; }
  }
}

// === TUTORIAL (Pass 3) ===
function updateTutorial(dt) {
  if (keyPressed('ArrowRight') || keyPressed('d') || keyPressed(' ') || keyPressed('Enter') || TAS.input.touch.a) {
    tutorialPage++;
    if (tutorialPage >= 4) { state = 'title'; tutorialPage = 0; }
    TAS.audio.playTone(440, 0.05, 'square', 0.04);
  }
  if (keyPressed('ArrowLeft') || keyPressed('a')) {
    if (tutorialPage > 0) tutorialPage--;
    TAS.audio.playTone(330, 0.05, 'square', 0.04);
  }
  if (keyPressed('Escape')) { state = 'title'; }
  if (clicked) {
    tutorialPage++;
    if (tutorialPage >= 4) { state = 'title'; tutorialPage = 0; }
  }
}

function updateStrategic(dt) {
  if (train.active) {
    train.progress += dt * 0.3;
    if (train.progress >= 1) train.active = false;
  }

  if (clicked) {
    var ti = getTerrAtPos(clickX, clickY);

    if (clickX > 390 && clickX < 470 && clickY > 290 && clickY < 312) {
      TAS.audio.playTone(330, 0.08, 'square', 0.06);
      endTurn();
      return;
    }

    if (clickX > 300 && clickX < 380 && clickY > 290 && clickY < 312 && gold[currentPlayer] >= 5) {
      reinforceMode = !reinforceMode;
      TAS.audio.playTone(440, 0.05, 'square', 0.05);
      if (reinforceMode) showMessage('Click a garden to reinforce (+1 sporelings, 5 seeds)', 3);
      return;
    }

    if (train.active && ti >= 0) {
      var fromT = territories[train.from];
      var toT = territories[train.to];
      var trainX = TAS.math.lerp(fromT.cx, toT.cx, train.progress);
      var trainY = TAS.math.lerp(fromT.cy, toT.cy, train.progress);
      if (TAS.math.dist(clickX, clickY, trainX, trainY) < 20 && territories[ti].owner === currentPlayer) {
        var trainGold = train.gold + Math.floor(statB.cha * 0.1); // CHA bonus seeds
        gold[currentPlayer] += trainGold;
        train.active = false;
        showMessage('+' + trainGold + ' seeds from spore caravan!', 2);
        addScorePopup(trainX, trainY - 20, '+' + trainGold + 's', '#f4b41b');
        TAS.audio.playTone(660, 0.15, 'square', 0.08);
        return;
      }
    }

    if (ti < 0) {
      selectedTerritory = -1;
      reinforceMode = false;
      return;
    }

    if (reinforceMode && territories[ti].owner === currentPlayer && gold[currentPlayer] >= 5) {
      var recruits = 1 + statRecruitBonus(); // CHA 15+ = +1
      territories[ti].army += recruits;
      gold[currentPlayer] -= 5;
      TAS.audio.playTone(550, 0.1, 'square', 0.06);
      showMessage(territories[ti].name + ' sprouted reinforcements! (+' + recruits + ')', 1.5);
      addScorePopup(territories[ti].cx, territories[ti].cy - 30, '+' + recruits, FACTION_COLORS[currentPlayer]);
      TAS.particles.spawn(territories[ti].cx, territories[ti].cy, FACTION_COLORS[currentPlayer], 8, 2);
      if (gold[currentPlayer] < 5) reinforceMode = false;
      return;
    }

    reinforceMode = false;

    if (selectedTerritory < 0) {
      if (territories[ti].owner === currentPlayer && territories[ti].army > 1) {
        selectedTerritory = ti;
        TAS.audio.playTone(440, 0.05, 'square', 0.04);
      }
    } else {
      var src = territories[selectedTerritory];
      if (ti === selectedTerritory) {
        selectedTerritory = -1;
        return;
      }
      if (src.adjacent.indexOf(ti) === -1) {
        showMessage('Not adjacent!', 1.5);
        selectedTerritory = -1;
        return;
      }
      if (weatherEvent === 'storm') {
        showMessage('POOP storm blocks movement!', 1.5);
        selectedTerritory = -1;
        return;
      }

      var target = territories[ti];
      if (target.owner === currentPlayer) {
        target.army += src.army - 1;
        src.army = 1;
        selectedTerritory = -1;
        TAS.audio.playTone(330, 0.08, 'square', 0.05);
        endTurn();
      } else if (target.owner === -1) {
        target.owner = currentPlayer;
        target.army = src.army - 1;
        src.army = 1;
        selectedTerritory = -1;
        showMessage(target.name + ' colonized by spores!', 2);
        totalScore += Math.floor(30 * statScoreMult());
        addScorePopup(target.cx, target.cy - 30, '+' + Math.floor(30 * statScoreMult()), '#38d973');
        TAS.audio.playTone(550, 0.15, 'square', 0.08);
        TAS.particles.spawn(target.cx, target.cy, FACTION_COLORS[currentPlayer], 12, 3);
        endTurn();
      } else {
        if (target.hasFort) {
          initSiege(selectedTerritory, ti);
        } else {
          initBattle(selectedTerritory, ti);
        }
        selectedTerritory = -1;
      }
    }
  }

  if (keyPressed('e') || keyPressed('E')) endTurn();
  if (keyPressed('r') || keyPressed('R')) {
    if (gold[currentPlayer] >= 5) {
      reinforceMode = !reinforceMode;
      if (reinforceMode) showMessage('Click a garden to spawn sporelings', 2);
    }
  }
}

function updateBattle(dt) {
  battle.battleTimer += dt;

  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  if (battle.units.length > 0) {
    var active = battle.units[battle.activeUnit % battle.units.length];

    if (active) {
      var moveSpeed = 80 * dexScale(); // DEX -> speed
      if (active.type === 'infantry') {
        if (keys['ArrowLeft'] || keys['a'] || touch.left) active.x -= moveSpeed * dt;
        if (keys['ArrowRight'] || keys['d'] || touch.right) active.x += moveSpeed * dt;
        if ((keys[' '] || keys['z'] || touch.a) && active.atkCd <= 0) {
          active.attacking = true;
          active.atkCd = 0.5 * wisScale(); // WIS -> faster cooldown
          TAS.audio.playTone(200, 0.08, 'sawtooth', 0.06);
        }
      } else if (active.type === 'shaman') {
        // Shaman: move and heal nearby allies
        if (keys['ArrowLeft'] || keys['a'] || touch.left) active.x -= moveSpeed * 0.7 * dt;
        if (keys['ArrowRight'] || keys['d'] || touch.right) active.x += moveSpeed * 0.7 * dt;
        if (active.healCd <= 0) {
          // Auto-heal nearby allies
          for (var hi = 0; hi < battle.units.length; hi++) {
            var hu = battle.units[hi];
            if (hu !== active && Math.abs(hu.x - active.x) < active.healRadius && hu.hp < hu.maxHp) {
              hu.hp = Math.min(hu.maxHp, hu.hp + 1);
              TAS.particles.spawn(hu.x, hu.y - 10, '#44ffaa', 5, 2);
              addScorePopup(hu.x, hu.y - 30, '+1HP', '#44ffaa');
            }
          }
          active.healCd = 3 * wisScale();
          TAS.audio.playTone(550, 0.1, 'sine', 0.06);
        }
        active.healCd -= dt;
      } else if (active.type === 'cannon') {
        if (keys['ArrowUp'] || keys['w'] || touch.up) battle.cannonAngle = Math.max(20, battle.cannonAngle - 60 * dt);
        if (keys['ArrowDown'] || keys['s'] || touch.down) battle.cannonAngle = Math.min(70, battle.cannonAngle + 60 * dt);
        if ((keys[' '] || keys['z'] || touch.a) && active.shells.length < 3) {
          var rad = battle.cannonAngle * Math.PI / 180;
          active.shells.push({ x: active.x + 10, y: active.y - 10, vx: Math.cos(rad) * 200, vy: -Math.sin(rad) * 200 });
          TAS.audio.playNoise(0.2, 0.1, 800);
        }
      }
      if (active.type === 'cavalry') {
        if (active.chargeCd > 0) active.chargeCd -= dt * 60;
        if (!active.charging && active.chargeCd <= 0) {
          active.charging = true;
          active.vx = 150 * dexScale(); // DEX -> charge speed
        }
      }
    }

    if (keyPressed('b') || keyPressed('x') || TAS.input.touch.b) {
      battle.activeUnit = (battle.activeUnit + 1) % battle.units.length;
      TAS.audio.playTone(550, 0.05, 'square', 0.04);
    }
  }

  // Hazard terrain damage
  for (var ht = 0; ht < battle.terrain.length; ht++) {
    var hazTerr = battle.terrain[ht];
    if (hazTerr.type === 'lava_pool') {
      // Damage units standing in lava
      for (var lu = battle.units.length - 1; lu >= 0; lu--) {
        if (battle.units[lu].x > hazTerr.x && battle.units[lu].x < hazTerr.x + hazTerr.w && frame % 60 === 0) {
          battle.units[lu].hp -= 1;
          addScorePopup(battle.units[lu].x, battle.units[lu].y - 20, 'BURN!', '#ff4400');
          TAS.particles.spawn(battle.units[lu].x, battle.units[lu].y, '#ff6600', 4, 1);
        }
      }
      for (var le = battle.enemyUnits.length - 1; le >= 0; le--) {
        if (battle.enemyUnits[le].x > hazTerr.x && battle.enemyUnits[le].x < hazTerr.x + hazTerr.w && frame % 60 === 0) {
          battle.enemyUnits[le].hp -= 1;
        }
      }
    }
    if (hazTerr.type === 'spore_cloud' && weatherEvent === 'spore_bloom') {
      // Heal Spore units in cloud
      for (var su = 0; su < battle.units.length; su++) {
        if (battle.attacker === 0 && battle.units[su].x > hazTerr.x && battle.units[su].x < hazTerr.x + hazTerr.w && frame % 90 === 0) {
          battle.units[su].hp = Math.min(battle.units[su].maxHp, battle.units[su].hp + 1);
          TAS.particles.spawn(battle.units[su].x, battle.units[su].y - 10, '#44ff88', 3, 1);
        }
      }
    }
  }

  // Update player units
  var atkDmg = Math.ceil(1 * strScale()); // STR -> attack damage
  for (var i = battle.units.length - 1; i >= 0; i--) {
    var u = battle.units[i];
    u.x = TAS.math.clamp(u.x, 5, GW - 5);
    if (u.atkCd > 0) u.atkCd -= dt;
    if (u.type === 'cavalry' && u.charging) {
      u.x += u.vx * dt;
      if (u.x > GW - 20) { u.charging = false; u.chargeCd = Math.floor(90 * wisScale()); u.x = 10; }
      for (var j = battle.enemyUnits.length - 1; j >= 0; j--) {
        if (Math.abs(u.x - battle.enemyUnits[j].x) < 15 && Math.abs(u.y - battle.enemyUnits[j].y) < 20) {
          battle.enemyUnits[j].hp -= Math.ceil(2 * strScale()); // STR
          TAS.fx.shake(3);
          TAS.audio.playTone(150, 0.1, 'sawtooth', 0.08);
          if (battle.enemyUnits[j].hp <= 0) {
            var killScore = Math.floor(15 * statScoreMult());
            totalScore += killScore;
            addScorePopup(battle.enemyUnits[j].x, battle.enemyUnits[j].y - 20, '+' + killScore, '#f4b41b');
            TAS.particles.spawn(battle.enemyUnits[j].x, battle.enemyUnits[j].y, FACTION_COLORS[battle.defender], 10, 3);
            battle.enemyUnits.splice(j, 1);
          }
        }
      }
    }
    if (u.type === 'cannon' && u.shells) {
      for (var s = u.shells.length - 1; s >= 0; s--) {
        var sh = u.shells[s];
        sh.x += sh.vx * dt;
        sh.vy += 300 * dt;
        sh.y += sh.vy * dt;
        if (sh.y > 260 || sh.x > GW || sh.x < 0) {
          TAS.particles.spawn(sh.x, Math.min(sh.y, 255), '#ff8800', 6, 2);
          u.shells.splice(s, 1);
          continue;
        }
        for (var j2 = battle.enemyUnits.length - 1; j2 >= 0; j2--) {
          if (TAS.math.dist(sh.x, sh.y, battle.enemyUnits[j2].x, battle.enemyUnits[j2].y) < 20) {
            battle.enemyUnits[j2].hp -= Math.ceil(3 * strScale()); // STR -> cannon damage
            TAS.fx.shake(4);
            TAS.audio.playNoise(0.15, 0.08, 400);
            TAS.particles.spawn(sh.x, sh.y, '#ffaa00', 12, 4);
            u.shells.splice(s, 1);
            if (battle.enemyUnits[j2].hp <= 0) {
              var cscore = Math.floor(20 * statScoreMult());
              totalScore += cscore;
              addScorePopup(battle.enemyUnits[j2].x, battle.enemyUnits[j2].y - 20, '+' + cscore, '#f4b41b');
              TAS.particles.spawn(battle.enemyUnits[j2].x, battle.enemyUnits[j2].y, FACTION_COLORS[battle.defender], 10, 3);
              battle.enemyUnits.splice(j2, 1);
            }
            break;
          }
        }
      }
    }
    if (u.type === 'infantry' && u.attacking) {
      u.attacking = false;
      // Crit chance from luck/CHA
      var crit = Math.random() < statLuckBonus();
      var dmg = crit ? atkDmg * 2 : atkDmg;
      for (var j3 = battle.enemyUnits.length - 1; j3 >= 0; j3--) {
        if (Math.abs(u.x - battle.enemyUnits[j3].x) < 25 && Math.abs(u.y - battle.enemyUnits[j3].y) < 20) {
          battle.enemyUnits[j3].hp -= dmg;
          TAS.fx.shake(crit ? 4 : 2);
          if (crit) addScorePopup(battle.enemyUnits[j3].x, battle.enemyUnits[j3].y - 25, 'CRIT!', '#ff44ff');
          if (battle.enemyUnits[j3].hp <= 0) {
            var iscore = Math.floor(10 * statScoreMult());
            totalScore += iscore;
            addScorePopup(battle.enemyUnits[j3].x, battle.enemyUnits[j3].y - 20, '+' + iscore, '#f4b41b');
            TAS.particles.spawn(battle.enemyUnits[j3].x, battle.enemyUnits[j3].y, FACTION_COLORS[battle.defender], 10, 3);
            battle.enemyUnits.splice(j3, 1);
          }
          break;
        }
      }
    }
    if (u.hp <= 0) {
      TAS.particles.spawn(u.x, u.y, FACTION_COLORS[battle.attacker], 8, 2);
      battle.units.splice(i, 1);
      if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
    }
  }

  // Update enemy AI units
  for (var ie = battle.enemyUnits.length - 1; ie >= 0; ie--) {
    var e = battle.enemyUnits[ie];
    if (e.atkCd > 0) e.atkCd -= dt;

    if (e.type === 'infantry') {
      var nearest = null, minD = 9999;
      for (var pu = 0; pu < battle.units.length; pu++) {
        var d = Math.abs(battle.units[pu].x - e.x);
        if (d < minD) { minD = d; nearest = battle.units[pu]; }
      }
      if (nearest) {
        var speed = (40 + difficulty * 15) * dt;
        if (e.x > nearest.x + 20) e.x -= speed;
        else if (e.x < nearest.x - 20) e.x += speed;
        else if (e.atkCd <= 0) {
          e.atkCd = 0.8 - difficulty * 0.15;
          nearest.hp -= 1;
          TAS.audio.playTone(180, 0.06, 'sawtooth', 0.04);
          if (nearest.hp <= 0) {
            TAS.particles.spawn(nearest.x, nearest.y, FACTION_COLORS[battle.attacker], 8, 2);
            var idx = battle.units.indexOf(nearest);
            if (idx >= 0) battle.units.splice(idx, 1);
            if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
          }
        }
      }
    } else if (e.type === 'flame_knight') {
      // Flame Knight: heavy melee, enrages at low HP
      if (e.hp <= e.maxHp * 0.4 && !e.enraged) {
        e.enraged = true;
        TAS.particles.spawn(e.x, e.y, '#ff4400', 12, 3);
        addScorePopup(e.x, e.y - 30, 'ENRAGED!', '#ff4400');
      }
      var fkNearest = null, fkMinD = 9999;
      for (var fk = 0; fk < battle.units.length; fk++) {
        var fkd = Math.abs(battle.units[fk].x - e.x);
        if (fkd < fkMinD) { fkMinD = fkd; fkNearest = battle.units[fk]; }
      }
      if (fkNearest) {
        var fkSpeed = (e.enraged ? 65 : 35) * dt + difficulty * 8 * dt;
        if (e.x > fkNearest.x + 15) e.x -= fkSpeed;
        else if (e.x < fkNearest.x - 15) e.x += fkSpeed;
        else if (e.atkCd <= 0) {
          e.atkCd = e.enraged ? 0.4 : 0.7;
          var fkDmg = e.enraged ? 3 : 2;
          fkNearest.hp -= fkDmg;
          TAS.fx.shake(3);
          TAS.audio.playTone(140, 0.1, 'sawtooth', 0.08);
          if (fkNearest.hp <= 0) {
            TAS.particles.spawn(fkNearest.x, fkNearest.y, FACTION_COLORS[battle.attacker], 10, 3);
            var fkIdx = battle.units.indexOf(fkNearest);
            if (fkIdx >= 0) battle.units.splice(fkIdx, 1);
            if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
          }
        }
      }
    } else if (e.type === 'cavalry') {
      if (e.chargeCd > 0) e.chargeCd -= dt * 60;
      if (!e.charging && e.chargeCd <= 0) {
        e.charging = true;
        e.vx = -150;
      }
      if (e.charging) {
        e.x += e.vx * dt;
        if (e.x < 20) { e.charging = false; e.chargeCd = 80; e.x = 460; }
        for (var ce = battle.units.length - 1; ce >= 0; ce--) {
          if (Math.abs(e.x - battle.units[ce].x) < 15 && Math.abs(e.y - battle.units[ce].y) < 20) {
            battle.units[ce].hp -= 2;
            TAS.fx.shake(3);
            if (battle.units[ce].hp <= 0) {
              TAS.particles.spawn(battle.units[ce].x, battle.units[ce].y, FACTION_COLORS[battle.attacker], 10, 3);
              battle.units.splice(ce, 1);
              if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
            }
          }
        }
      }
    } else if (e.type === 'cannon') {
      if (!e.shells) e.shells = [];
      if (e.atkCd <= 0 && battle.units.length > 0) {
        var ctarget = battle.units[TAS.math.randInt(0, battle.units.length - 1)];
        var cdx = ctarget.x - e.x;
        var cdy = ctarget.y - e.y;
        var cang = Math.atan2(-cdy, -cdx);
        e.shells.push({ x: e.x - 10, y: e.y - 10, vx: Math.cos(cang) * 180, vy: Math.sin(cang) * 180 - 80 });
        e.atkCd = 2 - difficulty * 0.3;
        TAS.audio.playNoise(0.15, 0.05, 600);
      }
      for (var cs = e.shells.length - 1; cs >= 0; cs--) {
        var csh = e.shells[cs];
        csh.x += csh.vx * dt;
        csh.vy += 300 * dt;
        csh.y += csh.vy * dt;
        if (csh.y > 260 || csh.x < 0 || csh.x > GW) {
          TAS.particles.spawn(csh.x, Math.min(csh.y, 255), '#ff8800', 5, 2);
          e.shells.splice(cs, 1);
          continue;
        }
        for (var cj = battle.units.length - 1; cj >= 0; cj--) {
          if (TAS.math.dist(csh.x, csh.y, battle.units[cj].x, battle.units[cj].y) < 20) {
            battle.units[cj].hp -= 2;
            TAS.fx.shake(4);
            TAS.particles.spawn(csh.x, csh.y, '#ffaa00', 10, 3);
            e.shells.splice(cs, 1);
            if (battle.units[cj].hp <= 0) {
              TAS.particles.spawn(battle.units[cj].x, battle.units[cj].y, FACTION_COLORS[battle.attacker], 8, 2);
              battle.units.splice(cj, 1);
              if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
            }
            break;
          }
        }
      }
    }

    if (e.hp <= 0) {
      TAS.particles.spawn(e.x, e.y, FACTION_COLORS[battle.defender], 10, 3);
      battle.enemyUnits.splice(ie, 1);
    }
  }

  // === BOSS UPDATE ===
  if (battle.bossActive && battle.boss && battle.boss.hp > 0) {
    var boss = battle.boss;
    boss.atkCd -= dt;
    boss.moveTimer += dt;

    // Boss movement: slow drift toward nearest unit
    var bNearest = null, bMinD = 9999;
    for (var bi = 0; bi < battle.units.length; bi++) {
      var bd = Math.abs(battle.units[bi].x - boss.x);
      if (bd < bMinD) { bMinD = bd; bNearest = battle.units[bi]; }
    }
    if (bNearest) {
      var bSpeed = (20 + difficulty * 5) * dt;
      if (boss.x > bNearest.x + 30) boss.x -= bSpeed;
      else if (boss.x < bNearest.x - 30) boss.x += bSpeed;
    }

    // Enrage at half HP
    if (boss.hp <= boss.maxHp * 0.5 && !boss.enraged) {
      boss.enraged = true;
      boss.phase = 1;
      TAS.fx.shake(6);
      TAS.particles.spawn(boss.x, boss.y, '#ff2200', 20, 5);
      addScorePopup(boss.x, boss.y - 40, 'ENRAGED!', '#ff0000');
      TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1);
    }

    // Boss attacks
    if (boss.atkCd <= 0 && battle.units.length > 0) {
      if (boss.type === 'molten_golem') {
        // Ground slam: damage all units within range
        for (var gs = battle.units.length - 1; gs >= 0; gs--) {
          if (Math.abs(battle.units[gs].x - boss.x) < 80) {
            var bDmg = boss.enraged ? 3 : 2;
            battle.units[gs].hp -= bDmg;
            TAS.fx.shake(5);
            if (battle.units[gs].hp <= 0) {
              TAS.particles.spawn(battle.units[gs].x, battle.units[gs].y, FACTION_COLORS[battle.attacker], 10, 3);
              battle.units.splice(gs, 1);
              if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
            }
          }
        }
        TAS.particles.spawn(boss.x, boss.y + 20, '#ff4400', 15, 4);
        TAS.audio.playNoise(0.3, 0.15, 200);
        boss.atkCd = boss.enraged ? 1.5 : 2.5;
      } else {
        // Spore titan: ranged spore burst
        for (var st = battle.units.length - 1; st >= 0; st--) {
          if (Math.abs(battle.units[st].x - boss.x) < 120) {
            battle.units[st].hp -= (boss.enraged ? 2 : 1);
            TAS.particles.spawn(battle.units[st].x, battle.units[st].y, '#884488', 6, 2);
            if (battle.units[st].hp <= 0) {
              TAS.particles.spawn(battle.units[st].x, battle.units[st].y, FACTION_COLORS[battle.attacker], 8, 2);
              battle.units.splice(st, 1);
              if (battle.activeUnit >= battle.units.length) battle.activeUnit = 0;
            }
          }
        }
        TAS.audio.playTone(160, 0.2, 'sawtooth', 0.08);
        boss.atkCd = boss.enraged ? 1.2 : 2;
      }
    }

    // Check boss hit by player attacks (infantry proximity)
    for (var bh = 0; bh < battle.units.length; bh++) {
      var bu = battle.units[bh];
      if (bu.type === 'infantry' && bu.attacking && Math.abs(bu.x - boss.x) < 35 && Math.abs(bu.y - boss.y) < 40) {
        boss.hp -= atkDmg;
        TAS.fx.shake(2);
        addScorePopup(boss.x, boss.y - 30, '-' + atkDmg, '#ff4444');
      }
    }
    // Cannon hits on boss
    for (var bc = 0; bc < battle.units.length; bc++) {
      if (battle.units[bc].type === 'cannon' && battle.units[bc].shells) {
        for (var bs = battle.units[bc].shells.length - 1; bs >= 0; bs--) {
          var bsh = battle.units[bc].shells[bs];
          if (TAS.math.dist(bsh.x, bsh.y, boss.x, boss.y) < 30) {
            boss.hp -= Math.ceil(3 * strScale());
            TAS.fx.shake(4);
            TAS.particles.spawn(bsh.x, bsh.y, '#ffaa00', 10, 3);
            addScorePopup(boss.x, boss.y - 30, '-' + Math.ceil(3 * strScale()), '#ff4444');
            battle.units[bc].shells.splice(bs, 1);
            break;
          }
        }
      }
    }
    // Cavalry charge hits boss
    for (var bcc = 0; bcc < battle.units.length; bcc++) {
      if (battle.units[bcc].type === 'cavalry' && battle.units[bcc].charging) {
        if (Math.abs(battle.units[bcc].x - boss.x) < 25 && Math.abs(battle.units[bcc].y - boss.y) < 40) {
          boss.hp -= Math.ceil(2 * strScale());
          TAS.fx.shake(3);
          addScorePopup(boss.x, boss.y - 30, '-' + Math.ceil(2 * strScale()), '#ff4444');
        }
      }
    }

    // Boss death
    if (boss.hp <= 0) {
      battle.bossActive = false;
      var bossScore = Math.floor(100 * statScoreMult());
      totalScore += bossScore;
      addScorePopup(boss.x, boss.y - 40, 'BOSS +' + bossScore, '#ff44ff');
      TAS.particles.spawn(boss.x, boss.y, '#ffaa00', 30, 6);
      TAS.fx.shake(8);
      TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 140);
    }
  }

  // Check battle end
  var allEnemiesDead = battle.enemyUnits.length === 0 && (!battle.bossActive || !battle.boss || battle.boss.hp <= 0);
  if (battle.units.length === 0 && battle.battleTimer > 1) {
    battle.result = 'lose';
    territories[battle.defenderTerr].army = Math.max(1, Math.floor(battle.defenderArmy * 0.5));
    showMessage('Your sporelings fell in battle!', 2);
    TAS.audio.playTone(150, 0.4, 'sawtooth', 0.08);
    setTimeout(function() { state = 'strategic'; endTurn(); }, 1500);
  } else if (allEnemiesDead && battle.battleTimer > 1) {
    battle.result = 'win';
    territories[battle.defenderTerr].owner = battle.attacker;
    territories[battle.defenderTerr].army = Math.max(1, battle.units.length);
    var victScore = Math.floor(50 * statScoreMult());
    totalScore += victScore;
    showMessage('Spores spread! ' + territories[battle.defenderTerr].name + ' is colonized!', 2);
    addScorePopup(GW / 2, GH / 2 - 40, '+' + victScore, '#f4b41b');
    TAS.audio.playTone(440, 0.3, 'square', 0.1);
    TAS.particles.spawn(GW / 2, GH / 2, '#f4b41b', 20, 4);
    setTimeout(function() { state = 'strategic'; endTurn(); }, 1500);
  }
}

function updateSiege(dt) {
  siege.timer -= dt;
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var p = siege.player;

  var siegeSpeed = 120 * dexScale(); // DEX -> siege move speed
  if (keys['ArrowLeft'] || keys['a'] || touch.left) {
    p.x -= siegeSpeed * dt;
    p.facing = -1;
  }
  if (keys['ArrowRight'] || keys['d'] || touch.right) {
    p.x += siegeSpeed * dt;
    p.facing = 1;
  }
  if ((keys['ArrowUp'] || keys['w'] || touch.up) && p.grounded) {
    p.vy = -250;
    p.grounded = false;
    TAS.audio.playTone(400, 0.08, 'square', 0.04);
  }
  if ((keys[' '] || keys['z'] || touch.a) && p.atkTimer <= 0) {
    p.attacking = true;
    p.atkTimer = 0.3 * wisScale(); // WIS -> faster attacks
    TAS.audio.playTone(250, 0.06, 'sawtooth', 0.06);
  }

  p.vy += 600 * dt;
  p.y += p.vy * dt;
  if (p.y >= 240) { p.y = 240; p.vy = 0; p.grounded = true; }
  p.x = TAS.math.clamp(p.x, 5, GW - 5);

  if (p.atkTimer > 0) p.atkTimer -= dt;
  if (p.atkTimer <= 0) p.attacking = false;

  // Attack hit check -- STR -> damage
  var siegeDmg = Math.ceil(1 * strScale());
  if (p.attacking && p.atkTimer > 0.15) {
    for (var i = siege.enemies.length - 1; i >= 0; i--) {
      var e = siege.enemies[i];
      if (Math.abs(p.x + p.facing * 15 - e.x) < 20 && Math.abs(p.y - e.y) < 25) {
        e.hp -= siegeDmg;
        TAS.fx.shake(2);
        if (e.hp <= 0) {
          var eScore = Math.floor((e.type === 'heavy' ? 25 : 10) * statScoreMult());
          totalScore += eScore;
          addScorePopup(e.x, e.y - 20, '+' + eScore, '#f4b41b');
          TAS.particles.spawn(e.x, e.y, FACTION_COLORS[battle.defender], 8, 3);
          siege.enemies.splice(i, 1);
          TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06);
        }
      }
    }
  }

  // Enemy AI
  for (var ei = 0; ei < siege.enemies.length; ei++) {
    var en = siege.enemies[ei];
    var enSpeed = en.speed * (en.type === 'heavy' ? 0.6 : 1);
    if (en.x < p.x - 10) en.x += enSpeed * 60 * dt;
    else if (en.x > p.x + 10) en.x -= enSpeed * 60 * dt;
    if (Math.abs(en.x - p.x) < 18 && Math.abs(en.y - p.y) < 20 && en.atkCd <= 0) {
      var enDmg = en.type === 'heavy' ? 2 : 1;
      p.hp -= enDmg;
      en.atkCd = en.type === 'heavy' ? 1.5 : 1.2;
      TAS.fx.flash('#ff0000', 0.3);
      TAS.audio.playTone(120, 0.12, 'sawtooth', 0.08);
    }
    if (en.atkCd > 0) en.atkCd -= dt;
  }

  // Traps
  for (var ti = 0; ti < siege.traps.length; ti++) {
    var trap = siege.traps[ti];
    if (!trap.active) continue;
    trap.timer -= dt * 60;
    if (trap.timer <= 0) {
      trap.timer = TAS.math.randInt(90, 200);
      if (trap.type === 'spikes') {
        if (Math.abs(p.x - trap.x) < 15 && p.y >= 235) {
          p.hp -= 1;
          TAS.fx.flash('#ff4400', 0.2);
          TAS.audio.playTone(100, 0.15, 'sawtooth', 0.06);
        }
      } else {
        if (Math.abs(p.x - trap.x) < 20) {
          p.hp -= 1;
          TAS.fx.flash('#ff4400', 0.2);
          TAS.audio.playTone(80, 0.2, 'noise', 0.06);
        }
      }
    }
  }

  // Screen transition
  if (p.x >= GW - 10 && siege.enemies.length === 0) {
    siege.screen++;
    if (siege.screen >= 3) {
      siege.result = 'win';
      territories[battle.defenderTerr].owner = battle.attacker;
      territories[battle.defenderTerr].army = Math.max(1, battle.attackerArmy - 1);
      var siegeScore = Math.floor(80 * statScoreMult());
      totalScore += siegeScore;
      showMessage('Garden fort captured! ' + territories[battle.defenderTerr].name + ' is yours!', 3);
      addScorePopup(GW / 2, GH / 2 - 30, '+' + siegeScore, '#f4b41b');
      TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.2]], 120);
      TAS.particles.spawn(GW / 2, GH / 2, '#f4b41b', 25, 5);
      setTimeout(function() { state = 'strategic'; endTurn(); }, 2000);
      return;
    }
    p.x = 20;
    generateSiegeScreen(siege.screen);
    TAS.audio.playTone(550, 0.08, 'square', 0.05);
  }

  if (p.hp <= 0 || siege.timer <= 0) {
    siege.result = 'lose';
    territories[battle.defenderTerr].army = Math.max(1, Math.floor(battle.defenderArmy * 0.6));
    showMessage('Spore siege failed!', 2);
    TAS.audio.playTone(120, 0.5, 'sawtooth', 0.08);
    setTimeout(function() { state = 'strategic'; endTurn(); }, 1500);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'tutorial') {
    drawTutorial();
  } else if (state === 'strategic') {
    drawStrategic();
  } else if (state === 'battle') {
    drawBattle();
  } else if (state === 'siege') {
    drawSiege();
  } else if (state === 'victory') {
    drawVictoryScreen();
  } else if (state === 'gameover') {
    drawGameOverScreen();
  }

  // Score popups
  for (var sp = 0; sp < scorePopups.length; sp++) {
    var pop = scorePopups[sp];
    ctx.save();
    ctx.globalAlpha = Math.min(1, pop.life);
    ctx.fillStyle = pop.color;
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pop.text, pop.x, pop.y);
    ctx.restore();
  }

  // Message overlay
  if (messageTimer > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, messageTimer);
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(GW / 2 - 180, GH / 2 - 18, 360, 36);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(message, GW / 2, GH / 2 + 5);
    ctx.restore();
  }

  TAS.particles.draw();
  TAS.fx.drawFlash(GW, GH);
  TAS.input.drawTouchControls(GW, GH);
}

// === TITLE SCREEN (Pass 3: animated, with stat display) ===
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Dark background with animated parallax stars
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Parallax spore field
  for (var si = 0; si < bgStars.length; si++) {
    var star = bgStars[si];
    var sx = (star.x + frame * star.sp) % GW;
    ctx.fillStyle = 'rgba(168,85,247,' + (0.2 + star.s * 0.3) + ')';
    ctx.fillRect(sx, star.y, star.s, star.s);
  }

  // Garden continent silhouette
  ctx.fillStyle = '#0d1a2a';
  ctx.beginPath();
  ctx.ellipse(GW / 2, GH / 2 + 10, 180, 120, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath();
  ctx.ellipse(GW / 2, GH / 2 + 10, 160, 100, 0, 0, Math.PI * 2);
  ctx.fill();

  // Animated title with shadow
  var titleBob = Math.sin(frame * 0.03) * 3;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN WARS', GW / 2 + 2, 36 + titleBob + 2);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('GARDEN WARS', GW / 2, 36 + titleBob);
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('SPORE CIVIL WAR', GW / 2 + 1, 54 + titleBob + 1);
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE CIVIL WAR', GW / 2, 54 + titleBob);

  // Subtitle
  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('Mycelium vs Blight -- The Battle for the Gardens of Tasern', GW / 2, 70);

  // Faction icons with breathing animation
  var breathe = 1 + Math.sin(frame * 0.04) * 0.08;
  drawBaseling(120, 100, 0, 1.4 * breathe);
  drawBaseling(360, 100, 1, 1.4 * breathe);

  // VS with glow
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('VS', GW / 2, 108);

  // Champion name + [C] picker prompt (full stat bars shown on the setup/HUD elsewhere)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(selName + '   [C] SELECT BASELING', GW / 2, 130);

  // Menu options
  var opts = ['Garden Skirmish (Easy)', 'Spore Campaign (Medium)', 'Blight Invasion (Hard)', '2-Player Fungal Feud', 'How to Play'];
  for (var i = 0; i < opts.length; i++) {
    var y = 155 + i * 22;
    var sel = i === menuChoice;
    ctx.fillStyle = sel ? '#f4b41b' : '#889988';
    ctx.font = (sel ? 'bold ' : '') + '12px monospace';
    ctx.fillText((sel ? '> ' : '  ') + opts[i] + (sel ? ' <' : ''), GW / 2, y);
  }

  // Controls hint
  ctx.fillStyle = '#556655';
  ctx.font = '9px monospace';
  ctx.fillText('[WASD/Arrows] Move  [Z/Space] Action  [B/X] Swap Unit', GW / 2, 280);
  ctx.fillText('[R] Spawn Sporelings  [E] End Turn  [Click] Select Garden', GW / 2, 293);
  ctx.fillText('Capture all garden forts to win the Spore Civil War!', GW / 2, 306);
}

function drawBaseling(x, y, faction, scale) {
  var s = scale || 1;
  var c = FACTION_COLORS[faction];

  // The player's faction (0) renders as the SELECTED baseling sprite when ready;
  // otherwise (and always for the enemy faction) we draw the procedural creature.
  if (faction === 0 && TAS.drawBaseling(ctx, x, y, 28 * s, { anim: 'idle', frame: frame })) {
    return;
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);

  // Body
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-4, -3, 4, 0, Math.PI * 2);
  ctx.arc(4, -3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-3, -3, 2, 0, Math.PI * 2);
  ctx.arc(5, -3, 2, 0, Math.PI * 2);
  ctx.fill();

  // Faction feature
  if (faction === 0) {
    // Mycelium: spore cap on head (purple-green)
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.ellipse(0, -16, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.arc(-2, -17, 2, 0, Math.PI * 2);
    ctx.arc(3, -16, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Blight: toxic flame on head
    ctx.fillStyle = '#e6482e';
    ctx.beginPath();
    ctx.moveTo(-3, -14);
    ctx.lineTo(0, -22);
    ctx.lineTo(3, -14);
    ctx.fill();
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.moveTo(-1, -14);
    ctx.lineTo(0, -19);
    ctx.lineTo(1, -14);
    ctx.fill();
  }

  ctx.restore();
}
