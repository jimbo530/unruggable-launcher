// === STRATEGIC MAP (Pass 3: enhanced) ===
function drawStrategic() {
  // Background with garden terrain tint
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Mycelium water around edges with slight wave
  var waveOff = Math.sin(frame * 0.03) * 2;
  ctx.fillStyle = '#1a2a44';
  ctx.fillRect(0, 0, GW, 15 + waveOff);
  ctx.fillRect(0, 0, 15, GH);
  ctx.fillRect(GW - 15, 0, 15, GH);
  ctx.fillRect(0, GH - 30, GW, 30);

  // Draw connections between territories
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  for (var i = 0; i < 12; i++) {
    var t = territories[i];
    for (var a = 0; a < t.adjacent.length; a++) {
      var adj = t.adjacent[a];
      if (adj > i) {
        ctx.beginPath();
        ctx.moveTo(t.cx, t.cy);
        ctx.lineTo(territories[adj].cx, territories[adj].cy);
        ctx.stroke();
      }
    }
  }

  // Draw territories
  for (var ti = 0; ti < 12; ti++) {
    var terr = territories[ti];
    var selected = ti === selectedTerritory;
    var hovered = getTerrAtPos(mouseX, mouseY) === ti;
    var isAdj = selectedTerritory >= 0 && territories[selectedTerritory].adjacent.indexOf(ti) !== -1;

    // Terrain-colored background circle
    var terrColor = TERRAIN_COLORS[terr.terrain] || '#334433';
    ctx.beginPath();
    ctx.arc(terr.cx, terr.cy, TERR_RADIUS - 2, 0, Math.PI * 2);
    ctx.fillStyle = terrColor;
    ctx.fill();

    // Owner overlay
    ctx.beginPath();
    ctx.arc(terr.cx, terr.cy, TERR_RADIUS - 5, 0, Math.PI * 2);
    if (terr.owner >= 0) {
      ctx.fillStyle = selected ? FACTION_LIGHT[terr.owner] :
                      (hovered ? FACTION_LIGHT[terr.owner] + '88' : FACTION_COLORS[terr.owner] + 'aa');
    } else {
      ctx.fillStyle = hovered ? '#555' : '#3a3a3a';
    }
    ctx.fill();
    if (selected) {
      ctx.strokeStyle = '#f4b41b';
      ctx.lineWidth = 3;
      ctx.stroke();
    } else if (isAdj) {
      ctx.strokeStyle = '#f4b41b88';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Hazard terrain indicator
    if (terr.terrain === 'hazard') {
      ctx.fillStyle = '#ffaa2233';
      ctx.beginPath();
      ctx.arc(terr.cx, terr.cy, TERR_RADIUS - 8, 0, Math.PI * 2);
      ctx.fill();
    }

    // Fort icon
    if (terr.hasFort) {
      ctx.fillStyle = '#886633';
      ctx.fillRect(terr.cx - 10, terr.cy - 20, 20, 15);
      ctx.fillRect(terr.cx - 12, terr.cy - 23, 5, 5);
      ctx.fillRect(terr.cx + 7, terr.cy - 23, 5, 5);
      ctx.fillStyle = '#444';
      ctx.fillRect(terr.cx - 3, terr.cy - 12, 6, 7);
    }

    // Army count
    if (terr.army > 0) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(terr.army, terr.cx, terr.cy + 5);
    }

    // Territory name
    ctx.fillStyle = '#ccc';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(terr.name, terr.cx, terr.cy + 22);
  }

  // Draw train (supply caravan)
  if (train.active) {
    var fromTr = territories[train.from];
    var toTr = territories[train.to];
    var trx = TAS.math.lerp(fromTr.cx, toTr.cx, train.progress);
    var trY = TAS.math.lerp(fromTr.cy, toTr.cy, train.progress);
    // Spore caravan body
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(trx - 8, trY - 5, 16, 10);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(trx - 5, trY - 8, 10, 4);
    // Wheels
    ctx.fillStyle = '#664422';
    ctx.beginPath();
    ctx.arc(trx - 5, trY + 5, 3, 0, Math.PI * 2);
    ctx.arc(trx + 5, trY + 5, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f4b41b';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(train.gold + 's', trx, trY - 12);
  }

  // Weather indicator with icon
  if (weatherEvent) {
    var wColor = '#3cacd7';
    var wText = 'POOP STORM (no moves)';
    if (weatherEvent === 'drought') { wColor = '#7a444a'; wText = 'GARDEN DROUGHT (-seeds)'; }
    else if (weatherEvent === 'spore_bloom') { wColor = '#38d973'; wText = 'MYCELIUM BLOOM (heal)'; }
    else if (weatherEvent === 'compost_eruption') { wColor = '#e6482e'; wText = 'COMPOST ERUPTION (dmg)'; }
    ctx.fillStyle = wColor;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(wText, 20, GH - 35);
  }

  // HUD bar at bottom
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, GH - 28, GW, 28);

  ctx.fillStyle = FACTION_COLORS[currentPlayer];
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(FACTION_NAMES[currentPlayer] + ' T' + turnNumber, 8, GH - 12);

  ctx.fillStyle = '#f4b41b';
  ctx.fillText('Seeds:' + gold[currentPlayer], 110, GH - 12);

  ctx.fillStyle = '#38d973';
  var inc = calcIncome(currentPlayer);
  if (weatherEvent === 'drought') inc = Math.floor(inc * 0.5);
  ctx.fillText('+' + inc + '/t', 195, GH - 12);

  // Score display
  ctx.fillStyle = '#a855f7';
  ctx.fillText('POOP:' + totalScore, 240, GH - 12);

  // Buy button
  var canBuy = gold[currentPlayer] >= 5;
  ctx.fillStyle = canBuy ? (reinforceMode ? '#44aa44' : '#336633') : '#333';
  ctx.fillRect(310, GH - 24, 70, 20);
  ctx.fillStyle = canBuy ? '#fff' : '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(reinforceMode ? 'PLANTING' : 'SPROUT(5s)', 345, GH - 11);

  // End turn button
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(390, GH - 24, 80, 20);
  ctx.fillStyle = '#f4b41b';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('END TURN', 430, GH - 11);

  // Scoreboard top
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GW, 16);
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = FACTION_COLORS[0];
  ctx.fillText('Mycelium: ' + countTerritories(0) + 'g ' + countForts(0) + 'f', 8, 12);
  ctx.textAlign = 'right';
  ctx.fillStyle = FACTION_COLORS[1];
  ctx.fillText('Blight: ' + countTerritories(1) + 'g ' + countForts(1) + 'f', GW - 8, 12);
}

// === BATTLE DRAW (Pass 3: themed battlefields) ===
function drawBattle() {
  // Themed sky gradient
  var skyTop = '#2244aa', skyBot = '#446688';
  if (battle.battlefieldType === 'volcanic' || battle.battlefieldType === 'scorched') {
    skyTop = '#441100'; skyBot = '#663322';
  } else if (battle.battlefieldType === 'fungal' || battle.battlefieldType === 'swamp') {
    skyTop = '#112211'; skyBot = '#224433';
  } else if (battle.battlefieldType === 'industrial') {
    skyTop = '#1a1a2a'; skyBot = '#2a3344';
  }
  var grad = ctx.createLinearGradient(0, 0, 0, 200);
  grad.addColorStop(0, skyTop);
  grad.addColorStop(1, skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, 200);

  // Parallax clouds/smoke
  for (var ci = 0; ci < 5; ci++) {
    var cx = ((ci * 97 + frame * 0.3) % (GW + 60)) - 30;
    var cy = 20 + ci * 25;
    ctx.fillStyle = battle.battlefieldType === 'volcanic' ? 'rgba(80,30,10,0.3)' : 'rgba(100,120,140,0.2)';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 25 + ci * 5, 8 + ci * 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  var groundColor = '#3a5533';
  if (battle.battlefieldType === 'volcanic') groundColor = '#3a2a1a';
  else if (battle.battlefieldType === 'scorched') groundColor = '#4a3a2a';
  else if (battle.battlefieldType === 'fungal') groundColor = '#2a3a2a';
  else if (battle.battlefieldType === 'swamp') groundColor = '#2a3322';
  else if (battle.battlefieldType === 'industrial') groundColor = '#3a3a3a';
  ctx.fillStyle = groundColor;
  ctx.fillRect(0, 250, GW, 70);
  ctx.fillStyle = '#4a6644';
  ctx.fillRect(0, 245, GW, 8);

  // Terrain features (Pass 2: hazard terrain)
  for (var tf = 0; tf < battle.terrain.length; tf++) {
    var feat = battle.terrain[tf];
    if (feat.type === 'hill') {
      ctx.fillStyle = '#556644';
      ctx.beginPath();
      ctx.moveTo(feat.x, 250);
      ctx.lineTo(feat.x + feat.w / 2, 250 - feat.h);
      ctx.lineTo(feat.x + feat.w, 250);
      ctx.fill();
    } else if (feat.type === 'river') {
      ctx.fillStyle = '#3355aa77';
      ctx.fillRect(feat.x, 245, feat.w, 25);
    } else if (feat.type === 'lava_pool') {
      // Animated lava
      var lavaGlow = 0.6 + Math.sin(frame * 0.08) * 0.2;
      ctx.fillStyle = 'rgba(255,68,0,' + lavaGlow + ')';
      ctx.fillRect(feat.x, 248, feat.w, 15);
      ctx.fillStyle = '#ffaa0044';
      ctx.fillRect(feat.x + 3, 250, feat.w - 6, 8);
      // Lava bubbles
      if (frame % 30 < 5) {
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(feat.x + (frame * 3) % feat.w, 252, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (feat.type === 'spore_cloud') {
      var sporeAlpha = 0.15 + Math.sin(frame * 0.04) * 0.08;
      ctx.fillStyle = 'rgba(68,255,136,' + sporeAlpha + ')';
      ctx.beginPath();
      ctx.ellipse(feat.x + feat.w / 2, 235, feat.w / 2, 20, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (feat.type === 'barricade') {
      ctx.fillStyle = '#666';
      ctx.fillRect(feat.x, 245 - feat.h, feat.w, feat.h);
      ctx.fillStyle = '#555';
      ctx.fillRect(feat.x + 2, 245 - feat.h + 2, feat.w - 4, 4);
    }
  }

  // Draw player units
  for (var pu = 0; pu < battle.units.length; pu++) {
    var isActive = pu === (battle.activeUnit % battle.units.length);
    drawBattleUnit(battle.units[pu], battle.attacker, isActive);
  }

  // Draw enemy units
  for (var eu = 0; eu < battle.enemyUnits.length; eu++) {
    drawBattleUnit(battle.enemyUnits[eu], battle.defender, false);
  }

  // Draw boss
  if (battle.bossActive && battle.boss && battle.boss.hp > 0) {
    drawBoss(battle.boss);
  }

  // Draw shells
  for (var su = 0; su < battle.units.length; su++) {
    if (battle.units[su].shells) {
      for (var ss = 0; ss < battle.units[su].shells.length; ss++) {
        var shell = battle.units[su].shells[ss];
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(shell.x, shell.y, 3, 0, Math.PI * 2);
        ctx.fill();
        // Trail
        ctx.fillStyle = '#ff880066';
        ctx.beginPath();
        ctx.arc(shell.x - shell.vx * 0.02, shell.y - shell.vy * 0.02, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  for (var seu = 0; seu < battle.enemyUnits.length; seu++) {
    if (battle.enemyUnits[seu].shells) {
      for (var ses = 0; ses < battle.enemyUnits[seu].shells.length; ses++) {
        var eshell = battle.enemyUnits[seu].shells[ses];
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(eshell.x, eshell.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Cannon angle indicator
  if (battle.units.length > 0) {
    var aUnit = battle.units[battle.activeUnit % battle.units.length];
    if (aUnit && aUnit.type === 'cannon') {
      var aRad = battle.cannonAngle * Math.PI / 180;
      ctx.strokeStyle = '#f4b41b88';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(aUnit.x + 10, aUnit.y - 10);
      ctx.lineTo(aUnit.x + 10 + Math.cos(aRad) * 50, aUnit.y - 10 - Math.sin(aRad) * 50);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 24);
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = FACTION_COLORS[battle.attacker];
  ctx.fillText('ATK:' + battle.units.length, 8, 16);
  ctx.textAlign = 'right';
  ctx.fillStyle = FACTION_COLORS[battle.defender];
  var defText = 'DEF:' + battle.enemyUnits.length;
  if (battle.bossActive && battle.boss && battle.boss.hp > 0) defText += ' BOSS:' + battle.boss.hp;
  ctx.fillText(defText, GW - 8, 16);

  // Active unit indicator
  if (battle.units.length > 0) {
    var actUnit = battle.units[battle.activeUnit % battle.units.length];
    if (actUnit) {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#f4b41b';
      ctx.font = '10px monospace';
      ctx.fillText('[' + actUnit.type.toUpperCase() + '] B=swap', GW / 2, 16);
    }
  }

  // Score in battle
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a855f7';
  ctx.font = '9px monospace';
  ctx.fillText('POOP:' + totalScore, 8, GH - 8);

  // Battle result overlay
  if (battle.result) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, GH / 2 - 30, GW, 60);
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = battle.result === 'win' ? '#38d973' : '#e6482e';
    ctx.fillText(battle.result === 'win' ? 'GARDEN CLAIMED!' : 'SPORES WITHERED!', GW / 2, GH / 2 + 8);
  }
}

function drawBattleUnit(u, faction, isActive) {
  var c = FACTION_COLORS[faction];
  var cl = FACTION_LIGHT[faction];

  if (u.type === 'infantry') {
    ctx.fillStyle = c;
    ctx.fillRect(u.x - 5, u.y - 16, 10, 16);
    ctx.fillStyle = cl;
    ctx.beginPath();
    ctx.arc(u.x, u.y - 20, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.fillRect(u.x + 5, u.y - 14, 8, 2);
    drawMiniHP(u.x, u.y - 28, u.hp, u.maxHp);
  } else if (u.type === 'shaman') {
    // Mycelium Shaman: robed figure with staff
    ctx.fillStyle = '#2a1a4a';
    ctx.fillRect(u.x - 6, u.y - 18, 12, 18);
    ctx.fillStyle = cl;
    ctx.beginPath();
    ctx.arc(u.x, u.y - 22, 5, 0, Math.PI * 2);
    ctx.fill();
    // Staff with glow
    ctx.fillStyle = '#886633';
    ctx.fillRect(u.x + 6, u.y - 22, 2, 24);
    var healGlow = 0.4 + Math.sin(frame * 0.1) * 0.3;
    ctx.fillStyle = 'rgba(168,85,247,' + healGlow + ')';
    ctx.beginPath();
    ctx.arc(u.x + 7, u.y - 24, 4, 0, Math.PI * 2);
    ctx.fill();
    drawMiniHP(u.x, u.y - 30, u.hp, u.maxHp);
  } else if (u.type === 'flame_knight') {
    // Blight Knight: armored heavy rot warrior
    var fkColor = u.enraged ? '#ff4400' : c;
    ctx.fillStyle = '#555';
    ctx.fillRect(u.x - 7, u.y - 20, 14, 20);
    ctx.fillStyle = fkColor;
    ctx.fillRect(u.x - 6, u.y - 18, 12, 16);
    ctx.fillStyle = cl;
    ctx.beginPath();
    ctx.arc(u.x, u.y - 24, 6, 0, Math.PI * 2);
    ctx.fill();
    // Helm
    ctx.fillStyle = '#444';
    ctx.fillRect(u.x - 6, u.y - 28, 12, 4);
    // Flame sword
    ctx.fillStyle = u.enraged ? '#ff8800' : '#aa6622';
    ctx.fillRect(u.x - 12, u.y - 16, 10, 3);
    if (u.enraged) {
      // Fire particles around
      ctx.fillStyle = '#ff440088';
      ctx.beginPath();
      ctx.arc(u.x + Math.sin(frame * 0.2) * 8, u.y - 15, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    drawMiniHP(u.x, u.y - 34, u.hp, u.maxHp);
  } else if (u.type === 'cavalry') {
    ctx.fillStyle = '#664422';
    ctx.fillRect(u.x - 10, u.y - 10, 20, 10);
    ctx.fillStyle = c;
    ctx.fillRect(u.x - 4, u.y - 20, 8, 12);
    ctx.fillStyle = cl;
    ctx.beginPath();
    ctx.arc(u.x, u.y - 24, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ccc';
    ctx.fillRect(u.x + 8, u.y - 18, 14, 2);
    drawMiniHP(u.x, u.y - 30, u.hp, u.maxHp);
    if (u.charging) {
      ctx.fillStyle = '#f4b41b88';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CHARGE!', u.x, u.y - 34);
    }
  } else if (u.type === 'cannon') {
    ctx.fillStyle = '#553311';
    ctx.beginPath();
    ctx.arc(u.x - 5, u.y, 5, 0, Math.PI * 2);
    ctx.arc(u.x + 5, u.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#555';
    ctx.save();
    ctx.translate(u.x, u.y - 5);
    var cAng = faction === battle.attacker ? -battle.cannonAngle * Math.PI / 180 : -(180 - battle.cannonAngle) * Math.PI / 180;
    ctx.rotate(cAng);
    ctx.fillRect(0, -2, 18, 4);
    ctx.restore();
    drawMiniHP(u.x, u.y - 18, u.hp, u.maxHp);
  }

  // Active indicator
  if (isActive) {
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 1;
    ctx.strokeRect(u.x - 12, u.y - 30, 24, 34);
  }
}

// === BOSS DRAWING (Pass 2) ===
function drawBoss(boss) {
  ctx.save();
  ctx.translate(boss.x, boss.y);

  if (boss.type === 'molten_golem') {
    // Huge lava creature
    var shake = boss.enraged ? Math.sin(frame * 0.3) * 2 : 0;
    ctx.fillStyle = boss.enraged ? '#ff3300' : '#884422';
    ctx.beginPath();
    ctx.ellipse(shake, -10, 25, 35, 0, 0, Math.PI * 2);
    ctx.fill();
    // Cracks of lava
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-10 + shake, -30); ctx.lineTo(-5, -5); ctx.lineTo(-15, 15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10 + shake, -25); ctx.lineTo(8, 0); ctx.lineTo(12, 20);
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(-8 + shake, -20, 4, 0, Math.PI * 2);
    ctx.arc(8 + shake, -20, 4, 0, Math.PI * 2);
    ctx.fill();
    // Arms
    ctx.fillStyle = boss.enraged ? '#cc2200' : '#663311';
    ctx.fillRect(-35 + shake, -15, 12, 25);
    ctx.fillRect(23 + shake, -15, 12, 25);
  } else {
    // Spore Titan: giant mushroom beast
    var sway = Math.sin(frame * 0.02) * 3;
    ctx.fillStyle = '#553388';
    ctx.beginPath();
    ctx.ellipse(sway, -5, 22, 32, 0, 0, Math.PI * 2);
    ctx.fill();
    // Mushroom cap
    ctx.fillStyle = boss.enraged ? '#aa2288' : '#774488';
    ctx.beginPath();
    ctx.ellipse(sway, -35, 30, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Spots
    ctx.fillStyle = '#aa88cc';
    ctx.beginPath();
    ctx.arc(-8 + sway, -38, 3, 0, Math.PI * 2);
    ctx.arc(6 + sway, -36, 2.5, 0, Math.PI * 2);
    ctx.arc(12 + sway, -32, 2, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#44ff88';
    ctx.beginPath();
    ctx.arc(-7 + sway, -15, 3.5, 0, Math.PI * 2);
    ctx.arc(7 + sway, -15, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // Tendrils
    ctx.strokeStyle = '#664488';
    ctx.lineWidth = 2;
    for (var ti = 0; ti < 3; ti++) {
      ctx.beginPath();
      ctx.moveTo(-15 + ti * 15 + sway, 20);
      ctx.lineTo(-18 + ti * 15 + Math.sin(frame * 0.05 + ti) * 5, 40);
      ctx.stroke();
    }
  }

  // Boss HP bar (wide)
  ctx.restore();
  var bossBarW = 60;
  ctx.fillStyle = '#300';
  ctx.fillRect(boss.x - bossBarW / 2, boss.y - 55, bossBarW, 5);
  var hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#cc2222' : (hpPct > 0.25 ? '#cc8800' : '#ff0000');
  ctx.fillRect(boss.x - bossBarW / 2, boss.y - 55, bossBarW * hpPct, 5);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.type === 'molten_golem' ? 'BLIGHT GOLEM' : 'FUNGAL TITAN', boss.x, boss.y - 60);
}

function drawMiniHP(x, y, hp, maxHp) {
  var w = 16;
  ctx.fillStyle = '#300';
  ctx.fillRect(x - w / 2, y, w, 3);
  ctx.fillStyle = hp > maxHp * 0.5 ? '#0a0' : (hp > maxHp * 0.25 ? '#aa0' : '#a00');
  ctx.fillRect(x - w / 2, y, w * Math.max(0, hp / maxHp), 3);
}

// === SIEGE DRAW (Pass 3: enhanced visuals) ===
function drawSiege() {
  // Fort interior bg with faction tint
  var fortBg = battle.defender === 1 ? '#3a2218' : '#1a3a22';
  ctx.fillStyle = fortBg;
  ctx.fillRect(0, 0, GW, GH);

  // Walls with detail
  ctx.fillStyle = '#5a4433';
  ctx.fillRect(0, 0, GW, 40);
  ctx.fillRect(0, 260, GW, 60);
  // Stone pattern
  ctx.fillStyle = '#4a3a28';
  for (var sx = 0; sx < GW; sx += 30) {
    ctx.fillRect(sx, 260, 28, 1);
    ctx.fillRect(sx + 15, 270, 28, 1);
    ctx.fillRect(sx, 30, 28, 1);
  }

  // Torches on walls
  for (var torch = 0; torch < 4; torch++) {
    var torchX = 60 + torch * 120;
    ctx.fillStyle = '#886633';
    ctx.fillRect(torchX, 35, 3, 8);
    var flicker = 0.7 + Math.sin(frame * 0.15 + torch) * 0.3;
    ctx.fillStyle = 'rgba(255,170,34,' + flicker + ')';
    ctx.beginPath();
    ctx.arc(torchX + 1.5, 33, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,220,100,' + (flicker * 0.5) + ')';
    ctx.beginPath();
    ctx.arc(torchX + 1.5, 33, 10, 0, Math.PI * 2);
    ctx.fill();
  }

  // Floor
  ctx.fillStyle = '#2a2218';
  ctx.fillRect(0, 252, GW, 8);

  // Screen progress
  ctx.fillStyle = '#444';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('Chamber ' + (siege.screen + 1) + '/3', 8, 55);

  // Timer
  ctx.fillStyle = siege.timer < 10 ? '#ff4444' : '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(Math.ceil(siege.timer) + 's', GW - 8, 55);

  // Flag at end of screen 2
  if (siege.screen === 2) {
    ctx.fillStyle = '#aa8833';
    ctx.fillRect(siege.flagX, 210, 3, 40);
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.moveTo(siege.flagX + 3, 210);
    ctx.lineTo(siege.flagX + 20, 218);
    ctx.lineTo(siege.flagX + 3, 226);
    ctx.fill();
    // Spore gem wave
    var wave = Math.sin(frame * 0.1) * 2;
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.moveTo(siege.flagX + 3, 212);
    ctx.lineTo(siege.flagX + 18, 218 + wave);
    ctx.lineTo(siege.flagX + 3, 224);
    ctx.fill();
  }

  // Exit arrow
  if (siege.enemies.length === 0 && siege.screen < 2) {
    var pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('>>>', GW - 10, 240);
    ctx.globalAlpha = 1;
  }

  // Traps
  for (var tp = 0; tp < siege.traps.length; tp++) {
    var trap = siege.traps[tp];
    if (!trap.active) continue;
    if (trap.type === 'spikes') {
      ctx.fillStyle = '#888';
      for (var sp = 0; sp < 3; sp++) {
        ctx.beginPath();
        ctx.moveTo(trap.x - 8 + sp * 8, 252);
        ctx.lineTo(trap.x - 4 + sp * 8, 240);
        ctx.lineTo(trap.x + sp * 8, 252);
        ctx.fill();
      }
    } else {
      var flash = Math.floor(trap.timer / 10) % 2;
      if (trap.timer < 30) {
        ctx.fillStyle = flash ? '#aa4444' : '#664433';
        ctx.fillRect(trap.x - 8, 42, 16, 12);
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('!', trap.x, 52);
      } else {
        ctx.fillStyle = '#664433';
        ctx.fillRect(trap.x - 8, 42, 16, 12);
      }
    }
  }

  // Enemies
  for (var ei = 0; ei < siege.enemies.length; ei++) {
    drawSiegeEnemy(siege.enemies[ei]);
  }

  // Player
  drawSiegePlayer();

  // HP display with hearts
  ctx.fillStyle = '#222';
  ctx.fillRect(8, GH - 24, 100, 14);
  for (var hi = 0; hi < siege.player.maxHp; hi++) {
    ctx.fillStyle = hi < siege.player.hp ? '#ff3333' : '#442222';
    ctx.beginPath();
    ctx.arc(20 + hi * 16, GH - 17, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Score
  ctx.fillStyle = '#a855f7';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('POOP:' + totalScore, GW - 8, GH - 14);

  // Result overlay
  if (siege.result) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, GH / 2 - 30, GW, 60);
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = siege.result === 'win' ? '#38d973' : '#e6482e';
    ctx.fillText(siege.result === 'win' ? 'GARDEN FORT TAKEN!' : 'SPORE SIEGE FAILED!', GW / 2, GH / 2 + 8);
  }
}

function drawSiegePlayer() {
  var p = siege.player;
  var c = FACTION_COLORS[battle.attacker];
  var cl = FACTION_LIGHT[battle.attacker];

  ctx.save();
  ctx.translate(p.x, p.y);

  // Body
  ctx.fillStyle = c;
  ctx.fillRect(-5, -20, 10, 20);
  // Head
  ctx.fillStyle = cl;
  ctx.beginPath();
  ctx.arc(0, -24, 5, 0, Math.PI * 2);
  ctx.fill();
  // Legs (animated)
  ctx.fillStyle = FACTION_DARK[battle.attacker];
  var legOff = p.grounded ? Math.sin(frame * 0.15) * 2 : 0;
  ctx.fillRect(-5, 0, 4, 8 + legOff);
  ctx.fillRect(1, 0, 4, 8 - legOff);

  // Attack arm with glow
  if (p.attacking) {
    ctx.fillStyle = '#ccc';
    ctx.fillRect(p.facing * 6, -16, p.facing * 14, 3);
    // Weapon glow
    ctx.fillStyle = 'rgba(255,255,200,0.4)';
    ctx.beginPath();
    ctx.arc(p.facing * 18, -15, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawSiegeEnemy(e) {
  var c = FACTION_COLORS[battle.defender];
  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.type === 'heavy') {
    // Heavy enemy: bigger, armored
    ctx.fillStyle = '#555';
    ctx.fillRect(-7, -22, 14, 22);
    ctx.fillStyle = c;
    ctx.fillRect(-6, -20, 12, 18);
    ctx.fillStyle = FACTION_LIGHT[battle.defender];
    ctx.beginPath();
    ctx.arc(0, -26, 5, 0, Math.PI * 2);
    ctx.fill();
    // Helm
    ctx.fillStyle = '#444';
    ctx.fillRect(-5, -30, 10, 4);
    // Weapon
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-e.dir * 3, -16, -e.dir * 12, 3);
    // Red glow
    ctx.fillStyle = 'rgba(255,50,50,0.15)';
    ctx.beginPath();
    ctx.arc(0, -10, 15, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Normal enemy
    ctx.fillStyle = c;
    ctx.fillRect(-5, -18, 10, 18);
    ctx.fillStyle = FACTION_LIGHT[battle.defender];
    ctx.beginPath();
    ctx.arc(0, -22, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.fillRect(-e.dir * 3, -14, -e.dir * 10, 2);
  }

  // HP bar
  if (e.hp > 1) {
    drawMiniHP(0, -34, e.hp, e.maxHp);
  }

  ctx.restore();
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Spore particles with twinkle
  for (var i = 0; i < 40; i++) {
    var stx = ((i * 73 + frame) % GW);
    var sty = ((i * 47) % GH);
    var twinkle = 0.3 + Math.sin(frame * 0.08 + i) * 0.5;
    ctx.fillStyle = 'rgba(168,85,247,' + Math.max(0, twinkle) + ')';
    ctx.fillRect(stx, sty, 2, 2);
  }

  drawBaseling(GW / 2, 90, 0, 2.5);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN VICTORY!', GW / 2, 155);

  ctx.fillStyle = '#9be0d0';
  ctx.font = '13px monospace';
  ctx.fillText('Your baseling army conquers the Gardens of Tasern!', GW / 2, 185);
  ctx.fillText('Turns: ' + turnNumber + '  |  POOP Earned: ' + totalScore, GW / 2, 210);

  // Champion (cosmetic)
  ctx.fillStyle = '#0052FF';
  ctx.font = '10px monospace';
  ctx.fillText('Champion: ' + selName + ' led your baseling army!', GW / 2, 235);

  var vpulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = vpulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = '11px monospace';
  ctx.fillText('Press any key to return to the garden', GW / 2, 280);
  ctx.globalAlpha = 1;
}

function drawGameOverScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  drawBaseling(GW / 2, 90, 1, 2.5);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN LOST', GW / 2, 155);

  ctx.fillStyle = '#dd9999';
  ctx.font = '13px monospace';
  ctx.fillText('The Blight overwhelms your baseling army!', GW / 2, 185);
  ctx.fillText('Turns survived: ' + turnNumber + '  |  POOP Earned: ' + totalScore, GW / 2, 210);

  var gpulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = gpulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = '11px monospace';
  ctx.fillText('Press any key to return to the garden', GW / 2, 280);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
