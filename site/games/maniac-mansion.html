// === MOUSE STATE ===
let mouseX = 0, mouseY = 0;
let mouseClicked = false;

const canvas = TAS.canvas;
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  mouseX = (e.clientX - rect.left) * (GW / rect.width);
  mouseY = (e.clientY - rect.top) * (GH / rect.height);
});
canvas.addEventListener('click', function(e) {
  TAS.audio.ensureAudio();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (GW / rect.width);
  mouseY = (e.clientY - rect.top) * (GH / rect.height);
  mouseClicked = true;
});
canvas.addEventListener('touchstart', function(e) {
  TAS.audio.ensureAudio();
  if (e.touches.length > 0) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    mouseX = (t.clientX - rect.left) * (GW / rect.width);
    mouseY = (t.clientY - rect.top) * (GH / rect.height);
    mouseClicked = true;
  }
}, { passive: true });

// === SAVE / LOAD ===
function saveGame() {
  try {
    const data = { currentChar, currentRoom, inventory, puzzlesSolved, charPositions, charAlive, charRoom, powerOn, ghostHelped, scientistPathIdx };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    currentChar = d.currentChar || 0;
    currentRoom = d.currentRoom || 'foyer';
    inventory = d.inventory || [[], [], []];
    puzzlesSolved = d.puzzlesSolved || {};
    charPositions = d.charPositions || [{x:200,y:160},{x:220,y:160},{x:240,y:160}];
    charAlive = d.charAlive || [true, true, true];
    charRoom = d.charRoom || ['foyer','foyer','foyer'];
    powerOn = d.powerOn || false;
    ghostHelped = d.ghostHelped || false;
    scientistPathIdx = d.scientistPathIdx || 0;
    rebuildObjectsFromPuzzles();
    return true;
  } catch(e) { console.warn('Load failed:', e); return false; }
}

function rebuildObjectsFromPuzzles() {
  roomObjects = getDefaultObjects();
  for (const key of Object.keys(puzzlesSolved)) {
    if (key.startsWith('picked_')) {
      const parts = key.replace('picked_', '').split('__');
      const room = parts[0], objId = parts[1];
      if (roomObjects[room]) {
        roomObjects[room] = roomObjects[room].filter(o => o.id !== objId);
      }
    }
  }
}

// === SHOW MESSAGE ===
function showMsg(text, duration) {
  msgText = text;
  msgTimer = duration || 3;
}

// === DIALOGUE SYSTEM ===
function startDialogue(lines) {
  dialogueLines = lines;
  dialogueIdx = 0;
  state = 'dialogue';
}

function advanceDialogue() {
  dialogueIdx++;
  if (dialogueIdx >= dialogueLines.length) {
    state = 'playing';
    dialogueLines = [];
    dialogueIdx = 0;
  }
}

// === INVENTORY HELPERS ===
function hasItem(charIdx, itemId) {
  return inventory[charIdx].indexOf(itemId) >= 0;
}

function anyHasItem(itemId) {
  return inventory.some(inv => inv.indexOf(itemId) >= 0);
}

function addItem(itemId) {
  if (!hasItem(currentChar, itemId)) {
    inventory[currentChar].push(itemId);
    TAS.audio.playTone(600, 0.1, 'sine', 0.08);
    TAS.audio.playTone(800, 0.15, 'sine', 0.06);
    showMsg('Got: ' + ALL_ITEMS[itemId].name);
  }
}

function removeItem(charIdx, itemId) {
  const idx = inventory[charIdx].indexOf(itemId);
  if (idx >= 0) inventory[charIdx].splice(idx, 1);
}

// === INTERACTION LOGIC ===
function interact(verb, obj) {
  if (!obj) return;
  const ch = CHARS[currentChar];

  // Character requirement check
  if (obj.charReq && obj.charReq !== ch.id) {
    const needed = CHARS.find(c => c.id === obj.charReq);
    showMsg(ch.name + ' can\'t do that. Maybe ' + needed.name + ' could...');
    return;
  }

  switch(verb) {
    case 'Walk To':
      if (obj.type === 'exit' || obj.type === 'climbable' || obj.type === 'high_exit') {
        changeRoom(obj.target);
      } else {
        charPositions[currentChar] = { x: Math.min(420, Math.max(30, obj.x)), y: Math.min(170, Math.max(80, obj.y + 30)) };
        showMsg(obj.desc);
      }
      break;

    case 'Pick Up':
      if (obj.type === 'pickup' && obj.item) {
        addItem(obj.item);
        const roomObjs = roomObjects[currentRoom];
        const idx = roomObjs.indexOf(obj);
        if (idx >= 0) roomObjs.splice(idx, 1);
        puzzlesSolved['picked_' + currentRoom + '__' + obj.id] = true;
      } else if (obj.type === 'container' && obj.item && !puzzlesSolved['looted_' + obj.id]) {
        addItem(obj.item);
        puzzlesSolved['looted_' + obj.id] = true;
        obj.item = null;
        obj.desc = 'Empty now. Nothing else in here.';
      } else {
        showMsg('Can\'t pick that up.');
      }
      break;

    case 'Open':
      if (obj.type === 'container') {
        if (obj.item && !puzzlesSolved['looted_' + obj.id]) {
          addItem(obj.item);
          puzzlesSolved['looted_' + obj.id] = true;
          obj.item = null;
          showMsg('Found something inside!');
        } else {
          showMsg('It\'s empty.');
        }
      } else if (obj.type === 'locked_door') {
        if (hasItem(currentChar, obj.key)) {
          showMsg('Unlocked!');
          TAS.audio.playTone(400, 0.2, 'sine', 0.08);
          puzzlesSolved['unlocked_' + obj.id] = true;
          obj.type = 'exit';
          changeRoom(obj.target);
        } else {
          showMsg('It\'s locked. Need a key...');
          TAS.audio.playTone(100, 0.2, 'square', 0.06);
        }
      } else if (obj.type === 'locked') {
        if (obj.id === 'safe' && hasItem(currentChar, 'book') && ch.id === 'brains') {
          showMsg('Brains decodes the book — the safe combination is 7-3-9!');
          puzzlesSolved['safe_opened'] = true;
          addItem('crystal');
          obj.type = 'scenery';
          obj.desc = 'The safe is open and empty.';
        } else if (obj.id === 'chest') {
          if (ch.id === 'muscles') {
            showMsg('Muscles rips the lock clean off!');
            puzzlesSolved['chest_opened'] = true;
            addItem('ghost_charm');
            obj.type = 'scenery';
            obj.desc = 'A broken chest. Empty now.';
          } else if (hasItem(currentChar, 'crowbar')) {
            showMsg('Pried it open with the crowbar!');
            puzzlesSolved['chest_opened'] = true;
            addItem('ghost_charm');
            obj.type = 'scenery';
            obj.desc = 'A broken chest. Empty now.';
          } else {
            showMsg('It\'s locked tight. Need something to force it open.');
          }
        } else {
          showMsg('It\'s locked. There must be a way...');
        }
      } else {
        showMsg('Can\'t open that.');
      }
      break;

    case 'Use':
      if (useItem) {
        handleUseItemOn(useItem, obj);
        useItem = null;
      } else if (obj.type === 'device') {
        handleDevice(obj);
      } else if (obj.type === 'final_device') {
        handleFinalDevice(obj);
      } else {
        showMsg('Use what on it? Select an inventory item first.');
      }
      break;

    case 'Talk':
      if (obj.type === 'ghost') {
        if (ghostHelped) {
          startDialogue([
            'Ghost: "You already helped me, friend. The charm protects you."',
            'Ghost: "Find the crystal, the antidote, and fix that wire."',
            'Ghost: "Your friend awaits in the secret lab below..."'
          ]);
        } else if (hasItem(currentChar, 'music_box')) {
          startDialogue([
            'Ghost: "That melody... I remember now. My favorite song..."',
            'Ghost: "Thank you for reminding me who I was."',
            'Ghost: "Take this charm. It will protect you from the monster."',
            '(The ghost fades to a peaceful shimmer)'
          ]);
          ghostHelped = true;
          removeItem(currentChar, 'music_box');
          addItem('ghost_charm');
          puzzlesSolved['ghost_helped'] = true;
        } else {
          startDialogue([
            'Ghost: "I\'ve been here so long... I can\'t remember..."',
            'Ghost: "There was a song... if only I could hear it again..."',
            'Ghost: "Find the music that reminds me who I was..."'
          ]);
        }
      } else if (obj.type === 'readable') {
        if (obj.id === 'notes') {
          startDialogue([
            '"Subject 7 (Nibbles): Spore integration at 47%"',
            '"Phase 3 requires crystal catalyst + antidote base"',
            '"Release mechanism: crystal, antidote, stable conductor"',
            '"Note: keep spare key behind the library painting"'
          ]);
          puzzlesSolved['read_notes'] = true;
        } else if (obj.id === 'sheet_music') {
          startDialogue([
            'The sheet music is written in strange notation...',
            'It seems to be the melody the ghost hums.',
            'Maybe a music box could play this tune?'
          ]);
        } else if (obj.id === 'fork_sign') {
          showMsg(obj.desc);
        } else {
          showMsg(obj.desc);
        }
      } else {
        showMsg('That doesn\'t want to talk. Rude.');
      }
      break;

    case 'Give':
      if (obj.type === 'ghost' && hasItem(currentChar, 'music_box')) {
        interact('Talk', obj);
      } else {
        showMsg('Give what to whom? Nobody wants your junk.');
      }
      break;

    case 'Push':
      if (obj.type === 'heavy') {
        if (ch.id === 'muscles') {
          showMsg('Muscles shoves it aside with ease!');
          puzzlesSolved['pushed_' + obj.id] = true;
          if (obj.target) {
            obj.type = 'exit';
            obj.desc = 'A cleared passage.';
          } else {
            obj.desc = 'Already pushed aside.';
          }
          TAS.fx.shake(3, 0.9);
        } else {
          showMsg('Too heavy! Need someone stronger...');
        }
      } else if (obj.id === 'painting') {
        if (!obj.pushed) {
          obj.pushed = true;
          showMsg('The painting swings aside revealing a hidden niche!');
          if (!puzzlesSolved['painting_key']) {
            addItem('lab_key');
            puzzlesSolved['painting_key'] = true;
          }
        } else {
          showMsg('Already pushed aside.');
        }
      } else {
        showMsg('Can\'t push that. It doesn\'t budge.');
      }
      break;

    case 'Pull':
      if (obj.id === 'chains' && ch.id === 'muscles') {
        showMsg('Muscles rips the chains from the wall! Impressive.');
        puzzlesSolved['chains_pulled'] = true;
      } else if (obj.id === 'painting') {
        interact('Push', obj);
      } else {
        showMsg('Pulling it doesn\'t help.');
      }
      break;

    default:
      showMsg(obj.desc);
  }
}

function handleUseItemOn(itemId, obj) {
  const item = ALL_ITEMS[itemId];
  if (itemId === 'tape' && obj.id === 'broken_wire') {
    showMsg('Combined the tape with the wire! Now it\'s fixed.');
    removeItem(currentChar, 'tape');
    removeItem(currentChar, 'wire');
    addItem('fixed_wire');
    puzzlesSolved['wire_fixed'] = true;
    const roomObjs = roomObjects[currentRoom];
    const idx = roomObjs.findIndex(o => o.id === 'broken_wire');
    if (idx >= 0) roomObjs.splice(idx, 1);
  } else if (itemId === 'fuse' && obj.id === 'fusebox') {
    showMsg('Inserted the fuse into the fuse box!');
    removeItem(currentChar, 'fuse');
    puzzlesSolved['fuse_installed'] = true;
    obj.desc = 'The fuse box now has a working fuse.';
  } else if (itemId === 'fuse' && obj.id === 'generator_obj') {
    showMsg('The fuse goes in the fuse box upstairs, not directly in the generator.');
  } else if (itemId === 'battery' && obj.id === 'beacon') {
    showMsg('Installed the battery! The beacon flickers to life.');
    removeItem(currentChar, 'battery');
    puzzlesSolved['beacon_powered'] = true;
  } else if (itemId === 'crowbar' && (obj.type === 'locked' || obj.type === 'breakable')) {
    if (obj.id === 'chest') {
      interact('Open', obj);
    } else if (obj.id === 'cell_door') {
      showMsg('Pried the cell door open!');
      puzzlesSolved['cell_open'] = true;
      obj.type = 'scenery';
      obj.desc = 'The cell door hangs open.';
    } else {
      showMsg('The crowbar doesn\'t work on that.');
    }
  } else if (itemId === 'ghost_charm' && obj.id === 'cell_door') {
    showMsg('The charm glows but doesn\'t help with the door.');
  } else if (itemId === 'rusty_key' && obj.type === 'locked_door' && obj.key === 'rusty_key') {
    interact('Open', obj);
  } else if (itemId === 'lab_key' && obj.id === 'locked_gate') {
    showMsg('The lab key fits! The gate swings open.');
    removeItem(currentChar, 'lab_key');
    puzzlesSolved['lab_gate_open'] = true;
    obj.type = 'exit';
    obj.desc = 'The gate is open.';
    changeRoom('secret_lab');
  } else {
    showMsg('Can\'t use ' + item.name + ' on that.');
  }
}

function handleDevice(obj) {
  if (obj.id === 'generator_obj') {
    if (puzzlesSolved['fuse_installed']) {
      showMsg('The generator roars to life! Power restored!');
      powerOn = true;
      puzzlesSolved['power_on'] = true;
      TAS.fx.flash('#44ff44', 0.3);
      TAS.audio.playTone(100, 0.5, 'sawtooth', 0.06);
    } else {
      showMsg('The generator won\'t start. A fuse is missing.');
    }
  } else if (obj.id === 'switch_panel') {
    if (powerOn) {
      showMsg('Power is flowing through the mansion!');
    } else {
      showMsg('No power. The generator needs to be running.');
    }
  } else if (obj.id === 'fusebox') {
    if (puzzlesSolved['fuse_installed']) {
      showMsg('The fuse box is working. Head to the generator.');
    } else {
      showMsg('A fuse is missing from the box.');
    }
  } else if (obj.id === 'beacon') {
    if (puzzlesSolved['beacon_powered']) {
      showMsg('The beacon pulses! A signal goes out into the night.');
      puzzlesSolved['beacon_active'] = true;
    } else {
      showMsg('No power source. Needs a battery.');
    }
  } else if (obj.id === 'panel') {
    if (CHARS[currentChar].id === 'brains') {
      showMsg('Brains hacks the panel! Security systems disabled.');
      puzzlesSolved['panel_hacked'] = true;
    } else {
      showMsg('Too complex. Only a genius could figure this out.');
    }
  } else if (obj.id === 'computer') {
    if (CHARS[currentChar].id === 'brains') {
      startDialogue([
        'Brains accesses the computer terminal...',
        '"Project Sporeling: Fungal consciousness transfer"',
        '"Subject 7 location: Sub-Level Secret Lab"',
        '"Release requires: Crystal + Antidote + Conductor"'
      ]);
    } else {
      showMsg('The screen shows gibberish. Need someone smarter.');
    }
  }
}

function handleFinalDevice(obj) {
  const ch = currentChar;
  const hasC = anyHasItem('crystal');
  const hasA = anyHasItem('antidote');
  const hasW = anyHasItem('fixed_wire');

  if (hasC && hasA && hasW) {
    showMsg('Inserting all components...');
    for (let i = 0; i < 3; i++) {
      removeItem(i, 'crystal');
      removeItem(i, 'antidote');
      removeItem(i, 'fixed_wire');
    }
    puzzlesSolved['friend_rescued'] = true;
    winState = true;
    state = 'win';
    TAS.fx.flash('#00ff88', 0.5);
    TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1047,0.3]], 150);
  } else {
    let missing = [];
    if (!hasC) missing.push('Crystal');
    if (!hasA) missing.push('Antidote');
    if (!hasW) missing.push('Fixed Wire');
    showMsg('Still need: ' + missing.join(', '));
  }
}

// === ROOM NAVIGATION ===
function changeRoom(roomId) {
  if (!ROOMS[roomId]) {
    showMsg('Can\'t go there.');
    return;
  }
  currentRoom = roomId;
  charRoom[currentChar] = roomId;
  charPositions[currentChar] = { x: 200, y: 140 };
  saveGame();
  TAS.audio.playTone(200, 0.1, 'sine', 0.04);

  // Check for scientist
  if (roomId === scientistRoom && !puzzlesSolved['panel_hacked']) {
    caught = true;
    caughtTimer = 3;
    showMsg('The Mad Scientist caught you! Sent to the dungeon!');
    TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1);
    TAS.fx.flash('#ff0000', 0.4);
  }
}

// === SCIENTIST PATROL ===
function updateScientist(dt) {
  if (puzzlesSolved['panel_hacked']) return;
  scientistTimer += dt;
  if (scientistTimer > 8) {
    scientistTimer = 0;
    scientistPathIdx = (scientistPathIdx + 1) % scientistPath.length;
    scientistRoom = scientistPath[scientistPathIdx];
    if (scientistRoom === currentRoom && charRoom[currentChar] === currentRoom) {
      caught = true;
      caughtTimer = 3;
      showMsg('The Mad Scientist found you! To the dungeon!');
      TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1);
      TAS.fx.flash('#ff0000', 0.4);
    }
  }
}

// === AMBIENT FUNGI PARTICLES ===
function updateAmbient(dt) {
  ambientTimer += dt;
  if (ambientTimer > 0.5) {
    ambientTimer = 0;
    const room = ROOMS[currentRoom];
    fungiParticles.push({
      x: Math.random() * GW,
      y: SCENE_H * 0.3 + Math.random() * SCENE_H * 0.6,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -0.2 - Math.random() * 0.3,
      life: 1,
      size: 1 + Math.random() * 2,
      color: room ? room.glow : '#44ff44'
    });
  }
  for (let i = fungiParticles.length - 1; i >= 0; i--) {
    const p = fungiParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= dt * 0.4;
    if (p.life <= 0) fungiParticles.splice(i, 1);
  }
}

// === DRAWING FUNCTIONS ===
function drawRoom() {
  const room = ROOMS[currentRoom];
  if (!room) return;

  // Background
  ctx.fillStyle = room.bg;
  ctx.fillRect(0, 0, GW, SCENE_H);

  // Floor
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, SCENE_H - 40, GW, 40);
  ctx.strokeStyle = room.glow;
  ctx.globalAlpha = 0.3;
  ctx.strokeRect(0, SCENE_H - 40, GW, 1);
  ctx.globalAlpha = 1;

  // Walls
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.strokeRect(2, 2, GW - 4, SCENE_H - 4);

  // Glowing fungi patches
  const seed = currentRoom.length * 7;
  for (let i = 0; i < 5; i++) {
    const fx = ((seed + i * 97) % 400) + 20;
    const fy = ((seed + i * 53) % (SCENE_H - 80)) + 30;
    const fs = 3 + (i % 3) * 2;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.15;
    ctx.fillStyle = room.glow;
    ctx.beginPath();
    ctx.arc(fx, fy, fs, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.1;
    ctx.beginPath();
    ctx.arc(fx, fy, fs * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw ambient particles
  for (const p of fungiParticles) {
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Room name
  ctx.fillStyle = room.glow;
  ctx.globalAlpha = 0.6;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(room.name, 8, 14);
  ctx.globalAlpha = 1;

  // Exit indicators
  const exits = room.exits;
  ctx.font = '8px monospace';
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  if (exits.north || exits.up) { ctx.fillText('^ ' + (exits.north ? ROOMS[exits.north].name : 'Up'), GW/2, 18); }
  if (exits.south || exits.down) { ctx.fillText('v ' + (exits.south ? ROOMS[exits.south].name : 'Down'), GW/2, SCENE_H - 8); }
  if (exits.east) { ctx.textAlign = 'right'; ctx.fillText(ROOMS[exits.east].name + ' >', GW - 8, SCENE_H/2); }
  if (exits.west) { ctx.textAlign = 'left'; ctx.fillText('< ' + ROOMS[exits.west].name, 8, SCENE_H/2); }
}

function drawObjects() {
  const objs = roomObjects[currentRoom] || [];
  for (const obj of objs) {
    const isHover = (obj === hoverObject);
    const glow = isHover ? 1 : 0.6;

    ctx.globalAlpha = glow;
    switch(obj.type) {
      case 'exit': case 'climbable': case 'high_exit':
        ctx.fillStyle = '#335533';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = isHover ? '#88ff88' : '#446644';
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        break;
      case 'locked_door':
        ctx.fillStyle = '#553322';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = isHover ? '#ff8844' : '#664433';
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(obj.x + obj.w/2 - 2, obj.y + obj.h/2, 4, 4);
        break;
      case 'pickup':
        ctx.fillStyle = ALL_ITEMS[obj.item] ? ALL_ITEMS[obj.item].color : '#fff';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, Math.min(obj.w, obj.h)/2, 0, Math.PI*2);
        ctx.fill();
        if (isHover) { ctx.strokeStyle = '#fff'; ctx.stroke(); }
        break;
      case 'container':
        ctx.fillStyle = '#443322';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = isHover ? '#ffaa66' : '#554433';
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        break;
      case 'ghost':
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05) * 0.2;
        ctx.fillStyle = '#aaccff';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, obj.w/2, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = glow;
        break;
      case 'goal':
        ctx.fillStyle = '#224422';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = '#44ff44';
        ctx.lineWidth = 2;
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        ctx.lineWidth = 1;
        // Draw friend inside
        ctx.fillStyle = '#88ffaa';
        ctx.beginPath();
        ctx.arc(obj.x + obj.w/2, obj.y + obj.h/2, 10, 0, Math.PI*2);
        ctx.fill();
        break;
      case 'device': case 'final_device': case 'hackable':
        ctx.fillStyle = '#222244';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = isHover ? '#88aaff' : '#334466';
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
        if (powerOn || obj.type === 'hackable') {
          ctx.fillStyle = '#44ff44';
          ctx.fillRect(obj.x + 3, obj.y + 3, 4, 4);
        }
        break;
      default:
        ctx.fillStyle = '#332222';
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
        ctx.strokeStyle = isHover ? '#aaa' : '#444';
        ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
    }
    ctx.globalAlpha = 1;

    // Label on hover
    if (isHover) {
      ctx.fillStyle = '#fff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(obj.name, obj.x + obj.w/2, obj.y - 4);
    }
  }
}

function drawCharacter(idx) {
  if (!charAlive[idx]) return;
  if (charRoom[idx] !== currentRoom) return;

  const ch = CHARS[idx];
  const pos = charPositions[idx];
  const isCurrent = (idx === currentChar);
  const bob = Math.sin(frame * 0.06 + idx) * 2;

  // Body
  ctx.fillStyle = ch.color;
  ctx.globalAlpha = isCurrent ? 1 : 0.5;
  // Head
  ctx.beginPath();
  ctx.arc(pos.x, pos.y - 18 + bob, 8, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillRect(pos.x - 5, pos.y - 10 + bob, 10, 16);
  // Legs
  ctx.fillRect(pos.x - 5, pos.y + 6 + bob, 4, 8);
  ctx.fillRect(pos.x + 1, pos.y + 6 + bob, 4, 8);

  // Name tag
  if (isCurrent) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ch.name, pos.x, pos.y - 30 + bob);
    // Selection indicator
    ctx.strokeStyle = ch.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y + 18 + bob, 6, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawScientist() {
  if (scientistRoom !== currentRoom) return;
  if (puzzlesSolved['panel_hacked']) return;

  const sx = 350 + Math.sin(frame * 0.04) * 20;
  const sy = 120;
  const bob = Math.sin(frame * 0.08) * 2;

  // White coat
  ctx.fillStyle = '#ddddcc';
  ctx.fillRect(sx - 7, sy - 8 + bob, 14, 20);
  // Head (wild hair)
  ctx.fillStyle = '#888888';
  ctx.beginPath();
  ctx.arc(sx, sy - 16 + bob, 9, 0, Math.PI * 2);
  ctx.fill();
  // Goggles
  ctx.fillStyle = '#ff4444';
  ctx.fillRect(sx - 6, sy - 18 + bob, 5, 4);
  ctx.fillRect(sx + 1, sy - 18 + bob, 5, 4);
  // Evil grin
  ctx.strokeStyle = '#333';
  ctx.beginPath();
  ctx.arc(sx, sy - 12 + bob, 4, 0, Math.PI);
  ctx.stroke();

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Dr. Sporax', sx, sy - 30 + bob);
}

function drawVerbBar() {
  const barY = GH - VERB_BAR_H - INV_BAR_H;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, barY, GW, VERB_BAR_H);
  ctx.strokeStyle = '#333';
  ctx.strokeRect(0, barY, GW, VERB_BAR_H);

  for (let i = 0; i < VERBS.length; i++) {
    const col = i % 4;
    const row = Math.floor(i / 4);
    const vx = col * VERB_W;
    const vy = barY + row * VERB_H;
    const isSelected = (VERBS[i] === selectedVerb);
    const isHovering = mouseX >= vx && mouseX < vx + VERB_W && mouseY >= vy && mouseY < vy + VERB_H;

    if (isSelected) {
      ctx.fillStyle = '#334455';
      ctx.fillRect(vx, vy, VERB_W, VERB_H);
    } else if (isHovering) {
      ctx.fillStyle = '#222233';
      ctx.fillRect(vx, vy, VERB_W, VERB_H);
    }

    ctx.strokeStyle = '#444';
    ctx.strokeRect(vx, vy, VERB_W, VERB_H);

    ctx.fillStyle = isSelected ? '#ffdd44' : (isHovering ? '#aaa' : '#888');
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(VERBS[i], vx + VERB_W/2, vy + VERB_H/2 + 3);
  }
}

function drawInventory() {
  const invY = GH - INV_BAR_H;
  ctx.fillStyle = '#0f0f1f';
  ctx.fillRect(0, invY, GW, INV_BAR_H);
  ctx.strokeStyle = '#333';
  ctx.strokeRect(0, invY, GW, INV_BAR_H);

  const inv = inventory[currentChar];
  const slotW = 50;
  const startX = 4;
  for (let i = 0; i < Math.min(inv.length, 9); i++) {
    const item = ALL_ITEMS[inv[i]];
    if (!item) continue;
    const sx = startX + i * (slotW + 2);
    const isHovering = mouseX >= sx && mouseX < sx + slotW && mouseY >= invY && mouseY < invY + INV_BAR_H;
    const isUsing = (useItem === inv[i]);

    ctx.fillStyle = isUsing ? '#334400' : (isHovering ? '#222244' : '#111122');
    ctx.fillRect(sx, invY + 2, slotW, INV_BAR_H - 4);
    ctx.strokeStyle = isUsing ? '#88ff00' : (isHovering ? '#666' : '#333');
    ctx.strokeRect(sx, invY + 2, slotW, INV_BAR_H - 4);

    ctx.fillStyle = item.color;
    ctx.beginPath();
    ctx.arc(sx + 12, invY + INV_BAR_H/2, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#ccc';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(item.name.substring(0, 7), sx + 20, invY + INV_BAR_H/2 + 3);
  }

  // Character indicator
  ctx.textAlign = 'right';
  ctx.fillStyle = CHARS[currentChar].color;
  ctx.font = 'bold 10px monospace';
  ctx.fillText('[' + (currentChar+1) + '] ' + CHARS[currentChar].name, GW - 6, invY + INV_BAR_H/2 + 4);
}

function drawMessage() {
  if (msgTimer <= 0 || !msgText) return;
  const alpha = Math.min(1, msgTimer);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  const tw = ctx.measureText(msgText).width + 20;
  const mx = (GW - tw) / 2;
  ctx.fillRect(mx, SCENE_H - 30, tw, 22);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(mx, SCENE_H - 30, tw, 22);
  ctx.fillStyle = '#eee';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgText, GW/2, SCENE_H - 16);
  ctx.globalAlpha = 1;
}

function drawDialogue() {
  if (state !== 'dialogue') return;
  const line = dialogueLines[dialogueIdx] || '';

  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(20, SCENE_H - 60, GW - 40, 50);
  ctx.strokeStyle = '#44ff88';
  ctx.strokeRect(20, SCENE_H - 60, GW - 40, 50);

  ctx.fillStyle = '#eeffee';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  // Word wrap
  const words = line.split(' ');
  let lines = [''];
  let li = 0;
  for (const w of words) {
    if (ctx.measureText(lines[li] + w).width > GW - 70) {
      li++;
      lines[li] = '';
    }
    lines[li] += w + ' ';
  }
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], 30, SCENE_H - 45 + i * 13);
  }

  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('[click to continue]', GW - 30, SCENE_H - 15);
}

function drawCaughtScreen() {
  ctx.fillStyle = 'rgba(80,0,0,0.7)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CAUGHT!', GW/2, GH/2 - 20);
  ctx.fillStyle = '#ffcccc';
  ctx.font = '12px monospace';
  ctx.fillText('Dr. Sporax sends you to the dungeon!', GW/2, GH/2 + 10);
}

// === TITLE SCREEN ===
function drawTitle() {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, GW, GH);

  // Spooky mansion silhouette
  ctx.fillStyle = '#1a0f1a';
  ctx.fillRect(140, 100, 200, 130);
  ctx.fillRect(160, 70, 30, 30);
  ctx.fillRect(290, 60, 30, 40);
  ctx.fillRect(180, 50, 120, 50);
  // Windows
  for (let i = 0; i < 6; i++) {
    const wx = 160 + (i % 3) * 60;
    const wy = 110 + Math.floor(i / 3) * 50;
    ctx.fillStyle = '#33ff66';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04 + i) * 0.2;
    ctx.fillRect(wx, wy, 15, 20);
  }
  ctx.globalAlpha = 1;

  // Fungi glow
  for (let i = 0; i < 8; i++) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.02 + i * 0.7) * 0.1;
    ctx.fillStyle = '#44ff88';
    ctx.beginPath();
    ctx.arc(100 + i * 40, 235 + Math.sin(i) * 5, 3 + Math.sin(frame * 0.03 + i) * 2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MANIAC MANSION', GW/2 + 2, 32);
  ctx.fillStyle = '#44ff88';
  ctx.fillText('MANIAC MANSION', GW/2, 30);

  ctx.fillStyle = '#cc88ff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('FUNGAL FRENZY', GW/2, 50);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW/2, 68);

  // Characters
  for (let i = 0; i < 3; i++) {
    const cx = 160 + i * 60;
    const cy = 270;
    ctx.fillStyle = CHARS[i].color;
    ctx.beginPath();
    ctx.arc(cx, cy - 10, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(cx - 5, cy, 10, 14);
    ctx.fillStyle = '#ccc';
    ctx.font = '8px monospace';
    ctx.fillText(CHARS[i].name, cx, cy + 26);
  }

  // Prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLICK TO START', GW/2, 300);
  ctx.globalAlpha = 1;

  // Load game option
  if (localStorage.getItem(SAVE_KEY)) {
    ctx.fillStyle = '#66aaff';
    ctx.font = '9px monospace';
    ctx.fillText('[SPACE = Continue Saved Game]', GW/2, 315);
  }
}

function drawWinScreen() {
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RESCUED!', GW/2, 60);

  ctx.fillStyle = '#aaffcc';
  ctx.font = '12px monospace';
  ctx.fillText('You freed Nibbles from the spore pod!', GW/2, 100);
  ctx.fillText('The fungal mansion crumbles behind you...', GW/2, 120);

  // Happy characters
  for (let i = 0; i < 3; i++) {
    if (!charAlive[i]) continue;
    const cx = 150 + i * 60;
    const cy = 180;
    const bob = Math.sin(frame * 0.08 + i) * 3;
    ctx.fillStyle = CHARS[i].color;
    ctx.beginPath();
    ctx.arc(cx, cy - 10 + bob, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.fillRect(cx - 6, cy + 2 + bob, 12, 18);
  }
  // Nibbles (rescued friend)
  ctx.fillStyle = '#88ffaa';
  ctx.beginPath();
  ctx.arc(330, 170 + Math.sin(frame * 0.06) * 3, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.fillText('Nibbles', 330, 200);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Dr. Sporax\'s plans are foiled!', GW/2, 240);
  ctx.fillText('The spore infection is contained... for now.', GW/2, 258);

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLICK TO PLAY AGAIN', GW/2, 295);
  ctx.globalAlpha = 1;
}

function drawGameOver() {
  ctx.fillStyle = '#1a0505';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GW/2, 100);

  ctx.fillStyle = '#ffaaaa';
  ctx.font = '12px monospace';
  ctx.fillText('All baselings have been captured!', GW/2, 140);
  ctx.fillText('Dr. Sporax wins this round...', GW/2, 160);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('The spores spread unchecked.', GW/2, 200);
  ctx.fillText('Nibbles remains trapped forever.', GW/2, 220);

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('CLICK TO TRY AGAIN', GW/2, 280);
  ctx.globalAlpha = 1;
}

// === CLICK HANDLING ===
function handleClick() {
  if (!mouseClicked) return;
  mouseClicked = false;

  if (state === 'title') {
    if (TAS.input.keys[' '] || TAS.input.keys['Space']) {
      if (loadGame()) {
        state = 'playing';
        return;
      }
    }
    state = 'playing';
    return;
  }

  if (state === 'win') {
    localStorage.removeItem(SAVE_KEY);
    resetGame();
    state = 'title';
    return;
  }

  if (state === 'gameOver') {
    localStorage.removeItem(SAVE_KEY);
    resetGame();
    state = 'title';
    return;
  }

  if (state === 'dialogue') {
    advanceDialogue();
    TAS.audio.playTone(400, 0.05, 'sine', 0.04);
    return;
  }

  if (state !== 'playing') return;
  if (caught) return;

  const barY = GH - VERB_BAR_H - INV_BAR_H;
  const invY = GH - INV_BAR_H;

  // Check verb bar click
  if (mouseY >= barY && mouseY < barY + VERB_BAR_H) {
    const col = Math.floor(mouseX / VERB_W);
    const row = Math.floor((mouseY - barY) / VERB_H);
    const idx = row * 4 + col;
    if (idx >= 0 && idx < VERBS.length) {
      selectedVerb = VERBS[idx];
      useItem = null;
      TAS.audio.playTone(500, 0.05, 'sine', 0.04);
    }
    return;
  }

  // Check inventory click
  if (mouseY >= invY) {
    const inv = inventory[currentChar];
    const slotW = 50;
    const startX = 4;
    for (let i = 0; i < Math.min(inv.length, 9); i++) {
      const sx = startX + i * (slotW + 2);
      if (mouseX >= sx && mouseX < sx + slotW) {
        if (selectedVerb === 'Use') {
          useItem = inv[i];
          showMsg('Use ' + ALL_ITEMS[inv[i]].name + ' on what?');
        } else {
          showMsg(ALL_ITEMS[inv[i]].desc);
        }
        TAS.audio.playTone(300, 0.05, 'sine', 0.04);
        return;
      }
    }
    return;
  }

  // Check scene click (objects or exits)
  if (mouseY < SCENE_H) {
    // Check exit clicks (edges)
    const room = ROOMS[currentRoom];
    if (room.exits) {
      if (mouseY < 25 && (room.exits.north || room.exits.up)) {
        changeRoom(room.exits.north || room.exits.up);
        return;
      }
      if (mouseY > SCENE_H - 25 && (room.exits.south || room.exits.down)) {
        changeRoom(room.exits.south || room.exits.down);
        return;
      }
      if (mouseX < 25 && room.exits.west) {
        changeRoom(room.exits.west);
        return;
      }
      if (mouseX > GW - 25 && room.exits.east) {
        changeRoom(room.exits.east);
        return;
      }
    }

    // Check object clicks
    const objs = roomObjects[currentRoom] || [];
    for (let i = objs.length - 1; i >= 0; i--) {
      const obj = objs[i];
      if (mouseX >= obj.x && mouseX < obj.x + obj.w && mouseY >= obj.y && mouseY < obj.y + obj.h) {
        interact(selectedVerb, obj);
        TAS.audio.playTone(350, 0.05, 'sine', 0.03);
        return;
      }
    }

    // Walk to empty space
    if (selectedVerb === 'Walk To') {
      charPositions[currentChar] = { x: TAS.math.clamp(mouseX, 20, GW - 20), y: TAS.math.clamp(mouseY, 60, SCENE_H - 20) };
      TAS.audio.playTone(200, 0.03, 'sine', 0.02);
    }
  }
}

// === KEYBOARD ===
function handleKeys() {
  // Character switching
  if (TAS.input.keys['1'] || TAS.input.keys['Digit1']) {
    if (charAlive[0]) { currentChar = 0; currentRoom = charRoom[0]; showMsg('Switched to Sparky'); }
    TAS.input.keys['1'] = false; TAS.input.keys['Digit1'] = false;
  }
  if (TAS.input.keys['2'] || TAS.input.keys['Digit2']) {
    if (charAlive[1]) { currentChar = 1; currentRoom = charRoom[1]; showMsg('Switched to Brains'); }
    TAS.input.keys['2'] = false; TAS.input.keys['Digit2'] = false;
  }
  if (TAS.input.keys['3'] || TAS.input.keys['Digit3']) {
    if (charAlive[2]) { currentChar = 2; currentRoom = charRoom[2]; showMsg('Switched to Muscles'); }
    TAS.input.keys['3'] = false; TAS.input.keys['Digit3'] = false;
  }

  // Space to load on title
  if (state === 'title' && (TAS.input.keys[' '] || TAS.input.keys['Space'])) {
    if (loadGame()) { state = 'playing'; }
    TAS.input.keys[' '] = false; TAS.input.keys['Space'] = false;
  }

  // Touch B button to swap character
  if (TAS.input.touch.b) {
    let next = (currentChar + 1) % 3;
    let tries = 0;
    while (!charAlive[next] && tries < 3) { next = (next + 1) % 3; tries++; }
    if (charAlive[next]) { currentChar = next; currentRoom = charRoom[next]; showMsg('Switched to ' + CHARS[next].name); }
    TAS.input.touch.b = false;
  }
}

// === HOVER DETECTION ===
function updateHover() {
  hoverObject = null;
  if (mouseY >= SCENE_H) return;
  const objs = roomObjects[currentRoom] || [];
  for (let i = objs.length - 1; i >= 0; i--) {
    const obj = objs[i];
    if (mouseX >= obj.x && mouseX < obj.x + obj.w && mouseY >= obj.y && mouseY < obj.y + obj.h) {
      hoverObject = obj;
      return;
    }
  }
}

// === RESET ===
function resetGame() {
  currentChar = 0;
  currentRoom = 'foyer';
  selectedVerb = 'Walk To';
  inventory = [[], [], []];
  puzzlesSolved = {};
  charPositions = [{x:200,y:160},{x:220,y:160},{x:240,y:160}];
  charAlive = [true, true, true];
  charRoom = ['foyer', 'foyer', 'foyer'];
  roomObjects = getDefaultObjects();
  hoverObject = null;
  msgText = '';
  msgTimer = 0;
  scientistRoom = 'lab_hall';
  scientistTimer = 0;
  scientistPathIdx = 0;
  powerOn = false;
  ghostHelped = false;
  useItem = null;
  caught = false;
  caughtTimer = 0;
  winState = false;
  fungiParticles = [];
}

// === COMBINE ITEMS (in inventory) ===
function checkCombinations() {
  const inv = inventory[currentChar];
  if (inv.indexOf('tape') >= 0 && inv.indexOf('wire') >= 0) {
    // Auto-combine hint
    if (selectedVerb === 'Use' && useItem === 'tape') {
      // Will be handled when clicking wire in scene
    }
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title' || state === 'win' || state === 'gameOver') {
    handleClick();
    return;
  }

  if (state === 'dialogue') {
    handleClick();
    return;
  }

  if (state === 'playing') {
    handleKeys();
    updateHover();
    updateScientist(dt);
    updateAmbient(dt);

    if (msgTimer > 0) msgTimer -= dt;

    // Handle caught state
    if (caught) {
      caughtTimer -= dt;
      if (caughtTimer <= 0) {
        caught = false;
        currentRoom = 'dungeon';
        charRoom[currentChar] = 'dungeon';
        charPositions[currentChar] = { x: 150, y: 130 };
        saveGame();
      }
      handleClick();
      return;
    }

    handleClick();

    // Check game over
    const aliveCount = charAlive.filter(Boolean).length;
    if (aliveCount === 0) {
      state = 'gameOver';
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'win') {
    drawWinScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawRoom();
  drawObjects();
  for (let i = 0; i < 3; i++) drawCharacter(i);
  drawScientist();

  TAS.particles.draw();
  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  drawVerbBar();
  drawInventory();
  drawMessage();

  if (state === 'dialogue') drawDialogue();
  if (caught) drawCaughtScreen();

  // Status line
  const statusY = GH - VERB_BAR_H - INV_BAR_H - 12;
  if (hoverObject && !caught && state === 'playing') {
    ctx.fillStyle = '#ddd';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(selectedVerb + ' ' + hoverObject.name, GW/2, statusY);
  } else if (useItem) {
    ctx.fillStyle = '#88ff00';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Use ' + ALL_ITEMS[useItem].name + ' on...', GW/2, statusY);
  }

  // Floor indicator
  if (ROOMS[currentRoom]) {
    const floorNames = { 0: 'Basement', 1: 'Floor 1', 2: 'Floor 2', 3: 'Floor 3' };
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(floorNames[ROOMS[currentRoom].floor] || '', GW - 6, 14);
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
