<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>

<script src="baseling-player.js"></script>

<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 256, GH = 240;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b','c'], labels: { a: 'JUMP', b: 'SHOOT', c: 'WEAP' } });

const TILE = 16;
const COLS = 16, ROWS = 15;
const GRAVITY = 600;
const BASE_MAX_HP = 28;
const MAX_WEAPON_E = 28;
const BASE_BOSS_HP = 28;
const IFRAME_TIME = 1.5;
const SHOT_SPEED = 200;
const BASE_PLAYER_SPEED = 80;
const JUMP_FORCE = -230;
const BASE_SLIDE_SPEED = 140;
const SLIDE_TIME = 0.4;

// ============================================================
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Single source of stat math: TAS.player.mults() -> {moveSpeed,health,damage,luck,swim},
// already clamped to the single-player band (0.8–1.6). Wired per ARCADE-STATS:
//   moveSpeed -> movement + shot cadence,  health -> HP/defense,  damage -> shot damage,
//   luck -> drop chance.  swim unused (no water).  Not a wager game -> default band.
// statB stays as the game's existing shape so downstream code is unchanged; it's just
// recomputed from the bounded multipliers. recomputeStats() is called again after the
// player picks a baseling on the title screen.
var statB = { damage: 1, speed: 1, hpMult: 1, cooldown: 1, luck: 1, scoreMult: 1 };
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB = {
    damage: m.damage,        // PWR -> shot damage
    speed: m.moveSpeed,      // SPD -> move/slide speed
    hpMult: m.health,        // STA -> max HP + acts as defense divisor below
    cooldown: 1 / m.moveSpeed, // SPD -> faster shots (lower cooldown). >1 speed = quicker.
    luck: m.luck,            // LCK -> pickup drop chance
    scoreMult: 1             // score is not a stat in the new system
  };
}
recomputeStats();

// Derived constants from stats
function getMaxHP() { return Math.floor(BASE_MAX_HP * statB.hpMult); }
function getPlayerSpeed() { return Math.floor(BASE_PLAYER_SPEED * statB.speed); }
function getSlideSpeed() { return Math.floor(BASE_SLIDE_SPEED * statB.speed); }
function getShotCooldown() { return 0.2 * statB.cooldown; }
function getBossHP() { return BASE_BOSS_HP; }
function getDropChance() { return 0.3 * statB.luck; }

// ============================================================
// STATE
// ============================================================
let state = 'title';
let frame = 0;
let lives = 3;
let eTanks = 0;
let score = 0;
let bossesBeaten = [false,false,false,false,false,false,false,false];
let currentStage = -1;
let currentWeapon = 0; // 0 = poop pellet (default)
let weaponEnergy = [MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E];
let selectCursor = 0;
let pauseOpen = false;
let weaponMenuCursor = 0;
let ngPlus = 0; // New Game+ level
let hasMyco = false; // Myco Burst unlocked
let picking = false; // baseling character-select overlay is open

// Initialize the shared player module at boot (silent — no wallet popup). When the
// roster resolves, refresh stats so the title preview/HUD reflect the picked baseling.
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[poop-man] player init failed:', e && e.message); });
}

// Player
let player = null;
let bullets = [];
let enemies = [];
let pickups = [];
let boss = null;
let bossActive = false;
let screenX = 0; // current screen in stage
let stageData = null;
let checkpoint = 0;
let iframeTimer = 0;
let deathTimer = 0;
let deathParticles = []; // pixel explosion
let bossIntroTimer = 0;
let weaponGetTimer = 0;
let weaponGetId = -1;
let fortressStage = 0;
let fortressRefight = 0;
let stageClearTimer = 0;
let stageClearScore = 0;

// ============================================================
// BOSS DATA
// ============================================================
const BOSSES = [
  { name: 'Mold Guard', color: '#f4b41b', bgColor: '#332200', weapon: 'Gold Spore', weakTo: 5 },
  { name: 'Slime Creep', color: '#38d973', bgColor: '#003311', weapon: 'Garden Flood', weakTo: 7 },
  { name: 'Spore Chaser', color: '#a855f7', bgColor: '#220033', weapon: 'Spore Shield', weakTo: 4 },
  { name: 'Shard Beetle', color: '#3cacd7', bgColor: '#001133', weapon: 'Crystal Shard', weakTo: 6 },
  { name: 'Ember Mite', color: '#e6482e', bgColor: '#330500', weapon: 'Flame Burst', weakTo: 2 },
  { name: 'Toxic Sentry', color: '#38d973', bgColor: '#003322', weapon: 'Reactor Beam', weakTo: 3 },
  { name: 'Rot Lurker', color: '#3cacd7', bgColor: '#002222', weapon: 'Slime Bomb', weakTo: 0 },
  { name: 'Fungi Lord', color: '#88cc44', bgColor: '#112200', weapon: 'Fungi Spread', weakTo: 1 }
];

// Stage background detail configs
const STAGE_BG = [
  { detail: 'coins',   accent: '#f4b41b22' },  // Mold Guard: floating POOP tokens
  { detail: 'bubbles', accent: '#38d97322' },  // Slime Creep: rising garden bubbles
  { detail: 'spores',  accent: '#a855f722' },  // Spore Chaser: drifting spores
  { detail: 'shards',  accent: '#3cacd722' },  // Shard Beetle: crystal facets
  { detail: 'embers',  accent: '#e6482e22' },  // Ember Mite: rising embers
  { detail: 'pulses',  accent: '#38d97322' },  // Toxic Sentry: energy pulses
  { detail: 'drips',   accent: '#3cacd722' },  // Rot Lurker: slime drips
  { detail: 'vines',   accent: '#88cc4422' },  // Fungi Lord: growing vines
  { detail: 'skulls',  accent: '#e6482e22' }   // Dr. Spore's Fortress: skull motifs
];

// Weakness chain: Mold Guard(0)->weak to Toxic Sentry(5), Slime Creep(1)->weak to Fungi Lord(7), Spore Chaser(2)->weak to Ember Mite(4),
// Shard Beetle(3)->weak to Rot Lurker(6), Ember Mite(4)->weak to Spore Chaser(2), Toxic Sentry(5)->weak to Shard Beetle(3),
// Rot Lurker(6)->weak to Mold Guard(0), Fungi Lord(7)->weak to Slime Creep(1)

// ============================================================
// LEVEL GENERATION
// ============================================================
function generateStage(stageIdx) {
  // Each stage = 4 screens of 16x15 tiles
  const screens = [];
  const seed = stageIdx * 1000 + ngPlus * 50000;
  function seededRand(n) { let x = Math.sin(seed + n) * 10000; return x - Math.floor(x); }

  for (let s = 0; s < 4; s++) {
    const tiles = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        if (r === ROWS - 1) { row.push(1); continue; } // floor
        if (r === 0 || c === 0 || c === COLS - 1) { row.push(r === 0 ? 1 : 0); continue; } // ceiling, walls optional
        row.push(0);
      }
      tiles.push(row);
    }

    // Add platforms based on stage theme
    const rng = (i) => seededRand(s * 500 + i);
    const numPlats = 4 + Math.floor(rng(0) * 4);
    for (let i = 0; i < numPlats; i++) {
      const px = 2 + Math.floor(rng(i * 3 + 1) * 11);
      const py = 3 + Math.floor(rng(i * 3 + 2) * 8);
      const pw = 2 + Math.floor(rng(i * 3 + 3) * 3);
      for (let j = 0; j < pw && px + j < COLS - 1; j++) {
        tiles[py][px + j] = 1;
      }
    }

    // Add pits in later screens
    if (s > 0) {
      const pitX = 4 + Math.floor(rng(100) * 6);
      const pitW = 2 + Math.floor(rng(101) * 2);
      for (let j = 0; j < pitW && pitX + j < COLS - 1; j++) {
        tiles[ROWS - 1][pitX + j] = 0;
      }
    }

    // Ladders
    if (s > 0) {
      const ladX = 3 + Math.floor(rng(200) * 10);
      const ladTop = 3 + Math.floor(rng(201) * 4);
      const ladBot = ladTop + 3 + Math.floor(rng(202) * 3);
      for (let r = ladTop; r <= Math.min(ladBot, ROWS - 2); r++) {
        tiles[r][ladX] = 2; // ladder tile
      }
    }

    // Toxic goo pools (Pass 2) - screens 1 and 2
    if (s > 0 && s < 3) {
      const gooCount = 1 + Math.floor(rng(300) * 2);
      for (let g = 0; g < gooCount; g++) {
        const gx = 3 + Math.floor(rng(310 + g * 3) * 10);
        const gw = 2 + Math.floor(rng(311 + g * 3) * 2);
        for (let j = 0; j < gw && gx + j < COLS - 1; j++) {
          // Only place goo on floor level where there IS floor
          if (tiles[ROWS - 2][gx + j] === 0 && tiles[ROWS - 1][gx + j] === 1) {
            tiles[ROWS - 2][gx + j] = 4; // toxic goo tile
          }
        }
      }
    }

    // Mycelial network platforms (Pass 2) - moving vine bridges
    if (s >= 1 && s <= 2) {
      const vineY = 5 + Math.floor(rng(400) * 4);
      const vineX = 4 + Math.floor(rng(401) * 6);
      const vineLen = 3 + Math.floor(rng(402) * 2);
      for (let j = 0; j < vineLen && vineX + j < COLS - 1; j++) {
        if (tiles[vineY][vineX + j] === 0) {
          tiles[vineY][vineX + j] = 5; // mycelial network tile
        }
      }
    }

    // Clear spawn area on first screen
    if (s === 0) {
      for (let r = ROWS - 4; r < ROWS - 1; r++) {
        for (let c = 1; c < 4; c++) tiles[r][c] = 0;
      }
    }

    // Clear boss area on last screen
    if (s === 3) {
      for (let r = 2; r < ROWS - 1; r++) {
        for (let c = 2; c < COLS - 2; c++) {
          if (r > 4) tiles[r][c] = 0;
        }
      }
      // Boss floor
      for (let c = 1; c < COLS - 1; c++) tiles[ROWS - 1][c] = 1;
      // Boss door
      tiles[ROWS - 3][COLS - 2] = 3; // door tile (visual only)
    }

    screens.push(tiles);
  }

  return { screens, theme: stageIdx };
}

// ============================================================
// MYCELIAL NETWORK (moving platforms)
// ============================================================
let mycelialPlatforms = [];

function spawnMycelialPlatforms(screenIdx) {
  mycelialPlatforms = [];
  if (!stageData || screenIdx >= stageData.screens.length) return;
  const screen = stageData.screens[screenIdx];
  // Find vine tile runs and create moving platforms
  for (let r = 0; r < ROWS; r++) {
    let runStart = -1;
    for (let c = 0; c <= COLS; c++) {
      const t = c < COLS ? screen[r][c] : 0;
      if (t === 5) {
        if (runStart < 0) runStart = c;
      } else {
        if (runStart >= 0) {
          mycelialPlatforms.push({
            baseX: runStart * TILE, y: r * TILE, w: (c - runStart) * TILE, h: 6,
            x: runStart * TILE, speed: 20 + Math.random() * 15,
            dir: 1, range: 24, originX: runStart * TILE,
            color: '#44aa33', animT: Math.random() * 6
          });
          runStart = -1;
        }
      }
    }
  }
}

function updateMycelialPlatforms(dt) {
  for (const mp of mycelialPlatforms) {
    mp.animT += dt;
    mp.x += mp.speed * mp.dir * dt;
    if (mp.x > mp.originX + mp.range || mp.x < mp.originX - mp.range) {
      mp.dir *= -1;
    }
  }
}

function checkMycelialCollision(ent) {
  for (const mp of mycelialPlatforms) {
    if (ent.vy >= 0 &&
        ent.x + ent.w > mp.x && ent.x < mp.x + mp.w &&
        ent.y + ent.h >= mp.y && ent.y + ent.h <= mp.y + mp.h + 4) {
      ent.y = mp.y - ent.h;
      ent.vy = 0;
      ent.grounded = true;
      ent.x += mp.speed * mp.dir * (1 / 60); // carry with platform
      return true;
    }
  }
  return false;
}

// ============================================================
// ENEMY SPAWNING
// ============================================================
function spawnEnemiesForScreen(screenIdx) {
  enemies = [];
  if (screenIdx === 3) return; // boss screen

  const rng = (i) => { let x = Math.sin(currentStage * 7777 + screenIdx * 333 + i) * 10000; return x - Math.floor(x); };
  const count = 3 + Math.floor(rng(0) * 3);
  const colors = [BOSSES[currentStage < 8 ? currentStage : 0].color, '#ff6666', '#66ffaa', '#ffaa44'];
  const hpMult = ngPlus > 0 ? 1.5 : 1;

  for (let i = 0; i < count; i++) {
    const ex = 60 + rng(i * 4 + 1) * 160;
    const ey = 40 + rng(i * 4 + 2) * 140;
    const etype = Math.floor(rng(i * 4 + 3) * 3);
    enemies.push({
      x: ex, y: ey, w: 12, h: 12,
      vx: (rng(i * 4 + 4) > 0.5 ? 1 : -1) * (30 + rng(i * 4 + 5) * 40),
      vy: 0, hp: Math.ceil((etype === 2 ? 3 : (etype === 1 ? 2 : 1)) * hpMult),
      type: etype, color: colors[etype],
      shootTimer: 1 + rng(i * 4 + 6) * 2,
      dir: 1, animT: 0
    });
  }

  // Spawn mycelial platforms
  spawnMycelialPlatforms(screenIdx);
}

// ============================================================
// PLAYER
// ============================================================
function resetPlayer() {
  const maxHP = getMaxHP();
  player = {
    x: 24, y: GH - TILE * 2 - 16,
    w: 12, h: 16, vx: 0, vy: 0,
    dir: 1, grounded: false, onLadder: false,
    shooting: false, shootTimer: 0,
    sliding: false, slideTimer: 0,
    hp: maxHP, maxHp: maxHP, alive: true,
    animFrame: 0, animTimer: 0
  };
  iframeTimer = 0;
  bullets = [];
  deathParticles = [];
}

// ============================================================
// TILE COLLISION
// ============================================================
function getTile(sx, r, c) {
  if (!stageData || sx < 0 || sx >= stageData.screens.length) return 1;
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return (r >= ROWS) ? 1 : 0;
  return stageData.screens[sx][r][c];
}

function isSolid(sx, r, c) {
  const t = getTile(sx, r, c);
  return t === 1;
}

function isLadder(sx, r, c) {
  return getTile(sx, r, c) === 2;
}

function isToxicGoo(sx, r, c) {
  return getTile(sx, r, c) === 4;
}

function tileCollideX(ent, sx) {
  const left = Math.floor(ent.x / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);
  const top = Math.floor(ent.y / TILE);
  const bot = Math.floor((ent.y + ent.h - 1) / TILE);

  for (let r = top; r <= bot; r++) {
    if (isSolid(sx, r, left)) { ent.x = (left + 1) * TILE; ent.vx = 0; return true; }
    if (isSolid(sx, r, right)) { ent.x = right * TILE - ent.w; ent.vx = 0; return true; }
  }
  return false;
}

function tileCollideY(ent, sx) {
  const left = Math.floor(ent.x / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);
  const top = Math.floor(ent.y / TILE);
  const bot = Math.floor((ent.y + ent.h - 1) / TILE);

  ent.grounded = false;
  if (ent.vy > 0) {
    for (let c = left; c <= right; c++) {
      if (isSolid(sx, bot, c)) {
        ent.y = bot * TILE - ent.h;
        ent.vy = 0;
        ent.grounded = true;
        return true;
      }
    }
  } else if (ent.vy < 0) {
    for (let c = left; c <= right; c++) {
      if (isSolid(sx, top, c)) {
        ent.y = (top + 1) * TILE;
        ent.vy = 0;
        return true;
      }
    }
  }
  return false;
}

// ============================================================
// SHOOTING (Pass 1: STR scales damage, WIS scales cooldown)
// ============================================================
let poopOnlyKills = {}; // track boss kills with poop pellet only per stage

function shoot() {
  if (bullets.length >= 3 && currentWeapon === 0 && !hasMyco) return;
  if (currentWeapon > 0 && currentWeapon <= 8 && weaponEnergy[currentWeapon - 1] <= 0) return;
  if (currentWeapon === 9 && weaponEnergy[8] !== undefined && weaponEnergy[8] <= 0) return;

  player.shooting = true;
  player.shootTimer = getShotCooldown();

  const dmgMult = statB.damage; // STR-based damage multiplier

  if (currentWeapon === 0) {
    // Poop pellet
    bullets.push({
      x: player.x + (player.dir > 0 ? player.w : -6),
      y: player.y + 6, w: 6, h: 4,
      vx: SHOT_SPEED * player.dir, vy: 0,
      damage: Math.max(1, Math.floor(1 * dmgMult)), type: 0, color: '#7a444a', life: 2
    });
    TAS.audio.playTone(800, 0.05, 'square', 0.06);
  } else if (currentWeapon === 9) {
    // Myco Burst (Pass 2) - spread of 3 spore projectiles
    if (weaponEnergy[8] !== undefined) weaponEnergy[8]--;
    const wx = player.x + (player.dir > 0 ? player.w : -8);
    const wy = player.y + 5;
    for (let a = -1; a <= 1; a++) {
      bullets.push({
        x: wx, y: wy, w: 7, h: 7,
        vx: SHOT_SPEED * 0.75 * player.dir, vy: a * 50,
        damage: Math.max(1, Math.floor(2 * dmgMult)), type: 9, color: '#38d973', life: 2,
        spore: true
      });
    }
    TAS.audio.playTone(550, 0.1, 'sine', 0.06, 900);
    TAS.audio.playTone(700, 0.08, 'triangle', 0.04, 400);
  } else {
    weaponEnergy[currentWeapon - 1]--;
    const wx = player.x + (player.dir > 0 ? player.w : -8);
    const wy = player.y + 5;

    switch(currentWeapon) {
      case 1: // Gold Shot - bouncing
        bullets.push({ x: wx, y: wy, w: 6, h: 6, vx: SHOT_SPEED * 0.9 * player.dir, vy: -80, damage: Math.max(1, Math.floor(2 * dmgMult)), type: 1, color: '#ffcc00', life: 3, bounces: 3 });
        TAS.audio.playTone(1200, 0.08, 'sine', 0.06, 600);
        break;
      case 2: // LP Flood - ground wave
        bullets.push({ x: wx, y: player.y + player.h - 6, w: 10, h: 6, vx: SHOT_SPEED * 0.7 * player.dir, vy: 0, damage: Math.max(1, Math.floor(2 * dmgMult)), type: 2, color: '#33cc66', life: 2, ground: true });
        TAS.audio.playTone(200, 0.12, 'sawtooth', 0.05, 100);
        break;
      case 3: // Spore Shield - orbiting
        for (let i = 0; i < 4; i++) {
          bullets.push({ x: player.x, y: player.y, w: 5, h: 5, vx: 0, vy: 0, damage: Math.max(1, Math.floor(1 * dmgMult)), type: 3, color: '#a855f7', life: 3, orbit: true, angle: i * Math.PI / 2, orbitR: 24 });
        }
        TAS.audio.playTone(500, 0.15, 'sine', 0.04);
        break;
      case 4: // Crystal Shard - piercing beam
        bullets.push({ x: wx, y: wy, w: 20, h: 3, vx: SHOT_SPEED * 1.5 * player.dir, vy: 0, damage: Math.max(1, Math.floor(3 * dmgMult)), type: 4, color: '#44aaff', life: 1.5, pierce: true });
        TAS.audio.playTone(1500, 0.06, 'triangle', 0.07);
        break;
      case 5: // Flame Burst - arcing fireball
        bullets.push({ x: wx, y: wy, w: 8, h: 8, vx: SHOT_SPEED * 0.6 * player.dir, vy: -120, damage: Math.max(1, Math.floor(3 * dmgMult)), type: 5, color: '#ff4422', life: 2, gravity: 200 });
        TAS.audio.playTone(300, 0.1, 'sawtooth', 0.06, 100);
        break;
      case 6: // Reactor Beam - charged shot
        bullets.push({ x: wx, y: wy - 2, w: 16, h: 8, vx: SHOT_SPEED * 1.2 * player.dir, vy: 0, damage: Math.max(1, Math.floor(4 * dmgMult)), type: 6, color: '#44ff88', life: 1.5 });
        TAS.audio.playTone(600, 0.15, 'square', 0.08, 1200);
        break;
      case 7: // Slime Bomb - sticky explosion
        bullets.push({ x: wx, y: wy, w: 8, h: 8, vx: SHOT_SPEED * 0.5 * player.dir, vy: -60, damage: Math.max(1, Math.floor(2 * dmgMult)), type: 7, color: '#22ccbb', life: 2.5, gravity: 150, explode: true });
        TAS.audio.playTone(250, 0.08, 'sine', 0.05, 150);
        break;
      case 8: // Fungi Spread - 3-way
        for (let a = -1; a <= 1; a++) {
          bullets.push({ x: wx, y: wy, w: 5, h: 5, vx: SHOT_SPEED * 0.8 * player.dir, vy: a * 60, damage: Math.max(1, Math.floor(2 * dmgMult)), type: 8, color: '#88cc44', life: 1.5 });
        }
        TAS.audio.playTone(700, 0.06, 'square', 0.05, 400);
        break;
    }
  }
}

// ============================================================
// BOSS AI
// ============================================================
function createBoss(idx) {
  const b = BOSSES[idx];
  const hp = getBossHP();
  return {
    x: 200, y: GH - TILE - 24, w: 20, h: 24,
    vx: 0, vy: 0, hp: hp, maxHp: hp,
    pattern: 0, patternTimer: 2,
    attackTimer: 0, jumping: false,
    dir: -1, color: b.color, idx: idx,
    grounded: true, phase: 0,
    shootCooldown: 0, shots: []
  };
}

function updateBoss(dt) {
  if (!boss || !bossActive) return;

  boss.patternTimer -= dt;
  boss.shootCooldown -= dt;

  // Gravity
  boss.vy += GRAVITY * dt;
  boss.y += boss.vy * dt;
  if (boss.y >= GH - TILE - boss.h) {
    boss.y = GH - TILE - boss.h;
    boss.vy = 0;
    boss.grounded = true;
  }

  // Face player
  boss.dir = player.x < boss.x ? -1 : 1;

  // Pattern timer
  if (boss.patternTimer <= 0) {
    boss.pattern = (boss.pattern + 1) % 3;
    boss.patternTimer = 2 + Math.random() * 1.5;
    boss.phase = 0;
  }

  // Execute patterns
  switch (boss.pattern) {
    case 0: // Jump and shoot
      if (boss.phase === 0 && boss.grounded) {
        boss.vy = -280;
        boss.grounded = false;
        boss.phase = 1;
      }
      if (boss.phase === 1 && boss.shootCooldown <= 0) {
        bossShoot();
        boss.shootCooldown = 0.4;
        boss.phase = 2;
      }
      break;
    case 1: // Rush toward player
      const dir = player.x < boss.x ? -1 : 1;
      boss.x += dir * 100 * dt;
      if (boss.phase === 0 && boss.shootCooldown <= 0) {
        bossShoot();
        boss.shootCooldown = 0.8;
        boss.phase = 1;
      }
      break;
    case 2: // Triple shot
      if (boss.shootCooldown <= 0 && boss.phase < 3) {
        bossShoot();
        boss.shootCooldown = 0.3;
        boss.phase++;
      }
      break;
  }

  // Keep in bounds
  boss.x = TAS.math.clamp(boss.x, TILE, GW - TILE - boss.w);

  // Update boss shots
  for (let i = boss.shots.length - 1; i >= 0; i--) {
    const s = boss.shots[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.life -= dt;
    if (s.life <= 0 || s.x < 0 || s.x > GW) { boss.shots.splice(i, 1); continue; }

    // Hit player
    if (iframeTimer <= 0 && TAS.hit.rectOverlap(s.x, s.y, s.w, s.h, player.x, player.y, player.w, player.h)) {
      damagePlayer(s.damage || 3);
      boss.shots.splice(i, 1);
    }
  }
}

function bossShoot() {
  if (!boss) return;
  const sx = boss.x + (boss.dir > 0 ? boss.w : -6);
  const sy = boss.y + 8;
  boss.shots.push({ x: sx, y: sy, w: 8, h: 6, vx: boss.dir * 150, vy: 0, life: 2, damage: 3 });
  TAS.audio.playTone(400, 0.08, 'sawtooth', 0.05, 200);
}

// ============================================================
// DAMAGE & DEATH (Pass 3: death pixel explosion)
// ============================================================
function damagePlayer(amount) {
  if (iframeTimer > 0 || !player.alive) return;
  player.hp -= amount;
  iframeTimer = IFRAME_TIME;
  TAS.fx.flash('#fff', 0.4);
  TAS.fx.shake(4, 0.85);
  TAS.audio.playTone(200, 0.15, 'square', 0.08, 80);

  if (player.hp <= 0) {
    player.hp = 0;
    player.alive = false;
    deathTimer = 2.5;
    // Pixel explosion (Pass 3)
    deathParticles = [];
    const cx = player.x + player.w / 2;
    const cy = player.y + player.h / 2;
    const bodyColor = currentWeapon === 0 ? '#7a444a' :
      ['#ffcc00','#33cc66','#a855f7','#44aaff','#ff4422','#44ff88','#22ccbb','#88cc44'][currentWeapon - 1];
    const colors = [bodyColor, '#fff', '#ff4444', '#222'];
    for (let i = 0; i < 24; i++) {
      const angle = (Math.PI * 2 / 24) * i + (Math.random() - 0.5) * 0.3;
      const speed = 60 + Math.random() * 80;
      deathParticles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 40,
        color: colors[i % colors.length],
        size: 2 + Math.floor(Math.random() * 2),
        life: 1.5 + Math.random() * 0.5
      });
    }
    TAS.particles.spawn(cx, cy, '#ff4444', 20, 3, { gravity: 1.5 });
    TAS.audio.playNoise(0.3, 0.1, 400);
    TAS.audio.playTone(150, 0.3, 'sawtooth', 0.06, 50);
  }
}

function damageBoss(amount) {
  if (!boss) return;
  boss.hp -= amount;
  TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, boss.color, 8, 2);
  TAS.audio.playTone(600, 0.05, 'square', 0.06);

  if (boss.hp <= 0) {
    boss.hp = 0;
    bossActive = false;
    // Boss death explosion
    TAS.fx.flash('#fff', 0.6);
    TAS.fx.shake(8, 0.9);
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        if (boss) TAS.particles.spawn(
          boss.x + Math.random() * boss.w,
          boss.y + Math.random() * boss.h,
          boss.color, 5, 3, { gravity: 1 }
        );
      }, i * 50);
    }
    TAS.audio.playMelody([[800,0.1],[600,0.1],[400,0.1],[200,0.2]], 100);

    // Check if killed with only poop pellets for Myco Burst
    if (currentStage >= 0 && currentStage < 8 && poopOnlyKills[currentStage]) {
      hasMyco = true;
      // Ensure weaponEnergy has slot for Myco Burst
      if (weaponEnergy.length < 9) weaponEnergy.push(MAX_WEAPON_E);
      else weaponEnergy[8] = MAX_WEAPON_E;
    }

    // Stage clear sequence (Pass 3)
    setTimeout(() => {
      if (currentStage >= 0 && currentStage < 8) {
        bossesBeaten[currentStage] = true;
        weaponGetId = currentStage;
        weaponGetTimer = 3;
        stageClearTimer = 2.5;
        stageClearScore = 0;
        state = 'stageClear';
        addScore(1000);
        saveProg();
      }
    }, 1500);
  }
}

// INT-based score multiplier (Pass 1)
function addScore(amount) {
  score += Math.floor(amount * statB.scoreMult);
}

// ============================================================
// UPDATE PLAYING
// ============================================================
function updatePlaying(dt) {
  if (!player || !player.alive) {
    // Update death particles (Pass 3)
    for (let i = deathParticles.length - 1; i >= 0; i--) {
      const p = deathParticles[i];
      p.vy += 200 * dt; // gravity on particles
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0) deathParticles.splice(i, 1);
    }

    deathTimer -= dt;
    if (deathTimer <= 0) {
      lives--;
      if (lives < 0) {
        state = 'gameOver';
        return;
      }
      // Respawn at checkpoint
      resetPlayer();
      screenX = checkpoint;
      spawnEnemiesForScreen(screenX);
      if (boss) { boss.hp = getBossHP(); boss.shots = []; bossActive = screenX === 3; }
    }
    return;
  }

  iframeTimer = Math.max(0, iframeTimer - dt);

  // Weapon menu toggle
  if (TAS.input.keys['Tab'] || TAS.input.keys['KeyQ'] || TAS.input.touch.c) {
    if (!pauseOpen) {
      pauseOpen = true;
      weaponMenuCursor = currentWeapon;
    }
  }
  if (pauseOpen) {
    updateWeaponMenu(dt);
    return;
  }

  const keys = TAS.input.keys;
  const tch = TAS.input.touch;
  const PLAYER_SPEED = getPlayerSpeed();
  const SLIDE_SPEED = getSlideSpeed();

  // Slide (DEX scales speed via getSlideSpeed)
  if (player.sliding) {
    player.slideTimer -= dt;
    player.vx = SLIDE_SPEED * player.dir;
    if (player.slideTimer <= 0) {
      player.sliding = false;
      player.h = 16;
      player.y -= 6;
    }
  } else if (player.onLadder) {
    // Ladder movement
    player.vy = 0;
    player.vx = 0;
    if (keys['ArrowUp'] || keys['KeyW'] || tch.up) player.vy = -80;
    if (keys['ArrowDown'] || keys['KeyS'] || tch.down) player.vy = 80;
    if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) { player.onLadder = false; player.vx = -PLAYER_SPEED; }
    if (keys['ArrowRight'] || keys['KeyD'] || tch.right) { player.onLadder = false; player.vx = PLAYER_SPEED; }
    if (keys['Space'] || keys['KeyZ'] || tch.a) { player.onLadder = false; player.vy = JUMP_FORCE * 0.6; }
  } else {
    // Normal movement (DEX scales speed)
    player.vx = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) { player.vx = -PLAYER_SPEED; player.dir = -1; }
    if (keys['ArrowRight'] || keys['KeyD'] || tch.right) { player.vx = PLAYER_SPEED; player.dir = 1; }

    // Jump (variable height)
    if ((keys['Space'] || keys['KeyZ'] || tch.a) && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      TAS.audio.playTone(400, 0.05, 'square', 0.04, 600);
    }
    // Variable jump - cut short if released
    if (!(keys['Space'] || keys['KeyZ'] || tch.a) && player.vy < JUMP_FORCE * 0.4) {
      player.vy = JUMP_FORCE * 0.4;
    }

    // Slide (down + jump while grounded)
    if ((keys['ArrowDown'] || keys['KeyS'] || tch.down) && player.grounded && !player.sliding) {
      if (keys['Space'] || keys['KeyZ'] || tch.a) {
        player.sliding = true;
        player.slideTimer = SLIDE_TIME;
        player.h = 10;
        player.y += 6;
        TAS.audio.playNoise(0.08, 0.03, 800);
      }
    }

    // Ladder check
    if ((keys['ArrowUp'] || keys['KeyW'] || tch.up) && !player.sliding) {
      const col = Math.floor((player.x + player.w / 2) / TILE);
      const row = Math.floor((player.y + player.h / 2) / TILE);
      if (isLadder(screenX, row, col)) {
        player.onLadder = true;
        player.x = col * TILE + (TILE - player.w) / 2;
        player.vy = 0;
      }
    }

    // Gravity
    if (!player.grounded) {
      player.vy += GRAVITY * dt;
    }
  }

  // Shoot (WIS scales cooldown)
  if ((keys['KeyX'] || keys['Shift'] || tch.b) && player.shootTimer <= 0 && !player.sliding) {
    shoot();
  }
  player.shootTimer = Math.max(0, player.shootTimer - dt);

  // Apply movement
  player.x += player.vx * dt;
  tileCollideX(player, screenX);
  player.y += player.vy * dt;
  tileCollideY(player, screenX);

  // Mycelial platform collision
  if (!player.grounded && player.vy >= 0) {
    checkMycelialCollision(player);
  }

  // Toxic goo check (Pass 2)
  const pCol = Math.floor((player.x + player.w / 2) / TILE);
  const pRow = Math.floor((player.y + player.h) / TILE);
  if (isToxicGoo(screenX, pRow, pCol) || isToxicGoo(screenX, pRow - 1, pCol)) {
    // Damage reduced by CON (hpMult acts as defense here)
    const gooDmg = Math.max(1, Math.floor(2 / statB.hpMult));
    if (iframeTimer <= 0) {
      damagePlayer(gooDmg);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h, '#33ff33', 5, 1, { size: 2 });
    }
  }

  // Ladder gravity override
  if (player.onLadder) {
    player.grounded = false;
    const col = Math.floor((player.x + player.w / 2) / TILE);
    const row = Math.floor((player.y + player.h) / TILE);
    if (!isLadder(screenX, row, col) && !isLadder(screenX, row - 1, col)) {
      player.onLadder = false;
    }
  }

  // Screen transitions
  if (player.x > GW - 4) {
    if (screenX < stageData.screens.length - 1) {
      screenX++;
      player.x = 8;
      checkpoint = screenX;
      spawnEnemiesForScreen(screenX);
      if (screenX === 3 && !bossActive && boss && boss.hp > 0) {
        bossActive = true;
        bossIntroTimer = 2.0;
        state = 'bossIntro';
      }
    }
  }
  if (player.x < -4) {
    if (screenX > 0) {
      screenX--;
      player.x = GW - player.w - 8;
      spawnEnemiesForScreen(screenX);
    }
  }

  // Pit death
  if (player.y > GH + 16) {
    damagePlayer(getMaxHP());
  }

  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }

  // Update bullets
  updateBullets(dt);

  // Update enemies
  updateEnemies(dt);

  // Update boss
  if (bossActive) updateBoss(dt);

  // Update pickups
  updatePickups(dt);

  // Update mycelial platforms
  updateMycelialPlatforms(dt);

  // Particles
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
}

// ============================================================
// BULLETS UPDATE
// ============================================================
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];

    if (b.orbit) {
      b.angle += dt * 4;
      b.x = player.x + player.w / 2 + Math.cos(b.angle) * b.orbitR;
      b.y = player.y + player.h / 2 + Math.sin(b.angle) * b.orbitR;
    } else {
      if (b.gravity) b.vy += b.gravity * dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Bouncing (Gold Shot)
      if (b.bounces !== undefined && b.y > GH - TILE - b.h) {
        b.y = GH - TILE - b.h;
        b.vy = -Math.abs(b.vy) * 0.8 - 60;
        b.bounces--;
        if (b.bounces < 0) { bullets.splice(i, 1); continue; }
      }

      // Ground wave stays on floor
      if (b.ground) {
        b.y = GH - TILE - b.h;
        // Check floor exists
        const col = Math.floor(b.x / TILE);
        if (!isSolid(screenX, ROWS - 1, col)) { bullets.splice(i, 1); continue; }
      }

      // Myco Burst spore trail (Pass 2)
      if (b.spore && frame % 3 === 0) {
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#38d973', 1, 0.8, { size: 1 });
      }
    }

    b.life -= dt;
    if (b.life <= 0 || b.x < -16 || b.x > GW + 16 || b.y < -16 || b.y > GH + 16) {
      // Slime bomb explosion on death
      if (b.explode && b.life <= 0) {
        TAS.particles.spawn(b.x, b.y, b.color, 12, 3, { size: 3 });
        // Damage nearby enemies
        for (const e of enemies) {
          if (TAS.math.dist(b.x, b.y, e.x, e.y) < 30) {
            e.hp -= b.damage;
          }
        }
        if (boss && bossActive && TAS.math.dist(b.x, b.y, boss.x + boss.w / 2, boss.y + boss.h / 2) < 35) {
          const dmg = boss.idx === BOSSES[currentStage]?.weakTo ? b.damage * 2 : b.damage;
          damageBoss(dmg);
        }
      }
      bullets.splice(i, 1);
      continue;
    }

    // Hit enemies
    let hitSomething = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
        e.hp -= b.damage;
        if (e.hp <= 0) {
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, e.color, 10, 2);
          addScore(100);
          // Drop pickup chance (CHA-based via luck)
          if (Math.random() < getDropChance()) {
            const pickType = pickupTypeRoll();
            pickups.push({ x: e.x, y: e.y, type: pickType, life: 5 });
          }
          enemies.splice(j, 1);
          TAS.audio.playTone(1000, 0.06, 'square', 0.05, 500);
        }
        if (!b.pierce) hitSomething = true;
        break;
      }
    }

    // Hit boss
    if (!hitSomething && boss && bossActive && TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, boss.x, boss.y, boss.w, boss.h)) {
      const weakIdx = BOSSES[boss.idx].weakTo;
      const isWeak = (currentWeapon - 1) === weakIdx || (b.type - 1) === weakIdx;
      const dmg = isWeak ? b.damage * 2 : b.damage;
      damageBoss(dmg);
      if (!b.pierce) hitSomething = true;

      // Track if only poop pellets used against this boss
      if (b.type !== 0) {
        poopOnlyKills[currentStage] = false;
      }
    }

    if (hitSomething && !b.pierce) { bullets.splice(i, 1); }
  }
}

// CHA-based pickup type roll (Pass 2: Tasern pickups mixed in)
function pickupTypeRoll() {
  const r = Math.random();
  const luckFactor = statB.luck;
  // Higher luck = better items
  if (r < 0.05 * luckFactor) return 'lpToken';      // POOP Token (rare)
  if (r < 0.10 * luckFactor) return 'reactorCore';  // Garden Seed
  if (r < 0.18 * luckFactor) return 'sporeShield';  // Spore Gem
  if (r < 0.25) return 'eTank';
  if (r < 0.40) return 'weaponE';
  if (r < 0.65) return 'bigE';
  return 'smallE';
}

// ============================================================
// ENEMIES UPDATE
// ============================================================
function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.animT += dt;

    // Movement
    e.x += e.vx * dt;
    if (e.x < TILE || e.x > GW - TILE - e.w) { e.vx *= -1; e.dir *= -1; }

    // Type-specific behavior
    if (e.type === 1) {
      // Flying sine wave
      e.y += Math.sin(e.animT * 3) * 30 * dt;
    } else if (e.type === 2) {
      // Shooter
      e.shootTimer -= dt;
      if (e.shootTimer <= 0 && player.alive) {
        e.shootTimer = 1.5 + Math.random();
        const dir = player.x < e.x ? -1 : 1;
        bullets.push({
          x: e.x + e.w / 2, y: e.y + e.h / 2, w: 5, h: 5,
          vx: dir * 120, vy: 0, damage: 0, type: -1, color: '#ff6666', life: 2, enemy: true
        });
      }
    }

    // Gravity for ground enemies
    if (e.type === 0) {
      e.vy += GRAVITY * dt;
      e.y += e.vy * dt;
      const row = Math.floor((e.y + e.h) / TILE);
      const col = Math.floor((e.x + e.w / 2) / TILE);
      if (isSolid(screenX, row, col)) {
        e.y = row * TILE - e.h;
        e.vy = 0;
      }
    }

    // Enemy bullets hitting player
    if (e.type !== 2) {
      // Contact damage
      if (iframeTimer <= 0 && player.alive && TAS.hit.rectOverlap(e.x, e.y, e.w, e.h, player.x, player.y, player.w, player.h)) {
        damagePlayer(2);
      }
    }
  }

  // Check enemy bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.enemy && player.alive && iframeTimer <= 0) {
      if (TAS.hit.rectOverlap(b.x, b.y, b.w, b.h, player.x, player.y, player.w, player.h)) {
        damagePlayer(2);
        bullets.splice(i, 1);
      }
    }
  }
}

// ============================================================
// PICKUPS UPDATE (Pass 2: Tasern pickups added)
// ============================================================
let sporeShieldTimer = 0;

function updatePickups(dt) {
  // Spore shield decay
  if (sporeShieldTimer > 0) sporeShieldTimer -= dt;

  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }

    if (TAS.hit.rectOverlap(p.x, p.y, 10, 10, player.x, player.y, player.w, player.h)) {
      const maxHP = getMaxHP();
      if (p.type === 'smallE') {
        player.hp = Math.min(maxHP, player.hp + 4);
      } else if (p.type === 'bigE') {
        player.hp = Math.min(maxHP, player.hp + 10);
      } else if (p.type === 'eTank') {
        eTanks = Math.min(4, eTanks + 1);
      } else if (p.type === 'weaponE') {
        if (currentWeapon > 0 && currentWeapon <= 8) {
          weaponEnergy[currentWeapon - 1] = Math.min(MAX_WEAPON_E, weaponEnergy[currentWeapon - 1] + 7);
        }
      } else if (p.type === 'sporeShield') {
        // Spore Gem pickup: temp damage reduction (scales with CON)
        sporeShieldTimer = 5 + Math.floor(statB.hpMult * 3);
        TAS.audio.playMelody([[400,0.05],[600,0.05],[800,0.05]], 60);
        TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#a855f7', 12, 2, { size: 2 });
      } else if (p.type === 'reactorCore') {
        // Garden Seed: full weapon energy restore
        for (let w = 0; w < weaponEnergy.length; w++) {
          weaponEnergy[w] = MAX_WEAPON_E;
        }
        TAS.audio.playMelody([[500,0.06],[700,0.06],[900,0.06],[1100,0.08]], 70);
        TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#44ff88', 15, 2.5, { size: 3 });
      } else if (p.type === 'lpToken') {
        // POOP Token: bonus score + brief invincibility
        addScore(500);
        iframeTimer = Math.max(iframeTimer, 3);
        TAS.audio.playMelody([[800,0.06],[1000,0.06],[1200,0.06],[1400,0.1]], 80);
        TAS.fx.flash('#f4b41b', 0.3);
        TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#f4b41b', 20, 3, { size: 2 });
      }
      TAS.audio.playTone(1200, 0.08, 'sine', 0.05, 1600);
      pickups.splice(i, 1);
    }
  }
}

// Spore shield damage reduction applied in damagePlayer
const _origDamagePlayer = damagePlayer;
damagePlayer = function(amount) {
  if (sporeShieldTimer > 0) {
    amount = Math.max(1, Math.floor(amount * 0.5));
  }
  _origDamagePlayer(amount);
};

// ============================================================
// WEAPON MENU (Pass 2: Myco Burst added)
// ============================================================
let menuReleased = false;
function updateWeaponMenu(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;
  const menuSize = hasMyco ? 10 : 9;

  if (!keys['Tab'] && !keys['KeyQ'] && !tch.c) {
    menuReleased = true;
  }

  if (keys['ArrowUp'] || tch.up) {
    if (!keys._menuUp) { weaponMenuCursor = (weaponMenuCursor - 1 + menuSize) % menuSize; keys._menuUp = true; }
  } else { keys._menuUp = false; }

  if (keys['ArrowDown'] || tch.down) {
    if (!keys._menuDown) { weaponMenuCursor = (weaponMenuCursor + 1) % menuSize; keys._menuDown = true; }
  } else { keys._menuDown = false; }

  // Confirm
  if ((keys['Enter'] || keys['KeyX'] || tch.b) || (menuReleased && (keys['Tab'] || keys['KeyQ'] || tch.c))) {
    if (menuReleased) {
      // Can only select weapons we have
      if (weaponMenuCursor === 0 || (weaponMenuCursor >= 1 && weaponMenuCursor <= 8 && bossesBeaten[weaponMenuCursor - 1]) || (weaponMenuCursor === 9 && hasMyco)) {
        currentWeapon = weaponMenuCursor;
      }
      pauseOpen = false;
      menuReleased = false;
    }
  }

  // Use E-Tank
  if ((keys['KeyE'] || keys['ShiftRight']) && eTanks > 0 && player.hp < getMaxHP()) {
    eTanks--;
    player.hp = getMaxHP();
    TAS.audio.playMelody([[600,0.08],[800,0.08],[1000,0.08],[1200,0.12]], 80);
  }
}

// ============================================================
// STAGE SELECT
// ============================================================
let selectRepeat = 0;
function updateStageSelect(dt) {
  selectRepeat -= dt;
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  if (selectRepeat <= 0) {
    if (keys['ArrowRight'] || tch.right) { selectCursor = (selectCursor % 4 === 3) ? selectCursor - 3 : selectCursor + 1; selectRepeat = 0.2; }
    if (keys['ArrowLeft'] || tch.left) { selectCursor = (selectCursor % 4 === 0) ? selectCursor + 3 : selectCursor - 1; selectRepeat = 0.2; }
    if (keys['ArrowDown'] || tch.down) { selectCursor = (selectCursor + 4) % 8; selectRepeat = 0.2; }
    if (keys['ArrowUp'] || tch.up) { selectCursor = (selectCursor + 4) % 8; selectRepeat = 0.2; }
  }

  if (keys['Enter'] || keys['Space'] || keys['KeyZ'] || tch.a) {
    startStage(selectCursor);
  }
}

// ============================================================
// START STAGE
// ============================================================
function startStage(idx) {
  currentStage = idx;
  stageData = generateStage(idx);
  screenX = 0;
  checkpoint = 0;
  resetPlayer();
  // CON bonus starting e-tanks
  eTanks = Math.max(eTanks, Math.floor(statB.lives));
  // CON bonus lives at game start
  if (lives === 3) lives += Math.floor(statB.lives);
  spawnEnemiesForScreen(0);
  boss = createBoss(idx);
  bossActive = false;
  bullets = [];
  pickups = [];
  poopOnlyKills[idx] = true; // assume poop only until proven otherwise
  state = 'playing';
  TAS.audio.playMelody([[400,0.06],[600,0.06],[800,0.1]], 80);
}

// ============================================================
// DRAW FUNCTIONS
// ============================================================
function drawStageBackground(themeIdx) {
  const bgConf = STAGE_BG[Math.min(themeIdx, STAGE_BG.length - 1)];
  const themeColor = themeIdx < 8 ? BOSSES[themeIdx].color : '#ff4444';
  const t = frame * 0.02;

  ctx.fillStyle = bgConf.accent;
  switch (bgConf.detail) {
    case 'coins':
      for (let i = 0; i < 10; i++) {
        const bx = ((frame * 0.15 + i * 30) % (GW + 20)) - 10;
        const by = 20 + i * 22 + Math.sin(t + i * 0.8) * 8;
        ctx.fillRect(Math.floor(bx), Math.floor(by), 6, 8);
      }
      break;
    case 'bubbles':
      for (let i = 0; i < 12; i++) {
        const bx = 15 + i * 21 + Math.sin(t * 1.3 + i) * 6;
        const by = GH - ((frame * 0.4 + i * 25) % (GH + 10));
        ctx.beginPath();
        ctx.arc(Math.floor(bx), Math.floor(by), 3 + i % 3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'spores':
      for (let i = 0; i < 14; i++) {
        const bx = ((frame * 0.1 + i * 20) % (GW + 10)) - 5;
        const by = 10 + i * 16 + Math.sin(t * 0.7 + i * 1.2) * 12;
        ctx.beginPath();
        ctx.arc(Math.floor(bx), Math.floor(by), 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'shards':
      for (let i = 0; i < 8; i++) {
        const bx = 10 + i * 32;
        const by = 30 + i * 24 + Math.sin(t + i) * 5;
        ctx.save();
        ctx.translate(Math.floor(bx), Math.floor(by));
        ctx.rotate(t * 0.5 + i);
        ctx.fillRect(-4, -2, 8, 4);
        ctx.restore();
      }
      break;
    case 'embers':
      for (let i = 0; i < 15; i++) {
        const bx = 8 + i * 17 + Math.sin(t + i * 0.9) * 5;
        const by = GH - ((frame * 0.5 + i * 18) % (GH + 10));
        ctx.fillRect(Math.floor(bx), Math.floor(by), 2, 2);
      }
      break;
    case 'pulses':
      for (let i = 0; i < 6; i++) {
        const bx = GW / 2 + Math.cos(t + i * 1.05) * (40 + i * 15);
        const by = GH / 2 + Math.sin(t + i * 1.05) * (30 + i * 12);
        const r = 4 + Math.sin(t * 2 + i) * 2;
        ctx.beginPath();
        ctx.arc(Math.floor(bx), Math.floor(by), Math.floor(r), 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'drips':
      for (let i = 0; i < 10; i++) {
        const bx = 12 + i * 25;
        const by = ((frame * 0.3 + i * 30) % (GH + 10)) - 5;
        ctx.fillRect(Math.floor(bx), Math.floor(by), 2, 6 + i % 3);
      }
      break;
    case 'vines':
      ctx.strokeStyle = bgConf.accent;
      ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const sx = 20 + i * 50;
        ctx.beginPath();
        ctx.moveTo(sx, 0);
        for (let y = 0; y < GH; y += 10) {
          ctx.lineTo(sx + Math.sin(y * 0.05 + t + i) * 8, y);
        }
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      break;
    case 'skulls':
      for (let i = 0; i < 6; i++) {
        const bx = ((frame * 0.1 + i * 45) % (GW + 20)) - 10;
        const by = 30 + i * 35;
        // Mini skull shape
        ctx.fillRect(Math.floor(bx), Math.floor(by), 8, 6);
        ctx.fillRect(Math.floor(bx) + 1, Math.floor(by) + 6, 6, 3);
      }
      break;
  }
}

function drawTiles() {
  if (!stageData || screenX < 0 || screenX >= stageData.screens.length) return;
  const screen = stageData.screens[screenX];
  const themeIdx = currentStage < 8 ? currentStage : 8;
  const themeColor = themeIdx < 8 ? BOSSES[themeIdx].color : '#ff4444';
  const bgColor = themeIdx < 8 ? BOSSES[themeIdx].bgColor : '#1a0000';

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, GW, GH);

  // NG+ tint
  if (ngPlus > 0) {
    ctx.fillStyle = 'rgba(128,0,0,0.08)';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Stage-specific background details (Pass 3)
  drawStageBackground(themeIdx);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = screen[r][c];
      const tx = c * TILE;
      const ty = r * TILE;

      if (t === 1) {
        // Solid tile (NG+ recolor)
        ctx.fillStyle = ngPlus > 0 ? shiftColor(themeColor, ngPlus * 30) : themeColor;
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(tx, ty + TILE - 3, TILE, 3);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(tx, ty, TILE, 2);
        // Grid lines
        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
        ctx.strokeRect(tx + 0.5, ty + 0.5, TILE - 1, TILE - 1);
      } else if (t === 2) {
        // Ladder
        ctx.fillStyle = '#888';
        ctx.fillRect(tx + 2, ty, 3, TILE);
        ctx.fillRect(tx + TILE - 5, ty, 3, TILE);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(tx + 2, ty + 4, TILE - 4, 2);
        ctx.fillRect(tx + 2, ty + 10, TILE - 4, 2);
      } else if (t === 3) {
        // Boss door
        ctx.fillStyle = '#555';
        ctx.fillRect(tx, ty, TILE, TILE * 2);
        ctx.fillStyle = themeColor;
        ctx.fillRect(tx + 3, ty + 3, TILE - 6, TILE * 2 - 6);
        ctx.fillStyle = '#222';
        ctx.fillRect(tx + TILE / 2 - 1, ty + TILE, 2, TILE - 4);
      } else if (t === 4) {
        // Toxic goo pool (Pass 2)
        const gooAnim = Math.sin(frame * 0.08 + c * 0.5) * 2;
        ctx.fillStyle = '#33ff33';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(tx, ty + 6 + Math.floor(gooAnim), TILE, 10 - Math.floor(gooAnim));
        // Bubbles
        ctx.fillStyle = '#88ff88';
        const bubX = tx + 4 + Math.sin(frame * 0.12 + c * 2) * 3;
        const bubY = ty + 5 + gooAnim;
        ctx.beginPath();
        ctx.arc(Math.floor(bubX), Math.floor(bubY), 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (t === 5) {
        // Mycelial network tile (drawn as vine hint, actual platform is separate)
        ctx.fillStyle = '#44aa33';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(tx, ty + 4, TILE, 4);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Draw mycelial moving platforms
  for (const mp of mycelialPlatforms) {
    const mx = Math.floor(mp.x);
    const my = Math.floor(mp.y);
    // Vine body
    ctx.fillStyle = '#44aa33';
    ctx.fillRect(mx, my, mp.w, mp.h);
    // Vine tendrils
    ctx.fillStyle = '#33cc22';
    for (let v = 0; v < mp.w; v += 6) {
      const tendrilH = 3 + Math.sin(mp.animT * 2 + v) * 2;
      ctx.fillRect(mx + v, my + mp.h, 2, Math.floor(tendrilH));
    }
    // Glow on top
    ctx.fillStyle = 'rgba(100,255,100,0.3)';
    ctx.fillRect(mx, my - 1, mp.w, 2);
  }
}

function drawPlayer() {
  if (!player) return;

  // Draw death particles (Pass 3)
  if (!player.alive) {
    for (const p of deathParticles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, p.life / 2);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
    }
    ctx.globalAlpha = 1;
    return;
  }

  if (iframeTimer > 0 && Math.floor(iframeTimer * 10) % 2 === 0) return; // blink

  const px = Math.floor(player.x);
  const py = Math.floor(player.y);

  // Spore shield visual (Pass 2)
  if (sporeShieldTimer > 0) {
    ctx.strokeStyle = '#a855f7';
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15) * 0.2;
    ctx.beginPath();
    ctx.arc(px + player.w / 2, py + player.h / 2, 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  // Pick an animation from player state so the avatar reads as alive:
  //   hurt (iframe) > jump (airborne) > attack (shooting) > walk (moving) > idle.
  var _anim = 'idle';
  if (iframeTimer > 0) _anim = 'hurt';
  else if (!player.grounded && !player.onLadder) _anim = 'jump';
  else if (player.shooting) _anim = 'attack';
  else if (player.vx !== 0) _anim = 'walk';
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, Math.max(player.w, player.h) + 6, { flipX: player.dir < 0, frame: frame, anim: _anim })) {
    ctx.save();
    if (player.dir < 0) {
      ctx.translate(px + player.w, 0);
      ctx.scale(-1, 1);
      ctx.translate(-px, 0);
    }

    // Body color based on current weapon
    const bodyColor = currentWeapon === 0 ? '#7a444a' :
      currentWeapon === 9 ? '#38d973' :
      ['#ffcc00','#33cc66','#a855f7','#44aaff','#ff4422','#44ff88','#22ccbb','#88cc44'][currentWeapon - 1];

    // Helmet
    ctx.fillStyle = bodyColor;
    ctx.fillRect(px + 1, py, 10, 7);
    // Visor
    ctx.fillStyle = '#111';
    ctx.fillRect(px + 7, py + 2, 4, 3);

    // Body
    if (player.sliding) {
      ctx.fillStyle = bodyColor;
      ctx.fillRect(px, py, player.w, player.h);
    } else {
      ctx.fillStyle = bodyColor;
      ctx.fillRect(px + 2, py + 7, 8, 6);
      // Arm (shooting position)
      const armY = player.shooting ? py + 7 : py + 8;
      ctx.fillRect(px + 9, armY, 5, 4);
      // Legs
      const legOff = player.grounded && player.vx !== 0 ? (player.animFrame % 2) * 2 : 0;
      ctx.fillStyle = '#222';
      ctx.fillRect(px + 2, py + 13, 4, 3 + legOff);
      ctx.fillRect(px + 6, py + 13, 4, 3 + (2 - legOff));
    }

    // Poop trail on slide
    if (player.sliding && frame % 3 === 0) {
      TAS.particles.spawn(px + player.w / 2, py + player.h, '#7a444a', 1, 0.5, { size: 2 });
    }

    ctx.restore();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    // NG+ color shift
    ctx.fillStyle = ngPlus > 0 ? shiftColor(e.color, ngPlus * 40) : e.color;
    // Body
    ctx.fillRect(Math.floor(e.x), Math.floor(e.y), e.w, e.h);
    // Eye
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.floor(e.x) + (e.dir > 0 ? e.w - 4 : 1), Math.floor(e.y) + 2, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(Math.floor(e.x) + (e.dir > 0 ? e.w - 3 : 2), Math.floor(e.y) + 3, 1, 1);

    if (e.type === 1) {
      // Wings
      ctx.fillStyle = (ngPlus > 0 ? shiftColor(e.color, ngPlus * 40) : e.color) + 'aa';
      const wingOff = Math.sin(e.animT * 8) * 3;
      ctx.fillRect(Math.floor(e.x) - 3, Math.floor(e.y) + Math.floor(wingOff), 3, 6);
      ctx.fillRect(Math.floor(e.x) + e.w, Math.floor(e.y) + Math.floor(wingOff), 3, 6);
    }
    if (e.type === 2) {
      // Turret barrel
      ctx.fillStyle = '#666';
      const bDir = player.x < e.x ? -1 : 1;
      ctx.fillRect(Math.floor(e.x) + (bDir > 0 ? e.w : -5), Math.floor(e.y) + e.h / 2 - 1, 5, 3);
    }
  }
}

function drawBoss() {
  if (!boss || boss.hp <= 0) return;

  const bx = Math.floor(boss.x);
  const by = Math.floor(boss.y);

  // Body
  ctx.fillStyle = ngPlus > 0 ? shiftColor(boss.color, ngPlus * 40) : boss.color;
  ctx.fillRect(bx, by, boss.w, boss.h);

  // Helmet
  ctx.fillStyle = '#333';
  ctx.fillRect(bx + 2, by, boss.w - 4, 8);
  ctx.fillStyle = boss.color;
  ctx.fillRect(bx + 4, by + 2, boss.w - 8, 4);

  // Face
  ctx.fillStyle = '#ffd';
  ctx.fillRect(bx + 4, by + 8, boss.w - 8, 6);
  // Eyes
  ctx.fillStyle = '#f00';
  ctx.fillRect(bx + 6, by + 9, 3, 3);
  ctx.fillRect(bx + 12, by + 9, 3, 3);

  // Arms
  ctx.fillStyle = boss.color;
  ctx.fillRect(bx - 4, by + 10, 5, 8);
  ctx.fillRect(bx + boss.w - 1, by + 10, 5, 8);

  // Legs
  ctx.fillStyle = '#222';
  const lOff = Math.abs(Math.sin(frame * 0.1)) * 2;
  ctx.fillRect(bx + 4, by + boss.h - 6, 5, 6 + Math.floor(lOff));
  ctx.fillRect(bx + 11, by + boss.h - 6, 5, 6 + Math.floor(2 - lOff));

  // Boss shots
  for (const s of boss.shots) {
    ctx.fillStyle = boss.color;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.w, s.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(Math.floor(s.x) + 2, Math.floor(s.y) + 1, 3, 3);
  }

  // Boss HP bar
  const maxHP = getMaxHP();
  ctx.fillStyle = '#222';
  ctx.fillRect(GW - 16, 32, 8, maxHP * 3 + 4);
  ctx.fillStyle = '#555';
  ctx.fillRect(GW - 15, 34, 6, maxHP * 3);
  const hpH = (boss.hp / boss.maxHp) * maxHP * 3;
  ctx.fillStyle = boss.color;
  ctx.fillRect(GW - 15, 34 + (maxHP * 3 - Math.floor(hpH)), 6, Math.floor(hpH));
}

function drawBullets() {
  for (const b of bullets) {
    if (b.enemy) {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(Math.floor(b.x) + b.w / 2, Math.floor(b.y) + b.h / 2, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = b.color;
      if (b.type === 4) {
        // Crystal beam
        ctx.fillRect(Math.floor(b.x), Math.floor(b.y), b.w, b.h);
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.floor(b.x) + 2, Math.floor(b.y), b.w - 4, 1);
      } else if (b.type === 3) {
        // Spore orbit
        ctx.beginPath();
        ctx.arc(Math.floor(b.x) + b.w / 2, Math.floor(b.y) + b.h / 2, b.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (b.type === 5 || b.type === 7) {
        // Fireball / slime bomb
        ctx.beginPath();
        ctx.arc(Math.floor(b.x) + b.w / 2, Math.floor(b.y) + b.h / 2, b.w / 2, 0, Math.PI * 2);
        ctx.fill();
        if (b.type === 5 && frame % 2 === 0) {
          TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ff8800', 1, 1, { size: 1 });
        }
      } else if (b.type === 9) {
        // Myco Burst spore (Pass 2)
        ctx.beginPath();
        ctx.arc(Math.floor(b.x) + b.w / 2, Math.floor(b.y) + b.h / 2, b.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Inner glow
        ctx.fillStyle = '#aaffcc';
        ctx.beginPath();
        ctx.arc(Math.floor(b.x) + b.w / 2, Math.floor(b.y) + b.h / 2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(Math.floor(b.x), Math.floor(b.y), b.w, b.h);
      }
    }
  }
}

function drawPickups() {
  for (const p of pickups) {
    const pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
    ctx.globalAlpha = p.life < 1 ? p.life : pulse;
    const px = Math.floor(p.x);
    const py = Math.floor(p.y);

    if (p.type === 'smallE') {
      ctx.fillStyle = '#44aaff';
      ctx.fillRect(px, py, 8, 8);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 3, py + 1, 2, 6);
      ctx.fillRect(px + 1, py + 3, 6, 2);
    } else if (p.type === 'bigE') {
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(px, py, 10, 10);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 3, py + 1, 4, 8);
      ctx.fillRect(px + 1, py + 3, 8, 4);
    } else if (p.type === 'eTank') {
      ctx.fillStyle = '#38d973';
      ctx.fillRect(px, py, 10, 12);
      ctx.fillStyle = '#fff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('E', px + 2, py + 10);
    } else if (p.type === 'weaponE') {
      ctx.fillStyle = '#cc88ff';
      ctx.fillRect(px, py, 8, 8);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 2, py + 2, 4, 4);
    } else if (p.type === 'sporeShield') {
      // Spore Gem pickup (Pass 2)
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.arc(px + 5, py + 5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#dd88ff';
      ctx.beginPath();
      ctx.arc(px + 5, py + 5, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'reactorCore') {
      // Garden Seed pickup (Pass 2)
      ctx.fillStyle = '#44ff88';
      ctx.fillRect(px + 1, py + 1, 8, 8);
      ctx.fillStyle = '#88ffbb';
      ctx.fillRect(px + 3, py + 3, 4, 4);
      // Pulse ring
      ctx.strokeStyle = '#44ff88';
      ctx.beginPath();
      ctx.arc(px + 5, py + 5, 6 + Math.sin(frame * 0.15) * 2, 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.type === 'lpToken') {
      // POOP Token pickup (Pass 2)
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(px, py, 10, 10);
      ctx.fillStyle = '#fff';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('PT', px + 5, py + 8);
    }
    ctx.globalAlpha = 1;
  }
}

function drawHPBar() {
  // Player HP bar (left side, vertical like Mega Man)
  const maxHP = getMaxHP();
  const barX = 6;
  const barY = 32;
  const barW = 8;
  const barH = maxHP * 3 + 4;

  ctx.fillStyle = '#222';
  ctx.fillRect(barX, barY, barW, barH);
  ctx.fillStyle = '#333';
  ctx.fillRect(barX + 1, barY + 2, barW - 2, barH - 4);

  // HP pips
  const hpH = (player.hp / maxHP) * (barH - 4);
  const hpColor = player.hp > maxHP * 0.3 ? '#38d973' : (player.hp > maxHP * 0.15 ? '#f4b41b' : '#e6482e');
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX + 1, barY + 2 + (barH - 4 - Math.floor(hpH)), barW - 2, Math.floor(hpH));

  // Pip lines
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (let i = 1; i < maxHP; i++) {
    const ly = barY + 2 + i * 3;
    ctx.fillRect(barX + 1, ly, barW - 2, 1);
  }

  // Weapon energy (if not default)
  if (currentWeapon > 0) {
    const weX = 18;
    ctx.fillStyle = '#222';
    ctx.fillRect(weX, barY, barW, barH);
    ctx.fillStyle = '#333';
    ctx.fillRect(weX + 1, barY + 2, barW - 2, barH - 4);
    const weIdx = currentWeapon === 9 ? 8 : currentWeapon - 1;
    const weH = ((weaponEnergy[weIdx] || 0) / MAX_WEAPON_E) * (barH - 4);
    const wColor = currentWeapon === 9 ? '#38d973' : BOSSES[currentWeapon - 1].color;
    ctx.fillStyle = wColor;
    ctx.fillRect(weX + 1, barY + 2 + (barH - 4 - Math.floor(weH)), barW - 2, Math.floor(weH));
  }

  // Lives & E-Tanks at top
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x' + lives, 6, 22);
  if (eTanks > 0) {
    ctx.fillStyle = '#38d973';
    ctx.fillText('E:' + eTanks, 30, 22);
  }

  // Spore shield indicator (Pass 2)
  if (sporeShieldTimer > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.fillText('SH:' + Math.ceil(sporeShieldTimer), 55, 22);
  }

  // Weapon name
  const wColor = currentWeapon === 0 ? '#7a444a' : currentWeapon === 9 ? '#38d973' : BOSSES[currentWeapon - 1].color;
  ctx.fillStyle = wColor;
  ctx.textAlign = 'center';
  const wName = currentWeapon === 0 ? 'POOP SHOT' : currentWeapon === 9 ? 'MYCO BURST' : BOSSES[currentWeapon - 1].weapon.toUpperCase();
  ctx.fillText(wName, GW / 2, 12);

  // Score (Pass 1: INT multiplied)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'right';
  ctx.fillText(String(score), GW - 6, 12);
}

function drawWeaponMenu() {
  ctx.fillStyle = 'rgba(26,28,44,0.94)';
  ctx.fillRect(20, 20, GW - 40, GH - 40);
  ctx.strokeStyle = '#a855f7';
  ctx.strokeRect(21, 21, GW - 42, GH - 42);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';

// ============================================================
// FORTRESS (after all 8 bosses)
// ============================================================
function startFortress() {
  fortressStage = 0;
  fortressRefight = 0;
  currentStage = 8; // special
  stageData = generateFortressStage();
  screenX = 0;
  checkpoint = 0;
  resetPlayer();
  spawnEnemiesForScreen(0);
  boss = null;
  bossActive = false;
  bullets = [];
  pickups = [];
  state = 'playing';
}

function generateFortressStage() {
  // Fortress: 4 screens, boss refight at end
  const screens = [];
  for (let s = 0; s < 4; s++) {
    const tiles = [];
    for (let r = 0; r < ROWS; r++) {
      const row = [];
      for (let c = 0; c < COLS; c++) {
        if (r === ROWS - 1 || r === 0) { row.push(1); continue; }
        row.push(0);
      }
      tiles.push(row);
    }

    // Fortress platforms - harder
    const rng = (i) => { let x = Math.sin(fortressStage * 9999 + s * 777 + i + ngPlus * 33333) * 10000; return x - Math.floor(x); };
    const numPlats = 5 + Math.floor(rng(0) * 4);
    for (let i = 0; i < numPlats; i++) {
      const px = 1 + Math.floor(rng(i * 3 + 1) * 13);
      const py = 3 + Math.floor(rng(i * 3 + 2) * 9);
      const pw = 2 + Math.floor(rng(i * 3 + 3) * 2);
      for (let j = 0; j < pw && px + j < COLS - 1; j++) {
        tiles[py][px + j] = 1;
      }
    }

    // Pits
    if (s > 0) {
      const pitX = 3 + Math.floor(rng(100) * 8);
      const pitW = 2 + Math.floor(rng(101) * 3);
      for (let j = 0; j < pitW && pitX + j < COLS - 1; j++) {
        tiles[ROWS - 1][pitX + j] = 0;
      }
    }

    // Toxic goo in fortress
    if (s > 0 && s < 3) {
      const gx = 2 + Math.floor(rng(350) * 10);
      const gw = 2 + Math.floor(rng(351) * 2);
      for (let j = 0; j < gw && gx + j < COLS - 1; j++) {
        if (tiles[ROWS - 2][gx + j] === 0 && tiles[ROWS - 1][gx + j] === 1) {
          tiles[ROWS - 2][gx + j] = 4;
        }
      }
    }

    // Boss room on last screen
    if (s === 3) {
      for (let r = 2; r < ROWS - 1; r++) {
        for (let c = 2; c < COLS - 2; c++) tiles[r][c] = 0;
      }
      for (let c = 1; c < COLS - 1; c++) tiles[ROWS - 1][c] = 1;
    }

    // Clear spawn
    if (s === 0) {
      for (let r = ROWS - 4; r < ROWS - 1; r++) {
        for (let c = 1; c < 4; c++) tiles[r][c] = 0;
      }
    }

    screens.push(tiles);
  }
  return { screens, theme: 8 };
}

function shiftColor(hexColor, degrees) {
  // Simple hue shift for NG+ palette swap
  if (!hexColor || hexColor.length < 7) return hexColor;
  try {
    let r = parseInt(hexColor.slice(1,3), 16);
    let g = parseInt(hexColor.slice(3,5), 16);
    let b = parseInt(hexColor.slice(5,7), 16);
    const shift = degrees % 360;
    // Simple rotation through RGB
    const cos = Math.cos(shift * Math.PI / 180);
    const sin = Math.sin(shift * Math.PI / 180);
    const nr = Math.floor(TAS.math.clamp(r * cos - g * sin * 0.3 + b * sin * 0.3, 0, 255));
    const ng = Math.floor(TAS.math.clamp(r * sin * 0.3 + g * cos - b * sin * 0.3, 0, 255));
    const nb = Math.floor(TAS.math.clamp(-r * sin * 0.3 + g * sin * 0.3 + b * cos, 0, 255));
    return '#' + nr.toString(16).padStart(2,'0') + ng.toString(16).padStart(2,'0') + nb.toString(16).padStart(2,'0');
  } catch(e) { return hexColor; }
}

function loadProg() {
  try {
    const d = JSON.parse(localStorage.getItem('poopman_save'));
    if (d) {
      bossesBeaten = d.beaten || [false,false,false,false,false,false,false,false];
      score = d.score || 0;
      eTanks = d.eTanks || 0;
      hasMyco = d.hasMyco || false;
      ngPlus = d.ngPlus || 0;
    }
    // Load NG+ separately too
    const ngp = localStorage.getItem('poopman_ngplus');
    if (ngp) ngPlus = parseInt(ngp, 10) || 0;
  } catch(e) { console.warn('Load failed:', e); }
  // Ensure weapon energy array is right size
  if (hasMyco && weaponEnergy.length < 9) weaponEnergy.push(MAX_WEAPON_E);
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;
  const anyKey = Object.values(keys).some(Boolean) || tch.a || tch.b;

  switch (state) {
    case 'title':
      if (picking) break; // character-select overlay open — ignore game input
      // C key / C touch button opens the baseling picker
      if (keys['KeyC'] || tch.c) {
        keys['KeyC'] = false;
        picking = true;
        TAS.player.select(function () {
          recomputeStats();   // apply the newly-picked baseling's stats
          picking = false;
        });
        break;
      }
      if (anyKey) {
        TAS.audio.ensureAudio();
        loadProg();
        state = 'stageSelect';
      }
      break;

    case 'stageSelect':
      updateStageSelect(dt);
      // Check if all bosses beaten - fortress option
      if (bossesBeaten.every(b => b) && (keys['KeyF'] || (selectCursor === 0 && keys['ShiftLeft']))) {
        startFortress();
      }
      break;

    case 'playing':
      updatePlaying(dt);
      break;

    case 'bossIntro':
      bossIntroTimer -= dt;
      if (bossIntroTimer <= 0) {
        state = 'playing';
        bossActive = true;
      }
      break;

    case 'stageClear':
      stageClearTimer -= dt;
      if (stageClearTimer <= 0) {
        weaponGetTimer = 3;
        state = 'weaponGet';
      }
      break;

    case 'weaponGet':
      weaponGetTimer -= dt;
      if (weaponGetTimer <= 0) {
        // Check if all bosses beaten for NG+
        if (bossesBeaten.every(b => b)) {
          // After fortress completion, trigger NG+
          startNGPlus();
        } else {
          state = 'stageSelect';
        }
      }
      break;

    case 'gameOver':
      if (anyKey && frame > 30) {
        state = 'title';
        lives = 3;
        score = 0;
        eTanks = 0;
        currentWeapon = 0;
        weaponEnergy = [MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E,MAX_WEAPON_E];
        if (hasMyco) weaponEnergy.push(MAX_WEAPON_E);
        frame = 0;
      }
      break;

    case 'fortress':
      updatePlaying(dt);
      break;
  }
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  switch (state) {
    case 'title':
      drawTitle();
      break;

    case 'stageSelect':
      drawStageSelect();
      break;

    case 'playing':
    case 'fortress':
      ctx.save();
      TAS.fx.applyShake();
      drawTiles();
      drawPickups();
      drawEnemies();
      drawPlayer();
      drawBullets();
      if (bossActive) drawBoss();
      TAS.particles.draw();
      ctx.restore();
      TAS.fx.drawFlash(GW, GH);
      drawHPBar();
      if (pauseOpen) drawWeaponMenu();
      TAS.input.drawTouchControls(GW, GH);
      break;

    case 'bossIntro':
      drawBossIntro();
      break;

    case 'stageClear':
      drawStageClear();
      break;

    case 'weaponGet':
      drawWeaponGet();
      break;

    case 'gameOver':
      drawGameOver();
      break;
  }
}

// ============================================================
// START
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
