  var sx0 = Math.max(st.x0, clipX0), sx1 = Math.min(st.x1, clipX1);

  // Sparse soil speckle so the body reads as earth, not flat paint.
  g.globalAlpha = 0.4;
  for (var sx = sx0 - (((sx0 % 7) + 7) % 7); sx < sx1; sx += 7) {
    var ci = colAt(sx);
    for (var sy = ty[ci] + 14; sy < by[ci] - 2; sy += 6) {
      var nn = ((sx * 31 + sy * 17) % 11 + 11) % 11;
      if (nn < 3) { g.fillStyle = P.bodyDk; g.fillRect(sx + nn, sy, 2, 2); }
      else if (nn > 8) { g.fillStyle = P.bodyHi; g.fillRect(sx + (nn % 3), sy + 1, 1, 1); }
    }
  }
  g.globalAlpha = 1;

  // Depth shade: the bottom of a mass falls away into darkness.
  var dg = g.createLinearGradient(0, minTop + 24, 0, maxBot);
  dg.addColorStop(0, 'rgba(0,0,0,0)');
  dg.addColorStop(1, 'rgba(0,0,0,' + TERRAIN_STYLE.DEPTH_A + ')');
  g.fillStyle = dg;
  g.fillRect(sx0 - 16, minTop, (sx1 - sx0) + 32, maxBot - minTop);

  // Soft inner shading all around the edge -> the whole form reads rounded.
  g.strokeStyle = 'rgba(0,0,0,' + TERRAIN_STYLE.EDGE_A + ')';
  g.lineWidth = 14;
  g.stroke(body);

  // Grass/moss lip hugging the smoothed top curve (3 stacked strokes; the
  // top half of each stroke is clipped away, leaving a soft banded lip).
  g.lineCap = 'round';
  g.lineJoin = 'round';
  g.strokeStyle = P.grassDk; g.lineWidth = TERRAIN_STYLE.GRASS_DEEP; g.stroke(topPath);
  g.strokeStyle = P.grass;   g.lineWidth = TERRAIN_STYLE.GRASS_MID;  g.stroke(topPath);
  g.strokeStyle = P.grassHi; g.lineWidth = TERRAIN_STYLE.GRASS_RIM;  g.stroke(topPath);

  // Hanging moss tufts under the grass band.
  g.fillStyle = P.moss;
  for (var tx = sx0 + 4; tx < sx1 - 2; tx += 9) {
    var ct = colAt(tx);
    var baseY = ty[ct] + TERRAIN_STYLE.GRASS_DEEP / 2 - 1;
    var th = 4 + ((tx * 7 + st.cols[ct].top * 5) % 6 + 6) % 6;
    var tw = 3 + (((tx % 2) + 2) % 2);
    g.beginPath();
    g.moveTo(tx, baseY);
    g.lineTo(tx + tw, baseY);
    g.lineTo(tx + tw / 2, baseY + th);
    g.closePath();
    g.fill();
  }

  g.restore();

  // Crisp thin outline around the whole mass.
  g.strokeStyle = 'rgba(0,0,0,0.30)';
  g.lineWidth = 1.5;
  g.stroke(body);

  // Grass blades poking up above the lip (skipped near tall step corners so
  // blades never hover over the curved transition).
  for (var bx = sx0 + 6; bx < sx1 - 3; bx += 11) {
    var cb = colAt(bx);
    var pos = bx - (st.x0 + cb * TILE);
    if (pos < 8 && cb > 0 && Math.abs(ty[cb - 1] - ty[cb]) > 6) continue;
    if (pos > TILE - 8 && cb < n - 1 && Math.abs(ty[cb + 1] - ty[cb]) > 6) continue;
    var bh = 3 + ((bx * 3 + st.cols[cb].top) % 4 + 4) % 4;
    g.fillStyle = P.grass;
    g.fillRect(bx, ty[cb] - bh, 2, bh);
    g.fillStyle = P.grassHi;
    g.fillRect(bx, ty[cb] - bh, 1, 1);
  }
}

// Build (or fetch) the pre-rendered terrain chunk k. Chunks are the level's
// full pixel height and CHUNK_W wide; empty chunks cache as null.
function terrainChunk(k) {
  var cached = terrain.chunks[k];
  if (cached !== undefined) return cached;
  var w = TERRAIN_STYLE.CHUNK_W, h = ROWS * TILE;
  var x0 = k * w, x1 = x0 + w;
  var off = document.createElement('canvas');
  off.width = w; off.height = h;
  var g = off.getContext('2d');
  g.translate(-x0, 0);
  var P = pal(terrain.theme);
  var any = false;
  for (var i = 0; i < terrain.strips.length; i++) {
    var st = terrain.strips[i];
    if (st.x1 < x0 - 48 || st.x0 > x1 + 48) continue;  // margin for shadow/blades
    paintGroundStrip(g, st, P, x0 - 16, x1 + 16);
    any = true;
  }
  var result = any ? off : null;
  terrain.chunks[k] = result;
  return result;
}

// Blit the visible terrain chunks (call inside the camera translate).
function drawTerrain(camX, vw) {
  if (!terrain) return;
  var w = TERRAIN_STYLE.CHUNK_W;
  var k0 = Math.max(0, Math.floor((camX - 16) / w));
  var k1 = Math.min(Math.floor((levelPx - 1) / w), Math.floor((camX + vw + 16) / w));
  for (var k = k0; k <= k1; k++) {
    var ch = terrainChunk(k);
    if (ch) ctx.drawImage(ch, k * w, 0);
  }
}

// ====================================================================
//  RENDER
// ====================================================================
function render(dt) {
  beginFrame();

  if (state === 'menu') { drawMenuBackdrop(); return; }

  if (mode === 'race' && players.length === 2) {
    var halfH = GH / 2;
    drawViewport(players[0], 0, 0, GW, halfH - 1, 0, dt);
    ctx.fillStyle = '#000'; ctx.fillRect(0, halfH - 1, GW, 2);
    drawViewport(players[1], 0, halfH + 1, GW, halfH - 1, 1, dt);
  } else {
    drawViewport(players[0], 0, 0, GW, GH, 0, dt);
  }

  drawHUD();
  if (state === 'countdown') drawCountdown();
  if (state === 'win') drawWin();
  drawScanlines();

  if (!IS_TOUCH && (state === 'play' || state === 'countdown')) drawLegend();
  if (IS_TOUCH && state === 'play' && mode === 'solo') drawTouchControls();
  if (state === 'play' && keys['Escape']) { keys['Escape'] = false; showMenu(); }
}

function drawViewport(pl, vx, vy, vw, vh, idx, dt) {
  ctx.save();
  ctx.beginPath(); ctx.rect(vx, vy, vw, vh); ctx.clip();
  ctx.translate(vx, vy);

  var lv = currentLevel;
  var theme = (lv.theme && THEMES.indexOf(lv.theme) >= 0) ? lv.theme : 'jungle';
  var P = pal(theme);

  var camX = pl.x + PLAYER_W / 2 - vw / 2;
  var camY = pl.y + PLAYER_H / 2 - vh / 2;
  camX = clamp(camX, 0, Math.max(0, levelPx - vw));
  var levelPxH = ROWS * TILE;
  camY = clamp(camY, 0, Math.max(0, levelPxH - vh));
  if (levelPxH <= vh) camY = levelPxH - vh;

  drawBackground(theme, P, camX, camY, vw, vh);
  drawGodRays(theme, vw, vh);                 // light beams behind the world
  drawAmbient(theme, camX, camY, vw, vh, dt); // drifting motes behind the world

  ctx.save();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  // Smooth rolling ground first (pre-rendered chunks), then any thin
  // floating platforms via the classic ledge renderer.
  drawTerrain(camX, vw);
  var art = themeArt(theme);
  var viewL = camX - TILE, viewR = camX + vw + TILE;
  for (var i = 0; i < ledgeRuns.length; i++) {
    var run = ledgeRuns[i];
    if (run.x + run.w < viewL || run.x > viewR) continue;
    drawLedgeRun(run, art, P);
  }

  for (var b = 0; b < boosts.length; b++) drawBoost(boosts[b]);
  for (var fi = 0; fi < fans.length; fi++) drawFan(fans[fi]);
  for (var ci = 0; ci < collectibles.length; ci++) if (!collectibles[ci].taken) drawCoin(collectibles[ci]);
  for (var s = 0; s < spikes.length; s++) drawSpike(spikes[s], P);
  for (var e = 0; e < enemies.length; e++) if (enemies[e].alive) drawEnemy(enemies[e]);
  drawFinish();
  drawStartMarker();
  // Smashable props: behind the player, in front of ledges. Skip dead ones.
  for (var sm = 0; sm < smashables.length; sm++) {
    var so = smashables[sm];
    if (so.state === 'dead') continue;
    if (so.x + so.w < viewL || so.x > viewR) continue;
    drawSmashable(so);
  }
  for (var p = 0; p < players.length; p++) drawPlayerSprite(players[p], P);

  // Dust puffs (world-space): soft, fading tan blobs at the feet.
  for (var du = 0; du < dust.length; du++) {
    var d = dust[du];
    var dl = Math.max(0, d.life / d.maxLife);
    ctx.globalAlpha = dl * 0.7;
    ctx.fillStyle = d.col;
    var ds = d.size * (1.4 - dl * 0.4);   // expand a touch as they fade
    ctx.beginPath(); ctx.arc(d.x, d.y, ds, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Prop debris chunks (world-space): small rotating squares that fade out.
  for (var dbi = 0; dbi < debris.length; dbi++) {
    var db = debris[dbi];
    var dbl = Math.max(0, db.life / db.maxLife);
    ctx.globalAlpha = dbl;
    ctx.fillStyle = db.col;
    ctx.save();
    ctx.translate(db.x, db.y);
    ctx.rotate(db.rot);
    var dbs = db.size;
    ctx.fillRect(-dbs / 2, -dbs / 2, dbs, dbs);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  for (var k = 0; k < sparkles.length; k++) {
    var sp = sparkles[k];
    ctx.globalAlpha = Math.max(0, sp.life / 0.8);
    ctx.fillStyle = sp.color;
    ctx.fillRect(sp.x - sp.size / 2, sp.y - sp.size / 2, sp.size, sp.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // NEAR FOREGROUND silhouettes (in FRONT of the world — the big layered-depth cue),
  // then the unifying atmosphere overlay (color grade + vignette) on very top.
  drawForeground(theme, camX, camY, vw, vh);
  drawAtmosphereOverlay(theme, vw, vh);

  if (mode === 'race') drawViewportLabel(pl, idx, vw, vh);
  ctx.restore();
}

// ---- 16-bit-style ledge: one unified shape per contiguous solid run ----
// 9-slices ledge.png when present (rounded ends preserved, middle tiled),
// else draws a polished procedural ledge: beveled rounded end caps, grass+moss
// top fringe with hanging tufts, dithered earthy body, dark underside.
// Soft drop shadow cast under a platform onto the background — sells the
// "ledge floats above a deeper layer" look. Drawn before the ledge itself.
function ledgeDropShadow(x, y, w, h) {
  if (!JUICE.LEDGE_SHADOW) return;
  ctx.save();
  ctx.globalAlpha = JUICE.LEDGE_SHADOW_ALPHA;
  ctx.fillStyle = '#000';
  var sx = x + JUICE.LEDGE_SHADOW_DX, sy = y + JUICE.LEDGE_SHADOW_DY;
  roundRect(sx, sy, w, h, 9); ctx.fill();
  ctx.restore();
}

function drawLedgeRun(run, art, P) {
  var x = run.x, y = run.r * TILE, w = run.w, h = TILE;

  ledgeDropShadow(x, y, w, h);

  if (imgReady(art.ledge)) {
    // OPAQUE BACKING — the themed ledge PNGs have transparent gaps (grass blades up top, scattered
    // dirt clumps below with see-through between them). Without a solid fill the background shows
    // through the platform. Paint a solid body (+ a grass top strip when exposed) first, then lay
    // the art over it so its grass/clumps become texture on a solid ledge.
    var lbg = ctx.createLinearGradient(0, y, 0, y + h);
    lbg.addColorStop(0, P.body); lbg.addColorStop(1, P.bodyDk);
    ctx.fillStyle = lbg; ctx.fillRect(x, y, w, h);
    if (run.exposed) { ctx.fillStyle = P.grassDk; ctx.fillRect(x, y, w, 9); }
    var img = art.ledge, iw = img.naturalWidth, ih = img.naturalHeight;
    var cap = Math.min(Math.floor(iw / 3), TILE);
    var sMidW = iw - cap * 2;
    ctx.drawImage(img, 0, 0, cap, ih, x, y, cap, h);
    var midW = w - cap * 2;
    if (midW > 0) ctx.drawImage(img, cap, 0, sMidW, ih, x + cap, y, midW, h);
    ctx.drawImage(img, iw - cap, 0, cap, ih, x + w - cap, y, cap, h);
    // 3D framing on top of the flat PNG: bright top-edge highlight + dark
    // under-edge shadow + a faint surface sheen, so art tiles read chunky.
    if (run.exposed && JUICE.LEDGE_TOP_HILITE > 0) {
      var th = ctx.createLinearGradient(0, y, 0, y + 6);
      th.addColorStop(0, 'rgba(255,255,255,' + (JUICE.LEDGE_TOP_HILITE * 0.5) + ')');
      th.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = th; ctx.fillRect(x, y, w, 6);
    }
    if (JUICE.LEDGE_UNDER_SHADE > 0) {
      var us = ctx.createLinearGradient(0, y + h - 6, 0, y + h);
      us.addColorStop(0, 'rgba(0,0,0,0)');
      us.addColorStop(1, 'rgba(0,0,0,' + JUICE.LEDGE_UNDER_SHADE + ')');
      ctx.fillStyle = us; ctx.fillRect(x, y + h - 6, w, 6);
    }
    return;
  }

  var capR = 11;
  var lFree = run.leftFree, rFree = run.rightFree;
  var topExposed = run.exposed;

  ctx.beginPath();
  var x0 = x, x1 = x + w, y0 = y, y1 = y + h;
  var rl = lFree ? capR : 0, rr = rFree ? capR : 0;
  ctx.moveTo(x0 + rl, y0);
  ctx.lineTo(x1 - rr, y0);
  if (rr) ctx.arcTo(x1, y0, x1, y0 + rr, rr); else ctx.lineTo(x1, y0);
  ctx.lineTo(x1, y1 - rr);
  if (rr) ctx.arcTo(x1, y1, x1 - rr, y1, rr); else ctx.lineTo(x1, y1);
  ctx.lineTo(x0 + rl, y1);
  if (rl) ctx.arcTo(x0, y1, x0, y1 - rl, rl); else ctx.lineTo(x0, y1);
  ctx.lineTo(x0, y0 + rl);
  if (rl) ctx.arcTo(x0, y0, x0 + rl, y0, rl); else ctx.lineTo(x0, y0);
  ctx.closePath();

  var bg = ctx.createLinearGradient(0, y0, 0, y1);
  bg.addColorStop(0, P.bodyHi);
  bg.addColorStop(0.5, P.body);
  bg.addColorStop(1, P.bodyDk);
  ctx.save();
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.clip();

  ctx.globalAlpha = 0.5;
  for (var sx = x0; sx < x1; sx += 7) {
    for (var sy = y0 + 6; sy < y1; sy += 6) {
      var nn = ((sx * 31 + sy * 17 + run.r * 13) % 11);
      if (nn < 3) { ctx.fillStyle = P.bodyDk; ctx.fillRect(sx + nn, sy, 2, 2); }
      else if (nn > 8) { ctx.fillStyle = P.bodyHi; ctx.fillRect(sx + (nn % 3), sy + 1, 1, 1); }
    }
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = P.under;
  ctx.fillRect(x0, y1 - 5, w, 5);
  // Dark under-edge shadow (16-bit-era ledges carry a heavy shaded lip underneath).
  var ush = ctx.createLinearGradient(0, y1 - 6, 0, y1);
  ush.addColorStop(0, 'rgba(0,0,0,0)');
  ush.addColorStop(1, 'rgba(0,0,0,' + JUICE.LEDGE_UNDER_SHADE + ')');
  ctx.fillStyle = ush; ctx.fillRect(x0, y1 - 6, w, 6);

  if (topExposed) {
    var gg = ctx.createLinearGradient(0, y0, 0, y0 + 11);
    gg.addColorStop(0, P.grassHi);
    gg.addColorStop(0.6, P.grass);
    gg.addColorStop(1, P.grassDk);
    ctx.fillStyle = gg;
    ctx.fillRect(x0, y0, w, 10);

    // Crisp bright top-edge highlight (the lit rim that pops 16-bit-style ledges).
    ctx.fillStyle = P.grassHi;
    ctx.globalAlpha = JUICE.LEDGE_TOP_HILITE; ctx.fillRect(x0, y0, w, 1);
    ctx.globalAlpha = JUICE.LEDGE_TOP_HILITE * 0.55; ctx.fillRect(x0, y0 + 1, w, 1);
    ctx.globalAlpha = 1;

    ctx.fillStyle = P.moss;
    for (var tx = x0 + 4; tx < x1 - 2; tx += 9) {
      var th = 4 + ((tx * 7 + run.r * 5) % 6);
      var tw = 3 + (tx % 2);
      ctx.beginPath();
      ctx.moveTo(tx, y0 + 9);
      ctx.lineTo(tx + tw, y0 + 9);
      ctx.lineTo(tx + tw / 2, y0 + 9 + th);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = P.grass;
    for (var bx = x0 + 6; bx < x1 - 3; bx += 13) {
      var bh2 = 3 + ((bx * 3 + run.r) % 4);
      ctx.fillRect(bx, y0 - bh2, 2, bh2);
      ctx.fillStyle = P.grassHi; ctx.fillRect(bx, y0 - bh2, 1, 1); ctx.fillStyle = P.grass;
    }
  } else {
    ctx.globalAlpha = 0.25; ctx.fillStyle = '#000'; ctx.fillRect(x0, y0, w, 2); ctx.globalAlpha = 1;
  }

  ctx.restore();

  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

function drawBackground(theme, P, camX, camY, vw, vh) {
  var art = themeArt(theme);
  drawFarBackdrop(theme, P, art, camX, camY, vw, vh);
  // Parallax layers 2 + 3: rounded silhouette ridges between the far
  // backdrop and the world, each scrolling at its own fraction.
  drawSilhouettes(theme, camX, camY, vw, vh);
}

// Layer 1 (far): the painted backdrop when present, else a gradient sky +
// distant hills + clouds.
function drawFarBackdrop(theme, P, art, camX, camY, vw, vh) {
  if (imgReady(art.bg)) {
    var bw = art.bg.naturalWidth, bh = art.bg.naturalHeight;
    // COVER-scale: pick the larger of width/height fit so the image ALWAYS
    // fills the viewport with no gaps, then zoom a touch for parallax headroom.
    var cover = Math.max(vw / bw, vh / bh) * JUICE.BG_ZOOM;
    var drawW = bw * cover, drawH = bh * cover;
    if (!(drawW > 0) || !(drawH > 0)) { drawW = vw; drawH = vh; } // safety, never NaN
    // Vertical offset: center the (taller-than-view) image, nudged by camY parallax.
    var oy = (vh - drawH) / 2 - (camY * JUICE.BG_PARALLAX_Y);
    oy = clamp(oy, vh - drawH, 0);   // never expose above/below the image
    // Horizontal: seamless tiling. Start one full tile left of the edge and draw
    // PAST the right edge (x < vw + drawW) so the trailing tile always covers.
    var px = -((camX * JUICE.BG_PARALLAX) % drawW);
    if (px > 0) px -= drawW;
    for (var x = px; x < vw + drawW; x += drawW) ctx.drawImage(art.bg, x, oy, drawW, drawH);
    // Gentle darkening toward the left/right edges for soft depth framing.
    if (JUICE.BG_EDGE_DARKEN > 0) {
      var eg = ctx.createLinearGradient(0, 0, vw, 0);
      eg.addColorStop(0,    'rgba(0,0,0,' + JUICE.BG_EDGE_DARKEN + ')');
      eg.addColorStop(0.18, 'rgba(0,0,0,0)');
      eg.addColorStop(0.82, 'rgba(0,0,0,0)');
      eg.addColorStop(1,    'rgba(0,0,0,' + JUICE.BG_EDGE_DARKEN + ')');
      ctx.fillStyle = eg; ctx.fillRect(0, 0, vw, vh);
    }
    return;
  }
  // Fallback: vertical gradient sky (3 stops for a soft horizon band), a
  // hazy sun glow, one far hill line, clouds. The silhouette layers drawn
  // after this supply the mid/near depth.
  var grad = ctx.createLinearGradient(0, 0, 0, vh);
  grad.addColorStop(0, P.sky[0]);
  grad.addColorStop(0.62, mixColor(P.sky[0], P.sky[1], 0.55));
  grad.addColorStop(1, P.sky[1]);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, vw, vh);

  ctx.globalAlpha = 0.16; ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(vw * 0.8, vh * 0.25, 58, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.24;
  ctx.beginPath(); ctx.arc(vw * 0.8, vh * 0.25, 34, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;

  drawHills(camX * 0.18, vw, vh, vh * 0.58, mixColor(P.hill1, P.sky[0], 0.45), 90);

  if (theme !== 'cave') drawClouds(camX, vw, vh);
}

// ---- colour helpers for the parallax layers -------------------------
function hexRgb(hex) {
  return [parseInt(hex.substr(1, 2), 16), parseInt(hex.substr(3, 2), 16), parseInt(hex.substr(5, 2), 16)];
}
function mixColor(hexA, hexB, t) {
  var a = hexRgb(hexA), b = hexRgb(hexB);
  return 'rgb(' + Math.round(a[0] + (b[0] - a[0]) * t) + ',' +
                  Math.round(a[1] + (b[1] - a[1]) * t) + ',' +
                  Math.round(a[2] + (b[2] - a[2]) * t) + ')';
}

// ---- Parallax layers 2 + 3: silhouette canopy/hill ridges -----------
// Pre-rendered per (theme, viewport height, layer) into a 960px-wide strip
// that tiles seamlessly (ridge = whole sine cycles; clumps drawn wrapped).
// Aerial perspective is baked in: shape tops fade toward the sky colour.
var SIL_LAYERS = [
  { par: 0.42, base: 0.60, amp: 16, bump: 30, haze: 0.55 },  // layer 2: far, hazy
  { par: 0.68, base: 0.78, amp: 22, bump: 40, haze: 0.22 }   // layer 3: nearer, darker
];
var _silCache = {};
function silhouetteStrip(theme, vh, li) {
  var key = theme + '|' + vh + '|' + li;
  if (_silCache[key]) return _silCache[key];
  var P = pal(theme), L = SIL_LAYERS[li];
  var w = 960, h = vh + 24;
  var cvs = document.createElement('canvas');
  cvs.width = w; cvs.height = h;
  var g = cvs.getContext('2d');
  // Layer colour: deepen the hill tone (keeps it silhouette-like, not neon),
  // then haze the FAR layer toward the sky for aerial distance.
  var hill = hexRgb(li === 0 ? P.hill1 : P.hill2);
  var sky = hexRgb(P.sky[0]);
  var dk = li === 0 ? 0.30 : 0.48;   // darken amount
  var hzT = li === 0 ? 0.34 : 0.08;  // haze-toward-sky amount
  var colArr = [0, 1, 2].map(function (i) {
    var deep = hill[i] * (1 - dk) + 18 * dk;
    return Math.round(deep * (1 - hzT) + sky[i] * hzT);
  });
  var col = 'rgb(' + colArr[0] + ',' + colArr[1] + ',' + colArr[2] + ')';
  var yBase = h * L.base;
  function ridge(x) {
    return yBase + Math.sin(x / w * Math.PI * 4 + li * 2.1) * L.amp
                 + Math.sin(x / w * Math.PI * 10 + li) * L.amp * 0.4;
  }
  g.fillStyle = col;
  g.beginPath();
  g.moveTo(0, h);
  for (var x = 0; x <= w; x += 12) g.lineTo(x, ridge(x));
  g.lineTo(w, h);
  g.closePath();
  g.fill();
  // Rounded canopy clumps along the ridge (drawn at x-960/x/x+960 so the
  // strip tiles with no seam).
  var spacing = 96, count = Math.floor(w / spacing);
  for (var i = 0; i < count; i++) {
    var bx = i * spacing + hash01(i * 61 + li * 7) * spacing;
    var br = L.bump * (0.5 + hash01(i * 17 + li * 3));
    var byc = ridge(bx) - br * 0.25;
    for (var wr = -1; wr <= 1; wr++) {
      g.beginPath();
      g.arc(bx + wr * w, byc, br, 0, Math.PI * 2);
      g.fill();
      g.fillRect(bx + wr * w - br, byc, br * 2, h - byc);
    }
  }
  // Aerial perspective: fade shape tops toward the sky (only where drawn).
  g.globalCompositeOperation = 'source-atop';
  var hz = g.createLinearGradient(0, yBase - L.bump * 2.2, 0, h);
  hz.addColorStop(0, 'rgba(' + sky[0] + ',' + sky[1] + ',' + sky[2] + ',' + (L.haze * 0.6) + ')');
  hz.addColorStop(1, 'rgba(' + sky[0] + ',' + sky[1] + ',' + sky[2] + ',0)');
  g.fillStyle = hz;
  g.fillRect(0, 0, w, h);
  g.globalCompositeOperation = 'source-over';
  _silCache[key] = cvs;
  return cvs;
}
function drawSilhouettes(theme, camX, camY, vw, vh) {
  for (var li = 0; li < SIL_LAYERS.length; li++) {
    var strip = silhouetteStrip(theme, vh, li);
    var xo = -((camX * SIL_LAYERS[li].par) % 960);
    var yo = -clamp(camY * (0.04 + li * 0.03), 0, 24);
    ctx.drawImage(strip, xo, yo);
    ctx.drawImage(strip, xo + 960, yo);
  }
}

function drawHills(scroll, vw, vh, baseY, color, amp) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, vh);
  var step = 40;
  for (var x = -step; x <= vw + step; x += step) {
    var y = baseY + Math.sin((x + scroll) * 0.01) * amp * 0.3 - Math.abs(Math.sin((x + scroll) * 0.005)) * amp * 0.2;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(vw, vh); ctx.closePath(); ctx.fill();
}

function drawClouds(camX, vw, vh) {
  ctx.globalAlpha = 0.5; ctx.fillStyle = '#ffffff';
  for (var i = 0; i < 5; i++) {
    var bx = ((i * 247 - camX * 0.15) % (vw + 200)); if (bx < -100) bx += vw + 200;
    var by = 30 + (i * 53) % Math.max(40, vh * 0.4);
    puff(bx, by, 26 + (i % 3) * 8);
  }
  ctx.globalAlpha = 1;
}
function puff(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.arc(x + r * 0.8, y + 4, r * 0.7, 0, Math.PI * 2);
  ctx.arc(x - r * 0.8, y + 4, r * 0.7, 0, Math.PI * 2);
  ctx.fill();
}

// ====================================================================
//  GAME-JUICE DRAW HELPERS — depth/atmosphere/particles.
//  Each is screen-space (called outside the camera translate) unless noted.
// ====================================================================

// Cheap deterministic hash -> [0,1). Stable per integer key, so procedural
// scenery sits in the same world spot every frame (no flicker/teleport).
function hash01(n) {
  n = (n << 13) ^ n;
  n = (n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff;
  return n / 0x7fffffff;
}

// ---- (1) NEAR FOREGROUND silhouette layer ---------------------------
// Dark, semi-transparent vines + leaf clusters that scroll FASTER than the
// world. Hanging from the top + creeping from the sides. Fully procedural
// (bezier vines + leaf blobs) so it works with zero foreground art. This is
// the single biggest "3D diorama" depth cue in 16-bit-era jungle platformers.
function drawForeground(theme, camX, camY, vw, vh) {
  if (!JUICE.FG_ENABLE) return;
  var t = performance.now() / 1000;
  // Foreground scrolls faster than the world -> stronger parallax separation.
  var scrollX = camX * JUICE.FG_PARALLAX;
  var tile = JUICE.FG_TILE;
  // Which world-tiles are visible (plus a margin so clusters enter/exit smoothly).
  var first = Math.floor((scrollX - tile) / tile);
  var last  = Math.ceil((scrollX + vw + tile) / tile);
  ctx.save();
  ctx.globalAlpha = JUICE.FG_ALPHA;
  for (var ti = first; ti <= last; ti++) {
    var slotWorld = ti * tile;
    var screenBase = slotWorld - scrollX;   // left edge of this slot on screen
    // --- hanging vines from the TOP edge ---
    for (var hv = 0; hv < JUICE.FG_VINES_TOP; hv++) {
      var key = ti * 131 + hv * 17;
      // Edge-bias: fold the random position toward the OUTER bands of the tile so
      // hanging vines hug the left/right thirds and leave the central play lane clear.
      var rnd = hash01(key);
      var bias = JUICE.FG_EDGE_BIAS;                  // 0 = uniform, 0.5 = hug both edges
      var frac = (rnd < 0.5) ? (rnd * (1 - 2 * bias)) // left band: [0 .. 0.5-bias]
                             : (rnd * (1 - 2 * bias) + 2 * bias); // right band: [0.5+bias .. 1]
      var fx = screenBase + frac * tile;
      var len = vh * (0.20 + hash01(key + 1) * 0.45);
      var sway = Math.sin(t * JUICE.FG_SWAY_SPEED + key) * JUICE.FG_SWAY_AMP;
      var thick = 3 + hash01(key + 2) * 3;
      drawVine(fx, -8, fx + sway, len, thick, key);
    }
  }
  // --- creeping vines from the LEFT + RIGHT edges (anchored to the viewport) ---
  for (var sv = 0; sv < JUICE.FG_VINES_SIDE; sv++) {
    var lk = sv * 23 + 7;
    var lyl = vh * (0.10 + hash01(lk) * 0.7);
    var lsway = Math.sin(t * JUICE.FG_SWAY_SPEED + lk) * JUICE.FG_SWAY_AMP;
    drawVine(-10, lyl, vw * (0.10 + hash01(lk + 1) * 0.12), lyl + lsway - vh * 0.05, 4 + hash01(lk + 2) * 3, lk, true);
    var rk = sv * 29 + 13;
    var ryl = vh * (0.10 + hash01(rk) * 0.7);
    var rsway = Math.sin(t * JUICE.FG_SWAY_SPEED + rk) * JUICE.FG_SWAY_AMP;
    drawVine(vw + 10, ryl, vw * (0.88 - hash01(rk + 1) * 0.12), ryl + rsway - vh * 0.05, 4 + hash01(rk + 2) * 3, rk, true);
  }
  ctx.restore();
}

// One dark silhouette vine (bezier) ending in a small leaf cluster. If sideways
// is true, (x0,y0)->(x1,y1) is treated as a horizontal-ish creeper.
function drawVine(x0, y0, x1, y1, thick, seed, sideways) {
  // Near-black green so it reads as an out-of-focus foreground mass.
  ctx.strokeStyle = '#0a160c';
  ctx.fillStyle = '#0a160c';
  ctx.lineWidth = thick;
  ctx.lineCap = 'round';
  var midX, midY;
  if (sideways) { midX = (x0 + x1) / 2; midY = (y0 + y1) / 2 + (hash01(seed + 5) - 0.5) * 40; }
  else { midX = x0 + (hash01(seed + 5) - 0.5) * 60; midY = (y0 + y1) / 2; }
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.quadraticCurveTo(midX, midY, x1, y1);
  ctx.stroke();
  // Leaf clusters along the vine: a few overlapping ovals.
  var leaves = 3 + Math.floor(hash01(seed + 6) * 3);
  for (var i = 0; i < leaves; i++) {
    var f = (i + 1) / (leaves + 1);
    // Point on the quadratic bezier at parameter f.
    var bx = (1 - f) * (1 - f) * x0 + 2 * (1 - f) * f * midX + f * f * x1;
    var by = (1 - f) * (1 - f) * y0 + 2 * (1 - f) * f * midY + f * f * y1;
    var lr = thick * (1.6 + hash01(seed + 10 + i) * 1.8);
    var ang = hash01(seed + 20 + i) * Math.PI;
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(ang);
    ctx.beginPath();
    ctx.ellipse(0, 0, lr * 1.6, lr * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // A bigger leaf clump at the tip.
  ctx.beginPath();
  ctx.ellipse(x1, y1, thick * 2.6, thick * 1.4, hash01(seed + 30) * Math.PI, 0, Math.PI * 2);
  ctx.fill();
}

// ---- (2) AMBIENT PARTICLES ------------------------------------------
// A persistent pool that drifts slowly across the viewport, wrapping at the
// edges. Look + motion per theme (fireflies/leaves/motes/snow/spores/dust).
// Drift gets a slight parallax tie to the camera so it feels volumetric.
function buildAmbient(theme, vw, vh) {
  var kinds = atmo(theme).amb;
  var arr = [];
  for (var i = 0; i < JUICE.AMB_COUNT; i++) {
    var kind = kinds[i % kinds.length];
    arr.push(makeAmbientP(kind, vw, vh, true));
  }
  ambient = arr; ambientTheme = theme;
}
function makeAmbientP(kind, vw, vh, anywhere) {
  var p = { kind: kind, x: Math.random() * vw, y: anywhere ? Math.random() * vh : -10,
            phase: Math.random() * 6.28, seed: Math.random() * 1000 };
  if (kind === 'snow') { p.vx = -8 + Math.random() * 16; p.vy = 22 + Math.random() * 26; p.r = 1.5 + Math.random() * 2.5; }
  else if (kind === 'leaf') { p.vx = -14 - Math.random() * 18; p.vy = 14 + Math.random() * 16; p.r = 3 + Math.random() * 3; }
  else if (kind === 'firefly') { p.vx = -6 + Math.random() * 12; p.vy = -4 + Math.random() * 8; p.r = 1.2 + Math.random() * 1.8; }
  else if (kind === 'spore') { p.vx = -5 + Math.random() * 10; p.vy = -10 - Math.random() * 12; p.r = 1.5 + Math.random() * 2.2; }
  else if (kind === 'mote') { p.vx = -4 + Math.random() * 8; p.vy = -6 - Math.random() * 8; p.r = 1.0 + Math.random() * 1.6; }
  else /* dust */ { p.vx = -6 + Math.random() * 12; p.vy = -2 + Math.random() * 6; p.r = 1.0 + Math.random() * 1.4; }
  return p;
}
function drawAmbient(theme, camX, camY, vw, vh, dt) {
  if (JUICE.AMB_COUNT <= 0) return;
  if (!ambient || ambientTheme !== theme || ambient.length !== JUICE.AMB_COUNT) buildAmbient(theme, vw, vh);
  var t = performance.now() / 1000;
  var dtc = (dt && dt > 0) ? Math.min(dt, 0.05) : 0.016;
  // Integrate positions ONCE per frame (race mode draws two viewports from the
  // same shared pool — without this guard particles would move at 2x speed).
  if (drawAmbient._frame !== frame) {
    drawAmbient._frame = frame;
    // Subtle camera-driven counter-drift so particles feel volumetric (parallax).
    // Clamped so a big camera jump can never make particles teleport.
    var camDrift = clamp((camX - (drawAmbient._lastCam == null ? camX : drawAmbient._lastCam)) * JUICE.AMB_PARALLAX, -3, 3);
    drawAmbient._lastCam = camX;
    for (var i = 0; i < ambient.length; i++) {
      var p = ambient[i];
      p.x += (p.vx + Math.sin(t * 0.8 + p.phase) * 6) * dtc - camDrift;
      p.y += p.vy * dtc;
      // Wrap around the viewport so the pool is endless and cheap.
      if (p.x < -12) p.x = vw + 10; else if (p.x > vw + 12) p.x = -10;
      if (p.y < -12) p.y = vh + 10; else if (p.y > vh + 12) p.y = -10;
    }
  }
  ctx.save();
  for (var j = 0; j < ambient.length; j++) drawAmbientP(ambient[j], ambient[j].x, ambient[j].y, t);
  ctx.restore();
}
function drawAmbientP(p, x, y, t) {
  var k = p.kind;
  if (k === 'firefly') {
    var glow = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * 3 + p.phase));
    ctx.globalAlpha = JUICE.AMB_ALPHA * glow;
    ctx.fillStyle = '#fff2a8';
    ctx.beginPath(); ctx.arc(x, y, p.r * 2.2, 0, Math.PI * 2); ctx.globalAlpha = JUICE.AMB_ALPHA * glow * 0.3; ctx.fill();
    ctx.globalAlpha = JUICE.AMB_ALPHA * glow; ctx.fillStyle = '#fffbdc';
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
  } else if (k === 'snow') {
    ctx.globalAlpha = JUICE.AMB_ALPHA * 0.9; ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
  } else if (k === 'leaf') {
    ctx.globalAlpha = JUICE.AMB_ALPHA * 0.8;
    ctx.fillStyle = (p.seed % 2 < 1) ? '#7aa83a' : '#c98a2a';
    ctx.save(); ctx.translate(x, y); ctx.rotate(t * 1.5 + p.phase);
    ctx.beginPath(); ctx.ellipse(0, 0, p.r * 1.6, p.r * 0.7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  } else if (k === 'spore') {
    var sg = 0.5 + 0.5 * Math.sin(t * 2 + p.phase);
    ctx.globalAlpha = JUICE.AMB_ALPHA * (0.4 + 0.6 * sg);
    ctx.fillStyle = (p.seed % 2 < 1) ? '#ff8ad8' : '#6af0e0';
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
  } else if (k === 'mote') {
    var mg = 0.4 + 0.6 * Math.sin(t * 1.6 + p.phase);
    ctx.globalAlpha = JUICE.AMB_ALPHA * (0.3 + 0.5 * mg);
    ctx.fillStyle = '#9fd0ff';
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
  } else { // dust
    ctx.globalAlpha = JUICE.AMB_ALPHA * 0.4;
    ctx.fillStyle = '#d8c89a';
    ctx.beginPath(); ctx.arc(x, y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- (3a) GOD-RAY light beams (behind the world) --------------------
function drawGodRays(theme, vw, vh) {
  if (!JUICE.RAYS_ENABLE) return;
  var col = atmo(theme).ray;
  var t = performance.now() / 1000;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (var i = 0; i < JUICE.RAYS_COUNT; i++) {
    var f = (i + 0.5) / JUICE.RAYS_COUNT;
    var cx = vw * (0.15 + f * 0.6);
    var sweep = Math.sin(t * 0.15 + i) * 24;        // very slow drift
    var bw = vw * (0.10 + 0.05 * ((i % 2)));         // beam width
    var a = JUICE.RAYS_ALPHA * (0.7 + 0.3 * Math.sin(t * 0.4 + i)); // gentle pulse
    var g = ctx.createLinearGradient(cx + sweep, 0, cx + sweep + vh * 0.5, vh);
    g.addColorStop(0,   'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + a + ')');
    g.addColorStop(1,   'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(cx + sweep - bw / 2, 0);
    ctx.lineTo(cx + sweep + bw / 2, 0);
    ctx.lineTo(cx + sweep + bw / 2 + vh * 0.5, vh);
    ctx.lineTo(cx + sweep - bw / 2 + vh * 0.5, vh);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ---- (3b) Atmosphere overlay: per-theme color grade + vignette ------
function drawAtmosphereOverlay(theme, vw, vh) {
  var A = atmo(theme);
  // Per-theme color grade: unify the palette with a faint full-screen tint.
  // gradeA lets a theme override the global GRADE_ALPHA (ruins runs hotter).
  var gA = (typeof A.gradeA === 'number') ? A.gradeA : JUICE.GRADE_ALPHA;
  if (gA > 0) {
    var g = A.grade;
    ctx.save();
    ctx.globalCompositeOperation = 'soft-light';
    ctx.globalAlpha = gA;
    ctx.fillStyle = 'rgb(' + g[0] + ',' + g[1] + ',' + g[2] + ')';
    ctx.fillRect(0, 0, vw, vh);
    ctx.restore();
  }
  // Optional per-theme WASH (multiply) for a strong color identity — e.g. ruins
  // gets a golden-hour wash so the overgrown stone reads as warm sandstone, not jungle.
  if (A.wash && A.washA > 0) {
    ctx.save();
    ctx.globalCompositeOperation = A.washMode || 'multiply';
    ctx.globalAlpha = A.washA;
    ctx.fillStyle = 'rgb(' + A.wash[0] + ',' + A.wash[1] + ',' + A.wash[2] + ')';
    ctx.fillRect(0, 0, vw, vh);
    ctx.restore();
  }
  // Vignette: darken the corners with a radial gradient.
  if (JUICE.VIGNETTE_ENABLE) {
    var r = Math.max(vw, vh) * 0.75;
    var vg = ctx.createRadialGradient(vw / 2, vh / 2, r * 0.45, vw / 2, vh / 2, r);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,' + JUICE.VIGNETTE_ALPHA + ')');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, vw, vh);
  }
}

// Soft elliptical drop shadow for world entities (world-space; two fills so
// the edge stays soft without a per-frame gradient).
function softShadow(cx, cy, rw, alpha) {
  ctx.save();
  ctx.fillStyle = '#000';
  ctx.globalAlpha = alpha * 0.45;
  ctx.beginPath(); ctx.ellipse(cx, cy + 1, rw * 1.35, Math.max(2.5, rw * 0.34), 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.ellipse(cx, cy + 1, rw, Math.max(2, rw * 0.26), 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawCoin(co) {
  var t = frame * 0.12 + co.spin;
  var cx = co.x + TILE / 2, cy = co.y + TILE / 2 + Math.sin(t * 0.7) * 2;
  // Grounded shadow when the cell below is solid (bob modulates it subtly).
  if (solidGrid(co.c, co.r + 1)) {
    softShadow(cx, (co.r + 1) * TILE, 7 - Math.sin(t * 0.7), 0.16);
  }
  var img = acornImg('acorn-coin');
  if (imgReady(img)) {
    // Acorn coin sprite: bob + gentle horizontal "spin" via x-scale (never below
    // a sliver, so it always reads). Sized to ~the tile, aspect-correct.
    var sx = 0.35 + Math.abs(Math.cos(t)) * 0.65;
    var dh = TILE * 0.95;
    var dw = dh * (img.naturalWidth / img.naturalHeight);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(sx, 1);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
    ctx.restore();
    return;
  }
  var w = Math.abs(Math.cos(t)) * 14 + 4;
  ctx.fillStyle = '#f6c945';
  ctx.beginPath(); ctx.ellipse(cx, cy, w / 2, 11, 0, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c79a16'; ctx.lineWidth = 1.5; ctx.stroke();
  if (w > 8) { ctx.fillStyle = '#fff3c4'; ctx.beginPath(); ctx.ellipse(cx - w * 0.12, cy - 3, w * 0.12, 3, 0, 0, Math.PI * 2); ctx.fill(); }
}

function drawSpike(sk, P) {
  var x = sk.x, y = sk.y;
  ctx.fillStyle = '#cfd6dd';
  for (var i = 0; i < 3; i++) {
    var bx = x + 2 + i * (TILE - 4) / 3;
    ctx.beginPath();
    ctx.moveTo(bx, y + TILE - 2);
    ctx.lineTo(bx + (TILE - 4) / 6, y + 8);
    ctx.lineTo(bx + (TILE - 4) / 3, y + TILE - 2);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle = '#7a8089'; ctx.fillRect(x, y + TILE - 4, TILE, 4);
}

function drawEnemy(en) {
  var x = en.x, y = en.y, w = en.w, h = en.h;
  softShadow(x + w / 2, y + h, w * 0.62, 0.22);
  // Real frames carry the motion now, so the bob is gentle. Dying enemies hold
  // perfectly still (no bob) while the squish frame shows.
  var bob = en.dying ? 0 : Math.sin(en.anim * 8) * 0.8;
  var type = en.type || 'beetle';

  // Frame selection: squish when dying, else alternate walk1/walk2 by the clock.
  var frameName = en.dying
    ? (type + '-squish')
    : (type + (Math.floor(en.anim / ENEMY.WALK_FRAME_S) % 2 === 0 ? '-walk1' : '-walk2'));

  // Fallback chain: per-type frame -> legacy 'enemy-<type>' -> procedural blob.
  var img = acornImg(frameName);
  if (!imgReady(img)) img = acornImg('enemy-' + type);

  if (imgReady(img)) {
    // Sprites face RIGHT; flip when patrolling left. Drawn larger than the hitbox
    // and anchored at the hitbox bottom so it sits on the floor. A dying enemy has
    // dir==0, so default the flip to its drawn facing (1 = right).
    var dh = h * 1.7;
    var dw = dh * (img.naturalWidth / img.naturalHeight);
    var cx = x + w / 2, footY = y + h;
    ctx.save();
    ctx.translate(cx, footY + bob);
    ctx.scale(en.dir < 0 ? -1 : 1, 1);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, -dw / 2, -dh, dw, dh);
    ctx.restore();
    return;
  }

  ctx.fillStyle = '#9a5bd6';
  ctx.beginPath(); ctx.ellipse(x + w / 2, y + h / 2 + bob, w / 2, h / 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#5e2f8e'; ctx.fillRect(x + 2, y + h / 2 + bob, w - 4, h / 2 - 2);
  ctx.fillStyle = '#3c1d5e';
  var fp = (en.dir > 0) ? 0 : 1;
  ctx.fillRect(x + 3 + fp * 2, y + h - 3 + bob, 4, 3);
  ctx.fillRect(x + w - 7 - fp * 2, y + h - 3 + bob, 4, 3);
  ctx.fillStyle = '#fff';
  var ex = x + w / 2 + en.dir * 3;
  ctx.beginPath(); ctx.arc(ex - 3, y + h / 2 - 2 + bob, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + 3, y + h / 2 - 2 + bob, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(ex - 3 + en.dir, y + h / 2 - 2 + bob, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex + 3 + en.dir, y + h / 2 - 2 + bob, 1, 0, Math.PI * 2); ctx.fill();
}

// (1) SPRING — drawn as a bouncy mushroom. Art-swap hook: 'mushroom-spring'.
// When that PNG exists it's drawn (compressed by bo.t); otherwise a procedural
// red/white-spotted cap on a cream stem, compressing when bo.t>0.
function drawBoost(bo) {
  var x = bo.x, y = bo.y;
  var k = bo.t > 0 ? (bo.t / 0.25) : 0;     // 1 right after a hit -> 0 (anim phase)
  var squashY = 1 - k * SPRING.SQUASH;       // compress vertically up to SQUASH
  softShadow(x + TILE / 2, y + TILE, TILE * 0.34, 0.16);

  var img = acornImg('mushroom-spring');
  if (imgReady(img)) {
    // Mushroom sprite anchored at the tile bottom; compresses on trigger then
    // springs back. Width fits the tile; height keeps aspect (can poke up above).
    var dw = TILE * 0.96;
    var dh = dw * (img.naturalHeight / img.naturalWidth) * squashY;
    var cx = x + TILE / 2, footY = y + TILE;
    ctx.save();
    ctx.translate(cx, footY);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, -dw / 2, -dh, dw, dh);
    ctx.restore();
    return;
  }

  // --- Procedural bouncy mushroom (no art needed) ---
  var cxp = x + TILE / 2, base = y + TILE;
  var capW = (TILE - 4) * (1 + k * 0.18);          // cap squishes WIDER as it compresses
  var capH = (TILE * 0.46) * squashY;
  var stemH = (TILE * 0.40) * squashY;
  var stemW = TILE * 0.34;
  var capCy = base - stemH - capH * 0.5;            // cap centre sits atop the stem
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  // cream stem
  ctx.fillStyle = '#f3e9d2';
  ctx.beginPath();
  ctx.moveTo(cxp - stemW / 2, base);
  ctx.lineTo(cxp + stemW / 2, base);
  ctx.lineTo(cxp + stemW * 0.36, base - stemH);
  ctx.lineTo(cxp - stemW * 0.36, base - stemH);
  ctx.closePath(); ctx.fill();
  // bright red rounded cap (half-dome)
  ctx.fillStyle = '#ec3b46';
  ctx.beginPath();
  ctx.ellipse(cxp, capCy + capH * 0.35, capW / 2, capH, 0, Math.PI, 0);
  ctx.lineTo(cxp + capW / 2, capCy + capH * 0.35);
  ctx.lineTo(cxp - capW / 2, capCy + capH * 0.35);
  ctx.closePath(); ctx.fill();
  // darker red lower lip for a touch of shading
  ctx.fillStyle = '#c32731';
  ctx.fillRect(cxp - capW / 2, capCy + capH * 0.30, capW, Math.max(2, capH * 0.18));
  // white spots
  ctx.fillStyle = '#fff4e6';
  var spots = [[-0.26, -0.18, 0.13],[0.20, -0.10, 0.15],[-0.02, -0.34, 0.11],[0.34, 0.06, 0.10],[-0.40, 0.04, 0.09]];
  for (var s = 0; s < spots.length; s++) {
    ctx.beginPath();
    ctx.arc(cxp + spots[s][0] * capW, capCy + spots[s][1] * capH * 2, spots[s][2] * capW * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// (2) FAN — spinning maple-seed updraft. Art-swap hook: 'maple-seed' (rotated by
// time). Procedural fallback: a winged samara seed spinning at the base + a few
// rising wind/seed particles up the FAN.HEIGHT-cell column. Decoration only.
function drawFan(fn) {
  var cx = fn.x + TILE / 2;
  var base = fn.y + TILE;                       // bottom of the fan cell
  var colTop = fn.y - FAN.HEIGHT * TILE;        // top of the wind column
  var colH = base - colTop;
  var t = frame * 0.12;                          // spin/scroll clock

  // Faint wind column so the lift zone is readable.
  ctx.save();
  ctx.fillStyle = 'rgba(210,235,255,0.07)';
  ctx.fillRect(fn.x + 3, colTop, TILE - 6, colH);
  ctx.restore();

  // Rising wind/seed particles drifting UP the column (loop with frame).
  ctx.save();
  ctx.fillStyle = 'rgba(235,245,255,0.55)';
  for (var i = 0; i < 5; i++) {
    var ph = ((frame * 1.6 + i * 47) % (colH));          // 0..colH, wraps
    var py = base - ph;                                   // rises from base to top
    var sway = Math.sin((frame * 0.06) + i * 1.3) * (TILE * 0.28);
    var pr = 1.4 + (i % 3) * 0.7;
    ctx.globalAlpha = 0.15 + 0.45 * (1 - ph / colH);      // fade as they rise
    ctx.beginPath(); ctx.arc(cx + sway, py, pr, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // The seed itself, spinning at the base.
  var seedCy = base - TILE * 0.5;
  var img = acornImg('maple-seed');
  if (imgReady(img)) {
    var dw = TILE * 0.9, dh = dw * (img.naturalHeight / img.naturalWidth);
    ctx.save();
    ctx.translate(cx, seedCy);
    ctx.rotate(t);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
    ctx.restore();
    return;
  }

  // --- Procedural winged samara (one heavy seed + a translucent wing), spinning ---
  ctx.save();
  ctx.translate(cx, seedCy);
  ctx.rotate(t);
  // wing (light green, swept)
  ctx.fillStyle = 'rgba(150,200,110,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(TILE * 0.55, -TILE * 0.10, TILE * 0.62, TILE * 0.06);
  ctx.quadraticCurveTo(TILE * 0.40, TILE * 0.16, 0, TILE * 0.05);
  ctx.closePath(); ctx.fill();
  // wing vein
  ctx.strokeStyle = 'rgba(90,140,60,0.7)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(TILE * 0.58, TILE * 0.02); ctx.stroke();
  // seed pod (brown, weighted end)
  ctx.fillStyle = '#7a4a22';
  ctx.beginPath(); ctx.ellipse(-TILE * 0.06, TILE * 0.02, TILE * 0.13, TILE * 0.09, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#9c6234';
  ctx.beginPath(); ctx.ellipse(-TILE * 0.08, 0, TILE * 0.06, TILE * 0.05, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// Draw a smashable prop using its current crack frame. Anchored so the prop's
// feet sit on the ground (bottom-aligned). Reuses acornImg() (art/acorn/*.png)
// with imgReady guards — until the image loads we draw a simple block fallback,
// so it never crashes and is never invisible.
function drawSmashable(so) {
  var imgName = so.frames[Math.min(so.frame, so.frames.length - 1)];
  var img = acornImg(imgName);
  // Single-frame pop flash: scale up briefly right after the hit.
  var scale = 1;
  if (so.state === 'smashing' && SMASH_TYPES[so.type] && !SMASH_TYPES[so.type].multi) {
    var k = Math.max(0, (so.popUntil || 0) / (SMASH.POP_MS / 1000)); // 1 -> 0
    scale = 1 + (SMASH.POP_SCALE - 1) * k;
  }
  var footX = so.x + so.w / 2, footY = so.y + so.h;
  softShadow(footX, footY, so.w * 0.36 * scale, 0.18);
  if (imgReady(img)) {
    var dw = so.w, dh = so.h;
    // keep the art's aspect ratio, fit within the square footprint
    var ar = img.naturalWidth / img.naturalHeight;
    if (ar >= 1) { dh = so.w / ar; } else { dw = so.h * ar; }
    dw *= scale; dh *= scale;
    ctx.save();
    ctx.translate(footX, footY);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, -dw / 2, -dh, dw, dh);
    ctx.restore();
    return;
  }
  // Fallback block (image not loaded yet): a simple colored box so the prop is
  // always visible and clearly smashable.
  var def = SMASH_TYPES[so.type];
  var col = (def && def.stone) ? '#8a8a82' : '#9c5a2c';
  var bw = so.w * 0.8 * scale, bh = so.h * 0.8 * scale;
  ctx.fillStyle = col;
  ctx.fillRect(footX - bw / 2, footY - bh, bw, bh);
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(footX - bw / 2, footY - bh, bw, bh);
}

function drawFinish() {
  var x = finishCell.c * TILE, y = finishCell.r * TILE;
  var poleH = TILE * 2;
  var py = y + TILE - poleH;
  ctx.fillStyle = '#d8d8d8'; ctx.fillRect(x + TILE / 2 - 2, py, 3, poleH);
  var fw = 22, fh = 16, n = 4, cw = fw / n, chh = fh / n;
  var wave = Math.sin(frame * 0.15) * 2;
  for (var i = 0; i < n; i++) for (var j = 0; j < n; j++) {
    ctx.fillStyle = ((i + j) % 2 === 0) ? '#111' : '#f4f4f4';
    ctx.fillRect(x + TILE / 2 + 1 + i * cw + Math.sin((j + frame * 0.1)) * 1, py + j * chh + wave * (i / n), cw + 0.5, chh + 0.5);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x - 6, py - 14, 44, 12);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 8px monospace'; ctx.textAlign = 'left';
  ctx.fillText('FINISH', x - 3, py - 5);
}

function drawStartMarker() {
  var x = startCell.c * TILE, y = startCell.r * TILE;
  ctx.fillStyle = 'rgba(143,214,107,0.5)';
  ctx.fillRect(x + TILE / 2 - 1, y - TILE + 6, 2, TILE - 6);
  ctx.fillStyle = '#8fd66b';
  ctx.beginPath();
  ctx.moveTo(x + TILE / 2 + 1, y - TILE + 6);
  ctx.lineTo(x + TILE / 2 + 12, y - TILE + 11);
  ctx.lineTo(x + TILE / 2 + 1, y - TILE + 16);
  ctx.closePath(); ctx.fill();
}

// Choose the animation state name from the player's motion.
function playerAnimState(pl) {
  if (!pl.onGround) return 'jump';                 // airborne (rising or falling)
  if (pl.sliding) return 'slide';                  // (3) low slide pose (priority over punch/run)
  if (pl.punchT > 0) return 'punch';               // (4) jab pose (priority over run/idle)
  if (Math.abs(pl.vx) > 30) return 'run';          // moving on the ground
  return 'idle';                                    // ~still
}

// ---- HERO POP helpers — keep the character readable against busy foliage. ----
// All three are pure decoration: they never read/write gameplay state and run
// inside (or just under) the SAME transform as the body so equip layers stay locked.

// Soft contact/drop shadow PROJECTED onto the ground beneath the feet: the
// shadow stays on the terrain while the player jumps, shrinking and fading
// with height. World-space; call BEFORE the sprite, at the feet anchor
// (footX = centre, footY = bottom of hitbox).
function drawPlayerContactShadow(footX, footY, drawW) {
  if (!JUICE.CONTACT_SHADOW) return;
  // Scan straight down from the feet for the first solid row.
  var cc = Math.floor(footX / TILE);
  var gy = null;
  for (var rr = Math.max(0, Math.floor(footY / TILE)); rr < ROWS; rr++) {
    if (solidGrid(cc, rr)) { gy = rr * TILE; break; }
  }
  if (gy == null) return;                       // over a pit -> no shadow
  var k = 1 - Math.min(1, Math.max(0, gy - footY) / 220);
  if (k <= 0.02) return;
  var s = 0.55 + 0.45 * k;
  var rw = drawW * JUICE.CONTACT_W * s;
  var rh = drawW * JUICE.CONTACT_H * s;
  ctx.save();
  ctx.globalAlpha = JUICE.CONTACT_ALPHA * (0.25 + 0.75 * k);
  var g = ctx.createRadialGradient(footX, gy, 0, footX, gy, rw);
  g.addColorStop(0, 'rgba(0,0,0,0.9)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(footX, gy, rw, rh, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// (4) Procedural PUNCH arm — a short jab drawn in front of the body, INSIDE the
// body transform (so it shares the facing flip + lean). "Forward" is +x because
// ctx.scale(facing) has already been applied. Only used when no <type>-punch art
// is ready. (dw, dh) are the sprite's drawn size; box bottom is local y=0.
function drawProcPunchArm(dw, dh, idx) {
  var armColor = idx === 1 ? '#e7a9c4' : '#b07a44';   // girl pink-ish / boy tan
  var fistColor = idx === 1 ? '#d98ab0' : '#8a5a2a';
  var midY = -dh * 0.5;                                // shoulder/body mid height
  var armLen = dw * 0.55, armThick = Math.max(3, dh * 0.10);
  var startX = dw * 0.18;
  ctx.save();
  ctx.fillStyle = armColor;
  ctx.fillRect(startX, midY - armThick / 2, armLen, armThick);   // arm
  ctx.fillStyle = fistColor;
  ctx.beginPath(); ctx.arc(startX + armLen, midY, armThick * 0.9, 0, Math.PI * 2); ctx.fill(); // fist
  // tiny impact flick lines past the fist
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.4;
  for (var i = -1; i <= 1; i++) {
    var ly = midY + i * armThick * 0.8;
    ctx.beginPath(); ctx.moveTo(startX + armLen + armThick, ly); ctx.lineTo(startX + armLen + armThick + dw * 0.16, ly); ctx.stroke();
  }
  ctx.restore();
}

// Faint warm halo centred on the sprite body. Drawn INSIDE the body transform,
// before the sprite, so it follows lean/flip and never offsets the equip anchors.
// (dw, dh) are the sprite's drawn size; the box bottom is at local y=0.
function drawHeroBackGlow(dw, dh) {
  if (!JUICE.GLOW_ENABLE) return;
  var cx = 0, cy = -dh * 0.5;                 // sprite centre in local space
  var r = dh * JUICE.GLOW_RADIUS;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';   // additive -> reads as light, not paint
  var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0, JUICE.GLOW_COLOR);
  g.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(cx, cy, r * 0.7, r, 0, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

// Cream rim/outline behind an IMAGE sprite. We can't safely composite a tint on
// the MAIN canvas (it would bleed onto the scene), so we build a cream-tinted
// silhouette of the sprite ONCE in an offscreen buffer (cached per image), then
// blit it nudged in 8 directions behind the real sprite. Drawn INSIDE the body
// transform, before the real sprite; equip is drawn after, so anchors are untouched.
var _rimCache = {};   // image.src -> tinted offscreen canvas (its own pixel grid)
function rimSilhouette(img) {
  var key = img.src;
  var cached = _rimCache[key];
  if (cached) return cached;
  var iw = img.naturalWidth, ih = img.naturalHeight;
  if (!iw || !ih) return null;
  var off = document.createElement('canvas');
  off.width = iw; off.height = ih;
  var octx = off.getContext('2d');
  octx.imageSmoothingEnabled = false;
  octx.drawImage(img, 0, 0, iw, ih);            // the sprite's alpha mask
  octx.globalCompositeOperation = 'source-atop'; // recolor ONLY this buffer's pixels
  octx.fillStyle = JUICE.RIM_COLOR;
  octx.fillRect(0, 0, iw, ih);
  _rimCache[key] = off;
  return off;
}
function drawSpriteRim(img, dx, dy, dw, dh) {
  if (!JUICE.RIM_ENABLE || !imgReady(img)) return;
  var sil = rimSilhouette(img);
  if (!sil) return;
  var p = JUICE.RIM_PX;
  var offs = [[-p,0],[p,0],[0,-p],[0,p],[-p,-p],[p,-p],[-p,p],[p,p]];
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  for (var i = 0; i < offs.length; i++) {
    ctx.drawImage(sil, dx + offs[i][0], dy + offs[i][1], dw, dh);
  }
  ctx.restore();
}

function drawPlayerSprite(pl, P) {
  var w = PLAYER_W, h = PLAYER_H;
  var sq = pl.squash;
  var stunBlink = pl.stun > 0 && (Math.floor(frame / 4) % 2 === 0);

  var anim = playerAnimState(pl);
  var img = playerFrameImg(pl.idx, anim);

  // ---- Shared "liveliness" motion (applied identically across all draw paths
  //  so the hat/tool overlay layers stay locked to the body) -------------
  var spd = clamp(pl.vx / RUN_MAX, -1, 1);
  // Forward lean: base lean + extra lean that scales with run speed.
  var lean = spd * (0.12 + JUICE.RUN_LEAN);
  // Run bob: smooth vertical sine on the distance-based anim clock (the old
  // 2-step square hop felt robotic). Idle: gentle breathing handled via scale.
  var bobShared = 0, strideSkew = 0, breathScale = 1, stretchY = 1;
  if (anim === 'run') {
    var runPhase = pl.anim * JUICE.RUN_BOB_SPEED;
    bobShared = -Math.abs(Math.sin(runPhase)) * JUICE.RUN_BOB_AMP; // up on each step
    // 2-step horizontal shear that fakes a stride lead/trail. The shear is applied
    // before the facing flip, so it reads the same running either direction.
    strideSkew = Math.sin(runPhase) * JUICE.RUN_STRIDE_SKEW;
  } else if (anim === 'idle') {
    breathScale = 1 + Math.sin(pl.breath) * JUICE.IDLE_BREATH_AMP;
  } else if (anim === 'slide' || anim === 'punch') {
    // grounded poses: keep the gentle idle breath baseline (no jump stretch)
  } else { // jump/airborne: stretch tall on the way up, squat slightly falling
    if (pl.vy < 0) stretchY = 1 + JUICE.JUMP_STRETCH;
    else stretchY = 1 - JUICE.JUMP_STRETCH * 0.4;
  }

  // ---- (3)/(4) PROCEDURAL slide/punch poses, folded into the shared transform so
  // ALL draw paths inherit them. When real <type>-slide / <type>-punch art exists,
  // the whole-character image path draws that frame and these tweaks just ride on
  // top harmlessly (lean/squash read fine on a real frame too). dirSign leans into
  // the direction of travel/facing, applied BEFORE the facing flip (like run-lean).
  var dirSign = (pl.vx > 5 ? 1 : (pl.vx < -5 ? -1 : (pl.facing >= 0 ? 1 : -1)));
  var procPunch = (anim === 'punch') && !imgReady(img);  // draw a jab arm in the fallback paths
  if (anim === 'slide') {
    lean += -0.5 * dirSign;          // forward lean into the slide (~ -0.5rad)
    stretchY *= 0.7;                  // vertical squash -> low pose
  } else if (anim === 'punch') {
    lean += 0.14 * dirSign;          // slight forward lean on the jab
  }

  // ---- LAYERED PATH: only when the hatless BASE body art exists. ----
  // Until acornboy-base.png / acorngirl-base.png load, this is skipped and the
  // classic whole-character path below runs unchanged (fallback stays intact).
  var baseImg = acornImg(baseBodyName(pl.idx));
  if (imgReady(baseImg)) {
    // Box is sized from the BASE body's aspect ratio so layers share one frame.
    // breathScale/stretchY fold the idle-breath + jump-stretch into the box, so
    // the fractional equip anchors scale with the body and stay locked.
    var targetHb = PLAYER_H * 1.55 * JUICE.HERO_SCALE_BOOST;
    var dhB = targetHb * (1 - sq * 0.6) * breathScale * stretchY;
    var dwB = dhB * (baseImg.naturalWidth / baseImg.naturalHeight) * (1 + sq * 0.5) / stretchY;
    var footXb = pl.x + w / 2;
    var footYb = pl.y + h;

    // The sprite box in this transformed space is x:[-dwB/2 .. dwB/2], y:[-dhB .. 0].
    // Convert an anchor fraction (0..1 over the box) to local coordinates.
    function boxX(fx) { return -dwB / 2 + fx * dwB; }
    function boxY(fy) { return -dhB + fy * dhB; }

    // Contact shadow on the ground (world-space, before the body transform).
    drawPlayerContactShadow(footXb, footYb, dwB);

    ctx.save();
    if (stunBlink) ctx.globalAlpha = 0.45;
    ctx.translate(footXb, footYb + bobShared);
    ctx.rotate(lean);
    ctx.transform(1, 0, strideSkew, 1, 0, 0);  // stride shear (top leads/trails feet)
    ctx.scale(pl.facing >= 0 ? 1 : -1, 1);
    ctx.imageSmoothingEnabled = false;

    // (pop) back-glow halo + cream rim, BEHIND the body and inside the same
    // transform, so the equip anchors below are unaffected.
    drawHeroBackGlow(dwB, dhB);
    drawSpriteRim(baseImg, -dwB / 2, -dhB, dwB, dhB);

    // (a) base body — feet anchored, same as the classic draw.
    ctx.drawImage(baseImg, -dwB / 2, -dhB, dwB, dhB);

    // (b) tool at the HAND anchor (grip centered on the anchor point).
    var toolImg = pl.equip && pl.equip.tool ? acornImg(toolName(pl.equip.tool)) : null;
    if (toolImg && imgReady(toolImg)) {
      var th = dhB * TOOL_SCALE;
      var tw = th * (toolImg.naturalWidth / toolImg.naturalHeight);
      ctx.drawImage(toolImg, boxX(HAND_ANCHOR.x) - tw / 2, boxY(HAND_ANCHOR.y) - th / 2, tw, th);
    }

    // (c) hat at the HEAD anchor (centered on the anchor point), drawn last/on top.
    var hatImg = pl.equip && pl.equip.hat ? acornImg(hatName(pl.equip.hat)) : null;
    if (hatImg && imgReady(hatImg)) {
      var hw = dwB * HAT_SCALE;
      var hh = hw * (hatImg.naturalHeight / hatImg.naturalWidth);
      ctx.drawImage(hatImg, boxX(HEAD_ANCHOR.x) - hw / 2, boxY(HEAD_ANCHOR.y) - hh / 2, hw, hh);
    }

    if (procPunch) drawProcPunchArm(dwB, dhB, pl.idx);  // (4) jab when no punch art

    ctx.restore();
  } else if (imgReady(img)) {
    // Size from the sprite's own aspect ratio so frames aren't distorted.
    // Target height a touch taller than the hitbox so the character reads well;
    // squash + breath + jump-stretch modulate it for life.
    var targetH = PLAYER_H * 1.55 * JUICE.HERO_SCALE_BOOST;
    var dh = targetH * (1 - sq * 0.6) * breathScale * stretchY;
    var dw = dh * (img.naturalWidth / img.naturalHeight) * (1 + sq * 0.5) / stretchY;
    // Feet anchor: bottom of art sits at the bottom of the hitbox.
    var footX = pl.x + w / 2;
    var footY = pl.y + h;

    // Contact shadow on the ground (world-space, before the body transform).
    drawPlayerContactShadow(footX, footY, dw);

    ctx.save();
    if (stunBlink) ctx.globalAlpha = 0.45;
    ctx.translate(footX, footY + bobShared);
    ctx.rotate(lean);
    ctx.transform(1, 0, strideSkew, 1, 0, 0);  // stride shear, locked to the body
    ctx.scale(pl.facing >= 0 ? 1 : -1, 1);
    ctx.imageSmoothingEnabled = false;
    // (pop) back-glow halo + cream rim, BEHIND the body, same transform as the
    // hat overlay below so its anchor stays locked.
    drawHeroBackGlow(dw, dh);
    drawSpriteRim(img, -dw / 2, -dh, dw, dh);
    ctx.drawImage(img, -dw / 2, -dh, dw, dh); // anchored at feet (y = -dh .. 0)

    // ---- HAT OVERLAY (additive): draw an alternate cap ON TOP of the whole
    // character sprite, COVERING the grey acorn cap that is baked into the base
    // art. Default hat 'acorn' (and 'none') draw nothing so the base cap shows.
    // Drawn inside the SAME transform as the body, so it shares the facing flip,
    // lean, squash and feet anchor. The box here is x:[-dw/2..dw/2], y:[-dh..0];
    // boxX/boxY map an anchor fraction (0..1 over that box) to local coords.
    var hatId = pl.equip && pl.equip.hat;
    if (hatId && hatId !== 'acorn' && hatId !== 'none') {
      var hatImg2 = acornImg(hatName(hatId));
      if (imgReady(hatImg2)) {
        var hbX = function (fx) { return -dw / 2 + fx * dw; };
        var hbY = function (fy) { return -dh + fy * dh; };
        var hw2 = dw * HAT_SCALE;
        var hh2 = hw2 * (hatImg2.naturalHeight / hatImg2.naturalWidth);
        ctx.drawImage(hatImg2, hbX(HEAD_ANCHOR.x) - hw2 / 2, hbY(HEAD_ANCHOR.y) - hh2 / 2, hw2, hh2);
      }
    }

    ctx.restore();
  } else {
    // Fallback: old painterly hero, then procedural blob. Keeps the game alive
    // if the cut-out PNGs are missing. Shares the breath/stretch/bob liveliness.
    var dw0 = w * (1 + sq * 0.5) / stretchY;
    var dh0 = h * (1 - sq * 0.6) * breathScale * stretchY;
    var dx0 = pl.x + (w - dw0) / 2;
    var dy0 = pl.y + (h - dh0);
    // Contact shadow at the feet (no single silhouette here, so rim is skipped;
    // the shadow + a centered glow still lift the blob off the foliage).
    drawPlayerContactShadow(pl.x + w / 2, pl.y + h, dw0);
    ctx.save();
    if (stunBlink) ctx.globalAlpha = 0.45;
    ctx.translate(dx0 + dw0 / 2, dy0 + dh0 / 2 + bobShared);
    ctx.rotate(lean);
    // (pop) centered back-glow — this box is centered at local (0,0).
    if (JUICE.GLOW_ENABLE) {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var gr = dh0 * JUICE.GLOW_RADIUS;
      var gg = ctx.createRadialGradient(0, 0, 0, 0, 0, gr);
      gg.addColorStop(0, JUICE.GLOW_COLOR);
      gg.addColorStop(1, 'rgba(255,240,200,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.ellipse(0, 0, gr * 0.7, gr, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    if (imgReady(heroImg)) {
      if (pl.idx === 1) {
        ctx.filter = 'hue-rotate(280deg) saturate(1.25)';
        ctx.scale(pl.facing >= 0 ? -1 : 1, 1);
      } else {
        ctx.scale(pl.facing >= 0 ? 1 : -1, 1);
      }
      ctx.drawImage(heroImg, -dw0 / 2, -dh0 / 2, dw0, dh0);
      ctx.filter = 'none';
    } else {
      ctx.scale(pl.facing >= 0 ? 1 : -1, 1);
      ctx.fillStyle = pl.idx === 1 ? '#d98ab0' : '#8a5a2a';
      ctx.beginPath(); ctx.ellipse(0, 2, dw0 * 0.42, dh0 * 0.42, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = pl.idx === 1 ? '#6a3a58' : '#5a3a18';
      ctx.fillRect(-dw0 * 0.4, -dh0 * 0.5, dw0 * 0.8, dh0 * 0.32);
      ctx.fillRect(-dw0 * 0.1, -dh0 * 0.62, dw0 * 0.2, dh0 * 0.18);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(dw0 * 0.06, 0, 2.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(dw0 * 0.10, 0, 1.2, 0, Math.PI * 2); ctx.fill();
    }
    // (4) jab arm — fallback box is centred at local (0,0); shift down so the
    // helper's local y=0 (box bottom) lines up, keeping facing flip from scale().
    if (procPunch) { ctx.save(); ctx.translate(0, dh0 / 2); drawProcPunchArm(dw0, dh0, pl.idx); ctx.restore(); }
    ctx.restore();
  }

  if (players.length > 1) {
    ctx.fillStyle = pl.color;
    ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('P' + (pl.idx + 1), pl.x + w / 2, pl.y - 6);
  }
}

function drawHUD() {
  if (state === 'menu') return;
  ctx.fillStyle = 'rgba(10,16,12,0.66)';
  ctx.fillRect(0, 0, GW, 26);
  ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
  ctx.fillStyle = '#b8f08a';
  ctx.fillText((currentLevel && currentLevel.name) || 'Course', 8, 18);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f6c945';
  ctx.fillText(fmtTime(raceTimer), GW / 2, 18);
  ctx.textAlign = 'right';
  if (mode === 'solo') {
    var pl = players[0];
    ctx.fillStyle = '#f6c945';
    ctx.fillText('\u{1FA99} ' + pl.coins + '   ' + Math.floor(progressPct(pl)) + '%', GW - 8, 18);
  } else {
    ctx.fillStyle = '#8fd66b';
    ctx.fillText('P1 ' + Math.floor(progressPct(players[0])) + '%   P2 ' + Math.floor(progressPct(players[1])) + '%', GW - 8, 18);
  }
  ctx.textAlign = 'left';
}

function progressPct(pl) {
  var sx = startCell.c * TILE, fx = finishCell.c * TILE;
  var span = Math.max(1, fx - sx);
  return clamp(((pl.x - sx) / span) * 100, 0, 100);
}

function drawViewportLabel(pl, idx, vw, vh) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(6, 30, 92, 16);
  ctx.fillStyle = pl.color;
  ctx.font = 'bold 11px monospace'; ctx.textAlign = 'left';
  ctx.fillText('PLAYER ' + (idx + 1), 10, 42);
  if (pl.finished) { ctx.fillStyle = '#f6c945'; ctx.fillText('FINISHED!', 10, 60); }
}

function drawCountdown() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0, 0, GW, GH);
  var sec = Math.ceil(countdown);
  var label = sec > 0 ? String(sec) : 'GO!';
  var t = 1 - (countdown - Math.floor(countdown));
  var scale = sec > 0 ? (1.4 - t * 0.4) : (1 + Math.sin(frame * 0.4) * 0.06);
  ctx.save();
  ctx.translate(GW / 2, GH / 2);
  ctx.scale(scale, scale);
  ctx.font = 'bold 96px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#000'; ctx.fillText(label, 3, 3);
  ctx.fillStyle = sec > 0 ? '#f6c945' : '#8fd66b';
  ctx.fillText(label, 0, 0);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';
  ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#cfe9bf';
  if (mode === 'race') ctx.fillText('P1: ARROWS + Up to jump      P2: A / D + W to jump      (gamepads supported)', GW / 2, GH * 0.72);
  else ctx.fillText('ARROWS to move, Up to jump      (gamepad supported)', GW / 2, GH * 0.72);
}

var winButtons = [];
function drawWin() {
  ctx.fillStyle = 'rgba(8,12,9,0.82)'; ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.font = 'bold 44px monospace';
  if (mode === 'race') {
    var c = winner ? winner.color : '#fff';
    ctx.fillStyle = '#000'; ctx.fillText('PLAYER ' + (winner.idx + 1) + ' WINS!', GW / 2 + 3, GH * 0.26 + 3);
    ctx.fillStyle = c; ctx.fillText('PLAYER ' + (winner.idx + 1) + ' WINS!', GW / 2, GH * 0.26);
  } else {
    ctx.fillStyle = '#000'; ctx.fillText('FINISH!', GW / 2 + 3, GH * 0.26 + 3);
    ctx.fillStyle = '#8fd66b'; ctx.fillText('FINISH!', GW / 2, GH * 0.26);
  }
  ctx.font = 'bold 20px monospace';
  if (mode === 'race') {
    var p1 = players[0], p2 = players[1];
    ctx.fillStyle = p1.color; ctx.fillText('P1  ' + (p1.finished ? fmtTime(p1.finishTime) : 'DNF') + '   \u{1FA99}' + p1.coins, GW / 2, GH * 0.40);
    ctx.fillStyle = p2.color; ctx.fillText('P2  ' + (p2.finished ? fmtTime(p2.finishTime) : 'DNF') + '   \u{1FA99}' + p2.coins, GW / 2, GH * 0.40 + 26);
  } else {
    var pl = players[0];
    ctx.fillStyle = '#f6c945';
    ctx.fillText('Time: ' + fmtTime(pl.finishTime) + '    \u{1FA99} ' + pl.coins, GW / 2, GH * 0.40);
    var best = getBest(currentLevel.name || 'course');
    if (pl.newBest) {
      var pulse = 0.6 + Math.sin(frame * 0.2) * 0.4;
      ctx.globalAlpha = pulse; ctx.fillStyle = '#b8f08a';
      ctx.fillText('* NEW BEST TIME! *', GW / 2, GH * 0.40 + 28);
      ctx.globalAlpha = 1;
    } else if (best != null) {
      ctx.fillStyle = '#8aa57e';
      ctx.fillText('Best: ' + fmtTime(best), GW / 2, GH * 0.40 + 28);
    }
  }
  winButtons = [];
  var bw = 200, bh = 46, gap = 18;
  var total = bw * 3 + gap * 2;
  var bx = GW / 2 - total / 2, by = GH * 0.62;
  addWinBtn(bx, by, bw, bh, 'rematch', 'Rematch');
  addWinBtn(bx + (bw + gap), by, bw, bh, 'pick', 'Pick Course');
  addWinBtn(bx + (bw + gap) * 2, by, bw, bh, 'arcade', 'Arcade');
  ctx.font = '12px monospace'; ctx.fillStyle = '#7f9a73'; ctx.textAlign = 'center';
  ctx.fillText('Enter = Rematch    Esc = Pick Course', GW / 2, by + bh + 28);
}

function addWinBtn(x, y, w, h, id, label) {
  var hover = (lastPointer.x >= x && lastPointer.x <= x + w && lastPointer.y >= y && lastPointer.y <= y + h);
  ctx.fillStyle = hover ? '#3a6c42' : '#213b27';
  ctx.strokeStyle = hover ? '#6aa14d' : '#36573f';
  roundRect(x, y, w, h, 8); ctx.fill(); ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#eafbe0'; ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2);
  ctx.textBaseline = 'alphabetic';
  winButtons.push({ x:x, y:y, w:w, h:h, id:id, label:label });
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawLegend() {
  var txt = (mode === 'race')
    ? 'P1 ARROWS + Up  -  P2 WASD (W=jump)  -  Down=slide  /=punch (P2: S / F)  -  Pads'
    : 'ARROWS + Up to jump  -  Down=slide  /=punch (P2: S / F)  -  Esc menu';
  ctx.globalAlpha = 0.5;
  ctx.font = '11px monospace'; ctx.textAlign = 'center'; ctx.fillStyle = '#9ab48d';
  ctx.fillText(txt, GW / 2, GH - 8);
  ctx.globalAlpha = 1;
}

function drawTouchControls() {
  touchBtns = [];
  var pad = 70, m = 18;
  addTouchBtn(m, GH - m - pad, pad, pad, 'left', '<');
  addTouchBtn(m + pad + 10, GH - m - pad, pad, pad, 'right', '>');
  addTouchBtn(GW - m - pad, GH - m - pad, pad, pad, 'jump', '^');
}
function addTouchBtn(x, y, w, h, id, label) {
  ctx.globalAlpha = touch[id] ? 0.4 : 0.22;
  ctx.fillStyle = id === 'jump' ? '#4488cc' : '#446a48';
  ctx.beginPath(); ctx.arc(x + w / 2, y + h / 2, w / 2, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.8; ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x + w / 2, y + h / 2 + 1);
  ctx.textBaseline = 'alphabetic'; ctx.globalAlpha = 1;
  touchBtns.push({ x:x, y:y, w:w, h:h, id:id });
}

function drawScanlines() {
  ctx.globalAlpha = 0.10; ctx.fillStyle = '#000';
  for (var y = 0; y < GH; y += 2) ctx.fillRect(0, y, GW, 1);
  ctx.globalAlpha = 1;
}

function drawMenuBackdrop() {
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0e1410'); grad.addColorStop(1, '#16241a');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, GW, GH);
  for (var i = 0; i < 12; i++) {
    var x = ((i * 137 + frame * (0.3 + (i % 3) * 0.2)) % (GW + 60)) - 30;
    var y = (i * 73) % GH + Math.sin(frame * 0.02 + i) * 8;
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = '#8a5a2a';
    ctx.beginPath(); ctx.ellipse(x, y, 8, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#5a3a18'; ctx.fillRect(x - 3, y - 9, 6, 4);
  }
  ctx.globalAlpha = 1;
}

// ====================================================================
//  POINTER (mouse) for win-screen buttons + hover
// ====================================================================
var lastPointer = { x: -1, y: -1 };
cv.addEventListener('mousemove', function (e) {
  var p = pointToGame(e.clientX, e.clientY);
  lastPointer.x = p.x; lastPointer.y = p.y;
});
cv.addEventListener('mousedown', function (e) {
  ensureAudio();
  var p = pointToGame(e.clientX, e.clientY);
  if (state === 'win') {
    for (var i = 0; i < winButtons.length; i++) {
      var b = winButtons[i];
      if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
        tone(560, 0.06, 'square', 0.05);
        if (b.id === 'rematch') rematch();
        else if (b.id === 'pick') showMenu();
        else if (b.id === 'arcade') window.location.href = '/games';
        return;
      }
    }
  }
});
cv.addEventListener('touchstart', function (e) {
  if (state !== 'win' || !e.touches[0]) return;
  var p = pointToGame(e.touches[0].clientX, e.touches[0].clientY);
  for (var i = 0; i < winButtons.length; i++) {
    var b = winButtons[i];
    if (p.x >= b.x && p.x <= b.x + b.w && p.y >= b.y && p.y <= b.y + b.h) {
      if (b.id === 'rematch') rematch();
      else if (b.id === 'pick') showMenu();
      else if (b.id === 'arcade') window.location.href = '/games';
      return;
    }
  }
}, { passive: true });

// ====================================================================
//  HELPERS
// ====================================================================
function clamp(v, a, b) { return v < a ? a : (v > b ? b : v); }

// ====================================================================
//  MAIN LOOP
// ====================================================================
function loop(now) {
  var dt = Math.min((now - lastTime) / 1000, 0.045);
  lastTime = now;
  if (dt > 0) update(dt);
  render(dt);
  requestAnimationFrame(loop);
}

// ====================================================================
//  BOOT
// ====================================================================
loadManifest();
lastTime = performance.now();
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
