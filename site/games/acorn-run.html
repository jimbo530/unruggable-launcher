<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Acorn Run</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0e1410; color: #d8e6d0;
    font-family: "Segoe UI", Verdana, sans-serif;
    -webkit-font-smoothing: antialiased; touch-action: none;
  }
  a { color: #8fd66b; }
  #gc {
    display: block; position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0f0c; image-rendering: pixelated;
  }
  .overlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 14px 80px; overflow-y: auto;
    background: radial-gradient(circle at 50% 18%, #16241a 0%, #0c120e 70%);
  }
  .overlay.hidden { display: none; }
  .title {
    font-size: 30px; font-weight: 800; letter-spacing: .5px;
    color: #b8f08a; text-shadow: 0 2px 0 #000, 0 0 18px rgba(143,214,107,.25);
    margin-top: 6px;
  }
  .tagline { color: #f6c945; font-size: 13px; margin: 4px 0 16px; text-align: center; }
  .panel {
    width: 100%; max-width: 720px;
    background: #16201a; border: 1px solid #294031; border-radius: 12px;
    padding: 14px; margin-bottom: 14px;
    box-shadow: 0 6px 24px rgba(0,0,0,.45);
  }
  .panel h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: #8aa57e; margin-bottom: 10px;
  }
  .modes { display: flex; gap: 10px; flex-wrap: wrap; }
  .mode-btn {
    flex: 1 1 200px; min-width: 180px;
    background: #1a2a1f; border: 2px solid #2d4434; border-radius: 10px;
    padding: 14px; cursor: pointer; text-align: left;
    transition: border-color .12s, background .12s, transform .06s;
  }
  .mode-btn:hover { background: #213b27; border-color: #4d7a5a; }
  .mode-btn:active { transform: translateY(1px); }
  .mode-btn.sel { border-color: #f6c945; background: #26371f; box-shadow: 0 0 0 1px #f6c945 inset; }
  .mode-btn .mt { font-size: 16px; font-weight: 700; color: #eafbe0; }
  .mode-btn .md { font-size: 12px; color: #9ab48d; margin-top: 3px; line-height: 1.4; }
  .levels { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
  .lvl {
    background: #0c120e; border: 1px solid #2d4434; border-radius: 10px;
    padding: 10px 12px; cursor: pointer; position: relative;
    transition: border-color .12s, background .12s, transform .06s;
  }
  .lvl:hover { background: #14201a; border-color: #4d7a5a; transform: translateY(-1px); }
  .lvl .ln { font-size: 14px; font-weight: 700; color: #cfe9bf; word-break: break-word; }
  .lvl .lm { font-size: 11px; color: #8aa57e; margin-top: 4px; }
  .lvl .lbest { font-size: 11px; color: #f6c945; margin-top: 4px; min-height: 14px; }
  .lvl .themechip {
    display: inline-block; font-size: 9px; text-transform: uppercase; letter-spacing: .5px;
    padding: 1px 6px; border-radius: 8px; margin-top: 6px;
    background: rgba(143,214,107,.12); color: #8fd66b; border: 1px solid rgba(143,214,107,.25);
  }
  .note { font-size: 12px; color: #7f9a73; line-height: 1.5; margin-top: 4px; }
  .note.err { color: #ff9a8a; }
  .btnrow { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 4px; }
  button.bigbtn {
    background: #2f5a36; color: #eafbe0; border: 1px solid #4f8a5c;
    border-radius: 8px; padding: 9px 16px; font-size: 14px; font-family: inherit;
    cursor: pointer; transition: background .12s, border-color .12s;
  }
  button.bigbtn:hover { background: #3a6c42; border-color: #6aa14d; }
  button.bigbtn.ghost { background: #213b27; border-color: #36573f; }
  button.bigbtn.ghost:hover { background: #2c4d34; }
  .backlink { display: block; text-align: center; margin-top: 6px; font-size: 12px; color: #6f8a64; }
  #playBack {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: #5c7553; font-family: monospace; font-size: 12px; text-decoration: none;
    z-index: 15; opacity: .8;
  }
  #playBack.hidden { display: none; }
  #playBack:hover { color: #9ab48d; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="playBack" class="hidden" href="/games">&lsaquo; Arcade</a>
<div class="overlay" id="menu">
  <div class="title">&#127792; ACORN RUN</div>
  <div class="tagline">Run, jump, race. First nut to the flag wins.</div>
  <div class="panel">
    <h2>Mode</h2>
    <div class="modes" id="modeBtns">
      <div class="mode-btn sel" data-mode="solo">
        <div class="mt">&#127939; Solo &mdash; Time Trial</div>
        <div class="md">Race the clock. Your best time per course is saved.</div>
      </div>
      <div class="mode-btn" data-mode="race">
        <div class="mt">&#9876; 2-Player Race</div>
        <div class="md">Split-screen. P1 Arrows &middot; P2 WASD &middot; gamepads supported.</div>
      </div>
    </div>
  </div>
  <div class="panel">
    <h2>Pick a Course</h2>
    <div class="levels" id="levelList"></div>
    <div class="note" id="levelNote">Loading courses&hellip;</div>
    <div class="btnrow" style="margin-top:12px;">
      <button class="bigbtn ghost" id="reloadBtn">&#8635; Reload courses</button>
    </div>
  </div>
  <a class="backlink" href="/games">&lsaquo; Back to Arcade</a>
</div>
<script>
(function () {
"use strict";

// ====================================================================
//  CANVAS — standalone full-viewport renderer (own letterboxing).
//  Fixed internal resolution scaled to fit, so split-screen geometry is
//  deterministic regardless of window size.
// ====================================================================
var cv = document.getElementById('gc');
var ctx = cv.getContext('2d');
var GW = 960, GH = 540;
var dpr = 1, viewScale = 1, offX = 0, offY = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth, sh = window.innerHeight;
  cv.width = Math.floor(sw * dpr);
  cv.height = Math.floor(sh * dpr);
  cv.style.width = sw + 'px';
  cv.style.height = sh + 'px';
  viewScale = Math.min(sw / GW, sh / GH);
  offX = Math.floor((sw - GW * viewScale) / 2);
  offY = Math.floor((sh - GH * viewScale) / 2);
}
window.addEventListener('resize', resize);
resize();

function beginFrame() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cv.width / dpr, cv.height / dpr);
  ctx.translate(offX, offY);
  ctx.scale(viewScale, viewScale);
  ctx.imageSmoothingEnabled = false;
}

// ====================================================================
//  AUDIO — tiny WebAudio blips (no external assets)
// ====================================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audioCtx = null; } }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function tone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  try {
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}
function noise(dur, vol, freq) {
  if (!audioCtx) return;
  try {
    var n = Math.floor(audioCtx.sampleRate * dur);
    var buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
    var s = audioCtx.createBufferSource(); s.buffer = buf;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    if (freq) { var f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = freq; s.connect(f); f.connect(g); }
    else s.connect(g);
    g.connect(audioCtx.destination); s.start(); s.stop(audioCtx.currentTime + dur);
  } catch (e) {}
}

// ====================================================================
//  ART — themed tilesets + acorn heroes. Decoupled; ALWAYS fall back.
//  Theme art dropped in later: art/scenery/<theme>/{ledge,top,fill,bg}.png
//  Heroes: ../memetrees/acorn-boy.webp (with absolute fallback).
// ====================================================================
var THEMES = ['jungle', 'ruins', 'cave', 'snow', 'mushroom'];

var THEME_PAL = {
  jungle:   { sky:['#5fa9d6','#bfe6c0'], grass:'#57b24a', grassHi:'#8ee06a', grassDk:'#2f7a33', body:'#7a5230', bodyHi:'#956637', bodyDk:'#4a3018', under:'#2c1c0e', moss:'#3e8a3a', accent:'#38d973', hill1:'#2f6a3a', hill2:'#3f7a44' },
  ruins:    { sky:['#caa97a','#6e5a3e'], grass:'#9c8f6e', grassHi:'#c6ba93', grassDk:'#6e6248', body:'#7d6e54', bodyHi:'#9a8a6c', bodyDk:'#4d4332', under:'#322a1f', moss:'#7a8a4a', accent:'#e0c060', hill1:'#5a4d36', hill2:'#6e5d42' },
  cave:     { sky:['#243047','#0c1018'], grass:'#7178a0', grassHi:'#a3aacf', grassDk:'#474d70', body:'#3c4258', bodyHi:'#565d78', bodyDk:'#262a3c', under:'#15182a', moss:'#7a5fd0', accent:'#a855f7', hill1:'#2a3048', hill2:'#363d5a' },
  snow:     { sky:['#bfe3ff','#eef7ff'], grass:'#eef6fb', grassHi:'#ffffff', grassDk:'#c2d6e4', body:'#9fb6c6', bodyHi:'#bccdda', bodyDk:'#7790a2', under:'#5b7282', moss:'#cfe6f2', accent:'#80b0d0', hill1:'#9cc2dc', hill2:'#b6d6ea' },
  mushroom: { sky:['#7a5aa8','#d6a0e0'], grass:'#d24a86', grassHi:'#f06aa8', grassDk:'#9a2f60', body:'#6a3a64', bodyHi:'#85487e', bodyDk:'#3c283a', under:'#281022', moss:'#f06aa8', accent:'#f06aa0', hill1:'#5a3a6a', hill2:'#704a80' }
};
function pal(theme) { return THEME_PAL[theme] || THEME_PAL.jungle; }

function loadImg(src) { var i = new Image(); i.src = src; return i; }
function imgReady(i) { return !!(i && i.complete && i.naturalWidth > 0); }

var tileCache = {};
function themeArt(theme) {
  if (tileCache[theme]) return tileCache[theme];
  var base = 'art/scenery/' + theme + '/';
  var a = {
    ledge: loadImg(base + 'ledge.png'),
    top:   loadImg(base + 'top.png'),
    fill:  loadImg(base + 'fill.png'),
    bg:    loadImg(base + 'bg.png')
  };
  a.ledge.onerror = a.top.onerror = a.fill.onerror = a.bg.onerror = function () {};
  tileCache[theme] = a;
  return a;
}

var heroImg = loadImg('../memetrees/acorn-boy.webp');
heroImg.onerror = function () { if (heroImg.src.indexOf('tasern.quest') < 0) heroImg.src = 'https://tasern.quest/memetrees/acorn-boy.webp'; };

// Cut-out Grok sprites (transparent PNGs). Each entry loads once; a missing file
// just stays not-ready and the renderer falls back to its procedural drawing.
// Frames: acornboy/acorngirl x {idle,run,jump}; props: coin/boost/enemy + decor.
var acornArt = {};
function acornImg(name) {
  if (acornArt[name]) return acornArt[name];
  var img = loadImg('art/acorn/' + name + '.png');
  img.onerror = function () {}; // not-ready -> procedural fallback, no spam
  acornArt[name] = img;
  return img;
}
// Pick the right character frame image for a player by index + motion state.
function playerFrameImg(idx, anim) {
  return acornImg((idx === 1 ? 'acorngirl' : 'acornboy') + '-' + anim);
}
// Preload the sprites used every frame so they're ready by first paint.
['acornboy-idle','acornboy-run','acornboy-jump',
 'acorngirl-idle','acorngirl-run','acorngirl-jump',
 'acorn-coin','boost-pad','enemy-beetle',
 // Per-theme animated enemies: 3 frames each (walk1/walk2/squish). Sprites face RIGHT.
 // Missing files stay not-ready -> enemy-<type> -> procedural purple-blob fallback.
 'beetle-walk1','beetle-walk2','beetle-squish',
 'scarab-walk1','scarab-walk2','scarab-squish',
 'spider-walk1','spider-walk2','spider-squish',
 'penguin-walk1','penguin-walk2','penguin-squish',
 'mushroomy-walk1','mushroomy-walk2','mushroomy-squish',
 // Smashable props (transparent PNGs): multi-frame pot/statue + single barrel/crate.
 'pot-1','pot-2','pot-3','statue-1','statue-2','statue-3','barrel','crate',
 // Layered paper-doll: base bodies + default equip (hat:acorn, tool:staff).
 // Missing files just stay not-ready -> classic whole-character fallback.
 'acornboy-base','acorngirl-base',
 'hat-acorn','tool-staff',
 // Alternate-cap OVERLAYS drawn on top of the whole-character sprite.
 'hat-tgn','hat-burger',
 // Added-mechanic art-swap hooks (all optional -> procedural placeholders if absent):
 // (1) bouncy mushroom spring, (2) spinning maple-seed updraft,
 // (3) slide frames, (4) punch frames — per character.
 'mushroom-spring','maple-seed',
 'acornboy-slide','acorngirl-slide','acornboy-punch','acorngirl-punch'].forEach(acornImg);

// ====================================================================
//  INPUT
// ====================================================================
var keys = {};
document.addEventListener('keydown', function (e) {
  keys[e.code] = true;
  if (state === 'play' || state === 'countdown') {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','Slash'].indexOf(e.code) >= 0) e.preventDefault();
  }
  ensureAudio();
});
document.addEventListener('keyup', function (e) { keys[e.code] = false; });

var IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
var touch = { left: false, right: false, jump: false };
var touchBtns = [];

function pointToGame(clientX, clientY) {
  return { x: (clientX - offX) / viewScale, y: (clientY - offY) / viewScale };
}
function handleTouch(e) {
  touch.left = touch.right = touch.jump = false;
  for (var i = 0; i < e.touches.length; i++) {
    var p = pointToGame(e.touches[i].clientX, e.touches[i].clientY);
    for (var b = 0; b < touchBtns.length; b++) {
      var tb = touchBtns[b];
      if (p.x >= tb.x && p.x <= tb.x + tb.w && p.y >= tb.y && p.y <= tb.y + tb.h) touch[tb.id] = true;
    }
  }
}
cv.addEventListener('touchstart', function (e) { ensureAudio(); handleTouch(e); if (state === 'play' || state === 'countdown') e.preventDefault(); }, { passive: false });
cv.addEventListener('touchmove', function (e) { handleTouch(e); if (state === 'play') e.preventDefault(); }, { passive: false });
cv.addEventListener('touchend', function (e) { handleTouch(e); }, { passive: false });

function padState(index) {
  var pads = navigator.getGamepads ? navigator.getGamepads() : [];
  var gp = pads && pads[index];
  if (!gp) return null;
  var ax = gp.axes[0] || 0;
  var btn = function (i) { return !!(gp.buttons[i] && gp.buttons[i].pressed); };
  return {
    left:  btn(14) || ax < -0.4,
    right: btn(15) || ax > 0.4,
    jump:  btn(0)  || btn(12)
  };
}
function readP1() {
  var g = padState(0);
  return {
    left:  keys['ArrowLeft']  || touch.left  || (g && g.left),
    right: keys['ArrowRight'] || touch.right || (g && g.right),
    jump:  keys['ArrowUp'] || keys['Space'] || touch.jump || (g && g.jump),
    down:  keys['ArrowDown'],
    punch: keys['Slash']
  };
}
function readP2() {
  var g = padState(1);
  return {
    left:  keys['KeyA'] || (g && g.left),
    right: keys['KeyD'] || (g && g.right),
    jump:  keys['KeyW'] || (g && g.jump),
    down:  keys['KeyS'],
    punch: keys['KeyF']
  };
}
// ====================================================================
//  GAME CONSTANTS  (tuned for "feels good" run + jump)
// ====================================================================
var TILE = 32;
var ROWS = 18;
var GRAVITY = 2000;
var MAX_FALL = 1100;
var RUN_ACCEL = 2600;
var AIR_ACCEL = 1800;
var RUN_MAX = 360;
var GROUND_FRICTION = 2400;
var AIR_FRICTION = 300;
var JUMP_VEL = 720;
var WALLJUMP = { Y: 0.95, X: 470, LOCK: 0.18, SLIDE: 170 }; // up% of jump, push-away vx, input-lock secs, wall-slide fall cap
var COYOTE = 0.10;
var JUMP_BUFFER = 0.12;
var BOOST_VEL = 640;
var BOOST_LIFT = 280;
var STUN_TIME = 0.85;
var RESPAWN_FADE = 0.35;
var PLAYER_W = 20, PLAYER_H = 26;

// --- Mechanics added on top of the base run/jump engine. Purely additive. ---
// (1) SPRING — the 'B' boost tile, reskinned as a bouncy mushroom: a STRONG
//     vertical bounce (vx mostly unchanged). VEL=launch speed up, SQUASH=cap squash.
var SPRING = { VEL: 720, SQUASH: 0.45 };
// (2) FAN — new 'F' tile: a spinning maple-seed updraft. A wind column HEIGHT
//     cells tall above the fan pushes the player against gravity (or sideways).
var FAN = { PUSH: 1400, MAX: 300, HEIGHT: 4 };
// (3) SLIDE — hold down while running on the ground to drop into a low slide
//     (shorter hitbox slips under low gaps). FRICTION decel, MAX_S auto-exit.
var SLIDE = { H_FRAC: 0.55, FRICTION: 340, MAX_S: 0.9, MIN_VX: 60, ENTRY: 60 };
// (4) PUNCH — tap punch to jab a short hitbox in front: smashes props + squishes
//     enemies. DUR=active frames, COOLDOWN between jabs, REACH=px in front.
var PUNCH = { DUR: 0.22, COOLDOWN: 0.32, REACH: 22 };

var SOLID = { g:1, s:1, d:1, m:1, w:1 };
function isSolidCode(ch) { return SOLID[ch] === 1; }

// ====================================================================
//  GAME JUICE — 16-bit-style depth/atmosphere/animation tunables.
//  Everything here is safe to tweak live; all effects degrade gracefully
//  and NEVER affect gameplay. Grouped by the five systems they drive.
// ====================================================================
var JUICE = {
  // --- (1) MULTI-LAYER PARALLAX -------------------------------------
  BG_PARALLAX:        0.20,   // far bg.png horizontal scroll factor (camera x)
  BG_PARALLAX_Y:      0.10,   // far bg vertical scroll factor (camera y)
  BG_ZOOM:            1.12,   // scale-up of the far bg so edges have headroom
  BG_EDGE_DARKEN:     0.13,   // gentle darkening toward the bg's left/right edges (lightened ~28%)
  FG_ENABLE:          true,   // near foreground silhouette layer (the big depth cue)
  FG_PARALLAX:        1.32,   // foreground scrolls FASTER than the world (>1)
  FG_ALPHA:           0.4,    // foreground silhouette opacity (thinned for a clearer lane)
  FG_VINES_TOP:       2,      // hanging vine clusters across one screen width (was 4 — keep lane clear)
  FG_VINES_SIDE:      2,      // creeping vine clusters per side edge
  FG_EDGE_BIAS:       0.30,   // top vines pushed into the outer 30% of each side (0=center ok, 0.5=hug edges)
  FG_SWAY_AMP:        7,      // px of gentle idle sway on foreground elements
  FG_SWAY_SPEED:      0.6,    // sway speed (radians/sec-ish)
  FG_TILE:            520,    // world-px spacing the foreground pattern repeats at

  // --- (2) AMBIENT PARTICLES ----------------------------------------
  AMB_COUNT:          32,     // alive ambient particles per viewport (24-40 good)
  AMB_PARALLAX:       0.55,   // ambient drift parallax vs camera
  AMB_ALPHA:          0.55,   // base ambient particle opacity

  // --- (3) ATMOSPHERE OVERLAY ---------------------------------------
  RAYS_ENABLE:        true,   // diagonal god-ray light beams
  RAYS_COUNT:         3,      // number of wide beams
  RAYS_ALPHA:         0.045,  // beam peak opacity (very subtle; cut ~25% to reduce haze)
  VIGNETTE_ENABLE:    true,   // darkened corners
  VIGNETTE_ALPHA:     0.30,   // vignette strength at the corners (lightened ~28%)
  GRADE_ALPHA:        0.07,   // full-screen per-theme color-grade tint strength (lightened ~30%)

  // --- (4) RICHER LEDGES --------------------------------------------
  LEDGE_SHADOW:       true,   // soft drop shadow cast under platforms onto bg
  LEDGE_SHADOW_DX:    5,      // shadow offset right (px)
  LEDGE_SHADOW_DY:    7,      // shadow offset down (px)
  LEDGE_SHADOW_ALPHA: 0.28,   // shadow opacity
  LEDGE_TOP_HILITE:   0.55,   // bright top-edge highlight strength
  LEDGE_UNDER_SHADE:  0.45,   // dark under-edge shadow strength

  // --- (5) LIVELIER CHARACTER ---------------------------------------
  RUN_BOB_AMP:        2.0,    // px vertical bob amplitude while running (softened)
  RUN_BOB_SPEED:      Math.PI,// run cadence (matches existing anim clock units)
  RUN_LEAN:           0.12,   // extra forward lean (radians) at full run speed (softened)
  RUN_STRIDE_SKEW:    0.07,   // 2-step horizontal skew that fakes a stride (softened, less jitter)
  IDLE_BREATH_AMP:    0.05,   // idle breathing scale (fraction)
  IDLE_BREATH_SPEED:  2.4,    // idle breathing speed
  JUMP_STRETCH:       0.18,   // vertical stretch on the way up
  DUST_ENABLE:        true,   // landing puff + running dust trail
  DUST_LAND_COUNT:    9,      // particles in a landing puff
  DUST_RUN_SPEED_MIN: 220,    // |vx| above which the run dust trail emits
  DUST_RUN_RATE:      0.045,  // seconds between run-trail dust puffs

  // --- (6) HERO POP — make the character read against busy foliage ---
  HERO_SCALE_BOOST:   1.08,   // multiply player draw size (~8% bigger for readability)
  RIM_ENABLE:         true,   // soft cream silhouette behind the sprite (image paths only)
  RIM_COLOR:          'rgba(255,245,210,0.5)', // warm cream rim/outline tint
  RIM_PX:             1.6,    // rim spread in screen px (silhouette grows by this)
  GLOW_ENABLE:        true,   // faint bright back-glow halo behind the hero
  GLOW_COLOR:         'rgba(255,240,200,0.22)', // warm halo color (inner stop)
  GLOW_RADIUS:        1.05,   // halo radius as a fraction of the sprite's drawn height
  CONTACT_SHADOW:     true,   // soft dark ellipse on the ground under the feet
  CONTACT_ALPHA:      0.30,   // contact shadow opacity
  CONTACT_W:          0.62,   // shadow width  as a fraction of sprite drawn width
  CONTACT_H:          0.16    // shadow height as a fraction of sprite drawn width
};

// Per-theme atmosphere palette: color-grade tint, god-ray tint, ambient kind.

var ATMO = {
  jungle:   { grade:[60,150,70],   ray:[180,255,150], amb:['firefly','leaf'] },
  ruins:    { grade:[235,180,85],  gradeA:0.14, wash:[201,158,82], washA:0.55, washMode:'color', ray:[255,220,140], amb:['dust'] },

function atmo(theme) { return ATMO[theme] || ATMO.jungle; }

// ====================================================================
//  SMASHABLE PROPS — destructible scenery (pots/statues/barrels/crates).
//  Purely additive: they never block, hurt, or alter physics. Tunables
//  grouped here so timings/sizes/counts are easy to tweak live.
// ====================================================================
var SMASH = {
  // Draw size as a fraction of a tile (props read roughly square).
  SIZE:            0.95,   // prop width/height in tiles when drawn (feet on ground)
  FRAME_MS:        70,     // ms per crack frame for multi-frame props (pot/statue)
  POP_MS:          90,     // single-frame props show a brief scale "pop" this long
  POP_SCALE:       1.18,   // peak scale during the single-frame pop flash
  SCORE:           1,      // coins awarded per smash (a coin gives 1; this is the tick)
  // --- debris chunks (world-space, gravity + fade) ---
  DEBRIS_MIN:      8,      // min chunk particles per smash
  DEBRIS_MAX:      12,     // max chunk particles per smash
  DEBRIS_SPREAD:   220,    // horizontal velocity span of chunks (px/s)
  DEBRIS_UP:       260,    // upward launch bias of chunks (px/s)
  DEBRIS_GRAV:     1300,   // chunk gravity (px/s^2)
  DEBRIS_LIFE:     0.50,   // chunk lifetime seconds (~500ms fade)
  DEBRIS_SIZE_MIN: 2.0,    // chunk square min size
  DEBRIS_SIZE_MAX: 5.0,    // chunk square max size
  WOOD_COLORS:     ['#9c5a2c','#7a4420','#b97a3c'],  // pot/barrel/crate browns
  STONE_COLORS:    ['#9a9a92','#76766e'],            // statue grays
  // --- barrel stomp bounce (only when falling onto a barrel) ---
  BOUNCE_VEL:      460,    // upward velocity granted by stomping a barrel
  BOUNCE_MIN_VY:   60,     // must be falling at least this fast to trigger a bounce
  // --- bonus acorn drop ---
  DROP_CHANCE:     0.25,   // chance (hash-based) a smashed pot/barrel drops a coin
  // --- procedural sprinkle (the main way props appear in all courses now) ---
  PROC_MIN:        8,      // min props sprinkled per level
  PROC_MAX:        13,     // max props sprinkled per level
  PROC_CLEAR:      2,      // keep this many cells clear of spikes/enemies/coins/start/finish
  SEED:            1973    // hash seed offset so sprinkle differs from other procedural art
};

// ====================================================================
//  ENEMIES — per-theme, frame-animated patrollers. Purely additive.
//  Walk cycle (walk1/walk2) plays while alive; a stomp swaps to the
//  squish frame for ENEMY_SQUISH_S before the enemy is removed. All art
//  degrades gracefully to the procedural blob if a PNG is missing.
// ====================================================================
var ENEMY = {
  WALK_FRAME_S:  0.18,    // seconds per walk frame (toggles walk1/walk2)
  SQUISH_S:      0.4,     // seconds the squish frame shows after a stomp
  PROC_MIN:      2,       // min extra enemies sprinkled per level
  PROC_MAX:      4,       // max extra enemies sprinkled per level
  CLEAR:         3,       // keep this many cells clear of start/finish/spikes/enemies/coins
  SEED:          4242     // hash seed offset (distinct from smashable sprinkle)
};
// Which enemy types belong to each theme (array per theme for future variety).
var THEME_ENEMIES = {
  jungle:   ['beetle'],
  ruins:    ['scarab'],
  cave:     ['spider'],
  snow:     ['penguin'],
  mushroom: ['mushroomy']

// Deterministic pick of an enemy type for a theme. idx (e.g. a cell hash or a
// running count) rotates through the theme's array so future multi-type themes
// spread out. Falls back to 'beetle' for unknown themes / empty arrays.
function enemyTypeFor(theme, idx) {
  var list = THEME_ENEMIES[theme];
  if (!list || !list.length) return 'beetle';
  var i = ((idx >>> 0) % list.length);
  return list[i];
}

function normalizeManifest(raw) {
  if (!Array.isArray(raw)) {
    if (raw && Array.isArray(raw.levels)) raw = raw.levels;
    else return [];
  }
  var out = [];
  raw.forEach(function (item) {
    if (typeof item === 'string') out.push({ file: item });
    else if (item && typeof item === 'object' && item.file) out.push({ file: item.file, name: item.name, theme: item.theme });
  });
  return out;
}

function resolveLevelUrl(file) {
  if (/^https?:\/\//.test(file) || file.indexOf('/') >= 0) return file;
  return 'levels/acorn/' + file;
}

function loadManifest() {
  setLevelNote('Loading courses...', false);
  fetch('levels/acorn/levels.json', { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('manifest HTTP ' + r.status);
      return r.json();
    })
    .then(function (raw) {
      manifest = normalizeManifest(raw);
      if (!manifest.length) {
        useBuiltinAndNote('No courses listed in levels.json yet.');
      } else {
        renderLevelList();
        setLevelNote(manifest.length + ' course' + (manifest.length === 1 ? '' : 's') + ' available. The Sample Sprint is always built in.', false);
      }
    })
    .catch(function (err) {
      console.warn('[acorn-run] levels manifest not loaded:', err && err.message);
      useBuiltinAndNote('Course list not found yet (levels/acorn/levels.json). Playing the built-in Sample Sprint - drop levels in and hit Reload.');
    });
}

function useBuiltinAndNote(msg) {
  manifest = [];
  renderLevelList();
  setLevelNote(msg, false);
}

function builtinLevel() {
  var cols = 120;
  var grid = [];
  var r, c, row;
  for (r = 0; r < ROWS; r++) { row = ''; for (c = 0; c < cols; c++) row += '.'; grid.push(row); }
  function setCell(cc, rr, ch) {
    if (cc < 0 || cc >= cols || rr < 0 || rr >= ROWS) return;
    grid[rr] = grid[rr].substring(0, cc) + ch + grid[rr].substring(cc + 1);
  }
  function fillGround(c0, c1, topRow) {
    for (var cc = c0; cc <= c1; cc++) for (var rr = topRow; rr < ROWS; rr++) setCell(cc, rr, 'g');
  }
  var GR = ROWS - 3;
  fillGround(0, 18, GR);
  fillGround(24, 40, GR);
  fillGround(46, 70, GR);
  fillGround(76, cols - 1, GR);
  for (c = 30; c <= 35; c++) setCell(c, GR - 4, 'd');
  for (c = 54; c <= 59; c++) setCell(c, GR - 5, 's');
  for (c = 84; c <= 89; c++) setCell(c, GR - 4, 'd');
  [8,10,12, 31,33,35, 50,52, 56,57,58, 86,88, 100,102,104].forEach(function (cc) { setCell(cc, GR - 1, 'C'); });
  [32,33,34].forEach(function (cc) { setCell(cc, GR - 5, 'C'); });
  setCell(43, GR - 1, 'X'); setCell(44, GR - 1, 'X');
  setCell(73, GR - 1, 'X');
  setCell(64, GR - 1, 'E');
  setCell(80, GR - 1, 'B');
  setCell(50, GR - 1, 'F'); setCell(68, GR - 1, 'F');
  setCell(9, GR - 1, 'B'); setCell(14, GR - 1, 'F');
  return {
    name: 'Sample Sprint', tile: TILE, cols: cols, rows: ROWS,
    start: { c: 3, r: GR - 1 }, finish: { c: cols - 4, r: GR - 1 },
    grid: grid, theme: 'jungle', _builtin: true
  };
}

function validateLevel(o) {
  if (!o || typeof o !== 'object') return 'not an object';
  if (typeof o.cols !== 'number' || o.cols < 1) return 'bad cols';
  if (o.rows !== ROWS) return 'rows must be ' + ROWS;
  if (!o.start || typeof o.start.c !== 'number' || typeof o.start.r !== 'number') return 'bad start';
  if (!o.finish || typeof o.finish.c !== 'number' || typeof o.finish.r !== 'number') return 'bad finish';
  if (!Array.isArray(o.grid) || o.grid.length !== ROWS) return 'grid must be ' + ROWS + ' rows';
  for (var r = 0; r < ROWS; r++) {
    if (typeof o.grid[r] !== 'string') return 'grid row ' + r + ' not a string';
    if (o.grid[r].length !== o.cols) return 'grid row ' + r + ' length ' + o.grid[r].length + ' != cols ' + o.cols;
  }
  return null;
}

function startLevelObject(o) {
  var err = validateLevel(o);
  if (err) { setLevelNote('Course "' + (o && o.name || '?') + '" is invalid: ' + err, true); return; }
  currentLevel = o;
  beginRun();
}

function startLevelFromManifest(meta) {
  currentLevelMeta = meta;
  setLevelNote('Loading "' + (meta.name || meta.file) + '"...', false);
  fetch(resolveLevelUrl(meta.file), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (o) {
      if (meta.theme && !o.theme) o.theme = meta.theme;
      if (meta.name && !o.name) o.name = meta.name;
      startLevelObject(o);
    })
    .catch(function (err) {
      console.warn('[acorn-run] level load failed:', meta.file, err && err.message);
      setLevelNote('Could not load "' + (meta.name || meta.file) + '": ' + (err && err.message) + '. Pick another.', true);
    });
}

function bestTimeKey(name) { return 'acornrun_best_' + name; }
function getBest(name) {
  try { var v = parseFloat(localStorage.getItem(bestTimeKey(name))); return isFinite(v) ? v : null; } catch (e) { return null; }
}
function setBest(name, t) {
  try { localStorage.setItem(bestTimeKey(name), String(t)); } catch (e) { console.warn('[acorn-run] best-time save failed:', e && e.message); }
}
function fmtTime(s) {
  if (s == null) return '-';
  var m = Math.floor(s / 60), rem = s - m * 60;
  return (m > 0 ? m + ':' + (rem < 10 ? '0' : '') : '') + rem.toFixed(2) + (m > 0 ? '' : 's');
}

// Levels saved by acorn-run-editor.html land in localStorage under this
// prefix (must match the editor's STORE_PREFIX). Listing them here means
// Save in the editor -> the course shows up in the game with no file steps.
var EDITOR_STORE_PREFIX = 'acornrun_level_';
function editorSavedLevels() {
  var out = [];
  try {
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (!k || k.indexOf(EDITOR_STORE_PREFIX) !== 0) continue;
      try {
        var o = JSON.parse(localStorage.getItem(k));
        if (o && !validateLevel(o)) out.push(o);
        else console.warn('[acorn-run] editor level "' + k + '" failed validation:', validateLevel(o));
      } catch (e) { console.warn('[acorn-run] editor level "' + k + '" unreadable:', e && e.message); }
    }
  } catch (e) { console.warn('[acorn-run] localStorage unavailable:', e && e.message); }
  out.sort(function (a, b) { return String(a.name || '').localeCompare(String(b.name || '')); });
  return out;
}

function renderLevelList() {

  manifest.forEach(function (meta) {

  });

      ensureAudio(); startLevelObject(o);
    }, false);

function addLevelCard(meta, onClick, isBuiltin) {

function escapeHtml(s) {

// ---- Layered equipment (paper-doll) -------------------------------------
// Equipment is drawn as separate transparent PNGs layered onto a hatless,
// empty-handed BASE body, inside the *same* transform the whole-character
// sprite already gets (facing flip, lean, squash, feet anchor) — so all
// layers move as one. Anchors are FRACTIONS of the sprite's draw box
// (x: 0=left .. 1=right, y: 0=top of head .. 1=feet). Tweak vs real art.
// NOTE: these are tuned for the HAT-OVERLAY-on-whole-character path (the
// hatless base art does not exist, so the overlay must COVER the base sprite's
// grey acorn cap). x is nudged right of centre because the staff/branch pulls
// the sprite's bbox right, so the cap dome centre sits ~0.52 across the box.
// HEAD_ANCHOR.y ~0.20 + HAT_SCALE ~1.05 drops the bowler brim onto the base
// cap's brim line and fully hides the grey cap. Easy to re-tune here.
var HEAD_ANCHOR = { x: 0.52, y: 0.20 };   // hat is centered here
var HAND_ANCHOR = { x: 0.72, y: 0.55 };   // tool's grip is centered here
// On-disk sizing of each equipment layer, as a fraction of the base box.
var HAT_SCALE = 1.05;                       // hat width  = HAT_SCALE  * boxW
var TOOL_SCALE = 0.55;                      // tool height = TOOL_SCALE * boxH
// Resolve the art file name for a player's base body / equipped items.
function baseBodyName(idx) { return (idx === 1 ? 'acorngirl' : 'acornboy') + '-base'; }
function hatName(id)  { return id && id !== 'none' ? 'hat-'  + id : null; }
function toolName(id) { return id && id !== 'none' ? 'tool-' + id : null; }
// Test/dev hook: window.__setEquip(playerIndex, { hat:'tgn', tool:'shovel' }).
// Partial updates allowed; pass hat/tool 'none' to bare that slot.
window.__setEquip = function (playerIndex, equip) {
  var pl = players && players[playerIndex];
  if (!pl) { console.warn('[acorn-run] __setEquip: no player at index', playerIndex); return; }
  if (!equip || typeof equip !== 'object') { console.warn('[acorn-run] __setEquip: equip must be an object'); return; }
  if ('hat'  in equip) pl.equip.hat  = equip.hat;
  if ('tool' in equip) pl.equip.tool = equip.tool;
  // Warm the cache so the new layers load; the draw loop picks them up.
  if (pl.equip.hat  && pl.equip.hat  !== 'none') acornImg(hatName(pl.equip.hat));
  if (pl.equip.tool && pl.equip.tool !== 'none') acornImg(toolName(pl.equip.tool));
  console.log('[acorn-run] P' + (playerIndex + 1) + ' equip ->', JSON.stringify(pl.equip));
  return pl.equip;
};

// Precompute contiguous horizontal runs of solid cells (one per row-span) for
// 16-bit-style unified ledges. A run is split when its "above" exposure changes so
// partial grass fringes render correctly. Free ends get rounded caps.
function computeLedgeRuns(lv) {
  var runs = [];
  for (var r = 0; r < ROWS; r++) {
    var rowStr = lv.grid[r];
    var c = 0;
    while (c < lv.cols) {
      if (!isSolidCode(rowStr.charAt(c))) { c++; continue; }
      var start = c;
      var exposed = !(r > 0 && isSolidCode(lv.grid[r - 1].charAt(c)));
      while (c + 1 < lv.cols) {
        var nx = rowStr.charAt(c + 1);
        if (!isSolidCode(nx)) break;
        var nExposed = !(r > 0 && isSolidCode(lv.grid[r - 1].charAt(c + 1)));
        if (nExposed !== exposed) break;
        c++;
      }
      var leftFree = !(start > 0 && isSolidCode(rowStr.charAt(start - 1)));
      var rightFree = !(c + 1 < lv.cols && isSolidCode(rowStr.charAt(c + 1)));
      runs.push({
        r: r, c0: start, c1: c,
        x: start * TILE, w: (c - start + 1) * TILE,
        exposed: exposed, leftFree: leftFree, rightFree: rightFree
      });
      c++;
    }
  }
  return runs;
}

// ====================================================================
//  SMASHABLE PROPS — spawn + procedural placement
// ====================================================================
// Per-type metadata: frame image list (intact -> shattered) and debris palette.
var SMASH_TYPES = {
  pot:    { frames: ['pot-1','pot-2','pot-3'],          multi: true,  stone: false, drops: true  },
  statue: { frames: ['statue-1','statue-2','statue-3'], multi: true,  stone: true,  drops: false },
  barrel: { frames: ['barrel'],                          multi: false, stone: false, drops: true  },
  crate:  { frames: ['crate'],                           multi: false, stone: false, drops: false }
};
function smashTypeForCode(ch) {
  if (ch === 'P') return 'pot';
  if (ch === 'U') return 'statue';
  if (ch === 'O') return 'barrel';
  if (ch === 'K') return 'crate';
  return null;
}
// Build one smashable resting ON a cell (feet at the cell's top edge).
function makeSmashable(type, c, r) {
  var def = SMASH_TYPES[type];
  var w = TILE * SMASH.SIZE, h = TILE * SMASH.SIZE;
  var x = c * TILE + (TILE - w) / 2;
  var y = (r + 1) * TILE - h;            // bottom sits on the ground surface (cell r is empty, r+1 is solid)
  return {
    x: x, y: y, w: w, h: h,
    c: c, r: r, type: type, frames: def.frames,
    frame: 0, state: 'idle', timer: 0, scored: false, bounced: false, drops: def.drops
  };
}

// Procedural sprinkle so props show up in EVERY course with no JSON edits.
// Deterministic via hash01() seeded by column, so a prop stays in the same spot
// each frame. A spot is valid when the cell is empty, the cell directly below is
// solid ground, and nothing important (spike/enemy/coin/start/finish/another
// prop) is within PROC_CLEAR cells.
function sprinkleSmashables(lv) {
  function solidAt(cc, rr) {
    if (cc < 0 || cc >= lv.cols || rr < 0 || rr >= ROWS) return false;
    return isSolidCode(lv.grid[rr].charAt(cc));
  }
  function gridChar(cc, rr) {
    if (cc < 0 || cc >= lv.cols || rr < 0 || rr >= ROWS) return '.';
    return lv.grid[rr].charAt(cc);
  }
  // Cells to avoid (in addition to spikes/enemies/coins already in the grid).
  var keepClear = SMASH.PROC_CLEAR;
  function nearBlocked(c, r) {
    for (var dc = -keepClear; dc <= keepClear; dc++) {
      for (var dr = -keepClear; dr <= keepClear; dr++) {
        var ch = gridChar(c + dc, r + dr);
        if (ch === 'C' || ch === 'X' || ch === 'E' || ch === 'B') return true;
        if (smashTypeForCode(ch)) return true;
      }
    }
    // keep clear of start/finish too
    if (lv.start && Math.abs(c - lv.start.c) <= keepClear && Math.abs(r - lv.start.r) <= keepClear) return true;
    if (lv.finish && Math.abs(c - lv.finish.c) <= keepClear && Math.abs(r - lv.finish.r) <= keepClear) return true;
    return false;
  }
  function nearPlaced(c) {
    for (var i = 0; i < smashables.length; i++) {
      if (Math.abs(smashables[i].c - c) <= keepClear) return true;
    }
    return false;
  }
  // Gather all valid candidate cells (empty cell with solid ground below).
  var cands = [];
  for (var c = 2; c < lv.cols - 2; c++) {
    for (var r = 0; r < ROWS - 1; r++) {
      if (isSolidCode(lv.grid[r].charAt(c))) continue;   // must be empty
      if (!solidAt(c, r + 1)) continue;                  // ground directly below
      if (nearBlocked(c, r)) continue;
      cands.push({ c: c, r: r });
    }
  }
  if (!cands.length) return;
  // How many to place this level (deterministic by column count).
  var span = SMASH.PROC_MAX - SMASH.PROC_MIN + 1;
  var wn = (lv.cols * 2654435761) ^ (SMASH.SEED * 40503);
  var want = SMASH.PROC_MIN + Math.floor((((wn >>> 0) % 997) / 997) * span);
  // Pass 1: walk candidates, accept ones that pass a deterministic thin-out roll
  // (so props don't cluster on every valid ledge). Respect column spacing.
  var placed = 0;
  for (var i = 0; i < cands.length && placed < want; i++) {
    var cand = cands[i];
    var rn = (cand.c * 73856093) ^ (cand.r * 19349663) ^ (SMASH.SEED * 19);
    var roll = ((rn >>> 0) % 997) / 997;
    if (roll < 0.45) continue;                 // thin out
    if (nearPlaced(cand.c)) continue;
    smashables.push(makeSmashable(pickSmashType(cand.c, cand.r), cand.c, cand.r));
    placed++;
  }
  // Pass 2 (guarantee): if the thin-out left us short of the minimum, fill from the
  // remaining spaced candidates so EVERY course reliably shows props. Stride across
  // the candidate list for an even spread instead of bunching at the start.
  if (placed < SMASH.PROC_MIN && cands.length) {
    var stride = Math.max(1, Math.floor(cands.length / want));
    for (var j = 0; j < cands.length && placed < want; j += stride) {
      var cd = cands[j];
      if (nearPlaced(cd.c)) continue;
      smashables.push(makeSmashable(pickSmashType(cd.c, cd.r), cd.c, cd.r));
      placed++;
    }
  }
}
// Type by hash: pots most common, barrels/crates next, statues rarest. Statues
// are biased toward stony themes (ruins/cave).
function pickSmashType(c, r) {
  var theme = (currentLevel && currentLevel.theme) || 'jungle';
  var stony = (theme === 'ruins' || theme === 'cave');
  // Robust 32-bit XOR hash — hash01() overflows 2^53 for inputs this large and
  // collapses to a non-uniform value (was making every prop a statue).
  var hn = (c * 73856093) ^ (r * 19349663) ^ (SMASH.SEED * 83492791);
  var h = ((hn >>> 0) % 997) / 997;
  var statueCut = stony ? 0.20 : 0.06;         // statues more likely in stony themes
  if (h < statueCut) return 'statue';
  if (h < statueCut + 0.18) return 'barrel';
  if (h < statueCut + 0.32) return 'crate';
  return 'pot';                                 // remainder -> pots (most common)
}

function beginRun() {
  var lv = currentLevel;
  levelCols = lv.cols;
  levelPx = lv.cols * TILE;
  startCell = lv.start;
  finishCell = lv.finish;
  // Split solid geometry: thick GROUND MASSES render as smooth rolling terrain
  // (pre-rendered chunks); thin floating platforms keep the classic ledge path.
  var tg = computeTerrain(lv);
  ledgeRuns = tg.platformRuns;
  terrain = {
    strips: tg.strips,
    chunks: [],
    theme: (lv.theme && THEMES.indexOf(lv.theme) >= 0) ? lv.theme : 'jungle'
  };

  collectibles = []; spikes = []; enemies = []; boosts = []; fans = []; sparkles = [];
  dust = []; smashables = []; debris = []; ambient = null; ambientTheme = null;
  var r, c;
  for (r = 0; r < ROWS; r++) {
    var rowStr = lv.grid[r];
    for (c = 0; c < lv.cols; c++) {
      var ch = rowStr.charAt(c);
      var x = c * TILE, y = r * TILE;
      if (ch === 'C') collectibles.push({ c:c, r:r, x:x, y:y, taken:false, spin: Math.random() * 6.28 });
      else if (ch === 'X') spikes.push({ c:c, r:r, x:x, y:y });
      else if (ch === 'B') boosts.push({ c:c, r:r, x:x, y:y, t:0 });
      else if (ch === 'F') fans.push({ c:c, r:r, x:x, y:y, dir:'up' });
      else if (ch === 'E') {
        var range = enemyPatrolRange(lv, c, r);
        // Type comes from the level theme (deterministic per cell so it's stable).
        var etype = enemyTypeFor(lv.theme, (c * 73856093 ^ r * 19349663 ^ ENEMY.SEED * 7) >>> 0);
        enemies.push({
          x: x + 6, y: y + (TILE - 22), w: 20, h: 22,
          dir: (Math.random() < 0.5 ? -1 : 1), speed: 70,
          minX: range.minX, maxX: range.maxX, baseY: y + (TILE - 22),
          alive: true, anim: 0, type: etype, dying: false, deadTimer: 0
        });
      }
      else {
        // Hand-placed smashable props (non-solid; player passes through).
        var st = smashTypeForCode(ch);
        if (st) smashables.push(makeSmashable(st, c, r));
      }
    }
  }

  // Procedural sprinkle: the main way props appear in all 5 courses right now,
  // with no JSON edits. Runs AFTER the grid parse so it can see coins/spikes/etc.
  sprinkleSmashables(lv);

  // Procedural enemies: a few extra theme-matched patrollers per course, on top
  // of any hand-placed 'E' enemies. Runs AFTER smashables so it can avoid them.
  sprinkleEnemies(lv);

  var nPlayers = (mode === 'race') ? 2 : 1;
  players = [];
  for (var p = 0; p < nPlayers; p++) {
    var pl = makePlayer(p);
    pl.x = startCell.c * TILE + (TILE - PLAYER_W) / 2 + (p === 1 ? 6 : -6);
    pl.y = startCell.r * TILE + (TILE - PLAYER_H);
    pl.safeX = pl.x; pl.safeY = pl.y;
    pl.facing = 1;
    players.push(pl);
  }

  raceTimer = 0;
  winner = null;
  countdown = 3.0;
  state = 'countdown';
  hideMenu();
  tone(440, 0.1, 'square', 0.05);
}

function enemyPatrolRange(lv, c, r) {
  var floorRow = r + 1;
  var minC = c, maxC = c;
  function solidAt(cc, rr) {
    if (cc < 0 || cc >= lv.cols || rr < 0 || rr >= ROWS) return false;
    return isSolidCode(lv.grid[rr].charAt(cc));
  }
  while (minC - 1 >= 0 && solidAt(minC - 1, floorRow) && !solidAt(minC - 1, r)) minC--;
  while (maxC + 1 < lv.cols && solidAt(maxC + 1, floorRow) && !solidAt(maxC + 1, r)) maxC++;
  return { minX: minC * TILE + 2, maxX: (maxC + 1) * TILE - 2 };
}

// Procedural enemy sprinkle (mirrors sprinkleSmashables). Places ENEMY.PROC_MIN
// ..PROC_MAX extra theme-matched patrollers on valid ground, deterministic via a
// 32-bit XOR hash, clear of start/finish/spikes/enemies/coins/smashables/other
// placed enemies by ~ENEMY.CLEAR cells. Runs AFTER the grid parse + smashables.
function sprinkleEnemies(lv) {
  function solidAt(cc, rr) {
    if (cc < 0 || cc >= lv.cols || rr < 0 || rr >= ROWS) return false;
    return isSolidCode(lv.grid[rr].charAt(cc));
  }
  function gridChar(cc, rr) {
    if (cc < 0 || cc >= lv.cols || rr < 0 || rr >= ROWS) return '.';
    return lv.grid[rr].charAt(cc);
  }
  var keepClear = ENEMY.CLEAR;
  function nearBlocked(c, r) {
    for (var dc = -keepClear; dc <= keepClear; dc++) {
      for (var dr = -keepClear; dr <= keepClear; dr++) {
        var ch = gridChar(c + dc, r + dr);
        // Avoid coins, spikes, hand-placed enemies, boosts, and any smashable tile.
        if (ch === 'C' || ch === 'X' || ch === 'E' || ch === 'B') return true;
        if (smashTypeForCode(ch)) return true;
      }
    }
    if (lv.start && Math.abs(c - lv.start.c) <= keepClear && Math.abs(r - lv.start.r) <= keepClear) return true;
    if (lv.finish && Math.abs(c - lv.finish.c) <= keepClear && Math.abs(r - lv.finish.r) <= keepClear) return true;
    return false;
  }
  // Avoid sprinkled smashables (placed already) and other placed enemies by column.
  function nearPlaced(c) {
    var i;
    for (i = 0; i < enemies.length; i++) {
      if (Math.abs((enemies[i].x / TILE) - c) <= keepClear) return true;
    }
    for (i = 0; i < smashables.length; i++) {
      if (Math.abs(smashables[i].c - c) <= keepClear) return true;
    }
    return false;
  }
  // Candidate = empty cell with solid ground directly below.
  var cands = [];
  for (var c = 2; c < lv.cols - 2; c++) {
    for (var r = 0; r < ROWS - 1; r++) {
      if (isSolidCode(lv.grid[r].charAt(c))) continue;   // must be empty
      if (!solidAt(c, r + 1)) continue;                  // ground directly below
      if (nearBlocked(c, r)) continue;
      cands.push({ c: c, r: r });
    }
  }
  if (!cands.length) return;
  // How many to place (deterministic by column count, 32-bit XOR hash).
  var span = ENEMY.PROC_MAX - ENEMY.PROC_MIN + 1;
  var wn = (lv.cols * 73856093) ^ (ENEMY.SEED * 19349663);
  var want = ENEMY.PROC_MIN + Math.floor((((wn >>> 0) % 997) / 997) * span);

  function placeAt(cand) {
    var range = enemyPatrolRange(lv, cand.c, cand.r);
    var y = cand.r * TILE;
    var dirHash = (cand.c * 19349663 ^ cand.r * 83492791 ^ ENEMY.SEED * 2654435761) >>> 0;
    var etype = enemyTypeFor(lv.theme, (cand.c * 73856093 ^ cand.r * 19349663 ^ ENEMY.SEED * 7) >>> 0);
    enemies.push({
      x: cand.c * TILE + 6, y: y + (TILE - 22), w: 20, h: 22,
      dir: ((dirHash % 2 === 0) ? -1 : 1), speed: 70,
      minX: range.minX, maxX: range.maxX, baseY: y + (TILE - 22),
      alive: true, anim: 0, type: etype, dying: false, deadTimer: 0
    });
  }

  // Pass 1: deterministic thin-out so enemies don't land on every valid ledge.
  var placed = 0;
  for (var i = 0; i < cands.length && placed < want; i++) {
    var cand = cands[i];
    var rn = (cand.c * 73856093) ^ (cand.r * 19349663) ^ (ENEMY.SEED * 19);
    var roll = ((rn >>> 0) % 997) / 997;
    if (roll < 0.55) continue;                 // thin out (enemies rarer than props)
    if (nearPlaced(cand.c)) continue;
    placeAt(cand);
    placed++;
  }
  // Pass 2 (guarantee minimum): stride the candidate list for an even spread.
  if (placed < ENEMY.PROC_MIN && cands.length) {
    var stride = Math.max(1, Math.floor(cands.length / Math.max(1, want)));
    for (var j = 0; j < cands.length && placed < want; j += stride) {
      var cd = cands[j];
      if (nearPlaced(cd.c)) continue;
      placeAt(cd);
      placed++;
    }
  }
}
// ====================================================================
//  COLLISION — swept against the grid (separate X then Y passes)
// ====================================================================
function solidGrid(cx, cy) {
  if (cx < 0 || cx >= levelCols || cy < 0 || cy >= ROWS) return false;
  return isSolidCode(currentLevel.grid[cy].charAt(cx));
}

function aabbHitsSolid(x, y, w, h) {
  var c0 = Math.floor(x / TILE), c1 = Math.floor((x + w - 1) / TILE);
  var r0 = Math.floor(y / TILE), r1 = Math.floor((y + h - 1) / TILE);
  for (var cy = r0; cy <= r1; cy++) {
    for (var cx = c0; cx <= c1; cx++) {
      if (solidGrid(cx, cy)) return true;
    }
  }
  return false;
}

// ph = effective collision height (defaults to PLAYER_H). The SLIDE mechanic
// passes a shorter height so the top of the box clears low gaps; pl.y is the
// box TOP and is shifted down on slide-enter so the feet stay planted.
function movePlayer(pl, dx, dy, ph) {
  if (ph == null) ph = PLAYER_H;
  if (dx !== 0) {
    var nx = pl.x + dx;
    if (aabbHitsSolid(nx, pl.y, PLAYER_W, ph)) {
      var step = dx > 0 ? 1 : -1;
      while (!aabbHitsSolid(pl.x + step, pl.y, PLAYER_W, ph)) pl.x += step;
      pl.vx = 0;
    } else {
      pl.x = nx;
    }
  }
  pl.onGround = false;
  if (dy !== 0) {
    var ny = pl.y + dy;
    if (aabbHitsSolid(pl.x, ny, PLAYER_W, ph)) {
      var stepY = dy > 0 ? 1 : -1;
      while (!aabbHitsSolid(pl.x, pl.y + stepY, PLAYER_W, ph)) pl.y += stepY;
      if (dy > 0) pl.onGround = true;
      pl.vy = 0;
    } else {
      pl.y = ny;
    }
  }
  if (!pl.onGround && aabbHitsSolid(pl.x, pl.y + 1, PLAYER_W, ph) && pl.vy >= 0) {
    pl.onGround = true;
  }
}

// ====================================================================
//  UPDATE
// ====================================================================
function update(dt) {
  frame++;

  for (var i = sparkles.length - 1; i >= 0; i--) {
    var sp = sparkles[i];
    sp.x += sp.vx * dt; sp.y += sp.vy * dt; sp.vy += 900 * dt; sp.life -= dt;
    if (sp.life <= 0) sparkles.splice(i, 1);
  }

  // Dust puffs (landing + running trail): drift up/out, fade, slow on air drag.
  for (var di = dust.length - 1; di >= 0; di--) {
    var du = dust[di];
    du.x += du.vx * dt; du.y += du.vy * dt;
    du.vx *= (1 - Math.min(1, dt * 4));
    du.vy += 60 * dt;            // light gravity so puffs settle
    du.life -= dt;
    if (du.life <= 0) dust.splice(di, 1);
  }

  // Prop debris chunks: fly outward, fall under gravity, fade then expire.
  for (var dbi = debris.length - 1; dbi >= 0; dbi--) {
    var db = debris[dbi];
    db.x += db.vx * dt; db.y += db.vy * dt;
    db.vy += SMASH.DEBRIS_GRAV * dt;
    db.rot += db.spin * dt;
    db.life -= dt;
    if (db.life <= 0) debris.splice(dbi, 1);
  }

  if (state === 'countdown') {
    countdown -= dt;
    var sec = Math.ceil(countdown);
    if (sec !== update._lastSec) { update._lastSec = sec; if (sec > 0) tone(660, 0.08, 'square', 0.05); else tone(990, 0.18, 'square', 0.06); }
    if (countdown <= 0) state = 'play';
    return;
  }

  if (state === 'play') {
    raceTimer += dt;
    enemiesUpdate(dt);
    updateSmashables(dt);
    for (var p = 0; p < players.length; p++) updatePlayer(players[p], dt);

    if (mode === 'solo') {
      if (players[0].finished) { winner = null; finishSolo(); }
    } else {
      var done = players.filter(function (pl) { return pl.finished; });
      if (done.length) {
        done.sort(function (a, b) { return a.finishTime - b.finishTime; });
        winner = done[0];
        state = 'win';
        tone(880, 0.15, 'square', 0.06); tone(1320, 0.2, 'square', 0.05);
      }
    }
    return;
  }

  if (state === 'win') {
    if (keys['Enter']) { keys['Enter'] = false; rematch(); }
    if (keys['Escape']) { keys['Escape'] = false; showMenu(); }
    return;
  }
}
update._lastSec = 4;

function finishSolo() {
  var pl = players[0];
  var name = currentLevel.name || 'course';
  var best = getBest(name);
  pl.newBest = (best == null || pl.finishTime < best);
  if (pl.newBest) setBest(name, pl.finishTime);
  state = 'win';
  tone(880, 0.15, 'square', 0.06); tone(1320, 0.2, 'square', 0.05);
}

function updatePlayer(pl, dt) {
  if (pl.finished) return;

  var inp = (pl.idx === 0) ? readP1() : readP2();
  var stunned = pl.stun > 0;
  if (stunned) {
    pl.stun -= dt;
    if (pl.fade > 0) pl.fade -= dt;
  }

  if (pl.wallLock > 0) pl.wallLock = Math.max(0, pl.wallLock - dt);

  var wantDir = 0;
  if (!stunned) {
    if (inp.left && !inp.right) wantDir = -1;
    else if (inp.right && !inp.left) wantDir = 1;
  }
  var accel = pl.onGround ? RUN_ACCEL : AIR_ACCEL;
  if (pl.wallLock > 0) {
    // just wall-jumped: hold the push, ignore steering briefly (still face travel)
    if (wantDir !== 0) pl.facing = wantDir;
  } else if (wantDir !== 0) {
    pl.vx += wantDir * accel * dt;
    if (pl.vx > RUN_MAX) pl.vx = RUN_MAX;
    if (pl.vx < -RUN_MAX) pl.vx = -RUN_MAX;
    pl.facing = wantDir;
  } else {
    var fr = (pl.onGround ? GROUND_FRICTION : AIR_FRICTION) * dt;
    if (pl.vx > 0) pl.vx = Math.max(0, pl.vx - fr);
    else if (pl.vx < 0) pl.vx = Math.min(0, pl.vx + fr);
  }

  if (pl.onGround) pl.coyote = COYOTE; else pl.coyote = Math.max(0, pl.coyote - dt);
  var jumpPressed = inp.jump && !pl.prevJump;
  if (jumpPressed) pl.jumpBuf = JUMP_BUFFER; else pl.jumpBuf = Math.max(0, pl.jumpBuf - dt);
  pl.prevJump = inp.jump;

  // wall contact (airborne + a solid just to the side) — powers wall-slide + wall-jump
  var onWallL = !pl.onGround && aabbHitsSolid(pl.x - 2, pl.y, PLAYER_W, PLAYER_H);
  var onWallR = !pl.onGround && aabbHitsSolid(pl.x + 2, pl.y, PLAYER_W, PLAYER_H);

  if (!stunned && pl.jumpBuf > 0 && pl.coyote > 0) {
    pl.vy = -JUMP_VEL;
    pl.onGround = false;
    pl.coyote = 0; pl.jumpBuf = 0;
    pl.squash = -0.35;
    tone(420, 0.08, 'square', 0.04, 560);
  } else if (!stunned && pl.jumpBuf > 0 && !pl.onGround && (onWallL || onWallR)) {
    // WALL JUMP — leap up and away from the wall
    var away = onWallL ? 1 : -1;
    pl.vy = -JUMP_VEL * WALLJUMP.Y;
    pl.vx = away * WALLJUMP.X;
    pl.facing = away;
    pl.jumpBuf = 0;
    pl.wallLock = WALLJUMP.LOCK;
    pl.squash = -0.35;
    tone(500, 0.08, 'square', 0.04, 640);
  }
  if (!inp.jump && pl.vy < -120) pl.vy = -120;

  // ---- (4) PUNCH cooldown + edge-trigger ----------------------------------
  // Tap punch -> a short active window (punchT). The actual hitbox is resolved
  // after movement (below) so it uses the player's settled position.
  if (pl.punchCd > 0) pl.punchCd -= dt;
  if (pl.punchT  > 0) pl.punchT  -= dt;
  var punchPressed = inp.punch && !pl.prevPunch;
  pl.prevPunch = inp.punch;
  if (!stunned && punchPressed && pl.punchCd <= 0 && pl.punchT <= 0) {
    pl.punchT  = PUNCH.DUR;
    pl.punchCd = PUNCH.COOLDOWN;
    tone(520, 0.05, 'square', 0.04, 700);
  }

  // ---- (3) SLIDE state machine --------------------------------------------
  // Enter: on the ground, holding down, moving fast enough. While sliding the
  // collision box is shortened to SLIDE.H_FRAC (top drops, feet stay planted)
  // so the player slips under low gaps. Exit when down is released, speed dies,
  // or MAX_S elapses (unless there's no headroom -> stay sliding until clear).
  var phEff = PLAYER_H;
  var wasSliding = pl.sliding;
  var slideExpired = pl.sliding && (pl.slideT >= SLIDE.MAX_S);
  var wantSlide = !stunned && pl.onGround && inp.down && Math.abs(pl.vx) > SLIDE.MIN_VX;
  if (!pl.sliding && wantSlide) {
    pl.sliding = true; pl.slideT = 0;
    // small forward boost in the current facing on entry (keeps momentum lively)
    if (Math.abs(pl.vx) < RUN_MAX) pl.vx += pl.facing * SLIDE.ENTRY;
  } else if (pl.sliding) {
    pl.slideT += dt;
    // friction bleeds speed; exit conditions handled after the headroom check
    var sfr = SLIDE.FRICTION * dt;
    if (pl.vx > 0) pl.vx = Math.max(0, pl.vx - sfr);
    else if (pl.vx < 0) pl.vx = Math.min(0, pl.vx + sfr);
    var wantExit = !inp.down || Math.abs(pl.vx) < SLIDE.MIN_VX || slideExpired || !pl.onGround;
    if (wantExit) pl.sliding = false;
  }
  // Effective height + keep the feet planted across height changes. pl.y is the
  // box TOP; lowering the box means raising pl.y's value (moving the top down).
  var lowH = SLIDE.H_FRAC * PLAYER_H;
  if (pl.sliding && !wasSliding) {
    pl.y += (PLAYER_H - lowH);     // entering: drop top to keep feet on the floor
  } else if (!pl.sliding && wasSliding) {
    // exiting: try to restore full height upward; if the head would hit a ceiling
    // there's no room to stand, so cancel the exit and remain sliding this frame.
    var newY = pl.y - (PLAYER_H - lowH);
    if (aabbHitsSolid(pl.x, newY, PLAYER_W, PLAYER_H)) {
      pl.sliding = true;            // forced-slide: no headroom to stand up yet
    } else {
      pl.y = newY;
    }
  }
  if (pl.sliding) phEff = lowH;

  pl.vy += GRAVITY * dt;
  if (pl.vy > MAX_FALL) pl.vy = MAX_FALL;
  // wall-slide: hugging a wall while falling slows the descent (after gravity so it truly caps)
  if (!pl.onGround && pl.vy > WALLJUMP.SLIDE && ((onWallL && inp.left) || (onWallR && inp.right))) {
    pl.vy = WALLJUMP.SLIDE;
  }

  // ---- (2) FAN updraft -----------------------------------------------------
  // If the player's (effective) box overlaps a fan's wind column, push against
  // gravity this frame (or sideways for left/right fans). Applied to vy before
  // integration so it lifts smoothly and is capped at FAN.MAX.
  applyFans(pl, phEff, dt);

  var wasGround = pl.onGround;
  var vyBefore = pl.vy;          // impact speed (movePlayer zeroes vy on landing)
  movePlayer(pl, pl.vx * dt, pl.vy * dt, phEff);

  if (pl.onGround) {
    if (!wasGround && pl.vy === 0) {
      pl.squash = 0.35;
      // Landing dust puff, scaled by how hard the touchdown was.
      if (vyBefore > 220) {
        var hardness = clamp(vyBefore / MAX_FALL, 0.25, 1);
        spawnDust(pl.x + PLAYER_W / 2, pl.y + phEff, Math.round(JUICE.DUST_LAND_COUNT * hardness),
                  120 + 160 * hardness, 70 + 60 * hardness, dustColorFor());
      }
    }
    if (!onSpikeBelow(pl)) { pl.safeX = pl.x; pl.safeY = pl.y; }
  }
  pl.wasGroundPrev = wasGround;
  pl.squash += (0 - pl.squash) * Math.min(1, dt * 12);
  pl.anim += Math.abs(pl.vx) * dt * 0.03;
  pl.breath += dt * JUICE.IDLE_BREATH_SPEED;

  // Running dust trail: while sprinting on the ground, kick a small puff
  // off the trailing foot at a steady rate.
  if (pl.onGround && Math.abs(pl.vx) > JUICE.DUST_RUN_SPEED_MIN) {
    pl.dustTimer -= dt;
    if (pl.dustTimer <= 0) {
      pl.dustTimer = JUICE.DUST_RUN_RATE;
      var backX = pl.x + PLAYER_W / 2 - pl.facing * (PLAYER_W * 0.5);
      spawnDust(backX, pl.y + phEff, 2, 70, 50, dustColorFor());
    }
  } else {
    pl.dustTimer = 0;
  }

  if (pl.y > GH + 200 || pl.y > ROWS * TILE + 200) { hitPlayer(pl, 'pit'); return; }

  if (stunned) return;

  for (var i = 0; i < collectibles.length; i++) {
    var co = collectibles[i];
    if (co.taken) continue;
    if (rectHit(pl.x, pl.y, PLAYER_W, phEff, co.x + 6, co.y + 6, 20, 20)) {
      co.taken = true; pl.coins++;
      spawnSparkle(co.x + 16, co.y + 16, '#f6c945', 8);
      tone(880, 0.05, 'sine', 0.05, 1200); tone(1180, 0.05, 'sine', 0.04);
    }
  }

  // Smashable props: touching an idle prop starts its smash. Props never block
  // or hurt the player — they run/jump straight through. Falling onto a barrel
  // grants a small bounce (a weak boost), which feels great without changing
  // collision (we just nudge vy upward when stomping from above).
  for (var sm = 0; sm < smashables.length; sm++) {
    var so = smashables[sm];
    if (so.state !== 'idle') continue;
    if (!rectHit(pl.x, pl.y, PLAYER_W, phEff, so.x, so.y, so.w, so.h)) continue;
    startSmash(so, pl);
    // Barrel stomp bounce: only when the player is falling onto it from above.
    if (so.type === 'barrel' && pl.vy >= SMASH.BOUNCE_MIN_VY && (pl.y + phEff) <= so.y + so.h * 0.6) {
      pl.vy = -SMASH.BOUNCE_VEL;
      pl.onGround = false;
      so.bounced = true;
    }
  }

  // (1) SPRING — bouncy mushroom. A STRONG vertical bounce; vx is left mostly
  // unchanged (springs throw you UP, not forward). bo.t drives the squash anim.
  for (var b = 0; b < boosts.length; b++) {
    var bo = boosts[b];
    if (rectHit(pl.x, pl.y, PLAYER_W, phEff, bo.x + 2, bo.y + 2, TILE - 4, TILE - 4)) {
      pl.vy = -SPRING.VEL;          // launch straight up
      pl.onGround = false;
      pl.sliding = false;           // can't keep sliding mid-air
      bo.t = 0.25;                  // squash/anim timer (drawn by drawBoost)
      spawnSparkle(bo.x + 16, bo.y + 8, '#ff5a6a', 10);
      tone(300, 0.12, 'sawtooth', 0.05, 720);
    }
  }
  for (var b2 = 0; b2 < boosts.length; b2++) if (boosts[b2].t > 0) boosts[b2].t -= dt;

  for (var s = 0; s < spikes.length; s++) {
    var sk = spikes[s];
    if (rectHit(pl.x, pl.y, PLAYER_W, phEff, sk.x + 4, sk.y + 10, TILE - 8, TILE - 12)) { hitPlayer(pl, 'spike'); return; }
  }

  for (var e = 0; e < enemies.length; e++) {
    var en = enemies[e];
    if (!en.alive || en.dying) continue;   // a squished/dead enemy can't hurt or be re-stomped
    if (!rectHit(pl.x, pl.y, PLAYER_W, phEff, en.x, en.y, en.w, en.h)) continue;
    // STOMP: player is falling onto the enemy from above (same test as a barrel).
    // -> squish the enemy and bounce the player up. No damage taken.
    if (pl.vy >= SMASH.BOUNCE_MIN_VY && (pl.y + phEff) <= en.y + en.h * 0.6) {
      en.dying = true; en.deadTimer = ENEMY.SQUISH_S;   // freeze + show squish frame, then remove
      en.dir = 0;                                        // stop its patrol motion
      pl.vy = -SMASH.BOUNCE_VEL;                         // upward bounce
      pl.onGround = false;
      spawnSparkle(en.x + en.w / 2, en.y + en.h / 2, '#9a5bd6', 10);
      spawnDust(en.x + en.w / 2, en.y + en.h, 7, 140, 120, dustColorFor());
      tone(420, 0.08, 'square', 0.05, 180);
      continue;
    }
    // SIDE CONTACT: not a stomp -> player gets hurt + knocked away.
    var away = (pl.x + PLAYER_W / 2 < en.x + en.w / 2) ? -1 : 1;
    pl.vx = away * 260; pl.vy = -360;
    hitPlayer(pl, 'enemy', away);
    return;
  }

  var fx = finishCell.c * TILE, fy = finishCell.r * TILE;
  if (rectHit(pl.x, pl.y, PLAYER_W, phEff, fx - 4, fy - TILE, TILE + 8, TILE * 2)) {
    pl.finished = true;
    pl.finishTime = raceTimer;
    spawnSparkle(fx + 16, fy, '#ffffff', 18);
    spawnSparkle(fx + 16, fy + 16, '#f6c945', 14);
  }

  // ---- (4) PUNCH hitbox resolution ----------------------------------------
  // While the punch is active, a small box reaches PUNCH.REACH px in front of
  // the player at body height. Any idle smashable it overlaps gets smashed; any
  // live (non-dying) enemy it overlaps gets squished (same effect as a stomp,
  // minus the bounce). No effect on the player's own physics.
  if (pl.punchT > 0) {
    var bodyMidY = pl.y + phEff * 0.5;
    var hbH = phEff * 0.6;
    var hbY = bodyMidY - hbH / 2;
    var hbX = (pl.facing >= 0) ? (pl.x + PLAYER_W) : (pl.x - PUNCH.REACH);
    for (var ps = 0; ps < smashables.length; ps++) {
      var pso = smashables[ps];
      if (pso.state !== 'idle') continue;
      if (rectHit(hbX, hbY, PUNCH.REACH, hbH, pso.x, pso.y, pso.w, pso.h)) startSmash(pso, pl);
    }
    for (var pe = 0; pe < enemies.length; pe++) {
      var pen = enemies[pe];
      if (!pen.alive || pen.dying) continue;
      if (!rectHit(hbX, hbY, PUNCH.REACH, hbH, pen.x, pen.y, pen.w, pen.h)) continue;
      pen.dying = true; pen.deadTimer = ENEMY.SQUISH_S;   // squish like a stomp
      pen.dir = 0;
      spawnSparkle(pen.x + pen.w / 2, pen.y + pen.h / 2, '#ffd23f', 10);
      spawnDust(pen.x + pen.w / 2, pen.y + pen.h, 6, 120, 100, dustColorFor());
      tone(360, 0.07, 'square', 0.05, 160);
    }
  }
}

// (2) FAN updraft physics. For each fan whose wind column the player's box
// overlaps, push against gravity (dir 'up') or sideways (dir 'left'/'right').
// 'up' negates this frame's gravity then accelerates vy upward toward -FAN.MAX.
// ph = the player's effective collision height (slide-aware).
function applyFans(pl, ph, dt) {
  for (var f = 0; f < fans.length; f++) {
    var fn = fans[f];
    if (fn.dir === 'left' || fn.dir === 'right') {
      // Horizontal blower: a column the same HEIGHT tall, pushing sideways.
      var zxw = fn.x + TILE, zyw = fn.y - (FAN.HEIGHT - 1) * TILE, zhw = FAN.HEIGHT * TILE;
      if (rectHit(pl.x, pl.y, PLAYER_W, ph, fn.x, zyw, TILE, zhw + 0)) {
        var dirS = (fn.dir === 'left') ? -1 : 1;
        pl.vx += dirS * FAN.PUSH * dt;
        if (pl.vx >  FAN.MAX) pl.vx =  FAN.MAX;
        if (pl.vx < -FAN.MAX) pl.vx = -FAN.MAX;
      }
      continue;
    }
    // Default 'up' updraft: a wind column FAN.HEIGHT cells tall ABOVE the fan.
    var zx = fn.x, zw = TILE;
    var zy = fn.y - FAN.HEIGHT * TILE, zh = (FAN.HEIGHT + 1) * TILE; // include the fan cell
    if (rectHit(pl.x, pl.y, PLAYER_W, ph, zx, zy, zw, zh)) {
      pl.vy -= GRAVITY * dt;                          // cancel this frame's gravity
      pl.vy = Math.max(pl.vy - FAN.PUSH * dt, -FAN.MAX);
      pl.onGround = false;
    }
  }
}

function onSpikeBelow(pl) {
  for (var s = 0; s < spikes.length; s++) {
    var sk = spikes[s];
    if (pl.x + PLAYER_W > sk.x + 4 && pl.x < sk.x + TILE - 4 &&
        Math.abs((pl.y + PLAYER_H) - (sk.y + TILE)) < 6) return true;
  }
  return false;
}

function hitPlayer(pl, kind, knockDir) {
  if (pl.stun > 0 && kind !== 'pit') return;
  pl.stun = STUN_TIME;
  pl.fade = RESPAWN_FADE;
  noise(0.18, 0.06, 700);
  tone(180, 0.18, 'sawtooth', 0.06, 90);
  spawnSparkle(pl.x + PLAYER_W / 2, pl.y + PLAYER_H / 2, kind === 'spike' ? '#e0503a' : (kind === 'enemy' ? '#9a5bd6' : '#7799aa'), 12);
  if (kind === 'pit' || kind === 'spike') {
    pl.x = pl.safeX; pl.y = pl.safeY; pl.vx = 0; pl.vy = 0; pl.onGround = true;
  }
}

function enemiesUpdate(dt) {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    if (!en.alive) continue;
    // Dying (squished): hold still, count down, then mark dead for removal.
    if (en.dying) {
      en.deadTimer -= dt;
      if (en.deadTimer <= 0) en.alive = false;
      continue;
    }
    en.anim += dt;
    en.x += en.dir * en.speed * dt;
    if (en.x <= en.minX) { en.x = en.minX; en.dir = 1; }
    else if (en.x + en.w >= en.maxX) { en.x = en.maxX - en.w; en.dir = -1; }
  }
}

function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function spawnSparkle(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var a = Math.random() * Math.PI * 2, s = 60 + Math.random() * 180;
    sparkles.push({ x:x, y:y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: 0.4 + Math.random() * 0.4, color: color, size: 1.5 + Math.random() * 2.5 });
  }
}

// Earthy dust tint pulled from the active theme so puffs match the ground.
function dustColorFor() {
  var t = currentLevel && currentLevel.theme;
  var P = pal((t && THEMES.indexOf(t) >= 0) ? t : 'jungle');
  return P.bodyHi;
}
// Soft dust kicked up at the feet. spread=horizontal velocity span, up=lift bias.
function spawnDust(x, y, n, spread, up, col) {
  if (!JUICE.DUST_ENABLE) return;
  for (var i = 0; i < n; i++) {
    dust.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y - Math.random() * 3,
      vx: (Math.random() - 0.5) * spread,
      vy: -(up * (0.4 + Math.random() * 0.6)),
      life: 0.32 + Math.random() * 0.30,
      maxLife: 0.62,
      size: 2.5 + Math.random() * 3.5,
      col: col || '#cdbcaa'   // earthy tan default; per-theme override below
    });
  }
}

// ====================================================================
//  SMASHABLE PROPS — runtime (smash trigger, frame advance, debris, score)
// ====================================================================
// Begin a smash. Single-frame props die immediately (with a brief pop flash);
// multi-frame props enter a crack animation that finishes in finishSmash().
function startSmash(so, pl) {
  if (so.state !== 'idle') return;
  var def = SMASH_TYPES[so.type];
  so.state = 'smashing';
  so.timer = 0;
  so.frame = 0;
  so.smasher = pl || null;        // remember who triggered it, so the score is reliable
                                   // even after they run past during a multi-frame crack
  noise(0.10, 0.05, def && def.stone ? 1400 : 900);   // crunch (stone brighter than wood)
  tone(def && def.stone ? 320 : 240, 0.07, 'square', 0.045, def && def.stone ? 180 : 120);
  if (!def || !def.multi) {
    // Single-frame: pop now, finish next update once the pop flash has shown.
    so.popUntil = SMASH.POP_MS / 1000;
  }
}

// Per-frame advance for smashing props. Multi-frame props step through their
// crack frames; single-frame props hold a short pop then finish. Finishing
// emits debris + dust, scores once, and (sometimes) drops a coin.
function updateSmashables(dt) {
  for (var i = 0; i < smashables.length; i++) {
    var so = smashables[i];
    if (so.state !== 'smashing') continue;
    so.timer += dt;
    var def = SMASH_TYPES[so.type];
    if (def && def.multi) {
      var step = SMASH.FRAME_MS / 1000;
      var idx = Math.floor(so.timer / step);
      if (idx >= so.frames.length) { finishSmash(so); }
      else { so.frame = idx; }
    } else {
      so.popUntil -= dt;
      if (so.popUntil <= 0) finishSmash(so);
    }
  }
}

function finishSmash(so) {
  if (so.state === 'dead') return;
  so.state = 'dead';
  spawnDebris(so);
  // A puff of theme dust at the base for extra impact.
  spawnDust(so.x + so.w / 2, so.y + so.h, JUICE.DUST_LAND_COUNT, 150, 90, dustColorFor());
  // Score once (reuse the coin scoring path: each smash is worth SMASH.SCORE).
  // Credit the player who triggered the smash; fall back to anyone overlapping.
  if (!so.scored) {
    so.scored = true;
    if (so.smasher) {
      so.smasher.coins += SMASH.SCORE;
    } else {
      for (var p = 0; p < players.length; p++) {
        var pl = players[p];
        if (rectHit(pl.x, pl.y, PLAYER_W, PLAYER_H, so.x - 6, so.y - 6, so.w + 12, so.h + 12)) {
          pl.coins += SMASH.SCORE;
        }
      }
    }
    spawnSparkle(so.x + so.w / 2, so.y + so.h * 0.4, '#f6c945', 6);
    tone(990, 0.05, 'sine', 0.04, 1300);
  }
  // Bonus acorn coin drop (deterministic by cell, only pot/barrel). Reuses the
  // collectible entity so it draws + picks up exactly like a placed coin.
  if (so.drops && hash01(so.c * 71 + so.r * 19 + SMASH.SEED * 5) < SMASH.DROP_CHANCE) {
    collectibles.push({
      c: so.c, r: so.r,
      x: so.c * TILE, y: (so.r) * TILE,
      taken: false, spin: Math.random() * 6.28
    });
  }
}

// Spawn chunk particles flying outward from a smashed prop, colored by material.
function spawnDebris(so) {
  var def = SMASH_TYPES[so.type];
  var colors = (def && def.stone) ? SMASH.STONE_COLORS : SMASH.WOOD_COLORS;
  var n = SMASH.DEBRIS_MIN + Math.floor(Math.random() * (SMASH.DEBRIS_MAX - SMASH.DEBRIS_MIN + 1));
  var cx = so.x + so.w / 2, cy = so.y + so.h * 0.5;
  for (var i = 0; i < n; i++) {
    debris.push({
      x: cx + (Math.random() - 0.5) * so.w * 0.5,
      y: cy + (Math.random() - 0.5) * so.h * 0.4,
      vx: (Math.random() - 0.5) * SMASH.DEBRIS_SPREAD,
      vy: -(SMASH.DEBRIS_UP * (0.35 + Math.random() * 0.65)),
      life: SMASH.DEBRIS_LIFE * (0.7 + Math.random() * 0.6),
      maxLife: SMASH.DEBRIS_LIFE * 1.3,
      size: SMASH.DEBRIS_SIZE_MIN + Math.random() * (SMASH.DEBRIS_SIZE_MAX - SMASH.DEBRIS_SIZE_MIN),
      rot: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 12,
      col: colors[(Math.random() * colors.length) | 0]
    });
  }
}

function rematch() {
  if (!currentLevel) { showMenu(); return; }
  beginRun();
}

// ====================================================================
//  SMOOTH TERRAIN — rolling 16-bit-style ground. The tile grid stays the
//  ONLY collision + level format; this is a pure RENDERING layer. Each
//  connected ground mass is traced as one organic shape: curved top steps
//  (quadratic corners), a grass/moss lip that hugs the curve, rounded free
//  ends, and an earthy gradient body that darkens with depth. Everything
//  static is pre-rendered ONCE into offscreen chunk canvases, so the
//  per-frame cost is just a couple of drawImage calls per viewport.
// ====================================================================
var TERRAIN_STYLE = {
  CHUNK_W:    512,   // px per pre-rendered terrain chunk (built lazily, cached)
  CAP_R:      12,    // corner radius on the free ends of a ground mass
  LIP_RISE:   3,     // max px the grass lip drifts ABOVE the collision line (organic wobble)
  GRASS_DEEP: 26,    // widest grass stroke -> ~13px band under the surface curve
  GRASS_MID:  16,    // mid grass stroke -> ~8px band
  GRASS_RIM:  5,     // crisp lit rim along the very top edge
  SHADOW_DX:  5,     // baked drop-shadow offset (matches the ledge shadow)
  SHADOW_DY:  7,
  SHADOW_A:   0.26,  // baked drop-shadow opacity
  EDGE_A:     0.22,  // soft inner shading around the mass edges (rounds the form)
  DEPTH_A:    0.30   // extra darkening toward the bottom of a mass
};

// Deterministic per-column lip wobble (0..LIP_RISE px) so flat runs of tiles
// read as gently rolling turf instead of a ruler line. Purely visual and only
// ever ABOVE the collision top, so feet never float.
function lipRise(c) { return Math.floor(hash01(c * 977 + 13) * (TERRAIN_STYLE.LIP_RISE + 1)); }

// Analyse the grid into (a) smooth ground strips and (b) leftover thin
// platform runs for the classic ledge renderer. A "span" is a maximal
// vertical run of solid cells in one column; spans in adjacent columns that
// overlap vertically are stitched into one horizontal "strip" (a ground
// mass). Strips that are ever 2+ cells thick, or that touch the bottom row,
// become smooth terrain; everything else stays a classic floating ledge.
function computeTerrain(lv) {
  var c, r, i;
  var spansByCol = new Array(lv.cols);
  for (c = 0; c < lv.cols; c++) {
    var list = [];
    r = 0;
    while (r < ROWS) {
      if (!isSolidCode(lv.grid[r].charAt(c))) { r++; continue; }
      var top = r;
      while (r + 1 < ROWS && isSolidCode(lv.grid[r + 1].charAt(c))) r++;
      list.push({ top: top, bot: r, used: false });
      r++;
    }
    spansByCol[c] = list;
  }
  var strips = [];
  for (c = 0; c < lv.cols; c++) {
    for (i = 0; i < spansByCol[c].length; i++) {
      var s = spansByCol[c][i];
      if (s.used) continue;
      s.used = true;
      var strip = { c0: c, cols: [{ top: s.top, bot: s.bot }] };
      var cur = s, cc = c;
      while (cc + 1 < lv.cols) {
        var best = null, bestOv = 0;
        var next = spansByCol[cc + 1];
        for (var j = 0; j < next.length; j++) {
          var t = next[j];
          if (t.used) continue;
          var ov = Math.min(cur.bot, t.bot) - Math.max(cur.top, t.top) + 1;
          if (ov > bestOv) { bestOv = ov; best = t; }
        }
        if (!best) break;
        best.used = true;
        strip.cols.push({ top: best.top, bot: best.bot });
        cur = best; cc++;
      }
      strips.push(strip);
    }
  }
  var groundStrips = [], thickCells = {};
  for (i = 0; i < strips.length; i++) {
    var st = strips[i], thick = false;
    for (var k = 0; k < st.cols.length; k++) {
      if (st.cols[k].bot - st.cols[k].top >= 1 || st.cols[k].bot === ROWS - 1) { thick = true; break; }
    }
    if (!thick) continue;
    st.x0 = st.c0 * TILE;
    st.x1 = (st.c0 + st.cols.length) * TILE;
    groundStrips.push(st);
    for (var k2 = 0; k2 < st.cols.length; k2++) {
      for (var rr = st.cols[k2].top; rr <= st.cols[k2].bot; rr++) {
        thickCells[(st.c0 + k2) + '_' + rr] = 1;
      }
    }
  }
  // Ledge runs not swallowed by a ground mass keep the classic renderer.
  // (A run never straddles a strip boundary, so testing one cell suffices.)
  var runs = computeLedgeRuns(lv);
  var platRuns = [];
  for (i = 0; i < runs.length; i++) {
    if (!thickCells[runs[i].c0 + '_' + runs[i].r]) platRuns.push(runs[i]);
  }
  return { strips: groundStrips, platformRuns: platRuns };
}

// Trace the smoothed TOP surface of a strip (left cap -> right cap) into a
// Path2D. Steps between neighbouring column heights become soft S-curves;
// the same formula smooths the 1-3px lip wobble into rolling turf.
function traceStripTop(p, st, ty) {
  var R = TERRAIN_STYLE.CAP_R;
  var n = st.cols.length;
  p.moveTo(st.x0, ty[0] + R);
  p.quadraticCurveTo(st.x0, ty[0], st.x0 + R, ty[0]);
  for (var i = 0; i < n - 1; i++) {
    var dy = ty[i + 1] - ty[i];
    if (dy === 0) continue;
    var xb = st.x0 + (i + 1) * TILE;
    var rr = Math.min(14, 4 + Math.abs(dy) * 0.5);
    p.lineTo(xb - rr, ty[i]);
    p.quadraticCurveTo(xb, ty[i], xb, ty[i] + dy / 2);
    p.quadraticCurveTo(xb, ty[i + 1], xb + rr, ty[i + 1]);
  }
  p.lineTo(st.x1 - R, ty[n - 1]);
}

// Full closed outline of a ground mass: smoothed top, rounded end caps,
// stepped-and-rounded bottom profile back to the start.
function buildStripBody(st, ty, by) {
  var R = TERRAIN_STYLE.CAP_R;
  var n = st.cols.length;
  var p = new Path2D();
  traceStripTop(p, st, ty);
  p.quadraticCurveTo(st.x1, ty[n - 1], st.x1, ty[n - 1] + R);
  p.lineTo(st.x1, by[n - 1] - R);
  p.quadraticCurveTo(st.x1, by[n - 1], st.x1 - R, by[n - 1]);
  for (var i = n - 1; i > 0; i--) {
    var dy = by[i - 1] - by[i];
    if (dy === 0) continue;
    var xb = st.x0 + i * TILE;
    var rr = Math.min(14, 4 + Math.abs(dy) * 0.5);
    p.lineTo(xb + rr, by[i]);
    p.quadraticCurveTo(xb, by[i], xb, by[i] + dy / 2);
    p.quadraticCurveTo(xb, by[i - 1], xb - rr, by[i - 1]);
  }
  p.lineTo(st.x0 + R, by[0]);
  p.quadraticCurveTo(st.x0, by[0], st.x0, by[0] - R);
  p.closePath();
  return p;
}

// Paint one ground mass into a chunk context. clipX0/clipX1 bound the
// per-pixel detail loops (texture/tufts/blades) to the chunk being built so
// a huge strip never costs more than the visible slice.
function paintGroundStrip(g, st, P, clipX0, clipX1) {
  var n = st.cols.length, i;
  var ty = new Array(n), by = new Array(n);
  var minTop = Infinity, maxBot = -Infinity;
  for (i = 0; i < n; i++) {
    ty[i] = st.cols[i].top * TILE - lipRise(st.c0 + i);
    by[i] = (st.cols[i].bot + 1) * TILE;
    if (ty[i] < minTop) minTop = ty[i];
    if (by[i] > maxBot) maxBot = by[i];
  }
  var body = buildStripBody(st, ty, by);
  var topPath = new Path2D();
  traceStripTop(topPath, st, ty);
  function colAt(x) { return Math.min(n - 1, Math.max(0, Math.floor((x - st.x0) / TILE))); }

  // Baked soft drop shadow under the whole mass (layered-depth cue).
  g.save();
  g.translate(TERRAIN_STYLE.SHADOW_DX, TERRAIN_STYLE.SHADOW_DY);
  g.globalAlpha = TERRAIN_STYLE.SHADOW_A;
  g.fillStyle = '#000';
  g.fill(body);
  g.restore();

  // Earthy gradient body: lit near the surface, darker with depth.
  var bg = g.createLinearGradient(0, minTop, 0, maxBot);
  bg.addColorStop(0, P.bodyHi);
  bg.addColorStop(0.35, P.body);
  bg.addColorStop(1, P.bodyDk);
  g.fillStyle = bg;
  g.fill(body);

  g.save();
  g.clip(body);
