<!DOCTYPE html>
<html>
<head>
<title>Art System Test</title>
<style>
* { margin: 0; padding: 0; }
body { background: #1a1c2c; color: #cfc6b8; font-family: monospace; padding: 20px; }
h2 { margin: 10px 0 5px; font-size: 14px; color: #f4b41b; }
canvas { image-rendering: pixelated; border: 1px solid #333; margin: 4px; cursor: pointer; }
.row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
#info { font-size: 12px; margin-bottom: 10px; }
button { background: #2a2c3c; color: #cfc6b8; border: 1px solid #555; padding: 6px 12px; font-family: monospace; cursor: pointer; margin: 2px; }
button:hover { background: #3a3c4c; }
</style>
</head>
<body>
<h2>Tasern Art System Test</h2>
<div id="info">Loading art assets...</div>
<div>
  <button onclick="showTitleScreens()">Title Screens</button>
  <button onclick="showBossSplashes()">Boss Splashes</button>
  <button onclick="showVictoryScreens()">Victory Screens</button>
  <button onclick="showGameOverScreens()">Game Over Screens</button>
  <button onclick="showPortraits()">Portraits</button>
</div>
<div id="content"></div>

<script src="../tasern-art.js"></script>
<script>
var A = window.TasernArt;
var loaded = 0, total = 0;

function preloadAll(cb) {
  var lists = [
    { cat: 'backgrounds', names: A.BACKGROUNDS, loader: A.loadBg },
    { cat: 'enemies', names: A.ENEMIES, loader: A.loadEnemy },
    { cat: 'baselings', names: A.BASELINGS, loader: A.loadBaseling }
  ];
  lists.forEach(function(l) {
    l.names.forEach(function(n) {
      total++;
      l.loader(n, function() {
        loaded++;
        document.getElementById('info').textContent = 'Loaded ' + loaded + '/' + total + ' assets';
        if (loaded >= total && cb) { cb(); cb = null; }
      });
    });
  });
}

function makeCanvas(w, h) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.style.width = (w * 1.2) + 'px';
  return c;
}

function showTitleScreens() {
  var el = document.getElementById('content');
  el.innerHTML = '<h2>Title Screens (each with different background + baseling)</h2><div class="row" id="row"></div>';
  var row = document.getElementById('row');
  for (var i = 0; i < A.BACKGROUNDS.length; i++) {
    var c = makeCanvas(480, 270);
    var ctx = c.getContext('2d');
    A.drawTitleScreen(ctx, {
      bg: A.BACKGROUNDS[i],
      title: 'GAME TITLE ' + (i+1),
      subtitle: 'A Baseling Adventure',
      baseling: A.BASELINGS[i % A.BASELINGS.length]
    });
    row.appendChild(c);
  }
}

function showBossSplashes() {
  var el = document.getElementById('content');
  el.innerHTML = '<h2>Boss Splash Screens</h2><div class="row" id="row"></div>';
  var row = document.getElementById('row');
  for (var i = 0; i < A.ENEMIES.length; i++) {
    for (var p = 0; p <= 10; p += 5) {
      var c = makeCanvas(480, 270);
      var ctx = c.getContext('2d');
      A.drawBossSplash(ctx, {
        enemy: A.ENEMIES[i],
        name: A.ENEMIES[i].toUpperCase() + ' LORD',
        bg: A.BACKGROUNDS[i % A.BACKGROUNDS.length],
        progress: p / 10
      });
      row.appendChild(c);
    }
  }
}

function showVictoryScreens() {
  var el = document.getElementById('content');
  el.innerHTML = '<h2>Victory Screens</h2><div class="row" id="row"></div>';
  var row = document.getElementById('row');
  for (var i = 0; i < 6; i++) {
    var c = makeCanvas(480, 270);
    var ctx = c.getContext('2d');
    A.drawVictoryScreen(ctx, {
      baseling: A.BASELINGS[i * 4],
      score: Math.floor(Math.random() * 50000),
      title: i % 2 === 0 ? 'VICTORY!' : 'STAGE CLEAR'
    });
    row.appendChild(c);
  }
}

function showGameOverScreens() {
  var el = document.getElementById('content');
  el.innerHTML = '<h2>Game Over Screens</h2><div class="row" id="row"></div>';
  var row = document.getElementById('row');
  for (var i = 0; i < A.ENEMIES.length; i++) {
    var c = makeCanvas(480, 270);
    var ctx = c.getContext('2d');
    A.drawGameOverScreen(ctx, {
      enemy: A.ENEMIES[i],
      score: Math.floor(Math.random() * 30000)
    });
    row.appendChild(c);
  }
  // One without enemy
  var c2 = makeCanvas(480, 270);
  var ctx2 = c2.getContext('2d');
  A.drawGameOverScreen(ctx2, { score: 12345 });
  row.appendChild(c2);
}

function showPortraits() {
  var el = document.getElementById('content');
  el.innerHTML = '<h2>All Baseling Portraits</h2><div class="row" id="row"></div><h2>Enemy Portraits</h2><div class="row" id="row2"></div>';
  var row = document.getElementById('row');
  A.BASELINGS.forEach(function(name) {
    var c = makeCanvas(80, 80);
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1c2c';
    ctx.fillRect(0, 0, 80, 80);
    var img = A.getImg('art/baselings/baby-' + name + '.png');
    if (img) A.drawPortrait(ctx, img, 40, 40, 35, '#a855f7');
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, 40, 78);
    row.appendChild(c);
  });
  var row2 = document.getElementById('row2');
  A.ENEMIES.forEach(function(name) {
    var c = makeCanvas(120, 120);
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#1a1c2c';
    ctx.fillRect(0, 0, 120, 120);
    var img = A.getImg('art/enemies/enemy-' + name + '.jpg');
    if (img) A.drawPortrait(ctx, img, 60, 55, 50, '#e6482e');
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(name, 60, 115);
    row2.appendChild(c);
  });
}

preloadAll(function() {
  document.getElementById('info').textContent = 'All ' + total + ' assets loaded. Click a button to preview.';
  showTitleScreens();
});
</script>
</body>
</html>
