<!DOCTYPE html>
<html>
<head>
<title>Theme Engine Test</title>
<style>
* { margin: 0; padding: 0; }
body { background: #1a1c2c; display: flex; justify-content: center; padding: 20px; }
canvas { image-rendering: pixelated; border: 1px solid #333; }
#info { color: #cfc6b8; font-family: monospace; font-size: 12px; position: fixed; top: 10px; left: 10px; }
</style>
</head>
<body>
<div id="info">Loading theme...</div>
<canvas id="gc" width="512" height="384"></canvas>
<script>
// Minimal TAS stub for testing
var TAS = { ctx: document.getElementById('gc').getContext('2d') };
</script>
<script src="../tasern-theme.js"></script>
<script>
var ctx = document.getElementById('gc').getContext('2d');
ctx.imageSmoothingEnabled = false;

TasernTheme.load('dungeon.json', function(ok) {
  document.getElementById('info').textContent = ok ? 'Theme loaded! Drawing test...' : 'FAILED to load theme';
  if (!ok) return;

  var S = 2; // 2x scale (32px tiles)
  var tw = 16 * S;

  // Clear
  var pal = TasernTheme.getPalette();
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0, 0, 512, 384);

  // Draw sky row
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, 512, 200);

  // Draw ground fill
  TasernTheme.fill(ctx, 'ground', 0, 288, 16, 3, S);

  // Draw ground top edge
  for (var i = 0; i < 16; i++) {
    TasernTheme.tile(ctx, 'ground_top', i * tw, 256, S);
  }

  // Platforms
  TasernTheme.platform(ctx, 64, 192, 4, S);
  TasernTheme.platform(ctx, 256, 160, 3, S);
  TasernTheme.platform(ctx, 384, 128, 2, S);

  // Wall column
  TasernTheme.wallColumn(ctx, 0, 128, 4, S);
  TasernTheme.wallColumn(ctx, 480, 128, 4, S);

  // Trees
  TasernTheme.tile(ctx, 'tree', 160, 224, S);
  TasernTheme.tile(ctx, 'tree', 320, 224, S);
  TasernTheme.tile(ctx, 'bush', 192, 224, S);

  // Decorations
  TasernTheme.tile(ctx, 'crate', 96, 224, S);
  TasernTheme.tile(ctx, 'door', 224, 224, S);
  TasernTheme.tile(ctx, 'ladder', 128, 192, S);

  // Sprites
  var sprites = ['player', 'enemy_small', 'enemy_medium', 'enemy_large', 'npc'];
  for (var si = 0; si < sprites.length; si++) {
    TasernTheme.sprite(ctx, sprites[si], 64 + si * 48, 80, S);
    // Label
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sprites[si], 64 + si * 48 + 16, 76);
  }

  // Items row
  var items = ['coin', 'gem', 'heart', 'key', 'potion', 'sword', 'shield', 'bow', 'bomb', 'flag', 'chest', 'skull', 'crown', 'star'];
  for (var ii = 0; ii < items.length; ii++) {
    TasernTheme.sprite(ctx, items[ii], 16 + ii * 34, 32, S);
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(items[ii], 16 + ii * 34 + 16, 28);
  }

  // Brick fill
  TasernTheme.fill(ctx, 'brick', 352, 192, 2, 2, S);
  TasernTheme.fill(ctx, 'stone', 416, 192, 2, 2, S);

  // Show all tile categories
  var cats = TasernTheme.categories();
  document.getElementById('info').textContent = 'Theme: ' + TasernTheme.getName() + ' | Categories: ' + cats.join(', ') + ' | Sprites: ' + TasernTheme.spriteNames().join(', ');
});
</script>
<script src="/track.js" defer></script></body>
</html>
