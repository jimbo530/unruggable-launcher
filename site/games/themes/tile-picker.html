<!DOCTYPE html>
<html>
<head>
<title>Tile Picker — Kenney 1-Bit Pack</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1c2c; color: #fff; font-family: monospace; padding: 10px; }
h2 { margin-bottom: 8px; font-size: 14px; }
#controls { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
#controls label { font-size: 12px; }
#controls select, #controls input { background: #2a2c3c; color: #fff; border: 1px solid #555; padding: 4px; font-family: monospace; }
#sheetWrap { position: relative; overflow: auto; max-height: 70vh; border: 1px solid #333; }
#sheetCanvas { cursor: crosshair; image-rendering: pixelated; }
#info { position: fixed; bottom: 0; left: 0; right: 0; background: #2a2c3c; padding: 8px 12px; font-size: 13px; border-top: 1px solid #555; display: flex; gap: 20px; align-items: center; }
#preview { width: 64px; height: 64px; image-rendering: pixelated; border: 1px solid #555; background: #000; }
#selected { display: flex; gap: 4px; flex-wrap: wrap; max-width: 60%; }
.sel-tile { width: 20px; height: 20px; image-rendering: pixelated; border: 1px solid #555; cursor: pointer; }
.sel-tile:hover { border-color: #ff0; }
#output { background: #111; color: #0f0; padding: 8px; font-size: 11px; white-space: pre; max-height: 120px; overflow: auto; margin-top: 8px; border: 1px solid #333; }
#catName { width: 120px; }
.highlight { outline: 2px solid #ff0; outline-offset: -1px; position: absolute; pointer-events: none; }
</style>
</head>
<body>
<h2>Tile Picker — Click tiles to build theme categories</h2>
<div id="controls">
  <label>Sheet: <select id="sheetSelect">
    <option value="kenney-1bit/colored-transparent.png">Kenney 1-Bit (colored)</option>
    <option value="kenney-1bit/monochrome-transparent.png">Kenney 1-Bit (mono)</option>
  </select></label>
  <label>Zoom: <select id="zoom">
    <option value="2">2x</option>
    <option value="3" selected>3x</option>
    <option value="4">4x</option>
  </select></label>
  <label>Category: <input type="text" id="catName" placeholder="ground" /></label>
  <button onclick="addToCategory()">Add Selected</button>
  <button onclick="clearCategory()">Clear Category</button>
  <button onclick="exportJSON()">Export JSON</button>
  <label>Type: <select id="catType"><option value="tiles">tiles</option><option value="sprites">sprites</option></select></label>
</div>

<div id="sheetWrap">
  <canvas id="sheetCanvas"></canvas>
</div>

<div id="info">
  <canvas id="preview" width="64" height="64"></canvas>
  <div>
    <div id="tileInfo">Hover over a tile</div>
    <div id="selected"></div>
  </div>
  <div style="flex:1"><div id="output">// Theme categories will appear here</div></div>
</div>

<script>
var TILE_W = 16, TILE_H = 16, SPACING = 1, COLS = 49, ROWS = 22;
var sheet = null, sheetCanvas, sheetCtx, zoom = 3;
var hoverId = -1, selectedIds = [];
var categories = {}; // name -> [ids]
var spritesDef = {}; // name -> { frames: [ids] }

var sc = document.getElementById('sheetCanvas');
var sctx = sc.getContext('2d');
var previewCtx = document.getElementById('preview').getContext('2d');

function loadSheet(src) {
  var img = new Image();
  img.onload = function() {
    sheet = img;
    drawSheet();
  };
  img.src = src;
}

function drawSheet() {
  if (!sheet) return;
  zoom = parseInt(document.getElementById('zoom').value);
  var tw = TILE_W * zoom, th = TILE_H * zoom, sp = SPACING * zoom;
  sc.width = COLS * (tw + sp);
  sc.height = ROWS * (th + sp);
  sctx.imageSmoothingEnabled = false;
  sctx.fillStyle = '#1a1c2c';
  sctx.fillRect(0, 0, sc.width, sc.height);
  sctx.drawImage(sheet, 0, 0, sc.width, sc.height);

  // Draw grid lines
  sctx.strokeStyle = 'rgba(255,255,255,0.08)';
  sctx.lineWidth = 1;
  for (var r = 0; r <= ROWS; r++) {
    var y = r * (th + sp) - sp/2;
    sctx.beginPath(); sctx.moveTo(0, y); sctx.lineTo(sc.width, y); sctx.stroke();
  }
  for (var c = 0; c <= COLS; c++) {
    var x = c * (tw + sp) - sp/2;
    sctx.beginPath(); sctx.moveTo(x, 0); sctx.lineTo(x, sc.height); sctx.stroke();
  }

  // Highlight selected tiles
  sctx.strokeStyle = '#ff0';
  sctx.lineWidth = 2;
  for (var i = 0; i < selectedIds.length; i++) {
    var id = selectedIds[i];
    var col = id % COLS, row = Math.floor(id / COLS);
    sctx.strokeRect(col * (tw + sp), row * (th + sp), tw, th);
  }
}

sc.addEventListener('mousemove', function(e) {
  if (!sheet) return;
  var rect = sc.getBoundingClientRect();
  var mx = (e.clientX - rect.left) / rect.width * sc.width;
  var my = (e.clientY - rect.top) / rect.height * sc.height;
  var tw = TILE_W * zoom + SPACING * zoom;
  var col = Math.floor(mx / tw);
  var row = Math.floor(my / tw);
  if (col >= COLS || row >= ROWS) return;
  hoverId = row * COLS + col;

  document.getElementById('tileInfo').textContent =
    'Tile #' + hoverId + '  (row:' + row + ' col:' + col + ')';

  // Preview
  var sx = col * (TILE_W + SPACING);
  var sy = row * (TILE_H + SPACING);
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.fillStyle = '#000';
  previewCtx.fillRect(0, 0, 64, 64);
  previewCtx.drawImage(sheet, sx, sy, TILE_W, TILE_H, 0, 0, 64, 64);
});

sc.addEventListener('click', function(e) {
  if (hoverId < 0) return;
  var idx = selectedIds.indexOf(hoverId);
  if (idx >= 0) {
    selectedIds.splice(idx, 1);
  } else {
    selectedIds.push(hoverId);
  }
  drawSheet();
  updateSelected();
});

function updateSelected() {
  var el = document.getElementById('selected');
  el.innerHTML = '';
  for (var i = 0; i < selectedIds.length; i++) {
    var id = selectedIds[i];
    var col = id % COLS, row = Math.floor(id / COLS);
    var sx = col * (TILE_W + SPACING);
    var sy = row * (TILE_H + SPACING);
    var c = document.createElement('canvas');
    c.className = 'sel-tile';
    c.width = 16; c.height = 16;
    c.title = 'Tile #' + id;
    var ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(sheet, sx, sy, TILE_W, TILE_H, 0, 0, 16, 16);
    c.onclick = (function(tid) { return function() {
      selectedIds.splice(selectedIds.indexOf(tid), 1);
      drawSheet(); updateSelected();
    };})(id);
    el.appendChild(c);
  }
}

function addToCategory() {
  if (selectedIds.length === 0) return;
  var name = document.getElementById('catName').value.trim();
  if (!name) { alert('Enter a category name'); return; }
  var type = document.getElementById('catType').value;

  if (type === 'sprites') {
    spritesDef[name] = { frames: selectedIds.slice() };
  } else {
    if (!categories[name]) categories[name] = [];
    for (var i = 0; i < selectedIds.length; i++) {
      if (categories[name].indexOf(selectedIds[i]) < 0) {
        categories[name].push(selectedIds[i]);
      }
    }
  }
  selectedIds = [];
  drawSheet();
  updateSelected();
  updateOutput();
}

function clearCategory() {
  var name = document.getElementById('catName').value.trim();
  if (name) {
    delete categories[name];
    delete spritesDef[name];
  }
  updateOutput();
}

function updateOutput() {
  var out = '"tiles": {\n';
  var cats = Object.keys(categories);
  for (var i = 0; i < cats.length; i++) {
    out += '  "' + cats[i] + '": [' + categories[cats[i]].join(', ') + ']';
    if (i < cats.length - 1 || Object.keys(spritesDef).length > 0) out += ',';
    out += '\n';
  }
  out += '},\n"sprites": {\n';
  var snames = Object.keys(spritesDef);
  for (var j = 0; j < snames.length; j++) {
    var s = spritesDef[snames[j]];
    out += '  "' + snames[j] + '": { "frames": [' + s.frames.join(', ') + '] }';
    if (j < snames.length - 1) out += ',';
    out += '\n';
  }
  out += '}';
  document.getElementById('output').textContent = out;
}

function exportJSON() {
  var theme = {
    name: prompt('Theme name:', 'my-theme') || 'my-theme',
    sheet: document.getElementById('sheetSelect').value,
    monoSheet: 'kenney-1bit/monochrome-transparent.png',
    tileW: 16, tileH: 16, spacing: 1, cols: 49,
    palette: { bg: '#1a1c2c', primary: '#5d275d', secondary: '#b13e53', accent: '#ef7d57' },
    tiles: categories,
    sprites: spritesDef
  };
  var blob = new Blob([JSON.stringify(theme, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = theme.name + '.json';
  a.click();
}

document.getElementById('sheetSelect').onchange = function() { loadSheet(this.value); };
document.getElementById('zoom').onchange = drawSheet;

loadSheet('kenney-1bit/colored-transparent.png');
</script>
</body>
</html>
