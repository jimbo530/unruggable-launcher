<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTRPG Notepad - Homebrew & Play</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100%; background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
.app { max-width: 800px; margin: 0 auto; padding: 12px; padding-bottom: 60px; }
.header { text-align: center; padding: 16px 0 8px; }
.header h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: #8b5cf6; }
.header p { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #555; margin-top: 4px; }

/* Top bar */
.topbar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0; }
.topbar button {
  padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(139,92,246,0.25);
  background: rgba(139,92,246,0.06); color: #a78bfa; font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
}
.topbar button:hover { background: rgba(139,92,246,0.15); }
.topbar button.active { background: rgba(139,92,246,0.2); border-color: #8b5cf6; }
.topbar button.danger:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); }
.topbar button.gold { color: #f59e0b; border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); }
.topbar button.gold:hover { background: rgba(245,158,11,0.15); }
.topbar button.green { color: #22c55e; border-color: rgba(34,197,94,0.25); background: rgba(34,197,94,0.06); }
.topbar button.green:hover { background: rgba(34,197,94,0.15); }

/* Game name */
.game-name-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
.game-name-input {
  flex: 1; height: 36px; border-radius: 8px; border: 1px solid rgba(139,92,246,0.2);
  background: rgba(139,92,246,0.04); color: #c4b5fd; font-size: 0.9rem; font-weight: 700;
  padding: 0 12px; outline: none;
}
.game-name-input:focus { border-color: #8b5cf6; }
.game-name-input::placeholder { color: rgba(139,92,246,0.3); }

/* Tabs */
.tabs { display: flex; gap: 4px; margin: 8px 0; overflow-x: auto; padding-bottom: 4px; }
.tab {
  padding: 8px 16px; border-radius: 8px 8px 0 0; border: 1px solid rgba(100,100,100,0.15);
  border-bottom: none; background: rgba(100,100,100,0.04); color: #666; font-size: 0.7rem;
  font-weight: 700; letter-spacing: 0.06em; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.tab:hover { color: #aaa; background: rgba(100,100,100,0.08); }
.tab.active { color: #c4b5fd; background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.2); }
.tab .close-tab {
  font-size: 0.8rem; color: #555; cursor: pointer; width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center; border-radius: 3px;
}
.tab .close-tab:hover { color: #ef4444; background: rgba(239,68,68,0.1); }
.add-tab {
  padding: 8px 12px; border-radius: 8px 8px 0 0; border: 1px dashed rgba(100,100,100,0.2);
  border-bottom: none; background: none; color: #444; font-size: 0.9rem; cursor: pointer;
}
.add-tab:hover { color: #8b5cf6; border-color: rgba(139,92,246,0.3); }

/* Editor */
.editor {
  width: 100%; min-height: 400px; border-radius: 0 8px 8px 8px; border: 1px solid rgba(100,100,100,0.15);
  background: rgba(20,20,30,0.8); color: #ddd; font-size: 0.85rem; line-height: 1.6;
  padding: 16px; outline: none; resize: vertical; font-family: 'Segoe UI', system-ui, sans-serif;
}
.editor:focus { border-color: rgba(139,92,246,0.3); }
.editor::placeholder { color: #444; }

/* Dice widget inline */
.dice-widget { display: flex; gap: 4px; margin: 10px 0; flex-wrap: wrap; align-items: center; }
.dice-widget button {
  width: 40px; height: 36px; border-radius: 8px; border: 1px solid rgba(245,158,11,0.25);
  background: rgba(245,158,11,0.06); color: #f59e0b; font-size: 0.7rem; font-weight: 900;
  cursor: pointer; transition: all 0.12s;
}
.dice-widget button:hover { background: rgba(245,158,11,0.15); transform: scale(1.05); }
.dice-result-inline {
  padding: 4px 10px; border-radius: 6px; background: rgba(245,158,11,0.1);
  color: #f59e0b; font-weight: 700; font-size: 0.85rem; min-width: 40px; text-align: center;
}

/* Templates list */
.templates-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
.template-card {
  padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(100,100,100,0.15);
  background: rgba(100,100,100,0.04); cursor: pointer; transition: all 0.15s;
}
.template-card:hover { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.2); }
.template-card .name { font-weight: 700; color: #c4b5fd; font-size: 0.85rem; }
.template-card .desc { color: #666; font-size: 0.7rem; margin-top: 2px; }
.template-card .meta { color: #444; font-size: 0.6rem; margin-top: 4px; }
.template-actions { display: flex; gap: 6px; margin-top: 6px; }
.template-actions button {
  padding: 3px 10px; border-radius: 5px; border: 1px solid rgba(100,100,100,0.2);
  background: none; color: #666; font-size: 0.6rem; cursor: pointer;
}
.template-actions button:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); }
.template-actions button.share:hover { color: #f59e0b; border-color: rgba(245,158,11,0.3); }

/* Modal */
.modal-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-bg.show { display: flex; }
.modal {
  background: #1a1a2e; border: 1px solid rgba(139,92,246,0.3); border-radius: 16px;
  padding: 24px; max-width: 450px; width: 90%;
}
.modal h3 { color: #c4b5fd; font-size: 0.9rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
.modal input, .modal textarea {
  width: 100%; border-radius: 8px; border: 1px solid rgba(139,92,246,0.2);
  background: rgba(139,92,246,0.04); color: #ddd; padding: 8px 12px; outline: none;
  font-size: 0.8rem; margin-bottom: 8px; font-family: inherit;
}
.modal textarea { min-height: 60px; resize: vertical; }
.modal input:focus, .modal textarea:focus { border-color: #8b5cf6; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 12px; }
.modal .btn-row button {
  flex: 1; padding: 10px; border-radius: 8px; font-weight: 700; font-size: 0.75rem;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none;
}
.modal .btn-save { background: rgba(139,92,246,0.2); color: #c4b5fd; }
.modal .btn-save:hover { background: rgba(139,92,246,0.35); }
.modal .btn-cancel { background: rgba(100,100,100,0.1); color: #888; }
.modal .btn-cancel:hover { background: rgba(100,100,100,0.2); }

/* Share banner */
.share-banner {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 10px; background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3); color: #22c55e; font-size: 0.75rem; font-weight: 700;
  z-index: 200; display: none; letter-spacing: 0.06em;
}
.share-banner.show { display: block; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* View toggle */
.view-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; margin: 8px 0 4px; }

#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>TTRPG Notepad</h1>
    <p>Homebrew, play, share</p>
  </div>

  <!-- Main view: editor -->
  <div id="editor-view">
    <div class="game-name-row">
      <input type="text" class="game-name-input" id="game-name" placeholder="Untitled Game" maxlength="60">
    </div>

    <div class="topbar">
      <button onclick="saveAsTemplate()" class="gold">Save Template</button>
      <button onclick="showTemplates()">Load Template</button>
      <button onclick="shareGame()" class="green">Share</button>
      <button onclick="importFromUrl()">Import URL</button>
      <button onclick="newGame()" class="danger">New</button>
    </div>

    <!-- Inline dice -->
    <div class="dice-widget">
      <button onclick="quickRoll(4)">d4</button>
      <button onclick="quickRoll(6)">d6</button>
      <button onclick="quickRoll(8)">d8</button>
      <button onclick="quickRoll(10)">d10</button>
      <button onclick="quickRoll(12)">d12</button>
      <button onclick="quickRoll(20)">d20</button>
      <button onclick="quickRoll(100)">d%</button>
      <span class="dice-result-inline" id="dice-result">-</span>
    </div>

    <div class="tabs" id="tabs-bar"></div>

    <textarea class="editor" id="editor" placeholder="Start writing your notes, rules, character sheets..."></textarea>
  </div>

  <!-- Templates view -->
  <div id="templates-view" style="display:none;">
    <div class="topbar">
      <button onclick="hideTemplates()" class="active">Back to Editor</button>
    </div>
    <div class="view-label">Saved Templates</div>
    <div class="templates-list" id="templates-list"></div>
    <div id="no-templates" style="text-align:center;color:#444;font-size:0.75rem;padding:40px;">
      No templates saved yet. Write something and hit "Save Template"!
    </div>
  </div>
</div>

<!-- Save template modal -->
<div class="modal-bg" id="save-modal">
  <div class="modal">
    <h3>Save as Template</h3>
    <input type="text" id="tpl-name" placeholder="Template name" maxlength="60">
    <textarea id="tpl-desc" placeholder="Short description (optional)" maxlength="200"></textarea>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeSaveModal()">Cancel</button>
      <button class="btn-save" onclick="confirmSaveTemplate()">Save</button>
    </div>
  </div>
</div>

<!-- Share banner -->
<div class="share-banner" id="share-banner">Link copied to clipboard!</div>

<a id="back-link" href="/games">Back to Games</a>

<script>
(function() {
"use strict";

// ============================================================
// STATE
// ============================================================
let currentGame = {
  name: '',
  tabs: [
    { name: 'Rules', content: '' },
    { name: 'Characters', content: '' },
    { name: 'Session Notes', content: '' },
  ],
  activeTab: 0,
};
let templates = [];

const STORAGE_KEY = 'ttrpg-notepad-game';
const TEMPLATES_KEY = 'ttrpg-notepad-templates';

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRollSound(sides, value) {
  try {
    const ctx = getAudio();
    const freq = 200 + (value / sides) * 600;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) { console.warn('Audio error:', e); }
}

// ============================================================
// DICE
// ============================================================
window.quickRoll = function(sides) {
  const value = Math.floor(Math.random() * sides) + 1;
  const el = document.getElementById('dice-result');
  el.textContent = value;
  el.style.transition = 'none';
  el.style.transform = 'scale(1.3)';
  setTimeout(() => { el.style.transition = 'transform 0.2s'; el.style.transform = 'scale(1)'; }, 50);

  if (value === sides) el.style.color = '#22c55e';
  else if (value === 1) el.style.color = '#ef4444';
  else el.style.color = '#f59e0b';

  playRollSound(sides, value);

  // Insert roll result into editor at cursor
  const editor = document.getElementById('editor');
  const pos = editor.selectionStart;
  const text = editor.value;
  const rollText = `[d${sides}: ${value}]`;
  // Don't auto-insert, just show result - user can paste if they want
};

// ============================================================
// TABS
// ============================================================
function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  let html = '';
  currentGame.tabs.forEach((tab, i) => {
    html += `<div class="tab ${i === currentGame.activeTab ? 'active' : ''}" onclick="switchTab(${i})">
      <span>${tab.name}</span>
      ${currentGame.tabs.length > 1 ? `<span class="close-tab" onclick="event.stopPropagation();removeTab(${i})">x</span>` : ''}
    </div>`;
  });
  html += `<button class="add-tab" onclick="addTab()">+</button>`;
  bar.innerHTML = html;
}

window.switchTab = function(idx) {
  // Save current tab content
  currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
  currentGame.activeTab = idx;
  document.getElementById('editor').value = currentGame.tabs[idx].content;
  renderTabs();
  autoSave();
};

window.addTab = function() {
  const name = prompt('Tab name:');
  if (!name) return;
  currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
  currentGame.tabs.push({ name: name.slice(0, 30), content: '' });
  currentGame.activeTab = currentGame.tabs.length - 1;
  document.getElementById('editor').value = '';
  renderTabs();
  autoSave();
};

window.removeTab = function(idx) {
  if (currentGame.tabs.length <= 1) return;
  currentGame.tabs.splice(idx, 1);
  if (currentGame.activeTab >= currentGame.tabs.length) currentGame.activeTab = currentGame.tabs.length - 1;
  document.getElementById('editor').value = currentGame.tabs[currentGame.activeTab].content;
  renderTabs();
  autoSave();
};

// ============================================================
// AUTO-SAVE
// ============================================================
let saveTimer = null;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
    currentGame.name = document.getElementById('game-name').value;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(currentGame)); }
    catch(e) { console.warn('Failed to save:', e); }
  }, 500);
}

function loadGame() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) {
      currentGame = JSON.parse(data);
      if (!currentGame.tabs || !currentGame.tabs.length) {
        currentGame.tabs = [{ name: 'Notes', content: '' }];
        currentGame.activeTab = 0;
      }
    }
  } catch(e) { console.warn('Failed to load:', e); }
  document.getElementById('game-name').value = currentGame.name || '';
  document.getElementById('editor').value = currentGame.tabs[currentGame.activeTab].content || '';
  renderTabs();
}

document.getElementById('editor').addEventListener('input', autoSave);
document.getElementById('game-name').addEventListener('input', autoSave);

// ============================================================
// NEW GAME
// ============================================================
window.newGame = function() {
  if (!confirm('Start a new game? Current unsaved work will be lost.')) return;
  currentGame = {
    name: '',
    tabs: [
      { name: 'Rules', content: '' },
      { name: 'Characters', content: '' },
      { name: 'Session Notes', content: '' },
    ],
    activeTab: 0,
  };
  document.getElementById('game-name').value = '';
  document.getElementById('editor').value = '';
  renderTabs();
  autoSave();
};

// ============================================================
// TEMPLATES
// ============================================================
function loadTemplates() {
  try {
    const data = localStorage.getItem(TEMPLATES_KEY);
    if (data) templates = JSON.parse(data);
  } catch(e) { console.warn('Failed to load templates:', e); }
}

function saveTemplates() {
  try { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates)); }
  catch(e) { console.warn('Failed to save templates:', e); }
}

window.saveAsTemplate = function() {
  // Save current content first
  currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
  currentGame.name = document.getElementById('game-name').value;
  document.getElementById('tpl-name').value = currentGame.name || '';
  document.getElementById('tpl-desc').value = '';
  document.getElementById('save-modal').classList.add('show');
};

window.closeSaveModal = function() {
  document.getElementById('save-modal').classList.remove('show');
};

window.confirmSaveTemplate = function() {
  const name = document.getElementById('tpl-name').value.trim();
  if (!name) { alert('Please enter a template name.'); return; }
  const desc = document.getElementById('tpl-desc').value.trim();
  currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
  const tpl = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name,
    description: desc,
    tabs: JSON.parse(JSON.stringify(currentGame.tabs)),
    created: Date.now(),
  };
  templates.unshift(tpl);
  saveTemplates();
  closeSaveModal();
  showBanner('Template saved!');
};

window.showTemplates = function() {
  document.getElementById('editor-view').style.display = 'none';
  document.getElementById('templates-view').style.display = 'block';
  renderTemplatesList();
};

window.hideTemplates = function() {
  document.getElementById('editor-view').style.display = 'block';
  document.getElementById('templates-view').style.display = 'none';
};

function renderTemplatesList() {
  const list = document.getElementById('templates-list');
  const noTpl = document.getElementById('no-templates');
  if (templates.length === 0) {
    list.innerHTML = '';
    noTpl.style.display = 'block';
    return;
  }
  noTpl.style.display = 'none';
  list.innerHTML = templates.map((t, i) => {
    const date = new Date(t.created).toLocaleDateString();
    const tabNames = t.tabs.map(tab => tab.name).join(', ');
    return `<div class="template-card">
      <div class="name">${escHtml(t.name)}</div>
      ${t.description ? `<div class="desc">${escHtml(t.description)}</div>` : ''}
      <div class="meta">${tabNames} &middot; ${date}</div>
      <div class="template-actions">
        <button onclick="loadTemplate(${i})">Load</button>
        <button class="share" onclick="shareTemplate(${i})">Share Link</button>
        <button onclick="deleteTemplate(${i})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

window.loadTemplate = function(idx) {
  const tpl = templates[idx];
  if (!tpl) return;
  if (!confirm('Load template "' + tpl.name + '"? This will replace your current game.')) return;
  currentGame = {
    name: tpl.name,
    tabs: JSON.parse(JSON.stringify(tpl.tabs)),
    activeTab: 0,
  };
  document.getElementById('game-name').value = currentGame.name;
  document.getElementById('editor').value = currentGame.tabs[0].content;
  renderTabs();
  autoSave();
  hideTemplates();
};

window.deleteTemplate = function(idx) {
  if (!confirm('Delete this template?')) return;
  templates.splice(idx, 1);
  saveTemplates();
  renderTemplatesList();
};

// ============================================================
// SHARING via URL hash (compressed JSON)
// ============================================================
window.shareGame = function() {
  currentGame.tabs[currentGame.activeTab].content = document.getElementById('editor').value;
  currentGame.name = document.getElementById('game-name').value;
  const payload = {
    n: currentGame.name,
    t: currentGame.tabs.map(t => ({ n: t.name, c: t.content })),
  };
  const json = JSON.stringify(payload);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  const url = location.origin + location.pathname + '#' + encoded;

  if (url.length > 8000) {
    alert('Game is too large to share via URL. Try reducing content or use Save Template for local storage.');
    return;
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showBanner('Share link copied!'))
      .catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
};

window.shareTemplate = function(idx) {
  const tpl = templates[idx];
  if (!tpl) return;
  const payload = {
    n: tpl.name,
    t: tpl.tabs.map(t => ({ n: t.name, c: t.content })),
  };
  const json = JSON.stringify(payload);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  const url = location.origin + location.pathname + '#' + encoded;

  if (url.length > 8000) {
    alert('Template is too large to share via URL.');
    return;
  }

  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => showBanner('Template share link copied!'))
      .catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
};

window.importFromUrl = function() {
  const url = prompt('Paste a shared TTRPG Notepad URL:');
  if (!url) return;
  const hashIdx = url.indexOf('#');
  if (hashIdx === -1) { alert('No game data found in URL.'); return; }
  const encoded = url.slice(hashIdx + 1);
  loadFromHash(encoded);
};

function loadFromHash(encoded) {
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    const payload = JSON.parse(json);
    if (!payload.t || !payload.t.length) throw new Error('Invalid template data');

    const gameName = payload.n || 'Imported Game';
    if (!confirm('Load shared game "' + gameName + '"? This will replace your current game.')) return;

    currentGame = {
      name: gameName,
      tabs: payload.t.map(t => ({ name: t.n || 'Tab', content: t.c || '' })),
      activeTab: 0,
    };
    document.getElementById('game-name').value = currentGame.name;
    document.getElementById('editor').value = currentGame.tabs[0].content;
    renderTabs();
    autoSave();
    showBanner('Game loaded from shared link!');
  } catch(e) {
    console.warn('Failed to load from URL:', e);
    alert('Could not parse game data from URL.');
  }
}

function checkUrlHash() {
  if (location.hash && location.hash.length > 1) {
    loadFromHash(location.hash.slice(1));
    history.replaceState(null, '', location.pathname); // clean URL
  }
}

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showBanner('Link copied!');
}

function showBanner(msg) {
  const banner = document.getElementById('share-banner');
  banner.textContent = msg;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 2500);
}

// ============================================================
// INIT
// ============================================================
loadTemplates();
