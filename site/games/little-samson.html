<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Little Samson</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) { console.error('NftLoader stat load failed:', e); }

// Derived stat helpers
function strMult() { return 1 + (statB.str - 10) * 0.05; }
function dexMult() { return 1 + (statB.dex - 10) * 0.04; }
function conMult() { return 1 + (statB.con - 10) * 0.06; }
function intMult() { return 1 + (statB.int - 10) * 0.04; }
function wisMult() { return 1 / (1 + (statB.wis - 10) * 0.03); }
function chaMult() { return 1 + (statB.cha - 10) * 0.05; }
function bonusLives() { return statB.lives + Math.floor(statB.con / 20); }
function bonusHp() { return Math.floor(statB.hpMult * conMult() * 1); }

var GW = 480, GH = 320;
var TS = 16;
var COLS = 80, ROWS = 20;
var ctx = TAS.ctx;

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'SWAP' } });

// === CHARACTER DEFINITIONS ===
var CHARS = { SAMSON: 0, KIKIRA: 1, GAMM: 2, KO: 3 };
var CHAR_NAMES = ['Samson', 'Kikira', 'Gamm', 'K.O.'];
var CHAR_COLORS = ['#8b6914', '#cc3322', '#5577aa', '#ddaaff'];
var CHAR_DATA = [
  { w: 12, h: 16, speed: 130, jumpPow: 280, maxHp: 6, attack: 2, climbWall: true, climbCeil: false, fly: false, spikeWalk: false, projType: 'arc' },
  { w: 14, h: 14, speed: 120, jumpPow: 250, maxHp: 5, attack: 3, climbWall: false, climbCeil: false, fly: true, spikeWalk: false, projType: 'fire' },
  { w: 16, h: 18, speed: 80, jumpPow: 200, maxHp: 12, attack: 5, climbWall: false, climbCeil: false, fly: false, spikeWalk: true, projType: 'punch' },
  { w: 8, h: 10, speed: 170, jumpPow: 340, maxHp: 3, attack: 1, climbWall: true, climbCeil: true, fly: false, spikeWalk: false, projType: 'bomb' }
];

// === ZONE THEME DATA ===
var ZONE_THEMES = [
  { name: 'Earthen Path',      bg1: '#0d1a0d', bg2: '#142014', tileTint: [60, 70, 50], spikeColor: '#884422', skyParticle: '#336633', music: 'forest' },
  { name: 'Dragon Peaks',      bg1: '#1a0d0d', bg2: '#201410', tileTint: [70, 55, 45], spikeColor: '#cc4422', skyParticle: '#cc6633', music: 'fire' },
  { name: 'Iron Depths',       bg1: '#0d0d14', bg2: '#101420', tileTint: [50, 55, 70], spikeColor: '#667788', skyParticle: '#4466aa', music: 'cave' },
  { name: 'Shadow Gauntlet',   bg1: '#14081a', bg2: '#1a0e20', tileTint: [55, 40, 65], spikeColor: '#884488', skyParticle: '#9944cc', music: 'dark' },
  { name: 'Corruption Marsh',  bg1: '#0a140a', bg2: '#0e1a10', tileTint: [45, 65, 45], spikeColor: '#448844', skyParticle: '#44aa44', music: 'swamp' },
  { name: 'Fungal Citadel',    bg1: '#140a14', bg2: '#1a0e1a', tileTint: [65, 45, 65], spikeColor: '#aa44aa', skyParticle: '#cc66cc', music: 'fungal' },
  { name: 'Chaos Tunnels',     bg1: '#14140a', bg2: '#1a1a0e', tileTint: [65, 60, 40], spikeColor: '#aaaa44', skyParticle: '#cccc44', music: 'chaos' },
  { name: 'Dark Throne',       bg1: '#0a0a14', bg2: '#0e0e1a', tileTint: [40, 40, 55], spikeColor: '#4444aa', skyParticle: '#6644cc', music: 'throne' },
  { name: 'Ashen Wastes',      bg1: '#121210', bg2: '#181816', tileTint: [58, 56, 50], spikeColor: '#aa6633', skyParticle: '#886644', music: 'waste' },
  { name: 'Crystal Abyss',     bg1: '#08101a', bg2: '#0c1620', tileTint: [40, 60, 75], spikeColor: '#44aacc', skyParticle: '#66ccff', music: 'crystal' }
];

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('littlesamson_hi');
var continues = 3;
var stage = 0;
var bossMode = false;
var showTutorial = true;
var tutorialTimer = 0;
var scorePopups = [];

// Characters HP (separate)
var charHp = [6, 5, 12, 3];
var charAlive = [true, true, true, true];
var activeChar = CHARS.SAMSON;
var switchCooldown = 0;

// Player state
var P = { x: 32, y: 200, vx: 0, vy: 0, onGround: false, facing: 1, animT: 0, clinging: false, clingDir: 0, onCeiling: false, flyMeter: 100, flyMax: 100, attackTimer: 0, invincTimer: 0, deathTimer: 0 };

// Camera
var camX = 0, camY = 0;

// Level
var tiles = [];
var enemies = [];
var pickups = [];
var projectiles = [];
var hazards = [];
var boss = null;
var levelEnd = 0;
var bells = 0;
var stageProgress = 0;

// Transitions
var transTimer = 0;
var transType = '';

// GRAVITY — STR slightly resists gravity on heavy hits
var GRAVITY = 650;
var MAX_FALL = 400;

// Combo tracking for INT score multiplier
var comboCount = 0;
var comboTimer = 0;

// === TILE TYPES ===
var T_EMPTY = 0, T_SOLID = 1, T_SPIKE = 2, T_PLATFORM = 3, T_LADDER = 4, T_CEILING = 5, T_ICE = 6, T_CRUMBLE = 7;

// Crumble tile timers
var crumbleTiles = [];

// === SCORE POPUPS ===
function spawnPopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, vy: -40 });
}

function updatePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.life -= dt;
    p.y += p.vy * dt;
    p.vy *= 0.95;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawPopups() {
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = '#000';
    ctx.fillText(p.text, p.x - camX + 1, p.y - camY + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x - camX, p.y - camY);
  }
  ctx.globalAlpha = 1;
}

// === LEVEL GENERATION ===
function generateLevel(stg) {
  tiles = [];
  enemies = [];
  pickups = [];
  projectiles = [];
  hazards = [];
  crumbleTiles = [];
  boss = null;
  bells = 0;
  scorePopups = [];
  comboCount = 0;
  comboTimer = 0;

  var seed = stg * 7919 + 13;
  function rng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed >> 16) / 32768; }

  for (var r = 0; r < ROWS; r++) {
    tiles[r] = [];
    for (var c = 0; c < COLS; c++) {
      tiles[r][c] = T_EMPTY;
    }
  }

  // Floor
  for (var c = 0; c < COLS; c++) {
    tiles[ROWS - 1][c] = T_SOLID;
    tiles[ROWS - 2][c] = T_SOLID;
  }
  // Ceiling
  for (var c = 0; c < COLS; c++) {
    tiles[0][c] = T_SOLID;
    tiles[1][c] = T_SOLID;
  }

  // Stage-specific generation
  if (stg < 4) {
    generateIntroStage(stg, rng);
  } else {
    generateCombinedStage(stg, rng);
  }

  // Place pickups — CHA increases rare drops
  var pickupCount = 8 + stg * 2;
  for (var i = 0; i < pickupCount; i++) {
    var px = Math.floor(rng() * (COLS - 10)) + 5;
    var py = findGround(px) - 1;
    if (py > 2 && py < ROWS - 3) {
      var roll = rng();
      var chaBonus = chaMult();
      var type = 'bell';
      if (roll < 0.08 * chaBonus) type = 'shield';
      else if (roll < 0.15 * chaBonus) type = 'powerup';
      else if (roll < 0.25) type = 'health';
      else if (roll < 0.35 * chaBonus) type = 'star';
      pickups.push({ x: px * TS + 4, y: py * TS + 4, type: type, collected: false, bobOffset: rng() * 6.28 });
    }
  }

  // Place hazards — falling rocks, poison clouds, lava geysers
  if (stg >= 2) {
    var hazardCount = 3 + Math.floor(stg * 1.5);
    for (var i = 0; i < hazardCount; i++) {
      var hx = Math.floor(rng() * (COLS - 12)) + 6;
      var hType = ['falling_rock', 'poison_cloud', 'lava_geyser'][Math.floor(rng() * 3)];
      hazards.push({ x: hx * TS, y: 2 * TS, type: hType, timer: rng() * 3 + 1, interval: 2.5 + rng() * 2, active: false, animT: 0 });
    }
  }

  // Place crumble tiles in later stages
  if (stg >= 3) {
    for (var i = 0; i < 6 + stg; i++) {
      var cx = Math.floor(rng() * (COLS - 10)) + 5;
      var cy = findGround(cx);
      if (cy > 3 && cy < ROWS - 3) {
        tiles[cy][cx] = T_CRUMBLE;
        crumbleTiles.push({ col: cx, row: cy, timer: -1, shaking: false });
      }
    }
  }

  // Place ice tiles in cold zones
  if (stg === 6 || stg === 9) {
    for (var c = 4; c < COLS - 4; c++) {
      if (rng() < 0.3 && tiles[ROWS - 3][c] === T_EMPTY) {
        var gr = findGround(c);
        if (gr > 2 && gr < ROWS - 2) tiles[gr][c] = T_ICE;
      }
    }
  }

  levelEnd = (COLS - 3) * TS;

  // Boss on every 5th level (stages 4, 9, 14, ...) and old boss stages
  if ((stg + 1) % 5 === 0 || stg === 3 || stg === 7) {
    bossMode = true;
    boss = createBoss(stg);
  } else {
    bossMode = false;
  }
}

function findGround(col) {
  for (var r = 2; r < ROWS - 2; r++) {
    if (tiles[r][col] === T_SOLID || tiles[r][col] === T_ICE) return r - 1;
  }
  return ROWS - 3;
}

function generateIntroStage(stg, rng) {
  for (var r = 0; r < ROWS; r++) {
    tiles[r][0] = T_SOLID;
    tiles[r][COLS - 1] = T_SOLID;
  }

  if (stg === 0) {
    // SAMSON: wall climbing focus
    generatePlatforms(rng, 12, 3);
    for (var i = 0; i < 5; i++) {
      var wx = Math.floor(rng() * 50) + 10;
      var wh = Math.floor(rng() * 6) + 5;
      for (var r = ROWS - 3 - wh; r < ROWS - 2; r++) {
        if (r >= 2) tiles[r][wx] = T_SOLID;
      }
    }
    generateEnemies(rng, 6, stg);
  } else if (stg === 1) {
    // KIKIRA: flying sections with gaps
    generatePlatforms(rng, 6, 2);
    for (var i = 0; i < 4; i++) {
      var gapStart = 12 + i * 15;
      var gapLen = 5 + Math.floor(rng() * 4);
      for (var c = gapStart; c < gapStart + gapLen && c < COLS - 2; c++) {
        tiles[ROWS - 1][c] = T_SPIKE;
        tiles[ROWS - 2][c] = T_EMPTY;
      }
    }
    generateEnemies(rng, 5, stg);
  } else if (stg === 2) {
    // GAMM: spike floors, heavy enemies
    generatePlatforms(rng, 8, 2);
    for (var i = 0; i < 6; i++) {
      var sx = 8 + Math.floor(rng() * 60);
      var slen = 3 + Math.floor(rng() * 5);
      for (var c = sx; c < sx + slen && c < COLS - 2; c++) {
        tiles[ROWS - 2][c] = T_SPIKE;
      }
    }
    generateEnemies(rng, 8, stg);
  } else {
    // K.O.: ceiling routes, narrow passages
    generatePlatforms(rng, 10, 4);
    for (var i = 0; i < 8; i++) {
      var cx = 8 + Math.floor(rng() * 55);
      var clen = 4 + Math.floor(rng() * 8);
      for (var c = cx; c < cx + clen && c < COLS - 2; c++) {
        tiles[2][c] = T_CEILING;
        tiles[3][c] = T_EMPTY;
      }
    }
    for (var i = 0; i < 3; i++) {
      var nx = 15 + i * 20;
      for (var c = nx; c < nx + 6 && c < COLS - 2; c++) {
        for (var r = 4; r < ROWS - 5; r++) {
          if (r < ROWS - 5) tiles[r][c] = T_SOLID;
        }
        tiles[ROWS - 4][c] = T_EMPTY;
        tiles[ROWS - 3][c] = T_EMPTY;
      }
    }
    generateEnemies(rng, 7, stg);
  }
}

function generateCombinedStage(stg, rng) {
  for (var r = 0; r < ROWS; r++) {
    tiles[r][0] = T_SOLID;
    tiles[r][COLS - 1] = T_SOLID;
  }

  var sectionWidth = Math.floor(COLS / 5);
  for (var s = 0; s < 5; s++) {
    var sx = s * sectionWidth + 2;
    var ex = (s + 1) * sectionWidth - 2;
    var sType = (s + stg) % 4;

    if (sType === 0) {
      for (var i = 0; i < 3; i++) {
        var wx = sx + Math.floor(rng() * (ex - sx));
        for (var r = 4; r < ROWS - 2; r++) tiles[r][wx] = T_SOLID;
      }
      for (var c = sx; c < ex; c += 3) {
        if (rng() < 0.4) tiles[4][c] = T_PLATFORM;
      }
    } else if (sType === 1) {
      for (var c = sx; c < ex; c++) tiles[ROWS - 2][c] = T_SPIKE;
      for (var i = 0; i < 4; i++) {
        var px = sx + Math.floor(rng() * (ex - sx));
        var py = 6 + Math.floor(rng() * 6);
        tiles[py][px] = T_PLATFORM;
        if (px + 1 < COLS) tiles[py][px + 1] = T_PLATFORM;
      }
    } else if (sType === 2) {
      for (var c = sx; c < ex; c++) tiles[ROWS - 2][c] = T_SPIKE;
      for (var c = sx + 2; c < ex - 2; c += 4) {
        if (rng() < 0.5) tiles[ROWS - 6][c] = T_PLATFORM;
      }
    } else {
      for (var c = sx; c < ex; c++) {
        tiles[2][c] = T_CEILING;
        tiles[ROWS - 2][c] = T_SPIKE;
      }
      for (var r = 5; r < ROWS - 4; r++) {
        tiles[r][sx + 2] = T_SOLID;
        tiles[r][ex - 2] = T_SOLID;
      }
      tiles[ROWS - 4][sx + 2] = T_EMPTY;
      tiles[ROWS - 3][sx + 2] = T_EMPTY;
      tiles[ROWS - 4][ex - 2] = T_EMPTY;
      tiles[ROWS - 3][ex - 2] = T_EMPTY;
    }
  }

  generatePlatforms(rng, 6 + stg, 2);
  generateEnemies(rng, 8 + stg * 2, stg);
}

function generatePlatforms(rng, count, maxHeight) {
  for (var i = 0; i < count; i++) {
    var px = Math.floor(rng() * (COLS - 8)) + 4;
    var py = ROWS - 4 - Math.floor(rng() * (ROWS - 8));
    var plen = 2 + Math.floor(rng() * 4);
    if (py > 2 && py < ROWS - 3) {
      for (var c = px; c < px + plen && c < COLS - 2; c++) {
        tiles[py][c] = T_PLATFORM;
      }
    }
  }
}

function generateEnemies(rng, count, stg) {
  var types = ['walker', 'flyer', 'shooter', 'heavy', 'fungi', 'spore_bomber', 'shadow_bat', 'vine_crawler', 'crystal_golem', 'poison_toad'];
  var maxType = Math.min(types.length, 3 + Math.floor(stg * 0.8));
  for (var i = 0; i < count; i++) {
    var ex = Math.floor(rng() * (COLS - 12)) + 8;
    var ey = findGround(ex);
    if (ey < 3) ey = ROWS - 4;
    var et = types[Math.floor(rng() * maxType)];
    var hp = getEnemyHp(et, stg);
    var ew = et === 'heavy' || et === 'crystal_golem' ? 18 : et === 'shadow_bat' ? 12 : 14;
    var eh = et === 'heavy' || et === 'crystal_golem' ? 18 : et === 'shadow_bat' ? 10 : 14;
    enemies.push({
      x: ex * TS, y: (ey - 1) * TS,
      vx: (rng() < 0.5 ? -1 : 1) * (30 + rng() * 20),
      vy: 0,
      w: ew, h: eh,
      type: et,
      hp: hp, maxHp: hp,
      animT: rng() * 100,
      shootTimer: 60 + Math.floor(rng() * 60),
      alive: true,
      startX: ex * TS,
      patrol: 40 + rng() * 60,
      flashTimer: 0,
      dropRoll: rng()
    });
  }
}

function getEnemyHp(type, stg) {
  var base = { walker: 2, flyer: 2, shooter: 3, heavy: 8, fungi: 4, spore_bomber: 5, shadow_bat: 2, vine_crawler: 6, crystal_golem: 10, poison_toad: 4 };
  return (base[type] || 2) + Math.floor(stg * 0.5);
}

function getEnemyScore(type) {
  var scores = { walker: 50, flyer: 60, shooter: 80, heavy: 150, fungi: 70, spore_bomber: 100, shadow_bat: 60, vine_crawler: 90, crystal_golem: 200, poison_toad: 75 };
  return scores[type] || 50;
}

function createBoss(stg) {
  var bossTypes = ['shadow_knight', 'corruption_lord', 'fungal_queen', 'crystal_titan', 'void_serpent'];
  var bType = bossTypes[Math.min(Math.floor(stg / 2), bossTypes.length - 1)];
  var baseHp = 30 + stg * 10;
  return {
    x: (COLS - 8) * TS, y: (ROWS - 7) * TS,
    vx: 0, vy: 0,
    w: 40, h: 48,
    hp: baseHp, maxHp: baseHp,
    phase: 0, timer: 0, attackTimer: 0,
    type: bType,
    alive: true,
    weakness: stg < 4 ? (stg % 4) : -1,
    projectiles: [],
    invincTimer: 0,
    enrageTimer: 0,
    spawnTimer: 0,
    patternIdx: 0
  };
}

// === PLAYER LOGIC ===
function resetPlayer() {
  P.x = 40;
  P.y = (ROWS - 4) * TS;
  P.vx = 0; P.vy = 0;
  P.onGround = false;
  P.clinging = false; P.clingDir = 0;
  P.onCeiling = false;
  P.flyMeter = 100;
  P.attackTimer = 0;
  P.invincTimer = 0;
  P.deathTimer = 0;
  camX = 0; camY = 0;
}

function startGame() {
  state = 'playing';
  score = 0;
  continues = 3 + bonusLives();
  stage = 0;
  for (var i = 0; i < 4; i++) {
    charHp[i] = Math.floor(CHAR_DATA[i].maxHp * conMult()) + bonusHp();
  }
  charAlive = [true, true, true, true];
  activeChar = CHARS.SAMSON;
  stageProgress = 0;
  loadStageProgress();
  if (showTutorial) tutorialTimer = 6;
  startStage(stage);
}

function startStage(stg) {
  generateLevel(stg);
  resetPlayer();
  if (stg < 4) {
    activeChar = stg;
    if (!charAlive[stg]) {
      charHp[stg] = Math.floor(CHAR_DATA[stg].maxHp * conMult());
      charAlive[stg] = true;
    }
  }
  transTimer = 60;
  transType = 'stageStart';
}

function getCharData() { return CHAR_DATA[activeChar]; }
function getZone() { return ZONE_THEMES[stage % ZONE_THEMES.length]; }

// === COLLISION ===
function tileAt(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return T_SOLID;
  return tiles[row][col];
}

function isSolid(col, row) {
  var t = tileAt(col, row);
  return t === T_SOLID || t === T_ICE || t === T_CRUMBLE;
}

function isSpike(col, row) { return tileAt(col, row) === T_SPIKE; }
function isPlatform(col, row) { return tileAt(col, row) === T_PLATFORM; }
function isCeiling(col, row) { return tileAt(col, row) === T_CEILING; }
function isIce(col, row) { return tileAt(col, row) === T_ICE; }

function collideX(x, y, w, h, dir) {
  var top = Math.floor(y / TS);
  var bot = Math.floor((y + h - 1) / TS);
  var col = dir > 0 ? Math.floor((x + w) / TS) : Math.floor(x / TS);
  for (var r = top; r <= bot; r++) {
    if (isSolid(col, r)) return true;
  }
  return false;
}

function collideY(x, y, w, h, dir) {
  var left = Math.floor(x / TS);
  var right = Math.floor((x + w - 1) / TS);
  var row = dir > 0 ? Math.floor((y + h) / TS) : Math.floor(y / TS);
  for (var c = left; c <= right; c++) {
    if (isSolid(c, row)) return true;
    if (dir > 0 && isPlatform(c, row)) return true;
  }
  return false;
}

function onSpikes(x, y, w, h) {
  var left = Math.floor(x / TS);
  var right = Math.floor((x + w - 1) / TS);
  var bot = Math.floor((y + h) / TS);
  for (var c = left; c <= right; c++) {
    if (isSpike(c, bot)) return true;
  }
  return false;
}

function canClingWall(x, y, w, h, dir) {
  var cd = getCharData();
  if (!cd.climbWall) return false;
  var col = dir > 0 ? Math.floor((x + w + 1) / TS) : Math.floor((x - 1) / TS);
  var top = Math.floor(y / TS);
  var bot = Math.floor((y + h - 1) / TS);
  for (var r = top; r <= bot; r++) {
    if (isSolid(col, r)) return true;
  }
  return false;
}

function canClingCeiling(x, y, w) {
  var cd = getCharData();
  if (!cd.climbCeil) return false;
  var left = Math.floor(x / TS);
  var right = Math.floor((x + w - 1) / TS);
  var row = Math.floor((y - 1) / TS);
  for (var c = left; c <= right; c++) {
    if (isSolid(c, row) || isCeiling(c, row)) return true;
  }
  return false;
}

function checkCrumbleTiles() {
  var cd = getCharData();
  var left = Math.floor(P.x / TS);
  var right = Math.floor((P.x + cd.w - 1) / TS);
  var bot = Math.floor((P.y + cd.h) / TS);
  for (var c = left; c <= right; c++) {
    if (tileAt(c, bot) === T_CRUMBLE) {
      for (var j = 0; j < crumbleTiles.length; j++) {
        if (crumbleTiles[j].col === c && crumbleTiles[j].row === bot && crumbleTiles[j].timer < 0) {
          crumbleTiles[j].timer = 0.5;
          crumbleTiles[j].shaking = true;
        }
      }
    }
  }
}

function updateCrumbleTiles(dt) {
  for (var i = 0; i < crumbleTiles.length; i++) {
    var ct = crumbleTiles[i];
    if (ct.timer >= 0) {
      ct.timer -= dt;
      if (ct.timer <= 0) {
        tiles[ct.row][ct.col] = T_EMPTY;
        TAS.particles.spawn(ct.col * TS + 8, ct.row * TS + 8, '#887766', 6, 3, { gravity: 3 });
        ct.timer = -999;
      }
    }
  }
}

// === INPUT ===
var prevKeys = {};
function justPressed(key) {
  return (TAS.input.keys[key] && !prevKeys[key]);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updatePopups(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'stageSelect') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startStage(stage);
      state = 'playing';
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial countdown
  if (tutorialTimer > 0) {
    tutorialTimer -= dt;
    if (tutorialTimer <= 0) showTutorial = false;
  }

  // Transition timers
  if (transTimer > 0) {
    transTimer--;
    return;
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  var cd = getCharData();
  var inp = TAS.input;
  var left = inp.keys['ArrowLeft'] || inp.keys['KeyA'] || inp.touch.left;
  var right = inp.keys['ArrowRight'] || inp.keys['KeyD'] || inp.touch.right;
  var up = inp.keys['ArrowUp'] || inp.keys['KeyW'] || inp.touch.up;
  var down = inp.keys['ArrowDown'] || inp.keys['KeyS'] || inp.touch.down;
  var jumpBtn = inp.keys['Space'] || inp.keys['KeyZ'] || inp.touch.a;
  var swapBtn = justPressed('KeyX') || justPressed('ShiftLeft') || justPressed('ShiftRight') || inp.touch.b;

  // Switch character
  if (switchCooldown > 0) switchCooldown--;
  if (swapBtn && switchCooldown <= 0 && stage >= 4) {
    switchCharacter();
    switchCooldown = 15;
  }

  // Death
  if (P.deathTimer > 0) {
    P.deathTimer -= dt;
    if (P.deathTimer <= 0) respawnOrGameOver();
    return;
  }

  // Invincibility
  if (P.invincTimer > 0) P.invincTimer -= dt;

  // Attack cooldown — WIS reduces cooldown
  if (P.attackTimer > 0) P.attackTimer -= dt;

  // Movement — DEX scales speed
  P.animT += dt;
  var speed = cd.speed * dexMult();

  // Check for ice under player
  var onIce = false;
  var footRow = Math.floor((P.y + cd.h) / TS);
  var footCol = Math.floor((P.x + cd.w / 2) / TS);
  if (footRow < ROWS && isIce(footCol, footRow)) onIce = true;

  if (P.clinging) {
    P.vy = 0;
    if (up) { P.vy = -speed * 0.7; P.y += P.vy * dt; }
    if (down) { P.vy = speed * 0.5; P.y += P.vy * dt; }
    if (jumpBtn && !prevKeys['Space'] && !prevKeys['KeyZ']) {
      P.clinging = false;
      P.vx = -P.clingDir * speed * 1.2;
      P.vy = -cd.jumpPow * 0.8;
      TAS.audio.playTone(400, 0.08, 'square', 0.06);
    }
    if ((P.clingDir > 0 && left) || (P.clingDir < 0 && right)) P.clinging = false;
    if (!canClingWall(P.x, P.y, cd.w, cd.h, P.clingDir)) P.clinging = false;
  } else if (P.onCeiling) {
    P.vy = 0; P.vx = 0;
    if (left) { P.x -= speed * dt; P.facing = -1; }
    if (right) { P.x += speed * dt; P.facing = 1; }
    if (down || (jumpBtn && !prevKeys['Space'] && !prevKeys['KeyZ'])) {
      P.onCeiling = false;
      P.vy = 50;
    }
    if (!canClingCeiling(P.x, P.y, cd.w)) P.onCeiling = false;
  } else {
    // Normal movement with ice slide
    if (onIce) {
      // Ice: momentum-based
      var targetVx = 0;
      if (left) { targetVx = -speed; P.facing = -1; }
      if (right) { targetVx = speed; P.facing = 1; }
      P.vx += (targetVx - P.vx) * 2 * dt;
    } else {
      P.vx = 0;
      if (left) { P.vx = -speed; P.facing = -1; }
      if (right) { P.vx = speed; P.facing = 1; }
    }

    // Jump
    if (jumpBtn && P.onGround && !prevKeys['Space'] && !prevKeys['KeyZ']) {
      P.vy = -cd.jumpPow;
      P.onGround = false;
      TAS.audio.playTone(350, 0.08, 'square', 0.05);
    }

    // Flight (Kikira)
    if (cd.fly && jumpBtn && !P.onGround && P.flyMeter > 0) {
      P.vy = Math.max(P.vy - 600 * dt, -180);
      P.flyMeter -= 40 * dt;
      if (frame % 8 === 0) {
        TAS.particles.spawn(P.x + cd.w / 2, P.y + cd.h, '#ff8800', 2, 1, { gravity: 1, size: 2 });
      }
    }
    if (P.onGround) P.flyMeter = Math.min(P.flyMeter + 50 * dt, cd.flyMax || 100);

    // Gravity
    P.vy += GRAVITY * dt;
    if (P.vy > MAX_FALL) P.vy = MAX_FALL;

    // Horizontal movement + collision
    var nx = P.x + P.vx * dt;
    if (P.vx > 0 && collideX(nx, P.y, cd.w, cd.h, 1)) {
      nx = Math.floor((nx + cd.w) / TS) * TS - cd.w;
      P.vx = 0;
      if (cd.climbWall && !P.onGround) { P.clinging = true; P.clingDir = 1; }
    } else if (P.vx < 0 && collideX(nx, P.y, cd.w, cd.h, -1)) {
      nx = (Math.floor(nx / TS) + 1) * TS;
      P.vx = 0;
      if (cd.climbWall && !P.onGround) { P.clinging = true; P.clingDir = -1; }
    }
    P.x = nx;

    // Vertical movement + collision
    var ny = P.y + P.vy * dt;
    if (P.vy > 0) {
      if (collideY(P.x, ny, cd.w, cd.h, 1)) {
        ny = Math.floor((ny + cd.h) / TS) * TS - cd.h;
        P.vy = 0;
        P.onGround = true;
      } else {
        P.onGround = false;
      }
    } else if (P.vy < 0) {
      if (collideY(P.x, ny, cd.w, cd.h, -1)) {
        ny = (Math.floor(ny / TS) + 1) * TS;
        P.vy = 0;
        if (cd.climbCeil) P.onCeiling = true;
      }
    }
    P.y = ny;
  }

  // Check crumble tiles underfoot
  if (P.onGround) checkCrumbleTiles();
  updateCrumbleTiles(dt);

  // Spike damage
  if (onSpikes(P.x, P.y, cd.w, cd.h) && !cd.spikeWalk) {
    takeDamage(2);
  }

  // Attack — WIS reduces cooldown via wisMult
  var cooldownTime = (cd.projType === 'punch' ? 0.4 : 0.25) * wisMult() * statB.cooldown;
  if ((inp.keys['KeyC'] || (down && P.attackTimer <= 0)) && P.attackTimer <= 0) {
    fireProjectile();
    P.attackTimer = cooldownTime;
  }

  // Bounds
  if (P.x < 0) P.x = 0;
  if (P.y > ROWS * TS) takeDamage(99);

  // Check level end
  if (P.x >= levelEnd && !bossMode) completeStage();

  // Update enemies
  updateEnemies(dt);

  // Update boss
  if (boss && boss.alive) updateBoss(dt);

  // Update projectiles
  updateProjectiles(dt);

  // Update hazards
  updateHazards(dt);

  // Pickup collision
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    if (pk.collected) continue;
    if (TAS.hit.rectOverlap(P.x, P.y, cd.w, cd.h, pk.x, pk.y, 8, 8)) {
      pk.collected = true;
      collectPickup(pk);
    }
  }

  // Camera follow
  var targetCamX = P.x - GW / 2 + cd.w / 2;
  var targetCamY = P.y - GH / 2 + cd.h / 2;
  camX += (targetCamX - camX) * 5 * dt;
  camY += (targetCamY - camY) * 5 * dt;
  camX = TAS.math.clamp(camX, 0, COLS * TS - GW);
  camY = TAS.math.clamp(camY, 0, ROWS * TS - GH);

  // Save prev keys
  prevKeys = {};
  for (var k in inp.keys) prevKeys[k] = inp.keys[k];
}

function collectPickup(pk) {
  var cd = getCharData();
  if (pk.type === 'bell') {
    bells++;
    var bellScore = Math.floor(10 * intMult() * statB.scoreMult);
    score += bellScore;
    spawnPopup(pk.x, pk.y, '+' + bellScore, '#ffdd44');
    if (bells >= 100) {
      bells -= 100;
      charHp[activeChar] = Math.min(charHp[activeChar] + 1, cd.maxHp + 2);
      spawnPopup(pk.x, pk.y - 12, '+1 HP', '#44ff44');
    }
    TAS.audio.playTone(600, 0.06, 'square', 0.04);
  } else if (pk.type === 'health') {
    var heal = Math.floor(2 * conMult());
    charHp[activeChar] = Math.min(charHp[activeChar] + heal, Math.floor(cd.maxHp * conMult()) + bonusHp());
    spawnPopup(pk.x, pk.y, '+' + heal + ' HP', '#44ff44');
    TAS.audio.playTone(800, 0.1, 'sine', 0.06);
    TAS.particles.spawn(pk.x, pk.y, '#44ff44', 6, 2);
  } else if (pk.type === 'shield') {
    P.invincTimer = 3.0 + statB.con * 0.1;
    spawnPopup(pk.x, pk.y, 'SHIELD!', '#44ddff');
    TAS.audio.playTone(900, 0.12, 'sine', 0.06);
    TAS.particles.spawn(pk.x, pk.y, '#44ddff', 10, 3);
  } else if (pk.type === 'powerup') {
    // Temporary STR boost shown as score
    var pwrScore = Math.floor(200 * intMult() * statB.scoreMult);
    score += pwrScore;
    spawnPopup(pk.x, pk.y, 'POWER +' + pwrScore, '#ff44ff');
    TAS.audio.playMelody([[600, 0.08], [800, 0.08], [1000, 0.12]], 80);
    TAS.particles.spawn(pk.x, pk.y, '#ff44ff', 12, 3, { gravity: -1 });
  } else if (pk.type === 'star') {
    var starScore = Math.floor(500 * intMult() * statB.scoreMult);
    score += starScore;
    spawnPopup(pk.x, pk.y, '+' + starScore, '#ffaaff');
    TAS.audio.playMelody([[523, 0.06], [659, 0.06], [784, 0.1]], 100);
    TAS.particles.spawn(pk.x, pk.y, '#ffaaff', 15, 4, { gravity: -2 });
  }
}

function switchCharacter() {
  var start = activeChar;
  for (var i = 1; i <= 4; i++) {
    var next = (start + i) % 4;
    if (charAlive[next]) {
      activeChar = next;
      TAS.audio.playTone(500 + next * 100, 0.08, 'triangle', 0.06);
      TAS.particles.spawn(P.x + 6, P.y + 8, CHAR_COLORS[activeChar], 8, 3);
      return;
    }
  }
}

function takeDamage(amount) {
  if (P.invincTimer > 0 || P.deathTimer > 0) return;
  charHp[activeChar] -= amount;
  TAS.fx.shake(4, 0.85);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.audio.playNoise(0.15, 0.08, 800);

  if (charHp[activeChar] <= 0) {
    charHp[activeChar] = 0;
    charAlive[activeChar] = false;
    TAS.particles.spawn(P.x + 6, P.y + 8, CHAR_COLORS[activeChar], 20, 4, { gravity: 2 });
    var found = false;
    for (var i = 0; i < 4; i++) {
      if (charAlive[i]) { activeChar = i; found = true; break; }
    }
    if (!found) {
      P.deathTimer = 1.5;
    } else {
      P.invincTimer = 1.5;
    }
  } else {
    P.invincTimer = 1.0;
  }
}

function respawnOrGameOver() {
  continues--;
  if (continues < 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('littlesamson_hi', highScore);
    }
    saveStageProgress();
  } else {
    for (var i = 0; i < 4; i++) {
      charHp[i] = Math.floor(CHAR_DATA[i].maxHp * conMult()) + bonusHp();
      charAlive[i] = true;
    }
    activeChar = stage < 4 ? stage : CHARS.SAMSON;
    resetPlayer();
  }
}

function completeStage() {
  var stageScore = Math.floor((500 + stage * 200) * intMult() * statB.scoreMult);
  score += stageScore;
  spawnPopup(P.x, P.y - 20, 'STAGE CLEAR +' + stageScore, '#44ff88');
  stage++;
  stageProgress = Math.max(stageProgress, stage);
  saveStageProgress();

  if (stage >= 10) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('littlesamson_hi', highScore);
    }
    TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]], 150);
  } else {
    for (var i = 0; i < 4; i++) {
      if (charAlive[i]) charHp[i] = Math.min(charHp[i] + 2, Math.floor(CHAR_DATA[i].maxHp * conMult()) + bonusHp());
      else { charAlive[i] = true; charHp[i] = Math.floor(CHAR_DATA[i].maxHp * conMult() / 2); }
    }
    startStage(stage);
    TAS.audio.playTone(700, 0.15, 'sine', 0.06);
  }
}

// === PROJECTILES ===
function fireProjectile() {
  var cd = getCharData();
  var px = P.x + (P.facing > 0 ? cd.w : -4);
  var py = P.y + cd.h / 2 - 3;
  // STR scales damage
  var dmg = Math.floor(cd.attack * strMult() * statB.damage);

  if (cd.projType === 'arc') {
    projectiles.push({ x: px, y: py, vx: P.facing * 200 * dexMult(), vy: -120, w: 6, h: 6, type: 'stone', dmg: dmg, life: 2, owner: 'player' });
    TAS.audio.playTone(200, 0.06, 'square', 0.04);
  } else if (cd.projType === 'fire') {
    projectiles.push({ x: px, y: py, vx: P.facing * 150 * dexMult(), vy: 0, w: 16, h: 8, type: 'fire', dmg: dmg, life: 0.4, owner: 'player' });
    TAS.audio.playNoise(0.1, 0.04, 2000);
  } else if (cd.projType === 'punch') {
    projectiles.push({ x: px + P.facing * 4, y: py - 4, vx: P.facing * 40, vy: 0, w: 14, h: 14, type: 'punch', dmg: dmg, life: 0.15, owner: 'player' });
    TAS.audio.playTone(120, 0.08, 'sawtooth', 0.06);
    TAS.fx.shake(2, 0.9);
  } else if (cd.projType === 'bomb') {
    projectiles.push({ x: px, y: py, vx: P.facing * 100 * dexMult(), vy: -80, w: 5, h: 5, type: 'bomb', dmg: dmg, life: 1.5, owner: 'player', bounces: 2 });
    TAS.audio.playTone(900, 0.04, 'square', 0.03);
  }
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    if (p.type === 'stone' || p.type === 'bomb') p.vy += 400 * dt;

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Bomb bouncing
    if (p.type === 'bomb' && p.bounces > 0) {
      var bRow = Math.floor((p.y + p.h) / TS);
      var bCol = Math.floor(p.x / TS);
      if (bRow < ROWS && isSolid(bCol, bRow)) {
        p.vy = -Math.abs(p.vy) * 0.7;
        p.bounces--;
      }
    }

    if (p.x < camX - 50 || p.x > camX + GW + 50 || p.y > ROWS * TS) {
      projectiles.splice(i, 1); continue;
    }

    var col = Math.floor(p.x / TS);
    var row = Math.floor(p.y / TS);
    if (p.type !== 'bomb' && p.owner === 'player' && isSolid(col, row)) {
      if (p.type === 'fire') TAS.particles.spawn(p.x, p.y, '#ff6600', 4, 2);
      projectiles.splice(i, 1); continue;
    }

    if (p.owner === 'player') {
      for (var j = 0; j < enemies.length; j++) {
        var e = enemies[j];
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, e.x, e.y, e.w, e.h)) {
          e.hp -= p.dmg;
          e.flashTimer = 0.1;
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffff00', 4, 2);
          if (e.hp <= 0) {
            e.alive = false;
            comboCount++;
            comboTimer = 2.0;
            var comboMult = Math.min(comboCount, 10);
            var killScore = Math.floor(getEnemyScore(e.type) * intMult() * statB.scoreMult * (1 + comboMult * 0.1));
            score += killScore;
            var popText = '+' + killScore;
            if (comboCount > 1) popText += ' x' + comboCount;
            spawnPopup(e.x + e.w / 2, e.y, popText, comboCount > 3 ? '#ff44ff' : '#ffdd44');
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 10, 3, { gravity: 2 });
            TAS.audio.playTone(150 + comboCount * 30, 0.12, 'sawtooth', 0.05);
            // CHA drop chance
            if (e.dropRoll < 0.15 * chaMult()) {
              pickups.push({ x: e.x, y: e.y, type: 'health', collected: false, bobOffset: 0 });
            } else if (e.dropRoll < 0.25 * chaMult()) {
              pickups.push({ x: e.x, y: e.y, type: 'bell', collected: false, bobOffset: 0 });
            }
          }
          if (p.type !== 'punch') { projectiles.splice(i, 1); break; }
        }
      }
      // Hit boss
      if (boss && boss.alive && projectiles[i]) {
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, boss.x, boss.y, boss.w, boss.h)) {
          var dmgMult = (boss.weakness === activeChar) ? 2 : 1;
          if (boss.invincTimer <= 0) {
            boss.hp -= p.dmg * dmgMult;
            boss.invincTimer = 0.2;
            TAS.fx.shake(3, 0.88);
            TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffdd00', 6, 3);
            var bossHitScore = Math.floor(25 * intMult() * statB.scoreMult);
            score += bossHitScore;
            spawnPopup(boss.x + boss.w / 2, boss.y, '+' + bossHitScore, '#ffdd00');
          }
          if (boss.hp <= 0) {
            boss.alive = false;
            var bossScore = Math.floor(2000 * intMult() * statB.scoreMult);
            score += bossScore;
            spawnPopup(boss.x + boss.w / 2, boss.y - 20, 'BOSS DEFEATED +' + bossScore, '#ff44ff');
            TAS.fx.flash('#ffffff', 0.6);
            TAS.fx.shake(8, 0.8);
            TAS.audio.playMelody([[400, 0.1], [500, 0.1], [600, 0.1], [800, 0.2]], 100);
            for (var k = 0; k < 30; k++) {
              TAS.particles.spawn(boss.x + Math.random() * boss.w, boss.y + Math.random() * boss.h, ['#ff0000', '#ffaa00', '#ffff00'][k % 3], 3, 4, { gravity: 3 });
            }
            setTimeout(function() { completeStage(); }, 1500);
          }
          if (p.type !== 'punch') { projectiles.splice(i, 1); }
        }
      }
    } else {
      // Enemy projectile hitting player
      var cd = getCharData();
      if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, P.x, P.y, cd.w, cd.h)) {
        takeDamage(p.dmg || 1);
        projectiles.splice(i, 1);
      }
    }
  }
}

// === ENEMIES ===
function updateEnemies(dt) {
  var cd = getCharData();
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    e.animT += dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    if (e.type === 'flyer' || e.type === 'shadow_bat') {
      e.x += e.vx * dt;
      e.y += Math.sin(e.animT * 3) * 40 * dt;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
      // Shadow bats dive at player when close
      if (e.type === 'shadow_bat') {
        var distToPlayer = Math.abs(e.x - P.x) + Math.abs(e.y - P.y);
        if (distToPlayer < 80) {
          e.y += (P.y - e.y) * 2 * dt;
        }
      }
    } else if (e.type === 'shooter') {
      e.x += e.vx * dt * 0.5;
      if (Math.abs(e.x - e.startX) > e.patrol * 0.5) e.vx = -e.vx;
      e.shootTimer -= dt * 60;
      if (e.shootTimer <= 0) {
        e.shootTimer = 90;
        var dx = P.x - e.x;
        var dir = dx > 0 ? 1 : -1;
        projectiles.push({ x: e.x + e.w / 2, y: e.y + e.h / 2, vx: dir * 120, vy: 0, w: 6, h: 6, type: 'enemy', dmg: 1, life: 3, owner: 'enemy' });
      }
    } else if (e.type === 'spore_bomber') {
      e.x += e.vx * dt * 0.6;
      if (Math.abs(e.x - e.startX) > e.patrol * 0.6) e.vx = -e.vx;
      e.shootTimer -= dt * 60;
      if (e.shootTimer <= 0) {
        e.shootTimer = 120;
        // Lob spore projectile upward
        projectiles.push({ x: e.x + e.w / 2, y: e.y, vx: (P.x > e.x ? 1 : -1) * 60, vy: -160, w: 8, h: 8, type: 'spore', dmg: 1, life: 2.5, owner: 'enemy' });
        TAS.audio.playTone(300, 0.06, 'sine', 0.03);
      }
      // Gravity for spore projectiles
      var eRow = Math.floor((e.y + e.h + 2) / TS);
      var eCol = Math.floor((e.x + e.w / 2) / TS);
      if (eRow < ROWS && !isSolid(eCol, eRow) && !isPlatform(eCol, eRow) && !isSpike(eCol, eRow)) e.y += 120 * dt;
    } else if (e.type === 'vine_crawler') {
      // Crawls on walls and ceilings
      e.x += e.vx * dt * 0.8;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
      var eRow = Math.floor((e.y + e.h + 2) / TS);
      var eCol = Math.floor((e.x + e.w / 2) / TS);
      if (eRow < ROWS && !isSolid(eCol, eRow) && !isPlatform(eCol, eRow)) e.y += 60 * dt;
    } else if (e.type === 'crystal_golem') {
      // Slow but charges when player is near
      var distX = Math.abs(e.x - P.x);
      var chargeSpeed = distX < 100 ? 3 : 0.5;
      e.x += e.vx * dt * chargeSpeed;
      if (Math.abs(e.x - e.startX) > e.patrol * 1.5) e.vx = -e.vx;
      var eRow = Math.floor((e.y + e.h + 2) / TS);
      var eCol = Math.floor((e.x + e.w / 2) / TS);
      if (eRow < ROWS && !isSolid(eCol, eRow) && !isPlatform(eCol, eRow) && !isSpike(eCol, eRow)) e.y += 120 * dt;
    } else if (e.type === 'poison_toad') {
      e.x += e.vx * dt;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
      // Periodic jump
      if (Math.floor(e.animT * 2) % 4 === 0 && e.vy === 0) {
        e.vy = -150;
      }
      e.vy += 400 * dt;
      e.y += e.vy * dt;
      var eRow = Math.floor((e.y + e.h) / TS);
      var eCol = Math.floor((e.x + e.w / 2) / TS);
      if (eRow < ROWS && (isSolid(eCol, eRow) || isPlatform(eCol, eRow))) {
        e.y = eRow * TS - e.h;
        e.vy = 0;
      }
      // Leave poison trail
      if (frame % 30 === 0) {
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#44aa44', 2, 1, { gravity: 0.5, size: 2 });
      }
    } else {
      // Walker, heavy, fungi
      e.x += e.vx * dt;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
      var eRow = Math.floor((e.y + e.h + 2) / TS);
      var eCol = Math.floor((e.x + e.w / 2) / TS);
      if (eRow < ROWS && !isSolid(eCol, eRow) && !isPlatform(eCol, eRow) && !isSpike(eCol, eRow)) e.y += 120 * dt;
    }

    // Contact damage to player
    if (P.invincTimer <= 0 && P.deathTimer <= 0) {
      if (TAS.hit.rectOverlap(P.x, P.y, cd.w, cd.h, e.x, e.y, e.w, e.h)) {
        takeDamage(e.type === 'heavy' || e.type === 'crystal_golem' ? 2 : 1);
      }
    }
  }
}

// === HAZARDS ===
function updateHazards(dt) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    h.timer -= dt;
    h.animT += dt;

    if (h.timer <= 0) {
      h.active = true;
      h.timer = h.interval;

      if (h.type === 'falling_rock') {
        projectiles.push({ x: h.x + 4, y: 2 * TS, vx: 0, vy: 40, w: 10, h: 10, type: 'rock', dmg: 2, life: 4, owner: 'hazard' });
        TAS.audio.playTone(100, 0.1, 'sawtooth', 0.03);
      } else if (h.type === 'poison_cloud') {
        TAS.particles.spawn(h.x + 8, (ROWS - 3) * TS, '#44aa44', 8, 3, { gravity: -1.5, size: 4 });
        // Area damage check
        var cd = getCharData();
        if (Math.abs(P.x - h.x) < 30 && P.y > (ROWS - 6) * TS) {
          takeDamage(1);
        }
      } else if (h.type === 'lava_geyser') {
        for (var j = 0; j < 5; j++) {
          projectiles.push({ x: h.x + Math.random() * 12, y: (ROWS - 3) * TS, vx: (Math.random() - 0.5) * 40, vy: -200 - Math.random() * 100, w: 4, h: 4, type: 'lava', dmg: 1, life: 1.5, owner: 'hazard' });
        }
        TAS.audio.playNoise(0.2, 0.06, 500);
        TAS.particles.spawn(h.x + 8, (ROWS - 3) * TS, '#ff4400', 10, 3, { gravity: -2 });
      }
    }

    // Hazard projectile gravity for rocks/spores/lava
    for (var j = projectiles.length - 1; j >= 0; j--) {
      var p = projectiles[j];
      if (p.type === 'rock') p.vy += 200 * dt;
      if (p.type === 'spore') p.vy += 250 * dt;
      if (p.type === 'lava') p.vy += 350 * dt;
      // Hazard projectile hits player
      if (p.owner === 'hazard' && P.invincTimer <= 0 && P.deathTimer <= 0) {
        var cd = getCharData();
        if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, P.x, P.y, cd.w, cd.h)) {
          takeDamage(p.dmg);
          projectiles.splice(j, 1);
        }
      }
    }
  }
}

// === BOSS ===
function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  boss.timer += dt;
  if (boss.invincTimer > 0) boss.invincTimer -= dt;

  // Enrage at 30% HP
  var enraged = boss.hp < boss.maxHp * 0.3;
  var speedMult = enraged ? 1.5 : 1.0;

  var phase = Math.floor(boss.timer / 3) % 4;

  if (phase === 0) {
    // Chase player
    var dx = P.x - boss.x;
    boss.x += Math.sign(dx) * 60 * speedMult * dt;
  } else if (phase === 1) {
    // Jump pattern
    boss.y += Math.sin(boss.timer * 4) * 100 * speedMult * dt;
  } else if (phase === 2) {
    // Shoot
    boss.attackTimer -= dt;
    if (boss.attackTimer <= 0) {
      boss.attackTimer = enraged ? 0.4 : 0.8;
      var angle = TAS.math.angle(boss.x, boss.y, P.x, P.y);
      projectiles.push({
        x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
        vx: Math.cos(angle) * 150 * speedMult, vy: Math.sin(angle) * 150 * speedMult,
        w: 8, h: 8, type: 'boss', dmg: 2, life: 3, owner: 'enemy'
      });
      TAS.audio.playTone(200, 0.1, 'sawtooth', 0.04);
    }
  } else {
    // Spawn minions (boss-specific pattern)
    boss.spawnTimer -= dt;
    if (boss.spawnTimer <= 0) {
      boss.spawnTimer = enraged ? 2.0 : 4.0;
      var minionType = boss.type === 'fungal_queen' ? 'fungi' : boss.type === 'crystal_titan' ? 'crystal_golem' : 'walker';
      var minionHp = getEnemyHp(minionType, stage);
      enemies.push({
        x: boss.x + boss.w / 2, y: boss.y + boss.h,
        vx: (Math.random() < 0.5 ? -1 : 1) * 50,
        vy: -100, w: 14, h: 14,
        type: minionType, hp: minionHp, maxHp: minionHp,
        animT: 0, shootTimer: 90,
        alive: true, startX: boss.x, patrol: 80,
        flashTimer: 0, dropRoll: Math.random()
      });
      TAS.audio.playTone(250, 0.08, 'square', 0.04);
    }
  }

  // Keep boss in bounds
  boss.x = TAS.math.clamp(boss.x, (COLS - 15) * TS, (COLS - 3) * TS);
  boss.y = TAS.math.clamp(boss.y, 3 * TS, (ROWS - 4) * TS);

  // Contact damage
  var cd = getCharData();
  if (P.invincTimer <= 0 && P.deathTimer <= 0) {
    if (TAS.hit.rectOverlap(P.x, P.y, cd.w, cd.h, boss.x, boss.y, boss.w, boss.h)) {
      takeDamage(2);
    }
  }

  // Enrage particles
  if (enraged && frame % 6 === 0) {
    TAS.particles.spawn(boss.x + Math.random() * boss.w, boss.y, '#ff0000', 2, 2, { gravity: -2 });
  }
}

// === SAVE/LOAD ===
function saveStageProgress() {
  try { localStorage.setItem('littlesamson_progress', String(stageProgress)); } catch(e) { console.error('Save failed:', e); }
}
function loadStageProgress() {
  try { stageProgress = parseInt(localStorage.getItem('littlesamson_progress') || '0', 10); } catch(e) { console.error('Load failed:', e); stageProgress = 0; }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') { drawTitleScreen(); return; }
  if (state === 'gameOver') { TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) }); return; }
  if (state === 'victory') { drawVictoryScreen(); return; }
  if (state !== 'playing') return;

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  drawBackground();
  drawTiles();
  drawHazardIndicators();
  drawPickups();
  drawEnemies();
  if (boss && boss.alive) drawBoss();
  drawProjectiles();
  drawPlayer();
  drawPopups();
  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Transition overlay
  if (transTimer > 0) {
    var t = transTimer / 60;
    ctx.fillStyle = 'rgba(0,0,0,' + t + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    var zone = getZone();
    ctx.fillText('Stage ' + (stage + 1) + ': ' + zone.name, GW / 2, GH / 2 - 10);
    if (stage < 4) {
      ctx.font = '11px monospace';
      ctx.fillStyle = CHAR_COLORS[stage];
      ctx.fillText('~ ' + CHAR_NAMES[stage] + ' ~', GW / 2, GH / 2 + 12);
    }
    // Baseling stat preview on stage start
    ctx.font = '8px monospace';
    ctx.fillStyle = statB.color;
    ctx.fillText(statB.name + ' [Lv.' + statB.level + ']', GW / 2, GH / 2 + 28);
  }

  drawHUD();

  // Tutorial overlay
  if (tutorialTimer > 0 && showTutorial) drawTutorial();

  TAS.input.drawTouchControls(GW, GH);
}

function drawTutorial() {
  ctx.fillStyle = 'rgba(0,0,20,0.85)';
  ctx.fillRect(40, 50, GW - 80, GH - 100);
  ctx.strokeStyle = '#44dd88';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, 50, GW - 80, GH - 100);

  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('YOUR BASELING: ' + statB.name, GW / 2, 80);

  ctx.font = '10px monospace';
  ctx.fillStyle = '#aaa';
  var lines = [
    'ARROWS/WASD: Move | Z/SPACE: Jump',
    'C: Attack | X/SHIFT: Switch Hero (Stage 5+)',
    '',
    'STR ' + statB.str + ': Attack Power    DEX ' + statB.dex + ': Move Speed',
    'CON ' + statB.con + ': HP/Lives        INT ' + statB.int + ': Score Bonus',
    'WIS ' + statB.wis + ': Cooldown        CHA ' + statB.cha + ': Drop Luck',
    '',
    'Each hero has unique abilities!',
    'Samson: Wall Climb    Kikira: Flight',
    'Gamm: Spike Walk      K.O.: Ceiling Climb'
  ];
  for (var i = 0; i < lines.length; i++) {
    ctx.fillStyle = i === 3 || i === 4 || i === 5 ? '#88ccff' : '#aaa';
    ctx.fillText(lines[i], GW / 2, 102 + i * 16);
  }

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = '10px monospace';
  ctx.fillText('Tutorial dismisses in ' + Math.ceil(tutorialTimer) + 's...', GW / 2, GH - 65);
  ctx.globalAlpha = 1;
}

function drawBackground() {
  var zone = getZone();
  var bgOffset = camX * 0.3;
  // Far layer
  for (var i = 0; i < 25; i++) {
    var bx = ((i * 70 - bgOffset * 0.5) % (GW + 200)) - 80 + camX;
    var by = 80 + Math.sin(i * 0.7 + frame * 0.008) * 30 + camY * 0.3;
    ctx.fillStyle = zone.bg1;
    ctx.fillRect(bx, by, 50, ROWS * TS);
  }
  // Near layer
  for (var i = 0; i < 20; i++) {
    var bx = ((i * 80 - bgOffset) % (GW + 160)) - 80 + camX;
    var by = 100 + Math.sin(i * 0.8 + frame * 0.01) * 20 + camY * 0.5;
    ctx.fillStyle = zone.bg2;
    ctx.fillRect(bx, by, 60, ROWS * TS);
  }
  // Ambient particles
  if (frame % 12 === 0) {
    var px = camX + Math.random() * GW;
    var py = camY + Math.random() * GH;
    TAS.particles.spawn(px, py, zone.skyParticle, 1, 1, { gravity: -0.3, size: 1 });
  }
}

function drawTiles() {
  var zone = getZone();
  var startCol = Math.max(0, Math.floor(camX / TS));
  var endCol = Math.min(COLS, Math.ceil((camX + GW) / TS) + 1);
  var startRow = Math.max(0, Math.floor(camY / TS));
  var endRow = Math.min(ROWS, Math.ceil((camY + GH) / TS) + 1);
  var tint = zone.tileTint;

  for (var r = startRow; r < endRow; r++) {
    for (var c = startCol; c < endCol; c++) {
      var t = tiles[r][c];
      var tx = c * TS, ty = r * TS;
      if (t === T_SOLID) {
        var shade = ((c * 7 + r * 13) % 20);
        ctx.fillStyle = 'rgb(' + (tint[0] + shade) + ',' + (tint[1] + shade + 5) + ',' + (tint[2] + shade + 15) + ')';
        ctx.fillRect(tx, ty, TS, TS);
        // NES-style highlight/shadow
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(tx, ty, TS, 1);
        ctx.fillRect(tx, ty, 1, TS);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(tx, ty + TS - 1, TS, 1);
        ctx.fillRect(tx + TS - 1, ty, 1, TS);
        // Brick pattern
        if ((r + c) % 3 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.08)';
          ctx.fillRect(tx + 1, ty + 7, TS - 2, 1);
        }
      } else if (t === T_SPIKE) {
        ctx.fillStyle = zone.spikeColor;
        ctx.fillRect(tx, ty + 10, TS, 6);
        var spikeLight = zone.spikeColor.replace('#', '');
        ctx.fillStyle = zone.spikeColor;
        for (var s = 0; s < 3; s++) {
          ctx.beginPath();
          ctx.moveTo(tx + s * 6, ty + 10);
          ctx.lineTo(tx + s * 6 + 3, ty + 2);
          ctx.lineTo(tx + s * 6 + 6, ty + 10);
          ctx.fill();
        }
      } else if (t === T_PLATFORM) {
        ctx.fillStyle = '#556644';
        ctx.fillRect(tx, ty, TS, 4);
        ctx.fillStyle = '#778855';
        ctx.fillRect(tx + 1, ty, TS - 2, 2);
        // Rivets
        ctx.fillStyle = '#445533';
        ctx.fillRect(tx + 2, ty + 1, 2, 2);
        ctx.fillRect(tx + TS - 4, ty + 1, 2, 2);
      } else if (t === T_CEILING) {
        ctx.fillStyle = '#445566';
        ctx.fillRect(tx, ty + TS - 4, TS, 4);
        ctx.fillStyle = '#556677';
        ctx.fillRect(tx + 1, ty + TS - 2, TS - 2, 2);
      } else if (t === T_ICE) {
        ctx.fillStyle = '#88bbdd';
        ctx.fillRect(tx, ty, TS, TS);
        ctx.fillStyle = 'rgba(200,240,255,0.3)';
        ctx.fillRect(tx + 2, ty + 2, 4, 3);
        ctx.fillRect(tx + 8, ty + 6, 5, 2);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(tx, ty, TS, 1);
      } else if (t === T_CRUMBLE) {
        // Find shake state
        var shaking = false;
        for (var j = 0; j < crumbleTiles.length; j++) {
          if (crumbleTiles[j].col === c && crumbleTiles[j].row === r && crumbleTiles[j].shaking && crumbleTiles[j].timer > 0) {
            shaking = true;
            break;
          }
        }
        var ox = shaking ? (Math.random() - 0.5) * 3 : 0;
        var oy = shaking ? (Math.random() - 0.5) * 3 : 0;
        ctx.fillStyle = '#776655';
        ctx.fillRect(tx + ox, ty + oy, TS, TS);
        // Crack lines
        ctx.strokeStyle = '#554433';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tx + 3 + ox, ty + ox);
        ctx.lineTo(tx + 8 + ox, ty + 8 + oy);
        ctx.lineTo(tx + 14 + ox, ty + 5 + oy);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(tx + 10 + ox, ty + oy);
        ctx.lineTo(tx + 6 + ox, ty + 12 + oy);
        ctx.stroke();
      }
    }
  }
}

function drawHazardIndicators() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.timer < 1.0 && h.timer > 0) {
      // Warning indicator
      var alpha = Math.sin(frame * 0.2) * 0.3 + 0.5;
      ctx.fillStyle = 'rgba(255,50,50,' + alpha + ')';
      if (h.type === 'falling_rock') {
        ctx.fillText('!', h.x + 6, 3 * TS);
      } else if (h.type === 'lava_geyser') {
        ctx.fillStyle = 'rgba(255,100,0,' + alpha + ')';
        ctx.fillRect(h.x, (ROWS - 3) * TS, 16, 3);
      }
    }
  }
}

function drawPickups() {
  for (var i = 0; i < pickups.length; i++) {
    var pk = pickups[i];
    if (pk.collected) continue;
    var bob = Math.sin(frame * 0.08 + (pk.bobOffset || i)) * 2;

    if (pk.type === 'bell') {
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(pk.x + 4, pk.y + 3 + bob, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(pk.x + 3, pk.y + bob, 2, 3);
    } else if (pk.type === 'health') {
      ctx.fillStyle = '#44ff44';
      ctx.beginPath();
      ctx.moveTo(pk.x + 4, pk.y + 2 + bob);
      ctx.lineTo(pk.x + 1, pk.y + 5 + bob);
      ctx.lineTo(pk.x + 4, pk.y + 8 + bob);
      ctx.lineTo(pk.x + 7, pk.y + 5 + bob);
      ctx.closePath();
      ctx.fill();
    } else if (pk.type === 'shield') {
      // Blue shield icon
      ctx.fillStyle = '#44aaff';
      ctx.beginPath();
      ctx.moveTo(pk.x + 4, pk.y + bob);
      ctx.lineTo(pk.x, pk.y + 3 + bob);
      ctx.lineTo(pk.x + 2, pk.y + 8 + bob);
      ctx.lineTo(pk.x + 4, pk.y + 10 + bob);
      ctx.lineTo(pk.x + 6, pk.y + 8 + bob);
      ctx.lineTo(pk.x + 8, pk.y + 3 + bob);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#88ccff';
      ctx.fillRect(pk.x + 3, pk.y + 3 + bob, 2, 4);
    } else if (pk.type === 'powerup') {
      // Magenta bolt
      ctx.fillStyle = '#ff44ff';
      ctx.beginPath();
      ctx.moveTo(pk.x + 5, pk.y + bob);
      ctx.lineTo(pk.x + 2, pk.y + 5 + bob);
      ctx.lineTo(pk.x + 4, pk.y + 5 + bob);
      ctx.lineTo(pk.x + 3, pk.y + 9 + bob);
      ctx.lineTo(pk.x + 7, pk.y + 3 + bob);
      ctx.lineTo(pk.x + 5, pk.y + 3 + bob);
      ctx.closePath();
      ctx.fill();
    } else if (pk.type === 'star') {
      // Gold star
      ctx.fillStyle = '#ffaaff';
      ctx.beginPath();
      var cx = pk.x + 4, cy = pk.y + 4 + bob;
      for (var s = 0; s < 5; s++) {
        var a1 = (s * 72 - 90) * Math.PI / 180;
        var a2 = ((s * 72) + 36 - 90) * Math.PI / 180;
        ctx.lineTo(cx + Math.cos(a1) * 5, cy + Math.sin(a1) * 5);
        ctx.lineTo(cx + Math.cos(a2) * 2, cy + Math.sin(a2) * 2);
      }
      ctx.closePath();
      ctx.fill();
    }
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    var ex = e.x, ey = e.y;

    // Hit flash
    if (e.flashTimer > 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex, ey, e.w, e.h);
      continue;
    }

    if (e.type === 'walker') {
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#cc6666';
      ctx.fillRect(ex + 2, ey + 2, 4, 4);
      ctx.fillRect(ex + 8, ey + 2, 4, 4);
      var legOff = Math.sin(e.animT * 8) * 2;
      ctx.fillStyle = '#882222';
      ctx.fillRect(ex + 2, ey + e.h, 3, 3 + legOff);
      ctx.fillRect(ex + e.w - 5, ey + e.h, 3, 3 - legOff);
    } else if (e.type === 'flyer') {
      ctx.fillStyle = '#6644aa';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + e.h / 2, e.w / 2, 0, Math.PI * 2);
      ctx.fill();
      var wingOff = Math.sin(e.animT * 12) * 4;
      ctx.fillStyle = '#8866cc';
      ctx.fillRect(ex - 4, ey + 2 + wingOff, 5, 6);
      ctx.fillRect(ex + e.w - 1, ey + 2 - wingOff, 5, 6);
    } else if (e.type === 'shooter') {
      ctx.fillStyle = '#448844';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#ffff00';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + 4, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#226622';
      ctx.fillRect(ex + e.w / 2 - 2, ey + e.h - 4, 4, 4);
    } else if (e.type === 'heavy') {
      ctx.fillStyle = '#886644';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#aa8866';
      ctx.fillRect(ex + 3, ey + 3, e.w - 6, 6);
      ctx.fillStyle = '#664422';
      ctx.fillRect(ex, ey + e.h - 4, e.w, 4);
    } else if (e.type === 'fungi') {
      ctx.fillStyle = '#995588';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + 4, e.w / 2, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ddccbb';
      ctx.fillRect(ex + 4, ey + 4, 6, 10);
      ctx.fillStyle = '#ffddff';
      ctx.beginPath();
      ctx.arc(ex + 4, ey + 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'spore_bomber') {
      // Puffball mushroom with spore sac
      ctx.fillStyle = '#777755';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + 5, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#999977';
      ctx.fillRect(ex + 5, ey + 8, 4, 6);
      // Spore dots
      ctx.fillStyle = '#aaaa66';
      for (var d = 0; d < 3; d++) {
        ctx.beginPath();
        ctx.arc(ex + 4 + d * 3, ey + 3, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === 'shadow_bat') {
      // Dark bat with glowing eyes
      var wingY = Math.sin(e.animT * 15) * 3;
      ctx.fillStyle = '#221133';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + e.h / 2, 5, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      ctx.fillStyle = '#331144';
      ctx.beginPath();
      ctx.moveTo(ex + 2, ey + 4);
      ctx.lineTo(ex - 4, ey + wingY);
      ctx.lineTo(ex, ey + 8);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + e.w - 2, ey + 4);
      ctx.lineTo(ex + e.w + 4, ey - wingY);
      ctx.lineTo(ex + e.w, ey + 8);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0044';
      ctx.fillRect(ex + 3, ey + 3, 2, 2);
      ctx.fillRect(ex + 7, ey + 3, 2, 2);
    } else if (e.type === 'vine_crawler') {
      // Green segmented worm
      ctx.fillStyle = '#336633';
      for (var seg = 0; seg < 3; seg++) {
        var sx = ex + seg * 5;
        var sy = ey + Math.sin(e.animT * 4 + seg) * 2;
        ctx.fillRect(sx, sy, 5, e.h - 2);
      }
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(ex, ey + 2, 4, 4);
      // Eyes
      ctx.fillStyle = '#88ff88';
      ctx.fillRect(ex + 1, ey + 3, 1, 1);
    } else if (e.type === 'crystal_golem') {
      // Large angular crystal body
      ctx.fillStyle = '#4488aa';
      ctx.fillRect(ex, ey, e.w, e.h);
      // Crystal facets
      ctx.fillStyle = '#66aacc';
      ctx.beginPath();
      ctx.moveTo(ex + 3, ey);
      ctx.lineTo(ex + 9, ey + 5);
      ctx.lineTo(ex + 3, ey + 10);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + e.w - 3, ey);
      ctx.lineTo(ex + e.w - 9, ey + 5);
      ctx.lineTo(ex + e.w - 3, ey + 10);
      ctx.fill();
      // Glow
      ctx.fillStyle = 'rgba(100,200,255,0.3)';
      ctx.fillRect(ex + 5, ey + 5, 8, 8);
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex + 5, ey + 3, 3, 3);
      ctx.fillRect(ex + 10, ey + 3, 3, 3);
    } else if (e.type === 'poison_toad') {
      // Fat toad
      ctx.fillStyle = '#338833';
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, ey + e.h / 2, 7, 0, Math.PI * 2);
      ctx.fill();
      // Eyes (bulging)
      ctx.fillStyle = '#88ff44';
      ctx.beginPath();
      ctx.arc(ex + 4, ey + 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#114411';
      ctx.fillRect(ex + 4, ey + 2, 1, 2);
      ctx.fillRect(ex + 10, ey + 2, 1, 2);
      // Poison spots
      ctx.fillStyle = '#55aa55';
      ctx.beginPath();
      ctx.arc(ex + 3, ey + 8, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 9, ey + 7, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // HP bar for enemies with more than 3 HP
    if (e.maxHp > 3) {
      ctx.fillStyle = '#333';
      ctx.fillRect(ex, ey - 5, e.w, 3);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex, ey - 5, e.w * (e.hp / e.maxHp), 3);
    }
  }
}

function drawBoss() {
  var bx = boss.x, by = boss.y;
  var flash = boss.invincTimer > 0 && Math.floor(frame / 3) % 2;
  var enraged = boss.hp < boss.maxHp * 0.3;

  if (!flash) {
    if (boss.type === 'shadow_knight') {
      ctx.fillStyle = '#2a1a3a';
      ctx.fillRect(bx, by, boss.w, boss.h);
      ctx.fillStyle = '#4a2a5a';
      ctx.fillRect(bx + 4, by + 4, boss.w - 8, 12);
      ctx.fillRect(bx + 2, by + 20, boss.w - 4, 20);
      ctx.fillStyle = enraged ? '#ff0000' : '#ff0044';
      ctx.fillRect(bx + 10, by + 8, 6, 4);
      ctx.fillRect(bx + 24, by + 8, 6, 4);
      ctx.fillStyle = '#6a4a7a';
      var weaponSwing = Math.sin(boss.timer * 4) * 8;
      ctx.fillRect(bx + boss.w, by + 10 + weaponSwing, 8, 30);
    } else if (boss.type === 'corruption_lord') {
      ctx.fillStyle = '#1a0a2a';
      ctx.fillRect(bx, by, boss.w, boss.h);
      ctx.fillStyle = '#4a0a6a';
      for (var t = 0; t < 5; t++) {
        var tx2 = bx + 5 + t * 8;
        var ty2 = by + boss.h;
        var tendLen = 10 + Math.sin(boss.timer * 3 + t) * 6;
        ctx.fillRect(tx2, ty2, 3, tendLen);
      }
      ctx.fillStyle = '#880088';
      ctx.beginPath();
      ctx.moveTo(bx + 5, by);
      ctx.lineTo(bx + 10, by - 10);
      ctx.lineTo(bx + 20, by - 5);
      ctx.lineTo(bx + 30, by - 12);
      ctx.lineTo(bx + 35, by);
      ctx.fill();
      ctx.fillStyle = enraged ? '#ff00ff' : '#cc00cc';
      ctx.beginPath(); ctx.arc(bx + 14, by + 14, 5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 28, by + 14, 5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#cc00cc';
      ctx.fillRect(bx + 12, by + 28, 16, 4);
    } else if (boss.type === 'fungal_queen') {
      // Massive mushroom boss
      ctx.fillStyle = '#662255';
      ctx.beginPath();
      ctx.arc(bx + boss.w / 2, by + 12, 22, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ddbbcc';
      ctx.fillRect(bx + 12, by + 12, 16, 36);
      // Spots
      ctx.fillStyle = '#ff88cc';
      ctx.beginPath(); ctx.arc(bx + 10, by + 5, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 25, by + 3, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 32, by + 8, 2.5, 0, Math.PI * 2); ctx.fill();
      // Face
      ctx.fillStyle = enraged ? '#ff0044' : '#440044';
      ctx.beginPath(); ctx.arc(bx + 16, by + 22, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 26, by + 22, 3, 0, Math.PI * 2); ctx.fill();
    } else if (boss.type === 'crystal_titan') {
      // Towering crystal entity
      ctx.fillStyle = '#224466';
      ctx.fillRect(bx + 5, by, 30, boss.h);
      // Crystal shards
      ctx.fillStyle = '#44aadd';
      ctx.beginPath();
      ctx.moveTo(bx, by + 10);
      ctx.lineTo(bx + 8, by - 5);
      ctx.lineTo(bx + 16, by + 10);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(bx + 24, by + 5);
      ctx.lineTo(bx + 32, by - 8);
      ctx.lineTo(bx + 40, by + 5);
      ctx.fill();
      // Core glow
      ctx.fillStyle = enraged ? 'rgba(255,100,100,0.5)' : 'rgba(100,200,255,0.4)';
      ctx.beginPath(); ctx.arc(bx + 20, by + 24, 8, 0, Math.PI * 2); ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bx + 13, by + 18, 4, 4);
      ctx.fillRect(bx + 23, by + 18, 4, 4);
    } else if (boss.type === 'void_serpent') {
      // Serpentine void creature
      ctx.fillStyle = '#0a0a22';
      for (var seg = 0; seg < 5; seg++) {
        var sx = bx + Math.sin(boss.timer * 2 + seg * 0.8) * 10;
        var sy = by + seg * 10;
        ctx.beginPath();
        ctx.arc(sx + 20, sy + 5, 10 - seg, 0, Math.PI * 2);
        ctx.fill();
      }
      // Eyes
      ctx.fillStyle = enraged ? '#ff0000' : '#6600ff';
      ctx.beginPath(); ctx.arc(bx + 15, by + 4, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(bx + 25, by + 4, 4, 0, Math.PI * 2); ctx.fill();
      // Void tendrils
      ctx.strokeStyle = '#220044';
      ctx.lineWidth = 2;
      for (var t = 0; t < 4; t++) {
        ctx.beginPath();
        ctx.moveTo(bx + 10 + t * 8, by + boss.h);
        ctx.quadraticCurveTo(bx + 10 + t * 8 + Math.sin(boss.timer * 3 + t) * 10, by + boss.h + 15, bx + 10 + t * 8, by + boss.h + 25);
        ctx.stroke();
      }
    }
  }

  // Boss HP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by - 10, boss.w, 5);
  ctx.fillStyle = enraged ? '#ff0000' : (boss.hp > boss.maxHp * 0.3 ? '#ff4444' : '#ff2222');
  ctx.fillRect(bx, by - 10, boss.w * (boss.hp / boss.maxHp), 5);
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    if (p.type === 'stone') {
      ctx.fillStyle = '#998877';
      ctx.beginPath();
      ctx.arc(p.x + 3, p.y + 3, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'fire') {
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, p.h - 4);
      TAS.particles.spawn(p.x + p.w / 2, p.y + p.h / 2, '#ff4400', 1, 1, { size: 2 });
    } else if (p.type === 'punch') {
      ctx.fillStyle = '#ffffaa';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(p.x + 7, p.y + 7, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'bomb') {
      ctx.fillStyle = '#aa66ff';
      ctx.beginPath();
      ctx.arc(p.x + 2.5, p.y + 2.5, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(p.x + 1, p.y - 2, 2, 3);
    } else if (p.type === 'enemy' || p.type === 'boss') {
      ctx.fillStyle = p.type === 'boss' ? '#ff00ff' : '#ffaa00';
      ctx.beginPath();
      ctx.arc(p.x + 3, p.y + 3, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'spore') {
      ctx.fillStyle = '#88aa44';
      ctx.beginPath();
      ctx.arc(p.x + 4, p.y + 4, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aacc66';
      ctx.beginPath();
      ctx.arc(p.x + 4, p.y + 4, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'rock') {
      ctx.fillStyle = '#776655';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#998877';
      ctx.fillRect(p.x + 1, p.y + 1, 4, 4);
    } else if (p.type === 'lava') {
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.arc(p.x + 2, p.y + 2, 2, 0, Math.PI * 2);
      ctx.fill();
      TAS.particles.spawn(p.x + 2, p.y + 2, '#ffaa00', 1, 1, { size: 1 });
    }
  }
}

function drawPlayer() {
  var cd = getCharData();
  var px = P.x, py = P.y;

  if (P.invincTimer > 0 && Math.floor(frame / 3) % 2) return;
  if (P.deathTimer > 0) return;

  ctx.save();

  // Baseling tint from stat color
  var tint = statB.color;

  if (activeChar === CHARS.SAMSON) {
    // Earth baseling — sturdy, your baseling's color influences body
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(px + 2, py + 4, 8, 10);
    ctx.fillStyle = '#a07820';
    ctx.beginPath();
    ctx.arc(px + 6, py + 3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + (P.facing > 0 ? 6 : 3), py + 2, 2, 2);
    // Baseling icon on chest
    ctx.fillStyle = tint;
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, px + 6, py + 12);
    var legOff = P.onGround ? Math.sin(P.animT * 10) * 2 : 0;
    ctx.fillStyle = '#6b4f0a';
    ctx.fillRect(px + 2, py + 14, 3, 3 + legOff);
    ctx.fillRect(px + 7, py + 14, 3, 3 - legOff);
    if (P.clinging) {
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(px + (P.clingDir > 0 ? cd.w : -3), py + 4, 3, 8);
    }
  } else if (activeChar === CHARS.KIKIRA) {
    ctx.fillStyle = '#cc3322';
    ctx.fillRect(px + 3, py + 4, 8, 8);
    ctx.fillStyle = '#dd4433';
    ctx.beginPath();
    ctx.arc(px + 7, py + 3, 4, 0, Math.PI * 2);
    ctx.fill();
    var wingFlap = Math.sin(frame * 0.2) * 3;
    ctx.fillStyle = '#ff6644';
    ctx.beginPath();
    ctx.moveTo(px + 1, py + 5);
    ctx.lineTo(px - 4, py + 2 + wingFlap);
    ctx.lineTo(px - 2, py + 10);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px + 13, py + 5);
    ctx.lineTo(px + 18, py + 2 - wingFlap);
    ctx.lineTo(px + 16, py + 10);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(px + (P.facing > 0 ? 8 : 4), py + 2, 2, 2);
    ctx.fillStyle = tint;
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, px + 7, py + 11);
    ctx.fillStyle = '#aa2211';
    ctx.fillRect(px + (P.facing > 0 ? -2 : cd.w), py + 9, 4, 2);
    if (P.flyMeter < 80) {
      ctx.fillStyle = 'rgba(255,100,0,0.5)';
      ctx.fillRect(px, py + cd.h + 2, cd.w * (P.flyMeter / 100), 2);
    }
  } else if (activeChar === CHARS.GAMM) {
    ctx.fillStyle = '#5577aa';
    ctx.fillRect(px + 1, py + 4, 14, 12);
    ctx.fillStyle = '#6688bb';
    ctx.fillRect(px + 3, py, 10, 6);
    ctx.fillStyle = '#aaddff';
    ctx.fillRect(px + 4, py + 2, 3, 3);
    ctx.fillRect(px + 9, py + 2, 3, 3);
    ctx.fillStyle = tint;
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, px + 8, py + 13);
    ctx.fillStyle = '#445588';
    ctx.fillRect(px - 2, py + 6, 3, 8);
    ctx.fillRect(px + cd.w - 1, py + 6, 3, 8);
    ctx.fillStyle = '#334477';
    ctx.fillRect(px + 2, py + 16, 5, 3);
    ctx.fillRect(px + 9, py + 16, 5, 3);
    ctx.strokeStyle = '#334466';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(px + 5, py + 6);
    ctx.lineTo(px + 8, py + 12);
    ctx.stroke();
  } else if (activeChar === CHARS.KO) {
    ctx.fillStyle = '#ddaaff';
    ctx.fillRect(px + 1, py + 3, 6, 5);
    ctx.fillStyle = '#eeccff';
    ctx.beginPath();
    ctx.arc(px + 4, py + 2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffccff';
    ctx.beginPath(); ctx.arc(px + 2, py - 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(px + 6, py - 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#440044';
    ctx.fillRect(px + (P.facing > 0 ? 4 : 2), py + 1, 1.5, 1.5);
    ctx.strokeStyle = '#bb88dd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(px + (P.facing > 0 ? 0 : cd.w), py + 7);
    ctx.quadraticCurveTo(px + (P.facing > 0 ? -4 : cd.w + 4), py + 3, px + (P.facing > 0 ? -3 : cd.w + 3), py + 1);
    ctx.stroke();
    if (P.onCeiling) {
      ctx.fillStyle = '#ffaaff';
      ctx.fillRect(px, py - 2, cd.w, 2);
    }
  }

  ctx.restore();
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, 34);

  // Active character name + baseling name
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = CHAR_COLORS[activeChar];
  ctx.fillText(CHAR_NAMES[activeChar], 6, 12);

  // HP bar — CON scales max HP
  var cd = getCharData();
  var maxHp = Math.floor(cd.maxHp * conMult()) + bonusHp();
  var hpW = 60;
  ctx.fillStyle = '#333';
  ctx.fillRect(6, 16, hpW, 6);
  var hpRatio = charHp[activeChar] / maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(6, 16, hpW * Math.min(1, hpRatio), 6);

  // Character indicators
  for (var i = 0; i < 4; i++) {
    var ix = 80 + i * 28;
    ctx.fillStyle = charAlive[i] ? CHAR_COLORS[i] : '#333';
    ctx.globalAlpha = i === activeChar ? 1 : 0.5;
    ctx.beginPath();
    ctx.arc(ix, 16, 6, 0, Math.PI * 2);
    ctx.fill();
    if (charAlive[i]) {
      ctx.fillStyle = '#222';
      ctx.fillRect(ix - 6, 24, 12, 2);
      ctx.fillStyle = '#44cc44';
      var iMaxHp = Math.floor(CHAR_DATA[i].maxHp * conMult()) + bonusHp();
      ctx.fillRect(ix - 6, 24, 12 * Math.min(1, charHp[i] / iMaxHp), 2);
    } else {
      ctx.fillStyle = '#ff0000';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('X', ix, 19);
    }
    ctx.globalAlpha = 1;
  }

  // Score — INT multiplier shown
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('SCORE: ' + score, GW - 6, 12);

  // Stage + zone
  ctx.fillStyle = '#88ccff';
  ctx.fillText('STAGE ' + (stage + 1) + '/10', GW - 6, 24);

  // Bells
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('x' + bells, GW / 2, 12);

  // Lives + Combo
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('LIVES: ' + continues, GW / 2, 28);

  // Combo display
  if (comboCount > 1) {
    var comboAlpha = Math.min(1, comboTimer);
    ctx.globalAlpha = comboAlpha;
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('COMBO x' + comboCount, 6, GH - 22);
    ctx.globalAlpha = 1;
  }

  // Fly meter for Kikira
  if (activeChar === CHARS.KIKIRA) {
    ctx.fillStyle = '#333';
    ctx.fillRect(6, 28, 40, 3);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(6, 28, 40 * (P.flyMeter / 100), 3);
  }

  // Baseling stat bar (small, bottom-left)
  ctx.fillStyle = 'rgba(10,5,20,0.7)';
  ctx.fillRect(0, GH - 14, 120, 14);
  ctx.fillStyle = statB.color;
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(statB.icon + ' S' + statB.str + ' D' + statB.dex + ' C' + statB.con + ' I' + statB.int + ' W' + statB.wis + ' Ch' + statB.cha, 3, GH - 4);

  // Boss HP bar at bottom center
  if (boss && boss.alive) {
    ctx.fillStyle = 'rgba(10,5,20,0.8)';
    ctx.fillRect(GW / 4, GH - 18, GW / 2, 12);
    ctx.fillStyle = '#660000';
    ctx.fillRect(GW / 4 + 1, GH - 17, GW / 2 - 2, 10);
    var enraged = boss.hp < boss.maxHp * 0.3;
    ctx.fillStyle = enraged ? '#ff0000' : '#ff2222';
    ctx.fillRect(GW / 4 + 1, GH - 17, (GW / 2 - 2) * (boss.hp / boss.maxHp), 10);
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    var bossLabel = boss.type.replace(/_/g, ' ').toUpperCase();
    if (enraged) bossLabel += ' [ENRAGED]';
    ctx.fillText(bossLabel, GW / 2, GH - 9);
  }
}

function drawTitleScreen() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative particles
  for (var i = 0; i < 30; i++) {
    var sx = (i * 37 + frame * 0.3) % GW;
    var sy = (i * 23 + frame * 0.1) % GH;
    ctx.fillStyle = 'rgba(100,60,180,' + (0.2 + Math.sin(frame * 0.02 + i) * 0.1) + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 1 + Math.sin(i) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('LITTLE SAMSON', GW / 2 + 2, 52);
  ctx.fillStyle = statB.color;
  ctx.fillText('LITTLE SAMSON', GW / 2, 50);

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Elemental Heroes of Tasern', GW / 2, 70);

  // Baseling identity
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 10px monospace';
  ctx.fillText('Your Baseling: ' + statB.name + ' [Lv.' + statB.level + ']', GW / 2, 88);

  // Characters preview
  var charPreviewY = 108;
  for (var i = 0; i < 4; i++) {
    var cpx = GW / 2 - 80 + i * 55;
    var cpy = charPreviewY;
    var bob = Math.sin(frame * 0.04 + i * 1.5) * 3;

    ctx.fillStyle = CHAR_COLORS[i];
    if (i === 0) {
      ctx.fillRect(cpx, cpy + bob, 12, 16);
      ctx.beginPath(); ctx.arc(cpx + 6, cpy - 2 + bob, 5, 0, Math.PI * 2); ctx.fill();
    } else if (i === 1) {
      ctx.fillRect(cpx + 2, cpy + bob, 10, 12);
      ctx.beginPath();
      ctx.moveTo(cpx - 2, cpy + 4 + bob); ctx.lineTo(cpx - 6, cpy + bob); ctx.lineTo(cpx, cpy + 8 + bob); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cpx + 14, cpy + 4 + bob); ctx.lineTo(cpx + 18, cpy + bob); ctx.lineTo(cpx + 12, cpy + 8 + bob); ctx.fill();
    } else if (i === 2) {
      ctx.fillRect(cpx - 2, cpy + bob, 16, 18);
      ctx.fillRect(cpx, cpy - 4 + bob, 12, 6);
    } else {
      ctx.beginPath(); ctx.arc(cpx + 4, cpy + 4 + bob, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(cpx + 1, cpy + 6 + bob, 6, 6);
      ctx.beginPath(); ctx.arc(cpx + 2, cpy + bob, 2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cpx + 6, cpy + bob, 2, 0, Math.PI * 2); ctx.fill();
    }

    ctx.font = '8px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText(CHAR_NAMES[i], cpx + 6, cpy + 28 + bob);
  }

  // Character abilities
  ctx.font = '9px monospace';
  var abilities = [
    'Wall Climb + Stone Throw',
    'Flight + Fire Breath',
    'Spike Walk + Power Punch',
    'Ceiling Climb + Bombs'
  ];
  for (var i = 0; i < 4; i++) {
    ctx.fillStyle = CHAR_COLORS[i];
    ctx.globalAlpha = 0.7;
    ctx.fillText(abilities[i], GW / 2, 168 + i * 14);
  }
  ctx.globalAlpha = 1;

  // NES-style controls
  ctx.fillStyle = '#556';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD: Move  |  Z/SPACE: Jump', GW / 2, 236);
  ctx.fillText('C: Attack  |  X/SHIFT: Switch Hero', GW / 2, 250);
  ctx.fillStyle = '#445';
  ctx.fillText('B button swaps characters (Stage 5+)', GW / 2, 264);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 28);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH - 12);
  }
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  if (frame % 5 === 0) {
    var vx = Math.random() * GW;
    TAS.particles.spawn(vx, GH, ['#ff4444', '#44ff44', '#4444ff', '#ffff44'][Math.floor(Math.random() * 4)], 3, 4, { gravity: -2 });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 70);

  ctx.fillStyle = statB.color;
  ctx.font = '14px monospace';
  ctx.fillText('The corruption is vanquished!', GW / 2, 105);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText(statB.name + ' and the Four Heroes', GW / 2, 140);
  ctx.fillText('have saved Tasern!', GW / 2, 158);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 195);

  // Stat breakdown
  ctx.fillStyle = '#88ccff';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 218);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffaaff';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 242);
    ctx.globalAlpha = 1;
  }

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 28);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
