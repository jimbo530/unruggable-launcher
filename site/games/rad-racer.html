function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Animated road background
  for (var i = 0; i < 40; i++) {
    var y = GH/2 + i * 4;
    var w = 20 + i * 6;
    var isEven = (Math.floor(i + frame * 0.05) % 2 === 0);
    ctx.fillStyle = isEven ? '#333' : '#444';
    ctx.fillRect(GW/2 - w, y, w * 2, 5);
    if (isEven) {
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(GW/2 - w - 10, y, 10, 5);
      ctx.fillRect(GW/2 + w, y, 10, 5);
    }
  }

  // Sky
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH/2);
  skyGrad.addColorStop(0, '#1a1c2c');
  skyGrad.addColorStop(1, '#a855f7');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH/2 + 10);

  // Animated spore particles in background
  for (var sp = 0; sp < 15; sp++) {
    var spx = (sp * 37 + frame * 0.3) % GW;
    var spy = (sp * 23 + Math.sin(frame * 0.02 + sp) * 20) % (GH / 2);
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04 + sp) * 0.2;
    ctx.beginPath();
    ctx.arc(spx, spy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('SPORE RACER', GW/2 + 2, 62);
  ctx.fillStyle = '#38d973';
  ctx.fillText('SPORE RACER', GW/2, 60);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('BASELING GRAND PRIX', GW/2, 82);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Race your baseling across the fungal garden highways', GW/2, 100);

  // Selected baseling driver (Base-blue) + mascot
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('Driver: ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW/2, 120);
  TAS.drawBaseling(ctx, GW/2, 168, 40, { anim: 'idle', frame: frame, flipX: false });

  // NES-style controls
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  var ctrlY = 140;
  ctx.fillText('[UP/W] Accelerate    [DOWN/S] Brake', GW/2, ctrlY);
  ctx.fillText('[LEFT/RIGHT] Steer   [SHIFT] Gear', GW/2, ctrlY + 13);
  ctx.fillText('[SPACE] Mycelium Turbo  [A] Accel', GW/2, ctrlY + 26);
  ctx.fillText('[B btn] Turbo (Touch)', GW/2, ctrlY + 39);

  // 5 arcade stat bars (canonical colors) for the selected baseling
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bx0 = GW/2 - 110;
    ctx.textAlign = 'left'; ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k], _bx = _bx0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, 196);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 199, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 199, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // Track progress
  ctx.fillStyle = '#38d973';
  ctx.font = '10px monospace';
  ctx.fillText('Gardens Unlocked: ' + (trackProgress + 1) + '/' + TRACKS.length, GW/2, 222);

  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('Best: ' + highScore, GW/2, 236);
  }

  // Continues display
  if (STAT_EXTRA_LIVES > 0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = '9px monospace';
    ctx.fillText('Continues: ' + STAT_EXTRA_LIVES + ' (STA bonus)', GW/2, 250);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO RACE', GW/2, GH - 26);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW/2, GH - 10);
}

function drawTrackIntro(t) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH * 0.6);
  skyGrad.addColorStop(0, t.sky1);
  skyGrad.addColorStop(1, t.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH * 0.6);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('GARDEN ' + (currentTrack + 1) + ' OF ' + TRACKS.length, GW/2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(t.name, GW/2, 95);

  // Lore text
  ctx.fillStyle = '#38d973';
  ctx.font = '9px monospace';
  ctx.fillText(t.lore, GW/2, 118);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '14px monospace';
  ctx.fillText('Spore Timer: ' + t.timeLimit + 's', GW/2, 145);

  ctx.fillStyle = '#38d973';
  ctx.font = '11px monospace';
  ctx.fillText('Garden Gates: ' + t.checkpoints.length + ' (+15s each)', GW/2, 168);

  ctx.fillStyle = '#ff8800';
  ctx.fillText('Mycelium Turbo: 3 + WIS recharge', GW/2, 188);

  // Boss info
  ctx.fillStyle = t.bossColor;
  ctx.fillText('Mold Car: ' + t.boss, GW/2, 208);

  var diff = Math.floor((t.curves + t.hills) * 2.5);
  var diffStr = '';
  for (var d = 0; d < 5; d++) diffStr += d < diff ? '*' : '.';
  ctx.fillStyle = diff > 3 ? '#ff4444' : '#aaa';
  ctx.fillText('Difficulty: [' + diffStr + ']', GW/2, 228);

  // Track record
  if (trackRecord > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('Garden Record: ' + trackRecord, GW/2, 248);
  }

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 30);
  ctx.globalAlpha = 1;
}

function drawTrackComplete(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDEN CLEARED!', GW/2, 50);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(t.name, GW/2, 75);

  var timeBonus = Math.floor(timeLeft * 100 * STAT_SCORE_MULT);
  var cleanBonus = Math.floor(cleanDriving * 10 * STAT_SCORE_MULT);
  var distScore = Math.floor(distanceTraveled * STAT_SCORE_MULT);
  var bossBonus = bossDefeated ? Math.floor(500 * STAT_SCORE_MULT) : 0;
  var comboBonus = comboCounter * 25;

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Distance: ' + distScore, GW/2, 105);
  ctx.fillText('Time Bonus: +' + timeBonus, GW/2, 120);
  ctx.fillText('Clean Driving: +' + cleanBonus, GW/2, 135);
  if (bossDefeated) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('Mold Car Wrecked: +' + bossBonus, GW/2, 150);
  }
  if (comboBonus > 0) {
    ctx.fillStyle = '#ff44ff';
    ctx.fillText('Combo Bonus: +' + comboBonus, GW/2, 165);
  }

  // INT multiplier shown
  if (STAT_SCORE_MULT > 1.01) {
    ctx.fillStyle = '#38d973';
    ctx.font = '9px monospace';
    ctx.fillText('INT POOP Multiplier: x' + STAT_SCORE_MULT.toFixed(2), GW/2, 182);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('POOP: ' + score, GW/2, 205);

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Total: ' + (totalScore + score), GW/2, 225);

  // New track record
  if (score > (TAS.score.load('radracer_tr' + currentTrack) || 0)) {
    var recPulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = recPulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('NEW GARDEN RECORD!', GW/2, 245);
    ctx.globalAlpha = 1;
  }

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY FOR NEXT GARDEN', GW/2, GH - 30);
  ctx.globalAlpha = 1;
}

function drawContinueScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('SPORES FADING!', GW/2, 80);

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FEED YOUR BASELING?', GW/2, 130);

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText('Lives Remaining: ' + continues, GW/2, 160);

  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('(CON ' + statB.con + ' bonus continues)', GW/2, 180);

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawGameOverScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORES DEPLETED!', GW/2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Track: ' + TRACKS[currentTrack].name, GW/2, 100);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('POOP Tokens: ' + totalScore, GW/2, 135);

  if (totalScore >= highScore && totalScore > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 165);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, 165);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Gardens Cleared: ' + currentTrack + '/' + TRACKS.length, GW/2, 200);

  // Stat summary
  ctx.fillStyle = '#38d973';
  ctx.font = '9px monospace';
  ctx.fillText('Driver: ' + (statB.name || 'Baseling') + (statB.level > 0 ? ' Lv' + statB.level : ''), GW/2, 225);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 30);
  ctx.globalAlpha = 1;
}

function drawChampionScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (frame % 8 === 0) {
    var px = Math.random() * GW;
    var colors = ['#ff4444','#44ff88','#ffdd44','#4488ff','#ff44ff','#00ffff'];
    TAS.particles.spawn(px, GH + 10, colors[Math.floor(Math.random()*6)], 5, 3, { gravity: -0.05, size: 2 });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('GARDEN CHAMPION!', GW/2, 50);

  ctx.fillStyle = '#38d973';
  ctx.font = '14px monospace';
  ctx.fillText('All 8 gardens conquered!', GW/2, 80);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('Final Score: ' + totalScore, GW/2, 120);

  if (totalScore >= highScore) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW RECORD!', GW/2, 150);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Every garden bows before your baseling racer.', GW/2, 185);
  ctx.fillText('POOP tokens rain from the fungal canopy.', GW/2, 203);
  ctx.fillText('The mycelial network pulses with your victory.', GW/2, 221);

  // Champion stat summary
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '10px monospace';
  ctx.fillText((statB.name || 'Baseling') + ' - Champion of the Spore Grand Prix', GW/2, 250);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 30);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
