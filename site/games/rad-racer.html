<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rad Racer: Tasern Circuit</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'ACCEL', b: 'TURBO' } });

var state = 'title';
var score = 0;
var highScore = TAS.score.load('radracer_hi');
var frame = 0;

// === ROAD CONSTANTS ===
var SEG_LENGTH = 200;    // length of each segment in world units
var DRAW_DIST = 150;     // how many segments to draw
var ROAD_WIDTH = 2000;   // half-width of road in world units
var CAM_HEIGHT = 1500;   // camera height
var CAM_DEPTH = 0.84;    // camera depth (FOV factor)
var TOTAL_SEGMENTS = 0;

// === TRACK DEFINITIONS ===
var TRACKS = [
  { name: 'COASTAL HIGHWAY', sky1: '#1a5276', sky2: '#f39c12', grass1: '#1e8449', grass2: '#145a32',
    road1: '#444', road2: '#333', rumble1: '#cc0000', rumble2: '#fff', stripe: '#fff',
    fog: '#aaddee', fogDens: 0.0005, scenery: 'coast', segments: 800, timeLimit: 45,
    checkpoints: [200, 400, 600], curves: 0.6, hills: 0.4 },
  { name: 'DESERT STRAIGHT', sky1: '#f4d03f', sky2: '#e67e22', grass1: '#b7950b', grass2: '#9a7d0a',
    road1: '#555', road2: '#444', rumble1: '#e67e22', rumble2: '#fff', stripe: '#fff',
    fog: '#ffe0a0', fogDens: 0.0003, scenery: 'desert', segments: 900, timeLimit: 42,
    checkpoints: [225, 450, 675], curves: 0.3, hills: 0.2 },
  { name: 'MOUNTAIN PASS', sky1: '#2c3e50', sky2: '#5dade2', grass1: '#566573', grass2: '#2c3e50',
    road1: '#3a3a3a', road2: '#2a2a2a', rumble1: '#fff', rumble2: '#cc0000', stripe: '#ffdd00',
    fog: '#8899bb', fogDens: 0.0008, scenery: 'mountain', segments: 700, timeLimit: 48,
    checkpoints: [175, 350, 525], curves: 1.2, hills: 1.0 },
  { name: 'NIGHT CITY', sky1: '#0a0a2a', sky2: '#1a1a3a', grass1: '#1a1a2e', grass2: '#0d0d1a',
    road1: '#222', road2: '#1a1a1a', rumble1: '#ffdd00', rumble2: '#222', stripe: '#ffdd00',
    fog: '#111133', fogDens: 0.001, scenery: 'city', segments: 750, timeLimit: 46,
    checkpoints: [187, 375, 562], curves: 0.8, hills: 0.3 },
  { name: 'RAINY FOREST', sky1: '#2d3436', sky2: '#636e72', grass1: '#1e3a1e', grass2: '#0f260f',
    road1: '#2a2a2a', road2: '#222', rumble1: '#555', rumble2: '#333', stripe: '#aaa',
    fog: '#556655', fogDens: 0.0012, scenery: 'forest', segments: 700, timeLimit: 50,
    checkpoints: [175, 350, 525], curves: 0.9, hills: 0.6 },
  { name: 'SNOWY PEAK', sky1: '#dfe6e9', sky2: '#b2bec3', grass1: '#dfe6e9', grass2: '#b2bec3',
    road1: '#667', road2: '#556', rumble1: '#ff4444', rumble2: '#fff', stripe: '#333',
    fog: '#eeeeff', fogDens: 0.0006, scenery: 'snow', segments: 650, timeLimit: 52,
    checkpoints: [162, 325, 487], curves: 1.0, hills: 0.8 },
  { name: 'VOLCANO ROAD', sky1: '#2c0000', sky2: '#ff4500', grass1: '#1a0000', grass2: '#330000',
    road1: '#222', road2: '#111', rumble1: '#ff6600', rumble2: '#ffdd00', stripe: '#ff4444',
    fog: '#440000', fogDens: 0.0004, scenery: 'volcano', segments: 600, timeLimit: 48,
    checkpoints: [150, 300, 450], curves: 1.1, hills: 0.9 },
  { name: 'FINAL CIRCUIT', sky1: '#0a0020', sky2: '#4a0080', grass1: '#1a0a30', grass2: '#0d0520',
    road1: '#333', road2: '#222', rumble1: '#ff00ff', rumble2: '#00ffff', stripe: '#fff',
    fog: '#220044', fogDens: 0.0003, scenery: 'final', segments: 1000, timeLimit: 55,
    checkpoints: [200, 400, 600, 800], curves: 1.3, hills: 1.1 }
];

// === GAME STATE ===
var currentTrack = 0;
var segments = [];
var playerX = 0;      // -1 to 1, lateral position
var playerSpeed = 0;
var maxSpeed = 300;    // km/h display, actual is segment-based
var position = 0;     // world z position
var timeLeft = 0;
var checkpointIndex = 0;
var turboCount = 0;
var turboTimer = 0;
var gear = 1;         // 1=low, 2=high
var spinTimer = 0;
var crashTimer = 0;
var distanceTraveled = 0;
var cleanDriving = 0;
var trackProgress = 0; // saved progress
var totalScore = 0;
var lapComplete = false;
var traffic = [];
var speedKmh = 0;
var enginePitch = 0;
var engineTimer = 0;
var rainDrops = [];
var steerInput = 0;

// === LOAD PROGRESS ===
try { trackProgress = parseInt(localStorage.getItem('radracer_progress') || '0', 10); } catch(e) { trackProgress = 0; }

// === BUILD TRACK ===
function buildTrack(trackIdx) {
  var t = TRACKS[trackIdx];
  segments = [];
  TOTAL_SEGMENTS = t.segments;
  var curveStr = t.curves;
  var hillStr = t.hills;

  for (var i = 0; i < TOTAL_SEGMENTS; i++) {
    var curve = 0;
    var hill = 0;

    // Generate curves using sine waves for smooth transitions
    var pct = i / TOTAL_SEGMENTS;
    curve = Math.sin(pct * Math.PI * 6) * curveStr * 3;
    curve += Math.sin(pct * Math.PI * 2.3) * curveStr * 2;
    curve += Math.sin(pct * Math.PI * 11) * curveStr * 0.5;

    // Hills
    hill = Math.sin(pct * Math.PI * 4) * hillStr * 40;
    hill += Math.sin(pct * Math.PI * 7.7) * hillStr * 20;
    hill += Math.cos(pct * Math.PI * 13) * hillStr * 10;

    // Scenery objects
    var sceneryLeft = null;
    var sceneryRight = null;
    if (Math.random() < 0.06) sceneryLeft = getSceneryObject(t.scenery);
    if (Math.random() < 0.06) sceneryRight = getSceneryObject(t.scenery);

    segments.push({
      curve: curve,
      y: hill,
      sceneryL: sceneryLeft,
      sceneryR: sceneryRight,
      isCheckpoint: t.checkpoints.indexOf(i) >= 0
    });
  }

  // Place traffic
  traffic = [];
  var trafficCount = 8 + trackIdx * 3;
  for (var j = 0; j < trafficCount; j++) {
    traffic.push({
      segment: Math.floor(50 + Math.random() * (TOTAL_SEGMENTS - 100)),
      lane: (Math.random() - 0.5) * 1.2,
      speed: 0.3 + Math.random() * 0.4,
      color: ['#e74c3c','#3498db','#27ae60','#f1c40f','#9b59b6','#e67e22'][Math.floor(Math.random()*6)],
      w: 40 + Math.random() * 20,
      h: 30 + Math.random() * 15
    });
  }
}

function getSceneryObject(type) {
  var r = Math.random();
  var offset = 1.2 + Math.random() * 2.5;
  switch(type) {
    case 'coast':
      if (r < 0.5) return { type: 'palm', offset: offset };
      if (r < 0.8) return { type: 'sign', offset: offset };
      return { type: 'rock', offset: offset };
    case 'desert':
      if (r < 0.5) return { type: 'cactus', offset: offset };
      if (r < 0.8) return { type: 'rock', offset: offset };
      return { type: 'skull', offset: offset };
    case 'mountain':
      if (r < 0.4) return { type: 'pine', offset: offset };
      if (r < 0.7) return { type: 'rock', offset: offset };
      return { type: 'guardrail', offset: 1.05 };
    case 'city':
      if (r < 0.4) return { type: 'building', offset: offset };
      if (r < 0.7) return { type: 'neon', offset: offset };
      return { type: 'lamppost', offset: 1.1 };
    case 'forest':
      if (r < 0.6) return { type: 'tree', offset: offset };
      if (r < 0.8) return { type: 'bush', offset: offset };
      return { type: 'mushroom', offset: offset };
    case 'snow':
      if (r < 0.5) return { type: 'pine_snow', offset: offset };
      if (r < 0.8) return { type: 'snowman', offset: offset };
      return { type: 'ice_rock', offset: offset };
    case 'volcano':
      if (r < 0.4) return { type: 'lava_rock', offset: offset };
      if (r < 0.7) return { type: 'dead_tree', offset: offset };
      return { type: 'flame_vent', offset: offset };
    default:
      if (r < 0.3) return { type: 'crystal', offset: offset };
      if (r < 0.6) return { type: 'neon', offset: offset };
      return { type: 'obelisk', offset: offset };
  }
}

// === START GAME ===
function startGame() {
  currentTrack = 0;
  totalScore = 0;
  startTrack(currentTrack);
  state = 'playing';
}

function startTrack(idx) {
  currentTrack = idx;
  buildTrack(idx);
  var t = TRACKS[idx];
  playerX = 0;
  playerSpeed = 0;
  position = 0;
  timeLeft = t.timeLimit;
  checkpointIndex = 0;
  turboCount = 3;
  turboTimer = 0;
  gear = 1;
  spinTimer = 0;
  crashTimer = 0;
  distanceTraveled = 0;
  cleanDriving = 0;
  lapComplete = false;
  speedKmh = 0;
  steerInput = 0;
  rainDrops = [];
  if (t.scenery === 'forest') {
    for (var i = 0; i < 60; i++) {
      rainDrops.push({ x: Math.random() * GW, y: Math.random() * GH, speed: 4 + Math.random() * 6 });
    }
  }
  state = 'trackIntro';
  frame = 0;
}

function nextTrack() {
  totalScore += score;
  currentTrack++;
  if (currentTrack >= TRACKS.length) {
    state = 'champion';
    if (totalScore > highScore) {
      highScore = totalScore;
      TAS.score.save('radracer_hi', highScore);
    }
  } else {
    startTrack(currentTrack);
  }
}

function gameOver() {
  totalScore += score;
  if (totalScore > highScore) {
    highScore = totalScore;
    TAS.score.save('radracer_hi', highScore);
  }
  if (currentTrack > trackProgress) {
    trackProgress = currentTrack;
    try { localStorage.setItem('radracer_progress', String(trackProgress)); } catch(e) { /* visible in console */ console.warn('Failed to save progress:', e); }
  }
  state = 'gameOver';
}

// === PSEUDO-3D PROJECTION ===
function project(x, y, z, camX, camY, camZ) {
  // z is distance from camera
  var scale = CAM_DEPTH / z;
  var projX = GW / 2 + (x - camX) * scale * GW / 2;
  var projY = GH / 2 - (y - camY) * scale * GH / 2;
  var projW = scale * ROAD_WIDTH * GW / 2;
  return { x: projX, y: projY, w: projW, scale: scale };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'trackIntro') {
    if (frame > 120 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
      frame = 0;
    }
    return;
  }

  if (state === 'trackComplete') {
    if (frame > 90 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      nextTrack();
    }
    return;
  }

  if (state === 'gameOver' || state === 'champion') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  // === TIMER ===
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver();
    return;
  }

  // === CRASH/SPIN RECOVERY ===
  if (spinTimer > 0) {
    spinTimer -= dt;
    playerSpeed *= 0.95;
    if (spinTimer <= 0) { spinTimer = 0; }
    return;
  }
  if (crashTimer > 0) {
    crashTimer -= dt;
    playerSpeed = 0;
    if (crashTimer <= 0) { crashTimer = 0; }
    return;
  }

  // === INPUT ===
  var accel = keys['ArrowUp'] || keys['KeyW'] || keys['w'] || touch.up || touch.a;
  var brake = keys['ArrowDown'] || keys['KeyS'] || keys['s'] || touch.down;
  var steerL = keys['ArrowLeft'] || keys['KeyA'] || keys['a'] || touch.left;
  var steerR = keys['ArrowRight'] || keys['KeyD'] || keys['d'] || touch.right;
  var turboKey = keys['Space'] || keys[' '] || touch.b;
  var gearKey = keys['ShiftLeft'] || keys['ShiftRight'] || keys['Shift'];

  // Gear toggle
  if (gearKey && !this._gearHeld) { gear = gear === 1 ? 2 : 1; }
  this._gearHeld = gearKey;

  // === TURBO ===
  if (turboKey && turboCount > 0 && turboTimer <= 0 && playerSpeed > maxSpeed * 0.5) {
    turboTimer = 2.0;
    turboCount--;
    TAS.audio.playTone(800, 0.3, 'sawtooth', 0.12, 1200);
    TAS.fx.flash('#ff8800', 0.3);
  }
  if (turboTimer > 0) turboTimer -= dt;

  // === SPEED ===
  var topSpeed = gear === 1 ? 0.7 : 1.0;
  var accelRate = gear === 1 ? 0.8 : 0.5;
  if (turboTimer > 0) { topSpeed = 1.4; accelRate = 1.2; }

  var targetSpeed = 0;
  if (accel) targetSpeed = topSpeed;
  if (brake) targetSpeed = -0.2;

  if (accel) {
    playerSpeed += accelRate * dt;
    if (playerSpeed > topSpeed) playerSpeed = topSpeed;
  } else if (brake) {
    playerSpeed -= 1.5 * dt;
    if (playerSpeed < 0) playerSpeed = 0;
  } else {
    // Coast deceleration
    playerSpeed -= 0.3 * dt;
    if (playerSpeed < 0) playerSpeed = 0;
  }

  speedKmh = Math.floor(playerSpeed * maxSpeed);

  // === STEERING ===
  var steerSpeed = 2.5 * dt;
  if (speedKmh > 200) steerSpeed *= 0.6; // harder to steer at high speed
  if (speedKmh > 250) steerSpeed *= 0.7;
  if (turboTimer > 0) steerSpeed *= 0.5;

  // Slippery conditions
  var t = TRACKS[currentTrack];
  if (t.scenery === 'forest') steerSpeed *= 0.75;
  if (t.scenery === 'snow') steerSpeed *= 0.65;

  if (steerL) { steerInput -= steerSpeed; }
  else if (steerR) { steerInput += steerSpeed; }
  else { steerInput *= 0.85; } // auto-center

  steerInput = TAS.math.clamp(steerInput, -1.5, 1.5);
  playerX += steerInput * dt * (1 + playerSpeed);

  // === ROAD CURVE PULL ===
  var segIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  var curSeg = segments[segIdx];
  if (curSeg) {
    playerX += curSeg.curve * playerSpeed * dt * 0.3;
  }

  // === OFFROAD ===
  if (Math.abs(playerX) > 1.0) {
    playerSpeed *= 0.97; // slow on grass
    if (Math.abs(playerX) > 1.8) {
      // Hit scenery zone
      playerSpeed *= 0.9;
    }
    if (Math.abs(playerX) > 2.5) {
      // Way off road - crash
      triggerCrash();
      return;
    }
  }

  // === MOVE FORWARD ===
  position += playerSpeed * SEG_LENGTH * dt * 60;
  distanceTraveled += playerSpeed * dt * 60;

  // === CHECKPOINT ===
  var curSegNum = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  if (curSegNum >= TOTAL_SEGMENTS - 5 && playerSpeed > 0) {
    lapComplete = true;
    var timeBonus = Math.floor(timeLeft * 100);
    var cleanBonus = Math.floor(cleanDriving * 10);
    score = Math.floor(distanceTraveled) + timeBonus + cleanBonus;
    state = 'trackComplete';
    frame = 0;
    TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1047,0.3]], 150);
    return;
  }

  // Check for checkpoint time extension
  var checkpoints = TRACKS[currentTrack].checkpoints;
  if (checkpointIndex < checkpoints.length && curSegNum >= checkpoints[checkpointIndex]) {
    timeLeft += 15;
    checkpointIndex++;
    TAS.audio.playTone(880, 0.2, 'square', 0.1);
    TAS.audio.playTone(1100, 0.2, 'square', 0.08);
    TAS.fx.flash('#00ff88', 0.2);
  }

  // === TRAFFIC COLLISION ===
  for (var i = 0; i < traffic.length; i++) {
    var car = traffic[i];
    var carSeg = car.segment;
    var dist = (carSeg * SEG_LENGTH - position);
    if (dist < 0) dist += TOTAL_SEGMENTS * SEG_LENGTH;
    // Near player?
    if (dist > 0 && dist < SEG_LENGTH * 2) {
      var laneDiff = Math.abs(playerX - car.lane);
      if (laneDiff < 0.35) {
        triggerSpin();
        // Shove traffic
        car.lane += (playerX < car.lane ? 0.5 : -0.5);
        break;
      }
    }
  }

  // Update traffic positions
  for (var j = 0; j < traffic.length; j++) {
    traffic[j].segment += traffic[j].speed * dt * 20;
    if (traffic[j].segment >= TOTAL_SEGMENTS) traffic[j].segment -= TOTAL_SEGMENTS;
  }

  // === CLEAN DRIVING ===
  if (Math.abs(playerX) < 0.8 && spinTimer <= 0 && crashTimer <= 0) {
    cleanDriving += dt;
  }

  // === ENGINE SOUND ===
  engineTimer -= dt;
  if (engineTimer <= 0 && playerSpeed > 0.1) {
    enginePitch = 60 + speedKmh * 2;
    TAS.audio.playTone(enginePitch, 0.08, 'sawtooth', 0.02 + playerSpeed * 0.02);
    engineTimer = 0.06;
  }

  // === RAIN ===
  if (t.scenery === 'forest') {
    for (var k = 0; k < rainDrops.length; k++) {
      rainDrops[k].y += rainDrops[k].speed;
      rainDrops[k].x -= 1;
      if (rainDrops[k].y > GH) { rainDrops[k].y = 0; rainDrops[k].x = Math.random() * GW; }
    }
  }
}

function triggerSpin() {
  spinTimer = 1.2;
  playerSpeed *= 0.4;
  TAS.fx.shake(8, 0.85);
  TAS.audio.playNoise(0.4, 0.12, 800);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 80);
  TAS.particles.spawn(GW/2, GH - 60, '#ffaa00', 15, 4, { gravity: 0.1 });
}

function triggerCrash() {
  crashTimer = 2.0;
  playerSpeed = 0;
  TAS.fx.shake(12, 0.8);
  TAS.fx.flash('#ff0000', 0.4);
  TAS.audio.playNoise(0.6, 0.15, 400);
  TAS.audio.playTone(100, 0.5, 'sawtooth', 0.12, 40);
  TAS.particles.spawn(GW/2, GH - 60, '#ff4400', 25, 5, { gravity: 0.2, size: 3 });
  TAS.particles.spawn(GW/2, GH - 60, '#ffdd00', 15, 3, { gravity: 0.05, size: 2 });
  timeLeft -= 3; // penalty
  if (timeLeft < 0) timeLeft = 0;
}

// === DRAW ===
function draw(dt) {
  var t = TRACKS[currentTrack] || TRACKS[0];

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'trackIntro') {
    drawTrackIntro(t);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'champion') {
    drawChampionScreen();
    return;
  }

  if (state === 'trackComplete') {
    drawTrackComplete(t);
    return;
  }

  // === DRAW PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  // Sky gradient
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH / 2);
  skyGrad.addColorStop(0, t.sky1);
  skyGrad.addColorStop(1, t.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH / 2);

  // Stars for night/volcano/final
  if (t.scenery === 'city' || t.scenery === 'volcano' || t.scenery === 'final') {
    ctx.fillStyle = '#fff';
    for (var s = 0; s < 30; s++) {
      var sx = (s * 73 + frame * 0.02) % GW;
      var sy = (s * 37) % (GH / 3);
      var twinkle = Math.sin(frame * 0.03 + s) * 0.5 + 0.5;
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillRect(sx, sy, 1, 1);
    }
    ctx.globalAlpha = 1;
  }

  // Ground fill (below horizon)
  ctx.fillStyle = t.grass1;
  ctx.fillRect(0, GH / 2, GW, GH / 2);

  // === RENDER ROAD ===
  var baseSegment = Math.floor(position / SEG_LENGTH);
  var baseOffset = (position % SEG_LENGTH) / SEG_LENGTH;

  var maxy = GH; // clip from bottom up
  var camX = playerX * ROAD_WIDTH;
  var camY = CAM_HEIGHT;
  var curveAccum = 0;
  var hillAccum = 0;

  // Store projected segments for scenery drawing
  var projSegs = [];

  for (var n = 1; n < DRAW_DIST; n++) {
    var segNum = (baseSegment + n) % TOTAL_SEGMENTS;
    var seg = segments[segNum];
    if (!seg) continue;

    curveAccum += seg.curve;
    hillAccum += seg.y;

    var z = (n - baseOffset) * SEG_LENGTH;
    if (z <= 0) continue;

    var worldX = curveAccum * SEG_LENGTH * 0.01;
    var worldY = hillAccum * 0.5;

    var p = project(worldX, worldY, z, camX, camY, 0);

    if (p.y >= maxy) continue; // behind already drawn road (hill occlusion)

    // Fog factor
    var fogFactor = 1 - Math.exp(-t.fogDens * z * z * 0.00001);
    fogFactor = TAS.math.clamp(fogFactor, 0, 0.9);

    projSegs.push({ p: p, segNum: segNum, seg: seg, n: n, fog: fogFactor, z: z });
  }

  // Draw from far to near
  for (var i = projSegs.length - 1; i >= 0; i--) {
    var ps = projSegs[i];
    var p = ps.p;
    var seg = ps.seg;
    var segNum = ps.segNum;
    var fogFactor = ps.fog;

    var nextPs = i > 0 ? projSegs[i-1] : null;
    var py2 = nextPs ? nextPs.p.y : GH;
    var pw2 = nextPs ? nextPs.p.w : p.w * 1.5;

    var segHeight = py2 - p.y;
    if (segHeight <= 0) continue;

    var isEven = (segNum % 2 === 0);

    // Grass
    var grassColor = isEven ? t.grass1 : t.grass2;
    ctx.fillStyle = applyFog(grassColor, t.fog, fogFactor);
    ctx.fillRect(0, p.y, GW, segHeight + 1);

    // Rumble strips
    var rumbleW = p.w * 1.15;
    var rumbleColor = isEven ? t.rumble1 : t.rumble2;
    ctx.fillStyle = applyFog(rumbleColor, t.fog, fogFactor);
    ctx.fillRect(p.x - rumbleW, p.y, rumbleW * 2, segHeight + 1);

    // Road surface
    var roadColor = isEven ? t.road1 : t.road2;
    ctx.fillStyle = applyFog(roadColor, t.fog, fogFactor);
    ctx.fillRect(p.x - p.w, p.y, p.w * 2, segHeight + 1);

    // Center stripe
    if (isEven) {
      var stripeW = p.w * 0.02;
      ctx.fillStyle = applyFog(t.stripe, t.fog, fogFactor);
      ctx.fillRect(p.x - stripeW, p.y, stripeW * 2, segHeight + 1);
    }

    // Lane markers
    if (isEven) {
      ctx.fillStyle = applyFog(t.stripe, t.fog, fogFactor * 1.2);
      var laneW = p.w * 0.01;
      ctx.fillRect(p.x - p.w * 0.5 - laneW, p.y, laneW * 2, segHeight + 1);
      ctx.fillRect(p.x + p.w * 0.5 - laneW, p.y, laneW * 2, segHeight + 1);
    }

    // Checkpoint banner
    if (seg.isCheckpoint && ps.n < 30) {
      ctx.fillStyle = 'rgba(0,255,100,0.3)';
      ctx.fillRect(p.x - p.w, p.y, p.w * 2, 3);
      ctx.fillStyle = '#00ff66';
      ctx.font = Math.max(6, Math.floor(p.scale * 600)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CHECKPOINT', p.x, p.y - 2);
    }

    // Draw scenery objects
    if (seg.sceneryL && ps.n < 80) {
      drawSceneryObject(seg.sceneryL, p.x - p.w * seg.sceneryL.offset, p.y, p.scale, fogFactor, t);
    }
    if (seg.sceneryR && ps.n < 80) {
      drawSceneryObject(seg.sceneryR, p.x + p.w * seg.sceneryR.offset, p.y, p.scale, fogFactor, t);
    }

    maxy = Math.min(maxy, p.y);
  }

  // === DRAW TRAFFIC ===
  for (var ti = 0; ti < traffic.length; ti++) {
    var car = traffic[ti];
    var carDist = (car.segment - baseSegment);
    if (carDist < 0) carDist += TOTAL_SEGMENTS;
    if (carDist > 0 && carDist < DRAW_DIST) {
      var cz = carDist * SEG_LENGTH;
      var cAccum = 0;
      var hAccum = 0;
      for (var ci = 1; ci <= Math.min(carDist, DRAW_DIST); ci++) {
        var csn = (baseSegment + ci) % TOTAL_SEGMENTS;
        if (segments[csn]) { cAccum += segments[csn].curve; hAccum += segments[csn].y; }
      }
      var cwx = cAccum * SEG_LENGTH * 0.01 + car.lane * ROAD_WIDTH;
      var cwy = hAccum * 0.5;
      var cp = project(cwx, cwy, cz, camX, camY, 0);
      if (cp.y < GH && cp.y > 30) {
        var cw = car.w * cp.scale * 400;
        var ch = car.h * cp.scale * 400;
        ctx.fillStyle = car.color;
        ctx.fillRect(cp.x - cw/2, cp.y - ch, cw, ch);
        // Windshield
        ctx.fillStyle = '#222';
        ctx.fillRect(cp.x - cw*0.35, cp.y - ch*0.85, cw*0.7, ch*0.3);
        // Taillights
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(cp.x - cw*0.45, cp.y - ch*0.2, cw*0.15, ch*0.15);
        ctx.fillRect(cp.x + cw*0.3, cp.y - ch*0.2, cw*0.15, ch*0.15);
      }
    }
  }

  // === DRAW PLAYER CAR ===
  drawPlayerCar();

  // === SPEED LINES ===
  if (speedKmh > 180) {
    var lineAlpha = (speedKmh - 180) / 120;
    ctx.strokeStyle = 'rgba(255,255,255,' + (lineAlpha * 0.4) + ')';
    ctx.lineWidth = 1;
    for (var sl = 0; sl < 8; sl++) {
      var slx = (sl * 67 + frame * 3) % GW;
      var sly = GH * 0.4 + sl * 15;
      ctx.beginPath();
      ctx.moveTo(slx, sly);
      ctx.lineTo(slx - 20 - speedKmh * 0.1, sly + 30 + sl * 5);
      ctx.stroke();
    }
  }

  // === RAIN ===
  if (TRACKS[currentTrack].scenery === 'forest') {
    ctx.strokeStyle = 'rgba(180,200,255,0.4)';
    ctx.lineWidth = 1;
    for (var ri = 0; ri < rainDrops.length; ri++) {
      var rd = rainDrops[ri];
      ctx.beginPath();
      ctx.moveTo(rd.x, rd.y);
      ctx.lineTo(rd.x - 2, rd.y + 8);
      ctx.stroke();
    }
  }

  // === TURBO FLAMES ===
  if (turboTimer > 0) {
    var flameSize = 8 + Math.sin(frame * 0.5) * 4;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(GW/2 - 25, GH - 35);
    ctx.lineTo(GW/2 - 25 - flameSize, GH - 35 + flameSize * 2);
    ctx.lineTo(GW/2 - 20, GH - 35 + flameSize);
    ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath();
    ctx.moveTo(GW/2 + 25, GH - 35);
    ctx.lineTo(GW/2 + 25 + flameSize, GH - 35 + flameSize * 2);
    ctx.lineTo(GW/2 + 20, GH - 35 + flameSize);
    ctx.fill();
  }

  TAS.particles.draw();
  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}

function drawPlayerCar() {
  var cx = GW / 2 + steerInput * 15;
  var cy = GH - 50;

  // Spin animation
  if (spinTimer > 0) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(spinTimer * 8);
    ctx.translate(-cx, -cy);
  }

  // Crash animation
  if (crashTimer > 0) {
    ctx.save();
    ctx.translate(cx, cy);
    var crashShake = Math.sin(crashTimer * 20) * 5;
    ctx.translate(crashShake, Math.abs(crashShake) * 0.5);
    ctx.translate(-cx, -cy);
  }

  // Car body
  ctx.fillStyle = '#2244cc';
  // Main body
  ctx.fillRect(cx - 22, cy - 15, 44, 35);
  // Roof/cabin
  ctx.fillStyle = '#1a3399';
  ctx.fillRect(cx - 16, cy - 22, 32, 12);
  // Windshield
  ctx.fillStyle = '#88ccff';
  ctx.fillRect(cx - 13, cy - 20, 26, 8);
  // Hood stripe (reactor glow)
  ctx.fillStyle = turboTimer > 0 ? '#ff6600' : '#44ffaa';
  ctx.fillRect(cx - 3, cy - 10, 6, 20);
  // Wheels
  ctx.fillStyle = '#111';
  ctx.fillRect(cx - 26, cy - 8, 6, 14);
  ctx.fillRect(cx + 20, cy - 8, 6, 14);
  ctx.fillRect(cx - 26, cy + 12, 6, 14);
  ctx.fillRect(cx + 20, cy + 12, 6, 14);
  // Taillights
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(cx - 20, cy + 17, 8, 3);
  ctx.fillRect(cx + 12, cy + 17, 8, 3);
  // Headlights
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(cx - 18, cy - 14, 6, 3);
  ctx.fillRect(cx + 12, cy - 14, 6, 3);

  if (spinTimer > 0) ctx.restore();
  if (crashTimer > 0) ctx.restore();

  // Sparks during spin/crash
  if (spinTimer > 0 || crashTimer > 0) {
    if (frame % 3 === 0) {
      TAS.particles.spawn(cx + TAS.math.randRange(-20, 20), cy + 15, '#ffaa00', 2, 2, { gravity: 0.15, size: 1 });
    }
  }
}

function drawSceneryObject(obj, x, y, scale, fog, track) {
  var s = scale * 500;
  if (s < 2) return;
  var alpha = 1 - fog;
  ctx.globalAlpha = alpha;

  switch(obj.type) {
    case 'palm':
      ctx.fillStyle = '#5d4e37';
      ctx.fillRect(x - s*0.1, y - s*2.5, s*0.2, s*2.5);
      ctx.fillStyle = '#228B22';
      ctx.beginPath();
      ctx.arc(x, y - s*2.8, s*0.8, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'sign':
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.05, y - s*1.5, s*0.1, s*1.5);
      ctx.fillStyle = '#2255aa';
      ctx.fillRect(x - s*0.5, y - s*2, s*1, s*0.6);
      break;
    case 'rock':
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.moveTo(x - s*0.4, y);
      ctx.lineTo(x - s*0.2, y - s*0.6);
      ctx.lineTo(x + s*0.3, y - s*0.5);
      ctx.lineTo(x + s*0.4, y);
      ctx.fill();
      break;
    case 'cactus':
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(x - s*0.1, y - s*2, s*0.2, s*2);
      ctx.fillRect(x - s*0.5, y - s*1.5, s*0.15, s*0.8);
      ctx.fillRect(x + s*0.35, y - s*1.2, s*0.15, s*0.7);
      break;
    case 'skull':
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(x - s*0.1, y - s*0.35, s*0.06, 0, Math.PI * 2);
      ctx.arc(x + s*0.1, y - s*0.35, s*0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'pine':
    case 'pine_snow':
      ctx.fillStyle = '#4a2800';
      ctx.fillRect(x - s*0.08, y - s*0.5, s*0.16, s*0.5);
      ctx.fillStyle = obj.type === 'pine_snow' ? '#446655' : '#1a5e1a';
      ctx.beginPath();
      ctx.moveTo(x, y - s*2.5);
      ctx.lineTo(x - s*0.6, y - s*0.5);
      ctx.lineTo(x + s*0.6, y - s*0.5);
      ctx.fill();
      if (obj.type === 'pine_snow') {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x, y - s*2.5);
        ctx.lineTo(x - s*0.3, y - s*1.8);
        ctx.lineTo(x + s*0.3, y - s*1.8);
        ctx.fill();
      }
      break;
    case 'guardrail':
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x - s*0.5, y - s*0.5, s*1, s*0.1);
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.3, y - s*0.5, s*0.06, s*0.5);
      ctx.fillRect(x + s*0.25, y - s*0.5, s*0.06, s*0.5);
      break;
    case 'building':
      var bh = s * (2 + Math.sin(x) * 1.5);
      ctx.fillStyle = '#334';
      ctx.fillRect(x - s*0.6, y - bh, s*1.2, bh);
      // Windows
      ctx.fillStyle = '#ffdd44';
      for (var wy = 0; wy < bh - s*0.3; wy += s*0.4) {
        for (var wx = 0; wx < 3; wx++) {
          if (Math.random() > 0.3) {
            ctx.fillRect(x - s*0.4 + wx * s*0.3, y - bh + wy + s*0.1, s*0.15, s*0.2);
          }
        }
      }
      break;
    case 'neon':
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.05, y - s*2, s*0.1, s*2);
      var neonColor = ['#ff00ff','#00ffff','#ffff00','#ff4400'][Math.floor(Math.abs(x)) % 4];
      ctx.fillStyle = neonColor;
      ctx.globalAlpha = alpha * (0.6 + Math.sin(frame * 0.1 + x) * 0.4);
      ctx.fillRect(x - s*0.4, y - s*2.2, s*0.8, s*0.4);
      break;
    case 'lamppost':
      ctx.fillStyle = '#555';
      ctx.fillRect(x - s*0.04, y - s*2, s*0.08, s*2);
      ctx.fillStyle = '#ffdd66';
      ctx.beginPath();
      ctx.arc(x, y - s*2.1, s*0.15, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'tree':
      ctx.fillStyle = '#3d2200';
      ctx.fillRect(x - s*0.12, y - s*0.8, s*0.24, s*0.8);
      ctx.fillStyle = '#1a6b1a';
      ctx.beginPath();
      ctx.arc(x, y - s*1.5, s*0.7, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'bush':
      ctx.fillStyle = '#226622';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'mushroom':
      ctx.fillStyle = '#ddd';
      ctx.fillRect(x - s*0.06, y - s*0.4, s*0.12, s*0.4);
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.arc(x, y - s*0.5, s*0.25, 0, Math.PI, true);
      ctx.fill();
      break;
    case 'snowman':
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y - s*0.8, s*0.2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'ice_rock':
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.moveTo(x - s*0.3, y);
      ctx.lineTo(x, y - s*0.7);
      ctx.lineTo(x + s*0.35, y);
      ctx.fill();
      break;
    case 'lava_rock':
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(x - s*0.4, y);
      ctx.lineTo(x - s*0.1, y - s*0.8);
      ctx.lineTo(x + s*0.3, y - s*0.6);
      ctx.lineTo(x + s*0.4, y);
      ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.moveTo(x - s*0.1, y - s*0.5);
      ctx.lineTo(x, y - s*0.8);
      ctx.lineTo(x + s*0.1, y - s*0.5);
      ctx.fill();
      break;
    case 'dead_tree':
      ctx.fillStyle = '#2a1a0a';
      ctx.fillRect(x - s*0.08, y - s*1.5, s*0.16, s*1.5);
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = s*0.06;
      ctx.beginPath();
      ctx.moveTo(x, y - s*1.2);
      ctx.lineTo(x - s*0.4, y - s*1.8);
      ctx.moveTo(x, y - s*1.0);
      ctx.lineTo(x + s*0.3, y - s*1.5);
      ctx.stroke();
      break;
    case 'flame_vent':
      ctx.fillStyle = '#444';
      ctx.fillRect(x - s*0.15, y - s*0.3, s*0.3, s*0.3);
      if (frame % 10 < 6) {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(x - s*0.1, y - s*0.3);
        ctx.lineTo(x, y - s*1.2 - Math.sin(frame*0.2)*s*0.3);
        ctx.lineTo(x + s*0.1, y - s*0.3);
        ctx.fill();
      }
      break;
    case 'crystal':
      ctx.fillStyle = '#aa44ff';
      ctx.globalAlpha = alpha * (0.7 + Math.sin(frame * 0.05 + x) * 0.3);
      ctx.beginPath();
      ctx.moveTo(x, y - s*1.5);
      ctx.lineTo(x - s*0.3, y - s*0.3);
      ctx.lineTo(x + s*0.3, y - s*0.3);
      ctx.fill();
      ctx.fillStyle = '#cc88ff';
      ctx.beginPath();
      ctx.moveTo(x + s*0.1, y - s*1.2);
      ctx.lineTo(x - s*0.15, y - s*0.3);
      ctx.lineTo(x + s*0.2, y - s*0.5);
      ctx.fill();
      break;
    case 'obelisk':
      ctx.fillStyle = '#222';
      ctx.fillRect(x - s*0.15, y - s*2.5, s*0.3, s*2.5);
      ctx.fillStyle = '#00ffcc';
      ctx.globalAlpha = alpha * (0.5 + Math.sin(frame * 0.04 + x) * 0.5);
      ctx.fillRect(x - s*0.08, y - s*2.3, s*0.16, s*0.3);
      break;
  }
  ctx.globalAlpha = 1;
}

function applyFog(color, fogColor, fogFactor) {
  // Simple fog blending: lerp between color and fog
  if (fogFactor <= 0) return color;
  // Parse hex colors
  var r1 = parseInt(color.slice(1,3), 16) || parseInt(color.slice(1,2)+color.slice(1,2), 16);
  var g1 = parseInt(color.slice(3,5), 16) || parseInt(color.slice(2,3)+color.slice(2,3), 16);
  var b1 = parseInt(color.slice(5,7), 16) || parseInt(color.slice(3,4)+color.slice(3,4), 16);

  // Handle 3-char hex
  if (color.length === 4) {
    r1 = parseInt(color[1]+color[1], 16);
    g1 = parseInt(color[2]+color[2], 16);
    b1 = parseInt(color[3]+color[3], 16);
  }

  var r2 = parseInt(fogColor.slice(1,3), 16) || 0;
  var g2 = parseInt(fogColor.slice(3,5), 16) || 0;
  var b2 = parseInt(fogColor.slice(5,7), 16) || 0;

  if (fogColor.length === 4) {
    r2 = parseInt(fogColor[1]+fogColor[1], 16);
    g2 = parseInt(fogColor[2]+fogColor[2], 16);
    b2 = parseInt(fogColor[3]+fogColor[3], 16);
  }

  var r = Math.floor(r1 + (r2 - r1) * fogFactor);
  var g = Math.floor(g1 + (g2 - g1) * fogFactor);
  var b = Math.floor(b1 + (b2 - b1) * fogFactor);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';

  // Speed
  ctx.fillStyle = speedKmh > 250 ? '#ff4444' : (speedKmh > 180 ? '#ffaa00' : '#44ff88');
  ctx.fillText('SPD: ' + speedKmh + ' km/h', 5, 12);

  // Gear
  ctx.fillStyle = '#88ccff';
  ctx.fillText('G' + gear, 120, 12);

  // Time
  ctx.fillStyle = timeLeft < 10 ? '#ff4444' : '#ffdd44';
  ctx.textAlign = 'center';
  ctx.fillText('TIME: ' + Math.ceil(timeLeft), GW/2, 12);

  // Track name
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText(TRACKS[currentTrack].name, GW/2, 24);

  // Turbo
  ctx.textAlign = 'right';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ff8800';
  var turboStr = '';
  for (var i = 0; i < turboCount; i++) turboStr += 'T';
  ctx.fillText('TURBO: ' + turboStr, GW - 5, 12);

  // Track progress bar
  var segIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  var progress = segIdx / TOTAL_SEGMENTS;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(5, GH - 8, GW - 10, 4);
  ctx.fillStyle = '#44ff88';
  ctx.fillRect(5, GH - 8, (GW - 10) * progress, 4);

  // Checkpoint markers on progress bar
  var checkpoints = TRACKS[currentTrack].checkpoints;
  ctx.fillStyle = '#ffdd00';
  for (var c = 0; c < checkpoints.length; c++) {
    var cpx = 5 + (GW - 10) * (checkpoints[c] / TOTAL_SEGMENTS);
    ctx.fillRect(cpx - 1, GH - 10, 2, 8);
  }

  // Time warning flash
  if (timeLeft < 10 && Math.floor(frame / 15) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 28, GW, GH - 36);
  }

  // Checkpoint notification
  if (checkpointIndex > 0 && frame < 60) {
    ctx.globalAlpha = 1 - frame / 60;
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CHECKPOINT! +15s', GW/2, GH/2 - 20);
    ctx.globalAlpha = 1;
  }
}

function drawTitleScreen() {
  // Animated road background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  // Fake road perspective for title
  for (var i = 0; i < 40; i++) {
    var y = GH/2 + i * 4;
    var w = 20 + i * 6;
    var isEven = (Math.floor(i + frame * 0.05) % 2 === 0);
    ctx.fillStyle = isEven ? '#333' : '#444';
    ctx.fillRect(GW/2 - w, y, w * 2, 5);
    if (isEven) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(GW/2 - w - 10, y, 10, 5);
      ctx.fillRect(GW/2 + w, y, 10, 5);
    }
  }

  // Sky
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH/2);
  skyGrad.addColorStop(0, '#0a0020');
  skyGrad.addColorStop(1, '#4a0080');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH/2 + 10);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('RAD RACER', GW/2 + 2, 72);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('RAD RACER', GW/2, 70);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('TASERN CIRCUIT', GW/2, 95);

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Reactor-powered racing across Tasern', GW/2, 120);

  // Controls
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS/WASD = Steer & Accelerate', GW/2, 160);
  ctx.fillText('SPACE = Turbo Boost', GW/2, 175);
  ctx.fillText('SHIFT = Gear Toggle (Low/High)', GW/2, 190);

  // Track progress
  ctx.fillStyle = '#44ff88';
  ctx.font = '10px monospace';
  ctx.fillText('Tracks Unlocked: ' + (trackProgress + 1) + '/' + TRACKS.length, GW/2, 220);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('Best: ' + highScore, GW/2, 240);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO RACE', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawTrackIntro(t) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  // Sky preview
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH * 0.6);
  skyGrad.addColorStop(0, t.sky1);
  skyGrad.addColorStop(1, t.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH * 0.6);

  ctx.textAlign = 'center';

  // Track number
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('TRACK ' + (currentTrack + 1) + ' OF ' + TRACKS.length, GW/2, 80);

  // Track name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(t.name, GW/2, 120);

  // Time limit
  ctx.fillStyle = '#ffdd44';
  ctx.font = '14px monospace';
  ctx.fillText('Time Limit: ' + t.timeLimit + 's', GW/2, 160);

  // Checkpoints
  ctx.fillStyle = '#44ff88';
  ctx.font = '11px monospace';
  ctx.fillText('Checkpoints: ' + t.checkpoints.length + ' (+15s each)', GW/2, 185);

  // Turbo
  ctx.fillStyle = '#ff8800';
  ctx.fillText('Turbo Boosts: 3', GW/2, 205);

  // Difficulty indicator
  var diff = Math.floor((t.curves + t.hills) * 2.5);
  var diffStr = '';
  for (var d = 0; d < 5; d++) diffStr += d < diff ? '*' : '.';
  ctx.fillStyle = diff > 3 ? '#ff4444' : '#aaa';
  ctx.fillText('Difficulty: [' + diffStr + ']', GW/2, 230);

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawTrackComplete(t) {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('TRACK COMPLETE!', GW/2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText(t.name, GW/2, 90);

  var timeBonus = Math.floor(timeLeft * 100);
  var cleanBonus = Math.floor(cleanDriving * 10);
  var distScore = Math.floor(distanceTraveled);

  ctx.fillStyle = '#aaa';
  ctx.font = '12px monospace';
  ctx.fillText('Distance: ' + distScore, GW/2, 130);
  ctx.fillText('Time Bonus: +' + timeBonus, GW/2, 150);
  ctx.fillText('Clean Driving: +' + cleanBonus, GW/2, 170);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SCORE: ' + score, GW/2, 210);

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Total: ' + (totalScore + score), GW/2, 235);

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY FOR NEXT TRACK', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawGameOverScreen() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('TIME UP!', GW/2, 70);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Track: ' + TRACKS[currentTrack].name, GW/2, 110);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Score: ' + totalScore, GW/2, 150);

  if (totalScore >= highScore && totalScore > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 180);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, 180);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  ctx.fillText('Tracks Cleared: ' + currentTrack + '/' + TRACKS.length, GW/2, 220);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

function drawChampionScreen() {
  ctx.fillStyle = '#0a0020';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  if (frame % 8 === 0) {
    var px = Math.random() * GW;
    var colors = ['#ff4444','#44ff88','#ffdd44','#4488ff','#ff44ff','#00ffff'];
    TAS.particles.spawn(px, GH + 10, colors[Math.floor(Math.random()*6)], 5, 3, { gravity: -0.05, size: 2 });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('CHAMPION!', GW/2, 60);

  ctx.fillStyle = '#44ff88';
  ctx.font = '14px monospace';
  ctx.fillText('All 8 tracks completed!', GW/2, 95);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('Final Score: ' + totalScore, GW/2, 140);

  if (totalScore >= highScore) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW RECORD!', GW/2, 170);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('The Tasern Circuit bows to your speed.', GW/2, 210);
  ctx.fillText('Reactor power flows through your veins.', GW/2, 228);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH - 40);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
