<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single-player (default 0.8–1.6 band). The 12 derived STAT_* constants are reassigned from
// the clamped mults in recomputeStats() (D&D fields synthesized — option b in REMASTER-GUIDE)
// so a title-screen character change takes effect. Racing wiring: STR<-damage (crash/curve
// resist), DEX<-moveSpeed (top speed/handling), CON<-health (durability/lives), INT/CHA<-luck
// (score/item luck), WIS<-luck (turbo). Pseudo-3D road, no water — SWM is untouched.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[rad-racer] NftLoader display info failed:', e && e.message); }

// Derived stat bonuses — assigned in recomputeStats() from the clamped mults.
var STAT_CRASH_RESIST, STAT_TOP_SPEED, STAT_HANDLING, STAT_DURABILITY, STAT_EXTRA_LIVES,
    STAT_SCORE_MULT, STAT_TURBO_COOLDOWN, STAT_TURBO_DURATION, STAT_LUCK, STAT_ITEM_QUALITY,
    STAT_OFFROAD_RESIST, STAT_CURVE_RESIST;

// Map a clamped mult to the 1–20+ D&D scale centered on 10 (neutral = mult 1.0).
function dndFromMult(m) { return Math.max(1, Math.round(10 + (m - 1) * 25)); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dndFromMult(m.damage); statB.dex = dndFromMult(m.moveSpeed); statB.con = dndFromMult(m.health);
  statB.int = dndFromMult(m.luck);   statB.wis = dndFromMult(m.luck);      statB.cha = dndFromMult(m.luck);
  STAT_CRASH_RESIST   = Math.max(0.5, 1 - (statB.str - 10) * 0.03);  // crash recovery (lower = better)
  STAT_TOP_SPEED      = 1 + (statB.dex - 10) * 0.02;                 // top speed
  STAT_HANDLING       = 1 + (statB.dex - 10) * 0.015;               // steering responsiveness
  STAT_DURABILITY     = Math.max(1, 1 + (statB.con - 10) * 0.04);    // crash time reduction
  STAT_EXTRA_LIVES    = Math.floor(Math.max(0, statB.con - 14) / 3); // bonus continues
  STAT_SCORE_MULT     = 1 + (statB.int - 10) * 0.03;                // score multiplier
  STAT_TURBO_COOLDOWN = Math.max(0.3, 1 - (statB.wis - 10) * 0.04);  // turbo recharge
  STAT_TURBO_DURATION = 2.0 + (statB.wis - 10) * 0.08;              // turbo duration
  STAT_LUCK           = 1 + (statB.cha - 10) * 0.03;                // bonus item spawn
  STAT_ITEM_QUALITY   = 1 + (statB.cha - 10) * 0.02;               // better item rewards
  STAT_OFFROAD_RESIST = Math.max(0.9, 1 - (statB.str - 10) * 0.005); // less offroad speed loss
  STAT_CURVE_RESIST   = 1 - Math.min(0.4, (statB.str - 10) * 0.02);  // resist curve pull
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}
recomputeStats();

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'ACCEL', b: 'TURBO', c: 'PICK' } });

var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[rad-racer] player init failed:', e && e.message); });
}

var state = 'title';
var score = 0;
var highScore = TAS.score.load('radracer_hi');
var frame = 0;

// === ROAD CONSTANTS ===
var SEG_LENGTH = 200;
var DRAW_DIST = 150;
var ROAD_WIDTH = 2000;
var CAM_HEIGHT = 1500;
var CAM_DEPTH = 0.84;
var TOTAL_SEGMENTS = 0;

// === TRACK DEFINITIONS (Tasern-themed) ===
var TRACKS = [
  { name: 'GARDEN COAST', sky1: '#1a5276', sky2: '#f4b41b', grass1: '#1e8449', grass2: '#145a32',
    road1: '#444', road2: '#333', rumble1: '#e6482e', rumble2: '#fff', stripe: '#fff',
    fog: '#aaddee', fogDens: 0.0005, scenery: 'coast', segments: 800, timeLimit: 45,
    checkpoints: [200, 400, 600], curves: 0.6, hills: 0.4,
    boss: 'Mold Cruiser', bossColor: '#3cacd7', lore: 'Baseling gardens line the coastal spore highway.' },
  { name: 'POOP FLATS', sky1: '#f4d03f', sky2: '#e67e22', grass1: '#b7950b', grass2: '#9a7d0a',
    road1: '#555', road2: '#444', rumble1: '#e67e22', rumble2: '#fff', stripe: '#fff',
    fog: '#ffe0a0', fogDens: 0.0003, scenery: 'desert', segments: 900, timeLimit: 42,
    checkpoints: [225, 450, 675], curves: 0.3, hills: 0.2,
    boss: 'Dung Beetle', bossColor: '#7a444a', lore: 'POOP haulers race across the dried-out garden flats.' },
  { name: 'MYCELIAL HEIGHTS', sky1: '#2c3e50', sky2: '#5dade2', grass1: '#566573', grass2: '#2c3e50',
    road1: '#3a3a3a', road2: '#2a2a2a', rumble1: '#fff', rumble2: '#e6482e', stripe: '#f4b41b',
    fog: '#8899bb', fogDens: 0.0008, scenery: 'mountain', segments: 700, timeLimit: 48,
    checkpoints: [175, 350, 525], curves: 1.2, hills: 1.0,
    boss: 'Spore Climber', bossColor: '#a855f7', lore: 'Mycelium threads link baseling nests in the peaks.' },
  { name: 'NEON COLONY', sky1: '#0a0a2a', sky2: '#1a1c2c', grass1: '#1a1a2e', grass2: '#0d0d1a',
    road1: '#222', road2: '#1a1a1a', rumble1: '#f4b41b', rumble2: '#222', stripe: '#f4b41b',
    fog: '#111133', fogDens: 0.001, scenery: 'city', segments: 750, timeLimit: 46,
    checkpoints: [187, 375, 562], curves: 0.8, hills: 0.3,
    boss: 'Neon Phantom', bossColor: '#a855f7', lore: 'Bioluminescent baselings light up the fungal colony.' },
  { name: 'SPORESTORM PASS', sky1: '#2d3436', sky2: '#636e72', grass1: '#1e3a1e', grass2: '#0f260f',
    road1: '#2a2a2a', road2: '#222', rumble1: '#555', rumble2: '#333', stripe: '#aaa',
    fog: '#556655', fogDens: 0.0012, scenery: 'forest', segments: 700, timeLimit: 50,
    checkpoints: [175, 350, 525], curves: 0.9, hills: 0.6,
    boss: 'Fungal Fury', bossColor: '#38d973', lore: 'Thick POOP fog and spore clouds choke the forest pass.' },
  { name: 'FROZEN SUBSTRATE', sky1: '#dfe6e9', sky2: '#b2bec3', grass1: '#dfe6e9', grass2: '#b2bec3',
    road1: '#667', road2: '#556', rumble1: '#e6482e', rumble2: '#fff', stripe: '#333',
    fog: '#eeeeff', fogDens: 0.0006, scenery: 'snow', segments: 650, timeLimit: 52,
    checkpoints: [162, 325, 487], curves: 1.0, hills: 0.8,
    boss: 'Ice Spore', bossColor: '#3cacd7', lore: 'Frozen baseling nests hibernate beneath the permafrost.' },
  { name: 'CALDERA RUN', sky1: '#2c0000', sky2: '#ff4500', grass1: '#1a0000', grass2: '#330000',
    road1: '#222', road2: '#111', rumble1: '#ff6600', rumble2: '#f4b41b', stripe: '#e6482e',
    fog: '#440000', fogDens: 0.0004, scenery: 'volcano', segments: 600, timeLimit: 48,
    checkpoints: [150, 300, 450], curves: 1.1, hills: 0.9,
    boss: 'Magma Spore', bossColor: '#e6482e', lore: 'Toxic POOP barrels combust in the volcanic vents.' },
  { name: 'PRIME CIRCUIT', sky1: '#0a0020', sky2: '#4a0080', grass1: '#1a0a30', grass2: '#0d0520',
    road1: '#333', road2: '#222', rumble1: '#a855f7', rumble2: '#38d973', stripe: '#fff',
    fog: '#220044', fogDens: 0.0003, scenery: 'final', segments: 1000, timeLimit: 55,
    checkpoints: [200, 400, 600, 800], curves: 1.3, hills: 1.1,
    boss: 'Prime Reactor', bossColor: '#f4b41b', lore: 'The ultimate baseling racetrack where all gardens converge.' }
];

// === SCORE POPUP SYSTEM ===
var scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.5, maxLife: 1.5 });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life -= dt;
    scorePopups[i].y -= 30 * dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = sp.life / sp.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === GAME STATE ===
var currentTrack = 0;
var segments = [];
var playerX = 0;
var playerSpeed = 0;
var maxSpeed = 300 * STAT_TOP_SPEED;  // DEX: higher top speed
var position = 0;
var timeLeft = 0;
var checkpointIndex = 0;
var turboCount = 0;
var turboTimer = 0;
var turboRecharge = 0;
var gear = 1;
var spinTimer = 0;
var crashTimer = 0;
var distanceTraveled = 0;
var cleanDriving = 0;
var trackProgress = 0;
var totalScore = 0;
var lapComplete = false;
var traffic = [];
var speedKmh = 0;
var enginePitch = 0;
var engineTimer = 0;
var rainDrops = [];
var steerInput = 0;
var continues = STAT_EXTRA_LIVES;  // CON: bonus continues
var itemPickups = [];
var shortcuts = [];
var bossRacer = null;
var bossDefeated = false;
var draftBonus = 0;
var draftTimer = 0;
var tutorialShown = false;
var tutorialTimer = 0;
var comboCounter = 0;
var comboTimer = 0;
var tireTrails = [];
var dustParticles = [];
var weatherIntensity = 0;
var trackRecord = 0;

// === LOAD PROGRESS ===
try { trackProgress = parseInt(localStorage.getItem('radracer_progress') || '0', 10); } catch(e) { trackProgress = 0; }

// === BUILD TRACK ===
function buildTrack(trackIdx) {
  var t = TRACKS[trackIdx];
  segments = [];
  TOTAL_SEGMENTS = t.segments;
  var curveStr = t.curves;
  var hillStr = t.hills;

  for (var i = 0; i < TOTAL_SEGMENTS; i++) {
    var curve = 0;
    var hill = 0;
    var pct = i / TOTAL_SEGMENTS;

    curve = Math.sin(pct * Math.PI * 6) * curveStr * 3;
    curve += Math.sin(pct * Math.PI * 2.3) * curveStr * 2;
    curve += Math.sin(pct * Math.PI * 11) * curveStr * 0.5;

    hill = Math.sin(pct * Math.PI * 4) * hillStr * 40;
    hill += Math.sin(pct * Math.PI * 7.7) * hillStr * 20;
    hill += Math.cos(pct * Math.PI * 13) * hillStr * 10;

    var sceneryLeft = null;
    var sceneryRight = null;
    if (Math.random() < 0.06) sceneryLeft = getSceneryObject(t.scenery);
    if (Math.random() < 0.06) sceneryRight = getSceneryObject(t.scenery);

    // Reactor hazard zones (Tasern content)
    var hazard = null;
    if (Math.random() < 0.012 && i > 50 && i < TOTAL_SEGMENTS - 50) {
      var hazTypes = ['spore_cloud', 'reactor_leak', 'mycelial_crack', 'fungal_bloom'];
      hazard = { type: hazTypes[Math.floor(Math.random() * hazTypes.length)], lane: (Math.random() - 0.5) * 1.4, size: 0.3 + Math.random() * 0.4 };
    }

    segments.push({
      curve: curve,
      y: hill,
      sceneryL: sceneryLeft,
      sceneryR: sceneryRight,
      isCheckpoint: t.checkpoints.indexOf(i) >= 0,
      hazard: hazard
    });
  }

  // Place mycelial shortcuts (Tasern content) - CHA: more shortcuts with higher luck
  shortcuts = [];
  var shortcutCount = 2 + Math.floor(STAT_LUCK * 0.5);
  for (var sc = 0; sc < shortcutCount; sc++) {
    var scSeg = Math.floor(100 + Math.random() * (TOTAL_SEGMENTS - 200));
    shortcuts.push({
      segment: scSeg,
      lane: (Math.random() > 0.5 ? 1 : -1) * (1.2 + Math.random() * 0.5),
      active: true,
      glow: 0
    });
  }

  // Place item pickups - CHA: more items spawn
  itemPickups = [];
  var itemCount = 5 + Math.floor(trackIdx * 1.5) + Math.floor((statB.cha - 10) * 0.3);
  for (var ip = 0; ip < itemCount; ip++) {
    var itemTypes = ['turbo_refill', 'time_bonus', 'score_gem', 'shield', 'speed_boost'];
    // CHA: better item quality
    var typeIdx = Math.floor(Math.random() * itemTypes.length);
    if (STAT_ITEM_QUALITY > 1.1 && Math.random() < 0.3) typeIdx = Math.min(typeIdx + 1, itemTypes.length - 1);
    itemPickups.push({
      segment: Math.floor(30 + Math.random() * (TOTAL_SEGMENTS - 60)),
      lane: (Math.random() - 0.5) * 1.0,
      type: itemTypes[typeIdx],
      collected: false,
      bob: Math.random() * Math.PI * 2
    });
  }

  // Place traffic (spore roadsters)
  traffic = [];
  var trafficCount = 8 + trackIdx * 3;
  for (var j = 0; j < trafficCount; j++) {
    var isSpore = Math.random() < 0.4;
    traffic.push({
      segment: Math.floor(50 + Math.random() * (TOTAL_SEGMENTS - 100)),
      lane: (Math.random() - 0.5) * 1.2,
      speed: 0.3 + Math.random() * 0.4,
      color: isSpore ? ['#44cc88','#88ffaa','#22aa66','#66ddaa'][Math.floor(Math.random()*4)]
                      : ['#e74c3c','#3498db','#27ae60','#f1c40f','#9b59b6','#e67e22'][Math.floor(Math.random()*6)],
      w: 40 + Math.random() * 20,
      h: 30 + Math.random() * 15,
      isSpore: isSpore,
      glowPhase: Math.random() * Math.PI * 2
    });
  }

  // Boss racer (appears in final stretch)
  bossRacer = {
    segment: TOTAL_SEGMENTS - 80,
    lane: 0,
    speed: 0.6 + trackIdx * 0.05,
    color: t.bossColor,
    name: t.boss,
    w: 55,
    h: 40,
    hp: 3 + trackIdx,
    defeated: false,
    chargeTimer: 0,
    pattern: 0
  };
  bossDefeated = false;
}

function getSceneryObject(type) {
  var r = Math.random();
  var offset = 1.2 + Math.random() * 2.5;
  switch(type) {
    case 'coast':
      if (r < 0.35) return { type: 'palm', offset: offset };
      if (r < 0.55) return { type: 'sign', offset: offset };
      if (r < 0.75) return { type: 'rock', offset: offset };
      if (r < 0.9) return { type: 'spore_lamp', offset: 1.1 };
      return { type: 'coral_fan', offset: offset };
    case 'desert':
      if (r < 0.35) return { type: 'cactus', offset: offset };
      if (r < 0.55) return { type: 'rock', offset: offset };
      if (r < 0.7) return { type: 'skull', offset: offset };
      if (r < 0.85) return { type: 'reactor_shell', offset: offset };
      return { type: 'dust_devil_obj', offset: offset };
    case 'mountain':
      if (r < 0.35) return { type: 'pine', offset: offset };
      if (r < 0.55) return { type: 'rock', offset: offset };
      if (r < 0.75) return { type: 'guardrail', offset: 1.05 };
      return { type: 'spore_tower', offset: offset };
    case 'city':
      if (r < 0.3) return { type: 'building', offset: offset };
      if (r < 0.55) return { type: 'neon', offset: offset };
      if (r < 0.75) return { type: 'lamppost', offset: 1.1 };
      return { type: 'reactor_sign', offset: 1.15 };
    case 'forest':
      if (r < 0.4) return { type: 'tree', offset: offset };
      if (r < 0.6) return { type: 'bush', offset: offset };
      if (r < 0.75) return { type: 'mushroom', offset: offset };
      if (r < 0.9) return { type: 'giant_mushroom', offset: offset };
      return { type: 'spore_cluster', offset: offset };
    case 'snow':
      if (r < 0.4) return { type: 'pine_snow', offset: offset };
      if (r < 0.65) return { type: 'snowman', offset: offset };
      if (r < 0.85) return { type: 'ice_rock', offset: offset };
      return { type: 'frozen_spore', offset: offset };
    case 'volcano':
      if (r < 0.3) return { type: 'lava_rock', offset: offset };
      if (r < 0.55) return { type: 'dead_tree', offset: offset };
      if (r < 0.75) return { type: 'flame_vent', offset: offset };
      return { type: 'magma_shroom', offset: offset };
    default:
      if (r < 0.25) return { type: 'crystal', offset: offset };
      if (r < 0.5) return { type: 'neon', offset: offset };
      if (r < 0.75) return { type: 'obelisk', offset: offset };
      return { type: 'prime_reactor', offset: offset };
  }
}

// === START GAME ===
function startGame() {
  currentTrack = 0;
  totalScore = 0;
  continues = STAT_EXTRA_LIVES;  // CON: reset continues
  startTrack(currentTrack);
  state = 'playing';
}

function startTrack(idx) {
  currentTrack = idx;
  buildTrack(idx);
  var t = TRACKS[idx];
  playerX = 0;
  playerSpeed = 0;
  position = 0;
  timeLeft = t.timeLimit;
  checkpointIndex = 0;
  turboCount = 3;
  turboTimer = 0;
  turboRecharge = 0;
  gear = 1;
  spinTimer = 0;
  crashTimer = 0;
  distanceTraveled = 0;
  cleanDriving = 0;
  lapComplete = false;
  speedKmh = 0;
  steerInput = 0;
  scorePopups = [];
  draftBonus = 0;
  draftTimer = 0;
  comboCounter = 0;
  comboTimer = 0;
  tireTrails = [];
  dustParticles = [];
  weatherIntensity = 0;
  trackRecord = TAS.score.load('radracer_tr' + idx) || 0;
  rainDrops = [];
  if (t.scenery === 'forest') {
    for (var i = 0; i < 80; i++) {
      rainDrops.push({ x: Math.random() * GW, y: Math.random() * GH, speed: 4 + Math.random() * 6, len: 6 + Math.random() * 8 });
    }
  }
  // Snow particles
  if (t.scenery === 'snow') {
    for (var si = 0; si < 60; si++) {
      rainDrops.push({ x: Math.random() * GW, y: Math.random() * GH, speed: 1 + Math.random() * 2, drift: (Math.random() - 0.5) * 2, size: 1 + Math.random() * 2 });
    }
  }
  // Volcanic embers
  if (t.scenery === 'volcano') {
    for (var vi = 0; vi < 30; vi++) {
      rainDrops.push({ x: Math.random() * GW, y: Math.random() * GH, speed: -1 - Math.random() * 2, drift: (Math.random() - 0.5) * 3, size: 1 + Math.random(), glow: Math.random() });
    }
  }
  if (!tutorialShown) {
    tutorialTimer = 6.0;
    tutorialShown = true;
  } else {
    tutorialTimer = 0;
  }
  state = 'trackIntro';
  frame = 0;
}

function nextTrack() {
  totalScore += score;
  currentTrack++;
  if (currentTrack >= TRACKS.length) {
    state = 'champion';
    if (totalScore > highScore) {
      highScore = totalScore;
      TAS.score.save('radracer_hi', highScore);
    }
  } else {
    startTrack(currentTrack);
  }
}

function gameOver() {
  totalScore += score;
  if (totalScore > highScore) {
    highScore = totalScore;
    TAS.score.save('radracer_hi', highScore);
  }
  if (currentTrack > trackProgress) {
    trackProgress = currentTrack;
    try { localStorage.setItem('radracer_progress', String(trackProgress)); } catch(e) { console.warn('Failed to save progress:', e); }
  }
  // Continue system (CON stat)
  if (continues > 0) {
    continues--;
    state = 'continue';
    frame = 0;
    return;
  }
  state = 'gameOver';
}

// === PSEUDO-3D PROJECTION ===
function project(x, y, z, camX, camY, camZ) {
  var scale = CAM_DEPTH / z;
  var projX = GW / 2 + (x - camX) * scale * GW / 2;
  var projY = GH / 2 - (y - camY) * scale * GH / 2;
  var projW = scale * ROAD_WIDTH * GW / 2;
  return { x: projX, y: projY, w: projW, scale: scale };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  // Combo timer decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { comboCounter = 0; comboTimer = 0; }
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'trackIntro') {
    if (frame > 120 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'playing';
      frame = 0;
    }
    return;
  }

  if (state === 'trackComplete') {
    if (frame > 90 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      nextTrack();
    }
    return;
  }

  if (state === 'continue') {
    if (frame > 60 || Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      timeLeft = 20;
      spinTimer = 0;
      crashTimer = 0;
      playerSpeed = 0;
      state = 'playing';
      frame = 0;
    }
    return;
  }

  if (state === 'gameOver' || state === 'champion') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  // Tutorial countdown
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // === TIMER ===
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver();
    return;
  }

  // === CRASH/SPIN RECOVERY ===
  if (spinTimer > 0) {
    spinTimer -= dt;
    playerSpeed *= 0.95;
    if (spinTimer <= 0) spinTimer = 0;
    return;
  }
  if (crashTimer > 0) {
    crashTimer -= dt;
    playerSpeed = 0;
    if (crashTimer <= 0) crashTimer = 0;
    return;
  }

  // === INPUT ===
  var accel = keys['ArrowUp'] || keys['KeyW'] || keys['w'] || touch.up || touch.a;
  var brake = keys['ArrowDown'] || keys['KeyS'] || keys['s'] || touch.down;
  var steerL = keys['ArrowLeft'] || keys['KeyA'] || keys['a'] || touch.left;
  var steerR = keys['ArrowRight'] || keys['KeyD'] || keys['d'] || touch.right;
  var turboKey = keys['Space'] || keys[' '] || touch.b;
  var gearKey = keys['ShiftLeft'] || keys['ShiftRight'] || keys['Shift'];

  if (gearKey && !this._gearHeld) { gear = gear === 1 ? 2 : 1; }
  this._gearHeld = gearKey;

  // === TURBO (WIS: cooldown and duration) ===
  if (turboKey && turboCount > 0 && turboTimer <= 0 && playerSpeed > maxSpeed * 0.5) {
    turboTimer = STAT_TURBO_DURATION;  // WIS: longer turbo
    turboCount--;
    TAS.audio.playTone(800, 0.3, 'sawtooth', 0.12, 1200);
    TAS.fx.flash('#ff8800', 0.3);
    addScorePopup(GW / 2, GH / 2, 'MYCELIUM TURBO!', '#ff8800');
  }
  if (turboTimer > 0) turboTimer -= dt;

  // WIS: turbo recharges over time
  if (turboCount < 3 && turboTimer <= 0) {
    turboRecharge += dt * STAT_TURBO_COOLDOWN;
    if (turboRecharge >= 12) {
      turboCount++;
      turboRecharge = 0;
      addScorePopup(GW - 60, 20, '+MYCELIUM', '#ff8800');
      TAS.audio.playTone(600, 0.1, 'square', 0.05);
    }
  }

  // === SPEED (DEX: top speed) ===
  var topSpeed = gear === 1 ? 0.7 : 1.0;
  var accelRate = gear === 1 ? 0.8 : 0.5;
  topSpeed *= STAT_TOP_SPEED;  // DEX bonus
  if (turboTimer > 0) { topSpeed = 1.4 * STAT_TOP_SPEED; accelRate = 1.2; }
  if (draftBonus > 0) { topSpeed *= 1.1; draftBonus -= dt; }

  if (accel) {
    playerSpeed += accelRate * dt;
    if (playerSpeed > topSpeed) playerSpeed = topSpeed;
  } else if (brake) {
    playerSpeed -= 1.5 * dt;
    if (playerSpeed < 0) playerSpeed = 0;
  } else {
    playerSpeed -= 0.3 * dt;
    if (playerSpeed < 0) playerSpeed = 0;
  }

  speedKmh = Math.floor(playerSpeed * maxSpeed);

  // === STEERING (DEX: handling) ===
  var steerSpeed = 2.5 * dt * STAT_HANDLING;  // DEX bonus
  if (speedKmh > 200) steerSpeed *= 0.6;
  if (speedKmh > 250) steerSpeed *= 0.7;
  if (turboTimer > 0) steerSpeed *= 0.5;

  var t = TRACKS[currentTrack];
  if (t.scenery === 'forest') steerSpeed *= 0.75;
  if (t.scenery === 'snow') steerSpeed *= 0.65;

  if (steerL) { steerInput -= steerSpeed; }
  else if (steerR) { steerInput += steerSpeed; }
  else { steerInput *= 0.85; }

  steerInput = TAS.math.clamp(steerInput, -1.5, 1.5);
  playerX += steerInput * dt * (1 + playerSpeed);

  // Tire trail effect
  if (Math.abs(steerInput) > 0.8 && playerSpeed > 0.3) {
    tireTrails.push({ x: GW / 2 + steerInput * 15, y: GH - 35, life: 0.4 });
  }

  // === ROAD CURVE PULL (STR: resist curve) ===
  var segIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  var curSeg = segments[segIdx];
  if (curSeg) {
    playerX += curSeg.curve * playerSpeed * dt * 0.3 * STAT_CURVE_RESIST;  // STR: less pull
  }

  // === OFFROAD (STR: less speed loss) ===
  if (Math.abs(playerX) > 1.0) {
    playerSpeed *= STAT_OFFROAD_RESIST;  // STR bonus
    // Dust particles when offroad
    if (frame % 3 === 0) {
      dustParticles.push({
        x: GW / 2 + steerInput * 15 + TAS.math.randRange(-10, 10),
        y: GH - 40,
        vx: (Math.random() - 0.5) * 3,
        vy: -1 - Math.random() * 2,
        life: 0.5 + Math.random() * 0.3,
        size: 2 + Math.random() * 3,
        color: t.grass1
      });
    }
    if (Math.abs(playerX) > 1.8) {
      playerSpeed *= 0.9;
    }
    if (Math.abs(playerX) > 2.5) {
      triggerCrash();
      return;
    }
  }

  // === MOVE FORWARD ===
  position += playerSpeed * SEG_LENGTH * dt * 60;
  distanceTraveled += playerSpeed * dt * 60;

  // === HAZARD COLLISION ===
  var curSegNum = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  if (curSeg && curSeg.hazard) {
    var hz = curSeg.hazard;
    if (Math.abs(playerX - hz.lane) < hz.size + 0.2 && playerSpeed > 0.2) {
      if (hz.type === 'spore_cloud') {
        playerSpeed *= 0.7;
        addScorePopup(GW / 2, GH / 2 - 30, 'TOXIC SPORE CLOUD!', '#38d973');
        TAS.audio.playNoise(0.2, 0.06, 1200);
      } else if (hz.type === 'reactor_leak') {
        triggerSpin();
        addScorePopup(GW / 2, GH / 2 - 30, 'POOP SPILL!', '#e6482e');
      } else if (hz.type === 'mycelial_crack') {
        playerSpeed *= 0.8;
        addScorePopup(GW / 2, GH / 2 - 30, 'MYCELIAL CRACK!', '#7a444a');
      } else if (hz.type === 'fungal_bloom') {
        // Blooms are beneficial! CHA: better bloom rewards
        var bloomBonus = Math.floor(50 * STAT_LUCK * STAT_SCORE_MULT);
        score += bloomBonus;
        addScorePopup(GW / 2, GH / 2 - 30, '+' + bloomBonus + ' POOP TOKEN!', '#38d973');
        TAS.audio.playTone(660, 0.15, 'sine', 0.08);
        comboCounter++;
        comboTimer = 3;
      }
      curSeg.hazard = null;
    }
  }

  // === SHORTCUT CHECK ===
  for (var si = 0; si < shortcuts.length; si++) {
    var sc = shortcuts[si];
    if (!sc.active) continue;
    sc.glow = (sc.glow + dt * 3) % (Math.PI * 2);
    var scDist = Math.abs(curSegNum - sc.segment);
    if (scDist < 3 && Math.abs(playerX - sc.lane) < 0.4) {
      sc.active = false;
      position += SEG_LENGTH * 25;
      var scBonus = Math.floor(200 * STAT_SCORE_MULT);
      score += scBonus;
      addScorePopup(GW / 2, GH / 2, '+' + scBonus + ' SPORE TUNNEL!', '#38d973');
      TAS.audio.playMelody([[440,0.1],[660,0.1],[880,0.1]], 80);
      TAS.fx.flash('#00ffcc', 0.2);
      TAS.particles.spawn(GW / 2, GH / 2, '#00ffcc', 20, 5, { gravity: -0.02, size: 2 });
      comboCounter++;
      comboTimer = 3;
    }
  }

  // === ITEM PICKUP CHECK (CHA: better items) ===
  for (var ipi = 0; ipi < itemPickups.length; ipi++) {
    var item = itemPickups[ipi];
    if (item.collected) continue;
    item.bob += dt * 3;
    var ipDist = Math.abs(curSegNum - item.segment);
    if (ipDist < 3 && Math.abs(playerX - item.lane) < 0.4) {
      item.collected = true;
      var itemScore = 0;
      switch(item.type) {
        case 'turbo_refill':
          turboCount = Math.min(turboCount + 1, 5);
          addScorePopup(GW / 2, GH / 2, '+MYCELIUM TURBO', '#ff8800');
          TAS.audio.playTone(880, 0.15, 'square', 0.08);
          break;
        case 'time_bonus':
          var timeAdd = Math.floor(5 * STAT_LUCK);
          timeLeft += timeAdd;
          addScorePopup(GW / 2, GH / 2, '+' + timeAdd + 's GARDEN SEED', '#38d973');
          TAS.audio.playTone(660, 0.15, 'sine', 0.08);
          break;
        case 'score_gem':
          itemScore = Math.floor(300 * STAT_SCORE_MULT * STAT_ITEM_QUALITY);  // INT + CHA
          score += itemScore;
          addScorePopup(GW / 2, GH / 2, '+' + itemScore + ' SPORE GEM', '#f4b41b');
          TAS.audio.playTone(1047, 0.2, 'sine', 0.1);
          break;
        case 'shield':
          crashTimer = -3;  // Negative = shield active for 3 seconds
          addScorePopup(GW / 2, GH / 2, 'POOP SHIELD!', '#3cacd7');
          TAS.audio.playTone(440, 0.2, 'triangle', 0.08);
          break;
        case 'speed_boost':
          draftBonus = 3;
          addScorePopup(GW / 2, GH / 2, 'SPORE BURST!', '#a855f7');
          TAS.audio.playTone(550, 0.15, 'sawtooth', 0.08, 900);
          break;
      }
      TAS.particles.spawn(GW / 2, GH / 2, '#ffdd44', 10, 3, { gravity: -0.05, size: 2 });
      comboCounter++;
      comboTimer = 3;
    }
  }

  // === CHECKPOINT ===
  if (curSegNum >= TOTAL_SEGMENTS - 5 && playerSpeed > 0) {
    lapComplete = true;
    var timeBonus = Math.floor(timeLeft * 100 * STAT_SCORE_MULT);  // INT: score bonus
    var cleanBonus = Math.floor(cleanDriving * 10 * STAT_SCORE_MULT);
    var bossBonus = bossDefeated ? Math.floor(500 * STAT_SCORE_MULT) : 0;
    var comboBonus = comboCounter * 25;
    score = Math.floor(distanceTraveled * STAT_SCORE_MULT) + timeBonus + cleanBonus + bossBonus + comboBonus;
    // Save track record
    if (score > trackRecord) {
      trackRecord = score;
      TAS.score.save('radracer_tr' + currentTrack, trackRecord);
    }
    state = 'trackComplete';
    frame = 0;
    TAS.audio.playMelody([[523,0.15],[659,0.15],[784,0.15],[1047,0.3]], 150);
    return;
  }

  // Check for checkpoint time extension
  var checkpoints = TRACKS[currentTrack].checkpoints;
  if (checkpointIndex < checkpoints.length && curSegNum >= checkpoints[checkpointIndex]) {
    timeLeft += 15;
    checkpointIndex++;
    var cpScore = Math.floor(100 * STAT_SCORE_MULT);
    score += cpScore;
    addScorePopup(GW / 2, GH / 2 - 40, 'GARDEN GATE +15s +' + cpScore, '#38d973');
    TAS.audio.playTone(880, 0.2, 'square', 0.1);
    TAS.audio.playTone(1100, 0.2, 'square', 0.08);
    TAS.fx.flash('#00ff88', 0.2);
    comboCounter++;
    comboTimer = 3;
  }

  // === BOSS RACER UPDATE ===
  if (bossRacer && !bossRacer.defeated) {
    // Boss weaves back and forth
    bossRacer.chargeTimer += dt;
    bossRacer.pattern = Math.sin(bossRacer.chargeTimer * 1.5) * 0.8;
    bossRacer.lane = bossRacer.pattern;
    bossRacer.segment += bossRacer.speed * dt * 15;
    if (bossRacer.segment >= TOTAL_SEGMENTS) bossRacer.segment -= TOTAL_SEGMENTS;

    // Boss collision check - drafting behind boss gives speed boost
    var bossDist = (bossRacer.segment * SEG_LENGTH - position);
    if (bossDist < 0) bossDist += TOTAL_SEGMENTS * SEG_LENGTH;
    if (bossDist > 0 && bossDist < SEG_LENGTH * 4) {
      var bossLaneDiff = Math.abs(playerX - bossRacer.lane);
      if (bossLaneDiff < 0.5 && bossDist < SEG_LENGTH * 2) {
        // Close behind = draft bonus
        if (bossDist > SEG_LENGTH * 0.5) {
          draftBonus = 0.5;
          draftTimer += dt;
          if (draftTimer > 2 && !bossRacer.defeated) {
            // Pass the boss = damage
            bossRacer.hp--;
            draftTimer = 0;
            addScorePopup(GW / 2, GH / 2 - 60, 'MOLD CAR HIT!', '#e6482e');
            TAS.fx.shake(6, 0.5);
            TAS.audio.playTone(200, 0.2, 'sawtooth', 0.1, 100);
            if (bossRacer.hp <= 0) {
              bossRacer.defeated = true;
              bossDefeated = true;
              var bossScore = Math.floor(1000 * STAT_SCORE_MULT);
              score += bossScore;
              addScorePopup(GW / 2, GH / 2, 'MOLD CAR WRECKED +' + bossScore, '#f4b41b');
              TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.1],[1047,0.2]], 100);
              TAS.fx.flash('#ffdd44', 0.4);
              TAS.particles.spawn(GW / 2, GH / 2, '#ffdd44', 30, 6, { gravity: -0.03, size: 3 });
            }
          }
        } else if (bossLaneDiff < 0.35) {
          // Direct collision
          triggerSpin();
          addScorePopup(GW / 2, GH / 2 - 30, 'MOLD CLASH!', '#e6482e');
        }
      } else {
        draftTimer = Math.max(0, draftTimer - dt * 0.5);
      }
    }
  }

  // === TRAFFIC COLLISION ===
  for (var i = 0; i < traffic.length; i++) {
    var car = traffic[i];
    var carSeg = car.segment;
    var dist = (carSeg * SEG_LENGTH - position);
    if (dist < 0) dist += TOTAL_SEGMENTS * SEG_LENGTH;
    if (dist > 0 && dist < SEG_LENGTH * 2) {
      var laneDiff = Math.abs(playerX - car.lane);
      if (laneDiff < 0.35) {
        if (crashTimer < 0) {
          // Shield active - plow through
          crashTimer += 0.5;
          var plowScore = Math.floor(50 * STAT_SCORE_MULT);
          score += plowScore;
          addScorePopup(GW / 2, GH / 2, '+' + plowScore + ' POOP SHIELD!', '#3cacd7');
          car.lane += (playerX < car.lane ? 1 : -1);
        } else {
          triggerSpin();
          car.lane += (playerX < car.lane ? 0.5 : -0.5);
        }
        break;
      }
      // Near miss bonus
      if (laneDiff < 0.6 && laneDiff >= 0.35 && playerSpeed > 0.5) {
        var nearScore = Math.floor(25 * STAT_SCORE_MULT);
        score += nearScore;
        addScorePopup(GW / 2, GH - 80, '+' + nearScore + ' SPORE DODGE', '#3cacd7');
        comboCounter++;
        comboTimer = 3;
      }
    }
  }

  // Update traffic
  for (var j = 0; j < traffic.length; j++) {
    traffic[j].segment += traffic[j].speed * dt * 20;
    if (traffic[j].segment >= TOTAL_SEGMENTS) traffic[j].segment -= TOTAL_SEGMENTS;
    traffic[j].glowPhase += dt * 2;
  }

  // === CLEAN DRIVING ===
  if (Math.abs(playerX) < 0.8 && spinTimer <= 0 && crashTimer <= 0) {
    cleanDriving += dt;
  }

  // === SCORE TICKING (INT: multiplier) ===
  if (playerSpeed > 0.3) {
    var tickScore = Math.floor(dt * speedKmh * 0.1 * STAT_SCORE_MULT);
    if (comboCounter > 2) tickScore = Math.floor(tickScore * (1 + comboCounter * 0.1));
    score += tickScore;
  }

  // === UPDATE DUST PARTICLES ===
  for (var di = dustParticles.length - 1; di >= 0; di--) {
    var dp = dustParticles[di];
    dp.x += dp.vx;
    dp.y += dp.vy;
    dp.life -= dt;
    if (dp.life <= 0) dustParticles.splice(di, 1);
  }

  // Update tire trails
  for (var ti2 = tireTrails.length - 1; ti2 >= 0; ti2--) {
    tireTrails[ti2].life -= dt;
    if (tireTrails[ti2].life <= 0) tireTrails.splice(ti2, 1);
  }

  // === ENGINE SOUND ===
  engineTimer -= dt;
  if (engineTimer <= 0 && playerSpeed > 0.1) {
    enginePitch = 60 + speedKmh * 2;
    TAS.audio.playTone(enginePitch, 0.08, 'sawtooth', 0.02 + playerSpeed * 0.02);
    engineTimer = 0.06;
  }

  // === WEATHER EFFECTS ===
  weatherIntensity = Math.min(1, weatherIntensity + dt * 0.1);
  if (t.scenery === 'forest') {
    for (var k = 0; k < rainDrops.length; k++) {
      rainDrops[k].y += rainDrops[k].speed;
      rainDrops[k].x -= 1 + playerSpeed * 2;
      if (rainDrops[k].y > GH) { rainDrops[k].y = -10; rainDrops[k].x = Math.random() * GW; }
    }
  }
  if (t.scenery === 'snow') {
    for (var sk = 0; sk < rainDrops.length; sk++) {
      rainDrops[sk].y += rainDrops[sk].speed;
      rainDrops[sk].x += rainDrops[sk].drift + Math.sin(frame * 0.02 + sk) * 0.5;
      if (rainDrops[sk].y > GH) { rainDrops[sk].y = -5; rainDrops[sk].x = Math.random() * GW; }
      if (rainDrops[sk].x < 0) rainDrops[sk].x = GW;
      if (rainDrops[sk].x > GW) rainDrops[sk].x = 0;
    }
  }
  if (t.scenery === 'volcano') {
    for (var vk = 0; vk < rainDrops.length; vk++) {
      rainDrops[vk].y += rainDrops[vk].speed;
      rainDrops[vk].x += rainDrops[vk].drift;
      rainDrops[vk].glow = (rainDrops[vk].glow + dt) % 1;
      if (rainDrops[vk].y < -10) { rainDrops[vk].y = GH + 10; rainDrops[vk].x = Math.random() * GW; }
    }
  }
}

function triggerSpin() {
  if (crashTimer < 0) return;  // Shield blocks spin
  spinTimer = 1.2 * STAT_CRASH_RESIST;  // STR: faster recovery
  playerSpeed *= 0.4;
  TAS.fx.shake(8, 0.85);
  TAS.audio.playNoise(0.4, 0.12, 800);
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 80);
  TAS.particles.spawn(GW/2, GH - 60, '#ffaa00', 15, 4, { gravity: 0.1 });
}

function triggerCrash() {
  if (crashTimer < 0) return;  // Shield blocks crash
  crashTimer = 2.0 / STAT_DURABILITY;  // CON: faster crash recovery
  playerSpeed = 0;
  TAS.fx.shake(12, 0.8);
  TAS.fx.flash('#ff0000', 0.4);
  TAS.audio.playNoise(0.6, 0.15, 400);
  TAS.audio.playTone(100, 0.5, 'sawtooth', 0.12, 40);
  TAS.particles.spawn(GW/2, GH - 60, '#ff4400', 25, 5, { gravity: 0.2, size: 3 });
  TAS.particles.spawn(GW/2, GH - 60, '#ffdd00', 15, 3, { gravity: 0.05, size: 2 });
  // Debris particles
  TAS.particles.spawn(GW/2, GH - 60, '#888', 10, 4, { gravity: 0.15, size: 2 });
  timeLeft -= 3;
  if (timeLeft < 0) timeLeft = 0;
}

// === DRAW ===
function draw(dt) {
  var t = TRACKS[currentTrack] || TRACKS[0];

  if (state === 'title') { drawTitleScreen(); return; }
  if (state === 'trackIntro') { drawTrackIntro(t); return; }
  if (state === 'gameOver') { drawGameOverScreen(); return; }
  if (state === 'champion') { drawChampionScreen(); return; }
  if (state === 'trackComplete') { drawTrackComplete(t); return; }
  if (state === 'continue') { drawContinueScreen(); return; }

  // === DRAW PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  // Sky gradient
  var skyGrad = ctx.createLinearGradient(0, 0, 0, GH / 2);
  skyGrad.addColorStop(0, t.sky1);
  skyGrad.addColorStop(1, t.sky2);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GW, GH / 2);

  // Stars for night/volcano/final
  if (t.scenery === 'city' || t.scenery === 'volcano' || t.scenery === 'final') {
    ctx.fillStyle = '#fff';
    for (var s = 0; s < 40; s++) {
      var sx = (s * 73 + frame * 0.02) % GW;
      var sy = (s * 37) % (GH / 3);
      var twinkle = Math.sin(frame * 0.03 + s) * 0.5 + 0.5;
      ctx.globalAlpha = twinkle * 0.6;
      ctx.fillRect(sx, sy, 1 + (s % 3 === 0 ? 1 : 0), 1);
    }
    ctx.globalAlpha = 1;
  }

  // Parallax mountains/horizon for mountain and snow tracks
  if (t.scenery === 'mountain' || t.scenery === 'snow' || t.scenery === 'volcano') {
    var mtColor = t.scenery === 'volcano' ? '#2a0000' : (t.scenery === 'snow' ? '#99aabb' : '#3a4a5a');
    ctx.fillStyle = mtColor;
    for (var mi = 0; mi < 8; mi++) {
      var mx = (mi * 80 - (position * 0.001) % 80 + GW) % GW - 40;
      var mh = 30 + Math.sin(mi * 1.7) * 20;
      ctx.beginPath();
      ctx.moveTo(mx - 50, GH / 2);
      ctx.lineTo(mx, GH / 2 - mh);
      ctx.lineTo(mx + 50, GH / 2);
      ctx.fill();
    }
  }

  // Ground fill
  ctx.fillStyle = t.grass1;
  ctx.fillRect(0, GH / 2, GW, GH / 2);

  // === RENDER ROAD ===
  var baseSegment = Math.floor(position / SEG_LENGTH);
  var baseOffset = (position % SEG_LENGTH) / SEG_LENGTH;
  var maxy = GH;
  var camX = playerX * ROAD_WIDTH;
  var camY = CAM_HEIGHT;
  var curveAccum = 0;
  var hillAccum = 0;
  var projSegs = [];

  for (var n = 1; n < DRAW_DIST; n++) {
    var segNum = (baseSegment + n) % TOTAL_SEGMENTS;
    var seg = segments[segNum];
    if (!seg) continue;
    curveAccum += seg.curve;
    hillAccum += seg.y;
    var z = (n - baseOffset) * SEG_LENGTH;
    if (z <= 0) continue;
    var worldX = curveAccum * SEG_LENGTH * 0.01;
    var worldY = hillAccum * 0.5;
    var p = project(worldX, worldY, z, camX, camY, 0);
    if (p.y >= maxy) continue;
    var fogFactor = 1 - Math.exp(-t.fogDens * z * z * 0.00001);
    fogFactor = TAS.math.clamp(fogFactor, 0, 0.9);
    projSegs.push({ p: p, segNum: segNum, seg: seg, n: n, fog: fogFactor, z: z });
  }

  // Draw from far to near
  for (var i = projSegs.length - 1; i >= 0; i--) {
    var ps = projSegs[i];
    var p = ps.p;
    var seg = ps.seg;
    var segNum = ps.segNum;
    var fogFactor = ps.fog;
    var nextPs = i > 0 ? projSegs[i-1] : null;
    var py2 = nextPs ? nextPs.p.y : GH;
    var segHeight = py2 - p.y;
    if (segHeight <= 0) continue;
    var isEven = (segNum % 2 === 0);

    // Grass
    ctx.fillStyle = applyFog(isEven ? t.grass1 : t.grass2, t.fog, fogFactor);
    ctx.fillRect(0, p.y, GW, segHeight + 1);

    // Rumble strips
    var rumbleW = p.w * 1.15;
    ctx.fillStyle = applyFog(isEven ? t.rumble1 : t.rumble2, t.fog, fogFactor);
    ctx.fillRect(p.x - rumbleW, p.y, rumbleW * 2, segHeight + 1);

    // Road surface
    ctx.fillStyle = applyFog(isEven ? t.road1 : t.road2, t.fog, fogFactor);
    ctx.fillRect(p.x - p.w, p.y, p.w * 2, segHeight + 1);

    // Center stripe
    if (isEven) {
      var stripeW = p.w * 0.02;
      ctx.fillStyle = applyFog(t.stripe, t.fog, fogFactor);
      ctx.fillRect(p.x - stripeW, p.y, stripeW * 2, segHeight + 1);
    }

    // Lane markers
    if (isEven) {
      ctx.fillStyle = applyFog(t.stripe, t.fog, fogFactor * 1.2);
      var laneW = p.w * 0.01;
      ctx.fillRect(p.x - p.w * 0.5 - laneW, p.y, laneW * 2, segHeight + 1);
      ctx.fillRect(p.x + p.w * 0.5 - laneW, p.y, laneW * 2, segHeight + 1);
    }

    // Checkpoint banner
    if (seg.isCheckpoint && ps.n < 30) {
      ctx.fillStyle = 'rgba(0,255,100,0.3)';
      ctx.fillRect(p.x - p.w, p.y, p.w * 2, 3);
      ctx.fillStyle = '#00ff66';
      ctx.font = Math.max(6, Math.floor(p.scale * 600)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CHECKPOINT', p.x, p.y - 2);
    }

    // Hazard rendering
    if (seg.hazard && ps.n < 60) {
      drawHazard(seg.hazard, p, fogFactor);
    }

    // Scenery
    if (seg.sceneryL && ps.n < 80) drawSceneryObject(seg.sceneryL, p.x - p.w * seg.sceneryL.offset, p.y, p.scale, fogFactor, t);
    if (seg.sceneryR && ps.n < 80) drawSceneryObject(seg.sceneryR, p.x + p.w * seg.sceneryR.offset, p.y, p.scale, fogFactor, t);

    maxy = Math.min(maxy, p.y);
  }

  // === DRAW SHORTCUTS (mycelial tunnels) ===
  for (var sci = 0; sci < shortcuts.length; sci++) {
    var sc = shortcuts[sci];
    if (!sc.active) continue;
    var scDist = (sc.segment - baseSegment);
    if (scDist < 0) scDist += TOTAL_SEGMENTS;
    if (scDist > 0 && scDist < DRAW_DIST * 0.5) {
      var scz = scDist * SEG_LENGTH;
      var scAccum = 0, shAccum = 0;
      for (var sci2 = 1; sci2 <= Math.min(scDist, DRAW_DIST); sci2++) {
        var scsn = (baseSegment + sci2) % TOTAL_SEGMENTS;
        if (segments[scsn]) { scAccum += segments[scsn].curve; shAccum += segments[scsn].y; }
      }
      var scwx = scAccum * SEG_LENGTH * 0.01 + sc.lane * ROAD_WIDTH;
      var scwy = shAccum * 0.5;
      var scp = project(scwx, scwy, scz, camX, camY, 0);
      if (scp.y < GH && scp.y > 30) {
        var scSize = scp.scale * 400;
        var scGlow = Math.sin(sc.glow) * 0.3 + 0.7;
        ctx.globalAlpha = scGlow * 0.8;
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(scp.x, scp.y - scSize * 0.5, scSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = scGlow * 0.4;
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.arc(scp.x, scp.y - scSize * 0.5, scSize * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#38d973';
        ctx.font = Math.max(6, Math.floor(scp.scale * 300)) + 'px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('SPORE TUNNEL', scp.x, scp.y - scSize * 0.9);
      }
    }
  }

  // === DRAW ITEMS ===
  for (var ipi = 0; ipi < itemPickups.length; ipi++) {
    var item = itemPickups[ipi];
    if (item.collected) continue;
    var ipDist = (item.segment - baseSegment);
    if (ipDist < 0) ipDist += TOTAL_SEGMENTS;
    if (ipDist > 0 && ipDist < DRAW_DIST * 0.4) {
      var ipz = ipDist * SEG_LENGTH;
      var ipAccum = 0, ihAccum = 0;
      for (var ipi2 = 1; ipi2 <= Math.min(ipDist, DRAW_DIST); ipi2++) {
        var ipsn = (baseSegment + ipi2) % TOTAL_SEGMENTS;
        if (segments[ipsn]) { ipAccum += segments[ipsn].curve; ihAccum += segments[ipsn].y; }
      }
      var ipwx = ipAccum * SEG_LENGTH * 0.01 + item.lane * ROAD_WIDTH;
      var ipwy = ihAccum * 0.5;
      var ipp = project(ipwx, ipwy, ipz, camX, camY, 0);
      if (ipp.y < GH && ipp.y > 30) {
        var ipSize = ipp.scale * 300;
        var bobY = Math.sin(item.bob) * ipSize * 0.2;
        var itemColors = { turbo_refill: '#ff8800', time_bonus: '#44ff88', score_gem: '#ffdd44', shield: '#4488ff', speed_boost: '#ff44ff' };
        ctx.fillStyle = itemColors[item.type] || '#fff';
        ctx.globalAlpha = 0.8 + Math.sin(item.bob) * 0.2;
        ctx.beginPath();
        ctx.arc(ipp.x, ipp.y - ipSize * 0.5 + bobY, ipSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(ipp.x, ipp.y - ipSize * 0.5 + bobY, ipSize * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // === DRAW TRAFFIC ===
  for (var ti = 0; ti < traffic.length; ti++) {
    var car = traffic[ti];
    var carDist = (car.segment - baseSegment);
    if (carDist < 0) carDist += TOTAL_SEGMENTS;
    if (carDist > 0 && carDist < DRAW_DIST) {
      var cz = carDist * SEG_LENGTH;
      var cAccum = 0, hAccum = 0;
      for (var ci = 1; ci <= Math.min(carDist, DRAW_DIST); ci++) {
        var csn = (baseSegment + ci) % TOTAL_SEGMENTS;
        if (segments[csn]) { cAccum += segments[csn].curve; hAccum += segments[csn].y; }
      }
      var cwx = cAccum * SEG_LENGTH * 0.01 + car.lane * ROAD_WIDTH;
      var cwy = hAccum * 0.5;
      var cp = project(cwx, cwy, cz, camX, camY, 0);
      if (cp.y < GH && cp.y > 30) {
        var cw = car.w * cp.scale * 400;
        var ch = car.h * cp.scale * 400;
        if (car.isSpore) {
          // Spore roadster: rounded with glow
          ctx.fillStyle = car.color;
          ctx.beginPath();
          ctx.ellipse(cp.x, cp.y - ch * 0.5, cw * 0.5, ch * 0.5, 0, 0, Math.PI * 2);
          ctx.fill();
          // Spore glow
          var sg = Math.sin(car.glowPhase) * 0.3 + 0.4;
          ctx.globalAlpha = sg;
          ctx.fillStyle = '#88ffaa';
          ctx.beginPath();
          ctx.ellipse(cp.x, cp.y - ch * 0.5, cw * 0.6, ch * 0.6, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          // Eyes
          ctx.fillStyle = '#fff';
          ctx.fillRect(cp.x - cw * 0.2, cp.y - ch * 0.7, cw * 0.12, ch * 0.15);
          ctx.fillRect(cp.x + cw * 0.08, cp.y - ch * 0.7, cw * 0.12, ch * 0.15);
        } else {
          // Regular traffic car
          ctx.fillStyle = car.color;
          ctx.fillRect(cp.x - cw/2, cp.y - ch, cw, ch);
          ctx.fillStyle = '#222';
          ctx.fillRect(cp.x - cw*0.35, cp.y - ch*0.85, cw*0.7, ch*0.3);
          ctx.fillStyle = '#ff0000';
          ctx.fillRect(cp.x - cw*0.45, cp.y - ch*0.2, cw*0.15, ch*0.15);
          ctx.fillRect(cp.x + cw*0.3, cp.y - ch*0.2, cw*0.15, ch*0.15);
        }
      }
    }
  }

  // === DRAW BOSS RACER ===
  if (bossRacer && !bossRacer.defeated) {
    var bDist = (bossRacer.segment - baseSegment);
    if (bDist < 0) bDist += TOTAL_SEGMENTS;
    if (bDist > 0 && bDist < DRAW_DIST) {
      var bz = bDist * SEG_LENGTH;
      var bAccum = 0, bhAccum = 0;
      for (var bi = 1; bi <= Math.min(bDist, DRAW_DIST); bi++) {
        var bsn = (baseSegment + bi) % TOTAL_SEGMENTS;
        if (segments[bsn]) { bAccum += segments[bsn].curve; bhAccum += segments[bsn].y; }
      }
      var bwx = bAccum * SEG_LENGTH * 0.01 + bossRacer.lane * ROAD_WIDTH;
      var bwy = bhAccum * 0.5;
      var bp = project(bwx, bwy, bz, camX, camY, 0);
      if (bp.y < GH && bp.y > 20) {
        var bw = bossRacer.w * bp.scale * 500;
        var bh = bossRacer.h * bp.scale * 500;
        // Boss body (larger, more menacing)
        ctx.fillStyle = bossRacer.color;
        ctx.fillRect(bp.x - bw/2, bp.y - bh, bw, bh);
        // Boss stripe
        ctx.fillStyle = '#fff';
        ctx.fillRect(bp.x - bw * 0.05, bp.y - bh * 0.9, bw * 0.1, bh * 0.8);
        // Boss exhaust glow
        var bGlow = Math.sin(frame * 0.2) * 0.3 + 0.7;
        ctx.globalAlpha = bGlow;
        ctx.fillStyle = '#ff4400';
        ctx.fillRect(bp.x - bw * 0.3, bp.y - bh * 0.1, bw * 0.15, bh * 0.15);
        ctx.fillRect(bp.x + bw * 0.15, bp.y - bh * 0.1, bw * 0.15, bh * 0.15);
        ctx.globalAlpha = 1;
        // Boss name label
        if (bDist < 40) {
          ctx.fillStyle = bossRacer.color;
          ctx.font = Math.max(7, Math.floor(bp.scale * 400)) + 'px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(bossRacer.name.toUpperCase(), bp.x, bp.y - bh - 4);
          // HP pips
          ctx.fillStyle = '#ff4444';
          for (var bhi = 0; bhi < bossRacer.hp; bhi++) {
            ctx.fillRect(bp.x - bw * 0.4 + bhi * (bw * 0.2), bp.y - bh - 12, bw * 0.15, 3);
          }
        }
      }
    }
  }

  // === DRAW PLAYER CAR (baseling is the driver) ===
  drawPlayerCar();

  // === TIRE TRAILS ===
  for (var tti = 0; tti < tireTrails.length; tti++) {
    var trail = tireTrails[tti];
    ctx.globalAlpha = trail.life * 0.5;
    ctx.fillStyle = '#333';
    ctx.fillRect(trail.x - 2, trail.y, 4, 3);
    ctx.fillRect(trail.x + 36, trail.y, 4, 3);
  }
  ctx.globalAlpha = 1;

  // === DUST PARTICLES ===
  for (var dpi = 0; dpi < dustParticles.length; dpi++) {
    var dp = dustParticles[dpi];
    ctx.globalAlpha = dp.life * 1.5;
    ctx.fillStyle = dp.color;
    ctx.beginPath();
    ctx.arc(dp.x, dp.y, dp.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // === SPEED LINES ===
  if (speedKmh > 180) {
    var lineAlpha = (speedKmh - 180) / 120;
    ctx.strokeStyle = 'rgba(255,255,255,' + (lineAlpha * 0.4) + ')';
    ctx.lineWidth = 1;
    for (var sl = 0; sl < 10; sl++) {
      var slx = (sl * 67 + frame * 3) % GW;
      var sly = GH * 0.3 + sl * 18;
      ctx.beginPath();
      ctx.moveTo(slx, sly);
      ctx.lineTo(slx - 25 - speedKmh * 0.12, sly + 35 + sl * 5);
      ctx.stroke();
    }
  }

  // === WEATHER: RAIN ===
  if (TRACKS[currentTrack].scenery === 'forest') {
    ctx.strokeStyle = 'rgba(180,200,255,0.4)';
    ctx.lineWidth = 1;
    for (var ri = 0; ri < rainDrops.length; ri++) {
      var rd = rainDrops[ri];
      ctx.beginPath();
      ctx.moveTo(rd.x, rd.y);
      ctx.lineTo(rd.x - 3, rd.y + rd.len);
      ctx.stroke();
    }
    // Puddle reflections on road
    if (frame % 2 === 0) {
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#88aaff';
      for (var pi = 0; pi < 5; pi++) {
        var px = GW * 0.2 + pi * GW * 0.15;
        var py = GH - 20 - pi * 5;
        ctx.fillRect(px - 10, py, 20, 2);
      }
      ctx.globalAlpha = 1;
    }
  }

  // === WEATHER: SNOW ===
  if (TRACKS[currentTrack].scenery === 'snow') {
    ctx.fillStyle = '#fff';
    for (var sni = 0; sni < rainDrops.length; sni++) {
      var sf = rainDrops[sni];
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.02 + sni) * 0.3;
      ctx.beginPath();
      ctx.arc(sf.x, sf.y, sf.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // === WEATHER: VOLCANIC EMBERS ===
  if (TRACKS[currentTrack].scenery === 'volcano') {
    for (var vei = 0; vei < rainDrops.length; vei++) {
      var ve = rainDrops[vei];
      ctx.globalAlpha = 0.5 + ve.glow * 0.5;
      ctx.fillStyle = ve.glow > 0.5 ? '#ff6600' : '#ff4400';
      ctx.beginPath();
      ctx.arc(ve.x, ve.y, ve.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // === TURBO FLAMES ===
  if (turboTimer > 0) {
    var flameSize = 8 + Math.sin(frame * 0.5) * 4;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(GW/2 - 25, GH - 35);
    ctx.lineTo(GW/2 - 25 - flameSize, GH - 35 + flameSize * 2);
    ctx.lineTo(GW/2 - 20, GH - 35 + flameSize);
    ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath();
    ctx.moveTo(GW/2 + 25, GH - 35);
    ctx.lineTo(GW/2 + 25 + flameSize, GH - 35 + flameSize * 2);
    ctx.lineTo(GW/2 + 20, GH - 35 + flameSize);
    ctx.fill();
    // Inner flame core
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(GW/2 - 24, GH - 34);
    ctx.lineTo(GW/2 - 24 - flameSize * 0.4, GH - 34 + flameSize);
    ctx.lineTo(GW/2 - 21, GH - 34 + flameSize * 0.5);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === SHIELD AURA ===
  if (crashTimer < 0) {
    var shieldPulse = Math.sin(frame * 0.15) * 0.2 + 0.3;
    ctx.globalAlpha = shieldPulse;
    ctx.strokeStyle = '#3cacd7';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(GW / 2 + steerInput * 15, GH - 50, 30, 25, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === DRAFT INDICATOR ===
  if (draftBonus > 0) {
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPORE DRAFTING', GW / 2, GH - 70);
    ctx.globalAlpha = 1;
  }

  TAS.particles.draw();
  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  drawHUD();

  // === SCORE POPUPS ===
  drawScorePopups();

  // === TUTORIAL OVERLAY ===
  if (tutorialTimer > 0) {
    drawTutorial();
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawHazard(hazard, p, fog) {
  var s = p.scale * 400;
  if (s < 2) return;
  var hx = p.x + hazard.lane * p.w * 0.5;
  ctx.globalAlpha = (1 - fog) * 0.7;

  switch(hazard.type) {
    case 'spore_cloud':
      ctx.fillStyle = '#44cc88';
      for (var ci = 0; ci < 3; ci++) {
        ctx.beginPath();
        ctx.arc(hx + Math.sin(frame * 0.05 + ci) * s * 0.3, p.y - s * 0.2, s * (0.3 + ci * 0.1), 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'reactor_leak':
      ctx.fillStyle = '#ff6600';
      ctx.globalAlpha *= (Math.sin(frame * 0.1) * 0.3 + 0.7);
      ctx.beginPath();
      ctx.arc(hx, p.y - s * 0.1, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(hx, p.y - s * 0.1, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'mycelial_crack':
      ctx.strokeStyle = '#886644';
      ctx.lineWidth = s * 0.1;
      ctx.beginPath();
      ctx.moveTo(hx - s * 0.5, p.y);
      ctx.lineTo(hx - s * 0.1, p.y - s * 0.15);
      ctx.lineTo(hx + s * 0.2, p.y + s * 0.05);
      ctx.lineTo(hx + s * 0.5, p.y - s * 0.1);
      ctx.stroke();
      break;
    case 'fungal_bloom':
      ctx.fillStyle = '#44ff88';
      ctx.beginPath();
      ctx.arc(hx, p.y - s * 0.15, s * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88ffaa';
      ctx.globalAlpha *= (Math.sin(frame * 0.08) * 0.3 + 0.7);
      ctx.beginPath();
      ctx.arc(hx, p.y - s * 0.15, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
  ctx.globalAlpha = 1;
}

function drawPlayerCar() {
  var cx = GW / 2 + steerInput * 15;
  var cy = GH - 50;

  if (spinTimer > 0) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(spinTimer * 8);
    ctx.translate(-cx, -cy);
  }
  if (crashTimer > 0) {
    ctx.save();
    ctx.translate(cx, cy);
    var crashShake = Math.sin(crashTimer * 20) * 5;
    ctx.translate(crashShake, Math.abs(crashShake) * 0.5);
    ctx.translate(-cx, -cy);
  }

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, cx, cy, 44, { flipX: false, frame: frame })) {
    // Car body (baseling-colored)
    ctx.fillStyle = statB.color || '#2244cc';
    ctx.fillRect(cx - 22, cy - 15, 44, 35);
    // Roof/cabin
    var roofColor = TAS.math.lerpColor ? TAS.math.lerpColor(statB.color || '#2244cc', '#000', 0.3) : '#1a3399';
    ctx.fillStyle = typeof roofColor === 'string' ? roofColor : '#1a3399';
    ctx.fillRect(cx - 16, cy - 22, 32, 12);
    // Windshield
    ctx.fillStyle = '#88ccff';
    ctx.fillRect(cx - 13, cy - 20, 26, 8);
    // Baseling driver (tiny icon inside windshield)
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon || 'B', cx, cy - 14);
    // Hood stripe (reactor glow)
    ctx.fillStyle = turboTimer > 0 ? '#ff6600' : (statB.color || '#44ffaa');
    ctx.fillRect(cx - 3, cy - 10, 6, 20);
    // Wheels
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - 26, cy - 8, 6, 14);
    ctx.fillRect(cx + 20, cy - 8, 6, 14);
    ctx.fillRect(cx - 26, cy + 12, 6, 14);
    ctx.fillRect(cx + 20, cy + 12, 6, 14);
    // Wheel spin animation
    if (playerSpeed > 0.1) {
      ctx.fillStyle = '#333';
      var wheelFrame = frame % 4;
      if (wheelFrame < 2) {
        ctx.fillRect(cx - 25, cy + 1, 4, 2);
        ctx.fillRect(cx + 21, cy + 1, 4, 2);
      }
    }
    // Taillights
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(cx - 20, cy + 17, 8, 3);
    ctx.fillRect(cx + 12, cy + 17, 8, 3);
    // Headlights
    ctx.fillStyle = '#ffff88';
    ctx.fillRect(cx - 18, cy - 14, 6, 3);
    ctx.fillRect(cx + 12, cy - 14, 6, 3);
    // Headlight beams at night
    if (TRACKS[currentTrack] && (TRACKS[currentTrack].scenery === 'city' || TRACKS[currentTrack].scenery === 'final')) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#ffff88';
      ctx.beginPath();
      ctx.moveTo(cx - 15, cy - 14);
      ctx.lineTo(cx - 40, cy - 60);
      ctx.lineTo(cx + 40, cy - 60);
      ctx.lineTo(cx + 15, cy - 14);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  if (spinTimer > 0) ctx.restore();
  if (crashTimer > 0) ctx.restore();

  if (spinTimer > 0 || crashTimer > 0) {
    if (frame % 3 === 0) {
      TAS.particles.spawn(cx + TAS.math.randRange(-20, 20), cy + 15, '#ffaa00', 2, 2, { gravity: 0.15, size: 1 });
    }
  }

  // Exhaust smoke when accelerating
  if (playerSpeed > 0.5 && frame % 4 === 0) {
    TAS.particles.spawn(cx + TAS.math.randRange(-3, 3), cy + 22, '#666', 1, 1, { gravity: -0.02, size: 1 });
  }
}

function drawSceneryObject(obj, x, y, scale, fog, track) {
  var s = scale * 500;
  if (s < 2) return;
  var alpha = 1 - fog;
  ctx.globalAlpha = alpha;

  switch(obj.type) {
    case 'palm':
      ctx.fillStyle = '#5d4e37';
      ctx.fillRect(x - s*0.1, y - s*2.5, s*0.2, s*2.5);
      ctx.fillStyle = '#228B22';
      ctx.beginPath();
      ctx.arc(x, y - s*2.8, s*0.8, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'sign':
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.05, y - s*1.5, s*0.1, s*1.5);
      ctx.fillStyle = '#2255aa';
      ctx.fillRect(x - s*0.5, y - s*2, s*1, s*0.6);
      break;
    case 'rock':
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.moveTo(x - s*0.4, y);
      ctx.lineTo(x - s*0.2, y - s*0.6);
      ctx.lineTo(x + s*0.3, y - s*0.5);
      ctx.lineTo(x + s*0.4, y);
      ctx.fill();
      break;
    case 'cactus':
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(x - s*0.1, y - s*2, s*0.2, s*2);
      ctx.fillRect(x - s*0.5, y - s*1.5, s*0.15, s*0.8);
      ctx.fillRect(x + s*0.35, y - s*1.2, s*0.15, s*0.7);
      break;
    case 'skull':
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(x - s*0.1, y - s*0.35, s*0.06, 0, Math.PI * 2);
      ctx.arc(x + s*0.1, y - s*0.35, s*0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'pine':
    case 'pine_snow':
      ctx.fillStyle = '#4a2800';
      ctx.fillRect(x - s*0.08, y - s*0.5, s*0.16, s*0.5);
      ctx.fillStyle = obj.type === 'pine_snow' ? '#446655' : '#1a5e1a';
      ctx.beginPath();
      ctx.moveTo(x, y - s*2.5);
      ctx.lineTo(x - s*0.6, y - s*0.5);
      ctx.lineTo(x + s*0.6, y - s*0.5);
      ctx.fill();
      if (obj.type === 'pine_snow') {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(x, y - s*2.5);
        ctx.lineTo(x - s*0.3, y - s*1.8);
        ctx.lineTo(x + s*0.3, y - s*1.8);
        ctx.fill();
      }
      break;
    case 'guardrail':
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x - s*0.5, y - s*0.5, s*1, s*0.1);
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.3, y - s*0.5, s*0.06, s*0.5);
      ctx.fillRect(x + s*0.25, y - s*0.5, s*0.06, s*0.5);
      break;
    case 'building':
      var bh = s * (2 + Math.sin(x) * 1.5);
      ctx.fillStyle = '#334';
      ctx.fillRect(x - s*0.6, y - bh, s*1.2, bh);
      ctx.fillStyle = '#ffdd44';
      for (var wy = 0; wy < bh - s*0.3; wy += s*0.4) {
        for (var wx = 0; wx < 3; wx++) {
          if (Math.random() > 0.3) {
            ctx.fillRect(x - s*0.4 + wx * s*0.3, y - bh + wy + s*0.1, s*0.15, s*0.2);
          }
        }
      }
      break;
    case 'neon':
      ctx.fillStyle = '#666';
      ctx.fillRect(x - s*0.05, y - s*2, s*0.1, s*2);
      var neonColor = ['#ff00ff','#00ffff','#ffff00','#ff4400'][Math.floor(Math.abs(x)) % 4];
      ctx.fillStyle = neonColor;
      ctx.globalAlpha = alpha * (0.6 + Math.sin(frame * 0.1 + x) * 0.4);
      ctx.fillRect(x - s*0.4, y - s*2.2, s*0.8, s*0.4);
      break;
    case 'lamppost':
      ctx.fillStyle = '#555';
      ctx.fillRect(x - s*0.04, y - s*2, s*0.08, s*2);
      ctx.fillStyle = '#ffdd66';
      ctx.beginPath();
      ctx.arc(x, y - s*2.1, s*0.15, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'tree':
      ctx.fillStyle = '#3d2200';
      ctx.fillRect(x - s*0.12, y - s*0.8, s*0.24, s*0.8);
      ctx.fillStyle = '#1a6b1a';
      ctx.beginPath();
      ctx.arc(x, y - s*1.5, s*0.7, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'bush':
      ctx.fillStyle = '#226622';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'mushroom':
      ctx.fillStyle = '#ddd';
      ctx.fillRect(x - s*0.06, y - s*0.4, s*0.12, s*0.4);
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.arc(x, y - s*0.5, s*0.25, 0, Math.PI, true);
      ctx.fill();
      break;
    case 'snowman':
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y - s*0.3, s*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y - s*0.8, s*0.2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'ice_rock':
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.moveTo(x - s*0.3, y);
      ctx.lineTo(x, y - s*0.7);
      ctx.lineTo(x + s*0.35, y);
      ctx.fill();
      break;
    case 'lava_rock':
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(x - s*0.4, y);
      ctx.lineTo(x - s*0.1, y - s*0.8);
      ctx.lineTo(x + s*0.3, y - s*0.6);
      ctx.lineTo(x + s*0.4, y);
      ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.moveTo(x - s*0.1, y - s*0.5);
      ctx.lineTo(x, y - s*0.8);
      ctx.lineTo(x + s*0.1, y - s*0.5);
      ctx.fill();
      break;
    case 'dead_tree':
      ctx.fillStyle = '#2a1a0a';
      ctx.fillRect(x - s*0.08, y - s*1.5, s*0.16, s*1.5);
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = s*0.06;
      ctx.beginPath();
      ctx.moveTo(x, y - s*1.2);
      ctx.lineTo(x - s*0.4, y - s*1.8);
      ctx.moveTo(x, y - s*1.0);
      ctx.lineTo(x + s*0.3, y - s*1.5);
      ctx.stroke();
      break;
    case 'flame_vent':
      ctx.fillStyle = '#444';
      ctx.fillRect(x - s*0.15, y - s*0.3, s*0.3, s*0.3);
      if (frame % 10 < 6) {
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(x - s*0.1, y - s*0.3);
        ctx.lineTo(x, y - s*1.2 - Math.sin(frame*0.2)*s*0.3);
        ctx.lineTo(x + s*0.1, y - s*0.3);
        ctx.fill();
      }
      break;
    case 'crystal':
      ctx.fillStyle = '#aa44ff';
      ctx.globalAlpha = alpha * (0.7 + Math.sin(frame * 0.05 + x) * 0.3);
      ctx.beginPath();
      ctx.moveTo(x, y - s*1.5);
      ctx.lineTo(x - s*0.3, y - s*0.3);
      ctx.lineTo(x + s*0.3, y - s*0.3);
      ctx.fill();
      ctx.fillStyle = '#cc88ff';
      ctx.beginPath();
      ctx.moveTo(x + s*0.1, y - s*1.2);
      ctx.lineTo(x - s*0.15, y - s*0.3);
      ctx.lineTo(x + s*0.2, y - s*0.5);
      ctx.fill();
      break;
    case 'obelisk':
      ctx.fillStyle = '#222';
      ctx.fillRect(x - s*0.15, y - s*2.5, s*0.3, s*2.5);
      ctx.fillStyle = '#00ffcc';
      ctx.globalAlpha = alpha * (0.5 + Math.sin(frame * 0.04 + x) * 0.5);
      ctx.fillRect(x - s*0.08, y - s*2.3, s*0.16, s*0.3);
      break;
    // === TASERN SCENERY (Pass 2) ===
    case 'spore_lamp':
      ctx.fillStyle = '#555';
      ctx.fillRect(x - s*0.04, y - s*1.8, s*0.08, s*1.8);
      ctx.fillStyle = '#38d973';
      ctx.globalAlpha = alpha * (0.5 + Math.sin(frame * 0.06 + x) * 0.5);
      ctx.beginPath();
      ctx.arc(x, y - s*2, s*0.2, 0, Math.PI * 2);
      ctx.fill();
      // Spore particles
      ctx.fillStyle = '#a855f7';
      ctx.globalAlpha = alpha * 0.4;
      ctx.beginPath();
      ctx.arc(x + Math.sin(frame*0.03)*s*0.2, y - s*2.2, s*0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'coral_fan':
      ctx.fillStyle = '#ff6688';
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - s*0.5, y - s*1.2);
      ctx.lineTo(x - s*0.2, y - s*0.8);
      ctx.lineTo(x, y - s*1.5);
      ctx.lineTo(x + s*0.2, y - s*0.8);
      ctx.lineTo(x + s*0.5, y - s*1.2);
      ctx.fill();
      break;
    case 'reactor_shell':
      ctx.fillStyle = '#556';
      ctx.fillRect(x - s*0.5, y - s*1.2, s*1, s*1.2);
      ctx.fillStyle = '#44ffaa';
      ctx.globalAlpha = alpha * (0.3 + Math.sin(frame*0.04+x)*0.3);
      ctx.fillRect(x - s*0.3, y - s*0.8, s*0.6, s*0.4);
      break;
    case 'dust_devil_obj':
      ctx.fillStyle = '#bb9944';
      ctx.globalAlpha = alpha * 0.4;
      for (var ddi = 0; ddi < 4; ddi++) {
        var ddAngle = frame * 0.05 + ddi * 1.57;
        ctx.beginPath();
        ctx.arc(x + Math.cos(ddAngle)*s*0.3, y - s*(0.5+ddi*0.3), s*0.15, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    case 'spore_tower':
      ctx.fillStyle = '#446655';
      ctx.fillRect(x - s*0.15, y - s*2.5, s*0.3, s*2.5);
      ctx.fillStyle = '#44dd88';
      ctx.beginPath();
      ctx.arc(x, y - s*2.7, s*0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88ffaa';
      ctx.globalAlpha = alpha * (0.4 + Math.sin(frame*0.05+x)*0.4);
      ctx.beginPath();
      ctx.arc(x, y - s*2.7, s*0.15, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'reactor_sign':
      ctx.fillStyle = '#444';
      ctx.fillRect(x - s*0.05, y - s*1.8, s*0.1, s*1.8);
      ctx.fillStyle = '#222';
      ctx.fillRect(x - s*0.5, y - s*2.2, s*1, s*0.5);
      ctx.fillStyle = '#44ffaa';
      ctx.font = Math.max(4, Math.floor(s*0.15)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GARDEN', x, y - s*1.85);
      break;
    case 'giant_mushroom':
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(x - s*0.15, y - s*1.5, s*0.3, s*1.5);
      ctx.fillStyle = '#cc4444';
      ctx.beginPath();
      ctx.arc(x, y - s*1.8, s*0.6, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x - s*0.2, y - s*1.9, s*0.08, 0, Math.PI*2);
      ctx.arc(x + s*0.15, y - s*1.7, s*0.06, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'spore_cluster':
      ctx.fillStyle = '#44cc88';
      for (var spc = 0; spc < 4; spc++) {
        ctx.beginPath();
        ctx.arc(x + (spc-1.5)*s*0.2, y - s*(0.2+spc*0.15), s*(0.15+spc*0.03), 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#88ffaa';
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.arc(x, y - s*0.6, s*0.4, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'frozen_spore':
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(x, y - s*0.5, s*0.35, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#44cc88';
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.arc(x, y - s*0.5, s*0.2, 0, Math.PI*2);
      ctx.fill();
      break;
    case 'magma_shroom':
      ctx.fillStyle = '#554';
      ctx.fillRect(x - s*0.1, y - s*0.8, s*0.2, s*0.8);
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.arc(x, y - s*1, s*0.35, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.globalAlpha = alpha * (0.5 + Math.sin(frame*0.08+x)*0.5);
      ctx.beginPath();
      ctx.arc(x, y - s*1, s*0.2, Math.PI, 0);
      ctx.fill();
      break;
    case 'prime_reactor':
      ctx.fillStyle = '#333';
      ctx.fillRect(x - s*0.4, y - s*2, s*0.8, s*2);
      ctx.fillStyle = '#aa44ff';
      ctx.globalAlpha = alpha * (0.4 + Math.sin(frame*0.03+x)*0.4);
      ctx.fillRect(x - s*0.25, y - s*1.8, s*0.5, s*0.3);
      ctx.fillStyle = '#ff00ff';
      ctx.globalAlpha = alpha * (0.3 + Math.cos(frame*0.05+x)*0.3);
      ctx.fillRect(x - s*0.25, y - s*1.3, s*0.5, s*0.3);
      break;
  }
  ctx.globalAlpha = 1;
}

function applyFog(color, fogColor, fogFactor) {
  if (fogFactor <= 0) return color;
  var r1, g1, b1;
  if (color.length === 4) {
    r1 = parseInt(color[1]+color[1], 16);
    g1 = parseInt(color[2]+color[2], 16);
    b1 = parseInt(color[3]+color[3], 16);
  } else {
    r1 = parseInt(color.slice(1,3), 16);
    g1 = parseInt(color.slice(3,5), 16);
    b1 = parseInt(color.slice(5,7), 16);
  }
  var r2, g2, b2;
  if (fogColor.length === 4) {
    r2 = parseInt(fogColor[1]+fogColor[1], 16);
    g2 = parseInt(fogColor[2]+fogColor[2], 16);
    b2 = parseInt(fogColor[3]+fogColor[3], 16);
  } else {
    r2 = parseInt(fogColor.slice(1,3), 16);
    g2 = parseInt(fogColor.slice(3,5), 16);
    b2 = parseInt(fogColor.slice(5,7), 16);
  }
  var r = Math.floor(r1 + (r2 - r1) * fogFactor);
  var g = Math.floor(g1 + (g2 - g1) * fogFactor);
  var b = Math.floor(b1 + (b2 - b1) * fogFactor);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';

  // Speed
  ctx.fillStyle = speedKmh > 250 ? '#e6482e' : (speedKmh > 180 ? '#f4b41b' : '#38d973');
  ctx.fillText('SPD: ' + speedKmh + ' km/h', 5, 12);

  // Gear
  ctx.fillStyle = '#3cacd7';
  ctx.fillText('G' + gear, 120, 12);

  // Time
  ctx.fillStyle = timeLeft < 10 ? '#e6482e' : '#f4b41b';
  ctx.textAlign = 'center';
  ctx.fillText('TIME: ' + Math.ceil(timeLeft), GW/2, 12);

  // Track name
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText(TRACKS[currentTrack].name, GW/2, 24);

  // Score (INT multiplier indicator)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('POOP: ' + score, 5, 24);

  // Turbo + recharge bar
  ctx.textAlign = 'right';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = '#ff8800';
  var turboStr = '';
  for (var i = 0; i < turboCount; i++) turboStr += 'T';
  ctx.fillText('SPORE: ' + turboStr, GW - 5, 12);

  // Turbo recharge bar (WIS)
  if (turboCount < 3) {
    var rechargeW = 40;
    var rechargePct = turboRecharge / 12;
    ctx.fillStyle = 'rgba(255,136,0,0.3)';
    ctx.fillRect(GW - 5 - rechargeW, 16, rechargeW, 4);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(GW - 5 - rechargeW, 16, rechargeW * rechargePct, 4);
  }

  // Combo indicator
  if (comboCounter > 1) {
    ctx.textAlign = 'right';
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('COMBO x' + comboCounter, GW - 5, 24);
  }

  // Shield timer
  if (crashTimer < 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#3cacd7';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('POOP SHIELD: ' + Math.ceil(Math.abs(crashTimer)) + 's', 140, 12);
  }

  // Continues
  if (continues > 0) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#38d973';
    ctx.font = '9px monospace';
    ctx.fillText('LIVES: ' + continues, 140, 24);
  }

  // Track progress bar
  var segIdx = Math.floor(position / SEG_LENGTH) % TOTAL_SEGMENTS;
  var progress = segIdx / TOTAL_SEGMENTS;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(5, GH - 8, GW - 10, 4);
  ctx.fillStyle = '#38d973';
  ctx.fillRect(5, GH - 8, (GW - 10) * progress, 4);

  // Checkpoint markers
  var checkpoints = TRACKS[currentTrack].checkpoints;
  ctx.fillStyle = '#f4b41b';
  for (var c = 0; c < checkpoints.length; c++) {
    var cpx = 5 + (GW - 10) * (checkpoints[c] / TOTAL_SEGMENTS);
    ctx.fillRect(cpx - 1, GH - 10, 2, 8);
  }

  // Mold car marker on progress bar
  if (bossRacer && !bossRacer.defeated) {
    var bossPx = 5 + (GW - 10) * ((TOTAL_SEGMENTS - 80) / TOTAL_SEGMENTS);
    ctx.fillStyle = '#e6482e';
    ctx.fillRect(bossPx - 2, GH - 11, 4, 9);
  }

  // Time warning flash
  if (timeLeft < 10 && Math.floor(frame / 15) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 28, GW, GH - 36);
  }

  // Baseling stat indicator (top-right corner)
  if (statB.level > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(GW - 85, 28, 85, 14);
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText((statB.name || 'Baseling') + ' Lv' + statB.level, GW - 3, 38);
  }
}
