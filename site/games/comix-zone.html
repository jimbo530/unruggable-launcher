<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Comix Zone</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'PUNCH', b: 'JUMP' } });

const GRAVITY = 900;
const FLOOR_Y = 240;
const COMBO_WINDOW = 400;
const SPECIAL_HP_COST = 8;
const KNIFE_HITS = 6;

// === SOUND EFFECTS ===
const SFX = {
  punch()   { TAS.audio.playTone(200, 0.06, 'square', 0.1, 100); TAS.audio.playNoise(0.06, 0.1, 800); },
  punch2()  { TAS.audio.playTone(250, 0.07, 'square', 0.11, 120); TAS.audio.playNoise(0.07, 0.11, 900); },
  punch3()  { TAS.audio.playTone(300, 0.09, 'sawtooth', 0.12, 80); TAS.audio.playNoise(0.1, 0.13, 600); },
  kick()    { TAS.audio.playTone(180, 0.1, 'square', 0.1, 80); TAS.audio.playNoise(0.08, 0.12, 500); },
  grab()    { TAS.audio.playTone(120, 0.12, 'triangle', 0.08, 60); },
  throwSfx(){ TAS.audio.playTone(250, 0.12, 'triangle', 0.08, 500); TAS.audio.playNoise(0.08, 0.06, 600); },
  special() { TAS.audio.playTone(400, 0.3, 'sawtooth', 0.12, 100); TAS.audio.playNoise(0.2, 0.1, 1200); },
  hit()     { TAS.audio.playNoise(0.08, 0.08, 600); TAS.audio.playTone(150, 0.05, 'square', 0.06, 80); },
  crack()   { TAS.audio.playNoise(0.15, 0.14, 400); TAS.audio.playTone(100, 0.12, 'square', 0.1, 40); },
  item()    { TAS.audio.playTone(440, 0.06, 'square', 0.08); setTimeout(function(){ TAS.audio.playTone(880, 0.08, 'square', 0.08); }, 60); },
  bomb()    { TAS.audio.playNoise(0.4, 0.15, 300); TAS.audio.playTone(80, 0.5, 'sawtooth', 0.12, 20); },
  die()     { TAS.audio.playTone(400, 0.4, 'sawtooth', 0.12, 60); setTimeout(function(){ TAS.audio.playTone(200, 0.3, 'square', 0.06, 40); }, 250); },
  clear()   { [523, 659, 784, 1047].forEach(function(n, i){ setTimeout(function(){ TAS.audio.playTone(n, 0.15, 'square', 0.08); }, i * 120); }); },
  draw()    { TAS.audio.playTone(600, 0.08, 'sine', 0.04, 1200); },
  border()  { TAS.audio.playNoise(0.12, 0.1, 300); TAS.audio.playTone(90, 0.15, 'square', 0.08, 40); }
};

// === GAME STATE ===
let state = 'title';
let frame = 0;
let score = 0;
let highScore = TAS.score.load('comixzone_hi');
let comboMult = 1;
let comboTimer = 0;
let pageNum = 0;
let panelIdx = 0;
let panelClearTimer = 0;
let transitionTimer = 0;
let transitionFrom = null;
let transitionTo = null;
let drawingEnemies = [];
let impactTexts = [];
let speechBubble = null;
let speechTimer = 0;

// Player
let player = {};
// Enemies
let enemies = [];
// Items on ground
let items = [];

// === PAGE/PANEL DEFINITIONS ===
const PAGES = [
  { name: 'City Streets', bg: '#2a2a3a', accent: '#ff6633', panels: [
    { x: 10, y: 35, w: 225, h: 130 },
    { x: 245, y: 35, w: 225, h: 130 },
    { x: 10, y: 175, w: 150, h: 130 },
    { x: 170, y: 175, w: 150, h: 130 },
    { x: 330, y: 175, w: 140, h: 130, boss: true }
  ]},
  { name: 'Sewer Depths', bg: '#1a2a1a', accent: '#33ccaa', panels: [
    { x: 10, y: 35, w: 150, h: 130 },
    { x: 170, y: 35, w: 150, h: 130 },
    { x: 330, y: 35, w: 140, h: 130 },
    { x: 10, y: 175, w: 225, h: 130 },
    { x: 245, y: 175, w: 225, h: 130, boss: true }
  ]},
  { name: 'Rooftops', bg: '#1a1a3a', accent: '#ffaa33', panels: [
    { x: 10, y: 35, w: 310, h: 100 },
    { x: 330, y: 35, w: 140, h: 100 },
    { x: 10, y: 145, w: 140, h: 110 },
    { x: 160, y: 145, w: 160, h: 110 },
    { x: 330, y: 145, w: 140, h: 110 },
    { x: 10, y: 265, w: 460, h: 45, boss: true }
  ]},
  { name: 'Factory', bg: '#2a1a1a', accent: '#ff4444', panels: [
    { x: 10, y: 35, w: 225, h: 90 },
    { x: 245, y: 35, w: 225, h: 90 },
    { x: 10, y: 135, w: 150, h: 90 },
    { x: 170, y: 135, w: 150, h: 90 },
    { x: 330, y: 135, w: 140, h: 90 },
    { x: 10, y: 235, w: 460, h: 70, boss: true }
  ]},
  { name: 'Fungal Lab', bg: '#1a1a2a', accent: '#aa44ff', panels: [
    { x: 10, y: 35, w: 150, h: 130 },
    { x: 170, y: 35, w: 300, h: 65 },
    { x: 170, y: 110, w: 300, h: 65 },
    { x: 10, y: 175, w: 225, h: 130 },
    { x: 245, y: 175, w: 225, h: 130, boss: true }
  ]},
  { name: "The Artist's Desk", bg: '#3a3020', accent: '#ffdd44', panels: [
    { x: 10, y: 35, w: 225, h: 130 },
    { x: 245, y: 35, w: 225, h: 130 },
    { x: 10, y: 175, w: 150, h: 130 },
    { x: 170, y: 175, w: 300, h: 130, boss: true }
  ]}
];

// === ENEMY TYPES ===
function makeEnemy(type, px, py, panelW) {
  var e = {
    type: type, x: px, y: py, vx: 0, vy: 0,
    hp: 3, maxHp: 3, w: 20, h: 36, facing: -1,
    state: 'idle', stateTimer: 0, attackCd: 0,
    hitStun: 0, flash: 0, drawProgress: 0
  };
  if (type === 'blob') { e.hp = 2; e.maxHp = 2; e.w = 18; e.h = 24; e.speed = 40; e.dmg = 5; e.color = '#555'; }
  else if (type === 'soldier') { e.hp = 4; e.maxHp = 4; e.w = 20; e.h = 36; e.speed = 55; e.dmg = 8; e.color = '#668'; }
  else if (type === 'pencil') { e.hp = 3; e.maxHp = 3; e.w = 14; e.h = 40; e.speed = 70; e.dmg = 10; e.color = '#cc8'; }
  else if (type === 'eraser') { e.hp = 8; e.maxHp = 8; e.w = 28; e.h = 32; e.speed = 25; e.dmg = 12; e.color = '#a66'; }
  else if (type === 'boss') { e.hp = 20 + pageNum * 5; e.maxHp = e.hp; e.w = 32; e.h = 44; e.speed = 35; e.dmg = 15; e.color = '#c44'; e.attackCd = 60; }
  return e;
}

// === PANEL ENEMY SPAWNS ===
function getEnemiesForPanel(pg, pi) {
  var panel = PAGES[pg].panels[pi];
  var types = ['blob', 'soldier', 'pencil', 'eraser'];
  var list = [];
  if (panel.boss) {
    list.push({ type: 'boss', x: panel.w * 0.7, y: 0 });
    if (pg > 2) list.push({ type: types[TAS.math.randInt(0, 2)], x: panel.w * 0.4, y: 0 });
  } else {
    var count = 2 + Math.floor(pg * 0.5) + (pi > 1 ? 1 : 0);
    count = Math.min(count, 4);
    for (var i = 0; i < count; i++) {
      var t = types[TAS.math.randInt(0, Math.min(pg + 1, 3))];
      list.push({ type: t, x: panel.w * (0.4 + i * 0.15), y: 0 });
    }
  }
  return list;
}

// === PLAYER INIT ===
function resetPlayer() {
  player = {
    x: 30, y: FLOOR_Y, vx: 0, vy: 0,
    w: 18, h: 36, facing: 1,
    hp: 100, maxHp: 100,
    state: 'idle', stateTimer: 0,
    comboStep: 0, comboTime: 0,
    jumpKick: false, grabbing: null,
    knife: 0, bombs: 0,
    invuln: 0, attackHit: false
  };
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  comboMult = 1;
  comboTimer = 0;
  pageNum = 0;
  panelIdx = 0;
  resetPlayer();
  enemies = [];
  items = [];
  impactTexts = [];
  drawingEnemies = [];
  speechBubble = null;
  TAS.particles.clear();
  enterPanel();
}

function enterPanel() {
  enemies = [];
  items = [];
  drawingEnemies = [];
  player.x = 30;
  player.y = FLOOR_Y;
  player.state = 'idle';
  player.grabbing = null;
  panelClearTimer = 0;

  var spawns = getEnemiesForPanel(pageNum, panelIdx);
  for (var i = 0; i < spawns.length; i++) {
    var s = spawns[i];
    drawingEnemies.push({ type: s.type, x: s.x, y: s.y, progress: 0, delay: i * 0.6 });
  }

  // Random item in background (30% chance)
  if (Math.random() < 0.3 && !PAGES[pageNum].panels[panelIdx].boss) {
    var itypes = ['health', 'health', 'knife', 'bomb'];
    items.push({ type: itypes[TAS.math.randInt(0, 3)], x: TAS.math.randRange(40, getCurrentPanel().w - 40), y: FLOOR_Y - 10, hidden: true });
  }

  // Speech bubble intro on first panel of page
  if (panelIdx === 0) {
    var msgs = [
      "You can't escape my pages!",
      "I'll draw your doom!",
      "Time to get sketched out!",
      "My ink runs deep!",
      "Prepare for erasure!",
      "This is MY masterpiece!"
    ];
    speechBubble = msgs[pageNum];
    speechTimer = 2.5;
  }
}

function getCurrentPanel() {
  return PAGES[pageNum].panels[panelIdx];
}

// === INPUT HANDLING ===
function inputLeft()  { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function inputUp()    { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function inputDown()  { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function inputPunch() { return TAS.input.keys['KeyZ'] || TAS.input.keys['KeyJ'] || TAS.input.keys['Space'] || TAS.input.touch.a; }
function inputJump()  { return TAS.input.keys['KeyX'] || TAS.input.keys['KeyK'] || TAS.input.touch.b; }

var prevPunch = false, prevJump = false, prevDown = false;
function punchPressed() { var p = inputPunch(); var r = p && !prevPunch; prevPunch = p; return r; }
function jumpPressed()  { var p = inputJump(); var r = p && !prevJump; prevJump = p; return r; }
function downPressed()  { var p = inputDown(); var r = p && !prevDown; prevDown = p; return r; }

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Impact text decay
  for (var i = impactTexts.length - 1; i >= 0; i--) {
    impactTexts[i].life -= dt * 3;
    impactTexts[i].y -= dt * 40;
    if (impactTexts[i].life <= 0) impactTexts.splice(i, 1);
  }

  if (state === 'title') {
    var pp = punchPressed(); var jp = jumpPressed();
    if (pp || jp) { TAS.audio.ensureAudio(); startGame(); }
    return;
  }

  if (state === 'gameOver') {
    var pp2 = punchPressed(); var jp2 = jumpPressed();
    if (pp2 || jp2) { state = 'title'; }
    return;
  }

  if (state === 'pageIntro') {
    transitionTimer -= dt;
    if (transitionTimer <= 0) { state = 'playing'; enterPanel(); }
    return;
  }

  if (state === 'transition') {
    transitionTimer -= dt;
    if (transitionTimer <= 0) {
      panelIdx++;
      if (panelIdx >= PAGES[pageNum].panels.length) {
        // Next page
        pageNum++;
        panelIdx = 0;
        if (pageNum >= PAGES.length) {
          // Victory!
          state = 'victory';
          if (score > highScore) { highScore = score; TAS.score.save('comixzone_hi', score); }
          return;
        }
        state = 'pageIntro';
        transitionTimer = 2.0;
      } else {
        state = 'playing';
        enterPanel();
      }
    }
    return;
  }

  if (state === 'victory') {
    var pp3 = punchPressed(); var jp3 = jumpPressed();
    if (pp3 || jp3) { state = 'title'; }
    return;
  }

  if (state !== 'playing') return;

  // Speech bubble
  if (speechTimer > 0) { speechTimer -= dt; if (speechTimer <= 0) speechBubble = null; }

  // Combo timer
  if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) comboMult = 1; }

  // Drawing enemies animation
  for (var di = drawingEnemies.length - 1; di >= 0; di--) {
    var de = drawingEnemies[di];
    if (de.delay > 0) { de.delay -= dt; continue; }
    de.progress += dt * 1.8;
    if (de.progress >= 1) {
      SFX.draw();
      var panel = getCurrentPanel();
      var ey = FLOOR_Y;
      enemies.push(makeEnemy(de.type, de.x, ey, panel.w));
      drawingEnemies.splice(di, 1);
    }
  }

  var panel = getCurrentPanel();
  var panelW = panel.w - 20;
  var panelFloor = FLOOR_Y;

  // === PLAYER UPDATE ===
  player.invuln = Math.max(0, player.invuln - dt);
  player.stateTimer -= dt;

  if (player.state === 'idle' || player.state === 'walk') {
    var moving = false;
    if (inputLeft()) { player.vx = -120; player.facing = -1; moving = true; }
    else if (inputRight()) { player.vx = 120; player.facing = 1; moving = true; }
    else { player.vx = 0; }
    player.state = moving ? 'walk' : 'idle';

    // Punch / combo
    if (punchPressed()) {
      if (player.knife > 0) {
        player.state = 'knife';
        player.stateTimer = 0.25;
        player.attackHit = false;
        player.knife--;
        SFX.punch3();
      } else if (inputDown() && player.comboStep === 0) {
        // Special move (costs HP!)
        player.state = 'special';
        player.stateTimer = 0.5;
        player.attackHit = false;
        player.hp -= SPECIAL_HP_COST;
        SFX.special();
        TAS.fx.flash('#ff4', 0.3);
        if (player.hp <= 0) { playerDie(); return; }
      } else {
        var now = performance.now();
        if (now - player.comboTime < COMBO_WINDOW && player.comboStep < 2) {
          player.comboStep++;
        } else {
          player.comboStep = 0;
        }
        player.comboTime = now;
        player.state = 'punch';
        player.stateTimer = 0.2 + player.comboStep * 0.05;
        player.attackHit = false;
        if (player.comboStep === 0) SFX.punch();
        else if (player.comboStep === 1) SFX.punch2();
        else SFX.punch3();
      }
    }

    // Jump
    if (jumpPressed() && player.y >= panelFloor - 1) {
      player.vy = -350;
      player.state = 'jump';
      player.jumpKick = false;
      TAS.audio.playTone(300, 0.08, 'square', 0.05, 500);
    }

    // Grab (down + punch near enemy)
    // handled in punch above
  }
  else if (player.state === 'punch' || player.state === 'knife' || player.state === 'special') {
    player.vx = 0;
    if (player.stateTimer <= 0) { player.state = 'idle'; }
  }
  else if (player.state === 'jump') {
    if (inputLeft()) { player.vx = -100; player.facing = -1; }
    else if (inputRight()) { player.vx = 100; player.facing = 1; }

    // Jump kick
    if (punchPressed() && !player.jumpKick) {
      player.jumpKick = true;
      player.attackHit = false;
      SFX.kick();
    }

    player.vy += GRAVITY * dt;
    if (player.y >= panelFloor) {
      player.y = panelFloor;
      player.vy = 0;
      player.state = 'idle';
      player.jumpKick = false;
    }
  }
  else if (player.state === 'hurt') {
    player.vx = -player.facing * 80;
    if (player.stateTimer <= 0) { player.state = 'idle'; player.vx = 0; }
  }
  else if (player.state === 'throw') {
    if (player.stateTimer <= 0) { player.state = 'idle'; }
  }

  // Apply velocity
  player.x += player.vx * dt;
  player.y += player.vy * dt;
  player.x = TAS.math.clamp(player.x, 10, panelW - 10);
  if (player.y > panelFloor) { player.y = panelFloor; player.vy = 0; }

  // === PLAYER ATTACK COLLISION ===
  if (!player.attackHit) {
    var atkRange = 0, atkDmg = 0, atkW = 30, atkH = 30;
    var atkX = player.x + player.facing * 20;
    var atkY = player.y - 18;

    if (player.state === 'punch') { atkRange = 1; atkDmg = 4 + player.comboStep * 3; atkW = 24; }
    else if (player.state === 'knife') { atkRange = 1; atkDmg = 12; atkW = 30; }
    else if (player.state === 'special') { atkRange = 1; atkDmg = 20; atkW = 60; atkH = 50; atkX = player.x; atkY = player.y - 25; }
    else if (player.jumpKick && player.state === 'jump') { atkRange = 1; atkDmg = 8; atkW = 28; atkY = player.y - 10; }

    if (atkRange) {
      for (var ei = enemies.length - 1; ei >= 0; ei--) {
        var en = enemies[ei];
        if (en.hitStun > 0) continue;
        if (TAS.hit.rectOverlap(atkX - atkW/2, atkY - atkH/2, atkW, atkH, en.x - en.w/2, en.y - en.h, en.w, en.h)) {
          en.hp -= atkDmg;
          en.hitStun = 0.3;
          en.flash = 0.15;
          en.vx = player.facing * 100;
          player.attackHit = true;

          // Impact text
          var texts = ['WHAM!', 'POW!', 'BAM!', 'CRACK!', 'SMACK!', 'THUD!', 'KAPOW!'];
          if (player.comboStep === 2) texts = ['KAPOW!', 'KRAKOOM!', 'SLAM!'];
          if (player.state === 'special') texts = ['ULTRA!', 'DESTROY!', 'OBLITERATE!'];
          impactTexts.push({
            text: texts[TAS.math.randInt(0, texts.length - 1)],
            x: en.x, y: en.y - en.h - 10,
            life: 1, color: PAGES[pageNum].accent
          });

          TAS.particles.spawn(en.x, en.y - en.h/2, PAGES[pageNum].accent, 6, 3, { gravity: 0.05 });
          TAS.fx.shake(3, 0.85);

          // Combo scoring
          comboTimer = 2;
          comboMult = Math.min(comboMult + 0.5, 5);
          score += Math.floor(atkDmg * comboMult);

          if (en.hp <= 0) {
            // Enemy defeated
            TAS.particles.spawn(en.x, en.y - en.h/2, '#fff', 12, 4, { gravity: 0.1, shape: 'rect' });
            enemies.splice(ei, 1);
            score += Math.floor(50 * comboMult);
            SFX.crack();
          } else {
            SFX.hit();
          }
          break; // only hit one enemy per attack frame
        }
      }
    }
  }

  // === ENEMY UPDATE ===
  for (var ei2 = 0; ei2 < enemies.length; ei2++) {
    var en2 = enemies[ei2];
    en2.hitStun = Math.max(0, en2.hitStun - dt);
    en2.flash = Math.max(0, en2.flash - dt);
    en2.attackCd = Math.max(0, en2.attackCd - dt);

    if (en2.hitStun > 0) {
      en2.x += en2.vx * dt;
      en2.vx *= 0.9;
      en2.x = TAS.math.clamp(en2.x, en2.w/2, panelW - en2.w/2);
      continue;
    }

    // AI
    var dx = player.x - en2.x;
    var adx = Math.abs(dx);
    en2.facing = dx > 0 ? 1 : -1;

    if (en2.type === 'boss') {
      // Boss pattern
      en2.stateTimer -= dt;
      if (en2.stateTimer <= 0) {
        if (adx < 40 && en2.attackCd <= 0) {
          en2.state = 'attack';
          en2.stateTimer = 0.5;
          en2.attackCd = 1.5;
        } else if (adx > 80) {
          en2.state = 'charge';
          en2.stateTimer = 0.8;
        } else {
          en2.state = 'idle';
          en2.stateTimer = 0.5;
        }
      }
      if (en2.state === 'charge') { en2.x += en2.facing * en2.speed * 2 * dt; }
      else if (en2.state === 'attack') {
        if (en2.stateTimer < 0.25 && adx < 50 && player.invuln <= 0) {
          hurtPlayer(en2.dmg, en2.facing);
        }
      }
      else { en2.x += en2.facing * en2.speed * 0.3 * dt; }
    } else {
      // Regular AI
      if (adx > 35) {
        en2.x += en2.facing * en2.speed * dt;
      } else if (en2.attackCd <= 0) {
        // Attack player
        if (player.invuln <= 0) { hurtPlayer(en2.dmg, en2.facing); }
        en2.attackCd = 1.0 + Math.random() * 0.5;
      }
    }
    en2.x = TAS.math.clamp(en2.x, en2.w/2, panelW - en2.w/2);
  }

  // === ITEMS ===
  for (var ii = items.length - 1; ii >= 0; ii--) {
    var it = items[ii];
    if (it.hidden) {
      // Reveal by punching nearby background
      if (player.state === 'punch' && Math.abs(player.x - it.x) < 40 && !player.attackHit && enemies.length === 0) {
        it.hidden = false;
        SFX.item();
        impactTexts.push({ text: 'FOUND!', x: it.x, y: it.y - 20, life: 1, color: '#ffdd44' });
      }
    } else {
      // Pick up
      if (TAS.hit.rectOverlap(player.x - player.w/2, player.y - player.h, player.w, player.h, it.x - 8, it.y - 8, 16, 16)) {
        if (it.type === 'health') { player.hp = Math.min(player.maxHp, player.hp + 20); }
        else if (it.type === 'knife') { player.knife = KNIFE_HITS; }
        else if (it.type === 'bomb') { player.bombs++; }
        items.splice(ii, 1);
        SFX.item();
        score += 25;
      }
    }
  }

  // Use bomb (down + punch when no enemies in range)
  if (downPressed() && player.bombs > 0 && enemies.length > 0) {
    player.bombs--;
    SFX.bomb();
    TAS.fx.flash('#ff8', 0.5);
    TAS.fx.shake(8, 0.8);
    for (var bi = enemies.length - 1; bi >= 0; bi--) {
      enemies[bi].hp -= 15;
      TAS.particles.spawn(enemies[bi].x, enemies[bi].y - enemies[bi].h/2, '#ff4', 10, 5, { gravity: 0.1 });
      if (enemies[bi].hp <= 0) {
        score += Math.floor(50 * comboMult);
        enemies.splice(bi, 1);
      }
    }
    impactTexts.push({ text: 'BOOM!', x: GW/2, y: GH/2, life: 1.2, color: '#ff4' });
  }

  // === PANEL CLEAR CHECK ===
  if (enemies.length === 0 && drawingEnemies.length === 0) {
    panelClearTimer += dt;
    if (panelClearTimer > 0.5 && panelClearTimer < 0.6) {
      SFX.clear();
      score += 100 + Math.floor(player.hp * 2);
    }
    // Player can break border (move to right edge and punch)
    if (player.x > panelW - 25 && punchPressed()) {
      SFX.border();
      TAS.fx.shake(5, 0.85);
      TAS.particles.spawn(player.x + 10, player.y - player.h/2, '#fff', 15, 4, { shape: 'rect', gravity: 0.1 });
      state = 'transition';
      transitionTimer = 1.0;
      transitionFrom = panelIdx;
      transitionTo = panelIdx + 1;
    }
  }
}

function hurtPlayer(dmg, fromFacing) {
  if (player.invuln > 0 || player.state === 'hurt') return;
  player.hp -= dmg;
  player.invuln = 0.6;
  player.state = 'hurt';
  player.stateTimer = 0.3;
  player.facing = -fromFacing;
  TAS.fx.flash('#f44', 0.2);
  TAS.fx.shake(4, 0.85);
  SFX.hit();
  if (player.hp <= 0) { playerDie(); }
}

function playerDie() {
  state = 'gameOver';
  SFX.die();
  TAS.particles.spawn(player.x, player.y - player.h/2, '#f44', 20, 4, { gravity: 0.1 });
  if (score > highScore) { highScore = score; TAS.score.save('comixzone_hi', score); }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawPage();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Page ' + (pageNum + 1) + ' - ' + PAGES[pageNum].name });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'pageIntro') {
    drawPageIntro();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  drawPage();
  drawActivePanel();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Transition overlay
  if (state === 'transition') {
    var t = 1 - transitionTimer;
    drawTransition(t);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  // Comic book style title
  drawHalftone(0, 0, GW, GH, '#1a1a2a', '#222244', 8);

  // Draw some panel outlines for style
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 3;
  ctx.strokeRect(20, 20, GW - 40, GH - 40);
  ctx.strokeRect(30, 30, GW - 60, GH - 60);

  ctx.textAlign = 'center';

  // Title with comic style
  ctx.save();
  ctx.font = 'bold 42px monospace';
  // Shadow
  ctx.fillStyle = '#000';
  ctx.fillText('COMIX ZONE', GW/2 + 3, 100 + 3);
  // Outline
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.strokeText('COMIX ZONE', GW/2, 100);
  // Fill
  ctx.fillStyle = '#ff4444';
  ctx.fillText('COMIX ZONE', GW/2, 100);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('A Tasern Arcade Tale', GW/2, 130);

  // Draw small player character
  drawMiniCharacter(GW/2 - 60, 180, 1);
  // Draw small enemy
  drawMiniEnemy(GW/2 + 40, 180);

  // Impact text decoration
  ctx.save();
  ctx.translate(GW/2 + 90, 160);
  ctx.rotate(-0.2);
  drawImpactBurst('POW!', 0, 0, '#ffaa33', 0.7);
  ctx.restore();

  // Controls
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('ARROWS/WASD: Move | Z/J/SPACE: Punch | X/K: Jump', GW/2, 240);
  ctx.fillText('DOWN+PUNCH: Special (costs HP!) | Combo: 3 punches', GW/2, 256);
  ctx.fillText('Clear enemies, break panel borders, survive!', GW/2, 272);

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('PRESS PUNCH OR JUMP TO START', GW/2, 300);
  ctx.globalAlpha = 1;
}

function drawPage() {
  var page = PAGES[pageNum];

  // Page background with halftone
  drawHalftone(0, 0, GW, GH, page.bg, shiftColor(page.bg, 20), 10);

  // Draw all panels as outlines
  for (var i = 0; i < page.panels.length; i++) {
    var p = page.panels[i];
    ctx.fillStyle = i === panelIdx ? '#1a1a1a' : '#0a0a0a';
    ctx.fillRect(p.x, p.y, p.w, p.h);

    // Panel border
    ctx.strokeStyle = i === panelIdx ? '#fff' : '#444';
    ctx.lineWidth = i === panelIdx ? 4 : 2;
    ctx.strokeRect(p.x, p.y, p.w, p.h);

    // Cleared panels get a checkmark
    if (i < panelIdx) {
      ctx.fillStyle = 'rgba(0, 200, 100, 0.15)';
      ctx.fillRect(p.x, p.y, p.w, p.h);
      ctx.fillStyle = '#4c8';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CLEAR', p.x + p.w/2, p.y + p.h/2 + 7);
    }

    // Boss panel indicator
    if (p.boss && i > panelIdx) {
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', p.x + p.w/2, p.y + p.h/2 + 4);
    }
  }

  // Page title
  ctx.fillStyle = page.accent;
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('PAGE ' + (pageNum + 1) + ': ' + page.name.toUpperCase(), 14, 26);
}

function drawActivePanel() {
  var panel = getCurrentPanel();

  // Draw inside the active panel (use panel-local coordinates)
  ctx.save();
  ctx.beginPath();
  ctx.rect(panel.x + 2, panel.y + 2, panel.w - 4, panel.h - 4);
  ctx.clip();

  // Panel interior offset
  var ox = panel.x + 5;
  var oy = panel.y + 5;
  var pw = panel.w - 10;
  var ph = panel.h - 10;

  // Scale content to fit panel
  var scaleX = pw / (getCurrentPanel().w);
  var scaleY = ph / 280;
  var sc = Math.min(scaleX, scaleY);

  ctx.translate(ox, oy);
  ctx.scale(sc, sc);

  // Panel background details
  drawPanelBackground(pageNum, panel);

  // Floor line
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, FLOOR_Y + 2);
  ctx.lineTo(getCurrentPanel().w, FLOOR_Y + 2);
  ctx.stroke();

  // Items
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    if (it.hidden) {
      // Subtle shimmer
      if (frame % 60 < 5) {
        ctx.fillStyle = 'rgba(255,255,200,0.2)';
        ctx.fillRect(it.x - 4, it.y - 4, 8, 8);
      }
    } else {
      drawItem(it);
    }
  }

  // Drawing animation for spawning enemies
  for (var di = 0; di < drawingEnemies.length; di++) {
    var de = drawingEnemies[di];
    if (de.delay > 0) continue;
    drawSpawnSketch(de);
  }

  // Enemies
  for (var ei = 0; ei < enemies.length; ei++) {
    drawEnemy(enemies[ei]);
  }

  // Player
  drawPlayer();

  // Impact texts (in panel space)
  for (var ti = 0; ti < impactTexts.length; ti++) {
    var t = impactTexts[ti];
    drawImpactBurst(t.text, t.x, t.y, t.color, t.life);
  }

  // Particles
  TAS.particles.draw();

  ctx.restore();

  // Speech bubble (outside clip, in screen space)
  if (speechBubble && speechTimer > 0) {
    drawSpeechBubble(panel.x + panel.w - 80, panel.y - 5, speechBubble);
  }

  // Panel clear indicator
  if (enemies.length === 0 && drawingEnemies.length === 0 && state === 'playing') {
    var arrowPulse = Math.sin(frame * 0.1) * 3;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BREAK BORDER >>>', panel.x + panel.w - 40, panel.y + panel.h + 12 + arrowPulse);
  }
}

function drawPlayer() {
  var px = player.x;
  var py = player.y;
  var f = player.facing;
  var blink = player.invuln > 0 && Math.floor(frame / 3) % 2 === 0;
  if (blink) { ctx.globalAlpha = 0.4; }

  ctx.save();
  ctx.translate(px, py);
  ctx.scale(f, 1);

  // Body
  var bodyColor = player.knife > 0 ? '#55aaff' : '#4488cc';
  if (player.state === 'hurt') bodyColor = '#ff6666';
  if (player.state === 'special') bodyColor = '#ffaa22';

  // Torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-7, -32, 14, 18);

  // Head
  ctx.fillStyle = '#ffd4a0';
  ctx.beginPath();
  ctx.arc(0, -38, 7, 0, Math.PI * 2);
  ctx.fill();

  // Hair (artist beret)
  ctx.fillStyle = '#663399';
  ctx.beginPath();
  ctx.arc(0, -42, 7, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-8, -43, 16, 3);

  // Arms
  ctx.fillStyle = '#ffd4a0';
  if (player.state === 'punch') {
    var extend = player.stateTimer < 0.1 ? 14 : 8 + player.comboStep * 3;
    ctx.fillRect(4, -28, extend, 5);
    // Fist
    ctx.fillStyle = bodyColor;
    ctx.fillRect(4 + extend - 3, -29, 6, 7);
  } else if (player.state === 'knife') {
    ctx.fillRect(4, -28, 16, 5);
    ctx.fillStyle = '#ccc';
    ctx.fillRect(18, -30, 10, 3);
  } else if (player.state === 'special') {
    ctx.fillRect(-5, -34, 10, 5);
    ctx.fillRect(4, -30, 10, 5);
    // Energy effect
    ctx.fillStyle = 'rgba(255,200,0,0.5)';
    ctx.beginPath();
    ctx.arc(8, -26, 12 + Math.sin(frame * 0.5) * 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (player.jumpKick) {
    ctx.fillRect(4, -26, 8, 5);
  } else {
    ctx.fillRect(5, -26, 6, 5);
    ctx.fillRect(-9, -26, 6, 5);
  }

  // Legs
  ctx.fillStyle = '#335';
  if (player.state === 'walk') {
    var legAnim = Math.sin(frame * 0.3) * 4;
    ctx.fillRect(-5, -14, 5, 14);
    ctx.fillRect(1 + legAnim, -14, 5, 14);
  } else if (player.jumpKick) {
    ctx.fillRect(2, -14, 14, 5);
    ctx.fillRect(-7, -10, 5, 10);
  } else if (player.state === 'jump') {
    ctx.fillRect(-5, -14, 5, 10);
    ctx.fillRect(1, -14, 5, 10);
  } else {
    ctx.fillRect(-5, -14, 5, 14);
    ctx.fillRect(1, -14, 5, 14);
  }

  // Shoes
  ctx.fillStyle = '#a33';
  if (!player.jumpKick) {
    ctx.fillRect(-6, -1, 7, 3);
    ctx.fillRect(0, -1, 7, 3);
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawEnemy(en) {
  var blink = en.flash > 0;
  ctx.save();
  ctx.translate(en.x, en.y);
  ctx.scale(en.facing, 1);

  if (blink) ctx.globalAlpha = 0.6;

  // Different looks per type
  if (en.type === 'blob') {
    ctx.fillStyle = blink ? '#fff' : '#556';
    ctx.beginPath();
    ctx.ellipse(0, -12, 9, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#f44';
    ctx.fillRect(-4, -16, 3, 3);
    ctx.fillRect(2, -16, 3, 3);
    // Drip
    ctx.fillStyle = '#334';
    ctx.fillRect(-3, -1, 2, 4 + Math.sin(frame * 0.1) * 2);
    ctx.fillRect(2, 0, 2, 3 + Math.cos(frame * 0.12) * 2);
  }
  else if (en.type === 'soldier') {
    // Body
    ctx.fillStyle = blink ? '#fff' : '#668';
    ctx.fillRect(-8, -34, 16, 22);
    // Head
    ctx.fillStyle = blink ? '#fcc' : '#ddb';
    ctx.beginPath();
    ctx.arc(0, -38, 6, 0, Math.PI * 2);
    ctx.fill();
    // Helmet
    ctx.fillStyle = '#445';
    ctx.fillRect(-7, -44, 14, 5);
    // Legs
    ctx.fillStyle = '#334';
    ctx.fillRect(-6, -12, 5, 12);
    ctx.fillRect(1, -12, 5, 12);
    // Weapon
    ctx.fillStyle = '#888';
    ctx.fillRect(6, -30, 3, 18);
  }
  else if (en.type === 'pencil') {
    // Pencil body (vertical)
    ctx.fillStyle = blink ? '#fff' : '#cc8';
    ctx.fillRect(-4, -38, 8, 32);
    // Tip
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(-4, -38);
    ctx.lineTo(4, -38);
    ctx.lineTo(0, -44);
    ctx.fill();
    // Eraser end
    ctx.fillStyle = '#f88';
    ctx.fillRect(-5, -6, 10, 6);
    // Eyes on pencil
    ctx.fillStyle = '#333';
    ctx.fillRect(-2, -28, 2, 2);
    ctx.fillRect(1, -28, 2, 2);
  }
  else if (en.type === 'eraser') {
    // Big blocky eraser
    ctx.fillStyle = blink ? '#fff' : '#a66';
    ctx.fillRect(-14, -30, 28, 30);
    // Band
    ctx.fillStyle = '#66a';
    ctx.fillRect(-14, -20, 28, 6);
    // Face
    ctx.fillStyle = '#333';
    ctx.fillRect(-6, -28, 4, 4);
    ctx.fillRect(3, -28, 4, 4);
    ctx.fillRect(-4, -16, 9, 3);
  }
  else if (en.type === 'boss') {
    // Big villain artist
    ctx.fillStyle = blink ? '#fff' : '#2a2a4a';
    ctx.fillRect(-14, -40, 28, 28);
    // Head
    ctx.fillStyle = '#ddb';
    ctx.beginPath();
    ctx.arc(0, -46, 9, 0, Math.PI * 2);
    ctx.fill();
    // Evil beret
    ctx.fillStyle = '#a22';
    ctx.beginPath();
    ctx.arc(0, -52, 9, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(-10, -53, 20, 3);
    // Cape
    ctx.fillStyle = '#411';
    ctx.beginPath();
    ctx.moveTo(-14, -38);
    ctx.lineTo(-18, -5);
    ctx.lineTo(-8, -12);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(14, -38);
    ctx.lineTo(18, -5);
    ctx.lineTo(8, -12);
    ctx.fill();
    // Arms with paintbrush
    ctx.fillStyle = '#ddb';
    ctx.fillRect(10, -36, 10, 5);
    ctx.fillStyle = '#850';
    ctx.fillRect(18, -38, 3, 20);
    ctx.fillStyle = '#f44';
    ctx.fillRect(17, -40, 5, 4);
    // Legs
    ctx.fillStyle = '#222';
    ctx.fillRect(-8, -12, 7, 12);
    ctx.fillRect(2, -12, 7, 12);
    // Evil eyes
    ctx.fillStyle = '#f44';
    ctx.fillRect(-4, -48, 3, 3);
    ctx.fillRect(2, -48, 3, 3);
  }

  ctx.restore();
  ctx.globalAlpha = 1;

  // HP bar for boss
  if (en.type === 'boss') {
    var barW = 40;
    var barX = en.x - barW/2;
    var barY = en.y - en.h - 12;
    ctx.fillStyle = '#300';
    ctx.fillRect(barX, barY, barW, 4);
    ctx.fillStyle = '#f44';
    ctx.fillRect(barX, barY, barW * (en.hp / en.maxHp), 4);
  }
}

function drawItem(it) {
  ctx.save();
  ctx.translate(it.x, it.y);
  var bob = Math.sin(frame * 0.08) * 2;
  ctx.translate(0, bob);

  if (it.type === 'health') {
    ctx.fillStyle = '#4f4';
    ctx.fillRect(-6, -10, 12, 12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-2, -8, 4, 8);
    ctx.fillRect(-4, -6, 8, 4);
  } else if (it.type === 'knife') {
    ctx.fillStyle = '#ccc';
    ctx.fillRect(-2, -12, 4, 10);
    ctx.fillStyle = '#850';
    ctx.fillRect(-3, -3, 6, 5);
  } else if (it.type === 'bomb') {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(0, -6, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#f84';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(3, -12);
    ctx.lineTo(5, -16);
    ctx.stroke();
    ctx.fillStyle = '#f84';
    ctx.beginPath();
    ctx.arc(5, -17, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawSpawnSketch(de) {
  // Draw enemy being "sketched" into existence
  var p = de.progress;
  ctx.save();
  ctx.globalAlpha = 0.5 + p * 0.5;
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;

  var cx = de.x;
  var cy = FLOOR_Y;

  // Animated sketch lines
  var lines = Math.floor(p * 12);
  for (var i = 0; i < lines; i++) {
    var angle = (i / 12) * Math.PI * 2 + frame * 0.05;
    var r = 15 + Math.sin(i * 2.3) * 8;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * r * 0.3, cy - 18 + Math.sin(angle) * r * 0.5);
    ctx.lineTo(cx + Math.cos(angle + 0.5) * r, cy - 18 + Math.sin(angle + 0.5) * r * 0.8);
    ctx.stroke();
  }

  // Pencil hovering above
  var pencilX = cx + Math.sin(frame * 0.1) * 10;
  var pencilY = cy - 50 - p * 10;
  ctx.fillStyle = '#cc8';
  ctx.save();
  ctx.translate(pencilX, pencilY);
  ctx.rotate(-0.3);
  ctx.fillRect(-2, -10, 4, 14);
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(-2, 4);
  ctx.lineTo(2, 4);
  ctx.lineTo(0, 8);
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

function drawImpactBurst(text, x, y, color, life) {
  ctx.save();
  ctx.globalAlpha = Math.min(1, life);
  var scale = 0.8 + (1 - life) * 0.4;
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Starburst background
  ctx.fillStyle = color;
  ctx.beginPath();
  var points = 10;
  for (var i = 0; i < points * 2; i++) {
    var angle = (i / (points * 2)) * Math.PI * 2 - Math.PI/2;
    var r = i % 2 === 0 ? 22 + text.length * 2 : 12;
    var px = Math.cos(angle) * r;
    var py = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#000';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, 1, 4);
  ctx.fillStyle = '#fff';
  ctx.fillText(text, 0, 3);

  ctx.restore();
}

function drawSpeechBubble(x, y, text) {
  ctx.save();
  ctx.globalAlpha = Math.min(1, speechTimer * 2);

  var tw = ctx.measureText(text).width || text.length * 6;
  var bw = tw + 16;
  var bh = 22;
  var bx = x - bw;
  var by = y - bh;

  // Bubble
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 4);
  ctx.fill();
  ctx.stroke();

  // Tail
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(bx + bw * 0.7, by + bh);
  ctx.lineTo(bx + bw * 0.7 + 5, by + bh + 8);
  ctx.lineTo(bx + bw * 0.7 + 10, by + bh);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(bx + bw * 0.7, by + bh);
  ctx.lineTo(bx + bw * 0.7 + 5, by + bh + 8);
  ctx.lineTo(bx + bw * 0.7 + 10, by + bh);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#222';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, bx + bw/2, by + 14);

  ctx.restore();
}

function drawPanelBackground(pg, panel) {
  var w = panel.w - 10;
  var h = 280;

  // Different backgrounds per page
  if (pg === 0) {
    // City streets - buildings, graffiti
    ctx.fillStyle = '#333';
    ctx.fillRect(0, 80, 30, FLOOR_Y - 80);
    ctx.fillRect(w - 40, 60, 40, FLOOR_Y - 60);
    ctx.fillRect(w/2 - 15, 100, 25, FLOOR_Y - 100);
    // Windows
    ctx.fillStyle = '#554';
    for (var i = 0; i < 3; i++) {
      ctx.fillRect(5, 90 + i * 25, 8, 12);
      ctx.fillRect(w - 30, 70 + i * 25, 8, 12);
    }
    // Graffiti scratch
    ctx.strokeStyle = '#f63';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(50, 200);
    ctx.lineTo(70, 195);
    ctx.lineTo(60, 210);
    ctx.stroke();
  } else if (pg === 1) {
    // Sewers - pipes, water
    ctx.strokeStyle = '#454';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, 120);
    ctx.lineTo(w, 130);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.3, 80);
    ctx.lineTo(w * 0.3, 130);
    ctx.stroke();
    // Water at bottom
    ctx.fillStyle = 'rgba(30,80,60,0.3)';
    ctx.fillRect(0, FLOOR_Y - 5, w, 10);
    // Drips
    var drip = (frame * 2) % 60;
    ctx.fillStyle = '#3a8';
    ctx.fillRect(w * 0.3, 130 + drip, 2, 4);
  } else if (pg === 2) {
    // Rooftops - sky, antennas
    ctx.fillStyle = '#223';
    ctx.fillRect(0, 0, w, FLOOR_Y);
    // Stars
    for (var s = 0; s < 8; s++) {
      ctx.fillStyle = '#668';
      ctx.fillRect((s * 37 + 10) % w, (s * 23 + 20) % 100, 1, 1);
    }
    // Antenna
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(w * 0.7, FLOOR_Y);
    ctx.lineTo(w * 0.7, FLOOR_Y - 60);
    ctx.moveTo(w * 0.7 - 10, FLOOR_Y - 50);
    ctx.lineTo(w * 0.7 + 10, FLOOR_Y - 50);
    ctx.stroke();
    // Blinking light
    if (frame % 40 < 20) {
      ctx.fillStyle = '#f44';
      ctx.fillRect(w * 0.7 - 1, FLOOR_Y - 62, 3, 3);
    }
  } else if (pg === 3) {
    // Factory - gears, conveyors
    ctx.strokeStyle = '#543';
    ctx.lineWidth = 2;
    // Gear
    var gx = w * 0.8, gy = 100;
    ctx.beginPath();
    ctx.arc(gx, gy, 20, 0, Math.PI * 2);
    ctx.stroke();
    for (var g = 0; g < 8; g++) {
      var ga = (g / 8) * Math.PI * 2 + frame * 0.02;
      ctx.beginPath();
      ctx.moveTo(gx + Math.cos(ga) * 18, gy + Math.sin(ga) * 18);
      ctx.lineTo(gx + Math.cos(ga) * 24, gy + Math.sin(ga) * 24);
      ctx.stroke();
    }
    // Conveyor
    ctx.fillStyle = '#332';
    ctx.fillRect(0, FLOOR_Y - 3, w, 5);
    var cvOff = (frame * 2) % 20;
    ctx.fillStyle = '#554';
    for (var c = -1; c < w / 20 + 1; c++) {
      ctx.fillRect(c * 20 + cvOff, FLOOR_Y - 2, 10, 3);
    }
  } else if (pg === 4) {
    // Fungal lab - beakers, spores
    ctx.fillStyle = '#334';
    ctx.fillRect(w * 0.6, 100, 15, 60);
    ctx.fillRect(w * 0.6 - 5, 155, 25, 5);
    // Beaker
    ctx.strokeStyle = '#668';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(w * 0.15, 130);
    ctx.lineTo(w * 0.15 - 8, 170);
    ctx.lineTo(w * 0.15 + 8, 170);
    ctx.lineTo(w * 0.15, 130);
    ctx.stroke();
    ctx.fillStyle = 'rgba(100,50,200,0.3)';
    ctx.fillRect(w * 0.15 - 6, 150, 12, 20);
    // Floating spores
    for (var sp = 0; sp < 5; sp++) {
      var spx = (sp * 47 + frame * 0.5) % w;
      var spy = 100 + Math.sin(frame * 0.03 + sp) * 30;
      ctx.fillStyle = 'rgba(170,70,255,0.3)';
      ctx.beginPath();
      ctx.arc(spx, spy, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (pg === 5) {
    // Artist's desk
    ctx.fillStyle = '#4a4030';
    ctx.fillRect(0, FLOOR_Y - 2, w, 50);
    // Paper
    ctx.fillStyle = '#eee';
    ctx.fillRect(w * 0.2, FLOOR_Y - 40, 60, 40);
    // Pencils
    ctx.fillStyle = '#cc8';
    ctx.fillRect(w * 0.7, FLOOR_Y - 25, 3, 25);
    ctx.fillRect(w * 0.75, FLOOR_Y - 20, 3, 20);
    // Ink bottle
    ctx.fillStyle = '#222';
    ctx.fillRect(w * 0.4, FLOOR_Y - 18, 12, 18);
    ctx.fillStyle = '#444';
    ctx.fillRect(w * 0.4 + 2, FLOOR_Y - 22, 8, 5);
    // Coffee stain ring
    ctx.strokeStyle = '#654';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(w * 0.9, FLOOR_Y - 15, 8, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawHalftone(x, y, w, h, bg, dotColor, spacing) {
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = dotColor;
  for (var hy = y; hy < y + h; hy += spacing) {
    for (var hx = x; hx < x + w; hx += spacing) {
      ctx.beginPath();
      ctx.arc(hx + spacing/2, hy + spacing/2, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawTransition(t) {
  // Crack and shatter effect
  ctx.save();
  ctx.globalAlpha = Math.min(1, t * 2);

  var panel = PAGES[pageNum].panels[transitionFrom];
  var cx = panel.x + panel.w;
  var cy = panel.y + panel.h / 2;

  // Crack lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  for (var i = 0; i < 8; i++) {
    var angle = (i / 8) * Math.PI * 2;
    var len = t * 40;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.stroke();
  }

  // Shards
  if (t > 0.3) {
    ctx.fillStyle = '#fff';
    for (var s = 0; s < 6; s++) {
      var sx = cx + (Math.random() - 0.5) * t * 80;
      var sy = cy + (Math.random() - 0.5) * t * 60;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(t * s);
      ctx.fillRect(-4, -4, 8, 8);
      ctx.restore();
    }
  }

  // Flash at peak
  if (t > 0.5 && t < 0.7) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.7 - t) * 5 + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  ctx.restore();
}

function drawPageIntro() {
  var page = PAGES[pageNum];
  var t = 1 - (transitionTimer / 2.0);

  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  // Dramatic page reveal
  drawHalftone(0, 0, GW, GH, page.bg, shiftColor(page.bg, 15), 12);

  ctx.textAlign = 'center';

  // Page number
  ctx.fillStyle = page.accent;
  ctx.font = 'bold 36px monospace';
  var slideIn = Math.min(1, t * 3);
  ctx.globalAlpha = slideIn;
  ctx.fillText('PAGE ' + (pageNum + 1), GW/2, GH/2 - 20);

  // Page name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(page.name.toUpperCase(), GW/2, GH/2 + 15);

  ctx.globalAlpha = 1;

  // Panel borders zoom in
  if (t > 0.4) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    var zoom = (t - 0.4) / 0.6;
    ctx.globalAlpha = zoom;
    ctx.strokeRect(GW * (0.5 - 0.45 * zoom), GH * (0.5 - 0.4 * zoom), GW * 0.9 * zoom, GH * 0.8 * zoom);
    ctx.globalAlpha = 1;
  }
}

function drawVictoryScreen() {
  drawHalftone(0, 0, GW, GH, '#1a2a1a', '#223322', 8);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#4f4';
  ctx.font = 'bold 32px monospace';
  ctx.fillText('VICTORY!', GW/2, 80);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('You escaped the comic!', GW/2, 110);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('SCORE: ' + score, GW/2, 160);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 185);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Pages Cleared: 6 | HP Remaining: ' + player.hp, GW/2, 220);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, 280);
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, 30);

  // HP bar
  ctx.fillStyle = '#300';
  ctx.fillRect(8, 8, 100, 14);
  var hpPct = player.hp / player.maxHp;
  var hpColor = hpPct > 0.5 ? '#4c4' : hpPct > 0.25 ? '#cc4' : '#c44';
  ctx.fillStyle = hpColor;
  ctx.fillRect(8, 8, 100 * hpPct, 14);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(8, 8, 100, 14);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 10, 18);

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, GW/2, 20);

  // Combo multiplier
  if (comboMult > 1) {
    ctx.fillStyle = '#f84';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('x' + comboMult.toFixed(1), GW/2, 10);
  }

  // Items
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  var itemY = 12;
  if (player.knife > 0) {
    ctx.fillStyle = '#aaf';
    ctx.fillText('KNIFE:' + player.knife, GW - 8, itemY);
    itemY += 12;
  }
  if (player.bombs > 0) {
    ctx.fillStyle = '#fa8';
    ctx.fillText('BOMB:' + player.bombs, GW - 8, itemY);
  }

  // Page/Panel indicator
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('P' + (pageNum+1) + '-' + (panelIdx+1), GW - 8, 28);

  // High score
  ctx.textAlign = 'left';
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('HI:' + highScore, 115, 18);
}

function drawMiniCharacter(x, y, facing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(facing, 1);
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(-7, -32, 14, 18);
  ctx.fillStyle = '#ffd4a0';
  ctx.beginPath();
  ctx.arc(0, -38, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#663399';
  ctx.beginPath();
  ctx.arc(0, -42, 7, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(-8, -43, 16, 3);
  ctx.fillStyle = '#335';
  ctx.fillRect(-5, -14, 5, 14);
  ctx.fillRect(1, -14, 5, 14);
  ctx.fillStyle = '#ffd4a0';
  ctx.fillRect(5, -26, 12, 5);
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(15, -27, 6, 7);
  ctx.restore();
}

function drawMiniEnemy(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = '#668';
  ctx.fillRect(-8, -34, 16, 22);
  ctx.fillStyle = '#ddb';
  ctx.beginPath();
  ctx.arc(0, -38, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#445';
  ctx.fillRect(-7, -44, 14, 5);
  ctx.fillStyle = '#334';
  ctx.fillRect(-6, -12, 5, 12);
  ctx.fillRect(1, -12, 5, 12);
  ctx.fillStyle = '#888';
  ctx.fillRect(6, -30, 3, 18);
  ctx.restore();
}

function shiftColor(hex, amt) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt);
  g = Math.min(255, g + amt);
  b = Math.min(255, b + amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// === START ===
TAS.loop.start(update, draw);

})();
