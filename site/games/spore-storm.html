(function(){
"use strict";

// === NFT STAT BONUSES ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// === GAME CONSTANTS ===
const GW = 320, GH = 480;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);

// === DERIVED STATS FROM D&D ATTRIBUTES ===
// STR: bullet damage, bomb damage, melee contact damage
// DEX: movement speed, fire rate, dodge window (invincibility frames)
// CON: max lives, hit points multiplier, death recovery
// INT: weapon level cap, score multiplier, smarter homing
// WIS: powerup detection radius, enemy telegraph visibility, cooldown reduction
// CHA: drop luck, chain bonus multiplier, shop discount (future)

function statMod(val) { return Math.floor((val - 10) / 2); }
var strMod = statMod(statB.str);   // ref 1: damage scaling
var dexMod = statMod(statB.dex);   // ref 2: speed/fire rate
var conMod = statMod(statB.con);   // ref 3: survivability
var intMod = statMod(statB.int);   // ref 4: score/weapon cap
var wisMod = statMod(statB.wis);   // ref 5: cooldowns/detection
var chaMod = statMod(statB.cha);   // ref 6: luck/drops

// ref 7: base damage from STR
var baseDamage = Math.max(1, statB.damage + strMod);
// ref 8: fire rate from DEX (lower = faster)
var baseFireRate = Math.max(2, 6 - Math.floor(dexMod * 0.5));
// ref 9: max lives from CON
var baseMaxLives = Math.max(1, 3 + conMod + statB.lives);
// ref 10: weapon level cap from INT
var baseWeaponCap = Math.min(8, 5 + Math.floor(intMod * 0.5));
// ref 11: score multiplier from INT
var baseScoreMult = Math.max(1, statB.scoreMult + intMod * 0.1);
// ref 12: cooldown reduction from WIS
var baseCooldownMult = Math.max(0.3, statB.cooldown - wisMod * 0.05);
// ref 13: drop luck from CHA
var baseDropLuck = Math.max(0.01, 0.08 + chaMod * 0.02 + (statB.luck - 1) * 0.05);
// ref 14: pickup radius from WIS
var basePickupRadius = Math.max(8, 12 + wisMod * 2);
// ref 15: invincibility frames from DEX
var baseInvincFrames = Math.max(60, 180 + dexMod * 15);
// ref 16: bomb potency from STR
var baseBombDamage = Math.max(10, 20 + strMod * 3);
// ref 17: chain multiplier from CHA
var baseChainMult = Math.max(1, 1 + chaMod * 0.15);
// ref 18: movement speed from DEX
var baseMoveSpeed = Math.max(1.5, (2.5 + dexMod * 0.4) * statB.speed);
// ref 19: HP multiplier from CON
var baseHpMult = Math.max(0.5, statB.hpMult + conMod * 0.1);

// Player color from NFT
var playerColor = statB.color || '#44dd88';
var playerName = statB.name || 'Baseling';
var playerIcon = statB.icon || 'B';

// === BASELING PLAYER MODULE (TAS bridge) ===
var picking = false; // character-select overlay open
function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  statB.lives = 0; statB.scoreMult = 1; statB.cooldown = 1;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel && sel.charName) { statB.name = sel.charName; playerName = sel.charName; }
  // Re-derive every cached mod + tuned constant (refs 1-19) so a title pick takes effect
  strMod = statMod(statB.str); dexMod = statMod(statB.dex); conMod = statMod(statB.con);
  intMod = statMod(statB.int); wisMod = statMod(statB.wis); chaMod = statMod(statB.cha);
  baseDamage = Math.max(1, statB.damage + strMod);
  baseFireRate = Math.max(2, 6 - Math.floor(dexMod * 0.5));
  baseMaxLives = Math.max(1, 3 + conMod + statB.lives);
  baseWeaponCap = Math.min(8, 5 + Math.floor(intMod * 0.5));
  baseScoreMult = Math.max(1, statB.scoreMult + intMod * 0.1);
  baseCooldownMult = Math.max(0.3, statB.cooldown - wisMod * 0.05);
  baseDropLuck = Math.max(0.01, 0.08 + chaMod * 0.02 + (statB.luck - 1) * 0.05);
  basePickupRadius = Math.max(8, 12 + wisMod * 2);
  baseInvincFrames = Math.max(60, 180 + dexMod * 15);
  baseBombDamage = Math.max(10, 20 + strMod * 3);
  baseChainMult = Math.max(1, 1 + chaMod * 0.15);
  baseMoveSpeed = Math.max(1.5, (2.5 + dexMod * 0.4) * statB.speed);
  baseHpMult = Math.max(0.5, statB.hpMult + conMod * 0.1);
}
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[spore-storm] player init failed:', e && e.message); });
}
window.addEventListener('keydown', function (e) {
  if (state === 'title' && e.code === 'KeyC' && !picking) {
    e.preventDefault();
    picking = true;
    TAS.player.select(function () { recomputeStats(); picking = false; });

});

const ITEM_TYPES = {

// === SCORE POPUPS ===
var scorePopups = [];

function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 60, vy: -1.5 });
}

function updateScorePopups() {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.y += sp.vy;
    sp.life--;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.life / 20);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === ENVIRONMENTAL HAZARDS ===
var hazards = [];

function spawnHazard(type, x, y) {
  var h = { type: type, x: x, y: y, age: 0, w: 0, h: 0, vy: 0, active: true };
  switch (type) {
    case 'spore_cloud':
      h.w = 30 + Math.random() * 20; h.h = 20 + Math.random() * 15;
      h.vy = 0.5 + Math.random() * 0.5; h.alpha = 0.3 + Math.random() * 0.2;
      h.color = '#44aa44'; break;
    case 'poison_mist':
      h.w = 40; h.h = 25; h.vy = 0.3; h.alpha = 0.25;
      h.color = '#aa44ff'; break;
    case 'crystal_shard':
      h.w = 8; h.h = 20; h.vy = 2 + Math.random() * 2; h.alpha = 0.8;
      h.color = '#88ccff'; h.angle = Math.random() * Math.PI; break;
    case 'lava_vent':
      h.w = 16; h.h = 40; h.vy = 0; h.alpha = 0.6; h.color = '#ff4400';
      h.lifetime = 120 + Math.random() * 60; break;
    case 'acid_bubble':
      h.w = 12 + Math.random() * 8; h.h = h.w; h.vy = -0.5 - Math.random() * 0.5;
      h.alpha = 0.5; h.color = '#66ff44'; break;
    case 'asteroid':
      h.w = 15 + Math.random() * 15; h.h = h.w; h.vy = 1 + Math.random() * 2;
      h.vx = (Math.random() - 0.5) * 2; h.alpha = 0.9; h.color = '#888888'; break;
    case 'swarm':
      h.w = 6; h.h = 6; h.vy = 1.5 + Math.random(); h.alpha = 0.7;
      h.color = '#ff6644'; h.vx = Math.sin(Math.random() * 6.28) * 2; break;
    case 'void_rift':
      h.w = 25 + Math.random() * 15; h.h = h.w; h.vy = 0.2; h.alpha = 0.4;
      h.color = '#4444ff'; h.lifetime = 180; break;
  }
  hazards.push(h);
}

function updateHazards() {
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    h.age++;
    h.y += h.vy;
    if (h.vx) h.x += h.vx;
    if (h.lifetime && h.age > h.lifetime) { hazards.splice(i, 1); continue; }
    if (h.y > GH + 50 || h.y < -50) { hazards.splice(i, 1); continue; }

    // Hazard-player collision (damage through invincibility for some types)
    if (state === 'playing' && invincible <= 0) {
      var hx = h.x - h.w / 2, hy = h.y - h.h / 2;
      if (TAS.hit.rectOverlap(px - 5, py - 5, 10, 10, hx, hy, h.w, h.h)) {
        if (h.type === 'crystal_shard' || h.type === 'asteroid') {
          playerDie();
          hazards.splice(i, 1);
          continue;
        }
      }
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    ctx.globalAlpha = h.alpha * (h.lifetime ? Math.min(1, (h.lifetime - h.age) / 30) : 1);
    ctx.fillStyle = h.color;

    switch (h.type) {
      case 'spore_cloud':
      case 'poison_mist':
        ctx.beginPath();
        ctx.ellipse(h.x, h.y, h.w / 2, h.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha *= 0.5;
        ctx.beginPath();
        ctx.ellipse(h.x + 5, h.y - 3, h.w / 3, h.h / 3, 0, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'crystal_shard':
        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.rotate(h.angle + h.age * 0.05);
        ctx.fillRect(-h.w / 2, -h.h / 2, h.w, h.h);
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.4;
        ctx.fillRect(-1, -h.h / 2, 2, h.h);
        ctx.restore();
        break;
      case 'lava_vent':
        for (var v = 0; v < 5; v++) {
          var vy2 = h.y - v * 8 - Math.sin(h.age * 0.1 + v) * 4;
          ctx.beginPath();
          ctx.arc(h.x + Math.sin(h.age * 0.15 + v * 2) * 4, vy2, 3 + Math.sin(h.age * 0.08 + v) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 'acid_bubble':
        ctx.beginPath();
        ctx.arc(h.x, h.y, h.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#aaff88';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(h.x, h.y, h.w / 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(h.x - 2, h.y - 2, h.w / 6, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'asteroid':
        ctx.save();
        ctx.translate(h.x, h.y);
        ctx.rotate(h.age * 0.02);
        ctx.beginPath();
        for (var a = 0; a < 7; a++) {
          var an = (a / 7) * Math.PI * 2;
          var r = h.w / 2 * (0.7 + ((a * 137) % 10) / 30);
          if (a === 0) ctx.moveTo(Math.cos(an) * r, Math.sin(an) * r);
          else ctx.lineTo(Math.cos(an) * r, Math.sin(an) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(-2, -1, h.w / 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
      case 'swarm':
        for (var s = 0; s < 4; s++) {
          var sx = h.x + Math.sin(h.age * 0.1 + s * 1.57) * 6;
          var sy = h.y + Math.cos(h.age * 0.08 + s * 1.57) * 4;
          ctx.beginPath();
          ctx.arc(sx, sy, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
      case 'void_rift':
        ctx.save();
        ctx.translate(h.x, h.y);
        var pulse = Math.sin(h.age * 0.05) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(0, 0, h.w / 2 * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#8888ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, h.w / 2 * pulse + 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(0, 0, h.w / 4 * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        break;
    }
  }
  ctx.globalAlpha = 1;
}

// === NES-STYLE VIRTUAL CONTROLS ===
var virtualButtons = {
  up: false, down: false, left: false, right: false,
  a: false, b: false
};
var dpadSize = 44;
var dpadX = 12;
var dpadY = GH - 90;
var btnSize = 32;
var btnAX = GW - 52;
var btnBX = GW - 90;
var btnY = GH - 80;

function checkVirtualButton(cx, cy) {
  // D-pad zones
  var dx = cx - (dpadX + dpadSize);
  var dy = cy - (dpadY + dpadSize);
  if (Math.abs(dx) < dpadSize * 1.2 && Math.abs(dy) < dpadSize * 1.2) {
    if (dy < -dpadSize * 0.3) virtualButtons.up = true;
    if (dy > dpadSize * 0.3) virtualButtons.down = true;
    if (dx < -dpadSize * 0.3) virtualButtons.left = true;
    if (dx > dpadSize * 0.3) virtualButtons.right = true;
  }
  // A button (fire/confirm) - right side
  if (Math.abs(cx - btnAX) < btnSize && Math.abs(cy - btnY) < btnSize) {
    virtualButtons.a = true;
  }
  // B button (bomb) - left of A
  if (Math.abs(cx - btnBX) < btnSize && Math.abs(cy - btnY) < btnSize) {
    virtualButtons.b = true;
    bombTapped = true;
  }
}

function clearVirtualButtons() {
  virtualButtons.up = false;
  virtualButtons.down = false;
  virtualButtons.left = false;
  virtualButtons.right = false;
  virtualButtons.a = false;
  virtualButtons.b = false;
}

function drawVirtualControls() {
  if (!TAS.input.isMobile) return;
  ctx.globalAlpha = 0.2;
  // D-pad background
  ctx.fillStyle = '#333';
  ctx.fillRect(dpadX + dpadSize * 0.33, dpadY, dpadSize * 0.34, dpadSize * 2);
  ctx.fillRect(dpadX, dpadY + dpadSize * 0.33, dpadSize * 2, dpadSize * 0.34);
  // D-pad arrows
  ctx.fillStyle = '#888';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('^', dpadX + dpadSize, dpadY + 14);
  ctx.fillText('v', dpadX + dpadSize, dpadY + dpadSize * 2 - 4);
  ctx.fillText('<', dpadX + 10, dpadY + dpadSize + 5);
  ctx.fillText('>', dpadX + dpadSize * 2 - 10, dpadY + dpadSize + 5);
  // A button
  ctx.beginPath();
  ctx.arc(btnAX, btnY, btnSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#a22';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('A', btnAX, btnY + 4);
  // B button
  ctx.beginPath();
  ctx.arc(btnBX, btnY, btnSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = '#aa4400';
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('B', btnBX, btnY + 4);
  ctx.globalAlpha = 1;
}

// === TOUCH INPUT (custom drag-to-move + virtual buttons) ===
const canvas = TAS.canvas;

function canvasCoords(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  var scaleX = (canvas.width / dpr) / rect.width;
  var scaleY = (canvas.height / dpr) / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  TAS.audio.ensureAudio();
  if (state === 'title' || state === 'gameOver') {
    if (state === 'title') {
      if (picking) return; // character-select overlay open
      var _tc = canvasCoords(e.touches[0].clientX, e.touches[0].clientY);
      if (_tc.y > 130 && _tc.y < 290) { // ship preview / stat panel zone — open picker
        picking = true;
        TAS.player.select(function () { recomputeStats(); picking = false; });
        return;
      }
      if (!tutorialShown) { showTutorial = true; tutorialShown = true; tutorialStep = 0; tutorialTimer = 0; }
      startGame();
    } else { state = 'title'; }
    return;
  }
  if (showTutorial) { tutorialStep++; if (tutorialStep > 3) showTutorial = false; return; }
  for (var ti = 0; ti < e.touches.length; ti++) {
    var t = e.touches[ti];
    var c = canvasCoords(t.clientX, t.clientY);
    if (TAS.input.isMobile) checkVirtualButton(c.x, c.y);
  }
  var t0 = e.touches[0];
  var c0 = canvasCoords(t0.clientX, t0.clientY);
  dragActive = true;
  lastTouchX = c0.x;
  lastTouchY = c0.y;
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!dragActive || state !== 'playing') return;
  clearVirtualButtons();
  for (var ti = 0; ti < e.touches.length; ti++) {
    var t = e.touches[ti];
    var c = canvasCoords(t.clientX, t.clientY);
    if (TAS.input.isMobile) checkVirtualButton(c.x, c.y);
  }
  var t0 = e.touches[0];
  var c0 = canvasCoords(t0.clientX, t0.clientY);
  var dx = c0.x - lastTouchX;
  var dy = c0.y - lastTouchY;
  px += dx;
  py += dy;
  lastTouchX = c0.x;
  lastTouchY = c0.y;
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  dragActive = false;
  clearVirtualButtons();
}, { passive: false });

// Mouse fallback for desktop
var mouseDown = false;
canvas.addEventListener('mousedown', function(e) {
  TAS.audio.ensureAudio();
  if (state === 'title' || state === 'gameOver') {
    if (state === 'title') {
      if (picking) return; // character-select overlay open
      var _mc = canvasCoords(e.clientX, e.clientY);
      if (_mc.y > 130 && _mc.y < 290) { // ship preview / stat panel zone — open picker
        picking = true;
        TAS.player.select(function () { recomputeStats(); picking = false; });
        return;
      }
      if (!tutorialShown) { showTutorial = true; tutorialShown = true; tutorialStep = 0; tutorialTimer = 0; }
      startGame();
    } else { state = 'title'; }
    return;
  }
  if (showTutorial) { tutorialStep++; if (tutorialStep > 3) showTutorial = false; return; }
  var c = canvasCoords(e.clientX, e.clientY);
  if (c.x > GW / 2) bombTapped = true;
  mouseDown = true;
  lastTouchX = c.x;
  lastTouchY = c.y;
});
canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown || state !== 'playing') return;
  var c = canvasCoords(e.clientX, e.clientY);
  var dx = c.x - lastTouchX;
  var dy = c.y - lastTouchY;
  px += dx;
  py += dy;
  lastTouchX = c.x;
  lastTouchY = c.y;
});
canvas.addEventListener('mouseup', function() { mouseDown = false; });

// === GAME START ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = baseMaxLives;
  bombs = 3;
  stage = 0;
  weaponType = WEAPONS.RED;
  weaponLevel = 1;
  speedLevel = 1;
  px = GW / 2;
  py = GH - 80;
  invincible = 120;
  bullets = [];
  enemyBullets = [];
  enemies = [];
  powerups = [];
  hazards = [];
  scorePopups = [];
  boss = null;
  bossActive = false;
  midBossActive = false;
  midBossSpawned = false;
  bossSpawned = false;
  stageCleared = false;
  stageTimer = 0;
  chainTimer = 0;
  chainCount = 0;
  noDeath = true;
  noBomb = true;
  bombActive = 0;
  shieldActive = 0;
  hasteActive = 0;
  luckBoostActive = 0;
  stageIntroTimer = 120;
  frame = 0;

}

// === BACKGROUND ELEMENTS ===
function initBgElements() {
  bgElements = [];
  for (var i = 0; i < 40; i++) {
    bgElements.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      size: 1 + Math.random() * 3,
      speed: 0.5 + Math.random() * 2,
      alpha: 0.2 + Math.random() * 0.4
    });
  }
}

// === FIRE WEAPONS ===
function fireWeapon() {
  var cx = px, cy = py - 10;
  var dmgMult = baseDamage; // ref from STR
  var lvl = weaponLevel;
  switch(weaponType) {
    case WEAPONS.RED: // Spore Spread
      if (lvl === 1) {
        bullets.push({ x: cx, y: cy, vx: 0, vy: -7, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
      } else if (lvl === 2) {
        bullets.push({ x: cx - 4, y: cy, vx: -0.3, vy: -7, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
        bullets.push({ x: cx + 4, y: cy, vx: 0.3, vy: -7, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
      } else if (lvl === 3) {
        bullets.push({ x: cx, y: cy, vx: 0, vy: -7, dmg: dmgMult, color: '#ff6644', w: 3, h: 8 });
        bullets.push({ x: cx - 6, y: cy, vx: -0.8, vy: -6.8, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
        bullets.push({ x: cx + 6, y: cy, vx: 0.8, vy: -6.8, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
      } else if (lvl === 4) {
        bullets.push({ x: cx - 3, y: cy, vx: -0.2, vy: -7, dmg: dmgMult, color: '#ff6644', w: 3, h: 8 });
        bullets.push({ x: cx + 3, y: cy, vx: 0.2, vy: -7, dmg: dmgMult, color: '#ff6644', w: 3, h: 8 });
        bullets.push({ x: cx - 10, y: cy, vx: -1.3, vy: -6.5, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
        bullets.push({ x: cx + 10, y: cy, vx: 1.3, vy: -6.5, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
      } else {
        bullets.push({ x: cx, y: cy, vx: 0, vy: -7.5, dmg: dmgMult + 1, color: '#ffaa44', w: 4, h: 10 });
        bullets.push({ x: cx - 6, y: cy, vx: -0.5, vy: -7, dmg: dmgMult, color: '#ff6644', w: 3, h: 8 });
        bullets.push({ x: cx + 6, y: cy, vx: 0.5, vy: -7, dmg: dmgMult, color: '#ff6644', w: 3, h: 8 });
        bullets.push({ x: cx - 14, y: cy, vx: -1.8, vy: -6, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
        bullets.push({ x: cx + 14, y: cy, vx: 1.8, vy: -6, dmg: dmgMult, color: '#ff4444', w: 3, h: 8 });
      }
      break;
    case WEAPONS.BLUE: // Mycelium Laser
      var w = 2 + lvl * 2;
      var d = dmgMult + Math.floor(lvl / 2);
      bullets.push({ x: cx, y: cy, vx: 0, vy: -10, dmg: d, color: '#44aaff', w: w, h: 16 + lvl * 4, pierce: true });
      break;
    case WEAPONS.GREEN: // Homing Spore - smarter homing from INT
      var count = lvl + 1 + Math.max(0, Math.floor(intMod / 3));
      var homingAccuracy = 0.08 + intMod * 0.01; // ref: INT improves tracking
      for (var i = 0; i < count; i++) {
        var spread = (i - (count - 1) / 2) * 0.4;
        bullets.push({ x: cx, y: cy, vx: spread * 2, vy: -5, dmg: dmgMult, color: '#44ff44', w: 5, h: 5, homing: true, speed: 5 + lvl * 0.5, accuracy: homingAccuracy });
      }
      break;
    case WEAPONS.YELLOW: // Fungal Wave
      var amp = 1 + lvl * 0.8;
      bullets.push({ x: cx - 4, y: cy, vx: 0, vy: -6, dmg: dmgMult + Math.floor(lvl / 3), color: '#ffdd44', w: 4, h: 6, wave: true, waveAmp: amp, waveT: 0 });
      if (lvl >= 3) {
        bullets.push({ x: cx + 4, y: cy, vx: 0, vy: -6, dmg: dmgMult, color: '#ffdd44', w: 4, h: 6, wave: true, waveAmp: amp, waveT: Math.PI });
      }
      if (lvl >= 5) {
        bullets.push({ x: cx, y: cy, vx: 0, vy: -7, dmg: dmgMult + 1, color: '#ffff88', w: 5, h: 8, wave: true, waveAmp: amp * 1.5, waveT: Math.PI / 2 });
      }
      break;
    case WEAPONS.PURPLE: // Ether Plasma
      bullets.push({ x: cx, y: cy, vx: 0, vy: -6.5, dmg: dmgMult + Math.floor(lvl / 2), color: '#cc44ff', w: 5, h: 8 });
      if (lvl >= 2) {
        bullets.push({ x: cx, y: cy + 10, vx: 0, vy: 4, dmg: dmgMult, color: '#aa22dd', w: 4, h: 6 });
      }
      if (lvl >= 3) {
        bullets.push({ x: cx - 8, y: cy, vx: -1, vy: -6, dmg: dmgMult, color: '#cc44ff', w: 4, h: 6 });
        bullets.push({ x: cx + 8, y: cy, vx: 1, vy: -6, dmg: dmgMult, color: '#cc44ff', w: 4, h: 6 });
      }
      if (lvl >= 4) {
        bullets.push({ x: cx - 6, y: cy + 10, vx: -1.5, vy: 3, dmg: dmgMult, color: '#aa22dd', w: 3, h: 5 });
        bullets.push({ x: cx + 6, y: cy + 10, vx: 1.5, vy: 3, dmg: dmgMult, color: '#aa22dd', w: 3, h: 5 });
      }
      if (lvl >= 5) {
        bullets.push({ x: cx - 14, y: cy, vx: -2, vy: -5, dmg: dmgMult, color: '#ee66ff', w: 4, h: 6 });
        bullets.push({ x: cx + 14, y: cy, vx: 2, vy: -5, dmg: dmgMult, color: '#ee66ff', w: 4, h: 6 });
      }
      break;
  }
  var freqs = [800, 1200, 600, 500, 900];
  TAS.audio.playTone(freqs[weaponType], 0.04, 'square', 0.04, freqs[weaponType] * 0.5);
}

// === ENEMY SPAWNING (Tasern themed) ===
function spawnEnemy(type, x, y, opts) {
  opts = opts || {};
  var et = ENEMY_TYPES[type] || {};
  var e = {
    type: type,
    displayName: et.name || type,
    x: x !== undefined ? x : TAS.math.randRange(20, GW - 20),
    y: y !== undefined ? y : -20,
    hp: opts.hp || 1,
    maxHp: opts.hp || 1,
    vx: opts.vx || 0,
    vy: opts.vy || 1.5,
    w: opts.w || et.w || 16,
    h: opts.h || et.h || 16,
    color: opts.color || et.color || '#ff8844',
    fireRate: opts.fireRate || 0,
    fireTimer: 0,
    age: 0,
    score: opts.score || et.score || 10,
    pattern: opts.pattern || null,
    startX: x !== undefined ? x : 0
  };
  enemies.push(e);
  return e;
}

function spawnFormation(count, startX, spacing, vy) {
  for (var i = 0; i < count; i++) {
    spawnEnemy('mycelium_snake', startX + i * spacing, -20 - i * 15, {
      hp: 1, vy: vy || 2, score: 15, w: 14, h: 14
    });
  }
}

function spawnWave() {
  var diff = stage + 1;
  var roll = Math.random();
  var stageEnemies = getStageEnemies(stage);

  if (roll < 0.2) {
    // Sporecaps / Moldlings (drifters)
    var count = 2 + Math.floor(diff * 0.5);
    var etype = stageEnemies[0];
    for (var i = 0; i < count; i++) {
      spawnEnemy(etype, TAS.math.randRange(20, GW - 20), -20 - i * 30, {
        hp: 1 + Math.floor(diff / 3), vy: 1 + diff * 0.1, score: ENEMY_TYPES[etype].score
      });
    }
  } else if (roll < 0.35) {
    // Blight Bats (swoopers)
    var side = Math.random() < 0.5 ? -20 : GW + 20;
    var dir = side < 0 ? 1 : -1;
    for (var i = 0; i < 2 + Math.floor(diff / 2); i++) {
      spawnEnemy('blight_bat', side, 60 + i * 40, {
        hp: 1 + Math.floor(diff / 4), vx: dir * (2 + diff * 0.2), vy: 0.5, score: 20
      });
    }
  } else if (roll < 0.48) {
    // Rot Spinners
    var cx = TAS.math.randRange(40, GW - 40);
    for (var i = 0; i < 1 + Math.floor(diff / 2); i++) {
      spawnEnemy('rot_spinner', cx, -30 - i * 25, {
        hp: 2 + Math.floor(diff / 3), vy: 1, score: 25
      });
    }
  } else if (roll < 0.6) {
    // Iron Turrets
    var tx = TAS.math.randRange(30, GW - 30);
    spawnEnemy('iron_turret', tx, -20, {
      hp: 3 + diff, vy: 0.8, score: 30, w: 20, h: 20,
      fireRate: Math.max(30, 80 - diff * 5)
    });
  } else if (roll < 0.72) {
    // Mycelium Snake formation
    var sx = TAS.math.randRange(20, GW - 100);
    spawnFormation(3 + Math.floor(diff / 2), sx, 22, 1.8 + diff * 0.1);
  } else if (roll < 0.82) {
    // Fungal Knights (tanks)
    spawnEnemy('fungal_knight', TAS.math.randRange(30, GW - 30), -30, {
      hp: 8 + diff * 3, vy: 0.6, score: 50, w: 28, h: 24,
      fireRate: Math.max(40, 90 - diff * 5)
    });
  } else if (roll < 0.9) {
    // Burst Pods (kamikaze)
    for (var i = 0; i < 2 + Math.floor(diff / 3); i++) {
      spawnEnemy('spore_kamikaze', TAS.math.randRange(20, GW - 20), -20 - i * 50, {
        hp: 1, vy: 0, score: 15
      });
    }
  } else {
    // Stage-specific enemy
    var special = stageEnemies[1] || stageEnemies[0];
    spawnEnemy(special, TAS.math.randRange(30, GW - 30), -25, {
      hp: 4 + diff * 2, vy: 0.8 + diff * 0.1, score: ENEMY_TYPES[special].score
    });
  }
}

function getStageEnemies(s) {
  var enemies = [
    ['sporecap', 'moldling'],
    ['moldling', 'void_wraith'],
    ['sporecap', 'crystal_golem'],
    ['moldling', 'fungal_knight'],
    ['ooze_blob', 'sporecap'],
    ['void_wraith', 'hive_drone'],
    ['hive_drone', 'void_wraith'],
    ['void_wraith', 'crystal_golem']
  ];
  return enemies[s] || enemies[0];
}

// === MID-BOSS ===
function spawnMidBoss() {
  midBossActive = true;
  var hp = Math.floor((30 + stage * 20) * baseHpMult);
  spawnEnemy('midboss', GW / 2, -40, {
    hp: hp, vy: 1, color: BOSS_DATA[stage].partColor, score: 200, w: 40, h: 36,
    fireRate: Math.max(20, 50 - stage * 3)
  });
}

// === BOSS ===
function spawnBoss() {
  bossActive = true;
  var bossInfo = BOSS_DATA[stage];
  var hp = Math.floor((80 + stage * 40) * baseHpMult);
  boss = {
    x: GW / 2, y: -60,
    targetY: 70,
    hp: hp, maxHp: hp,
    w: 80 + stage * 5, h: 50 + stage * 3,
    phase: 0,
    phaseTimer: 0,
    fireTimer: 0,
    moveTimer: 0,
    moveDir: 1,
    color: bossInfo.color,
    partColor: bossInfo.partColor,
    coreColor: bossInfo.coreColor,
    name: bossInfo.name,
    age: 0,
    parts: []
  };
  var partCount = 2 + Math.floor(stage / 2);
  for (var i = 0; i < partCount; i++) {
    boss.parts.push({
      offsetX: (i - (partCount - 1) / 2) * 25,
      offsetY: 15,
      hp: 15 + stage * 5,
      maxHp: 15 + stage * 5,
      w: 14, h: 14,
      alive: true
    });
  }
  TAS.audio.playTone(200, 0.5, 'sawtooth', 0.12, 100);
  TAS.audio.playTone(150, 0.8, 'square', 0.08, 80);
  spawnScorePopup(GW / 2, 120, bossInfo.name, '#ff4444');
}

// === POWERUP SPAWNING (Tasern items) ===
function spawnPowerup(x, y, type) {
  powerups.push({ x: x, y: y, type: type, vy: 1.5, age: 0, w: 12, h: 12 });
}

// === BOMB (Spore Burst) ===
function useBomb() {
  if (bombs <= 0 || bombActive > 0) return;
  bombs--;
  bombActive = 60;
  noBomb = false;
  TAS.fx.flash('#fff', 0.8);
  TAS.fx.shake(12, 0.92);
  TAS.audio.playNoise(0.6, 0.2, 400);
  TAS.audio.playTone(100, 0.5, 'sawtooth', 0.15, 30);
  spawnScorePopup(px, py - 20, 'SPORE BURST!', '#ff4444');

  // Damage all enemies (STR-scaled bomb damage)
  for (var i = enemies.length - 1; i >= 0; i--) {
    enemies[i].hp -= baseBombDamage;
    if (enemies[i].hp <= 0) {
      killEnemy(i);
    }
  }
  if (boss) {
    boss.hp -= Math.floor(baseBombDamage * 0.75);
    for (var i = 0; i < boss.parts.length; i++) {
      if (boss.parts[i].alive) boss.parts[i].hp -= Math.floor(baseBombDamage * 0.5);
    }
  }
  enemyBullets = [];
  // Big particle burst using player color
  for (var i = 0; i < 60; i++) {
    TAS.particles.spawn(px, py, playerColor, 3, 6, { size: 3, sizeVar: 4 });
  }
  for (var i = 0; i < 30; i++) {
    TAS.particles.spawn(px, py, '#fff', 4, 5, { size: 2, sizeVar: 3 });
  }
}

// === KILL ENEMY ===
function killEnemy(idx) {
  var e = enemies[idx];
  var earnedScore = Math.floor(e.score * baseScoreMult);
  score += earnedScore;
  chainCount++;
  chainTimer = 60;
  var chainBonus = 0;
  if (chainCount >= 5) {
    chainBonus = Math.floor(chainCount * 10 * baseChainMult);
    score += chainBonus;
  }

  // Score popup
  var popText = '+' + earnedScore;
  if (chainBonus > 0) popText += ' CHAIN +' + chainBonus;
  spawnScorePopup(e.x, e.y - 10, popText, chainCount >= 10 ? '#ff4444' : chainCount >= 5 ? '#ffdd44' : '#fff');

  // Explosion particles
  TAS.particles.spawn(e.x, e.y, e.color, 8, 3, { size: 2, sizeVar: 3 });
  TAS.particles.spawn(e.x, e.y, '#ffdd44', 4, 2);
  // Extra particles for bigger enemies
  if (e.type === 'fungal_knight' || e.type === 'crystal_golem') {
    TAS.particles.spawn(e.x, e.y, '#ff8844', 12, 4, { size: 3, sizeVar: 4 });
    TAS.fx.shake(4, 0.95);
  }
  TAS.audio.playNoise(0.08, 0.06, 800);
  TAS.audio.playTone(200 + Math.random() * 200, 0.06, 'square', 0.04);

  // Powerup drop chance (CHA-scaled luck)
  var dropChance = baseDropLuck + (luckBoostActive > 0 ? 0.1 : 0);
  if (e.type === 'midboss') dropChance += 0.9;
  if (e.type === 'fungal_knight') dropChance += 0.3;
  if (e.type === 'crystal_golem') dropChance += 0.2;

  if (Math.random() < dropChance) {
    var r = Math.random();
    if (r < 0.08) spawnPowerup(e.x, e.y, 'shield');
    else if (r < 0.14) spawnPowerup(e.x, e.y, 'haste');
    else if (r < 0.2) spawnPowerup(e.x, e.y, 'score');
    else if (r < 0.25) spawnPowerup(e.x, e.y, 'speed');
    else if (e.type === 'midboss' && Math.random() < 0.5) spawnPowerup(e.x, e.y, 'bomb');
    else if (r < 0.35) spawnPowerup(e.x, e.y, 'luck');
    else spawnPowerup(e.x, e.y, 'weapon');
  }

  enemies.splice(idx, 1);
}

// === PLAYER DEATH ===
function playerDie() {
  if (invincible > 0 || shieldActive > 0) {
    if (shieldActive > 0) {
      shieldActive = 0;
      TAS.particles.spawn(px, py, '#aaaacc', 15, 3, { size: 2, sizeVar: 3 });
      TAS.audio.playTone(600, 0.1, 'sine', 0.06);
      spawnScorePopup(px, py - 15, 'SHIELD BREAK!', '#a855f7');
    }
    return;
  }
  lives--;
  noDeath = false;
  invincible = baseInvincFrames;
  weaponLevel = Math.max(1, weaponLevel - 1);
  TAS.particles.spawn(px, py, '#ff4444', 20, 4, { size: 3, sizeVar: 4 });
  TAS.particles.spawn(px, py, '#ffaa44', 12, 3);
  TAS.fx.flash('#ff0000', 0.4);
  TAS.fx.shake(8, 0.9);
  TAS.audio.playNoise(0.3, 0.15, 600);
  TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1, 50);
  if (lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('sporestorm_hi', highScore);
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups();

  if (state === 'title') {
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.keys['KeyZ']) {
      if (!tutorialShown) { showTutorial = true; tutorialShown = true; tutorialStep = 0; tutorialTimer = 0; }
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 3 === 0 && TAS.input.keys['Space'] || TAS.input.keys['Enter']) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial overlay
  if (showTutorial) {
    tutorialTimer++;
    if (TAS.input.keys['Space'] || TAS.input.keys['Enter'] || TAS.input.keys['KeyZ']) {
      tutorialStep++;
      if (tutorialStep > 3) showTutorial = false;
    }
    return;
  }

  // Stage intro
  if (stageIntroTimer > 0) {
    stageIntroTimer--;
    return;
  }

  // Stage cleared transition
  if (stageCleared) {
    stageClearTimer++;
    if (stageClearTimer > 180) {
      stage++;
      if (stage >= 8) {
        score += Math.floor(10000 * baseScoreMult);
        if (noDeath) score += Math.floor(5000 * baseScoreMult);
        if (noBomb) score += Math.floor(3000 * baseScoreMult);
        gameOver();
        return;
      }
      stageCleared = false;
      stageClearTimer = 0;
      bossSpawned = false;
      midBossSpawned = false;
      bossActive = false;
      midBossActive = false;
      boss = null;
      stageTimer = 0;
      stageIntroTimer = 120;
      noDeath = true;
      noBomb = true;
      hazards = [];
    }
    return;
  }

  stageTimer++;

  // Buff timers
  if (invincible > 0) invincible--;
  if (shieldActive > 0) shieldActive--;
  if (hasteActive > 0) hasteActive--;
  if (luckBoostActive > 0) luckBoostActive--;

  // Chain timer
  if (chainTimer > 0) {
    chainTimer--;
    if (chainTimer <= 0) chainCount = 0;
  }

  // Bomb animation
  if (bombActive > 0) bombActive--;

  // Bomb input (NES B button or keyboard)
  if (bombTapped || TAS.input.keys['KeyX'] || TAS.input.keys['Shift'] || virtualButtons.b) {
    useBomb();
    bombTapped = false;
  }
  bombTapped = false;

  // Player movement (keyboard + NES virtual D-pad)
  pSpeed = baseMoveSpeed + speedLevel * 0.8;
  if (hasteActive > 0) pSpeed *= 1.4;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || virtualButtons.left) px -= pSpeed;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || virtualButtons.right) px += pSpeed;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || virtualButtons.up) py -= pSpeed;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || virtualButtons.down) py += pSpeed;

  // Clamp player
  px = TAS.math.clamp(px, 10, GW - 10);
  py = TAS.math.clamp(py, GH * 0.3, GH - 15);

  // Auto-fire (with WIS cooldown reduction and haste boost)
  var currentFireRate = Math.max(2, Math.floor(fireRate * baseCooldownMult));
  if (hasteActive > 0) currentFireRate = Math.max(1, Math.floor(currentFireRate * 0.6));
  fireTimer++;
  if (fireTimer >= currentFireRate) {
    fireTimer = 0;
    fireWeapon();
  }

  // Spawn environmental hazards
  if (frame % 120 === 0 && STAGES[stage].hazard) {
    spawnHazard(STAGES[stage].hazard, TAS.math.randRange(20, GW - 20), -20);
  }
  updateHazards();

  // Update bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    if (b.homing) {
      var nearest = null, nearDist = 9999;
      for (var j = 0; j < enemies.length; j++) {
        var d = TAS.math.dist(b.x, b.y, enemies[j].x, enemies[j].y);
        if (d < nearDist) { nearDist = d; nearest = enemies[j]; }
      }
      if (boss && !nearest) nearest = boss;
      if (nearest) {
        var ang = TAS.math.angle(b.x, b.y, nearest.x, nearest.y);
        var acc = b.accuracy || 0.08;
        b.vx = TAS.math.lerp(b.vx, Math.cos(ang) * b.speed, acc);
        b.vy = TAS.math.lerp(b.vy, Math.sin(ang) * b.speed, acc);
      }
    }
    if (b.wave) {
      b.waveT += 0.2;
      b.x += Math.sin(b.waveT) * b.waveAmp;
    }
    b.x += b.vx;
    b.y += b.vy;
    if (b.y < -20 || b.y > GH + 20 || b.x < -20 || b.x > GW + 20) {
      bullets.splice(i, 1);
    }
  }

  // Update enemy bullets
  for (var i = enemyBullets.length - 1; i >= 0; i--) {
    var eb = enemyBullets[i];
    eb.x += eb.vx;
    eb.y += eb.vy;
    if (eb.y > GH + 10 || eb.y < -10 || eb.x < -10 || eb.x > GW + 10) {
      enemyBullets.splice(i, 1);
      continue;
    }
    if (invincible <= 0 && TAS.hit.circleOverlap(px, py, 4, eb.x, eb.y, eb.w / 2)) {
      enemyBullets.splice(i, 1);
      playerDie();
    }
  }

  // Spawn enemies based on stage timer
  var rate = STAGES[stage].enemyRate;
  if (!bossActive && !midBossActive && stageTimer % Math.floor(60 * rate) === 0) {
    spawnWave();
  }

  // Mid-boss at halfway
  if (!midBossSpawned && stageTimer >= stageLength / 2 && !bossActive) {
    midBossSpawned = true;
    spawnMidBoss();
  }

  // Boss at end
  if (!bossSpawned && stageTimer >= stageLength && !midBossActive) {
    bossSpawned = true;
    spawnBoss();
  }

  // Update enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.age++;

    switch(e.type) {
      case 'sporecap':
      case 'moldling':
      case 'ooze_blob':
        e.y += e.vy;
        e.x += Math.sin(e.age * 0.03) * 0.5;
        break;
      case 'blight_bat':
        e.x += e.vx;
        e.y += e.vy + Math.sin(e.age * 0.04) * 0.8;
        break;
      case 'rot_spinner':
        var spAngle = e.age * 0.05;
        e.x += Math.cos(spAngle) * 1.5;
        e.y += e.vy + Math.sin(spAngle) * 0.3;
        break;
      case 'iron_turret':
        e.y += e.vy;
        if (e.y > 40) e.vy = 0;
        e.fireTimer++;
        if (e.fireTimer >= e.fireRate) {
          e.fireTimer = 0;
          var a = TAS.math.angle(e.x, e.y, px, py);
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, w: 5, color: '#ff8888' });
          TAS.audio.playTone(300, 0.03, 'square', 0.02);
        }
        break;
      case 'mycelium_snake':
        e.y += e.vy;
        e.x += Math.sin(e.age * 0.04) * 1.2;
        break;
      case 'fungal_knight':
        e.y += e.vy;
        e.fireTimer++;
        if (e.fireTimer >= e.fireRate) {
          e.fireTimer = 0;
          for (var s = -1; s <= 1; s++) {
            enemyBullets.push({ x: e.x, y: e.y + 10, vx: s * 1.5, vy: 2.5, w: 4, color: '#ffaa44' });
          }
          TAS.audio.playTone(200, 0.05, 'sawtooth', 0.03);
        }
        break;
      case 'spore_kamikaze':
        var ka = TAS.math.angle(e.x, e.y, px, py);
        e.vx = TAS.math.lerp(e.vx || 0, Math.cos(ka) * 4, 0.03);
        e.vy = TAS.math.lerp(e.vy || 0, Math.sin(ka) * 4, 0.03);
        e.x += e.vx;
        e.y += e.vy;
        break;
      case 'crystal_golem':
        e.y += e.vy * 0.7;
        if (e.age % 90 === 0 && e.y > 20) {
          for (var s = -1; s <= 1; s += 2) {
            enemyBullets.push({ x: e.x, y: e.y, vx: s * 2, vy: 2, w: 6, color: '#66aaff' });
          }
          TAS.audio.playTone(400, 0.04, 'sine', 0.03);
        }
        break;
      case 'void_wraith':
        e.y += e.vy * 0.8;
        e.x += Math.sin(e.age * 0.06) * 2;
        if (e.age % 80 === 0 && e.y > 30) {
          var a2 = TAS.math.angle(e.x, e.y, px, py);
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a2) * 2.5, vy: Math.sin(a2) * 2.5, w: 5, color: '#aa66ff' });
        }
        break;
      case 'hive_drone':
        e.y += e.vy;
        e.x += Math.cos(e.age * 0.08) * 1.8;
        break;
      case 'midboss':
        if (e.y < 80) e.y += e.vy;
        else {
          e.y = 80 + Math.sin(e.age * 0.02) * 10;
          e.x += Math.sin(e.age * 0.03) * 2;
          e.x = TAS.math.clamp(e.x, 40, GW - 40);
        }
        e.fireTimer++;
        if (e.fireTimer >= e.fireRate) {
          e.fireTimer = 0;
          var bCount = 5 + stage;
          for (var b2 = 0; b2 < bCount; b2++) {
            var ba = (b2 / bCount) * Math.PI * 2 + e.age * 0.02;
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ba) * 2.5, vy: Math.sin(ba) * 2.5, w: 4, color: '#ffdd44' });
          }
          TAS.audio.playTone(250, 0.06, 'sawtooth', 0.03);
        }
        break;
      default:
        e.y += e.vy;
        e.x += e.vx || 0;
    }

    // Remove off-screen
    if (e.y > GH + 40 || e.x < -60 || e.x > GW + 60) {
      enemies.splice(i, 1);
      if (e.type === 'midboss') midBossActive = false;
      continue;
    }

    // Collide with player
    if (invincible <= 0 && TAS.hit.rectOverlap(px - 5, py - 5, 10, 10, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
      playerDie();
    }

    // Bullet vs enemy
    for (var j = bullets.length - 1; j >= 0; j--) {
      var bul = bullets[j];
      if (TAS.hit.rectOverlap(bul.x - bul.w / 2, bul.y - bul.h / 2, bul.w, bul.h, e.x - e.w / 2, e.y - e.h / 2, e.w, e.h)) {
        e.hp -= bul.dmg;
        if (!bul.pierce) {
          bullets.splice(j, 1);
        }
        TAS.particles.spawn(bul.x, bul.y, '#fff', 2, 1.5);
        if (e.hp <= 0) {
          killEnemy(i);
          break;
        }
      }
    }
  }

  // Mid-boss cleared check
  if (midBossActive && !enemies.find(function(e) { return e.type === 'midboss'; })) {
    midBossActive = false;
  }

  // === BOSS UPDATE ===
  if (boss) {
    boss.age++;
    if (boss.y < boss.targetY) {
      boss.y += 1;
    } else {
      boss.moveTimer++;
      if (boss.moveTimer > 60) {
        boss.moveTimer = 0;
        boss.moveDir = -boss.moveDir;
      }
      boss.x += boss.moveDir * (1 + stage * 0.3);
      boss.x = TAS.math.clamp(boss.x, boss.w / 2 + 10, GW - boss.w / 2 - 10);
      boss.y = boss.targetY + Math.sin(boss.age * 0.02) * 15;

      boss.phaseTimer++;
      boss.fireTimer++;
      var fireInterval = Math.max(12, 35 - stage * 2);
      if (boss.fireTimer >= fireInterval) {
        boss.fireTimer = 0;
        boss.phase = (boss.phase + 1) % 4;

        switch(boss.phase) {
          case 0: // Aimed spread
            for (var s = -2; s <= 2; s++) {
              var a = TAS.math.angle(boss.x, boss.y + boss.h / 2, px, py) + s * 0.15;
              enemyBullets.push({ x: boss.x, y: boss.y + boss.h / 2, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3, w: 5, color: '#ff6644' });
            }
            break;
          case 1: // Circle burst
            var bc = 8 + stage;
            for (var b2 = 0; b2 < bc; b2++) {
              var ba = (b2 / bc) * Math.PI * 2;
              enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ba) * 2, vy: Math.sin(ba) * 2, w: 4, color: boss.partColor });
            }
            break;
          case 2: // Spiral
            for (var b2 = 0; b2 < 3; b2++) {
              var sa = boss.age * 0.1 + b2 * (Math.PI * 2 / 3);
              enemyBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(sa) * 2.5, vy: Math.sin(sa) * 2.5 + 1, w: 4, color: '#ff88ff' });
            }
            break;
          case 3: // Streams from parts
            for (var p = 0; p < boss.parts.length; p++) {
              if (boss.parts[p].alive) {
                var partX = boss.x + boss.parts[p].offsetX;
                var partY = boss.y + boss.parts[p].offsetY;
                var a = TAS.math.angle(partX, partY, px, py);
                enemyBullets.push({ x: partX, y: partY, vx: Math.cos(a) * 3.5, vy: Math.sin(a) * 3.5, w: 4, color: boss.coreColor });
              }
            }
            break;
        }
        TAS.audio.playTone(180, 0.05, 'sawtooth', 0.03);
      }
    }

    // Boss collision with player bullets
    for (var j = bullets.length - 1; j >= 0; j--) {
      var bul = bullets[j];
      if (TAS.hit.rectOverlap(bul.x - bul.w / 2, bul.y - bul.h / 2, bul.w, bul.h, boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
        boss.hp -= bul.dmg;
        if (!bul.pierce) bullets.splice(j, 1);
        TAS.particles.spawn(bul.x, bul.y, '#fff', 2, 1.5);
        continue;
      }
      for (var p = 0; p < boss.parts.length; p++) {
        if (!boss.parts[p].alive) continue;
        var partX = boss.x + boss.parts[p].offsetX;
        var partY = boss.y + boss.parts[p].offsetY;
        if (TAS.hit.rectOverlap(bul.x - bul.w / 2, bul.y - bul.h / 2, bul.w, bul.h, partX - 7, partY - 7, 14, 14)) {
          boss.parts[p].hp -= bul.dmg;
          if (!bul.pierce) bullets.splice(j, 1);
          TAS.particles.spawn(bul.x, bul.y, boss.partColor, 2, 1.5);
          if (boss.parts[p].hp <= 0) {
            boss.parts[p].alive = false;
            var partScore = Math.floor(100 * baseScoreMult);
            score += partScore;
            spawnScorePopup(partX, partY - 10, '+' + partScore, '#ffdd44');
            TAS.particles.spawn(partX, partY, '#ffdd44', 12, 4, { size: 3, sizeVar: 3 });
            TAS.fx.shake(6, 0.93);
            TAS.audio.playNoise(0.15, 0.08, 600);
          }
          break;
        }
      }
    }

    // Boss defeated
    if (boss.hp <= 0) {
      var bossScore = Math.floor((500 + stage * 200) * baseScoreMult);
      score += bossScore;
      spawnScorePopup(boss.x, boss.y, boss.name + ' DESTROYED +' + bossScore, '#ffdd44');

      for (var i = 0; i < 12; i++) {
        var ex = boss.x + TAS.math.randRange(-boss.w / 2, boss.w / 2);
        var ey = boss.y + TAS.math.randRange(-boss.h / 2, boss.h / 2);
        TAS.particles.spawn(ex, ey, '#ffdd44', 10, 4, { size: 3, sizeVar: 4 });
        TAS.particles.spawn(ex, ey, boss.color, 8, 3);
        TAS.particles.spawn(ex, ey, '#fff', 5, 5, { size: 2, sizeVar: 2 });
      }
      TAS.fx.flash('#ffdd44', 0.6);
      TAS.fx.shake(15, 0.92);
      TAS.audio.playNoise(0.5, 0.2, 300);
      TAS.audio.playTone(100, 0.6, 'sawtooth', 0.15, 30);

      if (noDeath) { var nd = Math.floor(1000 * baseScoreMult); score += nd; spawnScorePopup(GW/2, GH/2 - 40, 'NO DEATH +' + nd, '#44ff88'); }
      if (noBomb) { var nb = Math.floor(500 * baseScoreMult); score += nb; spawnScorePopup(GW/2, GH/2 - 20, 'NO BOMB +' + nb, '#88ccff'); }

      boss = null;
      bossActive = false;
      stageCleared = true;
      stageClearTimer = 0;
      enemyBullets = [];
      spawnPowerup(GW / 2, 100, 'bomb');
    }

    // Boss body hits player
    if (boss && invincible <= 0) {
      if (TAS.hit.rectOverlap(px - 5, py - 5, 10, 10, boss.x - boss.w / 2, boss.y - boss.h / 2, boss.w, boss.h)) {
        playerDie();
      }
    }
  }

  // Update powerups (with WIS-scaled pickup radius)
  for (var i = powerups.length - 1; i >= 0; i--) {
    var p = powerups[i];
    p.y += p.vy;
    p.age++;
    if (p.y > GH + 20) { powerups.splice(i, 1); continue; }

    if (TAS.hit.circleOverlap(px, py, basePickupRadius, p.x, p.y, 8)) {
      var itemInfo = ITEM_TYPES[p.type] || {};
      if (p.type === 'weapon') {
        var newWeapon = TAS.math.randInt(0, 4);
        if (newWeapon === weaponType) {
          weaponLevel = Math.min(baseWeaponCap, weaponLevel + 1);
          spawnScorePopup(p.x, p.y - 10, WEAPON_NAMES[weaponType] + ' Lv' + weaponLevel, WEAPON_COLORS[weaponType]);
        } else {
          weaponType = newWeapon;
          weaponLevel = 1;
          spawnScorePopup(p.x, p.y - 10, WEAPON_NAMES[weaponType] + '!', WEAPON_COLORS[weaponType]);
        }
        TAS.audio.playMelody([[440, 0.06], [660, 0.06], [880, 0.06]], 60);
      } else if (p.type === 'speed') {
        speedLevel = Math.min(3, speedLevel + 1);
        spawnScorePopup(p.x, p.y - 10, 'POOP Boost!', '#f4b41b');
        TAS.audio.playMelody([[330, 0.06], [550, 0.06]], 60);
      } else if (p.type === 'bomb') {
        bombs = Math.min(9, bombs + 1);
        spawnScorePopup(p.x, p.y - 10, 'Spore Gem!', '#3cacd7');
        TAS.audio.playMelody([[220, 0.08], [440, 0.08], [660, 0.08]], 80);
      } else if (p.type === 'shield') {
        shieldActive = 600;
        spawnScorePopup(p.x, p.y - 10, 'Mycelium Shield!', '#a855f7');
        TAS.audio.playMelody([[400, 0.06], [500, 0.06], [600, 0.06]], 60);
      } else if (p.type === 'haste') {
        hasteActive = 480;
        spawnScorePopup(p.x, p.y - 10, 'Spore Rush!', '#f4b41b');
        TAS.audio.playMelody([[500, 0.04], [700, 0.04], [900, 0.04]], 50);
      } else if (p.type === 'score') {
        var goldScore = Math.floor(100 * baseScoreMult);
        score += goldScore;
        spawnScorePopup(p.x, p.y - 10, 'POOP! +' + goldScore, '#f4b41b');
        TAS.audio.playMelody([[600, 0.04], [800, 0.04]], 50);
      } else if (p.type === 'luck') {
        luckBoostActive = 600;
        spawnScorePopup(p.x, p.y - 10, 'Garden Charm!', '#38d973');
        TAS.audio.playMelody([[440, 0.05], [550, 0.05], [660, 0.05]], 60);
      }
      TAS.particles.spawn(p.x, p.y, '#fff', 6, 2);
      powerups.splice(i, 1);
    }
  }

  // Update background
  scrollY += 1.5 + stage * 0.2;
  for (var i = 0; i < bgElements.length; i++) {
    var bg = bgElements[i];
    bg.y += bg.speed;
    if (bg.y > GH + 10) {
      bg.y = -10;
      bg.x = Math.random() * GW;
    }
  }
}

// === DRAW ===
function draw(dt) {
  var stageData = STAGES[stage] || STAGES[0];

  // Background gradient
  var grd = ctx.createLinearGradient(0, 0, 0, GH);
  grd.addColorStop(0, stageData.bgTop);
  grd.addColorStop(1, stageData.bgBot);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + (stage + 1) + ' | ' + playerName });
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  // Draw bg elements (scrolling particles)
  ctx.globalAlpha = 0.4;
  for (var i = 0; i < bgElements.length; i++) {
    var bg = bgElements[i];
    ctx.fillStyle = stageData.scrollColor;
    ctx.globalAlpha = bg.alpha;
    ctx.beginPath();
    ctx.arc(bg.x, bg.y, bg.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Scrolling terrain lines (zone-themed)
  drawZoneTerrain(stageData);

  // Draw hazards (behind enemies)
  drawHazards();

  // Draw powerups (Tasern items)
  for (var i = 0; i < powerups.length; i++) {
    var p = powerups[i];
    var pulse = Math.sin(p.age * 0.1) * 2;
    ctx.save();
    ctx.translate(p.x, p.y);
    drawTasernItem(p, pulse);
    ctx.restore();
  }

  // Draw enemies (Tasern creatures)
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.type === 'midboss') {
      drawMidBoss(e);
    } else {
      drawTasernEnemy(e);
    }
    ctx.restore();
  }

  // Draw boss
  if (boss) {
    drawBoss();
  }

  // Draw enemy bullets
  for (var i = 0; i < enemyBullets.length; i++) {
    var eb = enemyBullets[i];
    ctx.fillStyle = eb.color;
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.w / 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw player bullets
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    ctx.fillStyle = b.color;
    if (b.homing) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(68,255,68,0.3)';
      ctx.beginPath();
      ctx.arc(b.x - b.vx * 0.5, b.y - b.vy * 0.5, b.w / 2 + 1, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
      ctx.globalAlpha = 0.3;
      ctx.fillRect(b.x - b.w / 2 - 1, b.y - b.h / 2 - 1, b.w + 2, b.h + 2);
      ctx.globalAlpha = 1;
    }
  }

  // Draw player (baseling)
  if (invincible <= 0 || frame % 4 < 2) {
    drawPlayer();
  }

  // Shield visual
  if (shieldActive > 0) {
    ctx.strokeStyle = '#a855f7';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
    ctx.beginPath();
    ctx.arc(px, py, 18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Bomb flash effect
  if (bombActive > 0) {
    ctx.globalAlpha = bombActive / 60 * 0.4;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }

  TAS.particles.draw();
  drawScorePopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  drawHUD();

  // NES virtual controls (mobile)
  drawVirtualControls();

  // Tutorial overlay
  if (showTutorial) {
    drawTutorial();
  }

  // Stage intro overlay
  if (stageIntroTimer > 0) {
    drawStageIntro();
  }

  // Stage clear overlay
  if (stageCleared) {
    drawStageClear();
  }

  // Chain counter
  if (chainCount >= 3) {
    ctx.fillStyle = chainCount >= 10 ? '#ff4444' : chainCount >= 5 ? '#ffdd44' : '#88ccff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.globalAlpha = Math.min(1, chainTimer / 20);
    ctx.fillText('CHAIN x' + chainCount, GW - 5, GH - 10);
    ctx.globalAlpha = 1;
  }

  // Active buff indicators
  drawBuffIndicators();
}

function drawZoneTerrain(stageData) {
  ctx.strokeStyle = stageData.scrollColor;
  ctx.globalAlpha = 0.15;
  ctx.lineWidth = 1;

  // Different terrain patterns per stage
  switch(stage) {
    case 0: // Fungal Fields - mushroom-like bumps
      for (var i = 0; i < 8; i++) {
        var ly = ((scrollY * 0.5 + i * 70) % (GH + 40)) - 20;
        ctx.beginPath();
        ctx.moveTo(0, ly);
        for (var x = 0; x < GW; x += 15) {
          ctx.lineTo(x, ly + Math.abs(Math.sin((x + scrollY) * 0.03)) * 12);
        }
        ctx.stroke();
      }
      break;
    case 1: // Underspore - dripping lines
      for (var i = 0; i < 12; i++) {
        var lx = (i * 28 + Math.sin(scrollY * 0.01 + i) * 10) % GW;
        ctx.beginPath();
        ctx.moveTo(lx, 0);
        for (var y = 0; y < GH; y += 20) {
          ctx.lineTo(lx + Math.sin(y * 0.05 + scrollY * 0.02) * 6, y);
        }
        ctx.stroke();
      }
      break;
    case 2: // Crystal Hollow - angular lines
      for (var i = 0; i < 6; i++) {
        var ly = ((scrollY * 0.4 + i * 90) % (GH + 40)) - 20;
        ctx.beginPath();
        ctx.moveTo(0, ly);
        for (var x = 0; x < GW; x += 30) {
          ctx.lineTo(x, ly + ((x * 7 + i * 33) % 20) - 10);
        }
        ctx.stroke();
      }
      break;
    case 3: // Iron Maw - jagged industrial
      for (var i = 0; i < 8; i++) {
        var ly = ((scrollY * 0.6 + i * 65) % (GH + 40)) - 20;
        ctx.beginPath();
        ctx.moveTo(0, ly);
        for (var x = 0; x < GW; x += 10) {
          ctx.lineTo(x, ly + ((x * 13 + i * 47) % 16) - 8);
        }
        ctx.stroke();
      }
      break;
    case 4: // Sea of Ooze - smooth waves
      for (var i = 0; i < 10; i++) {
        var ly = ((scrollY * 0.3 + i * 55) % (GH + 40)) - 20;
        ctx.beginPath();
        ctx.moveTo(0, ly);
        for (var x = 0; x < GW; x += 8) {
          ctx.lineTo(x, ly + Math.sin(x * 0.02 + scrollY * 0.01 + i) * 10);
        }
        ctx.stroke();
      }
      break;
    case 5: // Void Drift - scattered dots/lines
      for (var i = 0; i < 15; i++) {
        var sx = (i * 23 + scrollY * 0.2) % GW;
        var sy = (i * 37 + scrollY * 0.4) % GH;
        ctx.fillStyle = stageData.scrollColor;
        ctx.beginPath();
        ctx.arc(sx, sy, 1 + (i % 3), 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 6: // Hive - honeycomb hints
      for (var i = 0; i < 8; i++) {
        var ly = ((scrollY * 0.5 + i * 70) % (GH + 40)) - 20;
        ctx.beginPath();
        for (var x = 0; x < GW; x += 25) {
          var yOff = (x / 25) % 2 === 0 ? 0 : 12;
          ctx.moveTo(x, ly + yOff);
          ctx.lineTo(x + 12, ly + yOff - 8);
          ctx.lineTo(x + 24, ly + yOff);
          ctx.lineTo(x + 12, ly + yOff + 8);
          ctx.closePath();
        }
        ctx.stroke();
      }
      break;
    default: // Heart of the Vessel - pulsing concentric
      ctx.globalAlpha = 0.08;
      for (var i = 0; i < 5; i++) {
        var r = 30 + i * 40 + Math.sin(scrollY * 0.01) * 10;
        ctx.beginPath();
        ctx.arc(GW / 2, GH / 2, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
  }
  ctx.globalAlpha = 1;
}

function drawTasernItem(p, pulse) {
  var itemDef = null;
  switch (p.type) {
    case 'weapon':
      var wColor = WEAPON_COLORS[TAS.math.randInt(0, 4)];
      ctx.fillStyle = wColor;
      ctx.fillRect(-6 - pulse / 2, -6 - pulse / 2, 12 + pulse, 12 + pulse);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(-6 - pulse / 2, -6 - pulse / 2, 12 + pulse, 12 + pulse);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('W', 0, 3);
      return;
    case 'speed':
      itemDef = ITEM_TYPES.haste_spore; break;
    case 'bomb':
      itemDef = ITEM_TYPES.mana_crystal; break;
    case 'shield':
      itemDef = ITEM_TYPES.iron_shield; break;
    case 'haste':
      itemDef = ITEM_TYPES.haste_spore; break;
    case 'score':
      itemDef = ITEM_TYPES.gold_nugget; break;
    case 'luck':
      itemDef = ITEM_TYPES.lucky_charm; break;
    default:
      itemDef = ITEM_TYPES.healing_moss;
  }
  ctx.fillStyle = itemDef.color;
  ctx.beginPath();
  ctx.arc(0, 0, 7 + pulse / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, 7 + pulse / 2, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(itemDef.name.charAt(0), 0, 3);
}

function drawTasernEnemy(e) {
  ctx.fillStyle = e.color;

  switch (e.type) {
    case 'fungal_knight':
      // Armored rectangle with shield
      ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
      ctx.fillStyle = '#554433';
      ctx.fillRect(-e.w / 2 + 3, -e.h / 2 + 3, e.w - 6, e.h - 6);
      ctx.fillStyle = '#777';
      ctx.fillRect(-3, e.h / 2 - 4, 6, 8);
      // Shield emblem
      ctx.fillStyle = '#aa8866';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'iron_turret':
      ctx.beginPath();
      ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.arc(0, 0, e.w / 3, 0, Math.PI * 2);
      ctx.fill();
      var aim = TAS.math.angle(e.x, e.y, px, py);
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(aim) * 12, Math.sin(aim) * 12);
      ctx.stroke();
      break;
    case 'spore_kamikaze':
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.moveTo(0, -e.h / 2);
      ctx.lineTo(e.w / 2, e.h / 2);
      ctx.lineTo(-e.w / 2, e.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,100,0,0.4)';
      ctx.beginPath();
      ctx.arc(0, e.h / 2, 4 + Math.sin(e.age * 0.2) * 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'rot_spinner':
      ctx.save();
      ctx.rotate(e.age * 0.1);
      ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
      ctx.restore();
      break;
    case 'blight_bat':
      // Wing shape
      ctx.beginPath();
      ctx.moveTo(0, -e.h / 2);
      ctx.lineTo(e.w / 2, e.h / 3);
      ctx.lineTo(0, e.h / 2);
      ctx.lineTo(-e.w / 2, e.h / 3);
      ctx.closePath();
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(-3, -1, 2, 0, Math.PI * 2);
      ctx.arc(3, -1, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'crystal_golem':
      // Angular crystalline body
      ctx.beginPath();
      ctx.moveTo(0, -e.h / 2);
      ctx.lineTo(e.w / 2, -e.h / 4);
      ctx.lineTo(e.w / 3, e.h / 2);
      ctx.lineTo(-e.w / 3, e.h / 2);
      ctx.lineTo(-e.w / 2, -e.h / 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#aaddff';
      ctx.globalAlpha = 0.5 + Math.sin(e.age * 0.05) * 0.3;
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'ooze_blob':
      // Blobby shape
      ctx.beginPath();
      var wobble = Math.sin(e.age * 0.08) * 2;
      ctx.ellipse(0, 0, e.w / 2 + wobble, e.h / 2 - wobble, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(-2, -3, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'void_wraith':
      // Ghostly translucent shape
      ctx.globalAlpha = 0.6 + Math.sin(e.age * 0.05) * 0.2;
      ctx.beginPath();
      ctx.moveTo(0, -e.h / 2);
      ctx.bezierCurveTo(e.w / 2, -e.h / 4, e.w / 2, e.h / 4, e.w / 4, e.h / 2);
      ctx.lineTo(-e.w / 4, e.h / 2);
      ctx.bezierCurveTo(-e.w / 2, e.h / 4, -e.w / 2, -e.h / 4, 0, -e.h / 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-2, -2, 2, 0, Math.PI * 2);
      ctx.arc(4, -2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'hive_drone':
      // Small insectoid
      ctx.beginPath();
      ctx.ellipse(0, 0, e.w / 2, e.h / 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      var wingFlap = Math.sin(e.age * 0.3) * 0.3;
      ctx.beginPath();
      ctx.ellipse(-e.w / 2, -2, 4, 8 + wingFlap * 4, wingFlap, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(e.w / 2, -2, 4, 8 + wingFlap * 4, -wingFlap, 0, Math.PI * 2);
      ctx.fill();
      break;
    default:
      // Sporecap / moldling - mushroom shape
      ctx.beginPath();
      ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(0, -2, e.w / 3, Math.PI, 0);
      ctx.fill();
      // Stem
      ctx.fillStyle = e.color;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(-3, e.w / 2 - 4, 6, 6);
      ctx.globalAlpha = 1;
  }

  // Damage flash
  if (e.hp < e.maxHp && e.age % 4 < 2) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(px, py);

  // Engine glow (uses player color)
  var glowSize = 4 + Math.sin(frame * 0.3) * 2;
  var glowColor = playerColor;
  ctx.fillStyle = glowColor;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(0, 10, glowSize + 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#44ddff';
  ctx.beginPath();
  ctx.arc(0, 10, glowSize, 0, Math.PI * 2);
  ctx.fill();

  // Engine trail particles (player color)
  if (frame % 2 === 0) {
    TAS.particles.spawn(px + TAS.math.randRange(-3, 3), py + 12, playerColor, 1, 1, { size: 1, sizeVar: 2, gravity: 0.1 });
  }

  // === BASELING SPRITE ===
  var anim = 'idle';
  if (invincible > 0) anim = 'hurt';
  else if (dragActive || mouseDown) anim = 'walk';
  if (!TAS.drawBaseling(ctx, 0, 0, 32, { flipX: false, frame: frame, anim: anim })) {
  // Ship body (baseling-shaped, colored from NFT)
  ctx.fillStyle = playerColor;
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(-10, 4);
  ctx.lineTo(-8, 10);
  ctx.lineTo(8, 10);
  ctx.lineTo(10, 4);
  ctx.closePath();
  ctx.fill();

  // Ship details (darker shade)
  ctx.fillStyle = shadeColor(playerColor, -30);
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.lineTo(-6, 3);
  ctx.lineTo(6, 3);
  ctx.closePath();
  ctx.fill();

  // Wings
  ctx.fillStyle = shadeColor(playerColor, -15);
  ctx.beginPath();
  ctx.moveTo(-10, 4);
  ctx.lineTo(-16, 8);
  ctx.lineTo(-8, 10);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(10, 4);
  ctx.lineTo(16, 8);
  ctx.lineTo(8, 10);
  ctx.closePath();
  ctx.fill();

  // Cockpit (baseling eye)
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(0, -2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(1, -3, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Player icon letter
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(playerIcon, 0, 8);
  }

  // Weapon indicator glow
  ctx.fillStyle = WEAPON_COLORS[weaponType];
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.2;
  ctx.beginPath();
  ctx.arc(0, -14, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

// Shade a hex color darker/lighter
function shadeColor(color, amount) {
  var hex = color.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = Math.max(0, Math.min(255, parseInt(hex.substr(0, 2), 16) + amount));
  var g = Math.max(0, Math.min(255, parseInt(hex.substr(2, 2), 16) + amount));
  var b = Math.max(0, Math.min(255, parseInt(hex.substr(4, 2), 16) + amount));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawMidBoss(e) {
  ctx.fillStyle = e.color;
  ctx.beginPath();
  ctx.arc(0, 0, e.w / 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, e.w / 3, 0, Math.PI * 2);
  ctx.stroke();

  for (var i = 0; i < 6; i++) {
    var a = (i / 6) * Math.PI * 2 + e.age * 0.03;
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (e.w / 2 - 4), Math.sin(a) * (e.w / 2 - 4));
    ctx.lineTo(Math.cos(a) * (e.w / 2 + 6), Math.sin(a) * (e.w / 2 + 6));
    ctx.lineTo(Math.cos(a + 0.2) * (e.w / 2 - 2), Math.sin(a + 0.2) * (e.w / 2 - 2));
    ctx.fill();
  }

  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(0, 0, 6 + Math.sin(e.age * 0.08) * 2, 0, Math.PI * 2);
  ctx.fill();

  var hpPct = e.hp / e.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(-25, -e.h / 2 - 10, 50, 5);
  ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffdd44' : '#ff4444';
  ctx.fillRect(-25, -e.h / 2 - 10, 50 * hpPct, 5);

  // Name tag
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(e.displayName || 'Mini-Boss', 0, -e.h / 2 - 14);
}

function drawBoss() {
  ctx.save();
  ctx.translate(boss.x, boss.y);

  ctx.fillStyle = boss.color;
  ctx.beginPath();
  ctx.moveTo(0, -boss.h / 2);
  ctx.bezierCurveTo(boss.w / 2, -boss.h / 2, boss.w / 2, boss.h / 4, boss.w / 3, boss.h / 2);
  ctx.lineTo(-boss.w / 3, boss.h / 2);
  ctx.bezierCurveTo(-boss.w / 2, boss.h / 4, -boss.w / 2, -boss.h / 2, 0, -boss.h / 2);
  ctx.fill();

  ctx.fillStyle = '#441100';
  ctx.beginPath();
  ctx.ellipse(0, 0, boss.w / 3, boss.h / 3, 0, 0, Math.PI * 2);
  ctx.fill();

  var coreSize = 8 + Math.sin(boss.age * 0.05) * 3;
  ctx.fillStyle = boss.coreColor;
  ctx.beginPath();
  ctx.arc(0, 0, coreSize, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(0, 0, coreSize * 0.5, 0, Math.PI * 2);
  ctx.fill();

  for (var i = 0; i < boss.parts.length; i++) {
    var part = boss.parts[i];
    if (!part.alive) continue;
    var px2 = part.offsetX;
    var py2 = part.offsetY;
    ctx.fillStyle = boss.partColor;
    ctx.beginPath();
    ctx.arc(px2, py2, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = boss.coreColor;
    ctx.beginPath();
    ctx.arc(px2, py2, 4, 0, Math.PI * 2);
    ctx.fill();
    var partHpPct = part.hp / part.maxHp;
    if (partHpPct < 1) {
      ctx.fillStyle = '#333';
      ctx.fillRect(px2 - 8, py2 - 12, 16, 3);
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(px2 - 8, py2 - 12, 16 * partHpPct, 3);
    }
  }

  ctx.strokeStyle = '#883300';
  ctx.lineWidth = 2;
  for (var i = 0; i < 4; i++) {
    var a = (i / 4) * Math.PI * 2 + boss.age * 0.01;
    var r = boss.w / 2 - 5;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r * 0.3, Math.sin(a) * r * 0.3, 8, a, a + 1);
    ctx.stroke();
  }

  var hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = '#222';
  ctx.fillRect(-boss.w / 2, -boss.h / 2 - 18, boss.w, 7);
  ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffdd44' : '#ff4444';
  ctx.fillRect(-boss.w / 2, -boss.h / 2 - 18, boss.w * hpPct, 7);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(-boss.w / 2, -boss.h / 2 - 18, boss.w, 7);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, 0, -boss.h / 2 - 22);

  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, 32);

  ctx.font = 'bold 11px monospace';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText(String(score).padStart(8, '0'), 4, 12);

  // High score
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('HI:' + String(highScore).padStart(8, '0'), 4, 23);

  // Player name + stage
  ctx.fillStyle = playerColor;
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(playerName, GW / 2, 10);
  ctx.fillStyle = '#3cacd7';
  ctx.font = '8px monospace';
  ctx.fillText('STG ' + (stage + 1) + ' - ' + STAGES[stage].name.split(' ').slice(0, 2).join(' '), GW / 2, 21);

  // Weapon indicator
  ctx.fillStyle = WEAPON_COLORS[weaponType];
  ctx.font = '7px monospace';
  ctx.fillText(WEAPON_NAMES[weaponType] + ' Lv' + weaponLevel + '/' + baseWeaponCap, GW / 2, 30);

  // Lives (baseling icons)
  ctx.textAlign = 'right';
  for (var i = 0; i < lives; i++) {
    ctx.fillStyle = playerColor;
    ctx.beginPath();
    ctx.moveTo(GW - 8 - i * 14, 8);
    ctx.lineTo(GW - 14 - i * 14, 14);
    ctx.lineTo(GW - 2 - i * 14, 14);
    ctx.closePath();
    ctx.fill();
  }

  // Bombs
  for (var i = 0; i < bombs; i++) {
    ctx.fillStyle = '#3cacd7';
    ctx.beginPath();
    ctx.arc(GW - 8 - i * 12, 24, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBuffIndicators() {
  var y = 38;
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  if (shieldActive > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.fillText('MYCELIUM ' + Math.ceil(shieldActive / 60) + 's', 4, y);
    y += 10;
  }
  if (hasteActive > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('SPORE RUSH ' + Math.ceil(hasteActive / 60) + 's', 4, y);
    y += 10;
  }
  if (luckBoostActive > 0) {
    ctx.fillStyle = '#38d973';
    ctx.fillText('GARDEN LUCK ' + Math.ceil(luckBoostActive / 60) + 's', 4, y);
    y += 10;
  }
}

function drawStageIntro() {
  var alpha = stageIntroTimer > 60 ? 1 : stageIntroTimer / 60;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 30);
  ctx.fillStyle = playerColor;
  ctx.font = 'bold 14px monospace';
  ctx.fillText(STAGES[stage].name, GW / 2, GH / 2);
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText(STAGES[stage].desc, GW / 2, GH / 2 + 25);
  ctx.globalAlpha = 1;
}

function drawStageClear() {
  var alpha = Math.min(1, stageClearTimer / 30);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, GH / 2 - 50, GW, 100);
  ctx.fillStyle = playerColor;
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 10);
  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  var bonusText = '';
  if (noDeath) bonusText += ' NO DEATH +' + Math.floor(1000 * baseScoreMult);
  if (noBomb) bonusText += ' NO BOMB +' + Math.floor(500 * baseScoreMult);
  if (bonusText) ctx.fillText(bonusText, GW / 2, GH / 2 + 15);
  ctx.globalAlpha = 1;
}

function drawTutorial() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';

  switch (tutorialStep) {
    case 0:
      ctx.fillText('HOW TO PLAY', GW / 2, 80);
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.fillText('Your baseling pilots the ship!', GW / 2, 120);
      ctx.fillText('Navigate the storm-ravaged', GW / 2, 145);
      ctx.fillText('gardens of Tasern.', GW / 2, 165);
      ctx.fillStyle = playerColor;
      // Draw mini baseling
      ctx.save();
      ctx.translate(GW / 2, 220);
      ctx.scale(2, 2);
      ctx.fillStyle = playerColor;
      ctx.beginPath();
      ctx.moveTo(0, -14); ctx.lineTo(-10, 4); ctx.lineTo(-8, 10); ctx.lineTo(8, 10); ctx.lineTo(10, 4);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(1, -3, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
      break;
    case 1:
      ctx.fillText('CONTROLS', GW / 2, 80);
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.fillText('ARROWS / WASD = Move', GW / 2, 120);
      ctx.fillText('Weapons fire automatically', GW / 2, 145);
      ctx.fillText('X / SHIFT = Spore Burst', GW / 2, 170);
      ctx.fillText('Mobile: Drag to move', GW / 2, 200);
      ctx.fillText('D-Pad + A/B buttons', GW / 2, 220);
      break;
    case 2:
      ctx.fillText('STATS', GW / 2, 80);
      ctx.fillStyle = '#aaa';
      ctx.font = '9px monospace';
      ctx.fillText('STR ' + statB.str + ' = Damage | DEX ' + statB.dex + ' = Speed', GW / 2, 110);
      ctx.fillText('CON ' + statB.con + ' = Lives (' + baseMaxLives + ') | INT ' + statB.int + ' = Score', GW / 2, 130);
      ctx.fillText('WIS ' + statB.wis + ' = Cooldown | CHA ' + statB.cha + ' = Luck', GW / 2, 150);
      ctx.fillStyle = '#f4b41b';
      ctx.font = '10px monospace';
      ctx.fillText('Stronger baselings = stronger pilot!', GW / 2, 185);
      break;
    case 3:
      ctx.fillText('SURVIVE 8 STORM ZONES', GW / 2, 80);
      ctx.fillStyle = '#aaa';
      ctx.font = '10px monospace';
      ctx.fillText('Each garden has unique spores,', GW / 2, 120);
      ctx.fillText('fungal hazards, and a boss.', GW / 2, 140);
      ctx.fillText('Collect POOP tokens to power up.', GW / 2, 165);
      ctx.fillText('Chain kills for bonus POOP!', GW / 2, 190);
      ctx.fillStyle = '#e6482e';
      ctx.fillText('Defeat the Vessel of Namaris!', GW / 2, 230);
      break;
  }

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.fillText('Press SPACE or tap to continue (' + (tutorialStep + 1) + '/4)', GW / 2, GH - 40);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  var grd = ctx.createLinearGradient(0, 0, 0, GH);
  grd.addColorStop(0, '#1a1c2c');
  grd.addColorStop(0.5, '#1a2a1a');
  grd.addColorStop(1, '#1a1c2c');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  // Floating spores background
  for (var i = 0; i < 30; i++) {
    var sx = (i * 37 + frame * 0.3) % GW;
    var sy = (i * 53 + frame * 0.5) % GH;
    var s = 1 + (i % 3);
    ctx.globalAlpha = 0.2 + (i % 5) * 0.05;
    ctx.fillStyle = [playerColor, '#38d973', '#a855f7', '#f4b41b'][i % 4];
    ctx.beginPath();
    ctx.arc(sx, sy, s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE STORM', GW / 2 + 2, 90 + 2);
  ctx.fillStyle = playerColor;
  ctx.fillText('SPORE STORM', GW / 2, 90);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '11px monospace';
  ctx.fillText('Baselings vs the Fungal Tempest', GW / 2, 115);

  // Ship preview (uses player color)
  ctx.save();
  ctx.translate(GW / 2, 185);
  ctx.scale(2, 2);
  ctx.fillStyle = playerColor;
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.lineTo(-10, 4); ctx.lineTo(-8, 10); ctx.lineTo(8, 10); ctx.lineTo(10, 4);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = shadeColor(playerColor, -30);
  ctx.beginPath();
  ctx.moveTo(0, -10); ctx.lineTo(-6, 3); ctx.lineTo(6, 3); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(0, -2, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(1, -3, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 5px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(playerIcon, 0, 8);
  var g = 3 + Math.sin(frame * 0.15) * 1.5;
  ctx.fillStyle = '#44ddff';
  ctx.beginPath(); ctx.arc(0, 12, g, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // Selected baseling rides the ship preview
  TAS.drawBaseling(ctx, GW / 2, 165, 26, { anim: 'idle', frame: frame });

  // Player info (Base blue)
  var selT = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText((selT ? selT.charName : playerName) + (selT && selT.tokenId != null ? ' #' + selT.tokenId : ''), GW / 2, 240);

  // 5 arcade stat bars in canonical colors
  if (selT && selT.stats && window.BaselingPlayer && BaselingPlayer.STAT_META) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW / 2 - 110;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = selT.stats[_keys[_i]] || 0, _bx = _x0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 255);
      ctx.fillStyle = '#222222'; ctx.fillRect(_bx, 258, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 258, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] OR TAP SHIP — SELECT BASELING', GW / 2, 278);

  // Controls info
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS/WASD = Move', GW / 2, 295);
  ctx.fillText('Auto-fire | X/SHIFT = Spore Burst', GW / 2, 310);
  ctx.fillText('Mobile: Drag + D-Pad + A/B', GW / 2, 325);

  // Weapon legend
  ctx.font = '8px monospace';
  var legendY = 350;
  ctx.fillStyle = '#ff4444'; ctx.fillText('SPORE=Spread  MYCO=Laser  HOMING=Track', GW / 2, legendY);
  ctx.fillStyle = '#ffdd44'; ctx.fillText('FUNGAL=Wave  ETHER=Plasma', GW / 2, legendY + 13);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 395);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS START', GW / 2, 430);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  ctx.fillText('8 Zones | Baseling Shmup', GW / 2, 455);
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
