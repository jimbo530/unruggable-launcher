// === DRAW HUB (OVERHEAD) ===
function drawHub() {
  // Background with subtle grid
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // NES-style tile floor pattern
  for (var hx = 0; hx < GW; hx += 16) {
    for (var hy = 0; hy < GH; hy += 16) {
      var v = seededRand(hx * 97 + hy * 31) * 0.06;
      ctx.fillStyle = 'rgba(25,25,45,' + (0.3 + v) + ')';
      px(hx, hy, 16, 16);
      // Subtle grid lines
      ctx.fillStyle = 'rgba(40,40,60,0.15)';
      px(hx, hy, 16, 1);
      px(hx, hy, 1, 16);
    }
  }

  // Hub label
  ctx.textAlign = 'center';
  ctx.fillStyle = '#444';
  ctx.font = '10px monospace';
  ctx.fillText('- GARDEN HUB -', GW / 2, 16);

  // Draw connecting paths between doors
  ctx.strokeStyle = 'rgba(60,60,80,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  for (var pi = 0; pi < HUB_DOORS.length - 1; pi++) {
    ctx.beginPath();
    ctx.moveTo(HUB_DOORS[pi].x, HUB_DOORS[pi].y);
    ctx.lineTo(HUB_DOORS[4].x, HUB_DOORS[4].y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Doors
  for (var di = 0; di < HUB_DOORS.length; di++) {
    var door = HUB_DOORS[di];
    if (!door.unlocked) {
      // Locked door (NES style)
      ctx.fillStyle = '#222';
      px(door.x - 12, door.y - 12, 24, 24);
      ctx.fillStyle = '#333';
      px(door.x - 10, door.y - 10, 20, 20);
      // Lock icon
      ctx.fillStyle = '#555';
      px(door.x - 3, door.y - 6, 6, 2);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(door.x, door.y - 4, 5, Math.PI, 0);
      ctx.stroke();
      ctx.fillStyle = '#444';
      px(door.x - 4, door.y, 8, 6);
      ctx.fillStyle = '#555';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LOCKED', door.x, door.y + 22);
    } else {
      // Open portal (NES glowing orb style)
      var glow = Math.sin(frame * 0.04 + door.realm * 1.5) * 0.2 + 0.8;
      // Outer glow
      ctx.globalAlpha = glow * 0.3;
      ctx.fillStyle = door.color;
      ctx.beginPath();
      ctx.arc(door.x, door.y, 22, 0, Math.PI * 2);
      ctx.fill();
      // Main orb
      ctx.globalAlpha = glow;
      ctx.beginPath();
      ctx.arc(door.x, door.y, 14, 0, Math.PI * 2);
      ctx.fill();
      // Inner bright spot
      ctx.globalAlpha = glow * 0.8;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(door.x - 3, door.y - 3, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Label
      ctx.fillStyle = door.color;
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(door.label, door.x, door.y + 28);

      // Key indicator
      if (bossKeys[door.realm]) {
        ctx.fillStyle = '#ffdd44';
        ctx.font = 'bold 8px monospace';
        ctx.fillText('CLEARED', door.x, door.y - 20);
      }
    }
  }

  // Player (NES pixel art)
  drawPlayerOverhead(player.x, player.y);

  // SporeDisk
  if (sporeDisk.active) {
    drawDiskTrail();
    drawDiskShape(sporeDisk.x, sporeDisk.y, 7);
  }

  // Prompt when near door
  for (var ni = 0; ni < HUB_DOORS.length; ni++) {
    var nd = HUB_DOORS[ni];
    if (nd.unlocked && TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, nd.x, nd.y) < 35) {
      var pp = Math.sin(frame * 0.06) * 0.3 + 0.7;
      ctx.globalAlpha = pp;
      ctx.fillStyle = '#ffdd44';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Z/UP TO ENTER', nd.x, nd.y - 33);
      ctx.globalAlpha = 1;
    }
  }
}

// === DRAW SIDE LEVEL ===
function drawSideLevel() {
  var r = currentRealm >= 0 ? REALMS[currentRealm] : REALMS[0];

  // Background gradient
  ctx.fillStyle = r.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Realm-specific background effects
  drawRealmBackground(r);

  // Parallax
  drawParallaxBg(r);

  // Hazards (draw behind platforms)
  drawHazards(r);

  // Platforms (NES style with pixel detail)
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    var platX = p.x - camera.x;
    if (platX + p.w < -10 || platX > GW + 10) continue;

    if (p.type === 'floor') {
      // Floor with NES-style brick pattern
      ctx.fillStyle = r.platform;
      px(platX, p.y, p.w, p.h);
      ctx.fillStyle = r.accent;
      px(platX, p.y, p.w, 2);
      // Brick lines
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      for (var bx = platX; bx < platX + p.w; bx += 16) {
        px(bx, p.y + 8, 1, p.h - 8);
        px(bx + 8, p.y + 16, 1, p.h - 16);
      }
    } else if (p.type === 'moving') {
      // Moving platform with highlight
      ctx.fillStyle = r.accent;
      px(platX, p.y, p.w, p.h);
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.3;
      px(platX + 2, p.y, p.w - 4, 2);
      ctx.globalAlpha = 1;
      // Direction indicators
      ctx.fillStyle = r.accent;
      px(platX + p.w / 2 - 2, p.y + p.h - 2, 4, 2);
    } else {
      ctx.fillStyle = r.platform;
      px(platX, p.y, p.w, p.h);
      ctx.fillStyle = r.accent;
      px(platX, p.y, p.w, 2);
      // Edge details
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      px(platX, p.y + p.h - 2, p.w, 2);
    }
  }

  // Grapple points
  for (var gi = 0; gi < grapplePoints.length; gi++) {
    var gp = grapplePoints[gi];
    var gpx = gp.x - camera.x;
    // Pulsing ring
    var gpulse = Math.sin(frame * 0.06 + gi) * 2;
    ctx.strokeStyle = '#ffaa22';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(gpx, gp.y, gp.r + gpulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ffcc44';
    ctx.beginPath();
    ctx.arc(gpx, gp.y, 3, 0, Math.PI * 2);
    ctx.fill();
    // WIS indicator: show range circle
    if (wisMod() >= 1) {
      ctx.strokeStyle = 'rgba(255,170,34,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(gpx, gp.y, calcDetectRange(), 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Doorways
  for (var dri = 0; dri < doorways.length; dri++) {
    var dw = doorways[dri];
    var dwx = dw.x - camera.x;
    if (dw.side === 'shrine') {
      // Shrine (NES temple style)
      ctx.fillStyle = '#332244';
      px(dwx, dw.y, dw.w, dw.h);
      ctx.fillStyle = '#443366';
      px(dwx + 2, dw.y + 2, dw.w - 4, dw.h - 4);
      // Roof triangle
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.moveTo(dwx + dw.w / 2, dw.y - 10);
      ctx.lineTo(dwx + dw.w + 6, dw.y + 8);
      ctx.lineTo(dwx - 6, dw.y + 8);
      ctx.fill();
      // Star on top
      ctx.fillStyle = '#ffdd44';
      drawStar(dwx + dw.w / 2, dw.y - 12, 4, 4, 2);
      ctx.fillStyle = '#ffdd44';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SPORE SHRINE', dwx + dw.w / 2, dw.y - 16);
    } else if (dw.target === 'boss') {
      // Boss door (NES skull gate)
      ctx.fillStyle = '#331111';
      px(dwx, dw.y, dw.w, dw.h);
      ctx.fillStyle = '#441818';
      px(dwx + 2, dw.y + 2, dw.w - 4, dw.h - 4);
      // Skull
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.arc(dwx + dw.w / 2, dw.y + 16, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      px(dwx + dw.w / 2 - 5, dw.y + 14, 3, 3);
      px(dwx + dw.w / 2 + 2, dw.y + 14, 3, 3);
      px(dwx + dw.w / 2 - 2, dw.y + 20, 4, 2);
      ctx.fillStyle = '#ff4444';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BOSS', dwx + dw.w / 2, dw.y - 4);
    } else {
      // Regular door
      ctx.fillStyle = '#1a1a28';
      px(dwx, dw.y, dw.w, dw.h);
      ctx.fillStyle = '#2a2a3a';
      px(dwx + 2, dw.y + 2, dw.w - 4, dw.h - 4);
      // Arrow indicator
      ctx.fillStyle = '#555';
      if (dw.side === 'left') {
        ctx.fillText('<', dwx + dw.w / 2, dw.y + dw.h / 2 + 3);
      } else {
        ctx.fillText('>', dwx + dw.w / 2, dw.y + dw.h / 2 + 3);
      }
    }
  }

  // Pickups
  for (var pki = 0; pki < pickups.length; pki++) {
    var pk = pickups[pki];
    if (!pk.active) continue;
    var pkx = pk.x - camera.x;
    var bob = Math.sin(frame * 0.06 + pk.x * 0.01) * 3;

    if (pk.type === 'hp') {
      // NES heart
      ctx.fillStyle = '#ff4488';
      px(pkx + 2, bob + pk.y + 2, 3, 2);
      px(pkx + 7, bob + pk.y + 2, 3, 2);
      px(pkx + 1, bob + pk.y + 4, 10, 2);
      px(pkx + 2, bob + pk.y + 6, 8, 2);
      px(pkx + 3, bob + pk.y + 8, 6, 1);
      px(pkx + 4, bob + pk.y + 9, 4, 1);
      px(pkx + 5, bob + pk.y + 10, 2, 1);
    } else if (pk.type === 'star') {
      ctx.fillStyle = '#ffdd44';
      drawStar(pkx + 6, pk.y + bob + 6, 5, 5, 2.5);
      // Sparkle
      if (frame % 8 < 2) {
        ctx.fillStyle = '#fff';
        px(pkx + 2, pk.y + bob + 2, 1, 1);
        px(pkx + 9, pk.y + bob + 7, 1, 1);
      }
    } else if (pk.type === 'maxhp') {
      ctx.fillStyle = '#ff88cc';
      ctx.beginPath();
      ctx.arc(pkx + 6, pk.y + bob + 6, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('+', pkx + 6, pk.y + bob + 10);
    }
  }

  // Enemies
  for (var eni = 0; eni < enemies.length; eni++) {
    var en = enemies[eni];
    if (!en.active) continue;
    var enx = en.x - camera.x;
    if (enx + en.w < -10 || enx > GW + 10) continue;
    drawEnemy(en, enx);
  }

  // Boss
  if (bossActive && bossActive.active) {
    drawBoss();
  }

  // Projectiles
  for (var pri = 0; pri < projectiles.length; pri++) {
    var pr = projectiles[pri];
    ctx.fillStyle = pr.color;
    ctx.globalAlpha = Math.min(1, pr.life);
    ctx.beginPath();
    ctx.arc(pr.x, pr.y, pr.size, 0, Math.PI * 2);
    ctx.fill();
    // Projectile trail
    ctx.globalAlpha = Math.min(0.4, pr.life * 0.3);
    ctx.beginPath();
    ctx.arc(pr.x - pr.vx * 0.02, pr.y - pr.vy * 0.02, pr.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Grapple line
  if (player.grappling && player.grappleTarget) {
    ctx.strokeStyle = '#ffaa22';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2);
    ctx.lineTo(player.grappleTarget.x - camera.x, player.grappleTarget.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // SporeDisk
  if (sporeDisk.active && !player.grappling) {
    ctx.strokeStyle = '#886644';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2);
    ctx.lineTo(sporeDisk.x, sporeDisk.y);
    ctx.stroke();
    drawDiskTrail();
    drawDiskShape(sporeDisk.x, sporeDisk.y, 8);
  }

  // Player
  if (deathTimer <= 0) {
    drawPlayerSide(player.x, player.y);
  }
}

// === REALM-SPECIFIC BACKGROUND EFFECTS ===
function drawRealmBackground(r) {
  switch (r.hazardType) {
    case 'spore':
      // Floating spore particles
      for (var i = 0; i < 15; i++) {
        var spx = seededRand(i * 17 + frame * 0.003) * GW;
        var spy = seededRand(i * 31) * GH * 0.8;
        ctx.fillStyle = 'rgba(100,200,120,0.15)';
        ctx.beginPath();
        ctx.arc(spx, spy + Math.sin(frame * 0.01 + i) * 8, 2 + seededRand(i) * 3, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'lava':
      // Ember particles rising
      for (var ei = 0; ei < 10; ei++) {
        var emx = seededRand(ei * 23) * GW;
        var emy = GH - 50 - ((frame * 0.5 + ei * 30) % (GH - 50));
        ctx.fillStyle = 'rgba(255,100,30,' + (0.1 + seededRand(ei + frame * 0.005) * 0.2) + ')';
        px(emx, emy, 2, 2);
      }
      // Lava glow at bottom
      ctx.fillStyle = 'rgba(180,40,10,0.08)';
      ctx.fillRect(0, GH - 50, GW, 20);
      break;
    case 'lightning':
      // Occasional background flash
      if (seededRand(frame * 0.003) > 0.98) {
        ctx.fillStyle = 'rgba(136,187,255,0.04)';
        ctx.fillRect(0, 0, GW, GH);
      }
      // Cloud shapes at top
      ctx.fillStyle = 'rgba(60,80,120,0.15)';
      for (var ci = 0; ci < 5; ci++) {
        var ccx = seededRand(ci * 41) * GW;
        ctx.beginPath();
        ctx.arc(ccx - camera.x * 0.1, 20 + seededRand(ci * 7) * 30, 30 + seededRand(ci) * 20, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'poison':
      // Bubbling at bottom
      for (var bi = 0; bi < 8; bi++) {
        var bbx = seededRand(bi * 19) * GW;
        var bby = GH - 35 - Math.abs(Math.sin(frame * 0.03 + bi * 2)) * 10;
        ctx.fillStyle = 'rgba(136,204,34,0.2)';
        ctx.beginPath();
        ctx.arc(bbx, bby, 2 + seededRand(bi) * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'dark':
      // Creeping darkness at edges
      var edgeAlpha = 0.15 + Math.sin(frame * 0.015) * 0.05;
      var grad = ctx.createLinearGradient(0, 0, GW * 0.3, 0);
      grad.addColorStop(0, 'rgba(30,10,40,' + edgeAlpha + ')');
      grad.addColorStop(1, 'rgba(30,10,40,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, GW * 0.3, GH);
      var grad2 = ctx.createLinearGradient(GW, 0, GW * 0.7, 0);
      grad2.addColorStop(0, 'rgba(30,10,40,' + edgeAlpha + ')');
      grad2.addColorStop(1, 'rgba(30,10,40,0)');
      ctx.fillStyle = grad2;
      ctx.fillRect(GW * 0.7, 0, GW * 0.3, GH);
      break;
  }
}

// === DRAW HAZARDS ===
function drawHazards(r) {
  for (var hi = 0; hi < hazards.length; hi++) {
    var h = hazards[hi];
    var hsx = h.x - camera.x;

    if (hsx + (h.w || 20) < -30 || hsx > GW + 30) continue;

    switch (h.type) {
      case 'spore':
        // Pulsing spore cloud
        var sa = 0.3 + Math.sin(frame * 0.04 + hi) * 0.15;
        ctx.globalAlpha = sa;
        ctx.fillStyle = '#44aa44';
        ctx.beginPath();
        ctx.arc(hsx + h.w / 2, h.y + h.h / 2, h.w / 2 + Math.sin(frame * 0.05) * 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#88cc88';
        ctx.beginPath();
        ctx.arc(hsx + h.w / 2 - 4, h.y + h.h / 2 - 2, h.w / 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;

      case 'lava':
        // Geyser base
        ctx.fillStyle = '#cc3311';
        px(hsx, h.y, h.w, h.h);
        ctx.fillStyle = '#ff6622';
        px(hsx + 2, h.y, h.w - 4, 3);
        // Eruption column
        if (h.erupting) {
          var eruptH = 50 * Math.sin(h.eruptTimer / 1.5 * Math.PI);
          ctx.fillStyle = 'rgba(255,100,30,0.6)';
          px(hsx + 2, h.y - eruptH, h.w - 4, eruptH);
          ctx.fillStyle = 'rgba(255,200,60,0.4)';
          px(hsx + 4, h.y - eruptH * 0.8, h.w - 8, eruptH * 0.6);
        }
        // Warning glow before eruption
        if (!h.erupting && h.eruptTimer > h.interval - 1.0) {
          ctx.fillStyle = 'rgba(255,100,30,' + (0.2 + Math.sin(frame * 0.1) * 0.15) + ')';
          px(hsx - 2, h.y - 5, h.w + 4, 8);
        }
        break;

      case 'lightning':
        // Warning zone
        if (h.strikeTimer > h.interval - 1.0 && !h.striking) {
          ctx.fillStyle = 'rgba(136,187,255,' + (0.05 + Math.sin(frame * 0.15) * 0.05) + ')';
          px(hsx, 0, h.w, GH - 32);
        }
        // Lightning bolt
        if (h.striking) {
          ctx.fillStyle = 'rgba(200,220,255,0.8)';
          var lx = hsx + h.w / 2;
          for (var ly = 0; ly < GH - 32; ly += 8) {
            var jitter = (seededRand(ly + frame) - 0.5) * 10;
            px(lx + jitter - 2, ly, 4, 10);
          }
          ctx.fillStyle = 'rgba(255,255,255,0.5)';
          px(lx - 1, 0, 2, GH - 32);
        }
        break;

      case 'poison':
        // Bubbling pool
        ctx.fillStyle = '#557722';
        px(hsx, h.y, h.w, h.h);
        ctx.fillStyle = '#88cc22';
        px(hsx + 1, h.y, h.w - 2, 2);
        // Bubbles
        for (var pb = 0; pb < 3; pb++) {
          var boff = Math.sin(frame * 0.04 + pb * 2 + hi) * 2;
          ctx.fillStyle = 'rgba(170,255,68,0.5)';
          ctx.beginPath();
          ctx.arc(hsx + h.w * (0.2 + pb * 0.3), h.y - 2 + boff, 2, 0, Math.PI * 2);
          ctx.fill();
        }
        break;

      case 'shadow':
        // Dark orb with pulsing aura
        var sha = 0.5 + Math.sin(frame * 0.06 + hi * 2) * 0.2;
        ctx.globalAlpha = sha * 0.4;
        ctx.fillStyle = '#8844cc';
        ctx.beginPath();
        ctx.arc(hsx + h.w / 2, h.y + h.h / 2, h.w, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = sha;
        ctx.fillStyle = '#6622aa';
        ctx.beginPath();
        ctx.arc(hsx + h.w / 2, h.y + h.h / 2, h.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#aa66ff';
        ctx.beginPath();
        ctx.arc(hsx + h.w / 2 - 2, h.y + h.h / 2 - 2, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
    }
  }
}

// === PARALLAX BACKGROUND ===
function drawParallaxBg(r) {
  var scrollFar = camera.x * 0.2;
  var scrollMid = camera.x * 0.5;

  // Far layer - mountains/structures (NES style)
  ctx.fillStyle = r.color + '22';
  for (var fi = 0; fi < 8; fi++) {
    var fbx = fi * 120 - scrollFar % 120;
    var fbh = 40 + seededRand(fi * 7 + currentRealm * 50) * 80;
    ctx.beginPath();
    ctx.moveTo(fbx, GH - 32);
    ctx.lineTo(fbx + 30, GH - 32 - fbh);
    ctx.lineTo(fbx + 60, GH - 32 - fbh * 0.7);
    ctx.lineTo(fbx + 90, GH - 32 - fbh * 0.4);
    ctx.lineTo(fbx + 120, GH - 32);
    ctx.fill();
  }

  // Mid layer - realm-specific elements
  ctx.fillStyle = r.color + '44';
  for (var mi = 0; mi < 12; mi++) {
    var mtx = mi * 80 - scrollMid % 80;
    var mth = 30 + seededRand(mi * 3 + currentRealm * 30) * 50;

    switch (r.hazardType) {
      case 'spore':
        // Mushroom shapes
        ctx.fillRect(mtx + 37, GH - 32 - mth, 6, mth);
        ctx.beginPath();
        ctx.arc(mtx + 40, GH - 32 - mth, 12, Math.PI, 0);
        ctx.fill();
        break;
      case 'lava':
        // Forge pillars
        ctx.fillRect(mtx + 35, GH - 32 - mth, 10, mth);
        ctx.fillRect(mtx + 30, GH - 32 - mth, 20, 6);
        break;
      case 'lightning':
        // Craggy peaks
        ctx.beginPath();
        ctx.moveTo(mtx + 30, GH - 32);
        ctx.lineTo(mtx + 40, GH - 32 - mth);
        ctx.lineTo(mtx + 50, GH - 32);
        ctx.fill();
        break;
      case 'poison':
        // Dead trees
        ctx.fillRect(mtx + 38, GH - 32 - mth, 4, mth);
        ctx.fillRect(mtx + 30, GH - 32 - mth + 10, 8, 3);
        ctx.fillRect(mtx + 42, GH - 32 - mth + 15, 10, 3);
        break;
      case 'dark':
        // Gothic columns
        ctx.fillRect(mtx + 36, GH - 32 - mth, 8, mth);
        ctx.fillRect(mtx + 33, GH - 32 - mth, 14, 4);
        ctx.fillRect(mtx + 33, GH - 36, 14, 4);
        break;
      default:
        ctx.fillRect(mtx + 35, GH - 32 - mth, 8, mth);
        ctx.beginPath();
        ctx.arc(mtx + 39, GH - 32 - mth, 14, 0, Math.PI * 2);
        ctx.fill();
    }
  }
}

// === DRAW PLAYER (NES PIXEL ART) ===
function drawPlayerSide(x, y) {
  if (invulnTimer > 0 && Math.floor(frame / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(x + player.w / 2, y + player.h / 2);
  if (player.facing === -1) ctx.scale(-1, 1);

  // === BASELING SPRITE ===
  var _anim = player.attacking ? 'attack' : (!player.grounded ? 'jump' : (Math.abs(player.vx) > 10 ? 'walk' : 'idle'));
  if (!TAS.drawBaseling(ctx, 0, 2, 32, { flipX: false, frame: frame, anim: _anim })) {
  // Body (baseling colored)
  ctx.fillStyle = statB.color;
  px(-6, -4, 12, 14);

  // Head
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.arc(0, -7, 6, 0, Math.PI * 2);
  ctx.fill();

  // Highlight on head
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.25;
  px(-3, -11, 3, 2);
  ctx.globalAlpha = 1;

  // Eyes (NES style)
  ctx.fillStyle = '#fff';
  px(1, -9, 3, 3);
  ctx.fillStyle = '#111';
  px(2, -8, 2, 2);

  // Mouth
  ctx.fillStyle = '#111';
  px(1, -4, 2, 1);

  // Baseling icon on body
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.icon, 0, 6);
  ctx.globalAlpha = 1;

  // Legs (animated, NES style)
  ctx.fillStyle = statB.color;
  var legAmp = Math.sin(player.animFrame * Math.PI / 2) * 3;
  px(-5, 10, 4, 6 + legAmp);
  px(1, 10, 4, 6 - legAmp);
  // Shoes
  ctx.fillStyle = '#222';
  px(-6, 15 + legAmp, 5, 2);
  px(0, 15 - legAmp, 5, 2);

  // Arm
  ctx.fillStyle = statB.color;
  if (player.attacking) {
    px(5, -2, 8, 4);
  } else {
    px(5, 0, 5, 4);
  }
  }

  // SporeDisk on arm
  if (!sporeDisk.active) {
    ctx.fillStyle = '#ffaa22';
    ctx.beginPath();
    ctx.arc(8, 1, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#cc8811';
    ctx.beginPath();
    ctx.arc(8, 1, 3, 0, Math.PI * 2);
    ctx.fill();
    // Disk spikes (NES detail)
    ctx.fillStyle = '#ffdd44';
    for (var di = 0; di < 4; di++) {
      var da = (Math.PI * 2 / 4) * di + frame * 0.1;
      px(8 + Math.cos(da) * 5 - 1, 1 + Math.sin(da) * 5 - 1, 2, 2);
    }
  }

  ctx.restore();
}

function drawPlayerOverhead(x, y) {
  if (invulnTimer > 0 && Math.floor(frame / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(x + player.w / 2, y + player.h / 2);

  // === BASELING SPRITE ===
  var _animO = player.attacking ? 'attack' : (Math.abs(player.vx) > 10 ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, 0, 0, 16, { flipX: player.facing === -1, frame: frame, anim: _animO })) {
  // Body circle (baseling colored)
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.fill();

  // Outline
  ctx.strokeStyle = '#fff';
  ctx.globalAlpha = 0.2;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(0, 0, 8, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Direction indicator
  ctx.fillStyle = '#fff';
  var dox = 0, doy = 0;
  if (player.facing === 1) dox = 6;
  else if (player.facing === -1) dox = -6;
  else if (player.facing === 2) doy = 6;
  else doy = -6;
  ctx.beginPath();
  ctx.arc(dox, doy, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  px(dox * 0.3 - 2, doy * 0.3 - 1, 2, 2);
  px(dox * 0.3 + 1, doy * 0.3 - 1, 2, 2);
  }

  // Disk on arm
  if (!sporeDisk.active) {
    ctx.fillStyle = '#ffaa22';
    ctx.beginPath();
    ctx.arc(dox * 1.3, doy * 1.3, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// === DRAW DISK (NES style) ===
function drawDiskShape(x, y, r) {
  var rot = frame * 0.2;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);

  // Outer ring
  ctx.strokeStyle = '#ffcc44';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // Inner
  ctx.fillStyle = '#ffaa22';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
  ctx.fill();

  // Spikes (NES pixel detail)
  ctx.fillStyle = '#ffdd44';
  for (var i = 0; i < 4; i++) {
    var a = (Math.PI * 2 / 4) * i;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5);
    ctx.lineTo(Math.cos(a) * (r + 3), Math.sin(a) * (r + 3));
    ctx.lineTo(Math.cos(a + 0.3) * r * 0.5, Math.sin(a + 0.3) * r * 0.5);
    ctx.fill();
  }

  // Center dot
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawDiskTrail() {
  for (var i = 0; i < sporeDisk.trail.length; i++) {
    var t = sporeDisk.trail[i];
    ctx.globalAlpha = t.life * 0.5;
    ctx.fillStyle = '#ffaa22';
    var s = 3 + t.life * 4;
    ctx.beginPath();
    ctx.arc(t.x, t.y, s, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === DRAW ENEMY (NES PIXEL ART) ===
function drawEnemy(e, ex) {
  ctx.save();
  var isHit = e.hitFlash > 0;

  // Library enemy sprite first (keyed by behavior); procedural shapes KEPT as fallback.
  var _spr = ESPR[e.behavior];
  var _sprOk = esprReady(_spr);
  if (_sprOk && !(isHit && frame % 4 < 2)) {
    drawEnemySprite(_spr, ex + e.w / 2, e.y + e.h + 2, Math.max(e.w, e.h) + 6, e.facing < 0);
  }

  // WIS: show HP bar for enemies in detect range
  if (wisMod() >= 0) {
    var detectDist = TAS.math.dist(player.x + player.w / 2, player.y + player.h / 2, ex + e.w / 2, e.y + e.h / 2);
    if (detectDist < calcDetectRange() && e.hp < e.maxHp) {
      ctx.fillStyle = '#333';
      px(ex, e.y - 6, e.w, 3);
      ctx.fillStyle = '#44cc44';
      px(ex, e.y - 6, Math.floor(e.w * (e.hp / e.maxHp)), 3);
    }
  }

  ctx.fillStyle = isHit ? '#ffffff' : e.color;

  // Draw based on behavior type (procedural fallback when sprite not loaded)
  if (!_sprOk) switch (e.behavior) {
    case 'patrol':
      // Knight/soldier type
      px(ex + 2, e.y + 4, 10, 12);
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + 4, 5, 0, Math.PI * 2);
      ctx.fill();
      // Helmet detail
      ctx.fillStyle = isHit ? '#fff' : '#222';
      px(ex + e.w / 2 - 3, e.y - 1, 6, 2);
      // Eyes
      if (!isHit) {
        ctx.fillStyle = '#ff2222';
        px(ex + e.w / 2 - 3, e.y + 2, 2, 2);
        px(ex + e.w / 2 + 1, e.y + 2, 2, 2);
      }
      // Weapon
      ctx.fillStyle = isHit ? '#fff' : '#aaa';
      px(ex + (e.facing > 0 ? 12 : -4), e.y + 5, 3, 11);
      ctx.fillStyle = isHit ? '#fff' : '#888';
      px(ex + (e.facing > 0 ? 11 : -3), e.y + 3, 5, 3);
      // Legs
      ctx.fillStyle = isHit ? '#fff' : e.color;
      var el = Math.sin(e.timer * 4) * 2;
      px(ex + 3, e.y + 16, 3, 4 + el);
      px(ex + 8, e.y + 16, 3, 4 - el);
      break;

    case 'bounce':
      // Slime type (NES blob)
      var squish = 1 + Math.sin(e.timer * 6) * 0.15;
      ctx.save();
      ctx.translate(ex + e.w / 2, e.y + e.h);
      ctx.scale(1 / squish, squish);
      ctx.beginPath();
      ctx.ellipse(0, -e.h / 2, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = isHit ? '#fff' : '#fff';
      ctx.globalAlpha = isHit ? 1 : 0.3;
      px(-e.w / 4, -e.h + 2, 3, 3);
      ctx.globalAlpha = 1;
      // Eyes
      if (!isHit) {
        ctx.fillStyle = '#111';
        px(-3, -e.h / 2, 2, 3);
        px(2, -e.h / 2, 2, 3);
      }
      ctx.restore();
      break;

    case 'shoot':
      // Archer type
      px(ex + 3, e.y + 3, 8, 13);
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + 3, 4, 0, Math.PI * 2);
      ctx.fill();
      // Hood
      ctx.fillStyle = isHit ? '#fff' : '#222';
      px(ex + 2, e.y - 2, 10, 4);
      // Eyes
      if (!isHit) {
        ctx.fillStyle = '#ffaa22';
        px(ex + e.w / 2 - 2, e.y + 2, 2, 2);
        px(ex + e.w / 2 + 1, e.y + 2, 2, 2);
      }
      // Bow
      ctx.strokeStyle = isHit ? '#fff' : '#8B4513';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ex + (e.facing > 0 ? 14 : -2), e.y + 8, 6, -Math.PI / 3, Math.PI / 3);
      ctx.stroke();
      break;

    case 'fly':
      // Bird/harpy type
      ctx.beginPath();
      ctx.ellipse(ex + e.w / 2, e.y + e.h / 2, 7, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wings (animated)
      var wingFlap = Math.sin(frame * 0.15) * 8;
      ctx.beginPath();
      ctx.moveTo(ex + 2, e.y + e.h / 2);
      ctx.lineTo(ex - 6, e.y + e.h / 2 - wingFlap);
      ctx.lineTo(ex + 4, e.y + e.h / 2 + 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex + e.w - 2, e.y + e.h / 2);
      ctx.lineTo(ex + e.w + 6, e.y + e.h / 2 - wingFlap);
      ctx.lineTo(ex + e.w - 4, e.y + e.h / 2 + 2);
      ctx.fill();
      // Eyes
      if (!isHit) {
        ctx.fillStyle = '#ff4444';
        px(ex + e.w / 2 - 3, e.y + e.h / 2 - 2, 2, 2);
        px(ex + e.w / 2 + 1, e.y + e.h / 2 - 2, 2, 2);
      }
      // Beak
      ctx.fillStyle = isHit ? '#fff' : '#ffaa22';
      px(ex + e.w / 2 - 1, e.y + e.h / 2 + 2, 2, 2);
      break;

    case 'shield':
      // Shield knight
      px(ex + 3, e.y + 3, 10, 15);
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + 3, 5, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      if (!isHit) {
        ctx.fillStyle = '#4488ff';
        px(ex + e.w / 2 - 3, e.y + 2, 2, 2);
        px(ex + e.w / 2 + 1, e.y + 2, 2, 2);
      }
      // Shield (large, NES style)
      ctx.fillStyle = isHit ? '#fff' : '#7788aa';
      var shieldX = e.facing < 0 ? ex - 3 : ex + 12;
      px(shieldX, e.y + 1, 6, 16);
      ctx.fillStyle = isHit ? '#fff' : '#99aacc';
      px(shieldX + 1, e.y + 3, 4, 4);
      // Shield emblem
      ctx.fillStyle = isHit ? '#fff' : '#aabbdd';
      px(shieldX + 2, e.y + 8, 2, 2);
      break;

    case 'float':
      // Ghost/spirit type
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.2;
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + e.h / 2, 6, 0, Math.PI * 2);
      ctx.fill();
      // Wavy bottom
      for (var wi = 0; wi < 3; wi++) {
        var wy = Math.sin(frame * 0.08 + wi * 2) * 2;
        ctx.beginPath();
        ctx.arc(ex + e.w / 2 - 4 + wi * 4, e.y + e.h / 2 + 5 + wy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Inner glow
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(ex + e.w / 2, e.y + e.h / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = '#111';
      px(ex + e.w / 2 - 3, e.y + e.h / 2 - 1, 2, 2);
      px(ex + e.w / 2 + 1, e.y + e.h / 2 - 1, 2, 2);
      ctx.globalAlpha = 1;
      break;
  }

  ctx.restore();
}

// === DRAW BOSS (NES PIXEL ART) ===
function drawBoss() {
  var b = bossActive;
  if (!b.active) return;

  ctx.save();
  var isHit = b.hitFlash > 0;

  // Library boss sprite first (bigger than mobs); procedural boss KEPT as fallback.
  var _bspr = BSPR[b.pattern];
  if (esprReady(_bspr)) {
    if (!(isHit && frame % 4 < 2)) {
      drawEnemySprite(_bspr, b.x + b.w / 2, b.y + b.h, Math.max(b.w, b.h) + 20, b.facing > 0);
    }
    ctx.restore();
    drawBossHPBar(b);
    return;
  }

  ctx.fillStyle = isHit ? '#ffffff' : b.color;

  // Main body with pixel detail
  px(b.x + 4, b.y + 12, b.w - 8, b.h - 12);

  // Head
  ctx.beginPath();
  ctx.arc(b.x + b.w / 2, b.y + 14, b.w * 0.35, 0, Math.PI * 2);
  ctx.fill();

  // Crown / horns based on pattern
  ctx.fillStyle = isHit ? '#fff' : b.accent;
  switch (b.pattern) {
    case 'stomp':
      // Mushroom cap
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2, b.y + 4, b.w * 0.4, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = isHit ? '#fff' : '#fff';
      ctx.globalAlpha = isHit ? 1 : 0.4;
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2 - 8, b.y + 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(b.x + b.w / 2 + 6, b.y + 4, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'wave':
      // Scales/segments
      for (var si = 0; si < 4; si++) {
        var segY = b.y + 20 + si * 10 + Math.sin(b.timer * 3 + si) * 3;
        ctx.fillStyle = isHit ? '#fff' : (si % 2 === 0 ? b.color : b.accent);
        px(b.x + 6, segY, b.w - 12, 8);
      }
      break;
    case 'dive':
      // Wings spread
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.h / 2);
      ctx.lineTo(b.x - 15, b.y + b.h / 4);
      ctx.lineTo(b.x + 5, b.y + b.h / 2 + 5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(b.x + b.w, b.y + b.h / 2);
      ctx.lineTo(b.x + b.w + 15, b.y + b.h / 4);
      ctx.lineTo(b.x + b.w - 5, b.y + b.h / 2 + 5);
      ctx.fill();
      break;
    case 'spit':
      // Multiple heads hint
      for (var hi = 0; hi < 3; hi++) {
        var hoff = (hi - 1) * 12 + Math.sin(b.timer + hi * 2) * 3;
        ctx.fillStyle = isHit ? '#fff' : b.color;
        ctx.beginPath();
        ctx.arc(b.x + b.w / 2 + hoff, b.y + 6, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'all':
      // Demon horns
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2 - 12, b.y + 8);
      ctx.lineTo(b.x + b.w / 2 - 16, b.y - 10);
      ctx.lineTo(b.x + b.w / 2 - 6, b.y + 8);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(b.x + b.w / 2 + 12, b.y + 8);
      ctx.lineTo(b.x + b.w / 2 + 16, b.y - 10);
      ctx.lineTo(b.x + b.w / 2 + 6, b.y + 8);
      ctx.fill();
      break;
  }

  // Eyes (glowing)
  ctx.fillStyle = isHit ? '#fff' : b.accent;
  px(b.x + b.w / 2 - 10, b.y + 10, 6, 5);
  px(b.x + b.w / 2 + 4, b.y + 10, 6, 5);
  // Pupils
  ctx.fillStyle = isHit ? '#ddd' : '#111';
  px(b.x + b.w / 2 - 8, b.y + 12, 3, 3);
  px(b.x + b.w / 2 + 6, b.y + 12, 3, 3);

  // Body accent stripes
  if (!isHit) {
    ctx.fillStyle = b.accent;
    ctx.globalAlpha = 0.4;
    px(b.x + 8, b.y + b.h * 0.5, b.w - 16, 3);
    px(b.x + 12, b.y + b.h * 0.65, b.w - 24, 2);
    px(b.x + 10, b.y + b.h * 0.8, b.w - 20, 2);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
  drawBossHPBar(b);
}

// Boss HP bar + name — always drawn on top (sprite or procedural body)
function drawBossHPBar(b) {
  var barW = 100;
  var barX = GW / 2 - barW / 2;
  ctx.fillStyle = '#111';
  px(barX - 1, GH - 22, barW + 2, 10);
  ctx.fillStyle = '#333';
  px(barX, GH - 21, barW, 8);
  var hpPct = b.hp / b.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#38d973' : hpPct > 0.25 ? '#f4b41b' : '#e6482e';
  px(barX, GH - 21, Math.floor(barW * hpPct), 8);
  // HP bar segments
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  for (var seg = 1; seg < 10; seg++) {
    px(barX + seg * 10, GH - 21, 1, 8);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, GW / 2, GH - 26);
}

// === DRAW SHRINE ===
function drawShrine() {
  ctx.fillStyle = 'rgba(16,8,32,0.94)';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative border
  ctx.strokeStyle = '#443366';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, 15, GW - 40, GH - 30);
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 1;
  ctx.strokeRect(22, 17, GW - 44, GH - 34);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('ANCIENT SPORE SHRINE', GW / 2, 40);

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Spore Gems: ' + stars + ' | CHA discount: ' + Math.floor((1 - calcShrineCostMult()) * 100) + '%', GW / 2, 58);

  for (var i = 0; i < SHRINE_ITEMS.length; i++) {
    var item = SHRINE_ITEMS[i];
    var cost = getShrineCost(item);
    var iy = 80 + i * 40;
    var selected = i === shrineCursor;

    ctx.fillStyle = selected ? '#221144' : '#121222';
    px(GW / 2 - 130, iy - 10, 260, 34);

    if (selected) {
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 1;
      ctx.strokeRect(GW / 2 - 130, iy - 10, 260, 34);
      // Selection arrow
      ctx.fillStyle = '#ffdd44';
      ctx.font = '10px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('>', GW / 2 - 125, iy + 6);
    }

    ctx.textAlign = 'left';
    ctx.fillStyle = selected ? '#ffdd44' : '#aaa';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(item.name, GW / 2 - 110, iy + 4);

    ctx.fillStyle = '#777';
    ctx.font = '9px monospace';
    ctx.fillText(item.desc, GW / 2 - 110, iy + 16);

    ctx.textAlign = 'right';
    ctx.fillStyle = stars >= cost ? '#ffdd44' : '#553322';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(cost + ' Gems', GW / 2 + 110, iy + 4);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('Z = Buy | X = Leave', GW / 2, GH - 18);
}

// === DRAW HUD (NES style) ===
function drawHUD() {
  var barH = 30;
  // HUD background
  ctx.fillStyle = 'rgba(8,4,16,0.82)';
  px(0, 0, GW, barH);
  // Bottom border
  ctx.fillStyle = '#333';
  px(0, barH - 1, GW, 1);

  // HP bar (NES segmented)
  ctx.fillStyle = '#222';
  px(4, 5, 82, 14);
  ctx.fillStyle = '#111';
  px(5, 6, 80, 12);
  var hpPct = hp / maxHp;
  var hpColor = hpPct > 0.5 ? '#38d973' : hpPct > 0.25 ? '#f4b41b' : '#e6482e';
  ctx.fillStyle = hpColor;
  px(5, 6, Math.floor(80 * hpPct), 12);
  // HP segments
  for (var hsi = 1; hsi < maxHp; hsi++) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    px(5 + Math.floor(80 * (hsi / maxHp)), 6, 1, 12);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + hp + '/' + maxHp, 7, 16);

  // Score (centered)
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, GW / 2, 14);

  // Spore Gems
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'right';
  ctx.font = '9px monospace';
  ctx.fillText(stars + ' Gems', GW - 80, 10);

  // Lives (NES circles)
  ctx.fillStyle = statB.color;
  for (var li = 0; li < lives; li++) {
    ctx.beginPath();
    ctx.arc(GW - 10 - li * 14, 14, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Tone level + bar
  ctx.fillStyle = '#88aaff';
  ctx.textAlign = 'left';
  ctx.font = '8px monospace';
  ctx.fillText('Lv' + toneLevel, 90, 14);
  var toneNeeded = toneLevel * 20 + 30;
  var tonePct = tone / toneNeeded;
  ctx.fillStyle = '#1a1a2a';
  px(90, 18, 48, 4);
  ctx.fillStyle = '#5588ff';
  px(90, 18, Math.floor(48 * tonePct), 4);

  // Disk upgrade
  ctx.fillStyle = '#ffaa22';
  ctx.textAlign = 'right';
  ctx.font = '8px monospace';
  ctx.fillText('Spore+' + diskUpgrade, GW - 80, 24);

  // Realm name + room
  if (currentRealm >= 0) {
    ctx.fillStyle = REALMS[currentRealm].accent;
    ctx.textAlign = 'center';
    ctx.font = '7px monospace';
    ctx.fillText(REALMS[currentRealm].name + ' Rm' + (currentRoom + 1), GW / 2, 26);
  }

  // Baseling name (bottom left corner)
  ctx.fillStyle = statB.color;
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  ctx.fillText(statB.name, 4, 28);
}

// === HELPERS ===
function drawStar(x, y, r, points, innerR) {
  ctx.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var a = (Math.PI * 2 / (points * 2)) * i - Math.PI / 2;
    var rad = i % 2 === 0 ? r : innerR;
    if (i === 0) ctx.moveTo(x + Math.cos(a) * rad, y + Math.sin(a) * rad);
    else ctx.lineTo(x + Math.cos(a) * rad, y + Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fill();
}

// === GAME LOOP START ===
TAS.loop.start(update, draw);

})();
</script>
