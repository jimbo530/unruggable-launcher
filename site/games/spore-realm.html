<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Realm</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT BONUSES (from NftLoader) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM unused (no water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[spore-realm] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-realm] player init failed:', e && e.message); });
}

// === STAT HELPERS ===
// STR: melee damage, disk damage, knockback
function strMod() { return Math.floor((statB.str - 10) / 2); }
// DEX: move speed, jump height, dodge (invuln frames), disk speed
function dexMod() { return Math.floor((statB.dex - 10) / 2); }
// CON: max HP, damage reduction, lives
function conMod() { return Math.floor((statB.con - 10) / 2); }
// INT: XP gain, disk range, shrine discount
function intMod() { return Math.floor((statB.int - 10) / 2); }
// WIS: enemy detection range, hidden pickup reveal, hazard awareness
function wisMod() { return Math.floor((statB.wis - 10) / 2); }
// CHA: star drops, shop prices, score multiplier
function chaMod() { return Math.floor((statB.cha - 10) / 2); }

// Derived stat calculations
function calcMaxHp() { return Math.max(3, 5 + conMod() + Math.floor(statB.level / 3)); }
function calcMoveSpeed() { return 120 + dexMod() * 8 + statB.speed * 5; }
function calcJumpVel() { return -(320 + dexMod() * 15); }
function calcDiskDmg() { return Math.max(1, DISK_BASE_DMG + diskUpgrade + strMod() + Math.floor(statB.damage * 0.5)); }
function calcDiskRange() { return DISK_BASE_RANGE + diskUpgrade * 30 + intMod() * 10; }
function calcDiskSpeed() { return DISK_BASE_SPEED + diskUpgrade * 2 + dexMod(); }
function calcInvulnTime() { return 1.5 + dexMod() * 0.15; }
function calcXpMult() { return 1.0 + intMod() * 0.1 + statB.level * 0.02; }
function calcScoreMult() { return statB.scoreMult * (1.0 + chaMod() * 0.05); }
function calcStarDropChance() { return 0.4 + chaMod() * 0.05 + statB.luck * 0.02; }
function calcShrineCostMult() { return Math.max(0.5, 1.0 - chaMod() * 0.05); }
function calcDetectRange() { return 120 + wisMod() * 15; }

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'ATTACK', c: 'PICK' } });

var TILE = 16;
var GRAVITY = 900;
var JUMP_VEL = -320;
var MOVE_SPEED = 120;
var MAX_FALL = 400;

// === SHARED ENEMY ART (art/enemies pool — sprite first, procedural fallback kept) ===
var ESPR = {}, BSPR = {};
(function loadEnemyArt() {
  function img(src) { var i = new Image(); i.src = src; return i; }
  // Mob sprites keyed by behavior (grunt/slime/archer/flyer/spirit/armored)
  ESPR = {
    patrol: img('art/enemies/enemy-myconid.png'),
    bounce: img('art/enemies/enemy-slime-mold.png'),
    shoot:  img('art/enemies/enemy-goblin.png'),
    fly:    img('art/enemies/enemy-will-o-wisp.png'),
    float:  img('art/enemies/enemy-bog-wight.png'),
    shield: img('art/enemies/enemy-shroom-knight.png')
  };
  // Realm bosses keyed by attack pattern
  BSPR = {
    stomp: img('art/enemies/enemy-troll.png'),     // Realm Mold — fungal titan
    wave:  img('art/enemies/enemy-wyrm.png'),      // Compost Wyrm
    dive:  img('art/enemies/enemy-wyrm.png'),      // Temple Fungi — drake-style diver
    spit:  img('art/enemies/enemy-spriggan.png'),  // Blightroot Mother
    all:   img('art/enemies/enemy-myconid.png')    // Ancient Sporelord
  };
})();
function esprReady(i) { return !!(i && i.complete && i.naturalWidth > 0); }
// Draw a sprite bottom-anchored at (cx, bottom), aspect preserved, flipped when facing left.
function drawEnemySprite(im, cx, bottom, size, flip) {
  var s = size / Math.max(im.naturalWidth, im.naturalHeight);
  var dw = im.naturalWidth * s, dh = im.naturalHeight * s;
  var dx = cx - dw / 2, dy = bottom - dh;
  ctx.save();
  if (flip) { ctx.translate(dx + dw, dy); ctx.scale(-1, 1); ctx.drawImage(im, 0, 0, dw, dh); }
  else { ctx.drawImage(im, dx, dy, dw, dh); }
  ctx.restore();
}

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('spore_realm_hi');
var frame = 0;
var lives = 3;
var showTutorial = true;
var tutorialTimer = 0;
var tutorialDismissed = false;

// Player
var player = null;
var camera = { x: 0, y: 0 };

// SporeDisk
var sporeDisk = null;
var DISK_BASE_RANGE = 80;
var DISK_BASE_SPEED = 8;
var DISK_BASE_DMG = 1;

// World
var currentRealm = -1;
var currentRoom = 0;
var perspective = 'overhead';
var platforms = [];
var enemies = [];
var pickups = [];
var projectiles = [];
var grapplePoints = [];
var doorways = [];
var hazards = [];
var scorePopups = [];
var shrineOpen = false;
var shrineCursor = 0;

// RPG stats
var tone = 0;
var toneLevel = 1;
var maxHp = 5;
var hp = 5;
var stars = 0;
var diskUpgrade = 0;
var bossKeys = [false, false, false, false, false];
var visitedRooms = {};

// Transition
var transTimer = 0;
var transTarget = null;
var deathTimer = 0;
var invulnTimer = 0;
var bossActive = null;
var bossPhase = 0;

// === SCORE POPUPS ===
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, vy: -40 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = '#000';
    ctx.fillText(p.text, p.x + 1, p.y + 1);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === SAVE/LOAD ===
function saveGame() {
  try {
    localStorage.setItem('spore_realm_save', JSON.stringify({
      tone: tone, toneLevel: toneLevel, maxHp: maxHp, stars: stars,
      diskUpgrade: diskUpgrade, bossKeys: bossKeys, visitedRooms: visitedRooms,
      lives: lives, score: score, tutorialDismissed: tutorialDismissed
    }));
  } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem('spore_realm_save') || localStorage.getItem('rygar_realm_save'));
    if (d) {
      tone = d.tone || 0;
      toneLevel = d.toneLevel || 1;
      maxHp = d.maxHp || 5;
      stars = d.stars || 0;
      diskUpgrade = d.diskUpgrade || 0;
      bossKeys = d.bossKeys || [false,false,false,false,false];
      visitedRooms = d.visitedRooms || {};
      lives = d.lives || 3;
      score = d.score || 0;
      if (d.tutorialDismissed) tutorialDismissed = true;
    }
  } catch(e) { console.error('Load failed:', e); }
}

// === REALM DEFINITIONS (Tasern themed) ===
var REALMS = [
  { name: 'Mycelium Glade', color: '#2a6644', bg: '#060f08', platform: '#2a4a28', accent: '#38d973',
    type: 'side', rooms: 4, hazardType: 'spore', desc: 'Ancient gardens overrun with wild sporelings' },
  { name: 'Compost Furnace', color: '#7a444a', bg: '#140606', platform: '#4a2a1a', accent: '#f4b41b',
    type: 'side', rooms: 4, hazardType: 'lava', desc: 'POOP-fueled forges burning beneath the gardens' },
  { name: 'Stormspore Peaks', color: '#334488', bg: '#06081a', platform: '#3a4a5a', accent: '#3cacd7',
    type: 'side', rooms: 4, hazardType: 'lightning', desc: 'Crackling spore clouds over fungal crags' },
  { name: 'Blightroot Marsh', color: '#446622', bg: '#080e06', platform: '#2a3a1a', accent: '#38d973',
    type: 'side', rooms: 4, hazardType: 'poison', desc: 'Toxic bogs where dead gardens fester' },
  { name: 'The Sporelord Citadel', color: '#552244', bg: '#0e060c', platform: '#3a2a3a', accent: '#a855f7',
    type: 'side', rooms: 5, hazardType: 'dark', desc: 'The Ancient Sporelord awaits within' }
];

var HUB_DOORS = [
  { x: 80, y: 80, realm: 0, label: 'Mycelium Glade', color: '#38d973', unlocked: true },
  { x: 380, y: 80, realm: 1, label: 'Compost Furnace', color: '#f4b41b', unlocked: true },
  { x: 80, y: 220, realm: 2, label: 'Stormspore Peaks', color: '#3cacd7', unlocked: true },
  { x: 380, y: 220, realm: 3, label: 'Blightroot Marsh', color: '#38d973', unlocked: true },
  { x: 230, y: 150, realm: 4, label: 'Sporelord Citadel', color: '#a855f7', unlocked: false }
];

// === SHRINE ITEMS (CHA discount applied) ===
var SHRINE_ITEMS = [
  { name: 'Garden Seed', desc: '+1 Max HP', baseCost: 30, action: function(){ maxHp = Math.min(12 + conMod(), maxHp + 1); hp = maxHp; } },
  { name: 'POOP Token', desc: '+1 Life', baseCost: 50, action: function(){ lives = Math.min(9, lives + 1); } },
  { name: 'Mycelium Shield', desc: 'Extended invuln', baseCost: 20, action: function(){ invulnTimer = 5 + conMod(); } },
  { name: 'Spore Core', desc: 'Upgrade sporeDisk', baseCost: 80, action: function(){ diskUpgrade = Math.min(3, diskUpgrade + 1); } },
  { name: 'Fungal Sight', desc: 'Reveal pickups', baseCost: 40, action: function(){ revealHidden(); } }
];

function getShrineCost(item) {
  return Math.max(5, Math.floor(item.baseCost * calcShrineCostMult()));
}

function revealHidden() {
  for (var i = 0; i < pickups.length; i++) {
    if (pickups[i].hidden) {
      pickups[i].hidden = false;
      pickups[i].active = true;
      TAS.particles.spawn(pickups[i].x, pickups[i].y, '#ffdd44', 8, 2);
    }
  }
}

// === PLAYER INIT ===
function createPlayer(x, y) {
  return {
    x: x, y: y, w: 14, h: 20,
    vx: 0, vy: 0,
    facing: 1,
    grounded: false,
    attacking: false,
    grappling: false,
    grappleTarget: null,
    animFrame: 0,
    animTimer: 0,
    stepTimer: 0
  };
}

// === DISKARMOR ===
function createSporeDisk() {
  return {
    active: false,
    x: 0, y: 0,
    angle: 0,
    dist: 0,
    returning: false,
    maxDist: calcDiskRange(),
    speed: calcDiskSpeed(),
    dmg: calcDiskDmg(),
    trail: [],
    hitEnemies: []
  };
}

// === LEVEL GENERATION ===
function generateSideRoom(realm, room) {
  platforms = [];
  enemies = [];
  pickups = [];
  grapplePoints = [];
  doorways = [];
  hazards = [];
  scorePopups = [];
  var r = REALMS[realm];
  var seed = realm * 100 + room * 13;

  // Floor
  platforms.push({ x: 0, y: GH - 32, w: GW * 2, h: 32, type: 'floor' });

  // Generate platforms with realm-specific style
  var numPlats = 6 + room * 2;
  for (var i = 0; i < numPlats; i++) {
    var px = 60 + seededRand(seed + i * 7) * (GW * 2 - 160);
    var py = 80 + seededRand(seed + i * 11) * (GH - 160);
    var pw = 40 + seededRand(seed + i * 3) * 60;
    platforms.push({ x: px, y: py, w: pw, h: 12, type: 'platform' });
  }

  // Moving platforms in later rooms (DEX helps time jumps)
  if (room >= 2) {
    var numMoving = 1 + Math.floor(seededRand(seed + 77) * 2);
    for (var mi = 0; mi < numMoving; mi++) {
      platforms.push({
        x: 200 + seededRand(seed + mi * 31) * (GW - 300),
        y: 100 + seededRand(seed + mi * 37) * 100,
        w: 48, h: 10, type: 'moving',
        startX: 200 + seededRand(seed + mi * 31) * (GW - 300),
        moveRange: 60 + seededRand(seed + mi * 41) * 40,
        moveSpeed: 30 + seededRand(seed + mi * 43) * 20,
        moveTimer: seededRand(seed + mi * 47) * Math.PI * 2
      });
    }
  }

  // Grapple points for later rooms
  if (room >= 2) {
    var numGrapple = 2 + Math.floor(seededRand(seed + 99) * 2);
    for (var gi = 0; gi < numGrapple; gi++) {
      grapplePoints.push({
        x: 100 + seededRand(seed + gi * 23) * (GW * 2 - 200),
        y: 40 + seededRand(seed + gi * 17) * 80,
        r: 8
      });
    }
  }

  // Realm-specific hazards
  generateHazards(realm, room, seed);

  // Enemies (Tasern themed)
  var numEnemies = 3 + room * 2 + realm;
  for (var ei = 0; ei < numEnemies; ei++) {
    var ex = 100 + seededRand(seed + ei * 19) * (GW * 2 - 200);
    var ey = GH - 52;
    var etype = pickEnemyType(realm, seed + ei);
    enemies.push(createEnemy(ex, ey, etype, realm));
  }

  // Pickups
  if (seededRand(seed + 200) > 0.5) {
    pickups.push({ x: 200 + seededRand(seed + 201) * 300, y: GH - 80, type: 'hp', active: true });
  }
  if (seededRand(seed + 210) > 0.6) {
    pickups.push({ x: 100 + seededRand(seed + 211) * 400, y: 100 + seededRand(seed + 212) * 100,
      type: 'star', active: true, amount: 5 + Math.floor(seededRand(seed + 213) * 10) });
  }
  if (room === 2 && seededRand(seed + 220) > 0.4) {
    pickups.push({ x: GW, y: GH - 80, type: 'maxhp', active: true });
  }

  // WIS-revealed hidden pickups
  var numHidden = 1 + Math.floor(seededRand(seed + 300) * 2);
  for (var hi = 0; hi < numHidden; hi++) {
    var revealed = wisMod() >= 2 || (wisMod() >= 0 && seededRand(seed + 310 + hi) < 0.3 + wisMod() * 0.15);
    pickups.push({
      x: 80 + seededRand(seed + 311 + hi) * (GW * 2 - 160),
      y: 60 + seededRand(seed + 312 + hi) * (GH - 140),
      type: 'star', active: revealed, hidden: !revealed,
      amount: 8 + Math.floor(seededRand(seed + 313 + hi) * 12)
    });
  }

  // Doorways
  doorways.push({ x: 0, y: GH - 64, w: 16, h: 32, target: room > 0 ? room - 1 : -1, side: 'left' });
  if (room < r.rooms - 1) {
    doorways.push({ x: GW * 2 - 16, y: GH - 64, w: 16, h: 32, target: room + 1, side: 'right' });
  } else {
    doorways.push({ x: GW * 2 - 32, y: GH - 80, w: 32, h: 48, target: 'boss', side: 'right' });
  }

  // Shrine in room 1
  if (room === 1) {
    doorways.push({ x: GW * 0.8, y: GH - 80, w: 24, h: 48, target: 'shrine', side: 'shrine' });
  }

  visitedRooms[realm + '_' + room] = true;
}

// === HAZARD GENERATION ===
function generateHazards(realm, room, seed) {
  var r = REALMS[realm];
  var numHazards = 2 + room + Math.floor(seededRand(seed + 500) * 3);

  for (var i = 0; i < numHazards; i++) {
    var hx = 100 + seededRand(seed + 501 + i * 7) * (GW * 2 - 200);
    var hy = GH - 48;

    switch (r.hazardType) {
      case 'spore':
        // Spore clouds - slow + damage over time
        hazards.push({ x: hx, y: hy - 20 - seededRand(seed + 510 + i) * 60, w: 30, h: 24,
          type: 'spore', timer: seededRand(seed + 511 + i) * 3, dmg: 1, interval: 2.5,
          color: '#44aa44', activeTimer: 0 });
        break;
      case 'lava':
        // Lava geysers - periodic eruption
        hazards.push({ x: hx, y: GH - 32, w: 20, h: 8,
          type: 'lava', timer: seededRand(seed + 520 + i) * 4, dmg: 2, interval: 3.0,
          color: '#ff4422', eruptTimer: 0, erupting: false });
        break;
      case 'lightning':
        // Lightning strikes at random positions
        hazards.push({ x: hx, y: 0, w: 16, h: GH - 32,
          type: 'lightning', timer: seededRand(seed + 530 + i) * 5, dmg: 2, interval: 4.0,
          color: '#88bbff', strikeTimer: 0, striking: false, warningTimer: 0 });
        break;
      case 'poison':
        // Poison pools on floor
        var poolW = 40 + seededRand(seed + 540 + i) * 40;
        hazards.push({ x: hx, y: GH - 36, w: poolW, h: 6,
          type: 'poison', dmg: 1, interval: 1.0, color: '#88cc22', contactTimer: 0 });
        break;
      case 'dark':
        // Shadow orbs that track player slowly
        hazards.push({ x: hx, y: 100 + seededRand(seed + 550 + i) * 100, w: 14, h: 14,
          type: 'shadow', dmg: 2, speed: 20 + room * 5, color: '#8844cc',
          targetX: hx, targetY: 150 });
        break;
    }
  }
}

function generateOverheadHub() {
  platforms = [];
  enemies = [];
  pickups = [];
  grapplePoints = [];
  doorways = [];
  hazards = [];
  scorePopups = [];
  perspective = 'overhead';
  currentRealm = -1;
  currentRoom = 0;
}

function generateBossRoom(realm) {
  platforms = [];
  enemies = [];
  pickups = [];
  grapplePoints = [];
  doorways = [];
  hazards = [];
  scorePopups = [];

  // Arena floor
  platforms.push({ x: 0, y: GH - 32, w: GW, h: 32, type: 'floor' });
  platforms.push({ x: 0, y: GH - 80, w: 60, h: 12, type: 'platform' });
  platforms.push({ x: GW - 60, y: GH - 80, w: 60, h: 12, type: 'platform' });
  platforms.push({ x: GW / 2 - 30, y: GH - 130, w: 60, h: 12, type: 'platform' });

  // Extra platform for dex-heavy players
  if (dexMod() >= 1) {
    platforms.push({ x: GW / 2 - 20, y: GH - 180, w: 40, h: 10, type: 'platform' });
  }

  bossActive = createBoss(realm);
  bossPhase = 0;
}

// === TASERN ENEMIES ===
function pickEnemyType(realm, seed) {
  var realmEnemies = [
    ['sporeling', 'mycelium_crawler', 'fungal_archer', 'spore_harpy'],
    ['compost_soldier', 'magma_slime', 'furnace_archer', 'cinder_bat'],
    ['storm_spore', 'ice_slime', 'wind_archer', 'sky_harpy', 'thunder_shield'],
    ['bog_fungus', 'poison_slime', 'root_archer', 'marsh_spirit', 'blight_shield'],
    ['shadow_spore', 'void_slime', 'dark_archer', 'spore_harpy_dark', 'iron_shield', 'wraith']
  ];
  var pool = realmEnemies[realm] || realmEnemies[0];
  var available = Math.min(2 + Math.floor(seed * 0.001) % 3, pool.length);
  return pool[Math.floor(seededRand(seed) * available)];
}

function createEnemy(x, y, type, realm) {
  // Base enemy definitions by type pattern
  var baseDefs = {
    sporeling:          { w: 14, h: 16, hp: 2, speed: 35, color: '#44aa55', score: 10, behavior: 'patrol' },
    mycelium_crawler:   { w: 18, h: 10, hp: 1, speed: 45, color: '#338844', score: 8, behavior: 'bounce' },
    fungal_archer:      { w: 12, h: 18, hp: 2, speed: 20, color: '#66aa44', score: 15, behavior: 'shoot' },
    spore_harpy:        { w: 16, h: 14, hp: 2, speed: 55, color: '#55cc66', score: 20, behavior: 'fly' },
    compost_soldier:    { w: 14, h: 18, hp: 3, speed: 40, color: '#7a444a', score: 12, behavior: 'patrol' },
    ember_soldier:      { w: 14, h: 18, hp: 3, speed: 40, color: '#cc4422', score: 12, behavior: 'patrol' },
    magma_slime:        { w: 16, h: 12, hp: 2, speed: 30, color: '#ff6622', score: 10, behavior: 'bounce' },
    furnace_archer:     { w: 12, h: 18, hp: 2, speed: 20, color: '#7a444a', score: 15, behavior: 'shoot' },

// === UTILITY ===
function seededRand(s) {
  s = Math.sin(s * 9731.37) * 43758.5453;
  return s - Math.floor(s);
}

function getToneBonus() {
  return Math.floor(toneLevel * 0.5);
}

function addTone(amount) {
  var xpAmount = Math.floor(amount * calcXpMult());
  tone += xpAmount;
  var needed = toneLevel * 20 + 30;
  if (tone >= needed) {
    tone -= needed;
    toneLevel++;
    maxHp = calcMaxHp();
    hp = maxHp;
    TAS.audio.playTone(880, 0.3, 'sine', 0.08);
    TAS.audio.playTone(1100, 0.2, 'sine', 0.06);
    TAS.particles.spawn(player.x + player.w / 2, player.y, '#ffdd44', 20, 4, { gravity: -1 });
    addScorePopup(player.x + player.w / 2, player.y - 20, 'LEVEL UP!', '#ffdd44');
    TAS.fx.flash('#ffdd44', 0.3);
  }
}

// === NES PIXEL ART DRAWING HELPERS ===
// Draw a filled pixel-art rectangle (snapped to pixel grid)
function px(x, y, w, h) {
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// Draw pixel-art eyes (NES style)
function drawPixelEyes(x, y, facing, color) {
  var eyeOff = facing === -1 ? -3 : 1;
  ctx.fillStyle = '#fff';
  px(x + eyeOff, y, 2, 2);
  px(x + eyeOff + 3, y, 2, 2);
  ctx.fillStyle = color || '#111';
  px(x + eyeOff + (facing === 1 ? 1 : 0), y + 1, 1, 1);
  px(x + eyeOff + 3 + (facing === 1 ? 1 : 0), y + 1, 1, 1);
}

// === START GAME ===
function startGame() {
  state = 'playing';
  loadGame();
  maxHp = calcMaxHp();
  hp = maxHp;
  lives = Math.max(3, 3 + statB.lives + Math.floor(conMod() / 2));
  player = createPlayer(GW / 2, GH / 2);
  sporeDisk = createSporeDisk();
  generateOverheadHub();
  TAS.particles.clear();
  scorePopups = [];

  if (!tutorialDismissed) {
    showTutorial = true;
    tutorialTimer = 0;
  } else {
    showTutorial = false;
  }
}

function enterRealm(realm) {
  currentRealm = realm;
  currentRoom = 0;
  perspective = 'side';
  player = createPlayer(40, GH - 60);
  player.vy = 0;
  sporeDisk = createSporeDisk();
  bossActive = null;
  generateSideRoom(realm, 0);
  camera.x = 0;
  transTimer = 0.5;
}

function enterRoom(room) {
  if (room === -1) {
    generateOverheadHub();
    player = createPlayer(GW / 2, GH / 2);
    perspective = 'overhead';
    currentRealm = -1;
    saveGame();
    return;
  }
  if (room === 'boss') {
    generateBossRoom(currentRealm);
    player = createPlayer(40, GH - 60);
    camera.x = 0;
    transTimer = 0.8;
    return;
  }
  if (room === 'shrine') {
    shrineOpen = true;
    shrineCursor = 0;
    return;
  }
  currentRoom = room;
  generateSideRoom(currentRealm, room);
  player = createPlayer(40, GH - 60);
  player.vy = 0;
  camera.x = 0;
  transTimer = 0.5;
}

function playerDie() {
  lives--;
  TAS.fx.shake(10, 0.8);
  TAS.fx.flash('#ff0000', 0.5);
  TAS.audio.playTone(200, 0.4, 'sawtooth', 0.12, 50);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 25, 4);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, statB.color, 15, 3, { gravity: 2 });
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('spore_realm_hi', highScore);
    }
    saveGame();
  } else {
    deathTimer = 1.5;
    hp = maxHp;
  }
}

function defeatBoss(realm) {
  bossKeys[realm] = true;
  var bossScore = Math.floor(500 * calcScoreMult());
  score += bossScore;
  addTone(50);
  TAS.fx.shake(14, 0.75);
  TAS.fx.flash('#ffdd44', 0.8);
  TAS.audio.playTone(440, 0.15, 'square', 0.1);
  TAS.audio.playTone(660, 0.15, 'square', 0.1);
  TAS.audio.playTone(880, 0.3, 'square', 0.1);
  TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y + bossActive.h / 2, bossActive.accent, 50, 6, { gravity: 1 });
  TAS.particles.spawn(bossActive.x + bossActive.w / 2, bossActive.y, '#ffdd44', 30, 4, { gravity: -1 });
  addScorePopup(bossActive.x + bossActive.w / 2, bossActive.y, '+' + bossScore, '#ffdd44');

  // Victory check: defeated Ancient Sporelord
  if (realm === 4) {
    bossActive = null;
    saveGame();
    setTimeout(function(){
      state = 'victory';
    }, 2000);
    return;
  }

  // Unlock Sporelord Citadel if 4 keys
  if (bossKeys[0] && bossKeys[1] && bossKeys[2] && bossKeys[3]) {
    HUB_DOORS[4].unlocked = true;
  }

  bossActive = null;
  saveGame();

  setTimeout(function(){
    generateOverheadHub();
    player = createPlayer(GW / 2, GH / 2);
    perspective = 'overhead';
    currentRealm = -1;
  }, 2000);
}

// === DISKARMOR ATTACK ===
function throwDisk() {
  if (sporeDisk.active) return;
  sporeDisk.active = true;
  sporeDisk.returning = false;
  sporeDisk.dist = 0;
  sporeDisk.maxDist = calcDiskRange();
  sporeDisk.speed = calcDiskSpeed();
  sporeDisk.dmg = calcDiskDmg();
  sporeDisk.trail = [];
  sporeDisk.hitEnemies = [];
  sporeDisk.x = player.x + player.w / 2;
  sporeDisk.y = player.y + player.h / 2;

  if (perspective === 'side') {
    sporeDisk.angle = player.facing === 1 ? 0 : Math.PI;
    sporeDisk.angle += (player.facing === 1 ? -0.3 : 0.3);
  } else {
    if (player.facing === 1) sporeDisk.angle = 0;
    else if (player.facing === -1) sporeDisk.angle = Math.PI;
    else if (player.facing === 2) sporeDisk.angle = Math.PI / 2;
    else sporeDisk.angle = -Math.PI / 2;
  }

  player.attacking = true;
  TAS.audio.playTone(300, 0.1, 'sawtooth', 0.08, 600);
}

function grappleTo(point) {
  player.grappling = true;
  player.grappleTarget = point;
  sporeDisk.active = true;
  sporeDisk.x = point.x;
  sporeDisk.y = point.y;
  TAS.audio.playTone(400, 0.15, 'square', 0.06, 800);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial overlay
  if (showTutorial) {
    tutorialTimer += dt;
    if (TAS.input.keys['KeyX'] || TAS.input.keys['Space'] || TAS.input.touch.b || tutorialTimer > 8) {
      showTutorial = false;
      tutorialDismissed = true;
      saveGame();
    }
    return;
  }

  // Transition fade
  if (transTimer > 0) {
    transTimer -= dt;
    return;
  }

  // Death respawn
  if (deathTimer > 0) {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      if (currentRealm >= 0) {
        generateSideRoom(currentRealm, currentRoom);
        player = createPlayer(40, GH - 60);
        camera.x = 0;
      } else {
        player = createPlayer(GW / 2, GH / 2);
      }
    }
    return;
  }

  // Invuln timer
  if (invulnTimer > 0) invulnTimer -= dt;

  // Shrine
  if (shrineOpen) {
    updateShrine(dt);
    return;
  }

  // Player update
  if (perspective === 'overhead') {
    updateOverhead(dt);
  } else {
    updateSide(dt);
  }

  // Update moving platforms
  updateMovingPlatforms(dt);

  // SporeDisk update
  updateSporeDisk(dt);

  // Enemies
  updateEnemies(dt);

  // Boss
  if (bossActive) updateBoss(dt);

  // Hazards
  updateHazards(dt);

  // Pickups
  updatePickups(dt);

  // Check doorways
  checkDoorways();

  // Projectiles
  updateProjectiles(dt);
}

// === MOVING PLATFORMS ===
function updateMovingPlatforms(dt) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type !== 'moving') continue;
    p.moveTimer += dt * p.moveSpeed * 0.05;
    p.x = p.startX + Math.sin(p.moveTimer) * p.moveRange;
  }
}

// === OVERHEAD MOVEMENT (HUB) ===
function updateOverhead(dt) {
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var mx = 0, my = 0;

  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { mx = -1; player.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { mx = 1; player.facing = 1; }
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) { my = -1; player.facing = -2; }
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) { my = 1; player.facing = 2; }

  var spd = calcMoveSpeed() * 1.2;
  player.x += mx * spd * dt;
  player.y += my * spd * dt;
  player.x = TAS.math.clamp(player.x, 10, GW - player.w - 10);
  player.y = TAS.math.clamp(player.y, 30, GH - player.h - 10);

  // Animate
  if (mx !== 0 || my !== 0) {
    player.animTimer += dt;
    if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  }

  // Attack: X key = sporeDisk (NES B button)
  if ((keys['KeyX'] || keys['Space'] || touch.b) && !sporeDisk.active) {
    throwDisk();
  }

  // Check hub doors: Z key or up (NES A button = confirm/enter)
  for (var di = 0; di < HUB_DOORS.length; di++) {
    var door = HUB_DOORS[di];
    if (door.unlocked && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, door.x - 16, door.y - 16, 32, 32)) {
      if (keys['KeyZ'] || keys['ArrowUp'] || keys['KeyW'] || touch.up || touch.a) {
        enterRealm(door.realm);
        return;
      }
    }
  }
}

// === SIDE SCROLLING MOVEMENT ===
function updateSide(dt) {
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  // Horizontal movement (DEX scales speed)
  var mx = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) { mx = -1; player.facing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) { mx = 1; player.facing = 1; }

  player.vx = mx * calcMoveSpeed();

  // Jump: Z or Space (NES A button)
  if ((keys['ArrowUp'] || keys['KeyZ'] || keys['Space'] || touch.a) && player.grounded) {
    player.vy = calcJumpVel();
    player.grounded = false;
    TAS.audio.playTone(250, 0.08, 'square', 0.05, 400);
  }

  // Gravity
  if (!player.grappling) {
    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }

  // Grapple
  if (player.grappling && player.grappleTarget) {
    var gx = player.grappleTarget.x;
    var gy = player.grappleTarget.y;
    var gdx = gx - (player.x + player.w / 2);
    var gdy = gy - (player.y + player.h / 2);
    var gd = Math.sqrt(gdx * gdx + gdy * gdy);
    if (gd < 10) {
      player.grappling = false;
      player.grappleTarget = null;
      player.vy = -200 - dexMod() * 20;
      sporeDisk.active = false;
    } else {
      var grappleSpd = 300 + dexMod() * 20;
      player.vx = (gdx / gd) * grappleSpd;
      player.vy = (gdy / gd) * grappleSpd;
    }
  }

  // Move player
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Platform collision
  player.grounded = false;
  for (var pi = 0; pi < platforms.length; pi++) {
    var p = platforms[pi];
    var platX = p.x - camera.x;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, platX, p.y, p.w, p.h)) {
      if (player.vy > 0 && player.y + player.h - player.vy * dt <= p.y + 4) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
        // Ride moving platforms
        if (p.type === 'moving') {
          var nextX = p.startX + Math.sin(p.moveTimer + dt * p.moveSpeed * 0.05) * p.moveRange;
          player.x += nextX - p.x;
        }
      } else if (player.vy < 0 && p.type === 'floor') {
        player.y = p.y + p.h;
        player.vy = 0;
      }
      if (p.type === 'floor') {
        if (player.vx > 0 && player.x + player.w > platX && player.x < platX) {
          player.x = platX - player.w;
        } else if (player.vx < 0 && player.x < platX + p.w && player.x + player.w > platX + p.w) {
          player.x = platX + p.w;
        }
      }
    }
  }

  // Fall death
  if (player.y > GH + 50) {
    playerDie();
    return;
  }

  // Screen bounds
  player.x = Math.max(0, player.x);
  if (player.x > GW * 2 - player.w) player.x = GW * 2 - player.w;

  // Camera follow
  var targetCamX = player.x - GW * 0.4;
  camera.x = TAS.math.lerp(camera.x, Math.max(0, Math.min(targetCamX, GW)), dt * 4);

  // Attack: X key = sporeDisk (NES B button)
  if ((keys['KeyX'] || touch.b) && !sporeDisk.active && !player.grappling) {
    throwDisk();
  }

  // Grapple input (hold up + attack near grapple point)
  if ((keys['ArrowUp'] || touch.up) && !sporeDisk.active) {
    for (var gpi = 0; gpi < grapplePoints.length; gpi++) {
      var gp = grapplePoints[gpi];
      var gpScreenX = gp.x - camera.x;
      var gpDist = TAS.math.dist(player.x + player.w / 2, player.y, gpScreenX, gp.y);
      // WIS increases grapple detection range
      if (gpDist < calcDetectRange()) {
        grappleTo(gp);
        break;
      }
    }
  }

  // Animation with step sounds
  if (Math.abs(player.vx) > 10) {
    player.animTimer += dt;
    if (player.animTimer > 0.12) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 4;
    }
    player.stepTimer += dt;
    if (player.grounded && player.stepTimer > 0.25) {
      player.stepTimer = 0;
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h, '#888', 2, 1);
    }
  } else {
    player.animFrame = 0;
  }
}

// === DISKARMOR UPDATE ===
function updateSporeDisk(dt) {
  if (!sporeDisk.active || player.grappling) return;

  var speed = sporeDisk.speed * 60 * dt;

  if (!sporeDisk.returning) {
    sporeDisk.dist += speed;
    sporeDisk.x = player.x + player.w / 2 + Math.cos(sporeDisk.angle) * sporeDisk.dist;
    sporeDisk.y = player.y + player.h / 2 + Math.sin(sporeDisk.angle) * sporeDisk.dist;

    var progress = sporeDisk.dist / sporeDisk.maxDist;
    var arcOffset = Math.sin(progress * Math.PI) * 30;
    if (perspective === 'side') {
      sporeDisk.y -= arcOffset;
    }

    if (sporeDisk.dist >= sporeDisk.maxDist) {
      sporeDisk.returning = true;
    }
  } else {
    var rdx = (player.x + player.w / 2) - sporeDisk.x;
    var rdy = (player.y + player.h / 2) - sporeDisk.y;
    var rd = Math.sqrt(rdx * rdx + rdy * rdy);
    if (rd < 15) {
      sporeDisk.active = false;
      player.attacking = false;
      sporeDisk.trail = [];
      return;
    }
    var retSpeed = speed * 1.4;
    sporeDisk.x += (rdx / rd) * retSpeed;
    sporeDisk.y += (rdy / rd) * retSpeed;
  }

  // Trail
  sporeDisk.trail.push({ x: sporeDisk.x, y: sporeDisk.y, life: 1.0 });
  if (sporeDisk.trail.length > 12) sporeDisk.trail.shift();
  for (var ti = sporeDisk.trail.length - 1; ti >= 0; ti--) {
    sporeDisk.trail[ti].life -= dt * 4;
    if (sporeDisk.trail[ti].life <= 0) sporeDisk.trail.splice(ti, 1);
  }

  // Hit enemies (STR scales damage)
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.active) continue;
    if (sporeDisk.hitEnemies.indexOf(e) >= 0) continue;
    var dScreenX = sporeDisk.x;
    var eScreenX = e.x - (perspective === 'side' ? camera.x : 0);
    if (TAS.hit.circleOverlap(dScreenX, sporeDisk.y, 8, eScreenX + e.w / 2, e.y + e.h / 2, Math.max(e.w, e.h) / 2)) {
      if (e.shieldUp && ((player.facing === 1 && e.facing === -1) || (player.facing === -1 && e.facing === 1))) {
        TAS.audio.playTone(200, 0.1, 'square', 0.06);
        TAS.fx.shake(2, 0.95);
        sporeDisk.hitEnemies.push(e);
        continue;
      }
      hitEnemy(e, sporeDisk.dmg);
      sporeDisk.hitEnemies.push(e);
    }
  }

  // Hit boss
  if (bossActive && bossActive.active) {
    var bScreenX = bossActive.x;
    if (TAS.hit.rectOverlap(sporeDisk.x - 8, sporeDisk.y - 8, 16, 16, bScreenX, bossActive.y, bossActive.w, bossActive.h)) {
      hitBoss(sporeDisk.dmg);
    }
  }
}

function hitEnemy(e, dmg) {
  e.hp -= dmg;
  e.hitFlash = 0.15;
  TAS.audio.playTone(180, 0.08, 'square', 0.06);
  TAS.particles.spawn(e.x + e.w / 2 - (perspective === 'side' ? camera.x : 0), e.y + e.h / 2, '#ffffff', 6, 2);

  // STR knockback
  if (strMod() > 0) {
    e.x += player.facing * strMod() * 8;
  }

  if (e.hp <= 0) {
    e.active = false;
    var killScore = Math.floor(e.score * calcScoreMult());
    score += killScore;
    addTone(e.score / 2);
    var screenX = e.x + e.w / 2 - (perspective === 'side' ? camera.x : 0);
    TAS.particles.spawn(screenX, e.y + e.h / 2, e.color, 15, 3, { gravity: 2 });
    TAS.particles.spawn(screenX, e.y, '#ffdd44', 8, 2, { gravity: -1 });
    TAS.audio.playTone(300, 0.12, 'square', 0.08, 100);
    addScorePopup(screenX, e.y, '+' + killScore, '#ffdd44');

    // CHA + luck improves star drops
    if (Math.random() < calcStarDropChance()) {
      var dropAmount = 3 + Math.floor(Math.random() * 5) + chaMod();
      pickups.push({ x: e.x, y: e.y, type: 'star', active: true, amount: Math.max(1, dropAmount) });
    }
  }
}

function hitBoss(dmg) {
  bossActive.hp -= dmg;
  bossActive.hitFlash = 0.2;
  TAS.fx.shake(5, 0.88);
  TAS.audio.playTone(150, 0.1, 'sawtooth', 0.08);
  TAS.particles.spawn(sporeDisk.x, sporeDisk.y, '#ffffff', 10, 3);
  addScorePopup(sporeDisk.x, sporeDisk.y - 10, '-' + dmg, '#ff8844');

  // Phase transitions
  if (bossActive.hp <= bossActive.maxHp * 0.5 && bossActive.phase === 0) {
    bossActive.phase = 1;
    bossActive.speed *= 1.5;
    TAS.fx.flash('#ff4444', 0.4);
    TAS.fx.shake(8, 0.82);
    addScorePopup(bossActive.x + bossActive.w / 2, bossActive.y - 20, 'ENRAGED!', '#ff4444');
  }

  if (bossActive.hp <= 0) {
    bossActive.active = false;
    defeatBoss(currentRealm);
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (!e.active) continue;
    e.timer += dt;
    if (e.hitFlash > 0) e.hitFlash -= dt;

    var camOff = perspective === 'side' ? camera.x : 0;

    switch (e.behavior) {
      case 'patrol':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx = -e.vx;
          e.facing = e.vx > 0 ? 1 : -1;
        }
        break;

      case 'bounce':
        e.x += e.vx * dt;
        e.vy += GRAVITY * 0.5 * dt;
        e.y += e.vy * dt;
        if (e.y > GH - 44) { e.y = GH - 44; e.vy = -180; }
        if (Math.abs(e.x - e.startX) > e.patrolDist) { e.vx = -e.vx; }
        break;

      case 'shoot':
        e.shootTimer += dt;
        if (e.shootTimer > 2.5) {
          e.shootTimer = 0;
          var sdx = (player.x + player.w / 2) - (e.x - camOff + e.w / 2);
          var sdy = (player.y + player.h / 2) - (e.y + e.h / 2);
          var sd = Math.sqrt(sdx * sdx + sdy * sdy);
          if (sd < 200) {
            projectiles.push({
              x: e.x - camOff + e.w / 2, y: e.y + e.h / 2,
              vx: (sdx / sd) * 150, vy: (sdy / sd) * 150,
              size: 4, color: REALMS[e.realm] ? REALMS[e.realm].accent : '#ffaa22', life: 3
            });
            TAS.audio.playTone(500, 0.08, 'sawtooth', 0.04, 200);
          }
        }
        break;

      case 'fly':
        e.floatAngle += dt * 2;
        e.x += e.vx * dt;
        e.y = e.y + Math.sin(e.floatAngle) * 0.8;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx = -e.vx;
          e.facing = e.vx > 0 ? 1 : -1;
        }
        break;

      case 'shield':
        e.x += e.vx * 0.7 * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist * 0.6) {
          e.vx = -e.vx;
          e.facing = e.vx > 0 ? 1 : -1;
        }
        var pdir = player.x + player.w / 2 > e.x - camOff + e.w / 2 ? 1 : -1;
        e.facing = -pdir;
        break;

      case 'float':
        e.floatAngle += dt * 3;
        var ftx = player.x + player.w / 2 + camOff;
        var fty = player.y - 30;
        e.x += (ftx - e.x) * dt * 0.8;
        e.y += (fty - e.y) * dt * 0.5 + Math.sin(e.floatAngle) * 0.5;
        break;
    }

    // Contact damage to player (CON reduces damage taken)
    if (invulnTimer <= 0 && !player.grappling) {
      var ceScreenX = e.x - camOff;
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, ceScreenX, e.y, e.w, e.h)) {
        var contactDmg = Math.max(1, 1 - Math.floor(conMod() / 3));
        hp -= contactDmg;
        invulnTimer = calcInvulnTime();
        TAS.fx.flash('#ff0000', 0.2);
        TAS.fx.shake(4, 0.88);
        TAS.audio.playTone(120, 0.2, 'sawtooth', 0.08, 60);
        player.vy = -150;
        if (hp <= 0) { playerDie(); return; }
      }
    }
  }
}

// === HAZARD UPDATE ===
function updateHazards(dt) {
  if (perspective !== 'side') return;

  for (var hi = 0; hi < hazards.length; hi++) {
    var h = hazards[hi];
    var hScreenX = h.x - camera.x;

    // Skip off-screen hazards
    if (hScreenX + (h.w || 20) < -30 || hScreenX > GW + 30) continue;

    switch (h.type) {
      case 'spore':
        h.timer += dt;
        h.activeTimer += dt;
        // Pulsing spore cloud
        if (h.activeTimer > h.interval) {
          h.activeTimer = 0;
          // Burst particles
          TAS.particles.spawn(hScreenX + h.w / 2, h.y + h.h / 2, '#44aa44', 6, 2);
        }
        // Damage on contact (WIS reduces frequency of damage ticks)
        if (invulnTimer <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hScreenX, h.y, h.w, h.h)) {
          h.contactTimer = (h.contactTimer || 0) + dt;
          var sporeDmgInterval = 1.0 + wisMod() * 0.3;
          if (h.contactTimer >= sporeDmgInterval) {
            h.contactTimer = 0;
            hp -= h.dmg;
            invulnTimer = 0.5;
            TAS.fx.flash('#44aa44', 0.15);
            addScorePopup(player.x + player.w / 2, player.y - 10, 'SPORE!', '#44aa44');
            if (hp <= 0) { playerDie(); return; }
          }
        } else {
          h.contactTimer = 0;
        }
        break;

      case 'lava':
        h.timer += dt;
        h.eruptTimer += dt;
        if (h.eruptTimer > h.interval && !h.erupting) {
          h.erupting = true;
          h.eruptTimer = 0;
          TAS.audio.playTone(100, 0.2, 'sawtooth', 0.06, 50);
        }
        if (h.erupting) {
          h.eruptTimer += dt;
          // Eruption lasts 1.5 seconds
          if (h.eruptTimer > 1.5) {
            h.erupting = false;
            h.eruptTimer = 0;
          }
          // Damage during eruption
          if (invulnTimer <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hScreenX - 4, h.y - 50, h.w + 8, 60)) {
            hp -= h.dmg;
            invulnTimer = calcInvulnTime();
            TAS.fx.flash('#ff4422', 0.3);
            TAS.fx.shake(6, 0.85);
            addScorePopup(player.x + player.w / 2, player.y - 10, 'BURN!', '#ff4422');
            if (hp <= 0) { playerDie(); return; }
          }
          // Particles during eruption
          if (frame % 3 === 0) {
            TAS.particles.spawn(hScreenX + h.w / 2 + (Math.random() - 0.5) * 10, h.y - 20, '#ff6622', 3, 2, { gravity: 3 });
          }
        }
        break;

      case 'lightning':
        h.timer += dt;
        h.strikeTimer += dt;
        // Warning phase
        if (h.strikeTimer > h.interval - 1.0 && !h.striking) {
          h.warningTimer += dt;
          // WIS gives earlier warning
          if (wisMod() >= 1 && h.warningTimer < 0.1) {
            addScorePopup(hScreenX + h.w / 2, 40, '!!', '#ffdd44');
          }
        }
        if (h.strikeTimer > h.interval && !h.striking) {
          h.striking = true;
          h.strikeTimer = 0;
          h.warningTimer = 0;
          TAS.audio.playTone(800, 0.15, 'square', 0.1, 200);
          TAS.fx.flash('#88bbff', 0.15);
        }
        if (h.striking) {
          h.strikeTimer += dt;
          if (h.strikeTimer > 0.3) {
            h.striking = false;
            h.strikeTimer = 0;
          }
          if (invulnTimer <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hScreenX, 0, h.w, GH - 32)) {
            hp -= h.dmg;
            invulnTimer = calcInvulnTime();
            TAS.fx.flash('#ffffff', 0.2);
            TAS.fx.shake(8, 0.82);
            addScorePopup(player.x + player.w / 2, player.y - 10, 'ZAP!', '#88bbff');
            if (hp <= 0) { playerDie(); return; }
          }
        }
        break;

      case 'poison':
        // Constant damage on contact
        if (invulnTimer <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hScreenX, h.y, h.w, h.h + 8)) {
          h.contactTimer = (h.contactTimer || 0) + dt;
          var poisonInterval = 0.8 + wisMod() * 0.2;
          if (h.contactTimer >= poisonInterval) {
            h.contactTimer = 0;
            hp -= h.dmg;
            invulnTimer = 0.3;
            TAS.fx.flash('#88cc22', 0.1);
            addScorePopup(player.x + player.w / 2, player.y - 10, 'TOXIC!', '#88cc22');
            if (hp <= 0) { playerDie(); return; }
          }
        } else {
          h.contactTimer = 0;
        }
        break;

      case 'shadow':
        // Track toward player slowly
        var stx = player.x + camera.x;
        var sty = player.y + player.h / 2;
        var shdx = stx - h.x;
        var shdy = sty - h.y;
        var shd = Math.sqrt(shdx * shdx + shdy * shdy);
        if (shd > 5) {
          h.x += (shdx / shd) * h.speed * dt;
          h.y += (shdy / shd) * h.speed * dt;
        }
        // Damage on contact
        if (invulnTimer <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, hScreenX, h.y, h.w, h.h)) {
          hp -= h.dmg;
          invulnTimer = calcInvulnTime();
          TAS.fx.flash('#8844cc', 0.25);
          TAS.fx.shake(5, 0.85);
          addScorePopup(player.x + player.w / 2, player.y - 10, 'SHADOW!', '#8844cc');
          if (hp <= 0) { playerDie(); return; }
        }
        break;
    }
  }
}

// === BOSS AI ===
function updateBoss(dt) {
  if (!bossActive || !bossActive.active) return;
  var b = bossActive;
  b.timer += dt;
  b.attackTimer += dt;
  if (b.hitFlash > 0) b.hitFlash -= dt;

  var speedMul = b.phase === 1 ? 1.5 : 1.0;

  switch (b.pattern) {
    case 'stomp':
      b.x += b.vx * dt;
      if (b.x < 20 || b.x > GW - b.w - 20) b.vx = -b.vx;
      if (b.attackTimer > 2.5) {
        b.attackTimer = 0;
        b.vy = -300;
      }
      b.vy += GRAVITY * dt;
      b.y += b.vy * dt;
      if (b.y > GH - 32 - b.h) {
        b.y = GH - 32 - b.h;
        if (b.vy > 100) {
          TAS.fx.shake(8, 0.82);
          TAS.audio.playTone(80, 0.3, 'sawtooth', 0.1);
          TAS.particles.spawn(b.x + b.w / 2, GH - 32, REALMS[currentRealm].accent, 10, 3);
        }
        b.vy = 0;
      }
      break;

    case 'wave':
      b.x += Math.sin(b.timer * 2) * speedMul * 2;
      b.y = GH - 32 - b.h + Math.sin(b.timer * 3) * 20;
      if (b.attackTimer > 1.8) {
        b.attackTimer = 0;
        for (var wi = 0; wi < 3; wi++) {
          projectiles.push({
            x: b.x + b.w / 2, y: b.y + b.h,
            vx: -100 - wi * 30, vy: 50 + wi * 20,
            size: 6, color: b.accent, life: 3
          });
        }
        TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06, 80);
      }
      break;

    case 'dive':
      if (b.timer % 4 < 2) {
        b.x = GW / 2 + Math.cos(b.timer * 3) * 150;
        b.y = 40 + Math.sin(b.timer * 2) * 30;
      } else {
        var ddx = player.x - b.x;
        var ddy = player.y - b.y;
        var dd = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dd > 5) {
          b.x += (ddx / dd) * b.speed * speedMul * dt;
          b.y += (ddy / dd) * b.speed * speedMul * dt;
        }
      }
      break;

    case 'spit':
      b.x += b.vx * 0.5 * dt;
      if (b.x < 20 || b.x > GW - b.w - 20) b.vx = -b.vx;
      b.y = GH - 32 - b.h;
      if (b.attackTimer > 1.5) {
        b.attackTimer = 0;
        var count = b.phase === 1 ? 5 : 3;
        for (var si = 0; si < count; si++) {
          var ang = -Math.PI / 2 + (si - (count - 1) / 2) * 0.4;
          projectiles.push({
            x: b.x + b.w / 2, y: b.y,
            vx: Math.cos(ang) * 120, vy: Math.sin(ang) * 120,
            size: 5, color: b.accent, life: 3
          });
        }
        TAS.audio.playTone(250, 0.15, 'sawtooth', 0.06, 100);
      }
      break;

    case 'all':
      var phase3 = Math.floor(b.timer / 3) % 3;
      if (phase3 === 0) {
        b.x += b.vx * speedMul * dt;
        if (b.x < 20 || b.x > GW - b.w - 20) b.vx = -b.vx;
        b.y = GH - 32 - b.h;
      } else if (phase3 === 1) {
        b.x = GW / 2 + Math.cos(b.timer * 2) * 120;
        b.y = 50 + Math.sin(b.timer * 3) * 30;
      } else {
        var adx = player.x - b.x;
        var ady = player.y - b.y;
        var ad = Math.sqrt(adx * adx + ady * ady);
        if (ad > 5) {
          b.x += (adx / ad) * b.speed * dt;
          b.y += (ady / ad) * b.speed * dt;
        }
      }
      if (b.attackTimer > 2.0) {
        b.attackTimer = 0;
        for (var ai = 0; ai < 8; ai++) {
          var aang = (Math.PI * 2 / 8) * ai + b.timer;
          projectiles.push({
            x: b.x + b.w / 2, y: b.y + b.h / 2,
            vx: Math.cos(aang) * 100, vy: Math.sin(aang) * 100,
            size: 5, color: b.accent, life: 3
          });
        }
        TAS.audio.playTone(180, 0.2, 'sawtooth', 0.07, 80);
      }
      break;
  }

  // Boss contact damage (CON reduces)
  if (invulnTimer <= 0) {
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
      var bossDmg = Math.max(1, 2 - Math.floor(conMod() / 2));
      hp -= bossDmg;
      invulnTimer = calcInvulnTime() + 0.5;
      TAS.fx.flash('#ff0000', 0.3);
      TAS.fx.shake(6, 0.82);
      TAS.audio.playTone(100, 0.3, 'sawtooth', 0.1, 40);
      player.vy = -200;
      if (hp <= 0) playerDie();
    }
  }
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.life <= 0 || p.x < -20 || p.x > GW + 20 || p.y < -20 || p.y > GH + 20) {
      projectiles.splice(i, 1);
      continue;
    }

    // Hit player (DEX slightly reduces hitbox via invuln time)
    if (invulnTimer <= 0 && TAS.hit.circleOverlap(player.x + player.w / 2, player.y + player.h / 2, 8, p.x, p.y, p.size)) {
      var projDmg = Math.max(1, 1 - Math.floor(conMod() / 4));
      hp -= projDmg;
      invulnTimer = calcInvulnTime();
      TAS.fx.flash('#ff0000', 0.15);
      TAS.audio.playTone(120, 0.15, 'sawtooth', 0.06, 60);
      projectiles.splice(i, 1);
      if (hp <= 0) { playerDie(); return; }
    }
  }
}

// === PICKUPS ===
function updatePickups(dt) {
  var camOff = perspective === 'side' ? camera.x : 0;
  for (var i = 0; i < pickups.length; i++) {
    var p = pickups[i];
    if (!p.active) continue;
    var pScreenX = p.x - camOff;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, pScreenX, p.y, 12, 12)) {
      p.active = false;
      if (p.type === 'hp') {
        var healAmt = 2 + Math.max(0, conMod());
        hp = Math.min(maxHp, hp + healAmt);
        TAS.audio.playTone(500, 0.1, 'sine', 0.06, 700);
        addScorePopup(pScreenX + 6, p.y, '+' + healAmt + 'HP', '#ff88aa');
      } else if (p.type === 'star') {
        var starAmt = Math.floor(p.amount * (1 + chaMod() * 0.1));
        stars += starAmt;
        var starScore = Math.floor(starAmt * calcScoreMult());
        score += starScore;
        TAS.audio.playTone(800, 0.08, 'sine', 0.05, 1200);
        addScorePopup(pScreenX + 6, p.y, '+' + starAmt + ' Spore Gems', '#f4b41b');
      } else if (p.type === 'maxhp') {
        maxHp = Math.min(12 + conMod(), maxHp + 1);
        hp = maxHp;
        TAS.audio.playTone(600, 0.2, 'sine', 0.08, 900);
        TAS.particles.spawn(player.x + player.w / 2, player.y, '#ff88aa', 12, 2);
        addScorePopup(pScreenX + 6, p.y, '+1 MAX HP', '#ff88cc');
      }
      TAS.particles.spawn(pScreenX + 6, p.y + 6, '#ffdd44', 8, 2);
    }
  }
}

// === DOORWAYS ===
function checkDoorways() {
  if (perspective !== 'side') return;
  var camOff = camera.x;
  for (var i = 0; i < doorways.length; i++) {
    var d = doorways[i];
    var dScreenX = d.x - camOff;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, dScreenX, d.y, d.w, d.h)) {
      if (TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyZ'] || TAS.input.touch.up || TAS.input.touch.a) {
        enterRoom(d.target);
        return;
      }
    }
  }
}

// === SHRINE ===
function updateShrine(dt) {
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  if (keys['ArrowUp'] || touch.up) {
    shrineCursor = Math.max(0, shrineCursor - 1);
    keys['ArrowUp'] = false;
  }
  if (keys['ArrowDown'] || touch.down) {
    shrineCursor = Math.min(SHRINE_ITEMS.length - 1, shrineCursor + 1);
    keys['ArrowDown'] = false;
  }
  // Z = confirm (NES A button)
  if (keys['KeyZ'] || keys['Space'] || touch.a) {
    var item = SHRINE_ITEMS[shrineCursor];
    var cost = getShrineCost(item);
    if (stars >= cost) {
      stars -= cost;
      item.action();
      TAS.audio.playTone(600, 0.15, 'sine', 0.08, 900);
      TAS.particles.spawn(GW / 2, GH / 2, '#ffdd44', 10, 3);
      addScorePopup(GW / 2, GH / 2 - 20, item.name + '!', '#a855f7');
      saveGame();
    } else {
      TAS.audio.playTone(150, 0.2, 'square', 0.06);
    }
    keys['KeyZ'] = false;
    keys['Space'] = false;
  }
  // X = leave (NES B button)
  if (keys['Escape'] || keys['KeyX'] || touch.b) {
    shrineOpen = false;
    keys['Escape'] = false;
    keys['KeyX'] = false;
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, {
      frame: frame,
      extra: 'Garden: ' + (currentRealm >= 0 ? REALMS[currentRealm].name : 'Hub') +
        ' | Lv' + toneLevel + ' | ' + statB.name
    });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state !== 'playing') return;

  // Tutorial overlay
  if (showTutorial) {
    drawTutorial();
    return;
  }

  // Transition fade
  if (transTimer > 0) {
    ctx.fillStyle = '#000';
    ctx.globalAlpha = Math.min(1, transTimer * 2);
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
    // Realm name during transition
    if (currentRealm >= 0) {
      ctx.textAlign = 'center';
      ctx.fillStyle = REALMS[currentRealm].accent;
      ctx.font = 'bold 16px monospace';
      ctx.fillText(REALMS[currentRealm].name, GW / 2, GH / 2 - 10);
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      ctx.fillText(REALMS[currentRealm].desc, GW / 2, GH / 2 + 10);
    }
    return;
  }

  if (deathTimer > 0) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('COMPOSTED...', GW / 2, GH / 2 - 8);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Lives: ' + lives, GW / 2, GH / 2 + 12);
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  if (shrineOpen) {
    drawShrine();
  } else if (perspective === 'overhead') {
    drawHub();
  } else {
    drawSideLevel();
  }

  drawScorePopups();
  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);
}
