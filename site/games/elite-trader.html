var PI = Math.PI, TAU = PI * 2;

// ============================================================
// BASELING STAT INTEGRATION (Pass 1)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) { console.error('NftLoader stat error:', e); }

// Stat helpers — each stat maps to a game mechanic
// STR: combat damage multiplier
function statDamageMult() { return 1.0 + (statB.str - 10) * 0.06; }
// DEX: ship speed & maneuverability
function statSpeedMult() { return 1.0 + (statB.dex - 10) * 0.04; }
function statTurnRate() { return 3.5 + (statB.dex - 10) * 0.15; }
// CON: hull HP & shield capacity
function statHpBonus() { return Math.floor((statB.con - 10) * 5); }
function statShieldBonus() { return Math.floor((statB.con - 10) * 3); }
// INT: trade profits & score multiplier
function statTradeMult() { return 1.0 + (statB.int - 10) * 0.05; }
function statScoreMult() { return statB.scoreMult * (1.0 + (statB.int - 10) * 0.03); }
// WIS: scan range & cooldown reduction
function statScanRange() { return 1.0 + (statB.wis - 10) * 0.08; }
function statCooldownMult() { return Math.max(0.3, 1.0 - (statB.wis - 10) * 0.04); }
// CHA: trade price discounts, reputation gain, luck
function statPriceDiscount() { return Math.max(0.7, 1.0 - (statB.cha - 10) * 0.02); }
function statReputationMult() { return 1.0 + (statB.cha - 10) * 0.05; }
function statLuckMult() { return statB.luck * (1.0 + (statB.cha - 10) * 0.03); }
// Combined level bonus
function statLevelBonus() { return 1.0 + statB.level * 0.02; }

// ============================================================
// SECTOR ZONES (Pass 3)
// ============================================================
var SECTORS = [
  { name: 'Mycelial Core', color: '#226644', hue: 130, systems: [0, 13, 14, 18] },
  { name: 'Spore Frontier', color: '#224466', hue: 210, systems: [1, 5, 7, 16] },
  { name: 'Reactor Badlands', color: '#662222', hue: 0, systems: [2, 6, 8, 17] },
  { name: 'Fungal Depths', color: '#442266', hue: 270, systems: [3, 9, 11] },
  { name: 'Trade Nexus', color: '#665522', hue: 40, systems: [4, 10, 12, 15, 19] }
];

function getSectorForSystem(idx) {
  for (var i = 0; i < SECTORS.length; i++) {
    if (SECTORS[i].systems.indexOf(idx) >= 0) return SECTORS[i];
  }
  return SECTORS[0];
}

// ============================================================
// STATES
// ============================================================
var STATE_TITLE = 0, STATE_MAP = 1, STATE_FLIGHT = 2, STATE_STATION = 3;
var STATE_COMBAT = 4, STATE_TRADE = 5, STATE_UPGRADES = 6, STATE_MISSIONS = 7;
var STATE_GAMEOVER = 8, STATE_JUMP = 9, STATE_DOCK = 10;
var STATE_TUTORIAL = 11, STATE_BOSS = 12;
var state = STATE_TITLE;

// ============================================================
// RANK SYSTEM
// ============================================================
var RANKS = ['Sporeborn','Mycelial Drifter','Fungal Runner','Colony Trader','Hive Merchant','Reactor Pirate','Spore Lord','ELITE'];
var RANK_THRESHOLDS = [0, 50, 200, 600, 1500, 4000, 10000, 25000];

// ============================================================
// TASERN COMMODITIES (Pass 2)
// ============================================================
var COMMODITIES = ['Spore Caps','Mycelium Ore','Reactor Cores','Chitin Blades','Luminroot Extract','Psilocybin Salve'];
var BASE_PRICES = [20, 35, 80, 120, 200, 60];
var COMMODITY_COLORS = ['#8f8','#a86','#f84','#f4f','#ff0','#4ff'];
var COMMODITY_DESCS = [
  'Common fungal food supply',
  'Raw substrate for colony growth',
  'Power cells from spent reactors',
  'Weapons forged from beetle shells',
  'Rare bioluminescent trade good',
  'Medicinal fungal extract'
];

// ============================================================
// GALAXY - 20 MUSHROOM COLONY SYSTEMS (Pass 2)
// ============================================================
var SYSTEMS = [
  { name: 'Kardov Colony', x: 240, y: 160, prod: [0,1], demand: [3,4], tech: 3, danger: 1, desc: 'Central mushroom hub' },
  { name: 'Nyx Sporeworks', x: 120, y: 80, prod: [2,3], demand: [0,5], tech: 5, danger: 2, desc: 'Reactor research station' },
  { name: 'Spore Drift', x: 360, y: 80, prod: [1,5], demand: [2,4], tech: 2, danger: 3, desc: 'Mining in spore clouds' },

  { name: 'Tasern Gate', x: 400, y: 200, prod: [0,5], demand: [3,2], tech: 3, danger: 2, desc: 'Gateway to the outer rim' },
  { name: 'Void Mycelium', x: 180, y: 40, prod: [4,2], demand: [1,5], tech: 5, danger: 5, desc: 'Deep space fungal web' },
  { name: 'Fungal Nebula', x: 300, y: 40, prod: [5,0], demand: [4,3], tech: 2, danger: 3, desc: 'Dense spore cloud region' },
  { name: 'Iron Maw', x: 60, y: 120, prod: [1,3], demand: [5,0], tech: 4, danger: 4, desc: 'Asteroid chitin foundry' },
  { name: 'Crystal Mycelia', x: 420, y: 120, prod: [4,1], demand: [0,5], tech: 3, danger: 2, desc: 'Luminroot farms' },
  { name: 'Deep Spore', x: 180, y: 280, prod: [5,2], demand: [1,4], tech: 2, danger: 5, desc: 'Uncharted fungal depths' },
  { name: 'Nova Hub', x: 300, y: 280, prod: [0,4], demand: [2,3], tech: 4, danger: 1, desc: 'Major trade center' },
  { name: 'Pyre System', x: 40, y: 280, prod: [3,1], demand: [5,4], tech: 3, danger: 4, desc: 'Burning reactor graveyard' },
  { name: 'Silk Nebula', x: 440, y: 280, prod: [4,5], demand: [1,0], tech: 5, danger: 2, desc: 'Mycelial silk farms' },
  { name: 'Reactor Core', x: 240, y: 100, prod: [2,1], demand: [4,5], tech: 5, danger: 3, desc: 'Central power station' },
  { name: 'Breach Point', x: 140, y: 160, prod: [3,0], demand: [2,4], tech: 3, danger: 4, desc: 'Border defense outpost' },
  { name: 'Ash Cluster', x: 340, y: 160, prod: [1,5], demand: [3,0], tech: 2, danger: 3, desc: 'Burned-out colony ruins' },
  { name: 'Warden Post', x: 100, y: 40, prod: [0,3], demand: [4,2], tech: 4, danger: 1, desc: 'Patrol station' },
  { name: 'Drift Haven', x: 380, y: 40, prod: [5,4], demand: [1,3], tech: 3, danger: 2, desc: 'Refugee mushroom colony' },
  { name: 'POOP Mines', x: 200, y: 220, prod: [1,0], demand: [3,5], tech: 1, danger: 5, desc: 'Baseling waste processing' },
  { name: 'MfT Central', x: 340, y: 240, prod: [2,4], demand: [0,1], tech: 5, danger: 1, desc: 'Financial command center' }
];

// Hyperspace routes (connections between systems by index)
var ROUTES = [
  [0,1],[0,2],[0,13],[0,14],[0,15],[1,5],[1,7],[1,16],[2,6],[2,8],[2,17],
  [3,7],[3,11],[3,14],[4,8],[4,12],[4,15],[5,6],[5,16],[6,17],[7,16],
  [8,12],[9,11],[9,14],[9,18],[10,12],[10,15],[10,19],[11,9],[13,1],[13,2],
  [13,5],[13,6],[14,18],[15,19],[18,0],[19,4]
];

// ============================================================
// SPORE NEBULA HAZARDS (Pass 2)
// ============================================================
var NEBULA_HAZARDS = [
  { name: 'Toxic Spore Cloud', effect: 'hull', damage: 1, color: '#4a2' },
  { name: 'Mycelial Static', effect: 'shield', damage: 2, color: '#26a' },
  { name: 'Fungal EMP Burst', effect: 'engine', slow: 0.5, color: '#a4f' },
  { name: 'Reactor Leak Zone', effect: 'rad', damage: 1, color: '#fa4' }
];
var activeHazard = null;
var hazardTimer = 0;
var hazardFlash = 0;

// ============================================================
// PLAYER STATE
// ============================================================
var player = {
  credits: 1000,
  cargo: [],
  cargoMax: 20,
  fuel: 50,
  fuelMax: 50,
  system: 0,
  ship: { x: 240, y: 260, vx: 0, vy: 0, angle: -PI/2, hp: 100, hpMax: 100, shield: 0, shieldMax: 30 },
  laser: 1, shieldTier: 1, cargoTier: 1, engineTier: 1, fuelTier: 1, scanner: false,
  kills: 0, tradeProfit: 0, rank: 0, criminal: 0,
  missionsComplete: 0, currentMission: null, missionTimer: 0,
  reputation: 0
};

// Apply CON stat to starting HP/shields
function applyStatBonuses() {
  player.ship.hpMax = 100 + statHpBonus();
  player.ship.hp = player.ship.hpMax;
  player.ship.shieldMax = 30 + statShieldBonus();
  player.ship.shield = player.ship.shieldMax;
}
applyStatBonuses();

// ============================================================
// DYNAMIC PRICES PER SYSTEM
// ============================================================
var systemPrices = [];
function initPrices() {
  systemPrices = [];
  for (var i = 0; i < SYSTEMS.length; i++) {
    var prices = [];
    var sys = SYSTEMS[i];
    for (var j = 0; j < 6; j++) {
      var base = BASE_PRICES[j];
      var mod = 1.0;
      if (sys.prod.indexOf(j) >= 0) mod = 0.5 + Math.random() * 0.2;
      else if (sys.demand.indexOf(j) >= 0) mod = 1.6 + Math.random() * 0.4;
      else mod = 0.8 + Math.random() * 0.4;
      prices.push(Math.round(base * mod));
    }
    systemPrices.push(prices);
  }
}
initPrices();

function fluctuatePrices(sysIdx) {
  var prices = systemPrices[sysIdx];
  var sys = SYSTEMS[sysIdx];
  for (var j = 0; j < 6; j++) {
    var base = BASE_PRICES[j];
    var shift = Math.round((Math.random() - 0.5) * base * 0.15);
    prices[j] = Math.max(Math.round(base * 0.3), prices[j] + shift);
    if (sys.prod.indexOf(j) >= 0) prices[j] = Math.min(prices[j], Math.round(base * 0.8));
    if (sys.demand.indexOf(j) >= 0) prices[j] = Math.max(prices[j], Math.round(base * 1.2));
  }
}

// ============================================================
// STARS (background)
// ============================================================
var bgStars = [];
function genStars(count) {
  bgStars = [];
  for (var i = 0; i < count; i++) {
    bgStars.push({ x: Math.random() * GW, y: Math.random() * GH, s: 0.5 + Math.random() * 1.5, b: 0.3 + Math.random() * 0.7, sp: 0.2 + Math.random() * 0.8 });
  }
}
genStars(120);

var bgStarsFar = [];
for (var i = 0; i < 60; i++) {
  bgStarsFar.push({ x: Math.random() * GW, y: Math.random() * GH, s: 0.3 + Math.random() * 0.7, b: 0.15 + Math.random() * 0.3 });
}

// Spore dust particles (Pass 3)
var sporeDust = [];
for (var i = 0; i < 30; i++) {
  sporeDust.push({ x: Math.random() * GW, y: Math.random() * GH, s: 1 + Math.random() * 3, drift: 0.1 + Math.random() * 0.3, phase: Math.random() * TAU, color: Math.random() < 0.5 ? '#284' : '#246' });
}

// ============================================================
// FLIGHT MODE ENTITIES
// ============================================================
var bullets = [];
var enemies = [];
var loot = [];
var asteroids = [];
var explosions = [];
var sporeHazards = [];

// ============================================================
// BOSS STATE (Pass 2)
// ============================================================
var boss = null;
var bossWarning = 0;
var BOSS_TYPES = [
  { name: 'Reactor Pirate Captain', color: '#f44', hp: 20, size: 18, speed: 1.2, fireRate: 25, worth: 500, pattern: 'chase' },
  { name: 'Spore Leviathan', color: '#4a4', hp: 30, size: 24, speed: 0.6, fireRate: 15, worth: 800, pattern: 'circle' },
  { name: 'Mycelial Dreadnought', color: '#a4f', hp: 40, size: 22, speed: 0.8, fireRate: 20, worth: 1200, pattern: 'strafe' }
];

// ============================================================
// AUDIO
// ============================================================
function sndLaser() { TAS.audio.playTone(800, 0.08, 'square', 0.12, 200); }
function sndHit() { TAS.audio.playTone(150, 0.15, 'sawtooth', 0.15, 50); }
function sndExplode() { TAS.audio.playTone(80, 0.4, 'sawtooth', 0.2, 20); }
function sndBuy() { TAS.audio.playTone(600, 0.1, 'sine', 0.1, 900); }
function sndSell() { TAS.audio.playTone(900, 0.1, 'sine', 0.1, 600); }
function sndJump() { TAS.audio.playTone(200, 0.6, 'sine', 0.15, 1200); }
function sndDock() { TAS.audio.playTone(440, 0.3, 'sine', 0.1, 660); }
function sndShield() { TAS.audio.playTone(300, 0.2, 'triangle', 0.1, 500); }
function sndRank() { TAS.audio.playTone(440, 0.15, 'sine', 0.12, 880); TAS.audio.playTone(660, 0.15, 'sine', 0.12, 1320); }
function sndBossWarn() { TAS.audio.playTone(100, 0.3, 'sawtooth', 0.2, 60); }
function sndHazard() { TAS.audio.playTone(250, 0.2, 'triangle', 0.15, 150); }
function sndLoot() { TAS.audio.playTone(1000, 0.08, 'sine', 0.1, 1400); }

// ============================================================
// UTILITY
// ============================================================
function dist(ax, ay, bx, by) { var dx = bx-ax, dy = by-ay; return Math.sqrt(dx*dx + dy*dy); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function rng(lo, hi) { return lo + Math.random() * (hi - lo); }
function rngInt(lo, hi) { return Math.floor(rng(lo, hi + 1)); }

function getConnected(sysIdx) {
  var out = [];
  for (var i = 0; i < ROUTES.length; i++) {
    var r = ROUTES[i];
    if (r[0] === sysIdx) out.push(r[1]);
    else if (r[1] === sysIdx) out.push(r[0]);
  }
  return out;
}

function cargoCount() {
  var total = 0;
  for (var i = 0; i < player.cargo.length; i++) total += player.cargo[i].qty;
  return total;
}

// INT and score mult affect ranking (statB ref #1, #2)
function getRankScore() { return Math.floor((player.kills * 10 + Math.floor(player.tradeProfit / 50)) * statScoreMult()); }

function updateRank() {
  var score = getRankScore();
  var newRank = 0;
  for (var i = RANK_THRESHOLDS.length - 1; i >= 0; i--) {
    if (score >= RANK_THRESHOLDS[i]) { newRank = i; break; }
  }
  if (newRank > player.rank) { player.rank = newRank; sndRank(); rankFlash = 120; }
  if (player.rank >= 7) { state = STATE_GAMEOVER; winGame = true; }
}

var rankFlash = 0;
var winGame = false;

// ============================================================
// TUTORIAL STATE (Pass 3)
// ============================================================
var tutorialStep = 0;
var tutorialSeen = false;
var TUTORIAL_STEPS = [
  { text: 'Welcome, ' + statB.name + '! You are a baseling piloting a reactor-powered ship.', key: 'ENTER to continue' },
  { text: 'Use ARROW KEYS to steer. UP/W = thrust. SPACE/Z = fire lasers.', key: 'ENTER' },
  { text: 'Visit STATIONS to trade Tasern commodities. Buy low, sell high!', key: 'ENTER' },
  { text: 'Upgrade your ship, complete missions, and reach ELITE rank.', key: 'ENTER' },
  { text: 'Beware reactor pirates and spore nebula hazards in deep space!', key: 'ENTER to begin' }
];
try { tutorialSeen = !!localStorage.getItem('elite_trader_tutorial'); } catch(e) { console.error('Tutorial check failed:', e); }

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() {
  var data = {
    credits: player.credits, cargo: player.cargo, cargoMax: player.cargoMax,
    fuel: player.fuel, fuelMax: player.fuelMax, system: player.system,
    laser: player.laser, shieldTier: player.shieldTier, cargoTier: player.cargoTier,
    engineTier: player.engineTier, fuelTier: player.fuelTier, scanner: player.scanner,
    kills: player.kills, tradeProfit: player.tradeProfit, rank: player.rank,
    criminal: player.criminal, missionsComplete: player.missionsComplete,
    reputation: player.reputation
  };
  try { localStorage.setItem('elite_trader_save', JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    var raw = localStorage.getItem('elite_trader_save');
    if (!raw) return false;
    var d = JSON.parse(raw);
    player.credits = d.credits || 1000;
    player.cargo = d.cargo || [];
    player.cargoMax = d.cargoMax || 20;
    player.fuel = d.fuel || 50;
    player.fuelMax = d.fuelMax || 50;
    player.system = d.system || 0;
    player.laser = d.laser || 1;
    player.shieldTier = d.shieldTier || 1;
    player.cargoTier = d.cargoTier || 1;
    player.engineTier = d.engineTier || 1;
    player.fuelTier = d.fuelTier || 1;
    player.scanner = d.scanner || false;
    player.kills = d.kills || 0;
    player.tradeProfit = d.tradeProfit || 0;
    player.rank = d.rank || 0;
    player.criminal = d.criminal || 0;
    player.missionsComplete = d.missionsComplete || 0;
    player.reputation = d.reputation || 0;
    // Apply CON bonus to HP/shields (statB ref #3, #4)
    player.ship.hpMax = 100 + statHpBonus();
    player.ship.hp = player.ship.hpMax;
    player.ship.shieldMax = player.shieldTier * 30 + statShieldBonus();
    player.ship.shield = player.ship.shieldMax;
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

// ============================================================
// SHIP DRAWING
// ============================================================
// Player ship uses baseling color (statB ref #5)
function drawBaselingShip(x, y, angle, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // Mushroom-cap shaped ship
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.quadraticCurveTo(size * 0.3, -size * 0.7, -size * 0.5, -size * 0.5);
  ctx.lineTo(-size * 0.3, 0);
  ctx.lineTo(-size * 0.5, size * 0.5);
  ctx.quadraticCurveTo(size * 0.3, size * 0.7, size, 0);
  ctx.closePath();
  ctx.fillStyle = statB.color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Baseling icon in center
  ctx.fillStyle = '#000';
  ctx.font = Math.floor(size * 0.7) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(statB.icon, 0, 0);
  ctx.restore();
}

function drawShip(x, y, angle, size, color, highlight) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(-size * 0.7, -size * 0.5);
  ctx.lineTo(-size * 0.4, 0);
  ctx.lineTo(-size * 0.7, size * 0.5);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = highlight || '#fff';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// Mushroom colony station (Pass 2)
function drawMushroomStation(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(frame * 0.003);
  // Stem
  ctx.fillStyle = 'rgba(180,160,140,0.6)';
  ctx.fillRect(-size * 0.2, 0, size * 0.4, size * 0.8);
  // Cap
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.5, 0, PI, 0);
  ctx.fillStyle = 'rgba(100,200,120,0.3)';
  ctx.fill();
  ctx.strokeStyle = '#4c8';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Spots on cap
  for (var i = 0; i < 5; i++) {
    var a = PI + (i / 5) * PI;
    var r = size * 0.6;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r, Math.sin(a) * r * 0.5, 3, 0, TAU);
    ctx.fillStyle = 'rgba(200,255,200,0.4)';
    ctx.fill();
  }
  // Dock ring
  ctx.beginPath();
  ctx.arc(0, size * 0.4, size * 0.3, 0, TAU);
  ctx.strokeStyle = '#4af';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Center light
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, TAU);
  ctx.fillStyle = '#4af';
  ctx.fill();
  ctx.restore();
}

function drawStationShape(x, y, size) {
  drawMushroomStation(x, y, size);
}

function drawAsteroid(x, y, size, seed) {
  ctx.save();
  ctx.translate(x, y);
  ctx.beginPath();
  var pts = 7;
  for (var i = 0; i < pts; i++) {
    var a = i * TAU / pts;
    var r = size * (0.7 + ((seed * (i + 1) * 13) % 100) / 300);
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fillStyle = '#665544';
  ctx.fill();
  ctx.strokeStyle = '#887766';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// Reactor pirate ships (Pass 2)
function drawPirateShip(x, y, angle, size, type) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // Jagged pirate hull
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(size * 0.2, -size * 0.6);
  ctx.lineTo(-size * 0.8, -size * 0.4);
  ctx.lineTo(-size * 0.5, 0);
  ctx.lineTo(-size * 0.8, size * 0.4);
  ctx.lineTo(size * 0.2, size * 0.6);
  ctx.closePath();
  var colors = ['#f44', '#f84', '#f4f'];
  ctx.fillStyle = colors[type % 3];
  ctx.fill();
  ctx.strokeStyle = '#faa';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Skull icon
  ctx.fillStyle = '#fff';
  ctx.font = Math.floor(size * 0.5) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('X', 0, 0);
  ctx.restore();
}

// Boss ship drawing (Pass 2)
function drawBossShip(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);
  // Large intimidating hull
  ctx.beginPath();
  ctx.moveTo(b.size * 1.2, 0);
  ctx.lineTo(b.size * 0.3, -b.size * 0.8);
  ctx.lineTo(-b.size, -b.size * 0.6);
  ctx.lineTo(-b.size * 0.7, -b.size * 0.2);
  ctx.lineTo(-b.size * 0.7, b.size * 0.2);
  ctx.lineTo(-b.size, b.size * 0.6);
  ctx.lineTo(b.size * 0.3, b.size * 0.8);
  ctx.closePath();
  ctx.fillStyle = b.color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Pulsing reactor core
  var pulse = 0.5 + Math.sin(frame * 0.1) * 0.3;
  ctx.beginPath();
  ctx.arc(0, 0, b.size * 0.3, 0, TAU);
  ctx.fillStyle = 'rgba(255,100,50,' + pulse + ')';
  ctx.fill();
  ctx.restore();
}

// ============================================================
// PARTICLE HELPERS (Pass 3)
// ============================================================
var screenParticles = [];

function spawnScreenParticles(x, y, count, color, speed, life) {
  for (var i = 0; i < count; i++) {
    var a = Math.random() * TAU;
    var spd = speed * (0.5 + Math.random());
    screenParticles.push({
      x: x, y: y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd,
      life: life + rngInt(0, Math.floor(life * 0.3)),
      maxLife: life,
      color: color,
      size: 1 + Math.random() * 2
    });
  }
}

function updateScreenParticles() {
  for (var i = screenParticles.length - 1; i >= 0; i--) {
    var p = screenParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.98; p.vy *= 0.98;
    p.life--;
    if (p.life <= 0) screenParticles.splice(i, 1);
  }
}

function drawScreenParticles() {
  for (var i = 0; i < screenParticles.length; i++) {
    var p = screenParticles[i];
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// GALAXY MAP
// ============================================================
var mapCursor = -1;
var mapHover = -1;

function getSystemScreenPos(idx) {
  return { x: SYSTEMS[idx].x, y: SYSTEMS[idx].y };
}

function drawGalaxyMap() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Sector zone backgrounds (Pass 3)
  for (var si = 0; si < SECTORS.length; si++) {
    var sec = SECTORS[si];
    // Compute sector center
    var cx = 0, cy = 0;
    for (var j = 0; j < sec.systems.length; j++) {
      cx += SYSTEMS[sec.systems[j]].x;
      cy += SYSTEMS[sec.systems[j]].y;
    }
    cx /= sec.systems.length;
    cy /= sec.systems.length;
    // Draw zone glow
    var grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 100);
    grad.addColorStop(0, sec.color.replace(')', ',0.12)').replace('rgb', 'rgba').replace('#', ''));
    // Use manual rgba
    var r = parseInt(sec.color.substr(1,2), 16) || 40;
    var g = parseInt(sec.color.substr(3,2), 16) || 60;
    var b = parseInt(sec.color.substr(5,2), 16) || 40;
    grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 100);
    grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',0.15)');
    grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);
  }

  // Far stars
  for (var i = 0; i < bgStarsFar.length; i++) {
    var s = bgStarsFar[i];
    ctx.fillStyle = 'rgba(255,255,255,' + s.b + ')';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }

  // Spore dust (Pass 3)
  for (var i = 0; i < sporeDust.length; i++) {
    var sd = sporeDust[i];
    var sy = (sd.y + Math.sin(frame * 0.01 + sd.phase) * 5) % GH;
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.02 + sd.phase) * 0.08;
    ctx.fillStyle = sd.color;
    ctx.beginPath();
    ctx.arc(sd.x, sy, sd.s, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw routes
  ctx.strokeStyle = 'rgba(100,150,255,0.2)';
  ctx.lineWidth = 1;
  var connected = getConnected(player.system);
  for (var i = 0; i < ROUTES.length; i++) {
    var r = ROUTES[i];
    var a = SYSTEMS[r[0]], b = SYSTEMS[r[1]];
    var isConn = (r[0] === player.system || r[1] === player.system);
    ctx.strokeStyle = isConn ? 'rgba(100,200,255,0.5)' : 'rgba(100,150,255,0.15)';
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // Draw systems
  for (var i = 0; i < SYSTEMS.length; i++) {
    var sys = SYSTEMS[i];
    var isCurrent = (i === player.system);
    var isReachable = connected.indexOf(i) >= 0;
    var r = isCurrent ? 8 : (isReachable ? 6 : 4);

    if (isCurrent) {
      ctx.beginPath(); ctx.arc(sys.x, sys.y, 12 + Math.sin(frame * 0.05) * 2, 0, TAU);
      ctx.strokeStyle = statB.color; ctx.lineWidth = 1; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(sys.x, sys.y, r, 0, TAU);
    if (isCurrent) ctx.fillStyle = statB.color;
    else if (isReachable) ctx.fillStyle = '#4af';
    else ctx.fillStyle = '#555';
    ctx.fill();

    if (i === mapHover && isReachable) {
      ctx.beginPath(); ctx.arc(sys.x, sys.y, r + 4, 0, TAU);
      ctx.strokeStyle = '#ff0'; ctx.lineWidth = 2; ctx.stroke();
    }

    // Name label
    if (isCurrent || isReachable || i === mapHover) {
      ctx.fillStyle = isCurrent ? statB.color : '#aaa';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(sys.name, sys.x, sys.y - r - 4);
    }

    // WIS scanner: show pirate indicator with enhanced range (statB ref #6)
    var scanThreshold = player.scanner ? 3 : 4;
    scanThreshold = Math.max(1, Math.floor(scanThreshold / statScanRange()));
    if (player.scanner && sys.danger >= scanThreshold && !isCurrent) {
      ctx.fillStyle = '#f44';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', sys.x + r + 5, sys.y + 3);
    }
  }

  // Sector name at current location (Pass 3)
  var curSector = getSectorForSystem(player.system);
  ctx.fillStyle = '#446';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Sector: ' + curSector.name, GW - 8, GH - 28);

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SYSTEM: ' + SYSTEMS[player.system].name, 8, 14);
  ctx.fillText('CREDITS: ' + player.credits + 'M', 8, 26);
  ctx.fillText('FUEL: ' + player.fuel + '/' + player.fuelMax, 8, 38);
  ctx.fillText('RANK: ' + RANKS[player.rank], 8, 50);
  ctx.fillText('CARGO: ' + cargoCount() + '/' + player.cargoMax, 8, 62);

  ctx.textAlign = 'right';
  ctx.fillText('[D] Dock Station', GW - 8, 14);
  ctx.fillText('[CLICK] Jump to system', GW - 8, 26);
  ctx.fillText('[S] Save', GW - 8, 38);
  if (player.criminal > 0) {
    ctx.fillStyle = '#f44';
    ctx.fillText('WANTED: ' + player.criminal, GW - 8, 50);
  }

  // System description (Pass 2)
  ctx.fillStyle = '#556';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(SYSTEMS[player.system].desc, 8, GH - 8);

  // Rank flash
  if (rankFlash > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,0,' + (rankFlash / 120) + ')';
    ctx.font = '16px monospace';
    ctx.fillText('RANK UP: ' + RANKS[player.rank], GW / 2, GH / 2);
  }
}

// ============================================================
// FLIGHT MODE
// ============================================================
var thrustParticles = [];
var fireTimer = 0;
var stationObj = { x: 240, y: 60, docked: false };
var comboKills = 0;
var comboTimer = 0;

function initFlight(combat) {
  var s = player.ship;
  s.x = GW / 2; s.y = GH - 60;
  s.vx = 0; s.vy = 0; s.angle = -PI / 2;
  // CON stat applied (statB ref #7)
  s.hp = s.hpMax; s.shield = s.shieldMax;
  bullets = []; enemies = []; loot = []; asteroids = []; explosions = [];
  thrustParticles = []; fireTimer = 0; screenParticles = [];
  sporeHazards = [];
  stationObj.x = GW / 2; stationObj.y = 60; stationObj.docked = false;
  boss = null; bossWarning = 0;
  comboKills = 0; comboTimer = 0;
  activeHazard = null; hazardTimer = 0;

  if (!combat) {
    // Scatter some asteroids
    for (var i = 0; i < 8; i++) {
      asteroids.push({
        x: rng(30, GW - 30), y: rng(30, GH - 80),
        vx: rng(-0.3, 0.3), vy: rng(-0.3, 0.3),
        size: rng(8, 20), seed: rngInt(1, 999), hp: 3
      });
    }
    // Maybe spawn spore hazards in dangerous systems (Pass 2)
    var sys = SYSTEMS[player.system];
    if (sys.danger >= 3 && Math.random() < 0.5) {
      var haz = NEBULA_HAZARDS[rngInt(0, NEBULA_HAZARDS.length - 1)];
      activeHazard = haz;
      hazardTimer = 300 + rngInt(0, 200);
    }
  } else {
    spawnEnemies();
    // Boss encounter chance based on rank and system danger (Pass 2)
    var sys = SYSTEMS[player.system];
    if (player.rank >= 2 && sys.danger >= 4 && Math.random() < 0.3) {
      bossWarning = 120;
    }
  }
}

function spawnEnemies() {
  var count = 2 + Math.floor(player.rank * 0.8) + rngInt(0, 2);
  var sys = SYSTEMS[player.system];
  count = Math.min(count, 6);
  for (var i = 0; i < count; i++) {
    enemies.push({
      x: rng(40, GW - 40), y: rng(20, GH / 2 - 20),
      vx: rng(-1, 1), vy: rng(-0.5, 0.5),
      angle: PI / 2, size: 10, hp: 2 + Math.floor(player.rank * 0.5),
      fireTimer: rngInt(30, 90), type: rngInt(0, 2),
      worth: 10 + sys.danger * 5
    });
  }
}

function spawnBoss() {
  var btype = BOSS_TYPES[Math.min(Math.floor(player.rank / 3), BOSS_TYPES.length - 1)];
  boss = {
    x: GW / 2, y: -30,
    vx: 0, vy: 0,
    angle: PI / 2,
    hp: btype.hp + player.rank * 3,
    hpMax: btype.hp + player.rank * 3,
    size: btype.size,
    speed: btype.speed,
    fireRate: btype.fireRate,
    fireTimer: btype.fireRate,
    color: btype.color,
    worth: btype.worth,
    name: btype.name,
    pattern: btype.pattern,
    phase: 0
  };
  sndBossWarn();
}

// DEX affects speed (statB ref #8)
function getEngineSpeed() { return (2.5 + player.engineTier * 0.8) * statSpeedMult() * statLevelBonus(); }
// STR affects damage (statB ref #9)
function getLaserDamage() { return Math.max(1, Math.round(player.laser * statDamageMult())); }
// WIS affects fire rate cooldown (statB ref #10)
function getFireRate() { return Math.max(3, Math.round((12 - player.laser * 2) * statCooldownMult())); }

function updateFlight(dt) {
  var s = player.ship;
  var speed = getEngineSpeed();
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;

  // DEX affects turn rate (statB ref #11)
  var turnRate = statTurnRate();

  // Rotation
  if (keys['ArrowLeft'] || keys['a'] || touch.left) s.angle -= turnRate * DEG;
  if (keys['ArrowRight'] || keys['d'] || touch.right) s.angle += turnRate * DEG;

  // Thrust
  var thrusting = keys['ArrowUp'] || keys['w'] || touch.b || touch.up;
  if (thrusting) {
    s.vx += Math.cos(s.angle) * speed * 0.06;
    s.vy += Math.sin(s.angle) * speed * 0.06;
    // Thrust particle with baseling color
    if (frame % 2 === 0) {
      thrustParticles.push({
        x: s.x - Math.cos(s.angle) * 10,
        y: s.y - Math.sin(s.angle) * 10,
        vx: -Math.cos(s.angle) * 2 + rng(-0.5, 0.5),
        vy: -Math.sin(s.angle) * 2 + rng(-0.5, 0.5),
        life: 20
      });
    }
  }

  // Brake
  if (keys['ArrowDown'] || keys['s'] || touch.down) {
    s.vx *= 0.95; s.vy *= 0.95;
  }

  // Friction
  s.vx *= 0.995; s.vy *= 0.995;

  // Hazard slow effect
  if (activeHazard && activeHazard.effect === 'engine') {
    s.vx *= activeHazard.slow;
    s.vy *= activeHazard.slow;
  }

  // Speed cap
  var spd = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
  if (spd > speed) { s.vx = (s.vx / spd) * speed; s.vy = (s.vy / spd) * speed; }

  // Move
  s.x += s.vx; s.y += s.vy;
  s.x = clamp(s.x, 12, GW - 12);
  s.y = clamp(s.y, 12, GH - 12);

  // Fire — WIS reduces cooldown (statB ref already in getFireRate)
  fireTimer--;
  if ((keys[' '] || keys['z'] || touch.a) && fireTimer <= 0) {
    fireTimer = getFireRate();
    bullets.push({
      x: s.x + Math.cos(s.angle) * 12,
      y: s.y + Math.sin(s.angle) * 12,
      vx: Math.cos(s.angle) * 7,
      vy: Math.sin(s.angle) * 7,
      life: 40, friendly: true
    });
    sndLaser();
  }

  // Combo timer
  if (comboTimer > 0) comboTimer--;
  else comboKills = 0;

  // Update bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0 || b.x < -10 || b.x > GW + 10 || b.y < -10 || b.y > GH + 10) {
      bullets.splice(i, 1); continue;
    }

    // Bullet hits
    if (b.friendly) {
      // Hit boss
      if (boss && dist(b.x, b.y, boss.x, boss.y) < boss.size + 4) {
        boss.hp -= getLaserDamage();
        bullets.splice(i, 1);
        sndHit();
        spawnScreenParticles(b.x, b.y, 3, boss.color, 2, 10);
        if (boss.hp <= 0) {
          spawnExplosion(boss.x, boss.y, boss.size);
          spawnScreenParticles(boss.x, boss.y, 20, '#fa0', 4, 25);
          player.credits += boss.worth;
          player.kills += 5;
          updateRank();
          sndExplode();
          boss = null;
        }
        continue;
      }
      // Hit enemies
      for (var j = enemies.length - 1; j >= 0; j--) {
        if (dist(b.x, b.y, enemies[j].x, enemies[j].y) < enemies[j].size + 4) {
          enemies[j].hp -= getLaserDamage();
          bullets.splice(i, 1);
          sndHit();
          spawnScreenParticles(b.x, b.y, 2, '#f84', 1.5, 8);
          if (enemies[j].hp <= 0) {
            spawnExplosion(enemies[j].x, enemies[j].y, 12);
            // CHA affects loot luck (statB ref #12)
            if (Math.random() < 0.4 * statLuckMult()) {
              loot.push({ x: enemies[j].x, y: enemies[j].y, value: enemies[j].worth, life: 300 });
            }
            player.kills++;
            comboKills++;
            comboTimer = 90;
            // CHA reputation gain (statB ref #13)
            player.reputation += Math.floor(1 * statReputationMult());
            updateRank();
            enemies.splice(j, 1);
            sndExplode();
          }
          break;
        }
      }
      // Hit asteroids
      if (i < bullets.length) {
        for (var j = asteroids.length - 1; j >= 0; j--) {
          if (dist(b.x, b.y, asteroids[j].x, asteroids[j].y) < asteroids[j].size) {
            asteroids[j].hp--;
            if (i < bullets.length) bullets.splice(i, 1);
            if (asteroids[j].hp <= 0) {
              spawnExplosion(asteroids[j].x, asteroids[j].y, asteroids[j].size);
              if (Math.random() < 0.3 * statLuckMult()) loot.push({ x: asteroids[j].x, y: asteroids[j].y, value: rngInt(5, 15), life: 300 });
              asteroids.splice(j, 1);
              sndHit();
            }
            break;
          }
        }
      }
    } else {
      // Enemy bullet hits player
      if (dist(b.x, b.y, s.x, s.y) < 12) {
        bullets.splice(i, 1);
        damagePlayer(1);
      }
    }
  }

  // Update enemies AI
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var targetAngle = Math.atan2(s.y - e.y, s.x - e.x);
    e.angle = lerp(e.angle, targetAngle, 0.03);
    e.x += e.vx + Math.cos(e.angle) * 0.5;
    e.y += e.vy + Math.sin(e.angle) * 0.5;
    e.x = clamp(e.x, 20, GW - 20);
    e.y = clamp(e.y, 20, GH - 20);
    e.fireTimer--;
    if (e.fireTimer <= 0) {
      e.fireTimer = 40 + rngInt(0, 30);
      bullets.push({
        x: e.x + Math.cos(e.angle) * 10,
        y: e.y + Math.sin(e.angle) * 10,
        vx: Math.cos(e.angle) * 4,
        vy: Math.sin(e.angle) * 4,
        life: 60, friendly: false
      });
    }
    if (dist(e.x, e.y, s.x, s.y) < e.size + 10) {
      damagePlayer(2);
      e.hp -= 2;
      if (e.hp <= 0) {
        spawnExplosion(e.x, e.y, 12);
        player.kills++;
        player.reputation += Math.floor(1 * statReputationMult());
        updateRank();
        enemies.splice(i, 1); i--;
        sndExplode();
      }
    }
  }

  // Update boss AI (Pass 2)
  if (bossWarning > 0) {
    bossWarning--;
    if (bossWarning <= 0) spawnBoss();
  }
  if (boss) {
    boss.phase += 0.02;
    var targetAngle = Math.atan2(s.y - boss.y, s.x - boss.x);
    boss.angle = lerp(boss.angle, targetAngle, 0.02);

    // Movement patterns
    if (boss.pattern === 'chase') {
      boss.x += Math.cos(boss.angle) * boss.speed;
      boss.y += Math.sin(boss.angle) * boss.speed;
    } else if (boss.pattern === 'circle') {
      boss.x = GW / 2 + Math.cos(boss.phase) * 120;
      boss.y = 80 + Math.sin(boss.phase * 0.7) * 40;
    } else if (boss.pattern === 'strafe') {
      boss.x += Math.cos(boss.phase * 2) * 2;
      boss.y = lerp(boss.y, 60, 0.01);
    }
    boss.x = clamp(boss.x, boss.size, GW - boss.size);
    boss.y = clamp(boss.y, boss.size, GH - boss.size);

    // Boss fire
    boss.fireTimer--;
    if (boss.fireTimer <= 0) {
      boss.fireTimer = boss.fireRate;
      // Fire spread pattern
      for (var f = -1; f <= 1; f++) {
        var fa = boss.angle + f * 0.2;
        bullets.push({
          x: boss.x + Math.cos(fa) * boss.size,
          y: boss.y + Math.sin(fa) * boss.size,
          vx: Math.cos(fa) * 3.5,
          vy: Math.sin(fa) * 3.5,
          life: 80, friendly: false
        });
      }
    }

    // Boss collision
    if (dist(boss.x, boss.y, s.x, s.y) < boss.size + 10) {
      damagePlayer(4);
      TAS.fx.shake(6, 10);
    }
  }

  // Asteroids drift
  for (var i = 0; i < asteroids.length; i++) {
    var a = asteroids[i];
    a.x += a.vx; a.y += a.vy;
    if (a.x < -20) a.x = GW + 20; if (a.x > GW + 20) a.x = -20;
    if (a.y < -20) a.y = GH + 20; if (a.y > GH + 20) a.y = -20;
    if (dist(a.x, a.y, s.x, s.y) < a.size + 8) {
      damagePlayer(1);
      a.vx += s.vx * 0.5; a.vy += s.vy * 0.5;
    }
  }

  // Hazard damage ticks (Pass 2)
  if (activeHazard && hazardTimer > 0) {
    hazardTimer--;
    if (frame % 60 === 0) {
      if (activeHazard.effect === 'hull') damagePlayer(activeHazard.damage);
      if (activeHazard.effect === 'shield' && s.shield > 0) {
        s.shield = Math.max(0, s.shield - activeHazard.damage);
        sndHazard();
      }
      if (activeHazard.effect === 'rad') damagePlayer(activeHazard.damage);
      hazardFlash = 10;
    }
    if (hazardTimer <= 0) activeHazard = null;
  }

  // Collect loot
  for (var i = loot.length - 1; i >= 0; i--) {
    loot[i].life--;
    if (loot[i].life <= 0) { loot.splice(i, 1); continue; }
    if (dist(loot[i].x, loot[i].y, s.x, s.y) < 20) {
      // INT multiplies loot value (statB ref #14)
      player.credits += Math.floor(loot[i].value * statTradeMult());
      sndLoot();
      spawnScreenParticles(loot[i].x, loot[i].y, 5, '#ff0', 2, 12);
      loot.splice(i, 1);
    }
  }

  // Thrust particles
  for (var i = thrustParticles.length - 1; i >= 0; i--) {
    var p = thrustParticles[i];
    p.x += p.vx; p.y += p.vy; p.life--;
    if (p.life <= 0) thrustParticles.splice(i, 1);
  }

  // Explosions
  for (var i = explosions.length - 1; i >= 0; i--) {
    explosions[i].life--;
    if (explosions[i].life <= 0) explosions.splice(i, 1);
  }

  // Screen particles
  updateScreenParticles();

  // Check dock with station (only in non-combat flight)
  if (state === STATE_FLIGHT && dist(s.x, s.y, stationObj.x, stationObj.y) < 25 && spd < 1.5) {
    dockStation();
  }

  // Check if combat is over (no enemies AND no boss)
  if (state === STATE_COMBAT && enemies.length === 0 && !boss && bossWarning <= 0) {
    setTimeout(function() { state = STATE_MAP; saveGame(); }, 1000);
  }

  // Player dead
  if (s.hp <= 0) {
    spawnExplosion(s.x, s.y, 20);
    spawnScreenParticles(s.x, s.y, 30, statB.color, 3, 20);
    sndExplode();
    state = STATE_GAMEOVER;
    winGame = false;
  }
}

function damagePlayer(amount) {
  var s = player.ship;
  if (s.shield > 0) {
    s.shield -= amount;
    sndShield();
    if (s.shield < 0) { s.hp += s.shield; s.shield = 0; }
  } else {
    s.hp -= amount;
    sndHit();
  }
  TAS.fx.shake(3, 5);
  TAS.fx.flash('#f00', 4);
}

function spawnExplosion(x, y, size) {
  explosions.push({ x: x, y: y, size: size, life: 20, maxLife: 20 });
  TAS.particles.spawn(x, y, 8, { color: '#fa0', speed: 2, life: 15 });
}

function drawFlight() {
  // Sector-tinted background (Pass 3)
  var sector = getSectorForSystem(player.system);
  var r = parseInt(sector.color.substr(1,2), 16) || 0;
  var g = parseInt(sector.color.substr(3,2), 16) || 0;
  var b = parseInt(sector.color.substr(5,2), 16) || 0;
  ctx.fillStyle = 'rgb(' + Math.floor(r * 0.1) + ',' + Math.floor(g * 0.1) + ',' + Math.floor(b * 0.1) + ')';
  ctx.fillRect(0, 0, GW, GH);

  // Hazard overlay tint (Pass 2)
  if (activeHazard) {
    ctx.fillStyle = activeHazard.color.replace('#', 'rgba(') ? 'rgba(0,0,0,0)' : 'rgba(0,0,0,0)';
    var hr = parseInt(activeHazard.color.substr(1,1), 16) * 17;
    var hg = parseInt(activeHazard.color.substr(2,1), 16) * 17;
    var hb = parseInt(activeHazard.color.substr(3,1), 16) * 17;
    ctx.fillStyle = 'rgba(' + hr + ',' + hg + ',' + hb + ',0.05)';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Parallax stars
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var sy = (s.y + frame * s.sp * 0.3) % GH;
    ctx.fillStyle = 'rgba(255,255,255,' + s.b + ')';
    ctx.fillRect(s.x, sy, s.s, s.s);
  }

  // Spore dust in flight (Pass 3)
  if (activeHazard) {
    for (var i = 0; i < sporeDust.length; i++) {
      var sd = sporeDust[i];
      var sdy = (sd.y + frame * sd.drift) % GH;
      ctx.globalAlpha = 0.2 + Math.sin(frame * 0.03 + sd.phase) * 0.1;
      ctx.fillStyle = activeHazard.color;
      ctx.beginPath();
      ctx.arc(sd.x, sdy, sd.s * 0.7, 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Station
  if (state === STATE_FLIGHT) {
    drawStationShape(stationObj.x, stationObj.y, 20);
    ctx.fillStyle = '#4c8';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(SYSTEMS[player.system].name, stationObj.x, stationObj.y + 28);
  }

  // Asteroids
  for (var i = 0; i < asteroids.length; i++) {
    var a = asteroids[i];
    drawAsteroid(a.x, a.y, a.size, a.seed);
  }

  // Loot
  for (var i = 0; i < loot.length; i++) {
    var l = loot[i];
    var flash = l.life < 60 && frame % 10 < 5;
    if (!flash) {
      ctx.beginPath(); ctx.arc(l.x, l.y, 5, 0, TAU);
      ctx.fillStyle = '#ff0'; ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('M', l.x, l.y + 2);
    }
  }

  // Enemies — using pirate ships (Pass 2)
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    drawPirateShip(e.x, e.y, e.angle, e.size, e.type);
    // HP bar
    ctx.fillStyle = '#400'; ctx.fillRect(e.x - 10, e.y - e.size - 6, 20, 3);
    ctx.fillStyle = '#f44'; ctx.fillRect(e.x - 10, e.y - e.size - 6, 20 * (e.hp / (2 + player.rank * 0.5)), 3);
  }

  // Boss (Pass 2)
  if (boss) {
    drawBossShip(boss);
    // Boss HP bar
    var bw = 60;
    ctx.fillStyle = '#400'; ctx.fillRect(boss.x - bw / 2, boss.y - boss.size - 10, bw, 4);
    ctx.fillStyle = '#f44'; ctx.fillRect(boss.x - bw / 2, boss.y - boss.size - 10, bw * (boss.hp / boss.hpMax), 4);
    ctx.fillStyle = '#fff'; ctx.font = '7px monospace'; ctx.textAlign = 'center';
    ctx.fillText(boss.name, boss.x, boss.y - boss.size - 14);
  }

  // Boss warning (Pass 2)
  if (bossWarning > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,0,0,' + (0.5 + Math.sin(frame * 0.2) * 0.3) + ')';
    ctx.font = '14px monospace';
    ctx.fillText('WARNING: BOSS INCOMING', GW / 2, GH / 2 - 30);
  }

  // Bullets
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 0.5, b.y - b.vy * 0.5);
    ctx.strokeStyle = b.friendly ? statB.color : '#f44';
    ctx.lineWidth = b.friendly ? 2 : 1.5;
    ctx.stroke();
  }

  // Thrust particles — baseling colored
  for (var i = 0; i < thrustParticles.length; i++) {
    var p = thrustParticles[i];
    var alpha = p.life / 20;
    ctx.fillStyle = 'rgba(255,' + Math.floor(150 * alpha) + ',0,' + alpha + ')';
    ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
  }

  // Player baseling ship (Pass 1 — statB ref #15)
  var s = player.ship;
  drawBaselingShip(s.x, s.y, s.angle, 12);

  // Shield glow with baseling tint
  if (s.shield > 0) {
    ctx.beginPath(); ctx.arc(s.x, s.y, 16, 0, TAU);
    ctx.strokeStyle = 'rgba(0,200,255,' + (0.3 + Math.sin(frame * 0.1) * 0.1) + ')';
    ctx.lineWidth = 2; ctx.stroke();
  }

  // Explosions
  for (var i = 0; i < explosions.length; i++) {
    var e = explosions[i];
    var t = 1 - e.life / e.maxLife;
    var er = e.size * (1 + t);
    ctx.beginPath(); ctx.arc(e.x, e.y, er, 0, TAU);
    ctx.fillStyle = 'rgba(255,' + Math.floor(200 * (1 - t)) + ',0,' + (1 - t) * 0.6 + ')';
    ctx.fill();
  }

  // Screen particles (Pass 3)
  drawScreenParticles();

  TAS.particles.draw();

  // Hazard warning (Pass 2)
  if (activeHazard) {
    ctx.fillStyle = activeHazard.color;
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HAZARD: ' + activeHazard.name, GW / 2, 40);
    if (hazardFlash > 0) {
      ctx.fillStyle = 'rgba(255,100,0,' + (hazardFlash / 10) + ')';
      ctx.fillRect(0, 0, GW, GH);
      hazardFlash--;
    }
  }

  // Combo indicator (Pass 3)
  if (comboKills >= 2 && comboTimer > 0) {
    ctx.fillStyle = '#ff0';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMBO x' + comboKills + '!', GW / 2, 55);
  }

  // HUD
  ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('HP:' + Math.max(0, s.hp) + '/' + s.hpMax, 8, 14);
  if (s.shieldMax > 0) ctx.fillText('SH:' + Math.max(0, Math.floor(s.shield)) + '/' + s.shieldMax, 8, 26);
  ctx.textAlign = 'right';
  ctx.fillText('CREDITS:' + player.credits + 'M', GW - 8, 14);

  // Stat display in flight (Pass 1)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#556';
  ctx.font = '7px monospace';
  ctx.fillText(statB.name + ' Lv.' + statB.level, 8, GH - 22);

  if (state === STATE_FLIGHT) {
    ctx.textAlign = 'center'; ctx.fillStyle = '#4c8'; ctx.font = '8px monospace';
    ctx.fillText('Approach colony to dock. [M] Galaxy map', GW / 2, GH - 8);
  }
  if (state === STATE_COMBAT) {
    ctx.textAlign = 'center'; ctx.fillStyle = '#f44'; ctx.font = '10px monospace';
    ctx.fillText('REACTOR PIRATES! Destroy all hostiles!', GW / 2, GH - 8);
    var hostileCount = enemies.length + (boss ? 1 : 0);
    ctx.fillText('Hostiles: ' + hostileCount, GW / 2, GH - 20);
  }
}

// HYPERSPACE JUMP
// ============================================================
var jumpTarget = -1;
var jumpTimer = 0;
var JUMP_DURATION = 90;

function startJump(target) {
  var fuelCost = Math.ceil(dist(SYSTEMS[player.system].x, SYSTEMS[player.system].y, SYSTEMS[target].x, SYSTEMS[target].y) / 20);
  fuelCost = Math.max(5, Math.min(fuelCost, 20));
  if (player.fuel < fuelCost) return false;
  player.fuel -= fuelCost;
  jumpTarget = target;
  jumpTimer = JUMP_DURATION;
  state = STATE_JUMP;
  sndJump();
  return true;
}

function updateJump() {
  jumpTimer--;
  if (jumpTimer <= 0) {
    player.system = jumpTarget;
    fluctuatePrices(player.system);
    // Random encounter — CHA reduces pirate aggro (statB ref #16 via luck)
    var sys = SYSTEMS[player.system];
    var pirateChance = sys.danger * 0.12 + (player.criminal * 0.05);
    pirateChance = pirateChance / Math.max(1, statLuckMult() * 0.5);
    if (Math.random() < pirateChance) {
      state = STATE_COMBAT;
      initFlight(true);
    } else {
      state = STATE_FLIGHT;
      initFlight(false);
    }
    if (player.criminal > 0 && Math.random() < 0.3) player.criminal--;
  }
}

function drawJump() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Hyperspace tunnel effect with sector color (Pass 3)
  var progress = 1 - jumpTimer / JUMP_DURATION;
  var targetSector = getSectorForSystem(jumpTarget);
  var sr = parseInt(targetSector.color.substr(1,2), 16) || 100;
  var sg = parseInt(targetSector.color.substr(3,2), 16) || 150;
  var sb = parseInt(targetSector.color.substr(5,2), 16) || 255;

  for (var i = 0; i < 50; i++) {
    var a = (i / 50) * TAU + frame * 0.1;
    var r = 20 + progress * 150 + Math.sin(i * 0.8 + frame * 0.05) * 20;
    var x = GW / 2 + Math.cos(a) * r * (1 - progress * 0.5);
    var y = GH / 2 + Math.sin(a) * r * (1 - progress * 0.5);
    ctx.beginPath(); ctx.arc(x, y, 1 + progress * 2, 0, TAU);
    var cr = Math.floor(sr + progress * (255 - sr));
    var cg = Math.floor(sg + progress * (255 - sg));
    var cb = Math.floor(sb);
    ctx.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (0.5 + progress * 0.5) + ')';
    ctx.fill();
  }

  // Streaking stars
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var dx = s.x - GW / 2, dy = s.y - GH / 2;
    var len = 2 + progress * 15;
    ctx.strokeStyle = 'rgba(200,220,255,' + (0.3 + progress * 0.6) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + dx * 0.05 * len, s.y + dy * 0.05 * len);
    ctx.stroke();
  }

  // Mycelial tendrils during jump (Pass 3)
  ctx.strokeStyle = 'rgba(100,200,150,' + (0.2 + progress * 0.3) + ')';
  ctx.lineWidth = 1;
  for (var i = 0; i < 8; i++) {
    ctx.beginPath();
    var sx = GW / 2 + Math.cos(i * TAU / 8 + frame * 0.03) * 40;
    var sy = GH / 2 + Math.sin(i * TAU / 8 + frame * 0.03) * 30;
    ctx.moveTo(sx, sy);
    for (var j = 1; j <= 5; j++) {
      var t = j / 5;
      var tx = sx + Math.cos(i + frame * 0.02 + j) * 60 * t * progress;
      var ty = sy + Math.sin(i + frame * 0.02 + j * 1.3) * 40 * t * progress;
      ctx.lineTo(tx, ty);
    }
    ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MYCELIAL HYPERSPACE JUMP', GW / 2, GH / 2 - 10);
  ctx.font = '10px monospace';
  ctx.fillText(SYSTEMS[player.system].name + ' -> ' + SYSTEMS[jumpTarget].name, GW / 2, GH / 2 + 10);

  // Sector transition (Pass 3)
  var fromSec = getSectorForSystem(player.system);
  var toSec = getSectorForSystem(jumpTarget);
  if (fromSec !== toSec) {
    ctx.fillStyle = '#886';
    ctx.font = '8px monospace';
    ctx.fillText('Entering ' + toSec.name + ' sector...', GW / 2, GH / 2 + 28);
  }
}

var tradeScroll = 0;
var tradeSel = 0;

function drawTrade() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  var sys = SYSTEMS[player.system];
  var prices = systemPrices[player.system];

  ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('TRADE - ' + sys.name + ' Colony', GW / 2, 20);

  ctx.font = '9px monospace'; ctx.textAlign = 'left';

  ctx.fillText('COMMODITY', 20, 42);
  ctx.fillText('PRICE', 140, 42);
  ctx.fillText('STOCK', 200, 42);
  ctx.fillText('YOUR CARGO', 270, 42);
  ctx.fillText('ACTION', 380, 42);

  for (var i = 0; i < 6; i++) {
    var y = 58 + i * 28;

    if (selected) {
      ctx.fillStyle = 'rgba(60,160,100,0.15)';
      ctx.fillRect(10, y - 10, GW - 20, 26);
    }

    var isDemanded = sys.demand.indexOf(i) >= 0;

    ctx.fillStyle = isProduced ? COMMODITY_COLORS[i] : (isDemanded ? '#f80' : '#ccc');
    ctx.font = '10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(COMMODITIES[i], 20, y + 4);

    // CHA affects displayed price (statB ref #18)
    var displayPrice = isProduced ? Math.floor(prices[i] * statPriceDiscount()) : prices[i];
    ctx.fillStyle = '#fff';
    ctx.fillText(displayPrice + 'M', 140, y + 4);

    var avail = isProduced ? 'HIGH' : (isDemanded ? 'LOW' : 'MED');
    ctx.fillStyle = isProduced ? '#0a0' : (isDemanded ? '#a00' : '#880');
    ctx.fillText(avail, 200, y + 4);

    var owned = 0;
    for (var j = 0; j < player.cargo.length; j++) {
      if (player.cargo[j].commodity === i) owned = player.cargo[j].qty;
    }
    ctx.fillStyle = '#aaa';
    ctx.fillText(owned + ' units', 270, y + 4);

    if (selected) {
      ctx.fillStyle = '#4c8';
      ctx.fillText('[B]uy [X]Sell', 380, y + 4);
    }
  }

  // Commodity description (Pass 2)
  ctx.fillStyle = '#556'; ctx.font = '8px monospace'; ctx.textAlign = 'left';

  ctx.fillStyle = '#fff'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Credits: ' + player.credits + 'M   Cargo: ' + cargoCount() + '/' + player.cargoMax + '   [UP/DOWN] Select   [ESC] Back', GW / 2, GH - 12);

  // Legend
  ctx.fillStyle = '#0f0'; ctx.textAlign = 'left'; ctx.font = '8px monospace';
  ctx.fillText('Green=Produced (cheap)', 12, GH - 28);
  ctx.fillStyle = '#f80';
  ctx.fillText('Orange=Demanded (expensive)', 180, GH - 28);
}

// CHA discount on buy (statB ref #19)
function buyItem() {
  var sys = SYSTEMS[player.system];
  var basePrice = systemPrices[player.system][tradeSel];
  var isProduced = sys.prod.indexOf(tradeSel) >= 0;
  var price = isProduced ? Math.floor(basePrice * statPriceDiscount()) : basePrice;
  if (player.credits >= price && cargoCount() < player.cargoMax) {
    player.credits -= price;
    var found = false;
    for (var i = 0; i < player.cargo.length; i++) {
      if (player.cargo[i].commodity === tradeSel) { player.cargo[i].qty++; found = true; break; }
    }
    if (!found) player.cargo.push({ commodity: tradeSel, qty: 1 });
    sndBuy();
  }
}

// INT boosts sell profit (statB ref #20)
function sellItem() {
  var price = systemPrices[player.system][tradeSel];
  var sellPrice = Math.floor(price * statTradeMult());
  for (var i = 0; i < player.cargo.length; i++) {
    if (player.cargo[i].commodity === tradeSel && player.cargo[i].qty > 0) {
      player.cargo[i].qty--;
      if (player.cargo[i].qty === 0) player.cargo.splice(i, 1);
      player.credits += sellPrice;
      player.tradeProfit += Math.max(0, sellPrice - BASE_PRICES[tradeSel]);
      updateRank();
      sndSell();
      break;
    }
  }
}

// UPGRADES SCREEN
// ============================================================
var upgradeSel = 0;
var UPGRADE_NAMES = ['Spore Laser', 'Mycelial Shield', 'Cargo Pod', 'Reactor Engine', 'Fuel Cells', 'Bio-Scanner'];
var UPGRADE_COSTS = [
  [300, 800, 2000],
  [250, 600, 1500],
  [200, 500, 1200],
  [350, 900, 2200],
  [150, 400, 1000],
  [500]
];
var UPGRADE_DESCS = [
  ['Tier 2: +1 dmg (STR scales)', 'Tier 3: +2 dmg (STR scales)', 'MAX'],
  ['Tier 2: 60 shield (CON scales)', 'Tier 3: 90 shield (CON scales)', 'MAX'],
  ['Tier 2: 40 cargo', 'Tier 3: 60 cargo', 'Tier 4: 80 cargo'],
  ['Tier 2: faster (DEX scales)', 'Tier 3: fastest (DEX scales)', 'MAX'],
  ['Tier 2: 75 fuel', 'Tier 3: 100 fuel', 'MAX'],
  ['Reveals pirate zones (WIS range)']
];

function getUpgradeTier(idx) {
  switch(idx) {
    case 0: return player.laser;
    case 1: return player.shieldTier;
    case 2: return player.cargoTier;
    case 3: return player.engineTier;
    case 4: return player.fuelTier;
    case 5: return player.scanner ? 2 : 1;
    default: return 1;
  }
}

function getUpgradeMaxTier(idx) {
  if (idx === 5) return 2;
  if (idx === 2) return 4;
  return 4;
}

function buyUpgrade() {
  var tier = getUpgradeTier(upgradeSel);
  var maxTier = getUpgradeMaxTier(upgradeSel);
  if (tier >= maxTier) return;
  var costIdx = tier - 1;
  if (costIdx >= UPGRADE_COSTS[upgradeSel].length) return;
  var cost = UPGRADE_COSTS[upgradeSel][costIdx];
  if (player.credits < cost) return;

  player.credits -= cost;
  switch(upgradeSel) {
    case 0: player.laser++; break;
    case 1:
      player.shieldTier++;
      player.ship.shieldMax = player.shieldTier * 30 + statShieldBonus();
      player.ship.shield = player.ship.shieldMax;
      break;
    case 2: player.cargoTier++; player.cargoMax = 20 + (player.cargoTier - 1) * 20; break;
    case 3: player.engineTier++; break;
    case 4: player.fuelTier++; player.fuelMax = 25 + player.fuelTier * 25; player.fuel = player.fuelMax; break;
    case 5: player.scanner = true; break;
  }
  sndBuy();
  saveGame();
}

function drawUpgrades() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('BASELING SHIP UPGRADES', GW / 2, 20);

  for (var i = 0; i < 6; i++) {
    var y = 44 + i * 38;
    var sel = (i === upgradeSel);
    var tier = getUpgradeTier(i);
    var maxTier = getUpgradeMaxTier(i);
    var maxed = tier >= maxTier;

    if (sel) { ctx.fillStyle = 'rgba(60,160,100,0.15)'; ctx.fillRect(10, y - 8, GW - 20, 34); }

    ctx.fillStyle = maxed ? '#4c8' : '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
    ctx.fillText(UPGRADE_NAMES[i], 20, y + 6);

    // Tier dots
    for (var t = 0; t < maxTier - 1; t++) {
      ctx.beginPath(); ctx.arc(180 + t * 14, y + 3, 4, 0, TAU);
      ctx.fillStyle = t < tier - 1 ? '#4c8' : '#333'; ctx.fill();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
    }

    if (!maxed) {
      var costIdx = tier - 1;
      var cost = costIdx < UPGRADE_COSTS[i].length ? UPGRADE_COSTS[i][costIdx] : 9999;
      ctx.fillStyle = player.credits >= cost ? '#ff0' : '#f44';
      ctx.fillText(cost + 'M', 280, y + 6);
      ctx.fillStyle = '#888';
      ctx.fillText(UPGRADE_DESCS[i][costIdx] || '', 340, y + 6);
    } else {
      ctx.fillStyle = '#4c8'; ctx.fillText('MAXED', 280, y + 6);
    }

    if (sel && !maxed) {
      ctx.fillStyle = '#4af'; ctx.font = '9px monospace';
      ctx.fillText('[ENTER/A] Buy', 20, y + 22);
    }
  }

  ctx.fillStyle = '#aaa'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('Credits: ' + player.credits + 'M   [UP/DOWN] Select   [ESC] Back', GW / 2, GH - 12);
}

// ============================================================
// MISSIONS (Pass 2 — Tasern themed)
// ============================================================
var availableMissions = [];
var MISSION_TYPES = [
  { type: 'deliver', verb: 'Deliver', prefix: 'Haul' },
  { type: 'destroy', verb: 'Destroy', prefix: 'Eliminate' },
  { type: 'rescue', verb: 'Rescue', prefix: 'Extract' }
];

function generateMissions() {
  availableMissions = [];
  var connected = getConnected(player.system);
  for (var i = 0; i < 3; i++) {
    var type = rngInt(0, 2);
    var target = connected[rngInt(0, connected.length - 1)];
    if (target === undefined) target = rngInt(0, SYSTEMS.length - 1);
    var reward = 100 + rngInt(50, 200) * (type + 1);
    // CHA boosts mission rewards (statB ref #21)
    reward = Math.floor(reward * statReputationMult());
    var mission = null;

    if (type === 0) {
      var comm = rngInt(0, 5);
      var qty = rngInt(3, 8);
      mission = {
        type: 'deliver', target: target, commodity: comm, qty: qty,
        reward: reward, timer: 10,
        desc: 'Haul ' + qty + ' ' + COMMODITIES[comm] + ' to ' + SYSTEMS[target].name
      };
    } else if (type === 1) {
      var bossHp = 5 + player.rank * 2;
      mission = {
        type: 'destroy', target: target, bossHp: bossHp,
        reward: reward + 100, timer: 15,
        desc: 'Eliminate reactor pirate boss at ' + SYSTEMS[target].name
      };
    } else {
      mission = {
        type: 'rescue', target: target,
        reward: reward, timer: 8,
        desc: 'Extract stranded sporelings at ' + SYSTEMS[target].name
      };
    }
    availableMissions.push(mission);
  }
}

var missionSel = 0;

function drawMissions() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
  ctx.fillText('COLONY MISSIONS BOARD', GW / 2, 20);

  if (player.currentMission) {
    ctx.fillStyle = '#ff0'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
    ctx.fillText('Active: ' + player.currentMission.desc, 20, 44);
    ctx.fillText('Reward: ' + player.currentMission.reward + 'M   Jumps left: ' + player.currentMission.timer, 20, 60);

    if (player.currentMission.type === 'deliver' && player.system === player.currentMission.target) {
      var have = 0;
      for (var i = 0; i < player.cargo.length; i++) {
        if (player.cargo[i].commodity === player.currentMission.commodity) have = player.cargo[i].qty;
      }
      if (have >= player.currentMission.qty) {
        ctx.fillStyle = '#0f0';
        ctx.fillText('[C] Complete delivery mission!', 20, 80);
      }
    }
    if ((player.currentMission.type === 'rescue' || player.currentMission.type === 'destroy') && player.system === player.currentMission.target) {
      ctx.fillStyle = '#0f0';
      ctx.fillText('[C] Complete mission here!', 20, 80);
    }
  } else {
    ctx.fillStyle = '#aaa'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
    ctx.fillText('Available missions:', 20, 44);

    for (var i = 0; i < availableMissions.length; i++) {
      var m = availableMissions[i];
      var y = 66 + i * 50;
      var sel = (i === missionSel);
      if (sel) { ctx.fillStyle = 'rgba(60,160,100,0.15)'; ctx.fillRect(10, y - 8, GW - 20, 44); }

      ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'left';
      ctx.fillText((i + 1) + '. ' + m.desc, 20, y + 6);
      ctx.fillStyle = '#ff0';
      ctx.fillText('Reward: ' + m.reward + 'M   Time: ' + m.timer + ' jumps', 30, y + 22);

      if (sel) { ctx.fillStyle = '#4c8'; ctx.fillText('[ENTER/A] Accept', 350, y + 6); }
    }
  }

  ctx.fillStyle = '#aaa'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('[UP/DOWN] Select   [ESC] Back', GW / 2, GH - 12);
}

function completeMission() {
  if (!player.currentMission) return;
  var m = player.currentMission;

  if (m.type === 'deliver' && player.system === m.target) {
    for (var i = 0; i < player.cargo.length; i++) {
      if (player.cargo[i].commodity === m.commodity) {
        player.cargo[i].qty -= m.qty;
        if (player.cargo[i].qty <= 0) player.cargo.splice(i, 1);
        break;
      }
    }
  }

  player.credits += m.reward;
  player.tradeProfit += m.reward;
  player.missionsComplete++;
  player.reputation += Math.floor(5 * statReputationMult());
  player.currentMission = null;
  updateRank();
  sndSell();
  saveGame();
}

function acceptMission(idx) {
  if (player.currentMission) return;
  if (idx >= 0 && idx < availableMissions.length) {
    player.currentMission = availableMissions[idx];
    availableMissions.splice(idx, 1);
    sndBuy();
  }
}

// ============================================================
// INPUT HANDLING
// ============================================================
var keysDown = {};
var mouseX = 0, mouseY = 0, mouseClicked = false;

document.addEventListener('keydown', function(e) {
  keysDown[e.key] = true;
  handleKey(e.key);
});
document.addEventListener('keyup', function(e) { keysDown[e.key] = false; });

var canvasEl = document.getElementById('gc');
canvasEl.addEventListener('click', function(e) {
  var rect = canvasEl.getBoundingClientRect();
  var scaleX = GW / rect.width, scaleY = GH / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;
  mouseClicked = true;
});

function handleKey(key) {
  if (state === STATE_TUTORIAL) {
    if (key === 'Enter' || key === ' ') {
      tutorialStep++;
      if (tutorialStep >= TUTORIAL_STEPS.length) {
        state = STATE_MAP;
        generateMissions();
        try { localStorage.setItem('elite_trader_tutorial', '1'); } catch(e) { console.error('Tutorial save failed:', e); }
      }
    }
    return;
  }

  if (state === STATE_TITLE) {
    if (key === 'Enter' || key === ' ') {
      if (!loadGame()) { initPrices(); }
      if (!tutorialSeen) {
        state = STATE_TUTORIAL;
        tutorialStep = 0;
      } else {
        state = STATE_MAP;
        generateMissions();
      }
    }
    return;
  }

  if (state === STATE_GAMEOVER) {
    if (key === 'Enter' || key === ' ') {
      if (winGame) {
        try { localStorage.removeItem('elite_trader_save'); } catch(e) { console.error('Clear save failed:', e); }
      }
      resetPlayer();
      state = STATE_TITLE;
    }
    return;
  }

  if (state === STATE_MAP) {
    if (key === 'd' || key === 'D') {
      state = STATE_FLIGHT;
      initFlight(false);
    }
    if (key === 's' || key === 'S') saveGame();
    return;
  }

  if (state === STATE_FLIGHT || state === STATE_COMBAT) {
    if (key === 'm' || key === 'M') {
      if (state === STATE_FLIGHT) state = STATE_MAP;
    }
    return;
  }

  if (state === STATE_STATION) {
    if (key === '1') { state = STATE_TRADE; tradeSel = 0; }
    if (key === '2') { state = STATE_UPGRADES; upgradeSel = 0; }
    if (key === '3') { state = STATE_MISSIONS; missionSel = 0; generateMissions(); }
    if (key === 'm' || key === 'M') { state = STATE_MAP; saveGame(); }
    return;
  }

  if (state === STATE_TRADE) {
    if (key === 'ArrowUp' || key === 'w') tradeSel = (tradeSel - 1 + 6) % 6;
    if (key === 'ArrowDown' || key === 's') tradeSel = (tradeSel + 1) % 6;
    if (key === 'b' || key === 'B') buyItem();
    if (key === 'Enter') buyItem();
    if (key === 'x' || key === 'X') sellItem();
    if (key === 'Escape' || key === 'Backspace') state = STATE_STATION;
    return;
  }

  if (state === STATE_UPGRADES) {
    if (key === 'ArrowUp' || key === 'w') upgradeSel = (upgradeSel - 1 + 6) % 6;
    if (key === 'ArrowDown' || key === 's') upgradeSel = (upgradeSel + 1) % 6;
    if (key === 'Enter') buyUpgrade();
    if (key === 'Escape' || key === 'Backspace') state = STATE_STATION;
    return;
  }

  if (state === STATE_MISSIONS) {
    if (key === 'ArrowUp' || key === 'w') missionSel = (missionSel - 1 + 3) % 3;
    if (key === 'ArrowDown' || key === 's') missionSel = (missionSel + 1) % 3;
    if (key === 'Enter') acceptMission(missionSel);
    if (key === 'c' || key === 'C') completeMission();
    if (key === 'Escape' || key === 'Backspace') state = STATE_STATION;
    return;
  }
}

// ============================================================
// MAP CLICK HANDLING
// ============================================================
function handleMapClick() {
  if (!mouseClicked) return;
  mouseClicked = false;

  if (state !== STATE_MAP) return;

  var connected = getConnected(player.system);
  for (var i = 0; i < SYSTEMS.length; i++) {
    var sys = SYSTEMS[i];
    if (dist(mouseX, mouseY, sys.x, sys.y) < 14) {
      if (connected.indexOf(i) >= 0 && i !== player.system) {
        startJump(i);
        if (player.currentMission) {
          player.currentMission.timer--;
          if (player.currentMission.timer <= 0) {
            player.currentMission = null;
          }
        }
      }
      break;
    }
  }
}

// ============================================================
// TITLE SCREEN (Pass 1 — NES controls)
// ============================================================
function drawTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Starfield
  for (var i = 0; i < bgStars.length; i++) {
    var s = bgStars[i];
    var twinkle = Math.sin(frame * 0.03 + i) * 0.3 + 0.7;
    ctx.fillStyle = 'rgba(255,255,255,' + (s.b * twinkle) + ')';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }

  // Floating spore particles on title (Pass 3)
  for (var i = 0; i < 15; i++) {
    var sx = (100 + i * 30 + Math.sin(frame * 0.01 + i * 0.7) * 40) % GW;
    var sy = (GH / 2 + 60 + Math.cos(frame * 0.008 + i * 1.1) * 20);
    ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, TAU);
    ctx.fillStyle = 'rgba(100,200,150,' + (0.2 + Math.sin(frame * 0.02 + i) * 0.1) + ')';
    ctx.fill();
  }

  // Title baseling ship
  drawBaselingShip(GW / 2 + Math.sin(frame * 0.02) * 30, GH / 2 + 20 + Math.cos(frame * 0.015) * 10, -PI / 2 + Math.sin(frame * 0.01) * 0.2, 20);

  // Title text
  ctx.fillStyle = '#fff';
  ctx.font = '24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ELITE TRADER', GW / 2, 60);

  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Galaxy Tale', GW / 2, 78);

  // Baseling ship name
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Piloting: ' + statB.name + ' (Lv.' + statB.level + ')', GW / 2, 96);

  ctx.fillStyle = '#aaa';
  ctx.fillText('Trade spore goods across 20 mushroom colonies', GW / 2, 118);
  ctx.fillText('Fight reactor pirates, upgrade your ship, reach ELITE rank', GW / 2, 132);

  // Blinking prompt
  if (frame % 60 < 40) {
    ctx.fillStyle = '#ff0';
    ctx.font = '11px monospace';
    ctx.fillText('PRESS ENTER TO PLAY', GW / 2, 186);
  }

  // NES-style controls (Pass 1)
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('D-PAD / ARROWS = Steer    UP/W = Thrust    DOWN/S = Brake', GW / 2, GH - 60);
  ctx.fillText('A / SPACE / Z = Fire Laser    B / W = Thrust    M = Map', GW / 2, GH - 48);
  ctx.fillText('1/2/3 = Station Menus    B/X = Buy/Sell    ESC = Back', GW / 2, GH - 36);
  ctx.fillText('Buy low, sell high. Destroy pirates. Become ELITE.', GW / 2, GH - 22);

  // Version
  ctx.fillStyle = '#333';
  ctx.fillText('v2.0 | Reactor-Powered Baseling Starship', GW / 2, GH - 8);
}

// ============================================================
// TUTORIAL SCREEN (Pass 3)
// ============================================================
function drawTutorial() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < bgStarsFar.length; i++) {
    var s = bgStarsFar[i];
    ctx.fillStyle = 'rgba(255,255,255,' + s.b + ')';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }

  // Tutorial panel
  ctx.fillStyle = 'rgba(10,20,30,0.9)';
  ctx.fillRect(40, 60, GW - 80, GH - 120);
  ctx.strokeStyle = statB.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(40, 60, GW - 80, GH - 120);

  // Step indicator
  ctx.fillStyle = '#556';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TUTORIAL (' + (tutorialStep + 1) + '/' + TUTORIAL_STEPS.length + ')', GW / 2, 78);

  // Step dots
  for (var i = 0; i < TUTORIAL_STEPS.length; i++) {
    ctx.beginPath();
    ctx.arc(GW / 2 - (TUTORIAL_STEPS.length - 1) * 8 / 2 + i * 8, 88, 3, 0, TAU);
    ctx.fillStyle = i <= tutorialStep ? statB.color : '#333';
    ctx.fill();
  }

  // Tutorial text
  var step = TUTORIAL_STEPS[tutorialStep];
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  // Word wrap
  var words = step.text.split(' ');
  var lines = [];
  var currentLine = '';
  for (var i = 0; i < words.length; i++) {
    var test = currentLine + (currentLine ? ' ' : '') + words[i];
    if (ctx.measureText(test).width > GW - 120) {
      lines.push(currentLine);
      currentLine = words[i];
    } else {
      currentLine = test;
    }
  }
  if (currentLine) lines.push(currentLine);
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], GW / 2, 120 + i * 16);
  }

  // Baseling ship demo
  drawBaselingShip(GW / 2, 180, -PI / 2, 16);

  // Key prompt
  if (frame % 60 < 40) {
    ctx.fillStyle = '#ff0';
    ctx.font = '10px monospace';
    ctx.fillText('[' + step.key + ']', GW / 2, GH - 80);
  }
}

// ============================================================
// GAME OVER
// ============================================================
function drawGameOver() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);

  for (var i = 0; i < bgStarsFar.length; i++) {
    var s = bgStarsFar[i];
    ctx.fillStyle = 'rgba(255,255,255,' + s.b + ')';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  }

  if (winGame) {
    // Victory particles (Pass 3)
    if (frame % 5 === 0) {
      spawnScreenParticles(rng(50, GW - 50), rng(30, GH - 30), 3, '#ff0', 1, 30);
    }
    drawScreenParticles();

    ctx.fillStyle = '#ff0'; ctx.font = '20px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ELITE STATUS ACHIEVED!', GW / 2, 60);
    ctx.fillStyle = statB.color; ctx.font = '11px monospace';
    ctx.fillText(statB.name + ' is the greatest trader in the Tasern galaxy.', GW / 2, 96);
    ctx.fillStyle = '#fff'; ctx.font = '10px monospace';
    ctx.fillText('Kills: ' + player.kills + '   Trade Profit: ' + player.tradeProfit + 'M', GW / 2, 128);
    ctx.fillText('Missions Completed: ' + player.missionsComplete, GW / 2, 148);
    ctx.fillText('Reputation: ' + player.reputation, GW / 2, 168);
    // Stat contribution (Pass 1)
    ctx.fillStyle = '#668'; ctx.font = '9px monospace';
    ctx.fillText('Score Multiplier: x' + statScoreMult().toFixed(2) + ' (INT+Level)', GW / 2, 192);
  } else {
    ctx.fillStyle = '#f44'; ctx.font = '18px monospace'; ctx.textAlign = 'center';
    ctx.fillText('SHIP DESTROYED', GW / 2, 60);
    ctx.fillStyle = '#aaa'; ctx.font = '10px monospace';
    ctx.fillText(statB.name + '\'s reactor breached in ' + SYSTEMS[player.system].name, GW / 2, 100);
    ctx.fillText('Final Rank: ' + RANKS[player.rank], GW / 2, 125);
    ctx.fillText('Kills: ' + player.kills + '   Credits earned: ' + player.tradeProfit + 'M', GW / 2, 150);
    ctx.fillText('Reputation: ' + player.reputation, GW / 2, 170);
  }

  if (frame % 60 < 40) {
    ctx.fillStyle = '#4af'; ctx.font = '11px monospace'; ctx.textAlign = 'center';
    ctx.fillText('PRESS ENTER', GW / 2, 220);
  }
}

// ============================================================
// PLAYER RESET
// ============================================================
function resetPlayer() {
  player.credits = 1000;
  player.cargo = [];
  player.cargoMax = 20;
  player.fuel = 50;
  player.fuelMax = 50;
  player.system = 0;
  player.ship = { x: 240, y: 260, vx: 0, vy: 0, angle: -PI/2, hp: 100 + statHpBonus(), hpMax: 100 + statHpBonus(), shield: 30 + statShieldBonus(), shieldMax: 30 + statShieldBonus() };
  player.laser = 1; player.shieldTier = 1; player.cargoTier = 1;
  player.engineTier = 1; player.fuelTier = 1; player.scanner = false;
  player.kills = 0; player.tradeProfit = 0; player.rank = 0;
  player.criminal = 0; player.missionsComplete = 0;
  player.currentMission = null; player.missionTimer = 0;
  player.reputation = 0;
  winGame = false; rankFlash = 0;
  boss = null; bossWarning = 0;
  activeHazard = null; hazardTimer = 0;
  screenParticles = [];
  initPrices();
}

// ============================================================
// MAIN LOOP
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (rankFlash > 0) rankFlash--;

  if (state === STATE_TITLE) return;
  if (state === STATE_TUTORIAL) return;
  if (state === STATE_GAMEOVER) {
    updateScreenParticles();
    return;
  }
  if (state === STATE_MAP) { handleMapClick(); return; }
  if (state === STATE_JUMP) { updateJump(); return; }
  if (state === STATE_FLIGHT || state === STATE_COMBAT) { updateFlight(dt); return; }
}

function draw(dt) {
  switch(state) {
    case STATE_TITLE: drawTitle(); break;
    case STATE_TUTORIAL: drawTutorial(); break;
    case STATE_MAP: drawGalaxyMap(); break;
    case STATE_FLIGHT:
    case STATE_COMBAT:
      ctx.save();
      TAS.fx.applyShake();
      drawFlight();
      ctx.restore();
      TAS.fx.drawFlash(GW, GH);
      break;
    case STATE_JUMP: drawJump(); break;
    case STATE_STATION: drawStation(); break;
    case STATE_TRADE: drawTrade(); break;
    case STATE_UPGRADES: drawUpgrades(); break;
    case STATE_MISSIONS: drawMissions(); break;
    case STATE_GAMEOVER: drawGameOver(); break;
  }

  TAS.input.drawTouchControls(GW, GH);
}

TAS.loop.start(update, draw);

})();
</script>
