<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GAME_NAME</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320; // game world resolution
const ctx = TAS.ctx;

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'FIRE' } });

let state = 'title';
let score = 0;
let highScore = TAS.score.load('GAME_KEY_hi');
let lives = 3;
let level = 1;
let frame = 0;

// === YOUR GAME STATE HERE ===

function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  level = 1;
  TAS.particles.clear();
  // ... init your game objects
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    // ... your game logic
    // Use TAS.input.keys['ArrowLeft'], TAS.input.touch.left, etc.
    // Use TAS.hit.rectOverlap() for collisions
    // Use TAS.particles.spawn() for effects
    // Use TAS.fx.shake() / TAS.fx.flash() for impact
    // Use TAS.audio.playTone() for sound
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    TAS.ui.drawTitle('GAME NAME', 'A Tasern Tale', GW, GH, { frame });
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Level: ' + level });
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  // ... draw your game objects

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  TAS.ui.drawHUD(score, level, lives, GW);
  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
</html>
