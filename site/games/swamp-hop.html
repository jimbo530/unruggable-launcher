<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Hop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === NFT STAT BONUSES ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Bridge shared baseling stats (getMults, ARCADE-STATS.md) onto statB; helpers read statB live.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[swamp-hop] player init failed:', e && e.message); });
}

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a'], labels: { a: 'HOP' } });

// Grid setup: 15 columns, 13 rows
var COLS = 15;
var ROWS = 13;
var CELL_W = Math.floor(GW / COLS); // 32
var CELL_H = Math.floor((GH - 28) / ROWS); // ~22 (minus HUD bar)
var HUD_H = 28;
var GRID_TOP = HUD_H;

// === ENEMY SPRITES ===
// Our shared library art: fungal-folklore portraits (art/enemies/*.jpg) plus the
// sea-set snake (art/sea/enemy-snake.png). Every sprite branch keeps the original
// procedural drawing as its fallback until the image loads.
if (window.TasernArt) {
  TasernArt.preload('enemies');
  TasernArt.load('art/sea/enemy-snake.png');
}
function artImg(path) {
  var im = (window.TasernArt && TasernArt.getImg) ? TasernArt.getImg(path) : null;
  return (im && im.complete && im.naturalWidth) ? im : null;
}
function enemyImg(name) { return name ? artImg('art/enemies/enemy-' + name + '.jpg') : null; }
// Draw a sprite into a top-left rect, horizontally flipped when facing left.
function drawEnemySprite(im, x, y, w, h, flip) {
  ctx.save();
  if (flip) { ctx.translate(x + w, y); ctx.scale(-1, 1); ctx.drawImage(im, 0, 0, w, h); }
  else { ctx.drawImage(im, x, y, w, h); }
  ctx.restore();
}

// === STAT-DERIVED CONSTANTS ===
// STR: knockback distance on snake/gator encounters, bonus damage to bosses
var STR_KNOCKBACK = Math.max(1, Math.floor(statB.str / 5));
// DEX: hop cooldown reduction, dodge chance
var DEX_COOLDOWN_MULT = Math.max(0.3, 1.0 - (statB.dex - 10) * 0.03); // lower = faster hops
var DEX_DODGE_CHANCE = Math.min(0.3, (statB.dex - 10) * 0.015); // chance to dodge vehicle
// CON: extra starting lives, longer timer
var CON_EXTRA_LIVES = Math.floor(Math.max(0, statB.con - 10) / 4);
var CON_TIMER_BONUS = Math.max(0, (statB.con - 10) * 0.5); // extra seconds per life
// INT: score multiplier, reveal hidden items
var INT_SCORE_MULT = 1.0 + Math.max(0, (statB.int - 10) * 0.04); // +4% per INT over 10
var INT_REVEAL_CHANCE = Math.min(0.5, (statB.int - 10) * 0.025); // chance to see hidden bonuses
// WIS: hazard warning, timer regen
var WIS_WARN_RADIUS = Math.max(0, Math.floor((statB.wis - 10) / 3)); // cells of warning
var WIS_TIMER_REGEN = Math.max(0, (statB.wis - 10) * 0.02); // seconds per second regen
// CHA: companion spawn rate, shop discounts (future), bonus fly attract
var CHA_COMPANION_MULT = 1.0 + Math.max(0, (statB.cha - 10) * 0.08); // companion spawn boost
var CHA_FLY_ATTRACT = Math.max(0, (statB.cha - 10) * 0.5); // fly magnetism pixels

// Player color from statB
var PLAYER_COLOR = statB.color || '#44dd88';
var PLAYER_NAME = statB.name || 'Baseling';
var PLAYER_ICON = statB.icon || 'B';

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('swamphop_hi');
var lives = 3;
var level = 1;
var frame = 0;
var bonusLifeThreshold = 10000;
var showTutorial = true;
var tutorialTimer = 0;
var TUTORIAL_DURATION = 6;
var tutorialDismissed = false;

// Score popups
var scorePopups = [];

// Zone themes
var ZONES = [
  { name: 'Murkmire Gardens', waterColor: '#1a3a5a', waterDark: '#0e2840', grassColor: '#2d5a1e', roadColor: '#3a3a3a', fogColor: 'rgba(20,60,40,0.15)' },
  { name: 'Mycelium Depths', waterColor: '#2a2a4a', waterDark: '#1a1c2c', grassColor: '#3a4a2e', roadColor: '#2e2e3a', fogColor: 'rgba(40,20,60,0.15)' },
  { name: 'Spore Canopy', waterColor: '#1a5a4a', waterDark: '#0e3830', grassColor: '#1e5a2e', roadColor: '#3a3a2e', fogColor: 'rgba(20,60,20,0.12)' },
  { name: 'POOP Bog', waterColor: '#4a2a1a', waterDark: '#301a0e', grassColor: '#4a3a1e', roadColor: '#3a2a2a', fogColor: 'rgba(60,20,10,0.18)' }
];

function getZone() {
  var idx = Math.floor((level - 1) / 3) % ZONES.length;
  return ZONES[idx];
}

// Player
var frog = { col: 7, row: 12, x: 0, y: 0, dir: 0, hopAnim: 0, dead: false, riding: null };
var hopCooldown = 0;
var HOP_COOLDOWN = 0.15; // base seconds between hops
var deathTimer = 0;
var DEATH_DURATION = 1.2;

// Timer bar
var timeLeft = 0;
var TIME_PER_LIFE = 30; // base seconds

// Home slots
var HOME_COUNT = 5;
var homes = [];

// Lanes
var lanes = [];

// Bonus items
var bonusItems = []; // mycelium flies, companion baselings, spore items

// Swamp hazards (overlay hazards that appear independently)
var tasernHazards = [];
// Baseling collectible items
var tasernItems = [];

// Boss state
var bossActive = false;
var boss = null;

// Level-complete state
var levelCompleteTimer = 0;
var LEVEL_COMPLETE_DURATION = 2.0;

// Zone transition
var zoneTransTimer = 0;
var ZONE_TRANS_DURATION = 1.5;
var prevZoneName = '';

// Track previous input to detect fresh presses
var prevKeys = {};
var prevTouch = {};

// Particle burst queue (for zone transitions, boss kills, etc.)
var particleBursts = [];

// Hazard warning indicators
var hazardWarnings = [];

// === COLORS (zone-dependent now) ===
function COL_GRASS() { return getZone().grassColor; }
function COL_ROAD() { return getZone().roadColor; }
var COL_ROAD_LINE = '#555';
function COL_WATER() { return getZone().waterColor; }
function COL_WATER_DARK() { return getZone().waterDark; }
var COL_MEDIAN = '#4a7a2a';
var COL_SAFE = '#3a6a2a';
var COL_HOME_BG = '#0e3048';
var COL_HOME_PAD = '#2a7040';

// === INIT HELPERS ===
function cellX(col) { return col * CELL_W; }
function cellY(row) { return GRID_TOP + row * CELL_H; }

// === SCORE POPUP SYSTEM ===
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.2, maxLife: 1.2 });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= dt * 30;
    scorePopups[i].life -= dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    var alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 11px monospace';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === BASELING SWAMP HAZARDS ===

// Bog Troll: appears on road lanes at higher levels, slower but wider
// Bog Drake: flies across water lanes, kills on contact
// Lily Spore Cloud: drifts across median, slows your baseling
// Fungal Crawler: toxic mold replaces some snakes on logs

function initTasernHazards() {
  tasernHazards = [];
  tasernItems = [];

  // Lily spore clouds on median at level 3+
  if (level >= 3) {
    var sporeCount = Math.min(3, Math.floor(level / 3));
    for (var i = 0; i < sporeCount; i++) {
      tasernHazards.push({
        type: 'sporeCloud',
        x: TAS.math.randRange(CELL_W * 2, GW - CELL_W * 3),
        y: cellY(6),
        w: CELL_W * 1.5,
        h: CELL_H,
        speed: TAS.math.randRange(10, 30) * (Math.random() > 0.5 ? 1 : -1),
        pulseTimer: Math.random() * 6,
        active: true
      });
    }
  }

  // Will-o-wisps on water lanes at level 4+
  if (level >= 4) {
    var wispCount = Math.min(2, Math.floor((level - 3) / 2));
    for (var i = 0; i < wispCount; i++) {
      var wispRow = TAS.math.randInt(1, 5);
      tasernHazards.push({
        type: 'wisp',
        x: TAS.math.randRange(0, GW),
        y: cellY(wispRow),
        row: wispRow,
        w: CELL_W * 0.6,
        h: CELL_H * 0.6,
        speedX: TAS.math.randRange(20, 50) * (Math.random() > 0.5 ? 1 : -1),
        speedY: TAS.math.randRange(-10, 10),
        flickerTimer: 0,
        active: true
      });
    }
  }

  // Quicksand patches on safe rows at level 5+
  if (level >= 5) {
    var qsCount = Math.min(2, Math.floor((level - 4) / 3));
    for (var i = 0; i < qsCount; i++) {
      var qsRow = (Math.random() > 0.5) ? 6 : 12;
      tasernHazards.push({
        type: 'quicksand',
        col: TAS.math.randInt(2, COLS - 3),
        row: qsRow,
        x: 0, y: 0,
        w: CELL_W * 2,
        h: CELL_H,
        sinkTimer: 0,
        trapping: false,
        active: true
      });
    }
  }

  // Baseling items: POOP tokens, spore gems, garden seeds
  var itemCount = Math.min(3, 1 + Math.floor(level / 2));
  for (var i = 0; i < itemCount; i++) {
    var itemType = ['glowcap', 'manaCrystal', 'healingMoss'][TAS.math.randInt(0, 2)];
    var itemRow = TAS.math.randInt(1, 11);
    // INT_REVEAL_CHANCE determines if hidden items are visible
    var hidden = Math.random() > (0.5 + INT_REVEAL_CHANCE);
    tasernItems.push({
      type: itemType,
      col: TAS.math.randInt(1, COLS - 2),
      row: itemRow,
      collected: false,
      hidden: hidden,
      timer: 15 + Math.random() * 10,
      bobPhase: Math.random() * Math.PI * 2
    });
  }
}

// Bog Drake: lane hazard that flies across the spore bog
function spawnSwampDrake() {
  if (level < 6) return;
  if (Math.random() < 0.004 * (1 + level * 0.1)) {
    var drakeRow = TAS.math.randInt(1, 5);
    var dir = Math.random() > 0.5 ? 1 : -1;
    tasernHazards.push({
      type: 'swampDrake',
      x: dir > 0 ? -CELL_W * 2 : GW + CELL_W,
      y: cellY(drakeRow) - 2,
      row: drakeRow,
      w: CELL_W * 2,
      h: CELL_H + 4,
      dir: dir,
      speed: 80 + level * 5,
      wingPhase: 0,
      active: true
    });
  }
}

// Swamp Mold Troll: replaces some vehicles on road at level 7+
function initBogTrolls(laneObjs, row) {
  if (level >= 7 && Math.random() < 0.3) {
    laneObjs.push({
      x: TAS.math.randRange(CELL_W * 2, GW - CELL_W * 4),
      w: CELL_W * 2.5,
      h: CELL_H,
      vtype: 'bogTroll',
      isTasern: true,
      swingPhase: 0
    });
  }
}

// === BOSS SYSTEM ===
// Boss every 5 levels: sits in home row, must be hit with timed hops
var BOSS_TYPES = [
  { name: 'Swamp Mold King', hp: 3, color: '#7a444a', size: 2.5, attackRate: 2.0, spr: 'slime-mold' },
  { name: 'Fungi Gator', hp: 5, color: '#2a6a4a', size: 3.0, attackRate: 1.5, spr: 'wyrm' },
  { name: 'Spore Titan', hp: 7, color: '#a855f7', size: 3.5, attackRate: 1.2, spr: 'troll' },
  { name: 'Elder Mycelium', hp: 10, color: '#e6482e', size: 4.0, attackRate: 1.0, spr: 'root-witch' }
];

function initBoss() {
  if (level % 5 !== 0) { bossActive = false; boss = null; return; }
  var bossIdx = Math.min(BOSS_TYPES.length - 1, Math.floor(level / 5) - 1);
  var bt = BOSS_TYPES[bossIdx];
  bossActive = true;
  boss = {
    name: bt.name,
    hp: bt.hp,
    maxHp: bt.hp,
    color: bt.color,
    spr: bt.spr,
    size: bt.size,
    x: GW / 2,
    y: cellY(0) + CELL_H / 2,
    attackTimer: bt.attackRate,
    attackRate: bt.attackRate,
    hitFlash: 0,
    projectiles: [],
    defeated: false,
    deathAnim: 0,
    shakeAmt: 0
  };
  // Clear homes for boss fight
  for (var i = 0; i < homes.length; i++) {
    homes[i].filled = false;
    homes[i].bonusType = null;
  }
}

function updateBoss(dt) {
  if (!bossActive || !boss || boss.defeated) return;

  boss.hitFlash = Math.max(0, boss.hitFlash - dt * 4);
  boss.shakeAmt = Math.max(0, boss.shakeAmt - dt * 8);

  // Boss sways
  boss.x = GW / 2 + Math.sin(frame * 0.03) * 40;

  // Attack: fire projectiles down
  boss.attackTimer -= dt;
  if (boss.attackTimer <= 0) {
    boss.attackTimer = boss.attackRate;
    var projCount = Math.min(3, 1 + Math.floor((boss.maxHp - boss.hp) / 2));
    for (var i = 0; i < projCount; i++) {
      boss.projectiles.push({
        x: boss.x + TAS.math.randRange(-30, 30),
        y: boss.y + boss.size * 12,
        speed: 60 + level * 3,
        w: 8,
        h: 8,
        life: 4
      });
    }
    TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 100);
  }

  // Update projectiles
  for (var i = boss.projectiles.length - 1; i >= 0; i--) {
    var p = boss.projectiles[i];
    p.y += p.speed * dt;
    p.life -= dt;

    // Hit player
    if (!frog.dead && TAS.hit.rectOverlap(
      frog.x + 2, frog.y + 2, CELL_W - 4, CELL_H - 4,
      p.x - p.w / 2, p.y - p.h / 2, p.w, p.h
    )) {
      // DEX dodge check
      if (Math.random() < DEX_DODGE_CHANCE) {
        spawnScorePopup(frog.x + CELL_W / 2, frog.y, 'DODGE!', '#44ddff');
        TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#44ddff', 6, 1);
      } else {
        killFrog('bossAttack');
      }
      boss.projectiles.splice(i, 1);
      continue;
    }

    if (p.life <= 0 || p.y > GH) {
      boss.projectiles.splice(i, 1);
    }
  }

  // Player hitting boss: reach row 0 near boss
  if (frog.row === 0 && !frog.dead) {
    var dist = Math.abs(frog.x + CELL_W / 2 - boss.x);
    if (dist < boss.size * 15) {
      // STR determines damage
      var dmg = Math.max(1, Math.floor(statB.str / 5));
      boss.hp -= dmg;
      boss.hitFlash = 1;
      boss.shakeAmt = 5;
      var dmgText = '-' + dmg + ' HP';
      spawnScorePopup(boss.x, boss.y - 10, dmgText, '#ff4444');
      TAS.audio.playTone(200, 0.15, 'square', 0.1, 120);
      TAS.fx.shake(6, 0.9);
      TAS.particles.spawn(boss.x, boss.y, boss.color, 12, 3, { gravity: 0.05 });

      if (boss.hp <= 0) {
        boss.defeated = true;
        boss.deathAnim = 2.0;
        var bossScore = Math.floor(2000 * INT_SCORE_MULT);
        addScore(bossScore);
        spawnScorePopup(boss.x, boss.y - 20, '+' + bossScore, '#f4b41b');
        TAS.audio.playMelody([[392, 0.1], [523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
        TAS.fx.flash('#f4b41b', 0.5);
        // Big particle burst
        for (var c = 0; c < 5; c++) {
          TAS.particles.spawn(
            boss.x + TAS.math.randRange(-30, 30),
            boss.y + TAS.math.randRange(-15, 15),
            ['#ff4444', '#ffaa22', '#ffdd44', '#44ff88', '#4488ff'][c], 15, 4, { gravity: 0.08 }
          );
        }
      } else {
        // Knockback player (STR determines how far back they go)
        frog.row = Math.min(12, frog.row + Math.max(2, 4 - STR_KNOCKBACK));
        frog.y = cellY(frog.row);
        frog.hopAnim = 0.2;
      }
    }
  }

  // Boss death anim
  if (boss.defeated) {
    boss.deathAnim -= dt;
    if (boss.deathAnim <= 0) {
      bossActive = false;
      // Fill all homes to trigger level complete
      for (var i = 0; i < homes.length; i++) homes[i].filled = true;
      addScore(1000);
      state = 'levelComplete';
      levelCompleteTimer = LEVEL_COMPLETE_DURATION;
    }
  }
}

function drawBoss() {
  if (!bossActive || !boss) return;

  // Projectiles
  for (var i = 0; i < boss.projectiles.length; i++) {
    var p = boss.projectiles[i];
    ctx.fillStyle = '#aa2244';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.w / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.w / 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (boss.defeated) {
    ctx.globalAlpha = Math.max(0, boss.deathAnim / 2.0);
  }

  var bx = boss.x + (boss.shakeAmt > 0 ? TAS.math.randRange(-boss.shakeAmt, boss.shakeAmt) : 0);
  var by = boss.y;
  var s = boss.size * 12;

  // Body — shared folklore portrait first, facing the player; the procedural
  // blob + eyes below stay as fallback until art loads.
  var _bim = enemyImg(boss.spr);
  if (_bim) {
    var _bw = s * 2, _bh = s * 1.7;
    var _bx2 = bx - _bw / 2, _by2 = by - _bh * 0.55;
    drawEnemySprite(_bim, _bx2, _by2, _bw, _bh, !frog.dead && frog.x + CELL_W / 2 < bx);
    if (boss.hitFlash > 0) {
      ctx.save(); ctx.globalAlpha = 0.55 * Math.min(1, boss.hitFlash);
      ctx.fillStyle = '#fff'; ctx.fillRect(_bx2, _by2, _bw, _bh); ctx.restore();
    }
  } else {
    ctx.fillStyle = boss.hitFlash > 0 ? '#ffffff' : boss.color;
    ctx.beginPath();
    ctx.ellipse(bx, by, s, s * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#ff2222';
    ctx.beginPath();
    ctx.arc(bx - s * 0.3, by - s * 0.2, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bx + s * 0.3, by - s * 0.2, s * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bar
  if (!boss.defeated) {
    var barW = s * 2;
    var barH = 4;
    var barX = bx - barW / 2;
    var barY = by - s - 8;
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, barH);
    var hpPct = boss.hp / boss.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : (hpPct > 0.25 ? '#ccaa22' : '#cc2222');
    ctx.fillRect(barX, barY, barW * hpPct, barH);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name, bx, barY - 3);
  }

  ctx.globalAlpha = 1;
}

// === INIT HELPERS ===

function initHomes() {
  homes = [];
  var spacing = COLS / HOME_COUNT;
  for (var i = 0; i < HOME_COUNT; i++) {
    homes.push({
      col: Math.floor(spacing * i + spacing / 2),
      filled: false,
      hasBonus: false,
      bonusType: null
    });
  }
  // Randomly place fungi gators/bonuses in some homes
  if (level > 1 && !bossActive) {
    var gatorHome = TAS.math.randInt(0, HOME_COUNT - 1);
    homes[gatorHome].bonusType = 'gator';
  }
  // CHA increases fly spawn in homes
  var flyChance = 0.5 + CHA_COMPANION_MULT * 0.05;
  if (Math.random() < flyChance) {
    var flyHome = TAS.math.randInt(0, HOME_COUNT - 1);
    if (!homes[flyHome].bonusType) {
      homes[flyHome].bonusType = 'fly';
      homes[flyHome].hasBonus = true;
    }
  }
}

function initLanes() {
  lanes = [];
  var speedMult = 1 + (level - 1) * 0.15;

  // Row 0: home row (handled separately)
  lanes.push({ type: 'home', row: 0, objects: [] });

  // Rows 1-5: water/swamp lanes
  for (var r = 1; r <= 5; r++) {
    var dir = (r % 2 === 0) ? 1 : -1;
    var laneType;
    var speed;
    var objs = [];

    if (r === 1 || r === 4) {
      laneType = 'log';
      speed = (0.6 + Math.random() * 0.4) * speedMult;
      var logCount = Math.max(2, 4 - Math.floor(level / 3));
      var logLen = TAS.math.randInt(3, 5);
      for (var i = 0; i < logCount; i++) {
        var lx = (i * (GW / logCount)) + TAS.math.randRange(-20, 20);
        // Fungal Crawler replaces some snakes at level 4+
        var hasCrawler = (level >= 4 && Math.random() < 0.25);
        objs.push({
          x: lx, w: logLen * CELL_W, h: CELL_H - 2,
          hasSnake: !hasCrawler && (level > 2 && Math.random() < 0.2),
          hasCrawler: hasCrawler,
          snakePos: Math.random(),
          crawlerPos: Math.random()
        });
      }
    } else if (r === 2 || r === 5) {
      laneType = 'turtle';
      speed = (0.4 + Math.random() * 0.3) * speedMult;
      var turtleGroups = Math.max(2, 4 - Math.floor(level / 4));
      var groupSize = TAS.math.randInt(2, 3);
      for (var i = 0; i < turtleGroups; i++) {
        var tx = i * (GW / turtleGroups) + TAS.math.randRange(-10, 10);
        objs.push({
          x: tx, w: groupSize * CELL_W, h: CELL_H - 2,
          submerge: Math.random() < (0.2 + level * 0.05),
          submergeTimer: Math.random() * 6,
          submerged: false,
          submergeDuration: 1.5 + Math.random()
        });
      }
    } else {
      // Lily pad lane (row 3)
      laneType = 'lily';
      speed = (0.3 + Math.random() * 0.3) * speedMult;
      var lilyCount = Math.max(3, 5 - Math.floor(level / 3));
      for (var i = 0; i < lilyCount; i++) {
        objs.push({
          x: i * (GW / lilyCount) + TAS.math.randRange(-10, 10),
          w: CELL_W + 4, h: CELL_H - 2
        });
      }
    }

    lanes.push({ type: laneType, row: r, dir: dir, speed: speed, objects: objs });
  }

  // Row 6: safe median
  lanes.push({ type: 'median', row: 6, objects: [] });

  // Rows 7-11: road lanes
  for (var r = 7; r <= 11; r++) {
    var dir = (r % 2 === 0) ? 1 : -1;
    var speed;
    var objs = [];
    var vehicleType;

    if (r === 7 || r === 10) {
      vehicleType = 'cart';
      speed = (0.8 + Math.random() * 0.5) * speedMult;
      var count = TAS.math.randInt(2, 3);
      for (var i = 0; i < count; i++) {
        objs.push({
          x: i * (GW / count) + TAS.math.randRange(0, 40),
          w: CELL_W * 1.5, h: CELL_H - 4, vtype: 'cart'
        });
      }
    } else if (r === 8 || r === 11) {
      vehicleType = 'truck';
      speed = (1.0 + Math.random() * 0.6) * speedMult;
      var count = TAS.math.randInt(2, 3);
      for (var i = 0; i < count; i++) {
        objs.push({
          x: i * (GW / count) + TAS.math.randRange(0, 50),
          w: CELL_W * 2.2, h: CELL_H - 2, vtype: 'truck'
        });
      }
    } else {
      // Fast racers (row 9)
      vehicleType = 'racer';
      speed = (1.8 + Math.random() * 0.8) * speedMult;
      var count = TAS.math.randInt(1, 2);
      for (var i = 0; i < count; i++) {
        objs.push({
          x: i * (GW / count) + TAS.math.randRange(0, 80),
          w: CELL_W * 1.2, h: CELL_H - 4, vtype: 'racer'
        });
      }
    }

    // Bog Troll addition
    initBogTrolls(objs, r);

    lanes.push({ type: 'road', row: r, dir: dir, speed: speed, objects: objs, vehicleType: vehicleType });
  }

  // Row 12: starting safe zone
  lanes.push({ type: 'safe', row: 12, objects: [] });
}

function initBonusItems() {
  bonusItems = [];
}

function spawnBonus() {
  // Mycelium fly on a water lane
  if (Math.random() < 0.008 && bonusItems.length < 2) {
    var laneIdx = TAS.math.randInt(1, 5);
    var lane = lanes[laneIdx];
    if (lane && lane.objects.length > 0) {
      var obj = lane.objects[TAS.math.randInt(0, lane.objects.length - 1)];
      bonusItems.push({
        type: 'fly',
        laneIdx: laneIdx,
        objIdx: lane.objects.indexOf(obj),
        relX: Math.random() * (obj.w - CELL_W * 0.5),
        timer: 8 + Math.random() * 4,
        points: 200
      });
    }
  }
  // Baseling companion on median — CHA boosts spawn rate
  var companionRate = 0.003 * CHA_COMPANION_MULT;
  if (Math.random() < companionRate && !bonusItems.some(function(b) { return b.type === 'companion'; })) {
    bonusItems.push({
      type: 'companion',
      x: TAS.math.randRange(CELL_W, GW - CELL_W * 2),
      y: cellY(6) + 2,
      timer: 10 + (statB.cha - 10) * 0.3, // CHA makes companions stick around longer
      points: 500,
      carried: false
    });
  }
}

// === START / RESET ===
function startGame() {
  state = 'playing';
  score = 0;
  // CON grants extra starting lives
  lives = 3 + CON_EXTRA_LIVES + statB.lives;
  level = 1;
  bonusLifeThreshold = 10000;
  scorePopups = [];
  TAS.particles.clear();
  prevZoneName = '';
  if (!tutorialDismissed) {
    showTutorial = true;
    tutorialTimer = TUTORIAL_DURATION;
  }
  initLevel();
}

function initLevel() {
  initHomes();
  initLanes();
  initBonusItems();
  initTasernHazards();
  initBoss();
  resetFrog();
  // CON grants extra timer
  timeLeft = TIME_PER_LIFE + CON_TIMER_BONUS;

  // Zone transition check
  var z = getZone();
  if (z.name !== prevZoneName && prevZoneName !== '') {
    zoneTransTimer = ZONE_TRANS_DURATION;
  }
  prevZoneName = z.name;
}

function resetFrog() {
  frog.col = 7;
  frog.row = 12;
  frog.x = cellX(7);
  frog.y = cellY(12);
  frog.dir = 0;
  frog.hopAnim = 0;
  frog.dead = false;
  frog.riding = null;
  // DEX affects initial cooldown
  hopCooldown = 0.3 * DEX_COOLDOWN_MULT;
  deathTimer = 0;
  timeLeft = TIME_PER_LIFE + CON_TIMER_BONUS;
}

function killFrog(reason) {
  if (frog.dead) return;
  frog.dead = true;
  deathTimer = DEATH_DURATION;
  lives--;

  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.12, 80);
  TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#ff4444', 15, 3, { gravity: 0.05 });
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#ff0000', 0.25);

  // Death-specific particles
  if (reason === 'water') {
    // Water splash
    TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#4488cc', 12, 2, { gravity: 0.04 });
    TAS.particles.spawn(frog.x + CELL_W / 2, frog.y, '#88ccff', 8, 1.5);
  } else if (reason === 'vehicle' || reason === 'bogTroll') {
    // Squish
    TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, PLAYER_COLOR, 20, 2, { gravity: 0.1 });
  } else if (reason === 'sporeCloud') {
    // Toxic green
    TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#88ff44', 10, 2);
  } else if (reason === 'wisp') {
    // Blue fire
    TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#44aaff', 12, 2.5);
  }
}

function addScore(pts) {
  // INT boosts all score gains
  pts = Math.floor(pts * INT_SCORE_MULT * statB.scoreMult);
  score += pts;
  if (score >= bonusLifeThreshold) {
    lives++;
    bonusLifeThreshold += 10000;
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100);
    TAS.fx.flash('#38d973', 0.2);
    spawnScorePopup(GW / 2, GH / 2, '1-UP!', '#38d973');
  }
}

// === HAZARD WARNING SYSTEM (WIS) ===
function updateHazardWarnings() {
  hazardWarnings = [];
  if (WIS_WARN_RADIUS <= 0) return;

  // Warn about vehicles, snakes, gators, spore clouds near player
  var px = frog.col;
  var py = frog.row;

  // Check road vehicles
  for (var i = 0; i < lanes.length; i++) {
    var lane = lanes[i];
    if (lane.type !== 'road') continue;
    if (Math.abs(lane.row - py) > WIS_WARN_RADIUS) continue;

    for (var j = 0; j < lane.objects.length; j++) {
      var obj = lane.objects[j];
      var objCol = Math.round(obj.x / CELL_W);
      if (Math.abs(objCol - px) <= WIS_WARN_RADIUS + 2) {
        hazardWarnings.push({
          x: obj.x + obj.w / 2,
          y: cellY(lane.row) - 4,
          type: 'vehicle'
        });
      }
    }
  }

  // Check swamp hazards
  for (var i = 0; i < tasernHazards.length; i++) {
    var h = tasernHazards[i];
    if (!h.active) continue;
    var hCol = Math.round(h.x / CELL_W);
    var hRow = h.row || Math.round((h.y - GRID_TOP) / CELL_H);
    if (Math.abs(hRow - py) <= WIS_WARN_RADIUS && Math.abs(hCol - px) <= WIS_WARN_RADIUS + 1) {
      hazardWarnings.push({
        x: h.x + (h.w || CELL_W) / 2,
        y: h.y - 4,
        type: h.type
      });
    }
  }
}

function drawHazardWarnings() {
  if (hazardWarnings.length === 0) return;
  for (var i = 0; i < hazardWarnings.length; i++) {
    var w = hazardWarnings[i];
    var alpha = 0.4 + Math.sin(frame * 0.15) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffaa22';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('!', w.x, w.y);
    ctx.globalAlpha = 1;
  }
}

// === INPUT HANDLING ===
function justPressed(key) {
  var now = TAS.input.keys[key];
  var was = prevKeys[key];
  return now && !was;
}

function justTouched(dir) {
  var now = TAS.input.touch[dir];
  var was = prevTouch[dir];
  return now && !was;
}

function saveInputState() {
  prevKeys = {};
  for (var k in TAS.input.keys) {
    prevKeys[k] = TAS.input.keys[k];
  }
  prevTouch = {
    left: TAS.input.touch.left,
    right: TAS.input.touch.right,
    up: TAS.input.touch.up,
    down: TAS.input.touch.down,
    a: TAS.input.touch.a
  };
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);

  if (state === 'title') {
    if (picking) { saveInputState(); return; }
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      saveInputState();
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    saveInputState();
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    saveInputState();
    return;
  }

  if (state === 'levelComplete') {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      level++;
      initLevel();
      state = 'playing';
    }
    saveInputState();
    return;
  }

  if (state === 'playing') {
    // Zone transition overlay
    if (zoneTransTimer > 0) {
      zoneTransTimer -= dt;
    }

    // Tutorial timer
    if (showTutorial && tutorialTimer > 0) {
      tutorialTimer -= dt;
      // Any input dismisses tutorial
      if (Object.values(TAS.input.keys).some(Boolean) || Object.values(TAS.input.touch).some(Boolean)) {
        tutorialTimer = 0;
        tutorialDismissed = true;
      }
      if (tutorialTimer <= 0) {
        showTutorial = false;
        tutorialDismissed = true;
      }
    }

    // Handle death
    if (frog.dead) {
      deathTimer -= dt;
      if (deathTimer <= 0) {
        if (lives <= 0) {
          if (score > highScore) {
            highScore = score;
            TAS.score.save('swamphop_hi', highScore);
          }
          state = 'gameOver';
        } else {
          resetFrog();
        }
      }
      saveInputState();
      return;
    }

    // Timer — WIS gives passive regen
    timeLeft -= dt;
    timeLeft += WIS_TIMER_REGEN * dt;
    timeLeft = Math.min(timeLeft, TIME_PER_LIFE + CON_TIMER_BONUS); // cap at max
    if (timeLeft <= 0) {
      killFrog('time');
      saveInputState();
      return;
    }

    // Hop cooldown — DEX makes hops faster
    if (hopCooldown > 0) hopCooldown -= dt;

    // Movement input
    if (hopCooldown <= 0) {
      var moved = false;
      if (justPressed('ArrowUp') || justPressed('KeyW') || justTouched('up') || justTouched('a')) {
        if (frog.row > 0) { frog.row--; frog.dir = 0; moved = true; }
      } else if (justPressed('ArrowDown') || justPressed('KeyS') || justTouched('down')) {
        if (frog.row < 12) { frog.row++; frog.dir = 2; moved = true; }
      } else if (justPressed('ArrowLeft') || justPressed('KeyA') || justTouched('left')) {
        if (frog.col > 0) { frog.col--; frog.dir = 3; moved = true; }
      } else if (justPressed('ArrowRight') || justPressed('KeyD') || justTouched('right')) {
        if (frog.col < COLS - 1) { frog.col++; frog.dir = 1; moved = true; }
      }

      if (moved) {
        // DEX-scaled hop cooldown
        hopCooldown = HOP_COOLDOWN * DEX_COOLDOWN_MULT * statB.cooldown;
        frog.hopAnim = 0.2;
        frog.riding = null;
        TAS.audio.playTone(440, 0.06, 'square', 0.06, 520);
        // Forward movement score
        if (frog.dir === 0) addScore(10);
      }
    }

    // Animate hop
    if (frog.hopAnim > 0) {
      frog.hopAnim -= dt;
      var t = 1 - (frog.hopAnim / 0.2);
      frog.x = TAS.math.lerp(frog.x, cellX(frog.col), Math.min(1, t * 3));
      frog.y = TAS.math.lerp(frog.y, cellY(frog.row), Math.min(1, t * 3));
    } else {
      frog.x = cellX(frog.col);
      frog.y = cellY(frog.row);
    }

    // Update lane objects
    for (var i = 0; i < lanes.length; i++) {
      var lane = lanes[i];
      if (!lane.objects || lane.type === 'home' || lane.type === 'median' || lane.type === 'safe') continue;

      for (var j = 0; j < lane.objects.length; j++) {
        var obj = lane.objects[j];
        obj.x += lane.dir * lane.speed * dt * 60;

        // Wrap around
        if (lane.dir > 0 && obj.x > GW + 20) {
          obj.x = -obj.w - 10;
        } else if (lane.dir < 0 && obj.x + obj.w < -20) {
          obj.x = GW + 10;
        }

        // Turtle submerge logic
        if (lane.type === 'turtle' && obj.submerge) {
          obj.submergeTimer -= dt;
          if (obj.submergeTimer <= 0) {
            obj.submerged = !obj.submerged;
            obj.submergeTimer = obj.submerged ? obj.submergeDuration : (3 + Math.random() * 3);
          }
        }
      }
    }

    // Check collisions with frog
    var frogX = frog.x + 2;
    var frogY = frog.y + 2;
    var frogW = CELL_W - 4;
    var frogH = CELL_H - 4;

    // Home row check (row 0)
    if (frog.row === 0 && !bossActive) {
      var landedHome = false;
      for (var i = 0; i < homes.length; i++) {
        var h = homes[i];
        var hx = cellX(h.col) - CELL_W * 0.3;
        var hw = CELL_W * 1.6;
        if (frog.x + CELL_W / 2 > hx && frog.x + CELL_W / 2 < hx + hw) {
          if (h.filled) {
            killFrog('filled');
          } else if (h.bonusType === 'gator') {
            // STR knockback: high STR survives gator
            if (statB.str >= 16) {
              h.bonusType = null;
              spawnScorePopup(frog.x + CELL_W / 2, frog.y, 'STR SMASH!', '#ff8844');
              addScore(300);
              TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#44aa22', 10, 2);
            } else {
              killFrog('gator');
            }
            if (!frog.dead) {
              h.filled = true;
              landedHome = true;
              addScore(50 + Math.floor(timeLeft) * 10);
              resetFrog();
            }
          } else {
            h.filled = true;
            landedHome = true;
            var pts = 50 + Math.floor(timeLeft) * 10;
            if (h.hasBonus && h.bonusType === 'fly') {
              pts += 200;
              h.hasBonus = false;
            }
            // Companion bonus
            var hasComp = bonusItems.some(function(b) { return b.type === 'companion' && b.carried; });
            if (hasComp) {
              pts += 500;
              spawnScorePopup(frog.x + CELL_W / 2, frog.y - 8, 'SPORE PAL +500', '#a855f7');
              // Remove carried companion
              for (var ci = bonusItems.length - 1; ci >= 0; ci--) {
                if (bonusItems[ci].type === 'companion' && bonusItems[ci].carried) {
                  bonusItems.splice(ci, 1);
                  break;
                }
              }
            }
            addScore(pts);
            spawnScorePopup(frog.x + CELL_W / 2, frog.y, '+' + pts, '#f4b41b');
            TAS.audio.playMelody([[392, 0.08], [523, 0.08], [659, 0.12]], 80);
            TAS.particles.spawn(cellX(h.col) + CELL_W / 2, cellY(0) + CELL_H / 2, '#38d973', 12, 2);

            // Check if all homes filled
            var allFilled = homes.every(function(h) { return h.filled; });
            if (allFilled) {
              var bonus = Math.floor(1000 * INT_SCORE_MULT);
              addScore(bonus);
              spawnScorePopup(GW / 2, GH / 2, 'LEVEL BONUS +' + bonus, '#f4b41b');
              TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
              TAS.fx.flash('#38d973', 0.3);
              state = 'levelComplete';
              levelCompleteTimer = LEVEL_COMPLETE_DURATION;
            } else {
              resetFrog();
            }
          }
          break;
        }
      }
      if (!landedHome && !frog.dead && !bossActive) {
        killFrog('wall');
      }
    }

    // Boss update
    if (bossActive) {
      updateBoss(dt);
    }

    // Water lanes (rows 1-5): must be on a platform
    if (frog.row >= 1 && frog.row <= 5 && !frog.dead) {
      var lane = lanes[frog.row];
      var onPlatform = false;

      for (var j = 0; j < lane.objects.length; j++) {
        var obj = lane.objects[j];
        // Skip submerged turtles
        if (lane.type === 'turtle' && obj.submerged) continue;

        if (TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, obj.x, cellY(lane.row), obj.w, obj.h)) {
          onPlatform = true;
          // Ride the platform
          frog.x += lane.dir * lane.speed * dt * 60;
          frog.col = Math.round(frog.x / CELL_W);
          frog.col = TAS.math.clamp(frog.col, 0, COLS - 1);

          // Snake on log kills
          if (lane.type === 'log' && obj.hasSnake) {
            var snakeX = obj.x + obj.snakePos * (obj.w - CELL_W * 0.5);
            if (Math.abs(frog.x + CELL_W / 2 - snakeX - CELL_W * 0.25) < CELL_W * 0.5) {
              killFrog('snake');
            }
          }

          // Fungal Crawler on log
          if (lane.type === 'log' && obj.hasCrawler) {
            var crawlerX = obj.x + obj.crawlerPos * (obj.w - CELL_W * 0.6);
            if (Math.abs(frog.x + CELL_W / 2 - crawlerX - CELL_W * 0.3) < CELL_W * 0.5) {
              // DEX dodge chance
              if (Math.random() < DEX_DODGE_CHANCE) {
                spawnScorePopup(frog.x + CELL_W / 2, frog.y, 'DODGE!', '#44ddff');
              } else {
                killFrog('crawler');
              }
            }
          }
          break;
        }
      }

      // Drifted off screen
      if (frog.x < -CELL_W || frog.x > GW) {
        killFrog('offscreen');
      }

      if (!onPlatform && !frog.dead) {
        killFrog('water');
        TAS.audio.playNoise(0.2, 0.08, 400);
        // Enhanced water splash particles
        TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#4488cc', 10, 2);
        TAS.particles.spawn(frog.x + CELL_W / 2, frog.y, '#88ccee', 6, 1.5);
        TAS.particles.spawn(frog.x + CELL_W / 2 - 8, frog.y + 4, '#aaddff', 4, 1);
        TAS.particles.spawn(frog.x + CELL_W / 2 + 8, frog.y + 4, '#aaddff', 4, 1);
      }
    }

    // Road lanes (rows 7-11): vehicles kill
    if (frog.row >= 7 && frog.row <= 11 && !frog.dead) {
      var lane = lanes[frog.row];
      for (var j = 0; j < lane.objects.length; j++) {
        var obj = lane.objects[j];
        if (TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, obj.x, cellY(lane.row) + 2, obj.w, obj.h)) {
          // DEX dodge check for vehicles
          if (Math.random() < DEX_DODGE_CHANCE) {
            spawnScorePopup(frog.x + CELL_W / 2, frog.y, 'DODGE!', '#44ddff');
            TAS.particles.spawn(frog.x + CELL_W / 2, frog.y + CELL_H / 2, '#44ddff', 6, 1);
          } else {
            killFrog(obj.vtype === 'bogTroll' ? 'bogTroll' : 'vehicle');
          }
          break;
        }
      }
    }

    // === SWAMP HAZARDS UPDATE ===
    for (var i = tasernHazards.length - 1; i >= 0; i--) {
      var h = tasernHazards[i];
      if (!h.active) continue;

      if (h.type === 'sporeCloud') {
        h.x += h.speed * dt;
        h.pulseTimer += dt;
        // Wrap
        if (h.x > GW + 20) h.x = -h.w;
        if (h.x < -h.w - 20) h.x = GW;

        // Collision: slows player (adds hop cooldown)
        if (!frog.dead && frog.row === 6 &&
            TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, h.x, h.y, h.w, h.h)) {
          // CON resistance: high CON reduces slow effect
          var slowAmt = Math.max(0.1, 0.4 - (statB.con - 10) * 0.02);
          hopCooldown = Math.max(hopCooldown, slowAmt);
          // Damage at very high levels
          if (level >= 8 && frame % 120 === 0) {
            killFrog('sporeCloud');
          }
        }
      }

      if (h.type === 'wisp') {
        h.x += h.speedX * dt;
        h.y += Math.sin(frame * 0.05 + i) * 0.5;
        h.flickerTimer += dt;
        // Wrap
        if (h.x > GW + 20) h.x = -h.w;
        if (h.x < -h.w - 20) h.x = GW;

        // Collision: kills
        if (!frog.dead && Math.abs(frog.row - h.row) <= 0 &&
            TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, h.x, h.y, h.w, h.h)) {
          killFrog('wisp');
        }
      }

      if (h.type === 'quicksand') {
        h.x = cellX(h.col);
        h.y = cellY(h.row);

        if (!frog.dead && frog.row === h.row) {
          var qx = h.x;
          var qy = h.y;
          if (TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, qx, qy, h.w, h.h)) {
            h.trapping = true;
            h.sinkTimer += dt;
            // STR check: high STR escapes faster
            var sinkRate = Math.max(0.5, 2.0 - statB.str * 0.08);
            if (h.sinkTimer > sinkRate) {
              killFrog('quicksand');
              h.sinkTimer = 0;
              h.trapping = false;
            } else {
              // Slow movement while in quicksand
              hopCooldown = Math.max(hopCooldown, 0.3);
            }
          } else {
            h.trapping = false;
            h.sinkTimer = Math.max(0, h.sinkTimer - dt * 2);
          }
        }
      }

      if (h.type === 'swampDrake') {
        h.x += h.dir * h.speed * dt;
        h.wingPhase += dt * 8;
        // Off screen removal
        if ((h.dir > 0 && h.x > GW + CELL_W * 3) || (h.dir < 0 && h.x < -CELL_W * 4)) {
          tasernHazards.splice(i, 1);
          continue;
        }

        // Collision
        if (!frog.dead && frog.row >= 1 && frog.row <= 5 &&
            TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, h.x, h.y, h.w, h.h)) {
          // DEX dodge
          if (Math.random() < DEX_DODGE_CHANCE * 1.5) {
            spawnScorePopup(frog.x + CELL_W / 2, frog.y, 'EVADE!', '#44ddff');
          } else {
            killFrog('swampDrake');
          }
        }
      }
    }

    // Spawn swamp drakes
    spawnSwampDrake();

    // === BASELING ITEMS UPDATE ===
    for (var i = tasernItems.length - 1; i >= 0; i--) {
      var item = tasernItems[i];
      if (item.collected) continue;
      item.timer -= dt;
      if (item.timer <= 0) {
        tasernItems.splice(i, 1);
        continue;
      }
      item.bobPhase += dt * 3;

      // Collection check
      var ix = cellX(item.col);
      var iy = cellY(item.row);
      if (!frog.dead && frog.row === item.row &&
          TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, ix, iy, CELL_W, CELL_H)) {
        item.collected = true;

        if (item.type === 'glowcap') {
          // POOP token: bonus score + brief speed boost
          var pts = Math.floor(150 * INT_SCORE_MULT);
          addScore(pts);
          spawnScorePopup(ix + CELL_W / 2, iy, '+' + pts + ' POOP', '#f4b41b');
          hopCooldown = 0;
          TAS.audio.playTone(600, 0.08, 'sine', 0.06, 800);
          TAS.particles.spawn(ix + CELL_W / 2, iy + CELL_H / 2, '#f4b41b', 8, 2);
        } else if (item.type === 'manaCrystal') {
          // Spore Gem: big score boost
          var pts = Math.floor(400 * INT_SCORE_MULT);
          addScore(pts);
          spawnScorePopup(ix + CELL_W / 2, iy, '+' + pts + ' SPORE GEM', '#a855f7');
          TAS.audio.playMelody([[523, 0.06], [784, 0.08]], 80);
          TAS.particles.spawn(ix + CELL_W / 2, iy + CELL_H / 2, '#a855f7', 10, 2.5);
          TAS.particles.spawn(ix + CELL_W / 2, iy + CELL_H / 2, '#d4aaff', 6, 1.5);
        } else if (item.type === 'healingMoss') {
          // Garden Seed: restore time + heal
          timeLeft = Math.min(TIME_PER_LIFE + CON_TIMER_BONUS, timeLeft + 8);
          var pts = Math.floor(100 * INT_SCORE_MULT);
          addScore(pts);
          spawnScorePopup(ix + CELL_W / 2, iy, '+TIME +' + pts + ' SEED', '#38d973');
          TAS.audio.playTone(400, 0.1, 'sine', 0.08, 500);
          TAS.particles.spawn(ix + CELL_W / 2, iy + CELL_H / 2, '#38d973', 8, 2);
        }
        tasernItems.splice(i, 1);
      }
    }

    // Bonus items (mycelium flies, baseling companions)
    spawnBonus();
    for (var i = bonusItems.length - 1; i >= 0; i--) {
      var b = bonusItems[i];
      b.timer -= dt;

      if (b.type === 'fly') {
        var lane = lanes[b.laneIdx];
        if (lane && lane.objects[b.objIdx]) {
          var obj = lane.objects[b.objIdx];
          var fx = obj.x + b.relX;
          var fy = cellY(lane.row) + 2;
          // CHA fly attract: magnetism
          if (CHA_FLY_ATTRACT > 0 && !frog.dead) {
            var distToFrog = Math.sqrt(Math.pow(fx - frog.x, 2) + Math.pow(fy - frog.y, 2));
            if (distToFrog < CELL_W * 3 + CHA_FLY_ATTRACT) {
              b.relX += (frog.x - fx) * 0.02;
            }
          }
          if (TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, fx, fy, CELL_W * 0.5, CELL_H * 0.5)) {
            var pts = Math.floor(b.points * INT_SCORE_MULT);
            addScore(pts);
            spawnScorePopup(fx + 6, fy, '+' + pts + ' FLY', '#f4b41b');
            TAS.audio.playTone(880, 0.08, 'square', 0.06);
            TAS.particles.spawn(fx + 6, fy + 6, '#f4b41b', 6, 2);
            bonusItems.splice(i, 1);
            continue;
          }
        }
      } else if (b.type === 'companion') {
        if (!b.carried && TAS.hit.rectOverlap(frogX, frogY, frogW, frogH, b.x, b.y, CELL_W, CELL_H)) {
          b.carried = true;
          spawnScorePopup(b.x + CELL_W / 2, b.y, 'SPORE PAL!', '#a855f7');
          TAS.audio.playTone(660, 0.1, 'sine', 0.08);
        }
        if (b.carried) {
          b.x = frog.x + 4;
          b.y = frog.y - 2;
        }
      }

      if (b.timer <= 0) {
        bonusItems.splice(i, 1);
      }
    }

    // Update hazard warnings (WIS)
    updateHazardWarnings();
  }

  saveInputState();
}

// === DRAWING ===

function drawBaseling(x, y, w, h, dir, hopAnim, isCompanion) {
  var cx = x + w / 2;
  var cy = y + h / 2;
  var s = Math.min(w, h) * 0.45;
  var hop = hopAnim > 0 ? Math.sin(hopAnim * Math.PI / 0.2) * 3 : 0;

  ctx.save();
  ctx.translate(cx, cy - hop);

  // Body — use statB.color for player
  var bodyColor = isCompanion ? '#ff88cc' : PLAYER_COLOR;
  var bodyDark = isCompanion ? '#cc6699' : shadeColor(PLAYER_COLOR, -30);
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 1, s * 0.8, s * 0.65, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mushroom cap
  ctx.fillStyle = isCompanion ? '#ff4488' : shadeColor(PLAYER_COLOR, -50);
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.3, s * 0.9, s * 0.5, 0, Math.PI, 0);
  ctx.fill();

  // Spots on cap
  ctx.fillStyle = '#ffeecc';
  ctx.beginPath();
  ctx.arc(-s * 0.3, -s * 0.45, s * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.25, -s * 0.5, s * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Player icon on cap (from statB)
  if (!isCompanion && PLAYER_ICON && s > 4) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + Math.max(6, Math.floor(s * 0.5)) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(PLAYER_ICON, 0, -s * 0.25);
  }

  // Eyes (direction-aware)
  var eyeOffX = 0;
  var eyeOffY = 0;
  if (dir === 1) eyeOffX = 1;
  else if (dir === 3) eyeOffX = -1;
  else if (dir === 2) eyeOffY = 1;
  else eyeOffY = -0.5;

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-s * 0.3, -s * 0.05, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.3, -s * 0.05, s * 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-s * 0.3 + eyeOffX * 1.5, -s * 0.05 + eyeOffY * 1, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(s * 0.3 + eyeOffX * 1.5, -s * 0.05 + eyeOffY * 1, s * 0.1, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = bodyDark;
  if (hopAnim > 0) {
    ctx.fillRect(-s * 0.6, s * 0.3, s * 0.3, s * 0.4);
    ctx.fillRect(s * 0.3, s * 0.3, s * 0.3, s * 0.4);
  } else {
    ctx.fillRect(-s * 0.55, s * 0.35, s * 0.35, s * 0.25);
    ctx.fillRect(s * 0.2, s * 0.35, s * 0.35, s * 0.25);
  }

  ctx.restore();
}

// Color utility: darken/lighten hex color
function shadeColor(hex, amt) {
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawLog(x, y, w, h, hasSnake, snakePos, hasCrawler, crawlerPos) {
  // Brown log
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(x, y + 2, w, h - 4);
  // Bark texture lines
  ctx.strokeStyle = '#553318';
  ctx.lineWidth = 1;
  for (var i = 0; i < w; i += 12) {
    ctx.beginPath();
    ctx.moveTo(x + i, y + 3);
    ctx.lineTo(x + i, y + h - 3);
    ctx.stroke();
  }
  // Log ends
  ctx.fillStyle = '#8b5a2b';
  ctx.beginPath();
  ctx.ellipse(x, y + h / 2, 4, h / 2 - 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w, y + h / 2, 4, h / 2 - 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snake on log — sea-set snake sprite first, wavy-line snake kept as fallback.
  if (hasSnake) {
    var sx = x + snakePos * (w - CELL_W * 0.5);
    var sy = y + 3;
    var _sim = artImg('art/sea/enemy-snake.png');
    if (_sim) {
      ctx.drawImage(_sim, sx, y - 3, CELL_W, h + 4);
    } else {
      ctx.fillStyle = '#44bb44';
      ctx.beginPath();
      ctx.moveTo(sx, sy + h / 2);
      for (var i = 0; i < 12; i++) {
        ctx.lineTo(sx + i * 2, sy + h / 2 + Math.sin(i + frame * 0.15) * 3);
      }
      ctx.lineTo(sx + 24, sy + h / 2);
      ctx.stroke();
      ctx.fillStyle = '#228822';
      ctx.beginPath();
      ctx.arc(sx + 24, sy + h / 2, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx + 27, sy + h / 2);
      ctx.lineTo(sx + 30, sy + h / 2 - 2);
      ctx.moveTo(sx + 27, sy + h / 2);
      ctx.lineTo(sx + 30, sy + h / 2 + 2);
      ctx.stroke();
    }
  }

  // Fungal Crawler on log — slime-mold portrait first, tendril blob kept as fallback.
  if (hasCrawler) {
    var cx = x + crawlerPos * (w - CELL_W * 0.6);
    var cy = y + 3;
    var _cim = enemyImg('slime-mold');
    if (_cim) {
      ctx.drawImage(_cim, cx, y - 3, CELL_W * 0.8, h + 4);
      return;
    }
    // Fungal body
    ctx.fillStyle = '#884488';
    ctx.beginPath();
    ctx.ellipse(cx + 8, cy + h / 2 - 1, 7, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Spore tendrils
    ctx.strokeStyle = '#aa66aa';
    ctx.lineWidth = 1;
    for (var t = 0; t < 4; t++) {
      ctx.beginPath();
      ctx.moveTo(cx + 8, cy + h / 2 - 1);
      ctx.lineTo(
        cx + 8 + Math.cos(t * 1.5 + frame * 0.1) * 8,
        cy + h / 2 - 1 + Math.sin(t * 1.5 + frame * 0.1) * 5
      );
      ctx.stroke();
    }
    // Eyes
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(cx + 5, cy + h / 2 - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + 11, cy + h / 2 - 3, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTurtle(x, y, w, h, submerged) {
  var count = Math.floor(w / CELL_W);
  for (var i = 0; i < count; i++) {
    var tx = x + i * CELL_W + CELL_W / 2;
    var ty = y + h / 2;
    var r = Math.min(CELL_W, h) * 0.38;

    if (submerged) {
      ctx.strokeStyle = 'rgba(100, 180, 220, 0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(tx, ty, r, r * 0.3, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#557744';
      ctx.beginPath();
      ctx.ellipse(tx, ty, r, r * 0.75, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#446633';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(tx - r * 0.3, ty - r * 0.2);
      ctx.lineTo(tx + r * 0.3, ty + r * 0.2);
      ctx.moveTo(tx + r * 0.3, ty - r * 0.2);
      ctx.lineTo(tx - r * 0.3, ty + r * 0.2);
      ctx.stroke();
      ctx.fillStyle = '#66884a';
      ctx.beginPath();
      ctx.arc(tx + r * 0.7, ty, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(tx + r * 0.85, ty - 1, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawLilyPad(x, y, w, h) {
  var cx = x + w / 2;
  var cy = y + h / 2;
  var r = Math.min(w, h) * 0.42;
  ctx.fillStyle = '#338844';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r, 0.2, Math.PI * 2 - 0.2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#226633';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r * 0.7, cy - r * 0.3);
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + r * 0.5, cy + r * 0.5);
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx - r * 0.6, cy);
  ctx.stroke();
}

function drawVehicle(x, y, w, h, vtype, dir) {
  if (vtype === 'bogTroll') {
    // Bog Troll — library troll portrait first; procedural creature kept as fallback.
    var _tim = enemyImg('troll');
    if (_tim) {
      drawEnemySprite(_tim, x, y - 6, w, h + 10, dir < 0);
      return;
    }
    // Bog Troll: large green-brown creature
    var cx = x + w / 2;
    var cy = y + h / 2;
    // Body
    ctx.fillStyle = '#4a5a2a';
    ctx.beginPath();
    ctx.ellipse(cx, cy, w * 0.4, h * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#5a6a3a';
    ctx.beginPath();
    ctx.arc(cx + (dir > 0 ? w * 0.25 : -w * 0.25), cy - h * 0.15, h * 0.35, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4422';
    var eyeX = cx + (dir > 0 ? w * 0.3 : -w * 0.3);
    ctx.beginPath();
    ctx.arc(eyeX - 3, cy - h * 0.25, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeX + 3, cy - h * 0.25, 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Club
    ctx.fillStyle = '#6b4226';
    var clubX = cx + (dir > 0 ? -w * 0.3 : w * 0.3);
    ctx.fillRect(clubX - 2, cy - h * 0.1, 6, h * 0.5);
    ctx.fillStyle = '#5a3a1a';
    ctx.beginPath();
    ctx.arc(clubX + 1, cy - h * 0.15, 5, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  if (vtype === 'cart') {
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(x + 2, y + 2, w - 4, h - 2);
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(x + 8, y + h, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w - 8, y + h, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aa8822';
    ctx.fillRect(x + 6, y + 3, w - 12, h * 0.4);
  } else if (vtype === 'truck') {
    ctx.fillStyle = '#884422';
    ctx.fillRect(x + 2, y + 2, w - 4, h - 2);
    var cabX = dir > 0 ? x + w - w * 0.3 : x + 2;
    ctx.fillStyle = '#aa5533';
    ctx.fillRect(cabX, y + 1, w * 0.28, h);
    ctx.fillStyle = '#88ccff';
    ctx.fillRect(cabX + 3, y + 3, w * 0.2, h * 0.4);
    ctx.fillStyle = '#cc3333';
    var logoX = x + w * 0.35;
    ctx.beginPath();
    ctx.arc(logoX, y + h * 0.4, 5, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#ddd';
    ctx.fillRect(logoX - 2, y + h * 0.4, 4, 5);
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(x + 10, y + h + 1, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + w - 10, y + h + 1, 4, 0, Math.PI * 2);
    ctx.fill();
  } else if (vtype === 'racer') {
    ctx.fillStyle = '#cc2244';
    ctx.beginPath();
    var rx = x, ry = y + 2, rw = w, rh = h - 2;
    ctx.moveTo(rx + (dir > 0 ? 0 : rw * 0.15), ry + rh / 2);
    ctx.lineTo(rx + (dir > 0 ? rw * 0.15 : 0), ry);
    ctx.lineTo(rx + (dir > 0 ? rw : rw * 0.85), ry);
    ctx.lineTo(rx + (dir > 0 ? rw : rw * 0.85), ry + rh);
    ctx.lineTo(rx + (dir > 0 ? rw * 0.15 : 0), ry + rh);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#88ccee';
    var wsx = dir > 0 ? rx + rw * 0.55 : rx + rw * 0.2;
    ctx.fillRect(wsx, ry + 2, rw * 0.2, rh - 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    var trailX = dir > 0 ? rx - 5 : rx + rw + 5;
    for (var i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(trailX - dir * i * 6, ry + 3 + i * (rh / 3));
      ctx.lineTo(trailX - dir * (i * 6 + 10), ry + 3 + i * (rh / 3));
      ctx.stroke();
    }
  }
}

function drawFly(x, y) {
  var bob = Math.sin(frame * 0.2) * 2;
  ctx.fillStyle = '#f4b41b';
  ctx.beginPath();
  ctx.arc(x + 6, y + 6 + bob, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(168,85,247,0.5)';
  ctx.beginPath();
  ctx.ellipse(x + 2, y + 3 + bob, 3, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 10, y + 3 + bob, 3, 5, 0.3, 0, Math.PI * 2);
  ctx.fill();
}

function drawGator(x, y, w, h) {
  // Lurking bog wyrm portrait first; procedural fungal beast kept as fallback.
  var _gim = enemyImg('wyrm');
  if (_gim) {
    TasernArt.drawContain(ctx, _gim, x, y - 3, w, h + 6);
    return;
  }
  // Fungi gator: purple-green fungal beast
  ctx.fillStyle = '#3a5a3a';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h / 2, w * 0.35, h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(x + w * 0.35, y + h * 0.3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.65, y + h * 0.3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1c2c';
  ctx.beginPath();
  ctx.arc(x + w * 0.35, y + h * 0.3, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + w * 0.65, y + h * 0.3, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#2a5520';
  ctx.fillRect(x + w * 0.2, y + h * 0.55, w * 0.6, h * 0.15);
  ctx.fillStyle = '#eee';
  for (var i = 0; i < 4; i++) {
    ctx.fillRect(x + w * 0.25 + i * w * 0.14, y + h * 0.52, 3, 4);
  }
}

// === SWAMP HAZARD DRAWING ===

function drawSporeCloud(h) {
  var pulse = Math.sin(h.pulseTimer * 2) * 0.2 + 0.8;
  ctx.globalAlpha = 0.6 * pulse;
  // Cloud body
  ctx.fillStyle = '#88aa44';
  ctx.beginPath();
  ctx.ellipse(h.x + h.w / 2, h.y + h.h / 2, h.w * 0.4 * pulse, h.h * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Spore particles
  ctx.fillStyle = '#aacc66';
  for (var i = 0; i < 5; i++) {
    var sx = h.x + h.w / 2 + Math.sin(h.pulseTimer * 3 + i * 1.3) * h.w * 0.3;
    var sy = h.y + h.h / 2 + Math.cos(h.pulseTimer * 2 + i * 1.7) * h.h * 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawWisp(h) {
  var flicker = Math.sin(h.flickerTimer * 8) * 0.3 + 0.7;
  ctx.globalAlpha = flicker;
  // Glow
  var gradient = ctx.createRadialGradient(h.x + h.w / 2, h.y + h.h / 2, 0, h.x + h.w / 2, h.y + h.h / 2, h.w);
  gradient.addColorStop(0, 'rgba(100,200,255,0.8)');
  gradient.addColorStop(0.5, 'rgba(60,120,200,0.3)');
  gradient.addColorStop(1, 'rgba(40,80,160,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(h.x - h.w * 0.5, h.y - h.h * 0.5, h.w * 2, h.h * 2);
  // Core — will-o-wisp portrait first (glow + flicker kept as the telegraph),
  // plain bright core kept as fallback.
  var _wim = enemyImg('will-o-wisp');
  if (_wim) {
    drawEnemySprite(_wim, h.x - h.w * 0.2, h.y - h.h * 0.2, h.w * 1.4, h.h * 1.4, h.speedX < 0);
  } else {
    ctx.fillStyle = '#aaddff';
    ctx.beginPath();
    ctx.arc(h.x + h.w / 2, h.y + h.h / 2, h.w * 0.25, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawQuicksand(h) {
  var shimmer = Math.sin(frame * 0.08 + h.col) * 0.15 + 0.85;
  ctx.fillStyle = '#8a7a4a';
  ctx.globalAlpha = shimmer;
  ctx.fillRect(h.x, h.y + 2, h.w, h.h - 4);
  // Bubble effect
  ctx.fillStyle = '#a89a5a';
  for (var i = 0; i < 3; i++) {
    var bx = h.x + h.w * 0.2 + i * h.w * 0.3;
    var by = h.y + h.h * 0.5 + Math.sin(frame * 0.1 + i * 2) * 3;
    ctx.beginPath();
    ctx.arc(bx, by, 2 + Math.sin(frame * 0.05 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Warning text when trapping
  if (h.trapping) {
    ctx.fillStyle = '#ffaa22';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SINKING!', h.x + h.w / 2, h.y - 2);
  }
}

function drawSwampDrake(h) {
  var dx = h.x + h.w / 2;
  var dy = h.y + h.h / 2;
  // Bog drake = library wyrm portrait first (flying bob kept); procedural
  // wing/tail drake kept as fallback.
  var _dim = enemyImg('wyrm');
  if (_dim) {
    var _bobY = Math.sin(h.wingPhase) * 2;
    drawEnemySprite(_dim, h.x, h.y - 4 + _bobY, h.w, h.h + 8, h.dir < 0);
    return;
  }
  // Wing animation
  var wingSpread = Math.sin(h.wingPhase) * 8;
  // Body
  ctx.fillStyle = '#2a5a3a';
  ctx.beginPath();
  ctx.ellipse(dx, dy, h.w * 0.3, h.h * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();
  // Wings
  ctx.fillStyle = '#3a7a4a';
  ctx.beginPath();
  ctx.moveTo(dx, dy);
  ctx.lineTo(dx - h.w * 0.4, dy - wingSpread);
  ctx.lineTo(dx - h.w * 0.15, dy);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(dx, dy);
  ctx.lineTo(dx + h.w * 0.4, dy - wingSpread);
  ctx.lineTo(dx + h.w * 0.15, dy);
  ctx.fill();
  // Head
  ctx.fillStyle = '#1a4a2a';
  var headX = dx + h.dir * h.w * 0.35;
  ctx.beginPath();
  ctx.arc(headX, dy - 2, h.h * 0.18, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#ff6622';
  ctx.beginPath();
  ctx.arc(headX + h.dir * 3, dy - 4, 2, 0, Math.PI * 2);
  ctx.fill();
  // Tail
  ctx.strokeStyle = '#2a5a3a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(dx - h.dir * h.w * 0.3, dy);
  ctx.quadraticCurveTo(
    dx - h.dir * h.w * 0.45, dy + Math.sin(frame * 0.1) * 5,
    dx - h.dir * h.w * 0.5, dy + 3
  );
  ctx.stroke();
}

// === BASELING ITEM DRAWING ===

function drawTasernItem(item) {
  if (item.collected) return;
  if (item.hidden) return; // hidden items not visible (unless INT revealed)

  var ix = cellX(item.col);
  var iy = cellY(item.row);
  var bob = Math.sin(item.bobPhase) * 2;

  // Fade when timer is low
  if (item.timer < 3) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.2) * 0.3;
  }

  if (item.type === 'glowcap') {
    // POOP token
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(ix + CELL_W / 2, iy + CELL_H / 2 + bob - 2, 6, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(ix + CELL_W / 2 - 2, iy + CELL_H / 2 + bob - 2, 4, 6);
    // Glow
    ctx.fillStyle = 'rgba(244,180,27,0.2)';
    ctx.beginPath();
    ctx.arc(ix + CELL_W / 2, iy + CELL_H / 2 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
  } else if (item.type === 'manaCrystal') {
    // Spore gem
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.moveTo(ix + CELL_W / 2, iy + CELL_H / 2 + bob - 6);
    ctx.lineTo(ix + CELL_W / 2 + 5, iy + CELL_H / 2 + bob);
    ctx.lineTo(ix + CELL_W / 2, iy + CELL_H / 2 + bob + 6);
    ctx.lineTo(ix + CELL_W / 2 - 5, iy + CELL_H / 2 + bob);
    ctx.closePath();
    ctx.fill();
    // Sparkle
    ctx.fillStyle = '#d4aaff';
    ctx.beginPath();
    ctx.arc(ix + CELL_W / 2 + 2, iy + CELL_H / 2 + bob - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (item.type === 'healingMoss') {
    // Garden seed
    ctx.fillStyle = '#38d973';
    for (var m = 0; m < 3; m++) {
      ctx.beginPath();
      ctx.arc(
        ix + CELL_W / 2 - 4 + m * 4,
        iy + CELL_H / 2 + bob + Math.sin(item.bobPhase + m) * 1,
        3, 0, Math.PI * 2
      );
      ctx.fill();
    }
    // Seed sprout symbol
    ctx.fillStyle = '#38d973';
    ctx.fillRect(ix + CELL_W / 2 - 1, iy + CELL_H / 2 + bob - 4, 2, 5);
    ctx.fillRect(ix + CELL_W / 2 - 2, iy + CELL_H / 2 + bob - 2, 4, 2);
  }

  ctx.globalAlpha = 1;
}

function drawWaterBG(row) {
  var y = cellY(row);
  ctx.fillStyle = COL_WATER();
  ctx.fillRect(0, y, GW, CELL_H);
  // Ripple effect
  ctx.strokeStyle = COL_WATER_DARK();
  ctx.lineWidth = 1;
  for (var rx = 0; rx < GW; rx += 20) {
    var ry = y + CELL_H / 2 + Math.sin((rx + frame * 1.5) * 0.08) * 2;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.quadraticCurveTo(rx + 10, ry + 2, rx + 20, ry);
    ctx.stroke();
  }
}

function draw(dt) {
  // Background
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawGameWorld();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Level: ' + level });
    return;
  }

  if (state === 'levelComplete') {
    drawGameWorld();
    // Level complete overlay
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    var pulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('LEVEL ' + level + ' COMPLETE!', GW / 2, GH * 0.35);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(getZone().name, GW / 2, GH * 0.47);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('+' + Math.floor(1000 * INT_SCORE_MULT) + ' BONUS', GW / 2, GH * 0.58);

    // Show stat contributions
    ctx.font = '9px monospace';
    ctx.fillStyle = '#88aacc';
    var statLine = 'STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha;
    ctx.fillText(statLine, GW / 2, GH * 0.7);
    ctx.globalAlpha = 1;
    return;
  }

  drawGameWorld();
}

function drawTitleScreen() {
  // Spore bog background — zone-colored
  ctx.fillStyle = COL_WATER_DARK();
  ctx.fillRect(0, 0, GW, GH);

  // Animated water
  for (var wy = 0; wy < GH; wy += 30) {
    ctx.strokeStyle = 'rgba(40, 100, 140, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (var wx = 0; wx < GW; wx += 5) {
      var wvy = wy + Math.sin((wx + frame * 2) * 0.04) * 4;
      if (wx === 0) ctx.moveTo(wx, wvy);
      else ctx.lineTo(wx, wvy);
    }
    ctx.stroke();
  }

  // Lily pads decoration
  for (var i = 0; i < 6; i++) {
    var lx = 40 + i * 80 + Math.sin(frame * 0.02 + i) * 5;
    var ly = GH * 0.65 + Math.cos(frame * 0.015 + i * 2) * 8;
    drawLilyPad(lx, ly, 28, 20);
  }

  // Baseling on title — uses player color
  drawBaseling(GW / 2 - 16, GH * 0.42, 32, 28, 0, Math.sin(frame * 0.05) > 0.8 ? 0.1 : 0, false);

  // Title text
  TAS.ui.drawTitle('SPORE HOP', 'A Baseling Tale', GW, GH, { frame: frame, titleColor: '#a855f7' });

  // Character info
  ctx.textAlign = 'center';
  ctx.fillStyle = PLAYER_COLOR;
  ctx.font = 'bold 11px monospace';
  ctx.fillText(PLAYER_NAME, GW / 2, GH * 0.72);

  // Stat summary on title
  ctx.fillStyle = '#88aacc';
  ctx.font = '9px monospace';
  ctx.fillText('STR ' + statB.str + '  DEX ' + statB.dex + '  CON ' + statB.con + '  INT ' + statB.int + '  WIS ' + statB.wis + '  CHA ' + statB.cha, GW / 2, GH * 0.78);

  // NES-style controls
  ctx.fillStyle = '#667788';
  ctx.font = '9px monospace';
  ctx.fillText('[WASD / Arrows] Move   [A / Up] Hop', GW / 2, GH * 0.86);
  ctx.fillText('Hop the fungal wetlands to reach all 5 gardens!', GW / 2, GH * 0.92);
}

function drawGameWorld() {
  ctx.save();
  TAS.fx.applyShake();

  // Zone fog overlay (bottom layer)
  var zone = getZone();

  // === Draw lane backgrounds ===

  // Row 0: Home row
  ctx.fillStyle = COL_HOME_BG;
  ctx.fillRect(0, cellY(0), GW, CELL_H);

  // Home slots
  for (var i = 0; i < homes.length; i++) {
    var h = homes[i];
    var hx = cellX(h.col) - CELL_W * 0.3;
    var hy = cellY(0);
    var hw = CELL_W * 1.6;

    if (h.filled) {
      ctx.fillStyle = COL_HOME_PAD;
      ctx.fillRect(hx + 4, hy + 2, hw - 8, CELL_H - 4);
      drawBaseling(hx + hw / 2 - 10, hy + 1, 20, CELL_H - 2, 0, 0, false);
    } else {
      ctx.fillStyle = COL_HOME_PAD;
      ctx.fillRect(hx + 4, hy + 2, hw - 8, CELL_H - 4);

      if (h.bonusType === 'fly' && h.hasBonus) {
        drawFly(hx + hw / 2 - 6, hy + 2);
      }
      if (h.bonusType === 'gator') {
        drawGator(hx + 4, hy + 2, hw - 8, CELL_H - 4);
      }
    }

    // Dividers between homes
    ctx.fillStyle = COL_HOME_BG;
    if (i < homes.length - 1) {
      var nextH = homes[i + 1];
      var divX = hx + hw;
      var divW = cellX(nextH.col) - CELL_W * 0.3 - divX;
      if (divW > 0) ctx.fillRect(divX, hy, divW, CELL_H);
    }
  }

  // Rows 1-5: water
  for (var r = 1; r <= 5; r++) {
    drawWaterBG(r);
  }

  // Row 6: median (safe grass)
  ctx.fillStyle = COL_MEDIAN;
  ctx.fillRect(0, cellY(6), GW, CELL_H);
  ctx.fillStyle = '#5a9a3a';
  for (var gx = 0; gx < GW; gx += 18) {
    ctx.beginPath();
    ctx.moveTo(gx, cellY(6) + CELL_H);
    ctx.lineTo(gx + 3, cellY(6) + CELL_H - 6);
    ctx.lineTo(gx + 6, cellY(6) + CELL_H);
    ctx.fill();
  }

  // Rows 7-11: road
  for (var r = 7; r <= 11; r++) {
    ctx.fillStyle = COL_ROAD();
    ctx.fillRect(0, cellY(r), GW, CELL_H);
    ctx.strokeStyle = COL_ROAD_LINE;
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(0, cellY(r) + CELL_H);
    ctx.lineTo(GW, cellY(r) + CELL_H);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Row 12: safe grass
  ctx.fillStyle = COL_SAFE;
  ctx.fillRect(0, cellY(12), GW, CELL_H);
  ctx.fillStyle = '#4a8a2a';
  for (var gx = 5; gx < GW; gx += 14) {
    ctx.beginPath();
    ctx.moveTo(gx, cellY(12) + CELL_H);
    ctx.lineTo(gx + 2, cellY(12) + CELL_H - 5);
    ctx.lineTo(gx + 4, cellY(12) + CELL_H);
    ctx.fill();
  }

  // === Draw swamp hazards (under lane objects) ===
  for (var i = 0; i < tasernHazards.length; i++) {
    var h = tasernHazards[i];
    if (!h.active) continue;
    if (h.type === 'quicksand') drawQuicksand(h);
    if (h.type === 'sporeCloud') drawSporeCloud(h);
  }

  // === Draw lane objects ===
  for (var i = 0; i < lanes.length; i++) {
    var lane = lanes[i];
    if (!lane.objects) continue;

    for (var j = 0; j < lane.objects.length; j++) {
      var obj = lane.objects[j];
      var oy = cellY(lane.row);

      if (lane.type === 'log') {
        drawLog(obj.x, oy, obj.w, obj.h, obj.hasSnake, obj.snakePos, obj.hasCrawler, obj.crawlerPos);
      } else if (lane.type === 'turtle') {
        drawTurtle(obj.x, oy + 1, obj.w, obj.h, obj.submerged);
      } else if (lane.type === 'lily') {
        drawLilyPad(obj.x, oy + 1, obj.w, obj.h);
      } else if (lane.type === 'road') {
        drawVehicle(obj.x, oy, obj.w, obj.h, obj.vtype, lane.dir);
      }
    }
  }

  // === Draw swamp hazards (over lane objects) ===
  for (var i = 0; i < tasernHazards.length; i++) {
    var h = tasernHazards[i];
    if (!h.active) continue;
    if (h.type === 'wisp') drawWisp(h);
    if (h.type === 'swampDrake') drawSwampDrake(h);
  }

  // === Draw baseling items ===
  for (var i = 0; i < tasernItems.length; i++) {
    drawTasernItem(tasernItems[i]);
  }

  // === Draw bonus items ===
  for (var i = 0; i < bonusItems.length; i++) {
    var b = bonusItems[i];
    if (b.type === 'fly') {
      var lane = lanes[b.laneIdx];
      if (lane && lane.objects[b.objIdx]) {
        var obj = lane.objects[b.objIdx];
        drawFly(obj.x + b.relX, cellY(lane.row) + 2);
      }
    } else if (b.type === 'companion' && !b.carried) {
      drawBaseling(b.x, b.y, CELL_W, CELL_H, 0, 0, true);
    }
  }

  // === Draw boss ===
  drawBoss();

  // === Draw frog ===
  if (!frog.dead) {
    // Companion if carried
    var hasCompanion = bonusItems.some(function(b) { return b.type === 'companion' && b.carried; });
    if (hasCompanion) {
      drawBaseling(frog.x + 4, frog.y - 4, CELL_W * 0.7, CELL_H * 0.7, frog.dir, 0, true);
    }
    // Player = selected baseling sprite; fall back to the procedural frog if not loaded.
    if (!TAS.drawBaseling(ctx, frog.x + CELL_W / 2, frog.y + CELL_H / 2, Math.max(CELL_W, CELL_H), { flipX: frog.dir < 0, frame: frame })) {
      drawBaseling(frog.x, frog.y, CELL_W, CELL_H, frog.dir, frog.hopAnim, false);
    }
  } else {
    // Death animation
    var dx = frog.x + CELL_W / 2;
    var dy = frog.y + CELL_H / 2;
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 3;
    ctx.globalAlpha = Math.max(0, deathTimer / DEATH_DURATION);
    ctx.beginPath();
    ctx.moveTo(dx - 8, dy - 8);
    ctx.lineTo(dx + 8, dy + 8);
    ctx.moveTo(dx + 8, dy - 8);
    ctx.lineTo(dx - 8, dy + 8);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === Draw hazard warnings (WIS) ===
  drawHazardWarnings();

  // Zone fog overlay
  ctx.fillStyle = zone.fogColor;
  ctx.fillRect(0, GRID_TOP, GW, GH - GRID_TOP);

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // === Score popups ===
  drawScorePopups();

  // === HUD ===
  TAS.ui.drawHUD(score, level, lives, GW, { lifeColor: PLAYER_COLOR });

  // Zone name in HUD
  ctx.fillStyle = '#88aacc';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(getZone().name, GW - 4, HUD_H - 4);
  ctx.textAlign = 'left';

  // Player name + stat level in HUD
  ctx.fillStyle = PLAYER_COLOR;
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  if (statB.level > 0) {
    ctx.fillText(PLAYER_NAME + ' Lv.' + statB.level, GW / 2, HUD_H - 4);
  }
  ctx.textAlign = 'left';

  // Timer bar at bottom
  var timerBarY = GH - 6;
  var timerBarW = GW - 20;
  var maxTime = TIME_PER_LIFE + CON_TIMER_BONUS;
  var timerPct = Math.max(0, timeLeft / maxTime);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(10, timerBarY - 1, timerBarW, 5);
  var timerColor = timerPct > 0.3 ? PLAYER_COLOR : (timerPct > 0.15 ? '#ccaa22' : '#cc3322');
  ctx.fillStyle = timerColor;
  ctx.fillRect(10, timerBarY - 1, timerBarW * timerPct, 5);

  // Timer warning flash
  if (timeLeft < 5 && Math.floor(frame / 15) % 2 === 0) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TIME!', GW / 2, timerBarY - 5);
  }

  // === Zone transition overlay ===
  if (zoneTransTimer > 0) {
    var transPct = zoneTransTimer / ZONE_TRANS_DURATION;
    ctx.fillStyle = 'rgba(0,0,0,' + (transPct * 0.6) + ')';
    ctx.fillRect(0, 0, GW, GH);
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, transPct * 2);
    ctx.fillStyle = PLAYER_COLOR;
    ctx.font = 'bold 18px monospace';
    ctx.fillText(getZone().name, GW / 2, GH * 0.45);
    ctx.fillStyle = '#88aacc';
    ctx.font = '11px monospace';
    ctx.fillText('Level ' + level, GW / 2, GH * 0.55);
    ctx.globalAlpha = 1;
  }

  // === Tutorial overlay ===
  if (showTutorial && tutorialTimer > 0 && state === 'playing') {
    var tutAlpha = Math.min(1, tutorialTimer / (TUTORIAL_DURATION * 0.2));
    ctx.globalAlpha = tutAlpha * 0.85;
    ctx.fillStyle = '#000';
    ctx.fillRect(GW * 0.08, GH * 0.2, GW * 0.84, GH * 0.55);
    ctx.globalAlpha = tutAlpha;
    ctx.strokeStyle = PLAYER_COLOR;
    ctx.lineWidth = 2;
    ctx.strokeRect(GW * 0.08 + 2, GH * 0.2 + 2, GW * 0.84 - 4, GH * 0.55 - 4);

    ctx.textAlign = 'center';
    ctx.fillStyle = PLAYER_COLOR;
    ctx.font = 'bold 14px monospace';
    ctx.fillText('HOW TO PLAY', GW / 2, GH * 0.3);

    ctx.fillStyle = '#ccddee';
    ctx.font = '10px monospace';
    var lines = [
      '[W/Up] Hop forward   [S/Down] Hop back',
      '[A/Left] Hop left   [D/Right] Hop right',
      '',
      'Guide your baseling across the spore bog!',
      'Ride toxic logs and turtles through the mire.',
      'Gather POOP tokens, spore gems & garden seeds.',
      'Beware lily spores, fungi gators & bog drakes!',
      '',
      'Your stats affect gameplay - check the title!'
    ];
    for (var li = 0; li < lines.length; li++) {
      ctx.fillText(lines[li], GW / 2, GH * 0.37 + li * 13);
    }

    ctx.fillStyle = '#667788';
    ctx.font = '9px monospace';
    ctx.fillText('Press any key to dismiss', GW / 2, GH * 0.71);
    ctx.globalAlpha = 1;
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
