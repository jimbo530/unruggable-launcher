  ctx.textAlign = 'center';
  ctx.fillText('CONTROLS', GW / 2, GH - 76);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD: Move', GW / 2, GH - 62);
  ctx.fillText('Z/SPACE: Vomit (hold=Beam)', GW / 2, GH - 50);
  ctx.fillText('X: Dive Bomb', GW / 2, GH - 38);
}

// ============================================================
// DRAW - TITLE
// ============================================================
function drawTitle() {
  // Background city silhouette
  ctx.fillStyle = '#1a1a2a';
  for (let i = 0; i < 12; i++) {
    const h = 40 + Math.sin(i * 2.1) * 30 + 30;
    ctx.fillRect(i * 42, GH - h - 30, 35, h);
  }
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, GH - 30, GW, 30);

  // Ambient particles
  if (frame % 15 === 0) {
    TAS.particles.spawn(
      100 + Math.random() * 280,
      200 + Math.random() * 60,
      '#ff8844', 3, 1.5, { gravity: 0.1, shape: 'rect', size: 3 }
    );
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('ZOMBIE NATION', GW / 2 + 2, 62);
  ctx.fillStyle = statB.color || '#44ff88';
  ctx.fillText('ZOMBIE NATION', GW / 2, 60);

  // Subtitle
  ctx.fillStyle = '#aa88cc';
  ctx.font = '11px monospace';
  ctx.fillText('The Baseling Head of Destruction', GW / 2, 82);

  // Draw demo head
  const headY = 150 + Math.sin(frame * 0.03) * 10;
  drawHead(GW / 2, headY);

  TAS.particles.draw();

  // Stat display
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, GW / 2, 205);
  ctx.fillText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 218);

  // Instructions
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS: Move | Z/SPACE: Vomit (hold for Beam)', GW / 2, 238);
  ctx.fillText('X: Dive Bomb | Destroy everything!', GW / 2, 253);

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 280);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 305);
  }
}

// ============================================================
// DRAW - STAGE INTRO
// ============================================================
function drawStageIntro() {
  const sc = STAGE_COLORS[stage];
  ctx.fillStyle = sc.bg;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#666';
  ctx.font = '12px monospace';
  ctx.fillText('STAGE ' + (stage + 1), GW / 2, GH / 2 - 40);

  ctx.fillStyle = sc.accent;
  ctx.font = 'bold 20px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW / 2, GH / 2 - 10);

  // Stage description
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText(STAGE_DESCS[stage], GW / 2, GH / 2 + 15);

  const pulse = Math.sin(stageFrame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('GET READY...', GW / 2, GH / 2 + 40);
  ctx.globalAlpha = 1;
}

// ============================================================
// DRAW - VICTORY
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // Confetti particles
  if (frame % 5 === 0) {
    const colors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff'];
    TAS.particles.spawn(Math.random() * GW, -10, colors[Math.floor(Math.random() * 6)], 2, 1.5, { gravity: 0.05, size: 3, shape: 'rect' });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 80);

  ctx.fillStyle = '#88ffdd';
  ctx.font = '14px monospace';
  ctx.fillText('Tasern is Liberated!', GW / 2, 110);

  // Draw triumphant head
  headExpr = 'triumph';
  drawHead(GW / 2, 170);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 230);

  if (score >= highScore) {
    const p = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = p;
    ctx.fillStyle = '#ff88ff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 255);
    ctx.globalAlpha = 1;
  }

  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, 295);
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
