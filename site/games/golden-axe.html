function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / GAME_W, sh / GAME_H);
  W = Math.floor(GAME_W * SCALE);
  H = Math.floor(GAME_H * SCALE);
  const ox = Math.floor((sw - W) / 2);
  const oy = Math.floor((sh - H) / 2);
  canvas.width = GAME_W * dpr;
  canvas.height = GAME_H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, oy) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
  gain.gain.setValueAtTime(vol || 0.1, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function playNoise(dur, vol, freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = freq || 800;
  filt.Q.value = 2;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);
}

const keys = {};
const input = { left: false, right: false, up: false, down: false, attack: false, jump: false, magic: false };
let touchState = { active: false, sx: 0, sy: 0, dx: 0, dy: 0, attack: false, jump: false, magic: false };

document.addEventListener('keydown', e => { ensureAudio(); keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

function updateInput() {
  input.left = keys['ArrowLeft'] || keys['KeyA'] || touchState.dx < -20;
  input.right = keys['ArrowRight'] || keys['KeyD'] || touchState.dx > 20;
  input.up = keys['ArrowUp'] || keys['KeyW'] || touchState.dy < -20;
  input.down = keys['ArrowDown'] || keys['KeyS'] || touchState.dy > 20;
  input.attack = keys['KeyZ'] || keys['KeyJ'] || keys['Space'] || touchState.attack;
  input.jump = keys['KeyX'] || keys['KeyK'] || touchState.jump;
  input.magic = keys['KeyC'] || keys['KeyL'] || touchState.magic;
}

let touchId = null;
canvas.addEventListener('touchstart', e => {
  ensureAudio();
  e.preventDefault();
  for (const t of e.changedTouches) {
    const rect = canvas.getBoundingClientRect();
    const tx = (t.clientX - rect.left) / SCALE;
    const ty = (t.clientY - rect.top) / SCALE;
    if (tx < GAME_W * 0.4) {
      touchId = t.identifier;
      touchState.active = true;
      touchState.sx = t.clientX;
      touchState.sy = t.clientY;
      touchState.dx = 0;
      touchState.dy = 0;
    } else if (tx > GAME_W * 0.55) {
      if (ty < GAME_H * 0.35) { touchState.magic = true; }
      else if (tx > GAME_W * 0.78) { touchState.jump = true; }
      else { touchState.attack = true; }
    }
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchState.dx = t.clientX - touchState.sx;
      touchState.dy = t.clientY - touchState.sy;
    }
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      touchState.active = false;
      touchState.dx = 0;
      touchState.dy = 0;
      touchId = null;
    }
  }
  touchState.attack = false;
  touchState.jump = false;
  touchState.magic = false;
}, { passive: false });

// ============================================================
// PARTICLES SYSTEM
// ============================================================
function spawnParticles(x, y, color, count, speed, gravity) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.3 + Math.random() * 0.7);
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - (gravity ? 1 : 0),
      life: 0.5 + Math.random() * 0.5,
      maxLife: 1,
      color,
      size: 1 + Math.random() * 3,
      gravity: gravity || false
    });
  }
}

function spawnSpark(x, y, color, dir) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      x, y,
      vx: dir * (1 + Math.random() * 3),
      vy: -2 + Math.random() * 4,
      life: 0.3 + Math.random() * 0.2,
      maxLife: 0.5,
      color,
      size: 1 + Math.random() * 2,
      gravity: true
    });
  }
}

function spawnMagicBurst(x, y, color, radius) {
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2;
    const spd = radius * 0.05;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 0.8 + Math.random() * 0.4,
      maxLife: 1.2,
      color,
      size: 2 + Math.random() * 4,
      gravity: false
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += 0.15;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cameraX - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
