  const cfg = configs[type] || configs.chieftain;
  const b = createEntity(x, y, {
    hp: cfg.hp, speed: 1.0, power: cfg.power,
    color: cfg.color, color2: cfg.color2,
    type: 'enemy', w: cfg.w, h: cfg.h,
    ai: 'boss', score: 500 + level * 200
  });
  b.isBoss = true;
  b.bossType = type;
  b.bossName = cfg.name;
  b.phase = 1;
  b.pattern = 0;
  b.patternTimer = 0;
  b.score = 500 + level * 200;
  b.ai = 'boss';
  return b;
}

// ============================================================
// MOUNT SYSTEM
// ============================================================
const MOUNTS = [
  { name: 'Fire Drake', color: '#CC3333', color2: '#881111', attackType: 'fire', power: 18, speed: 1.6, hp: 40 },
  { name: 'Swamp Lizard', color: '#33AA33', color2: '#227722', attackType: 'tail', power: 14, speed: 1.9, hp: 35 },
  { name: 'War Cockatrice', color: '#FFCC00', color2: '#CC9900', attackType: 'charge', power: 12, speed: 2.4, hp: 30 }
];

function createMountItem(x, y, mountIdx) {
  return { x, y, type: 'mount', mountIdx: mountIdx % 3, w: 24, h: 16, bobTimer: 0 };
}

function mountAttack() {
  if (!player.mounted || !player.mount) return;
  const m = player.mount;
  if (player.attackCooldown > 0) return;
  player.attackCooldown = 0.5;
  player.state = 'attack';
  player.stateTimer = 0.3;

  if (m.attackType === 'fire') {
    SFX.fireBreath();
    // Fire breath projectile
    items.push({
      x: player.x + player.facing * 15, y: player.y - 8,
      vx: player.facing * 4, vy: 0,
      type: 'fire_breath', color: '#FF4400', life: 0.6, power: m.power, w: 20, h: 10
    });
    spawnParticles(player.x + player.facing * 20, player.y - 8, '#FF6600', 6, 2, true);
  } else if (m.attackType === 'tail') {
    SFX.tailWhip();
    // Wide area attack behind
    for (const e of allEnemies) {
      if (!e.alive) continue;
      const dx = e.x - player.x;
      const dy = Math.abs(e.y - player.y);
      if (Math.abs(dx) < 35 && dy < 25) {
        damageEntity(e, m.power, player.facing);
      }
    }
    spawnParticles(player.x, player.y, '#33AA33', 8, 3, false);
  } else if (m.attackType === 'charge') {
    SFX.charge();
    // Dash forward
    player.vx = player.facing * 6;
    for (const e of allEnemies) {
      if (!e.alive) continue;
      const dx = e.x - player.x;
      const dy = Math.abs(e.y - player.y);
      if (dx * player.facing > 0 && dx * player.facing < 50 && dy < 20) {
        damageEntity(e, m.power, player.facing);
      }
    }
  }
}

// ============================================================
// AI BEHAVIORS
// ============================================================
function runAI(e, dt) {
  if (!e.alive || e.knockdown || e.grabbed || e.stunTimer > 0) return;
  if (e.attackCooldown > 0) e.attackCooldown -= dt;
  if (e.stunTimer > 0) { e.stunTimer -= dt; e.vx = 0; e.vy = 0; return; }
  if (!player.alive) { e.vx = 0; e.vy = 0; e.state = 'idle'; return; }

  const dx = player.x - e.x;
  const dy = player.y - e.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  switch (e.ai) {
    case 'basic': aiBasic(e, dx, dy, dist); break;
    case 'aggressive': aiAggressive(e, dx, dy, dist); break;
    case 'ranged': aiRanged(e, dx, dy, dist); break;
    case 'shield': aiShield(e, dx, dy, dist); break;
    case 'swarm': aiSwarm(e, dx, dy, dist); break;
    case 'mounted_enemy': aiMountedEnemy(e, dx, dy, dist); break;
    case 'boss': runBossAI(e, dt, dx, dy, dist); break;
    default: aiBasic(e, dx, dy, dist);
  }
}

function aiBasic(e, dx, dy, dist) {
  if (dist > e.attackRange + 10) {
    e.vx = Math.sign(dx) * e.speed * 0.6;
    e.vy = Math.sign(dy) * e.speed * 0.3;
    e.facing = Math.sign(dx) || 1;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.3;
    e.attackCooldown = 1.2 + Math.random() * 0.8;
    e.vx = 0; e.vy = 0;
  } else {
    e.vx = 0; e.vy = 0;
    e.state = 'idle';
    if (Math.random() < 0.02) e.vy = (Math.random() - 0.5) * e.speed;
  }
}

function aiAggressive(e, dx, dy, dist) {
  if (dist > e.attackRange + 5) {
    e.vx = Math.sign(dx) * e.speed * 0.9;
    e.vy = Math.sign(dy) * e.speed * 0.5;
    e.facing = Math.sign(dx) || 1;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.25;
    e.attackCooldown = 0.6 + Math.random() * 0.4;
    e.vx = Math.sign(dx) * 1;
    e.vy = 0;
  } else {
    e.vx = Math.sign(dx) * e.speed * 0.3;
    e.vy = (Math.random() - 0.5) * e.speed * 0.5;
    e.state = 'walk';
  }
}

function aiRanged(e, dx, dy, dist) {
  e.facing = Math.sign(dx) || 1;
  if (dist > e.attackRange + 20) {
    e.vx = Math.sign(dx) * e.speed * 0.5;
    e.vy = Math.sign(dy) * e.speed * 0.3;
    e.state = 'walk';
  } else if (dist < 45) {
    e.vx = -Math.sign(dx) * e.speed * 0.8;
    e.vy = (Math.random() - 0.5) * e.speed * 0.6;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.4;
    e.attackCooldown = 1.5 + Math.random() * 1.0;
    e.vx = 0; e.vy = 0;
    const projColor = e.enemyType === 'fire_imp' ? '#FF6600' : e.enemyType === 'mage_enemy' ? '#AA44FF' : '#7744AA';
    items.push({
      x: e.x + e.facing * 8, y: e.y - 12,
      vx: Math.sign(dx) * 3, vy: (dy / dist) * 0.5,
      type: 'projectile', color: projColor, life: 2.5, power: Math.floor(e.power * 0.8), w: 5, h: 5
    });
  } else {
    e.vx = (Math.random() - 0.5) * e.speed * 0.3;
    e.vy = (Math.random() - 0.5) * e.speed * 0.3;
    e.state = 'idle';
  }
}

function aiShield(e, dx, dy, dist) {
  // Block when player is attacking nearby
  if (player.state === 'attack' && dist < 40) {
    e.blockTimer = 0.5;
    e.vx = 0; e.vy = 0;
    e.state = 'block';
    return;
  }
  if (e.blockTimer > 0) {
    e.blockTimer -= 0.016;
    e.state = 'block';
    e.vx = 0; e.vy = 0;
    return;
  }
  // Otherwise act like basic
  if (dist > e.attackRange + 8) {
    e.vx = Math.sign(dx) * e.speed * 0.5;
    e.vy = Math.sign(dy) * e.speed * 0.3;
    e.facing = Math.sign(dx) || 1;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.35;
    e.attackCooldown = 1.0 + Math.random() * 0.6;
    e.vx = 0; e.vy = 0;
  } else {
    e.vx = 0; e.vy = 0;
    e.state = 'idle';
  }
}

function aiSwarm(e, dx, dy, dist) {
  // Fast, erratic approach
  e.facing = Math.sign(dx) || 1;
  if (dist > e.attackRange + 3) {
    e.vx = Math.sign(dx) * e.speed + (Math.random() - 0.5) * 0.5;
    e.vy = Math.sign(dy) * e.speed * 0.6 + (Math.random() - 0.5) * 0.8;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.2;
    e.attackCooldown = 0.5 + Math.random() * 0.3;
    e.vx = Math.sign(dx) * 2;
    e.vy = 0;
  } else {
    e.vx = (Math.random() - 0.5) * e.speed;
    e.vy = (Math.random() - 0.5) * e.speed;
    e.state = 'walk';
  }
}

function aiMountedEnemy(e, dx, dy, dist) {
  e.facing = Math.sign(dx) || 1;
  if (dist > e.attackRange + 15) {
    e.vx = Math.sign(dx) * e.speed;
    e.vy = Math.sign(dy) * e.speed * 0.4;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.stateTimer = 0.4;
    e.attackCooldown = 1.0 + Math.random() * 0.5;
    e.vx = Math.sign(dx) * 3; // Lance charge
    e.vy = 0;
  } else {
    // Circle
    e.vx = Math.sign(dy) * e.speed * 0.6;
    e.vy = -Math.sign(dx) * e.speed * 0.4;
    e.state = 'walk';
  }
}

function runBossAI(e, dt, dx, dy, dist) {
  e.patternTimer -= dt;
  if (e.patternTimer <= 0) {
    e.pattern = Math.floor(Math.random() * 5);
    e.patternTimer = 1.5 + Math.random() * 2;
  }

  // Phase shifts
  if (e.hp < e.maxHp * 0.33) { if (e.phase < 3) { e.phase = 3; SFX.explosion(); shakeTimer = 0.5; shakeIntensity = 6; spawnMagicBurst(e.x, e.y - 20, '#FF0000', 40); } }
  else if (e.hp < e.maxHp * 0.66) { if (e.phase < 2) { e.phase = 2; SFX.boss(); shakeTimer = 0.3; shakeIntensity = 4; } }

  const aggro = 0.5 + e.phase * 0.25;
  e.facing = Math.sign(dx) || 1;

  switch (e.pattern) {
    case 0: // Charge attack
      if (dist > 30) {
        e.vx = Math.sign(dx) * e.speed * aggro * 1.8;
        e.vy = Math.sign(dy) * e.speed * aggro * 0.6;
        e.state = 'walk';
      } else if (e.attackCooldown <= 0) {
        e.state = 'attack';
        e.stateTimer = 0.35;
        e.attackCooldown = 0.7 / aggro;
        e.vx = 0; e.vy = 0;
      }
      break;
    case 1: // Retreat and projectile
      if (dist < 70) {
        e.vx = -Math.sign(dx) * e.speed * 1.2;
        e.vy = (Math.random() - 0.5) * e.speed;
        e.state = 'walk';
      } else if (e.attackCooldown <= 0) {
        e.state = 'attack';
        e.stateTimer = 0.4;
        e.attackCooldown = 0.8 / aggro;
        e.vx = 0; e.vy = 0;
        // Boss projectile
        items.push({ x: e.x + e.facing * 10, y: e.y - 15, vx: Math.sign(dx) * 4, vy: 0, type: 'projectile', color: '#FF2200', life: 2.5, power: Math.floor(e.power * 0.7), w: 8, h: 8 });
        if (e.phase >= 2) {
          items.push({ x: e.x + e.facing * 10, y: e.y - 5, vx: Math.sign(dx) * 3.5, vy: 0.5, type: 'projectile', color: '#FF4400', life: 2.5, power: Math.floor(e.power * 0.5), w: 6, h: 6 });
          items.push({ x: e.x + e.facing * 10, y: e.y - 25, vx: Math.sign(dx) * 3.5, vy: -0.5, type: 'projectile', color: '#FF4400', life: 2.5, power: Math.floor(e.power * 0.5), w: 6, h: 6 });
        }
      }
      break;
    case 2: // Rapid combo
      if (dist > 20) {
        e.vx = Math.sign(dx) * e.speed * 2.2 * aggro;
        e.vy = Math.sign(dy) * e.speed * 0.8;
        e.state = 'walk';
      } else if (e.attackCooldown <= 0) {
        e.state = 'attack';
        e.stateTimer = 0.15;
        e.attackCooldown = 0.2;
        e.vx = Math.sign(dx) * 1;
      }
      break;
    case 3: // Circle strafe
      e.vx = Math.sign(dy) * e.speed * aggro;
      e.vy = -Math.sign(dx) * e.speed * 0.6 * aggro;
      e.state = 'walk';
      if (e.attackCooldown <= 0 && dist < 50) {
        e.state = 'attack';
        e.stateTimer = 0.3;
        e.attackCooldown = 0.8;
        e.vx = 0; e.vy = 0;
      }
      break;
    case 4: // Jump slam (phase 2+)
      if (e.phase >= 2 && e.z === 0 && e.attackCooldown <= 0) {
        e.vz = 5;
        e.vx = Math.sign(dx) * 3;
        e.attackCooldown = 2.0;
        // Slam damage on landing handled in update
      } else if (e.z === 0) {
        e.vx = Math.sign(dx) * e.speed * 0.5;
        e.vy = Math.sign(dy) * e.speed * 0.3;
        e.state = 'walk';
      }
      break;
  }
}

// ============================================================
// COMBAT SYSTEM
// ============================================================
let attackPressed = false;
let jumpPressed = false;
let magicPressed = false;

function playerAttack() {
  if (!player.alive || player.knockdown || player.stunTimer > 0) return;

  if (player.mounted) {
    mountAttack();
    return;
  }

  if (player.z > 0) {
    // Jump attack - downward strike
    player.state = 'jumpattack';
    player.stateTimer = 0.25;
    const charPower = player.charIdx === 0 ? 1.8 : player.charIdx === 1 ? 1.3 : 1.5;
    SFX.heavySlash();
    checkPlayerHit(player.power * charPower, 28, true);
    return;
  }

  // Ground combo
  player.comboStep++;
  if (player.comboStep > 3) player.comboStep = 1;
  player.comboTimer = 0.6;
  player.state = 'attack';

  let dmgMult = 1, range = 22, dur = 0.2;
  if (player.comboStep === 2) { dmgMult = 1.2; range = 24; dur = 0.22; }
  if (player.comboStep === 3) { dmgMult = 2.0; range = 30; dur = 0.3; }

  // Character-specific adjustments
  if (player.charIdx === 0) { dmgMult *= 1.2; range += 4; } // Warrior = more damage, more range
  if (player.charIdx === 1) { dur *= 0.7; } // Mage = faster attacks
  if (player.charIdx === 2 && player.comboStep === 3) { range += 10; } // Dwarf spin = huge range on 3rd

  player.stateTimer = dur;
  player.vx = player.facing * (player.comboStep === 3 ? 2 : 0.5);

  if (player.comboStep === 3) { SFX.combo(); } else { SFX.slash(); }
  checkPlayerHit(player.power * dmgMult, range, false);
}

function checkPlayerHit(damage, range, jumpAttack) {
  let hitSomething = false;
  for (const e of allEnemies) {
    if (!e.alive || e.invincible > 0) continue;
    const dx = e.x - player.x;
    const dy = Math.abs(e.y - player.y);

    // Shield block check
    if (e.state === 'block' && dx * player.facing > 0 && !jumpAttack) {
      if (dy < 20 && Math.abs(dx) < range) {
        SFX.block();
        spawnSpark(e.x - e.facing * 8, e.y - e.h * 0.6, '#FFFFFF', -e.facing);
        player.stunTimer = 0.3;
        player.vx = -player.facing * 2;
        continue;
      }
    }

    if (dy < 22 && dx * player.facing > -8 && dx * player.facing < range) {
      damageEntity(e, damage, player.facing);
      hitSomething = true;
      comboCount++;
      comboTimer = 2.5;
      score += 10 * Math.min(comboCount, 10);
    }
  }
  if (!hitSomething && player.comboStep >= 3) {
    player.comboStep = 0;
  }
}

function playerJump() {
  if (!player.alive || player.knockdown || player.z > 0 || player.stunTimer > 0) return;
  player.vz = 5.5;
  player.state = 'jump';
  SFX.jump();
}

function playerMagic() {
  if (!player.alive || player.knockdown || magicPotions <= 0 || player.stunTimer > 0) return;

  const usePotions = Math.min(magicPotions, 3);
  magicPotions -= usePotions;

  player.state = 'magic';
  player.stateTimer = 0.9;
  player.invincible = 1.2;
  player.vx = 0; player.vy = 0;

  const c = CHARS[player.charIdx];
  const dmg = c.magic[usePotions - 1];

  if (usePotions === 1) SFX.magic1();
  else if (usePotions === 2) SFX.magic2();
  else SFX.magic3();

  // Hit all on-screen enemies
  for (const e of allEnemies) {
    if (!e.alive) continue;
    const sx = e.x - cameraX;
    if (sx > -30 && sx < GAME_W + 30) {
      damageEntity(e, dmg, player.facing);
      spawnParticles(e.x, e.y - e.h / 2, c.magicColor, 10, 3, true);
    }
  }

  // Visual effects scale with level
  shakeTimer = 0.2 + usePotions * 0.15;
  shakeIntensity = 2 + usePotions * 2;
  screenFlash = 0.3;
  screenFlashColor = c.magicColor;
  spawnMagicBurst(player.x, player.y - 15, c.magicColor, 30 + usePotions * 15);
}

function damageEntity(e, dmg, dir) {
  if (e.invincible > 0) return;
  e.hp -= Math.floor(dmg);
  e.invincible = 0.15;
  e.flashTimer = 0.12;
  spawnParticles(e.x, e.y - e.h / 2, '#FFFF44', 3, 2, true);
  spawnSpark(e.x, e.y - e.h * 0.5, '#FFFFFF', dir || 1);

  if (e.hp <= 0) {
    e.alive = false;
    e.deathTimer = 0.6;
    e.vx = (dir || 1) * 2;
    e.vz = 2;
    if (e.type === 'enemy') {
      score += e.score || 50;
      spawnParticles(e.x, e.y - e.h / 2, e.color, 12, 3, true);
      // Drop items
      if (Math.random() < 0.12) {
        items.push({ x: e.x, y: e.y, type: 'meat', w: 10, h: 8, bobTimer: 0 });
      } else if (Math.random() < 0.06) {
        items.push({ x: e.x, y: e.y, type: 'potion', w: 8, h: 10, bobTimer: 0 });
      }
      // Rare mount drop
      if (Math.random() < 0.03 && !player.mounted) {
        items.push(createMountItem(e.x, e.y, Math.floor(Math.random() * 3)));
      }
    }
    if (e.type === 'player') {
      SFX.die();
      shakeTimer = 0.4;
      shakeIntensity = 5;
    }
  } else {
    // Knockback / knockdown
    const knockForce = dmg / e.maxHp;
    if (knockForce > 0.2 || (e.type === 'enemy' && Math.random() < knockForce * 2)) {
      e.knockdown = true;
      e.knockTimer = 0.6 + knockForce * 0.5;
      e.vx = (dir || 1) * (2 + knockForce * 4);
      e.vz = 1.5 + knockForce * 2;
    } else {
      e.vx += (dir || 1) * 1;
    }
  }
}

// ============================================================
// GRAB / THROW SYSTEM
// ============================================================
function tryGrab() {
  if (player.grabbing) return;
  for (const e of allEnemies) {
    if (!e.alive || e.knockdown || e.grabbed || e.isBoss) continue;
    const dx = Math.abs(e.x - player.x);
    const dy = Math.abs(e.y - player.y);
    if (dx < 16 && dy < 12) {
      e.grabbed = true;
      player.grabbing = e;
      player.state = 'grab';
      SFX.hit();
      return;
    }
  }
}

function throwGrabbed() {
  if (!player.grabbing) return;
  const e = player.grabbing;
  e.grabbed = false;
  e.knockdown = true;
  e.knockTimer = 1.2;
  e.vx = player.facing * 6;
  e.vz = 3.5;
  player.grabbing = null;
  player.state = 'idle';
  SFX.throwSfx();
  damageEntity(e, player.power * 2.5, player.facing);
  // Thrown enemy damages others it hits
  for (const other of allEnemies) {
    if (other === e || !other.alive) continue;
    if (Math.abs(other.x - e.x) < 20 && Math.abs(other.y - e.y) < 15) {
      damageEntity(other, player.power * 1.5, player.facing);
    }
  }
}

// ============================================================
// HAZARD SYSTEM
// ============================================================
function spawnLevelHazards() {
  hazards = [];
  const L = LEVELS[level];
  if (!L.hazards.length) return;

  for (let i = 0; i < Math.floor(levelWidth / 400); i++) {
    const hx = 300 + i * 400 + Math.random() * 200;
    const hy = 190 + Math.random() * 10;
    hazards.push({ x: hx, y: hy, type: L.hazards[0], w: 30, h: 10, timer: 0, active: false, cooldown: 0 });
  }
}

function updateHazards(dt) {
  for (const h of hazards) {
    h.timer += dt;
    const sx = h.x - cameraX;
    if (sx < -50 || sx > GAME_W + 50) continue;

    if (h.type === 'lava') {
      h.active = true;
      if (Math.abs(player.x - h.x) < h.w && Math.abs(player.y - h.y) < 12 && player.z < 3) {
        if (player.invincible <= 0) {
          damageEntity(player, 3, 0);
          player.invincible = 0.5;
        }
      }
    } else if (h.type === 'electric') {
      h.cooldown -= dt;
      h.active = h.cooldown <= 0 && Math.sin(h.timer * 3) > 0.5;
      if (h.active && Math.abs(player.x - h.x) < h.w && Math.abs(player.y - h.y) < 15 && player.z < 2) {
        if (player.invincible <= 0) {
          damageEntity(player, 5, Math.sign(player.x - h.x));
          player.invincible = 0.8;
          h.cooldown = 2;
        }
      }
    } else if (h.type === 'spore_cloud') {
      h.active = Math.sin(h.timer * 2) > 0.3;
      if (h.active && Math.abs(player.x - h.x) < h.w * 1.5 && Math.abs(player.y - h.y) < 20) {
        if (player.invincible <= 0 && Math.random() < 0.01) {
          player.stunTimer = 1.0;
          spawnParticles(player.x, player.y - 15, '#7744AA', 5, 1, false);
        }
      }
    } else if (h.type === 'fire_rain' || h.type === 'dark_pulse') {
      h.cooldown -= dt;
      if (h.cooldown <= 0) {
        h.cooldown = 3 + Math.random() * 2;
        // Spawn falling projectile
        items.push({
          x: h.x + (Math.random() - 0.5) * 60, y: 80,
          vx: 0, vy: 2.5,
          type: 'projectile',
          color: h.type === 'fire_rain' ? '#FF4400' : '#6600AA',
          life: 2, power: 8 + level, w: 6, h: 6
        });
      }
    }
  }
}

function drawHazards() {
  for (const h of hazards) {
    const sx = h.x - cameraX;
    if (sx < -50 || sx > GAME_W + 50) continue;

    if (h.type === 'lava') {
      ctx.fillStyle = '#FF2200';
      ctx.globalAlpha = 0.6 + Math.sin(h.timer * 5) * 0.2;
      ctx.fillRect(sx - h.w / 2, h.y - 2, h.w, 6);
      ctx.fillStyle = '#FFAA00';
      ctx.globalAlpha = 0.4 + Math.sin(h.timer * 7) * 0.3;
      ctx.fillRect(sx - h.w / 2 + 4, h.y, h.w - 8, 3);
      ctx.globalAlpha = 1;
    } else if (h.type === 'electric') {
      if (h.active) {
        ctx.strokeStyle = '#44CCFF';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sx - 5, h.y - 20);
        for (let i = 0; i < 5; i++) {
          ctx.lineTo(sx + (Math.random() - 0.5) * 10, h.y - 20 + i * 5 + Math.random() * 3);
        }
        ctx.lineTo(sx + 3, h.y);
        ctx.stroke();
        ctx.lineWidth = 1;
      }
      ctx.fillStyle = '#445566';
      ctx.fillRect(sx - 3, h.y - 22, 6, 4);
    } else if (h.type === 'spore_cloud') {
      if (h.active) {
        ctx.fillStyle = '#7744AA';
        ctx.globalAlpha = 0.25 + Math.sin(h.timer * 2) * 0.1;
        ctx.beginPath();
        ctx.arc(sx, h.y - 5, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }
}

// ============================================================
// LEVEL & WAVE MANAGEMENT
// ============================================================
function startLevel(lvl) {
  level = lvl;
  const L = LEVELS[level];
  levelWidth = L.width;
  cameraX = 0;
  scrollTarget = 0;
  scrollLocked = false;
  currentWave = 0;
  allEnemies = [];
  items = [];
  particles = [];
  bossActive = false;
  boss = null;
  waveSpawnTimer = 0;

  player.x = 60;
  player.y = 160;
  player.z = 0;
  player.vx = 0; player.vy = 0; player.vz = 0;
  player.state = 'idle';
  player.alive = true;
  player.hp = player.maxHp;
  player.knockdown = false;
  player.grabbing = null;
  player.stunTimer = 0;
  player.invincible = 1.5; // Brief spawn invincibility
  player.comboStep = 0;

  // Dismount between levels
  player.mounted = false;
  player.mount = null;

  spawnLevelHazards();

  // Pre-spawn first mount if applicable
  if (L.mountChance > 0 && Math.random() < L.mountChance) {
    items.push(createMountItem(250 + Math.random() * 150, 150 + Math.random() * 30, Math.floor(Math.random() * 3)));
  }

  spawnWave();
  gameState = STATE.PLAYING;
}

function spawnWave() {
  const L = LEVELS[level];
  if (currentWave >= L.waves) {
    bossActive = true;
    scrollTarget = levelWidth - GAME_W;
    boss = createBoss(L.bossType, levelWidth - 80, 155);
    allEnemies.push(boss);
    gameState = STATE.BOSS_INTRO;
    stateTimer = 2.5;
    SFX.boss();
    return;
  }

  const baseCount = 3 + Math.floor(currentWave * 0.6) + Math.floor(level * 0.4);
  const count = Math.min(baseCount, 8); // Cap per wave
  const waveX = cameraX + GAME_W + 40;
  scrollTarget = Math.min(waveX - 80, levelWidth - GAME_W);
  scrollLocked = true;

  for (let i = 0; i < count; i++) {
    const typeIdx = Math.floor(Math.random() * L.enemies.length);
    const ex = waveX + Math.random() * 140 + i * 20;
    const ey = 130 + Math.random() * 65;
    allEnemies.push(createEnemy(L.enemies[typeIdx], ex, ey));
  }

  // Occasional mount spawn mid-level
  if (currentWave === Math.floor(L.waves / 2) && Math.random() < L.mountChance && !player.mounted) {
    items.push(createMountItem(waveX - 100, 155 + Math.random() * 30, Math.floor(Math.random() * 3)));
  }

  currentWave++;
}

function checkWaveClear() {
  const alive = allEnemies.filter(e => e.alive).length;
  if (alive > 0) return;

  if (bossActive) {
    if (boss && !boss.alive) {
      bossActive = false;
      gameState = STATE.LEVEL_CLEAR;
      stateTimer = 3.5;
      SFX.levelClear();
      score += 1000 + level * 300;
      screenFlash = 0.5;
      screenFlashColor = '#FFD700';
    }
    return;
  }

  if (gameState !== STATE.PLAYING) return;
  scrollLocked = false;

  if (waveSpawnTimer <= 0) {
    waveSpawnTimer = 1.2; // Delay before next wave
  }
}

// ============================================================
// CAMP SCENE
// ============================================================
function startCamp() {
  gameState = STATE.CAMP;
  stateTimer = 10;
  campGnomes = [];
  player.x = GAME_W / 2 - 30;
  player.y = 170;
  player.state = 'idle';
  player.mounted = false;
  player.mount = null;

  const gnomeCount = 6 + Math.floor(level * 0.5);
  for (let i = 0; i < gnomeCount; i++) {
    campGnomes.push({
      x: GAME_W + 30 + i * 25 + Math.random() * 40,
      y: 155 + Math.random() * 35,
      vx: -(0.8 + Math.random() * 1.2),
      carrying: Math.random() < 0.6 ? 'potion' : 'meat',
      alive: true, kicked: false,
      w: 8, h: 12, kickVy: 0
    });
  }
}

function updateCamp(dt) {
  stateTimer -= dt;

  for (const g of campGnomes) {
    if (!g.alive) continue;
    if (g.kicked) {
      g.x += 3;
      g.y += g.kickVy;
      g.kickVy += 0.3;
      if (g.y > 220) g.alive = false;
      continue;
    }
    g.x += g.vx;
    if (g.x < -30) g.alive = false;
  }

  // Player movement in camp
  if (input.left) player.x -= 1.5;
  if (input.right) player.x += 1.5;
  if (input.up) player.y -= 1;
  if (input.down) player.y += 1;
  player.x = Math.max(10, Math.min(GAME_W - 10, player.x));
  player.y = Math.max(145, Math.min(195, player.y));
  player.state = (input.left || input.right) ? 'walk' : 'idle';
  if (input.left) player.facing = -1;
  if (input.right) player.facing = 1;
  player.animTimer += dt;
  if (player.animTimer > 0.15) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }

  if (stateTimer <= 0) {
    if (level + 1 >= LEVELS.length) {
      gameState = STATE.WIN;
    } else {
      startLevel(level + 1);
    }
  }
}

function kickGnomes() {
  for (const g of campGnomes) {
    if (g.kicked || !g.alive) continue;
    if (Math.abs(g.x - player.x) < 18 && Math.abs(g.y - player.y) < 14) {
      g.kicked = true;
      g.kickVy = -3;
      SFX.gnomeKick();
      if (g.carrying === 'potion') {
        magicPotions = Math.min(9, magicPotions + 1);
        SFX.potionPickup();
        spawnParticles(g.x, g.y - 5, '#4488FF', 4, 2, true);
      } else {
        player.hp = Math.min(player.maxHp, player.hp + 20);
        SFX.pickup();
        spawnParticles(g.x, g.y - 5, '#FF8844', 4, 2, true);
      }
      score += 25;
    }
  }
}

// ============================================================
// ENTITY UPDATE
// ============================================================
function updateEntity(e, dt) {
  if (!e.alive) {
    e.deathTimer -= dt;
    e.x += e.vx * 0.5;
    e.vx *= 0.9;
    if (e.z > 0 || e.vz > 0) { e.vz -= 0.3; e.z += e.vz; if (e.z < 0) e.z = 0; }
    return;
  }

  // Timers
  if (e.invincible > 0) e.invincible -= dt;
  if (e.flashTimer > 0) e.flashTimer -= dt;
  if (e.stunTimer > 0) { e.stunTimer -= dt; e.vx *= 0.9; e.vy *= 0.9; }
  if (e.attackCooldown > 0) e.attackCooldown -= dt;

  if (e.stateTimer > 0) {
    e.stateTimer -= dt;
    if (e.stateTimer <= 0) {
      if (e.state === 'attack' || e.state === 'jumpattack' || e.state === 'magic') {
        e.state = e.z > 0 ? 'jump' : 'idle';
      }
    }
  }

  // Knockdown recovery
  if (e.knockdown) {
    e.knockTimer -= dt;
    e.vx *= 0.92;
    if (e.z <= 0 && e.vz <= 0 && e.knockTimer <= 0) {
      e.knockdown = false;
      e.z = 0;
      e.vz = 0;
      e.state = 'idle';
      e.invincible = 0.3;
    }
  }

  // Gravity
  if (e.z > 0 || e.vz > 0) {
    e.vz -= 0.28;
    e.z += e.vz;
    if (e.z <= 0) {
      e.z = 0;
      e.vz = 0;
      if (e.state === 'jump') { e.state = 'idle'; SFX.land(); }
      // Boss slam damage
      if (e.isBoss && e.phase >= 2) {
        const dist = Math.sqrt((player.x - e.x) ** 2 + (player.y - e.y) ** 2);
        if (dist < 40 && player.invincible <= 0) {
          damageEntity(player, e.power * 0.8, Math.sign(player.x - e.x));
          shakeTimer = 0.2;
          shakeIntensity = 3;
        }
      }
    }
  }

  // Movement
  e.x += e.vx;
  e.y += e.vy;

  // Bounds
  e.y = Math.max(128, Math.min(198, e.y));
  if (e.type === 'player') {
    e.x = Math.max(cameraX + 8, Math.min(cameraX + GAME_W - 8, e.x));
    // Scroll lock
    if (scrollLocked && allEnemies.filter(en => en.alive).length > 0) {
      const rightEdge = cameraX + GAME_W - 15;
      if (e.x > rightEdge) e.x = rightEdge;
    }
  } else {
    // Keep enemies on playfield
    e.x = Math.max(cameraX - 20, Math.min(cameraX + GAME_W + 60, e.x));
  }

  // Combo timeout
  if (e.comboTimer > 0) {
    e.comboTimer -= dt;
    if (e.comboTimer <= 0) e.comboStep = 0;
  }

  // Animation
  e.animTimer += dt;
  if (e.animTimer > 0.12) {
    e.animTimer = 0;
    e.animFrame = (e.animFrame + 1) % 4;
  }

  // Grabbed entity follows grabber
  if (e.grabbed && player.grabbing === e) {
    e.x = player.x + player.facing * 14;
    e.y = player.y;
  }
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt) {
  if (!player.alive) { updateEntity(player, dt); return; }
  if (player.knockdown || player.stunTimer > 0) { updateEntity(player, dt); return; }
  if (player.state === 'attack' || player.state === 'magic' || player.state === 'jumpattack') {
    updateEntity(player, dt);
    return;
  }

  // Movement
  let mx = 0, my = 0;
  if (input.left) mx -= 1;
  if (input.right) mx += 1;
  if (input.up) my -= 1;
  if (input.down) my += 1;

  if (mx !== 0 || my !== 0) {
    const norm = Math.sqrt(mx * mx + my * my);
    const spd = player.speed * (player.mounted ? 1.8 : 1.0);
    player.vx = (mx / norm) * spd;
    player.vy = (my / norm) * spd * 0.6; // Depth movement slower
    if (mx !== 0) player.facing = mx > 0 ? 1 : -1;
    player.state = player.z > 0 ? 'jump' : 'walk';
  } else {
    player.vx *= 0.7;
    player.vy *= 0.7;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
    if (Math.abs(player.vy) < 0.1) player.vy = 0;
    if (player.z === 0 && player.state !== 'grab') player.state = 'idle';
  }

  // Actions
  if (input.attack && !attackPressed) {
    if (player.grabbing) { throwGrabbed(); }
    else { playerAttack(); }
  }
  if (input.jump && !jumpPressed) {
    if (player.grabbing) { throwGrabbed(); }
    else { playerJump(); }
  }
  if (input.magic && !magicPressed) {
    playerMagic();
  }

  // Grab attempt on combo
  if (player.state === 'idle' && player.comboStep >= 2 && input.attack) {
    tryGrab();
  }

  // Mount dismount on damage (handled in damageEntity)
  if (player.mounted && player.hp < player.maxHp * 0.3) {
    // Can dismount by pressing down+jump
    if (input.down && input.jump && !jumpPressed) {
      player.mounted = false;
      player.mount = null;
      SFX.dismount();
    }
  }

  updateEntity(player, dt);
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera(dt) {
  let target = player.x - GAME_W * 0.35;
  if (scrollLocked && allEnemies.filter(e => e.alive).length > 0) {
    target = Math.min(target, scrollTarget);
  }
  target = Math.max(0, Math.min(levelWidth - GAME_W, target));
  cameraX += (target - cameraX) * 0.06;
}

// ============================================================
// ITEMS UPDATE
// ============================================================
function updateItems(dt) {
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];

    if (it.type === 'projectile' || it.type === 'fire_breath') {
      it.x += it.vx;
      it.y += it.vy || 0;
      it.life -= dt;
      if (it.life <= 0) { items.splice(i, 1); continue; }

      // Off screen cleanup
      const sx = it.x - cameraX;
      if (sx < -50 || sx > GAME_W + 50 || it.y > 210) { items.splice(i, 1); continue; }

      // Fire breath hits enemies
      if (it.type === 'fire_breath') {
        for (const e of allEnemies) {
          if (!e.alive || e.invincible > 0) continue;
          if (Math.abs(e.x - it.x) < it.w && Math.abs(e.y - it.y) < it.h + 5) {
            damageEntity(e, it.power, Math.sign(it.vx));
            it.life = 0;
            break;
          }
        }
        continue;
      }

      // Projectile hits player
      if (Math.abs(it.x - player.x) < 10 && Math.abs(it.y - player.y) < 14 && player.invincible <= 0 && player.alive) {
        damageEntity(player, it.power || 8, Math.sign(it.vx) || 1);
        spawnParticles(it.x, it.y, it.color, 4, 2, true);
        items.splice(i, 1);
        continue;
      }
    } else if (it.type === 'meat' || it.type === 'potion') {
      it.bobTimer = (it.bobTimer || 0) + dt;
      if (player.alive && Math.abs(it.x - player.x) < 16 && Math.abs(it.y - player.y) < 16) {
        if (it.type === 'meat') {
          player.hp = Math.min(player.maxHp, player.hp + 30);
          SFX.pickup();
          spawnParticles(it.x, it.y, '#FF8844', 4, 1.5, true);
        } else {
          magicPotions = Math.min(9, magicPotions + 1);
          SFX.potionPickup();
          spawnParticles(it.x, it.y, '#4488FF', 4, 1.5, true);
        }
        items.splice(i, 1);
        score += 15;
        continue;
      }
    } else if (it.type === 'mount') {
      it.bobTimer += dt;
      if (player.alive && !player.mounted && Math.abs(it.x - player.x) < 20 && Math.abs(it.y - player.y) < 16) {
        player.mounted = true;
        player.mount = MOUNTS[it.mountIdx];
        player.mountHp = MOUNTS[it.mountIdx].hp;
        SFX.mount();
        items.splice(i, 1);
        score += 50;
        continue;
      }
    }
  }
}

// ============================================================
// DRAWING - BACKGROUND
// ============================================================
function drawBackground() {
  const L = LEVELS[level];

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, L.bg3);
  grad.addColorStop(0.35, L.bg2);
  grad.addColorStop(0.65, L.bg1);
  grad.addColorStop(1, L.ground);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Far parallax layer (mountains/structures)
  const px1 = cameraX * 0.15;
  ctx.fillStyle = L.bg2;
  for (let i = 0; i < 10; i++) {
    const bx = ((i * 70) - px1 % 700 + 700) % 700 - 50;
    const bh = 15 + ((i * 41 + level * 17) % 35);
    ctx.fillRect(bx, 90 - bh, 40, bh);
    ctx.beginPath();
    ctx.moveTo(bx, 90 - bh);
    ctx.lineTo(bx + 20, 90 - bh - 10);
    ctx.lineTo(bx + 40, 90 - bh);
    ctx.fill();
  }

  // Mid parallax (trees/pillars/etc)
  const px2 = cameraX * 0.35;
  drawMidground(L, px2);

  // Ground plane
  ctx.fillStyle = L.ground;
  ctx.fillRect(0, 118, GAME_W, GAME_H - 118);

  // Ground texture
  ctx.strokeStyle = L.groundLine;
  ctx.lineWidth = 0.5;
  for (let y = 125; y < GAME_H; y += 8) {
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(GAME_W, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Level-specific foreground decoration
  drawLevelDecor(px2);
}

function drawMidground(L, px) {
  ctx.fillStyle = L.bg1;
  switch (level) {
    case 0: // Trees
      for (let i = 0; i < 7; i++) {
        const tx = ((i * 80 + 20) - px % 560 + 560) % 560 - 40;
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(tx + 8, 75, 5, 38);
        ctx.fillStyle = '#2a6a1a';
        ctx.beginPath();
        ctx.arc(tx + 10, 70, 14, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 1: // Giant mushrooms
      for (let i = 0; i < 6; i++) {
        const mx = ((i * 95 + 10) - px % 570 + 570) % 570 - 30;
        ctx.fillStyle = '#4a3a5a';
        ctx.fillRect(mx + 6, 80, 4, 30);
        ctx.fillStyle = '#7733BB';
        ctx.beginPath();
        ctx.arc(mx + 8, 78, 12, Math.PI, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#CC88FF';
        ctx.beginPath();
        ctx.arc(mx + 5, 76, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(mx + 12, 74, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 2: // Ruined pillars & pipes
      for (let i = 0; i < 5; i++) {
        const rx = ((i * 110) - px % 550 + 550) % 550 - 30;
        ctx.fillStyle = '#555566';
        ctx.fillRect(rx, 60, 12, 55);
        ctx.fillStyle = '#444455';
        ctx.fillRect(rx - 2, 58, 16, 4);
        ctx.fillRect(rx - 2, 112, 16, 4);
        // Sparks
        if (Math.random() < 0.02) {
          spawnParticles(rx + cameraX * 0.35 + 6, 90, '#44CCFF', 2, 1, true);
        }
      }
      break;
    case 3: // Castle wall
      ctx.fillStyle = '#5a5a6a';
      ctx.fillRect(0, 50, GAME_W, 60);
      for (let i = 0; i < 25; i++) {
        const bx = ((i * 20) - px % 500 + 500) % 500 - 10;
        ctx.fillStyle = (i % 2 === 0) ? '#6a6a7a' : '#4a4a5a';
        ctx.fillRect(bx, 50, 18, 8);
      }
      break;
    case 4: // Stalactites
      for (let i = 0; i < 8; i++) {
        const sx = ((i * 65) - px % 520 + 520) % 520 - 20;
        ctx.fillStyle = '#3a3a4a';
        ctx.beginPath();
        ctx.moveTo(sx, 0);
        ctx.lineTo(sx + 8, 30 + (i * 7 % 20));
        ctx.lineTo(sx + 16, 0);
        ctx.fill();
      }
      break;
    case 5: // Volcanic rocks
      for (let i = 0; i < 6; i++) {
        const vx = ((i * 90) - px % 540 + 540) % 540 - 20;
        ctx.fillStyle = '#4a2a1a';
        ctx.beginPath();
        ctx.arc(vx + 10, 95, 12, 0, Math.PI * 2);
        ctx.fill();
        // Glow
        ctx.fillStyle = '#FF4400';
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003 + i) * 0.15;
        ctx.beginPath();
        ctx.arc(vx + 10, 95, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
    case 6: // Crystal formations
      for (let i = 0; i < 8; i++) {
        const cx = ((i * 70) - px % 560 + 560) % 560 - 20;
        const ch = 20 + (i * 13 % 25);
        ctx.fillStyle = '#3388CC';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(cx, 105);
        ctx.lineTo(cx + 4, 105 - ch);
        ctx.lineTo(cx + 8, 105);
        ctx.fill();
        ctx.fillStyle = '#55CCFF';
        ctx.beginPath();
        ctx.moveTo(cx + 10, 105);
        ctx.lineTo(cx + 13, 105 - ch * 0.7);
        ctx.lineTo(cx + 16, 105);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
    case 7: // Ships and masts
      for (let i = 0; i < 4; i++) {
        const sx = ((i * 130) - px % 520 + 520) % 520 - 30;
        ctx.fillStyle = '#5a3a2a';
        ctx.fillRect(sx, 70, 3, 40);
        ctx.fillStyle = '#DDCCBB';
        ctx.fillRect(sx - 8, 72, 18, 12);
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(sx - 15, 95, 34, 15);
      }
      break;
    case 8: // Gears
      for (let i = 0; i < 6; i++) {
        const gx = ((i * 85) - px % 510 + 510) % 510 - 20;
        const angle = Date.now() * 0.001 + i;
        ctx.save();
        ctx.translate(gx + 10, 85);
        ctx.rotate(angle);
        ctx.fillStyle = '#886633';
        ctx.beginPath();
        for (let t = 0; t < 8; t++) {
          const a = (t / 8) * Math.PI * 2;
          const r = t % 2 === 0 ? 14 : 10;
          if (t === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#554422';
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      break;
    case 9: // Dark spire windows
      ctx.fillStyle = '#2a1a3a';
      ctx.fillRect(0, 30, GAME_W, 80);
      for (let i = 0; i < 8; i++) {
        const wx = ((i * 60) - px % 480 + 480) % 480 - 15;
        ctx.fillStyle = '#6600AA';
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() * 0.002 + i * 0.7) * 0.2;
        ctx.fillRect(wx, 55, 8, 14);
        ctx.globalAlpha = 1;
      }
      break;
    case 10: // Dragon bones
      for (let i = 0; i < 4; i++) {
        const dx = ((i * 140) - px % 560 + 560) % 560 - 40;
        ctx.fillStyle = '#CCBB99';
        // Rib cage
        ctx.beginPath();
        ctx.arc(dx + 20, 90, 18, Math.PI * 0.7, Math.PI * 1.3);
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#CCBB99';
        ctx.stroke();
        ctx.fillRect(dx + 15, 88, 30, 3);
      }
      break;
    case 11: // Throne room pillars
      for (let i = 0; i < 6; i++) {
        const tx = ((i * 80) - px % 480 + 480) % 480 - 15;
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(tx, 20, 14, 95);
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(tx - 3, 18, 20, 6);
        ctx.fillRect(tx - 3, 110, 20, 6);
        // Sinister glow
        ctx.fillStyle = '#440066';
        ctx.globalAlpha = 0.2 + Math.sin(Date.now() * 0.002 + i) * 0.1;
        ctx.beginPath();
        ctx.arc(tx + 7, 70, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
  }
}

function drawLevelDecor(px) {
  // Near-ground decoration
  const near = cameraX * 0.6;
  ctx.fillStyle = LEVELS[level].groundLine;
  for (let i = 0; i < 15; i++) {
    const dx = ((i * 35 + 5) - near % 525 + 525) % 525 - 10;
    ctx.fillRect(dx, 200 + (i % 3) * 3, 8 + (i * 7 % 12), 2);
  }
}

// ============================================================
// DRAWING - ENTITIES
// ============================================================
function drawEntity(e) {
  if (!e.alive && e.deathTimer <= 0) return;
  const sx = Math.floor(e.x - cameraX);
  const sy = Math.floor(e.y - e.z);

  if (sx < -40 || sx > GAME_W + 40) return;

  ctx.save();
  ctx.translate(sx, sy);

  // Hit flash
  if (e.flashTimer > 0 && Math.floor(e.flashTimer * 30) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }
  // Invincibility blink
  if (e.invincible > 0 && e.type === 'player' && Math.floor(e.invincible * 10) % 2 === 0) {
    ctx.globalAlpha = 0.5;
  }
  // Death fade
  if (!e.alive) {
    ctx.globalAlpha = Math.max(0, e.deathTimer / 0.6);
  }

  // Shadow on ground
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  const shadowScale = 1 - e.z * 0.02;
  ctx.beginPath();
  ctx.ellipse(0, e.z, e.w * 0.5 * shadowScale, 3 * shadowScale, 0, 0, Math.PI * 2);
  ctx.fill();

  const dir = e.facing;
  const walking = e.state === 'walk';
  const attacking = e.state === 'attack' || e.state === 'jumpattack';
  const bob = walking ? Math.sin(e.animFrame * Math.PI * 0.5) * 1.5 : 0;
  const breathe = Math.sin(e.animTimer * 5) * 0.3;

  ctx.scale(dir, 1);

  // Mount drawing
  if (e.mounted && e.mount) {
    drawMountBody(e, bob);
  }

  // Body
  ctx.fillStyle = e.knockdown ? '#AA4444' : e.color;
  const bodyY = -e.h + bob + breathe;
  ctx.fillRect(-e.w / 2, bodyY, e.w, e.h * 0.55);

  // Armor/detail overlay
  ctx.fillStyle = e.color2;
  ctx.fillRect(-e.w / 2 + 1, bodyY + 2, e.w - 2, e.h * 0.15);

  // Legs
  const legOff = walking ? Math.sin(e.animFrame * Math.PI) * 3 : 0;
  ctx.fillStyle = e.color2;
  ctx.fillRect(-e.w / 2 + 1, bodyY + e.h * 0.55, e.w * 0.38, e.h * 0.45);
  ctx.fillRect(e.w * 0.08, bodyY + e.h * 0.55 + legOff, e.w * 0.38, e.h * 0.45);

  // Head
  ctx.fillStyle = '#FFCC88';
  if (e.enemyType === 'skeleton') ctx.fillStyle = '#DDDDCC';
  if (e.enemyType === 'mech') ctx.fillStyle = '#889999';
  ctx.fillRect(-4, bodyY - 8, 8, 8);

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(1, bodyY - 5, 2, 2);

  // Weapon / attack animation
  if (attacking) {
    drawAttackAnim(e, bodyY, bob);
  } else if (e.state === 'block') {
    // Shield raised
    ctx.fillStyle = '#99AACC';
    ctx.fillRect(e.w / 2 - 2, bodyY + 2, 5, 16);
    ctx.fillStyle = '#778899';
    ctx.fillRect(e.w / 2 - 1, bodyY + 4, 3, 12);
  }

  // Character-specific visuals
  drawCharacterDetails(e, bodyY, bob);

  ctx.restore();

  // Boss health bar (drawn outside transform)
  if (e.isBoss && e.alive) {
    drawBossHealthBar(e, sx, sy);
  }
}

function drawAttackAnim(e, bodyY, bob) {
  const swingPhase = e.stateTimer > 0.15 ? 0 : 1;

  if (e.type === 'player') {
    if (e.charIdx === 0) {
      // Warrior - golden axe swing
      ctx.fillStyle = '#8B6914';
      const ax = swingPhase ? e.w / 2 + 8 : e.w / 2 - 2;
      const ay = swingPhase ? bodyY - 5 : bodyY + 10;
      ctx.fillRect(ax, ay, 3, 14);
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(ax - 2, ay - 3, 7, 5);
      ctx.fillRect(ax - 3, ay - 5, 9, 3);
    } else if (e.charIdx === 1) {
      // Mage - staff blast
      ctx.fillStyle = '#6644CC';
      ctx.fillRect(e.w / 2 + 2, bodyY - 2, 2, 18);
      ctx.fillStyle = '#AA77FF';
      ctx.beginPath();
      ctx.arc(e.w / 2 + 3, bodyY - 4, 4, 0, Math.PI * 2);
      ctx.fill();
      if (swingPhase) {
        ctx.fillStyle = '#CC99FF';
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(e.w / 2 + 12, bodyY + 5, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else {
      // Dwarf - spin attack
      ctx.fillStyle = '#228B22';
      if (e.comboStep === 3) {
        // Full spin
        ctx.strokeStyle = '#44CC44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, bodyY + e.h * 0.3, 15, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
      } else {
        ctx.fillRect(e.w / 2 + 2, bodyY + 3, 10, 3);
        ctx.fillStyle = '#888';
        ctx.fillRect(e.w / 2 + 10, bodyY + 1, 4, 7);
      }
    }
  } else {
    // Enemy attack visual
    ctx.fillStyle = '#999';
    const wx = swingPhase ? e.w / 2 + 6 : e.w / 2;
    const wy = swingPhase ? bodyY - 2 : bodyY + 8;
    ctx.fillRect(wx, wy, 8, 2);
  }
}

function drawCharacterDetails(e, bodyY, bob) {
  if (e.type === 'player') {
    if (e.charIdx === 0) {
      // Warrior - horned helmet
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(-5, bodyY - 11, 10, 4);
      ctx.fillRect(-6, bodyY - 14, 3, 4);
      ctx.fillRect(3, bodyY - 14, 3, 4);
      // Cape
      ctx.fillStyle = '#8B0000';
      ctx.fillRect(-e.w / 2 - 2, bodyY + 3, 4, e.h * 0.4);
    } else if (e.charIdx === 1) {
      // Mage - pointed hat
      ctx.fillStyle = '#6644CC';
      ctx.beginPath();
      ctx.moveTo(-5, bodyY - 8);
      ctx.lineTo(0, bodyY - 20);
      ctx.lineTo(5, bodyY - 8);
      ctx.fill();
      ctx.fillStyle = '#AA77FF';
      ctx.fillRect(-3, bodyY - 9, 6, 2);
      // Robe bottom
      ctx.fillStyle = '#4422AA';
      ctx.fillRect(-e.w / 2, bodyY + e.h * 0.4, e.w, e.h * 0.15);
    } else {
      // Dwarf - beard and helmet
      ctx.fillStyle = '#654321';
      ctx.fillRect(-5, bodyY - 10, 10, 3);
      ctx.fillStyle = '#AA7744';
      ctx.fillRect(-3, bodyY - 4, 7, 8);
      ctx.fillRect(-4, bodyY, 2, 5);
      ctx.fillRect(4, bodyY, 2, 5);
    }
  } else if (e.isBoss) {
    // Boss crown
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(-7, bodyY - 12, 14, 4);
    ctx.fillRect(-5, bodyY - 16, 3, 5);
    ctx.fillRect(2, bodyY - 16, 3, 5);
    ctx.fillRect(-1, bodyY - 17, 3, 6);
    // Red gem
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(0, bodyY - 14, 2, 2);
  } else {
    // Enemy type-specific details
    if (e.enemyType === 'skeleton') {
      // Rib lines
      ctx.strokeStyle = '#BBBBAA';
      ctx.lineWidth = 0.5;
      for (let r = 0; r < 3; r++) {
        ctx.beginPath();
        ctx.moveTo(-4, bodyY + 4 + r * 4);
        ctx.lineTo(4, bodyY + 4 + r * 4);
        ctx.stroke();
      }
    } else if (e.enemyType === 'knight') {
      // Visor
      ctx.fillStyle = '#555577';
      ctx.fillRect(-4, bodyY - 9, 8, 3);
      ctx.fillStyle = '#333';
      ctx.fillRect(-2, bodyY - 8, 4, 1);
    } else if (e.enemyType === 'fire_imp') {
      // Flame hair
      ctx.fillStyle = '#FF6600';
      ctx.fillRect(-3, bodyY - 12, 2, 4);
      ctx.fillRect(0, bodyY - 13, 2, 5);
      ctx.fillRect(2, bodyY - 11, 2, 3);
    } else if (e.enemyType === 'dragon_rider') {
      // Riding a small dragon
      ctx.fillStyle = '#882222';
      ctx.fillRect(-10, bodyY + e.h * 0.3, 20, 8);
      ctx.fillRect(8, bodyY + e.h * 0.3 - 3, 6, 5);
    } else if (e.enemyType === 'mage_enemy') {
      // Hood
      ctx.fillStyle = '#6622AA';
      ctx.beginPath();
      ctx.arc(0, bodyY - 4, 6, Math.PI, Math.PI * 2);
      ctx.fill();
    } else if (e.enemyType === 'crystal') {
      // Crystal shards
      ctx.fillStyle = '#66CCFF';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(-e.w / 2 - 3, bodyY + 5, 3, 8);
      ctx.fillRect(e.w / 2, bodyY + 2, 3, 10);
      ctx.globalAlpha = 1;
    } else if (e.enemyType === 'pirate') {
      // Bandana
      ctx.fillStyle = '#CC2222';
      ctx.fillRect(-4, bodyY - 10, 9, 3);
    }
  }
}

function drawMountBody(e, bob) {
  const m = e.mount;
  // Body
  ctx.fillStyle = m.color;
  ctx.fillRect(-14, -6 + bob, 28, 14);
  // Head
  ctx.fillStyle = m.color2;
  ctx.fillRect(12, -10 + bob, 10, 10);
  // Legs
  const legBob = Math.sin(e.animFrame * Math.PI) * 2;
  ctx.fillRect(-10, 8 + bob, 4, 8 + legBob);
  ctx.fillRect(-2, 8 + bob, 4, 8 - legBob);
  ctx.fillRect(6, 8 + bob, 4, 8 + legBob);
  // Tail
  ctx.fillRect(-16, -2 + bob, 5, 4);
  // Eyes
  ctx.fillStyle = '#FF0';
  ctx.fillRect(18, -8 + bob, 2, 2);
}

function drawBossHealthBar(e, sx, sy) {
  const barW = 100;
  const barX = GAME_W / 2 - barW / 2;
  const barY = 18;

  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, 9);

  // Health fill
  const hpRatio = e.hp / e.maxHp;
  let barColor = '#22CC22';
  if (e.phase === 2) barColor = '#FFAA00';
  if (e.phase === 3) barColor = '#FF2200';
  ctx.fillStyle = barColor;
  ctx.fillRect(barX, barY, barW * hpRatio, 7);

  // Phase markers
  ctx.fillStyle = '#fff';
  ctx.fillRect(barX + barW * 0.33, barY, 1, 7);
  ctx.fillRect(barX + barW * 0.66, barY, 1, 7);

  // Border
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, 9);

  // Name
  ctx.fillStyle = '#FF4444';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(e.bossName, GAME_W / 2, barY - 3);
  ctx.textAlign = 'left';
}

// ============================================================
// DRAWING - ITEMS
// ============================================================
function drawItems() {
  for (const it of items) {
    const sx = Math.floor(it.x - cameraX);
    const sy = Math.floor(it.y);
    if (sx < -20 || sx > GAME_W + 20) continue;

    if (it.type === 'meat') {
      const bob = Math.sin((it.bobTimer || 0) * 4) * 1.5;
      ctx.fillStyle = '#AA5533';
      ctx.fillRect(sx - 5, sy - 5 + bob, 10, 7);
      ctx.fillStyle = '#CC8855';
      ctx.fillRect(sx - 3, sy - 3 + bob, 6, 4);
      ctx.fillStyle = '#FFCC88';
      ctx.fillRect(sx - 1, sy - 2 + bob, 2, 2);
      // Bone
      ctx.fillStyle = '#EEE';
      ctx.fillRect(sx - 6, sy - 2 + bob, 3, 2);
      ctx.fillRect(sx + 4, sy - 2 + bob, 3, 2);
    } else if (it.type === 'potion') {
      const bob = Math.sin((it.bobTimer || 0) * 4) * 1.5;
      ctx.fillStyle = '#3366CC';
      ctx.fillRect(sx - 3, sy - 7 + bob, 6, 9);
      ctx.fillStyle = '#5588FF';
      ctx.fillRect(sx - 2, sy - 5 + bob, 4, 5);
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - 2, sy - 8 + bob, 4, 2);
      // Sparkle
      if (Math.sin(Date.now() * 0.01) > 0.7) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + 1, sy - 5 + bob, 1, 1);
      }
    } else if (it.type === 'mount') {
      const bob = Math.sin(it.bobTimer * 3) * 2;
      const m = MOUNTS[it.mountIdx];
      ctx.fillStyle = m.color;
      ctx.fillRect(sx - 12, sy - 10 + bob, 24, 14);
      ctx.fillStyle = m.color2;
      ctx.fillRect(sx + 10, sy - 8 + bob, 6, 7);
      // Legs
      ctx.fillRect(sx - 8, sy + 2 + bob, 3, 6);
      ctx.fillRect(sx + 5, sy + 2 + bob, 3, 6);
      // Highlight
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(sx - 14, sy - 12 + bob, 28, 22);
    } else if (it.type === 'projectile') {
      ctx.fillStyle = it.color;
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Trail
      ctx.fillStyle = it.color;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(sx - it.vx * 2, sy, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (it.type === 'fire_breath') {
      ctx.fillStyle = '#FF4400';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(sx, sy, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFCC00';
      ctx.beginPath();
      ctx.arc(sx, sy, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// ============================================================
// DRAWING - HUD
// ============================================================
function drawHUD() {
  // Player health bar
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 4, 72, 8);
  const hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#22CC22' : hpRatio > 0.25 ? '#CCAA00' : '#FF2222';
  ctx.fillRect(5, 5, 70 * hpRatio, 6);
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(4, 4, 72, 8);

  // Character icon
  ctx.fillStyle = CHARS[selectedChar].color;
  ctx.fillRect(78, 4, 6, 8);

  // Magic potions
  ctx.fillStyle = '#4488FF';
  for (let i = 0; i < magicPotions; i++) {
    ctx.fillRect(5 + i * 7, 14, 5, 6);
  }
  ctx.fillStyle = '#2244AA';
  ctx.font = '6px monospace';
  ctx.fillText('MP', 5, 28);

  // Lives
  ctx.fillStyle = '#FF4444';
  ctx.font = '7px monospace';
  ctx.fillText('x' + lives, 80, 20);
  for (let i = 0; i < lives; i++) {
    ctx.fillRect(92 + i * 8, 14, 5, 6);
  }

  // Score
  ctx.fillStyle = '#FFD700';
  ctx.font = '8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString().padStart(7, '0'), GAME_W - 5, 11);
  ctx.textAlign = 'left';

  // Level indicator
  ctx.fillStyle = '#888';
  ctx.font = '6px monospace';
  ctx.fillText('LV' + (level + 1) + ' ' + LEVELS[level].name, 5, GAME_H - 4);

  // Combo display
  if (comboTimer > 0 && comboCount > 2) {
    ctx.fillStyle = '#FFCC00';
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(comboCount + ' HIT COMBO!', GAME_W / 2, 35);
    if (comboCount >= 10) {
      ctx.fillStyle = '#FF4400';
      ctx.fillText('INCREDIBLE!', GAME_W / 2, 46);
    }
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }

  // Mount HP
  if (player.mounted && player.mount) {
    ctx.fillStyle = '#222';
    ctx.fillRect(4, 30, 52, 5);
    ctx.fillStyle = player.mount.color;
    ctx.fillRect(5, 31, 50 * (player.mountHp / player.mount.hp), 3);
    ctx.fillStyle = '#aaa';
    ctx.font = '5px monospace';
    ctx.fillText(player.mount.name, 5, 28);
  }

  // GO arrow when wave is clear
  const alive = allEnemies.filter(e => e.alive).length;
  if (alive === 0 && !bossActive && gameState === STATE.PLAYING && !scrollLocked) {
    if (Math.sin(Date.now() * 0.006) > 0) {
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('GO >>>', GAME_W - 55, GAME_H / 2);
    }
  }
}

// ============================================================
// SCREEN EFFECTS
// ============================================================
function drawScreenEffects() {
  // Screen flash
  if (screenFlash > 0) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlash * 0.4;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  titleAnim += 0.016;

  // Fiery background
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#0a0000');
  grad.addColorStop(0.4, '#1a0800');
  grad.addColorStop(1, '#2a1000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Animated fire at bottom
  for (let i = 0; i < 20; i++) {
    const fx = i * 22;
    const fh = 15 + Math.sin(titleAnim * 3 + i * 0.7) * 8;
    ctx.fillStyle = '#FF4400';
    ctx.globalAlpha = 0.3;
    ctx.fillRect(fx, GAME_H - fh, 20, fh);
    ctx.fillStyle = '#FFAA00';
    ctx.globalAlpha = 0.2;
    ctx.fillRect(fx + 4, GAME_H - fh * 0.6, 12, fh * 0.6);
  }
  ctx.globalAlpha = 1;

  // Axes decoration
  ctx.save();
  ctx.translate(GAME_W / 2 - 70, 52);
  ctx.rotate(-0.3);
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, 0, 3, 35);
  ctx.fillStyle = '#DAA520';
  ctx.fillRect(-4, -2, 11, 8);
  ctx.restore();

  ctx.save();
  ctx.translate(GAME_W / 2 + 70, 52);
  ctx.rotate(0.3);
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(-3, 0, 3, 35);
  ctx.fillStyle = '#DAA520';
  ctx.fillRect(-7, -2, 11, 8);
  ctx.restore();

  // Title text with shadow
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOLDEN AXE', GAME_W / 2 + 2, 52);
  ctx.fillStyle = '#DAA520';
  ctx.fillText('GOLDEN AXE', GAME_W / 2, 50);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('OF TASERN', GAME_W / 2 + 1, 71);
  ctx.fillStyle = '#FF6600';
  ctx.fillText('OF TASERN', GAME_W / 2, 70);

  // Decorative line
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GAME_W / 2 - 80, 80);
  ctx.lineTo(GAME_W / 2 + 80, 80);
  ctx.stroke();

  // Subtitle
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('A Tales of Tasern Adventure', GAME_W / 2, 95);

  // Character silhouettes
  const charColors = ['#DAA520', '#6644CC', '#228B22'];
  for (let i = 0; i < 3; i++) {
    const cx = GAME_W / 2 - 50 + i * 50;
    const sway = Math.sin(titleAnim * 2 + i * 0.5) * 2;
    ctx.fillStyle = charColors[i];
    ctx.globalAlpha = 0.6;
    ctx.fillRect(cx - 5, 110 + sway, 10, 20);
    ctx.fillRect(cx - 3, 102 + sway, 6, 8);
  }
  ctx.globalAlpha = 1;

  // Instructions
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  const blink = Math.sin(titleAnim * 4) > 0;
  if (blink) ctx.fillText('PRESS ANY KEY OR TAP TO START', GAME_W / 2, 160);

  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  ctx.fillText('Z/J=Attack  X/K=Jump  C/L=Magic', GAME_W / 2, 180);
  ctx.fillText('Arrow Keys / WASD = Move', GAME_W / 2, 192);

  // Credits
  ctx.fillStyle = '#333';
  ctx.font = '6px monospace';
  ctx.fillText('MfT Arcade - v1.0', GAME_W / 2, 225);
  ctx.textAlign = 'left';
}

// ============================================================
// CHARACTER SELECT SCREEN
// ============================================================
function drawSelect() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Header
  ctx.fillStyle = '#DAA520';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE YOUR HERO', GAME_W / 2, 20);

  // Character cards
  for (let i = 0; i < 3; i++) {
    const c = CHARS[i];
    const cx = 70 + i * 130;
    const cy = 115;
    const selected = i === selectedChar;

    // Card background
    ctx.fillStyle = selected ? '#1a1a3a' : '#0a0a1a';
    ctx.fillRect(cx - 45, cy - 65, 90, 140);

    // Selection border
    if (selected) {
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - 45, cy - 65, 90, 140);
      // Glow
      ctx.shadowColor = '#FFD700';
      ctx.shadowBlur = 5;
      ctx.strokeRect(cx - 45, cy - 65, 90, 140);
      ctx.shadowBlur = 0;
    } else {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - 45, cy - 65, 90, 140);
    }

    // Character sprite
    ctx.fillStyle = c.color;
    ctx.fillRect(cx - 7, cy - 28, 14, 22);
    ctx.fillStyle = c.color2;
    ctx.fillRect(cx - 7, cy - 6, 6, 14);
    ctx.fillRect(cx + 1, cy - 6, 6, 14);
    ctx.fillStyle = '#FFCC88';
    ctx.fillRect(cx - 4, cy - 35, 8, 8);

    // Character-specific detail
    if (i === 0) {
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(cx - 5, cy - 39, 10, 4);
      ctx.fillRect(cx - 6, cy - 42, 3, 4);
      ctx.fillRect(cx + 3, cy - 42, 3, 4);
      // Axe
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(cx + 8, cy - 25, 2, 16);
      ctx.fillStyle = '#DAA520';
      ctx.fillRect(cx + 7, cy - 27, 5, 4);
    } else if (i === 1) {
      ctx.fillStyle = '#6644CC';
      ctx.beginPath();
      ctx.moveTo(cx - 5, cy - 35);
      ctx.lineTo(cx, cy - 48);
      ctx.lineTo(cx + 5, cy - 35);
      ctx.fill();
      // Staff
      ctx.fillStyle = '#6644CC';
      ctx.fillRect(cx + 7, cy - 30, 2, 20);
      ctx.fillStyle = '#AA77FF';
      ctx.beginPath();
      ctx.arc(cx + 8, cy - 32, 3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#654321';
      ctx.fillRect(cx - 5, cy - 37, 10, 3);
      ctx.fillStyle = '#AA7744';
      ctx.fillRect(cx - 3, cy - 26, 7, 6);
      // Hammer
      ctx.fillStyle = '#888';
      ctx.fillRect(cx + 7, cy - 22, 2, 12);
      ctx.fillRect(cx + 5, cy - 24, 6, 4);
    }

    // Info text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.fillText(c.name, cx, cy + 22);
    ctx.fillStyle = '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText(c.desc, cx, cy + 34);

    // Stats bars
    const statY = cy + 42;
    // HP bar
    ctx.fillStyle = '#444';
    ctx.fillRect(cx - 30, statY, 60, 4);
    ctx.fillStyle = '#22CC22';
    ctx.fillRect(cx - 30, statY, 60 * (c.hp / 130), 4);
    ctx.fillStyle = '#888';
    ctx.font = '5px monospace';
    ctx.fillText('HP', cx - 38, statY + 4);

    // Power bar
    ctx.fillStyle = '#444';
    ctx.fillRect(cx - 30, statY + 8, 60, 4);
    ctx.fillStyle = '#FF6644';
    ctx.fillRect(cx - 30, statY + 8, 60 * (c.power / 14), 4);
    ctx.fillStyle = '#888';
    ctx.fillText('POW', cx - 38, statY + 12);

    // Speed bar
    ctx.fillStyle = '#444';
    ctx.fillRect(cx - 30, statY + 16, 60, 4);
    ctx.fillStyle = '#44AAFF';
    ctx.fillRect(cx - 30, statY + 16, 60 * (c.speed / 2.0), 4);
    ctx.fillStyle = '#888';
    ctx.fillText('SPD', cx - 38, statY + 20);
  }

  // Instructions
  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  ctx.fillText('LEFT/RIGHT to select, ATTACK to confirm', GAME_W / 2, GAME_H - 10);
  ctx.textAlign = 'left';
}

// ============================================================
// CAMP SCREEN DRAWING
// ============================================================
function drawCamp() {
  // Night sky
  ctx.fillStyle = '#05051a';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Stars
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 47 + 13) % GAME_W;
    const sy = (i * 31 + 7) % 110;
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.001 + i) * 0.3;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#DDDDAA';
  ctx.beginPath();
  ctx.arc(320, 30, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#05051a';
  ctx.beginPath();
  ctx.arc(325, 27, 12, 0, Math.PI * 2);
  ctx.fill();

  // Ground
  ctx.fillStyle = '#1a2a1a';
  ctx.fillRect(0, 175, GAME_W, 65);
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, 175, GAME_W, 3);

  // Campfire
  const flicker = Math.sin(Date.now() * 0.015) * 3;
  const flicker2 = Math.cos(Date.now() * 0.02) * 2;
  ctx.fillStyle = '#FF6600';
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 168, 7 + flicker, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFCC00';
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 170, 4 + flicker2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 170, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Fire glow
  ctx.fillStyle = '#FF8800';
  ctx.globalAlpha = 0.1;
  ctx.beginPath();
  ctx.arc(GAME_W / 2, 168, 30 + flicker, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Logs
  ctx.fillStyle = '#4a2a1a';
  ctx.fillRect(GAME_W / 2 - 8, 172, 16, 4);
  ctx.fillRect(GAME_W / 2 - 5, 174, 10, 3);

  // Player
  drawEntity(player);

  // Gnomes
  for (const g of campGnomes) {
    if (!g.alive) continue;
    ctx.fillStyle = '#226622';
    ctx.fillRect(g.x - 3, g.y - 10, 6, 10);
    ctx.fillStyle = '#33AA33';
    ctx.fillRect(g.x - 2, g.y - 14, 4, 5);
    // Cap
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.moveTo(g.x - 2, g.y - 14);
    ctx.lineTo(g.x, g.y - 19);
    ctx.lineTo(g.x + 2, g.y - 14);
    ctx.fill();
    // Carrying
    if (!g.kicked) {
      ctx.fillStyle = g.carrying === 'potion' ? '#4488FF' : '#CC6633';
      ctx.fillRect(g.x + 3, g.y - 12, 4, 4);
    }
    // Sneaky eyes
    ctx.fillStyle = '#FFFF00';
    ctx.fillRect(g.x - 1, g.y - 12, 1, 1);
    ctx.fillRect(g.x + 1, g.y - 12, 1, 1);
  }

  // UI text
  ctx.fillStyle = '#FFD700';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('THE CAMP - KICK GNOMES FOR SUPPLIES!', GAME_W / 2, 15);

  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('Potions: ' + magicPotions + '  HP: ' + player.hp + '/' + player.maxHp, GAME_W / 2, 30);

  if (level + 1 < LEVELS.length) {
    ctx.fillStyle = '#888';
    ctx.fillText('Next: Level ' + (level + 2) + ' - ' + LEVELS[level + 1].name, GAME_W / 2, GAME_H - 8);
  }

  // Timer
  ctx.fillStyle = '#555';
  ctx.textAlign = 'left';
  ctx.fillText(Math.ceil(stateTimer) + 's', 5, 15);
}

// ============================================================
// OVERLAY SCREENS
// ============================================================
function drawBossIntro() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  if (boss) {
    // Warning flash
    const flash = Math.sin(stateTimer * 8) > 0;
    if (flash) {
      ctx.fillStyle = 'rgba(255,0,0,0.1)';
      ctx.fillRect(0, 0, GAME_W, GAME_H);
    }

    ctx.fillStyle = '#FF2222';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WARNING', GAME_W / 2, GAME_H / 2 - 25);

    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(boss.bossName, GAME_W / 2, GAME_H / 2 - 5);

    ctx.fillStyle = '#888';
    ctx.font = '7px monospace';
    ctx.fillText('APPROACHES!', GAME_W / 2, GAME_H / 2 + 12);
    ctx.textAlign = 'left';
  }
}

function drawLevelClear() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL CLEAR!', GAME_W / 2, GAME_H / 2 - 25);

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.fillText(LEVELS[level].name + ' conquered!', GAME_W / 2, GAME_H / 2);

  ctx.fillStyle = '#FFD700';
  ctx.font = '8px monospace';
  ctx.fillText('Score: ' + score, GAME_W / 2, GAME_H / 2 + 18);
  ctx.fillText('Lives: ' + lives + '  Potions: ' + magicPotions, GAME_W / 2, GAME_H / 2 + 32);
  ctx.textAlign = 'left';
}

function drawGameOver() {
  ctx.fillStyle = '#0a0000';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Blood drip effect
  ctx.fillStyle = '#440000';
  for (let i = 0; i < 10; i++) {
    const dx = (i * 43 + 10) % GAME_W;
    const dh = 20 + (i * 17 % 40);
    ctx.fillRect(dx, 0, 3, dh);
  }

  ctx.fillStyle = '#CC0000';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', GAME_W / 2, GAME_H / 2 - 30);

  ctx.fillStyle = '#FFD700';
  ctx.font = '10px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GAME_W / 2, GAME_H / 2 + 5);

  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('Reached: ' + LEVELS[level].name + ' (Level ' + (level + 1) + ')', GAME_W / 2, GAME_H / 2 + 25);

  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) ctx.fillText('PRESS ATTACK OR JUMP TO CONTINUE', GAME_W / 2, GAME_H / 2 + 55);
  ctx.textAlign = 'left';
}

function drawWin() {
  // Golden background
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#1a1000');
  grad.addColorStop(0.5, '#2a1a00');
  grad.addColorStop(1, '#1a0a00');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Victory particles
  for (let i = 0; i < 8; i++) {
    const px = (i * 55 + Date.now() * 0.02) % GAME_W;
    const py = (Math.sin(Date.now() * 0.001 + i * 0.8) * 0.5 + 0.5) * GAME_H;
    ctx.fillStyle = '#FFD700';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(px, py, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('VICTORY!', GAME_W / 2, 40);

  ctx.fillStyle = '#fff';
  ctx.font = '9px monospace';
  ctx.fillText('The Dark Luminar has been vanquished!', GAME_W / 2, 65);
  ctx.fillText('Peace returns to the realm of Tasern.', GAME_W / 2, 80);
  ctx.fillText('The Golden Axe is yours, hero.', GAME_W / 2, 95);

  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GAME_W / 2, 130);

  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('Hero: ' + CHARS[selectedChar].name, GAME_W / 2, 155);
  ctx.fillText('Levels Conquered: 12', GAME_W / 2, 170);
  ctx.fillText('Lives Remaining: ' + lives, GAME_W / 2, 185);

  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) ctx.fillText('PRESS ANY KEY TO PLAY AGAIN', GAME_W / 2, 215);
  ctx.textAlign = 'left';
}

// ============================================================
// TOUCH CONTROL OVERLAY
// ============================================================
function drawTouchControls() {
  if (!('ontouchstart' in window)) return;
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;

  // D-pad zone (left side)
  ctx.beginPath();
  ctx.arc(50, GAME_H - 40, 30, 0, Math.PI * 2);
  ctx.stroke();
  // Directional arrows
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.moveTo(50, GAME_H - 65); ctx.lineTo(46, GAME_H - 58); ctx.lineTo(54, GAME_H - 58); ctx.fill();
  ctx.beginPath(); ctx.moveTo(50, GAME_H - 15); ctx.lineTo(46, GAME_H - 22); ctx.lineTo(54, GAME_H - 22); ctx.fill();
  ctx.beginPath(); ctx.moveTo(25, GAME_H - 40); ctx.lineTo(32, GAME_H - 44); ctx.lineTo(32, GAME_H - 36); ctx.fill();
  ctx.beginPath(); ctx.moveTo(75, GAME_H - 40); ctx.lineTo(68, GAME_H - 44); ctx.lineTo(68, GAME_H - 36); ctx.fill();

  // Attack button
  ctx.beginPath();
  ctx.arc(GAME_W - 65, GAME_H - 35, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ATK', GAME_W - 65, GAME_H - 33);

  // Jump button
  ctx.beginPath();
  ctx.arc(GAME_W - 25, GAME_H - 35, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillText('JMP', GAME_W - 25, GAME_H - 33);

  // Magic button
  ctx.beginPath();
  ctx.arc(GAME_W - 45, GAME_H - 70, 12, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillText('MAG', GAME_W - 45, GAME_H - 68);

  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

// ============================================================
// MAIN UPDATE
// ============================================================
function updatePlaying(dt) {
  // Screen effects
  if (shakeTimer > 0) shakeTimer -= dt;
  if (screenFlash > 0) screenFlash -= dt * 2;

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Wave spawn delay
  if (waveSpawnTimer > 0) {
    waveSpawnTimer -= dt;
    if (waveSpawnTimer <= 0) {
      spawnWave();
    }
  }

  // Player
  updatePlayer(dt);

  // Player death / respawn
  if (!player.alive) {
    if (player.deathTimer <= 0) {
      lives--;
      if (lives <= 0) {
        gameState = STATE.GAME_OVER;
        SFX.gameOver();
        return;
      } else {
        player.alive = true;
        player.hp = player.maxHp;
        player.invincible = 2.5;
        player.knockdown = false;
        player.stunTimer = 0;
        player.x = cameraX + 60;
        player.y = 160;
        player.z = 0;
        player.vz = 0;
        player.vx = 0;
        player.vy = 0;
        player.mounted = false;
        player.mount = null;
        player.grabbing = null;
      }
    }
    return;
  }

  // Mount damage passthrough
  if (player.mounted && player.mountHp <= 0) {
    player.mounted = false;
    player.mount = null;
    SFX.dismount();
    player.invincible = 0.5;
  }

  // Enemies
  for (const e of allEnemies) {
    if (e.alive) {
      runAI(e, dt);
      // Enemy attack collision with player
      if (e.state === 'attack' && e.stateTimer > 0.05 && e.stateTimer < 0.15) {
        const dx = player.x - e.x;
        const dy = Math.abs(player.y - e.y);
        if (dy < 20 && dx * e.facing > -8 && dx * e.facing < e.attackRange + 12) {
          if (player.invincible <= 0 && player.alive && !player.knockdown) {
            // Mount takes damage first
            if (player.mounted) {
              player.mountHp -= e.power;
              SFX.hit();
              spawnParticles(player.x, player.y - 5, player.mount.color, 3, 2, true);
            } else {
              damageEntity(player, e.power, e.facing);
            }
          }
        }
      }
    }
    updateEntity(e, dt);
  }

  // Clean up dead enemies
  allEnemies = allEnemies.filter(e => e.alive || e.deathTimer > 0);

  // Items & projectiles
  updateItems(dt);

  // Hazards
  updateHazards(dt);

  // Particles
  updateParticles(dt);

  // Camera
  updateCamera(dt);

  // Wave management
  checkWaveClear();
}

// ============================================================
// MAIN DRAW
// ============================================================
function drawPlaying() {
  ctx.save();

  // Screen shake
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }

  drawBackground();
  drawHazards();

  // Sort all drawable entities by Y position for depth
  const drawList = [];
  for (const e of allEnemies) {
    if (e.alive || e.deathTimer > 0) drawList.push(e);
  }
  if (player.alive || player.deathTimer > 0) drawList.push(player);
  drawList.sort((a, b) => a.y - b.y);

  drawItems();

  for (const e of drawList) {
    drawEntity(e);
  }

  drawParticles();

  ctx.restore();

  drawScreenEffects();
  drawHUD();
  drawTouchControls();
}

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
let selectCooldown = 0;
let prevLeft = false, prevRight = false;

function gameLoop(timestamp) {
  const rawDt = (timestamp - lastTime) / 1000;
  const dt = Math.min(rawDt, 0.05); // Cap at 50ms
  lastTime = timestamp;

  updateInput();
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  switch (gameState) {
    case STATE.TITLE:
      drawTitle();
      if (Object.values(keys).some(v => v) || touchState.active || touchState.attack || touchState.jump) {
        ensureAudio();
        gameState = STATE.SELECT;
        selectCooldown = 0.4;
        // Reset key states
        for (const k in keys) keys[k] = false;
      }
      break;

    case STATE.SELECT:
      selectCooldown -= dt;
      if (selectCooldown <= 0) {
        if (input.left && !prevLeft) {
          selectedChar = (selectedChar + 2) % 3;
          SFX.pickup();
        }
        if (input.right && !prevRight) {
          selectedChar = (selectedChar + 1) % 3;
          SFX.pickup();
        }
        if ((input.attack && !attackPressed) || (input.jump && !jumpPressed)) {
          player = createPlayer(selectedChar);
          lives = 3;
          score = 0;
          magicPotions = 2;
          level = 0;
          SFX.combo();
          startLevel(0);
        }
      }
      prevLeft = input.left;
      prevRight = input.right;
      drawSelect();
      break;

    case STATE.PLAYING:
      updatePlaying(dt);
      drawPlaying();
      break;

    case STATE.CAMP:
      updateCamp(dt);
      // Attack to kick
      if (input.attack && !attackPressed) kickGnomes();
      // Draw camp with camera at 0
      cameraX = 0;
      drawCamp();
      drawParticles();
      break;

    case STATE.BOSS_INTRO:
      stateTimer -= dt;
      // Still update camera to scroll to boss
      updateCamera(dt);
      drawPlaying();
      drawBossIntro();
      if (stateTimer <= 0) gameState = STATE.PLAYING;
      break;

    case STATE.LEVEL_CLEAR:
      stateTimer -= dt;
      updateParticles(dt);
      drawPlaying();
      drawLevelClear();
      if (stateTimer <= 0) {
        if (level >= 11) {
          gameState = STATE.WIN;
        } else {
          startCamp();
        }
      }
      break;

    case STATE.GAME_OVER:
      drawGameOver();
      if ((input.attack && !attackPressed) || (input.jump && !jumpPressed)) {
        gameState = STATE.TITLE;
      }
      break;

    case STATE.WIN:
      drawWin();
      if ((input.attack && !attackPressed) || (input.jump && !jumpPressed)) {
        gameState = STATE.TITLE;
      }
      break;
  }

  attackPressed = input.attack;
  jumpPressed = input.jump;
  magicPressed = input.magic;

  requestAnimationFrame(gameLoop);
}

// ============================================================
// BOOT
// ============================================================
requestAnimationFrame(gameLoop);

})();
</script>
