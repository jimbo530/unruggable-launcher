<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tasern Pinball</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
// === STAT BONUSES FROM NFT ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}
</script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'L-FLIP', b: 'R-FLIP' } });

// === STAT-DERIVED VALUES ===
// STR: flipper power (base 520, +20 per STR above 10)
var STR_MOD = Math.max(-5, Math.floor((statB.str - 10) / 2));
var FLIPPER_FORCE = 520 + STR_MOD * 40;
var BUMPER_HIT_BONUS = Math.max(0, STR_MOD * 10); // STR adds to bumper bounce

// DEX: flipper speed & nudge precision (base 18, +1 per DEX above 10)
var DEX_MOD = Math.max(-5, Math.floor((statB.dex - 10) / 2));
var FLIP_SPEED = 18 + DEX_MOD * 2;
var NUDGE_FORCE = 30 + DEX_MOD * 8; // nudge strength from DEX

// CON: extra balls (base 3, +1 per 4 CON above 10, max 6)
var CON_MOD = Math.max(-5, Math.floor((statB.con - 10) / 2));
var BASE_BALLS = Math.max(1, Math.min(6, 3 + Math.floor(CON_MOD / 2)));

// INT: score multiplier (base 1.0, +0.1 per INT above 10)
var INT_MOD = Math.max(-5, Math.floor((statB.int - 10) / 2));
var SCORE_MULT = Math.max(0.5, 1.0 + INT_MOD * 0.1);

// WIS: ball save duration (base 5s, +0.5s per WIS above 10)
var WIS_MOD = Math.max(-5, Math.floor((statB.wis - 10) / 2));
var BALL_SAVE_TIME = Math.max(2.0, 5.0 + WIS_MOD * 0.5);

// CHA: bonus target luck (base 0%, +3% per CHA above 10 for bonus triggers)
var CHA_MOD = Math.max(-5, Math.floor((statB.cha - 10) / 2));
var LUCK_CHANCE = Math.min(0.5, Math.max(0, CHA_MOD * 0.03)); // 0-50% chance for bonus
var LUCK_EXTRA_MULT = 1 + Math.max(0, CHA_MOD * 0.05); // CHA boosts bonus scores

// Level-based bonuses
var LEVEL_BONUS = 1 + statB.level * 0.02; // 2% more score per level

// Physics
var GRAVITY = 420;
var FRICTION = 0.997;
var WALL_BOUNCE = 0.6;
var BUMPER_FORCE = 280 + BUMPER_HIT_BONUS;
var BALL_RADIUS = 6;
var KICKER_FORCE = 200;

// Table dimensions (play area inside walls)
var TABLE_LEFT = 20;
var TABLE_RIGHT = GW - 20;
var TABLE_TOP = 30;
var TABLE_BOTTOM = GH - 20;
var TABLE_W = TABLE_RIGHT - TABLE_LEFT;
var TABLE_H = TABLE_BOTTOM - TABLE_TOP;

// === TABLE ZONE DEFINITIONS ===
// Zone 1: Spore Canopy (top area, y < 160) - organic bumper zone
// Zone 2: Mycelium Network (mid area, 160 < y < 310) - ramp/spinner/reactor
// Zone 3: Underdark (lower area, y > 310) - flipper/kicker danger zone
var ZONE_SPORE_BOTTOM = 160;
var ZONE_MYCELIUM_BOTTOM = 310;

// Game state
var state = 'title';
var score = 0;
var highScore = TAS.score.load('tasernpinball_hi');
var ballsLeft = BASE_BALLS; // CON determines starting balls
var frame = 0;
var multiplier = 1;
var comboTimer = 0;
var comboStage = 0; // 0=none,1=ramp,2=spinner,3=target
var multiballActive = false;
var multiballCount = 0;
var reactorLit = 0; // 0-3 targets to light reactor
var ballSaveTimer = 0;
var tiltWarning = 0;
var tiltCount = 0;
var tilted = false;
var extraBallAwarded = [false, false]; // 500K, 2M thresholds
var showTutorial = true; // first play tutorial
var tutorialStep = 0;
var tutorialTimer = 0;
var shakeIntensity = 0;
var shakeDecay = 0;
var totalSpins = 0;
var totalBumperHits = 0;
var totalRampShots = 0;
var luckyBonusCount = 0;
var sporeBurstTimer = 0; // spore multiball particle timer
var zoneBonus = [0, 0, 0]; // per-zone scoring progress
var zoneLit = [false, false, false]; // zone completion flags

// Plunger
var plungerPull = 0;
var plungerHeld = false;
var ballInLauncher = false;

// Ball(s)
var balls = [];
function createBall(x, y, vx, vy) {
  return { x: x, y: y, vx: vx || 0, vy: vy || 0, trail: [], active: true };
}

// Flippers
var LEFT_FLIP = { x: 95, y: 430, angle: 0.4, targetAngle: 0.4, length: 42, dir: 1 };
var RIGHT_FLIP = { x: 225, y: 430, angle: Math.PI - 0.4, targetAngle: Math.PI - 0.4, length: 42, dir: -1 };
var FLIP_UP_LEFT = -0.6;
var FLIP_DOWN_LEFT = 0.4;
var FLIP_UP_RIGHT = Math.PI + 0.6;
var FLIP_DOWN_RIGHT = Math.PI - 0.4;

// Bumpers (Tasern-themed mushroom bumpers)
var bumpers = [
  { x: 120, y: 120, r: 18, hits: 0, flash: 0, color: '#ff44aa', name: 'SPORE CAP', glyph: 'S' },
  { x: 160, y: 85, r: 18, hits: 0, flash: 0, color: '#44ffaa', name: 'MYCO CROWN', glyph: 'M' },
  { x: 200, y: 120, r: 18, hits: 0, flash: 0, color: '#aa44ff', name: 'HYPHAE NODE', glyph: 'H' }
];

// Kickers (slingshots above flippers)
var kickers = [
  { x: 70, y: 370, w: 35, h: 50, side: 'left', flash: 0 },
  { x: 215, y: 370, w: 35, h: 50, side: 'right', flash: 0 }
];

// Rollover lanes (5 at top) - "SPORE" letters
var rollovers = [];
var ROLLOVER_LETTERS = ['S', 'P', 'O', 'R', 'E'];
for (var i = 0; i < 5; i++) {
  rollovers.push({ x: 80 + i * 40, y: 55, lit: false, flash: 0 });
}

// Drop targets (3 banks of 3) - Tasern-themed
var dropBanks = [];
function createDropBank(startX, startY, angle, bankName) {
  var targets = [];
  for (var i = 0; i < 3; i++) {
    var ox = Math.cos(angle) * i * 20;
    var oy = Math.sin(angle) * i * 20;
    targets.push({ x: startX + ox, y: startY + oy, alive: true, flash: 0 });
  }
  return { targets: targets, cleared: false, name: bankName };
}
dropBanks.push(createDropBank(55, 200, 0.3, 'FUNGI'));
dropBanks.push(createDropBank(140, 170, 0, 'ROOTS'));
dropBanks.push(createDropBank(230, 200, -0.3, 'DECAY'));

// Spinner
var spinner = { x: 160, y: 145, angle: 0, spinning: 0, hits: 0 };

// Ramp entry/exit - Reactor Ramp
var ramp = { entryX: 65, entryY: 290, exitX: 250, exitY: 90, ballOnRamp: false };

// Second ramp - Spore Chute (right side loop)
var sporeRamp = { entryX: 255, entryY: 290, exitX: 70, exitY: 90, ballOnRamp: false, hits: 0 };

// Reactor hole
var reactor = { x: 160, y: 250, r: 14, lit: false, flash: 0, capturedBall: null, releaseTimer: 0 };

// Outlanes and inlanes
var outlaneLeft = { x: TABLE_LEFT, y: 400, w: 18, h: 60 };
var outlaneRight = { x: TABLE_RIGHT - 18, y: 400, w: 18, h: 60 };
var inlaneLeft = { x: TABLE_LEFT + 18, y: 400, w: 20, h: 60 };
var inlaneRight = { x: TABLE_RIGHT - 38, y: 400, w: 20, h: 60 };

// Reactor targets (3 targets to light multiball)
var reactorTargets = [
  { x: 100, y: 280, lit: false, flash: 0 },
  { x: 160, y: 300, lit: false, flash: 0 },
  { x: 220, y: 280, lit: false, flash: 0 }
];

// Table posts (static round obstacles)
var posts = [
  { x: 80, y: 170, r: 5 },
  { x: 240, y: 170, r: 5 },
  { x: 100, y: 320, r: 4 },
  { x: 220, y: 320, r: 4 },
  { x: 160, y: 350, r: 4 }
];

// Mycelium rails (curved guides)
var rails = [
  { x1: 40, y1: 150, x2: 70, y2: 100, x3: 120, y3: 70 },
  { x1: 280, y1: 150, x2: 250, y2: 100, x3: 200, y3: 70 }
];

// Skill shot targets (lit briefly at ball launch)
var skillShot = { active: false, timer: 0, targetIndex: 0, value: 5000 };

// Spore multiball jackpot
var sporeJackpot = { value: 25000, active: false, timer: 0 };

// Particle systems for zones
var zoneParticles = [];

// Visual elements
var glowPulse = 0;
var tableHue = 0;

// NES-style D-pad nudge tracking
var nudgeCooldown = 0;

// === HELPER FUNCTIONS ===
function addScore(pts) {
  // INT boosts all scoring via SCORE_MULT
  // Level adds a small bonus via LEVEL_BONUS
  var total = Math.floor(pts * multiplier * SCORE_MULT * LEVEL_BONUS);
  score += total;

  // CHA luck check: random bonus on any score event
  if (Math.random() < LUCK_CHANCE) {
    var luckyPts = Math.floor(pts * 0.5 * LUCK_EXTRA_MULT);
    score += luckyPts;
    luckyBonusCount++;
    // Lucky sparkle
    TAS.particles.spawn(GW / 2, 20, '#ffff44', 8, 3, { size: 2, gravity: -0.3 });
    TAS.audio.playTone(1200, 0.06, 'sine', 0.05);
  }

  if (!extraBallAwarded[0] && score >= 500000) {
    extraBallAwarded[0] = true;
    ballsLeft++;
    TAS.fx.flash('#44ff44', 0.5);
    TAS.audio.playTone(880, 0.3, 'sine', 0.12);
    TAS.audio.playTone(1100, 0.3, 'sine', 0.1);
  }
  if (!extraBallAwarded[1] && score >= 2000000) {
    extraBallAwarded[1] = true;
    ballsLeft++;
    TAS.fx.flash('#44ff44', 0.5);
    TAS.audio.playTone(1100, 0.3, 'sine', 0.12);
    TAS.audio.playTone(1400, 0.3, 'sine', 0.1);
  }
}

function checkMultiplier() {
  var litCount = 0;
  for (var i = 0; i < rollovers.length; i++) {
    if (rollovers[i].lit) litCount++;
  }
  if (litCount >= 5) {
    multiplier = Math.min(5, multiplier + 1);
    for (var i = 0; i < rollovers.length; i++) rollovers[i].lit = false;
    TAS.fx.flash('#ffdd44', 0.3);
    TAS.audio.playTone(660, 0.15, 'sine', 0.1);
    TAS.audio.playTone(880, 0.15, 'sine', 0.1);
  }
}

function checkDropBank(bank) {
  if (bank.cleared) return;
  var allDown = true;
  for (var i = 0; i < bank.targets.length; i++) {
    if (bank.targets[i].alive) { allDown = false; break; }
  }
  if (allDown) {
    bank.cleared = true;
    addScore(5000);
    TAS.fx.flash('#ff8800', 0.4);
    triggerShake(6, 0.88);
    TAS.audio.playTone(440, 0.2, 'square', 0.1);
    TAS.audio.playTone(660, 0.2, 'square', 0.08);
    TAS.audio.playTone(880, 0.2, 'square', 0.08);
    // Check all banks cleared for zone bonus
    checkZoneProgress(1);
  }
}

// Zone progress tracking
function checkZoneProgress(zoneIndex) {
  zoneBonus[zoneIndex]++;
  if (zoneIndex === 0 && zoneBonus[0] >= 10 && !zoneLit[0]) {
    // Spore Canopy complete: all bumpers hit 10+ times
    zoneLit[0] = true;
    addScore(25000);
    TAS.fx.flash('#ff44aa', 0.6);
    TAS.audio.playMelody([[440,0.1],[660,0.1],[880,0.1],[1100,0.15]], 80);
  }
  if (zoneIndex === 1 && zoneBonus[1] >= 3 && !zoneLit[1]) {
    // Mycelium Network: all 3 drop banks cleared
    zoneLit[1] = true;
    addScore(50000);
    TAS.fx.flash('#44ffaa', 0.6);
    TAS.audio.playMelody([[330,0.1],[440,0.1],[660,0.1],[880,0.15]], 80);
  }
  if (zoneIndex === 2 && zoneBonus[2] >= 5 && !zoneLit[2]) {
    // Underdark: 5 inlane passes
    zoneLit[2] = true;
    addScore(15000);
    TAS.fx.flash('#4488ff', 0.6);
    TAS.audio.playMelody([[220,0.1],[330,0.1],[440,0.1],[660,0.15]], 80);
  }
}

// Enhanced shake with STR influence
function triggerShake(intensity, decay) {
  shakeIntensity = intensity + Math.max(0, STR_MOD * 0.5);
  shakeDecay = decay;
}

function launchBall() {
  // STR affects launch power
  var power = plungerPull;
  var bx = TABLE_RIGHT - 10;
  var by = TABLE_BOTTOM - 60;
  var launchForce = (power * 600 + 100) * (1 + STR_MOD * 0.05);
  balls.push(createBall(bx, by, -20 + Math.random() * 10, -launchForce));
  ballInLauncher = false;
  ballSaveTimer = BALL_SAVE_TIME; // WIS determines ball save duration
  TAS.audio.playNoise(0.08, 0.1, 800);

  // Activate skill shot
  skillShot.active = true;
  skillShot.timer = 3.0;
  skillShot.targetIndex = Math.floor(Math.random() * bumpers.length);
}

function drainBall(index) {
  // WIS extends ball save; ball save duration set by WIS_MOD
  if (ballSaveTimer > 0 && balls.length <= 1) {
    // Ball save - return ball
    balls[index].x = 160;
    balls[index].y = 350;
    balls[index].vx = (Math.random() - 0.5) * 50;
    balls[index].vy = -200;
    TAS.fx.flash('#44ff44', 0.2);
    TAS.audio.playTone(880, 0.2, 'sine', 0.1);
    return;
  }

  // CHA luck: chance to save ball even without ball save
  if (balls.length <= 1 && ballSaveTimer <= 0 && Math.random() < LUCK_CHANCE * 0.5) {
    balls[index].x = 160;
    balls[index].y = 350;
    balls[index].vx = (Math.random() - 0.5) * 50;
    balls[index].vy = -200;
    TAS.fx.flash('#ffff44', 0.3);
    TAS.audio.playTone(1100, 0.15, 'sine', 0.1);
    luckyBonusCount++;
    return;
  }

  balls[index].active = false;
  if (multiballActive) {
    var activeCount = 0;
    for (var i = 0; i < balls.length; i++) { if (balls[i].active) activeCount++; }
    if (activeCount <= 1) multiballActive = false;
  }
  if (!multiballActive) {
    // Remove all inactive balls
    balls = balls.filter(function(b) { return b.active; });
    if (balls.length === 0) {
      ballsLeft--;
      if (ballsLeft <= 0) {
        gameOver();
      } else {
        // Ready next ball
        ballInLauncher = true;
        plungerPull = 0;
      }
    }
  }
}

// Spore multiball: themed multiball with extra particles
function startMultiball() {
  multiballActive = true;
  sporeBurstTimer = 2.0; // 2 seconds of spore particles
  // Add 2 extra balls (CON can add a 3rd)
  balls.push(createBall(160, 200, -100, -250));
  balls.push(createBall(160, 200, 100, -250));
  if (CON_MOD >= 3) {
    // High CON: bonus 3rd multiball
    balls.push(createBall(160, 200, 0, -300));
  }
  multiballCount++;
  sporeJackpot.active = true;
  sporeJackpot.timer = 15.0; // 15 second jackpot window
  sporeJackpot.value = 25000 + multiballCount * 10000;

  TAS.fx.flash('#ff44ff', 0.5);
  triggerShake(8, 0.9);
  TAS.audio.playTone(220, 0.3, 'sawtooth', 0.12);
  TAS.audio.playTone(440, 0.3, 'sawtooth', 0.1);
  TAS.audio.playTone(880, 0.3, 'sawtooth', 0.08);

  // Spore burst particles
  for (var angle = 0; angle < Math.PI * 2; angle += 0.3) {
    TAS.particles.spawn(160, 200, '#ff44ff', 3, 5, { size: 3, gravity: 0.2 });
  }

  // Reset reactor targets
  for (var i = 0; i < reactorTargets.length; i++) reactorTargets[i].lit = false;
  reactorLit = 0;
  reactor.lit = false;
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('tasernpinball_hi', highScore);
  }
}

function resetTable() {
  score = 0;
  ballsLeft = BASE_BALLS; // CON determines starting balls
  multiplier = 1;
  comboTimer = 0;
  comboStage = 0;
  multiballActive = false;
  multiballCount = 0;
  reactorLit = 0;
  ballSaveTimer = 0;
  tiltWarning = 0;
  tiltCount = 0;
  tilted = false;
  extraBallAwarded = [false, false];
  balls = [];
  ballInLauncher = true;
  plungerPull = 0;
  plungerHeld = false;
  reactor.lit = false;
  reactor.capturedBall = null;
  shakeIntensity = 0;
  totalSpins = 0;
  totalBumperHits = 0;
  totalRampShots = 0;
  luckyBonusCount = 0;
  sporeBurstTimer = 0;
  skillShot.active = false;
  sporeJackpot.active = false;
  sporeRamp.hits = 0;
  zoneBonus = [0, 0, 0];
  zoneLit = [false, false, false];
  nudgeCooldown = 0;
  for (var i = 0; i < rollovers.length; i++) rollovers[i].lit = false;
  for (var i = 0; i < reactorTargets.length; i++) reactorTargets[i].lit = false;
  for (var b = 0; b < dropBanks.length; b++) {
    dropBanks[b].cleared = false;
    for (var t = 0; t < dropBanks[b].targets.length; t++) {
      dropBanks[b].targets[t].alive = true;
    }
  }
  bumpers[0].hits = 0; bumpers[1].hits = 0; bumpers[2].hits = 0;
  TAS.particles.clear();

  // Tutorial on first game
  if (showTutorial) {
    tutorialStep = 0;
    tutorialTimer = 4.0;
  }
}

// === PHYSICS ===
function updateBallPhysics(ball, dt) {
  if (!ball.active) return;

  // Gravity
  ball.vy += GRAVITY * dt;

  // Friction
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;

  // Move
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  // Trail
  ball.trail.push({ x: ball.x, y: ball.y, life: 1.0 });
  if (ball.trail.length > 12) ball.trail.shift();

  // Wall collisions
  if (ball.x - BALL_RADIUS < TABLE_LEFT) {
    ball.x = TABLE_LEFT + BALL_RADIUS;
    ball.vx = Math.abs(ball.vx) * WALL_BOUNCE;
    TAS.audio.playTone(200, 0.03, 'square', 0.04);
  }
  if (ball.x + BALL_RADIUS > TABLE_RIGHT - 16) { // Leave space for launcher
    if (ball.y < TABLE_BOTTOM - 80) {
      ball.x = TABLE_RIGHT - 16 - BALL_RADIUS;
      ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE;
      TAS.audio.playTone(200, 0.03, 'square', 0.04);
    }
  }
  if (ball.y - BALL_RADIUS < TABLE_TOP) {
    ball.y = TABLE_TOP + BALL_RADIUS;
    ball.vy = Math.abs(ball.vy) * WALL_BOUNCE;
    TAS.audio.playTone(250, 0.03, 'square', 0.04);
  }

  // Launcher channel right wall
  if (ball.x > TABLE_RIGHT - 16 && ball.y > TABLE_BOTTOM - 80) {
    if (ball.x + BALL_RADIUS > TABLE_RIGHT) {
      ball.x = TABLE_RIGHT - BALL_RADIUS;
      ball.vx = -Math.abs(ball.vx) * WALL_BOUNCE;
    }
  }

  // Drain (bottom)
  if (ball.y > TABLE_BOTTOM + 10) {
    var idx = balls.indexOf(ball);
    if (idx >= 0) drainBall(idx);
    return;
  }

  // Flipper guide walls (angled walls above flippers)
  var lgx1 = TABLE_LEFT, lgy1 = 380;
  var lgx2 = 70, lgy2 = 420;
  collideSegment(ball, lgx1, lgy1, lgx2, lgy2);
  var rgx1 = TABLE_RIGHT - 16, rgy1 = 380;
  var rgx2 = 250, rgy2 = 420;
  collideSegment(ball, rgx1, rgy1, rgx2, rgy2);

  // Bumper collisions - STR boosts force
  for (var i = 0; i < bumpers.length; i++) {
    var bmp = bumpers[i];
    var dx = ball.x - bmp.x;
    var dy = ball.y - bmp.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var minDist = BALL_RADIUS + bmp.r;
    if (dist < minDist && dist > 0) {
      var nx = dx / dist;
      var ny = dy / dist;
      ball.x = bmp.x + nx * minDist;
      ball.y = bmp.y + ny * minDist;
      // STR adds to bumper bounce force
      var force = BUMPER_FORCE + bmp.hits * 20 + BUMPER_HIT_BONUS;
      ball.vx = nx * force;
      ball.vy = ny * force;
      bmp.hits++;
      bmp.flash = 1.0;
      totalBumperHits++;
      var pts = Math.min(500, 100 + bmp.hits * 50);

      // Skill shot check
      if (skillShot.active && i === skillShot.targetIndex) {
        pts += skillShot.value;
        skillShot.active = false;
        TAS.fx.flash('#ffff44', 0.4);
        TAS.audio.playMelody([[880,0.1],[1100,0.1],[1320,0.15]], 80);
        TAS.particles.spawn(bmp.x, bmp.y, '#ffff44', 12, 5, { size: 3, gravity: 0.3 });
      }

      addScore(pts);
      TAS.particles.spawn(bmp.x, bmp.y, bmp.color, 6, 3, { size: 2, gravity: 0.5 });
      TAS.audio.playTone(600 + bmp.hits * 40, 0.08, 'sine', 0.12);
      triggerShake(2, 0.85);

      // Zone progress for Spore Canopy
      if (bmp.hits % 10 === 0) checkZoneProgress(0);

      // Spore jackpot during multiball
      if (sporeJackpot.active) {
        addScore(Math.floor(sporeJackpot.value * 0.1));
        TAS.particles.spawn(bmp.x, bmp.y, '#ff88ff', 4, 3, { size: 2 });
      }
    }
  }

  // Post collisions
  for (var i = 0; i < posts.length; i++) {
    var p = posts[i];
    var dx = ball.x - p.x;
    var dy = ball.y - p.y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var minDist = BALL_RADIUS + p.r;
    if (dist < minDist && dist > 0) {
      var nx = dx / dist;
      var ny = dy / dist;
      ball.x = p.x + nx * minDist;
      ball.y = p.y + ny * minDist;
      var speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      ball.vx = nx * speed * 0.7;
      ball.vy = ny * speed * 0.7;
      TAS.audio.playTone(400, 0.03, 'triangle', 0.05);
    }
  }

  // Kicker collisions
  for (var i = 0; i < kickers.length; i++) {
    var k = kickers[i];
    if (ball.x > k.x && ball.x < k.x + k.w && ball.y > k.y && ball.y < k.y + k.h) {
      // STR boosts kicker force
      var kickPower = KICKER_FORCE + BUMPER_HIT_BONUS;
      if (k.side === 'left') {
        ball.vx = kickPower;
        ball.vy = -kickPower * 0.7;
      } else {
        ball.vx = -kickPower;
        ball.vy = -kickPower * 0.7;
      }
      k.flash = 1.0;
      addScore(10);
      TAS.audio.playTone(350, 0.06, 'square', 0.08);
      triggerShake(2, 0.8);
    }
  }

  // Rollover lanes ("SPORE")
  for (var i = 0; i < rollovers.length; i++) {
    var ro = rollovers[i];
    if (Math.abs(ball.x - ro.x) < 12 && Math.abs(ball.y - ro.y) < 8) {
      if (!ro.lit) {
        ro.lit = true;
        ro.flash = 1.0;
        addScore(200);
        TAS.audio.playTone(440 + i * 80, 0.1, 'sine', 0.06);
        checkMultiplier();
      }
    }
  }

  // Drop targets
  for (var b = 0; b < dropBanks.length; b++) {
    var bank = dropBanks[b];
    for (var t = 0; t < bank.targets.length; t++) {
      var tgt = bank.targets[t];
      if (!tgt.alive) continue;
      if (Math.abs(ball.x - tgt.x) < 10 && Math.abs(ball.y - tgt.y) < 8) {
        tgt.alive = false;
        tgt.flash = 1.0;
        addScore(500);
        ball.vy = -Math.abs(ball.vy) * 0.5;
        TAS.particles.spawn(tgt.x, tgt.y, '#ffaa00', 4, 2);
        TAS.audio.playTone(550, 0.08, 'square', 0.08);
        checkDropBank(bank);
        // Combo check
        if (comboStage === 2) {
          comboStage = 3;
          addScore(10000);
          TAS.fx.flash('#ffdd44', 0.4);
          TAS.audio.playMelody([[880,0.1],[1100,0.1],[1320,0.15]], 80);
          comboTimer = 0;
          comboStage = 0;
        }
      }
    }
  }

  // Spinner - DEX boosts spin speed
  if (Math.abs(ball.x - spinner.x) < 15 && Math.abs(ball.y - spinner.y) < 10) {
    var speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    var spinBoost = 1 + DEX_MOD * 0.1; // DEX makes spinner spin faster
    spinner.spinning = Math.min(20, speed * 0.05 * spinBoost);
    spinner.hits++;
    totalSpins++;
    addScore(100 * Math.ceil(spinner.spinning));
    ball.vy *= 0.8;
    TAS.audio.playTone(300 + spinner.spinning * 30, 0.05, 'triangle', 0.06);
    // Combo check
    if (comboStage === 1) {
      comboStage = 2;
      comboTimer = 4.0;
    }
  }

  // Reactor Ramp entry
  if (Math.abs(ball.x - ramp.entryX) < 14 && Math.abs(ball.y - ramp.entryY) < 14 && ball.vy < -100) {
    ball.x = ramp.exitX;
    ball.y = ramp.exitY;
    ball.vx = 80;
    ball.vy = 50;
    addScore(2500);
    totalRampShots++;
    TAS.particles.spawn(ramp.exitX, ramp.exitY, '#44ffdd', 8, 3);
    TAS.audio.playTone(440, 0.15, 'sine', 0.1, 880);
    TAS.fx.flash('#22ffaa', 0.2);
    comboStage = 1;
    comboTimer = 4.0;
  }

  // Spore Chute (right ramp) entry
  if (Math.abs(ball.x - sporeRamp.entryX) < 14 && Math.abs(ball.y - sporeRamp.entryY) < 14 && ball.vy < -100) {
    ball.x = sporeRamp.exitX;
    ball.y = sporeRamp.exitY;
    ball.vx = -80;
    ball.vy = 50;
    sporeRamp.hits++;
    addScore(3000 + sporeRamp.hits * 500);
    TAS.particles.spawn(sporeRamp.exitX, sporeRamp.exitY, '#ff88ff', 10, 4, { size: 2 });
    TAS.audio.playTone(550, 0.15, 'sine', 0.1, 1100);
    TAS.fx.flash('#ff44ff', 0.2);
    totalRampShots++;

    // Spore Chute: 3 shots lights extra scoring
    if (sporeRamp.hits % 3 === 0) {
      addScore(10000);
      TAS.fx.flash('#ff88ff', 0.4);
      TAS.audio.playMelody([[440,0.1],[660,0.1],[880,0.1],[1100,0.12]], 70);
    }
  }

  // Reactor hole
  var rdx = ball.x - reactor.x;
  var rdy = ball.y - reactor.y;
  var rdist = Math.sqrt(rdx * rdx + rdy * rdy);
  if (rdist < reactor.r && !reactor.capturedBall) {
    addScore(1000);
    if (reactor.lit) {
      startMultiball();
      reactor.lit = false;
    }
    reactor.capturedBall = ball;
    reactor.releaseTimer = 1.5;
    ball.vx = 0;
    ball.vy = 0;
    ball.x = reactor.x;
    ball.y = reactor.y;
    TAS.audio.playTone(220, 0.3, 'sawtooth', 0.08, 440);
    TAS.particles.spawn(reactor.x, reactor.y, '#ff44ff', 10, 4, { size: 3 });
    reactor.flash = 1.0;
  }

  // Reactor targets
  for (var i = 0; i < reactorTargets.length; i++) {
    var rt = reactorTargets[i];
    if (rt.lit) continue;
    if (Math.abs(ball.x - rt.x) < 12 && Math.abs(ball.y - rt.y) < 10) {
      rt.lit = true;
      rt.flash = 1.0;
      reactorLit++;
      addScore(500);
      TAS.audio.playTone(330 + i * 110, 0.12, 'sine', 0.08);
      if (reactorLit >= 3) {
        reactor.lit = true;
        TAS.fx.flash('#ff00ff', 0.3);
        TAS.audio.playTone(220, 0.2, 'square', 0.1);
        TAS.audio.playTone(330, 0.2, 'square', 0.08);
      }
      ball.vy = -Math.abs(ball.vy) * 0.4 - 50;
    }
  }

  // Inlane detection for zone progress
  if (ball.y > inlaneLeft.y && ball.y < inlaneLeft.y + inlaneLeft.h) {
    if (ball.x > inlaneLeft.x && ball.x < inlaneLeft.x + inlaneLeft.w) {
      checkZoneProgress(2);
    }
    if (ball.x > inlaneRight.x && ball.x < inlaneRight.x + inlaneRight.w) {
      checkZoneProgress(2);
    }
  }

  // Flipper collision - force uses FLIPPER_FORCE (STR-boosted)
  if (!tilted) {
    collideFlipper(ball, LEFT_FLIP);
    collideFlipper(ball, RIGHT_FLIP);
  }
}

function collideSegment(ball, x1, y1, x2, y2) {
  var dx = x2 - x1;
  var dy = y2 - y1;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return;
  var nx = -dy / len;
  var ny = dx / len;
  var bx = ball.x - x1;
  var by = ball.y - y1;
  var dist = bx * nx + by * ny;
  if (dist > 0 && dist < BALL_RADIUS) {
    var proj = bx * dx / len + by * dy / len;
    if (proj >= 0 && proj <= len) {
      ball.x += nx * (BALL_RADIUS - dist);
      ball.y += ny * (BALL_RADIUS - dist);
      var dot = ball.vx * nx + ball.vy * ny;
      ball.vx -= 2 * dot * nx * 0.7;
      ball.vy -= 2 * dot * ny * 0.7;
    }
  }
}

function collideFlipper(ball, flip) {
  var cos = Math.cos(flip.angle);
  var sin = Math.sin(flip.angle);
  var tipX = flip.x + cos * flip.length;
  var tipY = flip.y + sin * flip.length;

  var dx = tipX - flip.x;
  var dy = tipY - flip.y;
  var len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return;

  var nx = -dy / len;
  var ny = dx / len;

  var bx = ball.x - flip.x;
  var by = ball.y - flip.y;
  var dist = bx * nx + by * ny;
  var proj = (bx * dx + by * dy) / (len * len);

  if (proj >= -0.1 && proj <= 1.1 && Math.abs(dist) < BALL_RADIUS + 4) {
    if (dist > 0 && dist < BALL_RADIUS + 4) {
      ball.x += nx * (BALL_RADIUS + 4 - dist);
      ball.y += ny * (BALL_RADIUS + 4 - dist);

      // NES controls: check input for flipper activation
      var leftPressed = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a;
      var rightPressed = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.keys['KeyX'] || TAS.input.touch.b;
      var flipActive = (flip === LEFT_FLIP && leftPressed) || (flip === RIGHT_FLIP && rightPressed);

      if (flipActive) {
        // STR determines flipper power via FLIPPER_FORCE
        var contactPoint = proj;
        var force = FLIPPER_FORCE * (0.5 + contactPoint * 0.5);
        ball.vx += nx * force * 0.3 + (flip.dir === 1 ? 1 : -1) * force * 0.15;
        ball.vy -= force * 0.85;
        TAS.audio.playTone(180, 0.05, 'square', 0.1);
        // DEX: faster flipper = more controlled trajectory
        if (DEX_MOD > 0) {
          // slight aim correction toward center-top
          ball.vx *= (1 - DEX_MOD * 0.02);
        }
      } else {
        var dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 1.5 * dot * nx;
        ball.vy -= 1.5 * dot * ny;
      }
    } else if (dist < 0 && dist > -(BALL_RADIUS + 4)) {
      ball.x -= nx * (BALL_RADIUS + 4 + dist);
      ball.y -= ny * (BALL_RADIUS + 4 + dist);
      var dot = ball.vx * nx + ball.vy * ny;
      if (dot < 0) {
        ball.vx -= 1.5 * dot * nx;
        ball.vy -= 1.5 * dot * ny;
      }
    }
  }
}

// === GAME LOGIC ===
function startGame() {
  state = 'playing';
  resetTable();
  TAS.particles.clear();
}

function update(dt) {
  frame++;
  glowPulse += dt * 3;
  tableHue += dt * 10;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Shake update
  if (shakeIntensity > 0) {
    shakeIntensity *= shakeDecay;
    if (shakeIntensity < 0.1) shakeIntensity = 0;
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 3 === 0) {
      if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
        state = 'title';
      }
    }
    return;
  }

  if (state !== 'playing') return;

  // Tutorial update
  if (showTutorial && tutorialTimer > 0) {
    tutorialTimer -= dt;
    if (tutorialTimer <= 0) {
      tutorialStep++;
      if (tutorialStep >= 4) {
        showTutorial = false;
      } else {
        tutorialTimer = 3.5;
      }
    }
  }

  // NES-style controls: Z = left flipper, X = right flipper, Arrow keys = nudge
  var leftPressed = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a;
  var rightPressed = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.keys['KeyX'] || TAS.input.touch.b;

  // DEX-based nudge: Up arrow nudges table (controlled by DEX)
  var nudgeUp = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'];
  var nudgeDown = TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'];

  if (nudgeCooldown > 0) nudgeCooldown -= dt;

  if ((nudgeUp || nudgeDown) && nudgeCooldown <= 0 && !tilted && balls.length > 0) {
    nudgeCooldown = 0.5; // DEX reduces cooldown
    var nudgeDir = nudgeUp ? -1 : 1;
    // DEX determines nudge effectiveness
    for (var i = 0; i < balls.length; i++) {
      if (balls[i].active && balls[i] !== reactor.capturedBall) {
        balls[i].vy += nudgeDir * NUDGE_FORCE;
        // Small horizontal nudge based on which arrow
        if (TAS.input.keys['ArrowLeft']) balls[i].vx -= NUDGE_FORCE * 0.3;
        if (TAS.input.keys['ArrowRight']) balls[i].vx += NUDGE_FORCE * 0.3;
      }
    }
    triggerShake(1.5, 0.8);
    TAS.audio.playTone(150, 0.04, 'square', 0.06);

    // Nudge adds to tilt risk
    tiltCount += 15;
  }

  // Tilt detection
  if (leftPressed && rightPressed && !tilted) {
    tiltCount++;
    if (tiltCount > 60) {
      tiltWarning = 3.0;
    }
    if (tiltCount > 120) {
      tilted = true;
      TAS.fx.flash('#ff0000', 0.5);
      TAS.audio.playNoise(0.5, 0.15, 200);
    }
  } else {
    tiltCount = Math.max(0, tiltCount - 2);
  }

  if (tiltWarning > 0) tiltWarning -= dt;

  // Flipper control - speed uses FLIP_SPEED (DEX-boosted)
  if (!tilted) {
    if (leftPressed) {
      LEFT_FLIP.targetAngle = FLIP_UP_LEFT;
    } else {
      LEFT_FLIP.targetAngle = FLIP_DOWN_LEFT;
    }
    if (rightPressed) {
      RIGHT_FLIP.targetAngle = FLIP_UP_RIGHT;
    } else {
      RIGHT_FLIP.targetAngle = FLIP_DOWN_RIGHT;
    }
  } else {
    LEFT_FLIP.targetAngle = FLIP_DOWN_LEFT;
    RIGHT_FLIP.targetAngle = FLIP_DOWN_RIGHT;
  }

  // Animate flippers - DEX affects FLIP_SPEED
  var flipDt = dt * FLIP_SPEED;
  if (LEFT_FLIP.angle < LEFT_FLIP.targetAngle) {
    LEFT_FLIP.angle = Math.min(LEFT_FLIP.angle + flipDt, LEFT_FLIP.targetAngle);
  } else {
    LEFT_FLIP.angle = Math.max(LEFT_FLIP.angle - flipDt, LEFT_FLIP.targetAngle);
  }
  if (RIGHT_FLIP.angle > RIGHT_FLIP.targetAngle) {
    RIGHT_FLIP.angle = Math.max(RIGHT_FLIP.angle - flipDt, RIGHT_FLIP.targetAngle);
  } else {
    RIGHT_FLIP.angle = Math.min(RIGHT_FLIP.angle + flipDt, RIGHT_FLIP.targetAngle);
  }

  // Plunger
  var fireKey = TAS.input.keys['Space'] || TAS.input.keys[' '];
  if (ballInLauncher) {
    if (fireKey || TAS.input.touch.b) {
      plungerHeld = true;
      plungerPull = Math.min(1.0, plungerPull + dt * 1.8);
    } else if (plungerHeld) {
      plungerHeld = false;
      launchBall();
    }
  }

  // Ball save timer
  if (ballSaveTimer > 0) ballSaveTimer -= dt;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      comboStage = 0;
    }
  }

  // Skill shot timer
  if (skillShot.active) {
    skillShot.timer -= dt;
    if (skillShot.timer <= 0) skillShot.active = false;
  }

  // Spore jackpot timer
  if (sporeJackpot.active) {
    sporeJackpot.timer -= dt;
    if (sporeJackpot.timer <= 0) sporeJackpot.active = false;
  }

  // Spore burst particles during multiball start
  if (sporeBurstTimer > 0) {
    sporeBurstTimer -= dt;
    if (frame % 3 === 0) {
      var sx = 80 + Math.random() * 160;
      var sy = 100 + Math.random() * 200;
      TAS.particles.spawn(sx, sy, '#ff44ff', 2, 2, { size: 1.5, gravity: -0.2 });
    }
  }

  // Reactor release
  if (reactor.capturedBall && reactor.releaseTimer > 0) {
    reactor.releaseTimer -= dt;
    if (reactor.releaseTimer <= 0) {
      var cb = reactor.capturedBall;
      cb.x = 240;
      cb.y = 180;
      cb.vx = 80;
      cb.vy = -120;
      reactor.capturedBall = null;
    }
  }

  // Spinner decay
  if (spinner.spinning > 0) {
    spinner.spinning *= 0.96;
    spinner.angle += spinner.spinning * dt * 20;
    if (spinner.spinning < 0.1) spinner.spinning = 0;
  }

  // Flash decay on elements
  for (var i = 0; i < bumpers.length; i++) {
    if (bumpers[i].flash > 0) bumpers[i].flash -= dt * 4;
  }
  for (var i = 0; i < kickers.length; i++) {
    if (kickers[i].flash > 0) kickers[i].flash -= dt * 4;
  }
  for (var i = 0; i < rollovers.length; i++) {
    if (rollovers[i].flash > 0) rollovers[i].flash -= dt * 3;
  }
  for (var b = 0; b < dropBanks.length; b++) {
    for (var t = 0; t < dropBanks[b].targets.length; t++) {
      if (dropBanks[b].targets[t].flash > 0) dropBanks[b].targets[t].flash -= dt * 3;
    }
  }
  for (var i = 0; i < reactorTargets.length; i++) {
    if (reactorTargets[i].flash > 0) reactorTargets[i].flash -= dt * 3;
  }
  if (reactor.flash > 0) reactor.flash -= dt * 2;

  // Update ball trail decay
  for (var b = 0; b < balls.length; b++) {
    var ball = balls[b];
    for (var t = ball.trail.length - 1; t >= 0; t--) {
      ball.trail[t].life -= dt * 4;
      if (ball.trail[t].life <= 0) ball.trail.splice(t, 1);
    }
  }

  // Zone ambient particles
  if (frame % 8 === 0) {
    // Spore Canopy: floating spore particles
    TAS.particles.spawn(
      TABLE_LEFT + Math.random() * TABLE_W,
      TABLE_TOP + Math.random() * (ZONE_SPORE_BOTTOM - TABLE_TOP),
      'rgba(255,100,200,0.3)', 1, 3, { size: 1, gravity: -0.1 }
    );
    // Mycelium: network shimmer
    if (frame % 16 === 0) {
      TAS.particles.spawn(
        TABLE_LEFT + Math.random() * TABLE_W,
        ZONE_SPORE_BOTTOM + Math.random() * (ZONE_MYCELIUM_BOTTOM - ZONE_SPORE_BOTTOM),
        'rgba(68,255,170,0.2)', 1, 2, { size: 0.8, gravity: 0 }
      );
    }
  }

  // Update ball physics
  for (var i = 0; i < balls.length; i++) {
    if (balls[i].active && balls[i] !== reactor.capturedBall) {
      updateBallPhysics(balls[i], dt);
    }
  }

  // Clean up inactive balls
  balls = balls.filter(function(b) { return b.active; });
}

// === DRAWING ===
function drawTableZones() {
  // Zone 1: Spore Canopy (top) - pinkish purple organic feel
  var sporeGrad = ctx.createLinearGradient(TABLE_LEFT, TABLE_TOP, TABLE_LEFT, ZONE_SPORE_BOTTOM);
  sporeGrad.addColorStop(0, '#120822');
  sporeGrad.addColorStop(1, '#0d0620');
  ctx.fillStyle = sporeGrad;
  ctx.fillRect(TABLE_LEFT, TABLE_TOP, TABLE_W, ZONE_SPORE_BOTTOM - TABLE_TOP);

  // Zone divider line 1
  ctx.strokeStyle = zoneLit[0] ? 'rgba(255,68,170,0.5)' : 'rgba(255,68,170,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT, ZONE_SPORE_BOTTOM);
  ctx.lineTo(TABLE_RIGHT - 16, ZONE_SPORE_BOTTOM);
  ctx.stroke();
  ctx.setLineDash([]);

  // Zone 2: Mycelium Network (mid) - green/teal organic web
  var mycoGrad = ctx.createLinearGradient(TABLE_LEFT, ZONE_SPORE_BOTTOM, TABLE_LEFT, ZONE_MYCELIUM_BOTTOM);
  mycoGrad.addColorStop(0, '#0d0620');
  mycoGrad.addColorStop(1, '#080418');
  ctx.fillStyle = mycoGrad;
  ctx.fillRect(TABLE_LEFT, ZONE_SPORE_BOTTOM, TABLE_W, ZONE_MYCELIUM_BOTTOM - ZONE_SPORE_BOTTOM);

  // Zone divider line 2
  ctx.strokeStyle = zoneLit[1] ? 'rgba(68,255,170,0.5)' : 'rgba(68,255,170,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT, ZONE_MYCELIUM_BOTTOM);
  ctx.lineTo(TABLE_RIGHT - 16, ZONE_MYCELIUM_BOTTOM);
  ctx.stroke();
  ctx.setLineDash([]);

  // Zone 3: Underdark (bottom) - deep blue/dark
  var darkGrad = ctx.createLinearGradient(TABLE_LEFT, ZONE_MYCELIUM_BOTTOM, TABLE_LEFT, TABLE_BOTTOM);
  darkGrad.addColorStop(0, '#080418');
  darkGrad.addColorStop(1, '#050210');
  ctx.fillStyle = darkGrad;
  ctx.fillRect(TABLE_LEFT, ZONE_MYCELIUM_BOTTOM, TABLE_W, TABLE_BOTTOM - ZONE_MYCELIUM_BOTTOM);

  // Zone labels (dim, on the wall edge)
  ctx.font = '6px monospace';
  ctx.textAlign = 'left';
  ctx.globalAlpha = zoneLit[0] ? 0.6 : 0.2;
  ctx.fillStyle = '#ff44aa';
  ctx.fillText('SPORE CANOPY', TABLE_LEFT + 2, ZONE_SPORE_BOTTOM - 3);
  ctx.globalAlpha = zoneLit[1] ? 0.6 : 0.2;
  ctx.fillStyle = '#44ffaa';
  ctx.fillText('MYCELIUM NET', TABLE_LEFT + 2, ZONE_MYCELIUM_BOTTOM - 3);
  ctx.globalAlpha = zoneLit[2] ? 0.6 : 0.2;
  ctx.fillStyle = '#4488ff';
  ctx.fillText('UNDERDARK', TABLE_LEFT + 2, TABLE_BOTTOM - 3);
  ctx.globalAlpha = 1;
}

function drawTable() {
  // Table background with zones
  drawTableZones();

  // Mycelium network background pattern
  ctx.strokeStyle = 'rgba(100, 60, 180, 0.12)';
  ctx.lineWidth = 1;
  for (var i = 0; i < 20; i++) {
    var sx = TABLE_LEFT + (i * 37 + frame * 0.1) % TABLE_W;
    var sy = TABLE_TOP + (i * 53) % TABLE_H;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx + 30, sy + 40, sx + 60 + Math.sin(frame * 0.02 + i) * 10, sy + 20);
    ctx.stroke();
  }

  // Mycelium web in Zone 2 (connecting elements)
  ctx.strokeStyle = 'rgba(68, 200, 140, 0.08)';
  ctx.lineWidth = 0.8;
  // Connect reactor to targets
  for (var i = 0; i < reactorTargets.length; i++) {
    ctx.beginPath();
    ctx.moveTo(reactor.x, reactor.y);
    var cp1x = (reactor.x + reactorTargets[i].x) / 2 + Math.sin(glowPulse + i) * 10;
    var cp1y = (reactor.y + reactorTargets[i].y) / 2;
    ctx.quadraticCurveTo(cp1x, cp1y, reactorTargets[i].x, reactorTargets[i].y);
    ctx.stroke();
  }
  // Connect drop banks
  for (var b = 0; b < dropBanks.length; b++) {
    var bank = dropBanks[b];
    for (var t = 0; t < bank.targets.length - 1; t++) {
      if (bank.targets[t].alive && bank.targets[t+1].alive) {
        ctx.beginPath();
        ctx.moveTo(bank.targets[t].x, bank.targets[t].y);
        ctx.lineTo(bank.targets[t+1].x, bank.targets[t+1].y);
        ctx.stroke();
      }
    }
  }

  // Table walls
  ctx.strokeStyle = '#445';
  ctx.lineWidth = 4;
  ctx.strokeRect(TABLE_LEFT - 2, TABLE_TOP - 2, TABLE_W + 4, TABLE_H + 4);

  // Inner wall glow
  ctx.save();
  ctx.shadowColor = '#6644aa';
  ctx.shadowBlur = 6;
  ctx.strokeStyle = '#6644aa';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(TABLE_LEFT, TABLE_TOP, TABLE_W, TABLE_H);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Launcher channel
  ctx.fillStyle = '#0a0520';
  ctx.fillRect(TABLE_RIGHT - 16, TABLE_BOTTOM - 80, 16, 80);
  ctx.strokeStyle = '#445';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(TABLE_RIGHT - 16, TABLE_BOTTOM - 80);
  ctx.lineTo(TABLE_RIGHT - 16, TABLE_BOTTOM);
  ctx.stroke();
}

function drawFlippers() {
  drawFlipper(LEFT_FLIP, '#ccddff');
  drawFlipper(RIGHT_FLIP, '#ccddff');
}

function drawFlipper(flip, color) {
  var cos = Math.cos(flip.angle);
  var sin = Math.sin(flip.angle);
  var tipX = flip.x + cos * flip.length;
  var tipY = flip.y + sin * flip.length;

  ctx.save();
  ctx.shadowColor = '#44aaff';
  ctx.shadowBlur = 4;
  ctx.strokeStyle = color;
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(flip.x, flip.y);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();

  // Metallic center
  ctx.strokeStyle = '#88aadd';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(flip.x, flip.y);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Pivot
  ctx.fillStyle = '#aaccff';
  ctx.beginPath();
  ctx.arc(flip.x, flip.y, 5, 0, Math.PI * 2);
  ctx.fill();

  // STR indicator glow on pivot (brighter with higher STR)
  if (STR_MOD > 0) {
    ctx.save();
    ctx.globalAlpha = 0.3 + STR_MOD * 0.05;
    ctx.fillStyle = statB.color;
    ctx.shadowColor = statB.color;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(flip.x, flip.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBumpers() {
  for (var i = 0; i < bumpers.length; i++) {
    var b = bumpers[i];
    var glow = 0.3 + Math.sin(glowPulse + i * 2) * 0.15 + b.flash * 0.5;

    // Skill shot indicator
    var isSkillTarget = skillShot.active && i === skillShot.targetIndex;

    ctx.save();
    ctx.shadowColor = isSkillTarget ? '#ffff44' : b.color;
    ctx.shadowBlur = 8 + b.flash * 12 + (isSkillTarget ? 10 : 0);

    // Mushroom cap
    ctx.fillStyle = isSkillTarget ? '#ffff44' : b.color;
    ctx.globalAlpha = 0.6 + glow * 0.4;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y - 4, b.r, b.r * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Spots on mushroom
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.4 + b.flash * 0.4;
    ctx.beginPath();
    ctx.arc(b.x - 5, b.y - 6, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(b.x + 4, b.y - 3, 2, 0, Math.PI * 2);
    ctx.fill();

    // Ring
    ctx.strokeStyle = isSkillTarget ? '#ffff88' : '#fff';
    ctx.lineWidth = isSkillTarget ? 3 : 2;
    ctx.globalAlpha = 0.3 + b.flash * 0.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 2, 0, Math.PI * 2);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();

    // Bumper name label
    ctx.fillStyle = b.color;
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5;
    ctx.fillText(b.name, b.x, b.y + b.r + 10);
    ctx.globalAlpha = 1;

    // Glyph on bumper
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.7;
    ctx.fillText(b.glyph, b.x, b.y + 3);
    ctx.globalAlpha = 1;

    // Score text on hit
    if (b.flash > 0.5) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = b.flash;
      ctx.fillText(Math.min(500, 100 + b.hits * 50) + '', b.x, b.y - b.r - 5);
      ctx.globalAlpha = 1;
    }

    // Skill shot label
    if (isSkillTarget) {
      ctx.fillStyle = '#ffff44';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.5 + Math.sin(glowPulse * 3) * 0.5;
      ctx.fillText('SKILL SHOT', b.x, b.y - b.r - 14);
      ctx.globalAlpha = 1;
    }
  }
}

function drawKickers() {
  for (var i = 0; i < kickers.length; i++) {
    var k = kickers[i];
    var glow = k.flash * 0.8;
    ctx.save();
    ctx.fillStyle = 'rgba(255, 100, 50, ' + (0.3 + glow) + ')';
    ctx.shadowColor = '#ff6633';
    ctx.shadowBlur = 4 + glow * 8;

    // Triangle slingshot shape
    ctx.beginPath();
    if (k.side === 'left') {
      ctx.moveTo(k.x, k.y);
      ctx.lineTo(k.x + k.w, k.y + k.h * 0.3);
      ctx.lineTo(k.x, k.y + k.h);
    } else {
      ctx.moveTo(k.x + k.w, k.y);
      ctx.lineTo(k.x, k.y + k.h * 0.3);
      ctx.lineTo(k.x + k.w, k.y + k.h);
    }
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawRollovers() {
  for (var i = 0; i < rollovers.length; i++) {
    var ro = rollovers[i];
    var glow = ro.lit ? 0.8 + Math.sin(glowPulse + i) * 0.2 : 0.2;
    ctx.save();
    ctx.fillStyle = ro.lit ? '#44ffaa' : '#224433';
    ctx.shadowColor = '#44ffaa';
    ctx.shadowBlur = ro.lit ? 6 : 0;
    ctx.globalAlpha = glow;
    ctx.beginPath();
    ctx.arc(ro.x, ro.y, 6, 0, Math.PI * 2);
    ctx.fill();

    // "SPORE" letter instead of arrow
    ctx.fillStyle = ro.lit ? '#ccffee' : '#445';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = ro.lit ? 1 : 0.4;
    ctx.fillText(ROLLOVER_LETTERS[i], ro.x, ro.y + 3);

    // Arrow indicator
    ctx.strokeStyle = ro.lit ? '#88ffcc' : '#334';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(ro.x, ro.y + 8);
    ctx.lineTo(ro.x, ro.y - 8);
    ctx.moveTo(ro.x - 3, ro.y - 5);
    ctx.lineTo(ro.x, ro.y - 8);
    ctx.lineTo(ro.x + 3, ro.y - 5);
    ctx.stroke();

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawDropTargets() {
  for (var b = 0; b < dropBanks.length; b++) {
    var bank = dropBanks[b];

    // Bank name label
    ctx.fillStyle = bank.cleared ? '#886600' : '#ffaa00';
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = bank.cleared ? 0.3 : 0.6;
    var avgX = 0, avgY = 0;
    for (var t = 0; t < bank.targets.length; t++) {
      avgX += bank.targets[t].x;
      avgY += bank.targets[t].y;
    }
    avgX /= bank.targets.length;
    avgY /= bank.targets.length;
    ctx.fillText(bank.name, avgX, avgY - 12);
    ctx.globalAlpha = 1;

    for (var t = 0; t < bank.targets.length; t++) {
      var tgt = bank.targets[t];
      if (!tgt.alive) continue;
      var glow = tgt.flash;
      ctx.save();
      ctx.fillStyle = '#ffaa00';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 3 + glow * 8;
      ctx.fillRect(tgt.x - 8, tgt.y - 4, 16, 8);
      ctx.strokeStyle = '#ffdd44';
      ctx.lineWidth = 1;
      ctx.strokeRect(tgt.x - 8, tgt.y - 4, 16, 8);
      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }
}

function drawSpinner() {
  ctx.save();
  ctx.translate(spinner.x, spinner.y);
  ctx.rotate(spinner.angle);
  var glow = spinner.spinning > 0.5 ? 0.5 : 0;
  ctx.shadowColor = '#44ddff';
  ctx.shadowBlur = 4 + glow * 6;
  ctx.strokeStyle = '#66ccff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-12, 0);
  ctx.lineTo(12, 0);
  ctx.stroke();
  ctx.fillStyle = '#44aadd';
  ctx.fillRect(-2, -6, 4, 12);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Gate posts
  ctx.fillStyle = '#556';
  ctx.fillRect(spinner.x - 14, spinner.y - 2, 3, 4);
  ctx.fillRect(spinner.x + 11, spinner.y - 2, 3, 4);

  // Spinner label
  ctx.fillStyle = '#44ddff';
  ctx.font = '5px monospace';
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.5;
  ctx.fillText('SPINNER', spinner.x, spinner.y + 14);
  ctx.globalAlpha = 1;
}

function drawRamp() {
  // Reactor Ramp entry glow
  var entryGlow = 0.4 + Math.sin(glowPulse * 1.5) * 0.2;
  ctx.save();
  ctx.strokeStyle = 'rgba(68, 255, 221, ' + entryGlow + ')';
  ctx.shadowColor = '#44ffdd';
  ctx.shadowBlur = 6;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(ramp.entryX, ramp.entryY, 12, -Math.PI * 0.6, Math.PI * 0.6);
  ctx.stroke();

  // Ramp rail path (dotted curve)
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(68, 255, 221, 0.3)';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(ramp.entryX, ramp.entryY);
  ctx.quadraticCurveTo(40, 150, ramp.exitX, ramp.exitY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Exit
  ctx.fillStyle = 'rgba(68, 255, 221, 0.4)';
  ctx.beginPath();
  ctx.arc(ramp.exitX, ramp.exitY, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Label
  ctx.fillStyle = '#44ffdd';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR', ramp.entryX, ramp.entryY + 20);
  ctx.fillText('RAMP', ramp.entryX, ramp.entryY + 28);

  // Spore Chute (right ramp)
  var sporeGlow = 0.4 + Math.sin(glowPulse * 1.8 + 1) * 0.2;
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 100, 255, ' + sporeGlow + ')';
  ctx.shadowColor = '#ff44ff';
  ctx.shadowBlur = 6;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(sporeRamp.entryX, sporeRamp.entryY, 12, Math.PI * 0.4, Math.PI * 1.6);
  ctx.stroke();

  // Spore Chute rail
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(255, 100, 255, 0.3)';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.moveTo(sporeRamp.entryX, sporeRamp.entryY);
  ctx.quadraticCurveTo(280, 150, sporeRamp.exitX, sporeRamp.exitY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Spore exit
  ctx.fillStyle = 'rgba(255, 100, 255, 0.4)';
  ctx.beginPath();
  ctx.arc(sporeRamp.exitX, sporeRamp.exitY, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Spore Chute label
  ctx.fillStyle = '#ff88ff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE', sporeRamp.entryX, sporeRamp.entryY + 20);
  ctx.fillText('CHUTE', sporeRamp.entryX, sporeRamp.entryY + 28);

  // Hit counter for spore chute
  if (sporeRamp.hits > 0) {
    ctx.fillStyle = '#ff44ff';
    ctx.font = '6px monospace';
    ctx.fillText(sporeRamp.hits + 'x', sporeRamp.entryX, sporeRamp.entryY + 36);
  }
}

function drawReactor() {
  var glow = reactor.lit ? 0.8 + Math.sin(glowPulse * 2) * 0.2 : 0.3;
  ctx.save();

  // Outer ring
  ctx.strokeStyle = reactor.lit ? '#ff44ff' : '#442244';
  ctx.shadowColor = '#ff44ff';
  ctx.shadowBlur = reactor.lit ? 10 + reactor.flash * 10 : 2;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(reactor.x, reactor.y, reactor.r + 4, 0, Math.PI * 2);
  ctx.stroke();

  // Inner hole
  var holeGrad = ctx.createRadialGradient(reactor.x, reactor.y, 0, reactor.x, reactor.y, reactor.r);
  holeGrad.addColorStop(0, reactor.lit ? '#ff00ff' : '#220033');
  holeGrad.addColorStop(1, '#000');
  ctx.fillStyle = holeGrad;
  ctx.beginPath();
  ctx.arc(reactor.x, reactor.y, reactor.r, 0, Math.PI * 2);
  ctx.fill();

  // Spinning energy inside
  ctx.strokeStyle = reactor.lit ? 'rgba(255, 100, 255, 0.7)' : 'rgba(100, 50, 150, 0.3)';
  ctx.lineWidth = 1.5;
  for (var i = 0; i < 3; i++) {
    var a = glowPulse * 2 + i * (Math.PI * 2 / 3);
    ctx.beginPath();
    ctx.arc(reactor.x, reactor.y, reactor.r * 0.6, a, a + 1);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
  ctx.restore();

  // Label
  ctx.fillStyle = reactor.lit ? '#ff88ff' : '#553366';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR', reactor.x, reactor.y + reactor.r + 12);
  if (reactor.lit) {
    ctx.fillStyle = '#ffff44';
    var pulse = Math.sin(glowPulse * 3) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('MULTIBALL!', reactor.x, reactor.y + reactor.r + 22);
    ctx.globalAlpha = 1;
  }

  // Spore jackpot indicator during multiball
  if (sporeJackpot.active) {
    ctx.fillStyle = '#ff88ff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    var jp = Math.sin(glowPulse * 2) * 0.3 + 0.7;
    ctx.globalAlpha = jp;
    ctx.fillText('JACKPOT: ' + sporeJackpot.value.toLocaleString(), reactor.x, reactor.y - reactor.r - 8);
    ctx.fillText(Math.ceil(sporeJackpot.timer) + 's', reactor.x, reactor.y - reactor.r - 16);
    ctx.globalAlpha = 1;
  }
}

function drawReactorTargets() {
  for (var i = 0; i < reactorTargets.length; i++) {
    var rt = reactorTargets[i];
    var glow = rt.lit ? 0.7 + Math.sin(glowPulse + i * 1.5) * 0.3 : 0.3;
    ctx.save();
    ctx.fillStyle = rt.lit ? '#ff44ff' : '#331133';
    ctx.shadowColor = '#ff44ff';
    ctx.shadowBlur = rt.lit ? 6 : 0;
    ctx.globalAlpha = glow;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(rt.x, rt.y - 7);
    ctx.lineTo(rt.x + 7, rt.y);
    ctx.lineTo(rt.x, rt.y + 7);
    ctx.lineTo(rt.x - 7, rt.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = rt.lit ? '#ff88ff' : '#553355';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawPosts() {
  for (var i = 0; i < posts.length; i++) {
    var p = posts[i];
    ctx.fillStyle = '#8899aa';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#aabbcc';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawOutlanes() {
  // Outlane danger zones
  ctx.fillStyle = 'rgba(255, 50, 50, 0.15)';
  ctx.fillRect(outlaneLeft.x, outlaneLeft.y, outlaneLeft.w, outlaneLeft.h);
  ctx.fillRect(outlaneRight.x, outlaneRight.y, outlaneRight.w, outlaneRight.h);

  // Inlane safe zones
  ctx.fillStyle = 'rgba(50, 255, 100, 0.08)';
  ctx.fillRect(inlaneLeft.x, inlaneLeft.y, inlaneLeft.w, inlaneLeft.h);
  ctx.fillRect(inlaneRight.x, inlaneRight.y, inlaneRight.w, inlaneRight.h);

  // Dividers
  ctx.strokeStyle = '#445';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT + 18, 400);
  ctx.lineTo(TABLE_LEFT + 18, 460);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT + 38, 400);
  ctx.lineTo(TABLE_LEFT + 38, 460);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(TABLE_RIGHT - 18, 400);
  ctx.lineTo(TABLE_RIGHT - 18, 460);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(TABLE_RIGHT - 38, 400);

  ctx.rotate(Math.PI / 2);
  ctx.fillText('DRAIN', 0, 0);
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawPlunger() {
  var px = TABLE_RIGHT - 8;
  var py = TABLE_BOTTOM - 15;
  var pullDist = plungerPull * 30;

  // Spring
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  var springTop = py - 40 + pullDist;
  var springBot = py;
  var segments = 6;
  ctx.beginPath();
  ctx.moveTo(px, springBot);
  for (var i = 0; i < segments; i++) {
    var t = i / segments;
    var sy = springBot - (springBot - springTop) * t;
    var sx = px + (i % 2 === 0 ? 4 : -4);
    ctx.lineTo(sx, sy);
  }
  ctx.lineTo(px, springTop);
  ctx.stroke();

  // Plunger head
  ctx.fillStyle = '#aabbcc';
  ctx.fillRect(px - 4, springTop - 8, 8, 8);

  // Power indicator
  if (plungerPull > 0) {
    ctx.fillStyle = 'rgba(255, ' + Math.floor(255 - plungerPull * 200) + ', 0, 0.8)';
    ctx.fillRect(px - 6, py - 50, 12, plungerPull * 30);
  }
}

function drawBalls() {
  for (var i = 0; i < balls.length; i++) {
    var ball = balls[i];
    if (!ball.active) continue;
    if (ball === reactor.capturedBall) continue;

    // Trail with glow - colored by statB.color during multiball
    var trailColor = multiballActive ? statB.color : 'rgba(180, 200, 255, ';
    for (var t = 0; t < ball.trail.length; t++) {
      var tr = ball.trail[t];
      if (multiballActive) {
        ctx.fillStyle = statB.color;
        ctx.globalAlpha = tr.life * 0.4;
      } else {
        ctx.fillStyle = 'rgba(180, 200, 255, ' + (tr.life * 0.4) + ')';
      }
      ctx.beginPath();
      ctx.arc(tr.x, tr.y, BALL_RADIUS * tr.life * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Ball glow
    ctx.save();
    ctx.shadowColor = multiballActive ? statB.color : '#88bbff';
    ctx.shadowBlur = 8;

    // Ball body - uses statB.color tint during multiball
    var ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 0, ball.x, ball.y, BALL_RADIUS);
    ballGrad.addColorStop(0, '#ffffff');
    ballGrad.addColorStop(0.4, multiballActive ? statB.color : '#ccddff');
    ballGrad.addColorStop(1, '#6688aa');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    ctx.fill();

    // Specular highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.beginPath();
    ctx.arc(ball.x - 2, ball.y - 2, BALL_RADIUS * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawHUD() {
  // Score bar
  ctx.fillStyle = 'rgba(10, 5, 20, 0.85)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('SCORE: ' + score.toLocaleString(), 5, 12);

  // Multiplier
  if (multiplier > 1) {
    ctx.fillStyle = '#ff8844';
    ctx.fillText(multiplier + 'x', 5, 24);
  }

  // INT bonus indicator
  if (INT_MOD > 0) {
    ctx.fillStyle = '#88aaff';
    ctx.font = '6px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('INT+' + Math.floor(INT_MOD * 10) + '%', 40, 24);
  }

  // Balls left
  ctx.textAlign = 'right';
  ctx.fillStyle = statB.color; // Use baseling color for ball indicators
  for (var i = 0; i < ballsLeft; i++) {
    ctx.beginPath();
    ctx.arc(GW - 10 - i * 14, 14, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Baseling name and icon in corner
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(statB.icon, GW - 10 - ballsLeft * 14 - 8, 16);

  // Ball save indicator - WIS duration shown
  if (ballSaveTimer > 0) {
    var alpha = Math.sin(frame * 0.2) * 0.3 + 0.7;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#44ff44';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BALL SAVE ' + Math.ceil(ballSaveTimer) + 's', GW / 2, GH - 8);
    ctx.globalAlpha = 1;
  }

  // Tilt warning
  if (tiltWarning > 0 && !tilted) {
    var alpha = Math.sin(frame * 0.3) * 0.3 + 0.7;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('! TILT WARNING !', GW / 2, GH / 2);
    ctx.globalAlpha = 1;
  }

  // Tilted
  if (tilted) {
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TILT', GW / 2, GH / 2);
  }

  // Multiball indicator - spore themed
  if (multiballActive) {
    var alpha = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ff44ff';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPORE MULTIBALL!', GW / 2, 24);
    ctx.globalAlpha = 1;
  }

  // Combo indicator
  if (comboStage > 0 && comboTimer > 0) {
    var labels = ['', 'RAMP>', 'RAMP>SPIN>', 'COMBO! 10000'];
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.8;
    ctx.fillText(labels[comboStage], GW / 2, 38);
    ctx.globalAlpha = 1;
  }

  // Reactor target progress
  ctx.textAlign = 'left';
  ctx.fillStyle = '#aa44ff';
  ctx.font = '7px monospace';
  ctx.fillText('REACTOR: ' + reactorLit + '/3', 5, GH - 5);

  // Zone completion status
  ctx.textAlign = 'right';
  ctx.font = '6px monospace';
  ctx.fillStyle = zoneLit[0] ? '#ff44aa' : '#442233';
  ctx.fillText('SC', GW - 30, GH - 5);
  ctx.fillStyle = zoneLit[1] ? '#44ffaa' : '#224433';
  ctx.fillText('MN', GW - 18, GH - 5);
  ctx.fillStyle = zoneLit[2] ? '#4488ff' : '#223344';
  ctx.fillText('UD', GW - 6, GH - 5);

  // Stat bar (tiny, bottom-right) showing active stat bonuses
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = '5px monospace';
    ctx.textAlign = 'right';
    ctx.globalAlpha = 0.5;
    ctx.fillText('Lv' + statB.level, GW - 5, GH - 14);
    ctx.globalAlpha = 1;
  }
}

function drawGuideWalls() {
  // Left guide wall
  ctx.strokeStyle = '#556';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT, 380);
  ctx.lineTo(70, 420);
  ctx.stroke();
  // Right guide wall
  ctx.beginPath();
  ctx.moveTo(TABLE_RIGHT - 16, 380);
  ctx.lineTo(250, 420);
  ctx.stroke();

  // Neon edge on guides
  ctx.strokeStyle = 'rgba(100, 100, 200, 0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(TABLE_LEFT, 380);
  ctx.lineTo(70, 420);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(TABLE_RIGHT - 16, 380);
  ctx.lineTo(250, 420);
  ctx.stroke();
}

function drawRails() {
  ctx.strokeStyle = 'rgba(100, 200, 150, 0.25)';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 5]);
  for (var i = 0; i < rails.length; i++) {
    var r = rails[i];
    ctx.beginPath();
    ctx.moveTo(r.x1, r.y1);
    ctx.quadraticCurveTo(r.x2, r.y2, r.x3, r.y3);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawLauncherBall() {
  if (!ballInLauncher) return;
  var bx = TABLE_RIGHT - 8;
  var by = TABLE_BOTTOM - 55 + plungerPull * 30;

  ctx.save();
  ctx.shadowColor = '#88bbff';
  ctx.shadowBlur = 6;
  var ballGrad = ctx.createRadialGradient(bx - 2, by - 2, 0, bx, by, BALL_RADIUS);
  ballGrad.addColorStop(0, '#ffffff');
  ballGrad.addColorStop(0.4, '#ccddff');
  ballGrad.addColorStop(1, '#6688aa');
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(bx, by, BALL_RADIUS, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawTutorial() {
  if (!showTutorial || tutorialTimer <= 0) return;

  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';

  var tutMessages = [
    { text: 'HOLD SPACE to pull plunger', sub: 'Release to launch!', y: TABLE_BOTTOM - 90, highlight: { x: TABLE_RIGHT - 8, y: TABLE_BOTTOM - 40, r: 20 } },
    { text: 'Z or LEFT = Left Flipper', sub: 'X or RIGHT = Right Flipper', y: 420, highlight: { x: 160, y: 430, r: 80 } },
    { text: 'Hit all 3 REACTOR targets', sub: 'for SPORE MULTIBALL!', y: 260, highlight: { x: 160, y: 280, r: 70 } },
    { text: 'Arrow keys = NUDGE the table', sub: 'But watch the TILT meter!', y: GH / 2, highlight: null }
  ];

  if (tutorialStep < tutMessages.length) {
    var msg = tutMessages[tutorialStep];

    // Darken except highlight area
    ctx.fillRect(0, 0, GW, GH);
    if (msg.highlight) {
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(msg.highlight.x, msg.highlight.y, msg.highlight.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Ring around highlight
      ctx.strokeStyle = '#ffff44';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(msg.highlight.x, msg.highlight.y, msg.highlight.r + 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Tutorial text
    ctx.fillStyle = '#ffff44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(msg.text, GW / 2, msg.y);
    ctx.fillStyle = '#aaa';
    ctx.font = '8px monospace';
    ctx.fillText(msg.sub, GW / 2, msg.y + 14);

    // Step counter
    ctx.fillStyle = '#666';
    ctx.font = '7px monospace';
    ctx.fillText((tutorialStep + 1) + '/4', GW / 2, msg.y + 30);
  }
  ctx.restore();
}

function drawTitle() {
  // Animated background
  ctx.fillStyle = '#0a0520';
  ctx.fillRect(0, 0, GW, GH);

  // Floating spores
  for (var i = 0; i < 30; i++) {
    var sx = (i * 47 + frame * 0.5) % GW;
    var sy = (i * 31 + frame * 0.3 + Math.sin(frame * 0.02 + i) * 20) % GH;
    var alpha = 0.2 + Math.sin(frame * 0.03 + i) * 0.15;
    ctx.fillStyle = 'rgba(150, 80, 255, ' + alpha + ')';
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + Math.sin(frame * 0.04 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.save();
  ctx.shadowColor = '#aa44ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#aa44ff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('TASERN', GW / 2, 120);
  ctx.shadowColor = '#44ffaa';
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('PINBALL', GW / 2, 155);
  ctx.shadowBlur = 0;
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#886';
  ctx.font = '10px monospace';
  ctx.fillText('Reactor-Powered Fungal Table', GW / 2, 180);

  // Baseling info
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = 'bold 9px monospace';
    ctx.fillText(statB.icon + ' ' + statB.name + ' (Lv' + statB.level + ')', GW / 2, 200);
  }

  // Controls - NES style
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Z / LEFT = Left Flipper', GW / 2, 225);
  ctx.fillText('X / RIGHT = Right Flipper', GW / 2, 240);
  ctx.fillText('ARROWS = Nudge Table', GW / 2, 255);
  ctx.fillText('SPACE = Launch Ball', GW / 2, 270);

  // Stat bonuses display
  if (statB.level > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '7px monospace';
    var statY = 295;
    if (STR_MOD > 0) { ctx.fillText('STR +' + STR_MOD + ': Flipper Power', GW / 2, statY); statY += 12; }
    if (DEX_MOD > 0) { ctx.fillText('DEX +' + DEX_MOD + ': Flip Speed & Nudge', GW / 2, statY); statY += 12; }
    if (CON_MOD > 0) { ctx.fillText('CON +' + CON_MOD + ': ' + BASE_BALLS + ' Balls', GW / 2, statY); statY += 12; }
    if (INT_MOD > 0) { ctx.fillText('INT +' + INT_MOD + ': Score x' + SCORE_MULT.toFixed(1), GW / 2, statY); statY += 12; }
    if (WIS_MOD > 0) { ctx.fillText('WIS +' + WIS_MOD + ': ' + BALL_SAVE_TIME.toFixed(1) + 's Save', GW / 2, statY); statY += 12; }
    if (CHA_MOD > 0) { ctx.fillText('CHA +' + CHA_MOD + ': ' + Math.floor(LUCK_CHANCE * 100) + '% Luck', GW / 2, statY); statY += 12; }
  }

  // Features
  ctx.fillStyle = '#ff44aa';
  ctx.font = '9px monospace';
  ctx.fillText('3 Spore Bumpers', GW / 2, 340);
  ctx.fillStyle = '#44ffaa';
  ctx.fillText('Reactor Multiball', GW / 2, 355);
  ctx.fillStyle = '#ffaa44';
  ctx.fillText('Ramp Combos & Skill Shots', GW / 2, 370);
  ctx.fillStyle = '#4488ff';
  ctx.fillText('3 Table Zones', GW / 2, 385);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore.toLocaleString(), GW / 2, 410);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 445);
  ctx.globalAlpha = 1;
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GAME OVER', GW / 2, 100);

  // Baseling icon
  if (statB.level > 0) {
    ctx.fillStyle = statB.color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(statB.icon + ' ' + statB.name, GW / 2, 130);
  }

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + score.toLocaleString(), GW / 2, 165);

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 190);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('BEST: ' + highScore.toLocaleString(), GW / 2, 190);
  }

  // Stats
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  var sy = 220;
  ctx.fillText('Multiplier reached: ' + multiplier + 'x', GW / 2, sy); sy += 15;
  ctx.fillText('Multiballs: ' + multiballCount, GW / 2, sy); sy += 15;
  ctx.fillText('Bumper Hits: ' + totalBumperHits, GW / 2, sy); sy += 15;
  ctx.fillText('Ramp Shots: ' + totalRampShots, GW / 2, sy); sy += 15;
  ctx.fillText('Spinner Hits: ' + totalSpins, GW / 2, sy); sy += 15;
  if (luckyBonusCount > 0) {
    ctx.fillStyle = '#ffff44';
    ctx.fillText('Lucky Bonuses: ' + luckyBonusCount, GW / 2, sy); sy += 15;
  }

  // Zone completion
  ctx.font = '8px monospace';
  sy += 5;
  ctx.fillStyle = zoneLit[0] ? '#ff44aa' : '#553333';
  ctx.fillText('Spore Canopy: ' + (zoneLit[0] ? 'COMPLETE' : 'incomplete'), GW / 2, sy); sy += 12;
  ctx.fillStyle = zoneLit[1] ? '#44ffaa' : '#335533';
  ctx.fillText('Mycelium Net: ' + (zoneLit[1] ? 'COMPLETE' : 'incomplete'), GW / 2, sy); sy += 12;
  ctx.fillStyle = zoneLit[2] ? '#4488ff' : '#333355';
  ctx.fillText('Underdark: ' + (zoneLit[2] ? 'COMPLETE' : 'incomplete'), GW / 2, sy); sy += 12;

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, 420);
  ctx.globalAlpha = 1;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#080410';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // Playing state
  ctx.save();
  TAS.fx.applyShake();

  // Additional shake from triggerShake
  if (shakeIntensity > 0) {
    var sx = (Math.random() - 0.5) * shakeIntensity * 2;
    var sy = (Math.random() - 0.5) * shakeIntensity * 2;
    ctx.translate(sx, sy);
  }

  drawTable();
  drawRails();
  drawOutlanes();
  drawGuideWalls();
  drawRollovers();
  drawDropTargets();
  drawSpinner();
  drawRamp();
  drawReactorTargets();
  drawReactor();
  drawKickers();
  drawPosts();
  drawFlippers();
  drawBalls();
  drawLauncherBall();
  drawPlunger();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawTutorial();
  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
