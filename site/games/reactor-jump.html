      drawPixelRect(-4, -4, 4, 4, hiCol);
      // Eye
      drawPixelRect(0, -4, 4, 3, '#fff');
      drawPixelRect(1, -3, 2, 2, '#111');
      // Feet
      if (P.grounded && Math.abs(P.vx) > 20) {
        var step2 = Math.sin(P.anim) * 2;
        drawPixelRect(-4 + step2, 3, 3, 3, '#333');
        drawPixelRect(1 - step2, 3, 3, 3, '#333');
      } else {
        drawPixelRect(-4, 3, 3, 3, '#333');
        drawPixelRect(1, 3, 3, 3, '#333');
      }
    }
  }

  // Fire hat
  if (P.fire) {
    var hatY = P.big ? -16 : -10;
    drawPixelRect(-3, hatY, 2, 4, '#ff4400');
    drawPixelRect(-1, hatY - 2, 2, 4, '#ff6600');
    drawPixelRect(1, hatY, 2, 4, '#ff4400');
    drawPixelRect(-1, hatY - 4, 2, 2, '#ffcc00');
  }

  // Stat icon (shows baseling identity)
  if (statB.icon && statB.icon !== 'B') {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, P.big ? -16 : -10);
  }

  ctx.restore();
}

// ============================================================
//  DRAW HELPERS
// ============================================================
function drawStar(x, y, inner, outer) {
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a1 = (i * 72 - 90) * Math.PI / 180;
    var a2 = ((i * 72 + 36) - 90) * Math.PI / 180;
    ctx.lineTo(x + Math.cos(a1) * outer, y + Math.sin(a1) * outer);
    ctx.lineTo(x + Math.cos(a2) * inner, y + Math.sin(a2) * inner);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(26,28,44,0.9)';
  ctx.fillRect(0, 0, GW, 28);
  ctx.font = 'bold 10px monospace';

  // Score
  ctx.textAlign = 'left';
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('SCORE ' + score, 4, 12);

  // Coins (POOP tokens)
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('M x' + coins, 4, 24);

  // Zone + stage
  ctx.textAlign = 'center';
  ctx.fillStyle = THEMES[(world - 1) % 8].accent;
  ctx.fillText(THEMES[(world - 1) % 8].name, GW / 2, 12);
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText(world + '-' + stage, GW / 2, 22);

  // Timer
  ctx.textAlign = 'right';
  ctx.fillStyle = timer < 50 ? '#ff4444' : '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('T:' + timer, GW - 60, 12);

  // Lives
  ctx.fillStyle = statB.color || '#44dd88';
  for (var i = 0; i < Math.min(lives, 8); i++) {
    drawPixelRect(GW - 10 - i * 14, 17, 8, 8, statB.color || '#44dd88');
    drawPixelRect(GW - 9 - i * 14, 18, 6, 6, '#fff');
  }
  if (lives > 8) {
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('x' + lives, GW - 4, 24);
  }

  // HP bar (if CON gives extra HP)
  if (P.maxHp > 1 && state === 'playing' && !P.dead) {
    ctx.fillStyle = 'rgba(26,28,44,0.7)';
    ctx.fillRect(GW / 2 - 40, 26, 80, 6);
    for (var hp = 0; hp < P.maxHp; hp++) {
      var hpX = GW / 2 - 38 + hp * (76 / P.maxHp);
      var hpW = 76 / P.maxHp - 2;
      ctx.fillStyle = hp < P.hp ? '#38d973' : '#333';
      ctx.fillRect(hpX, 27, hpW, 4);
    }
  }

  // Combo display
  if (comboCount >= 2 && comboTimer > 0) {
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMBO x' + comboCount, GW / 2, 42);
    ctx.globalAlpha = 1;
  }

  // Stat indicator (small, bottom-left)
  if (statB.level > 0) {
    ctx.fillStyle = 'rgba(26,28,44,0.7)';
    ctx.fillRect(0, GH - 18, 90, 18);
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(statB.name + ' Lv' + statB.level, 4, GH - 6);
  }
}

// ============================================================
//  TUTORIAL OVERLAY
// ============================================================
function drawTutorial() {
  ctx.fillStyle = 'rgba(26,28,44,0.75)';
  ctx.fillRect(0, GH - 50, GW, 50);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';

  var msgs = [
    'Guide your baseling! ARROWS/WASD + SPACE/K to jump',
    'X/Z/J to launch spores | SHIFT/L to sprint',
    'Stomp fungi from above! Sniff out secret spore caches!'
  ];
  var msg = msgs[Math.min(tutorialStep, msgs.length - 1)];
  ctx.fillText(msg, GW / 2, GH - 30);

  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('Tutorial ' + (tutorialStep + 1) + '/3', GW / 2, GH - 14);
}

// ============================================================
//  TITLE SCREEN
// ============================================================
function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Pixel ground
  for (var i = 0; i < 30; i++) {
    drawPixelRect((i * 16) % GW, GH - 32, 16, 16, '#7a444a');
    drawPixelRect((i * 16) % GW, GH - 32, 16, 2, 'rgba(255,255,255,0.1)');
    if (i % 2 === 0) drawPixelRect((i * 16) % GW, GH - 16, 16, 16, '#5c3535');
  }

  // Background mushroom silhouettes
  ctx.fillStyle = 'rgba(56,217,115,0.08)';
  for (var ms = 0; ms < 4; ms++) {
    ctx.beginPath();
    ctx.arc(80 + ms * 110, GH - 55, 25, Math.PI, 0);
    ctx.fillRect(73 + ms * 110, GH - 55, 14, 25);
    ctx.fill();
  }

  ctx.textAlign = 'center';

  // Title — pixel-style
  ctx.fillStyle = '#000';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('REACTOR JUMP', GW / 2 + 2, 62);
  ctx.fillStyle = '#38d973';
  ctx.fillText('REACTOR JUMP', GW / 2, 60);

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('A Baseling Adventure in Tasern', GW / 2, 78);

  // Selected baseling mascot (idle bob) — fallback to the procedural pixel mascot.
  if (!TAS.drawBaseling(ctx, GW / 2, 128, 40, { anim: 'idle', frame: frame })) {
    ctx.save();
    ctx.translate(GW / 2, 130);
    var bounce = Math.sin(frame * 0.04) * 4;
    ctx.translate(0, bounce);
    drawPixelRect(-12, -10, 24, 18, statB.color || '#44aaff');
    drawPixelRect(-10, -14, 20, 8, '#88ccff');
    drawPixelRect(-8, -16, 16, 4, '#aaddff');
    drawPixelRect(-8, -8, 8, 6, '#88ccff');
    drawPixelRect(2, -6, 6, 6, '#fff');
    drawPixelRect(4, -4, 3, 3, '#111');
    drawPixelRect(-10, 8, 6, 6, '#333');
    drawPixelRect(4, 8, 6, 6, '#333');
    ctx.restore();
  }

  // Baseling name (Base-blue accent) + arcade stat bars
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 11px monospace';
  ctx.fillText((_sel ? _sel.charName : (statB.name || 'Baseling')) + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 158);
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    var _sx = GW / 2 - 110;
    ctx.textAlign = 'left';
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k];
      var _bx = _sx + _i * 46;
      ctx.fillStyle = _mm.color;
      ctx.fillText(_mm.label, _bx, 172);
      ctx.fillStyle = '#222';
      ctx.fillRect(_bx, 175, 38, 5);
      ctx.fillStyle = _mm.color;
      ctx.fillRect(_bx, 175, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }

  // Progress
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Progress: ' + THEMES[Math.min(worldProgress.w - 1, 7)].name + ' ' + worldProgress.w + '-' + worldProgress.s, GW / 2, 198);
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('High Score: ' + highScore, GW / 2, 215);
  }

  // Controls
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS/WASD = Move | SPACE/UP/K = Jump', GW / 2, 240);
  ctx.fillText('X/Z/J = Fire | SHIFT/L = Run', GW / 2, 254);

  // Pulsing start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 42);
  ctx.globalAlpha = 1;

  // Select-baseling prompt (Base-blue)
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 24);
}

// ============================================================
//  VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Particle celebration in background
  if (frame % 8 === 0) {
    var rx = Math.random() * GW;
    var celebColors = ['#f4b41b', '#38d973', '#a855f7', '#3cacd7'];
    TAS.particles.spawn(rx, GH, celebColors[Math.floor(Math.random() * 4)], 3, 2, { gravity: -3 });
  }
  TAS.particles.update(0.016);
  TAS.particles.draw();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('Your baseling conquered all 8 spore towers!', GW / 2, 90);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 130);

  if (score >= highScore && score > 0) {
    var p = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = p;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 155);
    ctx.globalAlpha = 1;
  }

  // Stat breakdown
  ctx.fillStyle = '#a855f7';
  ctx.font = '9px monospace';
  if (statB.level > 0) {
    ctx.fillText(statB.name + ' Lv' + statB.level + ' conquered the reactor network!', GW / 2, 180);
  }

  // Celebrating pixel baseling
  ctx.save();
  ctx.translate(GW / 2, 220);
  ctx.translate(0, -Math.abs(Math.sin(frame * 0.06)) * 10);
  drawPixelRect(-10, -8, 20, 14, statB.color || '#44aaff');
  drawPixelRect(-8, -12, 16, 6, '#88ccff');
  drawPixelRect(2, -6, 5, 4, '#fff');
  drawPixelRect(3, -5, 3, 2, '#111');
  drawPixelRect(-8, 6, 5, 5, '#333');
  drawPixelRect(3, 6, 5, 5, '#333');
  // Crown
  ctx.fillStyle = '#ffdd00';
  drawStar(0, -22, 4, 8);
  ctx.restore();

  var p2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = p2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// ============================================================
//  START GAME LOOP
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
