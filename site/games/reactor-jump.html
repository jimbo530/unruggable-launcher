<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reactor Jump</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// ============================================================
//  BASELING STATS (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Single source of stat math: TAS.player.mults() -> {moveSpeed,health,damage,luck,swim}
// clamped to the single-player band (0.8–1.6). This is a platformer with water
// sections, so all five stats apply (genre cheat-sheet: Platformer + SWM for swimming):
//   moveSpeed -> run speed / jump height / accel / coyote (capped so 1.6x can't clip geometry)
//   health    -> slower fall, more lives, more level time (survivability)
//   damage    -> stomp bounce / knockback / fireball power
//   luck      -> coin/drop chance + coin-sense radius
//   swim      -> swim jump strength in WATER only
// statB is kept (some draw code reads statB.color/icon) but its numeric stats no longer
// drive gameplay — getMults() does. recomputeStats() reassigns the tuned constants and
// is called again after the player picks a baseling on the title screen.
var statB = { color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[reactor-jump] NftLoader display info failed:', e && e.message); }

// ============================================================
//  INIT
// ============================================================
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'FIRE', c: 'PICK' } });

// ============================================================
//  CONSTANTS (stat-modified). Fixed base values are tuned for a neutral 1.0x baseling;
//  the mults nudge them within the clamp band. Declared here, (re)assigned by
//  recomputeStats() so a title-screen character change takes effect immediately.
// ============================================================
var TILE = 16;
var COLS = 60;
var ROWS = 20;
var GRAVITY = 1400;
var RUN_DECEL = 800;
var SWIM_GRAVITY = 300;
// Stat-driven constants (assigned in recomputeStats):
var JUMP_VEL, JUMP_HOLD_VEL, MAX_FALL, RUN_ACCEL, MAX_SPEED, MAX_RUN_SPEED,
    COYOTE_TIME, JUMP_BUFFER, SWIM_JUMP, ICE_DECEL, TIMER_START, BASE_DAMAGE,
    FIREBALL_MAX, FIREBALL_SPEED, FIREBALL_COOLDOWN, STOMP_VEL, KNOCKBACK,
    COIN_SENSE_RANGE, SCORE_MULT, DROP_LUCK, EXTRA_LIVES;
// Small integer "mods" (0–4) derived from the bounded multipliers, kept so the few
// places that add a discrete bonus (extra HP, bonus coins/secrets) still read cleanly.
// Each maps to one mult: a mult of 0.8 -> 0, 1.0 -> 1, 1.2 -> 2, 1.6 -> 4.
var STR_MOD, DEX_MOD, CON_MOD, INT_MOD, WIS_MOD, CHA_MOD;
function modFromMult(x) { return Math.max(0, Math.round((x - 0.8) * 5)); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  STR_MOD = modFromMult(m.damage);     // offense (damage/knockback/bump)
  DEX_MOD = modFromMult(m.moveSpeed);  // agility (speed/coyote)
  CON_MOD = modFromMult(m.health);     // toughness (HP/lives/invuln)
  INT_MOD = modFromMult(m.damage);     // fireball/star (offense flavor)
  WIS_MOD = modFromMult(m.luck);       // coin spawns / secrets
  CHA_MOD = modFromMult(m.luck);       // drops / charm
  // Jump height scales with moveSpeed but is CAPPED at 1.25x so 1.6x speed can't
  // overshoot level geometry (per ARCADE-STATS "cap derived values where physics demands").
  var jumpScale = Math.min(1.25, m.moveSpeed);
  JUMP_VEL          = -380 * jumpScale;
  JUMP_HOLD_VEL     = -440 * jumpScale;
  MAX_FALL          = 500 / m.health;             // STA: soak fall -> slower terminal velocity
  RUN_ACCEL         = 600 * m.moveSpeed;
  MAX_SPEED         = 160 * m.moveSpeed;
  MAX_RUN_SPEED     = 220 * m.moveSpeed;
  COYOTE_TIME       = 0.08 * m.moveSpeed;
  JUMP_BUFFER       = 0.1;
  SWIM_JUMP         = -180 * m.swim;              // SWM: swim jump strength (water only)
  ICE_DECEL         = 200 * m.moveSpeed;
  TIMER_START       = Math.round(300 * m.health); // STA: more time on the clock
  BASE_DAMAGE       = 1 * m.damage;
  FIREBALL_MAX      = 2;
  FIREBALL_SPEED    = 250 * m.damage;
  FIREBALL_COOLDOWN = 0.3 / m.moveSpeed;          // SPD: faster fireball cadence
  STOMP_VEL         = -250 * m.damage;
  KNOCKBACK         = 200 * m.damage;
  COIN_SENSE_RANGE  = Math.round(24 * (m.luck - 0.8)); // LCK: coin glow radius (0 at floor)
  SCORE_MULT        = 1;                           // score is not a stat in the new system
  DROP_LUCK         = m.luck;
  EXTRA_LIVES       = m.health > 1.3 ? 1 : 0;      // STA buys a cushion life
}
recomputeStats();

var picking = false; // baseling character-select overlay open

// Initialize the shared player module at boot (silent — no wallet popup).
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[reactor-jump] player init failed:', e && e.message); });
}

// ============================================================
//  TASERN ZONE THEMES
// ============================================================
var THEMES = [
  { name: 'Myco Forest',    sky: '#1a1c2c', ground: '#7a444a', brick: '#5c3535', pipe: '#38d973', bg: '#12131f',
    accent: '#38d973', hazard: '#88ff44', desc: 'The fungal nursery where baselings first sprout' },
  { name: 'Spore Cavern',   sky: '#1a1c2c', ground: '#4a2d55', brick: '#5c3d6e', pipe: '#a855f7', bg: '#13101f',
    accent: '#a855f7', hazard: '#d066ff', desc: 'Deep spore tunnels beneath the gardens' },
  { name: 'Sky Canopy',     sky: '#2a3a52', ground: '#7a9a56', brick: '#8aaa7a', pipe: '#3cacd7', bg: '#1f2d42',
    accent: '#3cacd7', hazard: '#f4b41b', desc: 'Above the canopy where yield flowers bloom' },
  { name: 'Crystal Depths',  sky: '#1a1c2c', ground: '#2a3555', brick: '#3a4577', pipe: '#3cacd7', bg: '#0f1228',
    accent: '#3cacd7', hazard: '#00ddff', desc: 'Crystalline pools where POOP tokens calcify' },
  { name: 'Frost Root',     sky: '#8a99aa', ground: '#aabbcc', brick: '#bbccdd', pipe: '#3cacd7', bg: '#7a8899',
    accent: '#ccffff', hazard: '#a855f7', desc: 'Frozen garden beds of dormant baselings' },
  { name: 'Lava Forge',     sky: '#1a1c2c', ground: '#7a2a0a', brick: '#8a3310', pipe: '#7a444a', bg: '#1a0c08',
    accent: '#e6482e', hazard: '#e6482e', desc: 'The reactor core where POOP fuels the burn' },
  { name: 'Deep Root',      sky: '#1a1c2c', ground: '#4a3020', brick: '#5a4030', pipe: '#7a444a', bg: '#140e08',
    accent: '#f4b41b', hazard: '#e6482e', desc: 'Ancient mycelium roots older than Tasern' },
  { name: 'Final Reactor',  sky: '#1a1c2c', ground: '#2a2a2a', brick: '#3a3a3a', pipe: '#38d973', bg: '#0a0818',
    accent: '#38d973', hazard: '#e6482e', desc: 'The heart of the reactor network awaits your baseling' }
];

// ============================================================
//  TILE TYPES
// ============================================================
var T = {
  AIR: 0, GROUND: 1, BRICK: 2, QBLOCK: 3, QBLOCK_EMPTY: 4,
  PIPE_TL: 5, PIPE_TR: 6, PIPE_BL: 7, PIPE_BR: 8,
  COIN: 9, SPRING: 10, VINE: 11, FLAG_POLE: 12, FLAG_TOP: 13,
  ONEWAY: 14, LAVA: 15, WATER: 16, SPORE: 17, ACID: 18,
  SECRET: 19, MOSS: 20
};

// ============================================================
//  GAME STATE
// ============================================================
var state = 'title';
var score = 0;
var highScore = TAS.score.load('reactor_jump_hi');
var lives = 3 + EXTRA_LIVES;                      // CON: bonus lives
var coins = 0;
var world = 1;
var stage = 1;
var frame = 0;
var timer = TIMER_START;
var timerAcc = 0;
var levelComplete = false;
var levelCompleteTimer = 0;
var deathTimer = 0;
var invincTimer = 0;
var starTimer = 0;
var fireballCooldown = 0;
var comboCount = 0;
var comboTimer = 0;
var secretsFound = 0;
var totalSecrets = 0;
var showTutorial = !localStorage.getItem('rj_tut_seen');
var tutorialStep = 0;
var tutorialTimer = 0;

var tiles = [];
var enemies = [];
var fireballs = [];
var items = [];
var effects = [];
var popups = [];
var camX = 0;
var screenShake = { x: 0, y: 0, intensity: 0, decay: 0.9 };

var P = {
  x: 40, y: 0, vx: 0, vy: 0, w: 14, h: 14,
  big: false, fire: false, star: false,
  dir: 1, grounded: false, coyote: 0, jumpBuffer: 0,
  dead: false, anim: 0, swimming: false,
  hp: 1 + Math.floor(CON_MOD / 2),                // CON: extra HP
  maxHp: 1 + Math.floor(CON_MOD / 2),
  invulnFlash: 0
};

var prevJump = false;
var prevFire = false;

// ============================================================
//  PROGRESS
// ============================================================
var worldProgress = loadProgress();

function loadProgress() {
  try { return JSON.parse(localStorage.getItem('reactor_jump_progress') || '{"w":1,"s":1}'); }
  catch(e) { console.error('Progress load failed:', e); return { w: 1, s: 1 }; }
}

function saveProgress() {
  try {
    if (world > worldProgress.w || (world === worldProgress.w && stage > worldProgress.s)) {
      worldProgress = { w: world, s: stage };
    }
    localStorage.setItem('reactor_jump_progress', JSON.stringify(worldProgress));
  } catch(e) { console.error('Save failed:', e); }
}

// ============================================================
//  POPUP SYSTEM (floating score text)
// ============================================================
function addPopup(x, y, text, color, scale) {
  popups.push({
    x: x, y: y, text: String(text), color: color || '#f4b41b',
    life: 1.2, maxLife: 1.2, scale: scale || 1, vy: -60
  });
}

function updatePopups(dt) {
  for (var i = popups.length - 1; i >= 0; i--) {
    var p = popups[i];
    p.life -= dt;
    p.y += p.vy * dt;
    p.vy *= 0.95;
    if (p.life <= 0) popups.splice(i, 1);
  }
}

function drawPopups() {
  for (var i = 0; i < popups.length; i++) {
    var p = popups[i];
    var alpha = Math.min(1, p.life / (p.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold ' + Math.floor(10 * p.scale) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
//  SCREEN SHAKE
// ============================================================
function triggerShake(intensity) {
  screenShake.intensity = Math.max(screenShake.intensity, intensity);
}

function updateShake(dt) {
  if (screenShake.intensity > 0.1) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0;
    screenShake.y = 0;
    screenShake.intensity = 0;
  }
}

// ============================================================
//  PARTICLE HELPERS
// ============================================================
function spawnImpactParticles(x, y, color, count) {
  TAS.particles.spawn(x, y, color, count || 6, 3, { gravity: 4 });
}

function spawnSporeParticles(x, y) {
  TAS.particles.spawn(x, y, '#38d973', 4, 1.5, { gravity: -1 });
}

function spawnCrystalParticles(x, y) {
  TAS.particles.spawn(x, y, '#3cacd7', 5, 2, { gravity: 2 });
}

function spawnFireParticles(x, y) {
  TAS.particles.spawn(x, y, '#e6482e', 3, 1.5, { gravity: -2 });
}

// ============================================================
//  LEVEL GENERATION
// ============================================================
function generateLevel(w, s) {
  tiles = [];
  enemies = [];
  fireballs = [];
  items = [];
  effects = [];
  popups = [];
  secretsFound = 0;
  totalSecrets = 0;

  var seed = w * 100 + s;
  var rng = seed;
  function rand() {
    rng = (rng * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (rng >>> 0) / 4294967296;
  }

  // Init air
  for (var y = 0; y < ROWS; y++) {
    tiles[y] = [];
    for (var x = 0; x < COLS; x++) tiles[y][x] = T.AIR;
  }

  var isWater = (w === 4);
  var isLava = (w === 6);
  var isCavern = (w === 2);
  var isFrost = (w === 5);
  var groundY = ROWS - 2;

  // Ground with occasional gaps
  for (var x = 0; x < COLS; x++) {
    if (w > 1 && !isWater && x > 8 && x < COLS - 10 && rand() < 0.06) {
      x += 1 + Math.floor(rand() * 2);
      continue;
    }
    tiles[groundY][x] = T.GROUND;
    tiles[groundY + 1][x] = T.GROUND;

    // Zone-specific ground hazards
    if (isLava && x > 5 && x < COLS - 5 && rand() < 0.04) {
      tiles[groundY][x] = T.LAVA;
      tiles[groundY + 1][x] = T.LAVA;
    }
    if (isCavern && x > 5 && x < COLS - 5 && rand() < 0.03) {
      tiles[groundY][x] = T.ACID;
      tiles[groundY + 1][x] = T.ACID;
    }

    // Moss on frost world ground
    if (isFrost && rand() < 0.1 && tiles[groundY - 1] !== undefined) {
      tiles[groundY - 1][x] = T.MOSS;
    }
  }

  // Water fill
  if (isWater) {
    for (var y2 = 6; y2 < groundY; y2++)
      for (var x2 = 0; x2 < COLS; x2++) tiles[y2][x2] = T.WATER;
  }

  // Spore clouds in cavern
  if (isCavern) {
    for (var x3 = 8; x3 < COLS - 8; x3++) {
      if (rand() < 0.03) {
        var sy = groundY - 3 - Math.floor(rand() * 4);
        if (sy > 2 && tiles[sy][x3] === T.AIR) tiles[sy][x3] = T.SPORE;
      }
    }
  }

  // Platforms and blocks
  for (var x4 = 5; x4 < COLS - 8; x4++) {
    if (rand() < 0.08) {
      var py = groundY - 4 - Math.floor(rand() * 4);
      var len = 2 + Math.floor(rand() * 5);
      for (var i = 0; i < len && x4 + i < COLS - 5; i++) {
        if (py > 2 && py < groundY - 1) {
          tiles[py][x4 + i] = rand() < 0.3 ? T.QBLOCK : T.BRICK;
        }
      }
      x4 += len;
    } else if (rand() < 0.04) {
      var py2 = groundY - 4 - Math.floor(rand() * 3);
      if (py2 > 2 && py2 < groundY - 1) tiles[py2][x4] = T.QBLOCK;
    } else if (rand() < 0.03 && w !== 3) {
      // Pipe
      var pH2 = 2 + Math.floor(rand() * 2);
      var py3 = groundY - pH2;
      if (py3 > 3) {
        tiles[py3][x4] = T.PIPE_TL;
        tiles[py3][x4 + 1] = T.PIPE_TR;
        for (var j = 1; j < pH2; j++) {
          tiles[py3 + j][x4] = T.PIPE_BL;
          tiles[py3 + j][x4 + 1] = T.PIPE_BR;
        }
        if (rand() < 0.4 && w > 1) {
          enemies.push({ type: 'spore_mouth', x: x4 * TILE + 4, y: py3 * TILE, baseY: py3 * TILE, timer: 0, phase: 0 });
        }
        x4 += 2;
      }
    } else if (rand() < 0.02 && w === 3) {
      // One-way platforms for Sky Canopy
      var py4 = groundY - 5 - Math.floor(rand() * 5);
      var len2 = 3 + Math.floor(rand() * 4);
      for (var k = 0; k < len2 && x4 + k < COLS - 5; k++) {
        if (py4 > 1) tiles[py4][x4 + k] = T.ONEWAY;
      }
      x4 += len2;
    } else if (rand() < 0.01) {
      tiles[groundY - 1][x4] = T.SPRING;
    }
  }

  // Secret blocks (WIS reveals them with glow)
  for (var x5 = 10; x5 < COLS - 10; x5++) {
    if (rand() < 0.015) {
      var sy2 = groundY - 5 - Math.floor(rand() * 4);
      if (sy2 > 2 && tiles[sy2][x5] === T.AIR) {
        tiles[sy2][x5] = T.SECRET;
        totalSecrets++;
      }
    }
  }

  // Scatter coins
  for (var x6 = 6; x6 < COLS - 6; x6++) {
    if (rand() < 0.06 + WIS_MOD * 0.005) {        // WIS: more coins spawn
      var cy = groundY - 3 - Math.floor(rand() * 5);
      if (cy > 2 && tiles[cy][x6] === T.AIR) tiles[cy][x6] = T.COIN;
    }
  }

  // Flagpole at end
  var flagX = COLS - 4;
  tiles[groundY - 9][flagX] = T.FLAG_TOP;
  for (var y3 = groundY - 8; y3 < groundY; y3++) tiles[y3][flagX] = T.FLAG_POLE;

  // ENEMIES — Tasern themed
  for (var x7 = 10; x7 < COLS - 10; x7++) {
    if (rand() < 0.04) {
      var ey = findGround(x7) * TILE - TILE;
      if (ey > 0 && ey < (ROWS - 3) * TILE) {
        var r = rand();
        if (r < 0.35) {
          // Spore Crawler — basic ground enemy
          enemies.push({ type: 'spore_crawler', x: x7 * TILE, y: ey, vx: -30 - w * 3, vy: 0, alive: true, w: 14, h: 14, hp: 1 });
        } else if (r < 0.55) {
          // Myco Shell — turtle-like, retreats into shell
          enemies.push({ type: 'myco_shell', x: x7 * TILE, y: ey, vx: -25 - w * 2, vy: 0, alive: true, shell: false, w: 14, h: 22, shellVx: 0, hp: 1 });
        } else if (r < 0.7 && w > 2) {
          // Reactor Bat — flying enemy
          enemies.push({ type: 'reactor_bat', x: x7 * TILE, y: ey - 30, vx: -40 - w * 3, vy: 0, alive: true, w: 14, h: 14, baseY: ey - 30, flyTimer: rand() * 6, hp: 1 });
        } else if (r < 0.8 && w > 3) {
          // Myco Lobber — throws spore bombs
          enemies.push({ type: 'myco_lobber', x: x7 * TILE, y: ey, vx: 0, vy: 0, alive: true, w: 14, h: 22, throwTimer: 0, dir: -1, hp: 2 });
        } else if (r < 0.88 && w > 4) {
          // Crystal Sentry — stationary shooter
          enemies.push({ type: 'crystal_sentry', x: x7 * TILE, y: ey - TILE, alive: true, w: 16, h: 16, fireTimer: 2 + rand() * 3, hp: 2 });
        } else if (w > 5) {
          // Reactor Golem — heavy enemy
          enemies.push({ type: 'reactor_golem', x: x7 * TILE, y: ey, vx: -15, vy: 0, alive: true, w: 18, h: 20, hp: 3, hitTimer: 0 });
        }
      }
    }
  }

  // Clear starting area
  for (var y4 = 0; y4 < ROWS; y4++)
    for (var x8 = 0; x8 < 4; x8++) {
      if (tiles[y4][x8] !== T.GROUND && tiles[y4][x8] !== T.WATER) tiles[y4][x8] = T.AIR;
    }
  tiles[groundY][0] = T.GROUND;
  tiles[groundY][1] = T.GROUND;
  tiles[groundY][2] = T.GROUND;
  tiles[groundY][3] = T.GROUND;
  tiles[groundY + 1][0] = T.GROUND;
  tiles[groundY + 1][1] = T.GROUND;

  // Ensure ground at flag
  for (var x9 = flagX - 2; x9 <= flagX + 2; x9++) {
    tiles[groundY][x9] = T.GROUND;
    tiles[groundY + 1][x9] = T.GROUND;
  }

  // Boss for world X-4
  if (s === 4) {
    enemies = enemies.filter(function(e) { return e.x < (COLS - 15) * TILE; });
    var bossX = (COLS - 10) * TILE;
    var bossY = findGround(COLS - 10) * TILE - 32;
    var bossHp = 5 + w * 2;
    if (w <= 2) {
      enemies.push({
        type: 'boss_myco_king', x: bossX, y: bossY, vx: 0, vy: 0, alive: true,
        w: 28, h: 32, hp: bossHp, dir: -1, attackTimer: 0, jumpTimer: 0, maxHp: bossHp, phase: 1
      });
    } else if (w <= 4) {
      enemies.push({
        type: 'boss_crystal_wyrm', x: bossX, y: bossY, vx: 0, vy: 0, alive: true,
        w: 32, h: 28, hp: bossHp, dir: -1, attackTimer: 0, dashTimer: 0, maxHp: bossHp, phase: 1
      });
    } else if (w <= 6) {
      enemies.push({
        type: 'boss_lava_golem', x: bossX, y: bossY, vx: 0, vy: 0, alive: true,
        w: 30, h: 34, hp: bossHp, dir: -1, attackTimer: 0, jumpTimer: 0, maxHp: bossHp, phase: 1, enraged: false
      });
    } else {
      enemies.push({
        type: 'boss_reactor_core', x: bossX, y: bossY, vx: 0, vy: 0, alive: true,
        w: 32, h: 32, hp: bossHp + 5, dir: -1, attackTimer: 0, jumpTimer: 0, maxHp: bossHp + 5,
        phase: 1, shieldTimer: 0, shielded: false, spinAngle: 0
      });
    }
  }
}

function findGround(x) {
  for (var y = 0; y < ROWS; y++) {
    if (tiles[y][x] === T.GROUND) return y;
  }
  return ROWS - 2;
}

function isSolid(tx, ty) {
  if (tx < 0 || tx >= COLS || ty >= ROWS) return true;
  if (ty < 0) return false;
  var t = tiles[ty][tx];
  return t === T.GROUND || t === T.BRICK || t === T.QBLOCK || t === T.QBLOCK_EMPTY ||
         t === T.PIPE_TL || t === T.PIPE_TR || t === T.PIPE_BL || t === T.PIPE_BR;
}

function isOneWay(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return false;
  return tiles[ty][tx] === T.ONEWAY;
}

function isHazard(tx, ty) {
  if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) return false;
  var t = tiles[ty][tx];
  return t === T.LAVA || t === T.ACID;
}

// ============================================================
//  GAME FLOW
// ============================================================
function resetPlayer() {
  P.x = 40;
  P.y = (findGround(2) - 1) * TILE;
  P.vx = 0;
  P.vy = 0;
  P.grounded = false;
  P.coyote = 0;
  P.jumpBuffer = 0;
  P.dead = false;
  P.anim = 0;
  P.swimming = false;
  P.dir = 1;
  P.hp = P.maxHp;
  deathTimer = 0;
  invincTimer = 0;
  comboCount = 0;
  comboTimer = 0;
  fireballCooldown = 0;
}

function startGame() {
  state = 'playing';
  score = 0;
  coins = 0;
  lives = 3 + EXTRA_LIVES;
  world = 1;
  stage = 1;
  P.big = false;
  P.fire = false;
  P.star = false;
  starTimer = 0;
  loadLevel();
}

function loadLevel() {
  generateLevel(world, stage);
  resetPlayer();
  timer = TIMER_START;
  timerAcc = 0;
  levelComplete = false;
  levelCompleteTimer = 0;
  camX = 0;
  TAS.particles.clear();
}

function nextLevel() {
  stage++;
  if (stage > 4) { stage = 1; world++; }
  if (world > 8) {
    state = 'victory';
    if (score > highScore) { highScore = score; TAS.score.save('reactor_jump_hi', highScore); }
    saveProgress();
    return;
  }
  saveProgress();
  loadLevel();
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) { highScore = score; TAS.score.save('reactor_jump_hi', highScore); }
  } else {
    loadLevel();
  }
}

// ============================================================
//  COLLISION
// ============================================================
function collidesWorld(x, y, w, h, checkOneWay, oldY) {
  var left = Math.floor(x / TILE);
  var right = Math.floor((x + w - 1) / TILE);
  var top = Math.floor(y / TILE);
  var bottom = Math.floor((y + h - 1) / TILE);
  for (var ty = top; ty <= bottom; ty++) {
    for (var tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) return true;
      if (checkOneWay && isOneWay(tx, ty) && oldY + h <= ty * TILE + 2) return true;
    }
  }
  return false;
}

// ============================================================
//  INPUT — NES-style + keyboard + touch
// ============================================================
function leftHeld() {
  return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
}
function rightHeld() {
  return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
}
function jumpPressed() {
  return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] ||
         TAS.input.keys['KeyK'] ||  // NES A button
         TAS.input.touch.a || TAS.input.touch.up;
}
function firePressed() {
  return TAS.input.keys['KeyX'] || TAS.input.keys['KeyZ'] ||
         TAS.input.keys['KeyJ'] ||  // NES B button
         TAS.input.touch.b;
}
function runHeld() {
  return TAS.input.keys['ShiftLeft'] || TAS.input.keys['ShiftRight'] ||
         TAS.input.keys['KeyL'] ||   // NES Select = run
         TAS.input.touch.b;
}

// ============================================================
//  GAMEPLAY HELPERS
// ============================================================
function addScore(pts, x, y) {
  var final = Math.floor(pts * SCORE_MULT);        // CHA: score multiplier
  score += final;
  if (x !== undefined && y !== undefined) {
    addPopup(x, y, '+' + final, '#f4b41b', 1);
  }
  return final;
}

function collectCoin(x, y) {
  coins++;
  var pts = 200;

  // WIS bonus: chance for double coins
  if (WIS_MOD > 0 && Math.random() < WIS_MOD * 0.05) {
    coins++;
    pts = 400;
    addPopup(x, y - 10, 'DOUBLE POOP!', '#38d973', 1.2);
  }

  addScore(pts, x, y);
  if (coins >= 100) {
    coins -= 100;
    lives++;
    TAS.audio.playMelody([[880, 0.08], [1100, 0.12]], 80);
    addPopup(x, y - 20, '1UP!', '#38d973', 1.5);
  }
  TAS.particles.spawn(x, y, '#f4b41b', 5, 2);
  TAS.audio.playTone(988, 0.04, 'square', 0.04);
}

function applyPowerUp(type) {
  if (type === 'healing_shroom') {
    // Healing Shroom — restores HP
    if (P.hp < P.maxHp) {
      P.hp = Math.min(P.maxHp, P.hp + 1);
      addPopup(P.x, P.y - 10, 'GARDEN HEAL!', '#38d973', 1.2);
    }
    if (!P.big) {
      P.big = true;
      P.h = 28;
      P.y -= 14;
    }
    TAS.audio.playMelody([[440, 0.06], [554, 0.06], [659, 0.08]], 70);
  } else if (type === 'reactor_shard') {
    // Reactor Shard — fire power
    P.big = true;
    P.fire = true;
    P.h = 28;
    addPopup(P.x, P.y - 10, 'SPORE GEM!', '#e6482e', 1.3);
    TAS.audio.playMelody([[523, 0.06], [659, 0.06], [784, 0.06], [1047, 0.1]], 60);
  } else if (type === 'myco_bloom') {
    // Myco Bloom — star power
    P.star = true;
    starTimer = 8 + INT_MOD;                       // INT: longer star
    addPopup(P.x, P.y - 10, 'MYCO BLOOM!', '#f4b41b', 1.4);
    TAS.audio.playMelody([[660, 0.05], [880, 0.05], [1100, 0.05], [1320, 0.08]], 50);
  } else if (type === 'spore_shield') {
    // Spore Shield — temporary invincibility
    invincTimer = 4 + CON_MOD;                     // CON: longer shield
    addPopup(P.x, P.y - 10, 'SPORE SHIELD!', '#38d973', 1.2);
    TAS.audio.playMelody([[330, 0.06], [440, 0.06], [550, 0.08]], 70);
  }
  addScore(1000, P.x, P.y - 20);
}

function killPlayer() {
  if (invincTimer > 0 || P.star) return;

  // CON: take HP damage first
  if (P.hp > 1) {
    P.hp--;
    invincTimer = 1.5 + CON_MOD * 0.2;            // CON: longer invuln
    triggerShake(4);
    addPopup(P.x, P.y - 10, 'HIT!', '#ff4444', 1);
    TAS.audio.playTone(200, 0.15, 'square', 0.06, 100);
    return;
  }

  if (P.big) {
    P.big = false;
    P.fire = false;
    P.h = 14;
    P.hp = 1;
    invincTimer = 2;
    triggerShake(5);
    TAS.audio.playTone(200, 0.2, 'square', 0.06, 100);
    return;
  }
  P.dead = true;
  P.vy = -300;
  P.vx = 0;
  deathTimer = 0;
  triggerShake(8);
  TAS.audio.playMelody([[440, 0.1], [330, 0.1], [220, 0.15], [165, 0.2]], 120);
}

function killEnemy(idx) {
  var en = enemies[idx];
  en.alive = false;
  comboCount++;
  comboTimer = 1.5;

  // STR: bonus damage score, CHA: combo multiplier
  var pts = 100 * comboCount;
  addScore(pts, en.x + 7, en.y - 5);

  if (comboCount >= 3) {
    addPopup(en.x + 7, en.y - 20, 'COMBO x' + comboCount + '!', '#a855f7', 1.3);
  }

  var theme = THEMES[(world - 1) % 8];
  spawnImpactParticles(en.x + 7, en.y + 7, theme.accent, 6);
  TAS.audio.playTone(300 + comboCount * 50, 0.06, 'triangle', 0.05, 100);

  // CHA/luck: chance to drop item
  if (Math.random() < 0.08 * DROP_LUCK) {
    var dropR = Math.random();
    var dropType = dropR < 0.5 ? 'healing_shroom' : (dropR < 0.8 ? 'reactor_shard' : 'myco_bloom');
    items.push({ type: dropType, x: en.x, y: en.y - 16, vy: -120, vx: 0 });
    addPopup(en.x + 7, en.y - 15, 'GARDEN SEED!', '#38d973', 1.1);
  }
}

function bumpBlock(tx, ty) {
  if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return;
  var t = tiles[ty][tx];

  if (t === T.QBLOCK) {
    tiles[ty][tx] = T.QBLOCK_EMPTY;
    var r = Math.random() * DROP_LUCK;             // CHA: better drops
    if (r < 0.15 * DROP_LUCK) {
      items.push({ type: P.big ? 'reactor_shard' : 'healing_shroom', x: tx * TILE + 1, y: ty * TILE - 16, vy: -100, vx: 30 });
    } else if (r < 0.20 * DROP_LUCK) {
      items.push({ type: 'myco_bloom', x: tx * TILE + 1, y: ty * TILE - 16, vy: -100, vx: 30 });
    } else if (r < 0.25 * DROP_LUCK && CON_MOD > 0) {
      items.push({ type: 'spore_shield', x: tx * TILE + 1, y: ty * TILE - 16, vy: -100, vx: 30 });
    } else {
      collectCoin(tx * TILE + 8, ty * TILE - 8);
    }
    effects.push({ type: 'bump', x: tx * TILE, y: ty * TILE, timer: 0.2 });
    triggerShake(2);
    TAS.audio.playTone(523, 0.06, 'square', 0.05);
  } else if (t === T.SECRET) {
    // Secret block — WIS helps find these
    tiles[ty][tx] = T.QBLOCK_EMPTY;
    secretsFound++;
    addScore(2000, tx * TILE + 8, ty * TILE - 8);
    addPopup(tx * TILE + 8, ty * TILE - 15, 'SECRET SPORE!', '#f4b41b', 1.4);
    items.push({ type: 'myco_bloom', x: tx * TILE + 1, y: ty * TILE - 16, vy: -120, vx: 0 });
    triggerShake(3);
    spawnCrystalParticles(tx * TILE + 8, ty * TILE + 8);
    TAS.audio.playMelody([[660, 0.05], [880, 0.05], [1100, 0.08]], 60);
  } else if (t === T.BRICK && P.big) {
    tiles[ty][tx] = T.AIR;
    var theme = THEMES[(world - 1) % 8];
    TAS.particles.spawn(tx * TILE + 8, ty * TILE + 8, theme.brick, 6, 3, { gravity: 4 });
    TAS.audio.playNoise(0.08, 0.06);
    addScore(50, tx * TILE + 8, ty * TILE);
    triggerShake(2);
  } else if (t === T.BRICK) {
    effects.push({ type: 'bump', x: tx * TILE, y: ty * TILE, timer: 0.2 });
    TAS.audio.playTone(200, 0.05, 'square', 0.04);
    // Kill enemy standing on top (STR: wider bump range)
    var bumpRange = 1 + Math.floor(STR_MOD / 3);
    for (var i = enemies.length - 1; i >= 0; i--) {
      var en = enemies[i];
      if (!en.alive) continue;
      var enTX = Math.floor((en.x + (en.w || 14) / 2) / TILE);
      var enTY = Math.floor(en.y / TILE);
      if (Math.abs(enTX - tx) <= bumpRange && enTY === ty - 1) {
        killEnemy(i);
      }
    }
  }
}

function bossDefeated() {
  TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.15], [1318, 0.2]], 100);
  triggerShake(10);
  addPopup(GW / 2 + camX, GH / 2, 'BOSS DEFEATED!', '#f4b41b', 2);
  setTimeout(function() { levelComplete = true; levelCompleteTimer = 1.6; }, 500);
}

// ============================================================
//  ENEMY UPDATE
// ============================================================
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var en = enemies[i];
    if (en.x < camX - 100 || en.x > camX + GW + 100) continue;

    // === BOSSES ===
    if (en.type.indexOf('boss_') === 0) {
      if (!en.alive) continue;
      updateBoss(en, dt);
      // Boss-player collision
      var pH = P.big ? 28 : 14;
      if (!P.dead && invincTimer <= 0 && TAS.hit.rectOverlap(P.x, P.y, P.w, pH, en.x, en.y, en.w, en.h)) {
        if (P.star) {
          en.hp -= BASE_DAMAGE * 2;
          if (en.hp <= 0) { en.alive = false; addScore(5000, en.x, en.y); bossDefeated(); }
          else { triggerShake(4); }
        } else if (P.vy > 0 && P.y + pH - en.y < en.h * 0.4) {
          P.vy = STOMP_VEL;
          en.hp -= BASE_DAMAGE;
          triggerShake(6);
          TAS.audio.playTone(200, 0.15, 'square', 0.06, 100);
          spawnImpactParticles(en.x + en.w / 2, en.y, '#ff4444', 8);
          addPopup(en.x + en.w / 2, en.y - 10, '-' + Math.floor(BASE_DAMAGE), '#ff4444', 1.2);
          if (en.hp <= 0) { en.alive = false; addScore(5000, en.x, en.y); bossDefeated(); }
          // Phase shift at 50% HP
          if (en.hp <= en.maxHp * 0.5 && en.phase === 1) {
            en.phase = 2;
            addPopup(en.x + en.w / 2, en.y - 25, 'ENRAGED!', '#ff0000', 1.5);
            triggerShake(8);
          }
        } else {
          killPlayer();
        }
      }
      continue;
    }

    // === REGULAR ENEMIES ===
    if (!en.alive && en.type !== 'myco_shell') continue;

    switch (en.type) {
      case 'spore_crawler':
        en.x += en.vx * dt;
        en.vy += GRAVITY * dt;
        en.y += en.vy * dt;
        { var eTY = Math.floor((en.y + 14) / TILE);
          if (eTY < ROWS && isSolid(Math.floor((en.x + 7) / TILE), eTY)) { en.y = eTY * TILE - 14; en.vy = 0; } }
        { var wallTX = Math.floor((en.x + (en.vx > 0 ? 14 : 0)) / TILE);
          if (isSolid(wallTX, Math.floor((en.y + 7) / TILE))) en.vx = -en.vx; }
        // Spore trail particles
        if (frame % 30 === 0) spawnSporeParticles(en.x + 7, en.y + 12);
        break;

      case 'myco_shell':
        if (!en.alive && en.shell) {
          en.x += en.shellVx * dt;
          { var wallTX2 = Math.floor((en.x + (en.shellVx > 0 ? 14 : 0)) / TILE);
            if (isSolid(wallTX2, Math.floor((en.y + 7) / TILE))) en.shellVx = -en.shellVx; }
          for (var j = enemies.length - 1; j >= 0; j--) {
            if (j === i || !enemies[j].alive || enemies[j].type.indexOf('boss_') === 0) continue;
            if (TAS.hit.rectOverlap(en.x, en.y, 14, 14, enemies[j].x, enemies[j].y, enemies[j].w || 14, enemies[j].h || 14)) {
              killEnemy(j);
            }
          }
          if (Math.abs(en.shellVx) > 10 && invincTimer <= 0 && !P.star) {
            var pH2 = P.big ? 28 : 14;
            if (TAS.hit.rectOverlap(P.x, P.y, P.w, pH2, en.x, en.y, 14, 14)) killPlayer();
          }
        } else if (en.alive) {
          en.x += en.vx * dt;
          en.vy += GRAVITY * dt;
          en.y += en.vy * dt;
          { var eTY2 = Math.floor((en.y + (en.h || 14)) / TILE);
            if (eTY2 < ROWS && isSolid(Math.floor((en.x + 7) / TILE), eTY2)) { en.y = eTY2 * TILE - (en.h || 14); en.vy = 0; } }
          { var wallTX3 = Math.floor((en.x + (en.vx > 0 ? 14 : 0)) / TILE);
            if (isSolid(wallTX3, Math.floor((en.y + 7) / TILE))) en.vx = -en.vx; }
        }
        break;

      case 'reactor_bat':
        en.flyTimer += dt * 3;
        en.x += en.vx * dt;
        en.y = en.baseY + Math.sin(en.flyTimer) * 30;
        if (en.x < camX - 50) en.x = camX + GW + 20;
        break;

      case 'spore_mouth':
        en.timer += dt;
        if (en.phase === 0) {
          if (en.timer > 2) { en.phase = 1; en.timer = 0; }
        } else {
          var prog = Math.min(en.timer / 0.8, 1);
          en.y = en.baseY - prog * 20;
          if (en.timer > 2) { en.phase = 0; en.timer = 0; en.y = en.baseY; }
        }
        break;

      case 'myco_lobber':
        en.throwTimer += dt;
        if (en.throwTimer > 1.5) {
          en.throwTimer = 0;
          enemies.push({ type: 'spore_bomb', x: en.x, y: en.y - 10, vx: en.dir * 100, vy: -200, alive: true, w: 10, h: 10, spin: 0, hp: 1 });
        }
        en.dir = P.x < en.x ? -1 : 1;
        en.vy += GRAVITY * dt;
        en.y += en.vy * dt;
        { var eTY3 = Math.floor((en.y + (en.h || 14)) / TILE);
          if (eTY3 < ROWS && isSolid(Math.floor((en.x + 7) / TILE), eTY3)) {
            en.y = eTY3 * TILE - (en.h || 14);
            en.vy = 0;
            if (Math.random() < 0.02) en.vy = -200;
          }
        }
        break;

      case 'spore_bomb':
        en.x += en.vx * dt;
        en.vy += 400 * dt;
        en.y += en.vy * dt;
        en.spin += dt * 10;
        if (en.y > ROWS * TILE + 20) { enemies.splice(i, 1); continue; }
        break;

      case 'crystal_sentry':
        en.fireTimer -= dt;
        if (en.fireTimer <= 0 && Math.abs(en.x - P.x) < GW * 0.8) {
          en.fireTimer = 3 - Math.min(2, world * 0.15);
          var dir = P.x < en.x ? -1 : 1;
          enemies.push({ type: 'crystal_shard', x: en.x, y: en.y + 4, vx: dir * 150, vy: 0, alive: true, w: 14, h: 10, hp: 1 });
          TAS.audio.playNoise(0.1, 0.04, 200);
        }
        continue;

      case 'crystal_shard':
        en.x += en.vx * dt;
        if (en.x < camX - 50 || en.x > camX + GW + 50) { enemies.splice(i, 1); continue; }
        break;

      case 'reactor_golem':
        en.x += en.vx * dt;
        en.vy += GRAVITY * dt;
        en.y += en.vy * dt;
        { var eTY4 = Math.floor((en.y + (en.h || 20)) / TILE);
          if (eTY4 < ROWS && isSolid(Math.floor((en.x + 9) / TILE), eTY4)) { en.y = eTY4 * TILE - (en.h || 20); en.vy = 0; } }
        { var wallTX4 = Math.floor((en.x + (en.vx > 0 ? 18 : 0)) / TILE);
          if (isSolid(wallTX4, Math.floor((en.y + 10) / TILE))) en.vx = -en.vx; }
        if (en.hitTimer > 0) en.hitTimer -= dt;
        break;
    }

    // Player-enemy collision (non-boss)
    if (!en.alive && en.type !== 'myco_shell') continue;
    if (P.dead || invincTimer > 0 || levelComplete || en.type === 'crystal_sentry') continue;

    var pH3 = P.big ? 28 : 14;
    var ew = en.w || 14;
    var eh = en.h || 14;

    if (TAS.hit.rectOverlap(P.x, P.y, P.w, pH3, en.x, en.y, ew, eh)) {
      if (P.star) {
        if (en.type !== 'crystal_sentry') killEnemy(i);
      } else if (P.vy > 0 && P.y + pH3 - en.y < eh * 0.5) {
        // Stomp — STR affects bounce height
        P.vy = STOMP_VEL;
        if (en.type === 'myco_shell' && en.alive) {
          en.alive = false;
          en.shell = true;
          en.shellVx = 0;
          en.h = 14;
          addScore(100, en.x + 7, en.y - 5);
          TAS.audio.playTone(400, 0.06, 'square', 0.05);
        } else if (en.type === 'myco_shell' && en.shell && en.shellVx === 0) {
          en.shellVx = (P.x < en.x ? KNOCKBACK : -KNOCKBACK); // STR: shell speed
          TAS.audio.playTone(500, 0.05, 'square', 0.04);
        } else if (en.type === 'reactor_golem') {
          // Golems take multiple stomps
          en.hp -= BASE_DAMAGE;
          triggerShake(3);
          addPopup(en.x + 9, en.y - 5, '-' + Math.floor(BASE_DAMAGE), '#ff8844', 1);
          if (en.hp <= 0) killEnemy(i);
          else { en.hitTimer = 0.3; TAS.audio.playTone(180, 0.1, 'square', 0.06); }
        } else if (en.type !== 'spore_mouth') {
          killEnemy(i);
        } else {
          killPlayer();
        }
      } else {
        killPlayer();
      }
    }
  }
}

// ============================================================
//  BOSS UPDATE
// ============================================================
function updateBoss(en, dt) {
  en.attackTimer += dt;
  en.jumpTimer += dt;
  en.dir = P.x < en.x ? -1 : 1;
  var speed = en.phase === 2 ? 1.5 : 1;

  switch (en.type) {
    case 'boss_myco_king':
      if (en.jumpTimer > 2 / speed) {
        en.jumpTimer = 0;
        en.vy = -350 * speed;
        en.vx = en.dir * 80 * speed;
      }
      en.vy += GRAVITY * dt;
      en.y += en.vy * dt;
      en.x += en.vx * dt;
      { var eTY = Math.floor((en.y + en.h) / TILE);
        if (eTY < ROWS && isSolid(Math.floor((en.x + en.w / 2) / TILE), eTY)) {
          en.y = eTY * TILE - en.h; en.vy = 0; en.vx *= 0.8;
          if (en.phase === 2) { triggerShake(3); spawnSporeParticles(en.x + en.w / 2, en.y + en.h); }
        } }
      if (en.attackTimer > 1.2 / speed) {
        en.attackTimer = 0;
        enemies.push({ type: 'spore_bomb', x: en.x + en.w / 2, y: en.y, vx: en.dir * 120 * speed, vy: -180, alive: true, w: 10, h: 10, spin: 0, hp: 1 });
        if (en.phase === 2) {
          enemies.push({ type: 'spore_bomb', x: en.x + en.w / 2, y: en.y, vx: en.dir * 80, vy: -220, alive: true, w: 10, h: 10, spin: 0, hp: 1 });
        }
        TAS.audio.playNoise(0.08, 0.04, 300);
      }
      break;

    case 'boss_crystal_wyrm':
      en.dashTimer = (en.dashTimer || 0) + dt;
      if (en.dashTimer > 3 / speed) {
        en.dashTimer = 0;
        en.vx = en.dir * 300 * speed;
        en.vy = -150;
        triggerShake(4);
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.06);
      }
      en.vy += GRAVITY * dt;
      en.y += en.vy * dt;
      en.x += en.vx * dt;
      en.vx *= 0.98;
      { var eTY5 = Math.floor((en.y + en.h) / TILE);
        if (eTY5 < ROWS && isSolid(Math.floor((en.x + en.w / 2) / TILE), eTY5)) {
          en.y = eTY5 * TILE - en.h; en.vy = 0;
        } }
      if (en.attackTimer > 2 / speed) {
        en.attackTimer = 0;
        for (var a = -1; a <= 1; a++) {
          enemies.push({ type: 'crystal_shard', x: en.x + en.w / 2, y: en.y + en.h / 2, vx: (en.dir * 120 + a * 40) * speed, vy: -80 + a * 50, alive: true, w: 10, h: 8, hp: 1 });
        }
        TAS.audio.playNoise(0.06, 0.04, 400);
      }
      break;

    case 'boss_lava_golem':
      if (en.jumpTimer > 2.5 / speed) {
        en.jumpTimer = 0;
        en.vy = -400 * speed;
        en.vx = en.dir * 60;
      }
      en.vy += GRAVITY * dt;
      en.y += en.vy * dt;
      en.x += en.vx * dt;
      en.vx *= 0.95;
      { var eTY6 = Math.floor((en.y + en.h) / TILE);
        if (eTY6 < ROWS && isSolid(Math.floor((en.x + en.w / 2) / TILE), eTY6)) {
          en.y = eTY6 * TILE - en.h; en.vy = 0;
          if (en.phase === 2) { triggerShake(5); spawnFireParticles(en.x + en.w / 2, en.y + en.h); }
        } }
      if (en.attackTimer > 1.5 / speed) {
        en.attackTimer = 0;
        enemies.push({ type: 'spore_bomb', x: en.x + en.w / 2, y: en.y, vx: en.dir * 100, vy: -150, alive: true, w: 12, h: 12, spin: 0, hp: 1 });
        if (en.phase === 2) {
          enemies.push({ type: 'spore_bomb', x: en.x + en.w / 2, y: en.y, vx: -en.dir * 60, vy: -200, alive: true, w: 10, h: 10, spin: 0, hp: 1 });
        }
      }
      break;

    case 'boss_reactor_core':
      en.spinAngle = (en.spinAngle || 0) + dt * 2 * speed;
      en.shieldTimer = (en.shieldTimer || 0) + dt;
      // Shield cycles on/off
      if (en.shieldTimer > 4) {
        en.shieldTimer = 0;
        en.shielded = !en.shielded;
        if (en.shielded) addPopup(en.x + en.w / 2, en.y - 15, 'SHIELDED!', '#38d973', 1.2);
      }
      if (en.jumpTimer > 1.5 / speed) {
        en.jumpTimer = 0;
        en.vy = -300;
        en.vx = en.dir * 100 * speed;
      }
      en.vy += GRAVITY * dt;
      en.y += en.vy * dt;
      en.x += en.vx * dt;
      en.vx *= 0.96;
      { var eTY7 = Math.floor((en.y + en.h) / TILE);
        if (eTY7 < ROWS && isSolid(Math.floor((en.x + en.w / 2) / TILE), eTY7)) {
          en.y = eTY7 * TILE - en.h; en.vy = 0;
        } }
      if (en.attackTimer > 1 / speed) {
        en.attackTimer = 0;
        var numProj = en.phase === 2 ? 5 : 3;
        for (var b = 0; b < numProj; b++) {
          var angle = en.spinAngle + (b / numProj) * Math.PI * 2;
          enemies.push({
            type: 'crystal_shard', x: en.x + en.w / 2, y: en.y + en.h / 2,
            vx: Math.cos(angle) * 120, vy: Math.sin(angle) * 120,
            alive: true, w: 8, h: 8, hp: 1
          });
        }
        TAS.audio.playNoise(0.06, 0.04, 500);
      }
      break;
  }
}

// ============================================================
//  MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updatePopups(dt);
  updateShake(dt);

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Tutorial
  if (showTutorial && state === 'playing') {
    tutorialTimer += dt;
    if (tutorialTimer > 12 || (tutorialStep >= 3)) {
      showTutorial = false;
      try { localStorage.setItem('rj_tut_seen', '1'); } catch(e) { console.error('Tutorial save failed:', e); }
    }
    if (tutorialTimer > 3 && tutorialStep === 0) tutorialStep = 1;
    if (tutorialTimer > 6 && tutorialStep === 1) tutorialStep = 2;
    if (tutorialTimer > 9 && tutorialStep === 2) tutorialStep = 3;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) startGame();
    return;
  }
  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) state = 'title';
    return;
  }
  if (state !== 'playing') return;

  // Death animation
  if (P.dead) {
    deathTimer += dt;
    P.vy += GRAVITY * dt;
    P.y += P.vy * dt;
    if (deathTimer > 2) loseLife();
    return;
  }

  // Level complete animation
  if (levelComplete) {
    levelCompleteTimer += dt;
    if (levelCompleteTimer < 1.5) {
      P.vy = 80;
      P.y += P.vy * dt;
    } else if (levelCompleteTimer > 2.5) {
      var timeBonus = timer * 10;
      var secretBonus = secretsFound * 500;
      addScore(timeBonus + secretBonus);
      nextLevel();
    }
    return;
  }

  // Timer (WIS gives more starting time)
  timerAcc += dt;
  if (timerAcc >= 1) { timerAcc -= 1; timer--; }
  if (timer <= 0) { killPlayer(); return; }

  // Powerup timers
  if (starTimer > 0) { starTimer -= dt; if (starTimer <= 0) { P.star = false; starTimer = 0; } }
  if (invincTimer > 0) invincTimer -= dt;
  if (fireballCooldown > 0) fireballCooldown -= dt;

  // Swimming check
  var centerTX = Math.floor((P.x + P.w / 2) / TILE);
  var centerTY = Math.floor((P.y + P.h / 2) / TILE);
  P.swimming = (centerTX >= 0 && centerTX < COLS && centerTY >= 0 && centerTY < ROWS && tiles[centerTY][centerTX] === T.WATER);

  // Spore damage
  if (centerTX >= 0 && centerTX < COLS && centerTY >= 0 && centerTY < ROWS && tiles[centerTY][centerTX] === T.SPORE) {
    if (invincTimer <= 0 && !P.star) {
      killPlayer();
      spawnSporeParticles(P.x + P.w / 2, P.y + P.h / 2);
    }
  }

  // Movement
  var decel = world === 5 ? ICE_DECEL : RUN_DECEL;
  var running = runHeld();
  var maxSpd = running ? MAX_RUN_SPEED : MAX_SPEED;

  if (leftHeld()) { P.vx -= RUN_ACCEL * dt; P.dir = -1; }
  else if (rightHeld()) { P.vx += RUN_ACCEL * dt; P.dir = 1; }
  else {
    if (P.vx > 0) P.vx = Math.max(0, P.vx - decel * dt);
    else if (P.vx < 0) P.vx = Math.min(0, P.vx + decel * dt);
  }
  P.vx = TAS.math.clamp(P.vx, -maxSpd, maxSpd);

  // Gravity
  var grav = P.swimming ? SWIM_GRAVITY : GRAVITY;
  P.vy += grav * dt;
  if (P.vy > MAX_FALL) P.vy = MAX_FALL;
  if (P.swimming && P.vy > 100) P.vy = 100;

  // Jump (variable height + coyote time + buffer)
  var jumpNow = jumpPressed();
  var jumpEdge = jumpNow && !prevJump;
  if (jumpEdge) P.jumpBuffer = JUMP_BUFFER;
  else if (P.jumpBuffer > 0) P.jumpBuffer -= dt;

  if (P.jumpBuffer > 0 && (P.grounded || P.coyote > 0)) {
    P.vy = P.swimming ? SWIM_JUMP : (jumpNow ? JUMP_HOLD_VEL : JUMP_VEL);
    P.grounded = false;
    P.coyote = 0;
    P.jumpBuffer = 0;
    TAS.audio.playTone(440, 0.08, 'square', 0.06, 600);
  }

  // Cut jump short when releasing
  if (!jumpNow && P.vy < -100 && !P.swimming) P.vy *= 0.6;

  // Fire (INT: more fireballs, faster cooldown)
  if (firePressed() && !prevFire && P.fire && fireballs.length < FIREBALL_MAX && fireballCooldown <= 0) {
    fireballs.push({
      x: P.x + (P.dir > 0 ? P.w : -8), y: P.y + P.h / 2,
      vx: P.dir * FIREBALL_SPEED, vy: 0, life: 2 + INT_MOD * 0.2
    });
    fireballCooldown = FIREBALL_COOLDOWN;
    TAS.audio.playTone(880, 0.05, 'sawtooth', 0.04);
  }

  prevJump = jumpNow;
  prevFire = firePressed();

  // Horizontal collision
  var oldX = P.x;
  P.x += P.vx * dt;
  if (P.x < 0) P.x = 0;
  if (P.x > (COLS - 1) * TILE - P.w) P.x = (COLS - 1) * TILE - P.w;
  var pH = P.big ? 28 : 14;
  P.h = pH;
  if (collidesWorld(P.x, P.y, P.w, pH, false, P.y)) { P.x = oldX; P.vx = 0; }

  // Vertical collision
  var oldY = P.y;
  P.y += P.vy * dt;
  if (collidesWorld(P.x, P.y, P.w, pH, true, oldY)) {
    if (P.vy > 0) {
      var footTY = Math.floor((P.y + pH) / TILE);
      P.y = footTY * TILE - pH;
      P.vy = 0;
      P.grounded = true;
      P.coyote = COYOTE_TIME;
    } else if (P.vy < 0) {
      P.y = oldY;
      var headTX = Math.floor((P.x + P.w / 2) / TILE);
      var headTY = Math.floor(P.y / TILE);
      if (headTY >= 0 && headTY < ROWS) bumpBlock(headTX, headTY);
      P.vy = 0;
    }
  } else {
    if (P.grounded) P.coyote = COYOTE_TIME;
    P.grounded = false;
    if (P.coyote > 0) P.coyote -= dt;
  }

  // Pit death
  if (P.y > ROWS * TILE + 32) { killPlayer(); return; }

  // Lava/acid check
  var feetTX = Math.floor((P.x + P.w / 2) / TILE);
  var feetTY = Math.floor((P.y + pH) / TILE);
  if (feetTY >= 0 && feetTY < ROWS && isHazard(feetTX, feetTY)) { killPlayer(); return; }

  // Coin pickup
  for (var ty = Math.floor(P.y / TILE); ty <= Math.floor((P.y + pH) / TILE); ty++) {
    for (var tx = Math.floor(P.x / TILE); tx <= Math.floor((P.x + P.w) / TILE); tx++) {
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS && tiles[ty][tx] === T.COIN) {
        tiles[ty][tx] = T.AIR;
        collectCoin(tx * TILE + 8, ty * TILE + 8);
      }
    }
  }

  // Spring bounce
  if (P.grounded) {
    var sTX = Math.floor((P.x + P.w / 2) / TILE);
    var sTY = Math.floor((P.y + pH) / TILE);
    if (sTY >= 0 && sTY < ROWS && tiles[sTY][sTX] === T.SPRING) {
      P.vy = JUMP_HOLD_VEL * 1.5;
      P.grounded = false;
      triggerShake(3);
      TAS.audio.playTone(660, 0.15, 'square', 0.08, 1200);
    }
  }

  // Flagpole check
  var pTX = Math.floor((P.x + P.w / 2) / TILE);
  var pTY = Math.floor((P.y + pH / 2) / TILE);
  if (pTX >= 0 && pTX < COLS && pTY >= 0 && pTY < ROWS) {
    var ft = tiles[pTY][pTX];
    if ((ft === T.FLAG_POLE || ft === T.FLAG_TOP) && !enemies.some(function(e) { return e.type.indexOf('boss_') === 0 && e.alive; })) {
      levelComplete = true;
      levelCompleteTimer = 0;
      var flagScore = Math.floor((1 - P.y / (ROWS * TILE)) * 5000);
      addScore(flagScore, P.x, P.y - 20);
      addPopup(P.x, P.y - 40, 'CLEAR!', '#38d973', 1.5);
      TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
    }
  }

  // Items physics + pickup
  for (var ii = items.length - 1; ii >= 0; ii--) {
    var it = items[ii];
    it.vy += 300 * dt;
    it.y += it.vy * dt;
    it.x += (it.vx || 0) * dt;
    var itTY = Math.floor((it.y + 14) / TILE);
    if (itTY >= 0 && itTY < ROWS && isSolid(Math.floor(it.x / TILE), itTY)) {
      it.y = itTY * TILE - 14;
      it.vy = 0;
    }
    if (TAS.hit.rectOverlap(P.x, P.y, P.w, pH, it.x, it.y, 14, 14)) {
      applyPowerUp(it.type);
      items.splice(ii, 1);
    } else if (it.y > ROWS * TILE + 32) {
      items.splice(ii, 1);
    }
  }

  // Fireballs
  for (var fi = fireballs.length - 1; fi >= 0; fi--) {
    var fb = fireballs[fi];
    fb.x += fb.vx * dt;
    fb.vy += 600 * dt;
    fb.y += fb.vy * dt;
    fb.life -= dt;
    var fbTY = Math.floor((fb.y + 6) / TILE);
    if (fbTY >= 0 && fbTY < ROWS && isSolid(Math.floor(fb.x / TILE), fbTY)) {
      fb.y = fbTY * TILE - 6;
      fb.vy = -200;
    }
    var fbHit = false;
    for (var fj = enemies.length - 1; fj >= 0; fj--) {
      var en = enemies[fj];
      if (!en.alive || en.type === 'spore_mouth' || en.type === 'crystal_sentry') continue;
      if (en.type.indexOf('boss_') === 0) {
        if (en.shielded) continue;  // Shield blocks fireballs
        if (TAS.hit.rectOverlap(fb.x - 4, fb.y - 4, 8, 8, en.x, en.y, en.w, en.h)) {
          en.hp -= BASE_DAMAGE;
          fbHit = true;
          triggerShake(3);
          addPopup(en.x + en.w / 2, en.y - 10, '-' + Math.floor(BASE_DAMAGE), '#ff8844', 1);
          if (en.hp <= 0) { en.alive = false; addScore(5000, en.x, en.y); bossDefeated(); }
          if (en.hp <= en.maxHp * 0.5 && en.phase === 1) {
            en.phase = 2;
            addPopup(en.x + en.w / 2, en.y - 25, 'ENRAGED!', '#ff0000', 1.5);
          }
          break;
        }
      } else if (TAS.hit.rectOverlap(fb.x - 4, fb.y - 4, 8, 8, en.x, en.y, en.w || 14, en.h || 14)) {
        if (en.type === 'reactor_golem') {
          en.hp -= BASE_DAMAGE;
          if (en.hp <= 0) killEnemy(fj);
          else { en.hitTimer = 0.2; }
        } else {
          killEnemy(fj);
        }
        fbHit = true;
        break;
      }
    }
    if (fbHit || fb.life <= 0 || fb.x < camX - 20 || fb.x > camX + GW + 20) {
      spawnFireParticles(fb.x, fb.y);
      fireballs.splice(fi, 1);
    }
  }

  // Update enemies
  updateEnemies(dt);

  // Camera follow
  camX = TAS.math.lerp(camX, P.x - GW / 3, 6 * dt);
  camX = TAS.math.clamp(camX, 0, COLS * TILE - GW);

  // Animation
  if (Math.abs(P.vx) > 10) P.anim += dt * Math.abs(P.vx) * 0.05;
}

// ============================================================
//  NES PIXEL ART HELPERS
// ============================================================
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function drawPixelOutline(x, y, w, h, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.strokeRect(Math.floor(x) + 0.5, Math.floor(y) + 0.5, w - 1, h - 1);
}

function drawPixelEyes(x, y, size, dir) {
  var s = size || 2;
  drawPixelRect(x + (dir > 0 ? 1 : -3), y, s, s, '#fff');
  drawPixelRect(x + (dir > 0 ? 2 : -2), y, 1, 1, '#111');
}

function drawPixelSprite(x, y, rows, palette) {
  // rows is array of strings, each char maps to palette index
  for (var r = 0; r < rows.length; r++) {
    for (var c = 0; c < rows[r].length; c++) {
      var ch = rows[r][c];
      if (ch !== ' ' && ch !== '.') {
        var col = palette[ch] || '#ff00ff';
        ctx.fillStyle = col;
        ctx.fillRect(Math.floor(x + c * 2), Math.floor(y + r * 2), 2, 2);
      }
    }
  }
}

// ============================================================
//  MAIN DRAW
// ============================================================
function draw(dt) {
  var theme = THEMES[(world - 1) % 8];
  ctx.fillStyle = theme.sky;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') { drawTitle(); return; }
  if (state === 'gameOver') { TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: THEMES[(world - 1) % 8].name + ' ' + world + '-' + stage }); return; }
  if (state === 'victory') { drawVictory(); return; }

  ctx.save();
  // Apply screen shake
  ctx.translate(Math.floor(screenShake.x), Math.floor(screenShake.y));
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), 0);

  // Parallax background — zone-themed
  drawBackground(theme);

  // Draw tiles (only visible columns)
  var startCol = Math.floor(camX / TILE);
  var endCol = Math.min(startCol + Math.ceil(GW / TILE) + 2, COLS);

  for (var y = 0; y < ROWS; y++) {
    for (var x = startCol; x < endCol; x++) {
      var t = tiles[y][x];
      if (t === T.AIR) continue;
      var px = x * TILE, py = y * TILE;

      switch (t) {
        case T.GROUND:
          drawPixelRect(px, py, TILE, TILE, theme.ground);
          // NES-style top edge highlight
          drawPixelRect(px, py, TILE, 2, 'rgba(255,255,255,0.15)');
          // Pixel texture
          if ((x + y) % 3 === 0) drawPixelRect(px + 4, py + 4, 2, 2, 'rgba(0,0,0,0.15)');
          if ((x + y) % 5 === 0) drawPixelRect(px + 10, py + 8, 2, 2, 'rgba(0,0,0,0.1)');
          break;
        case T.BRICK:
          drawPixelRect(px, py, TILE, TILE, theme.brick);
          // NES brick pattern
          drawPixelRect(px, py, TILE, 1, 'rgba(255,255,255,0.2)');
          drawPixelRect(px + 7, py, 2, TILE, 'rgba(0,0,0,0.15)');
          drawPixelRect(px, py + 7, TILE, 2, 'rgba(0,0,0,0.15)');
          break;
        case T.QBLOCK:
          drawPixelRect(px, py, TILE, TILE, '#f4b41b');
          drawPixelOutline(px, py, TILE, TILE, '#b8860b');
          // Pixel ? mark
          drawPixelRect(px + 5, py + 3, 6, 2, '#fff');
          drawPixelRect(px + 9, py + 5, 2, 2, '#fff');
          drawPixelRect(px + 5, py + 7, 6, 2, '#fff');
          drawPixelRect(px + 5, py + 9, 2, 2, '#fff');
          drawPixelRect(px + 5, py + 12, 2, 2, '#fff');
          // Shimmer
          if (frame % 40 < 10) drawPixelRect(px + 2, py + 2, 2, 2, 'rgba(255,255,255,0.5)');
          break;
        case T.QBLOCK_EMPTY:
          drawPixelRect(px, py, TILE, TILE, '#554422');
          drawPixelOutline(px, py, TILE, TILE, '#332211');
          break;
        case T.PIPE_TL: case T.PIPE_TR: case T.PIPE_BL: case T.PIPE_BR:
          drawPixelRect(px, py, TILE, TILE, theme.pipe);
          if (t === T.PIPE_TL || t === T.PIPE_TR) {
            drawPixelRect(px, py, TILE, 3, 'rgba(255,255,255,0.2)');
          }
          if (t === T.PIPE_TL || t === T.PIPE_BL) {
            drawPixelRect(px, py, 3, TILE, 'rgba(255,255,255,0.15)');
          }
          break;
        case T.COIN:
          // Animated POOP token coin
          var coinBob = Math.sin(frame * 0.1 + x) * 2;
          drawPixelRect(px + 5, py + 4 + coinBob, 6, 8, '#f4b41b');
          drawPixelRect(px + 6, py + 5 + coinBob, 4, 6, '#f8d068');
          drawPixelRect(px + 7, py + 6 + coinBob, 2, 4, '#fff');
          // WIS: coins glow when player is near
          if (COIN_SENSE_RANGE > 0) {
            var dx = P.x - px;
            var dy = P.y - py;
            if (dx * dx + dy * dy < COIN_SENSE_RANGE * COIN_SENSE_RANGE) {
              ctx.globalAlpha = 0.3;
              ctx.fillStyle = '#ffff00';
              ctx.beginPath();
              ctx.arc(px + 8, py + 8 + coinBob, 10, 0, Math.PI * 2);
              ctx.fill();
              ctx.globalAlpha = 1;
            }
          }
          break;
        case T.SPRING:
          // Mycelium spring
          drawPixelRect(px + 3, py + 8, 10, 8, '#a855f7');
          drawPixelRect(px + 2, py + 4, 12, 4, '#38d973');
          drawPixelRect(px + 5, py + 6, 2, 2, '#f4b41b');
          drawPixelRect(px + 9, py + 6, 2, 2, '#f4b41b');
          break;
        case T.FLAG_TOP:
          ctx.fillStyle = statB.color || '#44dd88';
          ctx.beginPath();
          ctx.moveTo(px + 8, py);
          ctx.lineTo(px + 16, py + 6);
          ctx.lineTo(px + 8, py + 12);
          ctx.fill();
          drawPixelRect(px + 7, py, 2, TILE, '#aaa');
          break;
        case T.FLAG_POLE:
          drawPixelRect(px + 7, py, 2, TILE, '#aaa');
          break;
        case T.ONEWAY:
          drawPixelRect(px, py, TILE, 4, '#aaaacc');
          drawPixelRect(px, py, TILE, 1, 'rgba(255,255,255,0.3)');
          break;
        case T.LAVA:
          drawPixelRect(px, py, TILE, TILE, '#e6482e');
          drawPixelRect(px + Math.floor(Math.sin(frame * 0.05 + x) * 3), py, 8, 4, '#e8703a');
          drawPixelRect(px + Math.floor(Math.cos(frame * 0.07 + x * 2) * 4 + 6), py + 2, 4, 2, '#f4b41b');
          break;
        case T.WATER:
          ctx.fillStyle = 'rgba(0,80,180,0.3)';
          ctx.fillRect(px, py, TILE, TILE);
          if (y === 6) {
            ctx.fillStyle = 'rgba(100,200,255,0.4)';
            ctx.fillRect(px, py, TILE, 2);
          }
          break;
        case T.SPORE:
          // Floating spore cloud
          ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03 + x * 0.5) * 0.15;
          ctx.fillStyle = '#38d973';
          ctx.beginPath();
          ctx.arc(px + 8, py + 8 + Math.sin(frame * 0.02 + x) * 3, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          break;
        case T.ACID:
          drawPixelRect(px, py, TILE, TILE, '#2a9a40');
          drawPixelRect(px + Math.floor(Math.sin(frame * 0.04 + x) * 3), py, 6, 3, '#38d973');
          break;
        case T.SECRET:
          // WIS: secret blocks shimmer if WIS is high enough
          if (WIS_MOD >= 2) {
            ctx.globalAlpha = 0.15 + Math.sin(frame * 0.05 + x + y) * 0.1;
            drawPixelRect(px, py, TILE, TILE, '#f4b41b');
            ctx.globalAlpha = 1;
          }
          break;
        case T.MOSS:
          drawPixelRect(px, py + 12, TILE, 4, '#2a7a3a');
          drawPixelRect(px + 3, py + 10, 3, 4, '#38d973');
          drawPixelRect(px + 10, py + 9, 3, 5, '#38d973');
          break;
      }
    }
  }

  // Effects
  for (var ei = effects.length - 1; ei >= 0; ei--) {
    effects[ei].timer -= dt;
    if (effects[ei].timer <= 0) effects.splice(ei, 1);
  }

  // Items — Tasern themed
  for (var ij = 0; ij < items.length; ij++) {
    var it = items[ij];
    switch (it.type) {
      case 'healing_shroom':
        drawPixelRect(it.x + 2, it.y + 2, 10, 5, '#ff4444');
        drawPixelRect(it.x + 4, it.y + 1, 6, 3, '#ff6666');
        drawPixelRect(it.x + 4, it.y + 7, 6, 6, '#eedd99');
        drawPixelRect(it.x + 6, it.y + 3, 2, 2, '#fff');
        break;
      case 'reactor_shard':
        drawPixelRect(it.x + 3, it.y + 2, 8, 10, '#e6482e');
        drawPixelRect(it.x + 5, it.y, 4, 3, '#f4b41b');
        drawPixelRect(it.x + 4, it.y + 4, 6, 4, '#e8703a');
        // Glow
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#e6482e';
        ctx.beginPath();
        ctx.arc(it.x + 7, it.y + 7, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'myco_bloom':
        ctx.fillStyle = '#f4b41b';
        drawStar(it.x + 7, it.y + 7, 3, 7);
        ctx.fillStyle = '#fff';
        drawStar(it.x + 7, it.y + 7, 2, 4);
        break;
      case 'spore_shield':
        drawPixelRect(it.x + 2, it.y + 2, 10, 10, '#38d973');
        drawPixelRect(it.x + 4, it.y + 4, 6, 6, '#2a9a40');
        drawPixelRect(it.x + 5, it.y + 5, 4, 4, '#1a7a2a');
        break;
    }
  }

  // Fireballs
  for (var fbi = 0; fbi < fireballs.length; fbi++) {
    var fb2 = fireballs[fbi];
    drawPixelRect(fb2.x - 4, fb2.y - 4, 8, 8, '#ff6600');
    drawPixelRect(fb2.x - 2, fb2.y - 2, 4, 4, '#ffcc00');
    drawPixelRect(fb2.x - 1, fb2.y - 1, 2, 2, '#fff');
  }

  // Enemies — NES pixel art style
  drawEnemies();

  // Player
  if (!P.dead || deathTimer < 1.8) drawPlayer();

  TAS.particles.draw();
  drawPopups();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Tutorial overlay
  if (showTutorial && state === 'playing') drawTutorial();

  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
//  DRAW BACKGROUND — zone themed
// ============================================================
function drawBackground(theme) {
  var hillOff = camX * 0.3;
  var w = world;

  // Background hills/features
  ctx.fillStyle = theme.bg;
  for (var i = 0; i < 8; i++) {
    var hx = i * 120 - (hillOff % 120);
    ctx.beginPath();
    ctx.arc(hx + 60, (ROWS - 2) * TILE - 10, 60, Math.PI, 0);
    ctx.fill();
  }

  // Zone-specific background elements
  if (w === 1) {
    // Myco Forest — mushroom silhouettes
    ctx.fillStyle = 'rgba(56,217,115,0.1)';
    for (var m = 0; m < 6; m++) {
      var mx = m * 160 - (camX * 0.1 % 160) + 30;
      var mh = 30 + (m % 3) * 15;
      ctx.beginPath();
      ctx.arc(mx, (ROWS - 2) * TILE - mh, 20, Math.PI, 0);
      ctx.fillRect(mx - 5, (ROWS - 2) * TILE - mh, 10, mh);
      ctx.fill();
    }
  } else if (w === 2) {
    // Spore Cavern — stalactites
    ctx.fillStyle = 'rgba(168,85,247,0.15)';
    for (var st = 0; st < 10; st++) {
      var sx = st * 100 - (camX * 0.15 % 100) + 20;
      ctx.beginPath();
      ctx.moveTo(sx - 8, 0);
      ctx.lineTo(sx, 30 + (st % 4) * 15);
      ctx.lineTo(sx + 8, 0);
      ctx.fill();
    }
  } else if (w === 3) {
    // Sky Canopy — clouds
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (var ci = 0; ci < 5; ci++) {
      var cx = ci * 200 - (camX * 0.12 % 200) + 50;
      var cy = 20 + Math.sin(ci * 2.1) * 20;
      ctx.beginPath();
      ctx.arc(cx, cy, 15, 0, Math.PI * 2);
      ctx.arc(cx + 15, cy - 5, 12, 0, Math.PI * 2);
      ctx.arc(cx + 28, cy, 14, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (w === 4) {
    // Crystal Depths — crystal formations
    ctx.fillStyle = 'rgba(60,172,215,0.1)';
    for (var cr = 0; cr < 8; cr++) {
      var crx = cr * 130 - (camX * 0.08 % 130) + 10;
      ctx.beginPath();
      ctx.moveTo(crx, GH);
      ctx.lineTo(crx + 6, GH - 40 - (cr % 3) * 20);
      ctx.lineTo(crx + 12, GH);
      ctx.fill();
    }
  } else if (w === 6) {
    // Lava Forge — lava glow
    ctx.fillStyle = 'rgba(230,72,46,0.08)';
    ctx.fillRect(camX, GH - 40, GW, 40);
    // Embers
    for (var eb = 0; eb < 4; eb++) {
      var ex = camX + (frame * 0.5 + eb * 120) % GW;
      var ey = GH - 20 - Math.sin(frame * 0.02 + eb) * 30;
      ctx.fillStyle = 'rgba(230,72,46,0.4)';
      ctx.fillRect(ex, ey, 2, 2);
    }
  } else if (w === 8) {
    // Final Reactor — pulsing grid
    ctx.strokeStyle = 'rgba(56,217,115,0.05)';
    ctx.lineWidth = 1;
    for (var gx = 0; gx < GW; gx += 32) {
      ctx.beginPath();
      ctx.moveTo(camX + gx, 0);
      ctx.lineTo(camX + gx, GH);
      ctx.stroke();
    }
    for (var gy = 0; gy < GH; gy += 32) {
      ctx.beginPath();
      ctx.moveTo(camX, gy);
      ctx.lineTo(camX + GW, gy);
      ctx.stroke();
    }
  }
}

// ============================================================
//  ENEMY SPRITES — our own library art (art/enemies + art/sea).
//  Pixel drawing below is KEPT as the fallback while images load.
//  crystal_sentry + boss_reactor_core stay procedural on purpose
//  (crystal/machine constructs — no fitting creature sprite).
// ============================================================
var ENEMY_SPR = (function () {
  function im(p) { var i = new Image(); i.src = p; return i; }
  return {
    spore_crawler:     im('art/enemies/enemy-myconid.png'),
    myco_shell:        im('art/sea/enemy-beetle.png'),
    reactor_bat:       im('art/enemies/enemy-will-o-wisp.png'),
    spore_mouth:       im('art/enemies/enemy-spriggan.png'),
    myco_lobber:       im('art/enemies/enemy-goblin.png'),
    reactor_golem:     im('art/enemies/enemy-troll.png'),
    boss_myco_king:    im('art/enemies/enemy-shroom-knight.png'),
    boss_crystal_wyrm: im('art/enemies/enemy-wyrm.png'),
    boss_lava_golem:   im('art/enemies/enemy-troll.png')
  };
})();
function enemySprReady(i) { return !!(i && i.complete && i.naturalWidth > 0); }
// Draw sprite over an enemy rect, horizontally flipped when moving right.
function drawEnemySpr(im, x, y, w, h, flip) {
  ctx.save();
  if (flip) { ctx.translate(x + w, y); ctx.scale(-1, 1); ctx.drawImage(im, 0, 0, w, h); }
  else { ctx.drawImage(im, x, y, w, h); }
  ctx.restore();
}

// ============================================================
//  DRAW ENEMIES — pixel fallback art
// ============================================================
function drawEnemies() {
  var theme = THEMES[(world - 1) % 8];

  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    if (en.x < camX - 50 || en.x > camX + GW + 50) continue;

    // Boss rendering
    if (en.type.indexOf('boss_') === 0) {
      if (!en.alive) continue;
      drawBoss(en, theme);
      continue;
    }

    if (!en.alive && en.type !== 'myco_shell') continue;

    // Library sprite first (procedural fallback kept below).
    // Shell form of myco_shell and hidden spore_mouth keep procedural rules.
    var _esp = en.alive ? ENEMY_SPR[en.type] : null;
    var _mouthHidden = en.type === 'spore_mouth' && !(en.phase === 1 || en.y < en.baseY);
    if (enemySprReady(_esp) && !_mouthHidden) {
      drawEnemySpr(_esp, en.x - 2, en.y - 4, en.w + 4, en.h + 4, (en.vx || en.dir || -1) > 0);
      if (en.type === 'reactor_golem' && en.hitTimer > 0) {
        ctx.globalAlpha = 0.55;
        ctx.fillStyle = '#fff';
        ctx.fillRect(en.x - 2, en.y - 4, en.w + 4, en.h + 4);
        ctx.globalAlpha = 1;
      }
      continue;
    }

    switch (en.type) {
      case 'spore_crawler':
        // NES pixel mushroom creature
        drawPixelRect(en.x + 2, en.y + 6, 10, 8, '#44bb44');
        drawPixelRect(en.x + 1, en.y + 2, 12, 6, '#66dd66');
        drawPixelRect(en.x + 3, en.y, 8, 4, '#88ee88');
        // Spots
        drawPixelRect(en.x + 4, en.y + 3, 2, 2, '#ffff88');
        drawPixelRect(en.x + 9, en.y + 4, 2, 2, '#ffff88');
        // Eyes
        drawPixelRect(en.x + 4, en.y + 8, 2, 2, '#111');
        drawPixelRect(en.x + 9, en.y + 8, 2, 2, '#111');
        // Feet
        var crawlOff = Math.sin(frame * 0.15) * 2;
        drawPixelRect(en.x + 2 + crawlOff, en.y + 13, 3, 2, '#338833');
        drawPixelRect(en.x + 9 - crawlOff, en.y + 13, 3, 2, '#338833');
        break;

      case 'myco_shell':
        if (!en.alive && en.shell) {
          // Shell form — spinning if moving
          drawPixelRect(en.x + 1, en.y + 1, 12, 12, '#228822');
          drawPixelRect(en.x + 3, en.y + 3, 8, 8, '#116611');
          drawPixelRect(en.x + 5, en.y + 5, 4, 4, '#0a440a');
        } else if (en.alive) {
          // Walking form
          drawPixelRect(en.x + 2, en.y + 4, 10, 18, '#228822');
          drawPixelRect(en.x + 1, en.y, 12, 8, '#44aa44');
          drawPixelRect(en.x + 3, en.y - 2, 8, 4, '#66cc66');
          // Eyes
          drawPixelRect(en.x + 3, en.y + 4, 3, 3, '#fff');
          drawPixelRect(en.x + 8, en.y + 4, 3, 3, '#fff');
          drawPixelRect(en.x + 4, en.y + 5, 1, 1, '#111');
          drawPixelRect(en.x + 9, en.y + 5, 1, 1, '#111');
          // Legs
          var shellWalk = Math.sin(frame * 0.12) * 2;
          drawPixelRect(en.x + 3 + shellWalk, en.y + 20, 3, 3, '#116611');
          drawPixelRect(en.x + 8 - shellWalk, en.y + 20, 3, 3, '#116611');
        }
        break;

      case 'reactor_bat':
        // Pixel bat with wings
        drawPixelRect(en.x + 4, en.y + 4, 6, 6, '#bb44bb');
        // Eyes
        drawPixelRect(en.x + 5, en.y + 5, 2, 2, '#ff0');
        drawPixelRect(en.x + 8, en.y + 5, 2, 2, '#ff0');
        // Wings
        var wingFlap = Math.sin(frame * 0.2) * 4;
        drawPixelRect(en.x - 2, en.y + 2 + wingFlap, 6, 3, '#dd66dd');
        drawPixelRect(en.x + 10, en.y + 2 - wingFlap, 6, 3, '#dd66dd');
        drawPixelRect(en.x - 4, en.y + 3 + wingFlap, 3, 2, '#cc44cc');
        drawPixelRect(en.x + 15, en.y + 3 - wingFlap, 3, 2, '#cc44cc');
        break;

      case 'spore_mouth':
        if (en.phase === 1 || en.y < en.baseY) {
          drawPixelRect(en.x, en.y + 6, 10, 12, '#cc2222');
          drawPixelRect(en.x + 1, en.y, 8, 8, '#ee4444');
          // Teeth
          for (var t2 = 0; t2 < 4; t2++) drawPixelRect(en.x + 1 + t2 * 2, en.y + 7, 2, 2, '#fff');
          // Leaves
          drawPixelRect(en.x - 3, en.y + 4, 4, 4, '#44aa44');
          drawPixelRect(en.x + 9, en.y + 4, 4, 4, '#44aa44');
          // Eyes
          drawPixelRect(en.x + 2, en.y + 2, 2, 2, '#ff0');
          drawPixelRect(en.x + 6, en.y + 2, 2, 2, '#ff0');
        }
        break;

      case 'myco_lobber':
        drawPixelRect(en.x + 2, en.y + 2, 10, 20, '#884422');
        drawPixelRect(en.x + 1, en.y - 2, 12, 8, '#cc8844');
        // Mushroom cap
        drawPixelRect(en.x, en.y - 6, 14, 6, '#44aa44');
        drawPixelRect(en.x + 2, en.y - 8, 10, 4, '#66cc66');
        // Eyes
        drawPixelRect(en.x + 3, en.y + 2, 3, 3, '#fff');
        drawPixelRect(en.x + 8, en.y + 2, 3, 3, '#fff');
        drawPixelRect(en.x + 4, en.y + 3, 1, 1, '#111');
        drawPixelRect(en.x + 9, en.y + 3, 1, 1, '#111');
        break;

      case 'spore_bomb':
        ctx.save();
        ctx.translate(en.x + 5, en.y + 5);
        ctx.rotate(en.spin);
        drawPixelRect(-5, -5, 10, 10, '#38d973');
        drawPixelRect(-3, -3, 6, 6, '#2a9a40');
        drawPixelRect(-1, -7, 2, 4, '#f4b41b');
        ctx.restore();
        break;

      case 'crystal_sentry':
        drawPixelRect(en.x, en.y, 16, 16, '#3cacd7');
        drawPixelRect(en.x + 2, en.y + 2, 12, 12, '#2a7a9a');
        drawPixelRect(en.x + 4, en.y - 4, 8, 6, '#4cc0e8');
        // Crystal eye
        drawPixelRect(en.x + 6, en.y + 6, 4, 4, '#3cacd7');
        drawPixelRect(en.x + 7, en.y + 7, 2, 2, '#fff');
        break;

      case 'crystal_shard':
        drawPixelRect(en.x + 2, en.y + 1, 10, 8, '#3cacd7');
        drawPixelRect(en.x + 4, en.y + 3, 6, 4, '#7ccce8');
        break;

      case 'reactor_golem':
        // Large pixel golem
        var flashCol = (en.hitTimer && en.hitTimer > 0) ? '#fff' : '#666';
        drawPixelRect(en.x, en.y + 4, 18, 16, flashCol === '#fff' ? '#fff' : '#555');
        drawPixelRect(en.x + 2, en.y, 14, 8, flashCol === '#fff' ? '#fff' : '#777');
        drawPixelRect(en.x + 4, en.y - 2, 10, 4, flashCol === '#fff' ? '#fff' : '#888');
        // Reactor core
        drawPixelRect(en.x + 6, en.y + 8, 6, 6, theme.accent);
        drawPixelRect(en.x + 7, en.y + 9, 4, 4, '#fff');
        // Eyes
        drawPixelRect(en.x + 4, en.y + 2, 3, 3, '#ff4444');
        drawPixelRect(en.x + 11, en.y + 2, 3, 3, '#ff4444');
        // Legs
        var golemStep = Math.sin(frame * 0.08) * 2;
        drawPixelRect(en.x + 2 + golemStep, en.y + 18, 5, 4, '#444');
        drawPixelRect(en.x + 11 - golemStep, en.y + 18, 5, 4, '#444');
        break;
    }
  }
}

// ============================================================
//  DRAW BOSS
// ============================================================
function drawBoss(en, theme) {
  var flash = en.phase === 2 && Math.floor(frame * 0.1) % 3 === 0;
  var cx = en.x + en.w / 2;
  var cy = en.y + en.h / 2;

  // Library boss sprite first (procedural fallback kept below;
  // boss_reactor_core is a machine and stays procedural).
  var _bsp = ENEMY_SPR[en.type];
  if (enemySprReady(_bsp)) {
    drawEnemySpr(_bsp, en.x - 6, en.y - 10, en.w + 12, en.h + 14, en.dir > 0);
    if (flash) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.fillRect(en.x - 6, en.y - 10, en.w + 12, en.h + 14);
      ctx.globalAlpha = 1;
    }
  } else
  switch (en.type) {
    case 'boss_myco_king':
      // Giant mushroom king
      drawPixelRect(en.x + 4, en.y + 12, 20, 20, flash ? '#ff8844' : '#8B0000');
      drawPixelRect(en.x + 2, en.y + 4, 24, 12, flash ? '#ffaa66' : '#cc2222');
      drawPixelRect(en.x + 4, en.y - 4, 20, 10, flash ? '#ffcc88' : '#dd4444');
      // Crown
      drawPixelRect(en.x + 6, en.y - 10, 4, 8, '#ffcc00');
      drawPixelRect(en.x + 12, en.y - 12, 4, 8, '#ffcc00');
      drawPixelRect(en.x + 18, en.y - 10, 4, 8, '#ffcc00');
      drawPixelRect(en.x + 4, en.y - 4, 20, 4, '#ffaa00');
      // Eyes
      drawPixelRect(en.x + 8, en.y + 6, 4, 4, '#fff');
      drawPixelRect(en.x + 16, en.y + 6, 4, 4, '#fff');
      drawPixelRect(en.x + 9, en.y + 7, 2, 2, '#ff0');
      drawPixelRect(en.x + 17, en.y + 7, 2, 2, '#ff0');
      break;

    case 'boss_crystal_wyrm':
      // Serpentine crystal boss
      for (var seg = 0; seg < 4; seg++) {
        var segX = en.x + seg * 3 + Math.sin(frame * 0.05 + seg) * 3;
        var segY = en.y + 8 + Math.cos(frame * 0.05 + seg * 1.5) * 4;
        drawPixelRect(segX + 4, segY, 8, 8, flash ? '#88eeff' : '#4488cc');
      }
      drawPixelRect(en.x + 2, en.y, 12, 12, flash ? '#aaffff' : '#5599dd');
      drawPixelRect(en.x + 4, en.y + 2, 8, 8, flash ? '#ccffff' : '#77bbee');
      // Crystal horn
      drawPixelRect(en.x + 6, en.y - 8, 4, 10, '#88eeff');
      drawPixelRect(en.x + 7, en.y - 10, 2, 6, '#ccffff');
      // Eyes
      drawPixelRect(en.x + 4, en.y + 3, 3, 3, '#ff0');
      drawPixelRect(en.x + 9, en.y + 3, 3, 3, '#ff0');
      break;

    case 'boss_lava_golem':
      // Massive lava creature
      drawPixelRect(en.x + 2, en.y + 10, 26, 24, flash ? '#ff8844' : '#661100');
      drawPixelRect(en.x + 4, en.y + 2, 22, 14, flash ? '#ffaa66' : '#882200');
      drawPixelRect(en.x + 6, en.y - 2, 18, 8, flash ? '#ffcc88' : '#aa3300');
      // Lava veins
      drawPixelRect(en.x + 8, en.y + 14, 2, 8, '#ff4400');
      drawPixelRect(en.x + 14, en.y + 12, 2, 10, '#ff4400');
      drawPixelRect(en.x + 20, en.y + 16, 2, 6, '#ff4400');
      // Eyes
      drawPixelRect(en.x + 8, en.y + 4, 5, 4, '#ff0');
      drawPixelRect(en.x + 17, en.y + 4, 5, 4, '#ff0');
      drawPixelRect(en.x + 10, en.y + 5, 2, 2, '#f00');
      drawPixelRect(en.x + 19, en.y + 5, 2, 2, '#f00');
      // Arms
      drawPixelRect(en.x - 4, en.y + 12, 8, 6, flash ? '#ffaa66' : '#882200');
      drawPixelRect(en.x + 26, en.y + 12, 8, 6, flash ? '#ffaa66' : '#882200');
      break;

    case 'boss_reactor_core':
      // Final boss — reactor core
      if (en.shielded) {
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(cx, cy, en.w / 2 + 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      // Core body
      drawPixelRect(en.x + 4, en.y + 4, 24, 24, flash ? '#6aecaa' : '#222');
      drawPixelRect(en.x + 6, en.y + 6, 20, 20, flash ? '#a0ffd0' : '#333');
      // Reactor glow
      var glowPulse = Math.sin(frame * 0.06) * 3;
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(cx, cy, 8 + glowPulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      drawPixelRect(en.x + 12, en.y + 12, 8, 8, '#38d973');
      drawPixelRect(en.x + 13, en.y + 13, 6, 6, '#6aecaa');
      // Orbiting nodes
      for (var orb = 0; orb < 4; orb++) {
        var oAngle = (en.spinAngle || 0) + orb * Math.PI / 2;
        var ox = cx + Math.cos(oAngle) * 20;
        var oy = cy + Math.sin(oAngle) * 20;
        drawPixelRect(ox - 3, oy - 3, 6, 6, '#38d973');
        drawPixelRect(ox - 2, oy - 2, 4, 4, '#6aecaa');
      }
      // Eyes
      drawPixelRect(en.x + 10, en.y + 10, 3, 3, '#ff0044');
      drawPixelRect(en.x + 19, en.y + 10, 3, 3, '#ff0044');
      break;
  }

  // HP bar
  var hpPct = en.hp / en.maxHp;
  drawPixelRect(en.x - 2, en.y - 14, en.w + 4, 6, '#111');
  drawPixelRect(en.x - 1, en.y - 13, (en.w + 2) * hpPct, 4,
    hpPct > 0.5 ? '#38d973' : (hpPct > 0.25 ? '#f4b41b' : '#e6482e'));
  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  var bossName = en.type.replace('boss_', '').replace(/_/g, ' ').toUpperCase();
  ctx.fillText(bossName, en.x + en.w / 2, en.y - 18);
}

// ============================================================
//  DRAW PLAYER — NES pixel baseling
// ============================================================
function drawPlayer() {
  if (invincTimer > 0 && Math.floor(invincTimer * 10) % 2 === 0) return;
  var pH = P.big ? 28 : 14;

  ctx.save();
  ctx.translate(P.x + P.w / 2, P.y + pH / 2);
  if (P.dir < 0) ctx.scale(-1, 1);

  // Star glow
  if (P.star) {
    var colors = ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'];
    ctx.fillStyle = colors[Math.floor(frame * 0.2) % colors.length];
    ctx.globalAlpha = 0.4;
    ctx.beginPath();
    ctx.arc(0, 0, pH / 2 + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  // Animation from player state: hurt (invuln) > jump (airborne) > walk (running) > idle.
  // Context is already flipped for direction above, so flipX stays false.
  var _anim = 'idle';
  if (invincTimer > 0 && !P.dead) _anim = 'hurt';
  else if (P.dead) _anim = 'ko';
  else if (!P.grounded) _anim = 'jump';
  else if (Math.abs(P.vx) > 10) _anim = 'walk';
  if (!TAS.drawBaseling(ctx, 0, 0, pH + 4, { flipX: false, frame: frame, anim: _anim })) {
    // Body — NES pixel baseling
    var bodyCol = P.fire ? '#ff6600' : (P.star ? '#ffdd00' : (statB.color || '#44aaff'));
    var hiCol = P.fire ? '#ffaa44' : (P.star ? '#ffff88' : '#88ccff');
    var darkCol = P.fire ? '#cc4400' : (P.star ? '#cc9900' : '#2288cc');

    if (P.big) {
      // Big baseling — 28px tall
      // Head
      drawPixelRect(-6, -12, 12, 10, bodyCol);
      drawPixelRect(-4, -14, 8, 4, hiCol);
      // Body
      drawPixelRect(-5, -2, 10, 12, bodyCol);
      drawPixelRect(-4, -1, 8, 10, darkCol);
      // Highlight
      drawPixelRect(-4, -10, 4, 4, hiCol);
      // Eye
      drawPixelRect(0, -8, 4, 4, '#fff');
      drawPixelRect(1, -7, 2, 2, '#111');
      // Mouth
      drawPixelRect(0, -4, 3, 2, '#111');
      // Feet
      if (P.grounded && Math.abs(P.vx) > 20) {
        var step = Math.sin(P.anim) * 3;
        drawPixelRect(-5 + step, 10, 4, 4, '#333');
        drawPixelRect(1 - step, 10, 4, 4, '#333');
      } else {
        drawPixelRect(-5, 10, 4, 4, '#333');
        drawPixelRect(1, 10, 4, 4, '#333');
      }
    } else {
      // Small baseling — 14px tall
      drawPixelRect(-6, -6, 12, 10, bodyCol);
      drawPixelRect(-4, -8, 8, 4, hiCol);
      // Highlight
