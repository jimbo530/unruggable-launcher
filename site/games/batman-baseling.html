// === ENEMY FACTORY ===
function makeEnemy(type, x, y) {
  const base = { x, y, vx: 0, vy: 0, dir: -1, hp: 1, type, alive: true, timer: 0, atkTimer: 0, stunTimer: 0, flash: 0 };
  if (type === 'thug') { base.w = 16; base.h = 26; base.hp = 2; base.speed = 40; }
  else if (type === 'gunner') { base.w = 16; base.h = 26; base.hp = 2; base.speed = 25; base.shootTimer = 0; }
  else if (type === 'acrobat') { base.w = 14; base.h = 24; base.hp = 2; base.speed = 60; base.jumpTimer = 0; }
  else if (type === 'robot') { base.w = 20; base.h = 28; base.hp = 4; base.speed = 30; }
  else if (type === 'ninja') { base.w = 14; base.h = 24; base.hp = 3; base.speed = 70; base.dodgeTimer = 0; base.dodging = false; }
  return base;
}

// === BOSS FACTORY ===
function makeBoss(type, x, y) {
  const base = { x, y, vx: 0, vy: 0, dir: -1, type, alive: true, timer: 0, phase: 0, flash: 0, atkCooldown: 0 };
  if (type === 'brute') { base.w = 32; base.h = 40; base.hp = 12; base.maxHp = 12; base.speed = 50; }
  else if (type === 'chemist') { base.w = 24; base.h = 34; base.hp = 14; base.maxHp = 14; base.speed = 40; }
  else if (type === 'croc') { base.w = 36; base.h = 36; base.hp = 16; base.maxHp = 16; base.speed = 60; }
  else if (type === 'clockwork') { base.w = 28; base.h = 38; base.hp = 18; base.maxHp = 18; base.speed = 35; }
  else if (type === 'darklord') { base.w = 28; base.h = 36; base.hp = 22; base.maxHp = 22; base.speed = 55; }
  return base;
}

let jumpPressed = false, jumpWasPressed = false;
let atkPressed = false, atkWasPressed = false;
let subPressed = false, subWasPressed = false;

  jumpWasPressed = jumpPressed;
  jumpPressed = keyJump();
  atkWasPressed = atkPressed;
  atkPressed = keyAttack();
  subWasPressed = subPressed;

}
function jumpJustPressed() { return jumpPressed && !jumpWasPressed; }
function atkJustPressed() { return atkPressed && !atkWasPressed; }
function subJustPressed() { return subPressed && !subWasPressed; }

// === COLLISION ===
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function playerRect() {
  if (player.sliding) return { x: player.x, y: player.y + 14, w: player.w + 6, h: 14 };
  return { x: player.x, y: player.y, w: player.w, h: player.h };
}

function attackRect() {
  const range = player.diving ? 20 : 24;
  const hh = player.diving ? 20 : 14;
  if (player.dir > 0) return { x: player.x + player.w, y: player.y + 4, w: range, h: hh };
  return { x: player.x - range, y: player.y + 4, w: range, h: hh };
}

// === PLATFORM PHYSICS ===
function collidePlatforms(ent, dt) {
  ent.onGround = false;
  const hw = ent.w;
  const hh = ent.h;

  for (const p of platforms) {
    if (!rectOverlap({ x: ent.x, y: ent.y, w: hw, h: hh }, { x: p.x, y: p.y, w: p.w, h: p.h })) continue;

    // Vertical resolution
    const overlapTop = (ent.y + hh) - p.y;
    const overlapBot = (p.y + p.h) - ent.y;
    const overlapLeft = (ent.x + hw) - p.x;
    const overlapRight = (p.x + p.w) - ent.x;

    const minOverlap = Math.min(overlapTop, overlapBot, overlapLeft, overlapRight);

    if (minOverlap === overlapTop && ent.vy >= 0) {
      ent.y = p.y - hh;
      ent.vy = 0;
      ent.onGround = true;
      if (p.type === 'gear' && p.speed) ent.x += p.speed * dt * 60;
    } else if (minOverlap === overlapBot && ent.vy < 0) {
      ent.y = p.y + p.h;
      ent.vy = 0;
    } else if (minOverlap === overlapLeft) {
      ent.x = p.x - hw;
      ent.vx = 0;
    } else if (minOverlap === overlapRight) {
      ent.x = p.x + p.w;
      ent.vx = 0;
    }
  }
}

function collideWalls(ent) {
  ent.onWall = 0;
  for (const w of walls) {
    if (!rectOverlap({ x: ent.x - 2, y: ent.y, w: ent.w + 4, h: ent.h }, w)) continue;
    const cx = ent.x + ent.w / 2;
    const wcx = w.x + w.w / 2;
    if (cx < wcx) {
      ent.onWall = 1; // wall is to the right
    } else {
      ent.onWall = -1; // wall is to the left
    }
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  if (player.iframes > 0) player.iframes -= dt;

  // Cape animation
  player.capePhase += dt * 4;
  for (let i = 0; i < player.capeWave.length; i++) {
    player.capeWave[i] = Math.sin(player.capePhase + i * 0.6) * (2 + i * 0.5);
    if (!player.onGround) player.capeWave[i] *= 2;
  }

  // Sliding
  if (player.sliding) {
    player.slideTimer -= dt;
    player.vx = player.dir * SLIDE_SPEED;
    if (player.slideTimer <= 0) { player.sliding = false; }
    collidePlatforms(player, dt);
    return;
  }

  // Diving
  if (player.diving) {
    player.vy = DIVE_KICK_SPEED;
    player.vx = player.dir * 80;
    player.vy += GRAVITY * dt * 0.3;
    player.x += player.vx * dt;
    player.y += player.vy * dt;
    collidePlatforms(player, dt);
    if (player.onGround) {
      player.diving = false;
      TAS.fx.shake(4, 0.85);
      TAS.audio.playTone(80, 0.15, 'triangle', 0.12, 40);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h, '#888', 6, 2, { gravity: 1 });
    }
    return;
  }

  // Horizontal movement
  let moveX = 0;
  if (keyLeft()) { moveX = -1; player.dir = -1; }
  if (keyRight()) { moveX = 1; player.dir = 1; }
  player.running = moveX !== 0;

  // Wall cling / wall jump
  if (player.onWall && !player.onGround && player.vy > 0) {
    player.vy = WALL_SLIDE_SPEED;
    player.wallTimer += dt;
    if (jumpJustPressed()) {
      // Wall jump
      player.vx = -player.onWall * WALL_JUMP_X;
      player.vy = WALL_JUMP_Y;
      player.dir = -player.onWall;
      player.onWall = 0;
      player.wallTimer = 0;
      player.wallKicking = false;
      TAS.audio.playTone(440, 0.08, 'square', 0.08);
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#6644aa', 4, 2);

      // Wall-jump kick if attack held
      if (atkPressed) {
        player.wallKicking = true;
        player.atkTimer = 0.3;
      }
    }
    if (player.wallTimer > WALL_CLING_TIME) {
      player.onWall = 0;
      player.wallTimer = 0;
    }
  } else {
    player.wallTimer = 0;
  }

  // Normal movement
  if (!player.wallKicking) {
    const targetVx = moveX * PLAYER_SPEED;
    player.vx = TAS.math.lerp(player.vx, targetVx, player.onGround ? 0.2 : 0.12);
  } else {
    player.atkTimer -= dt;
    if (player.atkTimer <= 0) player.wallKicking = false;
  }

  // Jump
  if (player.onGround && jumpJustPressed()) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    TAS.audio.playTone(330, 0.06, 'square', 0.06);

    // Slide: DOWN + JUMP while running
    if (keyDown() && player.running) {
      player.sliding = true;
      player.slideTimer = SLIDE_DURATION;
      TAS.audio.playTone(180, 0.1, 'sawtooth', 0.06);
      return;
    }
  }

  // Aerial dive kick: DOWN + ATTACK while airborne
  if (!player.onGround && keyDown() && atkJustPressed()) {
    player.diving = true;
    TAS.audio.playTone(200, 0.12, 'sawtooth', 0.08, 100);
    return;
  }

  // Attack combo
  if (player.atkCooldown > 0) player.atkCooldown -= dt;
  if (atkJustPressed() && !player.attacking && player.atkCooldown <= 0) {
    player.attacking = true;
    player.atkTimer = 0.2;
    player.atkCombo = (player.atkCombo + 1) % 4;
    if (player.atkCombo === 0) player.atkCombo = 1;
    TAS.audio.playTone(200 + player.atkCombo * 60, 0.06, 'square', 0.07);
  }
  if (player.attacking) {
    player.atkTimer -= dt;
    if (player.atkTimer <= 0) {
      player.attacking = false;
      player.atkCooldown = 0.1;
      if (player.atkCombo >= 3) { player.atkCombo = 0; player.atkCooldown = 0.3; }
    }
  }

  // Sub-weapon cycle
  if (subJustPressed()) {
    player.subWeapon = (player.subWeapon + 1) % 3;
    TAS.audio.playTone(600, 0.04, 'sine', 0.05);
  }

  // Throw batarang (b button / touch b)
  if ((TAS.input.keys['KeyV'] || (atkJustPressed() && keyUp())) && player.ammo[player.subWeapon] > 0) {
    throwBatarang();
  }
  // Also allow touch b for throwing when not attacking
  if (jumpJustPressed() && keyUp() && !player.onGround) {
    // Already handled by jump
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > 500) player.vy = 500;

  // Apply velocity
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Collisions
  collidePlatforms(player, dt);
  collideWalls(player);

  // Bounds
  if (player.x < 0) player.x = 0;
  if (player.x > STAGE_WIDTH - player.w) player.x = STAGE_WIDTH - player.w;
  if (player.y > 300) { hurtPlayer(2); player.y = 100; player.vy = 0; }

  // Attack hit detection
  if (player.attacking || player.wallKicking || player.sliding || player.diving) {
    const atkBox = player.sliding ? { x: player.x - 4, y: player.y + 14, w: player.w + 12, h: 14 } : attackRect();
    const dmg = player.wallKicking ? 3 : (player.atkCombo >= 3 ? 2 : 1);
    const knockback = (player.atkCombo >= 3 || player.wallKicking || player.diving) ? 150 : 60;

    for (const e of enemies) {
      if (!e.alive || e.stunTimer > 0) continue;
      if (rectOverlap(atkBox, { x: e.x, y: e.y, w: e.w, h: e.h })) {
        // Ninja dodge check
        if (e.type === 'ninja' && !e.dodging && e.dodgeTimer <= 0 && Math.random() < 0.4) {
          e.dodging = true;
          e.dodgeTimer = 0.5;
          e.vx = (e.x < player.x ? -1 : 1) * 200;
          continue;
        }
        hitEnemy(e, dmg, knockback);
      }
    }
    // Boss hit
    if (boss && boss.alive) {
      if (rectOverlap(atkBox, { x: boss.x, y: boss.y, w: boss.w, h: boss.h })) {
        hitBoss(dmg, knockback);
      }
    }
  }
}

function throwBatarang() {
  const sw = player.subWeapon;
  if (player.ammo[sw] <= 0) return;
  player.ammo[sw]--;
  TAS.audio.playTone(500, 0.08, 'sawtooth', 0.06, 800);

  const bx = player.x + (player.dir > 0 ? player.w : -8);
  const by = player.y + 8;

  if (sw === 0) {
    // Straight batarang - returns
    projectiles.push({ x: bx, y: by, vx: player.dir * BATARANG_SPEED, vy: 0, type: 'batarang', life: 1.5, returning: false, owner: 'player' });
  } else if (sw === 1) {
    // Spread - 3 way fan
    for (let i = -1; i <= 1; i++) {
      projectiles.push({ x: bx, y: by, vx: player.dir * BATARANG_SPEED * 0.9, vy: i * 80, type: 'spread', life: 0.8, owner: 'player' });
    }
  } else if (sw === 2) {
    // Explosive - sticks and detonates
    projectiles.push({ x: bx, y: by, vx: player.dir * BATARANG_SPEED * 0.7, vy: 0, type: 'explosive', life: 2.0, stuck: false, detonateTimer: 1.0, owner: 'player' });
  }
}

function hitEnemy(e, dmg, knockback) {
  e.hp -= dmg;
  e.flash = 0.15;
  e.stunTimer = 0.3;
  e.vx = player.dir * knockback;
  TAS.fx.shake(3, 0.85);
  TAS.audio.playTone(150, 0.08, 'square', 0.1, 80);
  TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff6644', 5, 3);

  if (e.hp <= 0) {
    e.alive = false;
    score += (e.type === 'robot' ? 200 : e.type === 'ninja' ? 150 : 100);
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffaa22', 12, 4, { gravity: 2 });
    TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 50);
    // Drop chance
    if (Math.random() < 0.25) {
      pickups.push({ x: e.x, y: e.y, type: Math.random() < 0.5 ? 'ammo' : 'health' });
    }
  }
}

function hitBoss(dmg, knockback) {
  boss.hp -= dmg;
  boss.flash = 0.2;
  boss.vx = player.dir * knockback * 0.5;
  TAS.fx.shake(5, 0.88);
  TAS.audio.playTone(120, 0.12, 'square', 0.12, 60);
  TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff4422', 8, 4);

  if (boss.hp <= 0) {
    boss.alive = false;
    bossDefeated = true;
    stageComplete = true;
    stageTransTimer = 2.5;
    score += 500 * stage;
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ffcc00', 30, 6, { gravity: 2, size: 3 });
    TAS.fx.flash('#ffffff', 0.5);
    TAS.audio.playTone(440, 0.3, 'square', 0.1);
    setTimeout(function() { TAS.audio.playTone(660, 0.3, 'square', 0.1); }, 150);
    setTimeout(function() { TAS.audio.playTone(880, 0.5, 'square', 0.12); }, 300);
  }
}

function hurtPlayer(dmg) {
  if (player.iframes > 0) return;
  player.hp -= (dmg || 1);
  player.iframes = IFRAME_DUR;
  TAS.fx.shake(6, 0.9);
  TAS.fx.flash(C_HURT, 0.3);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.12, 50);
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, C_HURT, 8, 3);

  if (player.hp <= 0) {
    lives--;
    if (lives <= 0) {
      gameOver();
    } else {
      player.hp = MAX_HP;
      player.x = Math.max(0, camX + 60);
      player.y = 100;
      player.vy = 0;
      player.vx = 0;
    }
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('batman_baseling_hi', highScore);
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.flash > 0) e.flash -= dt;
    if (e.stunTimer > 0) { e.stunTimer -= dt; e.x += e.vx * dt * 0.5; e.vx *= 0.9; continue; }

    const dx = player.x - e.x;
    const dist = Math.abs(dx);
    e.dir = dx > 0 ? 1 : -1;

    // Apply gravity
    e.vy = (e.vy || 0) + GRAVITY * dt;
    if (e.vy > 400) e.vy = 400;

    if (e.type === 'thug') {
      if (dist < 200 && dist > 30) { e.vx = e.dir * e.speed; }
      else if (dist <= 30) { e.vx = 0; e.atkTimer -= dt; if (e.atkTimer <= 0) { e.atkTimer = 0.8; tryEnemyAttack(e); } }
      else { e.vx = 0; }
    }
    else if (e.type === 'gunner') {
      if (dist < 250 && dist > 100) { e.vx = 0; e.shootTimer = (e.shootTimer || 0) - dt; if (e.shootTimer <= 0) { e.shootTimer = 1.5; enemyShoot(e); } }
      else if (dist <= 100) { e.vx = -e.dir * e.speed; }
      else { e.vx = e.dir * e.speed * 0.5; }
    }
    else if (e.type === 'acrobat') {
      if (dist < 180) {
        e.vx = e.dir * e.speed;
        e.jumpTimer = (e.jumpTimer || 0) - dt;
        if (e.jumpTimer <= 0 && e.onGround) { e.vy = -300; e.jumpTimer = 1.2; }
      } else { e.vx = 0; }
      if (dist < 35) { e.atkTimer -= dt; if (e.atkTimer <= 0) { e.atkTimer = 0.6; tryEnemyAttack(e); } }
    }
    else if (e.type === 'robot') {
      if (dist < 160) { e.vx = e.dir * e.speed; }
      else { e.vx = 0; }
      if (dist < 35) { e.atkTimer -= dt; if (e.atkTimer <= 0) { e.atkTimer = 1.0; tryEnemyAttack(e); } }
    }
    else if (e.type === 'ninja') {
      if (e.dodging) {
        e.dodgeTimer -= dt;
        e.x += e.vx * dt;
        e.vx *= 0.92;
        if (e.dodgeTimer <= 0) { e.dodging = false; e.dodgeTimer = 1.0; }
        continue;
      }
      if (e.dodgeTimer > 0) e.dodgeTimer -= dt;
      if (dist < 200 && dist > 35) { e.vx = e.dir * e.speed; }
      else if (dist <= 35) { e.vx = 0; e.atkTimer -= dt; if (e.atkTimer <= 0) { e.atkTimer = 0.5; tryEnemyAttack(e); } }
      else { e.vx = 0; }
    }

    e.x += (e.vx || 0) * dt;
    e.y += (e.vy || 0) * dt;

    // Simple ground collision
    e.onGround = false;
    for (const p of platforms) {
      if (e.x + e.w > p.x && e.x < p.x + p.w && e.y + e.h > p.y && e.y + e.h < p.y + 20 && e.vy >= 0) {
        e.y = p.y - e.h;
        e.vy = 0;
        e.onGround = true;
      }
    }

    // Contact damage
    if (player.iframes <= 0 && rectOverlap(playerRect(), { x: e.x, y: e.y, w: e.w, h: e.h })) {
      if (!player.attacking && !player.sliding && !player.diving && !player.wallKicking) {
        hurtPlayer(1);
      }
    }
  }
}

function tryEnemyAttack(e) {
  const pr = playerRect();
  const atkBox = { x: e.x + (e.dir > 0 ? e.w : -20), y: e.y + 4, w: 20, h: e.h - 8 };
  if (rectOverlap(pr, atkBox)) {
    hurtPlayer(1);
  }
}

function enemyShoot(e) {
  projectiles.push({ x: e.x + e.w / 2, y: e.y + 10, vx: e.dir * 180, vy: 0, type: 'bullet', life: 2.0, owner: 'enemy' });
  TAS.audio.playTone(300, 0.06, 'noise', 0.05);
}

// === BOSS AI ===
function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  if (boss.flash > 0) boss.flash -= dt;

  boss.timer += dt;
  boss.atkCooldown -= dt;

  const dx = player.x - boss.x;
  const dist = Math.abs(dx);
  boss.dir = dx > 0 ? 1 : -1;

  // Apply gravity
  boss.vy = (boss.vy || 0) + GRAVITY * dt;
  if (boss.vy > 400) boss.vy = 400;

  // Boss-specific AI
  if (boss.type === 'brute') {
    if (boss.phase === 0) { // Idle/approach
      if (dist > 60) boss.vx = boss.dir * boss.speed;
      else boss.vx = 0;
      if (dist < 80 && boss.atkCooldown <= 0) {
        boss.phase = Math.random() < 0.5 ? 1 : 2;
        boss.timer = 0;
      }
    } else if (boss.phase === 1) { // Charge
      boss.vx = boss.dir * boss.speed * 3;
      if (boss.timer > 0.8) { boss.phase = 0; boss.atkCooldown = 1.5; boss.vx = 0; }
    } else if (boss.phase === 2) { // Ground pound
      if (boss.timer < 0.3) { boss.vy = -250; }
      else if (boss.timer > 0.6) {
        boss.vy = 400;
        if (boss.y + boss.h >= 275) {
          TAS.fx.shake(8, 0.9);
          TAS.audio.playTone(60, 0.3, 'triangle', 0.15, 30);
          if (dist < 80 && player.onGround) hurtPlayer(2);
          boss.phase = 0; boss.atkCooldown = 2.0; boss.timer = 0;
        }
      }
    }
  }
  else if (boss.type === 'chemist') {
    if (boss.phase === 0) {
      boss.vx = boss.dir * boss.speed * (dist > 100 ? 1 : -0.5);
      if (boss.atkCooldown <= 0) { boss.phase = Math.random() < 0.6 ? 1 : 2; boss.timer = 0; }
    } else if (boss.phase === 1) { // Throw acid
      boss.vx = 0;
      if (boss.timer > 0.4 && boss.timer < 0.5) {
        projectiles.push({ x: boss.x + boss.w / 2, y: boss.y, vx: boss.dir * 160, vy: -120, type: 'acid', life: 2.0, owner: 'enemy' });
        TAS.audio.playTone(200, 0.1, 'sawtooth', 0.06, 100);
      }
      if (boss.timer > 1.0) { boss.phase = 0; boss.atkCooldown = 1.2; }
    } else if (boss.phase === 2) { // Gas cloud
      boss.vx = 0;
      if (boss.timer > 0.3 && boss.timer < 0.4) {
        hazards.push({ x: boss.x - 20, y: boss.y - 10, w: 60, h: 50, type: 'gas', life: 2.0 });
        TAS.audio.playTone(80, 0.2, 'sine', 0.06);
      }
      if (boss.timer > 1.0) { boss.phase = 0; boss.atkCooldown = 2.0; }
    }
  }
  else if (boss.type === 'croc') {
    if (boss.phase === 0) {
      boss.vx = boss.dir * boss.speed * 0.5;
      if (boss.atkCooldown <= 0) { boss.phase = Math.random() < 0.5 ? 1 : 2; boss.timer = 0; }
    } else if (boss.phase === 1) { // Lunge
      if (boss.timer < 0.2) { boss.vx = 0; }
      else { boss.vx = boss.dir * 250; }
      if (boss.timer > 0.7) { boss.phase = 0; boss.atkCooldown = 1.8; boss.vx = 0; }
    } else if (boss.phase === 2) { // Tail sweep
      boss.vx = 0;
      if (boss.timer > 0.3 && boss.timer < 0.5) {
        const sweepBox = { x: boss.x - 30, y: boss.y + boss.h - 12, w: boss.w + 60, h: 12 };
        if (rectOverlap(playerRect(), sweepBox)) hurtPlayer(1);
      }
      if (boss.timer > 0.8) { boss.phase = 0; boss.atkCooldown = 1.5; }
    }
  }
  else if (boss.type === 'clockwork') {
    if (boss.phase === 0) {
      boss.vx = boss.dir * boss.speed;
      if (boss.atkCooldown <= 0) { boss.phase = TAS.math.randInt(1, 2); boss.timer = 0; }
    } else if (boss.phase === 1) { // Gear throw
      boss.vx = 0;
      if (boss.timer > 0.3 && boss.timer < 0.4) {
        projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + 8, vx: boss.dir * 200, vy: 0, type: 'gear_proj', life: 2.5, owner: 'enemy', spin: 0 });
        TAS.audio.playTone(400, 0.1, 'square', 0.06, 200);
      }
      if (boss.timer > 0.8) { boss.phase = 0; boss.atkCooldown = 1.5; }
    } else if (boss.phase === 2) { // Time slow (visual effect, speeds self up)
      boss.vx = boss.dir * boss.speed * 2;
      if (boss.timer > 1.5) { boss.phase = 0; boss.atkCooldown = 2.5; }
    }
  }
  else if (boss.type === 'darklord') {
    if (boss.phase === 0) {
      boss.vx = boss.dir * boss.speed;
      if (boss.atkCooldown <= 0) { boss.phase = TAS.math.randInt(1, 4); boss.timer = 0; }
    } else if (boss.phase === 1) { // Teleport behind
      boss.vx = 0;
      if (boss.timer > 0.3 && boss.timer < 0.4) {
        boss.x = player.x + (player.dir > 0 ? -50 : 50);
        boss.dir = player.x > boss.x ? 1 : -1;
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#8800ff', 10, 4);
      }
      if (boss.timer > 0.8) { boss.phase = 0; boss.atkCooldown = 1.0; }
    } else if (boss.phase === 2) { // Summon minion
      boss.vx = 0;
      if (boss.timer > 0.4 && boss.timer < 0.5) {
        const mx = boss.x + boss.dir * 60;
        enemies.push(makeEnemy('thug', mx, boss.y + 10));
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08);
      }
      if (boss.timer > 1.0) { boss.phase = 0; boss.atkCooldown = 3.0; }
    } else if (boss.phase === 3) { // Multi-projectile
      boss.vx = 0;
      if (boss.timer > 0.3 && boss.timer < 0.4) {
        for (let i = -1; i <= 1; i++) {
          projectiles.push({ x: boss.x + boss.w / 2, y: boss.y + 10, vx: boss.dir * 180, vy: i * 60, type: 'dark_bolt', life: 2.0, owner: 'enemy' });
        }
        TAS.audio.playTone(250, 0.12, 'sawtooth', 0.08, 100);
      }
      if (boss.timer > 0.8) { boss.phase = 0; boss.atkCooldown = 1.5; }
    } else if (boss.phase === 4) { // All patterns combined - charge
      boss.vx = boss.dir * boss.speed * 2.5;
      if (boss.timer > 0.6) { boss.phase = 0; boss.atkCooldown = 1.2; boss.vx = 0; }
    }
  }

  boss.x += (boss.vx || 0) * dt;
  boss.y += (boss.vy || 0) * dt;

  // Ground collision for boss
  for (const p of platforms) {
    if (boss.x + boss.w > p.x && boss.x < p.x + p.w && boss.y + boss.h > p.y && boss.y + boss.h < p.y + 20 && boss.vy >= 0) {
      boss.y = p.y - boss.h;
      boss.vy = 0;
    }
  }

  // Keep boss in arena
  if (boss.x < STAGE_WIDTH - 400) boss.x = STAGE_WIDTH - 400;
  if (boss.x > STAGE_WIDTH - 40) boss.x = STAGE_WIDTH - 40;

  // Contact damage
  if (player.iframes <= 0 && rectOverlap(playerRect(), { x: boss.x, y: boss.y, w: boss.w, h: boss.h })) {
    if (!player.attacking && !player.sliding && !player.diving && !player.wallKicking) {
      hurtPlayer(1);
    }
  }
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    if (p.type === 'explosive' && p.stuck) {
      p.detonateTimer -= dt;
      if (p.detonateTimer <= 0) {
        // Explode
        const expBox = { x: p.x - 25, y: p.y - 25, w: 50, h: 50 };
        for (const e of enemies) {
          if (e.alive && rectOverlap(expBox, { x: e.x, y: e.y, w: e.w, h: e.h })) hitEnemy(e, 3, 120);
        }
        if (boss && boss.alive && rectOverlap(expBox, { x: boss.x, y: boss.y, w: boss.w, h: boss.h })) hitBoss(3, 80);
        TAS.particles.spawn(p.x, p.y, '#ff8800', 15, 5, { gravity: 2, size: 3 });
        TAS.fx.shake(6, 0.88);
        TAS.audio.playTone(80, 0.25, 'sawtooth', 0.12, 30);
        projectiles.splice(i, 1);
        continue;
      }
      continue;
    }

    if (p.type === 'acid') {
      p.vy += 200 * dt; // Gravity arc
    }
    if (p.type === 'gear_proj') {
      p.spin = (p.spin || 0) + dt * 10;
    }

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Batarang return
    if (p.type === 'batarang' && p.life < 0.7 && !p.returning) {
      p.returning = true;
      p.vx = -p.vx * 0.8;
    }

    // Player projectile hits
    if (p.owner === 'player') {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (rectOverlap({ x: p.x - 4, y: p.y - 4, w: 8, h: 8 }, { x: e.x, y: e.y, w: e.w, h: e.h })) {
          if (p.type === 'explosive') { p.stuck = true; p.vx = 0; p.vy = 0; }
          else { hitEnemy(e, p.type === 'spread' ? 1 : 2, 80); projectiles.splice(i, 1); }
          break;
        }
      }
      // Hit boss
      if (boss && boss.alive && rectOverlap({ x: p.x - 4, y: p.y - 4, w: 8, h: 8 }, { x: boss.x, y: boss.y, w: boss.w, h: boss.h })) {
        if (p.type === 'explosive') { p.stuck = true; p.vx = 0; p.vy = 0; }
        else { hitBoss(p.type === 'spread' ? 1 : 2, 50); projectiles.splice(i, 1); continue; }
      }
      // Hit walls (explosive sticks)
      if (p.type === 'explosive' && !p.stuck) {
        for (const w of walls) {
          if (rectOverlap({ x: p.x - 4, y: p.y - 4, w: 8, h: 8 }, w)) { p.stuck = true; p.vx = 0; p.vy = 0; break; }
        }
      }
    }

    // Enemy projectile hits player
    if (p.owner === 'enemy') {
      if (player.iframes <= 0 && rectOverlap(playerRect(), { x: p.x - 4, y: p.y - 4, w: 8, h: 8 })) {
        hurtPlayer(1);
        projectiles.splice(i, 1);
        continue;
      }
    }

    // Off screen
    if (p.x < camX - 50 || p.x > camX + GW + 50 || p.y < -50 || p.y > 350) {
      projectiles.splice(i, 1);
    }
  }
}

// === HAZARDS ===
function updateHazards(dt) {
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];

    if (h.type === 'steam') {
      h.timer += dt;
      h.active = Math.sin(h.timer * 2) > 0.3;
      if (h.active && player.iframes <= 0 && rectOverlap(playerRect(), { x: h.x, y: h.y - 30, w: h.w, h: h.h + 30 })) {
        hurtPlayer(1);
      }
    }
    else if (h.type === 'acid') {
      if (player.iframes <= 0 && rectOverlap(playerRect(), h)) hurtPlayer(2);
    }
    else if (h.type === 'water') {
      h.rise = Math.sin(frame * 0.02) * 20;
      const wr = { x: h.x, y: h.y - h.rise, w: h.w, h: h.h + h.rise };
      if (player.iframes <= 0 && rectOverlap(playerRect(), wr)) hurtPlayer(1);
    }
    else if (h.type === 'crusher') {
      h.timer += dt;
      const cycle = h.timer % 3;
      if (cycle > 2.0 && cycle < 2.5) {
        h.y = h.baseY + (cycle - 2.0) * 400;
        if (player.iframes <= 0 && rectOverlap(playerRect(), { x: h.x, y: h.y, w: h.w, h: h.h })) hurtPlayer(2);
      } else if (cycle >= 2.5) {
        h.y = h.baseY;
      }
    }
    else if (h.type === 'gas') {
      h.life -= dt;
      if (h.life <= 0) { hazards.splice(i, 1); continue; }
      if (player.iframes <= 0 && rectOverlap(playerRect(), h)) hurtPlayer(1);
    }
  }
}

// === PICKUPS ===
function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    if (rectOverlap(playerRect(), { x: p.x, y: p.y, w: 12, h: 12 })) {
      if (p.type === 'health') { player.hp = Math.min(MAX_HP, player.hp + 2); TAS.audio.playTone(523, 0.08, 'sine', 0.08); TAS.audio.playTone(659, 0.08, 'sine', 0.08); }
      else if (p.type === 'ammo') { player.ammo[0] = Math.min(15, player.ammo[0] + 3); player.ammo[1] = Math.min(8, player.ammo[1] + 2); player.ammo[2] = Math.min(5, player.ammo[2] + 1); TAS.audio.playTone(440, 0.06, 'square', 0.06); }
      TAS.particles.spawn(p.x + 6, p.y + 6, p.type === 'health' ? C_HEALTH : C_AMMO, 6, 2);
      pickups.splice(i, 1);
    }
  }
}

// === CAMERA ===
function updateCamera() {
  const targetX = player.x - GW * 0.35;
  camX = TAS.math.lerp(camX, targetX, 0.08);
  camX = TAS.math.clamp(camX, 0, STAGE_WIDTH - GW);
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateInputEdge();

  if (state === 'title') {
    if (jumpJustPressed() || atkJustPressed()) { startGame(); }
    return;
  }

  if (state === 'gameOver') {
    if (jumpJustPressed() || atkJustPressed()) { state = 'title'; }
    return;
  }

  if (state === 'playing') {
    if (stageComplete) {
      stageTransTimer -= dt;
      if (stageTransTimer <= 0) {
        if (stage >= 5) { gameOver(); return; }
        stage++;
        generateStage(stage);
      }
      return;
    }

    updatePlayer(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateProjectiles(dt);
    updateHazards(dt);
    updatePickups(dt);
    updateCamera();
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  lives = MAX_LIVES;
  stage = 1;
  TAS.particles.clear();
  generateStage(1);
}

// === DRAW FUNCTIONS ===

function drawBackground() {
  // Dark city skyline
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  if (stage === 1) { grad.addColorStop(0, '#0a0815'); grad.addColorStop(1, '#1a1028'); }
  else if (stage === 2) { grad.addColorStop(0, '#0d1a0a'); grad.addColorStop(1, '#1a2a15'); }
  else if (stage === 3) { grad.addColorStop(0, '#050a14'); grad.addColorStop(1, '#0a1520'); }
  else if (stage === 4) { grad.addColorStop(0, '#14100a'); grad.addColorStop(1, '#201a10'); }
  else { grad.addColorStop(0, '#100510'); grad.addColorStop(1, '#200a20'); }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax buildings (far)
  ctx.fillStyle = '#0d0d1a';
  for (let i = 0; i < 12; i++) {
    const bx = (i * 90 - camX * 0.2) % (GW + 100) - 50;
    const bh = 40 + (i * 37 % 60);
    ctx.fillRect(bx, GH - bh - 40, 50 + (i * 13 % 30), bh);
  }

  // Parallax buildings (mid)
  ctx.fillStyle = '#12121f';
  for (let i = 0; i < 8; i++) {
    const bx = (i * 130 - camX * 0.4) % (GW + 150) - 75;
    const bh = 50 + (i * 41 % 70);
    ctx.fillRect(bx, GH - bh - 30, 60 + (i * 17 % 40), bh);
    // Windows
    ctx.fillStyle = '#222233';
    for (let wy = GH - bh - 20; wy < GH - 40; wy += 14) {
      for (let wx = bx + 6; wx < bx + 50; wx += 12) {
        if (Math.random() > 0.7 || ((i + wy) % 3 === 0)) {
          ctx.fillRect(wx, wy, 5, 7);
        }
      }
    }
    ctx.fillStyle = '#12121f';
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - camX;
    if (sx + p.w < -10 || sx > GW + 10) continue;

    if (p.type === 'building') {
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#222238';
      ctx.fillRect(sx, p.y, p.w, 4);
      // Windows
      ctx.fillStyle = '#2a2a44';
      for (let wy = p.y + 12; wy < p.y + p.h - 8; wy += 14) {
        for (let wx = sx + 8; wx < sx + p.w - 8; wx += 16) {
          ctx.fillRect(wx, wy, 6, 8);
        }
      }
    } else if (p.type === 'pipe') {
      ctx.fillStyle = '#2a3a2a';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#3a4a3a';
      ctx.fillRect(sx, p.y, p.w, 3);
    } else if (p.type === 'gear') {
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(sx, p.y, p.w, p.h);
      // Gear teeth
      ctx.fillStyle = '#4a3a2a';
      const teeth = Math.floor(p.w / 8);
      for (let t = 0; t < teeth; t++) {
        const tx = sx + t * 8 + Math.sin(frame * 0.05 + t) * 2;
        ctx.fillRect(tx, p.y - 3, 4, 3);
      }
    } else if (p.type === 'ground') {
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#2a2a33';
      ctx.fillRect(sx, p.y, p.w, 3);
    } else if (p.type === 'ceiling') {
      ctx.fillStyle = '#161622';
      ctx.fillRect(sx, p.y, p.w, p.h);
    } else {
      ctx.fillStyle = '#1e1e2e';
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(sx, p.y, p.w, 3);
    }
  }
}

function drawWalls() {
  ctx.fillStyle = '#222238';
  for (const w of walls) {
    const sx = w.x - camX;
    if (sx + w.w < -5 || sx > GW + 5) continue;
    ctx.fillRect(sx, w.y, w.w, w.h);
    // Brick lines
    ctx.fillStyle = '#2a2a40';
    for (let by = w.y; by < w.y + w.h; by += 10) {
      ctx.fillRect(sx, by, w.w, 1);
    }
    ctx.fillStyle = '#222238';
  }
}

function drawHazards() {
  for (const h of hazards) {
    const sx = h.x - camX;
    if (sx + h.w < -10 || sx > GW + 10) continue;

    if (h.type === 'acid') {
      ctx.fillStyle = '#33ff33';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.2;
      ctx.fillRect(sx, h.y, h.w, h.h);
      ctx.globalAlpha = 1;
      // Bubbles
      for (let b = 0; b < 3; b++) {
        const bx = sx + (frame * 0.5 + b * 30) % h.w;
        const by = h.y - Math.abs(Math.sin(frame * 0.08 + b)) * 6;
        ctx.beginPath();
        ctx.arc(bx, by, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    else if (h.type === 'steam') {
      if (h.active) {
        ctx.fillStyle = 'rgba(200, 200, 220, 0.3)';
        for (let s = 0; s < 5; s++) {
          const sy = h.y - s * 8 - Math.random() * 4;
          ctx.beginPath();
          ctx.arc(sx + h.w / 2 + Math.sin(frame * 0.1 + s) * 4, sy, 4 + s, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.fillStyle = '#555';
      ctx.fillRect(sx, h.y, h.w, h.h);
    }
    else if (h.type === 'water') {
      ctx.fillStyle = '#1a3a5a';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(sx, h.y - h.rise, h.w, h.h + h.rise);
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#3a6a9a';
      ctx.fillRect(sx, h.y - h.rise, h.w, 3);
      ctx.globalAlpha = 1;
    }
    else if (h.type === 'crusher') {
      ctx.fillStyle = '#444455';
      ctx.fillRect(sx, h.y, h.w, h.h);
      ctx.fillStyle = '#666677';
      ctx.fillRect(sx + 5, h.y + h.h - 5, h.w - 10, 5);
    }
    else if (h.type === 'gas') {
      ctx.fillStyle = 'rgba(100, 200, 100, ' + (h.life * 0.3) + ')';
      ctx.beginPath();
      ctx.arc(sx + h.w / 2, h.y + h.h / 2, h.w / 2 + Math.sin(frame * 0.1) * 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  const px = player.x - camX;
  const py = player.y;

  // Iframes blink
  if (player.iframes > 0 && Math.floor(player.iframes * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(px + player.w / 2, py + player.h / 2);
  if (player.dir < 0) ctx.scale(-1, 1);
  ctx.translate(-player.w / 2, -player.h / 2);

  // Cape (behind body)
  ctx.fillStyle = C_CAPE;
  ctx.beginPath();
  ctx.moveTo(-2, 6);
  for (let i = 0; i < player.capeWave.length; i++) {
    const cy = 6 + i * 5;
    const cx = -4 - i * 2 + player.capeWave[i];
    ctx.lineTo(cx, cy);
  }
  ctx.lineTo(-4, player.h);
  ctx.lineTo(2, player.h - 4);
  ctx.closePath();
  ctx.fill();

  // Body
  if (player.sliding) {
    ctx.fillStyle = C_BODY;
    ctx.fillRect(-2, 10, player.w + 4, 14);
    // Sliding cape trail
    ctx.fillStyle = C_CAPE;
    ctx.fillRect(-8, 12, 8, 10);
  } else if (player.diving) {
    ctx.fillStyle = C_BODY;
    ctx.save();
    ctx.rotate(0.7);
    ctx.fillRect(0, -4, player.w, player.h * 0.7);
    ctx.restore();
  } else {
    // Torso
    ctx.fillStyle = C_BODY;
    ctx.fillRect(2, 8, 14, 14);
    // Legs
    const legAnim = player.running ? Math.sin(frame * 0.3) * 3 : 0;
    ctx.fillRect(4, 22, 5, 8 + legAnim);
    ctx.fillRect(10, 22, 5, 8 - legAnim);
    // Head
    ctx.fillStyle = '#14142a';
    ctx.fillRect(4, 0, 12, 10);
    // Ears (bat ears)
    ctx.fillRect(4, -4, 3, 5);
    ctx.fillRect(13, -4, 3, 5);
    // Eyes (glowing)
    ctx.fillStyle = C_EYES;
    const eyePulse = 0.7 + Math.sin(frame * 0.08) * 0.3;
    ctx.globalAlpha = eyePulse;
    ctx.fillRect(7, 3, 3, 2);
    ctx.fillRect(12, 3, 3, 2);
    ctx.globalAlpha = 1;
    // Eye glow
    ctx.shadowColor = C_EYES;
    ctx.shadowBlur = 4;
    ctx.fillRect(7, 3, 3, 2);
    ctx.fillRect(12, 3, 3, 2);
    ctx.shadowBlur = 0;
  }

  // Attack animation
  if (player.attacking) {
    ctx.fillStyle = '#aaa';
    const atkX = player.w + 2;
    const atkW = 12 + player.atkCombo * 4;
    ctx.fillRect(atkX, 6 + player.atkCombo * 2, atkW, 4);
    // Impact flash on combo 3
    if (player.atkCombo >= 3) {
      ctx.fillStyle = '#ffcc00';
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(atkX + atkW, 10, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Wall kick visual
  if (player.wallKicking) {
    ctx.fillStyle = '#aa66ff';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(player.w + 4, 14, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Wall cling indicator
  if (player.onWall && !player.onGround) {
    ctx.fillStyle = C_EYES;
    ctx.globalAlpha = 0.4;
    ctx.fillRect(px + (player.onWall > 0 ? player.w : -4), py + 4, 4, player.h - 8);
    ctx.globalAlpha = 1;
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const ex = e.x - camX;
    const ey = e.y;
    if (ex + e.w < -20 || ex > GW + 20) continue;

    ctx.save();
    if (e.flash > 0) { ctx.globalAlpha = 0.5 + Math.sin(e.flash * 30) * 0.5; }

    if (e.type === 'thug') {
      ctx.fillStyle = '#4a2222';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#633';
      ctx.fillRect(ex + 2, ey, e.w - 4, 8); // head
      ctx.fillStyle = '#f44';
      ctx.fillRect(ex + 4, ey + 3, 3, 2); // eye
    }
    else if (e.type === 'gunner') {
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#33a';
      ctx.fillRect(ex + 2, ey, e.w - 4, 8);
      // Gun
      ctx.fillStyle = '#888';
      ctx.fillRect(ex + (e.dir > 0 ? e.w : -8), ey + 10, 8, 3);
      ctx.fillStyle = '#f80';
      ctx.fillRect(ex + 4, ey + 3, 3, 2);
    }
    else if (e.type === 'acrobat') {
      ctx.fillStyle = '#2a4a2a';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#3a3';
      ctx.fillRect(ex + 2, ey, e.w - 4, 7);
      ctx.fillStyle = '#8f8';
      ctx.fillRect(ex + 3, ey + 2, 3, 2);
    }
    else if (e.type === 'robot') {
      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#555';
      ctx.fillRect(ex + 3, ey + 2, e.w - 6, 8);
      // Visor
      ctx.fillStyle = '#f00';
      ctx.fillRect(ex + 5, ey + 4, e.w - 10, 3);
      // Armor detail
      ctx.fillStyle = '#4a4a4a';
      ctx.fillRect(ex + 2, ey + 12, e.w - 4, 3);
    }
    else if (e.type === 'ninja') {
      ctx.fillStyle = e.dodging ? '#1a1a3a' : '#111122';
      ctx.globalAlpha = e.dodging ? 0.5 : 1;
      ctx.fillRect(ex, ey, e.w, e.h);
      ctx.fillStyle = '#222';
      ctx.fillRect(ex + 2, ey, e.w - 4, 7);
      ctx.fillStyle = '#f0f';
      ctx.fillRect(ex + 3, ey + 2, 3, 2);
      ctx.fillStyle = ex + 8, ey + 2, 3, 2;
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const bx = boss.x - camX;
  const by = boss.y;
  if (bx + boss.w < -20 || bx > GW + 20) return;

  ctx.save();
  if (boss.flash > 0) ctx.globalAlpha = 0.5 + Math.sin(boss.flash * 30) * 0.5;

  if (boss.type === 'brute') {
    ctx.fillStyle = '#4a1a1a';
    ctx.fillRect(bx, by, boss.w, boss.h);
    ctx.fillStyle = '#622';
    ctx.fillRect(bx + 4, by, boss.w - 8, 14);
    ctx.fillStyle = '#f22';
    ctx.fillRect(bx + 8, by + 5, 5, 4);
    ctx.fillRect(bx + boss.w - 13, by + 5, 5, 4);
    // Fists
    ctx.fillStyle = '#633';
    ctx.fillRect(bx - 6, by + 20, 10, 10);
    ctx.fillRect(bx + boss.w - 4, by + 20, 10, 10);
  }
  else if (boss.type === 'chemist') {
    ctx.fillStyle = '#1a3a1a';
    ctx.fillRect(bx, by, boss.w, boss.h);
    ctx.fillStyle = '#2a4a2a';
    ctx.fillRect(bx + 3, by, boss.w - 6, 12);
    // Goggles
    ctx.fillStyle = '#3f3';
    ctx.fillRect(bx + 5, by + 3, 5, 4);
    ctx.fillRect(bx + boss.w - 10, by + 3, 5, 4);
    // Flask
    ctx.fillStyle = '#4f4';
    ctx.fillRect(bx + boss.w + 2, by + 15, 6, 10);
  }
  else if (boss.type === 'croc') {
    ctx.fillStyle = '#2a3a1a';
    ctx.fillRect(bx, by, boss.w, boss.h);
    // Snout
    ctx.fillStyle = '#3a4a2a';
    ctx.fillRect(bx + (boss.dir > 0 ? boss.w : -12), by + 4, 12, 8);
    // Eyes
    ctx.fillStyle = '#ff0';
    ctx.fillRect(bx + 6, by + 2, 4, 4);
    ctx.fillRect(bx + boss.w - 10, by + 2, 4, 4);
    // Tail
    ctx.fillStyle = '#2a3a1a';
    ctx.fillRect(bx + (boss.dir > 0 ? -14 : boss.w), by + boss.h - 10, 14, 6);
  }
  else if (boss.type === 'clockwork') {
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(bx, by, boss.w, boss.h);
    // Gears on body
    ctx.fillStyle = '#5a4a2a';
    ctx.beginPath();
    ctx.arc(bx + boss.w / 2, by + 12, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f80';
    ctx.fillRect(bx + 6, by + 4, 4, 3);
    ctx.fillRect(bx + boss.w - 10, by + 4, 4, 3);
    // Clock hands
    ctx.strokeStyle = '#fa0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx + boss.w / 2, by + 12);
    ctx.lineTo(bx + boss.w / 2 + Math.cos(frame * 0.1) * 6, by + 12 + Math.sin(frame * 0.1) * 6);
    ctx.stroke();
  }
  else if (boss.type === 'darklord') {
    // Dark cape flowing
    ctx.fillStyle = '#200030';
    ctx.beginPath();
    ctx.moveTo(bx, by + 5);
    ctx.lineTo(bx - 10 + Math.sin(frame * 0.05) * 4, by + boss.h);
    ctx.lineTo(bx + boss.w + 10 - Math.sin(frame * 0.05) * 4, by + boss.h);
    ctx.lineTo(bx + boss.w, by + 5);
    ctx.closePath();
    ctx.fill();
    // Body
    ctx.fillStyle = '#1a0028';
    ctx.fillRect(bx, by, boss.w, boss.h);
    // Crown/horns
    ctx.fillStyle = '#800080';
    ctx.fillRect(bx + 4, by - 8, 4, 8);
    ctx.fillRect(bx + boss.w - 8, by - 8, 4, 8);
    // Eyes
    ctx.fillStyle = '#f0f';
    ctx.shadowColor = '#f0f';
    ctx.shadowBlur = 6;
    ctx.fillRect(bx + 6, by + 5, 5, 4);
    ctx.fillRect(bx + boss.w - 11, by + 5, 5, 4);
    ctx.shadowBlur = 0;
  }

  ctx.restore();

  // Boss HP bar
  const hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by - 10, boss.w, 4);
  ctx.fillStyle = hpPct > 0.3 ? '#ff4444' : '#ff0000';
  ctx.fillRect(bx, by - 10, boss.w * hpPct, 4);
}

function drawProjectiles() {
  for (const p of projectiles) {
    const px = p.x - camX;
    const py = p.y;
    if (px < -20 || px > GW + 20) continue;

    if (p.type === 'batarang' || p.type === 'spread') {
      ctx.fillStyle = C_BAT;
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(frame * 0.3);
      ctx.fillRect(-5, -2, 10, 4);
      ctx.fillRect(-2, -5, 4, 10);
      ctx.restore();
      // Glow trail
      ctx.fillStyle = C_BAT;
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(px, py, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    else if (p.type === 'explosive') {
      ctx.fillStyle = p.stuck ? (Math.floor(frame * 0.2) % 2 ? '#ff4400' : '#ffaa00') : '#ff6600';
      ctx.beginPath();
      ctx.arc(px, py, p.stuck ? 5 + Math.sin(frame * 0.5) * 2 : 4, 0, Math.PI * 2);
      ctx.fill();
      if (p.stuck) {
        ctx.strokeStyle = '#ff0';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(px, py, 7, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
    else if (p.type === 'bullet') {
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(px - 3, py - 1, 6, 2);
    }
    else if (p.type === 'acid') {
      ctx.fillStyle = '#44ff44';
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    else if (p.type === 'gear_proj') {
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(p.spin || 0);
      ctx.fillStyle = '#886633';
      ctx.fillRect(-6, -2, 12, 4);
      ctx.fillRect(-2, -6, 4, 12);
      ctx.restore();
    }
    else if (p.type === 'dark_bolt') {
      ctx.fillStyle = '#aa00ff';
      ctx.shadowColor = '#aa00ff';
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

function drawPickups() {
  for (const p of pickups) {
    const px = p.x - camX;
    if (px < -10 || px > GW + 10) continue;
    const bob = Math.sin(frame * 0.08 + p.x) * 3;
    if (p.type === 'health') {
      ctx.fillStyle = C_HEALTH;
      ctx.fillRect(px + 2, p.y + bob + 3, 8, 3);
      ctx.fillRect(px + 4, p.y + bob + 1, 4, 7);
    } else {
      ctx.fillStyle = C_AMMO;
      ctx.save();
      ctx.translate(px + 6, p.y + 6 + bob);
      ctx.rotate(frame * 0.05);
      ctx.fillRect(-5, -2, 10, 4);
      ctx.fillRect(-2, -5, 4, 10);
      ctx.restore();
    }
  }
}

function drawHUD() {
  // HP bar
  ctx.fillStyle = 'rgba(10, 5, 20, 0.8)';
  ctx.fillRect(0, 0, GW, 30);

  // Health
  ctx.fillStyle = '#333';
  ctx.fillRect(6, 6, 82, 10);
  ctx.fillStyle = player.hp > 2 ? C_HEALTH : C_HURT;
  ctx.fillRect(7, 7, (player.hp / MAX_HP) * 80, 8);

  // Lives
  ctx.fillStyle = '#888';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('x' + lives, 92, 14);

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score, GW / 2, 14);

  // Stage
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + stage, GW / 2, 26);

  // Sub weapon + ammo
  ctx.textAlign = 'right';
  ctx.fillStyle = C_BAT;
  ctx.fillText(BAT_NAMES[player.subWeapon] + ': ' + player.ammo[player.subWeapon], GW - 6, 14);

  // Ammo icons
  ctx.fillStyle = C_AMMO;
  for (let i = 0; i < Math.min(player.ammo[player.subWeapon], 10); i++) {
    ctx.fillRect(GW - 10 - i * 7, 18, 5, 5);
  }
}

function drawStageTransition() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';

  if (stage >= 5 && bossDefeated) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('VICTORY!', GW / 2, GH * 0.35);
    ctx.fillStyle = '#88ccff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('Tasern City is Safe', GW / 2, GH * 0.5);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('Final Score: ' + score, GW / 2, GH * 0.65);
  } else {
    ctx.fillStyle = '#44ffaa';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('STAGE ' + stage + ' COMPLETE', GW / 2, GH * 0.4);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Score: ' + score, GW / 2, GH * 0.55);
  }
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  // Dark city background
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#060412');
  grad.addColorStop(0.5, '#0a0818');
  grad.addColorStop(1, '#14102a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // City silhouette
  ctx.fillStyle = '#0d0d1a';
  for (let i = 0; i < 15; i++) {
    const bx = i * 35;
    const bh = 40 + Math.sin(i * 1.3) * 30 + 20;
    ctx.fillRect(bx, GH - bh, 30, bh);
  }

  // Moon
  ctx.fillStyle = '#334';
  ctx.beginPath();
  ctx.arc(380, 60, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#445';
  ctx.beginPath();
  ctx.arc(385, 55, 28, 0, Math.PI * 2);
  ctx.fill();

  // Bat signal
  ctx.fillStyle = '#ffdd44';
  ctx.globalAlpha = 0.15 + Math.sin(frame * 0.03) * 0.05;
  ctx.beginPath();
  ctx.ellipse(GW / 2, 80, 60, 40, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.6;
  // Bat silhouette in signal
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 15, 80);
  ctx.quadraticCurveTo(GW / 2 - 8, 68, GW / 2 - 3, 72);
  ctx.lineTo(GW / 2, 66);
  ctx.lineTo(GW / 2 + 3, 72);
  ctx.quadraticCurveTo(GW / 2 + 8, 68, GW / 2 + 15, 80);
  ctx.quadraticCurveTo(GW / 2 + 8, 88, GW / 2, 90);
  ctx.quadraticCurveTo(GW / 2 - 8, 88, GW / 2 - 15, 80);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('BATMAN BASELING', GW / 2 + 2, GH * 0.42 + 2);
  ctx.fillStyle = '#8844ff';
  ctx.fillText('BATMAN BASELING', GW / 2, GH * 0.42);

  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('Dark Knight of Tasern City', GW / 2, GH * 0.50);

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS: Move | Z/A: Jump | X/B: Attack | C: Cycle Weapon | V: Throw', GW / 2, GH * 0.65);
  ctx.fillText('WALL JUMP: Jump at walls | SLIDE: Down+Jump | DIVE: Down+Attack (air)', GW / 2, GH * 0.72);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH * 0.80);
  }

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS JUMP OR ATTACK TO START', GW / 2, GH * 0.91);
  ctx.globalAlpha = 1;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawTitleScreen();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, GW, GH);
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + stage });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  ctx.save();
  // No translate - we subtract camX in each draw function
  drawPlatforms();
  drawWalls();
  drawHazards();
  drawPickups();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawProjectiles();
  ctx.restore();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  if (stageComplete) drawStageTransition();

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
