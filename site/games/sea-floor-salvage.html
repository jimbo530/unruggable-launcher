// ============================================================
// MOBILE TOUCH CONTROLS
// ============================================================
var touchDpad = { active: false, x: 0, y: 0, dir: DIR.NONE };
var touchAction = { active: false };
var DPAD_SIZE = 120, DPAD_MARGIN = 20;
var ACTION_SIZE = 70;
var isMobile = false;

function checkMobile() {
  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
}
checkMobile();

function getTouchPos(touch) {
  var rect = canvas.getBoundingClientRect();
  return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
}

function drawTouchControls() {
  if (!isMobile) return;

  var dpadX = DPAD_MARGIN + DPAD_SIZE / 2;
  var dpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
  var actionX = W - DPAD_MARGIN - ACTION_SIZE / 2;
  var actionY = H - DPAD_MARGIN - ACTION_SIZE / 2;

  ctx.globalAlpha = 0.25;

  // D-pad
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(dpadX, dpadY, DPAD_SIZE / 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#aaa';
  var arrowSize = 15;
  // Up
  ctx.beginPath();
  ctx.moveTo(dpadX, dpadY - 30);
  ctx.lineTo(dpadX - arrowSize, dpadY - 15);
  ctx.lineTo(dpadX + arrowSize, dpadY - 15);
  ctx.fill();
  // Down
  ctx.beginPath();
  ctx.moveTo(dpadX, dpadY + 30);
  ctx.lineTo(dpadX - arrowSize, dpadY + 15);
  ctx.lineTo(dpadX + arrowSize, dpadY + 15);
  ctx.fill();
  // Left
  ctx.beginPath();
  ctx.moveTo(dpadX - 30, dpadY);
  ctx.lineTo(dpadX - 15, dpadY - arrowSize);
  ctx.lineTo(dpadX - 15, dpadY + arrowSize);
  ctx.fill();
  // Right
  ctx.beginPath();
  ctx.moveTo(dpadX + 30, dpadY);
  ctx.lineTo(dpadX + 15, dpadY - arrowSize);
  ctx.lineTo(dpadX + 15, dpadY + arrowSize);
  ctx.fill();

  // Action button
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(actionX, actionY, ACTION_SIZE / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.floor(ACTION_SIZE * 0.3) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PUMP', actionX, actionY + ACTION_SIZE * 0.1);

  ctx.globalAlpha = 1;
}

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();

  if (state === 'title') { startGame(); return; }
  if (state === 'tutorial') { state = 'playing'; return; }
  if (state === 'gameOver') { state = 'title'; return; }
  if (state === 'bossIntro') return;

  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var touch = e.changedTouches[ti];
    var pos = getTouchPos(touch);
    var dpadX = DPAD_MARGIN + DPAD_SIZE / 2;
    var dpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
    var actionX = W - DPAD_MARGIN - ACTION_SIZE / 2;
    var actionY = H - DPAD_MARGIN - ACTION_SIZE / 2;

    var adx = pos.x - actionX, ady = pos.y - actionY;
    if (adx * adx + ady * ady < ACTION_SIZE * ACTION_SIZE) {
      touchAction.active = true;
      inputPump = true;
      tryPump();
      continue;
    }

    var ddx = pos.x - dpadX, ddy = pos.y - dpadY;
    if (ddx * ddx + ddy * ddy < DPAD_SIZE * DPAD_SIZE) {
      touchDpad.active = true;
      if (Math.abs(ddx) > Math.abs(ddy)) {
        inputDir = ddx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        inputDir = ddy > 0 ? DIR.DOWN : DIR.UP;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  for (var ti = 0; ti < e.changedTouches.length; ti++) {
    var touch = e.changedTouches[ti];
    var pos = getTouchPos(touch);
    var dpadX = DPAD_MARGIN + DPAD_SIZE / 2;
    var dpadY = H - DPAD_MARGIN - DPAD_SIZE / 2;
    var ddx = pos.x - dpadX, ddy = pos.y - dpadY;
    if (ddx * ddx + ddy * ddy < DPAD_SIZE * DPAD_SIZE * 2) {
      if (Math.abs(ddx) > Math.abs(ddy)) {
        inputDir = ddx > 0 ? DIR.RIGHT : DIR.LEFT;
      } else {
        inputDir = ddy > 0 ? DIR.DOWN : DIR.UP;
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    inputDir = DIR.NONE;
    inputPump = false;
    touchDpad.active = false;
    touchAction.active = false;
  }
}, { passive: false });

// ============================================================
// KEYBOARD INPUT (NES-style controls)
// ============================================================
window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    // C opens the baseling picker
    if (e.code === 'KeyC') {
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if ((e.code === 'KeyW') && window.NftLoader && !window.NftLoader.wallet && window.ethereum) {
      window.NftLoader.connectWallet().then(function(addr) {
        if (addr) window.NftLoader.checkNFTs().then(function(chars) {
          if (chars.length > 0) window.NftLoader.selectedCharacter = chars[0];
        });
      });
      return;
    }
    startGame();
    return;
  }
  if (state === 'tutorial') {
    state = 'playing';
    return;
  }
  if (state === 'gameOver') {
    state = 'title';
    return;
  }

  // NES-style: Arrows, WASD, or IJKL
  if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'KeyI') inputDir = DIR.UP;
  else if (e.code === 'ArrowRight' || e.code === 'KeyD' || e.code === 'KeyL') inputDir = DIR.RIGHT;
  else if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'KeyK') inputDir = DIR.DOWN;
  else if (e.code === 'ArrowLeft' || e.code === 'KeyA' || e.code === 'KeyJ') inputDir = DIR.LEFT;

  // Space, Z, or X for pump (NES A/B buttons)
  if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyX') {
    e.preventDefault();
    inputPump = true;
    tryPump();
  }
});

window.addEventListener('keyup', function(e) {
  keys[e.code] = false;

  // Update direction based on remaining held keys
  if (keys['ArrowUp'] || keys['KeyW'] || keys['KeyI']) inputDir = DIR.UP;
  else if (keys['ArrowRight'] || keys['KeyD'] || keys['KeyL']) inputDir = DIR.RIGHT;
  else if (keys['ArrowDown'] || keys['KeyS'] || keys['KeyK']) inputDir = DIR.DOWN;
  else if (keys['ArrowLeft'] || keys['KeyA'] || keys['KeyJ']) inputDir = DIR.LEFT;
  else inputDir = DIR.NONE;

  if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyX') inputPump = false;
});

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  score = 0;
  lives = 3 + getBonusLives();
  level = 1;
  genDirtTextures();
  initLevel();
  if (!tutorialShown) {
    tutorialShown = true;
    state = 'tutorial';
  } else {
    state = 'playing';
  }
}

function nextLevel() {
  level++;
  genDirtTextures();
  initLevel();
  if (state !== 'bossIntro') {
    state = 'playing';
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
var lastTime = 0;

function gameLoop(timestamp) {
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  frame++; // global animation clock for baseling sprite animation

  // Clear
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake
  updateShake(dt);
  if (shakeX !== 0 || shakeY !== 0) {
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  if (state === 'title') {
    drawTitle();
  } else if (state === 'tutorial') {
    drawTutorial();
  } else if (state === 'playing') {
    movePlayer(dt);
    updateBugs(dt);
    updateRocks(dt);
    updateHazards(dt);
    updateTimers(dt);
    updateParticles(dt);
    updateFlash(dt);
    updateScorePopups(dt);
    if (zoneTransitionAlpha > 0) zoneTransitionAlpha -= dt * 0.8;

    drawGrid();
    drawPowerups();
    drawRocks();
    for (var bi = 0; bi < bugs.length; bi++) drawBug(bugs[bi]);
    drawPlayer();
    drawParticles();
    drawScorePopups();
    drawFlash();
    drawZoneTransition();
    drawHUD();
    drawTouchControls();
  } else if (state === 'dying') {
    stateTimer -= dt;
    updateParticles(dt);
    updateFlash(dt);
    updateScorePopups(dt);

    drawGrid();
    drawPowerups();
    drawRocks();
    for (var di = 0; di < bugs.length; di++) drawBug(bugs[di]);
    drawParticles();
    drawScorePopups();
    drawFlash();
    drawHUD();

    if (stateTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('seafloor_hi', String(highScore)); } catch(e) { console.warn('localStorage save failed'); }
        }
        SFX.gameOver();
      } else {
        player.dead = false;
        player.x = 1;
        player.y = 2;
        player.px = 1 * TILE;
        player.py = 4 * TILE;
        player.invincible = 2;
        player.pumping = false;
        player.pumpTarget = null;
        state = 'playing';
      }
    }
  } else if (state === 'levelComplete') {
    stateTimer -= dt;
    updateParticles(dt);
    updateScorePopups(dt);

    drawGrid();
    drawRocks();
    drawPlayer();
    drawParticles();
    drawScorePopups();
    drawHUD();
    drawLevelComplete();

    if (stateTimer <= 0) {
      nextLevel();
    }
  } else if (state === 'gameOver') {
    drawGrid();
    drawRocks();
    drawHUD();
    drawGameOver();
  } else if (state === 'bossIntro') {
    stateTimer -= dt;
    drawGrid();
    drawRocks();
    drawPlayer();
    drawHUD();
    drawBossIntro();

    if (stateTimer <= 0) {
      state = 'playing';
      SFX.bossRoar();
      triggerShake(8, 0.4);
    }
  }

  // Undo shake transform
  if (shakeX !== 0 || shakeY !== 0) {
    ctx.restore();
  }

  requestAnimationFrame(gameLoop);
}

// Kick off
genDirtTextures();
requestAnimationFrame(gameLoop);

})();
</script>
