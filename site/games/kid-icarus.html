  for (var i = 0; i < shieldCount; i++) {
    var angle = shieldAngle + (i / shieldCount) * Math.PI * 2;
    var sx = Math.floor(player.x + player.w / 2 + Math.cos(angle) * 16);
    var sy = Math.floor(player.y + player.h / 2 + Math.sin(angle) * 16);
    ctx.beginPath();
    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(68,170,255,0.3)';
    ctx.beginPath();
    ctx.arc(sx, sy, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#44aaff';
  }
}

function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(20, 40, GW - 40, GH - 100);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BLACK MARKET', Math.floor(GW / 2), 62);

  ctx.fillStyle = '#ff88aa';
  ctx.font = '9px monospace';
  ctx.fillText('Hearts: ' + heartCount, Math.floor(GW / 2), 78);

  for (var i = 0; i < SHOP_ITEMS.length; i++) {
    var item = SHOP_ITEMS[i];
    var iy = 96 + i * 28;
    var selected = i === shopCursor;

    ctx.fillStyle = selected ? '#ffdd44' : '#888888';
    ctx.font = (selected ? 'bold ' : '') + '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText((selected ? '> ' : '  ') + item.name, 35, iy);
    ctx.textAlign = 'right';
    ctx.fillText(item.cost + ' H', GW - 35, iy);
    ctx.textAlign = 'left';
    ctx.fillStyle = selected ? '#aaaaaa' : '#666666';
    ctx.font = '7px monospace';
    ctx.fillText(item.desc, 50, iy + 11);
    if (heartCount < item.cost) {
      ctx.fillStyle = '#ff4444';
      ctx.font = '7px monospace';
      ctx.fillText('(need more hearts)', 50, iy + 19);
    }
  }

  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('UP/DOWN: browse  JUMP/SHOOT: buy  LEFT+DOWN: exit', Math.floor(GW / 2), GH - 70);
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 24);

  // HP
  for (var i = 0; i < maxHp; i++) {
    var hx = 4 + i * 10;
    if (i < hp) {
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(hx, 4, 8, 8);
      ctx.fillStyle = '#ff8888';
      ctx.fillRect(hx + 1, 5, 3, 3);
    } else {
      ctx.fillStyle = '#442222';
      ctx.fillRect(hx, 4, 8, 8);
    }
  }

  // Hearts (currency)
  ctx.fillStyle = '#ff88aa';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('H:' + heartCount, Math.floor(GW / 2), 13);

  // Score with INT multiplier shown
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString(), GW - 4, 13);

  // Zone name
  var zoneName = (ZONE_NAMES[world] || ['???'])[Math.min(stage, 3)];
  ctx.fillStyle = '#88aacc';
  ctx.textAlign = 'left';
  ctx.font = '7px monospace';
  ctx.fillText(zoneName, 4, 20);

  // Arrow level + weapon indicator
  var weaponNames = ['Bow', 'Spore', 'Bolt'];
  ctx.fillStyle = currentWeapon === 2 ? '#44aaff' : (currentWeapon === 1 ? '#44ff44' : (arrowLevel >= 3 ? '#ff6600' : (arrowLevel >= 2 ? '#44ddff' : '#aaaaaa')));
  ctx.textAlign = 'right';
  ctx.font = '7px monospace';
  ctx.fillText(weaponNames[currentWeapon] + ':' + arrowLevel, GW - 4, 20);

  // Charge indicator
  if (isCharging) {
    var chargeW = Math.min(40, chargeTimer * 50);
    ctx.fillStyle = '#333';
    ctx.fillRect(Math.floor(GW / 2 - 20), 17, 40, 4);
    ctx.fillStyle = currentWeapon === 2 ? '#44aaff' : (currentWeapon === 1 ? '#44ff44' : '#ffdd44');
    ctx.fillRect(Math.floor(GW / 2 - 20), 17, Math.floor(chargeW), 4);
  }

  // Status icons
  if (hasFeather && !featherUsed) {
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'right';
    ctx.fillText('F', Math.floor(GW / 2 + 30), 20);
  }
  if (hasBarrel) {
    ctx.fillStyle = '#ffaa00';
    ctx.textAlign = 'right';
    ctx.fillText('B', Math.floor(GW / 2 + 20), 20);
  }
  if (shieldCount > 0) {
    ctx.fillStyle = '#44aaff';
    ctx.textAlign = 'right';
    ctx.fillText('S' + shieldCount, Math.floor(GW / 2 - 20), 13);
  }
  if (isEggplant) {
    ctx.fillStyle = '#8844aa';
    ctx.textAlign = 'center';
    ctx.font = '7px monospace';
    ctx.fillText('CURSED!', Math.floor(GW / 2), 20);
  }

  // Stat bonuses indicator (subtle)
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44ddff';
    ctx.globalAlpha = 0.5;
    ctx.textAlign = 'left';
    ctx.font = '6px monospace';
    ctx.fillText('Lv.' + statB.level, 4, GH - 4);
    ctx.globalAlpha = 1;
  }
}

function drawTransition() {
  var w = WORLDS[world] || WORLDS[0];

  // Fade effect based on phase
  if (transitionPhase === 0) {
    // Closing iris
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    var irisSize = Math.max(0, transitionTimer - 2) * GW * 4;
    ctx.fillStyle = (WORLDS[Math.max(0, world - (stage === 0 ? 1 : 0))] || WORLDS[0]).bg;
    ctx.beginPath();
    ctx.arc(Math.floor(GW / 2), Math.floor(GH / 2), irisSize, 0, Math.PI * 2);
    ctx.fill();
  } else if (transitionPhase === 1) {
    // Zone info screen
    ctx.fillStyle = '#0a0a18';
    ctx.fillRect(0, 0, GW, GH);

    // World glow color
    ctx.fillStyle = w.glow || '#ffffff';
    ctx.globalAlpha = 0.05;
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;

    ctx.textAlign = 'center';

    // World name
    ctx.fillStyle = w.glow || '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(w.name, Math.floor(GW / 2), Math.floor(GH * 0.30));

    // Zone name
    var zoneName = (ZONE_NAMES[world] || ['???'])[Math.min(stage, 3)];
    ctx.fillStyle = '#ffffff';
    ctx.font = '11px monospace';
    ctx.fillText(zoneName, Math.floor(GW / 2), Math.floor(GH * 0.42));

    // Stage info
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '9px monospace';
    var stageNames = ['Stage 1', 'Stage 2', 'Stage 3', 'Fortress'];
    ctx.fillText(stageNames[stage] || 'Stage ' + (stage + 1), Math.floor(GW / 2), Math.floor(GH * 0.52));

    ctx.fillStyle = '#666666';
    ctx.font = '8px monospace';
    ctx.fillText('World ' + (world + 1) + ' of 4', Math.floor(GW / 2), Math.floor(GH * 0.60));

    // Decorative line
    ctx.fillStyle = w.glow || '#ffdd44';
    ctx.fillRect(Math.floor(GW * 0.2), Math.floor(GH * 0.34), Math.floor(GW * 0.6), 1);
  } else {
    // Opening iris to new world
    ctx.fillStyle = w.bg;
    ctx.fillRect(0, 0, GW, GH);
    ctx.fillStyle = '#000';
    var openSize = Math.max(0, (0.8 - transitionTimer)) * GW * 3;
    // Draw black overlay with circular hole
    ctx.beginPath();
    ctx.rect(0, 0, GW, GH);
    ctx.arc(Math.floor(GW / 2), Math.floor(GH / 2), openSize, 0, Math.PI * 2, true);
    ctx.fill();
  }

  // Loading dots
  var dots = '.'.repeat(Math.floor(frame * 0.05) % 4);
  ctx.fillStyle = '#444';
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  ctx.fillText('Entering' + dots, Math.floor(GW / 2), Math.floor(GH * 0.75));
}

function drawVictoryScreen() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < 80; i++) {
    var sx = Math.floor((i * 37 + frame * 0.3) % GW);
    var sy = Math.floor((i * 53 + frame * 0.1) % GH);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Victory particles
  if (frame % 8 === 0) {
    var px = Math.random() * GW;
    TAS.particles.spawn(Math.floor(px), GH, '#ffdd44', 3, 2, { gravity: -1 });
  }

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('VICTORY!', Math.floor(GW / 2), Math.floor(GH * 0.2));

  ctx.fillStyle = '#ffffff';
  ctx.font = '10px monospace';
  ctx.fillText('The Spore Medusa is vanquished!', Math.floor(GW / 2), Math.floor(GH * 0.32));
  ctx.fillText('The Reactor Skyworld is restored!', Math.floor(GW / 2), Math.floor(GH * 0.38));

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('SCORE: ' + score, Math.floor(GW / 2), Math.floor(GH * 0.52));

  if (score >= highScore && score > 0) {
    var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(GW / 2), Math.floor(GH * 0.6));
    ctx.globalAlpha = 1;
  }

  // Draw triumphant angel
  var cx = Math.floor(GW / 2);
  var cy = Math.floor(GH * 0.75);
  var bob = Math.floor(Math.sin(frame * 0.04) * 3);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx - 12, cy - 4 + bob, 8, 12);
  ctx.fillRect(cx + 5, cy - 4 + bob, 8, 12);
  ctx.fillStyle = '#eeddcc';
  ctx.fillRect(cx - 5, cy - 6 + bob, 10, 14);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx - 6, cy + 2 + bob, 12, 8);
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(cx - 7, cy - 12 + bob, 14, 3);

  var pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('PRESS ANY KEY', Math.floor(GW / 2), Math.floor(GH * 0.93));
  ctx.globalAlpha = 1;
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
