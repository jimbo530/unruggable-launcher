<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kid Icarus</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === STAT B LOADING ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44ddff', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) { console.warn('statB load failed:', e); }

// === STAT HELPER FUNCTIONS ===
function strDmgMult() { return 1 + (statB.str - 10) * 0.05; }
function dexSpeedMult() { return 1 + (statB.dex - 10) * 0.03; }
function conHpMult() { return 1 + (statB.con - 10) * 0.06; }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisFireRateMult() { return 1 + (statB.wis - 10) * 0.03; }
function chaDropChance() { return Math.min(0.5, 0.08 + (statB.cha - 10) * 0.02) * statB.luck; }
function canChargeShot() { return statB.str >= 10; }

// === GAME CONSTANTS ===
const GW = 256, GH = 384;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'SHOOT' } });

const TILE = 16;
const COLS = Math.floor(GW / TILE);
const ROWS = Math.floor(GH / TILE);
const GRAVITY = 600;
const JUMP_VEL = -280;
const BASE_MOVE_SPEED = 90;
const MAX_FALL = 350;
const BASE_ARROW_SPEED = 250;
const INVULN_TIME = 1.5;
const BASE_SHOOT_COOLDOWN = 0.25;

// === GAME STATE ===
let state = 'title';
let score = 0;
let highScore = TAS.score.load('kidicarus_hi');
let frame = 0;
let player = null;
let camera = { x: 0, y: 0 };
let platforms = [];
let enemies = [];
let arrows = [];
let hearts = [];
let doors = [];
let particles_game = [];
let hazards = [];

// World/stage tracking
let world = 0;
let stage = 0;
let stageType = 'vertical';
let scrollProgress = 0;
let maxScroll = 0;
let levelLength = 0;
let levelComplete = false;
let deathTimer = 0;
let bossActive = null;
let transitionTimer = 0;
let transitionPhase = 0;

// Player stats
let hp = 5;
let maxHp = 5;
let heartCount = 0;
let arrowLevel = 1;
let hasFeather = false;
let featherUsed = false;
let hasBarrel = false;
let barrelTimer = 0;
let shieldCount = 0;
let shieldAngle = 0;
let isEggplant = false;
let eggplantTimer = 0;
let chargeTimer = 0;
let isCharging = false;
let currentWeapon = 0; // 0=arrow, 1=spore arrow, 2=reactor bolt

// Screen shake state
let shakeX = 0;
let shakeY = 0;

// Zone names (Tasern-themed)
const ZONE_NAMES = [
  ['Spore Caverns', 'Mycelial Depths', 'Fungal Abyss', 'Reactor Core'],
  ['Verdant Canopy', 'Symbiote Trail', 'Living Forest', 'Hive Nexus'],
  ['Reactor Skyworld', 'Cloud Spires', 'Aether Fields', 'Sky Citadel'],
  ['Medusa\'s Domain', 'Petrified Gate', 'Stone Garden', 'Palace of Snakes']
];

// World definitions (Tasern-themed)
const WORLDS = [
  { name: 'SPORE UNDERWORLD', type: 'vertical', bg: '#080812', platform: '#3a2a1a', accent: '#5a4a2a', sky: '#040408', glow: '#22aa44' },
  { name: 'MYCELIAL OVERWORLD', type: 'horizontal', bg: '#0a1a08', platform: '#2a5a2a', accent: '#4a8a4a', sky: '#0a2a0a', glow: '#44cc44' },
  { name: 'REACTOR SKYWORLD', type: 'vertical', bg: '#0a1a3a', platform: '#8899bb', accent: '#bbccee', sky: '#1a3a6a', glow: '#44aaff' },
  { name: 'MEDUSA\'S PALACE', type: 'horizontal', bg: '#1a0a1a', platform: '#6a4a8a', accent: '#aa6acc', sky: '#0c0418', glow: '#aa44cc' }
];

// Shop items
const SHOP_ITEMS = [
  { name: 'Arrow+', desc: 'Upgrade bow', cost: 30, action: function() { arrowLevel = Math.min(4, arrowLevel + 1); } },
  { name: 'HP Up', desc: '+1 Max HP', cost: 50, action: function() { maxHp = Math.min(8, maxHp + 1); hp = maxHp; } },
  { name: 'Shield', desc: 'Orbit guard', cost: 40, action: function() { shieldCount = Math.min(3, shieldCount + 1); } },
  { name: 'Feather', desc: 'Save from fall', cost: 60, action: function() { hasFeather = true; featherUsed = false; } },
  { name: 'Barrel', desc: '360 fire!', cost: 45, action: function() { hasBarrel = true; barrelTimer = 8; } },
  { name: 'Spore Bow', desc: 'Poison arrows', cost: 35, action: function() { currentWeapon = 1; } },
  { name: 'Reactor Bow', desc: 'Energy bolts', cost: 55, action: function() { currentWeapon = 2; } }
];

let shopOpen = false;
let shopCursor = 0;

// === PLAYER CREATION ===
function createPlayer(x, y) {
  return {
    x: x, y: y, w: 12, h: 14,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    jumping: false,
    invuln: 0,
    animFrame: 0,
    animTimer: 0,
    shootCooldown: 0,
    wingFlap: 0
  };
}

// === LEVEL GENERATION ===
function generateLevel() {
  platforms = [];
  enemies = [];
  arrows = [];
  hearts = [];
  doors = [];
  particles_game = [];
  hazards = [];
  bossActive = null;
  levelComplete = false;
  isEggplant = false;

  var w = WORLDS[world];
  stageType = w.type;
  if (stage === 3) stageType = 'fortress';

  if (stageType === 'vertical') {
    levelLength = 80 * TILE;
    generateVerticalLevel();
  } else if (stageType === 'horizontal') {
    levelLength = 120 * TILE;
    generateHorizontalLevel();
  } else {
    levelLength = 60 * TILE;
    generateFortress();
  }
}

function generateVerticalLevel() {
  var numPlatforms = 60 + world * 10;
  var lastY = GH - 40;

  platforms.push({ x: Math.floor(GW / 2 - 30), y: lastY, w: 60, h: 8, type: 'solid' });

  for (var i = 0; i < numPlatforms; i++) {
    var gap = 30 + Math.random() * 35;
    lastY -= gap;
    var pw = 28 + Math.random() * 36;
    var px = Math.floor(Math.random() * (GW - pw));
    var type = Math.random() < 0.08 ? 'crumble' : 'solid';
    platforms.push({ x: Math.floor(px), y: Math.floor(lastY), w: Math.floor(pw), h: 8, type: type, crumbleTimer: 0 });

    if (Math.random() < 0.25 && i > 3) {
      spawnEnemy(Math.floor(px + pw / 2), Math.floor(lastY - 16));
    }

    // Hazards: goo waterfalls and spore clouds
    if (Math.random() < 0.1 && i > 2) {
      hazards.push({
        x: Math.floor(px + Math.random() * pw),
        y: Math.floor(lastY - 40 - Math.random() * 30),
        w: 12, h: 40,
        type: world <= 1 ? 'goo_waterfall' : 'spore_cloud',
        timer: Math.random() * 6
      });
    }

    if (Math.random() < 0.06 && i > 5 && i < numPlatforms - 5) {
      doors.push({ x: Math.floor(px + pw / 2 - 8), y: Math.floor(lastY - 24), w: 16, h: 24, type: 'shop' });
    }
  }

  platforms.push({ x: Math.floor(GW / 2 - 24), y: Math.floor(lastY - 50), w: 48, h: 8, type: 'exit' });

  player = createPlayer(Math.floor(GW / 2 - 6), GH - 60);
  camera.y = 0;
  maxScroll = 0;
  scrollProgress = 0;
}

function generateHorizontalLevel() {
  var numSections = 30 + world * 5;
  var lastX = 40;
  var baseY = GH - 60;

  for (var i = 0; i < numSections; i++) {
    var pw = 40 + Math.random() * 80;
    var py = baseY + (Math.random() - 0.5) * 30;
    platforms.push({ x: Math.floor(lastX), y: Math.floor(py), w: Math.floor(pw), h: 8, type: 'solid' });

    if (Math.random() < 0.4) {
      platforms.push({
        x: Math.floor(lastX + Math.random() * pw * 0.5),
        y: Math.floor(py - 50 - Math.random() * 40),
        w: Math.floor(24 + Math.random() * 24),
        h: 8,
        type: 'solid'
      });
    }

    if (Math.random() < 0.3 && i > 2) {
      spawnEnemy(Math.floor(lastX + pw / 2), Math.floor(py - 18));
    }

    // Hazards
    if (Math.random() < 0.12 && i > 2) {
      hazards.push({
        x: Math.floor(lastX + Math.random() * pw),
        y: Math.floor(py - 20),
        w: 20, h: 20,
        type: Math.random() < 0.5 ? 'goo_waterfall' : 'spore_cloud',
        timer: Math.random() * 6
      });
    }

    if (Math.random() < 0.05 && i > 3 && i < numSections - 3) {
      doors.push({ x: Math.floor(lastX + pw / 2 - 8), y: Math.floor(py - 24), w: 16, h: 24, type: 'shop' });
    }

    lastX += pw + 20 + Math.random() * 30;
  }

  platforms.push({ x: Math.floor(lastX + 20), y: Math.floor(baseY), w: 48, h: 8, type: 'exit' });

  player = createPlayer(60, Math.floor(baseY - 20));
  camera.x = 0;
  scrollProgress = 0;
}

function generateFortress() {
  var rooms = 8 + world * 2;
  var rx = 0;

  for (var r = 0; r < rooms; r++) {
    var roomX = rx;
    var roomW = GW;
    var roomH = GH;

    platforms.push({ x: roomX, y: roomH - 16, w: roomW, h: 16, type: 'solid' });
    platforms.push({ x: roomX, y: 0, w: roomW, h: 16, type: 'solid' });
    platforms.push({ x: roomX, y: 0, w: 16, h: roomH, type: 'solid' });
    platforms.push({ x: roomX + roomW - 16, y: 0, w: 16, h: roomH, type: 'solid' });

    var numPlats = 3 + Math.floor(Math.random() * 3);
    for (var p = 0; p < numPlats; p++) {
      platforms.push({
        x: Math.floor(roomX + 30 + Math.random() * (roomW - 80)),
        y: Math.floor(50 + Math.random() * (roomH - 120)),
        w: Math.floor(30 + Math.random() * 40),
        h: 8,
        type: 'solid'
      });
    }

    if (r < rooms - 1) {
      platforms[platforms.length - 3].w = 16;
    }

    if (r > 0) {
      spawnEnemy(Math.floor(roomX + roomW / 2), Math.floor(roomH / 2));
      if (Math.random() < 0.4) spawnEnemy(Math.floor(roomX + roomW * 0.3), Math.floor(roomH * 0.6));
    }

    // Fortress hazards
    if (r > 1 && Math.random() < 0.3) {
      hazards.push({
        x: Math.floor(roomX + roomW * 0.4),
        y: Math.floor(roomH * 0.3),
        w: 16, h: 30,
        type: 'spore_cloud',
        timer: Math.random() * 6
      });
    }

    rx += roomW;
  }

  var bossX = Math.floor(rx + GW / 2);
  platforms.push({ x: rx, y: GH - 16, w: GW, h: 16, type: 'solid' });
  spawnBoss(bossX, GH - 60);

  player = createPlayer(40, GH - 40);
  camera.x = 0;
  stageType = 'horizontal';
  levelLength = rx + GW;
}

// === ENEMY SPAWNING ===
function spawnEnemy(x, y) {
  var worldEnemies = [
    ['snake', 'bat', 'reaper', 'reactor_harpy'],
    ['centaur', 'boar', 'nymph', 'mycelial_serpent'],
    ['sunball', 'flying', 'reaper', 'spore_medusa'],
    ['centaur', 'flying', 'eggplant', 'reactor_harpy']
  ];
  var pool = worldEnemies[world] || worldEnemies[0];
  var type = pool[Math.floor(Math.random() * pool.length)];

  var enemy = {
    x: x, y: y, w: 14, h: 14,
    type: type, hp: 2 + world,
    vx: (Math.random() < 0.5 ? -1 : 1) * (30 + Math.random() * 20),
    vy: 0,
    animFrame: 0,
    animTimer: 0,
    startX: x, startY: y,
    alert: false,
    alertTimer: 0,
    shootTimer: 0,
    poisoned: false,
    poisonTimer: 0,
    stunTimer: 0
  };

  if (type === 'reaper') {
    enemy.hp = 5 + world;
    enemy.w = 16;
    enemy.h = 18;
    enemy.patrolDir = 1;
    enemy.alert = false;
  }
  if (type === 'eggplant') {
    enemy.hp = 3;
    enemy.shootTimer = 2;
  }
  if (type === 'bat' || type === 'flying') {
    enemy.vy = -20;
    enemy.flyAngle = Math.random() * Math.PI * 2;
  }
  if (type === 'reactor_harpy') {
    enemy.hp = 4 + world;
    enemy.w = 16;
    enemy.h = 16;
    enemy.flyAngle = Math.random() * Math.PI * 2;
    enemy.diveCooldown = 2;
    enemy.diving = false;
  }
  if (type === 'spore_medusa') {
    enemy.hp = 6 + world;
    enemy.w = 18;
    enemy.h = 18;
    enemy.shootTimer = 1.5;
    enemy.flyAngle = Math.random() * Math.PI * 2;
  }
  if (type === 'mycelial_serpent') {
    enemy.hp = 5 + world;
    enemy.w = 20;
    enemy.h = 12;
    enemy.segments = [];
    for (var s = 0; s < 4; s++) {
      enemy.segments.push({ x: x - s * 6, y: y });
    }
  }

  enemies.push(enemy);
}

function spawnBoss(x, y) {
  var bossTypes = ['twinbellows', 'hewdraw', 'pandora', 'medusa'];
  var type = bossTypes[world] || 'twinbellows';

  var baseHp = 20 + world * 10;
  bossActive = {
    x: x, y: y, w: 32, h: 32,
    type: type,
    hp: baseHp,
    maxHp: baseHp,
    vx: 0, vy: 0,
    phase: 0,
    timer: 0,
    animFrame: 0,
    attackTimer: 2,
    enraged: false,
    sporeTimer: 0,
    reactorGlow: 0
  };
}

// === SOUND EFFECTS ===
function sfxArrow() { TAS.audio.playTone(880, 0.08, 'triangle', 0.08, 440); }
function sfxHit() { TAS.audio.playNoise(0.1, 0.06, 800); }
function sfxHeartCollect() { TAS.audio.playTone(1200, 0.08, 'sine', 0.06); TAS.audio.playTone(1600, 0.08, 'sine', 0.05); }
function sfxReaperAlert() { TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 800); }
function sfxShop() { TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100); }
function sfxBossRoar() { TAS.audio.playTone(80, 0.5, 'sawtooth', 0.12, 40); TAS.audio.playNoise(0.3, 0.08, 200); }
function sfxDeath() { TAS.audio.playMelody([[440, 0.2], [392, 0.2], [349, 0.2], [330, 0.3]], 200); }
function sfxJump() { TAS.audio.playTone(300, 0.08, 'square', 0.04, 500); }
function sfxPurchase() { TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.08], [1047, 0.15]], 80); }
function sfxLevelClear() { TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2], [1047, 0.1], [784, 0.1], [1047, 0.3]], 120); }
function sfxChargedShot() { TAS.audio.playTone(440, 0.15, 'sawtooth', 0.12, 880); TAS.audio.playTone(660, 0.1, 'triangle', 0.08); }
function sfxSporeHit() { TAS.audio.playTone(200, 0.12, 'sine', 0.06, 100); TAS.audio.playNoise(0.08, 0.04, 400); }
function sfxReactorBolt() { TAS.audio.playTone(600, 0.1, 'square', 0.1, 1200); }
function sfxHarpyDive() { TAS.audio.playTone(500, 0.15, 'sawtooth', 0.08, 200); }
function sfxPetrify() { TAS.audio.playTone(150, 0.3, 'square', 0.1, 80); }

// === MAIN GAME START ===
function startGame() {
  state = 'playing';
  score = 0;
  world = 0;
  stage = 0;
  var baseHp = Math.floor(5 * conHpMult());
  hp = baseHp;
  maxHp = baseHp;
  heartCount = 0;
  arrowLevel = 1;
  hasFeather = false;
  featherUsed = false;
  hasBarrel = false;
  barrelTimer = 0;
  shieldCount = 0;
  isEggplant = false;
  shopOpen = false;
  chargeTimer = 0;
  isCharging = false;
  currentWeapon = 0;
  TAS.particles.clear();
  generateLevel();
}

function nextStage() {
  stage++;
  if (stage > 3) {
    stage = 0;
    world++;
    if (world > 3) {
      state = 'victory';
      if (score > highScore) {
        highScore = score;
        TAS.score.save('kidicarus_hi', score);
      }
      return;
    }
  }
  transitionTimer = 2.5;
  transitionPhase = 0;
  state = 'transition';
}

// === INPUT HELPERS (NES-style) ===
function keyLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function keyRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function keyUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function keyDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function keyJump() { return TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.keys['KeyK'] || TAS.input.touch.a; }
function keyShoot() { return TAS.input.keys['KeyX'] || TAS.input.keys['ShiftLeft'] || TAS.input.keys['KeyJ'] || TAS.input.touch.b; }
function keySelect() { return TAS.input.keys['ShiftRight'] || TAS.input.keys['KeyQ']; }

let jumpPressed = false;
let shootPressed = false;
let prevJump = false;
let prevShoot = false;
let prevSelect = false;

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
        state = 'title';
      }
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'transition') {
    transitionTimer -= dt;
    // Phase progression for transition animation
    if (transitionTimer < 1.8 && transitionPhase === 0) transitionPhase = 1;
    if (transitionTimer < 0.8 && transitionPhase === 1) transitionPhase = 2;
    if (transitionTimer <= 0) {
      state = 'playing';
      generateLevel();
    }
    return;
  }

  if (state === 'playing') {
    if (shopOpen) {
      updateShop(dt);
      return;
    }
    // Weapon select with Select button
    var selectNow = keySelect();
    if (selectNow && !prevSelect) {
      currentWeapon = (currentWeapon + 1) % 3;
    }
    prevSelect = selectNow;

    updatePlayer(dt);
    updateEnemies(dt);
    updateArrows(dt);
    updateHearts(dt);
    updateBoss(dt);
    updateShields(dt);
    updateHazards(dt);
    checkDoors();
    checkLevelComplete();
  }
}

// === HAZARD UPDATE ===
function updateHazards(dt) {
  if (!player) return;
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    h.timer += dt;
    var hx = h.x - camera.x;
    var hy = h.y - camera.y;
    if (hx + h.w < -50 || hx > GW + 50 || hy + h.h < -50 || hy > GH + 50) continue;

    // Spore cloud pulses
    if (h.type === 'spore_cloud') {
      var pulse = Math.sin(h.timer * 2) * 0.5 + 0.5;
      var effectW = h.w + pulse * 8;
      var effectH = h.h + pulse * 8;
      if (player.invuln <= 0 && TAS.hit.rectOverlap(
        player.x, player.y, player.w, player.h,
        hx - effectW / 2 + h.w / 2, hy - effectH / 2 + h.h / 2, effectW, effectH
      )) {
        damagePlayer(1);
        TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y), '#88ff44', 6, 1.5);
      }
    }

    // Goo waterfall - constant damage zone
    if (h.type === 'goo_waterfall') {
      if (player.invuln <= 0 && TAS.hit.rectOverlap(
        player.x, player.y, player.w, player.h,
        hx, hy, h.w, h.h
      )) {
        damagePlayer(1);
        // Slow player
        if (player.vy > 0) player.vy *= 0.7;
      }
      // Drip particles
      if (frame % 8 === 0) {
        TAS.particles.spawn(Math.floor(hx + Math.random() * h.w), Math.floor(hy + h.h), '#44cc44', 2, 0.8, { gravity: 1 });
      }
    }
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  if (!player) return;

  jumpPressed = keyJump() && !prevJump;
  shootPressed = keyShoot() && !prevShoot;
  prevJump = keyJump();
  prevShoot = keyShoot();

  // Eggplant state
  if (isEggplant) {
    eggplantTimer -= dt;
    if (eggplantTimer <= 0) isEggplant = false;
  }

  // Movement with DEX speed bonus
  var moveSpeed = BASE_MOVE_SPEED * dexSpeedMult();
  player.vx = 0;
  if (!isEggplant) {
    if (keyLeft()) { player.vx = -moveSpeed; player.facing = -1; }
    if (keyRight()) { player.vx = moveSpeed; player.facing = 1; }
  } else {
    if (keyLeft()) { player.vx = -moveSpeed * 0.6; player.facing = -1; }
    if (keyRight()) { player.vx = moveSpeed * 0.6; player.facing = 1; }
  }

  // Jump
  if (jumpPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    player.jumping = true;
    sfxJump();
  }

  // Variable jump height (NES-style: release early = shorter jump)
  if (!keyJump() && player.vy < JUMP_VEL * 0.4) {
    player.vy = JUMP_VEL * 0.4;
  }

  // Gravity
  player.vy += GRAVITY * dt;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx * dt;

  // Screen wrap (vertical stages only)
  if (stageType === 'vertical') {
    if (player.x + player.w < 0) player.x = GW;
    if (player.x > GW) player.x = -player.w;
  } else {
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > levelLength) player.x = levelLength - player.w;
  }

  // Move Y
  player.y += player.vy * dt;
  player.onGround = false;

  // Platform collisions
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'crumble' && p.crumbleTimer > 0.5) continue;

    var px = p.x - camera.x;
    var py = p.y - camera.y;

    if (player.vy >= 0 &&
        player.x + player.w > p.x - camera.x &&
        player.x < p.x - camera.x + p.w &&
        player.y + player.h >= py &&
        player.y + player.h <= py + p.h + player.vy * dt + 4) {
      player.y = py - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumping = false;

      if (p.type === 'crumble' && p.crumbleTimer === 0) {
        p.crumbleTimer = 0.01;
      }
    }
  }

  // Crumble platform timers
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'crumble' && p.crumbleTimer > 0) {
      p.crumbleTimer += dt;
    }
  }

  // Charge shot mechanic (STR >= 10)
  if (keyShoot() && !isEggplant && canChargeShot()) {
    chargeTimer += dt;
    isCharging = chargeTimer > 0.4;
    // Charge particles
    if (isCharging && frame % 4 === 0) {
      var angle = Math.random() * Math.PI * 2;
      var dist = 12 + Math.random() * 8;
      TAS.particles.spawn(
        Math.floor(player.x + player.w / 2 + Math.cos(angle) * dist),
        Math.floor(player.y + player.h / 2 + Math.sin(angle) * dist),
        currentWeapon === 2 ? '#44aaff' : (currentWeapon === 1 ? '#44ff44' : '#ffdd44'),
        1, 0.3
      );
    }
  } else {
    if (isCharging && chargeTimer > 0.4) {
      fireChargedShot();
      chargeTimer = 0;
      isCharging = false;
    } else {
      chargeTimer = 0;
      isCharging = false;
    }
  }

  // Normal shooting with WIS fire rate bonus
  var cooldown = BASE_SHOOT_COOLDOWN / wisFireRateMult();
  if (shootPressed && !isEggplant && player.shootCooldown <= 0 && !isCharging) {
    fireArrow();
    player.shootCooldown = cooldown;
  }
  if (player.shootCooldown > 0) player.shootCooldown -= dt;

  // Barrel mode
  if (hasBarrel) {
    barrelTimer -= dt;
    if (barrelTimer <= 0) hasBarrel = false;
    if (frame % 8 === 0) {
      for (var a = 0; a < 8; a++) {
        var angle = (a / 8) * Math.PI * 2;
        arrows.push({
          x: Math.floor(player.x + player.w / 2),
          y: Math.floor(player.y + player.h / 2),
          vx: Math.cos(angle) * BASE_ARROW_SPEED,
          vy: Math.sin(angle) * BASE_ARROW_SPEED,
          damage: Math.floor(arrowLevel * strDmgMult() * statB.damage),
          life: 0.6,
          weapon: currentWeapon
        });
      }
      sfxArrow();
    }
  }

  // Camera update
  if (stageType === 'vertical') {
    var targetY = player.y - GH * 0.6;
    if (targetY < camera.y) {
      camera.y = targetY;
      if (camera.y < maxScroll) maxScroll = camera.y;
    }
    if (player.y > camera.y + GH + 20) {
      if (hasFeather && !featherUsed) {
        featherUsed = true;
        player.vy = JUMP_VEL * 1.5;
        player.y = camera.y + GH - 40;
        TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y + player.h), '#fff', 10, 2);
      } else {
        playerDeath();
      }
    }
  } else {
    camera.x = Math.max(0, player.x - GW * 0.35);
    camera.x = Math.min(camera.x, levelLength - GW);
    if (player.y > GH + 40) {
      playerDeath();
    }
  }

  // Invulnerability
  if (player.invuln > 0) player.invuln -= dt;

  // Animation
  player.animTimer += dt;
  if (player.animTimer > 0.12) {
    player.animTimer = 0;
    player.animFrame = (player.animFrame + 1) % 4;
  }
  player.wingFlap += dt * 12;
}

function fireArrow() {
  var vx = 0, vy = 0;
  var speed = BASE_ARROW_SPEED;
  if (stageType === 'vertical') {
    vy = -speed;
    if (keyLeft()) vx = -speed * 0.3;
    if (keyRight()) vx = speed * 0.3;
  } else {
    vx = speed * player.facing;
    if (keyUp()) vy = -speed * 0.7;
  }

  var dmg = Math.floor(arrowLevel * strDmgMult() * statB.damage);
  if (currentWeapon === 2) dmg = Math.floor(dmg * 1.3); // Reactor bolt bonus

  arrows.push({
    x: Math.floor(player.x + player.w / 2),
    y: Math.floor(player.y + 2),
    vx: vx,
    vy: vy,
    damage: dmg,
    life: 0.8 + arrowLevel * 0.2,
    weapon: currentWeapon,
    poison: currentWeapon === 1 // Spore arrows poison
  });

  if (currentWeapon === 2) sfxReactorBolt();
  else sfxArrow();
}

function fireChargedShot() {
  var vx = 0, vy = 0;
  var speed = BASE_ARROW_SPEED * 1.5;
  if (stageType === 'vertical') {
    vy = -speed;
    if (keyLeft()) vx = -speed * 0.3;
    if (keyRight()) vx = speed * 0.3;
  } else {
    vx = speed * player.facing;
    if (keyUp()) vy = -speed * 0.5;
  }

  var dmg = Math.floor(arrowLevel * 3 * strDmgMult() * statB.damage);
  arrows.push({
    x: Math.floor(player.x + player.w / 2),
    y: Math.floor(player.y + 2),
    vx: vx,
    vy: vy,
    damage: dmg,
    life: 1.2,
    weapon: currentWeapon,
    charged: true,
    poison: currentWeapon === 1,
    size: 8
  });

  sfxChargedShot();
  gameShake(3, 0.9);
  TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y + 2),
    currentWeapon === 2 ? '#44aaff' : (currentWeapon === 1 ? '#44ff44' : '#ffdd44'), 12, 2);
}

function gameShake(intensity, decay) {
  TAS.fx.shake(intensity, decay);
  shakeX = (Math.random() - 0.5) * intensity;
  shakeY = (Math.random() - 0.5) * intensity;
}

function playerDeath() {
  hp--;
  TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y + player.h / 2), '#ff4444', 15, 3, { gravity: 1 });
  gameShake(8, 0.82);
  TAS.fx.flash('#ff0000', 0.4);
  sfxDeath();

  if (hp <= 0) {
    state = 'gameOver';
    deathTimer = 1.5;
    if (score > highScore) {
      highScore = score;
      TAS.score.save('kidicarus_hi', score);
    }
  } else {
    if (stageType === 'vertical') {
      player.x = Math.floor(GW / 2 - 6);
      player.y = Math.floor(camera.y + GH * 0.5);
      player.vy = 0;
    } else {
      player.x = Math.floor(Math.max(40, player.x - 80));
      player.y = Math.floor(GH / 2 - 40);
      player.vy = 0;
    }
    player.invuln = INVULN_TIME;
  }
}

function damagePlayer(dmg) {
  if (player.invuln > 0) return;

  if (shieldCount > 0) {
    shieldCount--;
    TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y + player.h / 2), '#44aaff', 8, 2);
    player.invuln = 0.5;
    return;
  }

  hp -= dmg;
  gameShake(5, 0.85);
  TAS.fx.flash('#ff0000', 0.3);
  sfxHit();
  player.invuln = INVULN_TIME;

  if (hp <= 0) {
    state = 'gameOver';
    deathTimer = 1.5;
    if (score > highScore) {
      highScore = score;
      TAS.score.save('kidicarus_hi', score);
    }
  }
}

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.animTimer += dt;
    if (e.animTimer > 0.15) {
      e.animTimer = 0;
      e.animFrame = (e.animFrame + 1) % 4;
    }

    // Poison damage over time
    if (e.poisoned) {
      e.poisonTimer -= dt;
      if (e.poisonTimer <= 0) {
        e.poisoned = false;
      } else if (frame % 30 === 0) {
        e.hp -= 1;
        TAS.particles.spawn(Math.floor(e.x - camera.x + e.w / 2), Math.floor(e.y - camera.y), '#44ff44', 3, 0.5);
        if (e.hp <= 0) {
          var heartVal = 5;
          hearts.push({ x: Math.floor(e.x - camera.x), y: Math.floor(e.y - camera.y), value: heartVal, vy: -100, life: 5 });
          score += Math.floor(heartVal * 10 * intScoreMult());
          TAS.particles.spawn(Math.floor(e.x - camera.x + e.w / 2), Math.floor(e.y - camera.y + e.h / 2), '#44ff44', 10, 3, { gravity: 1 });
          enemies.splice(i, 1);
          continue;
        }
      }
    }

    // Stun
    if (e.stunTimer > 0) {
      e.stunTimer -= dt;
      continue;
    }

    var screenX = e.x - camera.x;
    var screenY = e.y - camera.y;
    if (screenX < -100 || screenX > GW + 100 || screenY < -100 || screenY > GH + 100) continue;

    switch (e.type) {
      case 'snake':
        e.x += e.vx * dt;
        if (e.x < e.startX - 40 || e.x > e.startX + 40) e.vx *= -1;
        break;

      case 'bat':
      case 'flying':
        e.flyAngle += dt * 3;
        e.x = e.startX + Math.sin(e.flyAngle) * 30;
        e.y = e.startY + Math.cos(e.flyAngle * 0.7) * 20;
        break;

      case 'reaper':
        e.x += e.patrolDir * 35 * dt;
        if (e.x < e.startX - 50 || e.x > e.startX + 50) e.patrolDir *= -1;
        if (!e.alert && player) {
          var dx = Math.abs(player.x - screenX);
          var dy = Math.abs(player.y - screenY);
          if (dx < 60 && dy < 80) {
            e.alert = true;
            e.alertTimer = 3;
            sfxReaperAlert();
            gameShake(3, 0.9);
            for (var r = 0; r < 3; r++) {
              enemies.push({
                x: Math.floor(e.x + (Math.random() - 0.5) * 20),
                y: Math.floor(e.y - 20),
                w: 8, h: 8,
                type: 'minireaper',
                hp: 1,
                vx: 0, vy: 0,
                animFrame: 0, animTimer: 0,
                startX: e.x, startY: e.y,
                alert: false, alertTimer: 0, shootTimer: 0,
                poisoned: false, poisonTimer: 0, stunTimer: 0
              });
            }
          }
        }
        if (e.alert) {
          e.alertTimer -= dt;
          if (e.alertTimer <= 0) e.alert = false;
        }
        break;

      case 'minireaper':
        if (player) {
          var dx = player.x - screenX;
          var dy = player.y - screenY;
          var dist = Math.sqrt(dx * dx + dy * dy) || 1;
          e.x += (dx / dist) * 80 * dt;
          e.y += (dy / dist) * 80 * dt;
        }
        break;

      case 'centaur':
        e.x += e.vx * dt;
        if (e.x < e.startX - 60 || e.x > e.startX + 60) e.vx *= -1;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && player) {
          e.shootTimer = 2 + Math.random();
          var dx = player.x - screenX;
          var dy = player.y - screenY;
          var dist = Math.sqrt(dx * dx + dy * dy) || 1;
          arrows.push({
            x: Math.floor(e.x), y: Math.floor(e.y),
            vx: (dx / dist) * 120,
            vy: (dy / dist) * 120,
            damage: -1,
            life: 2,
            weapon: -1
          });
        }
        break;

      case 'boar':
        e.x += e.vx * dt * 1.5;
        if (e.x < e.startX - 80 || e.x > e.startX + 80) e.vx *= -1;
        break;

      case 'nymph':
        e.flyAngle = (e.flyAngle || 0) + dt * 2;
        e.y = e.startY + Math.sin(e.flyAngle) * 25;
        e.x += e.vx * dt * 0.5;
        if (e.x < e.startX - 40 || e.x > e.startX + 40) e.vx *= -1;
        break;

      case 'sunball':
        e.flyAngle = (e.flyAngle || 0) + dt * 4;
        e.x = e.startX + Math.cos(e.flyAngle) * 35;
        e.y = e.startY + Math.sin(e.flyAngle) * 35;
        break;

      case 'eggplant':
        e.x += e.vx * dt * 0.4;
        if (e.x < e.startX - 30 || e.x > e.startX + 30) e.vx *= -1;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && player) {
          e.shootTimer = 2.5;
          var dx = player.x - screenX;
          var dy = player.y - screenY;
          var dist = Math.sqrt(dx * dx + dy * dy) || 1;
          arrows.push({
            x: Math.floor(e.x), y: Math.floor(e.y),
            vx: (dx / dist) * 100,
            vy: (dy / dist) * 100,
            damage: -2,
            life: 3,
            weapon: -1
          });
        }
        break;

      // === TASERN ENEMIES ===
      case 'reactor_harpy':
        e.flyAngle += dt * 2.5;
        e.x = e.startX + Math.sin(e.flyAngle) * 40;
        e.y = e.startY + Math.cos(e.flyAngle * 0.6) * 25;
        e.diveCooldown -= dt;
        if (!e.diving && e.diveCooldown <= 0 && player) {
          var dx = Math.abs(player.x - screenX);
          if (dx < 30 && player.y > screenY) {
            e.diving = true;
            e.vy = 200;
            sfxHarpyDive();
          }
        }
        if (e.diving) {
          e.y += e.vy * dt;
          if (e.y > e.startY + 80) {
            e.diving = false;
            e.diveCooldown = 2 + Math.random();
            e.y = e.startY;
          }
        }
        // Trail particles
        if (frame % 6 === 0) {
          TAS.particles.spawn(Math.floor(screenX + e.w / 2), Math.floor(screenY + e.h), '#ff8844', 2, 0.4);
        }
        break;

      case 'spore_medusa':
        e.flyAngle += dt * 1.5;
        e.x = e.startX + Math.sin(e.flyAngle) * 25;
        e.y = e.startY + Math.cos(e.flyAngle * 0.8) * 15;
        e.shootTimer -= dt;
        if (e.shootTimer <= 0 && player) {
          e.shootTimer = 2;
          // Petrify beam - fires in 3 directions
          for (var a = -1; a <= 1; a++) {
            var angle = Math.atan2(player.y - screenY, player.x - screenX) + a * 0.4;
            arrows.push({
              x: Math.floor(e.x), y: Math.floor(e.y),
              vx: Math.cos(angle) * 100,
              vy: Math.sin(angle) * 100,
              damage: -3, // petrify
              life: 2,
              weapon: -1
            });
          }
          sfxPetrify();
          // Spore cloud effect
          TAS.particles.spawn(Math.floor(screenX + e.w / 2), Math.floor(screenY + e.h / 2), '#88ff44', 8, 1.5);
        }
        break;

      case 'mycelial_serpent':
        e.x += e.vx * dt;
        if (e.x < e.startX - 60 || e.x > e.startX + 60) e.vx *= -1;
        e.flyAngle = (e.flyAngle || 0) + dt * 3;
        e.y = e.startY + Math.sin(e.flyAngle) * 10;
        // Update segments to follow head
        if (e.segments) {
          for (var s = 0; s < e.segments.length; s++) {
            var target = s === 0 ? e : e.segments[s - 1];
            var sdx = target.x - e.segments[s].x;
            var sdy = target.y - e.segments[s].y;
            e.segments[s].x += sdx * 0.3;
            e.segments[s].y += sdy * 0.3;
          }
        }
        break;
    }

    // Collision with player
    if (player && player.invuln <= 0) {
      if (TAS.hit.rectOverlap(
        player.x, player.y, player.w, player.h,
        screenX, screenY, e.w, e.h
      )) {
        damagePlayer(1);
      }
    }
  }
}

// === ARROW UPDATE ===
function updateArrows(dt) {
  for (var i = arrows.length - 1; i >= 0; i--) {
    var a = arrows[i];
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.life -= dt;

    if (a.life <= 0) {
      arrows.splice(i, 1);
      continue;
    }

    // Player arrows hit enemies
    if (a.damage > 0) {
      var arrowSize = a.charged ? (a.size || 8) : 4;
      for (var j = enemies.length - 1; j >= 0; j--) {
        var e = enemies[j];
        var ex = e.x - camera.x;
        var ey = e.y - camera.y;
        if (TAS.hit.rectOverlap(a.x, a.y, arrowSize, arrowSize, ex, ey, e.w, e.h)) {
          e.hp -= a.damage;

          // Spore arrow poison
          if (a.poison && !e.poisoned) {
            e.poisoned = true;
            e.poisonTimer = 3;
            sfxSporeHit();
            TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#44ff44', 6, 1.5);
          }

          // Reactor bolt stun
          if (a.weapon === 2) {
            e.stunTimer = 0.5;
            TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#44aaff', 8, 2);
          }

          TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#ffaa00', 5, 2);
          if (a.charged) {
            gameShake(4, 0.88);
            TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#ffdd44', 12, 3, { gravity: 0.5 });
          }
          sfxHit();
          arrows.splice(i, 1);

          if (e.hp <= 0) {
            var baseHeartVal = e.type === 'reaper' ? 10 : (e.type === 'minireaper' ? 1 : 5);
            if (e.type === 'reactor_harpy') baseHeartVal = 8;
            if (e.type === 'spore_medusa') baseHeartVal = 12;
            if (e.type === 'mycelial_serpent') baseHeartVal = 10;

            // CHA drop chance for bonus hearts
            var dropRoll = Math.random();
            if (dropRoll < chaDropChance()) {
              baseHeartVal = Math.floor(baseHeartVal * 1.5);
            }

            hearts.push({ x: Math.floor(ex), y: Math.floor(ey), value: baseHeartVal, vy: -100, life: 5 });
            TAS.particles.spawn(Math.floor(ex + e.w / 2), Math.floor(ey + e.h / 2), '#ff4444', 10, 3, { gravity: 1 });
            score += Math.floor(baseHeartVal * 10 * intScoreMult());
            enemies.splice(j, 1);

            // Extra drops from CHA
            if (dropRoll < chaDropChance() * 0.5) {
              hearts.push({ x: Math.floor(ex + 8), y: Math.floor(ey - 8), value: 5, vy: -120, life: 5 });
            }
          }
          break;
        }
      }

      // Player arrows hit boss
      if (bossActive && a.damage > 0) {
        var bx = bossActive.x - camera.x;
        var by = bossActive.y - camera.y;
        if (TAS.hit.rectOverlap(a.x, a.y, arrowSize, arrowSize, bx, by, bossActive.w, bossActive.h)) {
          bossActive.hp -= a.damage;
          TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#ffff00', 8, 3);
          if (a.charged) {
            gameShake(6, 0.85);
            TAS.particles.spawn(Math.floor(a.x), Math.floor(a.y), '#ffffff', 15, 4, { gravity: 0.3 });
          } else {
            gameShake(2, 0.9);
          }
          sfxHit();
          arrows.splice(i, 1);

          // Boss enraged at half HP
          if (!bossActive.enraged && bossActive.hp <= bossActive.maxHp * 0.5) {
            bossActive.enraged = true;
            gameShake(10, 0.8);
            TAS.fx.flash('#ff4400', 0.5);
            sfxBossRoar();
          }

          if (bossActive.hp <= 0) {
            var bossScore = Math.floor(500 * (world + 1) * intScoreMult());
            score += bossScore;
            TAS.particles.spawn(Math.floor(bx + bossActive.w / 2), Math.floor(by + bossActive.h / 2), '#ffdd00', 30, 5, { gravity: 0.5 });
            gameShake(12, 0.75);
            TAS.fx.flash('#ffffff', 0.8);
            sfxLevelClear();
            bossActive = null;
            levelComplete = true;
          }
          continue;
        }
      }
    }

    // Enemy arrows hit player
    if (a.damage < 0 && player && player.invuln <= 0) {
      if (TAS.hit.rectOverlap(a.x, a.y, 6, 6, player.x, player.y, player.w, player.h)) {
        if (a.damage === -2) {
          // Eggplant curse
          isEggplant = true;
          eggplantTimer = 8;
          TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y), '#8844aa', 10, 2);
        } else if (a.damage === -3) {
          // Petrify (Spore Medusa) - brief stun + damage
          damagePlayer(1);
          player.vx = 0;
          player.vy = 0;
          TAS.particles.spawn(Math.floor(player.x + player.w / 2), Math.floor(player.y + player.h / 2), '#888888', 12, 2);
          gameShake(4, 0.88);
        } else {
          damagePlayer(1);
        }
        arrows.splice(i, 1);
      }
    }
  }
}

// === HEARTS UPDATE ===
function updateHearts(dt) {
  for (var i = hearts.length - 1; i >= 0; i--) {
    var h = hearts[i];
    h.vy += 200 * dt;
    h.y += h.vy * dt;
    h.life -= dt;

    if (h.life <= 0) {
      hearts.splice(i, 1);
      continue;
    }

    if (player && TAS.hit.rectOverlap(
      player.x, player.y, player.w, player.h,
      h.x, h.y, 10, 10
    )) {
      heartCount += h.value;
      score += Math.floor(h.value * 5 * intScoreMult());
      sfxHeartCollect();
      TAS.particles.spawn(Math.floor(h.x + 5), Math.floor(h.y + 5), '#ff66aa', 5, 1.5);
      hearts.splice(i, 1);
    }
  }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!bossActive || !player) return;

  bossActive.timer += dt;
  bossActive.animFrame = Math.floor(bossActive.timer * 4) % 4;
  bossActive.attackTimer -= dt;
  bossActive.reactorGlow = (bossActive.reactorGlow + dt * 3) % (Math.PI * 2);

  var bx = bossActive.x - camera.x;
  var by = bossActive.y - camera.y;
  var enrageSpeedMult = bossActive.enraged ? 1.5 : 1;
  var enrageFireMult = bossActive.enraged ? 0.6 : 1;

  switch (bossActive.type) {
    case 'twinbellows':
      if (bossActive.phase === 0) {
        bossActive.vx = 80 * enrageSpeedMult * (player.x > bx ? 1 : -1);
        if (bossActive.timer > 2) { bossActive.phase = 1; bossActive.timer = 0; }
      } else {
        bossActive.vx = 150 * enrageSpeedMult * (player.x > bx ? 1 : -1);
        if (bossActive.timer > 1) { bossActive.phase = 0; bossActive.timer = 0; }
      }
      bossActive.x += bossActive.vx * dt;
      if (bossActive.attackTimer <= 0) {
        bossActive.attackTimer = 1.5 * enrageFireMult;
        arrows.push({
          x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
          vx: (player.x - bx) * 0.8, vy: (player.y - by) * 0.8,
          damage: -1, life: 2, weapon: -1
        });
        sfxBossRoar();
        // Enraged: fire in two directions
        if (bossActive.enraged) {
          arrows.push({
            x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
            vx: -(player.x - bx) * 0.5, vy: (player.y - by) * 0.5 - 80,
            damage: -1, life: 2, weapon: -1
          });
        }
      }
      // Fire trail when enraged
      if (bossActive.enraged && frame % 4 === 0) {
        TAS.particles.spawn(Math.floor(bx + bossActive.w / 2), Math.floor(by + bossActive.h), '#ff4400', 3, 0.6, { gravity: -0.5 });
      }
      break;

    case 'hewdraw':
      bossActive.x += Math.sin(bossActive.timer * 2) * 100 * enrageSpeedMult * dt;
      bossActive.y += Math.cos(bossActive.timer * 1.5) * 60 * enrageSpeedMult * dt;
      if (bossActive.attackTimer <= 0) {
        bossActive.attackTimer = 1 * enrageFireMult;
        var spreadCount = bossActive.enraged ? 5 : 3;
        for (var a = 0; a < spreadCount; a++) {
          var angle = Math.atan2(player.y - by, player.x - bx) + (a - Math.floor(spreadCount / 2)) * 0.25;
          arrows.push({
            x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
            vx: Math.cos(angle) * 140 * enrageSpeedMult, vy: Math.sin(angle) * 140 * enrageSpeedMult,
            damage: -1, life: 2.5, weapon: -1
          });
        }
        gameShake(2, 0.92);
      }
      // Spore trail
      if (frame % 5 === 0) {
        TAS.particles.spawn(Math.floor(bx + bossActive.w / 2), Math.floor(by + bossActive.h), '#2266aa', 2, 0.8);
      }
      break;

    case 'pandora':
      bossActive.x += Math.sin(bossActive.timer * 3) * 80 * enrageSpeedMult * dt;
      bossActive.y += Math.cos(bossActive.timer * 2) * 50 * enrageSpeedMult * dt;
      if (bossActive.attackTimer <= 0) {
        bossActive.attackTimer = 0.8 * enrageFireMult;
        var numShots = bossActive.enraged ? 8 : 5;
        for (var a = 0; a < numShots; a++) {
          var angle = (a / numShots) * Math.PI * 2 + bossActive.timer;
          arrows.push({
            x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
            vx: Math.cos(angle) * 100 * enrageSpeedMult, vy: Math.sin(angle) * 100 * enrageSpeedMult,
            damage: -1, life: 2, weapon: -1
          });
        }
        // Reactor pulse visual
        TAS.particles.spawn(Math.floor(bx + bossActive.w / 2), Math.floor(by + bossActive.h / 2), '#cc66ff', 10, 2);
      }
      // Teleport when enraged
      if (bossActive.enraged && Math.floor(bossActive.timer * 2) % 6 === 0 && Math.random() < 0.02) {
        bossActive.x = camera.x + Math.random() * (GW - bossActive.w);
        TAS.particles.spawn(Math.floor(bx + bossActive.w / 2), Math.floor(by + bossActive.h / 2), '#ffffff', 15, 2);
        gameShake(3, 0.9);
      }
      break;

    case 'medusa':
      bossActive.x += Math.sin(bossActive.timer) * 60 * enrageSpeedMult * dt;
      if (bossActive.enraged) {
        bossActive.y += Math.cos(bossActive.timer * 2) * 40 * dt;
        if (bossActive.attackTimer <= 0) {
          bossActive.attackTimer = 0.4;
          var angle = Math.atan2(player.y - by, player.x - bx);
          arrows.push({
            x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
            vx: Math.cos(angle) * 180, vy: Math.sin(angle) * 180,
            damage: -3, life: 2, weapon: -1
          });
          // Petrify wave
          if (frame % 60 === 0) {
            for (var a = 0; a < 12; a++) {
              var wa = (a / 12) * Math.PI * 2;
              arrows.push({
                x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
                vx: Math.cos(wa) * 80, vy: Math.sin(wa) * 80,
                damage: -1, life: 2, weapon: -1
              });
            }
            gameShake(6, 0.85);
            sfxBossRoar();
          }
        }
      } else {
        if (bossActive.attackTimer <= 0) {
          bossActive.attackTimer = 1.2;
          arrows.push({
            x: Math.floor(bx + bossActive.w / 2), y: Math.floor(by + bossActive.h / 2),
            vx: (player.x - bx) * 0.6, vy: (player.y - by) * 0.6,
            damage: -1, life: 2.5, weapon: -1
          });
        }
      }
      // Snake hair particles
      if (frame % 6 === 0) {
        TAS.particles.spawn(
          Math.floor(bx + Math.random() * bossActive.w),
          Math.floor(by - 4),
          '#44aa44', 2, 0.5
        );
      }
      break;
  }

  // Boss collision with player
  if (player.invuln <= 0) {
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, bx, by, bossActive.w, bossActive.h)) {
      damagePlayer(2);
    }
  }
}

// === SHIELD UPDATE ===
function updateShields(dt) {
  shieldAngle += dt * 4;
}

// === SHOP ===
function checkDoors() {
  if (!player) return;
  for (var i = 0; i < doors.length; i++) {
    var d = doors[i];
    var dx = d.x - camera.x;
    var dy = d.y - camera.y;
    if (keyUp() && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, dx, dy, d.w, d.h)) {
      shopOpen = true;
      shopCursor = 0;
      sfxShop();
      break;
    }
  }
}

function updateShop(dt) {
  if (keyDown() && frame % 10 === 0) shopCursor = (shopCursor + 1) % SHOP_ITEMS.length;
  if (keyUp() && frame % 10 === 0) shopCursor = (shopCursor - 1 + SHOP_ITEMS.length) % SHOP_ITEMS.length;

  if (jumpPressed || shootPressed) {
    var item = SHOP_ITEMS[shopCursor];
    if (heartCount >= item.cost) {
      heartCount -= item.cost;
      item.action();
      sfxPurchase();
      TAS.particles.spawn(Math.floor(GW / 2), Math.floor(GH / 2), '#ffdd00', 15, 3);
    }
  }

  if (keyDown() && keyLeft()) {
    shopOpen = false;
  }
}

// === LEVEL COMPLETE ===
function checkLevelComplete() {
  if (levelComplete) return;
  if (!player) return;

  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.type === 'exit') {
      var px = p.x - camera.x;
      var py = p.y - camera.y;
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, px, py, p.w, p.h)) {
        levelComplete = true;
        sfxLevelClear();
        score += Math.floor(100 * (world + 1) * intScoreMult());
        setTimeout(function() { nextStage(); }, 1500);
      }
    }
  }
}

// === DRAW ===
function draw(dt) {
  var w = WORLDS[world] || WORLDS[0];
  ctx.fillStyle = w.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: (ZONE_NAMES[world] || ['???'])[Math.min(stage, 3)] });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  if (state === 'transition') {
    drawTransition();
    return;
  }

  if (state === 'playing') {
    ctx.save();
    TAS.fx.applyShake();

    drawBackground();
    drawHazards();
    drawPlatforms();
    drawDoors();
    drawHearts();
    drawEnemies();
    drawBoss();
    drawArrows();
    drawPlayer();
    drawShields();

    TAS.particles.draw();
    ctx.restore();

    TAS.fx.drawFlash(GW, GH);

    if (shopOpen) {
      drawShop();
    }

    drawHUD();
    TAS.input.drawTouchControls(GW, GH);
  }
}

// === DRAW FUNCTIONS ===
function drawTitleScreen() {
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (var i = 0; i < 80; i++) {
    var sx = Math.floor((i * 97 + frame * 0.2) % GW);
    var sy = Math.floor((i * 53 + frame * 0.1) % GH);
    var brightness = Math.sin(frame * 0.03 + i) * 0.3 + 0.7;
    ctx.globalAlpha = brightness;
    ctx.fillStyle = i % 3 === 0 ? '#ffffff' : (i % 5 === 0 ? '#aaccff' : '#666688');
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Spore particles floating up
  for (var i = 0; i < 15; i++) {
    var spx = Math.floor((i * 43 + frame * 0.5) % GW);
    var spy = Math.floor(GH - ((i * 71 + frame * 0.8) % GH));
    ctx.fillStyle = 'rgba(68,255,68,0.2)';
    ctx.beginPath();
    ctx.arc(spx, spy, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw angel character
  var cx = Math.floor(GW / 2);
  var cy = Math.floor(GH * 0.4);
  var bob = Math.floor(Math.sin(frame * 0.05) * 4);

  // Wings
  ctx.fillStyle = '#ffffff';
  var wingSpread = Math.floor(Math.sin(frame * 0.08) * 4);
  ctx.fillRect(cx - 14 - wingSpread, cy - 4 + bob, 8, 12);
  ctx.fillRect(cx + 8 + wingSpread, cy - 4 + bob, 8, 12);

  // Body
  ctx.fillStyle = '#eeddcc';
  ctx.fillRect(cx - 5, cy - 6 + bob, 10, 14);

  // Toga
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx - 6, cy + 2 + bob, 12, 8);

  // Hair
  ctx.fillStyle = '#885522';
  ctx.fillRect(cx - 5, cy - 10 + bob, 10, 6);

  // Bow (colored by statB)
  ctx.fillStyle = statB.color || '#ddaa33';
  ctx.fillRect(cx + 6, cy - 2 + bob, 12, 2);
  ctx.fillRect(cx + 16, cy - 6 + bob, 2, 10);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('KID ICARUS', cx + 1, 51);
  ctx.fillStyle = '#44ddff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('KID ICARUS', cx, 50);

  ctx.fillStyle = '#8888aa';
  ctx.font = '9px monospace';
  ctx.fillText('A Tasern Tale', cx, 68);

  // Zone preview
  ctx.fillStyle = '#555';
  ctx.font = '7px monospace';
  ctx.fillText('Spore Underworld . Mycelial Overworld', cx, Math.floor(GH * 0.70));
  ctx.fillText('Reactor Skyworld . Medusa\'s Palace', cx, Math.floor(GH * 0.74));

  // Stat display
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44ddff';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name + ' Lv.' + statB.level, cx, Math.floor(GH * 0.80));
    ctx.fillStyle = '#666';
    ctx.font = '7px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, cx, Math.floor(GH * 0.84));
  }

  // Controls
  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  ctx.fillText('ARROWS/WASD: Move  Z/K: Jump  X/J: Shoot', cx, Math.floor(GH * 0.88));
  ctx.fillText('HOLD SHOOT: Charge  Q: Switch Weapon', cx, Math.floor(GH * 0.91));

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#aa8833';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, cx, Math.floor(GH * 0.95));
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('PRESS ANY KEY TO START', cx, Math.floor(GH * 0.98));
  ctx.globalAlpha = 1;
}

function drawBackground() {
  var w = WORLDS[world];

  if (world === 0) {
    // Spore Underworld - dark with bioluminescent mushrooms and fungal columns
    ctx.fillStyle = '#100810';
    for (var i = 0; i < 8; i++) {
      var bx = Math.floor(((i * 70) - camera.x * 0.2) % (GW + 40) - 20);
      var by = (stageType === 'vertical') ? Math.floor(((i * 90) - camera.y * 0.3) % (GH + 40)) : Math.floor(GH - 60 - i * 15);
      ctx.fillRect(bx, by, 8, 60);
      // Mushroom cap glow
      ctx.fillStyle = 'rgba(34,170,68,0.15)';
      ctx.beginPath();
      ctx.arc(bx + 4, by - 2, 8, 0, Math.PI * 2);
      ctx.fill();
      // Bioluminescent dots
      ctx.fillStyle = '#22aa44';
      var glowPulse = Math.sin(frame * 0.04 + i * 1.2) * 0.4 + 0.6;
      ctx.globalAlpha = glowPulse;
      ctx.fillRect(bx + 2, by + 10, 2, 2);
      ctx.fillRect(bx + 5, by + 25, 2, 2);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#100810';
    }
    // Spore particles
    ctx.fillStyle = 'rgba(68,255,68,0.12)';
    for (var i = 0; i < 10; i++) {
      var spx = Math.floor((i * 37 + frame * 0.3) % GW);
      var spy = (stageType === 'vertical') ? Math.floor(((i * 60) - camera.y * 0.1) % GH) : Math.floor((i * 50 + frame * 0.4) % GH);
      ctx.beginPath();
      ctx.arc(spx, spy, 2 + Math.sin(frame * 0.05 + i) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (world === 1) {
    // Mycelial Overworld - living fungal forest
    for (var i = 0; i < 10; i++) {
      var bx = Math.floor(((i * 55) - camera.x * 0.15) % (GW + 30) - 15);
      // Fungal trunks
      ctx.fillStyle = '#1a3a0a';
      ctx.fillRect(bx, Math.floor(GH - 80 - Math.abs(Math.sin(i)) * 40), 10, 60);
      // Mushroom caps
      var capY = Math.floor(GH - 90 - Math.abs(Math.sin(i)) * 40);
      ctx.fillStyle = '#2a6a1a';
      ctx.beginPath();
      ctx.arc(bx + 5, capY, 14, Math.PI, 0);
      ctx.fill();
      // Mycelial network lines
      ctx.fillStyle = 'rgba(68,204,68,0.08)';
      ctx.fillRect(bx - 10, capY + 50, 30, 1);
      // Spore dust
      var dustY = Math.floor(capY - 5 + Math.sin(frame * 0.03 + i) * 3);
      ctx.fillStyle = 'rgba(136,255,136,0.2)';
      ctx.fillRect(bx + 3, dustY, 2, 2);
    }
  } else if (world === 2) {
    // Reactor Skyworld - tech-enhanced clouds with reactor glow
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (var i = 0; i < 12; i++) {
      var bx = Math.floor(((i * 60 + frame * 0.3) - camera.x * 0.1) % (GW + 50) - 25);
      var by = (stageType === 'vertical') ? Math.floor(((i * 80) - camera.y * 0.2) % GH) : Math.floor(30 + i * 25);
      ctx.beginPath();
      ctx.arc(bx, by, 15 + i % 5 * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    // Reactor energy lines
    ctx.fillStyle = 'rgba(68,170,255,0.1)';
    for (var i = 0; i < 6; i++) {
      var ly = Math.floor(((i * 80) - camera.y * 0.15) % GH);
      ctx.fillRect(0, ly, GW, 1);
      // Energy nodes
      var nx = Math.floor((i * 47 + frame * 0.5) % GW);
      ctx.fillStyle = 'rgba(68,170,255,' + (Math.sin(frame * 0.05 + i) * 0.15 + 0.15) + ')';
      ctx.beginPath();
      ctx.arc(nx, ly, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(68,170,255,0.1)';
    }
  } else {
    // Medusa's Palace - petrified columns and snake motifs
    ctx.fillStyle = '#2a1a2a';
    for (var i = 0; i < 6; i++) {
      var bx = Math.floor(((i * 80) - camera.x * 0.2) % (GW + 40) - 20);
      ctx.fillRect(bx, 0, 10, GH);
      // Column capitals
      ctx.fillStyle = '#3a2a3a';
      ctx.fillRect(bx - 3, 0, 16, 6);
      ctx.fillRect(bx - 3, GH - 6, 16, 6);
      ctx.fillStyle = '#2a1a2a';
    }
    // Snake eyes in darkness
    for (var i = 0; i < 8; i++) {
      var ex = Math.floor((i * 67) % GW);
      var ey = Math.floor((i * 89) % GH);
      var blink = Math.sin(frame * 0.02 + i * 2) > 0.8;
      if (blink) {
        ctx.fillStyle = 'rgba(255,68,68,0.3)';
        ctx.fillRect(ex, ey, 2, 1);
        ctx.fillRect(ex + 4, ey, 2, 1);
      }
    }
    // Stars
    ctx.fillStyle = '#ddaaff';
    for (var i = 0; i < 30; i++) {
      var sx = Math.floor((i * 37 + frame * 0.1) % GW);
      var sy = Math.floor((i * 71) % GH);
      ctx.fillRect(sx, sy, 1, 1);
    }
  }
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    var hx = Math.floor(h.x - camera.x);
    var hy = Math.floor(h.y - camera.y);
    if (hx + h.w < -20 || hx > GW + 20 || hy + h.h < -20 || hy > GH + 20) continue;

    if (h.type === 'goo_waterfall') {
      // Dripping green goo
      var wobble = Math.sin(h.timer * 3) * 2;
      ctx.fillStyle = 'rgba(34,170,34,0.5)';
      ctx.fillRect(hx + wobble, hy, h.w, h.h);
      ctx.fillStyle = 'rgba(68,255,68,0.3)';
      ctx.fillRect(hx + 2 + wobble, hy, h.w - 4, h.h);
      // Glow at top
      ctx.fillStyle = 'rgba(68,255,68,0.2)';
      ctx.beginPath();
      ctx.arc(hx + h.w / 2, hy, 8, 0, Math.PI * 2);
      ctx.fill();
      // Drip animation
      var dripY = Math.floor(hy + (h.timer * 40) % h.h);
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(hx + h.w / 2 - 1, dripY, 3, 4);
    } else if (h.type === 'spore_cloud') {
      // Pulsing toxic cloud
      var pulse = Math.sin(h.timer * 2) * 0.3 + 0.7;
      var radius = (h.w / 2 + 4) * pulse;
      ctx.fillStyle = 'rgba(136,255,68,' + (0.15 * pulse) + ')';
      ctx.beginPath();
      ctx.arc(hx + h.w / 2, hy + h.h / 2, radius + 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(68,200,68,' + (0.25 * pulse) + ')';
      ctx.beginPath();
      ctx.arc(hx + h.w / 2, hy + h.h / 2, radius, 0, Math.PI * 2);
      ctx.fill();
      // Inner particles
      for (var p = 0; p < 3; p++) {
        var pa = h.timer * 2 + p * 2;
        var ppx = Math.floor(hx + h.w / 2 + Math.cos(pa) * radius * 0.5);
        var ppy = Math.floor(hy + h.h / 2 + Math.sin(pa) * radius * 0.5);
        ctx.fillStyle = 'rgba(170,255,100,0.4)';
        ctx.fillRect(ppx, ppy, 2, 2);
      }
    }
  }
}

function drawPlatforms() {
  var w = WORLDS[world];
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    var px = Math.floor(p.x - camera.x);
    var py = Math.floor(p.y - camera.y);

    if (px + p.w < -10 || px > GW + 10 || py + p.h < -10 || py > GH + 10) continue;
    if (p.type === 'crumble' && p.crumbleTimer > 0.5) continue;

    if (p.type === 'exit') {
      // Reactor-styled exit
      ctx.fillStyle = w.glow || '#ffdd44';
      ctx.fillRect(px, py, p.w, p.h);
      ctx.fillStyle = 'rgba(255,221,68,0.3)';
      ctx.fillRect(px - 2, py - 2, p.w + 4, p.h + 4);
      // Pulsing glow
      var exitPulse = Math.sin(frame * 0.08) * 0.2 + 0.2;
      ctx.fillStyle = 'rgba(255,255,255,' + exitPulse + ')';
      ctx.fillRect(px - 4, py - 4, p.w + 8, p.h + 8);
      // Arrow indicator
      var bounce = Math.floor(Math.sin(frame * 0.08) * 3);
      ctx.fillStyle = w.glow || '#ffdd44';
      ctx.beginPath();
      ctx.moveTo(px + p.w / 2, py - 12 + bounce);
      ctx.lineTo(px + p.w / 2 - 6, py - 6 + bounce);
      ctx.lineTo(px + p.w / 2 + 6, py - 6 + bounce);
      ctx.fill();
    } else if (p.type === 'crumble') {
      ctx.fillStyle = '#8a6a4a';
      var shake = p.crumbleTimer > 0 ? Math.floor((Math.random() - 0.5) * 2) : 0;
      ctx.fillRect(px + shake, py, p.w, p.h);
      ctx.fillStyle = '#4a3a2a';
      ctx.fillRect(Math.floor(px + p.w * 0.3), py + 2, 1, p.h - 4);
      ctx.fillRect(Math.floor(px + p.w * 0.7), py + 1, 1, p.h - 2);
    } else {
      ctx.fillStyle = w.platform;
      ctx.fillRect(px, py, p.w, p.h);
      ctx.fillStyle = w.accent;
      ctx.fillRect(px, py, p.w, 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(px, py + p.h - 2, p.w, 2);
    }
  }
}

function drawDoors() {
  for (var i = 0; i < doors.length; i++) {
    var d = doors[i];
    var dx = Math.floor(d.x - camera.x);
    var dy = Math.floor(d.y - camera.y);
    if (dx + d.w < 0 || dx > GW || dy + d.h < 0 || dy > GH) continue;

    ctx.fillStyle = '#443322';
    ctx.fillRect(dx - 2, dy - 2, d.w + 4, d.h + 4);
    ctx.fillStyle = '#221100';
    ctx.fillRect(dx, dy, d.w, d.h);
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(dx + d.w - 4, Math.floor(dy + d.h / 2), 2, 3);
    ctx.fillStyle = '#ffdd88';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SHOP', Math.floor(dx + d.w / 2), dy - 4);
  }
}

function drawHearts() {
  for (var i = 0; i < hearts.length; i++) {
    var h = hearts[i];
    var size = h.value >= 10 ? 6 : (h.value >= 5 ? 4 : 3);
    ctx.fillStyle = h.value >= 10 ? '#ff44aa' : (h.value >= 5 ? '#ff6688' : '#ff88aa');
    ctx.beginPath();
    ctx.arc(Math.floor(h.x + size / 2 - 1), Math.floor(h.y + 1), size / 2, 0, Math.PI * 2);
    ctx.arc(Math.floor(h.x + size / 2 + 1), Math.floor(h.y + 1), size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(Math.floor(h.x), Math.floor(h.y + 2));
    ctx.lineTo(Math.floor(h.x + size), Math.floor(h.y + 2));
    ctx.lineTo(Math.floor(h.x + size / 2), Math.floor(h.y + size));
    ctx.fill();
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    var ex = Math.floor(e.x - camera.x);
    var ey = Math.floor(e.y - camera.y);
    if (ex + e.w < -10 || ex > GW + 10 || ey + e.h < -10 || ey > GH + 10) continue;

    // Poison tint
    if (e.poisoned) {
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.2) * 0.2;
    }
    // Stun flash
    if (e.stunTimer > 0 && Math.floor(e.stunTimer * 8) % 2 === 0) {
      ctx.globalAlpha = 0.3;
    }

    switch (e.type) {
      case 'snake':
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
        ctx.fillStyle = '#228822';
        ctx.fillRect(ex + 2, ey + 6, 3, 2);
        if (e.animFrame % 2 === 0) {
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(ex + (e.vx > 0 ? e.w : -3), ey + 8, 3, 1);
        }
        break;

      case 'bat':
        ctx.fillStyle = '#4a2a4a';
        ctx.fillRect(ex + 3, ey + 3, e.w - 6, e.h - 6);
        var wingOff = Math.floor(Math.sin(e.flyAngle * 3) * 4);
        ctx.fillRect(ex - 2 + wingOff, ey + 4, 5, 6);
        ctx.fillRect(ex + e.w - 3 - wingOff, ey + 4, 5, 6);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 5, ey + 5, 2, 2);
        ctx.fillRect(ex + 9, ey + 5, 2, 2);
        break;

      case 'reaper':
        ctx.fillStyle = e.alert ? '#ff2222' : '#2a2a3a';
        ctx.fillRect(ex, ey, e.w, e.h);
        ctx.fillStyle = '#1a1a2a';
        ctx.beginPath();
        ctx.moveTo(ex, ey + 6);
        ctx.lineTo(ex + e.w / 2, ey - 2);
        ctx.lineTo(ex + e.w, ey + 6);
        ctx.fill();
        ctx.fillStyle = '#888888';
        ctx.fillRect(ex + e.w - 2, ey - 4, 2, e.h + 4);
        ctx.fillStyle = '#aaaaaa';
        ctx.fillRect(ex + e.w - 6, ey - 6, 8, 3);
        ctx.fillStyle = e.alert ? '#ffff00' : '#ff4444';
        ctx.fillRect(ex + 4, ey + 6, 3, 2);
        ctx.fillRect(ex + 9, ey + 6, 3, 2);
        if (e.alert) {
          ctx.fillStyle = '#ff0000';
          ctx.font = 'bold 8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', Math.floor(ex + e.w / 2), ey - 8);
        }
        break;

      case 'minireaper':
        ctx.fillStyle = '#4a2a4a';
        ctx.fillRect(ex, ey, e.w, e.h);
        ctx.fillStyle = '#ff6666';
        ctx.fillRect(ex + 2, ey + 2, 2, 2);
        ctx.fillRect(ex + 5, ey + 2, 2, 2);
        break;

      case 'centaur':
        ctx.fillStyle = '#8a6a4a';
        ctx.fillRect(ex, ey + 4, e.w, e.h - 4);
        var legOff = Math.floor(Math.sin(e.animFrame * 1.5) * 2);
        ctx.fillRect(ex + 2, ey + e.h - 2, 3, 4 + legOff);
        ctx.fillRect(ex + e.w - 5, ey + e.h - 2, 3, 4 - legOff);
        ctx.fillStyle = '#ddaa88';
        ctx.fillRect(Math.floor(ex + e.w / 2 - 3), ey, 6, 8);
        ctx.fillStyle = '#665533';
        ctx.fillRect(Math.floor(ex + e.w / 2 + 4), ey + 2, 6, 1);
        break;

      case 'boar':
        ctx.fillStyle = '#5a3a2a';
        ctx.fillRect(ex, ey + 2, e.w, e.h - 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(ex + (e.vx > 0 ? e.w - 1 : -2), ey + e.h - 6, 3, 2);
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(ex + (e.vx > 0 ? e.w - 5 : 3), ey + 4, 2, 2);
        break;

      case 'nymph':
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(ex + 2, ey + 2, e.w - 4, e.h - 4);
        ctx.fillStyle = 'rgba(136,204,255,0.5)';
        var nWing = Math.floor(Math.sin((e.flyAngle || 0) * 4) * 3);
        ctx.fillRect(ex - 2 + nWing, ey + 3, 4, 8);
        ctx.fillRect(ex + e.w - 2 - nWing, ey + 3, 4, 8);
        break;

      case 'sunball':
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(Math.floor(ex + e.w / 2), Math.floor(ey + e.h / 2), e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffdd44';
        for (var r = 0; r < 6; r++) {
          var ra = (r / 6) * Math.PI * 2 + frame * 0.05;
          var rx = Math.floor(ex + e.w / 2 + Math.cos(ra) * (e.w / 2 + 3));
          var ry = Math.floor(ey + e.h / 2 + Math.sin(ra) * (e.h / 2 + 3));
          ctx.fillRect(rx - 1, ry - 1, 3, 3);
        }
        break;

      case 'flying':
        ctx.fillStyle = '#aa44aa';
        ctx.fillRect(ex + 2, ey + 2, e.w - 4, e.h - 4);
        var fWing = Math.floor(Math.sin(e.flyAngle * 5) * 3);
        ctx.fillStyle = '#cc66cc';
        ctx.fillRect(ex - 1 + fWing, ey + 3, 4, 6);
        ctx.fillRect(ex + e.w - 3 - fWing, ey + 3, 4, 6);
        ctx.fillStyle = '#ff88ff';
        ctx.fillRect(ex + 4, ey + 4, 2, 2);
        ctx.fillRect(ex + 8, ey + 4, 2, 2);
        break;

      case 'eggplant':
        ctx.fillStyle = '#6a2a8a';
        ctx.beginPath();
        ctx.ellipse(Math.floor(ex + e.w / 2), Math.floor(ey + e.h / 2), e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(Math.floor(ex + e.w / 2 - 2), ey - 3, 4, 5);
        ctx.fillStyle = '#ffdd00';
        ctx.fillRect(ex + 3, ey + 5, 2, 2);
        ctx.fillRect(ex + 9, ey + 5, 2, 2);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(ex + 5, ey + 9, 4, 2);
        break;

      // === TASERN ENEMIES ===
      case 'reactor_harpy':
        // Body - energy bird
        ctx.fillStyle = '#ff6633';
        ctx.fillRect(ex + 3, ey + 3, e.w - 6, e.h - 6);
        // Wings with reactor glow
        var hWing = Math.floor(Math.sin((e.flyAngle || 0) * 4) * 4);
        ctx.fillStyle = e.diving ? '#ff4400' : '#ff8844';
        ctx.fillRect(ex - 3 + hWing, ey + 2, 6, 8);
        ctx.fillRect(ex + e.w - 3 - hWing, ey + 2, 6, 8);
        // Reactor core eye
        ctx.fillStyle = '#ffdd00';
        ctx.fillRect(ex + 5, ey + 5, 3, 2);
        ctx.fillRect(ex + e.w - 8, ey + 5, 3, 2);
        // Talons
        ctx.fillStyle = '#cc4422';
        ctx.fillRect(ex + 4, ey + e.h - 2, 2, 3);
        ctx.fillRect(ex + e.w - 6, ey + e.h - 2, 2, 3);
        // Dive trail
        if (e.diving) {
          ctx.fillStyle = 'rgba(255,100,0,0.4)';
          ctx.fillRect(ex + 4, ey - 4, e.w - 8, 4);
        }
        break;

      case 'spore_medusa':
        // Head
        ctx.fillStyle = '#447744';
        ctx.beginPath();
        ctx.arc(Math.floor(ex + e.w / 2), Math.floor(ey + e.h / 2), e.w / 2, 0, Math.PI * 2);
        ctx.fill();
        // Mycelial tendrils (snake-like hair)
        ctx.fillStyle = '#226622';
        for (var s = 0; s < 6; s++) {
          var sx = Math.floor(ex + 2 + s * 3);
          var sy = Math.floor(ey - 3 + Math.sin(frame * 0.08 + s) * 3);
          ctx.fillRect(sx, sy, 2, 6);
        }
        // Eyes - petrifying glow
        var eyeGlow = Math.sin(frame * 0.1) > 0.5;
        ctx.fillStyle = eyeGlow ? '#ff0000' : '#ffff00';
        ctx.fillRect(ex + 4, ey + 6, 3, 3);
        ctx.fillRect(ex + e.w - 7, ey + 6, 3, 3);
        // Spore aura
        ctx.fillStyle = 'rgba(136,255,68,0.15)';
        ctx.beginPath();
        ctx.arc(Math.floor(ex + e.w / 2), Math.floor(ey + e.h / 2), e.w / 2 + 4 + Math.sin(frame * 0.06) * 2, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'mycelial_serpent':
        // Draw segments first
        if (e.segments) {
          for (var s = e.segments.length - 1; s >= 0; s--) {
            var seg = e.segments[s];
            var sgx = Math.floor(seg.x - camera.x);
            var sgy = Math.floor(seg.y - camera.y);
            ctx.fillStyle = s % 2 === 0 ? '#558844' : '#447733';
            ctx.beginPath();
            ctx.arc(sgx, sgy, 5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        // Head
        ctx.fillStyle = '#66aa44';
        ctx.fillRect(ex, ey + 2, e.w, e.h - 4);
        // Mycelial frills
        ctx.fillStyle = '#88cc66';
        ctx.fillRect(ex + 2, ey, 4, 3);
        ctx.fillRect(ex + e.w - 6, ey, 4, 3);
        // Eyes
        ctx.fillStyle = '#ffdd00';
        ctx.fillRect(ex + 3, ey + 4, 2, 2);
        ctx.fillRect(ex + e.w - 5, ey + 4, 2, 2);
        // Mouth
        ctx.fillStyle = '#334422';
        ctx.fillRect(ex + e.w - 1, ey + 6, 3, 2);
        break;
    }

    ctx.globalAlpha = 1;
  }
}

function drawBoss() {
  if (!bossActive) return;
  var b = bossActive;
  var bx = Math.floor(b.x - camera.x);
  var by = Math.floor(b.y - camera.y);
  var enrageFlash = b.enraged && Math.sin(frame * 0.1) > 0.7;

  switch (b.type) {
    case 'twinbellows':
      ctx.fillStyle = enrageFlash ? '#ff5533' : '#aa3322';
      ctx.fillRect(bx, by + 8, b.w, b.h - 8);
      ctx.fillStyle = enrageFlash ? '#ff6644' : '#cc4433';
      ctx.fillRect(bx - 4, by, 14, 14);
      ctx.fillRect(bx + b.w - 10, by, 14, 14);
      ctx.fillStyle = b.enraged ? '#ff4400' : '#ffff00';
      ctx.fillRect(bx, by + 4, 3, 3);
      ctx.fillRect(bx + b.w - 6, by + 4, 3, 3);
      ctx.fillStyle = enrageFlash ? '#ff3311' : '#882211';
      for (var l = 0; l < 4; l++) {
        ctx.fillRect(bx + 4 + l * 8, by + b.h - 4, 4, 6);
      }
      // Fire breath when enraged
      if (b.enraged && b.animFrame % 2 === 0) {
        ctx.fillStyle = '#ff4400';
        ctx.fillRect(bx - 8, by + 6, 6, 4);
        ctx.fillRect(bx + b.w + 2, by + 6, 6, 4);
      }
      break;

    case 'hewdraw':
      ctx.fillStyle = enrageFlash ? '#3388cc' : '#2266aa';
      for (var s = 0; s < 5; s++) {
        var sx = Math.floor(bx + Math.sin(b.timer * 2 + s * 0.8) * 8);
        var sy = by + s * 7;
        ctx.fillRect(sx + s * 3, sy, 12, 10);
      }
      ctx.fillStyle = enrageFlash ? '#66aaee' : '#4488cc';
      ctx.fillRect(bx, by - 4, 16, 14);
      ctx.fillStyle = b.enraged ? '#ff0000' : '#ff4444';
      ctx.fillRect(bx + 3, by, 3, 3);
      ctx.fillRect(bx + 10, by, 3, 3);
      // Mycelial fins when enraged
      if (b.enraged) {
        ctx.fillStyle = '#44cc88';
        ctx.fillRect(bx - 4, by, 4, 8);
        ctx.fillRect(bx + 14, by, 4, 8);
      }
      break;

    case 'pandora':
      ctx.fillStyle = enrageFlash ? 'rgba(200,120,240,0.8)' : 'rgba(180,100,220,0.7)';
      ctx.beginPath();
      ctx.arc(Math.floor(bx + b.w / 2), Math.floor(by + b.h / 2), b.w / 2 + Math.sin(b.timer * 4) * 3, 0, Math.PI * 2);
      ctx.fill();
      // Reactor core
      var coreGlow = Math.sin(b.reactorGlow) * 0.3 + 0.5;
      ctx.fillStyle = 'rgba(68,170,255,' + coreGlow + ')';
      ctx.beginPath();
      ctx.arc(Math.floor(bx + b.w / 2), Math.floor(by + b.h / 2), 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bx + 8, by + 10, 4, 4);
      ctx.fillRect(bx + 20, by + 10, 4, 4);
      ctx.fillStyle = b.enraged ? '#ff44ff' : '#cc44cc';
      ctx.fillRect(bx + 10, by + 20, 12, 3);
      break;

    case 'medusa':
      ctx.fillStyle = enrageFlash ? '#66aa66' : '#448844';
      ctx.beginPath();
      ctx.arc(Math.floor(bx + b.w / 2), Math.floor(by + b.h / 2), b.w / 2, 0, Math.PI * 2);
      ctx.fill();
      // Snake hair - more animated
      ctx.fillStyle = '#226622';
      for (var s = 0; s < 7; s++) {
        var sx = bx + 4 + s * 4;
        var sy = Math.floor(by - 4 + Math.sin(b.timer * 3 + s) * (b.enraged ? 5 : 3));
        ctx.fillRect(sx, sy, 2, 8);
        // Snake heads
        if (b.enraged) {
          ctx.fillStyle = '#44cc44';
          ctx.fillRect(sx - 1, sy - 2, 4, 3);
          ctx.fillStyle = '#226622';
        }
      }
      ctx.fillStyle = b.enraged ? '#ff0000' : (b.hp < b.maxHp * 0.5 ? '#ff4400' : '#ffff00');
      ctx.fillRect(bx + 9, by + 12, 5, 4);
      ctx.fillRect(bx + 18, by + 12, 5, 4);
      // Petrify beam indicator
      if (b.enraged && b.animFrame === 0) {
        ctx.fillStyle = 'rgba(255,0,0,0.2)';
        ctx.fillRect(bx + 9, by + 16, 5, GH);
        ctx.fillRect(bx + 18, by + 16, 5, GH);
      }
      ctx.fillStyle = '#113311';
      ctx.fillRect(bx + 11, by + 22, 10, 4);
      break;
  }

  // HP bar
  var hpPct = b.hp / b.maxHp;
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by - 12, b.w, 5);
  ctx.fillStyle = hpPct > 0.5 ? '#44dd44' : (hpPct > 0.25 ? '#dddd44' : '#dd4444');
  ctx.fillRect(bx, by - 12, Math.floor(b.w * hpPct), 5);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(bx, by - 12, Math.floor(b.w * hpPct), 2);
}

function drawArrows() {
  for (var i = 0; i < arrows.length; i++) {
    var a = arrows[i];
    var ax = Math.floor(a.x);
    var ay = Math.floor(a.y);

    if (a.damage > 0) {
      // Charged shot
      if (a.charged) {
        var chargeColor = a.weapon === 2 ? '#44aaff' : (a.weapon === 1 ? '#44ff44' : '#ffdd44');
        ctx.fillStyle = chargeColor;
        ctx.beginPath();
        ctx.arc(ax, ay, a.size / 2 + Math.sin(frame * 0.3) * 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ax, ay, a.size / 4, 0, Math.PI * 2);
        ctx.fill();
        // Trail
        ctx.fillStyle = chargeColor.replace(')', ',0.3)').replace('rgb', 'rgba');
        ctx.beginPath();
        ctx.arc(ax - a.vx * 0.02, ay - a.vy * 0.02, a.size / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        continue;
      }

      // Weapon-specific arrow rendering
      if (a.weapon === 1) {
        // Spore Arrow - green with trail
        ctx.fillStyle = '#44ff44';
        var len = 6 + arrowLevel * 2;
        if (Math.abs(a.vy) > Math.abs(a.vx)) {
          ctx.fillRect(ax - 1, ay, 2, len);
          ctx.fillStyle = '#88ff88';
          ctx.fillRect(ax - 2, ay, 1, len);
        } else {
          ctx.fillRect(ax, ay - 1, len, 2);
          ctx.fillStyle = '#88ff88';
          ctx.fillRect(ax, ay - 2, len, 1);
        }
        // Spore trail
        ctx.fillStyle = 'rgba(68,255,68,0.3)';
        ctx.beginPath();
        ctx.arc(ax, ay, 3, 0, Math.PI * 2);
        ctx.fill();
      } else if (a.weapon === 2) {
        // Reactor Bolt - blue energy
        ctx.fillStyle = '#44aaff';
        ctx.beginPath();
        ctx.arc(ax, ay, 3 + Math.sin(frame * 0.4) * 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ax, ay, 1.5, 0, Math.PI * 2);
        ctx.fill();
        // Energy trail
        ctx.fillStyle = 'rgba(68,170,255,0.3)';
        ctx.beginPath();
        ctx.arc(ax - a.vx * 0.01, ay - a.vy * 0.01, 4, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // Standard arrow
        ctx.fillStyle = arrowLevel >= 3 ? '#ff6600' : (arrowLevel >= 2 ? '#44ddff' : '#ffffff');
        var len = 6 + arrowLevel * 2;
        if (Math.abs(a.vy) > Math.abs(a.vx)) {
          ctx.fillRect(ax - 1, ay, 2, len);
          ctx.beginPath();
          ctx.moveTo(ax - 3, ay);
          ctx.lineTo(ax, ay - 4);
          ctx.lineTo(ax + 3, ay);
          ctx.fill();
        } else {
          ctx.fillRect(ax, ay - 1, len, 2);
          var dir = a.vx > 0 ? 1 : -1;
          ctx.beginPath();
          ctx.moveTo(ax + (dir > 0 ? len : 0), ay - 3);
          ctx.lineTo(ax + (dir > 0 ? len + 4 : -4), ay);
          ctx.lineTo(ax + (dir > 0 ? len : 0), ay + 3);
          ctx.fill();
        }
        if (arrowLevel >= 3) {
          ctx.fillStyle = 'rgba(255,100,0,0.3)';
          ctx.beginPath();
          ctx.arc(ax, ay, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (a.damage === -2) {
      // Eggplant projectile
      ctx.fillStyle = '#6a2a8a';
      ctx.beginPath();
      ctx.ellipse(ax, ay, 5, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(ax - 1, ay - 7, 2, 3);
    } else if (a.damage === -3) {
      // Petrify projectile (spore medusa)
      ctx.fillStyle = '#888888';
      ctx.beginPath();
      ctx.arc(ax, ay, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(136,136,136,0.3)';
      ctx.beginPath();
      ctx.arc(ax, ay, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(ax - 1, ay - 1, 2, 2);
    } else {
      // Enemy projectile
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(ax, ay, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,68,68,0.3)';
      ctx.beginPath();
      ctx.arc(ax, ay, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawPlayer() {
  if (!player) return;
  var p = player;

  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) return;

  var px = Math.floor(p.x);
  var py = Math.floor(p.y);

  if (isEggplant) {
    ctx.fillStyle = '#6a2a8a';
    ctx.beginPath();
    ctx.ellipse(px + p.w / 2, py + p.h / 2, p.w / 2 + 2, p.h / 2 + 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#44aa44';
    ctx.fillRect(Math.floor(px + p.w / 2 - 2), py - 4, 4, 5);
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(px + 3, py + 4, 2, 2);
    ctx.fillRect(px + 8, py + 4, 2, 2);
    ctx.fillStyle = '#4422aa';
    ctx.fillRect(px + 4, py + 9, 4, 1);
    return;
  }

  var dir = p.facing;

  // Charge glow
  if (isCharging) {
    var chargeAlpha = Math.min(1, chargeTimer * 1.5);
    var chargeCol = currentWeapon === 2 ? 'rgba(68,170,255,' : (currentWeapon === 1 ? 'rgba(68,255,68,' : 'rgba(255,221,68,');
    ctx.fillStyle = chargeCol + (chargeAlpha * 0.3) + ')';
    ctx.beginPath();
    ctx.arc(Math.floor(px + p.w / 2), Math.floor(py + p.h / 2), 12 + chargeTimer * 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Wings
  ctx.fillStyle = '#ffffff';
  var wingFlap = Math.floor(Math.sin(p.wingFlap) * 3);
  var wingY = py + 2;
  if (!p.onGround) {
    ctx.fillRect(px - 4 + (dir < 0 ? 2 : 0) + wingFlap, wingY, 5, 8);
    ctx.fillRect(px + p.w - 1 + (dir > 0 ? -2 : 0) - wingFlap, wingY, 5, 8);
    // Wing tips
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(px - 5 + (dir < 0 ? 2 : 0) + wingFlap, wingY + 2, 2, 4);
    ctx.fillRect(px + p.w + (dir > 0 ? -2 : 0) - wingFlap, wingY + 2, 2, 4);
  } else {
    ctx.fillRect(px - 2, wingY + 2, 4, 6);
    ctx.fillRect(px + p.w - 2, wingY + 2, 4, 6);
  }

  // Body / toga
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(px + 1, py + 4, p.w - 2, p.h - 4);
  // Toga detail
  ctx.fillStyle = '#dddddd';
  ctx.fillRect(px + 2, py + 8, p.w - 4, 1);

  // Skin
  ctx.fillStyle = '#eeddbb';
  ctx.fillRect(px + 2, py + 1, p.w - 4, 6);
  // Legs
  var legOff = p.onGround ? (p.vx !== 0 ? Math.floor(Math.sin(p.animFrame * 2) * 2) : 0) : 1;
  ctx.fillRect(px + 2, py + p.h - 3, 3, 3 + legOff);
  ctx.fillRect(px + p.w - 5, py + p.h - 3, 3, 3 - legOff);

  // Hair (laurel)
  ctx.fillStyle = '#886633';
  ctx.fillRect(px + 2, py, p.w - 4, 3);
  ctx.fillStyle = '#44aa44';
  ctx.fillRect(px + 1, py, 2, 2);
  ctx.fillRect(px + p.w - 3, py, 2, 2);
  // Extra laurel leaf
  ctx.fillRect(Math.floor(px + p.w / 2 - 1), py - 1, 2, 2);

  // Eyes
  ctx.fillStyle = '#222222';
  if (dir > 0) {
    ctx.fillRect(px + 7, py + 3, 2, 2);
  } else {
    ctx.fillRect(px + 3, py + 3, 2, 2);
  }

  // Bow (colored by weapon type)
  var bowColor = currentWeapon === 2 ? '#4488cc' : (currentWeapon === 1 ? '#44aa44' : '#bb8833');
  ctx.fillStyle = bowColor;
  if (dir > 0) {
    ctx.fillRect(px + p.w, py + 3, 6, 1);
    ctx.fillRect(px + p.w + 5, py, 1, 7);
    ctx.fillStyle = currentWeapon === 2 ? '#88ccff' : '#888888';
    ctx.fillRect(px + p.w + 2, py + 1, 1, 5);
  } else {
    ctx.fillRect(px - 6, py + 3, 6, 1);
    ctx.fillRect(px - 6, py, 1, 7);
    ctx.fillStyle = currentWeapon === 2 ? '#88ccff' : '#888888';
    ctx.fillRect(px - 3, py + 1, 1, 5);
  }
}

function drawShields() {
  if (shieldCount <= 0) return;
  if (!player) return;

  ctx.fillStyle = '#44aaff';
