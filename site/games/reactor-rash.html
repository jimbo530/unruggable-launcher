}

function getPlayerPosition() {
  let pos = 1;
  for (const opp of opponents) {
    if (!opp.finished && opp.z > player.z) pos++;
    if (opp.finished) pos++;
  }
  return pos;
}

function formatTime(t) {
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 100);
  return mins + ':' + String(secs).padStart(2, '0') + '.' + String(ms).padStart(2, '0');
}

function getOrdinal(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  // Art background
  var _artDrawn = false;
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H); _artDrawn = true; }
  }
  if (!_artDrawn) { ctx.fillStyle = '#1a1c2c'; ctx.fillRect(0, 0, W, H); }

  const t = Date.now() * 0.001;

  // Animated road
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  const vanishY = H * 0.35;
  const vanishX = W / 2;
  for (let i = 0; i < 30; i++) {
    const y = vanishY + (i / 30) * (H - vanishY);
    const spread = (y - vanishY) / (H - vanishY);
    const roadW = spread * W * 0.35;
    ctx.strokeStyle = (i % 4 < 2) ? '#333' : '#222';
    ctx.beginPath();
    ctx.moveTo(vanishX - roadW, y);
    ctx.lineTo(vanishX + roadW, y);
    ctx.stroke();
  }
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(vanishX, vanishY); ctx.lineTo(vanishX - W * 0.35, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(vanishX, vanishY); ctx.lineTo(vanishX + W * 0.35, H); ctx.stroke();

  // Title
  const titleSize = Math.min(56, W * 0.09);
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold ' + titleSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR RASH', W / 2, H * 0.12);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Spore-fueled combat racing through the Baseling reactor tracks', W / 2, H * 0.18);

  // Baseling stat display
  ctx.fillStyle = statB.color;
  ctx.font = '12px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + (statB.level > 0 ? ' (Lv ' + statB.level + ')' : ''), W / 2, H * 0.23);

  // Stat bars
  var stats = [
    { label: 'STR', val: statB.str, col: '#f44' },
    { label: 'DEX', val: statB.dex, col: '#4f4' },
    { label: 'CON', val: statB.con, col: '#ff0' },
    { label: 'INT', val: statB.int, col: '#44f' },
    { label: 'WIS', val: statB.wis, col: '#a4f' },
    { label: 'CHA', val: statB.cha, col: '#f80' }
  ];
  var barStart = W / 2 - 120;
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  for (var si = 0; si < stats.length; si++) {
    var sx = barStart + (si % 3) * 85;
    var sy = H * 0.26 + Math.floor(si / 3) * 16;
    ctx.fillStyle = '#555';
    ctx.fillText(stats[si].label, sx, sy);
    ctx.fillStyle = '#222';
    ctx.fillRect(sx + 28, sy - 8, 40, 8);
    ctx.fillStyle = stats[si].col;
    ctx.fillRect(sx + 28, sy - 8, Math.min(40, stats[si].val * 2), 8);
    ctx.fillStyle = '#aaa';
    ctx.fillText(String(stats[si].val), sx + 72, sy);
  }

  // Animated bikes
  const bikeY = H * 0.62;
  const bounce = Math.sin(t * 5) * 2;
  drawPixelBike(W / 2 - 120, bikeY + bounce, 28, '#a86', false, Math.sin(t * 3) * 0.05);
  drawPixelBike(W / 2 - 40, bikeY - 10 + Math.sin(t * 5 + 1) * 2, 32, '#a4f', false, 0);
  drawPixelBike(W / 2 + 40, bikeY - 20 + Math.sin(t * 5 + 2) * 2, 36, statB.color, true, 0);
  drawPixelBike(W / 2 + 120, bikeY + bounce, 28, '#8cf', false, Math.sin(t * 3 + 2) * 0.05);

  // Instructions
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ccc';
  ctx.font = '13px monospace';
  var lines = [
    '',
    'CONTROLS:',
    'Arrows: Steer / Gas / Brake',
    'A: Punch Left    Z: Punch Right',
    'Space: Weapon    Shift: Nitro',
    '',
    'Race 8 reactor tracks. Finish Top 3 to advance!',
    'Fight spore riders, dodge fungal hazards, defeat bosses!',
    '',
    '[ENTER] or [TAP] to start'
  ];
  lines.forEach(function(line, i) {
    ctx.fillStyle = i === lines.length - 1 ? (Math.sin(t * 3) > 0 ? '#f4b41b' : '#7a444a') : '#aaa';
    ctx.fillText(line, W / 2, H * 0.36 + i * 18);
  });

  // Track list
  ctx.fillStyle = '#666';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i < TRACKS.length; i++) {
    ctx.fillText((i + 1) + '. ' + TRACKS[i].name, W * 0.05, H * 0.78 + i * 14);
  }
}

function drawCountdown() {
  drawRoad();

// ============================================================
// VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;

  // Confetti
  for (let i = 0; i < 50; i++) {
    ctx.fillStyle = ['#e6482e', '#f4b41b', '#38d973', '#3cacd7', '#a855f7', '#7a444a'][i % 6];
    const cx = (i * W / 50 + t * 50 * (i % 3 + 1)) % W;
    const cy = (t * 100 + i * 30) % H;
    ctx.fillRect(cx, cy, 4, 8);
  }

  ctx.textAlign = 'center';
  ctx.shadowColor = '#f4b41b';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 40px monospace';
  ctx.fillText('REACTOR CHAMPION!', W / 2, H * 0.12);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText(statB.name + ' conquered all 8 reactor tracks!', W / 2, H * 0.2);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '18px monospace';
  ctx.fillText('Final POOP: ' + money + 'M  |  Score: ' + totalScore, W / 2, H * 0.28);

  // Best times
  ctx.fillStyle = '#888';
  ctx.font = '13px monospace';
  ctx.fillText('BEST TIMES:', W / 2, H * 0.35);
  for (let i = 0; i < TRACKS.length; i++) {
    ctx.fillStyle = '#aaa';
    const time = bestTimes[i] ? formatTime(bestTimes[i]) : '--:--';
    ctx.fillText(TRACKS[i].name + ': ' + time, W / 2, H * 0.39 + i * 16);
  }

  // Stats summary
  ctx.fillStyle = statB.color;
  ctx.font = '13px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + ' | STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, W / 2, H * 0.78);

  ctx.fillStyle = '#666';
  ctx.font = '12px monospace';
  ctx.fillText('Speed Lv' + upgrades.speed + ' | Armor Lv' + upgrades.armor + ' | Weapon: ' + weapon, W / 2, H * 0.83);

  ctx.fillStyle = Math.sin(t * 3) > 0 ? '#fff' : '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Press ENTER or TAP for title', W / 2, H * 0.92);
}

// ============================================================
// SHOP SCREEN
// ============================================================
function drawShop() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 30) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
  for (let gy = 0; gy < H; gy += 30) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('SPORE WORKSHOP', W / 2, H * 0.07);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(money + 'M', W / 2, H * 0.12);

  // CHA discount indicator
  if (chaMod > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '11px monospace';
    ctx.fillText('CHA Discount: -' + Math.floor(chaMod * 5) + '%', W / 2, H * 0.155);
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  const nextName = currentTrack + 1 < TRACKS.length ? TRACKS[currentTrack + 1].name : 'VICTORY LAP';
  ctx.fillText('Next: ' + nextName, W / 2, H * 0.175);

  drawPixelBike(W / 2, H * 0.22, 35, statB.color, true, 0);

  const items = getShopItems();
  const bw = Math.min(260, W * 0.55);
  const bh = 48;
  const startX = W / 2 - bw / 2;

  for (let i = 0; i < items.length; i++) {
    const by = H * 0.28 + i * 58;
    const canAfford = money >= items[i].cost && items[i].canBuy;

    ctx.fillStyle = canAfford ? '#1a2a3a' : '#111';
    ctx.fillRect(startX, by, bw, bh);
    ctx.strokeStyle = canAfford ? '#3cacd7' : '#333';
    ctx.lineWidth = canAfford ? 2 : 1;
    ctx.strokeRect(startX, by, bw, bh);

    ctx.fillStyle = canAfford ? '#fff' : '#555';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(items[i].name, W / 2, by + 20);

    ctx.fillStyle = canAfford ? '#f4b41b' : '#444';
    ctx.font = '12px monospace';
    ctx.fillText(items[i].canBuy ? items[i].cost + 'M' : 'OWNED', W / 2, by + 38);
  }

  // Race button
  const contY = H * 0.28 + items.length * 58 + 15;
  ctx.fillStyle = '#142';
  ctx.fillRect(startX, contY, bw, bh);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 2;
  ctx.strokeRect(startX, contY, bw, bh);
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RIDE OUT!  [ENTER]', W / 2, contY + 30);

  // Stats sidebar
  ctx.textAlign = 'left';
  ctx.fillStyle = '#777';
  ctx.font = '11px monospace';
  const sx = 10;
  const sy = H * 0.85;
  ctx.fillText('SPD: ' + '|'.repeat(upgrades.speed) + '.'.repeat(5 - upgrades.speed), sx, sy);
  ctx.fillText('ARM: ' + '|'.repeat(upgrades.armor) + '.'.repeat(5 - upgrades.armor), sx, sy + 14);
  ctx.fillText('WPN: ' + weapon.toUpperCase(), sx, sy + 28);
  ctx.fillText('WINS: ' + totalWins, sx, sy + 42);
}

// ============================================================
// DRAW PARTICLES
// ============================================================
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    ctx.fillStyle = p.color;
    // NES-style square particles
    ctx.fillRect(Math.floor(p.x - p.size / 2), Math.floor(p.y - p.size / 2), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  switch (state) {
    case 'title':
      drawTitle();
      break;

    case 'countdown':
      updateCountdown(dt);
      drawRoad();
      drawOpponents();
      drawPlayer();
      drawHUD();
      var count = Math.ceil(countdownTimer);
      if (count >= 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(W * 0.3, H * 0.35, W * 0.4, H * 0.15);
        ctx.textAlign = 'center';
        ctx.font = 'bold 64px monospace';
        ctx.fillStyle = count === 1 ? '#f44' : count === 2 ? '#ff0' : '#fff';
        ctx.fillText(String(count), W / 2, H * 0.47);
      } else {
        ctx.textAlign = 'center';
        ctx.font = 'bold 64px monospace';
        ctx.fillStyle = '#0f0';
        ctx.fillText('GO!', W / 2, H * 0.47);
      }
      ctx.font = '14px monospace';
      ctx.fillStyle = '#a855f7';
      ctx.fillText(TRACKS[currentTrack].name + ' - ' + TRACKS[currentTrack].desc, W / 2, H * 0.53);
      break;

    case 'racing':
      updateRacing(dt);
      drawRoad();
      drawOpponents();
      drawPlayer();
      drawParticles();
      drawScorePopups();
      drawHUD();
      drawTutorial();
      if (raceFinished) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, H * 0.35, W, H * 0.12);
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        var finalPos = finishPositions.findIndex(function(f) { return f.name === statB.name; }) + 1;
        ctx.fillText('FINISHED ' + finalPos + getOrdinal(finalPos) + '!', W / 2, H * 0.43);
      }
      if (player.crashed) {
        ctx.fillStyle = 'rgba(255,0,0,0.1)';
        ctx.fillRect(0, 0, W, H);
      }
      break;

    case 'results':
      drawResults();
      break;

    case 'gameover':
      drawGameOver();
      break;

    case 'shop':
      drawShop();
      break;

    case 'victory':
      drawVictory();
      break;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
