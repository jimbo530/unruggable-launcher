// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

function playFilteredNoise(dur, vol, freq) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = freq || 400;
  filt.Q.value = 3;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {

// ============================================================
// TRACK GENERATION
// ============================================================
function buildTrack(trackIdx) {
  const track = TRACKS[trackIdx];
  segments = [];
  const numSeg = track.segments;

  for (let i = 0; i < numSeg; i++) {
    const seg = {
      index: i,
      p: { world: { x: 0, y: 0, z: i * SEG_LENGTH }, screen: {}, camera: {} },
      curve: 0,
      color: (Math.floor(i / 3) % 2 === 0) ? { road: track.road1, grass: track.color1, rumble: track.rumble1 }
                                              : { road: track.road2, grass: track.color2, rumble: track.rumble2 },
      objects: [],
      fog: 0
    };

    const progress = i / numSeg;
    if (progress > 0.03 && progress < 0.97) {
      const curveStrength = track.curve;
      seg.curve = Math.sin(i * 0.02) * curveStrength * 3 +
                  Math.sin(i * 0.007) * curveStrength * 5 +
                  Math.cos(i * 0.033) * curveStrength * 2;
    }

    const hillStrength = track.hill;
    seg.p.world.y = Math.sin(i * 0.015) * hillStrength * 3000 +
                    Math.sin(i * 0.005) * hillStrength * 5000 +
                    Math.cos(i * 0.025) * hillStrength * 1500;

    if (Math.random() < 0.18) {
      const offset = ROAD_WIDTH * 0.6 + Math.random() * ROAD_WIDTH * 0.5;
      seg.objects.push({ type: getObjectType(track.objects), side: -1, offset });
    }
    if (Math.random() < 0.18) {
      const offset = ROAD_WIDTH * 0.6 + Math.random() * ROAD_WIDTH * 0.5;
      seg.objects.push({ type: getObjectType(track.objects), side: 1, offset });
    }

    if (track.objects === 'fungal' || track.objects === 'ice') {
      seg.fog = 0.1 + Math.sin(i * 0.01) * 0.05;
    }

    segments.push(seg);
  }

  for (let i = 0; i < 3; i++) {
    segments[i].color = { road: '#fff', grass: segments[i].color.grass, rumble: '#000' };
  }
  for (let i = numSeg - 3; i < numSeg; i++) {
    segments[i].color = { road: '#fff', grass: segments[i].color.grass, rumble: '#ff0' };
  }

  // Generate traffic
  trafficCars = [];
  if (track.traffic > 0) {
    const numCars = Math.floor(track.segments * track.traffic * 0.1);
    for (let i = 0; i < numCars; i++) {
      trafficCars.push({
        z: Math.random() * numSeg * SEG_LENGTH,
        x: (Math.random() - 0.5) * 0.6,
        speed: 40 + Math.random() * 30,
        color: ['#888', '#666', '#555', '#777', '#999'][Math.floor(Math.random() * 5)],
        width: 0.15 + Math.random() * 0.05
      });
    }
  }

  // Generate road items -- [5] WIS increases item density
  roadItems = [];
  var itemChance = 0.04 + Math.max(0, wisMod) * 0.008;
  for (let i = 20; i < numSeg - 20; i++) {
    if (Math.random() < itemChance) {
      var typeIdx = Math.floor(Math.random() * ITEM_TYPES.length);
      // [7] luck affects rare item chance
      if (luckBonus > 0 && Math.random() < 0.3) typeIdx = 2; // POOP token
      roadItems.push({
        z: i * SEG_LENGTH + Math.random() * SEG_LENGTH,
        x: (Math.random() - 0.5) * 0.7,
        type: ITEM_TYPES[typeIdx],
        collected: false,
        bobPhase: Math.random() * Math.PI * 2
      });
    }
  }

  // Generate road hazards -- [5] WIS reduces hazard density
  roadHazards = [];
  var hazardChance = 0.03 - Math.max(0, wisMod) * 0.004;
  hazardChance = Math.max(0.005, hazardChance);
  for (let i = 30; i < numSeg - 30; i++) {
    if (Math.random() < hazardChance) {
      var hType = HAZARD_TYPES[Math.floor(Math.random() * HAZARD_TYPES.length)];
      // Zone-specific hazards
      if (track.zone === 'hollows' && Math.random() < 0.5) hType = HAZARD_TYPES[0];
      if (track.zone === 'wastes' && Math.random() < 0.5) hType = HAZARD_TYPES[2];
      if (track.zone === 'frost' && Math.random() < 0.5) hType = HAZARD_TYPES[3];
      if (track.zone === 'desert' && Math.random() < 0.5) hType = HAZARD_TYPES[4];
      if (track.zone === 'city' && Math.random() < 0.5) hType = HAZARD_TYPES[5];
      roadHazards.push({
        z: i * SEG_LENGTH + Math.random() * SEG_LENGTH,
        x: (Math.random() - 0.5) * 0.6,
        type: hType,
        active: true,
        pulsePhase: Math.random() * Math.PI * 2
      });
    }
  }
}

function getObjectType(theme) {
  const types = {
    coastal: ['palm', 'palm', 'rock', 'sign', 'lighthouse', 'seagull', 'driftwood'],
    fungal: ['mushroom', 'glowshroom', 'sporetree', 'crystal', 'mushroom', 'spore_cloud'],
    mountain: ['pine', 'pine', 'boulder', 'cliff', 'sign', 'goat', 'eagle_nest'],
    reactor: ['tower', 'pipe', 'barrel', 'sign', 'tank', 'antenna', 'smokestack'],
    desert: ['cactus', 'cactus', 'skull', 'rock', 'sign', 'tumbleweed', 'bones'],
    city: ['building', 'building', 'lamppost', 'sign', 'neon', 'dumpster', 'hydrant'],
    ice: ['icicle', 'snowpine', 'snowpine', 'rock', 'sign', 'snowman', 'ice_wall'],
    final: ['tower', 'pine', 'mushroom', 'building', 'barrel', 'cactus', 'crystal']
  };
  const list = types[theme] || types.coastal;
  return list[Math.floor(Math.random() * list.length)];
}

      faction: rival.faction,
      crashed: false,
      crashTimer: 0,
      aggression: 0.2 + Math.random() * 0.4 + currentTrack * 0.05,
      finished: false,
      finishTime: 0,
      steerTarget: ((i % LANES) - 1) * 0.35,
      steerTimer: 0,
      rubberband: 0,
      attackCooldown: 0,
      hp: 2 + currentTrack
    });
  }

  raceTime = 0;
  raceFinished = false;
  finishPositions = [];
  particles = [];
  scorePopups = [];
  screenShake = 0;
  countdownTimer = 3.5;
  comboCount = 0;
  comboTimer = 0;
  shieldTimer = 0;

  state = 'countdown';

  // Spawn boss at 80% track completion

      color: track.bossColor,
      hp: 5 + currentTrack * 2,
      maxHp: 5 + currentTrack * 2,
      x: 0,
      z: Math.floor(track.segments * 0.8) * SEG_LENGTH,
      speed: 0,
      active: false,
      defeated: false,
      attackTimer: 0,
      pattern: 0,
      flashTimer: 0

}

// SCORE POPUP SYSTEM

function addScorePopup(text, x, y, color) {
  scorePopups.push({
    text: text,
    x: x,
    y: y,
    vy: -2,
    life: 1.2,
    color: color || '#ff0',
    scale: 1.0
  });
}

function updateScorePopups(dt) {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy * dt * 60;
    p.life -= dt;
    p.scale *= 0.99;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.font = 'bold ' + Math.floor(14 * p.scale) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// INPUT HANDLING - NES-STYLE CONTROLS
// ============================================================
window.addEventListener('keydown', function(e) {
  ensureAudio();
  keys[e.code] = true;

  if (state === 'racing' && !player.crashed) {
    // NES: A = attack left (KeyA), B = attack right (KeyZ/KeyX)
    // Select = weapon (Space), Start = nitro (Shift)
    if (e.code === 'KeyA') attackLeft();
    if (e.code === 'KeyZ' || e.code === 'KeyX') attackRight();
    if (e.code === 'Space') useWeapon();
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') activateNitro();
  }
  if (state === 'title' && (e.code === 'Enter' || e.code === 'Space')) startGame();
  if (state === 'results' && (e.code === 'Enter' || e.code === 'Space')) goToShop();
  if (state === 'shop' && e.code === 'Enter') nextRace();
  if (state === 'gameover' && (e.code === 'Enter' || e.code === 'Space')) retryRace();
  if (state === 'victory' && (e.code === 'Enter' || e.code === 'Space')) { state = 'title'; }
});
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

// Touch controls
let touchState = { left: false, right: false, up: false, down: false };

canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouch, { passive: false });

function handleTouch(e) {
  ensureAudio();
  e.preventDefault();

  if (state === 'title') { startGame(); return; }
  if (state === 'results') { goToShop(); return; }
  if (state === 'gameover') { retryRace(); return; }
  if (state === 'victory') { state = 'title'; return; }
  if (state === 'shop') {
    if (e.touches.length > 0) handleShopTouch(e.touches[0]);
    return;
  }

  touchState = { left: false, right: false, up: false, down: false };

  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const x = t.clientX / W;
    const y = t.clientY / H;
    if (y > 0.75) {
      if (x < 0.25) touchState.left = true;
      else if (x > 0.75) touchState.right = true;
      else if (x < 0.5) touchState.down = true;
      else touchState.up = true;
    } else if (y < 0.25) {
      if (x < 0.33) { if (e.type === 'touchstart') attackLeft(); }
      else if (x > 0.66) { if (e.type === 'touchstart') attackRight(); }
      else { if (e.type === 'touchstart') useWeapon(); }
    } else {
      touchState.up = true;
    }
  }
}

canvas.addEventListener('click', function(e) {
  ensureAudio();
  if (state === 'title') startGame();
  else if (state === 'results') goToShop();
  else if (state === 'gameover') retryRace();
  else if (state === 'victory') { state = 'title'; }
  else if (state === 'shop') handleShopClick(e);
});

// ============================================================
// COMBAT SYSTEM -- [1] STR affects damage, [2] DEX affects hit range
// ============================================================
function attackLeft() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.3;
  player.attackDir = -1;
  player.attackType = 'fist';
  player.tilt = -0.3;
  SFX.punch();
  checkAttackHit(-1);
}

function attackRight() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.3;
  player.attackDir = 1;
  player.attackType = 'fist';
  player.tilt = 0.3;
  SFX.punch();
  checkAttackHit(1);
}

function useWeapon() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.4;
  player.attackDir = 0;
  player.attackType = weapon;
  if (weapon === 'chain') SFX.chain();
  else if (weapon === 'club') SFX.club();
  else if (weapon === 'prod') SFX.prod();
  else { SFX.kick(); player.attackType = 'kick'; }
  checkWeaponHit();
}

function activateNitro() {
  if (player.nitro > 0 && !player.nitroActive) {
    player.nitroActive = true;
    SFX.nitro();
  }
}

function checkAttackHit(dir) {
  // [2] DEX extends hit detection range
  var hitRange = 400 + Math.max(0, dexMod) * 40;
  var hitWidth = 0.5 + Math.max(0, dexMod) * 0.05;

  // Check boss first
  if (boss && boss.active && !boss.defeated) {
    var bdz = Math.abs(boss.z - player.z);
    var bdx = boss.x - player.x;
    if (bdz < hitRange && ((dir < 0 && bdx < -0.05 && bdx > -hitWidth) || (dir > 0 && bdx > 0.05 && bdx < hitWidth))) {
      hitBoss(0.5 + strMod * 0.15);
      return;
    }
  }

  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    const dz = Math.abs(opp.z - player.z);
    const dx = opp.x - player.x;
    if (dz < hitRange && ((dir < 0 && dx < -0.05 && dx > -hitWidth) || (dir > 0 && dx > 0.05 && dx < hitWidth))) {
      // [1] STR increases knockback power
      var knockPower = 0.5 + Math.max(0, strMod) * 0.12;
      knockOpponent(opp, knockPower);
      spawnHitParticles(opp);
      screenShake = 0.15;
      registerCombo();
      return;
    }
  }
}

function checkWeaponHit() {
  // [4] INT extends weapon reach
  var intBonus = Math.max(0, intMod) * 50;
  const reach = (weapon === 'chain' ? 600 : weapon === 'club' ? 400 : weapon === 'prod' ? 500 : 350) + intBonus;
  // [1] STR boosts weapon power
  const power = (weapon === 'club' ? 1.0 : weapon === 'prod' ? 0.7 : weapon === 'chain' ? 0.6 : 0.4) + Math.max(0, strMod) * 0.1;

  // Check boss
  if (boss && boss.active && !boss.defeated) {
    var bdz = Math.abs(boss.z - player.z);
    var bdx = Math.abs(boss.x - player.x);
    if (bdz < reach && bdx < 0.6) {
      hitBoss(power);
      return;
    }
  }

  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    const dz = Math.abs(opp.z - player.z);
    const dx = Math.abs(opp.x - player.x);
    if (dz < reach && dx < 0.6) {
      knockOpponent(opp, power);
      spawnHitParticles(opp);
      if (weapon === 'prod') {
        opp.speed *= 0.2;
        spawnElectricParticles(opp);
      }
      screenShake = 0.2;
      registerCombo();
      return;
    }
  }
}

function registerCombo() {
  comboCount++;
  comboTimer = 3.0;
  var bonus = 10 * comboCount * statB.scoreMult;
  money += Math.floor(bonus);
  totalScore += Math.floor(bonus);
  addScorePopup('HIT x' + comboCount + ' +' + Math.floor(bonus) + 'M', W / 2, H * 0.4, '#f4b41b');
}

function knockOpponent(opp, power) {
  // [1] STR-enhanced knock
  var adjustedPower = power + strMod * 0.05;
  if (Math.random() < adjustedPower) {
    opp.crashed = true;
    opp.crashTimer = 2.0 + Math.random() * 1.5;
    opp.speed = 0;
    SFX.crash();
    var crashBonus = Math.floor(25 * statB.scoreMult);
    money += crashBonus;
    totalScore += crashBonus;
    addScorePopup('WIPEOUT +' + crashBonus + 'M', W / 2, H * 0.35, '#e6482e');
  } else {
    opp.speed *= 0.6;
    opp.x += (Math.random() - 0.5) * 0.4;
  }
}

// ============================================================
// BOSS SYSTEM
// ============================================================
function hitBoss(power) {
  if (!boss || boss.defeated) return;
  var dmg = Math.ceil(power * statB.damage);
  boss.hp -= dmg;
  boss.flashTimer = 0.2;
  screenShake = 0.3;
  SFX.bossHit();
  addScorePopup('-' + dmg + ' HP', W / 2, H * 0.3, '#f44');

  if (boss.hp <= 0) {
    boss.defeated = true;
    boss.active = false;
    var bossBonus = Math.floor((200 + currentTrack * 50) * statB.scoreMult);
    money += bossBonus;
    totalScore += bossBonus;
    addScorePopup('BOSS SLAIN! +' + bossBonus + 'M', W / 2, H * 0.25, '#f4b41b');
    SFX.levelUp();
    // Boss defeat explosion
    for (let i = 0; i < 30; i++) {
      if (particles.length >= MAX_PARTICLES) break;
      particles.push({
        x: W / 2 + (Math.random() - 0.5) * 120,
        y: H * 0.5 + (Math.random() - 0.5) * 80,
        vx: (Math.random() - 0.5) * 10,
        vy: -Math.random() * 8 - 2,
        life: 2.0,
        color: [boss.color, '#ff0', '#fff', '#f80'][Math.floor(Math.random() * 4)],
        size: 4 + Math.random() * 8
      });
    }
  }
}

function updateBoss(dt) {
  if (!boss || boss.defeated) return;

  // Activate boss when player approaches
  var dist = boss.z - player.z;
  if (dist < 3000 && dist > -500 && !boss.active) {
    boss.active = true;
    boss.speed = player.speed * 0.9;
    SFX.bossRoar();
    addScorePopup('BOSS: ' + boss.name, W / 2, H * 0.2, boss.color);
    screenShake = 0.4;
  }

  if (!boss.active) return;

  // Boss stays near player
  var targetZ = player.z + 400;
  boss.z += (targetZ - boss.z) * 0.02 * dt * 60;
  boss.speed = player.speed * 0.85;

  // Boss movement patterns
  boss.attackTimer -= dt;
  boss.pattern += dt;
  boss.x = Math.sin(boss.pattern * 2) * 0.5;

  // Boss attacks player
  if (boss.attackTimer <= 0) {
    var bdz = Math.abs(boss.z - player.z);
    if (bdz < 500) {
      boss.attackTimer = 2.0 + Math.random() * 2.0;
      // [2] DEX dodge chance against boss
      var dodgeChance = 0.1 + Math.max(0, dexMod) * 0.05;
      if (Math.random() > dodgeChance) {
        if (shieldTimer <= 0) {
          player.hits++;
          spawnPlayerHitParticles();
          screenShake = 0.2;
          SFX.punch();
          addScorePopup('BOSS HIT!', W / 2, H * 0.45, '#f44');
          if (player.hits >= player.armor) {
            playerCrash();
          } else {
            player.speed *= 0.8;
          }
        } else {
          shieldTimer -= 1;
          addScorePopup('BLOCKED!', W / 2, H * 0.45, '#f4b41b');
          SFX.chain();
        }
      } else {
        addScorePopup('DODGED!', W / 2, H * 0.45, '#38d973');
      }
    }
  }

  if (boss.flashTimer > 0) boss.flashTimer -= dt;
}

// ============================================================
// ITEM & HAZARD COLLISION
// ============================================================
function updateItemsAndHazards(dt) {
  // Check item pickups
  for (var i = 0; i < roadItems.length; i++) {
    var item = roadItems[i];
    if (item.collected) continue;
    var dz = Math.abs(item.z - player.z);
    var dx = Math.abs(item.x - player.x);
    if (dz < 200 && dx < 0.25) {
      item.collected = true;
      SFX.pickup();
      applyItemEffect(item.type);
    }
  }

  // Check hazard collisions
  for (var i = 0; i < roadHazards.length; i++) {
    var haz = roadHazards[i];
    if (!haz.active) continue;
    var dz = Math.abs(haz.z - player.z);
    var dx = Math.abs(haz.x - player.x);
    if (dz < 150 && dx < 0.2) {
      // [5] WIS gives chance to auto-avoid hazards
      var avoidChance = Math.max(0, wisMod) * 0.08;
      if (Math.random() < avoidChance) {
        addScorePopup('AVOIDED!', W / 2, H * 0.5, '#38d973');
        haz.active = false;
        continue;
      }
      haz.active = false;
      SFX.hazard();
      applyHazardEffect(haz.type);
    }
  }
}

function applyItemEffect(type) {
  var val = type.value;
  switch (type.effect) {
    case 'heal':
      player.hits = Math.max(0, player.hits - val);
      addScorePopup('+GARDEN SEED', W / 2, H * 0.5, '#e6482e');
      break;
    case 'boost':
      player.speed = Math.min(player.maxSpeed * 1.3, player.speed + val);
      addScorePopup('+MYCELIUM BOOST', W / 2, H * 0.5, '#3cacd7');
      break;
    case 'money':
      var bonus = Math.floor(val * statB.scoreMult * (1 + Math.max(0, chaMod) * 0.1));  // [6] CHA bonus
      money += bonus;
      totalScore += bonus;
      addScorePopup('+' + bonus + ' POOP', W / 2, H * 0.5, '#38d973');
      break;
    case 'shield':
      shieldTimer = val;
      addScorePopup('+SPORE SHIELD', W / 2, H * 0.5, '#f4b41b');
      break;
    case 'nitro':
      player.nitro = Math.min(100, player.nitro + val);
      addScorePopup('+REACTOR FUEL', W / 2, H * 0.5, '#a855f7');
      break;
    case 'luck':
      luckBonus += val;
      addScorePopup('+SPORE GEM', W / 2, H * 0.5, '#f4b41b');
      break;
  }
}

function applyHazardEffect(type) {
  // [3] CON reduces hazard severity
  var reduction = 1.0 - Math.max(0, conMod) * 0.08;
  var severity = type.severity * reduction;

  switch (type.effect) {
    case 'slow':
      player.speed *= (1 - severity * 0.4);
      addScorePopup('SLOWED!', W / 2, H * 0.5, type.color);
      break;
    case 'spin':
      player.wobble += (Math.random() - 0.5) * severity * 0.3;
      player.tilt = (Math.random() - 0.5) * 0.5;
      addScorePopup('SPIN!', W / 2, H * 0.5, type.color);
      break;
    case 'damage':
      if (shieldTimer > 0) {
        shieldTimer -= 1;
        addScorePopup('BLOCKED!', W / 2, H * 0.5, '#f4b41b');
      } else {
        player.hits++;
        if (player.hits >= player.armor) playerCrash();
        addScorePopup('DAMAGE!', W / 2, H * 0.5, type.color);
      }
      spawnPlayerHitParticles();
      screenShake = 0.15;
      break;
    case 'slide':
      player.x += (Math.random() - 0.5) * severity * 0.4;
      player.speed *= 0.9;
      addScorePopup('ICE!', W / 2, H * 0.5, type.color);
      break;
    case 'stun':
      player.speed *= (1 - severity * 0.5);
      player.crashTimer = severity * 0.5;
      addScorePopup('STUNNED!', W / 2, H * 0.5, type.color);
      break;
  }
}

// ============================================================
// PARTICLE HELPERS
// ============================================================
function spawnHitParticles(opp) {
  const screenX = W / 2 + (opp.x - player.x) * W * 0.3;
  const screenY = H * 0.55;
  for (let i = 0; i < 12; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: screenX + (Math.random() - 0.5) * 30,
      y: screenY + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5 - 1,
      life: 1.2,
      color: opp.color || '#ff0',
      size: 3 + Math.random() * 5
    });
  }
}

function spawnElectricParticles(opp) {
  const screenX = W / 2 + (opp.x - player.x) * W * 0.3;
  const screenY = H * 0.55;
  for (let i = 0; i < 8; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: screenX + (Math.random() - 0.5) * 40,
      y: screenY + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      life: 0.6,
      color: '#0ff',
      size: 2 + Math.random() * 3
    });
  }
}

function spawnPlayerHitParticles() {
  for (let i = 0; i < 14; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 50,
      y: H * 0.72 + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5,
      life: 1,
      color: '#f4b41b',
      size: 3 + Math.random() * 5
    });
  }
}

function spawnCrashParticles() {
  for (let i = 0; i < 25; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 80,
      y: H * 0.75 + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 6 - 2,
      life: 1.5,
      color: ['#e6482e', '#f4b41b', '#a855f7', '#fff'][Math.floor(Math.random() * 4)],
      size: 4 + Math.random() * 6
    });
  }
}

function spawnNitroParticles() {
  for (let i = 0; i < 3; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 20,
      y: H * 0.82,
      vx: (Math.random() - 0.5) * 2,
      vy: Math.random() * 3 + 1,
      life: 0.5,
      color: statB.color,
      size: 4 + Math.random() * 4
    });
  }
}

function spawnZoneParticles(track) {
  if (Math.random() > 0.3) return;
  if (particles.length >= MAX_PARTICLES - 5) return;
  switch (track.zone) {
    case 'hollows':
      particles.push({
        x: Math.random() * W, y: Math.random() * H * 0.5,
        vx: (Math.random() - 0.5) * 1, vy: Math.random() * 0.5,
        life: 2, color: '#a4f', size: 2 + Math.random() * 3
      });
      break;
    case 'wastes':
      particles.push({
        x: Math.random() * W, y: H * 0.4 + Math.random() * H * 0.3,
        vx: Math.random() * 2, vy: -0.5,
        life: 1.5, color: '#0f03', size: 3 + Math.random() * 4
      });
      break;
    case 'frost':
      particles.push({
        x: Math.random() * W, y: -5,
        vx: (Math.random() - 0.5) * 2, vy: Math.random() * 2 + 1,
        life: 3, color: '#fff', size: 2
      });
      break;
    case 'namaris':
      particles.push({
        x: Math.random() * W, y: Math.random() * H * 0.3,
        vx: (Math.random() - 0.5) * 3, vy: Math.random(),
        life: 1, color: ['#f44', '#f80', '#ff0'][Math.floor(Math.random() * 3)], size: 2 + Math.random() * 2
      });
      break;
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  currentTrack = 0;
  money = 0;
  upgrades = { speed: 0, armor: 0, weapon: 0 };
  weapon = 'fist';
  totalWins = 0;
  bestTimes = [];
  totalScore = 0;
  luckBonus = 0;
  initRace();
}

function goToShop() {
  state = 'shop';
}

function nextRace() {
  currentTrack++;
  if (currentTrack >= TRACKS.length) {
    state = 'victory';
    return;
  }
  initRace();
}

function retryRace() {
  initRace();
}

function handleShopClick(e) {
  tryBuyUpgrade(e.clientX, e.clientY);
}

function handleShopTouch(touch) {
  tryBuyUpgrade(touch.clientX, touch.clientY);
}

function tryBuyUpgrade(cx, cy) {
  const bw = Math.min(240, W * 0.5);
  const bh = 50;
  const startX = W / 2 - bw / 2;
  const items = getShopItems();

  for (let i = 0; i < items.length; i++) {
    const by = H * 0.28 + i * 65;
    if (cx >= startX && cx <= startX + bw && cy >= by && cy <= by + bh) {
      if (money >= items[i].cost && items[i].canBuy) {
        money -= items[i].cost;
        items[i].action();
        SFX.buy();
      }
      return;
    }
  }

  const contY = H * 0.28 + items.length * 65 + 20;
  if (cx >= startX && cx <= startX + bw && cy >= contY && cy <= contY + bh) {
    nextRace();
  }
}

function getShopItems() {
  // [6] CHA gives shop discounts
  var discount = 1.0 - Math.max(0, chaMod) * 0.05;
  discount = Math.max(0.5, discount);
  return [
    { name: 'Speed +1 (Lv ' + upgrades.speed + '/5)', cost: Math.floor(200 * (upgrades.speed + 1) * discount),
      canBuy: upgrades.speed < 5, action: function() { upgrades.speed++; player.maxSpeed = (180 + upgrades.speed * 25) * statB.speed + intMod * 3; } },
    { name: 'Armor +1 (Lv ' + upgrades.armor + '/5)', cost: Math.floor(150 * (upgrades.armor + 1) * discount),
      canBuy: upgrades.armor < 5, action: function() { upgrades.armor++; } },
    { name: 'Mycelium Whip (Long Reach)', cost: Math.floor(300 * discount),
      canBuy: weapon === 'fist', action: function() { weapon = 'chain'; } },
    { name: 'Spore Mace (Powerful)', cost: Math.floor(500 * discount),
      canBuy: weapon === 'fist' || weapon === 'chain', action: function() { weapon = 'club'; } },
    { name: 'Reactor Prod (Stun)', cost: Math.floor(800 * discount),
      canBuy: weapon !== 'prod', action: function() { weapon = 'prod'; } }
  ];
}

// ============================================================
// UPDATE: COUNTDOWN
// ============================================================
function updateCountdown(dt) {
  countdownTimer -= dt;
  if (countdownTimer <= 0) {
    state = 'racing';
    SFX.countdownGo();
  }
}

// ============================================================
// UPDATE: RACING
// ============================================================
function updateRacing(dt) {
  const track = TRACKS[currentTrack];

  // Tutorial timer
  if (showTutorial && currentTrack === 0) {
    tutorialTimer += dt;
    if (tutorialTimer > 8) showTutorial = false;
  }

  // Combo decay
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Shield decay
  if (shieldTimer > 0) shieldTimer -= dt * 0.5;

  if (player.crashed) {
    player.crashTimer -= dt;
    player.speed *= 0.93;
    if (player.crashTimer <= 0) {
      player.crashed = false;
      // [3] CON speeds up recovery
      player.speed = 40 + Math.max(0, conMod) * 8;
      player.hits = 0;
      SFX.getup();
    }
    updateOpponents(dt);
    updateTraffic(dt);
    updateParticles(dt);
    updateBoss(dt);
    updateScorePopups(dt);
    raceTime += dt;
    return;
  }

  // Input
  let accelInput = 0;
  let steerInput = 0;
  if (keys['ArrowUp'] || keys['KeyW'] || touchState.up) accelInput = 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touchState.down) accelInput = -1;
  if (keys['ArrowLeft'] || touchState.left) steerInput = -1;
  if (keys['ArrowRight'] || touchState.right) steerInput = 1;

  // Nitro -- [4] INT improves nitro efficiency
  if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.nitro > 0) {
    player.nitroActive = true;
  } else {
    player.nitroActive = false;
  }

  var nitroDrain = 40 - Math.max(0, intMod) * 5;  // [4] INT reduces drain
  if (player.nitroActive && player.nitro > 0) {
    player.nitro -= dt * nitroDrain;
    player.speed += 3.0 * dt * 60;
    spawnNitroParticles();
    if (player.nitro <= 0) {
      player.nitro = 0;
      player.nitroActive = false;
    }
  } else {
    // [4] INT increases nitro recharge
    var rechargeRate = 5 + Math.max(0, intMod) * 1.5;
    player.nitro = Math.min(100, player.nitro + dt * rechargeRate);
  }

  // Acceleration
  if (accelInput > 0) {
    player.speed += player.accel * dt * 60;
  } else if (accelInput < 0) {
    player.speed -= player.braking * dt * 60;
    if (player.speed > 50) { SFX.skid(); }
  } else {
    player.speed -= 0.4 * dt * 60;
  }
  const effectiveMax = player.nitroActive ? player.maxSpeed * 1.3 : player.maxSpeed;
  player.speed = Math.max(0, Math.min(effectiveMax, player.speed));

  // Steering -- [2] DEX improves steering precision
  const speedRatio = player.speed / player.maxSpeed;
  var steerStrength = 0.035 * speedRatio + Math.max(0, dexMod) * 0.003;
  player.x += steerInput * steerStrength * dt * 60;
  player.tilt += (steerInput * 0.15 - player.tilt) * dt * 8;

  // Road curve push
  const segIdx = Math.floor(player.z / SEG_LENGTH) % segments.length;
  if (segments[segIdx]) {
    const curvePush = segments[segIdx].curve * 0.0012 * speedRatio;
    player.x -= curvePush * dt * 60;
  }

  // Slippery surface -- [2] DEX reduces slip effect
  if (track.slip > 0) {
    var slipReduction = 1.0 - Math.max(0, dexMod) * 0.08;
    player.wobble += (Math.random() - 0.5) * track.slip * dt * 2 * slipReduction;
    player.wobble *= 0.95;
    player.x += player.wobble * speedRatio * 0.02;
  }

  // Off-road penalty
  if (Math.abs(player.x) > 0.9) {
    player.speed *= (1 - 0.03 * dt * 60);
    if (Math.abs(player.x) > 1.4) {
      player.x = Math.sign(player.x) * 1.4;
      player.speed *= 0.9;
    }
  }

  // Advance position
  player.z += player.speed * dt * 60;

  // Sky parallax
  if (segments[segIdx]) {
    skyOffset += segments[segIdx].curve * speedRatio * dt * 30;
  }

  // Check finish
  const trackLen = segments.length * SEG_LENGTH;
  if (player.z >= trackLen && !raceFinished) {
    const pos = finishPositions.length + 1;
    finishPositions.push({ name: statB.name, time: raceTime, color: statB.color });
    endRace(pos);
  }

  // Attack decay
  if (player.attacking > 0) player.attacking -= dt;

  // Engine sound
  engineTimer -= dt;
  if (engineTimer <= 0 && player.speed > 10) {
    SFX.engine(player.speed, player.maxSpeed);
    engineTimer = 0.12 - speedRatio * 0.06;
  }

  // Opponent attacks on player
  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    opp.attackCooldown -= dt;
    const dz = Math.abs(opp.z - player.z);
    const dx = Math.abs(opp.x - player.x);
    if (dz < 250 && dx < 0.3 && opp.attackCooldown <= 0) {
      if (Math.random() < opp.aggression * dt * 3) {
        opp.attackCooldown = 2 + Math.random() * 2;
        // [2] DEX dodge chance
        var dodge = Math.max(0, dexMod) * 0.06;
        if (Math.random() < dodge) {
          addScorePopup('DODGED!', W / 2, H * 0.45, '#38d973');
          continue;
        }
        if (shieldTimer > 0) {
          shieldTimer -= 1;
          addScorePopup('BLOCKED!', W / 2, H * 0.45, '#f4b41b');
          SFX.chain();
          continue;
        }
        player.hits++;
        spawnPlayerHitParticles();
        screenShake = 0.1;
        SFX.punch();
        addScorePopup(opp.name + ' HITS!', W / 2, H * 0.5, opp.color);
        if (player.hits >= player.armor) {
          playerCrash();
        } else {
          player.speed *= 0.85;
        }
      }
    }
  }

  // Traffic collision
  for (const car of trafficCars) {
    const dz = Math.abs(car.z - player.z);
    const dx = Math.abs(car.x - player.x);
    if (dz < 150 && dx < 0.2) {
      playerCrash();
      break;
    }
  }

  updateOpponents(dt);
  updateTraffic(dt);
  updateParticles(dt);
  updateBoss(dt);
  updateItemsAndHazards(dt);
  updateScorePopups(dt);
  spawnZoneParticles(track);
  if (screenShake > 0) screenShake -= dt * 2;
  raceTime += dt;
}

function playerCrash() {
  player.crashed = true;
  // [3] CON reduces crash downtime
  player.crashTimer = Math.max(1.0, 2.5 - upgrades.armor * 0.2 - Math.max(0, conMod) * 0.15);
  player.hits = 0;
  SFX.crash();
  spawnCrashParticles();
  screenShake = 0.4;
}

function updateOpponents(dt) {
  const trackLen = segments.length * SEG_LENGTH;

  for (const opp of opponents) {
    if (opp.finished) continue;

    if (opp.crashed) {
      opp.crashTimer -= dt;
      opp.speed *= 0.93;
      if (opp.crashTimer <= 0) {
        opp.crashed = false;
        opp.speed = 70 + Math.random() * 40;
      }
      continue;
    }

    const distToPlayer = opp.z - player.z;
    if (distToPlayer > 5000) {
      opp.rubberband = -0.3;
    } else if (distToPlayer < -3000) {
      opp.rubberband = 0.4;
    } else {
      opp.rubberband *= 0.99;
    }

    const targetSpeed = opp.maxSpeed + opp.rubberband * opp.maxSpeed * 0.3;
    opp.speed += (targetSpeed - opp.speed) * opp.accel * dt * 2;
    opp.speed = Math.max(30, Math.min(opp.maxSpeed * 1.2, opp.speed));

    opp.steerTimer -= dt;
    if (opp.steerTimer <= 0) {
      opp.steerTarget = (Math.random() - 0.5) * 0.7;
      opp.steerTimer = 1 + Math.random() * 3;
    }
    opp.x += (opp.steerTarget - opp.x) * 0.015 * dt * 60;

    for (const other of opponents) {
      if (other === opp || other.crashed || other.finished) continue;
      if (Math.abs(other.z - opp.z) < 300 && Math.abs(other.x - opp.x) < 0.2) {
        opp.steerTarget += Math.sign(opp.x - other.x) * 0.3;
      }
    }

    for (const car of trafficCars) {
      if (Math.abs(car.z - opp.z) < 400 && Math.abs(car.x - opp.x) < 0.2) {
        opp.x += Math.sign(opp.x - car.x) * 0.01 * dt * 60;
      }
    }

    opp.x = Math.max(-1.0, Math.min(1.0, opp.x));
    opp.z += opp.speed * dt * 60;

    if (opp.z >= trackLen && !opp.finished) {
      opp.finished = true;
      opp.finishTime = raceTime;
      finishPositions.push({ name: opp.name, time: raceTime, color: opp.color });
    }
  }
}

function updateTraffic(dt) {
  const trackLen = segments.length * SEG_LENGTH;
  for (const car of trafficCars) {
    car.z += car.speed * dt * 60;
    if (car.z >= trackLen) car.z -= trackLen;
  }
}

function endRace(position) {
  raceFinished = true;
  const unfinished = opponents.filter(function(o) { return !o.finished; }).sort(function(a, b) { return b.z - a.z; });
  for (const opp of unfinished) {
    finishPositions.push({ name: opp.name, time: raceTime + 5, color: opp.color });
  }

  if (position <= 3) {
    // [6] CHA increases prize money
    var chaBonus = 1 + Math.max(0, chaMod) * 0.1;
    const prizes = [0, 600, 350, 150];
    var prize = Math.floor((prizes[position] + currentTrack * 75) * chaBonus * statB.scoreMult);
    money += prize;
    totalScore += prize;
    totalWins++;
    bestTimes[currentTrack] = raceTime;
    SFX.win();
    addScorePopup('+' + prize + 'M PRIZE!', W / 2, H * 0.4, '#f4b41b');
    setTimeout(function() { state = 'results'; }, 2000);
  } else {
    SFX.lose();
    setTimeout(function() { state = 'gameover'; }, 2000);
  }
}

// ============================================================
// PARTICLES
// ============================================================
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.08 * dt * 60;
    p.life -= dt * 2.0;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// RENDERING: PSEUDO 3D ROAD
// ============================================================
function project(seg, camX, camY, camZ) {
  const p = seg.p;
  p.camera = {
    x: (p.world.x || 0) - camX,
    y: (p.world.y || 0) - camY,
    z: p.world.z - camZ
  };
  if (p.camera.z <= 0) {
    p.screen = { scale: 0, x: 0, y: 0, w: 0 };
    return;
  }
  const scale = CAMERA_DEPTH / p.camera.z;
  p.screen = {
    scale: scale,
    x: Math.round(W / 2 + scale * p.camera.x * W / 2),
    y: Math.round(H / 2 - scale * p.camera.y * H / 2),
    w: Math.round(scale * ROAD_WIDTH * W / 2)
  };
}

function drawRoad() {
  const track = TRACKS[currentTrack];
  const baseSegIdx = Math.floor(player.z / SEG_LENGTH);
  const camZ = player.z - 500;
  let x = 0;
  let maxy = H;

  let shakeX = 0, shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake * 20;
    shakeY = (Math.random() - 0.5) * screenShake * 15;
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.52);
  grad.addColorStop(0, track.sky);
  grad.addColorStop(1, track.horizon);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.52);

  drawSkyElements(track);

  ctx.fillStyle = track.color1;
  ctx.fillRect(0, H * 0.48, W, H * 0.52);

  for (let i = DRAW_DIST; i > 0; i--) {
    const segIdx = (baseSegIdx + i) % segments.length;
    const seg = segments[segIdx];
    if (!seg) continue;

    const loopZ = (segIdx < baseSegIdx) ? segments.length * SEG_LENGTH : 0;
    seg.p.world.z = segIdx * SEG_LENGTH + loopZ;
    seg.p.world.x = x;

    project(seg, player.x * ROAD_WIDTH / 2, CAMERA_HEIGHT, camZ);
    x += seg.curve;

    const s = seg.p.screen;
    if (s.scale <= 0 || s.y >= maxy) continue;

    const prevIdx = (baseSegIdx + i + 1) % segments.length;
    const prevSeg = segments[prevIdx];
    if (!prevSeg || !prevSeg.p || !prevSeg.p.screen || prevSeg.p.screen.scale <= 0) continue;
    const ps = prevSeg.p.screen;

    if (ps.y <= s.y) continue;

    ctx.fillStyle = seg.color.grass;
    ctx.fillRect(0, s.y, W, ps.y - s.y);

    const rumbleW = s.w * 1.15;
    const prevRumbleW = ps.w * 1.15;
    drawPoly(seg.color.rumble,
      s.x - rumbleW, s.y, s.x + rumbleW, s.y,
      ps.x + prevRumbleW, ps.y, ps.x - prevRumbleW, ps.y);

    drawPoly(seg.color.road,
      s.x - s.w, s.y, s.x + s.w, s.y,
      ps.x + ps.w, ps.y, ps.x - ps.w, ps.y);

    if (Math.floor(segIdx / 4) % 2 === 0) {
      const laneW = Math.max(1, s.w * 0.015);
      const prevLaneW = Math.max(1, ps.w * 0.015);
      for (let lane = -1; lane <= 1; lane += 2) {
        const lx = s.x + s.w * lane * 0.33;
        const plx = ps.x + ps.w * lane * 0.33;
        drawPoly('#fff',
          lx - laneW, s.y, lx + laneW, s.y,
          plx + prevLaneW, ps.y, plx - prevLaneW, ps.y);
      }
    }

    if (Math.floor(segIdx / 6) % 2 === 0) {
      const cw = Math.max(1, s.w * 0.01);
      const pcw = Math.max(1, ps.w * 0.01);
      drawPoly('#ff0',
        s.x - cw, s.y, s.x + cw, s.y,
        ps.x + pcw, ps.y, ps.x - pcw, ps.y);
    }

    for (const obj of seg.objects) {
      drawRoadsideObject(obj, s);
    }

    if (seg.fog > 0) {
      ctx.fillStyle = track.horizon;
      ctx.globalAlpha = seg.fog * (1 - i / DRAW_DIST);
      ctx.fillRect(0, s.y, W, ps.y - s.y);
      ctx.globalAlpha = 1;
    }

    maxy = s.y;
  }

  drawTraffic(baseSegIdx, camZ);
  drawRoadPickups(camZ);
  drawRoadHazards(camZ);

  if (screenShake > 0) ctx.restore();
}

// ============================================================
// DRAW ROAD ITEMS & HAZARDS
// ============================================================
function drawRoadPickups(camZ) {
  var t = Date.now() * 0.001;
  for (var i = 0; i < roadItems.length; i++) {
    var item = roadItems[i];
    if (item.collected) continue;
    var relZ = item.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    var scale = CAMERA_DEPTH / relZ * W / 2;
    var sx = W / 2 + (item.x - player.x) * ROAD_WIDTH / 2 * scale;
    var sy = H / 2 - Math.sin(t * 3 + item.bobPhase) * 5 * scale * 100;
    var sz = scale * 200;
    if (sz < 3) continue;

    // Glow
    ctx.fillStyle = item.type.color;
    ctx.globalAlpha = 0.3 + Math.sin(t * 4 + item.bobPhase) * 0.15;
    ctx.beginPath();
    ctx.arc(sx, sy, sz * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Item body (NES pixel diamond)
    ctx.fillStyle = item.type.color;
    ctx.beginPath();
    ctx.moveTo(sx, sy - sz * 0.4);
    ctx.lineTo(sx + sz * 0.3, sy);
    ctx.lineTo(sx, sy + sz * 0.4);
    ctx.lineTo(sx - sz * 0.3, sy);
    ctx.closePath();
    ctx.fill();

    // Highlight
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(sx - sz * 0.05, sy - sz * 0.25, sz * 0.1, sz * 0.15);
    ctx.globalAlpha = 1;
  }
}

function drawRoadHazards(camZ) {
  var t = Date.now() * 0.001;
  for (var i = 0; i < roadHazards.length; i++) {
    var haz = roadHazards[i];
    if (!haz.active) continue;
    var relZ = haz.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    var scale = CAMERA_DEPTH / relZ * W / 2;
    var sx = W / 2 + (haz.x - player.x) * ROAD_WIDTH / 2 * scale;
    var sy = H / 2;
    var sz = scale * 300;
    if (sz < 3) continue;

    // Pulsing hazard zone
    ctx.fillStyle = haz.type.color;
    ctx.globalAlpha = 0.25 + Math.sin(t * 5 + haz.pulsePhase) * 0.1;
    ctx.beginPath();
    ctx.ellipse(sx, sy, sz * 0.5, sz * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Warning marks (NES-style X)
    ctx.strokeStyle = haz.type.color;
    ctx.lineWidth = Math.max(1, sz * 0.04);
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(sx - sz * 0.1, sy - sz * 0.08);
    ctx.lineTo(sx + sz * 0.1, sy + sz * 0.08);
    ctx.moveTo(sx + sz * 0.1, sy - sz * 0.08);
    ctx.lineTo(sx - sz * 0.1, sy + sz * 0.08);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// SKY ELEMENTS
// ============================================================
function drawSkyElements(track) {
  const t = Date.now() * 0.001;
  switch (track.objects) {
    case 'coastal':
      ctx.fillStyle = '#ffe080';
      ctx.beginPath();
      ctx.arc(W * 0.8 + skyOffset * 0.1, H * 0.12, 30, 0, Math.PI * 2);
      ctx.fill();
      drawClouds(track, t);
      break;
    case 'fungal':
      ctx.fillStyle = '#a4f';
      for (let i = 0; i < 15; i++) {
        const sx = (W * (i / 15) + t * 20 + skyOffset) % W;
        const sy = H * 0.1 + Math.sin(t + i) * H * 0.08;
        ctx.globalAlpha = 0.3 + Math.sin(t * 2 + i) * 0.2;
        ctx.beginPath();
        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 'mountain':
      ctx.fillStyle = '#3a5577';
      ctx.beginPath();
      ctx.moveTo(0, H * 0.48);
      for (let mx = 0; mx <= W; mx += W / 8) {
        ctx.lineTo(mx + skyOffset * 0.05, H * 0.3 + Math.sin(mx * 0.005) * H * 0.1);
      }
      ctx.lineTo(W, H * 0.48);
      ctx.closePath();
      ctx.fill();
      drawClouds(track, t);
      break;
    case 'reactor':
      ctx.fillStyle = '#223';
      for (let i = 0; i < 5; i++) {
        const bx = W * (i / 5) + skyOffset * 0.08;
        ctx.fillRect(bx % W, H * 0.3, 8, H * 0.18);
        ctx.fillStyle = '#334';
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc((bx + Math.sin(t + i) * 10) % W, H * 0.28, 15 + Math.sin(t * 0.5 + i) * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#223';
      }
      break;
    case 'desert':
      ctx.fillStyle = '#ff8';
      ctx.beginPath();
      ctx.arc(W * 0.5, H * 0.08, 40, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#eebb66';
      ctx.globalAlpha = 0.3 + Math.sin(t * 3) * 0.1;
      ctx.fillRect(0, H * 0.44, W, H * 0.06);
      ctx.globalAlpha = 1;
      break;
    case 'city':
      ctx.fillStyle = '#0a0a15';
      for (let i = 0; i < 20; i++) {
        const bx = (i * W / 20 + skyOffset * 0.03) % W;
        const bh = 20 + Math.abs(Math.sin(i * 1.3)) * 60;
        ctx.fillRect(bx, H * 0.48 - bh, W / 25, bh);
        ctx.fillStyle = ['#ff8', '#0ff', '#f0f', '#ff4'][i % 4];
        if (Math.sin(t + i * 3) > 0.3) {
          ctx.fillRect(bx + 3, H * 0.48 - bh + 5, 3, 3);
        }
        ctx.fillStyle = '#0a0a15';
      }
      ctx.fillStyle = '#dde';
      ctx.beginPath();
      ctx.arc(W * 0.2, H * 0.1, 20, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'ice':
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 30; i++) {
        const sx = (i * W / 30 + t * 30 + Math.sin(t + i) * 20) % W;
        const sy = (t * 40 + i * H / 30) % (H * 0.5);
        ctx.globalAlpha = 0.5;
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.globalAlpha = 1;
      break;
    case 'final':
      ctx.fillStyle = '#400';
      ctx.globalAlpha = 0.3 + Math.sin(t * 0.5) * 0.1;
      ctx.fillRect(0, 0, W, H * 0.2);
      ctx.globalAlpha = 1;
      if (Math.random() < 0.002) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(0, 0, W, H * 0.5);
        ctx.globalAlpha = 1;
      }
      break;
  }
}

function drawClouds(track, t) {
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 5; i++) {
    const cx = ((i * W / 5 + t * 10 + skyOffset * 0.05) % (W + 100)) - 50;
    const cy = H * 0.08 + i * H * 0.06;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 40 + i * 5, 12 + i * 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPoly(color, x1, y1, x2, y2, x3, y3, x4, y4) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// ROADSIDE OBJECTS (same as original, kept compact)
// ============================================================
function drawRoadsideObject(obj, screen) {
  const scale = screen.scale * 500;
  if (scale < 2) return;
  const x = screen.x + obj.side * (screen.w + obj.offset * screen.scale * W * 0.25);
  const y = screen.y;
  const s = scale;

  switch (obj.type) {
    case 'palm':
      ctx.fillStyle = '#864'; ctx.fillRect(x - s * 0.08, y - s * 2, s * 0.16, s * 2);
      ctx.fillStyle = '#2a5'; ctx.beginPath();
      ctx.moveTo(x, y - s * 2.2); ctx.lineTo(x - s * 0.8, y - s * 1.8);
      ctx.lineTo(x - s * 0.6, y - s * 2.3); ctx.lineTo(x + s * 0.6, y - s * 2.3);
      ctx.lineTo(x + s * 0.8, y - s * 1.8); ctx.closePath(); ctx.fill();
      break;
    case 'pine': case 'snowpine':
      ctx.fillStyle = '#543'; ctx.fillRect(x - s * 0.06, y - s * 2.2, s * 0.12, s * 2.2);
      ctx.fillStyle = obj.type === 'snowpine' ? '#8ab' : '#253';
      ctx.beginPath(); ctx.moveTo(x, y - s * 3); ctx.lineTo(x - s * 0.5, y - s * 1.2);
      ctx.lineTo(x + s * 0.5, y - s * 1.2); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x, y - s * 2.5); ctx.lineTo(x - s * 0.6, y - s * 0.5);
      ctx.lineTo(x + s * 0.6, y - s * 0.5); ctx.closePath(); ctx.fill();
      if (obj.type === 'snowpine') {
        ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.5;
        ctx.beginPath(); ctx.moveTo(x, y - s * 3); ctx.lineTo(x - s * 0.3, y - s * 2);
        ctx.lineTo(x + s * 0.3, y - s * 2); ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      }
      break;
    case 'rock': case 'boulder':
      ctx.fillStyle = '#667'; ctx.beginPath();
      ctx.moveTo(x - s * 0.4, y); ctx.lineTo(x - s * 0.3, y - s * 0.6);
      ctx.lineTo(x + s * 0.2, y - s * 0.7); ctx.lineTo(x + s * 0.4, y - s * 0.2);
      ctx.lineTo(x + s * 0.3, y); ctx.closePath(); ctx.fill();
      break;
    case 'mushroom': case 'glowshroom':
      ctx.fillStyle = '#eee'; ctx.fillRect(x - s * 0.06, y - s * 1.0, s * 0.12, s * 1.0);
      ctx.fillStyle = obj.type === 'glowshroom' ? '#0ff' : '#c33';
      ctx.beginPath(); ctx.ellipse(x, y - s * 1.1, s * 0.4, s * 0.25, 0, Math.PI, 0); ctx.fill();
      if (obj.type === 'glowshroom') {
        ctx.fillStyle = '#0ff'; ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003) * 0.2;
        ctx.beginPath(); ctx.arc(x, y - s * 1.0, s * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      }
      if (obj.type === 'mushroom') {
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.arc(x - s * 0.15, y - s * 1.15, s * 0.06, 0, Math.PI * 2);
        ctx.arc(x + s * 0.1, y - s * 1.2, s * 0.04, 0, Math.PI * 2); ctx.fill();
      }
      break;
    case 'sporetree':
      ctx.fillStyle = '#536'; ctx.fillRect(x - s * 0.1, y - s * 2.5, s * 0.2, s * 2.5);
      ctx.fillStyle = '#a4f'; ctx.beginPath(); ctx.arc(x, y - s * 2.7, s * 0.6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c6f'; ctx.globalAlpha = 0.5; ctx.beginPath();
      ctx.arc(x - s * 0.2, y - s * 2.9, s * 0.2, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      break;
    case 'crystal':
      ctx.fillStyle = '#a4f'; ctx.beginPath();
      ctx.moveTo(x, y - s * 1.5); ctx.lineTo(x - s * 0.2, y); ctx.lineTo(x + s * 0.2, y);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#c8f'; ctx.beginPath();
      ctx.moveTo(x + s * 0.1, y - s * 1.2); ctx.lineTo(x, y - s * 0.2); ctx.lineTo(x + s * 0.25, y - s * 0.3);
      ctx.closePath(); ctx.fill();
      break;
    case 'sign':
      ctx.fillStyle = '#654'; ctx.fillRect(x - s * 0.04, y - s * 1.4, s * 0.08, s * 1.4);
      ctx.fillStyle = '#ff0'; ctx.fillRect(x - s * 0.35, y - s * 1.5, s * 0.7, s * 0.35);
      ctx.fillStyle = '#000'; ctx.font = Math.max(6, s * 0.15) + 'px monospace';
      ctx.textAlign = 'center'; ctx.fillText('!', x, y - s * 1.25);
      break;
    case 'tower':
      ctx.fillStyle = '#445'; ctx.fillRect(x - s * 0.25, y - s * 3.5, s * 0.5, s * 3.5);
      ctx.fillStyle = '#556'; ctx.fillRect(x - s * 0.3, y - s * 3.6, s * 0.6, s * 0.2);
      ctx.fillStyle = '#f80'; ctx.beginPath(); ctx.arc(x, y - s * 3.7, s * 0.12, 0, Math.PI * 2); ctx.fill();
      break;
    case 'pipe':
      ctx.fillStyle = '#556'; ctx.fillRect(x - s * 0.8, y - s * 0.3, s * 1.6, s * 0.3);
      ctx.fillStyle = '#667'; ctx.beginPath();
      ctx.ellipse(x - s * 0.8, y - s * 0.15, s * 0.15, s * 0.15, 0, 0, Math.PI * 2); ctx.fill();
      break;
    case 'barrel':
      ctx.fillStyle = '#753'; ctx.beginPath();
      ctx.ellipse(x, y - s * 0.35, s * 0.25, s * 0.35, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#543'; ctx.lineWidth = Math.max(1, s * 0.04);
      ctx.beginPath(); ctx.ellipse(x, y - s * 0.35, s * 0.25, s * 0.35, 0, 0, Math.PI * 2); ctx.stroke();
      break;
    case 'tank':
      ctx.fillStyle = '#445'; ctx.beginPath();
      ctx.ellipse(x, y - s * 0.8, s * 0.5, s * 0.8, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#334'; ctx.fillRect(x - s * 0.5, y - s * 0.1, s * 1, s * 0.1);
      break;
    case 'antenna':
      ctx.strokeStyle = '#888'; ctx.lineWidth = Math.max(1, s * 0.03);
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - s * 3); ctx.stroke();
      ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.arc(x, y - s * 3, s * 0.08, 0, Math.PI * 2); ctx.fill();
      break;
    case 'smokestack':
      ctx.fillStyle = '#444'; ctx.fillRect(x - s * 0.15, y - s * 3, s * 0.3, s * 3);
      ctx.fillStyle = '#555'; ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc(x + Math.sin(Date.now() * 0.002) * s * 0.2, y - s * 3.3, s * 0.3, 0, Math.PI * 2);
      ctx.fill(); ctx.globalAlpha = 1;
      break;
    case 'cactus':
      ctx.fillStyle = '#4a4';
      ctx.fillRect(x - s * 0.08, y - s * 1.6, s * 0.16, s * 1.6);
      ctx.fillRect(x - s * 0.4, y - s * 1.2, s * 0.32, s * 0.12);
      ctx.fillRect(x - s * 0.4, y - s * 1.5, s * 0.12, s * 0.4);
      ctx.fillRect(x + s * 0.08, y - s * 0.9, s * 0.3, s * 0.12);
      ctx.fillRect(x + s * 0.26, y - s * 1.2, s * 0.12, s * 0.4);
      break;
    case 'skull':
      ctx.fillStyle = '#ddc'; ctx.beginPath();
      ctx.arc(x, y - s * 0.25, s * 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath();
      ctx.arc(x - s * 0.07, y - s * 0.28, s * 0.04, 0, Math.PI * 2);
      ctx.arc(x + s * 0.07, y - s * 0.28, s * 0.04, 0, Math.PI * 2); ctx.fill();
      break;
    case 'bones':
      ctx.fillStyle = '#ccb'; ctx.fillRect(x - s * 0.3, y - s * 0.05, s * 0.6, s * 0.05);
      ctx.beginPath(); ctx.arc(x - s * 0.3, y - s * 0.025, s * 0.04, 0, Math.PI * 2);
      ctx.arc(x + s * 0.3, y - s * 0.025, s * 0.04, 0, Math.PI * 2); ctx.fill();
      break;
    case 'tumbleweed':
      ctx.strokeStyle = '#986'; ctx.lineWidth = Math.max(1, s * 0.03);
      ctx.beginPath(); ctx.arc(x, y - s * 0.2, s * 0.2, 0, Math.PI * 2); ctx.stroke();
      break;
    case 'building':
      var bh = s * (2.5 + (obj.offset % 3));
      ctx.fillStyle = '#223'; ctx.fillRect(x - s * 0.5, y - bh, s * 1, bh);
      ctx.fillStyle = '#ff8';
      for (let wy = s * 0.3; wy < bh - s * 0.2; wy += s * 0.35) {
        for (let wx = 0; wx < 4; wx++) {
          if (Math.random() > 0.4) ctx.fillRect(x - s * 0.4 + wx * s * 0.22, y - bh + wy, s * 0.12, s * 0.15);
        }
      }
      break;
    case 'lamppost':
      ctx.fillStyle = '#555'; ctx.fillRect(x - s * 0.025, y - s * 2, s * 0.05, s * 2);
      ctx.fillRect(x - s * 0.15, y - s * 2, s * 0.3, s * 0.03);
      ctx.fillStyle = '#ff8'; ctx.globalAlpha = 0.8;
      ctx.beginPath(); ctx.arc(x, y - s * 2, s * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff8'; ctx.globalAlpha = 0.1;
      ctx.beginPath(); ctx.moveTo(x - s * 0.05, y - s * 1.9); ctx.lineTo(x - s * 0.3, y);
      ctx.lineTo(x + s * 0.3, y); ctx.lineTo(x + s * 0.05, y - s * 1.9);
      ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1;
      break;
    case 'neon':
      var neonColors = ['#f0f', '#0ff', '#ff0', '#f80', '#0f0'];
      ctx.fillStyle = neonColors[Math.floor(obj.offset) % neonColors.length];
      ctx.globalAlpha = 0.7 + Math.sin(Date.now() * 0.005 + obj.offset) * 0.3;
      ctx.fillRect(x - s * 0.5, y - s * 1.3, s * 1, s * 0.15); ctx.globalAlpha = 1;
      break;
    case 'dumpster':
      ctx.fillStyle = '#464'; ctx.fillRect(x - s * 0.3, y - s * 0.4, s * 0.6, s * 0.4);
      ctx.fillStyle = '#353'; ctx.fillRect(x - s * 0.3, y - s * 0.45, s * 0.6, s * 0.08);
      break;
    case 'hydrant':
      ctx.fillStyle = '#c22'; ctx.fillRect(x - s * 0.08, y - s * 0.5, s * 0.16, s * 0.5);
      ctx.fillRect(x - s * 0.12, y - s * 0.35, s * 0.24, s * 0.1);
      break;
    case 'icicle':
      ctx.fillStyle = '#bdf'; ctx.beginPath();
      ctx.moveTo(x - s * 0.1, y - s * 1.5); ctx.lineTo(x, y); ctx.lineTo(x + s * 0.1, y - s * 1.5);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#def'; ctx.globalAlpha = 0.5;
      ctx.fillRect(x - s * 0.02, y - s * 1.3, s * 0.04, s * 0.8); ctx.globalAlpha = 1;
      break;
    case 'snowman':
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x, y - s * 0.2, s * 0.2, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y - s * 0.5, s * 0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x, y - s * 0.72, s * 0.1, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f80'; ctx.fillRect(x, y - s * 0.73, s * 0.1, s * 0.03);
      break;
    case 'ice_wall':
      ctx.fillStyle = '#8bc'; ctx.globalAlpha = 0.7;
      ctx.fillRect(x - s * 0.6, y - s * 1.5, s * 1.2, s * 1.5); ctx.globalAlpha = 1;
      ctx.fillStyle = '#adf';
      ctx.fillRect(x - s * 0.5, y - s * 1.3, s * 0.05, s * 1.0);
      ctx.fillRect(x + s * 0.3, y - s * 1.1, s * 0.05, s * 0.8);
      break;
    case 'lighthouse':
      ctx.fillStyle = '#fff'; ctx.fillRect(x - s * 0.15, y - s * 3, s * 0.3, s * 3);
      ctx.fillStyle = '#c00';
      ctx.fillRect(x - s * 0.15, y - s * 2.5, s * 0.3, s * 0.3);
      ctx.fillRect(x - s * 0.15, y - s * 1.5, s * 0.3, s * 0.3);
      ctx.fillStyle = '#ff0'; ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.003) * 0.4;
      ctx.beginPath(); ctx.arc(x, y - s * 3.1, s * 0.15, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      break;
    case 'seagull':
      ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, s * 0.04);
      ctx.beginPath(); ctx.moveTo(x - s * 0.2, y - s * 1.5);
      ctx.quadraticCurveTo(x, y - s * 1.7, x + s * 0.2, y - s * 1.5); ctx.stroke();
      break;
    case 'driftwood':
      ctx.fillStyle = '#876'; ctx.fillRect(x - s * 0.4, y - s * 0.05, s * 0.8, s * 0.08);
      break;
    case 'spore_cloud':
      ctx.fillStyle = '#a4f'; ctx.globalAlpha = 0.2 + Math.sin(Date.now() * 0.002) * 0.1;
      ctx.beginPath(); ctx.arc(x, y - s * 0.5, s * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
      break;
    case 'goat':
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x - s * 0.15, y - s * 0.3, s * 0.3, s * 0.2);
      ctx.fillRect(x - s * 0.1, y - s * 0.1, s * 0.04, s * 0.1);
      ctx.fillRect(x + s * 0.06, y - s * 0.1, s * 0.04, s * 0.1);
      ctx.beginPath(); ctx.arc(x + s * 0.15, y - s * 0.35, s * 0.06, 0, Math.PI * 2); ctx.fill();
      break;
    case 'eagle_nest':
      ctx.fillStyle = '#654'; ctx.beginPath();
      ctx.ellipse(x, y - s * 0.1, s * 0.25, s * 0.1, 0, 0, Math.PI * 2); ctx.fill();
      break;
    default:
      ctx.fillStyle = '#888'; ctx.fillRect(x - s * 0.2, y - s * 0.5, s * 0.4, s * 0.5);
  }
}

// ============================================================
// DRAW TRAFFIC
// ============================================================
function drawTraffic(baseSegIdx, camZ) {
  for (const car of trafficCars) {
    let relZ = car.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    const scale = CAMERA_DEPTH / relZ * W / 2;
    const screenX = W / 2 + (car.x - player.x) * ROAD_WIDTH / 2 * scale;
    const screenY = H / 2;
    const carScale = scale * 300;
    if (carScale < 3) continue;

    ctx.fillStyle = car.color;
    ctx.fillRect(screenX - carScale * 0.3, screenY - carScale * 0.3, carScale * 0.6, carScale * 0.3);
    ctx.fillStyle = '#222';
    ctx.fillRect(screenX - carScale * 0.35, screenY - carScale * 0.05, carScale * 0.7, carScale * 0.1);
    ctx.fillStyle = '#f00';
    ctx.fillRect(screenX - carScale * 0.3, screenY - carScale * 0.2, carScale * 0.05, carScale * 0.05);
    ctx.fillRect(screenX + carScale * 0.25, screenY - carScale * 0.2, carScale * 0.05, carScale * 0.05);
  }
}

// ============================================================
// DRAW OPPONENTS
// ============================================================
function drawOpponents() {
  const camZ = player.z - 500;

  const sorted = opponents.filter(function(o) { return !o.finished; }).sort(function(a, b) { return b.z - a.z; });

  for (const opp of sorted) {
    let relZ = opp.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    const scale = CAMERA_DEPTH / relZ * W / 2;
    const screenX = W / 2 + (opp.x - player.x) * ROAD_WIDTH / 2 * scale;
    const screenY = H / 2;
    const bikeScale = scale * 400;
    if (bikeScale < 3) continue;

    if (opp.crashed) {
      drawCrashedBike(screenX, screenY, bikeScale, opp.color);
    } else {
      drawPixelBike(screenX, screenY, bikeScale, opp.color, false, 0);
    }
  }

  // Draw boss
  if (boss && boss.active && !boss.defeated) {
    var relZ = boss.z - camZ;
    if (relZ > 0 && relZ < DRAW_DIST * SEG_LENGTH) {
      var scale = CAMERA_DEPTH / relZ * W / 2;
      var bx = W / 2 + (boss.x - player.x) * ROAD_WIDTH / 2 * scale;
      var by = H / 2;
      var bs = scale * 600;
      if (bs >= 3) {
        drawBossSprite(bx, by, bs, boss);
      }
    }
  }
}

// ============================================================
// NES-STYLE PIXEL ART BIKE
// ============================================================
function drawPixelBike(x, y, scale, color, isPlayer, tilt) {
  var s = Math.max(scale, 5);
  ctx.save();
  ctx.translate(x, y);
  if (tilt) ctx.rotate(tilt * 0.3);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.05, s * 0.35, s * 0.05, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wheels (pixel circles)
  ctx.fillStyle = '#111';
  drawPixelCircle(-s * 0.25, 0, s * 0.2);
  drawPixelCircle(s * 0.25, -s * 0.02, s * 0.2);
  ctx.fillStyle = '#444';
  drawPixelCircle(-s * 0.25, 0, s * 0.1);
  drawPixelCircle(s * 0.25, -s * 0.02, s * 0.1);

  // Spokes (pixel lines)
  ctx.fillStyle = '#666';
  var spokeW = Math.max(1, s * 0.02);
  ctx.fillRect(-s * 0.25 - spokeW/2, -s * 0.18, spokeW, s * 0.36);
  ctx.fillRect(s * 0.25 - spokeW/2, -s * 0.2, spokeW, s * 0.36);

  // Frame (pixel blocks)
  ctx.fillStyle = color;
  var pw = Math.max(1, s * 0.04);
  // Main frame bar
  for (var fi = 0; fi < 10; fi++) {
    var fx = -s * 0.2 + fi * s * 0.04;
    var fy = -s * 0.05 - fi * s * 0.015;
    ctx.fillRect(fx, fy, pw, pw);
  }

  // Engine block
  ctx.fillStyle = '#444';
  ctx.fillRect(-s * 0.12, -s * 0.08, s * 0.18, s * 0.08);
  ctx.fillStyle = '#555';
  ctx.fillRect(-s * 0.1, -s * 0.1, s * 0.04, s * 0.04);

  // Exhaust pipe
  ctx.fillStyle = '#666';
  ctx.fillRect(-s * 0.32, -s * 0.02, s * 0.14, s * 0.03);
  ctx.fillStyle = '#888';
  ctx.fillRect(-s * 0.34, -s * 0.025, s * 0.04, s * 0.035);

  // Rider legs (pixel)
  ctx.fillStyle = '#222';
  ctx.fillRect(-s * 0.08, -s * 0.28, s * 0.05, s * 0.22);
  ctx.fillRect(s * 0.02, -s * 0.28, s * 0.05, s * 0.22);

  // Rider body (pixel torso)
  ctx.fillStyle = isPlayer ? statB.color : color;
  ctx.fillRect(-s * 0.09, -s * 0.55, s * 0.18, s * 0.3);
  // Shoulder pads
  ctx.fillStyle = isPlayer ? '#fff' : '#222';
  ctx.fillRect(-s * 0.12, -s * 0.52, s * 0.05, s * 0.06);
  ctx.fillRect(s * 0.07, -s * 0.52, s * 0.05, s * 0.06);

  // Arms
  ctx.fillStyle = isPlayer ? statB.color : color;
  ctx.fillRect(-s * 0.13, -s * 0.45, s * 0.04, s * 0.2);
  ctx.fillRect(s * 0.09, -s * 0.45, s * 0.04, s * 0.2);

  // Helmet (pixel)
  ctx.fillStyle = isPlayer ? '#f4b41b' : '#222';
  drawPixelCircle(0, -s * 0.62, s * 0.1);
  // Visor
  ctx.fillStyle = isPlayer ? '#7a444a' : '#444';
  ctx.fillRect(-s * 0.07, -s * 0.64, s * 0.14, s * 0.04);

  // Baseling icon on player helmet
  if (isPlayer && s > 15) {
    ctx.fillStyle = statB.color;
    ctx.font = Math.max(6, s * 0.08) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, -s * 0.68);
  }

  // Handlebars
  ctx.fillStyle = '#888';
  ctx.fillRect(s * 0.12, -s * 0.28, s * 0.15, s * 0.025);

  // Headlight
  ctx.fillStyle = '#ff8';
  ctx.fillRect(s * 0.22, -s * 0.15, s * 0.04, s * 0.06);

  ctx.restore();
}

function drawPixelCircle(cx, cy, r) {
  var step = Math.max(1, r * 0.3);
  for (var angle = 0; angle < Math.PI * 2; angle += 0.4) {
    var px = cx + Math.cos(angle) * r;
    var py = cy + Math.sin(angle) * r;
    ctx.fillRect(px - step / 2, py - step / 2, step, step);
  }
}

function drawCrashedBike(x, y, scale, color) {
  const s = Math.max(scale, 5);
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(x - s * 0.2, y + s * 0.02, s * 0.15, s * 0.08, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + s * 0.2, y + s * 0.02, s * 0.15, s * 0.08, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillRect(x - s * 0.25, y - s * 0.05, s * 0.5, s * 0.06);
  ctx.fillStyle = '#555';
  ctx.fillRect(x + s * 0.15, y - s * 0.12, s * 0.3, s * 0.08);
  ctx.beginPath();
  ctx.arc(x + s * 0.45, y - s * 0.08, s * 0.06, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// BOSS SPRITE (NES-style)
// ============================================================
function drawBossSprite(x, y, scale, b) {
  var s = Math.max(scale, 8);
  ctx.save();
  ctx.translate(x, y);

  // Boss is a large menacing rider
  var flash = b.flashTimer > 0 && Math.sin(Date.now() * 0.02) > 0;
  var mainColor = flash ? '#fff' : b.color;

  // Large wheels
  ctx.fillStyle = '#111';
  drawPixelCircle(-s * 0.3, s * 0.02, s * 0.25);
  drawPixelCircle(s * 0.3, 0, s * 0.25);
  ctx.fillStyle = '#333';
  drawPixelCircle(-s * 0.3, s * 0.02, s * 0.14);
  drawPixelCircle(s * 0.3, 0, s * 0.14);

  // Heavy frame
  ctx.fillStyle = mainColor;
  ctx.fillRect(-s * 0.25, -s * 0.12, s * 0.5, s * 0.08);
  ctx.fillRect(-s * 0.2, -s * 0.18, s * 0.4, s * 0.06);

  // Massive rider
  ctx.fillStyle = '#222';
  ctx.fillRect(-s * 0.1, -s * 0.35, s * 0.07, s * 0.25);
  ctx.fillRect(s * 0.03, -s * 0.35, s * 0.07, s * 0.25);
  ctx.fillStyle = mainColor;
  ctx.fillRect(-s * 0.12, -s * 0.65, s * 0.24, s * 0.35);
  // Armor plates
  ctx.fillStyle = flash ? '#fff' : '#444';
  ctx.fillRect(-s * 0.15, -s * 0.6, s * 0.06, s * 0.12);
  ctx.fillRect(s * 0.09, -s * 0.6, s * 0.06, s * 0.12);

  // Horned helmet
  ctx.fillStyle = '#333';
  drawPixelCircle(0, -s * 0.72, s * 0.12);
  ctx.fillStyle = mainColor;
  // Horns
  ctx.fillRect(-s * 0.14, -s * 0.85, s * 0.03, s * 0.15);
  ctx.fillRect(s * 0.11, -s * 0.85, s * 0.03, s * 0.15);
  // Eyes
  ctx.fillStyle = '#f00';
  ctx.fillRect(-s * 0.06, -s * 0.74, s * 0.04, s * 0.03);
  ctx.fillRect(s * 0.02, -s * 0.74, s * 0.04, s * 0.03);

  // HP bar above boss
  var barW = s * 0.6;
  var barH = Math.max(3, s * 0.04);
  ctx.fillStyle = '#300';
  ctx.fillRect(-barW / 2, -s * 0.95, barW, barH);
  ctx.fillStyle = '#f00';
  ctx.fillRect(-barW / 2, -s * 0.95, barW * (b.hp / b.maxHp), barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(-barW / 2, -s * 0.95, barW, barH);

  ctx.restore();
}

// ============================================================
// DRAW PLAYER
// ============================================================
function drawPlayer() {
  const px = W / 2 + player.x * W * 0.15;
  const py = H * 0.78;
  const scale = 42;

  // Shield glow
  if (shieldTimer > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.globalAlpha = 0.15 + Math.sin(Date.now() * 0.005) * 0.05;
    ctx.beginPath();
    ctx.arc(px, py - scale * 0.3, scale * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (player.crashed) {
    drawCrashedBike(px, py, scale, statB.color);
    const progress = 1 - (player.crashTimer / Math.max(1.0, 2.5 - upgrades.armor * 0.2 - Math.max(0, conMod) * 0.15));
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    if (progress < 0.5) {
      ctx.fillText('CRASHED!', px, py - 55);
    } else {
      ctx.fillText('Getting up...', px, py - 55);
    }
    ctx.fillStyle = '#333';
    ctx.fillRect(px - 40, py - 40, 80, 6);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(px - 40, py - 40, 80 * Math.max(0, progress), 6);
  } else {
    // === BASELING SPRITE ===
    if (!TAS.drawBaseling(ctx, px, py - scale * 0.3, scale, { flipX: false, frame: Date.now() * 0.01 })) {
      drawPixelBike(px, py, scale, statB.color, true, player.tilt);
    }

    // Draw attack arm
    if (player.attacking > 0) {
      ctx.save();
      ctx.translate(px, py);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      if (player.attackDir < 0) {
        ctx.moveTo(-scale * 0.12, -scale * 0.4);
        ctx.lineTo(-scale * 0.6, -scale * 0.45);
        ctx.fillStyle = '#fda';
        ctx.fillRect(-scale * 0.65, -scale * 0.48, scale * 0.12, scale * 0.1);
      } else if (player.attackDir > 0) {
        ctx.moveTo(scale * 0.12, -scale * 0.4);
        ctx.lineTo(scale * 0.6, -scale * 0.45);
        ctx.fillStyle = '#fda';
        ctx.fillRect(scale * 0.55, -scale * 0.48, scale * 0.12, scale * 0.1);
      } else {
        ctx.moveTo(0, -scale * 0.4);
        ctx.lineTo(scale * 0.5, -scale * 0.65);
      }
      ctx.stroke();

      // Weapon visuals
      if (player.attackType === 'chain' && player.attackDir === 0) {
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.arc(scale * 0.5 + i * scale * 0.08, -scale * 0.65 + Math.sin(i) * 3, 3, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else if (player.attackType === 'club' && player.attackDir === 0) {
        ctx.fillStyle = '#864';
        ctx.fillRect(scale * 0.4, -scale * 0.72, scale * 0.35, scale * 0.08);
        ctx.fillStyle = '#543';
        ctx.fillRect(scale * 0.65, -scale * 0.75, scale * 0.15, scale * 0.14);
      } else if (player.attackType === 'prod' && player.attackDir === 0) {
        ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(scale * 0.5, -scale * 0.65);
        ctx.lineTo(scale * 0.85, -scale * 0.5); ctx.stroke();
        ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(scale * 0.8, -scale * 0.52);
        ctx.lineTo(scale * 0.9, -scale * 0.58);
        ctx.lineTo(scale * 0.85, -scale * 0.45); ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, 60);

  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';

  // Speed gauge
  const speedPct = player.speed / player.maxSpeed;
  ctx.fillStyle = '#888';
  ctx.fillText('SPEED', 10, 14);
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 18, 100, 8);
  ctx.fillStyle = speedPct > 0.9 ? '#f44' : speedPct > 0.7 ? '#ff0' : '#0f0';
  ctx.fillRect(10, 18, 100 * Math.min(1, speedPct), 8);
  ctx.fillStyle = '#fff';
  ctx.fillText(Math.floor(player.speed) + ' mph', 10, 38);

  // Position
  const pos = getPlayerPosition();
  ctx.fillStyle = pos <= 3 ? '#38d973' : '#e6482e';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(pos + getOrdinal(pos), 120, 32);
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('of 6', 155, 32);

  // Track name + time + zone
  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 13px monospace';
  ctx.fillText(TRACKS[currentTrack].name.toUpperCase(), W / 2, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.fillText(formatTime(raceTime), W / 2, 30);
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Track ' + (currentTrack + 1) + '/8', W / 2, 44);

  // Baseling name + level
  ctx.fillStyle = statB.color;
  ctx.font = '10px monospace';
  ctx.fillText(statB.icon + ' ' + statB.name + (statB.level > 0 ? ' Lv' + statB.level : ''), W / 2, 56);

  // Right side: weapon + armor + nitro
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('WEAPON', W - 10, 12);
  ctx.fillStyle = weapon === 'prod' ? '#3cacd7' : weapon === 'club' ? '#e6482e' : weapon === 'chain' ? '#a855f7' : '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(weapon.toUpperCase(), W - 10, 26);

  // Armor pips
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('ARMOR', W - 70, 12);
  for (let i = 0; i < Math.min(player.armor, 10); i++) {
    ctx.fillStyle = i < (player.armor - player.hits) ? '#0f0' : '#300';
    ctx.fillRect(W - 135 + i * 12, 16, 10, 10);
  }

  // Nitro bar
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('FUEL', W - 10, 44);
  ctx.fillStyle = '#222';
  ctx.fillRect(W - 110, 38, 60, 8);
  ctx.fillStyle = player.nitroActive ? '#a855f7' : '#3cacd7';
  ctx.fillRect(W - 110, 38, 60 * (player.nitro / 100), 8);

  // Shield indicator
  if (shieldTimer > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('SPORE SHIELD ' + Math.ceil(shieldTimer), W - 10, 56);
  }

  // Combo counter
  if (comboCount > 1) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('COMBO x' + comboCount, 10, 56);
  }

  // Progress bar
  const trackLen = segments.length * SEG_LENGTH;
  const progress = Math.min(1, player.z / trackLen);
  ctx.fillStyle = '#222';
  ctx.fillRect(W * 0.05, 62, W * 0.9, 4);
  ctx.fillStyle = '#38d973';
  ctx.fillRect(W * 0.05, 62, W * 0.9 * progress, 4);

  ctx.fillStyle = '#fff';
  ctx.fillRect(W * 0.05 + W * 0.9 - 1, 60, 2, 6);

  for (const opp of opponents) {
    if (opp.finished) continue;
    const oppProgress = Math.min(1, opp.z / trackLen);
    ctx.fillStyle = opp.color;
    ctx.beginPath();
    ctx.arc(W * 0.05 + W * 0.9 * oppProgress, 64, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boss marker
  if (boss && !boss.defeated) {
    var bossProgress = Math.min(1, boss.z / trackLen);
    ctx.fillStyle = '#f00';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('B', W * 0.05 + W * 0.9 * bossProgress, 61);
  }

  // Player marker
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.moveTo(W * 0.05 + W * 0.9 * progress, 60);
  ctx.lineTo(W * 0.05 + W * 0.9 * progress - 3, 66);
  ctx.lineTo(W * 0.05 + W * 0.9 * progress + 3, 66);
  ctx.closePath();
  ctx.fill();

  // Touch hints
  if ('ontouchstart' in window) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PUNCH L', W * 0.15, H * 0.15);
    ctx.fillText('WEAPON', W * 0.5, H * 0.15);
    ctx.fillText('PUNCH R', W * 0.85, H * 0.15);
    ctx.fillText('STEER L', W * 0.12, H * 0.9);
    ctx.fillText('BRAKE', W * 0.38, H * 0.9);
    ctx.fillText('GAS', W * 0.62, H * 0.9);
    ctx.fillText('STEER R', W * 0.88, H * 0.9);
    ctx.globalAlpha = 1;
  }
}

function drawTutorial() {

  ctx.fillRect(W * 0.1, H * 0.12, W * 0.8, H * 0.25);

  ctx.font = 'bold 16px monospace';
  ctx.fillText('CONTROLS', W / 2, H * 0.17);

  ctx.fillStyle = '#ccc';
  ctx.font = '12px monospace';
  var lines = [
    'Arrow Keys: Steer / Gas / Brake',
    'A: Punch Left    Z: Punch Right',
    'SPACE: Use Weapon    SHIFT: Nitro',
    'Finish Top 3 to advance!',
    'Collect spore gems, avoid fungal hazards, defeat bosses!'
  ];
  for (var i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], W / 2, H * 0.21 + i * 16);
  }

  ctx.fillStyle = '#888';
