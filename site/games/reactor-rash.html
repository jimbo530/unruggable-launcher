<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reactor Rash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;

</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight - 20;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

function playFilteredNoise(dur, vol, freq) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = freq || 400;
  filt.Q.value = 3;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  engine(speed, maxSpeed) {
    const ratio = speed / maxSpeed;
    playTone(60 + ratio * 80, 0.04, 'sawtooth', 0.02 + ratio * 0.02, 80 + ratio * 100);
  },
  punch() { playNoise(0.08, 0.15); playTone(200, 0.1, 'square', 0.08, 80); },
  kick() { playNoise(0.1, 0.18); playTone(150, 0.12, 'triangle', 0.1, 60); },
  chain() { playTone(400, 0.15, 'sawtooth', 0.1, 200); playFilteredNoise(0.12, 0.1, 2000); },
  club() { playNoise(0.12, 0.2); playTone(100, 0.15, 'triangle', 0.12, 40); },
  prod() { playTone(800, 0.2, 'square', 0.06, 1200); playTone(1000, 0.15, 'sawtooth', 0.04, 600); },
  crash() { playNoise(0.3, 0.2); playTone(200, 0.4, 'sawtooth', 0.12, 40); },
  skid() { playFilteredNoise(0.2, 0.1, 1500); },
  countdown() { playTone(440, 0.15, 'square', 0.08); },
  countdownGo() { playTone(880, 0.3, 'square', 0.12); },
  win() {
    const notes = [523, 659, 784, 1047];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.15, 'square', 0.08), i * 120));
  },
  lose() {
    const notes = [440, 349, 293, 220];
    notes.forEach((n, i) => setTimeout(() => playTone(n, 0.2, 'sawtooth', 0.08), i * 180));
  },
  buy() { playTone(660, 0.1, 'square', 0.06); setTimeout(() => playTone(880, 0.12, 'square', 0.08), 100); },
  getup() { playTone(300, 0.2, 'triangle', 0.06, 500); },
  nitro() { playFilteredNoise(0.3, 0.12, 3000); playTone(200, 0.2, 'sawtooth', 0.06, 400); }
};

// ============================================================
// GAME CONSTANTS
// ============================================================
const ROAD_WIDTH = 2000;
const SEG_LENGTH = 200;
const DRAW_DIST = 150;
const CAMERA_HEIGHT = 1200;
const CAMERA_DEPTH = 1 / Math.tan((80 / 2) * Math.PI / 180);
const LANES = 3;
const MAX_PARTICLES = 200;

// ============================================================
// TRACK DEFINITIONS
// ============================================================
const TRACKS = [
  { name: 'Coastal Highway', segments: 300, color1: '#3a5a3a', color2: '#2a4a2a', road1: '#666', road2: '#555',
    rumble1: '#c44', rumble2: '#fff', sky: '#5588cc', horizon: '#88bbee', curve: 0.5, hill: 0.3,
    objects: 'coastal', desc: 'Gentle curves along the ocean', slip: 0, traffic: 0 },
  { name: 'Fungal Forest Road', segments: 280, color1: '#2a1a3a', color2: '#1a0a2a', road1: '#554', road2: '#443',
    rumble1: '#a6a', rumble2: '#636', sky: '#221133', horizon: '#442266', curve: 0.9, hill: 0.4,
    objects: 'fungal', desc: 'Tight turns through mushroom groves', slip: 0, traffic: 0 },
  { name: 'Mountain Pass', segments: 350, color1: '#4a4a3a', color2: '#3a3a2a', road1: '#777', road2: '#666',
    rumble1: '#fff', rumble2: '#c44', sky: '#4477aa', horizon: '#aaccee', curve: 0.7, hill: 0.9,
    objects: 'mountain', desc: 'Steep hills and cliff edges', slip: 0, traffic: 0 },
  { name: 'Reactor Highway', segments: 320, color1: '#1a2a1a', color2: '#0a1a0a', road1: '#444', road2: '#333',
    rumble1: '#ff0', rumble2: '#f80', sky: '#112211', horizon: '#334433', curve: 0.2, hill: 0.1,
    objects: 'reactor', desc: 'Straight and fast with obstacles', slip: 0, traffic: 0.3 },
  { name: 'Desert Strip', segments: 300, color1: '#c8a050', color2: '#b89040', road1: '#887', road2: '#776',
    rumble1: '#fff', rumble2: '#c44', sky: '#cc9944', horizon: '#eebb66', curve: 0.3, hill: 0.2,
    objects: 'desert', desc: 'Wide open with sand mirages', slip: 0.1, traffic: 0 },
  { name: 'Night City', segments: 340, color1: '#111', color2: '#0a0a0a', road1: '#333', road2: '#222',
    rumble1: '#0ff', rumble2: '#f0f', sky: '#050510', horizon: '#111122', curve: 0.6, hill: 0.2,
    objects: 'city', desc: 'Dark streets with neon and traffic', slip: 0, traffic: 0.5 },
  { name: 'Ice Road', segments: 310, color1: '#aaccdd', color2: '#99bbcc', road1: '#8899aa', road2: '#7788aa',
    rumble1: '#fff', rumble2: '#adf', sky: '#aabbdd', horizon: '#ddeeff', curve: 0.8, hill: 0.5,
    objects: 'ice', desc: 'Slippery, narrow, avalanche zones', slip: 0.4, traffic: 0 },
  { name: 'Final Circuit', segments: 500, color1: '#2a2a2a', color2: '#1a1a1a', road1: '#555', road2: '#444',
    rumble1: '#f00', rumble2: '#fff', sky: '#220000', horizon: '#440000', curve: 1.0, hill: 1.0,
    objects: 'final', desc: 'The ultimate test - mix of everything', slip: 0.15, traffic: 0.3 }
];

// ============================================================
// STATE
// ============================================================
let state = 'title'; // title, countdown, racing, crashed, results, shop, gameover, victory
let currentTrack = 0;
let money = 0;
let upgrades = { speed: 0, armor: 0, weapon: 0 };
let weapon = 'fist'; // fist, chain, club, prod
let segments = [];
let player = {};
let opponents = [];
let trafficCars = [];
let raceTime = 0;
let raceFinished = false;
let countdownTimer = 0;
let engineTimer = 0;
let finishPositions = [];
let lastTime = 0;
let particles = [];
let keys = {};
let screenShake = 0;
let totalWins = 0;
let bestTimes = [];
let skyOffset = 0;

// ============================================================
// TRACK GENERATION
// ============================================================
function buildTrack(trackIdx) {
  const track = TRACKS[trackIdx];
  segments = [];
  const numSeg = track.segments;

  for (let i = 0; i < numSeg; i++) {
    const seg = {
      index: i,
      p: { world: { x: 0, y: 0, z: i * SEG_LENGTH }, screen: {}, camera: {} },
      curve: 0,
      color: (Math.floor(i / 3) % 2 === 0) ? { road: track.road1, grass: track.color1, rumble: track.rumble1 }
                                              : { road: track.road2, grass: track.color2, rumble: track.rumble2 },
      objects: [],
      fog: 0
    };

    // Curves - more complex patterns
    const progress = i / numSeg;
    if (progress > 0.03 && progress < 0.97) {
      const curveStrength = track.curve;
      seg.curve = Math.sin(i * 0.02) * curveStrength * 3 +
                  Math.sin(i * 0.007) * curveStrength * 5 +
                  Math.cos(i * 0.033) * curveStrength * 2;
    }

    // Hills - more varied
    const hillStrength = track.hill;
    seg.p.world.y = Math.sin(i * 0.015) * hillStrength * 3000 +
                    Math.sin(i * 0.005) * hillStrength * 5000 +
                    Math.cos(i * 0.025) * hillStrength * 1500;

    // Roadside objects (both sides for density)
    if (Math.random() < 0.18) {
      const offset = ROAD_WIDTH * 0.6 + Math.random() * ROAD_WIDTH * 0.5;
      seg.objects.push({ type: getObjectType(track.objects), side: -1, offset });
    }
    if (Math.random() < 0.18) {
      const offset = ROAD_WIDTH * 0.6 + Math.random() * ROAD_WIDTH * 0.5;
      seg.objects.push({ type: getObjectType(track.objects), side: 1, offset });
    }

    // Fog for atmosphere
    if (track.objects === 'fungal' || track.objects === 'ice') {
      seg.fog = 0.1 + Math.sin(i * 0.01) * 0.05;
    }

    segments.push(seg);
  }

  // Start/finish line markers
  for (let i = 0; i < 3; i++) {
    segments[i].color = { road: '#fff', grass: segments[i].color.grass, rumble: '#000' };
  }
  for (let i = numSeg - 3; i < numSeg; i++) {
    segments[i].color = { road: '#fff', grass: segments[i].color.grass, rumble: '#ff0' };
  }

  // Generate traffic for applicable tracks
  trafficCars = [];
  if (track.traffic > 0) {
    const numCars = Math.floor(track.segments * track.traffic * 0.1);
    for (let i = 0; i < numCars; i++) {
      trafficCars.push({
        z: Math.random() * numSeg * SEG_LENGTH,
        x: (Math.random() - 0.5) * 0.6,
        speed: 40 + Math.random() * 30,
        color: ['#888', '#666', '#555', '#777', '#999'][Math.floor(Math.random() * 5)],
        width: 0.15 + Math.random() * 0.05
      });
    }
  }
}

function getObjectType(theme) {
  const types = {
    coastal: ['palm', 'palm', 'rock', 'sign', 'lighthouse', 'seagull', 'driftwood'],
    fungal: ['mushroom', 'glowshroom', 'sporetree', 'crystal', 'mushroom', 'spore_cloud'],
    mountain: ['pine', 'pine', 'boulder', 'cliff', 'sign', 'goat', 'eagle_nest'],
    reactor: ['tower', 'pipe', 'barrel', 'sign', 'tank', 'antenna', 'smokestack'],
    desert: ['cactus', 'cactus', 'skull', 'rock', 'sign', 'tumbleweed', 'bones'],
    city: ['building', 'building', 'lamppost', 'sign', 'neon', 'dumpster', 'hydrant'],
    ice: ['icicle', 'snowpine', 'snowpine', 'rock', 'sign', 'snowman', 'ice_wall'],
    final: ['tower', 'pine', 'mushroom', 'building', 'barrel', 'cactus', 'crystal']
  };
  const list = types[theme] || types.coastal;
  return list[Math.floor(Math.random() * list.length)];
}

// ============================================================
// PLAYER / OPPONENTS INIT
// ============================================================
function initRace() {
  const track = TRACKS[currentTrack];
  buildTrack(currentTrack);

  player = {
    x: 0,
    z: 0,
    speed: 0,
    maxSpeed: 180 + upgrades.speed * 25,
    accel: 0.8 + upgrades.speed * 0.12,
    braking: 2.0,
    steer: 0,
    position: 0,
    attacking: 0,
    attackDir: 0,
    attackType: 'fist',
    crashed: false,
    crashTimer: 0,
    armor: 2 + upgrades.armor,
    hits: 0,
    nitro: 100,
    nitroActive: false,
    wobble: 0,
    tilt: 0
  };

  opponents = [];
  const colors = ['#e44', '#4e4', '#44e', '#e4e', '#ee4'];
  const names = ['Grok', 'Spike', 'Vex', 'Torque', 'Blaze'];

  for (let i = 0; i < 5; i++) {
    const difficulty = 1 + currentTrack * 0.12;
    opponents.push({
      x: ((i % LANES) - 1) * 0.35,
      z: 150 + i * 250,
      speed: (100 + Math.random() * 40) * difficulty,
      maxSpeed: (140 + Math.random() * 35) * difficulty,
      accel: 0.5 + Math.random() * 0.3,
      color: colors[i],
      name: names[i],
      crashed: false,
      crashTimer: 0,
      aggression: 0.2 + Math.random() * 0.4 + currentTrack * 0.05,
      finished: false,
      finishTime: 0,
      steerTarget: ((i % LANES) - 1) * 0.35,
      steerTimer: 0,
      rubberband: 0,
      attackCooldown: 0
    });
  }

  raceTime = 0;
  raceFinished = false;
  finishPositions = [];
  particles = [];
  screenShake = 0;
  countdownTimer = 3.5;
  state = 'countdown';
}

// ============================================================
// INPUT HANDLING
// ============================================================
window.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.code] = true;

  if (state === 'racing' && !player.crashed) {
    if (e.code === 'KeyA') attackLeft();
    if (e.code === 'KeyZ' || e.code === 'KeyX') attackRight();
    if (e.code === 'Space') useWeapon();
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') activateNitro();
  }
  if (state === 'title' && (e.code === 'Enter' || e.code === 'Space')) startGame();
  if (state === 'results' && (e.code === 'Enter' || e.code === 'Space')) goToShop();
  if (state === 'shop' && e.code === 'Enter') nextRace();
  if (state === 'gameover' && (e.code === 'Enter' || e.code === 'Space')) retryRace();
  if (state === 'victory' && (e.code === 'Enter' || e.code === 'Space')) { state = 'title'; }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch controls
let touchState = { left: false, right: false, up: false, down: false };
let touchAttack = null;

canvas.addEventListener('touchstart', handleTouch, { passive: false });
canvas.addEventListener('touchmove', handleTouch, { passive: false });
canvas.addEventListener('touchend', handleTouch, { passive: false });

function handleTouch(e) {
  ensureAudio();
  e.preventDefault();

  if (state === 'title') { startGame(); return; }
  if (state === 'results') { goToShop(); return; }
  if (state === 'gameover') { retryRace(); return; }
  if (state === 'victory') { state = 'title'; return; }
  if (state === 'shop') {
    if (e.touches.length > 0) handleShopTouch(e.touches[0]);
    return;
  }

  touchState = { left: false, right: false, up: false, down: false };
  touchAttack = null;

  for (let i = 0; i < e.touches.length; i++) {
    const t = e.touches[i];
    const x = t.clientX / W;
    const y = t.clientY / H;
    if (y > 0.75) {
      if (x < 0.25) touchState.left = true;
      else if (x > 0.75) touchState.right = true;
      else if (x < 0.5) touchState.down = true;
      else touchState.up = true;
    } else if (y < 0.25) {
      if (x < 0.33) { if (e.type === 'touchstart') attackLeft(); }
      else if (x > 0.66) { if (e.type === 'touchstart') attackRight(); }
      else { if (e.type === 'touchstart') useWeapon(); }
    } else {
      touchState.up = true;
    }
  }
}

canvas.addEventListener('click', e => {
  ensureAudio();
  if (state === 'title') startGame();
  else if (state === 'results') goToShop();
  else if (state === 'gameover') retryRace();
  else if (state === 'victory') { state = 'title'; }
  else if (state === 'shop') handleShopClick(e);
});

// ============================================================
// COMBAT SYSTEM
// ============================================================
function attackLeft() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.3;
  player.attackDir = -1;
  player.attackType = 'fist';
  player.tilt = -0.3;
  SFX.punch();
  checkAttackHit(-1);
}

function attackRight() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.3;
  player.attackDir = 1;
  player.attackType = 'fist';
  player.tilt = 0.3;
  SFX.punch();
  checkAttackHit(1);
}

function useWeapon() {
  if (state !== 'racing' || player.crashed) return;
  player.attacking = 0.4;
  player.attackDir = 0;
  player.attackType = weapon;
  if (weapon === 'chain') SFX.chain();
  else if (weapon === 'club') SFX.club();
  else if (weapon === 'prod') SFX.prod();
  else { SFX.kick(); player.attackType = 'kick'; }
  checkWeaponHit();
}

function activateNitro() {
  if (player.nitro > 0 && !player.nitroActive) {
    player.nitroActive = true;
    SFX.nitro();
  }
}

function checkAttackHit(dir) {
  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    const dz = Math.abs(opp.z - player.z);
    const dx = opp.x - player.x;
    if (dz < 400 && ((dir < 0 && dx < -0.05 && dx > -0.5) || (dir > 0 && dx > 0.05 && dx < 0.5))) {
      knockOpponent(opp, 0.5);
      spawnHitParticles(opp);
      screenShake = 0.15;
      return;
    }
  }
}

function checkWeaponHit() {
  const reach = weapon === 'chain' ? 600 : weapon === 'club' ? 400 : weapon === 'prod' ? 500 : 350;
  const power = weapon === 'club' ? 1.0 : weapon === 'prod' ? 0.7 : weapon === 'chain' ? 0.6 : 0.4;
  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    const dz = Math.abs(opp.z - player.z);
    const dx = Math.abs(opp.x - player.x);
    if (dz < reach && dx < 0.6) {
      knockOpponent(opp, power);
      spawnHitParticles(opp);
      if (weapon === 'prod') {
        opp.speed *= 0.2;
        spawnElectricParticles(opp);
      }
      screenShake = 0.2;
      return;
    }
  }
}

function knockOpponent(opp, power) {
  if (Math.random() < power) {
    opp.crashed = true;
    opp.crashTimer = 2.0 + Math.random() * 1.5;
    opp.speed = 0;
    SFX.crash();
  } else {
    opp.speed *= 0.6;
    opp.x += (Math.random() - 0.5) * 0.4;
  }
}

function spawnHitParticles(opp) {
  const screenX = W / 2 + (opp.x - player.x) * W * 0.3;
  const screenY = H * 0.55;
  for (let i = 0; i < 10; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: screenX + (Math.random() - 0.5) * 30,
      y: screenY + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 5,
      vy: -Math.random() * 4 - 1,
      life: 1,
      color: opp.color || '#ff0',
      size: 3 + Math.random() * 5
    });
  }
}

function spawnElectricParticles(opp) {
  const screenX = W / 2 + (opp.x - player.x) * W * 0.3;
  const screenY = H * 0.55;
  for (let i = 0; i < 6; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: screenX + (Math.random() - 0.5) * 40,
      y: screenY + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      life: 0.5,
      color: '#0ff',
      size: 2 + Math.random() * 3
    });
  }
}

function spawnPlayerHitParticles() {
  for (let i = 0; i < 12; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 50,
      y: H * 0.72 + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5,
      life: 1,
      color: '#ff0',
      size: 3 + Math.random() * 5
    });
  }
}

function spawnCrashParticles() {
  for (let i = 0; i < 20; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 80,
      y: H * 0.75 + (Math.random() - 0.5) * 40,
      vx: (Math.random() - 0.5) * 8,
      vy: -Math.random() * 6 - 2,
      life: 1.5,
      color: ['#f80', '#ff0', '#f44', '#fff'][Math.floor(Math.random() * 4)],
      size: 4 + Math.random() * 6
    });
  }
}

function spawnNitroParticles() {
  for (let i = 0; i < 2; i++) {
    if (particles.length >= MAX_PARTICLES) break;
    particles.push({
      x: W / 2 + (Math.random() - 0.5) * 20,
      y: H * 0.82,
      vx: (Math.random() - 0.5) * 2,
      vy: Math.random() * 3 + 1,
      life: 0.4,
      color: '#08f',
      size: 4 + Math.random() * 4
    });
  }
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame() {
  currentTrack = 0;
  money = 0;
  upgrades = { speed: 0, armor: 0, weapon: 0 };
  weapon = 'fist';
  totalWins = 0;
  bestTimes = [];
  initRace();
}

function goToShop() {
  state = 'shop';
}

function nextRace() {
  currentTrack++;
  if (currentTrack >= TRACKS.length) {
    state = 'victory';
    return;
  }
  initRace();
}

function retryRace() {
  initRace();
}

function handleShopClick(e) {
  tryBuyUpgrade(e.clientX, e.clientY);
}

function handleShopTouch(touch) {
  tryBuyUpgrade(touch.clientX, touch.clientY);
}

function tryBuyUpgrade(cx, cy) {
  const bw = Math.min(240, W * 0.5);
  const bh = 50;
  const startX = W / 2 - bw / 2;
  const items = getShopItems();

  for (let i = 0; i < items.length; i++) {
    const by = H * 0.28 + i * 65;
    if (cx >= startX && cx <= startX + bw && cy >= by && cy <= by + bh) {
      if (money >= items[i].cost && items[i].canBuy) {
        money -= items[i].cost;
        items[i].action();
        SFX.buy();
      }
      return;
    }
  }

  // Continue button
  const contY = H * 0.28 + items.length * 65 + 20;
  if (cx >= startX && cx <= startX + bw && cy >= contY && cy <= contY + bh) {
    nextRace();
  }
}

function getShopItems() {
  return [
    { name: 'Speed +1 (Lv ' + upgrades.speed + '/5)', cost: 200 * (upgrades.speed + 1),
      canBuy: upgrades.speed < 5, action: () => { upgrades.speed++; } },
    { name: 'Armor +1 (Lv ' + upgrades.armor + '/5)', cost: 150 * (upgrades.armor + 1),
      canBuy: upgrades.armor < 5, action: () => { upgrades.armor++; } },
    { name: 'Chain (Long Reach)', cost: 300,
      canBuy: weapon === 'fist', action: () => { weapon = 'chain'; } },
    { name: 'Club (Powerful)', cost: 500,
      canBuy: weapon === 'fist' || weapon === 'chain', action: () => { weapon = 'club'; } },
    { name: 'Cattle Prod (Stun)', cost: 800,
      canBuy: weapon !== 'prod', action: () => { weapon = 'prod'; } }
  ];
}

// ============================================================
// UPDATE: COUNTDOWN
// ============================================================
function updateCountdown(dt) {
  countdownTimer -= dt;
  if (countdownTimer <= 0) {
    state = 'racing';
    SFX.countdownGo();
  } else if (countdownTimer < 3 && Math.floor(countdownTimer * 10) % 10 === 0) {
    // Beep on each second
  }
}

// ============================================================
// UPDATE: RACING
// ============================================================
function updateRacing(dt) {
  const track = TRACKS[currentTrack];

  if (player.crashed) {
    player.crashTimer -= dt;
    player.speed *= 0.93;
    if (player.crashTimer <= 0) {
      player.crashed = false;
      player.speed = 40;
      player.hits = 0;
      SFX.getup();
    }
    updateOpponents(dt);
    updateTraffic(dt);
    updateParticles(dt);
    raceTime += dt;
    return;
  }

  // Input
  let accelInput = 0;
  let steerInput = 0;
  if (keys['ArrowUp'] || keys['KeyW'] || touchState.up) accelInput = 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touchState.down) accelInput = -1;
  if (keys['ArrowLeft'] || touchState.left) steerInput = -1;
  if (keys['ArrowRight'] || touchState.right) steerInput = 1;

  // Nitro
  if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.nitro > 0) {
    player.nitroActive = true;
  } else {
    player.nitroActive = false;
  }

  if (player.nitroActive && player.nitro > 0) {
    player.nitro -= dt * 40;
    player.speed += 3.0 * dt * 60;
    spawnNitroParticles();
    if (player.nitro <= 0) {
      player.nitro = 0;
      player.nitroActive = false;
    }
  } else {
    // Recharge nitro slowly
    player.nitro = Math.min(100, player.nitro + dt * 5);
  }

  // Acceleration / braking
  if (accelInput > 0) {
    player.speed += player.accel * dt * 60;
  } else if (accelInput < 0) {
    player.speed -= player.braking * dt * 60;
    if (player.speed > 50) { SFX.skid(); }
  } else {
    player.speed -= 0.4 * dt * 60;
  }
  const effectiveMax = player.nitroActive ? player.maxSpeed * 1.3 : player.maxSpeed;
  player.speed = Math.max(0, Math.min(effectiveMax, player.speed));

  // Steering
  const speedRatio = player.speed / player.maxSpeed;
  const steerStrength = 0.035 * speedRatio;
  player.x += steerInput * steerStrength * dt * 60;
  player.tilt += (steerInput * 0.15 - player.tilt) * dt * 8;

  // Road curve push
  const segIdx = Math.floor(player.z / SEG_LENGTH) % segments.length;
  if (segments[segIdx]) {
    const curvePush = segments[segIdx].curve * 0.0012 * speedRatio;
    player.x -= curvePush * dt * 60;
  }

  // Slippery surface (ice/desert)
  if (track.slip > 0) {
    player.wobble += (Math.random() - 0.5) * track.slip * dt * 2;
    player.wobble *= 0.95;
    player.x += player.wobble * speedRatio * 0.02;
  }

  // Off-road penalty
  if (Math.abs(player.x) > 0.9) {
    player.speed *= (1 - 0.03 * dt * 60);
    if (Math.abs(player.x) > 1.4) {
      player.x = Math.sign(player.x) * 1.4;
      player.speed *= 0.9;
    }
  }

  // Advance position
  player.z += player.speed * dt * 60;

  // Sky parallax
  if (segments[segIdx]) {
    skyOffset += segments[segIdx].curve * speedRatio * dt * 30;
  }

  // Check finish
  const trackLen = segments.length * SEG_LENGTH;
  if (player.z >= trackLen && !raceFinished) {
    const pos = finishPositions.length + 1;
    finishPositions.push({ name: 'Player', time: raceTime, color: '#ff0' });
    endRace(pos);
  }

  // Attack decay
  if (player.attacking > 0) player.attacking -= dt;

  // Engine sound
  engineTimer -= dt;
  if (engineTimer <= 0 && player.speed > 10) {
    SFX.engine(player.speed, player.maxSpeed);
    engineTimer = 0.12 - speedRatio * 0.06;
  }

  // Opponent attacks on player
  for (const opp of opponents) {
    if (opp.crashed || opp.finished) continue;
    opp.attackCooldown -= dt;
    const dz = Math.abs(opp.z - player.z);
    const dx = Math.abs(opp.x - player.x);
    if (dz < 250 && dx < 0.3 && opp.attackCooldown <= 0) {
      if (Math.random() < opp.aggression * dt * 3) {
        opp.attackCooldown = 2 + Math.random() * 2;
        player.hits++;
        spawnPlayerHitParticles();
        screenShake = 0.1;
        SFX.punch();
        if (player.hits >= player.armor) {
          playerCrash();
        } else {
          player.speed *= 0.85;
        }
      }
    }
  }

  // Traffic collision
  for (const car of trafficCars) {
    const dz = Math.abs(car.z - player.z);
    const dx = Math.abs(car.x - player.x);
    if (dz < 150 && dx < 0.2) {
      playerCrash();
      break;
    }
  }

  updateOpponents(dt);
  updateTraffic(dt);
  updateParticles(dt);
  if (screenShake > 0) screenShake -= dt * 2;
  raceTime += dt;
}

function playerCrash() {
  player.crashed = true;
  player.crashTimer = 2.5 - upgrades.armor * 0.2;
  player.hits = 0;
  SFX.crash();
  spawnCrashParticles();
  screenShake = 0.4;
}

function updateOpponents(dt) {
  const trackLen = segments.length * SEG_LENGTH;

  for (const opp of opponents) {
    if (opp.finished) continue;

    if (opp.crashed) {
      opp.crashTimer -= dt;
      opp.speed *= 0.93;
      if (opp.crashTimer <= 0) {
        opp.crashed = false;
        opp.speed = 70 + Math.random() * 40;
      }
      continue;
    }

    // Rubberband AI: slow down if too far ahead, speed up if behind
    const distToPlayer = opp.z - player.z;
    if (distToPlayer > 5000) {
      opp.rubberband = -0.3;
    } else if (distToPlayer < -3000) {
      opp.rubberband = 0.4;
    } else {
      opp.rubberband *= 0.99;
    }

    // AI acceleration with rubberband
    const targetSpeed = opp.maxSpeed + opp.rubberband * opp.maxSpeed * 0.3;
    opp.speed += (targetSpeed - opp.speed) * opp.accel * dt * 2;
    opp.speed = Math.max(30, Math.min(opp.maxSpeed * 1.2, opp.speed));

    // AI steering
    opp.steerTimer -= dt;
    if (opp.steerTimer <= 0) {
      opp.steerTarget = (Math.random() - 0.5) * 0.7;
      opp.steerTimer = 1 + Math.random() * 3;
    }
    opp.x += (opp.steerTarget - opp.x) * 0.015 * dt * 60;

    // Avoid other opponents
    for (const other of opponents) {
      if (other === opp || other.crashed || other.finished) continue;
      if (Math.abs(other.z - opp.z) < 300 && Math.abs(other.x - opp.x) < 0.2) {
        opp.steerTarget += Math.sign(opp.x - other.x) * 0.3;
      }
    }

    // Avoid traffic
    for (const car of trafficCars) {
      if (Math.abs(car.z - opp.z) < 400 && Math.abs(car.x - opp.x) < 0.2) {
        opp.x += Math.sign(opp.x - car.x) * 0.01 * dt * 60;
      }
    }

    // Keep on road
    opp.x = Math.max(-1.0, Math.min(1.0, opp.x));

    // Advance
    opp.z += opp.speed * dt * 60;

    // Check finish
    if (opp.z >= trackLen && !opp.finished) {
      opp.finished = true;
      opp.finishTime = raceTime;
      finishPositions.push({ name: opp.name, time: raceTime, color: opp.color });
    }
  }
}

function updateTraffic(dt) {
  const trackLen = segments.length * SEG_LENGTH;
  for (const car of trafficCars) {
    car.z += car.speed * dt * 60;
    if (car.z >= trackLen) car.z -= trackLen;
  }
}

function endRace(position) {
  raceFinished = true;
  const unfinished = opponents.filter(o => !o.finished).sort((a, b) => b.z - a.z);
  for (const opp of unfinished) {
    finishPositions.push({ name: opp.name, time: raceTime + 5, color: opp.color });
  }

  if (position <= 3) {
    const prizes = [0, 600, 350, 150];
    money += prizes[position] + currentTrack * 75;
    totalWins++;
    bestTimes[currentTrack] = raceTime;
    SFX.win();
    setTimeout(() => { state = 'results'; }, 2000);
  } else {
    SFX.lose();
    setTimeout(() => { state = 'gameover'; }, 2000);
  }
}

// ============================================================
// PARTICLES
// ============================================================
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.08 * dt * 60;
    p.life -= dt * 2.0;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// RENDERING: PSEUDO 3D ROAD
// ============================================================
function project(seg, camX, camY, camZ) {
  const p = seg.p;
  p.camera = {
    x: (p.world.x || 0) - camX,
    y: (p.world.y || 0) - camY,
    z: p.world.z - camZ
  };
  if (p.camera.z <= 0) {
    p.screen = { scale: 0, x: 0, y: 0, w: 0 };
    return;
  }
  const scale = CAMERA_DEPTH / p.camera.z;
  p.screen = {
    scale: scale,
    x: Math.round(W / 2 + scale * p.camera.x * W / 2),
    y: Math.round(H / 2 - scale * p.camera.y * H / 2),
    w: Math.round(scale * ROAD_WIDTH * W / 2)
  };
}

function drawRoad() {
  const track = TRACKS[currentTrack];
  const baseSegIdx = Math.floor(player.z / SEG_LENGTH);
  const camZ = player.z - 500;
  let x = 0;
  let maxy = H;

  // Apply screen shake
  let shakeX = 0, shakeY = 0;
  if (screenShake > 0) {
    shakeX = (Math.random() - 0.5) * screenShake * 20;
    shakeY = (Math.random() - 0.5) * screenShake * 15;
    ctx.save();
    ctx.translate(shakeX, shakeY);
  }

  // Sky gradient with parallax
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.52);
  grad.addColorStop(0, track.sky);
  grad.addColorStop(1, track.horizon);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H * 0.52);

  // Parallax sky elements
  drawSkyElements(track);

  // Ground fill
  ctx.fillStyle = track.color1;
  ctx.fillRect(0, H * 0.48, W, H * 0.52);

  // Draw segments back-to-front
  for (let i = DRAW_DIST; i > 0; i--) {
    const segIdx = (baseSegIdx + i) % segments.length;
    const seg = segments[segIdx];
    if (!seg) continue;

    const loopZ = (segIdx < baseSegIdx) ? segments.length * SEG_LENGTH : 0;
    seg.p.world.z = segIdx * SEG_LENGTH + loopZ;
    seg.p.world.x = x;

    project(seg, player.x * ROAD_WIDTH / 2, CAMERA_HEIGHT, camZ);
    x += seg.curve;

    const s = seg.p.screen;
    if (s.scale <= 0 || s.y >= maxy) continue;

    // Previous segment
    const prevIdx = (baseSegIdx + i + 1) % segments.length;
    const prevSeg = segments[prevIdx];
    if (!prevSeg || !prevSeg.p || !prevSeg.p.screen || prevSeg.p.screen.scale <= 0) continue;
    const ps = prevSeg.p.screen;

    if (ps.y <= s.y) continue;

    // Grass
    ctx.fillStyle = seg.color.grass;
    ctx.fillRect(0, s.y, W, ps.y - s.y);

    // Rumble strip
    const rumbleW = s.w * 1.15;
    const prevRumbleW = ps.w * 1.15;
    drawPoly(seg.color.rumble,
      s.x - rumbleW, s.y, s.x + rumbleW, s.y,
      ps.x + prevRumbleW, ps.y, ps.x - prevRumbleW, ps.y);

    // Road surface
    drawPoly(seg.color.road,
      s.x - s.w, s.y, s.x + s.w, s.y,
      ps.x + ps.w, ps.y, ps.x - ps.w, ps.y);

    // Lane markings
    if (Math.floor(segIdx / 4) % 2 === 0) {
      const laneW = Math.max(1, s.w * 0.015);
      const prevLaneW = Math.max(1, ps.w * 0.015);
      for (let lane = -1; lane <= 1; lane += 2) {
        const lx = s.x + s.w * lane * 0.33;
        const plx = ps.x + ps.w * lane * 0.33;
        drawPoly('#fff',
          lx - laneW, s.y, lx + laneW, s.y,
          plx + prevLaneW, ps.y, plx - prevLaneW, ps.y);
      }
    }

    // Center line
    if (Math.floor(segIdx / 6) % 2 === 0) {
      const cw = Math.max(1, s.w * 0.01);
      const pcw = Math.max(1, ps.w * 0.01);
      drawPoly('#ff0',
        s.x - cw, s.y, s.x + cw, s.y,
        ps.x + pcw, ps.y, ps.x - pcw, ps.y);
    }

    // Roadside objects
    for (const obj of seg.objects) {
      drawRoadsideObject(obj, s);
    }

    // Fog overlay
    if (seg.fog > 0) {
      ctx.fillStyle = track.horizon;
      ctx.globalAlpha = seg.fog * (1 - i / DRAW_DIST);
      ctx.fillRect(0, s.y, W, ps.y - s.y);
      ctx.globalAlpha = 1;
    }

    maxy = s.y;
  }

  // Draw traffic cars
  drawTraffic(baseSegIdx, camZ);

  if (screenShake > 0) ctx.restore();
}

function drawSkyElements(track) {
  const t = Date.now() * 0.001;
  switch (track.objects) {
    case 'coastal':
      // Sun
      ctx.fillStyle = '#ffe080';
      ctx.beginPath();
      ctx.arc(W * 0.8 + skyOffset * 0.1, H * 0.12, 30, 0, Math.PI * 2);
      ctx.fill();
      // Clouds
      drawClouds(track, t);
      break;
    case 'fungal':
      // Spores floating
      ctx.fillStyle = '#a4f';
      for (let i = 0; i < 15; i++) {
        const sx = (W * (i / 15) + t * 20 + skyOffset) % W;
        const sy = H * 0.1 + Math.sin(t + i) * H * 0.08;
        ctx.globalAlpha = 0.3 + Math.sin(t * 2 + i) * 0.2;
        ctx.beginPath();
        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 'mountain':
      // Mountain silhouettes
      ctx.fillStyle = '#3a5577';
      ctx.beginPath();
      ctx.moveTo(0, H * 0.48);
      for (let x = 0; x <= W; x += W / 8) {
        ctx.lineTo(x + skyOffset * 0.05, H * 0.3 + Math.sin(x * 0.005) * H * 0.1);
      }
      ctx.lineTo(W, H * 0.48);
      ctx.closePath();
      ctx.fill();
      drawClouds(track, t);
      break;
    case 'reactor':
      // Smoke stacks in distance
      ctx.fillStyle = '#223';
      for (let i = 0; i < 5; i++) {
        const bx = W * (i / 5) + skyOffset * 0.08;
        ctx.fillRect(bx % W, H * 0.3, 8, H * 0.18);
        // Smoke
        ctx.fillStyle = '#334';
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc((bx + Math.sin(t + i) * 10) % W, H * 0.28, 15 + Math.sin(t * 0.5 + i) * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#223';
      }
      break;
    case 'desert':
      // Hot sun
      ctx.fillStyle = '#ff8';
      ctx.beginPath();
      ctx.arc(W * 0.5, H * 0.08, 40, 0, Math.PI * 2);
      ctx.fill();
      // Heat shimmer effect at horizon
      ctx.fillStyle = '#eebb66';
      ctx.globalAlpha = 0.3 + Math.sin(t * 3) * 0.1;
      ctx.fillRect(0, H * 0.44, W, H * 0.06);
      ctx.globalAlpha = 1;
      break;
    case 'city':
      // City skyline
      ctx.fillStyle = '#0a0a15';
      for (let i = 0; i < 20; i++) {
        const bx = (i * W / 20 + skyOffset * 0.03) % W;
        const bh = 20 + Math.abs(Math.sin(i * 1.3)) * 60;
        ctx.fillRect(bx, H * 0.48 - bh, W / 25, bh);
        // Random lit windows
        ctx.fillStyle = ['#ff8', '#0ff', '#f0f', '#ff4'][i % 4];
        if (Math.sin(t + i * 3) > 0.3) {
          ctx.fillRect(bx + 3, H * 0.48 - bh + 5, 3, 3);
        }
        ctx.fillStyle = '#0a0a15';
      }
      // Moon
      ctx.fillStyle = '#dde';
      ctx.beginPath();
      ctx.arc(W * 0.2, H * 0.1, 20, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'ice':
      // Snowflakes
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 30; i++) {
        const sx = (i * W / 30 + t * 30 + Math.sin(t + i) * 20) % W;
        const sy = (t * 40 + i * H / 30) % (H * 0.5);
        ctx.globalAlpha = 0.5;
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.globalAlpha = 1;
      break;
    case 'final':
      // Red aurora
      ctx.fillStyle = '#400';
      ctx.globalAlpha = 0.3 + Math.sin(t * 0.5) * 0.1;
      ctx.fillRect(0, 0, W, H * 0.2);
      ctx.globalAlpha = 1;
      // Lightning flashes
      if (Math.random() < 0.002) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.3;
        ctx.fillRect(0, 0, W, H * 0.5);
        ctx.globalAlpha = 1;
      }
      break;
  }
}

function drawClouds(track, t) {
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  for (let i = 0; i < 5; i++) {
    const cx = ((i * W / 5 + t * 10 + skyOffset * 0.05) % (W + 100)) - 50;
    const cy = H * 0.08 + i * H * 0.06;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 40 + i * 5, 12 + i * 2, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPoly(color, x1, y1, x2, y2, x3, y3, x4, y4) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x3, y3);
  ctx.lineTo(x4, y4);
  ctx.closePath();
  ctx.fill();
}

function drawRoadsideObject(obj, screen) {
  const scale = screen.scale * 500;
  if (scale < 2) return;
  const x = screen.x + obj.side * (screen.w + obj.offset * screen.scale * W * 0.25);
  const y = screen.y;
  const s = scale;

  switch (obj.type) {
    case 'palm':
      ctx.fillStyle = '#864';
      ctx.fillRect(x - s * 0.08, y - s * 2, s * 0.16, s * 2);
      ctx.fillStyle = '#2a5';
      ctx.beginPath();
      ctx.moveTo(x, y - s * 2.2);
      ctx.lineTo(x - s * 0.8, y - s * 1.8);
      ctx.lineTo(x - s * 0.6, y - s * 2.3);
      ctx.lineTo(x + s * 0.6, y - s * 2.3);
      ctx.lineTo(x + s * 0.8, y - s * 1.8);
      ctx.closePath();
      ctx.fill();
      break;
    case 'pine':
    case 'snowpine':
      ctx.fillStyle = '#543';
      ctx.fillRect(x - s * 0.06, y - s * 2.2, s * 0.12, s * 2.2);
      ctx.fillStyle = obj.type === 'snowpine' ? '#8ab' : '#253';
      ctx.beginPath();
      ctx.moveTo(x, y - s * 3);
      ctx.lineTo(x - s * 0.5, y - s * 1.2);
      ctx.lineTo(x + s * 0.5, y - s * 1.2);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x, y - s * 2.5);
      ctx.lineTo(x - s * 0.6, y - s * 0.5);
      ctx.lineTo(x + s * 0.6, y - s * 0.5);
      ctx.closePath();
      ctx.fill();
      if (obj.type === 'snowpine') {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(x, y - s * 3);
        ctx.lineTo(x - s * 0.3, y - s * 2);
        ctx.lineTo(x + s * 0.3, y - s * 2);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
    case 'rock':
    case 'boulder':
      ctx.fillStyle = '#667';
      ctx.beginPath();
      ctx.moveTo(x - s * 0.4, y);
      ctx.lineTo(x - s * 0.3, y - s * 0.6);
      ctx.lineTo(x + s * 0.2, y - s * 0.7);
      ctx.lineTo(x + s * 0.4, y - s * 0.2);
      ctx.lineTo(x + s * 0.3, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#889';
      ctx.beginPath();
      ctx.moveTo(x - s * 0.2, y - s * 0.3);
      ctx.lineTo(x, y - s * 0.65);
      ctx.lineTo(x + s * 0.15, y - s * 0.5);
      ctx.closePath();
      ctx.fill();
      break;
    case 'mushroom':
    case 'glowshroom':
      ctx.fillStyle = '#eee';
      ctx.fillRect(x - s * 0.06, y - s * 1.0, s * 0.12, s * 1.0);
      ctx.fillStyle = obj.type === 'glowshroom' ? '#0ff' : '#c33';
      ctx.beginPath();
      ctx.ellipse(x, y - s * 1.1, s * 0.4, s * 0.25, 0, Math.PI, 0);
      ctx.fill();
      if (obj.type === 'glowshroom') {
        ctx.fillStyle = '#0ff';
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003) * 0.2;
        ctx.beginPath();
        ctx.arc(x, y - s * 1.0, s * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      if (obj.type === 'mushroom') {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(x - s * 0.15, y - s * 1.15, s * 0.06, 0, Math.PI * 2);
        ctx.arc(x + s * 0.1, y - s * 1.2, s * 0.04, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'sporetree':
      ctx.fillStyle = '#536';
      ctx.fillRect(x - s * 0.1, y - s * 2.5, s * 0.2, s * 2.5);
      ctx.fillStyle = '#a4f';
      ctx.beginPath();
      ctx.arc(x, y - s * 2.7, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#c6f';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(x - s * 0.2, y - s * 2.9, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'crystal':
      ctx.fillStyle = '#a4f';
      ctx.beginPath();
      ctx.moveTo(x, y - s * 1.5);
      ctx.lineTo(x - s * 0.2, y);
      ctx.lineTo(x + s * 0.2, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#c8f';
      ctx.beginPath();
      ctx.moveTo(x + s * 0.1, y - s * 1.2);
      ctx.lineTo(x, y - s * 0.2);
      ctx.lineTo(x + s * 0.25, y - s * 0.3);
      ctx.closePath();
      ctx.fill();
      break;
    case 'sign':
      ctx.fillStyle = '#654';
      ctx.fillRect(x - s * 0.04, y - s * 1.4, s * 0.08, s * 1.4);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x - s * 0.35, y - s * 1.5, s * 0.7, s * 0.35);
      ctx.fillStyle = '#000';
      ctx.font = Math.max(6, s * 0.15) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', x, y - s * 1.25);
      break;
    case 'tower':
      ctx.fillStyle = '#445';
      ctx.fillRect(x - s * 0.25, y - s * 3.5, s * 0.5, s * 3.5);
      ctx.fillStyle = '#556';
      ctx.fillRect(x - s * 0.3, y - s * 3.6, s * 0.6, s * 0.2);
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.arc(x, y - s * 3.7, s * 0.12, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'pipe':
      ctx.fillStyle = '#556';
      ctx.fillRect(x - s * 0.8, y - s * 0.3, s * 1.6, s * 0.3);
      ctx.fillStyle = '#667';
      ctx.beginPath();
      ctx.ellipse(x - s * 0.8, y - s * 0.15, s * 0.15, s * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'barrel':
      ctx.fillStyle = '#753';
      ctx.beginPath();
      ctx.ellipse(x, y - s * 0.35, s * 0.25, s * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#543';
      ctx.lineWidth = Math.max(1, s * 0.04);
      ctx.beginPath();
      ctx.ellipse(x, y - s * 0.35, s * 0.25, s * 0.35, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'tank':
      ctx.fillStyle = '#445';
      ctx.beginPath();
      ctx.ellipse(x, y - s * 0.8, s * 0.5, s * 0.8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#334';
      ctx.fillRect(x - s * 0.5, y - s * 0.1, s * 1, s * 0.1);
      break;
    case 'antenna':
      ctx.strokeStyle = '#888';
      ctx.lineWidth = Math.max(1, s * 0.03);
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y - s * 3);
      ctx.stroke();
      ctx.fillStyle = '#f00';
      ctx.beginPath();
      ctx.arc(x, y - s * 3, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'smokestack':
      ctx.fillStyle = '#444';
      ctx.fillRect(x - s * 0.15, y - s * 3, s * 0.3, s * 3);
      ctx.fillStyle = '#555';
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(x + Math.sin(Date.now() * 0.002) * s * 0.2, y - s * 3.3, s * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'cactus':
      ctx.fillStyle = '#4a4';
      ctx.fillRect(x - s * 0.08, y - s * 1.6, s * 0.16, s * 1.6);
      // Arms
      ctx.fillRect(x - s * 0.4, y - s * 1.2, s * 0.32, s * 0.12);
      ctx.fillRect(x - s * 0.4, y - s * 1.5, s * 0.12, s * 0.4);
      ctx.fillRect(x + s * 0.08, y - s * 0.9, s * 0.3, s * 0.12);
      ctx.fillRect(x + s * 0.26, y - s * 1.2, s * 0.12, s * 0.4);
      break;
    case 'skull':
      ctx.fillStyle = '#ddc';
      ctx.beginPath();
      ctx.arc(x, y - s * 0.25, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(x - s * 0.07, y - s * 0.28, s * 0.04, 0, Math.PI * 2);
      ctx.arc(x + s * 0.07, y - s * 0.28, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'bones':
      ctx.fillStyle = '#ccb';
      ctx.fillRect(x - s * 0.3, y - s * 0.05, s * 0.6, s * 0.05);
      ctx.beginPath();
      ctx.arc(x - s * 0.3, y - s * 0.025, s * 0.04, 0, Math.PI * 2);
      ctx.arc(x + s * 0.3, y - s * 0.025, s * 0.04, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'tumbleweed':
      ctx.strokeStyle = '#986';
      ctx.lineWidth = Math.max(1, s * 0.03);
      ctx.beginPath();
      ctx.arc(x, y - s * 0.2, s * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      break;
    case 'building':
      const bh = s * (2.5 + (obj.offset % 3));
      ctx.fillStyle = '#223';
      ctx.fillRect(x - s * 0.5, y - bh, s * 1, bh);
      ctx.fillStyle = '#ff8';
      for (let wy = s * 0.3; wy < bh - s * 0.2; wy += s * 0.35) {
        for (let wx = 0; wx < 4; wx++) {
          if (Math.random() > 0.4) {
            ctx.fillRect(x - s * 0.4 + wx * s * 0.22, y - bh + wy, s * 0.12, s * 0.15);
          }
        }
      }
      break;
    case 'lamppost':
      ctx.fillStyle = '#555';
      ctx.fillRect(x - s * 0.025, y - s * 2, s * 0.05, s * 2);
      ctx.fillRect(x - s * 0.15, y - s * 2, s * 0.3, s * 0.03);
      ctx.fillStyle = '#ff8';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.arc(x, y - s * 2, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      // Light cone
      ctx.fillStyle = '#ff8';
      ctx.globalAlpha = 0.1;
      ctx.beginPath();
      ctx.moveTo(x - s * 0.05, y - s * 1.9);
      ctx.lineTo(x - s * 0.3, y);
      ctx.lineTo(x + s * 0.3, y);
      ctx.lineTo(x + s * 0.05, y - s * 1.9);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'neon':
      const neonColors = ['#f0f', '#0ff', '#ff0', '#f80', '#0f0'];
      ctx.fillStyle = neonColors[Math.floor(obj.offset) % neonColors.length];
      ctx.globalAlpha = 0.7 + Math.sin(Date.now() * 0.005 + obj.offset) * 0.3;
      ctx.fillRect(x - s * 0.5, y - s * 1.3, s * 1, s * 0.15);
      ctx.globalAlpha = 1;
      break;
    case 'dumpster':
      ctx.fillStyle = '#464';
      ctx.fillRect(x - s * 0.3, y - s * 0.4, s * 0.6, s * 0.4);
      ctx.fillStyle = '#353';
      ctx.fillRect(x - s * 0.3, y - s * 0.45, s * 0.6, s * 0.08);
      break;
    case 'hydrant':
      ctx.fillStyle = '#c22';
      ctx.fillRect(x - s * 0.08, y - s * 0.5, s * 0.16, s * 0.5);
      ctx.fillRect(x - s * 0.12, y - s * 0.35, s * 0.24, s * 0.1);
      break;
    case 'icicle':
      ctx.fillStyle = '#bdf';
      ctx.beginPath();
      ctx.moveTo(x - s * 0.1, y - s * 1.5);
      ctx.lineTo(x, y);
      ctx.lineTo(x + s * 0.1, y - s * 1.5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#def';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(x - s * 0.02, y - s * 1.3, s * 0.04, s * 0.8);
      ctx.globalAlpha = 1;
      break;
    case 'snowman':
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(x, y - s * 0.2, s * 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y - s * 0.5, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y - s * 0.72, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f80';
      ctx.fillRect(x, y - s * 0.73, s * 0.1, s * 0.03);
      break;
    case 'ice_wall':
      ctx.fillStyle = '#8bc';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(x - s * 0.6, y - s * 1.5, s * 1.2, s * 1.5);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#adf';
      ctx.fillRect(x - s * 0.5, y - s * 1.3, s * 0.05, s * 1.0);
      ctx.fillRect(x + s * 0.3, y - s * 1.1, s * 0.05, s * 0.8);
      break;
    case 'lighthouse':
      ctx.fillStyle = '#fff';
      ctx.fillRect(x - s * 0.15, y - s * 3, s * 0.3, s * 3);
      ctx.fillStyle = '#c00';
      ctx.fillRect(x - s * 0.15, y - s * 2.5, s * 0.3, s * 0.3);
      ctx.fillRect(x - s * 0.15, y - s * 1.5, s * 0.3, s * 0.3);
      ctx.fillStyle = '#ff0';
      ctx.globalAlpha = 0.6 + Math.sin(Date.now() * 0.003) * 0.4;
      ctx.beginPath();
      ctx.arc(x, y - s * 3.1, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'seagull':
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = Math.max(1, s * 0.04);
      ctx.beginPath();
      ctx.moveTo(x - s * 0.2, y - s * 1.5);
      ctx.quadraticCurveTo(x, y - s * 1.7, x + s * 0.2, y - s * 1.5);
      ctx.stroke();
      break;
    case 'driftwood':
      ctx.fillStyle = '#876';
      ctx.fillRect(x - s * 0.4, y - s * 0.05, s * 0.8, s * 0.08);
      break;
    case 'spore_cloud':
      ctx.fillStyle = '#a4f';
      ctx.globalAlpha = 0.2 + Math.sin(Date.now() * 0.002) * 0.1;
      ctx.beginPath();
      ctx.arc(x, y - s * 0.5, s * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'goat':
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x - s * 0.15, y - s * 0.3, s * 0.3, s * 0.2);
      ctx.fillRect(x - s * 0.1, y - s * 0.1, s * 0.04, s * 0.1);
      ctx.fillRect(x + s * 0.06, y - s * 0.1, s * 0.04, s * 0.1);
      ctx.beginPath();
      ctx.arc(x + s * 0.15, y - s * 0.35, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'eagle_nest':
      ctx.fillStyle = '#654';
      ctx.beginPath();
      ctx.ellipse(x, y - s * 0.1, s * 0.25, s * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    default:
      ctx.fillStyle = '#888';
      ctx.fillRect(x - s * 0.2, y - s * 0.5, s * 0.4, s * 0.5);
  }
}

// ============================================================
// DRAW TRAFFIC
// ============================================================
function drawTraffic(baseSegIdx, camZ) {
  for (const car of trafficCars) {
    let relZ = car.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    const scale = CAMERA_DEPTH / relZ * W / 2;
    const screenX = W / 2 + (car.x - player.x) * ROAD_WIDTH / 2 * scale;
    const screenY = H / 2;
    const carScale = scale * 300;
    if (carScale < 3) continue;

    // Simple car shape
    ctx.fillStyle = car.color;
    ctx.fillRect(screenX - carScale * 0.3, screenY - carScale * 0.3, carScale * 0.6, carScale * 0.3);
    ctx.fillStyle = '#222';
    ctx.fillRect(screenX - carScale * 0.35, screenY - carScale * 0.05, carScale * 0.7, carScale * 0.1);
    // Tail lights
    ctx.fillStyle = '#f00';
    ctx.fillRect(screenX - carScale * 0.3, screenY - carScale * 0.2, carScale * 0.05, carScale * 0.05);
    ctx.fillRect(screenX + carScale * 0.25, screenY - carScale * 0.2, carScale * 0.05, carScale * 0.05);
  }
}

// ============================================================
// DRAW OPPONENTS
// ============================================================
function drawOpponents() {
  const baseSegIdx = Math.floor(player.z / SEG_LENGTH);
  const camZ = player.z - 500;

  const sorted = opponents.filter(o => !o.finished).sort((a, b) => b.z - a.z);

  for (const opp of sorted) {
    let relZ = opp.z - camZ;
    if (relZ <= 0 || relZ > DRAW_DIST * SEG_LENGTH) continue;

    const scale = CAMERA_DEPTH / relZ * W / 2;
    const screenX = W / 2 + (opp.x - player.x) * ROAD_WIDTH / 2 * scale;
    const screenY = H / 2;
    const bikeScale = scale * 400;
    if (bikeScale < 3) continue;

    if (opp.crashed) {
      drawCrashedBike(screenX, screenY, bikeScale, opp.color);
    } else {
      drawBike(screenX, screenY, bikeScale, opp.color, false, 0);
    }
  }
}

function drawBike(x, y, scale, color, isPlayer, tilt) {
  const s = Math.max(scale, 5);
  ctx.save();
  ctx.translate(x, y);
  if (tilt) ctx.rotate(tilt * 0.3);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.05, s * 0.35, s * 0.05, 0, 0, Math.PI * 2);
  ctx.fill();

  // Back wheel
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-s * 0.25, 0, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(-s * 0.25, 0, s * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Front wheel
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(s * 0.25, -s * 0.02, s * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(s * 0.25, -s * 0.02, s * 0.12, 0, Math.PI * 2);
  ctx.fill();

  // Frame
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-s * 0.2, -s * 0.05);
  ctx.lineTo(s * 0.2, -s * 0.1);
  ctx.lineTo(s * 0.15, -s * 0.2);
  ctx.lineTo(-s * 0.1, -s * 0.15);
  ctx.closePath();
  ctx.fill();

  // Engine block
  ctx.fillStyle = '#444';
  ctx.fillRect(-s * 0.1, -s * 0.08, s * 0.15, s * 0.08);

  // Exhaust
  ctx.fillStyle = '#666';
  ctx.fillRect(-s * 0.3, -s * 0.02, s * 0.12, s * 0.04);

  // Rider legs
  ctx.fillStyle = '#222';
  ctx.fillRect(-s * 0.08, -s * 0.25, s * 0.06, s * 0.2);
  ctx.fillRect(s * 0.02, -s * 0.25, s * 0.06, s * 0.2);

  // Rider body
  ctx.fillStyle = isPlayer ? '#ddd' : color;
  ctx.fillRect(-s * 0.08, -s * 0.55, s * 0.16, s * 0.32);

  // Rider arms (normal position)
  ctx.fillStyle = isPlayer ? '#ddd' : color;
  ctx.fillRect(-s * 0.12, -s * 0.42, s * 0.04, s * 0.18);
  ctx.fillRect(s * 0.08, -s * 0.42, s * 0.04, s * 0.18);

  // Helmet
  ctx.fillStyle = isPlayer ? '#ff0' : '#222';
  ctx.beginPath();
  ctx.arc(0, -s * 0.62, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Visor
  ctx.fillStyle = isPlayer ? '#880' : '#444';
  ctx.fillRect(-s * 0.07, -s * 0.63, s * 0.14, s * 0.05);

  // Handlebars
  ctx.fillStyle = '#888';
  ctx.fillRect(s * 0.12, -s * 0.28, s * 0.15, s * 0.03);

  ctx.restore();
}

function drawCrashedBike(x, y, scale, color) {
  const s = Math.max(scale, 5);
  // Bike on its side
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(x - s * 0.2, y + s * 0.02, s * 0.15, s * 0.08, 0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + s * 0.2, y + s * 0.02, s * 0.15, s * 0.08, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.fillRect(x - s * 0.25, y - s * 0.05, s * 0.5, s * 0.06);
  // Rider sprawled
  ctx.fillStyle = '#555';
  ctx.fillRect(x + s * 0.15, y - s * 0.12, s * 0.3, s * 0.08);
  ctx.beginPath();
  ctx.arc(x + s * 0.45, y - s * 0.08, s * 0.06, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// DRAW PLAYER
// ============================================================
function drawPlayer() {
  const px = W / 2 + player.x * W * 0.15;
  const py = H * 0.78;
  const scale = 42;

  if (player.crashed) {
    drawCrashedBike(px, py, scale, '#ff0');
    // Getting up timer
    const progress = 1 - (player.crashTimer / (2.5 - upgrades.armor * 0.2));
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    if (progress < 0.5) {
      ctx.fillText('CRASHED!', px, py - 55);
    } else {
      ctx.fillText('Getting up...', px, py - 55);
    }
    // Progress bar
    ctx.fillStyle = '#333';
    ctx.fillRect(px - 40, py - 40, 80, 6);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(px - 40, py - 40, 80 * Math.max(0, progress), 6);
  } else {
    drawBike(px, py, scale, '#ff0', true, player.tilt);

    // Draw attack arm extended
    if (player.attacking > 0) {
      ctx.save();
      ctx.translate(px, py);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      if (player.attackDir < 0) {
        ctx.moveTo(-scale * 0.12, -scale * 0.4);
        ctx.lineTo(-scale * 0.6, -scale * 0.45);
        // Fist
        ctx.fillStyle = '#fda';
        ctx.fillRect(-scale * 0.65, -scale * 0.48, scale * 0.12, scale * 0.1);
      } else if (player.attackDir > 0) {
        ctx.moveTo(scale * 0.12, -scale * 0.4);
        ctx.lineTo(scale * 0.6, -scale * 0.45);
        ctx.fillStyle = '#fda';
        ctx.fillRect(scale * 0.55, -scale * 0.48, scale * 0.12, scale * 0.1);
      } else {
        // Weapon attack forward
        ctx.moveTo(0, -scale * 0.4);
        ctx.lineTo(scale * 0.5, -scale * 0.65);
      }
      ctx.stroke();

      // Draw weapon
      if (player.attackType === 'chain' && player.attackDir === 0) {
        ctx.strokeStyle = '#aaa';
        ctx.lineWidth = 2;
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.arc(scale * 0.5 + i * scale * 0.08, -scale * 0.65 + Math.sin(i) * 3, 3, 0, Math.PI * 2);
          ctx.stroke();
        }
      } else if (player.attackType === 'club' && player.attackDir === 0) {
        ctx.fillStyle = '#864';
        ctx.fillRect(scale * 0.4, -scale * 0.72, scale * 0.35, scale * 0.08);
        ctx.fillStyle = '#543';
        ctx.fillRect(scale * 0.65, -scale * 0.75, scale * 0.15, scale * 0.14);
      } else if (player.attackType === 'prod' && player.attackDir === 0) {
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(scale * 0.5, -scale * 0.65);
        ctx.lineTo(scale * 0.85, -scale * 0.5);
        ctx.stroke();
        // Electric tip
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(scale * 0.8, -scale * 0.52);
        ctx.lineTo(scale * 0.9, -scale * 0.58);
        ctx.lineTo(scale * 0.85, -scale * 0.45);
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ============================================================
// HUD
// ============================================================
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, 55);

  ctx.font = 'bold 13px monospace';
  ctx.textAlign = 'left';

  // Speed gauge
  const speedPct = player.speed / player.maxSpeed;
  ctx.fillStyle = '#888';
  ctx.fillText('SPEED', 10, 14);
  ctx.fillStyle = '#333';
  ctx.fillRect(10, 18, 100, 8);
  ctx.fillStyle = speedPct > 0.9 ? '#f44' : speedPct > 0.7 ? '#ff0' : '#0f0';
  ctx.fillRect(10, 18, 100 * Math.min(1, speedPct), 8);
  ctx.fillStyle = '#fff';
  ctx.fillText(Math.floor(player.speed) + ' mph', 10, 38);

  // Position
  const pos = getPlayerPosition();
  ctx.fillStyle = pos <= 3 ? '#0f0' : '#f44';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(pos + getOrdinal(pos), 120, 32);
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('of 6', 155, 32);

  // Track name + time
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f80';
  ctx.font = 'bold 13px monospace';
  ctx.fillText(TRACKS[currentTrack].name.toUpperCase(), W / 2, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.fillText(formatTime(raceTime), W / 2, 30);
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('Track ' + (currentTrack + 1) + '/8', W / 2, 44);

  // Right side: weapon + armor + nitro
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('WEAPON', W - 10, 12);
  ctx.fillStyle = weapon === 'prod' ? '#0ff' : weapon === 'club' ? '#f80' : weapon === 'chain' ? '#aaa' : '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(weapon.toUpperCase(), W - 10, 26);

  // Armor pips
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText('ARMOR', W - 70, 12);
  for (let i = 0; i < player.armor; i++) {
    ctx.fillStyle = i < (player.armor - player.hits) ? '#0f0' : '#300';
    ctx.fillRect(W - 135 + i * 12, 16, 10, 10);
  }

  // Nitro bar
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('NITRO', W - 10, 44);
  ctx.fillStyle = '#222';
  ctx.fillRect(W - 110, 38, 60, 8);
  ctx.fillStyle = player.nitroActive ? '#0ff' : '#08f';
  ctx.fillRect(W - 110, 38, 60 * (player.nitro / 100), 8);

  // Progress bar at bottom of HUD
  const trackLen = segments.length * SEG_LENGTH;
  const progress = Math.min(1, player.z / trackLen);
  ctx.fillStyle = '#222';
  ctx.fillRect(W * 0.15, 51, W * 0.7, 4);
  ctx.fillStyle = '#0f0';
  ctx.fillRect(W * 0.15, 51, W * 0.7 * progress, 4);

  // Finish flag at end
  ctx.fillStyle = '#fff';
  ctx.fillRect(W * 0.15 + W * 0.7 - 1, 49, 2, 6);

  // Opponent markers on progress bar
  for (const opp of opponents) {
    if (opp.finished) continue;
    const oppProgress = Math.min(1, opp.z / trackLen);
    ctx.fillStyle = opp.color;
    ctx.beginPath();
    ctx.arc(W * 0.15 + W * 0.7 * oppProgress, 53, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Player marker
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(W * 0.15 + W * 0.7 * progress, 49);
  ctx.lineTo(W * 0.15 + W * 0.7 * progress - 3, 55);
  ctx.lineTo(W * 0.15 + W * 0.7 * progress + 3, 55);
  ctx.closePath();
  ctx.fill();

  // Touch control hints (mobile)
  if ('ontouchstart' in window) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PUNCH L', W * 0.15, H * 0.15);
    ctx.fillText('WEAPON', W * 0.5, H * 0.15);
    ctx.fillText('PUNCH R', W * 0.85, H * 0.15);
    ctx.fillText('STEER L', W * 0.12, H * 0.9);
    ctx.fillText('BRAKE', W * 0.38, H * 0.9);
    ctx.fillText('GAS', W * 0.62, H * 0.9);
    ctx.fillText('STEER R', W * 0.88, H * 0.9);
    ctx.globalAlpha = 1;
  }
}

function getPlayerPosition() {
  let pos = 1;
  for (const opp of opponents) {
    if (!opp.finished && opp.z > player.z) pos++;
    if (opp.finished) pos++;
  }
  return pos;
}

function formatTime(t) {
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 100);
  return mins + ':' + String(secs).padStart(2, '0') + '.' + String(ms).padStart(2, '0');
}

function getOrdinal(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

// ============================================================
// TITLE SCREEN
// ============================================================
function drawTitle() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;

  // Animated road perspective
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  const vanishY = H * 0.35;
  const vanishX = W / 2;
  for (let i = 0; i < 30; i++) {
    const y = vanishY + (i / 30) * (H - vanishY);
    const spread = (y - vanishY) / (H - vanishY);
    const roadW = spread * W * 0.35;
    ctx.strokeStyle = (i % 4 < 2) ? '#333' : '#222';
    ctx.beginPath();
    ctx.moveTo(vanishX - roadW, y);
    ctx.lineTo(vanishX + roadW, y);
    ctx.stroke();
  }
  // Road edges
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(vanishX, vanishY);
  ctx.lineTo(vanishX - W * 0.35, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(vanishX, vanishY);
  ctx.lineTo(vanishX + W * 0.35, H);
  ctx.stroke();

  // Title with glow
  const titleSize = Math.min(56, W * 0.09);
  ctx.shadowColor = '#f80';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#f80';
  ctx.font = 'bold ' + titleSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REACTOR RASH', W / 2, H * 0.15);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Motorcycle combat racing through Tasern', W / 2, H * 0.21);

  // Animated bikes
  const bikeY = H * 0.65;
  const bounce = Math.sin(t * 5) * 2;
  drawBike(W / 2 - 120, bikeY + bounce, 28, '#e44', false, Math.sin(t * 3) * 0.05);
  drawBike(W / 2 - 40, bikeY - 10 + Math.sin(t * 5 + 1) * 2, 32, '#4e4', false, 0);
  drawBike(W / 2 + 40, bikeY - 20 + Math.sin(t * 5 + 2) * 2, 36, '#ff0', true, 0);
  drawBike(W / 2 + 120, bikeY + bounce, 28, '#44e', false, Math.sin(t * 3 + 2) * 0.05);

  // Instructions
  ctx.fillStyle = '#ccc';
  ctx.font = '13px monospace';
  const lines = [
    '',
    'CONTROLS:',
    'Arrows: Steer / Accelerate / Brake',
    'A: Punch Left    Z: Punch Right',
    'Space: Use Weapon    Shift: Nitro',
    '',
    'Race 8 tracks. Finish Top 3 to advance!',
    'Punch and kick rivals off their bikes!',
    '',
    '[ENTER] or [TAP] to start'
  ];
  lines.forEach((line, i) => {
    ctx.fillStyle = i === lines.length - 1 ? (Math.sin(t * 3) > 0 ? '#ff0' : '#880') : '#aaa';
    ctx.fillText(line, W / 2, H * 0.32 + i * 20);
  });

  // Track list
  ctx.fillStyle = '#666';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i < TRACKS.length; i++) {
    ctx.fillText((i + 1) + '. ' + TRACKS[i].name, W * 0.05, H * 0.78 + i * 14);
  }
}

// ============================================================
// COUNTDOWN SCREEN
// ============================================================
function drawCountdown() {
  drawRoad();
  drawOpponents();
  drawPlayer();
  drawHUD();

  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, H * 0.3, W, H * 0.25);

  const count = Math.ceil(countdownTimer);
  ctx.textAlign = 'center';
  ctx.font = 'bold 72px monospace';

  if (count > 0 && count <= 3) {
    ctx.fillStyle = count === 1 ? '#f44' : count === 2 ? '#ff0' : '#fff';
    ctx.fillText(String(count), W / 2, H * 0.47);
    // Beep sound
    if (countdownTimer % 1 > 0.95) SFX.countdown();
  } else if (countdownTimer <= 0.5) {
    ctx.fillStyle = '#0f0';
    ctx.fillText('GO!', W / 2, H * 0.47);
  }

  // Track info
  ctx.font = '16px monospace';
  ctx.fillStyle = '#f80';
  ctx.fillText(TRACKS[currentTrack].name, W / 2, H * 0.35);
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText(TRACKS[currentTrack].desc, W / 2, H * 0.52);
}

// ============================================================
// RESULTS SCREEN
// ============================================================
function drawResults() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, 0, W, H);

  const playerPos = finishPositions.findIndex(f => f.name === 'Player') + 1;

  ctx.textAlign = 'center';

  // Header
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('RACE COMPLETE!', W / 2, H * 0.1);

  ctx.fillStyle = playerPos === 1 ? '#ff0' : playerPos === 2 ? '#ccc' : '#c84';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(playerPos + getOrdinal(playerPos) + ' Place!', W / 2, H * 0.17);

  // Results table
  ctx.font = '15px monospace';
  ctx.textAlign = 'left';
  const tableX = W / 2 - 140;
  ctx.fillStyle = '#666';
  ctx.fillText('POS  NAME       TIME', tableX, H * 0.24);
  ctx.fillStyle = '#444';
  ctx.fillRect(tableX, H * 0.25, 280, 1);

  for (let i = 0; i < finishPositions.length && i < 6; i++) {
    const fp = finishPositions[i];
    const isPlayer = fp.name === 'Player';
    ctx.fillStyle = isPlayer ? '#ff0' : fp.color || '#aaa';
    if (isPlayer) {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(tableX - 5, H * 0.27 + i * 26, 290, 22);
      ctx.fillStyle = '#000';
    }
    ctx.fillText(
      String(i + 1).padEnd(5) + fp.name.padEnd(11) + formatTime(fp.time),
      tableX, H * 0.29 + i * 26
    );
  }

  // Prize
  const prizes = [0, 600, 350, 150];
  const prize = prizes[playerPos] + currentTrack * 75;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('PRIZE: $' + prize, W / 2, H * 0.62);
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('Total Money: $' + money, W / 2, H * 0.67);

  // Stats
  ctx.fillStyle = '#666';
  ctx.font = '12px monospace';
  ctx.fillText('Wins: ' + totalWins + '/8  |  Track: ' + (currentTrack + 1) + '/8', W / 2, H * 0.74);

  // Continue prompt
  ctx.fillStyle = Math.sin(Date.now() * 0.003) > 0 ? '#fff' : '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Press ENTER or TAP to continue', W / 2, H * 0.88);
}

// ============================================================
// GAME OVER SCREEN (didn't place top 3)
// ============================================================
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, 0, W, H);

  const playerPos = finishPositions.findIndex(f => f.name === 'Player') + 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44';
  ctx.font = 'bold 36px monospace';
  ctx.fillText('WIPEOUT!', W / 2, H * 0.15);

  ctx.fillStyle = '#888';
  ctx.font = '18px monospace';
  ctx.fillText('You finished ' + playerPos + getOrdinal(playerPos) + ' - need Top 3!', W / 2, H * 0.24);

  // Results
  ctx.font = '14px monospace';
  ctx.textAlign = 'left';
  const tableX = W / 2 - 130;
  for (let i = 0; i < finishPositions.length && i < 6; i++) {
    const fp = finishPositions[i];
    ctx.fillStyle = fp.name === 'Player' ? '#f44' : fp.color || '#666';
    ctx.fillText(
      String(i + 1) + '. ' + fp.name.padEnd(8) + ' ' + formatTime(fp.time),
      tableX, H * 0.33 + i * 22
    );
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('Track: ' + TRACKS[currentTrack].name, W / 2, H * 0.65);
  ctx.fillText('Money: $' + money, W / 2, H * 0.7);

  ctx.fillStyle = Math.sin(Date.now() * 0.003) > 0 ? '#ff0' : '#880';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('PRESS ENTER or TAP to retry', W / 2, H * 0.85);
}

// ============================================================
// VICTORY SCREEN
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  const t = Date.now() * 0.001;

  // Confetti
  for (let i = 0; i < 50; i++) {
    ctx.fillStyle = ['#f44', '#ff0', '#4f4', '#44f', '#f4f', '#0ff'][i % 6];
    const cx = (i * W / 50 + t * 50 * (i % 3 + 1)) % W;
    const cy = (t * 100 + i * 30) % H;
    ctx.fillRect(cx, cy, 4, 8);
  }

  ctx.textAlign = 'center';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 40px monospace';
  ctx.fillText('CHAMPION!', W / 2, H * 0.15);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText('You conquered all 8 tracks!', W / 2, H * 0.25);

  ctx.fillStyle = '#f80';
  ctx.font = '18px monospace';
  ctx.fillText('Final Money: $' + money, W / 2, H * 0.35);

  // Best times
  ctx.fillStyle = '#888';
  ctx.font = '13px monospace';
  ctx.fillText('BEST TIMES:', W / 2, H * 0.43);
  for (let i = 0; i < TRACKS.length; i++) {
    ctx.fillStyle = '#aaa';
    const time = bestTimes[i] ? formatTime(bestTimes[i]) : '--:--';
    ctx.fillText(TRACKS[i].name + ': ' + time, W / 2, H * 0.48 + i * 18);
  }

  // Upgrades summary
  ctx.fillStyle = '#666';
  ctx.font = '12px monospace';
  ctx.fillText('Speed Lv' + upgrades.speed + ' | Armor Lv' + upgrades.armor + ' | Weapon: ' + weapon, W / 2, H * 0.82);

  ctx.fillStyle = Math.sin(t * 3) > 0 ? '#fff' : '#888';
  ctx.font = '14px monospace';
  ctx.fillText('Press ENTER or TAP for title', W / 2, H * 0.92);
}

// ============================================================
// SHOP SCREEN
// ============================================================
function drawShop() {
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, W, H);

  // Grid pattern background
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f80';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('UPGRADE SHOP', W / 2, H * 0.07);

  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('$' + money, W / 2, H * 0.12);

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  const nextName = currentTrack + 1 < TRACKS.length ? TRACKS[currentTrack + 1].name : 'VICTORY LAP';
  ctx.fillText('Next: ' + nextName, W / 2, H * 0.16);

  // Current bike display
  drawBike(W / 2, H * 0.22, 35, '#ff0', true, 0);

  const items = getShopItems();
  const bw = Math.min(260, W * 0.55);
  const bh = 48;
  const startX = W / 2 - bw / 2;

  for (let i = 0; i < items.length; i++) {
    const by = H * 0.28 + i * 58;
    const canAfford = money >= items[i].cost && items[i].canBuy;

    // Button background
    ctx.fillStyle = canAfford ? '#1a2a3a' : '#111';
    ctx.fillRect(startX, by, bw, bh);
    ctx.strokeStyle = canAfford ? '#4af' : '#333';
    ctx.lineWidth = canAfford ? 2 : 1;
    ctx.strokeRect(startX, by, bw, bh);

    // Item name
    ctx.fillStyle = canAfford ? '#fff' : '#555';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(items[i].name, W / 2, by + 20);

    // Cost
    ctx.fillStyle = canAfford ? '#ff0' : '#444';
    ctx.font = '12px monospace';
    ctx.fillText(items[i].canBuy ? '$' + items[i].cost : 'OWNED', W / 2, by + 38);
  }

  // Race button
  const contY = H * 0.28 + items.length * 58 + 15;
  ctx.fillStyle = '#142';
  ctx.fillRect(startX, contY, bw, bh);
  ctx.strokeStyle = '#0f0';
  ctx.lineWidth = 2;
  ctx.strokeRect(startX, contY, bw, bh);
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RACE!  [ENTER]', W / 2, contY + 30);

  // Stats sidebar
  ctx.textAlign = 'left';
  ctx.fillStyle = '#777';
  ctx.font = '11px monospace';
  const sx = 10;
  const sy = H * 0.85;
  ctx.fillText('SPD: ' + '|'.repeat(upgrades.speed) + '.'.repeat(5 - upgrades.speed), sx, sy);
  ctx.fillText('ARM: ' + '|'.repeat(upgrades.armor) + '.'.repeat(5 - upgrades.armor), sx, sy + 14);
  ctx.fillText('WPN: ' + weapon.toUpperCase(), sx, sy + 28);
  ctx.fillText('WINS: ' + totalWins, sx, sy + 42);
}

// ============================================================
// DRAW PARTICLES
// ============================================================
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  ctx.clearRect(0, 0, W, H);

  switch (state) {
    case 'title':
      drawTitle();
      break;

    case 'countdown':
      updateCountdown(dt);
      drawRoad();
      drawOpponents();
      drawPlayer();
      drawHUD();
      // Redraw countdown overlay on top
      const count = Math.ceil(countdownTimer);
      if (count >= 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(W * 0.3, H * 0.35, W * 0.4, H * 0.15);
        ctx.textAlign = 'center';
        ctx.font = 'bold 64px monospace';
        ctx.fillStyle = count === 1 ? '#f44' : count === 2 ? '#ff0' : '#fff';
        ctx.fillText(String(count), W / 2, H * 0.47);
      } else {
        ctx.textAlign = 'center';
        ctx.font = 'bold 64px monospace';
        ctx.fillStyle = '#0f0';
        ctx.fillText('GO!', W / 2, H * 0.47);
      }
      ctx.font = '14px monospace';
      ctx.fillStyle = '#f80';
      ctx.fillText(TRACKS[currentTrack].name + ' - ' + TRACKS[currentTrack].desc, W / 2, H * 0.53);
      break;

    case 'racing':
      updateRacing(dt);
      drawRoad();
      drawOpponents();
      drawPlayer();
      drawParticles();
      drawHUD();
      if (raceFinished) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, H * 0.35, W, H * 0.12);
        ctx.fillStyle = '#0f0';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        const finalPos = finishPositions.findIndex(f => f.name === 'Player') + 1;
        ctx.fillText('FINISHED ' + finalPos + getOrdinal(finalPos) + '!', W / 2, H * 0.43);
      }
      if (player.crashed) {
        ctx.fillStyle = 'rgba(255,0,0,0.1)';
        ctx.fillRect(0, 0, W, H);
      }
      break;

    case 'results':
      drawResults();
      break;

    case 'gameover':
      drawGameOver();
      break;

    case 'shop':
      drawShop();
      break;

    case 'victory':
      drawVictory();
      break;
  }

  requestAnimationFrame(gameLoop);
}

// Kick off
requestAnimationFrame(gameLoop);

})();
</script>
