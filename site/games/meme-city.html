// --- BASELING STAT INTEGRATION ---
// Spore City is a 1v1 FIGHTER: the selected baseling is the P1 fighter body; P2 stays a
// CHARS opponent (CPU, or P2 in versus). Stats come from BaselingPlayer.getMults() (see
// ARCADE-STATS.md) — the single source of stat math. This game is NOT in tasern-wager.js,
// so it uses the single-player band (0.8-1.6). The 20 P1 integration points below read a
// D&D-style statB; rather than rewrite them, we synthesize statB from the five bounded
// multipliers and recompute the derived stat* globals in recomputeStats():
//   SPD -> walk/dash speed,  STA -> max HP,  PWR -> attack/special damage + block-break,
//   LCK -> crit chance + super-meter gain rate.  (No INT/WIS/CHA stat -> luck-flavored.)
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
var statDamageMult = 1, statSpeedMult = 1, statHpMult = 1, statSuperGain = 1;
var statCooldownMult = 1, statComboMult = 1, statLevelBonus = 0, statLuckCrit = 0.05;

function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); } // mult 1.0->10, 0.8->6, 1.6->22
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage);    // STR -> P1 attack/special damage + block-break
  statB.dex = dnd(m.moveSpeed); // DEX -> P1 walk/dash speed
  statB.con = dnd(m.health);    // CON -> P1 max HP
  statB.int = dnd(m.luck);      // INT -> P1 super-meter gain (luck flavor)
  statB.wis = dnd(m.luck);      // WIS -> P1 recovery frames (luck flavor)
  statB.cha = dnd(m.luck);      // CHA -> P1 combo retention (luck flavor)
  statDamageMult = 1 + (statB.str - 10) * 0.03;
  statSpeedMult  = 1 + (statB.dex - 10) * 0.02;
  statHpMult     = 1 + (statB.con - 10) * 0.04;
  statSuperGain  = 1 + (statB.int - 10) * 0.03;
  statCooldownMult = 1 - (statB.wis - 10) * 0.015;
  statComboMult  = 1 + (statB.cha - 10) * 0.02;
  // Luck-based crit: getMults luck is ~0.8-1.6, map to a 5%-~14% crit band centered at neutral.
  statLuckCrit   = Math.max(0.02, 0.05 + (m.luck - 1) * 0.15);
}
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }

} catch(e) { console.warn('[meme-city] NftLoader display info failed:', e && e.message); }
recomputeStats();

// Local sprite-draw helper (meme-city has no TAS engine). Draws the selected baseling at
// (x,y) center, size px; returns true if a real sprite drew, false to use the fallback.
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

  C.style.width = cw + 'px';
  C.style.height = ch + 'px';
  C.width = W; C.height = H;

// --- AUDIO ENGINE ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, dur, type, vol) {
  ensureAudio();
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type || 'square';
    o.frequency.value = freq;
    g.gain.setValueAtTime((vol || 0.15), audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) { console.warn('Audio error:', e); }
}

// --- ARENA HAZARDS (PASS 2) ---
let hazards = [];
const HAZARD_TYPES = [
  { name: 'Poison Mushroom', color: '#9944cc', damage: 15, radius: 20, duration: 300, spawnChance: 0.002, effect: 'poison' },
  { name: 'Healing Spore', color: '#44ff88', damage: -30, radius: 18, duration: 240, spawnChance: 0.0015, effect: 'heal' },
  { name: 'Stun Cap', color: '#ffaa00', damage: 5, radius: 16, duration: 200, spawnChance: 0.001, effect: 'stun' },
  { name: 'Mycelium Trap', color: '#886622', damage: 10, radius: 25, duration: 350, spawnChance: 0.0008, effect: 'slow' },
  { name: 'Spore Cloud', color: '#88ff44', damage: 20, radius: 30, duration: 180, spawnChance: 0.001, effect: 'confuse' },
];

function spawnHazard() {
  for (var hi = 0; hi < HAZARD_TYPES.length; hi++) {
    var ht = HAZARD_TYPES[hi];
    if (Math.random() < ht.spawnChance) {
      hazards.push({
        type: hi,
        x: STAGE_LEFT + 60 + Math.random() * (STAGE_RIGHT - STAGE_LEFT - 120),
        y: GROUND + 15,
        life: ht.duration,
        maxLife: ht.duration,
        radius: ht.radius,
        bob: Math.random() * Math.PI * 2,
        triggered: false
      });
      break;
    }
  }
}

function updateHazards() {
  for (var hi = hazards.length - 1; hi >= 0; hi--) {
    var hz = hazards[hi];
    hz.life--;
    hz.bob += 0.05;
    if (hz.life <= 0) { hazards.splice(hi, 1); continue; }
    if (hz.triggered) continue;
    var ht = HAZARD_TYPES[hz.type];
    // Check P1 collision
    if (p1 && Math.abs(p1.x - hz.x) < ht.radius + 15 && p1.grounded) {
      applyHazard(p1, hz, ht);
      hz.triggered = true;
    }
    // Check P2 collision
    if (p2 && Math.abs(p2.x - hz.x) < ht.radius + 15 && p2.grounded) {
      applyHazard(p2, hz, ht);
      hz.triggered = true;
    }
  }
}

function applyHazard(fighter, hz, ht) {
  if (ht.effect === 'heal') {
    fighter.hp = Math.min(fighter.maxHp, fighter.hp - ht.damage); // negative damage = heal
    addScorePopup(hz.x, hz.y - 30, '+' + Math.abs(ht.damage) + ' HP', '#44ff88', false);
    sfxHeal();
    addSpark(hz.x, hz.y - 10, false);
  } else if (ht.effect === 'poison') {
    fighter.hp = Math.max(1, fighter.hp - ht.damage);
    fighter.poisonTimer = 120; // DOT
    addScorePopup(hz.x, hz.y - 30, 'POISON!', '#9944cc', false);
    sfxPoison();
    addSpark(hz.x, hz.y - 10, false);
  } else if (ht.effect === 'stun') {
    fighter.state = 'hitstun';
    fighter.stateTimer = 20;
    fighter.vx = 0;
    addScorePopup(hz.x, hz.y - 30, 'STUNNED!', '#ffaa00', false);
    sfxSpore();
    screenShake = 3;
  } else if (ht.effect === 'slow') {
    fighter.slowTimer = 180;
    addScorePopup(hz.x, hz.y - 30, 'SLOWED!', '#886622', false);
    sfxPoison();
  } else if (ht.effect === 'confuse') {
    fighter.confuseTimer = 120;
    addScorePopup(hz.x, hz.y - 30, 'CONFUSED!', '#88ff44', false);
    sfxSpore();
  }
  // Spawn pickup particles
  for (var pi = 0; pi < 8; pi++) {
    var angle = (Math.PI * 2 / 8) * pi;
    arenaParticles.push({
      x: hz.x, y: hz.y,
      vx: Math.cos(angle) * 2, vy: Math.sin(angle) * 2 - 1,
      life: 20, color: ht.color, size: 3
    });
  }
}

function drawHazards() {
  for (var hi = 0; hi < hazards.length; hi++) {
    var hz = hazards[hi];
    if (hz.triggered) continue;
    var ht = HAZARD_TYPES[hz.type];
    var alpha = Math.min(1, hz.life / 30);
    var bobY = Math.sin(hz.bob) * 3;
    X.save();
    X.globalAlpha = alpha * 0.8;
    // Glow
    X.shadowColor = ht.color;
    X.shadowBlur = 10;
    // Mushroom cap shape
    X.fillStyle = ht.color;
    X.beginPath();
    X.ellipse(hz.x, hz.y - 8 + bobY, ht.radius * 0.7, ht.radius * 0.5, 0, Math.PI, 0);
    X.fill();
    // Stem
    X.fillStyle = ht.color + '88';
    X.fillRect(hz.x - 3, hz.y - 8 + bobY, 6, 10);
    // Spots
    X.fillStyle = '#fff';
    X.globalAlpha = alpha * 0.5;
    X.beginPath();
    X.arc(hz.x - 4, hz.y - 12 + bobY, 2, 0, Math.PI * 2);
    X.fill();
    X.beginPath();
    X.arc(hz.x + 3, hz.y - 14 + bobY, 1.5, 0, Math.PI * 2);
    X.fill();
    X.shadowBlur = 0;
    X.restore();
  }
}

  const ch = CHARS[charIdx];

  if (!isP2) baseHp = Math.floor(baseHp * statHpMult);

// --- HIT SPARK ---
function addSpark(x, y, big) {
  const count = big ? 14 : 7;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = (big ? 5 : 2.5) + Math.random() * 3;
    hitSparks.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 12 + Math.random() * 8,
      color: big ? (Math.random() > 0.5 ? '#ff0' : '#f80') : (Math.random() > 0.5 ? '#fff' : '#ff0'),
      size: big ? 4 : 2,
    });
  }
}

// --- SPORE PARTICLES (PASS 2) ---
function addSporeParticles(x, y, color, count) {
  for (var i = 0; i < (count || 6); i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.5 + Math.random() * 2;
    arenaParticles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 30 + Math.random() * 30,
      color: color || '#aa66ff',
      size: 2 + Math.random() * 2
    });
  }
}

// --- PROJECTILE ---
function addProjectile(owner, type, count) {
  const ch = CHARS[owner.charIdx];
  const dir = owner.facing;
  if (type === 'multiProjectile') {
    for (let i = 0; i < (count || 5); i++) {
      setTimeout(() => {
        projectiles.push({
          x: owner.x + dir * 30, y: owner.y - 35 + (i - 2) * 12,
          vx: dir * (ch.attacks.super.projSpeed || 5),
          vy: (i - 2) * 0.5,
          owner: owner.isP2 ? 1 : 0,
          damage: Math.floor(ch.attacks.super.damage / (count || 5)),
          hitstun: 12, blockstun: 6, knockback: 3,
          life: 80, size: 8, color: ch.color,
          spore: ch.charIdx >= 6,
        });
      }, i * 80);
    }
  } else {
    projectiles.push({
      x: owner.x + dir * 30, y: owner.y - 35,
      vx: dir * (ch.attacks.special.projSpeed || 5), vy: 0,
      owner: owner.isP2 ? 1 : 0,
      damage: ch.attacks.special.damage,
      hitstun: ch.attacks.special.hitstun,
      blockstun: ch.attacks.special.blockstun,
      knockback: ch.attacks.special.knockback,
      life: 80, size: 10, color: ch.color,
      spore: ch.charIdx >= 6,
    });
  }
}

// --- COLLISION ---
function getHurtbox(f) {
  const ch = CHARS[f.charIdx];
  const w = ch.width;
  const h = f.state === 'crouch' ? ch.height * 0.6 : ch.height;
  return { x: f.x - w / 2, y: f.y - h, w, h };
}

function getHitbox(f) {
  if (f.state !== 'attack' && f.state !== 'dashAtk') return null;
  if (f.attackPhase !== 'active') return null;
  const ch = CHARS[f.charIdx];
  const atk = ch.attacks[f.attackType];
  const dir = f.facing;
  let range = 45;
  if (f.attackType === 'heavy' || f.attackType === 'special') range = 55;
  if (f.attackType === 'super') range = 60;
  if (atk.type === 'commandThrow') range = atk.range || 60;
  if (atk.type === 'throw') range = 50;
  return {
    x: f.x + (dir > 0 ? 5 : -range - 5),
    y: f.y - ch.height + 10,
    w: range, h: ch.height - 15,
  };
}

function boxOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// --- ATTACK RESOLUTION ---
function resolveHit(attacker, defender, attackType) {
  const ch = CHARS[attacker.charIdx];
  const atk = ch.attacks[attackType];
  const dir = attacker.facing;

  // Check if blocking
  const isBlocking = defender.state === 'idle' || defender.state === 'walk' || defender.state === 'crouch';
  const holdingBack = isBlocking && (
    (defender.isP2 && ((defender.facing > 0 && keys['ArrowRight']) || (defender.facing < 0 && keys['ArrowLeft']))) ||
    (!defender.isP2 && ((defender.facing > 0 && keys['KeyD']) || (defender.facing < 0 && keys['KeyA'])))
  );

  const isThrow = atk.type === 'throw' || atk.type === 'commandThrow';

  if (isThrow && defender.throwImmune > 0) return;
  if (isThrow && (defender.state === 'hitstun' || defender.state === 'knockdown')) return;

  if (holdingBack && !isThrow) {
    defender.state = 'blockstun';
    defender.stateTimer = atk.blockstun;
    defender.vx = dir * atk.knockback * 0.3;
    let chipBase = atk.damage;
    // [10] statB: STR boost on chip damage for P1
    if (!attacker.isP2) chipBase = Math.floor(chipBase * statDamageMult);
    if (!attacker.isP2 && nftDamageMultiplier > 1) chipBase = Math.floor(chipBase * nftDamageMultiplier);
    const chipDmg = Math.floor(chipBase * 0.1);
    defender.hp = Math.max(1, defender.hp - chipDmg);
    // [11] statB: INT boosts super gain on block
    var superGainAmt = 3;
    if (!attacker.isP2) superGainAmt = Math.floor(superGainAmt * statSuperGain);
    attacker.super = Math.min(attacker.maxSuper, attacker.super + superGainAmt);
    defender.super = Math.min(defender.maxSuper, defender.super + 5);
    sfxBlock();
    addSpark(defender.x - dir * 15, defender.y - 40, false);
    addScorePopup(defender.x, defender.y - 60, 'BLOCK', '#88ccff', false);
    screenShake = 2;
    return;
  }

  // Hit connects
  let dmg = atk.damage;
  // [12] statB: STR scales all P1 damage
  if (!attacker.isP2) dmg = Math.floor(dmg * statDamageMult);
  // NFT damage bonus
  if (!attacker.isP2 && nftDamageMultiplier > 1) dmg = Math.floor(dmg * nftDamageMultiplier);

  // [13] statB: Luck-based critical hit
  var isCrit = false;
  if (!attacker.isP2 && Math.random() < statLuckCrit) {
    dmg = Math.floor(dmg * 1.5);
    isCrit = true;
    sfxCrit();
    if (!attacker.isP2) matchStats.p1Crits++;
    else matchStats.p2Crits++;
  }

  // Combo scaling - [14] statB: CHA reduces combo decay
  const combo = attacker.isP2 ? comboCount2 : comboCount1;
  var comboDecay = 0.1;
  if (!attacker.isP2) comboDecay = comboDecay * (2 - statComboMult);
  if (combo > 0) dmg = Math.floor(dmg * Math.max(0.3, 1 - combo * comboDecay));

  defender.hp = Math.max(0, defender.hp - dmg);

  // [15] statB: INT boosts super gain on hit
  var hitSuperGain = 8;
  if (!attacker.isP2) hitSuperGain = Math.floor(hitSuperGain * statSuperGain);
  attacker.super = Math.min(attacker.maxSuper, attacker.super + hitSuperGain);
  defender.super = Math.min(defender.maxSuper, defender.super + 12);

  if (attacker.isP2) {
    comboCount2++;
    comboTimer2 = 60;
    matchStats.p2Hits++;
    if (comboCount2 > 1) matchStats.p2Combos++;
  } else {
    comboCount1++;
    comboTimer1 = 60;
    matchStats.p1Hits++;
    if (comboCount1 > 1) matchStats.p1Combos++;
  }

  // Score popups
  var popText = dmg.toString();
  var popColor = '#ff0';
  if (isCrit) { popText = 'CRIT! ' + dmg; popColor = '#ff4444'; }
  else if (attackType === 'super') { popText = dmg + '!'; popColor = '#ff8800'; }
  else if (attackType === 'heavy') { popColor = '#ffaa00'; }
  addScorePopup(defender.x, defender.y - 70, popText, popColor, isCrit || attackType === 'super');
  if (!attacker.isP2) totalScore += dmg;

  if (isThrow) {
    sfxThrow();
    defender.state = 'thrown';
    defender.stateTimer = 30;
    defender.vx = dir * atk.knockback;
    defender.vy = -6;
    defender.grounded = false;
    defender.throwImmune = 60;
    screenShake = 6;
    addSpark((attacker.x + defender.x) / 2, defender.y - 40, true);
    addScorePopup(defender.x, defender.y - 90, 'THROW!', '#ff6644', true);
  } else if (atk.launch && atk.launch > 0) {
    defender.state = 'hitstun';
    defender.stateTimer = atk.hitstun;
    defender.vx = dir * atk.knockback;
    defender.vy = -atk.launch - 4;
    defender.grounded = false;
    screenShake = 5;
    if (attackType === 'heavy' || attackType === 'super') sfxHeavy();
    else sfxPunch();
    addSpark((attacker.x + defender.x) / 2, defender.y - 40, attackType === 'super');
    if (attackType === 'super') addSporeParticles(defender.x, defender.y - 40, ch.color, 10);
  } else {
    defender.state = 'hitstun';
    defender.stateTimer = atk.hitstun;
    defender.vx = dir * atk.knockback;
    if (!defender.grounded) defender.vy = 1;
    screenShake = attackType === 'heavy' ? 4 : 2;
    if (attackType === 'heavy') sfxHeavy();
    else sfxPunch();
    addSpark((attacker.x + defender.x) / 2, defender.y - (defender.grounded ? 40 : 30), false);
  }

  // Hit stop
  if (attackType === 'super') {
    koSlowMo = 12;
    sfxSuper();
  } else if (attackType === 'heavy') {
    koSlowMo = isCrit ? 8 : 5;
  } else {
    koSlowMo = isCrit ? 5 : 3;
  }

  defender.flashTimer = 6;
  attacker.hitThisAttack = true;

  // Enable combo chaining
  if (attackType === 'light') attacker.comboChain = 1;
  else if (attackType === 'medium') attacker.comboChain = 2;
  else attacker.comboChain = 3;
  attacker.canCombo = true;
}

// --- INPUT READING ---
function readInput(f, isP2) {
  const input = { left: false, right: false, up: false, down: false, light: false, medium: false, heavy: false, special: false };
  if (isP2 && gameMode === 'pvp') {
    input.left = !!keys['ArrowLeft'];
    input.right = !!keys['ArrowRight'];
    input.up = !!keys['ArrowUp'];
    input.down = !!keys['ArrowDown'];
    input.light = justPressed('Numpad1');
    input.medium = justPressed('Numpad2');
    input.heavy = justPressed('Numpad3');
    input.special = justPressed('Numpad0');
  } else if (!isP2) {
    input.left = !!keys['KeyA'];
    input.right = !!keys['KeyD'];
    input.up = !!keys['KeyW'];
    input.down = !!keys['KeyS'];
    input.light = justPressed('KeyJ');
    input.medium = justPressed('KeyK');
    input.heavy = justPressed('KeyL');
    input.special = justPressed('KeyU');
  }
  // Confusion hazard: swap left/right
  if (f && f.confuseTimer > 0) {
    var tmp = input.left;
    input.left = input.right;
    input.right = tmp;
  }
  return input;
}

// --- AI ---
function aiInput(ai, player, diff) {
  const input = { left: false, right: false, up: false, down: false, light: false, medium: false, heavy: false, special: false };
  const dx = player.x - ai.x;
  const dist = Math.abs(dx);
  const ch = CHARS[ai.charIdx];

  // Boss AI is more aggressive
  var isBoss = ai.charIdx === 7;
  var bossBonus = isBoss ? 0.05 : 0;

  var reactChance = diff === 0 ? 0.02 : diff === 1 ? 0.08 : 0.18;
  var blockChance = diff === 0 ? 0.15 : diff === 1 ? 0.45 : 0.75;
  var comboChance = diff === 0 ? 0 : diff === 1 ? 0.3 : 0.7;
  reactChance += bossBonus;
  blockChance += bossBonus;
  comboChance += bossBonus;

  if (Math.random() > reactChance + 0.3) return input;

  ai.facing = dx > 0 ? 1 : -1;

  if (player.state === 'attack' || player.state === 'dashAtk') {
    if (Math.random() < blockChance && dist < 80) {
      input.left = ai.facing > 0 ? false : true;
      input.right = ai.facing > 0 ? true : false;
      if (ai.facing > 0) input.left = true; else input.right = true;
      return input;
    }
  }

  if (!player.grounded && dist < 120 && Math.random() < reactChance * 2) {
    input.heavy = true;
    return input;
  }

  // Boss enrage: more supers
  if (isBoss && bossEnrageTimer > 0 && ai.super >= ai.maxSuper && Math.random() < 0.15) {
    input.special = true;
    input.down = true;
    return input;
  }

  if (dist > 150) {
    if (ch.attacks.special.type === 'projectile' && ai.state === 'idle' && Math.random() < 0.06 + bossBonus) {
      input.special = true;
      return input;
    }
    input.right = dx > 0;
    input.left = dx < 0;
    if (Math.random() < 0.02) input.up = true;
  } else if (dist > 70) {
    if (Math.random() < 0.04 + bossBonus) {
      if (ai.super >= ai.maxSuper && Math.random() < 0.3) { input.special = true; input.down = true; }
      else if (Math.random() < 0.3) input.special = true;
      else input.medium = true;
    }
    input.right = dx > 0;
    input.left = dx < 0;
  } else {
    if (Math.random() < 0.08 + bossBonus) {
      if (ai.super >= ai.maxSuper && Math.random() < 0.4) { input.special = true; input.down = true; }
      else if (ai.canCombo && Math.random() < comboChance) {
        if (ai.comboChain === 1) input.medium = true;
        else if (ai.comboChain === 2) input.heavy = true;
        else input.light = true;
      } else {
        const r = Math.random();
        if (r < 0.3) input.light = true;
        else if (r < 0.5) input.medium = true;
        else if (r < 0.65) input.heavy = true;
        else if (r < 0.75) input.special = true;
        else { input.light = true; input.right = dx > 0; input.left = dx < 0; }
      }
    }
    if (Math.random() < 0.01) input.up = true;
  }

  if (Math.random() < 0.005) input.up = true;

  if (ai.state === 'wakeup' && diff === 2 && Math.random() < 0.3) {
    if (ai.super >= ai.maxSuper) { input.special = true; input.down = true; }
    else input.special = true;
  }

  return input;
}

// --- FIGHTER UPDATE ---
function updateFighter(f, input, opponent) {
  const ch = CHARS[f.charIdx];
  f.animBob += 0.1;
  if (f.flashTimer > 0) f.flashTimer--;
  if (f.throwImmune > 0) f.throwImmune--;
  if (f.poisonTimer > 0) {
    f.poisonTimer--;
    if (f.poisonTimer % 30 === 0) {
      f.hp = Math.max(1, f.hp - 5);
      addSporeParticles(f.x, f.y - 30, '#9944cc', 3);
    }
  }
  if (f.slowTimer > 0) f.slowTimer--;
  if (f.confuseTimer > 0) f.confuseTimer--;

  // [16] statB: DEX boosts P1 walk speed
  var speedMul = 1;
  if (!f.isP2) speedMul = statSpeedMult;
  if (f.slowTimer > 0) speedMul *= 0.5;

  if (f.state === 'idle' || f.state === 'walk' || f.state === 'crouch') {
    f.facing = opponent.x > f.x ? 1 : -1;
  }

  switch (f.state) {
    case 'idle':
    case 'walk':
      f.state = 'idle';
      f.comboChain = 0;
      f.canCombo = false;

      if (input.down) {
        f.state = 'crouch';
        break;
      }
      if (input.up && f.grounded) {
        f.vy = ch.jumpPower;
        f.grounded = false;
        f.state = 'jump';
        break;
      }
      if (input.left) { f.vx = -ch.walkSpeed * speedMul; f.state = 'walk'; }
      else if (input.right) { f.vx = ch.walkSpeed * speedMul; f.state = 'walk'; }
      else f.vx = 0;

      // Super check
      if (input.special && input.down && f.super >= f.maxSuper) {
        f.state = 'attack';
        f.attackType = 'super';
        f.attackPhase = 'startup';
        f.stateTimer = ch.attacks.super.startup;
        f.hitThisAttack = false;
        f.vx = 0;
        f.super = 0;
        f.invincible = ch.attacks.super.invincible || false;
        f.counterActive = ch.attacks.super.type === 'counter';
        if (f.isP2) matchStats.p2Supers++; else matchStats.p1Supers++;
        sfxSpecial();
        addScorePopup(f.x, f.y - 80, 'SUPER!', '#ff0', true);
        break;
      }

      // Throw
      if (input.light && ((input.right && f.facing > 0) || (input.left && f.facing < 0))) {
        const dist = Math.abs(f.x - opponent.x);
        if (dist < 55) {
          f.state = 'attack';
          f.attackType = 'throw';
          f.attackPhase = 'startup';
          f.stateTimer = ch.attacks.throw.startup;
          f.hitThisAttack = false;
          f.vx = 0;
          break;
        }
      }

      // Special
      if (input.special) {
        const atk = ch.attacks.special;
        if (atk.type === 'dash') {
          f.state = 'dashAtk';
          f.attackType = 'special';
          f.attackPhase = 'startup';
          // [17] statB: WIS reduces startup frames for P1
          f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk.startup * statCooldownMult)) : atk.startup;
          f.hitThisAttack = false;
          f.vx = f.facing * (atk.dashSpeed || 8) * speedMul;
        } else {
          f.state = 'attack';
          f.attackType = 'special';
          f.attackPhase = 'startup';
          f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk.startup * statCooldownMult)) : atk.startup;
          f.hitThisAttack = false;
          f.vx = 0;
        }
        sfxSpecial();
        if (ch.charIdx >= 6) sfxSpore();
        break;
      }

      if (input.light) { startAttack(f, 'light', ch); break; }
      if (input.medium) { startAttack(f, 'medium', ch); break; }
      if (input.heavy) { startAttack(f, 'heavy', ch); break; }
      break;

    case 'crouch':
      f.vx = 0;
      if (!input.down) { f.state = 'idle'; break; }
      if (input.special && input.down && f.super >= f.maxSuper) {
        f.state = 'attack'; f.attackType = 'super'; f.attackPhase = 'startup';
        f.stateTimer = ch.attacks.super.startup; f.hitThisAttack = false;
        f.super = 0; f.invincible = ch.attacks.super.invincible || false;
        f.counterActive = ch.attacks.super.type === 'counter';
        if (f.isP2) matchStats.p2Supers++; else matchStats.p1Supers++;
        sfxSpecial();
        addScorePopup(f.x, f.y - 80, 'SUPER!', '#ff0', true);
        break;
      }
      if (input.special) {
        const atk = ch.attacks.special;
        if (atk.type === 'dash') {
          f.state = 'dashAtk'; f.attackType = 'special'; f.attackPhase = 'startup';
          f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk.startup * statCooldownMult)) : atk.startup;
          f.hitThisAttack = false;
          f.vx = f.facing * (atk.dashSpeed || 8) * speedMul;
        } else {
          f.state = 'attack'; f.attackType = 'special'; f.attackPhase = 'startup';
          f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk.startup * statCooldownMult)) : atk.startup;
          f.hitThisAttack = false; f.vx = 0;
        }
        sfxSpecial(); break;
      }
      if (input.light) { startAttack(f, 'light', ch); break; }
      if (input.medium) { startAttack(f, 'medium', ch); break; }
      if (input.heavy) { startAttack(f, 'heavy', ch); break; }
      break;

    case 'jump':
      if (input.left) f.vx = -ch.walkSpeed * 0.7 * speedMul;
      else if (input.right) f.vx = ch.walkSpeed * 0.7 * speedMul;
      if (input.light) { startAttack(f, 'light', ch); break; }
      if (input.medium) { startAttack(f, 'medium', ch); break; }
      if (input.heavy) { startAttack(f, 'heavy', ch); break; }
      break;

    case 'attack':
    case 'dashAtk':
      f.stateTimer--;
      if (f.stateTimer <= 0) {
        const atk = ch.attacks[f.attackType];
        if (f.attackPhase === 'startup') {
          f.attackPhase = 'active';
          f.stateTimer = atk.active;
          if (atk.type === 'projectile') {
            addProjectile(f, 'projectile');
          }
          if (atk.type === 'multiProjectile') {
            addProjectile(f, 'multiProjectile', atk.hits || 5);
          }
        } else if (f.attackPhase === 'active') {
          f.attackPhase = 'recovery';
          // [18] statB: WIS reduces recovery for P1
          var recovFrames = atk.recovery;
          if (!f.isP2) recovFrames = Math.max(1, Math.floor(recovFrames * statCooldownMult));
          f.stateTimer = recovFrames;
          f.invincible = false;
          f.counterActive = false;
        } else {
          f.state = f.grounded ? 'idle' : 'jump';
          f.invincible = false;
          f.counterActive = false;
          f.canCombo = false;
          if (f.state !== 'jump') f.vx = 0;
        }
      }

      // Combo cancel
      if (f.attackPhase === 'recovery' && f.canCombo && f.hitThisAttack) {
        if (input.medium && f.comboChain <= 1) { startAttack(f, 'medium', ch); }
        else if (input.heavy && f.comboChain <= 2) { startAttack(f, 'heavy', ch); }
        else if (input.special && f.comboChain <= 2) {
          const atk2 = ch.attacks.special;
          if (atk2.type === 'dash') {
            f.state = 'dashAtk'; f.attackType = 'special'; f.attackPhase = 'startup';
            f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk2.startup * statCooldownMult)) : atk2.startup;
            f.hitThisAttack = false;
            f.vx = f.facing * (atk2.dashSpeed || 8) * speedMul;
          } else {
            f.state = 'attack'; f.attackType = 'special'; f.attackPhase = 'startup';
            f.stateTimer = !f.isP2 ? Math.max(1, Math.floor(atk2.startup * statCooldownMult)) : atk2.startup;
            f.hitThisAttack = false;
          }
          sfxSpecial();
        }
      }

      if (f.state === 'dashAtk') {
        if (f.attackPhase === 'recovery') {
          f.vx *= 0.85;
        }
      } else {
        if (f.attackPhase !== 'active' || (ch.attacks[f.attackType].type !== 'dash')) {
          f.vx *= 0.8;
        }
      }
      break;

    case 'hitstun':
      f.stateTimer--;
      f.vx *= 0.9;
      if (f.stateTimer <= 0) {
        if (f.grounded) {
          f.state = 'idle';
          f.vx = 0;
        } else {
          f.state = 'jump';
        }
      }
      break;

    case 'blockstun':
      f.stateTimer--;
      f.vx *= 0.85;
      if (f.stateTimer <= 0) {
        f.state = 'idle';
        f.vx = 0;
      }
      break;

    case 'thrown':
      f.stateTimer--;
      if (f.stateTimer <= 0 && f.grounded) {
        f.state = 'knockdown';
        f.stateTimer = 30;
        f.vx = 0;
      }
      break;

    case 'knockdown':
      f.vx *= 0.9;
      f.stateTimer--;
      if (f.stateTimer <= 0) {
        f.state = 'wakeup';
        f.stateTimer = 10;
        f.throwImmune = 15;
      }
      break;

    case 'wakeup':
      f.stateTimer--;
      f.invincible = true;
      if (f.stateTimer <= 0) {
        f.state = 'idle';
        f.invincible = false;
      }
      break;
  }

  // Physics
  if (!f.grounded) {
    f.vy += GRAVITY;
    f.y += f.vy;
    if (f.y >= GROUND) {
      f.y = GROUND;
      f.vy = 0;
      f.grounded = true;
      if (f.state === 'jump') f.state = 'idle';
      if (f.state === 'hitstun') {
        f.state = 'knockdown';
        f.stateTimer = 25;
        f.vx = 0;
      }
      if (f.state === 'thrown') {
        f.state = 'knockdown';
        f.stateTimer = 25;
        f.vx = 0;
      }
    }
  }

  f.x += f.vx;
  f.x = Math.max(STAGE_LEFT + 20, Math.min(STAGE_RIGHT - 20, f.x));

  if (Math.abs(f.x - opponent.x) < 30 && f.grounded && opponent.grounded) {
    const push = f.x < opponent.x ? -1.5 : 1.5;
    f.x += push;
  }
}

function startAttack(f, type, ch) {
  f.state = 'attack';
  f.attackType = type;
  f.attackPhase = 'startup';
  // [19] statB: WIS reduces startup for P1
  var frames = ch.attacks[type].startup;
  if (!f.isP2) frames = Math.max(1, Math.floor(frames * statCooldownMult));
  f.stateTimer = frames;
  f.hitThisAttack = false;
  if (f.grounded) f.vx = 0;
}

// --- DRAWING: ARENA BACKGROUNDS (PASS 3) ---
function drawBG() {
  var arena = ARENAS[currentArena];
  arenaTimer += 0.016;

  // Sky
  X.fillStyle = arena.bg1;
  X.fillRect(0, 0, W, H);

  // Stars/spores in sky
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137 + 50) % W + bgScroll * 0.02) % W;
    const sy = (i * 73 + 20) % 150;
    var starAlpha = 0.3 + Math.sin(i + bgScroll * 0.01) * 0.2;
    X.fillStyle = 'rgba(255,255,255,' + starAlpha + ')';
    X.fillRect(sx, sy, 2, 2);
  }

  // Arena-specific elements
  if (arena.mushrooms) drawMushroomBG();
  else if (arena.trees) drawForestBG();
  else if (arena.pillars) drawThroneBG();
  else if (arena.bubbles) drawDepthsBG();
  else if (arena.vines) drawCanopyBG();

  // Neon signs (themed)
  for (let i = 0; i < 5; i++) {
    const nx = ((i * 170 + 60) + bgScroll * 0.08) % (W + 80) - 40;
    X.shadowColor = arena.neon[i];
    X.shadowBlur = 12;
    X.fillStyle = arena.neon[i];
    X.fillRect(nx, GROUND - 110 - (i * 13 % 40), 40, 12);
    X.shadowBlur = 0;
  }

  // Ground
  X.fillStyle = arena.ground;
  X.fillRect(0, GROUND + 20, W, H - GROUND - 20);
  X.strokeStyle = '#333';
  X.lineWidth = 2;
  X.beginPath();
  X.moveTo(0, GROUND + 20);
  X.lineTo(W, GROUND + 20);
  X.stroke();

  // Ground details (mycelium lines)
  X.strokeStyle = '#222';
  X.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const lx = (i * 45 + bgScroll * 0.15) % W;
    X.beginPath();
    X.moveTo(lx, GROUND + 25);
    X.lineTo(lx + 20 + Math.sin(i + arenaTimer) * 5, GROUND + 25);
    X.stroke();
  }

  // Fog effect
  if (arena.fog || arena.glow) {
    X.fillStyle = 'rgba(' + (arena.fog ? '80,40,120' : '20,60,120') + ',0.05)';
    for (var fi = 0; fi < 3; fi++) {
      var fogX = (fi * 300 + bgScroll * 0.3 + Math.sin(arenaTimer + fi) * 50) % (W + 200) - 100;
      X.beginPath();
      X.ellipse(fogX, GROUND + 10, 150, 20, 0, 0, Math.PI * 2);
      X.fill();
    }
  }

  // Arena particles
  for (var i = arenaParticles.length - 1; i >= 0; i--) {
    var ap = arenaParticles[i];
    ap.x += ap.vx;
    ap.y += ap.vy;
    ap.vy += 0.02;
    ap.life--;
    if (ap.life <= 0) { arenaParticles.splice(i, 1); continue; }
    X.globalAlpha = ap.life / 60;
    X.fillStyle = ap.color;
    X.beginPath();
    X.arc(ap.x, ap.y, ap.size, 0, Math.PI * 2);
    X.fill();
  }
  X.globalAlpha = 1;

  // Ambient floating spores
  if (arena.spores || arena.mushrooms) {
    for (var si = 0; si < 8; si++) {
      var spX = (si * 107 + arenaTimer * 20) % W;
      var spY = 200 + Math.sin(arenaTimer * 0.5 + si * 1.3) * 80;
      X.globalAlpha = 0.15 + Math.sin(arenaTimer + si) * 0.1;
      X.fillStyle = arena.neon[si % arena.neon.length];
      X.beginPath();
      X.arc(spX, spY, 2 + Math.sin(arenaTimer * 2 + si) * 1, 0, Math.PI * 2);
      X.fill();
    }
    X.globalAlpha = 1;
  }

  // Fireflies
  if (arena.fireflies) {
    for (var fi2 = 0; fi2 < 12; fi2++) {
      var ffX = (fi2 * 73 + Math.sin(arenaTimer * 0.7 + fi2 * 0.9) * 40 + arenaTimer * 10) % W;
      var ffY = 100 + Math.sin(arenaTimer * 0.3 + fi2 * 1.7) * 120;
      X.globalAlpha = 0.3 + Math.sin(arenaTimer * 3 + fi2 * 2) * 0.3;
      X.shadowColor = '#ffee44';
      X.shadowBlur = 6;
      X.fillStyle = '#ffee44';
      X.beginPath();
      X.arc(ffX, ffY, 1.5, 0, Math.PI * 2);
      X.fill();
      X.shadowBlur = 0;
    }
    X.globalAlpha = 1;
  }
}

function drawMushroomBG() {
  // Far buildings as giant mushroom stalks
  X.fillStyle = '#111125';
  for (let i = 0; i < 10; i++) {
    const bx = ((i * 100 - 30) + bgScroll * 0.05) % (W + 100) - 50;
    const bh = 80 + (i * 47 % 80);
    // Stalk
    X.fillStyle = '#151530';
    X.fillRect(bx + 15, GROUND + 20 - bh, 30, bh);
    // Cap
    X.fillStyle = '#221840';
    X.beginPath();
    X.ellipse(bx + 30, GROUND + 20 - bh, 35, 20, 0, Math.PI, 0);
    X.fill();
    // Spots
    X.fillStyle = '#332850';
    X.beginPath();
    X.arc(bx + 22, GROUND + 15 - bh, 4, 0, Math.PI * 2);
    X.fill();
    X.beginPath();
    X.arc(bx + 38, GROUND + 12 - bh, 3, 0, Math.PI * 2);
    X.fill();
  }
  // Near mushrooms
  for (let i = 0; i < 5; i++) {
    const bx = ((i * 180 - 50) + bgScroll * 0.1) % (W + 180) - 90;
    const bh = 100 + (i * 61 % 60);
    X.fillStyle = '#0d0d1a';
    X.fillRect(bx + 25, GROUND + 20 - bh, 40, bh);
    X.fillStyle = '#1a1030';
    X.beginPath();
    X.ellipse(bx + 45, GROUND + 20 - bh, 50, 25, 0, Math.PI, 0);
    X.fill();
  }
  // Dripping
  for (var di = 0; di < 6; di++) {
    var dripX = (di * 140 + 50) % W;
    var dripY = GROUND - 60 + Math.sin(arenaTimer * 2 + di) * 20;
    var dripLen = 10 + Math.sin(arenaTimer * 3 + di * 2) * 5;
    X.strokeStyle = 'rgba(100,60,180,0.3)';
    X.lineWidth = 1;
    X.beginPath();
    X.moveTo(dripX, dripY);
    X.lineTo(dripX, dripY + dripLen);
    X.stroke();
  }
}

function drawForestBG() {

  }
  // Undergrowth
  for (let i = 0; i < 15; i++) {

    X.moveTo(ux - 15, GROUND + 20);
    X.lineTo(ux, GROUND - 10 - (i % 4) * 8);

function drawThroneBG() {

}

function drawDepthsBG() {
  // Coral/rock formations
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 110 - 40) + bgScroll * 0.06) % (W + 110) - 55;
    const ch2 = 60 + (i * 37 % 80);
    X.fillStyle = '#061020';
    X.beginPath();
    X.moveTo(cx, GROUND + 20);
    X.lineTo(cx + 15, GROUND + 20 - ch2);
    X.lineTo(cx + 30, GROUND + 20 - ch2 + 20);
    X.lineTo(cx + 50, GROUND + 20);
    X.fill();
  }
  // Bubbles
  for (var bi = 0; bi < 10; bi++) {
    var bx = (bi * 83 + arenaTimer * 15) % W;
    var by = GROUND - 20 - ((arenaTimer * 30 + bi * 50) % (GROUND - 50));
    X.strokeStyle = 'rgba(0,180,255,0.15)';
    X.lineWidth = 1;
    X.beginPath();
    X.arc(bx, by, 3 + (bi % 3) * 2, 0, Math.PI * 2);

function drawCanopyBG() {
  // Vines
  for (let i = 0; i < 10; i++) {
    const vx = ((i * 90) + bgScroll * 0.05) % W;
    X.strokeStyle = '#1a2a10';
    X.lineWidth = 2;
    X.beginPath();
    X.moveTo(vx, 0);
    for (var vy = 0; vy < GROUND - 50; vy += 20) {
      X.lineTo(vx + Math.sin(vy * 0.05 + arenaTimer + i) * 10, vy);
    }
    X.stroke();
    // Leaves
    if (i % 3 === 0) {
      X.fillStyle = '#2a4a18';
      X.beginPath();
      X.ellipse(vx + 5, 50 + i * 30, 8, 4, Math.sin(arenaTimer + i) * 0.3, 0, Math.PI * 2);
      X.fill();
    }
  }
  // Bridge planks
  X.fillStyle = '#1a2210';
  X.fillRect(STAGE_LEFT, GROUND + 15, STAGE_RIGHT - STAGE_LEFT, 8);
  X.strokeStyle = '#2a3218';
  X.lineWidth = 1;
  for (var pi2 = STAGE_LEFT; pi2 < STAGE_RIGHT; pi2 += 30) {
    X.beginPath();
    X.moveTo(pi2, GROUND + 15);
    X.lineTo(pi2, GROUND + 23);
    X.stroke();
  }
  // Falling leaves
  for (var li = 0; li < 5; li++) {
    var lx = (li * 170 + arenaTimer * 25) % W;
    var ly = (arenaTimer * 40 + li * 100) % H;
    X.globalAlpha = 0.2;
    X.fillStyle = '#88aa44';
    X.save();
    X.translate(lx, ly);
    X.rotate(arenaTimer + li * 2);
    X.fillRect(-3, -1, 6, 2);
    X.restore();
  }
  X.globalAlpha = 1;
}

// --- DRAW FIGHTER ---
function drawFighter(f) {
  const chBase = CHARS[f.charIdx];
  var ch = chBase;
  if (!f.isP2 && nftFighterColor) {
    ch = Object.assign({}, chBase, { color: nftFighterColor, color2: nftFighterColor + 'cc' });
  }
  // [20] statB: tint P1 with baseling color
  if (!f.isP2 && statB.color && statB.color !== '#44dd88') {
    ch = Object.assign({}, ch, { color: statB.color });
  }
  const dir = f.facing;
  const idx = f.charIdx;

  X.save();
  X.translate(f.x, f.y);

  if (f.flashTimer > 0 && f.flashTimer % 2 === 0) {
    X.globalAlpha = 0.5;
  }

  if (f.invincible) {
    X.shadowColor = '#fff';
    X.shadowBlur = 15;
  }

  if (f.super >= f.maxSuper) {
    X.shadowColor = ch.color;
    X.shadowBlur = 8 + Math.sin(f.animBob * 3) * 4;
  }

  // Poison tint
  if (f.poisonTimer > 0) {
    X.shadowColor = '#9944cc';
    X.shadowBlur = 6;
  }
  // Slow tint
  if (f.slowTimer > 0) {
    X.shadowColor = '#886622';
    X.shadowBlur = 4;
  }
  // Confuse effect
  if (f.confuseTimer > 0) {
    X.save();
    X.fillStyle = '#88ff44';
    X.font = '10px Courier New';
    X.textAlign = 'center';
    X.globalAlpha = 0.6;
    var cY = -(ch.height + 15) + Math.sin(f.animBob * 4) * 3;
    X.fillText('?!', Math.sin(f.animBob * 3) * 5, cY);
    X.restore();
  }

  const bob = (f.state === 'idle') ? Math.sin(f.animBob * 3) * 2 : 0;
  const h = (f.state === 'crouch') ? ch.height * 0.6 : ch.height;
  const headY = -h + bob;
  const bodyMidY = -h * 0.55 + bob;
  const hipY = -h * 0.35 + bob;

  // Shadow (kept for both fighters — grounds the baseling sprite too)
  X.fillStyle = 'rgba(0,0,0,0.3)';
  X.beginPath();
  X.ellipse(0, 2, ch.width * 0.6, 6, 0, 0, Math.PI * 2);
  X.fill();

  // === P1 BASELING SPRITE ===
  // The player's selected baseling IS the P1 fighter body. Draw it over the procedural
  // stick-figure, centered on the body; falls through to the procedural draw for Wimmple
  // (no art) or P2 (always a CHARS opponent). Effect shadows set above still apply.
  if (!f.isP2) {
    var _bAnim = 'idle';
    if (f.state === 'attack' || f.state === 'dashAtk') _bAnim = 'attack';
    else if (f.state === 'hitstun' || f.state === 'thrown' || f.state === 'blockstun') _bAnim = 'hurt';
    else if (f.state === 'knockdown') _bAnim = 'ko';
    else if (!f.grounded) _bAnim = 'jump';
    else if (f.state === 'walk') _bAnim = 'walk';
    var _bSize = h + 24; // cover head + body
    if (drawSelectedBaseling(X, 0, -h * 0.5 + bob, _bSize, { flipX: f.facing < 0, frame: frame, anim: _bAnim })) {
      X.restore();
      return;
    }
  }

  // --- BODY ---
  X.strokeStyle = ch.color;
  X.lineWidth = 3;
  X.lineCap = 'round';

  if (f.state === 'knockdown') {
    X.strokeStyle = ch.color2;
    X.beginPath();
    X.moveTo(-25, -8);
    X.lineTo(25, -8);
    X.stroke();
    X.fillStyle = ch.color;
    X.beginPath();
    X.arc(dir * -25, -12, 10, 0, Math.PI * 2);
    X.fill();
    X.restore();
    return;
  }

  // Legs
  X.strokeStyle = ch.color2;
  X.lineWidth = 4;
  const walkCycle = f.state === 'walk' ? Math.sin(f.animBob * 6) * 8 : 0;
  if (f.grounded) {
    X.beginPath(); X.moveTo(0, hipY); X.lineTo(-8 + walkCycle, 0); X.stroke();
    X.beginPath(); X.moveTo(0, hipY); X.lineTo(8 - walkCycle, 0); X.stroke();
  } else {
    X.beginPath(); X.moveTo(0, hipY); X.lineTo(-10, hipY + 15); X.stroke();
    X.beginPath(); X.moveTo(0, hipY); X.lineTo(10, hipY + 20); X.stroke();
  }

  // Torso
  X.strokeStyle = ch.color;
  X.lineWidth = 4;
  X.beginPath(); X.moveTo(0, hipY); X.lineTo(0, bodyMidY); X.stroke();

  // Arms
  X.lineWidth = 3;
  const isAttacking = f.state === 'attack' || f.state === 'dashAtk';
  if (isAttacking && f.attackPhase === 'active') {
    X.strokeStyle = '#fff';
    X.lineWidth = 4;
    X.beginPath();
    X.moveTo(0, bodyMidY);
    const atkReach = f.attackType === 'heavy' ? 35 : f.attackType === 'super' ? 40 : 25;
    const atkY = f.attackType === 'heavy' ? bodyMidY - 5 : bodyMidY + 3;
    X.lineTo(dir * atkReach, atkY);
    X.stroke();

    if (f.attackType === 'special' || f.attackType === 'super') {
      X.shadowColor = ch.color;
      X.shadowBlur = 15;
      X.fillStyle = ch.color;
      X.beginPath();
      X.arc(dir * atkReach, atkY, f.attackType === 'super' ? 8 : 5, 0, Math.PI * 2);
      X.fill();
      X.shadowBlur = 0;
      // Spore trail for Tasern fighters
      if (idx >= 6) {
        for (var st = 0; st < 3; st++) {
          X.globalAlpha = 0.3 - st * 0.1;
          X.fillStyle = ch.color;
          X.beginPath();
          X.arc(dir * (atkReach - st * 8), atkY + Math.sin(f.animBob * 5 + st) * 3, 3, 0, Math.PI * 2);
          X.fill();
        }
        X.globalAlpha = 1;
      }
    }

    X.strokeStyle = ch.color;
    X.lineWidth = 3;
    X.beginPath(); X.moveTo(0, bodyMidY); X.lineTo(-dir * 10, bodyMidY + 5); X.stroke();
  } else if (f.state === 'blockstun') {
    X.beginPath(); X.moveTo(0, bodyMidY); X.lineTo(dir * 8, bodyMidY - 12); X.stroke();
    X.beginPath(); X.moveTo(0, bodyMidY); X.lineTo(dir * 8, bodyMidY + 5); X.stroke();
  } else {
    const armBob = Math.sin(f.animBob * 2) * 3;
    X.beginPath(); X.moveTo(0, bodyMidY); X.lineTo(dir * 12, bodyMidY + 12 + armBob); X.stroke();
    X.beginPath(); X.moveTo(0, bodyMidY); X.lineTo(-dir * 8, bodyMidY + 15 - armBob); X.stroke();
  }

  // Head
  const headR = idx === 3 ? 13 : idx === 2 ? 12 : idx === 7 ? 14 : 10;
  X.fillStyle = ch.color;
  X.beginPath();
  X.arc(0, headY + headR, headR, 0, Math.PI * 2);
  X.fill();

  // Character-specific head features
  X.fillStyle = '#111';
  switch (idx) {
    case 0: // Puffcap
      X.fillStyle = ch.color2;
      X.beginPath(); X.moveTo(-7, headY + 2); X.lineTo(-4, headY - 6); X.lineTo(-1, headY + 2); X.fill();
      X.beginPath(); X.moveTo(7, headY + 2); X.lineTo(4, headY - 6); X.lineTo(1, headY + 2); X.fill();
      X.fillStyle = ch.color2;
      X.beginPath(); X.ellipse(dir * 4, headY + headR + 3, 5, 3, 0, 0, Math.PI * 2); X.fill();
      X.fillStyle = '#111';
      X.fillRect(dir * 3 - 1, headY + headR - 3, 3, 3);
      X.fillRect(dir * -5, headY + headR - 3, 3, 3);
      break;
    case 1: // Slimemold
      X.fillStyle = '#fff';
      X.beginPath(); X.arc(-4, headY + headR - 2, 5, 0, Math.PI * 2); X.fill();
      X.beginPath(); X.arc(4, headY + headR - 2, 5, 0, Math.PI * 2); X.fill();
      X.fillStyle = '#111';
      X.beginPath(); X.arc(-4, headY + headR - 2, 2, 0, Math.PI * 2); X.fill();
      X.beginPath(); X.arc(4, headY + headR - 2, 2, 0, Math.PI * 2); X.fill();
      X.strokeStyle = '#2e7d32';
      X.lineWidth = 2;
      X.beginPath(); X.arc(0, headY + headR + 3, 6, 0, Math.PI); X.stroke();
      break;
    case 2: // Rotwalker
      X.fillStyle = '#111';
      X.fillRect(-5, headY + headR - 3, 4, 2);
      X.fillRect(2, headY + headR - 3, 4, 2);
      X.strokeStyle = '#111';
      X.lineWidth = 1.5;
      X.beginPath(); X.arc(0, headY + headR + 6, 4, Math.PI, Math.PI * 2); X.stroke();
      X.beginPath(); X.moveTo(-7, headY + headR - 6); X.lineTo(-2, headY + headR - 5); X.stroke();
      X.beginPath(); X.moveTo(7, headY + headR - 6); X.lineTo(2, headY + headR - 5); X.stroke();
      if (f.state === 'hitstun' || f.state === 'thrown') {
        X.fillStyle = 'rgba(255,100,150,0.4)';
        X.beginPath(); X.arc(0, headY + headR, headR, 0, Math.PI * 2); X.fill();
      }
      break;
    case 3: // Sporeboss
      X.fillStyle = ch.color2;
      X.beginPath();
      X.moveTo(-8, headY + headR + 2);
      X.lineTo(-6, headY + headR + 10);
      X.lineTo(6, headY + headR + 10);
      X.lineTo(8, headY + headR + 2);
      X.closePath();
      X.fill();
      X.fillStyle = '#111';
      X.fillRect(-6, headY + headR - 3, 5, 3);
      X.fillRect(2, headY + headR - 3, 5, 3);
      X.strokeStyle = '#111';
      X.lineWidth = 2;
      X.beginPath(); X.moveTo(-3, headY + headR + 5); X.lineTo(5, headY + headR + 3); X.stroke();
      break;
    case 4: // Moldling
      X.fillStyle = '#555';
      X.fillRect(-4, headY + headR - 2, 3, 2);
      X.fillRect(2, headY + headR - 2, 3, 2);
      X.strokeStyle = '#555';
      X.lineWidth = 1.5;
      X.beginPath(); X.moveTo(-4, headY + headR + 5); X.lineTo(4, headY + headR + 5); X.stroke();
      break;
    case 5: // Poopflinger
      X.fillStyle = '#ff9800';
      X.beginPath(); X.arc(0, headY + headR - 3, headR + 2, Math.PI, Math.PI * 2); X.fill();
      X.fillStyle = 'rgba(0,200,255,0.5)';
      X.fillRect(-7, headY + headR - 4, 14, 6);
      X.fillStyle = '#fff';
      X.fillRect(-4, headY + headR - 2, 3, 3);
      X.fillRect(2, headY + headR - 2, 3, 3);
      break;
    case 6: // Sporeling
      // Mushroom cap head
      X.fillStyle = '#7744bb';
      X.beginPath(); X.ellipse(0, headY + 4, headR + 4, headR * 0.6, 0, Math.PI, 0); X.fill();
      // Spots
      X.fillStyle = '#ddccff';
      X.beginPath(); X.arc(-4, headY + 2, 2, 0, Math.PI * 2); X.fill();
      X.beginPath(); X.arc(3, headY, 1.5, 0, Math.PI * 2); X.fill();
      // Glowing eyes
      X.shadowColor = '#aa66ff';
      X.shadowBlur = 4;
      X.fillStyle = '#cc88ff';
      X.fillRect(-4, headY + headR - 2, 3, 3);
      X.fillRect(2, headY + headR - 2, 3, 3);
      X.shadowBlur = 0;
      break;
    case 7: // Fungal Lord (boss)
      // Crown of mushrooms
      X.fillStyle = '#cc2244';
      X.beginPath();
      X.moveTo(-10, headY); X.lineTo(-8, headY - 10); X.lineTo(-4, headY); X.fill();
      X.beginPath();
      X.moveTo(-2, headY - 2); X.lineTo(0, headY - 14); X.lineTo(2, headY - 2); X.fill();
      X.beginPath();
      X.moveTo(4, headY); X.lineTo(8, headY - 10); X.lineTo(10, headY); X.fill();
      // Menacing eyes
      X.shadowColor = '#ff2244';
      X.shadowBlur = 6;
      X.fillStyle = '#ff4466';
      X.fillRect(-5, headY + headR - 3, 4, 3);
      X.fillRect(2, headY + headR - 3, 4, 3);
      X.shadowBlur = 0;
      // Grin
      X.strokeStyle = '#ff2244';
      X.lineWidth = 2;
      X.beginPath(); X.arc(0, headY + headR + 2, 6, 0, Math.PI); X.stroke();
      break;
  }

  // Super aura
  if (f.super >= f.maxSuper) {
    X.strokeStyle = ch.color;
    X.lineWidth = 1;
    X.globalAlpha = 0.3 + Math.sin(f.animBob * 5) * 0.2;
    X.beginPath();
    X.ellipse(0, -h * 0.5, ch.width * 0.7 + Math.sin(f.animBob * 4) * 5, h * 0.6 + Math.sin(f.animBob * 3) * 3, 0, 0, Math.PI * 2);
    X.stroke();
    X.globalAlpha = 1;
  }

  X.shadowBlur = 0;
  X.restore();
}

  // Super meter P1
  const superW = 180;

  X.fillStyle = '#aaa';
  X.textAlign = 'left';

  // Super meter P2
  X.fillStyle = '#222';
  X.fillRect(W - 30 - superW, superY, superW, superH);
  const s2Pct = p2.super / p2.maxSuper;
  X.fillStyle = s2Pct >= 1 ? '#ff0' : '#f60';
  X.fillRect(W - 30 - superW * s2Pct, superY, superW * s2Pct, superH);
  X.strokeStyle = s2Pct >= 1 ? '#ff0' : '#555';
  X.lineWidth = s2Pct >= 1 ? 2 : 1;
  X.strokeRect(W - 30 - superW, superY, superW, superH);

    X.shadowColor = '#ff0';
    X.shadowBlur = 8;
    X.strokeRect(W - 30 - superW, superY, superW, superH);

  }
  X.font = '9px Courier New';
  X.fillStyle = '#aaa';

  X.fillText('SUPER', W - 32, superY - 2);

  // Combo counters
  X.font = 'bold 20px Courier New';
  if (comboTimer1 > 0 && comboCount1 > 1) {
    X.fillStyle = 'rgba(255,255,0,' + Math.min(1, comboTimer1 / 20) + ')';

  }
  if (comboTimer2 > 0 && comboCount2 > 1) {

    X.fillText(comboCount2 + ' HIT COMBO!', W - 40, superY - 20);

  // Score display
  X.font = '10px Courier New';
  X.fillStyle = '#666';
  X.textAlign = 'left';
  X.fillText('POOP: ' + totalScore, 30, superY - 35);

  // Boss enrage indicator
  if (bossActive && bossEnrageTimer > 0) {
    X.font = 'bold 12px Courier New';
    X.fillStyle = 'rgba(255,68,68,' + (0.5 + Math.sin(Date.now() * 0.01) * 0.5) + ')';
    X.textAlign = 'center';
    X.fillText('!! ENRAGED !!', W / 2, barY + 68);
  }
}

function drawProjectiles() {
  for (const p of projectiles) {
    X.save();
    X.shadowColor = p.color;
    X.shadowBlur = 10;
    X.fillStyle = p.color;
    if (p.spore) {
      // Spore projectile: wobbly organic shape
      X.beginPath();
      for (var a = 0; a < Math.PI * 2; a += 0.5) {
        var r = p.size + Math.sin(a * 3 + p.life * 0.3) * 2;
        var px2 = p.x + Math.cos(a) * r;
        var py = p.y + Math.sin(a) * r;
        if (a === 0) X.moveTo(px2, py);
        else X.lineTo(px2, py);
      }
      X.closePath();
      X.fill();
    } else {
      X.beginPath();
      X.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      X.fill();
    }
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(p.x, p.y, p.size * 0.4, 0, Math.PI * 2);
    X.fill();
    X.restore();
  }
}

function drawSparks() {
  for (const s of hitSparks) {
    X.fillStyle = s.color;
    X.globalAlpha = s.life / 18;
    X.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
  }
  X.globalAlpha = 1;
}

function drawScorePopups() {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.y += sp.vy;
    sp.life--;
    if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
    var alpha = Math.min(1, sp.life / (sp.maxLife * 0.3));
    var scale = 1 + (1 - sp.life / sp.maxLife) * 0.2;
    X.save();
    X.globalAlpha = alpha;
    X.font = 'bold ' + Math.floor(sp.size * scale) + 'px Courier New';
    X.textAlign = 'center';
    X.fillStyle = sp.color;
    if (sp.scale > 1) {
      X.shadowColor = sp.color;
      X.shadowBlur = 8;
    }
    X.fillText(sp.text, sp.x, sp.y);
    X.restore();
  }
}

// --- MAIN GAME LOOP ---
let lastTime = 0;
let frameAccum = 0;
const FRAME_TIME = 1000 / 60;

function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);

  if (!lastTime) { lastTime = timestamp; return; }
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  frameAccum += dt;

  if (frameAccum > FRAME_TIME * 4) frameAccum = FRAME_TIME * 4;

  while (frameAccum >= FRAME_TIME) {
    frameAccum -= FRAME_TIME;
    frame++;
    update();
    for (const k in keys) prevKeys[k] = keys[k];
  }

  render();
}

function update() {
  bgScroll += 0.3;

  // Baseling character-select overlay is open — swallow game input until it closes.
  if (picking) return;

  switch (gameState) {
    case 'title':
      // Open the baseling picker (C). The selected baseling becomes the P1 fighter.
      if (justPressed('KeyC') && window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
        break;
      }
      if (justPressed('KeyW') && window.NftLoader && !window.NftLoader.wallet && window.ethereum) {
        window.NftLoader.connectWallet().then(function(addr) {
          if (addr) window.NftLoader.checkNFTs().then(function(chars) {
            if (chars.length > 0) window.NftLoader.selectedCharacter = chars[0];
          });
        });
      }
      if (justPressed('Enter') || justPressed('Space') || justPressed('KeyJ')) {
        gameState = 'modeSelect';
        menuCursor = 0;
        sfxSelect();
      }
      break;

    case 'modeSelect':
      if (justPressed('KeyW') || justPressed('ArrowUp')) { menuCursor = (menuCursor - 1 + 4) % 4; sfxSelect(); }
      if (justPressed('KeyS') || justPressed('ArrowDown')) { menuCursor = (menuCursor + 1) % 4; sfxSelect(); }
      if (justPressed('KeyQ')) { diffCursor = Math.max(0, diffCursor - 1); sfxSelect(); }
      if (justPressed('KeyE')) { diffCursor = Math.min(2, diffCursor + 1); sfxSelect(); }
      if (justPressed('Enter') || justPressed('KeyJ') || justPressed('Space')) {
        difficulty = diffCursor;
        if (menuCursor === 0) { gameMode = 'cpu'; gameState = 'charSelect'; }
        else if (menuCursor === 1) { gameMode = 'pvp'; gameState = 'charSelect'; }
        else if (menuCursor === 2) { gameMode = 'arcade'; gameState = 'charSelect'; }
        else if (menuCursor === 3) { gameState = 'tutorial'; tutorialPage = 0; }
        charSelectCursor1 = 0; charSelectCursor2 = 1;
        selectedP1 = false; selectedP2 = false;
        sfxRound();
      }
      if (justPressed('Escape')) { gameState = 'title'; }
      break;

    case 'tutorial':
      if (justPressed('KeyD') || justPressed('ArrowRight')) { tutorialPage = (tutorialPage + 1) % 4; sfxSelect(); }
      if (justPressed('KeyA') || justPressed('ArrowLeft')) { tutorialPage = (tutorialPage - 1 + 4) % 4; sfxSelect(); }
      if (justPressed('Enter') || justPressed('Escape') || justPressed('KeyJ')) {
        gameState = 'modeSelect';
        menuCursor = 0;
        sfxSelect();
      }
      break;

    case 'charSelect':
      var totalCharsNav = CHARS.length;
      var colsNav = 4;
      if (!selectedP1) {
        if (justPressed('KeyA') || justPressed('ArrowLeft')) { charSelectCursor1 = (charSelectCursor1 - 1 + totalCharsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('KeyD') || justPressed('ArrowRight')) { charSelectCursor1 = (charSelectCursor1 + 1) % totalCharsNav; sfxSelect(); }
        if (justPressed('KeyW') || justPressed('ArrowUp')) { charSelectCursor1 = (charSelectCursor1 - colsNav + totalCharsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('KeyS') || justPressed('ArrowDown')) { charSelectCursor1 = (charSelectCursor1 + colsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('KeyJ') || justPressed('Enter') || justPressed('Space')) {
          selectedP1 = true;
          p1Char = charSelectCursor1;
          sfxRound();
          if (gameMode !== 'pvp') {
            if (gameMode === 'arcade') {
              arcadeOrder = [];
              // Regular fighters first, then boss last
              for (let i = 0; i < CHARS.length; i++) { if (i !== p1Char && i !== 7) arcadeOrder.push(i); }
              for (let i = arcadeOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arcadeOrder[i], arcadeOrder[j]] = [arcadeOrder[j], arcadeOrder[i]];
              }
              arcadeOrder.push(7); // Boss is always last
              arcadeOpponent = 0;
              p2Char = arcadeOrder[0];
              gameState = 'arcadeIntro';
            } else {
              do { p2Char = Math.floor(Math.random() * (CHARS.length - 1)); } while (p2Char === p1Char);
              startMatch();
            }
          }
        }
      } else if (gameMode === 'pvp' && !selectedP2) {
        if (justPressed('ArrowLeft')) { charSelectCursor2 = (charSelectCursor2 - 1 + totalCharsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('ArrowRight')) { charSelectCursor2 = (charSelectCursor2 + 1) % totalCharsNav; sfxSelect(); }
        if (justPressed('ArrowUp')) { charSelectCursor2 = (charSelectCursor2 - colsNav + totalCharsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('ArrowDown')) { charSelectCursor2 = (charSelectCursor2 + colsNav) % totalCharsNav; sfxSelect(); }
        if (justPressed('Numpad1') || justPressed('Enter')) {
          p2Char = charSelectCursor2;
          startMatch();
          sfxRound();
        }
      }
      if (justPressed('Escape')) {
        if (selectedP1 && gameMode === 'pvp') { selectedP1 = false; }
        else { gameState = 'modeSelect'; menuCursor = 0; }
      }
      break;

    case 'arcadeIntro':
      if (justPressed('Enter') || justPressed('KeyJ') || justPressed('Space')) {
        startMatch();
        sfxRound();
      }
      if (justPressed('Escape')) {
        gameState = 'modeSelect';
        menuCursor = 0;
      }
      break;

    case 'bossIntro':
      if (justPressed('Enter') || justPressed('KeyJ') || justPressed('Space')) {
        startMatch();
        sfxRound();
      }
      if (justPressed('Escape')) {
        gameState = 'modeSelect';
        menuCursor = 0;
      }
      break;

    case 'fighting':
      updateFighting();
      break;

    case 'roundEnd':
      koFreeze--;
      if (koFreeze <= 0) {
        if (p1Wins >= 2 || p2Wins >= 2) {
          gameState = 'matchEnd';
          menuCursor = 0;
          if (gameMode === 'arcade' && p1Wins >= 2) {
            const progress = parseInt(localStorage.getItem('sporecity_arcade') || '0');
            if (arcadeOpponent + 1 > progress) {
              localStorage.setItem('sporecity_arcade', (arcadeOpponent + 1).toString());
            }
          }
        } else {
          roundNum++;
          startRound();
        }
      }
      break;

    case 'matchEnd':
      if (justPressed('KeyW') || justPressed('ArrowUp')) { menuCursor = (menuCursor - 1 + 3) % 3; sfxSelect(); }
      if (justPressed('KeyS') || justPressed('ArrowDown')) { menuCursor = (menuCursor + 1) % 3; sfxSelect(); }
      if (justPressed('Enter') || justPressed('KeyJ') || justPressed('Space')) {
        if (menuCursor === 0) {
          if (gameMode === 'arcade' && p1Wins >= 2) {
            arcadeOpponent++;
            if (arcadeOpponent >= arcadeOrder.length) {
              gameState = 'modeSelect';
              menuCursor = 0;
            } else {
              p2Char = arcadeOrder[arcadeOpponent];
              // Boss intro for the final fight
              if (p2Char === 7) {
                gameState = 'bossIntro';
                sfxBossRoar();
              } else {
                gameState = 'arcadeIntro';
              }
            }
          } else {
            startMatch();
          }
          sfxRound();
        } else if (menuCursor === 1) {
          gameState = 'charSelect';
          selectedP1 = false; selectedP2 = false;
          sfxSelect();
        } else {
          gameState = 'modeSelect';
          menuCursor = 0;
          sfxSelect();
        }
      }
      if (justPressed('Escape')) { gameState = 'modeSelect'; menuCursor = 0; }
      break;
  }
}

function startMatch() {
  p1Wins = 0;
  p2Wins = 0;
  roundNum = 1;
  matchStats = { p1Hits: 0, p2Hits: 0, p1Combos: 0, p2Combos: 0, p1Supers: 0, p2Supers: 0, p1Crits: 0, p2Crits: 0 };
  // P1 stat buffs now flow through statB (synthesized from BaselingPlayer.getMults() in
  // recomputeStats()); keep these legacy hooks neutral so buffs aren't double-applied.
  recomputeStats();
  nftDamageMultiplier = 1;
  nftBonusHp = 0;
  nftFighterColor = null;
  // Pick arena
  currentArena = Math.floor(Math.random() * ARENAS.length);
  bossActive = p2Char === 7;
  bossPhase = 0;
  bossEnrageTimer = 0;
  if (bossActive) currentArena = 2; // Boss always in Fungal Throne
  startRound();
}

function startRound() {
  p1 = createFighter(p1Char, false);
  p2 = createFighter(p2Char, true);
  if (nftBonusHp > 0) {
    p1.hp += nftBonusHp;
    p1.maxHp += nftBonusHp;
  }
  projectiles = [];
  hitSparks = [];
  scorePopups = [];
  hazards = [];
  arenaParticles = [];
  comboCount1 = 0; comboCount2 = 0;
  comboTimer1 = 0; comboTimer2 = 0;
  roundTimer = ROUND_TIME;
  roundTimerFrames = 0;
  fightAnnounce = 120;
  koFreeze = 0;
  koSlowMo = 0;
  gameState = 'fighting';
  sfxRound();
  if (bossActive) sfxBossRoar();
}

function updateFighting() {
  if (koSlowMo > 0) {
    koSlowMo--;
    return;
  }

  if (fightAnnounce > 0) {
    fightAnnounce--;
    return;
  }

  if (koFreeze > 0) return;

  // Timer
  roundTimerFrames++;
  if (roundTimerFrames >= 60) {
    roundTimerFrames = 0;
    roundTimer--;
    if (roundTimer <= 0) {
      if (p1.hp / p1.maxHp >= p2.hp / p2.maxHp) p2.hp = 0;
      else p1.hp = 0;
    }
  }

  // Combo timers
  if (comboTimer1 > 0) { comboTimer1--; if (comboTimer1 <= 0) comboCount1 = 0; }
  if (comboTimer2 > 0) { comboTimer2--; if (comboTimer2 <= 0) comboCount2 = 0; }

  // Spawn hazards
  spawnHazard();
  updateHazards();

  // Boss enrage mechanic
  if (bossActive && p2 && p2.hp < p2.maxHp * 0.3 && bossPhase === 0) {
    bossPhase = 1;
    bossEnrageTimer = 600; // 10 seconds of enrage
    addScorePopup(p2.x, p2.y - 90, 'ENRAGED!', '#ff4444', true);
    sfxBossRoar();
    screenShake = 8;
  }
  if (bossEnrageTimer > 0) bossEnrageTimer--;

  // Inputs
  const input1 = readInput(p1, false);
  const input2 = (gameMode === 'pvp') ? readInput(p2, true) : aiInput(p2, p1, difficulty);

  updateFighter(p1, input1, p2);
  updateFighter(p2, input2, p1);

  // Hit detection P1 -> P2
  if (!p2.invincible) {
    const hb1 = getHitbox(p1);
    const hurt2 = getHurtbox(p2);
    if (hb1 && !p1.hitThisAttack && boxOverlap(hb1, hurt2)) {
      if (p2.counterActive) {
        resolveHit(p2, p1, 'super');
        p2.counterActive = false;
        p2.state = 'attack';
        p2.attackPhase = 'recovery';
        p2.stateTimer = CHARS[p2.charIdx].attacks.super.recovery;
      } else {
        resolveHit(p1, p2, p1.attackType);
      }
    }
  }

  // Hit detection P2 -> P1
  if (!p1.invincible) {
    const hb2 = getHitbox(p2);
    const hurt1 = getHurtbox(p1);
    if (hb2 && !p2.hitThisAttack && boxOverlap(hb2, hurt1)) {
      if (p1.counterActive) {
        resolveHit(p1, p2, 'super');
        p1.counterActive = false;
        p1.state = 'attack';
        p1.attackPhase = 'recovery';
        p1.stateTimer = CHARS[p1.charIdx].attacks.super.recovery;
      } else {
        resolveHit(p2, p1, p2.attackType);
      }
    }
  }

  // Projectile update
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0 || p.x < -20 || p.x > W + 20) {
      projectiles.splice(i, 1);
      continue;
    }

    const target = p.owner === 0 ? p2 : p1;
    if (!target.invincible) {
      const thurt = getHurtbox(target);
      if (p.x > thurt.x && p.x < thurt.x + thurt.w && p.y > thurt.y && p.y < thurt.y + thurt.h) {
        const holdBack = (
          (target.isP2 && ((target.facing > 0 && keys['ArrowRight']) || (target.facing < 0 && keys['ArrowLeft']))) ||
          (!target.isP2 && ((target.facing > 0 && keys['KeyD']) || (target.facing < 0 && keys['KeyA'])))
        );
        const canBlock = target.state === 'idle' || target.state === 'walk' || target.state === 'crouch' || target.state === 'blockstun';

        if (holdBack && canBlock) {
          target.state = 'blockstun';
          target.stateTimer = p.blockstun;
          sfxBlock();
          var projDmg = p.damage;
          if (p.owner === 0) projDmg = Math.floor(projDmg * statDamageMult);
          if (p.owner === 0 && nftDamageMultiplier > 1) projDmg = Math.floor(projDmg * nftDamageMultiplier);
          target.hp = Math.max(1, target.hp - Math.floor(projDmg * 0.1));
          addScorePopup(p.x, p.y - 20, 'BLOCK', '#88ccff', false);
        } else {
          var projHitDmg = p.damage;
          if (p.owner === 0) projHitDmg = Math.floor(projHitDmg * statDamageMult);
          if (p.owner === 0 && nftDamageMultiplier > 1) projHitDmg = Math.floor(projHitDmg * nftDamageMultiplier);
          target.hp = Math.max(0, target.hp - projHitDmg);
          target.state = 'hitstun';
          target.stateTimer = p.hitstun;
          target.vx = (p.vx > 0 ? 1 : -1) * p.knockback;
          sfxPunch();
          if (p.spore) sfxSpore();
          if (p.owner === 0) { comboCount1++; comboTimer1 = 60; matchStats.p1Hits++; totalScore += projHitDmg; }
          else { comboCount2++; comboTimer2 = 60; matchStats.p2Hits++; }
          target.flashTimer = 6;
          screenShake = 3;
          koSlowMo = 3;
          addScorePopup(p.x, p.y - 30, projHitDmg.toString(), '#ff0', false);
        }
        addSpark(p.x, p.y, false);
        if (p.spore) addSporeParticles(p.x, p.y, p.color, 5);
        projectiles.splice(i, 1);
        const attacker = p.owner === 0 ? p1 : p2;
        var projSuperGain = 5;
        if (p.owner === 0) projSuperGain = Math.floor(projSuperGain * statSuperGain);
        attacker.super = Math.min(attacker.maxSuper, attacker.super + projSuperGain);
      }
    }
  }

  // Update sparks
  for (let i = hitSparks.length - 1; i >= 0; i--) {
    const s = hitSparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15;
    s.life--;
    if (s.life <= 0) hitSparks.splice(i, 1);
  }

  // Screen shake decay
  if (screenShake > 0) {
    screenShakeX = (Math.random() - 0.5) * screenShake * 3;
    screenShakeY = (Math.random() - 0.5) * screenShake * 3;
    screenShake *= 0.85;
    if (screenShake < 0.3) { screenShake = 0; screenShakeX = 0; screenShakeY = 0; }
  }

  // Check KO
  if (p1.hp <= 0 || p2.hp <= 0) {
    if (p1.hp <= 0) p2Wins++;
    if (p2.hp <= 0) p1Wins++;
    koFreeze = 80;
    gameState = 'roundEnd';
    sfxKO();
    screenShake = 10;
    if (p2.hp <= 0) {
      addScorePopup(W / 2, H / 2 - 60, 'VICTORY!', '#ff0', true);
    }
  }
}

function render() {
  X.save();

  if (screenShake > 0) {
    X.translate(screenShakeX, screenShakeY);
  }

  switch (gameState) {
    case 'title':
      drawTitle();
      break;

    case 'modeSelect':
      drawModeSelect();
      break;

    case 'charSelect':
      drawCharSelect();
      break;

    case 'tutorial':
      drawTutorial();
      break;

    case 'arcadeIntro':
      drawArcadeIntro();
      break;

    case 'bossIntro':
      drawBossIntro();
      break;

    case 'fighting':
    case 'roundEnd':
      drawBG();
      drawHazards();
      drawProjectiles();

      if (p1.y >= p2.y) {
        drawFighter(p2);
        drawFighter(p1);
      } else {
        drawFighter(p1);
        drawFighter(p2);
      }

      drawSparks();
      drawScorePopups();
      drawHUD();
      drawAnnouncement();
      if (gameState === 'roundEnd') drawKO();
      break;

    case 'matchEnd':
      drawBG();
      drawProjectiles();
      drawFighter(p1);
      drawFighter(p2);
      drawSparks();
      drawScorePopups();
      drawHUD();
      drawMatchEnd();
      break;
  }

  X.restore();
}

// Touch/click handler for title
C.addEventListener('click', () => {
  ensureAudio();
  if (gameState === 'title') {
    gameState = 'modeSelect';
    menuCursor = 0;
    sfxSelect();
  }
});

// Prevent default on relevant keys
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) {
    e.preventDefault();
  }
});

// Start
requestAnimationFrame(gameLoop);
</script>
