<html lang="en">

<script src="baseling-player.js"></script>

<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Bespoke engine (no TAS): talk to BaselingPlayer directly. getMults() -> {moveSpeed,
// health,damage,luck,swim}, clamped to the single-player band (0.8–1.6). The baselings ARE
// the marchers here. This game derives many values from D&D-style statMod() helpers; we keep
// statB's shape, synthesize its fields from the five bounded multipliers (str/dex/con/int/
// wis/cha each = 10 + (mult-1)*20), and recompute the mods + config inside recomputeStats()
// so a title-screen pick applies. Not a wager game -> default band.
var statB = {
  damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1,
  cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10,
  level: 0, color: '#44dd88', name: 'Baseling', icon: 'B'
};
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[spore-march] NftLoader display info failed:', e && e.message); }

function statMod(val) { return Math.floor((val - 10) / 2); }
// Derived stat modifiers + config — reassigned in recomputeStats() so a pick takes effect.
var strMod, dexMod, conMod, intMod, wisMod, chaMod;
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  strMod = statMod(statB.str); dexMod = statMod(statB.dex); conMod = statMod(statB.con);
  intMod = statMod(statB.int); wisMod = statMod(statB.wis); chaMod = statMod(statB.cha);
  // Re-derive config-like values (declared in the CONSTANTS block below; var hoists).
  WALK_SPEED = Math.max(0.3, BASE_WALK_SPEED + dexMod * 0.08);      // DEX: walk speed
  FALL_DEATH = Math.max(30, BASE_FALL_DEATH + conMod * 10);         // CON: fall survival
  MAX_BUILDERS_STEPS = Math.max(8, 12 + strMod * 2);                // STR: build distance
  DIG_RATE = Math.max(1, BASE_DIG_RATE + Math.floor(strMod * 0.5)); // STR: dig power
  BASH_RATE = Math.max(1, 2 + Math.floor(strMod * 0.5));            // STR: bash power
  BOMBER_FUSE = Math.max(120, 300 - wisMod * 30);                   // WIS: faster fuse
  BOMB_RADIUS = Math.max(8, 10 + strMod);                           // STR: explosion radius
  SCORE_MULT = Math.max(1, 1 + intMod * 0.15);                      // INT: score multiplier
  RESCUE_BONUS = Math.max(0, chaMod);                               // CHA: rescue bonus
  LUCK_CHANCE = Math.min(0.3, Math.max(0, chaMod * 0.04));          // CHA: lucky save %
  COOLDOWN_MULT = Math.max(0.5, 1 - wisMod * 0.08);                 // WIS: ability cooldown
}
var picking = false; // baseling character-select overlay is open
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

// ============================================================
// CONSTANTS
// ============================================================
var WORLD_W = 320;
var WORLD_H = 200;
var PIXEL_SCALE = 2;

// Terrain types
var T_AIR = 0;
var T_DIRT = 1;
var T_GRASS = 2;
var T_STONE = 3;
var T_WATER = 4;
var T_LAVA = 5;
var T_EXIT = 6;
var T_ENTRANCE = 7;
var T_MYCELIUM = 8;   // spore bridge terrain
var T_SPORE = 9;      // toxic spore cloud
var T_REACTOR = 10;   // reactor hazard

// Jobs
var JOB_NONE = 0;
var JOB_BLOCKER = 1;
var JOB_DIGGER = 2;
var JOB_BASHER = 3;
var JOB_BUILDER = 4;
var JOB_CLIMBER = 5;
var JOB_FLOATER = 6;
var JOB_BOMBER = 7;

var JOB_NAMES = ['Walk', 'Blocker', 'Digger', 'Basher', 'Builder', 'Climber', 'Floater', 'Bomber'];
var JOB_COLORS = ['#44ee66', '#ee3333', '#996633', '#ff8800', '#ffdd00', '#33aaff', '#ffffff', '#ff00ff'];

// Baseling dimensions
var BAS_W = 4;
var BAS_H = 8;

// Physics - STR/DEX/CON influence base values. The stat-derived values below are set in
// recomputeStats(); the BASE_* anchors stay constant.
var GRAVITY = 0.15;
var BASE_WALK_SPEED = 0.5;
var WALK_SPEED;        // DEX: walk speed
var BASE_FALL_DEATH = 60;
var FALL_DEATH;        // CON: fall survival
var MAX_BUILDERS_STEPS;// STR: build distance
var BASE_DIG_RATE = 2;
var DIG_RATE;          // STR: dig power
var BASH_RATE;         // STR: bash power
var BOMBER_FUSE;       // WIS: faster fuse
var BOMB_RADIUS;       // STR: explosion radius
var SCORE_MULT;        // INT: score multiplier
var RESCUE_BONUS;      // CHA: rescue bonus
var LUCK_CHANCE;       // CHA: lucky save %
var COOLDOWN_MULT;     // WIS: ability cooldown

// Now that the BASE_* anchors exist, compute stats and boot the player module (silent —
// no wallet popup). recomputeStats() re-derives every value above.
recomputeStats();
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[spore-march] player init failed:', e && e.message); });
}

// Zone themes
var ZONE_MYCELIAL = 0;
var ZONE_REACTOR = 1;
var ZONE_SPORE = 2;
var ZONE_DEEP = 3;
var ZONE_LAVA = 4;

// ============================================================
// CANVAS SETUP
// ============================================================
var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W, H, SCALE, OFFSET_X, OFFSET_Y;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth;
  var sh = window.innerHeight - 20;
  SCALE = Math.min(sw / (WORLD_W * PIXEL_SCALE), sh / ((WORLD_H + 40) * PIXEL_SCALE));
  W = Math.floor(WORLD_W * PIXEL_SCALE * SCALE);
  H = Math.floor((WORLD_H + 40) * PIXEL_SCALE * SCALE);
  OFFSET_X = Math.floor((sw - W) / 2);
  OFFSET_Y = Math.floor((sh - H) / 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, OFFSET_Y) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// SCREEN SHAKE
// ============================================================
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDecay = 0.9;

function triggerShake(mag) {
  shakeMag = Math.max(shakeMag, mag);
}

function updateShake() {
  if (shakeMag > 0.1) {
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= shakeDecay;
  } else {
    shakeX = 0;
    shakeY = 0;
    shakeMag = 0;
  }
}

// ============================================================
// SCORE POPUPS
// ============================================================
var scorePopups = [];
var totalScore = 0;

function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#f4b41b', life: 1.0, vy: -0.5 });
}

function updateScorePopups() {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var p = scorePopups[i];
    p.y += p.vy;
    p.life -= 0.015;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  var s = PIXEL_SCALE * SCALE;
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.font = 'bold ' + Math.floor(4 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x * s + shakeX, p.y * s + shakeY);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ============================================================
// AUDIO ENGINE
// ============================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSize = audioCtx.sampleRate * dur;
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

var SFX = {
  assign: function() { playTone(880, 0.08, 'square', 0.06); playTone(1100, 0.06, 'square', 0.05); },
  dig: function() { playNoise(0.05, 0.06); playTone(150, 0.04, 'triangle', 0.04, 100); },
  build: function() { playTone(600, 0.05, 'triangle', 0.05, 800); },
  splat: function() { playTone(200, 0.3, 'sawtooth', 0.1, 50); playNoise(0.2, 0.1); },
  drown: function() { playTone(300, 0.4, 'sine', 0.08, 100); },
  explode: function() { playNoise(0.3, 0.15); playTone(80, 0.4, 'sawtooth', 0.12, 30); },
  exit: function() { playTone(523, 0.1, 'square', 0.06); playTone(784, 0.1, 'square', 0.06); playTone(1047, 0.15, 'square', 0.08); },
  levelWin: function() {
    [523, 659, 784, 1047].forEach(function(n, i) { setTimeout(function() { playTone(n, 0.15, 'square', 0.08); }, i * 120); });
  },
  levelFail: function() {
    [440, 349, 293, 220].forEach(function(n, i) { setTimeout(function() { playTone(n, 0.2, 'sawtooth', 0.08); }, i * 180); });
  },
  spawn: function() { playTone(440, 0.05, 'sine', 0.03, 660); },
  nuke: function() { playTone(60, 0.8, 'sawtooth', 0.15, 20); playNoise(0.6, 0.12); },
  spore: function() { playTone(200, 0.15, 'sine', 0.04, 350); },
  reactor: function() { playTone(100, 0.2, 'sawtooth', 0.06, 60); playNoise(0.15, 0.08); },
  bossWarn: function() {
    [220, 220, 165, 165].forEach(function(n, i) { setTimeout(function() { playTone(n, 0.12, 'square', 0.1); }, i * 150); });
  },
  lucky: function() { playTone(1200, 0.1, 'sine', 0.06); playTone(1500, 0.1, 'sine', 0.05); },
  combo: function() { playTone(660, 0.06, 'square', 0.05); playTone(880, 0.08, 'square', 0.06); }
};

// ============================================================
// PARTICLES
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = (speed || 1.5) * (0.5 + Math.random());
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      life: 1, color: color,
      size: 1 + Math.random() * 2
    });
  }
}

// Themed particle bursts
function spawnSporeCloud(x, y) {
  for (var i = 0; i < 8; i++) {
    var angle = Math.random() * Math.PI * 2;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * 0.3,
      vy: Math.sin(angle) * 0.3 - 0.4,
      life: 1.5, color: '#88ff44',
      size: 2 + Math.random() * 3
    });
  }
}

function spawnMyceliumGrow(x, y) {
  for (var i = 0; i < 5; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 6, y: y,
      vx: (Math.random() - 0.5) * 0.2,
      vy: -0.5 - Math.random() * 0.5,
      life: 0.8, color: '#ccddff',
      size: 1 + Math.random()
    });
  }
}

function spawnReactorSpark(x, y) {
  for (var i = 0; i < 10; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = 1 + Math.random() * 2;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 0.6, color: i % 2 === 0 ? '#ff6600' : '#ffcc00',
      size: 1 + Math.random() * 2
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.03;
    p.life -= 0.018;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  var s = PIXEL_SCALE * SCALE;
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.min(1, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x * s + shakeX, p.y * s + shakeY, p.size * s, p.size * s);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// TERRAIN
// ============================================================
var terrain = [];
var currentZone = ZONE_MYCELIAL;

function initTerrain() {
  terrain = [];
  for (var x = 0; x < WORLD_W; x++) {
    terrain[x] = new Uint8Array(WORLD_H);
  }
}

function getTerrain(x, y) {
  if (x < 0 || x >= WORLD_W || y < 0 || y >= WORLD_H) return T_STONE;
  return terrain[x][y];
}

function setTerrain(x, y, val) {
  if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H) {
    terrain[x][y] = val;
  }
}

function isSolid(x, y) {
  var t = getTerrain(x, y);
  return t === T_DIRT || t === T_GRASS || t === T_STONE || t === T_MYCELIUM;
}

function isDeadly(x, y) {
  var t = getTerrain(x, y);
  return t === T_WATER || t === T_LAVA || t === T_SPORE || t === T_REACTOR;
}

function isDiggable(x, y) {
  var t = getTerrain(x, y);
  return t === T_DIRT || t === T_GRASS || t === T_MYCELIUM;
}

// Pre-render terrain to offscreen canvas for performance
var terrainDirty = true;
var terrainCanvas = null;

// Zone-specific terrain colors
function getTerrainColor(t, wx, wy) {
  var r = 26, g = 28, b = 44;
  switch(t) {
    case T_DIRT:
      if (currentZone === ZONE_MYCELIAL) { r = 100; g = 75; b = 50; }
      else if (currentZone === ZONE_REACTOR) { r = 80; g = 70; b = 90; }
      else if (currentZone === ZONE_SPORE) { r = 70; g = 90; b = 60; }
      else if (currentZone === ZONE_DEEP) { r = 60; g = 55; b = 70; }
      else if (currentZone === ZONE_LAVA) { r = 120; g = 60; b = 40; }
      else { r = 139; g = 90; b = 43; }
      break;
    case T_GRASS:
      if (currentZone === ZONE_MYCELIAL) { r = 40; g = 160; b = 80; }
      else if (currentZone === ZONE_SPORE) { r = 80; g = 200; b = 60; }
      else if (currentZone === ZONE_DEEP) { r = 30; g = 120; b = 100; }
      else { r = 60; g = 180; b = 60; }
      break;
    case T_STONE:
      if (currentZone === ZONE_REACTOR) { r = 90; g = 85; b = 110; }
      else if (currentZone === ZONE_DEEP) { r = 70; g = 70; b = 90; }
      else { r = 100; g = 100; b = 110; }
      break;
    case T_WATER:
      r = 30; g = 80 + Math.sin(wx * 0.3) * 20; b = 200;
      break;
    case T_LAVA:
      r = 220; g = 50 + Math.sin(wx * 0.5 + wy * 0.3) * 30; b = 20;
      break;
    case T_MYCELIUM:
      r = 180; g = 190; b = 220;
      var pulse = Math.sin(wx * 0.2 + wy * 0.15) * 15;
      r += pulse; g += pulse; b += pulse;
      break;
    case T_SPORE:
      r = 60; g = 180 + Math.sin(wx * 0.4) * 30; b = 30;
      break;
    case T_REACTOR:
      r = 200 + Math.sin(wx * 0.6 + wy * 0.4) * 40;
      g = 80 + Math.sin(wx * 0.3) * 30;
      b = 20;
      break;
    case T_EXIT:
      r = 56; g = 217; b = 115;
      break;
    case T_ENTRANCE:
      r = 244; g = 180; b = 27;
      break;
  }
  return [r, g, b];
}

function renderTerrainToBuffer() {
  if (!terrainCanvas) {
    terrainCanvas = document.createElement('canvas');
  }
  var s = PIXEL_SCALE * SCALE;
  terrainCanvas.width = Math.ceil(WORLD_W * s);
  terrainCanvas.height = Math.ceil(WORLD_H * s);
  var tctx = terrainCanvas.getContext('2d');
  var imgData = tctx.createImageData(terrainCanvas.width, terrainCanvas.height);
  var pw = imgData.width;
  var ph = imgData.height;
  var data = imgData.data;

  for (var wx = 0; wx < WORLD_W; wx++) {
    for (var wy = 0; wy < WORLD_H; wy++) {
      var t = terrain[wx][wy];
      var c = getTerrainColor(t, wx, wy);
      var r = c[0], g = c[1], b = c[2], a = 255;

      // Add pixel noise to solid terrain for retro pixel look
      if (t === T_DIRT || t === T_STONE || t === T_MYCELIUM) {
        var hash = (wx * 7919 + wy * 104729) % 256;
        var noise = (hash / 256 - 0.5) * 16;
        r = Math.max(0, Math.min(255, r + noise));
        g = Math.max(0, Math.min(255, g + noise));
        b = Math.max(0, Math.min(255, b + noise));
      }

      if (t === T_AIR) { r = 26; g = 28; b = 44; }

      var pxStart = Math.floor(wx * s);
      var pyStart = Math.floor(wy * s);
      var pxEnd = Math.floor((wx + 1) * s);
      var pyEnd = Math.floor((wy + 1) * s);

      for (var px = pxStart; px < pxEnd && px < pw; px++) {
        for (var py = pyStart; py < pyEnd && py < ph; py++) {
          var idx = (py * pw + px) * 4;
          data[idx] = r;
          data[idx + 1] = g;
          data[idx + 2] = b;
          data[idx + 3] = a;
        }
      }
    }
  }
  tctx.putImageData(imgData, 0, 0);
  terrainDirty = false;
}

// ============================================================
// BASELING (LEMMING) ENTITY
// ============================================================
var baselings = [];
var savedCount = 0;
var deadCount = 0;
var selectedBaseling = -1;
var comboCounter = 0;
var comboTimer = 0;
var luckyCount = 0;

function createBaseling(x, y) {
  return {
    x: x, y: y,
    vx: WALK_SPEED,
    vy: 0,
    dir: 1,
    job: JOB_NONE,
    alive: true,
    exited: false,
    falling: false,
    fallDist: 0,
    climbing: false,
    floating: false,
    hasFloater: false,
    hasClimber: false,
    buildSteps: 0,
    bomberTimer: -1,
    animFrame: 0,
    animTimer: 0,
    hp: Math.max(1, 3 + conMod),            // CON: baseling HP
    sporeTimer: 0,                            // spore damage tick
    reactorHitTimer: 0,                       // reactor damage cooldown
    speedBuff: 0,                             // temporary speed buff
    rescueChain: 0                            // CHA chain counter
  };
}

function updateBaseling(b) {
  if (!b.alive || b.exited) return;

  b.animTimer++;
  var animSpeed = Math.max(4, Math.floor(8 * COOLDOWN_MULT));  // WIS: faster animation cycle
  if (b.animTimer > animSpeed) {
    b.animTimer = 0;
    b.animFrame = (b.animFrame + 1) % 4;
  }

  // Speed buff decay
  if (b.speedBuff > 0) b.speedBuff -= 0.01;

  // Bomber countdown (WIS: faster fuse)
  if (b.bomberTimer > 0) {
    b.bomberTimer--;
    if (b.bomberTimer <= 0) {
      explodeBaseling(b);
      return;
    }
  }

  // Check deadly terrain
  var cx = Math.floor(b.x + BAS_W / 2);
  var cy = Math.floor(b.y + BAS_H);
  var terrBelow = getTerrain(cx, cy);
  var terrMid = getTerrain(cx, cy - 1);

  // Reactor damage (with cooldown)
  if (terrBelow === T_REACTOR || terrMid === T_REACTOR) {
    if (b.reactorHitTimer <= 0) {
      b.hp--;
      b.reactorHitTimer = 30;
      spawnReactorSpark(b.x + BAS_W / 2, b.y + BAS_H / 2);
      triggerShake(2);
      if (b.hp <= 0) {
        killBaseling(b, '#ff6600');
        SFX.reactor();
        spawnScorePopup(b.x, b.y - 4, 'REACTOR!', '#ff6600');
        return;
      }
    }
    b.reactorHitTimer--;
  } else {
    b.reactorHitTimer = Math.max(0, b.reactorHitTimer - 1);
  }

  // Spore damage (tick-based poison)
  if (terrBelow === T_SPORE || terrMid === T_SPORE) {
    b.sporeTimer++;
    if (b.sporeTimer % 20 === 0) {
      b.hp--;
      spawnSporeCloud(b.x + BAS_W / 2, b.y + BAS_H / 2);
      if (b.hp <= 0) {
        killBaseling(b, '#88ff44');
        SFX.spore();
        spawnScorePopup(b.x, b.y - 4, 'TOXIC!', '#88ff44');
        return;
      }
    }
  } else {
    b.sporeTimer = Math.max(0, b.sporeTimer - 1);
  }

  // Instant kill hazards
  if (terrBelow === T_WATER || terrMid === T_WATER) {
    // CHA: lucky save chance
    if (Math.random() < LUCK_CHANCE) {
      b.dir = -b.dir;
      b.y -= 2;
      luckyCount++;
      SFX.lucky();
      spawnScorePopup(b.x, b.y - 6, 'LUCKY!', '#f4b41b');
      spawnParticles(b.x + BAS_W / 2, b.y + BAS_H / 2, '#f4b41b', 6, 1);
      return;
    }
    killBaseling(b, '#4488ff');
    SFX.drown();
    return;
  }
  if (terrBelow === T_LAVA || terrMid === T_LAVA) {
    if (Math.random() < LUCK_CHANCE) {
      b.dir = -b.dir;
      b.y -= 2;
      luckyCount++;
      SFX.lucky();
      spawnScorePopup(b.x, b.y - 6, 'LUCKY!', '#f4b41b');
      return;
    }
    killBaseling(b, '#ff4400');
    SFX.splat();
    return;
  }

  // Check exit
  if (getTerrain(cx, Math.floor(b.y + BAS_H / 2)) === T_EXIT) {
    b.exited = true;
    savedCount++;
    // CHA: rescue bonus scoring
    var baseScore = Math.floor(100 * SCORE_MULT);  // INT: score multiplier
    var rescueScore = baseScore + RESCUE_BONUS * 10; // CHA: rescue bonus
    totalScore += rescueScore;
    // Combo system
    comboCounter++;
    comboTimer = 180;
    if (comboCounter >= 3) {
      var comboBonus = comboCounter * 25;
      totalScore += comboBonus;
      SFX.combo();
      spawnScorePopup(b.x, b.y - 10, comboCounter + 'x COMBO +' + comboBonus, '#a855f7');
    }
    SFX.exit();
    spawnScorePopup(b.x, b.y - 4, '+' + rescueScore, '#38d973');
    spawnParticles(b.x + BAS_W / 2, b.y + BAS_H / 2, '#38d973', 10, 1.5);
    spawnMyceliumGrow(b.x + BAS_W / 2, b.y);
    return;
  }

  // Gravity and falling
  var groundBelow = isSolid(cx, Math.floor(b.y + BAS_H));
  var groundBelowL = isSolid(Math.floor(b.x), Math.floor(b.y + BAS_H));
  var onGround = groundBelow || groundBelowL;

  if (!onGround && b.job !== JOB_BUILDER) {
    if (b.climbing) {
      b.climbing = false;
    }
    b.falling = true;
    if (b.hasFloater || b.job === JOB_FLOATER) {
      b.vy = Math.min(b.vy + GRAVITY * 0.2, 0.8);
      b.floating = true;
    } else {
      b.vy = Math.min(b.vy + GRAVITY, 4);
    }
    b.y += b.vy;
    b.fallDist += Math.abs(b.vy);

    // Check if landed
    var newCy = Math.floor(b.y + BAS_H);
    if (isSolid(cx, newCy)) {
      b.y = newCy - BAS_H;
      // CON: fall survival threshold
      if (b.fallDist > FALL_DEATH && !b.floating && !b.hasFloater) {
        // CHA: lucky save from fatal fall
        if (Math.random() < LUCK_CHANCE) {
          b.fallDist = 0;
          b.vy = 0;
          b.falling = false;
          luckyCount++;
          SFX.lucky();
          spawnScorePopup(b.x, b.y - 6, 'SAVED!', '#f4b41b');
          return;
        }
        killBaseling(b, '#ff6644');
        SFX.splat();
        triggerShake(3);
        return;
      }
      b.falling = false;
      b.floating = false;
      b.fallDist = 0;
      b.vy = 0;
    }
    return;
  }

  if (onGround && b.falling) {
    if (b.fallDist > FALL_DEATH && !b.floating && !b.hasFloater) {
      if (Math.random() < LUCK_CHANCE) {
        b.fallDist = 0;
        b.vy = 0;
        b.falling = false;
        luckyCount++;
        SFX.lucky();
        spawnScorePopup(b.x, b.y - 6, 'SAVED!', '#f4b41b');
        return;
      }
      killBaseling(b, '#ff6644');
      SFX.splat();
      triggerShake(3);
      return;
    }
    b.falling = false;
    b.floating = false;
    b.fallDist = 0;
    b.vy = 0;
  }

  // Job-specific behavior
  switch (b.job) {
    case JOB_BLOCKER:
      return;

    case JOB_DIGGER:
      if (b.animTimer === 0) {
        var dug = false;
        // STR: wider dig radius
        var digWidth = Math.max(BAS_W, BAS_W + strMod);
        for (var dx = -1; dx <= digWidth; dx++) {
          var tx = Math.floor(b.x) + dx;
          var ty = Math.floor(b.y + BAS_H);
          if (isDiggable(tx, ty)) {
            setTerrain(tx, ty, T_AIR);
            dug = true;
            terrainDirty = true;
          }
          var ty2 = Math.floor(b.y + BAS_H + 1);
          if (isDiggable(tx, ty2)) {
            setTerrain(tx, ty2, T_AIR);
            dug = true;
            terrainDirty = true;
          }
        }
        if (dug) {
          b.y += DIG_RATE;
          SFX.dig();
          spawnParticles(b.x + BAS_W / 2, b.y + BAS_H, '#996633', 3, 0.5);
        } else {
          b.job = JOB_NONE;
        }
      }
      return;

    case JOB_BASHER:
      if (b.animTimer === 0) {
        var bashed = false;
        // STR: bash further
        var bashDepth = Math.max(2, 2 + Math.floor(strMod * 0.5));
        for (var dy = 0; dy < BAS_H; dy++) {
          for (var bdi = 0; bdi < bashDepth; bdi++) {
            var btx = Math.floor(b.x + (b.dir > 0 ? BAS_W + bdi : -1 - bdi));
            var bty = Math.floor(b.y) + dy;
            if (isDiggable(btx, bty)) {
              setTerrain(btx, bty, T_AIR);
              bashed = true;
              terrainDirty = true;
            }
          }
        }
        if (bashed) {
          b.x += b.dir * BASH_RATE;
          SFX.dig();
          spawnParticles(b.x + (b.dir > 0 ? BAS_W : 0), b.y + BAS_H / 2, '#ff8800', 3, 0.5);
        } else {
          b.job = JOB_NONE;
        }
      }
      return;

    case JOB_BUILDER:
      if (b.animTimer === 0 && b.buildSteps < MAX_BUILDERS_STEPS) {
        var btx2 = Math.floor(b.x + (b.dir > 0 ? BAS_W : -1));
        var bty2 = Math.floor(b.y + BAS_H);
        // STR: build wider platform
        var buildWidth = Math.max(3, 3 + Math.floor(strMod * 0.5));
        for (var bdx = 0; bdx < buildWidth; bdx++) {
          var bx = Math.floor(b.x) + b.dir * bdx;
          if (getTerrain(bx, bty2) === T_AIR) {
            setTerrain(bx, bty2, T_MYCELIUM);
            terrainDirty = true;
          }
        }
        b.x += b.dir * 2;
        b.y -= 1;
        b.buildSteps++;
        SFX.build();
        spawnMyceliumGrow(b.x, b.y + BAS_H);

        var wallCheck = Math.floor(b.x + (b.dir > 0 ? BAS_W : 0));
        if (isSolid(wallCheck, Math.floor(b.y + BAS_H / 2))) {
          b.job = JOB_NONE;
          b.buildSteps = 0;
        }
      }
      if (b.buildSteps >= MAX_BUILDERS_STEPS) {
        b.job = JOB_NONE;
        b.buildSteps = 0;
        b.dir = -b.dir;
      }
      return;

    default:
      break;
  }

  // Normal walking - DEX affects speed
  var walkSpd = WALK_SPEED + b.speedBuff;
  var nextX = b.x + b.dir * walkSpd;
  var headY = Math.floor(b.y + 2);
  var feetY = Math.floor(b.y + BAS_H - 1);
  var frontX = Math.floor(nextX + (b.dir > 0 ? BAS_W : 0));

  // Check wall ahead
  if (isSolid(frontX, feetY) || isSolid(frontX, headY)) {
    if (!isSolid(frontX, feetY - 1) && !isSolid(frontX, headY - 1)) {
      b.x = nextX;
      b.y -= 1;
    } else if (!isSolid(frontX, feetY - 2) && !isSolid(frontX, headY - 2)) {
      b.x = nextX;
      b.y -= 2;
    } else if (b.hasClimber || b.job === JOB_CLIMBER) {
      b.climbing = true;
      b.y -= walkSpd;
      var topCheck = Math.floor(b.y);
      if (!isSolid(frontX, topCheck)) {
        b.climbing = false;
        b.x += b.dir * 2;
        b.y -= 2;
      }
    } else {
      b.dir = -b.dir;
    }
  } else {
    b.x = nextX;
  }

  // Check for blockers
  for (var bi = 0; bi < baselings.length; bi++) {
    var other = baselings[bi];
    if (other === b || !other.alive || other.exited || other.job !== JOB_BLOCKER) continue;
    if (Math.abs(b.x - other.x) < BAS_W + 1 && Math.abs(b.y - other.y) < BAS_H) {
      if ((b.dir > 0 && b.x < other.x) || (b.dir < 0 && b.x > other.x)) {
        b.dir = -b.dir;
      }
    }
  }

  // Boundary check
  if (b.x < 0) { b.x = 0; b.dir = 1; }
  if (b.x > WORLD_W - BAS_W) { b.x = WORLD_W - BAS_W; b.dir = -1; }
  if (b.y > WORLD_H + 20) { killBaseling(b, '#666'); }
}

function killBaseling(b, color) {
  b.alive = false;
  deadCount++;
  // Reset combo on death
  comboCounter = Math.max(0, comboCounter - 1);
  spawnParticles(b.x + BAS_W / 2, b.y + BAS_H / 2, color || '#ff4444', 12, 1.5);
}

function explodeBaseling(b) {
  b.alive = false;
  deadCount++;
  SFX.explode();
  triggerShake(5);
  // STR: bigger explosion radius
  var cx = Math.floor(b.x + BAS_W / 2);
  var cy = Math.floor(b.y + BAS_H / 2);
  for (var edx = -BOMB_RADIUS; edx <= BOMB_RADIUS; edx++) {
    for (var edy = -BOMB_RADIUS; edy <= BOMB_RADIUS; edy++) {
      if (edx * edx + edy * edy <= BOMB_RADIUS * BOMB_RADIUS) {
        var etx = cx + edx;
        var ety = cy + edy;
        if (isDiggable(etx, ety)) {
          setTerrain(etx, ety, T_AIR);
        }
      }
    }
  }
  terrainDirty = true;
  spawnParticles(cx, cy, '#ff00ff', 25, 3);
  spawnParticles(cx, cy, '#ffaa00', 15, 2);
  spawnReactorSpark(cx, cy);
  // INT: explosion scores points
  var explodeScore = Math.floor(50 * SCORE_MULT);
  totalScore += explodeScore;
  spawnScorePopup(cx, cy - 8, '+' + explodeScore, '#a855f7');
}

// ============================================================
// DRAW BASELING (retro pixel art)
// ============================================================
function drawBaseling(b) {
  if (!b.alive || b.exited) return;
  var s = PIXEL_SCALE * SCALE;
  var sx = b.x * s + shakeX;
  var sy = b.y * s + shakeY;
  var pw = s;

  // === BASELING SPRITE === each lemming IS the player's baseling (procedural fallback).
  var _anim = (b.falling || b.floating) ? 'jump' : (b.job === JOB_BLOCKER ? 'idle' : (b.job === JOB_DIGGER || b.job === JOB_BASHER || b.job === JOB_BUILDER ? 'attack' : 'walk'));
  if (drawSelectedBaseling(ctx, sx + BAS_W * pw / 2, sy + BAS_H * pw / 2, BAS_H * pw + pw, { anim: _anim, frame: b.animFrame * 5, flipX: b.dir < 0 })) {
    return;
  }

  // Body color based on job (uses statB.color as base)
  var bodyColor = b.job !== JOB_NONE ? JOB_COLORS[b.job] : statB.color;
  ctx.fillStyle = bodyColor;

  // Body (4x6 lower portion)
  ctx.fillRect(sx, sy + 2 * pw, BAS_W * pw, 6 * pw);

  // Head (4x2 top)
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(sx, sy, BAS_W * pw, 2 * pw);

  // Eyes (pixel art style)
  ctx.fillStyle = '#222';
  if (b.dir > 0) {
    ctx.fillRect(sx + 2 * pw, sy + pw * 0.5, pw * 0.6, pw * 0.6);
  } else {
    ctx.fillRect(sx + pw, sy + pw * 0.5, pw * 0.6, pw * 0.6);
  }

  // Hair tuft (baseling antenna) - uses statB color
  ctx.fillStyle = statB.color;
  ctx.fillRect(sx + pw, sy - pw, 2 * pw, pw);
  if (b.animFrame % 2 === 0) {
    ctx.fillRect(sx + 2 * pw, sy - 2 * pw, pw, pw);
  } else {
    ctx.fillRect(sx + pw, sy - 2 * pw, pw, pw);
  }

  // Job-specific animations
  ctx.fillStyle = '#335533';
  if (b.job === JOB_BLOCKER) {
    // Arms out pose with glow
    ctx.fillRect(sx - pw, sy + 3 * pw, pw, 2 * pw);
    ctx.fillRect(sx + BAS_W * pw, sy + 3 * pw, pw, 2 * pw);
    // Blocker shield glow
    ctx.fillStyle = 'rgba(255,50,50,0.3)';
    ctx.fillRect(sx - 2 * pw, sy + pw, (BAS_W + 4) * pw, 6 * pw);
  } else if (b.falling || b.floating) {
    if (b.floating || b.hasFloater) {
      // Spore parachute (mycelial umbrella)
      ctx.fillStyle = '#aaddff';
      ctx.fillRect(sx - 2 * pw, sy - 3 * pw, (BAS_W + 4) * pw, pw);
      ctx.fillStyle = '#88bbdd';
      ctx.fillRect(sx - pw, sy - 2 * pw, (BAS_W + 2) * pw, pw);
      // Threads
      ctx.fillStyle = '#ccddff';
      ctx.fillRect(sx, sy - pw, pw * 0.5, pw);
      ctx.fillRect(sx + (BAS_W - 1) * pw, sy - pw, pw * 0.5, pw);
    }
    // Spread limbs
    ctx.fillStyle = '#335533';
    ctx.fillRect(sx - pw, sy + 4 * pw, pw, pw);
    ctx.fillRect(sx + BAS_W * pw, sy + 4 * pw, pw, pw);
  } else if (b.climbing) {
    ctx.fillRect(sx + (b.dir > 0 ? BAS_W * pw : -pw), sy + 2 * pw, pw, pw);
    ctx.fillRect(sx + (b.dir > 0 ? BAS_W * pw : -pw), sy + 5 * pw, pw, pw);
  } else if (b.job === JOB_DIGGER) {
    // Digging motion
    var digOffset = b.animFrame % 2 === 0 ? 0 : pw;
    ctx.fillStyle = '#996633';
    ctx.fillRect(sx + pw + digOffset, sy + BAS_H * pw, 2 * pw, pw);
  } else if (b.job === JOB_BUILDER) {
    // Builder carries brick
    ctx.fillStyle = '#aabbcc';
    ctx.fillRect(sx + (b.dir > 0 ? BAS_W * pw : -2 * pw), sy + 3 * pw, 2 * pw, pw);
  } else {
    // Walking legs (4-frame)
    ctx.fillStyle = '#335533';
    switch (b.animFrame) {
      case 0:
        ctx.fillRect(sx + pw, sy + BAS_H * pw, pw, pw);
        ctx.fillRect(sx + 2 * pw, sy + BAS_H * pw, pw, pw);
        break;
      case 1:
        ctx.fillRect(sx, sy + BAS_H * pw, pw, pw);
        ctx.fillRect(sx + 3 * pw, sy + BAS_H * pw, pw, pw);
        break;
      case 2:
        ctx.fillRect(sx + pw, sy + BAS_H * pw, pw, pw);
        ctx.fillRect(sx + 2 * pw, sy + BAS_H * pw, pw, pw);
        break;
      case 3:
        ctx.fillRect(sx + 2 * pw, sy + BAS_H * pw, pw, pw);
        ctx.fillRect(sx + pw, sy + BAS_H * pw, pw, pw);
        break;
    }
  }

  // HP bar (only if damaged, CON determines max)
  var maxHp = Math.max(1, 3 + conMod);
  if (b.hp < maxHp) {
    var hpPct = b.hp / maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(sx, sy - 4 * pw, BAS_W * pw, pw);
    ctx.fillStyle = hpPct > 0.5 ? '#44ff44' : (hpPct > 0.25 ? '#ffaa00' : '#ff2222');
    ctx.fillRect(sx, sy - 4 * pw, BAS_W * pw * hpPct, pw);
  }

  // Bomber countdown indicator
  if (b.bomberTimer > 0) {
    ctx.fillStyle = '#ff0000';
    ctx.font = Math.floor(5 * s) + 'px monospace';
    var countDown = Math.ceil(b.bomberTimer / 60);
    ctx.fillText(countDown + '', sx, sy - 5 * pw);
    // Flashing warning
    if (countDown <= 2 && frameCount % 10 < 5) {
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(sx - pw, sy - pw, (BAS_W + 2) * pw, (BAS_H + 2) * pw);
    }
  }

  // Spore poisoned indicator
  if (b.sporeTimer > 10) {
    ctx.fillStyle = 'rgba(100,255,50,0.4)';
    ctx.fillRect(sx - pw, sy, (BAS_W + 2) * pw, BAS_H * pw);
  }

  // Selection highlight
  if (selectedBaseling >= 0 && baselings[selectedBaseling] === b) {
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - pw, sy - 3 * pw, (BAS_W + 2) * pw, (BAS_H + 4) * pw);
  }
}

// ============================================================
// LEVEL DEFINITIONS (Tasern-themed)
// ============================================================
function fillRect(x, y, w, h, type) {
  for (var dx = 0; dx < w; dx++) {
    for (var dy = 0; dy < h; dy++) {
      setTerrain(x + dx, y + dy, type);
    }
  }
}

// Helper: place mycelium bridge
function placeMyceliumBridge(x, y, w) {
  for (var dx = 0; dx < w; dx++) {
    setTerrain(x + dx, y, T_MYCELIUM);
    // Tiny visual roots below
    if (dx % 3 === 0) setTerrain(x + dx, y + 1, T_MYCELIUM);
  }
}

// Helper: place reactor hazard zone
function placeReactorZone(x, y, w, h) {
  for (var dx = 0; dx < w; dx++) {
    for (var dy = 0; dy < h; dy++) {
      setTerrain(x + dx, y + dy, T_REACTOR);
    }
  }
}

// Helper: place spore cloud
function placeSporeCloud(x, y, w, h) {
  for (var dx = 0; dx < w; dx++) {
    for (var dy = 0; dy < h; dy++) {
      setTerrain(x + dx, y + dy, T_SPORE);
    }
  }
}

function startLevel(idx) {
  if (idx >= LEVELS.length) {
    gameState = 'menu';
    return;
  }
  currentLevel = idx;
  var lvl = LEVELS[idx];
  currentZone = lvl.zone || ZONE_MYCELIAL;
  initTerrain();
  lvl.build();

  entranceX = lvl.entrance[0];
  entranceY = lvl.entrance[1];
  exitX = lvl.exit[0];
  exitY = lvl.exit[1];

  // Mark exit area
  for (var dx = 0; dx < 12; dx++) {
    for (var dy = 0; dy < 12; dy++) {
      setTerrain(exitX + dx, exitY + dy, T_EXIT);
    }
  }
  // Mark entrance area
  for (var edx = 0; edx < 10; edx++) {
    for (var edy = 0; edy < 6; edy++) {
      setTerrain(entranceX + edx, entranceY + edy, T_ENTRANCE);
    }
  }

  baselings = [];
  savedCount = 0;
  deadCount = 0;
  spawnCount = 0;
  spawnTimer = 0;
  totalToSpawn = lvl.total;
  selectedBaseling = -1;
  selectedJob = JOB_NONE;
  gameSpeed = 1;
  nukeActive = false;
  bossWarningShown = false;
  frameCount = 0;
  levelTime = 0;
  totalScore = 0;
  comboCounter = 0;
  comboTimer = 0;
  luckyCount = 0;
  scorePopups = [];
  particles = [];

  // Tutorial text
  tutorialText = lvl.tutorial || '';
  tutorialTimer = tutorialText ? 360 : 0;

  jobCounts = {};
  jobCounts[JOB_BLOCKER] = lvl.jobs.blocker;
  jobCounts[JOB_DIGGER] = lvl.jobs.digger;
  jobCounts[JOB_BASHER] = lvl.jobs.basher;
  jobCounts[JOB_BUILDER] = lvl.jobs.builder;
  jobCounts[JOB_CLIMBER] = lvl.jobs.climber;
  jobCounts[JOB_FLOATER] = lvl.jobs.floater;
  jobCounts[JOB_BOMBER] = lvl.jobs.bomber;

  // INT: bonus abilities at high INT
  if (intMod >= 2) {
    // Extra digger at high INT
    jobCounts[JOB_DIGGER] = (jobCounts[JOB_DIGGER] || 0) + 1;
  }
  if (intMod >= 3) {
    // Extra builder at very high INT
    jobCounts[JOB_BUILDER] = (jobCounts[JOB_BUILDER] || 0) + 1;
  }

  // Boss warning
  if (lvl.boss && !bossWarningShown) {
    bossWarningShown = true;
    SFX.bossWarn();
  }

  terrainDirty = true;
  gameState = 'playing';
}

// ============================================================
// INPUT
// ============================================================
var mouseX = 0, mouseY = 0;
var mouseDown = false;

function getWorldPos(clientX, clientY) {
  var rect = canvas.getBoundingClientRect();
  var cx = clientX - rect.left;
  var cy = clientY - rect.top;
  var s = PIXEL_SCALE * SCALE;
  return { x: cx / s, y: cy / s };
}

function handleClick(clientX, clientY) {
  ensureAudio();
  var rect = canvas.getBoundingClientRect();
  var cx = clientX - rect.left;
  var cy = clientY - rect.top;
  var s = PIXEL_SCALE * SCALE;
  var worldX = cx / s;
  var worldY = cy / s;

  if (gameState === 'menu') {
    // Tap the baseling preview/name band (worldY ~40–58) to open the character picker.
    if (!picking && worldY >= 40 && worldY <= 58 && worldX >= WORLD_W / 2 - 40 && worldX <= WORLD_W / 2 + 40) {
      picking = true;
      BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      return;
    }
    var btnW = 36, btnH = 18, cols = 5, padding = 6;
    var startX = (WORLD_W - (cols * (btnW + padding) - padding)) / 2;
    var startY = 82;
    for (var i = 0; i < LEVELS.length; i++) {
      var col = i % cols;
      var row = Math.floor(i / cols);
      var bx = startX + col * (btnW + padding);
      var by = startY + row * (btnH + padding);
      if (worldX >= bx && worldX <= bx + btnW && worldY >= by && worldY <= by + btnH) {
        startLevel(i);
        return;
      }
    }
    return;
  }

  if (gameState === 'levelComplete' || gameState === 'levelFail') {
    if (gameState === 'levelComplete') {
      startLevel(currentLevel + 1);
    } else {
      startLevel(currentLevel);
    }
    return;
  }

  if (gameState !== 'playing') return;

  // Dismiss tutorial on click
  if (tutorialTimer > 0) tutorialTimer = Math.min(tutorialTimer, 60);

  var panelY = WORLD_H;
  if (worldY >= panelY) {
    handlePanelClick(worldX, worldY - panelY);
    return;
  }

  // Try to select a baseling
  var closestIdx = -1;
  var closestDist = 12;
  for (var ci = 0; ci < baselings.length; ci++) {
    var cb = baselings[ci];
    if (!cb.alive || cb.exited) continue;
    var cdx = worldX - (cb.x + BAS_W / 2);
    var cdy = worldY - (cb.y + BAS_H / 2);
    var dist = Math.sqrt(cdx * cdx + cdy * cdy);
    if (dist < closestDist) {
      closestDist = dist;
      closestIdx = ci;
    }
  }

  if (closestIdx >= 0) {
    if (selectedJob !== JOB_NONE && jobCounts[selectedJob] > 0) {
      var jb = baselings[closestIdx];
      if (jb.job === JOB_NONE || selectedJob === JOB_CLIMBER || selectedJob === JOB_FLOATER || selectedJob === JOB_BOMBER) {
        assignJob(closestIdx, selectedJob);
      }
    } else {
      selectedBaseling = closestIdx;
    }
  } else {
    selectedBaseling = -1;
  }
}

function handlePanelClick(x, y) {
  var btnW = 30;
  var btnH = 18;
  var startX = 5;
  var startY = 5;

  for (var i = 1; i <= 7; i++) {
    var bx = startX + (i - 1) * (btnW + 4);
    var by = startY;
    if (x >= bx && x <= bx + btnW && y >= by && y <= by + btnH) {
      if (jobCounts[i] > 0) {
        selectedJob = (selectedJob === i) ? JOB_NONE : i;
        if (selectedBaseling >= 0 && selectedJob !== JOB_NONE) {
          assignJob(selectedBaseling, selectedJob);
        }
      }
      return;
    }
  }

  var speedBtns = [0, 1, 2, 4];
  var speedStartX = 250;
  for (var si = 0; si < 4; si++) {
    var sbx = speedStartX + si * 18;
    var sby = startY;
    if (x >= sbx && x <= sbx + 16 && y >= sby && y <= sby + btnH) {
      gameSpeed = speedBtns[si];
      return;
    }
  }

  // Nuke button
  if (x >= 250 && x <= 280 && y >= 24 && y <= 38) {
    if (!nukeActive) {
      nukeActive = true;
      SFX.nuke();
      triggerShake(6);
      for (var ni = 0; ni < baselings.length; ni++) {
        var nb = baselings[ni];
        if (nb.alive && !nb.exited) {
          nb.bomberTimer = 60 + Math.random() * 120;
        }
      }
    }
  }
}

function assignJob(idx, job) {
  var b = baselings[idx];
  if (!b || !b.alive || b.exited) return;

  if (job === JOB_CLIMBER) {
    b.hasClimber = true;
    jobCounts[job]--;
    SFX.assign();
    spawnScorePopup(b.x, b.y - 4, 'CLIMB', '#33aaff');
    return;
  }
  if (job === JOB_FLOATER) {
    b.hasFloater = true;
    jobCounts[job]--;
    SFX.assign();
    spawnScorePopup(b.x, b.y - 4, 'FLOAT', '#ffffff');
    return;
  }
  if (job === JOB_BOMBER) {
    b.bomberTimer = BOMBER_FUSE;
    b.job = JOB_BOMBER;
    jobCounts[job]--;
    SFX.assign();
    spawnScorePopup(b.x, b.y - 4, 'BOOM!', '#ff00ff');
    return;
  }

  if (b.job !== JOB_NONE && job !== JOB_BOMBER) return;

  b.job = job;
  b.buildSteps = 0;
  jobCounts[job]--;
  SFX.assign();
  spawnScorePopup(b.x, b.y - 4, JOB_NAMES[job].toUpperCase(), JOB_COLORS[job]);
}

canvas.addEventListener('mousedown', function(e) { mouseDown = true; handleClick(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', function() { mouseDown = false; });
canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  var s = PIXEL_SCALE * SCALE;
  mouseX = (e.clientX - rect.left) / s;
  mouseY = (e.clientY - rect.top) / s;
});

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  handleClick(t.clientX, t.clientY);
});
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); });
canvas.addEventListener('touchend', function(e) { e.preventDefault(); });

// --- keyboard control helpers (arrows = select/cycle, WASD = action cluster) ---
// Select the next/prev living, un-exited baseling (wraps). dir>0 = next.
function cycleSelectedBaseling(dir) {
  var n = baselings.length;
  if (n === 0) return;
  var start = selectedBaseling;
  for (var step = 1; step <= n; step++) {
    var idx = ((start + dir * step) % n + n) % n;
    var cand = baselings[idx];
    if (cand && cand.alive && !cand.exited) {
      selectedBaseling = idx;
      // If a job is armed, also keep it; otherwise just highlight.
      if (selectedJob !== JOB_NONE && jobCounts[selectedJob] > 0) assignJob(selectedBaseling, selectedJob);
      return;
    }
  }
}
// Cycle the armed job among those with remaining count (dir>0 = next, includes NONE).
function cycleSelectedJob(dir) {
  var order = [JOB_NONE];
  for (var j = 1; j <= 7; j++) if ((jobCounts[j] || 0) > 0) order.push(j);
  if (order.length <= 1) { selectedJob = JOB_NONE; return; }
  var cur = order.indexOf(selectedJob);
  if (cur < 0) cur = 0;
  var nx = ((cur + dir) % order.length + order.length) % order.length;
  selectedJob = order[nx];
  if (selectedBaseling >= 0 && selectedJob !== JOB_NONE) assignJob(selectedBaseling, selectedJob);
}
function doNuke() {
  if (nukeActive) return;
  nukeActive = true;
  SFX.nuke();
  triggerShake(6);
  for (var ki = 0; ki < baselings.length; ki++) {
    var kb = baselings[ki];
    if (kb.alive && !kb.exited) kb.bomberTimer = 60 + Math.random() * 120;
  }
}
function cycleGameSpeed() {
  var order = [0, 1, 2, 4];
  var i = order.indexOf(gameSpeed);
  gameSpeed = order[(i + 1) % order.length];
}

// Keyboard
document.addEventListener('keydown', function(e) {
  ensureAudio();
  if (gameState === 'playing') {
    // Number keys 1-7 = arm job directly (hidden alt / power-user).
    if (e.key >= '1' && e.key <= '7') {
      var j = parseInt(e.key);
      if (jobCounts[j] > 0) {
        selectedJob = (selectedJob === j) ? JOB_NONE : j;
        if (selectedBaseling >= 0 && selectedJob !== JOB_NONE) {
          assignJob(selectedBaseling, selectedJob);
        }
      }
    }
    // Arrows = MOVE/SELECT: L/R pick a baseling, U/D cycle the armed job.
    if (e.key === 'ArrowLeft') { cycleSelectedBaseling(-1); e.preventDefault(); }
    if (e.key === 'ArrowRight') { cycleSelectedBaseling(1); e.preventDefault(); }
    if (e.key === 'ArrowUp') { cycleSelectedJob(-1); e.preventDefault(); }
    if (e.key === 'ArrowDown') { cycleSelectedJob(1); e.preventDefault(); }
    // WASD = action cluster (face buttons).
    // W = assign armed job to selected baseling (primary). A = pause. S = speed. D = nuke.
    if (e.key === 'w' || e.key === 'W') {
      if (selectedBaseling >= 0 && selectedJob !== JOB_NONE && jobCounts[selectedJob] > 0) {
        assignJob(selectedBaseling, selectedJob);
      }
    }
    if (e.key === 'a' || e.key === 'A') gameSpeed = gameSpeed === 0 ? 1 : 0; // pause/play
    if (e.key === 's' || e.key === 'S') cycleGameSpeed();                    // speed step
    if (e.key === 'd' || e.key === 'D') doNuke();                            // nuke
    // Legacy keys (hidden alts).
    if (e.key === 'p' || e.key === 'P') gameSpeed = gameSpeed === 0 ? 1 : 0;
    if (e.key === '+' || e.key === '=') gameSpeed = Math.min(4, gameSpeed * 2 || 1);
    if (e.key === '-') gameSpeed = Math.max(0, gameSpeed / 2);
    if (e.key === 'n' || e.key === 'N') doNuke();
    if (e.key === 'Escape') {
      gameState = 'menu';
    }
  } else if (gameState === 'menu') {
    if (picking) return; // overlay open — swallow game input
    if (e.key === 'c' || e.key === 'C') {
      picking = true;
      BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (e.key === 'Enter') startLevel(0);
  } else if (gameState === 'levelComplete') {
    startLevel(currentLevel + 1);
  } else if (gameState === 'levelFail') {
    startLevel(currentLevel);
  }
});

// ============================================================
// GAME LOOP
// ============================================================
function update() {
  if (gameState !== 'playing' || gameSpeed === 0) return;

  for (var tick = 0; tick < gameSpeed; tick++) {
    frameCount++;
    levelTime++;

    // Combo timer
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer <= 0) comboCounter = 0;
    }

    // Tutorial timer
    if (tutorialTimer > 0) tutorialTimer--;

    // Spawn baselings
    if (spawnCount < totalToSpawn) {
      spawnTimer++;
      var rate = LEVELS[currentLevel].rate;
      // WIS: faster spawn rate at high wisdom
      rate = Math.max(5, Math.floor(rate * COOLDOWN_MULT));
      if (spawnTimer >= rate) {
        spawnTimer = 0;
        var nb = createBaseling(entranceX + 3, entranceY + 6);
        baselings.push(nb);
        spawnCount++;
        SFX.spawn();
      }
    }

    // Update all baselings
    for (var ui = 0; ui < baselings.length; ui++) {
      updateBaseling(baselings[ui]);
    }

    // Update effects
    updateParticles();
    updateScorePopups();
    updateShake();

    // Check win/lose
    var allDone = (savedCount + deadCount >= totalToSpawn) &&
                    baselings.every(function(b) { return !b.alive || b.exited; });
    if (allDone || (spawnCount >= totalToSpawn && baselings.every(function(b) { return !b.alive || b.exited; }))) {
      var lvl = LEVELS[currentLevel];
      // CHA: rescue bonus - need fewer saves
      var effectiveSave = Math.max(1, lvl.save - RESCUE_BONUS);
      if (savedCount >= effectiveSave) {
        gameState = 'levelComplete';
        SFX.levelWin();
        // Bonus points for excess saves
        var excessSaves = savedCount - effectiveSave;
        if (excessSaves > 0) {
          totalScore += excessSaves * Math.floor(50 * SCORE_MULT);
        }
        // INT: time bonus
        var timeBonus = Math.max(0, Math.floor((3600 - levelTime) / 60 * intMod));
        if (timeBonus > 0) {
          totalScore += timeBonus;
        }
      } else {
        gameState = 'levelFail';
        SFX.levelFail();
      }
      return;
    }
  }
}

// ============================================================
// RENDERING
// ============================================================

// Zone background colors
function getZoneBgColor() {
  switch(currentZone) {
    case ZONE_MYCELIAL: return '#1a1c2c';
    case ZONE_REACTOR: return '#1c1a2c';
    case ZONE_SPORE: return '#1a2c1c';
    case ZONE_DEEP: return '#18182c';
    case ZONE_LAVA: return '#2c1a1a';
    default: return '#1a1c2c';
  }
}

// Animated background elements (zone-specific)
function drawZoneBackground() {
  var s = PIXEL_SCALE * SCALE;

  if (currentZone === ZONE_MYCELIAL) {
    // Floating spore motes
    ctx.fillStyle = 'rgba(56,217,115,0.15)';
    for (var mi = 0; mi < 12; mi++) {
      var mx = ((frameCount * 0.2 + mi * 47) % WORLD_W);
      var my = ((Math.sin(frameCount * 0.01 + mi) * 20) + 40 + mi * 12) % WORLD_H;
      ctx.fillRect(mx * s + shakeX, my * s + shakeY, 2 * s, 2 * s);
    }
  } else if (currentZone === ZONE_REACTOR) {
    // Pulsing energy lines
    ctx.strokeStyle = 'rgba(255,100,50,0.08)';
    ctx.lineWidth = 1;
    for (var ri = 0; ri < 5; ri++) {
      var ry = 30 + ri * 35 + Math.sin(frameCount * 0.02 + ri) * 5;
      ctx.beginPath();
      ctx.moveTo(0, ry * s);
      ctx.lineTo(W, ry * s);
      ctx.stroke();
    }
  } else if (currentZone === ZONE_SPORE) {
    // Drifting spore particles
    ctx.fillStyle = 'rgba(150,255,80,0.1)';
    for (var si = 0; si < 8; si++) {
      var spx = ((frameCount * 0.15 + si * 83) % WORLD_W);
      var spy = ((frameCount * 0.08 + si * 37) % WORLD_H);
      ctx.fillRect(spx * s + shakeX, spy * s + shakeY, 3 * s, 3 * s);
    }
  } else if (currentZone === ZONE_DEEP) {
    // Dim crystal glints
    if (frameCount % 30 < 3) {
      var gx = (frameCount * 7 + 123) % WORLD_W;
      var gy = (frameCount * 13 + 67) % WORLD_H;
      ctx.fillStyle = 'rgba(150,150,255,0.2)';
      ctx.fillRect(gx * s + shakeX, gy * s + shakeY, s, s);
    }
  }
}

function draw() {
  var s = PIXEL_SCALE * SCALE;

  // Clear with zone bg color
  ctx.fillStyle = getZoneBgColor();
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'menu') {
    drawMenu();
    return;
  }

  // Zone-specific background
  drawZoneBackground();

  // Draw terrain
  if (terrainDirty) renderTerrainToBuffer();
  if (terrainCanvas) ctx.drawImage(terrainCanvas, 0, 0, terrainCanvas.width, terrainCanvas.height,
    shakeX, shakeY, W, H * (WORLD_H / (WORLD_H + 40)));

  // Draw entrance (spore hatch)
  ctx.fillStyle = '#f4b41b';
  ctx.fillRect((entranceX) * s + shakeX, (entranceY - 4) * s + shakeY, 10 * s, 4 * s);
  ctx.fillStyle = '#7a444a';
  ctx.fillRect((entranceX + 2) * s + shakeX, (entranceY - 3) * s + shakeY, 6 * s, 3 * s);
  // Spawn indicator
  if (spawnCount < totalToSpawn && frameCount % 30 < 15) {
    ctx.fillStyle = 'rgba(255,200,0,0.4)';
    ctx.fillRect((entranceX - 1) * s + shakeX, (entranceY - 5) * s + shakeY, 12 * s, 6 * s);
  }

  // Draw exit portal (LP pool with pulsing glow)
  var exitPulse = Math.sin(frameCount * 0.05) * 0.3 + 0.7;
  ctx.fillStyle = 'rgba(56, 217, 115, ' + (exitPulse * 0.2) + ')';
  ctx.fillRect((exitX - 3) * s + shakeX, (exitY - 3) * s + shakeY, 18 * s, 18 * s);
  ctx.fillStyle = 'rgba(56, 217, 115, ' + (exitPulse * 0.1) + ')';
  ctx.fillRect((exitX - 5) * s + shakeX, (exitY - 5) * s + shakeY, 22 * s, 22 * s);
  ctx.strokeStyle = 'rgba(56, 217, 115, ' + exitPulse + ')';
  ctx.lineWidth = 2;
  ctx.strokeRect(exitX * s + shakeX, exitY * s + shakeY, 12 * s, 12 * s);
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold ' + Math.floor(5 * s) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LP', (exitX + 6) * s + shakeX, (exitY + 7) * s + shakeY);
  ctx.textAlign = 'left';

  // Draw baselings
  for (var di = 0; di < baselings.length; di++) {
    drawBaseling(baselings[di]);
  }

  // Draw particles and score popups
  drawParticles();
  drawScorePopups();

  // Draw cursor highlight
  if (gameState === 'playing' && selectedJob !== JOB_NONE) {
    ctx.strokeStyle = JOB_COLORS[selectedJob];
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
    ctx.beginPath();
    ctx.arc(mouseX * s, mouseY * s, 8 * s, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Tutorial overlay
  if (tutorialTimer > 0 && tutorialText) {
    var tutAlpha = Math.min(1, tutorialTimer / 60);
    ctx.fillStyle = 'rgba(0,0,0,' + (tutAlpha * 0.7) + ')';
    ctx.fillRect(20 * s, 10 * s, (WORLD_W - 40) * s, 30 * s);
    ctx.strokeStyle = 'rgba(168,85,247,' + tutAlpha + ')';
    ctx.lineWidth = 1;
    ctx.strokeRect(20 * s, 10 * s, (WORLD_W - 40) * s, 30 * s);
    ctx.fillStyle = 'rgba(255,255,255,' + tutAlpha + ')';
    ctx.font = Math.floor(3.5 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(tutorialText, (WORLD_W / 2) * s, 28 * s);
    ctx.textAlign = 'left';
  }

  // Boss warning flash
  if (LEVELS[currentLevel].boss && levelTime < 120 && levelTime % 20 < 10) {
    ctx.fillStyle = 'rgba(255,0,0,0.1)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold ' + Math.floor(6 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BOSS LEVEL', (WORLD_W / 2) * s, 20 * s);
    ctx.textAlign = 'left';
  }

  // Draw UI panel
  drawPanel();

  // Persistent controls legend (desktop only — the title legend is hidden behind the NFT gate)
  drawControlsLegend();

  // Draw level results
  if (gameState === 'levelComplete') drawResultScreen(true);
  if (gameState === 'levelFail') drawResultScreen(false);
}

// Faint always-on control strip across the top of the play area (keyboard players).
function drawControlsLegend() {
  if ('ontouchstart' in window) return; // mobile uses touch buttons; no strip
  var s = PIXEL_SCALE * SCALE;
  // Brighter on level 1 to teach, faint afterwards.
  var bright = currentLevel === 0 ? 0.85 : 0.4;
  ctx.save();
  ctx.fillStyle = 'rgba(10,10,21,0.45)';
  ctx.fillRect(0, 0, W, 7 * s);
  ctx.fillStyle = 'rgba(220,220,235,' + bright + ')';
  ctx.font = Math.floor(3 * s) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS ←→ baseling  ↑↓ job   W assign  A pause  S speed  D nuke', (WORLD_W / 2) * s, 5 * s);
  ctx.textAlign = 'left';
  ctx.restore();
}

function drawMenu() {
  var s = PIXEL_SCALE * SCALE;
  // Art background
  var _artDrawn = false;
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H); _artDrawn = true; }
  }
  if (!_artDrawn) { ctx.fillStyle = '#1a1c2c'; ctx.fillRect(0, 0, W, H); }

  // Animated background spores
  ctx.fillStyle = 'rgba(168,85,247,0.08)';
  for (var mbi = 0; mbi < 20; mbi++) {
    var mbx = ((frameCount * 0.1 + mbi * 31) % WORLD_W);
    var mby = ((Math.sin(frameCount * 0.008 + mbi * 2.3) * 40) + 100) % (WORLD_H + 40);
    ctx.fillRect(mbx * s, mby * s, 2 * s, 2 * s);
  }

  // Title with glow
  ctx.shadowColor = '#a855f7';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold ' + Math.floor(12 * s) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE MARCH', (WORLD_W / 2) * s, 25 * s);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#38d973';
  ctx.font = Math.floor(3.5 * s) + 'px monospace';
  ctx.fillText('Guide your Baselings to the Garden Pool!', (WORLD_W / 2) * s, 36 * s);

  // Selected baseling preview (idle bob) — falls back to a procedural mascot for Wimmple.
  var my = 44;
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (!drawSelectedBaseling(ctx, (WORLD_W / 2) * s, (my + 4) * s, 9 * s, { anim: 'idle', frame: titleFrame })) {
    var mx = WORLD_W / 2 - 2;

    ctx.fillStyle = statB.color;
    ctx.fillRect((mx + 1) * s, (my - 1) * s, 2 * s, s);
    if (mascotFrame === 0) { ctx.fillRect((mx + 2) * s, (my - 2) * s, s, s); }
    else { ctx.fillRect((mx + 1) * s, (my - 2) * s, s, s); }
  }

  // Selected baseling name (Base-blue) + 5 stat bars in their canonical colors.
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold ' + Math.floor(3 * s) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), (WORLD_W / 2) * s, (my + 13) * s);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bw = 22, _x0 = WORLD_W / 2 - _bw * 2.5;
    ctx.font = Math.floor(2.4 * s) + 'px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * _bw;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx * s, (my + 18) * s);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx * s, (my + 19) * s, _bw * 0.8 * s, 2.5 * s);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx * s, (my + 19) * s, _bw * 0.8 * Math.max(0.04, Math.min(1, _v / 200)) * s, 2.5 * s);
    }
    ctx.textAlign = 'center';
  }

  // Zone labels
  ctx.fillStyle = '#aaa';
  ctx.font = Math.floor(3 * s) + 'px monospace';
  ctx.fillText('Select Level:', (WORLD_W / 2) * s, 78 * s);

  // Level select grid
  var btnW = 36, btnH = 18, cols = 5, padding = 6;
  var startX = (WORLD_W - (cols * (btnW + padding) - padding)) / 2;
  var startY = 82;

  var zoneColors = ['#38d973', '#e6482e', '#a855f7', '#3cacd7', '#f4b41b'];
  var zoneNames = ['Mycelial', 'Reactor', 'Spore', 'Deep', 'Bonus'];

  for (var li = 0; li < LEVELS.length; li++) {
    var col = li % cols;
    var row = Math.floor(li / cols);
    var lbx = startX + col * (btnW + padding);
    var lby = startY + row * (btnH + padding);

    var lvlZone = LEVELS[li].zone || 0;
    var zoneClr = zoneColors[lvlZone] || '#44aa66';
    if (li >= 20) zoneClr = '#f4b41b';

    var hover = mouseX >= lbx && mouseX <= lbx + btnW && mouseY >= lby && mouseY <= lby + btnH;
    ctx.fillStyle = hover ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.3)';
    ctx.fillRect(lbx * s, lby * s, btnW * s, btnH * s);
    ctx.strokeStyle = zoneClr;
    ctx.lineWidth = LEVELS[li].boss ? 2 : 1;

    if (LEVELS[li].boss) {

      ctx.fillRect(lbx * s, lby * s, btnW * s, btnH * s);
    }

    ctx.fillStyle = zoneClr;
    ctx.font = Math.floor(3.5 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText((li + 1) + '', (lbx + btnW / 2) * s, (lby + 7) * s);

    ctx.fillStyle = '#888';
    ctx.font = Math.floor(2.2 * s) + 'px monospace';
    var nameStr = LEVELS[li].name;
    if (nameStr.length > 10) nameStr = nameStr.slice(0, 9) + '.';
    ctx.fillText(nameStr, (lbx + btnW / 2) * s, (lby + 13) * s);

    if (LEVELS[li].boss) {
      ctx.fillStyle = '#e6482e';
      ctx.font = Math.floor(1.8 * s) + 'px monospace';

  // Retro-style controls help
  ctx.fillStyle = '#444';
  ctx.font = Math.floor(2.8 * s) + 'px monospace';
  ctx.textAlign = 'center';
  var controlY = 210;
  ctx.fillText('ARROWS ←→ pick baseling  ↑↓ pick job   W assign  A pause  S speed  D nuke', (WORLD_W / 2) * s, controlY * s);

}

function drawPanel() {
  var s = PIXEL_SCALE * SCALE;
  var panelTop = WORLD_H * s;

  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, panelTop, W, 40 * s);
  ctx.strokeStyle = '#2e2e42';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, panelTop);
  ctx.lineTo(W, panelTop);
  ctx.stroke();

  var btnW = 30;
  var btnH = 18;
  var startX = 5;
  var startY = WORLD_H + 5;

  for (var pi = 1; pi <= 7; pi++) {
    var pbx = startX + (pi - 1) * (btnW + 4);
    var pby = startY;
    var count = jobCounts[pi] || 0;
    var active = selectedJob === pi;

    ctx.fillStyle = active ? JOB_COLORS[pi] : (count > 0 ? '#1e1e2e' : '#121218');
    ctx.fillRect(pbx * s, pby * s, btnW * s, btnH * s);
    ctx.strokeStyle = count > 0 ? JOB_COLORS[pi] : '#2a2a3a';
    ctx.lineWidth = active ? 2 : 1;
    ctx.strokeRect(pbx * s, pby * s, btnW * s, btnH * s);

    ctx.fillStyle = active ? '#000' : (count > 0 ? '#ddd' : '#444');
    ctx.font = Math.floor(3 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(JOB_NAMES[pi].slice(0, 4), (pbx + btnW / 2) * s, (pby + 8) * s);

    ctx.fillStyle = active ? '#000' : '#aaa';
    ctx.font = Math.floor(3 * s) + 'px monospace';
    ctx.fillText(count + '', (pbx + btnW / 2) * s, (pby + 15) * s);
  }

  // Speed buttons
  var speedBtns = [0, 1, 2, 4];
  var speedLabels = ['||', '>', '>>', '>>>'];
  var speedStartX = 250;
  for (var spi = 0; spi < 4; spi++) {
    var spbx = speedStartX + spi * 18;
    var spby = startY;
    var spActive = gameSpeed === speedBtns[spi];
    ctx.fillStyle = spActive ? '#38d973' : '#1e1e2e';
    ctx.fillRect(spbx * s, spby * s, 16 * s, btnH * s);
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 1;
    ctx.strokeRect(spbx * s, spby * s, 16 * s, btnH * s);
    ctx.fillStyle = spActive ? '#000' : '#aaa';
    ctx.font = Math.floor(3 * s) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(speedLabels[spi], (spbx + 8) * s, (spby + 11) * s);
  }

  // Nuke button
  ctx.fillStyle = nukeActive ? '#3a1a1a' : '#2c1a1a';
  ctx.fillRect(250 * s, (startY + 20) * s, 30 * s, 12 * s);
  ctx.strokeStyle = nukeActive ? '#7a444a' : '#e6482e';
  ctx.lineWidth = 1;
  ctx.strokeRect(250 * s, (startY + 20) * s, 30 * s, 12 * s);
  ctx.fillStyle = nukeActive ? '#666' : '#e6482e';
  ctx.font = Math.floor(3 * s) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('NUKE', 265 * s, (startY + 28) * s);

  // Stats display
  ctx.textAlign = 'left';
  var lvl = LEVELS[currentLevel];
  var statsY = startY + 22;

  // Level name with zone color
  var zoneColors2 = ['#38d973', '#e6482e', '#a855f7', '#3cacd7', '#f4b41b'];
  ctx.fillStyle = zoneColors2[currentZone] || '#00ffcc';
  ctx.font = Math.floor(3.5 * s) + 'px monospace';
  ctx.fillText('Lv' + (currentLevel + 1) + ': ' + lvl.name, 5 * s, statsY * s);

  // CHA: show effective save requirement
  var effectiveSave = Math.max(1, lvl.save - RESCUE_BONUS);
  ctx.fillStyle = savedCount >= effectiveSave ? '#88ff88' : '#88ff88';
  ctx.fillText('Saved: ' + savedCount + '/' + effectiveSave, 5 * s, (statsY + 10) * s);
  ctx.fillStyle = '#ff8888';
  ctx.fillText('Dead: ' + deadCount, 80 * s, (statsY + 10) * s);
  ctx.fillStyle = '#aaaaaa';
  ctx.fillText('Out: ' + spawnCount + '/' + totalToSpawn, 140 * s, (statsY + 10) * s);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText(totalScore + 'pts', 200 * s, (statsY + 10) * s);

  ctx.textAlign = 'left';
}

function drawResultScreen(won) {
  var s = PIXEL_SCALE * SCALE;
  // Art background
  var _goArt = false;
  if (!won && window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); _goArt = true; }

  if (!_goArt) { ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H); }

  ctx.textAlign = 'center';

    ctx.shadowColor = '#38d973';

    ctx.fillStyle = '#38d973';
    ctx.font = 'bold ' + Math.floor(10 * s) + 'px monospace';

    ctx.fillStyle = '#f4b41b';

    if (luckyCount > 0) {
      ctx.fillStyle = '#f4b41b';

      ctx.fillText('Lucky saves: ' + luckyCount + ' (CHA ' + statB.cha + ')', rcx, 120 * s);
    }

    // Stat contributions summary
    ctx.fillStyle = '#666';
    ctx.font = Math.floor(2.8 * s) + 'px monospace';
    var statLine = '';
    if (strMod > 0) statLine += 'STR+' + strMod + ' ';
    if (dexMod > 0) statLine += 'DEX+' + dexMod + ' ';
    if (conMod > 0) statLine += 'CON+' + conMod + ' ';
    if (intMod > 0) statLine += 'INT+' + intMod + ' ';
    if (wisMod > 0) statLine += 'WIS+' + wisMod + ' ';
    if (chaMod > 0) statLine += 'CHA+' + chaMod + ' ';
    if (statLine) ctx.fillText('Bonuses: ' + statLine, rcx, 132 * s);

    ctx.fillStyle = '#aaa';
    ctx.font = Math.floor(4 * s) + 'px monospace';
    ctx.fillText('Click to continue', rcx, 150 * s);
  } else {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold ' + Math.floor(10 * s) + 'px monospace';
    ctx.fillText('LEVEL FAILED', rcx, 60 * s);

    ctx.fillStyle = '#ff8888';
    ctx.font = Math.floor(5 * s) + 'px monospace';
    var effectiveSave3 = Math.max(1, LEVELS[currentLevel].save - RESCUE_BONUS);
    ctx.fillText('Saved ' + savedCount + ' / ' + effectiveSave3 + ' needed', rcx, 90 * s);

    ctx.fillStyle = '#888';
    ctx.font = Math.floor(3.5 * s) + 'px monospace';
    ctx.fillText('Score: ' + totalScore, rcx, 108 * s);

    ctx.fillStyle = '#aaa';

    ctx.fillText('Click to retry', rcx, 140 * s);

var lastTime = 0;
var titleFrame = 0; // always-incrementing clock for menu/title baseling animation
function loop(ts) {
  var dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  titleFrame++;

  update();
  draw();

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
