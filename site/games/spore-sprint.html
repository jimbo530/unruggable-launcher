// ============================================================
// TERRAIN COLLISION
// ============================================================
function getTerrainY(px) {
  for (var i = 0; i < terrain.segments.length; i++) {
    var seg = terrain.segments[i];
    if (px >= seg.x1 && px < seg.x2) {
      var t = (px - seg.x1) / (seg.x2 - seg.x1);
      return seg.y1 + (seg.y2 - seg.y1) * t;
    }
  }
  return 400;
}

function getTerrainAngle(px) {
  for (var i = 0; i < terrain.segments.length; i++) {
    var seg = terrain.segments[i];
    if (px >= seg.x1 && px < seg.x2) {
      return Math.atan2(seg.y2 - seg.y1, seg.x2 - seg.x1);
    }
  }
  return 0;
}

function getTerrainType(px) {
  for (var i = 0; i < terrain.segments.length; i++) {
    var seg = terrain.segments[i];
    if (px >= seg.x1 && px < seg.x2) return seg.type;
  }
  return 'gap';
}

function isOverGap(px) {
  for (var i = 0; i < terrain.segments.length; i++) {
    var seg = terrain.segments[i];
    if (px >= seg.x1 && px < seg.x2) return false;
  }
  return true;
}

// ============================================================
// PLAYER PHYSICS (PASS 1 - stat wired, PASS 2 - hazard effects)
// ============================================================
function updatePlayer() {
  if (player.dead) return;

  // Trapped by Mycelial Trap - mash to escape
  if (player.trapped) {
    if (inputJump() || inputLeft() || inputRight()) {
      player.trapMash++;
    }
    if (player.trapMash > 15) {
      player.trapped = false;
      player.trapMash = 0;
      SFX.trapBreak();
      spawnParticles(player.x, player.y, '#44aa22', 8, 3);
    }
    return;
  }

  var onGround = player.grounded;
  var angle = player.grounded ? getTerrainAngle(player.x) : 0;
  var slopeX = Math.sin(angle) * SLOPE_FACTOR;
  var terrType = getTerrainType(player.x);

  // Goo Pool slowdown (PASS 2)
  var gooSlow = 1;
  if (terrType === 'goo_pool' && onGround) {
    gooSlow = 0.4;
    if (timer % 30 === 0) SFX.goo();
  }

  // Reactor Zone speed boost (PASS 2)
  var reactorPad = 1;
  if (terrType === 'reactor_zone' && onGround) {
    reactorPad = 1.6;
    if (timer % 8 === 0) spawnTrail(player.x, player.y + PLAYER_R, '#44ff44');
  }

  // Reactor Boost active (PASS 2)
  if (player.reactorBoostTimer > 0) {
    player.reactorBoostTimer--;
    reactorPad = Math.max(reactorPad, 1.4);
    if (timer % 4 === 0) spawnTrail(player.x - Math.sign(player.vx) * 10, player.y, '#ff6600');
  }

  // Spore blind timer
  if (player.sporeBlindTimer > 0) player.sporeBlindTimer--;

  // Horizontal movement
  var accelMod = gooSlow * reactorPad;
  if (inputLeft()) {
    if (player.vx > 0 && onGround) player.vx -= DECEL * 3;
    player.vx -= ACCEL * (player.rolling ? 0.5 : 1) * accelMod;
  } else if (inputRight()) {
    if (player.vx < 0 && onGround) player.vx += DECEL * 3;
    player.vx += ACCEL * (player.rolling ? 0.5 : 1) * accelMod;
  } else if (onGround) {
    if (Math.abs(player.vx) < DECEL) player.vx = 0;
    else player.vx -= Math.sign(player.vx) * DECEL;
  }

  // Slope physics
  if (onGround) {
    player.vx += slopeX * Math.abs(player.vx + 1);
  }

  // Rolling / Spin dash charge (WIS speeds charge)
  if (inputDown() && onGround && Math.abs(player.vx) > 1) {
    if (!player.rolling) {
      player.rolling = true;
      player.vx *= ROLL_BOOST;
      if (timer % 10 === 0) SFX.roll();
    }
  } else if (inputDown() && onGround && Math.abs(player.vx) <= 1) {
    // Spin dash charge (PASS 1 - WIS)
    player.spinCharging = true;
    player.spinCharge = Math.min(player.spinCharge + 0.5 * STAT_WIS_CHARGE, MAX_SPEED * 1.2);
    player.spinAngle += 0.5;
    if (timer % 6 === 0) SFX.roll();
  } else {
    if (player.spinCharging && player.spinCharge > 2) {
      // Release spin dash
      player.vx = (inputLeft() ? -1 : 1) * player.spinCharge;
      player.rolling = true;
      SFX.spin();
      spawnParticles(player.x, player.y, statB.color, 8, 4);
    }
    player.spinCharging = false;
    player.spinCharge = 0;
    if (!inputDown() || !onGround || Math.abs(player.vx) < 0.5) {
      player.rolling = false;
    }
  }

  // Speed cap (with goo and reactor mods)
  var maxSpd = (player.rolling ? MAX_SPEED * 1.3 : MAX_SPEED) * gooSlow * reactorPad;
  player.vx = Math.max(-maxSpd, Math.min(maxSpd, player.vx));

  // Jump
  if (inputJump() && onGround && !player.spinCharging) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    player.jumpHold = JUMP_HOLD_TIME;
    player.spinning = true;
    SFX.jump();
  }

  // Variable jump height
  if (inputJump() && player.jumpHold > 0) {
    player.vy += JUMP_HOLD_FORCE;
    player.jumpHold--;
  }
  if (!inputJump()) player.jumpHold = 0;

  // Gravity
  if (!player.grounded) {
    player.vy += GRAVITY;
    if (player.vy > 15) player.vy = 15;
  }

  // Apply velocity
  player.x += player.vx;
  player.y += player.vy;

  // Terrain collision
  var groundY = getTerrainY(player.x);
  if (player.y >= groundY - PLAYER_R && !isOverGap(player.x)) {
    if (player.vy >= 0) {
      player.y = groundY - PLAYER_R;
      player.vy = 0;
      player.grounded = true;
      player.spinning = false;
      player.angle = getTerrainAngle(player.x);
    }
  } else {
    player.grounded = false;
  }

  // Death pit
  if (player.y > 400) {
    killPlayer();
  }

  // Don't go left of start
  if (player.x < 20) { player.x = 20; player.vx = 0; }

  // Speed tracking
  player.speed = Math.abs(player.vx);

  // Animation
  player.legPhase += player.speed * 0.3;
  if (player.rolling || player.spinning) {
    player.spinAngle += player.speed * 0.3 + 0.1;
  }

  // Invulnerability countdown
  if (player.invuln > 0) player.invuln--;

  // Speed trail (PASS 3 - uses statB color)
  if (player.speed > 6) {
    spawnTrail(player.x - Math.sign(player.vx) * PLAYER_R, player.y, statB.color);
  }
  if (player.speed > 10) {
    spawnTrail(player.x - Math.sign(player.vx) * PLAYER_R * 0.5, player.y - 5, '#88ff44');
  }

  // Speed lines when fast (PASS 3 - more dramatic)
  if (player.speed > 8 && timer % 3 === 0) {
    speedLines.push({
      x: player.x + (Math.random() - 0.5) * VIEW_W,
      y: player.y + (Math.random() - 0.5) * VIEW_H * 0.6,
      life: 1, len: 20 + player.speed * 4
    });
  }
  // Extra speed lines at very high velocity (PASS 3)
  if (player.speed > 12 && timer % 2 === 0) {
    speedLines.push({
      x: player.x + (Math.random() - 0.5) * VIEW_W * 0.8,
      y: player.y + (Math.random() - 0.5) * VIEW_H * 0.4,
      life: 1.2, len: 40 + player.speed * 5
    });
  }
}

// ============================================================
// RING & OBJECT COLLISION (PASS 1 stats, PASS 2 new items)
// ============================================================
function updateObjects() {
  // Rings
  for (var ri = 0; ri < objects.rings.length; ri++) {
    var ring = objects.rings[ri];
    if (ring.collected) continue;
    var dx = player.x - ring.x;
    var dy = player.y - ring.y;
    if (dx * dx + dy * dy < 900) {
      ring.collected = true;
      player.rings++;
      score += Math.floor(10 * STAT_INT_SCORE);
      SFX.ring();
      spawnRingSparkle(ring.x, ring.y);
    }
  }

  // Scattered rings (recollectable)
  for (var si = scatteredRings.length - 1; si >= 0; si--) {
    var sr = scatteredRings[si];
    sr.x += sr.vx;
    sr.y += sr.vy;
    sr.vy += 0.3;
    sr.life--;
    var gy = getTerrainY(sr.x);
    if (sr.y > gy - 8) {
      sr.y = gy - 8;
      sr.vy = -Math.abs(sr.vy) * 0.5;
      sr.vx *= 0.8;
    }
    if (sr.life > RING_SCATTER_TIME * 0.3) {
      var sdx = player.x - sr.x;
      var sdy = player.y - sr.y;
      if (sdx * sdx + sdy * sdy < 900) {
        player.rings++;
        score += Math.floor(10 * STAT_INT_SCORE);
        SFX.ring();
        scatteredRings.splice(si, 1);
        continue;
      }
    }
    if (sr.life <= 0) scatteredRings.splice(si, 1);
  }

  // Enemies (PASS 2 - new types)
  for (var ei = 0; ei < objects.enemies.length; ei++) {
    var enemy = objects.enemies[ei];
    if (!enemy.alive) continue;

    // Movement by type
    if (enemy.type === 'walker') {
      enemy.x += enemy.dir * 1;
      if (Math.abs(enemy.x - enemy.startX) > enemy.range) enemy.dir *= -1;
    } else if (enemy.type === 'flyer') {
      enemy.x += enemy.dir * 0.8;
      enemy.bobPhase += 0.05;
      enemy.y = enemy.y + Math.sin(enemy.bobPhase) * 0.5;
      if (Math.abs(enemy.x - enemy.startX) > enemy.range) enemy.dir *= -1;
    } else if (enemy.type === 'reactor_bot') {
      // Chases player, explodes on proximity
      var rbdx = player.x - enemy.x;
      var rbdy = player.y - enemy.y;
      var rbdist = Math.sqrt(rbdx * rbdx + rbdy * rbdy);
      if (rbdist < 200) {
        enemy.x += (rbdx > 0 ? 1 : -1) * enemy.chaseSpeed;
        if (rbdist < 50 && enemy.explodeTimer < 0) {
          enemy.explodeTimer = 40;
        }
      } else {
        enemy.x += enemy.dir * 0.5;
        if (Math.abs(enemy.x - enemy.startX) > enemy.range) enemy.dir *= -1;
      }
      if (enemy.explodeTimer > 0) {
        enemy.explodeTimer--;
        if (enemy.explodeTimer <= 0) {
          // Explode
          enemy.alive = false;
          SFX.explosion();
          spawnKillBurst(enemy.x, enemy.y, '#ff6600');
          shakeTimer = 6;
          shakeIntensity = 4;
          var exdx = player.x - enemy.x;
          var exdy = player.y - enemy.y;
          if (exdx * exdx + exdy * exdy < 3600 && player.invuln <= 0) {
            hurtPlayer();
          }
        }
      }
    } else if (enemy.type === 'mycelial_trap') {
      // Stationary, extends vine to grab
      enemy.bobPhase += 0.03;
      var mtdx = player.x - enemy.x;
      var mtdy = player.y - enemy.y;
      var mtdist = Math.sqrt(mtdx * mtdx + mtdy * mtdy);
      if (mtdist < 60 && !enemy.grabbing && !player.spinning && !player.rolling) {
        enemy.grabbing = true;
        enemy.vineExtend = 0;
      }
      if (enemy.grabbing) {
        enemy.vineExtend = Math.min(enemy.vineExtend + 2, 60);
        if (mtdist < enemy.vineExtend && !player.trapped && !player.spinning && !player.rolling && player.invuln <= 0) {
          player.trapped = true;
          player.trapMash = 0;
          player.vx = 0;
          player.vy = 0;
          SFX.trapGrab();
        }
        enemy.grabTimer++;
        if (enemy.grabTimer > 120) {
          enemy.grabbing = false;
          enemy.grabTimer = 0;
          enemy.vineExtend = 0;
        }
      }
    } else if (enemy.type === 'spore_turret') {
      // Stationary, shoots projectiles
      enemy.shootTimer--;
      if (enemy.shootTimer <= 0) {
        enemy.shootTimer = 80 + Math.floor(Math.random() * 40);
        var stAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.projectiles.push({
          x: enemy.x, y: enemy.y,
          vx: Math.cos(stAngle) * 3, vy: Math.sin(stAngle) * 3,
          life: 120
        });
      }
      // Update projectiles
      for (var pi = enemy.projectiles.length - 1; pi >= 0; pi--) {
        var proj = enemy.projectiles[pi];
        proj.x += proj.vx;
        proj.y += proj.vy;
        proj.life--;
        if (proj.life <= 0) { enemy.projectiles.splice(pi, 1); continue; }
        var pdx = player.x - proj.x;
        var pdy = player.y - proj.y;
        if (pdx * pdx + pdy * pdy < 400 && player.invuln <= 0) {
          if (player.spinning || player.rolling) {
            enemy.projectiles.splice(pi, 1);
            score += Math.floor(25 * STAT_INT_SCORE);
            spawnParticles(proj.x, proj.y, '#88ff44', 4, 2);
          } else {
            hurtPlayer();
            enemy.projectiles.splice(pi, 1);
          }
        }
      }
    }

    // Player collision with enemy body (skip turrets/traps for body hit - different mechanic)
    if (enemy.type !== 'spore_turret' && enemy.type !== 'mycelial_trap') {
      var edx = player.x - enemy.x;
      var edy = player.y - enemy.y;
      var edist = Math.sqrt(edx * edx + edy * edy);
      if (edist < PLAYER_R + 18) {
        if ((player.spinning || player.rolling) || (player.vy > 0 && player.y < enemy.y)) {
          enemy.alive = false;
          player.vy = -8;
          score += Math.floor(100 * STAT_INT_SCORE);
          SFX.destroy();
          spawnKillBurst(enemy.x, enemy.y, '#ff4444');
        } else if (player.invuln <= 0) {
          hurtPlayer();
        }
      }
    }
    // Turret/trap can be killed by spinning into them
    if (enemy.type === 'spore_turret' || enemy.type === 'mycelial_trap') {
      var tdx = player.x - enemy.x;
      var tdy = player.y - enemy.y;
      var tdist = Math.sqrt(tdx * tdx + tdy * tdy);
      if (tdist < PLAYER_R + 18 && (player.spinning || player.rolling)) {
        enemy.alive = false;
        if (enemy.type === 'mycelial_trap' && player.trapped) {
          player.trapped = false;
          player.trapMash = 0;
        }
        player.vy = -6;
        score += Math.floor(150 * STAT_INT_SCORE);
        SFX.destroy();
        spawnKillBurst(enemy.x, enemy.y, enemy.type === 'spore_turret' ? '#88ff44' : '#44aa22');
      }
    }
  }

  // Springs
  for (var spi = 0; spi < objects.springs.length; spi++) {
    var spring = objects.springs[spi];
    if (spring.compressed > 0) spring.compressed--;
    var spdx = player.x - spring.x;
    var spdy = player.y - (spring.y - 10);
    if (Math.abs(spdx) < 20 && Math.abs(spdy) < 20 && player.vy >= 0) {
      player.vy = SPRING_FORCE;
      player.grounded = false;
      player.spinning = true;
      spring.compressed = 15;
      SFX.spring();
      spawnParticles(spring.x, spring.y, '#ffff00', 6, 3);
    }
  }

  // Items (boosters + PASS 2 collectibles)
  for (var ii = 0; ii < objects.items.length; ii++) {
    var item = objects.items[ii];
    if (item.used) {
      if (item.type === 'booster') {
        item.resetTimer--;
        if (item.resetTimer <= 0) item.used = false;
      }
      continue;
    }

    var idx = player.x - item.x;
    var idy = player.y - item.y;
    var idist = Math.sqrt(idx * idx + idy * idy);

    if (item.type === 'booster' && idist < 24) {
      player.vx = Math.sign(player.vx || 1) * MAX_SPEED;
      item.used = true;
      item.resetTimer = 180;
      SFX.spin();
      spawnParticles(item.x, item.y, '#ff8800', 8, 5);
    } else if (item.type === 'lp_token' && idist < 28) {
      item.used = true;
      player.rings += 100;
      score += Math.floor(1000 * STAT_INT_SCORE);
      SFX.lpToken();
      spawnParticles(item.x, item.y, '#44ddff', 15, 5);
      flashAlpha = 0.15;
      flashColor = '#44ddff';
    } else if (item.type === 'myco_shield' && idist < 28) {
      item.used = true;
      player.hasShield = true;
      SFX.shield();
      spawnParticles(item.x, item.y, '#44ff88', 12, 4);
    } else if (item.type === 'reactor_boost' && idist < 28) {
      item.used = true;
      player.reactorBoostTimer = 600; // 10 seconds
      SFX.reactorBoost();
      spawnParticles(item.x, item.y, '#ff6600', 12, 5);
      flashAlpha = 0.1;
      flashColor = '#ff6600';
    }
  }

  // Hazards - Spore Clouds (PASS 2)
  for (var hi = 0; hi < objects.hazards.length; hi++) {
    var haz = objects.hazards[hi];
    if (haz.type === 'spore_cloud') {
      haz.phase += 0.02;
      var hdx = player.x - haz.x;
      var hdy = player.y - haz.y;
      if (hdx * hdx + hdy * hdy < haz.radius * haz.radius) {
        if (player.sporeBlindTimer <= 0) SFX.sporeCloud();
        player.sporeBlindTimer = 90;
      }
    }
  }

  // Signpost check (level end)
  if (!bossArena && player.x >= signpostX) {
    if (boss && !boss.defeated) {
      bossArena = true;
      boss.active = true;
      SFX.boss();
    } else {
      completeLevel();
    }
  }
}

// ============================================================
// BOSS LOGIC (PASS 1 - STR damage, PASS 2 - Tasern attacks)
// ============================================================
function updateBoss() {
  if (!boss || !boss.active || boss.defeated) return;

  boss.timer++;
  if (boss.invuln > 0) boss.invuln--;
  if (boss.flashTimer > 0) boss.flashTimer--;
  boss.attackTimer++;

  var px = player.x, py = player.y;

  switch (boss.pattern) {
    case 'bounce':
      boss.vy = (boss.vy || 0) + 0.3;
      boss.x += Math.sin(boss.timer * 0.03) * 2;
      boss.y += boss.vy;
      if (boss.y > 220) { boss.vy = -8 - Math.random() * 4; boss.y = 220; }
      break;
    case 'shoot':
      boss.x = signpostX + 150 + Math.sin(boss.timer * 0.02) * 80;
      boss.y = 120 + Math.sin(boss.timer * 0.03) * 40;
      break;
    case 'dive':
      if (boss.phase === 0) {
        boss.y = 80 + Math.sin(boss.timer * 0.04) * 20;
        boss.x += Math.sin(boss.timer * 0.02) * 1.5;
        if (boss.timer % 120 === 0) { boss.phase = 1; boss.vy = 6; }
      } else {
        boss.y += boss.vy;
        if (boss.y > 220) { boss.phase = 0; boss.vy = -3; boss.y = 220; }
      }
      break;
    case 'stomp':
      boss.x = signpostX + 100 + Math.sin(boss.timer * 0.015) * 100;
      if (boss.timer % 90 < 60) { boss.y = 100; }
      else { boss.y = 100 + (boss.timer % 90 - 60) * 8; }
      if (boss.timer % 90 === 89) { shakeTimer = 10; shakeIntensity = 4; }
      break;
    case 'chase':
      var chaseSpd = 2 + (1 - boss.hp / 10) * 2;
      boss.x += (px > boss.x ? chaseSpd : -chaseSpd);
      boss.y = 180 + Math.sin(boss.timer * 0.05) * 30;
      break;
    case 'multi':
      var phase3 = Math.floor(boss.timer / 150) % 3;
      if (phase3 === 0) {
        boss.x += Math.sin(boss.timer * 0.04) * 3;
        boss.y = 120;
      } else if (phase3 === 1) {
        boss.y += 3;
        if (boss.y > 230) boss.y = 80;
      } else {
        boss.x += (px > boss.x ? 3 : -3);
        boss.y = 160;
      }
      break;
  }

  // Tasern attack patterns (PASS 2)
  if (boss.attackTimer >= boss.attackCooldown) {
    boss.attackTimer = 0;
    switch (boss.tasernAttack) {
      case 'spore_burst':
        // Fungal Golem: radial spore projectiles
        for (var sbi = 0; sbi < 8; sbi++) {
          var sbAngle = (sbi / 8) * Math.PI * 2;
          boss.projectiles.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(sbAngle) * 2.5, vy: Math.sin(sbAngle) * 2.5,
            life: 90, color: '#88ff44'
          });
        }
        break;
      case 'reactor_beam':
        // Reactor Overlord: aimed beam
        var rbAngle = Math.atan2(py - boss.y, px - boss.x);
        for (var rbi = 0; rbi < 5; rbi++) {
          boss.projectiles.push({
            x: boss.x + Math.cos(rbAngle) * rbi * 15,
            y: boss.y + Math.sin(rbAngle) * rbi * 15,
            vx: Math.cos(rbAngle) * 4, vy: Math.sin(rbAngle) * 4,
            life: 60, color: '#ff6600'
          });
        }
        break;
      case 'vine_whip':
        // Mycelial Hydra: sweeping vine
        for (var vwi = 0; vwi < 6; vwi++) {
          var vwAngle = Math.atan2(py - boss.y, px - boss.x) + (vwi - 3) * 0.2;
          boss.projectiles.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(vwAngle) * (2 + vwi * 0.5), vy: Math.sin(vwAngle) * (2 + vwi * 0.5),
            life: 70, color: '#44ff88'
          });
        }
        break;
      case 'goo_rain':
        // Goo Colossus: falling goo blobs
        for (var gri = 0; gri < 5; gri++) {
          boss.projectiles.push({
            x: boss.x + (gri - 2) * 40, y: boss.y - 20,
            vx: (Math.random() - 0.5) * 2, vy: 3 + Math.random() * 2,
            life: 80, color: '#8866ff'
          });
        }
        break;
      case 'swarm_spawn':
        // Hive Queen: small swarmer projectiles
        for (var swi = 0; swi < 6; swi++) {
          boss.projectiles.push({
            x: boss.x, y: boss.y,
            vx: (Math.random() - 0.5) * 4, vy: -2 - Math.random() * 3,
            life: 120, color: '#ffcc00', homing: true
          });
        }
        break;
      case 'dark_pulse':
        // Namaris Shadow: expanding ring
        for (var dpi = 0; dpi < 16; dpi++) {
          var dpAngle = (dpi / 16) * Math.PI * 2;
          boss.projectiles.push({
            x: boss.x, y: boss.y,
            vx: Math.cos(dpAngle) * 3, vy: Math.sin(dpAngle) * 3,
            life: 80, color: '#aa44ff'
          });
        }
        shakeTimer = 6;
        shakeIntensity = 3;
        break;
    }
  }

  // Update boss projectiles
  for (var bpi = boss.projectiles.length - 1; bpi >= 0; bpi--) {
    var bp = boss.projectiles[bpi];
    if (bp.homing) {
      var hdx = px - bp.x;
      var hdy = py - bp.y;
      var ha = Math.atan2(hdy, hdx);
      bp.vx += Math.cos(ha) * 0.1;
      bp.vy += Math.sin(ha) * 0.1;
      var hspd = Math.sqrt(bp.vx * bp.vx + bp.vy * bp.vy);
      if (hspd > 3) { bp.vx = (bp.vx / hspd) * 3; bp.vy = (bp.vy / hspd) * 3; }
    }
    bp.x += bp.vx;
    bp.y += bp.vy;
    bp.life--;
    if (bp.life <= 0) { boss.projectiles.splice(bpi, 1); continue; }
    var bpdx = px - bp.x;
    var bpdy = py - bp.y;
    if (bpdx * bpdx + bpdy * bpdy < 400) {
      if (player.spinning || player.rolling) {
        boss.projectiles.splice(bpi, 1);
        score += Math.floor(25 * STAT_INT_SCORE);
        spawnParticles(bp.x, bp.y, bp.color, 4, 2);
      } else if (player.invuln <= 0) {
        hurtPlayer();
        boss.projectiles.splice(bpi, 1);
      }
    }
  }

  // Player hit boss (PASS 1 - STR affects damage)
  var bdx = px - boss.x;
  var bdy = py - boss.y;
  var bdist = Math.sqrt(bdx * bdx + bdy * bdy);
  if (bdist < PLAYER_R + boss.size) {
    if ((player.spinning || player.rolling) && boss.invuln <= 0) {
      var dmg = Math.max(1, Math.floor(STAT_STR_MULT));
      boss.hp -= dmg;
      boss.invuln = 60;
      boss.flashTimer = 30;
      player.vy = -10;
      SFX.destroy();
      shakeTimer = 8;
      shakeIntensity = 5;
      spawnParticles(boss.x, boss.y, boss.color, 12, 5);
      if (boss.hp <= 0) {
        boss.defeated = true;
        score += Math.floor(1000 * STAT_INT_SCORE);
        SFX.clear();
        spawnParticles(boss.x, boss.y, '#ffdd44', 30, 8);
        stateTimer = 120;
        state = 'bossDefeated';
      }
    } else if (player.invuln <= 0 && boss.invuln <= 0) {
      hurtPlayer();
    }
  }
}

// ============================================================
// DAMAGE & DEATH (PASS 1 - CON protection, PASS 2 - shield)
// ============================================================
function hurtPlayer() {
  if (player.invuln > 0) return;

  // Myco Shield absorbs one hit (PASS 2)
  if (player.hasShield) {
    player.hasShield = false;
    player.invuln = 60;
    SFX.hurt();
    spawnParticles(player.x, player.y, '#44ff88', 12, 4);
    flashAlpha = 0.2;
    flashColor = '#44ff88';
    return;
  }

  if (player.rings > 0) {
    SFX.hurt();
    // CON protection: keep some rings (PASS 1)
    var ringsToKeep = Math.min(player.rings, STAT_CON_PROTECT);
    var ringsToScatter = Math.min(player.rings - ringsToKeep, 20);
    for (var i = 0; i < ringsToScatter; i++) {
      var angle = (i / ringsToScatter) * Math.PI * 2;
      scatteredRings.push({
        x: player.x, y: player.y,
        vx: Math.cos(angle) * (3 + Math.random() * 3),
        vy: Math.sin(angle) * (3 + Math.random() * 3) - 4,
        life: RING_SCATTER_TIME
      });
    }
    player.rings = ringsToKeep;
    player.invuln = 90;
    flashAlpha = 0.3;
    flashColor = '#ff0000';
    shakeTimer = 8;
    shakeIntensity = 3;
  } else {
    killPlayer();
  }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  player.vy = JUMP_FORCE;
  player.lives--;
  SFX.die();
  flashAlpha = 0.5;
  flashColor = '#ff0000';
  shakeTimer = 15;
  shakeIntensity = 6;
  stateTimer = 90;
  state = 'dying';
}

function completeLevel() {
  state = 'levelComplete';
  stateTimer = 150;
  score += Math.floor(Math.max(0, 3000 - Math.floor(levelTime / 60) * 10) * STAT_INT_SCORE);
  SFX.clear();
  spawnParticles(player.x, player.y - 20, '#ffdd44', 20, 5);
}

// ============================================================
// CAMERA
// ============================================================
function updateCamera() {
  var lookAhead = player.vx * 8;
  camera.targetX = player.x - VIEW_W / 3 + lookAhead;
  camera.targetY = player.y - VIEW_H * 0.55;

  camera.x += (camera.targetX - camera.x) * 0.08;
  camera.y += (camera.targetY - camera.y) * 0.06;

  camera.x = Math.max(0, camera.x);
  camera.y = Math.max(0, Math.min(200, camera.y));

  if (shakeTimer > 0) {
    shakeTimer--;
    camera.x += (Math.random() - 0.5) * shakeIntensity;
    camera.y += (Math.random() - 0.5) * shakeIntensity;
  }
}

// ============================================================
// DRAWING (PASS 3 - enhanced visuals)
// ============================================================
function drawBackground(zone) {
  var z = ZONES[zone];
  // Sky gradient
  var grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0, z.sky);
  grad.addColorStop(1, z.dark);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Parallax layer 1 - distant clouds/elements
  var parallax1 = camera.x * 0.05;
  ctx.globalAlpha = 0.15;
  for (var i = 0; i < 6; i++) {
    var cx1 = ((i * 160 - parallax1) % (VIEW_W + 200)) - 100;
    var cy1 = 20 + i * 20 + Math.sin(timer * 0.005 + i) * 8;
    ctx.fillStyle = z.accent;
    ctx.beginPath();
    ctx.arc(Math.floor(cx1), Math.floor(cy1), 20 + i * 4, 0, Math.PI * 2);
    ctx.arc(Math.floor(cx1 + 25), Math.floor(cy1 - 5), 15 + i * 3, 0, Math.PI * 2);
    ctx.arc(Math.floor(cx1 - 18), Math.floor(cy1 + 3), 12 + i * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Parallax layer 2 - mid-ground clouds
  var parallax2 = camera.x * 0.1;
  ctx.globalAlpha = 0.25;
  for (var j = 0; j < 8; j++) {
    var cx2 = ((j * 120 - parallax2) % (VIEW_W + 100)) - 50;
    var cy2 = 40 + j * 15 + Math.sin(timer * 0.01 + j) * 5;
    ctx.fillStyle = z.accent;
    ctx.beginPath();
    ctx.arc(Math.floor(cx2), Math.floor(cy2), 15 + j * 3, 0, Math.PI * 2);
    ctx.arc(Math.floor(cx2 + 20), Math.floor(cy2 - 5), 12 + j * 2, 0, Math.PI * 2);
    ctx.arc(Math.floor(cx2 - 15), Math.floor(cy2 + 3), 10 + j * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Parallax layer 3 - background hills
  var hillParallax = camera.x * 0.3;
  ctx.fillStyle = z.dark;
  ctx.beginPath();
  ctx.moveTo(0, VIEW_H);
  for (var hx = 0; hx <= VIEW_W; hx += 20) {
    var hy = VIEW_H - 60 + Math.sin((hx + hillParallax) * 0.01) * 30 + Math.sin((hx + hillParallax) * 0.025) * 15;
    ctx.lineTo(hx, Math.floor(hy));
  }
  ctx.lineTo(VIEW_W, VIEW_H);
  ctx.closePath();
  ctx.fill();

  // Zone-specific background details (PASS 3)
  drawZoneBgDetails(zone, hillParallax);
}

function drawZoneBgDetails(zone, parallax) {
  ctx.globalAlpha = 0.2;
  if (zone === 0) {
    // Mushroom silhouettes
    for (var i = 0; i < 5; i++) {
      var mx = ((i * 110 - parallax * 0.5) % (VIEW_W + 80)) - 40;
      var my = VIEW_H - 80 + i * 5;
      ctx.fillStyle = '#1a5c1a';
      ctx.fillRect(Math.floor(mx - 2), Math.floor(my), 4, 20);
      ctx.beginPath();
      ctx.arc(Math.floor(mx), Math.floor(my), 10 + i * 2, Math.PI, 0);
      ctx.fill();
    }
  } else if (zone === 1) {
    // Reactor towers
    for (var ri = 0; ri < 4; ri++) {
      var rx = ((ri * 140 - parallax * 0.5) % (VIEW_W + 80)) - 40;
      var ry = VIEW_H - 100 + ri * 8;
      ctx.fillStyle = '#333344';
      ctx.fillRect(Math.floor(rx - 6), Math.floor(ry), 12, 40);
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(Math.floor(rx - 3), Math.floor(ry + 5), 6, 3);
      ctx.fillRect(Math.floor(rx - 3), Math.floor(ry + 15), 6, 3);
    }
  } else if (zone === 2) {
    // Hanging vines
    for (var vi = 0; vi < 8; vi++) {
      var vx = ((vi * 70 - parallax * 0.4) % (VIEW_W + 60)) - 30;
      ctx.strokeStyle = '#2a5a3a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(Math.floor(vx), 0);
      var vLen = 40 + vi * 10 + Math.sin(timer * 0.02 + vi) * 5;
      ctx.lineTo(Math.floor(vx + Math.sin(timer * 0.015 + vi) * 8), Math.floor(vLen));
      ctx.stroke();
    }
  } else if (zone === 3) {
    // Crystals
    for (var ci = 0; ci < 6; ci++) {
      var cxx = ((ci * 90 - parallax * 0.5) % (VIEW_W + 60)) - 30;
      var cyy = VIEW_H - 70 + ci * 6;
      ctx.fillStyle = '#4444aa';
      ctx.beginPath();
      ctx.moveTo(Math.floor(cxx), Math.floor(cyy));
      ctx.lineTo(Math.floor(cxx + 4), Math.floor(cyy - 15 - ci * 3));
      ctx.lineTo(Math.floor(cxx + 8), Math.floor(cyy));
      ctx.fill();
    }
  } else if (zone === 4) {
    // Hive hexagons
    for (var hi = 0; hi < 6; hi++) {
      var hhx = ((hi * 100 - parallax * 0.5) % (VIEW_W + 80)) - 40;
      var hhy = VIEW_H - 90 + hi * 10;
      ctx.strokeStyle = '#4a3a0a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (var hhi = 0; hhi < 6; hhi++) {
        var ha = (hhi / 6) * Math.PI * 2;
        var hpx = hhx + Math.cos(ha) * 12;
        var hpy = hhy + Math.sin(ha) * 12;
        if (hhi === 0) ctx.moveTo(Math.floor(hpx), Math.floor(hpy));
        else ctx.lineTo(Math.floor(hpx), Math.floor(hpy));
      }
      ctx.closePath();
      ctx.stroke();
    }
  } else if (zone === 5) {
    // Swirling darkness
    for (var di = 0; di < 5; di++) {
      var ddx = ((di * 100 - parallax * 0.3) % (VIEW_W + 80)) - 40;
      var ddy = 60 + di * 40;
      ctx.fillStyle = '#2a0a4a';
      ctx.beginPath();
      ctx.arc(Math.floor(ddx), Math.floor(ddy), 20 + Math.sin(timer * 0.03 + di) * 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawTerrain(cx, cy) {
  var z = ZONES[currentZone];

  // Draw filled terrain
  ctx.beginPath();
  var started = false;
  for (var ti = 0; ti < terrain.segments.length; ti++) {
    var seg = terrain.segments[ti];
    if (seg.x2 < cx - 50 || seg.x1 > cx + VIEW_W + 50) continue;
    var sx1 = Math.floor(seg.x1 - cx), sy1 = Math.floor(seg.y1 - cy);
    var sx2 = Math.floor(seg.x2 - cx), sy2 = Math.floor(seg.y2 - cy);

    // Color based on segment type
    if (seg.type === 'reactor_zone') {
      ctx.fillStyle = '#225522';
    } else if (seg.type === 'goo_pool') {
      ctx.fillStyle = '#3a2a5a';
    } else {
      ctx.fillStyle = z.ground;
    }

    if (!started) {
      ctx.moveTo(sx1, sy1);
      started = true;
    }
    ctx.lineTo(sx2, sy2);
  }
  if (started) {
    ctx.lineTo(VIEW_W + 50, VIEW_H + 50);
    ctx.lineTo(-50, VIEW_H + 50);
    ctx.closePath();
    ctx.fillStyle = z.ground;
    ctx.fill();
  }

  // Draw special terrain overlays
  for (var oi = 0; oi < terrain.segments.length; oi++) {
    var oseg = terrain.segments[oi];
    if (oseg.x2 < cx - 50 || oseg.x1 > cx + VIEW_W + 50) continue;
    var osx1 = Math.floor(oseg.x1 - cx), osy1 = Math.floor(oseg.y1 - cy);
    var osx2 = Math.floor(oseg.x2 - cx), osy2 = Math.floor(oseg.y2 - cy);

    if (oseg.type === 'reactor_zone') {
      // Green glowing pads
      ctx.fillStyle = '#44ff44';
      ctx.globalAlpha = 0.3 + Math.sin(timer * 0.1 + oi) * 0.1;
      ctx.fillRect(osx1, osy1 - 3, osx2 - osx1, 6);
      // Chevron arrows
      ctx.strokeStyle = '#88ff88';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.6;
      var chevX = osx1 + ((timer * 2 + oi * 20) % (osx2 - osx1));
      ctx.beginPath();
      ctx.moveTo(chevX - 4, osy1 - 4);
      ctx.lineTo(chevX, osy1);
      ctx.lineTo(chevX - 4, osy1 + 4);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (oseg.type === 'goo_pool') {
      // Purple bubbling goo
      ctx.fillStyle = '#6644aa';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(osx1, osy1 - 4, osx2 - osx1, 8);
      // Bubbles
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#8866cc';
      var bub1X = osx1 + ((timer + oi * 13) % (osx2 - osx1));
      var bub1Y = osy1 - 2 + Math.sin(timer * 0.1 + oi) * 3;
      ctx.beginPath();
      ctx.arc(bub1X, Math.floor(bub1Y), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Draw surface line with highlight
  ctx.strokeStyle = z.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  started = false;
  for (var si = 0; si < terrain.segments.length; si++) {
    var sseg = terrain.segments[si];
    if (sseg.x2 < cx - 50 || sseg.x1 > cx + VIEW_W + 50) continue;
    var ssx1 = Math.floor(sseg.x1 - cx), ssy1 = Math.floor(sseg.y1 - cy);
    var ssx2 = Math.floor(sseg.x2 - cx), ssy2 = Math.floor(sseg.y2 - cy);
    if (!started) { ctx.moveTo(ssx1, ssy1); started = true; }
    ctx.lineTo(ssx2, ssy2);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Terrain details
  for (var di = 0; di < terrain.segments.length; di += 3) {
    var dseg = terrain.segments[di];
    if (dseg.x1 < cx - 50 || dseg.x1 > cx + VIEW_W + 50) continue;
    var dsx = Math.floor(dseg.x1 - cx);
    var dsy = Math.floor(dseg.y1 - cy);
    if (currentZone === 0 || currentZone === 2) {
      // Grass/vine tufts
      ctx.strokeStyle = currentZone === 0 ? '#44dd44' : '#33cc88';
      ctx.lineWidth = 1;
      for (var g = 0; g < 3; g++) {
        var gx = dsx + g * 8 + (di * 7 % 10);
        ctx.beginPath();
        ctx.moveTo(gx, dsy);
        ctx.lineTo(gx - 2, dsy - 6 - (di % 4));
        ctx.moveTo(gx + 3, dsy);
        ctx.lineTo(gx + 5, dsy - 5 - (di % 3));
        ctx.stroke();
      }
    } else if (currentZone === 3) {
      // Crystal formations
      if (di % 9 === 0) {
        ctx.fillStyle = '#88ccff';
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.moveTo(dsx + 5, dsy);
        ctx.lineTo(dsx + 8, dsy - 12);
        ctx.lineTo(dsx + 11, dsy);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (currentZone === 4) {
      // Honeycomb patterns
      if (di % 6 === 0) {
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        for (var hhi = 0; hhi < 6; hhi++) {
          var ha = (hhi / 6) * Math.PI * 2;
          if (hhi === 0) ctx.moveTo(dsx + 6 + Math.cos(ha) * 6, dsy - 6 + Math.sin(ha) * 6);
          else ctx.lineTo(dsx + 6 + Math.cos(ha) * 6, dsy - 6 + Math.sin(ha) * 6);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawRings(cx, cy) {
  for (var ri = 0; ri < objects.rings.length; ri++) {
    var ring = objects.rings[ri];
    if (ring.collected) continue;
    if (ring.x < cx - 30 || ring.x > cx + VIEW_W + 30) continue;
    var rx = Math.floor(ring.x - cx), ry = Math.floor(ring.y - cy);

    var wobble = Math.abs(Math.sin(timer * 0.1 + ring.x * 0.01));
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.ellipse(rx, ry, Math.floor(8 * wobble), 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(rx, ry, Math.floor(8 * wobble), 8, 0, 0, Math.PI * 2);
    ctx.stroke();
    if (wobble > 0.3) {
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.ellipse(rx, ry, Math.floor(4 * wobble), 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Scattered rings
  for (var si = 0; si < scatteredRings.length; si++) {
    var sr = scatteredRings[si];
    if (sr.x < cx - 30 || sr.x > cx + VIEW_W + 30) continue;
    var srx = Math.floor(sr.x - cx), sry = Math.floor(sr.y - cy);
    ctx.globalAlpha = sr.life > 60 ? 1 : sr.life / 60;
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(srx, sry, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawEnemies(cx, cy) {
  for (var ei = 0; ei < objects.enemies.length; ei++) {
    var enemy = objects.enemies[ei];
    if (!enemy.alive) continue;
    if (enemy.x < cx - 60 || enemy.x > cx + VIEW_W + 60) continue;
    var ex = Math.floor(enemy.x - cx), ey = Math.floor(enemy.y - cy);

    if (enemy.type === 'walker') {
      // Corrupted token robot
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(ex - 12, ey - 12, 24, 24);
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(ex - 7, ey - 7, 5, 5);
      ctx.fillRect(ex + 2, ey - 7, 5, 5);
      ctx.fillStyle = '#882222';
      ctx.fillRect(ex - 8, ey + 12, 5, 6);
      ctx.fillRect(ex + 3, ey + 12, 5, 6);
      ctx.fillStyle = '#ff6666';
      ctx.beginPath();
      ctx.moveTo(ex - 12, ey - 12);
      ctx.lineTo(ex - 6, ey - 18);
      ctx.lineTo(ex, ey - 12);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex, ey - 12);
      ctx.lineTo(ex + 6, ey - 18);
      ctx.lineTo(ex + 12, ey - 12);
      ctx.fill();
    } else if (enemy.type === 'flyer') {
      // Flyer
      ctx.fillStyle = '#cc3333';
      ctx.beginPath();
      ctx.arc(ex, ey, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(ex - 5, ey - 4, 4, 4);
      ctx.fillRect(ex + 1, ey - 4, 4, 4);
      ctx.fillStyle = '#ff8888';
      var wingY = Math.sin(timer * 0.2 + enemy.bobPhase) * 3;
      ctx.beginPath();
      ctx.ellipse(ex - 16, ey + Math.floor(wingY), 8, 4, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(ex + 16, ey + Math.floor(wingY), 8, 4, 0.3, 0, Math.PI * 2);
      ctx.fill();
    } else if (enemy.type === 'reactor_bot') {
      // PASS 2: Reactor Bot - glowing orange chaser
      var rbFlash = enemy.explodeTimer > 0 && enemy.explodeTimer % 6 < 3;
      ctx.fillStyle = rbFlash ? '#ffff00' : '#ff6600';
      ctx.beginPath();
      ctx.arc(ex, ey, 12, 0, Math.PI * 2);
      ctx.fill();
      // Antenna
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ex, ey - 12);
      ctx.lineTo(ex, ey - 20);
      ctx.stroke();
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(ex, ey - 20, 3, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(ex - 5, ey - 4, 4, 4);
      ctx.fillRect(ex + 1, ey - 4, 4, 4);
      // Treads
      ctx.fillStyle = '#884400';
      ctx.fillRect(ex - 10, ey + 10, 8, 4);
      ctx.fillRect(ex + 2, ey + 10, 8, 4);
    } else if (enemy.type === 'mycelial_trap') {
      // PASS 2: Mycelial Trap - vine creature
      ctx.fillStyle = '#338833';
      ctx.beginPath();
      ctx.arc(ex, ey, 14, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(ex - 4, ey - 3, 3, 0, Math.PI * 2);
      ctx.arc(ex + 4, ey - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      // Vine tendrils
      ctx.strokeStyle = '#44aa44';
      ctx.lineWidth = 2;
      for (var vi = 0; vi < 4; vi++) {
        var va = (vi / 4) * Math.PI * 2 + Math.sin(timer * 0.03) * 0.3;
        var vlen = 15 + Math.sin(timer * 0.05 + vi) * 5;
        if (enemy.grabbing) vlen = enemy.vineExtend;
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(va) * 14, ey + Math.sin(va) * 14);
        ctx.lineTo(ex + Math.cos(va) * (14 + vlen), ey + Math.sin(va) * (14 + vlen));
        ctx.stroke();
      }
    } else if (enemy.type === 'spore_turret') {
      // PASS 2: Spore Turret - stationary shooter
      ctx.fillStyle = '#557755';
      ctx.fillRect(ex - 10, ey - 6, 20, 18);
      // Barrel
      var stAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
      ctx.strokeStyle = '#88aa88';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex + Math.cos(stAngle) * 18, ey + Math.sin(stAngle) * 18);
      ctx.stroke();
      // Eye
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(ex, ey - 2, 4, 0, Math.PI * 2);
      ctx.fill();
      // Draw projectiles
      for (var pi = 0; pi < enemy.projectiles.length; pi++) {
        var proj = enemy.projectiles[pi];
        var ppx = Math.floor(proj.x - cx), ppy = Math.floor(proj.y - cy);
        ctx.fillStyle = '#88ff44';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ccffcc';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function drawSprings(cx, cy) {
  for (var si = 0; si < objects.springs.length; si++) {
    var spring = objects.springs[si];
    if (spring.x < cx - 30 || spring.x > cx + VIEW_W + 30) continue;
    var sx = Math.floor(spring.x - cx), sy = Math.floor(spring.y - cy);
    var compressed = spring.compressed > 0;
    var h = compressed ? 8 : 20;

    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(sx - 12, sy - 4, 24, 4);
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (var ci = 0; ci < 4; ci++) {
      var coilY = sy - 4 - (ci / 4) * h;
      ctx.moveTo(sx - 8, coilY);
      ctx.lineTo(sx + 8, coilY - h / 8);
    }
    ctx.stroke();
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(sx - 10, sy - 4 - h, 20, 4);
  }

  // Speed boosters
  for (var bi = 0; bi < objects.items.length; bi++) {
    var item = objects.items[bi];
    if (item.x < cx - 30 || item.x > cx + VIEW_W + 30) continue;
    var ix = Math.floor(item.x - cx), iy = Math.floor(item.y - cy);

    if (item.type === 'booster') {
      if (item.used) ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.moveTo(ix - 15, iy + 5);
      ctx.lineTo(ix + 10, iy + 5);
      ctx.lineTo(ix + 15, iy);
      ctx.lineTo(ix + 10, iy - 5);
      ctx.lineTo(ix - 15, iy - 5);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ix - 5, iy - 3);
      ctx.lineTo(ix, iy);
      ctx.lineTo(ix - 5, iy + 3);
      ctx.moveTo(ix + 2, iy - 3);
      ctx.lineTo(ix + 7, iy);
      ctx.lineTo(ix + 2, iy + 3);
      ctx.stroke();
      ctx.globalAlpha = 1;
    } else if (item.type === 'lp_token' && !item.used) {
      // PASS 2: LP Token - diamond shape, blue/white
      var lbob = Math.sin(timer * 0.08 + (item.bobPhase || 0)) * 4;
      var ly = iy + Math.floor(lbob);
      ctx.fillStyle = '#44ddff';
      ctx.beginPath();
      ctx.moveTo(ix, ly - 10);
      ctx.lineTo(ix + 10, ly);
      ctx.lineTo(ix, ly + 10);
      ctx.lineTo(ix - 10, ly);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#88eeff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ix, ly - 10);
      ctx.lineTo(ix + 10, ly);
      ctx.lineTo(ix, ly + 10);
      ctx.lineTo(ix - 10, ly);
      ctx.closePath();
      ctx.stroke();
      // LP text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LP', ix, ly + 3);
    } else if (item.type === 'myco_shield' && !item.used) {
      // PASS 2: Myco Shield - green shield icon
      var sbob = Math.sin(timer * 0.06 + (item.bobPhase || 0)) * 3;
      var sy2 = iy + Math.floor(sbob);
      ctx.fillStyle = '#44ff88';
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.moveTo(ix, sy2 - 10);
      ctx.lineTo(ix + 9, sy2 - 5);
      ctx.lineTo(ix + 9, sy2 + 3);
      ctx.lineTo(ix, sy2 + 10);
      ctx.lineTo(ix - 9, sy2 + 3);
      ctx.lineTo(ix - 9, sy2 - 5);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#88ffcc';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.globalAlpha = 1;
      // M icon
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('M', ix, sy2 + 3);
    } else if (item.type === 'reactor_boost' && !item.used) {
      // PASS 2: Reactor Boost - orange lightning bolt
      var rbob = Math.sin(timer * 0.07 + (item.bobPhase || 0)) * 4;
      var ry2 = iy + Math.floor(rbob);
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.moveTo(ix + 2, ry2 - 10);
      ctx.lineTo(ix - 5, ry2);
      ctx.lineTo(ix, ry2);
      ctx.lineTo(ix - 2, ry2 + 10);
      ctx.lineTo(ix + 5, ry2);
      ctx.lineTo(ix, ry2);
      ctx.closePath();
      ctx.fill();
      // Glow
      ctx.globalAlpha = 0.3 + Math.sin(timer * 0.15) * 0.15;
      ctx.fillStyle = '#ff8800';
      ctx.beginPath();
      ctx.arc(ix, ry2, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

// Draw hazards (PASS 2)
function drawHazards(cx, cy) {
  for (var hi = 0; hi < objects.hazards.length; hi++) {
    var haz = objects.hazards[hi];
    if (haz.x < cx - 80 || haz.x > cx + VIEW_W + 80) continue;
    var hx = Math.floor(haz.x - cx), hy = Math.floor(haz.y - cy);

    if (haz.type === 'spore_cloud') {
      var pulse = Math.sin(timer * 0.04 + haz.phase) * 5;
      var r = haz.radius + pulse;
      ctx.globalAlpha = 0.2 + Math.sin(timer * 0.06 + haz.phase) * 0.08;
      ctx.fillStyle = '#88aa44';
      ctx.beginPath();
      ctx.arc(hx, hy, Math.floor(r), 0, Math.PI * 2);
      ctx.fill();
      // Inner swirl
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#aacc66';
      ctx.beginPath();
      ctx.arc(hx + Math.sin(timer * 0.05) * 8, hy + Math.cos(timer * 0.04) * 6, Math.floor(r * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawPlayer(cx, cy) {
  if (player.dead && stateTimer < 60) {
    ctx.globalAlpha = stateTimer / 60;
  }
  if (player.invuln > 0 && timer % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  var px = Math.floor(player.x - cx), py = Math.floor(player.y - cy);
  ctx.save();
  ctx.translate(px, py);

  // Shield aura (PASS 2)
  if (player.hasShield) {
    ctx.globalAlpha = 0.25 + Math.sin(timer * 0.1) * 0.1;
    ctx.strokeStyle = '#44ff88';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_R + 6 + Math.sin(timer * 0.15) * 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Reactor boost aura (PASS 2)
  if (player.reactorBoostTimer > 0) {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_R + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (player.rolling || player.spinning || player.spinCharging) {
    // Spinning ball form
    ctx.rotate(player.spinAngle);
    var grad = ctx.createRadialGradient(0, 0, 2, 0, 0, PLAYER_R);
    grad.addColorStop(0, '#66ffcc');
    grad.addColorStop(0.6, statB.color);
    grad.addColorStop(1, '#118855');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, PLAYER_R, 0, Math.PI * 2);
    ctx.fill();
    // Spin lines
    ctx.strokeStyle = '#88ffdd';
    ctx.lineWidth = 2;
    for (var sli = 0; sli < 3; sli++) {
      var sla = (sli / 3) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(0, 0, PLAYER_R - 3, sla, sla + 0.8);
      ctx.stroke();
    }
    // Spore dots
    ctx.fillStyle = '#aaffee';
    for (var sdi = 0; sdi < 5; sdi++) {
      var sda = (sdi / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(Math.floor(Math.cos(sda) * 8), Math.floor(Math.sin(sda) * 8), 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Spin charge indicator
    if (player.spinCharging && player.spinCharge > 2) {
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 3;
      var chargeArc = (player.spinCharge / (MAX_SPEED * 1.2)) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(0, 0, PLAYER_R + 5, 0, chargeArc);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  } else {
    // Standing/running form
    ctx.rotate(player.angle * 0.3);
    var sgrad = ctx.createRadialGradient(0, -2, 2, 0, -2, PLAYER_R);
    sgrad.addColorStop(0, '#66ffcc');
    sgrad.addColorStop(0.7, statB.color);
    sgrad.addColorStop(1, '#118855');
    ctx.fillStyle = sgrad;
    ctx.beginPath();
    ctx.arc(0, -2, PLAYER_R, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    var eyeDir = player.vx > 0.5 ? 2 : (player.vx < -0.5 ? -2 : 0);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(-3 + eyeDir, -6, 4, 0, Math.PI * 2);
    ctx.arc(5 + eyeDir, -6, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111111';
    ctx.beginPath();
    ctx.arc(-2 + eyeDir, -6, 2, 0, Math.PI * 2);
    ctx.arc(6 + eyeDir, -6, 2, 0, Math.PI * 2);
    ctx.fill();

    // Legs
    if (player.speed > 0.5) {
      ctx.fillStyle = '#118855';
      var leg1 = Math.floor(Math.sin(player.legPhase) * 5);
      var leg2 = Math.floor(Math.sin(player.legPhase + Math.PI) * 5);
      ctx.fillRect(-5, PLAYER_R - 4, 4, 6 + leg1);
      ctx.fillRect(2, PLAYER_R - 4, 4, 6 + leg2);
    } else {
      ctx.fillStyle = '#118855';
      ctx.fillRect(-5, PLAYER_R - 4, 4, 6);
      ctx.fillRect(2, PLAYER_R - 4, 4, 6);
    }

    // Spore cap details
    ctx.fillStyle = '#aaffee';
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.arc(-4, -10, 3, 0, Math.PI * 2);
    ctx.arc(4, -8, 2.5, 0, Math.PI * 2);
    ctx.arc(0, -12, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Trapped indicator (PASS 2)
  if (player.trapped) {
    ctx.strokeStyle = '#44aa22';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    for (var ti = 0; ti < 4; ti++) {
      var ta = (ti / 4) * Math.PI * 2 + timer * 0.05;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + Math.cos(ta) * 20, py + Math.sin(ta) * 20);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Mash indicator
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('MASH!', px, py - 25);
    // Progress bar
    ctx.fillStyle = '#333';
    ctx.fillRect(px - 15, py - 22, 30, 4);
    ctx.fillStyle = '#44ff88';
    ctx.fillRect(px - 15, py - 22, Math.floor(30 * (player.trapMash / 15)), 4);
  }

  ctx.globalAlpha = 1;
}

function drawBoss(cx, cy) {
  if (!boss || !boss.active || boss.defeated) return;
  var bx = Math.floor(boss.x - cx), by = Math.floor(boss.y - cy);

  if (boss.flashTimer > 0 && timer % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }

  ctx.save();
  ctx.translate(bx, by);

  // Main body
  ctx.fillStyle = boss.color;
  ctx.beginPath();
  ctx.arc(0, 0, boss.size, 0, Math.PI * 2);
  ctx.fill();

  // Evil face
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(Math.floor(-boss.size * 0.25), Math.floor(-boss.size * 0.15), Math.floor(boss.size * 0.15), 0, Math.PI * 2);
  ctx.arc(Math.floor(boss.size * 0.25), Math.floor(-boss.size * 0.15), Math.floor(boss.size * 0.15), 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(Math.floor(-boss.size * 0.25), Math.floor(-boss.size * 0.15), Math.floor(boss.size * 0.08), 0, Math.PI * 2);
  ctx.arc(Math.floor(boss.size * 0.25), Math.floor(-boss.size * 0.15), Math.floor(boss.size * 0.08), 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(0, Math.floor(boss.size * 0.2), Math.floor(boss.size * 0.3), 0, Math.PI);
  ctx.stroke();

  // Armor/spikes
  ctx.fillStyle = '#333';
  for (var ai = 0; ai < 6; ai++) {
    var aa = (ai / 6) * Math.PI * 2 + timer * 0.02;
    ctx.beginPath();
    ctx.moveTo(Math.floor(Math.cos(aa) * boss.size), Math.floor(Math.sin(aa) * boss.size));
    ctx.lineTo(Math.floor(Math.cos(aa) * (boss.size + 12)), Math.floor(Math.sin(aa) * (boss.size + 12)));
    ctx.lineTo(Math.floor(Math.cos(aa + 0.2) * boss.size), Math.floor(Math.sin(aa + 0.2) * boss.size));
    ctx.fill();
  }

  ctx.restore();

  // Boss projectiles (PASS 2)
  for (var bpi = 0; bpi < boss.projectiles.length; bpi++) {
    var bp = boss.projectiles[bpi];
    var bpx = Math.floor(bp.x - cx), bpy = Math.floor(bp.y - cy);
    ctx.fillStyle = bp.color;
    ctx.globalAlpha = bp.life > 20 ? 0.8 : bp.life / 25;
    ctx.beginPath();
    ctx.arc(bpx, bpy, 5, 0, Math.PI * 2);
    ctx.fill();
    // Inner glow
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = (bp.life > 20 ? 0.4 : bp.life / 50);
    ctx.beginPath();
    ctx.arc(bpx, bpy, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(Math.floor(VIEW_W / 2 - 60), 20, 120, 10);
  ctx.fillStyle = '#ff3333';
  var hpMax = createBoss(currentZone).hp;
  ctx.fillRect(Math.floor(VIEW_W / 2 - 59), 21, Math.floor(118 * (boss.hp / hpMax)), 8);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, Math.floor(VIEW_W / 2), 16);

  ctx.globalAlpha = 1;
}

function drawSpeedLines(cx, cy) {
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  for (var i = speedLines.length - 1; i >= 0; i--) {
    var sl = speedLines[i];
    sl.life -= 0.04;
    if (sl.life <= 0) { speedLines.splice(i, 1); continue; }
    ctx.globalAlpha = sl.life * 0.4;
    var sx = Math.floor(sl.x - cx);
    var sy = Math.floor(sl.y - cy);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx - Math.floor(sl.len * Math.sign(player.vx)), sy);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// Spore blind overlay (PASS 2)
function drawSporeBlind() {
  if (player.sporeBlindTimer <= 0) return;
  var alpha = Math.min(0.6, player.sporeBlindTimer / 90 * 0.6);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#445522';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);
  // Swirling spore particles
  for (var i = 0; i < 8; i++) {
    var sx = Math.floor((Math.sin(timer * 0.03 + i * 0.8) * 0.5 + 0.5) * VIEW_W);
    var sy = Math.floor((Math.cos(timer * 0.025 + i * 1.1) * 0.5 + 0.5) * VIEW_H);
    ctx.fillStyle = '#88aa44';
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath();
    ctx.arc(sx, sy, 20 + Math.sin(timer * 0.05 + i) * 8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Ring count
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.beginPath();
  ctx.arc(18, 14, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath();
  ctx.arc(18, 14, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText(String(player.rings), 30, 18);

  // Score (PASS 1 - INT mult indicator)
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, VIEW_W - 10, 18);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = statB.color;
  for (var i = 0; i < player.lives; i++) {
    ctx.beginPath();
    ctx.arc(18 + i * 18, 34, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Shield indicator (PASS 2)
  if (player.hasShield) {
    ctx.fillStyle = '#44ff88';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SHIELD', 10, 50);
  }

  // Reactor boost timer (PASS 2)
  if (player.reactorBoostTimer > 0) {
    ctx.fillStyle = '#ff6600';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    var boostSec = Math.ceil(player.reactorBoostTimer / 60);
    ctx.fillText('BOOST ' + boostSec + 's', 10, player.hasShield ? 60 : 50);
  }

  // Time
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  var mins = Math.floor(levelTime / 3600);
  var secs = Math.floor((levelTime % 3600) / 60);
  ctx.fillText(mins + ':' + (secs < 10 ? '0' : '') + secs, Math.floor(VIEW_W / 2), 14);

  // Speed indicator
  if (player.speed > 4) {
    ctx.fillStyle = player.speed > 10 ? '#ff4400' : '#ffaa00';
    ctx.textAlign = 'left';
    ctx.font = 'bold 10px monospace';
    var bars = Math.min(10, Math.floor(player.speed));
    ctx.fillText('SPD ' + '|'.repeat(bars), 10, VIEW_H - 10);
  }

  // Zone/Act
  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Z' + (currentZone + 1) + ' A' + (currentAct + 1), VIEW_W - 10, VIEW_H - 10);
}

// Zone name banner (PASS 3)
function drawZoneNameBanner() {
  if (zoneNameTimer <= 0) return;
  zoneNameTimer--;
  var z = ZONES[currentZone];
  var alpha = zoneNameTimer > 90 ? 1 : zoneNameTimer / 90;
  ctx.globalAlpha = alpha * 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, Math.floor(VIEW_H / 2 - 30), VIEW_W, 60);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = z.accent;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(z.name, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 5));
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('Zone ' + (currentZone + 1) + ' - Act ' + (currentAct + 1), Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 18));
  ctx.globalAlpha = 1;
}

function drawSignpost(cx, cy) {
  var sx = Math.floor(signpostX - cx), sy = Math.floor(getTerrainY(signpostX) - cy);
  if (sx < -50 || sx > VIEW_W + 50) return;

  ctx.fillStyle = '#888';
  ctx.fillRect(sx - 2, sy - 50, 4, 50);
  ctx.fillStyle = '#4444ff';
  ctx.fillRect(sx - 15, sy - 55, 30, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('END', sx, sy - 40);
}

// ============================================================
// TITLE & UI SCREENS (PASS 1 stat bar, PASS 3 NES controls)
// ============================================================
function drawTitle() {
  var grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
  grad.addColorStop(0, '#112244');
  grad.addColorStop(1, '#0a1a0a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  // Animated spore character
  var bobY = Math.sin(timer * 0.05) * 8;
  ctx.save();
  ctx.translate(Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 40 + bobY));
  ctx.rotate(timer * 0.08);
  var tgrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 30);
  tgrad.addColorStop(0, '#66ffcc');
  tgrad.addColorStop(0.6, statB.color);
  tgrad.addColorStop(1, '#118855');
  ctx.fillStyle = tgrad;
  ctx.beginPath();
  ctx.arc(0, 0, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#88ffdd';
  ctx.lineWidth = 3;
  for (var si = 0; si < 4; si++) {
    var sa = (si / 4) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(0, 0, 24, sa, sa + 0.6);
    ctx.stroke();
  }
  ctx.restore();

  // Speed trail
  for (var ti = 0; ti < 8; ti++) {
    ctx.globalAlpha = 0.3 - ti * 0.03;
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(Math.floor(VIEW_W / 2 - 40 - ti * 15), Math.floor(VIEW_H / 2 - 40 + bobY + Math.sin(timer * 0.05 + ti * 0.5) * 3), 8 - ti, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE SPRINT', Math.floor(VIEW_W / 2), 50);

  ctx.fillStyle = '#88ccaa';
  ctx.font = '12px monospace';
  ctx.fillText('Speed Through Tasern', Math.floor(VIEW_W / 2), 68);

  // Baseling stat bar (PASS 1)
  var statY = 86;
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 10px monospace';
  ctx.fillText(statB.name + (statB.level > 0 ? ' Lv.' + statB.level : ''), Math.floor(VIEW_W / 2), statY);

  var statNames = ['STR', 'DEX', 'CON', 'INT', 'WIS', 'CHA'];
  var statVals = [statB.str, statB.dex, statB.con, statB.int, statB.wis, statB.cha];
  var statColors = ['#ff6644', '#44aaff', '#44ff44', '#ffdd44', '#aa88ff', '#ff88cc'];
  var barW = 30, barH = 6, startX = Math.floor(VIEW_W / 2 - (statNames.length * (barW + 12)) / 2);
  statY += 10;
  for (var sti = 0; sti < statNames.length; sti++) {
    var bx = startX + sti * (barW + 12);
    ctx.fillStyle = '#666';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statNames[sti], bx + barW / 2, statY);
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, statY + 2, barW, barH);
    ctx.fillStyle = statColors[sti];
    var fillW = Math.min(barW, Math.floor(barW * (statVals[sti] / 30)));
    ctx.fillRect(bx, statY + 2, fillW, barH);
    ctx.fillStyle = '#aaa';
    ctx.font = '6px monospace';
    ctx.fillText(String(statVals[sti]), bx + barW / 2, statY + barH + 10);
  }

  // NES-style controls (PASS 3)
  var ctrlY = VIEW_H - 78;
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('-- CONTROLS --', Math.floor(VIEW_W / 2), ctrlY);
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  var ctrlLeft = Math.floor(VIEW_W / 2 - 100);
  var ctrlRight = Math.floor(VIEW_W / 2 + 100);
  ctx.textAlign = 'right';
  ctx.fillText('[<] [>]', ctrlLeft + 50, ctrlY + 14);
  ctx.fillText('[v]', ctrlLeft + 50, ctrlY + 26);
  ctx.fillText('SPACE', ctrlLeft + 50, ctrlY + 38);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.fillText('Move', ctrlLeft + 58, ctrlY + 14);
  ctx.fillText('Roll / Charge', ctrlLeft + 58, ctrlY + 26);
  ctx.fillText('Jump / Spin', ctrlLeft + 58, ctrlY + 38);

  // Start prompt
  ctx.fillStyle = timer % 60 < 40 ? '#fff' : '#666';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS SPACE TO START', Math.floor(VIEW_W / 2), VIEW_H - 16);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, Math.floor(VIEW_W / 2), VIEW_H - 30);
  }
}

function drawZoneIntro() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  var z = ZONES[currentZone];
  ctx.fillStyle = z.accent;
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(z.name, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 20));

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Act ' + (currentAct + 1), Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 10));

  ctx.fillStyle = z.accent;
  ctx.globalAlpha = 0.3;
  ctx.font = 'bold 80px monospace';
  ctx.fillText(String(currentZone + 1), Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 30));
  ctx.globalAlpha = 1;
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ACT COMPLETE!', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 40));

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  var mins = Math.floor(levelTime / 3600);
  var secs = Math.floor((levelTime % 3600) / 60);
  ctx.fillText('Time: ' + mins + ':' + (secs < 10 ? '0' : '') + secs, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 10));
  ctx.fillText('Rings: ' + player.rings, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 10));
  ctx.fillText('Score: ' + score, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 30));

  var bonus = ((timer * 3) % 400);
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('Bonus: +' + bonus, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 55));
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 30));

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('Score: ' + score, Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 5));

  if (score > highScore) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 30));
  }

  ctx.fillStyle = timer % 60 < 40 ? '#aaa' : '#555';
  ctx.font = '11px monospace';
  ctx.fillText('Press Space to Restart', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 60));
}

function drawBossDefeated() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, VIEW_W, VIEW_H);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS DEFEATED!', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 - 20));

  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.fillText('+1000 pts', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 10));
  ctx.fillText(ZONES[currentZone].name + ' Cleared!', Math.floor(VIEW_W / 2), Math.floor(VIEW_H / 2 + 35));
}

// ============================================================
// SCREEN FLASH
// ============================================================
function drawFlash() {
  if (flashAlpha > 0) {
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.globalAlpha = 1;
    flashAlpha -= 0.02;
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
var lastTime = 0;
timer = 0;

function gameLoop(timestamp) {
  var dt = Math.min((timestamp - lastTime) / 16.67, 2);
  lastTime = timestamp;
  timer++;

  ctx.clearRect(0, 0, VIEW_W, VIEW_H);

  if (state === 'title') {
    drawTitle();
  } else if (state === 'zoneIntro') {
    drawBackground(currentZone);
    drawTerrain(camera.x, camera.y);
    drawPlayer(camera.x, camera.y);
    drawHUD();
    drawZoneIntro();
    stateTimer--;
    if (stateTimer <= 0) state = 'playing';
  } else if (state === 'playing') {
    levelTime++;
    updatePlayer();
    updateObjects();
    updateBoss();
    updateCamera();
    updateParticles(1 / 60);

    drawBackground(currentZone);
    drawTerrain(camera.x, camera.y);
    drawHazards(camera.x, camera.y);
    drawSprings(camera.x, camera.y);
    drawRings(camera.x, camera.y);
    drawEnemies(camera.x, camera.y);
    drawSignpost(camera.x, camera.y);
    drawSpeedLines(camera.x, camera.y);
    drawPlayer(camera.x, camera.y);
    drawBoss(camera.x, camera.y);
    drawParticles(camera.x, camera.y);
    drawSporeBlind();
    drawFlash();
    drawHUD();
    drawZoneNameBanner();
  } else if (state === 'dying') {
    stateTimer--;
    player.vy += GRAVITY * 0.5;
    player.y += player.vy;
    updateCamera();

    drawBackground(currentZone);
    drawTerrain(camera.x, camera.y);
    drawRings(camera.x, camera.y);
    drawPlayer(camera.x, camera.y);
    drawParticles(camera.x, camera.y);
    drawFlash();
    drawHUD();

    if (stateTimer <= 0) {
      if (player.lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          try { localStorage.setItem('sporesprint_hi', String(highScore)); } catch(e) { /* storage unavailable */ }
        }
      } else {
        initLevel();
      }
    }
  } else if (state === 'levelComplete') {
    stateTimer--;
    updateParticles(1 / 60);

    drawBackground(currentZone);
    drawTerrain(camera.x, camera.y);
    drawPlayer(camera.x, camera.y);
    drawParticles(camera.x, camera.y);
    drawHUD();
    drawLevelComplete();

    if (stateTimer <= 0) {
      score += ((timer * 3) % 400);
      if (currentAct === 0) {
        currentAct = 1;
      } else {
        currentAct = 0;
        currentZone++;
        if (currentZone >= 6) {
          state = 'gameOver';
          score += Math.floor(5000 * STAT_INT_SCORE);
          if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('sporesprint_hi', String(highScore)); } catch(e) { /* storage unavailable */ }
          }
          return requestAnimationFrame(gameLoop);
        }
      }
      initLevel();
    }
  } else if (state === 'bossDefeated') {
    stateTimer--;
    updateParticles(1 / 60);

    drawBackground(currentZone);
    drawTerrain(camera.x, camera.y);
    drawPlayer(camera.x, camera.y);
    drawParticles(camera.x, camera.y);
    drawHUD();
    drawBossDefeated();

    if (stateTimer <= 0) {
      completeLevel();
    }
  } else if (state === 'gameOver') {
    drawBackground(currentZone);
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

// Kick off
requestAnimationFrame(gameLoop);

})();
</script>
</body>
</html>
