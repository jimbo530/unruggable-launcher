<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Sprint</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
#touch-controls {
  position: fixed; bottom: 60px; left: 0; right: 0; display: none; z-index: 20;
  pointer-events: none;
}
.touch-btn {
  position: absolute; width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
  pointer-events: all; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.6); font-size: 24px; font-family: monospace;
  user-select: none; -webkit-user-select: none;
}
.touch-btn:active { background: rgba(255,255,255,0.35); }
#btn-left { left: 20px; bottom: 0; }
#btn-right { left: 100px; bottom: 0; }
#btn-down { left: 60px; bottom: -70px; }
#btn-jump { right: 20px; bottom: 0; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="touch-controls">
  <div class="touch-btn" id="btn-left">&lt;</div>
  <div class="touch-btn" id="btn-right">&gt;</div>
  <div class="touch-btn" id="btn-down">v</div>
  <div class="touch-btn" id="btn-jump">^</div>
</div>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// BASELING STATS (PASS 1)
// ============================================================
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat multipliers
var STAT_STR_MULT = 0.8 + (statB.str / 10) * 0.4;       // 0.8-2.0 spin/boss damage
var STAT_DEX_SPD = 0.85 + (statB.dex / 10) * 0.3;        // 0.85-1.75 top speed
var STAT_DEX_ACCEL = 0.9 + (statB.dex / 10) * 0.2;       // 0.9-1.5 acceleration
var STAT_CON_PROTECT = Math.floor(statB.con / 8);          // 0-3 rings kept on hit
var STAT_CON_LIVES = Math.floor(statB.con / 12);           // 0-2 bonus lives
var STAT_INT_SCORE = 0.8 + (statB.int / 10) * 0.4;        // 0.8-2.0 score mult
var STAT_WIS_CHARGE = 0.7 + (statB.wis / 10) * 0.6;       // 0.7-2.5 spin dash charge speed
var STAT_CHA_RINGS = 0.8 + (statB.cha / 10) * 0.4;        // 0.8-2.0 ring spawn rate
var STAT_CHA_ITEMS = 0.8 + (statB.cha / 10) * 0.3;        // 0.8-1.7 bonus item chance

// ============================================================
// CONSTANTS
// ============================================================
var GRAVITY = 0.5;
var MAX_SPEED = 16 * STAT_DEX_SPD;
var ACCEL = 0.12 * STAT_DEX_ACCEL;
var DECEL = 0.06;
var ROLL_BOOST = 1.4;
var JUMP_FORCE = -12;
var JUMP_HOLD_FORCE = -0.4;
var JUMP_HOLD_TIME = 12;
var RING_SCATTER_TIME = 180;
var SLOPE_FACTOR = 0.08;
var SPRING_FORCE = -18;
var TILE_SIZE = 32;
var VIEW_W = 480;
var VIEW_H = 320;
var PLAYER_R = 14;

// Zone color palettes (PASS 3 - enhanced Tasern names)
var ZONES = [
  { name: 'Fungal Fields', sky: '#4488cc', ground: '#2d8a2d', accent: '#66cc44', dark: '#1a5c1a', bgDetail: 'mushrooms' },
  { name: 'Reactor Highway', sky: '#332244', ground: '#555566', accent: '#ff6600', dark: '#333344', bgDetail: 'reactors' },
  { name: 'Mycelial Jungle', sky: '#0a2a1a', ground: '#2a5a3a', accent: '#44ffaa', dark: '#0a3a1a', bgDetail: 'vines' },
  { name: 'Goo Caverns', sky: '#1a0a2a', ground: '#3a3a5a', accent: '#88ccff', dark: '#1a1a3a', bgDetail: 'crystals' },
  { name: 'Hive Metropolis', sky: '#1a1000', ground: '#4a3a0a', accent: '#ffcc00', dark: '#2a1a0a', bgDetail: 'hive' },
  { name: "Namaris' Escape", sky: '#0a0010', ground: '#2a1a3a', accent: '#aa44ff', dark: '#1a0a2a', bgDetail: 'darkness' }
];

// ============================================================
// CANVAS SETUP
// ============================================================
var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W, H, SCALE;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth;
  var sh = window.innerHeight - 20;
  SCALE = Math.min(sw / VIEW_W, sh / VIEW_H);
  W = Math.floor(VIEW_W * SCALE);
  H = Math.floor(VIEW_H * SCALE);
  canvas.width = VIEW_W * dpr;
  canvas.height = VIEW_H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, Math.floor((sh - H) / 2)) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Show touch controls on touch devices
if ('ontouchstart' in window) {
  document.getElementById('touch-controls').style.display = 'block';
}

// ============================================================
// AUDIO ENGINE
// ============================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  var bufSize = Math.floor(audioCtx.sampleRate * dur);
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

var SFX = {
  ring: function() { playTone(900, 0.08, 'square', 0.06); setTimeout(function() { playTone(1200, 0.1, 'square', 0.06); }, 60); },
  jump: function() { playTone(200, 0.15, 'square', 0.06, 600); },
  spin: function() { playTone(400, 0.1, 'sawtooth', 0.05, 800); },
  spring: function() { playTone(300, 0.2, 'sine', 0.08, 1200); },
  hurt: function() { playTone(200, 0.3, 'sawtooth', 0.1, 50); playNoise(0.2, 0.1); },
  destroy: function() { playTone(600, 0.15, 'square', 0.08, 100); playNoise(0.1, 0.06); },
  checkpoint: function() { playTone(523, 0.1, 'square', 0.07); setTimeout(function() { playTone(784, 0.1, 'square', 0.07); }, 100); setTimeout(function() { playTone(1047, 0.15, 'square', 0.08); }, 200); },
  die: function() { playTone(400, 0.4, 'sawtooth', 0.12, 60); setTimeout(function() { playTone(200, 0.3, 'square', 0.08, 40); }, 200); },
  boss: function() { playTone(100, 0.3, 'sawtooth', 0.1, 50); playNoise(0.3, 0.12); },
  clear: function() {
    var notes = [523, 659, 784, 1047, 1318];
    notes.forEach(function(n, i) { setTimeout(function() { playTone(n, 0.12, 'square', 0.07); }, i * 100); });
  },
  roll: function() { playNoise(0.05, 0.02); },
  lpToken: function() { playTone(600, 0.1, 'sine', 0.08); setTimeout(function() { playTone(900, 0.1, 'sine', 0.08); }, 80); setTimeout(function() { playTone(1200, 0.15, 'sine', 0.1); }, 160); },
  shield: function() { playTone(400, 0.2, 'sine', 0.07, 800); playTone(600, 0.2, 'triangle', 0.05, 1000); },
  reactorBoost: function() { playTone(300, 0.15, 'sawtooth', 0.06, 900); playNoise(0.1, 0.04); },
  goo: function() { playTone(80, 0.2, 'sine', 0.05, 40); },
  sporeCloud: function() { playNoise(0.15, 0.04); playTone(150, 0.15, 'sine', 0.03, 100); },
  trapGrab: function() { playTone(150, 0.2, 'sawtooth', 0.08, 80); },
  trapBreak: function() { playTone(400, 0.1, 'square', 0.06, 800); },
  explosion: function() { playNoise(0.3, 0.12); playTone(100, 0.2, 'sawtooth', 0.08, 30); }
};

// ============================================================
// PARTICLES (PASS 3 - enhanced)
// ============================================================
var particles = [];
function spawnParticles(x, y, color, count, speed) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var spd = (speed || 3) * (0.5 + Math.random());
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
      life: 1, color: color, size: 2 + Math.random() * 3
    });
  }
}

function spawnTrail(x, y, color) {
  particles.push({
    x: x + (Math.random() - 0.5) * 6,
    y: y + (Math.random() - 0.5) * 6,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    life: 0.6, color: color, size: 2 + Math.random() * 2
  });
}

// Ring collect sparkle (PASS 3)
function spawnRingSparkle(x, y) {
  for (var i = 0; i < 6; i++) {
    var angle = (i / 6) * Math.PI * 2;
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * 2.5, vy: Math.sin(angle) * 2.5 - 1,
      life: 0.8, color: (i % 2 === 0) ? '#ffdd44' : '#ffaa00', size: 3
    });
  }
}

// Enemy kill burst (PASS 3)
function spawnKillBurst(x, y, color) {
  for (var i = 0; i < 12; i++) {
    var angle = (i / 12) * Math.PI * 2;
    var spd = 3 + Math.random() * 3;
    particles.push({
      x: x, y: y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 2,
      life: 1, color: color, size: 2 + Math.random() * 4
    });
  }
  // Inner green spores
  for (var j = 0; j < 6; j++) {
    var a2 = Math.random() * Math.PI * 2;
    particles.push({
      x: x, y: y, vx: Math.cos(a2) * 2, vy: Math.sin(a2) * 2 - 3,
      life: 1.2, color: '#44ff88', size: 2 + Math.random() * 2
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= dt * 3;
    p.size *= 0.97;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles(cx, cy) {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - cx - p.size / 2), Math.floor(p.y - cy - p.size / 2), Math.floor(p.size), Math.floor(p.size));
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// TERRAIN GENERATION
// ============================================================
function generateTerrain(zone, act) {
  var segments = [];
  var levelLength = 6000 + zone * 800 + act * 400;
  var x = 0, y = 200;
  var step = 40;

  // Start flat
  for (var i = 0; i < 5; i++) {
    segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'ground' });
    x += step;
  }

  while (x < levelLength) {
    var r = Math.random();
    var difficulty = (zone * 2 + act) / 12;

    if (r < 0.22) {
      // Flat section
      var len = 2 + Math.floor(Math.random() * 4);
      for (var fi = 0; fi < len; fi++) {
        segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'ground' });
        x += step;
      }
    } else if (r < 0.35) {
      // Downhill slope (speed gain)
      var dLen = 3 + Math.floor(Math.random() * 4);
      var drop = 30 + Math.random() * 50 * (1 + difficulty);
      for (var di = 0; di < dLen; di++) {
        var ny = y + (drop / dLen);
        segments.push({ x1: x, y1: y, x2: x + step, y2: ny, type: 'ground' });
        x += step;
        y = ny;
      }
    } else if (r < 0.48) {
      // Uphill slope
      var uLen = 2 + Math.floor(Math.random() * 3);
      var rise = 20 + Math.random() * 40;
      for (var ui = 0; ui < uLen; ui++) {
        var uny = y - (rise / uLen);
        segments.push({ x1: x, y1: y, x2: x + step, y2: uny, type: 'ground' });
        x += step;
        y = uny;
      }
    } else if (r < 0.55) {
      // Loop-de-loop
      var loopR = 60 + Math.random() * 30;
      var loopSegs = 16;
      var lcx = x + loopR;
      var lcy = y - loopR;
      for (var li = 0; li < loopSegs; li++) {
        var a1 = Math.PI / 2 + (li / loopSegs) * Math.PI * 2;
        var a2 = Math.PI / 2 + ((li + 1) / loopSegs) * Math.PI * 2;
        segments.push({
          x1: lcx + Math.cos(a1) * loopR, y1: lcy + Math.sin(a1) * loopR,
          x2: lcx + Math.cos(a2) * loopR, y2: lcy + Math.sin(a2) * loopR,
          type: 'loop'
        });
      }
      x = lcx + loopR;
    } else if (r < 0.63) {
      // Reactor Zone pad (PASS 2 - speed-boosting green sections)
      var rzLen = 3 + Math.floor(Math.random() * 3);
      for (var rzi = 0; rzi < rzLen; rzi++) {
        segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'reactor_zone' });
        x += step;
      }
    } else if (r < 0.70) {
      // Goo Pool (PASS 2 - slow-down zones)
      var gooLen = 2 + Math.floor(Math.random() * 3);
      var gooDepth = 8 + Math.random() * 10;
      for (var gi = 0; gi < gooLen; gi++) {
        segments.push({ x1: x, y1: y + gooDepth, x2: x + step, y2: y + gooDepth, type: 'goo_pool' });
        x += step;
      }
      // Exit ramp
      segments.push({ x1: x, y1: y + gooDepth, x2: x + step, y2: y, type: 'ground' });
      x += step;
    } else if (r < 0.78) {
      // Gap/pit
      var gapW = 80 + Math.random() * 60 * difficulty;
      segments.push({ x1: x, y1: y, x2: x + 10, y2: y, type: 'ground' });
      x += gapW;
      y += Math.random() * 20 - 10;
      segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'ground' });
      x += step;
    } else if (r < 0.88) {
      // Half-pipe / valley
      var depth = 40 + Math.random() * 40;
      var hLen = 6;
      for (var hi = 0; hi < hLen; hi++) {
        var t = hi / (hLen - 1);
        var curveY = y + Math.sin(t * Math.PI) * depth;
        var nx = x + step;
        var nt = (hi + 1) / (hLen - 1);
        var nextY = y + Math.sin(nt * Math.PI) * depth;
        segments.push({ x1: x, y1: curveY, x2: nx, y2: nextY, type: 'ground' });
        x = nx;
      }
    } else {
      // Ramp / launcher
      var rampH = 40 + Math.random() * 30;
      segments.push({ x1: x, y1: y, x2: x + step * 2, y2: y - rampH, type: 'ground' });
      x += step * 2;
      y -= rampH;
      x += 60 + Math.random() * 40;
      y += rampH * 0.5;
      segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'ground' });
      x += step;
    }

    // Keep y in bounds
    y = Math.max(80, Math.min(280, y));
  }

  // End platform
  for (var ei = 0; ei < 8; ei++) {
    segments.push({ x1: x, y1: y, x2: x + step, y2: y, type: 'ground' });
    x += step;
  }

  return { segments: segments, length: x };
}

// ============================================================
// RING, ENEMY, SPRING, OBJECT GENERATION (PASS 2 enhanced)
// ============================================================
function generateObjects(terrain, zone, act) {
  var rings = [];
  var enemies = [];
  var springs = [];
  var items = [];
  var hazards = [];
  var difficulty = (zone * 2 + act) / 12;

  // Place rings along terrain (CHA boosts spawn rate)
  for (var i = 0; i < terrain.segments.length; i++) {
    var seg = terrain.segments[i];
    if (Math.random() < 0.4 * STAT_CHA_RINGS) {
      var count = 1 + Math.floor(Math.random() * 4);
      for (var j = 0; j < count; j++) {
        var t = (j + 0.5) / count;
        var rx = seg.x1 + (seg.x2 - seg.x1) * t;
        var ry = seg.y1 + (seg.y2 - seg.y1) * t - 40 - Math.random() * 30;
        rings.push({ x: rx, y: ry, collected: false, scatter: 0 });
      }
    }
    // Arcs of rings in the air
    if (Math.random() < 0.1 * STAT_CHA_RINGS) {
      var arcX = seg.x1;
      var arcY = seg.y1 - 80;
      for (var aj = 0; aj < 5; aj++) {
        var aa = (aj / 4) * Math.PI;
        rings.push({
          x: arcX + Math.cos(aa) * 50 + 50,
          y: arcY - Math.sin(aa) * 30,
          collected: false, scatter: 0
        });
      }
    }
  }

  // Place enemies (PASS 2 - new enemy types)
  for (var ei = 10; ei < terrain.segments.length - 10; ei++) {
    if (Math.random() < 0.06 + difficulty * 0.04) {
      var eseg = terrain.segments[ei];
      var ex = (eseg.x1 + eseg.x2) / 2;
      var ey = Math.min(eseg.y1, eseg.y2) - 20;
      var typeRoll = Math.random();
      var etype;
      if (typeRoll < 0.3) etype = 'walker';
      else if (typeRoll < 0.5) etype = 'flyer';
      else if (typeRoll < 0.65 && zone >= 1) etype = 'reactor_bot';
      else if (typeRoll < 0.8 && zone >= 2) etype = 'mycelial_trap';
      else if (typeRoll < 0.95 && zone >= 1) etype = 'spore_turret';
      else etype = 'walker';

      enemies.push({
        x: ex, y: etype === 'flyer' ? ey - 50 : ey,
        type: etype, alive: true, dir: Math.random() < 0.5 ? 1 : -1,
        startX: ex, range: 60 + Math.random() * 40,
        bobPhase: Math.random() * Math.PI * 2,
        // Reactor bot specifics
        chaseSpeed: 1.5 + difficulty,
        explodeTimer: -1,
        // Spore turret specifics
        shootTimer: 60 + Math.floor(Math.random() * 60),
        projectiles: [],
        // Mycelial trap specifics
        grabbing: false, grabTimer: 0, vineExtend: 0
      });
    }
  }

  // Place springs
  for (var si = 5; si < terrain.segments.length - 5; si++) {
    if (Math.random() < 0.04) {
      var sseg = terrain.segments[si];
      springs.push({
        x: (sseg.x1 + sseg.x2) / 2,
        y: Math.min(sseg.y1, sseg.y2) - 8,
        compressed: 0
      });
    }
  }

  // Speed boosters
  if (zone >= 1) {
    for (var bi = 10; bi < terrain.segments.length - 10; bi++) {
      if (Math.random() < 0.03) {
        var bseg = terrain.segments[bi];
        items.push({
          x: (bseg.x1 + bseg.x2) / 2,
          y: Math.min(bseg.y1, bseg.y2) - 12,
          type: 'booster', used: false, resetTimer: 0
        });
      }
    }
  }

  // LP Tokens (PASS 2 - 100 ring value, CHA boosts chance)
  for (var li = 15; li < terrain.segments.length - 10; li++) {
    if (Math.random() < 0.012 * STAT_CHA_ITEMS) {
      var lseg = terrain.segments[li];
      items.push({
        x: (lseg.x1 + lseg.x2) / 2,
        y: Math.min(lseg.y1, lseg.y2) - 50 - Math.random() * 20,
        type: 'lp_token', used: false, bobPhase: Math.random() * Math.PI * 2
      });
    }
  }

  // Myco Shields (PASS 2 - one extra hit protection)
  for (var mi = 20; mi < terrain.segments.length - 10; mi++) {
    if (Math.random() < 0.008 * STAT_CHA_ITEMS) {
      var mseg = terrain.segments[mi];
      items.push({
        x: (mseg.x1 + mseg.x2) / 2,
        y: Math.min(mseg.y1, mseg.y2) - 45,
        type: 'myco_shield', used: false, bobPhase: Math.random() * Math.PI * 2
      });
    }
  }

  // Reactor Boosts (PASS 2 - 10sec speed boost)
  for (var ri = 10; ri < terrain.segments.length - 10; ri++) {
    if (Math.random() < 0.01 * STAT_CHA_ITEMS) {
      var rseg = terrain.segments[ri];
      items.push({
        x: (rseg.x1 + rseg.x2) / 2,
        y: Math.min(rseg.y1, rseg.y2) - 55,
        type: 'reactor_boost', used: false, bobPhase: Math.random() * Math.PI * 2
      });
    }
  }

  // Spore Clouds (PASS 2 - hazards)
  for (var ci = 15; ci < terrain.segments.length - 10; ci++) {
    if (Math.random() < 0.025 + difficulty * 0.015) {
      var cseg = terrain.segments[ci];
      hazards.push({
        x: (cseg.x1 + cseg.x2) / 2,
        y: Math.min(cseg.y1, cseg.y2) - 40 - Math.random() * 30,
        type: 'spore_cloud', radius: 30 + Math.random() * 20,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  return { rings: rings, enemies: enemies, springs: springs, items: items, hazards: hazards };
}

// ============================================================
// BOSS GENERATION (PASS 2 - Tasern themed)
// ============================================================
function createBoss(zone) {
  var bossTypes = [
    { name: 'Fungal Golem', hp: 6, size: 40, color: '#44aa22', pattern: 'bounce', tasernAttack: 'spore_burst' },
    { name: 'Reactor Overlord', hp: 8, size: 35, color: '#ff6600', pattern: 'shoot', tasernAttack: 'reactor_beam' },
    { name: 'Mycelial Hydra', hp: 8, size: 45, color: '#44ffaa', pattern: 'dive', tasernAttack: 'vine_whip' },
    { name: 'Goo Colossus', hp: 10, size: 50, color: '#8866ff', pattern: 'stomp', tasernAttack: 'goo_rain' },
    { name: 'Hive Queen', hp: 10, size: 45, color: '#ffcc00', pattern: 'chase', tasernAttack: 'swarm_spawn' },
    { name: 'Namaris Shadow', hp: 12, size: 55, color: '#aa44ff', pattern: 'multi', tasernAttack: 'dark_pulse' }
  ];
  var bt = bossTypes[zone];
  return {
    name: bt.name, hp: bt.hp, size: bt.size, color: bt.color,
    pattern: bt.pattern, tasernAttack: bt.tasernAttack,
    x: 0, y: 0, vx: 0, vy: 0,
    phase: 0, timer: 0, invuln: 0, hit: false,
    active: false, defeated: false, flashTimer: 0,
    projectiles: [], attackTimer: 0, attackCooldown: 90
  };
}

// INPUT

window.addEventListener('keydown', function(e) {

  if (state === 'title' || state === 'gameOver') {
    ensureAudio();
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }
});

// Touch controls
function setupTouch(id, key) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', function(e) {
    e.preventDefault(); ensureAudio(); touchState[key] = true;
    if (state === 'title' || state === 'gameOver') startGame();
  });
  el.addEventListener('touchend', function(e) { e.preventDefault(); touchState[key] = false; });
  el.addEventListener('touchcancel', function(e) { touchState[key] = false; });
}
setupTouch('btn-left', 'left');
setupTouch('btn-right', 'right');
setupTouch('btn-down', 'down');
setupTouch('btn-jump', 'jump');

canvas.addEventListener('touchstart', function(e) {
  ensureAudio();
  if (state === 'title' || state === 'gameOver') startGame();
});

function inputLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; }
function inputRight() { return keys['ArrowRight'] || keys['KeyD'] || touchState.right; }
function inputDown() { return keys['ArrowDown'] || keys['KeyS'] || touchState.down; }
function inputJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jump; }

}

  boss = null;
  bossArena = false;
  scatteredRings = [];
