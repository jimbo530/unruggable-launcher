  // Spore dots on cap
  ctx.fillStyle = '#f4b41b';
  ctx.globalAlpha = 0.4;
  ctx.fillRect(GW / 2 - 6, 68, 2, 2);
  ctx.fillRect(GW / 2 + 4, 68, 2, 2);
  ctx.fillRect(GW / 2 - 1, 65, 2, 2);
  ctx.globalAlpha = 1;

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('SHADOW BASELING', GW / 2 + 2, Math.floor(GH * 0.42) + 2);
  ctx.fillStyle = '#5d275d';
  ctx.fillText('SHADOW BASELING', GW / 2, Math.floor(GH * 0.42));

  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('Shadow Guardian of Tasern City', GW / 2, Math.floor(GH * 0.50));

  // Selected baseling preview + 5 stat bars + [C] SELECT (Base+Baseling standard)
  var statY = Math.floor(GH * 0.55);
  var sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
  // Baseling preview (idle bob) — falls back to nothing if no sprite (Wimmple).
  TAS.drawBaseling(ctx, GW / 2, statY - 16, 28, { anim: 'idle', frame: frame });
  // Name in Base blue
  ctx.fillStyle = '#0052FF'; ctx.textAlign = 'center'; ctx.font = 'bold 10px monospace';
  ctx.fillText((sel ? sel.charName : 'WIMMPLE') + (sel && sel.tokenId != null ? ' #' + sel.tokenId : ''), GW / 2, statY);
  // 5 stat bars in canonical colors
  if (sel && sel.stats && window.BaselingPlayer) {
    var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS, x0 = GW / 2 - 115;
    ctx.font = '8px monospace';
    for (var si = 0; si < keys.length; si++) {
      var mm = meta[keys[si]], v = sel.stats[keys[si]], bx = x0 + si * 47, by = statY + 10;
      ctx.fillStyle = mm.color; ctx.textAlign = 'left'; ctx.fillText(mm.label, bx, by);
      ctx.fillStyle = '#222'; ctx.fillRect(bx, by + 3, 40, 5);
      ctx.fillStyle = mm.color; ctx.fillRect(bx, by + 3, 40 * Math.max(0.04, Math.min(1, v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF'; ctx.font = 'bold 9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('[C] SELECT BASELING', GW / 2, Math.floor(GH * 0.88));

  // NES-style controls with dotted leaders (PASS 3)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#666';
  ctx.font = '7px monospace';
  var ctrlY = Math.floor(GH * 0.63);
  var ctrlLines = [
    ['ARROWS', 'Move'],
    ['W', 'Jump'],
    ['A', 'Attack'],
    ['S', 'Throw'],
    ['D', 'Cycle Weapon'],
    ['HOLD A', 'Charge Attack']
  ];
  var col1X = GW / 2 - 110;
  var col2X = GW / 2 + 10;
  for (var i = 0; i < ctrlLines.length; i++) {
    var col = i < 3 ? 0 : 1;
    var row = i < 3 ? i : i - 3;
    var baseX = col === 0 ? col1X : col2X;
    var cy = ctrlY + row * 11;
    ctx.fillStyle = '#888';
    ctx.fillText(ctrlLines[i][0], baseX, cy);
    // Dotted leader
    ctx.fillStyle = '#444';
    var dotStart = baseX + ctx.measureText(ctrlLines[i][0]).width + 3;
    var dotEnd = baseX + 70;
    for (var dx = dotStart; dx < dotEnd; dx += 4) {
      ctx.fillRect(Math.floor(dx), cy - 2, 1, 1);
    }
    ctx.fillStyle = '#666';
    ctx.fillText(ctrlLines[i][1], dotEnd + 2, cy);
  }

  // Advanced controls
  ctx.fillStyle = '#555';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WALL JUMP: W at walls | SLIDE: Down+W | DIVE: Down+A (air)', GW / 2, Math.floor(GH * 0.78));

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, Math.floor(GH * 0.84));
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS JUMP OR ATTACK TO START', GW / 2, Math.floor(GH * 0.92));
  ctx.globalAlpha = 1;
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawTitleScreen();
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, GW, GH);
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: ZONE_NAMES[stage] || ('Stage: ' + stage) });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  ctx.save();
  drawPlatforms();
  drawWalls();
  drawHazards();
  drawPickups();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawProjectiles();
  ctx.restore();

  TAS.particles.draw();
  drawExtraParticles();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();

  // Zone name flash on stage start (PASS 3)
  drawZoneFlash();

  if (stageComplete) drawStageTransition();

  // Death animation overlay (PASS 3)
  drawDeathAnim();

  TAS.input.drawTouchControls(GW, GH);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
