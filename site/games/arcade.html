<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MfT Arcade — 100+ Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}

.scanlines {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 100;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
}

.arcade-header {
  text-align: center;
  padding: 40px 20px 10px;
}

.arcade-title {
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: linear-gradient(180deg, #ff6b6b 0%, #ffd93d 30%, #6bcb77 60%, #4d96ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,107,107,0.5));
  animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { filter: drop-shadow(0 0 20px rgba(255,107,107,0.5)); }
  50% { filter: drop-shadow(0 0 40px rgba(255,107,107,0.8)); }
}

.subtitle {
  color: #888;
  font-size: 0.85rem;
  margin-top: 6px;
  letter-spacing: 0.3em;
}

.game-count {
  color: #6bcb77;
  font-size: 0.75rem;
  margin-top: 4px;
  letter-spacing: 0.2em;
}

/* Search + Filter Bar */
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 20px 20px 10px;
  max-width: 900px;
  margin: 0 auto;
}

.search-box {
  flex: 1 1 250px;
  max-width: 350px;
  padding: 10px 16px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #111;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  outline: none;
}
.search-box:focus { border-color: #4d96ff; }
.search-box::placeholder { color: #555; }

.genre-filters {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  padding: 0 20px 20px;
  max-width: 900px;
  margin: 0 auto;
}

.genre-btn {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid #333;
  background: #111;
  color: #888;
  font-family: 'Courier New', monospace;
  font-size: 0.65rem;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.genre-btn:hover { border-color: #666; color: #ccc; }
.genre-btn.active { border-color: #4d96ff; color: #4d96ff; background: rgba(77,150,255,0.1); }

/* Featured game */
.featured {
  max-width: 900px;
  margin: 0 auto 20px;
  padding: 0 20px;
}

.featured-card {
  background: linear-gradient(135deg, #1a0f2e 0%, #16213e 100%);
  border: 2px solid #a855f7;
  border-radius: 12px;
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.featured-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(168,85,247,0.3);
}

.featured-icon { font-size: 3rem; }
.featured-info h3 {
  font-size: 1.3rem;
  color: #a855f7;
  margin-bottom: 4px;
}
.featured-info p {
  color: #aaa;
  font-size: 0.8rem;
  line-height: 1.4;
}
.featured-badge {
  display: inline-block;
  background: rgba(168,85,247,0.2);
  border: 1px solid rgba(168,85,247,0.4);
  color: #c084fc;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* Game Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 0 20px 40px;
  max-width: 1200px;
  margin: 0 auto;
}

.cabinet {
  background: linear-gradient(180deg, #141420 0%, #0f0f1a 100%);
  border: 1px solid #222;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  text-align: center;
  padding: 16px 10px 14px;
}

.cabinet:hover {
  transform: translateY(-4px);
  border-color: #4d96ff;
  box-shadow: 0 8px 24px rgba(77,150,255,0.15);
}

.cab-icon { font-size: 2rem; margin-bottom: 8px; display: block; }

.cab-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: #e0e0e0;
  letter-spacing: 0.03em;
  margin-bottom: 4px;
  line-height: 1.2;
}

.cab-genre {
  font-size: 0.55rem;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  color: #555;
  padding: 40px;
  font-size: 0.9rem;
}

/* Section label */
.section-label {
  text-align: center;
  padding: 10px 20px 6px;
  max-width: 1200px;
  margin: 0 auto;
}
.section-label span {
  font-size: 0.7rem;
  color: #555;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* TTRPG section */
.ttrpg-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 0 20px 20px;
  flex-wrap: wrap;
}

.ttrpg-card {
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 16px 24px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-width: 140px;
}
.ttrpg-card:hover { border-color: #8b5cf6; transform: translateY(-3px); }
.ttrpg-card .cab-icon { font-size: 1.8rem; }
.ttrpg-card .cab-title { color: #8b5cf6; }
.ttrpg-card .cab-genre { color: #555; }

.footer {
  text-align: center;
  padding: 20px;
  color: #333;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
}
.footer a { color: #555; text-decoration: none; }
.footer a:hover { color: #aaa; }

@media (max-width: 600px) {
  .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .cabinet { padding: 12px 8px 10px; }
  .cab-icon { font-size: 1.6rem; }
  .featured-card { flex-direction: column; text-align: center; }
}
</style>
</head>

];

// Get unique genres
const genres = [...new Set(GAMES.map(g => g.g))].sort();
let activeGenre = null;

// Build genre filter buttons
const filtersEl = document.getElementById('genreFilters');
const allBtn = document.createElement('button');
allBtn.className = 'genre-btn active';
allBtn.textContent = 'All';
allBtn.onclick = () => { activeGenre = null; filterGames(); };
filtersEl.appendChild(allBtn);

genres.forEach(genre => {
  const btn = document.createElement('button');
  btn.className = 'genre-btn';
  btn.textContent = genre;
  btn.onclick = () => {
    activeGenre = activeGenre === genre ? null : genre;
    filterGames();
  };
  filtersEl.appendChild(btn);
});

function filterGames() {
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = '';

  // Update filter button states
  document.querySelectorAll('.genre-btn').forEach(btn => {
    if (btn.textContent === 'All') btn.classList.toggle('active', !activeGenre);
    else btn.classList.toggle('active', btn.textContent === activeGenre);
  });

  let shown = 0;
  GAMES.forEach(game => {
    if (activeGenre && game.g !== activeGenre) return;
    if (q && !game.t.toLowerCase().includes(q) && !game.g.toLowerCase().includes(q)) return;

    const el = document.createElement('div');
    el.className = 'cabinet';
    el.onclick = () => location.href = game.f;
    el.innerHTML = `<span class="cab-icon">${game.i}</span><div class="cab-title">${game.t}</div><div class="cab-genre">${game.g}</div>`;
    grid.appendChild(el);
    shown++;
  });

  if (shown === 0) {
    grid.innerHTML = '<div class="no-results">No games found</div>';
  }

  document.getElementById('gameCount').textContent = shown + ' / ' + GAMES.length + ' games';
}

// NFT gate — then render
filterGames();
