<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Columns</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// WAGER game: getMults({ pvp: true }) clamps to the TIGHT 0.95–1.10 band so wagers stay a
// contest of skill, not of who fed their pet more (ARCADE-STATS Rule 2). The derived
// modifiers below were computed once; we keep statB's shape, synthesize its fields from the
// five bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20), and recompute
// the modifiers inside recomputeStats() so a title-screen pick applies. Per the falling-
// block guidance, SPD maps to a small soft-drop control bonus, never to harder gravity.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[token-columns] NftLoader display info failed:', e && e.message); }

// Derived stat modifiers — reassigned in recomputeStats() so a title-screen pick applies.
var STR_MATCH_POWER, DEX_SPEED_MULT, CON_EXTRA_ROWS, CON_EXTRA_LIVES,
    INT_SCORE_MULT, WIS_PREVIEW, WIS_HOLD, CHA_GEM_LUCK;
function recomputeStats() {
  // WAGER game -> pvp band (0.95–1.10).
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults({ pvp: true }) : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  STR_MATCH_POWER = Math.floor(statB.str / 5);       // match clears extra cells at high STR
  DEX_SPEED_MULT = 1.0 - (statB.dex - 10) * 0.015;   // higher DEX = slower drop (more control)
  CON_EXTRA_ROWS = Math.floor((statB.con - 10) / 5); // extra bin rows
  CON_EXTRA_LIVES = Math.floor((statB.con - 10) / 4);// extra drops allowed
  INT_SCORE_MULT = 1.0 + (statB.int - 10) * 0.03;    // score multiplier
  WIS_PREVIEW = Math.min(3, Math.floor((statB.wis - 10) / 5) + 1); // next tokens shown
  WIS_HOLD = statB.wis >= 14;                         // can hold a piece at WIS 14+
  CHA_GEM_LUCK = (statB.cha - 10) * 0.008;            // bonus gem/special chance
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[token-columns] player init failed:', e && e.message); });
}

// === CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b','x','y','c'], labels: { a: 'DROP', b: 'FLIP', x: 'HOLD', y: 'HARD', c: 'PICK' } });

var COLS = 6;
var ROWS = 12 + CON_EXTRA_ROWS;                   // CON: extra rows
var CELL = 24;
var BIN_X = (GW - COLS * CELL) / 2;
var BIN_Y = GH - ROWS * CELL - 18;
var RAMP_TOP = 55;
var RAMP_BOTTOM = BIN_Y - 40;
var PADDLE_Y = RAMP_BOTTOM;
var PADDLE_W = 36;
var MAX_STACK = 5;
var MAX_DROPS = 3 + CON_EXTRA_LIVES;               // CON: extra lives

// === SPORE GEM TYPES ===
var GEM_COLORS = ['#f4b41b', '#7a444a', '#38d973', '#a855f7', '#3cacd7', '#e6482e'];
var GEM_NAMES  = ['Gilded Spore', 'Mold Shard', 'Moss Gem', 'Mycelium', 'Fungi Crystal', 'Ember Cap'];
var GEM_SYMBOLS = ['G', 'M', 'F', 'S', 'C', 'E'];

// Special types: 0=wild, 1=bomb, 2=x2, 3=reactor, 4=sporeBlock
var SPECIAL_COLORS = ['#ffffff', '#e6482e', '#f4b41b', '#3cacd7', '#38d973'];
var SPECIAL_SYMBOLS = ['W', 'X', '2', 'R', 'P'];

// Reactor block: can only be cleared by adjacent matches (not matched itself)
// Spore block: spreads to adjacent empty cells each turn if not cleared

// === COMBO TABLE ===
// Named combos for specific gem pairings
var COMBO_NAMES = {
  '0+3': { name: 'Golden POOP', bonus: 200, color: '#f4b41b' },
  '1+4': { name: 'Fossilized Fungi', bonus: 250, color: '#3cacd7' },
  '2+5': { name: 'Garden Blaze', bonus: 300, color: '#e6482e' },
  '0+4': { name: 'Spore Seed', bonus: 150, color: '#f4b41b' },
  '3+5': { name: 'Mycelium Fire', bonus: 350, color: '#a855f7' },
  '1+2': { name: 'Compost Mulch', bonus: 180, color: '#38d973' }
};

// === BOSS PUZZLE DEFINITIONS ===
// Every 5th wave is a boss puzzle: a pre-set board that must be cleared in limited moves
var BOSS_PUZZLES = [
  // Boss 1 (wave 5): Simple pattern
  {
    name: 'The Compost Heap',
    moves: 12,
    layout: [
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,{t:3},{t:3},{t:3},{t:3},null],
      [null,{t:3},{t:0},{t:0},{t:3},null],
      [{t:3},{t:3},{t:0},{t:0},{t:3},{t:3}],
      [{t:3},{t:0},{t:0},{t:0},{t:0},{t:3}]
    ]
  },
  // Boss 2 (wave 10): Reactor blocks
  {
    name: 'Power Plant Core',
    moves: 15,
    layout: [
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,{t:4},{t:4},null,null],
      [null,{t:1},{t:4,s:3},{t:4,s:3},{t:1},null],
      [{t:2},{t:1},{t:4},{t:4},{t:1},{t:2}],
      [{t:2},{t:1},{t:1},{t:1},{t:1},{t:2}],
      [{t:2},{t:2},{t:5},{t:5},{t:2},{t:2}],
      [{t:5},{t:5},{t:5},{t:2},{t:5},{t:5}]
    ]
  },
  // Boss 3 (wave 15): Mixed madness
  {
    name: 'Garden Depths',
    moves: 18,
    layout: [
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,{t:4},null,null,{t:4},null],
      [{t:4},{t:4},{t:4},null,{t:4},{t:4}],
      [{t:0},{t:1},{t:2},{t:0},{t:1},{t:2}],
      [{t:3},{t:4},{t:5},{t:3},{t:4},{t:5}],
      [{t:0},{t:0},{t:0,s:3},{t:1,s:3},{t:1},{t:1}],
      [{t:2},{t:3},{t:4},{t:5},{t:0},{t:1}],
      [{t:2},{t:2},{t:3},{t:3},{t:4},{t:4}],
      [{t:5},{t:5},{t:5},{t:0},{t:0},{t:0}]
    ]
  },
  // Boss 4 (wave 20): Nightmare
  {
    name: 'The Mycelium',
    moves: 20,
    layout: [
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [null,null,null,null,null,null],
      [{t:3,s:4},null,{t:3,s:4},null,{t:3,s:4},null],
      [{t:1},{t:3},{t:1},{t:3},{t:1},{t:3}],
      [{t:0},{t:0},{t:2},{t:2},{t:4},{t:4}],
      [{t:5},{t:5},{t:0,s:3},{t:0,s:3},{t:5},{t:5}],
      [{t:1},{t:2},{t:3},{t:4},{t:5},{t:0}],
      [{t:0},{t:1},{t:2},{t:3},{t:4},{t:5}],
      [{t:3},{t:3},{t:3,s:3},{t:4,s:3},{t:4},{t:4}],
      [{t:1},{t:1},{t:5},{t:5},{t:2},{t:2}],
      [{t:0},{t:0},{t:0},{t:1},{t:1},{t:1}]
    ]
  }
];

// === WAVE DEFINITIONS ===
var WAVES = [];
(function buildWaves() {
  var objectives = [
    {type:'horizontal', count:2, label:'Get 2 Horizontals'},
    {type:'score', count:500, label:'Score 500 pts'},
    {type:'survive', count:20, label:'Survive 20 spores'},
    {type:'horizontal', count:3, label:'Get 3 Horizontals'},
    {type:'boss', count:0, label:'BOSS: The Compost Heap'},
    {type:'score', count:1500, label:'Score 1,500 pts'},
    {type:'chain', count:2, label:'Get a 2-chain'},
    {type:'vertical', count:3, label:'Get 3 Verticals'},
    {type:'survive', count:35, label:'Survive 35 spores'},
    {type:'boss', count:1, label:'BOSS: Power Plant Core'},
    {type:'score', count:3000, label:'Score 3,000 pts'},
    {type:'diagonal', count:2, label:'Get 2 Diagonals'},
    {type:'chain', count:3, label:'Get a 3-chain'},
    {type:'horizontal', count:5, label:'Get 5 Horizontals'},
    {type:'boss', count:2, label:'BOSS: Garden Depths'},
    {type:'score', count:5000, label:'Score 5,000 pts'},
    {type:'survive', count:50, label:'Survive 50 spores'},
    {type:'chain', count:4, label:'Get a 4-chain'},
    {type:'diagonal', count:4, label:'Get 4 Diagonals'},
    {type:'boss', count:3, label:'BOSS: The Mycelium'}
  ];
  for (var i = 0; i < 20; i++) {
    var speedTier = Math.floor(i / 5);
    WAVES.push({
      objective: objectives[i],
      speed: 40 + speedTier * 20,
      tokenCount: 30 + i * 5,
      specialChance: i >= 4 ? 0.08 + (i - 4) * 0.005 : 0,
      tier: speedTier  // 0=garden, 1=pipeline, 2=powerplant, 3=mycelium
    });
  }
})();

// === THEMED BACKGROUNDS ===
var THEMES = [
  { name: 'Community Garden',  bg: '#0a1210', grid: '#0d1f18', border: '#38d973', accent: '#38d973', stars: '#1a3322' },
  { name: 'POOP Pipeline',    bg: '#12090e', grid: '#1c0d15', border: '#7a444a', accent: '#f4b41b', stars: '#2a1520' },
  { name: 'Power Plant',      bg: '#1a0c08', grid: '#220d0d', border: '#e6482e', accent: '#f4b41b', stars: '#331a1a' },
  { name: 'Mycelium Depths',  bg: '#0f0a14', grid: '#160d1f', border: '#a855f7', accent: '#a855f7', stars: '#221533' }
];

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('tokencolumns_hi');
var frame = 0;
var tutorialShown = false;
var showTutorial = false;
var tutorialPage = 0;
var tutorialTimer = 0;

var wave = 0;
var waveProgress = 0;
var waveObjective = null;
var dropsLeft = MAX_DROPS;
var tokensSpawned = 0;
var tokensSurvived = 0;
var maxChain = 0;

var paddleCol = 3;
var paddleStack = [];
var bin = [];       // bin[col][row], null or {type, special}

var holdPiece = null;   // WIS: held piece
var holdUsed = false;   // can only hold once per drop

var rampTokens = [];    // {x, y, type, special, speed}
var spawnTimer = 0;
var spawnInterval = 1.5;

var nextQueue = [];     // WIS: preview queue

var clearing = false;
var clearTimer = 0;
var clearCells = [];
var chainCount = 0;
var gravityTimer = 0;

var waveIntroTimer = 0;
var waveCompleteTimer = 0;
var gameOverReason = '';

// Boss mode state
var bossMode = false;
var bossMovesLeft = 0;
var bossCellsLeft = 0;
var bossName = '';

// Score tracking for wave
var waveScore = 0;
var waveHorizontals = 0;
var waveVerticals = 0;
var waveDiagonals = 0;
var waveChainMax = 0;

// Combo display
var comboDisplay = null;  // {name, bonus, color, timer}
var comboShakeTimer = 0;

// Spore spread timer
var sporeSpreadTimer = 0;
var SPORE_SPREAD_INTERVAL = 8.0;

// Background stars/particles
var bgStars = [];
(function initStars() {
  for (var i = 0; i < 40; i++) {
    bgStars.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 8 + 2,
      flicker: Math.random() * Math.PI * 2
    });
  }
})();

// Swipe tracking
var touchStartX = 0;
var touchStartY = 0;
var touchActive = false;
var swipeHandled = false;

// === INIT FUNCTIONS ===
function initBin() {
  bin = [];
  for (var c = 0; c < COLS; c++) {
    bin[c] = [];
    for (var r = 0; r < ROWS; r++) {
      bin[c][r] = null;
    }
  }
}

function fillNextQueue() {
  while (nextQueue.length < WIS_PREVIEW) {
    var type = TAS.math.randInt(0, 5);
    var special = -1;
    var w = WAVES[Math.min(wave, WAVES.length - 1)];
    var chance = w.specialChance + CHA_GEM_LUCK; // CHA: bonus special chance
    if (chance > 0 && Math.random() < chance) {
      special = TAS.math.randInt(0, 2);
      // CHA: higher charisma = more reactor/spore specials at high waves
      if (statB.cha >= 14 && wave >= 8 && Math.random() < 0.2) {
        special = TAS.math.randInt(3, 4);
      }
    }
    nextQueue.push({ type: type, special: special });
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  wave = 0;
  dropsLeft = MAX_DROPS;
  paddleCol = 3;
  paddleStack = [];
  rampTokens = [];
  spawnTimer = 0;
  clearing = false;
  clearCells = [];
  chainCount = 0;
  holdPiece = null;
  holdUsed = false;
  nextQueue = [];
  comboDisplay = null;
  bossMode = false;
  TAS.particles.clear();
  initBin();

  // Show tutorial on first play
  if (!tutorialShown) {
    showTutorial = true;
    tutorialPage = 0;
    tutorialTimer = 0;
    tutorialShown = true;
    state = 'tutorial';
    return;
  }

  startWave();
}

function startWave() {
  var w = WAVES[wave];
  waveObjective = w.objective;
  waveProgress = 0;
  waveScore = 0;
  waveHorizontals = 0;
  waveVerticals = 0;
  waveDiagonals = 0;
  waveChainMax = 0;
  tokensSpawned = 0;
  tokensSurvived = 0;
  maxChain = 0;
  rampTokens = [];
  spawnTimer = 0;
  spawnInterval = Math.max(0.4, 2.0 - wave * 0.07);
  sporeSpreadTimer = SPORE_SPREAD_INTERVAL;
  holdUsed = false;
  comboDisplay = null;

  fillNextQueue();

  // Check if boss wave
  if (waveObjective.type === 'boss') {
    bossMode = true;
    var puzzleIdx = waveObjective.count;
    var puzzle = BOSS_PUZZLES[puzzleIdx];
    bossName = puzzle.name;
    bossMovesLeft = puzzle.moves + STR_MATCH_POWER; // STR: extra moves in boss
    initBin();
    // Load puzzle layout
    for (var r = 0; r < ROWS && r < puzzle.layout.length; r++) {
      for (var c = 0; c < COLS && c < puzzle.layout[r].length; c++) {
        var cell = puzzle.layout[r][c];
        if (cell) {
          bin[c][r] = { type: cell.t, special: cell.s !== undefined ? cell.s : -1, flash: 0 };
        }
      }
    }
    bossCellsLeft = countBinCells();
  } else {
    bossMode = false;
  }

  waveIntroTimer = 2.5;
  state = 'waveIntro';
}

function countBinCells() {
  var count = 0;
  for (var c = 0; c < COLS; c++) {
    for (var r = 0; r < ROWS; r++) {
      if (bin[c][r]) count++;
    }
  }
  return count;
}

function checkWaveComplete() {
  var obj = waveObjective;
  if (obj.type === 'boss') {
    return countBinCells() === 0;
  }
  if (obj.type === 'horizontal') return waveHorizontals >= obj.count;
  if (obj.type === 'vertical') return waveVerticals >= obj.count;
  if (obj.type === 'diagonal') return waveDiagonals >= obj.count;
  if (obj.type === 'score') return waveScore >= obj.count;
  if (obj.type === 'survive') return tokensSurvived >= obj.count;
  if (obj.type === 'chain') return waveChainMax >= obj.count;
  return false;
}

function getWaveProgressText() {
  var obj = waveObjective;
  if (obj.type === 'boss') {
    var left = countBinCells();
    return left + ' left | ' + bossMovesLeft + ' moves';
  }
  if (obj.type === 'horizontal') return waveHorizontals + '/' + obj.count;
  if (obj.type === 'vertical') return waveVerticals + '/' + obj.count;
  if (obj.type === 'diagonal') return waveDiagonals + '/' + obj.count;
  if (obj.type === 'score') return waveScore + '/' + obj.count;
  if (obj.type === 'survive') return tokensSurvived + '/' + obj.count;
  if (obj.type === 'chain') return waveChainMax + '/' + obj.count;
  return '';
}

function getNextFromQueue() {
  if (nextQueue.length === 0) fillNextQueue();
  var item = nextQueue.shift();
  fillNextQueue();
  return item;
}

function spawnToken() {
  var next = getNextFromQueue();
  var col = TAS.math.randInt(0, COLS - 1);
  var w = WAVES[wave];
  var speed = w.speed * DEX_SPEED_MULT;           // DEX: speed control
  rampTokens.push({
    x: BIN_X + col * CELL + CELL / 2,
    y: RAMP_TOP,
    type: next.type,
    special: next.special,
    speed: speed,
    col: col
  });
  tokensSpawned++;
}

function dropToken(token) {
  dropsLeft--;
  TAS.audio.playTone(150, 0.2, 'sawtooth', 0.06, 80);
  TAS.particles.spawn(token.x, PADDLE_Y, '#ff4444', 6, 2);
  if (dropsLeft <= 0) {
    gameOverReason = 'Too many spore drops!';
    endGame();
  }
}

function catchToken(token) {
  if (paddleStack.length >= MAX_STACK) {
    dropToken(token);
    return;
  }
  paddleStack.push({ type: token.type, special: token.special });
  tokensSurvived++;
  TAS.audio.playTone(440 + paddleStack.length * 80, 0.08, 'square', 0.06);
}

function holdCurrentPiece() {
  // WIS: hold mechanic (requires WIS >= 14)
  if (!WIS_HOLD) return;
  if (holdUsed) return;
  if (paddleStack.length === 0) return;

  var top = paddleStack.shift();
  if (holdPiece) {
    paddleStack.unshift(holdPiece);
  }
  holdPiece = top;
  holdUsed = true;
  TAS.audio.playTone(350, 0.08, 'triangle', 0.05);
}

function dropStack() {
  if (paddleStack.length === 0) return;

  if (bossMode) {
    bossMovesLeft--;
    if (bossMovesLeft <= 0 && countBinCells() > 0) {
      gameOverReason = 'Out of moves!';
      endGame();
      return;
    }
  }

  var col = paddleCol;
  var emptyRow = -1;
  for (var r = ROWS - 1; r >= 0; r--) {
    if (!bin[col][r]) { emptyRow = r; break; }
  }
  if (emptyRow < 0) {
    TAS.audio.playTone(100, 0.3, 'sawtooth', 0.05);
    return;
  }

  var placed = 0;
  for (var i = paddleStack.length - 1; i >= 0; i--) {
    var row = emptyRow - placed;
    if (row < 0) break;
    bin[col][row] = { type: paddleStack[i].type, special: paddleStack[i].special, flash: 6 };
    placed++;
  }
  paddleStack = [];
  holdUsed = false;
  TAS.audio.playTone(220, 0.1, 'triangle', 0.05);
  TAS.audio.playTone(330, 0.1, 'triangle', 0.04);

  // Particles on drop
  for (var p = 0; p < placed; p++) {
    var py = BIN_Y + (emptyRow - p) * CELL + CELL / 2;
    var px = BIN_X + col * CELL + CELL / 2;
    TAS.particles.spawn(px, py, statB.color, 3, 1, { gravity: 0.3 });
  }

  chainCount = 0;
  setTimeout(function() { checkMatches(); }, 100);
}

function hardDrop() {
  // Instant drop - skip ramp, tokens go directly into bin
  if (paddleStack.length === 0 && rampTokens.length === 0) return;

  // If there's a token on the ramp heading toward paddle col, catch it instantly
  for (var t = rampTokens.length - 1; t >= 0; t--) {
    var tok = rampTokens[t];
    var tokCol = Math.floor((tok.x - BIN_X) / CELL);
    if (tokCol === paddleCol && paddleStack.length < MAX_STACK) {
      catchToken(tok);
      rampTokens.splice(t, 1);
    }
  }

  if (paddleStack.length > 0) {
    dropStack();
  }
}

function flipStack() {
  if (paddleStack.length < 2) return;
  var bottom = paddleStack.pop();
  paddleStack.unshift(bottom);
  TAS.audio.playTone(600, 0.05, 'square', 0.04);
}

// === MATCH CHECKING ===
function checkMatches() {
  var matched = [];
  var matchInfo = { horizontal: 0, vertical: 0, diagonal: 0 };

  // Horizontals
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c <= COLS - 3; c++) {
      var run = getMatchRun(c, r, 1, 0);
      if (run.length >= 3) {
        for (var i = 0; i < run.length; i++) addUnique(matched, run[i]);
        matchInfo.horizontal++;
      }
    }
  }

  // Verticals
  for (var c2 = 0; c2 < COLS; c2++) {
    for (var r2 = 0; r2 <= ROWS - 3; r2++) {
      var run2 = getMatchRun(c2, r2, 0, 1);
      if (run2.length >= 3) {
        for (var j = 0; j < run2.length; j++) addUnique(matched, run2[j]);
        matchInfo.vertical++;
      }
    }
  }

  // Diagonals down-right
  for (var c3 = 0; c3 <= COLS - 3; c3++) {
    for (var r3 = 0; r3 <= ROWS - 3; r3++) {
      var run3 = getMatchRun(c3, r3, 1, 1);
      if (run3.length >= 3) {
        for (var k = 0; k < run3.length; k++) addUnique(matched, run3[k]);
        matchInfo.diagonal++;
      }
    }
  }

  // Diagonals down-left
  for (var c4 = COLS - 1; c4 >= 2; c4--) {
    for (var r4 = 0; r4 <= ROWS - 3; r4++) {
      var run4 = getMatchRun(c4, r4, -1, 1);
      if (run4.length >= 3) {
        for (var m = 0; m < run4.length; m++) addUnique(matched, run4[m]);
        matchInfo.diagonal++;
      }
    }
  }

  if (matched.length > 0) {
    chainCount++;
    if (chainCount > waveChainMax) waveChainMax = chainCount;
    if (chainCount > maxChain) maxChain = chainCount;

    waveHorizontals += matchInfo.horizontal;
    waveVerticals += matchInfo.vertical;
    waveDiagonals += matchInfo.diagonal;

    // Calculate score
    var baseScore = 0;
    var hasX2 = false;
    var hasBomb = false;
    var bombCells = [];
    var matchTypes = {};

    for (var n = 0; n < matched.length; n++) {
      var cell = bin[matched[n].c][matched[n].r];
      if (cell) {
        if (cell.special === 2) hasX2 = true;
        if (cell.special === 1) {
          hasBomb = true;
          bombCells.push(matched[n]);
        }
        matchTypes[cell.type] = true;
      }
    }

    // Check for named combos
    var typeKeys = Object.keys(matchTypes).sort();
    if (typeKeys.length >= 2) {
      for (var ti = 0; ti < typeKeys.length - 1; ti++) {
        for (var tj = ti + 1; tj < typeKeys.length; tj++) {
          var comboKey = typeKeys[ti] + '+' + typeKeys[tj];
          if (COMBO_NAMES[comboKey]) {
            var combo = COMBO_NAMES[comboKey];
            comboDisplay = { name: combo.name, bonus: combo.bonus, color: combo.color, timer: 2.0 };
            baseScore += combo.bonus;
            comboShakeTimer = 0.3;
            TAS.fx.shake(4, 0.9);
            // Combo particles
            for (var cp = 0; cp < 8; cp++) {
              TAS.particles.spawn(GW / 2 + (Math.random() - 0.5) * 80, GH / 3, combo.color, 2, 3, { gravity: -0.5 });
            }
          }
        }
      }
    }

    // STR: extra cells cleared on large matches
    if (matched.length >= 4 && STR_MATCH_POWER > 0) {
      var extraCleared = 0;
      for (var si = 0; si < matched.length && extraCleared < STR_MATCH_POWER; si++) {
        var mc = matched[si].c;
        var mr = matched[si].r;
        // Clear adjacent cells not already in matched
        var adj = [{c:mc-1,r:mr},{c:mc+1,r:mr},{c:mc,r:mr-1},{c:mc,r:mr+1}];
        for (var ai = 0; ai < adj.length && extraCleared < STR_MATCH_POWER; ai++) {
          var ac = adj[ai].c;
          var ar = adj[ai].r;
          if (ac >= 0 && ac < COLS && ar >= 0 && ar < ROWS && bin[ac][ar]) {
            var alreadyMatched = false;
            for (var ami = 0; ami < matched.length; ami++) {
              if (matched[ami].c === ac && matched[ami].r === ar) { alreadyMatched = true; break; }
            }
            if (!alreadyMatched) {
              addUnique(matched, {c: ac, r: ar});
              extraCleared++;
            }
          }
        }
      }
      if (extraCleared > 0) {
        // STR flash
        TAS.fx.flash('#ff6644', 0.1);
      }
    }

    // Score based on match size
    if (matched.length === 3) baseScore += 100;
    else if (matched.length === 4) baseScore += 300;
    else if (matched.length === 5) baseScore += 600;
    else baseScore += 1000 + (matched.length - 5) * 200;

    // Diagonal bonus
    if (matchInfo.diagonal > 0) baseScore *= 2;
    // Chain multiplier
    if (chainCount > 1) baseScore *= chainCount;
    // X2 bonus
    if (hasX2) baseScore *= 2;
    // INT: score multiplier
    baseScore = Math.floor(baseScore * INT_SCORE_MULT);

    score += baseScore;
    waveScore += baseScore;

    // Handle bomb - clear adjacent
    if (hasBomb) {
      for (var bi = 0; bi < bombCells.length; bi++) {
        var bc = bombCells[bi].c;
        var br = bombCells[bi].r;
        for (var dc = -1; dc <= 1; dc++) {
          for (var dr = -1; dr <= 1; dr++) {
            var nc = bc + dc;
            var nr = br + dr;
            if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && bin[nc][nr]) {
              addUnique(matched, {c: nc, r: nr});
            }
          }
        }
      }
      TAS.fx.shake(8, 0.85);
      // Bomb particles
      for (var bpi = 0; bpi < 12; bpi++) {
        TAS.particles.spawn(
          BIN_X + bombCells[0].c * CELL + CELL / 2,
          BIN_Y + bombCells[0].r * CELL + CELL / 2,
          '#ff3333', 3, 4, { gravity: 0.8 }
        );
      }
    }

    // Handle reactor blocks: adjacent matched cells destroy reactor blocks
    var reactorsCleared = [];
    for (var ri = 0; ri < matched.length; ri++) {
      var rc = matched[ri].c;
      var rr = matched[ri].r;
      var radj = [{c:rc-1,r:rr},{c:rc+1,r:rr},{c:rc,r:rr-1},{c:rc,r:rr+1}];
      for (var raj = 0; raj < radj.length; raj++) {
        var rac = radj[raj].c;
        var rar = radj[raj].r;
        if (rac >= 0 && rac < COLS && rar >= 0 && rar < ROWS) {
          var rcell = bin[rac][rar];
          if (rcell && rcell.special === 3) {
            addUnique(reactorsCleared, {c: rac, r: rar});
          }
        }
      }
    }
    for (var rci = 0; rci < reactorsCleared.length; rci++) {
      addUnique(matched, reactorsCleared[rci]);
      // Reactor clear particles
      TAS.particles.spawn(
        BIN_X + reactorsCleared[rci].c * CELL + CELL / 2,
        BIN_Y + reactorsCleared[rci].r * CELL + CELL / 2,
        '#3cacd7', 5, 3, { gravity: -0.3 }
      );
    }

    // Clear matched cells
    clearCells = matched;
    clearing = true;
    clearTimer = 0.4;

    // Match particles and sound
    for (var mp = 0; mp < matched.length; mp++) {
      var mpx = BIN_X + matched[mp].c * CELL + CELL / 2;
      var mpy = BIN_Y + matched[mp].r * CELL + CELL / 2;
      var mcell = bin[matched[mp].c][matched[mp].r];
      var mcolor = mcell ? GEM_COLORS[mcell.type] : '#fff';
      TAS.particles.spawn(mpx, mpy, mcolor, 4, 3, { gravity: 0.5 });
    }

    // Chain shake
    if (chainCount > 1) {
      TAS.fx.shake(2 + chainCount, 0.9);
      comboShakeTimer = 0.2;
    }

    TAS.audio.playTone(523 + chainCount * 100, 0.15, 'square', 0.07);
    if (chainCount > 1) {
      TAS.audio.playTone(659 + chainCount * 80, 0.12, 'triangle', 0.05);
    }
    TAS.fx.flash('#fff', 0.15);
  } else {
    clearing = false;
    chainCount = 0;
  }
}

function getMatchRun(startC, startR, dc, dr) {
  var first = bin[startC][startR];
  if (!first) return [];
  // Reactor blocks and spore blocks cannot be part of a match run
  if (first.special === 3 || first.special === 4) return [];
  var firstType = first.special === 0 ? -1 : first.type;
  var run = [{c: startC, r: startR}];
  var matchType = firstType === -1 ? -1 : firstType;

  for (var i = 1; i < Math.max(COLS, ROWS); i++) {
    var c = startC + dc * i;
    var r = startR + dr * i;
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) break;
    var cell = bin[c][r];
    if (!cell) break;
    if (cell.special === 3 || cell.special === 4) break; // blocked by reactor/spore
    var cellType = cell.special === 0 ? -1 : cell.type;

    if (matchType === -1) {
      if (cellType !== -1) matchType = cellType;
      run.push({c: c, r: r});
    } else if (cellType === -1 || cellType === matchType) {
      run.push({c: c, r: r});
    } else {
      break;
    }
  }

  if (run.length >= 3) return run;
  return [];
}

function addUnique(arr, item) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].c === item.c && arr[i].r === item.r) return;
  }
  arr.push(item);
}

function applyGravity() {
  var moved = false;
  for (var c = 0; c < COLS; c++) {
    for (var r = ROWS - 1; r >= 1; r--) {
      if (!bin[c][r] && bin[c][r - 1]) {
        bin[c][r] = bin[c][r - 1];
        bin[c][r - 1] = null;
        moved = true;
      }
    }
  }
  return moved;
}

function spreadSpores() {
  // Spore blocks (special === 4) spread to one adjacent empty cell
  var spreads = [];
  for (var c = 0; c < COLS; c++) {
    for (var r = 0; r < ROWS; r++) {
      var cell = bin[c][r];
      if (cell && cell.special === 4) {
        var adj = [{c:c-1,r:r},{c:c+1,r:r},{c:c,r:r+1}];
        for (var a = 0; a < adj.length; a++) {
          var ac = adj[a].c;
          var ar = adj[a].r;
          if (ac >= 0 && ac < COLS && ar >= 0 && ar < ROWS && !bin[ac][ar]) {
            spreads.push({c: ac, r: ar, type: cell.type});
            break; // only one spread per spore per cycle
          }
        }
      }
    }
  }
  for (var s = 0; s < spreads.length; s++) {
    bin[spreads[s].c][spreads[s].r] = { type: spreads[s].type, special: 4, flash: 4 };
    TAS.particles.spawn(
      BIN_X + spreads[s].c * CELL + CELL / 2,
      BIN_Y + spreads[s].r * CELL + CELL / 2,
      '#38d973', 3, 2, { gravity: -0.2 }
    );
  }
  if (spreads.length > 0) {
    TAS.audio.playTone(180, 0.15, 'sawtooth', 0.04);
  }
}

function isBinFull() {
  for (var c = 0; c < COLS; c++) {
    if (bin[c][0]) return true;
  }
  return false;
}

function endGame() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('tokencolumns_hi', score);
  }
  TAS.fx.shake(10, 0.9);
  TAS.audio.playNoise(0.5, 0.08, 200);
  // Death particles
  for (var dp = 0; dp < 20; dp++) {
    TAS.particles.spawn(
      TAS.math.randRange(BIN_X, BIN_X + COLS * CELL),
      TAS.math.randRange(BIN_Y, BIN_Y + ROWS * CELL),
      GEM_COLORS[TAS.math.randInt(0, 5)], 2, 3, { gravity: 1 }
    );
  }
}

// === TOUCH HANDLING ===
TAS.input.onTouch('start', function(e) {
  if (e.touches.length > 0) {
    var rect = TAS.canvas.getBoundingClientRect();
    touchStartX = e.touches[0].clientX - rect.left;
    touchStartY = e.touches[0].clientY - rect.top;
    touchActive = true;
    swipeHandled = false;
  }
});

TAS.input.onTouch('end', function(e) {
  if (touchActive && !swipeHandled) {
    if (state === 'playing') {
      dropStack();
    }
  }
  touchActive = false;
});

// === UPDATE ===
var moveDelay = 0;
var prevLeft = false;
var prevRight = false;
var prevDown = false;
var prevA = false;
var prevB = false;
var prevX = false;
var prevY = false;

function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Update combo display
  if (comboDisplay) {
    comboDisplay.timer -= dt;
    if (comboDisplay.timer <= 0) comboDisplay = null;
  }
  if (comboShakeTimer > 0) comboShakeTimer -= dt;

  // Update background stars
  for (var si = 0; si < bgStars.length; si++) {
    var star = bgStars[si];
    star.y += star.speed * dt;
    star.flicker += dt * 2;
    if (star.y > GH) {
      star.y = -2;
      star.x = Math.random() * GW;
    }
  }

  // === TITLE STATE ===
  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; // consume so it doesn't also start the game
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  // === TUTORIAL STATE ===
  if (state === 'tutorial') {
    tutorialTimer += dt;
    var anyKey = TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a || TAS.input.touch.b;
    if (anyKey && tutorialTimer > 0.5) {
      tutorialPage++;
      tutorialTimer = 0;
      if (tutorialPage >= 4) {
        showTutorial = false;
        state = 'playing';
        startWave();
      }
      TAS.input.keys['Enter'] = false;
      TAS.input.keys[' '] = false;
    }
    return;
  }

  // === GAME OVER STATE ===
  if (state === 'gameOver') {
    if (frame % 4 === 0) {
      TAS.particles.spawn(TAS.math.randRange(40, GW - 40), TAS.math.randRange(100, GH - 100), GEM_COLORS[TAS.math.randInt(0, 5)], 1, 1);
    }
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      state = 'title';
      TAS.input.keys['Enter'] = false;
      TAS.input.keys[' '] = false;
    }
    return;
  }

  // === WAVE INTRO STATE ===
  if (state === 'waveIntro') {
    waveIntroTimer -= dt;
    if (waveIntroTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  // === WAVE COMPLETE STATE ===
  if (state === 'waveComplete') {
    waveCompleteTimer -= dt;
    if (frame % 3 === 0) {
      TAS.particles.spawn(
        TAS.math.randRange(40, GW - 40),
        TAS.math.randRange(GH * 0.2, GH * 0.6),
        getCurrentTheme().accent, 1, 2, { gravity: -0.5 }
      );
    }
    if (waveCompleteTimer <= 0) {
      wave++;
      if (wave >= 20) {
        gameOverReason = 'ALL GARDENS HARVESTED!';
        endGame();
      } else {
        startWave();
      }
    }
    return;
  }

  if (state !== 'playing') return;

  // Handle clearing animation
  if (clearing) {
    clearTimer -= dt;
    if (clearTimer <= 0) {
      for (var ci = 0; ci < clearCells.length; ci++) {
        bin[clearCells[ci].c][clearCells[ci].r] = null;
      }
      clearCells = [];
      clearing = false;
      gravityTimer = 0.15;
    }
    return;
  }

  // Handle gravity
  if (gravityTimer > 0) {
    gravityTimer -= dt;
    if (gravityTimer <= 0) {
      var moved = applyGravity();
      if (moved) {
        gravityTimer = 0.1;
      } else {
        checkMatches();
      }
    }
    return;
  }

  // Spore spread timer (only in non-boss waves with spores present)
  if (!bossMode && wave >= 8) {
    sporeSpreadTimer -= dt;
    if (sporeSpreadTimer <= 0) {
      spreadSpores();
      sporeSpreadTimer = SPORE_SPREAD_INTERVAL;
    }
  }

  // Handle swipe detection
  if (touchActive && !swipeHandled) {
    var rect = TAS.canvas.getBoundingClientRect();
    if (window.event && window.event.touches && window.event.touches.length > 0) {
      var cx = window.event.touches[0].clientX - rect.left;
      var cy = window.event.touches[0].clientY - rect.top;
      var dx = cx - touchStartX;
      var dy = cy - touchStartY;
      if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && paddleCol < COLS - 1) paddleCol++;
        else if (dx < 0 && paddleCol > 0) paddleCol--;
        touchStartX = cx;
        swipeHandled = true;
      } else if (dy > 30 && Math.abs(dy) > Math.abs(dx)) {
        dropStack();
        swipeHandled = true;
      }
    }
  }

  // NES-style keyboard controls
  moveDelay -= dt;
  var leftNow = TAS.input.keys['ArrowLeft'] || TAS.input.keys['a'] || TAS.input.touch.left;
  var rightNow = TAS.input.keys['ArrowRight'] || TAS.input.keys['d'] || TAS.input.touch.right;
  var downNow = TAS.input.keys['ArrowDown'] || TAS.input.keys['s'] || TAS.input.touch.down;
  var aNow = TAS.input.keys[' '] || TAS.input.keys['z'] || TAS.input.touch.a;     // A = drop
  var bNow = TAS.input.keys['x'] || TAS.input.keys['ArrowUp'] || TAS.input.touch.b; // B = flip
  var xNow = TAS.input.keys['c'] || TAS.input.keys['Shift'] || TAS.input.touch.x;  // X = hold (WIS)
  var yNow = TAS.input.keys['v'] || TAS.input.keys['Control'] || TAS.input.touch.y; // Y = hard drop

  if (leftNow && !prevLeft) {
    if (paddleCol > 0) paddleCol--;
    TAS.audio.playTone(200, 0.03, 'square', 0.03);
  }
  if (rightNow && !prevRight) {
    if (paddleCol < COLS - 1) paddleCol++;
    TAS.audio.playTone(200, 0.03, 'square', 0.03);
  }
  if (aNow && !prevA) {
    dropStack();
  }
  if (bNow && !prevB) {
    flipStack();
  }
  if (xNow && !prevX) {
    holdCurrentPiece();
  }
  if (yNow && !prevY) {
    hardDrop();
  }

  prevLeft = leftNow;
  prevRight = rightNow;
  prevDown = downNow;
  prevA = aNow;
  prevB = bNow;
  prevX = xNow;
  prevY = yNow;

  // Spawn tokens (not in boss mode)
  if (!bossMode) {
    spawnTimer -= dt;
    if (spawnTimer <= 0 && !clearing) {
      var w = WAVES[wave];
      if (tokensSpawned < w.tokenCount) {
        spawnToken();
      }
      spawnTimer = spawnInterval;
    }
  }

  // Move ramp tokens
  for (var t = rampTokens.length - 1; t >= 0; t--) {
    var tok = rampTokens[t];
    tok.y += tok.speed * dt;

    if (tok.y >= PADDLE_Y - 10) {
      var tokCol = Math.floor((tok.x - BIN_X) / CELL);
      if (tokCol === paddleCol) {
        catchToken(tok);
      } else {
        dropToken(tok);
      }
      rampTokens.splice(t, 1);
    }
  }

  // Check bin overflow
  if (isBinFull()) {
    gameOverReason = 'Garden overflow!';
    endGame();
    return;
  }

  // Check wave completion
  if (checkWaveComplete()) {
    state = 'waveComplete';
    waveCompleteTimer = 2.0;
    TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.15]], 100);
    TAS.fx.flash(getCurrentTheme().accent, 0.2);
    // Celebration particles
    for (var wp = 0; wp < 15; wp++) {
      TAS.particles.spawn(
        TAS.math.randRange(20, GW - 20),
        TAS.math.randRange(GH * 0.2, GH * 0.5),
        GEM_COLORS[TAS.math.randInt(0, 5)], 2, 3, { gravity: -0.3 }
      );
    }
  }
}

// === THEME HELPER ===
function getCurrentTheme() {
  var tier = Math.floor(wave / 5);
  return THEMES[Math.min(tier, THEMES.length - 1)];
}

// === DRAW FUNCTIONS ===
function drawGem(x, y, size, type, special, alpha) {
  ctx.globalAlpha = alpha || 1;
  var color, symbol;
  if (special >= 0 && special <= 4) {
    color = SPECIAL_COLORS[special];
    symbol = SPECIAL_SYMBOLS[special];
  } else {
    color = GEM_COLORS[type];
    symbol = GEM_SYMBOLS[type];
  }

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  // Gem body - hexagonal shape for spore gems
  ctx.fillStyle = color;
  ctx.beginPath();
  var radius = size * 0.42;
  for (var hi = 0; hi < 6; hi++) {
    var angle = Math.PI / 6 + hi * Math.PI / 3;
    var hx = x + Math.cos(angle) * radius;
    var hy = y + Math.sin(angle) * radius;
    if (hi === 0) ctx.moveTo(hx, hy);
    else ctx.lineTo(hx, hy);
  }
  ctx.closePath();
  ctx.fill();

  // Inner ring
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.25, 0, Math.PI * 2);
  ctx.stroke();

  // Reactor block: draw gear/cog overlay
  if (special === 3) {
    ctx.strokeStyle = '#3cacd7';
    ctx.lineWidth = 2;
    for (var gi = 0; gi < 4; gi++) {
      var ga = gi * Math.PI / 2 + frame * 0.02;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ga) * size * 0.15, y + Math.sin(ga) * size * 0.15);
      ctx.lineTo(x + Math.cos(ga) * size * 0.35, y + Math.sin(ga) * size * 0.35);
      ctx.stroke();
    }
  }

  // Spore block: draw tendrils
  if (special === 4) {
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 1.5;
    for (var ti = 0; ti < 3; ti++) {
      var ta = ti * Math.PI * 2 / 3 + Math.sin(frame * 0.05 + ti) * 0.3;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ta) * size * 0.2, y + Math.sin(ta) * size * 0.2);
      var mx = x + Math.cos(ta + 0.3) * size * 0.35;
      var my = y + Math.sin(ta + 0.3) * size * 0.35;
      ctx.quadraticCurveTo(mx, my, x + Math.cos(ta) * size * 0.42, y + Math.sin(ta) * size * 0.42);
      ctx.stroke();
    }
  }

  // Symbol
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.font = 'bold ' + Math.floor(size * 0.38) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, x, y + 1);

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawThemedBackground() {
  var theme = getCurrentTheme();

  // Base background
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Animated stars/motes
  for (var si = 0; si < bgStars.length; si++) {
    var star = bgStars[si];
    var flicker = Math.sin(star.flicker) * 0.3 + 0.7;
    ctx.globalAlpha = flicker * 0.4;
    ctx.fillStyle = theme.stars;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  }
  ctx.globalAlpha = 1;

  // Subtle grid
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx < GW; gx += 20) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, GH); ctx.stroke();
  }
  for (var gy = 0; gy < GH; gy += 20) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(GW, gy); ctx.stroke();
  }

  // Theme-specific decorations
  var tier = Math.floor(wave / 5);
  if (tier === 0) {
    // Garden: vines on sides
    ctx.strokeStyle = '#1a3322';
    ctx.lineWidth = 2;
    for (var vi = 0; vi < 4; vi++) {
      var vy = 60 + vi * 100;
      ctx.beginPath();
      ctx.moveTo(0, vy);
      ctx.quadraticCurveTo(15, vy + 20, 5, vy + 40);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(GW, vy + 30);
      ctx.quadraticCurveTo(GW - 15, vy + 50, GW - 5, vy + 70);
      ctx.stroke();
    }
  } else if (tier === 1) {
    // Pipeline: stalactites
    ctx.fillStyle = '#1a1a33';
    for (var sti = 0; sti < 6; sti++) {
      var sx = 20 + sti * 55;
      var sh = 15 + Math.sin(sti * 1.5) * 10;
      ctx.beginPath();
      ctx.moveTo(sx - 8, 0);
      ctx.lineTo(sx, sh);
      ctx.lineTo(sx + 8, 0);
      ctx.fill();
    }
  } else if (tier === 2) {
    // Power Plant: warning stripes at bottom
    ctx.fillStyle = '#331a00';
    ctx.globalAlpha = 0.3;
    for (var wi = 0; wi < 8; wi++) {
      var wx = wi * 45 - (frame % 45);
      ctx.beginPath();
      ctx.moveTo(wx, GH);
      ctx.lineTo(wx + 15, GH);
      ctx.lineTo(wx + 30, GH - 12);
      ctx.lineTo(wx + 15, GH - 12);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else {
    // Mycelium: pulsing network lines
    ctx.strokeStyle = '#221533';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.02) * 0.1;
    for (var mi = 0; mi < 5; mi++) {
      var mx1 = Math.sin(mi * 1.2 + frame * 0.01) * GW * 0.3 + GW * 0.5;
      var my1 = Math.cos(mi * 0.8 + frame * 0.015) * GH * 0.3 + GH * 0.5;
      var mx2 = Math.cos(mi * 1.5 + frame * 0.012) * GW * 0.4 + GW * 0.5;
      var my2 = Math.sin(mi * 0.9 + frame * 0.018) * GH * 0.4 + GH * 0.5;
      ctx.beginPath();
      ctx.moveTo(mx1, my1);
      ctx.lineTo(mx2, my2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

function drawRamp() {
  var theme = getCurrentTheme();
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 1;

  // Left track
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 20, RAMP_TOP);
  ctx.lineTo(BIN_X, RAMP_BOTTOM);
  ctx.stroke();
  // Right track
  ctx.beginPath();
  ctx.moveTo(GW / 2 + 20, RAMP_TOP);
  ctx.lineTo(BIN_X + COLS * CELL, RAMP_BOTTOM);
  ctx.stroke();

  // Guide lines
  ctx.strokeStyle = theme.grid;
  ctx.setLineDash([2, 4]);
  for (var c = 0; c <= COLS; c++) {
    var topX = GW / 2 + (c - COLS / 2) * 8;
    var botX = BIN_X + c * CELL;
    ctx.beginPath();
    ctx.moveTo(topX, RAMP_TOP);
    ctx.lineTo(botX, RAMP_BOTTOM);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawPaddle() {
  var px = BIN_X + paddleCol * CELL + CELL / 2;
  var py = PADDLE_Y;
  var theme = getCurrentTheme();

  // Paddle platform with theme color
  ctx.fillStyle = '#224444';
  ctx.strokeStyle = theme.accent;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(px - PADDLE_W / 2, py - 8, PADDLE_W, 16, 4);
  ctx.fill();
  ctx.stroke();

  // === BASELING SPRITE === the player's baseling rides the paddle (icon fallback).
  if (!TAS.drawBaseling(ctx, px, py - 2, 18, { anim: paddleStack.length ? 'attack' : 'idle', frame: frame })) {
    ctx.fillStyle = statB.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(statB.icon, px, py);
  }

  // Draw stacked gems on paddle
  for (var i = 0; i < paddleStack.length; i++) {
    var ty = py - 20 - i * 18;
    drawGem(px, ty, 18, paddleStack[i].type, paddleStack[i].special);
  }

  // Column indicator arrow
  ctx.fillStyle = theme.accent;
  ctx.beginPath();
  ctx.moveTo(px, py + 14);
  ctx.lineTo(px - 6, py + 20);
  ctx.lineTo(px + 6, py + 20);
  ctx.fill();
}

function drawBin() {
  var theme = getCurrentTheme();

  // Grid lines
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 1;
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BIN_X + c * CELL, BIN_Y);
    ctx.lineTo(BIN_X + c * CELL, BIN_Y + ROWS * CELL);
    ctx.stroke();
  }
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BIN_X, BIN_Y + r * CELL);
    ctx.lineTo(BIN_X + COLS * CELL, BIN_Y + r * CELL);
    ctx.stroke();
  }

  // Outer border glow
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = 2;
  ctx.shadowColor = theme.border;
  ctx.shadowBlur = 8;
  ctx.strokeRect(BIN_X - 1, BIN_Y - 1, COLS * CELL + 2, ROWS * CELL + 2);
  ctx.shadowBlur = 0;

  // Draw gems in bin
  for (var col = 0; col < COLS; col++) {
    for (var row = 0; row < ROWS; row++) {
      var cell = bin[col][row];
      if (!cell) continue;

      var cx = BIN_X + col * CELL + CELL / 2;
      var cy = BIN_Y + row * CELL + CELL / 2;

      var alpha = 1;
      if (cell.flash && cell.flash > 0) {
        alpha = 0.5 + Math.sin(cell.flash * 3) * 0.5;
        cell.flash -= 0.2;
      }

      // Check if being cleared
      var isClearing = false;
      for (var ci = 0; ci < clearCells.length; ci++) {
        if (clearCells[ci].c === col && clearCells[ci].r === row) {
          isClearing = true;
          break;
        }
      }

      if (isClearing) {
        alpha = 0.3 + Math.sin(frame * 0.5) * 0.7;
        ctx.save();
        var scale = 1 + Math.sin(frame * 0.3) * 0.2;
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.translate(-cx, -cy);
        drawGem(cx, cy, CELL, cell.type, cell.special, alpha);
        ctx.restore();
      } else {
        drawGem(cx, cy, CELL, cell.type, cell.special, alpha);
      }
    }
  }
}

function drawRampTokens() {
  for (var i = 0; i < rampTokens.length; i++) {
    var tok = rampTokens[i];
    var progress = (tok.y - RAMP_TOP) / (RAMP_BOTTOM - RAMP_TOP);
    var size = TAS.math.lerp(12, CELL * 0.8, progress);
    var targetX = BIN_X + tok.col * CELL + CELL / 2;
    var topX = GW / 2 + (tok.col - COLS / 2 + 0.5) * 8;
    var drawX = TAS.math.lerp(topX, targetX, progress);
    drawGem(drawX, tok.y, size, tok.type, tok.special);
  }
}

function drawComboDisplay() {
  if (!comboDisplay) return;

  var alpha = Math.min(1, comboDisplay.timer);
  var y = GH * 0.25 - (2.0 - comboDisplay.timer) * 20;

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // Combo name
  ctx.shadowColor = comboDisplay.color;
  ctx.shadowBlur = 10;
  ctx.fillStyle = comboDisplay.color;
  ctx.font = 'bold 16px monospace';
  ctx.fillText(comboDisplay.name + '!', GW / 2, y);

  // Bonus score
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('+' + comboDisplay.bonus, GW / 2, y + 18);

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawStatBar() {
  // Small stat indicator showing active bonuses
  var y = GH - 8;
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#444';

  var indicators = [];
  if (STR_MATCH_POWER > 0) indicators.push('STR+' + STR_MATCH_POWER);
  if (statB.dex > 10) indicators.push('DEX');
  if (CON_EXTRA_ROWS > 0 || CON_EXTRA_LIVES > 0) indicators.push('CON');
  if (statB.int > 10) indicators.push('INT');
  if (WIS_HOLD) indicators.push('WIS');
  if (statB.cha > 10) indicators.push('CHA');

  if (indicators.length > 0) {
    ctx.fillText(indicators.join(' '), 4, y);
  }
}

function draw(dt) {
  // Themed background
  drawThemedBackground();

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'tutorial') {
    drawTutorialScreen();
    return;
  }

  if (state === 'gameOver') {
    drawBin();
    TAS.particles.draw();
    TAS.ui.drawGameOver(score, highScore, GW, GH, {
      frame: frame,
      extra: 'Wave ' + (wave + 1) + ' | ' + gameOverReason
    });
    drawStatBar();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'waveIntro') {
    drawBin();
    drawWaveIntro();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'waveComplete') {
    drawBin();
    drawWaveComplete();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // === PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  drawRamp();
  drawRampTokens();
  drawPaddle();
  drawBin();
  drawHoldBox();
  drawPreview();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // Combo display
  drawComboDisplay();

  // HUD
  var theme = getCurrentTheme();
  TAS.ui.drawHUD(score, wave + 1, dropsLeft, GW, { scoreLabel: 'POOP', lifeColor: '#e6482e' });

  // Wave objective bar
  ctx.fillStyle = 'rgba(10,5,20,0.7)';
  ctx.fillRect(0, 28, GW, 18);
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = theme.accent;
  var objLabel = bossMode ? bossName : waveObjective.label;
  ctx.fillText(objLabel + '  ' + getWaveProgressText(), 6, 40);

  // Stack count
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Stack: ' + paddleStack.length + '/' + MAX_STACK, GW - 6, 40);

  // Chain display
  if (chainCount > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 16px monospace';
    var pulse = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText(chainCount + 'x CHAIN!', GW / 2, BIN_Y - 20);
    ctx.globalAlpha = 1;
  }

  // Spore warning
  if (!bossMode && wave >= 8 && sporeSpreadTimer < 3.0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#38d973';
    ctx.font = 'bold 10px monospace';
    var sporeAlpha = Math.sin(frame * 0.2) * 0.5 + 0.5;
    ctx.globalAlpha = sporeAlpha;
    ctx.fillText('FUNGUS SPREADING IN ' + Math.ceil(sporeSpreadTimer) + 's', GW / 2, BIN_Y - 8);
    ctx.globalAlpha = 1;
  }

  // Stat bar
  drawStatBar();

  // Controls hint (first wave only)
  if (wave === 0 && tokensSpawned < 5 && !bossMode) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#555';
    ctx.font = '8px monospace';
    ctx.fillText('ARROWS:Move  Z:Drop  X:Flip  C:Hold  V:Hard', GW / 2, GH - 6);
  }

  TAS.input.drawTouchControls(GW, GH);
}

  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText(theme.name, GW / 2, GH * 0.25);

  // Wave number
  ctx.fillStyle = theme.accent;
  ctx.font = 'bold 20px monospace';
  if (bossMode) {
    ctx.fillStyle = '#ff6644';
    ctx.shadowColor = '#ff6644';
    ctx.shadowBlur = 10;
    ctx.fillText('BOSS WAVE', GW / 2, GH * 0.35);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(bossName, GW / 2, GH * 0.45);

    ctx.fillStyle = '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText('Moves: ' + bossMovesLeft, GW / 2, GH * 0.55);
    ctx.fillText('Clear all spore blocks!', GW / 2, GH * 0.62);
  } else {
    ctx.fillText('WAVE ' + (wave + 1), GW / 2, GH * 0.35);

    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(waveObjective.label, GW / 2, GH * 0.48);

    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    var speedLabel = wave < 5 ? 'SPEED: NORMAL' : wave < 10 ? 'SPEED: FAST' : wave < 15 ? 'SPEED: FASTER' : 'SPEED: INSANE';
    ctx.fillText(speedLabel, GW / 2, GH * 0.58);

    if (WAVES[wave].specialChance > 0) {
      ctx.fillStyle = '#a855f7';
      ctx.fillText('Garden seeds active!', GW / 2, GH * 0.65);
    }
  }

  // Countdown
  var countdown = Math.ceil(waveIntroTimer);
  var cscale = 1 + (waveIntroTimer % 1) * 0.3;
  ctx.save();
  ctx.translate(GW / 2, GH * 0.78);
  ctx.scale(cscale, cscale);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(String(countdown), 0, 0);
  ctx.restore();
}

function drawWaveComplete() {
  var theme = getCurrentTheme();
  ctx.fillStyle = 'rgba(0,20,10,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Complete banner
  ctx.fillStyle = theme.accent;
  ctx.shadowColor = theme.accent;
  ctx.shadowBlur = 12;
  ctx.font = 'bold 18px monospace';
  ctx.fillText('WAVE COMPLETE!', GW / 2, GH * 0.3);
  ctx.shadowBlur = 0;

  if (bossMode) {
    ctx.fillStyle = '#ff8844';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('Garden Boss Cleared!', GW / 2, GH * 0.4);
  }

  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText('Wave Score: ' + waveScore, GW / 2, GH * 0.48);

  // INT bonus indicator
  if (statB.int > 10) {
    ctx.fillStyle = '#3cacd7';
    ctx.font = '9px monospace';
    ctx.fillText('INT bonus: x' + INT_SCORE_MULT.toFixed(1), GW / 2, GH * 0.54);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  if (waveChainMax > 1) {
    ctx.fillText('Best Chain: ' + waveChainMax + 'x', GW / 2, GH * 0.60);
  }

  ctx.fillStyle = '#3cacd7';
  ctx.font = '11px monospace';
  ctx.fillText('Total: ' + score, GW / 2, GH * 0.70);

  // Next theme preview
  var nextTier = Math.floor((wave + 1) / 5);
  var curTier = Math.floor(wave / 5);
  if (nextTier !== curTier && nextTier < THEMES.length) {
    ctx.fillStyle = THEMES[nextTier].accent;
    ctx.font = '10px monospace';
    ctx.fillText('Entering: ' + THEMES[nextTier].name, GW / 2, GH * 0.80);
  }
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
