<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Token Columns</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 320, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a','b'], labels: { a: 'DROP', b: 'FLIP' } });

var COLS = 5;
var ROWS = 10;
var CELL = 28;
var BIN_X = (GW - COLS * CELL) / 2;
var BIN_Y = GH - ROWS * CELL - 20;
var RAMP_TOP = 60;
var RAMP_BOTTOM = BIN_Y - 50;
var PADDLE_Y = RAMP_BOTTOM;
var PADDLE_W = 40;
var MAX_STACK = 5;
var MAX_DROPS = 3;

// Token types
var TOKEN_COLORS = ['#ffcc00', '#8B4513', '#00cc66', '#9933ff', '#3399ff'];
var TOKEN_NAMES = ['MfT', 'POOP', 'LP', 'Spore', 'Crystal'];
var TOKEN_SYMBOLS = ['M', 'P', 'L', 'S', 'C'];
// Specials: 5=wild, 6=bomb, 7=x2
var SPECIAL_COLORS = ['#ffffff', '#ff3333', '#ff9900'];
var SPECIAL_SYMBOLS = ['W', 'B', '2'];

// Wave definitions
var WAVES = [];
(function buildWaves() {
  var objectives = [
    {type:'horizontal', count:2, label:'Get 2 Horizontals'},
    {type:'score', count:500, label:'Score 500 pts'},
    {type:'survive', count:20, label:'Survive 20 tokens'},
    {type:'horizontal', count:3, label:'Get 3 Horizontals'},
    {type:'score', count:1500, label:'Score 1,500 pts'},
    {type:'chain', count:2, label:'Get a 2-chain'},
    {type:'vertical', count:3, label:'Get 3 Verticals'},
    {type:'survive', count:35, label:'Survive 35 tokens'},
    {type:'score', count:3000, label:'Score 3,000 pts'},
    {type:'diagonal', count:2, label:'Get 2 Diagonals'},
    {type:'chain', count:3, label:'Get a 3-chain'},
    {type:'horizontal', count:5, label:'Get 5 Horizontals'},
    {type:'score', count:5000, label:'Score 5,000 pts'},
    {type:'survive', count:50, label:'Survive 50 tokens'},
    {type:'chain', count:4, label:'Get a 4-chain'},
    {type:'diagonal', count:4, label:'Get 4 Diagonals'},
    {type:'score', count:8000, label:'Score 8,000 pts'},
    {type:'survive', count:60, label:'Survive 60 tokens'},
    {type:'chain', count:5, label:'Get a 5-chain'},
    {type:'score', count:15000, label:'Score 15,000 pts'}
  ];
  for (var i = 0; i < 20; i++) {
    var speedTier = Math.floor(i / 5);
    WAVES.push({
      objective: objectives[i],
      speed: 40 + speedTier * 20,
      tokenCount: 30 + i * 5,
      specialChance: i >= 4 ? 0.08 + (i - 4) * 0.005 : 0
    });
  }
})();

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('tokencolumns_hi');
var frame = 0;

var wave = 0;
var waveProgress = 0;
var waveObjective = null;
var dropsLeft = MAX_DROPS;
var tokensSpawned = 0;
var tokensSurvived = 0;
var maxChain = 0;

var paddleCol = 2;
var paddleStack = [];
var bin = []; // bin[col][row], 0=empty, else {type, special}

var rampTokens = []; // {x, y, type, special, speed}
var spawnTimer = 0;
var spawnInterval = 1.5;

var clearing = false;
var clearTimer = 0;
var clearCells = [];
var chainCount = 0;
var gravityTimer = 0;

var waveIntroTimer = 0;
var waveCompleteTimer = 0;
var gameOverReason = '';

// Score tracking for wave
var waveScore = 0;
var waveHorizontals = 0;
var waveVerticals = 0;
var waveDiagonals = 0;
var waveChainMax = 0;

// Swipe tracking
var touchStartX = 0;
var touchStartY = 0;
var touchActive = false;
var swipeHandled = false;

// === INIT FUNCTIONS ===
function initBin() {
  bin = [];
  for (var c = 0; c < COLS; c++) {
    bin[c] = [];
    for (var r = 0; r < ROWS; r++) {
      bin[c][r] = null;
    }
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  wave = 0;
  dropsLeft = MAX_DROPS;
  paddleCol = 2;
  paddleStack = [];
  rampTokens = [];
  spawnTimer = 0;
  clearing = false;
  clearCells = [];
  chainCount = 0;
  TAS.particles.clear();
  initBin();
  startWave();
}

function startWave() {
  var w = WAVES[wave];
  waveObjective = w.objective;
  waveProgress = 0;
  waveScore = 0;
  waveHorizontals = 0;
  waveVerticals = 0;
  waveDiagonals = 0;
  waveChainMax = 0;
  tokensSpawned = 0;
  tokensSurvived = 0;
  maxChain = 0;
  rampTokens = [];
  spawnTimer = 0;
  spawnInterval = Math.max(0.4, 2.0 - wave * 0.07);
  waveIntroTimer = 2.5;
  state = 'waveIntro';
}

function checkWaveComplete() {
  var obj = waveObjective;
  var done = false;
  if (obj.type === 'horizontal') done = waveHorizontals >= obj.count;
  else if (obj.type === 'vertical') done = waveVerticals >= obj.count;
  else if (obj.type === 'diagonal') done = waveDiagonals >= obj.count;
  else if (obj.type === 'score') done = waveScore >= obj.count;
  else if (obj.type === 'survive') done = tokensSurvived >= obj.count;
  else if (obj.type === 'chain') done = waveChainMax >= obj.count;
  return done;
}

function getWaveProgressText() {
  var obj = waveObjective;
  if (obj.type === 'horizontal') return waveHorizontals + '/' + obj.count;
  if (obj.type === 'vertical') return waveVerticals + '/' + obj.count;
  if (obj.type === 'diagonal') return waveDiagonals + '/' + obj.count;
  if (obj.type === 'score') return waveScore + '/' + obj.count;
  if (obj.type === 'survive') return tokensSurvived + '/' + obj.count;
  if (obj.type === 'chain') return waveChainMax + '/' + obj.count;
  return '';
}

function spawnToken() {
  var w = WAVES[wave];
  var type, special = -1;
  if (w.specialChance > 0 && Math.random() < w.specialChance) {
    special = TAS.math.randInt(0, 2);
    type = TAS.math.randInt(0, 4);
  } else {
    type = TAS.math.randInt(0, 4);
  }
  var col = TAS.math.randInt(0, COLS - 1);
  rampTokens.push({
    x: BIN_X + col * CELL + CELL / 2,
    y: RAMP_TOP,
    type: type,
    special: special,
    speed: w.speed,
    col: col
  });
  tokensSpawned++;
}

function dropToken(token) {
  dropsLeft--;
  TAS.audio.playTone(150, 0.2, 'sawtooth', 0.06, 80);
  TAS.particles.spawn(token.x, PADDLE_Y, '#ff4444', 6, 2);
  if (dropsLeft <= 0) {
    gameOverReason = 'Too many drops!';
    endGame();
  }
}

function catchToken(token) {
  if (paddleStack.length >= MAX_STACK) {
    dropToken(token);
    return;
  }
  paddleStack.push({ type: token.type, special: token.special });
  tokensSurvived++;
  TAS.audio.playTone(440 + paddleStack.length * 80, 0.08, 'square', 0.06);
}

function dropStack() {
  if (paddleStack.length === 0) return;
  var col = paddleCol;
  // Find lowest empty row in column
  var emptyRow = -1;
  for (var r = ROWS - 1; r >= 0; r--) {
    if (!bin[col][r]) { emptyRow = r; break; }
  }
  if (emptyRow < 0) {
    // Column full - this is a drop
    TAS.audio.playTone(100, 0.3, 'sawtooth', 0.05);
    return;
  }
  // Place tokens from bottom of stack up
  var placed = 0;
  for (var i = paddleStack.length - 1; i >= 0; i--) {
    var row = emptyRow - placed;
    if (row < 0) break;
    bin[col][row] = { type: paddleStack[i].type, special: paddleStack[i].special, flash: 6 };
    placed++;
  }
  paddleStack = [];
  TAS.audio.playTone(220, 0.1, 'triangle', 0.05);
  TAS.audio.playTone(330, 0.1, 'triangle', 0.04);
  // Check for matches after a brief settle
  chainCount = 0;
  setTimeout(function() { checkMatches(); }, 100);
}

function flipStack() {
  if (paddleStack.length < 2) return;
  // Rotate stack: move bottom to top
  var bottom = paddleStack.pop();
  paddleStack.unshift(bottom);
  TAS.audio.playTone(600, 0.05, 'square', 0.04);
}

function checkMatches() {
  var matched = [];
  var matchInfo = { horizontal: 0, vertical: 0, diagonal: 0 };

  // Check horizontals
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c <= COLS - 3; c++) {
      var run = getMatchRun(c, r, 1, 0);
      if (run.length >= 3) {
        for (var i = 0; i < run.length; i++) addUnique(matched, run[i]);
        matchInfo.horizontal++;
      }
    }
  }

  // Check verticals
  for (var c2 = 0; c2 < COLS; c2++) {
    for (var r2 = 0; r2 <= ROWS - 3; r2++) {
      var run2 = getMatchRun(c2, r2, 0, 1);
      if (run2.length >= 3) {
        for (var j = 0; j < run2.length; j++) addUnique(matched, run2[j]);
        matchInfo.vertical++;
      }
    }
  }

  // Check diagonals (down-right)
  for (var c3 = 0; c3 <= COLS - 3; c3++) {
    for (var r3 = 0; r3 <= ROWS - 3; r3++) {
      var run3 = getMatchRun(c3, r3, 1, 1);
      if (run3.length >= 3) {
        for (var k = 0; k < run3.length; k++) addUnique(matched, run3[k]);
        matchInfo.diagonal++;
      }
    }
  }

  // Check diagonals (down-left)
  for (var c4 = COLS - 1; c4 >= 2; c4--) {
    for (var r4 = 0; r4 <= ROWS - 3; r4++) {
      var run4 = getMatchRun(c4, r4, -1, 1);
      if (run4.length >= 3) {
        for (var m = 0; m < run4.length; m++) addUnique(matched, run4[m]);
        matchInfo.diagonal++;
      }
    }
  }

  if (matched.length > 0) {
    chainCount++;
    if (chainCount > waveChainMax) waveChainMax = chainCount;
    if (chainCount > maxChain) maxChain = chainCount;

    waveHorizontals += matchInfo.horizontal;
    waveVerticals += matchInfo.vertical;
    waveDiagonals += matchInfo.diagonal;

    // Calculate score
    var baseScore = 0;
    var hasX2 = false;
    var hasBomb = false;
    var bombCells = [];

    for (var n = 0; n < matched.length; n++) {
      var cell = bin[matched[n].c][matched[n].r];
      if (cell && cell.special === 2) hasX2 = true;
      if (cell && cell.special === 1) {
        hasBomb = true;
        bombCells.push(matched[n]);
      }
    }

    // Score based on match size
    if (matched.length === 3) baseScore = 100;
    else if (matched.length === 4) baseScore = 300;
    else baseScore = 1000;

    // Diagonal bonus
    if (matchInfo.diagonal > 0) baseScore *= 2;
    // Chain multiplier
    if (chainCount > 1) baseScore *= chainCount;
    // X2 bonus
    if (hasX2) baseScore *= 2;

    score += baseScore;
    waveScore += baseScore;

    // Handle bomb - clear adjacent
    if (hasBomb) {
      for (var bi = 0; bi < bombCells.length; bi++) {
        var bc = bombCells[bi].c;
        var br = bombCells[bi].r;
        for (var dc = -1; dc <= 1; dc++) {
          for (var dr = -1; dr <= 1; dr++) {
            var nc = bc + dc;
            var nr = br + dr;
            if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && bin[nc][nr]) {
              addUnique(matched, {c: nc, r: nr});
            }
          }
        }
      }
      TAS.fx.shake(6, 0.85);
    }

    // Clear matched cells
    clearCells = matched;
    clearing = true;
    clearTimer = 0.4;

    // Particles and sound
    for (var p = 0; p < matched.length; p++) {
      var px = BIN_X + matched[p].c * CELL + CELL / 2;
      var py = BIN_Y + matched[p].r * CELL + CELL / 2;
      var col = bin[matched[p].c][matched[p].r];
      var color = col ? TOKEN_COLORS[col.type] : '#fff';
      TAS.particles.spawn(px, py, color, 4, 3, { gravity: 0.5 });
    }

    TAS.audio.playTone(523 + chainCount * 100, 0.15, 'square', 0.07);
    if (chainCount > 1) {
      TAS.audio.playTone(659 + chainCount * 80, 0.12, 'triangle', 0.05);
    }
    TAS.fx.flash('#fff', 0.15);
  } else {
    // No more matches - reset chain
    clearing = false;
    chainCount = 0;
  }
}

function getMatchRun(startC, startR, dc, dr) {
  var first = bin[startC][startR];
  if (!first) return [];
  var firstType = first.special === 0 ? -1 : first.type; // wild matches anything
  var run = [{c: startC, r: startR}];
  var matchType = firstType === -1 ? -1 : firstType;

  for (var i = 1; i < Math.max(COLS, ROWS); i++) {
    var c = startC + dc * i;
    var r = startR + dr * i;
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) break;
    var cell = bin[c][r];
    if (!cell) break;
    var cellType = cell.special === 0 ? -1 : cell.type; // wild

    if (matchType === -1) {
      // First was wild, adopt this type
      if (cellType !== -1) matchType = cellType;
      run.push({c: c, r: r});
    } else if (cellType === -1 || cellType === matchType) {
      run.push({c: c, r: r});
    } else {
      break;
    }
  }

  // If all wilds, still counts
  if (run.length >= 3) return run;
  return [];
}

function addUnique(arr, item) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].c === item.c && arr[i].r === item.r) return;
  }
  arr.push(item);
}

function applyGravity() {
  var moved = false;
  for (var c = 0; c < COLS; c++) {
    for (var r = ROWS - 1; r >= 1; r--) {
      if (!bin[c][r] && bin[c][r - 1]) {
        bin[c][r] = bin[c][r - 1];
        bin[c][r - 1] = null;
        moved = true;
      }
    }
  }
  return moved;
}

function isBinFull() {
  for (var c = 0; c < COLS; c++) {
    if (bin[c][0]) return true;
  }
  return false;
}

function endGame() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('tokencolumns_hi', score);
  }
  TAS.fx.shake(8, 0.9);
  TAS.audio.playNoise(0.5, 0.08, 200);
}

// === TOUCH HANDLING ===
TAS.input.onTouch('start', function(e) {
  if (e.touches.length > 0) {
    var rect = TAS.canvas.getBoundingClientRect();
    touchStartX = e.touches[0].clientX - rect.left;
    touchStartY = e.touches[0].clientY - rect.top;
    touchActive = true;
    swipeHandled = false;
  }
});

TAS.input.onTouch('end', function(e) {
  if (touchActive && !swipeHandled) {
    // Tap = drop or start game
    if (state === 'playing') {
      dropStack();
    }
  }
  touchActive = false;
});

// === UPDATE ===
var moveDelay = 0;
var prevLeft = false;
var prevRight = false;
var prevDown = false;
var prevA = false;
var prevB = false;

function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a || TAS.input.touch.b) {
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 4 === 0) {
      TAS.particles.spawn(TAS.math.randRange(40, GW - 40), TAS.math.randRange(100, GH - 100), TOKEN_COLORS[TAS.math.randInt(0, 4)], 1, 1);
    }
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      state = 'title';
      TAS.input.keys['Enter'] = false;
      TAS.input.keys[' '] = false;
    }
    return;
  }

  if (state === 'waveIntro') {
    waveIntroTimer -= dt;
    if (waveIntroTimer <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'waveComplete') {
    waveCompleteTimer -= dt;
    if (waveCompleteTimer <= 0) {
      wave++;
      if (wave >= 20) {
        gameOverReason = 'ALL WAVES COMPLETE!';
        endGame();
      } else {
        startWave();
      }
    }
    return;
  }

  if (state !== 'playing') return;

  // Handle clearing animation
  if (clearing) {
    clearTimer -= dt;
    if (clearTimer <= 0) {
      // Remove cleared cells
      for (var i = 0; i < clearCells.length; i++) {
        bin[clearCells[i].c][clearCells[i].r] = null;
      }
      clearCells = [];
      clearing = false;
      // Apply gravity then check again
      gravityTimer = 0.15;
    }
    return;
  }

  // Handle gravity
  if (gravityTimer > 0) {
    gravityTimer -= dt;
    if (gravityTimer <= 0) {
      var moved = applyGravity();
      if (moved) {
        gravityTimer = 0.1;
      } else {
        // Check for new matches (chain)
        checkMatches();
      }
    }
    return;
  }

  // Handle swipe detection
  if (touchActive && !swipeHandled) {
    var rect = TAS.canvas.getBoundingClientRect();
    if (window.event && window.event.touches && window.event.touches.length > 0) {
      var cx = window.event.touches[0].clientX - rect.left;
      var cy = window.event.touches[0].clientY - rect.top;
      var dx = cx - touchStartX;
      var dy = cy - touchStartY;
      if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && paddleCol < COLS - 1) paddleCol++;
        else if (dx < 0 && paddleCol > 0) paddleCol--;
        touchStartX = cx;
        swipeHandled = true;
      } else if (dy > 30 && Math.abs(dy) > Math.abs(dx)) {
        dropStack();
        swipeHandled = true;
      }
    }
  }

  // Keyboard/touch controls
  moveDelay -= dt;
  var leftNow = TAS.input.keys['ArrowLeft'] || TAS.input.keys['a'] || TAS.input.touch.left;
  var rightNow = TAS.input.keys['ArrowRight'] || TAS.input.keys['d'] || TAS.input.touch.right;
  var downNow = TAS.input.keys['ArrowDown'] || TAS.input.keys['s'] || TAS.input.touch.down;
  var aNow = TAS.input.keys[' '] || TAS.input.keys['ArrowDown'] || TAS.input.touch.a;
  var bNow = TAS.input.keys['ArrowUp'] || TAS.input.keys['w'] || TAS.input.touch.b;

  if (leftNow && !prevLeft) {
    if (paddleCol > 0) paddleCol--;
    TAS.audio.playTone(200, 0.03, 'square', 0.03);
  }
  if (rightNow && !prevRight) {
    if (paddleCol < COLS - 1) paddleCol++;
    TAS.audio.playTone(200, 0.03, 'square', 0.03);
  }
  if (aNow && !prevA) {
    dropStack();
  }
  if (bNow && !prevB) {
    flipStack();
  }

  prevLeft = leftNow;
  prevRight = rightNow;
  prevDown = downNow;
  prevA = aNow;
  prevB = bNow;

  // Spawn tokens
  spawnTimer -= dt;
  if (spawnTimer <= 0 && !clearing) {
    var w = WAVES[wave];
    if (tokensSpawned < w.tokenCount) {
      spawnToken();
    }
    spawnTimer = spawnInterval;
  }

  // Move ramp tokens
  for (var t = rampTokens.length - 1; t >= 0; t--) {
    var tok = rampTokens[t];
    tok.y += tok.speed * dt;

    // Check if reached paddle
    if (tok.y >= PADDLE_Y - 10) {
      // Check if paddle is in this column
      var tokCol = Math.floor((tok.x - BIN_X) / CELL);
      if (tokCol === paddleCol) {
        catchToken(tok);
      } else {
        dropToken(tok);
      }
      rampTokens.splice(t, 1);
    }
  }

  // Check if bin overflows
  if (isBinFull()) {
    gameOverReason = 'Bin overflow!';
    endGame();
    return;
  }

  // Check wave completion
  if (checkWaveComplete()) {
    state = 'waveComplete';
    waveCompleteTimer = 2.0;
    TAS.audio.playMelody([[523,0.1],[659,0.1],[784,0.15]], 100);
    TAS.fx.flash('#44ff88', 0.2);
  }
}

// === DRAW ===
function drawToken(x, y, size, type, special, alpha) {
  ctx.globalAlpha = alpha || 1;
  var color, symbol;
  if (special >= 0) {
    color = SPECIAL_COLORS[special];
    symbol = SPECIAL_SYMBOLS[special];
  } else {
    color = TOKEN_COLORS[type];
    symbol = TOKEN_SYMBOLS[type];
  }

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 6;

  // Token body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.42, 0, Math.PI * 2);
  ctx.fill();

  // Inner ring
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.3, 0, Math.PI * 2);
  ctx.stroke();

  // Symbol
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.font = 'bold ' + Math.floor(size * 0.4) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, x, y + 1);

  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawRamp() {
  // Ramp perspective lines
  ctx.strokeStyle = '#224444';
  ctx.lineWidth = 1;
  var lx = BIN_X + paddleCol * CELL;
  var rx = lx + CELL;
  // Left track
  ctx.beginPath();
  ctx.moveTo(GW / 2 - 20, RAMP_TOP);
  ctx.lineTo(BIN_X, RAMP_BOTTOM);
  ctx.stroke();
  // Right track
  ctx.beginPath();
  ctx.moveTo(GW / 2 + 20, RAMP_TOP);
  ctx.lineTo(BIN_X + COLS * CELL, RAMP_BOTTOM);
  ctx.stroke();

  // Guide lines for each column
  ctx.strokeStyle = '#1a3333';
  ctx.setLineDash([2, 4]);
  for (var c = 0; c <= COLS; c++) {
    var topX = GW / 2 + (c - COLS / 2) * 8;
    var botX = BIN_X + c * CELL;
    ctx.beginPath();
    ctx.moveTo(topX, RAMP_TOP);
    ctx.lineTo(botX, RAMP_BOTTOM);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawPaddle() {
  var px = BIN_X + paddleCol * CELL + CELL / 2;
  var py = PADDLE_Y;

  // Paddle platform
  ctx.fillStyle = '#336666';
  ctx.strokeStyle = '#44ffaa';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(px - PADDLE_W / 2, py - 8, PADDLE_W, 16, 4);
  ctx.fill();
  ctx.stroke();

  // Draw stacked tokens on paddle
  for (var i = 0; i < paddleStack.length; i++) {
    var ty = py - 20 - i * 18;
    drawToken(px, ty, 18, paddleStack[i].type, paddleStack[i].special);
  }

  // Column indicator arrow
  ctx.fillStyle = '#44ffaa';
  ctx.beginPath();
  ctx.moveTo(px, py + 14);
  ctx.lineTo(px - 6, py + 20);
  ctx.lineTo(px + 6, py + 20);
  ctx.fill();
}

function drawBin() {
  // Bin border (neon grid)
  ctx.strokeStyle = '#225555';
  ctx.lineWidth = 1;

  // Grid lines
  for (var c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(BIN_X + c * CELL, BIN_Y);
    ctx.lineTo(BIN_X + c * CELL, BIN_Y + ROWS * CELL);
    ctx.stroke();
  }
  for (var r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(BIN_X, BIN_Y + r * CELL);
    ctx.lineTo(BIN_X + COLS * CELL, BIN_Y + r * CELL);
    ctx.stroke();
  }

  // Outer border glow
  ctx.strokeStyle = '#33ccaa';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#33ccaa';
  ctx.shadowBlur = 8;
  ctx.strokeRect(BIN_X - 1, BIN_Y - 1, COLS * CELL + 2, ROWS * CELL + 2);
  ctx.shadowBlur = 0;

  // Draw tokens in bin
  for (var col = 0; col < COLS; col++) {
    for (var row = 0; row < ROWS; row++) {
      var cell = bin[col][row];
      if (!cell) continue;

      var cx = BIN_X + col * CELL + CELL / 2;
      var cy = BIN_Y + row * CELL + CELL / 2;

      // Flash effect for newly placed
      var alpha = 1;
      if (cell.flash && cell.flash > 0) {
        alpha = 0.5 + Math.sin(cell.flash * 3) * 0.5;
        cell.flash -= 0.2;
      }

      // Check if being cleared
      var isClearing = false;
      for (var ci = 0; ci < clearCells.length; ci++) {
        if (clearCells[ci].c === col && clearCells[ci].r === row) {
          isClearing = true;
          break;
        }
      }

      if (isClearing) {
        alpha = 0.3 + Math.sin(frame * 0.5) * 0.7;
        ctx.save();
        var scale = 1 + Math.sin(frame * 0.3) * 0.2;
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.translate(-cx, -cy);
        drawToken(cx, cy, CELL, cell.type, cell.special, alpha);
        ctx.restore();
      } else {
        drawToken(cx, cy, CELL, cell.type, cell.special, alpha);
      }
    }
  }
}

function drawRampTokens() {
  for (var i = 0; i < rampTokens.length; i++) {
    var tok = rampTokens[i];
    // Scale tokens as they come down (perspective)
    var progress = (tok.y - RAMP_TOP) / (RAMP_BOTTOM - RAMP_TOP);
    var size = TAS.math.lerp(12, CELL * 0.8, progress);
    // Interpolate X position toward column
    var targetX = BIN_X + tok.col * CELL + CELL / 2;
    var topX = GW / 2 + (tok.col - COLS / 2 + 0.5) * 8;
    var drawX = TAS.math.lerp(topX, targetX, progress);
    drawToken(drawX, tok.y, size, tok.type, tok.special);
  }
}

function draw(dt) {
  // Background
  ctx.fillStyle = '#0a0f14';
  ctx.fillRect(0, 0, GW, GH);

  // Subtle grid bg
  ctx.strokeStyle = '#0d1a1a';
  ctx.lineWidth = 0.5;
  for (var gx = 0; gx < GW; gx += 20) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, GH); ctx.stroke();
  }
  for (var gy = 0; gy < GH; gy += 20) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(GW, gy); ctx.stroke();
  }

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawBin();
    TAS.particles.draw();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Wave ' + (wave + 1) + ' | ' + gameOverReason });
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'waveIntro') {
    drawBin();
    drawWaveIntro();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'waveComplete') {
    drawBin();
    drawWaveComplete();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  // Playing state
  ctx.save();
  TAS.fx.applyShake();

  drawRamp();
  drawRampTokens();
  drawPaddle();
  drawBin();
  TAS.particles.draw();

  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  TAS.ui.drawHUD(score, wave + 1, dropsLeft, GW, { scoreLabel: 'PTS', lifeColor: '#ff6644' });

  // Wave objective bar
  ctx.fillStyle = 'rgba(10,5,20,0.7)';
  ctx.fillRect(0, 28, GW, 18);
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#88ccaa';
  ctx.fillText(waveObjective.label + '  ' + getWaveProgressText(), 6, 40);

  // Stack count
  ctx.textAlign = 'right';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Stack: ' + paddleStack.length + '/' + MAX_STACK, GW - 6, 40);

  // Chain display
  if (chainCount > 1) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    var pulse = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText(chainCount + 'x CHAIN!', GW / 2, BIN_Y - 20);
    ctx.globalAlpha = 1;
  }

  // Controls hint (first wave only)
  if (wave === 0 && tokensSpawned < 5) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#555';
    ctx.font = '9px monospace';
    ctx.fillText('LEFT/RIGHT: Move | DOWN/A: Drop | UP/B: Flip', GW / 2, GH - 6);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  // Animated tokens in background
  for (var i = 0; i < 5; i++) {
    var tx = 40 + i * 60;
    var ty = 120 + Math.sin(frame * 0.03 + i) * 20;
    drawToken(tx, ty, 30, i, -1, 0.4);
  }

  ctx.textAlign = 'center';

  // Title
  ctx.shadowColor = '#44ffaa';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('TOKEN', GW / 2, 200);
  ctx.fillText('COLUMNS', GW / 2, 232);
  ctx.shadowBlur = 0;

  // Subtitle
  ctx.fillStyle = '#668888';
  ctx.font = '11px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 255);

  // Token legend
  ctx.font = '10px monospace';
  for (var j = 0; j < 5; j++) {
    var lx = GW / 2 - 80 + j * 40;
    drawToken(lx, 300, 20, j, -1, 0.7);
    ctx.fillStyle = TOKEN_COLORS[j];
    ctx.fillText(TOKEN_NAMES[j], lx, 318);
  }

  // Instructions
  ctx.fillStyle = '#557777';
  ctx.font = '10px monospace';
  ctx.fillText('Catch tokens on your paddle', GW / 2, 355);
  ctx.fillText('Drop stacks to match 3+', GW / 2, 370);
  ctx.fillText('Complete wave objectives!', GW / 2, 385);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, 440);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#886622';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, 460);
  }
}

function drawWaveIntro() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('WAVE ' + (wave + 1), GW / 2, GH * 0.35);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(waveObjective.label, GW / 2, GH * 0.48);

  // Speed indicator
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  var speedLabel = wave < 5 ? 'SPEED: NORMAL' : wave < 10 ? 'SPEED: FAST' : wave < 15 ? 'SPEED: FASTER' : 'SPEED: INSANE';
  ctx.fillText(speedLabel, GW / 2, GH * 0.58);

  if (WAVES[wave].specialChance > 0) {
    ctx.fillStyle = '#9933ff';
    ctx.fillText('Special tokens active!', GW / 2, GH * 0.65);
  }

  // Countdown
  var countdown = Math.ceil(waveIntroTimer);
  var scale = 1 + (waveIntroTimer % 1) * 0.3;
  ctx.save();
  ctx.translate(GW / 2, GH * 0.78);
  ctx.scale(scale, scale);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px monospace';
  ctx.fillText(String(countdown), 0, 0);
  ctx.restore();
}

function drawWaveComplete() {
  ctx.fillStyle = 'rgba(0,20,10,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('WAVE COMPLETE!', GW / 2, GH * 0.35);

  ctx.fillStyle = '#ffdd44';
  ctx.font = '12px monospace';
  ctx.fillText('Wave Score: ' + waveScore, GW / 2, GH * 0.48);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  if (waveChainMax > 1) {
    ctx.fillText('Best Chain: ' + waveChainMax + 'x', GW / 2, GH * 0.56);
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('Total: ' + score, GW / 2, GH * 0.66);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
