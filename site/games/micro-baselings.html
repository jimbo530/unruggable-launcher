  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('RACE TUTORIAL', GW / 2, GH * 0.36);
  ctx.fillStyle = '#ccc';
  ctx.font = '11px monospace';
  ctx.fillText('UP/W = Gas | DOWN/S = Brake', GW / 2, GH * 0.42);
  ctx.fillText('LEFT/RIGHT or A/D = Steer', GW / 2, GH * 0.47);
  ctx.fillText('Collect powerup boxes on track', GW / 2, GH * 0.52);
  ctx.fillText('Watch out for enemies!', GW / 2, GH * 0.57);
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('Complete 3 laps to finish', GW / 2, GH * 0.63);
  ctx.globalAlpha = 1;
}

// === RACE END ===
function drawRaceEnd() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = statB.color;
  ctx.font = 'bold 24px monospace';
  ctx.fillText('RACE COMPLETE', GW / 2, 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(track.name, GW / 2, 90);

  // Results
  var names = [statB.name || 'YOU', 'RED', 'BLUE', 'GOLD'];
  var colors = [statB.color, '#dd4444', '#4488dd', '#ddaa44'];

  ctx.font = '14px monospace';
  for (var i = 0; i < finishOrder.length; i++) {
    var id = finishOrder[i];
    var y = 130 + i * 35;
    ctx.fillStyle = colors[id];
    ctx.fillText((i + 1) + getSuffix(i + 1) + '  ' + names[id], GW / 2, y);
    var r = allRacers[id];
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.fillText(formatTime(r.finishTime), GW / 2, y + 15);
    ctx.font = '14px monospace';
  }

  // Race score
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('SCORE: ' + raceScore, GW / 2, 290);

  // Player position highlight
  var playerPos = finishOrder.indexOf(0) + 1;
  if (playerPos === 1) {
    var pulse = sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('WINNER!', GW / 2, 330);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Press any key to continue', GW / 2, 420);
}

// === STANDINGS ===
function drawStandings() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('CHAMPIONSHIP', GW / 2, 40);
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Race ' + champTrack + ' of ' + totalRaces + ' complete', GW / 2, 65);

  ctx.fillStyle = statB.color;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('STANDINGS', GW / 2, 100);

  var names = [statB.name || 'YOU', 'RED', 'BLUE', 'GOLD'];
  var colors = [statB.color, '#dd4444', '#4488dd', '#ddaa44'];

  var order = [0, 1, 2, 3].sort(function(a, b) { return champPoints[b] - champPoints[a]; });

  ctx.font = '14px monospace';
  for (var i = 0; i < 4; i++) {
    var id = order[i];
    var y = 140 + i * 40;
    ctx.fillStyle = colors[id];
    ctx.fillText((i + 1) + '. ' + names[id] + '  -  ' + champPoints[id] + ' pts', GW / 2, y);
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Next: ' + TRACKS[champTrack].name, GW / 2, 350);
  ctx.fillText('Press any key to continue', GW / 2, 420);
}

// === CHAMPION ===
function drawChampion() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  var order = [0, 1, 2, 3].sort(function(a, b) { return champPoints[b] - champPoints[a]; });
  var playerRank = order.indexOf(0) + 1;

  if (playerRank === 1) {
    var pulse = sin(frame * 0.06) * 0.3 + 0.7;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 28px monospace';
    ctx.globalAlpha = pulse;
    ctx.fillText('CHAMPION!', GW / 2, 100);
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.fillText(statB.name + ' won the championship!', GW / 2, 140);
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('CHAMPIONSHIP OVER', GW / 2, 100);
    ctx.fillStyle = '#888';
    ctx.font = '14px monospace';
    ctx.fillText('You finished ' + playerRank + getSuffix(playerRank), GW / 2, 130);
  }

  var names = [statB.name || 'YOU', 'RED', 'BLUE', 'GOLD'];
  var colors = [statB.color, '#dd4444', '#4488dd', '#ddaa44'];
  ctx.font = '14px monospace';
  for (var i = 0; i < 4; i++) {
    var id = order[i];
    var y = 200 + i * 40;
    ctx.fillStyle = colors[id];
    ctx.fillText((i + 1) + '. ' + names[id] + '  -  ' + champPoints[id] + ' pts', GW / 2, y);
  }

  if (champPoints[0] > highScore) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE: ' + champPoints[0] + ' pts!', GW / 2, 380);
  }

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Press any key for title', GW / 2, 440);
}

// === HELPERS ===
function getPosition(r) {
  var pos = 1;
  for (var i = 0; i < allRacers.length; i++) {
    if (allRacers[i] !== r && allRacers[i].totalDist > r.totalDist) pos++;
  }
  return pos;
}

function getSuffix(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

function formatTime(t) {
  var mins = floor(t / 60);
  var secs = floor(t % 60);
  var ms = floor((t % 1) * 100);
  return (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs + '.' + (ms < 10 ? '0' : '') + ms;
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
