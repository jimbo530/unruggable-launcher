<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Brawl Toads of Tasern</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === STAT BLOCK (PASS 1) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#38d973', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Bridge the shared baseling stats (getMults, see ARCADE-STATS.md) onto statB so the
// derived helpers below trace to a clamped getMults() value. dnd(): mult 1.0->10, 0.8->6, 1.6->22.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false; // character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[toads-of-tasern] player init failed:', e && e.message); });
}

// Derived stat helpers
function strDmgMult() { return 1 + (statB.str - 10) * 0.05; }
function bootSizeMult() { return 1 + Math.max(0, statB.str - 10) * 0.04; }
function dexSpeedMult() { return 1 + (statB.dex - 10) * 0.03; }
function dodgeChance() { return Math.min(0.3, Math.max(0, (statB.dex - 10) * 0.015)); }
function conHpMult() { return 1 + (statB.con - 10) * 0.06; }
function bonusLives() { return statB.lives + Math.floor(Math.max(0, statB.con - 14) / 4); }
function intScoreMult() { return statB.scoreMult * (1 + (statB.int - 10) * 0.04); }
function wisAtkSpeedMult() { return 1 + (statB.wis - 10) * 0.03; }
function chaDropChance() { return Math.min(0.5, 0.08 + (statB.cha - 10) * 0.02) * statB.luck; }

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
const GROUND_Y = 250;
const GRAVITY = 900;
const COMBO_WINDOW = 0.4;
const HIT_STUN = 0.3;
const IFRAME_DUR = 1.0;
const SPEEDER_SPEED_BASE = 280;

// Zone names and color palettes (Pass 3)
const STAGE_NAMES = [
  'Swamp of Tasern', 'Fungal Caverns', 'Spore Bike Chase',
  'Mushroom Tower', 'Mycelium Depths', 'The Descent',
  'Serpent Rapids', 'Dark Spore Throne'
];
const STAGE_TYPES = ['brawl','brawl','speeder','brawl','brawl','rappel','snake','boss'];

const ZONE_PALETTES = [
  { sky1: '#0d1a0d', sky2: '#1a3322', ground: '#1a2a1a', line: '#2a4a2a', accent: '#38d973' },
  { sky1: '#1a0d1a', sky2: '#2a1a2a', ground: '#1a1a2a', line: '#3a2a4a', accent: '#a855f7' },
  { sky1: '#0d0d1a', sky2: '#1a1a3a', ground: '#111133', line: '#3333aa', accent: '#38d973' },
  { sky1: '#1a0d1a', sky2: '#2a1a2a', ground: '#2a1a2a', line: '#4a2a4a', accent: '#a855f7' },
  { sky1: '#1a0d1a', sky2: '#2a1020', ground: '#2a1a1a', line: '#4a2a3a', accent: '#f4b41b' },
  { sky1: '#0d0d1a', sky2: '#1a1a2a', ground: '#0a0a1a', line: '#2a2a3a', accent: '#38d973' },
  { sky1: '#0a1a1a', sky2: '#0d2a2a', ground: '#0a1a2a', line: '#1a3a4a', accent: '#38d973' },
  { sky1: '#0a0a0a', sky2: '#1a0a1a', ground: '#0a0a0a', line: '#2a1a2a', accent: '#a855f7' }
];

const ZONE_DESCS = [
  'Toad baselings wade through the fetid swamp...',
  'Fungal caverns pulse with spore-light below.',
  'Race through the spore tunnels on speeder bikes!',
  'The Mushroom Tower looms, crawling with guards.',
  'Deep beneath the mycelium, something stirs...',
  'A vertical shaft into fungal darkness.',
  'Ride the serpent through toxic spore rapids.',
  'The Dark Spore Queen awaits on her throne.'
];

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'PUNCH', b: 'KICK' } });

// === GROK ART LAYER (Tasern Toads — original sprites) ===
var SPR = { toad: null, box: null, platform: null, enemy: {}, boss: {}, bg: [] };
(function loadArt() {
  function img(src) { var i = new Image(); i.src = src; return i; }
  SPR.toad = img('art/toads/toad-hero.png');
  SPR.box = img('art/toads/box-crate.png');
  SPR.platform = img('art/toads/platform-mushroom.png');
  SPR.enemy = {
    fungal_rat: img('art/toads/enemy-goblin.png'),
    spore_pig: img('art/toads/enemy-troll.png'),
    mushroom_warrior: img('art/toads/enemy-shroom-knight.png'),
    flyer: img('art/toads/enemy-will-o-wisp.png'),
    bomber: img('art/toads/enemy-slime-mold.png'),
    reactor_rat: img('art/toads/enemy-myconid.png'),
    spore_walker: img('art/toads/enemy-rot-walker.png'),
    mycelial_worm: img('art/toads/enemy-spriggan.png')
  };
  SPR.boss = {
    1: img('art/toads/enemy-shroom-knight.png'), 2: img('art/toads/enemy-troll.png'),
    3: img('art/toads/enemy-wyrm.png'), 4: img('art/toads/enemy-myconid.png'),
    5: img('art/toads/enemy-bog-wight.png')
  };
  var bgNames = ['bg-mire-swamp','bg-fungal-forest','bg-fungal-forest','bg-mushroom-village','bg-compost-cavern','bg-barrow-crypt','bg-mire-swamp','bg-fae-court'];
  SPR.bg = bgNames.map(function(n) { return img('art/backgrounds/' + n + '.webp'); });
})();
function sprReady(i) { return !!(i && i.complete && i.naturalWidth > 0); }
let crates = [];
let cratesStage = -1;

let state = 'title';
let score = 0;
let highScore = TAS.score.load('toads_of_tasern_hi');
let lives = 3;
let stage = 0;
let frame = 0;
let stageTimer = 0;
let checkpoint = 0;
let noDamageBonus = true;

// === POWER-UPS (PASS 2) ===
let powerUps = [];
let activeShield = 0;     // Spore Shield timer
let reactorFistTimer = 0; // Reactor Fist timer
let chargeTimer = 0;      // Charged smash hold timer
let chargeReady = false;

// === PLAYER ===
let player = null;
function createPlayer() {
  return {
    x: 60, y: GROUND_Y, vx: 0, vy: 0,
    w: 24, h: 36, facing: 1,
    hp: Math.floor(100 * conHpMult()), maxHp: Math.floor(100 * conHpMult()),
    grounded: true, jumping: false,
    attacking: false, attackTimer: 0, attackType: 0,
    comboCount: 0, comboTimer: 0,
    hitStun: 0, iframes: 0,
    transformAnim: 0, transformType: '',
    walkFrame: 0, state: 'idle',
    rapY: 0, rapVy: 0, rapX: 60,
    snakeY: 160, snakeVy: 0,
    deathTimer: 0
  };
}

// === ENEMIES ===
let enemies = [];
let enemySpawnTimer = 0;
let enemiesKilled = 0;
let enemiesToKill = 0;
let bossActive = false;
let bosses = [];

// === STAGE STATE ===
let scrollX = 0;
let obstacles = [];
let hazards = [];
let stageComplete = false;
let stageTransition = 0;
let deathAnim = 0;
let stageClearTimer = 0;

// === SPEEDER STATE ===
let speederLane = 1;
let speederSpeed = SPEEDER_SPEED_BASE;
let speederDist = 0;
let speederGoal = 3000;
let speederWalls = [];
let speederRamps = [];

// === RAPPEL STATE ===
let rapDepth = 0;
let rapGoal = 2000;
let rapEnemies = [];
let rapPlatforms = [];

// === SNAKE STATE ===
let snakeDist = 0;
let snakeGoal = 2500;
let snakeObs = [];
let snakeWave = 0;

// === ENVIRONMENTAL HAZARDS (PASS 2) ===
let gooPatches = [];
let sporeRainDrops = [];

// === BACKGROUND ===
let bgLayers = [];
function initBg() {
  bgLayers = [];
  for (let i = 0; i < 40; i++) {
    bgLayers.push({
      x: Math.random() * GW, y: Math.random() * GH * 0.7,
      size: 2 + Math.random() * 4, speed: 0.2 + Math.random() * 0.5,
      color: ['#1a3322','#0d2218','#2a1a3a','#1a1a2a'][Math.floor(Math.random()*4)]
    });
  }
}

// === GAME INIT ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + bonusLives();
  stage = 0;
  frame = 0;
  checkpoint = 0;
  player = createPlayer();
  powerUps = [];
  activeShield = 0;
  reactorFistTimer = 0;
  chargeTimer = 0;
  chargeReady = false;
  TAS.particles.clear();
  initStage();
}

function initStage() {
  enemies = [];
  obstacles = [];
  hazards = [];
  bosses = [];
  projectiles = [];
  powerUps = [];
  gooPatches = [];
  sporeRainDrops = [];
  bossActive = false;
  scrollX = 0;
  stageComplete = false;
  stageTransition = 0;
  stageClearTimer = 0;
  enemiesKilled = 0;
  noDamageBonus = true;
  enemySpawnTimer = 0;
  stageTimer = 0;
  initBg();

  // Spawn goo patches for brawl stages
  const st = STAGE_TYPES[stage];
  if (st === 'brawl' || st === 'boss') {
    for (let i = 0; i < 3 + stage; i++) {
      gooPatches.push({
        x: 60 + Math.random() * (GW - 120),
        y: GROUND_Y + Math.floor(Math.random() * 15),
        w: 30 + Math.floor(Math.random() * 30),
        timer: 999
      });
    }
  }

  player.x = 60;
  player.y = GROUND_Y;
  player.hp = player.maxHp;
  player.vx = 0;
  player.vy = 0;
  player.grounded = true;
  player.attacking = false;
  player.hitStun = 0;
  player.iframes = 0;
  player.deathTimer = 0;

  if (st === 'brawl') {
    enemiesToKill = 8 + stage * 3;
    if (stage === 1 || stage === 4) enemiesToKill += 5;
    if (stage === 1) initBossFight(0);
    if (stage === 4) initBossFight(1);
  } else if (st === 'speeder') {
    speederLane = 1;
    speederSpeed = SPEEDER_SPEED_BASE;
    speederDist = 0;
    speederGoal = 3000 + stage * 500;
    speederWalls = [];
    speederRamps = [];
    genSpeederObstacles();
  } else if (st === 'rappel') {
    rapDepth = 0;
    rapGoal = 2000;
    rapEnemies = [];
    rapPlatforms = [];
    player.rapY = 40;
    player.rapVy = 0;
    player.rapX = GW / 2;
    genRapPlatforms();
  } else if (st === 'snake') {
    snakeDist = 0;
    snakeGoal = 2500;
    snakeObs = [];
    snakeWave = 0;
    player.snakeY = 160;
    player.snakeVy = 0;
    genSnakeObs();
  } else if (st === 'boss') {
    initBossFight(2);
  }
}

function initBossFight(bossIndex) {
  if (bossIndex === 0) {
    bosses.push(createBoss('Fungal Warchief', 200, 1));
  } else if (bossIndex === 1) {
    bosses.push(createBoss('Spore Colossus', 350, 2));
  } else {
    bosses.push(createBoss('Mycelial Wurm', 300, 3));
    bosses.push(createBoss('Mushroom Knight', 400, 4));
    bosses.push(createBoss('Dark Spore Queen', 500, 5));
  }
  bossActive = true;
}

function createBoss(name, hp, type) {
  return {
    name, hp, maxHp: hp, type,
    x: GW - 80, y: GROUND_Y,
    w: 40, h: 50, facing: -1,
    state: 'idle', timer: 1.5,
    attackCooldown: 0, hitStun: 0,
    pattern: 0, active: true,
    phase: 1,
    sporeTimer: 0,    // Tasern boss attacks
    gooTimer: 0
  };
}

// === ENEMY SPAWNING ===
function spawnEnemy(type) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const eType = type || getEnemyType();
  const e = {
    type: eType,
    x: side > 0 ? GW + 20 : -20,
    y: GROUND_Y - Math.random() * 30,
    w: 20, h: 32, vx: 0, vy: 0,
    hp: getEnemyHp(eType),
    facing: -side,
    state: 'walk', timer: 0,
    attackCooldown: 1 + Math.random(),
    hitStun: 0, walkFrame: 0,
    speed: 40 + Math.random() * 30 + stage * 5,
    deathTimer: 0
  };
  enemies.push(e);
}

function getEnemyType() {
  // Original + Tasern enemies (Pass 2)
  const types = ['fungal_rat', 'spore_pig', 'mushroom_warrior', 'flyer', 'bomber', 'reactor_rat', 'spore_walker', 'mycelial_worm'];
  const maxType = Math.min(1 + Math.floor(stage / 1.5), types.length);
  return types[Math.floor(Math.random() * maxType)];
}

function getEnemyHp(type) {
  const base = {
    fungal_rat: 30, spore_pig: 45, mushroom_warrior: 80, flyer: 25, bomber: 35,
    reactor_rat: 35, spore_walker: 55, mycelial_worm: 70
  };
  return (base[type] || 30) + stage * 5;
}

// === POWER-UP SPAWNING (PASS 2) ===
function spawnPowerUp(x, y) {
  if (Math.random() > chaDropChance()) return;
  const types = ['spore_shield', 'reactor_fist', 'lp_token'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerUps.push({ x: Math.floor(x), y: Math.floor(y - 20), type, timer: 8, bob: 0 });
}

function collectPowerUp(pu) {
  if (pu.type === 'spore_shield') {
    activeShield = 5;
    TAS.audio.playTone(600, 0.15, 'sine', 0.06, 800);
  } else if (pu.type === 'reactor_fist') {
    reactorFistTimer = 6;
    TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 100);
  } else if (pu.type === 'lp_token') {
    const pts = Math.floor(200 * intScoreMult());
    score += pts;
    player.hp = Math.min(player.hp + 20, player.maxHp);
    TAS.audio.playTone(880, 0.12, 'sine', 0.05, 1200);
  }
  TAS.particles.spawn(Math.floor(pu.x), Math.floor(pu.y), '#ffff44', 8, 3, { size: 2 });
}

// === SPEEDER OBSTACLES ===
function genSpeederObstacles() {
  speederWalls = [];
  speederRamps = [];
  for (let d = 300; d < speederGoal; d += 80 + Math.random() * 120) {
    const lane = Math.floor(Math.random() * 3);
    const type = Math.random() > 0.7 ? 'ramp' : 'wall';
    if (type === 'wall') {
      speederWalls.push({ dist: d, lane, w: 30, hit: false });
    } else {
      speederRamps.push({ dist: d, lane });
    }
  }
}

// === RAPPEL PLATFORMS ===
function genRapPlatforms() {
  rapPlatforms = [];
  rapEnemies = [];
  for (let d = 100; d < rapGoal; d += 60 + Math.random() * 80) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    rapPlatforms.push({ depth: d, side, w: 60 });
  }
  for (let d = 200; d < rapGoal; d += 150 + Math.random() * 100) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    rapEnemies.push({ depth: d, side, hp: 20, active: true, x: side === 'left' ? 40 : GW - 60 });
  }
}

// === SNAKE OBSTACLES ===
function genSnakeObs() {
  snakeObs = [];
  for (let d = 200; d < snakeGoal; d += 60 + Math.random() * 80) {
    const type = Math.random() > 0.6 ? 'rock' : 'log';
    snakeObs.push({ dist: d, y: 80 + Math.random() * 160, type, w: 30, h: type === 'rock' ? 30 : 20 });
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 3 === 0 && Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('toads_of_tasern_hi', highScore);
      }
      state = 'title';
    }
    return;
  }

  if (state === 'stageIntro') {
    stageTransition -= dt;
    if (stageTransition <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state === 'playing') {
    stageTimer += dt;

    // Power-up timers
    if (activeShield > 0) activeShield -= dt;
    if (reactorFistTimer > 0) reactorFistTimer -= dt;

    // Update power-ups
    for (let i = powerUps.length - 1; i >= 0; i--) {
      const pu = powerUps[i];
      pu.timer -= dt;
      pu.bob += dt * 4;
      if (pu.timer <= 0) { powerUps.splice(i, 1); continue; }
      // Collection
      if (player && Math.abs(player.x - pu.x) < 20 && Math.abs(player.y - 16 - pu.y) < 20) {
        collectPowerUp(pu);
        powerUps.splice(i, 1);
      }
    }

    // Spore rain on later stages (Pass 2 hazard)
    if (stage >= 1 && (STAGE_TYPES[stage] === 'brawl' || STAGE_TYPES[stage] === 'boss')) {
      if (Math.random() < 0.02 + stage * 0.005) {
        sporeRainDrops.push({ x: Math.floor(Math.random() * GW), y: -5, vy: 60 + Math.random() * 40, size: 2 + Math.random() * 2 });
      }
      for (let i = sporeRainDrops.length - 1; i >= 0; i--) {
        const sr = sporeRainDrops[i];
        sr.y += sr.vy * dt;
        if (sr.y > GH) { sporeRainDrops.splice(i, 1); continue; }
        if (player && player.iframes <= 0 && activeShield <= 0 &&
            Math.abs(player.x - sr.x) < 10 && Math.abs(player.y - 18 - sr.y) < 10) {
          playerHit(3);
          sporeRainDrops.splice(i, 1);
        }
      }
    }

    const st = STAGE_TYPES[stage];

    if (st === 'brawl' || st === 'boss') updateBrawl(dt);
    else if (st === 'speeder') updateSpeeder(dt);
    else if (st === 'rappel') updateRappel(dt);
    else if (st === 'snake') updateSnake(dt);

    // Check stage complete
    if (stageComplete && stageClearTimer <= 0) {
      stageClearTimer = 2.5;
    }
    if (stageComplete && stageClearTimer > 0) {
      stageClearTimer -= dt;
      if (stageClearTimer <= 0) {
        advanceStage();
      }
    }
  }
}

function advanceStage() {
  if (noDamageBonus) {
    score += Math.floor(500 * intScoreMult());
    TAS.audio.playTone(880, 0.3, 'sine', 0.1);
  }
  stage++;
  checkpoint = stage;
  if (stage >= 8) {
    score += Math.floor(5000 * intScoreMult());
    if (score > highScore) {
      highScore = score;
      TAS.score.save('toads_of_tasern_hi', highScore);
    }
    state = 'victory';
    TAS.audio.playMelody([[440,0.2],[550,0.2],[660,0.2],[880,0.4]], 200);
    return;
  }
  state = 'stageIntro';
  stageTransition = 2.5;
  initStage();
}

// === BRAWL UPDATE ===
function updateBrawl(dt) {
  const p = player;
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  updateCrates(dt);

  // Death animation
  if (p.deathTimer > 0) {
    p.deathTimer -= dt;
    return;
  }

  // Iframes
  if (p.iframes > 0) p.iframes -= dt;
  if (p.hitStun > 0) {
    p.hitStun -= dt;
    return;
  }

  // Movement (DEX scales speed)
  let mx = 0, my = 0;
  if (keys['ArrowLeft'] || touch.left) { mx = -1; p.facing = -1; }
  if (keys['ArrowRight'] || touch.right) { mx = 1; p.facing = 1; }
  if (keys['ArrowUp'] || touch.up) my = -1;
  if (keys['ArrowDown'] || touch.down) my = 1;

  const moveSpeed = 130 * dexSpeedMult();

  if (!p.attacking) {
    p.x += mx * moveSpeed * dt;
    p.y += my * 80 * dt;
    p.x = TAS.math.clamp(p.x, 16, GW - 16);
    p.y = TAS.math.clamp(p.y, GROUND_Y - 60, GROUND_Y + 20);

    // Goo slow (Pass 2 hazard)
    for (const goo of gooPatches) {
      if (Math.abs(p.x - goo.x) < goo.w / 2 && Math.abs(p.y - goo.y) < 12) {
        p.x -= mx * moveSpeed * 0.4 * dt; // 40% slow
      }
    }

    if (mx !== 0 || my !== 0) {
      p.walkFrame += dt * 8;
      p.state = 'walk';
    } else {
      p.state = 'idle';
    }
  }

  // Jump
  if ((keys['KeyW'] || keys['Space'] || touch.up) && p.grounded && !p.attacking) {
    p.vy = -350;
    p.grounded = false;
    p.jumping = true;
    TAS.audio.playTone(300, 0.1, 'square', 0.06, 500);
  }

  // Air physics
  if (!p.grounded) {
    p.vy += GRAVITY * dt;
    p.y += p.vy * dt;
    if (p.y >= GROUND_Y) {
      p.y = GROUND_Y;
      p.vy = 0;
      p.grounded = true;
      p.jumping = false;
    }
  }

  // Attack input (WIS scales attack speed)
  const punchKey = keys['KeyA'] || keys['KeyD'] || keys['KeyZ'] || keys['KeyJ'] || touch.a;
  const kickKey = keys['KeyS'] || keys['KeyX'] || keys['KeyK'] || touch.b;
  const atkDuration = 0.25 / wisAtkSpeedMult();

  // Charged smash (Pass 2) — hold punch with STR >= 10
  if (punchKey && !p.attacking && p.hitStun <= 0 && statB.str >= 10) {
    chargeTimer += dt;
    if (chargeTimer >= 0.6) {
      chargeReady = true;
    }
  }
  if (!punchKey && chargeReady && chargeTimer > 0) {
    // Release charged smash
    chargeReady = false;
    chargeTimer = 0;
    p.attacking = true;
    p.attackTimer = 0.35;
    p.attackType = 20; // charged smash type
    p.transformAnim = 0.5;
    p.transformType = 'fist';
    TAS.audio.playTone(100, 0.4, 'sawtooth', 0.15, 50);
    TAS.fx.shake(12, 0.8);

    // Charged smash hit — big AOE
    const atkRange = 70;
    const atkDmg = Math.floor((50 + stage * 5) * strDmgMult() * (reactorFistTimer > 0 ? 1.5 : 1));
    const atkX = p.x + p.facing * 25;
    const atkY = p.y - 16;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 25, atkRange, 50, e.x - e.w/2, e.y - e.h, e.w, e.h)) {
        damageEnemy(e, i, atkDmg);
      }
    }
    for (const b of bosses) {
      if (!b.active) continue;
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 25, atkRange, 50, b.x - b.w/2, b.y - b.h, b.w, b.h)) {
        damageBoss(b, atkDmg);
      }
    }
    // Ground crack particles
    for (let i = 0; i < 12; i++) {
      TAS.particles.spawn(Math.floor(atkX + (Math.random() - 0.5) * atkRange), Math.floor(p.y), '#ffaa00', 1, 2, { size: 3, gravity: 4 });
    }
  } else if (!punchKey && !chargeReady) {
    chargeTimer = 0;
  }

  // Normal attacks
  if ((punchKey || kickKey) && !p.attacking && p.hitStun <= 0 && !chargeReady) {
    p.attacking = true;
    p.attackTimer = atkDuration;
    p.comboTimer = COMBO_WINDOW;

    if (punchKey) {
      p.attackType = p.comboCount % 3;
      p.comboCount++;
    } else {
      p.attackType = 10 + (p.comboCount % 2);
      p.comboCount++;
    }

    // Transform on combo finisher (every 3rd hit)
    if (p.comboCount >= 3 && p.comboCount % 3 === 0) {
      p.transformAnim = 0.4;
      if (p.attackType < 10) p.transformType = 'fist';
      else p.transformType = Math.random() > 0.5 ? 'boot' : 'horn';
      TAS.audio.playTone(150, 0.3, 'sawtooth', 0.12, 80);
      TAS.fx.shake(8, 0.85);
    } else {
      TAS.audio.playTone(200 + p.attackType * 50, 0.08, 'square', 0.06);
    }

    // Hit detection (STR scales damage, boot size)
    const isTransform = p.transformAnim > 0;
    const atkRange = isTransform ? Math.floor(50 * bootSizeMult()) : 32;
    const baseDmg = isTransform ? 35 + stage * 3 : 12 + stage * 2;
    const atkDmg = Math.floor(baseDmg * strDmgMult() * statB.damage * (reactorFistTimer > 0 ? 1.5 : 1));
    const atkX = p.x + p.facing * 20;
    const atkY = p.y - 16;

    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 20, atkRange, 40, e.x - e.w/2, e.y - e.h, e.w, e.h)) {
        damageEnemy(e, i, atkDmg);
      }
    }

    // Boss hits
    for (const b of bosses) {
      if (!b.active) continue;
      if (TAS.hit.rectOverlap(atkX - atkRange/2, atkY - 20, atkRange, 40, b.x - b.w/2, b.y - b.h, b.w, b.h)) {
        damageBoss(b, atkDmg);
      }
    }
  }

  // Attack cooldown
  if (p.attacking) {
    p.attackTimer -= dt;
    if (p.attackTimer <= 0) p.attacking = false;
  }
  if (p.transformAnim > 0) p.transformAnim -= dt;

  // Combo timeout
  if (p.comboTimer > 0) {
    p.comboTimer -= dt;
    if (p.comboTimer <= 0) p.comboCount = 0;
  }

  // Enemy spawning
  if (!bossActive && enemiesKilled < enemiesToKill && enemies.length < 4 + Math.floor(stage / 2)) {
    enemySpawnTimer -= dt;
    if (enemySpawnTimer <= 0) {
      spawnEnemy();
      enemySpawnTimer = 1.5 - stage * 0.1;
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    updateEnemy(enemies[i], dt, i);
  }

  // Update bosses
  for (const b of bosses) {
    if (b.active) updateBoss(b, dt);
  }

  // Hazards (stages 3-4)
  if (stage === 3 || stage === 4) updateHazards(dt);

  // Check brawl complete
  if (!bossActive && enemiesKilled >= enemiesToKill && enemies.length === 0) {
    stageComplete = true;
  }
  if (bossActive && bosses.every(b => !b.active)) {
    stageComplete = true;
    score += Math.floor(1000 * intScoreMult());
    TAS.audio.playMelody([[440,0.15],[660,0.15],[880,0.3]], 150);
  }
}

function damageEnemy(e, idx, dmg) {
  e.hp -= dmg;
  e.hitStun = HIT_STUN;
  e.vx = player.facing * 100;

  // Hit particles (Pass 3)
  TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y - e.h/2), '#ffaa00', 6, 3, { size: 2 });
  TAS.particles.spawn(Math.floor(e.x + player.facing * 5), Math.floor(e.y - e.h/2), '#ffffff', 3, 2, { size: 1 });
  TAS.audio.playTone(100 + Math.random() * 100, 0.1, 'sawtooth', 0.05);

  if (e.hp <= 0) {
    // Death animation delay (Pass 3)
    e.deathTimer = 0.3;
    e.state = 'dying';
    enemiesKilled++;
    score += Math.floor((50 + stage * 10) * intScoreMult());

    // Death burst particles
    TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y - e.h/2), '#ff4400', 14, 5, { size: 3, gravity: 3 });
    TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y - e.h/2), '#ffdd44', 6, 3, { size: 2, gravity: 2 });
    TAS.fx.shake(4, 0.88);
    TAS.audio.playTone(80, 0.2, 'sawtooth', 0.08, 40);

    // CHA-based power-up drop
    spawnPowerUp(e.x, e.y);

    // Remove after short delay
    setTimeout(function() {
      const idx2 = enemies.indexOf(e);
      if (idx2 >= 0) enemies.splice(idx2, 1);
    }, 300);
  }
}

function damageBoss(b, dmg) {
  if (b.hitStun > 0) return;
  b.hp -= dmg;
  b.hitStun = 0.2;
  TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y - b.h/2), '#ff8800', 10, 4, { size: 3 });
  TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y - b.h/2), '#ffffff', 4, 2, { size: 2 });
  TAS.fx.shake(6, 0.85);
  TAS.audio.playTone(120, 0.15, 'sawtooth', 0.08);

  if (b.hp <= 0) {
    b.active = false;
    score += Math.floor(500 * intScoreMult());
    TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y - b.h/2), '#ff0000', 25, 6, { size: 4, gravity: 3 });
    TAS.particles.spawn(Math.floor(b.x), Math.floor(b.y - b.h/2), '#ffdd44', 12, 4, { size: 3, gravity: 2 });
    TAS.fx.shake(14, 0.78);
    TAS.fx.flash('#ff4400', 0.5);
    TAS.audio.playNoise(0.4, 0.1, 200);
    spawnPowerUp(b.x, b.y);
    const nextBoss = bosses.find(bb => bb.active && bb !== b);
    if (nextBoss) nextBoss.timer = 1.5;
  }
}

function updateEnemy(e, dt, idx) {
  // Death animation (Pass 3)
  if (e.state === 'dying') {
    e.deathTimer -= dt;
    return;
  }

  if (e.hitStun > 0) {
    e.hitStun -= dt;
    e.x += e.vx * dt;
    e.vx *= 0.9;
    return;
  }

  const p = player;
  const dx = p.x - e.x;
  const dy = p.y - e.y;

  e.facing = dx > 0 ? 1 : -1;
  e.attackCooldown -= dt;

  // AI behavior
  const dist = Math.abs(dx);
  if (dist > 40) {
    e.x += e.facing * e.speed * dt;
    e.y += Math.sign(dy) * e.speed * 0.4 * dt;
    e.walkFrame += dt * 6;
    e.state = 'walk';
  } else if (e.attackCooldown <= 0) {
    e.state = 'attack';
    e.attackCooldown = 1.5 + Math.random();

    // Tasern enemy special attacks (Pass 2)
    let dmg = 8 + stage * 2;
    if (e.type === 'reactor_rat') dmg = 10 + stage * 2;
    else if (e.type === 'spore_walker') dmg = 12 + stage * 2;
    else if (e.type === 'mycelial_worm') dmg = 15 + stage * 3;

    if (p.iframes <= 0) {
      // DEX dodge chance
      if (Math.random() < dodgeChance()) {
        TAS.particles.spawn(Math.floor(p.x), Math.floor(p.y - 18), '#88ffaa', 4, 2, { size: 1 });
        TAS.audio.playTone(500, 0.06, 'sine', 0.03);
      } else {
        playerHit(dmg);
      }
    }
  }

  e.y = TAS.math.clamp(e.y, GROUND_Y - 50, GROUND_Y + 20);

  // Flyer behavior
  if (e.type === 'flyer') {
    e.y = GROUND_Y - 40 - Math.sin(frame * 0.05 + idx) * 20;
  }

  // Mycelial worm burrow (Pass 2)
  if (e.type === 'mycelial_worm' && dist > 100 && Math.random() < 0.005) {
    e.x = p.x + (Math.random() > 0.5 ? 50 : -50);
    e.y = GROUND_Y;
    TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y), '#886644', 6, 3, { size: 2, gravity: 3 });
  }
}

function updateBoss(b, dt) {
  if (b.hitStun > 0) b.hitStun -= dt;

  b.timer -= dt;
  const p = player;
  const dx = p.x - b.x;
  b.facing = dx > 0 ? 1 : -1;

  // Phase changes
  if (b.hp < b.maxHp * 0.5 && b.phase === 1) {
    b.phase = 2;
    TAS.fx.flash('#ff0000', 0.3);
    TAS.fx.shake(8, 0.85);
  }

  // Tasern boss abilities (Pass 2)
  b.sporeTimer -= dt;
  b.gooTimer -= dt;

  // Spore burst attack (all bosses, phase 2)
  if (b.phase === 2 && b.sporeTimer <= 0) {
    b.sporeTimer = 3 + Math.random() * 2;
    for (let i = 0; i < 5; i++) {
      const angle = (i / 5) * Math.PI * 2;
      projectiles.push({
        x: b.x, y: b.y - 30,
        vx: Math.cos(angle) * 120, vy: Math.sin(angle) * 120,
        w: 8, h: 8, life: 2.5, type: 'spore'
      });
    }
    TAS.audio.playTone(200, 0.2, 'square', 0.06, 100);
  }

  // Goo puddle attack (boss types 2+)
  if (b.type >= 2 && b.gooTimer <= 0) {
    b.gooTimer = 5 + Math.random() * 3;
    gooPatches.push({
      x: Math.floor(p.x + (Math.random() - 0.5) * 60),
      y: GROUND_Y + Math.floor(Math.random() * 10),
      w: 40,
      timer: 8
    });
  }

  if (b.timer <= 0) {
    b.pattern = (b.pattern + 1) % 4;
    const speed = b.phase === 2 ? 1.5 : 1.0;

    if (b.pattern === 0) {
      b.state = 'charge';
      b.timer = 0.8 / speed;
      b.vx = b.facing * 200 * speed;
    } else if (b.pattern === 1) {
      b.state = 'slam';
      b.timer = 0.6;
      if (Math.abs(dx) < 60 && p.iframes <= 0) {
        if (Math.random() < dodgeChance()) {
          TAS.particles.spawn(Math.floor(p.x), Math.floor(p.y - 18), '#88ffaa', 4, 2, { size: 1 });
        } else {
          playerHit(15 + b.type * 3);
          TAS.fx.shake(8, 0.82);
        }
      }
    } else if (b.pattern === 2) {
      b.state = 'shoot';
      b.timer = 1.0 / speed;
      spawnProjectile(b.x, b.y - 20, b.facing);
    } else {
      b.state = 'idle';
      b.timer = 0.8 / speed;
    }
  }

  // Move during charge
  if (b.state === 'charge') {
    b.x += (b.vx || 0) * dt;
    b.x = TAS.math.clamp(b.x, 40, GW - 40);
    if (TAS.hit.rectOverlap(b.x - b.w/2, b.y - b.h, b.w, b.h, p.x - 12, p.y - 36, 24, 36)) {
      if (p.iframes <= 0) {
        if (Math.random() >= dodgeChance()) {
          playerHit(12 + b.type * 2);
        }
      }
    }
  }

  // Expire goo patches
  for (let i = gooPatches.length - 1; i >= 0; i--) {
    gooPatches[i].timer -= dt;
    if (gooPatches[i].timer <= 0) gooPatches.splice(i, 1);
  }
}

let projectiles = [];
function spawnProjectile(x, y, dir) {
  projectiles.push({ x, y, vx: dir * 180, vy: 0, w: 10, h: 8, life: 3, type: 'normal' });
}

function updateHazards(dt) {
  // Falling rocks on stage 3-4
  if (Math.random() < 0.01 + stage * 0.005) {
    hazards.push({ x: Math.floor(Math.random() * GW), y: -20, vy: 100 + Math.random() * 80, size: 8 + Math.random() * 12 });
  }
  for (let i = hazards.length - 1; i >= 0; i--) {
    const h = hazards[i];
    h.y += h.vy * dt;
    if (h.y > GH + 20) { hazards.splice(i, 1); continue; }
    if (TAS.hit.circleOverlap(h.x, h.y, h.size/2, player.x, player.y - 18, 12)) {
      if (player.iframes <= 0) {
        if (activeShield > 0) {
          activeShield = 0;
          TAS.particles.spawn(Math.floor(player.x), Math.floor(player.y - 18), '#44ffaa', 8, 3, { size: 2 });
          hazards.splice(i, 1);
        } else if (Math.random() >= dodgeChance()) {
          playerHit(10);
          hazards.splice(i, 1);
        }
      }
    }
  }

  // Projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx * dt;
    pr.y += (pr.vy || 0) * dt;
    pr.life -= dt;
    if (pr.life <= 0 || pr.x < -20 || pr.x > GW + 20 || pr.y > GH + 20) { projectiles.splice(i, 1); continue; }
    if (TAS.hit.rectOverlap(pr.x - pr.w/2, pr.y - pr.h/2, pr.w, pr.h, player.x - 12, player.y - 36, 24, 36)) {
      if (player.iframes <= 0) {
        if (activeShield > 0) {
          activeShield = 0;
          TAS.particles.spawn(Math.floor(player.x), Math.floor(player.y - 18), '#44ffaa', 6, 3, { size: 2 });
        } else if (Math.random() >= dodgeChance()) {
          playerHit(8);
        }
        projectiles.splice(i, 1);
      }
    }
  }
}

// === SPEEDER UPDATE ===
function updateSpeeder(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  speederSpeed += dt * 15 * dexSpeedMult();
  speederDist += speederSpeed * dt;

  if (keys['ArrowLeft'] || touch.left) {
    if (speederLane > 0) { speederLane--; keys['ArrowLeft'] = false; TAS.audio.playTone(400, 0.05, 'square', 0.04); }
  }
  if (keys['ArrowRight'] || touch.right) {
    if (speederLane < 2) { speederLane++; keys['ArrowRight'] = false; TAS.audio.playTone(400, 0.05, 'square', 0.04); }
  }
  const jumping = keys['KeyW'] || keys['ArrowUp'] || keys['Space'] || touch.up || touch.a;

  for (const w of speederWalls) {
    if (w.hit) continue;
    const relDist = w.dist - speederDist;
    if (relDist < 10 && relDist > -20) {
      if (w.lane === speederLane && !jumping) {
        w.hit = true;
        playerHit(25);
        TAS.fx.shake(10, 0.8);
        TAS.audio.playNoise(0.3, 0.12, 300);
        speederSpeed *= 0.6;
      }
    }
  }

  for (const r of speederRamps) {
    const relDist = r.dist - speederDist;
    if (relDist < 10 && relDist > -10 && r.lane === speederLane) {
      score += Math.floor(25 * intScoreMult());
      r.dist = -9999;
      TAS.audio.playTone(600, 0.1, 'sine', 0.05, 900);
      TAS.particles.spawn(Math.floor(GW/2), Math.floor(GROUND_Y - 20), '#44ff88', 6, 3);
    }
  }

  if (speederDist >= speederGoal) {
    stageComplete = true;
    score += Math.floor(300 * intScoreMult());
  }
}

// === RAPPEL UPDATE ===
function updateRappel(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  const p = player;

  const descSpeed = 60;
  rapDepth += descSpeed * dt;
  p.rapVy = 0;

  if (keys['ArrowLeft'] || touch.left) p.rapX -= 150 * dexSpeedMult() * dt;
  if (keys['ArrowRight'] || touch.right) p.rapX += 150 * dexSpeedMult() * dt;
  p.rapX = TAS.math.clamp(p.rapX, 30, GW - 30);

  const kickKey = keys['KeyA'] || keys['KeyS'] || keys['KeyD'] || keys['KeyZ'] || keys['KeyX'] || touch.a || touch.b;
  if (kickKey) {
    for (let i = rapEnemies.length - 1; i >= 0; i--) {
      const re = rapEnemies[i];
      if (!re.active) continue;
      const relDepth = re.depth - rapDepth;
      if (Math.abs(relDepth) < 30 && Math.abs(re.x - p.rapX) < 40) {
        re.active = false;
        score += Math.floor(75 * intScoreMult());
        TAS.particles.spawn(Math.floor(re.x), Math.floor(GH/2), '#ffaa00', 8, 4);
        TAS.fx.shake(3, 0.9);
        TAS.audio.playTone(180, 0.12, 'sawtooth', 0.06);
      }
    }
  }

  for (const re of rapEnemies) {
    if (!re.active) continue;
    const relDepth = re.depth - rapDepth;
    if (Math.abs(relDepth) < 20 && Math.abs(re.x - p.rapX) < 20) {
      if (p.iframes <= 0) {
        if (Math.random() >= dodgeChance()) {
          playerHit(12);
        }
        re.active = false;
      }
    }
  }

  for (const plat of rapPlatforms) {
    const relDepth = plat.depth - rapDepth;
    if (Math.abs(relDepth) < 15) {
      const px = plat.side === 'left' ? 30 : GW - 30 - plat.w;
      if (p.rapX > px && p.rapX < px + plat.w) {
        if (p.iframes <= 0) playerHit(5);
        p.rapX = plat.side === 'left' ? px + plat.w + 15 : px - 15;
      }
    }
  }

  if (rapDepth >= rapGoal) {
    stageComplete = true;
    score += Math.floor(300 * intScoreMult());
  }
}

// === SNAKE UPDATE ===
function updateSnake(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  const p = player;

  snakeDist += 160 * dt;
  snakeWave += dt * 3;

  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) p.snakeVy -= 400 * dexSpeedMult() * dt;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) p.snakeVy += 400 * dexSpeedMult() * dt;
  p.snakeVy *= 0.92;
  p.snakeY += p.snakeVy * dt;
  p.snakeY = TAS.math.clamp(p.snakeY, 50, GH - 60);

  for (const ob of snakeObs) {
    const relDist = ob.dist - snakeDist;
    if (relDist < 60 && relDist > -10) {
      if (TAS.hit.rectOverlap(55, Math.floor(p.snakeY) - 10, 30, 20, Math.floor(relDist) + 60, Math.floor(ob.y) - ob.h/2, ob.w, ob.h)) {
        if (p.iframes <= 0) {
          if (Math.random() >= dodgeChance()) {
            playerHit(15);
          }
          ob.dist = -9999;
          TAS.fx.shake(4, 0.9);
        }
      }
    }
  }

  if ((keys['KeyW'] || keys['Space'] || touch.a) && p.snakeVy >= -50) {
    p.snakeVy = -200;
    TAS.audio.playTone(350, 0.08, 'square', 0.04, 500);
  }

  if (snakeDist >= snakeGoal) {
    stageComplete = true;
    score += Math.floor(300 * intScoreMult());
  }
}

// === PLAYER DAMAGE ===
function playerHit(dmg) {
  // Spore Shield absorbs hit
  if (activeShield > 0) {
    activeShield = 0;
    TAS.particles.spawn(Math.floor(player.x), Math.floor(player.y - 18), '#44ffaa', 10, 4, { size: 2 });
    TAS.audio.playTone(400, 0.1, 'sine', 0.05);
    return;
  }

  player.hp -= dmg;
  player.hitStun = HIT_STUN;
  player.iframes = IFRAME_DUR;
  noDamageBonus = false;
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#ff0000', 0.25);
  TAS.audio.playTone(80, 0.15, 'sawtooth', 0.08, 40);
  TAS.particles.spawn(Math.floor(player.x), Math.floor(player.y - 18), '#ff2222', 8, 3, { size: 2 });

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  lives--;
  player.deathTimer = 1.0;

  // Death animation particles (Pass 3)
  TAS.fx.shake(14, 0.78);
  TAS.fx.flash('#ff0000', 0.6);
  TAS.audio.playNoise(0.5, 0.12, 200);
  // Explosion ring
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2;
    const dist = 10 + Math.random() * 15;
    TAS.particles.spawn(
      Math.floor(player.x + Math.cos(angle) * dist),
      Math.floor(player.y - 18 + Math.sin(angle) * dist),
      i % 3 === 0 ? '#ff4400' : i % 3 === 1 ? '#ffaa00' : '#ffdd44',
      1, 4, { size: 2 + Math.random() * 2, gravity: 2 }
    );
  }

  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('toads_of_tasern_hi', highScore);
    }
  } else {
    setTimeout(function() {
      if (player) {
        player.hp = player.maxHp;
        player.x = 60;
        player.y = GROUND_Y;
        player.iframes = 2.0;
        player.hitStun = 0;
        player.attacking = false;
        player.deathTimer = 0;
      }
    }, 800);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Stage: ' + (stage + 1) + ' - ' + STAGE_NAMES[stage] });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'stageIntro') {
    drawStageIntro();
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  const st = STAGE_TYPES[stage];
  if (st === 'brawl' || st === 'boss') drawBrawlScene();
  else if (st === 'speeder') drawSpeederScene();
  else if (st === 'rappel') drawRappelScene();
  else if (st === 'snake') drawSnakeScene();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Stage clear overlay (Pass 3)
  if (stageComplete && stageClearTimer > 0) {
    drawStageClear();
  }
}

// === STAGE CLEAR SCREEN (Pass 3) ===
function drawStageClear() {
  const t = 2.5 - stageClearTimer;
  ctx.globalAlpha = Math.min(0.8, t * 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, GW, GH);
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';

  // Zone cleared banner
  const pal = ZONE_PALETTES[stage];
  ctx.fillStyle = pal ? pal.accent : '#44ff88';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('STAGE CLEAR', GW/2, GH/2 - 30);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW/2, GH/2);

  // Kill count
  if (STAGE_TYPES[stage] === 'brawl' || STAGE_TYPES[stage] === 'boss') {
    ctx.fillStyle = '#aaa';
    ctx.font = '11px monospace';
    ctx.fillText('Enemies Defeated: ' + enemiesKilled, GW/2, GH/2 + 22);
  }

  // No damage bonus
  if (noDamageBonus) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('FLAWLESS! +' + Math.floor(500 * intScoreMult()), GW/2, GH/2 + 44);
  }

  // Score tally
  ctx.fillStyle = '#88ccff';
  ctx.font = '10px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH/2 + 62);
}

// === BREAKABLE CRATES (Grok art environment) ===
function updateCrates(dt) {
  if (cratesStage !== stage) {
    cratesStage = stage;
    crates = (STAGE_TYPES[stage] === 'brawl') ? [
      { x: 150, broken: false, t: 0 },
      { x: GW - 140, broken: false, t: 0 }
    ] : [];
  }
  for (const c of crates) {
    if (c.broken) { c.t += dt; continue; }
    if (player.attacking && Math.abs(player.x - c.x) < 42 && Math.abs(player.y - GROUND_Y) < 44) {
      c.broken = true; c.t = 0;
      TAS.particles.spawn(c.x, GROUND_Y - 10, '#a87332', 12, 2.2, { size: 3, gravity: 6, spread: 70 });
      if (TAS.fx && TAS.fx.shake) TAS.fx.shake(3);
      score += Math.floor(40 * intScoreMult());
      if (Math.random() < 0.6) spawnPowerUp(c.x, GROUND_Y - 22);
    }
  }
}

// === DRAW BRAWL ===
function drawBrawlScene() {
  drawBrawlBg();

  // Goo patches (Pass 2 hazard)
  for (const goo of gooPatches) {
    ctx.fillStyle = 'rgba(80,180,40,0.35)';
    ctx.beginPath();
    ctx.ellipse(Math.floor(goo.x), Math.floor(goo.y) + 18, Math.floor(goo.w / 2), 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(100,220,60,0.25)';
    ctx.beginPath();
    ctx.ellipse(Math.floor(goo.x), Math.floor(goo.y) + 18, Math.floor(goo.w / 3), 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  const pal = ZONE_PALETTES[stage];
  ctx.fillStyle = pal.ground;
  ctx.fillRect(0, GROUND_Y + 18, GW, GH - GROUND_Y - 18);
  ctx.strokeStyle = pal.line;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 18);
  ctx.lineTo(GW, GROUND_Y + 18);
  ctx.stroke();

  // Spore rain drops (Pass 2 hazard)
  for (const sr of sporeRainDrops) {
    ctx.fillStyle = 'rgba(170,100,220,0.6)';
    ctx.beginPath();
    ctx.arc(Math.floor(sr.x), Math.floor(sr.y), Math.floor(sr.size), 0, Math.PI * 2);
    ctx.fill();
  }

  // Hazards
  for (const h of hazards) {
    ctx.fillStyle = '#664422';
    ctx.beginPath();
    ctx.arc(Math.floor(h.x), Math.floor(h.y), Math.floor(h.size/2), 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#553311';
    ctx.beginPath();
    ctx.arc(Math.floor(h.x) - 2, Math.floor(h.y) - 2, Math.floor(h.size/4), 0, Math.PI * 2);
    ctx.fill();
  }

  // Projectiles
  for (const pr of projectiles) {
    if (pr.type === 'spore') {
      ctx.fillStyle = '#aa66dd';
      ctx.beginPath();
      ctx.arc(Math.floor(pr.x), Math.floor(pr.y), 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cc88ff';
      ctx.beginPath();
      ctx.arc(Math.floor(pr.x), Math.floor(pr.y), 3, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#ff4488';
      ctx.beginPath();
      ctx.arc(Math.floor(pr.x), Math.floor(pr.y), 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff88aa';
      ctx.beginPath();
      ctx.arc(Math.floor(pr.x), Math.floor(pr.y), 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Mushroom platform (Grok art — scenery ledge)
  if (sprReady(SPR.platform)) {
    var _plw = 70, _plh = _plw * (SPR.platform.naturalHeight / SPR.platform.naturalWidth);
    ctx.globalAlpha = 0.92;
    ctx.drawImage(SPR.platform, GW - 112, GROUND_Y - _plh + 26, _plw, _plh);
    ctx.globalAlpha = 1;
  }

  // Breakable crates (Grok art)
  for (const c of crates) {
    if (c.broken && c.t > 0.4) continue;
    if (!sprReady(SPR.box)) break;
    var _bxh = 32, _bxw = _bxh * (SPR.box.naturalWidth / SPR.box.naturalHeight);
    ctx.save();
    ctx.translate(Math.floor(c.x), GROUND_Y + 4);
    if (c.broken) ctx.globalAlpha = Math.max(0, 1 - c.t / 0.4);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 2, _bxw / 2, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.drawImage(SPR.box, -_bxw / 2, -_bxh, _bxw, _bxh);
    ctx.restore();
  }

  // Power-ups
  for (const pu of powerUps) {
    drawPowerUp(pu);
  }

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Bosses
  for (const b of bosses) {
    if (b.active) drawBoss(b);
  }

  // Player
  drawPlayer();
}

function drawPowerUp(pu) {
  const by = Math.floor(pu.y + Math.sin(pu.bob) * 4);
  const blink = pu.timer < 2 && Math.floor(frame / 4) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(Math.floor(pu.x), by);

  if (pu.type === 'spore_shield') {
    // Green shield icon
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(-7, -4);
    ctx.lineTo(-7, 4);
    ctx.lineTo(0, 10);
    ctx.lineTo(7, 4);
    ctx.lineTo(7, -4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#4ae88a';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (pu.type === 'reactor_fist') {
    // Gold fist icon
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f7cc5a';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('!', 0, 4);
  } else if (pu.type === 'lp_token') {
    // Gold coin icon
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d4940b';
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('M', 0, 3);
  }

  ctx.restore();
}

function drawBrawlBg() {
  const pal = ZONE_PALETTES[stage];

  // Stage background image (Grok art) with gradient fallback
  var _bg = SPR.bg[stage];
  if (sprReady(_bg)) {
    ctx.drawImage(_bg, 0, 0, GW, GROUND_Y + 18);
    ctx.fillStyle = 'rgba(8,6,16,0.5)';
    ctx.fillRect(0, 0, GW, GROUND_Y + 18);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    grad.addColorStop(0, pal.sky1);
    grad.addColorStop(1, pal.sky2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GROUND_Y + 18);
  }

  // BG elements
  for (const b of bgLayers) {
    ctx.fillStyle = b.color;
    ctx.fillRect(Math.floor(b.x), Math.floor(b.y), Math.floor(b.size), Math.floor(b.size * 2));
  }

  // Mushroom silhouettes (improved Pass 3)
  for (let i = 0; i < 6; i++) {
    const mx = Math.floor(40 + i * 85 + Math.sin(frame * 0.008 + i) * 4);
    const my = GROUND_Y - 10;
    const mh = 18 + Math.floor(Math.sin(i * 1.7) * 6);
    ctx.fillStyle = pal.sky2;
    ctx.fillRect(mx - 2, my - mh, 4, mh);
    ctx.beginPath();
    ctx.arc(mx, my - mh - 2, 10 + Math.floor(Math.sin(i * 2.3) * 4), Math.PI, 0);
    ctx.fill();
    // Glowing spots
    if (stage >= 2) {
      ctx.fillStyle = pal.accent;
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.15;
      ctx.beginPath();
      ctx.arc(mx - 3, my - mh - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Zone name watermark (Pass 3)
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = pal.accent;
  ctx.font = 'bold 36px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGE_NAMES[stage], GW/2, GROUND_Y - 30);
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const p = player;

  // Death animation (Pass 3)
  if (p.deathTimer > 0) {
    const t = p.deathTimer;
    ctx.save();
    ctx.translate(Math.floor(p.x), Math.floor(p.y));
    ctx.globalAlpha = t;
    ctx.fillStyle = '#ff4400';
    const s = (1 - t) * 30;
    ctx.beginPath();
    ctx.arc(0, -18, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(0, -18, s * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  if (p.iframes > 0 && Math.floor(frame / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(Math.floor(p.x), Math.floor(p.y));

  // Spore Shield glow (Pass 2)
  if (activeShield > 0) {
    ctx.strokeStyle = '#38d973';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
    ctx.beginPath();
    ctx.arc(0, -18, 22, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Reactor Fist glow (Pass 2)
  if (reactorFistTimer > 0) {
    ctx.fillStyle = 'rgba(244,180,27,0.2)';
    ctx.beginPath();
    ctx.arc(p.facing * 15, -22, 14, 0, Math.PI * 2);
    ctx.fill();
  }

  // Charge indicator (Pass 2)
  if (chargeTimer > 0.1 && !chargeReady) {
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 2;
    const pct = Math.min(chargeTimer / 0.6, 1);
    ctx.beginPath();
    ctx.arc(0, -42, 8, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2);
    ctx.stroke();
  }
  if (chargeReady) {
    ctx.fillStyle = '#f4b41b';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.2) * 0.3;
    ctx.beginPath();
    ctx.arc(0, -42, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === TOAD HERO SPRITE (Grok art) ===
  var _drewToad = false;
  if (sprReady(SPR.toad)) {
    var _pb = p.state === 'walk' ? Math.abs(Math.sin(p.walkFrame)) * 2 : 0;
    var _th = 52, _tw = _th * (SPR.toad.naturalWidth / SPR.toad.naturalHeight);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 2, 13, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.save();
    if (p.facing < 0) ctx.scale(-1, 1);
    ctx.drawImage(SPR.toad, -_tw / 2 + (p.attacking ? 4 : 0), -_th - _pb, _tw, _th);
    ctx.restore();
    if (p.attacking) drawAttack(_pb);
    _drewToad = true;
  }
  if (!_drewToad && !TAS.drawBaseling(ctx, 0, -18, 40, { flipX: p.facing < 0, frame: frame })) {
    // Body (improved sprite Pass 3)
    const bob = p.state === 'walk' ? Math.sin(p.walkFrame) * 2 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Torso
    ctx.fillStyle = statB.color || '#38d973';
    ctx.fillRect(-8 * p.facing, -32 + bob, 16, 20);

    // Belt detail
    ctx.fillStyle = '#1a5c3a';
    ctx.fillRect(-8, -14 + bob, 16, 3);

    // Head
    const headColor = statB.color || '#38d973';
    ctx.fillStyle = headColor;
    ctx.beginPath();
    ctx.arc(0, -36 + bob, 10, 0, Math.PI * 2);
    ctx.fill();

    // Headband (Pass 3)
    ctx.fillStyle = '#dd4444';
    ctx.fillRect(-10, -38 + bob, 20, 3);
    // Headband tail
    ctx.fillRect(-10, -38 + bob, 2, 6 + Math.floor(Math.sin(p.walkFrame * 0.5) * 2));

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.facing * 3, -38 + bob, 4, 4);
    ctx.fillStyle = '#111';
    ctx.fillRect(p.facing * 4, -37 + bob, 2, 2);

    // Mouth (determined expression)
    ctx.fillStyle = '#1a5c3a';
    ctx.fillRect(p.facing * 2, -32 + bob, 4, 1);

    // Legs (improved)
    const legOff = p.state === 'walk' ? Math.sin(p.walkFrame) * 5 : 0;
    ctx.fillStyle = '#2ba85e';
    ctx.fillRect(-6, -12 + bob, 5, 14);
    ctx.fillRect(1, -12 + bob + Math.floor(legOff), 5, 14);
    // Boots (Pass 3)
    ctx.fillStyle = '#1a5c3a';
    ctx.fillRect(-7, 0 + bob, 7, 4);
    ctx.fillRect(0, 0 + bob + Math.floor(legOff), 7, 4);

    // Arms / Attack
    if (p.attacking) {
      drawAttack(bob);
    } else {
      ctx.fillStyle = statB.color || '#38d973';
      ctx.fillRect(p.facing * 8, -28 + bob, 5 * p.facing, 12);
    }

    // Transform animation (oversized limb)
    if (p.transformAnim > 0) {
      drawTransform(bob);
    }
  }

  ctx.restore();
}

function drawAttack(bob) {
  const p = player;
  const progress = 1 - (p.attackTimer / (0.25 / wisAtkSpeedMult()));

  if (p.attackType === 20) {
    // Charged smash (Pass 2)
    const extend = Math.sin(progress * Math.PI) * 30;
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(p.facing * 10, -26 + bob, Math.floor(p.facing * (extend + 8)), 10);
    ctx.fillStyle = '#f7cc5a';
    ctx.beginPath();
    ctx.arc(Math.floor(p.facing * (18 + extend)), -22 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    // Impact sparks
    if (progress > 0.4) {
      ctx.fillStyle = '#ffff88';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.floor(p.facing * (20 + extend) + (Math.random()-0.5)*10),
          Math.floor(-22 + bob + (Math.random()-0.5)*10),
          2, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }
  } else if (p.attackType < 10) {
    // Punch combo (improved Pass 3)
    const extend = Math.sin(progress * Math.PI) * 20;
    ctx.fillStyle = reactorFistTimer > 0 ? '#f4b41b' : '#38d973';
    ctx.fillRect(p.facing * 10, -26 + bob, Math.floor(p.facing * (extend + 5)), 8);
    // Fist
    ctx.fillStyle = reactorFistTimer > 0 ? '#f4b41b' : '#4ae88a';
    ctx.beginPath();
    ctx.arc(Math.floor(p.facing * (15 + extend)), -22 + bob, 6, 0, Math.PI * 2);
    ctx.fill();
    // Motion line (Pass 3)
    if (extend > 10) {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(Math.floor(p.facing * 12), -22 + bob);
      ctx.lineTo(Math.floor(p.facing * (10 + extend * 0.5)), -22 + bob);
      ctx.stroke();
    }
  } else {
    // Kick (improved Pass 3)
    const extend = Math.sin(progress * Math.PI) * 22;
    ctx.fillStyle = '#2ba85e';
    ctx.save();
    ctx.translate(0, -8 + bob);
    ctx.rotate(p.facing * progress * 0.5);
    ctx.fillRect(p.facing * 5, 0, Math.floor(p.facing * (extend + 8)), 7);
    // Boot (STR scales size)
    const bSize = Math.floor(8 * bootSizeMult());
    ctx.fillStyle = '#1a5c3a';
    ctx.fillRect(Math.floor(p.facing * (13 + extend)), -2, p.facing * bSize, 10);
    ctx.restore();
  }
}

function drawTransform(bob) {
  const p = player;
  const scale = p.transformAnim / (p.attackType === 20 ? 0.5 : 0.4);
  const size = 18 + (1 - scale) * 20;

  ctx.globalAlpha = scale;
  if (p.transformType === 'fist') {
    // Giant fist
    ctx.fillStyle = reactorFistTimer > 0 ? '#f4b41b' : '#f4b41b';
    ctx.beginPath();
    ctx.arc(Math.floor(p.facing * 40), -22 + bob, Math.floor(size), 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = reactorFistTimer > 0 ? '#d4940b' : '#d4940b';
    ctx.beginPath();
    ctx.arc(Math.floor(p.facing * 40 - 3), -24 + bob, Math.floor(size * 0.6), 0, Math.PI * 2);
    ctx.fill();
    // Impact lines (Pass 3)
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI - Math.PI/4;
      ctx.strokeStyle = '#ffff88';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(Math.floor(p.facing * 40 + Math.cos(angle) * size), Math.floor(-22 + bob + Math.sin(angle) * size));
      ctx.lineTo(Math.floor(p.facing * 40 + Math.cos(angle) * (size + 14)), Math.floor(-22 + bob + Math.sin(angle) * (size + 14)));
      ctx.stroke();
    }
  } else if (p.transformType === 'boot') {
    // Giant boot (STR scales)
    const bMult = bootSizeMult();
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(Math.floor(p.facing * 25), -12 + bob, Math.floor(p.facing * size * 1.5 * bMult), Math.floor(size * 0.8));
    ctx.fillStyle = '#d4940b';
    ctx.fillRect(Math.floor(p.facing * 30), -8 + bob, Math.floor(p.facing * size * bMult), Math.floor(size * 0.5));
    // Stomp wave
    ctx.strokeStyle = '#f7cc5a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(Math.floor(p.facing * (25 + size)), bob, Math.floor((1-scale) * 20), 0, Math.PI);
    ctx.stroke();
  } else {
    // Horn ram
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.moveTo(Math.floor(p.facing * 15), -40 + bob);
    ctx.lineTo(Math.floor(p.facing * (15 + size * 2)), -36 + bob);
    ctx.lineTo(Math.floor(p.facing * 15), -30 + bob);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#d4940b';
    ctx.beginPath();
    ctx.moveTo(Math.floor(p.facing * 18), -38 + bob);
    ctx.lineTo(Math.floor(p.facing * (18 + size * 1.2)), -36 + bob);
    ctx.lineTo(Math.floor(p.facing * 18), -33 + bob);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawEnemy(e) {
  // Death flash (Pass 3)
  if (e.state === 'dying') {
    ctx.save();
    ctx.translate(Math.floor(e.x), Math.floor(e.y));
    ctx.globalAlpha = e.deathTimer / 0.3;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -16, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // === ENEMY SPRITE (Grok art) ===
  if (sprReady(SPR.enemy[e.type])) {
    var _es = SPR.enemy[e.type];
    var _eb = Math.sin(e.walkFrame) * 2;
    var _eh = (e.h || 34) + 14, _ew = _eh * (_es.naturalWidth / _es.naturalHeight);
    ctx.save();
    ctx.translate(Math.floor(e.x), Math.floor(e.y));
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 2, 11, 3, 0, 0, Math.PI * 2); ctx.fill();
    if (e.facing > 0) { ctx.scale(-1, 1); }
    ctx.drawImage(_es, -_ew / 2, -_eh + _eb, _ew, _eh);
    if (e.hitStun > 0) {
      ctx.globalAlpha = 0.55; ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(_es, -_ew / 2, -_eh + _eb, _ew, _eh);
      ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
    }
    if (e.facing > 0) { ctx.scale(-1, 1); }
    if (e.hp > 0 && getEnemyHp(e.type) > 40) {
      var _hpW = 24;
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-_hpW / 2, -_eh - 8, _hpW, 3);
      ctx.fillStyle = '#e6482e'; ctx.fillRect(-_hpW / 2, -_eh - 8, Math.floor(_hpW * (e.hp / getEnemyHp(e.type))), 3);
    }
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(Math.floor(e.x), Math.floor(e.y));

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 10, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  if (e.hitStun > 0) {
    ctx.fillStyle = '#fff';
  } else {
    const colors = {
      fungal_rat: '#a855f7', spore_pig: '#9b44d4', mushroom_warrior: '#7c3aed', flyer: '#8b5cf6', bomber: '#c084fc',
      reactor_rat: '#a855f7', spore_walker: '#8b5cf6', mycelial_worm: '#7c3aed'
    };
    ctx.fillStyle = colors[e.type] || '#888';
  }

  const bob = Math.sin(e.walkFrame) * 2;

  if (e.type === 'fungal_rat') {
    // Small fungal rat — round body, pointy ears, glowing eyes
    ctx.beginPath();
    ctx.arc(0, -10 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.fillRect(-9, -20 + bob, 4, 7);
    ctx.fillRect(5, -20 + bob, 4, 7);
    // Tail
    ctx.strokeStyle = e.hitStun > 0 ? '#fff' : '#7c3aed';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-9, -8 + bob);
    ctx.quadraticCurveTo(-16, -14 + bob, -18, -5 + bob);
    ctx.stroke();
    // Fungal spots
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#c084fc';
    ctx.beginPath();
    ctx.arc(-3, -13 + bob, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4, -8 + bob, 2, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(e.facing * 3, -12 + bob, 3, 3);
  } else if (e.type === 'spore_pig') {
    // Spore pig — squat body, snout, mushroom growths
    ctx.fillRect(-9, -24 + bob, 18, 16);
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#c084fc';
    // Snout
    ctx.beginPath();
    ctx.arc(e.facing * 10, -16 + bob, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a0a2a';
    ctx.fillRect(e.facing * 10 - 1, -17 + bob, 2, 2);
    ctx.fillRect(e.facing * 10 + 2, -17 + bob, 2, 2);
    // Mushroom growth on back
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#a855f7';
    ctx.fillRect(-2, -30 + bob, 4, 8);
    ctx.beginPath();
    ctx.arc(0, -32 + bob, 6, Math.PI, 0);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(e.facing * 3, -22 + bob, 3, 3);
  } else if (e.type === 'mushroom_warrior') {
    // Mushroom warrior — tall, armored cap, heavy
    ctx.fillRect(-12, -34 + bob, 24, 28);
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#a855f7';
    // Mushroom cap helmet
    ctx.beginPath();
    ctx.arc(0, -38 + bob, 14, Math.PI, 0);
    ctx.fill();
    // Cap spots
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.arc(-5, -42 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6, -39 + bob, 2, 0, Math.PI * 2);
    ctx.fill();
    // Red eyes
    ctx.fillStyle = '#ff2244';
    ctx.fillRect(e.facing * 2 - 3, -36 + bob, 3, 3);
    ctx.fillRect(e.facing * 2 + 2, -36 + bob, 3, 3);
  } else if (e.type === 'flyer') {
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#3377aa';
    const wingFlap = Math.sin(frame * 0.2) * 8;
    ctx.beginPath();
    ctx.moveTo(-5, -14);
    ctx.lineTo(-20, -20 + Math.floor(wingFlap));
    ctx.lineTo(-5, -20);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, -14);
    ctx.lineTo(20, -20 + Math.floor(wingFlap));
    ctx.lineTo(5, -20);
    ctx.fill();
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#4488cc';
    ctx.beginPath();
    ctx.arc(0, -14, 8, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.type === 'bomber') {
    ctx.beginPath();
    ctx.arc(0, -16 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -26 + bob);
    ctx.lineTo(3, -32 + bob);
    ctx.stroke();
    if (frame % 6 < 3) {
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(3, -33 + bob, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (e.type === 'reactor_rat') {
    // Tasern: Reactor Rat (Pass 2) — small, quick, glowing eyes
    ctx.beginPath();
    ctx.arc(0, -10 + bob, 8, 0, Math.PI * 2);
    ctx.fill();
    // Ears
    ctx.fillRect(-8, -18 + bob, 4, 6);
    ctx.fillRect(4, -18 + bob, 4, 6);
    // Tail
    ctx.strokeStyle = e.hitStun > 0 ? '#fff' : '#aa6633';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, -8 + bob);
    ctx.quadraticCurveTo(-16, -14 + bob, -20, -6 + bob);
    ctx.stroke();
    // Glowing eyes
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(e.facing * 2, -12 + bob, 3, 2);
    ctx.fillRect(e.facing * 2 + 4, -12 + bob, 3, 2);
    // Sparks
    if (frame % 10 < 3) {
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(Math.floor((Math.random()-0.5) * 12), Math.floor(-14 + bob + (Math.random()-0.5) * 8), 1, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (e.type === 'spore_walker') {
    // Tasern: Spore Walker (Pass 2) — tall mushroom with legs
    ctx.fillRect(-5, -24 + bob, 10, 16);
    // Mushroom cap with spore trail
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#9944cc';
    ctx.beginPath();
    ctx.arc(0, -28 + bob, 13, Math.PI, 0);
    ctx.fill();
    // Toxic spots
    ctx.fillStyle = '#ddaaff';
    ctx.beginPath();
    ctx.arc(-5, -32 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(5, -29 + bob, 2, 0, Math.PI * 2);
    ctx.fill();
    // Walking legs
    const lOff = Math.sin(e.walkFrame * 1.5) * 3;
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#6633aa';
    ctx.fillRect(-5, -8 + bob, 4, 10 + Math.floor(lOff));
    ctx.fillRect(2, -8 + bob, 4, 10 - Math.floor(lOff));
    // Spore trail particles
    if (frame % 12 === 0 && e.hitStun <= 0) {
      TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y - 30), '#aa66dd', 1, 1, { size: 1 });
    }
  } else if (e.type === 'mycelial_worm') {
    // Tasern: Mycelial Worm (Pass 2) — segmented, can burrow
    for (let i = 0; i < 4; i++) {
      const sx = Math.floor(Math.sin(frame * 0.04 + i * 0.6) * 3);
      const segY = -8 - i * 8 + bob;
      ctx.beginPath();
      ctx.arc(sx, segY, 7 - i * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    // Head with mandibles
    ctx.fillStyle = e.hitStun > 0 ? '#fff' : '#889955';
    ctx.beginPath();
    ctx.arc(0, -36 + bob, 6, 0, Math.PI * 2);
    ctx.fill();
    // Mandibles
    ctx.strokeStyle = e.hitStun > 0 ? '#fff' : '#aabb66';
    ctx.lineWidth = 2;
    const mOpen = Math.sin(frame * 0.1) * 3;
    ctx.beginPath();
    ctx.moveTo(-3, -38 + bob);
    ctx.lineTo(-5 - Math.floor(mOpen), -44 + bob);
    ctx.moveTo(3, -38 + bob);
    ctx.lineTo(5 + Math.floor(mOpen), -44 + bob);
    ctx.stroke();
    // Underground particles when walking
    if (e.state === 'walk' && frame % 8 === 0) {
      TAS.particles.spawn(Math.floor(e.x), Math.floor(e.y), '#886644', 1, 1, { size: 1, gravity: 2 });
    }
  }

  // HP bar for tougher enemies
  if (e.hp > 0 && getEnemyHp(e.type) > 40) {
    const hpW = 20;
    ctx.fillStyle = '#300';
    ctx.fillRect(-hpW/2, -e.h - 8, hpW, 3);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(-hpW/2, -e.h - 8, Math.floor(hpW * (e.hp / getEnemyHp(e.type))), 3);
  }

  ctx.restore();
}

function drawBoss(b) {
  ctx.save();
  ctx.translate(Math.floor(b.x), Math.floor(b.y));

  const flash = b.hitStun > 0 && Math.floor(frame / 2) % 2 === 0;
  const pulse = Math.sin(frame * 0.05) * 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  if (sprReady(SPR.boss[b.type])) {
    // === BOSS SPRITE (Grok art) ===
    var _bs = SPR.boss[b.type];
    var _bh = 104, _bw = _bh * (_bs.naturalWidth / _bs.naturalHeight);
    ctx.drawImage(_bs, -_bw / 2, -_bh + Math.floor(pulse), _bw, _bh);
    if (flash) {
      ctx.globalAlpha = 0.5; ctx.globalCompositeOperation = 'lighter';
      ctx.drawImage(_bs, -_bw / 2, -_bh + Math.floor(pulse), _bw, _bh);
      ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
    }
  } else if (b.type === 1) {
    // Fungal Warchief
    ctx.fillStyle = flash ? '#fff' : '#663388';
    ctx.fillRect(-18, -44 + Math.floor(pulse), 36, 30);
    ctx.fillStyle = flash ? '#fff' : '#8844aa';
    ctx.beginPath();
    ctx.arc(0, -48 + Math.floor(pulse), 22, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath(); ctx.arc(-8, -55 + Math.floor(pulse), 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8, -52 + Math.floor(pulse), 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0, -60 + Math.floor(pulse), 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(b.facing * 4 - 4, -40 + Math.floor(pulse), 5, 5);
    ctx.fillRect(b.facing * 4 + 4, -40 + Math.floor(pulse), 5, 5);
    // Fungal Warchief aura (Pass 2 enhancement)
    if (b.phase === 2) {
      ctx.globalAlpha = 0.2 + Math.sin(frame * 0.08) * 0.1;
      ctx.fillStyle = '#aa44ff';
      ctx.beginPath();
      ctx.arc(0, -40 + Math.floor(pulse), 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  } else if (b.type === 2) {
    // Spore Colossus
    ctx.fillStyle = flash ? '#fff' : '#553300';
    ctx.fillRect(-20, -50 + Math.floor(pulse), 40, 40);
    ctx.fillStyle = flash ? '#fff' : '#774411';
    ctx.beginPath();
    ctx.arc(0, -54 + Math.floor(pulse), 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff4400';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-10, -40 + Math.floor(pulse)); ctx.lineTo(-5, -25 + Math.floor(pulse));
    ctx.moveTo(5, -45 + Math.floor(pulse)); ctx.lineTo(10, -30 + Math.floor(pulse));
    ctx.moveTo(-3, -30 + Math.floor(pulse)); ctx.lineTo(3, -18 + Math.floor(pulse));
    ctx.stroke();
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(-8, -52 + Math.floor(pulse), 6, 4);
    ctx.fillRect(4, -52 + Math.floor(pulse), 6, 4);
    // Lava drip particles (Pass 2)
    if (frame % 15 === 0) {
      TAS.particles.spawn(Math.floor(b.x + (Math.random()-0.5)*20), Math.floor(b.y - 20), '#ff4400', 1, 2, { size: 2, gravity: 3 });
    }
  } else if (b.type === 3) {
    // Mycelial Wurm
    ctx.fillStyle = flash ? '#fff' : '#2a1a3a';
    for (let i = 0; i < 5; i++) {
      const sx = Math.floor(Math.sin(frame * 0.03 + i * 0.5) * 5);
      ctx.beginPath();
      ctx.arc(sx, -10 - i * 10, 10 - i, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#aa00ff';
    ctx.fillRect(-3, -52, 3, 3);
    ctx.fillRect(3, -52, 3, 3);
  } else if (b.type === 4) {
    // Mushroom Knight
    ctx.fillStyle = flash ? '#fff' : '#1a1a4a';
    ctx.fillRect(-16, -48 + Math.floor(pulse), 32, 38);
    ctx.fillStyle = flash ? '#fff' : '#3a3a6a';
    ctx.beginPath();
    ctx.arc(0, -52 + Math.floor(pulse), 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0044';
    ctx.fillRect(-8, -54 + Math.floor(pulse), 16, 4);
    ctx.fillStyle = '#8888ff';
    ctx.fillRect(b.facing * 18, -55 + Math.floor(pulse), 4, 40);
    ctx.fillStyle = '#aaaaff';
    ctx.fillRect(b.facing * 17, -58 + Math.floor(pulse), 6, 4);
  } else {
    // Dark Spore Queen
    ctx.fillStyle = flash ? '#fff' : '#0a0a0a';
    ctx.fillRect(-22, -55 + Math.floor(pulse), 44, 45);
    ctx.fillStyle = '#330044';
    ctx.beginPath();
    ctx.moveTo(-22, -55 + Math.floor(pulse));
    ctx.lineTo(-30, -10 + Math.floor(pulse));
    ctx.lineTo(-22, -10 + Math.floor(pulse));
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, -55 + Math.floor(pulse));
    ctx.lineTo(30, -10 + Math.floor(pulse));
    ctx.lineTo(22, -10 + Math.floor(pulse));
    ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.fillRect(-10, -62 + Math.floor(pulse), 20, 5);
    ctx.fillRect(-8, -68 + Math.floor(pulse), 3, 8);
    ctx.fillRect(5, -68 + Math.floor(pulse), 3, 8);
    ctx.fillRect(-2, -70 + Math.floor(pulse), 4, 10);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath(); ctx.arc(-6, -50 + Math.floor(pulse), 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6, -50 + Math.floor(pulse), 4, 0, Math.PI * 2); ctx.fill();
    // Dark Spore Queen aura (Pass 2 enhancement)
    if (b.phase === 2) {
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#440066';
      ctx.beginPath();
      ctx.arc(0, -30, 40 + Math.sin(frame * 0.06) * 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // HP bar
  ctx.fillStyle = '#300';
  ctx.fillRect(-25, -b.h - 20, 50, 6);
  ctx.fillStyle = b.hp < b.maxHp * 0.3 ? '#ff2200' : '#ff8800';
  ctx.fillRect(-25, -b.h - 20, Math.floor(50 * (b.hp / b.maxHp)), 6);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(-25, -b.h - 20, 50, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, 0, -b.h - 24);

  // Phase indicator
  if (b.phase === 2) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 7px monospace';
    ctx.fillText('ENRAGED', 0, -b.h - 32);
  }

  ctx.restore();
}

// === DRAW SPEEDER ===
function drawSpeederScene() {
  const pal = ZONE_PALETTES[stage] || ZONE_PALETTES[2];
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, pal.sky1);
  grad.addColorStop(0.4, pal.sky2);
  grad.addColorStop(1, pal.ground);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Speed lines
  const speedIntensity = speederSpeed / SPEEDER_SPEED_BASE;
  for (let i = 0; i < 12; i++) {
    const ly = 60 + i * 22;
    const lx = Math.floor((speederDist * (0.5 + i * 0.1) + i * 73) % GW);
    ctx.strokeStyle = 'rgba(100,200,255,' + (0.1 * speedIntensity).toFixed(2) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx, ly);
    ctx.lineTo(Math.floor(lx - 20 * speedIntensity), ly);
    ctx.stroke();
  }

  // Road lanes
  ctx.fillStyle = '#222';
  ctx.fillRect(40, GROUND_Y - 40, GW - 80, 80);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.setLineDash([20, 15]);
  ctx.beginPath();
  ctx.moveTo(40, GROUND_Y - 13); ctx.lineTo(GW - 40, GROUND_Y - 13);
  ctx.moveTo(40, GROUND_Y + 14); ctx.lineTo(GW - 40, GROUND_Y + 14);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = '#ff8800';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(40, GROUND_Y - 40); ctx.lineTo(GW - 40, GROUND_Y - 40);
  ctx.moveTo(40, GROUND_Y + 40); ctx.lineTo(GW - 40, GROUND_Y + 40);
  ctx.stroke();

  // Obstacles
  for (const w of speederWalls) {
    if (w.hit) continue;
    const relDist = w.dist - speederDist;
    if (relDist < 0 || relDist > 400) continue;
    const scale = 1 - relDist / 400;
    const wx = getLaneX(w.lane);
    const wy = GROUND_Y;
    const sz = Math.floor(15 + scale * 25);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(wx - Math.floor(sz/2), wy - sz, sz, sz);
    ctx.fillStyle = '#7c3aed';
    ctx.fillRect(wx - Math.floor(sz/3), wy - Math.floor(sz * 0.8), Math.floor(sz * 0.6), Math.floor(sz * 0.6));
    ctx.fillStyle = '#c084fc';
    ctx.fillRect(wx - Math.floor(sz/2), wy - sz - 4, sz, 4);
  }

  for (const r of speederRamps) {
    const relDist = r.dist - speederDist;
    if (relDist < 0 || relDist > 400) continue;
    const scale = 1 - relDist / 400;
    const rx = getLaneX(r.lane);
    ctx.fillStyle = '#38d973';
    const sz = Math.floor(10 + scale * 15);
    ctx.beginPath();
    ctx.moveTo(rx - sz, GROUND_Y);
    ctx.lineTo(rx, GROUND_Y - sz);
    ctx.lineTo(rx + sz, GROUND_Y);
    ctx.closePath();
    ctx.fill();
  }

  // Player bike
  const bikeX = getLaneX(speederLane);
  const bikeY = GROUND_Y;
  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillRect(bikeX - 12, bikeY - 20, 24, 16);
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.arc(bikeX, bikeY - 24, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#666';
  ctx.beginPath();
  ctx.arc(bikeX - 8, bikeY, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bikeX + 8, bikeY, 6, 0, Math.PI * 2);
  ctx.fill();
  if (frame % 4 < 2) {
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.arc(bikeX - 14, bikeY - 4, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SPEED: ' + Math.floor(speederSpeed), GW - 10, GH - 10);

  drawProgressBar(speederDist / speederGoal);
}

function getLaneX(lane) {
  return 120 + lane * 120;
}

// === DRAW RAPPEL ===
function drawRappelScene() {
  const grad = ctx.createLinearGradient(0, 0, GW, 0);
  grad.addColorStop(0, '#2a1a0d');
  grad.addColorStop(0.1, '#0a0a0a');
  grad.addColorStop(0.9, '#0a0a0a');
  grad.addColorStop(1, '#2a1a0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#1a1008';
  for (let i = 0; i < 10; i++) {
    const wy = Math.floor((rapDepth * 0.5 + i * 40) % GH);
    ctx.fillRect(0, wy, Math.floor(25 + Math.sin(i) * 10), 8);
    ctx.fillRect(GW - Math.floor(25 + Math.cos(i) * 10), wy, Math.floor(25 + Math.cos(i) * 10), 8);
  }

  // Rope
  ctx.strokeStyle = '#886633';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(Math.floor(player.rapX), 0);
  ctx.lineTo(Math.floor(player.rapX), GH/2 - 15);
  ctx.stroke();

  // Player on rope
  const p = player;
  ctx.save();
  ctx.translate(Math.floor(p.rapX), Math.floor(GH/2));

  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillRect(-8, -15, 16, 20);
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.arc(0, -20, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = statB.color || '#38d973';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-5, -12);
  ctx.lineTo(0, -25);
  ctx.moveTo(5, -12);
  ctx.lineTo(0, -25);
  ctx.stroke();

  ctx.restore();

  // Platforms
  for (const plat of rapPlatforms) {
    const relDepth = plat.depth - rapDepth;
    const py = Math.floor(GH/2 + relDepth * 0.5);
    if (py < -20 || py > GH + 20) continue;
    const px = plat.side === 'left' ? 10 : GW - 10 - plat.w;
    ctx.fillStyle = '#553322';
    ctx.fillRect(px, py, plat.w, 10);
    ctx.fillStyle = '#664433';
    ctx.fillRect(px, py, plat.w, 4);
  }

  // Rappel enemies
  for (const re of rapEnemies) {
    if (!re.active) continue;
    const relDepth = re.depth - rapDepth;
    const ry = Math.floor(GH/2 + relDepth * 0.5);
    if (ry < -20 || ry > GH + 20) continue;
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(Math.floor(re.x), ry, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#c084fc';
    ctx.fillRect(Math.floor(re.x) - 3, ry - 3, 6, 3);
  }

  drawProgressBar(rapDepth / rapGoal);
}

// === DRAW SNAKE ===
function drawSnakeScene() {
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#0a2a3a');
  grad.addColorStop(1, '#0a1a2a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  ctx.strokeStyle = 'rgba(100,200,255,0.2)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    for (let x = 0; x < GW; x += 10) {
      const y = Math.floor(40 + i * 35 + Math.sin((x + snakeDist + i * 30) * 0.02 + snakeWave) * 8);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Obstacles
  for (const ob of snakeObs) {
    const relDist = ob.dist - snakeDist;
    const ox = Math.floor(relDist + 60);
    if (ox < -40 || ox > GW + 40) continue;
    if (ob.type === 'rock') {
      ctx.fillStyle = '#445566';
      ctx.beginPath();
      ctx.arc(ox, Math.floor(ob.y), Math.floor(ob.w/2), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#334455';
      ctx.beginPath();
      ctx.arc(ox - 3, Math.floor(ob.y) - 3, Math.floor(ob.w/4), 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#553311';
      ctx.fillRect(ox - Math.floor(ob.w/2), Math.floor(ob.y) - Math.floor(ob.h/2), ob.w, ob.h);
      ctx.fillStyle = '#442200';
      ctx.fillRect(ox - Math.floor(ob.w/2) + 3, Math.floor(ob.y) - Math.floor(ob.h/2) + 3, ob.w - 6, ob.h - 6);
    }
  }

  // Snake mount
  const p = player;
  const snakeBaseY = Math.floor(p.snakeY);
  ctx.fillStyle = '#44aa33';
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const sx = 60 - i * 12;
    const sy = snakeBaseY + Math.floor(Math.sin(snakeWave + i * 0.5) * 5);
    ctx.arc(sx, sy, 8 - i * 0.5, 0, Math.PI * 2);
  }
  ctx.fill();

  ctx.fillStyle = '#55cc44';
  ctx.beginPath();
  ctx.arc(70, snakeBaseY + Math.floor(Math.sin(snakeWave) * 3), 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0';
  ctx.beginPath();
  ctx.arc(75, snakeBaseY + Math.floor(Math.sin(snakeWave) * 3) - 3, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillRect(52, snakeBaseY - 25, 16, 18);
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.arc(60, snakeBaseY - 30, 8, 0, Math.PI * 2);
  ctx.fill();

  if (frame % 8 === 0) {
    TAS.particles.spawn(30, snakeBaseY + 5, '#88ddff', 2, 1, { size: 1, gravity: 1 });
  }

  drawProgressBar(snakeDist / snakeGoal);
}

// === PROGRESS BAR ===
function drawProgressBar(pct) {
  const barW = 100, barH = 6;
  const bx = GW - barW - 10, by = GH - 14;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = '#38d973';
  ctx.fillRect(bx, by, Math.floor(barW * TAS.math.clamp(pct, 0, 1)), barH);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);
}

// === HUD ===
function drawHUD() {
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, 34);

  // Controls key for human players — bright on stage 1, faint after
  if (!('ontouchstart' in window)) {
    ctx.save();
    ctx.globalAlpha = (stage === 0) ? 0.7 : 0.3;
    ctx.fillStyle = 'rgba(10,5,20,0.7)';
    ctx.fillRect(0, GH - 13, GW, 13);
    ctx.fillStyle = '#cfc6b8';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS Move    A/D Punch    S Kick    W Jump', GW / 2, GH - 4);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  // Score (INT multiplied)
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE ' + score, 6, 13);

  // Zone indicator
  ctx.fillStyle = ZONE_PALETTES[stage].accent;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(STAGE_NAMES[stage], GW/2, 13);

  // Stage number
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('STAGE ' + (stage + 1), GW/2, 23);

  // Lives
  ctx.textAlign = 'right';
  for (let i = 0; i < lives; i++) {
    ctx.fillStyle = statB.color || '#38d973';
    ctx.beginPath();
    ctx.arc(GW - 12 - i * 16, 12, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Health bar
  const hpW = 80, hpH = 7;
  const hpX = 6, hpY = 20;
  if (player) {
