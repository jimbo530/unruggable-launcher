    ctx.fillStyle = '#300';
    ctx.fillRect(hpX, hpY, hpW, hpH);
    const hpPct = player.hp / player.maxHp;
    ctx.fillStyle = hpPct > 0.5 ? '#38d973' : hpPct > 0.25 ? '#f4b41b' : '#dd4444';
    ctx.fillRect(hpX, hpY, Math.floor(hpW * hpPct), hpH);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(hpX, hpY, hpW, hpH);
    // HP text
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(player.hp + '/' + player.maxHp, hpX + hpW + 4, hpY + 6);
  }

  // Active power-up indicators
  ctx.textAlign = 'left';
  let puY = 40;
  if (activeShield > 0) {
    ctx.fillStyle = '#44ddaa';
    ctx.font = '8px monospace';
    ctx.fillText('SHIELD ' + Math.ceil(activeShield) + 's', 6, puY);
    puY += 10;
  }
  if (reactorFistTimer > 0) {
    ctx.fillStyle = '#ff8844';
    ctx.font = '8px monospace';
    ctx.fillText('REACTOR FIST ' + Math.ceil(reactorFistTimer) + 's', 6, puY);
    puY += 10;
  }

  // Combo counter
  if (player && player.comboCount > 1) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(player.comboCount + 'x COMBO', GW/2, 52);
  }

  // Charge indicator
  if (chargeReady) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SMASH READY!', GW/2, 64);
  }
}

// === TITLE SCREEN (Pass 3 — NES controls with dotted leaders) ===
function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  // Floating spores
  for (let i = 0; i < 20; i++) {
    const x = Math.floor((frame * 0.3 + i * 30) % GW);
    const y = Math.floor((Math.sin(frame * 0.01 + i) * 40) + GH/2 + i * 8) % GH;
    ctx.fillStyle = 'rgba(56,217,115,' + (0.2 + Math.sin(frame*0.02+i)*0.1).toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(x, y, 2 + Math.floor(Math.sin(i)), 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('BASELING BRAWL TOADS', GW/2 + 2, 62);
  ctx.fillStyle = '#38d973';
  ctx.fillText('BASELING BRAWL TOADS', GW/2, 60);

  ctx.fillStyle = '#000';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('OF TASERN', GW/2 + 1, 81);
  ctx.fillStyle = '#38d973';
  ctx.fillText('OF TASERN', GW/2, 80);

  // Baseling warrior preview
  ctx.save();
  ctx.translate(Math.floor(GW/2), 140);
  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillRect(-10, -30, 20, 24);
  ctx.fillStyle = '#44cc66';
  ctx.beginPath();
  ctx.arc(0, -36, 12, 0, Math.PI * 2);
  ctx.fill();
  // Headband
  ctx.fillStyle = '#dd4444';
  ctx.fillRect(-12, -38, 24, 3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(4, -38, 5, 5);
  ctx.fillStyle = '#111';
  ctx.fillRect(5, -37, 3, 3);
  const armPump = Math.sin(frame * 0.04) * 3;
  ctx.fillStyle = statB.color || '#38d973';
  ctx.fillRect(-18, -28 + Math.floor(armPump), 8, 14);
  ctx.fillRect(10, -28 - Math.floor(armPump), 8, 14);
  ctx.fillStyle = '#f4b41b';
  ctx.beginPath();
  ctx.arc(22, -26 - Math.floor(armPump), Math.floor(10 + Math.sin(frame*0.06)*2), 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Stat bar (Pass 1)
  drawStatBar(190);

  // NES-style controls with dotted leaders (Pass 3)
  const ctrlY = 228;
  ctx.font = '9px monospace';
  const controls = [
    ['ARROWS', 'Move'],
    ['A / D', 'Punch'],
    ['S', 'Kick'],
    ['W', 'Jump'],
    ['HOLD A', 'Charged Smash']
  ];
  const colW = 200;
  const startX = Math.floor(GW/2 - colW/2);
  for (let i = 0; i < controls.length; i++) {
    const cy = ctrlY + i * 12;
    const label = controls[i][0];
    const action = controls[i][1];
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'left';
    ctx.fillText(label, startX, cy);
    ctx.textAlign = 'right';
    ctx.fillText(action, startX + colW, cy);
    // Dotted leader
    const labelW = ctx.measureText(label).width;
    const actionW = ctx.measureText(action).width;
    const dotStart = startX + labelW + 4;
    const dotEnd = startX + colW - actionW - 4;
    ctx.fillStyle = '#444';
    for (let dx = dotStart; dx < dotEnd; dx += 6) {
      ctx.fillRect(Math.floor(dx), cy - 2, 2, 1);
    }
  }

  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Combo 3 hits for GIANT toad transform attacks!', GW/2, ctrlY + controls.length * 12 + 8);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, GH - 62);
  }

  // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT
  var _sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
  var _by = GH - 44;
  ctx.fillStyle = '#0052FF'; ctx.textAlign = 'center'; ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW/2, _by);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 115;
    ctx.font = '7px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = _by + 8;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _yy + 3, 40 * Math.max(0.04, Math.min(1, _v/200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // Start prompt
  const pulseA = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulseA;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 28);
  ctx.globalAlpha = 1;
}

// Stat bar on title (Pass 1)
function drawStatBar(y) {
  const stats = [
    { label: 'STR', val: statB.str, color: '#ff4444' },
    { label: 'DEX', val: statB.dex, color: '#44ff44' },
    { label: 'CON', val: statB.con, color: '#ffaa44' },
    { label: 'INT', val: statB.int, color: '#4488ff' },
    { label: 'WIS', val: statB.wis, color: '#aa44ff' },
    { label: 'CHA', val: statB.cha, color: '#ff44aa' }
  ];

  const barW = 30, barH = 5, gap = 6;
  const totalW = stats.length * (barW + 22 + gap);
  const sx = Math.floor(GW/2 - totalW/2);

  ctx.font = '7px monospace';
  for (let i = 0; i < stats.length; i++) {
    const s = stats[i];
    const bx = sx + i * (barW + 22 + gap);

    ctx.fillStyle = '#888';
    ctx.textAlign = 'left';
    ctx.fillText(s.label, bx, y + 4);

    ctx.fillStyle = '#222';
    ctx.fillRect(bx + 22, y - 2, barW, barH);
    const fill = Math.min(1, s.val / 20);
    ctx.fillStyle = s.color;
    ctx.fillRect(bx + 22, y - 2, Math.floor(barW * fill), barH);
  }

  // Baseling name + level
  ctx.fillStyle = statB.color || '#38d973';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.name + (statB.level > 0 ? ' Lv.' + statB.level : ''), GW/2, y + 16);
}

// === STAGE INTRO (Pass 3) ===
function drawStageIntro() {
  const pal = ZONE_PALETTES[stage];
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  // Decorative lines
  ctx.strokeStyle = pal.accent;
  ctx.globalAlpha = 0.3;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(GW/2 - 120, GH/2 - 50);
  ctx.lineTo(GW/2 + 120, GH/2 - 50);
  ctx.moveTo(GW/2 - 120, GH/2 + 50);
  ctx.lineTo(GW/2 + 120, GH/2 + 50);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = pal.accent;
  ctx.font = 'bold 11px monospace';
  ctx.fillText('STAGE ' + (stage + 1), GW/2, GH/2 - 35);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 20px monospace';
  ctx.fillText(STAGE_NAMES[stage], GW/2, GH/2 - 5);

  const typeLabel = {
    brawl: 'TOAD BRAWL', speeder: 'SPORE BIKE CHASE',
    rappel: 'VERTICAL DESCENT', snake: 'SERPENT RAPIDS', boss: 'BOSS GAUNTLET'
  };
  ctx.fillStyle = '#ff8844';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(typeLabel[STAGE_TYPES[stage]], GW/2, GH/2 + 20);

  // Zone description (Pass 3)
  ctx.fillStyle = '#777';
  ctx.font = '9px monospace';
  ctx.fillText(ZONE_DESCS[stage], GW/2, GH/2 + 40);

  // Tips
  const tips = [
    'Combo 3 hits for transform attacks!',
    'Defeat the Fungal Warchief! Watch for spore rain.',
    'Dodge walls! Hit ramps for bonus!',
    'Mushroom warriors guard the tower. Use power-ups!',
    'The Spore Colossus lurks in the depths...',
    'Kick enemies off the walls!',
    'Ride the serpent, avoid rocks!',
    'The Dark Spore Queen and her court await...'
  ];
  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  ctx.fillText(tips[stage], GW/2, GH/2 + 58);
}

// === VICTORY ===
function drawVictory() {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  if (frame % 10 === 0) {
    const colors = ['#ff4444','#44ff44','#4444ff','#ffff44','#ff44ff'];
    TAS.particles.spawn(Math.floor(Math.random() * GW), Math.floor(Math.random() * GH/2), colors[Math.floor(Math.random()*5)], 3, 2, { gravity: 1 });
  }

  ctx.save();
  TAS.particles.draw();
  ctx.restore();

  ctx.textAlign = 'center';
  const pulseV = Math.sin(frame * 0.04) * 0.2 + 0.8;
  ctx.globalAlpha = pulseV;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('VICTORY!', GW/2, 80);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('The Dark Spore Queen is defeated!', GW/2, 120);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW/2, 160);

  if (score >= highScore) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, 185);
  }

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Press any key to return', GW/2, 230);

  TAS.particles.update(1/60);

  if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
    state = 'title';
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
