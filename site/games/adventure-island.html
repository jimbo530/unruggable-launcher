<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Island</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STATS (BaselingPlayer.getMults — the single clamped source) ===
// Adventure Island's getX() helpers read D&D fields on statB; we synthesize them from
// the five bounded multipliers (tunnel-bug pattern) so every effect traces back to a
// clamped getMults() value. str<-damage, dex<-moveSpeed, con<-health, int/wis/cha<-luck.
// dnd(mult)=round(10+(mult-1)*20). Single-player platformer -> default band (0.8–1.6).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#0052FF', name: 'Baseling', icon: 'B' };
var picking = false;   // character-select overlay open
var selName = 'WIMMPLE';
function dnd(x) { return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = TAS.player.mults();
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  selName = sel ? (sel.charName + (sel.tokenId != null ? ' #' + sel.tokenId : '')) : 'WIMMPLE';
  if (sel) statB.name = sel.charName;
}
// 5 canonical arcade stat bars centered at cx (display only).
function drawTitleStatBars(cx, topY, totalW) {
  if (!window.BaselingPlayer || !BaselingPlayer.getStats) return;
  var stats = BaselingPlayer.getStats();
  var meta = BaselingPlayer.STAT_META, keys = BaselingPlayer.STAT_KEYS;
  var bw = totalW / keys.length, x0 = cx - totalW / 2;
  ctx.font = '8px monospace';
  for (var i = 0; i < keys.length; i++) {
    var mm = meta[keys[i]], v = stats[keys[i]], bx = x0 + i * bw;
    ctx.fillStyle = mm.color; ctx.textAlign = 'center';
    ctx.fillText(mm.label, bx + bw / 2, topY);
    ctx.fillStyle = '#222'; ctx.fillRect(bx + 3, topY + 3, bw - 6, 5);
    ctx.fillStyle = mm.color; ctx.fillRect(bx + 3, topY + 3, (bw - 6) * Math.max(0.04, Math.min(1, v / 200)), 5);
  }
  ctx.textAlign = 'center';
}

// === CONSTANTS ===
var GW = 480, GH = 270;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'THROW', c: 'PICK' } });

// Boot the player module (silent) + recompute stats once it resolves.
recomputeStats();
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); })
    .catch(function (e) { console.warn('[adventure-island] player init failed:', e && e.message); });
}

var TILE = 16;
var GRAVITY = 980;
var GROUND_Y = GH - 32;
var PLAYER_W = 14, PLAYER_H = 20;
var SCROLL_SPEED = 80;
var STAGE_LENGTH = 3200;

// === ZONE NAMES ===
var ZONE_NAMES = [
  'Mushroom Shore', 'Spore Jungle', 'Reactor Caverns', 'Mycelium Peaks',
  'Canopy Drift', 'Poop Volcano', 'Frozen Garden', 'Baseling Ruins'
];

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('adventureisland_hi');
var lives = 3;
var world = 1, stage = 1;
var frame = 0;
var stageTimer = 0;
var deathTimer = 0;
var deathParticles = [];
var clearTally = null;

// Player
var px, py, pvx, pvy, pOnGround, pDucking, pFacing;
var pEnergy, pMaxEnergy;
var pWeapon; // 'axe','boomerang','fire'
var pHasSkateboard, pOnSkateboard;
var pInvincible, pInvTimer;
var pAnimFrame, pAnimTimer;
var pDead, pDeadTimer;

// Camera
var camX;

// Level data
var platforms, enemies, foods, eggs, projectiles, decorations;
var hazards, bosses;
var goalX;
var levelSeed;
var checkpoint;

// Parallax layers
var bgLayers;

// Boss state
var activeBoss = null;

// World themes
var WORLDS = [
  { name: 'Mushroom Shore',    sky: '#87CEEB', ground: '#C2B280', platform: '#7a444a', accent: '#38d973', bgMid: '#5a9a3a', bgFar: '#3a7a4a' },
  { name: 'Spore Jungle',      sky: '#2d5016', ground: '#3a5f0b', platform: '#7a444a', accent: '#38d973', bgMid: '#4a6a1a', bgFar: '#1a3a0a' },
  { name: 'Reactor Caverns',   sky: '#1a1a2e', ground: '#3d3d3d', platform: '#555555', accent: '#a855f7', bgMid: '#2a2a4a', bgFar: '#0a0a2e' },
  { name: 'Mycelium Peaks',    sky: '#4a6fa5', ground: '#7a7a6a', platform: '#5a5a4a', accent: '#8b8b7a', bgMid: '#5a6a7a', bgFar: '#3a4a6a' },
  { name: 'Canopy Drift',      sky: '#b0d4f1', ground: '#ffffff', platform: '#ddeeff', accent: '#38d973', bgMid: '#c0d8f0', bgFar: '#90b8e0' },
  { name: 'Poop Volcano',      sky: '#2a0a0a', ground: '#4a2a0a', platform: '#7a444a', accent: '#f4b41b', bgMid: '#4a1a0a', bgFar: '#1a0a0a' },
  { name: 'Frozen Garden',     sky: '#c0e8ff', ground: '#e8f4ff', platform: '#a0d0f0', accent: '#80b0d0', bgMid: '#b0d8f0', bgFar: '#80c0e8' },
  { name: 'Baseling Ruins',    sky: '#1a1a2e', ground: '#4a4a5a', platform: '#6a6a7a', accent: '#a855f7', bgMid: '#3a3a5a', bgFar: '#1a1a3a' }
];

// Enemy types per world (Baseling-universe creatures)
var ENEMY_TYPES = [
  ['spore_slug', 'fungal_bat', 'reactor_beetle', 'spore_cloud'],
  ['wild_slime', 'poison_shroom', 'mycelial_crawler', 'spore_cloud'],
  ['fungal_bat', 'rock', 'reactor_beetle', 'mycelial_crawler'],
  ['moss_goat', 'poop_hawk', 'spore_cloud', 'reactor_beetle'],
  ['poop_hawk', 'cloud_puff', 'spore_cloud', 'reactor_beetle'],
  ['lava_worm', 'fire_jet', 'reactor_beetle', 'mycelial_crawler'],
  ['frost_slime', 'icicle', 'spore_cloud', 'reactor_beetle'],
  ['garden_knight', 'spore_wizard', 'mycelial_crawler', 'reactor_beetle']
];

// Food types (Baseling-universe collectibles)
var FOOD_ITEMS = ['spore_fruit', 'garden_seed', 'mushroom_cap', 'poop_pellet', 'mushroom', 'myco_melon'];
var TASERN_ITEMS = ['myco_fruit', 'reactor_battery', 'poop_token'];

// Boss types (cycle every 4 stages)
var BOSS_TYPES = ['elder_mushroom', 'reactor_hive'];

// === SEEDED RANDOM ===
var rngState = 1;
function seedRng(s) { rngState = s || 1; }
function rng() {
  rngState = (rngState * 1664525 + 1013904223) & 0xFFFFFFFF;
  return (rngState >>> 0) / 4294967296;
}
function rngInt(min, max) { return Math.floor(rng() * (max - min + 1)) + min; }

// === STAT HELPERS ===
function getWeaponDamage() {
  // STR scales weapon damage: base 1, STR 10=1x, 20=2x
  return Math.floor(statB.damage * (0.5 + statB.str / 20) * 10) / 10;
}
function getRunSpeed() {
  // DEX scales run speed: base 110, DEX 10=1x, 20=1.5x
  return Math.floor(110 * statB.speed * (0.8 + statB.dex / 50));
}
function getMaxEnergy() {
  // CON scales max energy and HP mult
  return Math.floor(100 * statB.hpMult * (0.8 + statB.con / 50));
}
function getEnergyDrain(baseDrain) {
  // CON reduces energy drain
  return baseDrain / (0.8 + statB.con / 50);
}
function getScoreMult() {
  // INT scales score multiplier
  return statB.scoreMult * (0.8 + statB.int / 50);
}
function getWeaponCooldown() {
  // WIS reduces weapon cooldown
  return statB.cooldown * (1.2 - statB.wis / 50);
}
function getDropChance(base) {
  // CHA increases fruit/item drop rates
  return Math.min(1, base * statB.luck * (0.8 + statB.cha / 50));
}
function getBonusLives() {
  return statB.lives || 0;
}

// === INIT GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3 + getBonusLives();
  world = 1;
  stage = 1;
  TAS.particles.clear();
  initStage();
}

function initStage() {
  levelSeed = world * 100 + stage * 17 + 42;
  seedRng(levelSeed);

  px = 40; py = GROUND_Y - PLAYER_H;
  pvx = 0; pvy = 0;
  pOnGround = true; pDucking = false; pFacing = 1;
  pMaxEnergy = getMaxEnergy();
  pEnergy = pMaxEnergy;
  if (!pWeapon) pWeapon = 'axe';
  pHasSkateboard = false; pOnSkateboard = false;
  pInvincible = false; pInvTimer = 0;
  pAnimFrame = 0; pAnimTimer = 0;
  pDead = false; pDeadTimer = 0;
  deathTimer = 0;
  deathParticles = [];
  clearTally = null;

  camX = 0;
  projectiles = [];
  stageTimer = 0;
  checkpoint = 0;
  activeBoss = null;

  generateLevel();
}

// === LEVEL GENERATION ===
function generateLevel() {
  platforms = [];
  enemies = [];
  foods = [];
  eggs = [];
  decorations = [];
  hazards = [];
  bosses = [];

  var length = STAGE_LENGTH + (world - 1) * 400 + (stage - 1) * 200;
  var isBossStage = (stage % 4 === 0);
  if (isBossStage) length += 600; // extra room for boss arena
  goalX = length;

  // Ground with gaps
  var gx = 0;
  while (gx < length + GW) {
    var segLen = rngInt(80, 250);
    platforms.push({ x: gx, y: GROUND_Y, w: segLen, h: 40, type: 'ground' });
    gx += segLen;
    if (rng() < 0.15 + world * 0.03 && gx > 200 && gx < length - 200) {
      gx += rngInt(40, 70 + world * 5);
    }
  }

  // Floating platforms
  var platCount = Math.floor(length / 120) + world * 3;
  for (var i = 0; i < platCount; i++) {
    var fx = rngInt(100, length - 100);
    var fy = rngInt(GROUND_Y - 90, GROUND_Y - 40);
    var fw = rngInt(40, 80);
    platforms.push({ x: fx, y: fy, w: fw, h: 10, type: 'float' });
  }

  // Enemies
  var enemyCount = Math.floor(length / 150) + world * 2 + stage;
  var eTypes = ENEMY_TYPES[Math.min(world - 1, 7)];
  for (var i = 0; i < enemyCount; i++) {
    var ex = rngInt(200, length - 100);
    var etype = eTypes[rngInt(0, eTypes.length - 1)];
    var flying = (etype === 'fungal_bat' || etype === 'poop_hawk' ||
                  etype === 'cloud_puff' || etype === 'icicle' ||
                  etype === 'spore_cloud');
    var wallWalker = (etype === 'mycelial_crawler');
    var ey = flying ? rngInt(60, GROUND_Y - 60) : GROUND_Y - 16;
    var hp = 1;
    if (etype === 'reactor_beetle') hp = 2; // armored, needs 2 hits
    enemies.push({
      x: ex, y: ey, w: 14, h: 14,
      type: etype, flying: flying, wallWalker: wallWalker,
      vx: flying ? (rng() < 0.5 ? -1 : 1) * rngInt(20, 50) : -rngInt(15, 40),
      vy: wallWalker ? -rngInt(15, 30) : 0,
      alive: true, anim: 0, hp: hp, maxHp: hp,
      startX: ex, startY: ey, patrol: rngInt(40, 100),
      damageZoneTimer: 0 // for spore_cloud periodic damage
    });
  }

  // Food items (CHA/luck increases count)
  var foodCount = Math.floor(length / 80 * getDropChance(1));
  for (var i = 0; i < foodCount; i++) {
    var foodX = rngInt(80, length - 50);
    var foodY = rng() < 0.3 ? rngInt(GROUND_Y - 80, GROUND_Y - 50) : GROUND_Y - 12;
    // CHA chance for Tasern items instead of regular food
    var isTasern = rng() < getDropChance(0.15);
    var ftype;
    if (isTasern) {
      ftype = TASERN_ITEMS[rngInt(0, TASERN_ITEMS.length - 1)];
    } else {
      ftype = FOOD_ITEMS[rngInt(0, FOOD_ITEMS.length - 1)];
    }
    foods.push({
      x: foodX, y: foodY, w: 10, h: 10,
      type: ftype, collected: false
    });
  }

  // Eggs (weapons, food, skateboard)
  var eggCount = rngInt(3, 6) + Math.floor(world / 2);
  for (var i = 0; i < eggCount; i++) {
    var eggX = rngInt(150, length - 150);
    var eggY = rng() < 0.4 ? rngInt(GROUND_Y - 90, GROUND_Y - 50) : GROUND_Y - 14;
    var contents;
    var r = rng();
    if (r < 0.25) contents = 'boomerang';
    else if (r < 0.45) contents = 'fire';
    else if (r < 0.6) contents = 'skateboard';
    else contents = 'food';
    eggs.push({
      x: eggX, y: eggY, w: 12, h: 14,
      contents: contents, visible: rng() < 0.6,
      opened: false
    });
  }

  // Environmental hazards
  var hazardCount = Math.floor(length / 300) + world;
  for (var i = 0; i < hazardCount; i++) {
    var hx = rngInt(200, length - 200);
    var htype;
    var hr = rng();
    if (hr < 0.4) htype = 'toxic_goo';
    else if (hr < 0.7) htype = 'spore_rain';
    else htype = 'plant_trap';
    hazards.push({
      x: hx, y: GROUND_Y,
      type: htype, w: htype === 'spore_rain' ? 60 : 30, h: htype === 'spore_rain' ? 120 : 8,
      active: true, timer: 0, triggerTimer: 0
    });
  }

  // Boss fight every 4 stages
  if (isBossStage) {
    var bossType = BOSS_TYPES[(Math.floor((world - 1) * 4 + stage) / 4) % BOSS_TYPES.length | 0];
    var bossHp = Math.floor((15 + world * 5) / getWeaponDamage());
    bosses.push({
      x: length - 300, y: GROUND_Y - 60,
      w: 40, h: 50, type: bossType,
      hp: bossHp, maxHp: bossHp,
      alive: true, anim: 0, phase: 0,
      attackTimer: 0, moveTimer: 0,
      startX: length - 300, vx: 0, vy: 0,
      projectiles: []
    });
  }

  // Decorations (visual only)
  var decCount = Math.floor(length / 60);
  for (var i = 0; i < decCount; i++) {
    var dtype = rng() < 0.5 ? 'tree' : 'rock';
    if (world === 1) dtype = rng() < 0.6 ? 'palm' : 'rock';
    if (world === 5) dtype = 'cloud';
    if (world === 3) dtype = rng() < 0.5 ? 'crystal' : 'rock';
    if (world === 6) dtype = rng() < 0.5 ? 'lava_rock' : 'rock';
    decorations.push({
      x: rngInt(0, length), y: GROUND_Y,
      type: dtype, size: rngInt(20, 50)
    });
  }

  // BG layers
  bgLayers = [
    { color: getTheme().sky, speed: 0 },
    { speed: 0.2, elements: [] },
    { speed: 0.5, elements: [] }
  ];
  for (var i = 0; i < 8; i++) {
    bgLayers[1].elements.push({ x: rngInt(0, GW * 3), y: rngInt(20, 80), w: rngInt(40, 100), h: rngInt(20, 50) });
  }
  for (var i = 0; i < 12; i++) {
    bgLayers[2].elements.push({ x: rngInt(0, GW * 3), y: rngInt(60, 140), w: rngInt(20, 60), h: rngInt(30, 60) });
  }
}

function getTheme() { return WORLDS[Math.min(world - 1, 7)]; }

// === PLAYER ACTIONS ===
var throwCooldownTimer = 0;

function throwWeapon() {
  if (pDead || pDucking) return;
  if (throwCooldownTimer > 0) return;
  var sx = px + (pFacing > 0 ? PLAYER_W : 0);
  var sy = py + 6;
  var dmg = getWeaponDamage();
  var proj = { x: sx, y: sy, vx: 0, vy: 0, type: pWeapon, alive: true, timer: 0, returning: false, damage: dmg };

  if (pWeapon === 'axe') {
    proj.vx = pFacing * 200 * statB.speed;
    proj.vy = -120;
  } else if (pWeapon === 'boomerang') {
    proj.vx = pFacing * 180 * statB.speed;
    proj.vy = 0;
  } else if (pWeapon === 'fire') {
    proj.vx = pFacing * 250 * statB.speed;
    proj.vy = 0;
  }
  projectiles.push(proj);
  throwCooldownTimer = getWeaponCooldown() * 0.3;
  TAS.audio.playTone(300, 0.08, 'sawtooth', 0.06, 500);
}

function playerDie() {
  if (pDead) return;
  if (pOnSkateboard) {
    pOnSkateboard = false;
    pHasSkateboard = false;
    pInvincible = true;
    pInvTimer = 1.5;
    TAS.audio.playNoise(0.3, 0.08, 800);
    TAS.fx.shake(3, 0.9);
    return;
  }
  pDead = true;
  pDeadTimer = 2.5;
  deathTimer = 0.6; // pixel explosion duration
  pvy = -300;
  lives--;

  // Spawn pixel explosion particles
  deathParticles = [];
  for (var i = 0; i < 24; i++) {
    var angle = (i / 24) * Math.PI * 2;
    var spd = 60 + Math.random() * 120;
    deathParticles.push({
      x: px + PLAYER_W / 2, y: py + PLAYER_H / 2,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 40,
      color: i % 3 === 0 ? '#ffaa00' : i % 3 === 1 ? '#ff4400' : statB.color,
      life: 0.5 + Math.random() * 0.3, size: 2 + Math.random() * 2
    });
  }

  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 50);
  TAS.audio.playNoise(0.4, 0.1, 400);
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#ff0000', 0.4);
}

function collectFood(f) {
  f.collected = true;
  var scoreMult = getScoreMult();

  if (f.type === 'myco_fruit') {
    // Bonus HP restore
    pEnergy = Math.min(pMaxEnergy, pEnergy + 40);
    score += Math.floor(100 * scoreMult);
    TAS.audio.playTone(600, 0.08, 'sine', 0.06);
    TAS.audio.playTone(900, 0.08, 'sine', 0.05);
    TAS.particles.spawn(f.x + 5, f.y + 5, '#88ff88', 8, 2);
  } else if (f.type === 'reactor_battery') {
    // Weapon upgrade: cycle to next weapon
    if (pWeapon === 'axe') pWeapon = 'boomerang';
    else if (pWeapon === 'boomerang') pWeapon = 'fire';
    score += Math.floor(150 * scoreMult);
    TAS.audio.playTone(400, 0.06, 'square', 0.06);
    TAS.audio.playTone(800, 0.08, 'square', 0.05);
    TAS.particles.spawn(f.x + 5, f.y + 5, '#ffaa00', 8, 2.5);
  } else if (f.type === 'poop_token') {
    // POOP token bonus
    score += Math.floor(500 * scoreMult);
    TAS.audio.playTone(700, 0.06, 'sine', 0.06);
    TAS.audio.playTone(1000, 0.1, 'sine', 0.05);
    TAS.audio.playTone(1200, 0.06, 'sine', 0.04);
    TAS.particles.spawn(f.x + 5, f.y + 5, '#f4b41b', 10, 3);
  } else {
    pEnergy = Math.min(pMaxEnergy, pEnergy + 20);
    score += Math.floor(50 * scoreMult);
    TAS.audio.playTone(500, 0.06, 'sine', 0.06);
    TAS.audio.playTone(700, 0.06, 'sine', 0.05);
    TAS.particles.spawn(f.x + 5, f.y + 5, '#44ff44', 5, 1.5);
  }
}

function openEgg(egg) {
  egg.opened = true;
  score += Math.floor(100 * getScoreMult());
  TAS.audio.playNoise(0.1, 0.06, 2000);
  TAS.audio.playTone(800, 0.1, 'sine', 0.06, 1200);
  TAS.particles.spawn(egg.x + 6, egg.y + 7, '#ffffff', 8, 2);

  if (egg.contents === 'skateboard') {
    pHasSkateboard = true;
    pOnSkateboard = true;
  } else if (egg.contents === 'food') {
    pEnergy = Math.min(pMaxEnergy, pEnergy + 40);
  } else {
    pWeapon = egg.contents;
  }
}

function completeStage() {
  var timeBonus = Math.max(0, Math.floor((300 - stageTimer) * 10));
  var energyBonus = Math.floor(pEnergy * 5);
  var totalBonus = Math.floor((timeBonus + energyBonus) * getScoreMult());
  score += totalBonus;
  if (score > highScore) {
    highScore = score;
    TAS.score.save('adventureisland_hi', highScore);
  }
  clearTally = { time: 0, timeBonus: timeBonus, energyBonus: energyBonus, totalBonus: totalBonus, phase: 0 };
  state = 'stageClear';
  stageTimer = 0;
  TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return;   // picker overlay open — swallow title input
    if (TAS.input.keys['KeyC'] || TAS.input.keys['c'] || TAS.input.keys['C'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = TAS.input.keys['c'] = TAS.input.keys['C'] = false;
      TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 2 === 0) return;
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'stageClear') {
    stageTimer += dt;
    // Tally animation
    if (clearTally) {
      clearTally.time += dt;
      if (clearTally.time > 0.5) clearTally.phase = 1;
      if (clearTally.time > 1.2) clearTally.phase = 2;
      if (clearTally.time > 1.9) clearTally.phase = 3;
    }
    if (stageTimer > 4) {
      stage++;
      if (stage > 4) { stage = 1; world++; }
      if (world > 8) {
        state = 'gameOver';
        return;
      }
      pWeapon = 'axe';
      initStage();
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  stageTimer += dt;
  if (throwCooldownTimer > 0) throwCooldownTimer -= dt;

  // --- Player dead animation ---
  if (pDead) {
    pDeadTimer -= dt;
    deathTimer -= dt;

    // Update death explosion particles
    for (var i = deathParticles.length - 1; i >= 0; i--) {
      var dp = deathParticles[i];
      dp.x += dp.vx * dt;
      dp.y += dp.vy * dt;
      dp.vy += 200 * dt;
      dp.life -= dt;
      if (dp.life <= 0) deathParticles.splice(i, 1);
    }

    // Only apply gravity to player sprite after explosion finishes
    if (deathTimer <= 0) {
      py += pvy * dt;
      pvy += GRAVITY * dt;
    }

    if (pDeadTimer <= 0) {
      if (lives <= 0) {
        state = 'gameOver';
        if (score > highScore) {
          highScore = score;
          TAS.score.save('adventureisland_hi', highScore);
        }
      } else {
        px = Math.max(40, checkpoint);
        py = GROUND_Y - PLAYER_H;
        pvx = 0; pvy = 0;
        pOnGround = true;
        pDead = false;
        pEnergy = Math.floor(pMaxEnergy * 0.8);
        pWeapon = 'axe';
        pOnSkateboard = false;
        pHasSkateboard = false;
        pInvincible = true;
        pInvTimer = 2;
        deathParticles = [];
      }
    }
    return;
  }

  // --- Energy drain (CON reduces) ---
  var drainRate = getEnergyDrain(4 + world * 0.8 + stage * 0.3);
  pEnergy -= drainRate * dt;
  if (pEnergy <= 0) {
    pEnergy = 0;
    playerDie();
    return;
  }

  // --- Invincibility timer ---
  if (pInvincible) {
    pInvTimer -= dt;
    if (pInvTimer <= 0) pInvincible = false;
  }

  // --- Input ---
  var kLeft = TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left;
  var kRight = TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right;
  var kJump = TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.touch.a;
  var kDown = TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down;
  var kThrow = TAS.input.keys['KeyX'] || TAS.input.keys['KeyZ'] || TAS.input.keys['KeyF'] || TAS.input.touch.b;

  // Duck
  pDucking = kDown && pOnGround;

  // Horizontal movement (DEX scales speed)
  var moveSpeed = pOnSkateboard ? Math.floor(getRunSpeed() * 1.45) : getRunSpeed();
  if (kLeft && !pDucking) { pvx = -moveSpeed; pFacing = -1; }
  else if (kRight && !pDucking) { pvx = moveSpeed; pFacing = 1; }
  else { pvx = pOnSkateboard ? pvx * 0.98 : 0; }

  // Ice world slippery
  if (world === 7 && pOnGround) {
    if (!kLeft && !kRight) pvx *= 0.97;
  }

  // Jump
  if (kJump && pOnGround) {
    pvy = -340;
    pOnGround = false;
    TAS.audio.playTone(350, 0.06, 'square', 0.04, 500);
  }

  // Throw (with cooldown via WIS stat)
  if (kThrow && projectiles.length < 3) {
    if (!update._throwHeld) {
      throwWeapon();
      update._throwHeld = true;
    }
  } else if (!kThrow) {
    update._throwHeld = false;
  }

  // Physics
  if (!pOnGround) pvy += GRAVITY * dt;
  px += pvx * dt;
  py += pvy * dt;

  // Platform collision
  pOnGround = false;
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.x > camX + GW + 100 || p.x + p.w < camX - 100) continue;
    if (px + PLAYER_W > p.x && px < p.x + p.w) {
      if (pvy >= 0 && py + PLAYER_H >= p.y && py + PLAYER_H <= p.y + 16) {
        py = p.y - PLAYER_H;
        pvy = 0;
        pOnGround = true;
      }
    }
  }

  // Fall death
  if (py > GH + 50) { playerDie(); return; }

  // Keep in bounds (left)
  if (px < camX - 10) px = camX - 10;

  // Animation
  pAnimTimer += dt;
  if (pAnimTimer > 0.1) {
    pAnimTimer = 0;
    pAnimFrame = (pAnimFrame + 1) % 4;
  }

  // Camera
  var targetCam = px - GW * 0.3;
  camX += (targetCam - camX) * 3 * dt;
  if (camX < 0) camX = 0;

  // Checkpoint
  if (px > checkpoint + 400) checkpoint = px - 100;

  // --- Projectiles ---
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var proj = projectiles[i];
    proj.timer += dt;
    proj.x += proj.vx * dt;
    proj.y += proj.vy * dt;

    if (proj.type === 'axe') {
      proj.vy += 300 * dt;
    } else if (proj.type === 'boomerang') {
      if (proj.timer > 0.4 && !proj.returning) {
        proj.returning = true;
      }
      if (proj.returning) {
        var toPx = px - proj.x;
        var toPy = py - proj.y;
        var d = Math.sqrt(toPx * toPx + toPy * toPy);
        if (d > 0) { proj.vx = (toPx / d) * 200; proj.vy = (toPy / d) * 200; }
        if (d < 20) proj.alive = false;
      }
    }
    if (proj.x < camX - 50 || proj.x > camX + GW + 50 || proj.y > GH + 50) {
      proj.alive = false;
    }
    if (proj.timer > 3) proj.alive = false;
    if (!proj.alive) { projectiles.splice(i, 1); continue; }

    // Hit enemies
    for (var j = 0; j < enemies.length; j++) {
      var e = enemies[j];
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(proj.x - 4, proj.y - 4, 8, 8, e.x, e.y, e.w, e.h)) {
        e.hp -= proj.damage;
        if (e.hp <= 0) {
          e.alive = false;
          score += Math.floor(100 * getScoreMult());
          // Kill particle burst
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff8800', 12, 3, { gravity: 1 });
          TAS.fx.shake(2, 0.92);
        } else {
          // Hit but not dead (armored enemy)
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#aaaaaa', 4, 1.5);
          TAS.audio.playTone(200, 0.04, 'square', 0.04);
        }
        if (proj.type !== 'fire') proj.alive = false;
        TAS.audio.playTone(150, 0.12, 'square', 0.06, 80);
      }
    }

    // Hit bosses
    for (var j = 0; j < bosses.length; j++) {
      var b = bosses[j];
      if (!b.alive) continue;
      if (TAS.hit.rectOverlap(proj.x - 4, proj.y - 4, 8, 8, b.x, b.y, b.w, b.h)) {
        b.hp -= proj.damage;
        if (proj.type !== 'fire') proj.alive = false;
        TAS.audio.playTone(100, 0.15, 'square', 0.08, 60);
        TAS.particles.spawn(proj.x, proj.y, '#ffaa00', 6, 2);
        TAS.fx.shake(4, 0.88); // screen shake on boss hits
        if (b.hp <= 0) {
          b.alive = false;
          score += Math.floor(1000 * getScoreMult());
          TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ff4400', 20, 4, { gravity: 1.5 });
          TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ffdd00', 16, 3, { gravity: 1 });
          TAS.fx.shake(8, 0.82);
          TAS.fx.flash('#ffaa00', 0.5);
          TAS.audio.playTone(80, 0.4, 'sawtooth', 0.12, 30);
        }
      }
    }
  }

  // --- Enemies ---
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.x < camX - 200 || e.x > camX + GW + 200) continue;

    e.anim += dt;

    if (e.type === 'spore_cloud') {
      // Float and periodically create damage zone
      e.x += e.vx * dt;
      e.y += Math.sin(e.anim * 2) * 0.8;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
      e.damageZoneTimer += dt;
    } else if (e.wallWalker) {
      // Mycelial Crawler: moves vertically on "walls"
      e.y += e.vy * dt;
      e.x += e.vx * 0.3 * dt;
      if (e.y < e.startY - 50 || e.y > GROUND_Y - 16) e.vy = -e.vy;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
    } else if (e.flying) {
      e.x += e.vx * dt;
      e.y += Math.sin(e.anim * 3) * 0.5;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
    } else {
      e.x += e.vx * dt;
      if (Math.abs(e.x - e.startX) > e.patrol) e.vx = -e.vx;
    }

    // Collision with player
    if (!pInvincible && !pDead) {
      // Spore cloud: periodic damage zone (every 2s, damages if near)
      if (e.type === 'spore_cloud' && e.damageZoneTimer > 2) {
        e.damageZoneTimer = 0;
        if (Math.abs(px - e.x) < 30 && Math.abs(py - e.y) < 30) {
          pEnergy -= 15;
          TAS.particles.spawn(px + PLAYER_W / 2, py, '#88aa44', 6, 1.5);
          TAS.audio.playNoise(0.1, 0.04, 1000);
          if (pEnergy <= 0) { pEnergy = 0; playerDie(); return; }
        }
      }
      if (TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
        playerDie();
        return;
      }
    }
  }

  // --- Hazards ---
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (!h.active) continue;
    if (h.x < camX - 100 || h.x > camX + GW + 100) continue;
    h.timer += dt;

    if (h.type === 'toxic_goo') {
      // Static puddle, damages on contact
      if (!pInvincible && !pDead && TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, h.x, h.y - 4, h.w, 8)) {
        pEnergy -= 30 * dt;
        if (frame % 10 === 0) TAS.particles.spawn(px + PLAYER_W / 2, py + PLAYER_H, '#44ff00', 3, 1);
        if (pEnergy <= 0) { pEnergy = 0; playerDie(); return; }
      }
    } else if (h.type === 'spore_rain') {
      // Area where spores fall periodically
      if (h.timer > 0.5) {
        h.timer = 0;
        // Visual rain particle
        TAS.particles.spawn(h.x + Math.random() * h.w, h.y - 100 - Math.random() * 20, '#aacc44', 2, 0.8, { gravity: 2 });
      }
      if (!pInvincible && !pDead && px + PLAYER_W > h.x && px < h.x + h.w && py < h.y && py > h.y - h.h) {
        if (frame % 20 === 0) {
          pEnergy -= 5;
          if (pEnergy <= 0) { pEnergy = 0; playerDie(); return; }
        }
      }
    } else if (h.type === 'plant_trap') {
      // Snaps shut when player is near
      h.triggerTimer += dt;
      var playerNear = Math.abs(px + PLAYER_W / 2 - (h.x + h.w / 2)) < 20 && Math.abs(py + PLAYER_H - h.y) < 20;
      if (playerNear && h.triggerTimer > 1.5) {
        h.triggerTimer = 0;
        if (!pInvincible && !pDead) {
          pEnergy -= 20;
          TAS.particles.spawn(h.x + h.w / 2, h.y - 8, '#44aa22', 6, 2);
          TAS.audio.playTone(180, 0.08, 'sawtooth', 0.06);
          TAS.fx.shake(2, 0.93);
          if (pEnergy <= 0) { pEnergy = 0; playerDie(); return; }
        }
      }
    }
  }

  // --- Bosses ---
  for (var i = 0; i < bosses.length; i++) {
    var b = bosses[i];
    if (!b.alive) continue;
    if (b.x < camX - 100 || b.x > camX + GW + 200) continue;
    activeBoss = b;

    b.anim += dt;
    b.attackTimer += dt;
    b.moveTimer += dt;

    // Boss AI
    if (b.type === 'elder_mushroom') {
      // Sways side to side, shoots spore projectiles
      b.x = b.startX + Math.sin(b.moveTimer * 0.8) * 40;
      if (b.attackTimer > 2.5 - world * 0.1) {
        b.attackTimer = 0;
        // Shoot 3 spores
        for (var s = 0; s < 3; s++) {
          var angle = -0.5 + s * 0.5;
          b.projectiles.push({
            x: b.x + b.w / 2, y: b.y + 10,
            vx: Math.cos(angle) * -80, vy: Math.sin(angle) * 60 - 30,
            alive: true, timer: 0
          });
        }
        TAS.audio.playNoise(0.2, 0.06, 600);
      }
    } else if (b.type === 'reactor_hive') {
      // Hovers, drops bombs, charges at player
      b.y = GROUND_Y - 60 + Math.sin(b.moveTimer * 1.5) * 20;
      // Slowly chase player
      if (px < b.x) b.x -= 20 * dt;
      else b.x += 20 * dt;
      if (b.attackTimer > 2 - world * 0.08) {
        b.attackTimer = 0;
        // Drop bomb
        b.projectiles.push({
          x: b.x + b.w / 2, y: b.y + b.h,
          vx: 0, vy: 80,
          alive: true, timer: 0
        });
        TAS.audio.playTone(120, 0.1, 'sawtooth', 0.06);
      }
    }

    // Update boss projectiles
    for (var j = b.projectiles.length - 1; j >= 0; j--) {
      var bp = b.projectiles[j];
      bp.timer += dt;
      bp.x += bp.vx * dt;
      bp.y += bp.vy * dt;
      bp.vy += 60 * dt; // slight gravity
      if (bp.timer > 4 || bp.y > GH + 20) { b.projectiles.splice(j, 1); continue; }
      // Hit player
      if (!pInvincible && !pDead && TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, bp.x - 4, bp.y - 4, 8, 8)) {
        pEnergy -= 25;
        bp.alive = false;
        b.projectiles.splice(j, 1);
        TAS.fx.shake(3, 0.9);
        TAS.particles.spawn(px + PLAYER_W / 2, py + PLAYER_H / 2, '#ff4400', 6, 2);
        if (pEnergy <= 0) { pEnergy = 0; playerDie(); return; }
      }
    }

    // Boss contact damage
    if (!pInvincible && !pDead && TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, b.x, b.y, b.w, b.h)) {
      playerDie();
      return;
    }
  }

  // --- Food collection ---
  for (var i = 0; i < foods.length; i++) {
    var f = foods[i];
    if (f.collected) continue;
    if (f.x < camX - 50 || f.x > camX + GW + 50) continue;
    if (TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, f.x, f.y, f.w, f.h)) {
      collectFood(f);
    }
  }

  // --- Egg collection ---
  for (var i = 0; i < eggs.length; i++) {
    var egg = eggs[i];
    if (egg.opened) continue;
    if (egg.x < camX - 50 || egg.x > camX + GW + 50) continue;
    if (!egg.visible) {
      if (TAS.hit.rectOverlap(px, py - 10, PLAYER_W, 10, egg.x, egg.y, egg.w, egg.h)) {
        egg.visible = true;
        TAS.audio.playTone(600, 0.05, 'square', 0.04);
      }
      continue;
    }
    if (TAS.hit.rectOverlap(px, py, PLAYER_W, PLAYER_H, egg.x, egg.y, egg.w, egg.h)) {
      openEgg(egg);
    }
  }

  // --- Goal check (only if all bosses dead) ---
  var bossAlive = false;
  for (var i = 0; i < bosses.length; i++) { if (bosses[i].alive) bossAlive = true; }
  if (px >= goalX && !bossAlive) {
    completeStage();
  }

  // --- Energy warning sound ---
  if (pEnergy < 25 && frame % 30 === 0) {
    TAS.audio.playTone(880, 0.03, 'square', 0.03);
  }
}
update._throwHeld = false;

// === DRAW ===
function draw(dt) {
  var theme = getTheme();

  // --- Title screen ---
  if (state === 'title') {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, GW, GH);

    drawTitleScene();

    TAS.ui.drawTitle('BASELING ISLAND', 'Spore Jungle Survival', GW, GH, { frame: frame, titleColor: '#a855f7' });

    // High score
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH * 0.35);

    // Stat bar
    drawStatBar();

    // NES controls display with dotted leaders
    drawControlsDisplay();

    return;
  }

  // --- Game Over ---
  if (state === 'gameOver') {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, GW, GH);
    var zoneName = ZONE_NAMES[Math.min(world - 1, 7)] || 'Unknown';
    var extra = zoneName + ' ' + world + '-' + stage + '  |  Score: ' + score;
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: extra });
    return;
  }

  // --- Stage Clear with tally ---
  if (state === 'stageClear') {
    ctx.fillStyle = theme.sky;
    ctx.fillRect(0, 0, GW, GH);
    drawStageClearTally(theme);
    return;
  }

  // === PLAYING STATE ===
  ctx.save();
  TAS.fx.applyShake();

  // Sky
  ctx.fillStyle = theme.sky;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax backgrounds (zone-themed)
  drawParallax(theme);

  // Offset for camera
  ctx.save();
  ctx.translate(-Math.floor(camX), 0);

  // Decorations (behind)
  drawDecorations(theme);

  // Platforms
  drawPlatforms(theme);

  // Hazards (behind enemies)
  drawHazards(theme);

  // Food
  drawFood();

  // Eggs
  drawEggs();

  // Enemies
  drawEnemies();

  // Bosses
  drawBosses();

  // Player
  if (!pDead || deathTimer > 0) {
    // During death explosion, don't draw player sprite
    if (!pDead) drawPlayer();
  } else if (pDead && pDeadTimer > 0 && deathTimer <= 0) {
    drawPlayer(); // falling corpse after explosion
  }

  // Death explosion particles (world space)
  drawDeathParticles();

  // Projectiles
  drawProjectiles();

  // Boss projectiles
  drawBossProjectiles();

  // Goal
  drawGoal();

  ctx.restore(); // camera

  // Particles (screen space)
  TAS.particles.draw();

  ctx.restore(); // shake

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Zone name flash at stage start
  if (stageTimer < 2.5) {
    drawZoneNameFlash();
  }

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW HELPERS ===
function drawTitleScene() {
  ctx.fillStyle = '#1a3a2a';
  ctx.fillRect(0, GH * 0.3, GW, GH * 0.7);

  // Swamp water
  ctx.fillStyle = '#1a4a2a';
  ctx.fillRect(0, GH * 0.7, GW, GH * 0.3);

  // Mossy ground
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(0, GH * 0.65, GW, 20);

  // Giant mushrooms
  for (var i = 0; i < 3; i++) {
    var tx = 80 + i * 160;
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(tx, Math.floor(GH * 0.4), 6, Math.floor(GH * 0.25));
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(tx + 3, Math.floor(GH * 0.38), 25, 0, Math.PI * 2);
    ctx.fill();
    // Mushroom spots
    ctx.fillStyle = '#f4b41b';
    ctx.beginPath();
    ctx.arc(tx - 5, Math.floor(GH * 0.36), 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(tx + 10, Math.floor(GH * 0.34), 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawStatBar() {
  // Show the selected champion + the 5 arcade stat bars on the title screen.
  var by = Math.floor(GH * 0.72);
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(selName, Math.floor(GW / 2), by);
  drawTitleStatBars(Math.floor(GW / 2), by + 11, 220);
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', Math.floor(GW / 2), by + 34);
}

function drawControlsDisplay() {
  // NES-style controls with dotted leaders
  var cx = Math.floor(GW / 2);
  var cy = Math.floor(GH * 0.9);
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8866aa';

  var controls = [
    ['MOVE', 'ARROWS / WASD'],
    ['JUMP', 'SPACE / W / UP'],
    ['THROW', 'X / Z / F'],
    ['DUCK', 'S / DOWN']
  ];

  var startY = cy - controls.length * 7;
  for (var i = 0; i < controls.length; i++) {
    var label = controls[i][0];
    var key = controls[i][1];
    var lineY = startY + i * 8;
    // Draw with dotted leader
    ctx.textAlign = 'left';
    ctx.fillText(label, cx - 80, lineY);
    ctx.textAlign = 'right';
    ctx.fillText(key, cx + 80, lineY);
    // Dotted leader between
    var lw = ctx.measureText(label).width;
    var rw = ctx.measureText(key).width;
    var dotStart = cx - 80 + lw + 4;
    var dotEnd = cx + 80 - rw - 4;
    ctx.fillStyle = '#664488';
    for (var dx = dotStart; dx < dotEnd; dx += 4) {
      ctx.fillRect(Math.floor(dx), lineY - 2, 1, 1);
    }
    ctx.fillStyle = '#8866aa';
  }
}

function drawParallax(theme) {
  // Layer 1 - distant mountains/clouds (zone-themed)
  var scrollBg1 = (camX * 0.15) % GW;
  ctx.fillStyle = theme.bgFar || mixColor(theme.sky, '#000000', 0.15);
  for (var i = 0; i < 6; i++) {
    var mx = i * 100 - scrollBg1 % 100;
    var mh = 30 + (i * 17) % 40;
    drawMountain(Math.floor(mx), Math.floor(GH * 0.5), 100, mh);
  }

  // Layer 2 - mid-ground (zone-themed)
  var scrollBg2 = (camX * 0.4) % GW;
  ctx.fillStyle = theme.bgMid || mixColor(theme.ground, theme.sky, 0.4);
  for (var i = 0; i < 8; i++) {
    var mx = i * 80 - scrollBg2 % 80;
    var mh = 15 + (i * 13) % 25;
    drawMountain(Math.floor(mx), Math.floor(GH * 0.7), 60, mh);
  }

  // Layer 3 - zone-specific foreground parallax detail
  var scrollBg3 = (camX * 0.6) % GW;
  if (world === 1 || world === 2) {
    // Trees/mushrooms in distance
    ctx.fillStyle = mixColor(theme.accent, '#000000', 0.3);
    for (var i = 0; i < 6; i++) {
      var tx = Math.floor(i * 90 - scrollBg3 % 90);
      var th = 10 + (i * 11) % 20;
      ctx.fillRect(tx + 20, Math.floor(GH * 0.75 - th), 4, th);
      ctx.beginPath();
      ctx.arc(tx + 22, Math.floor(GH * 0.75 - th), 8, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (world === 3) {
    // Stalactites
    ctx.fillStyle = '#2a2a3a';
    for (var i = 0; i < 10; i++) {
      var sx = Math.floor(i * 55 - scrollBg3 % 55);
      var sh = 8 + (i * 7) % 18;
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx + 6, sh);
      ctx.lineTo(sx + 12, 0);
      ctx.fill();
    }
  } else if (world === 6) {
    // Lava glow
    ctx.fillStyle = 'rgba(255,68,0,0.1)';
    ctx.fillRect(0, Math.floor(GH * 0.8), GW, Math.floor(GH * 0.2));
    if (frame % 3 === 0) {
      ctx.fillStyle = 'rgba(255,100,0,0.05)';
      ctx.fillRect(0, Math.floor(GH * 0.75), GW, Math.floor(GH * 0.25));
    }
  }
}

function drawMountain(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.lineTo(x + Math.floor(w / 2), baseY - h);
  ctx.lineTo(x + w, baseY);
  ctx.fill();
}

function mixColor(c1, c2, t) {
  var r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
  var r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
  var r = Math.floor(r1 + (r2 - r1) * t);
  var g = Math.floor(g1 + (g2 - g1) * t);
  var b = Math.floor(b1 + (b2 - b1) * t);
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

function drawDecorations(theme) {
  for (var i = 0; i < decorations.length; i++) {
    var d = decorations[i];
    if (d.x < camX - 60 || d.x > camX + GW + 60) continue;

    if (d.type === 'palm' || d.type === 'tree') {
      ctx.fillStyle = '#6B3A10';
      ctx.fillRect(Math.floor(d.x), Math.floor(d.y - d.size), 5, d.size);
      ctx.fillStyle = theme.accent;
      ctx.beginPath();
      ctx.arc(Math.floor(d.x + 2), Math.floor(d.y - d.size), Math.floor(d.size * 0.4), 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 'rock' || d.type === 'lava_rock') {
      ctx.fillStyle = d.type === 'lava_rock' ? '#553311' : '#666';
      ctx.beginPath();
      ctx.arc(Math.floor(d.x), Math.floor(d.y - d.size * 0.3), Math.floor(d.size * 0.3), 0, Math.PI * 2);
      ctx.fill();
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (d.type === 'cloud') {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(Math.floor(d.x), Math.floor(d.y - d.size), Math.floor(d.size * 0.5), 0, Math.PI * 2);
      ctx.fill();
    } else if (d.type === 'crystal') {
      ctx.fillStyle = '#6644aa';
      ctx.beginPath();
      ctx.moveTo(Math.floor(d.x), Math.floor(d.y));
      ctx.lineTo(Math.floor(d.x + d.size * 0.15), Math.floor(d.y - d.size * 0.6));
      ctx.lineTo(Math.floor(d.x + d.size * 0.3), Math.floor(d.y));
      ctx.fill();
      ctx.strokeStyle = '#8866cc';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

function drawPlatforms(theme) {
  for (var i = 0; i < platforms.length; i++) {
    var p = platforms[i];
    if (p.x + p.w < camX - 20 || p.x > camX + GW + 20) continue;

    if (p.type === 'ground') {
      ctx.fillStyle = theme.ground;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, p.h);
      // Grass top
      ctx.fillStyle = theme.accent;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, 3);
      // Texture lines
      ctx.fillStyle = mixColor(theme.ground, '#000000', 0.2);
      for (var j = 0; j < p.w; j += 12) {
        ctx.fillRect(Math.floor(p.x + j), Math.floor(p.y + 8), 6, 1);
      }
    } else {
      ctx.fillStyle = theme.platform;
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, p.h);
      ctx.fillStyle = mixColor(theme.platform, '#ffffff', 0.3);
      ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.w, 2);
      // NES outline on floating platforms
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(Math.floor(p.x), Math.floor(p.y), p.w, p.h);
    }
  }
}

function drawHazards(theme) {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.x < camX - 100 || h.x > camX + GW + 100) continue;

    if (h.type === 'toxic_goo') {
      // Green puddle with bubble animation
      ctx.fillStyle = '#44cc00';
      ctx.globalAlpha = 0.7;
      ctx.fillRect(Math.floor(h.x), Math.floor(h.y - 3), h.w, 5);
      ctx.globalAlpha = 1;
      // Bubbles
      var bubbleOff = Math.sin(frame * 0.1 + h.x) * 2;
      ctx.fillStyle = '#66ff22';
      ctx.beginPath();
      ctx.arc(Math.floor(h.x + 8), Math.floor(h.y - 4 + bubbleOff), 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(Math.floor(h.x + h.w - 8), Math.floor(h.y - 5 - bubbleOff), 1.5, 0, Math.PI * 2);
      ctx.fill();
    } else if (h.type === 'spore_rain') {
      // Faint column indicator
      ctx.fillStyle = 'rgba(150,180,80,0.08)';
      ctx.fillRect(Math.floor(h.x), Math.floor(h.y - h.h), h.w, h.h);
    } else if (h.type === 'plant_trap') {
      // Venus flytrap style
      var open = h.triggerTimer > 0.8 ? 1 : 0;
      ctx.fillStyle = '#228822';
      // Stem
      ctx.fillRect(Math.floor(h.x + h.w / 2 - 2), Math.floor(h.y - 12), 4, 12);
      // Jaws
      ctx.fillStyle = '#33aa22';
      if (open) {
        // Open mouth
        ctx.beginPath();
        ctx.arc(Math.floor(h.x + h.w / 2), Math.floor(h.y - 14), 8, Math.PI, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(Math.floor(h.x + h.w / 2), Math.floor(h.y - 14), 4, Math.PI, Math.PI * 2);
        ctx.fill();
      } else {
        // Closed
        ctx.beginPath();
        ctx.arc(Math.floor(h.x + h.w / 2), Math.floor(h.y - 14), 8, 0, Math.PI * 2);
        ctx.fill();
      }
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

function drawFood() {
  for (var i = 0; i < foods.length; i++) {
    var f = foods[i];
    if (f.collected) continue;
    if (f.x < camX - 20 || f.x > camX + GW + 20) continue;

    var bob = Math.sin(frame * 0.08 + f.x) * 2;
    var colors = {
      spore_fruit: '#38d973', garden_seed: '#f4b41b', mushroom_cap: '#a855f7',
      poop_pellet: '#7a444a', mushroom: '#cc44cc', myco_melon: '#38d973',
      myco_fruit: '#88ff88', reactor_battery: '#ffaa00', poop_token: '#f4b41b'
    };
    ctx.fillStyle = colors[f.type] || '#ff8800';
    ctx.beginPath();
    ctx.arc(Math.floor(f.x + 5), Math.floor(f.y + 5 + bob), 5, 0, Math.PI * 2);
    ctx.fill();

    // NES outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(Math.floor(f.x + 3), Math.floor(f.y + 3 + bob), 2, 0, Math.PI * 2);
    ctx.fill();

    // Tasern item sparkle
    if (f.type === 'myco_fruit' || f.type === 'reactor_battery' || f.type === 'poop_token' || f.type === 'garden_seed') {
      if (frame % 8 < 4) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.floor(f.x + 2), Math.floor(f.y + bob), 1, 1);
        ctx.fillRect(Math.floor(f.x + 7), Math.floor(f.y + 3 + bob), 1, 1);
      }
    }
  }
}

function drawEggs() {
  for (var i = 0; i < eggs.length; i++) {
    var egg = eggs[i];
    if (egg.opened || !egg.visible) continue;
    if (egg.x < camX - 20 || egg.x > camX + GW + 20) continue;

    ctx.fillStyle = '#ffffee';
    ctx.beginPath();
    ctx.ellipse(Math.floor(egg.x + 6), Math.floor(egg.y + 7), 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // NES outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Spots
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.arc(Math.floor(egg.x + 4), Math.floor(egg.y + 5), 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(Math.floor(egg.x + 8), Math.floor(egg.y + 9), 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    if (!e.alive) continue;
    if (e.x < camX - 30 || e.x > camX + GW + 30) continue;

    var colors = {
      spore_slug: '#38d973', fungal_bat: '#a855f7', wild_slime: '#44dd88', poison_shroom: '#cc44cc',
      rock: '#777777', moss_goat: '#7a444a', poop_hawk: '#f4b41b',
      cloud_puff: '#ccccff', lava_worm: '#ff6600', fire_jet: '#ffaa00',
      frost_slime: '#aaddff', icicle: '#aaddff', garden_knight: '#888888', spore_wizard: '#a855f7',
      reactor_beetle: '#66aa44', spore_cloud: '#aacc66', mycelial_crawler: '#8855aa'
    };

    ctx.fillStyle = colors[e.type] || '#ff0000';

    if (e.type === 'reactor_beetle') {
      // Armored beetle with shell
      var ex = Math.floor(e.x), ey = Math.floor(e.y);
      // Shell
      ctx.fillStyle = '#446622';
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 5, 8, Math.PI, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillStyle = '#66aa44';
      ctx.fillRect(ex, ey + 4, 14, 10);
      // Armor highlight
      ctx.fillStyle = '#88cc66';
      ctx.fillRect(ex + 2, ey + 2, 10, 2);
      // Eyes
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(ex + 3, ey + 6, 2, 2);
      ctx.fillRect(ex + 9, ey + 6, 2, 2);
      // Legs
      var legOff = Math.sin(e.anim * 8) * 2;
      ctx.fillStyle = '#446622';
      ctx.fillRect(ex + 1, ey + 14, 3, 2 + Math.floor(legOff));
      ctx.fillRect(ex + 5, ey + 14, 3, 2 - Math.floor(legOff));
      ctx.fillRect(ex + 10, ey + 14, 3, 2 + Math.floor(legOff));
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(ex, ey, 14, 16);
      // HP indicator
      if (e.hp < e.maxHp) {
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(ex, ey - 4, 14, 2);
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(ex, ey - 4, Math.floor(14 * e.hp / e.maxHp), 2);
      }
    } else if (e.type === 'spore_cloud') {
      // Floating spore cloud
      var ex = Math.floor(e.x), ey = Math.floor(e.y);
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#aacc66';
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 7, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ccdd88';
      ctx.beginPath();
      ctx.arc(ex + 4, ey + 5, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex + 10, ey + 6, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Spore particles
      if (e.damageZoneTimer > 1.5) {
        ctx.fillStyle = 'rgba(170,200,100,0.3)';
        ctx.beginPath();
        ctx.arc(ex + 7, ey + 7, 20, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (e.type === 'mycelial_crawler') {
      // Crawling mycelium creature
      var ex = Math.floor(e.x), ey = Math.floor(e.y);
      ctx.fillStyle = '#8855aa';
      ctx.fillRect(ex + 2, ey + 2, 10, 10);
      // Tendrils
      ctx.fillStyle = '#aa77cc';
      var tOff = Math.sin(e.anim * 6) * 2;
      ctx.fillRect(ex, ey + 4 + Math.floor(tOff), 3, 6);
      ctx.fillRect(ex + 11, ey + 4 - Math.floor(tOff), 3, 6);
      ctx.fillRect(ex + 4, ey + 12, 6, 2 + Math.floor(Math.abs(tOff)));
      // Eyes
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(ex + 4, ey + 4, 2, 2);
      ctx.fillRect(ex + 8, ey + 4, 2, 2);
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(ex + 2, ey + 2, 10, 10);
    } else if (e.flying) {
      var ex = Math.floor(e.x), ey = Math.floor(e.y);
      var wing = Math.sin(e.anim * 10) * 4;
      ctx.beginPath();
      ctx.arc(ex + 7, ey + 7, 7, 0, Math.PI * 2);
      ctx.fill();
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
      // Wings
      ctx.fillStyle = colors[e.type] || '#ff0000';
      ctx.fillRect(ex - 2, ey + 4 + Math.floor(wing), 4, 3);
      ctx.fillRect(ex + 12, ey + 4 - Math.floor(wing), 4, 3);
    } else {
      var ex = Math.floor(e.x), ey = Math.floor(e.y);
      ctx.fillRect(ex, ey, e.w, e.h);
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(ex, ey, e.w, e.h);
      // Eyes
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(ex + 3, ey + 3, 3, 3);
      ctx.fillRect(ex + 9, ey + 3, 3, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(ex + 4, ey + 4, 2, 2);
      ctx.fillRect(ex + 10, ey + 4, 2, 2);
      // Legs animation
      var legOff = Math.sin(e.anim * 8) * 2;
      ctx.fillStyle = colors[e.type] || '#ff0000';
      ctx.fillRect(ex + 2, ey + e.h, 3, 3 + Math.floor(legOff));
      ctx.fillRect(ex + 9, ey + e.h, 3, 3 - Math.floor(legOff));
    }
  }
}

function drawBosses() {
  for (var i = 0; i < bosses.length; i++) {
    var b = bosses[i];
    if (!b.alive) continue;
    if (b.x < camX - 60 || b.x > camX + GW + 60) continue;

    var bx = Math.floor(b.x), by = Math.floor(b.y);

    if (b.type === 'elder_mushroom') {
      // Giant spore plant
      // Stem
      ctx.fillStyle = '#336622';
      ctx.fillRect(bx + 16, by + 30, 8, 30);
      // Body
      ctx.fillStyle = '#44aa33';
      ctx.beginPath();
      ctx.arc(bx + 20, by + 20, 20, 0, Math.PI * 2);
      ctx.fill();
      // Spots
      ctx.fillStyle = '#66cc44';
      ctx.beginPath();
      ctx.arc(bx + 12, by + 15, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(bx + 28, by + 22, 4, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(bx + 12, by + 18, 4, 4);
      ctx.fillRect(bx + 24, by + 18, 4, 4);
      // Mouth
      ctx.fillStyle = '#220000';
      ctx.fillRect(bx + 14, by + 26, 12, 4);
      // NES outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(bx + 20, by + 20, 20, 0, Math.PI * 2);
      ctx.stroke();
    } else if (b.type === 'reactor_hive') {
      // Mechanical hive boss
      ctx.fillStyle = '#886633';
      // Hexagonal body approximation
      ctx.beginPath();
      ctx.moveTo(bx + 20, by);
      ctx.lineTo(bx + 38, by + 10);
      ctx.lineTo(bx + 38, by + 35);
      ctx.lineTo(bx + 20, by + 45);
      ctx.lineTo(bx + 2, by + 35);
      ctx.lineTo(bx + 2, by + 10);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Inner glow
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(bx + 20, by + 22, 10, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(bx + 12, by + 16, 4, 4);
      ctx.fillRect(bx + 24, by + 16, 4, 4);
      // Legs/appendages
      var lOff = Math.sin(b.anim * 4) * 3;
      ctx.fillStyle = '#665522';
      ctx.fillRect(bx + 5, by + 40, 4, 8 + Math.floor(lOff));
      ctx.fillRect(bx + 31, by + 40, 4, 8 - Math.floor(lOff));
    }

    // HP bar
    ctx.fillStyle = '#440000';
    ctx.fillRect(bx - 2, by - 10, b.w + 4, 5);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(bx - 1, by - 9, Math.floor((b.w + 2) * b.hp / b.maxHp), 3);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx - 2, by - 10, b.w + 4, 5);

    // Boss name
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    var bossName = b.type === 'elder_mushroom' ? 'ELDER MUSHROOM' : 'REACTOR HIVE';
    ctx.fillText(bossName, bx + Math.floor(b.w / 2), by - 14);
  }
}

function drawBossProjectiles() {
  for (var i = 0; i < bosses.length; i++) {
    var b = bosses[i];
    if (!b.alive) continue;
    for (var j = 0; j < b.projectiles.length; j++) {
      var bp = b.projectiles[j];
      ctx.fillStyle = b.type === 'elder_mushroom' ? '#88cc22' : '#ff6600';
      ctx.beginPath();
      ctx.arc(Math.floor(bp.x), Math.floor(bp.y), 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

function drawDeathParticles() {
  for (var i = 0; i < deathParticles.length; i++) {
    var dp = deathParticles[i];
    ctx.fillStyle = dp.color;
    ctx.globalAlpha = Math.max(0, dp.life / 0.8);
    ctx.fillRect(Math.floor(dp.x), Math.floor(dp.y), Math.floor(dp.size), Math.floor(dp.size));
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (pInvincible && Math.floor(frame / 3) % 2 === 0) return;

  var dx = Math.floor(px), dy = Math.floor(py);

  // Body color from baseling stat
  var bodyColor = pOnSkateboard ? '#44ddaa' : statB.color;

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, Math.floor(px) + PLAYER_W / 2, Math.floor(py) + PLAYER_H / 2, Math.max(PLAYER_W, PLAYER_H), { flipX: pFacing < 0, frame: frame })) {
    ctx.save();
    if (pFacing < 0) {
      ctx.translate(dx + PLAYER_W, 0);
      ctx.scale(-1, 1);
      dx = 0;
    }

    // Skateboard
    if (pOnSkateboard) {
      ctx.fillStyle = '#cc8833';
      ctx.fillRect(dx - 3, dy + PLAYER_H - 2, PLAYER_W + 6, 3);
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(dx + 2, dy + PLAYER_H + 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(dx + PLAYER_W - 2, dy + PLAYER_H + 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Legs
    var legOff = pOnGround ? Math.sin(pAnimFrame * 1.5) * 3 : 0;
    ctx.fillStyle = bodyColor;
    if (pDucking) {
      ctx.fillRect(dx + 2, dy + PLAYER_H - 6, 4, 4);
      ctx.fillRect(dx + 8, dy + PLAYER_H - 6, 4, 4);
    } else {
      ctx.fillRect(dx + 2, dy + PLAYER_H - 6, 4, 6 + Math.floor(legOff));
      ctx.fillRect(dx + 8, dy + PLAYER_H - 6, 4, 6 - Math.floor(legOff));
    }

    // Body
    var bodyY = pDucking ? dy + 6 : dy + 2;
    var bodyH = pDucking ? PLAYER_H - 10 : PLAYER_H - 8;
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(dx + Math.floor(PLAYER_W / 2), bodyY + Math.floor(bodyH / 2), Math.floor(PLAYER_W / 2) + 1, 0, Math.PI * 2);
    ctx.fill();
    // NES outline on body
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Grass skirt
    ctx.fillStyle = '#228822';
    ctx.fillRect(dx, dy + PLAYER_H - 9, PLAYER_W, 4);
    for (var i = 0; i < 4; i++) {
      ctx.fillRect(dx + i * 4, dy + PLAYER_H - 6, 2, 3);
    }

    // Head
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(dx + Math.floor(PLAYER_W / 2), dy + 5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Mushroom cap hat
    ctx.fillStyle = '#a855f7';
    ctx.beginPath();
    ctx.moveTo(dx + 2, dy + 3);
    ctx.lineTo(dx + Math.floor(PLAYER_W / 2), dy - 5);
    ctx.lineTo(dx + PLAYER_W - 2, dy + 3);
    ctx.fill();
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.moveTo(dx + 4, dy + 2);
    ctx.lineTo(dx + Math.floor(PLAYER_W / 2), dy - 3);
    ctx.lineTo(dx + PLAYER_W - 4, dy + 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(dx + 4, dy + 3, 3, 3);
    ctx.fillRect(dx + 9, dy + 3, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(dx + 5, dy + 4, 2, 2);
    ctx.fillRect(dx + 10, dy + 4, 2, 2);

    // Mouth
    if (pEnergy < 25) {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(dx + Math.floor(PLAYER_W / 2), dy + 9, 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(dx + 5, dy + 8, 4, 1);
    }

    ctx.restore();
  }
}

function drawProjectiles() {
  for (var i = 0; i < projectiles.length; i++) {
    var p = projectiles[i];
    if (!p.alive) continue;

    var rot = p.timer * 10;
    ctx.save();
    ctx.translate(Math.floor(p.x), Math.floor(p.y));
    ctx.rotate(rot);

    if (p.type === 'axe') {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(-3, -1, 6, 2);
      ctx.fillStyle = '#aaaaaa';
      ctx.fillRect(-4, -4, 4, 4);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(-4, -4, 4, 4);
    } else if (p.type === 'boomerang') {
      ctx.fillStyle = '#ddaa33';
      ctx.fillRect(-5, -1, 10, 2);
      ctx.fillRect(-1, -5, 2, 10);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.strokeRect(-5, -5, 10, 10);
    } else if (p.type === 'fire') {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd00';
      ctx.beginPath();
      ctx.arc(0, 0, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.restore();
  }
}

function drawGoal() {
  if (goalX < camX - 20 || goalX > camX + GW + 20) return;

  var gx = Math.floor(goalX);
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(gx, GROUND_Y - 50, 4, 50);
  var wave = Math.sin(frame * 0.1) * 3;
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.moveTo(gx + 4, GROUND_Y - 50);
  ctx.lineTo(gx + 24 + Math.floor(wave), GROUND_Y - 42);
  ctx.lineTo(gx + 4, GROUND_Y - 34);
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', gx + 2, GROUND_Y - 54);
}

function drawStageClearTally(theme) {
  ctx.textAlign = 'center';
  var zoneName = ZONE_NAMES[Math.min(world - 1, 7)] || 'Unknown';

  // Zone name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('ZONE CLEARED!', Math.floor(GW / 2), Math.floor(GH * 0.2));

  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = '#88ccff';
  ctx.fillText(zoneName + ' ' + world + '-' + stage, Math.floor(GW / 2), Math.floor(GH * 0.32));

  // Tally lines with animation
  if (clearTally) {
    ctx.font = '10px monospace';
    var ty = Math.floor(GH * 0.42);

    if (clearTally.phase >= 1) {
      ctx.fillStyle = '#ffdd44';
      ctx.fillText('Time Bonus: ' + clearTally.timeBonus, Math.floor(GW / 2), ty);
    }
    if (clearTally.phase >= 2) {
      ctx.fillStyle = '#88ff88';
      ctx.fillText('Energy Bonus: ' + clearTally.energyBonus, Math.floor(GW / 2), ty + 16);
    }
    if (clearTally.phase >= 3) {
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('TOTAL: ' + clearTally.totalBonus, Math.floor(GW / 2), ty + 38);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#ffaa44';
      ctx.fillText('Score: ' + score, Math.floor(GW / 2), ty + 56);
    }
  }
}

function drawZoneNameFlash() {
  var alpha = stageTimer < 0.5 ? stageTimer / 0.5 : stageTimer > 2 ? Math.max(0, 1 - (stageTimer - 2) / 0.5) : 1;
  if (alpha <= 0) return;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  var zoneName = ZONE_NAMES[Math.min(world - 1, 7)] || 'Unknown';
  ctx.fillText(zoneName, Math.floor(GW / 2), Math.floor(GH * 0.4));
  ctx.font = '10px monospace';
  ctx.fillStyle = '#88ccff';
  ctx.fillText('World ' + world + '-' + stage, Math.floor(GW / 2), Math.floor(GH * 0.4) + 16);
  ctx.globalAlpha = 1;
}

function drawHUD() {
  var barH = 24;
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, barH);

  ctx.font = 'bold 9px monospace';

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 4, 14);

  // World-Stage with zone abbreviation
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  var zoneAbbr = (ZONE_NAMES[Math.min(world - 1, 7)] || '').split(' ')[0];
  ctx.fillText(zoneAbbr + ' ' + world + '-' + stage, Math.floor(GW / 2), 14);

  // Lives
  ctx.fillStyle = statB.color;
  ctx.textAlign = 'right';
  for (var i = 0; i < lives; i++) {
    ctx.beginPath();
    ctx.arc(GW - 8 - i * 14, 12, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Weapon indicator
  ctx.textAlign = 'left';
  var weaponColors = { axe: '#aaaaaa', boomerang: '#ddaa33', fire: '#ff6600' };
  ctx.fillStyle = weaponColors[pWeapon] || '#fff';
  ctx.fillText(pWeapon.toUpperCase(), 4, barH + 12);

  // Skateboard indicator
  if (pOnSkateboard) {
    ctx.fillStyle = '#cc8833';
    ctx.fillText('BOARD', 70, barH + 12);
  }

  // Energy bar
  var ebX = GW - 140, ebY = 3, ebW = 90, ebH = 8;
  ctx.fillStyle = '#222';
  ctx.fillRect(ebX, ebY, ebW, ebH);

  var energyPct = pEnergy / pMaxEnergy;
  var eColor = energyPct > 0.5 ? '#44ff44' : energyPct > 0.25 ? '#ffaa00' : '#ff3333';
  ctx.fillStyle = eColor;
  ctx.fillRect(ebX, ebY, Math.floor(ebW * energyPct), ebH);

  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(ebX, ebY, ebW, ebH);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE ENERGY', ebX + Math.floor(ebW / 2), ebY + ebH + 9);

  // Boss HP bar (if boss active and on screen)
  if (activeBoss && activeBoss.alive) {
    var bbX = Math.floor(GW / 2 - 60), bbY = barH + 4, bbW = 120, bbH = 6;
    ctx.fillStyle = '#440000';
    ctx.fillRect(bbX, bbY, bbW, bbH);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(bbX, bbY, Math.floor(bbW * activeBoss.hp / activeBoss.maxHp), bbH);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(bbX, bbY, bbW, bbH);
    ctx.fillStyle = '#ff8888';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    var bName = activeBoss.type === 'elder_mushroom' ? 'ELDER MUSHROOM' : 'REACTOR HIVE';
    ctx.fillText(bName, Math.floor(GW / 2), bbY + bbH + 8);
  }

  // Energy warning flash
  if (pEnergy < 25 && frame % 20 < 10) {
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(0, 0, GW, GH);
  }

  // High score
  ctx.fillStyle = '#888';
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('HI: ' + highScore, GW - 4, barH + 12);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
