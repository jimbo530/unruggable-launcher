<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Poop Blade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'JUMP', b: 'THROW', c: 'PICK' } });

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// Shmup, not a wager game -> single-player band 0.8–1.6. SPD->ship speed, STA->shield/HP,
// PWR->shot damage, LCK->powerup drops, SWM unused. This game's helpers read old D&D
// fields, so we synthesize them from the clamped multipliers; every gameplay number
// traces back to a clamped getMults().
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[poop-blade] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[poop-blade] player init failed:', e && e.message); });
}

// Derived stat modifiers (D&D-style: 10 = baseline, each 2 above = +1 tier)
function statMod(val) { return Math.floor((val - 10) / 2); }
const strBonus = statMod(statB.str);   // blade damage
const dexBonus = statMod(statB.dex);   // movement speed + boomerang speed
const conBonus = statMod(statB.con);   // HP and lives
const intBonus = statMod(statB.int);   // score multiplier
const wisBonus = statMod(statB.wis);   // cooldown reduction
const chaBonus = statMod(statB.cha);   // item drop chance

// === CONSTANTS ===
const TILE = 16;
const GRAVITY = 980;
const JUMP_VEL = -310 - dexBonus * 8;                    // DEX: higher jumps
const PLAYER_SPEED = 140 + dexBonus * 12;                // DEX: faster movement
const BOOMERANG_BASE_SPEED = 280 + dexBonus * 15;        // DEX: faster throws
const BOOMERANG_BASE_RANGE = 130 + strBonus * 10;        // STR: longer range
const BOOMERANG_BASE_DAMAGE = 1 + Math.max(0, strBonus); // STR: blade damage
const SECTOR_W = 30;
const SECTOR_H = 20;
const SCREENS_X = 4;
const SCREENS_Y = 3;
const MAP_W = SECTOR_W * SCREENS_X;
const MAP_H = SECTOR_H * SCREENS_Y;
const POWER_SUIT_DURATION = 30 + wisBonus * 3;            // WIS: longer power suit
const SECTOR_TIME = 300 + wisBonus * 15;                  // WIS: more time
const BASE_THROW_CD = Math.max(0.08, 0.25 - wisBonus * 0.02); // WIS: faster cooldown
const DROP_CHANCE = 0.15 + chaBonus * 0.03;               // CHA: better drops
const BASE_LIVES = 3 + Math.max(0, conBonus);             // CON: extra lives
const BASE_HP = 6 + Math.max(0, conBonus);                // CON: more HP
const SCORE_MULT = 1.0 + intBonus * 0.1;                  // INT: score multiplier

// === SECTORS (Tasern-themed zones) ===
const SECTORS = [
  { name: 'POOP HOUSE', color: '#7a444a', hazard: 'methane', bg: '#1a1c2c', desc: 'Where baselings do their business' },
  { name: 'GARDEN PLOTS', color: '#38d973', hazard: 'fertilizer', bg: '#0a1a0a', desc: 'Community gardens run on POOP' },
  { name: 'POWER PLANT', color: '#f4b41b', hazard: 'burnoff', bg: '#1a1a0a', desc: 'Meme tokens burn here forever' },
  { name: 'SPORE TUNNELS', color: '#a855f7', hazard: 'sporegas', bg: '#140a1a', desc: 'Mycelium networks beneath Tasern' },
  { name: 'COMPOST FORGE', color: '#e6482e', hazard: 'heat', bg: '#1a0a0a', desc: 'POOP becomes LP fuel' },
  { name: 'NANNY NEXUS', color: '#3cacd7', hazard: 'all', bg: '#0a1525', desc: 'Heart of the baseling nursery' }
];

// === ENEMY TYPES (Tasern-themed) ===
const ENEMY_TYPES = {
  sporeling:  { w: 14, h: 14, hp: 1, speed: 60, score: 100, fly: true, desc: 'Floating mold spore' },
  myconid:    { w: 14, h: 22, hp: 2, speed: 40, score: 200, fly: false, desc: 'Mold guard' },
  sporecannon:{ w: 16, h: 16, hp: 3, speed: 0, score: 150, fly: false, shoots: true, desc: 'Fungi turret' },
  rollerball: { w: 16, h: 12, hp: 1, speed: 80, score: 100, fly: false, desc: 'Rolling poop ball' },
  treant:     { w: 18, h: 24, hp: 3, speed: 30, score: 300, fly: false, jumps: true, desc: 'Toxic treant' },
  shieldcap:  { w: 16, h: 22, hp: 4, speed: 35, score: 400, fly: false, shielded: true, desc: 'Shieldcap sentry' },
  wisp:       { w: 12, h: 12, hp: 1, speed: 90, score: 150, fly: true, desc: 'Spore wisp scout' },
  reactor:    { w: 20, h: 20, hp: 5, speed: 20, score: 500, fly: false, shoots: true, desc: 'Rogue garden bot' },
  decomposer: { w: 16, h: 16, hp: 2, speed: 50, score: 250, fly: false, desc: 'Compost worm' }
};

// === SCORE POPUPS ===
let scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ff0', life: 1.2, vy: -40 });
}

// === STATE ===
let state = 'title';
let frame = 0;
let score = 0;
let highScore = TAS.score.load('power_blade_hi');
let lives = BASE_LIVES;
let maxHp = BASE_HP;
let hp = BASE_HP;
let sectorIndex = -1;
let sectorTimer = 0;
let sectorCleared = [false, false, false, false, false, false];
let upgrades = { range: 0, power: 0, speed: 0, multi: 0 };
let powerSuitActive = false;
let powerSuitTimer = 0;
let invincTimer = 0;
let deathTimer = 0;
let tutorialShown = false;
let tutorialTimer = 0;

// Player
let px = 0, py = 0, pvx = 0, pvy = 0;
let pFacing = 1;
let pGrounded = false;
let pAnim = 0;
let comboCount = 0;
let comboTimer = 0;

// Boomerangs
let boomerangs = [];
let throwCooldown = 0;

// Map data
let tiles = [];
let enemies = [];
let items = [];
let bullets = [];
let npcs = [];
let keycardFound = false;
let bossDoorX = 0, bossDoorY = 0;
let boss = null;
let bossActive = false;

// Ambient particles for zone atmosphere
let ambientParticles = [];

// Camera
let camX = 0, camY = 0;

// Save/Load
function saveProgress() {
  try {
    localStorage.setItem('power_blade_save', JSON.stringify({
      sectorCleared, upgrades, highScore, maxHp
    }));
  } catch(e) { console.error('Save failed:', e); }
}

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('power_blade_save'));
    if (d) {
      sectorCleared = d.sectorCleared || sectorCleared;
      upgrades = d.upgrades || upgrades;
      highScore = d.highScore || highScore;
      maxHp = d.maxHp || BASE_HP;
    }
  } catch(e) { console.error('Load failed:', e); }
}
loadProgress();

// === MAP GENERATION ===
function generateSector(idx) {
  tiles = [];
  enemies = [];
  items = [];
  bullets = [];
  npcs = [];
  scorePopups = [];
  ambientParticles = [];
  keycardFound = false;
  bossActive = false;
  boss = null;
  sectorTimer = SECTOR_TIME;
  comboCount = 0;
  comboTimer = 0;

  const sector = SECTORS[idx];
  const seed = idx * 7919 + 31;

  // Initialize tiles (0=empty, 1=solid, 2=platform, 3=hazard, 4=boss_door, 5=mycelium, 6=spore_vent)
  for (let y = 0; y < MAP_H; y++) {
    tiles[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      tiles[y][x] = 0;
    }
  }

  // Floor and ceiling
  for (let x = 0; x < MAP_W; x++) {
    tiles[0][x] = 1;
    tiles[MAP_H - 1][x] = 1;
    tiles[MAP_H - 2][x] = 1;
  }

  // Walls on edges
  for (let y = 0; y < MAP_H; y++) {
    tiles[y][0] = 1;
    tiles[y][MAP_W - 1] = 1;
  }

  // Generate rooms with corridors
  const rng = seededRandom(seed);

  // Create floor sections per screen
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      const baseX = sx * SECTOR_W;
      const baseY = sy * SECTOR_H;

      // Floor of each room
      for (let x = baseX; x < baseX + SECTOR_W; x++) {
        if (x > 0 && x < MAP_W - 1) {
          tiles[baseY + SECTOR_H - 1][x] = 1;
          tiles[baseY + SECTOR_H - 2][x] = 1;
        }
      }

      // Ceiling
      for (let x = baseX; x < baseX + SECTOR_W; x++) {
        if (x > 0 && x < MAP_W - 1) {
          tiles[baseY][x] = 1;
          tiles[baseY + 1][x] = 1;
        }
      }

      // Platforms
      const numPlats = 3 + Math.floor(rng() * 4);
      for (let p = 0; p < numPlats; p++) {
        const platX = baseX + 3 + Math.floor(rng() * (SECTOR_W - 8));
        const platY = baseY + 5 + Math.floor(rng() * (SECTOR_H - 10));
        const platLen = 3 + Math.floor(rng() * 5);
        for (let x = platX; x < platX + platLen && x < baseX + SECTOR_W - 1; x++) {
          if (tiles[platY]) tiles[platY][x] = 2;
        }
      }

      // Some solid blocks
      const numBlocks = 2 + Math.floor(rng() * 3);
      for (let b = 0; b < numBlocks; b++) {
        const bx = baseX + 2 + Math.floor(rng() * (SECTOR_W - 6));
        const by = baseY + 4 + Math.floor(rng() * (SECTOR_H - 8));
        const bw = 2 + Math.floor(rng() * 3);
        const bh = 2 + Math.floor(rng() * 2);
        for (let yy = by; yy < by + bh && yy < baseY + SECTOR_H - 2; yy++) {
          for (let xx = bx; xx < bx + bw && xx < baseX + SECTOR_W - 1; xx++) {
            if (tiles[yy]) tiles[yy][xx] = 1;
          }
        }
      }

      // Mycelium patches (decorative ground tiles)
      if (rng() < 0.5) {
        const mx = baseX + 2 + Math.floor(rng() * (SECTOR_W - 6));
        const my = baseY + SECTOR_H - 3;
        const mlen = 3 + Math.floor(rng() * 5);
        for (let x = mx; x < mx + mlen && x < baseX + SECTOR_W - 2; x++) {
          if (tiles[my] && tiles[my][x] === 0) tiles[my][x] = 5;
        }
      }

      // Spore vents (periodic hazard columns)
      if (rng() < 0.3) {
        const vx = baseX + 4 + Math.floor(rng() * (SECTOR_W - 8));
        const vy = baseY + SECTOR_H - 3;
        if (tiles[vy]) tiles[vy][vx] = 6;
      }

      // Hazards
      if (rng() < 0.4) {
        const hx = baseX + 4 + Math.floor(rng() * (SECTOR_W - 10));
        const hy = baseY + SECTOR_H - 3;
        const hlen = 2 + Math.floor(rng() * 4);
        for (let x = hx; x < hx + hlen && x < baseX + SECTOR_W - 2; x++) {
          if (tiles[hy]) tiles[hy][x] = 3;
        }
      }
    }
  }

  // Create corridors between screens (vertical and horizontal openings)
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X - 1; sx++) {
      const wallX = (sx + 1) * SECTOR_W;
      const openY = sy * SECTOR_H + 6 + Math.floor(rng() * (SECTOR_H - 12));
      for (let y = openY; y < openY + 5 && y < MAP_H - 2; y++) {
        tiles[y][wallX] = 0;
        if (wallX - 1 > 0) tiles[y][wallX - 1] = 0;
        if (wallX + 1 < MAP_W) tiles[y][wallX + 1] = 0;
      }
    }
  }

  for (let sy = 0; sy < SCREENS_Y - 1; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      const wallY = (sy + 1) * SECTOR_H;
      const openX = sx * SECTOR_W + 8 + Math.floor(rng() * (SECTOR_W - 16));
      for (let x = openX; x < openX + 4 && x < MAP_W - 1; x++) {
        tiles[wallY][x] = 0;
        tiles[wallY + 1][x] = 0;
        if (wallY - 1 > 0) tiles[wallY - 1][x] = 0;
      }
    }
  }

  // Place player start (bottom-left area)
  px = 3 * TILE;
  py = (SECTOR_H - 4) * TILE;
  pvx = 0;
  pvy = 0;
  pFacing = 1;

  // Place keycard in a random screen (not the start screen or boss screen)
  const kcScreen = 1 + Math.floor(rng() * (SCREENS_X * SCREENS_Y - 2));
  const kcSX = kcScreen % SCREENS_X;
  const kcSY = Math.floor(kcScreen / SCREENS_X);
  items.push({
    type: 'keycard',
    x: (kcSX * SECTOR_W + 5 + Math.floor(rng() * (SECTOR_W - 10))) * TILE,
    y: (kcSY * SECTOR_H + 4 + Math.floor(rng() * 6)) * TILE,
    w: 12, h: 12, collected: false
  });

  // Place boss door (top-right area)
  bossDoorX = (MAP_W - 5) * TILE;
  bossDoorY = 4 * TILE;
  tiles[3][MAP_W - 5] = 4;
  tiles[4][MAP_W - 5] = 4;
  for (let y = 2; y < 7; y++) {
    for (let x = MAP_W - 7; x < MAP_W - 2; x++) {
      if (tiles[y] && tiles[y][x] === 1) tiles[y][x] = 0;
    }
  }

  // Place spore suit (power suit reskin)
  const psScreen = Math.floor(rng() * (SCREENS_X * SCREENS_Y));
  const psSX = psScreen % SCREENS_X;
  const psSY = Math.floor(psScreen / SCREENS_X);
  items.push({
    type: 'powersuit',
    x: (psSX * SECTOR_W + 8 + Math.floor(rng() * (SECTOR_W - 16))) * TILE,
    y: (psSY * SECTOR_H + 5 + Math.floor(rng() * 5)) * TILE,
    w: 16, h: 16, collected: false
  });

  // Place upgrade item
  const upTypes = ['range', 'power', 'speed', 'multi'];
  const upType = upTypes[Math.floor(rng() * upTypes.length)];
  items.push({
    type: 'upgrade_' + upType,
    x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
    y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
    w: 12, h: 12, collected: false
  });

  // Place energy fungi (energy tanks)
  for (let i = 0; i < 2; i++) {
    items.push({
      type: 'energy',
      x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
      y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
      w: 10, h: 14, collected: false
    });
  }

  // Place 1-up (CHA affects chance)
  if (rng() < (0.5 + chaBonus * 0.05)) {
    items.push({
      type: '1up',
      x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
      y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
      w: 12, h: 12, collected: false
    });
  }

  // CHA: extra bonus item drop
  if (chaBonus >= 2 && rng() < DROP_CHANCE) {
    const bonusTypes = ['energy', '1up', 'upgrade_power', 'upgrade_range'];
    items.push({
      type: bonusTypes[Math.floor(rng() * bonusTypes.length)],
      x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
      y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
      w: 12, h: 12, collected: false
    });
  }

  // Place NPC (mycelium guide)
  const npcScreen = 1 + Math.floor(rng() * (SCREENS_X * SCREENS_Y - 2));
  const npcSX = npcScreen % SCREENS_X;
  const npcSY = Math.floor(npcScreen / SCREENS_X);
  npcs.push({
    x: (npcSX * SECTOR_W + 10 + Math.floor(rng() * (SECTOR_W - 20))) * TILE,
    y: (npcSY * SECTOR_H + SECTOR_H - 4) * TILE,
    talked: false,
    hint: getHint(idx, kcSX, kcSY)
  });

  // Place enemies (Tasern-themed)
  const eTypes = Object.keys(ENEMY_TYPES);
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      if (sx === 0 && sy === SCREENS_Y - 1) continue;
      const numEn = 3 + Math.floor(rng() * 4);
      for (let e = 0; e < numEn; e++) {
        const etype = eTypes[Math.floor(rng() * eTypes.length)];
        const edata = ENEMY_TYPES[etype];
        const ex = (sx * SECTOR_W + 3 + Math.floor(rng() * (SECTOR_W - 6))) * TILE;
        const ey = (sy * SECTOR_H + 4 + Math.floor(rng() * (SECTOR_H - 8))) * TILE;
        enemies.push({
          type: etype,
          x: ex, y: ey,
          startX: ex, startY: ey,
          w: edata.w, h: edata.h,
          hp: edata.hp,
          maxHp: edata.hp,
          speed: edata.speed,
          dir: rng() < 0.5 ? -1 : 1,
          fly: edata.fly || false,
          shoots: edata.shoots || false,
          shielded: edata.shielded || false,
          jumps: edata.jumps || false,
          score: edata.score,
          shootTimer: 0,
          jumpTimer: 0,
          anim: Math.floor(rng() * 100),
          alive: true
        });
      }
    }
  }

  // Seed ambient particles for zone atmosphere
  for (let i = 0; i < 30; i++) {
    ambientParticles.push({
      x: rng() * MAP_W * TILE,
      y: rng() * MAP_H * TILE,
      vx: (rng() - 0.5) * 10,
      vy: -5 - rng() * 15,
      size: 1 + rng() * 2,
      alpha: 0.2 + rng() * 0.4,
      life: 2 + rng() * 5
    });
  }

  // Show tutorial on first sector entry
  if (!tutorialShown) {
    tutorialShown = true;
    tutorialTimer = 6;
  }
}

function getHint(sectorIdx, kcSX, kcSY) {
  const dirs = [];
  if (kcSX === 0) dirs.push('west');
  else if (kcSX === SCREENS_X - 1) dirs.push('east');
  else dirs.push('central');
  if (kcSY === 0) dirs.push('upper');
  else if (kcSY === SCREENS_Y - 1) dirs.push('lower');
  else dirs.push('middle');
  const hints = [
    'The garden key smells ripe in the ' + dirs[1] + ' ' + dirs[0] + ' room.',
    'I sense POOP tokens piling in the ' + dirs[1] + ' ' + dirs[0] + ' plot.',
    'The furnace key glows from the ' + dirs[1] + ' ' + dirs[0] + ' chamber.',
    'Spore traces lead to the ' + dirs[1] + ' ' + dirs[0] + ' tunnel.',
    'Compost heat rises from the ' + dirs[1] + ' ' + dirs[0] + ' forge.',
    'All paths converge at the ' + dirs[1] + ' ' + dirs[0] + ' nursery.'
  ];
  return hints[Math.min(sectorIdx, hints.length - 1)];
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// === BOSS GENERATION (Tasern-themed) ===
function spawnBoss(idx) {
  bossActive = true;
  const bossNames = ['POOP LORD', 'GARDEN OVERLORD', 'FURNACE KING', 'SPORE OVERMIND', 'COMPOST TITAN', 'NANNY SUPREME'];
  const bossColors = ['#7a444a', '#38d973', '#f4b41b', '#a855f7', '#e6482e', '#3cacd7'];
  boss = {
    name: bossNames[idx],
    color: bossColors[idx],
    x: bossDoorX + 40,
    y: bossDoorY + 20,
    w: 48, h: 48,
    hp: 12 + idx * 4,
    maxHp: 12 + idx * 4,
    phase: 0,
    timer: 0,
    pattern: idx,
    dir: -1,
    vy: 0,
    shootTimer: 0,
    hitFlash: 0,
    alive: true,
    spawnTimer: 0,
    chargeTimer: 0,
    enraged: false
  };
  // Clear boss arena
  const bx = Math.floor(bossDoorX / TILE);
  const by = Math.floor(bossDoorY / TILE) - 2;
  for (let y = by; y < by + 10 && y < MAP_H - 2; y++) {
    for (let x = bx - 2; x < bx + 8 && x < MAP_W - 1; x++) {
      if (y > 1 && tiles[y]) tiles[y][x] = 0;
    }
  }
  for (let x = bx - 2; x < bx + 8 && x < MAP_W - 1; x++) {
    if (tiles[by + 9]) tiles[by + 9][x] = 1;
  }

  showDialog('WARNING: ' + bossNames[idx] + ' AWAKENED!');
  TAS.fx.shake(6, 0.88);
}

// === TILE COLLISION ===
function isSolid(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return true;
  return tiles[ty][tx] === 1 || tiles[ty][tx] === 4;
}

function isPlatform(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return tiles[ty][tx] === 2;
}

function isHazard(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return tiles[ty][tx] === 3;
}

// === BOOMERANG (Poop Blade) ===
function throwBoomerang(dirX, dirY) {
  if (throwCooldown > 0) return;
  const count = upgrades.multi >= 2 ? 2 : 1;
  const speed = BOOMERANG_BASE_SPEED + upgrades.speed * 40;
  const range = BOOMERANG_BASE_RANGE + upgrades.range * 30;

  for (let i = 0; i < count; i++) {
    const spreadAngle = count > 1 ? (i === 0 ? -0.15 : 0.15) : 0;
    const angle = Math.atan2(dirY, dirX) + spreadAngle;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);

    boomerangs.push({
      x: px + 7,
      y: py + 8,
      vx: dx * speed,
      vy: dy * speed,
      returning: false,
      dist: 0,
      maxDist: range,
      damage: BOOMERANG_BASE_DAMAGE + upgrades.power, // STR wired in
      spin: 0,
      trail: [],
      alive: true
    });
  }
  throwCooldown = BASE_THROW_CD; // WIS-adjusted cooldown
  TAS.audio.playTone(600, 0.08, 'sawtooth', 0.08, 900);
}

function throwLaser(dirX, dirY) {
  const speed = 400;
  const angle = Math.atan2(dirY, dirX);
  bullets.push({
    x: px + 7, y: py + 8,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    friendly: true,
    damage: 3 + Math.max(0, strBonus), // STR boosts laser too
    life: 0.5,
    w: 8, h: 3,
    color: '#ff0'
  });
  throwCooldown = Math.max(0.06, 0.15 - wisBonus * 0.01); // WIS: faster laser
  TAS.audio.playTone(200, 0.1, 'square', 0.06, 50);
}

// === GAME START/RESTART ===
function startGame() {
  state = 'map';
  score = 0;
  lives = BASE_LIVES;  // CON-adjusted lives
  maxHp = BASE_HP;     // CON-adjusted HP
  hp = maxHp;
  powerSuitActive = false;
  powerSuitTimer = 0;
  invincTimer = 0;
  comboCount = 0;
  comboTimer = 0;
}

function enterSector(idx) {
  sectorIndex = idx;
  state = 'playing';
  generateSector(idx);
  hp = maxHp;
  powerSuitActive = false;
  boomerangs = [];
  bullets = [];
  throwCooldown = 0;
  deathTimer = 0;
}

// === NPC DIALOG ===
let dialogText = '';
let dialogTimer = 0;

function showDialog(text) {
  dialogText = text;
  dialogTimer = 3;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (dialogTimer > 0) dialogTimer -= dt;
  if (tutorialTimer > 0) tutorialTimer -= dt;

  // Update score popups
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) scorePopups.splice(i, 1);
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) comboCount = 0;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 2 === 0 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'map';
    }
    return;
  }

  if (state === 'map') {
    updateMap(dt);
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
  }
}

// === MAP SCREEN ===
let mapCursor = 0;

function updateMap(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 5) % 6;
  }
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 1) % 6;
  }
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 5) % 6;
  }
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 1) % 6;
  }
  if (keys['Space'] || keys['Enter'] || keys['KeyZ'] || tch.a) {
    if (frame % 10 === 0) {
      TAS.audio.ensureAudio();
      enterSector(mapCursor);
    }
  }
}

// === PLAYING STATE ===
function updatePlaying(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Timer
  sectorTimer -= dt;
  if (sectorTimer <= 0) {
    playerDie();
    return;
  }

  // Death animation
  if (deathTimer > 0) {
    deathTimer -= dt;
    pvy += GRAVITY * dt;
    py += pvy * dt;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        if (score > highScore) {
          highScore = score;
          TAS.score.save('power_blade_hi', highScore);
        }
        state = 'gameOver';
      } else {
        px = 3 * TILE;
        py = ((SCREENS_Y - 1) * SECTOR_H + SECTOR_H - 4) * TILE;
        pvy = 0;
        hp = maxHp;
        invincTimer = 2;
      }
    }
    return;
  }

  // Invincibility
  if (invincTimer > 0) invincTimer -= dt;

  // Power suit timer
  if (powerSuitActive) {
    powerSuitTimer -= dt;
    if (powerSuitTimer <= 0) {
      powerSuitActive = false;
    }
  }

  // Throw cooldown
  if (throwCooldown > 0) throwCooldown -= dt;

  // Update ambient particles
  for (let i = ambientParticles.length - 1; i >= 0; i--) {
    const ap = ambientParticles[i];
    ap.x += ap.vx * dt;
    ap.y += ap.vy * dt;
    ap.life -= dt;
    if (ap.life <= 0) {
      ap.x = camX + Math.random() * GW;
      ap.y = camY + GH + 10;
      ap.vy = -5 - Math.random() * 15;
      ap.vx = (Math.random() - 0.5) * 10;
      ap.life = 2 + Math.random() * 5;
      ap.alpha = 0.2 + Math.random() * 0.4;
    }
  }

  // Spore vent hazard check
  const ventCheckX = Math.floor((px + 6) / TILE);
  const ventCheckY = Math.floor((py + 20) / TILE);
  if (ventCheckY >= 0 && ventCheckY < MAP_H && ventCheckX >= 0 && ventCheckX < MAP_W) {
    if (tiles[ventCheckY][ventCheckX] === 6 && Math.floor(frame / 30) % 3 === 0) {
      // Vent active every 3rd cycle
      if (invincTimer <= 0 && deathTimer <= 0) {
        playerHit(1);
        TAS.particles.spawn(ventCheckX * TILE + 8, ventCheckY * TILE, '#44ff44', 6, 2, { gravity: -1 });
      }
    }
  }

  // === Player Movement ===
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) { moveX = -1; pFacing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) { moveX = 1; pFacing = 1; }
  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) moveY = -1;
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) moveY = 1;

  pvx = moveX * PLAYER_SPEED;

  // Jump
  if ((keys['Space'] || keys['KeyZ'] || tch.a) && pGrounded) {
    pvy = JUMP_VEL;
    pGrounded = false;
    TAS.audio.playTone(280, 0.06, 'square', 0.05, 400);
  }

  // Throw / Shoot
  if (keys['KeyX'] || keys['ShiftLeft'] || tch.b) {
    let dirX = pFacing, dirY = 0;
    if (moveX !== 0 || moveY !== 0) {
      dirX = moveX || 0;
      dirY = moveY;
    }
    if (dirX === 0 && dirY === 0) dirX = pFacing;
    const len = Math.sqrt(dirX * dirX + dirY * dirY);
    if (len > 0) { dirX /= len; dirY /= len; }

    if (powerSuitActive) {
      throwLaser(dirX, dirY);
    } else {
      throwBoomerang(dirX, dirY);
    }
  }

  // Apply gravity
  pvy += GRAVITY * dt;
  if (pvy > 500) pvy = 500;

  // Move X
  px += pvx * dt;
  const pwid = 12, phgt = 20;
  const leftTile = Math.floor(px / TILE);
  const rightTile = Math.floor((px + pwid) / TILE);
  const topTile = Math.floor(py / TILE);
  const botTile = Math.floor((py + phgt - 1) / TILE);

  if (pvx < 0) {
    if (isSolid(leftTile, topTile) || isSolid(leftTile, botTile)) {
      px = (leftTile + 1) * TILE;
      pvx = 0;
    }
  } else if (pvx > 0) {
    if (isSolid(rightTile, topTile) || isSolid(rightTile, botTile)) {
      px = rightTile * TILE - pwid - 1;
      pvx = 0;
    }
  }

  // Move Y
  py += pvy * dt;
  pGrounded = false;

  const newTop = Math.floor(py / TILE);
  const newBot = Math.floor((py + phgt) / TILE);
  const newLeft = Math.floor(px / TILE);
  const newRight = Math.floor((px + pwid) / TILE);

  if (pvy > 0) {
    if (isSolid(newLeft, newBot) || isSolid(newRight, newBot) ||
        (isPlatform(newLeft, newBot) || isPlatform(newRight, newBot))) {
      py = newBot * TILE - phgt - 1;
      pvy = 0;
      pGrounded = true;
    }
  } else if (pvy < 0) {
    if (isSolid(newLeft, newTop) || isSolid(newRight, newTop)) {
      py = (newTop + 1) * TILE;
      pvy = 0;
    }
  }

  // Hazard check
  const hazLeft = Math.floor((px + 2) / TILE);
  const hazRight = Math.floor((px + pwid - 2) / TILE);
  const hazBot = Math.floor((py + phgt) / TILE);
  if (isHazard(hazLeft, hazBot) || isHazard(hazRight, hazBot)) {
    playerHit(2);
  }

  // Clamp to map
  if (px < TILE) px = TILE;
  if (px > (MAP_W - 2) * TILE) px = (MAP_W - 2) * TILE;
  if (py < TILE) py = TILE;
  if (py > (MAP_H - 2) * TILE) {
    playerDie();
    return;
  }

  pAnim += dt * (Math.abs(pvx) > 10 ? 8 : 2);

  // === Camera ===
  const targetCamX = px - GW / 2 + 8;
  const targetCamY = py - GH / 2 + 10;
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;
  camX = TAS.math.clamp(camX, 0, MAP_W * TILE - GW);
  camY = TAS.math.clamp(camY, 0, MAP_H * TILE - GH);

  // === Update boomerangs ===
  for (let i = boomerangs.length - 1; i >= 0; i--) {
    const b = boomerangs[i];
    b.spin += dt * 15;

    if (!b.returning) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.dist += Math.sqrt(b.vx * b.vx + b.vy * b.vy) * dt;

      if (b.dist >= b.maxDist) {
        b.returning = true;
      }
      const btx = Math.floor(b.x / TILE);
      const bty = Math.floor(b.y / TILE);
      if (isSolid(btx, bty)) b.returning = true;
    }

    if (b.returning) {
      const dx = (px + 7) - b.x;
      const dy = (py + 10) - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 10) {
        boomerangs.splice(i, 1);
        continue;
      }
      const retSpeed = (BOOMERANG_BASE_SPEED + upgrades.speed * 60) * 1.3;
      b.vx = (dx / dist) * retSpeed;
      b.vy = (dy / dist) * retSpeed;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }

    // Trail
    b.trail.push({ x: b.x, y: b.y, life: 1 });
    if (b.trail.length > 8) b.trail.shift();
    for (let t = b.trail.length - 1; t >= 0; t--) {
      b.trail[t].life -= dt * 4;
      if (b.trail[t].life <= 0) b.trail.splice(t, 1);
    }

    if (b.dist > b.maxDist * 4) {
      boomerangs.splice(i, 1);
    }
  }

  // === Update bullets ===
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    const btx = Math.floor(b.x / TILE);
    const bty = Math.floor(b.y / TILE);
    if (isSolid(btx, bty)) { bullets.splice(i, 1); continue; }

    if (b.friendly) {
      for (const en of enemies) {
        if (!en.alive) continue;
        if (TAS.hit.rectOverlap(b.x - 2, b.y - 2, b.w || 4, b.h || 4, en.x, en.y, en.w, en.h)) {
          enemyHit(en, b.damage);
          bullets.splice(i, 1);
          break;
        }
      }
    } else {
      if (TAS.hit.rectOverlap(b.x - 2, b.y - 2, 4, 4, px, py, 12, 20)) {
        playerHit(1);
        bullets.splice(i, 1);
      }
    }
  }

  // === Boomerang-enemy collision ===
  for (const b of boomerangs) {
    if (!b.alive) continue;
    for (const en of enemies) {
      if (!en.alive) continue;
      if (TAS.hit.rectOverlap(b.x - 6, b.y - 6, 12, 12, en.x, en.y, en.w, en.h)) {
        if (en.shielded) {
          const hitFromBehind = (b.vx > 0 && en.dir < 0) || (b.vx < 0 && en.dir > 0);
          if (!hitFromBehind) continue;
        }
        enemyHit(en, b.damage);
        if (!b.returning) {
          TAS.particles.spawn(b.x, b.y, '#ff0', 4, 2);
        }
      }
    }
    // Boss collision
    if (boss && boss.alive) {
      if (TAS.hit.rectOverlap(b.x - 6, b.y - 6, 12, 12, boss.x, boss.y, boss.w, boss.h)) {
        bossHit(b.damage);
      }
    }
  }

  // === Update enemies ===
  for (const en of enemies) {
    if (!en.alive) continue;
    en.anim += dt * 4;

    const dx = en.x - camX - GW / 2;
    const dy = en.y - camY - GH / 2;
    if (Math.abs(dx) > GW && Math.abs(dy) > GH) continue;

    if (en.fly) {
      en.x += en.speed * en.dir * dt;
      en.y += Math.sin(en.anim) * 30 * dt;
      if (Math.abs(en.x - en.startX) > 80) en.dir *= -1;
    } else if (en.speed > 0) {
      en.x += en.speed * en.dir * dt;
      const checkX = en.dir > 0 ? Math.floor((en.x + en.w + 2) / TILE) : Math.floor((en.x - 2) / TILE);
      const checkY = Math.floor((en.y + en.h) / TILE);
      if (isSolid(checkX, Math.floor(en.y / TILE)) || !isSolid(checkX, checkY + 1)) {
        en.dir *= -1;
      }
    }

    if (en.jumps) {
      en.jumpTimer += dt;
      if (en.jumpTimer > 2) {
        en.jumpTimer = 0;
      }
    }

    if (en.shoots) {
      en.shootTimer += dt;
      if (en.shootTimer > 1.5) {
        en.shootTimer = 0;
        const angle = Math.atan2(py - en.y, px - en.x);
        const bulletColor = en.type === 'reactor' ? '#ffaa22' : (en.type === 'sporecannon' ? '#44ff44' : '#f44');
        bullets.push({
          x: en.x + en.w / 2,
          y: en.y + en.h / 2,
          vx: Math.cos(angle) * 120,
          vy: Math.sin(angle) * 120,
          friendly: false,
          damage: 1,
          life: 3,
          w: 4, h: 4,
          color: bulletColor
        });
      }
    }

    // Enemy touches player
    if (invincTimer <= 0 && deathTimer <= 0) {
      if (TAS.hit.rectOverlap(px, py, 12, 20, en.x, en.y, en.w, en.h)) {
        playerHit(1);
      }
    }
  }

  // === Boss update ===
  if (boss && boss.alive) {
    boss.timer += dt;
    boss.hitFlash = Math.max(0, boss.hitFlash - dt * 4);
    boss.spawnTimer += dt;
    boss.chargeTimer += dt;

    // Enrage at 25% HP
    if (!boss.enraged && boss.hp <= boss.maxHp * 0.25) {
      boss.enraged = true;
      TAS.fx.flash('#f00', 0.6);
      TAS.fx.shake(8, 0.85);
      showDialog(boss.name + ' IS ENRAGED!');
    }

    const speedMult = boss.enraged ? 1.5 : 1.0;

    // Boss patterns
    switch (boss.pattern % 3) {
      case 0: // Horizontal movement + shooting
        boss.x += 60 * speedMult * boss.dir * dt;
        if (boss.x < bossDoorX - 30 || boss.x > bossDoorX + 80) boss.dir *= -1;
        boss.shootTimer += dt;
        if (boss.shootTimer > (boss.enraged ? 0.4 : 0.8)) {
          boss.shootTimer = 0;
          const angle = Math.atan2(py - boss.y, px - boss.x);
          bullets.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
            vx: Math.cos(angle) * 150 * speedMult, vy: Math.sin(angle) * 150 * speedMult,
            friendly: false, damage: 2, life: 3, w: 6, h: 6, color: boss.color
          });
          TAS.audio.playTone(100, 0.15, 'sawtooth', 0.04);
        }
        // Spawn minions periodically
        if (boss.spawnTimer > 8 && enemies.filter(function(e) { return e.alive; }).length < 8) {
          boss.spawnTimer = 0;
          enemies.push({
            type: 'sporeling', x: boss.x, y: boss.y - 20,
            startX: boss.x, startY: boss.y - 20,
            w: 14, h: 14, hp: 1, maxHp: 1, speed: 60, dir: -1,
            fly: true, shoots: false, shielded: false, jumps: false,
            score: 100, shootTimer: 0, jumpTimer: 0, anim: 0, alive: true
          });
        }
        break;
      case 1: // Jump + slam
        boss.vy += 400 * dt;
        boss.y += boss.vy * dt;
        if (boss.y > bossDoorY + 60) {
          boss.y = bossDoorY + 60;
          boss.vy = 0;
          if (boss.timer > (boss.enraged ? 1.2 : 2)) {
            boss.vy = -250 * speedMult;
            boss.timer = 0;
            TAS.fx.shake(4, 0.85);
            for (let a = 0; a < (boss.enraged ? 6 : 4); a++) {
              bullets.push({
                x: boss.x + boss.w / 2, y: boss.y + boss.h,
                vx: (a - (boss.enraged ? 2.5 : 1.5)) * 80, vy: -60,
                friendly: false, damage: 1, life: 1.5, w: 5, h: 5, color: '#f60'
              });
            }
          }
        }
        break;
      case 2: // Spiral shooting + charge attacks
        boss.x += Math.sin(boss.timer * 2) * 50 * speedMult * dt;
        boss.y += Math.cos(boss.timer * 1.5) * 30 * speedMult * dt;
        boss.y = TAS.math.clamp(boss.y, bossDoorY - 20, bossDoorY + 70);
        boss.shootTimer += dt;
        if (boss.shootTimer > (boss.enraged ? 0.2 : 0.4)) {
          boss.shootTimer = 0;
          const angle = boss.timer * 3;
          bullets.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
            vx: Math.cos(angle) * 100, vy: Math.sin(angle) * 100,
            friendly: false, damage: 1, life: 2, w: 5, h: 5, color: boss.color
          });
        }
        // Charge attack
        if (boss.chargeTimer > 5) {
          boss.chargeTimer = 0;
          const chDir = px > boss.x ? 1 : -1;
          boss.x += chDir * 60;
          TAS.fx.shake(3, 0.9);
          TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, boss.color, 10, 3);
        }
        break;
    }

    // Change pattern at half HP
    if (boss.hp <= boss.maxHp / 2 && boss.phase === 0) {
      boss.phase = 1;
      boss.pattern = (boss.pattern + 1) % 3;
      TAS.fx.flash('#f00', 0.4);
      showDialog('PHASE 2!');
    }

    // Boss touches player
    if (invincTimer <= 0 && deathTimer <= 0) {
      if (TAS.hit.rectOverlap(px, py, 12, 20, boss.x, boss.y, boss.w, boss.h)) {
        playerHit(2);
      }
    }
  }

  // === Item collection ===
  for (const item of items) {
    if (item.collected) continue;
    if (TAS.hit.rectOverlap(px, py, 12, 20, item.x, item.y, item.w, item.h)) {
      item.collected = true;
      collectItem(item);
    }
  }

  // === NPC interaction ===
  for (const npc of npcs) {
    if (npc.talked) continue;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 32, 40, npc.x, npc.y, 14, 20)) {
      if (keys['ArrowUp'] || keys['KeyW'] || tch.up) {
        npc.talked = true;
        showDialog(npc.hint);
        TAS.audio.playTone(440, 0.05, 'sine', 0.06);
        TAS.audio.playTone(550, 0.05, 'sine', 0.06);
      }
    }
  }

  // === Boss door check ===
  if (keycardFound && !bossActive) {
    if (TAS.hit.rectOverlap(px, py, 12, 20, bossDoorX - 8, bossDoorY - 8, 32, 40)) {
      spawnBoss(sectorIndex);
      TAS.audio.playMelody([[200, 0.15], [150, 0.15], [100, 0.3]], 200);
      TAS.fx.flash('#f00', 0.3);
    }
  }

  // === Boss defeated check ===
  if (boss && !boss.alive) {
    sectorCleared[sectorIndex] = true;
    const bossScore = Math.round(2000 * SCORE_MULT);  // INT: score multiplier
    score += bossScore;
    spawnScorePopup(boss.x + boss.w / 2, boss.y, '+' + bossScore, '#ffdd44');
    saveProgress();
    TAS.fx.flash('#fff', 0.5);
    TAS.fx.shake(8, 0.9);
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.3]], 100);

    if (sectorCleared.every(Boolean)) {
      state = 'victory';
    } else {
      state = 'map';
    }
  }
}

function collectItem(item) {
  TAS.audio.playTone(880, 0.08, 'sine', 0.07);
  TAS.particles.spawn(item.x, item.y, '#ff0', 8, 3);

  if (item.type === 'keycard') {
    keycardFound = true;
    showDialog('GARDEN KEY ACQUIRED! Find the boss chamber!');
    spawnScorePopup(item.x, item.y, 'GARDEN KEY!', '#f4b41b');
    TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.15]], 100);
  } else if (item.type === 'powersuit') {
    powerSuitActive = true;
    powerSuitTimer = POWER_SUIT_DURATION;  // WIS-extended duration
    hp = maxHp;
    showDialog('MYCELIUM ARMOR ACTIVATED! ' + Math.ceil(POWER_SUIT_DURATION) + ' seconds!');
    spawnScorePopup(item.x, item.y, 'MYCELIUM ARMOR!', '#3cacd7');
    TAS.fx.flash('#0ff', 0.3);
    TAS.audio.playMelody([[300, 0.08], [600, 0.08], [900, 0.08], [1200, 0.15]], 80);
  } else if (item.type === 'energy') {
    maxHp = Math.min(maxHp + 1, 10 + conBonus);  // CON: higher max cap
    hp = maxHp;
    showDialog('GARDEN SEED! +1 MAX HP!');
    spawnScorePopup(item.x, item.y, 'SEED +HP', '#38d973');
  } else if (item.type === '1up') {
    lives++;
    showDialog('SPORE GEM! +1 LIFE!');
    spawnScorePopup(item.x, item.y, 'SPORE GEM!', '#a855f7');
    TAS.audio.playMelody([[523, 0.06], [659, 0.06], [784, 0.06], [1047, 0.12]], 70);
  } else if (item.type.startsWith('upgrade_')) {
    const stat = item.type.split('_')[1];
    upgrades[stat] = Math.min(upgrades[stat] + 1, 3);
    showDialog(stat.toUpperCase() + ' UPGRADED!');
    spawnScorePopup(item.x, item.y, stat.toUpperCase() + ' UP!', '#fa0');
    saveProgress();
    TAS.audio.playMelody([[400, 0.06], [500, 0.06], [600, 0.06], [800, 0.12]], 80);
  }
}

function playerHit(damage) {
  if (invincTimer > 0 || deathTimer > 0) return;
  if (powerSuitActive) damage = Math.max(1, damage - 1);
  // CON reduces damage taken slightly at high levels
  if (conBonus >= 3) damage = Math.max(1, damage - 1);
  hp -= damage;
  invincTimer = 1.5;
  TAS.fx.flash('#f00', 0.25);
  TAS.fx.shake(4, 0.88);
  TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 50);

  if (hp <= 0) {
    playerDie();
  }
}

function playerDie() {
  lives--;
  deathTimer = 1.5;
  pvy = -200;
  TAS.audio.playMelody([[400, 0.1], [300, 0.1], [200, 0.1], [100, 0.3]], 120);
  TAS.particles.spawn(px + 6, py + 10, '#f44', 20, 4, { gravity: 2 });
  // Death spore burst
  TAS.particles.spawn(px + 6, py + 10, '#44ff44', 10, 3, { gravity: -0.5 });
}

function enemyHit(en, damage) {
  en.hp -= damage;
  TAS.particles.spawn(en.x + en.w / 2, en.y + en.h / 2, '#ff0', 5, 2);
  TAS.audio.playTone(300, 0.05, 'square', 0.05, 100);

  if (en.hp <= 0) {
    en.alive = false;
    // Combo system
    comboCount++;
    comboTimer = 2;
    const comboMult = Math.min(comboCount, 5);
    const baseScore = Math.round(en.score * SCORE_MULT);  // INT: score multiplier
    const finalScore = baseScore * comboMult;
    score += finalScore;

    const comboText = comboCount > 1 ? '+' + finalScore + ' x' + comboMult : '+' + finalScore;
    const comboColor = comboCount >= 5 ? '#ff44ff' : (comboCount >= 3 ? '#ffaa00' : '#ff0');
    spawnScorePopup(en.x + en.w / 2, en.y, comboText, comboColor);

    TAS.particles.spawn(en.x + en.w / 2, en.y + en.h / 2, '#f80', 12, 3, { gravity: 1 });
    // Spore death burst
    TAS.particles.spawn(en.x + en.w / 2, en.y + en.h / 2, '#44cc44', 6, 2, { gravity: -0.5 });
    TAS.audio.playTone(200, 0.12, 'sawtooth', 0.06, 50);

    // CHA: chance to drop health on kill
    if (Math.random() < DROP_CHANCE * 0.5) {
      hp = Math.min(hp + 1, maxHp);
      spawnScorePopup(en.x + en.w / 2, en.y - 15, '+1 HP', '#4f4');
    }
  }
}

function bossHit(damage) {
  boss.hp -= damage;
  boss.hitFlash = 1;
  TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff0', 8, 3);
  TAS.fx.shake(2, 0.9);
  TAS.audio.playTone(250, 0.08, 'square', 0.06, 100);

  const dmgScore = Math.round(50 * SCORE_MULT);  // INT: score on boss hit
  score += dmgScore;
  spawnScorePopup(boss.x + boss.w / 2, boss.y - 10, '+' + dmgScore, '#ff0');

  if (boss.hp <= 0) {
    boss.alive = false;
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f80', 30, 5, { gravity: 1.5 });
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff0', 20, 4);
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#44ff44', 15, 4, { gravity: -1 });
    TAS.fx.shake(10, 0.85);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Sectors: ' + sectorCleared.filter(Boolean).length + '/6' });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'map') {
    drawMap();
    return;
  }

  if (state === 'playing') {
    drawPlaying();
  }
}

// === DRAW MAP ===
function drawMap() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Background mycelium connections between sectors
  ctx.strokeStyle = '#2a1a2c';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const col1 = i % 3, row1 = Math.floor(i / 3);
    const col2 = (i + 1) % 3, row2 = Math.floor((i + 1) / 3);
    ctx.beginPath();
    ctx.moveTo(120 + col1 * 140, 105 + row1 * 110);
    ctx.lineTo(120 + col2 * 140, 105 + row2 * 110);
    ctx.stroke();
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SELECT SECTOR', GW / 2, 30);

  // Baseling info bar (arcade stats)
  var _stm = (window.BaselingPlayer && BaselingPlayer.getStats) ? BaselingPlayer.getStats() : { speed: 10, stamina: 10, power: 10, luck: 10, swim: 10 };
  var _selm = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = statB.color;
  ctx.font = '9px monospace';
  ctx.fillText((_selm ? _selm.charName : statB.name) + ' - PWR:' + _stm.power + ' SPD:' + _stm.speed + ' STA:' + _stm.stamina + ' LCK:' + _stm.luck, GW / 2, 48);

  // Draw sectors as a grid (2 rows of 3)
  for (let i = 0; i < 6; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const bx = 60 + col * 140;
    const by = 60 + row * 110;
    const bw = 120, bh = 90;

    const selected = i === mapCursor;
    const cleared = sectorCleared[i];

    // Box
    ctx.fillStyle = selected ? SECTORS[i].color + '44' : '#1a1a2a';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = selected ? SECTORS[i].color : (cleared ? '#4a4' : '#444');
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Mycelium tendrils in box
    if (selected) {
      ctx.strokeStyle = SECTORS[i].color + '30';
      ctx.lineWidth = 0.5;
      for (let t = 0; t < 3; t++) {
        ctx.beginPath();
        ctx.moveTo(bx + 10 + t * 35, by + bh);
        ctx.bezierCurveTo(bx + 20 + t * 30, by + bh * 0.6, bx + 40 + t * 20, by + bh * 0.4, bx + bw / 2, by + 30);
        ctx.stroke();
      }
    }

    // Name
    ctx.fillStyle = SECTORS[i].color;
    ctx.font = 'bold 9px monospace';
    ctx.fillText(SECTORS[i].name, bx + bw / 2, by + 18);

    // Description
    ctx.fillStyle = '#555';
    ctx.font = '7px monospace';
    ctx.fillText(SECTORS[i].desc, bx + bw / 2, by + 32);

    // Status
    if (cleared) {
      ctx.fillStyle = '#4f4';
      ctx.font = '10px monospace';
      ctx.fillText('CLEARED', bx + bw / 2, by + 55);
    } else {
      ctx.fillStyle = '#666';
      ctx.font = '9px monospace';
      ctx.fillText('SECTOR ' + (i + 1), bx + bw / 2, by + 55);
    }

    // Hazard type
    ctx.fillStyle = '#444';
    ctx.font = '7px monospace';
    ctx.fillText('Hazard: ' + SECTORS[i].hazard, bx + bw / 2, by + 72);

    // Selector arrow
    if (selected) {
      const bounce = Math.sin(frame * 0.1) * 3;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(bx + bw / 2, by - 8 + bounce);
      ctx.lineTo(bx + bw / 2 - 6, by - 16 + bounce);
      ctx.lineTo(bx + bw / 2 + 6, by - 16 + bounce);
      ctx.fill();
    }
  }

  // Upgrades display
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('RNG:' + upgrades.range + ' PWR:' + upgrades.power + ' SPD:' + upgrades.speed + ' MLT:' + upgrades.multi, 10, GH - 10);

  ctx.textAlign = 'right';
  ctx.fillText('Lives: ' + lives + '  HP: ' + hp + '/' + maxHp, GW - 10, GH - 10);

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW PLAYING ===
function drawPlaying() {
  const sector = SECTORS[sectorIndex];
  ctx.fillStyle = sector.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Zone-specific background effects
  drawZoneBackground(sectorIndex);

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  // Draw ambient particles (zone atmosphere)
  for (const ap of ambientParticles) {
    if (ap.x < camX - 20 || ap.x > camX + GW + 20) continue;
    if (ap.y < camY - 20 || ap.y > camY + GH + 20) continue;
    ctx.globalAlpha = ap.alpha * 0.6;
    ctx.fillStyle = sector.color;
    ctx.beginPath();
    ctx.arc(ap.x, ap.y, ap.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw tiles
  const startX = Math.floor(camX / TILE);
  const startY = Math.floor(camY / TILE);
  const endX = Math.min(startX + Math.ceil(GW / TILE) + 2, MAP_W);
  const endY = Math.min(startY + Math.ceil(GH / TILE) + 2, MAP_H);

  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      if (y < 0 || y >= MAP_H || x < 0 || x >= MAP_W) continue;
      const t = tiles[y][x];
      if (t === 0) continue;

      const tx = x * TILE;
      const ty = y * TILE;

      if (t === 1) {
        // Solid tile - mycelial tech look
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.strokeStyle = sector.color + '40';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        if ((x + y) % 4 === 0) {
          ctx.fillStyle = sector.color + '30';
          ctx.fillRect(tx + 2, ty + TILE / 2 - 1, TILE - 4, 2);
        }
        // Mycelium veins on some tiles
        if ((x * 7 + y * 13) % 11 === 0) {
          ctx.strokeStyle = sector.color + '20';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(tx, ty + TILE / 2);
          ctx.bezierCurveTo(tx + TILE * 0.3, ty + TILE * 0.2, tx + TILE * 0.7, ty + TILE * 0.8, tx + TILE, ty + TILE / 2);
          ctx.stroke();
        }
      } else if (t === 2) {
        // Platform - fungal shelf
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(tx, ty, TILE, 4);
        ctx.fillStyle = sector.color + '60';
        ctx.fillRect(tx, ty, TILE, 2);
        // Mushroom dots
        if (x % 3 === 0) {
          ctx.fillStyle = sector.color + '40';
          ctx.beginPath();
          ctx.arc(tx + 8, ty - 2, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (t === 3) {
        // Hazard - bubbling mycelial acid
        ctx.fillStyle = '#220a00';
        ctx.fillRect(tx, ty, TILE, TILE);
        const hFlicker = Math.sin(frame * 0.2 + x) * 0.3 + 0.7;
        ctx.globalAlpha = hFlicker;
        ctx.fillStyle = sectorIndex === 0 ? '#2244ff' : (sectorIndex === 2 ? '#22ff44' : '#ff2200');
        ctx.fillRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
        // Bubble effect
        const bubbleY = ty + 2 + Math.abs(Math.sin(frame * 0.1 + x * 0.5)) * 6;
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(tx + 8, bubbleY, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      } else if (t === 4) {
        // Boss door - pulsing spore gate
        ctx.fillStyle = keycardFound ? '#332200' : '#222';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.strokeStyle = keycardFound ? '#ff0' : '#444';
        ctx.lineWidth = 1;
        ctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        if (keycardFound) {
          const doorPulse = Math.sin(frame * 0.08) * 0.3 + 0.7;
          ctx.globalAlpha = doorPulse;
          ctx.fillStyle = '#ff0';
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', tx + TILE / 2, ty + TILE / 2 + 3);
          ctx.globalAlpha = 1;
        }
      } else if (t === 5) {
        // Mycelium ground patch
        ctx.fillStyle = sector.color + '15';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = sector.color + '30';
        for (let dot = 0; dot < 3; dot++) {
          const dx2 = 3 + (x * 3 + dot * 5) % (TILE - 6);
          const dy2 = 3 + (y * 7 + dot * 3) % (TILE - 6);
          ctx.beginPath();
          ctx.arc(tx + dx2, ty + dy2, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (t === 6) {
        // Spore vent
        ctx.fillStyle = '#333';
        ctx.fillRect(tx + 4, ty + 8, 8, 8);
        ctx.fillStyle = '#555';
        ctx.fillRect(tx + 2, ty + 6, 12, 4);
        // Active vent particles
        if (Math.floor(frame / 30) % 3 === 0) {
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = '#44ff44';
          for (let v = 0; v < 3; v++) {
            const vy2 = ty - 4 - v * 6 - (frame % 10);
            ctx.beginPath();
            ctx.arc(tx + 6 + Math.sin(frame * 0.2 + v) * 3, vy2, 2, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      }
    }
  }

  // Draw items
  for (const item of items) {
    if (item.collected) continue;
    const ix = item.x, iy = item.y + Math.sin(frame * 0.05 + item.x) * 3;

    if (item.type === 'keycard') {
      // Spore keycard - glowing
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ix, iy, 12, 8);
      ctx.fillStyle = '#aa0';
      ctx.fillRect(ix + 8, iy + 2, 4, 4);
      // Glow
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(ix + 6, iy + 4, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (item.type === 'powersuit') {
      // Spore suit
      ctx.fillStyle = '#0ff';
      ctx.fillRect(ix + 2, iy, 12, 16);
      ctx.fillStyle = '#088';
      ctx.fillRect(ix + 4, iy + 2, 8, 4);
      ctx.fillStyle = '#0ff';
      ctx.fillRect(ix, iy + 4, 16, 8);
      // Spore particles
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#44ffaa';
      ctx.beginPath();
      ctx.arc(ix + 8, iy + 8, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (item.type === 'energy') {
      // Energy fungus
      ctx.fillStyle = '#4f4';
      ctx.fillRect(ix + 3, iy + 4, 6, 10);
      ctx.fillStyle = '#2a2';
      ctx.fillRect(ix + 4, iy + 6, 4, 8);
      // Cap
      ctx.fillStyle = '#8f8';
      ctx.beginPath();
      ctx.arc(ix + 6, iy + 4, 5, Math.PI, 0);
      ctx.fill();
    } else if (item.type === '1up') {
      ctx.fillStyle = '#f4f';
      ctx.beginPath();
      ctx.arc(ix + 6, iy + 6, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('1', ix + 6, iy + 9);
    } else if (item.type.startsWith('upgrade_')) {
      ctx.fillStyle = '#fa0';
      ctx.fillRect(ix, iy, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      const letter = item.type.split('_')[1][0].toUpperCase();
      ctx.fillText(letter, ix + 6, iy + 9);
    }
  }

  // Draw NPCs (mycelium guides)
  for (const npc of npcs) {
    // Mushroom body
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(npc.x + 4, npc.y + 8, 6, 12);
    // Cap
    ctx.fillStyle = '#6688ff';
    ctx.beginPath();
    ctx.arc(npc.x + 7, npc.y + 8, 7, Math.PI, 0);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(npc.x + 5, npc.y + 6, 2, 2);
    ctx.fillRect(npc.x + 8, npc.y + 6, 2, 2);
    if (!npc.talked) {
      const bob = Math.sin(frame * 0.1) * 2;
      ctx.fillStyle = '#ff0';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', npc.x + 7, npc.y - 4 + bob);
    }
  }

  // Draw enemies (Tasern-themed)
  for (const en of enemies) {
    if (!en.alive) continue;
    drawEnemy(en);
  }

  // Draw boss
  if (boss && boss.alive) {
    drawBoss();
  }

  // Draw boomerangs (spore blades)
  for (const b of boomerangs) {
    for (const t of b.trail) {
      ctx.globalAlpha = t.life * 0.5;
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.spin);
    drawBoomerangShape(0, 0, 7, b.returning ? '#f4b41b' : '#38d973');
    ctx.restore();

    // Glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = b.returning ? '#f4b41b' : '#38d973';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw bullets
  for (const b of bullets) {
    ctx.fillStyle = b.color || '#f44';
    ctx.beginPath();
    ctx.arc(b.x, b.y, (b.w || 4) / 2, 0, Math.PI * 2);
    ctx.fill();
    // Bullet glow
    ctx.globalAlpha = 0.2;
    ctx.beginPath();
    ctx.arc(b.x, b.y, (b.w || 4), 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw player
  if (deathTimer <= 0 || Math.floor(frame * 0.5) % 2 === 0) {
    drawPlayer();
  }

  // Score popups (in world space)
  for (const sp of scorePopups) {
    ctx.globalAlpha = Math.min(1, sp.life * 2);
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.globalAlpha = 1;
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Tutorial overlay
  if (tutorialTimer > 0) {
    drawTutorial();
  }

  // Dialog
  if (dialogTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(20, GH - 60, GW - 40, 40);
    ctx.strokeStyle = SECTORS[sectorIndex].color;
    ctx.lineWidth = 1;
    ctx.strokeRect(20, GH - 60, GW - 40, 40);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dialogText, GW / 2, GH - 36);
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === ZONE BACKGROUNDS ===
function drawZoneBackground(idx) {
  switch (idx) {
    case 0: // Spore Caverns - stalactites and bioluminescence
      ctx.fillStyle = '#0a1525';
      for (let i = 0; i < 8; i++) {
        const sx = (i * 67 + Math.floor(camX * 0.1)) % GW;
        ctx.fillRect(sx, 0, 3, 20 + (i % 3) * 15);
      }
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#2266ff';
      ctx.beginPath();
      ctx.arc(GW * 0.3, GH * 0.4, 80, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(GW * 0.7, GH * 0.6, 60, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 1: // Reactor Core - pulsing energy
      ctx.globalAlpha = 0.05 + Math.sin(frame * 0.03) * 0.02;
      ctx.fillStyle = '#ff6600';
      ctx.fillRect(0, 0, GW, GH);
      ctx.globalAlpha = 1;
      // Reactor pipes
      ctx.strokeStyle = '#331a00';
      ctx.lineWidth = 3;
      for (let i = 0; i < 4; i++) {
        const pipeX = (i * 130 + 30) % GW;
        ctx.beginPath();
        ctx.moveTo(pipeX, 0);
        ctx.lineTo(pipeX + 10, GH);
        ctx.stroke();
      }
      break;
    case 2: // Mycelial Depths - living walls
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = '#00ff44';
      for (let i = 0; i < 6; i++) {
        const mx = (frame * 0.2 + i * 90) % (GW + 40) - 20;
        ctx.beginPath();
        ctx.arc(mx, GH * 0.5 + Math.sin(i * 1.3) * 100, 40, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 3: // Signal Grove - psionic waves
      ctx.strokeStyle = '#aa44ff10';
      ctx.lineWidth = 1;
      for (let r = 0; r < 3; r++) {
        const radius = 30 + r * 50 + (frame % 120);
        ctx.beginPath();
        ctx.arc(GW / 2, GH / 2, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
    case 4: // Compost Forge - heat shimmer
      ctx.globalAlpha = 0.03;
      ctx.fillStyle = '#ff2200';
      for (let i = 0; i < 5; i++) {
        const fy = GH - 30 - Math.abs(Math.sin(frame * 0.05 + i * 0.8)) * 60;
        const fx = i * 100 + 20;
        ctx.beginPath();
        ctx.arc(fx, fy, 30, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      break;
    case 5: // Prime Nexus - all effects combined
      ctx.globalAlpha = 0.02;
      ctx.fillStyle = '#ffff44';
      ctx.fillRect(0, 0, GW, GH);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#ffff0008';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(GW / 2, GH / 2, 40 + i * 40 + (frame % 80), 0, Math.PI * 2);
        ctx.stroke();
      }
      break;
  }
}

// === DRAW TUTORIAL ===

  ctx.font = '9px monospace';

  ctx.fillText('3. Defeat the boss to clear the sector', GW / 2, 96);

// === DRAW PLAYER (Baseling) ===
function drawPlayer() {
  const blinkVisible = invincTimer <= 0 || Math.floor(frame * 0.3) % 2 === 0;
  if (!blinkVisible) return;

  const x = px, y = py;

  // === BASELING SPRITE ===
  var _anim = (deathTimer > 0) ? 'ko' : (Math.abs(pvy) > 30) ? 'jump' : (invincTimer > 0) ? 'hurt' : (Math.abs(pvx) > 1 ? 'walk' : 'idle');
  if (TAS.drawBaseling(ctx, x + 7, y + 10, 20, { flipX: pFacing < 0, frame: frame, anim: _anim })) {
    // baseling sprite drawn
  } else if (powerSuitActive) {
    // Spore suit - glowing fungal armor
    ctx.fillStyle = '#00aaff';
    ctx.fillRect(x, y, 14, 20);
    ctx.fillStyle = '#0066cc';
    ctx.fillRect(x + 2, y + 2, 10, 6);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(x + 4, y + 3, 3, 3);
    ctx.fillRect(x + pFacing > 0 ? x + 10 : x - 4, y + 8, 6, 4);
    // Spore glow
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.15) * 0.1;
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.arc(x + 7, y + 10, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Baseling character - uses stat color
    const bodyColor = statB.color;
    const headColor = lightenColor(bodyColor, 30);
    const legColor = darkenColor(bodyColor, 20);

    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x + 2, y + 6, 8, 10);
    // Head
    ctx.fillStyle = headColor;
    ctx.fillRect(x + 3, y, 7, 7);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + (pFacing > 0 ? 7 : 4), y + 2, 2, 2);
    // Baseling icon on body
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, x + 6, y + 13);
    ctx.globalAlpha = 1;
    // Legs
    const legOff = Math.sin(pAnim) * 2;
    ctx.fillStyle = legColor;
    ctx.fillRect(x + 3, y + 16, 3, 4 + (pGrounded ? 0 : legOff));
    ctx.fillRect(x + 7, y + 16, 3, 4 - (pGrounded ? 0 : legOff));
    // Arm (throwing side)
    ctx.fillStyle = bodyColor;
    ctx.fillRect(x + (pFacing > 0 ? 9 : -1), y + 8, 4, 3);
  }
}

function lightenColor(hex, amount) {
  const r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amount);
  const g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amount);
  const b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amount);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

function darkenColor(hex, amount) {
  const r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amount);
  const g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amount);
  const b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amount);
  return '#' + r.toString(16).padStart(2, '0') + g.toString(16).padStart(2, '0') + b.toString(16).padStart(2, '0');
}

// === DRAW ENEMIES (Tasern-themed) ===
function drawEnemy(en) {
  const x = en.x, y = en.y;

  switch (en.type) {
    case 'sporeling':
      // Floating spore with tendrils
      ctx.fillStyle = '#558855';
      ctx.beginPath();
      ctx.arc(x + 7, y + 5, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88cc88';
      ctx.beginPath();
      ctx.arc(x + 7, y + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      // Tendrils
      ctx.strokeStyle = '#446644';
      ctx.lineWidth = 0.5;
      for (let t = 0; t < 3; t++) {
        ctx.beginPath();
        ctx.moveTo(x + 4 + t * 3, y + 10);
        ctx.lineTo(x + 4 + t * 3 + Math.sin(en.anim + t) * 2, y + 14);
        ctx.stroke();
      }
      break;
    case 'myconid':
      // Mushroom soldier
      ctx.fillStyle = '#884444';
      ctx.fillRect(x + 3, y + 10, 8, 12);
      // Cap
      ctx.fillStyle = '#aa4444';
      ctx.beginPath();
      ctx.arc(x + 7, y + 10, 7, Math.PI, 0);
      ctx.fill();
      // Spots
      ctx.fillStyle = '#cc6666';
      ctx.beginPath();
      ctx.arc(x + 5, y + 6, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 10, y + 8, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x + (en.dir > 0 ? 8 : 4), y + 12, 2, 2);
      break;
    case 'sporecannon':
      // Fungal turret
      ctx.fillStyle = '#445544';
      ctx.fillRect(x, y + 8, 16, 8);
      ctx.fillStyle = '#668866';
      const gunAngle = Math.atan2(py - en.y, px - en.x);
      ctx.save();
      ctx.translate(x + 8, y + 8);
      ctx.rotate(gunAngle);
      ctx.fillRect(0, -2, 12, 4);
      ctx.restore();
      ctx.fillStyle = '#44ff44';
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'rollerball':
      // Rolling spore pod
      ctx.fillStyle = '#556655';
      const rollAnim = en.anim * 2;
      ctx.save();
      ctx.translate(x + 8, y + 6);
      ctx.rotate(rollAnim);
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#88aa88';
      ctx.beginPath();
      ctx.arc(0, 0, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;
    case 'treant':
      // Fungal treant
      ctx.fillStyle = '#445533';
      ctx.fillRect(x + 3, y, 12, 12);
      // Branch arms
      ctx.fillStyle = '#556644';
      ctx.fillRect(x, y + 2, 4, 8);
      ctx.fillRect(x + 14, y + 2, 4, 8);
      // Legs
      ctx.fillStyle = '#445533';
      ctx.fillRect(x + 4, y + 12, 4, 12);
      ctx.fillRect(x + 10, y + 12, 4, 12);
      // Glowing eyes
      ctx.fillStyle = '#ff4400';
      ctx.fillRect(x + 5, y + 3, 3, 3);
      ctx.fillRect(x + 10, y + 3, 3, 3);
      // Moss
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(x + 3, y, 12, 2);
      break;
    case 'shieldcap':
      // Shield-cap myconid
      const shieldX = en.dir > 0 ? x + 12 : x - 4;
      ctx.fillStyle = '#4488ff';
      ctx.globalAlpha = 0.6 + Math.sin(en.anim) * 0.2;
      ctx.beginPath();
      ctx.ellipse(shieldX + 2, y + 11, 3, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Body
      ctx.fillStyle = '#664444';
      ctx.fillRect(x + 2, y + 8, 12, 14);
      // Cap
      ctx.fillStyle = '#885555';
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 8, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x + (en.dir > 0 ? 9 : 4), y + 10, 2, 2);
      break;
    case 'wisp':
      // Spore wisp
      ctx.fillStyle = '#88aaff';
      ctx.globalAlpha = 0.6 + Math.sin(en.anim * 2) * 0.3;
      ctx.beginPath();
      ctx.arc(x + 6, y + 6, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ccddff';
      ctx.beginPath();
      ctx.arc(x + 6, y + 6, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Sparkle trail
      ctx.fillStyle = '#aaccff';
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(x + 6 - en.dir * 4, y + 6, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'reactor':
      // Mini reactor enemy
      ctx.fillStyle = '#554422';
      ctx.fillRect(x + 2, y + 2, 16, 16);
      ctx.strokeStyle = '#ffaa22';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 2, y + 2, 16, 16);
      // Core glow
      const rGlow = Math.sin(en.anim) * 0.3 + 0.7;
      ctx.globalAlpha = rGlow;
      ctx.fillStyle = '#ffaa22';
      ctx.beginPath();
      ctx.arc(x + 10, y + 10, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Pipes
      ctx.fillStyle = '#444';
      ctx.fillRect(x - 2, y + 6, 4, 3);
      ctx.fillRect(x + 18, y + 6, 4, 3);
      ctx.fillRect(x - 2, y + 12, 4, 3);
      ctx.fillRect(x + 18, y + 12, 4, 3);
      break;
    case 'decomposer':
      // Compost decomposer - blobby
      ctx.fillStyle = '#665533';
      ctx.beginPath();
      ctx.arc(x + 8, y + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#887744';
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 5, 0, Math.PI * 2);
      ctx.fill();
      // Mouth
      ctx.fillStyle = '#332211';
      ctx.beginPath();
      ctx.arc(x + 8, y + 12, 3, 0, Math.PI);
      ctx.fill();
      // Steam
      ctx.fillStyle = '#aaa';
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(x + 8, y - 2 - Math.abs(Math.sin(en.anim)) * 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
  }
}

// === DRAW BOSS (Tasern-themed) ===
function drawBoss() {
  if (!boss || !boss.alive) return;
  const x = boss.x, y = boss.y;

  // Hit flash
  if (boss.hitFlash > 0) {
    ctx.globalAlpha = 0.5 + boss.hitFlash * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 2, y - 2, boss.w + 4, boss.h + 4);
    ctx.globalAlpha = 1;
  }

  // Enrage aura
  if (boss.enraged) {
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.15) * 0.05;
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(x + 24, y + 24, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Main body - organic fungal mass
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(x + 4, y + 4, 40, 40);
  ctx.fillStyle = '#5a3a2a';
  ctx.fillRect(x + 8, y + 8, 32, 32);

  // Fungal cap/crown
  ctx.fillStyle = boss.color;
  ctx.beginPath();
  ctx.arc(x + 24, y + 6, 20, Math.PI, 0);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.arc(x + 16, y + 2, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 30, y + 4, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Core
  const coreGlow = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = coreGlow;
  ctx.fillStyle = boss.color;
  ctx.beginPath();
  ctx.arc(x + 24, y + 28, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Eyes
  ctx.fillStyle = boss.enraged ? '#ff0000' : '#ff0';
  ctx.fillRect(x + 14, y + 18, 6, 6);
  ctx.fillRect(x + 28, y + 18, 6, 6);

  // Fungal tendrils (arms)
  ctx.fillStyle = '#4a3a2a';
  ctx.fillRect(x - 6, y + 16, 10, 16);
  ctx.fillRect(x + 44, y + 16, 10, 16);
  // Tendril tips
  ctx.fillStyle = boss.color + '80';
  ctx.beginPath();
  ctx.arc(x - 1, y + 32, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + 49, y + 32, 4, 0, Math.PI * 2);
  ctx.fill();

  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(x, y - 12, boss.w, 6);
  const hpColor = boss.enraged ? '#ff2222' : boss.color;
  ctx.fillStyle = hpColor;
  ctx.fillRect(x, y - 12, boss.w * (boss.hp / boss.maxHp), 6);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(x, y - 12, boss.w, 6);

  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, x + boss.w / 2, y - 16);
  if (boss.enraged) {
    ctx.fillStyle = '#f44';
    ctx.font = '6px monospace';
    ctx.fillText('ENRAGED', x + boss.w / 2, y - 22);
  }
}

function drawBoomerangShape(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x - size, y);
  ctx.quadraticCurveTo(x, y - size * 0.4, x + size, y - size * 0.3);
  ctx.quadraticCurveTo(x + size * 0.5, y, x, y);
  ctx.quadraticCurveTo(x, y + size * 0.4, x - size * 0.3, y + size);
  ctx.quadraticCurveTo(x - size * 0.3, y + size * 0.3, x - size, y);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(x - size * 0.3, y - size * 0.1, size * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.85)';
  ctx.fillRect(0, 0, GW, 28);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 4, maxHp * 18 + 4, 12);
  for (let i = 0; i < maxHp; i++) {
    ctx.fillStyle = i < hp ? (powerSuitActive ? '#00ccff' : statB.color) : '#222';
    ctx.fillRect(6 + i * 18, 6, 16, 8);
  }

  // Score (INT-multiplied shown)
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('POOP: ' + score, GW - 6, 14);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#38d973';
  ctx.fillText('x' + lives, GW - 80, 14);

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = comboCount >= 5 ? '#ff44ff' : '#ffaa00';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('COMBO x' + comboCount, GW / 2, 14);
  }

  // Sector name
  ctx.fillStyle = SECTORS[sectorIndex].color;
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  ctx.fillText(SECTORS[sectorIndex].name, GW / 2, 24);

  // Timer
  const timeLeft = Math.ceil(sectorTimer);
  ctx.fillStyle = timeLeft < 30 ? '#f44' : '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(timeLeft / 60) + ':' + String(timeLeft % 60).padStart(2, '0'), GW - 6, 24);

  // Keycard indicator
  if (keycardFound) {
    ctx.fillStyle = '#f4b41b';
    ctx.textAlign = 'left';
    ctx.fillText('GARDEN KEY', 6, 24);
  }

  // Power suit timer
  if (powerSuitActive) {
    ctx.fillStyle = '#3cacd7';
    ctx.textAlign = 'center';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('MYCELIUM ARMOR: ' + Math.ceil(powerSuitTimer) + 's', GW / 2, GH - 8);
  }

  // Stat bonus indicator (subtle)
  if (statB.level > 0) {
    ctx.fillStyle = statB.color + '80';
    ctx.textAlign = 'left';
    ctx.font = '7px monospace';
    ctx.fillText('Lv.' + statB.level, 6, GH - 4);
  }
}

function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Background celebration spores
  for (let i = 0; i < 20; i++) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = SECTORS[i % 6].color;
    const vx = (frame * 0.5 + i * 25) % GW;
    const vy = GH - ((frame * (1 + i * 0.2) + i * 30) % (GH + 20));
    ctx.beginPath();
    ctx.arc(vx, vy, 2 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('GARDENS LIBERATED!', GW / 2, 70);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('All sectors cleared!', GW / 2, 100);

  ctx.fillStyle = statB.color;
  ctx.font = '11px monospace';
  ctx.fillText(statB.name + ' has saved the baseling gardens!', GW / 2, 125);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('POOP COLLECTED: ' + score, GW / 2, 155);

  if (intBonus > 0) {
    ctx.fillStyle = '#aaa';
    ctx.font = '9px monospace';
    ctx.fillText('(INT bonus: x' + SCORE_MULT.toFixed(1) + ' multiplier)', GW / 2, 172);
  }

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW POOP RECORD!', GW / 2, 195);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Upgrades: RNG ' + upgrades.range + ' | PWR ' + upgrades.power + ' | SPD ' + upgrades.speed + ' | MLT ' + upgrades.multi, GW / 2, 225);

  // Stat summary (arcade stats)
  var _sts = (window.BaselingPlayer && BaselingPlayer.getStats) ? BaselingPlayer.getStats() : { speed: 10, stamina: 10, power: 10, luck: 10, swim: 10 };
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('Your Baseling: PWR ' + _sts.power + ' | SPD ' + _sts.speed + ' | STA ' + _sts.stamina + ' | LCK ' + _sts.luck, GW / 2, 245);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 36);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
