(function() {
"use strict";

// === BASELING STAT INTEGRATION ===
// Captain IS a baseling - stats drive all gameplay mechanics
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// One clamped source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim},
// single-player band 0.8–1.6 (RPG, not a wager game). This game's helpers read the old
// D&D fields, so we synthesize them from the bounded multipliers; every gameplay number
// still traces back to a clamped getMults(). SPD->move, STA->HP/lives, PWR->damage,
// LCK->drops/loot, SWM unused (no water).
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[pirates-of-tasern] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.scoreMult = 1; statB.cooldown = 1 / m.moveSpeed; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.luck); statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[pirates-of-tasern] player init failed:', e && e.message); });
}

// Stat helper functions - scale stats to usable multipliers
function statMod(stat) { return (stat - 10) / 10; } // 0 at 10, +1 at 20, -0.5 at 5
function statMult(stat) { return 1 + statMod(stat) * 0.5; } // 0.75x at 5, 1x at 10, 1.5x at 20
function strDamage() { return statMult(statB.str); }        // STR -> cannon/sword damage
function dexSpeed() { return statMult(statB.dex); }         // DEX -> ship/combat speed
function conHP() { return statMult(statB.con); }            // CON -> hull HP/lives
function intScore() { return statMult(statB.int); }         // INT -> treasure/gold score
function wisCooldown() { return 1 / statMult(statB.wis); }  // WIS -> faster cooldowns (inverted)
function chaLuck() { return statMult(statB.cha); }          // CHA -> crew recruitment/trade luck
function wisNav() { return statMult(statB.wis); }           // WIS -> navigation (wind handling)

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'FIRE', b: 'ACTION', c: 'PICK' } });

const { keys, touch } = TAS.input;
const { lerp, clamp, randRange, randInt, dist, angle } = TAS.math;

// === SAVE KEY ===
const SAVE_KEY = 'pirates_tasern_save';

// === OCEAN ZONES ===
// Different ocean zones with unique colors and hazards
const OCEAN_ZONES = [
  { name: 'Spore Shallows', x: 0, y: 0, w: 800, h: 800, deep: '#1a4040', wave: '#225555', fog: false, current: 0 },
  { name: 'Mycelial Depths', x: 800, y: 0, w: 800, h: 800, deep: '#1a2244', wave: '#223366', fog: false, current: 0.3 },
  { name: 'Reactor Strait', x: 1600, y: 0, w: 800, h: 800, deep: '#2a1a33', wave: '#3a2244', fog: false, current: -0.2 },
  { name: 'Charred Waters', x: 0, y: 800, w: 800, h: 800, deep: '#221a1a', wave: '#332222', fog: true, current: 0 },
  { name: 'The Fungal Sea', x: 800, y: 800, w: 800, h: 800, deep: '#0a2222', wave: '#1a3333', fog: false, current: 0.5 },
  { name: 'Abyssal Reach', x: 1600, y: 800, w: 800, h: 800, deep: '#0a0a22', wave: '#111133', fog: true, current: 0 },
  { name: 'Verdant Tide', x: 0, y: 1600, w: 800, h: 800, deep: '#0a2a1a', wave: '#113322', fog: false, current: 0.1 },
  { name: 'Kraken Deep', x: 800, y: 1600, w: 800, h: 800, deep: '#0a0a1a', wave: '#111122', fog: true, current: -0.4 },
  { name: 'Burning Gulf', x: 1600, y: 1600, w: 800, h: 800, deep: '#2a1a0a', wave: '#332211', fog: false, current: 0 }
];

function getZone(x, y) {
  for (var i = 0; i < OCEAN_ZONES.length; i++) {
    var z = OCEAN_ZONES[i];
    if (x >= z.x && x < z.x + z.w && y >= z.y && y < z.y + z.h) return z;
  }
  return OCEAN_ZONES[4]; // default center
}

// === WORLD GENERATION ===
const MAP_W = 2400, MAP_H = 2400;
const PORTS = [
  { name: 'Kardov\'s Gate', x: 400, y: 400, type: 'forge', color: '#e6482e', desc: 'Iron hub -- forges fungal arms from POOP slag' },
  { name: 'Sporehaven', x: 1800, y: 300, type: 'forest', color: '#38d973', desc: 'Mycelial trading post, spore gem bazaar' },
  { name: 'Irondeep', x: 2100, y: 1200, type: 'mine', color: '#3cacd7', desc: 'POOP token mines in the deep caverns' },
  { name: 'Greenhollow', x: 300, y: 1400, type: 'farm', color: '#38d973', desc: 'Community gardens growing baseling seed stock' },
  { name: 'Driftwood Bay', x: 1200, y: 2000, type: 'forest', color: '#338844', desc: 'Lumber, shipbuilding, and spore harvesting' },
  { name: 'Ashport', x: 2000, y: 2000, type: 'forge', color: '#e6482e', desc: 'Volcanic forges powered by POOP compost heat' },
  { name: 'Coral Reach', x: 600, y: 2100, type: 'farm', color: '#38d973', desc: 'Reef gardens of the south -- rare seed stock' },
  { name: 'Stormwatch', x: 1200, y: 600, type: 'mine', color: '#a855f7', desc: 'Lightning-charged POOP extraction towers' },
  { name: 'Reactor Isle', x: 1600, y: 1200, type: 'forge', color: '#a855f7', desc: 'Ancient baseling reactor core, still humming' },
  { name: 'Fungal Wharf', x: 900, y: 1100, type: 'forest', color: '#38d973', desc: 'Bioluminescent harbor -- mycelium doubloon mint' }
];

const GOODS = ['Spore Gems', 'POOP Tokens', 'Garden Seeds', 'Fungal Arms', 'Mycelium'];
const GOOD_COLORS = ['#38d973', '#f4b41b', '#3cacd7', '#e6482e', '#a855f7'];
const PRODUCE_MAP = { forest: 'Spore Gems', mine: 'POOP Tokens', farm: 'Garden Seeds', forge: 'Fungal Arms' };

const SHIP_TYPES = [
  { name: 'Sloop', speed: 3.0, cannons: 4, hull: 40, cargo: 20, crew: 15, cost: 0 },
  { name: 'Brigantine', speed: 2.2, cannons: 8, hull: 80, cargo: 40, crew: 30, cost: 2000 },
  { name: 'Galleon', speed: 1.5, cannons: 16, hull: 150, cargo: 80, crew: 60, cost: 5000 },
  { name: 'Sporevein Ship', speed: 2.8, cannons: 12, hull: 120, cargo: 60, crew: 45, cost: 8000 }
];

// === ENEMY SHIP VARIANTS ===
const ENEMY_TYPES = [
  { name: 'Mold Merchant', color: '#7a444a', aggressive: false, speed: 1.2, gold: [40, 200], shipType: 0 },
  { name: 'Mold Pirate', color: '#551111', aggressive: true, speed: 1.8, gold: [80, 300], shipType: 0 },
  { name: 'Barnacle Corsair', color: '#661122', aggressive: true, speed: 1.5, gold: [150, 500], shipType: 1 },
  { name: 'Spore Runner', color: '#225533', aggressive: false, speed: 2.5, gold: [60, 250], shipType: 0 },
  { name: 'Fungal Raider', color: '#a855f7', aggressive: true, speed: 1.6, gold: [200, 600], shipType: 1 },
  { name: 'Rot Galleon', color: '#334455', aggressive: true, speed: 1.0, gold: [500, 1500], shipType: 2 }
];

// === SEA MONSTERS ===
const MONSTER_TYPES = [
  { name: 'Spore Leviathan', hp: 80, damage: 8, speed: 0.8, size: 35, color: '#38d973', gold: 400 },
  { name: 'Sea Fungi Serpent', hp: 50, damage: 12, speed: 1.5, size: 25, color: '#66ddaa', gold: 250 },
  { name: 'Barnacle Parasite', hp: 120, damage: 6, speed: 0.5, size: 45, color: '#7a444a', gold: 600 },
  { name: 'Reactor Eel', hp: 40, damage: 15, speed: 2.0, size: 20, color: '#a855f7', gold: 350 }
];

// Islands (non-port landmasses for treasure)
const ISLANDS = [];
for (var i = 0; i < 25; i++) {
  var hasT = i < 5;
  ISLANDS.push({
    x: 200 + Math.random() * (MAP_W - 400),
    y: 200 + Math.random() * (MAP_H - 400),
    r: 20 + Math.random() * 30,
    hasTreasure: hasT,
    treasureId: hasT ? i : -1,
    type: ['normal', 'spore', 'reactor', 'charred', 'fungal'][randInt(0, 4)],
    glow: Math.random() < 0.3
  });
}
// Push islands away from ports
for (var ii = 0; ii < ISLANDS.length; ii++) {
  var isl = ISLANDS[ii];
  for (var pi = 0; pi < PORTS.length; pi++) {
    var p = PORTS[pi];
    if (dist(isl.x, isl.y, p.x, p.y) < 120) {
      isl.x += 150;
      isl.y += 150;
    }
  }
}

// === REACTOR ISLANDS (special landmarks) ===
const REACTOR_ISLANDS = [
  { name: 'Garden Nexus', x: 1000, y: 500, r: 40, color: '#38d973', glow: '#22aa55', effect: 'heal' },
  { name: 'POOP Burn Reactor', x: 1800, y: 1000, r: 35, color: '#e6482e', glow: '#aa2222', effect: 'damage' },
  { name: 'Mycelial Hub', x: 600, y: 1800, r: 38, color: '#a855f7', glow: '#7744aa', effect: 'speed' },
  { name: 'Doubloon Forge', x: 2000, y: 600, r: 32, color: '#f4b41b', glow: '#aa8822', effect: 'gold' }
];

// === MYCELIAL CURRENTS (ocean highways) ===
const CURRENTS = [
  { x1: 400, y1: 400, x2: 1200, y2: 600, strength: 2.0, color: '#44dd8844' },
  { x1: 1200, y1: 600, x2: 1800, y2: 300, strength: 1.5, color: '#44dd8833' },
  { x1: 300, y1: 1400, x2: 1200, y2: 2000, strength: 1.8, color: '#88aadd44' },
  { x1: 1200, y1: 2000, x2: 2000, y2: 2000, strength: 1.5, color: '#88aadd33' },
  { x1: 600, y1: 2100, x2: 1200, y2: 1200, strength: 2.2, color: '#aa66dd44' },
  { x1: 1600, y1: 1200, x2: 2100, y2: 1200, strength: 1.2, color: '#aa66dd33' }
];

function getCurrentPush(px, py) {
  var pushX = 0, pushY = 0;
  for (var ci = 0; ci < CURRENTS.length; ci++) {
    var c = CURRENTS[ci];
    var mx = (c.x1 + c.x2) / 2, my = (c.y1 + c.y2) / 2;
    var len = dist(c.x1, c.y1, c.x2, c.y2);
    var d = dist(px, py, mx, my);
    if (d < len * 0.6) {
      var dx = c.x2 - c.x1, dy = c.y2 - c.y1;
      var mag = Math.sqrt(dx * dx + dy * dy);
      var falloff = 1 - (d / (len * 0.6));
      // WIS helps navigate currents better
      var navBonus = wisNav();
      pushX += (dx / mag) * c.strength * falloff * navBonus;
      pushY += (dy / mag) * c.strength * falloff * navBonus;
    }
  }
  return { x: pushX, y: pushY };
}

// === GAME STATE ===
var state = 'title'; // title, tutorial, sailing, port, combat, duel, boss, gameOver, victory
var frame = 0;
var camX = 0, camY = 0;
var tutorialStep = 0;
var tutorialTimer = 0;
var showTutorial = true;

// Player state
var player = {};
var enemies = [];
var seaMonsters = [];
var cannonballs = [];
var day = 1;
var weatherTimer = 0;
var weather = 'clear'; // clear, wind, storm, sporeFog
var windDir = 0;
var windForce = 1;
var stormAlpha = 0;
var fogAlpha = 0;

// Combat state
var combatEnemy = null;
var combatAngle = 0;
var combatDist = 150;
var combatCooldown = 0;
var combatBalls = [];
var playerAimAngle = 0;
var enemyHP = 0;
var playerCombatHP = 0;

// Duel state
var duelEnemy = null;
var duelPlayerHP = 0;
var duelEnemyHP = 0;
var duelPlayerStance = 1;
var duelEnemyStance = 1;
var duelPlayerAttack = -1;
var duelEnemyAttack = -1;
var duelTimer = 0;
var duelText = '';
var duelCooldown = 0;

// Boss state (Kraken)
var bossActive = false;
var bossHP = 0;
var bossMaxHP = 0;
var bossX = 0, bossY = 0;
var bossTentacles = [];
var bossPhase = 0;
var bossAttackTimer = 0;
var bossDefeated = false;

// Port state
var currentPort = null;
var portMenu = 0;
var portCursor = 0;
var portPrices = [];
var menuCooldown = 0;

// Messages
var messages = [];
var msgTimer = 0;

// Floating text effects
var floatingTexts = [];

function addMessage(text) {
  messages.unshift(text);
  if (messages.length > 3) messages.pop();
  msgTimer = 3;
}

function addFloatingText(x, y, text, color) {
  floatingTexts.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.5, maxLife: 1.5 });
}

// === INITIALIZATION ===
function initGame() {
  // CON boosts starting hull, CHA boosts starting gold
  var baseHull = Math.floor(SHIP_TYPES[0].hull * conHP());
  var baseGold = Math.floor(100 * chaLuck());
  player = {
    x: PORTS[0].x, y: PORTS[0].y + 80,
    dir: 0, speed: 0,
    shipType: 0,
    hull: baseHull,
    maxHull: baseHull,
    cannons: SHIP_TYPES[0].cannons,
    cargo: [0, 0, 0, 0, 0], // Spores, Tokens, Food, Weapons, Mycelium
    cargoMax: SHIP_TYPES[0].cargo,
    crew: 10,
    crewMax: SHIP_TYPES[0].crew,
    gold: baseGold,
    morale: 100,
    reputation: 0,
    treasures: [false, false, false, false, false],
    treasureMaps: [false, false, false, false, false],
    kills: 0,
    monstersSlain: 0,
    portsVisited: [],
    totalGoldEarned: 0
  };
  day = 1;
  enemies = [];
  seaMonsters = [];
  cannonballs = [];
  weather = 'clear';
  windDir = Math.random() * Math.PI * 2;
  windForce = 1;
  messages = [];
  floatingTexts = [];
  bossActive = false;
  bossDefeated = false;
  spawnEnemies();
  spawnMonsters();
  addMessage('Baseling Captain ' + statB.name + ' sets sail into the spore seas!');
}

function spawnEnemies() {
  enemies = [];
  for (var i = 0; i < 8; i++) {
    var et = ENEMY_TYPES[randInt(0, ENEMY_TYPES.length - 1)];
    var hull = SHIP_TYPES[et.shipType].hull;
    enemies.push({
      x: 300 + Math.random() * (MAP_W - 600),
      y: 300 + Math.random() * (MAP_H - 600),
      dir: Math.random() * Math.PI * 2,
      speed: et.speed,
      shipType: et.shipType,
      hull: hull,
      maxHull: hull,
      aggressive: et.aggressive,
      patrol: Math.random() * Math.PI * 2,
      gold: randInt(et.gold[0], et.gold[1]),
      cargo: [randInt(0, 5), randInt(0, 5), randInt(0, 5), randInt(0, 5), randInt(0, 2)],
      typeName: et.name,
      color: et.color,
      alertTimer: 0,
      fleeing: false
    });
  }
}

function spawnMonsters() {
  seaMonsters = [];
  for (var i = 0; i < 4; i++) {
    var mt = MONSTER_TYPES[randInt(0, MONSTER_TYPES.length - 1)];
    seaMonsters.push({
      x: 400 + Math.random() * (MAP_W - 800),
      y: 400 + Math.random() * (MAP_H - 800),
      dir: Math.random() * Math.PI * 2,
      type: mt,
      hp: mt.hp,
      maxHp: mt.hp,
      attackTimer: 0,
      phase: 0, // 0=roaming, 1=aggro, 2=attacking
      bodyAngle: Math.random() * Math.PI * 2,
      wobble: 0
    });
  }
}

// === BOSS: KRAKEN ===
function spawnKraken() {
  if (bossDefeated || bossActive) return;
  bossActive = true;
  bossMaxHP = Math.floor(300 * conHP());
  bossHP = bossMaxHP;
  bossX = 1200;
  bossY = 1800;
  bossPhase = 0;
  bossAttackTimer = 3;
  bossTentacles = [];
  for (var t = 0; t < 6; t++) {
    bossTentacles.push({
      angle: (t / 6) * Math.PI * 2,
      length: 60 + Math.random() * 30,
      speed: 0.5 + Math.random() * 0.5,
      hp: 30,
      alive: true,
      wobble: Math.random() * Math.PI * 2
    });
  }
  addMessage('THE SPORE KRAKEN RISES!');
  TAS.audio.playTone(60, 0.5, 'sawtooth', 0.2, 30);
  TAS.fx.shake(8, 0.8);
}

// === SAVE / LOAD ===
function saveGame() {
  try {
    var data = { player: player, day: day, weather: weather, windDir: windDir, bossDefeated: bossDefeated };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch(e) { addMessage('Save failed: ' + e.message); }
}

function loadGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    var data = JSON.parse(raw);
    player = data.player;
    // Ensure new cargo slot exists
    if (player.cargo.length < 5) player.cargo.push(0);
    if (!player.kills) player.kills = 0;
    if (!player.monstersSlain) player.monstersSlain = 0;
    if (!player.portsVisited) player.portsVisited = [];
    if (!player.totalGoldEarned) player.totalGoldEarned = 0;
    day = data.day;
    weather = data.weather || 'clear';
    windDir = data.windDir || 0;
    bossDefeated = data.bossDefeated || false;
    spawnEnemies();
    spawnMonsters();
    return true;
  } catch(e) { return false; }
}

// === PORT PRICES ===
function generatePrices(port) {
  var prices = [];
  for (var i = 0; i < 5; i++) {
    var base = 20 + randInt(5, 15);
    if (i < 4 && PRODUCE_MAP[port.type] === GOODS[i]) base = randInt(5, 12);
    else if (Math.random() < 0.3) base = randInt(30, 50);
    if (i === 4) base = randInt(40, 80); // Mycelium is rare/expensive
    // CHA affects prices: higher CHA = better deals
    base = Math.floor(base / chaLuck());
    prices.push(Math.max(1, base));
  }
  return prices;
}

// === TUTORIAL ===
var TUTORIAL_STEPS = [
  { text: 'Welcome, Captain ' + statB.name + '!', sub: 'Your baseling captain commands this vessel.' },
  { text: 'ARROWS or WASD to sail', sub: 'Navigate the spore seas, ride mycelial currents' },
  { text: 'FIRE (Space/A) shoots cannons', sub: 'STR boosts damage, WIS cuts cooldown' },
  { text: 'ACTION (E/B) to dock at ports', sub: 'Trade POOP tokens and spore gems for doubloons' },
  { text: 'Find 5 fungal treasures or earn 10,000', sub: 'Beware the Spore Kraken in the deep!' }
];

function updateTutorial(dt) {
  tutorialTimer += dt;
  if (keys['Space'] || keys['Enter'] || touch.a || touch.b) {
    if (tutorialTimer > 0.5) {
      tutorialStep++;
      tutorialTimer = 0;
      if (tutorialStep >= TUTORIAL_STEPS.length) {
        state = 'sailing';
        showTutorial = false;
      }
    }
  }
}

// === SAILING UPDATE ===
function updateSailing(dt) {
  // Weather
  weatherTimer -= dt;
  if (weatherTimer <= 0) {
    weatherTimer = randRange(15, 40);
    var r = Math.random();
    if (r < 0.4) weather = 'clear';
    else if (r < 0.65) { weather = 'wind'; windDir = Math.random() * Math.PI * 2; windForce = 1.5; }
    else if (r < 0.85) { weather = 'storm'; windForce = 0.5; addMessage('Storm brewing!'); }
    else { weather = 'sporeFog'; addMessage('Fungal spore fog rolls in...'); }
  }

  // Storm effects
  if (weather === 'storm') {
    stormAlpha = Math.min(0.3, stormAlpha + dt * 0.5);
    if (Math.random() < dt * 0.1) {
      // CON reduces storm damage
      var stormDmg = Math.max(1, Math.floor(2 / conHP()));
      player.hull -= stormDmg;
      if (player.hull <= 0) { state = 'gameOver'; addMessage('Your baseling ship torn apart by the storm!'); return; }
    }
  } else {
    stormAlpha = Math.max(0, stormAlpha - dt * 0.5);
  }

  // Spore fog
  if (weather === 'sporeFog') {
    fogAlpha = Math.min(0.4, fogAlpha + dt * 0.3);
  } else {
    fogAlpha = Math.max(0, fogAlpha - dt * 0.3);
  }

  // Wind bonus/penalty (WIS improves wind handling)
  var windMod = 1;
  if (weather === 'wind' || weather === 'storm') {
    var angleDiff = Math.abs(player.dir - windDir);
    var normDiff = angleDiff > Math.PI ? Math.PI * 2 - angleDiff : angleDiff;
    if (weather === 'wind') {
      windMod = normDiff < Math.PI / 2 ? (1.3 + wisNav() * 0.2) : (0.5 + wisNav() * 0.1);
    } else {
      windMod = 0.4 + wisNav() * 0.1;
    }
  }

  // Movement (DEX affects ship speed)
  var shipSpeed = SHIP_TYPES[player.shipType].speed * dexSpeed();
  var accel = 0;
  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) accel = 1;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) accel = -0.3;
  player.speed = clamp(player.speed + accel * dt * 3, 0, shipSpeed * windMod);
  if (!accel) player.speed *= 0.97;

  // Turning (DEX improves turning)
  var turn = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) turn = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) turn = 1;
  player.dir += turn * dt * (2.5 + statMod(statB.dex) * 0.5);

  // Apply movement + mycelial currents
  var push = getCurrentPush(player.x, player.y);
  player.x += (Math.cos(player.dir) * player.speed * 60 + push.x * 30) * dt;
  player.y += (Math.sin(player.dir) * player.speed * 60 + push.y * 30) * dt;
  player.x = clamp(player.x, 30, MAP_W - 30);
  player.y = clamp(player.y, 30, MAP_H - 30);

  // Day counter
  if (frame % 1800 === 0 && frame > 0) {
    day++;
    player.morale -= 2;
    if (player.cargo[2] > 0) { player.cargo[2]--; player.morale = Math.min(100, player.morale + 5); }
    else { player.morale -= 5; addMessage('Crew needs garden seeds! Morale drops.'); }
    if (player.morale <= 0) { addMessage('MUTINY! Crew tosses your baseling overboard!'); state = 'gameOver'; return; }
    if (day > 365) { state = 'gameOver'; addMessage('365 days passed!'); return; }
    // Kraken spawns after day 30
    if (day >= 30 && !bossDefeated && !bossActive) spawnKraken();
  }

  // Check port proximity
  for (var pi = 0; pi < PORTS.length; pi++) {
    var pp = PORTS[pi];
    if (dist(player.x, player.y, pp.x, pp.y) < 50) {
      if (keys['KeyE'] || keys['Enter'] || touch.b) {
        enterPort(pp);
        return;
      }
    }
  }

  // Check reactor island proximity (special effects)
  for (var ri = 0; ri < REACTOR_ISLANDS.length; ri++) {
    var rIsland = REACTOR_ISLANDS[ri];
    if (dist(player.x, player.y, rIsland.x, rIsland.y) < rIsland.r + 30) {
      if (rIsland.effect === 'heal' && frame % 60 === 0) {
        player.hull = Math.min(player.maxHull, player.hull + 1);
        addFloatingText(player.x, player.y - 20, '+1 Hull', '#44dd88');
      } else if (rIsland.effect === 'speed' && frame % 120 === 0) {
        addFloatingText(player.x, player.y - 20, 'SPEED+', '#aa66dd');
      } else if (rIsland.effect === 'gold' && frame % 180 === 0) {
        var bonus = Math.floor(5 * intScore());
        player.gold += bonus;
        player.totalGoldEarned += bonus;
        addFloatingText(player.x, player.y - 20, '+' + bonus + 'g', '#ffdd44');
      }
    }
  }

  // Check island proximity (treasure)
  for (var ti = 0; ti < ISLANDS.length; ti++) {
    var tIsl = ISLANDS[ti];
    if (dist(player.x, player.y, tIsl.x, tIsl.y) < tIsl.r + 20) {
      if (tIsl.hasTreasure && player.treasureMaps[tIsl.treasureId] && !player.treasures[tIsl.treasureId]) {
        if (keys['KeyE'] || keys['Enter'] || touch.b) {
          player.treasures[tIsl.treasureId] = true;
          // INT boosts treasure gold
          var loot = Math.floor(randInt(500, 2000) * intScore());
          player.gold += loot;
          player.totalGoldEarned += loot;
          addMessage('FUNGAL TREASURE FOUND! +' + loot + ' doubloons!');
          addFloatingText(player.x, player.y - 30, '+' + loot + 'g', '#ffdd44');
          TAS.audio.playTone(600, 0.3, 'square', 0.1);
          TAS.audio.playTone(800, 0.3, 'square', 0.08);
          TAS.fx.flash('#ffdd44', 0.4);
          if (player.treasures.every(function(t) { return t; })) { state = 'victory'; return; }
        }
      }
    }
  }

  // Enemy AI
  for (var ei = enemies.length - 1; ei >= 0; ei--) {
    var e = enemies[ei];
    e.patrol += dt * 0.3;
    var patrolX = e.x + Math.cos(e.patrol) * 100;
    var patrolY = e.y + Math.sin(e.patrol) * 100;
    e.dir = angle(e.x, e.y, patrolX, patrolY);

    var d = dist(e.x, e.y, player.x, player.y);
    if (e.aggressive && d < 250) {
      e.dir = angle(e.x, e.y, player.x, player.y);
      e.speed = ENEMY_TYPES[0].speed * 1.3;
      e.alertTimer = 2;
    } else if (!e.aggressive && d < 150) {
      // Non-aggressive ships flee
      e.dir = angle(player.x, player.y, e.x, e.y);
      e.speed = ENEMY_TYPES[0].speed * 1.5;
      e.fleeing = true;
    } else {
      e.fleeing = false;
    }

    if (e.alertTimer > 0) e.alertTimer -= dt;

    e.x += Math.cos(e.dir) * e.speed * 40 * dt;
    e.y += Math.sin(e.dir) * e.speed * 40 * dt;
    e.x = clamp(e.x, 50, MAP_W - 50);
    e.y = clamp(e.y, 50, MAP_H - 50);

    if (d < 35) {
      enterCombat(e, ei);
      return;
    }
  }

  // Sea monster AI
  for (var mi = seaMonsters.length - 1; mi >= 0; mi--) {
    var m = seaMonsters[mi];
    m.wobble += dt * 2;
    var md = dist(m.x, m.y, player.x, player.y);

    if (md < 200) {
      m.phase = 1; // aggro
      m.dir = angle(m.x, m.y, player.x, player.y);
    } else {
      m.phase = 0;
      m.bodyAngle += dt * 0.2;
      m.dir = m.bodyAngle;
    }

    var mspd = m.type.speed * (m.phase === 1 ? 1.5 : 0.5);
    m.x += Math.cos(m.dir) * mspd * 40 * dt;
    m.y += Math.sin(m.dir) * mspd * 40 * dt;
    m.x = clamp(m.x, 80, MAP_W - 80);
    m.y = clamp(m.y, 80, MAP_H - 80);

    // Monster attacks player on contact
    if (md < 30 + m.type.size * 0.5) {
      m.attackTimer -= dt;
      if (m.attackTimer <= 0) {
        // CON reduces monster damage
        var mDmg = Math.max(1, Math.floor(m.type.damage / conHP()));
        player.hull -= mDmg;
        m.attackTimer = 1.5;
        TAS.fx.shake(5, 0.85);
        addFloatingText(player.x, player.y - 20, '-' + mDmg, '#ff4444');
        TAS.audio.playTone(120, 0.2, 'sawtooth', 0.1);
        if (player.hull <= 0) { state = 'gameOver'; addMessage('Devoured by ' + m.type.name + '!'); return; }
      }
    }
  }

  // Boss Kraken update
  if (bossActive) {
    updateBoss(dt);
  }

  // Fire cannon at nearby enemies/monsters (WIS reduces cooldown)
  if (keys['Space'] || touch.a) {
    var maxBalls = Math.floor(player.cannons / 2);
    if (cannonballs.length < maxBalls) {
      // STR boosts cannon damage via ball velocity/count
      cannonballs.push({
        x: player.x, y: player.y,
        vx: Math.cos(player.dir) * (5 + statMod(statB.str)),
        vy: Math.sin(player.dir) * (5 + statMod(statB.str)),
        life: 60,
        damage: Math.floor(10 * strDamage())
      });
      TAS.audio.playTone(100, 0.2, 'sawtooth', 0.15, 50);
      TAS.particles.spawn(player.x, player.y, '#888', 5, 2);
    }
  }

  // Update cannonballs
  for (var bi = cannonballs.length - 1; bi >= 0; bi--) {
    var b = cannonballs[bi];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0) { cannonballs.splice(bi, 1); continue; }
    // Hit enemy
    var hitSomething = false;
    for (var ej = enemies.length - 1; ej >= 0; ej--) {
      if (dist(b.x, b.y, enemies[ej].x, enemies[ej].y) < 25) {
        enemies[ej].hull -= b.damage;
        TAS.particles.spawn(enemies[ej].x, enemies[ej].y, '#ff8844', 8, 3);
        TAS.fx.shake(3, 0.9);
        hitSomething = true;
        cannonballs.splice(bi, 1);
        if (enemies[ej].hull <= 0) {
          var goldReward = Math.floor(enemies[ej].gold * intScore());
          player.gold += goldReward;
          player.totalGoldEarned += goldReward;
          player.kills++;
          addMessage(enemies[ej].typeName + ' sunk! +' + goldReward + 'g');
          addFloatingText(enemies[ej].x, enemies[ej].y - 15, '+' + goldReward + 'g', '#ffdd44');
          enemies.splice(ej, 1);
          if (enemies.length < 4) spawnEnemies();
        }
        break;
      }
    }
    if (hitSomething) continue;
    // Hit sea monster
    for (var mj = seaMonsters.length - 1; mj >= 0; mj--) {
      if (dist(b.x, b.y, seaMonsters[mj].x, seaMonsters[mj].y) < seaMonsters[mj].type.size) {
        seaMonsters[mj].hp -= b.damage;
        TAS.particles.spawn(seaMonsters[mj].x, seaMonsters[mj].y, seaMonsters[mj].type.color, 10, 3);
        TAS.fx.shake(4, 0.85);
        cannonballs.splice(bi, 1);
        if (seaMonsters[mj].hp <= 0) {
          var mGold = Math.floor(seaMonsters[mj].type.gold * intScore());
          player.gold += mGold;
          player.totalGoldEarned += mGold;
          player.monstersSlain++;
          addMessage(seaMonsters[mj].type.name + ' slain! +' + mGold + 'g');
          addFloatingText(seaMonsters[mj].x, seaMonsters[mj].y - 15, '+' + mGold + 'g', '#ffdd44');
          // Chance to drop mycelium
          if (Math.random() < 0.5 * chaLuck()) {
            player.cargo[4] = Math.min(player.cargoMax, player.cargo[4] + 1);
            addMessage('Harvested Mycelium!');
          }
          seaMonsters.splice(mj, 1);
          if (seaMonsters.length < 2) spawnMonsters();
        }
        break;
      }
    }
    // Hit boss tentacles
    if (bossActive) {
      if (dist(b.x, b.y, bossX, bossY) < 50) {
        bossHP -= b.damage;
        TAS.particles.spawn(bossX, bossY, '#44ffaa', 12, 4);
        TAS.fx.shake(6, 0.8);
        cannonballs.splice(bi, 1);
        if (bossHP <= 0) {
          defeatKraken();
        }
        continue;
      }
      for (var tk = 0; tk < bossTentacles.length; tk++) {
        var tent = bossTentacles[tk];
        if (!tent.alive) continue;
        var tx = bossX + Math.cos(tent.angle) * tent.length;
        var ty = bossY + Math.sin(tent.angle) * tent.length;
        if (dist(b.x, b.y, tx, ty) < 20) {
          tent.hp -= b.damage;
          TAS.particles.spawn(tx, ty, '#66ddaa', 8, 3);
          cannonballs.splice(bi, 1);
          if (tent.hp <= 0) {
            tent.alive = false;
            addMessage('Tentacle severed!');
            addFloatingText(tx, ty - 10, 'CUT!', '#ff4444');
          }
          break;
        }
      }
    }
  }

  // Update floating texts
  for (var fi = floatingTexts.length - 1; fi >= 0; fi--) {
    floatingTexts[fi].life -= dt;
    floatingTexts[fi].y -= dt * 30;
    if (floatingTexts[fi].life <= 0) floatingTexts.splice(fi, 1);
  }

  // Camera
  camX = player.x - GW / 2;
  camY = player.y - GH / 2;
  camX = clamp(camX, 0, MAP_W - GW);
  camY = clamp(camY, 0, MAP_H - GH);

  // Victory check
  if (player.gold >= 10000) { state = 'victory'; }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  bossAttackTimer -= dt;

  // Boss moves toward player slowly
  var bossAngle = angle(bossX, bossY, player.x, player.y);
  bossX += Math.cos(bossAngle) * 20 * dt;
  bossY += Math.sin(bossAngle) * 20 * dt;

  // Tentacles wiggle
  for (var t = 0; t < bossTentacles.length; t++) {
    var tent = bossTentacles[t];
    if (!tent.alive) continue;
    tent.wobble += dt * tent.speed * 3;
    tent.angle += Math.sin(tent.wobble) * dt * 0.5;
  }

  // Boss attacks: lob projectiles
  if (bossAttackTimer <= 0) {
    bossAttackTimer = 2 - bossPhase * 0.3;
    var liveTentacles = bossTentacles.filter(function(t) { return t.alive; }).length;
    // Each tentacle can fire
    for (var ti = 0; ti < bossTentacles.length; ti++) {
      if (!bossTentacles[ti].alive) continue;
      var ta = bossTentacles[ti].angle;
      var tx = bossX + Math.cos(ta) * bossTentacles[ti].length;
      var ty = bossY + Math.sin(ta) * bossTentacles[ti].length;
      var toPlayer = angle(tx, ty, player.x, player.y);
      cannonballs.push({
        x: tx, y: ty,
        vx: Math.cos(toPlayer) * 3,
        vy: Math.sin(toPlayer) * 3,
        life: 90,
        damage: 8,
        isEnemy: true
      });
    }
    TAS.audio.playTone(60, 0.3, 'sawtooth', 0.15, 30);

    // Phase up as HP drops
    if (bossHP < bossMaxHP * 0.6 && bossPhase === 0) { bossPhase = 1; addMessage('Spore Kraken enraged!'); }
    if (bossHP < bossMaxHP * 0.3 && bossPhase === 1) { bossPhase = 2; addMessage('SPORE KRAKEN FURY!'); }
  }

  // Enemy projectile hits
  for (var bi = cannonballs.length - 1; bi >= 0; bi--) {
    var cb = cannonballs[bi];
    if (!cb.isEnemy) continue;
    if (dist(cb.x, cb.y, player.x, player.y) < 20) {
      var bDmg = Math.max(1, Math.floor(cb.damage / conHP()));
      player.hull -= bDmg;
      TAS.fx.shake(4, 0.85);
      TAS.particles.spawn(player.x, player.y, '#ff4444', 6, 2);
      addFloatingText(player.x, player.y - 15, '-' + bDmg, '#ff4444');
      cannonballs.splice(bi, 1);
      if (player.hull <= 0) { state = 'gameOver'; addMessage('Destroyed by the Spore Kraken!'); return; }
    }
  }
}

function defeatKraken() {
  bossActive = false;
  bossDefeated = true;
  var reward = Math.floor(3000 * intScore());
  player.gold += reward;
  player.totalGoldEarned += reward;
  addMessage('SPORE KRAKEN DEFEATED! +' + reward + ' doubloons!');
  addFloatingText(bossX, bossY - 30, 'DEFEATED!', '#ffdd44');
  TAS.fx.flash('#44ffaa', 0.5);
  TAS.audio.playTone(800, 0.3, 'square', 0.1);
  TAS.audio.playTone(1000, 0.3, 'square', 0.08);
  TAS.particles.spawn(bossX, bossY, '#44ffaa', 30, 5, { gravity: 0.02 });
}

// === PORT ===
function enterPort(port) {
  state = 'port';
  currentPort = port;
  portMenu = 0;
  portCursor = 0;
  portPrices = generatePrices(port);
  menuCooldown = 0.3;
  // CON boosts dock repair
  var dockRepair = Math.floor(5 * conHP());
  player.hull = Math.min(player.maxHull, player.hull + dockRepair);
  if (player.portsVisited.indexOf(port.name) < 0) player.portsVisited.push(port.name);
  saveGame();
  // CHA increases treasure map chance
  var mapChance = 0.2 * chaLuck();
  if (Math.random() < mapChance) {
    for (var i = 0; i < 5; i++) {
      if (!player.treasureMaps[i]) {
        player.treasureMaps[i] = true;
        addMessage('Found a fungal treasure map!');
        break;
      }
    }
  }
}

function updatePort(dt) {
  menuCooldown -= dt;
  if (menuCooldown > 0) return;

  var up = keys['ArrowUp'] || keys['KeyW'] || touch.up;
  var down = keys['ArrowDown'] || keys['KeyS'] || touch.down;
  var action = keys['Enter'] || keys['KeyE'] || keys['Space'] || touch.a;
  var back = keys['Escape'] || keys['Backspace'] || touch.b;

  if (portMenu === 0) {
    var opts = 5;
    if (up) { portCursor = (portCursor - 1 + opts) % opts; menuCooldown = 0.15; }
    if (down) { portCursor = (portCursor + 1) % opts; menuCooldown = 0.15; }
    if (action) {
      menuCooldown = 0.2;
      if (portCursor === 0) { portMenu = 1; portCursor = 0; }
      else if (portCursor === 1) { portMenu = 2; portCursor = 0; }
      else if (portCursor === 2) { portMenu = 3; portCursor = 0; }
      else if (portCursor === 3) { portMenu = 4; portCursor = 0; }
      else { state = 'sailing'; day++; }
    }
  } else if (portMenu === 1) {
    if (up) { portCursor = (portCursor - 1 + 5) % 5; menuCooldown = 0.15; }
    if (down) { portCursor = (portCursor + 1) % 5; menuCooldown = 0.15; }
    if (action) {
      menuCooldown = 0.15;
      var price = portPrices[portCursor];
      var totalCargo = player.cargo.reduce(function(a, b) { return a + b; }, 0);
      if (player.gold >= price && totalCargo < player.cargoMax) {
        player.gold -= price;
        player.cargo[portCursor]++;
        TAS.audio.playTone(400, 0.1, 'square', 0.05);
      } else {
        TAS.audio.playTone(150, 0.1, 'square', 0.08);
      }
    }
    if (back) { portMenu = 0; portCursor = 0; menuCooldown = 0.2; }
  } else if (portMenu === 2) {
    if (up) { portCursor = (portCursor - 1 + 5) % 5; menuCooldown = 0.15; }
    if (down) { portCursor = (portCursor + 1) % 5; menuCooldown = 0.15; }
    if (action) {
      menuCooldown = 0.15;
      if (player.cargo[portCursor] > 0) {
        var sellPrice = Math.floor(portPrices[portCursor] * (1.2 + statMod(statB.cha) * 0.15));
        player.gold += sellPrice;
        player.totalGoldEarned += sellPrice;
        player.cargo[portCursor]--;
        TAS.audio.playTone(500, 0.1, 'square', 0.05);
      } else {
        TAS.audio.playTone(150, 0.1, 'square', 0.08);
      }
    }
    if (back) { portMenu = 0; portCursor = 0; menuCooldown = 0.2; }
  } else if (portMenu === 3) {
    var sOpts = 5;
    if (up) { portCursor = (portCursor - 1 + sOpts) % sOpts; menuCooldown = 0.15; }
    if (down) { portCursor = (portCursor + 1) % sOpts; menuCooldown = 0.15; }
    if (action) {
      menuCooldown = 0.2;
      if (portCursor === 0) {
        var dmg = player.maxHull - player.hull;
        var cost = Math.min(dmg * 5, player.gold);
        var repaired = Math.floor(cost / 5);
        player.hull += repaired;
        player.gold -= repaired * 5;
        if (repaired > 0) { addMessage('Repaired ' + repaired + ' hull.'); TAS.audio.playTone(300, 0.1, 'triangle', 0.05); }
      } else if (portCursor >= 1 && portCursor <= 3) {
        var idx = portCursor;
        var ship = SHIP_TYPES[idx];
        if (player.gold >= ship.cost && player.shipType < idx) {
          player.gold -= ship.cost;
          player.shipType = idx;
          player.maxHull = Math.floor(ship.hull * conHP());
          player.hull = player.maxHull;
          player.cannons = ship.cannons;
          player.cargoMax = ship.cargo;
          player.crewMax = ship.crew;
          addMessage('Purchased ' + ship.name + '!');
          TAS.audio.playTone(600, 0.2, 'square', 0.08);
        } else {
          TAS.audio.playTone(150, 0.1, 'square', 0.08);
        }
      } else if (portCursor === 4) {
        // CHA reduces crew cost
        var crewCost = Math.max(5, Math.floor(10 / chaLuck()));
        if (player.gold >= crewCost && player.crew < player.crewMax) {
          player.gold -= crewCost;
          player.crew++;
          addMessage('Crew hired for ' + crewCost + 'g');
          TAS.audio.playTone(350, 0.1, 'triangle', 0.05);
        }
      }
    }
    if (back) { portMenu = 0; portCursor = 0; menuCooldown = 0.2; }
  } else if (portMenu === 4) {
    var tOpts = 3;
    if (up) { portCursor = (portCursor - 1 + tOpts) % tOpts; menuCooldown = 0.15; }
    if (down) { portCursor = (portCursor + 1) % tOpts; menuCooldown = 0.15; }
    if (action) {
      menuCooldown = 0.2;
      if (portCursor === 0) {
        if (player.gold >= 20) {
          player.gold -= 20;
          var found = false;
          // WIS improves chance of useful rumors
          var rumorBonus = wisNav() > 1.2;
          for (var ri = 0; ri < 5; ri++) {
            if (!player.treasureMaps[ri]) {
              player.treasureMaps[ri] = true;
              addMessage(rumorBonus ? 'Wise insight reveals fungal treasure!' : 'Spore rumor reveals treasure location!');
              found = true;
              TAS.audio.playTone(500, 0.15, 'triangle', 0.06);
              break;
            }
          }
          if (!found) addMessage('No new spore rumors to hear.');
        }
      } else if (portCursor === 1) {
        var payCost = player.crew * 2;
        if (player.gold >= payCost) {
          player.gold -= payCost;
          // CHA boosts morale gain from paying crew
          var moraleGain = Math.floor(20 * chaLuck());
          player.morale = Math.min(100, player.morale + moraleGain);
          addMessage('Crew paid! Morale +' + moraleGain + '!');
          TAS.audio.playTone(400, 0.15, 'triangle', 0.06);
        }
      } else if (portCursor === 2) {
        if (player.gold >= 10) {
          player.gold -= 10;
          var drinkMorale = Math.floor(10 * chaLuck());
          player.morale = Math.min(100, player.morale + drinkMorale);
          addMessage('Fungal grog all around! Morale +' + drinkMorale);
        }
      }
    }
    if (back) { portMenu = 0; portCursor = 0; menuCooldown = 0.2; }
  }
}

// === COMBAT ===
function enterCombat(enemy, idx) {
  state = 'combat';
  combatEnemy = enemy;
  combatEnemy._idx = idx;
  combatAngle = 0;
  combatDist = 150;
  combatCooldown = 0;
  combatBalls = [];
  playerAimAngle = 0;
  enemyHP = enemy.hull;
  playerCombatHP = player.hull;
  addMessage(enemy.typeName.toUpperCase() + ' SPOTTED AHEAD!');
  TAS.audio.playTone(200, 0.3, 'sawtooth', 0.1, 100);
}

function updateCombat(dt) {
  combatAngle += dt * 0.5;
  combatCooldown -= dt;

  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) playerAimAngle -= dt * 2;
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) playerAimAngle += dt * 2;
  playerAimAngle = clamp(playerAimAngle, -0.8, 0.8);

  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) combatDist = Math.min(200, combatDist + dt * 60);
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) combatDist = Math.max(60, combatDist - dt * 60);

  // Fire (WIS reduces cooldown)
  var fireCooldown = 0.8 * wisCooldown();
  if ((keys['Space'] || touch.a) && combatCooldown <= 0) {
    combatCooldown = fireCooldown;
    combatBalls.push({
      x: GW / 4, y: GH / 2,
      vx: 4 + Math.random(),
      vy: playerAimAngle * 3,
      isPlayer: true, life: 80
    });
    TAS.audio.playTone(80, 0.25, 'sawtooth', 0.12, 40);
    TAS.particles.spawn(GW / 4 + 20, GH / 2, '#aaa', 6, 2);
  }

  // Enemy fires
  if (Math.random() < dt * 0.8) {
    combatBalls.push({
      x: GW * 3 / 4, y: GH / 2 + randRange(-40, 40),
      vx: -(3 + Math.random()),
      vy: randRange(-1, 1),
      isPlayer: false, life: 80
    });
    TAS.audio.playTone(90, 0.2, 'sawtooth', 0.08, 45);
  }

  for (var i = combatBalls.length - 1; i >= 0; i--) {
    var b = combatBalls[i];
    b.x += b.vx;
    b.y += b.vy;
    b.vy += 0.05;
    b.life--;
    if (b.life <= 0) { combatBalls.splice(i, 1); continue; }

    // STR boosts hit damage
    if (b.isPlayer && b.x > GW * 3 / 4 - 30 && Math.abs(b.y - GH / 2) < 40) {
      var hitDmg = Math.floor((8 + randInt(0, 4)) * strDamage());
      enemyHP -= hitDmg;
      TAS.particles.spawn(b.x, b.y, '#ff6633', 10, 3);
      TAS.fx.shake(4, 0.85);
      TAS.audio.playTone(150, 0.15, 'square', 0.1);
      combatBalls.splice(i, 1);
      if (enemyHP <= 0) {
        var cGold = Math.floor(combatEnemy.gold * intScore());
        player.gold += cGold;
        player.totalGoldEarned += cGold;
        player.kills++;
        addMessage('Victory! +' + cGold + ' doubloons!');
        player.hull = playerCombatHP;
        enemies.splice(combatEnemy._idx, 1);
        if (enemies.length < 4) spawnEnemies();
        state = 'sailing';
        TAS.fx.flash('#ffaa00', 0.3);
        return;
      }
    } else if (!b.isPlayer && b.x < GW / 4 + 30 && Math.abs(b.y - GH / 2) < 40) {
      // CON reduces incoming damage
      var incDmg = Math.max(1, Math.floor((5 + randInt(0, 3)) / conHP()));
      playerCombatHP -= incDmg;
      TAS.particles.spawn(b.x, b.y, '#ff4444', 8, 2);
      TAS.fx.shake(3, 0.9);
      combatBalls.splice(i, 1);
      if (playerCombatHP <= 0) {
        state = 'gameOver';
        addMessage('Your baseling ship was sunk!');
        return;
      }
    }
  }

  if (combatDist < 80 && (keys['KeyE'] || touch.b)) {
    enterDuel();
  }

  if (keys['Escape'] || keys['Backspace']) {
    // DEX helps flee faster
    state = 'sailing';
    player.hull = playerCombatHP;
    player.x += 100 * dexSpeed();
    addMessage('Fled from battle!');
  }
}

// === DUEL ===
function enterDuel() {
  state = 'duel';
  // CON boosts duel HP
  duelPlayerHP = Math.floor(100 * conHP());
  duelEnemyHP = 80 + combatEnemy.shipType * 20;
  duelPlayerStance = 1;
  duelEnemyStance = 1;
  duelPlayerAttack = -1;
  duelEnemyAttack = -1;
  duelTimer = 0;
  duelText = 'BOARDING! En garde, Baseling Captain ' + statB.name + '!';
  duelCooldown = 1;
  TAS.audio.playTone(400, 0.2, 'sawtooth', 0.08);
}

function updateDuel(dt) {
  duelTimer += dt;
  duelCooldown -= dt;
  if (duelCooldown > 0) return;

  if (keys['ArrowUp'] || keys['KeyW'] || touch.up) { duelPlayerStance = 0; }
  if (keys['ArrowDown'] || keys['KeyS'] || touch.down) { duelPlayerStance = 2; }
  if (!keys['ArrowUp'] && !keys['KeyW'] && !touch.up && !keys['ArrowDown'] && !keys['KeyS'] && !touch.down) {
    duelPlayerStance = 1;
  }

  if ((keys['Space'] || touch.a) && duelPlayerAttack < 0) {
    duelPlayerAttack = duelPlayerStance;
    duelEnemyStance = randInt(0, 2);
    duelEnemyAttack = randInt(0, 2);

    var playerHit = duelPlayerAttack !== duelEnemyStance;
    var enemyHit = duelEnemyAttack !== duelPlayerStance;

    // CHA-based luck: chance to auto-dodge
    if (enemyHit && Math.random() < statMod(statB.cha) * 0.15) {
      enemyHit = false;
      duelText = 'Lucky dodge! ';
    } else {
      duelText = '';
    }

    if (playerHit) {
      // STR boosts sword damage
      var swordDmg = Math.floor((15 + randInt(0, 10)) * strDamage());
      duelEnemyHP -= swordDmg;
      duelText += 'Your blade strikes! (-' + swordDmg + ')';
      TAS.audio.playTone(600, 0.1, 'square', 0.08);
      TAS.particles.spawn(GW * 3 / 4, GH / 2, '#ffdd44', 8, 3);
    } else {
      duelText += 'Blocked!';
      TAS.audio.playTone(200, 0.1, 'triangle', 0.06);
    }

    if (enemyHit) {
      // CON reduces enemy sword damage
      var eDmg = Math.max(1, Math.floor((10 + randInt(0, 8)) / conHP()));
      duelPlayerHP -= eDmg;
      duelText += ' Enemy cuts! (-' + eDmg + ')';
      TAS.audio.playTone(300, 0.1, 'sawtooth', 0.08);
      TAS.fx.shake(3, 0.9);
    } else if (duelText.indexOf('dodge') < 0) {
      duelText += ' You parry!';
    }

    // WIS reduces duel cooldown (faster reaction)
    duelCooldown = 0.6 * wisCooldown();
    duelPlayerAttack = -1;
    duelEnemyAttack = -1;

    if (duelEnemyHP <= 0) {
      addMessage('Mold captain defeated! Ship captured!');
      var dGold = Math.floor(combatEnemy.gold * intScore());
      player.gold += dGold;
      player.totalGoldEarned += dGold;
      player.kills++;
      for (var ci = 0; ci < 5; ci++) player.cargo[ci] = Math.min(player.cargoMax, player.cargo[ci] + (combatEnemy.cargo[ci] || 0));
      player.hull = playerCombatHP;
      player.reputation -= 5;
      enemies.splice(combatEnemy._idx, 1);
      if (enemies.length < 4) spawnEnemies();
      state = 'sailing';
      TAS.fx.flash('#44ff88', 0.3);
      return;
    }
    if (duelPlayerHP <= 0) {
      state = 'gameOver';
      addMessage('Thrown to the spore seas! Game Over.');
      return;
    }
  }
}

// === DRAWING FUNCTIONS ===

function drawOcean() {
  // Zone-based ocean color
  var zone = getZone(player.x, player.y);
  ctx.fillStyle = zone.deep;
  ctx.fillRect(0, 0, GW, GH);

  // Wave lines
  var t = frame * 0.02;
  ctx.strokeStyle = zone.wave;
  ctx.lineWidth = 1;
  for (var y = -20; y < GH + 20; y += 30) {
    ctx.beginPath();
    for (var x = 0; x < GW; x += 10) {
      var wx = x + camX;
      var wy = y + Math.sin((wx + t * 30) * 0.02) * 8 + Math.cos((wx * 0.5 + t * 20) * 0.01) * 4;
      if (x === 0) ctx.moveTo(x, wy);
      else ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // Mycelial current particles (glowing trails)
  for (var ci = 0; ci < CURRENTS.length; ci++) {
    var c = CURRENTS[ci];
    var mx = (c.x1 + c.x2) / 2 - camX;
    var my = (c.y1 + c.y2) / 2 - camY;
    if (mx > -200 && mx < GW + 200 && my > -200 && my < GH + 200) {
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = '#44dd88';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(c.x1 - camX, c.y1 - camY);
      // Wavy current line
      var cmx = (c.x1 + c.x2) / 2 + Math.sin(frame * 0.03) * 30;
      var cmy = (c.y1 + c.y2) / 2 + Math.cos(frame * 0.025) * 30;
      ctx.quadraticCurveTo(cmx - camX, cmy - camY, c.x2 - camX, c.y2 - camY);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Wind/weather particles
  if (weather !== 'clear') {
    ctx.globalAlpha = 0.3;
    for (var wi = 0; wi < 15; wi++) {
      var px = ((frame * 3 + wi * 97) % (GW + 100)) - 50;
      var py = ((frame * 1.5 + wi * 53) % GH);
      ctx.fillStyle = weather === 'storm' ? '#6688aa' : weather === 'sporeFog' ? '#44dd88' : '#88bbdd';
      var pLen = weather === 'storm' ? 12 : weather === 'sporeFog' ? 4 : 6;
      ctx.fillRect(px, py, pLen, weather === 'sporeFog' ? 4 : 1);
    }
    ctx.globalAlpha = 1;
  }

  // Zone name display
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(zone.name, 5, GH - 42);
}

function drawIslands() {
  for (var ii = 0; ii < ISLANDS.length; ii++) {
    var isl = ISLANDS[ii];
    var sx = isl.x - camX;
    var sy = isl.y - camY;
    if (sx < -50 || sx > GW + 50 || sy < -50 || sy > GH + 50) continue;

    // Island type colors
    var landColor = '#3a6633';
    var sandColor = '#ccbb66';
    if (isl.type === 'spore') { landColor = '#2a7744'; sandColor = '#88cc77'; }
    else if (isl.type === 'reactor') { landColor = '#553366'; sandColor = '#aa88cc'; }
    else if (isl.type === 'charred') { landColor = '#443322'; sandColor = '#886644'; }
    else if (isl.type === 'fungal') { landColor = '#225544'; sandColor = '#66aa88'; }

    // Glow effect
    if (isl.glow) {
      ctx.globalAlpha = 0.2 + Math.sin(frame * 0.05 + ii) * 0.1;
      ctx.fillStyle = sandColor;
      ctx.beginPath();
      ctx.arc(sx, sy, isl.r + 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Island shape
    ctx.fillStyle = landColor;
    ctx.beginPath();
    ctx.arc(sx, sy, isl.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = sandColor;
    ctx.lineWidth = 3;
    ctx.stroke();
    // Tree/feature
    ctx.fillStyle = '#664422';
    ctx.fillRect(sx - 2, sy - isl.r * 0.5 - 12, 4, 12);
    ctx.fillStyle = isl.type === 'fungal' ? '#aa66dd' : '#228833';
    ctx.beginPath();
    ctx.arc(sx, sy - isl.r * 0.5 - 15, 8, 0, Math.PI * 2);
    ctx.fill();

    // Treasure sparkle
    if (isl.hasTreasure && player.treasureMaps[isl.treasureId] && !player.treasures[isl.treasureId]) {
      ctx.fillStyle = '#ffdd44';
      var sparkle = Math.sin(frame * 0.1) * 3 + 5;
      ctx.beginPath();
      ctx.arc(sx, sy + 5, sparkle, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Draw reactor islands
  for (var ri = 0; ri < REACTOR_ISLANDS.length; ri++) {
    var rIsland = REACTOR_ISLANDS[ri];
    var rx = rIsland.x - camX;
    var ry = rIsland.y - camY;
    if (rx < -60 || rx > GW + 60 || ry < -60 || ry > GH + 60) continue;

    // Pulsing glow
    var pulse = Math.sin(frame * 0.04 + ri * 2) * 0.15 + 0.3;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = rIsland.glow;
    ctx.beginPath();
    ctx.arc(rx, ry, rIsland.r + 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Island body
    ctx.fillStyle = rIsland.color;
    ctx.beginPath();
    ctx.arc(rx, ry, rIsland.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Reactor symbol (spinning)
    ctx.save();
    ctx.translate(rx, ry);
    ctx.rotate(frame * 0.02);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    for (var s = 0; s < 3; s++) {
      ctx.beginPath();
      ctx.arc(0, 0, rIsland.r * 0.5, s * 2.1, s * 2.1 + 1.2);
      ctx.stroke();
    }
    ctx.restore();

    // Name
    if (dist(player.x, player.y, rIsland.x, rIsland.y) < 100) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(rIsland.name, rx, ry + rIsland.r + 15);
    }
  }
}

function drawPorts() {
  for (var pi = 0; pi < PORTS.length; pi++) {
    var p = PORTS[pi];
    var sx = p.x - camX;
    var sy = p.y - camY;
    if (sx < -60 || sx > GW + 60 || sy < -60 || sy > GH + 60) continue;

    // Port dock
    ctx.fillStyle = '#554433';
    ctx.fillRect(sx - 20, sy - 15, 40, 30);
    // Buildings
    ctx.fillStyle = p.color;
    ctx.fillRect(sx - 12, sy - 20, 10, 15);
    ctx.fillRect(sx + 2, sy - 18, 10, 13);
    ctx.fillStyle = '#332211';
    ctx.fillRect(sx - 14, sy - 5, 28, 10);
    // Flag
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx, sy - 28, 1, 12);
    ctx.fillStyle = p.color;
    ctx.fillRect(sx + 1, sy - 28, 8, 5);
    // Dock lights
    var lightPulse = Math.sin(frame * 0.06 + pi) * 0.3 + 0.7;
    ctx.globalAlpha = lightPulse * 0.5;
    ctx.fillStyle = '#ffdd88';
    ctx.beginPath();
    ctx.arc(sx - 15, sy + 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 15, sy + 12, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Name (when close)
    if (dist(player.x, player.y, p.x, p.y) < 120) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(p.name, sx, sy + 28);
      if (dist(player.x, player.y, p.x, p.y) < 50) {
        ctx.fillStyle = '#ffdd44';
        ctx.fillText('[ACTION to dock]', sx, sy + 38);
      }
    }
  }
}

function drawShip(x, y, dir, type, color, damaged) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(dir);

  var sizes = [
    { l: 22, w: 8 },
    { l: 30, w: 11 },
    { l: 38, w: 14 },
    { l: 34, w: 12 } // Reactor Ship
  ];
  var s = sizes[type] || sizes[0];

  // Hull
  ctx.fillStyle = color || '#8B4513';
  ctx.beginPath();
  ctx.moveTo(s.l / 2, 0);
  ctx.lineTo(-s.l / 2, -s.w / 2);
  ctx.lineTo(-s.l / 2, s.w / 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Mast + sail
  ctx.fillStyle = '#ddd';
  ctx.fillRect(-2, -s.w * 0.8, 4, s.w * 1.6);
  ctx.fillStyle = damaged ? '#999' : (type === 3 ? '#aa88dd' : '#eee');
  ctx.beginPath();
  ctx.moveTo(0, -s.w * 0.7);
  ctx.quadraticCurveTo(8, 0, 0, s.w * 0.7);
  ctx.lineTo(0, -s.w * 0.7);
  ctx.fill();

  // Reactor glow on type 3
  if (type === 3) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.08) * 0.15;
    ctx.fillStyle = '#aa44dd';
    ctx.beginPath();
    ctx.arc(-s.l * 0.2, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Damage marks
  if (damaged) {
    ctx.fillStyle = '#442200';
    ctx.fillRect(-5, -2, 3, 3);
    ctx.fillRect(3, 1, 2, 2);
    // Smoke particles from damage
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(-3, -s.w * 0.3 - Math.sin(frame * 0.1) * 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawSeaMonsters() {
  for (var mi = 0; mi < seaMonsters.length; mi++) {
    var m = seaMonsters[mi];
    var sx = m.x - camX;
    var sy = m.y - camY;
    if (sx < -60 || sx > GW + 60 || sy < -60 || sy > GH + 60) continue;

    // Body segments (snake-like)
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(m.dir);

    // Main body
    ctx.fillStyle = m.type.color;
    ctx.beginPath();
    ctx.arc(0, 0, m.type.size * 0.6, 0, Math.PI * 2);
    ctx.fill();

    // Tail segments
    for (var seg = 1; seg < 4; seg++) {
      var segX = -seg * m.type.size * 0.5;
      var segY = Math.sin(m.wobble + seg * 0.8) * 6;
      ctx.globalAlpha = 1 - seg * 0.2;
      ctx.beginPath();
      ctx.arc(segX, segY, m.type.size * 0.4 - seg * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Eyes
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(m.type.size * 0.3, -m.type.size * 0.2, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(m.type.size * 0.3, m.type.size * 0.2, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // HP bar when damaged
    if (m.hp < m.maxHp) {
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - 15, sy - m.type.size - 8, 30, 4);
      ctx.fillStyle = '#dd4444';
      ctx.fillRect(sx - 15, sy - m.type.size - 8, 30 * (m.hp / m.maxHp), 4);
    }

    // Name when close
    if (dist(player.x, player.y, m.x, m.y) < 100) {
      ctx.fillStyle = '#ff8888';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(m.type.name, sx, sy - m.type.size - 12);
    }
  }
}

function drawBoss() {
  if (!bossActive) return;
  var bx = bossX - camX;
  var by = bossY - camY;
  if (bx < -100 || bx > GW + 100 || by < -100 || by > GH + 100) return;

  // Kraken body
  var bPulse = Math.sin(frame * 0.03) * 0.1 + 0.9;
  ctx.save();
  ctx.translate(bx, by);
  ctx.scale(bPulse, bPulse);

  // Main body
  ctx.fillStyle = '#225544';
  ctx.beginPath();
  ctx.arc(0, 0, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#44aa88';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Eyes
  var eyeGlow = bossPhase === 2 ? '#ff2222' : bossPhase === 1 ? '#ffaa00' : '#44ffaa';
  ctx.fillStyle = eyeGlow;
  ctx.beginPath();
  ctx.arc(-12, -10, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12, -10, 6, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-12, -10, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(12, -10, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Tentacles
  for (var ti = 0; ti < bossTentacles.length; ti++) {
    var tent = bossTentacles[ti];
    if (!tent.alive) continue;

    var t1x = bx;
    var t1y = by;
    var t2x = bx + Math.cos(tent.angle) * tent.length;
    var t2y = by + Math.sin(tent.angle) * tent.length;
    var midX = (t1x + t2x) / 2 + Math.sin(tent.wobble) * 15;
    var midY = (t1y + t2y) / 2 + Math.cos(tent.wobble) * 15;

    ctx.strokeStyle = '#338866';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(t1x, t1y);
    ctx.quadraticCurveTo(midX, midY, t2x, t2y);
    ctx.stroke();

    // Sucker dots
    ctx.fillStyle = '#55aa88';
    for (var sd = 0.2; sd < 1; sd += 0.25) {
      var sdx = t1x + (t2x - t1x) * sd + Math.sin(tent.wobble + sd * 5) * 5;
      var sdy = t1y + (t2y - t1y) * sd + Math.cos(tent.wobble + sd * 5) * 5;
      ctx.beginPath();
      ctx.arc(sdx, sdy, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Tentacle tip
    ctx.fillStyle = '#44ddaa';
    ctx.beginPath();
    ctx.arc(t2x, t2y, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Boss HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(bx - 50, by - 60, 100, 8);
  ctx.fillStyle = bossPhase === 2 ? '#ff4444' : bossPhase === 1 ? '#ffaa44' : '#44ddaa';
  ctx.fillRect(bx - 50, by - 60, 100 * (bossHP / bossMaxHP), 8);
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPORE KRAKEN', bx, by - 65);
}

function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    var sx = e.x - camX;
    var sy = e.y - camY;
    if (sx < -40 || sx > GW + 40 || sy < -40 || sy > GH + 40) continue;
    var dmg = e.hull < e.maxHull * 0.5;
    drawShip(sx, sy, e.dir, e.shipType, e.color, dmg);

    // Alert icon
    if (e.aggressive && e.alertTimer > 0) {
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('!', sx, sy - 20);
    }
    // Skull flag for aggressive
    if (e.aggressive) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('\u2620', sx, sy - 15);
    }
    // Fleeing indicator
    if (e.fleeing) {
      ctx.fillStyle = '#88ccff';
      ctx.font = '7px monospace';
      ctx.fillText('~flee~', sx, sy - 15);
    }
    // HP bar when damaged
    if (e.hull < e.maxHull) {
      ctx.fillStyle = '#333';
      ctx.fillRect(sx - 12, sy + 12, 24, 3);
      ctx.fillStyle = '#dd4444';
      ctx.fillRect(sx - 12, sy + 12, 24 * (e.hull / e.maxHull), 3);
    }
  }
}

function drawCannonballs() {
  for (var bi = 0; bi < cannonballs.length; bi++) {
    var b = cannonballs[bi];
    var sx = b.x - camX;
    var sy = b.y - camY;
    ctx.fillStyle = b.isEnemy ? '#884444' : '#222';
    ctx.beginPath();
    ctx.arc(sx, sy, b.isEnemy ? 4 : 3, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(sx - b.vx * 2, sy - b.vy * 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawFloatingTexts() {
  for (var fi = 0; fi < floatingTexts.length; fi++) {
    var ft = floatingTexts[fi];
    var fx = ft.x - camX;
    var fy = ft.y - camY;
    ctx.globalAlpha = ft.life / ft.maxLife;
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, fx, fy);
    ctx.globalAlpha = 1;
  }
}

function drawMinimap() {
  var mmW = 80, mmH = 80;
  var mx = GW - mmW - 5, my = GH - mmH - 5;
  ctx.fillStyle = 'rgba(10,20,40,0.8)';
  ctx.fillRect(mx, my, mmW, mmH);
  ctx.strokeStyle = '#446688';
  ctx.strokeRect(mx, my, mmW, mmH);

  // Ports
  for (var pi = 0; pi < PORTS.length; pi++) {
    var p = PORTS[pi];
    var px = mx + (p.x / MAP_W) * mmW;
    var py = my + (p.y / MAP_H) * mmH;
    ctx.fillStyle = p.color;
    ctx.fillRect(px - 1, py - 1, 3, 3);
  }

  // Reactor islands
  for (var ri = 0; ri < REACTOR_ISLANDS.length; ri++) {
    var rI = REACTOR_ISLANDS[ri];
    var rpx = mx + (rI.x / MAP_W) * mmW;
    var rpy = my + (rI.y / MAP_H) * mmH;
    ctx.fillStyle = rI.color;
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.05 + ri) * 0.3;
    ctx.fillRect(rpx - 1, rpy - 1, 3, 3);
    ctx.globalAlpha = 1;
  }

  // Treasure maps
  for (var ti = 0; ti < ISLANDS.length; ti++) {
    var tIsl = ISLANDS[ti];
    if (tIsl.hasTreasure && player.treasureMaps[tIsl.treasureId] && !player.treasures[tIsl.treasureId]) {
      var tpx = mx + (tIsl.x / MAP_W) * mmW;
      var tpy = my + (tIsl.y / MAP_H) * mmH;
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(tpx - 1, tpy - 1, 3, 3);
    }
  }

  // Kraken
  if (bossActive) {
    var bpx = mx + (bossX / MAP_W) * mmW;
    var bpy = my + (bossY / MAP_H) * mmH;
    ctx.fillStyle = frame % 30 < 15 ? '#ff2222' : '#441111';
    ctx.fillRect(bpx - 2, bpy - 2, 4, 4);
  }

  // Player
  var ppx = mx + (player.x / MAP_W) * mmW;
  var ppy = my + (player.y / MAP_H) * mmH;
  ctx.fillStyle = statB.color || '#44ff88';
  ctx.fillRect(ppx - 2, ppy - 2, 4, 4);

  // Enemies
  ctx.fillStyle = '#ff4444';
  for (var ei = 0; ei < enemies.length; ei++) {
    var ex = mx + (enemies[ei].x / MAP_W) * mmW;
    var ey = my + (enemies[ei].y / MAP_H) * mmH;
    ctx.fillRect(ex - 1, ey - 1, 2, 2);
  }

  // Sea monsters
  ctx.fillStyle = '#44ddaa';
  for (var mi = 0; mi < seaMonsters.length; mi++) {
    var smx = mx + (seaMonsters[mi].x / MAP_W) * mmW;
    var smy = my + (seaMonsters[mi].y / MAP_H) * mmH;
    ctx.fillRect(smx - 1, smy - 1, 2, 2);
  }
}

function drawCombatScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.strokeStyle = '#224466';
  ctx.lineWidth = 1;
  for (var y = 0; y < GH; y += 40) {
    ctx.beginPath();
    for (var x = 0; x < GW; x += 8) {
      var wy = y + Math.sin((x + frame * 2) * 0.03) * 5;
      if (x === 0) ctx.moveTo(x, wy);
      else ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // Player ship (left side) — baseling flag color
  ctx.save();
  ctx.translate(GW / 4, GH / 2);
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(-25, -18);
  ctx.lineTo(-30, -15);
  ctx.lineTo(-30, 15);
  ctx.lineTo(-25, 18);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#442200';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#eee';
  ctx.fillRect(-5, -30, 3, 60);
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.moveTo(-3, -25);
  ctx.quadraticCurveTo(15, 0, -3, 25);
  ctx.lineTo(-3, -25);
  ctx.fill();
  // Baseling flag
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.fillRect(-3, -32, 10, 6);
  ctx.fillStyle = '#fff';
  ctx.font = '5px monospace';
  ctx.fillText(statB.icon || 'B', 0, -28);
  // Cannons
  ctx.fillStyle = '#333';
  for (var ci = 0; ci < Math.min(player.cannons, 6); ci++) {
    ctx.fillRect(-15 + ci * 8, -20, 3, 4);
    ctx.fillRect(-15 + ci * 8, 16, 3, 4);
  }
  ctx.restore();

  // Enemy ship (right side)
  var ecy = GH / 2 + Math.sin(combatAngle) * 20;
  ctx.save();
  ctx.translate(GW * 3 / 4, ecy);
  ctx.scale(-1, 1);
  ctx.fillStyle = combatEnemy.color || '#551111';
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(-25, -18);
  ctx.lineTo(-30, -15);
  ctx.lineTo(-30, 15);
  ctx.lineTo(-25, 18);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#330000';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.fillRect(-5, -28, 3, 56);
  ctx.fillStyle = '#bb8888';
  ctx.beginPath();
  ctx.moveTo(-3, -22);
  ctx.quadraticCurveTo(12, 0, -3, 22);
  ctx.lineTo(-3, -22);
  ctx.fill();
  ctx.restore();

  // Aim line
  ctx.strokeStyle = 'rgba(255,200,0,0.4)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(GW / 4 + 30, GH / 2);
  ctx.lineTo(GW / 4 + 150, GH / 2 + playerAimAngle * 100);
  ctx.stroke();
  ctx.setLineDash([]);

  // Cannonballs
  for (var cbi = 0; cbi < combatBalls.length; cbi++) {
    var cb = combatBalls[cbi];
    ctx.fillStyle = cb.isPlayer ? '#222' : '#663333';
    ctx.beginPath();
    ctx.arc(cb.x, cb.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(100,100,100,0.3)';
    ctx.beginPath();
    ctx.arc(cb.x - cb.vx * 2, cb.y - cb.vy * 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // HP bars
  ctx.fillStyle = '#333';
  ctx.fillRect(30, 20, 120, 10);
  ctx.fillRect(GW - 150, 20, 120, 10);
  ctx.fillStyle = '#44dd88';
  ctx.fillRect(30, 20, 120 * (playerCombatHP / player.maxHull), 10);
  ctx.fillStyle = '#dd4444';
  ctx.fillRect(GW - 150, 20, 120 * Math.max(0, enemyHP / combatEnemy.maxHull), 10);

  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  ctx.fillText('CPT. ' + statB.name.toUpperCase(), 30, 16);
  ctx.textAlign = 'right';
  ctx.fillText(combatEnemy.typeName.toUpperCase(), GW - 30, 16);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('UP/DOWN=aim  FIRE=cannon  LEFT/RIGHT=distance  ACTION=board', GW / 2, GH - 10);

  ctx.fillStyle = combatDist < 80 ? '#44ff88' : '#aaa';
  ctx.fillText('Range: ' + Math.floor(combatDist) + (combatDist < 80 ? ' [BOARD READY]' : ''), GW / 2, GH - 25);
}

function drawDuelist(x, y, stance, color, flipped) {
  ctx.save();
  ctx.translate(x, y);
  if (flipped) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = color;
  ctx.fillRect(-8, -20, 16, 35);

  // Head (baseling-style for player)
  ctx.fillStyle = '#dda';
  ctx.beginPath();
  ctx.arc(0, -28, 10, 0, Math.PI * 2);
  ctx.fill();
  // Hat/cap
  ctx.fillStyle = flipped ? '#333' : (color || '#333');
  ctx.fillRect(-12, -38, 24, 8);
  ctx.fillRect(-6, -44, 12, 8);

  // Legs
  ctx.fillStyle = '#443322';
  ctx.fillRect(-6, 15, 5, 18);
  ctx.fillRect(1, 15, 5, 18);

  // Sword arm
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 3;
  ctx.beginPath();
  if (stance === 0) {
    ctx.moveTo(10, -15);
    ctx.lineTo(30, -30);
    ctx.lineTo(45, -35);
  } else if (stance === 1) {
    ctx.moveTo(10, -5);
    ctx.lineTo(30, -5);
    ctx.lineTo(45, -5);
  } else {
    ctx.moveTo(10, 5);
    ctx.lineTo(30, 15);
    ctx.lineTo(45, 25);
  }
  ctx.stroke();
  ctx.fillStyle = '#fff';
  if (stance === 0) ctx.fillRect(43, -37, 4, 4);
  else if (stance === 1) ctx.fillRect(43, -7, 4, 4);
  else ctx.fillRect(43, 23, 4, 4);

  ctx.restore();
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    if (keys['KeyC'] || touch.c) {
      keys['KeyC'] = false; touch.c = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(keys).some(Boolean) || touch.a || touch.b) {
      TAS.audio.ensureAudio();
      if (!loadGame()) initGame();
      else addMessage('Welcome back, Baseling Captain ' + statB.name + '!');
      if (showTutorial && day <= 1) {
        state = 'tutorial';
        tutorialStep = 0;
        tutorialTimer = 0;
      } else {
        state = 'sailing';
      }
    }
    return;
  }

  if (state === 'tutorial') {
    updateTutorial(dt);
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(keys).some(Boolean) || touch.a) {
      try { localStorage.removeItem(SAVE_KEY); } catch(e) { /* non-critical */ }
      state = 'title';
    }
    return;
  }

  if (state === 'sailing') updateSailing(dt);
  else if (state === 'port') updatePort(dt);
  else if (state === 'combat') updateCombat(dt);
  else if (state === 'duel') updateDuel(dt);
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'tutorial') {
    drawTutorialScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  ctx.save();
  TAS.fx.applyShake();

  if (state === 'sailing') {
    drawOcean();
    drawIslands();
    drawPorts();
    drawSeaMonsters();
    drawBoss();
    drawEnemies();
    drawCannonballs();
    drawFloatingTexts();
    // Player ship with baseling color accent
    var px = player.x - camX;
    var py = player.y - camY;
    drawShip(px, py, player.dir, player.shipType, '#8B4513', player.hull < player.maxHull * 0.3);
    // Baseling captain on the player ship deck — selected baseling sprite, icon fallback.
    if (!(window.TAS && TAS.drawBaseling && TAS.drawBaseling(ctx, px, py - 10, 13, { flipX: Math.cos(player.dir) < 0, frame: frame, anim: 'idle' }))) {
      ctx.fillStyle = statB.color || '#44dd88';
      ctx.font = 'bold 6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(statB.icon || 'B', px, py - 12);
    }
    // Wake particles
    if (player.speed > 0.5) {
      var wx = px - Math.cos(player.dir) * 15;
      var wy = py - Math.sin(player.dir) * 15;
      if (frame % 3 === 0) TAS.particles.spawn(wx, wy, '#88bbdd', 1, 0.5, { size: 1, gravity: 0 });
    }
    // Current zone particles
    var zone = getZone(player.x, player.y);
    if (zone.fog && frame % 8 === 0) {
      var fsx = Math.random() * GW;
      var fsy = Math.random() * GH;
      TAS.particles.spawn(fsx, fsy, '#44dd8844', 1, 0.2, { size: 5, gravity: 0 });
    }
    TAS.particles.draw();
    drawMinimap();
    drawSailingHUD();
  } else if (state === 'port') {
    drawPortScreen();
  } else if (state === 'combat') {
    drawCombatScreen();
    TAS.particles.draw();
  } else if (state === 'duel') {
    drawDuelScreen();
    TAS.particles.draw();
  }

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // Storm overlay
  if (stormAlpha > 0 && state === 'sailing') {
    ctx.globalAlpha = stormAlpha;
    ctx.fillStyle = '#223344';
    ctx.fillRect(0, 0, GW, GH);
    if (Math.random() < 0.005) {
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.5;
      ctx.fillRect(0, 0, GW, GH);
      TAS.audio.playNoise(0.3, 0.1, 200);
    }
    ctx.globalAlpha = 1;
  }

  // Spore fog overlay
  if (fogAlpha > 0 && state === 'sailing') {
    ctx.globalAlpha = fogAlpha;
    ctx.fillStyle = '#1a3322';
    ctx.fillRect(0, 0, GW, GH);
    // Floating spore dots
    for (var sfi = 0; sfi < 20; sfi++) {
      var sfx = ((frame * 0.5 + sfi * 73) % GW);
      var sfy = ((frame * 0.3 + sfi * 41) % GH);
      ctx.fillStyle = '#44dd88';
      ctx.globalAlpha = fogAlpha * 0.5;
      ctx.beginPath();
      ctx.arc(sfx, sfy, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Animated spore particles in background
  for (var sp = 0; sp < 12; sp++) {
    var spx = ((frame * 0.3 + sp * 40) % GW);
    var spy = ((frame * 0.2 + sp * 27) % GH);
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = 0.15;
    ctx.beginPath();
    ctx.arc(spx, spy, 2 + Math.sin(frame * 0.03 + sp) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Waves
  ctx.strokeStyle = '#1a3355';
  ctx.lineWidth = 2;
  for (var y = 80; y < GH; y += 25) {
    ctx.beginPath();
    for (var x = 0; x < GW; x += 8) {
      var wy = y + Math.sin((x + frame * 1.5) * 0.03) * 6;
      if (x === 0) ctx.moveTo(x, wy);
      else ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // Ship silhouette
  ctx.save();
  ctx.translate(GW / 2, GH * 0.55 + Math.sin(frame * 0.03) * 5);
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.moveTo(50, 0);
  ctx.lineTo(-40, -20);
  ctx.lineTo(-50, -15);
  ctx.lineTo(-50, 15);
  ctx.lineTo(-40, 20);
  ctx.closePath();
  ctx.fill();
  ctx.fillRect(-5, -45, 4, 60);
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.moveTo(-3, -40);
  ctx.quadraticCurveTo(20, 0, -3, 30);
  ctx.lineTo(-3, -40);
  ctx.fill();
  // Baseling flag on ship
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.fillRect(-3, -48, 10, 6);
  ctx.restore();

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('PIRATES OF TASERN', GW / 2 + 2, GH * 0.15 + 2);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('PIRATES OF TASERN', GW / 2, GH * 0.15);

  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Spore Seas ~ Pirate Gardens ~ Fungal Treasure', GW / 2, GH * 0.22);

  // Selected baseling captain preview (idle bob) + name + 5 arcade stat bars
  TAS.drawBaseling(ctx, GW / 2, GH * 0.28, 22, { anim: 'idle', frame: frame });
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CAPTAIN: ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, GH * 0.36);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW / 2 - 110;
    ctx.font = '8px monospace';
    var _by = GH * 0.42;
    for (var _si = 0; _si < _keys.length; _si++) {
      var _mm = _meta[_keys[_si]], _v = _sel.stats[_keys[_si]], _bx = _x0 + _si * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _by);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _by + 3, 38, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _by + 3, 38 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH * 0.50);

  // NES-style controls
  ctx.fillStyle = '#556677';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS/WASD = Sail    SPACE = Cannon', GW / 2, GH * 0.68);
  ctx.fillText('E/ENTER = Interact    ESC = Back/Flee', GW / 2, GH * 0.73);
  ctx.fillText('PWR=cannon dmg  SPD=sail speed  STA=hull  LCK=loot/luck', GW / 2, GH * 0.80);
  ctx.fillText('Win: 10,000 doubloons OR find all 5 fungal treasures', GW / 2, GH * 0.85);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO SET SAIL', GW / 2, GH * 0.93);
  ctx.globalAlpha = 1;
}

function drawTutorialScreen() {
  // Dark ocean bg
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Waves
  ctx.strokeStyle = '#1a3355';
  ctx.lineWidth = 1;
  for (var y = 0; y < GH; y += 30) {
    ctx.beginPath();
    for (var x = 0; x < GW; x += 10) {
      var wy = y + Math.sin((x + frame * 1.2) * 0.025) * 5;
      if (x === 0) ctx.moveTo(x, wy);
      else ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // Tutorial box
  ctx.fillStyle = 'rgba(10, 20, 40, 0.9)';
  ctx.fillRect(40, GH * 0.25, GW - 80, GH * 0.5);
  ctx.strokeStyle = '#446688';
  ctx.lineWidth = 2;
  ctx.strokeRect(40, GH * 0.25, GW - 80, GH * 0.5);

  var step = TUTORIAL_STEPS[tutorialStep];

  // Step counter
  ctx.fillStyle = '#446688';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('(' + (tutorialStep + 1) + '/' + TUTORIAL_STEPS.length + ')', GW / 2, GH * 0.32);

  // Main text
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(step.text, GW / 2, GH * 0.45);

  // Sub text
  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText(step.sub, GW / 2, GH * 0.55);

  // Continue prompt
  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '9px monospace';
  ctx.fillText('Press any key to continue', GW / 2, GH * 0.70);
  ctx.globalAlpha = 1;
}

function drawGameOverScreen() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Sinking ship
  ctx.save();
  ctx.translate(GW / 2, GH * 0.4);
  ctx.rotate(0.3);
  ctx.fillStyle = '#442200';
  ctx.beginPath();
  ctx.moveTo(30, 0);
  ctx.lineTo(-20, -12);
  ctx.lineTo(-25, -10);
  ctx.lineTo(-25, 10);
  ctx.lineTo(-20, 12);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.fillRect(-3, -20, 3, 25);
  ctx.restore();

  // Water covering
  ctx.fillStyle = '#1a3355';
  ctx.fillRect(0, GH * 0.45, GW, GH * 0.55);

  // Bubbles
  for (var bi = 0; bi < 5; bi++) {
    var bx = GW / 2 + Math.sin(frame * 0.04 + bi * 1.3) * 40;
    var by = GH * 0.45 + ((frame + bi * 30) % 60);
    ctx.strokeStyle = '#88ccff';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(bx, by, 3 + bi, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('GAME OVER', GW / 2, GH * 0.2);

  ctx.fillStyle = '#ffffff';
  ctx.font = '11px monospace';
  if (messages.length > 0) ctx.fillText(messages[0], GW / 2, GH * 0.6);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('Baseling Cpt. ' + statB.name + ' | Doubloons: ' + player.gold + ' | Days: ' + day, GW / 2, GH * 0.7);

  ctx.fillText('Ships Sunk: ' + player.kills + '  Creatures: ' + player.monstersSlain, GW / 2, GH * 0.77);

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH * 0.9);
  ctx.globalAlpha = 1;
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Fireworks + spore bursts
  if (frame % 20 === 0) {
    TAS.particles.spawn(randRange(50, GW - 50), randRange(30, GH / 2), '#ffdd44', 15, 3, { gravity: 0.05 });
  }
  if (frame % 35 === 0) {
    TAS.particles.spawn(randRange(50, GW - 50), randRange(30, GH / 2), '#44dd88', 12, 2.5, { gravity: 0.04 });
  }
  if (frame % 50 === 0) {
    TAS.particles.spawn(randRange(50, GW - 50), randRange(30, GH / 2), '#aa66dd', 10, 2, { gravity: 0.03 });
  }
  TAS.particles.draw();

  ctx.textAlign = 'center';
  var pulse = Math.sin(frame * 0.04) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, GH * 0.15);
  ctx.globalAlpha = 1;

  ctx.fillStyle = '#ffffff';
  ctx.font = '12px monospace';
  ctx.fillText('Baseling Captain ' + statB.name + ' conquers the Spore Seas!', GW / 2, GH * 0.28);

  ctx.fillStyle = '#f4b41b';
  ctx.font = '11px monospace';
  ctx.fillText('Final Doubloons: ' + player.gold, GW / 2, GH * 0.40);
  ctx.fillText('Days Sailed: ' + day, GW / 2, GH * 0.47);
  ctx.fillText('Ship: ' + SHIP_TYPES[player.shipType].name, GW / 2, GH * 0.54);
  var treasures = player.treasures.filter(function(t) { return t; }).length;
  ctx.fillText('Fungal Treasures: ' + treasures + '/5', GW / 2, GH * 0.61);
  ctx.fillText('Ships Sunk: ' + player.kills + '  Creatures Slain: ' + player.monstersSlain, GW / 2, GH * 0.68);
  ctx.fillText('Ports Visited: ' + player.portsVisited.length + '/' + PORTS.length, GW / 2, GH * 0.75);
  if (bossDefeated) {
    ctx.fillStyle = '#44ffaa';
    ctx.fillText('** SPORE KRAKEN DEFEATED **', GW / 2, GH * 0.82);
  }

  var p2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = p2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY FOR NEW GAME', GW / 2, GH * 0.93);
  ctx.globalAlpha = 1;
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
