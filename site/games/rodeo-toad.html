<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rodeo Toad</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; image-rendering: pixelated; image-rendering: crisp-edges; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// BASELING STAT BLOCK (NftLoader integration)
// ============================================================
var statB = {
  damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1,
  cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10,
  level: 0, color: '#44dd88', name: 'Baseling', icon: 'B'
};
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    statB = NftLoader.getStatBonuses();
  }
} catch(e) { console.warn('NftLoader stat load failed:', e); }

// Stat helper functions
function statMod(stat) { return Math.floor((stat - 10) / 2); }
function strMod() { return statMod(statB.str); }
function dexMod() { return statMod(statB.dex); }
function conMod() { return statMod(statB.con); }
function intMod() { return statMod(statB.int); }
function wisMod() { return statMod(statB.wis); }
function chaMod() { return statMod(statB.cha); }

// ============================================================
// GRID & LAYOUT
// ============================================================
var COLS = 13;
var ROWS = 15;
var BASE_TILE = 36;

// Zone themes per level
var ZONE_THEMES = [
  { name: 'Verdant Meadow', bg1: '#2d5a1e', bg2: '#3a7d2a', fence: '#5a4a2a', bear: '#8a6a3a', bull: '#4a6a3a', particle: '#4a9d3a' },
  { name: 'Dusty Canyon', bg1: '#6a4a2a', bg2: '#8a6a3a', fence: '#7a5a3a', bear: '#aa7a3a', bull: '#6a5a3a', particle: '#c8a86e' },
  { name: 'Frozen Peaks', bg1: '#3a5a7a', bg2: '#5a7a9a', fence: '#6a7a8a', bear: '#8a9aaa', bull: '#4a7a8a', particle: '#aaccee' },
  { name: 'Murky Swamp', bg1: '#2a3a1a', bg2: '#3a4a2a', fence: '#4a4a2a', bear: '#5a5a2a', bull: '#3a5a2a', particle: '#6a8a3a' },
  { name: 'Volcanic Ridge', bg1: '#4a1a0a', bg2: '#6a2a0a', fence: '#5a3a2a', bear: '#8a3a1a', bull: '#5a2a1a', particle: '#ff6a2a' },
  { name: 'Crystal Cavern', bg1: '#1a1a3a', bg2: '#2a2a5a', fence: '#3a3a5a', bear: '#4a3a6a', bull: '#2a3a5a', particle: '#8a6aff' },
];

// Lane layout (top=0, bottom=14)
var LANE_TYPES = [];
LANE_TYPES[0]  = 'goal';
LANE_TYPES[1]  = 'fence';
LANE_TYPES[2]  = 'bull';
LANE_TYPES[3]  = 'bull';
LANE_TYPES[4]  = 'fence';
LANE_TYPES[5]  = 'bear';
LANE_TYPES[6]  = 'bear';
LANE_TYPES[7]  = 'fence';
LANE_TYPES[8]  = 'bull';
LANE_TYPES[9]  = 'bull';
LANE_TYPES[10] = 'fence';
LANE_TYPES[11] = 'bear';
LANE_TYPES[12] = 'bear';
LANE_TYPES[13] = 'fence';
LANE_TYPES[14] = 'start';

// ============================================================
// CANVAS
// ============================================================
var canvas = document.getElementById('gc');
var ctx = canvas.getContext('2d');
var W, H, TILE, SCALE;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var sw = window.innerWidth;
  var sh = window.innerHeight - 24;
  SCALE = Math.min(sw / (COLS * BASE_TILE), sh / (ROWS * BASE_TILE));
  TILE = Math.floor(BASE_TILE * SCALE);
  W = COLS * TILE;
  H = ROWS * TILE;
  var oy = Math.floor((sh - H) / 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, oy) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// NES PIXEL HELPERS
// ============================================================
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function pxCircle(cx, cy, r, color) {
  ctx.fillStyle = color;
  var step = Math.max(1, Math.floor(r / 3));
  for (var dy = -r; dy <= r; dy += step) {
    var halfW = Math.floor(Math.sqrt(r * r - dy * dy));
    ctx.fillRect(Math.floor(cx - halfW), Math.floor(cy + dy), halfW * 2, step);
  }
}

function pxRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

// ============================================================
// AUDIO
// ============================================================
var audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
  gain.gain.setValueAtTime(vol || 0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function playNoise(dur, vol, freq) {
  if (!audioCtx) return;
  var t = audioCtx.currentTime;
  var bufSize = Math.floor(audioCtx.sampleRate * dur);
  var buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  var src = audioCtx.createBufferSource();
  src.buffer = buf;
  var gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.04, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  var filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = freq || 600;
  filt.Q.value = 1;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);
}

function sfxHop() {
  playTone(280, 0.08, 'square', 0.10, 420);
  playTone(420, 0.06, 'square', 0.07, 500);
}
function sfxSplat() {
  playNoise(0.25, 0.12, 400);
  playTone(200, 0.15, 'square', 0.08, 80);
}
function sfxLand() {
  playTone(523, 0.08, 'square', 0.1);
  playTone(659, 0.08, 'square', 0.08);
  playTone(784, 0.12, 'square', 0.06);
}
function sfxYeeHaw() {
  var notes = [392, 494, 587, 659, 784, 880, 988];
  notes.forEach(function(n, i) {
    setTimeout(function() { playTone(n, 0.12, 'square', 0.07); }, i * 60);
  });
  setTimeout(function() { playTone(988, 0.3, 'square', 0.06, 1175); }, 420);
}
function sfxFly() {
  playTone(800, 0.06, 'square', 0.1, 1600);
  setTimeout(function() { playTone(1200, 0.08, 'square', 0.08, 1800); }, 60);
}
function sfxRumble() {
  playNoise(0.3, 0.03, 200);
  playTone(60, 0.3, 'square', 0.04, 40);
}
function sfxGameOver() {
  [392, 349, 330, 262].forEach(function(n, i) {
    setTimeout(function() { playTone(n, 0.25, 'square', 0.08); }, i * 200);
  });
}
function sfxLevelUp() {
  [523, 587, 659, 784, 880, 1047].forEach(function(n, i) {
    setTimeout(function() { playTone(n, 0.15, 'triangle', 0.1); }, i * 80);
  });
  setTimeout(function() {
    playTone(1047, 0.4, 'square', 0.06);
    playTone(1319, 0.4, 'square', 0.05);
  }, 500);
}
function sfxPickup() {
  playTone(660, 0.06, 'square', 0.1, 880);
  playTone(880, 0.08, 'square', 0.08, 1100);
}
function sfxBossRoar() {
  playNoise(0.5, 0.15, 300);
  playTone(80, 0.5, 'sawtooth', 0.1, 40);
  playTone(120, 0.3, 'square', 0.06, 60);
}
function sfxShield() {
  playTone(440, 0.1, 'triangle', 0.08, 880);
}
function sfxSpeedBoost() {
  playTone(600, 0.05, 'square', 0.08, 1200);
  playTone(900, 0.05, 'square', 0.06, 1500);
}

// ============================================================
// GAME STATE
// ============================================================
var STATE = { TITLE: 0, SELECT: 1, PLAYING: 2, DYING: 3, WIN_BALE: 4, LEVEL_UP: 5, GAME_OVER: 6, TUTORIAL: 7, BOSS: 8 };
var state = STATE.TITLE;
var score = 0;
var highScore = parseInt(localStorage.getItem('rodeoToadHigh') || '0', 10);
var lives = 3;
var level = 1;
var timer = 30;
var timerAcc = 0;
var furthestRow = 14;
var balesCollected = [false, false, false, false, false];
var balesTotal = 0;
var tutorialShown = !!localStorage.getItem('rodeoToadTutorial');
var tutorialStep = 0;
var tutorialTimer = 0;

// Screen shake
var shakeX = 0;
var shakeY = 0;
var shakeIntensity = 0;
var shakeDuration = 0;
var shakeTimer = 0;

// Score popups
var scorePopups = [];

// Items on safe rows
var items = [];
var itemSpawnTimer = 0;

// Active buffs
var speedBuff = 0;
var shieldBuff = 0;

// Boss state
var boss = null;
var bossActive = false;
var bossHP = 0;
var bossMaxHP = 0;
var bossTimer = 0;
var bossAttackTimer = 0;
var bossProjectiles = [];

// NFT state
var nftChecked = false;
var nftConnecting = false;

// Toad
var toadCol = 6;
var toadRow = 14;
var toadAnimX = 0;
var toadAnimY = 0;
var toadHopping = false;
var toadHopTimer = 0;
var HOP_DURATION = 150; // [DEX] modified at game start
var toadFromX = 0;
var toadFromY = 0;
var toadToX = 0;
var toadToY = 0;
var toadDir = 0;
var toadIdleTimer = 0;
var toadOnBull = null;

// Death animation
var deathTimer = 0;
var deathX = 0;
var deathY = 0;
var DEATH_DURATION = 800;

// Win bale animation
var winTimer = 0;
var winBaleIdx = -1;
var WIN_DURATION = 1200;

// Level up
var levelUpTimer = 0;
var LEVEL_UP_DURATION = 2000;

// Particles
var particles = [];

// Hazards (mud pits, rolling barrels)
var hazards = [];

// ============================================================
// OBSTACLES
// ============================================================
var bears = [];
var bulls = [];
var bonusFly = null;
var bonusFlyTimer = 0;

function getZone() {
  return ZONE_THEMES[(level - 1) % ZONE_THEMES.length];
}

// [STR] affects bear speed threshold for knockback
function strKnockbackChance() {
  return Math.max(0, strMod() * 0.05);
}

// [DEX] affects hop speed
function getHopDuration() {
  return Math.max(60, 150 - dexMod() * 8);
}

// [CON] affects starting lives and death forgiveness
function getStartLives() {
  return 3 + statB.lives + Math.max(0, conMod());
}

// [INT] score multiplier stacks with NFT
function getScoreMult() {
  return statB.scoreMult * (1 + intMod() * 0.1);
}

// [WIS] extends fly detection and hazard warning radius
function getWisRange() {
  return 1 + Math.max(0, wisMod());
}

// [CHA] extends bull attraction range and bale bonus
function getChaBaleMult() {
  return 1 + Math.max(0, chaMod() * 0.08);
}

function getBullAttractRange() {
  return TILE * (0.5 + Math.max(0, chaMod() * 0.15));
}

function speedMult() {
  return 1 + (level - 1) * 0.18;
}

function initLane(row) {
  var type = LANE_TYPES[row];
  var sm = speedMult();
  if (type === 'bear') {
    var count = 3 + Math.floor(level * 0.3);
    var dir = (row % 2 === 0) ? 1 : -1;
    var baseSpeed;
    if (row <= 6) {
      baseSpeed = (1.8 + Math.random() * 0.8) * sm;
    } else {
      baseSpeed = (1.0 + Math.random() * 0.6) * sm;
    }
    var gap = COLS / count;
    for (var i = 0; i < count; i++) {
      // Tasern enemy types based on zone
      var zoneIdx = (level - 1) % ZONE_THEMES.length;
      var enemyType;
      if (zoneIdx === 0) enemyType = (Math.random() < 0.3) ? 'dire_wolf' : 'bandit';
      else if (zoneIdx === 1) enemyType = (Math.random() < 0.3) ? 'scorpion' : 'sand_raider';
      else if (zoneIdx === 2) enemyType = (Math.random() < 0.3) ? 'frost_elemental' : 'ice_wolf';
      else if (zoneIdx === 3) enemyType = (Math.random() < 0.3) ? 'bog_troll' : 'swamp_snake';
      else if (zoneIdx === 4) enemyType = (Math.random() < 0.3) ? 'fire_imp' : 'lava_hound';
      else enemyType = (Math.random() < 0.3) ? 'crystal_golem' : 'shadow_bat';
      var isLargeType = (enemyType === 'dire_wolf' || enemyType === 'scorpion' ||
        enemyType === 'frost_elemental' || enemyType === 'bog_troll' ||
        enemyType === 'fire_imp' || enemyType === 'crystal_golem');
      bears.push({
        row: row,
        x: i * gap * TILE + Math.random() * TILE,
        y: row * TILE,
        w: TILE * (isLargeType ? 1.3 : 1.1),
        speed: baseSpeed * dir * (isLargeType ? 0.85 : 1),
        dir: dir,
        type: enemyType,
        legPhase: Math.random() * Math.PI * 2,
        burstTimer: 0,
        burstCooldown: Math.random() * 3 + 2,
      });
    }
  }
  if (type === 'bull') {
    var bCount = 2 + Math.floor(level * 0.2);
    var bDir = (row % 2 === 0) ? 1 : -1;
    var bBaseSpeed;
    if (row <= 3) {
      bBaseSpeed = (1.5 + Math.random() * 0.5) * sm;
    } else {
      bBaseSpeed = (1.0 + Math.random() * 0.4) * sm;
    }
    var bullW = TILE * (1.5 + Math.random() * 0.5);
    var bGap = (COLS * TILE) / bCount;
    for (var j = 0; j < bCount; j++) {
      // Tasern mount types
      var mountColors = ['#8B4513', '#654321', '#aa6633', '#775533'];
      var mountNames = ['War Bull', 'Iron Ox', 'Plains Bison', 'Cave Auroch'];
      var mIdx = Math.floor(Math.random() * mountColors.length);
      bulls.push({
        row: row,
        x: j * bGap,
        y: row * TILE,
        w: bullW,
        speed: bBaseSpeed * bDir,
        dir: bDir,
        legPhase: Math.random() * Math.PI * 2,
        color: mountColors[mIdx],
        mountName: mountNames[mIdx],
      });
    }
  }
}

function initHazards() {
  hazards = [];
  // [WIS] fewer hazards with higher wisdom
  var hazardCount = Math.max(1, 3 + Math.floor(level * 0.5) - Math.max(0, wisMod()));
  var fenceRows = [1, 4, 7, 10, 13];
  for (var h = 0; h < hazardCount; h++) {
    var hType = Math.random() < 0.5 ? 'mud' : 'barrel';
    if (hType === 'mud') {
      var mudRow = fenceRows[Math.floor(Math.random() * fenceRows.length)];
      hazards.push({
        type: 'mud',
        col: Math.floor(Math.random() * (COLS - 2)) + 1,
        row: mudRow,
        timer: 999,
      });
    } else {
      var barrelRow = [5, 6, 11, 12][Math.floor(Math.random() * 4)];
      var barrelDir = Math.random() < 0.5 ? 1 : -1;
      hazards.push({
        type: 'barrel',
        x: barrelDir > 0 ? -TILE : COLS * TILE,
        row: barrelRow,
        dir: barrelDir,
        speed: (2.5 + level * 0.3) * TILE,
        timer: 3 + Math.random() * 5,
        active: false,
        warned: false,
      });
    }
  }
}

function initItems() {
  items = [];
  itemSpawnTimer = 2 + Math.random() * 3;
}

function spawnItem() {
  var fenceRows = [1, 4, 7, 10, 13];
  var row = fenceRows[Math.floor(Math.random() * fenceRows.length)];
  var col = Math.floor(Math.random() * (COLS - 2)) + 1;
  // [LUCK] affects item quality
  var luckBonus = statB.luck || 1;
  var roll = Math.random() * luckBonus;
  var iType;
  if (roll > 0.85) iType = 'shield_scroll';
  else if (roll > 0.6) iType = 'speed_boots';
  else iType = 'health_potion';

  items.push({
    type: iType,
    col: col,
    row: row,
    timer: 6 + Math.random() * 4,
    blink: 0,
    collected: false,
  });
}

function initBoss() {
  bossActive = true;
  var zone = (level - 1) % ZONE_THEMES.length;
  var bossTypes = ['Dire Wyvern', 'Sand Wurm', 'Frost Drake', 'Swamp Hydra', 'Magma Golem', 'Crystal Lich'];
  var bossColors = ['#4a2a6a', '#8a6a2a', '#3a5a8a', '#2a5a2a', '#8a2a0a', '#5a2a8a'];
  // [STR] reduces boss HP slightly
  bossMaxHP = Math.max(3, 8 + level * 2 - Math.max(0, strMod()));
  bossHP = bossMaxHP;
  boss = {
    name: bossTypes[zone],
    color: bossColors[zone],
    x: W / 2,
    y: TILE * 1.5,
    phase: 0,
    attackPattern: 0,
    hitFlash: 0,
  };
  bossTimer = 0;
  bossAttackTimer = 2;
  bossProjectiles = [];
  sfxBossRoar();
  triggerShake(8, 0.5);
}

function initLevel() {
  bears = [];
  bulls = [];
  particles = [];
  bonusFly = null;
  bonusFlyTimer = 5 + Math.random() * 10;
  bossActive = false;
  boss = null;
  bossProjectiles = [];
  speedBuff = 0;
  shieldBuff = 0;
  HOP_DURATION = getHopDuration(); // [DEX] recalculate
  for (var r = 0; r < ROWS; r++) {
    initLane(r);
  }
  initHazards();
  initItems();
  resetToad();
  // Boss every 3 levels
  if (level > 1 && level % 3 === 0) {
    initBoss();
  }
}

function resetToad() {
  toadCol = 6;
  toadRow = 14;
  toadAnimX = toadCol * TILE;
  toadAnimY = toadRow * TILE;
  toadHopping = false;
  toadOnBull = null;
  furthestRow = 14;
  timer = 30 + Math.max(0, intMod() * 2); // [INT] bonus time
  timerAcc = 0;
  toadIdleTimer = 0;
}

// ============================================================
// SCREEN SHAKE
// ============================================================
function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeDuration = duration;
  shakeTimer = 0;
}

function updateShake(dt) {
  if (shakeDuration > 0) {
    shakeTimer += dt;
    if (shakeTimer >= shakeDuration) {
      shakeDuration = 0;
      shakeX = 0;
      shakeY = 0;
    } else {
      var factor = 1 - shakeTimer / shakeDuration;
      shakeX = (Math.random() - 0.5) * shakeIntensity * factor * 2;
      shakeY = (Math.random() - 0.5) * shakeIntensity * factor * 2;
    }
  }
}

// ============================================================
// SCORE POPUPS
// ============================================================
function addScorePopup(x, y, text, color) {
  scorePopups.push({
    x: x, y: y,
    text: text,
    color: color || '#ffd700',
    timer: 0,
    duration: 1.2,
  });
}

function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    var sp = scorePopups[i];
    sp.timer += dt;
    sp.y -= 40 * dt;
    if (sp.timer >= sp.duration) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    var alpha = Math.max(0, 1 - sp.timer / sp.duration);
    var scale = 1 + sp.timer * 0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold ' + Math.floor(TILE * 0.35 * scale) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(sp.text, sp.x + 1, sp.y + 1);
    ctx.fillStyle = sp.color;
    ctx.fillText(sp.text, sp.x, sp.y);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// INPUT (NES-style: arrows + WASD + ZX/AB buttons)
// ============================================================
var keys = {};
var inputQueue = [];

document.addEventListener('keydown', function(e) {
  if (e.repeat) return;
  keys[e.key] = true;
  ensureAudio();

  // Tutorial dismiss
  if (state === STATE.TUTORIAL) {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z' || e.key === 'x') {
      tutorialStep++;
      if (tutorialStep >= 4) {
        state = STATE.PLAYING;
        localStorage.setItem('rodeoToadTutorial', '1');
        tutorialShown = true;
      }
      return;
    }
  }

  if (state === STATE.TITLE) {
    if (e.key === 'w' || e.key === 'W') {
      if (window.NftLoader && window.ethereum && !nftConnecting) {
        nftConnecting = true;
        window.NftLoader.connectWallet().then(function(w) {
          if (w) {
            return window.NftLoader.checkNFTs().then(function() {
              try {
                if (NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses();
              } catch(ex) { console.warn('stat reload:', ex); }
              nftChecked = true;
              if (window.NftLoader.ownedCharacters && window.NftLoader.ownedCharacters.length > 0) {
                state = STATE.SELECT;
              }
              nftConnecting = false;
            });
          }
          nftConnecting = false;
        }).catch(function(err) {
          console.warn('NFT check failed:', err);
          nftConnecting = false;
        });
        return;
      }
    }
    // NES: Start = Enter/Space, Select = Z
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z') {
      startGame();
      return;
    }
  }

  if (state === STATE.SELECT) {
    if (e.key === ' ' || e.key === 'z') {
      window.NftLoader.selectedCharacter = null;
      startGame();
      return;
    }
  }

  if (state === STATE.GAME_OVER) {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'z') {
      state = STATE.TITLE;
      return;
    }
  }

  if ((state === STATE.PLAYING || state === STATE.BOSS) && !toadHopping) {
    var dir = getDirection(e.key);
    if (dir !== -1) {
      inputQueue.push(dir);
    }
  }
});

document.addEventListener('keyup', function(e) { keys[e.key] = false; });

function getDirection(key) {
  if (key === 'ArrowUp' || key === 'w' || key === 'W') return 0;
  if (key === 'ArrowRight' || key === 'd' || key === 'D') return 1;
  if (key === 'ArrowDown' || key === 's' || key === 'S') return 2;
  if (key === 'ArrowLeft' || key === 'a' || key === 'A') return 3;
  return -1;
}

// Touch / swipe
var touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();
  var t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;

  if (state === STATE.TUTORIAL) {
    tutorialStep++;
    if (tutorialStep >= 4) {
      state = STATE.PLAYING;
      localStorage.setItem('rodeoToadTutorial', '1');
      tutorialShown = true;
    }
    return;
  }
  if (state === STATE.TITLE) {
    startGame();
    return;
  }
  if (state === STATE.GAME_OVER) {
    state = STATE.TITLE;
    return;
  }
  if (state === STATE.SELECT) {
    var rect = canvas.getBoundingClientRect();
    var cx = (t.clientX - rect.left) * (W / rect.width);
    var cy = (t.clientY - rect.top) * (H / rect.height);
    if (window.NftLoader) {
      var sel = window.NftLoader.handleClick(cx, cy);
      if (sel) {
        try { if (NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(ex) {}
        startGame();
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (state !== STATE.PLAYING && state !== STATE.BOSS) return;
  var t = e.changedTouches[0];
  var dx = t.clientX - touchStartX;
  var dy = t.clientY - touchStartY;
  var dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 20) {
    if (Math.abs(dx) > Math.abs(dy)) {
      inputQueue.push(dx > 0 ? 1 : 3);
    } else {
      inputQueue.push(dy > 0 ? 2 : 0);
    }
  } else {
    var rect = canvas.getBoundingClientRect();
    var cx = t.clientX - rect.left;
    var cy = t.clientY - rect.top;
    var midX = rect.width / 2;
    var midY = rect.height / 2;
    if (Math.abs(cx - midX) > Math.abs(cy - midY)) {
      inputQueue.push(cx > midX ? 1 : 3);
    } else {
      inputQueue.push(cy > midY ? 2 : 0);
    }
  }
}, { passive: false });

canvas.addEventListener('click', function(e) {
  ensureAudio();
  if (state === STATE.SELECT && window.NftLoader) {
    var rect = canvas.getBoundingClientRect();
    var cx = (e.clientX - rect.left) * (W / rect.width);
    var cy = (e.clientY - rect.top) * (H / rect.height);
    var sel = window.NftLoader.handleClick(cx, cy);
    if (sel) {
      try { if (NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(ex) {}
      startGame();
    }
  }
  if (state === STATE.TITLE) startGame();
  if (state === STATE.GAME_OVER) state = STATE.TITLE;
});

// ============================================================
// GAME START
// ============================================================
function startGame() {
  score = 0;
  level = 1;
  lives = getStartLives(); // [CON] bonus lives
  balesCollected = [false, false, false, false, false];
  balesTotal = 0;
  scorePopups = [];
  HOP_DURATION = getHopDuration(); // [DEX]
  initLevel();
  if (!tutorialShown) {
    state = STATE.TUTORIAL;
    tutorialStep = 0;
    tutorialTimer = 0;
  } else {
    state = STATE.PLAYING;
  }
}

// ============================================================
// UPDATE
// ============================================================
var lastTime = 0;
var rumbleTimer = 0;

function update(dt) {
  updateShake(dt);
  updateScorePopups(dt);

  if (state === STATE.TUTORIAL) {
    tutorialTimer += dt;
    updateParticles(dt);
    return;
  }

  if (state === STATE.PLAYING || state === STATE.BOSS) {
    updatePlaying(dt);
    if (bossActive) updateBoss(dt);
  } else if (state === STATE.DYING) {
    deathTimer += dt * 1000;
    updateParticles(dt);
    if (deathTimer >= DEATH_DURATION) {
      lives--;
      if (lives <= 0) {
        state = STATE.GAME_OVER;
        sfxGameOver();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('rodeoToadHigh', String(highScore));
        }
      } else {
        state = STATE.PLAYING;
        resetToad();
      }
    }
  } else if (state === STATE.WIN_BALE) {
    winTimer += dt * 1000;
    updateParticles(dt);
    if (winTimer >= WIN_DURATION) {
      if (balesTotal >= 5) {
        state = STATE.LEVEL_UP;
        levelUpTimer = 0;
        sfxLevelUp();
      } else {
        state = STATE.PLAYING;
        resetToad();
      }
    }
  } else if (state === STATE.LEVEL_UP) {
    levelUpTimer += dt * 1000;
    updateParticles(dt);
    if (levelUpTimer >= LEVEL_UP_DURATION) {
      level++;
      balesCollected = [false, false, false, false, false];
      balesTotal = 0;
      initLevel();
      state = STATE.PLAYING;
    }
  }
}

function updateBoss(dt) {
  if (!boss) return;
  bossTimer += dt;
  boss.phase += dt * 2;
  boss.x = W / 2 + Math.sin(boss.phase) * W * 0.3;
  if (boss.hitFlash > 0) boss.hitFlash -= dt;

  // Boss attacks
  bossAttackTimer -= dt;
  if (bossAttackTimer <= 0) {
    bossAttackTimer = Math.max(0.8, 2.5 - level * 0.1);
    // Fire projectile toward toad
    var tx = toadAnimX + TILE / 2;
    var ty = toadAnimY + TILE / 2;
    var bx = boss.x;
    var by = boss.y;
    var ang = Math.atan2(ty - by, tx - bx);
    var projSpeed = 120 + level * 10;
    bossProjectiles.push({
      x: bx, y: by,
      vx: Math.cos(ang) * projSpeed,
      vy: Math.sin(ang) * projSpeed,
      life: 3,
    });
    playTone(150, 0.15, 'sawtooth', 0.06, 80);
  }

  // Update projectiles
  for (var i = bossProjectiles.length - 1; i >= 0; i--) {
    var p = bossProjectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0 || p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
      bossProjectiles.splice(i, 1);
      continue;
    }
    // Hit toad?
    if (!toadHopping) {
      var dx = (toadAnimX + TILE / 2) - p.x;
      var dy = (toadAnimY + TILE / 2) - p.y;
      if (Math.sqrt(dx * dx + dy * dy) < TILE * 0.4) {
        if (shieldBuff > 0) {
          shieldBuff = 0;
          bossProjectiles.splice(i, 1);
          sfxShield();
          spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#44aaff', 10);
          addScorePopup(toadAnimX + TILE / 2, toadAnimY, 'BLOCKED!', '#44aaff');
        } else {
          bossProjectiles.splice(i, 1);
          killToad();
          return;
        }
      }
    }
  }

  // Boss hit detection: toad reaches goal row = boss takes damage
  // (handled in onLand)
}

function updatePlaying(dt) {
  // Timer
  timerAcc += dt;
  if (timerAcc >= 1) {
    timerAcc -= 1;
    timer--;
    if (timer <= 0) {
      killToad();
      return;
    }
  }

  // Speed buff
  if (speedBuff > 0) speedBuff -= dt;
  if (shieldBuff > 0) shieldBuff -= dt;

  // Process input with [DEX] input buffer
  var maxQueue = 2 + Math.max(0, Math.floor(dexMod() / 2)); // [DEX] bigger buffer
  if (!toadHopping && inputQueue.length > 0) {
    var dir = inputQueue.shift();
    tryHop(dir);
  }
  if (inputQueue.length > maxQueue) inputQueue = [inputQueue[inputQueue.length - 1]];

  // Hop animation
  if (toadHopping) {
    var hopDur = speedBuff > 0 ? HOP_DURATION * 0.6 : HOP_DURATION;
    toadHopTimer += dt * 1000;
    var t = Math.min(toadHopTimer / hopDur, 1);
    toadAnimX = toadFromX + (toadToX - toadFromX) * t;
    toadAnimY = toadFromY + (toadToY - toadFromY) * t;
    if (t >= 1) {
      toadHopping = false;
      toadHopTimer = 0;
      toadAnimX = toadToX;
      toadAnimY = toadToY;
      onLand();
    }
  }

  // Move bears (Tasern enemies)
  for (var i = 0; i < bears.length; i++) {
    var b = bears[i];
    b.legPhase += dt * 8;
    b.burstCooldown -= dt;
    if (b.burstCooldown <= 0 && b.row <= 6) {
      b.burstTimer = 0.4 + Math.random() * 0.3;
      b.burstCooldown = 3 + Math.random() * 4;
    }
    var spd = b.speed;
    if (b.burstTimer > 0) {
      spd *= 1.8;
      b.burstTimer -= dt;
    }
    b.x += spd * TILE * dt;
    if (b.dir > 0 && b.x > COLS * TILE + b.w) b.x = -b.w;
    if (b.dir < 0 && b.x < -b.w) b.x = COLS * TILE + b.w;
  }

  // Move bulls (mounts)
  for (var j = 0; j < bulls.length; j++) {
    var bull = bulls[j];
    bull.legPhase += dt * 6;
    bull.x += bull.speed * TILE * dt;
    if (bull.dir > 0 && bull.x > COLS * TILE + bull.w) bull.x = -bull.w;
    if (bull.dir < 0 && bull.x < -bull.w) bull.x = COLS * TILE;
  }

  // Toad riding bull
  var laneType = LANE_TYPES[toadRow];
  if (laneType === 'bull' && !toadHopping) {
    // [CHA] extended attraction range
    var ridingBull = findBullAt(toadAnimX + TILE * 0.5, toadRow);
    if (ridingBull) {
      toadOnBull = ridingBull;
      toadAnimX += ridingBull.speed * TILE * dt;
      toadCol = Math.round(toadAnimX / TILE);
      if (toadAnimX < -TILE || toadAnimX > COLS * TILE) {
        killToad();
        return;
      }
    } else {
      toadOnBull = null;
      killToad();
      return;
    }
  } else {
    toadOnBull = null;
  }

  // Bear collision
  if (!toadHopping) {
    var toadCx = toadAnimX + TILE * 0.5;
    var toadCy = toadAnimY + TILE * 0.5;
    for (var bi = 0; bi < bears.length; bi++) {
      var bear = bears[bi];
      if (bear.row !== toadRow) continue;
      var bCx = bear.x + bear.w * 0.5;
      var bCy = bear.y + TILE * 0.5;
      var ddx = Math.abs(toadCx - bCx);
      var ddy = Math.abs(toadCy - bCy);
      if (ddx < (TILE * 0.4 + bear.w * 0.35) && ddy < TILE * 0.6) {
        // [STR] knockback chance
        if (Math.random() < strKnockbackChance()) {
          addScorePopup(toadCx, toadCy - TILE * 0.5, 'KNOCKED BACK!', '#ff8844');
          // Push bear away
          bear.x += bear.dir * TILE * 2;
          spawnParticles(toadCx, toadCy, '#ffaa44', 6);
          var kbPts = 50;
          score += Math.floor(kbPts * getScoreMult());
          addScorePopup(toadCx, toadCy - TILE, '+' + kbPts, '#ffaa44');
        } else if (shieldBuff > 0) {
          shieldBuff = 0;
          sfxShield();
          spawnParticles(toadCx, toadCy, '#44aaff', 10);
          addScorePopup(toadCx, toadCy - TILE * 0.5, 'SHIELD!', '#44aaff');
        } else {
          killToad();
          return;
        }
      }
    }
  }

  // Hazard collision
  updateHazards(dt);

  // Bonus fly
  bonusFlyTimer -= dt;
  if (bonusFlyTimer <= 0 && !bonusFly) {
    var safeRows = [1, 4, 7, 10, 13];
    var flyRow = safeRows[Math.floor(Math.random() * safeRows.length)];
    bonusFly = {
      col: Math.floor(Math.random() * COLS),
      row: flyRow,
      timer: 3 + Math.random() * 2,
      blink: 0,
    };
  }
  if (bonusFly) {
    bonusFly.timer -= dt;
    bonusFly.blink += dt * 10;
    if (bonusFly.timer <= 0) {
      bonusFly = null;
      bonusFlyTimer = 6 + Math.random() * 8;
    } else if (!toadHopping && toadCol === bonusFly.col && toadRow === bonusFly.row) {
      var pts = 200 * level;
      var finalPts = Math.floor(pts * getScoreMult()); // [INT]
      score += finalPts;
      sfxFly();
      spawnParticles(bonusFly.col * TILE + TILE / 2, bonusFly.row * TILE + TILE / 2, '#0f0', 8);
      addScorePopup(bonusFly.col * TILE + TILE / 2, bonusFly.row * TILE, '+' + finalPts, '#00ff44');
      bonusFly = null;
      bonusFlyTimer = 8 + Math.random() * 10;
    } else {
      // [WIS] fly detection indicator (glow when within range)
      var flyDist = Math.abs(toadRow - bonusFly.row) + Math.abs(toadCol - bonusFly.col);
      if (flyDist <= getWisRange() && !toadHopping) {
        // Handled in draw - just a visual cue
      }
    }
  }

  // Item spawning
  itemSpawnTimer -= dt;
  if (itemSpawnTimer <= 0 && items.length < 3) {
    spawnItem();
    itemSpawnTimer = 4 + Math.random() * 4;
  }
  // Item collection
  for (var ii = items.length - 1; ii >= 0; ii--) {
    var item = items[ii];
    item.timer -= dt;
    item.blink += dt * 8;
    if (item.timer <= 0) {
      items.splice(ii, 1);
      continue;
    }
    if (!toadHopping && toadCol === item.col && toadRow === item.row && !item.collected) {
      item.collected = true;
      sfxPickup();
      if (item.type === 'health_potion') {
        lives = Math.min(lives + 1, getStartLives() + 2);
        addScorePopup(item.col * TILE + TILE / 2, item.row * TILE, '+1 LIFE', '#ff4488');
        spawnParticles(item.col * TILE + TILE / 2, item.row * TILE + TILE / 2, '#ff4488', 8);
      } else if (item.type === 'speed_boots') {
        speedBuff = 5;
        addScorePopup(item.col * TILE + TILE / 2, item.row * TILE, 'SPEED!', '#44ff88');
        spawnParticles(item.col * TILE + TILE / 2, item.row * TILE + TILE / 2, '#44ff88', 8);
        sfxSpeedBoost();
      } else if (item.type === 'shield_scroll') {
        shieldBuff = 8;
        addScorePopup(item.col * TILE + TILE / 2, item.row * TILE, 'SHIELD!', '#44aaff');
        spawnParticles(item.col * TILE + TILE / 2, item.row * TILE + TILE / 2, '#44aaff', 10);
        sfxShield();
      }
      items.splice(ii, 1);
    }
  }

  // Ambient rumble
  rumbleTimer -= dt;
  if (rumbleTimer <= 0) {
    var nearBear = bears.some(function(b) {
      return b.row === toadRow || b.row === toadRow - 1 || b.row === toadRow + 1;
    });
    if (nearBear) {
      sfxRumble();
      rumbleTimer = 1.5;
    } else {
      rumbleTimer = 0.5;
    }
  }

  // Particles
  updateParticles(dt);

  // Dust/magic from enemies
  for (var di = 0; di < bears.length; di++) {
    var db = bears[di];
    if (Math.random() < 0.12) {
      var ppx = db.x + (db.dir < 0 ? db.w : 0);
      var ppy = db.y + TILE * 0.8;
      var zone = getZone();
      particles.push({
        x: ppx, y: ppy,
        vx: -db.dir * (Math.random() * 20 + 10),
        vy: -(Math.random() * 15 + 5),
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.7,
        size: 2 + Math.random() * 3,
        color: zone.particle,
      });
    }
  }

  toadIdleTimer += dt;
}

function updateHazards(dt) {
  for (var i = hazards.length - 1; i >= 0; i--) {
    var h = hazards[i];
    if (h.type === 'barrel') {
      h.timer -= dt;
      if (h.timer <= 0 && !h.active) {
        h.active = true;
      }
      // [WIS] warning flash before barrel launches
      if (h.timer <= 1.0 && !h.warned) {
        h.warned = true;
        if (Math.abs(toadRow - h.row) <= getWisRange()) {
          addScorePopup(toadAnimX + TILE / 2, toadAnimY - TILE * 0.3, 'DANGER!', '#ff4444');
        }
      }
      if (h.active) {
        h.x += h.dir * h.speed * dt;
        if (h.x > COLS * TILE + TILE || h.x < -TILE * 2) {
          hazards.splice(i, 1);
          continue;
        }
        // Collision with toad
        if (!toadHopping && toadRow === h.row) {
          var hCx = h.x + TILE * 0.5;
          var tCx = toadAnimX + TILE * 0.5;
          if (Math.abs(hCx - tCx) < TILE * 0.7) {
            if (shieldBuff > 0) {
              shieldBuff = 0;
              sfxShield();
              spawnParticles(tCx, toadAnimY + TILE / 2, '#44aaff', 8);
              hazards.splice(i, 1);
            } else {
              killToad();
              return;
            }
          }
        }
      }
    }
    if (h.type === 'mud') {
      // Mud slows toad on that tile
      if (!toadHopping && toadCol === h.col && toadRow === h.row) {
        // Slow effect is handled in hop duration check
      }
    }
  }
}

function isOnMud() {
  for (var i = 0; i < hazards.length; i++) {
    if (hazards[i].type === 'mud' && hazards[i].col === toadCol && hazards[i].row === toadRow) {
      return true;
    }
  }
  return false;
}

function tryHop(dir) {
  var newCol = toadCol;
  var newRow = toadRow;
  if (dir === 0) newRow--;
  else if (dir === 1) newCol++;
  else if (dir === 2) newRow++;
  else if (dir === 3) newCol--;

  if (newCol < 0 || newCol >= COLS || newRow < 0 || newRow >= ROWS) return;

  toadDir = dir;
  toadFromX = toadAnimX;
  toadFromY = toadAnimY;
  toadCol = newCol;
  toadRow = newRow;
  toadToX = newCol * TILE;
  toadToY = newRow * TILE;
  toadHopping = true;
  toadHopTimer = 0;
  // Mud increases hop time
  if (isOnMud()) {
    HOP_DURATION = getHopDuration() * 1.8;
  } else {
    HOP_DURATION = getHopDuration();
  }
  toadIdleTimer = 0;
  inputQueue = [];
  sfxHop();
}

function onLand() {
  var laneType = LANE_TYPES[toadRow];

  // Score for forward progress
  if (toadRow < furthestRow) {
    var rowBonus = (furthestRow - toadRow) * 10;
    var finalBonus = Math.floor(rowBonus * getScoreMult()); // [INT]
    score += finalBonus;
    addScorePopup(toadAnimX + TILE / 2, toadAnimY, '+' + finalBonus, '#ffd700');
    furthestRow = toadRow;
  }

  // Boss hit: reaching goal row damages boss
  if (bossActive && laneType === 'goal') {
    bossHP--;
    boss.hitFlash = 0.3;
    triggerShake(6, 0.3);
    var bossPts = Math.floor(100 * getScoreMult());
    score += bossPts;
    addScorePopup(boss.x, boss.y + TILE, '-1 HP!', '#ff4444');
    spawnParticles(boss.x, boss.y, boss.color, 12);
    if (bossHP <= 0) {
      var bossKillPts = Math.floor(1000 * level * getScoreMult());
      score += bossKillPts;
      addScorePopup(boss.x, boss.y, '+' + bossKillPts + ' BOSS SLAIN!', '#ffd700');
      spawnParticles(boss.x, boss.y, '#ffd700', 30);
      spawnParticles(boss.x, boss.y, boss.color, 20);
      bossActive = false;
      boss = null;
      bossProjectiles = [];
      sfxYeeHaw();
      triggerShake(10, 0.6);
    }
    // Bounce back after hitting boss
    toadRow = 1;
    toadAnimY = toadRow * TILE;
    toadToY = toadAnimY;
    furthestRow = 14;
    return;
  }

  // Goal row
  if (laneType === 'goal') {
    var balePositions = [1, 3, 6, 9, 11];
    var landed = -1;
    for (var i = 0; i < balePositions.length; i++) {
      if (toadCol === balePositions[i] && !balesCollected[i]) {
        landed = i;
        break;
      }
    }
    if (landed >= 0) {
      balesCollected[landed] = true;
      balesTotal++;
      var timeBonus = timer * 20;
      var balePts = Math.floor((500 + timeBonus) * getScoreMult() * getChaBaleMult()); // [INT]+[CHA]
      score += balePts;
      state = STATE.WIN_BALE;
      winTimer = 0;
      winBaleIdx = landed;
      sfxYeeHaw();
      spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ffd700', 20);
      addScorePopup(toadAnimX + TILE / 2, toadAnimY, '+' + balePts, '#ffd700');
    } else {
      toadRow = 1;
      toadAnimY = toadRow * TILE;
      toadToY = toadAnimY;
    }
  }

  // Bull lane check
  if (laneType === 'bull') {
    var onBull = findBullAt(toadAnimX + TILE * 0.5, toadRow);
    if (!onBull) {
      killToad();
    }
  }
}

function findBullAt(px, row) {
  // [CHA] extends the attraction range for landing on bulls
  var chaRange = getBullAttractRange();
  for (var i = 0; i < bulls.length; i++) {
    var b = bulls[i];
    if (b.row !== row) continue;
    if (px >= b.x - chaRange + TILE * 0.5 && px <= b.x + b.w + chaRange - TILE * 0.5) return b;
  }
  return null;
}

function killToad() {
  // [CON] death forgiveness: small chance to survive with 1hp
  if (conMod() > 0 && Math.random() < conMod() * 0.08) {
    addScorePopup(toadAnimX + TILE / 2, toadAnimY, 'SURVIVED!', '#44ff44');
    spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#44ff44', 12);
    sfxShield();
    return;
  }
  state = STATE.DYING;
  deathTimer = 0;
  deathX = toadAnimX;
  deathY = toadAnimY;
  toadHopping = false;
  sfxSplat();
  triggerShake(12, 0.4);
  spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ff4444', 15);
  spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ffff00', 10);
}

function spawnParticles(x, y, color, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 30 + Math.random() * 80;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 20,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 1,
      size: 2 + Math.random() * 4,
      color: color,
    });
  }
}

function updateParticles(dt) {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.save();
  ctx.translate(Math.floor(shakeX), Math.floor(shakeY));
  ctx.clearRect(-20, -20, W + 40, H + 40);

  if (state === STATE.TITLE) {
    drawTitle();
    ctx.restore();
    return;
  }
  if (state === STATE.SELECT) {
    drawTitle();
    if (window.NftLoader) {
      window.NftLoader.drawCharacterSelect(ctx, W, H);
    }
    ctx.restore();
    return;
  }

  drawArena();
  drawHazards();
  drawItems();
  drawBulls();
  drawBears();
  drawBonusFly();

  if (state === STATE.PLAYING || state === STATE.WIN_BALE || state === STATE.BOSS || state === STATE.TUTORIAL) {
    drawToad();
  }
  if (state === STATE.DYING) {
    drawDeathAnim();
  }
  if (state === STATE.WIN_BALE) {
    drawWinAnim();
  }
  if (state === STATE.LEVEL_UP) {
    drawLevelUp();
  }

  if (bossActive) drawBoss();

  drawParticles();
  drawScorePopups();

  // Shield indicator on toad
  if (shieldBuff > 0 && (state === STATE.PLAYING || state === STATE.BOSS)) {
    ctx.strokeStyle = shieldBuff < 2 ? 'rgba(68,170,255,' + (0.3 + Math.sin(Date.now() / 100) * 0.3) + ')' : 'rgba(68,170,255,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(toadAnimX + TILE / 2, toadAnimY + TILE / 2, TILE * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  }
  // Speed indicator
  if (speedBuff > 0 && (state === STATE.PLAYING || state === STATE.BOSS)) {
    ctx.fillStyle = 'rgba(68,255,136,' + (0.1 + Math.sin(Date.now() / 80) * 0.1) + ')';
    ctx.beginPath();
    ctx.arc(toadAnimX + TILE / 2, toadAnimY + TILE / 2, TILE * 0.55, 0, Math.PI * 2);
    ctx.fill();
  }

  drawHUD();

  if (state === STATE.GAME_OVER) {
    drawGameOver();
  }
  if (state === STATE.TUTORIAL) {
    drawTutorial();
  }

  ctx.restore();
}

function drawArena() {
  var zone = getZone();
  for (var r = 0; r < ROWS; r++) {
    var y = r * TILE;
    var type = LANE_TYPES[r];

    if (type === 'start') {
      pxRect(0, y, W, TILE, zone.bg2);
      // Pixel grass tufts
      for (var g = 0; g < COLS * 2; g++) {
        var gx = Math.floor(Math.random() * W / 4) * 4;
        var gy = y + Math.floor(Math.random() * TILE / 4) * 4;
        pxRect(gx, gy, 2, 4, zone.particle);
      }
      // Pixel pond
      var pondX = 5 * TILE;
      var pondW = 3 * TILE;
      pxRect(pondX + 4, y + TILE * 0.3, pondW - 8, TILE * 0.5, '#2a5a8a');
      pxRect(pondX + TILE, y + TILE * 0.35, TILE, TILE * 0.2, '#3a7aaa');
    } else if (type === 'fence') {
      pxRect(0, y, W, TILE, zone.fence);
      // Pixel fence rails
      pxRect(0, y + 2, W, 3, shadeColor(zone.fence, 20));
      pxRect(0, y + TILE - 5, W, 3, shadeColor(zone.fence, 20));
      // Posts
      for (var c = 0; c < COLS; c += 2) {
        pxRect(c * TILE + TILE * 0.35, y, TILE * 0.3, TILE, shadeColor(zone.fence, -10));
      }
    } else if (type === 'bear') {
      pxRect(0, y, W, TILE, r <= 6 ? zone.bear : shadeColor(zone.bear, 10));
      // Dashed lane markings
      for (var dl = 0; dl < COLS; dl += 2) {
        pxRect(dl * TILE + TILE * 0.2, y + TILE / 2 - 1, TILE * 0.6, 2, 'rgba(255,255,255,0.06)');
      }
      // Danger label
      if (r === 11 || r === 5) {
        ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
        ctx.fillStyle = 'rgba(255,100,100,0.2)';
        ctx.textAlign = 'left';
        ctx.fillText('DANGER', 4, y + TILE * 0.75);
      }
    } else if (type === 'bull') {
      pxRect(0, y, W, TILE, r <= 3 ? zone.bull : shadeColor(zone.bull, 10));
      // Current lines
      for (var cl = 0; cl < COLS; cl += 2) {
        pxRect(cl * TILE + TILE * 0.15, y + TILE * 0.3, TILE * 0.4, 1, 'rgba(100,200,100,0.1)');
        pxRect(cl * TILE + TILE * 0.3, y + TILE * 0.7, TILE * 0.5, 1, 'rgba(100,200,100,0.1)');
      }
      if (r === 8 || r === 2) {
        ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
        ctx.fillStyle = 'rgba(100,255,100,0.2)';
        ctx.textAlign = 'left';
        ctx.fillText('RIDE', 4, y + TILE * 0.75);
      }
    } else if (type === 'goal') {
      pxRect(0, y, W, TILE, shadeColor(zone.bg1, -10));
      pxRect(0, y, W, 4, zone.fence);
      // Hay bale slots
      var balePositions = [1, 3, 6, 9, 11];
      for (var bi = 0; bi < 5; bi++) {
        var bx = balePositions[bi] * TILE;
        if (balesCollected[bi]) {
          drawHayBale(bx, y, true);
          drawMiniToad(bx + TILE * 0.25, y + TILE * 0.1, TILE * 0.5);
        } else {
          drawHayBale(bx, y, false);
        }
      }
    }
  }
}

function drawHayBale(x, y, filled) {
  pxRect(x + 2, y + TILE * 0.3, TILE - 4, TILE * 0.6, filled ? '#8a7a30' : '#c8a840');
  // Hay lines
  for (var i = 0; i < 3; i++) {
    pxRect(x + 3, y + TILE * 0.4 + i * TILE * 0.15, TILE - 6, 1, filled ? '#6a5a20' : '#a88830');
  }
  if (!filled) {
    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + TILE * 0.25, TILE - 2, TILE * 0.7);
  }
}

function drawMiniToad(x, y, size) {
  var col = statB.color || '#44dd88';
  pxCircle(x + size / 2, y + size * 0.6, size * 0.35, col);
  // Eyes
  pxRect(x + size * 0.2, y + size * 0.25, size * 0.15, size * 0.15, '#fff');
  pxRect(x + size * 0.6, y + size * 0.25, size * 0.15, size * 0.15, '#fff');
  pxRect(x + size * 0.25, y + size * 0.3, size * 0.08, size * 0.08, '#111');
  pxRect(x + size * 0.65, y + size * 0.3, size * 0.08, size * 0.08, '#111');
}

function drawHazards() {
  for (var i = 0; i < hazards.length; i++) {
    var h = hazards[i];
    if (h.type === 'mud') {
      var mx = h.col * TILE;
      var my = h.row * TILE;
      // Pixel mud puddle
      pxRect(mx + 2, my + TILE * 0.3, TILE - 4, TILE * 0.4, '#5a4a2a');
      pxRect(mx + 4, my + TILE * 0.35, TILE - 8, TILE * 0.15, '#4a3a1a');
      // Bubble
      var bubT = Date.now() / 500;
      if (Math.sin(bubT + h.col) > 0.7) {
        pxRect(mx + TILE * 0.4, my + TILE * 0.35, 3, 3, '#6a5a3a');
      }
    }
    if (h.type === 'barrel' && h.active) {
      var bx = h.x;
      var by = h.row * TILE;
      var roll = Date.now() / 100;
      // Pixel barrel
      pxRect(bx + 2, by + 4, TILE - 4, TILE - 8, '#8a5a2a');
      pxRect(bx + 4, by + 6, TILE - 8, 2, '#6a4a1a');
      pxRect(bx + 4, by + TILE - 10, TILE - 8, 2, '#6a4a1a');
      // Metal bands
      pxRect(bx + 2, by + TILE * 0.3, TILE - 4, 2, '#aaa');
      pxRect(bx + 2, by + TILE * 0.65, TILE - 4, 2, '#aaa');
    }
    if (h.type === 'barrel' && !h.active && h.timer < 1.5) {
      // Warning flash
      var wy = h.row * TILE;
      if (Math.sin(Date.now() / 80) > 0) {
        ctx.fillStyle = 'rgba(255,50,50,0.15)';
        ctx.fillRect(0, wy, W, TILE);
      }
    }
  }
}

function drawItems() {
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (item.timer < 1.5 && Math.sin(item.blink) < 0) continue;
    var ix = item.col * TILE;
    var iy = item.row * TILE;
    var bob = Math.sin(Date.now() / 300 + item.col) * 3;

    if (item.type === 'health_potion') {
      // Red potion bottle (pixel art)
      pxRect(ix + TILE * 0.35, iy + TILE * 0.15 + bob, TILE * 0.3, TILE * 0.15, '#aa4444');
      pxRect(ix + TILE * 0.25, iy + TILE * 0.3 + bob, TILE * 0.5, TILE * 0.5, '#ff4466');
      pxRect(ix + TILE * 0.3, iy + TILE * 0.35 + bob, TILE * 0.15, TILE * 0.2, '#ff8899');
      // Glow
      ctx.fillStyle = 'rgba(255,68,102,0.15)';
      ctx.beginPath();
      ctx.arc(ix + TILE / 2, iy + TILE / 2 + bob, TILE * 0.4, 0, Math.PI * 2);
      ctx.fill();
    } else if (item.type === 'speed_boots') {
      // Green boots (pixel art)
      pxRect(ix + TILE * 0.2, iy + TILE * 0.4 + bob, TILE * 0.25, TILE * 0.35, '#44aa44');
      pxRect(ix + TILE * 0.5, iy + TILE * 0.4 + bob, TILE * 0.25, TILE * 0.35, '#44aa44');
      pxRect(ix + TILE * 0.15, iy + TILE * 0.65 + bob, TILE * 0.35, TILE * 0.12, '#338833');
      pxRect(ix + TILE * 0.48, iy + TILE * 0.65 + bob, TILE * 0.35, TILE * 0.12, '#338833');
      // Speed lines
      pxRect(ix + TILE * 0.05, iy + TILE * 0.45 + bob, TILE * 0.12, 2, '#88ff88');
      pxRect(ix + TILE * 0.02, iy + TILE * 0.55 + bob, TILE * 0.15, 2, '#88ff88');
    } else if (item.type === 'shield_scroll') {
      // Blue scroll (pixel art)
      pxRect(ix + TILE * 0.25, iy + TILE * 0.2 + bob, TILE * 0.5, TILE * 0.6, '#4488cc');
      pxRect(ix + TILE * 0.2, iy + TILE * 0.18 + bob, TILE * 0.6, TILE * 0.1, '#5599dd');
      pxRect(ix + TILE * 0.2, iy + TILE * 0.72 + bob, TILE * 0.6, TILE * 0.1, '#5599dd');
      // Rune symbol
      pxRect(ix + TILE * 0.4, iy + TILE * 0.35 + bob, TILE * 0.2, TILE * 0.3, '#aaddff');
      // Glow
      ctx.fillStyle = 'rgba(68,136,204,0.12)';
      ctx.beginPath();
      ctx.arc(ix + TILE / 2, iy + TILE / 2 + bob, TILE * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawToad() {
  var x = toadAnimX;
  var y = toadAnimY;
  var t = toadHopping ? toadHopTimer / HOP_DURATION : 0;
  var hopArc = toadHopping ? Math.sin(t * Math.PI) : 0;
  var jumpY = -hopArc * TILE * 0.4;
  var s = TILE * 0.42;

  var bodyColor = statB.color || '#44dd88';
  var darkColor = shadeColor(bodyColor, -30);
  var lightColor = shadeColor(bodyColor, 40);

  var cx = x + TILE / 2;
  var cy = y + TILE / 2 + jumpY;

  // Shadow
  pxRect(cx - s * 0.6, y + TILE * 0.85, s * 1.2, s * 0.15, 'rgba(0,0,0,0.2)');

  // Back legs
  var legKick = toadHopping ? hopArc * 4 : 0;
  pxRect(cx - s * 0.7, cy + s * 0.1 + legKick, s * 0.3, s * 0.5, darkColor);
  pxRect(cx + s * 0.4, cy + s * 0.1 + legKick, s * 0.3, s * 0.5, darkColor);

  // Body (pixel block style)
  pxRect(cx - s * 0.5, cy - s * 0.4, s * 1.0, s * 0.9, bodyColor);
  // Belly
  pxRect(cx - s * 0.3, cy - s * 0.1, s * 0.6, s * 0.5, lightColor);
  // Spots
  pxRect(cx - s * 0.25, cy - s * 0.3, s * 0.12, s * 0.12, darkColor);
  pxRect(cx + s * 0.15, cy - s * 0.2, s * 0.1, s * 0.1, darkColor);

  // Front legs
  pxRect(cx - s * 0.45, cy + s * 0.2 - legKick * 0.5, s * 0.2, s * 0.35, darkColor);
  pxRect(cx + s * 0.25, cy + s * 0.2 - legKick * 0.5, s * 0.2, s * 0.35, darkColor);

  // Eyes (big NES style)
  pxRect(cx - s * 0.35, cy - s * 0.55, s * 0.3, s * 0.25, '#fff');
  pxRect(cx + s * 0.05, cy - s * 0.55, s * 0.3, s * 0.25, '#fff');
  // Pupils
  var pupOx = toadDir === 1 ? s * 0.08 : toadDir === 3 ? -s * 0.08 : 0;
  var pupOy = toadDir === 0 ? -s * 0.04 : toadDir === 2 ? s * 0.04 : 0;
  pxRect(cx - s * 0.25 + pupOx, cy - s * 0.48 + pupOy, s * 0.15, s * 0.15, '#111');
  pxRect(cx + s * 0.15 + pupOx, cy - s * 0.48 + pupOy, s * 0.15, s * 0.15, '#111');
  // Eye shine
  pxRect(cx - s * 0.32, cy - s * 0.53, s * 0.06, s * 0.06, 'rgba(255,255,255,0.8)');
  pxRect(cx + s * 0.22, cy - s * 0.53, s * 0.06, s * 0.06, 'rgba(255,255,255,0.8)');

  // Cowboy hat (pixel art)
  var hatY = cy - s * 0.65;
  // Brim
  pxRect(cx - s * 0.55, hatY + s * 0.08, s * 1.1, s * 0.12, '#8B4513');
  // Crown
  pxRect(cx - s * 0.3, hatY - s * 0.25, s * 0.6, s * 0.35, '#A0522D');
  // Dip in crown
  pxRect(cx - s * 0.1, hatY - s * 0.15, s * 0.2, s * 0.1, '#8B4513');
  // Hat band
  pxRect(cx - s * 0.28, hatY + s * 0.02, s * 0.56, s * 0.06, '#654321');

  // Tongue (idle animation)
  if (!toadHopping && toadIdleTimer > 2 && Math.sin(toadIdleTimer * 3) > 0.95) {
    var tongueLen = s * 0.6 * Math.abs(Math.sin(toadIdleTimer * 8));
    pxRect(cx - s * 0.05, cy - s * 0.45 - tongueLen, s * 0.1, tongueLen, '#ff4466');
    pxRect(cx - 1, cy - s * 0.45 - tongueLen - 2, 3, 3, '#111');
  }

  // Baseling icon/name indicator
  if (statB.name && statB.name !== 'Baseling') {
    ctx.font = Math.floor(TILE * 0.2) + 'px monospace';
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon || 'B', cx, cy - s * 1.1);
  }
}

function drawBears() {
  for (var i = 0; i < bears.length; i++) {
    drawBear(bears[i]);
  }
}

function drawBear(b) {
  var x = b.x;
  var y = b.y;
  var w = b.w;
  var h = TILE;
  var legBob = Math.sin(b.legPhase) * 3;
  var flip = b.dir < 0;
  var cx = x + w / 2;
  var cy = y + h / 2;
  var s = w * 0.42;

  // Determine colors by Tasern enemy type
  var bodyColor, darkColor, lightColor, eyeColor;
  var etype = b.type;
  if (etype === 'dire_wolf' || etype === 'ice_wolf') {
    bodyColor = etype === 'ice_wolf' ? '#8899bb' : '#666666';
    darkColor = shadeColor(bodyColor, -25);
    lightColor = shadeColor(bodyColor, 25);
    eyeColor = '#ffaa00';
  } else if (etype === 'bandit' || etype === 'sand_raider') {
    bodyColor = etype === 'sand_raider' ? '#aa8855' : '#775544';
    darkColor = shadeColor(bodyColor, -25);
    lightColor = shadeColor(bodyColor, 25);
    eyeColor = '#ff4444';
  } else if (etype === 'scorpion') {
    bodyColor = '#885522'; darkColor = '#553311'; lightColor = '#aa7744'; eyeColor = '#ff0000';
  } else if (etype === 'frost_elemental') {
    bodyColor = '#88aacc'; darkColor = '#5588aa'; lightColor = '#aaccee'; eyeColor = '#ffffff';
  } else if (etype === 'bog_troll') {
    bodyColor = '#556633'; darkColor = '#334411'; lightColor = '#778855'; eyeColor = '#ffff00';
  } else if (etype === 'swamp_snake') {
    bodyColor = '#446622'; darkColor = '#224400'; lightColor = '#668844'; eyeColor = '#ff8800';
  } else if (etype === 'fire_imp') {
    bodyColor = '#cc4422'; darkColor = '#882211'; lightColor = '#ee6644'; eyeColor = '#ffff44';
  } else if (etype === 'lava_hound') {
    bodyColor = '#883311'; darkColor = '#551100'; lightColor = '#aa5533'; eyeColor = '#ff4400';
  } else if (etype === 'crystal_golem') {
    bodyColor = '#6644aa'; darkColor = '#442288'; lightColor = '#8866cc'; eyeColor = '#ff44ff';
  } else if (etype === 'shadow_bat') {
    bodyColor = '#333344'; darkColor = '#111122'; lightColor = '#555566'; eyeColor = '#ff0088';
  } else {
    bodyColor = '#8B5A2B'; darkColor = '#5a3a1a'; lightColor = '#aa7a4a'; eyeColor = '#ff2222';
  }

  // Burst glow
  if (b.burstTimer > 0) {
    ctx.fillStyle = 'rgba(255,50,50,0.12)';
    ctx.beginPath();
    ctx.arc(cx, cy, s * 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.translate(cx, cy);
  if (flip) ctx.scale(-1, 1);

  // Legs (pixel blocks)
  pxRect(-s * 0.5, s * 0.15 + legBob, s * 0.2, s * 0.4, darkColor);
  pxRect(-s * 0.2, s * 0.15 - legBob, s * 0.2, s * 0.4, darkColor);
  pxRect(s * 0.15, s * 0.15 + legBob, s * 0.2, s * 0.4, darkColor);
  pxRect(s * 0.45, s * 0.15 - legBob, s * 0.2, s * 0.4, darkColor);

  // Body
  pxRect(-s * 0.6, -s * 0.35, s * 1.2, s * 0.7, bodyColor);

  // Head
  pxRect(s * 0.3, -s * 0.45, s * 0.45, s * 0.45, bodyColor);

  // Snout
  pxRect(s * 0.55, -s * 0.2, s * 0.25, s * 0.2, lightColor);

  // Eye
  pxRect(s * 0.45, -s * 0.38, s * 0.12, s * 0.12, '#fff');
  pxRect(s * 0.47, -s * 0.36, s * 0.06, s * 0.06, eyeColor);

  // Angry brow
  pxRect(s * 0.38, -s * 0.45, s * 0.25, s * 0.04, darkColor);

  // Ears
  pxRect(s * 0.35, -s * 0.52, s * 0.1, s * 0.1, darkColor);
  pxRect(s * 0.55, -s * 0.52, s * 0.1, s * 0.1, darkColor);

  // Open mouth if bursting
  if (b.burstTimer > 0) {
    pxRect(s * 0.6, -s * 0.05, s * 0.18, s * 0.12, '#800');
    // Fangs
    pxRect(s * 0.62, -s * 0.05, s * 0.04, s * 0.06, '#fff');
    pxRect(s * 0.72, -s * 0.05, s * 0.04, s * 0.06, '#fff');
  }

  // Type-specific features
  if (etype === 'scorpion') {
    // Tail
    pxRect(-s * 0.65, -s * 0.5, s * 0.15, s * 0.3, bodyColor);
    pxRect(-s * 0.55, -s * 0.65, s * 0.15, s * 0.2, darkColor);
    pxRect(-s * 0.45, -s * 0.7, s * 0.1, s * 0.1, '#ff4444');
  }
  if (etype === 'frost_elemental' || etype === 'crystal_golem') {
    // Crystal shards
    pxRect(-s * 0.3, -s * 0.55, s * 0.1, s * 0.2, lightColor);
    pxRect(s * 0.1, -s * 0.5, s * 0.08, s * 0.15, lightColor);
  }
  if (etype === 'fire_imp' || etype === 'lava_hound') {
    // Flame on top
    if (Math.random() > 0.3) {
      pxRect(-s * 0.1 + Math.random() * s * 0.2, -s * 0.55 - Math.random() * s * 0.2, s * 0.15, s * 0.15, '#ff8844');
    }
  }
  if (etype === 'shadow_bat') {
    // Wings
    pxRect(-s * 0.8, -s * 0.3, s * 0.3, s * 0.15, darkColor);
    pxRect(s * 0.5, -s * 0.3, s * 0.3, s * 0.15, darkColor);
  }

  ctx.restore();
}

function drawBulls() {
  for (var i = 0; i < bulls.length; i++) {
    drawBull(bulls[i]);
  }
}

function drawBull(b) {
  var x = b.x;
  var y = b.y;
  var w = b.w;
  var legBob = Math.sin(b.legPhase) * 2;
  var flip = b.dir < 0;
  var cx = x + w / 2;
  var cy = y + TILE / 2;
  var s = w * 0.38;

  var bodyColor = b.color;
  var darkColor = shadeColor(b.color, -25);

  ctx.save();
  ctx.translate(cx, cy);
  if (flip) ctx.scale(-1, 1);

  // Legs (pixel blocks)
  pxRect(-s * 0.5, s * 0.15 + legBob, s * 0.12, s * 0.42, darkColor);
  pxRect(-s * 0.2, s * 0.15 - legBob, s * 0.12, s * 0.42, darkColor);
  pxRect(s * 0.15, s * 0.15 + legBob, s * 0.12, s * 0.42, darkColor);
  pxRect(s * 0.45, s * 0.15 - legBob, s * 0.12, s * 0.42, darkColor);
  // Hooves
  pxRect(-s * 0.52, s * 0.52 + legBob, s * 0.16, s * 0.06, '#333');
  pxRect(-s * 0.22, s * 0.52 - legBob, s * 0.16, s * 0.06, '#333');
  pxRect(s * 0.13, s * 0.52 + legBob, s * 0.16, s * 0.06, '#333');
  pxRect(s * 0.43, s * 0.52 - legBob, s * 0.16, s * 0.06, '#333');

  // Body
  pxRect(-s * 0.65, -s * 0.3, s * 1.3, s * 0.65, bodyColor);

  // Head
  pxRect(s * 0.4, -s * 0.4, s * 0.4, s * 0.4, bodyColor);

  // Horns (pixel)
  pxRect(s * 0.35, -s * 0.55, s * 0.08, s * 0.2, '#f0e8c8');
  pxRect(s * 0.28, -s * 0.6, s * 0.08, s * 0.1, '#f0e8c8');
  pxRect(s * 0.65, -s * 0.55, s * 0.08, s * 0.2, '#f0e8c8');
  pxRect(s * 0.72, -s * 0.6, s * 0.08, s * 0.1, '#f0e8c8');

  // Eye
  pxRect(s * 0.5, -s * 0.25, s * 0.1, s * 0.1, '#fff');
  pxRect(s * 0.52, -s * 0.23, s * 0.05, s * 0.05, '#333');

  // Nose ring
  pxRect(s * 0.7, -s * 0.05, s * 0.04, s * 0.08, '#ccc');
  pxRect(s * 0.66, s * 0.0, s * 0.04, s * 0.04, '#ccc');
  pxRect(s * 0.74, s * 0.0, s * 0.04, s * 0.04, '#ccc');

  // Tail
  pxRect(-s * 0.7, -s * 0.15, s * 0.1, s * 0.25, darkColor);
  pxRect(-s * 0.75, -s * 0.3 + Math.sin(b.legPhase * 0.7) * 2, s * 0.08, s * 0.08, darkColor);

  // "Rideable" glow
  ctx.strokeStyle = 'rgba(100,255,100,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-s * 0.7, -s * 0.35, s * 1.4, s * 0.75);

  ctx.restore();
}

function drawBonusFly() {
  if (!bonusFly) return;
  var x = bonusFly.col * TILE + TILE / 2;
  var y = bonusFly.row * TILE + TILE / 2;
  var blink = Math.sin(bonusFly.blink) > 0;
  if (bonusFly.timer < 1 && !blink) return;

  // [WIS] glow range indicator
  var flyDist = Math.abs(toadRow - bonusFly.row) + Math.abs(toadCol - bonusFly.col);
  if (flyDist <= getWisRange()) {
    ctx.fillStyle = 'rgba(0,255,100,0.08)';
    ctx.beginPath();
    ctx.arc(x, y, TILE * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  ctx.fillStyle = 'rgba(0,255,100,0.15)';
  ctx.beginPath();
  ctx.arc(x, y, TILE * 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Pixel fly
  pxRect(x - 3, y - 2, 6, 4, '#111');
  // Wings
  var wingFlap = Math.sin(bonusFly.blink * 3) * 2;
  pxRect(x - 6, y - 5 + wingFlap, 5, 3, 'rgba(200,220,255,0.6)');
  pxRect(x + 2, y - 5 - wingFlap, 5, 3, 'rgba(200,220,255,0.6)');
  // Eyes
  pxRect(x - 2, y - 3, 2, 2, '#f00');
  pxRect(x + 1, y - 3, 2, 2, '#f00');

  ctx.font = 'bold ' + Math.floor(TILE * 0.25) + 'px monospace';
  ctx.fillStyle = '#0f0';
  ctx.textAlign = 'center';
  ctx.fillText('+' + (200 * level), x, y - TILE * 0.35);
}

function drawBoss() {
  if (!boss) return;
  var bx = boss.x;
  var by = boss.y;
  var s = TILE * 1.2;
  var flash = boss.hitFlash > 0;
  var zone = getZone();

  // Boss shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(bx, by + s * 1.0, s * 0.8, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Boss body (large pixel creature)
  var col = flash ? '#ffffff' : boss.color;
  var dcol = flash ? '#cccccc' : shadeColor(boss.color, -30);
  var lcol = flash ? '#ffffff' : shadeColor(boss.color, 30);

  // Wings/arms
  pxRect(bx - s * 1.0, by - s * 0.2, s * 0.4, s * 0.6, dcol);
  pxRect(bx + s * 0.6, by - s * 0.2, s * 0.4, s * 0.6, dcol);

  // Body
  pxRect(bx - s * 0.5, by - s * 0.5, s * 1.0, s * 1.0, col);
  pxRect(bx - s * 0.35, by - s * 0.3, s * 0.7, s * 0.6, lcol);

  // Head
  pxRect(bx - s * 0.35, by - s * 0.8, s * 0.7, s * 0.4, col);

  // Eyes (menacing)
  pxRect(bx - s * 0.25, by - s * 0.7, s * 0.15, s * 0.15, '#fff');
  pxRect(bx + s * 0.1, by - s * 0.7, s * 0.15, s * 0.15, '#fff');
  pxRect(bx - s * 0.22, by - s * 0.67, s * 0.08, s * 0.08, '#ff0000');
  pxRect(bx + s * 0.13, by - s * 0.67, s * 0.08, s * 0.08, '#ff0000');

  // Horns/crown
  pxRect(bx - s * 0.4, by - s * 1.0, s * 0.12, s * 0.25, dcol);
  pxRect(bx + s * 0.28, by - s * 1.0, s * 0.12, s * 0.25, dcol);
  pxRect(bx - s * 0.1, by - s * 0.95, s * 0.2, s * 0.18, dcol);

  // Mouth
  pxRect(bx - s * 0.15, by - s * 0.48, s * 0.3, s * 0.1, '#440000');
  // Fangs
  pxRect(bx - s * 0.1, by - s * 0.48, s * 0.05, s * 0.08, '#fff');
  pxRect(bx + s * 0.05, by - s * 0.48, s * 0.05, s * 0.08, '#fff');

  // HP bar
  var hpBarW = TILE * 3;
  var hpBarH = 6;
  var hpBarX = bx - hpBarW / 2;
  var hpBarY = by - s * 1.2;
  pxRect(hpBarX, hpBarY, hpBarW, hpBarH, '#333');
  var hpPct = bossHP / bossMaxHP;
  var hpColor = hpPct > 0.5 ? '#44ff44' : hpPct > 0.25 ? '#ffaa00' : '#ff4444';
  pxRect(hpBarX + 1, hpBarY + 1, (hpBarW - 2) * hpPct, hpBarH - 2, hpColor);

  // Boss name
  ctx.font = 'bold ' + Math.floor(TILE * 0.3) + 'px monospace';
  ctx.fillStyle = '#ff8844';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, bx, hpBarY - 4);

  // Projectiles
  for (var i = 0; i < bossProjectiles.length; i++) {
    var p = bossProjectiles[i];
    pxRect(p.x - 4, p.y - 4, 8, 8, '#ff4444');
    pxRect(p.x - 2, p.y - 2, 4, 4, '#ffaa44');
    // Trail particles
    if (Math.random() < 0.4) {
      particles.push({
        x: p.x, y: p.y,
        vx: (Math.random() - 0.5) * 20,
        vy: (Math.random() - 0.5) * 20,
        life: 0.2, maxLife: 0.3,
        size: 2, color: '#ff6644',
      });
    }
  }
}

function drawDeathAnim() {
  var t = deathTimer / DEATH_DURATION;
  var x = deathX + TILE / 2;
  var y = deathY + TILE / 2;

  // Pixel explosion stars
  var starCount = 5;
  var radius = t * TILE * 1.5;
  for (var i = 0; i < starCount; i++) {
    var angle = (i / starCount) * Math.PI * 2 + t * 8;
    var sx = x + Math.cos(angle) * radius;
    var sy = y + Math.sin(angle) * radius - t * 20;
    var starAlpha = Math.max(0, 1 - t);
    pxRect(sx - 3, sy - 3, 6, 6, 'rgba(255,255,0,' + starAlpha + ')');
    pxRect(sx - 1, sy - 5, 2, 10, 'rgba(255,255,0,' + starAlpha * 0.7 + ')');
    pxRect(sx - 5, sy - 1, 10, 2, 'rgba(255,255,0,' + starAlpha * 0.7 + ')');
  }

  if (t < 0.6) {
    ctx.font = 'bold ' + Math.floor(TILE * 0.55) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText('BONK!', x + 2, y - TILE * 0.8 - t * 30 + 2);
    ctx.fillStyle = 'rgba(255,80,80,' + (1 - t * 1.5) + ')';
    ctx.fillText('BONK!', x, y - TILE * 0.8 - t * 30);
  }
}

function drawWinAnim() {
  var t = winTimer / WIN_DURATION;
  var textY = TILE / 2 - t * TILE * 2;

  ctx.font = 'bold ' + Math.floor(TILE * 0.6) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.fillText('YEE HAW!', W / 2 + 2, textY + 2);
  ctx.fillStyle = 'rgba(255,215,0,' + Math.max(0, 1 - t * 1.2) + ')';
  ctx.fillText('YEE HAW!', W / 2, textY);
}

function drawLevelUp() {
  var t = levelUpTimer / LEVEL_UP_DURATION;
  ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, t * 2) + ')';
  ctx.fillRect(0, 0, W, H);

  var bounceY = Math.sin(t * Math.PI * 3) * 10;
  var zone = ZONE_THEMES[level % ZONE_THEMES.length];

  ctx.font = 'bold ' + Math.floor(TILE * 0.9) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.fillText('LEVEL ' + (level + 1) + '!', W / 2 + 2, H / 2 - TILE + bounceY + 2);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('LEVEL ' + (level + 1) + '!', W / 2, H / 2 - TILE + bounceY);

  ctx.font = Math.floor(TILE * 0.35) + 'px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('Entering: ' + zone.name, W / 2, H / 2 + TILE * 0.3);

  // Boss warning every 3 levels
  if ((level + 1) % 3 === 0) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold ' + Math.floor(TILE * 0.35) + 'px monospace';
    ctx.fillText('BOSS AHEAD!', W / 2, H / 2 + TILE * 1.0);
  }

  if (t > 0.5) {
    ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
    ctx.fillStyle = '#888';
    var dots = '.'.repeat(Math.floor((t - 0.5) * 6) % 4);
    ctx.fillText('Saddle up' + dots, W / 2, H / 2 + TILE * 1.5);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = Math.max(0, p.life / p.maxLife);
    var sz = Math.max(1, Math.floor(p.size * alpha));
    ctx.globalAlpha = alpha;
    pxRect(p.x - sz / 2, p.y - sz / 2, sz, sz, p.color);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  var pad = TILE * 0.15;
  var fontSize = Math.floor(TILE * 0.35);
  ctx.font = 'bold ' + fontSize + 'px monospace';

  // Score
  ctx.textAlign = 'left';
  ctx.fillStyle = '#000';
  ctx.fillText('SCORE:' + score, pad + 1, fontSize + pad + 1);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('SCORE:' + score, pad, fontSize + pad);

  // High score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#000';
  ctx.fillText('HI:' + highScore, W - pad + 1, fontSize + pad + 1);
  ctx.fillStyle = '#aaa';
  ctx.fillText('HI:' + highScore, W - pad, fontSize + pad);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff4444';
  var livesText = '';
  for (var i = 0; i < lives; i++) livesText += '\u2665';
  ctx.fillText(livesText, pad, fontSize * 2 + pad * 2);

  // Timer
  ctx.textAlign = 'center';
  ctx.fillStyle = timer <= 5 ? '#ff4444' : timer <= 10 ? '#ffaa00' : '#fff';
  ctx.fillText('TIME:' + timer, W / 2, fontSize + pad);

  // Level + Zone
  ctx.fillStyle = '#88ccff';
  ctx.fillText('LV' + level, W / 2, fontSize * 2 + pad * 2);

  // Stat name if present
  if (statB.name && statB.name !== 'Baseling') {
    ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.textAlign = 'right';
    ctx.fillText(statB.name + ' L' + statB.level, W - pad, fontSize * 2 + pad * 2);
  }

  // Active buff indicators
  var buffY = fontSize * 3 + pad * 3;
  ctx.font = Math.floor(TILE * 0.22) + 'px monospace';
  ctx.textAlign = 'left';
  if (speedBuff > 0) {
    ctx.fillStyle = '#44ff88';
    ctx.fillText('SPD ' + Math.ceil(speedBuff) + 's', pad, buffY);
    buffY += fontSize * 0.7;
  }
  if (shieldBuff > 0) {
    ctx.fillStyle = '#44aaff';
    ctx.fillText('SHD ' + Math.ceil(shieldBuff) + 's', pad, buffY);
  }
}

function drawTitle() {
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0, 0, W, H);

  // Pixel dust texture
  for (var i = 0; i < 40; i++) {
    pxRect(Math.floor(Math.random() * W / 4) * 4, Math.floor(Math.random() * H / 4) * 4,
      4, 2, 'rgba(200,160,100,' + (Math.random() * 0.04) + ')');
  }

  var cx = W / 2;
  var cy = H * 0.3;

  // Pixel bull silhouette
  var bs = TILE * 1.6;
  pxRect(cx - bs * 0.7, cy - bs * 0.2, bs * 1.4, bs * 0.6, '#1a0e04');
  pxRect(cx + bs * 0.4, cy - bs * 0.35, bs * 0.4, bs * 0.35, '#1a0e04');
  // Horns
  pxRect(cx + bs * 0.3, cy - bs * 0.55, bs * 0.1, bs * 0.25, '#2a1a08');
  pxRect(cx + bs * 0.7, cy - bs * 0.55, bs * 0.1, bs * 0.25, '#2a1a08');
  // Legs
  pxRect(cx - bs * 0.5, cy + bs * 0.3, bs * 0.1, bs * 0.35, '#1a0e04');
  pxRect(cx - bs * 0.2, cy + bs * 0.3, bs * 0.1, bs * 0.35, '#1a0e04');
  pxRect(cx + bs * 0.2, cy + bs * 0.3, bs * 0.1, bs * 0.35, '#1a0e04');
  pxRect(cx + bs * 0.45, cy + bs * 0.3, bs * 0.1, bs * 0.35, '#1a0e04');

  // Pixel baseling riding on top
  var ts = TILE * 0.6;
  var tx = cx - bs * 0.1;
  var ty = cy - bs * 0.35;
  pxRect(tx - ts * 0.4, ty - ts * 0.3, ts * 0.8, ts * 0.6, statB.color || '#44dd88');
  // Eyes
  pxRect(tx - ts * 0.25, ty - ts * 0.35, ts * 0.2, ts * 0.15, '#fff');
  pxRect(tx + ts * 0.05, ty - ts * 0.35, ts * 0.2, ts * 0.15, '#fff');
  pxRect(tx - ts * 0.2, ty - ts * 0.3, ts * 0.1, ts * 0.08, '#111');
  pxRect(tx + ts * 0.1, ty - ts * 0.3, ts * 0.1, ts * 0.08, '#111');
  // Cowboy hat
  pxRect(tx - ts * 0.5, ty - ts * 0.45, ts * 1.0, ts * 0.1, '#8B4513');
  pxRect(tx - ts * 0.3, ty - ts * 0.7, ts * 0.6, ts * 0.28, '#A0522D');
  pxRect(tx - ts * 0.28, ty - ts * 0.48, ts * 0.56, ts * 0.05, '#654321');
  // Lasso (animated)
  var lt = Date.now() / 500;
  ctx.strokeStyle = '#ddc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tx + ts * 0.45, ty - ts * 0.1);
  ctx.quadraticCurveTo(tx + ts * 1.1, ty - ts * 0.9 + Math.sin(lt) * 6,
    tx + ts * 0.7 + Math.cos(lt) * 8, ty - ts * 1.1 + Math.sin(lt) * 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(tx + ts * 0.7 + Math.cos(lt) * 8, ty - ts * 1.1 + Math.sin(lt) * 4,
    ts * 0.2, ts * 0.15, lt, 0, Math.PI * 2);
  ctx.stroke();

  // Title text with NES shadow
  var titleSize = Math.floor(TILE * 1.0);
  ctx.font = 'bold ' + titleSize + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.fillText('RODEO TOAD', cx + 3, H * 0.58 + 3);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('RODEO TOAD', cx, H * 0.58);

  // Subtitle
  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.fillStyle = '#aa8844';
  ctx.fillText('Ride the Bulls. Dodge the Beasts.', cx, H * 0.64);

  // Zone preview
  ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
  ctx.fillStyle = '#666';
  ctx.fillText('6 Zones - Bosses - Items - D&D Stats', cx, H * 0.69);

  // Bear warning
  if (Math.sin(Date.now() / 400) > 0) {
    ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('DANGER AHEAD', cx, H * 0.73);
  }

  // High score
  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('HIGH SCORE: ' + highScore, cx, H * 0.79);

  // NES-style controls
  ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('ARROWS/WASD: Move   Z: Select   X: Back', cx, H * 0.85);

  if (Math.sin(Date.now() / 300) > 0) {
    ctx.fillStyle = '#fff';
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillText('PRESS START', cx, H * 0.91);
  }

  // NFT connect
  if (window.ethereum && !nftChecked) {
    ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
    ctx.fillStyle = nftConnecting ? '#ffaa00' : '#8af';
    ctx.fillText(nftConnecting ? 'Connecting...' : 'W = Connect Wallet', cx, H * 0.96);
  } else if (statB.name && statB.name !== 'Baseling') {
    ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
    ctx.fillStyle = statB.color || '#8af';
    ctx.fillText(statB.name + ' (L' + statB.level + ')', cx, H * 0.96);
  }
}

function drawTutorial() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  var cx = W / 2;
  ctx.textAlign = 'center';

  // Tutorial box
  var boxY = H * 0.2;
  var boxH = H * 0.6;
  pxRect(W * 0.1, boxY, W * 0.8, boxH, '#1a1a2a');
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 2;
  ctx.strokeRect(W * 0.1 + 2, boxY + 2, W * 0.8 - 4, boxH - 4);

  ctx.font = 'bold ' + Math.floor(TILE * 0.45) + 'px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('HOW TO PLAY', cx, boxY + TILE * 1.2);

  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.fillStyle = '#fff';
  var step = tutorialStep;

  if (step === 0) {
    ctx.fillText('Use ARROWS or WASD to hop', cx, boxY + TILE * 2.2);
    ctx.fillText('around the arena.', cx, boxY + TILE * 2.8);
    // Draw pixel arrow keys
    pxRect(cx - TILE * 0.15, boxY + TILE * 3.5, TILE * 0.3, TILE * 0.3, '#444');
    pxRect(cx - TILE * 0.6, boxY + TILE * 4.0, TILE * 0.3, TILE * 0.3, '#444');
    pxRect(cx - TILE * 0.15, boxY + TILE * 4.0, TILE * 0.3, TILE * 0.3, '#444');
    pxRect(cx + TILE * 0.3, boxY + TILE * 4.0, TILE * 0.3, TILE * 0.3, '#444');
    ctx.font = Math.floor(TILE * 0.2) + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('^', cx, boxY + TILE * 3.75);
    ctx.fillText('<', cx - TILE * 0.45, boxY + TILE * 4.25);
    ctx.fillText('v', cx, boxY + TILE * 4.25);
    ctx.fillText('>', cx + TILE * 0.45, boxY + TILE * 4.25);
  } else if (step === 1) {
    ctx.fillText('RIDE the bulls to cross', cx, boxY + TILE * 2.2);
    ctx.fillText('the green lanes safely.', cx, boxY + TILE * 2.8);
    ctx.fillStyle = '#44ff44';
    ctx.fillText('Jump ON a bull = safe!', cx, boxY + TILE * 3.6);
    ctx.fillStyle = '#ff4444';
    ctx.fillText('Miss the bull = squish!', cx, boxY + TILE * 4.2);
  } else if (step === 2) {
    ctx.fillText('DODGE the beasts in the', cx, boxY + TILE * 2.2);
    ctx.fillText('dusty lanes. They bite!', cx, boxY + TILE * 2.8);
    ctx.fillStyle = '#ffaa44';
    ctx.fillText('Collect items on fences:', cx, boxY + TILE * 3.4);
    ctx.fillStyle = '#ff4488';
    ctx.fillText('Potions  Boots  Scrolls', cx, boxY + TILE * 4.0);
  } else if (step === 3) {
    ctx.fillText('Fill all 5 HAY BALES at', cx, boxY + TILE * 2.2);
    ctx.fillText('the top to advance!', cx, boxY + TILE * 2.8);
    ctx.fillStyle = '#ffd700';
    ctx.fillText('Your D&D stats affect', cx, boxY + TILE * 3.6);
    ctx.fillText('everything. Level up!', cx, boxY + TILE * 4.2);
  }

  // Progress dots
  for (var d = 0; d < 4; d++) {
    pxRect(cx - 20 + d * 12, boxY + boxH - TILE * 1.0, 6, 6, d <= step ? '#ffd700' : '#444');
  }

  if (Math.sin(Date.now() / 300) > 0) {
    ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('TAP or PRESS Z to continue', cx, boxY + boxH - TILE * 0.4);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  var cx = W / 2;
  ctx.textAlign = 'center';

  ctx.font = 'bold ' + Math.floor(TILE * 0.8) + 'px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('GAME OVER', cx + 2, H * 0.3 + 2);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', cx, H * 0.3);

  ctx.font = Math.floor(TILE * 0.38) + 'px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Score: ' + score, cx, H * 0.42);

  ctx.fillStyle = '#aaa';
  ctx.fillText('Level: ' + level, cx, H * 0.50);
  ctx.fillText('Bales: ' + balesTotal + '/5', cx, H * 0.56);

  // Stat summary
  ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con, cx, H * 0.62);
  ctx.fillText('INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, cx, H * 0.66);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.floor(TILE * 0.38) + 'px monospace';
    ctx.fillText('NEW HIGH SCORE!', cx, H * 0.74);
  }

  if (Math.sin(Date.now() / 300) > 0) {
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS START to continue', cx, H * 0.82);
  }

  // Puns
  ctx.font = Math.floor(TILE * 0.22) + 'px monospace';
  ctx.fillStyle = '#555';
  var puns = [
    'The beasts got you... unbearable!',
    'Should have held on to that bull...',
    'The market wins again.',
    'This toad could not HODL on.',
    'Trampled by the horde. Classic.',
    'The bull run ended too soon.',
    'Even a shield could not save you.',
    'The wyvern sends its regards.',
  ];
  ctx.fillText(puns[Math.floor(Date.now() / 3000) % puns.length], cx, H * 0.91);
}

// ============================================================
// HELPERS
// ============================================================
function shadeColor(color, amount) {
  if (!color || color.charAt(0) !== '#') return color;
  var r = parseInt(color.slice(1, 3), 16);
  var g = parseInt(color.slice(3, 5), 16);
  var b = parseInt(color.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

})();
</script>
