<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rodeo Toad</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
(function() {
"use strict";

// ============================================================
// GRID & LAYOUT
// ============================================================
const COLS = 13;
const ROWS = 15;
const BASE_TILE = 36;

// Row assignments (bottom to top):
// Row 14: start (grass/pond)
// Row 13: safe zone (fence)
// Row 12-11: bear lanes (slow)
// Row 10: safe zone (fence)
// Row 9-8: bull ride lanes (logs)
// Row 7: safe zone (fence)
// Row 6-5: bear lanes (fast)
// Row 4: safe zone (fence)
// Row 3-2: bull ride lanes (fast)
// Row 1: safe zone (fence)
// Row 0: goal (hay bale slots)

const LANE_TYPES = [];
// Build from row 0 (top) to row 14 (bottom)
LANE_TYPES[0]  = 'goal';
LANE_TYPES[1]  = 'fence';
LANE_TYPES[2]  = 'bull';
LANE_TYPES[3]  = 'bull';
LANE_TYPES[4]  = 'fence';
LANE_TYPES[5]  = 'bear';
LANE_TYPES[6]  = 'bear';
LANE_TYPES[7]  = 'fence';
LANE_TYPES[8]  = 'bull';
LANE_TYPES[9]  = 'bull';
LANE_TYPES[10] = 'fence';
LANE_TYPES[11] = 'bear';
LANE_TYPES[12] = 'bear';
LANE_TYPES[13] = 'fence';
LANE_TYPES[14] = 'start';

// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, TILE, SCALE;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 24;
  SCALE = Math.min(sw / (COLS * BASE_TILE), sh / (ROWS * BASE_TILE));
  TILE = Math.floor(BASE_TILE * SCALE);
  W = COLS * TILE;
  H = ROWS * TILE;
  const ox = Math.floor((sw - W) / 2);
  const oy = Math.floor((sh - H) / 2);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.style.marginTop = Math.max(0, oy) + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, t + dur);
  gain.gain.setValueAtTime(vol || 0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function playNoise(dur, vol, freq) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.04, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = freq || 600;
  filt.Q.value = 1;
  src.connect(filt);
  filt.connect(gain);
  gain.connect(audioCtx.destination);
  src.start(t);
  src.stop(t + dur);
}

function sfxHop() {
  playTone(280, 0.08, 'sine', 0.12, 420);
  playTone(420, 0.06, 'sine', 0.08, 500);
}
function sfxSplat() {
  playNoise(0.25, 0.12, 400);
  playTone(200, 0.15, 'sawtooth', 0.08, 80);
}
function sfxLand() {
  playTone(523, 0.08, 'sine', 0.1);
  playTone(659, 0.08, 'sine', 0.08);
  playTone(784, 0.12, 'sine', 0.06);
}
function sfxYeeHaw() {
  const notes = [392, 494, 587, 659, 784, 880, 988];
  notes.forEach((n, i) => {
    setTimeout(() => playTone(n, 0.12, 'square', 0.07), i * 60);
  });
  setTimeout(() => playTone(988, 0.3, 'sawtooth', 0.06, 1175), 420);
}
function sfxFly() {
  playTone(800, 0.06, 'sine', 0.1, 1600);
  setTimeout(() => playTone(1200, 0.08, 'sine', 0.08, 1800), 60);
}
function sfxRumble() {
  playNoise(0.3, 0.03, 200);
  playTone(60, 0.3, 'sine', 0.04, 40);
}
function sfxGameOver() {
  [392, 349, 330, 262].forEach((n, i) => {
    setTimeout(() => playTone(n, 0.25, 'square', 0.08), i * 200);
  });
}
function sfxLevelUp() {
  [523, 587, 659, 784, 880, 1047].forEach((n, i) => {
    setTimeout(() => playTone(n, 0.15, 'triangle', 0.1), i * 80);
  });
  setTimeout(() => {
    playTone(1047, 0.4, 'sawtooth', 0.06);
    playTone(1319, 0.4, 'sine', 0.05);
  }, 500);
}

// ============================================================
// GAME STATE
// ============================================================
const STATE = { TITLE: 0, SELECT: 1, PLAYING: 2, DYING: 3, WIN_BALE: 4, LEVEL_UP: 5, GAME_OVER: 6 };
let state = STATE.TITLE;
let score = 0;
let highScore = parseInt(localStorage.getItem('rodeoToadHigh') || '0', 10);
let lives = 3;
let level = 1;
let timer = 30;
let timerAcc = 0;
let furthestRow = 14;
let balesCollected = [false, false, false, false, false];
let balesTotal = 0;

// NFT
let nftBonuses = { lives: 0, scoreMultiplier: 1, color: null, name: null };
let nftChecked = false;
let nftConnecting = false;

// Toad
let toadCol = 6;
let toadRow = 14;
let toadAnimX = 0;
let toadAnimY = 0;
let toadHopping = false;
let toadHopTimer = 0;
const HOP_DURATION = 150; // ms
let toadFromX = 0;
let toadFromY = 0;
let toadToX = 0;
let toadToY = 0;
let toadDir = 0; // 0=up, 1=right, 2=down, 3=left
let toadIdleTimer = 0;
let toadOnBull = null; // reference to bull being ridden

// Death animation
let deathTimer = 0;
let deathX = 0;
let deathY = 0;
const DEATH_DURATION = 800;

// Win bale animation
let winTimer = 0;
let winBaleIdx = -1;
const WIN_DURATION = 1200;

// Level up
let levelUpTimer = 0;
const LEVEL_UP_DURATION = 2000;

// Particles
let particles = [];

// ============================================================
// OBSTACLES
// ============================================================
let bears = [];
let bulls = [];
let bonusFly = null;
let bonusFlyTimer = 0;

function speedMult() {
  return 1 + (level - 1) * 0.18;
}

function initLane(row) {
  const type = LANE_TYPES[row];
  const sm = speedMult();
  if (type === 'bear') {
    const count = 3 + Math.floor(level * 0.3);
    const dir = (row % 2 === 0) ? 1 : -1;
    let baseSpeed;
    if (row <= 6) {
      baseSpeed = (1.8 + Math.random() * 0.8) * sm;
    } else {
      baseSpeed = (1.0 + Math.random() * 0.6) * sm;
    }
    const gap = COLS / count;
    for (let i = 0; i < count; i++) {
      const bearType = (row <= 6 && Math.random() < 0.3) ? 'polar' :
                        (Math.random() < 0.4) ? 'grizzly' : 'brown';
      bears.push({
        row: row,
        x: i * gap * TILE + Math.random() * TILE,
        y: row * TILE,
        w: TILE * (bearType === 'grizzly' ? 1.3 : 1.1),
        speed: baseSpeed * dir * (bearType === 'grizzly' ? 0.85 : 1),
        dir: dir,
        type: bearType,
        legPhase: Math.random() * Math.PI * 2,
        burstTimer: 0,
        burstCooldown: Math.random() * 3 + 2,
      });
    }
  }
  if (type === 'bull') {
    const count = 2 + Math.floor(level * 0.2);
    const dir = (row % 2 === 0) ? 1 : -1;
    let baseSpeed;
    if (row <= 3) {
      baseSpeed = (1.5 + Math.random() * 0.5) * sm;
    } else {
      baseSpeed = (1.0 + Math.random() * 0.4) * sm;
    }
    const bullW = TILE * (1.5 + Math.random() * 0.5);
    const gap = (COLS * TILE) / count;
    for (let i = 0; i < count; i++) {
      bulls.push({
        row: row,
        x: i * gap,
        y: row * TILE,
        w: bullW,
        speed: baseSpeed * dir,
        dir: dir,
        legPhase: Math.random() * Math.PI * 2,
        color: Math.random() < 0.5 ? '#8B4513' : '#654321',
      });
    }
  }
}

function initLevel() {
  bears = [];
  bulls = [];
  particles = [];
  bonusFly = null;
  bonusFlyTimer = 5 + Math.random() * 10;
  for (let r = 0; r < ROWS; r++) {
    initLane(r);
  }
  resetToad();
}

function resetToad() {
  toadCol = 6;
  toadRow = 14;
  toadAnimX = toadCol * TILE;
  toadAnimY = toadRow * TILE;
  toadHopping = false;
  toadOnBull = null;
  furthestRow = 14;
  timer = 30;
  timerAcc = 0;
  toadIdleTimer = 0;
}

// ============================================================
// INPUT
// ============================================================
const keys = {};
let inputQueue = [];
let lastInputTime = 0;

document.addEventListener('keydown', function(e) {
  if (e.repeat) return;
  keys[e.key] = true;
  ensureAudio();

  if (state === STATE.TITLE) {
    if (e.key === 'w' || e.key === 'W') {
      if (window.NftLoader && window.ethereum && !nftConnecting) {
        nftConnecting = true;
        window.NftLoader.connectWallet().then(function(w) {
          if (w) {
            return window.NftLoader.checkNFTs().then(function() {
              nftBonuses = window.NftLoader.getBonuses();
              nftChecked = true;
              if (window.NftLoader.ownedCharacters.length > 0) {
                state = STATE.SELECT;
              }
              nftConnecting = false;
            });
          }
          nftConnecting = false;
        }).catch(function(err) {
          console.warn('NFT check failed:', err);
          nftConnecting = false;
        });
        return;
      }
    }
    if (e.key === ' ' || e.key === 'Enter') {
      startGame();
      return;
    }
  }

  if (state === STATE.SELECT) {
    if (e.key === ' ') {
      window.NftLoader.selectedCharacter = null;
      nftBonuses = { lives: 0, scoreMultiplier: 1, color: null, name: null };
      startGame();
      return;
    }
  }

  if (state === STATE.GAME_OVER) {
    if (e.key === ' ' || e.key === 'Enter') {
      state = STATE.TITLE;
      return;
    }
  }

  if (state === STATE.PLAYING && !toadHopping) {
    const dir = getDirection(e.key);
    if (dir !== -1) {
      inputQueue.push(dir);
    }
  }
});

document.addEventListener('keyup', function(e) { keys[e.key] = false; });

function getDirection(key) {
  if (key === 'ArrowUp' || key === 'w' || key === 'W') return 0;
  if (key === 'ArrowRight' || key === 'd' || key === 'D') return 1;
  if (key === 'ArrowDown' || key === 's' || key === 'S') return 2;
  if (key === 'ArrowLeft' || key === 'a' || key === 'A') return 3;
  return -1;
}

// Touch / swipe
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  ensureAudio();
  const t = e.touches[0];
  touchStartX = t.clientX;
  touchStartY = t.clientY;
  touchStartTime = Date.now();

  if (state === STATE.TITLE) {
    startGame();
    return;
  }
  if (state === STATE.GAME_OVER) {
    state = STATE.TITLE;
    return;
  }
  if (state === STATE.SELECT) {
    const rect = canvas.getBoundingClientRect();
    const cx = (t.clientX - rect.left) * (W / rect.width);
    const cy = (t.clientY - rect.top) * (H / rect.height);
    if (window.NftLoader) {
      const sel = window.NftLoader.handleClick(cx, cy);
      if (sel) {
        nftBonuses = window.NftLoader.getBonuses();
        startGame();
      }
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (state !== STATE.PLAYING) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 20) {
    // Swipe
    if (Math.abs(dx) > Math.abs(dy)) {
      inputQueue.push(dx > 0 ? 1 : 3);
    } else {
      inputQueue.push(dy > 0 ? 2 : 0);
    }
  } else {
    // Tap quadrant
    const rect = canvas.getBoundingClientRect();
    const cx = t.clientX - rect.left;
    const cy = t.clientY - rect.top;
    const midX = rect.width / 2;
    const midY = rect.height / 2;
    if (Math.abs(cx - midX) > Math.abs(cy - midY)) {
      inputQueue.push(cx > midX ? 1 : 3);
    } else {
      inputQueue.push(cy > midY ? 2 : 0);
    }
  }
}, { passive: false });

// Mouse click for NFT select
canvas.addEventListener('click', function(e) {
  ensureAudio();
  if (state === STATE.SELECT && window.NftLoader) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.clientX - rect.left) * (W / rect.width);
    const cy = (e.clientY - rect.top) * (H / rect.height);
    const sel = window.NftLoader.handleClick(cx, cy);
    if (sel) {
      nftBonuses = window.NftLoader.getBonuses();
      startGame();
    }
  }
  if (state === STATE.TITLE) {
    startGame();
  }
  if (state === STATE.GAME_OVER) {
    state = STATE.TITLE;
  }
});

// ============================================================
// GAME START
// ============================================================
function startGame() {
  state = STATE.PLAYING;
  score = 0;
  level = 1;
  lives = 3 + nftBonuses.lives;
  balesCollected = [false, false, false, false, false];
  balesTotal = 0;
  initLevel();
}

// ============================================================
// UPDATE
// ============================================================
let lastTime = 0;
let rumbleTimer = 0;

function update(dt) {
  if (state === STATE.PLAYING) {
    updatePlaying(dt);
  } else if (state === STATE.DYING) {
    deathTimer += dt * 1000;
    updateParticles(dt);
    if (deathTimer >= DEATH_DURATION) {
      lives--;
      if (lives <= 0) {
        state = STATE.GAME_OVER;
        sfxGameOver();
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('rodeoToadHigh', String(highScore));
        }
      } else {
        state = STATE.PLAYING;
        resetToad();
      }
    }
  } else if (state === STATE.WIN_BALE) {
    winTimer += dt * 1000;
    updateParticles(dt);
    if (winTimer >= WIN_DURATION) {
      // Check if all bales filled
      if (balesTotal >= 5) {
        state = STATE.LEVEL_UP;
        levelUpTimer = 0;
        sfxLevelUp();
      } else {
        state = STATE.PLAYING;
        resetToad();
      }
    }
  } else if (state === STATE.LEVEL_UP) {
    levelUpTimer += dt * 1000;
    updateParticles(dt);
    if (levelUpTimer >= LEVEL_UP_DURATION) {
      level++;
      balesCollected = [false, false, false, false, false];
      balesTotal = 0;
      initLevel();
      state = STATE.PLAYING;
    }
  }
}

function updatePlaying(dt) {
  // Timer
  timerAcc += dt;
  if (timerAcc >= 1) {
    timerAcc -= 1;
    timer--;
    if (timer <= 0) {
      killToad();
      return;
    }
  }

  // Process input
  if (!toadHopping && inputQueue.length > 0) {
    const dir = inputQueue.shift();
    tryHop(dir);
  }
  // Clear stale inputs
  if (inputQueue.length > 2) inputQueue = [inputQueue[inputQueue.length - 1]];

  // Hop animation
  if (toadHopping) {
    toadHopTimer += dt * 1000;
    const t = Math.min(toadHopTimer / HOP_DURATION, 1);
    toadAnimX = toadFromX + (toadToX - toadFromX) * t;
    toadAnimY = toadFromY + (toadToY - toadFromY) * t;
    if (t >= 1) {
      toadHopping = false;
      toadHopTimer = 0;
      toadAnimX = toadToX;
      toadAnimY = toadToY;
      onLand();
    }
  }

  // Move bears
  for (let i = 0; i < bears.length; i++) {
    const b = bears[i];
    b.legPhase += dt * 8;
    // Speed bursts for top bears
    b.burstCooldown -= dt;
    if (b.burstCooldown <= 0 && b.row <= 6) {
      b.burstTimer = 0.4 + Math.random() * 0.3;
      b.burstCooldown = 3 + Math.random() * 4;
    }
    let spd = b.speed;
    if (b.burstTimer > 0) {
      spd *= 1.8;
      b.burstTimer -= dt;
    }
    b.x += spd * TILE * dt;
    // Wrap
    if (b.dir > 0 && b.x > COLS * TILE + b.w) b.x = -b.w;
    if (b.dir < 0 && b.x < -b.w) b.x = COLS * TILE + b.w;
  }

  // Move bulls (rideable)
  for (let i = 0; i < bulls.length; i++) {
    const b = bulls[i];
    b.legPhase += dt * 6;
    b.x += b.speed * TILE * dt;
    // Wrap
    if (b.dir > 0 && b.x > COLS * TILE + b.w) b.x = -b.w;
    if (b.dir < 0 && b.x < -b.w) b.x = COLS * TILE;
  }

  // If toad is on a bull row and not hopping, ride the bull
  const laneType = LANE_TYPES[toadRow];
  if (laneType === 'bull' && !toadHopping) {
    const ridingBull = findBullAt(toadAnimX + TILE * 0.5, toadRow);
    if (ridingBull) {
      toadOnBull = ridingBull;
      toadAnimX += ridingBull.speed * TILE * dt;
      toadCol = Math.round(toadAnimX / TILE);
      // Carried off screen?
      if (toadAnimX < -TILE || toadAnimX > COLS * TILE) {
        killToad();
        return;
      }
    } else {
      // Not on any bull in a bull lane = fallen off
      toadOnBull = null;
      killToad();
      return;
    }
  } else {
    toadOnBull = null;
  }

  // Bear collision (only when not hopping or at destination)
  if (!toadHopping) {
    const toadCx = toadAnimX + TILE * 0.5;
    const toadCy = toadAnimY + TILE * 0.5;
    for (let i = 0; i < bears.length; i++) {
      const b = bears[i];
      if (b.row !== toadRow) continue;
      const bCx = b.x + b.w * 0.5;
      const bCy = b.y + TILE * 0.5;
      const dx = Math.abs(toadCx - bCx);
      const dy = Math.abs(toadCy - bCy);
      if (dx < (TILE * 0.4 + b.w * 0.35) && dy < TILE * 0.6) {
        killToad();
        return;
      }
    }
  }

  // Bonus fly
  bonusFlyTimer -= dt;
  if (bonusFlyTimer <= 0 && !bonusFly) {
    // Spawn a fly on a safe row
    const safeRows = [1, 4, 7, 10, 13];
    const row = safeRows[Math.floor(Math.random() * safeRows.length)];
    bonusFly = {
      col: Math.floor(Math.random() * COLS),
      row: row,
      timer: 3 + Math.random() * 2,
      blink: 0,
    };
  }
  if (bonusFly) {
    bonusFly.timer -= dt;
    bonusFly.blink += dt * 10;
    if (bonusFly.timer <= 0) {
      bonusFly = null;
      bonusFlyTimer = 6 + Math.random() * 8;
    } else if (!toadHopping && toadCol === bonusFly.col && toadRow === bonusFly.row) {
      const pts = 200 * level;
      score += Math.floor(pts * nftBonuses.scoreMultiplier);
      sfxFly();
      spawnParticles(bonusFly.col * TILE + TILE / 2, bonusFly.row * TILE + TILE / 2, '#0f0', 8);
      bonusFly = null;
      bonusFlyTimer = 8 + Math.random() * 10;
    }
  }

  // Ambient rumble when bears are near
  rumbleTimer -= dt;
  if (rumbleTimer <= 0) {
    const nearBear = bears.some(function(b) {
      return b.row === toadRow || b.row === toadRow - 1 || b.row === toadRow + 1;
    });
    if (nearBear) {
      sfxRumble();
      rumbleTimer = 1.5;
    } else {
      rumbleTimer = 0.5;
    }
  }

  // Particles
  updateParticles(dt);

  // Dust from bears
  for (let i = 0; i < bears.length; i++) {
    const b = bears[i];
    if (Math.random() < 0.15) {
      const px = b.x + (b.dir < 0 ? b.w : 0);
      const py = b.y + TILE * 0.8;
      particles.push({
        x: px, y: py,
        vx: -b.dir * (Math.random() * 20 + 10),
        vy: -(Math.random() * 15 + 5),
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.7,
        size: 2 + Math.random() * 3,
        color: b.type === 'polar' ? '#ddd' : '#c8a86e',
      });
    }
  }

  // Idle tongue
  toadIdleTimer += dt;
}

function tryHop(dir) {
  let newCol = toadCol;
  let newRow = toadRow;
  if (dir === 0) newRow--;
  else if (dir === 1) newCol++;
  else if (dir === 2) newRow++;
  else if (dir === 3) newCol--;

  if (newCol < 0 || newCol >= COLS || newRow < 0 || newRow >= ROWS) return;

  toadDir = dir;
  toadFromX = toadAnimX;
  toadFromY = toadAnimY;
  toadCol = newCol;
  toadRow = newRow;
  toadToX = newCol * TILE;
  toadToY = newRow * TILE;
  toadHopping = true;
  toadHopTimer = 0;
  toadIdleTimer = 0;
  inputQueue = [];
  sfxHop();
}

function onLand() {
  const laneType = LANE_TYPES[toadRow];

  // Score for forward progress
  if (toadRow < furthestRow) {
    const rowBonus = (furthestRow - toadRow) * 10;
    score += Math.floor(rowBonus * nftBonuses.scoreMultiplier);
    furthestRow = toadRow;
  }

  // Goal row
  if (laneType === 'goal') {
    // Find which bale slot
    const balePositions = [1, 3, 6, 9, 11];
    let landed = -1;
    for (let i = 0; i < balePositions.length; i++) {
      if (toadCol === balePositions[i] && !balesCollected[i]) {
        landed = i;
        break;
      }
    }
    if (landed >= 0) {
      balesCollected[landed] = true;
      balesTotal++;
      const timeBonus = timer * 20;
      score += Math.floor((500 + timeBonus) * nftBonuses.scoreMultiplier);
      state = STATE.WIN_BALE;
      winTimer = 0;
      winBaleIdx = landed;
      sfxYeeHaw();
      spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ffd700', 20);
    } else {
      // Hit a filled bale or empty space, bounce back
      toadRow = 1;
      toadAnimY = toadRow * TILE;
      toadToY = toadAnimY;
    }
  }

  // Bull lane - check immediately
  if (laneType === 'bull') {
    const onBull = findBullAt(toadAnimX + TILE * 0.5, toadRow);
    if (!onBull) {
      killToad();
    }
  }
}

function findBullAt(px, row) {
  for (let i = 0; i < bulls.length; i++) {
    const b = bulls[i];
    if (b.row !== row) continue;
    if (px >= b.x && px <= b.x + b.w) return b;
  }
  return null;
}

function killToad() {
  state = STATE.DYING;
  deathTimer = 0;
  deathX = toadAnimX;
  deathY = toadAnimY;
  toadHopping = false;
  sfxSplat();
  spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ff4444', 12);
  spawnParticles(toadAnimX + TILE / 2, toadAnimY + TILE / 2, '#ffff00', 8);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 30 + Math.random() * 80;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 20,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 1,
      size: 2 + Math.random() * 4,
      color: color,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ============================================================
// DRAWING
// ============================================================
function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === STATE.TITLE) {
    drawTitle();
    return;
  }
  if (state === STATE.SELECT) {
    drawTitle();
    if (window.NftLoader) {
      window.NftLoader.drawCharacterSelect(ctx, W, H);
    }
    return;
  }

  drawArena();
  drawBulls();
  drawBears();
  drawBonusFly();

  if (state === STATE.PLAYING || state === STATE.WIN_BALE) {
    drawToad();
  }
  if (state === STATE.DYING) {
    drawDeathAnim();
  }
  if (state === STATE.WIN_BALE) {
    drawWinAnim();
  }
  if (state === STATE.LEVEL_UP) {
    drawLevelUp();
  }

  drawParticles();
  drawHUD();

  if (state === STATE.GAME_OVER) {
    drawGameOver();
  }
}

function drawArena() {
  for (let r = 0; r < ROWS; r++) {
    const y = r * TILE;
    const type = LANE_TYPES[r];

    if (type === 'start') {
      // Green grass with pond
      ctx.fillStyle = '#3a7d2a';
      ctx.fillRect(0, y, W, TILE);
      // Grass texture
      for (let i = 0; i < COLS * 2; i++) {
        const gx = Math.random() * W;
        const gy = y + Math.random() * TILE;
        ctx.fillStyle = Math.random() < 0.5 ? '#4a9d3a' : '#2d6b1e';
        ctx.fillRect(gx, gy, 1, 3);
      }
      // Pond
      const pondX = 5 * TILE;
      const pondW = 3 * TILE;
      ctx.fillStyle = '#2a5a8a';
      ctx.beginPath();
      ctx.ellipse(pondX + pondW / 2, y + TILE / 2, pondW / 2, TILE * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a7aaa';
      ctx.beginPath();
      ctx.ellipse(pondX + pondW / 2 - 4, y + TILE / 2 - 2, pondW * 0.3, TILE * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (type === 'fence') {
      // Fence safe zone
      ctx.fillStyle = '#5a4a2a';
      ctx.fillRect(0, y, W, TILE);
      // Fence planks
      ctx.fillStyle = '#7a6a4a';
      ctx.fillRect(0, y + 2, W, 3);
      ctx.fillRect(0, y + TILE - 5, W, 3);
      // Posts
      for (let c = 0; c < COLS; c += 2) {
        ctx.fillStyle = '#6a5a3a';
        ctx.fillRect(c * TILE + TILE * 0.35, y, TILE * 0.3, TILE);
      }
    } else if (type === 'bear') {
      // Dusty arena ground
      ctx.fillStyle = r <= 6 ? '#8a6a3a' : '#9a7a4a';
      ctx.fillRect(0, y, W, TILE);
      // Lane markings
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.setLineDash([TILE * 0.3, TILE * 0.5]);
      ctx.beginPath();
      ctx.moveTo(0, y + TILE / 2);
      ctx.lineTo(W, y + TILE / 2);
      ctx.stroke();
      ctx.setLineDash([]);
      // Dust texture
      for (let i = 0; i < 10; i++) {
        ctx.fillStyle = 'rgba(200,180,140,0.15)';
        ctx.fillRect(Math.random() * W, y + Math.random() * TILE, Math.random() * 6 + 2, 1);
      }
      // Skull icons in corners to signal danger
      if (r === 11 || r === 5) {
        ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
        ctx.fillStyle = 'rgba(255,100,100,0.2)';
        ctx.textAlign = 'left';
        ctx.fillText('BEAR', 4, y + TILE * 0.75);
      }
    } else if (type === 'bull') {
      // River-like lane for riding
      ctx.fillStyle = r <= 3 ? '#4a6a3a' : '#5a7a4a';
      ctx.fillRect(0, y, W, TILE);
      // Current lines
      ctx.strokeStyle = 'rgba(100,200,100,0.12)';
      ctx.setLineDash([TILE * 0.2, TILE * 0.4]);
      ctx.beginPath();
      ctx.moveTo(0, y + TILE * 0.3);
      ctx.lineTo(W, y + TILE * 0.3);
      ctx.moveTo(0, y + TILE * 0.7);
      ctx.lineTo(W, y + TILE * 0.7);
      ctx.stroke();
      ctx.setLineDash([]);
      if (r === 8 || r === 2) {
        ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
        ctx.fillStyle = 'rgba(100,255,100,0.2)';
        ctx.textAlign = 'left';
        ctx.fillText('BULL', 4, y + TILE * 0.75);
      }
    } else if (type === 'goal') {
      // Goal row with hay bales
      ctx.fillStyle = '#3a5a2a';
      ctx.fillRect(0, y, W, TILE);
      // Back fence
      ctx.fillStyle = '#6a5a3a';
      ctx.fillRect(0, y, W, 4);
      // Hay bale slots
      const balePositions = [1, 3, 6, 9, 11];
      for (let i = 0; i < 5; i++) {
        const bx = balePositions[i] * TILE;
        const by = y;
        if (balesCollected[i]) {
          // Filled - toad sitting on hay
          drawHayBale(bx, by, true);
          drawMiniToad(bx + TILE * 0.25, by + TILE * 0.1, TILE * 0.5);
        } else {
          drawHayBale(bx, by, false);
        }
      }
    }
  }
}

function drawHayBale(x, y, filled) {
  // Hay bale
  ctx.fillStyle = filled ? '#8a7a30' : '#c8a840';
  ctx.fillRect(x + 2, y + TILE * 0.3, TILE - 4, TILE * 0.6);
  // Hay lines
  ctx.strokeStyle = filled ? '#6a5a20' : '#a88830';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(x + 3, y + TILE * 0.4 + i * TILE * 0.15);
    ctx.lineTo(x + TILE - 3, y + TILE * 0.4 + i * TILE * 0.15);
    ctx.stroke();
  }
  // Glow if empty (available)
  if (!filled) {
    ctx.strokeStyle = 'rgba(255,215,0,0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + TILE * 0.25, TILE - 2, TILE * 0.7);
  }
}

function drawMiniToad(x, y, size) {
  ctx.fillStyle = '#55cc55';
  // Body
  ctx.beginPath();
  ctx.ellipse(x + size / 2, y + size * 0.6, size * 0.4, size * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x + size * 0.3, y + size * 0.35, size * 0.12, 0, Math.PI * 2);
  ctx.arc(x + size * 0.7, y + size * 0.35, size * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x + size * 0.3, y + size * 0.35, size * 0.06, 0, Math.PI * 2);
  ctx.arc(x + size * 0.7, y + size * 0.35, size * 0.06, 0, Math.PI * 2);
  ctx.fill();
}

function drawToad() {
  const x = toadAnimX;
  const y = toadAnimY;
  const t = toadHopping ? toadHopTimer / HOP_DURATION : 0;
  const hopArc = toadHopping ? Math.sin(t * Math.PI) : 0;
  const squashX = toadHopping ? (1 + hopArc * 0.15) : 1;
  const squashY = toadHopping ? (1 - hopArc * 0.2) : 1;
  const jumpY = -hopArc * TILE * 0.4;

  ctx.save();
  ctx.translate(x + TILE / 2, y + TILE / 2 + jumpY);
  ctx.scale(squashX, squashY);

  const bodyColor = nftBonuses.color || '#55cc55';
  const darkColor = nftBonuses.color ? shadeColor(nftBonuses.color, -30) : '#338833';
  const lightColor = nftBonuses.color ? shadeColor(nftBonuses.color, 40) : '#77ee77';

  const s = TILE * 0.45;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, s * 0.8 - jumpY, s * 0.7, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Back legs
  ctx.fillStyle = darkColor;
  const legKick = toadHopping ? hopArc * 0.3 : 0;
  // Left back leg
  ctx.beginPath();
  ctx.ellipse(-s * 0.55, s * 0.3 + legKick * s, s * 0.22, s * 0.35, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Right back leg
  ctx.beginPath();
  ctx.ellipse(s * 0.55, s * 0.3 + legKick * s, s * 0.22, s * 0.35, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.55, s * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = lightColor;
  ctx.beginPath();
  ctx.ellipse(0, s * 0.1, s * 0.35, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Spots
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.arc(-s * 0.2, -s * 0.2, s * 0.08, 0, Math.PI * 2);
  ctx.arc(s * 0.15, -s * 0.1, s * 0.06, 0, Math.PI * 2);
  ctx.arc(s * 0.05, -s * 0.35, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Front legs
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.ellipse(-s * 0.4, s * 0.4 - legKick * s * 0.5, s * 0.12, s * 0.2, -0.2, 0, Math.PI * 2);
  ctx.ellipse(s * 0.4, s * 0.4 - legKick * s * 0.5, s * 0.12, s * 0.2, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (big, cute)
  const eyeY = -s * 0.35;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-s * 0.22, eyeY, s * 0.18, 0, Math.PI * 2);
  ctx.arc(s * 0.22, eyeY, s * 0.18, 0, Math.PI * 2);
  ctx.fill();
  // Pupils (look in movement direction)
  const pupilOff = toadDir === 1 ? s * 0.05 : toadDir === 3 ? -s * 0.05 : 0;
  const pupilOffY = toadDir === 0 ? -s * 0.03 : toadDir === 2 ? s * 0.03 : 0;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-s * 0.22 + pupilOff, eyeY + pupilOffY, s * 0.09, 0, Math.PI * 2);
  ctx.arc(s * 0.22 + pupilOff, eyeY + pupilOffY, s * 0.09, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.arc(-s * 0.18, eyeY - s * 0.06, s * 0.05, 0, Math.PI * 2);
  ctx.arc(s * 0.26, eyeY - s * 0.06, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = darkColor;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, -s * 0.1, s * 0.2, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Tongue (idle animation)
  if (!toadHopping && toadIdleTimer > 2 && Math.sin(toadIdleTimer * 3) > 0.95) {
    ctx.fillStyle = '#ff4466';
    ctx.beginPath();
    const tongueLen = s * 0.6 * Math.abs(Math.sin(toadIdleTimer * 8));
    ctx.moveTo(-s * 0.05, -s * 0.05);
    ctx.lineTo(s * 0.05, -s * 0.05);
    ctx.lineTo(0, -s * 0.05 - tongueLen);
    ctx.fill();
    // Fly on tongue tip
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(0, -s * 0.05 - tongueLen, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Cowboy hat!
  ctx.fillStyle = '#8B4513';
  const hatY = eyeY - s * 0.28;
  // Brim
  ctx.beginPath();
  ctx.ellipse(0, hatY + s * 0.08, s * 0.55, s * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  // Crown
  ctx.fillStyle = '#A0522D';
  ctx.beginPath();
  ctx.moveTo(-s * 0.25, hatY + s * 0.05);
  ctx.lineTo(-s * 0.2, hatY - s * 0.2);
  ctx.quadraticCurveTo(0, hatY - s * 0.28, s * 0.2, hatY - s * 0.2);
  ctx.lineTo(s * 0.25, hatY + s * 0.05);
  ctx.fill();
  // Hat band
  ctx.fillStyle = '#654321';
  ctx.fillRect(-s * 0.22, hatY - s * 0.02, s * 0.44, s * 0.06);

  ctx.restore();
}

function drawBears() {
  for (let i = 0; i < bears.length; i++) {
    const b = bears[i];
    drawBear(b);
  }
}

function drawBear(b) {
  const x = b.x;
  const y = b.y;
  const w = b.w;
  const h = TILE;
  const legBob = Math.sin(b.legPhase) * 3;
  const flip = b.dir < 0 ? -1 : 1;

  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  ctx.scale(flip, 1);

  let bodyColor, darkColor, lightColor;
  if (b.type === 'polar') {
    bodyColor = '#e8e0d0';
    darkColor = '#c8c0b0';
    lightColor = '#f8f4f0';
  } else if (b.type === 'grizzly') {
    bodyColor = '#6a4a2a';
    darkColor = '#4a3018';
    lightColor = '#8a6a4a';
  } else {
    bodyColor = '#8B5A2B';
    darkColor = '#5a3a1a';
    lightColor = '#aa7a4a';
  }

  const s = w * 0.45;

  // Burst glow
  if (b.burstTimer > 0) {
    ctx.fillStyle = 'rgba(255,50,50,0.15)';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 1.3, s * 1.1, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Back legs
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.ellipse(-s * 0.4, s * 0.4 + legBob, s * 0.18, s * 0.3, 0, 0, Math.PI * 2);
  ctx.ellipse(s * 0.4, s * 0.4 - legBob, s * 0.18, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Front legs
  ctx.beginPath();
  ctx.ellipse(-s * 0.25, s * 0.45 - legBob, s * 0.15, s * 0.28, 0, 0, Math.PI * 2);
  ctx.ellipse(s * 0.55, s * 0.45 + legBob, s * 0.15, s * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.65, s * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hump
  ctx.fillStyle = lightColor;
  ctx.beginPath();
  ctx.ellipse(-s * 0.15, -s * 0.25, s * 0.3, s * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(s * 0.55, -s * 0.15, s * 0.28, s * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = lightColor;
  ctx.beginPath();
  ctx.ellipse(s * 0.72, -s * 0.05, s * 0.14, s * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(s * 0.8, -s * 0.08, s * 0.05, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (angry!)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.55, -s * 0.25, s * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff2222';
  ctx.beginPath();
  ctx.arc(s * 0.57, -s * 0.25, s * 0.04, 0, Math.PI * 2);
  ctx.fill();
  // Angry brow
  ctx.strokeStyle = darkColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(s * 0.42, -s * 0.35);
  ctx.lineTo(s * 0.6, -s * 0.32);
  ctx.stroke();

  // Ears
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.arc(s * 0.42, -s * 0.38, s * 0.08, 0, Math.PI * 2);
  ctx.arc(s * 0.65, -s * 0.38, s * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Claws
  ctx.fillStyle = '#ddd';
  for (let c = 0; c < 3; c++) {
    ctx.beginPath();
    ctx.arc(s * 0.55 + c * s * 0.06, s * 0.72 + legBob, s * 0.03, 0, Math.PI * 2);
    ctx.fill();
  }

  // Open mouth if bursting
  if (b.burstTimer > 0) {
    ctx.fillStyle = '#800';
    ctx.beginPath();
    ctx.ellipse(s * 0.78, 0, s * 0.1, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawBulls() {
  for (let i = 0; i < bulls.length; i++) {
    drawBull(bulls[i]);
  }
}

function drawBull(b) {
  const x = b.x;
  const y = b.y;
  const w = b.w;
  const h = TILE;
  const legBob = Math.sin(b.legPhase) * 2;
  const flip = b.dir < 0 ? -1 : 1;

  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  ctx.scale(flip, 1);

  const s = w * 0.4;
  const bodyColor = b.color;
  const darkColor = shadeColor(b.color, -25);

  // Legs
  ctx.fillStyle = darkColor;
  ctx.fillRect(-s * 0.5, s * 0.2 + legBob, s * 0.15, s * 0.45);
  ctx.fillRect(-s * 0.2, s * 0.2 - legBob, s * 0.15, s * 0.45);
  ctx.fillRect(s * 0.15, s * 0.2 + legBob, s * 0.15, s * 0.45);
  ctx.fillRect(s * 0.45, s * 0.2 - legBob, s * 0.15, s * 0.45);
  // Hooves
  ctx.fillStyle = '#333';
  ctx.fillRect(-s * 0.52, s * 0.6 + legBob, s * 0.19, s * 0.08);
  ctx.fillRect(-s * 0.22, s * 0.6 - legBob, s * 0.19, s * 0.08);
  ctx.fillRect(s * 0.13, s * 0.6 + legBob, s * 0.19, s * 0.08);
  ctx.fillRect(s * 0.43, s * 0.6 - legBob, s * 0.19, s * 0.08);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.7, s * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(s * 0.65, -s * 0.1, s * 0.25, s * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Horns
  ctx.strokeStyle = '#f0e8c8';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.55, -s * 0.28);
  ctx.quadraticCurveTo(s * 0.4, -s * 0.55, s * 0.3, -s * 0.45);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s * 0.75, -s * 0.28);
  ctx.quadraticCurveTo(s * 0.9, -s * 0.55, s * 1.0, -s * 0.45);
  ctx.stroke();

  // Eyes (friendly)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.6, -s * 0.15, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(s * 0.62, -s * 0.15, s * 0.035, 0, Math.PI * 2);
  ctx.fill();

  // Nose ring
  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(s * 0.82, -s * 0.02, s * 0.06, 0.3, Math.PI - 0.3);
  ctx.stroke();

  // Tail
  ctx.strokeStyle = darkColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-s * 0.7, -s * 0.05);
  ctx.quadraticCurveTo(-s * 0.9, -s * 0.3, -s * 0.85, -s * 0.4 + Math.sin(b.legPhase * 0.7) * 3);
  ctx.stroke();
  // Tail tuft
  ctx.fillStyle = darkColor;
  ctx.beginPath();
  ctx.arc(-s * 0.85, -s * 0.4 + Math.sin(b.legPhase * 0.7) * 3, s * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // "RIDE ME" glow
  ctx.strokeStyle = 'rgba(100,255,100,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.75, s * 0.45, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawBonusFly() {
  if (!bonusFly) return;
  const x = bonusFly.col * TILE + TILE / 2;
  const y = bonusFly.row * TILE + TILE / 2;
  const blink = Math.sin(bonusFly.blink) > 0;
  if (bonusFly.timer < 1 && !blink) return; // blink warning

  // Glow
  ctx.fillStyle = 'rgba(0,255,100,0.15)';
  ctx.beginPath();
  ctx.arc(x, y, TILE * 0.5, 0, Math.PI * 2);
  ctx.fill();

  // Fly body
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(x, y, TILE * 0.12, TILE * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  // Wings
  ctx.fillStyle = 'rgba(200,220,255,0.6)';
  const wingFlap = Math.sin(bonusFly.blink * 3) * 0.3;
  ctx.beginPath();
  ctx.ellipse(x - TILE * 0.1, y - TILE * 0.08, TILE * 0.1, TILE * 0.06, -0.5 + wingFlap, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + TILE * 0.1, y - TILE * 0.08, TILE * 0.1, TILE * 0.06, 0.5 - wingFlap, 0, Math.PI * 2);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#f00';
  ctx.beginPath();
  ctx.arc(x - 2, y - 2, 1.5, 0, Math.PI * 2);
  ctx.arc(x + 2, y - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Points label
  ctx.font = 'bold ' + Math.floor(TILE * 0.28) + 'px monospace';
  ctx.fillStyle = '#0f0';
  ctx.textAlign = 'center';
  ctx.fillText('+' + (200 * level), x, y - TILE * 0.35);
}

function drawDeathAnim() {
  const t = deathTimer / DEATH_DURATION;
  const x = deathX + TILE / 2;
  const y = deathY + TILE / 2;

  // Stars spinning out
  const starCount = 5;
  const radius = t * TILE * 1.5;
  ctx.font = Math.floor(TILE * 0.4) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < starCount; i++) {
    const angle = (i / starCount) * Math.PI * 2 + t * 8;
    const sx = x + Math.cos(angle) * radius;
    const sy = y + Math.sin(angle) * radius - t * 20;
    ctx.fillStyle = 'rgba(255,255,0,' + (1 - t) + ')';
    ctx.fillText('*', sx, sy);
  }

  // "BONK!" text
  if (t < 0.6) {
    ctx.font = 'bold ' + Math.floor(TILE * 0.6) + 'px monospace';
    ctx.fillStyle = 'rgba(255,80,80,' + (1 - t * 1.5) + ')';
    ctx.fillText('BONK!', x, y - TILE * 0.8 - t * 30);
  }
}

function drawWinAnim() {
  const t = winTimer / WIN_DURATION;
  const balePositions = [1, 3, 6, 9, 11];
  if (winBaleIdx < 0) return;
  const bx = balePositions[winBaleIdx] * TILE + TILE / 2;
  const by = TILE / 2;

  // "YEE HAW!" text rises and fades
  const textY = by - t * TILE * 2;
  ctx.font = 'bold ' + Math.floor(TILE * 0.65) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,215,0,' + Math.max(0, 1 - t * 1.2) + ')';
  ctx.fillText('YEE HAW!', W / 2, textY);

  // Score popup
  const timeBonus = timer * 20;
  ctx.font = Math.floor(TILE * 0.35) + 'px monospace';
  ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, 1 - t * 1.5) + ')';
  ctx.fillText('+' + Math.floor((500 + timeBonus) * nftBonuses.scoreMultiplier), W / 2, textY + TILE * 0.6);
}

function drawLevelUp() {
  const t = levelUpTimer / LEVEL_UP_DURATION;
  ctx.fillStyle = 'rgba(0,0,0,' + Math.min(0.7, t * 2) + ')';
  ctx.fillRect(0, 0, W, H);

  const bounceY = Math.sin(t * Math.PI * 3) * 10;
  ctx.font = 'bold ' + Math.floor(TILE * 1.0) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('LEVEL ' + (level + 1) + '!', W / 2, H / 2 - TILE + bounceY);

  ctx.font = Math.floor(TILE * 0.4) + 'px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('Bears gettin\' faster...', W / 2, H / 2 + TILE * 0.5);

  if (t > 0.5) {
    ctx.font = Math.floor(TILE * 0.35) + 'px monospace';
    ctx.fillStyle = '#aaa';
    const dots = '.'.repeat(Math.floor((t - 0.5) * 6) % 4);
    ctx.fillText('Saddle up' + dots, W / 2, H / 2 + TILE * 1.5);
  }
}

function drawParticles() {
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const alpha = Math.max(0, p.life / p.maxLife);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const pad = TILE * 0.15;
  const fontSize = Math.floor(TILE * 0.38);
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.textAlign = 'left';

  // Score
  ctx.fillStyle = '#ffd700';
  ctx.fillText('SCORE: ' + score, pad, fontSize + pad);

  // High score
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText('HI: ' + highScore, W - pad, fontSize + pad);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ff4444';
  let livesText = '';
  for (let i = 0; i < lives; i++) livesText += '\u2665 ';
  ctx.fillText(livesText, pad, fontSize * 2 + pad * 2);

  // Timer
  ctx.textAlign = 'center';
  ctx.fillStyle = timer <= 5 ? '#ff4444' : timer <= 10 ? '#ffaa00' : '#fff';
  ctx.fillText('TIME: ' + timer, W / 2, fontSize + pad);

  // Level
  ctx.fillStyle = '#88ccff';
  ctx.fillText('LV ' + level, W / 2, fontSize * 2 + pad * 2);

  // NFT name if selected
  if (nftBonuses.name) {
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillStyle = nftBonuses.color || '#fff';
    ctx.textAlign = 'right';
    ctx.fillText(nftBonuses.name, W - pad, fontSize * 2 + pad * 2);
  }
}

function drawTitle() {
  // Background
  ctx.fillStyle = '#1a1008';
  ctx.fillRect(0, 0, W, H);

  // Dusty arena texture
  for (let i = 0; i < 60; i++) {
    ctx.fillStyle = 'rgba(200,160,100,' + (Math.random() * 0.06) + ')';
    ctx.fillRect(Math.random() * W, Math.random() * H, Math.random() * 40, 1);
  }

  const cx = W / 2;
  const cy = H * 0.3;

  // Bull silhouette with toad riding
  const bullS = TILE * 1.8;
  ctx.fillStyle = '#2a1a08';

  // Bull body
  ctx.beginPath();
  ctx.ellipse(cx, cy + bullS * 0.1, bullS * 0.8, bullS * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Bull head
  ctx.beginPath();
  ctx.ellipse(cx + bullS * 0.7, cy - bullS * 0.1, bullS * 0.3, bullS * 0.25, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Horns
  ctx.strokeStyle = '#3a2a18';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx + bullS * 0.6, cy - bullS * 0.3);
  ctx.quadraticCurveTo(cx + bullS * 0.4, cy - bullS * 0.6, cx + bullS * 0.3, cy - bullS * 0.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + bullS * 0.85, cy - bullS * 0.3);
  ctx.quadraticCurveTo(cx + bullS * 1.1, cy - bullS * 0.6, cx + bullS * 1.15, cy - bullS * 0.5);
  ctx.stroke();
  // Bull legs
  ctx.fillStyle = '#2a1a08';
  ctx.fillRect(cx - bullS * 0.5, cy + bullS * 0.3, bullS * 0.12, bullS * 0.4);
  ctx.fillRect(cx - bullS * 0.2, cy + bullS * 0.3, bullS * 0.12, bullS * 0.4);
  ctx.fillRect(cx + bullS * 0.2, cy + bullS * 0.3, bullS * 0.12, bullS * 0.4);
  ctx.fillRect(cx + bullS * 0.45, cy + bullS * 0.3, bullS * 0.12, bullS * 0.4);

  // Toad riding on top
  const toadS = TILE * 0.7;
  const toadX = cx - bullS * 0.1;
  const toadY = cy - bullS * 0.35;
  // Toad body
  ctx.fillStyle = '#55cc55';
  ctx.beginPath();
  ctx.ellipse(toadX, toadY, toadS * 0.5, toadS * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Toad eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(toadX - toadS * 0.2, toadY - toadS * 0.25, toadS * 0.15, 0, Math.PI * 2);
  ctx.arc(toadX + toadS * 0.2, toadY - toadS * 0.25, toadS * 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(toadX - toadS * 0.18, toadY - toadS * 0.25, toadS * 0.07, 0, Math.PI * 2);
  ctx.arc(toadX + toadS * 0.22, toadY - toadS * 0.25, toadS * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Cowboy hat on title toad
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.ellipse(toadX, toadY - toadS * 0.35, toadS * 0.55, toadS * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#A0522D';
  ctx.beginPath();
  ctx.moveTo(toadX - toadS * 0.25, toadY - toadS * 0.35);
  ctx.lineTo(toadX - toadS * 0.2, toadY - toadS * 0.6);
  ctx.quadraticCurveTo(toadX, toadY - toadS * 0.7, toadX + toadS * 0.2, toadY - toadS * 0.6);
  ctx.lineTo(toadX + toadS * 0.25, toadY - toadS * 0.35);
  ctx.fill();
  // Lasso hand
  ctx.strokeStyle = '#ddc';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(toadX + toadS * 0.5, toadY - toadS * 0.1);
  const lTime = Date.now() / 500;
  ctx.quadraticCurveTo(toadX + toadS * 1.2, toadY - toadS * 1.0 + Math.sin(lTime) * 8,
    toadX + toadS * 0.8 + Math.cos(lTime) * 10, toadY - toadS * 1.2 + Math.sin(lTime) * 5);
  ctx.stroke();
  // Lasso loop
  ctx.beginPath();
  ctx.ellipse(toadX + toadS * 0.8 + Math.cos(lTime) * 10, toadY - toadS * 1.2 + Math.sin(lTime) * 5,
    toadS * 0.25, toadS * 0.2, lTime, 0, Math.PI * 2);
  ctx.stroke();

  // Title text
  const titleSize = Math.floor(TILE * 1.1);
  ctx.font = 'bold ' + titleSize + 'px monospace';
  ctx.textAlign = 'center';

  // Text shadow
  ctx.fillStyle = '#000';
  ctx.fillText('RODEO TOAD', cx + 3, H * 0.58 + 3);
  // Main text
  ctx.fillStyle = '#ffd700';
  ctx.fillText('RODEO TOAD', cx, H * 0.58);

  // Subtitle
  ctx.font = Math.floor(TILE * 0.35) + 'px monospace';
  ctx.fillStyle = '#aa8844';
  ctx.fillText('Ride the Bulls. Dodge the Bears.', cx, H * 0.65);

  // Bear warning
  const bearWarn = Math.sin(Date.now() / 400) > 0;
  if (bearWarn) {
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.fillText('BEAR MARKET AHEAD', cx, H * 0.70);
  }

  // High score
  ctx.font = Math.floor(TILE * 0.32) + 'px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('HIGH SCORE: ' + highScore, cx, H * 0.77);

  // Instructions
  ctx.font = Math.floor(TILE * 0.3) + 'px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('ARROWS / WASD to hop', cx, H * 0.84);

  const blink = Math.sin(Date.now() / 300) > 0;
  if (blink) {
    ctx.fillStyle = '#fff';
    ctx.fillText('PRESS SPACE or TAP to start', cx, H * 0.90);
  }

  // NFT connect
  if (window.ethereum && !nftChecked) {
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillStyle = nftConnecting ? '#ffaa00' : '#8af';
    ctx.fillText(nftConnecting ? 'Connecting...' : 'Press W to Connect Wallet', cx, H * 0.96);
  } else if (nftBonuses.name) {
    ctx.font = Math.floor(TILE * 0.28) + 'px monospace';
    ctx.fillStyle = nftBonuses.color || '#8af';
    ctx.fillText(nftBonuses.name + ' (+1 Life, 1.5x Score)', cx, H * 0.96);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  ctx.textAlign = 'center';

  ctx.font = 'bold ' + Math.floor(TILE * 0.9) + 'px monospace';
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', cx, H * 0.3);

  ctx.font = Math.floor(TILE * 0.4) + 'px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Score: ' + score, cx, H * 0.42);

  ctx.fillStyle = '#aaa';
  ctx.fillText('Level: ' + level, cx, H * 0.50);
  ctx.fillText('Bales: ' + balesTotal + '/5', cx, H * 0.56);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold ' + Math.floor(TILE * 0.4) + 'px monospace';
    ctx.fillText('NEW HIGH SCORE!', cx, H * 0.66);
  }

  const blink = Math.sin(Date.now() / 300) > 0;
  if (blink) {
    ctx.font = Math.floor(TILE * 0.32) + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('SPACE or TAP to continue', cx, H * 0.80);
  }

  // Bear pun
  ctx.font = Math.floor(TILE * 0.25) + 'px monospace';
  ctx.fillStyle = '#666';
  const puns = [
    'The bears got you... unbearable!',
    'Should\'ve held on to that bull...',
    'Bear market wins again.',
    'This toad couldn\'t HODL on.',
    'Trampled by the bears. Classic.',
    'The bull run ended too soon.',
  ];
  ctx.fillText(puns[Math.floor(Date.now() / 3000) % puns.length], cx, H * 0.90);
}

// ============================================================
// HELPERS
// ============================================================
function shadeColor(color, amount) {
  let r = parseInt(color.slice(1, 3), 16);
  let g = parseInt(color.slice(3, 5), 16);
  let b = parseInt(color.slice(5, 7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

})();
</script>
