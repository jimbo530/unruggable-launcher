// === DUST PARTICLE SYSTEM ===
function spawnDust(x, y, count, color) {
  for (var i = 0; i < count; i++) {
    dustParticles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * 60,
      vy: -Math.random() * 40 - 10,
      life: 0.3 + Math.random() * 0.4,
      color: color || '#886644',
      size: 1 + Math.random()
    });
  }
}
function updateDust(dt) {
  for (var i = dustParticles.length - 1; i >= 0; i--) {
    var d = dustParticles[i];
    d.x += d.vx * dt;
    d.y += d.vy * dt;
    d.vy += 80 * dt;
    d.life -= dt;
    if (d.life <= 0) dustParticles.splice(i, 1);
  }
}
function drawDust() {
  for (var i = 0; i < dustParticles.length; i++) {
    var d = dustParticles[i];
    ctx.globalAlpha = Math.min(1, d.life * 2);
    ctx.fillStyle = d.color;
    ctx.fillRect(d.x, d.y, d.size, d.size);
  }
  ctx.globalAlpha = 1;
}

// === PLAYER INIT — CON-scaled HP, WIS-scaled SP ===
function initPlayer() {
  var maxHp = conHP(16);
  var maxSp = Math.floor(40 * (1 + (statB.wis - 10) * 0.05));
  player = {
    x: 30, y: 180, vx: 0, vy: 0,
    w: 10, h: 16,
    dir: 1, grounded: false,
    wallCling: 0,
    crouching: false,
    hp: maxHp, maxHp: maxHp,
    sp: maxSp, maxSp: maxSp,
    subWeapon: 'shuriken',
    slashing: 0,
    slashDir: 1,
    canDoubleJump: false,
    jumpHeld: false,
    dead: false,
    slashCooldown: 0,
    comboCount: 0,
    comboTimer: 0,
    wasGrounded: false
  };
}

function startGame() {
  state = 'cinematic';
  score = 0;
  lives = conLives(3);
  currentStage = 1;
  currentScreen = 0;
  initPlayer();
  loadStage(1);
  cinematicTimer = 0;
  TAS.particles.clear();
  scorePopups = [];
  dustParticles = [];
  tutorialShown = { move: false, jump: false, wall: false, slash: false, sub: false };
  tutorialQueue = [];
  tutorialActive = null;
}

function loadStage(stageNum) {
  currentStage = stageNum;
  currentScreen = 0;
  stageData = generateStage(stageNum);
  scrollX = 0;
  targetScrollX = 0;
  bossDefeated = false;
  projectiles = [];
  enemyProjectiles = [];
  pickups = [];
  cloneTrail = [];
  cloneActive = 0;
  scorePopups = [];
  dustParticles = [];
  player.x = 30;
  player.y = 150;
  player.vx = 0;
  player.vy = 0;
  player.wallCling = 0;
  player.grounded = false;
  generateMovingPlatforms(stageNum);
}

function generateMovingPlatforms(stage) {
  movingPlatforms = [];
  if (stage === 5 || stage === 6) {
    for (var s = 0; s < 4; s++) {
      movingPlatforms.push({
        screen: s,
        x: 100 + s * 40, y: 120 + (s % 2) * 40,
        startX: 80 + s * 40, endX: 200 + s * 20,
        w: 32, h: 6, speed: 30 + s * 10, dir: 1
      });
    }
  }
}

// === TILE COLLISION ===
function getTile(screenIdx, col, row) {
  if (!stageData || screenIdx < 0 || screenIdx >= stageData.length) return 1;
  var screen = stageData[screenIdx];
  if (!screen || !screen.tiles) return 1;
  if (row < 0 || row >= 14 || col < 0 || col >= 24) return 0;
  return screen.tiles[row][col];
}

function worldToTile(wx, wy) {
  var screenIdx = Math.floor(wx / SCREEN_W);
  var localX = wx - screenIdx * SCREEN_W;
  var localY = wy - HUD_H;
  return { screen: screenIdx, col: Math.floor(localX / TILE), row: Math.floor(localY / TILE) };
}

function isSolid(wx, wy) {
  var t = worldToTile(wx, wy);
  return getTile(t.screen, t.col, t.row) === 1;
}

function isPlatform(wx, wy) {
  var t = worldToTile(wx, wy);
  return getTile(t.screen, t.col, t.row) === 2;
}

function isHazard(wx, wy) {
  var t = worldToTile(wx, wy);
  return getTile(t.screen, t.col, t.row) === 3;
}

function isWall(wx, wy) {
  return isSolid(wx, wy);
}

// === INPUT HELPERS ===
var prevJump = false;
var prevAttack = false;
var prevUp = false;

function inputLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.touch.left; }
function inputRight() { return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.touch.right; }
function inputUp() { return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.touch.up; }
function inputDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function inputJump() { return TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a; }
function inputAttack() { return TAS.input.keys['KeyX'] || TAS.input.keys['Shift'] || TAS.input.touch.b; }
function inputSub() { return TAS.input.keys['KeyC'] || (inputUp() && inputAttack()); }

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups(dt);
  updateDust(dt);
  updateTutorial(dt);

  if (state === 'title') {
    titleAnim += dt;
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 2 === 0) return;
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'cinematic') {
    cinematicTimer += dt;
    if (cinematicTimer > 4 || inputJump() || inputAttack()) {
      state = 'playing';
      cinematicTimer = 0;
    }
    return;
  }

  if (state === 'stageClear') {
    cinematicTimer += dt;
    if (cinematicTimer > 2) {
      currentStage++;
      if (currentStage > 7) {
        score += intScore(5000);
        if (score > highScore) { highScore = score; TAS.score.save('hexninja_hi', score); }
        state = 'victory';
        cinematicTimer = 0;
      } else {
        loadStage(currentStage);
        state = 'cinematic';
        cinematicTimer = 0;
      }
    }
    return;
  }

  if (state === 'victory') {
    cinematicTimer += dt;
    if (cinematicTimer > 5 || inputJump()) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    if (screenTransition > 0) {
      screenTransition -= dt * 3;
      if (screenTransition <= 0) screenTransition = 0;
      return;
    }
    updatePlayer(dt);
    updateProjectiles(dt);
    updateEnemies(dt);
    updatePickups(dt);
    updateMovingPlatforms(dt);
    updateClone(dt);
    updateGooTraps(dt);
    if (iFrames > 0) iFrames -= dt;
    if (deathTimer > 0) {
      deathTimer -= dt;
      if (deathTimer <= 0) respawnPlayer();
    }
    var worldX = currentScreen * SCREEN_W + player.x;
    targetScrollX = currentScreen * SCREEN_W;
    scrollX = TAS.math.lerp(scrollX, targetScrollX, dt * 5);

    // Tutorials
    if (currentStage === 1 && currentScreen === 0) {
      if (!tutorialShown.move && frame > 30) showTutorial('move', 'ARROWS/WASD to move -- Z/SPACE to jump');
      if (!tutorialShown.slash && player.grounded && frame > 120) showTutorial('slash', 'X to slash -- C for sub-weapons (spore stars!)');
      if (!tutorialShown.wall && currentScreen === 0 && frame > 250) showTutorial('wall', 'Press into walls to cling -- jump again to wall-jump');
    }
  }

  prevJump = inputJump();
  prevAttack = inputAttack();
  prevUp = inputUp();
}

// === GOO TRAP UPDATE ===
function updateGooTraps(dt) {
  var screen = stageData[currentScreen];
  if (!screen) return;
  for (var i = 0; i < screen.gooTraps.length; i++) {
    var g = screen.gooTraps[i];
    if (!g.active) continue;
    g.bubbleTimer += dt;
    // Check if player is in goo
    if (!player.dead && TAS.hit.rectOverlap(player.x, player.y + player.h - 4, player.w, 4, g.x, g.y, g.w, g.h)) {
      player.vx *= g.slowFactor;
      g.dmgTimer += dt;
      if (g.dmgTimer > 1.5) {
        damagePlayer(1);
        g.dmgTimer = 0;
        SFX.gooSplat();
      }
    }
  }
}

function updatePlayer(dt) {
  if (player.dead) return;

  var inp = {
    left: inputLeft(), right: inputRight(),
    up: inputUp(), down: inputDown(),
    jump: inputJump(), attack: inputAttack(),
    sub: inputSub()
  };
  var jumpPressed = inp.jump && !prevJump;
  var attackPressed = inp.attack && !prevAttack;
  var subPressed = inp.sub && !prevUp;

  // Combo timer
  if (player.comboTimer > 0) {
    player.comboTimer -= dt;
    if (player.comboTimer <= 0) player.comboCount = 0;
  }

  // Crouch
  player.crouching = inp.down && player.grounded;

  // Horizontal movement — DEX-scaled speed
  if (!player.crouching) {
    if (inp.left) { player.vx = -PLAYER_SPEED; player.dir = -1; }
    else if (inp.right) { player.vx = PLAYER_SPEED; player.dir = 1; }
    else { player.vx = 0; }
  } else {
    player.vx = 0;
  }

  // Wall cling logic — DEX affects wall slide speed
  var wallSlideSpd = WALL_SLIDE_SPEED * (1 / (1 + (statB.dex - 10) * 0.03));
  if (!player.grounded && player.wallCling === 0) {
    if (inp.left && isWall(player.x - 2 + currentScreen * SCREEN_W, player.y + HUD_H + 4)) {
      player.wallCling = -1;
      player.vy = 0;
      SFX.wallCling();
      spawnDust(player.x, player.y + player.h / 2, 3, '#aabbcc');
    } else if (inp.right && isWall(player.x + player.w + 2 + currentScreen * SCREEN_W, player.y + HUD_H + 4)) {
      player.wallCling = 1;
      player.vy = 0;
      SFX.wallCling();
      spawnDust(player.x + player.w, player.y + player.h / 2, 3, '#aabbcc');
    }
  }

  // Wall cling state
  if (player.wallCling !== 0) {
    player.vy = wallSlideSpd;
    player.vx = 0;
    if (player.grounded) { player.wallCling = 0; }
    if (player.wallCling === -1 && !inp.left) { player.wallCling = 0; }
    if (player.wallCling === 1 && !inp.right) { player.wallCling = 0; }
    // Wall jump — DEX-scaled
    if (jumpPressed) {
      player.vy = WALL_JUMP_VY;
      player.vx = -player.wallCling * WALL_JUMP_VX;
      player.dir = -player.wallCling;
      player.wallCling = 0;
      SFX.wallJump();
      TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#88ccff', 4, 2);
      spawnDust(player.x + player.w / 2, player.y + player.h, 4, '#88aacc');
    }
  }

  // Jump — DEX-scaled velocity
  player.wasGrounded = player.grounded;
  if (jumpPressed && player.grounded && player.wallCling === 0) {
    player.vy = JUMP_VEL;
    player.grounded = false;
    SFX.jump();
    spawnDust(player.x + player.w / 2, player.y + player.h, 3, '#886644');
  }

  // Gravity
  if (!player.grounded && player.wallCling === 0) {
    player.vy += GRAVITY * dt;
    if (player.vy > 300) player.vy = 300;
  }

  // Move X
  var newX = player.x + player.vx * dt;
  var worldNewX = newX + currentScreen * SCREEN_W;
  if (!isSolid(worldNewX, player.y + HUD_H + 2) && !isSolid(worldNewX + player.w, player.y + HUD_H + 2) &&
      !isSolid(worldNewX, player.y + HUD_H + player.h - 2) && !isSolid(worldNewX + player.w, player.y + HUD_H + player.h - 2)) {
    player.x = newX;
  } else {
    player.vx = 0;
  }

  // Move Y
  var newY = player.y + player.vy * dt;
  var worldPX = player.x + currentScreen * SCREEN_W;
  player.grounded = false;

  if (player.vy >= 0) {
    if (isSolid(worldPX + 2, newY + HUD_H + player.h) || isSolid(worldPX + player.w - 2, newY + HUD_H + player.h)) {
      player.y = Math.floor((newY + HUD_H + player.h) / TILE) * TILE - player.h - HUD_H;
      player.vy = 0;
      player.grounded = true;
      player.wallCling = 0;
      if (!player.wasGrounded) spawnDust(player.x + player.w / 2, player.y + player.h, 3, '#886644');
    } else if (isPlatform(worldPX + 2, newY + HUD_H + player.h) || isPlatform(worldPX + player.w - 2, newY + HUD_H + player.h)) {
      if (player.y + player.h + HUD_H <= Math.floor((newY + HUD_H + player.h) / TILE) * TILE) {
        player.y = Math.floor((newY + HUD_H + player.h) / TILE) * TILE - player.h - HUD_H;
        player.vy = 0;
        player.grounded = true;
        player.wallCling = 0;
        if (!player.wasGrounded) spawnDust(player.x + player.w / 2, player.y + player.h, 2, '#886644');
      } else {
        player.y = newY;
      }
    } else {
      player.y = newY;
    }
  } else {
    if (isSolid(worldPX + 2, newY + HUD_H) || isSolid(worldPX + player.w - 2, newY + HUD_H)) {
      player.vy = 0;
    } else {
      player.y = newY;
    }
  }

  // Moving platform check
  for (var mp of movingPlatforms) {
    if (mp.screen === currentScreen && player.vy >= 0) {
      if (player.x + player.w > mp.x && player.x < mp.x + mp.w &&
          player.y + player.h >= mp.y - 2 && player.y + player.h <= mp.y + 6) {
        player.y = mp.y - player.h;
        player.grounded = true;
        player.vy = 0;
        player.x += mp.dir * mp.speed * dt;
      }
    }
  }

  // Hazard check
  if (isHazard(worldPX + player.w / 2, player.y + HUD_H + player.h) ||
      isHazard(worldPX + player.w / 2, player.y + HUD_H + player.h - 4)) {
    damagePlayer(4);
  }

  // Fall off screen
  if (player.y > GH + 20) {
    damagePlayer(conHP(16));
  }

  // Screen transitions
  if (player.x > SCREEN_W - 4 && currentScreen < stageData.length - 1) {
    currentScreen++;
    player.x = 8;
    screenTransition = 1;
  }
  if (player.x < 4 && currentScreen > 0) {
    currentScreen--;
    player.x = SCREEN_W - 16;
    screenTransition = 1;
  }

  // Slash attack — WIS-scaled cooldown, STR-scaled damage
  if (player.slashing > 0) {
    player.slashing -= dt;
  }
  if (player.slashCooldown > 0) player.slashCooldown -= dt;
  if (attackPressed && player.slashing <= 0 && player.slashCooldown <= 0) {
    player.slashing = wisCooldown(0.15);
    player.slashCooldown = wisCooldown(0.08);
    player.slashDir = player.dir;
    player.comboCount = Math.min(player.comboCount + 1, 3);
    player.comboTimer = 1.0;
    SFX.slash();
    checkSlashHits();
    // Combo particles
    if (player.comboCount >= 3) {
      TAS.particles.spawn(player.x + player.w / 2, player.y, '#ffdd44', 6, 2);
      spawnScorePopup(player.x, player.y - 10, 'COMBO!', '#ff88aa');
    }
  }

  // Sub-weapon — WIS-scaled cost efficiency
  var adjustedCost = Math.max(1, Math.floor(SUB_COST[player.subWeapon] * wisCooldown(1)));
  if (subPressed && player.sp >= adjustedCost) {
    player.sp -= adjustedCost;
    useSubWeapon();
  }

  // Clone trail
  if (cloneActive > 0) {
    cloneTrail.push({ x: player.x, y: player.y, life: 0.3 });
  }
}

function checkSlashHits() {
  // STR-scaled slash range and damage
  var slashRange = Math.floor(18 * (1 + (statB.str - 10) * 0.03));
  var sx = player.x + (player.slashDir > 0 ? player.w : -slashRange);
  var sy = player.y - 2;
  var sw = slashRange, sh = player.h + 4;

  var screen = stageData[currentScreen];
  if (!screen) return;

  var slashDmg = strDamage(2 + Math.floor(player.comboCount * 0.5));

  for (var e of screen.enemies) {
    if (!e.alive) continue;
    if (TAS.hit.rectOverlap(sx, sy, sw, sh, e.x, e.y, e.w, e.h)) {
      if (e.type === 'fungal_shield' && ((player.slashDir > 0 && player.x < e.x) || (player.slashDir < 0 && player.x > e.x + e.w))) {
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ffff44', 3, 1);
        SFX.parry();
        spawnScorePopup(e.x, e.y - 8, 'BLOCKED', '#ffff44');
      } else {
        hitEnemy(e, slashDmg);
      }
    }
  }

  if (screen.boss && screen.boss.alive) {
    var b = screen.boss;
    if (TAS.hit.rectOverlap(sx, sy, sw, sh, b.x, b.y, b.w, b.h)) {
      hitBoss(b, slashDmg);
    }
  }

  for (var l of screen.lanterns) {
    if (!l.alive) continue;
    if (TAS.hit.rectOverlap(sx, sy, sw, sh, l.x, l.y, 10, 12)) {
      l.alive = false;
      spawnPickup(l.x, l.y, l.content);
      TAS.particles.spawn(l.x + 5, l.y + 6, '#ffaa00', 6, 2, { gravity: 2 });
    }
  }
}

function hitEnemy(e, dmg) {
  e.hp -= dmg;
  e.flash = 0.1;
  TAS.fx.shake(2, 0.85);
  SFX.hit();
  if (e.hp <= 0) {
    e.alive = false;
    var pts = intScore(100);
    score += pts;
    SFX.enemyDie();
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 8, 3, { gravity: 3 });
    spawnScorePopup(e.x + e.w / 2, e.y - 5, '+' + pts, '#44ff88');
    // Spore explosion effect on death
    SFX.sporeExplode();
    spawnDust(e.x + e.w / 2, e.y + e.h / 2, 5, '#88ff88');
    // CHA luck — bonus item drop
    if (Math.random() < chaDropRate(0.15)) {
      var bonusContent = pickLanternContent(Math.random(), currentStage);
      spawnPickup(e.x, e.y, bonusContent);
      spawnScorePopup(e.x, e.y - 15, 'BONUS!', '#ffaa44');
    }
  }
}

function hitBoss(b, dmg) {
  b.hp -= dmg;
  b.flash = 0.12;
  TAS.fx.shake(4, 0.8);
  SFX.hit();
  if (b.hp <= 0) {
    b.alive = false;
    bossDefeated = true;
    var pts = intScore(1000 + currentStage * 500);
    score += pts;
    SFX.stageClear();
    TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#ffdd44', 20, 4, { gravity: 2 });
    TAS.fx.flash('#fff', 0.5);
    spawnScorePopup(b.x + b.w / 2, b.y - 10, '+' + pts, '#ffdd44');
    state = 'stageClear';
    cinematicTimer = 0;
    if (score > highScore) { highScore = score; TAS.score.save('hexninja_hi', score); }
  }
  // Phase transitions
  if (b.hp < b.maxHp * 0.66 && b.phase === 0) {
    b.phase = 1; b.timer = 0;
    SFX.bossRoar();
    TAS.fx.shake(6, 0.7);
    spawnScorePopup(b.x, b.y - 15, 'PHASE 2!', '#ff6644');
  }
  if (b.hp < b.maxHp * 0.33 && b.phase === 1) {
    b.phase = 2; b.timer = 0;
    SFX.bossRoar();
    TAS.fx.shake(8, 0.6);
    TAS.fx.flash('#ff2200', 0.3);
    spawnScorePopup(b.x, b.y - 15, 'RAGE MODE!', '#ff2244');
  }
}

function useSubWeapon() {
  var shurikenDmg = strDamage(2);
  var fireDmg = strDamage(3);
  var windDmg = strDamage(4);
  switch(player.subWeapon) {
    case 'shuriken':
      SFX.shuriken();
      projectiles.push({ x: player.x + player.w / 2, y: player.y + 6, vx: player.dir * dexSpeed(250), vy: 0, type: 'shuriken', life: 2, dmg: shurikenDmg, w: 6, h: 6 });
      break;
    case 'fireWheel':
      SFX.kunai();
      projectiles.push({ x: player.x + player.w / 2, y: player.y, vx: player.dir * dexSpeed(150), vy: -180, type: 'fireWheel', life: 1.5, dmg: fireDmg, w: 8, h: 8, gravity: 200 });
      break;
    case 'windSlash':
      SFX.windSlash();
      projectiles.push({ x: player.x + player.w / 2, y: player.y + 4, vx: player.dir * dexSpeed(200), vy: 0, type: 'windSlash', life: 1, dmg: windDmg, w: 24, h: 12, pierce: true });
      break;
    case 'shadowClone':
      SFX.clone();
      cloneActive = 3;
      cloneTrail = [];
      iFrames = 3;
      break;
  }
}

function damagePlayer(dmg) {
  if (iFrames > 0 || player.dead) return;
  player.hp -= dmg;
  iFrames = 1.5;
  TAS.fx.shake(5, 0.8);
  TAS.fx.flash('#ff0000', 0.3);
  SFX.hit();
  TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#ff4444', 6, 2);
  spawnDust(player.x + player.w / 2, player.y + player.h / 2, 4, '#ff6644');
  player.comboCount = 0;
  if (player.hp <= 0) {
    player.dead = true;
    player.hp = 0;
    SFX.die();
    deathTimer = 2;
    TAS.fx.shake(8, 0.5);
  }
}

function respawnPlayer() {
  lives--;
  if (lives < 0) {
    if (score > highScore) { highScore = score; TAS.score.save('hexninja_hi', score); }
    state = 'gameOver';
    return;
  }
  player.dead = false;
  player.hp = player.maxHp;
  player.sp = Math.min(player.sp + 10, player.maxSp);
  player.x = 30;
  player.y = 150;
  player.vx = 0;
  player.vy = 0;
  player.wallCling = 0;
  player.comboCount = 0;
  currentScreen = 0;
  iFrames = 2;
  stageData = generateStage(currentStage);
  generateMovingPlatforms(currentStage);
  scorePopups = [];
  dustParticles = [];
}

function spawnPickup(x, y, content) {
  pickups.push({ x: x, y: y, vy: -80, content: content, life: 5, w: 8, h: 8 });
}

function updateProjectiles(dt) {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.gravity) p.vy += p.gravity * dt;
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    var screen = stageData[currentScreen];
    if (!screen) continue;
    var hit = false;
    for (var e of screen.enemies) {
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, e.x, e.y, e.w, e.h)) {
        hitEnemy(e, p.dmg);
        if (!p.pierce) { hit = true; break; }
      }
    }
    if (screen.boss && screen.boss.alive) {
      if (TAS.hit.rectOverlap(p.x, p.y, p.w, p.h, screen.boss.x, screen.boss.y, screen.boss.w, screen.boss.h)) {
        hitBoss(screen.boss, p.dmg);
        if (!p.pierce) hit = true;
      }
    }
    if (hit) { projectiles.splice(i, 1); continue; }

    if (isSolid(p.x + currentScreen * SCREEN_W, p.y + HUD_H)) {
      TAS.particles.spawn(p.x, p.y, '#aaaacc', 3, 1);
      projectiles.splice(i, 1);
    }
  }

  for (var i2 = enemyProjectiles.length - 1; i2 >= 0; i2--) {
    var p2 = enemyProjectiles[i2];
    p2.x += p2.vx * dt;
    p2.y += p2.vy * dt;
    if (p2.gravity) p2.vy += p2.gravity * dt;
    p2.life -= dt;
    if (p2.life <= 0) { enemyProjectiles.splice(i2, 1); continue; }
    if (!player.dead && iFrames <= 0 && TAS.hit.rectOverlap(p2.x, p2.y, p2.w || 6, p2.h || 6, player.x, player.y, player.w, player.h)) {
      damagePlayer(p2.dmg || 2);
      enemyProjectiles.splice(i2, 1);
    }
  }
}

function updateEnemies(dt) {
  var screen = stageData[currentScreen];
  if (!screen) return;

  for (var e of screen.enemies) {
    if (!e.alive) continue;
    if (e.flash > 0) e.flash -= dt;
    e.timer += dt;
    if (e.sporeTimer > 0) e.sporeTimer -= dt;

    var distToPlayer = Math.abs(e.x - player.x);
    var dirToPlayer = player.x > e.x ? 1 : -1;

    switch(e.type) {
      case 'spore_runner':
        e.vx = e.dir * 50;
        e.x += e.vx * dt;
        if (e.x < 10 || e.x > SCREEN_W - 20) e.dir *= -1;
        if (distToPlayer < 100) { e.dir = dirToPlayer; e.vx = e.dir * 70; }
        // Spore trail
        if (e.sporeTimer <= 0 && distToPlayer < 80) {
          e.sporeTimer = 0.8;
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h, '#66aa44', 2, 1);
        }
        break;

      case 'goo_jumper':
        e.vx = e.dir * 40;
        e.x += e.vx * dt;
        if (e.x < 10 || e.x > SCREEN_W - 20) e.dir *= -1;
        if (distToPlayer < 80 && e.grounded && e.timer > 1) {
          e.vy = -200;
          e.grounded = false;
          e.timer = 0;
          e.dir = dirToPlayer;
          spawnDust(e.x + e.w / 2, e.y + e.h, 3, '#44cc66');
        }
        if (!e.grounded) { e.vy += GRAVITY * dt; e.y += e.vy * dt; }
        if (e.y > 200) { e.y = 200; e.grounded = true; e.vy = 0; }
        break;

      case 'mycelial_bird':
        e.x += Math.sin(e.timer * 3) * 60 * dt + e.dir * 30 * dt;
        e.y += Math.cos(e.timer * 2) * 40 * dt;
        if (distToPlayer < 120) {
          e.x += dirToPlayer * 80 * dt;
          e.y += (player.y > e.y ? 1 : -1) * 60 * dt;
        }
        if (e.x < 10 || e.x > SCREEN_W - 20) e.dir *= -1;
        e.y = TAS.math.clamp(e.y, 30, 200);
        // Spore drop attack
        if (e.sporeTimer <= 0 && distToPlayer < 60 && e.y < player.y) {
          e.sporeTimer = 2;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y + e.h,
            vx: 0, vy: 100, gravity: 150,
            life: 2, dmg: 1, w: 6, h: 6, type: 'sporedrop'
          });
        }
        break;

      case 'spore_thrower':
        e.x += e.dir * 20 * dt;
        if (e.x < 10 || e.x > SCREEN_W - 20) e.dir *= -1;
        e.dir = dirToPlayer;
        if (distToPlayer < 200 && e.attackTimer <= 0) {
          e.attackTimer = 1.5;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y,
            vx: dirToPlayer * 100, vy: -120,
            gravity: 250, life: 3, dmg: 2, w: 6, h: 6, type: 'sporeball'
          });
        }
        if (e.attackTimer > 0) e.attackTimer -= dt;
        break;

      case 'reactor_sniper':
        e.dir = dirToPlayer;
        if (distToPlayer < 250 && e.attackTimer <= 0 && Math.abs(e.y - player.y) < 40) {
          e.attackTimer = 2;
          enemyProjectiles.push({
            x: e.x + e.w / 2, y: e.y + e.h / 2,
            vx: dirToPlayer * 200, vy: 0,
            life: 2, dmg: 3, w: 8, h: 3, type: 'reactorbeam'
          });
          // Laser sight flash
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4444', 2, 1);
        }
        if (e.attackTimer > 0) e.attackTimer -= dt;
        break;

      case 'fungal_shield':
        e.vx = e.dir * 30;
        e.x += e.vx * dt;
        if (e.x < 10 || e.x > SCREEN_W - 20) e.dir *= -1;
        if (distToPlayer < 60) e.dir = dirToPlayer;
        break;
    }

    // Contact damage
    if (!player.dead && iFrames <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      damagePlayer(2);
    }
  }

  if (screen.boss && screen.boss.alive) {
    updateBoss(screen.boss, dt);
  }
}

// === BOSS NINJA AI — enhanced with ninja fight patterns ===
function updateBoss(b, dt) {
  if (b.flash > 0) b.flash -= dt;
  b.timer += dt;
  b.attackTimer -= dt;
  if (b.dashCooldown > 0) b.dashCooldown -= dt;
  if (b.sporeBurstTimer > 0) b.sporeBurstTimer -= dt;
  if (b.teleportTimer > 0) b.teleportTimer -= dt;

  var dirToPlayer = player.x > b.x ? 1 : -1;
  b.dir = dirToPlayer;

  switch(b.phase) {
    case 0: // Ninja melee pattern — cautious approach
      b.x += Math.sin(b.timer * 1.5) * 40 * dt * dirToPlayer;
      if (b.attackTimer <= 0) {
        b.attackTimer = wisCooldown(1.8) - currentStage * 0.1;
        if (b.ninjaStyle === 'melee' || Math.random() < 0.6) {
          // Sword lunge
          enemyProjectiles.push({
            x: b.x + b.w / 2, y: b.y + b.h / 2,
            vx: dirToPlayer * 160, vy: 0,
            life: 1, dmg: 3, w: 20, h: 6, type: 'ninjasword'
          });
          spawnDust(b.x + b.w / 2, b.y + b.h, 3, '#aa4444');
        } else {
          // Spore kunai throw
          SFX.kunai();
          enemyProjectiles.push({
            x: b.x + b.w / 2, y: b.y + 8,
            vx: dirToPlayer * 180, vy: -30,
            life: 2, dmg: 2, w: 6, h: 6, type: 'kunai'
          });
        }
      }
      break;

    case 1: // Enhanced patterns — teleport + spread
      b.x += Math.sin(b.timer * 2.5) * 60 * dt;
      b.y += Math.cos(b.timer * 2) * 30 * dt;
      b.y = TAS.math.clamp(b.y, 60, 200);
      // Teleport dodge
      if (b.teleportTimer <= 0 && Math.abs(player.x - b.x) < 40) {
        b.teleportTimer = 3;
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#8844cc', 8, 2);
        b.x = player.x > SCREEN_W / 2 ? 60 : SCREEN_W - 80;
        b.y = 100 + Math.random() * 60;
        TAS.particles.spawn(b.x + b.w / 2, b.y + b.h / 2, '#8844cc', 8, 2);
      }
      if (b.attackTimer <= 0) {
        b.attackTimer = 1.2 - currentStage * 0.05;
        // Spore burst spread
        for (var a = -1; a <= 1; a++) {
          enemyProjectiles.push({
            x: b.x + b.w / 2, y: b.y + b.h / 2,
            vx: dirToPlayer * 130, vy: a * 60,
            life: 2, dmg: 2, w: 6, h: 6, type: 'sporeburst'
          });
        }
        if (b.sporeBurstTimer <= 0) {
          b.sporeBurstTimer = 4;
          SFX.sporeExplode();
          // Ring of spores
          for (var angle = 0; angle < 6; angle++) {
            var rad = angle * Math.PI / 3;
            enemyProjectiles.push({
              x: b.x + b.w / 2, y: b.y + b.h / 2,
              vx: Math.cos(rad) * 80, vy: Math.sin(rad) * 80,
              life: 2.5, dmg: 1, w: 5, h: 5, type: 'sporering'
            });
          }
        }
      }
      break;

    case 2: // Rage mode — ninja dash + rain + homing
      b.x += Math.sin(b.timer * 3) * 80 * dt;
      b.y += Math.cos(b.timer * 2.5) * 50 * dt;
      b.y = TAS.math.clamp(b.y, 50, 200);
      // Constant spore particles
      if (frame % 5 === 0) TAS.particles.spawn(b.x + Math.random() * b.w, b.y + Math.random() * b.h, '#ff4488', 1, 1);
      if (b.attackTimer <= 0) {
        b.attackTimer = 0.8;
        b.pattern = (b.pattern + 1) % 4;
        if (b.pattern === 0) {
          // Ninja dash
          if (b.dashCooldown <= 0) {
            b.dashCooldown = 2;
            enemyProjectiles.push({ x: b.x, y: b.y, vx: dirToPlayer * 250, vy: 0, life: 0.8, dmg: 4, w: 28, h: 28, type: 'ninjadash' });
            SFX.bossRoar();
            spawnDust(b.x + b.w / 2, b.y + b.h, 6, '#ff4444');
          }
        } else if (b.pattern === 1) {
          // Spore rain
          for (var i = 0; i < 5; i++) {
            enemyProjectiles.push({ x: 30 + i * 75, y: 30, vx: 0, vy: 150, life: 2, dmg: 2, w: 6, h: 10, type: 'sporerain' });
          }
        } else if (b.pattern === 2) {
          // Homing spore
          enemyProjectiles.push({
            x: b.x + b.w / 2, y: b.y + b.h / 2,
            vx: dirToPlayer * 100, vy: (player.y - b.y) * 0.8,
            life: 2.5, dmg: 3, w: 10, h: 10, type: 'homing'
          });
        } else {
          // Double kunai
          SFX.kunai();
          enemyProjectiles.push({ x: b.x + b.w / 2, y: b.y + 4, vx: dirToPlayer * 200, vy: -40, life: 2, dmg: 2, w: 5, h: 5, type: 'kunai' });
          enemyProjectiles.push({ x: b.x + b.w / 2, y: b.y + 12, vx: dirToPlayer * 200, vy: 40, life: 2, dmg: 2, w: 5, h: 5, type: 'kunai' });
        }
      }
      break;
  }

  // Contact damage
  if (!player.dead && iFrames <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, b.x, b.y, b.w, b.h)) {
    damagePlayer(3);
  }
}

function updatePickups(dt) {
  for (var i = pickups.length - 1; i >= 0; i--) {
    var p = pickups[i];
    p.vy += 300 * dt;
    p.y += p.vy * dt;
    if (p.y > 220) { p.y = 220; p.vy = 0; }
    p.life -= dt;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }

    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
      applyPickup(p.content);
      pickups.splice(i, 1);
      SFX.pickup();
    }
  }
}

function applyPickup(content) {
  switch(content.type) {
    case 'hp':
      player.hp = Math.min(player.hp + content.amount, player.maxHp);
      spawnScorePopup(player.x, player.y - 10, '+' + content.amount + ' HP', '#44ff44');
      break;
    case 'sp':
      player.sp = Math.min(player.sp + content.amount, player.maxSp);
      spawnScorePopup(player.x, player.y - 10, '+' + content.amount + ' SP', '#4488ff');
      break;
    case '1up':
      lives++;
      spawnScorePopup(player.x, player.y - 10, '1UP!', '#ffdd44');
      break;
    case 'subweapon':
      player.subWeapon = content.weapon;
      spawnScorePopup(player.x, player.y - 10, SUB_NAMES[content.weapon], '#ff44aa');
      break;
    case 'score':
      score += content.amount;
      spawnScorePopup(player.x, player.y - 10, '+' + content.amount, '#ffdd44');
      break;
  }
}

function updateMovingPlatforms(dt) {
  for (var mp of movingPlatforms) {
    mp.x += mp.dir * mp.speed * dt;
    if (mp.x > mp.endX) { mp.x = mp.endX; mp.dir = -1; }
    if (mp.x < mp.startX) { mp.x = mp.startX; mp.dir = 1; }
  }
}

function updateClone(dt) {
  if (cloneActive > 0) {
    cloneActive -= dt;
    for (var i = cloneTrail.length - 1; i >= 0; i--) {
      cloneTrail[i].life -= dt;
      if (cloneTrail[i].life <= 0) cloneTrail.splice(i, 1);
    }
  } else {
    cloneTrail = [];
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage ' + currentStage });
    return;
  }

  if (state === 'cinematic') {
    drawCinematic();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'stageClear') {
    drawStageClear();
    return;
  }

  if (state === 'playing') {
    ctx.save();
    TAS.fx.applyShake();
    drawBackground();
    drawLevel();
    drawGooTraps();
    drawMovingPlatforms();
    drawPickups();
    drawLanterns();
    drawEnemies();
    drawBoss();
    drawProjectiles();
    drawClone();
    drawPlayer();
    drawDust();
    TAS.particles.draw();
    drawScorePopups();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    drawTutorial();
    if (screenTransition > 0) {
      ctx.fillStyle = 'rgba(0,0,0,' + screenTransition + ')';
      ctx.fillRect(0, 0, GW, GH);
    }
    TAS.input.drawTouchControls(GW, GH);
  }
}

// === TITLE SCREEN — NES-styled with controls ===
function drawTitle() {
  ctx.fillStyle = '#080816';
  ctx.fillRect(0, 0, GW, GH);

  // Animated spore particles in background
  for (var i = 0; i < 20; i++) {
    var sx = (i * 47 + frame * 0.3) % GW;
    var sy = (i * 31 + Math.sin(frame * 0.02 + i) * 15 + 30) % GH;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i * 0.7) * 0.2;
    ctx.fillStyle = i % 3 === 0 ? '#44aa66' : (i % 3 === 1 ? '#338855' : '#226644');
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  // City silhouette with mycelial glow
  for (var i2 = 0; i2 < 20; i2++) {
    var bx = i2 * 22;
    var bh = 40 + Math.sin(i2 * 1.3) * 25;
    ctx.fillStyle = '#151525';
    ctx.fillRect(bx, GH - bh, 18, bh);
    // Windows — green spore glow
    ctx.fillStyle = (frame + i2 * 7) % 60 < 30 ? '#226644' : '#1a4433';
    for (var wy = GH - bh + 5; wy < GH - 5; wy += 8) {
      ctx.fillRect(bx + 3, wy, 3, 3);
      ctx.fillRect(bx + 10, wy, 3, 3);
    }
    // Mycelial roots at base
    if (i2 % 3 === 0) {
      ctx.fillStyle = '#1a3322';
      ctx.fillRect(bx + 2, GH - 4, 14, 4);
    }
  }

  // Title with pixel shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('HEX NINJA', GW / 2 + 2, 50);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText('HEX NINJA', GW / 2 + 1, 49);
  // Animated title color
  var titleHue = Math.sin(titleAnim * 0.8);
  ctx.fillStyle = titleHue > 0 ? '#ff4466' : '#44ff88';
  ctx.fillText('HEX NINJA', GW / 2, 48);

  // Baseling ninja character — pixel art
  var nx = GW / 2, ny = 82;
  // Body
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.fillRect(nx - 5, ny, 10, 14);
  // Head
  ctx.fillRect(nx - 4, ny - 6, 8, 7);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(nx - 2, ny - 4, 2, 2);
  ctx.fillRect(nx + 2, ny - 4, 2, 2);
  ctx.fillStyle = '#111';
  ctx.fillRect(nx - 1, ny - 3, 1, 1);
  ctx.fillRect(nx + 3, ny - 3, 1, 1);
  // Headband
  ctx.fillStyle = '#cc3344';
  ctx.fillRect(nx - 5, ny - 3, 12, 2);
  // Headband tail
  ctx.fillStyle = '#aa2233';
  ctx.fillRect(nx + 7, ny - 4, 6, 2);
  ctx.fillRect(nx + 9, ny - 5, 5, 2);
  // Sword
  ctx.fillStyle = '#aabbcc';
  var swordBob = Math.sin(titleAnim * 2) * 1;
  ctx.fillRect(nx + 5, ny + 1 + swordBob, 16, 2);
  ctx.fillStyle = '#665533';
  ctx.fillRect(nx + 4, ny + swordBob, 3, 4);
  // Icon/name from stat
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = '7px monospace';
  ctx.fillText(statB.icon || 'B', nx, ny + 22);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 120);

  // Baseling stat display
  if (statB.level > 0) {
    ctx.fillStyle = '#556';
    ctx.font = '8px monospace';
    ctx.fillText(statB.name + ' Lv.' + statB.level, GW / 2, 132);
    ctx.fillStyle = '#445';
    ctx.font = '7px monospace';
    ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 142);
  }

  // NES-style control display
  ctx.fillStyle = '#445566';
  ctx.font = '8px monospace';
  var controlY = statB.level > 0 ? 156 : 146;
  ctx.fillText('-- NES CONTROLS --', GW / 2, controlY);
  ctx.fillStyle = '#556677';
  ctx.font = '7px monospace';
  ctx.fillText('[ARROWS/WASD] Move    [Z/SPACE] Jump', GW / 2, controlY + 12);
  ctx.fillText('[X/SHIFT] Slash       [C/UP+X]  Sub-weapon', GW / 2, controlY + 22);
  ctx.fillText('[DOWN] Crouch   Wall: hold toward + jump', GW / 2, controlY + 32);

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 28);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#44aa88';
    ctx.font = '9px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH - 42);
  }
}

function drawCinematic() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, GW, GH);

  // Spore particle drift
  for (var i = 0; i < 10; i++) {
    var sx = (i * 43 + frame * 0.5) % GW;
    var sy = (i * 29 + Math.sin(frame * 0.01 + i * 2) * 20 + 40) % GH;
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.02 + i) * 0.1;
    ctx.fillStyle = '#44aa66';
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  var lines = CINEMATICS[currentStage] || ['...'];
  ctx.textAlign = 'center';
  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = '#cc4455';
  ctx.fillText('ACT ' + currentStage, GW / 2, 50);

  // Stage name
  var stageNames = ['', 'MYCELIAL DOJO', 'FUNGAL FOREST', 'REACTOR CLIFFS', 'SPORE TUNNELS', 'REACTOR TOWER', 'SKY FORTRESS', 'DARK SPORE LAIR'];
  ctx.fillStyle = '#778899';
  ctx.font = '9px monospace';
  ctx.fillText(stageNames[currentStage] || '', GW / 2, 65);

  ctx.font = '10px monospace';
  for (var i2 = 0; i2 < lines.length; i2++) {
    var alpha = TAS.math.clamp((cinematicTimer - i2 * 0.8) * 2, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#aabbcc';
    ctx.fillText(lines[i2], GW / 2, 90 + i2 * 20);
  }
  ctx.globalAlpha = 1;

  var pulse = Math.sin(frame * 0.06) * 0.3 + 0.5;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#556';
  ctx.font = '9px monospace';
  ctx.fillText('Press any key to skip', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function drawStageClear() {
  ctx.fillStyle = '#080816';
  ctx.fillRect(0, 0, GW, GH);

  // Celebration particles
  for (var i = 0; i < 8; i++) {
    var px = (i * 51 + frame * 0.8) % GW;
    var py = (i * 37 + Math.sin(frame * 0.04 + i) * 30 + 60) % GH;
    ctx.fillStyle = ['#44ff88', '#ffdd44', '#ff44aa', '#44aaff'][i % 4];
    ctx.fillRect(px, py, 3, 3);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 - 20);
  ctx.fillStyle = '#ffdd44';
  ctx.font = '12px monospace';
  ctx.fillText('Score: ' + score, GW / 2, GH / 2 + 10);
  TAS.particles.draw();
}

function drawVictory() {
  ctx.fillStyle = '#080816';
  ctx.fillRect(0, 0, GW, GH);

  // Victory sparkles
  for (var i = 0; i < 15; i++) {
    var sx = (i * 31 + frame * 0.6) % GW;
    var sy = (i * 19 + Math.sin(frame * 0.03 + i * 1.5) * 20 + 40) % GH;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05 + i) * 0.3;
    ctx.fillStyle = ['#ffdd44', '#44ff88', '#ff44aa'][i % 3];
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  var pulse = Math.sin(frame * 0.04) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#aabbcc';
  ctx.font = '10px monospace';
  ctx.fillText('The Spore Clan is defeated.', GW / 2, 100);
  ctx.fillText('The mycelial network is purified.', GW / 2, 118);
  ctx.fillText('Hex City breathes free once more.', GW / 2, 136);
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 170);
  if (score >= highScore) {
    ctx.fillStyle = '#ff44aa';
    ctx.font = '11px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 195);
  }
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '9px monospace';
    ctx.fillText(statB.name + ' - Legendary Ninja', GW / 2, 215);
  }
}

// === STAGE BACKGROUND DRAWING — themed zones ===
function drawBackground() {
  var colors = ['#0a0a18', '#0c1020', '#081810', '#120808', '#0a0a1a', '#080818', '#100810'];
  ctx.fillStyle = colors[currentStage - 1] || '#0a0a12';
  ctx.fillRect(0, 0, GW, GH);

  var parallax = (currentScreen * 20 + frame * 0.1) % GW;
  ctx.fillStyle = '#223344';
  for (var i = 0; i < 15; i++) {
    var sx = (i * 47 + parallax * 0.3) % GW;
    var sy = (i * 31 + 20) % (GH - 40);
    ctx.fillRect(sx, sy, 1, 1);
  }

  switch(currentStage) {
    case 1: // Mycelial Dojo — buildings with spore veins
      for (var i2 = 0; i2 < 8; i2++) {
        var bx = (i2 * 55 - parallax * 0.2 + 500) % (GW + 50) - 25;
        var bh2 = 50 + i2 * 12;
        ctx.fillStyle = '#0f0f22';
        ctx.fillRect(bx, GH - bh2 - 20, 30, bh2);
        // Spore veins on buildings
        ctx.fillStyle = '#1a3322';
        ctx.fillRect(bx + 5, GH - bh2 - 10, 2, bh2 - 10);
        ctx.fillRect(bx + 20, GH - bh2, 2, bh2 - 15);
      }
      // Dojo lanterns
      for (var i3 = 0; i3 < 4; i3++) {
        var lx = (i3 * 100 + frame * 0.1 + 20) % GW;
        ctx.fillStyle = '#442211';
        ctx.fillRect(lx, GH - 60 - i3 * 10, 6, 8);
        ctx.fillStyle = (frame + i3 * 17) % 10 < 5 ? '#ffaa33' : '#ff8822';
        ctx.fillRect(lx + 1, GH - 59 - i3 * 10, 4, 5);
      }
      break;
    case 2: // Fungal Forest — glowing mushrooms
      for (var i4 = 0; i4 < 6; i4++) {
        var tx = (i4 * 75 - parallax * 0.15 + 400) % (GW + 60) - 30;
        ctx.fillStyle = '#0a1a0a';
        ctx.fillRect(tx + 8, GH - 80, 6, 60);
        ctx.fillStyle = '#0d2d0d';
        ctx.beginPath();
        ctx.arc(tx + 11, GH - 80, 18, 0, Math.PI * 2);
        ctx.fill();
      }
      // Glowing mushrooms
      for (var i5 = 0; i5 < 5; i5++) {
        var mx = (i5 * 83 + 30) % GW;
        var my = GH - 25 - i5 * 5;
        ctx.fillStyle = '#2a4422';
        ctx.fillRect(mx + 3, my, 3, 8);
        var glow = Math.sin(frame * 0.04 + i5 * 1.2) * 0.3 + 0.5;
        ctx.globalAlpha = glow;
        ctx.fillStyle = '#44ff66';
        ctx.beginPath();
        ctx.arc(mx + 4, my, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
    case 3: // Reactor Cliffs — energy lines
      ctx.strokeStyle = '#1a3344';
      ctx.lineWidth = 1;
      for (var i6 = 0; i6 < 4; i6++) {
        var lineY = 40 + i6 * 50;
        ctx.beginPath();
        ctx.moveTo(0, lineY);
        for (var x = 0; x < GW; x += 20) {
          ctx.lineTo(x, lineY + Math.sin(x * 0.05 + frame * 0.02) * 5);
        }
        ctx.stroke();
      }
      break;
    case 4: // Underground — lava glow
      ctx.fillStyle = 'rgba(80, 20, 0, 0.15)';
      ctx.fillRect(0, GH - 30, GW, 30);
      // Stalactites
      for (var i7 = 0; i7 < 8; i7++) {
        var stx = (i7 * 53 + 10) % GW;
        var sth = 10 + (i7 % 3) * 8;
        ctx.fillStyle = '#1a1210';
        ctx.fillRect(stx, HUD_H + 16, 4, sth);
      }
      break;
    case 5: // Reactor Tower — pulsing energy panels
      for (var i8 = 0; i8 < 6; i8++) {
        var px2 = (i8 * 67 + 15) % GW;
        var py2 = 40 + i8 * 30;
        var pulse2 = Math.sin(frame * 0.03 + i8) * 0.15 + 0.15;
        ctx.globalAlpha = pulse2;
        ctx.fillStyle = '#2244aa';
        ctx.fillRect(px2, py2, 20, 12);
        ctx.globalAlpha = 1;
      }
      break;
    case 6: // Sky — clouds and distant spore islands
      ctx.fillStyle = '#1a1a2e';
      for (var i9 = 0; i9 < 5; i9++) {
        var cx = (i9 * 90 - frame * 0.3 + 500) % (GW + 60) - 30;
        ctx.fillRect(cx, 30 + i9 * 20, 50, 8);
      }
      // Distant floating islands
      for (var i10 = 0; i10 < 3; i10++) {
        var ix2 = (i10 * 140 - frame * 0.15 + 300) % (GW + 80) - 40;
        ctx.fillStyle = '#121222';
        ctx.fillRect(ix2, 60 + i10 * 40, 40, 12);
        ctx.fillStyle = '#1a2a1a';
        ctx.fillRect(ix2 + 10, 55 + i10 * 40, 20, 8);
      }
      break;
    case 7: // Dark Spore Lair — pulsing organic walls
      var lairPulse = Math.sin(frame * 0.02) * 0.1 + 0.1;
      ctx.globalAlpha = lairPulse;
      ctx.fillStyle = '#330022';
      ctx.fillRect(0, 0, GW, GH);
      ctx.globalAlpha = 1;
      // Organic veins
      ctx.strokeStyle = '#331133';
      ctx.lineWidth = 2;
      for (var v = 0; v < 5; v++) {
        ctx.beginPath();
        ctx.moveTo(v * 80, 0);
        for (var vy2 = 0; vy2 < GH; vy2 += 10) {
          ctx.lineTo(v * 80 + Math.sin(vy2 * 0.08 + frame * 0.01) * 15, vy2);
        }
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      break;
  }
}

function drawLevel() {
  var screen = stageData[currentScreen];
  if (!screen) return;
  var tiles = screen.tiles;

  for (var r = 0; r < 14; r++) {
    for (var c = 0; c < 24; c++) {
      var tile = tiles[r][c];
      var tx = c * TILE;
      var ty = r * TILE + HUD_H;

      switch(tile) {
        case 1: // Solid
          ctx.fillStyle = getSolidColor(currentStage);
          ctx.fillRect(tx, ty, TILE, TILE);
          // NES-style edge highlight
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          ctx.fillRect(tx, ty, TILE, 1);
          ctx.fillRect(tx, ty, 1, TILE);
          // Bottom/right shadow
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.fillRect(tx, ty + TILE - 1, TILE, 1);
          ctx.fillRect(tx + TILE - 1, ty, 1, TILE);
          // Stage 7 organic texture
          if (currentStage === 7 && (r + c) % 4 === 0) {
            ctx.fillStyle = 'rgba(100,30,80,0.2)';
            ctx.fillRect(tx + 4, ty + 4, 4, 4);
          }
          break;
        case 2: // Platform
          ctx.fillStyle = getPlatformColor(currentStage);
          ctx.fillRect(tx, ty, TILE, 3);
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fillRect(tx, ty, TILE, 1);
          // NES dither pattern
          if ((c + r) % 2 === 0) {
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.fillRect(tx + 2, ty + 1, 2, 1);
          }
          break;
        case 3: // Hazard
          ctx.fillStyle = getHazardColor(currentStage);
          ctx.fillRect(tx, ty, TILE, TILE);
          // Animated glow
          if (frame % 10 < 5) {
            ctx.fillStyle = 'rgba(255,100,0,0.3)';
            ctx.fillRect(tx, ty, TILE, 2);
          }
          // Animated bubbles for lava
          if (frame % 20 < 3) {
            ctx.fillStyle = 'rgba(255,200,50,0.5)';
            ctx.fillRect(tx + (frame % 12), ty + 2, 2, 2);
          }
          break;
        case 4: // Lantern tile marker
          break;
      }
    }
  }
}

function getSolidColor(stage) {
  switch(stage) {
    case 1: return '#2a2a44';
    case 2: return '#1a3322';
    case 3: return '#3a3028';
    case 4: return '#2a1a1a';
    case 5: return '#1a2a3a';
    case 6: return '#2a2a3a';
    case 7: return '#2a1a2a';
    default: return '#2a2a2a';
  }
}

function getPlatformColor(stage) {
  switch(stage) {
    case 1: return '#445566';
    case 2: return '#336633';
    case 3: return '#776644';
    case 4: return '#664422';
    case 5: return '#336688';
    case 6: return '#445577';
    case 7: return '#663366';
    default: return '#444444';
  }
}

function getHazardColor(stage) {
  switch(stage) {
    case 1: return '#442200';
    case 4: return '#662200';
    case 5: return '#004466';
    case 6: return '#220033';
    default: return '#441100';
  }
}

// === GOO TRAP DRAWING ===
function drawGooTraps() {
  var screen = stageData[currentScreen];
  if (!screen) return;
  for (var i = 0; i < screen.gooTraps.length; i++) {
    var g = screen.gooTraps[i];
    if (!g.active) continue;
    // Goo pool base
    ctx.fillStyle = '#224422';
    ctx.fillRect(g.x, g.y + HUD_H, g.w, g.h);
    // Surface shimmer
    ctx.fillStyle = '#44aa44';
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.05 + g.x * 0.1) * 0.2;
    ctx.fillRect(g.x + 2, g.y + HUD_H, g.w - 4, 2);
    ctx.globalAlpha = 1;
    // Bubbles
    if (g.bubbleTimer > 0.5) {
      var bx = g.x + 4 + (frame % 3) * 5;
      ctx.fillStyle = '#66cc66';
      ctx.fillRect(bx, g.y + HUD_H - 2, 2, 2);
    }
  }
}

function drawMovingPlatforms() {
  for (var mp of movingPlatforms) {
    if (mp.screen !== currentScreen) continue;
    ctx.fillStyle = '#4488aa';
    ctx.fillRect(mp.x, mp.y + HUD_H, mp.w, mp.h);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(mp.x, mp.y + HUD_H, mp.w, 1);
    // Energy glow
    var pulse = Math.sin(frame * 0.06 + mp.x * 0.1) * 0.15 + 0.15;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#44ccff';
    ctx.fillRect(mp.x + 2, mp.y + HUD_H + 2, mp.w - 4, 2);
    ctx.globalAlpha = 1;
  }
}

function drawLanterns() {
  var screen = stageData[currentScreen];
  if (!screen) return;
  for (var l of screen.lanterns) {
    if (!l.alive) continue;
    // Spore lantern — organic look
    ctx.fillStyle = '#553322';
    ctx.fillRect(l.x, l.y, 10, 12);
    // Inner glow — mycelial green
    ctx.fillStyle = '#44aa44';
    ctx.fillRect(l.x + 2, l.y + 2, 6, 6);
    // Spore particles
    if (frame % 12 < 4) {
      ctx.fillStyle = 'rgba(68,170,68,0.4)';
      ctx.fillRect(l.x - 1, l.y - 1, 12, 14);
    }
    // Top cap
    ctx.fillStyle = '#443322';
    ctx.fillRect(l.x - 1, l.y - 1, 12, 2);
  }
}

function drawPickups() {
  for (var p of pickups) {
    var blink = p.life < 2 && frame % 6 < 3;
    if (blink) continue;
    switch(p.content.type) {
      case 'hp':
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(p.x, p.y, 8, 8);
        ctx.fillStyle = '#fff';
        ctx.fillRect(p.x + 3, p.y + 1, 2, 6);
        ctx.fillRect(p.x + 1, p.y + 3, 6, 2);
        break;
      case 'sp':
        ctx.fillStyle = '#4488ff';
        ctx.fillRect(p.x, p.y, 8, 8);
        ctx.fillStyle = '#88ccff';
        ctx.fillRect(p.x + 2, p.y + 2, 4, 4);
        break;
      case '1up':
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(p.x, p.y, 8, 8);
        ctx.fillStyle = '#fff';
        ctx.font = '7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('1', p.x + 4, p.y + 7);
        break;
      case 'subweapon':
        ctx.fillStyle = '#ff44aa';
        ctx.fillRect(p.x, p.y, 8, 8);
        ctx.fillStyle = '#ffaadd';
        ctx.fillRect(p.x + 2, p.y + 3, 4, 2);
        break;
      case 'score':
        ctx.fillStyle = '#ffdd44';
        ctx.fillRect(p.x, p.y, 8, 8);
        ctx.fillStyle = '#aa8800';
        ctx.fillRect(p.x + 2, p.y + 2, 4, 4);
        break;
    }
  }
}

// === ENEMY DRAWING — Tasern themed pixel art ===
function drawEnemies() {
  var screen = stageData[currentScreen];
  if (!screen) return;

  for (var e of screen.enemies) {
    if (!e.alive) continue;
    if (e.flash > 0 && frame % 4 < 2) continue;

    switch(e.type) {
      case 'spore_runner':
        // Mycelial ninja body
        ctx.fillStyle = '#aa4444';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Spore cap head
        ctx.fillStyle = '#882233';
        ctx.fillRect(e.x + 1, e.y - 4, 10, 5);
        // Spore spots
        ctx.fillStyle = '#cc6644';
        ctx.fillRect(e.x + 3, e.y - 3, 2, 2);
        ctx.fillRect(e.x + 7, e.y - 2, 2, 2);
        // Legs animate
        ctx.fillStyle = '#661122';
        if (frame % 10 < 5) {
          ctx.fillRect(e.x + 1, e.y + e.h, 3, 3);
          ctx.fillRect(e.x + 7, e.y + e.h - 2, 3, 3);
        } else {
          ctx.fillRect(e.x + 1, e.y + e.h - 2, 3, 3);
          ctx.fillRect(e.x + 7, e.y + e.h, 3, 3);
        }
        // Eyes
        ctx.fillStyle = '#ff6644';
        ctx.fillRect(e.x + (e.dir > 0 ? 8 : 2), e.y + 3, 2, 2);
        break;

      case 'goo_jumper':
        // Goo creature
        ctx.fillStyle = '#33aa44';
        ctx.fillRect(e.x, e.y + 2, e.w, e.h - 2);
        // Goo drips
        ctx.fillStyle = '#228822';
        ctx.fillRect(e.x + 1, e.y + e.h - 2, 4, 4);
        ctx.fillRect(e.x + 7, e.y + e.h - 2, 4, 4);
        // Blob top
        ctx.fillStyle = '#44cc55';
        ctx.fillRect(e.x + 2, e.y, 8, 4);
        // Eyes
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(e.x + 3, e.y + 4, 3, 2);
        ctx.fillRect(e.x + 7, e.y + 4, 3, 2);
        ctx.fillStyle = '#111';
        ctx.fillRect(e.x + 4, e.y + 5, 1, 1);
        ctx.fillRect(e.x + 8, e.y + 5, 1, 1);
        break;

      case 'mycelial_bird':
        // Spore moth body
        ctx.fillStyle = '#7744aa';
        ctx.fillRect(e.x + 2, e.y + 3, 10, 6);
        // Wings with mycelial pattern
        var wingOff = Math.sin(frame * 0.3) * 3;
        ctx.fillStyle = '#9966cc';
        ctx.fillRect(e.x, e.y + wingOff, 5, 4);
        ctx.fillRect(e.x + 9, e.y + wingOff, 5, 4);
        // Wing spots
        ctx.fillStyle = '#bb88ee';
        ctx.fillRect(e.x + 1, e.y + wingOff + 1, 2, 2);
        ctx.fillRect(e.x + 10, e.y + wingOff + 1, 2, 2);
        // Antennae
        ctx.fillStyle = '#aa77dd';
        ctx.fillRect(e.x + 4, e.y, 1, 3);
        ctx.fillRect(e.x + 9, e.y, 1, 3);
        break;

      case 'spore_thrower':
        // Fungal warrior
        ctx.fillStyle = '#886633';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Mushroom helmet
        ctx.fillStyle = '#996644';
        ctx.fillRect(e.x, e.y - 3, 12, 5);
        ctx.fillStyle = '#aa7755';
        ctx.fillRect(e.x + 2, e.y - 4, 8, 3);
        // Throwing arm
        ctx.fillStyle = '#775522';
        ctx.fillRect(e.x + (e.dir > 0 ? e.w : -4), e.y + 3, 4, 3);
        // Sporeball in hand
        if (e.attackTimer < 0.3 && e.attackTimer > 0) {
          ctx.fillStyle = '#44aa44';
          ctx.fillRect(e.x + (e.dir > 0 ? e.w + 2 : -6), e.y + 2, 4, 4);
        }
        break;

      case 'reactor_sniper':
        // Tech ninja
        ctx.fillStyle = '#3355aa';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Visor
        ctx.fillStyle = '#44aaff';
        ctx.fillRect(e.x + 2, e.y + 2, 8, 3);
        // Reactor rifle
        ctx.fillStyle = '#2244aa';
        ctx.fillRect(e.x + (e.dir > 0 ? e.w : -10), e.y + 5, 10, 2);
        // Laser sight glow
        if (e.attackTimer > 1.5) {
          ctx.fillStyle = '#ff2222';
          ctx.globalAlpha = 0.4 + Math.sin(frame * 0.2) * 0.3;
          ctx.fillRect(e.x + (e.dir > 0 ? e.w + 8 : -10), e.y + 5, 2, 2);
          ctx.globalAlpha = 1;
        }
        break;

      case 'fungal_shield':
        // Armored spore warrior
        ctx.fillStyle = '#555577';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Fungal shield
        ctx.fillStyle = '#777799';
        var shieldX = e.dir > 0 ? e.x + e.w - 2 : e.x - 2;
        ctx.fillRect(shieldX, e.y - 1, 4, e.h + 2);
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(shieldX + 1, e.y + 2, 2, e.h - 4);
        // Spore glow on shield
        if (frame % 15 < 5) {
          ctx.fillStyle = 'rgba(68,170,68,0.3)';
          ctx.fillRect(shieldX - 1, e.y, 6, e.h);
        }
        // Helmet
        ctx.fillStyle = '#666688';
        ctx.fillRect(e.x + 2, e.y - 2, 8, 3);
        break;
    }

    // HP bar for non-trivial enemies
    if (e.hp < e.maxHp) {
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x, e.y - 6, e.w, 2);
      ctx.fillStyle = '#cc2222';
      ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 2);
    }
  }
}

// === BOSS DRAWING — themed ninja bosses ===
function drawBoss() {
  var screen = stageData[currentScreen];
  if (!screen || !screen.boss || !screen.boss.alive) return;
  var b = screen.boss;

  if (b.flash > 0 && frame % 3 < 2) return;

  var pulseSize = Math.sin(frame * 0.05) * 2;

  // Boss shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(b.x + 2, b.y + b.h + 1, b.w - 4, 3);

  // Main body
  ctx.fillStyle = getBossColor(currentStage);
  ctx.fillRect(b.x - pulseSize, b.y - pulseSize, b.w + pulseSize * 2, b.h + pulseSize * 2);

  // Spore armor detail
  ctx.fillStyle = getBossAccentColor(currentStage);
  ctx.fillRect(b.x + 4, b.y + 2, b.w - 8, 4);
  ctx.fillRect(b.x + 2, b.y + b.h - 8, b.w - 4, 4);

  // Phase-based aura
  if (b.phase >= 1) {
    ctx.strokeStyle = b.phase >= 2 ? '#ff4444' : '#ffaa00';
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x - 3, b.y - 3, b.w + 6, b.h + 6);
  }
  if (b.phase >= 2) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
    ctx.globalAlpha = 1;
    // Rage particles
    if (frame % 3 === 0) {
      TAS.particles.spawn(b.x + Math.random() * b.w, b.y - 3, '#ff4444', 1, 1);
    }
  }

  // Eyes — menacing
  ctx.fillStyle = b.phase >= 2 ? '#ff0000' : (b.phase >= 1 ? '#ff6600' : '#ff4444');
  ctx.fillRect(b.x + 6, b.y + 6, 4, 3);
  ctx.fillRect(b.x + 16, b.y + 6, 4, 3);
  // Eye glow
  ctx.fillStyle = 'rgba(255,0,0,0.2)';
  ctx.fillRect(b.x + 5, b.y + 5, 6, 5);
  ctx.fillRect(b.x + 15, b.y + 5, 6, 5);

  // Mouth/teeth
  ctx.fillStyle = '#330000';
  ctx.fillRect(b.x + 6, b.y + 16, 16, 4);
  ctx.fillStyle = '#eee';
  for (var i = 0; i < 4; i++) {
    ctx.fillRect(b.x + 7 + i * 4, b.y + 16, 2, 2);
  }

  // Boss HP bar
  ctx.fillStyle = '#000';
  ctx.fillRect(GW / 2 - 60, GH - 16, 120, 8);
  ctx.fillStyle = b.phase >= 2 ? '#ff2222' : (b.phase >= 1 ? '#dd6622' : '#cc2222');
  ctx.fillRect(GW / 2 - 59, GH - 15, 118 * (b.hp / b.maxHp), 6);
  // HP bar segments
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (var seg = 1; seg < 10; seg++) {
    ctx.fillRect(GW / 2 - 59 + seg * 12, GH - 15, 1, 6);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(b.name, GW / 2, GH - 18);
}

function getBossColor(stage) {
  switch(stage) {
    case 1: return '#553344';
    case 2: return '#225522';
    case 3: return '#554433';
    case 4: return '#442211';
    case 5: return '#224466';
    case 6: return '#332266';
    case 7: return '#441144';
    default: return '#444444';
  }
}

function getBossAccentColor(stage) {
  switch(stage) {
    case 1: return '#774455';
    case 2: return '#337733';
    case 3: return '#776655';
    case 4: return '#663322';
    case 5: return '#335577';
    case 6: return '#443377';
    case 7: return '#662255';
    default: return '#555555';
  }
}

// === PROJECTILE DRAWING — Tasern themed ===
function drawProjectiles() {
  for (var p of projectiles) {
    switch(p.type) {
      case 'shuriken':
        // Spore star
        ctx.save();
        ctx.translate(p.x + 3, p.y + 3);
        ctx.rotate(frame * 0.4);
        ctx.fillStyle = '#88ff88';
        ctx.fillRect(-3, -1, 6, 2);
        ctx.fillRect(-1, -3, 2, 6);
        // Spore glow
        ctx.fillStyle = 'rgba(100,255,100,0.3)';
        ctx.fillRect(-4, -4, 8, 8);
        ctx.restore();
        break;
      case 'fireWheel':
        // Reactor kunai
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(p.x + 1, p.y + 1, 6, 3);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(p.x + 5, p.y + 2, 3, 1);
        // Energy trail
        ctx.fillStyle = 'rgba(255,100,0,0.3)';
        ctx.fillRect(p.x - 4, p.y + 1, 5, 3);
        break;
      case 'windSlash':
        // Mycelial wave
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#88ffaa';
        ctx.fillRect(p.x, p.y, 24, 2);
        ctx.fillStyle = '#66dd88';
        ctx.fillRect(p.x + 2, p.y + 3, 20, 2);
        ctx.fillStyle = '#44bb66';
        ctx.fillRect(p.x + 4, p.y + 6, 16, 2);
        ctx.fillStyle = '#66dd88';
        ctx.fillRect(p.x + 2, p.y + 9, 20, 2);
        ctx.globalAlpha = 1;
        break;
    }
  }

  // Enemy projectiles — themed
  for (var p2 of enemyProjectiles) {
    switch(p2.type) {
      case 'sporeball':
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(p2.x, p2.y, 6, 6);
        ctx.fillStyle = '#66cc66';
        ctx.fillRect(p2.x + 1, p2.y + 1, 4, 4);
        break;
      case 'reactorbeam':
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(p2.x, p2.y, 8, 3);
        ctx.fillStyle = '#ff8888';
        ctx.fillRect(p2.x + 1, p2.y + 1, 6, 1);
        break;
      case 'sporedrop':
        ctx.fillStyle = '#88cc44';
        ctx.beginPath();
        ctx.arc(p2.x + 3, p2.y + 3, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'sporeburst':
      case 'sporering':
        ctx.fillStyle = '#88ff88';
        ctx.beginPath();
        ctx.arc(p2.x + 3, p2.y + 3, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#44aa44';
        ctx.beginPath();
        ctx.arc(p2.x + 3, p2.y + 3, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'ninjasword':
        ctx.fillStyle = '#ccccee';
        ctx.fillRect(p2.x, p2.y, 20, 3);
        ctx.fillStyle = '#aaaacc';
        ctx.fillRect(p2.x + 2, p2.y + 3, 16, 2);
        break;
      case 'kunai':
        ctx.fillStyle = '#aabbcc';
        ctx.fillRect(p2.x, p2.y, 5, 2);
        ctx.fillStyle = '#44aa44';
        ctx.fillRect(p2.x + 4, p2.y - 1, 2, 4);
        break;
      case 'ninjadash':
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
        ctx.fillStyle = '#ff8844';
        ctx.fillRect(p2.x + 4, p2.y + 4, p2.w - 8, p2.h - 8);
        ctx.globalAlpha = 1;
        break;
      case 'sporerain':
        ctx.fillStyle = '#66aa44';
        ctx.fillRect(p2.x, p2.y, 4, 10);
        ctx.fillStyle = '#88cc66';
        ctx.fillRect(p2.x + 1, p2.y, 2, 6);
        break;
      case 'homing':
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(p2.x + 5, p2.y + 5, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.arc(p2.x + 5, p2.y + 5, 2, 0, Math.PI * 2);
        ctx.fill();
        // Trail
        ctx.fillStyle = 'rgba(255,170,0,0.3)';
        ctx.fillRect(p2.x - 3, p2.y + 3, 5, 4);
        break;
      default:
        ctx.fillStyle = '#ff6666';
        ctx.fillRect(p2.x, p2.y, p2.w || 6, p2.h || 6);
    }
  }
}

function drawClone() {
  if (cloneActive <= 0) return;
  for (var c of cloneTrail) {
    ctx.globalAlpha = c.life * 0.5;
    ctx.fillStyle = statB.color || '#44aaff';
    ctx.fillRect(c.x + 1, c.y + 1, player.w - 2, player.h - 2);
  }
  ctx.globalAlpha = 1;
}

// === PLAYER DRAWING — baseling ninja pixel art ===
function drawPlayer() {
  if (player.dead) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(player.x, player.y + 8, player.w, 8);
    ctx.globalAlpha = 1;
    return;
  }

  if (iFrames > 0 && frame % 6 < 3) return;

  var px = player.x, py = player.y;
  var dir = player.dir;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 1, py + player.h - 1, player.w - 2, 2);

  // Body — uses baseling color
  var bodyColor = statB.color || '#1a1a2e';
  if (player.crouching) {
    ctx.fillStyle = bodyColor;
    ctx.fillRect(px, py + 6, player.w, 10);
    ctx.fillRect(px + 1, py + 3, 8, 5);
  } else if (player.wallCling !== 0) {
    ctx.fillStyle = bodyColor;
    ctx.fillRect(px, py, player.w, player.h);
    ctx.fillStyle = lightenColor(bodyColor, 20);
    var armX = player.wallCling > 0 ? px + player.w : px - 3;
    ctx.fillRect(armX, py + 3, 3, 4);
    ctx.fillRect(armX, py + 9, 3, 4);
  } else {
    ctx.fillStyle = bodyColor;
    ctx.fillRect(px, py, player.w, player.h);
    if (player.vx !== 0 && player.grounded) {
      ctx.fillStyle = darkenColor(bodyColor, 10);
      if (frame % 8 < 4) {
        ctx.fillRect(px + 1, py + player.h, 3, 2);
        ctx.fillRect(px + 6, py + player.h - 2, 3, 2);
      } else {
        ctx.fillRect(px + 1, py + player.h - 2, 3, 2);
        ctx.fillRect(px + 6, py + player.h, 3, 2);
      }
    }
  }

  // Head
  if (!player.crouching) {
    ctx.fillStyle = bodyColor;
    ctx.fillRect(px + 2, py - 4, 6, 5);
    // Headband — ninja red
    ctx.fillStyle = '#cc3344';
    ctx.fillRect(px + 1, py - 2, 8, 2);
    // Headband tail
    ctx.fillStyle = '#aa2233';
    var tailX = dir > 0 ? px - 2 : px + player.w;
    ctx.fillRect(tailX, py - 3, 5, 2);
    ctx.fillRect(tailX + (dir > 0 ? -2 : 2), py - 4, 3, 2);
    // Eye — stat color glow
    ctx.fillStyle = statB.color || '#44ffaa';
    ctx.fillRect(px + (dir > 0 ? 6 : 2), py - 3, 2, 1);
  }

  // Slash effect — enhanced
  if (player.slashing > 0) {
    var slashProgress = 1 - (player.slashing / wisCooldown(0.15));
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    var scx = px + player.w / 2 + player.slashDir * 8;
    var scy = py + player.h / 2;
    var slashArc = slashProgress * Math.PI;
    ctx.arc(scx, scy, 12 + player.comboCount * 2, -Math.PI / 2 + slashArc * 0.5, Math.PI / 2 - slashArc * 0.5);
    ctx.stroke();
    ctx.lineWidth = 1;
    // Combo flash
    if (player.comboCount >= 2) {
      ctx.fillStyle = 'rgba(255,200,100,' + (0.3 * (1 - slashProgress)) + ')';
      ctx.fillRect(scx - 14, scy - 14, 28, 28);
    }
    // Blade
    ctx.fillStyle = '#ccddff';
    var bladeX = px + (player.slashDir > 0 ? player.w + 2 : -14);
    ctx.fillRect(bladeX, py + 2 + slashProgress * 4, 12, 2);
  }

  // Combo indicator
  if (player.comboCount >= 2 && player.comboTimer > 0) {
    ctx.fillStyle = player.comboCount >= 3 ? '#ffdd44' : '#ff8844';
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('x' + player.comboCount, px + player.w / 2, py - 8);
  }
}

// Color utility helpers
function lightenColor(hex, amount) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function darkenColor(hex, amount) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, r - amount);
  g = Math.max(0, g - amount);
  b = Math.max(0, b - amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// === HUD — stat-integrated ===
function drawHUD() {
  ctx.fillStyle = 'rgba(5,5,15,0.85)';
  ctx.fillRect(0, 0, GW, HUD_H);

  // HP bar — CON scaled
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 4, 64, 6);
  var hpRatio = player.hp / player.maxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#44cc44' : hpRatio > 0.25 ? '#ccaa22' : '#cc2222';
  ctx.fillRect(4, 4, 64 * hpRatio, 6);
  // HP segments
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  for (var seg = 1; seg < 8; seg++) {
    ctx.fillRect(4 + seg * 8, 4, 1, 6);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 5, 16);

  // SP bar — WIS scaled
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 12, 64, 4);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(4, 12, 64 * (player.sp / player.maxSp), 4);

  // Sub-weapon name
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(SUB_NAMES[player.subWeapon] || '', 150, 12);

  // Score — INT scaled
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  ctx.fillText('SCORE:' + score, GW / 2 + 40, 10);

  // Stage/Screen
  ctx.fillStyle = '#88ccff';
  ctx.fillText('ACT ' + currentStage + '-' + (currentScreen + 1), GW / 2 + 40, 18);

  // Lives — CON scaled
  ctx.textAlign = 'right';
  ctx.fillStyle = statB.color || '#44dd88';
  for (var i = 0; i < lives; i++) {
    var lx = GW - 8 - i * 10;
    ctx.fillRect(lx, 6, 6, 8);
    ctx.fillStyle = '#cc3344';
    ctx.fillRect(lx, 4, 6, 2);
    ctx.fillStyle = statB.color || '#44dd88';
  }

  // Baseling icon + level indicator in corner
  if (statB.level > 0) {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(statB.icon + '' + statB.level, 72, 10);
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
