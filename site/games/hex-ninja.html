<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Hex Ninja</title>
<style>

html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === BASELING STAT INTEGRATION ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat scaling functions
function strDamage(base) { return Math.max(1, Math.floor(base * (1 + (statB.str - 10) * 0.08) * statB.damage)); }
function dexSpeed(base) { return base * (1 + (statB.dex - 10) * 0.05) * statB.speed; }
function dexWallJump(base) { return base * (1 + (statB.dex - 10) * 0.06); }
function conHP(base) { return Math.max(4, Math.floor(base * (1 + (statB.con - 10) * 0.1) * statB.hpMult)); }
function conLives(base) { return base + statB.lives + Math.floor(Math.max(0, statB.con - 14) * 0.5); }
function intScore(base) { return Math.floor(base * (1 + (statB.int - 10) * 0.06) * statB.scoreMult); }
function wisCooldown(base) { return Math.max(0.05, base * (1 / (1 + (statB.wis - 10) * 0.04)) * statB.cooldown); }
function chaDropRate(base) { return Math.min(1, base * (1 + (statB.cha - 10) * 0.05) * statB.luck); }
function chaItemQuality(rand) { return Math.min(1, rand + (statB.cha - 10) * 0.015 * statB.luck); }

// === CONSTANTS ===
const GW = 384, GH = 256;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'SLASH' } });

const GRAVITY = 680;
const BASE_PLAYER_SPEED = 120;
const BASE_JUMP_VEL = -240;
const WALL_SLIDE_SPEED = 40;
const BASE_WALL_JUMP_VX = 140;
const BASE_WALL_JUMP_VY = -220;
const TILE = 16;
const SCREEN_W = 384;
const SCREEN_H = 256;
const HUD_H = 20;

// DEX-scaled movement constants
var PLAYER_SPEED = dexSpeed(BASE_PLAYER_SPEED);
var JUMP_VEL = -Math.abs(dexWallJump(BASE_JUMP_VEL));
var WALL_JUMP_VX = dexWallJump(BASE_WALL_JUMP_VX);
var WALL_JUMP_VY = -Math.abs(dexWallJump(BASE_WALL_JUMP_VY));

// === SCORE POPUPS ===
var scorePopups = [];
function spawnScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 1.2, startY: y });
}
function updateScorePopups(dt) {
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].life -= dt;
    scorePopups[i].y -= 30 * dt;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  for (var i = 0; i < scorePopups.length; i++) {
    var sp = scorePopups[i];
    ctx.globalAlpha = Math.min(1, sp.life * 1.5);
    ctx.fillStyle = '#000';
    ctx.fillText(sp.text, sp.x + 1, sp.y + 1);
    ctx.fillStyle = sp.color;
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === GOO TRAPS ===
var gooTraps = [];
function spawnGooTraps(screenIdx, stage) {
  var traps = [];
  var seed = stage * 300 + screenIdx * 41;
  function sr(i) { return ((seed + i * 3137) % 7717) / 7717; }
  var count = stage >= 5 ? 3 : (stage >= 3 ? 2 : 1);
  for (var i = 0; i < count; i++) {
    traps.push({
      x: 40 + sr(i) * 280,
      y: 195, w: 20, h: 6,
      active: true,
      slowFactor: 0.4,
      dmgTimer: 0,
      bubbleTimer: 0,
      stage: stage
    });
  }
  return traps;
}

// === SOUND EFFECTS ===
const SFX = {
  slash()    { TAS.audio.playTone(800, 0.06, 'sawtooth', 0.08, 200); TAS.audio.playNoise(0.04, 0.06, 2000); },
  shuriken() { TAS.audio.playTone(1200, 0.08, 'sine', 0.06, 2400); },
  fireWheel(){ TAS.audio.playTone(300, 0.15, 'sawtooth', 0.07, 600); },
  windSlash(){ TAS.audio.playNoise(0.2, 0.08, 1500); TAS.audio.playTone(600, 0.15, 'sine', 0.05, 200); },
  wallCling(){ TAS.audio.playNoise(0.05, 0.04, 3000); },
  jump()     { TAS.audio.playTone(300, 0.08, 'square', 0.05, 500); },
  wallJump() { TAS.audio.playTone(400, 0.08, 'square', 0.06, 700); },
  hit()      { TAS.audio.playNoise(0.06, 0.1, 600); TAS.audio.playTone(150, 0.08, 'square', 0.07, 80); },
  enemyDie() { TAS.audio.playTone(200, 0.12, 'square', 0.08, 60); TAS.audio.playNoise(0.1, 0.06, 400); },
  pickup()   { TAS.audio.playTone(880, 0.06, 'square', 0.06); setTimeout(function(){ TAS.audio.playTone(1100, 0.06, 'square', 0.06); }, 60); },
  die()      { TAS.audio.playTone(400, 0.4, 'sawtooth', 0.1, 60); },
  bossEnter(){ TAS.audio.playTone(80, 0.5, 'sawtooth', 0.1, 40); TAS.audio.playNoise(0.3, 0.08, 200); },
  stageClear(){ [523, 659, 784, 1047].forEach(function(n, i){ setTimeout(function(){ TAS.audio.playTone(n, 0.12, 'square', 0.07); }, i * 100); }); },
  clone()    { TAS.audio.playTone(600, 0.1, 'triangle', 0.05, 1200); },
  gooSplat() { TAS.audio.playNoise(0.08, 0.08, 400); TAS.audio.playTone(120, 0.1, 'sine', 0.06, 60); },
  sporeExplode() { TAS.audio.playNoise(0.15, 0.1, 800); TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 100); },
  kunai()    { TAS.audio.playTone(1600, 0.05, 'sine', 0.05, 3200); TAS.audio.playNoise(0.02, 0.04, 4000); },
  bossRoar() { TAS.audio.playTone(60, 0.6, 'sawtooth', 0.12, 30); TAS.audio.playNoise(0.4, 0.1, 300); },
  parry()    { TAS.audio.playTone(1000, 0.04, 'square', 0.08); TAS.audio.playTone(1400, 0.04, 'square', 0.06); }
};

// === SUB-WEAPON TYPES (Tasern themed) ===
const SUB_WEAPONS = ['shuriken', 'fireWheel', 'windSlash', 'shadowClone'];
const SUB_COST = { shuriken: 3, fireWheel: 5, windSlash: 8, shadowClone: 12 };
const SUB_NAMES = { shuriken: 'SPORE STAR', fireWheel: 'REACTOR KUNAI', windSlash: 'MYCELIAL WAVE', shadowClone: 'SHADOW CLONE' };

// === TUTORIAL STATE ===
var tutorialShown = { move: false, jump: false, wall: false, slash: false, sub: false };
var tutorialQueue = [];
var tutorialTimer = 0;
var tutorialActive = null;

function showTutorial(key, text) {
  if (tutorialShown[key]) return;
  tutorialShown[key] = true;
  tutorialQueue.push({ text: text, life: 3.5 });
}
function updateTutorial(dt) {
  if (tutorialActive) {
    tutorialActive.life -= dt;
    if (tutorialActive.life <= 0) tutorialActive = null;
  } else if (tutorialQueue.length > 0) {
    tutorialActive = tutorialQueue.shift();
  }
}
function drawTutorial() {
  if (!tutorialActive) return;
  var alpha = Math.min(1, tutorialActive.life, (3.5 - (3.5 - tutorialActive.life)) > 3 ? 1 : tutorialActive.life);
  ctx.globalAlpha = Math.min(alpha, 0.9);
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(GW / 2 - 120, GH - 50, 240, 22);
  ctx.fillStyle = '#88ffcc';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(tutorialActive.text, GW / 2, GH - 35);
  ctx.globalAlpha = 1;
}

// === LEVEL DATA ===
// Each stage: array of screens. Each screen: 2D tile array (24 cols x 14 rows after HUD)
// 0=air, 1=solid, 2=platform(one-way), 3=hazard(lava/spike), 4=lantern, 5=goo trap marker

function generateStage(stageNum) {
  var screens = [];
  var numScreens = stageNum === 7 ? 5 : 4;
  for (var s = 0; s < numScreens; s++) {
    var tiles = [];
    var rows = 14, cols = 24;
    for (var r = 0; r < rows; r++) {
      tiles[r] = [];
      for (var c = 0; c < cols; c++) {
        if (r >= 13) { tiles[r][c] = 1; continue; }
        if (r === 0) { tiles[r][c] = 1; continue; }
        if (c === 0 && s === 0) { tiles[r][c] = 1; continue; }
        if (c === 23 && s === numScreens - 1 && stageNum < 7) { tiles[r][c] = 1; continue; }
        tiles[r][c] = 0;
      }
    }
    buildScreenTerrain(tiles, stageNum, s, numScreens, rows, cols);
    screens.push({ tiles: tiles, enemies: [], lanterns: [], boss: null, gooTraps: spawnGooTraps(s, stageNum) });
    spawnEnemiesForScreen(screens[s], stageNum, s, numScreens);
  }
  return screens;
}

function buildScreenTerrain(tiles, stage, screenIdx, numScreens, rows, cols) {
  var seed = stage * 100 + screenIdx * 17;
  function seededRand(i) { return ((seed * 1337 + i * 7919) % 9973) / 9973; }

  for (var c = 0; c < cols; c++) { tiles[rows - 1][c] = 1; }

  switch(stage) {
    case 1: // Mycelial Dojo — rooftops with spore lanterns
      for (var i = 0; i < 4; i++) {
        var px = Math.floor(3 + seededRand(i * 3) * 16);
        var py = Math.floor(4 + seededRand(i * 3 + 1) * 6);
        var pw = Math.floor(3 + seededRand(i * 3 + 2) * 4);
        for (var c2 = px; c2 < Math.min(px + pw, cols - 1); c2++) tiles[py][c2] = 2;
      }
      if (screenIdx > 0) {
        var bx = Math.floor(2 + seededRand(50) * 6);
        var bh = Math.floor(3 + seededRand(51) * 3);
        for (var r2 = rows - 1 - bh; r2 < rows - 1; r2++)
          for (var c3 = bx; c3 < bx + 4; c3++) if (c3 < cols) tiles[r2][c3] = 1;
      }
      if (screenIdx > 1) {
        var bx2 = Math.floor(14 + seededRand(52) * 6);
        var bh2 = Math.floor(2 + seededRand(53) * 4);
        for (var r3 = rows - 1 - bh2; r3 < rows - 1; r3++)
          for (var c4 = bx2; c4 < bx2 + 3; c4++) if (c4 < cols) tiles[r3][c4] = 1;
      }
      break;

    case 2: // Fungal Forest — spore-vine platforms
      for (var i2 = 0; i2 < 3; i2++) {
        var tx = Math.floor(4 + seededRand(i2 * 5) * 16);
        for (var r4 = 4; r4 < rows - 1; r4++) tiles[r4][tx] = 1;
        var br = Math.floor(4 + seededRand(i2 * 5 + 1) * 4);
        var dir = seededRand(i2 * 5 + 2) > 0.5 ? 1 : -1;
        for (var c5 = 0; c5 < 3; c5++) {
          var nc = tx + (c5 + 1) * dir;
          if (nc >= 0 && nc < cols) tiles[br][nc] = 2;
        }
      }
      for (var i3 = 0; i3 < 3; i3++) {
        var vx = Math.floor(1 + seededRand(i3 + 30) * 18);
        var vy = Math.floor(5 + seededRand(i3 + 31) * 5);
        for (var c6 = vx; c6 < Math.min(vx + 4, cols); c6++) tiles[vy][c6] = 2;
      }
      break;

    case 3: // Reactor Cliffs — vertical wall-jump sections
      if (screenIdx % 2 === 0) {
        for (var r5 = 2; r5 < rows - 2; r5++) { tiles[r5][3] = 1; tiles[r5][4] = 1; }
        for (var r6 = 2; r6 < rows - 2; r6++) { tiles[r6][19] = 1; tiles[r6][20] = 1; }
        tiles[6][3] = 0; tiles[6][4] = 0; tiles[7][3] = 0; tiles[7][4] = 0;
        tiles[10][19] = 0; tiles[10][20] = 0; tiles[11][19] = 0; tiles[11][20] = 0;
      } else {
        for (var i4 = 0; i4 < 5; i4++) {
          var px2 = Math.floor(3 + seededRand(i4 * 2) * 16);
          var py2 = 2 + i4 * 2;
          tiles[py2][px2] = 2; tiles[py2][px2 + 1] = 2; tiles[py2][px2 + 2] = 2;
        }
      }
      break;

    case 4: // Underground Spore Tunnels — lava + mycelial glow
      for (var i5 = 0; i5 < 2; i5++) {
        var lx = Math.floor(5 + seededRand(i5 * 7) * 12);
        var lw = Math.floor(2 + seededRand(i5 * 7 + 1) * 3);
        for (var c7 = lx; c7 < Math.min(lx + lw, cols); c7++) tiles[rows - 1][c7] = 3;
      }
      for (var c8 = 6; c8 < 18; c8++) {
        if (seededRand(c8) > 0.7) tiles[3][c8] = 1;
      }
      for (var i6 = 0; i6 < 3; i6++) {
        var px3 = Math.floor(4 + seededRand(i6 + 40) * 14);
        tiles[rows - 3][px3] = 2; tiles[rows - 3][px3 + 1] = 2;
      }
      break;

    case 5: // Reactor Tower — energy barriers, moving platforms
      for (var i7 = 0; i7 < 4; i7++) {
        var py3 = 3 + i7 * 3;
        var px4 = (i7 % 2 === 0) ? 2 : 12;
        for (var c9 = px4; c9 < px4 + 8; c9++) tiles[py3][c9] = 2;
      }
      if (screenIdx > 1) {
        for (var c10 = 8; c10 < 16; c10++) tiles[rows - 1][c10] = 3;
        tiles[rows - 3][8] = 2; tiles[rows - 3][9] = 2; tiles[rows - 3][10] = 2;
      }
      break;

    case 6: // Sky Spore Fortress — narrow floating platforms
      for (var c11 = 0; c11 < cols; c11++) {
        if (seededRand(c11 + 60) > 0.4) tiles[rows - 1][c11] = 3;
      }
      for (var i8 = 0; i8 < 6; i8++) {
        var px5 = Math.floor(seededRand(i8 * 4) * 18);
        var py4 = Math.floor(5 + seededRand(i8 * 4 + 1) * 6);
        var pw2 = Math.floor(2 + seededRand(i8 * 4 + 2) * 3);
        for (var c12 = px5; c12 < Math.min(px5 + pw2, cols); c12++) tiles[py4][c12] = 2;
      }
      for (var i9 = 0; i9 < 2; i9++) {
        var ix = Math.floor(2 + seededRand(i9 + 80) * 16);
        var iy = Math.floor(7 + seededRand(i9 + 81) * 4);
        for (var r7 = iy; r7 < iy + 2; r7++)
          for (var c13 = ix; c13 < ix + 3; c13++) if (c13 < cols && r7 < rows) tiles[r7][c13] = 1;
      }
      break;

    case 7: // Dark Spore Lair — organic corruption
      for (var r8 = 2; r8 < rows - 2; r8++) {
        if (seededRand(r8 * 3) > 0.7) tiles[r8][2] = 1;
        if (seededRand(r8 * 3 + 1) > 0.7) tiles[r8][21] = 1;
      }
      for (var i10 = 0; i10 < 4; i10++) {
        var px6 = Math.floor(3 + seededRand(i10 * 6) * 15);
        var py5 = Math.floor(4 + seededRand(i10 * 6 + 1) * 7);
        var pw3 = Math.floor(2 + seededRand(i10 * 6 + 2) * 3);
        for (var c14 = px6; c14 < Math.min(px6 + pw3, cols); c14++) tiles[py5][c14] = 2;
      }
      if (screenIdx >= 3) {
        for (var c15 = 6; c15 < 10; c15++) tiles[rows - 1][c15] = 3;
        for (var c16 = 14; c16 < 18; c16++) tiles[rows - 1][c16] = 3;
      }
      break;
  }

  // Lantern tiles
  for (var i11 = 0; i11 < 3; i11++) {
    var lc = Math.floor(3 + seededRand(i11 + 90) * 18);
    var lr = findAirAboveSolid(tiles, lc, rows, cols);
    if (lr > 1) tiles[lr - 2][lc] = 4;
  }
}

function findAirAboveSolid(tiles, col, rows, cols) {
  for (var r = rows - 2; r > 2; r--) {
    if ((tiles[r][col] === 1 || tiles[r][col] === 2) && tiles[r - 1][col] === 0) return r;
  }
  return rows - 2;
}

function spawnEnemiesForScreen(screen, stage, screenIdx, numScreens) {
  var seed = stage * 200 + screenIdx * 31;
  function sr(i) { return ((seed + i * 4919) % 7919) / 7919; }

  var isLastScreen = screenIdx === numScreens - 1;
  if (isLastScreen) {
    screen.boss = createBoss(stage);
    var count = 2;
    for (var i = 0; i < count; i++) {
      screen.enemies.push(createEnemy(stage, 60 + sr(i) * 260, 180));
    }
  } else {
    var count2 = 3 + Math.floor(sr(0) * 3) + Math.floor(stage * 0.5);
    for (var i2 = 0; i2 < count2; i2++) {
      var ex = 40 + sr(i2 + 1) * 280;
      screen.enemies.push(createEnemy(stage, ex, 0));
    }
  }

  // Lantern pickups — CHA-boosted drop count
  var lanternCount = 3 + Math.floor(Math.max(0, statB.cha - 14) * 0.3);
  for (var i3 = 0; i3 < lanternCount; i3++) {
    screen.lanterns.push({
      x: 30 + sr(i3 + 50) * 300,
      y: 60 + sr(i3 + 51) * 100,
      alive: true,
      content: pickLanternContent(sr(i3 + 52), stage)
    });
  }
}

function pickLanternContent(rand, stage) {
  var adjusted = chaItemQuality(rand);
  if (adjusted < 0.25) return { type: 'sp', amount: 5 + stage };
  if (adjusted < 0.45) return { type: 'hp', amount: 2 };
  if (adjusted < 0.52) return { type: '1up' };
  if (adjusted < 0.58) return { type: 'score', amount: intScore(200 + stage * 50) };
  return { type: 'subweapon', weapon: SUB_WEAPONS[Math.floor(adjusted * 4) % 4] };
}

// === ENEMY TYPES (Tasern themed) ===
function createEnemy(stage, x, y) {
  var pool;
  switch(stage) {
    case 1: pool = ['spore_runner', 'spore_runner', 'spore_runner', 'goo_jumper']; break;
    case 2: pool = ['spore_runner', 'mycelial_bird', 'mycelial_bird', 'goo_jumper']; break;
    case 3: pool = ['spore_runner', 'goo_jumper', 'goo_jumper', 'spore_thrower']; break;
    case 4: pool = ['spore_runner', 'spore_thrower', 'reactor_sniper', 'goo_jumper']; break;
    case 5: pool = ['reactor_sniper', 'spore_thrower', 'fungal_shield', 'spore_runner']; break;
    case 6: pool = ['mycelial_bird', 'mycelial_bird', 'spore_thrower', 'reactor_sniper']; break;
    case 7: pool = ['fungal_shield', 'reactor_sniper', 'spore_thrower', 'goo_jumper', 'mycelial_bird']; break;
    default: pool = ['spore_runner'];
  }
  var type = pool[Math.floor(Math.random() * pool.length)];
  var hp = type === 'fungal_shield' ? 4 : (type === 'reactor_sniper' ? 2 : 3);
  var isBird = type === 'mycelial_bird';
  return {
    type: type, x: x, y: y || 180, vx: 0, vy: 0,
    hp: hp + Math.floor(stage * 0.5), maxHp: hp + Math.floor(stage * 0.5),
    dir: Math.random() > 0.5 ? 1 : -1,
    timer: 0, attackTimer: 0, state: 'patrol',
    grounded: false, alive: true, flash: 0,
    w: isBird ? 14 : 12, h: isBird ? 10 : 14,
    sporeTimer: 0
  };
}

// === BOSS NINJA FIGHTS (Tasern themed) ===
function createBoss(stage) {
  var names = ['', 'SPORE SWORD MASTER', 'FUNGAL BEAST', 'REACTOR GOLEM', 'TUNNEL MYCELIUM', 'REACTOR CORE', 'SKY SPORE DRAGON', 'SPORE DEMON LORD'];
  var hp = 20 + stage * 10;
  return {
    name: names[stage] || 'BOSS',
    x: 280, y: 150, vx: 0, vy: 0,
    hp: hp, maxHp: hp,
    phase: 0, timer: 0, attackTimer: 0,
    state: 'idle', dir: -1,
    w: 28, h: 32, alive: true, flash: 0,
    stage: stage, pattern: 0,
    ninjaStyle: stage <= 3 ? 'melee' : (stage <= 5 ? 'ranged' : 'hybrid'),
    dashCooldown: 0, sporeBurstTimer: 0,
    teleportTimer: 0, lastTeleport: 0
  };
}

// === GAME STATE ===
var state = 'title';
var frame = 0;
var score = 0;
var highScore = TAS.score.load('hexninja_hi');
var lives = conLives(3);
var currentStage = 1;
var currentScreen = 0;
var stageData = null;
var player = {};
var projectiles = [];
var enemyProjectiles = [];
var pickups = [];
var cloneTrail = [];
var cloneActive = 0;
var iFrames = 0;
var deathTimer = 0;
var cinematicState = null;
var cinematicTimer = 0;
var scrollX = 0;
var targetScrollX = 0;
var bossDefeated = false;
var screenTransition = 0;
var movingPlatforms = [];
var titleAnim = 0;
var dustParticles = [];

// === CINEMATIC DATA (Tasern themed) ===
var CINEMATICS = [
  null,
  ['In the neon depths of Hex City...', 'A lone baseling ninja awakens.', 'The Spore Clan corrupts the mycelial network.'],
  ['The forest writhes with fungal corruption.', 'Spores drift on a poisoned wind.', 'Reactor energy pulses beneath the roots.'],
  ['Ancient reactor cliffs tower above.', 'Wind howls through vertical stone.', 'Only the nimble survive these heights.'],
  ['Below the surface, darkness reigns.', 'Mycelial tunnels glow with stolen energy.', 'Something stirs in the deep.'],

  ['The Dark Spore Lair.', 'Heart of the mycelial corruption.', 'This ends NOW.']
