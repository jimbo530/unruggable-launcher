// ============================================================
// DRAWING -- TERRAIN (biome-palette aware)
// ============================================================
function drawTile(x, y, type, palette) {
  const px = x * TILE_SIZE, py = y * TILE_SIZE;
  const pal = palette || getCurrentPalette();

  ctx.fillStyle = TERRAIN_COLORS[type] || '#000';
  ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

  switch (type) {
    case T.GRASS:
      ctx.fillStyle = pal.accent || '#4a9d4a';
      for (let i = 0; i < 3; i++) {
        const gx = px + 2 + ((x * 7 + y * 3 + i * 5) % 12);
        const gy = py + 3 + ((x * 3 + y * 7 + i * 3) % 10);
        ctx.fillRect(gx, gy, 1, 3);
      }
      break;
    case T.TREE:
      ctx.fillStyle = '#2a6d2a';
      ctx.fillRect(px + 6, py + 10, 4, 6);
      ctx.fillStyle = pal.tree || '#1a8d1a';
      ctx.beginPath();
      ctx.arc(px + 8, py + 6, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0a5d0a';
      ctx.beginPath();
      ctx.arc(px + 6, py + 7, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case T.MYCELIAL_TREE:
      // Purple/blue mushroom tree
      ctx.fillStyle = '#4a2a5a';
      ctx.fillRect(px + 6, py + 8, 4, 8);
      ctx.fillStyle = '#6a3a8a';
      ctx.beginPath();
      ctx.arc(px + 8, py + 5, 7, 0, Math.PI * 2);
      ctx.fill();
      // Bioluminescent dots
      ctx.fillStyle = '#aaffcc';
      ctx.fillRect(px + 4, py + 4, 1, 1);
      ctx.fillRect(px + 10, py + 3, 1, 1);
      ctx.fillRect(px + 7, py + 2, 1, 1);
      break;
    case T.WATER:
      ctx.fillStyle = '#3366bb';
      ctx.fillRect(px + 2, py + Math.floor((state.gameTime * 2 + x) % 4) * 3, 12, 2);
      break;
    case T.GOO:
      ctx.fillStyle = '#445533';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#556644';
      // Bubbling animation
      const bubbleOff = Math.floor((state.gameTime * 3 + x + y) % 6);
      ctx.beginPath();
      ctx.arc(px + 4 + bubbleOff, py + 8, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#667755';
      ctx.beginPath();
      ctx.arc(px + 10, py + 5 + Math.floor(Math.sin(state.gameTime * 2 + x) * 2), 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
    case T.MUSHROOM:
      // Walkable mushroom
      ctx.fillStyle = pal.bg || '#3a7d3a';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#885588';
      ctx.fillRect(px + 6, py + 10, 4, 6);
      ctx.fillStyle = '#aa66aa';
      ctx.beginPath();
      ctx.arc(px + 8, py + 8, 5, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ffccff';
      ctx.fillRect(px + 6, py + 5, 2, 2);
      ctx.fillRect(px + 9, py + 6, 1, 1);
      break;
    case T.REACTOR_FLOOR:
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      // Grid lines
      ctx.fillStyle = '#3a3a5a';
      ctx.fillRect(px, py, 1, TILE_SIZE);
      ctx.fillRect(px, py, TILE_SIZE, 1);
      // Pulsing glow
      if ((x + y) % 3 === 0) {
        const glow = 0.3 + Math.sin(state.gameTime * 2 + x * 3 + y * 7) * 0.2;
        ctx.globalAlpha = glow;
        ctx.fillStyle = '#4466aa';
        ctx.fillRect(px + 6, py + 6, 4, 4);
        ctx.globalAlpha = 1;
      }
      break;
    case T.REACTOR_WALL:
      ctx.fillStyle = '#3a3a5a';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(px, py + 14, 16, 2);
      ctx.fillRect(px + 14, py, 2, 16);
      // Energy lines
      ctx.fillStyle = '#5566aa';
      ctx.fillRect(px + 7, py + 2, 2, 12);
      break;
    case T.ROCK:
      ctx.fillStyle = '#888888';
      ctx.fillRect(px + 2, py + 3, 12, 10);
      ctx.fillStyle = '#999999';
      ctx.fillRect(px + 3, py + 3, 10, 3);
      ctx.fillStyle = '#666666';
      ctx.fillRect(px + 3, py + 10, 10, 2);
      break;
    case T.PATH:
      ctx.fillStyle = pal.path || '#c4a55a';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      ctx.fillStyle = '#b89545';
      ctx.fillRect(px + 1, py + 4, 2, 2);
      ctx.fillRect(px + 8, py + 9, 3, 2);
      break;
    case T.CAVE:
    case T.DUNGEON_ENTRY:
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 2, py + 2, 12, 12);
      ctx.fillStyle = '#444';
      ctx.fillRect(px + 2, py + 2, 12, 3);
      ctx.fillStyle = '#555';
      ctx.fillRect(px + 1, py + 1, 14, 2);
      break;
    case T.WALL:
      ctx.fillStyle = pal.wall || '#555577';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      ctx.fillStyle = '#3a3a55';
      ctx.fillRect(px, py + 14, 16, 2);
      ctx.fillRect(px + 14, py, 2, 16);
      break;
    case T.FLOOR:
      ctx.fillStyle = pal.floor || '#4a3a2a';
      if ((x + y) % 2 === 0) ctx.fillRect(px + 7, py + 7, 2, 2);
      break;
    case T.DOOR_LOCKED:
      ctx.fillStyle = '#7a444a';
      ctx.fillRect(px + 2, py + 2, 12, 12);
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(px + 6, py + 6, 4, 4);
      break;
    case T.DOOR_OPEN:
      ctx.fillStyle = '#221100';
      ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
      break;
    case T.BLOCK:
      ctx.fillStyle = '#7777aa';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      ctx.fillStyle = '#5555aa';
      ctx.fillRect(px + 3, py + 3, 10, 10);
      break;
    case T.BOMBWALL:
      ctx.fillStyle = pal.wall || '#555577';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      ctx.fillStyle = '#444466';
      ctx.fillRect(px + 5, py + 3, 1, 8);
      ctx.fillRect(px + 9, py + 5, 1, 6);
      break;
    case T.SECRET_WALL:
      ctx.fillStyle = '#444466';
      ctx.fillRect(px + 1, py + 1, 14, 14);
      // Subtle shimmer for high-WIS players
      if (statB.WIS >= 10) {
        const shimmer = 0.2 + Math.sin(state.gameTime * 3) * 0.15;
        ctx.globalAlpha = shimmer;
        ctx.fillStyle = '#8888ff';
        ctx.fillRect(px + 3, py + 3, 10, 10);
        ctx.globalAlpha = 1;
      }
      break;
    case T.SAND:
      ctx.fillStyle = '#c4a050';
      ctx.fillRect(px + 3, py + 6, 2, 1);
      ctx.fillRect(px + 10, py + 3, 2, 1);
      break;
    case T.BRIDGE:
      ctx.fillStyle = '#6b4020';
      ctx.fillRect(px, py + 2, TILE_SIZE, 2);
      ctx.fillRect(px, py + 12, TILE_SIZE, 2);
      break;
  }
}

function drawScreen() {
  const tiles = getCurrentTiles();
  if (!tiles) return;

  const room = getCurrentRoom();
  const isDark = room && room.dark && !state.items.lantern;
  const pal = getCurrentPalette();

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (isDark) {
        const ppx = state.player.x / TILE_SIZE;
        const ppy = state.player.y / TILE_SIZE;
        const dist = Math.sqrt((x - ppx) * (x - ppx) + (y - ppy) * (y - ppy));
        if (dist > 2.5) {
          ctx.fillStyle = '#000';
          ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
          continue;
        }
      }
      drawTile(x, y, tiles[y][x], pal);
    }
  }
}

// Type-B sprite-draw helper (no TAS engine). Draws the selected baseling at (x,y)
// center, size px; returns true if a real sprite drew, false to use the fallback.
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

// ============================================================
// DRAW PLAYER (improved sprite)
// ============================================================
function drawPlayer() {
  const p = state.player;
  if (p.iframes > 0 && Math.floor(p.iframes * 10) % 2 === 0) return;

  const px = Math.floor(p.x), py = Math.floor(p.y);
  // Walk animation
  const walkFrame = Math.floor(state.gameTime * 6) % 2;
  const isMoving = getInputDir() >= 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(px + 3, py + 14, 10, 3);

  // === BASELING SPRITE ===
  var _anim = (p.iframes > 0) ? 'hurt' : (isMoving ? 'walk' : 'idle');
  if (!drawSelectedBaseling(ctx, px + 8, py + 8, 16, { flipX: p.dir === DIR.LEFT, frame: Math.floor(state.gameTime * 60), anim: _anim })) {
    // Body (baseling tunic)
    ctx.fillStyle = '#38d973';
    ctx.fillRect(px + 3, py + 4, 10, 10);
    // Tunic highlight
    ctx.fillStyle = '#4ae88a';
    ctx.fillRect(px + 4, py + 5, 3, 4);

    // Head
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(px + 4, py + 1, 8, 6);

    // Hat (baseling cap)
    ctx.fillStyle = '#2ab85c';
    ctx.fillRect(px + 3, py, 10, 4);
    if (p.dir === DIR.LEFT) ctx.fillRect(px, py + 1, 4, 3);
    else if (p.dir === DIR.RIGHT) ctx.fillRect(px + 12, py + 1, 4, 3);
    else if (p.dir === DIR.UP) ctx.fillRect(px + 5, py - 2, 6, 3);
    // Hat gem
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(px + 7, py + 1, 2, 2);

    // Eyes
    ctx.fillStyle = '#000';
    if (p.dir === DIR.DOWN) { ctx.fillRect(px + 5, py + 4, 2, 2); ctx.fillRect(px + 9, py + 4, 2, 2); }
    else if (p.dir === DIR.LEFT) { ctx.fillRect(px + 4, py + 4, 2, 2); }
    else if (p.dir === DIR.RIGHT) { ctx.fillRect(px + 10, py + 4, 2, 2); }

    // Belt
    ctx.fillStyle = '#885522';
    ctx.fillRect(px + 3, py + 10, 10, 2);
    // Belt buckle
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(px + 7, py + 10, 2, 2);

    // Legs (animated)
    ctx.fillStyle = '#664422';
    if (isMoving && walkFrame === 0) {
      ctx.fillRect(px + 4, py + 12, 3, 5);
      ctx.fillRect(px + 9, py + 13, 3, 4);
    } else if (isMoving && walkFrame === 1) {
      ctx.fillRect(px + 4, py + 13, 3, 4);
      ctx.fillRect(px + 9, py + 12, 3, 5);
    } else {
      ctx.fillRect(px + 4, py + 12, 3, 4);
      ctx.fillRect(px + 9, py + 12, 3, 4);
    }
    // Boots
    ctx.fillStyle = '#553311';
    ctx.fillRect(px + 4, py + 15, 3, 1);
    ctx.fillRect(px + 9, py + 15, 3, 1);
  }

  // Sword attack
  if (p.attacking) {
    ctx.fillStyle = '#cccccc';
    const sLen = 12;
    switch (p.dir) {
      case DIR.UP: ctx.fillRect(px + 6, py - sLen, 3, sLen); break;
      case DIR.DOWN: ctx.fillRect(px + 6, py + 14, 3, sLen); break;
      case DIR.LEFT: ctx.fillRect(px - sLen, py + 6, sLen, 3); break;
      case DIR.RIGHT: ctx.fillRect(px + 14, py + 6, sLen, 3); break;
    }
    // Sword tip + gleam
    ctx.fillStyle = '#ffffff';
    switch (p.dir) {
      case DIR.UP: ctx.fillRect(px + 6, py - sLen, 3, 2); break;
      case DIR.DOWN: ctx.fillRect(px + 6, py + 14 + sLen - 2, 3, 2); break;
      case DIR.LEFT: ctx.fillRect(px - sLen, py + 6, 2, 3); break;
      case DIR.RIGHT: ctx.fillRect(px + 14 + sLen - 2, py + 6, 2, 3); break;
    }
    // Attack particles
    const tipX = px + 8 + DX[p.dir] * (TILE_SIZE + 4);
    const tipY = py + 8 + DY[p.dir] * (TILE_SIZE + 4);
    if (Math.random() < 0.5) {
      spawnParticles(tipX, tipY, '#fff', 1, 1, { life: 0.2, size: 1 });
    }
  }
}

// ============================================================
// DRAW ENEMIES (improved sprites)
// ============================================================
function drawEnemies() {
  for (const e of state.enemies) {
    if (!e.alive) continue;
    if (e.iframes > 0 && Math.floor(e.iframes * 10) % 2 === 0) continue;

    const ex = Math.floor(e.x), ey = Math.floor(e.y);
    ctx.fillStyle = e.stunTimer > 0 ? '#aaaaff' : e.color;

    switch (e.type) {
      case 'slime':
        // Bounce animation
        const bounce = Math.sin(state.gameTime * 4) * 2;
        ctx.beginPath();
        ctx.arc(ex + e.size / 2, ey + e.size / 2 + 2 + Math.floor(bounce), e.size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(ex + 3, ey + 4 + Math.floor(bounce), 2, 2);
        ctx.fillRect(ex + 7, ey + 4 + Math.floor(bounce), 2, 2);
        // Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(ex + 3, ey + 2 + Math.floor(bounce), 2, 2);
        break;
      case 'mycelialSlime':
        // Purple slime with spore dots
        ctx.beginPath();
        ctx.arc(ex + e.size / 2, ey + e.size / 2 + 2, e.size / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(ex + 4, ey + 5, 2, 2);
        ctx.fillRect(ex + 8, ey + 5, 2, 2);
        // Spore dots
        ctx.fillStyle = '#cc88ff';
        ctx.fillRect(ex + 3, ey + 2, 1, 1);
        ctx.fillRect(ex + 9, ey + 3, 1, 1);
        ctx.fillRect(ex + 6, ey + 1, 1, 1);
        break;
      case 'bat':
        // Wing flap
        const wingY = Math.floor(Math.sin(state.gameTime * 8) * 2);
        ctx.fillRect(ex, ey + 2 + wingY, 4, 6);
        ctx.fillRect(ex + 6, ey + 2 - wingY, 4, 6);
        ctx.fillStyle = '#6633aa';
        ctx.fillRect(ex + 3, ey + 3, 4, 5);
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(ex + 3, ey + 3, 2, 1);
        ctx.fillRect(ex + 5, ey + 3, 2, 1);
        break;
      case 'skeleton':
        ctx.fillRect(ex + 3, ey + 2, 8, 10);
        ctx.fillStyle = '#eeeedd';
        ctx.fillRect(ex + 4, ey, 6, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(ex + 5, ey + 2, 2, 2);
        ctx.fillRect(ex + 8, ey + 2, 2, 2);
        // Ribcage lines
        ctx.fillStyle = '#dddccc';
        ctx.fillRect(ex + 4, ey + 6, 6, 1);
        ctx.fillRect(ex + 4, ey + 8, 6, 1);
        ctx.fillStyle = '#aaa';
        ctx.fillRect(ex + DX[e.dir] * 8 + 6, ey + DY[e.dir] * 8 + 4, 3, 8);
        break;
      case 'mage':
        ctx.fillRect(ex + 2, ey + 3, 8, 9);
        ctx.fillStyle = '#4422aa';
        ctx.fillRect(ex + 3, ey, 6, 4);
        ctx.fillRect(ex + 5, ey - 2, 2, 3);
        // Spore gem on hat
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(ex + 5, ey - 1, 2, 2);
        ctx.fillStyle = '#ff88ff';
        ctx.fillRect(ex + 4, ey + 4, 2, 1);
        ctx.fillRect(ex + 7, ey + 4, 2, 1);
        break;
      case 'knight':
        ctx.fillRect(ex + 2, ey + 2, 10, 12);
        ctx.fillStyle = '#aaaacc';
        if (e.dir === DIR.DOWN) ctx.fillRect(ex + 2, ey + 6, 10, 6);
        else if (e.dir === DIR.UP) ctx.fillRect(ex + 2, ey + 2, 10, 6);
        else if (e.dir === DIR.LEFT) ctx.fillRect(ex, ey + 2, 5, 10);
        else ctx.fillRect(ex + 9, ey + 2, 5, 10);
        ctx.fillStyle = '#666688';
        ctx.fillRect(ex + 3, ey, 8, 5);
        // Plume
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(ex + 6, ey - 2, 2, 3);
        ctx.fillRect(ex + 4, ey + 2, 2, 2);
        break;
      case 'sporeKnight':
        // Green armored knight
        ctx.fillStyle = e.stunTimer > 0 ? '#aaaaff' : '#338855';
        ctx.fillRect(ex + 2, ey + 2, 10, 12);
        ctx.fillStyle = '#226644';
        ctx.fillRect(ex + 3, ey, 8, 5);
        // Spore aura
        ctx.fillStyle = '#44aa66';
        ctx.fillRect(ex + 1, ey + 4, 2, 2);
        ctx.fillRect(ex + 11, ey + 6, 2, 2);
        // Visor
        ctx.fillStyle = '#88ff88';
        ctx.fillRect(ex + 5, ey + 2, 4, 2);
        break;
      case 'reactorGolem':
        // Large boxy robot
        ctx.fillStyle = e.stunTimer > 0 ? '#aaaaff' : '#5555aa';
        ctx.fillRect(ex + 1, ey + 4, e.size - 2, e.size - 6);
        // Head
        ctx.fillStyle = '#6666bb';
        ctx.fillRect(ex + 4, ey, e.size - 8, 6);
        // Eyes (glowing)
        const eyeGlow = 0.6 + Math.sin(state.gameTime * 3) * 0.3;
        ctx.fillStyle = `rgba(136,170,255,${eyeGlow})`;
        ctx.fillRect(ex + 5, ey + 2, 3, 2);
        ctx.fillRect(ex + e.size - 8, ey + 2, 3, 2);
        // Core
        ctx.fillStyle = '#88aaff';
        ctx.fillRect(ex + e.size / 2 - 2, ey + e.size / 2 - 1, 4, 4);
        // Arms
        ctx.fillStyle = '#4444aa';
        ctx.fillRect(ex - 1, ey + 6, 3, 8);
        ctx.fillRect(ex + e.size - 2, ey + 6, 3, 8);
        break;
      default:
        // Boss generic
        ctx.fillRect(ex, ey, e.size, e.size);
        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(ex + Math.floor(e.size * 0.2), ey + Math.floor(e.size * 0.3), Math.floor(e.size * 0.15), Math.floor(e.size * 0.15));
        ctx.fillRect(ex + Math.floor(e.size * 0.6), ey + Math.floor(e.size * 0.3), Math.floor(e.size * 0.15), Math.floor(e.size * 0.15));
        // Mouth
        ctx.fillRect(ex + Math.floor(e.size * 0.3), ey + Math.floor(e.size * 0.6), Math.floor(e.size * 0.4), Math.floor(e.size * 0.1));
        // Boss aura particles
        if (e.isBoss && Math.random() < 0.1) {
          spawnParticles(ex + Math.floor(Math.random() * e.size), ey + Math.floor(Math.random() * e.size), e.color, 1, 0.5, { life: 0.5, size: 1, gravity: -0.3 });
        }
        // HP bar
        ctx.fillStyle = '#000';
        ctx.fillRect(ex, ey - 6, e.size, 4);
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(ex + 1, ey - 5, Math.floor((e.size - 2) * (e.hp / e.maxHp)), 2);
        break;
    }
  }
}

function drawProjectiles() {
  for (const proj of state.projectiles) {
    const ppx = Math.floor(proj.x), ppy = Math.floor(proj.y);
    switch (proj.type) {
      case 'boomerang':
        ctx.fillStyle = '#886644';
        ctx.save();
        ctx.translate(ppx, ppy);
        ctx.rotate(state.gameTime * 10);
        ctx.fillRect(-4, -1, 8, 2);
        ctx.fillRect(-1, -4, 2, 8);
        ctx.restore();
        break;
      case 'bomb':
        ctx.fillStyle = proj.life < 15 ? '#ff4400' : '#333';
        ctx.beginPath();
        ctx.arc(ppx + 6, ppy + 6, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(ppx + 5, ppy - 2, 2, 4);
        if (proj.life < 20) {
          ctx.fillStyle = '#ff8800';
          ctx.fillRect(ppx + 4, ppy - 4, 4, 3);
        }
        break;
      case 'arrow':
        ctx.fillStyle = '#886633';
        ctx.fillRect(ppx - 1, ppy - 1, 6, 2);
        ctx.fillStyle = '#ccc';
        ctx.fillRect(ppx + 4, ppy - 1, 3, 2);
        break;
      case 'magic':
        ctx.fillStyle = '#cc44ff';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'spore':
        ctx.fillStyle = '#88ff44';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#66cc22';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'water':
        ctx.fillStyle = '#44aaff';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 4, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'shadow':
        ctx.fillStyle = '#6622cc';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#440088';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 2, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'fire':
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(ppx, ppy, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'reactor_beam':
        ctx.fillStyle = '#88aaff';
        ctx.fillRect(ppx - 2, ppy - 2, 4, 4);
        ctx.fillStyle = '#aaccff';
        ctx.fillRect(ppx - 1, ppy - 1, 2, 2);
        break;
    }
  }
}

function drawDrops() {
  for (const drop of state.drops) {
    const dx = Math.floor(drop.x), dy = Math.floor(drop.y);
    switch (drop.type) {
      case 'coin':
        ctx.fillStyle = '#7a444a';
        ctx.fillRect(dx + 2, dy + 2, 6, 8);
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(dx + 4, dy + 4, 2, 4);
        break;
      case 'bigcoin':
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(dx + 1, dy + 1, 8, 10);
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(dx + 3, dy + 3, 4, 6);
        break;
      case 'heart':
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.arc(dx + 3, dy + 4, 3, 0, Math.PI * 2);
        ctx.arc(dx + 7, dy + 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(dx, dy + 5);
        ctx.lineTo(dx + 5, dy + 10);
        ctx.lineTo(dx + 10, dy + 5);
        ctx.fill();
        break;
      case 'potion':
        ctx.fillStyle = '#38d973';
        ctx.fillRect(dx + 3, dy + 1, 4, 3);
        ctx.fillStyle = '#a855f7';
        ctx.fillRect(dx + 2, dy + 4, 6, 6);
        ctx.fillStyle = '#38d973';
        ctx.fillRect(dx + 3, dy + 5, 2, 2);
        break;
      case 'key':
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(dx + 3, dy + 1, 4, 6);
        ctx.fillRect(dx + 2, dy + 1, 6, 3);
        ctx.fillRect(dx + 4, dy + 6, 2, 4);
        ctx.fillRect(dx + 3, dy + 8, 4, 2);
        break;
      case 'heartContainer':
        ctx.fillStyle = '#e6482e';
        ctx.beginPath();
        ctx.arc(dx + 4, dy + 4, 4, 0, Math.PI * 2);
        ctx.arc(dx + 10, dy + 4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(dx, dy + 6);
        ctx.lineTo(dx + 7, dy + 14);
        ctx.lineTo(dx + 14, dy + 6);
        ctx.fill();
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(dx + 5, dy + 5, 4, 4);
        break;
      case 'map':
        ctx.fillStyle = '#ddc088';
        ctx.fillRect(dx + 1, dy + 2, 8, 8);
        ctx.fillStyle = '#886644';
        ctx.fillRect(dx + 3, dy + 4, 4, 1);
        ctx.fillRect(dx + 2, dy + 6, 5, 1);
        break;
      case 'compass':
        ctx.fillStyle = '#3cacd7';
        ctx.beginPath();
        ctx.arc(dx + 5, dy + 5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff2222';
        ctx.fillRect(dx + 4, dy + 2, 2, 3);
        ctx.fillStyle = '#fff';
        ctx.fillRect(dx + 4, dy + 5, 2, 3);
        break;
      default:
        // Generic item glow
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.arc(dx + 5, dy + 5, 5 + Math.floor(Math.sin(state.gameTime * 4)), 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(dx + 3, dy + 3, 4, 4);
        break;
    }
  }
}

// ============================================================
// HUD (enhanced with stat bar)
// ============================================================
function drawHUD() {
  const p = state.player;
  const hudY = ROWS * TILE_SIZE;

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, hudY, SCREEN_W, HUD_H);

  // Hearts (CON-scaled starting HP)
  for (let i = 0; i < p.maxHp; i++) {
    const hx = 4 + i * 12;
    const hy = hudY + 4;
    ctx.fillStyle = i < p.hp ? '#e6482e' : '#442222';
    ctx.beginPath();
    ctx.arc(hx + 3, hy + 3, 2.5, 0, Math.PI * 2);
    ctx.arc(hx + 7, hy + 3, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx + 0.5, hy + 4);
    ctx.lineTo(hx + 5, hy + 9);
    ctx.lineTo(hx + 9.5, hy + 4);
    ctx.fill();
  }

  // Coins
  ctx.fillStyle = '#f4b41b';
  ctx.font = '8px monospace';
  ctx.fillText('POOP:' + p.coins, 4, hudY + 22);

  // Keys
  if (state.inDungeon >= 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('Keys:' + state.keys, 4, hudY + 34);
  }

  // Potions
  if (state.items.mycoPotion) {
    ctx.fillStyle = '#44ff88';
    ctx.fillText('Pot:' + state.potionCount, 60, hudY + 22);
  }

  // Items (8 slots now)
  const itemNames = ['S-rang', 'Seeds', 'T-Bow', 'Biolum', 'M-Shld', 'R-Shrd', 'S-Shld', 'Potion'];
  const itemColors = ['#7a444a', '#38d973', '#a855f7', '#f4b41b', '#3cacd7', '#6688ff', '#38d973', '#44ff88'];
  const itemFlags = [state.items.boomerang, state.items.bombs, state.items.bow, state.items.lantern, state.items.shield, state.items.reactorShard, state.items.sporeShield, state.items.mycoPotion];

  for (let i = 0; i < 8; i++) {
    const ix = 84 + i * 20;
    const iy = hudY + 4;

    ctx.fillStyle = i === state.selectedItem ? '#444466' : '#222233';
    ctx.fillRect(ix, iy, 18, 18);
    ctx.strokeStyle = i === state.selectedItem ? '#a855f7' : '#444';
    ctx.lineWidth = 1;
    ctx.strokeRect(ix, iy, 18, 18);

    if (itemFlags[i]) {
      ctx.fillStyle = itemColors[i];
      ctx.fillRect(ix + 3, iy + 3, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.font = '6px monospace';
      ctx.fillText((i + 1).toString(), ix + 1, iy + 8);
    }
  }

  // Bomb/arrow/potion count
  ctx.fillStyle = '#aaa';
  ctx.font = '6px monospace';
  if (state.items.bombs) ctx.fillText('x' + state.bombCount, 84 + 20 + 1, hudY + 26);
  if (state.items.bow) ctx.fillText('x' + state.arrowCount, 84 + 40 + 1, hudY + 26);
  if (state.items.mycoPotion) ctx.fillText('x' + state.potionCount, 84 + 140 + 1, hudY + 26);

  // Dungeon name + minimap
  if (state.inDungeon >= 0) {
    ctx.fillStyle = DUNGEON_COLORS[state.inDungeon] || '#aaa';
    ctx.font = '7px monospace';
    ctx.fillText(DUNGEON_NAMES[state.inDungeon], 4, hudY + 44);

    if (state.dungeonProgress[state.inDungeon].map) {
      const dun = dungeonMaps[state.inDungeon];
      const mmX = SCREEN_W - 50;
      const mmY = hudY + 4;
      const cellW = 8, cellH = 6;

      for (let ry = 0; ry < dun.layout.h; ry++) {
        for (let rx = 0; rx < dun.layout.w; rx++) {
          const cx = mmX + rx * cellW;
          const cy = mmY + ry * cellH;
          const prog = state.dungeonProgress[state.inDungeon];
          const rKey = rx + ',' + ry;

          ctx.fillStyle = prog.cleared[rKey] ? '#335533' : '#333';
          ctx.fillRect(cx, cy, cellW - 1, cellH - 1);

          if (rx === state.dungeonRoomX && ry === state.dungeonRoomY) {
            ctx.fillStyle = '#0f0';
            ctx.fillRect(cx + 1, cy + 1, cellW - 3, cellH - 3);
          }

          if (state.dungeonProgress[state.inDungeon].compass && rx === dun.layout.boss.x && ry === dun.layout.boss.y) {
            ctx.fillStyle = '#f00';
            ctx.fillRect(cx + 2, cy + 1, 3, 3);
          }
        }
      }
    }
  }

  // Overworld coordinates
  if (state.inDungeon < 0) {
    ctx.fillStyle = '#666';
    ctx.font = '6px monospace';
    ctx.fillText(state.screenX + ',' + state.screenY, SCREEN_W - 20, hudY + 44);
  }
}

// ============================================================
// AREA NAME OVERLAY
// ============================================================
function drawAreaName() {
  if (areaNameTimer <= 0) return;
  const alpha = Math.min(1, areaNameTimer, areaNameTimer > 2 ? 1 : areaNameTimer / 0.5);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, ROWS * TILE_SIZE / 2 - 12, SCREEN_W, 24);
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(currentAreaName, SCREEN_W / 2, ROWS * TILE_SIZE / 2 + 3);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

function drawTextBox() {
  if (!state.textBox) return;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(16, ROWS * TILE_SIZE - 40, SCREEN_W - 32, 36);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(16, ROWS * TILE_SIZE - 40, SCREEN_W - 32, 36);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';

  const words = state.textBox.msg.split(' ');
  let line = '', lineY = 0;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > SCREEN_W - 48) {
      ctx.fillText(line, 22, ROWS * TILE_SIZE - 28 + lineY);
      line = word + ' ';
      lineY += 10;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 22, ROWS * TILE_SIZE - 28 + lineY);
}

// ============================================================
// TOUCH CONTROLS OVERLAY
// ============================================================
function drawTouchControls() {
  if (!('ontouchstart' in window)) return;

  ctx.globalAlpha = 0.3;

  const dpadX = 30, dpadY = ROWS * TILE_SIZE - 70;
  ctx.fillStyle = '#fff';
  ctx.fillRect(dpadX + 10, dpadY, 12, 12);
  ctx.fillRect(dpadX + 10, dpadY + 24, 12, 12);
  ctx.fillRect(dpadX - 2, dpadY + 12, 12, 12);
  ctx.fillRect(dpadX + 22, dpadY + 12, 12, 12);

  ctx.beginPath();
  ctx.arc(SCREEN_W - 30, ROWS * TILE_SIZE - 60, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#f00';
  ctx.font = '6px monospace';
  ctx.fillText('ATK', SCREEN_W - 38, ROWS * TILE_SIZE - 58);

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(SCREEN_W - 30, ROWS * TILE_SIZE - 25, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#00f';
  ctx.font = '6px monospace';
  ctx.fillText('USE', SCREEN_W - 38, ROWS * TILE_SIZE - 23);

  ctx.globalAlpha = 1;
}

// ============================================================
// MAP SCREEN (M key toggle)
// ============================================================
function drawMapScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GARDEN WORLD MAP', SCREEN_W / 2, 14);

  const cellW = 28, cellH = 20;
  const mapX = Math.floor((SCREEN_W - OVERWORLD_W * cellW) / 2);
  const mapY = 24;

  for (let sy = 0; sy < OVERWORLD_H; sy++) {
    for (let sx = 0; sx < OVERWORLD_W; sx++) {
      const cx = mapX + sx * cellW;
      const cy = mapY + sy * cellH;
      const biome = getBiomeForScreen(sx, sy);
      const pal = BIOME_PALETTES[biome] || BIOME_PALETTES.grass;

      ctx.fillStyle = pal.bg;
      ctx.fillRect(cx + 1, cy + 1, cellW - 2, cellH - 2);

      // Current position
      if (sx === state.screenX && sy === state.screenY && state.inDungeon < 0) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.strokeRect(cx, cy, cellW, cellH);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(cx + cellW / 2 - 2, cy + cellH / 2 - 2, 4, 4);
      }

      // Dungeon markers
      const dungeonLocs = [{ sx: 2, sy: 2 }, { sx: 6, sy: 1 }, { sx: 1, sy: 5 }, { sx: 5, sy: 4 }, { sx: 4, sy: 0 }];
      for (let d = 0; d < dungeonLocs.length; d++) {
        if (dungeonLocs[d].sx === sx && dungeonLocs[d].sy === sy) {
          ctx.fillStyle = state.dungeonProgress[d].bossDefeated ? '#888' : '#ff4444';
          ctx.fillRect(cx + cellW / 2 - 3, cy + cellH / 2 - 3, 6, 6);
          ctx.fillStyle = '#fff';
          ctx.font = '5px monospace';
          ctx.textAlign = 'center';
          ctx.fillText((d + 1).toString(), cx + cellW / 2, cy + cellH / 2 + 2);
        }
      }
    }
  }

  // Legend
  ctx.fillStyle = '#888';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Press M to close', SCREEN_W / 2, SCREEN_H - 6);

  ctx.textAlign = 'left';
}

// ============================================================
// TITLE SCREEN (with stat bar)
// ============================================================
function drawTitle() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H); }
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H);

  // Starfield background
  for (let i = 0; i < 30; i++) {
    const sx = (i * 37 + Math.floor(state.gameTime * 5 + i * 13)) % SCREEN_W;
    const sy = (i * 23 + Math.floor(state.gameTime * 2 + i * 7)) % (SCREEN_H + HUD_H);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.2 + (i % 3) * 0.15) + ')';
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Title
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEGEND OF TASERN', SCREEN_W / 2, 40);

  // Subtitle
  ctx.fillStyle = '#38d973';
  ctx.font = '8px monospace';
  ctx.fillText('The Great Garden Quest', SCREEN_W / 2, 56);

  // Draw the selected baseling hero (idle bob) — falls back to the procedural figure.
  const hx = SCREEN_W / 2 - 8, hy = 68;
  if (!drawSelectedBaseling(ctx, hx + 8, hy + 7, 22, { anim: 'idle', frame: Math.floor(state.gameTime * 60) })) {
    ctx.fillStyle = '#38d973';
    ctx.fillRect(hx + 3, hy + 4, 10, 10);
    ctx.fillStyle = '#ffcc88';
    ctx.fillRect(hx + 4, hy + 1, 8, 6);
    ctx.fillStyle = '#2ab85c';
    ctx.fillRect(hx + 3, hy, 10, 4);
    ctx.fillStyle = '#a855f7';
    ctx.fillRect(hx + 7, hy + 1, 2, 2);
    // Sword
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(hx + 14, hy + 6, 12, 3);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(hx + 24, hy + 6, 2, 3);
  }

  // Spore Tri-Gem decoration
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.moveTo(SCREEN_W / 2, 102);
  ctx.lineTo(SCREEN_W / 2 - 10, 118);
  ctx.lineTo(SCREEN_W / 2 + 10, 118);
  ctx.fill();
  // Inner glow
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.moveTo(SCREEN_W / 2, 106);
  ctx.lineTo(SCREEN_W / 2 - 5, 115);
  ctx.lineTo(SCREEN_W / 2 + 5, 115);
  ctx.fill();

  // Selected baseling name + 5 arcade stat bars (Base-blue accent)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;

  if (_sel && _sel.stats && window.BaselingPlayer) {

    ctx.font = '7px monospace';
    for (var _si = 0; _si < _keys.length; _si++) {
      var _mm = _meta[_keys[_si]], _v = _sel.stats[_keys[_si]], _bx = _x0 + _si * 42;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 134);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 137, 34, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 137, 34 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('[C] SELECT BASELING', SCREEN_W / 2, 158);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('WASD/Arrows: Move', SCREEN_W / 2, 183);

  ctx.fillText('1-8: Select  M: Map  P: Potion', SCREEN_W / 2, 209);

  // Start prompt
  const blink = Math.sin(state.gameTime * 4) > 0;
  if (blink) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('PRESS ANY KEY TO START', SCREEN_W / 2, 240);

}

// ============================================================
// GAME OVER / WIN SCREENS
// ============================================================

    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H); }
  }

  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H);

  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('YOUR BASELING FELL!', SCREEN_W / 2, 100);

  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('Spore dungeons cleared: ' + state.bossesDefeated + '/5', SCREEN_W / 2, 130);
  ctx.fillText('POOP Tokens: ' + state.player.coins, SCREEN_W / 2, 145);
  ctx.fillText('Garden Secrets: ' + state.secretsFound, SCREEN_W / 2, 160);

  const blink = Math.sin(state.gameTime * 4) > 0;
  if (blink) {
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('PRESS ANY KEY TO CONTINUE', SCREEN_W / 2, 200);
  }

  ctx.textAlign = 'left';
}

function drawWin() {

  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H);

  ctx.fillStyle = '#f4b41b';

// ============================================================
// SAVE / LOAD
// ============================================================
function saveGame() {
  const save = {
    player: { ...state.player },
    screenX: state.screenX, screenY: state.screenY,
    inDungeon: state.inDungeon,
    dungeonRoomX: state.dungeonRoomX, dungeonRoomY: state.dungeonRoomY,
    items: { ...state.items },
    bombCount: state.bombCount, arrowCount: state.arrowCount,
    potionCount: state.potionCount,
    selectedItem: state.selectedItem, keys: state.keys,
    dungeonProgress: JSON.parse(JSON.stringify(state.dungeonProgress)),
    bossesDefeated: state.bossesDefeated,
    finalBossDefeated: state.finalBossDefeated,
    secretsFound: state.secretsFound
  };
  try {
    localStorage.setItem('legend_of_tasern_save', JSON.stringify(save));
  } catch (e) {
    console.error('Save failed:', e);
  }
}

function loadGame() {
  try {
    const data = localStorage.getItem('legend_of_tasern_save');
    if (!data) return false;
    const save = JSON.parse(data);
    state.player = { ...state.player, ...save.player };
    state.screenX = save.screenX;
    state.screenY = save.screenY;
    state.inDungeon = save.inDungeon;
    state.dungeonRoomX = save.dungeonRoomX;
    state.dungeonRoomY = save.dungeonRoomY;
    state.items = { ...state.items, ...save.items };
    state.bombCount = save.bombCount;
    state.arrowCount = save.arrowCount;
    state.potionCount = save.potionCount || 0;
    state.selectedItem = save.selectedItem;
    state.keys = save.keys;
    state.dungeonProgress = save.dungeonProgress;
    state.bossesDefeated = save.bossesDefeated;
    state.finalBossDefeated = save.finalBossDefeated;
    state.secretsFound = save.secretsFound || 0;
    return true;
  } catch (e) {
    console.error('Load failed:', e);
    return false;
  }
}

// ============================================================
// SPLASH SCREEN (MfT logo)
// ============================================================
let splashTimer = 2;
let splashDone = false;

function drawSplash() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H);

  // Fade in
  const alpha = Math.min(1, (2 - splashTimer) * 2);
  ctx.globalAlpha = alpha;

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MfT', SCREEN_W / 2, (SCREEN_H + HUD_H) / 2 - 10);
  ctx.fillStyle = '#a855f7';
  ctx.font = '8px monospace';
  ctx.fillText('Memes for Trees Studio', SCREEN_W / 2, (SCREEN_H + HUD_H) / 2 + 10);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

// ============================================================
// GAME INIT
// ============================================================
function initGame() {
  loadStatB();
  // Silent player-module init (no wallet popup). When the roster resolves, refresh stats.
  if (window.BaselingPlayer && BaselingPlayer.init) {
    BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[legend-of-tasern] player init failed:', e && e.message); });
  }
  generateOverworld();
  generateDungeons();

  if (loadGame()) {
    state.mode = 'play';
    spawnEnemiesForScreen();
  } else {
    state.mode = 'title';
  }
}

function resetGame() {
  // CON determines starting max HP
  const startHp = getConHearts();
  state.player = {
    x: 7 * TILE_SIZE, y: 5 * TILE_SIZE, dir: DIR.DOWN,
    hp: startHp, maxHp: startHp, iframes: 0,
    attacking: false, attackTimer: 0, coins: 0, itemCooldown: 0
  };
  state.screenX = 3; state.screenY = 6;
  state.inDungeon = -1;
  state.dungeonRoomX = 0; state.dungeonRoomY = 0;
  state.items = { boomerang: false, bombs: false, bow: false, lantern: false, shield: false,
                  reactorShard: false, sporeShield: false, mycoPotion: false };
  state.bombCount = 0; state.arrowCount = 0; state.potionCount = 0;
  state.selectedItem = -1; state.keys = 0;
  state.dungeonProgress = [
    { cleared: {}, keys: {}, map: false, compass: false, bossDefeated: false },
    { cleared: {}, keys: {}, map: false, compass: false, bossDefeated: false },
    { cleared: {}, keys: {}, map: false, compass: false, bossDefeated: false },
    { cleared: {}, keys: {}, map: false, compass: false, bossDefeated: false },
    { cleared: {}, keys: {}, map: false, compass: false, bossDefeated: false }
  ];
  state.enemies = []; state.projectiles = []; state.drops = [];
  state.bossesDefeated = 0; state.finalBossDefeated = false;
  state.secretsFound = 0;
  state.textBox = null;
  state.mapOpen = false;
  state.mode = 'play';
  spawnEnemiesForScreen();
  showAreaName('Verdant Garden Grounds');
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime = 0;
let saveTimer = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;
  state.gameTime += dt;

  // Screen shake update
  if (shakeTimer > 0) shakeTimer -= dt;
  const shake = getShakeOffset();

  // Clear
  ctx.save();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, SCREEN_W, SCREEN_H + HUD_H);

  // Apply shake
  if (shake.x !== 0 || shake.y !== 0) {
    ctx.translate(shake.x, shake.y);
  }

  // Splash
  if (!splashDone) {
    splashTimer -= dt;
    drawSplash();
    if (splashTimer <= 0) splashDone = true;
    ctx.restore();
    requestAnimationFrame(gameLoop);
    return;
  }

  switch (state.mode) {
    case 'title':
      drawTitle();
      if (picking) break; // character-select overlay open — ignore game input
      if (keys['c'] || keys['KeyC']) {
        keys['c'] = false; keys['KeyC'] = false;
        if (window.BaselingPlayer) {
          picking = true;
          BaselingPlayer.select(function () { recomputeStats(); picking = false; });
        }
        break;
      }
      for (const k in keys) {
        if (keys[k]) {
          keys[k] = false;
          resetGame();
          break;
        }
      }
      break;

    case 'play':
      if (state.mapOpen) {
        drawMapScreen();
        break;
      }

      // Update
      if (!state.transition.active) {
        updatePlayer(dt);
        updateEnemies(dt);
        updateProjectiles(dt);
        updateTextBox(dt);
      } else {
        state.transition.progress += dt * 3;
        if (state.transition.progress >= 1) {
          state.transition.active = false;
        }
      }
      updateParticles(dt);

      // Auto-save
      saveTimer += dt;
      if (saveTimer > 10) { saveTimer = 0; saveGame(); }

      // Draw
      if (state.transition.active) {
        const prog = state.transition.progress;
        const dir = state.transition.dir;

        if (state.transition.type === 'scroll') {
          // Scroll transition: slide old screen out, new screen in
          let offX = 0, offY = 0;
          if (dir === DIR.LEFT) offX = Math.floor(-SCREEN_W * (1 - prog));
          else if (dir === DIR.RIGHT) offX = Math.floor(SCREEN_W * (1 - prog));
          else if (dir === DIR.UP) offY = Math.floor(-SCREEN_H * (1 - prog));
          else if (dir === DIR.DOWN) offY = Math.floor(SCREEN_H * (1 - prog));

          ctx.save();
          ctx.translate(offX, offY);
          drawScreen();
          drawDrops();
          drawEnemies();
          drawPlayer();
          ctx.restore();
        } else {
          // Fade fallback
          ctx.globalAlpha = prog;
          drawScreen();
          drawPlayer();
          ctx.globalAlpha = 1;
        }
      } else {
        drawScreen();
        drawDrops();
        drawEnemies();
        drawPlayer();
        drawProjectiles();
        drawParticles();
        drawAreaName();
        drawTextBox();
        drawTouchControls();
      }
      drawHUD();
      break;

    case 'gameover':
      drawScreen();
      drawGameOver();
      for (const k in keys) {
        if (keys[k]) {
          keys[k] = false;
          state.player.hp = state.player.maxHp;
          state.player.x = 7 * TILE_SIZE;
          state.player.y = 5 * TILE_SIZE;
          if (state.inDungeon >= 0) exitDungeon();
          state.screenX = 3; state.screenY = 6;
          state.mode = 'play';
          state.enemies = [];
          state.projectiles = [];
          state.drops = [];
          spawnEnemiesForScreen();
          break;
        }
      }
      break;

    case 'win':
      drawWin();
      for (const k in keys) {
        if (keys[k]) {
          keys[k] = false;
          state.mode = 'title';
          localStorage.removeItem('legend_of_tasern_save');
          break;
        }
      }
      break;
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// START
// ============================================================
initGame();
requestAnimationFrame(gameLoop);

})();
</script>
