// ============================================================
// CONSTANTS
// ============================================================
const SCREEN_W = 256, SCREEN_H = 224;
const TILE_SIZE = 16;
const COLS = 16, ROWS = 11;
const HUD_H = 3 * TILE_SIZE;
const OVERWORLD_W = 8, OVERWORLD_H = 8;
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let SCALE, OFFSET_X, OFFSET_Y;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const sw = window.innerWidth;
  const sh = window.innerHeight - 20;
  SCALE = Math.min(sw / SCREEN_W, sh / (SCREEN_H + HUD_H));
  const rw = Math.floor(SCREEN_W * SCALE);
  const rh = Math.floor((SCREEN_H + HUD_H) * SCALE);
  OFFSET_X = Math.floor((sw - rw) / 2);
  OFFSET_Y = Math.floor((sh - rh) / 2);
  canvas.width = rw * dpr;
  canvas.height = rh * dpr;
  canvas.style.width = rw + 'px';
  canvas.style.height = rh + 'px';
  canvas.style.marginTop = Math.max(0, OFFSET_Y) + 'px';
  ctx.setTransform(dpr * SCALE, 0, 0, dpr * SCALE, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// STAT B LOADING
// ============================================================
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md).
// Type B (bespoke engine, no TAS): talks to BaselingPlayer directly. The stat helpers
// below read base-5 D&D fields (statB.STR..), so we synthesize those from the bounded
// multipliers (clamped single-player band 0.8–1.6). mult 1.0 -> 5 (neutral), 1.6 -> 20,
// 0.8 -> ~0 (clamped to 1). SPD->move/dodge, STA->hearts, PWR->sword/magic dmg,
// LCK->score+drops+hints+prices. SWM unused (no water). Every gameplay number traces
// back to a clamped getMults().
let statB = { STR: 5, DEX: 5, CON: 5, INT: 5, WIS: 5, CHA: 5 };
let statBLoaded = false;
let picking = false; // baseling character-select overlay is open

function loadStatB() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.max(1, Math.min(20, Math.round(5 + (x - 1) * 25))); }
  statB.STR = dnd(m.damage);    // PWR -> sword/magic damage
  statB.DEX = dnd(m.moveSpeed); // SPD -> move speed + dodge
  statB.CON = dnd(m.health);    // STA -> hearts/HP
  statB.INT = dnd(m.luck);      // LCK -> magic power + score (luck flavor)
  statB.WIS = dnd(m.luck);      // LCK -> cooldown + hints (luck flavor)
  statB.CHA = dnd(m.luck);      // LCK -> drops + shop prices
  statBLoaded = true;
}
function recomputeStats() { loadStatB(); }

// Stat helpers -- all gameplay wiring flows through these
function getStrBonus() { return 1 + (statB.STR - 5) * 0.15; } // sword damage multiplier
function getDexSpeedMul() { return 1 + (statB.DEX - 5) * 0.04; } // move speed multiplier
function getDodgeChance() { return Math.min(0.4, (statB.DEX - 5) * 0.03); } // 0-40%
function getConHearts() { return 3 + Math.floor((statB.CON - 5) / 3); } // starting max HP
function getIntPower() { return 1 + (statB.INT - 5) * 0.12; } // magic/projectile damage mul
function getIntScoreMul() { return 1 + (statB.INT - 5) * 0.05; } // coin score multiplier
function getWisCooldownMul() { return Math.max(0.3, 1 - (statB.WIS - 5) * 0.05); } // item cooldown
function getWisHintChance() { return Math.min(0.8, (statB.WIS - 5) * 0.06); } // puzzle hint %
function getChaPriceMul() { return Math.max(0.3, 1 - (statB.CHA - 5) * 0.04); } // shop price mul
function getChaDropBonus() { return 1 + (statB.CHA - 5) * 0.08; } // item drop chance mul

// ============================================================
// AUDIO ENGINE
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type, vol, slide) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  if (slide) osc.frequency.linearRampToValueAtTime(slide, audioCtx.currentTime + dur);
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playNoise(dur, vol) {
  if (!audioCtx) return;
  const bufSize = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(vol || 0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  src.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
  src.stop(audioCtx.currentTime + dur);
}

const SFX = {
  sword() { playTone(800, 0.06, 'square', 0.08, 400); playNoise(0.04, 0.06); },
  hit() { playTone(200, 0.1, 'sawtooth', 0.1, 80); playNoise(0.08, 0.08); },

  key() { playTone(660, 0.1, 'triangle', 0.1); setTimeout(() => playTone(880, 0.1, 'triangle', 0.1), 100); setTimeout(() => playTone(1100, 0.15, 'triangle', 0.1), 200); },
  door() { playNoise(0.3, 0.06); playTone(120, 0.3, 'triangle', 0.06, 80); },

  boss() { playTone(80, 0.6, 'sawtooth', 0.1, 40); playNoise(0.3, 0.1); },
  boomerang() { playTone(600, 0.15, 'triangle', 0.06, 1200); },
  arrow() { playTone(1200, 0.08, 'triangle', 0.06, 600); },
  secret() { playTone(440, 0.15, 'square', 0.06); setTimeout(() => playTone(554, 0.15, 'square', 0.06), 150); setTimeout(() => playTone(659, 0.15, 'square', 0.06), 300); setTimeout(() => playTone(880, 0.2, 'square', 0.08), 450); },
  coin() { playTone(988, 0.05, 'square', 0.06); setTimeout(() => playTone(1319, 0.1, 'square', 0.06), 50); },
  lowHealth() { playTone(440, 0.1, 'square', 0.04); },
  reactorHum() { playTone(100, 0.3, 'sawtooth', 0.04, 80); playTone(150, 0.2, 'triangle', 0.03); },
  sporeRelease() { playNoise(0.15, 0.06); playTone(400, 0.2, 'sine', 0.04, 200); },
  mycoHeal() { playTone(523, 0.15, 'sine', 0.06); setTimeout(() => playTone(784, 0.15, 'sine', 0.06), 100); setTimeout(() => playTone(1047, 0.2, 'sine', 0.06), 200); },
  screenShake() { playTone(50, 0.15, 'sawtooth', 0.08, 30); }
};

// ============================================================
// PARTICLES (enhanced)
// ============================================================
let particles = [];
function spawnParticles(x, y, color, count, speed, opts) {
  const o = opts || {};
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (speed || 2) * (0.5 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: o.life || 1, color,
      size: o.size || (1 + Math.random() * 2),
      gravity: o.gravity || 0,
      fade: o.fade !== undefined ? o.fade : 3
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += p.gravity * dt * 60;
    p.life -= dt * p.fade;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// SCREEN SHAKE
// ============================================================
let shakeTimer = 0, shakeIntensity = 0;
function triggerShake(intensity, duration) {
  shakeIntensity = intensity;
  shakeTimer = duration;
  SFX.screenShake();
}
function getShakeOffset() {
  if (shakeTimer <= 0) return { x: 0, y: 0 };
  return {
    x: Math.floor((Math.random() - 0.5) * shakeIntensity * 2),
    y: Math.floor((Math.random() - 0.5) * shakeIntensity * 2)
  };
}

// ============================================================
// SEEDED RANDOM (for deterministic world gen)
// ============================================================
let seed = 42;
function seededRandom() {
  seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF;
  return (seed >>> 0) / 4294967296;
}
function seedWith(s) { seed = s; }

// ============================================================
// TERRAIN TYPES
// ============================================================
const T = {
  GRASS: 0, TREE: 1, WATER: 2, ROCK: 3, CAVE: 4, PATH: 5,
  SAND: 6, BRIDGE: 7, WALL: 8, FLOOR: 9, DOOR_LOCKED: 10,
  DOOR_OPEN: 11, STAIRS: 12, BLOCK: 13, DARK: 14, BOMBWALL: 15,
  DUNGEON_ENTRY: 16,
  // New terrain
  GOO: 17, MUSHROOM: 18, REACTOR_FLOOR: 19, MYCELIAL_TREE: 20,
  REACTOR_WALL: 21, SECRET_WALL: 22
};

const TERRAIN_COLORS = {
  [T.GRASS]: '#3a7d3a', [T.TREE]: '#1a4d1a', [T.WATER]: '#2255aa',
  [T.ROCK]: '#777777', [T.CAVE]: '#333333', [T.PATH]: '#c4a55a',
  [T.SAND]: '#d4b56a', [T.BRIDGE]: '#8b5e3c', [T.WALL]: '#444466',
  [T.FLOOR]: '#554433', [T.DOOR_LOCKED]: '#886622', [T.DOOR_OPEN]: '#332211',
  [T.STAIRS]: '#222222', [T.BLOCK]: '#666688', [T.DARK]: '#000000',
  [T.BOMBWALL]: '#555577', [T.DUNGEON_ENTRY]: '#111111',
  [T.GOO]: '#445533', [T.MUSHROOM]: '#5a2a5a', [T.REACTOR_FLOOR]: '#2a2a3a',
  [T.MYCELIAL_TREE]: '#3a2a4a', [T.REACTOR_WALL]: '#3a3a5a',

};

const WALKABLE = new Set([T.GRASS, T.PATH, T.SAND, T.BRIDGE, T.FLOOR, T.DOOR_OPEN,
  T.STAIRS, T.CAVE, T.DUNGEON_ENTRY, T.GOO, T.REACTOR_FLOOR]);

// ============================================================

const BIOME_NAMES = {

let state = {

// ============================================================
// OVERWORLD GENERATION
// ============================================================
const overworldScreens = [];

function getBiomeForScreen(sx, sy) {
  if (sy <= 1 && sx >= 3 && sx <= 5) return 'mountain';
  if (sy >= 5 && sx >= 4) return 'lake';
  if (sx <= 1 && sy >= 3) return 'swamp';
  if (sy <= 2 && sx >= 5) return 'desert';
  if (sx >= 2 && sx <= 4 && sy >= 2 && sy <= 4) return 'mycelial';
  if (sx >= 5 && sy >= 3 && sy <= 5) return 'reactor';
  return 'grass';
}

function generateOverworld() {
  const dungeonLocs = [
    { sx: 2, sy: 2 }, { sx: 6, sy: 1 }, { sx: 1, sy: 5 },
    { sx: 5, sy: 4 }, { sx: 4, sy: 0 }
  ];

  // Secret areas (require high stats to access)
  const secretLocs = [
    { sx: 0, sy: 0, req: 'STR', minStat: 12, name: 'Garden Warrior Shrine' },
    { sx: 7, sy: 7, req: 'INT', minStat: 12, name: 'Spore Gem Vault' },
    { sx: 7, sy: 0, req: 'WIS', minStat: 14, name: 'Mycelium Oracle Chamber' }
  ];

  for (let sy = 0; sy < OVERWORLD_H; sy++) {
    for (let sx = 0; sx < OVERWORLD_W; sx++) {
      seedWith(sy * OVERWORLD_W + sx + 1000);
      const tiles = [];
      const biome = getBiomeForScreen(sx, sy);

      for (let y = 0; y < ROWS; y++) {
        tiles[y] = [];
        for (let x = 0; x < COLS; x++) {
          let t = T.GRASS;
          const r = seededRandom();
          const edgeDist = Math.min(x, y, COLS - 1 - x, ROWS - 1 - y);

          if (biome === 'mountain') {
            if (r < 0.25) t = T.ROCK;
            else if (r < 0.35) t = T.TREE;
            else if (edgeDist === 0 && r < 0.6) t = T.ROCK;
          } else if (biome === 'lake') {
            if (r < 0.2) t = T.WATER;
            else if (r < 0.3 && edgeDist <= 1) t = T.WATER;
            else if (r < 0.35) t = T.TREE;
          } else if (biome === 'swamp') {
            if (r < 0.15) t = T.GOO;
            else if (r < 0.25) t = T.WATER;
            else if (r < 0.4) t = T.TREE;
            else if (r < 0.45) t = T.MUSHROOM;
          } else if (biome === 'desert') {
            if (r < 0.1) t = T.ROCK;
            else if (r < 0.15) t = T.REACTOR_FLOOR;
            else t = T.SAND;
          } else if (biome === 'mycelial') {
            if (r < 0.2) t = T.MYCELIAL_TREE;
            else if (r < 0.3) t = T.MUSHROOM;
            else if (r < 0.35) t = T.GOO;
          } else if (biome === 'reactor') {
            if (r < 0.15) t = T.REACTOR_FLOOR;
            else if (r < 0.22) t = T.ROCK;
            else if (r < 0.28) t = T.REACTOR_WALL;
            else if (r < 0.32) t = T.SAND;
          } else {
            if (r < 0.15) t = T.TREE;
            else if (r < 0.18) t = T.ROCK;
          }

          // Paths between edges
          if (y >= 4 && y <= 6 && (x <= 1 || x >= COLS - 2)) t = T.PATH;
          if (x >= 6 && x <= 9 && (y <= 1 || y >= ROWS - 2)) t = T.PATH;
          if (x >= 6 && x <= 9 && y >= 4 && y <= 6) t = T.PATH;

          tiles[y][x] = t;
        }
      }

      // Dungeon entrances
      for (let d = 0; d < dungeonLocs.length; d++) {
        if (dungeonLocs[d].sx === sx && dungeonLocs[d].sy === sy) {
          tiles[3][8] = T.DUNGEON_ENTRY;
          tiles[3][7] = T.PATH;
          tiles[3][9] = T.PATH;
          tiles[4][8] = T.PATH;
          tiles[2][7] = T.ROCK;
          tiles[2][8] = T.ROCK;
          tiles[2][9] = T.ROCK;
          tiles[3][6] = T.ROCK;
          tiles[3][10] = T.ROCK;
        }
      }

      // Secret areas
      let secret = null;
      for (const s of secretLocs) {
        if (s.sx === sx && s.sy === sy) {
          secret = s;
          // Place a SECRET_WALL that can be opened with high stat
          tiles[5][8] = T.SECRET_WALL;
          tiles[5][7] = T.PATH;
          tiles[5][9] = T.PATH;
        }
      }

      overworldScreens.push({ tiles, biome, enemies: [], secret });
    }
  }

  // Start screen setup
  const startIdx = state.screenY * OVERWORLD_W + state.screenX;
  const startScreen = overworldScreens[startIdx];
  for (let y = 3; y <= 7; y++) {
    for (let x = 5; x <= 10; x++) {
      startScreen.tiles[y][x] = T.GRASS;
    }
  }
  startScreen.tiles[5][7] = T.PATH;
  startScreen.tiles[5][8] = T.PATH;
}

// ============================================================

const DUNGEON_NAMES = ['Mold Knight Grotto', 'Spore Moblin Mine', 'Toxic Keese Lake', 'Dungeon Fungi Keep', 'Fungal Ganon\'s Spire'];
const DUNGEON_COLORS = ['#38d973', '#f4b41b', '#3cacd7', '#a855f7', '#e6482e'];
const DUNGEON_PALETTES = [
  { wall: '#3d5b3d', floor: '#2a4a2a', accent: '#5a8a3a' },
  { wall: '#6b5514', floor: '#4a3a10', accent: '#aa8833' },
  { wall: '#224488', floor: '#1a3355', accent: '#44aadd' },
  { wall: '#2a1a3a', floor: '#1a0a2a', accent: '#6644aa' },
  { wall: '#4a1a1a', floor: '#3a0a0a', accent: '#cc3333' }
];
const dungeonMaps = [];

function generateDungeons() {
  const layouts = [
    { w: 4, h: 3, start: { x: 1, y: 2 }, boss: { x: 2, y: 0 }, rooms: 12, mapRoom: { x: 0, y: 1 }, compassRoom: { x: 3, y: 1 }, keyRooms: [{ x: 0, y: 2 }, { x: 3, y: 2 }, { x: 1, y: 0 }] },
    { w: 3, h: 4, start: { x: 1, y: 3 }, boss: { x: 1, y: 0 }, rooms: 12, mapRoom: { x: 0, y: 2 }, compassRoom: { x: 2, y: 1 }, keyRooms: [{ x: 0, y: 3 }, { x: 2, y: 3 }, { x: 0, y: 0 }] },
    { w: 5, h: 3, start: { x: 2, y: 2 }, boss: { x: 4, y: 0 }, rooms: 15, mapRoom: { x: 0, y: 0 }, compassRoom: { x: 1, y: 1 }, keyRooms: [{ x: 0, y: 2 }, { x: 4, y: 2 }, { x: 3, y: 1 }, { x: 1, y: 0 }] },
    { w: 4, h: 3, start: { x: 0, y: 2 }, boss: { x: 3, y: 0 }, rooms: 12, mapRoom: { x: 2, y: 2 }, compassRoom: { x: 1, y: 0 }, keyRooms: [{ x: 3, y: 2 }, { x: 0, y: 0 }, { x: 2, y: 1 }] },
    { w: 5, h: 3, start: { x: 2, y: 2 }, boss: { x: 2, y: 0 }, rooms: 15, mapRoom: { x: 4, y: 2 }, compassRoom: { x: 0, y: 1 }, keyRooms: [{ x: 0, y: 2 }, { x: 4, y: 1 }, { x: 1, y: 0 }, { x: 3, y: 0 }] }
  ];

  for (let d = 0; d < 5; d++) {
    const layout = layouts[d];
    const rooms = [];
    seedWith(d * 777 + 5000);

    for (let ry = 0; ry < layout.h; ry++) {
      for (let rx = 0; rx < layout.w; rx++) {
        const tiles = [];
        const isBoss = rx === layout.boss.x && ry === layout.boss.y;
        const isStart = rx === layout.start.x && ry === layout.start.y;
        const isKey = layout.keyRooms.some(k => k.x === rx && k.y === ry);
        const isMap = rx === layout.mapRoom.x && ry === layout.mapRoom.y;
        const isCompass = rx === layout.compassRoom.x && ry === layout.compassRoom.y;

        // Use dungeon-specific wall/floor type
        const wallType = (d === 4) ? T.REACTOR_WALL : T.WALL;
        const floorType = (d === 0) ? T.FLOOR : (d === 4) ? T.REACTOR_FLOOR : T.FLOOR;

        for (let y = 0; y < ROWS; y++) {
          tiles[y] = [];
          for (let x = 0; x < COLS; x++) {
            if (x === 0 || x === COLS - 1 || y === 0 || y === ROWS - 1) {
              tiles[y][x] = wallType;
            } else {
              tiles[y][x] = floorType;
            }
          }
        }

        // Doors
        if (ry > 0) { tiles[0][7] = T.DOOR_OPEN; tiles[0][8] = T.DOOR_OPEN; }
        if (ry < layout.h - 1) { tiles[ROWS - 1][7] = T.DOOR_OPEN; tiles[ROWS - 1][8] = T.DOOR_OPEN; }
        if (rx > 0) { tiles[5][0] = T.DOOR_OPEN; }
        if (rx < layout.w - 1) { tiles[5][COLS - 1] = T.DOOR_OPEN; }

        // Boss room locked
        if (isBoss) {
          if (ry > 0) { tiles[0][7] = wallType; tiles[0][8] = wallType; }
          if (ry < layout.h - 1) { tiles[ROWS - 1][7] = T.DOOR_LOCKED; tiles[ROWS - 1][8] = T.DOOR_LOCKED; }
          if (rx > 0) tiles[5][0] = T.DOOR_LOCKED;
          if (rx < layout.w - 1) tiles[5][COLS - 1] = T.DOOR_LOCKED;
        }

        // Blocks in non-special rooms
        if (!isBoss && !isStart) {
          const numBlocks = Math.floor(seededRandom() * 4) + 1;
          for (let b = 0; b < numBlocks; b++) {
            const bx = 3 + Math.floor(seededRandom() * 10);
            const by = 2 + Math.floor(seededRandom() * 7);
            if (tiles[by][bx] === floorType) tiles[by][bx] = T.BLOCK;
          }
        }

        // Mushroom decoration in fungal grotto
        if (d === 0 && !isBoss && !isStart) {
          const numMush = Math.floor(seededRandom() * 3);
          for (let m = 0; m < numMush; m++) {
            const mx = 2 + Math.floor(seededRandom() * 12);
            const my = 2 + Math.floor(seededRandom() * 7);
            if (tiles[my][mx] === floorType) tiles[my][mx] = T.MUSHROOM;
          }
        }

        // Dark rooms in dungeon 3
        let dark = false;
        if (d === 3 && !isStart && seededRandom() < 0.5) dark = true;

        // Bombable walls
        let bombWalls = [];
        if (!isBoss && !isStart && seededRandom() < 0.3) {
          const side = Math.floor(seededRandom() * 4);
          if (side === 0 && ry > 0) { tiles[0][7] = T.BOMBWALL; tiles[0][8] = T.BOMBWALL; bombWalls.push('top'); }
          else if (side === 2 && ry < layout.h - 1) { tiles[ROWS - 1][7] = T.BOMBWALL; tiles[ROWS - 1][8] = T.BOMBWALL; bombWalls.push('bottom'); }
          else if (side === 3 && rx > 0) { tiles[5][0] = T.BOMBWALL; bombWalls.push('left'); }
          else if (side === 1 && rx < layout.w - 1) { tiles[5][COLS - 1] = T.BOMBWALL; bombWalls.push('right'); }
        }

        rooms.push({
          x: rx, y: ry, tiles, isBoss, isStart, isKey, isMap, isCompass,
          dark, bombWalls, cleared: false, enemies: []
        });
      }
    }

    dungeonMaps.push({ layout, rooms, name: DUNGEON_NAMES[d], color: DUNGEON_COLORS[d], palette: DUNGEON_PALETTES[d] });
  }
}

// ============================================================
// GET CURRENT SCREEN / ROOM
// ============================================================
function getCurrentTiles() {
  if (state.inDungeon >= 0) {
    const dun = dungeonMaps[state.inDungeon];
    const room = dun.rooms.find(r => r.x === state.dungeonRoomX && r.y === state.dungeonRoomY);
    return room ? room.tiles : null;
  }
  const idx = state.screenY * OVERWORLD_W + state.screenX;
  return overworldScreens[idx] ? overworldScreens[idx].tiles : null;
}

function getCurrentRoom() {
  if (state.inDungeon >= 0) {
    const dun = dungeonMaps[state.inDungeon];
    return dun.rooms.find(r => r.x === state.dungeonRoomX && r.y === state.dungeonRoomY);
  }
  return null;
}

function getCurrentBiome() {
  if (state.inDungeon >= 0) return 'dungeon';
  const idx = state.screenY * OVERWORLD_W + state.screenX;
  return overworldScreens[idx] ? overworldScreens[idx].biome : 'grass';
}

function getCurrentPalette() {
  if (state.inDungeon >= 0) {
    return DUNGEON_PALETTES[state.inDungeon];
  }
  const biome = getCurrentBiome();
  return BIOME_PALETTES[biome] || BIOME_PALETTES.grass;
}

// ============================================================
// ENEMY FACTORY (expanded with Tasern enemies)
// ============================================================
function createEnemy(type, x, y) {
  const templates = {
    slime: { hp: 1, maxHp: 1, speed: 0.3, color: '#44dd66', size: 12, damage: 1, ai: 'wander', drops: 'coin' },
    bat: { hp: 1, maxHp: 1, speed: 1.2, color: '#8844aa', size: 10, damage: 1, ai: 'erratic', drops: 'coin' },
    skeleton: { hp: 2, maxHp: 2, speed: 0.5, color: '#ccccaa', size: 14, damage: 1, ai: 'chase', drops: 'coin' },
    mage: { hp: 2, maxHp: 2, speed: 0.3, color: '#6644cc', size: 12, damage: 1, ai: 'shoot', shootTimer: 0, drops: 'heart' },
    knight: { hp: 3, maxHp: 3, speed: 0.4, color: '#888899', size: 14, damage: 1, ai: 'shielded', shieldDir: DIR.DOWN, drops: 'bigcoin' },
    // Tasern enemies
    mycelialSlime: { hp: 2, maxHp: 2, speed: 0.25, color: '#7744aa', size: 14, damage: 1, ai: 'mycelial', drops: 'coin', splitCount: 2 },
    sporeKnight: { hp: 4, maxHp: 4, speed: 0.45, color: '#338855', size: 14, damage: 1, ai: 'spore_knight', shootTimer: 0, drops: 'bigcoin' },
    reactorGolem: { hp: 5, maxHp: 5, speed: 0.2, color: '#6666aa', size: 18, damage: 2, ai: 'reactor_golem', chargeTimer: 0, drops: 'heart' },
    // Bosses
    fungalKing: { hp: 8, maxHp: 8, speed: 0.4, color: '#228844', size: 24, damage: 1, ai: 'boss_fungal', isBoss: true, shootTimer: 0, phase: 0 },
    ironGolem: { hp: 10, maxHp: 10, speed: 0.3, color: '#996633', size: 28, damage: 2, ai: 'boss_iron', isBoss: true, chargeTimer: 0 },
    waterSerpent: { hp: 10, maxHp: 10, speed: 0.6, color: '#3388cc', size: 26, damage: 1, ai: 'boss_water', isBoss: true, shootTimer: 0 },
    shadowLord: { hp: 12, maxHp: 12, speed: 0.5, color: '#4422aa', size: 24, damage: 2, ai: 'boss_shadow', isBoss: true, teleportTimer: 0, shootTimer: 0 },
    darkSpire: { hp: 15, maxHp: 15, speed: 0.4, color: '#cc2222', size: 30, damage: 2, ai: 'boss_final', isBoss: true, phase: 0, shootTimer: 0 }
  };

  const t = templates[type];
  if (!t) return null;
  return Object.assign({ type, x, y, dir: DIR.DOWN, stunTimer: 0, moveTimer: 0, iframes: 0, alive: true }, t);
}

function spawnEnemiesForScreen() {
  state.enemies = [];

  if (state.inDungeon >= 0) {
    const room = getCurrentRoom();
    if (!room || room.isStart) return;

    const prog = state.dungeonProgress[state.inDungeon];
    const roomKey = room.x + ',' + room.y;
    if (prog.cleared[roomKey]) return;

    if (room.isBoss) {
      if (!prog.bossDefeated) {
        const bossTypes = ['fungalKing', 'ironGolem', 'waterSerpent', 'shadowLord', 'darkSpire'];
        state.enemies.push(createEnemy(bossTypes[state.inDungeon], 7 * TILE_SIZE, 4 * TILE_SIZE));
      }
      return;
    }

    // Regular dungeon enemies (expanded)
    seedWith(state.inDungeon * 100 + room.x * 10 + room.y + 9000);
    const count = 2 + Math.floor(seededRandom() * 3);
    const types = ['slime', 'bat', 'skeleton'];
    if (state.inDungeon >= 1) types.push('mycelialSlime');
    if (state.inDungeon >= 2) types.push('mage', 'sporeKnight');
    if (state.inDungeon >= 3) types.push('knight', 'reactorGolem');

    for (let i = 0; i < count; i++) {
      const t = types[Math.floor(seededRandom() * types.length)];
      const ex = (2 + Math.floor(seededRandom() * 12)) * TILE_SIZE;
      const ey = (2 + Math.floor(seededRandom() * 7)) * TILE_SIZE;
      state.enemies.push(createEnemy(t, ex, ey));
    }
  } else {
    // Overworld enemies (biome-specific)
    seedWith(state.screenY * OVERWORLD_W + state.screenX + 2000);
    const count = 2 + Math.floor(seededRandom() * 3);
    const biome = getCurrentBiome();
    let types = ['slime', 'bat'];
    if (biome === 'swamp' || biome === 'mycelial') types = ['mycelialSlime', 'bat', 'slime'];
    if (biome === 'reactor' || biome === 'desert') types = ['reactorGolem', 'skeleton', 'bat'];
    if (biome === 'mountain') types = ['skeleton', 'bat', 'sporeKnight'];
    if (state.screenY <= 3) types.push('skeleton');

    for (let i = 0; i < count; i++) {
      const t = types[Math.floor(seededRandom() * types.length)];
      const ex = (2 + Math.floor(seededRandom() * 12)) * TILE_SIZE;
      const ey = (2 + Math.floor(seededRandom() * 7)) * TILE_SIZE;
      const tiles = getCurrentTiles();
      const tx = Math.floor(ex / TILE_SIZE);
      const ty = Math.floor(ey / TILE_SIZE);
      if (tiles && tiles[ty] && WALKABLE.has(tiles[ty][tx])) {
        state.enemies.push(createEnemy(t, ex, ey));
      }
    }
  }
}

// ============================================================
// INPUT (NES-style)
// ============================================================
const keys = {};
let touchDir = -1;
let touchAttack = false;
let touchItem = false;

document.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.key.toLowerCase()] = true;
  keys[e.code] = true;
  // NES: 1-8 for item select
  if (e.key >= '1' && e.key <= '8') {
    const idx = parseInt(e.key) - 1;
    selectItem(idx);
  }
  // M key for map toggle
  if (e.key.toLowerCase() === 'm') {
    state.mapOpen = !state.mapOpen;
  }
  // P key for potion quick-use
  if (e.key.toLowerCase() === 'p' && state.items.mycoPotion && state.potionCount > 0) {
    useMycoPotion();
  }
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  keys[e.code] = false;
});

// Touch controls
let touchStartX = 0, touchStartY = 0;
const TOUCH_DEAD = 15;

canvas.addEventListener('touchstart', e => {
  ensureAudio();
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  const w = rect.width;
  const h = rect.height;

  if (x > w * 0.75) {
    if (y < h * 0.5) touchAttack = true;
    else touchItem = true;
    return;
  }

  touchStartX = t.clientX;
  touchStartY = t.clientY;
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > TOUCH_DEAD) {
    if (Math.abs(dx) > Math.abs(dy)) {
      touchDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    } else {
      touchDir = dy > 0 ? DIR.DOWN : DIR.UP;
    }
  } else {
    touchDir = -1;
  }
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchDir = -1;
  touchAttack = false;
  touchItem = false;
});

function getInputDir() {
  if (touchDir >= 0) return touchDir;
  if (keys['w'] || keys['arrowup']) return DIR.UP;
  if (keys['d'] || keys['arrowright']) return DIR.RIGHT;
  if (keys['s'] || keys['arrowdown']) return DIR.DOWN;
  if (keys['a'] || keys['arrowleft']) return DIR.LEFT;
  return -1;
}

function getAttack() {
  if (touchAttack) { touchAttack = false; return true; }
  if (keys[' '] || keys['x'] || keys['j']) { keys[' '] = false; keys['x'] = false; keys['j'] = false; return true; }
  return false;
}

function getUseItem() {
  if (touchItem) { touchItem = false; return true; }
  if (keys['z'] || keys['k']) { keys['z'] = false; keys['k'] = false; return true; }
  return false;
}

function selectItem(idx) {
  const itemNames = ['boomerang', 'bombs', 'bow', 'lantern', 'shield', 'reactorShard', 'sporeShield', 'mycoPotion'];
  if (idx < itemNames.length && state.items[itemNames[idx]]) {
    state.selectedItem = idx;
  }
}

// ============================================================
// COLLISION
// ============================================================
function isSolid(tx, ty) {
  const tiles = getCurrentTiles();
  if (!tiles) return true;
  if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return true;
  const t = tiles[ty][tx];
  // Secret walls open with high stat
  if (t === T.SECRET_WALL) {
    const idx = state.screenY * OVERWORLD_W + state.screenX;
    const scr = overworldScreens[idx];
    if (scr && scr.secret) {
      const req = scr.secret.req;
      if (statB[req] >= scr.secret.minStat) return false;
    }
    return true;
  }
  return !WALKABLE.has(t);
}

function canMove(x, y, w, h) {
  const x1 = Math.floor(x / TILE_SIZE);
  const y1 = Math.floor(y / TILE_SIZE);
  const x2 = Math.floor((x + w - 1) / TILE_SIZE);
  const y2 = Math.floor((y + h - 1) / TILE_SIZE);
  for (let ty = y1; ty <= y2; ty++) {
    for (let tx = x1; tx <= x2; tx++) {
      if (isSolid(tx, ty)) return false;
    }
  }
  return true;
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ============================================================
// SCREEN TRANSITIONS (enhanced with scroll effect)
// ============================================================
let transOldTiles = null;
let transOldDungeon = -1;
let transOldRoomX = 0, transOldRoomY = 0;
let transOldScreenX = 0, transOldScreenY = 0;

function startTransition(dir) {
  // Save old screen state for scroll
  transOldTiles = getCurrentTiles();
  transOldDungeon = state.inDungeon;
  transOldRoomX = state.dungeonRoomX;
  transOldRoomY = state.dungeonRoomY;
  transOldScreenX = state.screenX;
  transOldScreenY = state.screenY;

  state.transition.active = true;
  state.transition.dir = dir;
  state.transition.progress = 0;
  state.transition.type = 'scroll';

  if (state.inDungeon >= 0) {
    state.dungeonRoomX += DX[dir];
    state.dungeonRoomY += DY[dir];
  } else {
    const oldBiome = getCurrentBiome();
    state.screenX += DX[dir];
    state.screenY += DY[dir];
    const newBiome = getCurrentBiome();
    if (newBiome !== oldBiome) {
      showAreaName(BIOME_NAMES[newBiome] || newBiome);
    }
  }

  // Wrap player
  const p = state.player;
  if (dir === DIR.LEFT) p.x = (COLS - 2) * TILE_SIZE;
  else if (dir === DIR.RIGHT) p.x = TILE_SIZE;
  else if (dir === DIR.UP) p.y = (ROWS - 2) * TILE_SIZE;
  else if (dir === DIR.DOWN) p.y = TILE_SIZE;

  spawnEnemiesForScreen();
  state.drops = [];
  state.projectiles = [];
}

// ============================================================
// ITEM USE (expanded)
// ============================================================
let itemCooldownTimer = 0;

function useMycoPotion() {
  if (state.potionCount <= 0) return;
  state.potionCount--;
  const heal = Math.min(state.player.maxHp - state.player.hp, 3);
  state.player.hp += heal;
  SFX.mycoHeal();
  spawnParticles(state.player.x + 8, state.player.y + 8, '#44ff88', 8, 1.5, { life: 1.5, gravity: -0.5 });
  showText('Your baseling healed ' + heal + ' mycelium hearts!');
}

function useItem() {
  const p = state.player;
  const itemNames = ['boomerang', 'bombs', 'bow', 'lantern', 'shield', 'reactorShard', 'sporeShield', 'mycoPotion'];
  if (state.selectedItem < 0 || state.selectedItem >= itemNames.length) return;
  const name = itemNames[state.selectedItem];
  if (!state.items[name]) return;

  // WIS reduces cooldown
  if (itemCooldownTimer > 0) return;

  const dx = DX[p.dir], dy = DY[p.dir];

  switch (name) {
    case 'boomerang': {
      SFX.boomerang();
      state.projectiles.push({
        type: 'boomerang', x: p.x + 4, y: p.y + 4, dx: dx * 3, dy: dy * 3,
        life: 40, returning: false, owner: 'player', damage: 0, stun: true
      });
      itemCooldownTimer = 0.3 * getWisCooldownMul();
      break;
    }
    case 'bombs': {
      if (state.bombCount <= 0) return;
      state.bombCount--;
      state.projectiles.push({
        type: 'bomb', x: p.x + dx * TILE_SIZE, y: p.y + dy * TILE_SIZE,
        dx: 0, dy: 0, life: 60, owner: 'player', damage: Math.floor(2 * getIntPower())
      });
      itemCooldownTimer = 0.5 * getWisCooldownMul();
      break;
    }
    case 'bow': {
      if (state.arrowCount <= 0) return;
      state.arrowCount--;
      SFX.arrow();
      state.projectiles.push({
        type: 'arrow', x: p.x + 4, y: p.y + 4, dx: dx * 4, dy: dy * 4,
        life: 60, owner: 'player', damage: Math.max(1, Math.floor(getIntPower()))
      });
      itemCooldownTimer = 0.25 * getWisCooldownMul();
      break;
    }
    case 'lantern': break; // Passive
    case 'shield': break; // Passive
    case 'reactorShard': {
      // Energy beam -- STR-scaled short-range blast
      SFX.reactorHum();
      const beamDmg = Math.floor(2 * getStrBonus());
      state.projectiles.push({
        type: 'reactor_beam', x: p.x + 4, y: p.y + 4, dx: dx * 5, dy: dy * 5,
        life: 15, owner: 'player', damage: beamDmg, piercing: true
      });
      spawnParticles(p.x + 8 + dx * 12, p.y + 8 + dy * 12, '#88aaff', 6, 2);
      itemCooldownTimer = 0.6 * getWisCooldownMul();
      break;
    }
    case 'sporeShield': break; // Passive - blocks + reflects on hit
    case 'mycoPotion': {
      useMycoPotion();
      itemCooldownTimer = 1.0 * getWisCooldownMul();
      break;
    }
  }
}

// ============================================================
// PLAYER UPDATE (stat-wired)
// ============================================================
function updatePlayer(dt) {
  const p = state.player;

  // Item cooldown
  if (itemCooldownTimer > 0) itemCooldownTimer -= dt;

  // Invincibility frames
  if (p.iframes > 0) p.iframes -= dt;

  // Attack
  if (p.attacking) {
    p.attackTimer -= dt;
    if (p.attackTimer <= 0) p.attacking = false;
    return;
  }

  if (getAttack()) {
    p.attacking = true;
    p.attackTimer = 0.2;
    SFX.sword();

    // Sword hit -- STR scales damage
    const swordDmg = Math.max(1, Math.floor(getStrBonus()));
    const sx = p.x + DX[p.dir] * TILE_SIZE;
    const sy = p.y + DY[p.dir] * TILE_SIZE;

    for (const e of state.enemies) {
      if (!e.alive) continue;
      if (rectsOverlap(sx, sy, TILE_SIZE, TILE_SIZE, e.x, e.y, e.size, e.size)) {
        if (e.ai === 'shielded') {
          const facingEnemy = (p.dir + 2) % 4;
          if (e.dir === facingEnemy) {
            SFX.hit();
            continue;
          }
        }
        hitEnemy(e, swordDmg);
      }
    }
    return;
  }

  if (getUseItem()) {
    useItem();
  }

  // Movement -- DEX scales speed
  const dir = getInputDir();
  if (dir >= 0) {
    p.dir = dir;
    const speed = 1.5 * TILE_SIZE * dt * 60 * getDexSpeedMul();
    // Goo slows you down
    const ptx = Math.floor((p.x + 8) / TILE_SIZE);
    const pty = Math.floor((p.y + 8) / TILE_SIZE);
    const tiles = getCurrentTiles();
    let speedMul = 1;
    if (tiles && tiles[pty] && tiles[pty][ptx] === T.GOO) speedMul = 0.5;

    let nx = p.x + DX[dir] * speed * speedMul;
    let ny = p.y + DY[dir] * speed * speedMul;

    const pw = 12, ph = 12;
    const ox = 2, oy = 2;

    if (canMove(nx + ox, p.y + oy, pw, ph)) p.x = nx;
    else nx = p.x;
    if (canMove(p.x + ox, ny + oy, pw, ph)) p.y = ny;

    // Screen edge transitions
    if (p.x < -2) {
      if (state.inDungeon < 0 && state.screenX > 0) startTransition(DIR.LEFT);
      else if (state.inDungeon >= 0 && state.dungeonRoomX > 0) startTransition(DIR.LEFT);
      else p.x = -2;
    }
    if (p.x > (COLS - 1) * TILE_SIZE) {
      if (state.inDungeon < 0 && state.screenX < OVERWORLD_W - 1) startTransition(DIR.RIGHT);
      else if (state.inDungeon >= 0) {
        const dun = dungeonMaps[state.inDungeon];
        if (state.dungeonRoomX < dun.layout.w - 1) startTransition(DIR.RIGHT);
        else p.x = (COLS - 1) * TILE_SIZE;
      } else p.x = (COLS - 1) * TILE_SIZE;
    }
    if (p.y < -2) {
      if (state.inDungeon < 0 && state.screenY > 0) startTransition(DIR.UP);
      else if (state.inDungeon >= 0 && state.dungeonRoomY > 0) startTransition(DIR.UP);
      else p.y = -2;
    }
    if (p.y > (ROWS - 1) * TILE_SIZE) {
      if (state.inDungeon < 0 && state.screenY < OVERWORLD_H - 1) startTransition(DIR.DOWN);
      else if (state.inDungeon >= 0) {
        const dun = dungeonMaps[state.inDungeon];
        if (state.dungeonRoomY < dun.layout.h - 1) startTransition(DIR.DOWN);
        else p.y = (ROWS - 1) * TILE_SIZE;
      } else p.y = (ROWS - 1) * TILE_SIZE;
    }
  }

  // Check dungeon entry
  if (state.inDungeon < 0) {
    const tiles = getCurrentTiles();
    const tx = Math.floor((p.x + 8) / TILE_SIZE);
    const ty = Math.floor((p.y + 8) / TILE_SIZE);
    if (tiles && tiles[ty] && tiles[ty][tx] === T.DUNGEON_ENTRY) {
      enterDungeon();
    }
    // Check secret wall interaction -- WIS hint
    if (tiles && tiles[ty] && tiles[ty][tx] === T.SECRET_WALL) {
      const idx = state.screenY * OVERWORLD_W + state.screenX;
      const scr = overworldScreens[idx];
      if (scr && scr.secret) {
        const req = scr.secret.req;
        if (statB[req] >= scr.secret.minStat) {
          tiles[ty][tx] = T.FLOOR;
          SFX.secret();
          state.secretsFound++;
          showText('Your baseling\'s ' + req + ' reveals the ' + scr.secret.name + '!');
          // Drop reward
          state.drops.push({ type: 'heartContainer', x: 8 * TILE_SIZE, y: 5 * TILE_SIZE });
        } else if (Math.random() < getWisHintChance()) {
          showText('Your baseling senses spore energy... need ' + req + ' ' + scr.secret.minStat + ' to enter.');
        }
      }
    }
  }

  // Check locked doors
  if (state.inDungeon >= 0) {
    const tiles = getCurrentTiles();
    const tx = Math.floor((p.x + 8) / TILE_SIZE);
    const ty = Math.floor((p.y + 8) / TILE_SIZE);
    if (tiles && tiles[ty] && tiles[ty][tx] === T.DOOR_LOCKED) {
      if (state.keys > 0) {
        state.keys--;
        tiles[ty][tx] = T.DOOR_OPEN;
        SFX.door();
      } else {
        p.x -= DX[p.dir] * TILE_SIZE * 0.5;
        p.y -= DY[p.dir] * TILE_SIZE * 0.5;
      }
    }
  }

  // Pickup drops (CHA boosts drop rate, INT boosts coin value)
  for (let i = state.drops.length - 1; i >= 0; i--) {
    const drop = state.drops[i];
    if (rectsOverlap(p.x, p.y, 14, 14, drop.x, drop.y, 10, 10)) {
      switch (drop.type) {
        case 'coin': p.coins += Math.max(1, Math.floor(1 * getIntScoreMul())); SFX.coin(); break;
        case 'bigcoin': p.coins += Math.max(1, Math.floor(5 * getIntScoreMul())); SFX.coin(); break;
        case 'heart':
          if (p.hp < p.maxHp) { p.hp++; SFX.pickup(); }
          break;
        case 'key': state.keys++; SFX.key(); break;
        case 'bomb': state.bombCount += 3; SFX.pickup(); break;
        case 'arrow': state.arrowCount += 5; SFX.pickup(); break;
        case 'potion': state.potionCount += 1; SFX.pickup(); break;
        case 'heartContainer': p.maxHp++; p.hp = p.maxHp; SFX.item(); break;
        case 'map': state.dungeonProgress[state.inDungeon].map = true; SFX.item(); break;
        case 'compass': state.dungeonProgress[state.inDungeon].compass = true; SFX.item(); break;
        case 'boomerang': state.items.boomerang = true; state.selectedItem = 0; SFX.item(); showText('Your baseling found the Spore-rang! Stun mold creatures from afar.'); break;
        case 'bombs_item': state.items.bombs = true; state.bombCount = 8; state.selectedItem = 1; SFX.item(); showText('Your baseling found Garden Seeds! Plant explosive blooms.'); break;
        case 'bow_item': state.items.bow = true; state.arrowCount = 20; state.selectedItem = 2; SFX.item(); showText('Your baseling found the Thorn Bow! Shoot spore thorns at foes.'); break;
        case 'lantern_item': state.items.lantern = true; state.selectedItem = 3; SFX.item(); showText('Your baseling found the Biolume Lantern! Dark spore rooms are lit.'); break;
        case 'shield_item': state.items.shield = true; state.selectedItem = 4; SFX.item(); showText('Your baseling found the Mycelium Shield! Block fungal shots.'); break;
        case 'reactor_shard': state.items.reactorShard = true; state.selectedItem = 5; SFX.item(); showText('Your baseling found the Reactor Shard! Fire energy beams.'); break;
        case 'spore_shield': state.items.sporeShield = true; state.selectedItem = 6; SFX.item(); showText('Your baseling found the Spore Shield! Reflects toxic projectiles.'); break;
        case 'myco_potion': state.items.mycoPotion = true; state.potionCount = 3; state.selectedItem = 7; SFX.item(); showText('Your baseling found Myco Potions! Press P to heal your baseling hero.'); break;
      }
      state.drops.splice(i, 1);
    }
  }

  // Enemy collision damage (DEX dodge chance)
  for (const e of state.enemies) {
    if (!e.alive || e.stunTimer > 0) continue;
    if (p.iframes > 0) continue;
    if (rectsOverlap(p.x + 2, p.y + 2, 12, 12, e.x, e.y, e.size, e.size)) {
      if (Math.random() < getDodgeChance()) {
        spawnParticles(p.x + 8, p.y + 8, '#88ffff', 3, 1);
        showText('Baseling dodged!');
      } else {
        damagePlayer(e.damage);
      }
    }
  }
}

function damagePlayer(amount) {
  const p = state.player;
  if (p.iframes > 0) return;

  // Shield check
  if (state.items.shield && state.selectedItem === 4) return;
  // Spore shield partial block
  if (state.items.sporeShield && state.selectedItem === 6) {
    amount = Math.max(1, amount - 1);
    SFX.sporeRelease();
    // Emit spore cloud that damages nearby enemies
    for (const e of state.enemies) {
      if (!e.alive) continue;
      const dist = Math.sqrt((e.x - p.x) ** 2 + (e.y - p.y) ** 2);
      if (dist < 40) {
        hitEnemy(e, 1);
      }
    }
    spawnParticles(p.x + 8, p.y + 8, '#88ff44', 8, 2);
  }

  p.hp -= amount;
  p.iframes = 1.5;
  SFX.hurt();
  spawnParticles(p.x + 8, p.y + 8, '#ff4444', 5, 2);

  if (p.hp <= 0) {
    state.mode = 'gameover';
    SFX.die();
  }
}

function hitEnemy(e, damage) {
  e.hp -= damage;
  e.iframes = 0.3;
  SFX.hit();
  spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), '#fff', 4, 2);

  // Boss hit = screen shake
  if (e.isBoss) {
    triggerShake(3, 0.15);
  }

  if (e.hp <= 0) {
    e.alive = false;
    spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), e.color, 8, 3);

    // Mycelial slime splits
    if (e.type === 'mycelialSlime' && e.splitCount > 0) {
      for (let s = 0; s < 2; s++) {
        const baby = createEnemy('slime', e.x + (s === 0 ? -8 : 8), e.y);
        if (baby) {
          baby.hp = 1; baby.maxHp = 1;
          baby.color = '#9955cc';
          state.enemies.push(baby);
        }
      }
    }

    if (e.isBoss) {
      SFX.boss();
      triggerShake(6, 0.5);
      handleBossDefeat();
    } else {
      // CHA-boosted drops
      const dropRoll = Math.random() * getChaDropBonus();
      if (e.drops === 'coin') state.drops.push({ type: 'coin', x: Math.floor(e.x), y: Math.floor(e.y) });
      else if (e.drops === 'bigcoin') state.drops.push({ type: 'bigcoin', x: Math.floor(e.x), y: Math.floor(e.y) });
      else if (e.drops === 'heart') state.drops.push({ type: 'heart', x: Math.floor(e.x), y: Math.floor(e.y) });
      // Bonus drops from CHA
      if (dropRoll > 1.5) {
        state.drops.push({ type: Math.random() < 0.5 ? 'heart' : 'potion', x: Math.floor(e.x + 8), y: Math.floor(e.y) });
      }
    }

    // Room cleared check
    if (state.inDungeon >= 0 && state.enemies.every(en => !en.alive)) {
      const room = getCurrentRoom();
      if (room) {
        const prog = state.dungeonProgress[state.inDungeon];
        const roomKey = room.x + ',' + room.y;
        prog.cleared[roomKey] = true;

        if (room.isKey) state.drops.push({ type: 'key', x: 7 * TILE_SIZE, y: 5 * TILE_SIZE });
        if (room.isMap) state.drops.push({ type: 'map', x: 7 * TILE_SIZE, y: 5 * TILE_SIZE });
        if (room.isCompass) state.drops.push({ type: 'compass', x: 7 * TILE_SIZE, y: 5 * TILE_SIZE });
      }
    }
  }
}

function handleBossDefeat() {
  const d = state.inDungeon;
  state.dungeonProgress[d].bossDefeated = true;
  state.bossesDefeated++;

  state.drops.push({ type: 'heartContainer', x: 7 * TILE_SIZE, y: 5 * TILE_SIZE });

  // Dungeon items: original 5 + new Tasern items from bosses
  const itemDrops = ['boomerang', 'bombs_item', 'bow_item', 'lantern_item', 'shield_item'];
  state.drops.push({ type: itemDrops[d], x: 7 * TILE_SIZE, y: 3 * TILE_SIZE });

  // Boss 2+ also drops new Tasern items
  if (d === 1) state.drops.push({ type: 'reactor_shard', x: 6 * TILE_SIZE, y: 3 * TILE_SIZE });
  if (d === 2) state.drops.push({ type: 'spore_shield', x: 8 * TILE_SIZE, y: 3 * TILE_SIZE });
  if (d === 3) state.drops.push({ type: 'myco_potion', x: 7 * TILE_SIZE, y: 2 * TILE_SIZE });

  // Final boss
  if (d === 4) {
    state.finalBossDefeated = true;
    setTimeout(() => { state.mode = 'win'; }, 3000);
  }
}

// ============================================================
// ENTER/EXIT DUNGEON
// ============================================================
function enterDungeon() {
  const dungeonLocs = [
    { sx: 2, sy: 2 }, { sx: 6, sy: 1 }, { sx: 1, sy: 5 }, { sx: 5, sy: 4 }, { sx: 4, sy: 0 }
  ];

  let dIdx = -1;
  for (let i = 0; i < dungeonLocs.length; i++) {
    if (dungeonLocs[i].sx === state.screenX && dungeonLocs[i].sy === state.screenY) {
      dIdx = i;
      break;
    }
  }

  if (dIdx < 0) return;

  if (dIdx === 4 && state.bossesDefeated < 4) {
    showText('Fungal Ganon\'s Spire requires 4 spore dungeon triumphs to enter.');
    return;
  }

  state.inDungeon = dIdx;
  const layout = dungeonMaps[dIdx].layout;
  state.dungeonRoomX = layout.start.x;
  state.dungeonRoomY = layout.start.y;
  state.player.x = 7 * TILE_SIZE;
  state.player.y = 8 * TILE_SIZE;
  spawnEnemiesForScreen();
  state.drops = [];
  state.projectiles = [];
  SFX.door();
  showAreaName(DUNGEON_NAMES[dIdx]);
}

function exitDungeon() {
  state.inDungeon = -1;
  state.player.x = 8 * TILE_SIZE;
  state.player.y = 5 * TILE_SIZE;
  spawnEnemiesForScreen();
  state.drops = [];
  state.projectiles = [];
  showAreaName(BIOME_NAMES[getCurrentBiome()] || 'Overworld');
}

// ============================================================
// ENEMY AI (expanded with new enemies)
// ============================================================
function updateEnemies(dt) {
  const p = state.player;

  for (const e of state.enemies) {
    if (!e.alive) continue;
    if (e.iframes > 0) e.iframes -= dt;
    if (e.stunTimer > 0) { e.stunTimer -= dt; continue; }

    e.moveTimer += dt;

    switch (e.ai) {
      case 'wander': {
        if (e.moveTimer > 0.8) {
          e.moveTimer = 0;
          e.dir = Math.floor(Math.random() * 4);
        }
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }
        else e.dir = (e.dir + 1) % 4;
        break;
      }
      case 'erratic': {
        if (e.moveTimer > 0.3) {
          e.moveTimer = 0;
          e.dir = Math.floor(Math.random() * 4);
        }
        e.x += DX[e.dir] * e.speed * dt * 60;
        e.y += DY[e.dir] * e.speed * dt * 60;
        if (e.x < TILE_SIZE) { e.x = TILE_SIZE; e.dir = DIR.RIGHT; }
        if (e.x > (COLS - 2) * TILE_SIZE) { e.x = (COLS - 2) * TILE_SIZE; e.dir = DIR.LEFT; }
        if (e.y < TILE_SIZE) { e.y = TILE_SIZE; e.dir = DIR.DOWN; }
        if (e.y > (ROWS - 2) * TILE_SIZE) { e.y = (ROWS - 2) * TILE_SIZE; e.dir = DIR.UP; }
        break;
      }
      case 'chase': {
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }
        break;
      }
      case 'shoot': {
        e.shootTimer += dt;
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;

        if (e.shootTimer > 2) {
          e.shootTimer = 0;
          state.projectiles.push({
            type: 'magic', x: e.x + 4, y: e.y + 4,
            dx: DX[e.dir] * 2, dy: DY[e.dir] * 2,
            life: 60, owner: 'enemy', damage: 1
          });
        }
        if (e.moveTimer > 1.5) {
          e.moveTimer = 0;
          e.dir = Math.floor(Math.random() * 4);
        }
        const mnx = e.x + DX[e.dir] * e.speed * dt * 60 * 0.5;
        const mny = e.y + DY[e.dir] * e.speed * dt * 60 * 0.5;
        if (canMove(mnx, mny, e.size, e.size)) { e.x = mnx; e.y = mny; }
        break;
      }
      case 'shielded': {
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }
        break;
      }
      // NEW: Mycelial Slime -- wander + leave goo trail
      case 'mycelial': {
        if (e.moveTimer > 1.0) {
          e.moveTimer = 0;
          e.dir = Math.floor(Math.random() * 4);
        }
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }
        else e.dir = (e.dir + 1) % 4;
        // Trail particles
        if (Math.random() < 0.15) {
          spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size), '#7744aa', 1, 0.3, { life: 2, gravity: 0.1 });
        }
        break;
      }
      // NEW: Spore Knight -- chase + periodic spore burst
      case 'spore_knight': {
        e.shootTimer += dt;
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }

        if (e.shootTimer > 2.5) {
          e.shootTimer = 0;
          SFX.sporeRelease();
          for (let d = 0; d < 4; d++) {
            state.projectiles.push({
              type: 'spore', x: e.x + e.size / 2, y: e.y + e.size / 2,
              dx: DX[d] * 1.5, dy: DY[d] * 1.5, life: 30, owner: 'enemy', damage: 1
            });
          }
        }
        break;
      }
      // NEW: Reactor Golem -- slow, charges when close, shockwave
      case 'reactor_golem': {
        e.chargeTimer += dt;
        const dx = p.x - e.x, dy = p.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 60 && e.chargeTimer > 3) {
          e.chargeTimer = 0;
          // Shockwave burst
          SFX.reactorHum();
          triggerShake(2, 0.2);
          for (let a = 0; a < 8; a++) {
            const angle = (a / 8) * Math.PI * 2;
            state.projectiles.push({
              type: 'reactor_beam', x: e.x + e.size / 2, y: e.y + e.size / 2,
              dx: Math.cos(angle) * 1.5, dy: Math.sin(angle) * 1.5,
              life: 20, owner: 'enemy', damage: 1
            });
          }
          spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), '#6688ff', 10, 3);
        }

        // Slow chase
        if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        const nx = e.x + DX[e.dir] * e.speed * dt * 60;
        const ny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (canMove(nx, ny, e.size, e.size)) { e.x = nx; e.y = ny; }
        break;
      }
      // Boss AIs (enhanced)
      case 'boss_fungal': {
        e.shootTimer += dt;
        if (e.moveTimer > 1.2) {
          e.moveTimer = 0;
          e.dir = Math.floor(Math.random() * 4);
        }
        const bnx = e.x + DX[e.dir] * e.speed * dt * 60;
        const bny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (bnx > TILE_SIZE && bnx < (COLS - 3) * TILE_SIZE) e.x = bnx;
        if (bny > TILE_SIZE && bny < (ROWS - 3) * TILE_SIZE) e.y = bny;

        // Phase 2 at half health: faster, more spores
        const interval = e.hp <= e.maxHp / 2 ? 0.8 : 1.5;
        if (e.shootTimer > interval) {
          e.shootTimer = 0;
          const dirs = e.hp <= e.maxHp / 2 ? 8 : 4;
          for (let d = 0; d < dirs; d++) {
            const angle = (d / dirs) * Math.PI * 2;
            state.projectiles.push({
              type: 'spore', x: e.x + e.size / 2, y: e.y + e.size / 2,
              dx: Math.cos(angle) * 1.5, dy: Math.sin(angle) * 1.5,
              life: 40, owner: 'enemy', damage: 1
            });
          }
          spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), '#88ff44', 4, 1);
        }
        break;
      }
      case 'boss_iron': {
        e.chargeTimer += dt;
        if (e.chargeTimer > 3) {
          e.chargeTimer = 0;
          const dx = p.x - e.x, dy = p.y - e.y;
          if (Math.abs(dx) > Math.abs(dy)) e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
          else e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
          e.speed = 2;
          triggerShake(2, 0.1);
        }
        if (e.speed > 0.3) {
          e.x += DX[e.dir] * e.speed * dt * 60;
          e.y += DY[e.dir] * e.speed * dt * 60;
          e.speed -= dt * 2;
          if (e.speed < 0.3) e.speed = 0.3;
          if (e.x < TILE_SIZE || e.x > (COLS - 3) * TILE_SIZE) { e.x = Math.max(TILE_SIZE, Math.min((COLS - 3) * TILE_SIZE, e.x)); e.speed = 0.3; triggerShake(4, 0.2); }
          if (e.y < TILE_SIZE || e.y > (ROWS - 3) * TILE_SIZE) { e.y = Math.max(TILE_SIZE, Math.min((ROWS - 3) * TILE_SIZE, e.y)); e.speed = 0.3; triggerShake(4, 0.2); }
        } else {
          if (e.moveTimer > 1) { e.moveTimer = 0; e.dir = Math.floor(Math.random() * 4); }
          e.x += DX[e.dir] * e.speed * dt * 60;
          e.y += DY[e.dir] * e.speed * dt * 60;
        }
        break;
      }
      case 'boss_water': {
        e.shootTimer += dt;
        e.moveTimer += dt;
        const cx = COLS * TILE_SIZE / 2, cy = ROWS * TILE_SIZE / 2;
        const angle = e.moveTimer * 0.8;
        e.x = cx + Math.cos(angle) * 60 - e.size / 2;
        e.y = cy + Math.sin(angle) * 40 - e.size / 2;

        const interval = e.hp <= e.maxHp / 2 ? 0.6 : 1;
        if (e.shootTimer > interval) {
          e.shootTimer = 0;
          const ddx = p.x - e.x, ddy = p.y - e.y;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
          state.projectiles.push({
            type: 'water', x: e.x + e.size / 2, y: e.y + e.size / 2,
            dx: (ddx / dist) * 2.5, dy: (ddy / dist) * 2.5,
            life: 50, owner: 'enemy', damage: 1
          });
          // Phase 2: spread shot
          if (e.hp <= e.maxHp / 2) {
            const a = Math.atan2(ddy, ddx);
            state.projectiles.push({ type: 'water', x: e.x + e.size / 2, y: e.y + e.size / 2, dx: Math.cos(a + 0.3) * 2.5, dy: Math.sin(a + 0.3) * 2.5, life: 50, owner: 'enemy', damage: 1 });
            state.projectiles.push({ type: 'water', x: e.x + e.size / 2, y: e.y + e.size / 2, dx: Math.cos(a - 0.3) * 2.5, dy: Math.sin(a - 0.3) * 2.5, life: 50, owner: 'enemy', damage: 1 });
          }
        }
        break;
      }
      case 'boss_shadow': {
        e.teleportTimer += dt;
        e.shootTimer += dt;

        if (e.teleportTimer > 3) {
          e.teleportTimer = 0;
          e.x = (2 + Math.random() * 10) * TILE_SIZE;
          e.y = (2 + Math.random() * 6) * TILE_SIZE;
          spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), '#8844ff', 6, 2);
        }

        if (e.shootTimer > 1.2) {
          e.shootTimer = 0;
          const ddx = p.x - e.x, ddy = p.y - e.y;
          const dist = Math.sqrt(ddx * ddx + ddy * ddy) || 1;
          state.projectiles.push({
            type: 'shadow', x: e.x + e.size / 2, y: e.y + e.size / 2,
            dx: (ddx / dist) * 2, dy: (ddy / dist) * 2,
            life: 60, owner: 'enemy', damage: 2
          });
          // Phase 2: shadow clones
          if (e.hp <= e.maxHp / 2 && Math.random() < 0.3) {
            spawnParticles(Math.floor(e.x + e.size / 2), Math.floor(e.y + e.size / 2), '#4422aa', 10, 3);
          }
        }
        break;
      }
      case 'boss_final': {
        e.shootTimer += dt;
        e.moveTimer += dt;

        const fdx = p.x - e.x, fdy = p.y - e.y;
        if (Math.abs(fdx) > Math.abs(fdy)) e.dir = fdx > 0 ? DIR.RIGHT : DIR.LEFT;
        else e.dir = fdy > 0 ? DIR.DOWN : DIR.UP;

        const fnx = e.x + DX[e.dir] * e.speed * dt * 60;
        const fny = e.y + DY[e.dir] * e.speed * dt * 60;
        if (fnx > TILE_SIZE && fnx < (COLS - 3) * TILE_SIZE) e.x = fnx;
        if (fny > TILE_SIZE && fny < (ROWS - 3) * TILE_SIZE) e.y = fny;

        const attackInterval = e.hp <= e.maxHp / 3 ? 0.6 : 1;
        if (e.shootTimer > attackInterval) {
          e.shootTimer = 0;
          e.phase = (e.phase + 1) % 4;

          if (e.phase === 0) {
            // Radial burst
            const numBullets = e.hp <= e.maxHp / 3 ? 12 : 8;
            for (let a = 0; a < numBullets; a++) {
              const angle = (a / numBullets) * Math.PI * 2;
              state.projectiles.push({
                type: 'fire', x: e.x + e.size / 2, y: e.y + e.size / 2,
                dx: Math.cos(angle) * 2, dy: Math.sin(angle) * 2,
                life: 40, owner: 'enemy', damage: 1
              });
            }
            triggerShake(3, 0.15);
          } else if (e.phase === 1) {
            const dist = Math.sqrt(fdx * fdx + fdy * fdy) || 1;
            for (let i = -1; i <= 1; i++) {
              const a = Math.atan2(fdy, fdx) + i * 0.3;
              state.projectiles.push({
                type: 'fire', x: e.x + e.size / 2, y: e.y + e.size / 2,
                dx: Math.cos(a) * 2.5, dy: Math.sin(a) * 2.5,
                life: 50, owner: 'enemy', damage: 1
              });
            }
          } else if (e.phase === 2) {
            // Reactor beam phase
            for (let d = 0; d < 4; d++) {
              state.projectiles.push({
                type: 'reactor_beam', x: e.x + e.size / 2, y: e.y + e.size / 2,
                dx: DX[d] * 3, dy: DY[d] * 3,
                life: 25, owner: 'enemy', damage: 2
              });
            }
            SFX.reactorHum();
            triggerShake(4, 0.2);
          } else {
            e.speed = 0.8;
            setTimeout(() => { if (e.alive) e.speed = 0.4; }, 1000);
          }
        }
        break;
      }
    }
  }
}

// ============================================================
// PROJECTILES (expanded)
// ============================================================
function updateProjectiles(dt) {
  const p = state.player;

  for (let i = state.projectiles.length - 1; i >= 0; i--) {
    const proj = state.projectiles[i];
    proj.x += proj.dx * dt * 60;
    proj.y += proj.dy * dt * 60;
    proj.life -= dt * 60;

    // Boomerang return
    if (proj.type === 'boomerang' && proj.life < 20 && !proj.returning) {
      proj.returning = true;
      proj.dx = -proj.dx;
      proj.dy = -proj.dy;
    }

    // Bomb explosion
    if (proj.type === 'bomb') {
      if (proj.life <= 0) {
        SFX.bomb();
        triggerShake(3, 0.2);
        spawnParticles(Math.floor(proj.x + 8), Math.floor(proj.y + 8), '#ff6600', 12, 4);
        spawnParticles(Math.floor(proj.x + 8), Math.floor(proj.y + 8), '#ffcc00', 8, 3);

        for (const e of state.enemies) {
          if (!e.alive) continue;
          if (rectsOverlap(proj.x - 16, proj.y - 16, 48, 48, e.x, e.y, e.size, e.size)) {
            hitEnemy(e, proj.damage);
          }
        }

        const tiles = getCurrentTiles();
        if (tiles) {
          const tx = Math.floor(proj.x / TILE_SIZE);
          const ty = Math.floor(proj.y / TILE_SIZE);
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const cx = tx + dx, cy = ty + dy;
              if (cy >= 0 && cy < ROWS && cx >= 0 && cx < COLS) {
                if (tiles[cy][cx] === T.BOMBWALL) {
                  tiles[cy][cx] = T.DOOR_OPEN;
                  SFX.secret();
                }
              }
            }
          }
        }

        state.projectiles.splice(i, 1);
        continue;
      }
      proj.dx = 0; proj.dy = 0;
      continue;
    }

    // Reactor beam -- fades particle trail
    if (proj.type === 'reactor_beam') {
      spawnParticles(Math.floor(proj.x), Math.floor(proj.y), '#6688ff', 1, 0.5, { life: 0.3, size: 2 });
    }

    // Off-screen or expired
    if (proj.life <= 0 || proj.x < -16 || proj.x > COLS * TILE_SIZE + 16 || proj.y < -16 || proj.y > ROWS * TILE_SIZE + 16) {
      state.projectiles.splice(i, 1);
      continue;
    }

    // Player projectiles hit enemies
    if (proj.owner === 'player') {
      for (const e of state.enemies) {
        if (!e.alive || e.iframes > 0) continue;
        if (rectsOverlap(proj.x - 4, proj.y - 4, 8, 8, e.x, e.y, e.size, e.size)) {
          if (proj.stun) e.stunTimer = 2;
          if (proj.damage > 0) hitEnemy(e, proj.damage);
          if (proj.type !== 'boomerang' && !proj.piercing) {
            state.projectiles.splice(i, 1);
          }
          break;
        }
      }
    }

    // Enemy projectiles hit player
    if (proj.owner === 'enemy') {
      if (p.iframes <= 0 && rectsOverlap(proj.x - 4, proj.y - 4, 8, 8, p.x + 2, p.y + 2, 12, 12)) {
        // Shield block
        if (state.items.shield && state.selectedItem === 4) {
          const projDir = Math.atan2(proj.dy, proj.dx);
          const facingAngle = [Math.PI * -0.5, 0, Math.PI * 0.5, Math.PI][p.dir];
          const diff = Math.abs(projDir - facingAngle);
          if (diff < Math.PI * 0.6 || diff > Math.PI * 1.4) {
            state.projectiles.splice(i, 1);
            SFX.hit();
            continue;
          }
        }
        // Spore shield reflect
        if (state.items.sporeShield && state.selectedItem === 6) {
          proj.dx = -proj.dx;
          proj.dy = -proj.dy;
          proj.owner = 'player';
          proj.damage = Math.floor(proj.damage * getIntPower());
          SFX.sporeRelease();
          spawnParticles(Math.floor(p.x + 8), Math.floor(p.y + 8), '#88ff44', 4, 2);
          continue;
        }
        // DEX dodge
        if (Math.random() < getDodgeChance()) {
          state.projectiles.splice(i, 1);
          spawnParticles(Math.floor(p.x + 8), Math.floor(p.y + 8), '#88ffff', 3, 1);
          continue;
        }
        damagePlayer(proj.damage);
        state.projectiles.splice(i, 1);
      }
    }
  }
}

}
