<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jumpy Bros</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#backLink { color: #888; text-decoration: none; font-size: 14px; margin-top: 10px; }
#backLink:hover { color: #fff; }
.touch-btn { position: fixed; width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); display: none; z-index: 100; touch-action: none; user-select: none; -webkit-user-select: none; display: flex; align-items: center; justify-content: center; font-size: 28px; color: rgba(255,255,255,0.5); }
.touch-btn:active { background: rgba(255,255,255,0.35); }
#btn-left { bottom: 20px; left: 20px; }
#btn-right { bottom: 20px; left: 100px; }
#btn-jump { bottom: 20px; right: 20px; }
#btn-run { bottom: 20px; right: 100px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<a id="backLink" href="/games">Back to Arcade</a>

<div id="btn-left" class="touch-btn">&larr;</div>
<div id="btn-right" class="touch-btn">&rarr;</div>
<div id="btn-jump" class="touch-btn">&uarr;</div>
<div id="btn-run" class="touch-btn">R</div>

<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script>
// ============================================================
// JUMPY BROS - A Mario-style platformer
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- SIZING ---
const TILE = 16;
const COLS = 16 * 2; // viewport tiles wide (actually we use dynamic)
const ROWS = 15;
let SCALE = 1;
let W, H;

function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 30;
  const baseW = 256;
  const baseH = 240;
  SCALE = Math.min(Math.floor(maxW / baseW), Math.floor(maxH / baseH));
  if (SCALE < 1) SCALE = 1;
  if (SCALE > 4) SCALE = 4;
  // On mobile, use fractional scale
  if (SCALE < 2 && maxW < 600) {
    SCALE = Math.min(maxW / baseW, maxH / baseH);
  }
  W = baseW;
  H = baseH;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = Math.floor(W * SCALE) + 'px';
  canvas.style.height = Math.floor(H * SCALE) + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- TOUCH CONTROLS ---
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchBtns = document.querySelectorAll('.touch-btn');
if (isMobile) {
  touchBtns.forEach(b => b.style.display = 'flex');
}

const touchState = { left: false, right: false, jump: false, run: false };
function setupTouch(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); touchState[key] = true; }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; }, { passive: false });
  el.addEventListener('touchcancel', e => { touchState[key] = false; });
}
setupTouch('btn-left', 'left');
setupTouch('btn-right', 'right');
setupTouch('btn-jump', 'jump');
setupTouch('btn-run', 'run');

// --- INPUT ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  // NFT wallet connect on title screen
  if (e.code === 'KeyW' && state === 'title' && window.NftLoader && !window.NftLoader.wallet && window.ethereum) {
    window.NftLoader.connectWallet().then(function(addr) {
      if (addr) window.NftLoader.checkNFTs().then(function(chars) {
        if (chars.length > 0) window.NftLoader.selectedCharacter = chars[0];
      });
    });
    return;
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function inputLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; }
function inputRight() { return keys['ArrowRight'] || keys['KeyD'] || touchState.right; }
function inputJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jump; }
function inputRun() { return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyZ'] || touchState.run; }
function inputAny() { return keys['Space'] || keys['Enter'] || keys['KeyZ'] || touchState.jump; }

// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.value = 0.15;
    const t = audioCtx.currentTime;

    switch(type) {
      case 'jump':
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(600, t + 0.15);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'coin':
        osc.type = 'square';
        osc.frequency.setValueAtTime(988, t);
        osc.frequency.setValueAtTime(1319, t + 0.05);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'stomp':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(100, t + 0.1);
        gain.gain.linearRampToValueAtTime(0, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
        break;
      case 'powerup':
        osc.type = 'square';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(659, t + 0.08);
        osc.frequency.setValueAtTime(784, t + 0.16);
        osc.frequency.setValueAtTime(1047, t + 0.24);
        gain.gain.linearRampToValueAtTime(0, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
        break;
      case 'break':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(50, t + 0.15);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'die':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(100, t + 0.5);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.6);
        osc.start(t); osc.stop(t + 0.6);
        break;
      case 'flag':
        osc.type = 'square';
        [523,659,784,1047,784,1047].forEach((f, i) => {
          osc.frequency.setValueAtTime(f, t + i * 0.1);
        });
        gain.gain.linearRampToValueAtTime(0, t + 0.7);
        osc.start(t); osc.stop(t + 0.7);
        break;
      case 'fireball':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.linearRampToValueAtTime(200, t + 0.1);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
        break;
      case 'bump':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.linearRampToValueAtTime(80, t + 0.08);
        gain.gain.linearRampToValueAtTime(0, t + 0.08);
        osc.start(t); osc.stop(t + 0.08);
        break;
      case 'pipe':
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.linearRampToValueAtTime(50, t + 0.3);
        gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
        break;
      case '1up':
        osc.type = 'square';
        [330,392,523,659,784,1047].forEach((f,i) => {
          osc.frequency.setValueAtTime(f, t + i*0.06);
        });
        gain.gain.linearRampToValueAtTime(0, t+0.5);
        osc.start(t); osc.stop(t+0.5);
        break;
    }
  } catch(e) { console.warn('Audio error:', e); }
}

// --- COLORS ---
const SKY_TOP = '#5c94fc';
const SKY_BOT = '#a8d0ff';
const COL = {
  brick: '#c84c0c', brickDark: '#a03808', brickLight: '#e87040',
  question: '#f8d830', questionDark: '#c8a020', questionBorder: '#a06800',
  ground: '#c84c0c', groundTop: '#00a800', groundDark: '#a03808',
  pipe: '#00a800', pipeDark: '#008000', pipeLight: '#48d848',
  coin: '#f8d830', coinShine: '#fff8e0',
  player: '#e04040', playerHat: '#e04040', playerSkin: '#f8b878', playerShoe: '#804020',
  playerBig: '#e04040',
  mushEnemy: '#d08050', mushEnemyDark: '#a06030',
  turtleGreen: '#00a800', turtleDark: '#006800', turtleShell: '#00d800',
  flyEnemy: '#8060c0', flyWing: '#c0a0ff',
  star: '#f8d830', fireball: '#f87830',
  flag: '#00a800', flagPole: '#888',
  cloud: '#fff', cloudShadow: '#d0e8ff',
  hill: '#00c800', hillDark: '#009000',
  bush: '#00a800', bushDark: '#008000',
};

// --- TILE TYPES ---
const T = {
  EMPTY: 0, GROUND: 1, BRICK: 2, QUESTION: 3, USED: 4, PIPE_TL: 5, PIPE_TR: 6,
  PIPE_BL: 7, PIPE_BR: 8, COIN: 9, FLAG_POLE: 10, FLAG_TOP: 11,
  PIPE_ENTRY: 12, INVIS: 13
};

// --- PARTICLES ---
let particles = [];
function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * spread, vy: -Math.random() * spread * 0.8 - 1,
      life: 30 + Math.random() * 20, maxLife: 50, color, size: 2 + Math.random() * 2
    });
  }
}
function spawnBlockPieces(x, y) {
  for (let i = 0; i < 4; i++) {
    const dx = (i % 2) * 8 - 4;
    const dy = Math.floor(i / 2) * 8 - 4;
    particles.push({
      x: x + dx, y: y + dy, vx: dx * 0.3 + (Math.random()-0.5)*2, vy: -3 - Math.random()*2,
      life: 40, maxLife: 40, color: COL.brick, size: 6, gravity: true, rotation: Math.random() * 6.28
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += 0.15;
    else p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(camX) {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.rotation !== undefined) {
      ctx.save();
      ctx.translate(p.x - camX, p.y);
      ctx.rotate(p.rotation);
      p.rotation += 0.1;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    } else {
      ctx.fillRect(p.x - camX - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// --- FLOATING TEXT ---
let floatingTexts = [];
function spawnFloatText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#fff', life: 40, vy: -1.2 });
}
function updateFloatTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y += floatingTexts[i].vy;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatTexts(camX) {
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  for (const ft of floatingTexts) {
    ctx.globalAlpha = Math.min(1, ft.life / 15);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x - camX, ft.y);
    ctx.globalAlpha = 1;
  }
}

// --- LEVEL DATA ---
// Legend: 0=air, 1=ground, 2=brick, 3=question, 5/6=pipe top, 7/8=pipe bottom
// 9=coin, A=flag pole, B=flag top, C=pipe entry, D=invisible block

function createLevel(num) {
  const h = ROWS;
  let tiles, enemies, coins, width, pipeWarps = [], playerStart, flagX;

  if (num === 1) {
    // Level 1: Tutorial - flat, few enemies, lots of coins, teaches jumping
    width = 210;
    tiles = Array.from({length: h}, () => new Array(width).fill(0));
    // Ground
    for (let x = 0; x < width; x++) {
      if ((x >= 68 && x <= 70) || (x >= 140 && x <= 142)) continue; // small gaps
      tiles[h-1][x] = T.GROUND;
      tiles[h-2][x] = T.GROUND;
    }
    // Starting platform area
    // Question blocks with coins
    tiles[h-6][8] = T.QUESTION;   // first question block
    tiles[h-6][12] = T.BRICK;
    tiles[h-6][13] = T.QUESTION;  // power-up mushroom
    tiles[h-6][14] = T.BRICK;
    // Coins in the air
    for (let x = 18; x < 24; x++) tiles[h-5][x] = T.COIN;
    // Small pipe
    tiles[h-3][28] = T.PIPE_TL; tiles[h-3][29] = T.PIPE_TR;
    tiles[h-4][28] = T.PIPE_TL; tiles[h-4][29] = T.PIPE_TR;
    // Question blocks row
    tiles[h-6][35] = T.QUESTION;
    tiles[h-6][38] = T.QUESTION;
    tiles[h-6][41] = T.QUESTION;
    // Coins above question blocks
    tiles[h-8][35] = T.COIN;
    tiles[h-8][38] = T.COIN;
    tiles[h-8][41] = T.COIN;
    // Brick staircase
    for (let i = 0; i < 4; i++) {
      for (let j = 0; j <= i; j++) {
        tiles[h-3-j][50+i] = T.BRICK;
      }
    }
    // Elevated platform with coins
    for (let x = 56; x < 64; x++) tiles[h-6][x] = T.BRICK;
    for (let x = 57; x < 63; x++) tiles[h-8][x] = T.COIN;
    // Pipe (enterable)
    tiles[h-3][75] = T.PIPE_TL; tiles[h-3][76] = T.PIPE_TR;
    tiles[h-4][75] = T.PIPE_TL; tiles[h-4][76] = T.PIPE_TR;
    tiles[h-5][75] = T.PIPE_ENTRY; tiles[h-5][76] = T.PIPE_TR;
    pipeWarps.push({ entryX: 75, entryY: h-5, bonusCoins: 15 });
    // More platforms & coins
    for (let x = 82; x < 90; x++) tiles[h-5][x] = T.BRICK;
    for (let x = 83; x < 89; x++) tiles[h-7][x] = T.COIN;
    tiles[h-5][86] = T.QUESTION; // star!
    // Brick + question row
    for (let x = 95; x < 105; x++) {
      tiles[h-6][x] = (x % 2 === 0) ? T.BRICK : T.QUESTION;
    }
    // Tall pipe
    for (let y = h-3; y >= h-6; y--) {
      tiles[y][112] = T.PIPE_TL; tiles[y][113] = T.PIPE_TR;
    }
    // More coins
    for (let x = 118; x < 126; x++) tiles[h-4][x] = T.COIN;
    // Brick platform before gap
    for (let x = 130; x < 138; x++) tiles[h-5][x] = T.BRICK;
    for (let x = 131; x < 137; x++) tiles[h-3][x] = T.COIN;
    // Step pyramid
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j <= i; j++) {
        tiles[h-3-j][150+i] = T.GROUND;
      }
    }
    for (let i = 0; i < 8; i++) {
      for (let j = 0; j <= (7-i); j++) {
        tiles[h-3-j][158+i] = T.GROUND;
      }
    }
    // Coins on top of pyramid
    tiles[h-11][154] = T.COIN; tiles[h-11][155] = T.COIN;
    tiles[h-12][154] = T.COIN; tiles[h-12][155] = T.COIN;
    // More platforms
    for (let x = 170; x < 180; x++) tiles[h-5][x] = T.BRICK;
    tiles[h-5][174] = T.QUESTION;
    // Coins
    for (let x = 172; x < 178; x++) tiles[h-7][x] = T.COIN;
    // Final staircase to flag
    for (let i = 0; i < 9; i++) {
      for (let j = 0; j <= i; j++) {
        tiles[h-3-j][190+i] = T.GROUND;
      }
    }
    // Flag
    flagX = 200;
    for (let y = 3; y < h-2; y++) tiles[y][flagX] = T.FLAG_POLE;
    tiles[3][flagX] = T.FLAG_TOP;

    playerStart = { x: 3 * TILE, y: (h-3) * TILE };
    enemies = [
      { type: 'goomba', x: 22 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 42 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 60 * TILE, y: (h-7) * TILE },
      { type: 'goomba', x: 92 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 96 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 120 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 160 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 175 * TILE, y: (h-3) * TILE },
    ];

  } else if (num === 2) {
    // Level 2: Gaps, more enemies, question blocks, turtles
    width = 240;
    tiles = Array.from({length: h}, () => new Array(width).fill(0));
    for (let x = 0; x < width; x++) {
      // More gaps
      if ((x >= 30 && x <= 33) || (x >= 72 && x <= 76) || (x >= 120 && x <= 124) ||
          (x >= 155 && x <= 158) || (x >= 190 && x <= 193)) continue;
      tiles[h-1][x] = T.GROUND;
      tiles[h-2][x] = T.GROUND;
    }
    // Pipes
    for (let y = h-3; y >= h-5; y--) { tiles[y][15] = T.PIPE_TL; tiles[y][16] = T.PIPE_TR; }
    for (let y = h-3; y >= h-6; y--) { tiles[y][45] = T.PIPE_TL; tiles[y][46] = T.PIPE_TR; }
    for (let y = h-3; y >= h-4; y--) { tiles[y][100] = T.PIPE_TL; tiles[y][101] = T.PIPE_TR; }
    // Enterable pipe
    for (let y = h-3; y >= h-6; y--) { tiles[y][60] = T.PIPE_TL; tiles[y][61] = T.PIPE_TR; }
    tiles[h-6][60] = T.PIPE_ENTRY; tiles[h-6][61] = T.PIPE_TR;
    pipeWarps.push({ entryX: 60, entryY: h-6, bonusCoins: 20 });

    // Question and brick blocks
    tiles[h-6][10] = T.QUESTION;
    tiles[h-6][20] = T.BRICK; tiles[h-6][21] = T.QUESTION; tiles[h-6][22] = T.BRICK;
    tiles[h-6][23] = T.QUESTION; tiles[h-6][24] = T.BRICK;
    // Hidden 1-up
    tiles[h-6][27] = T.INVIS;
    // Floating platforms over gaps
    for (let x = 31; x <= 32; x++) tiles[h-5][x] = T.BRICK;
    for (let x = 73; x <= 75; x++) tiles[h-5][x] = T.BRICK;
    tiles[h-7][74] = T.QUESTION;
    // More blocks
    for (let x = 82; x < 92; x++) tiles[h-6][x] = (x%3===0) ? T.QUESTION : T.BRICK;
    tiles[h-10][86] = T.QUESTION; tiles[h-10][87] = T.QUESTION;
    // Upper coin rows
    for (let x = 82; x < 92; x++) tiles[h-8][x] = T.COIN;
    // Platform section
    for (let x = 105; x < 118; x++) tiles[h-5][x] = T.BRICK;
    for (let x = 108; x < 115; x++) tiles[h-9][x] = T.BRICK;
    tiles[h-9][111] = T.QUESTION;
    for (let x = 109; x < 114; x++) tiles[h-11][x] = T.COIN;
    // Bridge over gap
    for (let x = 121; x <= 123; x++) tiles[h-5][x] = T.BRICK;
    // Staircase area
    for (let i = 0; i < 5; i++) {
      for (let j = 0; j <= i; j++) tiles[h-3-j][130+i] = T.GROUND;
    }
    for (let x = 135; x < 145; x++) tiles[h-7][x] = T.BRICK;
    tiles[h-7][139] = T.QUESTION;
    for (let x = 136; x < 144; x++) tiles[h-9][x] = T.COIN;
    // More platforms over gaps
    for (let x = 155; x <= 157; x++) tiles[h-4][x] = T.BRICK;
    // Pipe gauntlet
    for (let y = h-3; y >= h-5; y--) { tiles[y][165] = T.PIPE_TL; tiles[y][166] = T.PIPE_TR; }
    for (let y = h-3; y >= h-7; y--) { tiles[y][172] = T.PIPE_TL; tiles[y][173] = T.PIPE_TR; }
    for (let y = h-3; y >= h-4; y--) { tiles[y][180] = T.PIPE_TL; tiles[y][181] = T.PIPE_TR; }
    // Blocks
    for (let x = 195; x < 210; x++) tiles[h-6][x] = (x%2===0) ? T.BRICK : T.QUESTION;
    for (let x = 196; x < 209; x++) tiles[h-4][x] = T.COIN;
    // Staircase to flag
    for (let i = 0; i < 9; i++) {
      for (let j = 0; j <= i; j++) tiles[h-3-j][220+i] = T.GROUND;
    }
    flagX = 230;
    for (let y = 3; y < h-2; y++) tiles[y][flagX] = T.FLAG_POLE;
    tiles[3][flagX] = T.FLAG_TOP;

    playerStart = { x: 3 * TILE, y: (h-3) * TILE };
    enemies = [
      { type: 'goomba', x: 18 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 25 * TILE, y: (h-3) * TILE },
      { type: 'turtle', x: 38 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 50 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 52 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 65 * TILE, y: (h-7) * TILE },
      { type: 'turtle', x: 85 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 88 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 90 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 95 * TILE, y: (h-6) * TILE },
      { type: 'goomba', x: 110 * TILE, y: (h-6) * TILE },
      { type: 'turtle', x: 115 * TILE, y: (h-6) * TILE },
      { type: 'goomba', x: 138 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 140 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 150 * TILE, y: (h-6) * TILE },
      { type: 'turtle', x: 168 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 200 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 203 * TILE, y: (h-3) * TILE },
      { type: 'turtle', x: 206 * TILE, y: (h-3) * TILE },
    ];

  } else if (num === 3) {
    // Level 3: Hard - moving platforms, more enemies, trickier jumps
    width = 270;
    tiles = Array.from({length: h}, () => new Array(width).fill(0));
    for (let x = 0; x < width; x++) {
      // Many gaps
      if ((x >= 25 && x <= 29) || (x >= 55 && x <= 61) || (x >= 85 && x <= 90) ||
          (x >= 110 && x <= 116) || (x >= 140 && x <= 146) || (x >= 170 && x <= 175) ||
          (x >= 200 && x <= 205) || (x >= 225 && x <= 229)) continue;
      tiles[h-1][x] = T.GROUND;
      tiles[h-2][x] = T.GROUND;
    }
    // Opening blocks
    tiles[h-6][6] = T.QUESTION; tiles[h-6][8] = T.BRICK; tiles[h-6][9] = T.QUESTION; tiles[h-6][10] = T.BRICK;
    tiles[h-10][8] = T.QUESTION; // star
    // Platforms over first gap
    tiles[h-5][26] = T.BRICK; tiles[h-5][28] = T.BRICK;
    tiles[h-8][27] = T.COIN;
    // Pipe area
    for (let y = h-3; y >= h-7; y--) { tiles[y][35] = T.PIPE_TL; tiles[y][36] = T.PIPE_TR; }
    for (let y = h-3; y >= h-5; y--) { tiles[y][42] = T.PIPE_TL; tiles[y][43] = T.PIPE_TR; }
    // Enterable pipe
    tiles[h-7][35] = T.PIPE_ENTRY;
    pipeWarps.push({ entryX: 35, entryY: h-7, bonusCoins: 25 });
    // Block formations
    for (let x = 47; x < 53; x++) tiles[h-6][x] = T.BRICK;
    tiles[h-6][49] = T.QUESTION; tiles[h-6][51] = T.QUESTION;
    for (let x = 48; x < 52; x++) tiles[h-8][x] = T.COIN;
    // Floating platforms over big gap
    tiles[h-5][56] = T.BRICK; tiles[h-5][57] = T.BRICK;
    tiles[h-7][59] = T.BRICK; tiles[h-7][60] = T.BRICK;
    // Staircase
    for (let i = 0; i < 6; i++) {
      for (let j = 0; j <= i; j++) tiles[h-3-j][65+i] = T.GROUND;
    }
    // High platform
    for (let x = 72; x < 82; x++) tiles[h-8][x] = T.BRICK;
    tiles[h-8][76] = T.QUESTION; tiles[h-8][78] = T.QUESTION;
    for (let x = 73; x < 81; x++) tiles[h-10][x] = T.COIN;
    // Block maze section
    for (let x = 92; x < 108; x++) {
      if (x % 2 === 0) tiles[h-5][x] = T.BRICK;
      if (x % 3 === 0) tiles[h-8][x] = T.BRICK;
    }
    tiles[h-5][98] = T.QUESTION; tiles[h-5][104] = T.QUESTION;
    tiles[h-8][96] = T.QUESTION; tiles[h-8][102] = T.QUESTION;
    // Floating platforms over gaps
    tiles[h-5][111] = T.BRICK; tiles[h-5][112] = T.BRICK;
    tiles[h-7][114] = T.BRICK; tiles[h-7][115] = T.BRICK;
    // More pipes
    for (let y = h-3; y >= h-6; y--) { tiles[y][125] = T.PIPE_TL; tiles[y][126] = T.PIPE_TR; }
    for (let y = h-3; y >= h-8; y--) { tiles[y][132] = T.PIPE_TL; tiles[y][133] = T.PIPE_TR; }
    // Blocks
    for (let x = 148; x < 165; x++) {
      if (x % 2 === 0) tiles[h-6][x] = (x%4===0) ? T.QUESTION : T.BRICK;
    }
    for (let x = 150; x < 163; x++) tiles[h-4][x] = T.COIN;
    for (let x = 152; x < 160; x++) tiles[h-10][x] = T.BRICK;
    tiles[h-10][156] = T.QUESTION;
    // Platform over gap
    tiles[h-4][171] = T.BRICK; tiles[h-4][172] = T.BRICK; tiles[h-4][173] = T.BRICK;
    tiles[h-7][171] = T.COIN; tiles[h-7][173] = T.COIN;
    // Castle approach
    for (let x = 178; x < 198; x++) tiles[h-5][x] = T.BRICK;
    for (let x = 182; x < 194; x++) tiles[h-9][x] = T.BRICK;
    tiles[h-9][186] = T.QUESTION; tiles[h-9][190] = T.QUESTION;
    for (let x = 183; x < 193; x++) tiles[h-7][x] = T.COIN;
    for (let x = 185; x < 191; x++) tiles[h-11][x] = T.COIN;
    // Stairs up
    for (let i = 0; i < 5; i++) {
      for (let j = 0; j <= i; j++) tiles[h-3-j][210+i] = T.GROUND;
    }
    // Down stairs
    for (let i = 0; i < 5; i++) {
      for (let j = 0; j <= (4-i); j++) tiles[h-3-j][215+i] = T.GROUND;
    }
    // Final stretch
    for (let x = 232; x < 250; x++) tiles[h-5][x] = (x%3===0) ? T.QUESTION : T.BRICK;
    // Final staircase
    for (let i = 0; i < 9; i++) {
      for (let j = 0; j <= i; j++) tiles[h-3-j][250+i] = T.GROUND;
    }
    flagX = 260;
    for (let y = 3; y < h-2; y++) tiles[y][flagX] = T.FLAG_POLE;
    tiles[3][flagX] = T.FLAG_TOP;

    playerStart = { x: 3 * TILE, y: (h-3) * TILE };
    enemies = [
      { type: 'goomba', x: 12 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 15 * TILE, y: (h-3) * TILE },
      { type: 'turtle', x: 20 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 30 * TILE, y: (h-6) * TILE },
      { type: 'goomba', x: 40 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 42 * TILE, y: (h-3) * TILE },
      { type: 'turtle', x: 48 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 57 * TILE, y: (h-8) * TILE },
      { type: 'goomba', x: 75 * TILE, y: (h-9) * TILE },
      { type: 'turtle', x: 78 * TILE, y: (h-9) * TILE },
      { type: 'goomba', x: 95 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 97 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 100 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 105 * TILE, y: (h-6) * TILE },
      { type: 'turtle', x: 118 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 128 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 135 * TILE, y: (h-3) * TILE },
      { type: 'fly', x: 143 * TILE, y: (h-7) * TILE },
      { type: 'turtle', x: 152 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 155 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 158 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 185 * TILE, y: (h-6) * TILE },
      { type: 'turtle', x: 188 * TILE, y: (h-6) * TILE },
      { type: 'fly', x: 195 * TILE, y: (h-8) * TILE },
      { type: 'goomba', x: 235 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 238 * TILE, y: (h-3) * TILE },
      { type: 'turtle', x: 242 * TILE, y: (h-3) * TILE },
      { type: 'goomba', x: 245 * TILE, y: (h-3) * TILE },
    ];
  }

  // Mark question block contents
  // Simple system: first question block = coin, pattern varies
  const qContents = {};
  let qCount = 0;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < width; x++) {
      if (tiles[y][x] === T.QUESTION) {
        const key = x + ',' + y;
        qCount++;
        if (num === 1 && x === 13 && y === h-6) qContents[key] = 'mushroom';
        else if (num === 1 && x === 86 && y === h-5) qContents[key] = 'star';
        else if (num === 2 && x === 86 && y === h-10) qContents[key] = 'mushroom';
        else if (num === 2 && x === 87 && y === h-10) qContents[key] = 'fire';
        else if (num === 3 && x === 8 && y === h-10) qContents[key] = 'star';
        else if (num === 3 && x === 49) qContents[key] = 'mushroom';
        else if (num === 3 && x === 156) qContents[key] = 'fire';
        else qContents[key] = 'coin';
      }
      if (tiles[y][x] === T.INVIS) {
        const key = x + ',' + y;
        qContents[key] = '1up';
      }
    }
  }

  // Moving platforms for level 3
  let movingPlatforms = [];
  if (num === 3) {
    movingPlatforms = [
      { x: 86 * TILE, y: (h-5) * TILE, w: 3 * TILE, minX: 86 * TILE, maxX: 90 * TILE, vx: 0.5, vy: 0 },
      { x: 140 * TILE, y: (h-4) * TILE, w: 3 * TILE, minY: (h-8) * TILE, maxY: (h-3) * TILE, vx: 0, vy: 0.4 },
      { x: 201 * TILE, y: (h-5) * TILE, w: 4 * TILE, minX: 200 * TILE, maxX: 205 * TILE, vx: 0.4, vy: 0 },
      { x: 226 * TILE, y: (h-4) * TILE, w: 3 * TILE, minX: 225 * TILE, maxX: 230 * TILE, vx: 0.5, vy: 0 },
    ];
  }
  if (num === 2) {
    movingPlatforms = [
      { x: 121 * TILE, y: (h-5) * TILE, w: 3 * TILE, minY: (h-8) * TILE, maxY: (h-4) * TILE, vx: 0, vy: 0.35 },
      { x: 155 * TILE, y: (h-5) * TILE, w: 3 * TILE, minX: 154 * TILE, maxX: 159 * TILE, vx: 0.4, vy: 0 },
    ];
  }

  return { tiles, enemies, width, playerStart, flagX, pipeWarps, qContents, movingPlatforms, height: h };
}

}

  inPipe: false, pipeTimer: 0,
};

let fireballs = [];
let blockAnims = []; // bouncing question blocks

let bonusCoinTimer = 0;

function initLevel(num) {
  levelData = createLevel(num);

// --- COLLISION HELPERS ---
function tileAt(tx, ty) {
  if (!levelData) return T.EMPTY;
  if (ty < 0 || ty >= levelData.height || tx < 0 || tx >= levelData.width) return T.EMPTY;
  return levelData.tiles[ty][tx];
}

function isSolid(tx, ty) {
  const t = tileAt(tx, ty);
  return t === T.GROUND || t === T.BRICK || t === T.QUESTION || t === T.USED ||
         t === T.PIPE_TL || t === T.PIPE_TR || t === T.PIPE_BL || t === T.PIPE_BR || t === T.PIPE_ENTRY;
}

function tileCollide(x, y, w, h) {
  const left = Math.floor(x / TILE);
  const right = Math.floor((x + w - 1) / TILE);
  const top = Math.floor(y / TILE);
  const bottom = Math.floor((y + h - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) return { tx, ty };
    }
  }
  return null;
}

// --- BLOCK INTERACTIONS ---
function hitBlockFromBelow(tx, ty) {
  const tile = tileAt(tx, ty);
  if (tile === T.QUESTION || tile === T.INVIS) {
    const key = tx + ',' + ty;
    const content = levelData.qContents[key] || 'coin';
    levelData.tiles[ty][tx] = T.USED;
    blockAnims.push({ tx, ty, offsetY: 0, phase: 0 });

    if (content === 'coin') {
      coins++; addScore(200);
      spawnParticles(tx * TILE + 8, ty * TILE - 4, COL.coin, 5, 3);
      spawnFloatText(tx * TILE + 8, ty * TILE - 8, '200', COL.coin);
      playSound('coin');
    } else if (content === 'mushroom') {
      powerUps.push({ type: player.big ? 'fire' : 'mushroom', x: tx * TILE, y: ty * TILE - TILE, vy: -2, vx: 1, emerged: false, emergeY: ty * TILE - TILE });
      playSound('powerup');
    } else if (content === 'star') {
      powerUps.push({ type: 'star', x: tx * TILE, y: ty * TILE - TILE, vy: -3, vx: 1.5, emerged: true });
      playSound('powerup');
    } else if (content === 'fire') {
      powerUps.push({ type: 'fire', x: tx * TILE, y: ty * TILE - TILE, vy: -2, vx: 1, emerged: false, emergeY: ty * TILE - TILE });
      playSound('powerup');
    } else if (content === '1up') {
      lives++;
      spawnFloatText(tx * TILE + 8, ty * TILE - 8, '1UP', '#0f0');
      playSound('1up');
    }
    // Kill enemies standing on this block
    for (const e of enemies) {
      if (e.alive && !e.stomped) {
        const ex = Math.floor((e.x + 6) / TILE);
        const ey = Math.floor(e.y / TILE);
        if (ex === tx && ey === ty - 1) {
          e.alive = false;
          e.vy = -4;
          addScore(100);
          spawnFloatText(e.x, e.y - 8, '100');
          playSound('stomp');
        }
      }
    }
  } else if (tile === T.BRICK) {
    if (player.big) {
      levelData.tiles[ty][tx] = T.EMPTY;
      spawnBlockPieces(tx * TILE + 8, ty * TILE + 8);
      playSound('break');
      addScore(50);
      // Kill enemies on top
      for (const e of enemies) {
        if (e.alive) {
          const ex = Math.floor((e.x + 6) / TILE);
          const ey = Math.floor(e.y / TILE);
          if (ex === tx && ey === ty - 1) {
            e.alive = false;
            e.vy = -4;
            addScore(100);
            playSound('stomp');
          }
        }
      }
    } else {
      blockAnims.push({ tx, ty, offsetY: 0, phase: 0 });
      playSound('bump');
    }
  } else if (tile === T.USED) {
    playSound('bump');
  }
}

// --- UPDATE ---
function updatePlayer(dt) {
  if (player.dead) {
    player.deadTimer++;
    if (player.deadTimer > 15) player.vy += 0.3;
    player.y += player.vy;
    if (player.deadTimer > 90) {
      lives--;
      if (lives <= 0) {
        state = 'gameOver';
      } else {
        resetPlayer();
        initLevel(level);
      }
    }
    return;
  }

  if (player.atFlag) {
    updateFlagSequence();
    return;
  }

  const runPressed = inputRun();
  const maxSpeed = runPressed ? 2.5 : 1.5;
  const accel = runPressed ? 0.15 : 0.1;
  const friction = 0.85;

  // Horizontal movement
  if (inputLeft()) {
    player.vx -= accel;
    if (player.vx < -maxSpeed) player.vx = -maxSpeed;
    player.facing = -1;
  } else if (inputRight()) {
    player.vx += accel;
    if (player.vx > maxSpeed) player.vx = maxSpeed;
    player.facing = 1;
  } else {
    player.vx *= friction;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Animation
  if (Math.abs(player.vx) > 0.3 && player.onGround) {
    player.animTimer++;
    if (player.animTimer > (runPressed ? 3 : 5)) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 3;
    }
  } else if (player.onGround) {
    player.animFrame = 0;
  }

  // Coyote time
  if (player.onGround) {
    player.coyoteTime = 6; // 6 frames of coyote time
  } else {
    player.coyoteTime--;
  }

  // Jump buffer
  if (inputJump() && !player.jumpHeld) {
    player.jumpBufferTime = 8;
  }
  if (player.jumpBufferTime > 0) player.jumpBufferTime--;

  // Jump
  if (player.jumpBufferTime > 0 && player.coyoteTime > 0) {
    player.vy = -4.5;
    player.onGround = false;
    player.coyoteTime = 0;
    player.jumpBufferTime = 0;
    player.jumpHeld = true;
    player.squash = 0.7;
    playSound('jump');
  }

  // Variable jump height
  if (!inputJump()) {
    player.jumpHeld = false;
    if (player.vy < -2) player.vy = -2; // cut jump short
  }

  // Gravity (heavier at peak for snappy feel)
  const grav = (Math.abs(player.vy) < 1 && !player.jumpHeld) ? 0.35 : 0.25;
  player.vy += grav;
  if (player.vy > 7) player.vy = 7;

  // Squash/stretch recovery
  player.squash += (1 - player.squash) * 0.2;

  // Move X
  player.x += player.vx;
  // Clamp to level bounds
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x > (levelData.width - 1) * TILE) player.x = (levelData.width - 1) * TILE;

  // X collision
  const pw = player.w;
  const ph = player.big ? 24 : player.h;
  const pxOff = 2; // slight inset for less sticky collisions
  // Right
  if (player.vx > 0) {
    const hit = tileCollide(player.x + pxOff + pw, player.y + 2, 1, ph - 4);
    if (hit) { player.x = hit.tx * TILE - pw - pxOff; player.vx = 0; }
  }
  // Left
  if (player.vx < 0) {
    const hit = tileCollide(player.x + pxOff - 1, player.y + 2, 1, ph - 4);
    if (hit) { player.x = (hit.tx + 1) * TILE - pxOff; player.vx = 0; }
  }

  // Move Y
  player.y += player.vy;
  player.onGround = false;

  // Y collision - down
  if (player.vy >= 0) {
    const hit = tileCollide(player.x + pxOff + 1, player.y + ph, pw - 2, 1);
    if (hit) {
      player.y = hit.ty * TILE - ph;
      player.vy = 0;
      player.onGround = true;
      if (player.squash < 0.9) player.squash = 1.15; // landing stretch
    }
    // Also check moving platforms
    for (const mp of (levelData.movingPlatforms || [])) {
      if (player.x + pxOff + pw > mp.x && player.x + pxOff < mp.x + mp.w) {
        if (player.y + ph >= mp.y && player.y + ph <= mp.y + 6 && player.vy >= 0) {
          player.y = mp.y - ph;
          player.vy = 0;
          player.onGround = true;
          player.x += mp.vx; // ride the platform
        }
      }
    }
  }

  // Y collision - up (hitting blocks from below)
  if (player.vy < 0) {
    const headY = player.y;
    const hit = tileCollide(player.x + pxOff + 2, headY, pw - 4, 1);
    if (hit) {
      player.y = (hit.ty + 1) * TILE;
      player.vy = 0;
      hitBlockFromBelow(hit.tx, hit.ty);
    }
  }

  // Collect coins (tile coins)
  const cx1 = Math.floor((player.x + pxOff) / TILE);
  const cx2 = Math.floor((player.x + pxOff + pw) / TILE);
  const cy1 = Math.floor(player.y / TILE);
  const cy2 = Math.floor((player.y + ph) / TILE);
  for (let ty = cy1; ty <= cy2; ty++) {
    for (let tx = cx1; tx <= cx2; tx++) {
      if (tileAt(tx, ty) === T.COIN) {
        levelData.tiles[ty][tx] = T.EMPTY;
        coins++; addScore(100);
        spawnParticles(tx * TILE + 8, ty * TILE + 8, COL.coin, 4, 2);
        playSound('coin');
      }
    }
  }

  // Fall into pit
  if (player.y > H + 20) {
    playerDie();
  }

  // Star timer
  if (player.star) {
    player.starTimer--;
    if (player.starTimer <= 0) { player.star = false; }
  }

  // Invincibility after hit
  if (player.invincible > 0) player.invincible--;

  // Pipe entry
  if (inputDown() && player.onGround) {
    const ptx = Math.floor((player.x + pw/2) / TILE);
    const pty = Math.floor((player.y + ph) / TILE);
    for (const warp of levelData.pipeWarps) {
      if (Math.abs(ptx - warp.entryX) <= 1 && Math.abs(pty - 1 - warp.entryY) <= 1) {
        enterPipe(warp);
        break;
      }
    }
  }

  // Flag pole collision
  if (levelData.flagX) {
    const flagPx = levelData.flagX * TILE;
    if (player.x + pw > flagPx - 2 && player.x < flagPx + TILE && !player.atFlag) {
      player.atFlag = true;
      player.flagSlide = true;
      player.vx = 0;
      player.vy = 0;
      player.x = flagPx - pw + 4;
      flagSlideY = player.y; // flag slides from player height
      // Score based on height
      const heightBonus = Math.max(0, Math.floor((H - player.y) / TILE) * 100);
      addScore(heightBonus);
      spawnFloatText(player.x, player.y - 16, heightBonus.toString(), '#fff');
      playSound('flag');
    }
  }

  // Fire shooting
  if (player.fire && (keys['KeyX'] || keys['KeyZ'] || keys['ShiftLeft']) && fireballs.length < 2) {
    if (frame % 10 === 0) {
      fireballs.push({
        x: player.x + (player.facing > 0 ? pw : -4),
        y: player.y + ph/2,
        vx: player.facing * 3,
        vy: -1,
        bounces: 0
      });
      playSound('fireball');
    }
  }
}

function inputDown() { return keys['ArrowDown'] || keys['KeyS']; }

function enterPipe(warp) {
  playSound('pipe');
  state = 'bonusRoom';
  bonusCoins = warp.bonusCoins;
  bonusCoinTimer = 0;
  bonusReturnX = player.x;
  bonusReturnY = player.y - 32;
}

function updateBonusRoom() {
  bonusCoinTimer++;
  if (bonusCoinTimer % 8 === 0 && bonusCoins > 0) {
    coins++; addScore(200);
    bonusCoins--;
    playSound('coin');
  }
  if (bonusCoins <= 0 && bonusCoinTimer > 30) {
    state = 'playing';
    player.x = bonusReturnX;
    player.y = bonusReturnY;
    playSound('pipe');
  }
}

function updateFlagSequence() {
  if (player.flagSlide) {
    player.y += 2;
    flagSlideY += 2;
    const groundY = (levelData.height - 3) * TILE;
    if (player.y >= groundY - (player.big ? 24 : 14)) {
      player.y = groundY - (player.big ? 24 : 14);
      player.flagSlide = false;
      player.flagDone = true;
      levelCompleteTimer = 0;
    }
  }
  if (player.flagDone) {
    levelCompleteTimer++;
    // Walk right for a bit
    if (levelCompleteTimer < 60) {
      player.vx = 1;
      player.x += player.vx;
      player.animTimer++;
      if (player.animTimer > 5) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 3; }
      player.facing = 1;
    }
    // Timer bonus
    if (levelCompleteTimer >= 60 && timer > 0) {
      timer -= 3;
      if (timer < 0) timer = 0;
      addScore(30);
    }
    if (timer <= 0 && levelCompleteTimer >= 80) {
      if (level < 3) {
        level++;
        initLevel(level);
      } else {
        state = 'gameOver'; // Won the game!
      }
    }
  }
}

function playerDie() {
  if (player.dead) return;
  if (player.star) return;
  if (player.invincible > 0) return;

  if (player.big) {
    player.big = false;
    player.fire = false;
    player.h = 14;
    player.invincible = 90;
    playSound('bump');
    return;
  }

  player.dead = true;
  player.deadTimer = 0;
  player.vy = -5;
  player.vx = 0;
  playSound('die');
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) {
      if (e.stomped) {
        e.stompTimer++;
        if (e.stompTimer > 30) e.stomped = false; // remove
      }
      continue;
    }

    // Off-screen culling (only activate if within range)
    if (e.x > camX + W + 100 || e.x < camX - 100) continue;

    if (e.type === 'fly') {
      e.flyPhase += 0.04;
      e.y = e.startY + Math.sin(e.flyPhase) * 20;
      e.x += e.vx;
    } else if (e.shell && e.shellVx !== 0) {
      e.x += e.shellVx;
      // Shell kills other enemies
      for (const other of enemies) {
        if (other !== e && other.alive && !other.shell) {
          if (Math.abs(e.x - other.x) < 12 && Math.abs(e.y - other.y) < 12) {
            other.alive = false;
            other.vy = -3;
            addScore(200);
            spawnFloatText(other.x, other.y - 8, '200');
            playSound('stomp');
          }
        }
      }
      // Shell wall collision
      const stx = Math.floor((e.x + (e.shellVx > 0 ? 14 : 0)) / TILE);
      const sty = Math.floor((e.y + 4) / TILE);
      if (isSolid(stx, sty)) {
        e.shellVx = -e.shellVx;
      }
    } else {
      e.x += e.vx;
      // Gravity
      if (e.vy === undefined) e.vy = 0;
      e.vy += 0.2;
      if (e.vy > 5) e.vy = 5;
      e.y += e.vy;

      // Ground collision
      const ety = Math.floor((e.y + 14) / TILE);
      const etx = Math.floor((e.x + 6) / TILE);
      if (isSolid(etx, ety)) {
        e.y = ety * TILE - 14;
        e.vy = 0;
      }

      // Wall collision - turn around
      const wallTx = Math.floor((e.x + (e.vx > 0 ? 13 : 0)) / TILE);
      const wallTy = Math.floor((e.y + 6) / TILE);
      if (isSolid(wallTx, wallTy)) {
        e.vx = -e.vx;
      }

      // Edge detection - turn around at edges (not for flies)
      if (e.type !== 'fly') {
        const edgeTx = Math.floor((e.x + (e.vx > 0 ? 14 : -1)) / TILE);
        const edgeTy = Math.floor((e.y + 16) / TILE);
        if (!isSolid(edgeTx, edgeTy) && e.y < (levelData.height - 3) * TILE) {
          e.vx = -e.vx;
        }
      }
    }

    // Animate
    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 2; }

    // Player collision
    if (!player.dead && !player.atFlag && player.invincible <= 0) {
      const pw = player.w;
      const ph = player.big ? 24 : player.h;
      const pxOff = 2;

      if (player.x + pxOff + pw > e.x + 2 && player.x + pxOff < e.x + 12 &&
          player.y + ph > e.y + 2 && player.y < e.y + 12) {

        if (player.star) {
          // Star kills everything
          e.alive = false;
          e.vy = -4;
          addScore(200);
          spawnFloatText(e.x, e.y - 8, '200');
          playSound('stomp');
        } else if (player.vy > 0 && player.y + ph < e.y + 10) {
          // Stomp!
          if (e.type === 'turtle' && !e.shell) {
            e.shell = true;
            e.shellVx = 0;
            e.vx = 0;
            player.vy = -3.5;
            addScore(100);
            spawnFloatText(e.x, e.y - 8, '100');
            playSound('stomp');
          } else if (e.shell && e.shellVx === 0) {
            // Kick shell
            e.shellVx = player.facing * 4;
            player.vy = -2;
            addScore(100);
            playSound('stomp');
          } else {
            e.alive = false;
            e.stomped = true;
            e.stompTimer = 0;
            player.vy = -3.5;
            player.squash = 0.6;
            addScore(100);
            spawnParticles(e.x + 6, e.y + 6, '#ff0', 6, 3);
            spawnFloatText(e.x, e.y - 8, '100');
            playSound('stomp');
          }
        } else {
          // Player hit
          playerDie();
        }
      }
    }
  }

  // Remove far off-screen dead enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive && !enemies[i].stomped && enemies[i].y > H + 50) {
      enemies.splice(i, 1);
    }
  }
}

function updatePowerUps() {
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (!pu.emerged) {
      pu.y -= 0.5;
      if (pu.y <= pu.emergeY) pu.emerged = true;
      continue;
    }

    pu.x += pu.vx;
    if (pu.type === 'star') {
      pu.vy += 0.2;
      pu.y += pu.vy;
      // Bounce
      const bty = Math.floor((pu.y + 14) / TILE);
      const btx = Math.floor((pu.x + 6) / TILE);
      if (isSolid(btx, bty)) {
        pu.y = bty * TILE - 14;
        pu.vy = -4;
      }
    } else {
      pu.vy = (pu.vy || 0) + 0.2;
      pu.y += pu.vy;
      const bty = Math.floor((pu.y + 14) / TILE);
      const btx = Math.floor((pu.x + 6) / TILE);
      if (isSolid(btx, bty)) {
        pu.y = bty * TILE - 14;
        pu.vy = 0;
      }
    }
    // Wall bounce
    const wtx = Math.floor((pu.x + (pu.vx > 0 ? 14 : 0)) / TILE);
    const wty = Math.floor((pu.y + 6) / TILE);
    if (isSolid(wtx, wty)) pu.vx = -pu.vx;

    // Player collect
    const pw = player.w;
    const ph = player.big ? 24 : player.h;
    if (!player.dead && player.x + 2 + pw > pu.x && player.x + 2 < pu.x + 14 &&
        player.y + ph > pu.y && player.y < pu.y + 14) {
      if (pu.type === 'mushroom') {
        player.big = true;
        player.h = 24;
        addScore(1000);
        spawnFloatText(pu.x, pu.y - 8, '1000', '#0f0');
        playSound('powerup');
      } else if (pu.type === 'star') {
        player.star = true;
        player.starTimer = 600; // 10 seconds
        addScore(1000);
        spawnFloatText(pu.x, pu.y - 8, 'STAR!', '#ff0');
        playSound('powerup');
      } else if (pu.type === 'fire') {
        player.big = true;
        player.fire = true;
        player.h = 24;
        addScore(1000);
        spawnFloatText(pu.x, pu.y - 8, 'FIRE!', '#f80');
        playSound('powerup');
      }
      powerUps.splice(i, 1);
    }

    // Remove if off screen
    if (pu.y > H + 20 || pu.x < camX - 40 || pu.x > camX + W + 40) {
      powerUps.splice(i, 1);
    }
  }
}

function updateFireballs() {
  for (let i = fireballs.length - 1; i >= 0; i--) {
    const fb = fireballs[i];
    fb.x += fb.vx;
    fb.vy += 0.25;
    fb.y += fb.vy;

    // Bounce off ground
    const fty = Math.floor((fb.y + 4) / TILE);
    const ftx = Math.floor((fb.x + 4) / TILE);
    if (isSolid(ftx, fty)) {
      fb.y = fty * TILE - 6;
      fb.vy = -3;
      fb.bounces++;
    }
    // Wall
    if (isSolid(Math.floor((fb.x + (fb.vx > 0 ? 6 : 0)) / TILE), Math.floor((fb.y + 2) / TILE))) {
      spawnParticles(fb.x, fb.y, '#f80', 4, 2);
      fireballs.splice(i, 1);
      continue;
    }

    // Hit enemy
    for (const e of enemies) {
      if (e.alive && Math.abs(fb.x - e.x) < 12 && Math.abs(fb.y - e.y) < 12) {
        e.alive = false;
        e.vy = -3;
        addScore(200);
        spawnFloatText(e.x, e.y - 8, '200', '#f80');
        spawnParticles(fb.x, fb.y, '#f80', 6, 3);
        playSound('stomp');
        fireballs.splice(i, 1);
        break;
      }
    }

    if (fb.bounces > 4 || fb.y > H || fb.x < camX - 20 || fb.x > camX + W + 20) {
      fireballs.splice(i, 1);
    }
  }
}

function updateBlockAnims() {
  for (let i = blockAnims.length - 1; i >= 0; i--) {
    const ba = blockAnims[i];
    ba.phase++;
    if (ba.phase < 6) ba.offsetY = -ba.phase;
    else ba.offsetY = -(12 - ba.phase);
    if (ba.phase >= 12) blockAnims.splice(i, 1);
  }
}

function updateMovingPlatforms() {
  for (const mp of (levelData.movingPlatforms || [])) {
    if (mp.vx !== 0) {
      mp.x += mp.vx;
      if (mp.x <= mp.minX || mp.x + mp.w >= (mp.maxX + 3) * TILE) mp.vx = -mp.vx;
      if (mp.x <= mp.minX) mp.x = mp.minX;
    }
    if (mp.vy !== 0) {
      mp.y += mp.vy;
      if (mp.y <= mp.minY || mp.y >= mp.maxY) mp.vy = -mp.vy;
    }
  }
}

function updateCamera() {
  const pw = player.w;
  const targetX = player.x - W / 2 + pw / 2 + player.facing * 20;
  camTarget = targetX;
  camX += (camTarget - camX) * 0.08;
  if (camX < 0) camX = 0;
  const maxCam = levelData.width * TILE - W;
  if (camX > maxCam) camX = maxCam;
}

function updateTimer() {
  if (player.dead || player.atFlag) return;
  timerAccum++;
  if (timerAccum >= 24) { // roughly 2.5 seconds per timer unit at 60fps
    timerAccum = 0;
    timer--;
    if (timer <= 0) {
      timer = 0;
      playerDie();
    }
  }
}

// --- DRAWING ---
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(1, SKY_BOT);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds() {
  for (const c of clouds) {
    const sx = c.x - camX * 0.3;
    if (sx > W + 40 || sx < -60) continue;
    ctx.fillStyle = COL.cloud;
    // Cloud shape: overlapping circles
    const cw = c.w;
    ctx.beginPath();
    ctx.arc(sx, c.y, cw * 0.3, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.25, c.y - cw * 0.12, cw * 0.35, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.55, c.y - cw * 0.05, cw * 0.28, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.35, c.y + cw * 0.05, cw * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHills() {
  for (const h2 of hills) {
    const sx = h2.x - camX * 0.5;
    if (sx > W + 60 || sx < -80) continue;
    ctx.fillStyle = COL.hill;
    ctx.beginPath();
    ctx.moveTo(sx - h2.w/2, H - 2 * TILE);
    ctx.quadraticCurveTo(sx, H - 2 * TILE - h2.h, sx + h2.w/2, H - 2 * TILE);
    ctx.fill();
    ctx.fillStyle = COL.hillDark;
    ctx.beginPath();
    ctx.moveTo(sx - h2.w/4, H - 2 * TILE);
    ctx.quadraticCurveTo(sx, H - 2 * TILE - h2.h * 0.5, sx + h2.w/4, H - 2 * TILE);
    ctx.fill();
  }
}

function drawBushes() {
  for (const b of bushes) {
    const sx = b.x - camX * 0.7;
    if (sx > W + 40 || sx < -40) continue;
    ctx.fillStyle = COL.bush;
    const by = H - 2 * TILE;
    ctx.beginPath();
    ctx.arc(sx, by, b.w * 0.3, Math.PI, 0);
    ctx.arc(sx + b.w * 0.3, by, b.w * 0.25, Math.PI, 0);
    ctx.arc(sx - b.w * 0.3, by, b.w * 0.22, Math.PI, 0);
    ctx.fill();
  }
}

function drawTile(tx, ty, type) {
  const sx = tx * TILE - camX;
  let sy = ty * TILE;

  // Check for block anim offset
  for (const ba of blockAnims) {
    if (ba.tx === tx && ba.ty === ty) {
      sy += ba.offsetY;
      break;
    }
  }

  if (sx < -TILE || sx > W + TILE) return;

  switch(type) {
    case T.GROUND:
      if (ty > 0 && tileAt(tx, ty-1) !== T.GROUND) {
        // Top of ground
        ctx.fillStyle = COL.groundTop;
        ctx.fillRect(sx, sy, TILE, 3);
        ctx.fillStyle = COL.ground;
        ctx.fillRect(sx, sy + 3, TILE, TILE - 3);
        ctx.fillStyle = COL.groundDark;
        ctx.fillRect(sx + 3, sy + 6, 2, 4);
        ctx.fillRect(sx + 10, sy + 9, 2, 3);
      } else {
        ctx.fillStyle = COL.ground;
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.fillStyle = COL.groundDark;
        ctx.fillRect(sx + 3, sy + 3, 2, 5);
        ctx.fillRect(sx + 10, sy + 7, 2, 4);
      }
      break;
    case T.BRICK:
      ctx.fillStyle = COL.brick;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = COL.brickDark;
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + 7, TILE, 1);
      ctx.fillRect(sx + 7, sy, 1, 8);
      ctx.fillRect(sx + 3, sy + 7, 1, 9);
      ctx.fillRect(sx + 11, sy + 7, 1, 9);
      ctx.fillStyle = COL.brickLight;
      ctx.fillRect(sx + 1, sy + 1, 5, 1);
      ctx.fillRect(sx + 1, sy + 8, 2, 1);
      break;
    case T.QUESTION:
      ctx.fillStyle = COL.question;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = COL.questionDark;
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + TILE-1, TILE, 1);
      ctx.fillRect(sx, sy, 1, TILE);
      ctx.fillRect(sx + TILE-1, sy, 1, TILE);
      // Draw "?"
      ctx.fillStyle = COL.questionBorder;
      ctx.fillRect(sx + 5, sy + 3, 6, 2);
      ctx.fillRect(sx + 9, sy + 5, 2, 3);
      ctx.fillRect(sx + 7, sy + 7, 2, 2);
      ctx.fillRect(sx + 7, sy + 11, 2, 2);
      // Shimmer
      if ((frame + tx * 7) % 40 < 10) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(sx + 2, sy + 2, 4, 4);
      }
      break;
    case T.USED:
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#664422';
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + TILE-1, TILE, 1);
      ctx.fillRect(sx, sy, 1, TILE);
      ctx.fillRect(sx + TILE-1, sy, 1, TILE);
      break;
    case T.PIPE_TL: case T.PIPE_ENTRY:
      ctx.fillStyle = COL.pipe;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = COL.pipeLight;
      ctx.fillRect(sx, sy, 3, TILE);
      ctx.fillStyle = COL.pipeDark;
      ctx.fillRect(sx + TILE - 2, sy, 2, TILE);
      // Top lip
      if (ty > 0 && tileAt(tx, ty-1) !== T.PIPE_TL && tileAt(tx, ty-1) !== T.PIPE_ENTRY) {
        ctx.fillStyle = COL.pipe;
        ctx.fillRect(sx - 2, sy, TILE + 2, 4);
        ctx.fillStyle = COL.pipeLight;
        ctx.fillRect(sx - 2, sy, 3, 4);
        ctx.fillStyle = COL.pipeDark;
        ctx.fillRect(sx + TILE - 1, sy, 2, 4);
      }
      break;
    case T.PIPE_TR:
      ctx.fillStyle = COL.pipe;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = COL.pipeLight;
      ctx.fillRect(sx, sy, 2, TILE);
      ctx.fillStyle = COL.pipeDark;
      ctx.fillRect(sx + TILE - 3, sy, 3, TILE);
      // Top lip
      if (ty > 0 && tileAt(tx, ty-1) !== T.PIPE_TR) {
        ctx.fillStyle = COL.pipe;
        ctx.fillRect(sx, sy, TILE + 2, 4);
        ctx.fillStyle = COL.pipeLight;
        ctx.fillRect(sx, sy, 2, 4);
        ctx.fillStyle = COL.pipeDark;
        ctx.fillRect(sx + TILE, sy, 3, 4);
      }
      break;
    case T.COIN:
      // Animated spinning coin
      const cphase = Math.sin((frame + tx * 5) * 0.1);
      const cw = Math.max(2, Math.abs(cphase) * 8);
      ctx.fillStyle = COL.coin;
      ctx.fillRect(sx + 8 - cw/2, sy + 3, cw, 10);
      ctx.fillStyle = COL.coinShine;
      ctx.fillRect(sx + 8 - cw/4, sy + 4, cw/2, 3);
      break;
    case T.FLAG_POLE:
      ctx.fillStyle = COL.flagPole;
      ctx.fillRect(sx + 7, sy, 2, TILE);
      break;
    case T.FLAG_TOP:
      ctx.fillStyle = COL.flagPole;
      ctx.fillRect(sx + 7, sy, 2, TILE);
      // Ball on top
      ctx.fillStyle = '#0f0';
      ctx.fillRect(sx + 5, sy, 6, 6);
      break;
    case T.INVIS:
      // Don't draw invisible blocks
      break;
  }
}

function drawFlag() {
  if (!levelData.flagX) return;
  const fx = levelData.flagX * TILE - camX;
  // Flag triangle
  const fy = flagSlideY || 4 * TILE;
  ctx.fillStyle = COL.flag;
  ctx.beginPath();
  ctx.moveTo(fx + 8, fy);
  ctx.lineTo(fx + 8, fy + 12);
  ctx.lineTo(fx - 4, fy + 6);
  ctx.fill();
}

function drawPlayer() {
  if (player.dead && player.deadTimer < 5) return; // brief flash
  if (player.invincible > 0 && frame % 4 < 2) return; // blink

  const pw = player.w;
  const ph = player.big ? 24 : player.h;
  const sx = Math.floor(player.x - camX);
  const sy = Math.floor(player.y);
  const f = player.facing;

  // Star rainbow effect
  let bodyColor = player.fire ? '#fff' : (nftColor || COL.player);
  let hatColor = player.fire ? (nftColor || '#e04040') : (nftColor || COL.playerHat);
  if (player.star) {
    const colors = ['#f00','#ff0','#0f0','#0ff','#f0f','#fff'];
    const ci = Math.floor(frame / 3) % colors.length;
    bodyColor = colors[ci];
    hatColor = colors[(ci + 2) % colors.length];
  }

  ctx.save();
  ctx.translate(sx + pw/2, sy + ph);

  // Squash & stretch
  const sq = player.squash;
  ctx.scale(2 - sq, sq);

  const dx = -pw/2;
  const dy = -ph;

  if (player.big) {
    // Big player (24 tall)
    // Hat
    ctx.fillStyle = hatColor;
    ctx.fillRect(dx + 1, dy, 10, 4);
    ctx.fillRect(dx + 0, dy + 2, 12, 3);
    // Face
    ctx.fillStyle = COL.playerSkin;
    ctx.fillRect(dx + 1, dy + 5, 10, 5);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(dx + (f > 0 ? 7 : 3), dy + 6, 2, 2);
    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(dx + 1, dy + 10, 10, 7);
    // Belt
    ctx.fillStyle = '#804020';
    ctx.fillRect(dx + 2, dy + 14, 8, 2);
    // Legs
    const legOffset = player.onGround ? (player.animFrame === 1 ? 2 : player.animFrame === 2 ? -1 : 0) : 0;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(dx + 1, dy + 17, 4, 5);
    ctx.fillRect(dx + 7, dy + 17, 4, 5);
    // Shoes
    ctx.fillStyle = COL.playerShoe;
    ctx.fillRect(dx + 0 + legOffset, dy + 21, 5, 3);
    ctx.fillRect(dx + 7 - legOffset, dy + 21, 5, 3);
    // Fire flower indicator
    if (player.fire) {
      ctx.fillStyle = '#f80';
      ctx.fillRect(dx + 4, dy + 11, 4, 2);
    }
  } else {
    // Small player (14 tall)
    // Hat
    ctx.fillStyle = hatColor;
    ctx.fillRect(dx + 1, dy, 10, 3);
    ctx.fillRect(dx + 0, dy + 1, 12, 2);
    // Face
    ctx.fillStyle = COL.playerSkin;
    ctx.fillRect(dx + 2, dy + 3, 8, 4);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(dx + (f > 0 ? 7 : 3), dy + 4, 2, 2);
    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(dx + 2, dy + 7, 8, 4);
    // Legs
    const lo = player.onGround ? (player.animFrame === 1 ? 1 : player.animFrame === 2 ? -1 : 0) : 0;
    ctx.fillStyle = bodyColor;
    ctx.fillRect(dx + 2, dy + 11, 3, 3);
    ctx.fillRect(dx + 7, dy + 11, 3, 3);
    // Shoes
    ctx.fillStyle = COL.playerShoe;
    ctx.fillRect(dx + 1 + lo, dy + 12, 4, 2);
    ctx.fillRect(dx + 7 - lo, dy + 12, 4, 2);
  }

  // Jump pose
  if (!player.onGround && !player.dead) {
    // Arms up visual: small accents
    ctx.fillStyle = bodyColor;
    if (player.big) {
      ctx.fillRect(dx - 1, dy + 8, 2, 4);
      ctx.fillRect(dx + 11, dy + 8, 2, 4);
    } else {
      ctx.fillRect(dx + 0, dy + 6, 2, 3);
      ctx.fillRect(dx + 10, dy + 6, 2, 3);
    }
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive && !e.stomped) return;
  const sx = Math.floor(e.x - camX);
  const sy = Math.floor(e.y);
  if (sx < -20 || sx > W + 20) return;

  if (e.stomped) {
    // Flat squished sprite
    ctx.fillStyle = COL.mushEnemy;
    ctx.fillRect(sx, sy + 10, 14, 4);
    ctx.fillStyle = COL.mushEnemyDark;
    ctx.fillRect(sx + 2, sy + 11, 3, 2);
    ctx.fillRect(sx + 9, sy + 11, 3, 2);
    return;
  }

  if (e.type === 'goomba') {
    // Mushroom enemy
    ctx.fillStyle = COL.mushEnemy;
    // Head (rounded top)
    ctx.fillRect(sx + 1, sy, 12, 6);
    ctx.fillRect(sx, sy + 2, 14, 4);
    ctx.fillStyle = COL.mushEnemyDark;
    // Eyes
    ctx.fillRect(sx + 2, sy + 3, 3, 3);
    ctx.fillRect(sx + 9, sy + 3, 3, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 3, 2, 2);
    ctx.fillRect(sx + 10, sy + 3, 2, 2);
    // Body
    ctx.fillStyle = COL.mushEnemyDark;
    ctx.fillRect(sx + 2, sy + 6, 10, 6);
    // Feet
    ctx.fillStyle = '#000';
    const footOff = e.animFrame === 0 ? 0 : 2;
    ctx.fillRect(sx + 1 - footOff, sy + 11, 4, 3);
    ctx.fillRect(sx + 9 + footOff, sy + 11, 4, 3);
    // Angry eyebrows
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 2, sy + 2, 3, 1);
    ctx.fillRect(sx + 9, sy + 2, 3, 1);
  } else if (e.type === 'turtle') {
    if (e.shell) {
      // Shell
      ctx.fillStyle = COL.turtleGreen;
      ctx.fillRect(sx + 1, sy + 2, 12, 10);
      ctx.fillRect(sx + 3, sy, 8, 14);
      ctx.fillStyle = COL.turtleDark;
      ctx.fillRect(sx + 5, sy + 3, 4, 8);
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx + 6, sy + 5, 2, 4);
      return;
    }
    // Turtle with shell
    ctx.fillStyle = COL.turtleGreen;
    // Shell body
    ctx.fillRect(sx + 1, sy + 2, 12, 8);
    ctx.fillRect(sx + 3, sy, 8, 12);
    ctx.fillStyle = COL.turtleDark;
    ctx.fillRect(sx + 5, sy + 2, 4, 8);
    // Head
    ctx.fillStyle = COL.turtleGreen;
    ctx.fillRect(sx + (e.vx < 0 ? -2 : 12), sy + 2, 4, 5);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + (e.vx < 0 ? -1 : 13), sy + 3, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + (e.vx < 0 ? -1 : 14), sy + 3, 1, 2);
    // Feet
    ctx.fillStyle = '#d08050';
    const ftOff = e.animFrame === 0 ? 0 : 1;
    ctx.fillRect(sx + 2 - ftOff, sy + 11, 4, 3);
    ctx.fillRect(sx + 8 + ftOff, sy + 11, 4, 3);
  } else if (e.type === 'fly') {
    // Flying bug
    ctx.fillStyle = COL.flyEnemy;
    ctx.fillRect(sx + 3, sy + 3, 8, 8);
    ctx.fillRect(sx + 1, sy + 5, 12, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 4, 3, 3);
    ctx.fillRect(sx + 8, sy + 4, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 4, sy + 5, 1, 1);
    ctx.fillRect(sx + 9, sy + 5, 1, 1);
    // Wings
    ctx.fillStyle = COL.flyWing;
    const wingUp = Math.sin(frame * 0.3 + e.flyPhase) > 0;
    if (wingUp) {
      ctx.fillRect(sx - 2, sy - 2, 6, 5);
      ctx.fillRect(sx + 10, sy - 2, 6, 5);
    } else {
      ctx.fillRect(sx - 1, sy + 1, 5, 4);
      ctx.fillRect(sx + 10, sy + 1, 5, 4);
    }
  }
}

function drawPowerUp(pu) {
  const sx = Math.floor(pu.x - camX);
  const sy = Math.floor(pu.y);

  if (pu.type === 'mushroom') {
    // Red mushroom
    ctx.fillStyle = '#f00';
    ctx.fillRect(sx + 1, sy, 12, 6);
    ctx.fillRect(sx, sy + 2, 14, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 1, 3, 3);
    ctx.fillRect(sx + 8, sy + 1, 3, 3);
    ctx.fillStyle = '#f8d890';
    ctx.fillRect(sx + 2, sy + 6, 10, 6);
    ctx.fillRect(sx + 4, sy + 12, 6, 2);
  } else if (pu.type === 'star') {
    // Star (flashing)
    const c = frame % 6 < 3 ? '#ff0' : '#fff';
    ctx.fillStyle = c;
    ctx.fillRect(sx + 5, sy, 4, 3);
    ctx.fillRect(sx + 1, sy + 3, 12, 4);
    ctx.fillRect(sx + 3, sy + 7, 3, 4);
    ctx.fillRect(sx + 8, sy + 7, 3, 4);
    ctx.fillRect(sx + 4, sy + 3, 6, 6);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 4, sy + 4, 2, 2);
    ctx.fillRect(sx + 8, sy + 4, 2, 2);
  } else if (pu.type === 'fire') {
    // Fire flower
    ctx.fillStyle = '#f80';
    ctx.fillRect(sx + 3, sy + 2, 8, 6);
    ctx.fillRect(sx + 5, sy, 4, 2);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(sx + 5, sy + 3, 4, 3);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(sx + 6, sy + 8, 2, 6);
    ctx.fillRect(sx + 4, sy + 10, 2, 2);
    ctx.fillRect(sx + 8, sy + 10, 2, 2);
  }
}

function drawFireball(fb) {
  const sx = Math.floor(fb.x - camX);
  const sy = Math.floor(fb.y);
  const rot = frame * 0.5;
  ctx.save();
  ctx.translate(sx + 3, sy + 3);
  ctx.rotate(rot);
  ctx.fillStyle = '#f80';
  ctx.fillRect(-3, -3, 6, 6);
  ctx.fillStyle = '#ff0';
  ctx.fillRect(-2, -2, 4, 4);
  ctx.restore();
}

function drawMovingPlatforms() {
  for (const mp of (levelData.movingPlatforms || [])) {
    const sx = Math.floor(mp.x - camX);
    const sy = Math.floor(mp.y);
    if (sx > W + 20 || sx + mp.w < -20) continue;

    ctx.fillStyle = '#c09060';
    ctx.fillRect(sx, sy, mp.w, 8);
    ctx.fillStyle = '#a07040';
    ctx.fillRect(sx, sy, mp.w, 2);
    ctx.fillRect(sx, sy + 6, mp.w, 2);
    // Rivets
    ctx.fillStyle = '#806030';
    for (let rx = 4; rx < mp.w; rx += 10) {
      ctx.fillRect(sx + rx, sy + 3, 2, 2);
    }
  }
}

function drawHUD() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 14);

  ctx.font = '8px monospace';
  ctx.textAlign = 'left';

  // Coins
  ctx.fillStyle = COL.coin;
  ctx.fillRect(4, 3, 6, 8);
  ctx.fillStyle = '#fff';
  ctx.fillText('x' + coins, 12, 10);

  // Score
  ctx.fillStyle = '#fff';
  ctx.fillText(String(score).padStart(6, '0'), 50, 10);

  // Level
  ctx.fillText('W' + level, 115, 10);

  // Lives
  ctx.fillStyle = COL.player;
  ctx.fillRect(145, 4, 6, 7);
  ctx.fillStyle = '#fff';
  ctx.fillText('x' + lives, 153, 10);

  // Timer
  ctx.fillStyle = timer < 100 ? '#f44' : '#fff';
  ctx.fillText('T' + String(timer).padStart(3, '0'), 200, 10);

  // Hi score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.fillText('HI:' + hiScore, W - 4, 10);
  ctx.textAlign = 'left';
}

function drawBonusRoom() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Brick border
  for (let x = 0; x < W; x += TILE) {
    ctx.fillStyle = COL.brick;
    ctx.fillRect(x, 0, TILE, TILE);
    ctx.fillRect(x, H - TILE, TILE, TILE);
    ctx.fillStyle = COL.brickDark;
    ctx.fillRect(x, 0, TILE, 1);
    ctx.fillRect(x + 7, 0, 1, TILE);
    ctx.fillRect(x, H - TILE, TILE, 1);
    ctx.fillRect(x + 7, H - TILE, 1, TILE);
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BONUS ROOM!', W/2, H/2 - 30);

  // Animated coins
  const displayCoins = Math.max(0, bonusCoins);
  ctx.font = '12px monospace';
  ctx.fillStyle = COL.coin;
  ctx.fillText('Coins: +' + (Math.floor(bonusCoinTimer / 8)), W/2, H/2);

  // Coin rain animation
  for (let i = 0; i < 5; i++) {
    const cx = (W/2 - 40) + i * 20;
    const cy = H/2 + 20 + Math.sin(frame * 0.1 + i) * 15;
    const cphase = Math.sin((frame + i * 7) * 0.1);
    const cw2 = Math.max(2, Math.abs(cphase) * 8);
    ctx.fillStyle = COL.coin;
    ctx.fillRect(cx - cw2/2, cy, cw2, 10);
    ctx.fillStyle = COL.coinShine;
    ctx.fillRect(cx - cw2/4, cy + 1, cw2/2, 3);
  }

  drawHUD();
}

// --- TITLE SCREEN ---
let titleBounce = 0;

function drawTitle() {
  drawSky();

  // Ground
  ctx.fillStyle = COL.groundTop;
  ctx.fillRect(0, H - 30, W, 4);
  ctx.fillStyle = COL.ground;
  ctx.fillRect(0, H - 26, W, 26);

  // Clouds
  ctx.fillStyle = COL.cloud;
  ctx.beginPath();
  ctx.arc(50, 40, 15, 0, Math.PI * 2);
  ctx.arc(65, 35, 18, 0, Math.PI * 2);
  ctx.arc(80, 40, 13, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(180, 55, 12, 0, Math.PI * 2);
  ctx.arc(195, 50, 15, 0, Math.PI * 2);
  ctx.arc(208, 55, 11, 0, Math.PI * 2);
  ctx.fill();

  // Hills
  ctx.fillStyle = COL.hill;
  ctx.beginPath();
  ctx.moveTo(0, H - 30);
  ctx.quadraticCurveTo(60, H - 70, 120, H - 30);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(150, H - 30);
  ctx.quadraticCurveTo(200, H - 55, 256, H - 30);
  ctx.fill();

  // Title
  titleBounce = Math.sin(frame * 0.05) * 6;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  // Shadow
  ctx.fillStyle = '#000';
  ctx.fillText('JUMPY BROS', W/2 + 2, 70 + titleBounce + 2);
  // Main text
  ctx.fillStyle = '#f8d830';
  ctx.fillText('JUMPY BROS', W/2, 70 + titleBounce);
  // Outline effect
  ctx.strokeStyle = '#c84c0c';
  ctx.lineWidth = 1;
  ctx.strokeText('JUMPY BROS', W/2, 70 + titleBounce);

  // Character bouncing on title screen
  const charY = H - 46 + Math.abs(Math.sin(frame * 0.08)) * 16;
  // Simple player drawing at title
  var titleNftColor = (window.NftLoader && window.NftLoader.selectedCharacter) ? window.NftLoader.selectedCharacter.color : null;
  ctx.fillStyle = titleNftColor || COL.playerHat;
  ctx.fillRect(W/2 - 5, charY, 10, 3);
  ctx.fillRect(W/2 - 6, charY + 1, 12, 2);
  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(W/2 - 4, charY + 3, 8, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(W/2 + 1, charY + 4, 2, 2);
  ctx.fillStyle = titleNftColor || COL.player;
  ctx.fillRect(W/2 - 4, charY + 7, 8, 4);
  ctx.fillStyle = COL.playerShoe;
  ctx.fillRect(W/2 - 5, charY + 10, 4, 2);
  ctx.fillRect(W/2 + 1, charY + 10, 4, 2);

  // Coins floating around
  for (let i = 0; i < 4; i++) {
    const cx = 40 + i * 55;
    const cy = 100 + Math.sin(frame * 0.06 + i * 1.5) * 10;
    const cphase = Math.sin((frame + i * 10) * 0.12);
    const cw2 = Math.max(2, Math.abs(cphase) * 6);
    ctx.fillStyle = COL.coin;
    ctx.fillRect(cx - cw2/2, cy, cw2, 8);
    ctx.fillStyle = COL.coinShine;
    ctx.fillRect(cx - cw2/4, cy + 1, cw2/2, 3);
  }

  // Instructions
  ctx.font = '8px monospace';
  ctx.fillStyle = (frame % 60 < 40) ? '#fff' : '#aaa';
  ctx.fillText('PRESS SPACE TO START', W/2, 150);

  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.fillText('ARROWS/WASD: Move  SPACE: Jump  SHIFT: Run', W/2, 175);
  ctx.fillText('Z: Run/Fire', W/2, 186);

  // High score
  if (hiScore > 0) {
    ctx.fillStyle = '#f8d830';
    ctx.fillText('HIGH SCORE: ' + hiScore, W/2, 200);
  }

  // NFT status
  if (window.NftLoader && window.NftLoader.selectedCharacter) {
    ctx.fillStyle = window.NftLoader.selectedCharacter.color || '#a855f7';
    ctx.font = '7px monospace';
    ctx.fillText('Playing as: ' + window.NftLoader.selectedCharacter.name, W/2, 213);
    ctx.fillStyle = '#8f8';
    ctx.fillText('+1 Life \u00B7 1.5x Score', W/2, 222);
  } else if (window.ethereum && window.NftLoader && !window.NftLoader.wallet) {
    ctx.fillStyle = '#666';
    ctx.font = '6px monospace';
    ctx.fillText('Press W to Connect Wallet for NFT Bonuses', W/2, 216);
  }

  // Pipe decoration
  ctx.fillStyle = COL.pipe;
  ctx.fillRect(20, H - 46, TILE, 16);
  ctx.fillRect(20, H - 30, TILE, 4);
  ctx.fillStyle = COL.pipeLight;
  ctx.fillRect(20, H - 46, 3, 16);
  ctx.fillRect(18, H - 46, TILE + 2, 4);

  ctx.fillStyle = COL.pipe;
  ctx.fillRect(W - 36, H - 46, TILE, 16);
  ctx.fillRect(W - 36, H - 30, TILE, 4);
  ctx.fillStyle = COL.pipeLight;
  ctx.fillRect(W - 36, H - 46, 3, 16);
  ctx.fillRect(W - 38, H - 46, TILE + 2, 4);

  // Question blocks on ground
  for (let i = 0; i < 3; i++) {
    const qx = 80 + i * 32;
    const qy = H - 30 - 20 - Math.abs(Math.sin(frame * 0.04 + i)) * 4;
    ctx.fillStyle = COL.question;
    ctx.fillRect(qx, qy, TILE, TILE);
    ctx.fillStyle = COL.questionDark;
    ctx.fillRect(qx, qy, TILE, 1);
    ctx.fillRect(qx, qy + TILE - 1, TILE, 1);
    ctx.fillRect(qx, qy, 1, TILE);
    ctx.fillRect(qx + TILE - 1, qy, 1, TILE);
    ctx.fillStyle = COL.questionBorder;
    ctx.fillRect(qx + 5, qy + 3, 6, 2);
    ctx.fillRect(qx + 9, qy + 5, 2, 2);
    ctx.fillRect(qx + 7, qy + 7, 2, 2);
    ctx.fillRect(qx + 7, qy + 11, 2, 2);
  }
}

function drawGameOver() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  if (level > 3 || (level === 3 && state === 'gameOver' && lives >= 0 && player.atFlag)) {
    // Win screen
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#f8d830';
    ctx.fillText('YOU WIN!', W/2, 60);

    ctx.font = '10px monospace';
    ctx.fillStyle = '#fff';
    ctx.fillText('Congratulations!', W/2, 85);
  } else {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#e04040';
    ctx.fillText('GAME OVER', W/2, 60);
  }

  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('SCORE: ' + score, W/2, 110);
  ctx.fillText('COINS: ' + coins, W/2, 126);

  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('jumpyBrosHiScore', hiScore.toString());
    ctx.fillStyle = '#f8d830';
    ctx.fillText('NEW HIGH SCORE!', W/2, 150);
  } else {
    ctx.fillStyle = '#888';
    ctx.fillText('HI SCORE: ' + hiScore, W/2, 150);
  }

  ctx.fillStyle = (frame % 60 < 40) ? '#fff' : '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('PRESS SPACE TO PLAY AGAIN', W/2, 185);

  // Sad/happy character
  const charY = 200;
  ctx.fillStyle = COL.playerHat;
  ctx.fillRect(W/2 - 5, charY, 10, 3);
  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(W/2 - 4, charY + 3, 8, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(W/2 - 2, charY + 4, 2, 2);
  ctx.fillRect(W/2 + 2, charY + 4, 2, 2);
  ctx.fillStyle = COL.player;
  ctx.fillRect(W/2 - 4, charY + 7, 8, 5);
}

// --- MAIN LOOP ---
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  frame++;

  // Resume audio context on user interaction
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  if (state === 'title') {
    drawTitle();
    if (inputAny()) {
      level = 1; lives = 3; score = 0; coins = 0;
      scoreMultiplier = 1;
      nftColor = null;
      if (window.NftLoader && window.NftLoader.selectedCharacter) {
        var bonuses = window.NftLoader.getBonuses();
        lives += bonuses.lives;
        scoreMultiplier = bonuses.scoreMultiplier;
        nftColor = bonuses.color;
      }
      resetPlayer();
      initLevel(level);
    }
  } else if (state === 'playing') {
    updatePlayer(dt);
    updateEnemies();
    updatePowerUps();
    updateFireballs();
    updateBlockAnims();
    updateMovingPlatforms();
    updateParticles();
    updateFloatTexts();
    updateCamera();
    updateTimer();

    // Draw
    drawSky();
    drawClouds();
    drawHills();
    drawBushes();

    // Draw tiles
    const startTx = Math.max(0, Math.floor(camX / TILE) - 1);
    const endTx = Math.min(levelData.width, Math.ceil((camX + W) / TILE) + 1);
    for (let ty = 0; ty < levelData.height; ty++) {
      for (let tx = startTx; tx < endTx; tx++) {
        const t = levelData.tiles[ty][tx];
        if (t !== T.EMPTY) drawTile(tx, ty, t);
      }
    }

    drawMovingPlatforms();
    drawFlag();

    // Draw power-ups
    for (const pu of powerUps) drawPowerUp(pu);

    // Draw enemies
    for (const e of enemies) drawEnemy(e);

    // Draw fireballs
    for (const fb of fireballs) drawFireball(fb);

    // Draw player
    drawPlayer();

    drawParticles(camX);
    drawFloatTexts(camX);
    drawHUD();

  } else if (state === 'dying') {
    // This state is handled by player.dead within 'playing'

  } else if (state === 'bonusRoom') {
    updateBonusRoom();
    drawBonusRoom();

  } else if (state === 'gameOver') {
    drawGameOver();
    if (inputAny() && frame > 30) {
      state = 'title';
      frame = 0;
    }
  }

  requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);

</script>
