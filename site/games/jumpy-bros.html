<script>
// ============================================================
// SPORE BROS - A Baseling platformer
// ============================================================

// --- BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ---
// This game runs its OWN engine (no TAS), so it talks to BaselingPlayer/BaselingSprites
// directly. Single source of stat math: getMults() -> {moveSpeed,health,damage,luck,swim}
// clamped to the single-player band (0.8–1.6). Derived MULT constants are reassigned from
// the bounded mults; statB's D&D fields are synthesized so the title stat line still reads.
// Not a wager game.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1,
  str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[jumpy-bros] NftLoader display info failed:', e && e.message); }

// Derived stat modifiers — (re)assigned by recomputeStats().
var STR_MULT, DEX_MULT, CON_MULT, INT_MULT, WIS_MULT, CHA_MULT, STAT_LEVEL;
var BASELING_COLOR = statB.color, BASELING_NAME = statB.name;
var picking = false; // baseling character-select overlay open
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage; statB.speed = m.moveSpeed; statB.hpMult = m.health; statB.luck = m.luck;
  statB.cooldown = 1 / m.moveSpeed; statB.scoreMult = 1; statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck); statB.wis = dnd(m.moveSpeed); statB.cha = dnd(m.luck);
  statB.level = Math.round((statB.str + statB.dex + statB.con + statB.int + statB.wis + statB.cha) / 6);
  STR_MULT = m.damage;             // stomp/brick power
  DEX_MULT = Math.min(1.25, m.moveSpeed); // run speed + jump (capped so 1.6x can't overshoot)
  CON_MULT = m.health;             // HP/lives/resist
  INT_MULT = 1;                    // score is not a stat
  WIS_MULT = m.moveSpeed;          // power-up duration (SPD flavor)
  CHA_MULT = m.luck;               // coin/item drops
  STAT_LEVEL = statB.level; BASELING_COLOR = statB.color; BASELING_NAME = statB.name;
}
recomputeStats();
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[jumpy-bros] player init failed:', e && e.message); });
}

// Local sprite-draw helper (no TAS engine here). Returns true if a real sprite drew.
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// --- SIZING ---
const TILE = 16;
const COLS = 16 * 2;
const ROWS = 15;
let SCALE = 1;
let W, H;

function resize() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight - 30;
  const baseW = 256;
  const baseH = 240;
  SCALE = Math.min(Math.floor(maxW / baseW), Math.floor(maxH / baseH));
  if (SCALE < 1) SCALE = 1;
  if (SCALE > 4) SCALE = 4;
  if (SCALE < 2 && maxW < 600) {
    SCALE = Math.min(maxW / baseW, maxH / baseH);
  }
  W = baseW;
  H = baseH;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = Math.floor(W * SCALE) + 'px';
  canvas.style.height = Math.floor(H * SCALE) + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- SCREEN SHAKE ---
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDur = 0;
function triggerShake(mag, dur) { shakeMag = mag; shakeDur = dur; }
function updateShake() {
  if (shakeDur > 0) {
    shakeDur--;
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.9;
  } else { shakeX = 0; shakeY = 0; }
}

// --- TOUCH CONTROLS ---
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchBtns = document.querySelectorAll('.touch-btn');
if (isMobile) {
  touchBtns.forEach(b => b.style.display = 'flex');
}

const touchState = { left: false, right: false, jump: false, run: false };
function setupTouch(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); touchState[key] = true; }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); touchState[key] = false; }, { passive: false });
  el.addEventListener('touchcancel', e => { touchState[key] = false; });
}
setupTouch('btn-left', 'left');
setupTouch('btn-right', 'right');
setupTouch('btn-jump', 'jump');
setupTouch('btn-run', 'run');

// --- INPUT ---
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code === 'KeyW' && state === 'title' && window.NftLoader && !window.NftLoader.wallet && window.ethereum) {
    window.NftLoader.connectWallet().then(function(addr) {
      if (addr) window.NftLoader.checkNFTs().then(function(chars) {
        if (chars.length > 0) window.NftLoader.selectedCharacter = chars[0];
      });
    });
    return;
  }
  // C on the title opens the baseling picker
  if (e.code === 'KeyC' && state === 'title' && !picking && window.BaselingPlayer) {
    keys['KeyC'] = false;
    picking = true;
    BaselingPlayer.select(function () { recomputeStats(); picking = false; });
    return;
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function inputLeft() { return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; }
function inputRight() { return keys['ArrowRight'] || keys['KeyD'] || touchState.right; }
function inputJump() { return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jump; }
function inputRun() { return keys['ShiftLeft'] || keys['ShiftRight'] || keys['KeyZ'] || touchState.run; }
function inputAny() { return keys['Space'] || keys['Enter'] || keys['KeyZ'] || touchState.jump; }
function inputDown() { return keys['ArrowDown'] || keys['KeyS']; }

// --- AUDIO ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.value = 0.15;
    const t = audioCtx.currentTime;

    switch(type) {
      case 'jump':
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(600, t + 0.15);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'coin':
        osc.type = 'square';
        osc.frequency.setValueAtTime(988, t);
        osc.frequency.setValueAtTime(1319, t + 0.05);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'stomp':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(100, t + 0.1);
        gain.gain.linearRampToValueAtTime(0, t + 0.12);
        osc.start(t); osc.stop(t + 0.12);
        break;
      case 'powerup':
        osc.type = 'square';
        osc.frequency.setValueAtTime(523, t);
        osc.frequency.setValueAtTime(659, t + 0.08);
        osc.frequency.setValueAtTime(784, t + 0.16);
        osc.frequency.setValueAtTime(1047, t + 0.24);
        gain.gain.linearRampToValueAtTime(0, t + 0.4);
        osc.start(t); osc.stop(t + 0.4);
        break;
      case 'break':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, t);
        osc.frequency.linearRampToValueAtTime(50, t + 0.15);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'die':
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, t);
        osc.frequency.linearRampToValueAtTime(100, t + 0.5);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.6);
        osc.start(t); osc.stop(t + 0.6);
        break;
      case 'flag':
        osc.type = 'square';
        [523,659,784,1047,784,1047].forEach((f, i) => {
          osc.frequency.setValueAtTime(f, t + i * 0.1);
        });
        gain.gain.linearRampToValueAtTime(0, t + 0.7);
        osc.start(t); osc.stop(t + 0.7);
        break;
      case 'fireball':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(800, t);
        osc.frequency.linearRampToValueAtTime(200, t + 0.1);
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
        break;
      case 'bump':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.linearRampToValueAtTime(80, t + 0.08);
        gain.gain.linearRampToValueAtTime(0, t + 0.08);
        osc.start(t); osc.stop(t + 0.08);
        break;
      case 'pipe':
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.linearRampToValueAtTime(50, t + 0.3);
        gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
        break;
      case '1up':
        osc.type = 'square';
        [330,392,523,659,784,1047].forEach((f,i) => {
          osc.frequency.setValueAtTime(f, t + i*0.06);
        });
        gain.gain.linearRampToValueAtTime(0, t+0.5);
        osc.start(t); osc.stop(t+0.5);
        break;
      case 'boss_hit':
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.linearRampToValueAtTime(60, t + 0.2);
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.25);
        osc.start(t); osc.stop(t + 0.25);
        break;
      case 'boss_die':
        osc.type = 'square';
        [200,180,160,140,120,100,80,60].forEach((f,i) => {
          osc.frequency.setValueAtTime(f, t + i*0.08);
        });
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.7);
        osc.start(t); osc.stop(t + 0.7);
        break;
      case 'spore':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.linearRampToValueAtTime(900, t + 0.12);
        gain.gain.setValueAtTime(0.08, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.start(t); osc.stop(t + 0.15);
        break;
      case 'goo':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.linearRampToValueAtTime(60, t + 0.2);
        gain.gain.setValueAtTime(0.12, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.25);
        osc.start(t); osc.stop(t + 0.25);
        break;
    }
  } catch(e) { console.warn('Audio error:', e); }
}

const SKY_TOP = '#3cacd7';

};

// --- TILE TYPES ---
const T = {
  EMPTY: 0, GROUND: 1, BRICK: 2, QUESTION: 3, USED: 4, PIPE_TL: 5, PIPE_TR: 6,
  PIPE_BL: 7, PIPE_BR: 8, COIN: 9, FLAG_POLE: 10, FLAG_TOP: 11,
  PIPE_ENTRY: 12, INVIS: 13, GOO: 14
};

// --- PARTICLES ---
let particles = [];
function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * spread, vy: -Math.random() * spread * 0.8 - 1,
      life: 30 + Math.random() * 20, maxLife: 50, color, size: 2 + Math.random() * 2
    });
  }
}
function spawnBlockPieces(x, y) {
  for (let i = 0; i < 4; i++) {
    const dx = (i % 2) * 8 - 4;
    const dy = Math.floor(i / 2) * 8 - 4;
    particles.push({
      x: x + dx, y: y + dy, vx: dx * 0.3 + (Math.random()-0.5)*2, vy: -3 - Math.random()*2,
      life: 40, maxLife: 40, color: COL.brick, size: 6, gravity: true, rotation: Math.random() * 6.28
    });
  }
}
function spawnSporeCloud(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: x + (Math.random()-0.5)*10, y: y + (Math.random()-0.5)*6,
      vx: (Math.random()-0.5)*1.5, vy: -Math.random()*1.5 - 0.5,
      life: 25 + Math.random()*15, maxLife: 40,
      color: ['#38d973','#50e880','#28a050'][Math.floor(Math.random()*3)],
      size: 3 + Math.random()*3
    });
  }
}
function spawnGooSplash(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*3, vy: -Math.random()*3 - 1,
      life: 20 + Math.random()*10, maxLife: 30,
      color: ['#a855f7','#8833cc','#c488ff'][Math.floor(Math.random()*3)],
      size: 2 + Math.random()*3, gravity: true
    });
  }
}
function spawnBossExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = (i / 20) * Math.PI * 2;
    particles.push({
      x, y, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3 - 1,
      life: 40 + Math.random()*20, maxLife: 60,
      color: ['#ff4444','#ff8800','#ffff00','#ffffff'][Math.floor(Math.random()*4)],
      size: 3 + Math.random()*4, gravity: true
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += 0.15;
    else p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(camX) {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.rotation !== undefined) {
      ctx.save();
      ctx.translate(p.x - camX, p.y);
      ctx.rotate(p.rotation);
      p.rotation += 0.1;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    } else {
      ctx.fillRect(p.x - camX - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// --- FLOATING TEXT / SCORE POPUPS ---
let floatingTexts = [];
function spawnFloatText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color: color || '#fff', life: 40, vy: -1.2 });
}
function spawnScorePopup(x, y, pts, color) {
  var actual = Math.floor(pts * INT_MULT); // [statB ref 1: INT boosts score]
  spawnFloatText(x, y, '+' + actual, color || '#fff');
  return actual;
}
function updateFloatTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y += floatingTexts[i].vy;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatTexts(camX) {
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  for (const ft of floatingTexts) {
    ctx.globalAlpha = Math.min(1, ft.life / 15);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ft.x - camX, ft.y);
    ctx.globalAlpha = 1;
  }
}

// --- LEVEL DATA ---
function createLevel(num) {
  const h = ROWS;
  let tiles, enemies, coins, width, pipeWarps = [], playerStart, flagX;
  let bossData = null;

  if (num === 1) {
    // World 1: Garden Grounds - Tutorial
    width = 210;
    tiles = Array.from({length: h}, () => new Array(width).fill(0));
    for (let x = 0; x < width; x++) {
      if ((x >= 68 && x <= 70) || (x >= 140 && x <= 142)) continue;
      tiles[h-1][x] = T.GROUND;
      tiles[h-2][x] = T.GROUND;
    }
    // Goo pits in the gaps

  }
  for (let x = 30; x < width * TILE; x += 50 + Math.random() * 70) {
    bushes.push({ x, w: 15 + Math.random() * 25 });
  }
  // Floating spore particles for garden atmosphere
  if (level >= 2) {
    for (let x = 0; x < width * TILE; x += 30 + Math.random() * 50) {
      bgSpores.push({ x, y: 30 + Math.random() * 150, phase: Math.random() * 6.28, speed: 0.3 + Math.random() * 0.5, size: 1 + Math.random() * 2 });
    }
  }
}

function initLevel(num) {
  levelData = createLevel(num);
  player.x = levelData.playerStart.x;
  player.y = levelData.playerStart.y;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  player.dead = false; player.deadTimer = 0;
  player.atFlag = false; player.flagSlide = false; player.flagDone = false;
  player.jumpHeld = false;
  player.coyoteTime = 0; player.jumpBufferTime = 0;
  player.invincible = 0;
  player.squash = 1;
  player.animFrame = 0;
  player.inPipe = false;
  camX = 0; camTarget = 0;
  timer = 400; timerAccum = 0;
  particles = [];
  floatingTexts = [];
  fireballs = [];
  powerUps = [];
  blockAnims = [];
  bossProjectiles = [];
  flagY = 0;
  flagSlideY = 4 * TILE;
  levelCompleteTimer = 0;
  comboCount = 0; comboTimer = 0;

  boss = levelData.bossData ? { ...levelData.bossData } : null;

  enemies = levelData.enemies.map(e => ({
    ...e,
    vx: -0.5,
    alive: true,
    stomped: false,
    stompTimer: 0,
    animFrame: 0,
    animTimer: 0,
    startY: e.y,
    flyPhase: Math.random() * Math.PI * 2,
    shell: false,
    shellVx: 0,
  }));

  generateDecorations(levelData.width);
  if (num === 1 && showTutorial) { tutorialPhase = 0; tutorialTimer = 0; }
  state = 'playing';
}

function resetPlayer() {
  player.big = false;
  player.star = false;
  player.starTimer = 0;
  player.fire = false;
  player.h = 14;
}

// --- COLLISION HELPERS ---
function tileAt(tx, ty) {
  if (!levelData) return T.EMPTY;
  if (ty < 0 || ty >= levelData.height || tx < 0 || tx >= levelData.width) return T.EMPTY;
  return levelData.tiles[ty][tx];
}

function isSolid(tx, ty) {
  const t = tileAt(tx, ty);
  return t === T.GROUND || t === T.BRICK || t === T.QUESTION || t === T.USED ||
         t === T.PIPE_TL || t === T.PIPE_TR || t === T.PIPE_BL || t === T.PIPE_BR || t === T.PIPE_ENTRY;
}

function tileCollide(x, y, w, h) {
  const left = Math.floor(x / TILE);
  const right = Math.floor((x + w - 1) / TILE);
  const top = Math.floor(y / TILE);
  const bottom = Math.floor((y + h - 1) / TILE);
  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) return { tx, ty };
    }
  }
  return null;
}

// --- BLOCK INTERACTIONS ---
function hitBlockFromBelow(tx, ty) {
  const tile = tileAt(tx, ty);
  if (tile === T.QUESTION || tile === T.INVIS) {
    const key = tx + ',' + ty;
    const content = levelData.qContents[key] || 'coin';
    levelData.tiles[ty][tx] = T.USED;
    blockAnims.push({ tx, ty, offsetY: 0, phase: 0 });

    if (content === 'coin') {
      coins++; var pts = addScore(200);
      spawnParticles(tx * TILE + 8, ty * TILE - 4, COL.coin, 5, 3);
      spawnScorePopup(tx * TILE + 8, ty * TILE - 8, 200, COL.coin);
      playSound('coin');
    } else if (content === 'multi_coin') {
      // CHA bonus: 3 coins at once [statB ref 6: CHA multi-coin]
      var mc = 2 + Math.floor(CHA_MULT);
      coins += mc; addScore(200 * mc);
      spawnParticles(tx * TILE + 8, ty * TILE - 4, COL.coin, 10, 4);
      spawnScorePopup(tx * TILE + 8, ty * TILE - 8, 200 * mc, '#ffff00');
      playSound('coin');
    } else if (content === 'spore_cap') {
      powerUps.push({ type: player.big ? 'fire' : 'spore_cap', x: tx * TILE, y: ty * TILE - TILE, vy: -2, vx: 1, emerged: false, emergeY: ty * TILE - TILE });
      playSound('powerup');
    } else if (content === 'star') {
      powerUps.push({ type: 'star', x: tx * TILE, y: ty * TILE - TILE, vy: -3, vx: 1.5, emerged: true });
      playSound('powerup');
    } else if (content === 'fire') {
      powerUps.push({ type: 'fire', x: tx * TILE, y: ty * TILE - TILE, vy: -2, vx: 1, emerged: false, emergeY: ty * TILE - TILE });
      playSound('powerup');
    } else if (content === '1up') {
      lives++;
      spawnFloatText(tx * TILE + 8, ty * TILE - 8, '1UP', '#0f0');
      playSound('1up');
    }
    // Kill enemies standing on this block - STR amplifies bump damage
    for (const e of enemies) {
      if (e.alive && !e.stomped) {
        const ex = Math.floor((e.x + 6) / TILE);
        const ey = Math.floor(e.y / TILE);
        if (ex === tx && ey === ty - 1) {
          e.alive = false;
          e.vy = -4 * STR_MULT; // [statB ref 7: STR sends bumped enemies flying harder]
          addScore(100);
          spawnScorePopup(e.x, e.y - 8, 100);
          spawnSporeCloud(e.x + 7, e.y);
          playSound('stomp');
        }
      }
    }
  } else if (tile === T.BRICK) {
    // STR >= 15 can break bricks even when small [statB ref 8: STR brick breaking]
    if (player.big || STR_MULT >= 1.5) {
      levelData.tiles[ty][tx] = T.EMPTY;
      spawnBlockPieces(tx * TILE + 8, ty * TILE + 8);
      playSound('break');
      addScore(50);
      triggerShake(2, 4);
      for (const e of enemies) {
        if (e.alive) {
          const ex = Math.floor((e.x + 6) / TILE);
          const ey = Math.floor(e.y / TILE);
          if (ex === tx && ey === ty - 1) {
            e.alive = false;
            e.vy = -4;
            addScore(100);
            playSound('stomp');
          }
        }
      }
    } else {
      blockAnims.push({ tx, ty, offsetY: 0, phase: 0 });
      playSound('bump');
    }
  } else if (tile === T.USED) {
    playSound('bump');
  }
}

// --- UPDATE ---
function updatePlayer(dt) {
  if (player.dead) {
    player.deadTimer++;
    if (player.deadTimer > 15) player.vy += 0.3;
    player.y += player.vy;
    if (player.deadTimer > 90) {
      lives--;
      if (lives <= 0) {
        state = 'gameOver';
      } else {
        resetPlayer();
        initLevel(level);
      }
    }
    return;
  }

  if (player.atFlag) {
    updateFlagSequence();
    return;
  }

  const runPressed = inputRun();
  var maxSpeed = (runPressed ? 2.5 : 1.5) * DEX_MULT; // [statB ref 9: DEX run speed]
  var accel = (runPressed ? 0.15 : 0.1) * DEX_MULT;
  const friction = 0.85;

  // Horizontal movement
  if (inputLeft()) {
    player.vx -= accel;
    if (player.vx < -maxSpeed) player.vx = -maxSpeed;
    player.facing = -1;
  } else if (inputRight()) {
    player.vx += accel;
    if (player.vx > maxSpeed) player.vx = maxSpeed;
    player.facing = 1;
  } else {
    player.vx *= friction;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Animation
  if (Math.abs(player.vx) > 0.3 && player.onGround) {
    player.animTimer++;
    if (player.animTimer > (runPressed ? 3 : 5)) {
      player.animTimer = 0;
      player.animFrame = (player.animFrame + 1) % 3;
    }
  } else if (player.onGround) {
    player.animFrame = 0;
  }

  // Coyote time
  if (player.onGround) {
    player.coyoteTime = 6;
  } else {
    player.coyoteTime--;
  }

  // Jump buffer
  if (inputJump() && !player.jumpHeld) {
    player.jumpBufferTime = 8;
  }
  if (player.jumpBufferTime > 0) player.jumpBufferTime--;

  // Jump - DEX boosts jump height [statB ref 10: DEX jump height]
  if (player.jumpBufferTime > 0 && player.coyoteTime > 0) {
    player.vy = -4.5 * Math.min(DEX_MULT, 1.4);
    player.onGround = false;
    player.coyoteTime = 0;
    player.jumpBufferTime = 0;
    player.jumpHeld = true;
    player.squash = 0.7;
    playSound('jump');
  }

  // Variable jump height
  if (!inputJump()) {
    player.jumpHeld = false;
    if (player.vy < -2) player.vy = -2;
  }

  // Gravity
  const grav = (Math.abs(player.vy) < 1 && !player.jumpHeld) ? 0.35 : 0.25;
  player.vy += grav;
  if (player.vy > 7) player.vy = 7;

  // Squash/stretch recovery
  player.squash += (1 - player.squash) * 0.2;

  // Move X
  player.x += player.vx;
  if (player.x < 0) { player.x = 0; player.vx = 0; }
  if (player.x > (levelData.width - 1) * TILE) player.x = (levelData.width - 1) * TILE;

  // X collision
  const pw = player.w;
  const ph = player.big ? 24 : player.h;
  const pxOff = 2;
  if (player.vx > 0) {
    const hit = tileCollide(player.x + pxOff + pw, player.y + 2, 1, ph - 4);
    if (hit) { player.x = hit.tx * TILE - pw - pxOff; player.vx = 0; }
  }
  if (player.vx < 0) {
    const hit = tileCollide(player.x + pxOff - 1, player.y + 2, 1, ph - 4);
    if (hit) { player.x = (hit.tx + 1) * TILE - pxOff; player.vx = 0; }
  }

  // Move Y
  player.y += player.vy;
  player.onGround = false;

  if (player.vy >= 0) {
    const hit = tileCollide(player.x + pxOff + 1, player.y + ph, pw - 2, 1);
    if (hit) {
      player.y = hit.ty * TILE - ph;
      player.vy = 0;
      player.onGround = true;
      if (player.squash < 0.9) player.squash = 1.15;
    }
    for (const mp of (levelData.movingPlatforms || [])) {
      if (player.x + pxOff + pw > mp.x && player.x + pxOff < mp.x + mp.w) {
        if (player.y + ph >= mp.y && player.y + ph <= mp.y + 6 && player.vy >= 0) {
          player.y = mp.y - ph;
          player.vy = 0;
          player.onGround = true;
          player.x += mp.vx;
        }
      }
    }
  }

  // Y collision - up
  if (player.vy < 0) {
    const headY = player.y;
    const hit = tileCollide(player.x + pxOff + 2, headY, pw - 4, 1);
    if (hit) {
      player.y = (hit.ty + 1) * TILE;
      player.vy = 0;
      hitBlockFromBelow(hit.tx, hit.ty);
    }
  }

  // Collect coins
  const cx1 = Math.floor((player.x + pxOff) / TILE);
  const cx2 = Math.floor((player.x + pxOff + pw) / TILE);
  const cy1 = Math.floor(player.y / TILE);
  const cy2 = Math.floor((player.y + ph) / TILE);
  for (let ty = cy1; ty <= cy2; ty++) {
    for (let tx = cx1; tx <= cx2; tx++) {
      if (tileAt(tx, ty) === T.COIN) {
        levelData.tiles[ty][tx] = T.EMPTY;
        // CHA boosts coin value [statB ref 11: CHA coin value]
        var coinVal = Math.floor(100 * CHA_MULT);
        coins++; addScore(coinVal);
        spawnParticles(tx * TILE + 8, ty * TILE + 8, COL.coin, 4, 2);
        playSound('coin');
      }
      // Goo tile damage
      if (tileAt(tx, ty) === T.GOO) {
        if (player.invincible <= 0 && !player.star) {
          playerDie();
          spawnGooSplash(player.x + pw/2, player.y + ph);
          playSound('goo');
        }
      }
    }
  }

  // Fall into pit
  if (player.y > H + 20) {
    playerDie();
  }

  // Star timer - WIS extends duration [statB ref 12: WIS power-up duration]
  if (player.star) {
    player.starTimer--;
    if (player.starTimer <= 0) { player.star = false; }
  }

  // Invincibility after hit - CON extends [statB ref 13: CON damage resistance]
  if (player.invincible > 0) player.invincible--;

  // Pipe entry
  if (inputDown() && player.onGround) {
    const ptx = Math.floor((player.x + pw/2) / TILE);
    const pty = Math.floor((player.y + ph) / TILE);
    for (const warp of levelData.pipeWarps) {
      if (Math.abs(ptx - warp.entryX) <= 1 && Math.abs(pty - 1 - warp.entryY) <= 1) {
        enterPipe(warp);
        break;
      }
    }
  }

  // Flag pole collision
  if (levelData.flagX && (!boss || !boss.alive)) {
    const flagPx = levelData.flagX * TILE;
    if (player.x + pw > flagPx - 2 && player.x < flagPx + TILE && !player.atFlag) {
      player.atFlag = true;
      player.flagSlide = true;
      player.vx = 0;
      player.vy = 0;
      player.x = flagPx - pw + 4;
      flagSlideY = player.y;
      const heightBonus = Math.max(0, Math.floor((H - player.y) / TILE) * 100);
      var pts = addScore(heightBonus);
      spawnScorePopup(player.x, player.y - 16, heightBonus, '#fff');
      playSound('flag');
    }
  }

  // Fire shooting - cooldown affected by WIS [statB ref 14: WIS reduces fire cooldown]
  var fireCooldown = Math.max(5, Math.floor(10 / WIS_MULT));
  if (player.fire && (keys['KeyX'] || keys['KeyZ'] || keys['ShiftLeft']) && fireballs.length < 2) {
    if (frame % fireCooldown === 0) {
      fireballs.push({
        x: player.x + (player.facing > 0 ? pw : -4),
        y: player.y + ph/2,
        vx: player.facing * 3,
        vy: -1,
        bounces: 0
      });
      playSound('fireball');
    }
  }

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Tutorial
  if (showTutorial && level === 1) {
    tutorialTimer++;
    if (player.x > 5 * TILE && tutorialPhase === 0) tutorialPhase = 1;
    if (player.x > 15 * TILE && tutorialPhase === 1) tutorialPhase = 2;
    if (player.x > 30 * TILE) showTutorial = false;
  }
}

function enterPipe(warp) {
  playSound('pipe');
  state = 'bonusRoom';
  // CHA boosts bonus coins [statB ref 15: CHA bonus room coins]
  bonusCoins = Math.floor(warp.bonusCoins * CHA_MULT);
  bonusCoinTimer = 0;
  bonusReturnX = player.x;
  bonusReturnY = player.y - 32;
}

function updateBonusRoom() {
  bonusCoinTimer++;
  if (bonusCoinTimer % 8 === 0 && bonusCoins > 0) {
    coins++; addScore(200);
    bonusCoins--;
    playSound('coin');
  }
  if (bonusCoins <= 0 && bonusCoinTimer > 30) {
    state = 'playing';
    player.x = bonusReturnX;
    player.y = bonusReturnY;
    playSound('pipe');
  }
}

function updateFlagSequence() {
  if (player.flagSlide) {
    player.y += 2;
    flagSlideY += 2;
    const groundY = (levelData.height - 3) * TILE;
    if (player.y >= groundY - (player.big ? 24 : 14)) {
      player.y = groundY - (player.big ? 24 : 14);
      player.flagSlide = false;
      player.flagDone = true;
      levelCompleteTimer = 0;
    }
  }
  if (player.flagDone) {
    levelCompleteTimer++;
    if (levelCompleteTimer < 60) {
      player.vx = 1;
      player.x += player.vx;
      player.animTimer++;
      if (player.animTimer > 5) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 3; }
      player.facing = 1;
    }
    if (levelCompleteTimer >= 60 && timer > 0) {
      timer -= 3;
      if (timer < 0) timer = 0;
      addScore(30);
    }
    if (timer <= 0 && levelCompleteTimer >= 80) {
      if (level < 3) {
        level++;
        initLevel(level);
      } else {
        state = 'gameOver';
      }
    }
  }
}

function playerDie() {
  if (player.dead) return;
  if (player.star) return;
  if (player.invincible > 0) return;

  if (player.big) {
    player.big = false;
    player.fire = false;
    player.h = 14;
    player.invincible = Math.floor(90 * CON_MULT); // [statB ref 16: CON extends i-frames]
    playSound('bump');
    triggerShake(3, 6);
    return;
  }

  player.dead = true;
  player.deadTimer = 0;
  player.vy = -5;
  player.vx = 0;
  triggerShake(4, 8);
  playSound('die');
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) {
      if (e.stomped) {
        e.stompTimer++;
        if (e.stompTimer > 30) e.stomped = false;
      }
      continue;
    }

    if (e.x > camX + W + 100 || e.x < camX - 100) continue;

    if (e.type === 'flitter') {
      e.flyPhase += 0.04;
      e.y = e.startY + Math.sin(e.flyPhase) * 20;
      e.x += e.vx;
    } else if (e.shell && e.shellVx !== 0) {
      e.x += e.shellVx;
      for (const other of enemies) {
        if (other !== e && other.alive && !other.shell) {
          if (Math.abs(e.x - other.x) < 12 && Math.abs(e.y - other.y) < 12) {
            other.alive = false;
            other.vy = -3;
            addScore(200);
            spawnScorePopup(other.x, other.y - 8, 200);
            spawnSporeCloud(other.x + 7, other.y);
            playSound('stomp');
          }
        }
      }
      const stx = Math.floor((e.x + (e.shellVx > 0 ? 14 : 0)) / TILE);
      const sty = Math.floor((e.y + 4) / TILE);
      if (isSolid(stx, sty)) {
        e.shellVx = -e.shellVx;
      }
    } else {
      // Goober moves faster
      var spd = e.type === 'goober' ? 0.8 : 0.5;
      if (e.vx > 0) e.vx = spd; else e.vx = -spd;
      e.x += e.vx;
      if (e.vy === undefined) e.vy = 0;
      e.vy += 0.2;
      if (e.vy > 5) e.vy = 5;
      e.y += e.vy;

      const ety = Math.floor((e.y + 14) / TILE);
      const etx = Math.floor((e.x + 6) / TILE);
      if (isSolid(etx, ety)) {
        e.y = ety * TILE - 14;
        e.vy = 0;
      }

      const wallTx = Math.floor((e.x + (e.vx > 0 ? 13 : 0)) / TILE);
      const wallTy = Math.floor((e.y + 6) / TILE);
      if (isSolid(wallTx, wallTy)) {
        e.vx = -e.vx;
      }

      if (e.type !== 'flitter') {
        const edgeTx = Math.floor((e.x + (e.vx > 0 ? 14 : -1)) / TILE);
        const edgeTy = Math.floor((e.y + 16) / TILE);
        if (!isSolid(edgeTx, edgeTy) && e.y < (levelData.height - 3) * TILE) {
          e.vx = -e.vx;
        }
      }
    }

    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 2; }

    // Player collision
    if (!player.dead && !player.atFlag && player.invincible <= 0) {
      const pw = player.w;
      const ph = player.big ? 24 : player.h;
      const pxOff = 2;

      if (player.x + pxOff + pw > e.x + 2 && player.x + pxOff < e.x + 12 &&
          player.y + ph > e.y + 2 && player.y < e.y + 12) {

        if (player.star) {
          e.alive = false;
          e.vy = -4;
          addScore(200);
          spawnScorePopup(e.x, e.y - 8, 200);
          spawnSporeCloud(e.x + 7, e.y);
          playSound('stomp');
        } else if (player.vy > 0 && player.y + ph < e.y + 10) {
          // Stomp! STR amplifies stomp score
          var stompScore = Math.floor(100 * STR_MULT); // [statB ref 17: STR stomp damage/score]
          comboCount++;
          comboTimer = 60;
          var comboBonus = comboCount > 1 ? comboCount * 50 : 0;

          if (e.type === 'shellback' && !e.shell) {
            e.shell = true;
            e.shellVx = 0;
            e.vx = 0;
            player.vy = -3.5;
            addScore(stompScore + comboBonus);
            spawnScorePopup(e.x, e.y - 8, stompScore + comboBonus);
            if (comboCount > 1) spawnFloatText(e.x, e.y - 20, comboCount + 'x COMBO!', '#ff0');
            playSound('stomp');
          } else if (e.shell && e.shellVx === 0) {
            e.shellVx = player.facing * 4;
            player.vy = -2;
            addScore(100);
            playSound('stomp');
          } else {
            e.alive = false;
            e.stomped = true;
            e.stompTimer = 0;
            player.vy = -3.5;
            player.squash = 0.6;
            addScore(stompScore + comboBonus);
            spawnParticles(e.x + 6, e.y + 6, '#38d973', 6, 3);
            spawnScorePopup(e.x, e.y - 8, stompScore + comboBonus, '#38d973');
            if (comboCount > 1) spawnFloatText(e.x, e.y - 20, comboCount + 'x COMBO!', '#ff0');
            spawnSporeCloud(e.x + 7, e.y + 7);
            playSound('stomp');
          }
          triggerShake(1.5, 3);
        } else {
          // Goober poisons on touch (extra damage)
          if (e.type === 'goober' && player.big) {
            player.big = false;
            player.fire = false;
            player.h = 14;
            player.invincible = Math.floor(90 * CON_MULT);
            spawnParticles(player.x + 6, player.y + 7, '#a855f7', 8, 3);
            spawnFloatText(player.x, player.y - 12, 'TOXIC SPORE!', '#a855f7');
            playSound('bump');
            triggerShake(3, 6);
          } else {
            playerDie();
          }
        }
      }
    }
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].alive && !enemies[i].stomped && enemies[i].y > H + 50) {
      enemies.splice(i, 1);
    }
  }
}

// --- BOSS ---
function updateBoss() {
  if (!boss || !boss.alive) return;

  // Only activate when player is near
  if (player.x < (250 - 10) * TILE) return;

  boss.phase += 0.02;
  boss.x += boss.vx;

  // Bounce off arena walls
  if (boss.x < 252 * TILE) { boss.x = 252 * TILE; boss.vx = Math.abs(boss.vx); }
  if (boss.x + boss.w > 266 * TILE) { boss.x = 266 * TILE - boss.w; boss.vx = -Math.abs(boss.vx); }

  // Attack: spawn spore projectiles
  boss.attackTimer++;
  if (boss.attackTimer > 90) {
    boss.attackTimer = 0;
    bossProjectiles.push({
      x: boss.x + boss.w/2, y: boss.y + 10,
      vx: player.x < boss.x ? -1.5 : 1.5,
      vy: -1.5,
      life: 120
    });
    playSound('spore');
  }

  // Flash timer
  if (boss.flashTimer > 0) boss.flashTimer--;

  // Player stomp collision
  if (!player.dead && !player.atFlag) {
    const pw = player.w;
    const ph = player.big ? 24 : player.h;
    const pxOff = 2;

    if (player.x + pxOff + pw > boss.x && player.x + pxOff < boss.x + boss.w &&
        player.y + ph > boss.y && player.y < boss.y + boss.h) {

      if (player.vy > 0 && player.y + ph < boss.y + 14) {
        // Stomp the boss
        boss.hp--;
        boss.flashTimer = 15;
        boss.stomps++;
        boss.vx *= 1.2; // gets faster
        player.vy = -5;
        triggerShake(4, 8);

        if (boss.hp <= 0) {
          boss.alive = false;
          addScore(5000);
          spawnBossExplosion(boss.x + boss.w/2, boss.y + boss.h/2);
          spawnScorePopup(boss.x + boss.w/2, boss.y - 16, 5000, '#ffff00');
          playSound('boss_die');
          triggerShake(6, 15);
          // Remove arena walls so player can reach flag
          for (let y = 0; y < ROWS; y++) {
            if (levelData.tiles[y][250] === T.BRICK) levelData.tiles[y][250] = T.EMPTY;
            if (levelData.tiles[y][267] === T.BRICK) levelData.tiles[y][267] = T.EMPTY;
          }
        } else {
          spawnScorePopup(boss.x + boss.w/2, boss.y - 8, 500, '#ff4444');
          addScore(500);
          playSound('boss_hit');
        }
      } else if (player.invincible <= 0 && !player.star) {
        playerDie();
      }
    }
  }
}

function updateBossProjectiles() {
  for (let i = bossProjectiles.length - 1; i >= 0; i--) {
    var bp = bossProjectiles[i];
    bp.x += bp.vx;
    bp.vy += 0.08;
    bp.y += bp.vy;
    bp.life--;

    if (bp.life <= 0 || bp.y > H + 20) {
      bossProjectiles.splice(i, 1);
      continue;
    }

    // Hit player
    if (!player.dead && player.invincible <= 0 && !player.star) {
      var pw = player.w, ph = player.big ? 24 : player.h;
      if (player.x + 2 + pw > bp.x - 4 && player.x + 2 < bp.x + 4 &&
          player.y + ph > bp.y - 4 && player.y < bp.y + 4) {
        playerDie();
        bossProjectiles.splice(i, 1);
      }
    }
  }
}

function updatePowerUps() {
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    if (!pu.emerged) {
      pu.y -= 0.5;
      if (pu.y <= pu.emergeY) pu.emerged = true;
      continue;
    }

    pu.x += pu.vx;
    if (pu.type === 'star') {
      pu.vy += 0.2;
      pu.y += pu.vy;
      const bty = Math.floor((pu.y + 14) / TILE);
      const btx = Math.floor((pu.x + 6) / TILE);
      if (isSolid(btx, bty)) {
        pu.y = bty * TILE - 14;
        pu.vy = -4;
      }
    } else {
      pu.vy = (pu.vy || 0) + 0.2;
      pu.y += pu.vy;
      const bty = Math.floor((pu.y + 14) / TILE);
      const btx = Math.floor((pu.x + 6) / TILE);
      if (isSolid(btx, bty)) {
        pu.y = bty * TILE - 14;
        pu.vy = 0;
      }
    }
    const wtx = Math.floor((pu.x + (pu.vx > 0 ? 14 : 0)) / TILE);
    const wty = Math.floor((pu.y + 6) / TILE);
    if (isSolid(wtx, wty)) pu.vx = -pu.vx;

    // Player collect
    const pw = player.w;
    const ph = player.big ? 24 : player.h;
    if (!player.dead && player.x + 2 + pw > pu.x && player.x + 2 < pu.x + 14 &&
        player.y + ph > pu.y && player.y < pu.y + 14) {
      if (pu.type === 'spore_cap') {
        player.big = true;
        player.h = 24;
        addScore(1000);
        spawnScorePopup(pu.x, pu.y - 8, 1000, '#38d973');
        spawnSporeCloud(pu.x + 7, pu.y + 7);
        playSound('powerup');
      } else if (pu.type === 'star') {
        player.star = true;
        player.starTimer = Math.floor(600 * WIS_MULT); // [statB ref 18: WIS star duration]
        addScore(1000);
        spawnScorePopup(pu.x, pu.y - 8, 1000, '#ff0');
        playSound('powerup');
      } else if (pu.type === 'fire') {
        player.big = true;
        player.fire = true;
        player.h = 24;
        addScore(1000);
        spawnScorePopup(pu.x, pu.y - 8, 1000, '#f80');
        playSound('powerup');
      } else if (pu.type === 'mushroom') {
        player.big = true;
        player.h = 24;
        addScore(1000);
        spawnScorePopup(pu.x, pu.y - 8, 1000, '#0f0');
        playSound('powerup');
      }
      powerUps.splice(i, 1);
    }

    if (pu.y > H + 20 || pu.x < camX - 40 || pu.x > camX + W + 40) {
      powerUps.splice(i, 1);
    }
  }
}

function updateFireballs() {
  for (let i = fireballs.length - 1; i >= 0; i--) {
    const fb = fireballs[i];
    fb.x += fb.vx;
    fb.vy += 0.25;
    fb.y += fb.vy;

    const fty = Math.floor((fb.y + 4) / TILE);
    const ftx = Math.floor((fb.x + 4) / TILE);
    if (isSolid(ftx, fty)) {
      fb.y = fty * TILE - 6;
      fb.vy = -3;
      fb.bounces++;
    }
    if (isSolid(Math.floor((fb.x + (fb.vx > 0 ? 6 : 0)) / TILE), Math.floor((fb.y + 2) / TILE))) {
      spawnParticles(fb.x, fb.y, '#f80', 4, 2);
      fireballs.splice(i, 1);
      continue;
    }

    // Hit enemy - STR boosts fireball damage
    for (const e of enemies) {
      if (e.alive && Math.abs(fb.x - e.x) < 12 && Math.abs(fb.y - e.y) < 12) {
        e.alive = false;
        e.vy = -3;
        var fbScore = Math.floor(200 * STR_MULT); // [statB ref 19: STR fireball damage]
        addScore(fbScore);
        spawnScorePopup(e.x, e.y - 8, fbScore, '#f80');
        spawnParticles(fb.x, fb.y, '#f80', 6, 3);
        spawnSporeCloud(e.x + 7, e.y);
        playSound('stomp');
        fireballs.splice(i, 1);
        break;
      }
    }

    // Hit boss
    if (boss && boss.alive && Math.abs(fb.x - boss.x - boss.w/2) < 16 && Math.abs(fb.y - boss.y - boss.h/2) < 18) {
      boss.hp -= 0.5;
      boss.flashTimer = 10;
      spawnParticles(fb.x, fb.y, '#ff4444', 6, 3);
      playSound('boss_hit');
      fireballs.splice(i, 1);
      if (boss.hp <= 0) {
        boss.alive = false;
        addScore(5000);
        spawnBossExplosion(boss.x + boss.w/2, boss.y + boss.h/2);
        playSound('boss_die');
        triggerShake(6, 15);
        for (let y = 0; y < ROWS; y++) {
          if (levelData.tiles[y][250] === T.BRICK) levelData.tiles[y][250] = T.EMPTY;
          if (levelData.tiles[y][267] === T.BRICK) levelData.tiles[y][267] = T.EMPTY;
        }
      }
      continue;
    }

    if (fb.bounces > 4 || fb.y > H || fb.x < camX - 20 || fb.x > camX + W + 20) {
      fireballs.splice(i, 1);
    }
  }
}

function updateBlockAnims() {
  for (let i = blockAnims.length - 1; i >= 0; i--) {
    const ba = blockAnims[i];
    ba.phase++;
    if (ba.phase < 6) ba.offsetY = -ba.phase;
    else ba.offsetY = -(12 - ba.phase);
    if (ba.phase >= 12) blockAnims.splice(i, 1);
  }
}

function updateMovingPlatforms() {
  for (const mp of (levelData.movingPlatforms || [])) {
    if (mp.vx !== 0) {
      mp.x += mp.vx;
      if (mp.x <= mp.minX || mp.x + mp.w >= (mp.maxX + 3) * TILE) mp.vx = -mp.vx;
      if (mp.x <= mp.minX) mp.x = mp.minX;
    }
    if (mp.vy !== 0) {
      mp.y += mp.vy;
      if (mp.y <= mp.minY || mp.y >= mp.maxY) mp.vy = -mp.vy;
    }
  }
}

function updateCamera() {
  const pw = player.w;
  const targetX = player.x - W / 2 + pw / 2 + player.facing * 20;
  camTarget = targetX;
  camX += (camTarget - camX) * 0.08;
  if (camX < 0) camX = 0;
  const maxCam = levelData.width * TILE - W;
  if (camX > maxCam) camX = maxCam;
}

function updateTimer() {
  if (player.dead || player.atFlag) return;
  timerAccum++;
  if (timerAccum >= 24) {
    timerAccum = 0;
    timer--;
    if (timer <= 0) {
      timer = 0;
      playerDie();
    }
  }
}

// --- DRAWING ---
function drawSky() {
  var theme = getTheme();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, theme.skyTop);
  grad.addColorStop(1, theme.skyBot);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawClouds() {
  var theme = getTheme();
  for (const c of clouds) {
    const sx = c.x - camX * 0.3;
    if (sx > W + 40 || sx < -60) continue;
    ctx.fillStyle = level >= 2 ? 'rgba(168,85,247,0.3)' : COL.cloud;
    const cw = c.w;
    ctx.beginPath();
    ctx.arc(sx, c.y, cw * 0.3, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.25, c.y - cw * 0.12, cw * 0.35, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.55, c.y - cw * 0.05, cw * 0.28, 0, Math.PI * 2);
    ctx.arc(sx + cw * 0.35, c.y + cw * 0.05, cw * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBgSpores() {
  if (bgSpores.length === 0) return;
  for (const s of bgSpores) {
    const sx = s.x - camX * 0.4;
    if (sx > W + 10 || sx < -10) continue;
    var bobY = s.y + Math.sin(frame * 0.02 + s.phase) * 8;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + s.phase) * 0.15;
    ctx.fillStyle = level === 3 ? '#e6482e' : '#38d973';
    ctx.beginPath();
    ctx.arc(sx, bobY, s.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHills() {
  var theme = getTheme();
  for (const h2 of hills) {
    const sx = h2.x - camX * 0.5;
    if (sx > W + 60 || sx < -80) continue;
    ctx.fillStyle = theme.bgHill;
    ctx.beginPath();
    ctx.moveTo(sx - h2.w/2, H - 2 * TILE);
    ctx.quadraticCurveTo(sx, H - 2 * TILE - h2.h, sx + h2.w/2, H - 2 * TILE);
    ctx.fill();
    ctx.fillStyle = theme.bgHillDark;
    ctx.beginPath();
    ctx.moveTo(sx - h2.w/4, H - 2 * TILE);
    ctx.quadraticCurveTo(sx, H - 2 * TILE - h2.h * 0.5, sx + h2.w/4, H - 2 * TILE);
    ctx.fill();
  }
}

function drawBushes() {
  for (const b of bushes) {
    const sx = b.x - camX * 0.7;
    if (sx > W + 40 || sx < -40) continue;
    ctx.fillStyle = level === 3 ? '#7a444a' : COL.bush;
    const by = H - 2 * TILE;
    ctx.beginPath();
    ctx.arc(sx, by, b.w * 0.3, Math.PI, 0);
    ctx.arc(sx + b.w * 0.3, by, b.w * 0.25, Math.PI, 0);
    ctx.arc(sx - b.w * 0.3, by, b.w * 0.22, Math.PI, 0);
    ctx.fill();
  }
}

function drawTile(tx, ty, type) {
  var theme = getTheme();
  const sx = tx * TILE - camX;
  let sy = ty * TILE;

  for (const ba of blockAnims) {
    if (ba.tx === tx && ba.ty === ty) {
      sy += ba.offsetY;
      break;
    }
  }

  if (sx < -TILE || sx > W + TILE) return;

  switch(type) {
    case T.GROUND:
      if (ty > 0 && tileAt(tx, ty-1) !== T.GROUND) {
        ctx.fillStyle = theme.groundTop;
        ctx.fillRect(sx, sy, TILE, 3);
        ctx.fillStyle = theme.groundCol;
        ctx.fillRect(sx, sy + 3, TILE, TILE - 3);
        ctx.fillStyle = theme.groundDark;
        ctx.fillRect(sx + 3, sy + 6, 2, 4);
        ctx.fillRect(sx + 10, sy + 9, 2, 3);
      } else {
        ctx.fillStyle = theme.groundCol;
        ctx.fillRect(sx, sy, TILE, TILE);
        ctx.fillStyle = theme.groundDark;
        ctx.fillRect(sx + 3, sy + 3, 2, 5);
        ctx.fillRect(sx + 10, sy + 7, 2, 4);
      }
      break;
    case T.BRICK:
      ctx.fillStyle = theme.brickCol;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = theme.brickDark;
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + 7, TILE, 1);
      ctx.fillRect(sx + 7, sy, 1, 8);
      ctx.fillRect(sx + 3, sy + 7, 1, 9);
      ctx.fillRect(sx + 11, sy + 7, 1, 9);
      ctx.fillStyle = theme.brickLight;
      ctx.fillRect(sx + 1, sy + 1, 5, 1);
      ctx.fillRect(sx + 1, sy + 8, 2, 1);
      break;
    case T.QUESTION:
      ctx.fillStyle = COL.question;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = COL.questionDark;
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + TILE-1, TILE, 1);
      ctx.fillRect(sx, sy, 1, TILE);
      ctx.fillRect(sx + TILE-1, sy, 1, TILE);
      // Spore "?" symbol
      ctx.fillStyle = COL.questionBorder;
      ctx.fillRect(sx + 5, sy + 3, 6, 2);
      ctx.fillRect(sx + 9, sy + 5, 2, 3);
      ctx.fillRect(sx + 7, sy + 7, 2, 2);
      ctx.fillRect(sx + 7, sy + 11, 2, 2);
      if ((frame + tx * 7) % 40 < 10) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(sx + 2, sy + 2, 4, 4);
      }
      break;
    case T.USED:
      ctx.fillStyle = '#886644';
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = '#664422';
      ctx.fillRect(sx, sy, TILE, 1);
      ctx.fillRect(sx, sy + TILE-1, TILE, 1);
      ctx.fillRect(sx, sy, 1, TILE);
      ctx.fillRect(sx + TILE-1, sy, 1, TILE);
      break;
    case T.PIPE_TL: case T.PIPE_ENTRY:
      // Spore pipe (themed)
      ctx.fillStyle = theme.pipeCol;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = theme.pipeLight;
      ctx.fillRect(sx, sy, 3, TILE);
      ctx.fillStyle = theme.pipeDark;
      ctx.fillRect(sx + TILE - 2, sy, 2, TILE);
      // Spore glow effect
      if (level >= 2 && (frame + tx * 3) % 30 < 8) {
        ctx.fillStyle = 'rgba(255,200,0,0.15)';
        ctx.fillRect(sx + 3, sy + 2, TILE - 6, TILE - 4);
      }
      if (ty > 0 && tileAt(tx, ty-1) !== T.PIPE_TL && tileAt(tx, ty-1) !== T.PIPE_ENTRY) {
        ctx.fillStyle = theme.pipeCol;
        ctx.fillRect(sx - 2, sy, TILE + 2, 4);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(sx - 2, sy, 3, 4);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(sx + TILE - 1, sy, 2, 4);
      }
      break;
    case T.PIPE_TR:
      ctx.fillStyle = theme.pipeCol;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.fillStyle = theme.pipeLight;
      ctx.fillRect(sx, sy, 2, TILE);
      ctx.fillStyle = theme.pipeDark;
      ctx.fillRect(sx + TILE - 3, sy, 3, TILE);
      if (level >= 2 && (frame + tx * 3) % 30 < 8) {
        ctx.fillStyle = 'rgba(255,200,0,0.15)';
        ctx.fillRect(sx + 2, sy + 2, TILE - 5, TILE - 4);
      }
      if (ty > 0 && tileAt(tx, ty-1) !== T.PIPE_TR) {
        ctx.fillStyle = theme.pipeCol;
        ctx.fillRect(sx, sy, TILE + 2, 4);
        ctx.fillStyle = theme.pipeLight;
        ctx.fillRect(sx, sy, 2, 4);
        ctx.fillStyle = theme.pipeDark;
        ctx.fillRect(sx + TILE, sy, 3, 4);
      }
      break;
    case T.COIN:
      const cphase = Math.sin((frame + tx * 5) * 0.1);
      const cw = Math.max(2, Math.abs(cphase) * 8);
      ctx.fillStyle = COL.coin;
      ctx.fillRect(sx + 8 - cw/2, sy + 3, cw, 10);
      ctx.fillStyle = COL.coinShine;
      ctx.fillRect(sx + 8 - cw/4, sy + 4, cw/2, 3);
      break;
    case T.GOO:
      // Goo pit surface
      ctx.fillStyle = COL.goo;
      var gooWave = Math.sin(frame * 0.08 + tx * 0.5) * 2;
      ctx.fillRect(sx, sy + 4 + gooWave, TILE, TILE - 4);
      ctx.fillStyle = COL.gooDark;
      ctx.fillRect(sx, sy + 6 + gooWave, TILE, TILE - 6);
      // Bubbles
      if ((frame + tx * 13) % 40 < 8) {
        ctx.fillStyle = '#c488ff';
        ctx.beginPath();
        ctx.arc(sx + 4 + (tx * 7 % 8), sy + 6 + gooWave, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case T.FLAG_POLE:
      ctx.fillStyle = COL.flagPole;
      ctx.fillRect(sx + 7, sy, 2, TILE);
      break;
    case T.FLAG_TOP:
      ctx.fillStyle = COL.flagPole;
      ctx.fillRect(sx + 7, sy, 2, TILE);
      ctx.fillStyle = '#38d973';
      ctx.fillRect(sx + 5, sy, 6, 6);
      break;
    case T.INVIS:
      break;
  }
}

function drawFlag() {
  if (!levelData.flagX) return;
  const fx = levelData.flagX * TILE - camX;
  const fy = flagSlideY || 4 * TILE;
  ctx.fillStyle = COL.flag;
  ctx.beginPath();
  ctx.moveTo(fx + 8, fy);
  ctx.lineTo(fx + 8, fy + 12);
  ctx.lineTo(fx - 4, fy + 6);
  ctx.fill();
}

function drawPlayer() {
  if (player.dead && player.deadTimer < 5) return;
  if (player.invincible > 0 && frame % 4 < 2) return;

  const pw = player.w;
  const ph = player.big ? 24 : player.h;
  const sx = Math.floor(player.x - camX);
  const sy = Math.floor(player.y);
  const f = player.facing;

  // Player IS a baseling - use baseling color
  let bodyColor = player.fire ? '#fff' : (nftColor || BASELING_COLOR);
  let hatColor = player.fire ? (nftColor || BASELING_COLOR) : (nftColor || BASELING_COLOR);
  if (player.star) {
    const colors = ['#f00','#ff0','#0f0','#0ff','#f0f','#fff'];
    const ci = Math.floor(frame / 3) % colors.length;
    bodyColor = colors[ci];
    hatColor = colors[(ci + 2) % colors.length];
  }

  ctx.save();
  ctx.translate(sx + pw/2, sy + ph);

  const sq = player.squash;
  ctx.scale(2 - sq, sq);

  const dx = -pw/2;
  const dy = -ph;

  // === BASELING SPRITE ===
  // Animation from player state: ko (dead) > jump (airborne) > walk > idle.
  var _anim = 'idle';
  if (player.dead) _anim = 'ko';
  else if (!player.onGround) _anim = 'jump';
  else if (player.vx) _anim = 'walk';
  if (!drawSelectedBaseling(ctx, 0, -ph / 2, Math.max(pw, ph) + 4, { flipX: f < 0, frame: frame, anim: _anim })) {
    if (player.big) {
      // Big baseling (24 tall) - cap shaped head
      ctx.fillStyle = hatColor;
      ctx.fillRect(dx + 1, dy, 10, 4);
      ctx.fillRect(dx + 0, dy + 2, 12, 3);
      // Spots on cap (baseling markings)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(dx + 3, dy + 1, 2, 2);
      ctx.fillRect(dx + 8, dy + 2, 2, 1);
      // Face
      ctx.fillStyle = COL.playerSkin;
      ctx.fillRect(dx + 1, dy + 5, 10, 5);
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(dx + (f > 0 ? 7 : 3), dy + 6, 2, 2);
      // Body
      ctx.fillStyle = bodyColor;
      ctx.fillRect(dx + 1, dy + 10, 10, 7);
      // Belt
      ctx.fillStyle = '#804020';
      ctx.fillRect(dx + 2, dy + 14, 8, 2);
      // Legs
      ctx.fillStyle = bodyColor;
      ctx.fillRect(dx + 1, dy + 17, 4, 5);
      ctx.fillRect(dx + 7, dy + 17, 4, 5);
      // Shoes
      ctx.fillStyle = COL.playerShoe;
      const legOffset = player.onGround ? (player.animFrame === 1 ? 2 : player.animFrame === 2 ? -1 : 0) : 0;
      ctx.fillRect(dx + 0 + legOffset, dy + 21, 5, 3);
      ctx.fillRect(dx + 7 - legOffset, dy + 21, 5, 3);
      if (player.fire) {
        ctx.fillStyle = '#f80';
        ctx.fillRect(dx + 4, dy + 11, 4, 2);
      }
    } else {
      // Small baseling (14 tall) - cap head
      ctx.fillStyle = hatColor;
      ctx.fillRect(dx + 1, dy, 10, 3);
      ctx.fillRect(dx + 0, dy + 1, 12, 2);
      // Spots
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(dx + 3, dy, 2, 1);
      ctx.fillRect(dx + 8, dy + 1, 2, 1);
      // Face
      ctx.fillStyle = COL.playerSkin;
      ctx.fillRect(dx + 2, dy + 3, 8, 4);
      // Eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(dx + (f > 0 ? 7 : 3), dy + 4, 2, 2);
      // Body
      ctx.fillStyle = bodyColor;
      ctx.fillRect(dx + 2, dy + 7, 8, 4);
      // Legs
      const lo = player.onGround ? (player.animFrame === 1 ? 1 : player.animFrame === 2 ? -1 : 0) : 0;
      ctx.fillStyle = bodyColor;
      ctx.fillRect(dx + 2, dy + 11, 3, 3);
      ctx.fillRect(dx + 7, dy + 11, 3, 3);
      // Shoes
      ctx.fillStyle = COL.playerShoe;
      ctx.fillRect(dx + 1 + lo, dy + 12, 4, 2);
      ctx.fillRect(dx + 7 - lo, dy + 12, 4, 2);
    }
  }

  // Jump pose
  if (!player.onGround && !player.dead) {
    ctx.fillStyle = bodyColor;
    if (player.big) {
      ctx.fillRect(dx - 1, dy + 8, 2, 4);
      ctx.fillRect(dx + 11, dy + 8, 2, 4);
    } else {
      ctx.fillRect(dx + 0, dy + 6, 2, 3);
      ctx.fillRect(dx + 10, dy + 6, 2, 3);
    }
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive && !e.stomped) return;
  const sx = Math.floor(e.x - camX);
  const sy = Math.floor(e.y);
  if (sx < -20 || sx > W + 20) return;

  if (e.stomped) {
    // Flat squished spore remains
    ctx.fillStyle = COL.sporeling;
    ctx.fillRect(sx, sy + 10, 14, 4);
    ctx.fillStyle = COL.sporelingDark;
    ctx.fillRect(sx + 2, sy + 11, 3, 2);
    ctx.fillRect(sx + 9, sy + 11, 3, 2);
    return;
  }

  if (e.type === 'sporeling') {
    // Mushroom-shaped garden creature
    ctx.fillStyle = COL.sporeling;
    // Cap (rounded top)
    ctx.fillRect(sx + 1, sy, 12, 6);
    ctx.fillRect(sx, sy + 2, 14, 4);
    // Cap spots
    ctx.fillStyle = '#aaddaa';
    ctx.fillRect(sx + 3, sy + 1, 2, 2);
    ctx.fillRect(sx + 9, sy + 1, 2, 2);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 3, 2, 2);
    ctx.fillRect(sx + 10, sy + 3, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 3, sy + 4, 1, 1);
    ctx.fillRect(sx + 10, sy + 4, 1, 1);
    // Stalk body
    ctx.fillStyle = COL.sporelingDark;
    ctx.fillRect(sx + 2, sy + 6, 10, 6);
    // Feet
    ctx.fillStyle = '#5a4a30';
    const footOff = e.animFrame === 0 ? 0 : 2;
    ctx.fillRect(sx + 1 - footOff, sy + 11, 4, 3);
    ctx.fillRect(sx + 9 + footOff, sy + 11, 4, 3);
  } else if (e.type === 'goober') {
    // Purple goo creature
    ctx.fillStyle = COL.goober;
    ctx.fillRect(sx + 2, sy + 1, 10, 10);
    ctx.fillRect(sx, sy + 3, 14, 6);
    // Dripping effect
    ctx.fillStyle = COL.gooberDark;
    ctx.fillRect(sx + 2, sy + 9, 3, 3 + (e.animFrame * 2));
    ctx.fillRect(sx + 9, sy + 9, 3, 2 + (e.animFrame * 2));
    // Eyes (menacing)
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 4, 3, 3);
    ctx.fillRect(sx + 8, sy + 4, 3, 3);
    ctx.fillStyle = '#f00';
    ctx.fillRect(sx + 4, sy + 5, 1, 1);
    ctx.fillRect(sx + 9, sy + 5, 1, 1);
  } else if (e.type === 'shellback') {
    if (e.shell) {
      // Shell (garden rock creature)
      ctx.fillStyle = COL.shellback;
      ctx.fillRect(sx + 1, sy + 2, 12, 10);
      ctx.fillRect(sx + 3, sy, 8, 14);
      ctx.fillStyle = COL.shellbackDark;
      ctx.fillRect(sx + 5, sy + 3, 4, 8);
      // Crystal pattern on shell
      ctx.fillStyle = '#66ddff';
      ctx.fillRect(sx + 6, sy + 5, 2, 4);
      return;
    }
    // Shellback creature with crystal shell
    ctx.fillStyle = COL.shellback;
    ctx.fillRect(sx + 1, sy + 2, 12, 8);
    ctx.fillRect(sx + 3, sy, 8, 12);
    ctx.fillStyle = COL.shellbackDark;
    ctx.fillRect(sx + 5, sy + 2, 4, 8);
    // Crystal spikes on shell
    ctx.fillStyle = '#66ddff';
    ctx.fillRect(sx + 5, sy - 2, 2, 3);
    ctx.fillRect(sx + 8, sy - 1, 2, 2);
    // Head
    ctx.fillStyle = COL.shellback;
    ctx.fillRect(sx + (e.vx < 0 ? -2 : 12), sy + 2, 4, 5);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + (e.vx < 0 ? -1 : 13), sy + 3, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + (e.vx < 0 ? -1 : 14), sy + 3, 1, 2);
    // Feet
    ctx.fillStyle = '#6688aa';
    const ftOff = e.animFrame === 0 ? 0 : 1;
    ctx.fillRect(sx + 2 - ftOff, sy + 11, 4, 3);
    ctx.fillRect(sx + 8 + ftOff, sy + 11, 4, 3);
  } else if (e.type === 'flitter') {
    // Flying spore bug
    ctx.fillStyle = COL.flitter;
    ctx.fillRect(sx + 3, sy + 3, 8, 8);
    ctx.fillRect(sx + 1, sy + 5, 12, 4);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 4, 3, 3);
    ctx.fillRect(sx + 8, sy + 4, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 4, sy + 5, 1, 1);
    ctx.fillRect(sx + 9, sy + 5, 1, 1);
    // Spore wings
    ctx.fillStyle = COL.flitterWing;
    const wingUp = Math.sin(frame * 0.3 + e.flyPhase) > 0;
    if (wingUp) {
      ctx.fillRect(sx - 2, sy - 2, 6, 5);
      ctx.fillRect(sx + 10, sy - 2, 6, 5);
    } else {
      ctx.fillRect(sx - 1, sy + 1, 5, 4);
      ctx.fillRect(sx + 10, sy + 1, 5, 4);
    }
    // Antenna
    ctx.fillStyle = COL.flitter;
    ctx.fillRect(sx + 4, sy, 1, 3);
    ctx.fillRect(sx + 9, sy, 1, 3);
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  var sx = Math.floor(boss.x - camX);
  var sy = Math.floor(boss.y);

  // Flash white when hit
  if (boss.flashTimer > 0 && boss.flashTimer % 4 < 2) {
    ctx.fillStyle = '#ffffff';
  } else {
    ctx.fillStyle = COL.bossBody;
  }

  // Spore Lord body (large mushroom boss)
  ctx.fillRect(sx + 2, sy + 8, 20, 16);
  ctx.fillRect(sx, sy + 12, 24, 10);

  // Giant cap
  ctx.fillStyle = (boss.flashTimer > 0 && boss.flashTimer % 4 < 2) ? '#ffffff' : '#dd4444';
  ctx.fillRect(sx - 2, sy, 28, 10);
  ctx.fillRect(sx, sy - 2, 24, 4);

  // Cap spots
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx + 4, sy + 1, 4, 3);
  ctx.fillRect(sx + 14, sy + 2, 3, 3);
  ctx.fillRect(sx + 9, sy - 1, 3, 2);

  // Eyes
  ctx.fillStyle = COL.bossEye;
  ctx.fillRect(sx + 5, sy + 12, 4, 4);
  ctx.fillRect(sx + 15, sy + 12, 4, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(sx + 6, sy + 13, 2, 2);
  ctx.fillRect(sx + 16, sy + 13, 2, 2);

  // Angry mouth
  ctx.fillStyle = '#000';
  ctx.fillRect(sx + 8, sy + 19, 8, 2);
  ctx.fillRect(sx + 7, sy + 18, 2, 2);
  ctx.fillRect(sx + 15, sy + 18, 2, 2);

  // Feet
  ctx.fillStyle = COL.bossDark;
  ctx.fillRect(sx + 2, sy + 24, 6, 4);
  ctx.fillRect(sx + 16, sy + 24, 6, 4);

  // HP bar
  var barW = 24;
  var hpPct = boss.hp / boss.maxHp;
  ctx.fillStyle = '#400';
  ctx.fillRect(sx, sy - 8, barW, 3);
  ctx.fillStyle = hpPct > 0.5 ? '#0f0' : hpPct > 0.25 ? '#ff0' : '#f00';
  ctx.fillRect(sx, sy - 8, Math.floor(barW * hpPct), 3);
}

function drawBossProjectiles() {
  for (var bp of bossProjectiles) {
    var sx = Math.floor(bp.x - camX);
    var sy = Math.floor(bp.y);
    ctx.fillStyle = '#88ff44';
    ctx.beginPath();
    ctx.arc(sx, sy, 3 + Math.sin(frame * 0.2) * 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#44cc22';
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPowerUp(pu) {
  const sx = Math.floor(pu.x - camX);
  const sy = Math.floor(pu.y);

  if (pu.type === 'spore_cap' || pu.type === 'mushroom') {
    // Spore Cap power-up (garden mushroom)
    ctx.fillStyle = '#44cc44';
    ctx.fillRect(sx + 1, sy, 12, 6);
    ctx.fillRect(sx, sy + 2, 14, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 3, sy + 1, 3, 3);
    ctx.fillRect(sx + 8, sy + 1, 3, 3);
    ctx.fillStyle = '#f8d890';
    ctx.fillRect(sx + 2, sy + 6, 10, 6);
    ctx.fillRect(sx + 4, sy + 12, 6, 2);
  } else if (pu.type === 'star') {
    // Mycelium Star (flashing with spore energy)
    const c = frame % 6 < 3 ? '#ff0' : '#fff';
    ctx.fillStyle = c;
    ctx.fillRect(sx + 5, sy, 4, 3);
    ctx.fillRect(sx + 1, sy + 3, 12, 4);
    ctx.fillRect(sx + 3, sy + 7, 3, 4);
    ctx.fillRect(sx + 8, sy + 7, 3, 4);
    ctx.fillRect(sx + 4, sy + 3, 6, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 4, sy + 4, 2, 2);
    ctx.fillRect(sx + 8, sy + 4, 2, 2);
    // Energy ring
    ctx.strokeStyle = frame % 4 < 2 ? '#ff8800' : '#ffcc00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(sx + 7, sy + 6, 8 + Math.sin(frame * 0.2) * 2, 0, Math.PI * 2);
    ctx.stroke();
  } else if (pu.type === 'fire') {
    // Garden Flame Flower
    ctx.fillStyle = '#f80';
    ctx.fillRect(sx + 3, sy + 2, 8, 6);
    ctx.fillRect(sx + 5, sy, 4, 2);
    ctx.fillStyle = '#ff0';
    ctx.fillRect(sx + 5, sy + 3, 4, 3);
    ctx.fillStyle = '#0a0';
    ctx.fillRect(sx + 6, sy + 8, 2, 6);
    ctx.fillRect(sx + 4, sy + 10, 2, 2);
    ctx.fillRect(sx + 8, sy + 10, 2, 2);
  }
}

function drawFireball(fb) {
  const sx = Math.floor(fb.x - camX);
  const sy = Math.floor(fb.y);
  const rot = frame * 0.5;
  ctx.save();
  ctx.translate(sx + 3, sy + 3);
  ctx.rotate(rot);
  ctx.fillStyle = '#f80';
  ctx.fillRect(-3, -3, 6, 6);
  ctx.fillStyle = '#ff0';
  ctx.fillRect(-2, -2, 4, 4);
  ctx.restore();
}

function drawMovingPlatforms() {
  var theme = getTheme();
  for (const mp of (levelData.movingPlatforms || [])) {
    const sx = Math.floor(mp.x - camX);
    const sy = Math.floor(mp.y);
    if (sx > W + 20 || sx + mp.w < -20) continue;

    ctx.fillStyle = level === 3 ? '#666' : '#c09060';
    ctx.fillRect(sx, sy, mp.w, 8);
    ctx.fillStyle = level === 3 ? '#444' : '#a07040';
    ctx.fillRect(sx, sy, mp.w, 2);
    ctx.fillRect(sx, sy + 6, mp.w, 2);
    ctx.fillStyle = level === 3 ? '#888' : '#806030';
    for (let rx = 4; rx < mp.w; rx += 10) {
      ctx.fillRect(sx + rx, sy + 3, 2, 2);
    }
  }
}

function drawHUD() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 14);

  ctx.font = '8px monospace';
  ctx.textAlign = 'left';

  // POOP tokens
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(4, 3, 6, 8);
  ctx.fillStyle = '#f4b41b';
  ctx.fillText('x' + coins, 12, 10);

  // Score
  ctx.fillStyle = '#fff';
  ctx.fillText(String(score).padStart(6, '0'), 50, 10);

  // World name
  var theme = getTheme();
  ctx.fillStyle = '#aaa';
  ctx.fillText('W' + level, 110, 10);

  // Lives (baseling icon)
  ctx.fillStyle = BASELING_COLOR;
  ctx.fillRect(140, 4, 6, 7);
  ctx.fillStyle = '#fff';
  ctx.fillText('x' + lives, 148, 10);

  // Timer
  ctx.fillStyle = timer < 100 ? '#f44' : '#fff';
  ctx.fillText('T' + String(timer).padStart(3, '0'), 195, 10);

  // Hi score
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.fillText('HI:' + hiScore, W - 4, 10);
  ctx.textAlign = 'left';

  // Combo display
  if (comboCount > 1 && comboTimer > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(comboCount + 'x COMBO', W/2, 24);
    ctx.textAlign = 'left';
  }

  // Tutorial messages
  if (showTutorial && level === 1 && state === 'playing') {
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.font = '7px monospace';
    var tutMsg = '';
    if (tutorialPhase === 0) tutMsg = 'ARROWS/WASD to move, SPACE to jump';
    else if (tutorialPhase === 1) tutMsg = 'Stomp Sporelings to collect POOP!';
    else if (tutorialPhase === 2) tutMsg = 'Hit ? blocks for Spore Gems & Seeds';
    if (tutMsg) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(W/2 - 100, 16, 200, 12);
      ctx.fillStyle = '#fff';
      ctx.fillText(tutMsg, W/2, 25);
    }
    ctx.textAlign = 'left';
  }
}

function drawBonusRoom() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Garden-themed brick border
  var theme = getTheme();
  for (let x = 0; x < W; x += TILE) {
    ctx.fillStyle = theme.brickCol;
    ctx.fillRect(x, 0, TILE, TILE);
    ctx.fillRect(x, H - TILE, TILE, TILE);
    ctx.fillStyle = theme.brickDark;
    ctx.fillRect(x, 0, TILE, 1);
    ctx.fillRect(x + 7, 0, 1, TILE);
    ctx.fillRect(x, H - TILE, TILE, 1);
    ctx.fillRect(x + 7, H - TILE, 1, TILE);
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GARDEN BONUS!', W/2, H/2 - 30);

  ctx.font = '12px monospace';
  ctx.fillStyle = COL.coin;
  ctx.fillText('POOP Tokens: +' + (Math.floor(bonusCoinTimer / 8)), W/2, H/2);

  for (let i = 0; i < 5; i++) {
    const cx = (W/2 - 40) + i * 20;
    const cy = H/2 + 20 + Math.sin(frame * 0.1 + i) * 15;
    const cphase = Math.sin((frame + i * 7) * 0.1);
    const cw2 = Math.max(2, Math.abs(cphase) * 8);
    ctx.fillStyle = COL.coin;
    ctx.fillRect(cx - cw2/2, cy, cw2, 10);
    ctx.fillStyle = COL.coinShine;
    ctx.fillRect(cx - cw2/4, cy + 1, cw2/2, 3);
  }

  drawHUD();
}

let titleBounce = 0;

    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H); }
  }

  drawSky();

  // Ground
  ctx.fillStyle = COL.groundTop;
  ctx.fillRect(0, H - 30, W, 4);
  ctx.fillStyle = COL.ground;
  ctx.fillRect(0, H - 26, W, 26);

  // Clouds
  ctx.fillStyle = COL.cloud;
  ctx.beginPath();
  ctx.arc(50, 40, 15, 0, Math.PI * 2);
  ctx.arc(65, 35, 18, 0, Math.PI * 2);
  ctx.arc(80, 40, 13, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.arc(180, 55, 12, 0, Math.PI * 2);
  ctx.arc(195, 50, 15, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.moveTo(150, H - 30);

  ctx.fillRect(W/2 - 4, titleCharY + 7, 8, 4);

  }
}

function drawGameOver() {
  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); }
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  if (level > 3 || (level === 3 && state === 'gameOver' && lives >= 0 && player.atFlag)) {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#f4b41b';
    ctx.fillText('YOU WIN!', W/2, 50);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#38d973';
    ctx.fillText('The Spore Lord is defeated!', W/2, 70);
    ctx.fillStyle = '#fff';
    ctx.fillText('The Gardens are saved!', W/2, 85);
  } else {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#e6482e';
    ctx.fillText('GAME OVER', W/2, 55);
  }

  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('SCORE: ' + score, W/2, 110);
  ctx.fillText('POOP: ' + coins, W/2, 126);

  // Stat contribution summary
  if (STAT_LEVEL > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '7px monospace';
    ctx.fillText('Your baseling ' + BASELING_NAME + ' contributed!', W/2, 142);
  }

  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('sporeBrosHiScore', hiScore.toString());
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.fillText('NEW HIGH SCORE!', W/2, 158);
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('HI SCORE: ' + hiScore, W/2, 158);
  }

  ctx.fillStyle = (frame % 60 < 40) ? '#fff' : '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('PRESS SPACE TO PLAY AGAIN', W/2, 185);

  // Character
  const charY = 200;
  ctx.fillStyle = BASELING_COLOR;
  ctx.fillRect(W/2 - 5, charY, 10, 3);
  ctx.fillStyle = COL.playerSkin;
  ctx.fillRect(W/2 - 4, charY + 3, 8, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(W/2 - 2, charY + 4, 2, 2);
  ctx.fillRect(W/2 + 2, charY + 4, 2, 2);
  ctx.fillStyle = BASELING_COLOR;
  ctx.fillRect(W/2 - 4, charY + 7, 8, 5);
}

// --- WORLD NAME BANNER ---
var worldBannerTimer = 0;
function drawWorldBanner() {
  if (worldBannerTimer > 0) {
    worldBannerTimer--;
    var theme = getTheme();
    var alpha = worldBannerTimer > 60 ? 1 : worldBannerTimer / 60;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W/2 - 80, H/2 - 20, 160, 40);
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('WORLD ' + level, W/2, H/2 - 4);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.fillText(theme.name, W/2, H/2 + 10);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// --- MAIN LOOP ---
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = timestamp - lastTime;
  lastTime = timestamp;
  frame++;

  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  updateShake();

  if (state === 'title') {
    drawTitle();
    if (!picking && inputAny()) {
      level = 1;
      lives = baseLives;
      score = 0; coins = 0;
      scoreMultiplier = 1;
      nftColor = null;
      if (window.NftLoader && window.NftLoader.selectedCharacter) {
        var bonuses = window.NftLoader.getBonuses();
        lives += bonuses.lives;
        scoreMultiplier = bonuses.scoreMultiplier;
        nftColor = bonuses.color;
      }
      resetPlayer();
      showTutorial = true;
      worldBannerTimer = 120;
      initLevel(level);
    }
  } else if (state === 'playing') {
    updatePlayer(dt);
    updateEnemies();
    updateBoss();
    updateBossProjectiles();
    updatePowerUps();
    updateFireballs();
    updateBlockAnims();
    updateMovingPlatforms();
    updateParticles();
    updateFloatTexts();
    updateCamera();
    updateTimer();

    // Apply screen shake
    ctx.save();
    ctx.translate(shakeX, shakeY);

    drawSky();
    drawClouds();
    drawBgSpores();
    drawHills();
    drawBushes();

    // Draw tiles
    const startTx = Math.max(0, Math.floor(camX / TILE) - 1);
    const endTx = Math.min(levelData.width, Math.ceil((camX + W) / TILE) + 1);
    for (let ty = 0; ty < levelData.height; ty++) {
      for (let tx = startTx; tx < endTx; tx++) {
        const t = levelData.tiles[ty][tx];
        if (t !== T.EMPTY) drawTile(tx, ty, t);
      }
    }

    drawMovingPlatforms();
    drawFlag();

    for (const pu of powerUps) drawPowerUp(pu);
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawBossProjectiles();
    for (const fb of fireballs) drawFireball(fb);

    drawPlayer();

    drawParticles(camX);
    drawFloatTexts(camX);

    ctx.restore(); // end shake

    drawHUD();
    drawWorldBanner();

  } else if (state === 'bonusRoom') {
    updateBonusRoom();
    drawBonusRoom();

  } else if (state === 'gameOver') {
    drawGameOver();
    if (inputAny() && frame > 30) {
      state = 'title';
      frame = 0;
    }
  }

  requestAnimationFrame(gameLoop);
}

// Start
requestAnimationFrame(gameLoop);

</script>
<script src="/track.js" defer></script></body>
