<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Roll</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === CONSTANTS ===
var GW = 480, GH = 480;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: [], labels: {} });

// Isometric tile dimensions
var TILE_W = 32;
var TILE_H = 16;
var TILE_DEPTH = 10;

// Base physics constants (modified by stats)
var BASE_ACCEL = 200;
var BASE_FRICTION = 0.91;
var BASE_MAX_SPEED = 150;
var GRAVITY = 550;
var SLOPE_FORCE = 110;
var BOUNCE = 0.4;
var BASE_BRAKE = 0.82;

// Game state
var state = 'title';
var score = 0;
var highScore = TAS.score.load('sporeroll_hi');
var level = 1;
var frame = 0;
var timeLeft = 60;
var timerWarning = false;
var levelComplete = false;
var levelTransition = 0;
var lives = 3;
var isBossLevel = false;
var bossMarble = null;
var bossDefeated = false;

// Marble state
var marble = {
  x: 0, y: 0, z: 0,
  vx: 0, vy: 0, vz: 0,
  radius: 6, rotation: 0, rotY: 0,
  grounded: false, stunTimer: 0,
  trailTimer: 0
};
var lastCheckpoint = { x: 0, y: 0 };

// Items
var items = [];
var activeItems = { lpGem: 0, mycoCrystal: 0 };

// Particles for trail effects
var trailParticles = [];

// Camera
var camX = 0, camY = 0;
var camTargetX = 0, camTargetY = 0;

// Level data
var tiles = [];
var levelW = 0, levelH = 0;
var finishTile = { x: 0, y: 0 };
var checkpoints = [];
var enemies = [];
var hazards = [];
var disappearingTiles = [];
var conveyors = [];
var windZones = [];
var vacuums = [];
var electricBarriers = [];
var spinPlatforms = [];
var reactorRamps = [];
var sporePuddles = [];
var mycelialBridges = [];

// Sound timers
var rollSoundTimer = 0;
var lastTimerBeep = -1;

// === STAT B SYSTEM ===
// STR: marble weight/push power (resist knockback, push enemies harder)
// DEX: speed + handling (max speed, acceleration, friction control)
// CON: durability/lives (extra lives, stun resist, fall recovery)
// INT: score + timer bonus (more points, extra time per checkpoint)
// WIS: brake power (how fast marble stops, slope resistance)
// CHA: bonus spawns (more items, friendlier checkpoints, bonus spawns)
// Stats come from the shared baseling module (getMults, ARCADE-STATS.md). statB(name)
// returns a D&D-style MODIFIER (mult 1.0->0, 1.6->+6, 0.8->-2) so every getX() helper
// below traces to a clamped getMults() value. STR<-damage, DEX<-moveSpeed, CON<-health,
// INT/WIS/CHA<-luck.
var _statMods = { STR:0, DEX:0, CON:0, INT:0, WIS:0, CHA:0 };
function mod(x){ return Math.round((x - 1) * 10); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  _statMods.STR = mod(m.damage); _statMods.DEX = mod(m.moveSpeed); _statMods.CON = mod(m.health);
  _statMods.INT = mod(m.luck);   _statMods.WIS = mod(m.luck);      _statMods.CHA = mod(m.luck);
}
function statB(name) {
  return _statMods[name] || 0;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[marble-madness] player init failed:', e && e.message); });
}

function getAccel() { return BASE_ACCEL + Math.floor(statB('DEX') * 18); }
function getMaxSpeed() { return BASE_MAX_SPEED + Math.floor(statB('DEX') * 12); }
function getFriction() {
  var dexBonus = statB('DEX') * 0.003;
  return Math.min(0.97, BASE_FRICTION + dexBonus);
}
function getBrake() { return BASE_BRAKE - statB('WIS') * 0.012; }
function getWeight() { return 1.0 + statB('STR') * 0.08; }
function getPushPower() { return 1.0 + statB('STR') * 0.15; }
function getStunResist() { return Math.max(0.3, 1.0 - statB('CON') * 0.06); }
function getMaxLives() { return 3 + Math.floor(statB('CON') / 4); }
function getScoreMult() { return 1.0 + statB('INT') * 0.08; }
function getTimerBonus() { return Math.floor(statB('INT') * 0.5); }
function getItemChance() { return 1.0 + statB('CHA') * 0.12; }
function getBonusSpawnRate() { return Math.floor(statB('CHA') / 3); }

// Level color themes (NES-inspired course names)
var THEMES = [
  { path: '#3cacd7', side: '#2266aa', edge: '#336699', bg: '#1a1c2c', acid: '#224488', name: 'Spore Nursery' },
  { path: '#38d973', side: '#228844', edge: '#2d7a4a', bg: '#1a1c2c', acid: '#116633', name: 'Mycelium Garden' },
  { path: '#f4b41b', side: '#aa6622', edge: '#996633', bg: '#1a1c2c', acid: '#44aa22', name: 'POOP Pipeline' },
  { path: '#a855f7', side: '#6644aa', edge: '#775599', bg: '#1a1c2c', acid: '#6622aa', name: 'Fungal Canopy' },
  { path: '#e6482e', side: '#aa2288', edge: '#993377', bg: '#1a1c2c', acid: '#aa2266', name: 'Baseling Burrow' },
  { path: '#3cacd7', side: '#22aaaa', edge: '#339999', bg: '#1a1c2c', acid: '#22aacc', name: 'Hauler Highway' },
  { path: '#e6482e', side: '#aa2222', edge: '#993333', bg: '#1a1c2c', acid: '#cc2222', name: 'Power Plant' },
  { path: '#a855f7', side: '#555555', edge: '#777777', bg: '#1a1c2c', acid: '#444444', name: 'The Final Garden' }
];

// Tile types
var T_EMPTY = 0, T_PATH = 1, T_RAMP_N = 2, T_RAMP_S = 3, T_RAMP_E = 4, T_RAMP_W = 5;
var T_ICE = 6, T_FINISH = 7, T_CHECKPOINT = 8, T_CATAPULT = 9, T_DISAPPEAR = 10;
var T_CONVEYOR_N = 11, T_CONVEYOR_S = 12, T_CONVEYOR_E = 13, T_CONVEYOR_W = 14;
var T_SPIN = 15, T_REACTOR_RAMP = 16, T_SPORE_PUDDLE = 17, T_MYCELIAL_BRIDGE = 18;

// === SEEDED RANDOM ===
var seed = 1;
function seedRand(s) { seed = s; }
function sRand() {
  seed = (seed * 1664525 + 1013904223) & 0xFFFFFFFF;
  return (seed >>> 0) / 0xFFFFFFFF;
}

// === LEVEL GENERATION ===
function generateLevel(lvl) {
  tiles = [];
  enemies = [];
  hazards = [];
  disappearingTiles = [];
  conveyors = [];
  windZones = [];
  vacuums = [];
  electricBarriers = [];
  spinPlatforms = [];
  checkpoints = [];
  reactorRamps = [];
  sporePuddles = [];
  mycelialBridges = [];
  items = [];
  activeItems.lpGem = 0;
  activeItems.mycoCrystal = 0;
  bossMarble = null;
  bossDefeated = false;
  isBossLevel = (lvl % 3 === 0);

  seedRand(lvl * 7919 + 42);

  // Level size scales with difficulty
  levelW = 12 + lvl * 2;
  levelH = 18 + lvl * 3;

  // Init empty grid
  for (var y = 0; y < levelH; y++) {
    tiles[y] = [];
    for (var x = 0; x < levelW; x++) {
      tiles[y][x] = { type: T_EMPTY, height: 0, visible: true };
    }
  }

  // Build path using directed random walk
  var pathTiles = [];
  var cx = Math.floor(levelW / 2);
  var cy = 1;
  var pathWidth = Math.max(2, 5 - Math.floor(lvl / 2));
  var startPathWidth = pathWidth;

  // Starting platform (wider)
  for (var dy = 0; dy < 3; dy++) {
    for (var dx = -3; dx <= 3; dx++) {
      var tx = cx + dx, ty = cy + dy;
      if (tx >= 0 && tx < levelW && ty >= 0 && ty < levelH) {
        tiles[ty][tx].type = T_PATH;
        tiles[ty][tx].height = 6;
      }
    }
  }

  marble.x = cx + 0.5;
  marble.y = cy + 1.5;
  lastCheckpoint.x = cx + 0.5;
  lastCheckpoint.y = cy + 1.5;

  // Carve main path downward with turns
  var height = 6;
  var segLen = 0;
  var dir = 0; // 0=south, -1=west, 1=east
  cy = 4;

  while (cy < levelH - 3) {
    for (var dx = -Math.floor(pathWidth / 2); dx <= Math.floor(pathWidth / 2); dx++) {
      var tx = cx + dx;
      if (tx >= 1 && tx < levelW - 1 && cy >= 0 && cy < levelH) {
        tiles[cy][tx].type = T_PATH;
        tiles[cy][tx].height = height;
        pathTiles.push({ x: tx, y: cy, h: height });
      }
    }

    segLen++;
    if (segLen > 2 + Math.floor(sRand() * 5)) {
      segLen = 0;
      if (dir === 0) {
        dir = sRand() < 0.5 ? -1 : 1;
        // Sometimes add a height change at turns
        if (sRand() < 0.35 && lvl > 1) {
          var dh = sRand() < 0.6 ? -1 : 1;
          height = TAS.math.clamp(height + dh, 2, 8);
        }
      } else {
        dir = 0;
      }
    }

    if (dir === 0) {
      cy++;
    } else {
      cx = TAS.math.clamp(cx + dir, 3, levelW - 4);
    }

    // Path narrows at higher levels
    if (lvl >= 3 && sRand() < 0.08) {
      pathWidth = Math.max(1, pathWidth - 1);
    }
    if (sRand() < 0.04) {
      pathWidth = Math.min(startPathWidth, pathWidth + 1);
    }
  }

  // Finish platform
  finishTile.x = cx;
  finishTile.y = cy;
  for (var dy = -1; dy <= 1; dy++) {
    for (var dx = -2; dx <= 2; dx++) {
      var tx = cx + dx, ty = cy + dy;
      if (tx >= 0 && tx < levelW && ty >= 0 && ty < levelH) {
        tiles[ty][tx].type = (dx === 0 && dy === 0) ? T_FINISH : T_PATH;
        tiles[ty][tx].height = height;
      }
    }
  }

  // Add ramps where height changes
  addRamps(pathTiles);

  // Checkpoints evenly spaced
  var cpCount = Math.max(2, Math.min(5, Math.floor(pathTiles.length / 12)));
  for (var i = 1; i <= cpCount; i++) {
    var idx = Math.floor(pathTiles.length * i / (cpCount + 1));
    var cp = pathTiles[idx];
    if (cp && tiles[cp.y][cp.x].type === T_PATH) {
      tiles[cp.y][cp.x].type = T_CHECKPOINT;
      checkpoints.push({ x: cp.x + 0.5, y: cp.y + 0.5, reached: false });
    }
  }

  // Tasern hazards (all levels)
  addReactorRampsGen(lvl, pathTiles);
  addSporePuddlesGen(lvl, pathTiles);
  if (lvl >= 2) addMycelialBridgesGen(lvl, pathTiles);

  // Level-specific features
  if (lvl >= 2) addEnemies(lvl, pathTiles);
  if (lvl >= 3) addNarrowBridges(lvl, pathTiles);
  if (lvl >= 3) addIcePatches(lvl, pathTiles);
  if (lvl >= 4) addWindZonesGen(lvl, pathTiles);
  if (lvl >= 4) addVacuums(lvl, pathTiles);
  if (lvl >= 5) addDisappearingGen(lvl, pathTiles);
  if (lvl >= 5) addSpinPlatforms(lvl, pathTiles);
  if (lvl >= 5) addCatapults(lvl, pathTiles);
  if (lvl >= 6) addConveyorsGen(lvl, pathTiles);
  if (lvl >= 6) addElectricBarriers(lvl, pathTiles);
  if (lvl >= 7) addHammersGen(lvl, pathTiles);
  if (lvl >= 8) makePartiallyInvisible(pathTiles);

  // Tasern items (CHA boosts count)
  addTasernItems(lvl, pathTiles);

  // Boss on every 3rd course
  if (isBossLevel) {
    spawnBoss(lvl, pathTiles);
  }
}

function addRamps(pathTiles) {
  for (var y = 1; y < levelH - 1; y++) {
    for (var x = 1; x < levelW - 1; x++) {
      var t = tiles[y][x];
      if (t.type !== T_PATH) continue;
      var h = t.height;
      // Check above
      if (tiles[y-1][x].type !== T_EMPTY && tiles[y-1][x].height !== h) {
        if (sRand() < 0.5) t.type = tiles[y-1][x].height > h ? T_RAMP_N : T_RAMP_S;
      }
      // Check left
      if (tiles[y][x-1].type !== T_EMPTY && tiles[y][x-1].height !== h) {
        if (sRand() < 0.3) t.type = tiles[y][x-1].height > h ? T_RAMP_W : T_RAMP_E;
      }
    }
  }
}

// === TASERN HAZARD GENERATORS ===
function addReactorRampsGen(lvl, pathTiles) {
  var count = TAS.math.clamp(Math.floor(2 + lvl * 0.5), 2, 6);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.7 + pathTiles.length * 0.15);
    var t = pathTiles[idx % pathTiles.length];
    if (tiles[t.y][t.x].type === T_PATH) {
      tiles[t.y][t.x].type = T_REACTOR_RAMP;
      reactorRamps.push({
        x: t.x, y: t.y,
        boostDir: sRand() < 0.5 ? 0 : 1, // 0=south, 1=forward-along-path
        power: 180 + lvl * 20,
        glowTimer: sRand() * 6
      });
    }
  }
}

function addSporePuddlesGen(lvl, pathTiles) {
  var count = TAS.math.clamp(Math.floor(1 + lvl * 0.7), 1, 5);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length);
    var t = pathTiles[idx];
    if (tiles[t.y][t.x].type === T_PATH) {
      tiles[t.y][t.x].type = T_SPORE_PUDDLE;
      sporePuddles.push({
        x: t.x, y: t.y,
        slowFactor: 0.4 + sRand() * 0.2,
        bubbleTimer: sRand() * 4,
        radius: 1.0 + sRand() * 0.5
      });
    }
  }
}

function addMycelialBridgesGen(lvl, pathTiles) {
  var count = TAS.math.clamp(Math.floor(lvl * 0.4), 1, 3);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.5 + pathTiles.length * 0.25);
    var t = pathTiles[idx % pathTiles.length];
    var horizontal = sRand() < 0.5;
    mycelialBridges.push({
      x: t.x, y: t.y,
      horizontal: horizontal,
      offset: 0,
      speed: 0.8 + sRand() * 0.6,
      range: 1.5 + sRand(),
      baseHeight: tiles[t.y][t.x].height
    });
  }
}

function addTasernItems(lvl, pathTiles) {
  var baseCount = Math.floor(2 + lvl * 0.4);
  var chaBonus = getBonusSpawnRate();
  var count = baseCount + chaBonus;
  var chanceMult = getItemChance();

  for (var i = 0; i < count; i++) {
    if (sRand() * 2 > chanceMult) continue;
    var idx = Math.floor(sRand() * pathTiles.length * 0.7 + pathTiles.length * 0.15);
    var t = pathTiles[idx % pathTiles.length];
    var type = sRand() < 0.5 ? 'lpGem' : 'mycoCrystal';
    items.push({
      x: t.x + 0.5, y: t.y + 0.5,
      type: type,
      collected: false,
      bobTimer: sRand() * 6
    });
  }
}

function spawnBoss(lvl, pathTiles) {
  // Boss spawns near middle of the course
  var midIdx = Math.floor(pathTiles.length * 0.5);
  var t = pathTiles[midIdx];
  var bossSpeed = 1.5 + lvl * 0.4;
  bossMarble = {
    x: t.x + 0.5, y: t.y + 0.5,
    vx: 0, vy: 0,
    hp: Math.floor(3 + lvl * 0.5),
    maxHp: Math.floor(3 + lvl * 0.5),
    speed: bossSpeed,
    radius: 10,
    homeX: t.x + 0.5, homeY: t.y + 0.5,
    patrolRange: 3 + lvl * 0.3,
    attackTimer: 0,
    hitFlash: 0,
    phase: 0 // 0=patrol, 1=charge, 2=stunned
  };
}

function addEnemies(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 1, 1, 6);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(pathTiles.length * 0.25 + sRand() * pathTiles.length * 0.55);
    var t = pathTiles[idx % pathTiles.length];
    var enemyType = sRand() < 0.5 ? 'reactorBall' : 'sporeVacuum';
    enemies.push({
      x: t.x + 0.5, y: t.y + 0.5,
      vx: (sRand() < 0.5 ? -1 : 1) * (0.8 + lvl * 0.3),
      vy: 0,
      homeX: t.x + 0.5, homeY: t.y + 0.5,
      patrol: 1.5 + sRand() * 2,
      timer: sRand() * 6,
      aggro: lvl >= 5,
      type: enemyType,
      pulseTimer: 0
    });
  }
}

function addNarrowBridges(lvl, pathTiles) {
  var spacing = Math.max(4, 10 - lvl);
  for (var i = spacing; i < pathTiles.length - spacing; i += spacing + Math.floor(sRand() * 4)) {
    var t = pathTiles[i];
    if (!t) continue;
    for (var dx = -3; dx <= 3; dx++) {
      var nx = t.x + dx;
      if (nx >= 0 && nx < levelW && Math.abs(dx) > 0) {
        if (tiles[t.y][nx].type === T_PATH && sRand() < 0.4) {
          tiles[t.y][nx].type = T_EMPTY;
          tiles[t.y][nx].height = 0;
        }
      }
    }
  }
}

function addIcePatches(lvl, pathTiles) {
  var count = Math.floor(sRand() * 3) + lvl - 2;
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length);
    var t = pathTiles[idx];
    for (var dy = -1; dy <= 1; dy++) {
      for (var dx = -1; dx <= 1; dx++) {
        var nx = t.x + dx, ny = t.y + dy;
        if (nx >= 0 && nx < levelW && ny >= 0 && ny < levelH) {
          if (tiles[ny][nx].type === T_PATH) {
            tiles[ny][nx].type = T_ICE;
          }
        }
      }
    }
  }
}

function addWindZonesGen(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 3, 1, 4);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.7 + pathTiles.length * 0.15);
    var t = pathTiles[idx % pathTiles.length];
    var angle = sRand() * Math.PI * 2;
    var force = 60 + lvl * 15;
    windZones.push({
      x: t.x - 1, y: t.y - 1, w: 3, h: 3,
      fx: Math.cos(angle) * force,
      fy: Math.sin(angle) * force * 0.5,
      pulseTimer: sRand() * 6
    });
  }
}

function addVacuums(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 3, 1, 3);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length);
    var t = pathTiles[idx];
    var edgeDir = sRand() < 0.5 ? -1 : 1;
    vacuums.push({
      x: t.x + edgeDir * 2, y: t.y,
      strength: 40 + lvl * 10,
      range: 3
    });
  }
}

function addDisappearingGen(lvl, pathTiles) {
  var spacing = Math.max(3, 8 - lvl);
  for (var i = spacing; i < pathTiles.length; i += spacing + Math.floor(sRand() * 3)) {
    var t = pathTiles[i];
    if (tiles[t.y][t.x].type === T_PATH) {
      tiles[t.y][t.x].type = T_DISAPPEAR;
      disappearingTiles.push({
        x: t.x, y: t.y,
        timer: sRand() * 4,
        period: 1.8 + sRand() * 1.5,
        visible: true
      });
    }
  }
}

function addSpinPlatforms(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 4, 1, 3);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.6 + pathTiles.length * 0.2);
    var t = pathTiles[idx % pathTiles.length];
    tiles[t.y][t.x].type = T_SPIN;
    spinPlatforms.push({
      x: t.x, y: t.y,
      angle: 0,
      speed: (sRand() < 0.5 ? 1 : -1) * (1.5 + sRand())
    });
  }
}

function addCatapults(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 4, 1, 3);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.5 + pathTiles.length * 0.25);
    var t = pathTiles[idx % pathTiles.length];
    if (tiles[t.y][t.x].type === T_PATH) {
      tiles[t.y][t.x].type = T_CATAPULT;
    }
  }
}

function addConveyorsGen(lvl, pathTiles) {
  var count = Math.floor(sRand() * 4) + 2;
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length);
    var t = pathTiles[idx];
    if (tiles[t.y][t.x].type === T_PATH) {
      var dir = Math.floor(sRand() * 4);
      tiles[t.y][t.x].type = T_CONVEYOR_N + dir;
      conveyors.push({ x: t.x, y: t.y, dir: dir });
    }
  }
}

function addElectricBarriers(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 5, 1, 4);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length * 0.6 + pathTiles.length * 0.2);
    var t = pathTiles[idx % pathTiles.length];
    electricBarriers.push({
      x: t.x, y: t.y,
      timer: sRand() * 4,
      onTime: 1.2 + sRand() * 0.8,
      offTime: 1.5 + sRand() * 1.0,
      active: false,
      horizontal: sRand() < 0.5
    });
  }
}

function addHammersGen(lvl, pathTiles) {
  var count = TAS.math.clamp(lvl - 5, 1, 4);
  for (var i = 0; i < count; i++) {
    var idx = Math.floor(sRand() * pathTiles.length);
    var t = pathTiles[idx];
    hazards.push({
      type: 'hammer',
      x: t.x, y: t.y,
      timer: sRand() * 3,
      period: 1.8 + sRand() * 1.2,
      active: false,
      smashFrame: 0
    });
  }
}

function makePartiallyInvisible(pathTiles) {
  for (var i = 0; i < pathTiles.length; i++) {
    var t = pathTiles[i];
    if (sRand() < 0.55) {
      tiles[t.y][t.x].visible = false;
    }
  }
}

// === ISO HELPERS ===
function toIso(x, y, z) {
  var sx = (x - y) * (TILE_W / 2);
  var sy = (x + y) * (TILE_H / 2) - (z || 0) * TILE_DEPTH;
  return { x: sx, y: sy };
}

// === DRAWING HELPERS ===
function drawIsoDiamond(sx, sy, w, h, fillColor, strokeColor) {
  ctx.beginPath();
  ctx.moveTo(sx, sy - h/2);
  ctx.lineTo(sx + w/2, sy);
  ctx.lineTo(sx, sy + h/2);
  ctx.lineTo(sx - w/2, sy);
  ctx.closePath();
  ctx.fillStyle = fillColor;
  ctx.fill();
  if (strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function shadeColor(color, amount) {
  if (color.length < 7) return color;
  var hex = color.replace('#', '');
  var r = TAS.math.clamp(parseInt(hex.substr(0, 2), 16) + amount, 0, 255);
  var g = TAS.math.clamp(parseInt(hex.substr(2, 2), 16) + amount, 0, 255);
  var b = TAS.math.clamp(parseInt(hex.substr(4, 2), 16) + amount, 0, 255);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

function drawIsoTile(sx, sy, tileH, theme, tileType, tileData) {
  var topColor = theme.path;
  var sideColor = theme.side;
  var edgeColor = theme.edge;
  var depth = tileH * TILE_DEPTH;

  // Color overrides per type
  switch (tileType) {
    case T_ICE:
      topColor = '#aaddff'; sideColor = '#6699bb'; edgeColor = '#88bbdd'; break;
    case T_FINISH:
      topColor = '#ffdd44'; sideColor = '#bb9922'; edgeColor = '#ffee88'; break;
    case T_CHECKPOINT:
      topColor = '#44ffaa'; sideColor = '#22aa66'; edgeColor = '#66ffcc'; break;
    case T_CATAPULT:
      topColor = '#ff8844'; sideColor = '#aa5522'; edgeColor = '#ffaa66'; break;
    case T_DISAPPEAR:
      if (tileData && !tileData.visible) return;
      topColor = theme.path; sideColor = theme.side;
      ctx.globalAlpha = 0.5 + (tileData ? Math.sin(tileData.timer * 3) * 0.3 : 0);
      break;
    case T_SPIN:
      topColor = '#cc88ff'; sideColor = '#8844aa'; edgeColor = '#aa66dd'; break;
    case T_REACTOR_RAMP:
      topColor = '#ff6622'; sideColor = '#aa4411'; edgeColor = '#ff8844'; break;
    case T_SPORE_PUDDLE:
      topColor = '#55cc77'; sideColor = '#338855'; edgeColor = '#44aa66'; break;
    case T_MYCELIAL_BRIDGE:
      topColor = '#bb88dd'; sideColor = '#886aaa'; edgeColor = '#cc99ee'; break;
  }
  if (tileType >= T_CONVEYOR_N && tileType <= T_CONVEYOR_W) {
    topColor = '#887755'; sideColor = '#554433'; edgeColor = '#aa9966';
  }

  // Left side face
  if (depth > 0) {
    ctx.beginPath();
    ctx.moveTo(sx - TILE_W/2, sy);
    ctx.lineTo(sx, sy + TILE_H/2);
    ctx.lineTo(sx, sy + TILE_H/2 + depth);
    ctx.lineTo(sx - TILE_W/2, sy + depth);
    ctx.closePath();
    ctx.fillStyle = sideColor;
    ctx.fill();

    // Right side face
    ctx.beginPath();
    ctx.moveTo(sx + TILE_W/2, sy);
    ctx.lineTo(sx, sy + TILE_H/2);
    ctx.lineTo(sx, sy + TILE_H/2 + depth);
    ctx.lineTo(sx + TILE_W/2, sy + depth);
    ctx.closePath();
    ctx.fillStyle = shadeColor(sideColor, -15);
    ctx.fill();
  }

  // Top face
  drawIsoDiamond(sx, sy, TILE_W, TILE_H, topColor, edgeColor);

  // Special decorations
  if (tileType === T_FINISH) {
    // Checkered finish pattern - NES style
    var pulse = 0.5 + Math.sin(frame * 0.08) * 0.3;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(Math.floor(sx - 3), Math.floor(sy - 2), 3, 2);
    ctx.fillRect(Math.floor(sx + 1), Math.floor(sy), 3, 2);
    ctx.fillRect(Math.floor(sx - 5), Math.floor(sy + 1), 2, 2);
    ctx.fillRect(Math.floor(sx + 3), Math.floor(sy - 1), 2, 2);
    ctx.globalAlpha = 1;
  }

  if (tileType === T_ICE) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#ffffff';
    var shimX = Math.floor(sx + Math.sin(frame * 0.05 + sx * 0.1) * 4);
    ctx.fillRect(shimX - 1, Math.floor(sy - 1), 2, 1);
    ctx.fillRect(shimX + 3, Math.floor(sy + 1), 1, 1);
    ctx.globalAlpha = 1;
  }

  if (tileType >= T_CONVEYOR_N && tileType <= T_CONVEYOR_W) {
    var arrows = [[0, -1], [0, 1], [1, 0], [-1, 0]];
    var aDir = tileType - T_CONVEYOR_N;
    var aOff = (frame * 0.06) % 1;
    ctx.fillStyle = '#ffcc44';
    ctx.globalAlpha = 0.6;
    for (var ai = 0; ai < 2; ai++) {
      var asx = Math.floor(sx + arrows[aDir][0] * (4 + ai * 6 + aOff * 6));
      var asy = Math.floor(sy + arrows[aDir][1] * (2 + ai * 3 + aOff * 3));
      ctx.beginPath();
      ctx.arc(asx, asy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  if (tileType === T_CATAPULT) {
    ctx.strokeStyle = '#ffaa22';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (var ci = 0; ci < 3; ci++) {
      var cy2 = Math.floor(sy - 1 + ci * 2);
      ctx.moveTo(Math.floor(sx - 3), cy2);
      ctx.lineTo(Math.floor(sx + 3), cy2 + 1);
    }
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  // Reactor ramp glow arrows
  if (tileType === T_REACTOR_RAMP) {
    var rGlow = 0.4 + Math.sin(frame * 0.1) * 0.3;
    ctx.globalAlpha = rGlow;
    ctx.fillStyle = '#ffaa00';
    // Upward arrows showing boost direction
    for (var ai = 0; ai < 3; ai++) {
      var ay = Math.floor(sy - 2 + ai * 3 - (frame * 0.15) % 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(sx), ay - 2);
      ctx.lineTo(Math.floor(sx + 2), ay);
      ctx.lineTo(Math.floor(sx - 2), ay);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Spore puddle bubbles
  if (tileType === T_SPORE_PUDDLE) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#88ff99';
    var bTime = frame * 0.04;
    for (var bi = 0; bi < 3; bi++) {
      var bx = Math.floor(sx + Math.sin(bTime + bi * 2.1) * 5);
      var by = Math.floor(sy + Math.cos(bTime + bi * 1.7) * 2);
      var br = 1 + Math.sin(bTime * 1.5 + bi) * 0.5;
      ctx.beginPath();
      ctx.arc(bx, by, Math.max(0.5, br), 0, Math.PI * 2);
      ctx.fill();
    }
    // Spore cloud overlay
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#44ff66';
    ctx.beginPath();
    ctx.arc(Math.floor(sx), Math.floor(sy), 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Mycelial bridge tendrils
  if (tileType === T_MYCELIAL_BRIDGE) {
    ctx.strokeStyle = '#cc99ff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    for (var mi = 0; mi < 4; mi++) {
      var mx = Math.floor(sx + Math.sin(frame * 0.03 + mi * 1.5) * 6);
      var my = Math.floor(sy + Math.cos(frame * 0.025 + mi * 1.2) * 3);
      ctx.beginPath();
      ctx.moveTo(Math.floor(sx), Math.floor(sy));
      ctx.lineTo(mx, my);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }

  // Reset alpha if disappearing tile changed it
  if (tileType === T_DISAPPEAR) {
    ctx.globalAlpha = 1;
  }
}

// === MARBLE DRAWING (improved NES-style sprites) ===
function drawMarble(sx, sy) {
  var screenY = Math.floor(sy - marble.z * TILE_DEPTH);
  sx = Math.floor(sx);
  var r = marble.radius;
  var speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);

  // Trail particles when moving fast
  if (speed > 60 && marble.grounded) {
    var tAlpha = Math.min(0.4, speed / 400);
    var tColor = activeItems.lpGem > 0 ? '#44ffaa' : (activeItems.mycoCrystal > 0 ? '#ff88ff' : '#88aaff');
    trailParticles.push({
      x: sx, y: screenY + 2,
      life: 0.3, maxLife: 0.3,
      color: tColor, r: r * 0.5,
      alpha: tAlpha
    });
  }

  // Draw trail particles
  for (var ti = trailParticles.length - 1; ti >= 0; ti--) {
    var tp = trailParticles[ti];
    var tpAlpha = tp.alpha * (tp.life / tp.maxLife);
    if (tpAlpha > 0.01) {
      ctx.globalAlpha = tpAlpha;
      ctx.fillStyle = tp.color;
      ctx.beginPath();
      ctx.arc(Math.floor(tp.x), Math.floor(tp.y), Math.max(1, Math.floor(tp.r * (tp.life / tp.maxLife))), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Shadow on ground plane
  var shadowScale = TAS.math.clamp(1 - marble.z * 0.08, 0.3, 1);
  ctx.globalAlpha = 0.35 * shadowScale;
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.ellipse(sx, Math.floor(sy + 2), Math.floor(r * 1.3 * shadowScale), Math.floor(r * 0.6 * shadowScale), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Item glow effect
  if (activeItems.lpGem > 0) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.12) * 0.1;
    ctx.fillStyle = '#44ffaa';
    ctx.beginPath();
    ctx.arc(sx, screenY, r + 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (activeItems.mycoCrystal > 0) {
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.1) * 0.1;
    ctx.fillStyle = '#ff88ff';
    ctx.beginPath();
    ctx.arc(sx, screenY, r + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Marble body gradient (Baseling purple spore)
  var grad = ctx.createRadialGradient(sx - Math.floor(r * 0.3), screenY - Math.floor(r * 0.4), 0, sx, screenY, r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.15, '#d4a8ff');
  grad.addColorStop(0.4, '#a855f7');
  grad.addColorStop(0.7, '#6b21a8');
  grad.addColorStop(0.9, '#3b1066');
  grad.addColorStop(1, '#1a1c2c');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(sx, screenY, r, 0, Math.PI * 2);
  ctx.fill();

  // NES-style edge outline
  ctx.strokeStyle = '#3b1066';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(sx, screenY, r, 0, Math.PI * 2);
  ctx.stroke();

  // Rotation stripes (show rolling)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  var rotA = marble.rotation;
  var stripeX = Math.floor(Math.cos(rotA) * r * 0.5);
  var stripeY = Math.floor(Math.sin(rotA) * r * 0.25);
  ctx.beginPath();
  ctx.arc(sx + stripeX, screenY + stripeY, Math.floor(r * 0.35), rotA, rotA + Math.PI * 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(sx - Math.floor(stripeX * 0.5), screenY - Math.floor(stripeY * 0.5), Math.floor(r * 0.3), rotA + Math.PI, rotA + Math.PI * 1.6);
  ctx.stroke();
  ctx.lineWidth = 1;

  // Highlight spot (crisp NES pixel feel)
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(sx - Math.floor(r * 0.3), screenY - Math.floor(r * 0.35), Math.floor(r * 0.2), 0, Math.PI * 2);
  ctx.fill();

  // Selected baseling riding the marble (overlay; marble stays as the vehicle/fallback).
  TAS.drawBaseling(ctx, sx, screenY - Math.floor(r * 0.2), r * 1.6, { anim: 'idle', frame: frame });

  // Speed trail when fast (enhanced)
  if (speed > 80 && marble.grounded) {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#c084fc';
    for (var ti = 1; ti <= 4; ti++) {
      var trailR = Math.floor(r * (1 - ti * 0.18));
      if (trailR < 1) break;
      ctx.beginPath();
      ctx.arc(Math.floor(sx - marble.vx * 0.004 * ti), Math.floor(screenY - marble.vy * 0.004 * ti), trailR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// === ENEMY DRAWING (Tasern-themed) ===
function drawEnemy(en, offsetX, offsetY) {
  var iso = toIso(en.x, en.y);
  var esx = Math.floor(iso.x + offsetX);
  var esy = Math.floor(iso.y + offsetY);
  var h = getTileHeight(Math.floor(en.x), Math.floor(en.y));
  if (h < 0) h = 0;
  esy -= h * TILE_DEPTH;

  if (en.type === 'reactorBall') {
    // Rolling Mold - glowing orange enemy marble with energy rings
    var grad = ctx.createRadialGradient(esx - 2, esy - 3, 0, esx, esy, 7);
    grad.addColorStop(0, '#ffcc44');
    grad.addColorStop(0.4, '#dd6600');
    grad.addColorStop(1, '#441100');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(esx, esy, 7, 0, Math.PI * 2);
    ctx.fill();

    // Energy ring
    ctx.strokeStyle = '#ff8800';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15 + en.timer) * 0.3;
    ctx.beginPath();
    ctx.arc(esx, esy, 9 + Math.sin(frame * 0.1) * 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;

    // Core glow
    ctx.fillStyle = '#ffffaa';
    ctx.beginPath();
    ctx.arc(esx, esy - 1, 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Ramp Fungi - dark green pulsing enemy that pulls your baseling
    var grad2 = ctx.createRadialGradient(esx - 2, esy - 2, 0, esx, esy, 7);
    grad2.addColorStop(0, '#44aa55');
    grad2.addColorStop(0.4, '#225533');
    grad2.addColorStop(1, '#0a1a0a');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.arc(esx, esy, 7, 0, Math.PI * 2);
    ctx.fill();

    // Suction spiral
    ctx.strokeStyle = '#66ff88';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4;
    en.pulseTimer += 0.02;
    for (var si = 0; si < 3; si++) {
      var sa = en.pulseTimer + si * 2.1;
      ctx.beginPath();
      ctx.arc(esx, esy, 4 + si * 3, sa, sa + 1.2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;

    // Eye
    ctx.fillStyle = '#88ffaa';
    ctx.beginPath();
    ctx.arc(esx, esy - 1, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#003300';
    ctx.beginPath();
    ctx.arc(esx, esy - 1, 1, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === BOSS DRAWING ===
function drawBoss(offsetX, offsetY) {
  if (!bossMarble || bossDefeated) return;
  var iso = toIso(bossMarble.x, bossMarble.y);
  var bsx = Math.floor(iso.x + offsetX);
  var bsy = Math.floor(iso.y + offsetY);
  var h = getTileHeight(Math.floor(bossMarble.x), Math.floor(bossMarble.y));
  if (h < 0) h = 0;
  bsy -= h * TILE_DEPTH;

  // Boss shadow
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(bsx, bsy + 4, 14, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Boss body - large menacing spore
  var bGrad = ctx.createRadialGradient(bsx - 3, bsy - 4, 0, bsx, bsy, bossMarble.radius);
  if (bossMarble.phase === 2) {
    // Stunned - blue
    bGrad.addColorStop(0, '#aaccff');
    bGrad.addColorStop(0.4, '#4466aa');
    bGrad.addColorStop(1, '#112244');
  } else {
    bGrad.addColorStop(0, '#ff6644');
    bGrad.addColorStop(0.3, '#cc2200');
    bGrad.addColorStop(0.7, '#660000');
    bGrad.addColorStop(1, '#220000');
  }
  ctx.fillStyle = bGrad;
  ctx.beginPath();
  ctx.arc(bsx, bsy, bossMarble.radius, 0, Math.PI * 2);
  ctx.fill();

  // Hit flash
  if (bossMarble.hitFlash > 0) {
    ctx.globalAlpha = bossMarble.hitFlash;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(bsx, bsy, bossMarble.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Boss outline
  ctx.strokeStyle = bossMarble.phase === 1 ? '#ff0000' : '#880000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(bsx, bsy, bossMarble.radius, 0, Math.PI * 2);
  ctx.stroke();
  ctx.lineWidth = 1;

  // Boss eyes
  ctx.fillStyle = '#ffdd00';
  ctx.beginPath();
  ctx.arc(bsx - 3, bsy - 3, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bsx + 3, bsy - 3, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(bsx - 3, bsy - 3, 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bsx + 3, bsy - 3, 1, 0, Math.PI * 2);
  ctx.fill();

  // HP bar
  var hpW = 24;
  var hpH = 3;
  var hpX = bsx - Math.floor(hpW / 2);
  var hpY = bsy - bossMarble.radius - 8;
  ctx.fillStyle = '#440000';
  ctx.fillRect(hpX, hpY, hpW, hpH);
  var hpFill = Math.floor(hpW * (bossMarble.hp / bossMarble.maxHp));
  ctx.fillStyle = bossMarble.hp > bossMarble.maxHp * 0.3 ? '#ff4444' : '#ff8800';
  ctx.fillRect(hpX, hpY, hpFill, hpH);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(hpX, hpY, hpW, hpH);
  ctx.lineWidth = 1;
}

// === ITEM DRAWING ===
function drawItem(item, offsetX, offsetY) {
  if (item.collected) return;
  var iso = toIso(item.x, item.y);
  var isx = Math.floor(iso.x + offsetX);
  var isy = Math.floor(iso.y + offsetY);
  var h = getTileHeight(Math.floor(item.x), Math.floor(item.y));
  if (h < 0) h = 0;
  isy -= h * TILE_DEPTH;

  // Bob up and down
  item.bobTimer += 0.03;
  var bob = Math.floor(Math.sin(item.bobTimer) * 3);
  isy += bob - 6;

  if (item.type === 'lpGem') {
    // POOP Token - green diamond
    ctx.fillStyle = '#44ffaa';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.08) * 0.2;
    ctx.beginPath();
    ctx.moveTo(isx, isy - 5);
    ctx.lineTo(isx + 4, isy);
    ctx.lineTo(isx, isy + 5);
    ctx.lineTo(isx - 4, isy);
    ctx.closePath();
    ctx.fill();
    // Outline
    ctx.strokeStyle = '#22cc88';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Inner sparkle
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.3;
    ctx.beginPath();
    ctx.arc(isx - 1, isy - 2, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  } else {
    // Spore Gem - purple crystal
    ctx.fillStyle = '#cc88ff';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.09) * 0.2;
    // Crystal shape
    ctx.beginPath();
    ctx.moveTo(isx, isy - 6);
    ctx.lineTo(isx + 3, isy - 2);
    ctx.lineTo(isx + 2, isy + 4);
    ctx.lineTo(isx - 2, isy + 4);
    ctx.lineTo(isx - 3, isy - 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#9955dd';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Inner glow
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.12) * 0.2;
    ctx.beginPath();
    ctx.arc(isx, isy - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.lineWidth = 1;
  }
}

// === TILE QUERIES ===
function getTileAt(x, y) {
  var tx = Math.floor(x);
  var ty = Math.floor(y);
  if (tx < 0 || tx >= levelW || ty < 0 || ty >= levelH) return null;
  return tiles[ty][tx];
}

function getTileHeight(x, y) {
  var tile = getTileAt(x, y);
  if (!tile || tile.type === T_EMPTY) return -1;
  if (tile.type === T_DISAPPEAR) {
    for (var i = 0; i < disappearingTiles.length; i++) {
      var dt2 = disappearingTiles[i];
      if (dt2.x === Math.floor(x) && dt2.y === Math.floor(y)) {
        if (!dt2.visible) return -1;
      }
    }
  }
  return tile.height;
}

// === GAME FLOW ===
function startGame() {
  state = 'playing';
  score = 0;
  level = 1;
  timeLeft = 60;
  lives = getMaxLives();
  timerWarning = false;
  levelComplete = false;
  trailParticles = [];
  TAS.particles.clear();
  startLevel();
}

function startLevel() {
  generateLevel(level);
  marble.vx = 0;
  marble.vy = 0;
  marble.vz = 0;
  marble.z = 0;
  marble.grounded = true;
  marble.stunTimer = 0;
  marble.rotation = 0;
  marble.rotY = 0;
  levelComplete = false;
  levelTransition = 0;
  trailParticles = [];

  // Center camera
  var iso = toIso(marble.x, marble.y);
  camX = iso.x;
  camY = iso.y;
  camTargetX = camX;
  camTargetY = camY;

  TAS.audio.playMelody([
    [523, 0.08, 'sine', 0.06], [659, 0.08, 'sine', 0.06], [784, 0.12, 'sine', 0.08]
  ], 90);
}

function respawnMarble() {
  marble.x = lastCheckpoint.x;
  marble.y = lastCheckpoint.y;
  marble.vx = 0;
  marble.vy = 0;
  marble.vz = 0;
  marble.z = 0;
  marble.grounded = true;
  marble.stunTimer = 0;

  // CON reduces time penalty
  var timePenalty = Math.max(1, Math.floor(3 * getStunResist()));
  timeLeft -= timePenalty;
  lives--;

  TAS.fx.flash('#ff0000', 0.5);
  TAS.fx.shake(12, 0.82);
  TAS.audio.playTone(180, 0.4, 'sawtooth', 0.1, 60);
  TAS.audio.playNoise(0.3, 0.06, 400);

  // Spawn death particles
  var mIso = toIso(marble.x, marble.y);
  for (var pi = 0; pi < 8; pi++) {
    TAS.particles.spawn(Math.floor(mIso.x + GW/2 - camX), Math.floor(mIso.y + GH/2 - camY), '#ff4444', 3, 1.5);
  }

  if (lives <= 0 || timeLeft <= 0) {
    timeLeft = Math.max(0, timeLeft);
    gameOver();
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('sporeroll_hi', highScore);
  }
  TAS.audio.playMelody([
    [300, 0.15, 'sawtooth', 0.08], [250, 0.15, 'sawtooth', 0.08], [200, 0.2, 'sawtooth', 0.1], [150, 0.4, 'sawtooth', 0.12]
  ], 180);
}

function completeLevel() {
  levelComplete = true;
  var timeBonus = Math.floor(timeLeft) * 100;
  var levelBonus = 500 * level;
  var intMult = getScoreMult();
  score += Math.floor((timeBonus + levelBonus) * intMult);

  // INT gives bonus time on level complete
  timeLeft += getTimerBonus();

  TAS.audio.playMelody([
    [523, 0.08, 'sine', 0.08], [659, 0.08, 'sine', 0.08], [784, 0.08, 'sine', 0.08], [1047, 0.2, 'sine', 0.1]
  ], 100);
  TAS.fx.flash('#f4b41b', 0.4);

  // Victory particles
  for (var pi = 0; pi < 12; pi++) {
    var pc = ['#ffdd44','#44ffaa','#ff88ff','#88ccff'][pi % 4];
    TAS.particles.spawn(Math.floor(TAS.math.randRange(100, GW-100)), Math.floor(TAS.math.randRange(100, GH-100)), pc, 4, 2);
  }

  if (level >= 8) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('sporeroll_hi', highScore);
    }
  } else {
    levelTransition = 2.0;
    state = 'transition';
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Update trail particles
  for (var ti = trailParticles.length - 1; ti >= 0; ti--) {
    trailParticles[ti].life -= dt;
    if (trailParticles[ti].life <= 0) {
      trailParticles.splice(ti, 1);
    }
  }
  // Cap trail particles
  if (trailParticles.length > 30) {
    trailParticles.splice(0, trailParticles.length - 30);
  }

  // Decay active items
  if (activeItems.lpGem > 0) activeItems.lpGem -= dt;
  if (activeItems.mycoCrystal > 0) activeItems.mycoCrystal -= dt;

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.up || TAS.input.touch.down || TAS.input.touch.left || TAS.input.touch.right) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.up) {
      if (frame % 4 === 0) {
        state = 'title';
        frame = 0;
      }
    }
    return;
  }

  if (state === 'transition') {
    levelTransition -= dt;
    if (levelTransition <= 0) {
      level++;
      // Carry time forward with minimum
      timeLeft = Math.max(timeLeft, 25 + (9 - level) * 5);
      lives = Math.min(lives + 1, getMaxLives()); // Bonus life on level complete
      startLevel();
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  // === TIMER ===
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver();
    return;
  }

  // Timer warning beeps
  if (timeLeft <= 10) {
    timerWarning = true;
    var sec = Math.floor(timeLeft);
    if (sec !== lastTimerBeep) {
      lastTimerBeep = sec;
      TAS.audio.playTone(880, 0.06, 'square', 0.05);
    }
  } else {
    timerWarning = false;
  }

  // === STUN ===
  if (marble.stunTimer > 0) {
    marble.stunTimer -= dt;
    if (marble.stunTimer < 0) marble.stunTimer = 0;
    if (!marble.grounded) {
      marble.vz -= GRAVITY * dt;
      marble.z += marble.vz * dt;
      if (marble.z <= 0) {
        var h = getTileHeight(Math.floor(marble.x), Math.floor(marble.y));
        if (h < 0) { respawnMarble(); return; }
        marble.z = 0;
        marble.vz = 0;
        marble.grounded = true;
      }
    }
    return;
  }

  // === INPUT (NES-style digital with momentum) ===
  var inputX = 0, inputY = 0;
  var keys = TAS.input.keys;
  var touch = TAS.input.touch;
  var braking = false;

  // Map screen directions to isometric world directions
  if (keys['ArrowUp'] || keys['KeyW'] || keys['w'] || touch.up) { inputX -= 1; inputY -= 1; }
  if (keys['ArrowDown'] || keys['KeyS'] || keys['s'] || touch.down) { inputX += 1; inputY += 1; }
  if (keys['ArrowLeft'] || keys['KeyA'] || keys['a'] || touch.left) { inputX -= 1; inputY += 1; }
  if (keys['ArrowRight'] || keys['KeyD'] || keys['d'] || touch.right) { inputX += 1; inputY -= 1; }

  // Brake: hold opposite direction to current velocity (WIS powered)
  var speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
  if (inputX !== 0 || inputY !== 0) {
    var dotProduct = inputX * marble.vx + inputY * marble.vy;
    if (dotProduct < -speed * 0.3 && speed > 30) {
      braking = true;
    }
  }

  // Normalize
  if (inputX !== 0 || inputY !== 0) {
    var len = Math.sqrt(inputX * inputX + inputY * inputY);
    inputX /= len;
    inputY /= len;
  }

  // Acceleration (DEX)
  var accel = getAccel();
  marble.vx += inputX * accel * dt;
  marble.vy += inputY * accel * dt;

  // === TILE EFFECTS ===
  var curTile = getTileAt(marble.x, marble.y);
  var tileType = curTile ? curTile.type : T_EMPTY;

  // Friction (DEX improves handling)
  var fric = getFriction();
  if (tileType === T_ICE) fric = 0.985;
  if (tileType === T_SPORE_PUDDLE) {
    // Spore puddle slows marble heavily
    fric = 0.82;
    // Particle effect for slogging through
    if (frame % 6 === 0 && speed > 10) {
      var mIso = toIso(marble.x, marble.y);
      TAS.particles.spawn(Math.floor(mIso.x + GW/2 - camX), Math.floor(mIso.y + GH/2 - camY), '#55cc77', 2, 0.8);
    }
  }

  // Braking (WIS)
  if (braking) {
    var brakeFric = getBrake();
    marble.vx *= Math.pow(brakeFric, dt * 60);
    marble.vy *= Math.pow(brakeFric, dt * 60);
  } else {
    marble.vx *= Math.pow(fric, dt * 60);
    marble.vy *= Math.pow(fric, dt * 60);
  }

  // Speed limit (DEX)
  var maxSpd = getMaxSpeed();
  // LP Gem doubles max speed temporarily
  if (activeItems.lpGem > 0) maxSpd = Math.floor(maxSpd * 1.5);
  speed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
  if (speed > maxSpd) {
    marble.vx = (marble.vx / speed) * maxSpd;
    marble.vy = (marble.vy / speed) * maxSpd;
    speed = maxSpd;
  }

  // Slope forces (WIS reduces slide on slopes)
  var slopeResist = 1.0 - statB('WIS') * 0.04;
  slopeResist = Math.max(0.4, slopeResist);
  if (tileType === T_RAMP_N) { marble.vy -= SLOPE_FORCE * slopeResist * dt; }
  if (tileType === T_RAMP_S) { marble.vy += SLOPE_FORCE * slopeResist * dt; }
  if (tileType === T_RAMP_E) { marble.vx += SLOPE_FORCE * slopeResist * dt; }
  if (tileType === T_RAMP_W) { marble.vx -= SLOPE_FORCE * slopeResist * dt; }

  // Reactor Ramp boost
  if (tileType === T_REACTOR_RAMP) {
    for (var ri = 0; ri < reactorRamps.length; ri++) {
      var rr = reactorRamps[ri];
      if (rr.x === Math.floor(marble.x) && rr.y === Math.floor(marble.y)) {
        // Boost forward (south in iso = +y)
        marble.vy += rr.power * dt;
        if (rr.boostDir === 1) marble.vx += rr.power * 0.5 * dt;
        // Particle burst
        if (frame % 3 === 0) {
          var rIso = toIso(marble.x, marble.y);
          TAS.particles.spawn(Math.floor(rIso.x + GW/2 - camX), Math.floor(rIso.y + GH/2 - camY), '#ff8822', 3, 1);
        }
        break;
      }
    }
  }

  // Conveyors
  if (tileType >= T_CONVEYOR_N && tileType <= T_CONVEYOR_W) {
    var convForce = 70;
    if (tileType === T_CONVEYOR_N) marble.vy -= convForce * dt;
    if (tileType === T_CONVEYOR_S) marble.vy += convForce * dt;
    if (tileType === T_CONVEYOR_E) marble.vx += convForce * dt;
    if (tileType === T_CONVEYOR_W) marble.vx -= convForce * dt;
  }

  // Spin platform effect
  if (tileType === T_SPIN) {
    for (var i = 0; i < spinPlatforms.length; i++) {
      var sp = spinPlatforms[i];
      if (sp.x === Math.floor(marble.x) && sp.y === Math.floor(marble.y)) {
        var dx = marble.x - (sp.x + 0.5);
        var dy = marble.y - (sp.y + 0.5);
        var tangentX = -dy * sp.speed * 30;
        var tangentY = dx * sp.speed * 30;
        marble.vx += tangentX * dt;
        marble.vy += tangentY * dt;
      }
    }
  }

  // Catapult launch (STR affects launch height)
  if (tileType === T_CATAPULT && marble.grounded && marble.vz <= 0) {
    var launchPower = (200 + level * 20) * getWeight();
    marble.vz = Math.floor(launchPower);
    marble.grounded = false;
    TAS.audio.playTone(500, 0.2, 'sine', 0.1, 1000);
    var cIso = toIso(marble.x, marble.y);
    TAS.particles.spawn(Math.floor(cIso.x + GW/2 - camX), Math.floor(cIso.y + GH/2 - camY), '#ff8844', 6, 2);
  }

  // === MYCELIAL BRIDGES (moving platforms) ===
  for (var i = 0; i < mycelialBridges.length; i++) {
    var mb = mycelialBridges[i];
    mb.offset = Math.sin(frame * 0.02 * mb.speed) * mb.range;
    // Move tile's effective position
    var effX = mb.horizontal ? mb.x + mb.offset : mb.x;
    var effY = mb.horizontal ? mb.y : mb.y + mb.offset;
    // If marble is on this bridge, carry it
    var mdx = marble.x - (effX + 0.5);
    var mdy = marble.y - (effY + 0.5);
    if (Math.abs(mdx) < 0.8 && Math.abs(mdy) < 0.8 && marble.grounded) {
      var bridgeVel = Math.cos(frame * 0.02 * mb.speed) * mb.range * 0.02 * mb.speed;
      if (mb.horizontal) {
        marble.x += bridgeVel * dt * 60;
      } else {
        marble.y += bridgeVel * dt * 60;
      }
    }
  }

  // === WIND ZONES ===
  // STR (weight) resists wind push
  var windResist = 1.0 / getWeight();
  for (var i = 0; i < windZones.length; i++) {
    var wz = windZones[i];
    if (marble.x >= wz.x && marble.x <= wz.x + wz.w &&
        marble.y >= wz.y && marble.y <= wz.y + wz.h) {
      var windMult = 0.7 + Math.sin(frame * 0.04 + wz.pulseTimer) * 0.3;
      marble.vx += wz.fx * windMult * windResist * dt;
      marble.vy += wz.fy * windMult * windResist * dt;
    }
  }

  // === VACUUMS ===
  for (var i = 0; i < vacuums.length; i++) {
    var vc = vacuums[i];
    var vdx = vc.x - marble.x;
    var vdy = vc.y - marble.y;
    var vDist = Math.sqrt(vdx * vdx + vdy * vdy);
    if (vDist < vc.range && vDist > 0.1) {
      var pull = (vc.strength / (vDist * vDist + 1)) * windResist;
      marble.vx += (vdx / vDist) * pull * dt;
      marble.vy += (vdy / vDist) * pull * dt;
    }
  }

  // === MOVEMENT ===
  var newX = marble.x + marble.vx * dt;
  var newY = marble.y + marble.vy * dt;

  var newH = getTileHeight(Math.floor(newX), Math.floor(newY));
  var curH = getTileHeight(Math.floor(marble.x), Math.floor(marble.y));

  if (newH >= 0) {
    marble.x = newX;
    marble.y = newY;
    if (!marble.grounded) {
      marble.vz -= GRAVITY * dt;
      marble.z += marble.vz * dt;
      if (marble.z <= 0) {
        marble.z = 0;
        marble.vz = 0;
        marble.grounded = true;
        if (speed > 50) {
          TAS.audio.playTone(180, 0.04, 'sine', 0.03);
          TAS.fx.shake(Math.floor(Math.min(3, speed * 0.02)), 0.92);
        }
      }
    }
  } else if (!marble.grounded || marble.z > 0) {
    marble.x = newX;
    marble.y = newY;
    marble.vz -= GRAVITY * dt;
    marble.z += marble.vz * dt;
    if (marble.z <= 0) {
      marble.z = 0;
      respawnMarble();
      return;
    }
  } else {
    var hX = getTileHeight(Math.floor(newX), Math.floor(marble.y));
    var hY = getTileHeight(Math.floor(marble.x), Math.floor(newY));

    if (hX >= 0 && hY >= 0) {
      marble.x = newX;
      marble.y = newY;
    } else if (hX >= 0) {
      marble.x = newX;
      marble.vy *= -BOUNCE;
      TAS.fx.shake(2, 0.95);
    } else if (hY >= 0) {
      marble.y = newY;
      marble.vx *= -BOUNCE;
      TAS.fx.shake(2, 0.95);
    } else {
      marble.grounded = false;
      marble.x = newX;
      marble.y = newY;
      marble.vz = -30;
      TAS.audio.playTone(350, 0.25, 'sine', 0.06, 80);
    }
  }

  // === ROTATION VISUAL ===
  marble.rotation += speed * dt * 0.06;
  marble.rotY += marble.vx * dt * 0.04;

  // === ROLLING SOUND ===
  if (speed > 15 && marble.grounded) {
    rollSoundTimer -= dt;
    if (rollSoundTimer <= 0) {
      TAS.audio.playNoise(0.03, 0.008 + speed * 0.00003, Math.floor(150 + speed));
      rollSoundTimer = 0.07;
    }
  }

  // === DISAPPEARING TILES ===
  for (var i = 0; i < disappearingTiles.length; i++) {
    var dt2 = disappearingTiles[i];
    dt2.timer += dt;
    var phase = Math.sin(dt2.timer * Math.PI * 2 / dt2.period);
    dt2.visible = phase > -0.4;
  }

  // === SPIN PLATFORMS ===
  for (var i = 0; i < spinPlatforms.length; i++) {
    spinPlatforms[i].angle += spinPlatforms[i].speed * dt;
  }

  // === ELECTRIC BARRIERS ===
  for (var i = 0; i < electricBarriers.length; i++) {
    var eb = electricBarriers[i];
    eb.timer += dt;
    var cycle = eb.onTime + eb.offTime;
    var phase = eb.timer % cycle;
    eb.active = phase < eb.onTime;

    if (eb.active) {
      var bDist = TAS.math.dist(marble.x, marble.y, eb.x + 0.5, eb.y + 0.5);
      if (bDist < 1.2) {
        // CON reduces stun duration
        marble.stunTimer = 1.0 * getStunResist();
        marble.vx *= -0.5;
        marble.vy *= -0.5;
        TAS.fx.flash('#44ddff', 0.4);
        TAS.fx.shake(6, 0.88);
        TAS.audio.playTone(900, 0.15, 'sawtooth', 0.06, 200);
        TAS.audio.playNoise(0.1, 0.04, 2000);
      }
    }
  }

  // === ENEMIES ===
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    en.timer += dt;

    var edx = marble.x - en.x;
    var edy = marble.y - en.y;
    var eDist = Math.sqrt(edx * edx + edy * edy);

    // Spore Vacuum has pulling behavior
    if (en.type === 'sporeVacuum' && eDist < 4 && eDist > 0.1) {
      var pullStr = 25 * windResist;
      marble.vx -= (edx / eDist) * pullStr * dt;
      marble.vy -= (edy / eDist) * pullStr * dt;
    }

    if (en.aggro && eDist < 5) {
      var chaseSpeed = 2.0 + level * 0.3;
      en.x += (edx / Math.max(0.1, eDist)) * chaseSpeed * dt;
      en.y += (edy / Math.max(0.1, eDist)) * chaseSpeed * dt;
    } else {
      en.x = en.homeX + Math.sin(en.timer * en.vx) * en.patrol;
      en.y = en.homeY + Math.cos(en.timer * en.vx * 0.7) * en.patrol * 0.5;
    }

    // Collision with marble (STR reduces knockback, increases push on enemies)
    if (eDist < 0.9) {
      var pushForce = Math.floor((180 + level * 20) / getWeight());
      var nx = edx / Math.max(0.1, eDist);
      var ny = edy / Math.max(0.1, eDist);
      marble.vx += nx * pushForce * dt * 5;
      marble.vy += ny * pushForce * dt * 5;

      // STR pushes enemies back
      var pushBack = getPushPower() * 2;
      en.x -= nx * pushBack * dt;
      en.y -= ny * pushBack * dt;

      // Myco Crystal makes marble invulnerable to enemies
      if (activeItems.mycoCrystal > 0) {
        // Destroy enemy on contact
        enemies.splice(i, 1);
        i--;
        score += Math.floor(200 * getScoreMult());
        TAS.audio.playTone(600, 0.1, 'sine', 0.05);
        continue;
      }

      TAS.audio.playTone(250, 0.1, 'sawtooth', 0.06);
      TAS.fx.shake(4, 0.9);
    }
  }

  // === BOSS UPDATE ===
  if (bossMarble && !bossDefeated) {
    updateBoss(dt);
  }

  // === HAMMERS ===
  for (var i = 0; i < hazards.length; i++) {
    var hz = hazards[i];
    if (hz.type === 'hammer') {
      hz.timer += dt;
      var hPhase = hz.timer % hz.period;
      var wasActive = hz.active;
      hz.active = hPhase < 0.2;

      if (hz.active && !wasActive) {
        hz.smashFrame = frame;
        var hDist = TAS.math.dist(marble.x, marble.y, hz.x + 0.5, hz.y + 0.5);
        if (hDist < 3) {
          TAS.audio.playTone(80, 0.15, 'square', 0.04);
          TAS.fx.shake(3, 0.93);
        }
      }

      if (hz.active && Math.floor(marble.x) === hz.x && Math.floor(marble.y) === hz.y) {
        marble.stunTimer = 1.5 * getStunResist();
        marble.vx = 0;
        marble.vy = 0;
        TAS.fx.shake(10, 0.82);
        TAS.audio.playTone(60, 0.3, 'square', 0.1);
      }
    }
  }

  // === ITEMS ===
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    if (item.collected) continue;
    var iDist = TAS.math.dist(marble.x, marble.y, item.x, item.y);
    if (iDist < 0.8) {
      item.collected = true;
      if (item.type === 'lpGem') {
        activeItems.lpGem = 5 + statB('INT') * 0.3; // INT extends duration
        score += Math.floor(150 * getScoreMult());
        TAS.audio.playTone(880, 0.08, 'sine', 0.05);
        TAS.audio.playTone(1100, 0.08, 'sine', 0.05);
      } else {
        activeItems.mycoCrystal = 4 + statB('INT') * 0.2;
        score += Math.floor(200 * getScoreMult());
        TAS.audio.playTone(660, 0.08, 'sine', 0.06);
        TAS.audio.playTone(990, 0.1, 'sine', 0.06);
      }
      TAS.fx.flash('#ffffff', 0.2);
      var itIso = toIso(item.x, item.y);
      for (var pi = 0; pi < 6; pi++) {
        var pc = item.type === 'lpGem' ? '#44ffaa' : '#ff88ff';
        TAS.particles.spawn(Math.floor(itIso.x + GW/2 - camX), Math.floor(itIso.y + GH/2 - camY), pc, 3, 1.5);
      }
    }
  }

  // === CHECK FINISH ===
  if (Math.floor(marble.x) === finishTile.x && Math.floor(marble.y) === finishTile.y && marble.grounded) {
    // Boss levels: must defeat boss first
    if (isBossLevel && !bossDefeated) {
      // Don't complete yet
    } else {
      completeLevel();
      return;
    }
  }

  // === CHECKPOINTS ===
  for (var i = 0; i < checkpoints.length; i++) {
    var cp = checkpoints[i];
    if (!cp.reached) {
      var cpDist = TAS.math.dist(marble.x, marble.y, cp.x, cp.y);
      if (cpDist < 1.0) {
        cp.reached = true;
        lastCheckpoint.x = cp.x;
        lastCheckpoint.y = cp.y;
        // INT boosts checkpoint score and adds timer bonus
        var cpScore = Math.floor(100 * getScoreMult());
        score += cpScore;
        timeLeft += getTimerBonus();
        TAS.audio.playTone(660, 0.08, 'sine', 0.05);
        TAS.audio.playTone(880, 0.08, 'sine', 0.05);
        // Checkpoint particles
        var cpIso = toIso(cp.x, cp.y);
        for (var pi = 0; pi < 4; pi++) {
          TAS.particles.spawn(Math.floor(cpIso.x + GW/2 - camX), Math.floor(cpIso.y + GH/2 - camY), '#44ffaa', 3, 1);
        }
      }
    }
  }

  // === CAMERA ===
  var marbleIso = toIso(marble.x, marble.y);
  var lookAhead = 0.4;
  camTargetX = marbleIso.x + marble.vx * lookAhead;
  camTargetY = marbleIso.y + marble.vy * lookAhead;
  camX = TAS.math.lerp(camX, camTargetX, dt * 5);
  camY = TAS.math.lerp(camY, camTargetY, dt * 5);
}

// === BOSS AI ===
function updateBoss(dt) {
  var b = bossMarble;
  b.attackTimer += dt;
  if (b.hitFlash > 0) b.hitFlash -= dt * 3;

  var bdx = marble.x - b.x;
  var bdy = marble.y - b.y;
  var bDist = Math.sqrt(bdx * bdx + bdy * bdy);

  if (b.phase === 0) {
    // Patrol
    b.x = b.homeX + Math.sin(b.attackTimer * 0.8) * b.patrolRange;
    b.y = b.homeY + Math.cos(b.attackTimer * 0.6) * b.patrolRange * 0.5;
    // Switch to charge when player is close
    if (bDist < 5) {
      b.phase = 1;
      b.attackTimer = 0;
      TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08);
    }
  } else if (b.phase === 1) {
    // Charge at player
    if (bDist > 0.1) {
      b.x += (bdx / bDist) * b.speed * dt * 60;
      b.y += (bdy / bDist) * b.speed * dt * 60;
    }
    // Collision with marble
    if (bDist < 1.2) {
      // Marble hitting boss at high speed = damage to boss
      var mSpeed = Math.sqrt(marble.vx * marble.vx + marble.vy * marble.vy);
      if (mSpeed > 80) {
        // Hit boss (STR increases damage)
        var dmg = 1 + Math.floor(statB('STR') / 5);
        b.hp -= dmg;
        b.hitFlash = 1.0;
        b.phase = 2; // Stun boss
        b.attackTimer = 0;
        score += Math.floor(300 * getScoreMult());
        TAS.audio.playTone(400, 0.15, 'sine', 0.08);
        TAS.fx.shake(8, 0.85);
        // Knockback boss
        var bnx = -bdx / Math.max(0.1, bDist);
        var bny = -bdy / Math.max(0.1, bDist);
        b.x += bnx * 2;
        b.y += bny * 2;
      } else {
        // Boss pushes marble (STR resists)
        var pushForce = Math.floor(250 / getWeight());
        var nx = bdx / Math.max(0.1, bDist);
        var ny = bdy / Math.max(0.1, bDist);
        marble.vx += nx * pushForce;
        marble.vy += ny * pushForce;
        marble.stunTimer = 0.5 * getStunResist();
        TAS.audio.playTone(150, 0.2, 'sawtooth', 0.08);
        TAS.fx.shake(6, 0.88);
      }
    }
    // Return to patrol after charge time
    if (b.attackTimer > 3) {
      b.phase = 0;
      b.attackTimer = 0;
    }
  } else if (b.phase === 2) {
    // Stunned
    if (b.attackTimer > 1.5) {
      b.phase = bDist < 6 ? 1 : 0;
      b.attackTimer = 0;
    }
  }

  // Boss defeated
  if (b.hp <= 0) {
    bossDefeated = true;
    score += Math.floor(1000 * getScoreMult());
    TAS.audio.playMelody([
      [400, 0.1, 'sine', 0.06], [500, 0.1, 'sine', 0.06], [600, 0.1, 'sine', 0.06], [800, 0.2, 'sine', 0.08]
    ], 100);
    TAS.fx.flash('#f4b41b', 0.5);
    TAS.fx.shake(12, 0.8);
    // Death particles
    var bIso = toIso(b.x, b.y);
    for (var pi = 0; pi < 15; pi++) {
      var pc = ['#ff4444','#ffaa00','#ffdd44'][pi % 3];
      TAS.particles.spawn(Math.floor(bIso.x + GW/2 - camX), Math.floor(bIso.y + GH/2 - camY), pc, 4, 2);
    }
  }
}

// === DRAW ===
function draw() {
  var theme = THEMES[(level - 1) % THEMES.length];

  // Background
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Reached Garden ' + level + ': ' + THEMES[(level-1)%8].name });
    return;
  }

  if (state === 'victory') {
    drawVictoryScreen();
    return;
  }

  if (state === 'transition') {
    drawTransition(theme);
    return;
  }

  // === GAME WORLD ===
  ctx.save();
  TAS.fx.applyShake();

  var offsetX = Math.floor(GW / 2 - camX);
  var offsetY = Math.floor(GH / 2 - camY);

  // Draw acid/void below path edges
  drawVoidBelow(offsetX, offsetY, theme);

  // Draw tiles back-to-front (isometric sort: y first, then x)
  for (var y = 0; y < levelH; y++) {
    for (var x = 0; x < levelW; x++) {
      var tile = tiles[y][x];
      if (tile.type === T_EMPTY) continue;

      // Invisible tiles (level 8)
      if (!tile.visible) {
        if (frame % 180 < 12) {
          ctx.globalAlpha = 0.25;
        } else {
          var mDist = TAS.math.dist(x + 0.5, y + 0.5, marble.x, marble.y);
          if (mDist < 2) {
            ctx.globalAlpha = 0.15;
          } else {
            continue;
          }
        }
      }

      var iso = toIso(x, y);
      var sx = Math.floor(iso.x + offsetX);
      var sy = Math.floor(iso.y + offsetY - tile.height * TILE_DEPTH);

      // Frustum cull
      if (sx < -TILE_W * 2 || sx > GW + TILE_W * 2 || sy < -50 || sy > GH + 50) {
        ctx.globalAlpha = 1;
        continue;
      }

      // Get disappearing data
      var tileData = null;
      if (tile.type === T_DISAPPEAR) {
        for (var di = 0; di < disappearingTiles.length; di++) {
          if (disappearingTiles[di].x === x && disappearingTiles[di].y === y) {
            tileData = disappearingTiles[di];
            break;
          }
        }
      }

      drawIsoTile(sx, sy, tile.height, theme, tile.type, tileData);
      ctx.globalAlpha = 1;
    }

    // Draw items on this row
    for (var ii = 0; ii < items.length; ii++) {
      if (Math.floor(items[ii].y) === y) {
        drawItem(items[ii], offsetX, offsetY);
      }
    }

    // Draw enemies on this row
    for (var ei = 0; ei < enemies.length; ei++) {
      if (Math.floor(enemies[ei].y) === y) {
        drawEnemy(enemies[ei], offsetX, offsetY);
      }
    }

    // Draw boss on this row
    if (bossMarble && !bossDefeated && Math.floor(bossMarble.y) === y) {
      drawBoss(offsetX, offsetY);
    }

    // Marble on this row
    if (Math.floor(marble.y) === y) {
      var mIso = toIso(marble.x, marble.y);
      var msx = Math.floor(mIso.x + offsetX);
      var msy = Math.floor(mIso.y + offsetY);
      var mh = getTileHeight(Math.floor(marble.x), Math.floor(marble.y));
      if (mh < 0) mh = 0;
      msy -= mh * TILE_DEPTH;
      drawMarble(msx, msy);
    }
  }

  // Draw electric barriers (above tiles)
  for (var i = 0; i < electricBarriers.length; i++) {
    drawElectricBarrier(electricBarriers[i], offsetX, offsetY);
  }

  // Draw hammers
  for (var i = 0; i < hazards.length; i++) {
    drawHammer(hazards[i], offsetX, offsetY);
  }

  // Draw vacuum indicators
  for (var i = 0; i < vacuums.length; i++) {
    drawVacuum(vacuums[i], offsetX, offsetY);
  }

  // Draw wind zone indicators
  for (var i = 0; i < windZones.length; i++) {
    drawWindZone(windZones[i], offsetX, offsetY);
  }

  // Stun stars above marble
  if (marble.stunTimer > 0) {
    var mIso2 = toIso(marble.x, marble.y);
    var msx2 = Math.floor(mIso2.x + offsetX);
    var msy2 = Math.floor(mIso2.y + offsetY);
    var mh2 = getTileHeight(Math.floor(marble.x), Math.floor(marble.y));
    if (mh2 < 0) mh2 = 0;
    msy2 -= mh2 * TILE_DEPTH - Math.floor(marble.z * TILE_DEPTH);
    drawStunStars(msx2, msy2 - 14);
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  drawHUD(theme);

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

function drawVoidBelow(offsetX, offsetY, theme) {
  ctx.globalAlpha = 0.12 + Math.sin(frame * 0.02) * 0.04;
  ctx.fillStyle = theme.acid;
  for (var y = 0; y < levelH; y++) {
    for (var x = 0; x < levelW; x++) {
      if (tiles[y][x].type !== T_EMPTY) continue;
      var near = false;
      var nx, ny;
      for (var dy = -1; dy <= 1 && !near; dy++) for (var dx = -1; dx <= 1 && !near; dx++) {
        nx = x+dx; ny = y+dy;
        if (nx >= 0 && nx < levelW && ny >= 0 && ny < levelH && tiles[ny][nx].type !== T_EMPTY) near = true;
      }
      if (!near) continue;
      var iso = toIso(x, y);
      var sx = Math.floor(iso.x + offsetX), sy = Math.floor(iso.y + offsetY + 15);
      if (sx < -TILE_W || sx > GW + TILE_W || sy < -TILE_H || sy > GH + TILE_H) continue;
      ctx.beginPath();
      ctx.moveTo(sx, sy - Math.floor(TILE_H*0.4)); ctx.lineTo(sx + Math.floor(TILE_W*0.4), sy);
      ctx.lineTo(sx, sy + Math.floor(TILE_H*0.4)); ctx.lineTo(sx - Math.floor(TILE_W*0.4), sy);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawElectricBarrier(eb, offsetX, offsetY) {
  var iso = toIso(eb.x + 0.5, eb.y + 0.5);
  var sx = Math.floor(iso.x + offsetX), sy = Math.floor(iso.y + offsetY);
  var h = getTileHeight(eb.x, eb.y); if (h < 0) h = 3;
  sy -= h * TILE_DEPTH;
  if (eb.active) {
    ctx.strokeStyle = '#44eeff'; ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 + Math.random() * 0.4;
    ctx.beginPath();
    var horiz = eb.horizontal;
    ctx.moveTo(sx + (horiz ? -10 : 0), sy + (horiz ? 0 : -10));
    for (var j = -8; j <= 8; j += 4) {
      var jitter = Math.floor((Math.random()-0.5)*8);
      ctx.lineTo(sx + (horiz ? j : jitter), sy + (horiz ? jitter : j));
    }
    ctx.lineTo(sx + (horiz ? 10 : 0), sy + (horiz ? 0 : 10));
    ctx.stroke(); ctx.lineWidth = 1;
    ctx.globalAlpha = 0.2; ctx.fillStyle = '#44eeff';
    ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#444';
    ctx.fillRect(sx-8, sy-1, 3, 3); ctx.fillRect(sx+5, sy-1, 3, 3);
  }
}

function drawHammer(hz, offsetX, offsetY) {
  if (hz.type !== 'hammer') return;
  var iso = toIso(hz.x + 0.5, hz.y + 0.5);
  var sx = Math.floor(iso.x + offsetX), sy = Math.floor(iso.y + offsetY);
  var h = getTileHeight(hz.x, hz.y); if (h < 0) h = 3;
  sy -= h * TILE_DEPTH;
  ctx.fillStyle = '#666'; ctx.fillRect(sx-1, sy-28, 3, 22);
  var headY = sy - 28 + (hz.active ? 20 : 0);
  ctx.fillStyle = hz.active ? '#ff4444' : '#888';
  ctx.fillRect(sx-8, headY, 16, 6);
  ctx.fillStyle = hz.active ? '#cc2222' : '#666';
  ctx.fillRect(sx-8, headY+6, 16, 3);
  if (hz.active && frame - hz.smashFrame < 5) {
    ctx.globalAlpha = 0.4; ctx.fillStyle = '#ffaa00';
    ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
    TAS.fx.shake(4, 0.9);
  }
}

function drawVacuum(vc, offsetX, offsetY) {
  var iso = toIso(vc.x, vc.y);
  var sx = Math.floor(iso.x + offsetX), sy = Math.floor(iso.y + offsetY);
  ctx.strokeStyle = '#ff4488'; ctx.lineWidth = 1;
  ctx.globalAlpha = 0.3 + Math.sin(frame*0.08)*0.15;
  for (var ri = 0; ri < 3; ri++) {
    var ra = frame*0.06 + ri*2.1;
    ctx.beginPath(); ctx.arc(sx, sy, 5+ri*5, ra, ra+1.5); ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.lineWidth = 1;
  ctx.fillStyle = '#ff2266';
  ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2); ctx.fill();
}

function drawWindZone(wz, offsetX, offsetY) {
  var iso = toIso(wz.x + wz.w/2, wz.y + wz.h/2);
  var sx = Math.floor(iso.x + offsetX), sy = Math.floor(iso.y + offsetY);
  ctx.globalAlpha = 0.2 + Math.sin(frame * 0.06 + wz.pulseTimer) * 0.1;
  ctx.strokeStyle = '#aaccff';
  ctx.lineWidth = 1;
  var windDir = Math.atan2(wz.fy, wz.fx);
  for (var li = 0; li < 4; li++) {
    var lx = Math.floor(sx + (li-1.5)*6*Math.cos(windDir+Math.PI/2));
    var ly = Math.floor(sy + (li-1.5)*3*Math.sin(windDir+Math.PI/2));
    var wo = Math.floor(Math.sin(frame*0.08+li*1.5)*3);
    ctx.beginPath();
    ctx.moveTo(lx - Math.floor(Math.cos(windDir)*8), ly - Math.floor(Math.sin(windDir)*4) + wo);
    ctx.lineTo(lx + Math.floor(Math.cos(windDir)*8), ly + Math.floor(Math.sin(windDir)*4) + wo);
    ctx.stroke();
  }
  ctx.globalAlpha = 1; ctx.lineWidth = 1;
}

function drawStunStars(sx, sy) {
  ctx.fillStyle = '#ffdd00';
  for (var i = 0; i < 4; i++) {
    var a = frame * 0.12 + i * Math.PI / 2;
    var px = Math.floor(sx + Math.cos(a) * 10);
    var py = Math.floor(sy + Math.sin(a) * 4);
    ctx.beginPath();
    ctx.moveTo(px, py - 3);
    ctx.lineTo(px + 1, py);
    ctx.lineTo(px, py + 3);
    ctx.lineTo(px - 1, py);
    ctx.closePath();
    ctx.fill();
  }
}

function drawHUD(theme) {
  // Top bar
  ctx.fillStyle = 'rgba(5,5,15,0.85)';
  ctx.fillRect(0, 0, GW, 30);

  ctx.font = 'bold 12px monospace';

  // Timer
  var timerColor = timerWarning ? (frame % 16 < 8 ? '#ff3333' : '#ffaa00') : '#ffffff';
  ctx.fillStyle = timerColor;
  ctx.textAlign = 'left';
  ctx.fillText('TIME: ' + Math.ceil(timeLeft) + 's', 8, 20);

  // Lives
  ctx.fillStyle = '#ff6666';
  for (var li = 0; li < lives; li++) {
    ctx.beginPath();
    ctx.arc(95 + li * 12, 15, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Score
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'center';
  ctx.fillText(score.toString(), GW / 2, 20);

  // Active items indicators
  if (activeItems.lpGem > 0) {
    ctx.fillStyle = '#44ffaa';
    ctx.font = '9px monospace';
    ctx.fillText('POOP TOKEN ' + Math.ceil(activeItems.lpGem) + 's', Math.floor(GW / 2), 10);
  }
  if (activeItems.mycoCrystal > 0) {
    ctx.fillStyle = '#ff88ff';
    ctx.font = '9px monospace';
    ctx.fillText('SPORE GEM ' + Math.ceil(activeItems.mycoCrystal) + 's', Math.floor(GW / 2 - 50), 10);
  }

  ctx.font = 'bold 12px monospace';

  // Level + boss indicator
  ctx.fillStyle = theme.path;
  ctx.textAlign = 'right';
  ctx.font = '11px monospace';
  var lvlText = 'LV' + level + ' ' + theme.name;
  if (isBossLevel && !bossDefeated) lvlText = 'BOSS SPORE! ' + lvlText;
  ctx.fillText(lvlText, GW - 55, 20);

  // Minimap
  drawMinimap();
}

function drawMinimap() {
  var mapW = 44, mapH = 60;
  var mx = GW - mapW - 6, my = 34;
  var scaleX = mapW / levelW;
  var scaleY = mapH / levelH;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(mx - 1, my - 1, mapW + 2, mapH + 2);

  // Tiles
  ctx.fillStyle = 'rgba(80,130,200,0.4)';
  for (var y = 0; y < levelH; y++) {
    for (var x = 0; x < levelW; x++) {
      if (tiles[y][x].type !== T_EMPTY) {
        ctx.fillRect(Math.floor(mx + x * scaleX), Math.floor(my + y * scaleY), Math.max(1, Math.floor(scaleX)), Math.max(1, Math.floor(scaleY)));
      }
    }
  }

  // Checkpoints
  ctx.fillStyle = '#44ffaa';
  for (var i = 0; i < checkpoints.length; i++) {
    var cp = checkpoints[i];
    ctx.fillRect(Math.floor(mx + (cp.x - 0.5) * scaleX), Math.floor(my + (cp.y - 0.5) * scaleY), 2, 2);
  }

  // Boss
  if (bossMarble && !bossDefeated) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(Math.floor(mx + bossMarble.x * scaleX - 1), Math.floor(my + bossMarble.y * scaleY - 1), 3, 3);
  }

  // Finish
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(Math.floor(mx + finishTile.x * scaleX - 1), Math.floor(my + finishTile.y * scaleY - 1), 3, 3);

  // Marble position
  ctx.fillStyle = '#ffffff';
  var mpx = Math.floor(mx + marble.x * scaleX);
  var mpy = Math.floor(my + marble.y * scaleY);
  ctx.fillRect(mpx - 1, mpy - 1, 3, 3);

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(mx - 1, my - 1, mapW + 2, mapH + 2);
  ctx.lineWidth = 1;
}

function drawTransition(theme) {
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Level complete banner
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GARDEN ' + level + ' COMPLETE!', Math.floor(GW/2), Math.floor(GH * 0.25));

  if (isBossLevel) {
    ctx.fillStyle = '#e6482e';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('BOSS SPORE DEFEATED!', Math.floor(GW/2), Math.floor(GH * 0.33));
  }

  // Time bonus
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px monospace';
  ctx.fillText('Time Bonus: ' + Math.floor(timeLeft) + ' x 100 = ' + (Math.floor(timeLeft) * 100), Math.floor(GW/2), Math.floor(GH * 0.45));

  // INT multiplier display
  var intMult = getScoreMult();
  if (intMult > 1.0) {
    ctx.fillStyle = '#88ccff';
    ctx.font = '11px monospace';
    ctx.fillText('INT Bonus: x' + intMult.toFixed(2), Math.floor(GW/2), Math.floor(GH * 0.5));
  }

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('Score: ' + score, Math.floor(GW/2), Math.floor(GH * 0.58));

  // Lives remaining
  ctx.fillStyle = '#ff6666';
  ctx.font = '11px monospace';
  ctx.fillText('Lives: ' + lives, Math.floor(GW/2), Math.floor(GH * 0.64));

  // Next level preview
  var nextTheme = THEMES[level % THEMES.length];
  ctx.fillStyle = nextTheme.path;
  ctx.font = '13px monospace';
  var nextLabel = 'Next: ' + nextTheme.name;
  if ((level + 1) % 3 === 0) nextLabel += ' [BOSS SPORE]';
  ctx.fillText(nextLabel, Math.floor(GW/2), Math.floor(GH * 0.73));

  // Progress bar
  var progW = 200;
  var progX = Math.floor(GW/2 - progW/2);
  var progFill = Math.floor(progW * (1 - (levelTransition / 2.0)));
  ctx.fillStyle = '#333';
  ctx.fillRect(progX, Math.floor(GH * 0.8), progW, 8);
  ctx.fillStyle = theme.path;
  ctx.fillRect(progX, Math.floor(GH * 0.8), progFill, 8);
}

function drawTitleScreen() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  // Animated isometric background tiles
  ctx.save();
  var bgTime = frame * 0.3;
  for (var by = -2; by < 12; by++) {
    for (var bx = -2; bx < 12; bx++) {
      var iso = toIso(bx, by);
      var sx = Math.floor(iso.x + GW/2 + Math.sin(bgTime * 0.01) * 20);
      var sy = Math.floor(iso.y + 200 + (bgTime * 0.5) % (TILE_H * 2));
      if (sx < -TILE_W || sx > GW + TILE_W || sy < -TILE_H || sy > GH + TILE_H) continue;
      ctx.globalAlpha = 0.06 + Math.sin(bx * 0.5 + by * 0.3 + frame * 0.02) * 0.03;
      drawIsoDiamond(sx, sy, Math.floor(TILE_W * 0.9), Math.floor(TILE_H * 0.9), '#a855f7', null);
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Title shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('SPORE ROLL', Math.floor(GW/2) + 2, 92 + 2);
  // Title text
  ctx.fillStyle = '#a855f7';
  ctx.fillText('SPORE ROLL', Math.floor(GW/2), 92);
  // Highlight
  ctx.fillStyle = '#38d973';
  ctx.globalAlpha = 0.5;
  ctx.fillText('SPORE ROLL', Math.floor(GW/2), 91);
  ctx.globalAlpha = 1;

  // Subtitle
  ctx.fillStyle = '#7a444a';
  ctx.font = '12px monospace';
  ctx.fillText('A Baseling Arcade Challenge', Math.floor(GW/2), 118);

  // Animated demo marble (NES-style crisp)
  var demoX = Math.floor(GW/2 + Math.sin(frame * 0.03) * 40);
  var demoY = Math.floor(190 + Math.sin(frame * 0.05) * 12);
  var demoR = 16;
  // Shadow
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(demoX, 210, Math.floor(demoR * 1.2), Math.floor(demoR * 0.5), 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Marble
  var dGrad = ctx.createRadialGradient(demoX - 5, demoY - 5, 0, demoX, demoY, demoR);
  dGrad.addColorStop(0, '#ffffff');
  dGrad.addColorStop(0.15, '#d4a8ff');
  dGrad.addColorStop(0.4, '#a855f7');
  dGrad.addColorStop(0.7, '#6b21a8');
  dGrad.addColorStop(1, '#1a1c2c');
  ctx.fillStyle = dGrad;
  ctx.beginPath();
  ctx.arc(demoX, demoY, demoR, 0, Math.PI * 2);
  ctx.fill();
  // NES outline
  ctx.strokeStyle = '#3b1066';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(demoX, demoY, demoR, 0, Math.PI * 2);
  ctx.stroke();
  // Stripe
  ctx.strokeStyle = 'rgba(56,217,115,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(demoX + Math.floor(Math.cos(frame * 0.06) * 8), demoY + Math.floor(Math.sin(frame * 0.06) * 4), 7, 0, Math.PI * 0.8);
  ctx.stroke();
  ctx.lineWidth = 1;
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(demoX - 5, demoY - 6, 4, 0, Math.PI * 2);
  ctx.fill();

  // Controls info
  ctx.fillStyle = '#aaaaaa';
  ctx.font = '11px monospace';
  var infoY = 270;
  ctx.fillText('Controls: Arrow Keys / WASD', Math.floor(GW/2), infoY);
  ctx.fillText('Roll your baseling to the garden gate!', Math.floor(GW/2), infoY + 18);
  ctx.fillText('Collect POOP Tokens & Spore Gems!', Math.floor(GW/2), infoY + 36);
  ctx.fillText('Boss spore every 3 gardens!', Math.floor(GW/2), infoY + 54);

  ctx.font = '9px monospace';
  ctx.fillStyle = '#556677';
  for (var i = 0; i < 4; i++) {
    var leftName = (i+1)+'. '+THEMES[i].name;
    var rightName = (i+5)+'. '+THEMES[i+4].name;
    if ((i+1)%3===0) leftName += ' *';
    if ((i+5)%3===0) rightName += ' *';
    ctx.fillText(leftName+'    '+rightName, Math.floor(GW/2), 358+i*14);
  }
  ctx.fillStyle = '#445566';
  ctx.fillText('* = Boss Spore', Math.floor(GW/2), 418);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, Math.floor(GW/2), 438);
  }

  // Pulsing start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY TO START', Math.floor(GW/2), 460);
  ctx.globalAlpha = 1;

  // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT
  var _cx = Math.floor(GW/2);
  var _sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF'; ctx.textAlign = 'center'; ctx.font = 'bold 10px monospace';
  ctx.fillText('[C] ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), _cx, 484);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = _cx - 115;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = 496;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _yy + 3, 40 * Math.max(0.04, Math.min(1, _v/200)), 5);
    }
    ctx.textAlign = 'center';
  }
}

function drawVictoryScreen() {
  ctx.fillStyle = '#1a1c2c'; ctx.fillRect(0, 0, GW, GH);
  if (frame % 8 === 0) {
    var colors = ['#ffdd44','#44ddff','#ff44aa','#44ff88'];
    TAS.particles.spawn(Math.floor(TAS.math.randRange(40,GW-40)), GH+10, colors[frame%4], 4, 3, {gravity:-1.5});
  }
  TAS.particles.draw();
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.8 + Math.sin(frame*0.04)*0.2;
  ctx.fillStyle = '#f4b41b'; ctx.font = 'bold 32px monospace';
  ctx.fillText('GARDEN CHAMPION!', Math.floor(GW/2), 100); ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff'; ctx.font = '15px monospace';
  ctx.fillText('All 8 gardens conquered!', Math.floor(GW/2), 145);
  ctx.fillStyle = '#f4b41b'; ctx.font = 'bold 22px monospace';
  ctx.fillText('FINAL SCORE: ' + score, Math.floor(GW/2), 210);
  if (score >= highScore && score > 0) {
    ctx.globalAlpha = Math.sin(frame*0.07)*0.3+0.7;
    ctx.fillStyle = '#38d973'; ctx.font = 'bold 14px monospace';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(GW/2), 250); ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#aaa'; ctx.font = '12px monospace';
  ctx.fillText('Time remaining: '+Math.floor(timeLeft)+'s', Math.floor(GW/2), 300);
  ctx.fillText('Lives remaining: '+lives, Math.floor(GW/2), 320);
  ctx.fillText('Gardens completed: 8/8', Math.floor(GW/2), 340);
  ctx.globalAlpha = Math.sin(frame*0.05)*0.3+0.7;
  ctx.fillStyle = '#3cacd7'; ctx.font = 'bold 13px monospace';
  ctx.fillText('PRESS ANY KEY', Math.floor(GW/2), 420); ctx.globalAlpha = 1;
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
</html>
