<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Faxanadu Fungi</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'ATTACK' } });

const TILE = 16;
const COLS = 30; // 480/16
const ROWS = 20; // 320/16
const GRAVITY = 680;
const JUMP_VEL = -300;
const MOVE_SPEED = 120;
const MAX_FALL = 400;
const INVULN_TIME = 1.5;

// === ENUMS ===
const AREAS = ['root_town','trunk_caves','branch_village','canopy_forest','crown_citadel'];
const AREA_NAMES = ['Root Town','Trunk Caves','Branch Village','Canopy Forest','Crown Citadel'];
const AREA_COLORS = {
  root_town: { bg: '#1a0f08', ground: '#4a3520', accent: '#6b4c30' },
  trunk_caves: { bg: '#0a0812', ground: '#2a1f3a', accent: '#4a2866' },
  branch_village: { bg: '#0f1a0a', ground: '#3a5520', accent: '#5a7530' },
  canopy_forest: { bg: '#081a12', ground: '#205538', accent: '#308855' },
  crown_citadel: { bg: '#12081a', ground: '#3a1850', accent: '#661a88' }
};

const SWORDS = [
  { name: 'Dagger', dmg: 1, cost: 0, range: 18 },
  { name: 'Short Sword', dmg: 2, cost: 150, range: 24 },
  { name: 'Long Sword', dmg: 4, cost: 500, range: 30 },
  { name: 'Dragon Slayer', dmg: 8, cost: 1500, range: 36 }
];
const ARMORS = [
  { name: 'Leather', def: 1, cost: 0 },
  { name: 'Chain Mail', def: 2, cost: 200 },
  { name: 'Plate Armor', def: 4, cost: 800 },
  { name: 'Magic Armor', def: 7, cost: 2000 }
];
const SHIELDS = [
  { name: 'None', def: 0, cost: 0 },
  { name: 'Small Shield', def: 1, cost: 100 },
  { name: 'Large Shield', def: 2, cost: 400 },
  { name: 'Magic Shield', def: 4, cost: 1200 }
];
const SPELLS = [
  { name: 'Deluge', cost: 3, dmg: 2, color: '#4488ff', type: 'projectile' },
  { name: 'Fire', cost: 6, dmg: 5, color: '#ff6622', type: 'projectile' },
  { name: 'Thunder', cost: 12, dmg: 4, color: '#ffff44', type: 'screen' },
  { name: 'Death', cost: 20, dmg: 999, color: '#880088', type: 'single' }
];

const RANKS = [
  { name: 'Novice', xp: 0, hp: 20, mp: 10 },
  { name: 'Apprentice', xp: 100, hp: 30, mp: 15 },
  { name: 'Warrior', xp: 300, hp: 45, mp: 22 },
  { name: 'Knight', xp: 700, hp: 60, mp: 30 },
  { name: 'Hero', xp: 1500, hp: 80, mp: 40 },
  { name: 'Champion', xp: 3000, hp: 100, mp: 55 },
  { name: 'Legend', xp: 6000, hp: 130, mp: 70 }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let player = {};
let camera = { x: 0, y: 0 };
let currentArea = 0;
let currentRoom = 0;
let enemies = [];
let projectiles = [];
let items = [];
let npcs = [];
let doors = [];
let platforms = [];
let tiles = [];
let corruptionParticles = [];
let transTimer = 0;
let transTarget = null;
let dialogText = '';
let dialogTimer = 0;
let shopItems = [];
let shopMode = '';
let shopCursor = 0;
let menuOpen = false;
let menuCursor = 0;
let spellSelect = false;
let spellCursor = 0;
let wingBootTimer = 0;
let bossHP = 0;
let bossMaxHP = 0;
let bossActive = false;
let victoryTimer = 0;
let deathTimer = 0;
let keyItems = [false, false, false, false, false]; // keys for each area gate

function initPlayer() {
  player = {
    x: 64, y: 200, vx: 0, vy: 0,
    w: 14, h: 24,
    facing: 1,
    onGround: false,
    attacking: false,
    attackTimer: 0,
    crouching: false,
    invuln: 0,
    hp: 20, maxHp: 20,
    mp: 10, maxMp: 10,
    gold: 50,
    xp: 0, rank: 0,
    sword: 0, armor: 0, shield: 0,
    spells: [true, false, false, false],
    currentSpell: 0,
    wingBoots: 0,
    lastTown: 0
  };
}

// === LEVEL GENERATION ===
function generateRoom(area, room) {
  tiles = [];
  enemies = [];
  items = [];
  npcs = [];
  doors = [];
  platforms = [];
  corruptionParticles = [];

  const isTown = (area === 0 && room === 0) || (area === 2 && room === 0) ||
                 (area === 0 && room === 3) || (area === 4 && room === 0);
  const roomW = isTown ? 60 : 45 + Math.floor(Math.random() * 20);
  const roomH = ROWS;

  // Generate base terrain
  for (let x = 0; x < roomW; x++) {
    for (let y = 0; y < roomH; y++) {
      tiles.push({ x: x, y: y, solid: false, type: 'air' });
    }
  }

  // Ground
  let groundY = roomH - 2;
  for (let x = 0; x < roomW; x++) {
    const variation = isTown ? 0 : Math.floor(Math.sin(x * 0.3) * 2);
    const gy = Math.min(roomH - 1, Math.max(roomH - 4, groundY + variation));
    for (let y = gy; y < roomH; y++) {
      setTile(x, y, true, 'ground');
    }
    // Walls at edges
    for (let y = 0; y < roomH; y++) {
      if (x === 0 || x === roomW - 1) setTile(x, y, true, 'wall');
    }
  }

  // Ceiling for caves
  if (area === 1 || area === 4) {
    for (let x = 0; x < roomW; x++) {
      setTile(x, 0, true, 'wall');
      if (Math.random() < 0.3) setTile(x, 1, true, 'wall');
    }
  }

  // Platforms
  if (!isTown) {
    const numPlats = 5 + Math.floor(Math.random() * 8);
    for (let i = 0; i < numPlats; i++) {
      const px = 3 + Math.floor(Math.random() * (roomW - 8));
      const py = 5 + Math.floor(Math.random() * (roomH - 9));
      const pw = 2 + Math.floor(Math.random() * 4);
      for (let dx = 0; dx < pw; dx++) {
        if (px + dx < roomW - 1) setTile(px + dx, py, true, 'platform');
      }
      platforms.push({ x: px * TILE, y: py * TILE, w: pw * TILE, h: TILE });
    }
    // Vertical sections for tree climbing feel
    if (area >= 2) {
      for (let i = 0; i < 3; i++) {
        const lx = 5 + Math.floor(Math.random() * (roomW - 12));
        for (let ly = 4; ly < roomH - 4; ly += 3) {
          const side = (ly % 6 < 3) ? 0 : 3;
          setTile(lx + side, ly, true, 'platform');
          setTile(lx + side + 1, ly, true, 'platform');
        }
      }
    }
  }

  // Doors / transitions
  if (room < getRoomCount(area) - 1) {
    // Door to next room (right side)
    doors.push({ x: (roomW - 2) * TILE, y: (groundY - 3) * TILE, w: TILE, h: TILE * 3, target: { area: area, room: room + 1 }, locked: false });
  }
  if (room > 0) {
    // Door back to previous room (left side)
    doors.push({ x: TILE, y: (groundY - 3) * TILE, w: TILE, h: TILE * 3, target: { area: area, room: room - 1 }, locked: false });
  }
  // Area transition door (at end of last room of area)
  if (room === getRoomCount(area) - 1 && area < 4) {
    const locked = !keyItems[area];
    doors.push({ x: (roomW - 3) * TILE, y: 3 * TILE, w: TILE * 2, h: TILE * 3, target: { area: area + 1, room: 0 }, locked: locked, isGate: true });
  }

  // NPCs in towns
  if (isTown) {
    setupTown(area, room, roomW, groundY);
  } else {
    // Enemies
    spawnEnemies(area, room, roomW, groundY);
    // Item drops (gold, potions)
    if (Math.random() < 0.4) {
      const ix = (5 + Math.floor(Math.random() * (roomW - 10))) * TILE;
      const iy = (groundY - 2) * TILE;
      items.push({ x: ix, y: iy, type: Math.random() < 0.6 ? 'gold' : 'potion', value: 10 + area * 15 });
    }
    // Key item in specific rooms
    if (room === getRoomCount(area) - 2 && !keyItems[area]) {
      const kx = Math.floor(roomW / 2) * TILE;
      items.push({ x: kx, y: 4 * TILE, type: 'key', area: area });
    }
  }

  // Corruption particles (more in later areas)
  for (let i = 0; i < (area + 1) * 5; i++) {
    corruptionParticles.push({
      x: Math.random() * roomW * TILE,
      y: Math.random() * roomH * TILE,
      vx: (Math.random() - 0.5) * 20,
      vy: -10 - Math.random() * 30,
      life: Math.random(),
      size: 1 + Math.random() * 3
    });
  }

  return roomW;
}

function setTile(x, y, solid, type) {
  const idx = y * 100 + x; // sparse
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i].x === x && tiles[i].y === y) {
      tiles[i].solid = solid;
      tiles[i].type = type;
      return;
    }
  }
  tiles.push({ x: x, y: y, solid: solid, type: type });
}

function getTile(tx, ty) {
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i].x === tx && tiles[i].y === ty) return tiles[i];
  }
  return { solid: false, type: 'air' };
}

function isSolid(px, py) {
  const tx = Math.floor(px / TILE);
  const ty = Math.floor(py / TILE);
  const t = getTile(tx, ty);
  return t.solid;
}

function getRoomCount(area) {
  return [4, 5, 4, 5, 4][area];
}

// === TOWN SETUP ===
function setupTown(area, room, roomW, groundY) {
  const ty = (groundY - 2) * TILE;
  if (area === 0 && room === 0) {
    // Root Town - starter
    npcs.push({ x: 8 * TILE, y: ty, type: 'elder', dialog: 'The World Tree is dying... Dark spores corrupt everything. You must climb and cleanse it!' });
    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'Welcome to my shop! Press UP to browse.', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'Rest here to restore your strength. (10 gold)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'guru', dialog: 'I shall teach you the spell of Deluge. Water cleanses corruption!', teach: 0 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'villager', dialog: 'I heard the trunk caves are infested with slimes... be careful!' });
  } else if (area === 0 && room === 3) {
    // End of root area - small outpost
    npcs.push({ x: 10 * TILE, y: ty, type: 'guard', dialog: 'The trunk gate is locked. Find the Root Key deeper in these tunnels.' });
    npcs.push({ x: 20 * TILE, y: ty, type: 'shopkeep', dialog: 'Need potions for the road?', shop: 'item' });
  } else if (area === 2 && room === 0) {
    // Branch Village
    npcs.push({ x: 8 * TILE, y: ty, type: 'elder', dialog: 'The corruption grows stronger above. You will need fire magic against the canopy beasts.' });
    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'Fine weapons from the branch-smiths!', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'A warm bed and hot meal. (30 gold)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'guru', dialog: 'The flame within you awakens! Learn Fire!', teach: 1 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'shopkeep', dialog: 'Armor and shields, forged in living wood!', shop: 'armor' });
    npcs.push({ x: 48 * TILE, y: ty, type: 'villager', dialog: 'Wing boots let you fly! The canopy merchant sells them.' });
  } else if (area === 4 && room === 0) {
    // Crown Citadel entrance
    npcs.push({ x: 8 * TILE, y: ty, type: 'elder', dialog: 'The Spore King awaits at the crown. Only the Death spell can ensure victory.' });
    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'The finest weapons in all the tree!', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'Rest before the final battle. (50 gold)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'guru', dialog: 'Death itself bows to your will. Use it wisely...', teach: 3 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'shopkeep', dialog: 'Wing boots - last chance to stock up!', shop: 'boots' });
  }
}

// === ENEMY SPAWNING ===
function spawnEnemies(area, room, roomW, groundY) {
  const count = 3 + area * 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const ex = (4 + Math.floor(Math.random() * (roomW - 8))) * TILE;
    const ey = (groundY - 2) * TILE;
    const type = getEnemyType(area, room);
    enemies.push(createEnemy(type, ex, ey));
  }
  // Boss at end of each area (penultimate room)
  if (room === getRoomCount(area) - 1 && area > 0) {
    const bx = Math.floor(roomW / 2) * TILE;
    const boss = createBoss(area, bx, (groundY - 4) * TILE);
    enemies.push(boss);
    bossActive = true;
    bossHP = boss.hp;
    bossMaxHP = boss.hp;
  }
}

function getEnemyType(area, room) {
  const types = [
    ['slime', 'bat'],
    ['slime', 'bat', 'skeleton', 'dark_fungus'],
    ['skeleton', 'dark_fungus', 'plant'],
    ['bat', 'plant', 'knight', 'wizard'],
    ['knight', 'wizard', 'dark_fungus', 'skeleton']
  ];
  const pool = types[area];
  return pool[Math.floor(Math.random() * pool.length)];
}

function createEnemy(type, x, y) {
  const base = { x: x, y: y, vx: 0, vy: 0, facing: -1, hp: 1, maxHp: 1, dmg: 1, xp: 5, gold: 5, w: 14, h: 14, type: type, attackTimer: 0, moveTimer: 0, alive: true, flash: 0 };
  switch (type) {
    case 'slime': return Object.assign(base, { hp: 3, maxHp: 3, dmg: 1, xp: 5, gold: 5, w: 12, h: 10, color: '#44cc44' });
    case 'bat': return Object.assign(base, { hp: 2, maxHp: 2, dmg: 1, xp: 8, gold: 3, w: 14, h: 10, color: '#886644', flying: true, vy: -30 });
    case 'skeleton': return Object.assign(base, { hp: 6, maxHp: 6, dmg: 2, xp: 15, gold: 12, w: 12, h: 22, color: '#ccccaa' });
    case 'dark_fungus': return Object.assign(base, { hp: 8, maxHp: 8, dmg: 3, xp: 20, gold: 18, color: '#8822aa', w: 16, h: 16 });
    case 'plant': return Object.assign(base, { hp: 5, maxHp: 5, dmg: 2, xp: 12, gold: 8, color: '#22aa44', w: 14, h: 20, shoots: true });
    case 'knight': return Object.assign(base, { hp: 12, maxHp: 12, dmg: 4, xp: 30, gold: 25, color: '#555577', w: 14, h: 24 });
    case 'wizard': return Object.assign(base, { hp: 7, maxHp: 7, dmg: 5, xp: 35, gold: 30, color: '#6644aa', w: 12, h: 22, shoots: true });
    default: return Object.assign(base, { hp: 3, maxHp: 3, color: '#44cc44' });
  }
}

function createBoss(area, x, y) {
  const bosses = [
    null,
    { name: 'Slime King', hp: 30, dmg: 3, xp: 100, gold: 80, w: 32, h: 32, color: '#22ff22', type: 'boss_slime' },
    { name: 'Bone Dragon', hp: 50, dmg: 5, xp: 200, gold: 150, w: 40, h: 28, color: '#ccbb88', type: 'boss_bone' },
    { name: 'Canopy Hydra', hp: 70, dmg: 6, xp: 350, gold: 200, w: 36, h: 36, color: '#44aa66', type: 'boss_hydra' },
    { name: 'Spore King', hp: 120, dmg: 8, xp: 600, gold: 500, w: 48, h: 48, color: '#aa22ff', type: 'boss_final' }
  ];
  const b = bosses[area];
  return { x: x, y: y, vx: 0, vy: 0, facing: -1, hp: b.hp, maxHp: b.hp, dmg: b.dmg, xp: b.xp, gold: b.gold, w: b.w, h: b.h, type: b.type, color: b.color, name: b.name, attackTimer: 0, moveTimer: 0, alive: true, flash: 0, isBoss: true };
}

// === ROOM WIDTH TRACKING ===
let roomWidth = 0;

function loadRoom(area, room) {
  currentArea = area;
  currentRoom = room;
  bossActive = false;
  bossHP = 0;
  roomWidth = generateRoom(area, room) * TILE;
  // Position player
  if (transTarget && transTarget.room > currentRoom - 1) {
    player.x = 48;
  } else if (transTarget && transTarget.room < currentRoom + 1) {
    player.x = roomWidth - 64;
  } else {
    player.x = 64;
  }
  player.y = (ROWS - 5) * TILE;
  player.vy = 0;
  player.vx = 0;
  camera.x = Math.max(0, player.x - GW / 2);
  transTarget = null;
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || touch.left) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || touch.right) moveX = 1;

  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a || touch.up;
  const attackPressed = keys['KeyZ'] || keys['KeyX'] || touch.b;
  const crouchPressed = keys['ArrowDown'] || keys['KeyS'] || touch.down;

  player.crouching = crouchPressed && player.onGround && !player.attacking;

  // Movement
  if (!player.attacking || !player.onGround) {
    player.vx = moveX * MOVE_SPEED;
    if (moveX !== 0) player.facing = moveX;
  } else {
    player.vx = 0;
  }

  // Jump
  if (jumpPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    TAS.audio.playTone(260, 0.1, 'square', 0.06, 400);
  }

  // Wing boots flight
  if (wingBootTimer > 0) {
    if (jumpPressed && !player.onGround) {
      player.vy = Math.max(player.vy - 500 * dt, -200);
    }
    wingBootTimer -= dt;
    if (wingBootTimer <= 0) wingBootTimer = 0;
  }

  // Attack
  if (attackPressed && !player.attacking && player.attackTimer <= 0) {
    player.attacking = true;
    player.attackTimer = 0.3;
    TAS.audio.playTone(180, 0.08, 'sawtooth', 0.06, 100);
    // Check hit on enemies
    performAttack();
  }
  if (player.attackTimer > 0) {
    player.attackTimer -= dt;
    if (player.attackTimer <= 0) {
      player.attacking = false;
    }
  }

  // Gravity
  if (!player.onGround) {
    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }

  // Apply velocity
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // Collision with tiles
  resolveCollisions();

  // Invulnerability
  if (player.invuln > 0) player.invuln -= dt;

  // Camera
  const targetCamX = player.x - GW / 2 + player.w / 2;
  camera.x += (targetCamX - camera.x) * 4 * dt;
  camera.x = TAS.math.clamp(camera.x, 0, Math.max(0, roomWidth - GW));

  // Bounds
  if (player.x < TILE) player.x = TILE;
  if (player.x > roomWidth - TILE - player.w) player.x = roomWidth - TILE - player.w;

  // Fall death
  if (player.y > ROWS * TILE + 50) {
    takeDamage(5);
    player.y = (ROWS - 6) * TILE;
    player.vy = 0;
  }
}

function resolveCollisions() {
  player.onGround = false;

  // Horizontal
  const px = Math.floor((player.x + player.w / 2) / TILE);
  const pyTop = Math.floor(player.y / TILE);
  const pyBot = Math.floor((player.y + player.h - 1) / TILE);

  // Left wall
  if (player.vx < 0) {
    const lx = Math.floor(player.x / TILE);
    for (let ty = pyTop; ty <= pyBot; ty++) {
      if (getTile(lx, ty).solid) {
        player.x = (lx + 1) * TILE;
        player.vx = 0;
        break;
      }
    }
  }
  // Right wall
  if (player.vx > 0) {
    const rx = Math.floor((player.x + player.w) / TILE);
    for (let ty = pyTop; ty <= pyBot; ty++) {
      if (getTile(rx, ty).solid) {
        player.x = rx * TILE - player.w;
        player.vx = 0;
        break;
      }
    }
  }
  // Floor
  if (player.vy >= 0) {
    const by = Math.floor((player.y + player.h) / TILE);
    const lx = Math.floor(player.x / TILE);
    const rx = Math.floor((player.x + player.w - 1) / TILE);
    for (let tx = lx; tx <= rx; tx++) {
      if (getTile(tx, by).solid) {
        player.y = by * TILE - player.h;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
  }
  // Ceiling
  if (player.vy < 0) {
    const ty = Math.floor(player.y / TILE);
    const lx = Math.floor(player.x / TILE);
    const rx = Math.floor((player.x + player.w - 1) / TILE);
    for (let tx = lx; tx <= rx; tx++) {
      if (getTile(tx, ty).solid) {
        player.y = (ty + 1) * TILE;
        player.vy = 0;
        break;
      }
    }
  }
}

function performAttack() {
  const sword = SWORDS[player.sword];
  const ax = player.x + (player.facing > 0 ? player.w : -sword.range);
  const ay = player.crouching ? player.y + player.h - 12 : player.y + 4;
  const aw = sword.range;
  const ah = 12;

  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    if (TAS.hit.rectOverlap(ax, ay, aw, ah, e.x, e.y, e.w, e.h)) {
      hitEnemy(e, sword.dmg);
    }
  }
}

function hitEnemy(e, dmg) {
  e.hp -= dmg;
  e.flash = 0.15;
  TAS.audio.playTone(100, 0.05, 'square', 0.08);
  TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#fff', 5, 2);

  if (e.hp <= 0) {
    e.alive = false;
    player.xp += e.xp;
    player.gold += e.gold;
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, e.color, 12, 3, { gravity: 1 });
    TAS.audio.playTone(500, 0.15, 'square', 0.06, 200);
    checkRankUp();
    if (e.isBoss) {
      bossActive = false;
      bossHP = 0;
      TAS.fx.shake(8, 0.92);
      TAS.fx.flash('#fff', 0.5);
      TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.2]], 150);
      if (currentArea === 4) {
        state = 'victory';
        victoryTimer = 0;
      }
    }
  }
}

function takeDamage(dmg) {
  if (player.invuln > 0) return;
  const totalDef = ARMORS[player.armor].def + SHIELDS[player.shield].def;
  const actualDmg = Math.max(1, dmg - Math.floor(totalDef / 2));
  player.hp -= actualDmg;
  player.invuln = INVULN_TIME;
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(4, 0.9);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 50);

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  state = 'dead';
  deathTimer = 3;
  player.gold = Math.floor(player.gold / 2);
  TAS.audio.playMelody([[200, 0.2], [150, 0.2], [100, 0.3]], 200);
}

function checkRankUp() {
  const nextRank = player.rank + 1;
  if (nextRank < RANKS.length && player.xp >= RANKS[nextRank].xp) {
    player.rank = nextRank;
    player.maxHp = RANKS[nextRank].hp;
    player.maxMp = RANKS[nextRank].mp;
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    TAS.fx.flash('#ffdd44', 0.4);
    TAS.audio.playMelody([[440, 0.1], [554, 0.1], [659, 0.1], [880, 0.2]], 120);
    showDialog('Rank Up! You are now a ' + RANKS[nextRank].name + '!');
  }
}

// === SPELL CASTING ===
function castSpell() {
  const spell = SPELLS[player.currentSpell];
  if (!player.spells[player.currentSpell]) return;
  if (player.mp < spell.cost) {
    showDialog('Not enough MP!');
    return;
  }
  player.mp -= spell.cost;
  TAS.audio.playTone(400, 0.2, 'sine', 0.08, 800);

  if (spell.type === 'projectile') {
    projectiles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h / 2,
      vx: player.facing * 250,
      vy: 0,
      dmg: spell.dmg,
      color: spell.color,
      life: 2,
      size: 6,
      friendly: true
    });
  } else if (spell.type === 'screen') {
    // Thunder - hits all enemies on screen
    TAS.fx.flash(spell.color, 0.6);
    TAS.fx.shake(6, 0.9);
    TAS.audio.playNoise(0.3, 0.1, 2000);
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (!e.alive) continue;
      if (e.x > camera.x - 20 && e.x < camera.x + GW + 20) {
        hitEnemy(e, spell.dmg);
      }
    }
  } else if (spell.type === 'single') {
    // Death - kill nearest enemy
    let nearest = null;
    let nearDist = Infinity;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (!e.alive) continue;
      const d = Math.abs(e.x - player.x);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (nearest) {
      hitEnemy(nearest, spell.dmg);
      TAS.particles.spawn(nearest.x + nearest.w / 2, nearest.y + nearest.h / 2, '#880088', 20, 4);
      TAS.fx.flash('#440044', 0.4);
    }
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    if (e.flash > 0) e.flash -= dt;

    e.moveTimer += dt;

    if (e.flying) {
      // Bat movement - sine wave
      e.x += Math.cos(e.moveTimer * 3) * 60 * dt;
      e.y += Math.sin(e.moveTimer * 2) * 40 * dt;
    } else if (e.isBoss) {
      // Boss AI
      updateBossAI(e, dt);
    } else {
      // Ground movement
      if (e.moveTimer > 1.5) {
        e.facing = (player.x > e.x) ? 1 : -1;
        e.moveTimer = 0;
      }
      e.vx = e.facing * (40 + currentArea * 10);
      e.x += e.vx * dt;

      // Simple gravity
      e.vy += GRAVITY * dt;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.y += e.vy * dt;

      // Floor collision
      const by = Math.floor((e.y + e.h) / TILE);
      const tx = Math.floor((e.x + e.w / 2) / TILE);
      if (getTile(tx, by).solid) {
        e.y = by * TILE - e.h;
        e.vy = 0;
      }

      // Wall collision / turn around
      const wx = Math.floor((e.x + (e.facing > 0 ? e.w : 0)) / TILE);
      const wy = Math.floor((e.y + e.h / 2) / TILE);
      if (getTile(wx, wy).solid) {
        e.facing *= -1;
      }

      // Shooting enemies
      if (e.shoots) {
        e.attackTimer += dt;
        if (e.attackTimer > 2 && Math.abs(e.x - player.x) < 200) {
          e.attackTimer = 0;
          const dir = player.x > e.x ? 1 : -1;
          projectiles.push({
            x: e.x + e.w / 2,
            y: e.y + e.h / 2,
            vx: dir * 150,
            vy: 0,
            dmg: e.dmg,
            color: '#ff4444',
            life: 3,
            size: 4,
            friendly: false
          });
        }
      }
    }

    // Check player collision
    if (player.invuln <= 0 && e.alive) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        takeDamage(e.dmg);
        player.vy = -150;
        player.vx = (player.x < e.x) ? -100 : 100;
      }
    }
  }
}

function updateBossAI(boss, dt) {
  boss.attackTimer += dt;
  boss.moveTimer += dt;

  // Move toward player
  const dx = player.x - boss.x;
  boss.facing = dx > 0 ? 1 : -1;
  boss.x += boss.facing * 50 * dt;

  // Jump occasionally
  if (boss.moveTimer > 3) {
    boss.vy = -250;
    boss.moveTimer = 0;
    TAS.fx.shake(3, 0.9);
  }

  // Gravity
  boss.vy += GRAVITY * dt;
  if (boss.vy > MAX_FALL) boss.vy = MAX_FALL;
  boss.y += boss.vy * dt;

  // Floor
  const by = Math.floor((boss.y + boss.h) / TILE);
  const tx = Math.floor((boss.x + boss.w / 2) / TILE);
  if (getTile(tx, by).solid) {
    boss.y = by * TILE - boss.h;
    boss.vy = 0;
  }

  // Attack - shoot projectiles
  if (boss.attackTimer > 1.5) {
    boss.attackTimer = 0;
    for (let a = -1; a <= 1; a++) {
      projectiles.push({
        x: boss.x + boss.w / 2,
        y: boss.y + boss.h / 2,
        vx: (a === 0 ? boss.facing : a) * 120,
        vy: -50 + a * 30,
        dmg: boss.dmg,
        color: boss.color,
        life: 3,
        size: 6,
        friendly: false
      });
    }
    TAS.audio.playTone(80, 0.15, 'sawtooth', 0.06);
  }

  bossHP = boss.hp;
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    if (p.friendly) {
      // Hit enemies
      for (let j = 0; j < enemies.length; j++) {
        const e = enemies[j];
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2, e.x, e.y, e.w, e.h)) {
          hitEnemy(e, p.dmg);
          projectiles.splice(i, 1);
          break;
        }
      }
    } else {
      // Hit player
      if (player.invuln <= 0 && TAS.hit.rectOverlap(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2, player.x, player.y, player.w, player.h)) {
        takeDamage(p.dmg);
        projectiles.splice(i, 1);
      }
    }
  }
}

// === ITEM PICKUP ===
function checkItems() {
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, item.x, item.y, TILE, TILE)) {
      if (item.type === 'gold') {
        player.gold += item.value;
        TAS.audio.playTone(800, 0.08, 'square', 0.05);
      } else if (item.type === 'potion') {
        player.hp = Math.min(player.maxHp, player.hp + 10);
        TAS.audio.playTone(600, 0.12, 'sine', 0.06, 900);
        TAS.particles.spawn(player.x + player.w / 2, player.y, '#44ff44', 8, 2);
      } else if (item.type === 'key') {
        keyItems[item.area] = true;
        TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 120);
        showDialog('Got the ' + AREA_NAMES[item.area] + ' Key!');
        TAS.fx.flash('#ffdd44', 0.3);
      }
      items.splice(i, 1);
    }
  }
}

// === DOOR INTERACTIONS ===
function checkDoors() {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  if (!(keys['ArrowUp'] || keys['KeyW'] || touch.up)) return;

  for (let i = 0; i < doors.length; i++) {
    const d = doors[i];
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, d.x, d.y, d.w, d.h)) {
      if (d.locked) {
        showDialog('This gate is locked. Find the ' + AREA_NAMES[d.target.area - 1] + ' Key!');
        return;
      }
      // Transition
      transTarget = d.target;
      state = 'transition';
      transTimer = 0.5;
      TAS.audio.playTone(300, 0.2, 'sine', 0.06, 600);
      return;
    }
  }
}

// === NPC INTERACTIONS ===
function checkNPCs() {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  if (!(keys['ArrowUp'] || keys['KeyW'] || touch.up)) return;

  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i];
    if (Math.abs(player.x - n.x) < 24 && Math.abs(player.y - n.y) < 30) {
      if (n.shop === 'weapon') {
        openShop('weapon');
      } else if (n.shop === 'armor') {
        openShop('armor');
      } else if (n.shop === 'item') {
        openShop('item');
      } else if (n.shop === 'boots') {
        openShop('boots');
      } else if (n.shop === 'inn') {
        if (player.gold >= getInnCost()) {
          player.gold -= getInnCost();
          player.hp = player.maxHp;
          player.mp = player.maxMp;
          player.lastTown = currentArea;
          saveGame();
          showDialog('HP and MP restored! Game saved.');
          TAS.audio.playMelody([[440, 0.15], [554, 0.15], [659, 0.2]], 150);
        } else {
          showDialog('Not enough gold! Need ' + getInnCost() + 'G.');
        }
      } else if (n.teach !== undefined) {
        if (!player.spells[n.teach]) {
          player.spells[n.teach] = true;
          player.currentSpell = n.teach;
          showDialog('Learned ' + SPELLS[n.teach].name + '! Select spells with S key.');
          TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
        } else {
          showDialog(n.dialog);
        }
      } else {
        showDialog(n.dialog);
      }
      return;
    }
  }
}

function getInnCost() {
  return [10, 20, 30, 40, 50][currentArea];
}

// === SHOP SYSTEM ===
function openShop(type) {
  shopMode = type;
  shopCursor = 0;
  state = 'shop';
  shopItems = [];

  if (type === 'weapon') {
    for (let i = 0; i < SWORDS.length; i++) {
      if (i > player.sword) shopItems.push({ name: SWORDS[i].name, cost: SWORDS[i].cost, type: 'sword', idx: i });
    }
  } else if (type === 'armor') {
    for (let i = 0; i < ARMORS.length; i++) {
      if (i > player.armor) shopItems.push({ name: ARMORS[i].name, cost: ARMORS[i].cost, type: 'armor', idx: i });
    }
    for (let i = 0; i < SHIELDS.length; i++) {
      if (i > player.shield) shopItems.push({ name: SHIELDS[i].name, cost: SHIELDS[i].cost, type: 'shield', idx: i });
    }
  } else if (type === 'item') {
    shopItems.push({ name: 'Health Potion', cost: 20 + currentArea * 10, type: 'hpot' });
    shopItems.push({ name: 'Mana Potion', cost: 30 + currentArea * 10, type: 'mpot' });
  } else if (type === 'boots') {
    shopItems.push({ name: 'Wing Boots', cost: 200, type: 'wings' });
    shopItems.push({ name: 'Health Potion', cost: 20 + currentArea * 10, type: 'hpot' });
  }
  shopItems.push({ name: 'Leave', cost: 0, type: 'exit' });
}

function updateShop(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowDown'] || touch.down) {
    if (!keys._shopDown) {
      shopCursor = (shopCursor + 1) % shopItems.length;
      keys._shopDown = true;
      TAS.audio.playTone(300, 0.05, 'square', 0.04);
    }
  } else { keys._shopDown = false; }

  if (keys['ArrowUp'] || touch.up) {
    if (!keys._shopUp) {
      shopCursor = (shopCursor - 1 + shopItems.length) % shopItems.length;
      keys._shopUp = true;
      TAS.audio.playTone(300, 0.05, 'square', 0.04);
    }
  } else { keys._shopUp = false; }

  if (keys['KeyZ'] || keys['Enter'] || touch.a) {
    if (!keys._shopSelect) {
      keys._shopSelect = true;
      const item = shopItems[shopCursor];
      if (item.type === 'exit') {
        state = 'playing';
        return;
      }
      if (player.gold < item.cost) {
        showDialog('Not enough gold!');
        state = 'playing';
        return;
      }
      player.gold -= item.cost;
      if (item.type === 'sword') { player.sword = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'armor') { player.armor = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'shield') { player.shield = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'hpot') { player.hp = Math.min(player.maxHp, player.hp + 15); showDialog('HP restored!'); }
      else if (item.type === 'mpot') { player.mp = Math.min(player.maxMp, player.mp + 10); showDialog('MP restored!'); }
      else if (item.type === 'wings') { player.wingBoots++; showDialog('Got Wing Boots! Press JUMP in air to fly (30s).'); }
      TAS.audio.playTone(600, 0.1, 'sine', 0.06);
      state = 'playing';
    }
  } else { keys._shopSelect = false; }

  if (keys['Escape'] || keys['KeyX']) {
    state = 'playing';
  }
}

// === MENU ===
function updateMenu(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowDown'] || touch.down) {
    if (!keys._menuDown) { menuCursor = (menuCursor + 1) % 4; keys._menuDown = true; }
  } else { keys._menuDown = false; }

  if (keys['ArrowUp'] || touch.up) {
    if (!keys._menuUp) { menuCursor = (menuCursor - 1 + 4) % 4; keys._menuUp = true; }
  } else { keys._menuUp = false; }

  if (keys['KeyZ'] || keys['Enter'] || touch.a) {
    if (!keys._menuSel) {
      keys._menuSel = true;
      if (menuCursor === 0) { // Cast spell
        if (player.spells[player.currentSpell]) castSpell();
      } else if (menuCursor === 1) { // Select spell
        spellSelect = true;
        spellCursor = player.currentSpell;
      } else if (menuCursor === 2) { // Use wing boots
        if (player.wingBoots > 0 && wingBootTimer <= 0) {
          player.wingBoots--;
          wingBootTimer = 30;
          showDialog('Wing Boots activated! 30 seconds of flight!');
        }
      } else if (menuCursor === 3) { // Close
        menuOpen = false;
        state = 'playing';
      }
    }
  } else { keys._menuSel = false; }

  if (keys['Escape'] || keys['KeyM']) {
    if (!keys._menuEsc) { menuOpen = false; state = 'playing'; keys._menuEsc = true; }
  } else { keys._menuEsc = false; }

  // Spell selection
  if (spellSelect) {
    if (keys['ArrowLeft'] || touch.left) {
      if (!keys._spLeft) { spellCursor = (spellCursor - 1 + 4) % 4; keys._spLeft = true; }
    } else { keys._spLeft = false; }
    if (keys['ArrowRight'] || touch.right) {
      if (!keys._spRight) { spellCursor = (spellCursor + 1) % 4; keys._spRight = true; }
    } else { keys._spRight = false; }
    if (keys['KeyZ'] || keys['Enter'] || touch.a) {
      if (player.spells[spellCursor]) {
        player.currentSpell = spellCursor;
        spellSelect = false;
      }
    }
    if (keys['Escape'] || keys['KeyX']) { spellSelect = false; }
  }
}

// === DIALOG ===
function showDialog(text) {
  dialogText = text;
  dialogTimer = Math.max(2, text.length * 0.04);
}

// === CORRUPTION PARTICLES ===
function updateCorruption(dt) {
  for (let i = 0; i < corruptionParticles.length; i++) {
    const p = corruptionParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 0.3;
    if (p.life <= 0) {
      p.x = camera.x + Math.random() * GW;
      p.y = ROWS * TILE;
      p.life = 1;
      p.vy = -10 - Math.random() * 30;
    }
  }
}

// === SAVE / LOAD ===
function saveGame() {
  const data = {
    hp: player.hp, maxHp: player.maxHp, mp: player.mp, maxMp: player.maxMp,
    gold: player.gold, xp: player.xp, rank: player.rank,
    sword: player.sword, armor: player.armor, shield: player.shield,
    spells: player.spells, currentSpell: player.currentSpell,
    wingBoots: player.wingBoots, lastTown: player.lastTown,
    area: currentArea, room: currentRoom, keyItems: keyItems
  };
  try { localStorage.setItem('faxanadu_fungi_save', JSON.stringify(data)); } catch (err) { console.error('Save failed:', err); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('faxanadu_fungi_save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    initPlayer();
    player.hp = data.hp; player.maxHp = data.maxHp;
    player.mp = data.mp; player.maxMp = data.maxMp;
    player.gold = data.gold; player.xp = data.xp; player.rank = data.rank;
    player.sword = data.sword; player.armor = data.armor; player.shield = data.shield;
    player.spells = data.spells; player.currentSpell = data.currentSpell;
    player.wingBoots = data.wingBoots; player.lastTown = data.lastTown;
    keyItems = data.keyItems;
    loadRoom(data.area, data.room);
    return true;
  } catch (err) { console.error('Load failed:', err); return false; }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (dialogTimer > 0) {
    dialogTimer -= dt;
    if (TAS.input.keys['KeyZ'] || TAS.input.keys['Enter'] || TAS.input.touch.a) dialogTimer = 0;
    return;
  }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      if (!loadGame()) {
        startNewGame();
      }
      state = 'playing';
    }
    return;
  }

  if (state === 'dead') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      player.hp = player.maxHp;
      player.mp = player.maxMp;
      loadRoom(player.lastTown, 0);
      state = 'playing';
    }
    return;
  }

  if (state === 'transition') {
    transTimer -= dt;
    if (transTimer <= 0 && transTarget) {
      loadRoom(transTarget.area, transTarget.room);
      state = 'playing';
    }
    return;
  }

  if (state === 'shop') {
    updateShop(dt);
    return;
  }

  if (state === 'menu') {
    updateMenu(dt);
    return;
  }

  if (state === 'victory') {
    victoryTimer += dt;
    if (victoryTimer > 5 && (TAS.input.keys['KeyZ'] || TAS.input.touch.a)) {
      state = 'title';
      try { localStorage.removeItem('faxanadu_fungi_save'); } catch (e) { console.error('Clear save failed:', e); }
    }
    return;
  }

  if (state === 'playing') {
    // Menu toggle
    if (TAS.input.keys['KeyM'] || TAS.input.keys['Escape']) {
      if (!TAS.input.keys._menuToggle) {
        TAS.input.keys._menuToggle = true;
        menuOpen = true;
        menuCursor = 0;
        state = 'menu';
        return;
      }
    } else { TAS.input.keys._menuToggle = false; }

    // Quick spell cast with S
    if (TAS.input.keys['KeyS']) {
      if (!TAS.input.keys._spellCast) {
        TAS.input.keys._spellCast = true;
        castSpell();
      }
    } else { TAS.input.keys._spellCast = false; }

    updatePlayer(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    checkItems();
    checkDoors();
    checkNPCs();
    updateCorruption(dt);
  }
}

function startNewGame() {
  initPlayer();
  keyItems = [false, false, false, false, false];
  wingBootTimer = 0;
  loadRoom(0, 0);
}

// === DRAWING ===
function draw(dt) {
  const colors = AREA_COLORS[AREAS[currentArea]] || AREA_COLORS.root_town;

  // Background
  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-camera.x, 0);

  // Draw tiles
  drawTiles(colors);

  // Draw corruption particles
  drawCorruption();

  // Draw doors
  drawDoors();

  // Draw items
  drawItems();

  // Draw NPCs
  drawNPCs();

  // Draw enemies
  drawEnemies();

  // Draw player
  drawPlayer();

  // Draw projectiles
  drawProjectiles();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Dialog
  if (dialogTimer > 0) drawDialog();

  // Shop overlay
  if (state === 'shop') drawShop();

  // Menu overlay
  if (state === 'menu') drawMenu();

  // Death screen
  if (state === 'dead') drawDeath();

  // Boss HP bar
  if (bossActive && bossHP > 0) drawBossBar();

  // Transition
  if (state === 'transition') {
    ctx.fillStyle = 'rgba(0,0,0,' + (1 - transTimer * 2) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Wing boot timer
  if (wingBootTimer > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('WINGS: ' + Math.ceil(wingBootTimer) + 's', GW - 8, 52);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawTitle() {
  // Dark tree silhouette
  ctx.fillStyle = '#0a0505';
  ctx.fillRect(0, 0, GW, GH);

  // Tree trunk
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(GW / 2 - 40, 60, 80, GH - 60);

  // Branches
  for (let i = 0; i < 6; i++) {
    const by = 70 + i * 35;
    const bw = 30 + i * 15;
    ctx.fillStyle = '#1a1208';
    ctx.fillRect(GW / 2 - bw, by, bw * 2, 6);
  }

  // Corruption glow
  const pulse = Math.sin(frame * 0.03) * 0.3 + 0.5;
  ctx.globalAlpha = pulse * 0.3;
  ctx.fillStyle = '#6622aa';
  ctx.beginPath();
  ctx.arc(GW / 2, GH / 2, 100, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Title text
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('FAXANADU FUNGI', GW / 2 + 2, 42);
  ctx.fillStyle = '#44cc66';
  ctx.fillText('FAXANADU FUNGI', GW / 2, 40);

  ctx.fillStyle = '#886644';
  ctx.font = '12px monospace';
  ctx.fillText('The World Tree is Dying', GW / 2, 58);

  // Floating corruption particles on title
  for (let i = 0; i < 15; i++) {
    const px = GW / 2 + Math.sin(frame * 0.02 + i * 0.7) * 150;
    const py = GH / 2 + Math.cos(frame * 0.015 + i * 1.1) * 100;
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.05 + i) * 0.3;
    ctx.fillStyle = '#8833cc';
    ctx.beginPath();
    ctx.arc(px, py, 2 + Math.sin(frame * 0.04 + i) * 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Controls info
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS/WASD: Move | Z: Attack | S: Spell | M: Menu', GW / 2, GH - 40);

  // Start prompt
  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function drawTiles(colors) {
  const startCol = Math.max(0, Math.floor(camera.x / TILE) - 1);
  const endCol = Math.min(startCol + COLS + 2, Math.floor(roomWidth / TILE));

  for (let x = startCol; x < endCol; x++) {
    for (let y = 0; y < ROWS; y++) {
      const t = getTile(x, y);
      if (!t.solid) continue;
      const tx = x * TILE;
      const ty = y * TILE;

      if (t.type === 'ground') {
        ctx.fillStyle = colors.ground;
        ctx.fillRect(tx, ty, TILE, TILE);
        // Top edge highlight
        ctx.fillStyle = colors.accent;
        ctx.fillRect(tx, ty, TILE, 2);
        // Texture
        if ((x + y) % 3 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.fillRect(tx + 4, ty + 4, 3, 3);
        }
      } else if (t.type === 'wall') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
      } else if (t.type === 'platform') {
        ctx.fillStyle = colors.accent;
        ctx.fillRect(tx, ty, TILE, 4);
        ctx.fillStyle = colors.ground;
        ctx.fillRect(tx, ty + 4, TILE, TILE - 4);
      }
    }
  }

  // Background tree bark decoration
  for (let x = startCol; x < endCol; x += 4) {
    if (x % 8 < 4) {
      ctx.fillStyle = 'rgba(60,40,20,0.15)';
      ctx.fillRect(x * TILE, 0, TILE * 2, ROWS * TILE);
    }
  }
}

function drawCorruption() {
  for (let i = 0; i < corruptionParticles.length; i++) {
    const p = corruptionParticles[i];
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = '#8833cc';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawDoors() {
  for (let i = 0; i < doors.length; i++) {
    const d = doors[i];
    if (d.isGate) {
      // Large gate
      ctx.fillStyle = d.locked ? '#4a1a1a' : '#1a4a1a';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.strokeStyle = d.locked ? '#aa4444' : '#44aa44';
      ctx.lineWidth = 2;
      ctx.strokeRect(d.x, d.y, d.w, d.h);
      // Lock icon
      if (d.locked) {
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(d.x + d.w / 2 - 4, d.y + d.h / 2 - 4, 8, 8);
      }
    } else {
      // Normal door
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.fillStyle = '#5a4a30';
      ctx.fillRect(d.x + 2, d.y + 2, d.w - 4, d.h - 4);
      // Handle
      ctx.fillStyle = '#aa8844';
      ctx.beginPath();
      ctx.arc(d.x + d.w - 4, d.y + d.h / 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawItems() {
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const bob = Math.sin(frame * 0.08 + i) * 3;

    if (item.type === 'gold') {
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(item.x + 8, item.y + 8 + bob, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#aa8800';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('$', item.x + 8, item.y + 11 + bob);
    } else if (item.type === 'potion') {
      ctx.fillStyle = '#44ff44';
      ctx.fillRect(item.x + 4, item.y + 4 + bob, 8, 10);
      ctx.fillStyle = '#228822';
      ctx.fillRect(item.x + 5, item.y + 2 + bob, 6, 3);
    } else if (item.type === 'key') {
      ctx.fillStyle = '#ffdd00';
      ctx.fillRect(item.x + 3, item.y + 4 + bob, 10, 4);
      ctx.fillRect(item.x + 10, item.y + 4 + bob, 3, 8);
      ctx.fillStyle = '#ffff88';
      ctx.beginPath();
      ctx.arc(item.x + 5, item.y + 6 + bob, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawNPCs() {
  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i];
    const bob = Math.sin(frame * 0.04 + i * 2) * 1;

    // Body
    let bodyColor = '#888888';
    let headColor = '#ddccaa';
    if (n.type === 'elder') { bodyColor = '#4444aa'; headColor = '#ddddcc'; }
    else if (n.type === 'shopkeep') { bodyColor = '#44aa44'; }
    else if (n.type === 'innkeep') { bodyColor = '#aa6644'; }
    else if (n.type === 'guru') { bodyColor = '#8844aa'; headColor = '#eeddff'; }
    else if (n.type === 'guard') { bodyColor = '#666688'; }
    else if (n.type === 'villager') { bodyColor = '#887744'; }

    // Draw NPC
    ctx.fillStyle = bodyColor;
    ctx.fillRect(n.x + 2, n.y + 8 + bob, 12, 16);
    ctx.fillStyle = headColor;
    ctx.beginPath();
    ctx.arc(n.x + 8, n.y + 6 + bob, 6, 0, Math.PI * 2);
    ctx.fill();

    // Indicator if player is near
    if (Math.abs(player.x - n.x) < 30 && Math.abs(player.y - n.y) < 30) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('^', n.x + 8, n.y - 6 + Math.sin(frame * 0.1) * 2);
    }
  }
}

function drawEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;

    if (e.flash > 0) {
      ctx.fillStyle = '#fff';
    } else {
      ctx.fillStyle = e.color;
    }

    if (e.isBoss) {
      // Boss - larger, more detailed
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(e.x + 4, e.y + 4, e.w - 8, e.h - 8);
      // Eyes
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(e.x + e.w * 0.25, e.y + e.h * 0.25, 4, 4);
      ctx.fillRect(e.x + e.w * 0.65, e.y + e.h * 0.25, 4, 4);
      // Corruption aura
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.2;
      ctx.fillStyle = '#8822aa';
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + e.h / 2, e.w * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (e.type === 'slime') {
      // Blob shape
      const squish = Math.sin(frame * 0.1 + i) * 2;
      ctx.beginPath();
      ctx.ellipse(e.x + e.w / 2, e.y + e.h / 2 + squish / 2, e.w / 2 + squish, e.h / 2 - squish / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 7, e.y + 2, 2, 2);
    } else if (e.type === 'bat') {
      // Wing flap
      const wingAngle = Math.sin(frame * 0.2 + i) * 0.5;
      ctx.fillRect(e.x + 3, e.y + 4, 8, 6);
      ctx.fillRect(e.x - 2 + wingAngle * 3, e.y + 2, 6, 4);
      ctx.fillRect(e.x + 8 - wingAngle * 3, e.y + 2, 6, 4);
    } else if (e.type === 'skeleton') {
      ctx.fillRect(e.x + 2, e.y, 10, 22);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x + 4, e.y + 4, 2, 2);
      ctx.fillRect(e.x + 8, e.y + 4, 2, 2);
      ctx.fillRect(e.x + 5, e.y + 10, 4, 1);
    } else if (e.type === 'dark_fungus') {
      // Mushroom shape
      ctx.beginPath();
      ctx.arc(e.x + e.w / 2, e.y + 4, 8, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(e.x + 5, e.y + 4, 6, 12);
      // Spore dots
      ctx.fillStyle = '#ff44ff';
      ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
      ctx.fillRect(e.x + 9, e.y + 3, 2, 2);
    } else if (e.type === 'plant') {
      ctx.fillRect(e.x + 4, e.y + 8, 6, 12);
      ctx.fillStyle = '#55dd55';
      ctx.beginPath();
      ctx.arc(e.x + 7, e.y + 6, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(e.x + 7, e.y + 5, 3, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'knight') {
      ctx.fillRect(e.x + 1, e.y, e.w - 2, e.h);
      ctx.fillStyle = '#333344';
      ctx.fillRect(e.x + 3, e.y + 2, e.w - 6, 8);
      // Visor slit
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(e.x + 4, e.y + 5, 6, 2);
    } else if (e.type === 'wizard') {
      ctx.fillRect(e.x + 2, e.y + 6, 8, 16);
      // Hat
      ctx.fillStyle = '#4422aa';
      ctx.beginPath();
      ctx.moveTo(e.x + 1, e.y + 8);
      ctx.lineTo(e.x + 6, e.y - 4);
      ctx.lineTo(e.x + 11, e.y + 8);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.fillRect(e.x + 4, e.y + 9, 2, 2);
    } else {
      ctx.fillRect(e.x, e.y, e.w, e.h);
    }
  }
}

function drawPlayer() {
  if (player.invuln > 0 && Math.floor(frame * 0.3) % 2 === 0) return;

  const px = player.x;
  const py = player.y;

  // Body
  ctx.fillStyle = '#44aa66';
  if (player.crouching) {
    ctx.fillRect(px, py + 12, player.w, player.h - 12);
  } else {
    ctx.fillRect(px + 2, py + 8, 10, 16);
  }

  // Head (baseling - round with eyes)
  ctx.fillStyle = '#66cc88';
  ctx.beginPath();
  ctx.arc(px + player.w / 2, py + 6, 7, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  const eyeX = player.facing > 0 ? 2 : -2;
  ctx.fillRect(px + 5 + eyeX, py + 4, 2, 3);
  ctx.fillRect(px + 9 + eyeX, py + 4, 2, 3);

  // Armor tint
  if (player.armor > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = ['', '#888', '#aaa', '#88aaff'][player.armor];
    ctx.fillRect(px + 2, py + 8, 10, 14);
    ctx.globalAlpha = 1;
  }

  // Sword attack animation
  if (player.attacking) {
    const swordLen = SWORDS[player.sword].range;
    const sx = player.facing > 0 ? px + player.w : px - swordLen;
    const sy = player.crouching ? py + player.h - 8 : py + 10;
    ctx.fillStyle = '#ccccdd';
    ctx.fillRect(sx, sy, swordLen, 3);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + (player.facing > 0 ? swordLen - 4 : 0), sy - 1, 4, 5);
  }

  // Shield
  if (player.shield > 0) {
    ctx.fillStyle = ['', '#666', '#888', '#88aaff'][player.shield];
    const shx = player.facing > 0 ? px - 2 : px + player.w - 4;
    ctx.fillRect(shx, py + 8, 4, 10);
  }

  // Wing boot glow
  if (wingBootTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.2) * 0.2;
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(px + 2, py + player.h - 4, 4, 4);
    ctx.fillRect(px + 8, py + player.h - 4, 4, 4);
    ctx.globalAlpha = 1;
  }
}

function drawProjectiles() {
  for (let i = 0; i < projectiles.length; i++) {
    const p = projectiles[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(p.x - p.vx * 0.02, p.y - p.vy * 0.02, p.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // Background bar
  ctx.fillStyle = 'rgba(10,5,15,0.85)';
  ctx.fillRect(0, 0, GW, 40);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 4, 100, 10);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#44cc44' : '#cc4444';
  ctx.fillRect(4, 4, Math.max(0, (player.hp / player.maxHp) * 100), 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + player.hp + '/' + player.maxHp, 6, 12);

  // MP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 17, 80, 8);
  ctx.fillStyle = '#4488ff';
  ctx.fillRect(4, 17, Math.max(0, (player.mp / player.maxMp) * 80), 8);
  ctx.fillStyle = '#fff';
  ctx.fillText('MP ' + player.mp + '/' + player.maxMp, 6, 24);

  // Gold
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('G:' + player.gold, 4, 36);

  // Current spell
  ctx.fillStyle = player.spells[player.currentSpell] ? SPELLS[player.currentSpell].color : '#555';
  ctx.textAlign = 'center';
  ctx.fillText(SPELLS[player.currentSpell].name, GW / 2, 12);
  ctx.fillStyle = '#888';
  ctx.fillText('[S] cast | [M] menu', GW / 2, 24);

  // Area name
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText(AREA_NAMES[currentArea], GW - 4, 12);

  // Rank
  ctx.fillStyle = '#888';
  ctx.fillText(RANKS[player.rank].name, GW - 4, 24);

  // XP to next
  const nextXP = player.rank < RANKS.length - 1 ? RANKS[player.rank + 1].xp : 9999;
  ctx.fillText('XP:' + player.xp + '/' + nextXP, GW - 4, 36);

  // Equipment icons
  ctx.fillStyle = '#ccccdd';
  ctx.textAlign = 'left';
  ctx.fillText(SWORDS[player.sword].name.charAt(0), 110, 12);
  ctx.fillText(ARMORS[player.armor].name.charAt(0), 122, 12);
  ctx.fillText(SHIELDS[player.shield].name.charAt(0), 134, 12);
}

function drawDialog() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(20, GH - 70, GW - 40, 50);
  ctx.strokeStyle = '#886644';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, GH - 70, GW - 40, 50);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';

  // Word wrap
  const maxW = GW - 60;
  const words = dialogText.split(' ');
  let line = '';
  let y = GH - 54;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, 30, y);
      line = words[i] + ' ';
      y += 14;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 30, y);

  // Continue prompt
  const pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'right';
  ctx.fillText('[Z]', GW - 30, GH - 26);
  ctx.globalAlpha = 1;
}

function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(60, 50, GW - 120, GH - 100);
  ctx.strokeStyle = '#886644';
  ctx.lineWidth = 2;
  ctx.strokeRect(60, 50, GW - 120, GH - 100);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SHOP - Gold: ' + player.gold, GW / 2, 72);

  ctx.font = '12px monospace';
  for (let i = 0; i < shopItems.length; i++) {
    const item = shopItems[i];
    const y = 95 + i * 22;
    ctx.fillStyle = i === shopCursor ? '#ffdd44' : '#aaa';
    ctx.textAlign = 'left';
    const prefix = i === shopCursor ? '> ' : '  ';
    const costStr = item.cost > 0 ? ' (' + item.cost + 'G)' : '';
    ctx.fillText(prefix + item.name + costStr, 80, y);

    if (item.cost > 0 && player.gold < item.cost) {
      ctx.fillStyle = '#aa4444';
      ctx.textAlign = 'right';
      ctx.fillText('(need more gold)', GW - 80, y);
    }
  }

  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.font = '10px monospace';
  ctx.fillText('UP/DOWN to select, Z to buy, ESC to leave', GW / 2, GH - 60);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(80, 40, GW - 160, GH - 80);
  ctx.strokeStyle = '#44aa88';
  ctx.lineWidth = 2;
  ctx.strokeRect(80, 40, GW - 160, GH - 80);

  ctx.fillStyle = '#44cc88';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MENU', GW / 2, 62);

  const options = ['Cast ' + SPELLS[player.currentSpell].name, 'Select Spell', 'Wing Boots (' + player.wingBoots + ')', 'Close'];
  ctx.font = '12px monospace';
  for (let i = 0; i < options.length; i++) {
    ctx.fillStyle = i === menuCursor ? '#ffdd44' : '#aaa';
    ctx.textAlign = 'left';
    ctx.fillText((i === menuCursor ? '> ' : '  ') + options[i], 100, 90 + i * 24);
  }

  // Equipment display
  ctx.fillStyle = '#888';
  ctx.textAlign = 'left';
  ctx.font = '10px monospace';
  ctx.fillText('Sword: ' + SWORDS[player.sword].name + ' (DMG ' + SWORDS[player.sword].dmg + ')', 100, 185);
  ctx.fillText('Armor: ' + ARMORS[player.armor].name + ' (DEF ' + ARMORS[player.armor].def + ')', 100, 198);
  ctx.fillText('Shield: ' + SHIELDS[player.shield].name + ' (DEF ' + SHIELDS[player.shield].def + ')', 100, 211);
  ctx.fillText('Rank: ' + RANKS[player.rank].name + ' | XP: ' + player.xp, 100, 228);

  // Spell selection overlay
  if (spellSelect) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(100, 100, GW - 200, 60);
    ctx.strokeStyle = '#4488ff';
    ctx.strokeRect(100, 100, GW - 200, 60);
    ctx.font = '11px monospace';
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = !player.spells[i] ? '#444' : i === spellCursor ? '#ffdd44' : SPELLS[i].color;
      ctx.textAlign = 'center';
      ctx.fillText(SPELLS[i].name + ' (' + SPELLS[i].cost + 'MP)', 130 + i * 60, 125);
      if (i === spellCursor) ctx.fillText('^', 130 + i * 60, 145);
    }
  }
}

function drawDeath() {
  ctx.fillStyle = 'rgba(20,0,0,0.8)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#cc2222';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('YOU DIED', GW / 2, GH / 2 - 20);
  ctx.fillStyle = '#aa8844';
  ctx.font = '12px monospace';
  ctx.fillText('Lost half your gold...', GW / 2, GH / 2 + 10);
  ctx.fillText('Returning to ' + AREA_NAMES[player.lastTown] + '...', GW / 2, GH / 2 + 30);
}

function drawBossBar() {
  const barW = 200;
  const barH = 10;
  const bx = (GW - barW) / 2;
  const by = 44;
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = '#cc2222';
  ctx.fillRect(bx, by, (bossHP / bossMaxHP) * barW, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS', GW / 2, by + 8);
}

function drawVictory() {
  ctx.fillStyle = '#050a05';
  ctx.fillRect(0, 0, GW, GH);

  // Growing tree (cleansed)
  const progress = Math.min(1, victoryTimer / 3);
  ctx.fillStyle = '#3a6030';
  ctx.fillRect(GW / 2 - 30, GH * (1 - progress * 0.7), 60, GH * progress * 0.7);

  // Leaves appearing
  for (let i = 0; i < Math.floor(progress * 20); i++) {
    const lx = GW / 2 + Math.sin(i * 1.3) * (30 + i * 5);
    const ly = GH * 0.3 + Math.cos(i * 0.7) * 40;
    ctx.fillStyle = '#44cc44';
    ctx.beginPath();
    ctx.arc(lx, ly, 4 + Math.sin(frame * 0.05 + i) * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('THE WORLD TREE IS CLEANSED!', GW / 2, 40);

  if (victoryTimer > 2) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px monospace';
    ctx.fillText('The dark spores are vanquished.', GW / 2, GH - 80);
    ctx.fillText('Life returns to Tasern.', GW / 2, GH - 60);
  }

  if (victoryTimer > 4) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '12px monospace';
    ctx.fillText('Final Rank: ' + RANKS[player.rank].name, GW / 2, GH - 30);
    const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('Press Z for title screen', GW / 2, GH - 12);
    ctx.globalAlpha = 1;
  }
}

// === GAME LOOP START ===
TAS.loop.start(update, draw);

})();
</script>
