<!DOCTYPE html>
<html lang="en">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === BASELING STAT INTEGRATION (NftLoader) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Derived stat helpers (15+ refs throughout)
function statMod(val) { return Math.floor((val - 10) / 2); }
var strMod = statMod(statB.str);   // melee damage, push force, block break
var dexMod = statMod(statB.dex);   // move speed, dodge chance, projectile speed
var conMod = statMod(statB.con);   // HP scaling, poison resist, lava resist
var intMod = statMod(statB.int);   // sub-weapon damage, puzzle hints, dark vision
var wisMod = statMod(statB.wis);   // item find rate, trap detect, vanish tile warning
var chaMod = statMod(statB.cha);   // NPC discounts, boss intimidation, score bonus

// Stat-derived gameplay values
var BASE_HP = Math.max(3, 3 + conMod);                           // ref 1: CON -> max HP
var MOVE_DELAY = Math.max(4, 8 - Math.floor(dexMod * 0.5));      // ref 2: DEX -> move speed
var MELEE_DAMAGE = Math.max(1, statB.damage + strMod);            // ref 3: STR -> melee damage
var WEAPON_RANGE_BONUS = Math.max(0, Math.floor(dexMod * 0.5));   // ref 4: DEX -> weapon range
var JUMP_DIST = Math.max(1, 1 + Math.floor(dexMod * 0.3));       // ref 5: DEX -> jump distance
var SUB_WEAPON_DMG = Math.max(1, 2 + intMod);                     // ref 6: INT -> sub-weapon damage
var AMMO_CAP = Math.max(10, 20 + intMod * 2);                     // ref 7: INT -> ammo capacity
var DROP_RATE = Math.min(0.6, 0.3 + wisMod * 0.04);               // ref 8: WIS -> item drop rate
var VANISH_WARN = Math.max(15, 20 + wisMod * 3);                  // ref 9: WIS -> vanish tile timer
var DARK_RADIUS = Math.max(1.5, 2 + intMod * 0.3);                // ref 10: INT -> dark room vision
var DODGE_CHANCE = Math.min(0.25, Math.max(0, dexMod * 0.03));    // ref 11: DEX -> dodge chance
var BOSS_INTIMIDATE = Math.max(0, chaMod * 2);                    // ref 12: CHA -> boss atk delay
var SCORE_MULT = statB.scoreMult * (1 + chaMod * 0.05);           // ref 13: CHA -> score multiplier
var POISON_RESIST = Math.min(0.5, Math.max(0, conMod * 0.08));    // ref 14: CON -> poison resist
var CRIT_CHANCE = Math.min(0.3, Math.max(0, 0.05 + wisMod * 0.02 + statB.luck * 0.01)); // ref 15: WIS+luck -> crit
var EXTRA_LIVES = statB.lives;                                     // ref 16: bonus lives from NFT
var COOLDOWN_MULT = Math.max(0.5, statB.cooldown);                 // ref 17: attack cooldown

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
var TILE = 32;
var COLS = 15, ROWS = 9;
var HUD_Y = 28;
var DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
var DX = [0, 1, 0, -1], DY = [-1, 0, 1, 0];

TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'ATTACK', b: 'JUMP' } });

// === AUDIO ===
var SFX = {
  yoyo: function() { TAS.audio.playTone(800, 0.08, 'square', 0.07, 1200); TAS.audio.playTone(400, 0.06, 'triangle', 0.05); },
  hit: function() { TAS.audio.playTone(200, 0.12, 'sawtooth', 0.1, 80); TAS.audio.playNoise(0.08, 0.06); },
  hurt: function() { TAS.audio.playTone(250, 0.2, 'square', 0.08, 100); },
  jump: function() { TAS.audio.playTone(400, 0.1, 'square', 0.06, 800); },
  pickup: function() { TAS.audio.playTone(880, 0.06, 'square', 0.07); setTimeout(function(){TAS.audio.playTone(1100, 0.08, 'square', 0.07);}, 60); },
  door: function() { TAS.audio.playNoise(0.2, 0.05); TAS.audio.playTone(120, 0.2, 'triangle', 0.05, 80); },
  splash: function() { TAS.audio.playNoise(0.3, 0.08, 400); },
  boss: function() { TAS.audio.playTone(80, 0.5, 'sawtooth', 0.1, 40); TAS.audio.playNoise(0.3, 0.08); },
  die: function() { TAS.audio.playTone(400, 0.3, 'sawtooth', 0.1, 60); setTimeout(function(){TAS.audio.playTone(200, 0.3, 'square', 0.08, 40);}, 200); },
  victory: function() { TAS.audio.playMelody([[523,0.12],[659,0.12],[784,0.12],[1047,0.2]], 130); },
  switch_: function() { TAS.audio.playTone(660, 0.08, 'triangle', 0.06); TAS.audio.playTone(880, 0.1, 'triangle', 0.06); },
  sail: function() { TAS.audio.playTone(220, 0.3, 'sine', 0.04, 180); },
  npc: function() { TAS.audio.playTone(440, 0.06, 'triangle', 0.05); },
  crit: function() { TAS.audio.playTone(1200, 0.06, 'square', 0.08); TAS.audio.playTone(1600, 0.08, 'square', 0.06); },
  poison: function() { TAS.audio.playTone(150, 0.15, 'sawtooth', 0.05, 80); },
  score: function() { TAS.audio.playTone(660, 0.04, 'triangle', 0.04); },
  levelUp: function() { TAS.audio.playMelody([[440,0.08],[550,0.08],[660,0.08],[880,0.15]], 140); },
  chest: function() { TAS.audio.playMelody([[330,0.1],[440,0.1],[550,0.1],[660,0.15]], 120); },
  trap: function() { TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 50); TAS.audio.playNoise(0.15, 0.06); }
};

// === TASERN ISLAND DEFINITIONS (Pass 2) ===
var ISLANDS = [
  { name: 'Coral Shallows', color: '#44cc88', ocean: '#2266aa', floor: '#338855', wall: '#554433',
    enemies: ['kobold','crab'], bossHp: 6, bossName: 'Tideclaw the Bloated',
    weather: 'clear', ambient: '#226644' },
  { name: 'Thornwood Isle', color: '#66dd55', ocean: '#2255aa', floor: '#2a6633', wall: '#3d2817',
    enemies: ['goblin','snake'], bossHp: 8, bossName: 'Grukk Thornfang',
    weather: 'rain', ambient: '#1a4422' },
  { name: 'Cinderpeak', color: '#cc6633', ocean: '#334488', floor: '#4a2a1a', wall: '#663322',
    enemies: ['fire_drake','bat'], bossHp: 10, bossName: 'Pyrevex the Ashen',
    weather: 'embers', ambient: '#442211' },
  { name: 'Frostfang Reef', color: '#aaddff', ocean: '#224477', floor: '#6688aa', wall: '#445566',
    enemies: ['frost_wraith','skeleton'], bossHp: 12, bossName: 'Rimejaw the Eternal',
    weather: 'snow', ambient: '#334466' },
  { name: 'Shadow Atoll', color: '#665588', ocean: '#112244', floor: '#2a1a33', wall: '#332244',
    enemies: ['shade','ghost'], bossHp: 14, bossName: 'Nihilor the Unbound',
    weather: 'fog', ambient: '#1a1122' },
  { name: 'Iron Bastion', color: '#8899aa', ocean: '#223355', floor: '#3a3a44', wall: '#556677',
    enemies: ['construct','robot'], bossHp: 16, bossName: 'The Forgemaster',
    weather: 'sparks', ambient: '#2a2a33' },
  { name: 'Spore Citadel', color: '#88cc44', ocean: '#113322', floor: '#2a3a1a', wall: '#334422',
    enemies: ['myconid','fungi','shade'], bossHp: 20, bossName: 'The Spore Mother',
    weather: 'spores', ambient: '#1a2a11' }
];

// === TILE TYPES ===
var T = {
  FLOOR: 0, WALL: 1, WATER: 2, DOOR: 3, SWITCH: 4, PIT: 5,
  VANISH: 6, CONVEYOR_U: 7, CONVEYOR_D: 8, CONVEYOR_L: 9, CONVEYOR_R: 10,
  LAVA: 11, ICE: 12, DARK: 13, STAIRS_DOWN: 14, STAIRS_UP: 15,
  BLOCK: 16, BUTTON: 17, CHEST: 18, NPC: 19, ENTRANCE: 20,
  POISON: 21, SPIKES: 22, RUNE_FLOOR: 23
};

// === SEEDED RANDOM ===
var seed = 777;
function srand(s) { seed = s; }
function rand() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
function randI(min, max) { return Math.floor(rand() * (max - min + 1)) + min; }

// === SCORE & COMBO SYSTEM (Pass 2) ===
var score = 0;
var combo = 0;
var comboTimer = 0;
var highScore = 0;
var scorePopups = [];

function addScore(pts, x, y) {
  var mult = Math.max(1, combo) * SCORE_MULT;
  var total = Math.round(pts * mult);
  score += total;
  combo++;
  comboTimer = 120;
  if (score > highScore) highScore = score;
  scorePopups.push({ x: x, y: y, text: '+' + total, timer: 60, color: combo > 3 ? '#ff44ff' : combo > 1 ? '#ffaa44' : '#ffdd44' });
  if (combo > 1) {
    scorePopups.push({ x: x, y: y - 12, text: combo + 'x COMBO', timer: 45, color: '#44ffff' });
  }
  SFX.score();
}

function updateScorePopups() {
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }
  for (var i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].timer--;
    scorePopups[i].y -= 0.8;
    if (scorePopups[i].timer <= 0) scorePopups.splice(i, 1);
  }
}

function drawScorePopups() {
  for (var i = 0; i < scorePopups.length; i++) {
    var p = scorePopups[i];
    ctx.globalAlpha = Math.min(1, p.timer / 15);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === TUTORIAL SYSTEM (Pass 3) ===
var tutorialStep = 0;
var tutorialShown = false;
var tutorialTimer = 0;
var TUTORIAL_MSGS = [
  'ARROWS or WASD to move your ' + statB.name,
  'Z or SPACE to attack with your yo-yo',
  'X to jump over gaps and hazards',
  'C to fire your sub-weapon (uses ammo)',
  'ESC to open the sea chart and sail between islands',
  'Find the dungeon entrance to face the island boss!'
];

function updateTutorial() {
  if (tutorialShown) return;
  tutorialTimer++;
  if (tutorialTimer > 240) {
    tutorialStep++;
    tutorialTimer = 0;
    if (tutorialStep >= TUTORIAL_MSGS.length) tutorialShown = true;
  }
}

function drawTutorial() {
  if (tutorialShown || tutorialStep >= TUTORIAL_MSGS.length) return;
  var alpha = 1;
  if (tutorialTimer < 30) alpha = tutorialTimer / 30;
  else if (tutorialTimer > 210) alpha = (240 - tutorialTimer) / 30;
  ctx.globalAlpha = alpha * 0.9;
  ctx.fillStyle = 'rgba(0,0,20,0.85)';
  var tw = 400;
  ctx.fillRect(GW/2 - tw/2, GH - 65, tw, 28);
  ctx.strokeStyle = '#44ddaa';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW/2 - tw/2, GH - 65, tw, 28);
  ctx.fillStyle = '#44ffaa';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(TUTORIAL_MSGS[tutorialStep], GW/2, GH - 47);
  ctx.globalAlpha = 1;
}

// === WEATHER/AMBIENT PARTICLES (Pass 3) ===
var weatherParticles = [];

function spawnWeather(island) {
  weatherParticles = [];
  var isl = ISLANDS[island];
  var count = 0;
  if (isl.weather === 'rain') count = 40;
  else if (isl.weather === 'snow') count = 30;
  else if (isl.weather === 'embers') count = 15;
  else if (isl.weather === 'spores') count = 20;
  else if (isl.weather === 'sparks') count = 10;
  else if (isl.weather === 'fog') count = 8;
  for (var i = 0; i < count; i++) {
    weatherParticles.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      vx: isl.weather === 'rain' ? -1 : (Math.random() - 0.5) * 0.5,
      vy: isl.weather === 'rain' ? 4 : isl.weather === 'snow' ? 0.8 : isl.weather === 'embers' ? -1.5 : 0.3,
      size: isl.weather === 'fog' ? 20 + Math.random() * 30 : 1 + Math.random() * 2,
      alpha: 0.3 + Math.random() * 0.4
    });
  }
}

function updateWeather() {
  for (var i = 0; i < weatherParticles.length; i++) {
    var p = weatherParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.y > GH + 10) { p.y = -10; p.x = Math.random() * GW; }
    if (p.y < -10) { p.y = GH + 10; p.x = Math.random() * GW; }
    if (p.x > GW + 10) p.x = -10;
    if (p.x < -10) p.x = GW + 10;
  }
}

function drawWeather(island) {
  var isl = ISLANDS[island];
  for (var i = 0; i < weatherParticles.length; i++) {
    var p = weatherParticles[i];
    ctx.globalAlpha = p.alpha;
    if (isl.weather === 'rain') {
      ctx.strokeStyle = '#6688cc';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + p.vx * 2, p.y + p.vy * 2);
      ctx.stroke();
    } else if (isl.weather === 'snow') {
      ctx.fillStyle = '#ddeeff';
      ctx.beginPath();
      ctx.arc(p.x + Math.sin(p.y * 0.03) * 2, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (isl.weather === 'embers') {
      ctx.fillStyle = '#ff' + (Math.random() > 0.5 ? '6600' : '8800');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (isl.weather === 'spores') {
      ctx.fillStyle = '#aaff44';
      ctx.beginPath();
      ctx.arc(p.x + Math.sin(p.y * 0.05) * 5, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (isl.weather === 'sparks') {
      ctx.fillStyle = '#ffcc44';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 0.8, 0, Math.PI * 2);
      ctx.fill();
    } else if (isl.weather === 'fog') {
      ctx.fillStyle = '#667788';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.lineWidth = 1;
}

// === DEATH ANIMATION (Pass 3) ===
var deathAnim = { active: false, timer: 0, x: 0, y: 0, particles: [] };

function startDeathAnim(x, y) {
  deathAnim.active = true;
  deathAnim.timer = 60;
  deathAnim.x = x;
  deathAnim.y = y;
  deathAnim.particles = [];
  for (var i = 0; i < 20; i++) {
    var a = (i / 20) * Math.PI * 2;
    deathAnim.particles.push({
      x: x, y: y,
      vx: Math.cos(a) * (2 + Math.random() * 3),
      vy: Math.sin(a) * (2 + Math.random() * 3),
      size: 2 + Math.random() * 3,
      color: i % 2 === 0 ? statB.color : '#ff4444'
    });
  }
}

function updateDeathAnim() {
  if (!deathAnim.active) return;
  deathAnim.timer--;
  for (var i = 0; i < deathAnim.particles.length; i++) {
    var p = deathAnim.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.size *= 0.97;
  }
  if (deathAnim.timer <= 0) deathAnim.active = false;
}

function drawDeathAnim() {
  if (!deathAnim.active) return;
  var alpha = deathAnim.timer / 60;
  ctx.globalAlpha = alpha;
  for (var i = 0; i < deathAnim.particles.length; i++) {
    var p = deathAnim.particles[i];
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// === GAME STATE ===
var state = 'title';
var frame = 0;
var player = {
  x: 7, y: 4, dir: DIR.DOWN,
  hp: BASE_HP, maxHp: BASE_HP, lives: 3 + EXTRA_LIVES,
  weapon: 0, subWeapon: 0, ammo: 5, jumping: false, jumpTimer: 0,
  moveTimer: 0, invincible: 0, keys: 0, poisoned: 0, gold: 0
};
var currentIsland = 0;
var inDungeon = false;
var dungeonFloor = 0;
var yoyo = null;
var projectiles = [];
var enemies = [];
var items = [];
var switches = [];
var doors = [];
var blocks = [];
var tiles = [];
var roomW = COLS, roomH = ROWS;
var camera = { x: 0, y: 0 };
var msgText = '';
var msgTimer = 0;
var bossActive = false;
var boss = null;
var bossesBeaten = [false,false,false,false,false,false,false];
var overworld = false;
var boatX = 2, boatY = 3;
var boatTarget = -1;
var boatMoving = false;
var vanishedTiles = [];
var darkRoom = false;
var hasTorch = false;
var hasRaft = false;
var hasMirror = false;
var hasRuneKey = false;
var transitionTimer = 0;
var transitionType = '';
var screenFlashColor = '';
var screenFlashTimer = 0;
var killCount = 0;

// === SAVE/LOAD ===
function saveGame() {
  try {
    localStorage.setItem('startropics_hex', JSON.stringify({
      island: currentIsland, hp: player.maxHp, lives: player.lives,
      weapon: player.weapon, bossesBeaten: bossesBeaten,
      hasTorch: hasTorch, hasRaft: hasRaft, hasMirror: hasMirror,
      hasRuneKey: hasRuneKey, score: score, highScore: highScore,
      gold: player.gold, tutorialShown: tutorialShown
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadGame() {
  try {
    var d = JSON.parse(localStorage.getItem('startropics_hex'));
    if (d) {
      currentIsland = d.island || 0;
      player.maxHp = d.hp || BASE_HP;
      player.lives = d.lives || 3 + EXTRA_LIVES;
      player.weapon = d.weapon || 0;
      bossesBeaten = d.bossesBeaten || [false,false,false,false,false,false,false];
      hasTorch = d.hasTorch || false;
      hasRaft = d.hasRaft || false;
      hasMirror = d.hasMirror || false;
      hasRuneKey = d.hasRuneKey || false;
      score = d.score || 0;
      highScore = d.highScore || 0;
      player.gold = d.gold || 0;
      tutorialShown = d.tutorialShown || false;
      return true;
    }
  } catch(e) { console.warn('Load failed:', e); }
  return false;
}

// === ROOM GENERATION ===
function generateSurface(island) {
  tiles = [];
  enemies = [];
  items = [];
  switches = [];
  doors = [];
  blocks = [];
  vanishedTiles = [];
  darkRoom = false;
  bossActive = false;
  boss = null;
  roomW = COLS; roomH = ROWS;
  scorePopups = [];

  for (var y = 0; y < roomH; y++) {
    tiles[y] = [];
    for (var x = 0; x < roomW; x++) {
      if (x === 0 || x === roomW-1 || y === 0 || y === roomH-1) {
        tiles[y][x] = T.WALL;
      } else {
        tiles[y][x] = T.FLOOR;
      }
    }
  }

  // Water edges
  srand(island * 100 + 1);
  for (var i = 0; i < 5 + island; i++) {
    var wx = randI(1, roomW-2);
    var wy = randI(1, roomH-2);
    if (wx !== 7 && wy !== 4) tiles[wy][wx] = T.WATER;
  }

  // Hazard tiles by island type
  if (island >= 2) {
    for (var h = 0; h < 2; h++) {
      var hx = randI(3, 11);
      var hy = randI(2, 6);
      if (tiles[hy][hx] === T.FLOOR && hx !== 7) {
        tiles[hy][hx] = island === 2 ? T.LAVA : island >= 5 ? T.SPIKES : T.POISON;
      }
    }
  }

  // Rune floor decorations on later islands
  if (island >= 4) {
    for (var r = 0; r < 3; r++) {
      var rx = randI(2, 12);
      var ry = randI(2, 7);
      if (tiles[ry][rx] === T.FLOOR) tiles[ry][rx] = T.RUNE_FLOOR;
    }
  }

  // Dungeon entrance
  tiles[2][roomW-3] = T.STAIRS_DOWN;

  // NPC
  tiles[roomH-3][2] = T.NPC;

  // Chest
  if (island >= 1) {
    tiles[3][randI(5, 9)] = T.CHEST;
  }

  // Items on surface
  if (island === 1 && !hasTorch) items.push({ x: 5, y: 3, type: 'torch' });
  if (island === 3 && !hasRaft) items.push({ x: 10, y: 6, type: 'raft' });
  if (island === 5 && !hasMirror) items.push({ x: 8, y: 2, type: 'mirror' });

  // Heart container if boss beaten
  if (bossesBeaten[island] && player.maxHp < BASE_HP + island + 1) {
    items.push({ x: 7, y: 5, type: 'heart_container' });
  }

  // Ammo and potion pickups
  items.push({ x: randI(3, 11), y: randI(2, 7), type: 'ammo' });
  if (island >= 2) items.push({ x: randI(4, 10), y: randI(3, 6), type: 'potion' });

  // Surface enemies (Tasern-flavored)
  var surfEnemies = Math.min(3, 1 + Math.floor(island / 2));
  var isl = ISLANDS[island];
  for (var se = 0; se < surfEnemies; se++) {
    var ex = randI(4, roomW-4);
    var ey = randI(2, roomH-3);
    if (tiles[ey][ex] === T.FLOOR) {
      var etype = isl.enemies[randI(0, isl.enemies.length - 1)];
      enemies.push(makeEnemy(ex, ey, etype, island));
    }
  }

  player.x = 7; player.y = roomH - 2;
  player.dir = DIR.UP;
  spawnWeather(island);
}

function generateDungeon(island, floor) {
  tiles = [];
  enemies = [];
  items = [];
  switches = [];
  doors = [];
  blocks = [];
  vanishedTiles = [];
  bossActive = false;
  boss = null;
  roomW = COLS; roomH = ROWS;
  scorePopups = [];
  darkRoom = (island >= 4 && floor === 1 && !hasTorch);

  for (var y = 0; y < roomH; y++) {
    tiles[y] = [];
    for (var x = 0; x < roomW; x++) {
      if (x === 0 || x === roomW-1 || y === 0 || y === roomH-1) {
        tiles[y][x] = T.WALL;
      } else {
        tiles[y][x] = T.FLOOR;
      }
    }
  }

  srand(island * 1000 + floor * 100 + 7);

  // Add walls/obstacles
  var wallCount = 4 + island + floor * 2;
  for (var i = 0; i < wallCount; i++) {
    var wx = randI(2, roomW-3);
    var wy = randI(2, roomH-3);
    if (wx !== 7 && wy !== 4) tiles[wy][wx] = T.WALL;
  }

  // Floor-specific puzzle elements
  if (floor === 0) {
    tiles[2][7] = T.DOOR;
    doors.push({ x: 7, y: 2, open: false, switchId: 0 });
    tiles[4][3] = T.SWITCH;
    switches.push({ x: 3, y: 4, id: 0, active: false });

    // Vanishing tiles on later islands
    if (island >= 1) {
      for (var v = 0; v < 3; v++) {
        var vx = randI(4, 10);
        var vy = randI(3, 6);
        if (tiles[vy][vx] === T.FLOOR) tiles[vy][vx] = T.VANISH;
      }
    }

    // Poison tiles in Thornwood+ dungeons
    if (island >= 1 && island !== 2) {
      for (var pt = 0; pt < 2; pt++) {
        var px = randI(3, 11);
        var py = randI(2, 7);
        if (tiles[py][px] === T.FLOOR && px !== 7) tiles[py][px] = T.POISON;
      }
    }

    // Spike traps in Iron Bastion+
    if (island >= 5) {
      for (var sp = 0; sp < 3; sp++) {
        var sx = randI(4, 10);
        var sy = randI(3, 6);
        if (tiles[sy][sx] === T.FLOOR) tiles[sy][sx] = T.SPIKES;
      }
    }

    // Push block puzzle
    if (island >= 2) {
      tiles[5][9] = T.BUTTON;
      blocks.push({ x: 6, y: 5 });
    }

    // Stairs to next floor
    tiles[1][roomW-2] = T.STAIRS_DOWN;

    // Chest with loot
    if (island >= 1) {
      var chestX = randI(8, 12);
      var chestY = randI(2, 5);
      if (tiles[chestY][chestX] === T.FLOOR) tiles[chestY][chestX] = T.CHEST;
    }

    // Enemies
    var eCount = 2 + island;
    var isl = ISLANDS[island];
    for (var ei = 0; ei < eCount; ei++) {
      var ex = randI(3, roomW-4);
      var ey = randI(3, roomH-4);
      if (tiles[ey][ex] === T.FLOOR || tiles[ey][ex] === T.VANISH) {
        var etype = isl.enemies[randI(0, isl.enemies.length - 1)];
        enemies.push(makeEnemy(ex, ey, etype, island));
      }
    }
  } else if (floor === 1) {
    // Boss floor
    if (island >= 2) {
      for (var c = 0; c < 3; c++) {
        var cx = randI(3, 11);
        var cy = randI(3, 6);
        if (tiles[cy][cx] === T.FLOOR) {
          tiles[cy][cx] = T.CONVEYOR_U + randI(0, 3);
        }
      }
    }

    // Ice on Frostfang
    if (island === 3) {
      for (var iy = 2; iy < roomH-2; iy++) {
        for (var ix = 2; ix < roomW-2; ix++) {
          if (tiles[iy][ix] === T.FLOOR && rand() < 0.3) tiles[iy][ix] = T.ICE;
        }
      }
    }

    // Lava on Cinderpeak
    if (island === 2) {
      for (var li = 0; li < 4; li++) {
        var lx = randI(2, 12);
        var ly = randI(2, 7);
        if (tiles[ly][lx] === T.FLOOR && lx !== 7 && ly !== 4) tiles[ly][lx] = T.LAVA;
      }
    }

    // Rune floor on Shadow Atoll boss room
    if (island === 4) {
      for (var ri = 0; ri < 6; ri++) {
        var rrx = randI(2, 12);
        var rry = randI(2, 7);
        if (tiles[rry][rrx] === T.FLOOR) tiles[rry][rrx] = T.RUNE_FLOOR;
      }
    }

    // Spawn boss
    boss = makeBoss(island);
    bossActive = true;

    tiles[roomH-2][1] = T.STAIRS_UP;
  }

  // Key for door
  if (floor === 0) items.push({ x: randI(8, 12), y: randI(4, 7), type: 'key' });

  // Dungeon loot
  if (floor === 0 && island >= 2) {
    items.push({ x: randI(2, 6), y: randI(2, 5), type: 'potion' });
  }
  if (floor === 0 && island >= 3) {
    items.push({ x: randI(3, 8), y: randI(3, 6), type: 'runestone' });
  }

  player.x = 1; player.y = roomH - 2;
  player.dir = DIR.UP;
  spawnWeather(island);
}

// === ENEMY FACTORY (Tasern-themed, Pass 2) ===
function makeEnemy(x, y, type, island) {
  var base = {
    x: x, y: y, type: type, hp: 1 + Math.floor(island / 2),
    dir: DIR.DOWN, moveTimer: 0, moveDelay: 30 + randI(0, 20),
    attackTimer: 0, flash: 0, startX: x, startY: y, scoreValue: 50
  };
  switch (type) {
    case 'kobold':   base.hp = 1; base.moveDelay = 35; base.color = '#bb6633'; base.scoreValue = 30; break;
    case 'crab':     base.hp = 1; base.moveDelay = 40; base.color = '#cc4444'; base.scoreValue = 25; break;
    case 'goblin':   base.hp = 2; base.moveDelay = 25; base.color = '#55aa33'; base.scoreValue = 50; break;
    case 'snake':    base.hp = 2; base.moveDelay = 25; base.color = '#44aa44'; base.scoreValue = 40; break;
    case 'fire_drake': base.hp = 3; base.moveDelay = 30; base.color = '#ff6622'; base.scoreValue = 80; break;
    case 'bat':      base.hp = 1; base.moveDelay = 15; base.color = '#886688'; base.scoreValue = 35; break;
    case 'frost_wraith': base.hp = 2; base.moveDelay = 20; base.color = '#88bbff'; base.scoreValue = 70; break;
    case 'skeleton': base.hp = 3; base.moveDelay = 35; base.color = '#ccccaa'; base.scoreValue = 60; break;
    case 'shade':    base.hp = 2; base.moveDelay = 18; base.color = '#9966cc'; base.scoreValue = 75; break;
    case 'ghost':    base.hp = 2; base.moveDelay = 20; base.color = '#aaaaff'; base.scoreValue = 65; break;
    case 'construct': base.hp = 5; base.moveDelay = 45; base.color = '#7799aa'; base.scoreValue = 100; break;
    case 'robot':    base.hp = 4; base.moveDelay = 45; base.color = '#7799aa'; base.scoreValue = 90; break;
    case 'myconid':  base.hp = 3; base.moveDelay = 30; base.color = '#88cc55'; base.scoreValue = 85; break;
    case 'fungi':    base.hp = 3; base.moveDelay = 30; base.color = '#88cc55'; base.scoreValue = 75; break;
    default:         base.hp = 1; base.moveDelay = 35; base.color = '#cc4444'; base.scoreValue = 25;
  }
  base.maxHp = base.hp;
  return base;
}

function makeBoss(island) {
  var isl = ISLANDS[island];
  // ref 12: CHA reduces boss HP slightly via intimidation
  var bossHp = Math.max(4, isl.bossHp - BOSS_INTIMIDATE);
  return {
    x: 7, y: 3, hp: bossHp, maxHp: bossHp,
    name: isl.bossName, dir: DIR.DOWN, moveTimer: 0,
    attackTimer: 0, phase: 0, flash: 0, pattern: 0,
    color: isl.color, island: island, scoreValue: 200 + island * 100
  };
}

// === OVERWORLD ===
var ISLAND_POS = [
  { x: 80, y: 200 }, { x: 160, y: 150 }, { x: 260, y: 100 },
  { x: 350, y: 160 }, { x: 180, y: 250 }, { x: 320, y: 250 },
  { x: 400, y: 60 }
];

function enterOverworld() {
  overworld = true;
  state = 'overworld';
  boatX = ISLAND_POS[currentIsland].x;
  boatY = ISLAND_POS[currentIsland].y;
  boatMoving = false;
  boatTarget = -1;
}

function enterIsland(idx) {
  currentIsland = idx;
  overworld = false;
  inDungeon = false;
  generateSurface(idx);
  state = 'playing';
  transitionTimer = 30;
  transitionType = 'enter';
  saveGame();
}

// === MOVEMENT & COLLISION ===
function canWalk(x, y) {
  if (x < 0 || x >= roomW || y < 0 || y >= roomH) return false;
  var t = tiles[y][x];
  if (t === T.WALL || t === T.DOOR) return false;
  if (t === T.WATER && !hasRaft && !player.jumping) return false;
  if (t === T.PIT && !player.jumping) return false;
  if (t === T.LAVA && !player.jumping) return false;
  for (var i = 0; i < blocks.length; i++) { if (blocks[i].x === x && blocks[i].y === y) return false; }
  return true;
}

function tryMove(dir) {
  if (player.moveTimer > 0) return;
  player.dir = dir;
  var nx = player.x + DX[dir];
  var ny = player.y + DY[dir];
  if (canWalk(nx, ny)) {
    player.x = nx;
    player.y = ny;
    player.moveTimer = MOVE_DELAY; // ref 2: DEX -> move speed
    onStep(nx, ny);
  }
  // Push blocks -- ref 1: STR determines push ability
  for (var i = 0; i < blocks.length; i++) {
    if (blocks[i].x === nx && blocks[i].y === ny) {
      var bx = nx + DX[dir];
      var by = ny + DY[dir];
      if (canWalkBlock(bx, by)) {
        blocks[i].x = bx;
        blocks[i].y = by;
        player.x = nx;
        player.y = ny;
        player.moveTimer = 12;
        checkButtons();
      }
    }
  }
}

function canWalkBlock(x, y) {
  if (x < 0 || x >= roomW || y < 0 || y >= roomH) return false;
  var t = tiles[y][x];
  return (t === T.FLOOR || t === T.BUTTON || t === T.ICE || t === T.RUNE_FLOOR);
}

function onStep(x, y) {
  var t = tiles[y][x];
  if (t === T.VANISH) {
    // ref 9: WIS -> vanish tile stays longer
    vanishedTiles.push({ x: x, y: y, timer: VANISH_WARN });
    // WIS warning flash
    if (wisMod >= 1) {
      TAS.particles.spawn(x * TILE + TILE/2, y * TILE + HUD_Y + TILE/2, '#ffaa44', 3, 1);
    }
  }
  if (t === T.SWITCH) {
    for (var si = 0; si < switches.length; si++) {
      var sw = switches[si];
      if (sw.x === x && sw.y === y) {
        sw.active = !sw.active;
        SFX.switch_();
        for (var di = 0; di < doors.length; di++) {
          var d = doors[di];
          if (d.switchId === sw.id) {
            d.open = sw.active;
            tiles[d.y][d.x] = sw.active ? T.FLOOR : T.DOOR;
          }
        }
      }
    }
  }
  if (t === T.STAIRS_DOWN) {
    if (!inDungeon) {
      inDungeon = true;
      dungeonFloor = 0;
      generateDungeon(currentIsland, 0);
      transitionTimer = 20;
      transitionType = 'stairs';
      SFX.door();
    } else {
      dungeonFloor++;
      generateDungeon(currentIsland, dungeonFloor);
      transitionTimer = 20;
      transitionType = 'stairs';
      SFX.door();
    }
  }
  if (t === T.STAIRS_UP) {
    if (dungeonFloor > 0) {
      dungeonFloor--;
      generateDungeon(currentIsland, dungeonFloor);
      transitionTimer = 20;
      transitionType = 'stairs';
    } else {
      inDungeon = false;
      generateSurface(currentIsland);
      transitionTimer = 20;
      transitionType = 'stairs';
    }
    SFX.door();
  }
  if (t === T.LAVA) {
    // ref 14: CON -> lava resist chance
    if (Math.random() > POISON_RESIST) hurtPlayer(1);
    else showMsg('CON save! Resisted the lava!');
  }
  if (t === T.PIT) {
    hurtPlayer(1);
  }
  if (t === T.POISON) {
    // ref 14: CON -> poison resist
    if (Math.random() > POISON_RESIST) {
      player.poisoned = 180;
      showMsg('Poisoned!');
      SFX.poison();
    } else {
      showMsg('CON save! Resisted the poison!');
    }
  }
  if (t === T.SPIKES) {
    // ref 11: DEX -> dodge spikes
    if (Math.random() > DODGE_CHANCE) {
      hurtPlayer(1);
      SFX.trap();
    } else {
      showMsg('DEX save! Dodged the spikes!');
      TAS.particles.spawn(x * TILE + TILE/2, y * TILE + HUD_Y + TILE/2, '#44ff88', 4, 1);
    }
  }
  if (t === T.CHEST) {
    openChest(x, y);
  }
  if (t === T.RUNE_FLOOR) {
    // Rune floors give minor score bonus
    addScore(5, x * TILE + TILE/2, y * TILE + HUD_Y);
  }
  if (t === T.NPC) {
    showNpcDialog();
  }
  // Pickup items
  for (var i = items.length - 1; i >= 0; i--) {
    if (items[i].x === x && items[i].y === y) {
      collectItem(items[i]);
      items.splice(i, 1);
    }
  }
}

function openChest(x, y) {
  SFX.chest();
  tiles[y][x] = T.FLOOR;
  addScore(100, x * TILE + TILE/2, y * TILE + HUD_Y);
  // Random loot table (ref 8: WIS affects quality)
  var roll = Math.random();
  if (roll < 0.2 + wisMod * 0.05) {
    items.push({ x: x, y: y, type: 'weapon_up' });
  } else if (roll < 0.5) {
    items.push({ x: x, y: y, type: 'potion' });
    items.push({ x: x, y: y, type: 'ammo' });
  } else if (roll < 0.7) {
    items.push({ x: x, y: y, type: 'runestone' });
  } else {
    items.push({ x: x, y: y, type: 'heart' });
    items.push({ x: x, y: y, type: 'ammo' });
  }
  player.gold += 10 + currentIsland * 5;
  showMsg('Found treasure! +' + (10 + currentIsland * 5) + ' gold');
  TAS.particles.spawn(x * TILE + TILE/2, y * TILE + HUD_Y + TILE/2, '#ffdd44', 12, 3);
}

function checkButtons() {
  for (var di = 0; di < doors.length; di++) {
    var d = doors[di];
    var pressed = false;
    for (var bi = 0; bi < blocks.length; bi++) {
      if (tiles[blocks[bi].y] && tiles[blocks[bi].y][blocks[bi].x] === T.BUTTON) pressed = true;
    }
    if (pressed && !d.open) {
      d.open = true;
      tiles[d.y][d.x] = T.FLOOR;
      SFX.switch_();
      addScore(50, d.x * TILE + TILE/2, d.y * TILE + HUD_Y);
    }
  }
}

// === ITEMS (Tasern-themed, Pass 2) ===
function collectItem(item) {
  SFX.pickup();
  switch (item.type) {
    case 'heart': player.hp = Math.min(player.hp + 1, player.maxHp); break;
    case 'heart_container': player.maxHp++; player.hp = player.maxHp; showMsg('+1 Heart Container!'); addScore(200, item.x * TILE, item.y * TILE + HUD_Y); break;
    case 'key': player.keys++; showMsg('Found a Dungeon Key!'); break;
    case 'ammo': player.ammo = Math.min(player.ammo + 5, AMMO_CAP); break; // ref 7: INT -> ammo cap
    case 'potion':
      player.hp = Math.min(player.hp + 2, player.maxHp);
      player.poisoned = 0;
      showMsg('Healing Potion! HP restored.');
      addScore(25, item.x * TILE, item.y * TILE + HUD_Y);
      break;
    case 'runestone':
      addScore(150, item.x * TILE, item.y * TILE + HUD_Y);
      player.gold += 25;
      showMsg('Ancient Runestone! +25 gold, +150 pts');
      break;
    case 'torch': hasTorch = true; showMsg('Got the Everflame Torch! Darkness dispelled.'); break;
    case 'raft': hasRaft = true; showMsg('Got the Driftwood Raft! Can cross water.'); break;
    case 'mirror': hasMirror = true; showMsg('Got the Mirror of Warding! Reflects magic.'); break;
    case 'weapon_up':
      player.weapon = Math.min(player.weapon + 1, 2);
      var wnames = ['Starfire Yo-yo', 'Runic Yo-yo'];
      showMsg('Weapon upgraded: ' + wnames[player.weapon - 1] + '!');
      addScore(300, item.x * TILE, item.y * TILE + HUD_Y);
      break;
    case '1up': player.lives++; showMsg('Extra Life!'); break;
    case 'gold':
      player.gold += 15;
      showMsg('+15 gold');
      addScore(15, item.x * TILE, item.y * TILE + HUD_Y);
      break;
  }
  TAS.particles.spawn(item.x * TILE + TILE/2, item.y * TILE + HUD_Y + TILE/2, '#ffdd44', 8, 2);
}

function showMsg(text) {
  msgText = text;
  msgTimer = 120;
}

function showNpcDialog() {
  var dialogs = [
    'Welcome to Coral Shallows, ' + statB.name + '! The dungeon lies northeast. Beware the kobolds!',
    'Thornwood is thick with goblins. The venom pools will slow you -- unless your constitution is strong.',
    'Cinderpeak burns! The drakes breathe fire. Watch the lava flows in the deep.',
    'Frostfang Reef -- the wraiths here phase through walls. The ice makes footing treacherous.',
    'Shadow Atoll... few return. The shades feed on fear. Seek the torch from an earlier island.',
    'Iron Bastion -- the constructs are nigh indestructible. Watch for spike traps.',
    'The Spore Citadel awaits. The Spore Mother commands all myconids. Your every skill will be tested.'
  ];
  // ref 13: CHA bonus dialog
  var chaBonus = chaMod >= 2 ? ' The villagers sense your charm and offer a blessing!' : '';
  showMsg(dialogs[currentIsland] + chaBonus);
  SFX.npc();
  if (chaMod >= 2) {
    player.hp = Math.min(player.hp + 1, player.maxHp);
    addScore(25, player.x * TILE, player.y * TILE + HUD_Y);
  }
}

// === COMBAT ===
function attack() {
  if (yoyo) return;
  SFX.yoyo();
  var range = 2 + player.weapon + WEAPON_RANGE_BONUS; // ref 4: DEX -> range
  yoyo = {
    x: player.x, y: player.y, dir: player.dir,
    dist: 0, maxDist: range, returning: false, timer: 0,
    damage: MELEE_DAMAGE + player.weapon // ref 3: STR -> melee damage
  };
}

function fireSubWeapon() {
  if (player.ammo <= 0) return;
  player.ammo--;
  var px = player.x + DX[player.dir];
  var py = player.y + DY[player.dir];
  projectiles.push({
    x: px, y: py, dir: player.dir, type: player.subWeapon,
    timer: 0, damage: SUB_WEAPON_DMG // ref 6: INT -> sub-weapon damage
  });
  TAS.audio.playTone(600, 0.08, 'triangle', 0.06, 1000);
}

function updateYoyo() {
  if (!yoyo) return;
  yoyo.timer++;
  var yoyoSpeed = Math.max(2, Math.round(4 * COOLDOWN_MULT)); // ref 17: cooldown
  if (!yoyo.returning) {
    if (yoyo.timer % yoyoSpeed === 0) {
      yoyo.dist++;
      var yx = player.x + DX[yoyo.dir] * yoyo.dist;
      var yy = player.y + DY[yoyo.dir] * yoyo.dist;
      var hitSomething = false;
      for (var i = enemies.length - 1; i >= 0; i--) {
        if (enemies[i].x === yx && enemies[i].y === yy) {
          // ref 15: crit chance
          var isCrit = Math.random() < CRIT_CHANCE;
          var dmg = isCrit ? yoyo.damage * 2 : yoyo.damage;
          damageEnemy(i, dmg, isCrit);
          hitSomething = true;
        }
      }
      if (boss && boss.x === yx && boss.y === yy) {
        var isCrit = Math.random() < CRIT_CHANCE;
        var dmg = isCrit ? yoyo.damage * 2 : yoyo.damage;
        damageBoss(dmg, isCrit);
        hitSomething = true;
      }
      if (yoyo.dist >= yoyo.maxDist || hitSomething) {
        yoyo.returning = true;
        yoyo.timer = 0;
      }
    }
  } else {
    if (yoyo.timer % 3 === 0) {
      yoyo.dist--;
      if (yoyo.dist <= 0) yoyo = null;
    }
  }
}

function updateProjectiles() {
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    p.timer++;
    if (p.timer % 3 === 0) {
      p.x += DX[p.dir];
      p.y += DY[p.dir];
      if (p.x < 0 || p.x >= roomW || p.y < 0 || p.y >= roomH || tiles[p.y][p.x] === T.WALL) {
        projectiles.splice(i, 1);
        continue;
      }
      for (var j = enemies.length - 1; j >= 0; j--) {
        if (enemies[j].x === p.x && enemies[j].y === p.y) {
          damageEnemy(j, p.damage, false);
          projectiles.splice(i, 1);
          break;
        }
      }
      if (boss && boss.x === p.x && boss.y === p.y) {
        damageBoss(p.damage, false);
        projectiles.splice(i, 1);
      }
    }
    if (p.timer > 60) projectiles.splice(i, 1);
  }
}

function damageEnemy(idx, dmg, isCrit) {
  var e = enemies[idx];
  e.hp -= dmg;
  e.flash = 8;
  if (isCrit) {
    SFX.crit();
    TAS.fx.shake(2, 0.9);
    scorePopups.push({ x: e.x * TILE + TILE/2, y: e.y * TILE + HUD_Y - 8, text: 'CRIT!', timer: 40, color: '#ff4444' });
  } else {
    SFX.hit();
  }
  TAS.particles.spawn(e.x * TILE + TILE/2, e.y * TILE + HUD_Y + TILE/2, e.color, 5, 2);
  if (e.hp <= 0) {
    TAS.particles.spawn(e.x * TILE + TILE/2, e.y * TILE + HUD_Y + TILE/2, '#ffdd44', 10, 3);
    addScore(e.scoreValue, e.x * TILE + TILE/2, e.y * TILE + HUD_Y);
    killCount++;
    enemies.splice(idx, 1);
    // ref 8: WIS -> drop rate
    if (Math.random() < DROP_RATE) {
      var dropRoll = Math.random();
      if (dropRoll < 0.3) items.push({ x: e.x, y: e.y, type: 'heart' });
      else if (dropRoll < 0.6) items.push({ x: e.x, y: e.y, type: 'ammo' });
      else if (dropRoll < 0.8) items.push({ x: e.x, y: e.y, type: 'gold' });
      else items.push({ x: e.x, y: e.y, type: 'potion' });
    }
  }
}

function damageBoss(dmg, isCrit) {
  if (!boss) return;
  boss.hp -= dmg;
  boss.flash = 10;
  if (isCrit) {
    SFX.crit();
    TAS.fx.shake(5, 0.8);
    scorePopups.push({ x: boss.x * TILE + TILE/2, y: boss.y * TILE + HUD_Y - 12, text: 'CRITICAL!', timer: 50, color: '#ff2222' });
  } else {
    SFX.hit();
    TAS.fx.shake(3, 0.85);
  }
  TAS.particles.spawn(boss.x * TILE + TILE/2, boss.y * TILE + HUD_Y + TILE/2, boss.color, 8, 3);
  // Phase change at half health
  if (boss.hp <= boss.maxHp / 2 && boss.phase === 0) {
    boss.phase = 1;
    showMsg(boss.name + ' enters a frenzy!');
    TAS.fx.flash('#ff4400', 0.4);
    TAS.fx.shake(6, 0.8);
  }
  if (boss.hp <= 0) {
    defeatBoss();
  }
}

function defeatBoss() {
  bossesBeaten[currentIsland] = true;
  bossActive = false;
  addScore(boss.scoreValue, boss.x * TILE + TILE/2, boss.y * TILE + HUD_Y);
  // Death explosion for boss
  startDeathAnim(boss.x * TILE + TILE/2, boss.y * TILE + HUD_Y + TILE/2);
  boss = null;
  SFX.victory();
  TAS.fx.flash('#fff', 0.6);
  TAS.fx.shake(8, 0.75);
  showMsg('BOSS DEFEATED! ' + ISLANDS[currentIsland].name + ' cleared!');
  // Drop weapon upgrade on islands 2 and 4
  if (currentIsland === 2 || currentIsland === 4) {
    items.push({ x: 7, y: 4, type: 'weapon_up' });
  }
  items.push({ x: 7, y: 5, type: 'heart_container' });
  items.push({ x: 6, y: 4, type: 'gold' });
  tiles[roomH-2][roomW-2] = T.STAIRS_UP;
  saveGame();

  // Check for game completion
  if (bossesBeaten.every(Boolean)) {
    showMsg('ALL ISLANDS CLEARED! ' + statB.name + ' is the champion of Tasern!');
    SFX.levelUp();
  }
}

function hurtPlayer(dmg) {
  if (player.invincible > 0) return;
  // ref 11: DEX -> dodge chance
  if (Math.random() < DODGE_CHANCE) {
    showMsg('Dodged!');
    TAS.particles.spawn(player.x * TILE + TILE/2, player.y * TILE + HUD_Y + TILE/2, '#44ff88', 4, 1);
    return;
  }
  player.hp -= dmg;
  player.invincible = 60;
  SFX.hurt();
  TAS.fx.shake(4, 0.85);
  TAS.fx.flash('#ff0000', 0.3);
  if (player.hp <= 0) {
    playerDie();
  }
}

function playerDie() {
  player.lives--;
  SFX.die();
  startDeathAnim(player.x * TILE + TILE/2, player.y * TILE + HUD_Y + TILE/2);
  if (player.lives <= 0) {
    state = 'gameOver';
  } else {
    player.hp = player.maxHp;
    player.poisoned = 0;
    if (inDungeon) {
      generateDungeon(currentIsland, dungeonFloor);
    } else {
      generateSurface(currentIsland);
    }
    transitionTimer = 30;
    transitionType = 'respawn';
  }
}

// === ENEMY AI (Tasern-themed behaviors, Pass 2) ===
function updateEnemies(dt) {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.flash > 0) e.flash--;
    e.moveTimer++;
    if (e.moveTimer >= e.moveDelay) {
      e.moveTimer = 0;
      moveEnemy(e);
    }
    if (e.x === player.x && e.y === player.y) {
      hurtPlayer(1);
    }
  }
}

function moveEnemy(e) {
  var newDir;
  switch (e.type) {
    case 'crab':
    case 'kobold': // Patrol horizontally, occasionally lunge
      if (e.dir === DIR.LEFT || e.dir === DIR.RIGHT) {
        var nx = e.x + DX[e.dir];
        if (nx >= 1 && nx < roomW-1 && tiles[e.y][nx] === T.FLOOR) {
          e.x = nx;
        } else {
          e.dir = e.dir === DIR.LEFT ? DIR.RIGHT : DIR.LEFT;
        }
      } else {
        e.dir = Math.random() < 0.5 ? DIR.LEFT : DIR.RIGHT;
      }
      // Kobolds lunge toward player if close
      if (e.type === 'kobold' && Math.abs(e.x - player.x) <= 3 && Math.abs(e.y - player.y) <= 3) {
        newDir = chaseDir(e);
        var kx = e.x + DX[newDir];
        var ky = e.y + DY[newDir];
        if (canEnemyWalk(kx, ky)) { e.x = kx; e.y = ky; }
      }
      break;
    case 'snake':
    case 'goblin': // Chase player
      newDir = chaseDir(e);
      e.dir = newDir;
      var snx = e.x + DX[newDir];
      var sny = e.y + DY[newDir];
      if (canEnemyWalk(snx, sny)) { e.x = snx; e.y = sny; }
      break;
    case 'bat': // Random flying
      newDir = randI(0, 3);
      e.dir = newDir;
      var bx = e.x + DX[newDir];
      var by = e.y + DY[newDir];
      if (bx >= 1 && bx < roomW-1 && by >= 1 && by < roomH-1) { e.x = bx; e.y = by; }
      break;
    case 'skeleton':
    case 'frost_wraith': // Slow chase, wraiths fire ice shards
      newDir = chaseDir(e);
      e.dir = newDir;
      var skx = e.x + DX[newDir];
      var sky = e.y + DY[newDir];
      if (canEnemyWalk(skx, sky)) { e.x = skx; e.y = sky; }
      if (e.type === 'frost_wraith') {
        e.attackTimer++;
        if (e.attackTimer > 50) {
          e.attackTimer = 0;
          projectiles.push({ x: e.x + DX[e.dir], y: e.y + DY[e.dir], dir: e.dir, type: 'enemy', timer: 0, damage: 1 });
          TAS.audio.playTone(500, 0.08, 'sine', 0.04);
        }
      }
      break;
    case 'ghost':
    case 'shade': // Phase through walls
      newDir = chaseDir(e);
      e.dir = newDir;
      e.x += DX[newDir];
      e.y += DY[newDir];
      e.x = TAS.math.clamp(e.x, 1, roomW-2);
      e.y = TAS.math.clamp(e.y, 1, roomH-2);
      // Shades teleport occasionally
      if (e.type === 'shade' && Math.random() < 0.1) {
        e.x = TAS.math.clamp(player.x + randI(-3, 3), 1, roomW-2);
        e.y = TAS.math.clamp(player.y + randI(-3, 3), 1, roomH-2);
        TAS.particles.spawn(e.x * TILE + TILE/2, e.y * TILE + HUD_Y + TILE/2, '#9966cc', 5, 2);
      }
      break;
    case 'robot':
    case 'construct': // Shoot + slow move
      newDir = chaseDir(e);
      e.dir = newDir;
      e.attackTimer++;
      var atkRate = e.type === 'construct' ? 45 : 60;
      if (e.attackTimer > atkRate) {
        e.attackTimer = 0;
        projectiles.push({ x: e.x + DX[e.dir], y: e.y + DY[e.dir], dir: e.dir, type: 'enemy', timer: 0, damage: e.type === 'construct' ? 2 : 1 });
        TAS.audio.playTone(300, 0.1, 'sawtooth', 0.05);
      }
      if (Math.random() < 0.3) {
        var rx = e.x + DX[newDir];
        var ry = e.y + DY[newDir];
        if (canEnemyWalk(rx, ry)) { e.x = rx; e.y = ry; }
      }
      break;
    case 'fungi':
    case 'myconid': // Wander + spores
      newDir = randI(0, 3);
      e.dir = newDir;
      var fx = e.x + DX[newDir];
      var fy = e.y + DY[newDir];
      if (canEnemyWalk(fx, fy)) { e.x = fx; e.y = fy; }
      e.attackTimer++;
      var sporeRate = e.type === 'myconid' ? 60 : 80;
      if (e.attackTimer > sporeRate) {
        e.attackTimer = 0;
        var sd = randI(0, 3);
        projectiles.push({ x: e.x + DX[sd], y: e.y + DY[sd], dir: sd, type: 'spore', timer: 0, damage: 1 });
        // Myconids spread in 2 directions
        if (e.type === 'myconid') {
          var sd2 = (sd + 2) % 4;
          projectiles.push({ x: e.x + DX[sd2], y: e.y + DY[sd2], dir: sd2, type: 'spore', timer: 0, damage: 1 });
        }
      }
      break;
    case 'fire_drake': // Chase + fire breath
      newDir = chaseDir(e);
      e.dir = newDir;
      var dx = e.x + DX[newDir];
      var dy = e.y + DY[newDir];
      if (canEnemyWalk(dx, dy)) { e.x = dx; e.y = dy; }
      e.attackTimer++;
      if (e.attackTimer > 40) {
        e.attackTimer = 0;
        // Fire breath: 3 projectiles forward
        for (var fi = 1; fi <= 3; fi++) {
          projectiles.push({ x: e.x + DX[e.dir] * fi, y: e.y + DY[e.dir] * fi, dir: e.dir, type: 'fire', timer: 20, damage: 1 });
        }
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 80);
      }
      break;
  }
}

function chaseDir(e) {
  var dx = player.x - e.x;
  var dy = player.y - e.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? DIR.RIGHT : DIR.LEFT;
  } else {
    return dy > 0 ? DIR.DOWN : DIR.UP;
  }
}

function canEnemyWalk(x, y) {
  if (x < 1 || x >= roomW-1 || y < 1 || y >= roomH-1) return false;
  var t = tiles[y][x];
  return t === T.FLOOR || t === T.VANISH || t === T.ICE || t === T.SWITCH || t === T.BUTTON || t === T.RUNE_FLOOR || t === T.POISON;
}

// === BOSS AI (Enhanced Pass 3) ===
function updateBoss(dt) {
  if (!boss || !bossActive) return;
  boss.flash = Math.max(0, boss.flash - 1);
  boss.moveTimer++;
  boss.attackTimer++;
  boss.pattern++;

  var spd = boss.phase >= 1 ? 15 : (boss.hp < boss.maxHp / 2 ? 20 : 30);

  if (boss.moveTimer >= spd) {
    boss.moveTimer = 0;
    var dir = chaseDir(boss);
    boss.dir = dir;
    var nx = boss.x + DX[dir];
    var ny = boss.y + DY[dir];
    if (canEnemyWalk(nx, ny)) { boss.x = nx; boss.y = ny; }
  }

  var atkSpd = boss.phase >= 1 ? 30 : (boss.hp < boss.maxHp / 3 ? 40 : 60);
  if (boss.attackTimer >= atkSpd) {
    boss.attackTimer = 0;
    bossAttack();
  }

  if (boss.x === player.x && boss.y === player.y) {
    hurtPlayer(2);
  }
}

function bossAttack() {
  var island = boss.island;
  if (island <= 1) {
    // Charge
    var dir = chaseDir(boss);
    for (var i = 0; i < 2 + boss.phase; i++) {
      var nx = boss.x + DX[dir];
      var ny = boss.y + DY[dir];
      if (canEnemyWalk(nx, ny)) { boss.x = nx; boss.y = ny; }
    }
    TAS.fx.shake(2, 0.9);
  } else if (island <= 3) {
    // Shoot in 4 directions
    for (var d = 0; d < 4; d++) {
      projectiles.push({ x: boss.x + DX[d], y: boss.y + DY[d], dir: d, type: 'boss', timer: 0, damage: 1 + boss.phase });
    }
    TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08);
    // Phase 1: also shoot diagonals via double shots
    if (boss.phase >= 1 && boss.pattern % 2 === 0) {
      for (var d2 = 0; d2 < 4; d2++) {
        var ox = DX[d2] + DX[(d2+1)%4];
        var oy = DY[d2] + DY[(d2+1)%4];
        if (ox !== 0 || oy !== 0) {
          projectiles.push({ x: boss.x + ox, y: boss.y + oy, dir: d2, type: 'boss', timer: 0, damage: 1 });
        }
      }
    }
  } else {
    // Shoot + spawn minion
    var dir = chaseDir(boss);
    projectiles.push({ x: boss.x + DX[dir], y: boss.y + DY[dir], dir: dir, type: 'boss', timer: 0, damage: 2 });
    if (enemies.length < 4 + boss.phase && boss.pattern % 3 === 0) {
      var etype = ISLANDS[island].enemies[0];
      var ex = TAS.math.clamp(boss.x + randI(-2, 2), 1, roomW-2);
      var ey = TAS.math.clamp(boss.y + randI(-2, 2), 1, roomH-2);
      enemies.push(makeEnemy(ex, ey, etype, island));
      TAS.particles.spawn(ex * TILE + TILE/2, ey * TILE + HUD_Y + TILE/2, '#ff88ff', 6, 2);
    }
    TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 50);
    // Phase 1: teleport occasionally
    if (boss.phase >= 1 && boss.pattern % 5 === 0) {
      boss.x = TAS.math.clamp(player.x + randI(-4, 4), 2, roomW-3);
      boss.y = TAS.math.clamp(player.y + randI(-4, 4), 2, roomH-3);
      TAS.particles.spawn(boss.x * TILE + TILE/2, boss.y * TILE + HUD_Y + TILE/2, boss.color, 10, 3);
      TAS.fx.shake(3, 0.85);
    }
  }
}

// === TILE EFFECTS ===
function updateTileEffects() {
  // Vanishing tiles
  for (var i = vanishedTiles.length - 1; i >= 0; i--) {
    vanishedTiles[i].timer--;
    if (vanishedTiles[i].timer <= 0) {
      var v = vanishedTiles[i];
      tiles[v.y][v.x] = T.PIT;
      vanishedTiles.splice(i, 1);
    }
  }

  // Conveyor movement
  if (player.moveTimer <= 0) {
    var t = tiles[player.y][player.x];
    if (t >= T.CONVEYOR_U && t <= T.CONVEYOR_R) {
      // ref (implicit): stat doesn't resist conveyor but speed helps recover
      var cdir = t - T.CONVEYOR_U;
      var cx = player.x + DX[cdir];
      var cy = player.y + DY[cdir];
      if (canWalk(cx, cy)) {
        player.x = cx;
        player.y = cy;
        player.moveTimer = 12;
      }
    }
    // Ice sliding
    if (t === T.ICE && player.moveTimer <= 0) {
      var ix = player.x + DX[player.dir];
      var iy = player.y + DY[player.dir];
      if (canWalk(ix, iy)) {
        player.x = ix;
        player.y = iy;
        player.moveTimer = 6;
      }
    }
  }

  // Enemy projectile collision with player
  for (var i = projectiles.length - 1; i >= 0; i--) {
    var p = projectiles[i];
    if ((p.type === 'enemy' || p.type === 'boss' || p.type === 'spore' || p.type === 'fire') && p.x === player.x && p.y === player.y) {
      // Mirror reflects boss projectiles
      if (hasMirror && p.type === 'boss' && Math.random() < 0.3) {
        p.dir = (p.dir + 2) % 4; // reverse direction
        p.type = 0; // becomes player projectile
        showMsg('Mirror reflects!');
        TAS.particles.spawn(player.x * TILE + TILE/2, player.y * TILE + HUD_Y + TILE/2, '#aaccee', 5, 2);
      } else {
        hurtPlayer(p.damage);
        projectiles.splice(i, 1);
      }
    }
  }

  // Poison tick
  if (player.poisoned > 0) {
    player.poisoned--;
    if (player.poisoned % 60 === 0 && player.poisoned > 0) {
      // ref 14: CON can reduce poison damage
      if (Math.random() > POISON_RESIST) {
        player.hp = Math.max(1, player.hp - 1);
        TAS.particles.spawn(player.x * TILE + TILE/2, player.y * TILE + HUD_Y + TILE/2, '#88ff44', 3, 1);
      }
    }
  }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateScorePopups();
  updateDeathAnim();
  updateWeather();
  if (msgTimer > 0) msgTimer--;
  if (transitionTimer > 0) { transitionTimer--; return; }

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      if (loadGame()) {
        enterIsland(currentIsland);
      } else {
        enterIsland(0);
      }
    }
    return;
  }

  if (state === 'gameOver') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
      player.lives = 3 + EXTRA_LIVES;
      player.hp = BASE_HP;
      player.maxHp = BASE_HP;
      currentIsland = 0;
      score = 0;
      combo = 0;
      killCount = 0;
    }
    return;
  }

  if (state === 'overworld') {
    updateOverworld(dt);
    return;
  }

  if (state !== 'playing') return;

  updateTutorial();

  // Player input
  if (player.moveTimer > 0) player.moveTimer--;
  if (player.invincible > 0) player.invincible--;
  if (player.jumpTimer > 0) {
    player.jumpTimer--;
    if (player.jumpTimer <= 0) player.jumping = false;
  }

  var k = TAS.input.keys;
  var t = TAS.input.touch;

  if (k['ArrowLeft'] || k['KeyA'] || t.left) tryMove(DIR.LEFT);
  else if (k['ArrowRight'] || k['KeyD'] || t.right) tryMove(DIR.RIGHT);
  else if (k['ArrowUp'] || k['KeyW'] || t.up) tryMove(DIR.UP);
  else if (k['ArrowDown'] || k['KeyS'] || t.down) tryMove(DIR.DOWN);

  // Attack (A button / Z key / Space)
  if (k['KeyZ'] || k['Space'] || t.a) {
    if (!yoyo) attack();
    k['KeyZ'] = false; k['Space'] = false;
  }

  // Jump (B button / X key) -- ref 5: DEX -> jump distance
  if (k['KeyX'] || t.b) {
    if (!player.jumping && player.jumpTimer <= 0) {
      player.jumping = true;
      player.jumpTimer = 16;
      SFX.jump();
      for (var jd = 0; jd < JUMP_DIST; jd++) {
        var jx = player.x + DX[player.dir];
        var jy = player.y + DY[player.dir];
        if (jx >= 0 && jx < roomW && jy >= 0 && jy < roomH && tiles[jy][jx] !== T.WALL) {
          player.x = jx;
          player.y = jy;
        }
      }
      player.moveTimer = 14;
    }
    k['KeyX'] = false;
  }

  // Sub weapon (C key)
  if (k['KeyC']) {
    fireSubWeapon();
    k['KeyC'] = false;
  }

  // Enter overworld (Escape when on surface)
  if (k['Escape'] && !inDungeon) {
    enterOverworld();
    k['Escape'] = false;
  }

  updateYoyo();
  updateProjectiles();
  updateEnemies(dt);
  updateBoss(dt);
  updateTileEffects();
}

function updateOverworld(dt) {
  var k = TAS.input.keys;
  var t = TAS.input.touch;

  if (boatMoving) {
    var target = ISLAND_POS[boatTarget];
    var dx = target.x - boatX;
    var dy = target.y - boatY;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < 3) {
      boatMoving = false;
      enterIsland(boatTarget);
    } else {
      boatX += (dx / d) * 2;
      boatY += (dy / d) * 2;
    }
    return;
  }

  if (k['ArrowUp'] || k['KeyW'] || t.up) {
    boatTarget = Math.max(0, (boatTarget < 0 ? currentIsland : boatTarget) - 1);
    k['ArrowUp'] = false; k['KeyW'] = false;
  }
  if (k['ArrowDown'] || k['KeyS'] || t.down) {
    boatTarget = Math.min(ISLANDS.length - 1, (boatTarget < 0 ? currentIsland : boatTarget) + 1);
    k['ArrowDown'] = false; k['KeyS'] = false;
  }

  if ((k['KeyZ'] || k['Space'] || t.a) && boatTarget >= 0) {
    if (boatTarget <= currentIsland + 1 || bossesBeaten[boatTarget - 1]) {
      boatMoving = true;
      SFX.sail();
    } else {
      showMsg('Defeat the previous island boss first!');
    }
    k['KeyZ'] = false; k['Space'] = false;
  }

  if (k['Escape']) {
    enterIsland(currentIsland);
    k['Escape'] = false;
  }
}

// === DRAWING ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    drawGameOverScreen();
    return;
  }

  if (state === 'overworld') {
    drawOverworld();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'playing') {
    ctx.save();
    TAS.fx.applyShake();
    drawRoom();
    drawItems();
    drawEnemies();
    drawBossSprite();
    drawPlayer();
    drawYoyo();
    drawProjectiles();
    if (darkRoom) drawDarkness();
    drawWeather(currentIsland);
    TAS.particles.draw();
    drawScorePopups();
    drawDeathAnim();
    ctx.restore();
    TAS.fx.drawFlash(GW, GH);
    drawHUD();
    drawMessage();
    drawTutorial();
    if (transitionTimer > 0) drawTransition();
    TAS.input.drawTouchControls(GW, GH);
  }
}

function drawTitle() {
  // Ocean background with zone color
  ctx.fillStyle = '#1a3366';
  ctx.fillRect(0, 0, GW, GH);

  // Animated waves
  for (var i = 0; i < 8; i++) {
    var wy = 100 + i * 30 + Math.sin(frame * 0.02 + i) * 5;
    ctx.fillStyle = i % 2 === 0 ? '#224488' : '#1a3366';
    ctx.fillRect(0, wy, GW, 15);
  }

  // Island silhouettes
  ctx.fillStyle = '#226644';
  ctx.beginPath();
  ctx.ellipse(120, 260, 50, 25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(360, 240, 40, 20, 0, 0, Math.PI * 2);
  ctx.fill();

  // Palm tree
  ctx.fillStyle = '#664422';
  ctx.fillRect(115, 220, 6, 40);
  ctx.fillStyle = '#33aa44';
  ctx.beginPath();
  ctx.ellipse(118, 215, 20, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Title with shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('STARTROPICS HEX', GW/2 + 2, 52);
  ctx.fillStyle = '#44ddaa';
  ctx.fillText('STARTROPICS HEX', GW/2, 50);

  // Subtitle
  ctx.fillStyle = '#88ccaa';
  ctx.font = '12px monospace';
  ctx.fillText('A ' + statB.name + ' Explorer Adventure', GW/2, 72);

  // Stat display
  ctx.fillStyle = '#668888';
  ctx.font = '9px monospace';
  ctx.fillText('STR:' + statB.str + ' DEX:' + statB.dex + ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW/2, 86);

  // Baseling character with NFT color
  drawBaselingSprite(GW/2, 150, 2, frame);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW/2, GH - 55);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW/2, GH - 30);
  ctx.globalAlpha = 1;

  // Controls hint
  ctx.fillStyle = '#668899';
  ctx.font = '10px monospace';
  ctx.fillText('ARROWS=Move  Z=Attack  X=Jump  C=Sub-weapon  ESC=Sail', GW/2, GH - 12);
}

function drawGameOverScreen() {
  ctx.fillStyle = '#110022';
  ctx.fillRect(0, 0, GW, GH);

  // Vignette
  var grad = ctx.createRadialGradient(GW/2, GH/2, 50, GW/2, GH/2, GW * 0.7);
  grad.addColorStop(0, 'rgba(17,0,34,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GAME OVER', GW/2, GH * 0.3);

  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.fillText('Islands cleared: ' + bossesBeaten.filter(Boolean).length + '/7', GW/2, GH * 0.43);
  ctx.fillText('Score: ' + score, GW/2, GH * 0.52);
  ctx.fillText('Enemies slain: ' + killCount, GW/2, GH * 0.60);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, GH * 0.68);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH * 0.82);
  ctx.globalAlpha = 1;
}

// === OVERWORLD DRAWING (Enhanced Pass 3) ===
function drawOverworld() {
  ctx.fillStyle = '#112244';
  ctx.fillRect(0, 0, GW, GH);

  // Animated waves
  for (var y = 0; y < GH; y += 8) {
    var off = Math.sin(frame * 0.03 + y * 0.1) * 2;
    ctx.fillStyle = y % 16 === 0 ? '#1a3355' : '#112244';
    ctx.fillRect(off, y, GW, 4);
  }

  // Draw route lines between islands
  ctx.strokeStyle = 'rgba(68,221,170,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  for (var i = 0; i < ISLANDS.length - 1; i++) {
    var p1 = ISLAND_POS[i];
    var p2 = ISLAND_POS[i+1];
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Draw islands
  for (var i = 0; i < ISLANDS.length; i++) {
    var pos = ISLAND_POS[i];
    var unlocked = i === 0 || bossesBeaten[i-1] || i <= currentIsland;
    var cleared = bossesBeaten[i];

    // Island shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(pos.x + 2, pos.y + 3, 22, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Island shape
    ctx.fillStyle = unlocked ? ISLANDS[i].color : '#445566';
    ctx.beginPath();
    ctx.ellipse(pos.x, pos.y, 22, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = cleared ? '#ffdd44' : '#224433';
    ctx.lineWidth = cleared ? 2 : 1;
    ctx.stroke();

    // Label
    ctx.fillStyle = unlocked ? '#fff' : '#667';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ISLANDS[i].name, pos.x, pos.y + 24);
    if (cleared) {
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('*', pos.x, pos.y - 18);
    }

    // Selection indicator
    if (boatTarget === i) {
      ctx.strokeStyle = '#ffdd44';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.ellipse(pos.x, pos.y, 28, 18, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Draw boat
  ctx.fillStyle = '#886644';
  ctx.fillRect(boatX - 8, boatY - 4, 16, 8);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(boatX, boatY - 12);
  ctx.lineTo(boatX + 6, boatY - 4);
  ctx.lineTo(boatX, boatY - 4);
  ctx.fill();
  // Boat wake
  if (boatMoving) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(boatX - 8, boatY + 4);
    ctx.lineTo(boatX - 14 + Math.sin(frame * 0.1) * 3, boatY + 8);
    ctx.stroke();
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, GW, 24);
  ctx.fillStyle = '#44ddaa';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SEA CHART - Up/Down to select, Z to sail', 8, 16);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#ffdd44';
  ctx.font = '10px monospace';
  ctx.fillText('SCORE: ' + score, GW - 8, 16);

  drawMessage();
}

// === ROOM DRAWING (Themed per zone, Pass 3) ===
function drawRoom() {
  var isl = ISLANDS[currentIsland];

  for (var y = 0; y < roomH; y++) {
    for (var x = 0; x < roomW; x++) {
      var tx = x * TILE;
      var ty = y * TILE + HUD_Y;
      var t = tiles[y][x];

      switch (t) {
        case T.FLOOR:
          ctx.fillStyle = inDungeon ? '#333344' : isl.floor;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.strokeStyle = inDungeon ? '#2a2a3a' : darken(isl.floor, 0.8);
          ctx.strokeRect(tx, ty, TILE, TILE);
          break;
        case T.WALL:
          ctx.fillStyle = inDungeon ? '#556677' : isl.wall;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = inDungeon ? '#445566' : darken(isl.wall, 0.85);
          ctx.fillRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
          // Brick pattern
          ctx.strokeStyle = darken(isl.wall, 0.7);
          ctx.beginPath();
          ctx.moveTo(tx, ty + TILE/2); ctx.lineTo(tx + TILE, ty + TILE/2);
          ctx.moveTo(tx + TILE/2, ty); ctx.lineTo(tx + TILE/2, ty + TILE/2);
          ctx.stroke();
          break;
        case T.WATER:
          ctx.fillStyle = isl.ocean;
          ctx.fillRect(tx, ty, TILE, TILE);
          var woff = Math.sin(frame * 0.06 + x + y) * 2;
          ctx.fillStyle = lighten(isl.ocean, 1.3);
          ctx.fillRect(tx + 4 + woff, ty + 8, 10, 3);
          ctx.fillRect(tx + 14 - woff, ty + 20, 8, 3);
          break;
        case T.DOOR:
          ctx.fillStyle = '#886644';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#664422';
          ctx.fillRect(tx + 4, ty + 2, TILE - 8, TILE - 4);
          ctx.fillStyle = '#ffcc00';
          ctx.beginPath();
          ctx.arc(tx + TILE - 8, ty + TILE/2, 3, 0, Math.PI * 2);
          ctx.fill();
          break;
        case T.SWITCH:
          ctx.fillStyle = '#333344';
          ctx.fillRect(tx, ty, TILE, TILE);
          var swActive = null;
          for (var si = 0; si < switches.length; si++) {
            if (switches[si].x === x && switches[si].y === y) swActive = switches[si];
          }
          ctx.fillStyle = (swActive && swActive.active) ? '#44ff44' : '#ff4444';
          ctx.beginPath();
          ctx.arc(tx + TILE/2, ty + TILE/2, 8, 0, Math.PI * 2);
          ctx.fill();
          break;
        case T.PIT:
          ctx.fillStyle = '#0a0a0a';
          ctx.fillRect(tx, ty, TILE, TILE);
          // Depth gradient
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(tx + 4, ty + 4, TILE - 8, TILE - 8);
          break;
        case T.VANISH:
          ctx.fillStyle = '#555566';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.strokeStyle = '#777788';
          ctx.setLineDash([2, 2]);
          ctx.strokeRect(tx + 3, ty + 3, TILE - 6, TILE - 6);
          ctx.setLineDash([]);
          // WIS warning glow
          if (wisMod >= 1) {
            ctx.globalAlpha = 0.2 + Math.sin(frame * 0.08) * 0.1;
            ctx.fillStyle = '#ffaa44';
            ctx.fillRect(tx + 6, ty + 6, TILE - 12, TILE - 12);
            ctx.globalAlpha = 1;
          }
          break;
        case T.CONVEYOR_U: case T.CONVEYOR_D: case T.CONVEYOR_L: case T.CONVEYOR_R:
          ctx.fillStyle = '#444455';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#88aacc';
          var cd = t - T.CONVEYOR_U;
          ctx.save();
          ctx.translate(tx + TILE/2, ty + TILE/2);
          ctx.rotate(cd * Math.PI / 2);
          ctx.beginPath();
          ctx.moveTo(0, -10); ctx.lineTo(6, 0); ctx.lineTo(-6, 0);
          ctx.fill();
          ctx.restore();
          // Animated lines
          var coff = (frame * 0.15) % 8;
          ctx.strokeStyle = '#6688aa';
          ctx.lineWidth = 1;
          for (var ci = 0; ci < 3; ci++) {
            var cy2 = ty + 6 + ci * 10 + coff;
            if (cy2 < ty + TILE) {
              ctx.beginPath();
              ctx.moveTo(tx + 6, cy2);
              ctx.lineTo(tx + TILE - 6, cy2);
              ctx.stroke();
            }
          }
          break;
        case T.LAVA:
          ctx.fillStyle = '#cc3300';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#ff6600';
          var loff = Math.sin(frame * 0.08 + x * 2) * 3;
          ctx.fillRect(tx + 6 + loff, ty + 4, 8, 5);
          ctx.fillRect(tx + 12 - loff, ty + 16, 10, 6);
          // Glow
          ctx.globalAlpha = 0.2 + Math.sin(frame * 0.05) * 0.1;
          ctx.fillStyle = '#ff4400';
          ctx.fillRect(tx - 2, ty - 2, TILE + 4, TILE + 4);
          ctx.globalAlpha = 1;
          break;
        case T.ICE:
          ctx.fillStyle = '#aaddff';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#cceeff';
          ctx.fillRect(tx + 4, ty + 4, 6, 3);
          ctx.fillRect(tx + 16, ty + 14, 8, 4);
          // Shine
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#fff';
          ctx.fillRect(tx + 8, ty + 2, 3, 3);
          ctx.globalAlpha = 1;
          break;
        case T.STAIRS_DOWN:
          ctx.fillStyle = '#333344';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#222';
          ctx.fillRect(tx + 4, ty + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#aaa';
          ctx.beginPath();
          ctx.moveTo(tx + TILE/2, ty + TILE - 6);
          ctx.lineTo(tx + TILE/2 - 6, ty + 10);
          ctx.lineTo(tx + TILE/2 + 6, ty + 10);
          ctx.fill();
          break;
        case T.STAIRS_UP:
          ctx.fillStyle = '#333344';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#555';
          ctx.fillRect(tx + 4, ty + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#aaa';
          ctx.beginPath();
          ctx.moveTo(tx + TILE/2, ty + 6);
          ctx.lineTo(tx + TILE/2 - 6, ty + TILE - 10);
          ctx.lineTo(tx + TILE/2 + 6, ty + TILE - 10);
          ctx.fill();
          break;
        case T.BLOCK:
          ctx.fillStyle = '#667788';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.strokeStyle = '#556677';
          ctx.lineWidth = 2;
          ctx.strokeRect(tx + 3, ty + 3, TILE - 6, TILE - 6);
          ctx.lineWidth = 1;
          break;
        case T.BUTTON:
          ctx.fillStyle = '#333344';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#cc8844';
          ctx.beginPath();
          ctx.arc(tx + TILE/2, ty + TILE/2, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#aa6622';
          ctx.stroke();
          break;
        case T.CHEST:
          ctx.fillStyle = inDungeon ? '#333344' : isl.floor;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#aa7733';
          ctx.fillRect(tx + 6, ty + 8, TILE - 12, TILE - 14);
          ctx.fillStyle = '#ffcc44';
          ctx.fillRect(tx + TILE/2 - 2, ty + 14, 4, 4);
          // Sparkle
          if (frame % 30 < 8) {
            ctx.fillStyle = '#ffee88';
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(tx + TILE/2 + Math.sin(frame * 0.1) * 4, ty + 6, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          break;
        case T.NPC:
          ctx.fillStyle = inDungeon ? '#333344' : isl.floor;
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#6688cc';
          ctx.beginPath();
          ctx.arc(tx + TILE/2, ty + 10, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#4466aa';
          ctx.fillRect(tx + 8, ty + 16, 16, 12);
          var eb = Math.sin(frame * 0.06) * 2;
          ctx.fillStyle = '#ffdd44';
          ctx.font = 'bold 10px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', tx + TILE/2, ty + eb);
          break;
        case T.ENTRANCE:
          ctx.fillStyle = '#333';
          ctx.fillRect(tx, ty, TILE, TILE);
          break;
        case T.POISON:
          ctx.fillStyle = '#224422';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#44aa44';
          var poff = Math.sin(frame * 0.04 + x) * 2;
          ctx.beginPath();
          ctx.arc(tx + 10 + poff, ty + 12, 4, 0, Math.PI * 2);
          ctx.arc(tx + 20 - poff, ty + 20, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#88ff44';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.globalAlpha = 1;
          break;
        case T.SPIKES:
          ctx.fillStyle = '#333344';
          ctx.fillRect(tx, ty, TILE, TILE);
          ctx.fillStyle = '#aabbcc';
          // Spike points
          for (var si = 0; si < 4; si++) {
            var spx = tx + 6 + si * 6;
            ctx.beginPath();
            ctx.moveTo(spx, ty + TILE - 4);
            ctx.lineTo(spx + 3, ty + 8);
            ctx.lineTo(spx + 6, ty + TILE - 4);
            ctx.fill();
          }
          break;
        case T.RUNE_FLOOR:
          ctx.fillStyle = inDungeon ? '#2a2a44' : darken(isl.floor, 0.9);
          ctx.fillRect(tx, ty, TILE, TILE);
          // Glowing rune circle
          ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04 + x + y) * 0.15;
          ctx.strokeStyle = '#8866cc';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(tx + TILE/2, ty + TILE/2, 10, 0, Math.PI * 2);
          ctx.stroke();
          // Inner rune
          ctx.strokeStyle = '#aa88ee';
          ctx.beginPath();
          ctx.moveTo(tx + TILE/2, ty + 6);
          ctx.lineTo(tx + TILE/2, ty + TILE - 6);
          ctx.moveTo(tx + 6, ty + TILE/2);
          ctx.lineTo(tx + TILE - 6, ty + TILE/2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          break;
      }
    }
  }

  // Draw blocks
  for (var bi = 0; bi < blocks.length; bi++) {
    var b = blocks[bi];
    var bx = b.x * TILE;
    var by = b.y * TILE + HUD_Y;
    ctx.fillStyle = '#778899';
    ctx.fillRect(bx + 2, by + 2, TILE - 4, TILE - 4);
    ctx.strokeStyle = '#556677';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx + 4, by + 4, TILE - 8, TILE - 8);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#aabbcc';
    ctx.beginPath();
    ctx.moveTo(bx + 8, by + 8); ctx.lineTo(bx + TILE - 8, by + TILE - 8);
    ctx.moveTo(bx + TILE - 8, by + 8); ctx.lineTo(bx + 8, by + TILE - 8);
    ctx.stroke();
  }
}

// Color utility helpers
function darken(hex, factor) {
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  r = Math.floor(r * factor); g = Math.floor(g * factor); b = Math.floor(b * factor);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function lighten(hex, factor) {
  var r = Math.min(255, Math.floor(parseInt(hex.slice(1,3), 16) * factor));
  var g = Math.min(255, Math.floor(parseInt(hex.slice(3,5), 16) * factor));
  var b = Math.min(255, Math.floor(parseInt(hex.slice(5,7), 16) * factor));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function drawItems() {
  for (var ii = 0; ii < items.length; ii++) {
    var item = items[ii];
    var ix = item.x * TILE;
    var iy = item.y * TILE + HUD_Y;
    var bob = Math.sin(frame * 0.08 + item.x) * 2;

    switch (item.type) {
      case 'heart':
        ctx.fillStyle = '#ff4466';
        drawHeart(ix + TILE/2, iy + TILE/2 + bob, 6);
        break;
      case 'heart_container':
        ctx.fillStyle = '#ffaa44';
        drawHeart(ix + TILE/2, iy + TILE/2 + bob, 8);
        ctx.strokeStyle = '#ff6622';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ix + TILE/2, iy + TILE/2 + bob, 10, 0, Math.PI * 2);
        ctx.stroke();
        ctx.lineWidth = 1;
        break;
      case 'key':
        ctx.fillStyle = '#ffcc00';
        ctx.fillRect(ix + 10, iy + 8 + bob, 12, 4);
        ctx.beginPath();
        ctx.arc(ix + 10, iy + 10 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(ix + 20, iy + 12 + bob, 3, 6);
        break;
      case 'ammo':
        ctx.fillStyle = '#88aaff';
        ctx.beginPath();
        ctx.arc(ix + TILE/2, iy + TILE/2 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#aaccff';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('+5', ix + TILE/2, iy + TILE/2 + bob + 3);
        break;
      case 'potion':
        // Green healing potion
        ctx.fillStyle = '#44aa66';
        ctx.fillRect(ix + 12, iy + 6 + bob, 8, 4);
        ctx.fillStyle = '#22cc44';
        ctx.fillRect(ix + 10, iy + 10 + bob, 12, 14);
        ctx.fillStyle = '#33ff66';
        ctx.fillRect(ix + 12, iy + 12 + bob, 8, 8);
        break;
      case 'runestone':
        // Glowing purple rune
        ctx.fillStyle = '#6644aa';
        ctx.fillRect(ix + 8, iy + 6 + bob, 16, 20);
        ctx.fillStyle = '#8866cc';
        ctx.fillRect(ix + 10, iy + 8 + bob, 12, 16);
        ctx.strokeStyle = '#aa88ff';
        ctx.lineWidth = 1;
        var ra = frame * 0.05;
        ctx.beginPath();
        ctx.moveTo(ix + TILE/2, iy + 8 + bob);
        ctx.lineTo(ix + TILE/2, iy + 24 + bob);
        ctx.stroke();
        ctx.globalAlpha = 0.4 + Math.sin(ra) * 0.2;
        ctx.fillStyle = '#cc88ff';
        ctx.beginPath();
        ctx.arc(ix + TILE/2, iy + TILE/2 + bob, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'gold':
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(ix + TILE/2, iy + TILE/2 + bob, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ddaa00';
        ctx.font = 'bold 8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('G', ix + TILE/2, iy + TILE/2 + bob + 3);
        break;
      case 'torch':
        ctx.fillStyle = '#886644';
        ctx.fillRect(ix + 13, iy + 10 + bob, 4, 16);
        ctx.fillStyle = '#ff8800';
        ctx.beginPath();
        ctx.arc(ix + 15, iy + 8 + bob, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        ctx.arc(ix + 15, iy + 7 + bob, 3, 0, Math.PI * 2);
        ctx.fill();
        break;
      case 'raft':
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(ix + 4, iy + 12 + bob, 24, 8);
        ctx.fillRect(ix + 6, iy + 10 + bob, 20, 4);
        break;
      case 'mirror':
        ctx.fillStyle = '#aaccee';
        ctx.beginPath();
        ctx.ellipse(ix + TILE/2, iy + TILE/2 + bob, 8, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#8899aa';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.lineWidth = 1;
        // Shine
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ix + TILE/2 - 2, iy + TILE/2 - 3 + bob, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'weapon_up':
        ctx.fillStyle = '#ffdd44';
        var starPulse = 1 + Math.sin(frame * 0.1) * 0.2;
        drawStar(ix + TILE/2, iy + TILE/2 + bob, 8 * starPulse, 5);
        break;
      case '1up':
        ctx.fillStyle = '#44ff88';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('1UP', ix + TILE/2, iy + TILE/2 + bob + 3);
        break;
    }
  }
}

function drawHeart(cx, cy, size) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.3);
  ctx.bezierCurveTo(cx, cy - size * 0.3, cx - size, cy - size * 0.3, cx - size, cy + size * 0.1);
  ctx.bezierCurveTo(cx - size, cy + size * 0.6, cx, cy + size, cx, cy + size);
  ctx.bezierCurveTo(cx, cy + size, cx + size, cy + size * 0.6, cx + size, cy + size * 0.1);
  ctx.bezierCurveTo(cx + size, cy - size * 0.3, cx, cy - size * 0.3, cx, cy + size * 0.3);
  ctx.fill();
}

function drawStar(cx, cy, r, points) {
  ctx.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var a = (i * Math.PI / points) - Math.PI / 2;
    var rad = i % 2 === 0 ? r : r * 0.4;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
    else ctx.lineTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
  }
  ctx.closePath();
  ctx.fill();
}

// === PLAYER DRAWING ===
function drawPlayer() {
  if (player.invincible > 0 && frame % 4 < 2) return;

  var px = player.x * TILE;
  var py = player.y * TILE + HUD_Y;

  // Jump shadow
  if (player.jumping) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(px + TILE/2, py + TILE - 2, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  var jumpOff = player.jumping ? -8 - Math.sin(player.jumpTimer / 16 * Math.PI) * 6 : 0;
  drawBaselingSprite(px + TILE/2, py + TILE/2 + jumpOff, 1, frame);

  // Poison overlay
  if (player.poisoned > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#44ff44';
    ctx.beginPath();
    ctx.arc(px + TILE/2, py + TILE/2 + jumpOff, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawBaselingSprite(cx, cy, scale, f) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  // Body (round creature) -- uses NFT color
  ctx.fillStyle = statB.color;
  ctx.beginPath();
  ctx.ellipse(0, 2, 10, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly (lighter version)
  ctx.fillStyle = lighten(statB.color, 1.4);
  ctx.beginPath();
  ctx.ellipse(0, 5, 6, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-4, -2, 4, 0, Math.PI * 2);
  ctx.arc(4, -2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(-3, -1, 2, 0, Math.PI * 2);
  ctx.arc(5, -1, 2, 0, Math.PI * 2);
  ctx.fill();

  // Cap/hat with NFT icon
  ctx.fillStyle = '#ff6644';
  ctx.beginPath();
  ctx.arc(0, -9, 7, Math.PI, 0);
  ctx.fill();
  ctx.fillStyle = '#cc4422';
  ctx.fillRect(-7, -9, 14, 3);

  // NFT icon on hat
  if (statB.icon && statB.icon !== 'B') {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, -10);
  }

  // Feet (bob animation)
  var step = Math.sin(f * 0.15) * 1.5;
  ctx.fillStyle = darken(statB.color, 0.7);
  ctx.beginPath();
  ctx.ellipse(-5, 12 + step, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(5, 12 - step, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// === ENEMIES DRAWING (Tasern-themed, Pass 2+3) ===
function drawEnemies() {
  for (var ei = 0; ei < enemies.length; ei++) {
    var e = enemies[ei];
    if (e.flash > 0 && frame % 4 < 2) continue;
    var ex = e.x * TILE;
    var ey = e.y * TILE + HUD_Y;
    drawEnemySprite(ex, ey, e);
    // Enemy HP bar if damaged
    if (e.hp < e.maxHp) {
      var barW = TILE - 4;
      ctx.fillStyle = '#333';
      ctx.fillRect(ex + 2, ey - 4, barW, 3);
      ctx.fillStyle = '#cc2222';
