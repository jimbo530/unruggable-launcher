      ctx.fillRect(ex + 2, ey - 4, barW * (e.hp / e.maxHp), 3);
    }
  }
}

function drawEnemySprite(x, y, e) {
  var cx = x + TILE/2;
  var cy = y + TILE/2;

  switch (e.type) {
    case 'crab':
      ctx.fillStyle = '#cc4444';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 10, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff5555';
      ctx.beginPath();
      ctx.arc(cx - 12, cy - 2, 4, 0, Math.PI * 2);
      ctx.arc(cx + 12, cy - 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 4, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'kobold':
      // Small reptilian humanoid
      ctx.fillStyle = '#bb6633';
      ctx.beginPath();
      ctx.arc(cx, cy - 3, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(cx - 4, cy + 3, 8, 8);
      // Snout
      ctx.fillStyle = '#dd8844';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 1, 4, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 5, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 5, 2, 0, Math.PI * 2);
      ctx.fill();
      // Tail
      ctx.strokeStyle = '#996622';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + 4, cy + 10);
      ctx.quadraticCurveTo(cx + 10, cy + 14, cx + 8, cy + 8);
      ctx.stroke();
      ctx.lineWidth = 1;
      break;
    case 'goblin':
      // Green goblin with pointy ears
      ctx.fillStyle = '#55aa33';
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(cx - 5, cy + 5, 10, 8);
      // Ears
      ctx.fillStyle = '#44882a';
      ctx.beginPath();
      ctx.moveTo(cx - 7, cy - 4); ctx.lineTo(cx - 12, cy - 10); ctx.lineTo(cx - 4, cy - 6);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 7, cy - 4); ctx.lineTo(cx + 12, cy - 10); ctx.lineTo(cx + 4, cy - 6);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'snake':
      ctx.fillStyle = '#44aa44';
      ctx.beginPath();
      var swave = Math.sin(frame * 0.1) * 3;
      ctx.moveTo(cx - 10, cy + swave);
      ctx.quadraticCurveTo(cx, cy - swave, cx + 10, cy + swave);
      ctx.lineTo(cx + 10, cy + swave + 6);
      ctx.quadraticCurveTo(cx, cy - swave + 6, cx - 10, cy + swave + 6);
      ctx.fill();
      ctx.fillStyle = '#55cc55';
      ctx.beginPath();
      ctx.arc(cx + 10 * (e.dir === DIR.LEFT ? -1 : 1), cy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#ff3333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cx + 14 * (e.dir === DIR.LEFT ? -1 : 1), cy);
      ctx.lineTo(cx + 18 * (e.dir === DIR.LEFT ? -1 : 1), cy + Math.sin(frame * 0.2) * 2);
      ctx.stroke();
      break;
    case 'fire_drake':
      // Small dragon/drake
      ctx.fillStyle = '#ff6622';
      ctx.beginPath();
      ctx.ellipse(cx, cy, 10, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Wings
      ctx.fillStyle = '#cc4400';
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy - 4);
      ctx.lineTo(cx - 16, cy - 10 + Math.sin(frame * 0.15) * 3);
      ctx.lineTo(cx - 6, cy);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 8, cy - 4);
      ctx.lineTo(cx + 16, cy - 10 + Math.sin(frame * 0.15 + 1) * 3);
      ctx.lineTo(cx + 6, cy);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 3, 2, 0, Math.PI * 2);
      ctx.arc(cx + 4, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      // Fire breath hint
      if (e.attackTimer > 30) {
        ctx.globalAlpha = (e.attackTimer - 30) / 10 * 0.5;
        ctx.fillStyle = '#ff4400';
        ctx.beginPath();
        ctx.arc(cx + DX[e.dir] * 12, cy + DY[e.dir] * 12, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
    case 'bat':
      ctx.fillStyle = '#886688';
      var wingAngle = Math.sin(frame * 0.2) * 0.5;
      ctx.beginPath();
      ctx.ellipse(cx - 8, cy, 6, 4, wingAngle, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + 8, cy, 6, 4, -wingAngle, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#664466';
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(cx - 2, cy - 2, 1.5, 0, Math.PI * 2);
      ctx.arc(cx + 2, cy - 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'frost_wraith':
      // Icy spectral form
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#88bbff';
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 9, Math.PI, 0);
      ctx.lineTo(cx + 9, cy + 8);
      for (var fw = 0; fw < 4; fw++) {
        var gx = cx + 9 - fw * 6;
        ctx.quadraticCurveTo(gx - 1.5, cy + 12, gx - 3, cy + 8);
        ctx.quadraticCurveTo(gx - 4.5, cy + 4, gx - 6, cy + 8);
      }
      ctx.fill();
      // Ice crystals around
      ctx.fillStyle = '#ccddff';
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 4, 2, 0, Math.PI * 2);
      ctx.arc(cx + 4, cy - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'skeleton':
      ctx.fillStyle = '#ccccaa';
      ctx.beginPath();
      ctx.arc(cx, cy - 4, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(cx - 2, cy + 3, 4, 10);
      ctx.strokeStyle = '#aaaacc';
      ctx.beginPath();
      ctx.moveTo(cx - 6, cy + 5); ctx.lineTo(cx + 6, cy + 5);
      ctx.moveTo(cx - 5, cy + 8); ctx.lineTo(cx + 5, cy + 8);
      ctx.stroke();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 5, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 5, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'shade':
      // Dark purple wraith
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.06) * 0.2;
      ctx.fillStyle = '#6633aa';
      ctx.beginPath();
      ctx.arc(cx, cy, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#9966cc';
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 7, Math.PI, 0);
      ctx.fill();
      // Glowing eyes
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'ghost':
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.05) * 0.2;
      ctx.fillStyle = '#aaaaff';
      ctx.beginPath();
      ctx.arc(cx, cy - 2, 9, Math.PI, 0);
      ctx.lineTo(cx + 9, cy + 8);
      for (var gi = 0; gi < 4; gi++) {
        var gx2 = cx + 9 - gi * 6;
        ctx.quadraticCurveTo(gx2 - 1.5, cy + 12, gx2 - 3, cy + 8);
        ctx.quadraticCurveTo(gx2 - 4.5, cy + 4, gx2 - 6, cy + 8);
      }
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(cx - 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 'construct':
      // Iron golem-like
      ctx.fillStyle = '#667788';
      ctx.fillRect(cx - 10, cy - 8, 20, 18);
      ctx.fillStyle = '#556677';
      ctx.fillRect(cx - 7, cy - 14, 14, 8);
      // Glowing core
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8888';
      ctx.beginPath();
      ctx.arc(cx, cy, 2, 0, Math.PI * 2);
      ctx.fill();
      // Shoulder plates
      ctx.fillStyle = '#778899';
      ctx.fillRect(cx - 14, cy - 6, 6, 8);
      ctx.fillRect(cx + 8, cy - 6, 6, 8);
      break;
    case 'robot':
      ctx.fillStyle = '#7799aa';
      ctx.fillRect(cx - 8, cy - 6, 16, 14);
      ctx.fillStyle = '#889fbb';
      ctx.fillRect(cx - 5, cy - 12, 10, 7);
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(cx, cy - 9, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#aabbcc';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 12); ctx.lineTo(cx, cy - 16);
      ctx.stroke();
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(cx, cy - 16, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'myconid':
      // Larger mushroom creature
      ctx.fillStyle = '#77aa44';
      ctx.fillRect(cx - 4, cy + 2, 8, 12);
      ctx.fillStyle = '#66cc33';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 3, 12, 9, 0, Math.PI, 0);
      ctx.fill();
      // Glowing spots
      ctx.fillStyle = '#aaff66';
      var spotPulse = 0.5 + Math.sin(frame * 0.06) * 0.3;
      ctx.globalAlpha = spotPulse;
      ctx.beginPath();
      ctx.arc(cx - 5, cy - 6, 3, 0, Math.PI * 2);
      ctx.arc(cx + 4, cy - 4, 2, 0, Math.PI * 2);
      ctx.arc(cx - 1, cy - 2, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      // Eyes
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(cx - 3, cy + 4, 1.5, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy + 4, 1.5, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'fungi':
      ctx.fillStyle = '#aabb88';
      ctx.fillRect(cx - 3, cy + 2, 6, 10);
      ctx.fillStyle = '#88cc55';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 2, 10, 8, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#aaee77';
      ctx.beginPath();
      ctx.arc(cx - 4, cy - 5, 2, 0, Math.PI * 2);
      ctx.arc(cx + 3, cy - 3, 2, 0, Math.PI * 2);
      ctx.fill();
      if (frame % 20 < 5) {
        ctx.fillStyle = '#ccff88';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(cx + Math.sin(frame * 0.1) * 8, cy - 10, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      break;
  }
}

// === BOSS DRAWING (Enhanced Pass 3) ===
function drawBossSprite() {
  if (!boss || !bossActive) return;
  if (boss.flash > 0 && frame % 4 < 2) return;

  var bx = boss.x * TILE;
  var by = boss.y * TILE + HUD_Y;
  var cx = bx + TILE/2;
  var cy = by + TILE/2;

  // Boss shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 20, 16, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.translate(cx, cy);
  // Phase 1: boss pulses/grows slightly
  var bossScale = 1.5 + (boss.phase >= 1 ? Math.sin(frame * 0.1) * 0.1 : 0);
  ctx.scale(bossScale, bossScale);

  switch (boss.island) {
    case 0: // Tideclaw the Bloated
      ctx.fillStyle = '#cc2222';
      ctx.beginPath();
      ctx.ellipse(0, 0, 14, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff3333';
      ctx.beginPath();
      ctx.arc(-16, -4, 6, 0, Math.PI * 2);
      ctx.arc(16, -4, 6, 0, Math.PI * 2);
      ctx.fill();
      // Claw details
      ctx.strokeStyle = '#881111';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-16, -4, 6, 0.5, 2.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(16, -4, 6, 0.5, 2.5);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(-4, -4, 3, 0, Math.PI * 2);
      ctx.arc(4, -4, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 1: // Grukk Thornfang
      ctx.fillStyle = '#228822';
      for (var si = 0; si < 5; si++) {
        var sx = Math.sin(frame * 0.05 + si) * 6;
        ctx.beginPath();
        ctx.arc(sx, -8 + si * 5, 6 - si * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#44ff44';
      ctx.beginPath();
      ctx.arc(Math.sin(frame * 0.05) * 6, -8, 8, 0, Math.PI * 2);
      ctx.fill();
      // Thorns
      ctx.fillStyle = '#116611';
      for (var th = 0; th < 6; th++) {
        var ta = th * Math.PI / 3 + frame * 0.02;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ta) * 8, Math.sin(ta) * 8 - 8);
        ctx.lineTo(Math.cos(ta) * 14, Math.sin(ta) * 14 - 8);
        ctx.lineTo(Math.cos(ta + 0.2) * 8, Math.sin(ta + 0.2) * 8 - 8);
        ctx.fill();
      }
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(-6, -18, 12, 4);
      ctx.beginPath();
      ctx.moveTo(-6, -18); ctx.lineTo(-4, -22); ctx.lineTo(-2, -18);
      ctx.moveTo(0, -18); ctx.lineTo(2, -22); ctx.lineTo(4, -18);
      ctx.fill();
      break;
    case 2: // Pyrevex the Ashen
      ctx.fillStyle = '#cc4400';
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 14, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff8800';
      var lavaOff = Math.sin(frame * 0.08) * 3;
      ctx.beginPath();
      ctx.arc(0, lavaOff, 8, 0, Math.PI * 2);
      ctx.fill();
      // Flame crown
      ctx.fillStyle = '#ffcc00';
      for (var fi = 0; fi < 5; fi++) {
        var fa = (fi / 5) * Math.PI - Math.PI;
        var fh = 6 + Math.sin(frame * 0.1 + fi) * 3;
        ctx.beginPath();
        ctx.moveTo(Math.cos(fa) * 10, -10);
        ctx.lineTo(Math.cos(fa) * 8, -10 - fh);
        ctx.lineTo(Math.cos(fa + 0.3) * 10, -10);
        ctx.fill();
      }
      break;
    case 3: // Rimejaw the Eternal
      ctx.fillStyle = '#88bbff';
      ctx.fillRect(-10, -8, 20, 22);
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(0, -12, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#224488';
      ctx.beginPath();
      ctx.arc(-4, -13, 3, 0, Math.PI * 2);
      ctx.arc(4, -13, 3, 0, Math.PI * 2);
      ctx.fill();
      // Ice crystals
      ctx.strokeStyle = '#ccffff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-14, -4); ctx.lineTo(-18, -10);
      ctx.moveTo(14, -4); ctx.lineTo(18, -10);
      ctx.moveTo(-10, 8); ctx.lineTo(-16, 12);
      ctx.moveTo(10, 8); ctx.lineTo(16, 12);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Frost aura
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.arc(0, 0, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 4: // Nihilor the Unbound
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = '#442266';
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6633aa';
      ctx.beginPath();
      ctx.arc(0, -4, 10, Math.PI, 0);
      ctx.fill();
      // Shadow tendrils
      ctx.strokeStyle = '#9944ff';
      ctx.lineWidth = 2;
      for (var ti = 0; ti < 4; ti++) {
        var ta2 = ti * Math.PI / 2 + frame * 0.03;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(Math.cos(ta2) * 15, Math.sin(ta2) * 15, Math.cos(ta2 + 0.5) * 20, Math.sin(ta2 + 0.5) * 20);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
      ctx.fillStyle = '#ff00ff';
      ctx.beginPath();
      ctx.arc(-4, -4, 3, 0, Math.PI * 2);
      ctx.arc(4, -4, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 5: // The Forgemaster
      ctx.fillStyle = '#556677';
      ctx.fillRect(-12, -12, 24, 24);
      ctx.fillStyle = '#ff2222';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
      var pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 1;
      // Gears (animated rotation)
      ctx.save();
      ctx.rotate(frame * 0.05);
      ctx.strokeStyle = '#8899aa';
      ctx.beginPath();
      ctx.arc(-8, -8, 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.rotate(-frame * 0.05);
      ctx.strokeStyle = '#8899aa';
      ctx.beginPath();
      ctx.arc(8, 8, 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      break;
    case 6: // The Spore Mother
      ctx.fillStyle = '#446622';
      ctx.beginPath();
      ctx.ellipse(0, 4, 14, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#66aa33';
      ctx.beginPath();
      ctx.ellipse(0, -6, 16, 10, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#aaff44';
      ctx.beginPath();
      ctx.arc(-6, -8, 3, 0, Math.PI * 2);
      ctx.arc(5, -6, 2, 0, Math.PI * 2);
      ctx.arc(-2, -3, 2.5, 0, Math.PI * 2);
      ctx.fill();
      // Spore aura (enhanced)
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ccff66';
      for (var si2 = 0; si2 < 8; si2++) {
        var sa2 = frame * 0.03 + si2 * 0.8;
        var sr2 = 18 + Math.sin(frame * 0.05 + si2) * 3;
        ctx.beginPath();
        ctx.arc(Math.cos(sa2) * sr2, Math.sin(sa2) * sr2, 2 + Math.sin(frame * 0.08 + si2) * 1, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // Face
      ctx.fillStyle = '#88ff44';
      ctx.beginPath();
      ctx.arc(-4, 2, 2, 0, Math.PI * 2);
      ctx.arc(4, 2, 2, 0, Math.PI * 2);
      ctx.fill();
      break;
  }

  ctx.restore();

  // Boss health bar (enhanced)
  if (bossActive) {
    var barW = 120;
    var barX = GW/2 - barW/2;
    var barY = GH - 20;
    ctx.fillStyle = '#111';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, 12);
    ctx.fillStyle = '#333';
    ctx.fillRect(barX, barY, barW, 8);
    // Health with phase color
    var hpColor = boss.phase >= 1 ? '#ff4444' : '#cc2222';
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), 8);
    // Notches
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    for (var ni = 1; ni < 4; ni++) {
      ctx.beginPath();
      ctx.moveTo(barX + barW * ni / 4, barY);
      ctx.lineTo(barX + barW * ni / 4, barY + 8);
      ctx.stroke();
    }
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.name + (boss.phase >= 1 ? ' [ENRAGED]' : ''), GW/2, barY - 4);
  }
}

// === YO-YO DRAWING ===
function drawYoyo() {
  if (!yoyo) return;
  var px = player.x * TILE + TILE/2;
  var py = player.y * TILE + HUD_Y + TILE/2;
  var yx = px + DX[yoyo.dir] * yoyo.dist * TILE;
  var yy = py + DY[yoyo.dir] * yoyo.dist * TILE;

  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(yx, yy);
  ctx.stroke();

  var colors = ['#ffcc44', '#ff6644', '#44ccff'];
  ctx.fillStyle = colors[player.weapon] || '#ffcc44';
  ctx.beginPath();
  ctx.arc(yx, yy, 5 + player.weapon, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  var spinAngle = frame * 0.3;
  ctx.arc(yx, yy, 3 + player.weapon, spinAngle, spinAngle + Math.PI);
  ctx.stroke();

  if (frame % 3 === 0) {
    TAS.particles.spawn(yx, yy, colors[player.weapon], 1, 1, { size: 1 });
  }
}

function drawProjectiles() {
  for (var pi = 0; pi < projectiles.length; pi++) {
    var p = projectiles[pi];
    var px = p.x * TILE + TILE/2;
    var py = p.y * TILE + HUD_Y + TILE/2;

    if (p.type === 'enemy' || p.type === 'boss') {
      ctx.fillStyle = '#ff4444';
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
      // Glow
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'spore') {
      ctx.fillStyle = '#88ff44';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (p.type === 'fire') {
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#cc0000';
      ctx.beginPath();
      ctx.arc(px, py, 3, 0.5, 2);
      ctx.stroke();
    }
  }
}

function drawDarkness() {
  if (!darkRoom || hasTorch) return;
  var px = player.x * TILE + TILE/2;
  var py = player.y * TILE + HUD_Y + TILE/2;
  ctx.fillStyle = '#000';
  ctx.globalAlpha = 0.85;
  ctx.fillRect(0, HUD_Y, GW, GH - HUD_Y);
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  // ref 10: INT -> dark room vision radius
  var lightR = TILE * DARK_RADIUS;
  var grad = ctx.createRadialGradient(px, py, 0, px, py, lightR);
  grad.addColorStop(0, 'rgba(0,0,0,1)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(px, py, lightR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// === HUD (Enhanced Pass 3) ===
function drawHUD() {
  // HUD background with gradient
  var hudGrad = ctx.createLinearGradient(0, 0, 0, HUD_Y);
  hudGrad.addColorStop(0, 'rgba(10,5,20,0.95)');
  hudGrad.addColorStop(1, 'rgba(10,5,20,0.75)');
  ctx.fillStyle = hudGrad;
  ctx.fillRect(0, 0, GW, HUD_Y);

  // Hearts
  for (var i = 0; i < player.maxHp; i++) {
    var hx = 6 + i * 14;
    var hy = 14;
    if (i < player.hp) {
      ctx.fillStyle = '#ff4466';
    } else {
      ctx.fillStyle = '#443344';
    }
    drawHeart(hx + 5, hy, 4);
  }

  // Poison indicator
  if (player.poisoned > 0) {
    ctx.fillStyle = '#44ff44';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('POISON', 6, 24);
  }

  // Island name
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  var loc = inDungeon ? ISLANDS[currentIsland].name + ' Dungeon F' + (dungeonFloor + 1) : ISLANDS[currentIsland].name;
  ctx.fillText(loc, GW/2, 12);

  // Score + Combo
  ctx.fillStyle = '#ffdd44';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE: ' + score + (combo > 1 ? '  ' + combo + 'x' : ''), GW/2, 24);

  // Sub weapon / ammo
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('AMMO:' + player.ammo + '/' + AMMO_CAP, GW - 6, 12);

  // Keys
  if (player.keys > 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillText('KEY:' + player.keys, GW - 6, 24);
  }

  // Lives and gold
  ctx.fillStyle = '#44dd88';
  ctx.textAlign = 'left';
  ctx.fillText(statB.name + ' x' + player.lives, GW - 100, 24);
}

function drawMessage() {
  if (msgTimer <= 0 || !msgText) return;
  var alpha = Math.min(1, msgTimer / 20);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  var msgW = Math.min(420, msgText.length * 7 + 30);
  ctx.fillRect(GW/2 - msgW/2, GH - 52, msgW, 30);
  ctx.strokeStyle = 'rgba(68,221,170,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(GW/2 - msgW/2, GH - 52, msgW, 30);
  ctx.fillStyle = '#ffdd88';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(msgText, GW/2, GH - 33);
  ctx.globalAlpha = 1;
}

function drawTransition() {
  var t = transitionTimer / 30;
  if (transitionType === 'stairs') {
    // Iris transition
    var r = (1 - t) * Math.max(GW, GH);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.rect(0, 0, GW, GH);
    ctx.arc(GW/2, GH/2, r, 0, Math.PI * 2, true);
    ctx.fill();
  } else {
    ctx.globalAlpha = t;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1;
  }
}

// === START GAME LOOP ===
TAS.loop.start(update, draw);

})();
</script>
