<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Roller - TTRPG Tools</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; min-height: 100%; background: #0a0a0f; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; }
.container { max-width: 600px; margin: 0 auto; padding: 16px; padding-bottom: 60px; }
.header { text-align: center; padding: 20px 0 10px; }
.header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: #f59e0b; }
.header p { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: #666; margin-top: 4px; }

/* Dice buttons */
.dice-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
.dice-btn {
  width: 72px; height: 72px; border-radius: 14px; border: 2px solid rgba(245,158,11,0.3);
  background: rgba(245,158,11,0.08); color: #f59e0b; font-weight: 900; font-size: 1rem;
  cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px; user-select: none;
}
.dice-btn:hover { background: rgba(245,158,11,0.18); transform: scale(1.05); }
.dice-btn:active { transform: scale(0.95); }
.dice-btn .icon { font-size: 1.4rem; }
.dice-btn .label { font-size: 0.6rem; letter-spacing: 0.1em; }

/* Quick roll controls */
.controls { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; margin: 12px 0; }
.ctrl-group { display: flex; align-items: center; gap: 4px; }
.ctrl-label { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
.ctrl-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(245,158,11,0.25);
  background: rgba(245,158,11,0.06); color: #f59e0b; font-size: 1rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { background: rgba(245,158,11,0.15); }
.ctrl-val {
  min-width: 28px; text-align: center; font-weight: 700; font-size: 1rem; color: #f59e0b;
}
.mod-input {
  width: 50px; height: 32px; border-radius: 8px; border: 1px solid rgba(245,158,11,0.25);
  background: rgba(245,158,11,0.06); color: #f59e0b; font-size: 0.9rem; font-weight: 700;
  text-align: center; outline: none;
}
.mod-input:focus { border-color: #f59e0b; }

/* Special roll buttons */
.special-row { display: flex; gap: 8px; justify-content: center; margin: 8px 0; }
.special-btn {
  padding: 8px 16px; border-radius: 10px; border: 1px solid rgba(139,92,246,0.3);
  background: rgba(139,92,246,0.08); color: #a78bfa; font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
}
.special-btn:hover { background: rgba(139,92,246,0.18); }
.special-btn.active { background: rgba(139,92,246,0.25); border-color: #a78bfa; }

/* Custom expression */
.expr-row { display: flex; gap: 8px; margin: 12px 0; }
.expr-input {
  flex: 1; height: 40px; border-radius: 10px; border: 1px solid rgba(245,158,11,0.25);
  background: rgba(245,158,11,0.04); color: #f59e0b; font-size: 0.9rem; font-weight: 600;
  padding: 0 12px; outline: none; font-family: monospace;
}
.expr-input::placeholder { color: rgba(245,158,11,0.3); }
.expr-input:focus { border-color: #f59e0b; }
.roll-btn {
  padding: 0 20px; height: 40px; border-radius: 10px; border: 2px solid #f59e0b;
  background: rgba(245,158,11,0.15); color: #f59e0b; font-size: 0.8rem; font-weight: 900;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
}
.roll-btn:hover { background: rgba(245,158,11,0.3); }

/* Result display */
.result-area {
  min-height: 120px; border-radius: 16px; border: 2px solid rgba(245,158,11,0.2);
  background: rgba(245,158,11,0.04); margin: 16px 0; padding: 16px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.result-area.rolling { animation: pulse 0.3s ease-in-out; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
.result-total { font-size: 3.5rem; font-weight: 900; color: #f59e0b; line-height: 1; }
.result-total.crit { color: #22c55e; text-shadow: 0 0 20px rgba(34,197,94,0.5); }
.result-total.fumble { color: #ef4444; text-shadow: 0 0 20px rgba(239,68,68,0.5); }
.result-expr { font-size: 0.75rem; color: #888; margin-top: 4px; font-family: monospace; }
.result-breakdown { font-size: 0.8rem; color: #aaa; margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.die-result {
  display: inline-flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 6px; font-weight: 700; font-size: 0.85rem;
  background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b;
}
.die-result.max { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3); color: #22c55e; }
.die-result.min { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #ef4444; }
.die-result.dropped { opacity: 0.3; text-decoration: line-through; }

/* History */
.history-header { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
.history-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; font-weight: 700; }
.clear-btn {
  font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555;
  background: none; border: 1px solid rgba(100,100,100,0.2); border-radius: 6px;
  padding: 4px 10px; cursor: pointer;
}
.clear-btn:hover { color: #ef4444; border-color: rgba(239,68,68,0.3); }
.history-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; max-height: 300px; overflow-y: auto; }
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-radius: 10px; background: rgba(100,100,100,0.06);
  border: 1px solid rgba(100,100,100,0.1); font-size: 0.8rem;
}
.history-item .expr { color: #888; font-family: monospace; }
.history-item .total { color: #f59e0b; font-weight: 700; }
.history-item .time { color: #444; font-size: 0.6rem; }
.history-item .details { color: #666; font-size: 0.65rem; }
.share-btn {
  font-size: 0.6rem; color: #555; background: none; border: 1px solid rgba(100,100,100,0.2);
  border-radius: 6px; padding: 4px 8px; cursor: pointer; margin-left: 8px;
}
.share-btn:hover { color: #f59e0b; border-color: rgba(245,158,11,0.3); }

/* Animations */
.die-anim { animation: dieRoll 0.4s ease-out; }
@keyframes dieRoll {
  0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); opacity: 1; }
}

#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Dice Roller</h1>
    <p>Roll any dice for your TTRPG session</p>
  </div>

  <div class="dice-row" id="dice-row"></div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Qty</span>
      <button class="ctrl-btn" onclick="changeQty(-1)">-</button>
      <span class="ctrl-val" id="qty-val">1</span>
      <button class="ctrl-btn" onclick="changeQty(1)">+</button>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Mod</span>
      <input type="text" class="mod-input" id="mod-input" value="+0" maxlength="4">
    </div>
  </div>

  <div class="special-row">
    <button class="special-btn" id="adv-btn" onclick="toggleMode('advantage')">Advantage</button>
    <button class="special-btn" id="dis-btn" onclick="toggleMode('disadvantage')">Disadvantage</button>
    <button class="special-btn" id="drop-btn" onclick="toggleMode('drop-lowest')">Drop Lowest</button>
  </div>

  <div class="expr-row">
    <input type="text" class="expr-input" id="expr-input" placeholder="e.g. 2d6+4, 4d6dl1, d20+5">
    <button class="roll-btn" onclick="rollExpression()">Roll</button>
  </div>

  <div class="result-area" id="result-area">
    <div style="color:#555; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase;">
      Tap a die to roll
    </div>
  </div>

  <div class="history-header">
    <span class="history-title">Roll History</span>
    <button class="clear-btn" onclick="clearHistory()">Clear</button>
  </div>
  <div class="history-list" id="history-list"></div>
</div>
<a id="back-link" href="/games">Back to Games</a>

<script>
(function() {
"use strict";

// ============================================================
// AUDIO
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playRollSound() {
  try {
    const ctx = getAudio();
    // Quick rattle sound
    for (let i = 0; i < 4; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 200 + Math.random() * 800;
      gain.gain.value = 0.06;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05 + i * 0.04);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.04);
      osc.stop(ctx.currentTime + 0.08 + i * 0.04);
    }
  } catch(e) { console.warn('Audio error:', e); }
}

function playCritSound() {
  try {
    const ctx = getAudio();
    [523, 659, 784].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      gain.gain.value = 0.1;
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3 + i * 0.1);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.1);
      osc.stop(ctx.currentTime + 0.4 + i * 0.1);
    });
  } catch(e) { console.warn('Audio error:', e); }
}

function playFumbleSound() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 200;
    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.3);
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) { console.warn('Audio error:', e); }
}

// ============================================================
// STATE
// ============================================================
let qty = 1;
let modifier = 0;
let rollMode = 'normal'; // normal, advantage, disadvantage, drop-lowest
let history = [];
const MAX_HISTORY = 50;

const DICE = [
  { sides: 4, label: 'D4', icon: '▲' },
  { sides: 6, label: 'D6', icon: '⬡' },
  { sides: 8, label: 'D8', icon: '◆' },
  { sides: 10, label: 'D10', icon: '⬠' },
  { sides: 12, label: 'D12', icon: '⬡' },
  { sides: 20, label: 'D20', icon: '⬡' },
  { sides: 100, label: 'D100', icon: '%' },
];

// ============================================================
// INIT DICE BUTTONS
// ============================================================
const diceRow = document.getElementById('dice-row');
DICE.forEach(d => {
  const btn = document.createElement('button');
  btn.className = 'dice-btn';
  btn.innerHTML = `<span class="icon">${d.icon}</span><span class="label">${d.label}</span>`;
  btn.onclick = () => rollDice(d.sides);
  diceRow.appendChild(btn);
});

// ============================================================
// CONTROLS
// ============================================================
function changeQty(delta) {
  qty = Math.max(1, Math.min(20, qty + delta));
  document.getElementById('qty-val').textContent = qty;
}

document.getElementById('mod-input').addEventListener('input', function() {
  let val = this.value.replace(/[^0-9+\-]/g, '');
  if (val === '' || val === '+' || val === '-') {
    modifier = 0;
  } else {
    modifier = parseInt(val) || 0;
  }
});

function toggleMode(mode) {
  rollMode = rollMode === mode ? 'normal' : mode;
  document.getElementById('adv-btn').classList.toggle('active', rollMode === 'advantage');
  document.getElementById('dis-btn').classList.toggle('active', rollMode === 'disadvantage');
  document.getElementById('drop-btn').classList.toggle('active', rollMode === 'drop-lowest');
}

// ============================================================
// ROLL LOGIC
// ============================================================
function rollSingle(sides) {
  return Math.floor(Math.random() * sides) + 1;
}

function rollDice(sides) {
  let rolls = [];
  let actualQty = qty;
  let dropped = [];
  let expression = '';

  if (rollMode === 'advantage' || rollMode === 'disadvantage') {
    // Roll 2, take higher/lower (only for single die)
    rolls = [rollSingle(sides), rollSingle(sides)];
    const pick = rollMode === 'advantage' ? Math.max(...rolls) : Math.min(...rolls);
    const dropIdx = rolls.indexOf(rollMode === 'advantage' ? Math.min(...rolls) : Math.max(...rolls));
    dropped = [dropIdx];
    const total = pick + modifier;
    expression = `2d${sides}${rollMode === 'advantage' ? 'kh1' : 'kl1'}${modifier >= 0 ? '+' + modifier : modifier}`;
    displayResult(total, rolls, sides, expression, dropped);
  } else if (rollMode === 'drop-lowest' && actualQty > 1) {
    rolls = Array.from({length: actualQty}, () => rollSingle(sides));
    const minVal = Math.min(...rolls);
    const dropIdx = rolls.indexOf(minVal);
    dropped = [dropIdx];
    const kept = rolls.filter((_, i) => i !== dropIdx);
    const total = kept.reduce((a, b) => a + b, 0) + modifier;
    expression = `${actualQty}d${sides}dl1${modifier >= 0 ? '+' + modifier : modifier}`;
    displayResult(total, rolls, sides, expression, dropped);
  } else {
    rolls = Array.from({length: actualQty}, () => rollSingle(sides));
    const total = rolls.reduce((a, b) => a + b, 0) + modifier;
    expression = `${actualQty}d${sides}${modifier !== 0 ? (modifier >= 0 ? '+' + modifier : '' + modifier) : ''}`;
    displayResult(total, rolls, sides, expression, []);
  }
}

// ============================================================
// EXPRESSION PARSER  (supports: 2d6+4, 4d6dl1, d20+5, 3d8-2)
// ============================================================
function parseAndRoll(expr) {
  expr = expr.toLowerCase().replace(/\s/g, '');
  if (!expr) return null;

  // Match pattern: (N)d(S)(dl/kh/kl N)(+/-M)
  const match = expr.match(/^(\d*)d(\d+)(dl|kh|kl)?(\d*)([+\-]\d+)?$/);
  if (!match) return null;

  const count = parseInt(match[1]) || 1;
  const sides = parseInt(match[2]);
  const keepDrop = match[3] || null;
  const keepDropN = parseInt(match[4]) || 1;
  const mod = parseInt(match[5]) || 0;

  if (sides < 1 || sides > 1000 || count < 1 || count > 100) return null;

  const rolls = Array.from({length: count}, () => rollSingle(sides));
  let dropped = [];

  if (keepDrop === 'dl') {
    // Drop lowest N
    const sorted = rolls.map((v, i) => ({v, i})).sort((a, b) => a.v - b.v);
    for (let i = 0; i < Math.min(keepDropN, rolls.length - 1); i++) {
      dropped.push(sorted[i].i);
    }
  } else if (keepDrop === 'kh') {
    // Keep highest N
    const sorted = rolls.map((v, i) => ({v, i})).sort((a, b) => b.v - a.v);
    for (let i = keepDropN; i < sorted.length; i++) {
      dropped.push(sorted[i].i);
    }
  } else if (keepDrop === 'kl') {
    // Keep lowest N
    const sorted = rolls.map((v, i) => ({v, i})).sort((a, b) => a.v - b.v);
    for (let i = keepDropN; i < sorted.length; i++) {
      dropped.push(sorted[i].i);
    }
  }

  const kept = rolls.filter((_, i) => !dropped.includes(i));
  const total = kept.reduce((a, b) => a + b, 0) + mod;

  return { total, rolls, sides, expression: expr, dropped };
}

function rollExpression() {
  const input = document.getElementById('expr-input');
  const result = parseAndRoll(input.value);
  if (result) {
    displayResult(result.total, result.rolls, result.sides, result.expression, result.dropped);
  } else {
    // Try simple number
    const num = parseInt(input.value);
    if (!isNaN(num) && num >= 1 && num <= 1000) {
      rollDice(num);
    }
  }
}

document.getElementById('expr-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') rollExpression();
});

// ============================================================
// DISPLAY
// ============================================================
function displayResult(total, rolls, sides, expression, dropped) {
  playRollSound();
  const area = document.getElementById('result-area');
  area.classList.remove('rolling');
  void area.offsetWidth; // reflow
  area.classList.add('rolling');

  const isCrit = rolls.length === 1 && rolls[0] === sides && sides >= 4;
  const isFumble = rolls.length === 1 && rolls[0] === 1 && sides >= 4;

  if (isCrit) playCritSound();
  if (isFumble) playFumbleSound();

  let html = '';
  html += `<div class="result-total ${isCrit ? 'crit' : ''} ${isFumble ? 'fumble' : ''}">${total}</div>`;
  html += `<div class="result-expr">${expression}</div>`;

  if (rolls.length > 0) {
    html += '<div class="result-breakdown">';
    rolls.forEach((r, i) => {
      const isMax = r === sides;
      const isMin = r === 1;
      const isDrop = dropped.includes(i);
      html += `<span class="die-result die-anim ${isMax ? 'max' : ''} ${isMin ? 'min' : ''} ${isDrop ? 'dropped' : ''}" style="animation-delay:${i * 0.06}s">${r}</span>`;
    });
    html += '</div>';
  }

  if (isCrit) html += '<div style="color:#22c55e;font-size:0.7rem;font-weight:700;margin-top:8px;letter-spacing:0.15em;text-transform:uppercase">Natural ' + sides + '!</div>';
  if (isFumble) html += '<div style="color:#ef4444;font-size:0.7rem;font-weight:700;margin-top:8px;letter-spacing:0.15em;text-transform:uppercase">Critical Fail!</div>';

  area.innerHTML = html;

  // Add to history
  const entry = {
    expression,
    total,
    rolls: [...rolls],
    dropped: [...dropped],
    sides,
    time: Date.now(),
  };
  history.unshift(entry);
  if (history.length > MAX_HISTORY) history.pop();
  saveHistory();
  renderHistory();
}

// ============================================================
// HISTORY
// ============================================================
function renderHistory() {
  const list = document.getElementById('history-list');
  if (history.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#333;font-size:0.7rem;padding:20px;">No rolls yet</div>';
    return;
  }

  list.innerHTML = history.map((h, idx) => {
    const ago = timeAgo(h.time);
    const rollStr = h.rolls.map((r, i) => h.dropped.includes(i) ? `<s style="opacity:0.3">${r}</s>` : r).join(', ');
    return `<div class="history-item">
      <div>
        <span class="expr">${h.expression}</span>
        <span class="details">[${rollStr}]</span>
      </div>
      <div style="display:flex;align-items:center;">
        <span class="total">${h.total}</span>
        <span class="time" style="margin-left:8px;">${ago}</span>
        <button class="share-btn" onclick="shareRoll(${idx})" title="Copy to clipboard">Copy</button>
      </div>
    </div>`;
  }).join('');
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return 'now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h';
  return Math.floor(diff / 86400) + 'd';
}

function clearHistory() {
  history = [];
  saveHistory();
  renderHistory();
}

function saveHistory() {
  try { localStorage.setItem('dice-roller-history', JSON.stringify(history)); }
  catch(e) { console.warn('Failed to save history:', e); }
}

function loadHistory() {
  try {
    const data = localStorage.getItem('dice-roller-history');
    if (data) history = JSON.parse(data);
  } catch(e) { console.warn('Failed to load history:', e); }
}

// ============================================================
// SHARE
// ============================================================
window.shareRoll = function(idx) {
  const h = history[idx];
  if (!h) return;
  const text = `${h.expression} = ${h.total} [${h.rolls.join(', ')}]`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelectorAll('.share-btn')[idx];
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
};

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
}

// Check URL hash for shared roll expression
function checkUrlHash() {
  if (location.hash) {
    const expr = decodeURIComponent(location.hash.slice(1));
    document.getElementById('expr-input').value = expr;
    const result = parseAndRoll(expr);
    if (result) {
      displayResult(result.total, result.rolls, result.sides, result.expression, result.dropped);
    }
  }
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  const key = e.key;
  if (key === '1') rollDice(4);
  else if (key === '2') rollDice(6);
  else if (key === '3') rollDice(8);
  else if (key === '4') rollDice(10);
  else if (key === '5') rollDice(12);
  else if (key === '6') rollDice(20);
  else if (key === '7') rollDice(100);
  else if (key === 'a') toggleMode('advantage');
  else if (key === 'd') toggleMode('disadvantage');
  else if (key === 'l') toggleMode('drop-lowest');
});

// Expose for onclick handlers
window.changeQty = changeQty;
window.toggleMode = toggleMode;
window.rollExpression = rollExpression;
window.clearHistory = clearHistory;

// Init
loadHistory();
renderHistory();
checkUrlHash();

})();
</script>
