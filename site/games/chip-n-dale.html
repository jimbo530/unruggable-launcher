  ctx.fillText('Stronger throw', rx, cy + 55);
  ctx.fillText('More knockback', rx, cy + 67);

  // Selection arrow
  const arrowX = selectedChar === 0 ? lx : rx;
  const blink = Math.sin(charSelectBlink * 4) > 0;
  if (blink) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('\u25BC', arrowX, cy - 42);
  }

  // Stat display (PASS 1)
  ctx.fillStyle = '#555566';
  ctx.font = '8px monospace';
  ctx.fillText('STR:' + statB.STR + ' DEX:' + statB.DEX + ' CON:' + statB.CON, GW / 2, GH - 55);
  ctx.fillText('INT:' + statB.INT + ' WIS:' + statB.WIS + ' CHA:' + statB.CHA, GW / 2, GH - 44);

  ctx.fillStyle = '#888888';
  ctx.font = '10px monospace';
  ctx.fillText('< LEFT/RIGHT to choose, JUMP to confirm >', GW / 2, GH - 30);
  ctx.textAlign = 'left';
}

// ============================================================
// DRAWING - VICTORY
// ============================================================
function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 97 + frame * 0.5) % GW;
    const sy = (i * 53) % GH;
    ctx.fillStyle = '#f4b41b';
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.3;
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#ffffff';
  ctx.font = '12px monospace';
  ctx.fillText('The stolen POOP tokens are recovered!', GW / 2, 100);
  ctx.fillText('The Spore King falls. The gardens are safe.', GW / 2, 118);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Final Score: ' + score, GW / 2, 160);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#a855f7';
    ctx.font = 'bold 12px monospace';
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 185);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888888';
  ctx.font = '10px monospace';
  ctx.fillText('POOP collected: ' + totalTokens, GW / 2, 220);
  ctx.fillText('Gardens cleared: 10', GW / 2, 236);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ============================================================
// MAIN DRAW
// ============================================================
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    TAS.ui.drawTitle('BASELING RESCUE RANGERS', 'A Tasern Tale', GW, GH, { frame });
    ctx.fillStyle = '#666';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Arrows=Move  Z=Jump  X=Grab/Throw  Down=Hide', GW / 2, GH * 0.75);
    ctx.fillText('Hurl spore crates at fungal invaders!', GW / 2, GH * 0.80);
    // Selected baseling: name (Base blue) + 5 stat bars + [C] SELECT
    var _sel = window.BaselingPlayer && BaselingPlayer.getSelected ? BaselingPlayer.getSelected() : null;
    ctx.fillStyle = '#0052FF'; ctx.font = 'bold 9px monospace';
    ctx.fillText('[C] ' + (_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, GH - 30);
    if (_sel && _sel.stats && window.BaselingPlayer) {
      var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = GW/2 - 115;
      ctx.font = '7px monospace';
      for (var _i = 0; _i < _keys.length; _i++) {
        var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47, _yy = GH - 20;
        ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _yy);
        ctx.fillStyle = '#222'; ctx.fillRect(_bx, _yy + 3, 40, 4);
        ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _yy + 3, 40 * Math.max(0.04, Math.min(1, _v/200)), 4);
      }
    }
    ctx.textAlign = 'left';
    return;
  }

  if (state === 'charSelect') {
    drawCharSelect();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Zone: ' + ZONES[Math.floor(level / 2)].name + ' | Level: ' + (level + 1) });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  // === GAMEPLAY RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();

  ctx.save();
  ctx.translate(-scrollX, 0);

  drawPlatforms();
  drawHazards();
  drawGoal();
  drawCollectibles();
  drawPowerups();
  drawObjects();
  drawEnemies();
  drawBoss();
  drawPlayer();
  drawProjectiles();

  ctx.restore(); // un-scroll

  TAS.particles.draw();
  ctx.restore(); // un-shake

  TAS.fx.drawFlash(GW, GH);
  drawHUD();
  drawLevelComplete();
  TAS.input.drawTouchControls(GW, GH);
}

// ============================================================
// START
// ============================================================
TAS.loop.start(update, draw);

})();
</script>
<script src="/track.js" defer></script></body>
</html>
