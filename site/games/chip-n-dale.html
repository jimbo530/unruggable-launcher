<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Rescue Rangers</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }

<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>

<script src="baseling-player.js"></script>

<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// ============================================================
// CONSTANTS
// ============================================================
const GW = 480, GH = 320;
const ctx = TAS.ctx;
const GRAVITY = 680;
const THROW_SPEED = 280;
const THROW_ARC = -120;
const PLAYER_SPEED = 120;
const JUMP_FORCE = -300;
const TILE = 16;
const MAX_HP = 2;
const TOKENS_FOR_LIFE = 50;
const INVULN_TIME = 1.5;
const CRATE_HIDE_TIME = 0.3;
const CHARGED_THROW_THRESHOLD = 10; // STR needed for charged throw

// ============================================================
// STAT B SYSTEM (PASS 1)
// ============================================================
const statB = { STR: 8, DEX: 8, CON: 8, INT: 8, WIS: 8, CHA: 8 };

function statMod(val) { return Math.floor((val - 10) / 2); }
function statBonus(val, base) { return Math.floor(base * (1 + statMod(val) * 0.1)); }
function statMultiplier(val) { return 1 + statMod(val) * 0.05; }

// Bridge the shared baseling stats (getMults, ARCADE-STATS.md) onto statB's D&D ability
// scores so every statMod(statB.*) read traces to a clamped getMults() value.
// abScore(): mult 1.0->10, 0.8->6 (mod -2), 1.6->22 (mod +6).
function abScore(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.STR = abScore(m.damage); statB.DEX = abScore(m.moveSpeed); statB.CON = abScore(m.health);
  statB.INT = abScore(m.luck);   statB.WIS = abScore(m.luck);      statB.CHA = abScore(m.luck);
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[chip-n-dale] player init failed:', e && e.message); });
}

// Stat-derived helpers
function getThrowDamage() { return Math.floor(1 + Math.max(0, statMod(statB.STR)) * 0.5); }
function getPlayerSpeed() { return Math.floor(PLAYER_SPEED * (1 + statMod(statB.DEX) * 0.08)); }
function getMaxHP() { return Math.floor(MAX_HP + Math.max(0, statMod(statB.CON))); }
function getStartLives() { return Math.floor(3 + Math.max(0, Math.floor(statMod(statB.CON) * 0.5))); }
function getScoreMultiplier() { return Math.max(1, 1 + statMod(statB.INT) * 0.1); }
function getPickupRadius() { return Math.floor(20 + Math.max(0, statMod(statB.WIS)) * 4); }
function getMagnetRadius() { return Math.floor(80 + Math.max(0, statMod(statB.WIS)) * 8); }
function getDropChance() { return Math.min(0.8, 0.3 + Math.max(0, statMod(statB.CHA)) * 0.06); }
function getPowerupChance() { return Math.min(0.5, 0.2 + Math.max(0, statMod(statB.CHA)) * 0.04); }

function addScore(pts) {
  score += Math.floor(pts * getScoreMultiplier());
}

// ============================================================
// INIT
// ============================================================
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'GRAB' } });

let state = 'charSelect';
let score = 0;
let highScore = TAS.score.load('chipndale_hi');
let lives = 3;
let level = 0;
let frame = 0;
let tokens = 0;
let totalTokens = 0;

// Character selection
let selectedChar = 0; // 0 = Bolt (fast), 1 = Chunk (strong)
let charSelectBlink = 0;

// Player
let player = null;
let scrollX = 0;
let camera = { x: 0, y: 0 };

// Charged throw
let chargeTimer = 0;
let charging = false;
const CHARGE_TIME = 0.6;

// Level data
let platforms = [];
let objects = [];
let enemies = [];
let projectiles = [];
let powerups = [];
let collectibles = [];
let hazards = [];
let levelWidth = 0;
let levelGoalX = 0;
let bossActive = false;
let boss = null;
let levelComplete = false;
let levelCompleteTimer = 0;
let deathTimer = 0;

// Input
const justPressed = {};
const prevKeys = {};
let btnGrabHeld = false;

// NES coyote time + input buffer
let coyoteTime = 0;
const COYOTE_DURATION = 0.08;
let jumpBuffer = 0;
const JUMP_BUFFER_DURATION = 0.1;

// ============================================================
// ZONE DEFINITIONS (PASS 3 - Tasern names + enhanced BGs)
// ============================================================
const ZONES = [
  { name: 'MYCELIAL DOCKS', bg1: '#1a1c2c', bg2: '#22283a', platColor: '#3d4450', accentColor: '#3cacd7',
    bgDetail: 'docks', groundColor: '#2d333b' },
  { name: 'SPORE GARDENS', bg1: '#0f1a0f', bg2: '#162816', platColor: '#2d5a1a', accentColor: '#38d973',
    bgDetail: 'garden', groundColor: '#1a3a0a' },
  { name: 'POOP PIPELINE', bg1: '#1a1c2c', bg2: '#2a2030', platColor: '#7a444a', accentColor: '#3cacd7',
    bgDetail: 'sewer', groundColor: '#3a2025' },
  { name: 'FUNGAL LABS', bg1: '#1a1028', bg2: '#2a1840', platColor: '#443366', accentColor: '#a855f7',
    bgDetail: 'lab', groundColor: '#2a1a40' },
  { name: 'DARK SPORE CORE', bg1: '#2a0a0a', bg2: '#3a1010', platColor: '#7a444a', accentColor: '#e6482e',
    bgDetail: 'fortress', groundColor: '#402010' }
];

// ============================================================
// LEVEL GENERATOR
// ============================================================
function generateLevel(lvl) {
  platforms = [];
  objects = [];
  enemies = [];
  projectiles = [];
  powerups = [];
  collectibles = [];
  hazards = [];
  bossActive = false;
  boss = null;
  levelComplete = false;
  levelCompleteTimer = 0;

  const zone = Math.floor(lvl / 2);
  const isBossLevel = lvl % 2 === 1;
  levelWidth = isBossLevel ? 800 : 1600 + lvl * 200;
  levelGoalX = levelWidth - 60;

  // Ground
  platforms.push({ x: 0, y: GH - 32, w: levelWidth, h: 32, type: 'ground' });

  // Generate platforms
  const numPlats = isBossLevel ? 6 : 12 + lvl * 2;
  for (let i = 0; i < numPlats; i++) {
    const px = 100 + (i / numPlats) * (levelWidth - 200);
    const py = GH - 80 - Math.random() * 140;
    const pw = 48 + Math.random() * 80;
    platforms.push({ x: px, y: py, w: pw, h: 12, type: 'platform' });
  }

  // Vertical sections
  if (!isBossLevel) {
    for (let i = 0; i < 3 + zone; i++) {
      const sx = 200 + i * (levelWidth / (4 + zone));
      platforms.push({ x: sx, y: GH - 160, w: 64, h: 12, type: 'platform' });
      platforms.push({ x: sx + 40, y: GH - 220, w: 64, h: 12, type: 'platform' });
    }
  }

  // Objects (Tasern items)
  const numObjects = isBossLevel ? 4 : 8 + lvl;
  for (let i = 0; i < numObjects; i++) {
    const ox = 80 + (i / numObjects) * (levelWidth - 160);
    const otype = pickObjectType(zone);
    objects.push(createObject(otype, ox, GH - 48));
  }

  // Place objects on platforms
  for (let i = 1; i < platforms.length; i += 3) {
    if (Math.random() > 0.4) {
      const p = platforms[i];
      const otype = pickObjectType(zone);
      objects.push(createObject(otype, p.x + p.w / 2 - 8, p.y - 18));
    }
  }

  // Enemies (Tasern themed)
  if (!isBossLevel) {
    const numEnemies = 5 + lvl * 2;
    for (let i = 0; i < numEnemies; i++) {
      const ex = 200 + (i / numEnemies) * (levelWidth - 300);
      const etype = pickEnemyType(zone);
      enemies.push(createEnemy(etype, ex, GH - 50));
    }
  }

  // Hazards (goo puddles, spore clouds) - PASS 2
  if (!isBossLevel) {
    const numHazards = 2 + zone;
    for (let i = 0; i < numHazards; i++) {
      const hx = 150 + (i / numHazards) * (levelWidth - 300);
      const htype = zone >= 2 ? (Math.random() > 0.5 ? 'goo' : 'spore') : 'goo';
      hazards.push(createHazard(htype, hx, GH - 36));
    }
  }

  // Collectible tokens
  const numTokens = 50;
  for (let i = 0; i < numTokens; i++) {
    const tx = 60 + (i / numTokens) * (levelWidth - 120);
    const ty = GH - 60 - Math.random() * 180;
    collectibles.push({ x: tx, y: ty, w: 10, h: 10, type: 'token', collected: false, bobOffset: Math.random() * Math.PI * 2 });
  }

  // Hidden diamonds (5 per level)
  for (let i = 0; i < 5; i++) {
    const dx = 100 + Math.random() * (levelWidth - 200);
    const dy = GH - 200 - Math.random() * 60;
    collectibles.push({ x: dx, y: dy, w: 12, h: 12, type: 'diamond', collected: false, bobOffset: Math.random() * Math.PI * 2 });
  }

  // Power-ups (CHA affects spawn chance)
  if (Math.random() < getPowerupChance() + 0.3) {
    const ppx = 300 + Math.random() * (levelWidth - 600);
    powerups.push({ x: ppx, y: GH - 60, w: 14, h: 14, type: pickPowerup(), collected: false, vy: 0, grounded: true });
  }

  // Boss level
  if (isBossLevel) {
    boss = createBoss(zone, levelWidth - 150, GH - 80);
    bossActive = true;
    for (let i = 0; i < 2 + zone; i++) {
      enemies.push(createEnemy('spore_minion', 200 + i * 120, GH - 50));
    }
  }
}

function pickObjectType(zone) {
  const types = ['myco_acorn', 'myco_acorn', 'reactor_nut', 'lp_cheese'];
  if (zone >= 2) types.push('spore_bomb');
  if (zone >= 3) types.push('steel');
  return types[Math.floor(Math.random() * types.length)];
}

function pickEnemyType(zone) {
  const pool = ['reactor_mouse', 'reactor_mouse'];
  if (zone >= 1) pool.push('mycelial_cat', 'mycelial_cat');
  if (zone >= 2) pool.push('spore_beetle');
  if (zone >= 3) pool.push('yield_drone');
  if (zone >= 4) pool.push('yield_drone', 'mycelial_cat');
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickPowerup() {
  const types = ['speed', 'hat', 'magnet', 'star'];
  return types[Math.floor(Math.random() * types.length)];
}

// ============================================================
// HAZARD FACTORY (PASS 2)
// ============================================================
function createHazard(type, x, y) {
  return {
    x: x, y: y,
    w: type === 'goo' ? 40 : 30,
    h: type === 'goo' ? 6 : 24,
    type: type, // 'goo' = slow puddle, 'spore' = damage cloud
    active: true,
    timer: type === 'spore' ? (2 + Math.random() * 3) : 0,
    phase: Math.random() * Math.PI * 2,
    particles: []
  };
}

// ============================================================
// OBJECT FACTORY (PASS 2 - Tasern items)
// ============================================================
function createObject(type, x, y) {
  return {
    x: x, y: y, w: 16, h: 16,
    vx: 0, vy: 0,
    type: type, // myco_acorn, reactor_nut, steel, lp_cheese, spore_bomb
    alive: true,
    held: false,
    thrown: false,
    grounded: true,
    bounces: type === 'steel' ? 3 : (type === 'reactor_nut' ? 2 : 0),
    fuseTimer: type === 'spore_bomb' ? -1 : 0,
    hasPowerup: type === 'myco_acorn' && Math.random() < getPowerupChance(),
    hideTimer: 0,
    canHide: type === 'myco_acorn',
    isCharged: false
  };
}

// ============================================================
// ENEMY FACTORY (PASS 2 - Tasern enemies)
// ============================================================
function createEnemy(type, x, y) {
  let hp = 1, speed = 40, w = 18, h = 22, color = '#aa4444';
  let behavior = 'patrol';
  let attackCooldown = 0;
  let jumpForce = 0;

  switch(type) {
    case 'reactor_mouse':
      hp = 1; speed = 35 + Math.random() * 20; color = '#7a444a'; behavior = 'patrol';
      break;
    case 'mycelial_cat':
      hp = 1; speed = 50; color = '#a855f7'; behavior = 'pounce'; jumpForce = -250; w = 20; h = 24;
      break;
    case 'spore_beetle':
      hp = 2; speed = 30; color = '#38d973'; behavior = 'swoop'; y -= 80; w = 22; h = 18;
      break;
    case 'yield_drone':
      hp = 2; speed = 25; color = '#3cacd7'; behavior = 'patrol'; w = 22; h = 26;
      break;
    case 'spore_minion':
      hp = 1; speed = 45; color = '#38d973'; behavior = 'chase';
      break;
  }

  return {
    x: x, y: y, w: w, h: h, vx: speed * (Math.random() > 0.5 ? 1 : -1), vy: 0,
    type: type, hp: hp, maxHp: hp, speed: speed, color: color, behavior: behavior,
    alive: true, stunned: false, stunTimer: 0,
    held: false, thrown: false,
    dir: 1, attackCooldown: attackCooldown, jumpForce: jumpForce,
    swoopBaseY: y, swoopPhase: Math.random() * Math.PI * 2,
    grounded: type !== 'spore_beetle',
    patrolDist: 80 + Math.random() * 100,
    startX: x,
    animFrame: 0,
    trailTimer: 0
  };
}

// ============================================================
// BOSS FACTORY (PASS 2 - Enhanced Tasern bosses)
// ============================================================
function createBoss(zone, x, y) {
  const bossData = [
    { name: 'MOLD OVERLORD', hp: 8, color: '#7a444a', speed: 30, pattern: 'throw', w: 36, h: 40,
      desc: 'Fungal tyrant of the Mycelial Docks' },
    { name: 'TOXIC BLOOM', hp: 10, color: '#38d973', speed: 40, pattern: 'jump', w: 32, h: 38,
      desc: 'Corrupted guardian of the Spore Gardens' },
    { name: 'SLUDGE BEAST', hp: 12, color: '#3cacd7', speed: 35, pattern: 'charge', w: 40, h: 36,
      desc: 'Born from the depths of the POOP Pipeline' },
    { name: 'MYCO SURGEON', hp: 14, color: '#a855f7', speed: 45, pattern: 'summon', w: 30, h: 38,
      desc: 'Mad mycologist of the Fungal Labs' },
    { name: 'SPORE KING', hp: 18, color: '#e6482e', speed: 50, pattern: 'multi', w: 38, h: 42,
      desc: 'The heart of the fungal invasion' }
  ];
  const bd = bossData[zone];
  return {
    x: x, y: y, w: bd.w, h: bd.h,
    vx: 0, vy: 0,
    name: bd.name, desc: bd.desc,
    hp: bd.hp, maxHp: bd.hp,
    color: bd.color, speed: bd.speed,
    pattern: bd.pattern,
    alive: true, dir: -1,
    phase: 0, phaseTimer: 0,
    attackTimer: 2,
    grounded: true,
    flashTimer: 0, stunTimer: 0,
    enragePhase: false
  };
}

// ============================================================
// PLAYER
// ============================================================
function createPlayer(charType) {
  const isStrong = charType === 1;
  const dexSpeed = getPlayerSpeed();
  return {
    x: 40, y: GH - 64,
    w: 14, h: 22,
    vx: 0, vy: 0,
    dir: 1,
    speed: isStrong ? Math.floor(dexSpeed * 0.92) : Math.floor(dexSpeed * 1.12),
    throwPower: isStrong ? 1.4 : 1.0,
    grounded: false,
    hp: getMaxHP(),
    maxHp: getMaxHP(),
    invulnTimer: 0,
    holding: null,
    hiding: false,
    hideObj: null,
    powerup: null,
    powerupTimer: 0,
    hatActive: false,
    animFrame: 0,
    charType: charType,
    wasGrounded: false,
    dustTimer: 0
  };
}

function initPlayer() {
  player = createPlayer(selectedChar);
  player.x = 40;
  player.y = GH - 64;
  chargeTimer = 0;
  charging = false;
}

// ============================================================
// GAME STATE MANAGEMENT
// ============================================================
function startGame() {
  score = 0;
  lives = getStartLives();
  level = 0;
  tokens = 0;
  totalTokens = 0;
  startLevel();
}

function startLevel() {
  generateLevel(level);
  initPlayer();
  scrollX = 0;
  deathTimer = 0;
  coyoteTime = 0;
  jumpBuffer = 0;
  TAS.particles.clear();
}

function nextLevel() {
  level++;
  if (level >= 10) {
    state = 'victory';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('chipndale_hi', highScore);
    }
    return;
  }
  startLevel();
}

function playerDie() {
  lives--;
  TAS.fx.shake(10, 0.93);
  TAS.fx.flash('#e6482e', 0.5);
  TAS.audio.playTone(200, 0.4, 'sawtooth', 0.15, 80);
  TAS.particles.spawn(player.x + 7, player.y + 11, '#e6482e', 25, 5, { gravity: 2, size: 3 });
  TAS.particles.spawn(player.x + 7, player.y + 11, '#ffffff', 10, 3, { gravity: -1, size: 2 });

  if (lives <= 0) {
    state = 'gameOver';
    if (score > highScore) {
      highScore = score;
      TAS.score.save('chipndale_hi', highScore);
    }
  } else {
    deathTimer = 1.5;
    setTimeout(function() {
      if (state === 'playing') {
        initPlayer();
        player.invulnTimer = INVULN_TIME;
      }
    }, 1500);
  }
}

// ============================================================
// INPUT HANDLING (PASS 3 - NES feel with buffer + coyote)
// ============================================================
function updateInput() {
  const k = TAS.input.keys;
  const t = TAS.input.touch;
  for (const key of ['a', 'b', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'KeyZ', 'KeyX', 'Space']) {
    justPressed[key] = (k[key] || false) && !prevKeys[key];
    prevKeys[key] = k[key] || false;
  }
  justPressed['touchA'] = t.a && !prevKeys['touchA'];
  justPressed['touchB'] = t.b && !prevKeys['touchB'];
  prevKeys['touchA'] = t.a;
  prevKeys['touchB'] = t.b;

  // Track grab held state for charged throw
  btnGrabHeld = TAS.input.keys['KeyX'] || TAS.input.touch.b || TAS.input.keys['b'];
}

function btnJump() { return justPressed['KeyZ'] || justPressed['Space'] || justPressed['ArrowUp'] || justPressed['touchA'] || justPressed['a']; }
function btnGrab() { return justPressed['KeyX'] || justPressed['touchB'] || justPressed['b']; }
function moveLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.touch.left; }
function moveRight() { return TAS.input.keys['ArrowRight'] || TAS.input.touch.right; }
function moveDown() { return TAS.input.keys['ArrowDown'] || TAS.input.touch.down; }

// ============================================================
// PHYSICS & COLLISION
// ============================================================
function applyGravity(obj, dt) {
  if (!obj.grounded) {
    obj.vy += GRAVITY * dt;
  }
}

function resolveCollision(obj) {
  obj.grounded = false;
  for (const p of platforms) {
    if (obj.x + obj.w > p.x && obj.x < p.x + p.w) {
      if (obj.vy >= 0 && obj.y + obj.h > p.y && obj.y + obj.h < p.y + p.h + obj.vy * 0.02 + 8) {
        obj.y = p.y - obj.h;
        obj.vy = 0;
        obj.grounded = true;
      }
    }
  }
  if (obj.x < 0) obj.x = 0;
  if (obj.x + obj.w > levelWidth) obj.x = levelWidth - obj.w;
}

// ============================================================
// PLAYER UPDATE
// ============================================================
function updatePlayer(dt) {
  if (!player || deathTimer > 0) {
    deathTimer -= dt;
    return;
  }

  // Coyote time tracking (PASS 3)
  if (player.grounded) {
    coyoteTime = COYOTE_DURATION;
    player.wasGrounded = true;
  } else {
    coyoteTime -= dt;
  }

  // Jump buffer (PASS 3)
  if (btnJump()) {
    jumpBuffer = JUMP_BUFFER_DURATION;
  } else {
    jumpBuffer -= dt;
  }

  // Hiding
  if (player.hiding) {
    if (btnJump() || btnGrab()) {
      player.hiding = false;
      player.hideObj = null;
      for (const e of enemies) {
        if (e.alive && !e.stunned && TAS.math.dist(player.x, player.y, e.x, e.y) < 40) {
          stunEnemy(e);
          addScore(50);
          TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#f4b41b', 10, 3);
          TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ffffff', 5, 2);
          TAS.audio.playTone(600, 0.15, 'square', 0.12);
        }
      }
    }
    return;
  }

  // Movement (DEX affects speed)
  let moveX = 0;
  if (moveLeft()) { moveX = -1; player.dir = -1; }
  if (moveRight()) { moveX = 1; player.dir = 1; }

  let spd = player.speed;
  if (player.powerup === 'speed') spd = Math.floor(spd * 1.5);
  if (player.holding) spd = Math.floor(spd * 0.8);

  // Check goo hazards (slow effect)
  let inGoo = false;
  for (const h of hazards) {
    if (h.active && h.type === 'goo') {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y, h.w, h.h)) {
        spd = Math.floor(spd * 0.5);
        inGoo = true;
      }
    }
  }

  player.vx = moveX * spd;
  player.x += player.vx * dt;
  player.animFrame += Math.abs(player.vx) * dt * 0.1;

  // Landing dust (PASS 3)
  if (player.grounded && !player.wasGrounded) {
    TAS.particles.spawn(player.x + 7, player.y + player.h, '#8a7a6a', 4, 2, { gravity: 1, size: 2, sizeVar: 1 });
    if (Math.abs(player.vy) > 200) {
      TAS.fx.shake(2, 0.85);
    }
  }
  player.wasGrounded = player.grounded;

  // Running dust (PASS 3)
  player.dustTimer -= dt;
  if (player.grounded && Math.abs(player.vx) > 80 && player.dustTimer <= 0) {
    player.dustTimer = 0.15;
    TAS.particles.spawn(player.x + 7 - player.dir * 4, player.y + player.h, '#6a5a4a', 2, 1, { gravity: 0.5, size: 1 });
  }

  // Jump with coyote time + buffer (PASS 3)
  if (jumpBuffer > 0 && coyoteTime > 0) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    coyoteTime = 0;
    jumpBuffer = 0;
    TAS.audio.playTone(400, 0.08, 'square', 0.08, 600);
    TAS.particles.spawn(player.x + 7, player.y + player.h, '#aaaaaa', 3, 1, { gravity: 1, size: 2 });
  }

  // Variable jump height (PASS 3) - release jump early for short hop
  if (!player.grounded && player.vy < -100 && !(TAS.input.keys['KeyZ'] || TAS.input.keys['Space'] || TAS.input.keys['ArrowUp'] || TAS.input.touch.a || TAS.input.keys['a'])) {
    player.vy *= 0.85;
  }

  // Gravity
  applyGravity(player, dt);
  player.y += player.vy * dt;
  resolveCollision(player);

  // Charged throw system (PASS 2 - STR >= CHARGED_THROW_THRESHOLD)
  if (statB.STR >= CHARGED_THROW_THRESHOLD && player.holding && btnGrabHeld) {
    chargeTimer += dt;
    charging = true;
    if (chargeTimer > CHARGE_TIME) chargeTimer = CHARGE_TIME;
  }

  // Grab/Throw
  if (btnGrab()) {
    if (player.holding) {
      throwHeld();
    } else {
      tryGrab();
    }
  }

  // Release charge throw on button release
  if (charging && !btnGrabHeld && player.holding) {
    throwHeld();
  }

  // Hide in acorn crate (press down near one)
  if (moveDown() && player.grounded && !player.holding) {
    for (const obj of objects) {
      if (obj.alive && obj.canHide && !obj.held && !obj.thrown) {
        if (TAS.math.dist(player.x + 7, player.y + 11, obj.x + 8, obj.y + 8) < 24) {
          player.hiding = true;
          player.hideObj = obj;
          player.x = obj.x - 1;
          player.y = obj.y - 6;
          TAS.audio.playTone(200, 0.1, 'triangle', 0.06);
          break;
        }
      }
    }
  }

  // Powerup timer
  if (player.powerup && player.powerup !== 'hat') {
    player.powerupTimer -= dt;
    if (player.powerupTimer <= 0) {
      player.powerup = null;
    }
  }

  // Magnet - WIS affects radius
  if (player.powerup === 'magnet') {
    const magR = getMagnetRadius();
    for (const c of collectibles) {
      if (!c.collected && c.type === 'token') {
        const d = TAS.math.dist(player.x + 7, player.y + 11, c.x + 5, c.y + 5);
        if (d < magR) {
          const pullSpeed = 3 + Math.max(0, statMod(statB.WIS)) * 0.5;
          c.x += (player.x + 7 - c.x) * pullSpeed * dt;
          c.y += (player.y + 11 - c.y) * pullSpeed * dt;
        }
      }
    }
  }

  // Invulnerability
  if (player.invulnTimer > 0) player.invulnTimer -= dt;

  // Update held object position
  if (player.holding) {
    player.holding.x = player.x + player.dir * 10;
    player.holding.y = player.y - 10;
  }

  // Camera
  const targetX = player.x - GW / 3;
  scrollX = TAS.math.lerp(scrollX, TAS.math.clamp(targetX, 0, Math.max(0, levelWidth - GW)), dt * 4);
}

// ============================================================
// GRAB & THROW
// ============================================================
function tryGrab() {
  const grabR = getPickupRadius();
  // Try to grab an object (WIS affects pickup radius)
  for (const obj of objects) {
    if (obj.alive && !obj.held && !obj.thrown) {
      if (TAS.math.dist(player.x + 7, player.y + 11, obj.x + 8, obj.y + 8) < grabR + 8) {
        obj.held = true;
        player.holding = obj;
        chargeTimer = 0;
        charging = false;
        TAS.audio.playTone(300, 0.06, 'square', 0.06);
        return;
      }
    }
  }
  // Try to grab a stunned enemy
  for (const e of enemies) {
    if (e.alive && e.stunned && !e.held) {
      if (TAS.math.dist(player.x + 7, player.y + 11, e.x + e.w/2, e.y + e.h/2) < grabR + 10) {
        e.held = true;
        player.holding = e;
        chargeTimer = 0;
        charging = false;
        TAS.audio.playTone(350, 0.08, 'square', 0.08);
        return;
      }
    }
  }
}

function throwHeld() {
  const held = player.holding;
  if (!held) return;

  held.held = false;
  held.thrown = true;
  held.grounded = false;

  let power = player.throwPower;

  // Charged throw (PASS 2) - STR >= 10 enables it
  if (charging && chargeTimer >= CHARGE_TIME * 0.8) {
    power *= 1.6;
    held.isCharged = true;
    TAS.fx.shake(4, 0.9);
    TAS.particles.spawn(player.x + player.dir * 12, player.y - 5, '#f4b41b', 8, 3, { gravity: -1, size: 2 });
    TAS.audio.playTone(600, 0.15, 'sawtooth', 0.12, 200);
  }

  // STR affects throw speed
  const strMult = 1 + Math.max(0, statMod(statB.STR)) * 0.1;
  held.vx = Math.floor(player.dir * THROW_SPEED * power * strMult);
  held.vy = Math.floor(THROW_ARC * power);

  // Bomb fuse starts on throw
  if (held.fuseTimer === -1) held.fuseTimer = 2.0;

  player.holding = null;
  charging = false;
  chargeTimer = 0;
  TAS.audio.playTone(500, 0.1, 'sawtooth', 0.1, 300);
  TAS.fx.shake(2, 0.9);
}

// ============================================================
// OBJECT UPDATE
// ============================================================
function updateObjects(dt) {
  for (const obj of objects) {
    if (!obj.alive || obj.held) continue;

    if (obj.thrown) {
      applyGravity(obj, dt);
      obj.x += obj.vx * dt;
      obj.y += obj.vy * dt;

      // Charged throw trail (PASS 2)
      if (obj.isCharged) {
        TAS.particles.spawn(obj.x + 8, obj.y + 8, '#f4b41b', 1, 1, { gravity: 0, size: 2 });
      }

      // Check enemy collision - STR affects damage
      for (const e of enemies) {
        if (e.alive && !e.held && TAS.hit.rectOverlap(obj.x, obj.y, obj.w, obj.h, e.x, e.y, e.w, e.h)) {
          hitEnemy(e, obj);
          if (obj.type !== 'steel' && obj.type !== 'reactor_nut') {
            destroyObject(obj);
          }
        }
      }

      // Boss collision
      if (boss && boss.alive && TAS.hit.rectOverlap(obj.x, obj.y, obj.w, obj.h, boss.x, boss.y, boss.w, boss.h)) {
        hitBoss(obj);
        if (obj.type !== 'steel') destroyObject(obj);
      }

      // Ground/wall bounce or destroy
      let hitSurface = false;
      for (const p of platforms) {
        if (TAS.hit.rectOverlap(obj.x, obj.y, obj.w, obj.h, p.x, p.y, p.w, p.h)) {
          hitSurface = true;
          break;
        }
      }
      if (hitSurface || obj.y > GH - 16) {
        if (obj.bounces > 0) {
          obj.bounces--;
          obj.vy = -Math.abs(obj.vy) * 0.7;
          obj.vx *= 0.8;
          if (obj.y > GH - 16) obj.y = GH - 32;
          TAS.audio.playTone(200, 0.05, 'triangle', 0.05);
          TAS.particles.spawn(obj.x + 8, obj.y + 16, '#aaaaaa', 3, 1, { gravity: 1, size: 1 });
        } else {
          destroyObject(obj);
        }
      }

      // Out of bounds
      if (obj.x < -50 || obj.x > levelWidth + 50 || obj.y > GH + 50) {
        obj.alive = false;
      }
    }

    // Spore bomb fuse
    if (obj.type === 'spore_bomb' && obj.fuseTimer > 0) {
      obj.fuseTimer -= dt;
      if (obj.fuseTimer <= 0) {
        explodeBomb(obj);
      }
    }
  }
}

function destroyObject(obj) {
  obj.alive = false;
  const cx = obj.x + obj.w / 2;
  const cy = obj.y + obj.h / 2;

  if (obj.type === 'myco_acorn') {
    TAS.particles.spawn(cx, cy, '#7a444a', 14, 3, { gravity: 3, shape: 'rect', size: 3, sizeVar: 3 });
    TAS.particles.spawn(cx, cy, '#a855f7', 6, 2, { gravity: 2, size: 2 });
    TAS.fx.shake(4, 0.88);
    TAS.audio.playNoise(0.15, 0.1, 800);
    if (obj.hasPowerup) {
      const ptype = pickPowerup();
      powerups.push({ x: cx - 7, y: cy - 7, w: 14, h: 14, type: ptype, collected: false, vy: -100, grounded: false });
    }
  } else if (obj.type === 'lp_cheese') {
    TAS.particles.spawn(cx, cy, '#f4b41b', 10, 3, { gravity: 2, size: 2 });
    TAS.particles.spawn(cx, cy, '#ffd04e', 6, 2, { gravity: 2, size: 2 });
    TAS.fx.shake(3, 0.9);
    TAS.audio.playTone(150, 0.12, 'sawtooth', 0.08);
    // Splash damage (like old apple)
    for (const e of enemies) {
      if (e.alive && TAS.math.dist(cx, cy, e.x + e.w/2, e.y + e.h/2) < 40) {
        hitEnemy(e, obj);
      }
    }
  } else {
    TAS.particles.spawn(cx, cy, '#aaaaaa', 8, 2, { gravity: 2, size: 2 });
    TAS.fx.shake(3, 0.9);
    TAS.audio.playTone(180, 0.08, 'square', 0.06);
  }
}

function explodeBomb(obj) {
  obj.alive = false;
  const cx = obj.x + obj.w / 2;
  const cy = obj.y + obj.h / 2;
  TAS.particles.spawn(cx, cy, '#38d973', 25, 5, { gravity: 1, size: 4, sizeVar: 4 });
  TAS.particles.spawn(cx, cy, '#6aee8a', 15, 4, { gravity: -1, size: 3 });
  TAS.particles.spawn(cx, cy, '#1a4a2a', 10, 3, { gravity: 0.5, size: 5 });
  TAS.fx.shake(8, 0.92);
  TAS.fx.flash('#38d973', 0.3);
  TAS.audio.playNoise(0.3, 0.15, 400);
  TAS.audio.playTone(100, 0.3, 'sawtooth', 0.12, 40);

  for (const e of enemies) {
    if (e.alive && TAS.math.dist(cx, cy, e.x + e.w/2, e.y + e.h/2) < 60) {
      hitEnemy(e, obj);
    }
  }
  if (boss && boss.alive && TAS.math.dist(cx, cy, boss.x + boss.w/2, boss.y + boss.h/2) < 70) {
    hitBoss(obj);
  }
  if (player && TAS.math.dist(cx, cy, player.x + 7, player.y + 11) < 50) {
    damagePlayer();
  }
}

// ============================================================
// HAZARD UPDATE (PASS 2)
// ============================================================
function updateHazards(dt) {
  for (const h of hazards) {
    if (!h.active) continue;
    h.phase += dt * 2;

    if (h.type === 'spore') {
      h.timer -= dt;
      // Spore cloud pulses - active/inactive
      if (h.timer <= 0) {
        h.timer = 2 + Math.random() * 2;
      }
      const isActive = Math.sin(h.phase) > 0;
      // Spore particles
      if (isActive && Math.random() > 0.7) {
        TAS.particles.spawn(h.x + Math.random() * h.w, h.y - Math.random() * h.h, '#38d973', 1, 1, { gravity: -0.5, size: 2 });
      }
      // Damage player in spore cloud
      if (isActive && player && !player.hiding && player.invulnTimer <= 0) {
        if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y - h.h, h.w, h.h)) {
          damagePlayer();
        }
      }
    }
    // Goo: just visual update, slow is handled in player movement
  }
}

// ============================================================
// ENEMY UPDATE
// ============================================================
function updateEnemies(dt) {
  for (const e of enemies) {
    if (!e.alive || e.held) continue;

    if (e.stunned) {
      e.stunTimer -= dt;
      if (e.stunTimer <= 0) {
        e.stunned = false;
      }
      if (e.thrown) {
        applyGravity(e, dt);
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        for (const other of enemies) {
          if (other !== e && other.alive && !other.stunned && TAS.hit.rectOverlap(e.x, e.y, e.w, e.h, other.x, other.y, other.w, other.h)) {
            stunEnemy(other);
            addScore(100);
            TAS.particles.spawn(other.x + other.w/2, other.y + other.h/2, '#f4b41b', 10, 3);
            e.thrown = false;
            e.vx = 0;
          }
        }
        if (boss && boss.alive && TAS.hit.rectOverlap(e.x, e.y, e.w, e.h, boss.x, boss.y, boss.w, boss.h)) {
          hitBoss(e);
          e.alive = false;
        }
        if (e.y > GH - 32) {
          e.y = GH - 32 - e.h;
          e.thrown = false;
          e.vy = 0;
          e.vx = 0;
        }
      }
      continue;
    }

    e.animFrame += dt * 4;
    e.trailTimer -= dt;

    // Enemy trail particles (PASS 3)
    if (e.trailTimer <= 0 && Math.abs(e.vx) > 20) {
      e.trailTimer = 0.3;
      if (e.type === 'spore_beetle') {
        TAS.particles.spawn(e.x + e.w/2, e.y + e.h, '#38d973', 1, 0.5, { gravity: 0.3, size: 1 });
      }
    }

    switch (e.behavior) {
      case 'patrol':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx = -e.vx;
          e.dir = e.vx > 0 ? 1 : -1;
        }
        break;

      case 'chase':
        if (player && !player.hiding) {
          const dx = player.x - e.x;
          e.vx = Math.sign(dx) * e.speed;
          e.dir = Math.sign(dx);
        }
        e.x += e.vx * dt;
        break;

      case 'pounce':
        e.x += e.vx * dt;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx = -e.vx;
          e.dir = e.vx > 0 ? 1 : -1;
        }
        if (player && !player.hiding && e.grounded) {
          const dist = TAS.math.dist(e.x, e.y, player.x, player.y);
          if (dist < 80 && dist > 20) {
            e.vy = e.jumpForce;
            e.grounded = false;
            e.vx = Math.sign(player.x - e.x) * e.speed * 1.5;
            TAS.particles.spawn(e.x + e.w/2, e.y + e.h, '#a855f7', 3, 1, { gravity: 1, size: 2 });
          }
        }
        break;

      case 'swoop':
        e.swoopPhase += dt * 2;
        e.x += e.vx * dt;
        e.y = e.swoopBaseY + Math.sin(e.swoopPhase) * 40;
        if (Math.abs(e.x - e.startX) > e.patrolDist) {
          e.vx = -e.vx;
          e.dir = e.vx > 0 ? 1 : -1;
        }
        if (player && !player.hiding) {
          const dx = player.x - e.x;
          const dy = player.y - e.y;
          if (Math.abs(dx) < 40 && dy > 0 && dy < 100) {
            e.y += 80 * dt;
          }
        }
        break;
    }

    // Non-flying gravity
    if (e.behavior !== 'swoop') {
      applyGravity(e, dt);
      e.y += e.vy * dt;
      resolveCollision(e);
    }

    // Damage player
    if (player && !player.hiding && player.invulnTimer <= 0 && !e.stunned) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        damagePlayer();
      }
    }
  }
}

function stunEnemy(e) {
  e.stunned = true;
  e.stunTimer = 4.0;
  e.vx = 0;
  TAS.audio.playTone(250, 0.1, 'square', 0.08);
  TAS.particles.spawn(e.x + e.w/2, e.y, '#ffd04e', 4, 2, { gravity: -0.5, size: 2 });
}

function hitEnemy(e, projectile) {
  const dmg = getThrowDamage() + (projectile.isCharged ? 1 : 0);
  e.hp -= dmg;
  if (e.hp <= 0) {
    killEnemy(e);
  } else {
    stunEnemy(e);
  }
  TAS.fx.shake(3, 0.88);
  addScore(50);
}

function killEnemy(e) {
  e.alive = false;
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, e.color, 14, 3, { gravity: 3, size: 2, sizeVar: 2 });
  TAS.particles.spawn(e.x + e.w/2, e.y + e.h/2, '#ffffff', 6, 2, { gravity: -1, size: 2 });
  TAS.audio.playTone(150, 0.15, 'sawtooth', 0.1, 80);
  addScore(100);

  // CHA affects drop chance
  if (Math.random() < getDropChance()) {
    for (let i = 0; i < 3; i++) {
      collectibles.push({
        x: e.x + e.w/2 - 5 + (i - 1) * 12,
        y: e.y,
        w: 10, h: 10,
        type: 'token', collected: false,
        bobOffset: Math.random() * Math.PI * 2
      });
    }
  }

  // CHA rare diamond drop
  if (Math.random() < Math.max(0, statMod(statB.CHA)) * 0.03) {
    collectibles.push({
      x: e.x + e.w/2 - 6, y: e.y - 5,
      w: 12, h: 12,
      type: 'diamond', collected: false,
      bobOffset: Math.random() * Math.PI * 2
    });
  }
}

// ============================================================
// BOSS UPDATE (PASS 2 - Enhanced with enrage)
// ============================================================
function updateBoss(dt) {
  if (!boss || !boss.alive) return;

  boss.phaseTimer += dt;
  boss.attackTimer -= dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;
  if (boss.stunTimer > 0) {
    boss.stunTimer -= dt;
    return;
  }

  // Enrage at 30% hp (PASS 2)
  if (!boss.enragePhase && boss.hp <= Math.floor(boss.maxHp * 0.3)) {
    boss.enragePhase = true;
    boss.speed = Math.floor(boss.speed * 1.4);
    TAS.fx.shake(6, 0.92);
    TAS.fx.flash('#e6482e', 0.4);
    TAS.audio.playTone(80, 0.4, 'sawtooth', 0.15, 40);
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#e6482e', 20, 5, { gravity: -1, size: 3 });
  }

  // Movement
  if (player) {
    const dx = player.x - boss.x;
    boss.dir = dx > 0 ? 1 : -1;
    const atkSpeedMult = boss.enragePhase ? 0.7 : 1.0;

    switch (boss.pattern) {
      case 'throw':
        boss.x += boss.dir * boss.speed * 0.3 * dt;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 2.5 * atkSpeedMult;
          spawnBossProjectile();
          if (boss.enragePhase) spawnBossProjectile();
        }
        break;

      case 'jump':
        boss.x += boss.dir * boss.speed * 0.5 * dt;
        if (boss.attackTimer <= 0 && boss.grounded) {
          boss.attackTimer = 2.0 * atkSpeedMult;
          boss.vy = -350;
          boss.grounded = false;
          TAS.fx.shake(3, 0.88);
        }
        break;

      case 'charge':
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 3.0 * atkSpeedMult;
          boss.vx = boss.dir * boss.speed * 4;
          TAS.audio.playTone(120, 0.2, 'sawtooth', 0.1);
          TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, boss.color, 8, 3);
        }
        boss.x += boss.vx * dt;
        boss.vx *= 0.95;
        break;

      case 'summon':
        boss.x += boss.dir * boss.speed * 0.4 * dt;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 4.0 * atkSpeedMult;
          spawnBossProjectile();
          if (enemies.filter(function(e){ return e.alive; }).length < 4) {
            enemies.push(createEnemy('spore_minion', boss.x + boss.dir * 40, boss.y));
            TAS.particles.spawn(boss.x + boss.dir * 40, boss.y, '#38d973', 8, 3);
          }
        }
        break;

      case 'multi':
        boss.x += boss.dir * boss.speed * 0.5 * dt;
        if (boss.attackTimer <= 0) {
          boss.attackTimer = 1.8 * atkSpeedMult;
          spawnBossProjectile();
          spawnBossProjectile();
          if (boss.enragePhase) spawnBossProjectile();
          if (Math.random() > 0.5 && boss.grounded) {
            boss.vy = -300;
            boss.grounded = false;
          }
        }
        break;
    }
  }

  // Boss gravity
  applyGravity(boss, dt);
  boss.y += boss.vy * dt;
  boss.grounded = false;
  if (boss.y + boss.h > GH - 32) {
    boss.y = GH - 32 - boss.h;
    boss.vy = 0;
    boss.grounded = true;
    // Ground pound shake on landing (PASS 3)
    if (boss.pattern === 'jump') {
      TAS.fx.shake(4, 0.9);
      TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h, '#888888', 6, 2, { gravity: 1, size: 2 });
    }
  }
  boss.x = TAS.math.clamp(boss.x, 50, levelWidth - 50);

  // Contact damage
  if (player && !player.hiding && player.invulnTimer <= 0) {
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
      damagePlayer();
    }
  }
}

function spawnBossProjectile() {
  if (!boss || !player) return;
  const px = boss.x + boss.w / 2;
  const py = boss.y + boss.h / 2;
  const angle = TAS.math.angle(px, py, player.x + 7, player.y + 11);
  const speed = 150 + level * 10;
  projectiles.push({
    x: px, y: py, w: 10, h: 10,
    vx: Math.floor(Math.cos(angle) * speed),
    vy: Math.floor(Math.sin(angle) * speed),
    alive: true,
    catchable: true,
    color: boss.color,
    fromBoss: true
  });
  TAS.audio.playTone(180, 0.12, 'sawtooth', 0.08, 100);
}

function hitBoss(projectile) {
  const dmg = getThrowDamage() + (projectile.isCharged ? 1 : 0);
  boss.hp -= dmg;
  boss.flashTimer = 0.2;
  boss.stunTimer = 0.5;
  TAS.fx.shake(7, 0.91);
  TAS.fx.flash(boss.color, 0.2);
  TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffffff', 12, 4);
  TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, boss.color, 8, 3, { gravity: 2, size: 3 });
  TAS.audio.playTone(120, 0.2, 'square', 0.12, 60);
  addScore(200);

  if (boss.hp <= 0) {
    boss.alive = false;
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, boss.color, 35, 6, { gravity: 2, size: 4, sizeVar: 4 });
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#f4b41b', 25, 5, { gravity: -1, size: 3 });
    TAS.particles.spawn(boss.x + boss.w/2, boss.y + boss.h/2, '#ffffff', 15, 3, { gravity: 0, size: 2 });
    TAS.fx.shake(14, 0.94);
    TAS.fx.flash('#ffffff', 0.6);
    TAS.audio.playTone(80, 0.5, 'sawtooth', 0.15, 40);
    addScore(1000);
    levelComplete = true;
    levelCompleteTimer = 3.0;
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
  }
}

// ============================================================
// PROJECTILES UPDATE
// ============================================================
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (!p.alive) { projectiles.splice(i, 1); continue; }

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    // Trail (PASS 3)
    if (frame % 2 === 0) {
      TAS.particles.spawn(p.x, p.y, p.color, 1, 0.5, { gravity: 0, size: 2 });
    }

    if (p.x < scrollX - 50 || p.x > scrollX + GW + 50 || p.y < -50 || p.y > GH + 50) {
      p.alive = false;
      continue;
    }

    if (p.fromBoss && player && !player.hiding && player.invulnTimer <= 0) {
      if (TAS.hit.rectOverlap(p.x - 5, p.y - 5, p.w, p.h, player.x, player.y, player.w, player.h)) {
        if (btnGrab() && p.catchable && !player.holding) {
          p.alive = false;
          const caught = createObject('reactor_nut', player.x + player.dir * 10, player.y - 10);
          caught.held = true;
          objects.push(caught);
          player.holding = caught;
          TAS.audio.playTone(600, 0.1, 'triangle', 0.1);
          TAS.particles.spawn(player.x + 7, player.y + 5, '#3cacd7', 8, 2);
          addScore(50);
        } else {
          p.alive = false;
          damagePlayer();
        }
      }
    }
  }
}

// ============================================================
// POWERUP & COLLECTIBLE UPDATE
// ============================================================
function updatePowerups(dt) {
  for (const p of powerups) {
    if (p.collected) continue;
    if (!p.grounded) {
      p.vy += GRAVITY * dt;
      p.y += p.vy * dt;
      if (p.y + p.h > GH - 32) {
        p.y = GH - 32 - p.h;
        p.vy = 0;
        p.grounded = true;
      }
    }
    if (player && !player.hiding && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
      p.collected = true;
      applyPowerup(p.type);
      TAS.particles.spawn(p.x + 7, p.y + 7, '#f4b41b', 12, 3);
      TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.12]], 80);
    }
  }
}

function applyPowerup(type) {
  switch (type) {
    case 'speed':
      player.powerup = 'speed';
      player.powerupTimer = 8;
      break;
    case 'hat':
      player.powerup = 'hat';
      player.hatActive = true;
      break;
    case 'magnet':
      player.powerup = 'magnet';
      player.powerupTimer = 10;
      break;
    case 'star':
      player.powerup = 'star';
      player.powerupTimer = 5;
      player.invulnTimer = 5;
      break;
  }
  addScore(200);
}

function updateCollectibles(dt) {
  for (const c of collectibles) {
    if (c.collected) continue;
    c.bobOffset += dt * 3;
    const drawY = c.y + Math.sin(c.bobOffset) * 3;

    if (player && !player.hiding) {
      // WIS affects passive pickup radius
      const pickR = getPickupRadius();
      if (TAS.hit.rectOverlap(player.x - pickR/4, player.y - pickR/4, player.w + pickR/2, player.h + pickR/2, c.x, drawY, c.w, c.h)) {
        c.collected = true;
        if (c.type === 'token') {
          tokens++;
          totalTokens++;
          addScore(10);
          TAS.audio.playTone(800 + tokens * 10, 0.04, 'square', 0.04);
          TAS.particles.spawn(c.x + 5, drawY + 5, '#f4b41b', 3, 1, { gravity: -0.5, size: 2 });
          if (tokens >= TOKENS_FOR_LIFE) {
            tokens = 0;
            lives++;
            TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.15]], 100);
            TAS.particles.spawn(player.x + 7, player.y + 11, '#38d973', 18, 4);
          }
        } else if (c.type === 'diamond') {
          addScore(500);
          TAS.audio.playMelody([[784, 0.08], [988, 0.08], [1175, 0.12]], 80);
          TAS.particles.spawn(c.x + 6, drawY + 6, '#a855f7', 14, 3, { size: 3 });
        }
      }
    }
  }
}

// ============================================================
// PLAYER DAMAGE
// ============================================================
function damagePlayer() {
  if (!player || player.invulnTimer > 0 || player.hiding) return;
  if (player.powerup === 'star') return;

  if (player.hatActive) {
    player.hatActive = false;
    player.powerup = null;
    player.invulnTimer = 0.5;
    TAS.audio.playTone(400, 0.1, 'triangle', 0.08);
    TAS.particles.spawn(player.x + 7, player.y, '#aaaaaa', 8, 2);
    TAS.fx.shake(3, 0.88);
    return;
  }

  player.hp--;
  player.invulnTimer = INVULN_TIME;
  TAS.fx.shake(6, 0.9);
  TAS.audio.playTone(150, 0.2, 'sawtooth', 0.1, 80);
  TAS.particles.spawn(player.x + 7, player.y + 11, '#e6482e', 10, 3);

  if (player.holding) {
    player.holding.held = false;
    player.holding.thrown = false;
    player.holding = null;
    charging = false;
    chargeTimer = 0;
  }

  if (player.hp <= 0) {
    playerDie();
  }
}

// ============================================================
// LEVEL COMPLETION
// ============================================================
function checkLevelComplete(dt) {
  if (levelComplete) {
    levelCompleteTimer -= dt;
    if (levelCompleteTimer <= 0) {
      nextLevel();
    }
    return;
  }

  if (!bossActive && player && player.x > levelGoalX) {
    levelComplete = true;
    levelCompleteTimer = 2.0;
    addScore(500);
    TAS.audio.playMelody([[440, 0.1], [554, 0.1], [659, 0.1], [880, 0.2]], 120);
    TAS.particles.spawn(player.x + 7, player.y + 11, '#f4b41b', 24, 4);
  }
}

// ============================================================
// MAIN UPDATE
// ============================================================
function update(dt) {
  frame++;
  updateInput();
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'charSelect') {
    charSelectBlink += dt;
    if (moveLeft() || moveRight()) {
      selectedChar = selectedChar === 0 ? 1 : 0;
      TAS.audio.playTone(400, 0.05, 'square', 0.05);
    }
    if (btnJump() || btnGrab()) {
      state = 'playing';
      startGame();
      TAS.audio.playMelody([[440, 0.08], [554, 0.08], [659, 0.12]], 100);
    }
    return;
  }

  if (state === 'title') {
    if (picking) return;
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      picking = true;
      TAS.player.select(function(){ recomputeStats(); picking = false; });
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      state = 'charSelect';
      TAS.audio.ensureAudio();
    }
    return;
  }

  if (state === 'gameOver' || state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state === 'playing') {
    if (deathTimer > 0) {
      deathTimer -= dt;
      return;
    }
    updatePlayer(dt);
    updateObjects(dt);
    updateEnemies(dt);
    updateBoss(dt);
    updateProjectiles(dt);
    updatePowerups(dt);
    updateCollectibles(dt);
    updateHazards(dt);
    checkLevelComplete(dt);
  }
}

// ============================================================
// DRAWING - BACKGROUND (PASS 3 - zone-specific detail)
// ============================================================
function drawBackground() {
  const zoneIdx = Math.floor(level / 2);
  const zone = ZONES[zoneIdx];
  const grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, zone.bg1);
  grad.addColorStop(1, zone.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Far parallax layer
  const parallax = scrollX * 0.2;
  ctx.globalAlpha = 0.3;

  switch (zone.bgDetail) {
    case 'docks':
      // Cranes and warehouses
      ctx.fillStyle = '#1a2030';
      for (let i = 0; i < 5; i++) {
        const bx = i * 160 - (parallax % 160);
        ctx.fillRect(bx, GH - 32 - 60, 40, 60);
        ctx.fillRect(bx + 15, GH - 32 - 90, 10, 30);
        ctx.fillRect(bx + 5, GH - 32 - 85, 30, 4);
      }
      break;
    case 'garden':
      // Mushroom silhouettes
      ctx.fillStyle = '#0a200a';
      for (let i = 0; i < 8; i++) {
        const bx = i * 100 - (parallax % 100);
        const mh = 30 + (i * 17 % 40);
        ctx.fillRect(bx + 10, GH - 32 - mh, 8, mh);
        ctx.beginPath();
        ctx.arc(bx + 14, GH - 32 - mh, 18, Math.PI, 0);
        ctx.fill();
      }
      break;
    case 'sewer':
      // Pipe silhouettes
      ctx.fillStyle = '#0a1a1a';
      for (let i = 0; i < 6; i++) {
        const bx = i * 130 - (parallax % 130);
        ctx.fillRect(bx, GH - 32 - 40 - (i % 3) * 20, 50, 16);
        ctx.beginPath();
        ctx.arc(bx + 50, GH - 32 - 32 - (i % 3) * 20, 8, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
    case 'lab':
      // Beakers and tanks
      ctx.fillStyle = '#1a0a2a';
      for (let i = 0; i < 7; i++) {
        const bx = i * 110 - (parallax % 110);
        const th = 40 + (i * 23 % 30);
        ctx.fillRect(bx + 5, GH - 32 - th, 20, th);
        ctx.fillRect(bx, GH - 32 - th - 5, 30, 8);
        // Bubbles
        if (frame % 60 < 30) {
          ctx.fillStyle = '#aa44ff';
          ctx.globalAlpha = 0.15;
          ctx.beginPath();
          ctx.arc(bx + 15, GH - 32 - th + 15 + Math.sin(frame * 0.02 + i) * 8, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#1a0a2a';
          ctx.globalAlpha = 0.3;
        }
      }
      break;
    case 'fortress':
      // Dark towers
      ctx.fillStyle = '#2a0a0a';
      for (let i = 0; i < 5; i++) {
        const bx = i * 150 - (parallax % 150);
        const th = 50 + (i * 31 % 60);
        ctx.fillRect(bx, GH - 32 - th, 35, th);
        // Battlements
        for (let j = 0; j < 4; j++) {
          ctx.fillRect(bx + j * 10, GH - 32 - th - 8, 6, 8);
        }
      }
      break;
  }
  ctx.globalAlpha = 1;

  // Mid parallax buildings
  const parallax2 = scrollX * 0.4;
  ctx.fillStyle = zone.bg2;
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 10; i++) {
    const bx = i * 90 - (parallax2 % 90);
    const bh = 25 + (i * 29 % 50);
    ctx.fillRect(bx, GH - 32 - bh, 45, bh);
  }
  ctx.globalAlpha = 1;

  // Near parallax detail
  const parallax3 = scrollX * 0.6;
  ctx.fillStyle = zone.bg1;
  for (let i = 0; i < 12; i++) {
    const bx = i * 70 - (parallax3 % 70);
    const bh = 15 + (i * 19 % 35);
    ctx.fillRect(bx, GH - 32 - bh, 35, bh);
  }
}

// ============================================================
// DRAWING - PLATFORMS (PASS 3 - improved)
// ============================================================
function drawPlatforms() {
  const zone = ZONES[Math.floor(level / 2)];
  for (const p of platforms) {
    const sx = p.x - scrollX;
    if (sx + p.w < -20 || sx > GW + 20) continue;

    if (p.type === 'ground') {
      ctx.fillStyle = zone.groundColor || zone.platColor;
      ctx.fillRect(sx, p.y, Math.min(p.w, GW + 40), p.h);
      // Top edge highlight
      ctx.fillStyle = zone.accentColor;
      ctx.fillRect(sx, p.y, Math.min(p.w, GW + 40), 2);
      // Ground texture
      ctx.fillStyle = zone.platColor;
      for (let gx = Math.max(0, Math.floor(sx / 16)) * 16; gx < sx + Math.min(p.w, GW + 40); gx += 16) {
        if (gx >= sx && gx < sx + p.w) {
          ctx.fillRect(gx, p.y + 8, 1, 8);
          ctx.fillRect(gx + 8, p.y + 12, 1, 6);
        }
      }
    } else {
      // Platform with depth
      ctx.fillStyle = zone.platColor;
      ctx.fillRect(sx, p.y, p.w, p.h);
      // Top highlight
      ctx.fillStyle = zone.accentColor;
      ctx.fillRect(sx, p.y, p.w, 2);
      // Bottom shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(sx + 2, p.y + p.h, p.w - 4, 3);
      // Support columns
      ctx.strokeStyle = zone.platColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(sx + 4, p.y + p.h);
      ctx.lineTo(sx + 4, p.y + p.h + 10);
      ctx.moveTo(sx + p.w - 4, p.y + p.h);
      ctx.lineTo(sx + p.w - 4, p.y + p.h + 10);
      ctx.stroke();
    }
  }
}

// ============================================================
// DRAWING - HAZARDS (PASS 2)
// ============================================================
function drawHazards() {
  for (const h of hazards) {
    if (!h.active) continue;
    const sx = h.x - scrollX;
    if (sx < -50 || sx > GW + 50) continue;

    if (h.type === 'goo') {
      // Toxic mold puddle
      ctx.fillStyle = '#1a4a2a';
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.ellipse(sx + h.w / 2, h.y + 3, h.w / 2, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Bubble
      ctx.fillStyle = '#38d973';
      ctx.globalAlpha = 0.5 + Math.sin(h.phase) * 0.3;
      ctx.beginPath();
      ctx.arc(sx + h.w / 2 + Math.sin(h.phase * 1.3) * 6, h.y, 2 + Math.sin(h.phase * 0.7), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (h.type === 'spore') {
      const isActive = Math.sin(h.phase) > 0;
      ctx.globalAlpha = isActive ? 0.4 : 0.15;
      ctx.fillStyle = '#38d973';
      // Cloud shape
      for (let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.arc(sx + h.w / 2 + Math.sin(h.phase + s * 2) * 8, h.y - 8 - s * 5, 8 + s * 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // Warning indicator
      if (isActive) {
        ctx.fillStyle = '#e6482e';
        ctx.font = '6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('!', sx + h.w / 2, h.y - 26);
        ctx.textAlign = 'left';
      }
    }
  }
}

// ============================================================
// DRAWING - OBJECTS (PASS 2 - Tasern themed)
// ============================================================
function drawObjects() {
  for (const obj of objects) {
    if (!obj.alive) continue;
    const sx = obj.x - scrollX;
    if (sx < -20 || sx > GW + 20) continue;

    switch (obj.type) {
      case 'myco_acorn':
        // Spore crate with mushroom cap
        ctx.fillStyle = '#7a444a';
        ctx.fillRect(sx, obj.y + 4, obj.w, obj.h - 4);
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 4, 8, Math.PI, 0);
        ctx.fill();
        // Cap dots
        ctx.fillStyle = '#8a3af7';
        ctx.fillRect(sx + 3, obj.y + 1, 2, 2);
        ctx.fillRect(sx + 9, obj.y, 2, 2);
        // Cross lines on body
        ctx.strokeStyle = '#5a2a30';
        ctx.beginPath();
        ctx.moveTo(sx + 2, obj.y + 6);
        ctx.lineTo(sx + obj.w - 2, obj.y + obj.h - 2);
        ctx.moveTo(sx + obj.w - 2, obj.y + 6);
        ctx.lineTo(sx + 2, obj.y + obj.h - 2);
        ctx.stroke();
        break;

      case 'reactor_nut':
        // Glowing spore gem
        ctx.fillStyle = '#3cacd7';
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 8, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#6dcce8';
        ctx.beginPath();
        ctx.arc(sx + 5, obj.y + 5, 3, 0, Math.PI * 2);
        ctx.fill();
        // Glow ring
        ctx.strokeStyle = '#3cacd7';
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 8, 9, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        break;

      case 'steel':
        ctx.fillStyle = '#aabbcc';
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 8, 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ddeeff';
        ctx.beginPath();
        ctx.arc(sx + 5, obj.y + 5, 3, 0, Math.PI * 2);
        ctx.fill();
        // Bolt detail
        ctx.fillStyle = '#889aaa';
        ctx.fillRect(sx + 6, obj.y + 6, 4, 4);
        break;

      case 'lp_cheese':
        // Garden Seed (golden wedge)
        ctx.fillStyle = '#f4b41b';
        ctx.beginPath();
        ctx.moveTo(sx + 2, obj.y + obj.h);
        ctx.lineTo(sx + obj.w - 2, obj.y + obj.h);
        ctx.lineTo(sx + obj.w / 2, obj.y + 2);
        ctx.closePath();
        ctx.fill();
        // Seed spots
        ctx.fillStyle = '#b8860b';
        ctx.beginPath();
        ctx.arc(sx + 6, obj.y + 10, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx + 10, obj.y + 7, 1.5, 0, Math.PI * 2);
        ctx.fill();
        break;

      case 'spore_bomb':
        // Toxic spore bomb
        ctx.fillStyle = '#1a3a1a';
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 9, 7, 0, Math.PI * 2);
        ctx.fill();
        // Mushroom cap detail
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(sx + 8, obj.y + 5, 5, Math.PI, 0);
        ctx.fill();
        // Fuse stem
        ctx.strokeStyle = '#f4b41b';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx + 8, obj.y + 2);
        ctx.lineTo(sx + 12, obj.y - 3);
        ctx.stroke();
        ctx.lineWidth = 1;
        // Spark if lit
        if (obj.fuseTimer > 0) {
          ctx.fillStyle = frame % 4 < 2 ? '#f4b41b' : '#38d973';
          ctx.beginPath();
          ctx.arc(sx + 12, obj.y - 4, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        break;
    }

    // Charged glow (PASS 2)
    if (obj.isCharged && obj.thrown) {
      ctx.strokeStyle = '#f4b41b';
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.3) * 0.3;
      ctx.beginPath();
      ctx.arc(sx + 8, obj.y + 8, 10, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

// ============================================================
// DRAWING - ENEMIES (PASS 2 - Tasern themed sprites, PASS 3 - enhanced)
// ============================================================
function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const sx = e.x - scrollX;
    if (sx < -30 || sx > GW + 30) continue;

    ctx.save();

    if (e.stunned) {
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.3) * 0.3;
    }

    switch (e.type) {
      case 'reactor_mouse':
        // Body - Mold Rat
        ctx.fillStyle = '#7a444a';
        ctx.fillRect(sx + 2, e.y + 6, e.w - 4, e.h - 6);
        // Head
        ctx.fillStyle = '#8a5458';
        ctx.beginPath();
        ctx.arc(sx + e.w/2, e.y + 6, 7, 0, Math.PI * 2);
        ctx.fill();
        // Ears
        ctx.fillStyle = '#9a6468';
        ctx.beginPath();
        ctx.arc(sx + 3, e.y + 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx + e.w - 3, e.y + 2, 3, 0, Math.PI * 2);
        ctx.fill();
        // Tail with spore glow
        ctx.strokeStyle = '#38d973';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx + (e.dir < 0 ? e.w : 0), e.y + e.h - 4);
        ctx.quadraticCurveTo(sx + (e.dir < 0 ? e.w + 8 : -8), e.y + e.h - 10, sx + (e.dir < 0 ? e.w + 5 : -5), e.y + e.h - 16);
        ctx.stroke();
        ctx.lineWidth = 1;
        break;

      case 'mycelial_cat':
        // Body - Fungal Stalker
        ctx.fillStyle = '#6a3a8a';
        ctx.fillRect(sx + 2, e.y + 8, e.w - 4, e.h - 8);
        // Head
        ctx.fillStyle = '#7a4a9a';
        ctx.beginPath();
        ctx.arc(sx + e.w/2, e.y + 8, 8, 0, Math.PI * 2);
        ctx.fill();
        // Mushroom-tipped ears
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.moveTo(sx + 3, e.y + 2);
        ctx.lineTo(sx + 0, e.y - 6);
        ctx.lineTo(sx + 6, e.y + 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(sx + e.w - 3, e.y + 2);
        ctx.lineTo(sx + e.w, e.y - 6);
        ctx.lineTo(sx + e.w - 6, e.y + 2);
        ctx.fill();
        // Mycelial spots
        ctx.fillStyle = '#38d973';
        ctx.fillRect(sx + 5, e.y + 12, 2, 2);
        ctx.fillRect(sx + e.w - 7, e.y + 14, 2, 2);
        ctx.fillRect(sx + e.w/2 - 1, e.y + 16, 2, 2);
        break;

      case 'spore_beetle':
        // Shell - Toxic Spore Beetle
        ctx.fillStyle = '#2a6a3a';
        ctx.beginPath();
        ctx.ellipse(sx + e.w/2, e.y + e.h/2, e.w/2, e.h/2 - 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Shell line
        ctx.strokeStyle = '#1a5a2a';
        ctx.beginPath();
        ctx.moveTo(sx + e.w/2, e.y + 2);
        ctx.lineTo(sx + e.w/2, e.y + e.h - 2);
        ctx.stroke();
        // Wings (flapping)
        const wingFlap = Math.sin(e.animFrame * 3) * 6;
        ctx.fillStyle = '#38d973';
        ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.7;
        ctx.beginPath();
        ctx.moveTo(sx, e.y + 6);
        ctx.lineTo(sx - 8, e.y + wingFlap);
        ctx.lineTo(sx + 4, e.y + 10);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(sx + e.w, e.y + 6);
        ctx.lineTo(sx + e.w + 8, e.y + wingFlap);
        ctx.lineTo(sx + e.w - 4, e.y + 10);
        ctx.fill();
        ctx.globalAlpha = e.stunned ? (0.5 + Math.sin(frame * 0.3) * 0.3) : 1;
        // Spore dust
        if (!e.stunned && frame % 20 === 0) {
          TAS.particles.spawn(e.x + e.w/2, e.y + e.h, '#38d973', 2, 1, { gravity: 0.5, size: 1 });
        }
        break;

      case 'yield_drone':
        // Metal body - Spore Drone
        ctx.fillStyle = '#2a5a7a';
        ctx.fillRect(sx + 2, e.y + 4, e.w - 4, e.h - 4);
        // Screen
        ctx.fillStyle = '#38d973';
        ctx.fillRect(sx + 5, e.y + 8, e.w - 10, 6);
        // Antenna
        ctx.strokeStyle = '#3cacd7';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(sx + e.w / 2, e.y + 4);
        ctx.lineTo(sx + e.w / 2, e.y - 4);
        ctx.stroke();
        ctx.fillStyle = '#3cacd7';
        ctx.beginPath();
        ctx.arc(sx + e.w / 2, e.y - 5, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 1;
        // Treads
        ctx.fillStyle = '#1a3a5a';
        ctx.fillRect(sx + 1, e.y + e.h - 6, 5, 6);
        ctx.fillRect(sx + e.w - 6, e.y + e.h - 6, 5, 6);
        break;

      case 'spore_minion':
        // Small mushroom soldier
        ctx.fillStyle = '#2a5a2a';
        ctx.fillRect(sx + 3, e.y + 8, e.w - 6, e.h - 8);
        // Mushroom cap head
        ctx.fillStyle = '#38d973';
        ctx.beginPath();
        ctx.arc(sx + e.w/2, e.y + 8, 8, Math.PI, 0);
        ctx.fill();
        // Cap spots
        ctx.fillStyle = '#6aee8a';
        ctx.fillRect(sx + 4, e.y + 3, 2, 2);
        ctx.fillRect(sx + e.w - 6, e.y + 4, 2, 2);
        break;

      default:
        // Fallback
        ctx.fillStyle = e.color;
        ctx.fillRect(sx, e.y, e.w, e.h);
        break;
    }

    // Eyes (all enemies)
    const eyeX = sx + e.w / 2 + e.dir * 3;
    const eyeY = e.y + (e.type === 'spore_beetle' ? e.h/2 - 2 : 6);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(eyeX - 3, eyeY, 3, 3);
    ctx.fillRect(eyeX + 1, eyeY, 3, 3);
    ctx.fillStyle = '#000000';
    ctx.fillRect(eyeX - 2 + (e.dir > 0 ? 1 : 0), eyeY + 1, 1, 1);
    ctx.fillRect(eyeX + 2 + (e.dir > 0 ? 1 : 0), eyeY + 1, 1, 1);

    // Stun stars
    if (e.stunned) {
      for (let s = 0; s < 3; s++) {
        const starAngle = frame * 0.1 + s * 2.09;
        const starX = sx + e.w / 2 + Math.cos(starAngle) * 10;
        const starY = e.y - 5 + Math.sin(starAngle) * 5;
        ctx.fillStyle = '#f4b41b';
        ctx.font = '8px monospace';
        ctx.fillText('*', starX, starY);
      }
    }

    ctx.restore();
  }
}

// ============================================================
// DRAWING - BOSS (PASS 2 - enhanced + enrage visuals)
// ============================================================
function drawBoss() {
  if (!boss || !boss.alive) return;
  const sx = boss.x - scrollX;

  ctx.save();
  if (boss.flashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.5;
  }

  // Enrage aura (PASS 2)
  if (boss.enragePhase) {
    ctx.strokeStyle = '#e6482e';
    ctx.globalAlpha = (ctx.globalAlpha || 1) * (0.3 + Math.sin(frame * 0.15) * 0.2);
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx + boss.w/2, boss.y + boss.h/2, boss.w/2 + 8 + Math.sin(frame * 0.1) * 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.globalAlpha = boss.flashTimer > 0 ? (0.5 + Math.sin(frame * 0.5) * 0.5) : 1;
  }

  // Body
  ctx.fillStyle = boss.color;
  ctx.fillRect(sx, boss.y, boss.w, boss.h);

  // Dark border
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx, boss.y, boss.w, boss.h);
  ctx.lineWidth = 1;

  // Crown/helmet
  ctx.fillStyle = boss.enragePhase ? '#e6482e' : '#f4b41b';
  ctx.beginPath();
  ctx.moveTo(sx + 4, boss.y);
  ctx.lineTo(sx + 8, boss.y - 8);
  ctx.lineTo(sx + 14, boss.y - 4);
  ctx.lineTo(sx + boss.w / 2, boss.y - 10);
  ctx.lineTo(sx + boss.w - 14, boss.y - 4);
  ctx.lineTo(sx + boss.w - 8, boss.y - 8);
  ctx.lineTo(sx + boss.w - 4, boss.y);
  ctx.closePath();
  ctx.fill();

  // Eyes
  ctx.fillStyle = boss.enragePhase ? '#e6482e' : '#a83020';
  ctx.fillRect(sx + 8, boss.y + 10, 8, 6);
  ctx.fillRect(sx + boss.w - 16, boss.y + 10, 8, 6);
  ctx.fillStyle = '#000000';
  ctx.fillRect(sx + 10, boss.y + 12, 4, 4);
  ctx.fillRect(sx + boss.w - 14, boss.y + 12, 4, 4);

  // Angry eyebrows
  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx + 6, boss.y + 8);
  ctx.lineTo(sx + 18, boss.y + 10);
  ctx.moveTo(sx + boss.w - 6, boss.y + 8);
  ctx.lineTo(sx + boss.w - 18, boss.y + 10);
  ctx.stroke();
  ctx.lineWidth = 1;

  ctx.restore();

  // HP bar
  const barW = 60;
  const barH = 6;
  const barX = sx + boss.w / 2 - barW / 2;
  const barY = boss.y - 22;
  ctx.fillStyle = '#333333';
  ctx.fillRect(barX, barY, barW, barH);
  const hpColor = boss.enragePhase ? '#e6482e' : '#e6482e';
  ctx.fillStyle = hpColor;
  ctx.fillRect(barX, barY, Math.floor(barW * (boss.hp / boss.maxHp)), barH);
  ctx.strokeStyle = '#000000';
  ctx.strokeRect(barX, barY, barW, barH);

  // Name
  ctx.fillStyle = '#ffffff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, sx + boss.w / 2, barY - 4);
  ctx.textAlign = 'left';
}

// ============================================================
// DRAWING - PLAYER (PASS 3 - enhanced sprites)
// ============================================================
function drawPlayer() {
  if (!player || deathTimer > 0) return;

  if (player.hiding) {
    if (player.hideObj) {
      const sx = player.hideObj.x - scrollX;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(sx + 4, player.hideObj.y + 4, 3, 3);
      ctx.fillRect(sx + 9, player.hideObj.y + 4, 3, 3);
      ctx.fillStyle = '#000000';
      ctx.fillRect(sx + 5, player.hideObj.y + 5, 1, 1);
      ctx.fillRect(sx + 10, player.hideObj.y + 5, 1, 1);
    }
    return;
  }

  const sx = player.x - scrollX;
  const sy = player.y;

  // Invuln flicker
  if (player.invulnTimer > 0 && Math.floor(frame * 0.5) % 2 === 0) return;

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, sx + player.w / 2, sy + player.h / 2, Math.max(player.w, player.h), { flipX: player.dir < 0, frame: frame })) {
    ctx.save();

    // Star glow
    if (player.powerup === 'star') {
      ctx.shadowColor = '#f4b41b';
      ctx.shadowBlur = 8 + Math.sin(frame * 0.2) * 4;
    }

    const bodyColor = player.charType === 0 ? '#3cacd7' : '#f4b41b';
    const bodyDark = player.charType === 0 ? '#2478a0' : '#b8860b';
    const bodyLight = player.charType === 0 ? '#6dcce8' : '#ffd04e';

    // Body
    ctx.fillStyle = bodyColor;
    ctx.fillRect(sx + 2, sy + 6, 10, 12);

    // Head
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(sx + 7, sy + 5, 6, 0, Math.PI * 2);
    ctx.fill();
    // Head highlight (PASS 3)
    ctx.fillStyle = bodyLight;
    ctx.beginPath();
    ctx.arc(sx + 5, sy + 3, 2, 0, Math.PI * 2);
    ctx.fill();

    // Face
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(sx + 4 + (player.dir > 0 ? 2 : 0), sy + 3, 2, 3);
    ctx.fillRect(sx + 8 + (player.dir > 0 ? 2 : 0), sy + 3, 2, 3);
    ctx.fillStyle = '#000000';
    ctx.fillRect(sx + 5 + (player.dir > 0 ? 2 : 0), sy + 4, 1, 1);
    ctx.fillRect(sx + 9 + (player.dir > 0 ? 2 : 0), sy + 4, 1, 1);

    // Nose (PASS 3)
    ctx.fillStyle = bodyDark;
    ctx.fillRect(sx + 6 + (player.dir > 0 ? 2 : 0), sy + 6, 2, 1);

    // Legs (animated)
    const legAnim = player.grounded ? Math.sin(player.animFrame) * 3 : 0;
    ctx.fillStyle = bodyDark;
    ctx.fillRect(sx + 3, sy + 18, 4, Math.floor(4 + legAnim));
    ctx.fillRect(sx + 8, sy + 18, 4, Math.floor(4 - legAnim));

    // Arms
    ctx.fillStyle = bodyColor;
    if (player.holding) {
      ctx.fillRect(sx + (player.dir > 0 ? 10 : -2), sy + 4, 4, 6);
      // Charge glow on held object (PASS 2)
      if (charging && statB.STR >= CHARGED_THROW_THRESHOLD) {
        const chargePct = chargeTimer / CHARGE_TIME;
        ctx.strokeStyle = '#f4b41b';
        ctx.globalAlpha = chargePct * 0.8;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sx + (player.dir > 0 ? 16 : -4), sy - 2, 8 + chargePct * 6, 0, Math.PI * 2 * chargePct);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.globalAlpha = 1;
        // Charge sparks
        if (chargePct > 0.5 && frame % 3 === 0) {
          TAS.particles.spawn(player.x + player.dir * 16, player.y - 4, '#f4b41b', 1, 1, { gravity: -0.5, size: 2 });
        }
      }
    } else {
      const armSwing = player.grounded ? Math.sin(player.animFrame + 1) * 2 : 0;
      ctx.fillRect(sx, sy + 8, 3, Math.floor(8 + armSwing));
      ctx.fillRect(sx + 11, sy + 8, 3, Math.floor(8 - armSwing));
    }

    // Steel hat
    if (player.hatActive) {
      ctx.fillStyle = '#aabbcc';
      ctx.fillRect(sx + 2, sy - 2, 10, 4);
      ctx.fillStyle = '#ddeeff';
      ctx.fillRect(sx + 4, sy - 1, 6, 2);
    }

    // Speed trail (PASS 3 - enhanced)
    if (player.powerup === 'speed') {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = bodyColor;
      ctx.fillRect(sx - player.dir * 6, sy + 6, 8, 12);
      ctx.globalAlpha = 0.15;
      ctx.fillRect(sx - player.dir * 12, sy + 6, 8, 12);
      ctx.globalAlpha = 0.07;
      ctx.fillRect(sx - player.dir * 18, sy + 6, 8, 12);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

// ============================================================
// DRAWING - PROJECTILES
// ============================================================
function drawProjectiles() {
  for (const p of projectiles) {
    if (!p.alive) continue;
    const sx = p.x - scrollX;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx, p.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(sx - 1, p.y - 1, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ============================================================
// DRAWING - COLLECTIBLES & POWERUPS
// ============================================================
function drawCollectibles() {
  for (const c of collectibles) {
    if (c.collected) continue;
    const sx = c.x - scrollX;
    if (sx < -15 || sx > GW + 15) continue;
    const bob = Math.sin(c.bobOffset) * 3;

    if (c.type === 'token') {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(sx + 5, c.y + 5 + bob, 5, 0, Math.PI * 2);
      ctx.fill();
      // Rim highlight (PASS 3)
      ctx.strokeStyle = '#ffd04e';
      ctx.beginPath();
      ctx.arc(sx + 5, c.y + 5 + bob, 5, -0.5, 0.8);
      ctx.stroke();
      ctx.fillStyle = '#7a444a';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P', sx + 5, c.y + 8 + bob);
      ctx.textAlign = 'left';
    } else if (c.type === 'diamond') {
      ctx.fillStyle = '#a855f7';
      ctx.beginPath();
      ctx.moveTo(sx + 6, c.y + bob);
      ctx.lineTo(sx + 12, c.y + 6 + bob);
      ctx.lineTo(sx + 6, c.y + 12 + bob);
      ctx.lineTo(sx, c.y + 6 + bob);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#c88aff';
      ctx.beginPath();
      ctx.moveTo(sx + 6, c.y + 2 + bob);
      ctx.lineTo(sx + 9, c.y + 6 + bob);
      ctx.lineTo(sx + 6, c.y + 9 + bob);
      ctx.closePath();
      ctx.fill();
      // Sparkle (PASS 3)
      if (frame % 30 < 5) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(sx + 5, c.y + 3 + bob, 2, 2);
      }
    }
  }
}

function drawPowerups() {
  for (const p of powerups) {
    if (p.collected) continue;
    const sx = p.x - scrollX;
    const bob = Math.sin(frame * 0.08) * 2;

    ctx.save();
    ctx.shadowColor = '#f4b41b';
    ctx.shadowBlur = 4 + Math.sin(frame * 0.1) * 2;

    switch (p.type) {
      case 'speed':
        ctx.fillStyle = '#38d973';
        ctx.fillRect(sx + 2, p.y + bob + 3, 10, 8);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(sx + 4, p.y + bob + 5, 3, 4);
        break;
      case 'hat':
        ctx.fillStyle = '#aabbcc';
        ctx.fillRect(sx + 1, p.y + bob + 4, 12, 5);
        ctx.fillStyle = '#ddeeff';
        ctx.fillRect(sx + 3, p.y + bob + 2, 8, 4);
        break;
      case 'magnet':
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(sx + 7, p.y + bob + 7, 6, Math.PI, 0);
        ctx.stroke();
        ctx.fillStyle = '#4444ff';
        ctx.fillRect(sx + 1, p.y + bob + 7, 3, 5);
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(sx + 10, p.y + bob + 7, 3, 5);
        break;
      case 'star':
        ctx.fillStyle = '#f4b41b';
        drawStar(sx + 7, p.y + bob + 7, 6);
        break;
    }
    ctx.restore();
  }
}

function drawStar(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const a2 = a1 + 2 * Math.PI / 5;
    if (i === 0) ctx.moveTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
    else ctx.lineTo(cx + r * Math.cos(a1), cy + r * Math.sin(a1));
    ctx.lineTo(cx + r * 0.4 * Math.cos(a2 - Math.PI / 5), cy + r * 0.4 * Math.sin(a2 - Math.PI / 5));
  }
  ctx.closePath();
  ctx.fill();
}

// ============================================================
// DRAWING - GOAL
// ============================================================
function drawGoal() {
  if (bossActive) return;
  const sx = levelGoalX - scrollX;
  if (sx < -30 || sx > GW + 30) return;

  // Flag pole
  ctx.strokeStyle = '#888888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx, GH - 32);
  ctx.lineTo(sx, GH - 90);
  ctx.stroke();
  ctx.lineWidth = 1;

  // Flag
  const flagWave = Math.sin(frame * 0.08) * 3;
  ctx.fillStyle = '#38d973';
  ctx.beginPath();
  ctx.moveTo(sx, GH - 90);
  ctx.lineTo(sx + 20 + flagWave, GH - 80);
  ctx.lineTo(sx, GH - 70);
  ctx.closePath();
  ctx.fill();

  // Arrow indicator
  if (player && player.x < levelGoalX - GW * 0.5) {
    ctx.fillStyle = '#38d973';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('>>>', GW - 10, GH / 2);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - HUD (PASS 1 - stat-aware)
// ============================================================
function drawHUD() {
  TAS.ui.drawHUD(score, level + 1, lives, GW);

  // Token counter
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('POOP:' + tokens + '/' + TOKENS_FOR_LIFE, 6, 42);

  // HP hearts (CON-adjusted max)
  const maxHp = getMaxHP();
  for (let i = 0; i < maxHp; i++) {
    const hx = GW / 2 + 30 + i * 14;
    ctx.fillStyle = i < (player ? player.hp : 0) ? '#e6482e' : '#444444';
    ctx.font = '12px monospace';
    ctx.fillText('\u2665', hx, 18);
  }

  // Hat indicator
  if (player && player.hatActive) {
    ctx.fillStyle = '#aabbcc';
    ctx.font = '10px monospace';
    ctx.fillText('+HAT', GW / 2 + 30 + maxHp * 14, 18);
  }

  // Powerup indicator
  if (player && player.powerup && player.powerup !== 'hat') {
    ctx.fillStyle = '#38d973';
    ctx.font = '9px monospace';
    const timeLeft = Math.ceil(player.powerupTimer);
    ctx.fillText(player.powerup.toUpperCase() + ' ' + timeLeft + 's', GW / 2 - 60, 42);
  }

  // INT score multiplier indicator
  if (getScoreMultiplier() > 1) {
    ctx.fillStyle = '#a855f7';
    ctx.font = '8px monospace';
    ctx.fillText('x' + getScoreMultiplier().toFixed(1), 6, 54);
  }

  // Charge bar (PASS 2 - when STR >= 10 and holding)
  if (player && player.holding && statB.STR >= CHARGED_THROW_THRESHOLD && charging) {
    const cbW = 30;
    const cbH = 4;
    const cbX = GW / 2 - cbW / 2;
    const cbY = 48;
    const pct = chargeTimer / CHARGE_TIME;
    ctx.fillStyle = '#333333';
    ctx.fillRect(cbX, cbY, cbW, cbH);
    ctx.fillStyle = pct >= 0.8 ? '#f4b41b' : '#ffd04e';
    ctx.fillRect(cbX, cbY, Math.floor(cbW * pct), cbH);
    if (pct >= 0.8) {
      ctx.fillStyle = '#f4b41b';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('CHARGED!', GW / 2, cbY - 2);
      ctx.textAlign = 'left';
    }
  }

  // Zone name on level start (PASS 3 - larger, with fade)
  if (frame < 180) {
    const zone = ZONES[Math.floor(level / 2)];
    const fadeAlpha = Math.max(0, 1 - frame / 180);
    const slideY = Math.min(0, -20 + frame * 0.5);
    ctx.globalAlpha = fadeAlpha;
    ctx.fillStyle = zone.accentColor;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(zone.name, GW / 2, GH / 2 - 20 + slideY);
    ctx.fillStyle = '#aaaaaa';
    ctx.font = '10px monospace';
    ctx.fillText('Stage ' + ((level % 2) + 1), GW / 2, GH / 2 - 2 + slideY);
    if (level % 2 === 1) {
      ctx.fillStyle = '#e6482e';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('FUNGAL BOSS!', GW / 2, GH / 2 + 14 + slideY);
    }
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ============================================================
// DRAWING - LEVEL COMPLETE
// ============================================================
function drawLevelComplete() {
  if (!levelComplete) return;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  if (bossActive) {
    ctx.fillText('FUNGUS SLAIN!', GW / 2, GH / 2 - 10);
  } else {
    ctx.fillText('GARDEN CLEARED!', GW / 2, GH / 2 - 10);
  }
  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText('+' + Math.floor(500 * getScoreMultiplier()) + ' POOP', GW / 2, GH / 2 + 15);
  ctx.textAlign = 'left';
}

// ============================================================
// DRAWING - CHAR SELECT (PASS 1 - stat display)
// ============================================================
function drawCharSelect() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('CHOOSE YOUR BASELING', GW / 2, 50);

  const lx = GW / 4;
  const rx = GW * 3 / 4;
  const cy = GH / 2;

  // Left character - Bolt
  ctx.fillStyle = selectedChar === 0 ? '#3cacd7' : '#1a3a4a';
  ctx.fillRect(lx - 15, cy - 20, 30, 40);
  ctx.beginPath();
  ctx.arc(lx, cy - 20, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('BOLT', lx, cy + 40);
  ctx.fillStyle = '#3cacd7';
  ctx.font = '9px monospace';
  ctx.fillText('Nimble baseling', lx, cy + 55);
  ctx.fillText('Quick dodging', lx, cy + 67);

  // Right character - Chunk
  ctx.fillStyle = selectedChar === 1 ? '#f4b41b' : '#4a3a10';
  ctx.fillRect(rx - 15, cy - 20, 30, 40);
  ctx.beginPath();
  ctx.arc(rx, cy - 20, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('CHUNK', rx, cy + 40);
  ctx.fillStyle = '#f4b41b';
  ctx.font = '9px monospace';
