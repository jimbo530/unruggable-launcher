<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Power Blade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a14; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'THROW' } });

// === CONSTANTS ===
const TILE = 16;
const GRAVITY = 980;
const JUMP_VEL = -310;
const PLAYER_SPEED = 140;
const BOOMERANG_BASE_SPEED = 280;
const BOOMERANG_BASE_RANGE = 130;
const SECTOR_W = 30; // tiles wide per screen
const SECTOR_H = 20; // tiles tall per screen
const SCREENS_X = 4;
const SCREENS_Y = 3;
const MAP_W = SECTOR_W * SCREENS_X;
const MAP_H = SECTOR_H * SCREENS_Y;
const POWER_SUIT_DURATION = 30;
const SECTOR_TIME = 300;

const SECTORS = [
  { name: 'COMPUTER LAB', color: '#22aaff', hazard: 'electric', bg: '#0a0a22' },
  { name: 'POWER PLANT', color: '#ffaa22', hazard: 'steam', bg: '#1a0a00' },
  { name: 'SEWAGE SYSTEM', color: '#44cc44', hazard: 'acid', bg: '#0a1a0a' },
  { name: 'COMM TOWER', color: '#aa44ff', hazard: 'laser', bg: '#140a1a' },
  { name: 'WEAPONS FACTORY', color: '#ff4444', hazard: 'crusher', bg: '#1a0a0a' },
  { name: 'CENTRAL COMMAND', color: '#ffff44', hazard: 'all', bg: '#1a1a0a' }
];

const ENEMY_TYPES = {
  drone: { w: 14, h: 14, hp: 1, speed: 60, score: 100, fly: true },
  soldier: { w: 14, h: 22, hp: 2, speed: 40, score: 200, fly: false },
  turret: { w: 16, h: 16, hp: 3, speed: 0, score: 150, fly: false, shoots: true },
  roller: { w: 16, h: 12, hp: 1, speed: 80, score: 100, fly: false },
  mech: { w: 18, h: 24, hp: 3, speed: 30, score: 300, fly: false, jumps: true },
  shielded: { w: 16, h: 22, hp: 4, speed: 35, score: 400, fly: false, shielded: true },
  scout: { w: 12, h: 12, hp: 1, speed: 90, score: 150, fly: true }
};

// === STATE ===
let state = 'title';
let frame = 0;
let score = 0;
let highScore = TAS.score.load('power_blade_hi');
let lives = 3;
let maxHp = 6;
let hp = 6;
let sectorIndex = -1;
let sectorTimer = 0;
let sectorCleared = [false, false, false, false, false, false];
let upgrades = { range: 0, power: 0, speed: 0, multi: 0 };
let powerSuitActive = false;
let powerSuitTimer = 0;
let invincTimer = 0;
let deathTimer = 0;

// Player
let px = 0, py = 0, pvx = 0, pvy = 0;
let pFacing = 1;
let pGrounded = false;
let pAnim = 0;

// Boomerangs
let boomerangs = [];
let throwCooldown = 0;

// Map data
let tiles = [];
let enemies = [];
let items = [];
let bullets = [];
let npcs = [];
let keycardFound = false;
let bossDoorX = 0, bossDoorY = 0;
let boss = null;
let bossActive = false;

// Camera
let camX = 0, camY = 0;

// Save/Load
function saveProgress() {
  try {
    localStorage.setItem('power_blade_save', JSON.stringify({
      sectorCleared, upgrades, highScore, maxHp
    }));
  } catch(e) { console.error('Save failed:', e); }
}

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('power_blade_save'));
    if (d) {
      sectorCleared = d.sectorCleared || sectorCleared;
      upgrades = d.upgrades || upgrades;
      highScore = d.highScore || highScore;
      maxHp = d.maxHp || 6;
    }
  } catch(e) { console.error('Load failed:', e); }
}
loadProgress();

// === MAP GENERATION ===
function generateSector(idx) {
  tiles = [];
  enemies = [];
  items = [];
  bullets = [];
  npcs = [];
  keycardFound = false;
  bossActive = false;
  boss = null;
  sectorTimer = SECTOR_TIME;

  const sector = SECTORS[idx];
  const seed = idx * 7919 + 31;

  // Initialize tiles (0=empty, 1=solid, 2=platform, 3=hazard, 4=boss_door)
  for (let y = 0; y < MAP_H; y++) {
    tiles[y] = [];
    for (let x = 0; x < MAP_W; x++) {
      tiles[y][x] = 0;
    }
  }

  // Floor and ceiling
  for (let x = 0; x < MAP_W; x++) {
    tiles[0][x] = 1;
    tiles[MAP_H - 1][x] = 1;
    tiles[MAP_H - 2][x] = 1;
  }

  // Walls on edges
  for (let y = 0; y < MAP_H; y++) {
    tiles[y][0] = 1;
    tiles[y][MAP_W - 1] = 1;
  }

  // Generate rooms with corridors
  const rng = seededRandom(seed);

  // Create floor sections per screen
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      const baseX = sx * SECTOR_W;
      const baseY = sy * SECTOR_H;

      // Floor of each room
      for (let x = baseX; x < baseX + SECTOR_W; x++) {
        if (x > 0 && x < MAP_W - 1) {
          tiles[baseY + SECTOR_H - 1][x] = 1;
          tiles[baseY + SECTOR_H - 2][x] = 1;
        }
      }

      // Ceiling
      for (let x = baseX; x < baseX + SECTOR_W; x++) {
        if (x > 0 && x < MAP_W - 1) {
          tiles[baseY][x] = 1;
          tiles[baseY + 1][x] = 1;
        }
      }

      // Platforms
      const numPlats = 3 + Math.floor(rng() * 4);
      for (let p = 0; p < numPlats; p++) {
        const platX = baseX + 3 + Math.floor(rng() * (SECTOR_W - 8));
        const platY = baseY + 5 + Math.floor(rng() * (SECTOR_H - 10));
        const platLen = 3 + Math.floor(rng() * 5);
        for (let x = platX; x < platX + platLen && x < baseX + SECTOR_W - 1; x++) {
          if (tiles[platY]) tiles[platY][x] = 2;
        }
      }

      // Some solid blocks
      const numBlocks = 2 + Math.floor(rng() * 3);
      for (let b = 0; b < numBlocks; b++) {
        const bx = baseX + 2 + Math.floor(rng() * (SECTOR_W - 6));
        const by = baseY + 4 + Math.floor(rng() * (SECTOR_H - 8));
        const bw = 2 + Math.floor(rng() * 3);
        const bh = 2 + Math.floor(rng() * 2);
        for (let yy = by; yy < by + bh && yy < baseY + SECTOR_H - 2; yy++) {
          for (let xx = bx; xx < bx + bw && xx < baseX + SECTOR_W - 1; xx++) {
            if (tiles[yy]) tiles[yy][xx] = 1;
          }
        }
      }

      // Hazards
      if (rng() < 0.4) {
        const hx = baseX + 4 + Math.floor(rng() * (SECTOR_W - 10));
        const hy = baseY + SECTOR_H - 3;
        const hlen = 2 + Math.floor(rng() * 4);
        for (let x = hx; x < hx + hlen && x < baseX + SECTOR_W - 2; x++) {
          if (tiles[hy]) tiles[hy][x] = 3;
        }
      }
    }
  }

  // Create corridors between screens (vertical and horizontal openings)
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X - 1; sx++) {
      const wallX = (sx + 1) * SECTOR_W;
      const openY = sy * SECTOR_H + 6 + Math.floor(rng() * (SECTOR_H - 12));
      for (let y = openY; y < openY + 5 && y < MAP_H - 2; y++) {
        tiles[y][wallX] = 0;
        if (wallX - 1 > 0) tiles[y][wallX - 1] = 0;
        if (wallX + 1 < MAP_W) tiles[y][wallX + 1] = 0;
      }
    }
  }

  for (let sy = 0; sy < SCREENS_Y - 1; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      const wallY = (sy + 1) * SECTOR_H;
      const openX = sx * SECTOR_W + 8 + Math.floor(rng() * (SECTOR_W - 16));
      for (let x = openX; x < openX + 4 && x < MAP_W - 1; x++) {
        tiles[wallY][x] = 0;
        tiles[wallY + 1][x] = 0;
        if (wallY - 1 > 0) tiles[wallY - 1][x] = 0;
      }
    }
  }

  // Place player start (bottom-left area)
  px = 3 * TILE;
  py = (SECTOR_H - 4) * TILE;
  pvx = 0;
  pvy = 0;
  pFacing = 1;

  // Place keycard in a random screen (not the start screen or boss screen)
  const kcScreen = 1 + Math.floor(rng() * (SCREENS_X * SCREENS_Y - 2));
  const kcSX = kcScreen % SCREENS_X;
  const kcSY = Math.floor(kcScreen / SCREENS_X);
  items.push({
    type: 'keycard',
    x: (kcSX * SECTOR_W + 5 + Math.floor(rng() * (SECTOR_W - 10))) * TILE,
    y: (kcSY * SECTOR_H + 4 + Math.floor(rng() * 6)) * TILE,
    w: 12, h: 12, collected: false
  });

  // Place boss door (top-right area)
  bossDoorX = (MAP_W - 5) * TILE;
  bossDoorY = 4 * TILE;
  tiles[3][MAP_W - 5] = 4;
  tiles[4][MAP_W - 5] = 4;
  // Clear area around boss door
  for (let y = 2; y < 7; y++) {
    for (let x = MAP_W - 7; x < MAP_W - 2; x++) {
      if (tiles[y] && tiles[y][x] === 1) tiles[y][x] = 0;
    }
  }

  // Place power suit
  const psScreen = Math.floor(rng() * (SCREENS_X * SCREENS_Y));
  const psSX = psScreen % SCREENS_X;
  const psSY = Math.floor(psScreen / SCREENS_X);
  items.push({
    type: 'powersuit',
    x: (psSX * SECTOR_W + 8 + Math.floor(rng() * (SECTOR_W - 16))) * TILE,
    y: (psSY * SECTOR_H + 5 + Math.floor(rng() * 5)) * TILE,
    w: 16, h: 16, collected: false
  });

  // Place upgrade item
  const upTypes = ['range', 'power', 'speed', 'multi'];
  const upType = upTypes[Math.floor(rng() * upTypes.length)];
  items.push({
    type: 'upgrade_' + upType,
    x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
    y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
    w: 12, h: 12, collected: false
  });

  // Place energy tanks
  for (let i = 0; i < 2; i++) {
    items.push({
      type: 'energy',
      x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
      y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
      w: 10, h: 14, collected: false
    });
  }

  // Place 1-up
  if (rng() < 0.5) {
    items.push({
      type: '1up',
      x: (Math.floor(rng() * (MAP_W - 10)) + 5) * TILE,
      y: (Math.floor(rng() * (MAP_H - 10)) + 4) * TILE,
      w: 12, h: 12, collected: false
    });
  }

  // Place NPC
  const npcScreen = 1 + Math.floor(rng() * (SCREENS_X * SCREENS_Y - 2));
  const npcSX = npcScreen % SCREENS_X;
  const npcSY = Math.floor(npcScreen / SCREENS_X);
  npcs.push({
    x: (npcSX * SECTOR_W + 10 + Math.floor(rng() * (SECTOR_W - 20))) * TILE,
    y: (npcSY * SECTOR_H + SECTOR_H - 4) * TILE,
    talked: false,
    hint: getHint(idx, kcSX, kcSY)
  });

  // Place enemies
  const eTypes = Object.keys(ENEMY_TYPES);
  for (let sy = 0; sy < SCREENS_Y; sy++) {
    for (let sx = 0; sx < SCREENS_X; sx++) {
      if (sx === 0 && sy === SCREENS_Y - 1) continue; // skip start area
      const numEn = 3 + Math.floor(rng() * 4);
      for (let e = 0; e < numEn; e++) {
        const etype = eTypes[Math.floor(rng() * eTypes.length)];
        const edata = ENEMY_TYPES[etype];
        const ex = (sx * SECTOR_W + 3 + Math.floor(rng() * (SECTOR_W - 6))) * TILE;
        const ey = (sy * SECTOR_H + 4 + Math.floor(rng() * (SECTOR_H - 8))) * TILE;
        enemies.push({
          type: etype,
          x: ex, y: ey,
          startX: ex, startY: ey,
          w: edata.w, h: edata.h,
          hp: edata.hp,
          maxHp: edata.hp,
          speed: edata.speed,
          dir: rng() < 0.5 ? -1 : 1,
          fly: edata.fly || false,
          shoots: edata.shoots || false,
          shielded: edata.shielded || false,
          jumps: edata.jumps || false,
          score: edata.score,
          shootTimer: 0,
          jumpTimer: 0,
          anim: Math.floor(rng() * 100),
          alive: true
        });
      }
    }
  }
}

function getHint(sectorIdx, kcSX, kcSY) {
  const dirs = [];
  if (kcSX === 0) dirs.push('west');
  else if (kcSX === SCREENS_X - 1) dirs.push('east');
  else dirs.push('central');
  if (kcSY === 0) dirs.push('upper');
  else if (kcSY === SCREENS_Y - 1) dirs.push('lower');
  else dirs.push('middle');
  return 'The keycard is in the ' + dirs[1] + ' ' + dirs[0] + ' section.';
}

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
    return (s >>> 0) / 0xFFFFFFFF;
  };
}

// === BOSS GENERATION ===
function spawnBoss(idx) {
  bossActive = true;
  const bossNames = ['MEGA CPU', 'CORE REACTOR', 'SLUDGE KING', 'SIGNAL LORD', 'WAR MACHINE', 'COMMANDER X'];
  boss = {
    name: bossNames[idx],
    x: bossDoorX + 40,
    y: bossDoorY + 20,
    w: 48, h: 48,
    hp: 12 + idx * 4,
    maxHp: 12 + idx * 4,
    phase: 0,
    timer: 0,
    pattern: idx,
    dir: -1,
    vy: 0,
    shootTimer: 0,
    hitFlash: 0,
    alive: true
  };
  // Clear boss arena
  const bx = Math.floor(bossDoorX / TILE);
  const by = Math.floor(bossDoorY / TILE) - 2;
  for (let y = by; y < by + 10 && y < MAP_H - 2; y++) {
    for (let x = bx - 2; x < bx + 8 && x < MAP_W - 1; x++) {
      if (y > 1 && tiles[y]) tiles[y][x] = 0;
    }
  }
  // Boss arena floor
  for (let x = bx - 2; x < bx + 8 && x < MAP_W - 1; x++) {
    if (tiles[by + 9]) tiles[by + 9][x] = 1;
  }
}

// === TILE COLLISION ===
function isSolid(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return true;
  return tiles[ty][tx] === 1 || tiles[ty][tx] === 4;
}

function isPlatform(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return tiles[ty][tx] === 2;
}

function isHazard(tx, ty) {
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return false;
  return tiles[ty][tx] === 3;
}

// === BOOMERANG ===
function throwBoomerang(dirX, dirY) {
  if (throwCooldown > 0) return;
  const count = upgrades.multi >= 2 ? 2 : 1;
  const speed = BOOMERANG_BASE_SPEED + upgrades.speed * 40;
  const range = BOOMERANG_BASE_RANGE + upgrades.range * 30;

  for (let i = 0; i < count; i++) {
    const spreadAngle = count > 1 ? (i === 0 ? -0.15 : 0.15) : 0;
    const angle = Math.atan2(dirY, dirX) + spreadAngle;
    const dx = Math.cos(angle);
    const dy = Math.sin(angle);

    boomerangs.push({
      x: px + 7,
      y: py + 8,
      vx: dx * speed,
      vy: dy * speed,
      returning: false,
      dist: 0,
      maxDist: range,
      damage: 1 + upgrades.power,
      spin: 0,
      trail: [],
      alive: true
    });
  }
  throwCooldown = 0.25;
  TAS.audio.playTone(600, 0.08, 'sawtooth', 0.08, 900);
}

function throwLaser(dirX, dirY) {
  const speed = 400;
  const angle = Math.atan2(dirY, dirX);
  bullets.push({
    x: px + 7, y: py + 8,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    friendly: true,
    damage: 3,
    life: 0.5,
    w: 8, h: 3,
    color: '#ff0'
  });
  throwCooldown = 0.15;
  TAS.audio.playTone(200, 0.1, 'square', 0.06, 50);
}

// === GAME START/RESTART ===
function startGame() {
  state = 'map';
  score = 0;
  lives = 3;
  hp = maxHp;
  powerSuitActive = false;
  powerSuitTimer = 0;
  invincTimer = 0;
}

function enterSector(idx) {
  sectorIndex = idx;
  state = 'playing';
  generateSector(idx);
  hp = maxHp;
  powerSuitActive = false;
  boomerangs = [];
  bullets = [];
  throwCooldown = 0;
  deathTimer = 0;
}

// === NPC DIALOG ===
let dialogText = '';
let dialogTimer = 0;

function showDialog(text) {
  dialogText = text;
  dialogTimer = 3;
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (dialogTimer > 0) dialogTimer -= dt;

  if (state === 'title') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 2 === 0 && (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a)) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'map';
    }
    return;
  }

  if (state === 'map') {
    updateMap(dt);
    return;
  }

  if (state === 'playing') {
    updatePlaying(dt);
  }
}

// === MAP SCREEN ===
let mapCursor = 0;

function updateMap(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 5) % 6;
  }
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 1) % 6;
  }
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 5) % 6;
  }
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) {
    if (frame % 10 === 0) mapCursor = (mapCursor + 1) % 6;
  }
  if (keys['Space'] || keys['Enter'] || keys['KeyZ'] || tch.a) {
    if (frame % 10 === 0) {
      TAS.audio.ensureAudio();
      enterSector(mapCursor);
    }
  }
}

// === PLAYING STATE ===
function updatePlaying(dt) {
  const keys = TAS.input.keys;
  const tch = TAS.input.touch;

  // Timer
  sectorTimer -= dt;
  if (sectorTimer <= 0) {
    playerDie();
    return;
  }

  // Death animation
  if (deathTimer > 0) {
    deathTimer -= dt;
    pvy += GRAVITY * dt;
    py += pvy * dt;
    if (deathTimer <= 0) {
      if (lives <= 0) {
        if (score > highScore) {
          highScore = score;
          TAS.score.save('power_blade_hi', highScore);
        }
        state = 'gameOver';
      } else {
        px = 3 * TILE;
        py = ((SCREENS_Y - 1) * SECTOR_H + SECTOR_H - 4) * TILE;
        pvy = 0;
        hp = maxHp;
        invincTimer = 2;
      }
    }
    return;
  }

  // Invincibility
  if (invincTimer > 0) invincTimer -= dt;

  // Power suit timer
  if (powerSuitActive) {
    powerSuitTimer -= dt;
    if (powerSuitTimer <= 0) {
      powerSuitActive = false;
    }
  }

  // Throw cooldown
  if (throwCooldown > 0) throwCooldown -= dt;

  // === Player Movement ===
  let moveX = 0, moveY = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || tch.left) { moveX = -1; pFacing = -1; }
  if (keys['ArrowRight'] || keys['KeyD'] || tch.right) { moveX = 1; pFacing = 1; }
  if (keys['ArrowUp'] || keys['KeyW'] || tch.up) moveY = -1;
  if (keys['ArrowDown'] || keys['KeyS'] || tch.down) moveY = 1;

  pvx = moveX * PLAYER_SPEED;

  // Jump
  if ((keys['Space'] || keys['KeyZ'] || tch.a) && pGrounded) {
    pvy = JUMP_VEL;
    pGrounded = false;
    TAS.audio.playTone(280, 0.06, 'square', 0.05, 400);
  }

  // Throw / Shoot
  if (keys['KeyX'] || keys['ShiftLeft'] || tch.b) {
    let dirX = pFacing, dirY = 0;
    if (moveX !== 0 || moveY !== 0) {
      dirX = moveX || 0;
      dirY = moveY;
    }
    if (dirX === 0 && dirY === 0) dirX = pFacing;
    // Normalize
    const len = Math.sqrt(dirX * dirX + dirY * dirY);
    if (len > 0) { dirX /= len; dirY /= len; }

    if (powerSuitActive) {
      throwLaser(dirX, dirY);
    } else {
      throwBoomerang(dirX, dirY);
    }
  }

  // Apply gravity
  pvy += GRAVITY * dt;
  if (pvy > 500) pvy = 500;

  // Move X
  px += pvx * dt;
  // Collide X
  const pwid = 12, phgt = 20;
  const leftTile = Math.floor(px / TILE);
  const rightTile = Math.floor((px + pwid) / TILE);
  const topTile = Math.floor(py / TILE);
  const botTile = Math.floor((py + phgt - 1) / TILE);

  if (pvx < 0) {
    if (isSolid(leftTile, topTile) || isSolid(leftTile, botTile)) {
      px = (leftTile + 1) * TILE;
      pvx = 0;
    }
  } else if (pvx > 0) {
    if (isSolid(rightTile, topTile) || isSolid(rightTile, botTile)) {
      px = rightTile * TILE - pwid - 1;
      pvx = 0;
    }
  }

  // Move Y
  py += pvy * dt;
  pGrounded = false;

  const newTop = Math.floor(py / TILE);
  const newBot = Math.floor((py + phgt) / TILE);
  const newLeft = Math.floor(px / TILE);
  const newRight = Math.floor((px + pwid) / TILE);

  if (pvy > 0) {
    if (isSolid(newLeft, newBot) || isSolid(newRight, newBot) ||
        (isPlatform(newLeft, newBot) || isPlatform(newRight, newBot))) {
      py = newBot * TILE - phgt - 1;
      pvy = 0;
      pGrounded = true;
    }
  } else if (pvy < 0) {
    if (isSolid(newLeft, newTop) || isSolid(newRight, newTop)) {
      py = (newTop + 1) * TILE;
      pvy = 0;
    }
  }

  // Hazard check
  const hazLeft = Math.floor((px + 2) / TILE);
  const hazRight = Math.floor((px + pwid - 2) / TILE);
  const hazBot = Math.floor((py + phgt) / TILE);
  if (isHazard(hazLeft, hazBot) || isHazard(hazRight, hazBot)) {
    playerHit(2);
  }

  // Clamp to map
  if (px < TILE) px = TILE;
  if (px > (MAP_W - 2) * TILE) px = (MAP_W - 2) * TILE;
  if (py < TILE) py = TILE;
  if (py > (MAP_H - 2) * TILE) {
    playerDie();
    return;
  }

  pAnim += dt * (Math.abs(pvx) > 10 ? 8 : 2);

  // === Camera ===
  const targetCamX = px - GW / 2 + 8;
  const targetCamY = py - GH / 2 + 10;
  camX += (targetCamX - camX) * 0.08;
  camY += (targetCamY - camY) * 0.08;
  camX = TAS.math.clamp(camX, 0, MAP_W * TILE - GW);
  camY = TAS.math.clamp(camY, 0, MAP_H * TILE - GH);

  // === Update boomerangs ===
  for (let i = boomerangs.length - 1; i >= 0; i--) {
    const b = boomerangs[i];
    b.spin += dt * 15;

    if (!b.returning) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.dist += Math.sqrt(b.vx * b.vx + b.vy * b.vy) * dt;

      if (b.dist >= b.maxDist) {
        b.returning = true;
      }
      // Wall collision
      const btx = Math.floor(b.x / TILE);
      const bty = Math.floor(b.y / TILE);
      if (isSolid(btx, bty)) b.returning = true;
    }

    if (b.returning) {
      const dx = (px + 7) - b.x;
      const dy = (py + 10) - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 10) {
        boomerangs.splice(i, 1);
        continue;
      }
      const retSpeed = (BOOMERANG_BASE_SPEED + upgrades.speed * 60) * 1.3;
      b.vx = (dx / dist) * retSpeed;
      b.vy = (dy / dist) * retSpeed;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
    }

    // Trail
    b.trail.push({ x: b.x, y: b.y, life: 1 });
    if (b.trail.length > 8) b.trail.shift();
    for (let t = b.trail.length - 1; t >= 0; t--) {
      b.trail[t].life -= dt * 4;
      if (b.trail[t].life <= 0) b.trail.splice(t, 1);
    }

    // Timeout failsafe
    if (b.dist > b.maxDist * 4) {
      boomerangs.splice(i, 1);
    }
  }

  // === Update bullets ===
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }

    const btx = Math.floor(b.x / TILE);
    const bty = Math.floor(b.y / TILE);
    if (isSolid(btx, bty)) { bullets.splice(i, 1); continue; }

    // Friendly bullets hit enemies
    if (b.friendly) {
      for (const en of enemies) {
        if (!en.alive) continue;
        if (TAS.hit.rectOverlap(b.x - 2, b.y - 2, b.w || 4, b.h || 4, en.x, en.y, en.w, en.h)) {
          enemyHit(en, b.damage);
          bullets.splice(i, 1);
          break;
        }
      }
    } else {
      // Enemy bullets hit player
      if (TAS.hit.rectOverlap(b.x - 2, b.y - 2, 4, 4, px, py, 12, 20)) {
        playerHit(1);
        bullets.splice(i, 1);
      }
    }
  }

  // === Boomerang-enemy collision ===
  for (const b of boomerangs) {
    if (!b.alive) continue;
    for (const en of enemies) {
      if (!en.alive) continue;
      if (TAS.hit.rectOverlap(b.x - 6, b.y - 6, 12, 12, en.x, en.y, en.w, en.h)) {
        // Shielded enemies: only hit from behind
        if (en.shielded) {
          const hitFromBehind = (b.vx > 0 && en.dir < 0) || (b.vx < 0 && en.dir > 0);
          if (!hitFromBehind) continue;
        }
        enemyHit(en, b.damage);
        // Boomerang passes through on return for bonus hits
        if (!b.returning) {
          TAS.particles.spawn(b.x, b.y, '#ff0', 4, 2);
        }
      }
    }
    // Boss collision
    if (boss && boss.alive) {
      if (TAS.hit.rectOverlap(b.x - 6, b.y - 6, 12, 12, boss.x, boss.y, boss.w, boss.h)) {
        bossHit(b.damage);
      }
    }
  }

  // === Update enemies ===
  for (const en of enemies) {
    if (!en.alive) continue;
    en.anim += dt * 4;

    // Check if on screen (only update nearby)
    const dx = en.x - camX - GW / 2;
    const dy = en.y - camY - GH / 2;
    if (Math.abs(dx) > GW && Math.abs(dy) > GH) continue;

    if (en.fly) {
      en.x += en.speed * en.dir * dt;
      en.y += Math.sin(en.anim) * 30 * dt;
      if (Math.abs(en.x - en.startX) > 80) en.dir *= -1;
    } else if (en.speed > 0) {
      en.x += en.speed * en.dir * dt;
      // Turn at walls/edges
      const checkX = en.dir > 0 ? Math.floor((en.x + en.w + 2) / TILE) : Math.floor((en.x - 2) / TILE);
      const checkY = Math.floor((en.y + en.h) / TILE);
      if (isSolid(checkX, Math.floor(en.y / TILE)) || !isSolid(checkX, checkY + 1)) {
        en.dir *= -1;
      }
    }

    if (en.jumps) {
      en.jumpTimer += dt;
      if (en.jumpTimer > 2) {
        en.jumpTimer = 0;
        // Simple jump towards player
      }
    }

    if (en.shoots) {
      en.shootTimer += dt;
      if (en.shootTimer > 1.5) {
        en.shootTimer = 0;
        const angle = Math.atan2(py - en.y, px - en.x);
        bullets.push({
          x: en.x + en.w / 2,
          y: en.y + en.h / 2,
          vx: Math.cos(angle) * 120,
          vy: Math.sin(angle) * 120,
          friendly: false,
          damage: 1,
          life: 3,
          w: 4, h: 4,
          color: '#f44'
        });
      }
    }

    // Enemy touches player
    if (invincTimer <= 0 && deathTimer <= 0) {
      if (TAS.hit.rectOverlap(px, py, 12, 20, en.x, en.y, en.w, en.h)) {
        playerHit(1);
      }
    }
  }

  // === Boss update ===
  if (boss && boss.alive) {
    boss.timer += dt;
    boss.hitFlash = Math.max(0, boss.hitFlash - dt * 4);

    // Boss patterns
    switch (boss.pattern % 3) {
      case 0: // Horizontal movement + shooting
        boss.x += 60 * boss.dir * dt;
        if (boss.x < bossDoorX - 30 || boss.x > bossDoorX + 80) boss.dir *= -1;
        boss.shootTimer += dt;
        if (boss.shootTimer > 0.8) {
          boss.shootTimer = 0;
          const angle = Math.atan2(py - boss.y, px - boss.x);
          bullets.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
            vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150,
            friendly: false, damage: 2, life: 3, w: 6, h: 6, color: '#f80'
          });
          TAS.audio.playTone(100, 0.15, 'sawtooth', 0.04);
        }
        break;
      case 1: // Jump + slam
        boss.vy += 400 * dt;
        boss.y += boss.vy * dt;
        if (boss.y > bossDoorY + 60) {
          boss.y = bossDoorY + 60;
          boss.vy = 0;
          if (boss.timer > 2) {
            boss.vy = -250;
            boss.timer = 0;
            TAS.fx.shake(4, 0.85);
            // Spawn shockwave bullets
            for (let a = 0; a < 4; a++) {
              bullets.push({
                x: boss.x + boss.w / 2, y: boss.y + boss.h,
                vx: (a - 1.5) * 80, vy: -60,
                friendly: false, damage: 1, life: 1.5, w: 5, h: 5, color: '#f60'
              });
            }
          }
        }
        break;
      case 2: // Spiral shooting
        boss.x += Math.sin(boss.timer * 2) * 50 * dt;
        boss.y += Math.cos(boss.timer * 1.5) * 30 * dt;
        boss.y = TAS.math.clamp(boss.y, bossDoorY - 20, bossDoorY + 70);
        boss.shootTimer += dt;
        if (boss.shootTimer > 0.4) {
          boss.shootTimer = 0;
          const angle = boss.timer * 3;
          bullets.push({
            x: boss.x + boss.w / 2, y: boss.y + boss.h / 2,
            vx: Math.cos(angle) * 100, vy: Math.sin(angle) * 100,
            friendly: false, damage: 1, life: 2, w: 5, h: 5, color: '#fa0'
          });
        }
        break;
    }

    // Change pattern at half HP
    if (boss.hp <= boss.maxHp / 2 && boss.phase === 0) {
      boss.phase = 1;
      boss.pattern = (boss.pattern + 1) % 3;
      TAS.fx.flash('#f00', 0.4);
    }

    // Boss touches player
    if (invincTimer <= 0 && deathTimer <= 0) {
      if (TAS.hit.rectOverlap(px, py, 12, 20, boss.x, boss.y, boss.w, boss.h)) {
        playerHit(2);
      }
    }
  }

  // === Item collection ===
  for (const item of items) {
    if (item.collected) continue;
    if (TAS.hit.rectOverlap(px, py, 12, 20, item.x, item.y, item.w, item.h)) {
      item.collected = true;
      collectItem(item);
    }
  }

  // === NPC interaction ===
  for (const npc of npcs) {
    if (npc.talked) continue;
    if (TAS.hit.rectOverlap(px - 10, py - 10, 32, 40, npc.x, npc.y, 14, 20)) {
      if (keys['ArrowUp'] || keys['KeyW'] || tch.up) {
        npc.talked = true;
        showDialog(npc.hint);
        TAS.audio.playTone(440, 0.05, 'sine', 0.06);
        TAS.audio.playTone(550, 0.05, 'sine', 0.06);
      }
    }
  }

  // === Boss door check ===
  if (keycardFound && !bossActive) {
    if (TAS.hit.rectOverlap(px, py, 12, 20, bossDoorX - 8, bossDoorY - 8, 32, 40)) {
      spawnBoss(sectorIndex);
      TAS.audio.playMelody([[200, 0.15], [150, 0.15], [100, 0.3]], 200);
      TAS.fx.flash('#f00', 0.3);
    }
  }

  // === Boss defeated check ===
  if (boss && !boss.alive) {
    sectorCleared[sectorIndex] = true;
    score += 2000;
    saveProgress();
    TAS.fx.flash('#fff', 0.5);
    TAS.fx.shake(8, 0.9);
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.3]], 100);

    // Check if all sectors cleared
    if (sectorCleared.every(Boolean)) {
      state = 'victory';
    } else {
      state = 'map';
    }
  }
}

function collectItem(item) {
  TAS.audio.playTone(880, 0.08, 'sine', 0.07);
  TAS.particles.spawn(item.x, item.y, '#ff0', 8, 3);

  if (item.type === 'keycard') {
    keycardFound = true;
    showDialog('KEYCARD ACQUIRED! Find the boss door!');
    TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.15]], 100);
  } else if (item.type === 'powersuit') {
    powerSuitActive = true;
    powerSuitTimer = POWER_SUIT_DURATION;
    hp = maxHp;
    showDialog('POWER SUIT ACTIVATED! 30 seconds!');
    TAS.fx.flash('#0ff', 0.3);
    TAS.audio.playMelody([[300, 0.08], [600, 0.08], [900, 0.08], [1200, 0.15]], 80);
  } else if (item.type === 'energy') {
    maxHp = Math.min(maxHp + 1, 10);
    hp = maxHp;
    showDialog('+1 MAX HP!');
  } else if (item.type === '1up') {
    lives++;
    showDialog('1-UP!');
    TAS.audio.playMelody([[523, 0.06], [659, 0.06], [784, 0.06], [1047, 0.12]], 70);
  } else if (item.type.startsWith('upgrade_')) {
    const stat = item.type.split('_')[1];
    upgrades[stat] = Math.min(upgrades[stat] + 1, 3);
    showDialog(stat.toUpperCase() + ' UPGRADED!');
    saveProgress();
    TAS.audio.playMelody([[400, 0.06], [500, 0.06], [600, 0.06], [800, 0.12]], 80);
  }
}

function playerHit(damage) {
  if (invincTimer > 0 || deathTimer > 0) return;
  if (powerSuitActive) damage = Math.max(1, damage - 1);
  hp -= damage;
  invincTimer = 1.5;
  TAS.fx.flash('#f00', 0.25);
  TAS.fx.shake(4, 0.88);
  TAS.audio.playTone(150, 0.15, 'sawtooth', 0.08, 50);

  if (hp <= 0) {
    playerDie();
  }
}

function playerDie() {
  lives--;
  deathTimer = 1.5;
  pvy = -200;
  TAS.audio.playMelody([[400, 0.1], [300, 0.1], [200, 0.1], [100, 0.3]], 120);
  TAS.particles.spawn(px + 6, py + 10, '#f44', 20, 4, { gravity: 2 });
}

function enemyHit(en, damage) {
  en.hp -= damage;
  TAS.particles.spawn(en.x + en.w / 2, en.y + en.h / 2, '#ff0', 5, 2);
  TAS.audio.playTone(300, 0.05, 'square', 0.05, 100);

  if (en.hp <= 0) {
    en.alive = false;
    score += en.score;
    TAS.particles.spawn(en.x + en.w / 2, en.y + en.h / 2, '#f80', 12, 3, { gravity: 1 });
    TAS.audio.playTone(200, 0.12, 'sawtooth', 0.06, 50);
  }
}

function bossHit(damage) {
  boss.hp -= damage;
  boss.hitFlash = 1;
  TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff0', 8, 3);
  TAS.fx.shake(2, 0.9);
  TAS.audio.playTone(250, 0.08, 'square', 0.06, 100);

  if (boss.hp <= 0) {
    boss.alive = false;
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#f80', 30, 5, { gravity: 1.5 });
    TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff0', 20, 4);
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Sectors: ' + sectorCleared.filter(Boolean).length + '/6' });
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  if (state === 'map') {
    drawMap();
    return;
  }

  if (state === 'playing') {
    drawPlaying();
  }
}

// === DRAW TITLE ===
function drawTitle() {
  // Background circuit pattern
  ctx.strokeStyle = '#1a3a2a';
  ctx.lineWidth = 1;
  for (let i = 0; i < 20; i++) {
    const x = ((frame * 0.3 + i * 50) % (GW + 100)) - 50;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + 30, GH / 2);
    ctx.lineTo(x - 20, GH);
    ctx.stroke();
  }

  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('POWER BLADE', GW / 2 + 2, 72);
  ctx.fillStyle = '#22ddff';
  ctx.fillText('POWER BLADE', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, 92);

  // Boomerang icon spinning
  ctx.save();
  ctx.translate(GW / 2, 150);
  ctx.rotate(frame * 0.08);
  drawBoomerangShape(0, 0, 20, '#22ddff');
  ctx.restore();

  // Info
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Arrows/WASD: Move | Z/Space: Jump | X/Shift: Throw', GW / 2, 210);
  ctx.fillText('Hold direction + Throw for 8-way aim', GW / 2, 225);

  // Start prompt
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 40);
  ctx.globalAlpha = 1;

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH - 20);
  }
}

// === DRAW MAP ===
function drawMap() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SELECT SECTOR', GW / 2, 30);

  // Draw sectors as a grid (2 rows of 3)
  for (let i = 0; i < 6; i++) {
    const col = i % 3;
    const row = Math.floor(i / 3);
    const bx = 60 + col * 140;
    const by = 60 + row * 110;
    const bw = 120, bh = 90;

    const selected = i === mapCursor;
    const cleared = sectorCleared[i];

    // Box
    ctx.fillStyle = selected ? SECTORS[i].color + '44' : '#1a1a2a';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = selected ? SECTORS[i].color : (cleared ? '#4a4' : '#444');
    ctx.lineWidth = selected ? 2 : 1;
    ctx.strokeRect(bx, by, bw, bh);

    // Name
    ctx.fillStyle = SECTORS[i].color;
    ctx.font = 'bold 9px monospace';
    ctx.fillText(SECTORS[i].name, bx + bw / 2, by + 20);

    // Status
    if (cleared) {
      ctx.fillStyle = '#4f4';
      ctx.font = '10px monospace';
      ctx.fillText('CLEARED', bx + bw / 2, by + 50);
    } else {
      // Mini icon
      ctx.fillStyle = '#666';
      ctx.font = '9px monospace';
      ctx.fillText('SECTOR ' + (i + 1), bx + bw / 2, by + 50);
    }

    // Selector arrow
    if (selected) {
      const bounce = Math.sin(frame * 0.1) * 3;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(bx + bw / 2, by - 8 + bounce);
      ctx.lineTo(bx + bw / 2 - 6, by - 16 + bounce);
      ctx.lineTo(bx + bw / 2 + 6, by - 16 + bounce);
      ctx.fill();
    }
  }

  // Upgrades display
  ctx.textAlign = 'left';
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.fillText('RNG:' + upgrades.range + ' PWR:' + upgrades.power + ' SPD:' + upgrades.speed + ' MLT:' + upgrades.multi, 10, GH - 10);

  ctx.textAlign = 'right';
  ctx.fillText('Lives: ' + lives + '  HP: ' + hp + '/' + maxHp, GW - 10, GH - 10);

  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW PLAYING ===
function drawPlaying() {
  const sector = SECTORS[sectorIndex];
  ctx.fillStyle = sector.bg;
  ctx.fillRect(0, 0, GW, GH);

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camX), -Math.floor(camY));

  // Draw tiles
  const startX = Math.floor(camX / TILE);
  const startY = Math.floor(camY / TILE);
  const endX = Math.min(startX + Math.ceil(GW / TILE) + 2, MAP_W);
  const endY = Math.min(startY + Math.ceil(GH / TILE) + 2, MAP_H);

  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      if (y < 0 || y >= MAP_H || x < 0 || x >= MAP_W) continue;
      const t = tiles[y][x];
      if (t === 0) continue;

      const tx = x * TILE;
      const ty = y * TILE;

      if (t === 1) {
        // Solid tile - high-tech look
        ctx.fillStyle = '#2a2a3a';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.strokeStyle = sector.color + '40';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        // Neon accent lines
        if ((x + y) % 4 === 0) {
          ctx.fillStyle = sector.color + '30';
          ctx.fillRect(tx + 2, ty + TILE / 2 - 1, TILE - 4, 2);
        }
      } else if (t === 2) {
        // Platform
        ctx.fillStyle = '#3a3a4a';
        ctx.fillRect(tx, ty, TILE, 4);
        ctx.fillStyle = sector.color + '60';
        ctx.fillRect(tx, ty, TILE, 2);
      } else if (t === 3) {
        // Hazard
        ctx.fillStyle = '#440000';
        ctx.fillRect(tx, ty, TILE, TILE);
        const hFlicker = Math.sin(frame * 0.2 + x) * 0.3 + 0.7;
        ctx.globalAlpha = hFlicker;
        ctx.fillStyle = '#ff2200';
        ctx.fillRect(tx + 2, ty + 2, TILE - 4, TILE - 4);
        ctx.globalAlpha = 1;
      } else if (t === 4) {
        // Boss door
        ctx.fillStyle = keycardFound ? '#442200' : '#222';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.strokeStyle = keycardFound ? '#ff0' : '#444';
        ctx.lineWidth = 1;
        ctx.strokeRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        if (keycardFound) {
          ctx.fillStyle = '#ff0';
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('!', tx + TILE / 2, ty + TILE / 2 + 3);
        }
      }
    }
  }

  // Draw items
  for (const item of items) {
    if (item.collected) continue;
    const ix = item.x, iy = item.y + Math.sin(frame * 0.05 + item.x) * 3;

    if (item.type === 'keycard') {
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ix, iy, 12, 8);
      ctx.fillStyle = '#aa0';
      ctx.fillRect(ix + 8, iy + 2, 4, 4);
    } else if (item.type === 'powersuit') {
      ctx.fillStyle = '#0ff';
      ctx.fillRect(ix + 2, iy, 12, 16);
      ctx.fillStyle = '#088';
      ctx.fillRect(ix + 4, iy + 2, 8, 4);
      ctx.fillStyle = '#0ff';
      ctx.fillRect(ix, iy + 4, 16, 8);
    } else if (item.type === 'energy') {
      ctx.fillStyle = '#4f4';
      ctx.fillRect(ix + 2, iy, 8, 14);
      ctx.fillStyle = '#2a2';
      ctx.fillRect(ix + 4, iy + 2, 4, 10);
      ctx.fillStyle = '#8f8';
      ctx.fillRect(ix + 3, iy + 1, 6, 3);
    } else if (item.type === '1up') {
      ctx.fillStyle = '#f4f';
      ctx.beginPath();
      ctx.arc(ix + 6, iy + 6, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('1', ix + 6, iy + 9);
    } else if (item.type.startsWith('upgrade_')) {
      ctx.fillStyle = '#fa0';
      ctx.fillRect(ix, iy, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      const letter = item.type.split('_')[1][0].toUpperCase();
      ctx.fillText(letter, ix + 6, iy + 9);
    }
  }

  // Draw NPCs
  for (const npc of npcs) {
    ctx.fillStyle = '#4488ff';
    ctx.fillRect(npc.x + 3, npc.y, 8, 20);
    ctx.fillStyle = '#88bbff';
    ctx.fillRect(npc.x + 4, npc.y + 2, 6, 6);
    // Exclamation if not talked
    if (!npc.talked) {
      const bob = Math.sin(frame * 0.1) * 2;
      ctx.fillStyle = '#ff0';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', npc.x + 7, npc.y - 4 + bob);
    }
  }

  // Draw enemies
  for (const en of enemies) {
    if (!en.alive) continue;
    drawEnemy(en);
  }

  // Draw boss
  if (boss && boss.alive) {
    drawBoss();
  }

  // Draw boomerangs
  for (const b of boomerangs) {
    // Trail
    for (const t of b.trail) {
      ctx.globalAlpha = t.life * 0.5;
      ctx.fillStyle = '#22ddff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Boomerang
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.spin);
    drawBoomerangShape(0, 0, 7, b.returning ? '#44ffaa' : '#22ddff');
    ctx.restore();

    // Glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = b.returning ? '#44ffaa' : '#22ddff';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Draw bullets
  for (const b of bullets) {
    ctx.fillStyle = b.color || '#f44';
    ctx.beginPath();
    ctx.arc(b.x, b.y, (b.w || 4) / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw player
  if (deathTimer <= 0 || Math.floor(frame * 0.5) % 2 === 0) {
    drawPlayer();
  }

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Dialog
  if (dialogTimer > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(20, GH - 60, GW - 40, 40);
    ctx.strokeStyle = SECTORS[sectorIndex].color;
    ctx.lineWidth = 1;
    ctx.strokeRect(20, GH - 60, GW - 40, 40);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dialogText, GW / 2, GH - 36);
  }

  TAS.input.drawTouchControls(GW, GH);
}

function drawPlayer() {
  const blinkVisible = invincTimer <= 0 || Math.floor(frame * 0.3) % 2 === 0;
  if (!blinkVisible) return;

  const x = px, y = py;

  if (powerSuitActive) {
    // Power suit - bulkier, glowing
    ctx.fillStyle = '#00aaff';
    ctx.fillRect(x, y, 14, 20);
    ctx.fillStyle = '#0066cc';
    ctx.fillRect(x + 2, y + 2, 10, 6);
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(x + 4, y + 3, 3, 3);
    ctx.fillRect(x + pFacing > 0 ? x + 10 : x - 4, y + 8, 6, 4);
    // Glow effect
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.15) * 0.1;
    ctx.fillStyle = '#00ffff';
    ctx.beginPath();
    ctx.arc(x + 7, y + 10, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    // Normal baseling agent
    // Body
    ctx.fillStyle = '#44aa88';
    ctx.fillRect(x + 2, y + 6, 8, 10);
    // Head
    ctx.fillStyle = '#66ccaa';
    ctx.fillRect(x + 3, y, 7, 7);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + (pFacing > 0 ? 7 : 4), y + 2, 2, 2);
    // Legs
    const legOff = Math.sin(pAnim) * 2;
    ctx.fillStyle = '#338866';
    ctx.fillRect(x + 3, y + 16, 3, 4 + (pGrounded ? 0 : legOff));
    ctx.fillRect(x + 7, y + 16, 3, 4 - (pGrounded ? 0 : legOff));
    // Arm (throwing side)
    ctx.fillStyle = '#44aa88';
    ctx.fillRect(x + (pFacing > 0 ? 9 : -1), y + 8, 4, 3);
  }
}

function drawEnemy(en) {
  const x = en.x, y = en.y;
  ctx.fillStyle = '#aa2222';

  switch (en.type) {
    case 'drone':
      ctx.fillStyle = '#666';
      ctx.fillRect(x + 2, y + 4, 10, 6);
      ctx.fillStyle = '#f44';
      ctx.fillRect(x, y + 2, 14, 3);
      // Propeller
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x + 3 + Math.sin(en.anim * 3) * 3, y, 8, 2);
      break;
    case 'soldier':
      ctx.fillStyle = '#884444';
      ctx.fillRect(x + 2, y + 4, 10, 14);
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(x + 3, y, 8, 6);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x + (en.dir > 0 ? 8 : 3), y + 2, 2, 2);
      ctx.fillStyle = '#666';
      ctx.fillRect(x + (en.dir > 0 ? 11 : -3), y + 8, 5, 2);
      break;
    case 'turret':
      ctx.fillStyle = '#555';
      ctx.fillRect(x, y + 8, 16, 8);
      ctx.fillStyle = '#888';
      const gunAngle = Math.atan2(py - en.y, px - en.x);
      ctx.save();
      ctx.translate(x + 8, y + 8);
      ctx.rotate(gunAngle);
      ctx.fillRect(0, -2, 12, 4);
      ctx.restore();
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(x + 8, y + 8, 4, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'roller':
      ctx.fillStyle = '#777';
      const rollAnim = en.anim * 2;
      ctx.save();
      ctx.translate(x + 8, y + 6);
      ctx.rotate(rollAnim);
      ctx.fillRect(-7, -5, 14, 10);
      ctx.fillStyle = '#f80';
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
      break;
    case 'mech':
      ctx.fillStyle = '#556';
      ctx.fillRect(x + 2, y, 14, 12);
      ctx.fillStyle = '#778';
      ctx.fillRect(x + 4, y + 12, 4, 12);
      ctx.fillRect(x + 10, y + 12, 4, 12);
      ctx.fillStyle = '#f00';
      ctx.fillRect(x + 5, y + 3, 3, 3);
      ctx.fillRect(x + 10, y + 3, 3, 3);
      break;
    case 'shielded':
      // Shield on facing side
      const shieldX = en.dir > 0 ? x + 12 : x - 4;
      ctx.fillStyle = '#44f';
      ctx.globalAlpha = 0.6 + Math.sin(en.anim) * 0.2;
      ctx.fillRect(shieldX, y, 4, 22);
      ctx.globalAlpha = 1;
      // Body
      ctx.fillStyle = '#664444';
      ctx.fillRect(x + 2, y + 2, 12, 18);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(x + (en.dir > 0 ? 9 : 4), y + 5, 2, 2);
      break;
    case 'scout':
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(x + 6, y);
      ctx.lineTo(x + 12, y + 6);
      ctx.lineTo(x + 6, y + 12);
      ctx.lineTo(x, y + 6);
      ctx.fill();
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(x + 6, y + 6, 3, 0, Math.PI * 2);
      ctx.fill();
      break;
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const x = boss.x, y = boss.y;

  // Flash on hit
  if (boss.hitFlash > 0) {
    ctx.globalAlpha = 0.5 + boss.hitFlash * 0.5;
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 2, y - 2, boss.w + 4, boss.h + 4);
    ctx.globalAlpha = 1;
  }

  // Main body
  ctx.fillStyle = '#553333';
  ctx.fillRect(x + 4, y + 4, 40, 40);
  ctx.fillStyle = '#aa4444';
  ctx.fillRect(x + 8, y + 8, 32, 32);

  // Core
  const coreGlow = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = coreGlow;
  ctx.fillStyle = SECTORS[sectorIndex].color;
  ctx.beginPath();
  ctx.arc(x + 24, y + 24, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Eyes
  ctx.fillStyle = '#ff0';
  ctx.fillRect(x + 14, y + 14, 6, 6);
  ctx.fillRect(x + 28, y + 14, 6, 6);

  // Armaments
  ctx.fillStyle = '#666';
  ctx.fillRect(x - 4, y + 16, 8, 16);
  ctx.fillRect(x + 44, y + 16, 8, 16);

  // HP bar
  ctx.fillStyle = '#400';
  ctx.fillRect(x, y - 10, boss.w, 5);
  ctx.fillStyle = '#f44';
  ctx.fillRect(x, y - 10, boss.w * (boss.hp / boss.maxHp), 5);

  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, x + boss.w / 2, y - 14);
}

function drawBoomerangShape(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x - size, y);
  ctx.quadraticCurveTo(x, y - size * 0.4, x + size, y - size * 0.3);
  ctx.quadraticCurveTo(x + size * 0.5, y, x, y);
  ctx.quadraticCurveTo(x, y + size * 0.4, x - size * 0.3, y + size);
  ctx.quadraticCurveTo(x - size * 0.3, y + size * 0.3, x - size, y);
  ctx.fill();
  // Highlight
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(x - size * 0.3, y - size * 0.1, size * 0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.8)';
  ctx.fillRect(0, 0, GW, 28);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(4, 4, maxHp * 18 + 4, 12);
  for (let i = 0; i < maxHp; i++) {
    ctx.fillStyle = i < hp ? (powerSuitActive ? '#00ccff' : '#44dd44') : '#222';
    ctx.fillRect(6 + i * 18, 6, 16, 8);
  }

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('SCORE: ' + score, GW - 6, 14);

  // Lives
  ctx.textAlign = 'left';
  ctx.fillStyle = '#88ff88';
  ctx.fillText('x' + lives, GW - 80, 14);

  // Sector name
  ctx.fillStyle = SECTORS[sectorIndex].color;
  ctx.textAlign = 'center';
  ctx.font = '8px monospace';
  ctx.fillText(SECTORS[sectorIndex].name, GW / 2, 24);

  // Timer
  const timeLeft = Math.ceil(sectorTimer);
  ctx.fillStyle = timeLeft < 30 ? '#f44' : '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(timeLeft / 60) + ':' + String(timeLeft % 60).padStart(2, '0'), GW - 6, 24);

  // Keycard indicator
  if (keycardFound) {
    ctx.fillStyle = '#ff0';
    ctx.textAlign = 'left';
    ctx.fillText('KEY', 6, 24);
  }

  // Power suit timer
  if (powerSuitActive) {
    ctx.fillStyle = '#0ff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('POWER: ' + Math.ceil(powerSuitTimer) + 's', GW / 2, GH - 8);
  }
}

function drawVictory() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#44ffaa';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('MISSION COMPLETE!', GW / 2, 80);

  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('All sectors cleared!', GW / 2, 120);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('FINAL SCORE: ' + score, GW / 2, 160);

  if (score >= highScore && score > 0) {
    const pulse = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 190);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('Upgrades: RNG ' + upgrades.range + ' | PWR ' + upgrades.power + ' | SPD ' + upgrades.speed + ' | MLT ' + upgrades.multi, GW / 2, 220);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 40);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
</body>
