<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Olympics</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single-player (default 0.8–1.6 band). The *Scale() helpers read statB.* D&D fields, which
// are synthesized from the clamped mults in recomputeStats() (option b in REMASTER-GUIDE) so a
// title-screen character change takes effect and every gameplay number traces back to a clamped
// value. Athletics wiring: STR<-damage (throw/jump power), DEX<-moveSpeed (run speed), CON<-
// health (stamina), INT/WIS/CHA<-luck (score/timing/crowd). The long-jump pit is a landing zone,
// not a swim section, so SWM is untouched.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) { var _b = NftLoader.getStatBonuses(); if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; } } }
catch (e) { console.warn('[baseling-olympics] NftLoader display info failed:', e && e.message); }

// Stat scaling helpers (stat 10 = baseline 1.0, each point = +5%)
function statScale(stat) { return 0.5 + stat * 0.05; }
function strScale() { return statScale(statB.str); }   // STR: throw power, jump distance
function dexScale() { return statScale(statB.dex); }   // DEX: run speed, hurdle agility
function conScale() { return statScale(statB.con); }   // CON: stamina, recovery, extra attempts
function intScale() { return statScale(statB.int); }   // INT: score multiplier, analysis
function wisScale() { return statScale(statB.wis); }   // WIS: timing windows, aim stability
function chaScale() { return statScale(statB.cha); }   // CHA: luck, crowd favor, wind reduction

// Map a clamped mult to the 1–20+ D&D scale centered on 10 (neutral = mult 1.0).
function dndFromMult(m) { return Math.max(1, Math.round(10 + (m - 1) * 25)); }

function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  statB.str = dndFromMult(m.damage); statB.dex = dndFromMult(m.moveSpeed); statB.con = dndFromMult(m.health);
  statB.int = dndFromMult(m.luck);   statB.wis = dndFromMult(m.luck);      statB.cha = dndFromMult(m.luck);
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) { statB.name = sel.charName || statB.name; statB.level = (typeof sel.stage === 'number' ? sel.stage : statB.level); }
}

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;

// === INIT ===
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'LEFT', b: 'RIGHT', c: 'PICK' } });

recomputeStats();
var picking = false; // baseling character-select overlay open
if (window.TAS && TAS.player) {
  TAS.player.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[baseling-olympics] player init failed:', e && e.message); });
}

// === COLORS ===
const COL = {
  track: '#7a444a', trackLine: '#fff', grass: '#38d973', sky: '#3cacd7',
  crowd1: '#a855f7', crowd2: '#3cacd7', crowd3: '#38d973', crowd4: '#f4b41b',
  gold: '#f4b41b', silver: '#c0c0c0', bronze: '#cd7f32',
  sand: '#e8d090', water: '#3cacd7', target: '#fff',
  bar: '#888', pole: '#666', mat: '#a855f7',
  spore: '#38d973', mycelium: '#a855f7', reactor: '#e6482e',
  fungal: '#38d973', toxin: '#a855f7', moss: '#2a6e3f'
};

// === ATHLETE COLORS (4 baseling competitors) ===
const ATHLETE_COLORS = [
  { body: statB.color, shorts: '#226644', name: statB.name },
  { body: '#e6482e', shorts: '#7a2218', name: 'SPORELING' },
  { body: '#3cacd7', shorts: '#1e566b', name: 'MOLDHOPPER' },
  { body: '#a855f7', shorts: '#542a7b', name: 'POOPFLING' }
];

// === STADIUM THEMES (one per event pair) ===
const STADIUMS = [
  { name: 'Garden Stadium', sky: '#3cacd7', ground: '#7a444a', accent: '#38d973', crowd: '#38d973' },
  { name: 'Spore Dome', sky: '#2a1a3e', ground: '#a855f7', accent: '#c084fc', crowd: '#a855f7' },
  { name: 'POOP Pit Arena', sky: '#1a1c2c', ground: '#7a444a', accent: '#e6482e', crowd: '#e6482e' },
  { name: 'Mycelium Colosseum', sky: '#0e2a1a', ground: '#2a6e3f', accent: '#38d973', crowd: '#38d973' }
];
function getStadium(idx) { return STADIUMS[Math.floor(idx / 2) % STADIUMS.length]; }

// === EVENT DEFINITIONS ===
const EVENTS = [
  { name: 'SPORE SPRINT', type: 'dash', desc: 'Dash through the garden track!' },
  { name: 'MYCELIUM LEAP', type: 'longjump', desc: 'Launch over the compost pit!' },
  { name: 'POOP JAVELIN', type: 'javelin', desc: 'Hurl the POOP spear!' },
  { name: 'GARDEN HURDLES', type: 'hurdles', desc: 'Leap the mushroom barriers!' },
  { name: 'POOP HAMMER', type: 'hammer', desc: 'Spin the POOP boulder!' },
  { name: 'CANOPY VAULT', type: 'highjump', desc: 'Clear the garden canopy bar!' },
  { name: 'SEED ARCHERY', type: 'archery', desc: 'Pierce the target with spore seeds!' },
  { name: 'GARDEN MARATHON', type: 'endurance', desc: 'Survive the garden circuit!' }
];

// === SPORE OBSTACLES (track hazards) ===
const SPORE_TYPES = [
  { name: 'Puffball', color: '#38d973', effect: 'slow', strength: 0.3 },
  { name: 'POOP Pile', color: '#7a444a', effect: 'slip', strength: 0.5 },
  { name: 'Garden Boost', color: '#e6482e', effect: 'boost', strength: 1.5 },
  { name: 'Seed Patch', color: '#2a6e3f', effect: 'stamina', strength: 10 }
];

// === BOSS CHALLENGE DATA ===
const BOSS_EVENTS = {
  dash: { name: 'GARDEN CHAMPION', color: '#e6482e', speedMult: 1.3 },
  longjump: { name: 'COMPOST TITAN', color: '#a855f7', distMult: 1.4 },
  javelin: { name: 'POOP LORD', color: '#7a444a', distMult: 1.5 },
  hammer: { name: 'SPORE GOLEM', color: '#a855f7', distMult: 1.4 },
  archery: { name: 'SEED SNIPER', color: '#38d973', scoreMult: 1.3 }
};

// === SCORE POPUP SYSTEM ===
let scorePopups = [];
function addScorePopup(x, y, text, color) {
  scorePopups.push({ x: x, y: y, text: text, color: color || '#ffdd44', life: 60, maxLife: 60 });
}
function updateScorePopups() {
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 0.8;
    scorePopups[i].life--;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }
}
function drawScorePopups() {
  for (const p of scorePopups) {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// === WEATHER SYSTEM ===
let weather = { type: 'clear', particles: [], wind: 0, intensity: 0 };
function initWeather() {
  const roll = Math.random();
  if (roll < 0.3) { weather = { type: 'sporefall', particles: [], wind: (Math.random() - 0.5) * 2, intensity: 0.6 }; }
  else if (roll < 0.5) { weather = { type: 'mist', particles: [], wind: 0, intensity: 0.3 }; }
  else { weather = { type: 'clear', particles: [], wind: 0, intensity: 0 }; }
}
function drawWeather() {
  if (weather.type === 'sporefall') {
    ctx.globalAlpha = 0.4;
    for (let i = 0; i < 15; i++) {
      const x = (frame * 1.5 + i * 37 + weather.wind * frame) % GW;
      const y = (frame * 0.8 + i * 23) % GH;
      ctx.fillStyle = i % 3 === 0 ? COL.spore : (i % 3 === 1 ? COL.mycelium : '#aacc66');
      ctx.beginPath();
      ctx.arc(x, y, 1.5 + Math.sin(frame * 0.05 + i) * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (weather.type === 'mist') {
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#aabbcc';
    for (let i = 0; i < 5; i++) {
      const x = (frame * 0.3 + i * 100) % (GW + 200) - 100;
      ctx.fillRect(x, 60 + i * 40, 200, 30);
    }
    ctx.globalAlpha = 1;
  }
}

// === TUTORIAL SYSTEM ===
let tutorialSeen = false;
let tutorialTimer = 0;
let showTutorial = false;
function checkTutorial() {
  try {
    tutorialSeen = localStorage.getItem('baseling_olympics_tutorial') === '1';
  } catch(e) { tutorialSeen = false; }
}
function markTutorialSeen() {
  tutorialSeen = true;
  try { localStorage.setItem('baseling_olympics_tutorial', '1'); } catch(e) { /* ok */ }
}
function drawTutorial(eventType) {
  if (!showTutorial) return;
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(20, 20, GW - 40, GH - 40);
  ctx.strokeStyle = COL.spore;
  ctx.lineWidth = 2;
  ctx.strokeRect(22, 22, GW - 44, GH - 44);
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('HOW TO PLAY', GW / 2, 50);
  ctx.fillStyle = '#ddd';
  ctx.font = '11px monospace';
  const lines = getTutorialLines(eventType);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], GW / 2, 80 + i * 18);
  }
  // Stat display
  ctx.fillStyle = COL.spore;
  ctx.font = '10px monospace';
  ctx.fillText('Your Stats: STR ' + statB.str + ' DEX ' + statB.dex + ' CON ' + statB.con +
    ' INT ' + statB.int + ' WIS ' + statB.wis + ' CHA ' + statB.cha, GW / 2, GH - 70);
  ctx.fillStyle = '#888';
  ctx.fillText('Level ' + statB.level + ' ' + statB.name, GW / 2, GH - 55);
  const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 30);
  ctx.globalAlpha = 1;
}
function getTutorialLines(type) {
  switch (type) {
    case 'dash': return [
      'Alternate A and B rapidly to run!',
      'DEX boosts your max speed.',
      'CHA gives you a better start position.',
      'Don\'t press before GO or you\'ll false start!',
      'Beat all 3 opponents to win gold.'
    ];
    case 'longjump': return [
      'Mash A+B to build runway speed.',
      'Hold JUMP at the line, release for angle.',
      'STR increases your jump distance.',
      'WIS gives you a wider timing window.',
      'Don\'t cross the foul line!'
    ];
    case 'javelin': return [
      'Mash to build run-up speed.',
      'Press JUMP to enter angle mode.',
      'Release at optimal angle for best throw.',
      'STR boosts throw power enormously.',
      'WIS slows the angle selector.'
    ];
    case 'hurdles': return [
      'Mash A+B to run between hurdles.',
      'Press SPACE/JUMP to leap over them.',
      'DEX makes you faster between hurdles.',
      'CON reduces the penalty for hitting one.',
      'Watch for POOP piles on the track!'
    ];
    case 'hammer': return [
      'Press A rhythmically to build spin.',
      'Press B to release the hammer.',
      'STR gives more momentum per press.',
      'WIS widens the rhythm tolerance.',
      'Steady rhythm = more power!'
    ];
    case 'highjump': return [
      'Mash to approach the bar.',
      'Press JUMP at the bar to take off.',
      'Then MASH to arch over the bar!',
      'STR boosts your vertical leap.',
      'CON gives you extra attempts (up to 5).'
    ];
    case 'archery': return [
      'UP/DOWN to aim the crosshair.',
      'Press JUMP/A to fire an arrow.',
      'WIS stabilizes your aim greatly.',
      'CHA reduces wind interference.',
      'INT multiplies your score! Max 30pts.'
    ];
    case 'endurance': return [
      'Mash to SPRINT (drains stamina).',
      'Stop mashing to JOG (recovers stamina).',
      'CON gives you much more stamina.',
      'DEX boosts your jogging speed.',
      'Manage your pace over 3 laps!'
    ];
    default: return [];
  }
}
checkTutorial();

// === GAME STATE ===
let state = 'title';
let frame = 0;
let eventIndex = 0;
let eventState = 'intro'; // intro, tutorial, ready, active, result
let eventTimer = 0;
let scores = [0, 0, 0, 0]; // total scores for 4 baselings
let lastKeyA = false, lastKeyB = false;
let mashCount = 0;
let mashRate = 0;
let mashHistory = [];
let worldRecords = {};
let crowdNoise = 0;
let crowdCheer = 0;
let bossMode = false;
let bossDefeated = false;

// Track-specific spore obstacles per event
let trackSpores = [];

// Event-specific state
let ev = {};

// Load world records
function loadRecords() {
  try {
    const data = localStorage.getItem('baseling_olympics_records');
    if (data) worldRecords = JSON.parse(data);
  } catch(e) { worldRecords = {}; }
}
function saveRecord(eventType, value, isHigherBetter) {
  if (!worldRecords[eventType] || (isHigherBetter ? value > worldRecords[eventType] : value < worldRecords[eventType])) {
    worldRecords[eventType] = value;
    try { localStorage.setItem('baseling_olympics_records', JSON.stringify(worldRecords)); } catch(e) { /* storage full */ }
    return true;
  }
  return false;
}
loadRecords();

// === NES CONTROL HELPERS ===
function keyLeft() {
  return TAS.input.keys['ArrowLeft'] || TAS.input.keys['KeyA'] || TAS.input.keys['a'] || TAS.input.touch.a;
}
function keyRight() {
  return TAS.input.keys['ArrowRight'] || TAS.input.keys['KeyD'] || TAS.input.keys['d'] || TAS.input.touch.b;
}
function keyUp() {
  return TAS.input.keys['ArrowUp'] || TAS.input.keys['KeyW'] || TAS.input.keys['w'] || TAS.input.touch.up;
}
function keyDown() {
  return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.keys['s'] || TAS.input.touch.down;
}
function keyA() {
  return TAS.input.keys['KeyZ'] || TAS.input.keys['z'] || TAS.input.keys['KeyA'] || TAS.input.keys['a'] || TAS.input.touch.a;
}
function keyB() {
  return TAS.input.keys['KeyX'] || TAS.input.keys['x'] || TAS.input.keys['KeyB'] || TAS.input.keys['b'] || TAS.input.touch.b;
}
function jumpPressed() {
  return TAS.input.keys['Space'] || TAS.input.keys[' '] || TAS.input.keys['KeyZ'] || TAS.input.keys['z']
    || TAS.input.keys['KeyJ'] || TAS.input.keys['j']
    || TAS.input.touch.a || TAS.input.touch.b;
}
function anyKey() {
  return Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b;
}

// === MASH DETECTION ===
function updateMash() {
  const kA = keyA();
  const kB = keyB();
  if (kA && !lastKeyA) { mashCount++; mashHistory.push(frame); }
  if (kB && !lastKeyB) { mashCount++; mashHistory.push(frame); }
  lastKeyA = kA;
  lastKeyB = kB;
  // Calculate mash rate (presses per second over last 30 frames)
  const cutoff = frame - 30;
  mashHistory = mashHistory.filter(function(f) { return f > cutoff; });
  mashRate = mashHistory.length * 2; // approx presses/sec at 60fps
}

// === AI OPPONENT (scaled by CHA) ===
function aiMashRate(skill) {
  // CHA makes AI slightly worse (chaScale reduces their effective skill)
  var chaNerf = 1 - (chaScale() - 1) * 0.3; // ref#1: CHA nerfs AI
  var base = 6 + skill * 12 * Math.max(0.5, chaNerf);
  return base + (Math.random() - 0.5) * 3;
}

function aiDecision(skill, optimal) {
  // WIS doesn't help AI, only player
  return (1 - skill) * 0.4 * Math.random();
}

// === SPORE OBSTACLE SPAWNING ===
function spawnTrackSpores(count, maxPos) {
  trackSpores = [];
  for (var i = 0; i < count; i++) {
    var sType = SPORE_TYPES[Math.floor(Math.random() * SPORE_TYPES.length)];
    trackSpores.push({
      pos: 60 + Math.random() * (maxPos - 80),
      lane: Math.floor(Math.random() * 4),
      type: sType,
      active: true,
      radius: 4 + Math.random() * 3,
      bobPhase: Math.random() * Math.PI * 2
    });
  }
}

function checkSporeCollision(pos, lane) {
  for (var i = 0; i < trackSpores.length; i++) {
    var s = trackSpores[i];
    if (!s.active) continue;
    if (s.lane === lane && Math.abs(s.pos - pos) < 8) {
      s.active = false;
      return s.type;
    }
  }
  return null;
}

function drawTrackSpores(scrollBase, scaleX, baseY, laneH) {
  for (var i = 0; i < trackSpores.length; i++) {
    var s = trackSpores[i];
    if (!s.active) continue;
    var sx = (s.pos - scrollBase) * scaleX;
    var sy = baseY + s.lane * laneH;
    if (sx < -20 || sx > GW + 20) continue;
    var bob = Math.sin(frame * 0.08 + s.bobPhase) * 2;
    ctx.fillStyle = s.type.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(sx, sy + bob, s.radius, 0, Math.PI * 2);
    ctx.fill();
    // Spore cap detail
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(sx - 1, sy + bob - 1, s.radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// === REACTOR TRACK SECTIONS ===
let reactorSections = [];
function spawnReactorSections(count, maxPos) {
  reactorSections = [];
  for (var i = 0; i < count; i++) {
    reactorSections.push({
      start: 50 + i * (maxPos / count),
      length: 20 + Math.random() * 15,
      boost: 1.2 + Math.random() * 0.3,
      glowPhase: Math.random() * Math.PI * 2
    });
  }
}
function checkReactorBoost(pos) {
  for (var i = 0; i < reactorSections.length; i++) {
    var r = reactorSections[i];
    if (pos >= r.start && pos <= r.start + r.length) return r.boost;
  }
  return 1;
}
function drawReactorSections(scrollBase, scaleX, baseY, trackH) {
  for (var i = 0; i < reactorSections.length; i++) {
    var r = reactorSections[i];
    var rx = (r.start - scrollBase) * scaleX;
    var rw = r.length * scaleX;
    if (rx + rw < 0 || rx > GW) continue;
    var glow = 0.15 + Math.sin(frame * 0.1 + r.glowPhase) * 0.1;
    ctx.globalAlpha = glow;
    ctx.fillStyle = COL.reactor;
    ctx.fillRect(rx, baseY, rw, trackH);
    // Reactor glow lines
    ctx.strokeStyle = '#ffaa44';
    ctx.lineWidth = 1;
    for (var j = 0; j < 3; j++) {
      var ly = baseY + trackH * (j + 1) / 4;
      ctx.beginPath();
      ctx.moveTo(rx, ly);
      ctx.lineTo(rx + rw, ly);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
}

// === CROWD (themed by stadium) ===
function drawCrowd(y, rows, stadium) {
  var crowdColors = stadium ? [stadium.crowd, COL.crowd1, COL.crowd2, COL.crowd4, '#886633', '#cc66aa']
    : [COL.crowd1, COL.crowd2, COL.crowd3, COL.crowd4, '#886633', '#cc66aa'];
  for (var row = 0; row < rows; row++) {
    for (var x = 0; x < GW; x += 8) {
      var bounce = Math.sin((frame + x * 0.3 + row * 2) * 0.1) * (crowdCheer * 2);
      var ci = (x * 7 + row * 13) % crowdColors.length;
      ctx.fillStyle = crowdColors[ci];
      ctx.fillRect(x, y + row * 10 - bounce, 6, 8);
      // Head
      ctx.fillStyle = '#eebb88';
      ctx.beginPath();
      ctx.arc(x + 3, y + row * 10 - 3 - bounce, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === DRAW BASELING ATHLETE ===
function drawAthlete(x, y, colorIdx, animFrame, opts) {
  opts = opts || {};
  var c = ATHLETE_COLORS[colorIdx];
  var bob = Math.sin(animFrame * 0.3) * 2;
  var legSpread = Math.sin(animFrame * 0.6) * 6;

  ctx.save();
  ctx.translate(x, y);
  if (opts.scale) ctx.scale(opts.scale, opts.scale);

  // The human athlete (colorIdx 0) is the selected baseling (focal entity); the procedural
  // athlete is the fallback (and the look for AI opponents). Arms are still drawn so throw/
  // aim poses (opts.armAngle) read clearly on top of the sprite.
  var drewSprite = false;
  if (colorIdx === 0) {
    var _da = (opts.armAngle !== undefined) ? 'attack' : (Math.abs(legSpread) > 1.5 ? 'walk' : 'idle');
    drewSprite = TAS.drawBaseling(ctx, 0, -8 + bob, 30, { anim: _da, frame: animFrame, flipX: !!opts.flipX });
  }
  if (!drewSprite) {
  // Legs (pixel-chunky NES style)
  ctx.strokeStyle = c.body;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-legSpread, 14);
  ctx.moveTo(0, 0);
  ctx.lineTo(legSpread, 14);
  ctx.stroke();

  // Shorts
  ctx.fillStyle = c.shorts;
  ctx.fillRect(-5, -2, 10, 6);

  // Body
  ctx.fillStyle = c.body;
  ctx.fillRect(-4, -14 + bob, 8, 14);

  // Head
  ctx.fillStyle = '#eebb88';
  ctx.beginPath();
  ctx.arc(0, -18 + bob, 5, 0, Math.PI * 2);
  ctx.fill();

  // Baseling icon on jersey (pixel B)
  if (colorIdx === 0) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, -6 + bob);
  }
  }

  // Arms
  if (opts.armAngle !== undefined) {
    ctx.strokeStyle = c.body;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-3, -10 + bob);
    ctx.lineTo(-3 + Math.cos(opts.armAngle) * 10, -10 + bob + Math.sin(opts.armAngle) * 10);
    ctx.moveTo(3, -10 + bob);
    ctx.lineTo(3 + Math.cos(-opts.armAngle) * 10, -10 + bob + Math.sin(-opts.armAngle) * 10);
    ctx.stroke();
  } else {
    var armSwing = Math.sin(animFrame * 0.6) * 8;
    ctx.strokeStyle = c.body;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, -10 + bob);
    ctx.lineTo(-4 - armSwing, -4 + bob);
    ctx.moveTo(4, -10 + bob);
    ctx.lineTo(4 + armSwing, -4 + bob);
    ctx.stroke();
  }

  // Glow aura for high-level baselings
  if (colorIdx === 0 && statB.level >= 5) {
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.08) * 0.08;
    ctx.fillStyle = statB.color;
    ctx.beginPath();
    ctx.arc(0, -5 + bob, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// === DRAW SPEED LINES ===
function drawSpeedLines(intensity) {
  if (intensity < 3) return;
  ctx.globalAlpha = Math.min(0.6, intensity * 0.05);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  for (var i = 0; i < intensity; i++) {
    var y = Math.random() * GH;
    var len = 20 + Math.random() * 40;
    ctx.beginPath();
    ctx.moveTo(Math.random() * GW, y);
    ctx.lineTo(Math.random() * GW - len, y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// === DRAW METER BAR ===
function drawMeter(x, y, w, h, value, maxVal, color, label) {
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, (w - 2) * Math.min(1, value / maxVal), h - 2);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(x, y, w, h);
  if (label) {
    ctx.fillStyle = '#fff';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(label, x, y - 2);
  }
}

// === STAT HUD (shows active stat bonuses) ===
function drawStatHud(activeStats) {
  var hudX = GW - 90, hudY = 20;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(hudX, hudY, 85, activeStats.length * 12 + 4);
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  for (var i = 0; i < activeStats.length; i++) {
    var s = activeStats[i];
    var val = statB[s.stat];
    var color = val >= 14 ? '#44ff88' : val >= 10 ? '#ffdd44' : '#ff8844';
    ctx.fillStyle = color;
    ctx.fillText(s.label + ': ' + val, hudX + 3, hudY + 12 + i * 12);
  }
}

// === EVENT IMPLEMENTATIONS ===

// --- SPORE SPRINT (100M) ---
function initDash() {
  ev = {
    positions: [0, 0, 0, 0],
    speeds: [0, 0, 0, 0],
    aiRates: [aiMashRate(0.6), aiMashRate(0.8), aiMashRate(0.95)],
    finishLine: 400,
    finished: [false, false, false, false],
    times: [0, 0, 0, 0],
    elapsed: 0,
    animFrames: [0, 0, 0, 0],
    falseStart: false,
    countdown: 180,
    started: false,
    chaBonus: (chaScale() - 1) * 20 // ref#2: CHA head-start bonus
  };
  spawnTrackSpores(4, 380);
  spawnReactorSections(2, 380);
  initWeather();
}

function updateDash(dt) {
  if (ev.countdown > 0) {
    ev.countdown--;
    // WIS gives more lenient false-start window (ref#3: WIS timing)
    var falseStartThreshold = 30 - Math.floor(wisScale() * 8);
    if (mashRate > 2 && ev.countdown > falseStartThreshold) {
      ev.falseStart = true;
      eventState = 'result';
      ev.times[0] = 99.99;
      TAS.audio.playTone(200, 0.5, 'sawtooth', 0.15);
    }
    if (ev.countdown === 0) {
      ev.started = true;
      ev.positions[0] += ev.chaBonus; // CHA head start
      TAS.audio.playTone(880, 0.15, 'square', 0.15);
    }
    return;
  }

  ev.elapsed += dt;

  // Player — DEX scales max speed (ref#4: DEX run speed)
  if (!ev.finished[0]) {
    var maxSpeed = mashRate * 0.08 * dexScale();
    var reactorMult = checkReactorBoost(ev.positions[0]);
    maxSpeed *= reactorMult;
    if (reactorMult > 1) {
      if (frame % 10 === 0) addScorePopup(100, 280, 'BOOST!', COL.reactor);
    }
    ev.speeds[0] = TAS.math.lerp(ev.speeds[0], maxSpeed, 0.1);
    ev.positions[0] += ev.speeds[0];
    ev.animFrames[0] += ev.speeds[0] * 0.5;

    // Spore collision
    var sporeHit = checkSporeCollision(ev.positions[0], 0);
    if (sporeHit) {
      if (sporeHit.effect === 'slow') {
        ev.speeds[0] *= (1 - sporeHit.strength);
        addScorePopup(100, 200, 'SPORE!', sporeHit.color);
        TAS.fx.shake(2, 0.9);
      } else if (sporeHit.effect === 'boost') {
        ev.speeds[0] *= sporeHit.strength;
        addScorePopup(100, 200, 'BOOST!', sporeHit.color);
      }
    }

    if (ev.positions[0] >= ev.finishLine) {
      ev.finished[0] = true;
      ev.times[0] = ev.elapsed;
      TAS.particles.spawn(GW * 0.85, 135, COL.gold, 15, 3);
    }
  }

  // AI
  for (var i = 1; i < 4; i++) {
    if (!ev.finished[i]) {
      var aiRate = ev.aiRates[i - 1] + Math.sin(frame * 0.05 + i) * 2;
      ev.speeds[i] = TAS.math.lerp(ev.speeds[i], aiRate * 0.08, 0.1);
      ev.positions[i] += ev.speeds[i];
      ev.animFrames[i] += ev.speeds[i] * 0.5;
      if (ev.positions[i] >= ev.finishLine) {
        ev.finished[i] = true;
        ev.times[i] = ev.elapsed;
      }
    }
  }

  crowdCheer = Math.max.apply(null, ev.speeds) * 0.3;

  if (ev.finished.every(Boolean)) {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawDash() {
  var stad = getStadium(0);
  // Sky
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 80);
  drawCrowd(20, 5, stad);

  // Track
  ctx.fillStyle = stad.ground;
  ctx.fillRect(0, 100, GW, 180);

  // Reactor sections
  drawReactorSections(0, GW / ev.finishLine, 100, 180);

  // Lanes
  for (var i = 0; i < 5; i++) {
    ctx.strokeStyle = '#fff';
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(0, 100 + i * 45);
    ctx.lineTo(GW, 100 + i * 45);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Finish line
  var finishX = GW * 0.85;
  ctx.fillStyle = '#fff';
  for (var y = 100; y < 280; y += 8) {
    for (var x = 0; x < 8; x += 4) {
      if ((Math.floor(y / 4) + Math.floor(x / 4)) % 2 === 0) {
        ctx.fillRect(finishX + x, y, 4, 4);
      }
    }
  }

  // Spore obstacles
  drawTrackSpores(0, GW / ev.finishLine, 135, 45);

  // Baselings (athletes)
  var scrollOffset = Math.max(0, ev.positions[0] - 200) * (GW * 0.85 / ev.finishLine);
  for (var i = 0; i < 4; i++) {
    var px = 40 + (ev.positions[i] / ev.finishLine) * (GW * 0.85 - 40) - scrollOffset * 0.3;
    var py = 135 + i * 45;
    drawAthlete(px, py, i, ev.animFrames[i]);
  }

  drawSpeedLines(mashRate);
  drawWeather();

  // Countdown
  if (ev.countdown > 0) {
    var sec = Math.ceil(ev.countdown / 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    if (sec <= 3 && sec > 0) ctx.fillText(sec, GW / 2, GH / 2);
    if (ev.countdown < 30) {
      ctx.fillStyle = '#ffdd44';
      ctx.fillText('SET', GW / 2, GH / 2);
    }
  }

  // Timer
  if (ev.started) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ev.elapsed.toFixed(2) + 's', GW - 10, 300);
  }

  if (ev.falseStart) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FALSE START!', GW / 2, GH / 2);
    TAS.fx.shake(5, 0.92);
  }

  // Stat HUD
  drawStatHud([{ stat: 'dex', label: 'DEX(Speed)' }, { stat: 'cha', label: 'CHA(Luck)' }]);
}

// --- MYCELIUM LEAP (LONG JUMP) ---
function initLongJump() {
  ev = {
    phase: 'run',
    speed: 0,
    runPos: 0,
    jumpAngle: 0,
    jumpPower: 0,
    jumpX: 0, jumpY: 0,
    jumpVX: 0, jumpVY: 0,
    distance: 0,
    foul: false,
    linePos: 300,
    groundY: 220,
    animFrame: 0,
    aiResults: [],
    holdTime: 0,
    jumpPressed: false,
    // WIS widens the foul line tolerance (ref#5: WIS timing)
    foulTolerance: 5 + Math.floor(wisScale() * 8)
  };
  // AI results — STR-scaled distances for comparison
  for (var i = 1; i < 4; i++) {
    var skill = 0.5 + i * 0.15;
    ev.aiResults.push(5.5 + skill * 3 + Math.random() * 1.5);
  }
  // Boss mode replaces one AI with boss
  if (bossMode && BOSS_EVENTS.longjump) {
    ev.aiResults[2] = 9.5 * BOSS_EVENTS.longjump.distMult;
    ATHLETE_COLORS[3].name = BOSS_EVENTS.longjump.name;
    ATHLETE_COLORS[3].body = BOSS_EVENTS.longjump.color;
  }
  spawnTrackSpores(3, 280);
  initWeather();
}

function updateLongJump(dt) {
  if (ev.phase === 'run') {
    // DEX scales run speed (ref#6: DEX for runway)
    ev.speed = TAS.math.lerp(ev.speed, mashRate * 0.12 * dexScale(), 0.08);
    ev.runPos += ev.speed;
    ev.animFrame += ev.speed * 0.4;

    // Spore effects on runway
    var sporeHit = checkSporeCollision(ev.runPos, 0);
    if (sporeHit) {
      if (sporeHit.effect === 'boost') {
        ev.speed *= sporeHit.strength;
        addScorePopup(ev.runPos * (GW / 500), 180, 'GARDEN BOOST!', COL.reactor);
      } else if (sporeHit.effect === 'slow') {
        ev.speed *= (1 - sporeHit.strength);
        addScorePopup(ev.runPos * (GW / 500), 180, 'SPORE!', sporeHit.color);
        TAS.fx.shake(2, 0.92);
      }
    }

    if (jumpPressed() && !ev.jumpPressed) {
      ev.jumpPressed = true;
      ev.holdTime = 0;
      // WIS-scaled foul tolerance (ref#5 applied)
      if (ev.runPos >= ev.linePos + ev.foulTolerance) {
        ev.foul = true;
        ev.phase = 'landed';
        eventTimer = 0;
        TAS.audio.playTone(200, 0.4, 'sawtooth', 0.12);
        TAS.fx.shake(4, 0.9);
      }
    }
    if (ev.jumpPressed && jumpPressed()) {
      ev.holdTime++;
      // WIS slows angle buildup for better control (ref#7: WIS angle control)
      var angleRate = 2.5 / wisScale();
      var maxHold = 30 + Math.floor(wisScale() * 5);
      if (ev.holdTime > maxHold) {
        ev.phase = 'flight';
        ev.jumpAngle = Math.min(75, ev.holdTime * angleRate);
        // STR boosts jump power (ref#8: STR jump distance)
        ev.jumpPower = ev.speed * strScale();
        var rad = ev.jumpAngle * Math.PI / 180;
        ev.jumpVX = ev.jumpPower * Math.cos(rad) * 2;
        ev.jumpVY = -ev.jumpPower * Math.sin(rad) * 2.5;
        ev.jumpX = ev.runPos;
        ev.jumpY = ev.groundY;
        TAS.audio.playTone(440, 0.2, 'triangle', 0.1);
      }
    }
    if (ev.jumpPressed && !jumpPressed() && ev.phase === 'run') {
      ev.phase = 'flight';
      var angleRate2 = 2.5 / wisScale();
      ev.jumpAngle = Math.min(75, ev.holdTime * angleRate2);
      ev.jumpPower = ev.speed * strScale(); // ref#8 again
      var rad2 = ev.jumpAngle * Math.PI / 180;
      ev.jumpVX = ev.jumpPower * Math.cos(rad2) * 2;
      ev.jumpVY = -ev.jumpPower * Math.sin(rad2) * 2.5;
      ev.jumpX = ev.runPos;
      ev.jumpY = ev.groundY;
      TAS.audio.playTone(440, 0.2, 'triangle', 0.1);
    }
  }

  if (ev.phase === 'flight') {
    ev.jumpX += ev.jumpVX;
    ev.jumpY += ev.jumpVY;
    ev.jumpVY += 0.3;
    if (ev.jumpY >= ev.groundY) {
      ev.phase = 'landed';
      ev.jumpY = ev.groundY;
      ev.distance = (ev.jumpX - ev.linePos) * 0.025;
      if (ev.distance < 0) ev.distance = 0;
      eventTimer = 0;
      TAS.particles.spawn(ev.jumpX * (GW / 500), ev.groundY, COL.sand, 15, 3, { gravity: 0.2 });
      TAS.audio.playNoise(0.2, 0.1, 800);
      if (ev.distance > 7) addScorePopup(GW / 2, 130, 'SPORE LEAP!', COL.gold);
    }
  }

  if (ev.phase === 'landed') {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawLongJump() {
  var stad = getStadium(1);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 120);
  drawCrowd(20, 6, stad);

  // Runway
  ctx.fillStyle = stad.ground;
  ctx.fillRect(0, ev.groundY, GW, 40);

  // Compost pit (purple-tinged)
  ctx.fillStyle = '#c8a0d0';
  ctx.fillRect(GW * 0.65, ev.groundY, GW * 0.3, 40);
  // Mycelium tendrils in pit
  ctx.strokeStyle = COL.mycelium;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  for (var t = 0; t < 8; t++) {
    ctx.beginPath();
    var tx = GW * 0.65 + t * 18;
    ctx.moveTo(tx, ev.groundY + 5);
    ctx.quadraticCurveTo(tx + 5, ev.groundY + 20, tx + 10, ev.groundY + 35);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Foul line
  var lineScreenX = ev.linePos * (GW / 500);
  ctx.fillStyle = '#fff';
  ctx.fillRect(lineScreenX, ev.groundY - 5, 4, 45);

  // Spore obstacles
  drawTrackSpores(0, GW / 500, ev.groundY, 0);

  if (ev.phase === 'run') {
    var px = Math.min(ev.runPos * (GW / 500), GW * 0.6);
    drawAthlete(px, ev.groundY, 0, ev.animFrame);
  } else if (ev.phase === 'flight') {
    drawAthlete(ev.jumpX * (GW / 500), ev.jumpY, 0, frame, { armAngle: -1.2 });
  } else if (ev.phase === 'landed') {
    drawAthlete(ev.jumpX * (GW / 500), ev.groundY, 0, 0);
  }

  drawMeter(10, GH - 30, 100, 12, ev.speed, 3, COL.spore, 'SPEED');
  drawWeather();

  if (ev.jumpPressed && ev.phase === 'run') {
    var angle = Math.min(75, ev.holdTime * (2.5 / wisScale()));
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(angle.toFixed(0) + ' deg', GW / 2, 140);
  }

  if (ev.foul) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FOUL!', GW / 2, GH / 2);
    TAS.fx.shake(3, 0.92);
  } else if (ev.phase === 'landed' && ev.distance > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ev.distance.toFixed(2) + 'm', GW / 2, 150);
  }

  drawStatHud([{ stat: 'str', label: 'STR(Power)' }, { stat: 'dex', label: 'DEX(Speed)' }, { stat: 'wis', label: 'WIS(Timing)' }]);
}

// --- POOP JAVELIN ---
function initJavelin() {
  ev = {
    phase: 'run',
    speed: 0,
    runPos: 0,
    angle: 45,
    angleDir: 1,
    power: 0,
    javX: 0, javY: 0,
    javVX: 0, javVY: 0,
    distance: 0,
    animFrame: 0,
    aiResults: [],
    groundY: 220,
    linePos: 350,
    // WIS slows angle oscillation (ref#9: WIS angle control)
    angleSpeed: 2 / wisScale()
  };
  for (var i = 1; i < 4; i++) {
    var skill = 0.5 + i * 0.15;
    ev.aiResults.push(50 + skill * 40 + Math.random() * 15);
  }
  if (bossMode && BOSS_EVENTS.javelin) {
    ev.aiResults[2] = 90 * BOSS_EVENTS.javelin.distMult;
    ATHLETE_COLORS[3].name = BOSS_EVENTS.javelin.name;
    ATHLETE_COLORS[3].body = BOSS_EVENTS.javelin.color;
  }
  initWeather();
}

function updateJavelin(dt) {
  if (ev.phase === 'run') {
    // DEX scales run-up (ref#10: DEX)
    ev.speed = TAS.math.lerp(ev.speed, mashRate * 0.1 * dexScale(), 0.08);
    ev.runPos += ev.speed;
    ev.animFrame += ev.speed * 0.4;

    if (ev.runPos > ev.linePos) {
      ev.phase = 'landed';
      ev.distance = 0;
      eventTimer = 0;
      TAS.audio.playTone(200, 0.4, 'sawtooth', 0.12);
      TAS.fx.shake(3, 0.9);
      return;
    }

    if (jumpPressed()) {
      ev.phase = 'angle';
      ev.power = ev.speed;
      TAS.audio.playTone(330, 0.1, 'triangle', 0.08);
    }
  }

  if (ev.phase === 'angle') {
    // WIS slows angle sweep (ref#9 applied)
    ev.angle += ev.angleDir * ev.angleSpeed;
    if (ev.angle > 80 || ev.angle < 10) ev.angleDir *= -1;

    if (!jumpPressed()) {
      ev.phase = 'thrown';
      var rad = ev.angle * Math.PI / 180;
      // STR massively boosts throw power (ref#11: STR throw)
      var throwPower = ev.power * strScale() * 1.2;
      ev.javVX = throwPower * Math.cos(rad) * 4;
      ev.javVY = -throwPower * Math.sin(rad) * 4;
      ev.javX = ev.runPos;
      ev.javY = ev.groundY - 20;
      TAS.audio.playTone(550, 0.15, 'sawtooth', 0.1);
      if (throwPower > 3) {
        TAS.fx.shake(4, 0.92);
        addScorePopup(GW / 2, 120, 'POOP LAUNCH!', COL.reactor);
      }
    }
  }

  if (ev.phase === 'thrown') {
    ev.javX += ev.javVX;
    ev.javY += ev.javVY;
    ev.javVY += 0.15;
    if (ev.javY >= ev.groundY) {
      ev.phase = 'landed';
      ev.distance = (ev.javX - ev.linePos) * 0.15;
      if (ev.distance < 0) ev.distance = 0;
      eventTimer = 0;
      TAS.particles.spawn(ev.javX * (GW / 600), ev.groundY, COL.grass, 10, 2, { gravity: 0.1 });
      TAS.audio.playNoise(0.15, 0.08, 600);
      // Splat on landing
      TAS.particles.spawn(ev.javX * (GW / 600), ev.groundY, COL.reactor, 8, 2, { gravity: 0.05 });
      if (ev.distance > 70) addScorePopup(GW / 2, 130, 'INCREDIBLE!', COL.gold);
    }
  }

  if (ev.phase === 'landed') {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawJavelin() {
  var stad = getStadium(1);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 120);
  drawCrowd(20, 5, stad);

  ctx.fillStyle = COL.grass;
  ctx.fillRect(0, ev.groundY, GW, GH - ev.groundY);
  ctx.fillStyle = stad.ground;
  ctx.fillRect(0, ev.groundY - 10, GW * 0.7, 15);

  // Foul line
  var lineX = ev.linePos * (GW / 600);
  ctx.fillStyle = '#fff';
  ctx.fillRect(lineX, ev.groundY - 15, 3, 20);

  if (ev.phase === 'run') {
    drawAthlete(ev.runPos * (GW / 600), ev.groundY, 0, ev.animFrame, { armAngle: -0.5 });
  }

  if (ev.phase === 'angle') {
    var px = ev.runPos * (GW / 600);
    drawAthlete(px, ev.groundY, 0, 0, { armAngle: -ev.angle * Math.PI / 180 });
    ctx.strokeStyle = '#ffdd44';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(px, ev.groundY - 15, 30, -Math.PI / 2, -(ev.angle * Math.PI / 180), true);
    ctx.stroke();
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ev.angle.toFixed(0) + ' deg', GW / 2, 140);
  }

  if (ev.phase === 'thrown' || ev.phase === 'landed') {
    var jx = ev.javX * (GW / 600);
    var jy = ev.phase === 'thrown' ? ev.javY : ev.groundY;
    // POOP javelin (glowing)
    var throwAngle = Math.atan2(ev.javVY, ev.javVX);
    ctx.save();
    ctx.translate(jx, jy);
    ctx.rotate(throwAngle);
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = COL.reactor;
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();
    ctx.globalAlpha = 1;
    // Shaft
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-20, 0);
    ctx.lineTo(20, 0);
    ctx.stroke();
    // POOP tip
    ctx.fillStyle = COL.reactor;
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(15, -4);
    ctx.lineTo(15, 4);
    ctx.fill();
    ctx.restore();
  }

  drawMeter(10, GH - 30, 100, 12, ev.speed, 3, COL.spore, 'SPEED');
  drawWeather();

  if (ev.phase === 'landed' && ev.distance > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ev.distance.toFixed(2) + 'm', GW / 2, 150);
  }

  drawStatHud([{ stat: 'str', label: 'STR(Throw)' }, { stat: 'wis', label: 'WIS(Aim)' }]);
}

// --- GARDEN HURDLES (110M) ---
function initHurdles() {
  ev = {
    positions: [0, 0, 0, 0],
    speeds: [0, 0, 0, 0],
    aiRates: [aiMashRate(0.55), aiMashRate(0.75), aiMashRate(0.9)],
    finishLine: 450,
    finished: [false, false, false, false],
    times: [0, 0, 0, 0],
    elapsed: 0,
    animFrames: [0, 0, 0, 0],
    hurdles: [80, 150, 220, 290, 360],
    jumping: [false, false, false, false],
    jumpY: [0, 0, 0, 0],
    jumpVY: [0, 0, 0, 0],
    hitCooldown: [0, 0, 0, 0],
    countdown: 180,
    started: false,
    groundY: 220,
    // CON reduces hit penalty (ref#12: CON damage reduction)
    hitPenaltyMult: 1 / conScale()
  };
  spawnTrackSpores(6, 380);
  spawnReactorSections(3, 430);
  initWeather();
}

function updateHurdles(dt) {
  if (ev.countdown > 0) {
    ev.countdown--;
    if (ev.countdown === 0) {
      ev.started = true;
      TAS.audio.playTone(880, 0.15, 'square', 0.15);
    }
    return;
  }

  ev.elapsed += dt;

  // Player — DEX for speed (ref#4 again)
  if (!ev.finished[0]) {
    var maxSpeed = mashRate * 0.07 * dexScale();
    var reactorMult = checkReactorBoost(ev.positions[0]);
    maxSpeed *= reactorMult;
    ev.speeds[0] = TAS.math.lerp(ev.speeds[0], maxSpeed, 0.1);
    ev.positions[0] += ev.speeds[0];
    ev.animFrames[0] += ev.speeds[0] * 0.5;

    // Jump
    if (jumpPressed() && !ev.jumping[0]) {
      ev.jumping[0] = true;
      ev.jumpVY[0] = -8;
      TAS.audio.playTone(440, 0.1, 'triangle', 0.06);
    }

    if (ev.jumping[0]) {
      ev.jumpY[0] += ev.jumpVY[0];
      ev.jumpVY[0] += 0.5;
      if (ev.jumpY[0] >= 0) { ev.jumpY[0] = 0; ev.jumping[0] = false; }
    }

    // Hurdle collision — CON reduces penalty (ref#12 applied)
    if (ev.hitCooldown[0] > 0) ev.hitCooldown[0]--;
    for (var hi = 0; hi < ev.hurdles.length; hi++) {
      var h = ev.hurdles[hi];
      if (Math.abs(ev.positions[0] - h) < 5 && ev.jumpY[0] > -20 && ev.hitCooldown[0] === 0) {
        ev.speeds[0] *= (0.3 + (1 - ev.hitPenaltyMult) * 0.4); // CON reduces slowdown
        ev.hitCooldown[0] = 30;
        TAS.fx.shake(4, 0.9);
        TAS.audio.playNoise(0.1, 0.1, 400);
        addScorePopup(ev.positions[0] * (GW / ev.finishLine), 120, 'CRASH!', '#ff4444');
        TAS.particles.spawn(ev.positions[0] * (GW / ev.finishLine), 135, '#ff6644', 6, 2);
      }
    }

    // Spore collisions on track
    var sporeHit = checkSporeCollision(ev.positions[0], 0);
    if (sporeHit) {
      if (sporeHit.effect === 'slow') {
        ev.speeds[0] *= (1 - sporeHit.strength * 0.5);
        addScorePopup(100, 200, 'SPORE!', sporeHit.color);
      } else if (sporeHit.effect === 'boost') {
        ev.speeds[0] *= sporeHit.strength;
        addScorePopup(100, 200, 'BOOST!', COL.reactor);
      } else if (sporeHit.effect === 'stamina') {
        ev.speeds[0] = Math.min(ev.speeds[0] + 0.5, 3);
        addScorePopup(100, 200, '+ENERGY', COL.moss);
      }
    }

    if (ev.positions[0] >= ev.finishLine) {
      ev.finished[0] = true;
      ev.times[0] = ev.elapsed;
      TAS.particles.spawn(GW * 0.85, 135, COL.gold, 12, 3);
    }
  }

  // AI
  for (var i = 1; i < 4; i++) {
    if (!ev.finished[i]) {
      var aiRate = ev.aiRates[i - 1] + Math.sin(frame * 0.04 + i) * 1.5;
      ev.speeds[i] = TAS.math.lerp(ev.speeds[i], aiRate * 0.07, 0.1);
      ev.positions[i] += ev.speeds[i];
      ev.animFrames[i] += ev.speeds[i] * 0.5;

      // AI auto-jump hurdles
      for (var hj = 0; hj < ev.hurdles.length; hj++) {
        if (ev.positions[i] > ev.hurdles[hj] - 15 && ev.positions[i] < ev.hurdles[hj] - 10 && !ev.jumping[i]) {
          if (Math.random() > 0.15) {
            ev.jumping[i] = true;
            ev.jumpVY[i] = -8;
          }
        }
      }

      if (ev.jumping[i]) {
        ev.jumpY[i] += ev.jumpVY[i];
        ev.jumpVY[i] += 0.5;
        if (ev.jumpY[i] >= 0) { ev.jumpY[i] = 0; ev.jumping[i] = false; }
      }

      if (ev.hitCooldown[i] > 0) ev.hitCooldown[i]--;
      for (var hk = 0; hk < ev.hurdles.length; hk++) {
        if (Math.abs(ev.positions[i] - ev.hurdles[hk]) < 5 && ev.jumpY[i] > -20 && ev.hitCooldown[i] === 0) {
          ev.speeds[i] *= 0.3;
          ev.hitCooldown[i] = 30;
        }
      }

      if (ev.positions[i] >= ev.finishLine) {
        ev.finished[i] = true;
        ev.times[i] = ev.elapsed;
      }
    }
  }

  crowdCheer = Math.max.apply(null, ev.speeds) * 0.25;

  if (ev.finished.every(Boolean)) {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawHurdles() {
  var stad = getStadium(2);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 80);
  drawCrowd(15, 4, stad);

  ctx.fillStyle = stad.ground;
  ctx.fillRect(0, 100, GW, 180);

  // Garden boost sections on track
  drawReactorSections(Math.max(0, ev.positions[0] - 100), GW / ev.finishLine * 1.2, 100, 180);

  // Lanes
  for (var i = 0; i < 5; i++) {
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(0, 100 + i * 45);
    ctx.lineTo(GW, 100 + i * 45);
    ctx.stroke();
  }

  // Garden hurdles (mushroom-shaped)
  var scrollBase = Math.max(0, ev.positions[0] - 100);
  for (var hi2 = 0; hi2 < ev.hurdles.length; hi2++) {
    var hx = (ev.hurdles[hi2] - scrollBase) * (GW / ev.finishLine) * 1.2;
    if (hx > -20 && hx < GW + 20) {
      for (var lane = 0; lane < 4; lane++) {
        var hy = 125 + lane * 45;
        // Stem
        ctx.fillStyle = '#aa9977';
        ctx.fillRect(hx, hy - 16, 3, 16);
        // Mushroom cap
        ctx.fillStyle = COL.fungal;
        ctx.beginPath();
        ctx.arc(hx + 1, hy - 18, 8, Math.PI, 0);
        ctx.fill();
        // Spots
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(hx - 2, hy - 20, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(hx + 4, hy - 19, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // Spore obstacles
  drawTrackSpores(scrollBase, GW / ev.finishLine * 1.2, 135, 45);

  // Baselings
  for (var i2 = 0; i2 < 4; i2++) {
    var px = 40 + ((ev.positions[i2] - scrollBase) / ev.finishLine) * (GW * 0.8);
    var py = 135 + i2 * 45 + ev.jumpY[i2];
    if (px > -20 && px < GW + 20) {
      drawAthlete(px, py, i2, ev.animFrames[i2]);
    }
  }

  drawSpeedLines(mashRate);
  drawWeather();

  if (ev.countdown > 0) {
    var sec = Math.ceil(ev.countdown / 60);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    if (sec <= 3) ctx.fillText(sec, GW / 2, GH / 2);
  }

  if (ev.started) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(ev.elapsed.toFixed(2) + 's', GW - 10, 300);
  }

  drawStatHud([{ stat: 'dex', label: 'DEX(Speed)' }, { stat: 'con', label: 'CON(Tough)' }]);
}

// --- POOP HAMMER THROW ---
function initHammer() {
  ev = {
    phase: 'spin',
    spinSpeed: 0,
    spinAngle: 0,
    rhythm: 0,
    lastPress: 0,
    momentum: 0,
    releaseAngle: 0,
    hamX: 0, hamY: 0,
    hamVX: 0, hamVY: 0,
    distance: 0,
    aiResults: [],
    groundY: 220,
    missedBeats: 0,
    // WIS widens rhythm tolerance window (ref#13: WIS rhythm)
    rhythmMin: Math.max(4, 8 - Math.floor(wisScale() * 4)),
    rhythmMax: 40 + Math.floor(wisScale() * 10)
  };
  for (var i = 1; i < 4; i++) {
    var skill = 0.5 + i * 0.15;
    ev.aiResults.push(40 + skill * 45 + Math.random() * 10);
  }
  if (bossMode && BOSS_EVENTS.hammer) {
    ev.aiResults[2] = 85 * BOSS_EVENTS.hammer.distMult;
    ATHLETE_COLORS[3].name = BOSS_EVENTS.hammer.name;
    ATHLETE_COLORS[3].body = BOSS_EVENTS.hammer.color;
  }
  initWeather();
}

function updateHammer(dt) {
  if (ev.phase === 'spin') {
    ev.spinAngle += ev.spinSpeed * 0.1;
    ev.spinSpeed *= 0.995;

    var pressA = keyA();
    if (pressA && !lastKeyA) {
      var gap = frame - ev.lastPress;
      if (gap > ev.rhythmMin && gap < ev.rhythmMax) {
        // STR boosts momentum gain per press (ref#14: STR momentum)
        var momGain = 1.5 * strScale();
        ev.spinSpeed = Math.min(20, ev.spinSpeed + momGain);
        ev.momentum = Math.min(100, ev.momentum + 5 * strScale());
        TAS.audio.playTone(330 + ev.momentum * 3, 0.08, 'triangle', 0.06);
        if (ev.momentum > 80) addScorePopup(GW * 0.3, 180, 'MAX SPIN!', COL.mycelium);
      } else if (gap <= ev.rhythmMin) {
        ev.spinSpeed *= 0.8;
        ev.missedBeats++;
        addScorePopup(GW * 0.3, 200, 'TOO FAST', '#ff4444');
      }
      ev.lastPress = frame;
    }

    // Release on B
    var pressB = keyB();
    if (pressB && ev.momentum > 10) {
      ev.phase = 'flight';
      ev.releaseAngle = ev.spinAngle % (Math.PI * 2);
      var power = ev.momentum * 0.5;
      var optAngle = Math.PI / 4;
      var angleDiff = Math.abs(Math.sin(ev.releaseAngle) - Math.sin(optAngle));
      var effectiveness = 1 - angleDiff * 0.5;
      ev.hamVX = power * effectiveness * 0.8;
      ev.hamVY = -power * effectiveness * 0.6;
      ev.hamX = GW * 0.3;
      ev.hamY = ev.groundY - 20;
      TAS.audio.playTone(220, 0.3, 'sawtooth', 0.12);
      TAS.fx.shake(5, 0.92);
      TAS.particles.spawn(GW * 0.3, ev.groundY - 20, COL.toxin, 10, 3);
    }
  }

  if (ev.phase === 'flight') {
    ev.hamX += ev.hamVX * 0.5;
    ev.hamY += ev.hamVY * 0.5;
    ev.hamVY += 0.2;
    // POOP trail particles
    if (frame % 3 === 0) {
      TAS.particles.spawn(ev.hamX, ev.hamY, COL.toxin, 2, 1, { gravity: 0.05 });
    }
    if (ev.hamY >= ev.groundY) {
      ev.phase = 'landed';
      ev.distance = ev.momentum * 0.8 + Math.random() * 5;
      eventTimer = 0;
      TAS.particles.spawn(ev.hamX, ev.groundY, COL.toxin, 15, 3, { gravity: 0.2 });
      TAS.audio.playNoise(0.2, 0.12, 500);
      TAS.fx.shake(6, 0.9);
      if (ev.distance > 60) addScorePopup(GW / 2, 130, 'POOP SLAM!', COL.mycelium);
    }
  }

  if (ev.phase === 'landed') {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawHammer() {
  var stad = getStadium(2);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 120);
  drawCrowd(20, 5, stad);

  ctx.fillStyle = COL.grass;
  ctx.fillRect(0, ev.groundY, GW, GH - ev.groundY);

  // Throwing circle with garden glow
  ctx.strokeStyle = COL.reactor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(GW * 0.3, ev.groundY, 40, 0, Math.PI * 2);
  ctx.stroke();
  // Inner glow
  ctx.globalAlpha = 0.1 + Math.sin(frame * 0.05) * 0.05;
  ctx.fillStyle = COL.reactor;
  ctx.beginPath();
  ctx.arc(GW * 0.3, ev.groundY, 38, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  if (ev.phase === 'spin') {
    var cx = GW * 0.3, cy = ev.groundY;
    drawAthlete(cx, cy, 0, frame * ev.spinSpeed * 0.1);

    // POOP hammer on chain
    var hx = cx + Math.cos(ev.spinAngle) * 30;
    var hy = cy - 20 + Math.sin(ev.spinAngle) * 15;
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 15);
    ctx.lineTo(hx, hy);
    ctx.stroke();
    // POOP ball (glowing purple)
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = COL.toxin;
    ctx.beginPath();
    ctx.arc(hx, hy, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = COL.toxin;
    ctx.beginPath();
    ctx.arc(hx, hy, 6, 0, Math.PI * 2);
    ctx.fill();

    drawMeter(10, GH - 30, 120, 14, ev.momentum, 100, COL.toxin, 'MOMENTUM');

    // Rhythm guide
    ctx.fillStyle = '#fff';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Press A rhythmically - B to fling POOP', GW / 2, GH - 40);
    // Rhythm indicator dots
    var rhythmPhase = (frame - ev.lastPress) / ((ev.rhythmMin + ev.rhythmMax) / 2);
    ctx.fillStyle = rhythmPhase > 0.3 && rhythmPhase < 1.2 ? COL.spore : '#ff4444';
    ctx.beginPath();
    ctx.arc(GW / 2, GH - 50, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (ev.phase === 'flight' || ev.phase === 'landed') {
    var hamDrawX = ev.hamX;
    var hamDrawY = ev.phase === 'flight' ? ev.hamY : ev.groundY;
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = COL.toxin;
    ctx.beginPath();
    ctx.arc(hamDrawX, hamDrawY, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = COL.toxin;
    ctx.beginPath();
    ctx.arc(hamDrawX, hamDrawY, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  drawWeather();

  if (ev.phase === 'landed') {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ev.distance.toFixed(2) + 'm', GW / 2, 150);
  }

  drawStatHud([{ stat: 'str', label: 'STR(Power)' }, { stat: 'wis', label: 'WIS(Rhythm)' }]);
}

// --- CANOPY VAULT (HIGH JUMP) ---
function initHighJump() {
  // CON gives extra attempts (ref#15: CON attempts)
  var maxAttempts = 3 + Math.floor((conScale() - 1) * 4);
  if (maxAttempts > 5) maxAttempts = 5;
  ev = {
    phase: 'approach',
    speed: 0,
    barHeight: 1.5,
    attempts: 0,
    maxAttempts: maxAttempts,
    cleared: false,
    jumpY: 0,
    jumpVY: 0,
    archPower: 0,
    maxJumpHeight: 0,
    animFrame: 0,
    playerX: 50,
    barY: 180,
    aiResults: [],
    heightsCleared: 0,
    failed: false
  };
  for (var i = 1; i < 4; i++) {
    var skill = 0.5 + i * 0.15;
    ev.aiResults.push(1.5 + skill * 1.2 + Math.random() * 0.3);
  }
  initWeather();
}

function updateHighJump(dt) {
  if (ev.phase === 'approach') {
    ev.speed = TAS.math.lerp(ev.speed, mashRate * 0.06, 0.1);
    ev.playerX += ev.speed * 2;
    ev.animFrame += ev.speed * 0.5;

    if (ev.playerX > GW * 0.5) {
      if (jumpPressed()) {
        ev.phase = 'jump';
        // STR boosts vertical leap (ref#16: STR vertical)
        ev.jumpVY = -(5 + ev.speed * 3) * strScale();
        ev.jumpY = 0;
        ev.archPower = 0;
        TAS.audio.playTone(440, 0.15, 'triangle', 0.08);
      }
    }

    if (ev.playerX > GW * 0.7 && ev.phase === 'approach') {
      ev.phase = 'result';
      ev.attempts++;
      if (ev.attempts >= ev.maxAttempts) ev.failed = true;
      eventTimer = 0;
      addScorePopup(GW / 2, GH / 2, 'MISSED WINDOW', '#ff4444');
    }
  }

  if (ev.phase === 'jump') {
    ev.jumpY += ev.jumpVY;
    ev.jumpVY += 0.3;
    ev.phase = 'arch';
  }

  if (ev.phase === 'arch') {
    ev.jumpY += ev.jumpVY;
    ev.jumpVY += 0.25;
    ev.archPower += mashRate * 0.01;
    ev.maxJumpHeight = Math.min(ev.maxJumpHeight, ev.jumpY);

    if (ev.jumpY >= 0) {
      var clearHeight = -ev.maxJumpHeight * 0.015 + ev.archPower * 0.1;
      ev.cleared = clearHeight > ev.barHeight;

      if (ev.cleared) {
        ev.heightsCleared++;
        ev.barHeight += 0.1;
        TAS.audio.playTone(660, 0.2, 'square', 0.1);
        TAS.particles.spawn(GW * 0.55, ev.barY, COL.gold, 12, 2);
        addScorePopup(GW / 2, 130, 'CLEARED ' + ev.barHeight.toFixed(1) + 'm!', COL.spore);
        TAS.fx.flash(COL.spore, 0.2);
      } else {
        ev.attempts++;
        TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1);
        TAS.fx.shake(4, 0.9);
        addScorePopup(GW / 2, 130, 'KNOCKED ' + ev.attempts + '/' + ev.maxAttempts, '#ff4444');
      }

      if (ev.attempts >= ev.maxAttempts) ev.failed = true;
      ev.phase = 'result';
      eventTimer = 0;
    }
  }

  if (ev.phase === 'result') {
    eventTimer++;
    if (eventTimer > 90) {
      if (ev.failed) {
        eventState = 'result';
      } else {
        ev.phase = 'approach';
        ev.speed = 0;
        ev.playerX = 50;
        ev.jumpY = 0;
        ev.archPower = 0;
        ev.maxJumpHeight = 0;
        ev.barY = 180 - ev.heightsCleared * 8;
      }
    }
  }
}

function drawHighJump() {
  var stad = getStadium(3);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 120);
  drawCrowd(20, 5, stad);

  var groundY = 250;
  ctx.fillStyle = stad.ground;
  ctx.fillRect(0, groundY, GW, GH - groundY);

  // Garden mat (mossy)
  ctx.fillStyle = COL.moss;
  ctx.fillRect(GW * 0.55, groundY - 30, 100, 35);
  // Moss detail
  ctx.fillStyle = '#448844';
  for (var m = 0; m < 5; m++) {
    ctx.fillRect(GW * 0.55 + m * 20 + 5, groundY - 28, 8, 3);
  }

  // Bar with garden poles
  ctx.fillStyle = '#aa9977';
  ctx.fillRect(GW * 0.5, groundY - 60, 4, 60);
  ctx.fillRect(GW * 0.7, groundY - 60, 4, 60);
  // Mushroom caps on poles
  ctx.fillStyle = COL.fungal;
  ctx.beginPath();
  ctx.arc(GW * 0.5 + 2, groundY - 62, 6, Math.PI, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(GW * 0.7 + 2, groundY - 62, 6, Math.PI, 0);
  ctx.fill();
  // Bar
  ctx.fillStyle = '#fff';
  ctx.fillRect(GW * 0.5, ev.barY, GW * 0.2 + 6, 3);

  // Baseling athlete
  var py = groundY + ev.jumpY;
  drawAthlete(ev.playerX, Math.min(py, groundY), 0, ev.animFrame);

  // Height display
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HEIGHT: ' + ev.barHeight.toFixed(2) + 'm', 10, 30);
  ctx.fillText('ATTEMPTS: ' + ev.attempts + '/' + ev.maxAttempts, 10, 48);

  drawMeter(10, GH - 30, 100, 12, ev.speed, 2, COL.spore, 'SPEED');
  drawWeather();

  if (ev.phase === 'arch') {
    drawMeter(GW / 2 - 50, 60, 100, 12, ev.archPower, 3, COL.reactor, 'ARCH!');
  }

  if (ev.cleared && ev.phase === 'result') {
    ctx.fillStyle = COL.spore;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CLEARED!', GW / 2, GH / 2 - 20);
  }

  drawStatHud([{ stat: 'str', label: 'STR(Leap)' }, { stat: 'con', label: 'CON(Tries)' }]);
}

// --- SEED ARCHERY ---
function initArchery() {
  // CHA reduces wind (ref#17: CHA wind reduction)
  var baseWind = (Math.random() - 0.5) * 4 / chaScale();
  ev = {
    aimY: GH / 2,
    aimSpeed: 0,
    wind: baseWind,
    arrows: 3,
    arrowsShot: [],
    firing: false,
    arrowX: 60,
    arrowY: 0,
    totalScore: 0,
    aiResults: [],
    targetX: GW * 0.75,
    targetY: GH / 2,
    targetR: 50,
    showResult: 0,
    // WIS stabilizes aim (ref#18: WIS aim stability)
    aimStability: 0.92 + wisScale() * 0.03
  };
  for (var i = 1; i < 4; i++) {
    var skill = 0.5 + i * 0.15;
    var aiTotal = 0;
    for (var a = 0; a < 3; a++) {
      aiTotal += Math.floor(5 + skill * 5 + Math.random() * (1 - skill) * 4);
    }
    ev.aiResults.push(Math.min(30, aiTotal));
  }
  if (bossMode && BOSS_EVENTS.archery) {
    ev.aiResults[2] = Math.floor(25 * BOSS_EVENTS.archery.scoreMult);
    ATHLETE_COLORS[3].name = BOSS_EVENTS.archery.name;
    ATHLETE_COLORS[3].body = BOSS_EVENTS.archery.color;
  }
  initWeather();
}

function updateArchery(dt) {
  if (ev.arrows <= 0 && !ev.firing) {
    eventTimer++;
    if (eventTimer > 90) eventState = 'result';
    return;
  }

  if (!ev.firing) {
    // Aim with up/down — WIS stabilizes (ref#18 applied)
    if (keyUp()) ev.aimSpeed -= 0.3;
    if (keyDown()) ev.aimSpeed += 0.3;
    ev.aimSpeed *= ev.aimStability; // WIS dampens oscillation
    ev.aimY += ev.aimSpeed;
    ev.aimY = TAS.math.clamp(ev.aimY, ev.targetY - 60, ev.targetY + 60);

    // Sway from wind — CHA reduces (ref#17 applied)
    ev.aimY += Math.sin(frame * 0.03) * Math.abs(ev.wind) * 0.3;

    if (jumpPressed()) {
      ev.firing = true;
      ev.arrowX = 80;
      ev.arrowY = ev.aimY;
      TAS.audio.playTone(600, 0.1, 'triangle', 0.08);
    }
  } else {
    ev.arrowX += 8;
    ev.arrowY += ev.wind * 0.3;

    if (ev.arrowX >= ev.targetX) {
      ev.firing = false;
      ev.arrows--;
      var dist = Math.abs(ev.arrowY - ev.targetY);
      var pts = 0;
      if (dist < 5) pts = 10;
      else if (dist < 12) pts = 9;
      else if (dist < 20) pts = 8;
      else if (dist < 28) pts = 7;
      else if (dist < 36) pts = 6;
      else if (dist < 44) pts = 5;
      else pts = Math.max(1, 4 - Math.floor(dist / 15));

      // INT multiplies archery score (ref#19: INT score mult)
      pts = Math.min(10, Math.round(pts * intScale()));

      ev.totalScore += pts;
      ev.arrowsShot.push({ x: ev.arrowX, y: ev.arrowY, pts: pts });
      ev.showResult = 60;

      if (pts >= 9) {
        TAS.audio.playTone(880, 0.2, 'square', 0.1);
        TAS.particles.spawn(ev.targetX, ev.arrowY, COL.gold, 10, 2);
        addScorePopup(GW / 2, GH / 2 - 60, pts === 10 ? 'BULLSEYE!' : pts + ' pts', COL.gold);
        TAS.fx.flash(COL.gold, 0.15);
      } else {
        TAS.audio.playTone(330, 0.15, 'triangle', 0.06);
        addScorePopup(ev.targetX, ev.arrowY - 10, pts + ' pts', '#fff');
      }

      // New wind for next shot — CHA reduces (ref#17 again)
      ev.wind = (Math.random() - 0.5) * 5 / chaScale();
      eventTimer = 0;
    }
  }

  if (ev.showResult > 0) ev.showResult--;
}

function drawArchery() {
  var stad = getStadium(3);
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  drawCrowd(10, 3, stad);

  // Seed target (concentric rings with glow)
  var rings = ['#fff', '#000', COL.mycelium, COL.reactor, COL.spore];
  for (var i = 0; i < 5; i++) {
    ctx.fillStyle = rings[i];
    ctx.beginPath();
    ctx.arc(ev.targetX, ev.targetY, ev.targetR - i * 10, 0, Math.PI * 2);
    ctx.fill();
  }
  // Bullseye core
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(ev.targetX, ev.targetY, 5, 0, Math.PI * 2);
  ctx.fill();
  // Glow pulse
  ctx.globalAlpha = 0.1 + Math.sin(frame * 0.06) * 0.05;
  ctx.fillStyle = COL.reactor;
  ctx.beginPath();
  ctx.arc(ev.targetX, ev.targetY, ev.targetR + 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Previous arrows
  for (var ai = 0; ai < ev.arrowsShot.length; ai++) {
    var a = ev.arrowsShot[ai];
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(a.x - 2, a.y - 1, 8, 2);
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(a.x, a.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Crosshair
  if (ev.arrows > 0 && !ev.firing) {
    ctx.strokeStyle = COL.spore;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(50, ev.aimY);
    ctx.lineTo(70, ev.aimY);
    ctx.moveTo(60, ev.aimY - 10);
    ctx.lineTo(60, ev.aimY + 10);
    ctx.stroke();
    // Trajectory line
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = 'rgba(136,204,68,0.3)';
    ctx.beginPath();
    ctx.moveTo(70, ev.aimY);
    ctx.lineTo(ev.targetX, ev.aimY + ev.wind * 8);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Arrow in flight
  if (ev.firing) {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(ev.arrowX - 10, ev.arrowY - 1, 20, 2);
    ctx.fillStyle = COL.spore;
    ctx.beginPath();
    ctx.moveTo(ev.arrowX + 10, ev.arrowY);
    ctx.lineTo(ev.arrowX + 5, ev.arrowY - 3);
    ctx.lineTo(ev.arrowX + 5, ev.arrowY + 3);
    ctx.fill();
  }

  drawWeather();

  // Wind indicator
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WIND', GW / 2, 20);
  ctx.strokeStyle = '#88ccff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(GW / 2, 28);
  ctx.lineTo(GW / 2 + ev.wind * 15, 28);
  ctx.stroke();
  var windDir = ev.wind > 0 ? 1 : -1;
  ctx.beginPath();
  ctx.moveTo(GW / 2 + ev.wind * 15, 28);
  ctx.lineTo(GW / 2 + ev.wind * 15 - windDir * 5, 24);
  ctx.lineTo(GW / 2 + ev.wind * 15 - windDir * 5, 32);
  ctx.fill();

  // Score
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + ev.totalScore + '/30', 10, GH - 10);
  ctx.fillText('ARROWS: ' + ev.arrows, 10, GH - 26);

  // Shot result popup
  if (ev.showResult > 0 && ev.arrowsShot.length > 0) {
    var last = ev.arrowsShot[ev.arrowsShot.length - 1];
    ctx.fillStyle = last.pts >= 9 ? COL.gold : '#fff';
    ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(last.pts === 10 ? 'BULLSEYE!' : last.pts + ' pts', GW / 2, GH / 2 - 40);
  }

  drawStatHud([{ stat: 'wis', label: 'WIS(Aim)' }, { stat: 'cha', label: 'CHA(Wind)' }, { stat: 'int', label: 'INT(Score)' }]);
}

// --- GARDEN MARATHON (1500M) ---
function initEndurance() {
  // CON scales max stamina (ref#20: CON stamina)
  var maxStam = 100 * conScale();
  ev = {
    positions: [0, 0, 0, 0],
    speeds: [0, 0, 0, 0],
    stamina: [maxStam, 100, 100, 100],
    maxStamina: maxStam,
    laps: [0, 0, 0, 0],
    totalLaps: 3,
    lapLength: 400,
    finished: [false, false, false, false],
    times: [0, 0, 0, 0],
    elapsed: 0,
    animFrames: [0, 0, 0, 0],
    aiSpeeds: [0.6, 0.75, 0.85],
    sprinting: false,
    // DEX boosts jog speed (ref#21: DEX jog)
    jogSpeed: 1.2 * dexScale(),
    // CON slows stamina drain (ref#20 again)
    drainRate: 0.4 / conScale(),
    recoveryRate: 0.15 * conScale()
  };
  spawnTrackSpores(8, 380);
  spawnReactorSections(4, 380);
  initWeather();
}

function updateEndurance(dt) {
  ev.elapsed += dt;

  var mashing = mashRate > 4;
  ev.sprinting = mashing;

  if (!ev.finished[0]) {
    if (mashing) {
      // DEX + mash for sprint speed (ref#4 again)
      ev.speeds[0] = TAS.math.lerp(ev.speeds[0], mashRate * 0.05 * dexScale(), 0.05);
      ev.stamina[0] -= ev.drainRate; // CON reduces drain
    } else {
      ev.speeds[0] = TAS.math.lerp(ev.speeds[0], ev.jogSpeed, 0.03); // DEX jog speed
      ev.stamina[0] = Math.min(ev.maxStamina, ev.stamina[0] + ev.recoveryRate); // CON recovery
    }

    if (ev.stamina[0] <= 0) {
      ev.stamina[0] = 0;
      ev.speeds[0] = TAS.math.lerp(ev.speeds[0], 0.5, 0.1);
    }

    // Reactor boost sections on track
    var reactorMult = checkReactorBoost(ev.positions[0]);
    if (reactorMult > 1) {
      ev.speeds[0] *= reactorMult;
      if (frame % 30 === 0) addScorePopup(GW / 2, 160, 'GARDEN BOOST!', COL.reactor);
    }

    // Spore effects
    var sporeHit = checkSporeCollision(ev.positions[0], 0);
    if (sporeHit) {
      if (sporeHit.effect === 'stamina') {
        ev.stamina[0] = Math.min(ev.maxStamina, ev.stamina[0] + sporeHit.strength);
        addScorePopup(GW / 2, 170, '+STAMINA', COL.moss);
      } else if (sporeHit.effect === 'slow') {
        ev.speeds[0] *= (1 - sporeHit.strength * 0.3);
        addScorePopup(GW / 2, 170, 'SPORE!', sporeHit.color);
      }
    }

    ev.positions[0] += ev.speeds[0];
    ev.animFrames[0] += ev.speeds[0] * 0.3;

    if (ev.positions[0] >= ev.lapLength) {
      ev.positions[0] -= ev.lapLength;
      ev.laps[0]++;
      addScorePopup(GW / 2, 150, 'LAP ' + ev.laps[0] + '!', COL.spore);
      if (ev.laps[0] >= ev.totalLaps) {
        ev.finished[0] = true;
        ev.times[0] = ev.elapsed;
        TAS.particles.spawn(GW / 2, 190, COL.gold, 20, 3);
      }
    }
  }

  // AI
  for (var i = 1; i < 4; i++) {
    if (!ev.finished[i]) {
      var aiBase = ev.aiSpeeds[i - 1];
      var lapProgress = ev.laps[i] / ev.totalLaps;
      var targetSpeed = aiBase * 2;
      if (lapProgress > 0.7) targetSpeed *= 1.3;
      ev.speeds[i] = TAS.math.lerp(ev.speeds[i], targetSpeed + Math.sin(frame * 0.02 + i) * 0.3, 0.02);
      ev.positions[i] += ev.speeds[i];
      ev.animFrames[i] += ev.speeds[i] * 0.3;

      if (ev.positions[i] >= ev.lapLength) {
        ev.positions[i] -= ev.lapLength;
        ev.laps[i]++;
        if (ev.laps[i] >= ev.totalLaps) {
          ev.finished[i] = true;
          ev.times[i] = ev.elapsed;
        }
      }
    }
  }

  crowdCheer = ev.speeds[0] * 0.15;

  if (ev.finished.every(Boolean)) {
    eventTimer++;
    if (eventTimer > 120) eventState = 'result';
  }
}

function drawEndurance() {
  var stad = getStadium(3);
  ctx.fillStyle = stad.sky;
  ctx.fillRect(0, 0, GW, 60);
  drawCrowd(10, 3, stad);

  // Garden oval track
  ctx.fillStyle = COL.grass;
  ctx.fillRect(0, 70, GW, GH - 70);
  // Garden trees in center
  ctx.fillStyle = '#225522';
  for (var t = 0; t < 6; t++) {
    var tx = GW / 2 - 60 + t * 24;
    var ty = 160 + Math.sin(t * 1.5) * 20;
    ctx.beginPath();
    ctx.moveTo(tx, ty - 20);
    ctx.lineTo(tx - 8, ty);
    ctx.lineTo(tx + 8, ty);
    ctx.fill();
    ctx.fillStyle = '#553311';
    ctx.fillRect(tx - 1, ty, 3, 8);
    ctx.fillStyle = '#225522';
  }

  // Track oval
  var cx = GW / 2, cy = 190;
  var rx = 160, ry = 80;

  ctx.strokeStyle = stad.ground;
  ctx.lineWidth = 40;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Lane lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx - 20, ry - 10, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx + 20, ry + 10, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Baselings on track
  for (var i = 0; i < 4; i++) {
    var progress = ev.positions[i] / ev.lapLength;
    var angle = progress * Math.PI * 2 - Math.PI / 2;
    var laneOffset = (i - 1.5) * 8;
    var ax = cx + Math.cos(angle) * (rx + laneOffset);
    var ay = cy + Math.sin(angle) * (ry + laneOffset * 0.5);
    ctx.fillStyle = ATHLETE_COLORS[i].body;
    ctx.beginPath();
    ctx.arc(ax, ay, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#eebb88';
    ctx.beginPath();
    ctx.arc(ax, ay - 4, 3, 0, Math.PI * 2);
    ctx.fill();
    // Player name tag
    if (i === 0) {
      ctx.fillStyle = COL.spore;
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(statB.icon, ax, ay - 10);
    }
  }

  drawWeather();

  // Stamina bar (player) — CON-scaled max
  var staminaColor = ev.stamina[0] > ev.maxStamina * 0.6 ? COL.spore : ev.stamina[0] > ev.maxStamina * 0.3 ? '#cccc44' : '#cc4444';
  drawMeter(10, GH - 30, 140, 16, ev.stamina[0], ev.maxStamina, staminaColor, 'STAMINA');

  // Sprint indicator
  if (ev.sprinting) {
    ctx.fillStyle = COL.reactor;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPRINTING!', 160, GH - 20);
  } else {
    ctx.fillStyle = COL.spore;
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('jogging', 160, GH - 20);
  }

  // Lap counter
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('LAP ' + Math.min(ev.laps[0] + 1, ev.totalLaps) + '/' + ev.totalLaps, GW - 10, GH - 20);
  ctx.fillText(ev.elapsed.toFixed(1) + 's', GW - 10, GH - 38);

  // Position indicator
  var sorted = [0, 1, 2, 3].sort(function(a, b) {
    return (ev.laps[b] * ev.lapLength + ev.positions[b]) - (ev.laps[a] * ev.lapLength + ev.positions[a]);
  });
  var playerPos = sorted.indexOf(0) + 1;
  ctx.fillStyle = playerPos === 1 ? COL.gold : '#fff';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(playerPos === 1 ? '1ST' : playerPos === 2 ? '2ND' : playerPos === 3 ? '3RD' : '4TH', GW / 2, GH - 50);

  drawSpeedLines(ev.sprinting ? mashRate : 0);

  drawStatHud([{ stat: 'con', label: 'CON(Stam)' }, { stat: 'dex', label: 'DEX(Speed)' }]);
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateMash();
  updateScorePopups();

  crowdCheer = Math.max(0, crowdCheer - 0.02);

  if (state === 'title') {
    if (picking) return; // character-select overlay open — swallow game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false; // consume so it doesn't also start
      picking = true;
      TAS.player.select(function () { recomputeStats(); picking = false; });
      return;
    }
    if (anyKey()) {
      state = 'playing';
      eventIndex = 0;
      scores = [0, 0, 0, 0];
      bossMode = false;
      bossDefeated = false;
      eventState = 'intro';
      eventTimer = 0;
      // Reset athlete names (may have been overwritten by boss)
      ATHLETE_COLORS[3].name = 'POOPFLING';
      ATHLETE_COLORS[3].body = '#a855f7';
      TAS.audio.ensureAudio();
      TAS.audio.playTone(440, 0.15, 'square', 0.1);
    }
    return;
  }

  if (state === 'finalResults') {
    if (anyKey() && eventTimer > 60) {
      state = 'title';
    }
    eventTimer++;
    return;
  }

  if (state === 'playing') {
    if (eventState === 'intro') {
      eventTimer++;
      if (eventTimer > 120 || (eventTimer > 30 && anyKey())) {
        // Show tutorial for first play
        if (!tutorialSeen) {
          eventState = 'tutorial';
          showTutorial = true;
          tutorialTimer = 0;
        } else {
          eventState = 'ready';
        }
        eventTimer = 0;
        initEvent(eventIndex);
      }
      return;
    }

    if (eventState === 'tutorial') {
      tutorialTimer++;
      if (tutorialTimer > 30 && anyKey()) {
        showTutorial = false;
        markTutorialSeen();
        eventState = 'ready';
        eventTimer = 0;
      }
      return;
    }

    if (eventState === 'ready') {
      eventTimer++;
      if (eventTimer > 60) {
        eventState = 'active';
        eventTimer = 0;
        mashCount = 0;
        mashHistory = [];
      }
      return;
    }

    if (eventState === 'active') {
      updateEvent(eventIndex, dt);
      return;
    }

    if (eventState === 'result') {
      eventTimer++;
      if (eventTimer === 1) {
        scoreEvent(eventIndex);
      }
      if (eventTimer > 180 || (eventTimer > 60 && anyKey())) {
        eventIndex++;
        if (eventIndex >= EVENTS.length) {
          // Check for boss mode unlock
          if (scores[0] >= 50 && !bossDefeated) {
            bossMode = true;
            state = 'bossIntro';
            eventTimer = 0;
          } else {
            state = 'finalResults';
            eventTimer = 0;
            TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.15], [1047, 0.3]], 150);
          }
        } else {
          eventState = 'intro';
          eventTimer = 0;
          // Reset boss names for next event
          ATHLETE_COLORS[3].name = 'POOPFLING';
          ATHLETE_COLORS[3].body = '#a855f7';
        }
      }
      return;
    }
  }

  if (state === 'bossIntro') {
    eventTimer++;
    if (eventTimer > 120 || (eventTimer > 40 && anyKey())) {
      // Boss challenge: replay a random event with boss opponent
      state = 'playing';
      var bossEventIdx = Math.floor(Math.random() * 5); // pick from first 5 events
      eventIndex = bossEventIdx;
      eventState = 'ready';
      eventTimer = 0;
      initEvent(eventIndex);
      TAS.audio.playTone(220, 0.3, 'sawtooth', 0.15);
    }
    return;
  }
}

function initEvent(idx) {
  var type = EVENTS[idx].type;
  switch (type) {
    case 'dash': initDash(); break;
    case 'longjump': initLongJump(); break;
    case 'javelin': initJavelin(); break;
    case 'hurdles': initHurdles(); break;
    case 'hammer': initHammer(); break;
    case 'highjump': initHighJump(); break;
    case 'archery': initArchery(); break;
    case 'endurance': initEndurance(); break;
  }
}

function updateEvent(idx, dt) {
  var type = EVENTS[idx].type;
  switch (type) {
    case 'dash': updateDash(dt); break;
    case 'longjump': updateLongJump(dt); break;
    case 'javelin': updateJavelin(dt); break;
    case 'hurdles': updateHurdles(dt); break;
    case 'hammer': updateHammer(dt); break;
    case 'highjump': updateHighJump(dt); break;
    case 'archery': updateArchery(dt); break;
    case 'endurance': updateEndurance(dt); break;
  }
}

function drawEvent(idx) {
  var type = EVENTS[idx].type;
  switch (type) {
    case 'dash': drawDash(); break;
    case 'longjump': drawLongJump(); break;
    case 'javelin': drawJavelin(); break;
    case 'hurdles': drawHurdles(); break;
    case 'hammer': drawHammer(); break;
    case 'highjump': drawHighJump(); break;
    case 'archery': drawArchery(); break;
    case 'endurance': drawEndurance(); break;
  }
}

function scoreEvent(idx) {
  var type = EVENTS[idx].type;
  var results = [];

  switch (type) {
    case 'dash':
    case 'hurdles': {
      var times = ev.times.slice();
      for (var i = 0; i < 4; i++) if (!ev.finished[i]) times[i] = 99.99;
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: times[i] }; });
      results.sort(function(a, b) { return a.value - b.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, false);
      break;
    }
    case 'longjump':
    case 'javelin': {
      var distances = [ev.distance || 0];
      for (var i2 = 0; i2 < 3; i2++) distances.push(ev.aiResults[i2]);
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: distances[i] }; });
      results.sort(function(a, b) { return b.value - a.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, true);
      break;
    }
    case 'hammer': {
      var hamDists = [ev.distance || 0];
      for (var i3 = 0; i3 < 3; i3++) hamDists.push(ev.aiResults[i3]);
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: hamDists[i] }; });
      results.sort(function(a, b) { return b.value - a.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, true);
      break;
    }
    case 'highjump': {
      var heights = [ev.barHeight - 0.1];
      if (ev.heightsCleared === 0) heights[0] = 0;
      for (var i4 = 0; i4 < 3; i4++) heights.push(ev.aiResults[i4]);
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: heights[i] }; });
      results.sort(function(a, b) { return b.value - a.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, true);
      break;
    }
    case 'archery': {
      var archScores = [ev.totalScore];
      for (var i5 = 0; i5 < 3; i5++) archScores.push(ev.aiResults[i5]);
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: archScores[i] }; });
      results.sort(function(a, b) { return b.value - a.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, true);
      break;
    }
    case 'endurance': {
      var endTimes = ev.times.slice();
      for (var i6 = 0; i6 < 4; i6++) if (!ev.finished[i6]) endTimes[i6] = 999;
      results = [0, 1, 2, 3].map(function(i) { return { idx: i, value: endTimes[i] }; });
      results.sort(function(a, b) { return a.value - b.value; });
      if (results[0].idx === 0) saveRecord(type, results[0].value, false);
      break;
    }
  }

  // Award points: 1st=10, 2nd=7, 3rd=5, 4th=3
  // INT multiplies points gained (ref#22: INT score multiplier)
  var pts = [10, 7, 5, 3];
  ev.eventResults = results;
  for (var j = 0; j < results.length; j++) {
    var ptsToAdd = pts[j];
    if (results[j].idx === 0) {
      ptsToAdd = Math.round(ptsToAdd * intScale()); // INT bonus on player's points
    }
    scores[results[j].idx] += ptsToAdd;
  }

  var playerPlace = results.findIndex(function(r) { return r.idx === 0; });
  if (playerPlace === 0) {
    TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.2]], 120);
    TAS.fx.flash(COL.gold, 0.3);
    TAS.particles.spawn(GW / 2, GH / 2, COL.gold, 20, 3);
  } else if (playerPlace === 1) {
    TAS.audio.playMelody([[440, 0.1], [523, 0.15]], 120);
  } else {
    TAS.audio.playTone(220, 0.2, 'triangle', 0.06);
  }

  // Boss defeat check
  if (bossMode && playerPlace === 0) {
    bossDefeated = true;
    addScorePopup(GW / 2, 80, 'SPORE BOSS DEFEATED!', COL.gold);
    TAS.fx.flash(COL.gold, 0.5);
  }
}

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'finalResults') {
    drawFinalResults();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'bossIntro') {
    drawBossIntro();
    TAS.input.drawTouchControls(GW, GH);
    return;
  }

  if (state === 'playing') {
    if (eventState === 'intro') {
      drawEventIntro();
    } else if (eventState === 'tutorial') {
      drawEvent(eventIndex);
      drawTutorial(EVENTS[eventIndex].type);
    } else if (eventState === 'ready') {
      drawEvent(eventIndex);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, GW, GH);
      ctx.fillStyle = '#ffdd44';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('GET READY!', GW / 2, GH / 2);
      if (bossMode) {
        ctx.fillStyle = '#ff4444';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('BOSS CHALLENGE!', GW / 2, GH / 2 + 30);
      }
    } else if (eventState === 'active') {
      ctx.save();
      TAS.fx.applyShake();
      drawEvent(eventIndex);
      TAS.particles.draw();
      drawScorePopups();
      ctx.restore();
      TAS.fx.drawFlash(GW, GH);
    } else if (eventState === 'result') {
      drawEventResult();
    }

    // Event name HUD
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, GW, 16);
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    var stadName = getStadium(eventIndex).name;
