    ctx.fillText(stadName + ' - EVENT ' + (eventIndex + 1) + '/8: ' + EVENTS[eventIndex].name, 6, 11);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#88ccff';
    ctx.fillText('TOTAL: ' + scores[0] + 'pts', GW - 6, 11);

    TAS.input.drawTouchControls(GW, GH);
  }
}

function drawTitleScreen() {
  // Garden stadium background
  ctx.fillStyle = COL.sky;
  ctx.fillRect(0, 0, GW, GH * 0.6);
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  drawCrowd(40, 6, STADIUMS[0]);

  ctx.fillStyle = COL.track;
  ctx.fillRect(0, GH * 0.6, GW, GH * 0.4);

  // Garden root network on ground
  ctx.strokeStyle = COL.mycelium;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.2;
  for (var m = 0; m < 12; m++) {
    ctx.beginPath();
    var mx = m * 40;
    ctx.moveTo(mx, GH * 0.6);
    ctx.quadraticCurveTo(mx + 15, GH * 0.75, mx + 30, GH * 0.9);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASELING OLYMPICS', GW / 2 + 2, 32);
  ctx.fillStyle = COL.gold;
  ctx.fillText('BASELING OLYMPICS', GW / 2, 30);

  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('Baseling Olympics Championship', GW / 2, 50);

  // Selected baseling name (Base-blue)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 11px monospace';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), GW / 2, 65);

  // Baseling rings (garden-themed)
  var ringColors = [COL.spore, COL.reactor, COL.mycelium, COL.toxin, COL.gold];
  for (var i = 0; i < 5; i++) {
    ctx.strokeStyle = ringColors[i];
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(GW / 2 - 48 + i * 24, 85, 10, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Baseling athletes running across
  for (var j = 0; j < 4; j++) {
    var x = (frame * (1 + j * 0.3) + j * 120) % (GW + 60) - 30;
    drawAthlete(x, GH * 0.7, j, frame * (1 + j * 0.2), { scale: 0.8 });
  }

  // Events list
  ctx.fillStyle = '#ddd';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  for (var k = 0; k < 8; k++) {
    var col = k < 4 ? 0 : 1;
    var row = k % 4;
    ctx.fillText((k + 1) + '. ' + EVENTS[k].name, GW * 0.3 + col * GW * 0.4, 105 + row * 14);
  }

  // Controls
  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('A+B = MASH  |  Z/SPACE = ACTION  |  UP/DOWN = AIM', GW / 2, GH - 50);

  // World records
  var recKeys = Object.keys(worldRecords);
  if (recKeys.length > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('GARDEN RECORDS SET: ' + recKeys.length + '/8', GW / 2, GH - 35);
  }

  // 5 arcade stat bars (canonical colors) for the selected baseling
  if (_sel && _sel.stats) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _bx0 = GW / 2 - 110;
    ctx.textAlign = 'left'; ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _k = _keys[_i], _mm = _meta[_k], _v = _sel.stats[_k], _bx = _bx0 + _i * 46;
      ctx.fillStyle = _mm.color; ctx.fillText(_mm.label, _bx, GH - 64);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, GH - 61, 38, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, GH - 61, 38 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }

  // Start prompt + select-baseling prompt (Base-blue)
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 18);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', GW / 2, GH - 4);
}

function drawEventIntro() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  var stad = getStadium(eventIndex);

  // Stadium name
  ctx.fillStyle = stad.accent;
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(stad.name, GW / 2, 55);

  // Event number and name
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('EVENT ' + (eventIndex + 1) + ' OF 8', GW / 2, 75);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px monospace';
  ctx.fillText(EVENTS[eventIndex].name, GW / 2, 110);

  // Event flavor text
  ctx.fillStyle = stad.accent;
  ctx.font = '11px monospace';
  ctx.fillText(EVENTS[eventIndex].desc, GW / 2, 130);

  // Instructions
  var instructions = getEventInstructions(eventIndex);
  ctx.fillStyle = '#aaa';
  ctx.font = '11px monospace';
  for (var i = 0; i < instructions.length; i++) {
    ctx.fillText(instructions[i], GW / 2, 155 + i * 16);
  }

  // Current standings
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('--- STANDINGS ---', GW / 2, 240);
  var sorted = [0, 1, 2, 3].sort(function(a, b) { return scores[b] - scores[a]; });
  for (var j = 0; j < 4; j++) {
    var idx = sorted[j];
    ctx.fillStyle = idx === 0 ? statB.color : '#888';
    ctx.fillText((j + 1) + '. ' + ATHLETE_COLORS[idx].name + ' - ' + scores[idx] + 'pts', GW / 2, 256 + j * 14);
  }

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function getEventInstructions(idx) {
  var type = EVENTS[idx].type;
  switch (type) {
    case 'dash': return ['Alternate A and B rapidly to run!', 'DEX boosts speed. Don\'t false start!'];
    case 'longjump': return ['Mash A+B to build speed on runway.', 'Hold JUMP at the line - release for angle.', 'STR powers your leap. WIS widens timing.'];
    case 'javelin': return ['Mash to build run-up speed.', 'Press JUMP for angle mode. Release to throw.', 'STR = throw power. WIS = steady aim.'];
    case 'hurdles': return ['Mash A+B to run between hurdles.', 'Press SPACE/JUMP to leap over them.', 'DEX = speed. CON = absorb hits.'];
    case 'hammer': return ['Press A rhythmically to build spin.', 'Press B to release the POOP hammer.', 'STR = momentum. WIS = rhythm tolerance.'];
    case 'highjump': return ['Mash to approach the garden canopy bar.', 'Press JUMP at the bar, then MASH to arch!', 'STR = leap height. CON = extra attempts.'];
    case 'archery': return ['UP/DOWN to aim the crosshair.', 'Press JUMP/A to fire.', 'WIS = stability. CHA = wind. INT = score.'];
    case 'endurance': return ['Mash to SPRINT (drains stamina).', 'Stop mashing to JOG (recovers).', 'CON = stamina. DEX = base speed.'];
    default: return [];
  }
}

function drawEventResult() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(EVENTS[eventIndex].name + ' - RESULTS', GW / 2, 40);

  if (!ev.eventResults) return;

  var medals = [COL.gold, COL.silver, COL.bronze, '#666'];
  var placeNames = ['1ST', '2ND', '3RD', '4TH'];

  for (var i = 0; i < ev.eventResults.length; i++) {
    var r = ev.eventResults[i];
    var y = 80 + i * 45;
    var isPlayer = r.idx === 0;

    // Medal circle
    ctx.fillStyle = medals[i];
    ctx.beginPath();
    ctx.arc(60, y, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(placeNames[i], 60, y + 4);

    // Name
    ctx.fillStyle = isPlayer ? COL.spore : '#ddd';
    ctx.font = (isPlayer ? 'bold ' : '') + '14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(ATHLETE_COLORS[r.idx].name + (isPlayer ? ' (YOU)' : ''), 90, y + 5);

    // Value
    ctx.textAlign = 'right';
    var type = EVENTS[eventIndex].type;
    var valStr = '';
    if (type === 'dash' || type === 'hurdles' || type === 'endurance') {
      valStr = r.value < 99 ? r.value.toFixed(2) + 's' : 'DNF';
    } else if (type === 'archery') {
      valStr = r.value + '/30';
    } else {
      valStr = r.value.toFixed(2) + 'm';
    }
    ctx.fillText(valStr, GW - 40, y + 5);

    // Points awarded
    var ptsArr = [10, 7, 5, 3];
    var displayPts = ptsArr[i];
    if (isPlayer) displayPts = Math.round(displayPts * intScale());
    ctx.fillStyle = '#ffdd44';
    ctx.font = '10px monospace';
    ctx.fillText('+' + displayPts + 'pts', GW - 40, y + 18);
    // INT bonus indicator
    if (isPlayer && intScale() > 1) {
      ctx.fillStyle = COL.mycelium;
      ctx.fillText('INT+', GW - 80, y + 18);
    }
  }

  // World record check
  if (ev.eventResults[0].idx === 0) {
    ctx.fillStyle = COL.toxin;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARDEN RECORD!', GW / 2, GH - 60);
    // Record particles
    if (frame % 5 === 0) {
      TAS.particles.spawn(GW / 2 + (Math.random() - 0.5) * 100, GH - 60, COL.gold, 2, 1);
    }
  }

  // Boss defeat
  if (bossMode && bossDefeated && ev.eventResults[0].idx === 0) {
    ctx.fillStyle = COL.gold;
    ctx.font = 'bold 14px monospace';
    ctx.fillText('SPORE BOSS VANQUISHED!', GW / 2, GH - 80);
  }

  // Total standings
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TOTAL: ' + ATHLETE_COLORS.map(function(a, i) { return a.name + ':' + scores[i]; }).join(' | '), GW / 2, GH - 30);

  TAS.particles.draw();

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = '11px monospace';
  ctx.fillText('PRESS ANY KEY TO CONTINUE', GW / 2, GH - 10);
  ctx.globalAlpha = 1;
}

function drawBossIntro() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Dramatic red vignette
  var grd = ctx.createRadialGradient(GW / 2, GH / 2, 50, GW / 2, GH / 2, 250);
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(80,0,0,0.5)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GW, GH);

  // Title
  var shake = Math.sin(frame * 0.3) * 2;
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS CHALLENGE!', GW / 2 + shake, 80);

  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 14px monospace';
  ctx.fillText('You scored ' + scores[0] + '+ points!', GW / 2, 120);

  ctx.fillStyle = '#ff8844';
  ctx.font = '12px monospace';
  ctx.fillText('A garden champion baseling appears...', GW / 2, 150);
  ctx.fillText('Defeat them to earn the Mycelium Medal!', GW / 2, 170);

  // Boss baseling (big, glowing)
  drawAthlete(GW / 2, 220, 3, frame * 0.5, { scale: 1.5 });
  // Glow around boss
  ctx.globalAlpha = 0.2 + Math.sin(frame * 0.05) * 0.1;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(GW / 2, 210, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO BATTLE', GW / 2, GH - 20);
  ctx.globalAlpha = 1;
}

function drawFinalResults() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  // Podium
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('FINAL RESULTS', GW / 2, 35);

  // Baseling stat summary
  ctx.fillStyle = COL.spore;
  ctx.font = '9px monospace';
  ctx.fillText(statB.name + ' Lv.' + statB.level + ' | STR:' + statB.str + ' DEX:' + statB.dex +
    ' CON:' + statB.con + ' INT:' + statB.int + ' WIS:' + statB.wis + ' CHA:' + statB.cha, GW / 2, 52);

  var sorted = [0, 1, 2, 3].sort(function(a, b) { return scores[b] - scores[a]; });
  var medalColors = [COL.gold, COL.silver, COL.bronze, '#555'];
  var podiumH = [80, 60, 45, 30];
  var podiumX = [GW / 2 - 10, GW / 2 - 80, GW / 2 + 60, GW / 2 + 130];
  var podiumOrder = [1, 0, 2, 3];

  for (var display = 0; display < 4; display++) {
    var rank = podiumOrder[display];
    var idx = sorted[rank];
    var px = podiumX[display];
    var baseY = 250;
    var h = podiumH[rank];

    // Podium block
    ctx.fillStyle = medalColors[rank];
    ctx.fillRect(px - 25, baseY - h, 50, h);
    ctx.strokeStyle = '#fff';
    ctx.strokeRect(px - 25, baseY - h, 50, h);

    // Rank number
    ctx.fillStyle = '#000';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(rank + 1, px, baseY - h / 2 + 5);

    // Baseling on podium
    drawAthlete(px, baseY - h - 5, idx, rank === 0 ? frame * 0.5 : 0);

    // Name and score
    ctx.fillStyle = idx === 0 ? COL.spore : '#ddd';
    ctx.font = (idx === 0 ? 'bold ' : '') + '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ATHLETE_COLORS[idx].name, px, baseY + 14);
    ctx.fillStyle = COL.gold;
    ctx.fillText(scores[idx] + ' pts', px, baseY + 26);
  }

  // Winner announcement
  var winner = sorted[0];
  if (winner === 0) {
    var pulse2 = Math.sin(frame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse2;
    ctx.fillStyle = COL.gold;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GARDEN CHAMPION!', GW / 2, 68);
    ctx.globalAlpha = 1;

    // Confetti (Baseling colors)
    if (frame % 3 === 0) {
      var confettiColors = [COL.gold, COL.spore, COL.reactor, COL.mycelium, COL.toxin];
      TAS.particles.spawn(
        Math.random() * GW, 0,
        confettiColors[Math.floor(Math.random() * confettiColors.length)],
        2, 1, { gravity: 0.05, size: 3, sizeVar: 2, shape: 'rect' }
      );
    }
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ATHLETE_COLORS[winner].name + ' wins the gold!', GW / 2, 68);
    ctx.fillText('You placed ' + (sorted.indexOf(0) + 1) + getOrdinal(sorted.indexOf(0) + 1), GW / 2, 85);
  }

  // Boss defeated badge
  if (bossDefeated) {
    ctx.fillStyle = COL.gold;
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPORE BOSS VANQUISHED', GW / 2, GH - 55);
  }

  // Save total score
  var totalHigh = TAS.score.load('baseling_olympics_hi');
  if (scores[0] > totalHigh) {
    TAS.score.save('baseling_olympics_hi', scores[0]);
  }
  if (totalHigh > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('BEST GARDEN SCORE: ' + Math.max(totalHigh, scores[0]) + ' pts', GW / 2, GH - 40);
  }

  TAS.particles.draw();

  var pulse3 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse3;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PRESS ANY KEY FOR TITLE', GW / 2, GH - 15);
  ctx.globalAlpha = 1;
}

function getOrdinal(n) {
  if (n === 1) return 'st';
  if (n === 2) return 'nd';
  if (n === 3) return 'rd';
  return 'th';
}

// === SOUND EFFECTS ===
function playCrowdNoise() {
  if (frame % 30 === 0 && crowdCheer > 0.3) {
    TAS.audio.playNoise(0.1, crowdCheer * 0.02, 2000);
  }
}

// === START ===
TAS.loop.start(function(dt) {
  update(dt);
  playCrowdNoise();
}, draw);

})();
</script>
