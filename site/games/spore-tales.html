<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Spore Tales</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

const GW = 384, GH = 256;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'JUMP', b: 'ATK' } });

// === STAT SYSTEM (PASS 1) ===
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try { if (window.NftLoader && NftLoader.getStatBonuses) statB = NftLoader.getStatBonuses(); } catch(e) {}

// Bridge shared baseling stats (getMults, ARCADE-STATS.md) onto statB; helpers read statB live.
function dnd(x){ return Math.round(10 + (x - 1) * 20); }
function recomputeStats() {
  var m = (window.TAS && TAS.player) ? TAS.player.mults() : { moveSpeed:1, health:1, damage:1, luck:1, swim:1 };
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.luck = m.luck; statB.hpMult = m.health;
  var sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  if (sel) statB.name = sel.charName || statB.name;
}
recomputeStats();
var picking = false;
if (window.TAS && TAS.player) {
  TAS.player.init().then(function(){ recomputeStats(); })
    .catch(function(e){ console.warn('[spore-tales] player init failed:', e && e.message); });
}

// Derived stat helpers
function strMod() { return Math.floor((statB.str - 10) / 2); }
function dexMod() { return Math.floor((statB.dex - 10) / 2); }
function conMod() { return Math.floor((statB.con - 10) / 2); }
function intMod() { return Math.floor((statB.int - 10) / 2); }
function wisMod() { return Math.floor((statB.wis - 10) / 2); }
function chaMod() { return Math.floor((statB.cha - 10) / 2); }

// === CONSTANTS ===
const TILE = 16;
const GRAVITY = 580;
const BASE_JUMP_VEL = -220;
const BASE_POGO_VEL = -260;
const BASE_MOVE_SPEED = 100;
const MAX_FALL = 320;
const BASE_POGO_BOUNCE_VEL = -280;
const BASE_CANE_RANGE = 20;
const INVULN_TIME = 1.5;
const HUD_H = 20;

// Stat-scaled constants
function JUMP_VEL() { return BASE_JUMP_VEL - dexMod() * 8; }
function POGO_VEL() { return BASE_POGO_VEL - dexMod() * 10; }
function MOVE_SPEED() { return BASE_MOVE_SPEED + dexMod() * 8 + (statB.speed - 1) * 12; }
function POGO_BOUNCE_VEL() { return BASE_POGO_BOUNCE_VEL - dexMod() * 8; }
function CANE_RANGE() { return BASE_CANE_RANGE + strMod() * 3; }
function caneDamage() { return Math.max(1, statB.damage + strMod()); }
function pogoDamage() { return Math.max(1, statB.damage + Math.floor(strMod() * 0.7)); }
function maxHP() { return Math.max(1, Math.floor((3 + conMod()) * statB.hpMult)); }
function startLives() { return Math.max(1, 3 + statB.lives + Math.floor(conMod() * 0.5)); }
function scoreMultiplier() { return Math.max(0.5, statB.scoreMult + intMod() * 0.1); }
function treasureMultiplier() { return Math.max(0.5, 1 + intMod() * 0.15); }
function gemDropChance() { return Math.min(1, 0.5 + chaMod() * 0.05 + statB.luck * 0.05); }
function treasureDropBonus() { return Math.floor(chaMod() * 10); }
function pogoRecovery() { return Math.max(0.05, 0.25 - wisMod() * 0.02); }
function caneRecovery() { return Math.max(0.1, 0.25 - wisMod() * 0.015); }
// Charged pogo slam: STR >= 10
function canChargedPogo() { return statB.str >= 10; }
function chargedPogoRadius() { return 24 + strMod() * 3; }
function chargedPogoDamage() { return Math.max(2, caneDamage() + 1); }

// === GAME STATE ===
let state = 'title'; // title, map, playing, boss, gameover, victory
let score = 0;
let highScore = TAS.score.load('sporetales_hi');
let lives = startLives();
let hp = maxHP();
let gems = 0;
let frame = 0;
let levelTime = 0;
let currentLevel = -1;
let levelsCleared = [false, false, false, false, false];
let camera = { x: 0, y: 0 };
let mapCursor = 0;
let deathTimer = 0;
let victoryTimer = 0;
let particles = []; // extra treasure particles

// === PLAYER ===
let player = null;
function createPlayer(x, y) {
  return {
    x: x, y: y, w: 12, h: 18,
    vx: 0, vy: 0,
    onGround: false,
    jumping: false,
    pogoing: false,
    pogoHeld: false,
    caneSwing: false,
    caneTimer: 0,
    facing: 1,
    invuln: 0,
    animFrame: 0,
    animTimer: 0,
    walkFrame: 0,
    chargeTimer: 0,
    charging: false,
    slamActive: false,
    slamTimer: 0
  };
}

// === LEVELS (Tasern themed, Pass 2+3) ===
const LEVEL_NAMES = ['Mold Canopy', 'Spore Crypts', 'Compost Mines', 'Garden Labs', 'POOP Vault'];
const LEVEL_COLORS = [
  { bg: '#0a2a0a', tile: '#2a6e2a', tile2: '#1a4a1a', sky: '#0d1a0d', accent: '#38d973', bgDetail: '#0d3a0d' },
  { bg: '#1a0a2a', tile: '#4a3a5a', tile2: '#2a1a3a', sky: '#0c0418', accent: '#a855f7', bgDetail: '#220840' },
  { bg: '#1a1a0a', tile: '#5a5a3a', tile2: '#3a3a1a', sky: '#0d0d04', accent: '#f4b41b', bgDetail: '#2a2a10' },
  { bg: '#0a1a2a', tile: '#3a5a6a', tile2: '#1a3a4a', sky: '#020a18', accent: '#3cacd7', bgDetail: '#0a2838' },
  { bg: '#2a0a0a', tile: '#6a3a2a', tile2: '#4a1a1a', sky: '#1a1c2c', accent: '#e6482e', bgDetail: '#3a1010' }
];

// === ART LAYER (§7d flattened scenery + sprite overlay) ===
// Shared Grok backgrounds per stage + reusable scenery sprites baked once into bgScene.
const STAGE_BG = ['bg-fungal-forest', 'bg-barrow-crypt', 'bg-compost-cavern', 'bg-mushroom-village', 'bg-mire-swamp'];
const SCENERY_FILES = ['tree-1', 'tree-2', 'cloud-1', 'cloud-2',
  'platform-grass', 'platform-snow', 'platform-stone', 'platform-dirt', 'platform-metal'];
// Map each level's solid tiles to a platform-tile material for baking
const STAGE_PLATFORM = ['platform-grass', 'platform-stone', 'platform-dirt', 'platform-metal', 'platform-stone'];
const SPR = { scenery: {}, bg: {} };
(function loadArt() {
  if (!window.TasernArt) return;
  for (let i = 0; i < STAGE_BG.length; i++) TasernArt.loadBg(STAGE_BG[i]);
  for (let i = 0; i < SCENERY_FILES.length; i++) {
    let name = SCENERY_FILES[i];
    SPR.scenery[name] = TasernArt.load('art/scenery/' + name + '.png');
    TasernArt.load('art/scenery/' + name + '.png', function(img){ SPR.scenery[name] = img; });
  }
})();
function sceneryImg(name) {
  return SPR.scenery[name] || (window.TasernArt ? TasernArt.getImg('art/scenery/' + name + '.png') : null);
}
function stageBgImg(idx) {
  return window.TasernArt ? TasernArt.getImg('art/backgrounds/' + STAGE_BG[idx] + '.webp') : null;
}

// Flattened scenery canvas, rebuilt per stage.
let bgScene = null;
let bgSceneLevel = -1;
function buildScene(idx) {
  let worldW = levelW * TILE;
  let worldH = levelH * TILE;
  let cv = document.createElement('canvas');
  cv.width = worldW; cv.height = worldH;
  let c = cv.getContext('2d');
  let col = LEVEL_COLORS[idx];

  // Base sky/bg fill (always present so the scene never shows transparent gaps)
  c.fillStyle = col.sky;
  c.fillRect(0, 0, worldW, worldH);

  // Cover the shared Grok background across the whole world (tiled horizontally)
  let bgImg = stageBgImg(idx);
  if (bgImg) {
    let iw = bgImg.naturalWidth || bgImg.width, ih = bgImg.naturalHeight || bgImg.height;
    let scale = worldH / ih;
    let tileW = iw * scale;
    c.globalAlpha = 0.9;
    for (let x = 0; x < worldW; x += tileW) c.drawImage(bgImg, x, 0, tileW, worldH);
    c.globalAlpha = 1;
    // Darken for contrast against sprites
    c.fillStyle = 'rgba(0,0,0,0.35)';
    c.fillRect(0, 0, worldW, worldH);
  }

  // Clouds drifting in the sky band
  let cloud1 = sceneryImg('cloud-1'), cloud2 = sceneryImg('cloud-2');
  for (let i = 0; i < levelW / 6; i++) {
    let cimg = (i % 2 === 0) ? cloud1 : cloud2;
    if (!cimg) continue;
    let cx = (i * 110 + (i * 37) % 90);
    let cy = 8 + (i * 23) % 40;
    c.globalAlpha = 0.7;
    c.drawImage(cimg, cx, cy, 56, 32);
    c.globalAlpha = 1;
  }

  // Trees on the ground line (rows 14/15 are ground in every stage)
  let tree1 = sceneryImg('tree-1'), tree2 = sceneryImg('tree-2');
  let groundY = 14 * TILE;
  for (let tx = 0; tx < levelW; tx += 3) {
    if (getTile(tx, 14) !== 1) continue;          // only where there's ground
    if ((tx * 73) % 5 !== 0) continue;            // sparse, deterministic
    let timg = ((tx >> 1) % 2 === 0) ? tree1 : tree2;
    if (!timg) continue;
    let th = 44 + (tx * 17) % 20;
    c.drawImage(timg, tx * TILE - 8, groundY - th, 40, th);
  }

  // Platform tiles stamped onto solid + one-way tiles (visual skin over collision)
  let plat = sceneryImg(STAGE_PLATFORM[idx]);
  if (plat) {
    for (let ty = 0; ty < levelH; ty++) {
      for (let tx = 0; tx < levelW; tx++) {
        let t = getTile(tx, ty);
        let isTop = (t === 1 && getTile(tx, ty - 1) !== 1) || t === 5;
        if (isTop) c.drawImage(plat, tx * TILE, ty * TILE, TILE, TILE);
      }
    }
  }

  bgScene = cv;
  bgSceneLevel = idx;
  bgSceneHasArt = !!bgImg;
}

// Level map data: 24 columns x 16 rows per screen, multiple screens wide
// 0=air, 1=solid, 2=breakable, 3=spikes, 4=vine, 5=platform(one-way), 6=chest, 7=exit
let tiles = [];
let levelW = 0, levelH = 16;
let enemies = [];
let collectibles = [];
let projectiles = [];
let boss = null;
let bossDefeated = false;

function generateLevel(idx) {
  const screens = idx === 4 ? 5 : 4;
  levelW = 24 * screens;
  tiles = [];
  enemies = [];
  collectibles = [];
  projectiles = [];
  particles = [];
  boss = null;
  bossDefeated = false;
  levelTime = 0;

  // Fill with air
  for (let y = 0; y < levelH; y++) {
    tiles[y] = [];
    for (let x = 0; x < levelW; x++) {
      tiles[y][x] = 0;
    }
  }

  // Ground
  for (let x = 0; x < levelW; x++) {
    tiles[15][x] = 1;
    tiles[14][x] = 1;
  }

  // Level-specific generation
  switch(idx) {
    case 0: genFungalCanopy(); break;
    case 1: genSporeCrypts(); break;
    case 2: genToxicMines(); break;
    case 3: genReactorLabs(); break;
    case 4: genCoreVault(); break;
  }

  // Place exit at end
  tiles[13][levelW - 3] = 7;

  // Place boss before exit
  spawnBoss(idx, (levelW - 10) * TILE, 10 * TILE);

  // Scatter gems throughout (CHA boosts gem count)
  let bonusGems = Math.floor(chaMod() * 0.5);
  for (let s = 0; s < screens; s++) {
    let placed = 0;
    let maxGems = 8 + bonusGems;
    for (let attempt = 0; attempt < 60 && placed < maxGems; attempt++) {
      let gx = s * 24 + TAS.math.randInt(2, 22);
      let gy = TAS.math.randInt(3, 12);
      if (tiles[gy][gx] === 0 && tiles[gy + 1][gx] !== 0) {
        collectibles.push({ x: gx * TILE + 4, y: gy * TILE + 4, w: 8, h: 8, type: 'gem', collected: false });
        placed++;
      }
    }
    // Floating gems
    for (let attempt = 0; attempt < 20 && placed < maxGems + 4; attempt++) {
      let gx = s * 24 + TAS.math.randInt(3, 21);
      let gy = TAS.math.randInt(2, 8);
      if (tiles[gy][gx] === 0) {
        collectibles.push({ x: gx * TILE + 4, y: gy * TILE + 4, w: 8, h: 8, type: 'gem', collected: false });
        placed++;
      }
    }
  }

  // Place treasure chests (1 per screen, hidden) — CHA adds bonus chests
  let chestCount = screens - 1 + Math.max(0, Math.floor(chaMod() * 0.3));
  for (let s = 0; s < Math.min(chestCount, screens); s++) {
    let cx = s * 24 + TAS.math.randInt(5, 18);
    let cy = TAS.math.randInt(3, 7);
    if (tiles[cy][cx] === 0) {
      // Tasern treasures (Pass 2): type chosen by level
      let tType = ['chest', 'mycoDiamond', 'reactorCrystal', 'lpIngot', 'chest'][idx % 5];
      if (s === 0) tType = 'chest'; // first is always classic
      collectibles.push({ x: cx * TILE, y: cy * TILE, w: 16, h: 16, type: tType, collected: false, value: Math.floor((s + 1) * 100 * treasureMultiplier()) + treasureDropBonus() });
    }
  }

  // Big treasure at end
  collectibles.push({ x: (levelW - 5) * TILE, y: 11 * TILE, w: 16, h: 16, type: 'bigGem', collected: false });

  // §7d: bake flattened scenery for this stage (visual only; collision uses `tiles`)
  buildScene(idx);
}

function genFungalCanopy() {
  // Fungal platforms, vines, spore pits
  for (let s = 0; s < 4; s++) {
    let base = s * 24;
    // Mushroom platforms (wide caps)
    for (let i = 0; i < 5; i++) {
      let px = base + TAS.math.randInt(2, 18);
      let py = TAS.math.randInt(6, 12);
      let pw = TAS.math.randInt(3, 6);
      for (let x = px; x < px + pw && x < base + 23; x++) {
        tiles[py][x] = 1;
      }
    }
    // Mycelial vines
    for (let i = 0; i < 3; i++) {
      let vx = base + TAS.math.randInt(3, 20);
      for (let vy = 2; vy < TAS.math.randInt(6, 11); vy++) {
        if (tiles[vy][vx] === 0) tiles[vy][vx] = 4;
      }
    }
    // Toxic pits with spikes
    if (s > 0) {
      let pitX = base + TAS.math.randInt(5, 15);
      let pitW = TAS.math.randInt(2, 4);
      for (let x = pitX; x < pitX + pitW && x < base + 22; x++) {
        tiles[14][x] = 0;
        tiles[15][x] = 3;
      }
    }
    // Breakable fungal floors
    let bx = base + TAS.math.randInt(8, 16);
    tiles[10][bx] = 2;
    tiles[10][bx + 1] = 2;
    // Snakes + Spore Bats
    enemies.push(createEnemy('snake', (base + TAS.math.randInt(4, 20)) * TILE, 13 * TILE - 12));
    if (s > 0) enemies.push(createEnemy('sporeBat', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(3, 7) * TILE));
    if (s > 1) enemies.push(createEnemy('snake', (base + TAS.math.randInt(4, 20)) * TILE, 13 * TILE - 12));
  }
}

function genSporeCrypts() {
  // Chandeliers, ghost corridors, mycelial guardians
  for (let s = 0; s < 4; s++) {
    let base = s * 24;
    // Walls/corridors
    for (let y = 3; y < 8; y++) {
      tiles[y][base + 1] = 1;
      if (s < 3) tiles[y][base + 23] = 1;
    }
    // Platforms (chandelier-like)
    for (let i = 0; i < 4; i++) {
      let px = base + TAS.math.randInt(3, 19);
      let py = TAS.math.randInt(5, 11);
      tiles[py][px] = 5;
      tiles[py][px + 1] = 5;
      tiles[py][px + 2] = 5;
    }
    // Upper walkways
    for (let x = base + 3; x < base + 21; x += 4) {
      tiles[4][x] = 1;
      tiles[4][x + 1] = 1;
    }
    // Ghosts and Mycelial Guardians
    enemies.push(createEnemy('ghost', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(4, 9) * TILE));
    enemies.push(createEnemy('bat', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(3, 7) * TILE));
    if (s > 1) enemies.push(createEnemy('mycelialGuardian', (base + TAS.math.randInt(6, 16)) * TILE, 13 * TILE - 16));
  }
}

function genToxicMines() {
  // Crystal formations, collapsing floors, toxic pools
  for (let s = 0; s < 4; s++) {
    let base = s * 24;
    // Sloped terrain
    for (let i = 0; i < 6; i++) {
      let px = base + TAS.math.randInt(2, 19);
      let py = TAS.math.randInt(7, 13);
      let pw = TAS.math.randInt(2, 5);
      for (let x = px; x < px + pw && x < base + 23; x++) {
        tiles[py][x] = 1;
      }
    }
    // Breakable crystal floors
    for (let i = 0; i < 3; i++) {
      let bx = base + TAS.math.randInt(4, 20);
      tiles[11][bx] = 2;
    }
    // Spikes in pits
    if (s > 0) {
      let sx = base + TAS.math.randInt(6, 14);
      tiles[14][sx] = 0;
      tiles[15][sx] = 3;
      tiles[14][sx + 1] = 0;
      tiles[15][sx + 1] = 3;
    }
    // Reactor Drones + Robots
    enemies.push(createEnemy('reactorDrone', (base + TAS.math.randInt(5, 19)) * TILE, TAS.math.randInt(4, 8) * TILE));
    enemies.push(createEnemy('robot', (base + TAS.math.randInt(5, 19)) * TILE, 13 * TILE - 14));
    if (s > 1) enemies.push(createEnemy('robot', (base + TAS.math.randInt(5, 19)) * TILE, 13 * TILE - 14));
  }
}

function genReactorLabs() {
  // Low gravity, reactor drones, energy platforms
  for (let s = 0; s < 4; s++) {
    let base = s * 24;
    // Floating platforms (more spread due to low grav)
    for (let i = 0; i < 6; i++) {
      let px = base + TAS.math.randInt(2, 19);
      let py = TAS.math.randInt(3, 12);
      let pw = TAS.math.randInt(2, 4);
      for (let x = px; x < px + pw && x < base + 23; x++) {
        tiles[py][x] = 5;
      }
    }
    // Gaps in ground
    if (s > 0) {
      let gx = base + TAS.math.randInt(4, 16);
      let gw = TAS.math.randInt(3, 5);
      for (let x = gx; x < gx + gw && x < base + 22; x++) {
        tiles[14][x] = 0;
        tiles[15][x] = 0;
      }
    }
    // Aliens + Reactor Drones + Spore Bats
    enemies.push(createEnemy('alien', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(5, 10) * TILE));
    enemies.push(createEnemy('reactorDrone', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(4, 8) * TILE));
    if (s > 0) enemies.push(createEnemy('sporeBat', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(3, 7) * TILE));
  }
}

function genCoreVault() {
  // Hardest: fire traps, complex platforming, all enemy types
  for (let s = 0; s < 5; s++) {
    let base = s * 24;
    // Dense platforms
    for (let i = 0; i < 7; i++) {
      let px = base + TAS.math.randInt(2, 19);
      let py = TAS.math.randInt(4, 13);
      let pw = TAS.math.randInt(2, 4);
      for (let x = px; x < px + pw && x < base + 23; x++) {
        tiles[py][x] = 1;
      }
    }
    // Spike rows
    for (let i = 0; i < 3; i++) {
      let sx = base + TAS.math.randInt(3, 19);
      tiles[13][sx] = 3;
      if (Math.random() > 0.5) tiles[13][sx + 1] = 3;
    }
    // Breakable shortcuts
    tiles[8][base + 12] = 2;
    tiles[8][base + 13] = 2;
    // Mixed enemies: robots, drones, guardians
    enemies.push(createEnemy('robot', (base + TAS.math.randInt(4, 18)) * TILE, 13 * TILE - 14));
    enemies.push(createEnemy('reactorDrone', (base + TAS.math.randInt(4, 18)) * TILE, TAS.math.randInt(5, 8) * TILE));
    if (s > 1) enemies.push(createEnemy('mycelialGuardian', (base + TAS.math.randInt(5, 17)) * TILE, 13 * TILE - 16));
  }
}

// === ENEMIES (original + Tasern: Pass 2) ===
function createEnemy(type, x, y) {
  let e = {
    type: type, x: x, y: y, w: 14, h: 14,
    vx: 0, vy: 0, alive: true, hp: 1,
    facing: -1, animTimer: 0, animFrame: 0,
    startX: x, startY: y, moveTimer: 0,
    shootTimer: 0
  };
  switch(type) {
    case 'snake': e.w = 16; e.h = 10; e.vx = 30 * (Math.random() > 0.5 ? 1 : -1); break;
    case 'bat': e.w = 14; e.h = 10; e.moveTimer = Math.random() * 6; break;
    case 'ghost': e.w = 14; e.h = 16; e.moveTimer = Math.random() * 6; break;
    case 'alien': e.w = 12; e.h = 16; e.vx = 40 * (Math.random() > 0.5 ? 1 : -1); break;
    case 'robot': e.w = 14; e.h = 16; e.hp = 2; e.vx = 25 * (Math.random() > 0.5 ? 1 : -1); break;
    // Tasern enemies
    case 'reactorDrone': e.w = 12; e.h = 12; e.hp = 1; e.moveTimer = Math.random() * 6; break;
    case 'sporeBat': e.w = 16; e.h = 12; e.hp = 1; e.moveTimer = Math.random() * 6; break;
    case 'mycelialGuardian': e.w = 16; e.h = 20; e.hp = 3; e.vx = 18 * (Math.random() > 0.5 ? 1 : -1); break;
  }
  return e;
}

function spawnBoss(idx, x, y) {
  let names = ['Mold Titan', 'Spore Sovereign', 'Toxic Compost Lord', 'Garden Prime', 'Mycelium Nexus'];
  // Boss HP scales inversely with stat level for difficulty scaling (Pass 3)
  let bossHP = Math.max(3, 5 + Math.floor(currentLevel * 0.5) - Math.floor(strMod() * 0.3));
  boss = {
    type: idx, x: x, y: y, w: 28, h: 28,
    hp: bossHP, maxHp: bossHP, alive: true,
    vx: 0, vy: 0, phase: 0,
    timer: 0, attackTimer: 0, flashTimer: 0,
    name: names[idx], startX: x, startY: y
  };
}

// === INPUT HELPERS (CONTROL STANDARD §7c) ===
// Arrows = MOVE only.  WASD = the action cluster (W jump, S duck/pogo-aim, A/D spore whip).
// Legacy keys (Z/X/J/K/Space/Shift) kept as hidden alts for compatibility.
function keyLeft() { return TAS.input.keys['ArrowLeft'] || TAS.input.touch.left; }
function keyRight() { return TAS.input.keys['ArrowRight'] || TAS.input.touch.right; }
function keyUp() { return TAS.input.keys['ArrowUp'] || TAS.input.touch.up; }
function keyDown() { return TAS.input.keys['ArrowDown'] || TAS.input.keys['KeyS'] || TAS.input.touch.down; }
function keyJump() { return TAS.input.keys['KeyW'] || TAS.input.keys['Space'] || TAS.input.keys['KeyZ'] || TAS.input.touch.a; }
function keyAttack() { return TAS.input.keys['KeyA'] || TAS.input.keys['KeyD'] || TAS.input.keys['KeyX'] || TAS.input.keys['KeyJ'] || TAS.input.keys['KeyK'] || TAS.input.keys['ShiftLeft'] || TAS.input.touch.b; }

let jumpPressed = false;
let jumpWasPressed = false;
let attackPressed = false;
let attackWasPressed = false;

function updateInputEdge() {
  let jp = keyJump();
  let ap = keyAttack();
  jumpPressed = jp && !jumpWasPressed;
  attackPressed = ap && !attackWasPressed;
  jumpWasPressed = jp;
  attackWasPressed = ap;
}

// === TILE COLLISION ===
function getTile(tx, ty) {
  if (tx < 0 || tx >= levelW || ty < 0 || ty >= levelH) return 1;
  return tiles[ty][tx];
}

function isSolid(tx, ty) {
  let t = getTile(tx, ty);
  return t === 1 || t === 2;
}

function isOneWay(tx, ty) {
  return getTile(tx, ty) === 5;
}

function isSpike(tx, ty) {
  return getTile(tx, ty) === 3;
}

function isVine(tx, ty) {
  return getTile(tx, ty) === 4;
}

function isExit(tx, ty) {
  return getTile(tx, ty) === 7;
}

// === PLAYER PHYSICS ===
function movePlayer(dt) {
  let p = player;
  let ms = MOVE_SPEED();
  let jv = JUMP_VEL();
  let pv = POGO_VEL();
  let pbv = POGO_BOUNCE_VEL();
  let cr = CANE_RANGE();

  // Horizontal movement
  p.vx = 0;
  if (keyLeft()) { p.vx = -ms; p.facing = -1; }
  if (keyRight()) { p.vx = ms; p.facing = 1; }

  // Jump
  if (jumpPressed && p.onGround && !p.pogoing) {
    p.vy = jv;
    p.onGround = false;
    p.jumping = true;
    TAS.audio.playTone(280, 0.1, 'square', 0.06);
  }

  // Pogo mechanic: hold down + jump while in air
  if (!p.onGround && keyDown() && keyJump()) {
    p.pogoHeld = true;
  } else if (p.onGround) {
    p.pogoHeld = false;
    p.pogoing = false;
  }

  if (p.pogoHeld && !p.onGround) {
    p.pogoing = true;
  }

  // Charged pogo slam (Pass 2): hold down+jump for 0.4s while pogoing and STR>=10
  if (canChargedPogo() && p.pogoing && keyDown() && keyJump() && !p.slamActive) {
    p.chargeTimer += dt;
    p.charging = true;
    if (p.chargeTimer >= 0.4) {
      p.slamActive = true;
      p.slamTimer = 0.3;
      p.vy = Math.abs(pv) * 1.5; // slam downward fast
      p.chargeTimer = 0;
      p.charging = false;
      TAS.audio.playTone(120, 0.15, 'sawtooth', 0.1, 60);
    }
  } else {
    p.chargeTimer = 0;
    p.charging = false;
  }
  if (p.slamActive) {
    p.slamTimer -= dt;
    if (p.slamTimer <= 0) p.slamActive = false;
  }

  // Cane swing on ground (WIS reduces cooldown)
  if (attackPressed && p.onGround && !p.caneSwing) {
    p.caneSwing = true;
    p.caneTimer = caneRecovery();
    TAS.audio.playTone(200, 0.08, 'sawtooth', 0.05, 100);
  }
  if (p.caneSwing) {
    p.caneTimer -= dt;
    if (p.caneTimer <= 0) p.caneSwing = false;
  }

  // Gravity (lower on reactor labs level)
  let grav = currentLevel === 3 ? GRAVITY * 0.45 : GRAVITY;
  p.vy += grav * dt;
  if (p.vy > MAX_FALL) p.vy = MAX_FALL;

  // Low grav jump boost on reactor labs
  let jumpMult = currentLevel === 3 ? 1.4 : 1;

  // Move X
  p.x += p.vx * dt;

  // X collision
  let left = Math.floor(p.x / TILE);
  let right = Math.floor((p.x + p.w - 1) / TILE);
  let top = Math.floor(p.y / TILE);
  let bot = Math.floor((p.y + p.h - 1) / TILE);

  for (let ty = top; ty <= bot; ty++) {
    if (isSolid(left, ty) && p.vx < 0) {
      p.x = (left + 1) * TILE;
      p.vx = 0;
    }
    if (isSolid(right, ty) && p.vx > 0) {
      p.x = right * TILE - p.w;
      p.vx = 0;
    }
  }

  // Move Y
  let oldY = p.y;
  p.y += p.vy * dt;
  p.onGround = false;

  left = Math.floor(p.x / TILE);
  right = Math.floor((p.x + p.w - 1) / TILE);
  top = Math.floor(p.y / TILE);
  bot = Math.floor((p.y + p.h - 1) / TILE);

  // Falling down
  if (p.vy >= 0) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, bot)) {
        p.y = bot * TILE - p.h;
        if (p.slamActive) {
          // Ground pound impact (Pass 2)
          doChargedSlamImpact(p);
          p.slamActive = false;
          p.pogoing = false;
          p.vy = 0;
          p.onGround = true;
          p.jumping = false;
        } else if (p.pogoing) {
          p.vy = pv * jumpMult;
          p.pogoing = true;
          TAS.audio.playTone(440, 0.08, 'square', 0.07, 660);
          TAS.particles.spawn(p.x + p.w / 2, p.y + p.h, '#fff', 3, 1.5);
        } else {
          p.vy = 0;
          p.onGround = true;
          p.jumping = false;
        }
        break;
      }
      // One-way platforms: only when falling through from above
      if (isOneWay(tx, bot) && oldY + p.h <= bot * TILE + 2) {
        p.y = bot * TILE - p.h;
        if (p.slamActive) {
          doChargedSlamImpact(p);
          p.slamActive = false;
          p.pogoing = false;
          p.vy = 0;
          p.onGround = true;
          p.jumping = false;
        } else if (p.pogoing) {
          p.vy = pv * jumpMult;
          TAS.audio.playTone(440, 0.08, 'square', 0.07, 660);
          TAS.particles.spawn(p.x + p.w / 2, p.y + p.h, '#fff', 3, 1.5);
        } else {
          p.vy = 0;
          p.onGround = true;
          p.jumping = false;
        }
        break;
      }
    }
  }

  // Rising up (head bonk)
  if (p.vy < 0) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, top)) {
        p.y = (top + 1) * TILE;
        p.vy = 0;
        break;
      }
    }
  }

  // Vine climbing
  let centerTX = Math.floor((p.x + p.w / 2) / TILE);
  let centerTY = Math.floor((p.y + p.h / 2) / TILE);
  if (isVine(centerTX, centerTY)) {
    if (keyUp()) { p.vy = -80; p.onGround = false; }
    else if (keyDown()) { p.vy = 50; }
    else if (!keyJump()) { p.vy = Math.min(p.vy, 20); }
  }

  // Spike check
  for (let tx = left; tx <= right; tx++) {
    if (isSpike(tx, bot) || isSpike(tx, top)) {
      hurtPlayer();
      break;
    }
  }

  // Exit check
  for (let tx = left; tx <= right; tx++) {
    for (let ty = top; ty <= bot; ty++) {
      if (isExit(tx, ty) && bossDefeated) {
        completeLevel();
        return;
      }
    }
  }

  // Breakable blocks (pogo from above)
  if (p.pogoing && p.vy >= 0) {
    let belowTY = Math.floor((p.y + p.h + 2) / TILE);
    for (let tx = left; tx <= right; tx++) {
      if (getTile(tx, belowTY) === 2) {
        tiles[belowTY][tx] = 0;
        TAS.particles.spawn(tx * TILE + 8, belowTY * TILE + 8, LEVEL_COLORS[currentLevel].tile, 6, 2, { gravity: 3 });
        TAS.audio.playNoise(0.1, 0.06, 800);
        score += Math.floor(5 * scoreMultiplier());
      }
    }
  }

  // Pogo on enemies (STR-scaled damage)
  if (p.pogoing && p.vy > 0) {
    for (let e of enemies) {
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(p.x, p.y + p.h - 4, p.w, 6, e.x, e.y, e.w, e.h)) {
        e.hp -= pogoDamage();
        if (e.hp <= 0) {
          e.alive = false;
          score += Math.floor(50 * scoreMultiplier());
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4', 8, 2);
          TAS.audio.playTone(600, 0.1, 'square', 0.06, 200);
        }
        p.vy = pbv * (currentLevel === 3 ? 1.3 : 1);
        TAS.audio.playTone(550, 0.08, 'square', 0.07, 880);
        break;
      }
    }
  }

  // Boss pogo (STR-scaled damage, screen shake Pass 3)
  if (p.pogoing && p.vy > 0 && boss && boss.alive) {
    if (TAS.hit.rectOverlap(p.x, p.y + p.h - 6, p.w, 8, boss.x, boss.y, boss.w, boss.h)) {
      boss.hp -= pogoDamage();
      boss.flashTimer = 0.3;
      p.vy = pbv * 1.2;
      TAS.fx.shake(6 + strMod(), 0.85);
      TAS.audio.playTone(200, 0.15, 'square', 0.08, 100);
      TAS.particles.spawn(boss.x + boss.w / 2, boss.y, '#ff0', 10, 3);
      if (boss.hp <= 0) {
        boss.alive = false;
        bossDefeated = true;
        score += Math.floor(1000 * scoreMultiplier());
        TAS.fx.shake(10 + strMod() * 2, 0.9);
        TAS.fx.flash('#fff', 0.5);
        TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15], [1047, 0.2]], 100);
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#ff0', 20, 4);
      }
    }
  }

  // Cane swing hit enemies (STR-scaled damage)
  if (p.caneSwing) {
    let cx = p.facing > 0 ? p.x + p.w : p.x - cr;
    for (let e of enemies) {
      if (!e.alive) continue;
      if (TAS.hit.rectOverlap(cx, p.y, cr, p.h, e.x, e.y, e.w, e.h)) {
        e.hp -= caneDamage();
        if (e.hp <= 0) {
          e.alive = false;
          score += Math.floor(50 * scoreMultiplier());
          TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4', 8, 2);
          TAS.audio.playTone(600, 0.1, 'square', 0.06, 200);
        }
      }
    }
    // Cane swing breakable blocks
    let cTileX = Math.floor((cx + cr / 2) / TILE);
    let cTileY = Math.floor((p.y + p.h / 2) / TILE);
    if (getTile(cTileX, cTileY) === 2) {
      tiles[cTileY][cTileX] = 0;
      TAS.particles.spawn(cTileX * TILE + 8, cTileY * TILE + 8, LEVEL_COLORS[currentLevel].tile, 6, 2, { gravity: 3 });
      TAS.audio.playNoise(0.1, 0.06, 800);
      score += Math.floor(5 * scoreMultiplier());
    }
  }

  // Invulnerability
  if (p.invuln > 0) p.invuln -= dt;

  // Fall off screen
  if (p.y > levelH * TILE + 32) {
    hurtPlayer();
    if (hp > 0) {
      p.x = 2 * TILE;
      p.y = 10 * TILE;
      p.vy = 0;
    }
  }

  // Animation
  p.animTimer += dt;
  if (p.animTimer > 0.15) {
    p.animTimer = 0;
    p.walkFrame = (p.walkFrame + 1) % 4;
  }

  // Camera follow
  camera.x = TAS.math.clamp(Math.floor(p.x - GW / 2 + p.w / 2), 0, levelW * TILE - GW);
  camera.y = TAS.math.clamp(Math.floor(p.y - GH / 2), 0, levelH * TILE - GH);
}

// Charged pogo slam impact (Pass 2)
function doChargedSlamImpact(p) {
  let radius = chargedPogoRadius();
  let dmg = chargedPogoDamage();
  TAS.fx.shake(8 + strMod(), 0.88);
  TAS.audio.playTone(80, 0.2, 'sawtooth', 0.12, 40);
  TAS.particles.spawn(p.x + p.w / 2, p.y + p.h, '#ff8800', 12, 3, { gravity: 2 });
  TAS.particles.spawn(p.x + p.w / 2, p.y + p.h, '#ffcc00', 8, 2);
  // Damage nearby enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    let dx = (e.x + e.w / 2) - (p.x + p.w / 2);
    let dy = (e.y + e.h / 2) - (p.y + p.h);
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      e.hp -= dmg;
      if (e.hp <= 0) {
        e.alive = false;
        score += Math.floor(50 * scoreMultiplier());
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#ff4', 8, 2);
      }
    }
  }
  // Break nearby breakable blocks
  let cx = Math.floor((p.x + p.w / 2) / TILE);
  let cy = Math.floor((p.y + p.h) / TILE);
  for (let ty = cy - 1; ty <= cy + 1; ty++) {
    for (let tx = cx - 2; tx <= cx + 2; tx++) {
      if (ty >= 0 && ty < levelH && tx >= 0 && tx < levelW && getTile(tx, ty) === 2) {
        tiles[ty][tx] = 0;
        TAS.particles.spawn(tx * TILE + 8, ty * TILE + 8, LEVEL_COLORS[currentLevel].tile, 6, 2, { gravity: 3 });
        score += Math.floor(5 * scoreMultiplier());
      }
    }
  }
}

function hurtPlayer() {
  if (player.invuln > 0) return;
  hp--;
  player.invuln = INVULN_TIME;
  TAS.fx.flash('#f00', 0.3);
  TAS.fx.shake(5, 0.88);
  TAS.audio.playTone(150, 0.2, 'sawtooth', 0.08, 80);
  if (hp <= 0) {
    lives--;
    if (lives <= 0) {
      deathTimer = 2;
      state = 'gameover';
      if (score > highScore) {
        highScore = score;
        TAS.score.save('sporetales_hi', highScore);
      }
      TAS.audio.playMelody([[300, 0.2], [250, 0.2], [200, 0.3], [150, 0.4]], 200);
    } else {
      hp = maxHP();
      player.x = 2 * TILE;
      player.y = 10 * TILE;
      player.vy = 0;
    }
  }
}

function completeLevel() {
  levelsCleared[currentLevel] = true;
  let timeBonus = Math.floor(Math.max(0, 300 - Math.floor(levelTime)) * 2 * scoreMultiplier());
  score += timeBonus;
  if (score > highScore) {
    highScore = score;
    TAS.score.save('sporetales_hi', highScore);
  }
  TAS.audio.playMelody([[523, 0.1], [587, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 120);
  // Check if all cleared
  if (levelsCleared.every(c => c)) {
    state = 'victory';
    victoryTimer = 0;
  } else {
    state = 'map';
  }
}

// === ENEMY UPDATE ===
function updateEnemies(dt) {
  for (let e of enemies) {
    if (!e.alive) continue;
    e.moveTimer += dt;
    e.animTimer += dt;
    if (e.animTimer > 0.2) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 2; }

    switch(e.type) {
      case 'snake':
      case 'robot':
        e.x += e.vx * dt;
        // Turn at edges/walls
        let eTX = Math.floor((e.x + e.w / 2) / TILE);
        let eTY = Math.floor((e.y + e.h) / TILE);
        if (isSolid(Math.floor(e.x / TILE), eTY - 1) || isSolid(Math.floor((e.x + e.w) / TILE), eTY - 1)) {
          e.vx *= -1;
        }
        if (!isSolid(eTX, eTY) && !isOneWay(eTX, eTY)) {
          e.vx *= -1;
          e.x += e.vx * dt * 5;
        }
        e.facing = e.vx > 0 ? 1 : -1;
        break;
      case 'bat':
        e.x = e.startX + Math.sin(e.moveTimer * 2) * 30;
        e.y = e.startY + Math.cos(e.moveTimer * 1.5) * 20;
        break;
      case 'ghost':
        e.x = e.startX + Math.sin(e.moveTimer * 1.2) * 40;
        e.y = e.startY + Math.sin(e.moveTimer * 0.8) * 25;
        break;
      case 'alien':
        e.x += e.vx * dt;
        let ax = Math.floor((e.x + e.w / 2) / TILE);
        let ay = Math.floor((e.y + e.h) / TILE);
        if (isSolid(Math.floor(e.x / TILE), ay - 1) || isSolid(Math.floor((e.x + e.w) / TILE), ay - 1)) {
          e.vx *= -1;
        }
        // Alien floats slightly
        e.y = e.startY + Math.sin(e.moveTimer * 3) * 8;
        e.facing = e.vx > 0 ? 1 : -1;
        break;
      // Tasern enemies (Pass 2)
      case 'reactorDrone':
        // Hovers in figure-8 pattern, occasionally fires downward
        e.x = e.startX + Math.sin(e.moveTimer * 1.8) * 35;
        e.y = e.startY + Math.sin(e.moveTimer * 2.5) * 15;
        e.shootTimer += dt;
        if (e.shootTimer > 3) {
          e.shootTimer = 0;
          projectiles.push({ x: e.x + e.w / 2 - 2, y: e.y + e.h, w: 4, h: 4, vx: 0, vy: 100, life: 2.5 });
        }
        break;
      case 'sporeBat':
        // Swoops in wide arcs, leaves toxic trail
        e.x = e.startX + Math.sin(e.moveTimer * 1.5) * 40;
        e.y = e.startY + Math.cos(e.moveTimer * 2) * 25;
        break;
      case 'mycelialGuardian':
        // Slow walker, high HP, periodic shield pulse
        e.x += e.vx * dt;
        let gx = Math.floor((e.x + e.w / 2) / TILE);
        let gy = Math.floor((e.y + e.h) / TILE);
        if (isSolid(Math.floor(e.x / TILE), gy - 1) || isSolid(Math.floor((e.x + e.w) / TILE), gy - 1)) {
          e.vx *= -1;
        }
        if (!isSolid(gx, gy) && !isOneWay(gx, gy)) {
          e.vx *= -1;
          e.x += e.vx * dt * 5;
        }
        e.facing = e.vx > 0 ? 1 : -1;
        break;
    }

    // Hurt player on contact
    if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      // If pogoing, handled in movePlayer. Otherwise, hurt
      if (!player.pogoing || player.vy <= 0) {
        hurtPlayer();
      }
    }
  }
}

// === BOSS UPDATE ===
function updateBoss(dt) {
  if (!boss || !boss.alive) return;
  boss.timer += dt;
  boss.attackTimer += dt;
  if (boss.flashTimer > 0) boss.flashTimer -= dt;

  // Boss AI patterns by type
  switch(boss.type) {
    case 0: // Fungal Titan - charges back and forth, spawns spore clouds
      boss.x = boss.startX + Math.sin(boss.timer * 1.5) * 50;
      if (boss.attackTimer > 2) {
        boss.attackTimer = 0;
        boss.vx = player.x < boss.x ? -120 : 120;
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h, '#4a8', 4, 1.5);
      }
      boss.x += boss.vx * dt;
      boss.vx *= 0.97;
      break;
    case 1: // Crypt Sovereign - teleports, swoops
      if (boss.attackTimer > 2.5) {
        boss.attackTimer = 0;
        boss.x = player.x + (Math.random() > 0.5 ? 40 : -40);
        boss.y = boss.startY - 30;
        TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, '#a4f', 6, 2);
      }
      boss.y = boss.startY + Math.sin(boss.timer * 2) * 30 - 20;
      break;
    case 2: // Toxic Overlord - stomps, shakes, drops acid
      boss.x = boss.startX + Math.sin(boss.timer) * 35;
      if (boss.attackTimer > 1.8) {
        boss.attackTimer = 0;
        TAS.fx.shake(3, 0.9);
        // Drop acid projectile
        projectiles.push({ x: boss.x + boss.w / 2 - 3, y: boss.y + boss.h, w: 6, h: 6, vy: 90, vx: (Math.random() - 0.5) * 40, life: 3 });
      }
      break;
    case 3: // Reactor Prime - flies overhead, shoots homing
      boss.x = boss.startX + Math.sin(boss.timer * 1.2) * 60;
      boss.y = boss.startY - 40 + Math.sin(boss.timer * 2) * 15;
      if (boss.attackTimer > 1.5) {
        boss.attackTimer = 0;
        projectiles.push({ x: boss.x + boss.w / 2 - 3, y: boss.y + boss.h, w: 6, h: 6, vy: 120, vx: 0, life: 3 });
      }
      break;
    case 4: // Core Nexus - orbits, pulses aimed shots
      boss.x = boss.startX + Math.cos(boss.timer * 1.8) * 45;
      boss.y = boss.startY - 20 + Math.sin(boss.timer * 2.2) * 30;
      if (boss.attackTimer > 1.2) {
        boss.attackTimer = 0;
        let angle = TAS.math.angle(boss.x, boss.y, player.x, player.y);
        projectiles.push({
          x: boss.x + boss.w / 2 - 3, y: boss.y + boss.h / 2 - 3,
          w: 6, h: 6, vx: Math.cos(angle) * 100, vy: Math.sin(angle) * 100, life: 3
        });
      }
      break;
  }

  // Boss hurts player
  if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, boss.x, boss.y, boss.w, boss.h)) {
    if (!player.pogoing || player.vy <= 0) {
      hurtPlayer();
    }
  }
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    let p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    // Hit player
    if (player.invuln <= 0 && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
      hurtPlayer();
      projectiles.splice(i, 1);
    }
  }
}

// === COLLECTIBLES (Pass 2: Tasern treasures + Pass 3: particles) ===
function updateCollectibles() {
  for (let c of collectibles) {
    if (c.collected) continue;
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, c.x, c.y, c.w, c.h)) {
      c.collected = true;
      switch(c.type) {
        case 'gem':
          gems++;
          score += Math.floor(10 * scoreMultiplier());
          TAS.audio.playTone(880, 0.06, 'square', 0.05, 1200);
          TAS.particles.spawn(c.x + 4, c.y + 4, '#a855f7', 4, 1.5);
          spawnTreasureParticles(c.x + 4, c.y + 4, '#a855f7', 6);
          if (gems % 100 === 0) {
            lives++;
            TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.1], [1047, 0.12]], 80);
          }
          break;
        case 'chest':
          score += Math.floor(c.value * scoreMultiplier());
          TAS.audio.playMelody([[440, 0.08], [554, 0.08], [659, 0.12]], 100);
          TAS.particles.spawn(c.x + 8, c.y + 8, '#ff0', 10, 2.5);
          TAS.fx.flash('#ff0', 0.15);
          spawnTreasureParticles(c.x + 8, c.y + 8, '#ffd700', 12);
          break;
        case 'mycoDiamond':
          score += Math.floor(c.value * scoreMultiplier() * 1.2);
          TAS.audio.playMelody([[523, 0.08], [659, 0.08], [784, 0.12]], 90);
          TAS.particles.spawn(c.x + 8, c.y + 8, '#44ffaa', 12, 3);
          TAS.fx.flash('#44ffaa', 0.15);
          spawnTreasureParticles(c.x + 8, c.y + 8, '#44ffaa', 15);
          break;
        case 'reactorCrystal':
          score += Math.floor(c.value * scoreMultiplier() * 1.3);
          TAS.audio.playMelody([[440, 0.08], [587, 0.08], [784, 0.12]], 80);
          TAS.particles.spawn(c.x + 8, c.y + 8, '#44ccff', 12, 3);
          TAS.fx.flash('#4cf', 0.15);
          spawnTreasureParticles(c.x + 8, c.y + 8, '#44ccff', 15);
          break;
        case 'lpIngot':
          score += Math.floor(c.value * scoreMultiplier() * 1.5);
          TAS.audio.playMelody([[587, 0.08], [784, 0.1], [1047, 0.12]], 100);
          TAS.particles.spawn(c.x + 8, c.y + 8, '#ffaa00', 14, 3);
          TAS.fx.flash('#fa0', 0.2);
          spawnTreasureParticles(c.x + 8, c.y + 8, '#ffaa00', 18);
          break;
        case 'bigGem':
          score += Math.floor(500 * scoreMultiplier());
          TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.15]], 100);
          TAS.particles.spawn(c.x + 8, c.y + 8, '#f0f', 15, 3);
          TAS.fx.flash('#f0f', 0.2);
          spawnTreasureParticles(c.x + 8, c.y + 8, '#ff44ff', 20);
          break;
      }
    }
  }
}

// Treasure collect particles (Pass 3)
function spawnTreasureParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let angle = (Math.PI * 2 / count) * i;
    let speed = 30 + Math.random() * 40;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 20,
      life: 0.5 + Math.random() * 0.4,
      color: color,
      size: 1 + Math.floor(Math.random() * 2)
    });
  }
}

function updateExtraParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 80 * dt; // gravity on particles
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawExtraParticles() {
  for (let p of particles) {
    ctx.globalAlpha = Math.max(0, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x - camera.x), Math.floor(p.y - camera.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// === DRAWING ===
function drawTiles() {
  let col = LEVEL_COLORS[currentLevel];
  let startX = Math.floor(camera.x / TILE);
  let endX = Math.min(startX + Math.ceil(GW / TILE) + 1, levelW);
  let startY = Math.floor(camera.y / TILE);
  let endY = Math.min(startY + Math.ceil(GH / TILE) + 1, levelH);

  for (let ty = startY; ty < endY; ty++) {
    for (let tx = startX; tx < endX; tx++) {
      let t = getTile(tx, ty);
      if (t === 0) continue;
      let dx = Math.floor(tx * TILE - camera.x);
      let dy = Math.floor(ty * TILE - camera.y);

      switch(t) {
        case 1: // solid
          ctx.fillStyle = col.tile;
          ctx.fillRect(dx, dy, TILE, TILE);
          ctx.fillStyle = col.tile2;
          ctx.fillRect(dx, dy, TILE, 2);
          ctx.fillRect(dx, dy, 2, TILE);
          // Subtle detail per level
          if ((tx + ty) % 3 === 0) {
            ctx.fillStyle = col.bgDetail;
            ctx.fillRect(dx + 4, dy + 4, 2, 2);
          }
          break;
        case 2: // breakable
          ctx.fillStyle = '#886644';
          ctx.fillRect(dx, dy, TILE, TILE);
          ctx.strokeStyle = '#aa8866';
          ctx.strokeRect(dx + 1, dy + 1, TILE - 2, TILE - 2);
          // crack marks
          ctx.strokeStyle = '#554433';
          ctx.beginPath();
          ctx.moveTo(dx + 4, dy + 4); ctx.lineTo(dx + 10, dy + 8);
          ctx.moveTo(dx + 12, dy + 3); ctx.lineTo(dx + 8, dy + 12);
          ctx.stroke();
          break;
        case 3: // spikes
          ctx.fillStyle = currentLevel === 2 ? '#aacc33' : '#cc3333'; // toxic green in mines
          for (let s = 0; s < 4; s++) {
            ctx.beginPath();
            ctx.moveTo(dx + s * 4, dy + TILE);
            ctx.lineTo(dx + s * 4 + 2, dy + 6);
            ctx.lineTo(dx + s * 4 + 4, dy + TILE);
            ctx.fill();
          }
          break;
        case 4: // vine / mycelial tendril
          ctx.fillStyle = currentLevel === 0 ? '#2a8020' : '#6a40a0';
          ctx.fillRect(dx + 6, dy, 4, TILE);
          ctx.fillStyle = currentLevel === 0 ? '#4ab040' : '#8a60c0';
          if ((ty + tx) % 2 === 0) {
            ctx.fillRect(dx + 3, dy + 4, 5, 3);
          } else {
            ctx.fillRect(dx + 9, dy + 8, 5, 3);
          }
          break;
        case 5: // one-way platform
          ctx.fillStyle = col.accent;
          ctx.fillRect(dx, dy, TILE, 4);
          ctx.fillStyle = col.tile2;
          ctx.fillRect(dx + 2, dy + 4, 3, 2);
          ctx.fillRect(dx + 10, dy + 4, 3, 2);
          break;
        case 7: // exit
          ctx.fillStyle = bossDefeated ? '#4f4' : '#444';
          ctx.fillRect(dx, dy, TILE, TILE);
          ctx.fillStyle = bossDefeated ? '#8f8' : '#666';
          ctx.font = '10px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('E', dx + 8, dy + 12);
          break;
      }
    }
  }
}

function drawPlayer() {
  let p = player;
  if (p.invuln > 0 && Math.floor(p.invuln * 10) % 2 === 0) return; // blink

  let dx = Math.floor(p.x - camera.x);
  let dy = Math.floor(p.y - camera.y);
  let f = p.facing;

  // === BASELING SPRITE ===
  if (!TAS.drawBaseling(ctx, dx + p.w / 2, dy + p.h / 2, Math.max(p.w, p.h), { flipX: f < 0, frame: frame })) {
    ctx.save();
    ctx.translate(dx + p.w / 2, dy + p.h / 2);
    if (f < 0) ctx.scale(-1, 1);

    // Charged pogo glow
    if (p.charging) {
      ctx.globalAlpha = 0.4 + p.chargeTimer * 0.5;
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(0, 6, 8 + p.chargeTimer * 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Body (tinted by statB color)
    ctx.fillStyle = statB.color || '#4488ff';
    ctx.fillRect(-5, -2, 10, 12);

  // Head
  ctx.fillStyle = '#c8e6a0';
  ctx.fillRect(-4, -9, 8, 8);

  // Mushroom cap
  ctx.fillStyle = '#a855f7';
  ctx.fillRect(-5, -14, 10, 5);
  ctx.fillRect(-3, -16, 6, 3);

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -7, 3, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(1, -6, 2, 2);

  // Snout
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(3, -5, 4, 3);

  // Legs
  ctx.fillStyle = '#7a444a';
  if (p.onGround && p.vx !== 0) {
    let lf = p.walkFrame;
    ctx.fillRect(-3, 10, 3, 4 + (lf % 2 === 0 ? 2 : 0));
    ctx.fillRect(1, 10, 3, 4 + (lf % 2 === 1 ? 2 : 0));
  } else {
    ctx.fillRect(-3, 10, 3, 4);
    ctx.fillRect(1, 10, 3, 4);
  }

  // Cane
  ctx.fillStyle = '#aa6633';
  if (p.caneSwing) {
    // Swing animation
    let swingAngle = (caneRecovery() - p.caneTimer) / caneRecovery() * Math.PI * 0.7 - 0.3;
    ctx.save();
    ctx.translate(4, 2);
    ctx.rotate(swingAngle);
    ctx.fillRect(0, -1, 18, 2);
    ctx.fillStyle = '#cc8844';
    ctx.fillRect(16, -3, 4, 6);
    ctx.restore();
  } else if ((p.pogoing || p.slamActive) && !p.onGround) {
    // Pogo cane pointing down
    ctx.fillRect(-1, 5, 2, 16);
    ctx.fillStyle = p.slamActive ? '#ff4400' : '#888';
    ctx.fillRect(-2, 19, 4, 3);
    // Slam trail
    if (p.slamActive) {
      ctx.fillStyle = '#ff8800';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(-3, 22, 6, 4);
      ctx.globalAlpha = 1;
    }
  } else {
    // Held diagonally
    ctx.save();
    ctx.translate(3, 4);
    ctx.rotate(0.4);
    ctx.fillRect(0, 0, 14, 2);
    ctx.fillStyle = '#cc8844';
    ctx.fillRect(12, -2, 3, 5);
    ctx.restore();
  }

  // Baseling icon badge
  if (statB.icon && statB.icon !== 'B') {
    ctx.fillStyle = statB.color || '#44dd88';
    ctx.font = 'bold 6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.icon, 0, -17);
  }

    ctx.restore();
  }
}

function drawEnemies() {
  for (let e of enemies) {
    if (!e.alive) continue;
    let dx = Math.floor(e.x - camera.x);
    let dy = Math.floor(e.y - camera.y);
    if (dx < -20 || dx > GW + 20 || dy < -20 || dy > GH + 20) continue;

    ctx.save();
    ctx.translate(dx + e.w / 2, dy + e.h / 2);

    switch(e.type) {
      case 'snake':
        ctx.fillStyle = '#44aa22';
        ctx.fillRect(-8, -3, 16, 6);
        ctx.fillStyle = '#66cc44';
        ctx.fillRect(-8, -5, 6, 4);
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-6 + (e.facing > 0 ? 8 : 0), -4, 2, 2);
        // Tongue
        if (e.animFrame === 0) {
          ctx.fillStyle = '#f44';
          ctx.fillRect(e.facing > 0 ? 8 : -11, -1, 3, 1);
        }
        break;
      case 'bat':
        ctx.fillStyle = '#553366';
        ctx.fillRect(-3, -3, 6, 8);
        // Wings
        let wingSpread = e.animFrame === 0 ? 7 : 4;
        ctx.fillRect(-wingSpread - 3, -2, wingSpread, 5);
        ctx.fillRect(3, -2, wingSpread, 5);
        ctx.fillStyle = '#f44';
        ctx.fillRect(-2, -1, 1, 1);
        ctx.fillRect(1, -1, 1, 1);
        break;
      case 'ghost':
        ctx.globalAlpha = 0.7 + Math.sin(e.moveTimer * 4) * 0.2;
        ctx.fillStyle = '#ddeeff';
        ctx.beginPath();
        ctx.arc(0, -2, 7, Math.PI, 0);
        ctx.lineTo(7, 8);
        ctx.lineTo(4, 5); ctx.lineTo(1, 8); ctx.lineTo(-2, 5); ctx.lineTo(-5, 8);
        ctx.lineTo(-7, 5);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#226';
        ctx.fillRect(-3, -4, 2, 3);
        ctx.fillRect(1, -4, 2, 3);
        ctx.globalAlpha = 1;
        break;
      case 'alien':
        ctx.fillStyle = '#44ff88';
        ctx.fillRect(-5, -6, 10, 12);
        ctx.fillStyle = '#22aa44';
        ctx.beginPath();
        ctx.arc(0, -7, 5, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.fillRect(-4, -5, 3, 4);
        ctx.fillRect(1, -5, 3, 4);
        // Antennae
        ctx.fillStyle = '#ff0';
        ctx.fillRect(-2, -12, 1, 4);
        ctx.fillRect(2, -12, 1, 4);
        break;
      case 'robot':
        ctx.fillStyle = '#8888aa';
        ctx.fillRect(-6, -6, 12, 14);
        ctx.fillStyle = '#aaaacc';
        ctx.fillRect(-7, -8, 14, 4);
        ctx.fillStyle = '#f44';
        ctx.fillRect(-3, -6, 2, 2);
        ctx.fillRect(2, -6, 2, 2);
        // Treads
        ctx.fillStyle = '#444';
        ctx.fillRect(-6, 8, 5, 3);
        ctx.fillRect(1, 8, 5, 3);
        if (e.hp > 1) {
          ctx.fillStyle = '#44f';
          ctx.fillRect(-2, 0, 4, 3);
        }
        break;
      // Tasern enemies (Pass 2)
      case 'reactorDrone':
        // Floating drone with energy ring
        ctx.fillStyle = '#336699';
        ctx.fillRect(-5, -4, 10, 8);
        ctx.fillStyle = '#4488bb';
        ctx.fillRect(-6, -2, 12, 4);
        // Propellers
        let prop = e.animFrame === 0 ? 4 : 2;
        ctx.fillStyle = '#88aacc';
        ctx.fillRect(-prop - 5, -5, prop * 2, 2);
        ctx.fillRect(5 - prop, -5, prop * 2, 2);
        // Red eye
        ctx.fillStyle = '#ff2200';
        ctx.fillRect(-1, -1, 3, 2);
        // Bottom emitter
        ctx.fillStyle = '#44ccff';
        ctx.globalAlpha = 0.5 + Math.sin(e.moveTimer * 6) * 0.3;
        ctx.fillRect(-2, 4, 4, 3);
        ctx.globalAlpha = 1;
        break;
      case 'sporeBat':
        // Fungal bat with glowing spore trail
        ctx.fillStyle = '#668844';
        ctx.fillRect(-4, -4, 8, 10);
        // Mushroom-cap wings
        let sWing = e.animFrame === 0 ? 8 : 5;
        ctx.fillStyle = '#88aa44';
        ctx.beginPath();
        ctx.arc(-sWing, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sWing, 0, 4, 0, Math.PI * 2);
        ctx.fill();
        // Glowing eyes
        ctx.fillStyle = '#ccff44';
        ctx.fillRect(-3, -3, 2, 2);
        ctx.fillRect(1, -3, 2, 2);
        // Spore glow
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#aaff44';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        break;
      case 'mycelialGuardian':
        // Large mushroom warrior
        ctx.fillStyle = '#665588';
        ctx.fillRect(-7, -4, 14, 16);
        // Mushroom cap head
        ctx.fillStyle = '#8866aa';
        ctx.beginPath();
        ctx.arc(0, -6, 8, Math.PI, 0);
        ctx.fill();
        // Spots on cap
        ctx.fillStyle = '#aa88cc';
        ctx.fillRect(-4, -9, 2, 2);
        ctx.fillRect(2, -8, 2, 2);
        // Eyes
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-4, -2, 3, 3);
        ctx.fillRect(2, -2, 3, 3);
        // Shield arm
        ctx.fillStyle = '#554477';
        let shieldPulse = Math.sin(e.moveTimer * 3) > 0.5 ? 2 : 0;
        ctx.fillRect(e.facing > 0 ? 7 : -10, -2 - shieldPulse, 3, 10 + shieldPulse);
        // Feet
        ctx.fillStyle = '#443366';
        ctx.fillRect(-6, 12, 5, 3);
        ctx.fillRect(1, 12, 5, 3);
        break;
    }
    ctx.restore();
  }
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  let dx = Math.floor(boss.x - camera.x);
  let dy = Math.floor(boss.y - camera.y);
  if (dx < -40 || dx > GW + 40) return;

  ctx.save();
  ctx.translate(dx + boss.w / 2, dy + boss.h / 2);

  if (boss.flashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(boss.flashTimer * 30) * 0.3;
  }

  switch(boss.type) {
    case 0: // Fungal Titan
      ctx.fillStyle = '#228800';
      ctx.fillRect(-14, -4, 28, 12);
      ctx.fillStyle = '#44bb22';
      ctx.fillRect(-14, -10, 12, 10);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(-12, -8, 3, 3);
      ctx.fillRect(-6, -8, 3, 3);
      // Mushroom crown
      ctx.fillStyle = '#66dd44';
      ctx.beginPath();
      ctx.arc(-8, -14, 8, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#88ff66';
      ctx.fillRect(-11, -17, 2, 2);
      ctx.fillRect(-5, -16, 2, 2);
      break;
    case 1: // Crypt Sovereign
      ctx.fillStyle = '#220033';
      ctx.fillRect(-10, -8, 20, 20);
      ctx.fillStyle = '#eeddff';
      ctx.fillRect(-6, -12, 12, 8);
      ctx.fillStyle = '#f00';
      ctx.fillRect(-4, -10, 3, 3);
      ctx.fillRect(1, -10, 3, 3);
      // Cape
      ctx.fillStyle = '#440066';
      ctx.fillRect(-14, -6, 6, 18);
      ctx.fillRect(8, -6, 6, 18);
      // Fangs
      ctx.fillStyle = '#fff';
      ctx.fillRect(-3, -4, 2, 3);
      ctx.fillRect(1, -4, 2, 3);
      break;
    case 2: // Toxic Overlord
      ctx.fillStyle = '#667722';
      ctx.fillRect(-12, -10, 24, 24);
      ctx.fillStyle = '#88aa33';
      ctx.fillRect(-8, -14, 16, 6);
      ctx.fillStyle = '#aacc44';
      ctx.fillRect(-4, -10, 3, 3);
      ctx.fillRect(2, -10, 3, 3);
      // Toxic drip protrusions
      ctx.fillStyle = '#aaff44';
      ctx.beginPath();
      ctx.moveTo(-12, -6); ctx.lineTo(-16, -14); ctx.lineTo(-8, -8);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(12, -6); ctx.lineTo(16, -14); ctx.lineTo(8, -8);
      ctx.fill();
      // Dripping effect
      ctx.fillStyle = '#88cc22';
      let drip = Math.floor(frame * 0.08) % 4;
      ctx.fillRect(-2, 14, 4, 2 + drip);
      break;
    case 3: // Reactor Prime
      ctx.fillStyle = '#666688';
      ctx.beginPath();
      ctx.ellipse(0, 0, 14, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#8888aa';
      ctx.beginPath();
      ctx.arc(0, -4, 8, Math.PI, 0);
      ctx.fill();
      // Lights
      ctx.fillStyle = Math.sin(frame * 0.2) > 0 ? '#0f0' : '#f00';
      ctx.fillRect(-8, -1, 3, 3);
      ctx.fillRect(5, -1, 3, 3);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(-2, 4, 4, 3);
      // Energy aura
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#4488ff';
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      break;
    case 4: // Core Nexus
      let pulse = 0.7 + Math.sin(frame * 0.1) * 0.3;
      ctx.fillStyle = `rgba(255,100,0,${pulse})`;
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.arc(0, 0, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(0, 0, 6, 0, Math.PI * 2);
      ctx.fill();
      // Energy arcs
      ctx.strokeStyle = '#ff8800';
      ctx.lineWidth = 1;
      for (let a = 0; a < 4; a++) {
        let ang = frame * 0.05 + a * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(ang) * 10, Math.sin(ang) * 10);
        ctx.lineTo(Math.cos(ang) * 18, Math.sin(ang) * 18);
        ctx.stroke();
      }
      break;
  }

  ctx.globalAlpha = 1;
  ctx.restore();

  // Boss HP bar
  let barW = 60;
  let barX = Math.floor(dx + boss.w / 2 - barW / 2);
  let barY = Math.floor(dy - 12);
  ctx.fillStyle = '#400';
  ctx.fillRect(barX, barY, barW, 5);
  ctx.fillStyle = '#f44';
  ctx.fillRect(barX, barY, Math.floor(barW * (boss.hp / boss.maxHp)), 5);
  ctx.strokeStyle = '#888';
  ctx.strokeRect(barX, barY, barW, 5);
}

function drawProjectiles() {
  ctx.fillStyle = '#ff4400';
  for (let p of projectiles) {
    let dx = Math.floor(p.x - camera.x);
    let dy = Math.floor(p.y - camera.y);
    ctx.beginPath();
    ctx.arc(dx + p.w / 2, dy + p.h / 2, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCollectibles() {
  for (let c of collectibles) {
    if (c.collected) continue;
    let dx = Math.floor(c.x - camera.x);
    let dy = Math.floor(c.y - camera.y);
    if (dx < -16 || dx > GW + 16) continue;

    switch(c.type) {
      case 'gem':
        let bob = Math.floor(Math.sin(frame * 0.08 + c.x * 0.1) * 2);
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.moveTo(dx + 4, dy + bob);
        ctx.lineTo(dx + 8, dy + 3 + bob);
        ctx.lineTo(dx + 4, dy + 7 + bob);
        ctx.lineTo(dx, dy + 3 + bob);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#d4a0ff';
        ctx.fillRect(dx + 2, dy + 2 + bob, 2, 2);
        break;
      case 'chest':
        ctx.fillStyle = '#886622';
        ctx.fillRect(dx, dy + 4, 16, 12);
        ctx.fillStyle = '#aa8844';
        ctx.fillRect(dx, dy + 4, 16, 4);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(dx + 6, dy + 6, 4, 4);
        ctx.fillStyle = '#664411';
        ctx.fillRect(dx + 1, dy + 10, 14, 1);
        break;
      case 'mycoDiamond':
        // Green diamond with spore glow
        let bob3 = Math.floor(Math.sin(frame * 0.07 + c.x * 0.1) * 2);
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#44ffaa';
        ctx.beginPath();
        ctx.arc(dx + 8, dy + 8 + bob3, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#22cc88';
        ctx.beginPath();
        ctx.moveTo(dx + 8, dy + bob3);
        ctx.lineTo(dx + 14, dy + 6 + bob3);
        ctx.lineTo(dx + 8, dy + 14 + bob3);
        ctx.lineTo(dx + 2, dy + 6 + bob3);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#66ffbb';
        ctx.fillRect(dx + 5, dy + 4 + bob3, 3, 3);
        break;
      case 'reactorCrystal':
        // Blue crystal shard
        let bob4 = Math.floor(Math.sin(frame * 0.06 + c.x * 0.1) * 2);
        ctx.fillStyle = '#2288cc';
        ctx.beginPath();
        ctx.moveTo(dx + 8, dy + bob4);
        ctx.lineTo(dx + 13, dy + 5 + bob4);
        ctx.lineTo(dx + 11, dy + 14 + bob4);
        ctx.lineTo(dx + 5, dy + 14 + bob4);
        ctx.lineTo(dx + 3, dy + 5 + bob4);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#44ccff';
        ctx.fillRect(dx + 6, dy + 3 + bob4, 3, 4);
        // Energy shimmer
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.12) * 0.2;
        ctx.fillStyle = '#88eeff';
        ctx.fillRect(dx + 4, dy + 6 + bob4, 1, 3);
        ctx.globalAlpha = 1;
        break;
      case 'lpIngot':
        // Gold bar with hex pattern
        let bob5 = Math.floor(Math.sin(frame * 0.065 + c.x * 0.1) * 2);
        ctx.fillStyle = '#cc8800';
        ctx.fillRect(dx + 2, dy + 4 + bob5, 12, 8);
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(dx + 2, dy + 4 + bob5, 12, 3);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(dx + 4, dy + 6 + bob5, 2, 2);
        ctx.fillRect(dx + 8, dy + 6 + bob5, 2, 2);
        // LP mark
        ctx.fillStyle = '#996600';
        ctx.font = '5px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('MfT', dx + 8, dy + 12 + bob5);
        break;
      case 'bigGem':
        let bob2 = Math.floor(Math.sin(frame * 0.06) * 3);
        let glow = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.globalAlpha = glow;
        ctx.fillStyle = '#ff44ff';
        ctx.beginPath();
        ctx.arc(dx + 8, dy + 8 + bob2, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ff00ff';
        ctx.beginPath();
        ctx.moveTo(dx + 8, dy + bob2);
        ctx.lineTo(dx + 14, dy + 5 + bob2);
        ctx.lineTo(dx + 14, dy + 11 + bob2);
        ctx.lineTo(dx + 8, dy + 16 + bob2);
        ctx.lineTo(dx + 2, dy + 11 + bob2);
        ctx.lineTo(dx + 2, dy + 5 + bob2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#ff88ff';
        ctx.fillRect(dx + 4, dy + 4 + bob2, 3, 3);
        break;
    }
  }
}

// Tracks whether the baked scene still needs the (async) bg image folded in.
let bgSceneHasArt = false;
function drawBackground() {
  let col = LEVEL_COLORS[currentLevel];
  // Sky gradient (also the fallback floor under the flattened scene)
  ctx.fillStyle = col.sky;
  ctx.fillRect(0, 0, GW, GH);

  // §7d: blit the flattened scenery layer (bg image + clouds + trees + platform tiles).
  // Rebuild once the async Grok bg/scenery finishes loading so it isn't a flat-color scene.
  if (bgScene && bgSceneLevel === currentLevel) {
    if (!bgSceneHasArt && stageBgImg(currentLevel)) { buildScene(currentLevel); bgSceneHasArt = true; }
    ctx.drawImage(bgScene, -Math.floor(camera.x), -Math.floor(camera.y));
    // Light atmospheric particles on top for motion (cheap)
    if (currentLevel === 0 || currentLevel === 1) {
      ctx.globalAlpha = 0.18;

        ctx.fillRect(sx, sy, 2, 2);

        ctx.fillStyle = '#2244aa';

        ctx.fillStyle = '#44ccff';

        ctx.fillRect(tx + 2, 20, 4, GH - 40);

    case 4: // Core Vault — lava glow, pipes, warning stripes
      ctx.fillStyle = col.bg;
      for (let i = 0; i < 8; i++) {
        let bx = Math.floor((i * 80 + px) % (GW + 80)) - 40;

  // HP hearts
  ctx.fillStyle = '#e6482e';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';

  for (let i = 0; i < hp; i++) hpText += '\u2665 ';
  ctx.fillText(hpText, 10, GH - 10);
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  updateExtraParticles(dt);
  updateInputEdge();

  switch(state) {
    case 'title':
      if (picking) break;
      if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
        TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
        picking = true;
        TAS.player.select(function(){ recomputeStats(); picking = false; });
        break;
      }
      if (jumpPressed || attackPressed) {
        TAS.audio.ensureAudio();
        state = 'map';
        score = 0;
        gems = 0;
        lives = startLives();
        hp = maxHP();
        levelsCleared = [false, false, false, false, false];
        mapCursor = 0;
      }
      break;

    case 'map':
      if (keyLeft() && !prevLeft) {
        mapCursor = (mapCursor - 1 + 5) % 5;
        TAS.audio.playTone(300, 0.05, 'square', 0.04);
      }
      if (keyRight() && !prevRight) {
        mapCursor = (mapCursor + 1) % 5;
        TAS.audio.playTone(300, 0.05, 'square', 0.04);
      }
      prevLeft = keyLeft();
      prevRight = keyRight();
      if (jumpPressed) {
        currentLevel = mapCursor;
        generateLevel(currentLevel);
        player = createPlayer(2 * TILE, 10 * TILE);
        camera = { x: 0, y: 0 };
        state = 'playing';
        TAS.audio.playTone(440, 0.1, 'square', 0.06, 880);
      }
      break;

    case 'playing':
      levelTime += dt;
      movePlayer(dt);
      updateEnemies(dt);
      updateBoss(dt);
      updateProjectiles(dt);
      updateCollectibles();
      break;

    case 'gameover':
      deathTimer -= dt;
      if (deathTimer <= 0 && (jumpPressed || attackPressed)) {
        state = 'title';
      }
      break;

    case 'victory':
      victoryTimer += dt;
      if (victoryTimer > 2 && (jumpPressed || attackPressed)) {
        state = 'title';
      }
      break;
  }
}

let prevLeft = false;
let prevRight = false;

// === MAIN DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  switch(state) {
    case 'title':
      drawTitleScreen();
      break;
    case 'map':
      drawMap();
      break;
    case 'playing':
      ctx.save();
      TAS.fx.applyShake();
      drawBackground();
      drawTiles();
      drawCollectibles();
      drawEnemies();
      drawBoss();
      drawProjectiles();
      drawPlayer();
      drawExtraParticles();
      TAS.particles.draw();
      ctx.restore();
      TAS.fx.drawFlash(GW, GH);
      drawPlayingHUD();
      TAS.input.drawTouchControls(GW, GH);
      break;
    case 'gameover':
      TAS.ui.drawGameOver(score, highScore, GW, GH, { frame, extra: 'Spores: ' + gems });
      break;
    case 'victory':
      drawVictory();
      break;
  }
}

    { label: 'CHA', val: statB.cha, col: '#f4a' }
  ];

  // Name + level
  ctx.fillStyle = statB.color || '#44dd88';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(statB.name + (statB.level > 0 ? ' Lv' + statB.level : ''), x + 90, y);

  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i < stats.length; i++) {
    let sx = x + (i % 3) * 60;
    let sy = y + 10 + Math.floor(i / 3) * 12;
    // Label
    ctx.fillStyle = '#888';
    ctx.fillText(stats[i].label, sx, sy);
    // Bar background
    ctx.fillStyle = '#222';
    ctx.fillRect(sx + 22, sy - 6, 30, 6);
    // Bar fill (capped at 20 for display)
    let pct = Math.min(stats[i].val / 20, 1);
    ctx.fillStyle = stats[i].col;
    ctx.fillRect(sx + 22, sy - 6, Math.floor(30 * pct), 6);
    // Value
    ctx.fillStyle = '#ccc';
    ctx.fillText(String(stats[i].val), sx + 54, sy);
  }
  ctx.restore();
}

function drawPlayingHUD() {
  // HUD bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, HUD_H);

  ctx.font = 'bold 10px monospace';

  // Score (INT-scaled shown in color)
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('POOP:' + score, 4, 14);

  // Spores
  ctx.fillStyle = '#a855f7';
  ctx.textAlign = 'center';
  ctx.fillText('Spores:' + gems, GW / 2 - 40, 14);

  // Level name (Tasern themed)
  ctx.fillStyle = LEVEL_COLORS[currentLevel].accent;
  ctx.fillText(LEVEL_NAMES[currentLevel], GW / 2 + 40, 14);

  // HP hearts (CON-scaled)
  ctx.fillStyle = '#f44';
  ctx.textAlign = 'right';
  let hearts = '';
  for (let i = 0; i < hp; i++) hearts += '\u2665';
  ctx.fillText(hearts, GW - 30, 14);

  // Lives
  ctx.fillStyle = '#4f4';
  ctx.font = '9px monospace';
  ctx.fillText('x' + lives, GW - 4, 14);

  // Boss indicator
  if (boss && boss.alive) {
    ctx.fillStyle = '#f44';
    ctx.textAlign = 'center';
    ctx.font = '8px monospace';
    ctx.fillText('BOSS: ' + boss.name, GW / 2, GH - 8);
  } else if (bossDefeated) {
    ctx.fillStyle = '#4f4';
    ctx.textAlign = 'center';
    ctx.font = '8px monospace';
    let pulse3 = Math.sin(frame * 0.08) > 0 ? '#4f4' : '#ff0';
    ctx.fillStyle = pulse3;
    ctx.fillText('PORTAL OPEN!', GW / 2, GH - 8);
  }

  // Pogo/slam indicator
  if (player) {
    if (player.slamActive) {
      ctx.fillStyle = '#ff4400';
      ctx.textAlign = 'left';
      ctx.font = 'bold 8px monospace';
      ctx.fillText('SLAM!', 4, GH - 8);
    } else if (player.charging) {
      ctx.fillStyle = '#ffaa00';
      ctx.textAlign = 'left';
      ctx.font = 'bold 8px monospace';
      ctx.fillText('CHARGE...', 4, GH - 8);
    } else if (player.pogoing) {
      ctx.fillStyle = '#ff0';
      ctx.textAlign = 'left';
      ctx.font = 'bold 8px monospace';
      ctx.fillText('POGO!', 4, GH - 8);
    }
  }

  // Persistent controls legend (desktop only; brighter on the first stage). §7c
  if (!('ontouchstart' in window)) {
    var firstStage = (currentLevel === 0);
    ctx.globalAlpha = firstStage ? 0.85 : 0.4;
    ctx.fillStyle = '#0052FF';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ARROWS MOVE   W JUMP   A/D WHIP   DOWN+W BOUNCE', GW / 2, GH - 2);
    ctx.globalAlpha = 1;
  }
}

function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Spore celebration
  for (let i = 0; i < 50; i++) {
    let sx = Math.floor((i * 29 + frame * 0.5) % GW);
    let sy = Math.floor((i * 19 + frame * 0.3) % GH);
    ctx.fillStyle = ['#f4b41b', '#a855f7', '#38d973', '#3cacd7'][i % 4];
    ctx.fillRect(sx, sy, 2, 2);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('VICTORY!', GW / 2, 60);

  ctx.fillStyle = '#38d973';
  ctx.font = '12px monospace';
  ctx.fillText('All Spore Vaults Cleared!', GW / 2, 90);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Final POOP: ' + score, GW / 2, 130);

  ctx.fillStyle = '#a855f7';
  ctx.font = '11px monospace';
  ctx.fillText('Spores Harvested: ' + gems, GW / 2, 155);

  if (score >= highScore && score > 0) {
    let pulse4 = Math.sin(frame * 0.08) * 0.3 + 0.7;
    ctx.globalAlpha = pulse4;
    ctx.fillStyle = '#ff0';
    ctx.font = 'bold 12px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW / 2, 180);
    ctx.globalAlpha = 1;
  }

  if (victoryTimer > 2) {
    let pulse5 = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse5;
    ctx.fillStyle = '#38d973';
    ctx.font = '10px monospace';
    ctx.fillText('PRESS ANY KEY', GW / 2, 220);
    ctx.globalAlpha = 1;
  }
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
