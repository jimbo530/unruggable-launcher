<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cobra Triangle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10; }
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function(){
"use strict";

// === GAME CONSTANTS ===
var GW = 480, GH = 320;
var ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'FIRE', b: 'TURBO' } });

// === GAME STATE ===
var state = 'title';
var score = 0;
var highScore = TAS.score.load('cobratri_hi');
var lives = 3;
var hp = 3;
var maxHp = 3;
var stage = 1;
var frame = 0;
var stageTimer = 0;
var stageGoal = 0;
var stageProgress = 0;
var invincTimer = 0;
var deathTimer = 0;
var stageClearTimer = 0;
var scrollSpeed = 1.5;
var baseScrollSpeed = 1.5;

// Mission types
var MISSIONS = ['race', 'protect', 'boss', 'collect', 'survive'];
var MISSION_NAMES = ['RACE TO FINISH', 'PROTECT THE BASELINGS', 'BOSS FIGHT', 'COLLECT TOKENS', 'SURVIVE THE RAPIDS'];
var missionType = 'race';
var missionFlashTimer = 0;

// Player boat
var boat = { x: GW / 2, y: GH - 60, vx: 0, vy: 0, angle: 0 };
var BOAT_W = 16, BOAT_H = 24;
var BOAT_SPEED = 3.5;
var turboActive = false;
var turboFuel = 100;
var shieldActive = false;
var shieldTimer = 0;

// Weapons
var WEAPON_TYPES = ['cannon', 'spread', 'missile', 'turbo'];
var WEAPON_NAMES = ['CANNON', 'SPREAD SHOT', 'MISSILES', 'TURBO FIRE'];
var weaponLevel = 0;
var fireTimer = 0;
var fireCooldown = 12;
var bullets = [];

// Water state
var waterOffset = 0;
var ripples = [];
var wakeTrail = [];
var splashes = [];
var waterCurrentX = 0;
var waterCurrentY = 0;

// River banks
var bankLeft = 40;
var bankRight = GW - 40;
var bankTargetLeft = 40;
var bankTargetRight = GW - 40;
var bankSegments = [];

// Obstacles & hazards
var rocks = [];
var logs = [];
var whirlpools = [];
var mines = [];
var icePatches = [];
var ramps = [];
var waterfalls = [];

// Enemies
var enemies = [];
var enemyBullets = [];
var helicopters = [];
var helicopterBombs = [];
var submarines = [];

// Power-ups
var powerups = [];

// Baselings (protect mission)
var baselings = [];
var baselingSafeCount = 0;
var baselingLostCount = 0;

// Tokens (collect mission)
var tokens = [];
var tokensCollected = 0;
var tokensNeeded = 0;

// Boss
var boss = null;
var bossHits = 0;
var bossMaxHits = 10;
var bossPhase = 0;
var bossBullets = [];
var BOSS_NAMES = ['GIANT SQUID', 'SEA DRAGON', 'MECH SHARK', 'STORM WHALE', 'THE KRAKEN'];

// Scenery / decoration
var foamBubbles = [];

// Stage configuration
function getMissionForStage(s) {
  if (s % 5 === 0) return 'boss';
  var cycle = ['race', 'protect', 'collect', 'survive'];
  return cycle[(s - 1) % 4];
}

function getDifficultyMult() {
  return 1 + (stage - 1) * 0.12;
}

// === INIT STAGE ===
function initStage() {
  missionType = getMissionForStage(stage);
  missionFlashTimer = 180;
  scrollSpeed = baseScrollSpeed + (stage - 1) * 0.08;
  stageTimer = 0;
  stageProgress = 0;
  stageClearTimer = 0;
  invincTimer = 60;
  turboFuel = 100;

  // Clear everything
  bullets = [];
  rocks = [];
  logs = [];
  whirlpools = [];
  mines = [];
  icePatches = [];
  ramps = [];
  waterfalls = [];
  enemies = [];
  enemyBullets = [];
  helicopters = [];
  helicopterBombs = [];
  submarines = [];
  powerups = [];
  baselings = [];
  tokens = [];
  boss = null;
  bossBullets = [];
  bankSegments = [];
  foamBubbles = [];
  waterCurrentX = 0;
  waterCurrentY = 0;

  // Reset boat position
  boat.x = GW / 2;
  boat.y = GH - 60;
  boat.vx = 0;
  boat.vy = 0;

  // Bank width varies by mission
  bankTargetLeft = 30 + Math.random() * 20;
  bankTargetRight = GW - 30 - Math.random() * 20;
  bankLeft = bankTargetLeft;
  bankRight = bankTargetRight;

  // Init bank segments
  for (var i = 0; i < 20; i++) {
    bankSegments.push({
      y: i * (GH / 10),
      left: bankLeft + (Math.random() - 0.5) * 30,
      right: bankRight + (Math.random() - 0.5) * 30
    });
  }

  // Mission-specific setup
  if (missionType === 'race') {
    stageGoal = 600 + stage * 40;
  } else if (missionType === 'protect') {
    stageGoal = 5 + Math.floor(stage / 3);
    baselingSafeCount = 0;
    baselingLostCount = 0;
    for (var b = 0; b < stageGoal; b++) {
      baselings.push({
        x: TAS.math.randRange(bankLeft + 40, bankRight - 40),
        y: TAS.math.randRange(60, GH - 100),
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.3,
        bobTimer: Math.random() * 100,
        alive: true
      });
    }
  } else if (missionType === 'collect') {
    tokensNeeded = 8 + Math.floor(stage / 2);
    tokensCollected = 0;
    for (var t = 0; t < tokensNeeded; t++) {
      tokens.push({
        x: TAS.math.randRange(bankLeft + 30, bankRight - 30),
        y: TAS.math.randRange(-GH, 0) - t * 60,
        sinkTimer: 300 + Math.random() * 200,
        bobTimer: Math.random() * 100,
        collected: false
      });
    }
  } else if (missionType === 'survive') {
    stageGoal = 500 + stage * 30;
  } else if (missionType === 'boss') {
    var bossIndex = Math.min(Math.floor((stage - 1) / 5), 4);
    bossMaxHits = 10 + bossIndex * 5;
    bossHits = 0;
    bossPhase = 0;
    boss = {
      type: bossIndex,
      x: GW / 2,
      y: 60,
      vx: 1.5,
      vy: 0,
      hp: bossMaxHits,
      timer: 0,
      phase: 0,
      flashTimer: 0,
      tentacles: [],
      width: 50 + bossIndex * 10,
      height: 40 + bossIndex * 8
    };
    // Stop scrolling for boss
    scrollSpeed = 0;
  }
}

// === START GAME ===
function startGame() {
  state = 'playing';
  score = 0;
  lives = 3;
  hp = 3;
  stage = 1;
  weaponLevel = 0;
  shieldActive = false;
  shieldTimer = 0;
  TAS.particles.clear();
  ripples = [];
  wakeTrail = [];
  splashes = [];
  initStage();
}

// === SPAWN HELPERS ===
function spawnRock() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  rocks.push({
    x: TAS.math.randRange(seg.left + 20, seg.right - 20),
    y: -20,
    size: TAS.math.randRange(8, 16),
    type: TAS.math.randInt(0, 2)
  });
}

function spawnLog() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  logs.push({
    x: TAS.math.randRange(seg.left + 20, seg.right - 20),
    y: -20,
    angle: Math.random() * Math.PI,
    length: TAS.math.randRange(20, 40),
    rotSpeed: (Math.random() - 0.5) * 0.02
  });
}

function spawnWhirlpool() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  whirlpools.push({
    x: TAS.math.randRange(seg.left + 40, seg.right - 40),
    y: -30,
    radius: TAS.math.randRange(20, 35),
    angle: 0,
    strength: 0.8 + getDifficultyMult() * 0.3
  });
}

function spawnMine() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  mines.push({
    x: TAS.math.randRange(seg.left + 15, seg.right - 15),
    y: -15,
    timer: 0,
    armed: true
  });
}

function spawnRamp() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  ramps.push({
    x: TAS.math.randRange(seg.left + 30, seg.right - 30),
    y: -20,
    width: 30,
    height: 12
  });
}

function spawnEnemy() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  var type = TAS.math.randInt(0, 2); // 0=basic, 1=shooter, 2=rammer
  enemies.push({
    x: TAS.math.randRange(seg.left + 20, seg.right - 20),
    y: -25,
    vx: (Math.random() - 0.5) * 2,
    vy: scrollSpeed * 0.3 + Math.random(),
    type: type,
    hp: type === 2 ? 2 : 1,
    fireTimer: TAS.math.randInt(40, 100),
    flashTimer: 0
  });
}

function spawnHelicopter() {
  helicopters.push({
    x: TAS.math.randRange(80, GW - 80),
    y: -30,
    vx: (Math.random() - 0.5) * 2,
    vy: 0.5 + Math.random() * 0.5,
    bombTimer: TAS.math.randInt(60, 120),
    hp: 3,
    flashTimer: 0,
    shadow: true
  });
}

function spawnSubmarine() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  submarines.push({
    x: TAS.math.randRange(seg.left + 30, seg.right - 30),
    y: -20,
    surfaceTimer: TAS.math.randInt(90, 150),
    surfaced: false,
    surfaceDuration: 80,
    fireTimer: 30,
    hp: 2,
    flashTimer: 0
  });
}

function spawnPowerup() {
  var seg = bankSegments[0] || { left: bankLeft, right: bankRight };
  var types = ['speed', 'weapon', 'shield', 'life', 'score'];
  var type = types[TAS.math.randInt(0, types.length - 1)];
  powerups.push({
    x: TAS.math.randRange(seg.left + 20, seg.right - 20),
    y: -15,
    type: type,
    bobTimer: Math.random() * 100
  });
}

// === FIRE WEAPON ===
function fireWeapon() {
  if (fireTimer > 0) return;
  TAS.audio.playTone(440, 0.08, 'square', 0.06, 880);

  if (weaponLevel === 0) {
    // Single cannon
    bullets.push({ x: boat.x, y: boat.y - BOAT_H / 2, vx: 0, vy: -6, type: 'bullet' });
    fireCooldown = 12;
  } else if (weaponLevel === 1) {
    // Spread shot
    bullets.push({ x: boat.x, y: boat.y - BOAT_H / 2, vx: -1.5, vy: -5.5, type: 'bullet' });
    bullets.push({ x: boat.x, y: boat.y - BOAT_H / 2, vx: 0, vy: -6, type: 'bullet' });
    bullets.push({ x: boat.x, y: boat.y - BOAT_H / 2, vx: 1.5, vy: -5.5, type: 'bullet' });
    fireCooldown = 16;
  } else if (weaponLevel === 2) {
    // Homing missiles
    bullets.push({ x: boat.x - 6, y: boat.y - BOAT_H / 2, vx: 0, vy: -4, type: 'missile', homing: true, life: 120 });
    bullets.push({ x: boat.x + 6, y: boat.y - BOAT_H / 2, vx: 0, vy: -4, type: 'missile', homing: true, life: 120 });
    fireCooldown = 22;
  } else {
    // Turbo fire (rapid)
    bullets.push({ x: boat.x - 4, y: boat.y - BOAT_H / 2, vx: 0, vy: -7, type: 'bullet' });
    bullets.push({ x: boat.x + 4, y: boat.y - BOAT_H / 2 + 4, vx: 0, vy: -7, type: 'bullet' });
    fireCooldown = 6;
  }
  fireTimer = fireCooldown;
}

// === DAMAGE PLAYER ===
function damagePlayer() {
  if (invincTimer > 0 || shieldActive) {
    if (shieldActive) {
      shieldTimer = 0;
      shieldActive = false;
      TAS.audio.playTone(200, 0.2, 'triangle', 0.08, 100);
    }
    return;
  }
  hp--;
  invincTimer = 90;
  TAS.fx.shake(6, 0.85);
  TAS.fx.flash('#ff3333', 0.4);
  TAS.audio.playTone(150, 0.3, 'sawtooth', 0.1, 50);
  TAS.particles.spawn(boat.x, boat.y, '#ff6600', 12, 3, { gravity: 0.05 });

  if (hp <= 0) {
    lives--;
    if (lives <= 0) {
      gameOver();
    } else {
      hp = maxHp;
      weaponLevel = Math.max(0, weaponLevel - 1);
      invincTimer = 120;
      boat.x = GW / 2;
      boat.y = GH - 60;
    }
  }
}

function gameOver() {
  state = 'gameOver';
  if (score > highScore) {
    highScore = score;
    TAS.score.save('cobratri_hi', highScore);
  }
  TAS.audio.playMelody([[200, 0.2], [150, 0.2], [100, 0.3]], 200);
}

function stageClear() {
  stageClearTimer = 150;
  score += 500 * stage;
  TAS.audio.playMelody([[440, 0.1], [550, 0.1], [660, 0.1], [880, 0.2]], 100);
  TAS.fx.flash('#44ff88', 0.3);
}

// === FIND NEAREST ENEMY (for homing) ===
function findNearestEnemy(bx, by) {
  var nearest = null;
  var minDist = 9999;
  for (var i = 0; i < enemies.length; i++) {
    var d = TAS.math.dist(bx, by, enemies[i].x, enemies[i].y);
    if (d < minDist) { minDist = d; nearest = enemies[i]; }
  }
  for (var h = 0; h < helicopters.length; h++) {
    var dh = TAS.math.dist(bx, by, helicopters[h].x, helicopters[h].y);
    if (dh < minDist) { minDist = dh; nearest = helicopters[h]; }
  }
  if (boss && boss.hp > 0) {
    var db = TAS.math.dist(bx, by, boss.x, boss.y);
    if (db < minDist) { nearest = boss; }
  }
  return nearest;
}

// === WATER EFFECTS ===
function addRipple(x, y, maxR) {
  ripples.push({ x: x, y: y, r: 2, maxR: maxR || 15, alpha: 0.6 });
}

function addSplash(x, y, count) {
  for (var i = 0; i < (count || 5); i++) {
    splashes.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vy: -2 - Math.random() * 2,
      vx: (Math.random() - 0.5) * 2,
      life: 1,
      size: 1 + Math.random() * 2
    });
  }
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (state === 'title') {
    waterOffset += 0.5;
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a || TAS.input.touch.b) {
      TAS.audio.ensureAudio();
      startGame();
    }
    return;
  }

  if (state === 'gameOver') {
    if (frame % 10 === 0) addRipple(Math.random() * GW, Math.random() * GH, 20);
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'title';
    }
    return;
  }

  if (state !== 'playing') return;

  // Stage clear transition
  if (stageClearTimer > 0) {
    stageClearTimer--;
    if (stageClearTimer <= 0) {
      stage++;
      if (stage > 25) {
        // Game complete
        score += 10000;
        gameOver();
        return;
      }
      initStage();
    }
    return;
  }

  // Mission flash timer
  if (missionFlashTimer > 0) missionFlashTimer--;

  // Invincibility
  if (invincTimer > 0) invincTimer--;
  if (shieldTimer > 0) {
    shieldTimer--;
    if (shieldTimer <= 0) shieldActive = false;
  }

  // Fire timer
  if (fireTimer > 0) fireTimer--;

  // Turbo
  var isTurbo = (TAS.input.keys['KeyZ'] || TAS.input.keys['z'] || TAS.input.touch.b) && turboFuel > 0;
  if (isTurbo) {
    turboFuel = Math.max(0, turboFuel - 0.5);
    turboActive = true;
  } else {
    turboActive = false;
    turboFuel = Math.min(100, turboFuel + 0.15);
  }

  var currentScroll = scrollSpeed * (turboActive ? 1.8 : 1);

  // Input - steering
  var moveX = 0, moveY = 0;
  if (TAS.input.keys['ArrowLeft'] || TAS.input.keys['a'] || TAS.input.keys['KeyA'] || TAS.input.touch.left) moveX = -1;
  if (TAS.input.keys['ArrowRight'] || TAS.input.keys['d'] || TAS.input.keys['KeyD'] || TAS.input.touch.right) moveX = 1;
  if (TAS.input.keys['ArrowUp'] || TAS.input.keys['w'] || TAS.input.keys['KeyW'] || TAS.input.touch.up) moveY = -1;
  if (TAS.input.keys['ArrowDown'] || TAS.input.keys['s'] || TAS.input.keys['KeyS'] || TAS.input.touch.down) moveY = 1;

  var speed = BOAT_SPEED * (turboActive ? 1.4 : 1);
  boat.vx = TAS.math.lerp(boat.vx, moveX * speed, 0.15);
  boat.vy = TAS.math.lerp(boat.vy, moveY * speed * 0.7, 0.12);

  // Apply water current
  boat.vx += waterCurrentX * 0.3;
  boat.vy += waterCurrentY * 0.2;

  boat.x += boat.vx;
  boat.y += boat.vy;

  // Boat angle follows movement
  boat.angle = TAS.math.lerp(boat.angle, moveX * 0.2, 0.1);

  // Clamp to river banks
  var seg = getCurrentBankAt(boat.y);
  var leftB = seg.left + BOAT_W / 2 + 4;
  var rightB = seg.right - BOAT_W / 2 - 4;
  if (boat.x < leftB) { boat.x = leftB; boat.vx = 0.5; damagePlayer(); }
  if (boat.x > rightB) { boat.x = rightB; boat.vx = -0.5; damagePlayer(); }
  boat.y = TAS.math.clamp(boat.y, 40, GH - 20);

  // Fire weapon
  if (TAS.input.keys['Space'] || TAS.input.keys[' '] || TAS.input.keys['KeyX'] || TAS.input.keys['x'] || TAS.input.touch.a) {
    fireWeapon();
  }

  // Water scroll
  waterOffset += currentScroll;

  // Wake trail
  if (frame % 2 === 0) {
    wakeTrail.push({ x: boat.x, y: boat.y + BOAT_H / 2 + 2, life: 1, spread: 0 });
  }
  for (var w = wakeTrail.length - 1; w >= 0; w--) {
    wakeTrail[w].y += currentScroll * 0.5;
    wakeTrail[w].life -= 0.025;
    wakeTrail[w].spread += 0.3;
    if (wakeTrail[w].life <= 0 || wakeTrail[w].y > GH + 20) wakeTrail.splice(w, 1);
  }

  // Ripples
  for (var ri = ripples.length - 1; ri >= 0; ri--) {
    ripples[ri].r += 0.5;
    ripples[ri].alpha -= 0.015;
    ripples[ri].y += currentScroll * 0.3;
    if (ripples[ri].alpha <= 0 || ripples[ri].r >= ripples[ri].maxR) ripples.splice(ri, 1);
  }

  // Splashes
  for (var si = splashes.length - 1; si >= 0; si--) {
    splashes[si].x += splashes[si].vx;
    splashes[si].y += splashes[si].vy;
    splashes[si].vy += 0.15;
    splashes[si].life -= 0.04;
    if (splashes[si].life <= 0) splashes.splice(si, 1);
  }

  // Bank segments scroll
  for (var bs = 0; bs < bankSegments.length; bs++) {
    bankSegments[bs].y += currentScroll;
  }
  // Remove off-screen, add new
  while (bankSegments.length > 0 && bankSegments[bankSegments.length - 1].y > GH + 40) {
    bankSegments.pop();
  }
  while (bankSegments.length < 20 || (bankSegments.length > 0 && bankSegments[0].y > -20)) {
    var topY = bankSegments.length > 0 ? bankSegments[0].y - (GH / 10) : -20;
    var wobble = Math.sin(topY * 0.01) * 30 + Math.sin(topY * 0.005) * 20;
    var narrowing = missionType === 'survive' ? Math.sin(stageProgress * 0.01) * 40 : 0;
    bankSegments.unshift({
      y: topY,
      left: bankTargetLeft + wobble + narrowing,
      right: bankTargetRight - wobble - narrowing
    });
  }

  // Stage progress
  if (missionType !== 'boss') {
    stageProgress += currentScroll;
  }
  stageTimer++;

  // Spawn hazards and enemies (not during boss)
  if (missionType !== 'boss') {
    var diff = getDifficultyMult();

    // Rocks
    if (frame % Math.max(20, Math.floor(60 / diff)) === 0) spawnRock();

    // Logs (less frequent)
    if (frame % Math.max(50, Math.floor(120 / diff)) === 0 && Math.random() < 0.6) spawnLog();

    // Whirlpools (survive mission spawns more)
    var whirlChance = missionType === 'survive' ? 80 : 200;
    if (frame % Math.max(40, Math.floor(whirlChance / diff)) === 0 && Math.random() < 0.4) spawnWhirlpool();

    // Mines
    if (frame % Math.max(60, Math.floor(150 / diff)) === 0 && Math.random() < 0.3) spawnMine();

    // Ramps
    if (frame % 200 === 0 && Math.random() < 0.3) spawnRamp();

    // Enemies (more on protect missions)
    var enemyRate = missionType === 'protect' ? 70 : 120;
    if (frame % Math.max(30, Math.floor(enemyRate / diff)) === 0 && enemies.length < 5) spawnEnemy();

    // Helicopters (later stages)
    if (stage >= 5 && frame % Math.floor(300 / diff) === 0 && helicopters.length < 2) spawnHelicopter();

    // Submarines (later stages)
    if (stage >= 3 && frame % Math.floor(250 / diff) === 0 && submarines.length < 2) spawnSubmarine();

    // Power-ups
    if (frame % 180 === 0 && Math.random() < 0.5) spawnPowerup();
  }

  // Water current changes (survive mission has strong currents)
  if (missionType === 'survive') {
    waterCurrentX = Math.sin(frame * 0.02) * 0.5 * diff;
    waterCurrentY = Math.cos(frame * 0.015) * 0.2;
  } else {
    waterCurrentX = Math.sin(frame * 0.005) * 0.1;
    waterCurrentY = 0;
  }

  // Add ambient ripples
  if (frame % 15 === 0) {
    addRipple(TAS.math.randRange(bankLeft, bankRight), TAS.math.randRange(0, GH), TAS.math.randRange(8, 20));
  }

  // === UPDATE OBJECTS ===

  // Rocks
  for (var r = rocks.length - 1; r >= 0; r--) {
    rocks[r].y += currentScroll;
    if (rocks[r].y > GH + 20) { rocks.splice(r, 1); continue; }
    // Collision with boat
    if (invincTimer <= 0 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2, rocks[r].x, rocks[r].y, rocks[r].size)) {
      damagePlayer();
      addSplash(rocks[r].x, rocks[r].y, 8);
      addRipple(rocks[r].x, rocks[r].y, 20);
    }
  }

  // Logs
  for (var l = logs.length - 1; l >= 0; l--) {
    logs[l].y += currentScroll;
    logs[l].angle += logs[l].rotSpeed;
    if (logs[l].y > GH + 40) { logs.splice(l, 1); continue; }
    var lx = logs[l].x, ly = logs[l].y, ll = logs[l].length / 2;
    if (invincTimer <= 0 && TAS.math.dist(boat.x, boat.y, lx, ly) < ll + BOAT_W / 2) {
      damagePlayer();
      addSplash(lx, ly, 6);
    }
  }

  // Whirlpools
  for (var wp = whirlpools.length - 1; wp >= 0; wp--) {
    whirlpools[wp].y += currentScroll * 0.5; // Slower scroll (semi-stationary)
    whirlpools[wp].angle += 0.05;
    if (whirlpools[wp].y > GH + 40) { whirlpools.splice(wp, 1); continue; }
    // Pull boat toward center
    var wdx = whirlpools[wp].x - boat.x;
    var wdy = whirlpools[wp].y - boat.y;
    var wDist = Math.sqrt(wdx * wdx + wdy * wdy);
    if (wDist < whirlpools[wp].radius * 2) {
      var pull = whirlpools[wp].strength * (1 - wDist / (whirlpools[wp].radius * 2)) * 0.08;
      boat.vx += wdx / wDist * pull;
      boat.vy += wdy / wDist * pull;
      // Damage if sucked in
      if (wDist < whirlpools[wp].radius * 0.4 && invincTimer <= 0) {
        damagePlayer();
      }
    }
  }

  // Mines
  for (var mi = mines.length - 1; mi >= 0; mi--) {
    mines[mi].y += currentScroll;
    mines[mi].timer++;
    if (mines[mi].y > GH + 20) { mines.splice(mi, 1); continue; }
    if (invincTimer <= 0 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2, mines[mi].x, mines[mi].y, 8)) {
      TAS.particles.spawn(mines[mi].x, mines[mi].y, '#ff8800', 20, 4, { gravity: 0.1 });
      TAS.fx.shake(8, 0.8);
      TAS.audio.playNoise(0.3, 0.12, 400);
      addSplash(mines[mi].x, mines[mi].y, 15);
      mines.splice(mi, 1);
      damagePlayer();
      continue;
    }
  }

  // Ramps
  for (var rp = ramps.length - 1; rp >= 0; rp--) {
    ramps[rp].y += currentScroll;
    if (ramps[rp].y > GH + 20) { ramps.splice(rp, 1); continue; }
    if (TAS.hit.rectOverlap(boat.x - BOAT_W / 2, boat.y - BOAT_H / 2, BOAT_W, BOAT_H,
        ramps[rp].x - ramps[rp].width / 2, ramps[rp].y - ramps[rp].height / 2, ramps[rp].width, ramps[rp].height)) {
      // Jump! brief invincibility + score
      invincTimer = Math.max(invincTimer, 45);
      boat.vy = -3;
      score += 50;
      TAS.audio.playTone(600, 0.15, 'triangle', 0.08, 900);
      addSplash(boat.x, boat.y + BOAT_H, 10);
      ramps.splice(rp, 1);
      continue;
    }
  }

  // Enemies
  for (var e = enemies.length - 1; e >= 0; e--) {
    var en = enemies[e];
    en.y += currentScroll + en.vy;
    en.x += en.vx;
    if (en.flashTimer > 0) en.flashTimer--;

    // Bounce off banks
    var eSeg = getCurrentBankAt(en.y);
    if (en.x < eSeg.left + 10) en.vx = Math.abs(en.vx);
    if (en.x > eSeg.right - 10) en.vx = -Math.abs(en.vx);

    if (en.y > GH + 30 || en.y < -60) { enemies.splice(e, 1); continue; }

    // Type-specific behavior
    if (en.type === 1) { // Shooter
      en.fireTimer--;
      if (en.fireTimer <= 0) {
        en.fireTimer = TAS.math.randInt(50, 90);
        var ang = TAS.math.angle(en.x, en.y, boat.x, boat.y);
        enemyBullets.push({ x: en.x, y: en.y, vx: Math.cos(ang) * 3, vy: Math.sin(ang) * 3 });
        TAS.audio.playTone(200, 0.05, 'square', 0.03);
      }
    } else if (en.type === 2) { // Rammer - aim at boat
      var rAng = TAS.math.angle(en.x, en.y, boat.x, boat.y);
      en.vx = TAS.math.lerp(en.vx, Math.cos(rAng) * 2, 0.02);
      en.vy = TAS.math.lerp(en.vy, Math.sin(rAng) * 1.5, 0.02);
    }

    // Collision with boat
    if (invincTimer <= 0 && TAS.hit.rectOverlap(boat.x - BOAT_W / 2, boat.y - BOAT_H / 2, BOAT_W, BOAT_H,
        en.x - 10, en.y - 10, 20, 20)) {
      damagePlayer();
      en.hp--;
      if (en.hp <= 0) {
        TAS.particles.spawn(en.x, en.y, '#ff6600', 10, 3);
        addSplash(en.x, en.y, 8);
        score += 100;
        enemies.splice(e, 1);
      }
    }

    // Protect mission: enemies chase baselings
    if (missionType === 'protect' && en.type === 0) {
      var nearestBaseling = null;
      var nearDist = 9999;
      for (var nb = 0; nb < baselings.length; nb++) {
        if (!baselings[nb].alive) continue;
        var nd = TAS.math.dist(en.x, en.y, baselings[nb].x, baselings[nb].y);
        if (nd < nearDist) { nearDist = nd; nearestBaseling = baselings[nb]; }
      }
      if (nearestBaseling && nearDist < 100) {
        var ba = TAS.math.angle(en.x, en.y, nearestBaseling.x, nearestBaseling.y);
        en.vx = TAS.math.lerp(en.vx, Math.cos(ba) * 1.5, 0.03);
        en.vy = TAS.math.lerp(en.vy, Math.sin(ba) * 1.5, 0.03);
        // Kidnap baseling
        if (nearDist < 12) {
          nearestBaseling.alive = false;
          baselingLostCount++;
          TAS.audio.playTone(200, 0.2, 'sawtooth', 0.08, 80);
          addSplash(nearestBaseling.x, nearestBaseling.y, 6);
        }
      }
    }
  }

  // Helicopters
  for (var hh = helicopters.length - 1; hh >= 0; hh--) {
    var heli = helicopters[hh];
    heli.x += heli.vx;
    heli.y += heli.vy;
    if (heli.flashTimer > 0) heli.flashTimer--;
    if (heli.x < 30 || heli.x > GW - 30) heli.vx *= -1;
    if (heli.y > GH + 40) { helicopters.splice(hh, 1); continue; }
    heli.bombTimer--;
    if (heli.bombTimer <= 0) {
      heli.bombTimer = TAS.math.randInt(80, 140);
      helicopterBombs.push({ x: heli.x, y: heli.y, vy: 2, shadow: 0 });
      TAS.audio.playTone(300, 0.1, 'triangle', 0.04);
    }
  }

  // Helicopter bombs
  for (var hb = helicopterBombs.length - 1; hb >= 0; hb--) {
    helicopterBombs[hb].y += helicopterBombs[hb].vy;
    helicopterBombs[hb].vy += 0.05;
    helicopterBombs[hb].shadow += 0.5;
    if (helicopterBombs[hb].y > GH + 20) { helicopterBombs.splice(hb, 1); continue; }
    if (invincTimer <= 0 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2,
        helicopterBombs[hb].x, helicopterBombs[hb].y, 10)) {
      TAS.particles.spawn(helicopterBombs[hb].x, helicopterBombs[hb].y, '#ff4400', 15, 4);
      TAS.audio.playNoise(0.2, 0.1, 500);
      addSplash(helicopterBombs[hb].x, helicopterBombs[hb].y, 12);
      helicopterBombs.splice(hb, 1);
      damagePlayer();
      continue;
    }
  }

  // Submarines
  for (var su = submarines.length - 1; su >= 0; su--) {
    var sub = submarines[su];
    sub.y += currentScroll * 0.7;
    if (sub.flashTimer > 0) sub.flashTimer--;
    if (sub.y > GH + 30) { submarines.splice(su, 1); continue; }
    if (!sub.surfaced) {
      sub.surfaceTimer--;
      if (sub.surfaceTimer <= 0) {
        sub.surfaced = true;
        sub.surfaceDuration = 80;
        addRipple(sub.x, sub.y, 25);
        addSplash(sub.x, sub.y, 8);
        TAS.audio.playTone(100, 0.2, 'sine', 0.05, 200);
      }
    } else {
      sub.surfaceDuration--;
      sub.fireTimer--;
      if (sub.fireTimer <= 0) {
        sub.fireTimer = 40;
        var sa = TAS.math.angle(sub.x, sub.y, boat.x, boat.y);
        enemyBullets.push({ x: sub.x, y: sub.y, vx: Math.cos(sa) * 2.5, vy: Math.sin(sa) * 2.5 });
      }
      if (sub.surfaceDuration <= 0) {
        sub.surfaced = false;
        sub.surfaceTimer = TAS.math.randInt(90, 150);
        addRipple(sub.x, sub.y, 20);
      }
    }
  }

  // Enemy bullets
  for (var eb = enemyBullets.length - 1; eb >= 0; eb--) {
    enemyBullets[eb].x += enemyBullets[eb].vx;
    enemyBullets[eb].y += enemyBullets[eb].vy;
    if (enemyBullets[eb].x < 0 || enemyBullets[eb].x > GW ||
        enemyBullets[eb].y < 0 || enemyBullets[eb].y > GH) {
      enemyBullets.splice(eb, 1); continue;
    }
    if (invincTimer <= 0 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2 + 2,
        enemyBullets[eb].x, enemyBullets[eb].y, 4)) {
      enemyBullets.splice(eb, 1);
      damagePlayer();
      continue;
    }
  }

  // Player bullets
  for (var pb = bullets.length - 1; pb >= 0; pb--) {
    var bul = bullets[pb];
    // Homing logic
    if (bul.homing) {
      bul.life--;
      if (bul.life <= 0) { bullets.splice(pb, 1); continue; }
      var target = findNearestEnemy(bul.x, bul.y);
      if (target) {
        var ha = TAS.math.angle(bul.x, bul.y, target.x, target.y);
        bul.vx = TAS.math.lerp(bul.vx, Math.cos(ha) * 4, 0.06);
        bul.vy = TAS.math.lerp(bul.vy, Math.sin(ha) * 4, 0.06);
      }
    }
    bul.x += bul.vx;
    bul.y += bul.vy;
    if (bul.x < 0 || bul.x > GW || bul.y < -20 || bul.y > GH + 20) {
      bullets.splice(pb, 1); continue;
    }

    var hitSomething = false;
    // Hit enemies
    for (var he = enemies.length - 1; he >= 0; he--) {
      if (TAS.hit.circleOverlap(bul.x, bul.y, 4, enemies[he].x, enemies[he].y, 10)) {
        enemies[he].hp--;
        enemies[he].flashTimer = 6;
        if (enemies[he].hp <= 0) {
          TAS.particles.spawn(enemies[he].x, enemies[he].y, '#ff8800', 12, 3);
          addSplash(enemies[he].x, enemies[he].y, 8);
          addRipple(enemies[he].x, enemies[he].y, 18);
          TAS.audio.playNoise(0.15, 0.08, 600);
          score += 100;
          enemies.splice(he, 1);
        }
        hitSomething = true; break;
      }
    }
    if (hitSomething) { bullets.splice(pb, 1); continue; }

    // Hit helicopters
    for (var hhe = helicopters.length - 1; hhe >= 0; hhe--) {
      if (TAS.hit.circleOverlap(bul.x, bul.y, 4, helicopters[hhe].x, helicopters[hhe].y, 14)) {
        helicopters[hhe].hp--;
        helicopters[hhe].flashTimer = 6;
        if (helicopters[hhe].hp <= 0) {
          TAS.particles.spawn(helicopters[hhe].x, helicopters[hhe].y, '#ffaa00', 15, 4);
          TAS.audio.playNoise(0.2, 0.1, 500);
          score += 200;
          helicopters.splice(hhe, 1);
        }
        hitSomething = true; break;
      }
    }
    if (hitSomething) { bullets.splice(pb, 1); continue; }

    // Hit submarines (only if surfaced)
    for (var hsu = submarines.length - 1; hsu >= 0; hsu--) {
      if (submarines[hsu].surfaced && TAS.hit.circleOverlap(bul.x, bul.y, 4, submarines[hsu].x, submarines[hsu].y, 12)) {
        submarines[hsu].hp--;
        submarines[hsu].flashTimer = 6;
        if (submarines[hsu].hp <= 0) {
          TAS.particles.spawn(submarines[hsu].x, submarines[hsu].y, '#4488ff', 12, 3);
          addSplash(submarines[hsu].x, submarines[hsu].y, 10);
          TAS.audio.playNoise(0.15, 0.08, 300);
          score += 150;
          submarines.splice(hsu, 1);
        }
        hitSomething = true; break;
      }
    }
    if (hitSomething) { bullets.splice(pb, 1); continue; }

    // Hit rocks (destroy small ones)
    for (var hr = rocks.length - 1; hr >= 0; hr--) {
      if (rocks[hr].size < 12 && TAS.hit.circleOverlap(bul.x, bul.y, 4, rocks[hr].x, rocks[hr].y, rocks[hr].size)) {
        TAS.particles.spawn(rocks[hr].x, rocks[hr].y, '#888', 6, 2, { shape: 'rect' });
        addSplash(rocks[hr].x, rocks[hr].y, 4);
        rocks.splice(hr, 1);
        score += 10;
        hitSomething = true; break;
      }
    }
    if (hitSomething) { bullets.splice(pb, 1); continue; }

    // Hit boss
    if (boss && boss.hp > 0 && TAS.hit.circleOverlap(bul.x, bul.y, 4, boss.x, boss.y, boss.width / 2)) {
      boss.hp--;
      boss.flashTimer = 8;
      TAS.audio.playTone(300, 0.08, 'square', 0.06);
      TAS.particles.spawn(bul.x, bul.y, '#ffff44', 5, 2);
      if (boss.hp <= 0) {
        // Boss defeated
        TAS.particles.spawn(boss.x, boss.y, '#ff6600', 30, 5, { gravity: 0.05 });
        TAS.particles.spawn(boss.x, boss.y, '#ffdd00', 20, 4);
        TAS.fx.shake(12, 0.8);
        TAS.fx.flash('#ffffff', 0.5);
        TAS.audio.playNoise(0.4, 0.15, 200);
        addSplash(boss.x, boss.y, 20);
        score += 1000 * (boss.type + 1);
        stageClear();
      }
      bullets.splice(pb, 1); continue;
    }
  }

  // Boss bullets
  for (var bb = bossBullets.length - 1; bb >= 0; bb--) {
    bossBullets[bb].x += bossBullets[bb].vx;
    bossBullets[bb].y += bossBullets[bb].vy;
    if (bossBullets[bb].x < 0 || bossBullets[bb].x > GW ||
        bossBullets[bb].y < 0 || bossBullets[bb].y > GH) {
      bossBullets.splice(bb, 1); continue;
    }
    if (invincTimer <= 0 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2 + 2,
        bossBullets[bb].x, bossBullets[bb].y, bossBullets[bb].size || 4)) {
      bossBullets.splice(bb, 1);
      damagePlayer();
      continue;
    }
  }

  // Power-ups
  for (var pu = powerups.length - 1; pu >= 0; pu--) {
    powerups[pu].y += currentScroll;
    powerups[pu].bobTimer += 0.08;
    if (powerups[pu].y > GH + 20) { powerups.splice(pu, 1); continue; }
    if (TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2 + 4,
        powerups[pu].x, powerups[pu].y + Math.sin(powerups[pu].bobTimer) * 3, 10)) {
      var pType = powerups[pu].type;
      if (pType === 'speed') { turboFuel = 100; TAS.audio.playTone(600, 0.1, 'triangle', 0.06, 800); }
      else if (pType === 'weapon') { weaponLevel = Math.min(3, weaponLevel + 1); TAS.audio.playMelody([[440, 0.08], [660, 0.08], [880, 0.1]], 80); }
      else if (pType === 'shield') { shieldActive = true; shieldTimer = 300; TAS.audio.playTone(500, 0.15, 'sine', 0.06, 700); }
      else if (pType === 'life') { lives = Math.min(5, lives + 1); TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 100); }
      else if (pType === 'score') { score += 200; TAS.audio.playTone(800, 0.1, 'square', 0.05); }
      TAS.particles.spawn(powerups[pu].x, powerups[pu].y, '#ffff44', 8, 2);
      powerups.splice(pu, 1);
    }
  }

  // Baselings (protect mission)
  for (var bl = 0; bl < baselings.length; bl++) {
    var bas = baselings[bl];
    if (!bas.alive) continue;
    bas.bobTimer += 0.06;
    bas.x += bas.vx + Math.sin(bas.bobTimer) * 0.2;
    bas.y += bas.vy + currentScroll * 0.3;
    // Keep in bounds
    var bSeg = getCurrentBankAt(bas.y);
    bas.x = TAS.math.clamp(bas.x, bSeg.left + 15, bSeg.right - 15);
    bas.y = TAS.math.clamp(bas.y, 40, GH - 40);
    // Random direction changes
    if (Math.random() < 0.01) { bas.vx = (Math.random() - 0.5) * 0.6; bas.vy = (Math.random() - 0.5) * 0.4; }
  }

  // Tokens (collect mission)
  for (var tk = tokens.length - 1; tk >= 0; tk--) {
    var tok = tokens[tk];
    if (tok.collected) continue;
    tok.y += currentScroll;
    tok.bobTimer += 0.07;
    tok.sinkTimer--;
    if (tok.sinkTimer <= 0) { tok.collected = true; continue; } // Sank
    if (tok.y > GH + 20) continue;
    if (tok.y > -10 && TAS.hit.circleOverlap(boat.x, boat.y, BOAT_W / 2 + 6, tok.x, tok.y, 8)) {
      tok.collected = true;
      tokensCollected++;
      score += 50;
      TAS.audio.playTone(700 + tokensCollected * 30, 0.1, 'sine', 0.06);
      TAS.particles.spawn(tok.x, tok.y, '#ffdd44', 6, 2);
    }
  }

  // Boss update
  if (boss && boss.hp > 0) {
    boss.timer++;
    boss.x += boss.vx;
    if (boss.x < bankLeft + boss.width / 2 + 20) boss.vx = Math.abs(boss.vx);
    if (boss.x > bankRight - boss.width / 2 - 20) boss.vx = -Math.abs(boss.vx);
    if (boss.flashTimer > 0) boss.flashTimer--;

    // Boss attacks based on type
    var bossType = boss.type;
    if (bossType === 0) { // Giant Squid - tentacle sweep + ink bullets
      if (boss.timer % 60 === 0) {
        for (var tl = 0; tl < 3; tl++) {
          var ta = -Math.PI / 2 + (tl - 1) * 0.4;
          bossBullets.push({ x: boss.x, y: boss.y + boss.height / 2, vx: Math.cos(ta) * 2, vy: Math.sin(ta) * 2 + 1, size: 5 });
        }
        TAS.audio.playTone(150, 0.1, 'sawtooth', 0.05);
      }
    } else if (bossType === 1) { // Sea Dragon - fire streams
      if (boss.timer % 40 === 0) {
        var fa = TAS.math.angle(boss.x, boss.y, boat.x, boat.y);
        for (var fi = 0; fi < 5; fi++) {
          var spread = (fi - 2) * 0.15;
          bossBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(fa + spread) * 3, vy: Math.sin(fa + spread) * 3, size: 4 });
        }
        TAS.audio.playTone(200, 0.15, 'sawtooth', 0.06, 100);
      }
      boss.vy = Math.sin(boss.timer * 0.03) * 0.8;
      boss.y += boss.vy;
      boss.y = TAS.math.clamp(boss.y, 40, GH / 2 - 20);
    } else if (bossType === 2) { // Mech Shark - charges + torpedoes
      if (boss.timer % 100 < 30) {
        // Charging phase
        var ca = TAS.math.angle(boss.x, boss.y, boat.x, boat.y);
        boss.x += Math.cos(ca) * 3;
        boss.y += Math.sin(ca) * 3;
        boss.y = TAS.math.clamp(boss.y, 30, GH - 60);
      } else {
        boss.y = TAS.math.lerp(boss.y, 70, 0.02);
      }
      if (boss.timer % 50 === 0) {
        bossBullets.push({ x: boss.x - 15, y: boss.y + boss.height / 2, vx: 0, vy: 3, size: 6 });
        bossBullets.push({ x: boss.x + 15, y: boss.y + boss.height / 2, vx: 0, vy: 3, size: 6 });
        TAS.audio.playTone(120, 0.12, 'square', 0.05);
      }
    } else if (bossType === 3) { // Storm Whale - wave attacks + minion spawns
      boss.y = 50 + Math.sin(boss.timer * 0.02) * 20;
      if (boss.timer % 80 === 0) {
        // Wave of bullets
        for (var wv = 0; wv < 8; wv++) {
          var wa = (wv / 8) * Math.PI + Math.PI / 2;
          bossBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(wa) * 2, vy: Math.sin(wa) * 2, size: 5 });
        }
        TAS.audio.playNoise(0.2, 0.08, 300);
      }
      if (boss.timer % 120 === 0 && enemies.length < 3) {
        spawnEnemy();
      }
    } else if (bossType === 4) { // Kraken - all attacks combined
      boss.y = 50 + Math.sin(boss.timer * 0.015) * 25;
      boss.vx = Math.sin(boss.timer * 0.02) * 2;
      if (boss.timer % 30 === 0) {
        var ka = TAS.math.angle(boss.x, boss.y, boat.x, boat.y);
        bossBullets.push({ x: boss.x, y: boss.y + 20, vx: Math.cos(ka) * 3.5, vy: Math.sin(ka) * 3.5, size: 6 });
      }
      if (boss.timer % 60 === 0) {
        for (var kr = 0; kr < 6; kr++) {
          var kra = (kr / 6) * Math.PI * 2;
          bossBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(kra) * 2, vy: Math.sin(kra) * 2, size: 4 });
        }
        TAS.audio.playTone(100, 0.2, 'sawtooth', 0.07, 50);
      }
      if (boss.timer % 150 === 0 && enemies.length < 4) {
        spawnEnemy();
        spawnEnemy();
      }
    }
  }

  // === CHECK MISSION COMPLETION ===
  if (missionType === 'race' && stageProgress >= stageGoal) {
    stageClear();
  } else if (missionType === 'survive' && stageProgress >= stageGoal) {
    stageClear();
  } else if (missionType === 'protect') {
    var aliveCount = baselings.filter(function(b) { return b.alive; }).length;
    if (aliveCount === 0 && stageTimer > 60) {
      if (baselingSafeCount >= Math.ceil(stageGoal * 0.5)) {
        stageClear();
      } else {
        gameOver();
      }
    }
    // All enemies cleared and baselings survived long enough
    if (stageTimer > 600 && aliveCount > 0) {
      baselingSafeCount = aliveCount;
      score += aliveCount * 100;
      stageClear();
    }
  } else if (missionType === 'collect') {
    if (tokensCollected >= tokensNeeded) {
      stageClear();
    }
    // Check if impossible (all sank)
    var remaining = tokens.filter(function(t) { return !t.collected; }).length;
    var canStillWin = tokensCollected + remaining >= tokensNeeded;
    if (!canStillWin && tokensCollected < tokensNeeded) {
      damagePlayer();
      damagePlayer();
      damagePlayer(); // Fail = death
    }
  }
  // Boss mission completes when boss HP = 0 (handled in bullet collision)
}

// === GET BANK AT Y ===
function getCurrentBankAt(y) {
  for (var i = 0; i < bankSegments.length - 1; i++) {
    if (bankSegments[i].y <= y && bankSegments[i + 1].y > y) {
      var t = (y - bankSegments[i].y) / (bankSegments[i + 1].y - bankSegments[i].y);
      return {
        left: TAS.math.lerp(bankSegments[i].left, bankSegments[i + 1].left, t),
        right: TAS.math.lerp(bankSegments[i].right, bankSegments[i + 1].right, t)
      };
    }
  }
  return { left: bankLeft, right: bankRight };
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'gameOver') {
    drawWater();
    TAS.ui.drawGameOver(score, highScore, GW, GH, { frame: frame, extra: 'Stage: ' + stage });
    return;
  }

  // === GAME RENDERING ===
  ctx.save();
  TAS.fx.applyShake();

  drawWater();
  drawBanks();
  drawRipples();
  drawWake();

  // Draw objects from back to front
  drawWhirlpools();
  drawRocks();
  drawLogs();
  drawMines();
  drawRamps();
  drawTokens();
  drawBaselings();
  drawPowerups();
  drawEnemies();
  drawSubmarines();
  drawBullets();
  drawEnemyBullets();
  drawBossBullets();
  drawBoss();
  drawHelicopters();
  drawHelicopterBombs();
  drawBoat();
  drawSplashes();

  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();
  TAS.input.drawTouchControls(GW, GH);

  // Mission flash
  if (missionFlashTimer > 0) {
    drawMissionBanner();
  }

  // Stage clear
  if (stageClearTimer > 0) {
    drawStageClear();
  }
}

// === DRAW WATER ===
function drawWater() {
  // Base water color with subtle gradient
  var grad = ctx.createLinearGradient(0, 0, 0, GH);
  grad.addColorStop(0, '#1a3a5c');
  grad.addColorStop(0.5, '#1e4470');
  grad.addColorStop(1, '#163050');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GW, GH);

  // Animated water ripple pattern
  ctx.globalAlpha = 0.15;
  for (var wy = 0; wy < GH; wy += 8) {
    var waveX = Math.sin((wy + waterOffset * 3) * 0.03) * 3;
    ctx.fillStyle = '#4488bb';
    ctx.fillRect(0, wy, GW, 2);
    // Lighter streaks
    if (wy % 24 === 0) {
      ctx.fillStyle = '#6699cc';
      var streakX = Math.sin((wy + waterOffset * 2) * 0.05) * 20 + GW / 2;
      ctx.fillRect(streakX - 30, wy, 60, 1);
    }
  }

  // Foam/bubble highlights
  ctx.globalAlpha = 0.08;
  for (var fx = 0; fx < GW; fx += 40) {
    for (var fy = 0; fy < GH; fy += 40) {
      var bobX = Math.sin((fx + fy + waterOffset) * 0.05) * 5;
      var bobY = Math.cos((fx - fy + waterOffset * 1.5) * 0.04) * 3;
      ctx.fillStyle = '#88ccee';
      ctx.beginPath();
      ctx.arc(fx + bobX + 20, fy + bobY + 20, 2 + Math.sin((fx + waterOffset) * 0.1) * 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// === DRAW BANKS ===
function drawBanks() {
  // Left bank
  ctx.fillStyle = '#2d5a27';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (var i = 0; i < bankSegments.length; i++) {
    ctx.lineTo(bankSegments[i].left, bankSegments[i].y);
  }
  ctx.lineTo(0, GH);
  ctx.closePath();
  ctx.fill();

  // Left bank edge (dirt/sand)
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (var i2 = 0; i2 < bankSegments.length; i2++) {
    if (i2 === 0) ctx.moveTo(bankSegments[i2].left, bankSegments[i2].y);
    else ctx.lineTo(bankSegments[i2].left, bankSegments[i2].y);
  }
  ctx.stroke();

  // Right bank
  ctx.fillStyle = '#2d5a27';
  ctx.beginPath();
  ctx.moveTo(GW, 0);
  for (var j = 0; j < bankSegments.length; j++) {
    ctx.lineTo(bankSegments[j].right, bankSegments[j].y);
  }
  ctx.lineTo(GW, GH);
  ctx.closePath();
  ctx.fill();

  // Right bank edge
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (var j2 = 0; j2 < bankSegments.length; j2++) {
    if (j2 === 0) ctx.moveTo(bankSegments[j2].right, bankSegments[j2].y);
    else ctx.lineTo(bankSegments[j2].right, bankSegments[j2].y);
  }
  ctx.stroke();

  // Bank vegetation dots
  ctx.fillStyle = '#1a4a1a';
  for (var v = 0; v < bankSegments.length; v += 2) {
    var seg = bankSegments[v];
    // Left side trees
    for (var lv = 0; lv < 3; lv++) {
      var tx = seg.left - 10 - lv * 12;
      var ty = seg.y + lv * 5;
      ctx.beginPath();
      ctx.arc(tx, ty, 5 + lv * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Right side trees
    for (var rv = 0; rv < 3; rv++) {
      var trx = seg.right + 10 + rv * 12;
      var try2 = seg.y + rv * 5;
      ctx.beginPath();
      ctx.arc(trx, try2, 5 + rv * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === DRAW RIPPLES ===
function drawRipples() {
  for (var i = 0; i < ripples.length; i++) {
    var rip = ripples[i];
    ctx.globalAlpha = rip.alpha;
    ctx.strokeStyle = '#88ccff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// === DRAW WAKE ===
function drawWake() {
  for (var i = 0; i < wakeTrail.length; i++) {
    var wk = wakeTrail[i];
    ctx.globalAlpha = wk.life * 0.4;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(wk.x - wk.spread, wk.y);
    ctx.lineTo(wk.x - wk.spread - 3, wk.y + 4);
    ctx.moveTo(wk.x + wk.spread, wk.y);
    ctx.lineTo(wk.x + wk.spread + 3, wk.y + 4);
    ctx.stroke();
    // Foam dots
    if (wk.spread > 2) {
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(wk.x - wk.spread, wk.y, 1, 0, Math.PI * 2);
      ctx.arc(wk.x + wk.spread, wk.y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// === DRAW SPLASHES ===
function drawSplashes() {
  for (var i = 0; i < splashes.length; i++) {
    var sp = splashes[i];
    ctx.globalAlpha = sp.life;
    ctx.fillStyle = '#cceeFF';
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// === DRAW BOAT ===
function drawBoat() {
  // Invincibility blink
  if (invincTimer > 0 && frame % 6 < 3) return;

  ctx.save();
  ctx.translate(boat.x, boat.y);
  ctx.rotate(boat.angle);

  // Hull
  ctx.fillStyle = '#dd3333';
  ctx.beginPath();
  ctx.moveTo(0, -BOAT_H / 2); // Bow
  ctx.lineTo(-BOAT_W / 2, BOAT_H / 3);
  ctx.lineTo(-BOAT_W / 3, BOAT_H / 2);
  ctx.lineTo(BOAT_W / 3, BOAT_H / 2);
  ctx.lineTo(BOAT_W / 2, BOAT_H / 3);
  ctx.closePath();
  ctx.fill();

  // Deck
  ctx.fillStyle = '#aa2222';
  ctx.fillRect(-BOAT_W / 3, -BOAT_H / 4, BOAT_W * 2 / 3, BOAT_H / 2);

  // Reactor core glow
  var glowPulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.fillStyle = turboActive ? '#ffff44' : '#44ffaa';
  ctx.globalAlpha = glowPulse;
  ctx.beginPath();
  ctx.arc(0, 2, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Cannon
  ctx.fillStyle = '#666';
  ctx.fillRect(-2, -BOAT_H / 2 - 4, 4, 8);

  // Weapon indicator
  if (weaponLevel > 0) {
    ctx.fillStyle = weaponLevel === 1 ? '#44aaff' : weaponLevel === 2 ? '#ff8844' : '#ff44ff';
    ctx.beginPath();
    ctx.arc(0, -BOAT_H / 2 - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Shield effect
  if (shieldActive) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1) * 0.1;
    ctx.strokeStyle = '#44ffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(boat.x, boat.y, BOAT_W + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// === DRAW ROCKS ===
function drawRocks() {
  for (var i = 0; i < rocks.length; i++) {
    var rk = rocks[i];
    ctx.fillStyle = rk.type === 0 ? '#555' : rk.type === 1 ? '#666' : '#777';
    ctx.beginPath();
    ctx.arc(rk.x, rk.y, rk.size, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(rk.x - rk.size * 0.2, rk.y - rk.size * 0.2, rk.size * 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Water ring around rock
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#88bbdd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(rk.x, rk.y, rk.size + 3 + Math.sin(frame * 0.05 + i) * 2, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// === DRAW LOGS ===
function drawLogs() {
  for (var i = 0; i < logs.length; i++) {
    var lg = logs[i];
    ctx.save();
    ctx.translate(lg.x, lg.y);
    ctx.rotate(lg.angle);
    ctx.fillStyle = '#6b4226';
    ctx.fillRect(-lg.length / 2, -3, lg.length, 6);
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(-lg.length / 2, -2, lg.length, 2);
    ctx.restore();
  }
}

// === DRAW WHIRLPOOLS ===
function drawWhirlpools() {
  for (var i = 0; i < whirlpools.length; i++) {
    var wp = whirlpools[i];
    ctx.save();
    ctx.translate(wp.x, wp.y);
    // Concentric spinning rings
    for (var ring = 0; ring < 4; ring++) {
      var r = wp.radius * (ring + 1) / 4;
      ctx.globalAlpha = 0.3 - ring * 0.05;
      ctx.strokeStyle = ring < 2 ? '#112244' : '#224466';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, r, wp.angle + ring * 0.5, wp.angle + ring * 0.5 + Math.PI * 1.5);
      ctx.stroke();
    }
    // Dark center
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#0a1520';
    ctx.beginPath();
    ctx.arc(0, 0, wp.radius * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// === DRAW MINES ===
function drawMines() {
  for (var i = 0; i < mines.length; i++) {
    var mn = mines[i];
    // Bobbing
    var bob = Math.sin(mn.timer * 0.05) * 2;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(mn.x, mn.y + bob, 7, 0, Math.PI * 2);
    ctx.fill();
    // Spikes
    ctx.fillStyle = '#555';
    for (var sp = 0; sp < 4; sp++) {
      var sa = sp * Math.PI / 2;
      ctx.beginPath();
      ctx.arc(mn.x + Math.cos(sa) * 8, mn.y + bob + Math.sin(sa) * 8, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Blinking light
    if (mn.timer % 30 < 15) {
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.arc(mn.x, mn.y + bob - 3, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// === DRAW RAMPS ===
function drawRamps() {
  for (var i = 0; i < ramps.length; i++) {
    var rp = ramps[i];
    ctx.fillStyle = '#887744';
    ctx.fillRect(rp.x - rp.width / 2, rp.y - rp.height / 2, rp.width, rp.height);
    // Stripes
    ctx.fillStyle = '#aaaa44';
    ctx.fillRect(rp.x - rp.width / 2 + 3, rp.y - rp.height / 2 + 2, rp.width - 6, 3);
    ctx.fillRect(rp.x - rp.width / 2 + 3, rp.y + rp.height / 2 - 5, rp.width - 6, 3);
    // Arrow
    ctx.fillStyle = '#ffff88';
    ctx.beginPath();
    ctx.moveTo(rp.x, rp.y - rp.height / 2 - 3);
    ctx.lineTo(rp.x - 5, rp.y + 2);
    ctx.lineTo(rp.x + 5, rp.y + 2);
    ctx.closePath();
    ctx.fill();
  }
}

// === DRAW ENEMIES ===
function drawEnemies() {
  for (var i = 0; i < enemies.length; i++) {
    var en = enemies[i];
    var flash = en.flashTimer > 0;
    ctx.save();
    ctx.translate(en.x, en.y);

    if (en.type === 0) { // Basic (chaser in protect, generic otherwise)
      ctx.fillStyle = flash ? '#fff' : '#44aa44';
      ctx.beginPath();
      ctx.moveTo(0, 10);
      ctx.lineTo(-8, -5);
      ctx.lineTo(-6, -10);
      ctx.lineTo(6, -10);
      ctx.lineTo(8, -5);
      ctx.closePath();
      ctx.fill();
    } else if (en.type === 1) { // Shooter
      ctx.fillStyle = flash ? '#fff' : '#aa44aa';
      ctx.beginPath();
      ctx.moveTo(0, 10);
      ctx.lineTo(-10, -3);
      ctx.lineTo(-8, -10);
      ctx.lineTo(8, -10);
      ctx.lineTo(10, -3);
      ctx.closePath();
      ctx.fill();
      // Gun turret
      ctx.fillStyle = '#666';
      ctx.fillRect(-2, -12, 4, 6);
    } else { // Rammer
      ctx.fillStyle = flash ? '#fff' : '#dd6600';
      ctx.beginPath();
      ctx.moveTo(0, 12);
      ctx.lineTo(-12, -2);
      ctx.lineTo(-8, -12);
      ctx.lineTo(8, -12);
      ctx.lineTo(12, -2);
      ctx.closePath();
      ctx.fill();
      // Ram
      ctx.fillStyle = '#aa4400';
      ctx.fillRect(-4, 10, 8, 5);
    }
    ctx.restore();
  }
}

// === DRAW SUBMARINES ===
function drawSubmarines() {
  for (var i = 0; i < submarines.length; i++) {
    var sub = submarines[i];
    if (!sub.surfaced) {
      // Periscope bubble trail
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.arc(sub.x, sub.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(sub.x + 3, sub.y - 4, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      var flash = sub.flashTimer > 0;
      ctx.fillStyle = flash ? '#fff' : '#445566';
      // Sub body
      ctx.beginPath();
      ctx.ellipse(sub.x, sub.y, 14, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Conning tower
      ctx.fillStyle = flash ? '#fff' : '#556677';
      ctx.fillRect(sub.x - 4, sub.y - 12, 8, 8);
      // Periscope
      ctx.fillStyle = '#777';
      ctx.fillRect(sub.x - 1, sub.y - 16, 2, 6);
    }
  }
}

// === DRAW HELICOPTERS ===
function drawHelicopters() {
  for (var i = 0; i < helicopters.length; i++) {
    var heli = helicopters[i];
    var flash = heli.flashTimer > 0;
    // Shadow on water
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(heli.x + 5, heli.y + 20, 12, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Body
    ctx.fillStyle = flash ? '#fff' : '#556655';
    ctx.beginPath();
    ctx.ellipse(heli.x, heli.y, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.fillRect(heli.x + 8, heli.y - 2, 10, 3);
    // Rotor (spinning)
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 2;
    var rotAngle = frame * 0.3;
    ctx.beginPath();
    ctx.moveTo(heli.x + Math.cos(rotAngle) * 14, heli.y + Math.sin(rotAngle) * 3);
    ctx.lineTo(heli.x - Math.cos(rotAngle) * 14, heli.y - Math.sin(rotAngle) * 3);
    ctx.stroke();
  }
}

// === DRAW HELICOPTER BOMBS ===
function drawHelicopterBombs() {
  for (var i = 0; i < helicopterBombs.length; i++) {
    var b = helicopterBombs[i];
    // Shadow grows as bomb falls
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(b.x, b.y + b.shadow, 4 + b.shadow * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Bomb
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#aa0000';
    ctx.beginPath();
    ctx.arc(b.x, b.y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW BULLETS ===
function drawBullets() {
  for (var i = 0; i < bullets.length; i++) {
    var bul = bullets[i];
    if (bul.type === 'missile') {
      ctx.fillStyle = '#ff8844';
      ctx.save();
      ctx.translate(bul.x, bul.y);
      var mAng = Math.atan2(bul.vy, bul.vx);
      ctx.rotate(mAng + Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, -5);
      ctx.lineTo(-3, 3);
      ctx.lineTo(3, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      // Trail
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#ffaa44';
      ctx.beginPath();
      ctx.arc(bul.x - bul.vx * 0.5, bul.y - bul.vy * 0.5, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#ffff44';
      ctx.fillRect(bul.x - 2, bul.y - 3, 4, 6);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bul.x - 1, bul.y - 2, 2, 4);
    }
  }
}

// === DRAW ENEMY BULLETS ===
function drawEnemyBullets() {
  for (var i = 0; i < enemyBullets.length; i++) {
    var eb = enemyBullets[i];
    ctx.fillStyle = '#ff4488';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff88aa';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW BOSS BULLETS ===
function drawBossBullets() {
  for (var i = 0; i < bossBullets.length; i++) {
    var bb = bossBullets[i];
    var sz = bb.size || 4;
    ctx.fillStyle = '#cc22ff';
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, sz, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ee88ff';
    ctx.beginPath();
    ctx.arc(bb.x, bb.y, sz * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW BOSS ===
function drawBoss() {
  if (!boss || boss.hp <= 0) return;
  var flash = boss.flashTimer > 0;

  ctx.save();
  ctx.translate(boss.x, boss.y);

  if (boss.type === 0) { // Giant Squid
    // Tentacles
    ctx.strokeStyle = flash ? '#fff' : '#884488';
    ctx.lineWidth = 3;
    for (var t = 0; t < 6; t++) {
      var ta = (t / 6) * Math.PI + Math.PI * 0.25;
      var tLen = boss.width * 0.6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ta) * 10, boss.height / 2);
      var cx1 = Math.cos(ta) * tLen * 0.5 + Math.sin(boss.timer * 0.05 + t) * 8;
      var cy1 = boss.height / 2 + tLen * 0.5;
      var ex = Math.cos(ta) * tLen + Math.sin(boss.timer * 0.03 + t) * 12;
      var ey = boss.height / 2 + tLen;
      ctx.bezierCurveTo(cx1, cy1, ex - 5, ey - 10, ex, ey);
      ctx.stroke();
    }
    // Body
    ctx.fillStyle = flash ? '#fff' : '#995599';
    ctx.beginPath();
    ctx.ellipse(0, 0, boss.width / 2, boss.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(-12, -5, 5, 0, Math.PI * 2);
    ctx.arc(12, -5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-12, -5, 2, 0, Math.PI * 2);
    ctx.arc(12, -5, 2, 0, Math.PI * 2);
    ctx.fill();
  } else if (boss.type === 1) { // Sea Dragon
    // Body segments
    for (var seg = 4; seg >= 0; seg--) {
      var sx = Math.sin(boss.timer * 0.04 + seg * 0.8) * 10;
      var sy = seg * 12;
      ctx.fillStyle = flash ? '#fff' : (seg % 2 === 0 ? '#22aa44' : '#119933');
      ctx.beginPath();
      ctx.arc(sx, sy, 12 - seg, 0, Math.PI * 2);
      ctx.fill();
    }
    // Head
    ctx.fillStyle = flash ? '#fff' : '#33cc55';
    ctx.beginPath();
    ctx.arc(0, -5, 16, 0, Math.PI * 2);
    ctx.fill();
    // Horns
    ctx.fillStyle = '#886600';
    ctx.beginPath();
    ctx.moveTo(-10, -15); ctx.lineTo(-8, -25); ctx.lineTo(-5, -15);
    ctx.moveTo(10, -15); ctx.lineTo(8, -25); ctx.lineTo(5, -15);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.arc(-6, -8, 3, 0, Math.PI * 2);
    ctx.arc(6, -8, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (boss.type === 2) { // Mech Shark
    // Fin
    ctx.fillStyle = flash ? '#fff' : '#667788';
    ctx.beginPath();
    ctx.moveTo(0, -boss.height / 2 - 10);
    ctx.lineTo(-8, 0);
    ctx.lineTo(8, 0);
    ctx.closePath();
    ctx.fill();
    // Body
    ctx.fillStyle = flash ? '#fff' : '#778899';
    ctx.beginPath();
    ctx.ellipse(0, 0, boss.width / 2, boss.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Metal plates
    ctx.fillStyle = '#556677';
    ctx.fillRect(-boss.width / 3, -boss.height / 4, boss.width * 2 / 3, boss.height / 2);
    // Red eye
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(0, -5, 4, 0, Math.PI * 2);
    ctx.fill();
    // Teeth
    ctx.fillStyle = '#ffffff';
    for (var tooth = 0; tooth < 5; tooth++) {
      ctx.fillRect(-10 + tooth * 5, boss.height / 2 - 4, 3, 6);
    }
  } else if (boss.type === 3) { // Storm Whale
    // Body
    ctx.fillStyle = flash ? '#fff' : '#445577';
    ctx.beginPath();
    ctx.ellipse(0, 0, boss.width / 2, boss.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Belly
    ctx.fillStyle = '#667799';
    ctx.beginPath();
    ctx.ellipse(0, boss.height / 4, boss.width / 2.5, boss.height / 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.fillStyle = flash ? '#fff' : '#3a4a6a';
    ctx.beginPath();
    ctx.moveTo(0, -boss.height / 2);
    ctx.lineTo(-20, -boss.height / 2 - 15);
    ctx.lineTo(20, -boss.height / 2 - 15);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#aaccff';
    ctx.beginPath();
    ctx.arc(-boss.width / 4, 0, 4, 0, Math.PI * 2);
    ctx.arc(boss.width / 4, 0, 4, 0, Math.PI * 2);
    ctx.fill();
    // Storm sparks
    if (boss.timer % 10 < 5) {
      ctx.strokeStyle = '#88ddff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-boss.width / 2, -10);
      ctx.lineTo(-boss.width / 2 - 10 + Math.random() * 5, -15 + Math.random() * 10);
      ctx.stroke();
    }
  } else { // Kraken
    // Many tentacles
    ctx.strokeStyle = flash ? '#fff' : '#663366';
    ctx.lineWidth = 4;
    for (var kt = 0; kt < 8; kt++) {
      var kta = (kt / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(kta) * 15, Math.sin(kta) * 15);
      var ktx = Math.cos(kta) * 40 + Math.sin(boss.timer * 0.04 + kt) * 15;
      var kty = Math.sin(kta) * 40 + Math.cos(boss.timer * 0.03 + kt) * 10;
      ctx.quadraticCurveTo(Math.cos(kta) * 25, Math.sin(kta) * 25, ktx, kty);
      ctx.stroke();
    }
    // Body
    ctx.fillStyle = flash ? '#fff' : '#884488';
    ctx.beginPath();
    ctx.arc(0, 0, boss.width / 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#aa55aa';
    ctx.beginPath();
    ctx.moveTo(-15, -20); ctx.lineTo(-10, -30); ctx.lineTo(-5, -20);
    ctx.moveTo(-5, -20); ctx.lineTo(0, -33); ctx.lineTo(5, -20);
    ctx.moveTo(5, -20); ctx.lineTo(10, -30); ctx.lineTo(15, -20);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff88ff';
    ctx.beginPath();
    ctx.arc(-8, -5, 5, 0, Math.PI * 2);
    ctx.arc(8, -5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#440044';
    ctx.beginPath();
    ctx.arc(-8, -5, 2, 0, Math.PI * 2);
    ctx.arc(8, -5, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // Boss HP bar
  var bHpPct = boss.hp / bossMaxHits;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(GW / 2 - 60, GH - 18, 120, 8);
  ctx.fillStyle = bHpPct > 0.3 ? '#ff4444' : '#ff0000';
  ctx.fillRect(GW / 2 - 59, GH - 17, 118 * bHpPct, 6);
  ctx.font = 'bold 8px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(BOSS_NAMES[boss.type], GW / 2, GH - 22);
}

// === DRAW POWER-UPS ===
function drawPowerups() {
  for (var i = 0; i < powerups.length; i++) {
    var pu = powerups[i];
    var bob = Math.sin(pu.bobTimer) * 3;
    var py = pu.y + bob;

    // Glow
    ctx.globalAlpha = 0.3 + Math.sin(pu.bobTimer * 2) * 0.1;
    var colors = { speed: '#44ff44', weapon: '#ff8844', shield: '#44ffff', life: '#ff44ff', score: '#ffff44' };
    ctx.fillStyle = colors[pu.type] || '#fff';
    ctx.beginPath();
    ctx.arc(pu.x, py, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Icon
    ctx.fillStyle = colors[pu.type] || '#fff';
    ctx.beginPath();
    ctx.arc(pu.x, py, 6, 0, Math.PI * 2);
    ctx.fill();

    // Symbol
    ctx.fillStyle = '#000';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    var symbols = { speed: 'S', weapon: 'W', shield: '#', life: '+', score: '$' };
    ctx.fillText(symbols[pu.type] || '?', pu.x, py + 3);
  }
}

// === DRAW BASELINGS ===
function drawBaselings() {
  for (var i = 0; i < baselings.length; i++) {
    var bas = baselings[i];
    if (!bas.alive) continue;
    var bob = Math.sin(bas.bobTimer) * 2;

    // Little creature swimming
    ctx.fillStyle = '#66ddaa';
    ctx.beginPath();
    ctx.ellipse(bas.x, bas.y + bob, 6, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Head
    ctx.fillStyle = '#88eebb';
    ctx.beginPath();
    ctx.arc(bas.x, bas.y + bob - 5, 4, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(bas.x - 2, bas.y + bob - 6, 1, 0, Math.PI * 2);
    ctx.arc(bas.x + 2, bas.y + bob - 6, 1, 0, Math.PI * 2);
    ctx.fill();
    // Tiny ripple
    ctx.globalAlpha = 0.3;
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(bas.x, bas.y + bob + 3, 5 + Math.sin(bas.bobTimer * 2), 0, Math.PI);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// === DRAW TOKENS ===
function drawTokens() {
  for (var i = 0; i < tokens.length; i++) {
    var tok = tokens[i];
    if (tok.collected || tok.y < -10) continue;
    var bob = Math.sin(tok.bobTimer) * 2;
    var sinkAlpha = tok.sinkTimer > 60 ? 1 : tok.sinkTimer / 60;

    ctx.globalAlpha = sinkAlpha;
    // Coin
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(tok.x, tok.y + bob, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffee44';
    ctx.beginPath();
    ctx.arc(tok.x, tok.y + bob, 5, 0, Math.PI * 2);
    ctx.fill();
    // M symbol
    ctx.fillStyle = '#886600';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('M', tok.x, tok.y + bob + 3);
    ctx.globalAlpha = 1;
  }
}

// === DRAW HUD ===
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(10,5,20,0.75)';
  ctx.fillRect(0, 0, GW, 28);

  ctx.font = 'bold 11px monospace';

  // Score
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 6, 18);

  // Stage
  ctx.fillStyle = '#88ccff';
  ctx.textAlign = 'center';
  ctx.fillText('STG ' + stage, GW / 2, 18);

  // Lives (boat icons)
  ctx.fillStyle = '#44dd88';
  ctx.textAlign = 'right';
  for (var i = 0; i < lives; i++) {
    var lx = GW - 10 - i * 18;
    ctx.beginPath();
    ctx.moveTo(lx, 10);
    ctx.lineTo(lx - 5, 20);
    ctx.lineTo(lx + 5, 20);
    ctx.closePath();
    ctx.fill();
  }

  // HP bar (bottom-left)
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(4, GH - 14, 54, 10);
  ctx.fillStyle = hp > 1 ? '#44dd88' : '#ff4444';
  ctx.fillRect(5, GH - 13, (50 * hp / maxHp), 8);
  ctx.font = '8px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 6, GH - 5);

  // Turbo bar
  ctx.fillStyle = 'rgba(10,5,20,0.6)';
  ctx.fillRect(4, GH - 26, 54, 10);
  ctx.fillStyle = turboActive ? '#ffff44' : '#4488ff';
  ctx.fillRect(5, GH - 25, (50 * turboFuel / 100), 8);
  ctx.fillStyle = '#fff';
  ctx.fillText('TB', 6, GH - 17);

  // Weapon indicator
  ctx.font = 'bold 9px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.fillText(WEAPON_NAMES[weaponLevel], GW - 6, GH - 6);

  // Mission progress
  if (missionType === 'race' || missionType === 'survive') {
    var pct = Math.min(1, stageProgress / stageGoal);
    ctx.fillStyle = 'rgba(10,5,20,0.6)';
    ctx.fillRect(GW / 2 - 40, GH - 14, 80, 8);
    ctx.fillStyle = '#88ccff';
    ctx.fillRect(GW / 2 - 39, GH - 13, 78 * pct, 6);
  } else if (missionType === 'collect') {
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#ffcc00';
    ctx.textAlign = 'center';
    ctx.fillText(tokensCollected + '/' + tokensNeeded, GW / 2, GH - 6);
  } else if (missionType === 'protect') {
    var alive = baselings.filter(function(b) { return b.alive; }).length;
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#66ddaa';
    ctx.textAlign = 'center';
    ctx.fillText('SAFE: ' + alive, GW / 2, GH - 6);
  }
}

// === DRAW MISSION BANNER ===
function drawMissionBanner() {
  var alpha = missionFlashTimer > 150 ? (180 - missionFlashTimer) / 30 :
              missionFlashTimer < 30 ? missionFlashTimer / 30 : 1;
  ctx.globalAlpha = alpha * 0.85;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, GH / 2 - 30, GW, 60);
  ctx.globalAlpha = alpha;

  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#ffdd44';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE ' + stage, GW / 2, GH / 2 - 8);

  ctx.font = 'bold 11px monospace';
  var mIdx = MISSIONS.indexOf(missionType);
  ctx.fillStyle = '#88ccff';
  ctx.fillText(MISSION_NAMES[mIdx], GW / 2, GH / 2 + 12);
  ctx.globalAlpha = 1;
}

// === DRAW STAGE CLEAR ===
function drawStageClear() {
  var alpha = Math.min(1, (150 - stageClearTimer) / 30);
  ctx.globalAlpha = alpha * 0.8;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, GH / 2 - 25, GW, 50);
  ctx.globalAlpha = alpha;

  ctx.font = 'bold 16px monospace';
  ctx.fillStyle = '#44ff88';
  ctx.textAlign = 'center';
  ctx.fillText('STAGE CLEAR!', GW / 2, GH / 2 + 2);

  ctx.font = '10px monospace';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('+' + (500 * stage) + ' BONUS', GW / 2, GH / 2 + 18);
  ctx.globalAlpha = 1;
}

// === TITLE SCREEN ===
function drawTitleScreen() {
  // Animated water background
  drawWater();

  // Title boat animation
  var titleBoatX = GW / 2 + Math.sin(frame * 0.02) * 30;
  var titleBoatY = GH * 0.55 + Math.sin(frame * 0.03) * 5;
  ctx.save();
  ctx.translate(titleBoatX, titleBoatY);
  ctx.rotate(Math.sin(frame * 0.02) * 0.1);
  ctx.fillStyle = '#dd3333';
  ctx.beginPath();
  ctx.moveTo(0, -12); ctx.lineTo(-8, 8); ctx.lineTo(8, 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#44ffaa';
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Wake behind title boat
  ctx.globalAlpha = 0.3;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  for (var tw = 0; tw < 5; tw++) {
    ctx.beginPath();
    ctx.arc(titleBoatX, titleBoatY + 14 + tw * 8, tw * 4 + 3, 0.3, Math.PI - 0.3);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Title text
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('COBRA TRIANGLE', GW / 2 + 2, GH * 0.18 + 2);
  ctx.fillStyle = '#44ddff';
  ctx.fillText('COBRA TRIANGLE', GW / 2, GH * 0.18);

  ctx.fillStyle = '#88aacc';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW / 2, GH * 0.25);

  // Features list
  ctx.font = '9px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('25 STAGES - 5 MISSION TYPES - 5 BOSSES', GW / 2, GH * 0.35);
  ctx.fillText('RACE / PROTECT / COLLECT / SURVIVE / BOSS', GW / 2, GH * 0.41);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, GW / 2, GH * 0.76);
  }

  // Start prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH * 0.88);
  ctx.globalAlpha = 1;

  // Controls hint
  ctx.fillStyle = '#666';
  ctx.font = '8px monospace';
  ctx.fillText('ARROWS: Steer | SPACE/X: Fire | Z: Turbo', GW / 2, GH * 0.95);
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
