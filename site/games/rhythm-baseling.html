// DEX: timing window - wider perfect/great/good windows

// INT: score multiplier - bonus score on everything

// === NOTE GENERATION ===
function generateNotes(songIdx) {
  var song = SONGS[songIdx];
  var bpm = song.bpm;
  var beatInterval = 60000 / bpm;
  var duration = 35000; // 35 seconds per song (longer for boss)
  var noteList = [];
  var totalBeats = Math.floor(duration / beatInterval);

  // Seed RNG for consistent patterns
  var seed = songIdx * 1337 + 42;
  function seededRandom() {
    seed = (seed * 16807 + 0) % 2147483647;
    return (seed - 1) / 2147483646;
  }

  // Pattern density based on difficulty
  var density = 0.4 + songIdx * 0.08;
  var doubleChance = songIdx * 0.05;

  // CHA adds bonus notes (golden notes worth extra)
  var chaExtraNotes = Math.floor((statB.cha - 10) * 0.5);
  if (chaExtraNotes < 0) chaExtraNotes = 0;

  for (var beat = 4; beat < totalBeats; beat++) {
    // Main beat notes
    if (seededRandom() < density) {
      var lane = Math.floor(seededRandom() * LANE_COUNT);
      var noteType = 'normal';

      // Boss phase notes (last 25% of song if boss exists)
      if (song.bossName && beat > totalBeats * 0.75) {
        noteType = 'boss';
      }

      // Reactor drop notes (periodic special notes)
      if (beat % 16 === 0 && beat > 8) {
        noteType = 'reactor';
      }

      noteList.push({
        time: beat * beatInterval,
        lane: lane,
        hit: false,
        missed: false,
        type: noteType,
        golden: false
      });

      // Double notes on harder songs
      if (seededRandom() < doubleChance) {
        var lane2 = Math.floor(seededRandom() * LANE_COUNT);
        if (lane2 === lane) lane2 = (lane2 + 1) % LANE_COUNT;
        noteList.push({
          time: beat * beatInterval,
          lane: lane2,
          hit: false,
          missed: false,
          type: noteType,
          golden: false
        });
      }
    }

    // Off-beat notes on harder songs
    if (songIdx >= 2 && seededRandom() < (density - 0.3)) {
      var offLane = Math.floor(seededRandom() * LANE_COUNT);
      noteList.push({
        time: beat * beatInterval + beatInterval / 2,
        lane: offLane,
        hit: false,
        missed: false,
        type: 'normal',
        golden: false
      });
    }

    // Sixteenth notes on expert/insane
    if (songIdx >= 3 && seededRandom() < 0.15) {
      var sixLane = Math.floor(seededRandom() * LANE_COUNT);
      noteList.push({
        time: beat * beatInterval + beatInterval / 4,
        lane: sixLane,
        hit: false,
        missed: false,
        type: 'normal',
        golden: false
      });
    }

    // Triplet notes on insane+
    if (songIdx >= 4 && seededRandom() < 0.1) {
      var triLane = Math.floor(seededRandom() * LANE_COUNT);
      noteList.push({
        time: beat * beatInterval + beatInterval / 3,
        lane: triLane,
        hit: false,
        missed: false,
        type: 'normal',
        golden: false
      });
    }
  }

  // Add CHA bonus golden notes scattered throughout
  for (var c = 0; c < chaExtraNotes && c < 20; c++) {
    var bonusBeat = 8 + Math.floor(seededRandom() * (totalBeats - 12));
    var bonusLane = Math.floor(seededRandom() * LANE_COUNT);
    noteList.push({
      time: bonusBeat * beatInterval,
      lane: bonusLane,
      hit: false,
      missed: false,
      type: 'golden',
      golden: true
    });
  }

  noteList.sort(function(a, b) { return a.time - b.time; });
  return noteList;
}

// === AUDIO ===
function playDrumBeat(beatNum) {
  // Kick on 1, 3
  if (beatNum % 4 === 0 || beatNum % 4 === 2) {
    TAS.audio.playTone(60, 0.12, 'sine', 0.15, 30);
  }
  // Snare on 2, 4
  if (beatNum % 4 === 1 || beatNum % 4 === 3) {
    TAS.audio.playNoise(0.08, 0.06, 3000);
  }
  // Hi-hat on all
  TAS.audio.playNoise(0.03, 0.03, 8000);

  // Spore beat flavor: extra sub-bass on beat 1 for Tasern feel
  if (beatNum % 8 === 0) {
    TAS.audio.playTone(40, 0.15, 'sine', 0.08, 20);
  }
  // Reactor pulse sound on certain songs
  var song = SONGS[currentSong];
  if (song.theme === 'reactor' && beatNum % 4 === 0) {
    TAS.audio.playTone(110, 0.05, 'triangle', 0.03);
  }
  // Dungeon echo on Namaris
  if (song.theme === 'dungeon' && beatNum % 2 === 0) {
    TAS.audio.playTone(80, 0.08, 'sine', 0.02, 40);
  }
}

function playHitNote(lane, noteType) {
  var scale = bossActive ? PENTA_MINOR : PENTA;
  if (SONGS[currentSong].theme === 'forest' || SONGS[currentSong].theme === 'garden') {
    scale = SPORE_SCALE;
  }
  var noteIdx = (combo + lane) % scale.length;
  var vol = 0.08 + strPower() * 0.02; // STR: louder hits
  if (vol > 0.2) vol = 0.2;
  TAS.audio.playTone(scale[noteIdx], 0.15, 'triangle', vol);

  // Golden note chime
  if (noteType === 'golden') {
    TAS.audio.playTone(scale[noteIdx] * 2, 0.1, 'sine', 0.06);
    TAS.audio.playTone(scale[noteIdx] * 1.5, 0.08, 'sine', 0.04);
  }
  // Reactor note crackle
  if (noteType === 'reactor') {
    TAS.audio.playNoise(0.05, 0.04, 6000);
    TAS.audio.playTone(scale[noteIdx] * 1.25, 0.1, 'square', 0.03);
  }
  // Boss hit - deep impact
  if (noteType === 'boss') {
    TAS.audio.playTone(scale[noteIdx] * 0.5, 0.15, 'sawtooth', 0.05, 30);
  }
}

// === HIT DETECTION ===
function tryHitLane(lane) {
  laneFlash[lane] = 1.0;
  var bestNote = null;
  var bestDiff = Infinity;
  var goodW = getGoodW();

  for (var i = 0; i < notes.length; i++) {
    var n = notes[i];
    if (n.lane !== lane || n.hit || n.missed) continue;
    var diff = Math.abs(n.time - songTime);
    if (diff < goodW && diff < bestDiff) {
      bestNote = n;
      bestDiff = diff;
    }
  }

  if (bestNote) {
    bestNote.hit = true;
    missStreak = 0;
    comboGraceTimer = 0;
    pendingComboBreak = false;

    var perfectW = getPerfectW();
    var greatW = getGreatW();
    var baseScore = 0;
    var hitType = '';
    var nx = getLaneX(bestNote.lane);

    if (bestDiff <= perfectW) {
      hitType = 'PERFECT';
      perfects++;
      combo++;
      perfectStreak++;
      // STR: power charge builds on perfect streak
      strPowerCharge = Math.min(1, strPowerCharge + 0.1 * strPower());
      baseScore = 300 * strPower(); // STR: hit power bonus
      // CON: health recovery on perfects
      health = Math.min(maxHealth, health + 2 * conToughness());
      danceReaction = 'happy';
      danceReactionTimer = 0.3;

      // Perfect hit screen shake (STR scales intensity)
      var shakeStr = 2 + strPowerCharge * 4;
      TAS.fx.shake(shakeStr, 0.15);

      // Rainbow particles (more with STR)
      var particleCount = 12 + Math.floor(strPower() * 3);
      for (var c = 0; c < particleCount; c++) {
        var hue = (c / particleCount) * 360;
        TAS.particles.spawn(nx, HIT_ZONE_Y, 'hsl(' + hue + ',100%,60%)', 1, 4, { size: 3, sizeVar: 2 });
      }

      // Glow ring on perfect
      hitTexts.push({ text: 'PERFECT', x: nx, y: HIT_ZONE_Y - 10, timer: 0.6, color: '#ffdd44', size: 12 });
    } else if (bestDiff <= greatW) {
      hitType = 'GREAT';
      greats++;
      combo++;
      perfectStreak = 0;
      strPowerCharge = Math.max(0, strPowerCharge - 0.05);
      baseScore = 200 * strPower();
      health = Math.min(maxHealth, health + 1 * conToughness());
      danceReaction = 'great';
      danceReactionTimer = 0.2;
      TAS.particles.spawn(nx, HIT_ZONE_Y, LANE_COLORS[lane], 6, 3, { size: 2 });
      hitTexts.push({ text: 'GREAT', x: nx, y: HIT_ZONE_Y - 10, timer: 0.5, color: '#44ddff', size: 10 });
    } else {
      hitType = 'GOOD';
      goods++;
      combo++;
      perfectStreak = 0;
      strPowerCharge = Math.max(0, strPowerCharge - 0.1);
      baseScore = 100;
      TAS.particles.spawn(nx, HIT_ZONE_Y, '#888', 3, 2);
      hitTexts.push({ text: 'GOOD', x: nx, y: HIT_ZONE_Y - 10, timer: 0.4, color: '#888', size: 9 });
    }

    // INT: score multiplier on all hits
    baseScore = Math.floor(baseScore * intScoreMult());

    // Golden note (CHA) bonus
    if (bestNote.golden) {
      baseScore = Math.floor(baseScore * 2.5 * chaBonus());
      chaBonusScore += baseScore;
      hitTexts.push({ text: 'GOLDEN!', x: nx, y: HIT_ZONE_Y - 25, timer: 0.7, color: '#ffdd44', size: 14 });
      // Extra sparkles
      for (var g = 0; g < 8; g++) {
        TAS.particles.spawn(nx, HIT_ZONE_Y, '#ffdd44', 1, 5, { size: 2, sizeVar: 2 });
      }
    }

    // Reactor note bonus
    if (bestNote.type === 'reactor') {
      reactorEnergy = Math.min(reactorMaxEnergy, reactorEnergy + 15);
      baseScore = Math.floor(baseScore * 1.5);
      playReactorDrop();
      hitTexts.push({ text: 'REACTOR!', x: nx, y: HIT_ZONE_Y - 25, timer: 0.7, color: '#44ddff', size: 12 });
    }

    // Boss note - damage boss
    if (bestNote.type === 'boss' && bossActive) {
      var dmg = 1 + Math.floor(strPower() * 0.5);
      if (hitType === 'PERFECT') dmg += 1;
      bossHP = Math.max(0, bossHP - dmg);
      bossFlashTimer = 0.15;
      baseScore = Math.floor(baseScore * 1.8);
      if (bossHP <= 0 && !bossDefeated) {
        bossDefeated = true;
        playBossDefeat();
        score += 5000 * Math.floor(intScoreMult());
        hitTexts.push({ text: 'BOSS DEFEATED!', x: GW / 2 - 60, y: GH / 2, timer: 2.0, color: '#ffdd44', size: 16 });
        // Explosion of particles
        for (var b = 0; b < 40; b++) {
          TAS.particles.spawn(150, GH / 2, 'hsl(' + (b * 9) + ',100%,60%)', 1, 6, { size: 3, sizeVar: 3 });
        }
      }
    }

    score += Math.floor(baseScore * multiplier);

    // Score popup
    scorePopups.push({
      text: '+' + Math.floor(baseScore * multiplier),
      x: nx,
      y: HIT_ZONE_Y - 20,
      timer: 0.5,
      vy: -40
    });

    if (combo > maxCombo) maxCombo = combo;
    updateMultiplier();
    playHitNote(lane, bestNote.type);

    // Dance intensity scales with combo
    danceIntensity = Math.min(1, combo / 50);
  }
}

function updateMultiplier() {
  // WIS: combo thresholds lowered
  var wisScale = wisComboWindow();
  var t1 = Math.floor(16 / wisScale);
  var t2 = Math.floor(32 / wisScale);
  var t3 = Math.floor(64 / wisScale);
  if (t1 < 4) t1 = 4;
  if (t2 < 8) t2 = 8;
  if (t3 < 16) t3 = 16;

  if (combo >= t3) multiplier = 8;
  else if (combo >= t2) multiplier = 4;
  else if (combo >= t1) multiplier = 2;
  else multiplier = 1;
}

function getLaneX(lane) {
  return LANES_X + lane * (LANE_WIDTH + LANE_GAP) + LANE_WIDTH / 2;
}

// === GRADE CALCULATION ===
function calcGrade() {
  var total = perfects + greats + goods + misses;
  if (total === 0) return 'D';
  var accuracy = (perfects * 3 + greats * 2 + goods) / (total * 3);
  // INT: slight grade boost
  accuracy += (statB.int - 10) * 0.005;
  if (accuracy >= 0.95) return 'S';
  if (accuracy >= 0.85) return 'A';
  if (accuracy >= 0.70) return 'B';
  if (accuracy >= 0.50) return 'C';
  return 'D';
}

// === TOUCH HANDLING FOR LANES ===
function handleTouchForLanes(e) {
  touchLanes = [false, false, false, false];
  var rect = TAS.canvas.getBoundingClientRect();
  var scaleX = GW / rect.width;
  var scaleY = GH / rect.height;

  for (var i = 0; i < e.touches.length; i++) {
    var t = e.touches[i];
    var px = (t.clientX - rect.left) * scaleX;
    var py = (t.clientY - rect.top) * scaleY;

    for (var lane = 0; lane < LANE_COUNT; lane++) {
      var lx = getLaneX(lane);
      if (Math.abs(px - lx) < LANE_WIDTH) {
        touchLanes[lane] = true;
      }
    }
  }
}

// Add touch event listeners
TAS.canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  TAS.audio.ensureAudio();
  handleTouchForLanes(e);
}, { passive: false });
TAS.canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  handleTouchForLanes(e);
}, { passive: false });
TAS.canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  touchLanes = [false, false, false, false];
}, { passive: false });

// Track previous touch state for edge detection
var prevTouchLanes = [false, false, false, false];

// === DRAWING HELPERS ===
function drawArrow(x, y, lane, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  var rotations = [Math.PI, Math.PI / 2, -Math.PI / 2, 0];
  ctx.rotate(rotations[lane]);

  var s = ARROW_SIZE / 2;
  ctx.fillStyle = LANE_COLORS[lane];
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  ctx.moveTo(s, 0);
  ctx.lineTo(-s * 0.3, -s * 0.8);
  ctx.lineTo(-s * 0.3, -s * 0.3);
  ctx.lineTo(-s, -s * 0.3);
  ctx.lineTo(-s, s * 0.3);
  ctx.lineTo(-s * 0.3, s * 0.3);
  ctx.lineTo(-s * 0.3, s * 0.8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

function drawThemedNote(x, y, lane, alpha, noteType) {
  ctx.save();
  ctx.globalAlpha = alpha;

  if (noteType === 'golden') {
    // Golden glowing note
    var glow = Math.sin(frame * 0.15) * 0.3 + 0.7;
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 8 * glow;
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.arc(x, y, ARROW_SIZE * 0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, ARROW_SIZE * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    return;
  }

  if (noteType === 'reactor') {
    // Reactor energy bolt
    ctx.fillStyle = '#44ddff';
    ctx.strokeStyle = '#88eeff';
    ctx.lineWidth = 2;
    var rs = ARROW_SIZE * 0.4;
    ctx.beginPath();
    // Diamond shape
    ctx.moveTo(x, y - rs);
    ctx.lineTo(x + rs * 0.7, y);
    ctx.lineTo(x, y + rs);
    ctx.lineTo(x - rs * 0.7, y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Inner glow
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, rs * 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  if (noteType === 'boss') {
    // Boss note - red skull-like
    ctx.fillStyle = '#ff4444';
    ctx.strokeStyle = '#ff8888';
    ctx.lineWidth = 2;
    var bs = ARROW_SIZE * 0.4;
    // Hexagonal shape
    ctx.beginPath();
    for (var i = 0; i < 6; i++) {
      var angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
      var px = x + Math.cos(angle) * bs;
      var py = y + Math.sin(angle) * bs;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // Eye dots
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(x - 3, y - 2, 2, 0, Math.PI * 2);
    ctx.arc(x + 3, y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // Normal note - use standard arrow
  ctx.restore();
  drawArrow(x, y, lane, alpha);
}

function drawHitZoneArrow(x, y, lane, flash) {
  ctx.save();
  ctx.translate(x, y);
  var rotations = [Math.PI, Math.PI / 2, -Math.PI / 2, 0];
  ctx.rotate(rotations[lane]);

  var s = ARROW_SIZE / 2;
  ctx.strokeStyle = flash > 0 ? '#fff' : LANE_COLORS[lane];
  ctx.lineWidth = flash > 0 ? 3 : 2;
  ctx.globalAlpha = flash > 0 ? 1 : 0.4;

  ctx.beginPath();
  ctx.moveTo(s, 0);
  ctx.lineTo(-s * 0.3, -s * 0.8);
  ctx.lineTo(-s * 0.3, -s * 0.3);
  ctx.lineTo(-s, -s * 0.3);
  ctx.lineTo(-s, s * 0.3);
  ctx.lineTo(-s * 0.3, s * 0.3);
  ctx.lineTo(-s * 0.3, s * 0.8);
  ctx.closePath();
  ctx.stroke();

  if (flash > 0) {
    ctx.globalAlpha = flash * 0.3;
    ctx.fillStyle = LANE_COLORS[lane];
    ctx.fill();
  }

  ctx.restore();
}

function drawBaseling(x, y, reaction, dFrame) {
  ctx.save();
  ctx.translate(x, y);

  // Body bounce (more energetic with combo)
  var bounceAmp = 3 + danceIntensity * 5;
  var bounceSpeed = 0.3 + danceIntensity * 0.2;
  var bounce = Math.sin(dFrame * bounceSpeed) * bounceAmp;
  var sway = Math.sin(dFrame * 0.15) * (5 + danceIntensity * 3);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sway * 0.3, 40, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body (mushroom shape)
  ctx.translate(sway, bounce);

  // Stem
  ctx.fillStyle = '#ddc89e';
  ctx.fillRect(-8, 5, 16, 30);

  // Cap - uses statB.color if available
  var capColor = statB.color || '#cc5544';
  if (reaction === 'happy') capColor = '#44dd88';
  else if (reaction === 'great') capColor = '#44ddff';
  else if (reaction === 'sad') capColor = '#aa3333';
  else if (reaction === 'boss') capColor = '#ff4444';

  ctx.fillStyle = capColor;
  ctx.beginPath();
  ctx.ellipse(0, 0, 22, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // STR power glow when charged
  if (strPowerCharge > 0.3) {
    ctx.globalAlpha = strPowerCharge * 0.4;
    ctx.fillStyle = '#ffdd44';
    ctx.beginPath();
    ctx.ellipse(0, 0, 26, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Spots on cap
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(-8, -5, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -10, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  var eyeY = 2;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(-6, eyeY, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, eyeY, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eye highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-5, eyeY - 1, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, eyeY - 1, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (reaction === 'happy' || reaction === 'great') {
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, eyeY + 5, 4, 0, Math.PI);
    ctx.stroke();
  } else if (reaction === 'sad') {
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, eyeY + 9, 4, Math.PI, 0);
    ctx.stroke();
  } else if (reaction === 'boss') {
    // Determined face
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-4, eyeY + 6);
    ctx.lineTo(4, eyeY + 6);
    ctx.stroke();
  } else {
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(0, eyeY + 6, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Arms waving with dance
  ctx.strokeStyle = '#ddc89e';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';

  var armSpeed = 0.25 + danceIntensity * 0.2;
  var armRange = 8 + danceIntensity * 6;
  // Left arm
  ctx.beginPath();
  ctx.moveTo(-10, 15);
  ctx.lineTo(-22, 8 + Math.sin(dFrame * armSpeed + 1) * armRange);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(10, 15);
  ctx.lineTo(22, 8 + Math.sin(dFrame * armSpeed) * armRange);
  ctx.stroke();

  // Feet tap
  ctx.fillStyle = '#996633';
  var footTap = Math.abs(Math.sin(dFrame * 0.2)) * 3;
  ctx.beginPath();
  ctx.ellipse(-6, 36 - footTap, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, 36 - (3 - footTap), 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Name tag (from statB)
  if (statB.name && statB.name !== 'Baseling') {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.7;
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(statB.name, 0, 50);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawMushroom(x, y, size, hue) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = 'hsl(' + hue + ',20%,70%)';
  ctx.fillRect(-size * 0.2, 0, size * 0.4, size * 0.6);
  ctx.fillStyle = 'hsl(' + hue + ',60%,45%)';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.5, size * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.arc(-size * 0.15, -size * 0.1, size * 0.08, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBoss(x, y) {
  if (!bossActive || bossDefeated) return;
  var song = SONGS[currentSong];
  ctx.save();
  ctx.translate(x, y);

  // Boss flash on hit
  if (bossFlashTimer > 0) {
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.5) * 0.3;
  }

  // Boss body - large menacing mushroom
  var wobble = Math.sin(frame * 0.03) * 3;
  ctx.translate(wobble, Math.sin(frame * 0.04) * 2);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 50, 35, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Stem
  ctx.fillStyle = '#aa8866';
  ctx.fillRect(-12, 10, 24, 40);

  // Cap - evil mushroom
  var bossHue = 0;
  if (song.bossName === 'Reactor Core') bossHue = 200;
  else if (song.bossName === 'Root Titan') bossHue = 40;
  else if (song.bossName === 'Spore Lord') bossHue = 300;
  else if (song.bossName === 'The Compost King') bossHue = 30;
  else if (song.bossName === 'Bloom Guardian') bossHue = 100;
  else if (song.bossName === 'The Whale') bossHue = 240;
  else if (song.bossName === 'Vessel of Namaris') bossHue = 15;

  ctx.fillStyle = 'hsl(' + bossHue + ',70%,35%)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 35, 28, 0, 0, Math.PI * 2);
  ctx.fill();

  // Spiky top
  ctx.fillStyle = 'hsl(' + bossHue + ',80%,25%)';
  for (var spike = 0; spike < 5; spike++) {
    var sa = (spike / 5) * Math.PI - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(sa) * 30, Math.sin(sa) * 20 - 5);
    ctx.lineTo(Math.cos(sa) * 38, Math.sin(sa) * 28 - 10);
    ctx.lineTo(Math.cos(sa + 0.3) * 30, Math.sin(sa + 0.3) * 20 - 5);
    ctx.fill();
  }

  // Evil eyes
  ctx.fillStyle = '#ff0000';
  ctx.beginPath();
  ctx.arc(-10, 5, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, 5, 5, 0, Math.PI * 2);
  ctx.fill();
  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-10, 5, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, 5, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-12, 15);
  for (var tooth = 0; tooth < 6; tooth++) {
    ctx.lineTo(-12 + tooth * 4 + 2, tooth % 2 === 0 ? 20 : 15);
  }
  ctx.stroke();

  // Boss HP bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(-30, -40, 60, 8);
  var hpRatio = bossHP / bossMaxHP;
  var hpColor = hpRatio > 0.5 ? '#ff4444' : hpRatio > 0.25 ? '#ffaa44' : '#ff0000';
  ctx.fillStyle = hpColor;
  ctx.fillRect(-29, -39, 58 * hpRatio, 6);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(-30, -40, 60, 8);

  // Boss name
  ctx.fillStyle = '#ff8888';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(song.bossName, 0, -45);

  ctx.restore();
}

// === STAGE BACKGROUND DRAWING ===
function drawStageBackground() {
  var theme = SONGS[currentSong].theme;
  var i, elem;
  ctx.save();
  ctx.globalAlpha = 0.2;

  // Animate stage particles
  for (i = 0; i < stageParticles.length; i++) {
    var p = stageParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    // Wrap around
    if (p.y < -10) p.y = GH + 10;
    if (p.y > GH + 10) p.y = -10;
    if (p.x < -10) p.x = 210;
    if (p.x > 210) p.x = -10;

    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = 'hsl(' + p.hue + ',60%,60%)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 0.15;

  for (i = 0; i < stageBgElements.length; i++) {
    elem = stageBgElements[i];

    if (elem.type === 'mushroom') {
      var swayOff = Math.sin(stageTimer * elem.sway + i) * 3;
      drawMushroom(elem.x + swayOff, elem.y, elem.size, elem.hue + Math.sin(stageTimer) * 10);
    } else if (elem.type === 'pipe') {
      ctx.fillStyle = 'hsl(' + elem.hue + ',50%,30%)';
      ctx.fillRect(elem.x, elem.y, elem.w, elem.h);
      // Glow dot
      ctx.globalAlpha = 0.3 + Math.sin(stageTimer * 2 + i) * 0.15;
      ctx.fillStyle = 'hsl(' + elem.hue + ',80%,60%)';
      ctx.beginPath();
      ctx.arc(elem.x + elem.w / 2, elem.y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    } else if (elem.type === 'node') {
      var nodeGlow = 0.2 + Math.sin(stageTimer * elem.pulseSpeed + i) * 0.15;
      ctx.globalAlpha = nodeGlow;
      ctx.fillStyle = 'hsl(' + elem.hue + ',70%,50%)';
      ctx.beginPath();
      ctx.arc(elem.x, elem.y, elem.size + Math.sin(stageTimer * elem.pulseSpeed) * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    } else if (elem.type === 'tendril') {
      ctx.strokeStyle = 'hsl(' + elem.hue + ',40%,40%)';
      ctx.lineWidth = elem.width;
      ctx.beginPath();
      if (elem.points.length > 0) {
        ctx.moveTo(elem.points[0].x, GH + 10);
        for (var j = 0; j < elem.points.length; j++) {
          var pt = elem.points[j];
          ctx.lineTo(pt.x + Math.sin(stageTimer + j) * 2, pt.y);
        }
      }
      ctx.stroke();
    } else if (elem.type === 'glowNode') {
      var ng = 0.15 + Math.sin(stageTimer * 1.5 + i * 0.7) * 0.1;
      ctx.globalAlpha = ng;
      ctx.fillStyle = 'hsl(' + elem.hue + ',80%,60%)';
      ctx.beginPath();
      ctx.arc(elem.x, elem.y, elem.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    } else if (elem.type === 'cloud') {
      elem.x += elem.speed * 0.5;
      if (elem.x > 220) elem.x = -40;
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = 'hsl(' + elem.hue + ',40%,40%)';
      ctx.beginPath();
      ctx.ellipse(elem.x, elem.y, elem.size, elem.size * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    } else if (elem.type === 'flower') {
      var fSway = Math.sin(stageTimer * elem.sway + i) * 3;
      ctx.save();
      ctx.translate(elem.x + fSway, elem.y);
      // Stem
      ctx.strokeStyle = '#2a6e2a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(0, 15);
      ctx.stroke();
      // Petals
      ctx.fillStyle = 'hsl(' + elem.hue + ',70%,60%)';
      for (var pet = 0; pet < elem.petalCount; pet++) {
        var pa = (pet / elem.petalCount) * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(Math.cos(pa) * elem.size * 0.4, Math.sin(pa) * elem.size * 0.4 - 3, elem.size * 0.3, elem.size * 0.15, pa, 0, Math.PI * 2);
        ctx.fill();
      }
      // Center
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.arc(0, -3, elem.size * 0.15, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    } else if (elem.type === 'candle') {
      ctx.fillStyle = elem.green ? '#22aa44' : '#cc3333';
      ctx.fillRect(elem.x, elem.y, elem.w, elem.h);
      // Wick
      ctx.fillStyle = elem.green ? '#116622' : '#881111';
      ctx.fillRect(elem.x + elem.w / 2 - 1, elem.y - elem.wick, 2, elem.wick);
    } else if (elem.type === 'torch') {
      // Bracket
      ctx.fillStyle = '#664422';
      ctx.fillRect(elem.x - 2, elem.y, 4, 15);
      // Flame
      var flick = Math.sin(stageTimer * elem.flicker + i) * 2;
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ff8844';
      ctx.beginPath();
      ctx.ellipse(elem.x + flick, elem.y - 3, 4, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.ellipse(elem.x + flick * 0.5, elem.y - 4, 2, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.15;
    } else if (elem.type === 'chain') {
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(elem.x, elem.y);
      for (var ch = 0; ch < elem.length; ch += 6) {
        var cx = elem.x + Math.sin(stageTimer + ch * 0.1) * 2;
        ctx.lineTo(cx, ch);
      }
      ctx.stroke();
    }
  }

  // Storm lightning
  if (theme === 'storm' && Math.random() < 0.005) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 200, GH);
    ctx.globalAlpha = 0.15;
  }

  ctx.restore();
}

// === REACTOR ENERGY BAR ===
function drawReactorBar() {
  if (reactorEnergy <= 0) return;
  var barX = 10, barY = GH - 30, barW = 80, barH = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barW, barH);
  var ratio = reactorEnergy / reactorMaxEnergy;
  ctx.fillStyle = ratio > 0.7 ? '#44ddff' : ratio > 0.3 ? '#44ff88' : '#888';
  ctx.fillRect(barX + 1, barY + 1, (barW - 2) * ratio, barH - 2);
  ctx.strokeStyle = '#44ddff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);
  ctx.fillStyle = '#44ddff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('REACTOR', barX, barY - 2);
}

// === UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);
  stageTimer += dt;

  // Update lane flashes
  for (var i = 0; i < 4; i++) {
    if (laneFlash[i] > 0) laneFlash[i] = Math.max(0, laneFlash[i] - dt * 5);
  }

  // Beat pulse decay
  if (beatPulse > 0) beatPulse = Math.max(0, beatPulse - dt * 4);

  // Dance reaction timer
  if (danceReactionTimer > 0) {
    danceReactionTimer -= dt;
    if (danceReactionTimer <= 0) danceReaction = bossActive ? 'boss' : 'idle';
  }

  // Boss flash timer
  if (bossFlashTimer > 0) bossFlashTimer -= dt;
  if (bossShakeTimer > 0) bossShakeTimer -= dt;

  // Hit text decay
  for (var ht = hitTexts.length - 1; ht >= 0; ht--) {
    hitTexts[ht].timer -= dt;
    hitTexts[ht].y -= dt * 30;
    if (hitTexts[ht].timer <= 0) hitTexts.splice(ht, 1);
  }

  // Score popup decay
  for (var sp = scorePopups.length - 1; sp >= 0; sp--) {
    scorePopups[sp].timer -= dt;
    scorePopups[sp].y += scorePopups[sp].vy * dt;
    if (scorePopups[sp].timer <= 0) scorePopups.splice(sp, 1);
  }

  // Tutorial gate
  if (showTutorial && state === 'select') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' ']) {
      showTutorial = false;
      localStorage.setItem('rhythm_baseling_tutorial_done', '1');
      TAS.input.keys['Enter'] = false;
      TAS.input.keys[' '] = false;
    }
    return;
  }

  if (state === 'title') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] ||
        Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'select';
      for (var k in TAS.input.keys) TAS.input.keys[k] = false;
    }
    return;
  }

  if (state === 'select') {
    if (TAS.input.keys['ArrowDown'] && !keyWasDown[1]) {
      currentSong = Math.min(SONGS.length - 1, currentSong + 1);
      TAS.audio.playTone(330, 0.05, 'square', 0.05);
    }
    if (TAS.input.keys['ArrowUp'] && !keyWasDown[2]) {
      currentSong = Math.max(0, currentSong - 1);
      TAS.audio.playTone(440, 0.05, 'square', 0.05);
    }
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] || TAS.input.touch.a) {
      if (unlocked[currentSong]) {
        startSong(currentSong);
        TAS.audio.playTone(523, 0.1, 'square', 0.06);
      } else {
        TAS.audio.playTone(100, 0.2, 'sawtooth', 0.06);
      }
    }
    if (TAS.input.keys['Escape']) {
      state = 'title';
      TAS.input.keys['Escape'] = false;
    }

    keyWasDown[1] = !!TAS.input.keys['ArrowDown'];
    keyWasDown[2] = !!TAS.input.keys['ArrowUp'];
    return;
  }

  if (state === 'results') {
    if (TAS.input.keys['Enter'] || TAS.input.keys[' '] ||
        Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      state = 'select';
      for (var rk in TAS.input.keys) TAS.input.keys[rk] = false;
    }
    return;
  }

  if (state === 'playing') {
    songTime += dt * 1000;
    danceFrame += dt * 60;

    // Detect key presses (edge detection)
    for (var ki = 0; ki < LANE_COUNT; ki++) {
      var isDown = !!TAS.input.keys[LANE_KEYS[ki]];
      var touchDown = touchLanes[ki];
      var isPressed = isDown || touchDown;
      var wasPressed = keyWasDown[ki] || prevTouchLanes[ki];
      keyJustPressed[ki] = isPressed && !wasPressed;
      keyWasDown[ki] = isDown;
    }
    prevTouchLanes = touchLanes.slice();

    // Handle inputs
    for (var hi = 0; hi < LANE_COUNT; hi++) {
      if (keyJustPressed[hi]) {
        tryHitLane(hi);
      }
    }

    // WIS: combo grace timer (delays combo break)
    if (pendingComboBreak) {
      comboGraceTimer -= dt * 1000;
      if (comboGraceTimer <= 0) {
        combo = 0;
        multiplier = 1;
        pendingComboBreak = false;
        if (missStreak >= 2) {
          playComboBreak();
        }
      }
    }

    // Check for missed notes
    for (var mi = 0; mi < notes.length; mi++) {
      var n = notes[mi];
      if (!n.hit && !n.missed && n.time < songTime - getGoodW()) {
        n.missed = true;
        misses++;
        missStreak++;
        // CON: reduced health loss
        var hpLoss = Math.max(1, 5 / conToughness());
        health = Math.max(0, health - hpLoss);
        danceReaction = 'sad';
        danceReactionTimer = 0.4;
        perfectStreak = 0;
        strPowerCharge = Math.max(0, strPowerCharge - 0.2);

        // WIS: combo grace instead of instant break
        if (combo > 0 && !pendingComboBreak) {
          pendingComboBreak = true;
          comboGraceTimer = getComboGraceMs();
        } else if (!pendingComboBreak) {
          combo = 0;
          multiplier = 1;
        }

        if (missStreak >= 3) {
          TAS.fx.shake(4, 0.3);
          missStreak = 0;
        }
      }
    }

    // Boss activation (last 25% of song)
    var song = SONGS[currentSong];
    if (song.bossName && !bossActive && !bossDefeated && songTime > songDuration * 0.75) {
      bossActive = true;
      bossAppearTimer = 1.0;
      danceReaction = 'boss';
      playBossAppear();
      TAS.fx.shake(5, 0.4);
      hitTexts.push({ text: song.bossName + ' APPEARS!', x: GW / 2 - 80, y: GH / 2, timer: 2.0, color: '#ff4444', size: 14 });
    }

    if (bossAppearTimer > 0) bossAppearTimer -= dt;

    // Boss attacks (periodic health drain)
    if (bossActive && !bossDefeated) {
      bossAttackTimer -= dt;
      if (bossAttackTimer <= 0) {
        bossAttackTimer = 3.0;
        // Boss attack - reduced by CON
        var bossDmg = Math.max(1, 8 / conToughness());
        health = Math.max(0, health - bossDmg);
        bossShakeTimer = 0.2;
        TAS.fx.shake(3, 0.15);
        danceReaction = 'sad';
        danceReactionTimer = 0.3;
      }
    }

    // Reactor energy decay
    if (reactorEnergy > 0) {
      reactorEnergy = Math.max(0, reactorEnergy - dt * 2);
    }
    // Reactor energy bonus: at max, give score burst
    if (reactorEnergy >= reactorMaxEnergy * 0.95) {
      var reactorBonus = Math.floor(500 * intScoreMult());
      score += reactorBonus;
      reactorEnergy = 0;
      scorePopups.push({ text: 'REACTOR +' + reactorBonus, x: 50, y: GH - 50, timer: 1.0, vy: -20 });
      TAS.audio.playTone(660, 0.15, 'triangle', 0.08);
      TAS.audio.playTone(880, 0.1, 'sine', 0.06);
      // Energy burst particles
      for (var re = 0; re < 15; re++) {
        TAS.particles.spawn(50, GH - 30, '#44ddff', 1, 4, { size: 2, sizeVar: 2 });
      }
    }

    // Play drum beats
    if (songTime > 0) {
      var beatInterval = 60000 / song.bpm;
      while (nextBeatTime <= songTime) {
        playDrumBeat(beatCount);
        beatPulse = 1;
        beatCount++;
        nextBeatTime += beatInterval;
      }
    }

    // Background hue shift
    bgHue = (bgHue + dt * 10) % 360;

    // Spore particles around baseling when doing well
    if (combo > 10 && frame % 8 === 0) {
      TAS.particles.spawn(
        80 + (Math.random() * 40 - 20),
        GH / 2 - 20,
        'hsl(' + (frame * 3 % 360) + ',80%,70%)',
        1, 1, { size: 1, sizeVar: 1, gravity: -0.5 }
      );
    }

    // CHA: extra ambient sparkles when high charisma
    if (statB.cha > 12 && frame % 12 === 0) {
      TAS.particles.spawn(
        Math.random() * GW,
        Math.random() * GH,
        '#ffdd44',
        0.5, 0.5, { size: 1, gravity: -0.2 }
      );
    }

    // Check song end or health depleted
    if (songTime >= songDuration || health <= 0) {
      grade = calcGrade();
      state = 'results';

      var key = 'song_' + currentSong;
      if (!highScores[key] || score > highScores[key]) {
        highScores[key] = score;
        saveHighScores();
      }

      if (health > 0 && (grade === 'S' || grade === 'A' || grade === 'B' || grade === 'C')) {
        if (currentSong < SONGS.length - 1) {
          unlocked[currentSong + 1] = true;
          saveUnlocks();
        }
      }

      if (health > 0) {
        playFanfare();
      } else {
        playComboBreak();
      }
    }

    // Escape to quit
    if (TAS.input.keys['Escape']) {
      state = 'select';
      TAS.input.keys['Escape'] = false;
    }
  }
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#0a0518';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitleScreen();
    return;
  }

  if (state === 'select') {
    drawSelectScreen();
    if (showTutorial) drawTutorial();
    return;
  }

  if (state === 'results') {
    drawResultsScreen();
    return;
  }

  if (state === 'playing') {
    drawPlayingScreen();
  }
}

function drawTitleScreen() {
  // Animated background mushrooms
  var t = frame * 0.02;
  for (var i = 0; i < 8; i++) {
    var x = GW / 2 + Math.cos(t + i * 0.8) * 100;
    var y = GH / 2 + Math.sin(t + i * 0.6) * 60;
    drawMushroom(x, y, 12 + Math.sin(t + i) * 3, (i * 45 + frame) % 360);
  }

  // Spore particles on title
  if (frame % 4 === 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = 'hsl(' + (frame * 2 % 360) + ',60%,60%)';
    ctx.beginPath();
    ctx.arc(
      GW / 2 + Math.cos(frame * 0.03) * 120,
      GH / 2 + Math.sin(frame * 0.04) * 80,
      2,
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Title shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('RHYTHM BASELING', GW / 2 + 2, 72);
  // Title gradient effect (alternate colors)
  ctx.fillStyle = 'hsl(' + ((frame * 0.5) % 360) + ',80%,60%)';
  ctx.fillText('RHYTHM BASELING', GW / 2, 70);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '12px monospace';
  ctx.fillText('A Tasern Rhythm Game', GW / 2, 95);

  // Stat preview
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText(statB.name + ' | Lv.' + statB.level + ' | STR ' + statB.str + ' DEX ' + statB.dex + ' CON ' + statB.con, GW / 2, 112);
  ctx.fillText('INT ' + statB.int + ' WIS ' + statB.wis + ' CHA ' + statB.cha, GW / 2, 124);

  // Baseling
  drawBaseling(GW / 2, 175, 'happy', frame);

  // Prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', GW / 2, GH - 50);
  ctx.globalAlpha = 1;

  // Controls hint
  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.fillText('Arrow Keys to play | Up/Down to navigate', GW / 2, GH - 32);

  // Version / branding
  ctx.fillStyle = '#333';
  ctx.font = '8px monospace';
  ctx.fillText('Unrugable Arcade', GW / 2, GH - 15);
}

function drawSelectScreen() {
  ctx.textAlign = 'center';

  // Title with theme color
  ctx.fillStyle = '#44ddff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('SELECT SONG', GW / 2, 28);

  // Stat bar at top
  ctx.fillStyle = '#444';
  ctx.font = '8px monospace';
  ctx.fillText(statB.name + ' | STR ' + statB.str + ' DEX ' + statB.dex + ' CON ' + statB.con + ' INT ' + statB.int + ' WIS ' + statB.wis + ' CHA ' + statB.cha, GW / 2, 42);

  // Song list - scrollable area
  var listY = 55;
  var itemH = 36;
  var visibleStart = Math.max(0, currentSong - 3);
  var visibleEnd = Math.min(SONGS.length, visibleStart + 7);

  for (var i = visibleStart; i < visibleEnd; i++) {
    var song = SONGS[i];
    var y = listY + (i - visibleStart) * itemH;
    var selected = i === currentSong;
    var isUnlocked = unlocked[i];

    if (selected) {
      ctx.fillStyle = 'rgba(68, 221, 255, 0.1)';
      ctx.fillRect(20, y - 10, GW - 40, itemH - 2);
      ctx.strokeStyle = song.color;
      ctx.lineWidth = 1;
      ctx.strokeRect(20, y - 10, GW - 40, itemH - 2);
    }

    ctx.textAlign = 'left';
    if (isUnlocked) {
      ctx.fillStyle = selected ? '#fff' : '#aaa';
    } else {
      ctx.fillStyle = '#444';
    }
    ctx.font = selected ? 'bold 12px monospace' : '11px monospace';
    ctx.fillText(isUnlocked ? song.name : '??? LOCKED ???', 35, y + 4);

    // Difficulty + BPM
    ctx.textAlign = 'right';
    ctx.fillStyle = isUnlocked ? song.color : '#333';
    ctx.font = '9px monospace';
    ctx.fillText(isUnlocked ? song.difficulty + ' ' + song.bpm + 'BPM' : '', GW - 35, y + 4);

    // Song description on selected
    if (selected && isUnlocked) {
      ctx.textAlign = 'left';
      ctx.fillStyle = '#666';
      ctx.font = '8px monospace';
      ctx.fillText(song.desc, 35, y + 16);
      // Boss indicator
      if (song.bossName) {
        ctx.fillStyle = '#ff4444';
        ctx.fillText('BOSS: ' + song.bossName, 35, y + 26);
      }
    }

    // High score
    var hi = highScores['song_' + i];
    if (hi && isUnlocked) {
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ffdd44';
      ctx.font = '8px monospace';
      ctx.fillText('HI:' + hi, GW - 35, y + 16);
    }
  }

  // Scroll indicators
  if (visibleStart > 0) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('^ more ^', GW / 2, listY - 5);
  }
  if (visibleEnd < SONGS.length) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#666';
    ctx.font = '10px monospace';
    ctx.fillText('v more v', GW / 2, listY + (visibleEnd - visibleStart) * itemH + 5);
  }

  // Stat effects preview
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555';
  ctx.font = '8px monospace';
  var statLine = 'PWR:' + strPower().toFixed(1) + 'x  WIN:' + dexWindow().toFixed(1) + 'x  HP:' + Math.floor(100 * conToughness());
  statLine += '  SCR:' + intScoreMult().toFixed(1) + 'x  CMB:' + wisComboWindow().toFixed(1) + 'x  BNS:' + chaBonus().toFixed(1) + 'x';
  ctx.fillText(statLine, GW / 2, GH - 28);

  // Instructions
  ctx.fillStyle = '#444';
  ctx.font = '9px monospace';
  ctx.fillText('Up/Down: Navigate | Enter: Select | Esc: Back', GW / 2, GH - 12);
}

function drawPlayingScreen() {
  ctx.save();
  TAS.fx.applyShake();

  // Background pulse with beat
  var pulseAlpha = beatPulse * 0.08;
  if (pulseAlpha > 0) {
    ctx.fillStyle = 'hsla(' + bgHue + ', 70%, 30%, ' + pulseAlpha + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Draw themed stage background
  drawStageBackground();

  // Draw baseling dancer (left side)
  drawBaseling(80, GH / 2, danceReaction, danceFrame);

  // Draw boss if active
  if (bossActive && !bossDefeated) {
    drawBoss(140, GH / 2 - 30);
  }

  // Draw lane backgrounds
  for (var i = 0; i < LANE_COUNT; i++) {
    var lx = LANES_X + i * (LANE_WIDTH + LANE_GAP);
    var glowAlpha = 0.05 + laneFlash[i] * 0.15;
    ctx.fillStyle = LANE_COLORS[i];
    ctx.globalAlpha = glowAlpha;
    ctx.fillRect(lx, 30, LANE_WIDTH, GH - 60);
    ctx.globalAlpha = 1;

    ctx.strokeStyle = LANE_COLORS[i];
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 1;
    ctx.strokeRect(lx, 30, LANE_WIDTH, GH - 60);
    ctx.globalAlpha = 1;
  }

  // Hit zone line with glow
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(LANES_X - 5, HIT_ZONE_Y);
  ctx.lineTo(LANES_X + LANES_TOTAL_W + 5, HIT_ZONE_Y);
  ctx.stroke();
  // Glow line
  if (beatPulse > 0) {
    ctx.strokeStyle = SONGS[currentSong].color;
    ctx.globalAlpha = beatPulse * 0.4;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(LANES_X - 5, HIT_ZONE_Y);
    ctx.lineTo(LANES_X + LANES_TOTAL_W + 5, HIT_ZONE_Y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Hit zone arrows (targets)
  for (var hz = 0; hz < LANE_COUNT; hz++) {
    drawHitZoneArrow(getLaneX(hz), HIT_ZONE_Y, hz, laneFlash[hz]);
  }

  // Draw scrolling notes
  var scrollSpeed = 0.2;
  var lookAhead = SCROLL_AREA_H / scrollSpeed;

  for (var ni = 0; ni < notes.length; ni++) {
    var n = notes[ni];
    if (n.hit || n.missed) continue;
    var timeDiff = n.time - songTime;
    if (timeDiff < -200 || timeDiff > lookAhead) continue;

    var progress = 1 - (timeDiff / lookAhead);
    var ny = GH - 20 - progress * (GH - 20 - HIT_ZONE_Y);
    var alpha = Math.min(1, Math.max(0, progress * 3));

    // Themed notes for special types
    if (n.type !== 'normal') {
      drawThemedNote(getLaneX(n.lane), ny, n.lane, alpha, n.type);
    } else {
      drawArrow(getLaneX(n.lane), ny, n.lane, alpha);
    }

    // Proximity glow when close to hit zone
    if (timeDiff < 200 && timeDiff > 0) {
      var prox = 1 - (timeDiff / 200);
      ctx.globalAlpha = prox * 0.3;
      ctx.fillStyle = LANE_COLORS[n.lane];
      ctx.beginPath();
      ctx.arc(getLaneX(n.lane), ny, ARROW_SIZE * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Particles
  TAS.particles.draw();

  // Hit feedback texts
  for (var ft = 0; ft < hitTexts.length; ft++) {
    var ht = hitTexts[ft];
    ctx.globalAlpha = Math.min(1, ht.timer * 2);
    ctx.fillStyle = ht.color;
    ctx.font = 'bold ' + ht.size + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ht.text, ht.x, ht.y);
  }
  ctx.globalAlpha = 1;

  // Score popups
  for (var spi = 0; spi < scorePopups.length; spi++) {
    var pop = scorePopups[spi];
    ctx.globalAlpha = Math.min(1, pop.timer * 3);
    ctx.fillStyle = '#ffdd44';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(pop.text, pop.x, pop.y);
  }
  ctx.globalAlpha = 1;

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // === HUD ===
  // Health bar - wider for CON
  var hpBarW = 100 + Math.floor(conToughness() * 10);
  if (hpBarW > 140) hpBarW = 140;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(10, 8, hpBarW, 14);
  var healthColor = health > maxHealth * 0.5 ? '#44dd88' : health > maxHealth * 0.25 ? '#ffaa44' : '#ff4444';
  ctx.fillStyle = healthColor;
  ctx.fillRect(11, 9, (health / maxHealth) * (hpBarW - 2), 12);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, 8, hpBarW, 14);

  // HP text
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(Math.ceil(health) + '/' + maxHealth, 12, 18);

  // Song title
  ctx.fillStyle = '#888';
  ctx.font = '9px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(SONGS[currentSong].name, 12, 35);

  // STR power charge indicator
  if (strPowerCharge > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(10, 38, 60, 5);
    ctx.fillStyle = '#ffdd44';
    ctx.fillRect(10, 38, 60 * strPowerCharge, 5);
    ctx.fillStyle = '#aa8800';
    ctx.font = '7px monospace';
    ctx.fillText('PWR', 12, 52);
  }

  // Score
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText(String(score), GW / 2 - 50, 18);

  // Combo
  if (combo > 0) {
    var comboSize = Math.min(24, 12 + Math.floor(combo / 10) * 2);
    ctx.font = 'bold ' + comboSize + 'px monospace';
    ctx.fillStyle = multiplier >= 8 ? '#ff44aa' : multiplier >= 4 ? '#ffaa44' : multiplier >= 2 ? '#44ddff' : '#44dd88';
    ctx.textAlign = 'left';
    ctx.fillText(combo + 'x', 15, GH / 2 + 50);

    if (multiplier > 1) {
      ctx.font = '10px monospace';
      ctx.fillStyle = '#ffdd44';
      ctx.fillText(multiplier + 'x MULTI', 15, GH / 2 + 65);
    }

    // WIS combo grace indicator
    if (pendingComboBreak) {
      ctx.fillStyle = '#ff4444';
      ctx.font = '8px monospace';
      ctx.fillText('COMBO FADING...', 15, GH / 2 + 78);
    }
  }

  // Reactor energy bar
  drawReactorBar();

  // Progress bar (bottom)
  if (songTime > 0) {
    var progress = Math.min(1, Math.max(0, songTime / songDuration));
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, GH - 4, GW, 4);
    ctx.fillStyle = SONGS[currentSong].color;
    ctx.fillRect(0, GH - 4, GW * progress, 4);
    // Boss zone marker
    if (SONGS[currentSong].bossName) {
      var bossX = GW * 0.75;
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(bossX - 1, GH - 6, 2, 6);
      if (songTime < songDuration * 0.75) {
        ctx.font = '7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('BOSS', bossX, GH - 7);
      }
    }
  }

  // Countdown
  if (songTime < 0) {
    var countNum = Math.ceil(-songTime / 1000);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px monospace';
    ctx.globalAlpha = 0.7 + Math.sin(frame * 0.1) * 0.3;
    ctx.fillText(String(countNum), GW / 2, GH / 2 + 15);
    ctx.globalAlpha = 1;

    // Song info during countdown
    ctx.fillStyle = SONGS[currentSong].color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(SONGS[currentSong].name, GW / 2, GH / 2 - 30);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText(SONGS[currentSong].desc, GW / 2, GH / 2 - 15);
  }

  // Touch zones indicator (mobile)
  if (TAS.input.isMobile) {
    ctx.globalAlpha = 0.2;
    for (var ti = 0; ti < LANE_COUNT; ti++) {
      var tlx = getLaneX(ti);
      ctx.fillStyle = LANE_COLORS[ti];
      ctx.fillRect(tlx - LANE_WIDTH / 2, GH - 35, LANE_WIDTH, 30);
      ctx.fillStyle = '#fff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(LANE_NAMES[ti][0], tlx, GH - 17);
    }
    ctx.globalAlpha = 1;
  }
}

function drawResultsScreen() {
  ctx.fillStyle = 'rgba(10,5,24,0.92)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';

  // Title
  if (health <= 0) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('STAGE FAILED', GW / 2, 35);
  } else {
    ctx.fillStyle = '#44dd88';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('STAGE CLEAR!', GW / 2, 35);
  }

  // Song name
  ctx.fillStyle = SONGS[currentSong].color;
  ctx.font = '11px monospace';
  ctx.fillText(SONGS[currentSong].name + ' - ' + SONGS[currentSong].difficulty, GW / 2, 52);

  // Boss defeated?
  if (bossDefeated) {
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 10px monospace';
    ctx.fillText(SONGS[currentSong].bossName + ' DEFEATED!', GW / 2, 65);
  }

  // Grade with glow
  var gradeColors = { S: '#ffdd44', A: '#44dd88', B: '#44ddff', C: '#ffaa44', D: '#ff4444' };
  ctx.fillStyle = gradeColors[grade] || '#fff';
  ctx.font = 'bold 42px monospace';
  // Grade glow
  if (grade === 'S') {
    ctx.shadowColor = '#ffdd44';
    ctx.shadowBlur = 10 + Math.sin(frame * 0.1) * 5;
  }
  ctx.fillText(grade, GW / 2, 108);
  ctx.shadowBlur = 0;

  // Stats in two columns
  ctx.font = '11px monospace';
  var sx1 = GW / 2 - 100;
  var sx2 = GW / 2 + 20;
  var sy = 125;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#ffdd44';
  ctx.fillText('Score: ' + score, sx1, sy);
  ctx.fillStyle = '#888';
  ctx.fillText('Notes: ' + totalNotes, sx2, sy);
  sy += 14;

  ctx.fillStyle = '#44dd88';
  ctx.fillText('Perfect: ' + perfects, sx1, sy);
  ctx.fillStyle = '#44ddff';
  ctx.fillText('Great: ' + greats, sx2, sy);
  sy += 14;

  ctx.fillStyle = '#aaa';
  ctx.fillText('Good: ' + goods, sx1, sy);
  ctx.fillStyle = '#ff4444';
  ctx.fillText('Miss: ' + misses, sx2, sy);
  sy += 14;

  ctx.fillStyle = '#ffaa44';
  ctx.fillText('Max Combo: ' + maxCombo, sx1, sy);
  ctx.fillStyle = '#ff44aa';
  ctx.fillText('Multi: ' + multiplier + 'x', sx2, sy);
  sy += 16;

  // Stat contributions
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('STR pwr: ' + strPower().toFixed(1) + 'x', sx1, sy);
  ctx.fillText('DEX win: ' + dexWindow().toFixed(1) + 'x', sx2, sy);
  sy += 12;
  ctx.fillText('CON hp: ' + maxHealth, sx1, sy);
  ctx.fillText('INT scr: ' + intScoreMult().toFixed(1) + 'x', sx2, sy);
  sy += 12;
  ctx.fillText('WIS cmb: ' + wisComboWindow().toFixed(1) + 'x', sx1, sy);
  ctx.fillText('CHA bns: +' + chaBonusScore, sx2, sy);
  sy += 14;

  // High score
  var hi = highScores['song_' + currentSong];
  if (hi) {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('High Score: ' + hi, GW / 2, sy);
    sy += 14;
  }

  // Accuracy
  var total = perfects + greats + goods + misses;
  var accuracy = total > 0 ? Math.round((perfects * 3 + greats * 2 + goods) / (total * 3) * 100) : 0;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.fillText('Accuracy: ' + accuracy + '%', GW / 2, sy);
  sy += 16;

  // Unlock message
  if (health > 0 && currentSong < SONGS.length - 1 && (grade === 'S' || grade === 'A' || grade === 'B' || grade === 'C')) {
    ctx.fillStyle = '#44dd88';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('Unlocked: ' + SONGS[currentSong + 1].name + '!', GW / 2, sy);
    sy += 14;
  }

  // Reactor drops collected
  if (reactorDropsCollected > 0) {
    ctx.fillStyle = '#44ddff';
    ctx.font = '9px monospace';
    ctx.fillText('Reactor Drops: ' + reactorDropsCollected, GW / 2, sy);
  }

  // Continue prompt
  var pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY TO CONTINUE', GW / 2, GH - 12);
  ctx.globalAlpha = 1;
}

// === START ===
TAS.loop.start(update, draw);

})();
</script>
