// === STAT B SYSTEM (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// Single source of stat math: BaselingPlayer.getMults() -> {moveSpeed,health,damage,
// luck,swim}, already clamped to the single-player band (0.8–1.6). RPG, not a wager
// game -> default band. This game's helpers read the old D&D fields (statB.str/...),
// so we synthesize those from the bounded multipliers in recomputeStats(); every
// gameplay number still traces back to a clamped getMults().
//   SPD -> move speed,  STA -> max HP + lives,  PWR -> sword/spell damage,
//   LCK -> gold + drop rate,  SWM unused (no water).
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; statB.level = _b.level || statB.level; }
  }
} catch (e) { console.warn('[fungi-quest] NftLoader display info failed:', e && e.message); }
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.damage = m.damage;
  statB.speed = m.moveSpeed;
  statB.hpMult = m.health;
  statB.luck = m.luck;
  statB.scoreMult = 1;
  statB.cooldown = 1 / m.moveSpeed; // SPD -> faster spell cooldown
  statB.lives = m.health > 1.3 ? 1 : 0;
  statB.str = dnd(m.damage);
  statB.dex = dnd(m.moveSpeed);
  statB.con = dnd(m.health);
  statB.int = dnd(m.luck);
  statB.wis = dnd(m.luck);
  statB.cha = dnd(m.luck);
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[fungi-quest] player init failed:', e && e.message); });
}

// Draw a sprite bottom-anchored at (cx, bottom), aspect preserved, flipped when facing left.
function drawEnemySprite(im, cx, bottom, size, flip) {
  const s = size / Math.max(im.naturalWidth, im.naturalHeight);
  const dw = im.naturalWidth * s, dh = im.naturalHeight * s;
  const dx = cx - dw / 2, dy = bottom - dh;
  ctx.save();
  if (flip) { ctx.translate(dx + dw, dy); ctx.scale(-1, 1); ctx.drawImage(im, 0, 0, dw, dh); }
  else { ctx.drawImage(im, dx, dy, dw, dh); }
  ctx.restore();
}

// === LEVEL GENERATION ===
function generateRoom(area, room) {
  tiles = [];
  enemies = [];
  items = [];
  npcs = [];
  doors = [];
  platforms = [];
  hazards = [];
  corruptionParticles = [];

  const isTown = (area === 0 && room === 0) || (area === 2 && room === 0) ||
                 (area === 0 && room === 3) || (area === 4 && room === 0);
  const roomW = isTown ? 60 : 45 + Math.floor(Math.random() * 20);
  const roomH = ROWS;

  for (let x = 0; x < roomW; x++) {
    for (let y = 0; y < roomH; y++) {
      tiles.push({ x: x, y: y, solid: false, type: 'air' });
    }
  }

  let groundY = roomH - 2;
  for (let x = 0; x < roomW; x++) {
    const variation = isTown ? 0 : Math.floor(Math.sin(x * 0.3) * 2);
    const gy = Math.min(roomH - 1, Math.max(roomH - 4, groundY + variation));
    for (let y = gy; y < roomH; y++) {
      setTile(x, y, true, 'ground');
    }
    for (let y = 0; y < roomH; y++) {
      if (x === 0 || x === roomW - 1) setTile(x, y, true, 'wall');
    }
  }

  if (area === 1 || area === 4) {
    for (let x = 0; x < roomW; x++) {
      setTile(x, 0, true, 'wall');
      if (Math.random() < 0.3) setTile(x, 1, true, 'wall');
    }
  }

  if (!isTown) {
    const numPlats = 5 + Math.floor(Math.random() * 8);
    for (let i = 0; i < numPlats; i++) {
      const px = 3 + Math.floor(Math.random() * (roomW - 8));
      const py = 5 + Math.floor(Math.random() * (roomH - 9));
      const pw = 2 + Math.floor(Math.random() * 4);
      for (let dx = 0; dx < pw; dx++) {
        if (px + dx < roomW - 1) setTile(px + dx, py, true, 'platform');
      }
      platforms.push({ x: px * TILE, y: py * TILE, w: pw * TILE, h: TILE });
    }
    if (area >= 2) {
      for (let i = 0; i < 3; i++) {
        const lx = 5 + Math.floor(Math.random() * (roomW - 12));
        for (let ly = 4; ly < roomH - 4; ly += 3) {
          const side = (ly % 6 < 3) ? 0 : 3;
          setTile(lx + side, ly, true, 'platform');
          setTile(lx + side + 1, ly, true, 'platform');
        }
      }
    }

    // Spore cloud hazards (PASS 2)
    if (area >= 1) {
      const numHazards = Math.floor(Math.random() * (area + 1));
      for (let i = 0; i < numHazards; i++) {
        hazards.push({
          x: (5 + Math.floor(Math.random() * (roomW - 10))) * TILE,
          y: (groundY - 3 - Math.floor(Math.random() * 4)) * TILE,
          w: TILE * (2 + Math.floor(Math.random() * 2)),
          h: TILE * 2,
          type: 'spore_cloud',
          timer: 0,
          dmg: 1 + area
        });
      }
    }
    // Reactor vent hazards in caverns
    if (area === 1) {
      const numVents = 1 + Math.floor(Math.random() * 2);
      for (let i = 0; i < numVents; i++) {
        hazards.push({
          x: (6 + Math.floor(Math.random() * (roomW - 12))) * TILE,
          y: (groundY - 1) * TILE,
          w: TILE,
          h: TILE,
          type: 'reactor_vent',
          timer: 0,
          dmg: 2,
          active: false
        });
      }
    }
  }

  // Doors
  if (room < getRoomCount(area) - 1) {
    doors.push({ x: (roomW - 2) * TILE, y: (groundY - 3) * TILE, w: TILE, h: TILE * 3, target: { area: area, room: room + 1 }, locked: false });
  }
  if (room > 0) {
    doors.push({ x: TILE, y: (groundY - 3) * TILE, w: TILE, h: TILE * 3, target: { area: area, room: room - 1 }, locked: false });
  }
  if (room === getRoomCount(area) - 1 && area < 4) {
    const locked = !keyItems[area];
    doors.push({ x: (roomW - 3) * TILE, y: 3 * TILE, w: TILE * 2, h: TILE * 3, target: { area: area + 1, room: 0 }, locked: locked, isGate: true });
  }

  if (isTown) {
    setupTown(area, room, roomW, groundY);
  } else {
    spawnEnemies(area, room, roomW, groundY);
    // Item drops scaled by CHA
    if (Math.random() < Math.min(0.95, 0.4 * statB.luck)) {
      const ix = (5 + Math.floor(Math.random() * (roomW - 10))) * TILE;
      const iy = (groundY - 2) * TILE;
      const roll = Math.random();
      let itemType = 'gold';
      if (roll > 0.85) itemType = 'myco_potion';
      else if (roll > 0.6) itemType = 'potion';
      items.push({ x: ix, y: iy, type: itemType, value: Math.floor((10 + area * 15) * statB.luck) });
    }
    // LP Ring rare drop (CHA/luck)
    if (Math.random() < 0.08 * statB.luck) {
      const ix = (8 + Math.floor(Math.random() * (roomW - 16))) * TILE;
      const iy = (groundY - 3) * TILE;
      items.push({ x: ix, y: iy, type: 'lp_ring', value: 0 });
    }
    if (room === getRoomCount(area) - 2 && !keyItems[area]) {
      const kx = Math.floor(roomW / 2) * TILE;
      items.push({ x: kx, y: 4 * TILE, type: 'key', area: area });
    }
  }

  // Corruption particles
  for (let i = 0; i < (area + 1) * 8; i++) {
    corruptionParticles.push({
      x: Math.random() * roomW * TILE,
      y: Math.random() * roomH * TILE,
      vx: (Math.random() - 0.5) * 20,
      vy: -10 - Math.random() * 30,
      life: Math.random(),
      size: 1 + Math.random() * 3,
      color: area === 1 ? '#44ffaa' : area === 3 ? '#88ff44' : '#a855f7'
    });
  }

  return roomW;
}

function setTile(x, y, solid, type) {
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i].x === x && tiles[i].y === y) {
      tiles[i].solid = solid;
      tiles[i].type = type;
      return;
    }
  }
  tiles.push({ x: x, y: y, solid: solid, type: type });
}

function getTile(tx, ty) {
  for (let i = 0; i < tiles.length; i++) {
    if (tiles[i].x === tx && tiles[i].y === ty) return tiles[i];
  }
  return { solid: false, type: 'air' };
}

function isSolid(px, py) {
  const tx = Math.floor(px / TILE);
  const ty = Math.floor(py / TILE);
  return getTile(tx, ty).solid;
}

function getRoomCount(area) {
  return [4, 5, 4, 5, 4][area];
}

// === TOWN SETUP ===
