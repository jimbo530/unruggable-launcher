    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'Welcome to the Garden Market! Spend your POOP wisely. Press UP to browse.', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'Rest at the Compost Inn. Your baseling will be good as new! (10 POOP)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'sage', dialog: 'Every baseling needs a trick. The POOP Splash will be your first weapon!', teach: 0 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'villager', dialog: 'The Reactor Caverns are infested with bark mold... the reactors draw them in!' });
  } else if (area === 0 && room === 3) {
    npcs.push({ x: 10 * TILE, y: ty, type: 'guard', dialog: 'The garden gate is locked. Find the Garden Key deeper in these tunnels, baseling.' });
    npcs.push({ x: 20 * TILE, y: ty, type: 'shopkeep', dialog: 'Compost Brews for the road? They restore both body and mind!', shop: 'item' });
  } else if (area === 2 && room === 0) {
    npcs.push({ x: 8 * TILE, y: ty, type: 'elder', dialog: 'The blight grows stronger above, baseling. Reactor Bolts can chain between foes!' });
    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'Weapons composted from reactor spores!', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'A warm garden bed and mushroom stew. (30 POOP)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'sage', dialog: 'The reactor energy flows through your baseling! Learn Reactor Bolt!', teach: 1 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'shopkeep', dialog: 'Armor grown from garden mycelium!', shop: 'armor' });
    npcs.push({ x: 48 * TILE, y: ty, type: 'sage', dialog: 'A Spore Shield will protect your baseling from harm. Learn it well!', teach: 2 });
  } else if (area === 4 && room === 0) {
    npcs.push({ x: 8 * TILE, y: ty, type: 'elder', dialog: 'The Blight Tyrant awaits at the crown, baseling. Only the Blight spell can ensure victory.' });
    npcs.push({ x: 16 * TILE, y: ty, type: 'shopkeep', dialog: 'The finest reactor-forged gear in all Tasern!', shop: 'weapon' });
    npcs.push({ x: 24 * TILE, y: ty, type: 'innkeep', dialog: 'Rest your baseling before the final battle. (50 POOP)', shop: 'inn' });
    npcs.push({ x: 32 * TILE, y: ty, type: 'sage', dialog: 'The Blight spell turns corruption against itself. Use it wisely, baseling...', teach: 5 });
    npcs.push({ x: 40 * TILE, y: ty, type: 'shopkeep', dialog: 'Spore boots - last chance to stock up!', shop: 'boots' });
  }
}

// === ENEMY SPAWNING ===
function spawnEnemies(area, room, roomW, groundY) {
  const count = 3 + area * 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const ex = (4 + Math.floor(Math.random() * (roomW - 8))) * TILE;
    const ey = (groundY - 2) * TILE;
    const type = getEnemyType(area, room);
    enemies.push(createEnemy(type, ex, ey));
  }
  if (room === getRoomCount(area) - 1 && area > 0) {
    const bx = Math.floor(roomW / 2) * TILE;
    const boss = createBoss(area, bx, (groundY - 4) * TILE);
    enemies.push(boss);
    bossActive = true;
    bossHP = boss.hp;
    bossMaxHP = boss.hp;
    bossPhase = 0;
  }
}

function getEnemyType(area, room) {
  const types = [
    ['spore_slime', 'cave_bat'],
    ['spore_slime', 'cave_bat', 'spore_dwarf', 'dark_fungus'],
    ['spore_dwarf', 'dark_fungus', 'reactor_elf', 'mycelial_beast'],
    ['cave_bat', 'reactor_elf', 'mycelial_beast', 'fungal_knight'],
    ['fungal_knight', 'spore_wizard', 'mycelial_beast', 'reactor_elf']
  ];
  const pool = types[area];
  return pool[Math.floor(Math.random() * pool.length)];
}

function createEnemy(type, x, y) {
  const base = { x: x, y: y, vx: 0, vy: 0, facing: -1, hp: 1, maxHp: 1, dmg: 1, xp: 5, gold: 5, w: 14, h: 14, type: type, attackTimer: 0, moveTimer: 0, alive: true, flash: 0, animFrame: 0 };
  switch (type) {
    case 'spore_slime': return Object.assign(base, { hp: 3, maxHp: 3, dmg: 1, xp: 5, gold: 5, w: 12, h: 10, color: '#44cc44' });
    case 'cave_bat': return Object.assign(base, { hp: 2, maxHp: 2, dmg: 1, xp: 8, gold: 3, w: 14, h: 10, color: '#886644', flying: true, vy: -30 });
    case 'spore_dwarf': return Object.assign(base, { hp: 6, maxHp: 6, dmg: 2, xp: 18, gold: 14, w: 12, h: 16, color: '#8866aa', charges: true });
    case 'dark_fungus': return Object.assign(base, { hp: 8, maxHp: 8, dmg: 3, xp: 20, gold: 18, color: '#8822aa', w: 16, h: 16 });
    case 'reactor_elf': return Object.assign(base, { hp: 7, maxHp: 7, dmg: 2, xp: 25, gold: 20, w: 12, h: 22, color: '#44ddaa', shoots: true, teleports: true, teleTimer: 0 });
    case 'mycelial_beast': return Object.assign(base, { hp: 12, maxHp: 12, dmg: 4, xp: 35, gold: 28, color: '#668844', w: 20, h: 18, spawnsSpores: true, sporeTimer: 0 });
    case 'fungal_knight': return Object.assign(base, { hp: 14, maxHp: 14, dmg: 4, xp: 30, gold: 25, color: '#556677', w: 14, h: 24 });
    case 'spore_wizard': return Object.assign(base, { hp: 7, maxHp: 7, dmg: 5, xp: 35, gold: 30, color: '#6644aa', w: 12, h: 22, shoots: true });
    default: return Object.assign(base, { hp: 3, maxHp: 3, color: '#44cc44' });
  }
}

function createBoss(area, x, y) {
  const bosses = [
    null,
    { name: 'Root Blight Warden', hp: 35, dmg: 3, xp: 100, gold: 80, w: 32, h: 32, color: '#38d973', type: 'boss_warden' },
    { name: 'Reactor Colossus', hp: 55, dmg: 5, xp: 200, gold: 150, w: 40, h: 28, color: '#3cacd7', type: 'boss_colossus' },
    { name: 'Canopy Parasite', hp: 75, dmg: 6, xp: 350, gold: 200, w: 36, h: 36, color: '#38d973', type: 'boss_hydra' },
    { name: 'The Blight Tyrant', hp: 130, dmg: 8, xp: 600, gold: 500, w: 48, h: 48, color: '#a855f7', type: 'boss_tyrant' }
  ];
  const b = bosses[area];
  return { x: x, y: y, vx: 0, vy: 0, facing: -1, hp: b.hp, maxHp: b.hp, dmg: b.dmg, xp: b.xp, gold: b.gold, w: b.w, h: b.h, type: b.type, color: b.color, name: b.name, attackTimer: 0, moveTimer: 0, alive: true, flash: 0, isBoss: true, animFrame: 0, phaseTimer: 0 };
}

// === ROOM WIDTH TRACKING ===
let roomWidth = 0;

function loadRoom(area, room) {
  currentArea = area;
  currentRoom = room;
  bossActive = false;
  bossHP = 0;
  bossPhase = 0;
  roomWidth = generateRoom(area, room) * TILE;
  if (transTarget && transTarget.room > currentRoom - 1) {
    player.x = 48;
  } else if (transTarget && transTarget.room < currentRoom + 1) {
    player.x = roomWidth - 64;
  } else {
    player.x = 64;
  }
  player.y = (ROWS - 5) * TILE;
  player.vy = 0;
  player.vx = 0;
  camera.x = Math.max(0, player.x - GW / 2);
  transTarget = null;
}

// === PLAYER UPDATE ===
function updatePlayer(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  // CONTROL STANDARD (§7c): Arrows = MOVE. WASD = action cluster (W jump, A attack,
  // S spell, D menu). Legacy keys (Z/X attack, Space jump) kept as hidden alts.
  let moveX = 0;
  if (keys['ArrowLeft'] || touch.left) moveX = -1;
  if (keys['ArrowRight'] || touch.right) moveX = 1;

  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touch.a || touch.up;
  const attackPressed = keys['KeyA'] || keys['KeyZ'] || keys['KeyX'] || touch.b;
  const crouchPressed = keys['ArrowDown'] || touch.down;

  player.crouching = crouchPressed && player.onGround && !player.attacking;

  // Movement scaled by DEX/speed
  const moveSpeed = Math.floor(BASE_MOVE_SPEED * statB.speed);
  if (!player.attacking || !player.onGround) {
    player.vx = moveX * moveSpeed;
    if (moveX !== 0) {
      player.facing = moveX;
      player.walkFrame += dt * 8;
    }
  } else {
    player.vx = 0;
  }

  // Jump
  if (jumpPressed && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
    TAS.audio.playTone(260, 0.1, 'square', 0.06, 400);
  }

  // Spore boots
  if (sporeBootTimer > 0) {
    if (jumpPressed && !player.onGround) {
      player.vy = Math.max(player.vy - 500 * dt, -200);
    }
    sporeBootTimer -= dt;
    if (sporeBootTimer <= 0) sporeBootTimer = 0;
  }

  // Attack with STR scaling
  if (attackPressed && !player.attacking && player.attackTimer <= 0) {
    player.attacking = true;
    player.attackTimer = 0.3;
    TAS.audio.playTone(180, 0.08, 'sawtooth', 0.06, 100);
    performAttack();
  }
  if (player.attackTimer > 0) {
    player.attackTimer -= dt;
    if (player.attackTimer <= 0) {
      player.attacking = false;
    }
  }

  // Gravity
  if (!player.onGround) {
    player.vy += GRAVITY * dt;
    if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  }

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  resolveCollisions();

  if (player.invuln > 0) player.invuln -= dt;

  // Spell cooldown scaled by WIS
  if (spellCooldown > 0) spellCooldown -= dt;

  // Spore Shield timer
  if (shieldTimer > 0) shieldTimer -= dt;

  // LP Ring timer
  if (lpRingTimer > 0) {
    lpRingTimer -= dt;
    if (lpRingTimer <= 0) { lpRingActive = false; lpRingTimer = 0; }
  }

  // Camera
  const targetCamX = player.x - GW / 2 + player.w / 2;
  camera.x += (targetCamX - camera.x) * 4 * dt;
  camera.x = TAS.math.clamp(camera.x, 0, Math.max(0, roomWidth - GW));

  // Parallax scroll
  parallaxOffset = camera.x * 0.3;

  // Bounds
  if (player.x < TILE) player.x = TILE;
  if (player.x > roomWidth - TILE - player.w) player.x = roomWidth - TILE - player.w;

  // Fall death
  if (player.y > ROWS * TILE + 50) {
    takeDamage(5);
    player.y = (ROWS - 6) * TILE;
    player.vy = 0;
  }
}

function resolveCollisions() {
  player.onGround = false;

  const pyTop = Math.floor(player.y / TILE);
  const pyBot = Math.floor((player.y + player.h - 1) / TILE);

  if (player.vx < 0) {
    const lx = Math.floor(player.x / TILE);
    for (let ty = pyTop; ty <= pyBot; ty++) {
      if (getTile(lx, ty).solid) {
        player.x = (lx + 1) * TILE;
        player.vx = 0;
        break;
      }
    }
  }
  if (player.vx > 0) {
    const rx = Math.floor((player.x + player.w) / TILE);
    for (let ty = pyTop; ty <= pyBot; ty++) {
      if (getTile(rx, ty).solid) {
        player.x = rx * TILE - player.w;
        player.vx = 0;
        break;
      }
    }
  }
  if (player.vy >= 0) {
    const by = Math.floor((player.y + player.h) / TILE);
    const lx = Math.floor(player.x / TILE);
    const rx = Math.floor((player.x + player.w - 1) / TILE);
    for (let tx = lx; tx <= rx; tx++) {
      if (getTile(tx, by).solid) {
        player.y = by * TILE - player.h;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
  }
  if (player.vy < 0) {
    const ty = Math.floor(player.y / TILE);
    const lx = Math.floor(player.x / TILE);
    const rx = Math.floor((player.x + player.w - 1) / TILE);
    for (let tx = lx; tx <= rx; tx++) {
      if (getTile(tx, ty).solid) {
        player.y = (ty + 1) * TILE;
        player.vy = 0;
        break;
      }
    }
  }
}

function performAttack() {
  const sword = SWORDS[player.sword];
  const baseDmg = sword.dmg;
  const finalDmg = Math.floor(baseDmg * statB.damage);
  const ax = player.x + (player.facing > 0 ? player.w : -sword.range);
  const ay = player.crouching ? player.y + player.h - 12 : player.y + 4;
  const aw = sword.range;
  const ah = 12;

  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    if (TAS.hit.rectOverlap(ax, ay, aw, ah, e.x, e.y, e.w, e.h)) {
      hitEnemy(e, finalDmg);
    }
  }
}

function hitEnemy(e, dmg) {
  e.hp -= dmg;
  e.flash = 0.15;
  TAS.audio.playTone(100, 0.05, 'square', 0.08);
  TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#fff', 5, 2);

  if (e.hp <= 0) {
    e.alive = false;
    const goldDrop = Math.floor(e.gold * statB.luck * (lpRingActive ? 1.5 : 1));
    const xpDrop = Math.floor(e.xp * statB.scoreMult);
    player.xp += xpDrop;
    player.gold += goldDrop;
    score += xpDrop;
    TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, e.color, 12, 3, { gravity: 1 });
    TAS.audio.playTone(500, 0.15, 'square', 0.06, 200);
    checkRankUp();
    if (e.isBoss) {
      bossActive = false;
      bossHP = 0;
      TAS.fx.shake(12, 0.92);
      TAS.fx.flash('#fff', 0.5);
      TAS.audio.playMelody([[523, 0.15], [659, 0.15], [784, 0.2]], 150);
      // Burst of spore particles on boss death
      for (let p = 0; p < 30; p++) {
        TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, e.color, 1, 4, { gravity: 0.5 });
      }
      if (currentArea === 4) {
        state = 'victory';
        victoryTimer = 0;
      }
    }
  }
}

function takeDamage(dmg) {
  if (player.invuln > 0) return;
  // Spore Shield blocks damage
  if (shieldTimer > 0) {
    shieldTimer = 0;
    TAS.fx.flash('#88ff44', 0.3);
    TAS.audio.playTone(600, 0.1, 'sine', 0.05, 300);
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#88ff44', 10, 3);
    return;
  }
  const totalDef = ARMORS[player.armor].def + SHIELDS[player.shield].def;
  const actualDmg = Math.max(1, dmg - Math.floor(totalDef / 2));
  player.hp -= actualDmg;
  player.invuln = INVULN_TIME;
  TAS.fx.flash('#ff0000', 0.3);
  TAS.fx.shake(4, 0.9);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.08, 50);

  if (player.hp <= 0) {
    playerDeath();
  }
}

function playerDeath() {
  player.lives--;
  if (player.lives <= 0) {
    state = 'dead';
    deathTimer = 3;
    player.gold = Math.floor(player.gold / 2);
    TAS.audio.playMelody([[200, 0.2], [150, 0.2], [100, 0.3]], 200);
  } else {
    player.hp = Math.floor(player.maxHp * 0.5);
    player.invuln = 2;
    showDialog('Your baseling fell! ' + player.lives + ' lives remaining.');
    TAS.audio.playTone(150, 0.2, 'sawtooth', 0.08, 80);
  }
}

function checkRankUp() {
  const nextRank = player.rank + 1;
  if (nextRank < RANKS.length && player.xp >= RANKS[nextRank].xp) {
    player.rank = nextRank;
    player.maxHp = Math.floor(RANKS[nextRank].hp * statB.hpMult);
    player.maxMp = Math.floor(RANKS[nextRank].mp * statB.scoreMult);
    player.hp = player.maxHp;
    player.mp = player.maxMp;
    // CON grants extra life at certain ranks
    if (nextRank === 3 || nextRank === 6) {
      player.lives = Math.min(5, player.lives + 1);
      showDialog('Rank Up! ' + RANKS[nextRank].name + '! +1 Life!');
    } else {
      showDialog('Rank Up! Your baseling is now a ' + RANKS[nextRank].name + '!');
    }
    TAS.fx.flash('#f4b41b', 0.4);
    TAS.audio.playMelody([[440, 0.1], [554, 0.1], [659, 0.1], [880, 0.2]], 120);
  }
}

// === SPELL CASTING ===
function castSpell() {
  if (spellCooldown > 0) {
    showDialog('Spell cooling down!');
    return;
  }
  const spell = SPELLS[player.currentSpell];
  if (!player.spells[player.currentSpell]) return;
  if (player.mp < spell.cost) {
    showDialog('Not enough MP!');
    return;
  }
  player.mp -= spell.cost;
  // WIS-scaled cooldown
  spellCooldown = 0.8 * statB.cooldown;
  TAS.audio.playTone(400, 0.2, 'sine', 0.08, 800);

  // INT-scaled magic damage
  const magicDmg = Math.floor(spell.dmg * statB.damage);

  if (spell.type === 'projectile') {
    projectiles.push({
      x: player.x + player.w / 2,
      y: player.y + player.h / 2,
      vx: player.facing * 250,
      vy: 0,
      dmg: magicDmg,
      color: spell.color,
      life: 2,
      size: 6,
      friendly: true
    });
  } else if (spell.type === 'chain') {
    // Reactor Bolt - chain lightning hitting up to 3 enemies
    let hits = 0;
    let lastX = player.x + player.w / 2;
    let lastY = player.y + player.h / 2;
    const maxChain = 3;
    const hitSet = new Set();
    for (let c = 0; c < maxChain; c++) {
      let nearest = null;
      let nearDist = 200;
      for (let i = 0; i < enemies.length; i++) {
        const e = enemies[i];
        if (!e.alive || hitSet.has(i)) continue;
        const d = Math.sqrt((e.x - lastX) * (e.x - lastX) + (e.y - lastY) * (e.y - lastY));
        if (d < nearDist) { nearDist = d; nearest = e; nearest._idx = i; }
      }
      if (nearest) {
        hitSet.add(nearest._idx);
        hitEnemy(nearest, magicDmg);
        // Chain bolt visual
        projectiles.push({
          x: lastX, y: lastY,
          vx: (nearest.x + nearest.w / 2 - lastX) * 4,
          vy: (nearest.y + nearest.h / 2 - lastY) * 4,
          dmg: 0, color: '#44ffaa', life: 0.2, size: 4, friendly: true, noHit: true
        });
        lastX = nearest.x + nearest.w / 2;
        lastY = nearest.y + nearest.h / 2;
        hits++;
        TAS.particles.spawn(nearest.x + nearest.w / 2, nearest.y + nearest.h / 2, '#44ffaa', 8, 2);
      }
    }
    if (hits === 0) {
      // Fire forward if no targets
      projectiles.push({ x: player.x + player.w / 2, y: player.y + player.h / 2, vx: player.facing * 300, vy: 0, dmg: magicDmg, color: '#44ffaa', life: 1.5, size: 5, friendly: true });
    }
    TAS.fx.flash('#44ffaa', 0.2);
  } else if (spell.type === 'shield') {
    // Spore Shield - absorbs next hit
    shieldTimer = 8;
    TAS.particles.spawn(player.x + player.w / 2, player.y + player.h / 2, '#88ff44', 15, 3);
    TAS.audio.playTone(500, 0.15, 'sine', 0.06, 700);
    showDialog('Spore Shield active!');
  } else if (spell.type === 'screen') {
    TAS.fx.flash(spell.color, 0.6);
    TAS.fx.shake(6, 0.9);
    TAS.audio.playNoise(0.3, 0.1, 2000);
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (!e.alive) continue;
      if (e.x > camera.x - 20 && e.x < camera.x + GW + 20) {
        hitEnemy(e, magicDmg);
      }
    }
  } else if (spell.type === 'single') {
    let nearest = null;
    let nearDist = Infinity;
    for (let i = 0; i < enemies.length; i++) {
      const e = enemies[i];
      if (!e.alive) continue;
      const d = Math.abs(e.x - player.x);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (nearest) {
      hitEnemy(nearest, magicDmg);
      TAS.particles.spawn(nearest.x + nearest.w / 2, nearest.y + nearest.h / 2, '#880088', 20, 4);
      TAS.fx.flash('#440044', 0.4);
    }
  }
}

// === ENEMY AI ===
function updateEnemies(dt) {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;
    if (e.flash > 0) e.flash -= dt;
    e.moveTimer += dt;
    e.animFrame += dt * 4;

    if (e.flying) {
      e.x += Math.cos(e.moveTimer * 3) * 60 * dt;
      e.y += Math.sin(e.moveTimer * 2) * 40 * dt;
    } else if (e.isBoss) {
      updateBossAI(e, dt);
    } else {
      // Ground movement
      if (e.moveTimer > 1.5) {
        e.facing = (player.x > e.x) ? 1 : -1;
        e.moveTimer = 0;
      }

      // Spore Dwarf charge behavior
      if (e.charges && Math.abs(player.x - e.x) < 120) {
        e.vx = e.facing * (100 + currentArea * 15);
      } else {
        e.vx = e.facing * (40 + currentArea * 10);
      }
      e.x += e.vx * dt;

      e.vy += GRAVITY * dt;
      if (e.vy > MAX_FALL) e.vy = MAX_FALL;
      e.y += e.vy * dt;

      const by = Math.floor((e.y + e.h) / TILE);
      const tx = Math.floor((e.x + e.w / 2) / TILE);
      if (getTile(tx, by).solid) {
        e.y = by * TILE - e.h;
        e.vy = 0;
      }

      const wx = Math.floor((e.x + (e.facing > 0 ? e.w : 0)) / TILE);
      const wy = Math.floor((e.y + e.h / 2) / TILE);
      if (getTile(wx, wy).solid) {
        e.facing *= -1;
      }

      // Reactor Elf teleport
      if (e.teleports) {
        e.teleTimer += dt;
        if (e.teleTimer > 3 && Math.abs(e.x - player.x) < 150) {
          e.teleTimer = 0;
          const newX = player.x + (Math.random() < 0.5 ? -80 : 80);
          if (newX > TILE && newX < roomWidth - TILE) {
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#44ddaa', 10, 2);
            e.x = newX;
            TAS.particles.spawn(e.x + e.w / 2, e.y + e.h / 2, '#44ddaa', 10, 2);
          }
        }
      }

      // Mycelial Beast spore spawn
      if (e.spawnsSpores) {
        e.sporeTimer += dt;
        if (e.sporeTimer > 2.5 && Math.abs(e.x - player.x) < 180) {
          e.sporeTimer = 0;
          projectiles.push({
            x: e.x + e.w / 2, y: e.y,
            vx: (Math.random() - 0.5) * 60,
            vy: -80 - Math.random() * 40,
            dmg: 1, color: '#88aa22', life: 2.5, size: 5, friendly: false, isSpore: true
          });
        }
      }

      // Shooting enemies
      if (e.shoots) {
        e.attackTimer += dt;
        if (e.attackTimer > 2 && Math.abs(e.x - player.x) < 200) {
          e.attackTimer = 0;
          const dir = player.x > e.x ? 1 : -1;
          projectiles.push({
            x: e.x + e.w / 2, y: e.y + e.h / 2,
            vx: dir * 150, vy: 0,
            dmg: e.dmg, color: e.type === 'reactor_elf' ? '#44ffaa' : '#ff4444',
            life: 3, size: 4, friendly: false
          });
        }
      }
    }

    // Player collision
    if (player.invuln <= 0 && e.alive) {
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
        takeDamage(e.dmg);
        player.vy = -150;
        player.vx = (player.x < e.x) ? -100 : 100;
      }
    }
  }
}

function updateBossAI(boss, dt) {
  boss.attackTimer += dt;
  boss.moveTimer += dt;
  boss.phaseTimer += dt;

  // Phase transitions at 66% and 33% HP
  const hpPct = boss.hp / boss.maxHp;
  const newPhase = hpPct < 0.33 ? 2 : hpPct < 0.66 ? 1 : 0;
  if (newPhase > bossPhase) {
    bossPhase = newPhase;
    TAS.fx.flash(boss.color, 0.4);
    TAS.fx.shake(6, 0.9);
    TAS.audio.playTone(60, 0.3, 'sawtooth', 0.1, 30);
    // Phase change burst
    for (let p = 0; p < 15; p++) {
      TAS.particles.spawn(boss.x + boss.w / 2, boss.y + boss.h / 2, boss.color, 1, 3, { gravity: 0.5 });
    }
  }

  const speed = 50 + bossPhase * 20;
  const dx = player.x - boss.x;
  boss.facing = dx > 0 ? 1 : -1;
  boss.x += boss.facing * speed * dt;

  // Jump (more frequent in later phases)
  const jumpInterval = 3 - bossPhase * 0.7;
  if (boss.moveTimer > jumpInterval) {
    boss.vy = -250 - bossPhase * 30;
    boss.moveTimer = 0;
    TAS.fx.shake(3 + bossPhase, 0.9);
  }

  boss.vy += GRAVITY * dt;
  if (boss.vy > MAX_FALL) boss.vy = MAX_FALL;
  boss.y += boss.vy * dt;

  const by = Math.floor((boss.y + boss.h) / TILE);
  const tx = Math.floor((boss.x + boss.w / 2) / TILE);
  if (getTile(tx, by).solid) {
    if (boss.vy > 200) {
      TAS.fx.shake(4, 0.9);
    }
    boss.y = by * TILE - boss.h;
    boss.vy = 0;
  }

  // Attack patterns by phase
  const attackInterval = Math.max(0.5, 1.5 - bossPhase * 0.4);
  if (boss.attackTimer > attackInterval) {
    boss.attackTimer = 0;
    const spreadCount = 3 + bossPhase;
    for (let a = 0; a < spreadCount; a++) {
      const angle = -0.5 + (a / (spreadCount - 1)) * 1.0;
      projectiles.push({
        x: boss.x + boss.w / 2,
        y: boss.y + boss.h / 2,
        vx: boss.facing * 120 * Math.cos(angle),
        vy: -50 + Math.sin(angle) * 80,
        dmg: boss.dmg,
        color: boss.color,
        life: 3,
        size: 5 + bossPhase,
        friendly: false
      });
    }
    TAS.audio.playTone(80 - bossPhase * 10, 0.15, 'sawtooth', 0.06);
  }

  bossHP = boss.hp;
}

// === HAZARDS ===
function updateHazards(dt) {
  for (let i = 0; i < hazards.length; i++) {
    const h = hazards[i];
    h.timer += dt;

    if (h.type === 'spore_cloud') {
      // Pulsing damage cloud
      if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x, h.y, h.w, h.h)) {
        if (Math.sin(h.timer * 3) > 0.8 && player.invuln <= 0) {
          takeDamage(h.dmg);
        }
      }
    } else if (h.type === 'reactor_vent') {
      // Periodic eruption
      h.active = Math.sin(h.timer * 1.5) > 0.6;
      if (h.active && TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, h.x - 4, h.y - TILE * 3, h.w + 8, TILE * 3)) {
        if (player.invuln <= 0) {
          takeDamage(h.dmg);
          player.vy = -200;
        }
      }
    }
  }
}

// === PROJECTILES ===
function updateProjectiles(dt) {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    // Spore projectiles fall
    if (p.isSpore) p.vy += 60 * dt;

    if (p.life <= 0) { projectiles.splice(i, 1); continue; }

    if (p.friendly && !p.noHit) {
      for (let j = 0; j < enemies.length; j++) {
        const e = enemies[j];
        if (!e.alive) continue;
        if (TAS.hit.rectOverlap(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2, e.x, e.y, e.w, e.h)) {
          hitEnemy(e, p.dmg);
          projectiles.splice(i, 1);
          break;
        }
      }
    } else if (!p.friendly) {
      if (player.invuln <= 0 && TAS.hit.rectOverlap(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2, player.x, player.y, player.w, player.h)) {
        takeDamage(p.dmg);
        projectiles.splice(i, 1);
      }
    }
  }
}

// === ITEM PICKUP ===
function checkItems() {
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, item.x, item.y, TILE, TILE)) {
      if (item.type === 'gold') {
        const goldAmt = Math.floor(item.value * statB.luck * (lpRingActive ? 1.5 : 1));
        player.gold += goldAmt;
        score += Math.floor(goldAmt * 0.5);
        TAS.audio.playTone(800, 0.08, 'square', 0.05);
      } else if (item.type === 'potion') {
        player.hp = Math.min(player.maxHp, player.hp + Math.floor(10 * statB.hpMult));
        TAS.audio.playTone(600, 0.12, 'sine', 0.06, 900);
        TAS.particles.spawn(player.x + player.w / 2, player.y, '#44ff44', 8, 2);
      } else if (item.type === 'myco_potion') {
        // Myco Potion restores both HP and MP
        player.hp = Math.min(player.maxHp, player.hp + Math.floor(8 * statB.hpMult));
        player.mp = Math.min(player.maxMp, player.mp + Math.floor(6 * statB.scoreMult));
        TAS.audio.playTone(650, 0.12, 'sine', 0.06, 850);
        TAS.particles.spawn(player.x + player.w / 2, player.y, '#88aaff', 10, 2);
        showDialog('Compost Brew! HP and MP restored!');
      } else if (item.type === 'lp_ring') {
        // Yield Ring boosts POOP/drop rate for 30 seconds
        lpRingActive = true;
        lpRingTimer = 30;
        TAS.audio.playMelody([[600, 0.1], [800, 0.1], [1000, 0.12]], 100);
        TAS.particles.spawn(player.x + player.w / 2, player.y, '#f4b41b', 15, 3);
        showDialog('Yield Ring! POOP boost for 30 seconds!');
      } else if (item.type === 'key') {
        keyItems[item.area] = true;
        TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.15]], 120);
        showDialog('Got the ' + AREA_NAMES[item.area] + ' Garden Key!');
        TAS.fx.flash('#f4b41b', 0.3);
      }
      items.splice(i, 1);
    }
  }
}

// === DOOR INTERACTIONS ===
function checkDoors() {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  if (!(keys['ArrowUp'] || keys['KeyW'] || touch.up)) return;

  for (let i = 0; i < doors.length; i++) {
    const d = doors[i];
    if (TAS.hit.rectOverlap(player.x, player.y, player.w, player.h, d.x, d.y, d.w, d.h)) {
      if (d.locked) {
        showDialog('This gate is locked. Find the ' + AREA_NAMES[d.target.area - 1] + ' Garden Key!');
        return;
      }
      transTarget = d.target;
      state = 'transition';
      transTimer = 0.5;
      TAS.audio.playTone(300, 0.2, 'sine', 0.06, 600);
      return;
    }
  }
}

// === NPC INTERACTIONS ===
function checkNPCs() {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;
  if (!(keys['ArrowUp'] || keys['KeyW'] || touch.up)) return;

  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i];
    if (Math.abs(player.x - n.x) < 24 && Math.abs(player.y - n.y) < 30) {
      if (n.shop === 'weapon') {
        openShop('weapon');
      } else if (n.shop === 'armor') {
        openShop('armor');
      } else if (n.shop === 'item') {
        openShop('item');
      } else if (n.shop === 'boots') {
        openShop('boots');
      } else if (n.shop === 'inn') {
        if (player.gold >= getInnCost()) {
          player.gold -= getInnCost();
          player.hp = player.maxHp;
          player.mp = player.maxMp;
          player.lastTown = currentArea;
          // CON bonus: inn also grants extra life if low
          if (statB.lives > 0 && player.lives < 3) {
            player.lives++;
            showDialog('Your baseling feels great! CON bonus: +1 Life! Game saved.');
          } else {
            showDialog('Your baseling feels great! Game saved.');
          }
          saveGame();
          TAS.audio.playMelody([[440, 0.15], [554, 0.15], [659, 0.2]], 150);
        } else {
          showDialog('Not enough POOP! Need ' + getInnCost() + ' POOP.');
        }
      } else if (n.teach !== undefined) {
        if (!player.spells[n.teach]) {
          player.spells[n.teach] = true;
          player.currentSpell = n.teach;
          showDialog('Your baseling learned ' + SPELLS[n.teach].name + '! Select spells with S key.');
          TAS.audio.playMelody([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.2]], 100);
        } else {
          showDialog(n.dialog);
        }
      } else {
        showDialog(n.dialog);
      }
      return;
    }
  }
}

function getInnCost() {
  return [10, 20, 30, 40, 50][currentArea];
}

// === SHOP SYSTEM ===
function openShop(type) {
  shopMode = type;
  shopCursor = 0;
  state = 'shop';
  shopItems = [];

  if (type === 'weapon') {
    for (let i = 0; i < SWORDS.length; i++) {
      if (i > player.sword) shopItems.push({ name: SWORDS[i].name, cost: SWORDS[i].cost, type: 'sword', idx: i });
    }
  } else if (type === 'armor') {
    for (let i = 0; i < ARMORS.length; i++) {
      if (i > player.armor) shopItems.push({ name: ARMORS[i].name, cost: ARMORS[i].cost, type: 'armor', idx: i });
    }
    for (let i = 0; i < SHIELDS.length; i++) {
      if (i > player.shield) shopItems.push({ name: SHIELDS[i].name, cost: SHIELDS[i].cost, type: 'shield', idx: i });
    }
  } else if (type === 'item') {
    shopItems.push({ name: 'Spore Elixir', cost: 20 + currentArea * 10, type: 'hpot' });
    shopItems.push({ name: 'Compost Brew', cost: 35 + currentArea * 10, type: 'myco' });
    shopItems.push({ name: 'Garden Tonic', cost: 30 + currentArea * 10, type: 'mpot' });
  } else if (type === 'boots') {
    shopItems.push({ name: 'Spore Boots', cost: 200, type: 'wings' });
    shopItems.push({ name: 'Compost Brew', cost: 35 + currentArea * 10, type: 'myco' });
  }
  shopItems.push({ name: 'Leave', cost: 0, type: 'exit' });
}

function updateShop(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowDown'] || touch.down) {
    if (!keys._shopDown) {
      shopCursor = (shopCursor + 1) % shopItems.length;
      keys._shopDown = true;
      TAS.audio.playTone(300, 0.05, 'square', 0.04);
    }
  } else { keys._shopDown = false; }

  if (keys['ArrowUp'] || touch.up) {
    if (!keys._shopUp) {
      shopCursor = (shopCursor - 1 + shopItems.length) % shopItems.length;
      keys._shopUp = true;
      TAS.audio.playTone(300, 0.05, 'square', 0.04);
    }
  } else { keys._shopUp = false; }

  if (keys['KeyZ'] || keys['Enter'] || touch.a) {
    if (!keys._shopSelect) {
      keys._shopSelect = true;
      const item = shopItems[shopCursor];
      if (item.type === 'exit') {
        state = 'playing';
        return;
      }
      if (player.gold < item.cost) {
        showDialog('Not enough POOP!');
        state = 'playing';
        return;
      }
      player.gold -= item.cost;
      if (item.type === 'sword') { player.sword = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'armor') { player.armor = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'shield') { player.shield = item.idx; showDialog('Got ' + item.name + '!'); }
      else if (item.type === 'hpot') { player.hp = Math.min(player.maxHp, player.hp + Math.floor(15 * statB.hpMult)); showDialog('Spore Elixir! HP restored!'); }
      else if (item.type === 'mpot') { player.mp = Math.min(player.maxMp, player.mp + Math.floor(10 * statB.scoreMult)); showDialog('Garden Tonic! MP restored!'); }
      else if (item.type === 'myco') { player.hp = Math.min(player.maxHp, player.hp + Math.floor(10 * statB.hpMult)); player.mp = Math.min(player.maxMp, player.mp + Math.floor(7 * statB.scoreMult)); showDialog('Compost Brew! HP and MP restored!'); }
      else if (item.type === 'wings') { player.sporeBoots++; showDialog('Got Spore Boots! Press JUMP in air to fly (30s).'); }
      TAS.audio.playTone(600, 0.1, 'sine', 0.06);
      state = 'playing';
    }
  } else { keys._shopSelect = false; }

  if (keys['Escape'] || keys['KeyX']) {
    state = 'playing';
  }
}

// === MENU ===
function updateMenu(dt) {
  const keys = TAS.input.keys;
  const touch = TAS.input.touch;

  if (keys['ArrowDown'] || touch.down) {
    if (!keys._menuDown) { menuCursor = (menuCursor + 1) % 5; keys._menuDown = true; }
  } else { keys._menuDown = false; }

  if (keys['ArrowUp'] || touch.up) {
    if (!keys._menuUp) { menuCursor = (menuCursor - 1 + 5) % 5; keys._menuUp = true; }
  } else { keys._menuUp = false; }

  if (keys['KeyZ'] || keys['Enter'] || touch.a) {
    if (!keys._menuSel) {
      keys._menuSel = true;
      if (menuCursor === 0) {
        if (player.spells[player.currentSpell]) castSpell();
      } else if (menuCursor === 1) {
        spellSelect = true;
        spellCursor = player.currentSpell;
      } else if (menuCursor === 2) {
        if (player.sporeBoots > 0 && sporeBootTimer <= 0) {
          player.sporeBoots--;
          sporeBootTimer = 30;
          showDialog('Spore Boots activated! 30 seconds of flight!');
        }
      } else if (menuCursor === 3) {
        // Stats display
        var _st = (window.BaselingPlayer && BaselingPlayer.getStats) ? BaselingPlayer.getStats() : { speed: 10, stamina: 10, power: 10, luck: 10, swim: 10 };
        showDialog('SPD:' + _st.speed + ' STA:' + _st.stamina + ' PWR:' + _st.power + ' LCK:' + _st.luck + ' SWM:' + _st.swim);
      } else if (menuCursor === 4) {
        menuOpen = false;
        state = 'playing';
      }
    }
  } else { keys._menuSel = false; }

  if (keys['Escape'] || keys['KeyM'] || keys['KeyD']) {
    if (!keys._menuEsc) { menuOpen = false; state = 'playing'; keys._menuEsc = true; }
  } else { keys._menuEsc = false; }

  if (spellSelect) {
    if (keys['ArrowLeft'] || touch.left) {
      if (!keys._spLeft) { spellCursor = (spellCursor - 1 + SPELLS.length) % SPELLS.length; keys._spLeft = true; }
    } else { keys._spLeft = false; }
    if (keys['ArrowRight'] || touch.right) {
      if (!keys._spRight) { spellCursor = (spellCursor + 1) % SPELLS.length; keys._spRight = true; }
    } else { keys._spRight = false; }
    if (keys['KeyZ'] || keys['Enter'] || touch.a) {
      if (player.spells[spellCursor]) {
        player.currentSpell = spellCursor;
        spellSelect = false;
      }
    }
    if (keys['Escape'] || keys['KeyX']) { spellSelect = false; }
  }
}

// === DIALOG ===
function showDialog(text) {
  dialogText = text;
  dialogTimer = Math.max(2, text.length * 0.04);
}

// === CORRUPTION PARTICLES ===
function updateCorruption(dt) {
  for (let i = 0; i < corruptionParticles.length; i++) {
    const p = corruptionParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt * 0.3;
    if (p.life <= 0) {
      p.x = camera.x + Math.random() * GW;
      p.y = ROWS * TILE;
      p.life = 1;
      p.vy = -10 - Math.random() * 30;
    }
  }
}

// === SAVE / LOAD ===
function saveGame() {
  const data = {
    hp: player.hp, maxHp: player.maxHp, mp: player.mp, maxMp: player.maxMp,
    gold: player.gold, xp: player.xp, rank: player.rank,
    sword: player.sword, armor: player.armor, shield: player.shield,
    spells: player.spells, currentSpell: player.currentSpell,
    sporeBoots: player.sporeBoots, lastTown: player.lastTown,
    area: currentArea, room: currentRoom, keyItems: keyItems,
    lives: player.lives, score: score
  };
  try { localStorage.setItem('fungi_quest_save', JSON.stringify(data)); } catch (err) { console.error('Save failed:', err); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem('fungi_quest_save');
    if (!raw) return false;
    const data = JSON.parse(raw);
    initPlayer();
    player.hp = data.hp; player.maxHp = data.maxHp;
    player.mp = data.mp; player.maxMp = data.maxMp;
    player.gold = data.gold; player.xp = data.xp; player.rank = data.rank;
    player.sword = data.sword; player.armor = data.armor; player.shield = data.shield;
    player.spells = data.spells || [true, false, false, false, false, false];
    player.currentSpell = data.currentSpell;
    player.sporeBoots = data.sporeBoots !== undefined ? data.sporeBoots : (data.wingBoots || 0); player.lastTown = data.lastTown;
    player.lives = data.lives || 3;
    score = data.score || 0;
    keyItems = data.keyItems;
    loadRoom(data.area, data.room);
    return true;
  } catch (err) { console.error('Load failed:', err); return false; }
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  if (dialogTimer > 0) {
    dialogTimer -= dt;
    if (TAS.input.keys['KeyZ'] || TAS.input.keys['Enter'] || TAS.input.touch.a) dialogTimer = 0;
    return;
  }

  if (state === 'title') {
    if (picking) return; // character-select overlay open — ignore game input
    // C key / C touch button opens the baseling picker (consume before "any key starts")
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    if (Object.values(TAS.input.keys).some(Boolean) || TAS.input.touch.a) {
      TAS.audio.ensureAudio();
      if (!loadGame()) {
        startNewGame();
      }
      state = 'playing';
    }
    return;
  }

  if (state === 'dead') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      player.hp = player.maxHp;
      player.mp = player.maxMp;
      player.lives = Math.max(1, 3 + statB.lives);
      loadRoom(player.lastTown, 0);
      state = 'playing';
    }
    return;
  }

  if (state === 'transition') {
    transTimer -= dt;
    if (transTimer <= 0 && transTarget) {
      loadRoom(transTarget.area, transTarget.room);
      state = 'playing';
    }
    return;
  }

  if (state === 'shop') {
    updateShop(dt);
    return;
  }

  if (state === 'menu') {
    updateMenu(dt);
    return;
  }

  if (state === 'victory') {
    victoryTimer += dt;
    if (victoryTimer > 5 && (TAS.input.keys['KeyZ'] || TAS.input.touch.a)) {
      state = 'title';
      try { localStorage.removeItem('fungi_quest_save'); } catch (e) { console.error('Clear save failed:', e); }
    }
    return;
  }

  if (state === 'playing') {
    // D = menu (WASD action cluster); M/Escape kept as hidden alts
    if (TAS.input.keys['KeyD'] || TAS.input.keys['KeyM'] || TAS.input.keys['Escape']) {
      if (!TAS.input.keys._menuToggle) {
        TAS.input.keys._menuToggle = true;
        menuOpen = true;
        menuCursor = 0;
        state = 'menu';
        return;
      }
    } else { TAS.input.keys._menuToggle = false; }

    // Quick spell cast with S (WASD action cluster)
    if (TAS.input.keys['KeyS']) {
      if (!TAS.input.keys._spellCast) {
        TAS.input.keys._spellCast = true;
        castSpell();
      }
    } else { TAS.input.keys._spellCast = false; }

    updatePlayer(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updateHazards(dt);
    checkItems();
    checkDoors();
    checkNPCs();
    updateCorruption(dt);
  }
}

function startNewGame() {
  initPlayer();
  player.lives = Math.max(1, 3 + statB.lives);
  player.maxHp = Math.floor(RANKS[0].hp * statB.hpMult);
  player.hp = player.maxHp;
  player.maxMp = Math.floor(RANKS[0].mp * statB.scoreMult);
  player.mp = player.maxMp;
  keyItems = [false, false, false, false, false];
  sporeBootTimer = 0;
  shieldTimer = 0;
  spellCooldown = 0;
  loadRoom(0, 0);
}

// === DRAWING ===
function draw(dt) {
  const areaKey = AREAS[currentArea];
  const colors = AREA_COLORS[areaKey] || AREA_COLORS.mycelium_depths;

  ctx.fillStyle = colors.bg;
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'victory') {
    drawVictory();
    return;
  }

  // Parallax backgrounds (PASS 3)
  drawParallax(colors);

  ctx.save();
  TAS.fx.applyShake();
  ctx.translate(-Math.floor(camera.x), 0);

  drawTiles(colors);
  drawHazards();
  drawCorruption();
  drawDoors();
  drawItems();
  drawNPCs();
  drawEnemies();
  drawPlayer();
  drawProjectiles();
  TAS.particles.draw();
  ctx.restore();

  TAS.fx.drawFlash(GW, GH);

  drawHUD();
  drawControlsLegend();

  if (dialogTimer > 0) drawDialog();
  if (state === 'shop') drawShop();
  if (state === 'menu') drawMenu();
  if (state === 'dead') drawDeath();
  if (bossActive && bossHP > 0) drawBossBar();

  if (state === 'transition') {
    ctx.fillStyle = 'rgba(0,0,0,' + (1 - transTimer * 2) + ')';
    ctx.fillRect(0, 0, GW, GH);
  }

  // Spore boot timer
  if (sporeBootTimer > 0) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SPORE BOOTS: ' + Math.ceil(sporeBootTimer) + 's', GW - 8, 52);
  }

  // Spore Shield indicator
  if (shieldTimer > 0) {
    ctx.fillStyle = '#38d973';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('SHIELD: ' + Math.ceil(shieldTimer) + 's', GW - 8, 62);
  }

  // LP Ring indicator
  if (lpRingActive) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('YIELD RING: ' + Math.ceil(lpRingTimer) + 's', GW - 8, 72);
  }

  // Spell cooldown bar
  if (spellCooldown > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(GW / 2 - 30, 28, 60, 4);
    ctx.fillStyle = '#3cacd7';
    ctx.fillRect(GW / 2 - 30, 28, Math.floor(60 * (1 - spellCooldown / (0.8 * statB.cooldown))), 4);
  }

  TAS.input.drawTouchControls(GW, GH);
}

// === PARALLAX BACKGROUNDS (PASS 3) ===
function drawParallax(colors) {
  const px = Math.floor(parallaxOffset);

  // Far layer - large shapes
  ctx.fillStyle = colors.far;
  for (let i = -1; i < 8; i++) {
    const bx = i * 120 - (px * 0.3) % 120;
    // Stalactites / tree canopy shapes depending on area
    if (currentArea === 1 || currentArea === 4) {
      // Stalactites
      for (let s = 0; s < 3; s++) {
        const sx = bx + s * 40 + 10;
        const sh = 20 + Math.sin(i * 2 + s) * 15;
        ctx.fillRect(Math.floor(sx), 0, 8, Math.floor(sh));
      }
    } else {
      // Tree trunks
      ctx.fillRect(Math.floor(bx + 20), Math.floor(GH * 0.4), 16, Math.floor(GH * 0.6));
      ctx.fillRect(Math.floor(bx + 60), Math.floor(GH * 0.5), 12, Math.floor(GH * 0.5));
    }
  }

  // Mid layer - medium detail
  ctx.fillStyle = colors.mid;
  for (let i = -1; i < 10; i++) {
    const bx = i * 80 - (px * 0.6) % 80;
    if (currentArea <= 1) {
      // Root/cave formations
      const rh = 30 + Math.sin(i * 1.7) * 20;
      ctx.fillRect(Math.floor(bx), Math.floor(GH - rh), 20, Math.floor(rh));
    } else if (currentArea === 2) {
      // Ridge shapes
      ctx.beginPath();
      ctx.moveTo(Math.floor(bx), GH);
      ctx.lineTo(Math.floor(bx + 40), Math.floor(GH - 40 - Math.sin(i) * 20));
      ctx.lineTo(Math.floor(bx + 80), GH);
      ctx.fill();
    } else {
      // Canopy/branches
      const cy = 40 + Math.sin(i * 0.8) * 20;
      ctx.beginPath();
      ctx.arc(Math.floor(bx + 40), Math.floor(cy), 25, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawTitle() {
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  // Giant world tree
  ctx.fillStyle = '#7a444a';
  ctx.fillRect(Math.floor(GW / 2 - 40), 50, 80, GH - 50);

  // Roots
  for (let i = 0; i < 5; i++) {
    const rx = GW / 2 - 60 + i * 30;
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(Math.floor(rx), GH - 30 + Math.floor(Math.sin(i) * 8), 10, 30);
  }

  // Branches with corruption
  for (let i = 0; i < 6; i++) {
    const by = 60 + i * 35;
    const bw = 30 + i * 15;
    ctx.fillStyle = '#1a1208';
    ctx.fillRect(Math.floor(GW / 2 - bw), by, bw * 2, 6);
    // Corruption spots
    ctx.fillStyle = '#a855f7';
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.03 + i) * 0.2;
    ctx.beginPath();
    ctx.arc(Math.floor(GW / 2 - bw * 0.5 + Math.sin(i) * 10), by + 3, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Corruption glow
  const pulse = Math.sin(frame * 0.03) * 0.3 + 0.5;
  ctx.globalAlpha = pulse * 0.3;
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();
  ctx.arc(Math.floor(GW / 2), Math.floor(GH / 2), 100, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Title text with NES-style shadow
  ctx.textAlign = 'center';
  ctx.font = 'bold 26px monospace';
  ctx.fillStyle = '#000';
  ctx.fillText('FUNGI QUEST', Math.floor(GW / 2) + 2, 28);
  ctx.fillStyle = '#38d973';
  ctx.fillText('FUNGI QUEST', Math.floor(GW / 2), 26);

  ctx.fillStyle = '#a855f7';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('BASELING QUEST', Math.floor(GW / 2), 40);

  ctx.fillStyle = '#7a444a';
  ctx.font = '10px monospace';
  ctx.fillText('Blight of the World Tree', Math.floor(GW / 2), 50);

  // Floating spore particles
  for (let i = 0; i < 20; i++) {
    const spx = GW / 2 + Math.sin(frame * 0.02 + i * 0.7) * 170;
    const spy = GH / 2 + Math.cos(frame * 0.015 + i * 1.1) * 110;
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.05 + i) * 0.3;
    ctx.fillStyle = i % 3 === 0 ? '#38d973' : '#a855f7';
    ctx.beginPath();
    ctx.arc(Math.floor(spx), Math.floor(spy), Math.max(0.5, 1 + Math.floor(Math.sin(frame * 0.04 + i) * 1.5)), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Selected baseling preview (idle bob) + name + 5 stat bars
  var _cy = Math.floor(GH / 2) - 10;
  TAS.drawBaseling(ctx, Math.floor(GW / 2), _cy, 28, { anim: 'idle', frame: frame }); // procedural tree carries the screen if no sprite
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), Math.floor(GW / 2), _cy + 24);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = Math.floor(GW / 2) - 115;
    ctx.font = '8px monospace';
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * 47;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, _cy + 36);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, _cy + 39, 40, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, _cy + 39, 40 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('[C] SELECT BASELING', Math.floor(GW / 2), _cy + 54);

  // Controls (§7c: arrows move, WASD action cluster)
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('ARROWS: Move   W: Jump   A: Attack', Math.floor(GW / 2), GH - 50);
  ctx.fillText('S: Spell   D: Menu   UP: Interact', Math.floor(GW / 2), GH - 38);

  // Stat bar
  if (window.NftLoader && NftLoader.drawStatBar) NftLoader.drawStatBar(ctx, 10, 10, 120);

  const pulse2 = Math.sin(frame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('PRESS ANY KEY TO START', Math.floor(GW / 2), GH - 10);
  ctx.globalAlpha = 1;
}

function drawTiles(colors) {
  const startCol = Math.max(0, Math.floor(camera.x / TILE) - 1);
  const endCol = Math.min(startCol + COLS + 2, Math.floor(roomWidth / TILE));

  for (let x = startCol; x < endCol; x++) {
    for (let y = 0; y < ROWS; y++) {
      const t = getTile(x, y);
      if (!t.solid) continue;
      const tx = x * TILE;
      const ty = y * TILE;

      if (t.type === 'ground') {
        ctx.fillStyle = colors.ground;
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = colors.accent;
        ctx.fillRect(tx, ty, TILE, 2);
        // NES-style dithering
        if ((x + y) % 3 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.fillRect(tx + 2, ty + 4, 2, 2);
          ctx.fillRect(tx + 8, ty + 10, 2, 2);
        }
        if ((x + y) % 5 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.05)';
          ctx.fillRect(tx + 6, ty + 2, 2, 2);
        }
      } else if (t.type === 'wall') {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(tx, ty, TILE, TILE);
        ctx.fillStyle = '#2a2a2a';
        ctx.fillRect(tx + 1, ty + 1, TILE - 2, TILE - 2);
        // Brick pattern
        if (y % 2 === 0) {
          ctx.fillStyle = '#222';
          ctx.fillRect(tx + 7, ty, 2, TILE);
        } else {
          ctx.fillStyle = '#222';
          ctx.fillRect(tx + 3, ty, 2, TILE);
          ctx.fillRect(tx + 11, ty, 2, TILE);
        }
      } else if (t.type === 'platform') {
        ctx.fillStyle = colors.accent;
        ctx.fillRect(tx, ty, TILE, 4);
        ctx.fillStyle = colors.ground;
        ctx.fillRect(tx, ty + 4, TILE, TILE - 4);
      }
    }
  }
}

function drawHazards() {
  for (let i = 0; i < hazards.length; i++) {
    const h = hazards[i];
    if (h.type === 'spore_cloud') {
      const pulse = 0.2 + Math.sin(h.timer * 3) * 0.15;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#88aa22';
      ctx.beginPath();
      ctx.ellipse(Math.floor(h.x + h.w / 2), Math.floor(h.y + h.h / 2), Math.floor(h.w / 2), Math.floor(h.h / 2), 0, 0, Math.PI * 2);
      ctx.fill();
      // Spore particles inside
      for (let s = 0; s < 4; s++) {
        const sx = h.x + h.w * 0.2 + Math.sin(h.timer * 2 + s * 1.5) * h.w * 0.3;
        const sy = h.y + h.h * 0.3 + Math.cos(h.timer * 1.5 + s) * h.h * 0.2;
        ctx.fillStyle = '#aacc44';
        ctx.beginPath();
        ctx.arc(Math.floor(sx), Math.floor(sy), 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else if (h.type === 'reactor_vent') {
      ctx.fillStyle = '#333';
      ctx.fillRect(h.x, h.y, h.w, h.h);
      if (h.active) {
        ctx.fillStyle = '#44ddaa';
        ctx.globalAlpha = 0.6;
        ctx.fillRect(h.x + 2, h.y - TILE * 3, h.w - 4, TILE * 3);
        // Reactor glow
        for (let s = 0; s < 5; s++) {
          ctx.fillStyle = '#88ffcc';
          ctx.globalAlpha = 0.3 - s * 0.05;
          ctx.fillRect(Math.floor(h.x + 4 + Math.sin(h.timer * 10 + s) * 2), Math.floor(h.y - TILE * 3 + s * 10), 4, 8);
        }
        ctx.globalAlpha = 1;
      }
    }
  }
}

function drawCorruption() {
  for (let i = 0; i < corruptionParticles.length; i++) {
    const p = corruptionParticles[i];
    ctx.globalAlpha = p.life * 0.5;
    ctx.fillStyle = p.color || '#a855f7';
    ctx.beginPath();
    ctx.arc(Math.floor(p.x), Math.floor(p.y), Math.floor(p.size), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawDoors() {
  for (let i = 0; i < doors.length; i++) {
    const d = doors[i];
    if (d.isGate) {
      ctx.fillStyle = d.locked ? '#4a1a1a' : '#1a4a1a';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.strokeStyle = d.locked ? '#aa4444' : '#44aa44';
      ctx.lineWidth = 2;
      ctx.strokeRect(d.x, d.y, d.w, d.h);
      if (d.locked) {
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(Math.floor(d.x + d.w / 2 - 4), Math.floor(d.y + d.h / 2 - 4), 8, 8);
      }
      // Gate glow
      ctx.globalAlpha = 0.2 + Math.sin(frame * 0.05) * 0.1;
      ctx.fillStyle = d.locked ? '#ff4444' : '#44ff44';
      ctx.fillRect(d.x - 2, d.y - 2, d.w + 4, d.h + 4);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(d.x, d.y, d.w, d.h);
      ctx.fillStyle = '#5a4a30';
      ctx.fillRect(d.x + 2, d.y + 2, d.w - 4, d.h - 4);
      ctx.fillStyle = '#aa8844';
      ctx.beginPath();
      ctx.arc(d.x + d.w - 4, Math.floor(d.y + d.h / 2), 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawItems() {
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const bob = Math.floor(Math.sin(frame * 0.08 + i) * 3);

    if (item.type === 'gold') {
      ctx.fillStyle = '#7a444a';
      ctx.beginPath();
      ctx.arc(item.x + 8, item.y + 8 + bob, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#f4b41b';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P', item.x + 8, item.y + 11 + bob);
    } else if (item.type === 'potion') {
      ctx.fillStyle = '#38d973';
      ctx.fillRect(item.x + 4, item.y + 4 + bob, 8, 10);
      ctx.fillStyle = '#2ba85c';
      ctx.fillRect(item.x + 5, item.y + 2 + bob, 6, 3);
    } else if (item.type === 'myco_potion') {
      // Purple-blue mushroom potion
      ctx.fillStyle = '#a855f7';
      ctx.fillRect(item.x + 4, item.y + 5 + bob, 8, 9);
      ctx.fillStyle = '#c084fc';
      ctx.fillRect(item.x + 5, item.y + 2 + bob, 6, 4);
      // Cap
      ctx.fillStyle = '#7c3aed';
      ctx.beginPath();
      ctx.arc(item.x + 8, item.y + 3 + bob, 5, Math.PI, 0);
      ctx.fill();
    } else if (item.type === 'lp_ring') {
      // Golden ring with glow
      ctx.strokeStyle = '#f4b41b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(item.x + 8, item.y + 8 + bob, 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 0.3 + Math.sin(frame * 0.1 + i) * 0.2;
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.arc(item.x + 8, item.y + 8 + bob, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (item.type === 'key') {
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(item.x + 3, item.y + 4 + bob, 10, 4);
      ctx.fillRect(item.x + 10, item.y + 4 + bob, 3, 8);
      ctx.fillStyle = '#38d973';
      ctx.beginPath();
      ctx.arc(item.x + 5, item.y + 6 + bob, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawNPCs() {
  for (let i = 0; i < npcs.length; i++) {
    const n = npcs[i];
    const bob = Math.floor(Math.sin(frame * 0.04 + i * 2) * 1);

    let bodyColor = '#888888';
    let headColor = '#ddccaa';
    if (n.type === 'elder') { bodyColor = '#4444aa'; headColor = '#ddddcc'; }
    else if (n.type === 'shopkeep') { bodyColor = '#44aa44'; }
    else if (n.type === 'innkeep') { bodyColor = '#aa6644'; }
    else if (n.type === 'sage') { bodyColor = '#8844aa'; headColor = '#eeddff'; }
    else if (n.type === 'guard') { bodyColor = '#666688'; }
    else if (n.type === 'villager') { bodyColor = '#887744'; }

    ctx.fillStyle = bodyColor;
    ctx.fillRect(n.x + 2, n.y + 8 + bob, 12, 16);
    ctx.fillStyle = headColor;
    ctx.beginPath();
    ctx.arc(n.x + 8, n.y + 6 + bob, 6, 0, Math.PI * 2);
    ctx.fill();
    // NES-style eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(n.x + 5, n.y + 5 + bob, 2, 2);
    ctx.fillRect(n.x + 9, n.y + 5 + bob, 2, 2);

    if (Math.abs(player.x - n.x) < 30 && Math.abs(player.y - n.y) < 30) {
      ctx.fillStyle = '#f4b41b';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('^', n.x + 8, n.y - 6 + Math.floor(Math.sin(frame * 0.1) * 2));
    }
  }
}

function drawEnemies() {
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive) continue;

    const flash = e.flash > 0;
    const anim = Math.floor(e.animFrame) % 4;

    // Library enemy sprite first; procedural drawing below is KEPT as fallback.
    const _spr = ESPR[e.type];
    if (esprReady(_spr)) {
      if (!(flash && frame % 4 < 2)) {
        const _pad = e.isBoss ? 14 : 6;
        drawEnemySprite(_spr, e.x + e.w / 2, e.y + e.h + 2, Math.max(e.w, e.h) + _pad, e.facing < 0);
      }
      if (e.isBoss) {
        // Corruption aura telegraph stays on top of the sprite
        const eyeColor = bossPhase >= 2 ? '#ff0000' : bossPhase >= 1 ? '#ffaa00' : '#ff4444';
        ctx.fillStyle = eyeColor;
        ctx.globalAlpha = 0.15 + bossPhase * 0.08 + Math.sin(frame * 0.1) * 0.1;
        ctx.beginPath();
        ctx.arc(Math.floor(e.x + e.w / 2), Math.floor(e.y + e.h / 2), Math.floor(e.w * (0.6 + bossPhase * 0.15)), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (e.isBoss) {
      // Boss with phase-based appearance
      if (flash) { ctx.fillStyle = '#fff'; } else { ctx.fillStyle = e.color; }
      ctx.fillRect(e.x, e.y, e.w, e.h);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(e.x + 4, e.y + 4, e.w - 8, e.h - 8);
      // Glowing eyes (brighter per phase)
      const eyeColor = bossPhase >= 2 ? '#ff0000' : bossPhase >= 1 ? '#ffaa00' : '#ff4444';
      ctx.fillStyle = eyeColor;
      ctx.fillRect(Math.floor(e.x + e.w * 0.25), Math.floor(e.y + e.h * 0.25), 4 + bossPhase, 4);
      ctx.fillRect(Math.floor(e.x + e.w * 0.65), Math.floor(e.y + e.h * 0.25), 4 + bossPhase, 4);
      // Corruption aura (grows with phase)
      ctx.globalAlpha = 0.2 + bossPhase * 0.1 + Math.sin(frame * 0.1) * 0.15;
      ctx.fillStyle = e.color;
      ctx.beginPath();
      ctx.arc(Math.floor(e.x + e.w / 2), Math.floor(e.y + e.h / 2), Math.floor(e.w * (0.6 + bossPhase * 0.15)), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if (e.type === 'spore_slime') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      const squish = Math.sin(frame * 0.1 + i) * 2;
      ctx.beginPath();
      ctx.ellipse(Math.floor(e.x + e.w / 2), Math.floor(e.y + e.h / 2 + squish / 2), Math.floor(e.w / 2 + squish), Math.floor(e.h / 2 - squish / 2), 0, 0, Math.PI * 2);
      ctx.fill();
      if (!flash) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
        ctx.fillRect(e.x + 7, e.y + 2, 2, 2);
        // Spore dots
        ctx.fillStyle = '#88ff44';
        ctx.fillRect(e.x + 2, e.y + 6, 1, 1);
        ctx.fillRect(e.x + 8, e.y + 5, 1, 1);
      }
    } else if (e.type === 'cave_bat') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      const wingAngle = Math.sin(frame * 0.2 + i) * 0.5;
      ctx.fillRect(e.x + 3, e.y + 4, 8, 6);
      ctx.fillRect(Math.floor(e.x - 2 + wingAngle * 3), e.y + 2, 6, 4);
      ctx.fillRect(Math.floor(e.x + 8 - wingAngle * 3), e.y + 2, 6, 4);
      if (!flash) {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(e.x + 5, e.y + 5, 1, 1);
        ctx.fillRect(e.x + 8, e.y + 5, 1, 1);
      }
    } else if (e.type === 'spore_dwarf') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      // Stout body
      ctx.fillRect(e.x + 1, e.y + 4, 10, 12);
      // Mushroom cap hat
      if (!flash) {
        ctx.fillStyle = '#aa44cc';
        ctx.beginPath();
        ctx.arc(e.x + 6, e.y + 3, 6, Math.PI, 0);
        ctx.fill();
        ctx.fillStyle = '#cc88ee';
        ctx.fillRect(e.x + 3, e.y + 1, 2, 2);
        ctx.fillRect(e.x + 7, e.y + 2, 2, 1);
      }
      // Eyes
      if (!flash) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x + 3, e.y + 6, 2, 2);
        ctx.fillRect(e.x + 7, e.y + 6, 2, 2);
      }
    } else if (e.type === 'dark_fungus') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      ctx.beginPath();
      ctx.arc(Math.floor(e.x + e.w / 2), e.y + 4, 8, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(e.x + 5, e.y + 4, 6, 12);
      if (!flash) {
        ctx.fillStyle = '#ff44ff';
        ctx.fillRect(e.x + 3, e.y + 2, 2, 2);
        ctx.fillRect(e.x + 9, e.y + 3, 2, 2);
      }
    } else if (e.type === 'reactor_elf') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      ctx.fillRect(e.x + 2, e.y + 6, 8, 16);
      // Pointed ears
      if (!flash) {
        ctx.fillStyle = '#33bb88';
        ctx.fillRect(e.x, e.y + 4, 3, 4);
        ctx.fillRect(e.x + 9, e.y + 4, 3, 4);
        // Head
        ctx.fillStyle = '#66eebb';
        ctx.fillRect(e.x + 2, e.y, 8, 8);
        // Reactor glow
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.15 + i) * 0.2;
        ctx.fillStyle = '#44ffaa';
        ctx.beginPath();
        ctx.arc(e.x + 6, e.y + 14, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else if (e.type === 'mycelial_beast') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      ctx.fillRect(e.x, e.y + 4, e.w, e.h - 4);
      if (!flash) {
        // Tendrils
        ctx.fillStyle = '#88aa44';
        for (let t = 0; t < 4; t++) {
          const tx2 = e.x + t * 5 + 2;
          const ty2 = e.y + Math.floor(Math.sin(frame * 0.1 + t) * 3);
          ctx.fillRect(Math.floor(tx2), ty2, 3, 5);
        }
        // Eyes
        ctx.fillStyle = '#ffaa00';
        ctx.fillRect(e.x + 4, e.y + 6, 3, 3);
        ctx.fillRect(e.x + 12, e.y + 6, 3, 3);
      }
    } else if (e.type === 'fungal_knight') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      ctx.fillRect(e.x + 1, e.y, e.w - 2, e.h);
      if (!flash) {
        ctx.fillStyle = '#334455';
        ctx.fillRect(e.x + 3, e.y + 2, e.w - 6, 8);
        ctx.fillStyle = '#44ffaa';
        ctx.fillRect(e.x + 4, e.y + 5, 6, 2);
        // Mushroom crest
        ctx.fillStyle = '#668844';
        ctx.beginPath();
        ctx.arc(e.x + 7, e.y - 1, 4, Math.PI, 0);
        ctx.fill();
      }
    } else if (e.type === 'spore_wizard') {
      ctx.fillStyle = flash ? '#fff' : e.color;
      ctx.fillRect(e.x + 2, e.y + 6, 8, 16);
      if (!flash) {
        ctx.fillStyle = '#4422aa';
        ctx.beginPath();
        ctx.moveTo(e.x + 1, e.y + 8);
        ctx.lineTo(e.x + 6, e.y - 4);
        ctx.lineTo(e.x + 11, e.y + 8);
        ctx.fill();
        // Glowing staff
        ctx.fillStyle = '#44ffaa';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.12) * 0.3;
        ctx.beginPath();
        ctx.arc(e.x + (e.facing > 0 ? 12 : 0), e.y + 10, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    } else {
      ctx.fillStyle = flash ? '#fff' : (e.color || '#44cc44');
      ctx.fillRect(e.x, e.y, e.w, e.h);
    }
  }
}

function drawPlayer() {
  if (player.invuln > 0 && Math.floor(frame * 0.3) % 2 === 0) return;

  const px = Math.floor(player.x);
  const py = Math.floor(player.y);
  const walk = Math.floor(player.walkFrame) % 4;
  const legOffset = player.onGround && Math.abs(player.vx) > 10 ? (walk < 2 ? 1 : -1) : 0;

  // Spore Shield aura
  if (shieldTimer > 0) {
    ctx.globalAlpha = 0.2 + Math.sin(frame * 0.15) * 0.1;
    ctx.fillStyle = '#88ff44';
    ctx.beginPath();
    ctx.arc(px + player.w / 2, py + player.h / 2, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // === BASELING SPRITE ===
  var _anim = (player.attacking) ? 'attack' : (!player.onGround ? 'jump' : (Math.abs(player.vx) > 1 ? 'walk' : 'idle'));
  if (!TAS.drawBaseling(ctx, px + player.w / 2, py + player.h / 2, Math.max(player.w, player.h), { flipX: player.facing < 0, frame: frame, anim: _anim })) {
    // Body
    ctx.fillStyle = '#38d973';
    if (player.crouching) {
      ctx.fillRect(px, py + 12, player.w, player.h - 12);
    } else {
      ctx.fillRect(px + 2, py + 8, 10, 14);
      // Legs with walk animation
      ctx.fillStyle = '#2ba85c';
      ctx.fillRect(px + 3 + legOffset, py + 20, 4, 4);
      ctx.fillRect(px + 7 - legOffset, py + 20, 4, 4);
    }

    // Head (baseling)
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.arc(px + player.w / 2, py + 6, 7, 0, Math.PI * 2);
    ctx.fill();

    // Eyes (direction-aware)
    ctx.fillStyle = '#fff';
    const eyeX = player.facing > 0 ? 2 : -2;
    ctx.fillRect(px + 5 + eyeX, py + 4, 2, 3);
    ctx.fillRect(px + 9 + eyeX, py + 4, 2, 3);
    // Pupils
    ctx.fillStyle = '#000';
    ctx.fillRect(px + 5 + eyeX + (player.facing > 0 ? 1 : 0), py + 5, 1, 2);
    ctx.fillRect(px + 9 + eyeX + (player.facing > 0 ? 1 : 0), py + 5, 1, 2);
  }

  // Armor tint
  if (player.armor > 0) {
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = ['', '#888', '#aaa', '#88aaff'][player.armor];
    ctx.fillRect(px + 2, py + 8, 10, 14);
    ctx.globalAlpha = 1;
  }

  // Sword attack animation
  if (player.attacking) {
    const swordLen = SWORDS[player.sword].range;
    const sx = player.facing > 0 ? px + player.w : px - swordLen;
    const sy = player.crouching ? py + player.h - 8 : py + 10;
    // Blade
    ctx.fillStyle = '#ccccdd';
    ctx.fillRect(sx, sy, swordLen, 3);
    // Tip flash
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + (player.facing > 0 ? swordLen - 4 : 0), sy - 1, 4, 5);
    // Swing arc particles
    TAS.particles.spawn(sx + (player.facing > 0 ? swordLen : 0), sy + 1, '#ccddee', 2, 1);
  }

  // Shield
  if (player.shield > 0) {
    ctx.fillStyle = ['', '#666', '#888', '#88aaff'][player.shield];
    const shx = player.facing > 0 ? px - 2 : px + player.w - 4;
    ctx.fillRect(shx, py + 8, 4, 10);
  }

  // Spore boot glow
  if (sporeBootTimer > 0) {
    ctx.globalAlpha = 0.4 + Math.sin(frame * 0.2) * 0.2;
    ctx.fillStyle = '#f4b41b';
    ctx.fillRect(px + 2, py + player.h - 4, 4, 4);
    ctx.fillRect(px + 8, py + player.h - 4, 4, 4);
    ctx.globalAlpha = 1;
  }

  // LP Ring glow
  if (lpRingActive) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.12) * 0.15;
    ctx.strokeStyle = '#f4b41b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(px + player.w / 2, py + player.h / 2, 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function drawProjectiles() {
  for (let i = 0; i < projectiles.length; i++) {
    const p = projectiles[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(Math.floor(p.x), Math.floor(p.y), Math.floor(p.size), 0, Math.PI * 2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(Math.floor(p.x - p.vx * 0.02), Math.floor(p.y - p.vy * 0.02), Math.floor(p.size * 0.7), 0, Math.PI * 2);
    ctx.fill();
    // Spore projectiles have extra particles
    if (p.isSpore) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#aacc44';
      ctx.beginPath();
      ctx.arc(Math.floor(p.x + (Math.random() - 0.5) * 4), Math.floor(p.y + (Math.random() - 0.5) * 4), 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // NES-style top bar
  ctx.fillStyle = 'rgba(26,28,44,0.92)';
  ctx.fillRect(0, 0, GW, 42);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 42);
  ctx.lineTo(GW, 42);
  ctx.stroke();

  // HP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 4, 100, 10);
  ctx.fillStyle = player.hp > player.maxHp * 0.3 ? '#38d973' : '#e6482e';
  ctx.fillRect(4, 4, Math.max(0, Math.floor((player.hp / player.maxHp) * 100)), 10);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(4, 4, 100, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + player.hp + '/' + player.maxHp, 6, 12);

  // MP bar
  ctx.fillStyle = '#222';
  ctx.fillRect(4, 17, 80, 8);
  ctx.fillStyle = '#3cacd7';
  ctx.fillRect(4, 17, Math.max(0, Math.floor((player.mp / player.maxMp) * 80)), 8);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(4, 17, 80, 8);
  ctx.fillStyle = '#fff';
  ctx.fillText('MP ' + player.mp + '/' + player.maxMp, 6, 24);

  // Gold & Lives
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'left';
  ctx.fillText('POOP:' + player.gold, 4, 36);
  ctx.fillStyle = '#e6482e';
  ctx.fillText('x' + player.lives, 72, 36);

  // Score
  ctx.fillStyle = '#38d973';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE:' + score, Math.floor(GW / 2), 36);

  // Current spell
  ctx.fillStyle = player.spells[player.currentSpell] ? SPELLS[player.currentSpell].color : '#555';
  ctx.textAlign = 'center';
  ctx.fillText(SPELLS[player.currentSpell].name, Math.floor(GW / 2), 12);
  ctx.fillStyle = '#666';
  ctx.fillText('[S] cast [M] menu', Math.floor(GW / 2), 24);

  // Area name
  ctx.fillStyle = '#aaa';
  ctx.textAlign = 'right';
  ctx.fillText(AREA_NAMES[currentArea], GW - 4, 12);

  // Rank
  ctx.fillStyle = '#888';
  ctx.fillText(RANKS[player.rank].name, GW - 4, 24);

  // XP to next
  const nextXP = player.rank < RANKS.length - 1 ? RANKS[player.rank + 1].xp : 9999;
  ctx.fillText('XP:' + player.xp + '/' + nextXP, GW - 4, 36);

  // Equipment icons
  ctx.fillStyle = '#ccccdd';
  ctx.textAlign = 'left';
  ctx.fillText(SWORDS[player.sword].name.charAt(0), 110, 12);
  ctx.fillText(ARMORS[player.armor].name.charAt(0), 122, 12);
  ctx.fillText(SHIELDS[player.shield].name.charAt(0), 134, 12);
}

// === PERSISTENT CONTROLS LEGEND (§7c: desktop only, brighter in first area) ===
var _hasTouch = ('ontouchstart' in window);
function drawControlsLegend() {
  if (_hasTouch) return; // touch devices use the on-screen buttons
  if (state !== 'playing') return;
  var bright = currentArea === 0 ? 0.8 : 0.3;
  ctx.save();
  ctx.globalAlpha = bright;
  ctx.fillStyle = '#9ad';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('Arrows Move   W Jump   A Attack   S Spell   D Menu   Up Interact', Math.floor(GW / 2), GH - 3);
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawDialog() {
  ctx.fillStyle = 'rgba(0,0,0,0.9)';
  ctx.fillRect(20, GH - 70, GW - 40, 50);
  ctx.strokeStyle = '#7a444a';
  ctx.lineWidth = 2;
  ctx.strokeRect(20, GH - 70, GW - 40, 50);

  ctx.fillStyle = '#fff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';

  const maxW = GW - 60;
  const words = dialogText.split(' ');
  let line = '';
  let y = GH - 54;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, 30, y);
      line = words[i] + ' ';
      y += 14;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, 30, y);

  const pulse = Math.sin(frame * 0.1) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.textAlign = 'right';
  ctx.fillText('[Z]', GW - 30, GH - 26);
  ctx.globalAlpha = 1;
}

function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(60, 50, GW - 120, GH - 100);
  ctx.strokeStyle = '#7a444a';
  ctx.lineWidth = 2;
  ctx.strokeRect(60, 50, GW - 120, GH - 100);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GARDEN SHOP - POOP: ' + player.gold, Math.floor(GW / 2), 72);

  ctx.font = '12px monospace';
  for (let i = 0; i < shopItems.length; i++) {
    const item = shopItems[i];
    const y = 95 + i * 22;
    ctx.fillStyle = i === shopCursor ? '#f4b41b' : '#aaa';
    ctx.textAlign = 'left';
    const prefix = i === shopCursor ? '> ' : '  ';
    const costStr = item.cost > 0 ? ' (' + item.cost + ' POOP)' : '';
    ctx.fillText(prefix + item.name + costStr, 80, y);

    if (item.cost > 0 && player.gold < item.cost) {
      ctx.fillStyle = '#aa4444';
      ctx.textAlign = 'right';
      ctx.fillText('(need more POOP)', GW - 80, y);
    }
  }

  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  ctx.font = '10px monospace';
  ctx.fillText('UP/DOWN to select, Z to buy, ESC to leave', Math.floor(GW / 2), GH - 60);
}

function drawMenu() {
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(80, 40, GW - 160, GH - 80);
  ctx.strokeStyle = '#38d973';
  ctx.lineWidth = 2;
  ctx.strokeRect(80, 40, GW - 160, GH - 80);

  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BASELING MENU', Math.floor(GW / 2), 62);

  const options = ['Cast ' + SPELLS[player.currentSpell].name, 'Select Spell', 'Spore Boots (' + player.sporeBoots + ')', 'View Stats', 'Close'];
  ctx.font = '12px monospace';
  for (let i = 0; i < options.length; i++) {
    ctx.fillStyle = i === menuCursor ? '#f4b41b' : '#aaa';
    ctx.textAlign = 'left';
    ctx.fillText((i === menuCursor ? '> ' : '  ') + options[i], 100, 88 + i * 20);
  }

  // Equipment display
  ctx.fillStyle = '#888';
  ctx.textAlign = 'left';
  ctx.font = '10px monospace';
  const sy = 198;
  ctx.fillText('Sword: ' + SWORDS[player.sword].name + ' (DMG ' + Math.floor(SWORDS[player.sword].dmg * statB.damage) + ')', 100, sy);
  ctx.fillText('Armor: ' + ARMORS[player.armor].name + ' (DEF ' + ARMORS[player.armor].def + ')', 100, sy + 13);
  ctx.fillText('Shield: ' + SHIELDS[player.shield].name + ' (DEF ' + SHIELDS[player.shield].def + ')', 100, sy + 26);
  ctx.fillText('Rank: ' + RANKS[player.rank].name + ' | Score: ' + score, 100, sy + 39);

  if (spellSelect) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(90, 95, GW - 180, 70);
    ctx.strokeStyle = '#3cacd7';
    ctx.strokeRect(90, 95, GW - 180, 70);
    ctx.font = '10px monospace';
    const spellsPerRow = 3;
    for (let i = 0; i < SPELLS.length; i++) {
      const row = Math.floor(i / spellsPerRow);
      const col = i % spellsPerRow;
      ctx.fillStyle = !player.spells[i] ? '#444' : i === spellCursor ? '#f4b41b' : SPELLS[i].color;
      ctx.textAlign = 'center';
      ctx.fillText(SPELLS[i].name + '(' + SPELLS[i].cost + ')', 130 + col * 70, 115 + row * 20);
      if (i === spellCursor) ctx.fillText('^', 130 + col * 70, 127 + row * 20);
    }
  }
}

function drawDeath() {
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }
  ctx.fillStyle = 'rgba(20,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#e6482e';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('BASELING DOWN', Math.floor(GW / 2), Math.floor(GH / 2) - 20);
  ctx.fillStyle = '#f4b41b';
  ctx.font = '12px monospace';
  ctx.fillText('Lost half your POOP...', Math.floor(GW / 2), Math.floor(GH / 2) + 10);
  ctx.fillText('Returning to ' + AREA_NAMES[player.lastTown] + '...', Math.floor(GW / 2), Math.floor(GH / 2) + 30);
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Final Score: ' + score, Math.floor(GW / 2), Math.floor(GH / 2) + 50);
}

function drawBossBar() {
  const barW = 200;
  const barH = 10;
  const bx = Math.floor((GW - barW) / 2);
  const by = 46;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, by, barW, barH);
  // Phase color
  const barColor = bossPhase >= 2 ? '#ff2222' : bossPhase >= 1 ? '#ff8822' : '#cc4444';
  ctx.fillStyle = barColor;
  ctx.fillRect(bx, by, Math.floor((bossHP / bossMaxHP) * barW), barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'center';
  // Show boss name
  const bossEnemy = enemies.find(function(e) { return e.isBoss && e.alive; });
  ctx.fillText(bossEnemy ? bossEnemy.name : 'BOSS', Math.floor(GW / 2), by + 8);
}

function drawVictory() {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  const progress = Math.min(1, victoryTimer / 3);
  // Growing cleansed tree
  ctx.fillStyle = '#38d973';
  ctx.fillRect(Math.floor(GW / 2 - 30), Math.floor(GH * (1 - progress * 0.7)), 60, Math.floor(GH * progress * 0.7));

  // Roots
  for (let r = 0; r < 4; r++) {
    ctx.fillStyle = '#2a4020';
    ctx.fillRect(Math.floor(GW / 2 - 40 + r * 25), GH - 20, 8, 20);
  }

  // Leaves appearing
  for (let i = 0; i < Math.floor(progress * 25); i++) {
    const lx = GW / 2 + Math.sin(i * 1.3) * (30 + i * 5);
    const ly = GH * 0.25 + Math.cos(i * 0.7) * 50;
    ctx.fillStyle = i % 3 === 0 ? '#38d973' : '#a855f7';
    ctx.beginPath();
    ctx.arc(Math.floor(lx), Math.floor(ly), 3 + Math.floor(Math.sin(frame * 0.05 + i) * 2), 0, Math.PI * 2);
    ctx.fill();
  }

  // Clean spore particles
  for (let i = 0; i < 10; i++) {
    ctx.globalAlpha = 0.3 + Math.sin(frame * 0.04 + i) * 0.2;
    ctx.fillStyle = '#38d973';
    const sx = GW / 2 + Math.sin(frame * 0.02 + i * 0.9) * 160;
    const sy = GH * 0.5 + Math.cos(frame * 0.018 + i * 1.2) * 100;
    ctx.beginPath();
    ctx.arc(Math.floor(sx), Math.floor(sy), 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('THE WORLD TREE IS CLEANSED!', Math.floor(GW / 2), 36);

  if (victoryTimer > 2) {
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px monospace';
    ctx.fillText('Your baseling vanquished the blight.', Math.floor(GW / 2), GH - 90);
    ctx.fillText('The gardens of Tasern bloom once more.', Math.floor(GW / 2), GH - 72);
  }

  if (victoryTimer > 3.5) {
    ctx.fillStyle = '#38d973';
    ctx.font = '12px monospace';
    ctx.fillText('Final Score: ' + score, Math.floor(GW / 2), GH - 48);
  }

  if (victoryTimer > 4) {
    ctx.fillStyle = '#f4b41b';
    ctx.font = '12px monospace';
    ctx.fillText('Final Rank: ' + RANKS[player.rank].name, Math.floor(GW / 2), GH - 30);
    const pulse = Math.sin(frame * 0.05) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillText('Press Z for title screen', Math.floor(GW / 2), GH - 12);
    ctx.globalAlpha = 1;
  }
}

// === GAME LOOP START ===
TAS.loop.start(update, draw);

})();
</script>
