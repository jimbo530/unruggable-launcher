function drawTutorialScreen() {
  ctx.fillStyle = DARK_BG;
  ctx.fillRect(0, 0, canvasW, canvasH);

  var page = TUTORIAL_PAGES[STATE.tutorialPage];
  var w = canvasW, h = canvasH;

  // Title
  ctx.font = scaledFont(0.04, true);
  ctx.fillStyle = "#ffd700";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(page.title, w / 2, h * 0.12);

  // Page indicator
  ctx.font = scaledFont(0.014);
  ctx.fillStyle = "#666";
  ctx.fillText("Page " + (STATE.tutorialPage + 1) + " of " + TUTORIAL_PAGES.length, w / 2, h * 0.19);

  // Content lines
  ctx.font = scaledFont(0.016);
  ctx.fillStyle = "#ccc";
  for (var i = 0; i < page.lines.length; i++) {
    ctx.fillText(page.lines[i], w / 2, h * 0.3 + i * h * 0.06);
  }

  // Navigation buttons
  var btnW = Math.min(w * 0.22, 140);
  var btnH = Math.max(34, h * 0.06);
  var btnY = h * 0.8;

  if (STATE.tutorialPage > 0) {
    var prevX = w * 0.25 - btnW / 2;
    var prevHover = hitTest(mouseX, mouseY, prevX, btnY, btnW, btnH);
    drawBtn("< PREV", prevX, btnY, btnW, btnH, prevHover);
    if (mouseClicked && prevHover) { STATE.tutorialPage--; sfxClick(); }
  }

  if (STATE.tutorialPage < TUTORIAL_PAGES.length - 1) {
    var nextX = w * 0.75 - btnW / 2;
    var nextHover = hitTest(mouseX, mouseY, nextX, btnY, btnW, btnH);
    drawBtn("NEXT >", nextX, btnY, btnW, btnH, nextHover);
    if (mouseClicked && nextHover) { STATE.tutorialPage++; sfxClick(); }
  }

  var backX = w / 2 - btnW / 2;
  var backY = btnY + btnH + 12;
  var backHover = hitTest(mouseX, mouseY, backX, backY, btnW, btnH);
  drawBtn("BACK", backX, backY, btnW, btnH, backHover);
  if (mouseClicked && backHover) { STATE.screen = "title"; sfxClick(); }
}

// ============================================================
// BOARD DRAWING
// ============================================================
function getZoneForPosition(pos) {
  return Math.min(3, Math.floor(pos / 16));
}

function drawZoneBackground() {
  var playerPos = 0;
  if (STATE.players.length > 0) {
    playerPos = STATE.players[STATE.currentPlayer].position;
  }
  var zoneIdx = getZoneForPosition(playerPos);
  var zone = ZONE_THEMES[zoneIdx];

  // Zone gradient background
  var grad = ctx.createLinearGradient(0, 0, 0, canvasH);
  grad.addColorStop(0, zone.bg);
  grad.addColorStop(1, DARK_BG);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Ambient spores
  drawAmbientSpores(zoneIdx);

  // Zone name indicator
  ctx.font = scaledFont(0.012);
  ctx.fillStyle = "#444";
  ctx.textAlign = "right";
  ctx.textBaseline = "top";
  ctx.fillText(zone.name, canvasW - 10, canvasH - 20);
}

function drawBoard() {
  // Zone-colored background
  drawZoneBackground();

  // Path connection lines with zone coloring
  ctx.lineWidth = 3;
  for (var i = 0; i < pathSquares.length - 1; i++) {
    var a = pathSquares[i];
    var b = pathSquares[i + 1];
    var grad = ctx.createLinearGradient(
      a.x + a.size / 2, a.y + a.size / 2,
      b.x + b.size / 2, b.y + b.size / 2
    );
    grad.addColorStop(0, a.color + "40");
    grad.addColorStop(1, b.color + "40");
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(a.x + a.size / 2, a.y + a.size / 2);
    ctx.lineTo(b.x + b.size / 2, b.y + b.size / 2);
    ctx.stroke();
  }

  // Mycelium bridge arcs
  for (var bri = 0; bri < LOC_BRIDGE_START.length; bri++) {
    var si = LOC_BRIDGE_START[bri];
    var ei = LOC_BRIDGE_END[bri];
    if (si < pathSquares.length && ei < pathSquares.length) {
      var startSq = pathSquares[si];
      var endSq = pathSquares[ei];
      var sx = startSq.x + startSq.size / 2;
      var sy = startSq.y + startSq.size / 2;
      var ex = endSq.x + endSq.size / 2;
      var ey = endSq.y + endSq.size / 2;
      var midX = (sx + ex) / 2;
      var midY = Math.min(sy, ey) - Math.abs(ey - sy) * 0.4 - 20;

      // Glowing mycelium bridge
      ctx.strokeStyle = "#a855f760";
      ctx.lineWidth = 4;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.quadraticCurveTo(midX, midY, ex, ey);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Scenery near named locations
  if (pathSquares[10]) {
    var sq10 = pathSquares[10];
    var ts = Math.max(14, sq10.size * 0.7);
    drawTree(sq10.x - ts, sq10.y + 2, ts);
    drawMushroom(sq10.x + sq10.size + ts * 0.5, sq10.y + ts * 0.3, ts * 0.7, "#dd4466");
  }
  if (pathSquares[25]) {
    var sq25 = pathSquares[25];
    drawGiantMushroom(sq25.x - sq25.size, sq25.y, sq25.size * 0.6);
  }
  if (pathSquares[40]) {
    var sq40 = pathSquares[40];
    var ms = Math.max(18, sq40.size * 0.9);
    drawMountain(sq40.x - ms * 0.6, sq40.y + 4, ms);
    drawMountain(sq40.x + sq40.size + ms * 0.5, sq40.y, ms * 0.7);
  }
  if (pathSquares[55]) {
    var sq55 = pathSquares[55];
    drawGiantMushroom(sq55.x + sq55.size + 10, sq55.y - 5, sq55.size * 0.5);
  }

  // Draw squares
  for (var idx = 0; idx < pathSquares.length; idx++) {
    var sq = pathSquares[idx];
    var isFinish = (idx === pathSquares.length - 1);

    // Location label
    if (sq.locName) {
      ctx.font = scaledFont(0.01, true);
      ctx.fillStyle = "#ccc";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText(sq.locName, sq.x + sq.size / 2, sq.y - 3);
    }

    if (isFinish) {
      // Mushroom Citadel finish
      var glow = Math.sin(Date.now() / 400) * 0.15 + 0.85;
      ctx.globalAlpha = glow;
      fillRoundRect(sq.x - 4, sq.y - 4, sq.size + 8, sq.size + 8, 5, "#a855f720", "#a855f7");
      ctx.globalAlpha = 1;
      drawCitadel(sq.x + sq.size / 2, sq.y + sq.size / 2, sq.size * 0.8);
    } else {
      // Normal colored square (NES pixel feel: sharp corners)
      fillRoundRect(sq.x, sq.y, sq.size, sq.size, 2, sq.color);
      // Top highlight
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(sq.x + 1, sq.y + 1, sq.size - 2, sq.size * 0.2);
      // Bottom shadow
      ctx.fillStyle = "rgba(0,0,0,0.15)";
      ctx.fillRect(sq.x + 1, sq.y + sq.size * 0.8, sq.size - 2, sq.size * 0.18);

      // Special square icons
      if (sq.special) {
        var iconSize = Math.max(8, Math.floor(sq.size * 0.45));
        ctx.font = "bold " + iconSize + "px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        var scx = sq.x + sq.size / 2;
        var scy = sq.y + sq.size / 2;

        if (sq.special.type === "shortcut") {
          ctx.fillStyle = "#a855f7";
          ctx.shadowColor = "#a855f7";
          ctx.shadowBlur = 3;
          ctx.fillText(">>", scx, scy);
          ctx.shadowBlur = 0;
        } else if (sq.special.type === "sticky") {
          ctx.fillStyle = "#000";
          ctx.globalAlpha = 0.7;
          ctx.fillText("~", scx, scy);
          ctx.globalAlpha = 1;
        } else if (sq.special.type === "enemy") {
          ctx.fillStyle = ENEMIES[sq.special.enemyIdx].color;
          ctx.fillText("!", scx, scy);
        } else if (sq.special.type === "boss") {
          var bossGlow = Math.sin(Date.now() / 200) * 0.3 + 0.7;
          ctx.globalAlpha = bossGlow;
          ctx.fillStyle = BOSSES[sq.special.bossIdx].color;
          ctx.shadowColor = BOSSES[sq.special.bossIdx].color;
          ctx.shadowBlur = 4;
          ctx.fillText(BOSSES[sq.special.bossIdx].icon, scx, scy);
          ctx.shadowBlur = 0;
          ctx.globalAlpha = 1;
        } else if (sq.special.type === "hazard") {
          ctx.fillStyle = HAZARDS[sq.special.hazardIdx].color;
          ctx.fillText(HAZARDS[sq.special.hazardIdx].icon, scx, scy);
        }
      }

      // Square number (NES pixel style, small)
      ctx.font = Math.max(6, Math.floor(sq.size * 0.25)) + "px monospace";
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.textAlign = "right";
      ctx.textBaseline = "bottom";
      ctx.fillText(idx.toString(), sq.x + sq.size - 2, sq.y + sq.size - 1);
    }
  }

  // Draw player tokens
  for (var pi = 0; pi < STATE.players.length; pi++) {
    var p = STATE.players[pi];
    var psqIdx = Math.min(p.position, pathSquares.length - 1);
    var psq = pathSquares[psqIdx];
    var tokenSize = Math.max(8, psq.size * 0.45);
    var offX = (pi - (STATE.players.length - 1) / 2) * tokenSize * 0.7;
    var tx, ty;

    if (STATE.movingPlayerIdx === pi && STATE.screen === "moving") {
      tx = p.animX;
      ty = p.animY;
    } else {
      tx = psq.x + psq.size / 2 + offX;
      ty = psq.y - tokenSize * 0.3;
      p.animX = tx;
      p.animY = ty;
    }

    var isActive = (pi === STATE.currentPlayer && (STATE.screen === "playing" || STATE.screen === "cardDraw"));
    drawPlayerToken(tx, ty, tokenSize, p.color, p.icon, isActive, !p.isAI);
  }
}

// ============================================================
// PLAYER INFO PANEL (with score, inventory)
// ============================================================
function drawPlayerPanel() {
  var panelH = Math.max(48, canvasH * 0.085);
  fillRoundRect(4, 4, canvasW - 8, panelH, 6, PANEL_BG + "dd", PANEL_BORDER);

  var segW = (canvasW - 16) / STATE.players.length;
  for (var i = 0; i < STATE.players.length; i++) {
    var p = STATE.players[i];
    var sx = 8 + i * segW;
    var active = (i === STATE.currentPlayer &&
      (STATE.screen === "playing" || STATE.screen === "cardDraw" || STATE.screen === "moving"));

    if (active) {
      fillRoundRect(sx, 6, segW - 4, panelH - 4, 4, "rgba(255,255,255,0.06)");
    }

    // Mini token
    var tokenS = Math.max(6, panelH * 0.18);
    drawPlayerToken(sx + tokenS + 4, 6 + panelH * 0.35, tokenS, p.color, p.icon, false, !p.isAI);

    // Name
    ctx.font = scaledFont(0.012, true);
    ctx.fillStyle = active ? "#fff" : "#666";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    var displayName = p.name + (p.isAI ? " (AI)" : " (You)");
    if (displayName.length > 12) displayName = displayName.substring(0, 12);
    ctx.fillText(displayName, sx + tokenS * 2 + 8, 8);

    // Progress bar
    var barW = segW - tokenS * 2 - 16;
    var barH = Math.max(3, panelH * 0.08);
    var barX = sx + tokenS * 2 + 8;
    var barY = 8 + panelH * 0.32;
    ctx.fillStyle = "#222";
    ctx.fillRect(barX, barY, barW, barH);
    var pct = Math.min(1, p.position / PATH_LENGTH);
    ctx.fillStyle = p.color;
    ctx.fillRect(barX, barY, barW * pct, barH);

    // Position text
    ctx.font = Math.max(7, Math.floor(panelH * 0.14)) + "px monospace";
    ctx.fillStyle = "#555";
    ctx.textBaseline = "top";
    ctx.fillText(p.position + "/" + PATH_LENGTH, barX, barY + barH + 2);

    if (p.skipTurn) {
      ctx.fillStyle = "#c0392b";
      ctx.textAlign = "right";
      ctx.fillText("STUCK", barX + barW, barY + barH + 2);
      ctx.textAlign = "left";
    }
  }

  // Score display
  ctx.font = scaledFont(0.013, true);
  ctx.fillStyle = "#ffd700";
  ctx.textAlign = "right";
  ctx.textBaseline = "top";
  ctx.fillText("SCORE:" + SCORE, canvasW - 12, panelH + 8);

  // Inventory icons
  if (INVENTORY.length > 0) {
    ctx.font = scaledFont(0.011);
    ctx.fillStyle = "#888";
    ctx.textAlign = "left";
    ctx.fillText("ITEMS:", 8, panelH + 8);
    for (var ii = 0; ii < INVENTORY.length; ii++) {
      var item = INVENTORY[ii];
      ctx.fillStyle = item.color;
      ctx.fillText("[" + item.icon + "]", 55 + ii * 30, panelH + 8);
    }
  }
}

// ============================================================
// PLAYING SCREEN
// ============================================================
function drawPlayingScreen() {
  drawBoard();
  drawPlayerPanel();

  var p = STATE.players[STATE.currentPlayer];
  var btnW = Math.min(canvasW * 0.35, 200);
  var btnH = Math.max(34, canvasH * 0.06);
  var btnX = canvasW / 2 - btnW / 2;
  var btnY = canvasH - btnH - Math.max(16, canvasH * 0.025);

  // Turn label
  ctx.font = scaledFont(0.016, true);
  ctx.fillStyle = p.color;
  ctx.textAlign = "center";
  ctx.textBaseline = "bottom";
  ctx.fillText(p.name + "'s Turn" + (p.isAI ? " (AI)" : ""), canvasW / 2, btnY - 6);

  if (p.skipTurn) {
    // Stuck -- skip turn (CON: chance to break free)
    var breakFree = false;
    if (!p.isAI && STAT_CON_BONUS > 0 && Math.random() < STAT_CON_BONUS * 0.15) {
      breakFree = true;
    }

    if (breakFree) {
      fillRoundRect(btnX - 10, btnY - 2, btnW + 20, btnH + 4, 8, "#1a3a1a", "#3a8a3a");
      ctx.font = scaledFont(0.017, true);
      ctx.fillStyle = "#44ff44";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("CON saves you! Tap to go", canvasW / 2, btnY + btnH / 2);
      addScorePopup(canvasW / 2, btnY - 20, "CON SAVE!", "#44ff44");
    } else {
      fillRoundRect(btnX - 10, btnY - 2, btnW + 20, btnH + 4, 8, "#3a1a1a", "#8a3a3a");
      ctx.font = scaledFont(0.017, true);
      ctx.fillStyle = "#ff6b6b";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("STUCK! Tap to skip", canvasW / 2, btnY + btnH / 2);
    }

    if (p.isAI) {
      STATE.aiDelay++;
      if (STATE.aiDelay > 40) {
        p.skipTurn = false;
        sfxStuck();
        STATE.currentPlayer = (STATE.currentPlayer + 1) % STATE.numPlayers;
        STATE.aiDelay = 0;
      }
    } else if (mouseClicked) {
      p.skipTurn = false;
      if (!breakFree) sfxStuck();
      STATE.currentPlayer = (STATE.currentPlayer + 1) % STATE.numPlayers;
    }
  } else {
    // Draw card button
    if (p.isAI) {
      STATE.aiDelay++;
      drawBtn("AI thinking...", btnX, btnY, btnW, btnH, false);
      if (STATE.aiDelay > 30) {
        STATE.drawnCard = drawCard();
        STATE.screen = "cardDraw";
        STATE.cardFlipProgress = 0;
        STATE.cardShowTimer = 0;
        STATE.aiDelay = 0;
        sfxCardDraw();
      }
    } else {
      var hover = hitTest(mouseX, mouseY, btnX, btnY, btnW, btnH);
      if (hover) {
        ctx.shadowColor = "#6a6abe";
        ctx.shadowBlur = 10;
      }
      drawBtn("DRAW CARD", btnX, btnY, btnW, btnH, hover);
      ctx.shadowBlur = 0;

      if (mouseClicked && hover) {
        STATE.drawnCard = drawCard();
        STATE.screen = "cardDraw";
        STATE.cardFlipProgress = 0;
        STATE.cardShowTimer = 0;
        sfxCardDraw();
      }
    }
  }

  // Draw particles and popups
  drawParticles();
  drawScorePopups();
}

// ============================================================
// CARD DRAW SCREEN
// ============================================================
function drawCardDrawScreen() {
  drawBoard();
  drawPlayerPanel();

  STATE.cardFlipProgress = Math.min(1, STATE.cardFlipProgress + 1 / CARD_FLIP_FRAMES);
  STATE.cardShowTimer++;

  var card = STATE.drawnCard;

  // Dim overlay
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Card dimensions
  var cardW = Math.min(canvasW * 0.2, 130);
  var cardH = cardW * 1.4;
  var showFront = STATE.cardFlipProgress > 0.5;
  var flipScale = Math.abs(Math.cos(Math.PI * (1 - STATE.cardFlipProgress)));

  ctx.save();
  ctx.translate(canvasW / 2, canvasH * 0.42);
  ctx.scale(Math.max(0.01, flipScale), 1);

  if (showFront) {
    if (card.type === "color") {
      var color = COLORS[card.colorIdx];
      var colorName = COLOR_NAMES[card.colorIdx];
      fillRoundRect(-cardW / 2, -cardH / 2, cardW, cardH, 10, "#1a1a2e", color);

      ctx.font = scaledFont(0.018, true);
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(colorName, 0, -cardH / 2 + cardH * 0.1);

      var areaX = -cardW / 2 + cardW * 0.1;
      var areaY = -cardH / 2 + cardH * 0.18;
      var areaW = cardW * 0.8;
      var areaH = cardH * 0.55;
      fillRoundRect(areaX, areaY, areaW, areaH, 5, color);
      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.fillRect(areaX + 3, areaY + 3, areaW - 6, areaH * 0.25);

      if (card.double) {
        ctx.fillStyle = "#fff";
        ctx.font = scaledFont(0.04, true);
        ctx.fillText("x2", 0, areaY + areaH * 0.35);
        ctx.font = scaledFont(0.014, true);
        ctx.fillText("DOUBLE!", 0, areaY + areaH * 0.55);
        // Show STR bonus indicator
        if (STAT_STR_BONUS > 0) {
          ctx.font = scaledFont(0.01);
          ctx.fillStyle = "#ffd700";
          ctx.fillText("STR: +" + STAT_STR_BONUS + " extra", 0, areaY + areaH * 0.7);
        }
      } else {
        ctx.fillStyle = "#fff";
        fillRoundRect(-cardW * 0.08, areaY + areaH * 0.3, cardW * 0.16, cardW * 0.16, 2, "#fff");
        fillRoundRect(-cardW * 0.06, areaY + areaH * 0.3 + 2, cardW * 0.12, cardW * 0.12, 1, color);
      }

      // CHA upgrade indicator
      if (card.chaUpgraded) {
        ctx.font = scaledFont(0.01, true);
        ctx.fillStyle = "#ff44ff";
        ctx.fillText("CHA UPGRADE!", 0, areaY + areaH * 0.85);
      }

      ctx.font = Math.max(7, Math.floor(cardW * 0.06)) + "px monospace";
      ctx.fillStyle = "#555";
      ctx.fillText("BASELING BLOCKS", 0, cardH / 2 - cardH * 0.06);

    } else if (card.type === "character") {
      var charInfo = CHARACTER_CARDS[card.charIdx];
      fillRoundRect(-cardW / 2, -cardH / 2, cardW, cardH, 10, "#1a1a2e", "#a855f7");

      ctx.font = scaledFont(0.016, true);
      ctx.fillStyle = "#a855f7";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(charInfo.name, 0, -cardH / 2 + cardH * 0.1);

      var cAreaX = -cardW / 2 + cardW * 0.1;
      var cAreaY = -cardH / 2 + cardH * 0.18;
      var cAreaW = cardW * 0.8;
      var cAreaH = cardH * 0.55;
      fillRoundRect(cAreaX, cAreaY, cAreaW, cAreaH, 5, "#1a2a1a");

      ctx.fillStyle = "#a855f7";
      ctx.font = scaledFont(0.06, true);
      ctx.fillText(charInfo.icon, 0, cAreaY + cAreaH * 0.4);

      // Spore sparkles instead of stars
      ctx.fillStyle = "#a855f750";
      ctx.font = Math.max(8, Math.floor(cardW * 0.12)) + "px monospace";
      ctx.fillText("*", -cardW * 0.25, cAreaY + cAreaH * 0.2);
      ctx.fillText("*", cardW * 0.22, cAreaY + cAreaH * 0.6);
      ctx.fillText("*", -cardW * 0.15, cAreaY + cAreaH * 0.75);

      ctx.font = Math.max(7, Math.floor(cardW * 0.07)) + "px monospace";
      ctx.fillStyle = "#ccc";
      ctx.fillText(charInfo.desc, 0, cAreaY + cAreaH + cardH * 0.04);

      ctx.font = Math.max(7, Math.floor(cardW * 0.06)) + "px monospace";
      ctx.fillStyle = "#555";
      ctx.fillText("BASELING BLOCKS", 0, cardH / 2 - cardH * 0.06);
    }
  } else {
    // Card back (mushroom pattern)
    fillRoundRect(-cardW / 2, -cardH / 2, cardW, cardH, 10, "#1a2a1a", "#2a5a3a");
    for (var py = -3; py <= 3; py++) {
      for (var px = -2; px <= 2; px++) {
        var bc = COLORS[((py + px + 10) % 6)];
        ctx.fillStyle = bc + "20";
        ctx.fillRect(px * cardW * 0.12 - 3, py * cardW * 0.12 - 3, 6, 6);
      }
    }
    ctx.font = scaledFont(0.03, true);
    ctx.fillStyle = "#446644";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("?", 0, 0);
  }

  ctx.restore();

  // After flip completes, show instructions
  if (STATE.cardFlipProgress >= 1 && STATE.cardShowTimer > CARD_SHOW_DELAY) {
    var desc = "";
    if (card.type === "color") {
      desc = card.double
        ? "Move to 2nd " + COLOR_NAMES[card.colorIdx] + " square"
        : "Move to next " + COLOR_NAMES[card.colorIdx] + " square";
      if (card.double && STAT_STR_BONUS > 0) desc += " (+" + STAT_STR_BONUS + " STR push)";
    } else {
      desc = CHARACTER_CARDS[card.charIdx].desc;
    }

    ctx.font = scaledFont(0.017);
    ctx.fillStyle = "#ccc";
    ctx.textAlign = "center";
    ctx.textBaseline = "top";
    ctx.fillText(desc, canvasW / 2, canvasH * 0.42 + cardH / 2 + 10);

    // Score for drawing card (INT bonus)
    var drawScore = Math.floor(5 * SCORE_MULT);
    SCORE += drawScore;

    var p = STATE.players[STATE.currentPlayer];
    if (p.isAI) {
      STATE.aiDelay++;
      if (STATE.aiDelay > 20) {
        executeCardMove();
      }
    } else {
      ctx.font = scaledFont(0.014);
      ctx.fillStyle = "#888";
      ctx.fillText("Tap to move", canvasW / 2, canvasH * 0.42 + cardH / 2 + 30);

      if (mouseClicked) {
        executeCardMove();
      }
    }
  }

  drawScorePopups();
}

function executeCardMove() {
  var card = STATE.drawnCard;
  var p = STATE.players[STATE.currentPlayer];
  var dest;

  if (card.type === "color") {
    dest = findNextOfColor(p.position, card.colorIdx, card.double);
  } else {
    var target = CHARACTER_CARDS[card.charIdx].target;
    if (target > p.position) {
      dest = target;
    } else {
      dest = Math.min(p.position + 3, PATH_LENGTH);
    }
    sfxCharacter();
  }

  STATE.aiDelay = 0;
  beginMove(STATE.currentPlayer, dest);
}

// ============================================================
// MOVEMENT
// ============================================================
function beginMove(playerIdx, destIdx) {
  STATE.screen = "moving";
  STATE.movingPlayerIdx = playerIdx;
  STATE.moveStepTimer = 0;
  STATE.moveStepIdx = 0;

  var start = STATE.players[playerIdx].position;
  STATE.moveQueue = [];
  if (destIdx >= start) {
    for (var i = start + 1; i <= Math.min(destIdx, PATH_LENGTH); i++) STATE.moveQueue.push(i);
  } else {
    for (var j = start - 1; j >= destIdx; j--) STATE.moveQueue.push(j);
  }
  if (STATE.moveQueue.length === 0) {
    finishMove();
  }
}

function updateMovement() {
  STATE.moveStepTimer++;

  var p = STATE.players[STATE.movingPlayerIdx];
  var offX = (STATE.movingPlayerIdx - (STATE.players.length - 1) / 2) * Math.max(5, pathSquares[0].size * 0.35);

  if (STATE.moveStepIdx < STATE.moveQueue.length) {
    var curSq = pathSquares[Math.min(p.position, pathSquares.length - 1)];
    var nxtIdx = Math.min(STATE.moveQueue[STATE.moveStepIdx], pathSquares.length - 1);
    var nxtSq = pathSquares[nxtIdx];

    if (curSq && nxtSq) {
      var t = Math.min(1, STATE.moveStepTimer / MOVE_SPEED);
      var eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      var fromX = curSq.x + curSq.size / 2 + offX;
      var fromY = curSq.y - curSq.size * 0.15;
      var toX = nxtSq.x + nxtSq.size / 2 + offX;
      var toY = nxtSq.y - nxtSq.size * 0.15;
      p.animX = fromX + (toX - fromX) * eased;
      p.animY = fromY + (toY - fromY) * eased - Math.sin(eased * Math.PI) * 8;
    }

    if (STATE.moveStepTimer >= MOVE_SPEED) {
      p.position = STATE.moveQueue[STATE.moveStepIdx];
      STATE.moveStepIdx++;
      STATE.moveStepTimer = 0;
      sfxMoveStep();
      // Score per square moved (INT bonus)
      if (STATE.movingPlayerIdx === 0) {
        var moveScore = Math.floor(2 * SCORE_MULT);
        SCORE += moveScore;
      }
    }
  } else {
    var sq = pathSquares[Math.min(p.position, pathSquares.length - 1)];
    p.animX = sq.x + sq.size / 2 + offX;
    p.animY = sq.y - sq.size * 0.15;

    if (STATE.moveStepTimer > 8) {
      finishMove();
    }
  }
}

function finishMove() {
  var p = STATE.players[STATE.currentPlayer];
  STATE.movingPlayerIdx = -1;

  // Win check
  if (p.position >= PATH_LENGTH) {
    STATE.screen = "winner";
    STATE.winnerIdx = STATE.currentPlayer;
    spawnConfetti();
    sfxWin();
    // Bonus score for winning
    if (STATE.currentPlayer === 0) {
      var winBonus = Math.floor(500 * SCORE_MULT);
      SCORE += winBonus;
      addScorePopup(canvasW / 2, canvasH * 0.4, "WIN BONUS: +" + winBonus, "#ffd700");
    }
    return;
  }

  // Special square check
  var sq = pathSquares[p.position];
  if (sq && sq.special) {
    if (sq.special.type === "enemy" && !p.isAI) {
      // Enemy encounter
      var enemy = ENEMIES[sq.special.enemyIdx];
      if (startCombat(enemy, false, -1)) {
        STATE.screen = "combat";
        return;
      }
    } else if (sq.special.type === "boss") {
      var boss = BOSSES[sq.special.bossIdx];
      if (!BOSS_STATES[boss.square].defeated) {
        if (startCombat(boss, true, sq.special.bossIdx)) {
          STATE.screen = "combat";
          return;
        }
      }
    } else if (sq.special.type === "hazard" && !p.isAI) {
      // Hazard damage (CON reduces)
      var hazard = HAZARDS[sq.special.hazardIdx];
      var hazardDmg = Math.max(0, hazard.damage - Math.floor(STAT_CON_BONUS / 2));
      if (hazardDmg > 0) {
        STATE.screen = "specialEvent";
        STATE.specialTimer = 0;
        STATE.aiDelay = 0;
        STATE.specialMessage = hazard.name + "! " + (hazardDmg > 0 ? "Lose " + hazardDmg + " squares!" : "CON resists!");
        sfxHazard();
        triggerShake(3, 8);
        spawnParticles(p.animX, p.animY, hazard.color, 10, 5, 25);
        p.hazardPenalty = hazardDmg;
      } else {
        addScorePopup(p.animX, p.animY - 20, "CON RESIST!", "#44ff44");
        endTurnAfterEvent();
      }
      return;
    }

    if (sq.special.type === "shortcut") {
      STATE.screen = "specialEvent";
      STATE.specialTimer = 0;
      STATE.aiDelay = 0;
      STATE.specialMessage = "MUSHROOM SHORTCUT! Warp to square " + sq.special.target + "!";
      sfxShortcut();
      spawnParticles(p.animX, p.animY, "#a855f7", 12, 6, 30);
    } else if (sq.special.type === "sticky") {
      STATE.screen = "specialEvent";
      STATE.specialTimer = 0;
      STATE.aiDelay = 0;
      // WIS: chance to avoid sticky
      if (!p.isAI && Math.random() < STAT_WIS_BONUS * 0.12) {
        STATE.specialMessage = sq.special.label.toUpperCase() + "! WIS helps you avoid it!";
        addScorePopup(p.animX, p.animY - 20, "WIS SAVE!", "#88aaff");
      } else {
        STATE.specialMessage = sq.special.label.toUpperCase() + "! Skip next turn!";
        p.skipTurn = true;
        sfxStuck();
      }
    } else if (!sq.special.type.match(/enemy|boss|hazard/)) {
      endTurnAfterEvent();
      return;
    }
  } else {
    STATE.currentPlayer = (STATE.currentPlayer + 1) % STATE.numPlayers;
    STATE.screen = "playing";
    STATE.aiDelay = 0;
  }
}

function drawMovingScreen() {
  drawBoard();
  drawPlayerPanel();
  updateMovement();

  // Show card info at bottom
  if (STATE.drawnCard) {
    var c = STATE.drawnCard;
    ctx.font = scaledFont(0.014);
    ctx.textAlign = "center";
    ctx.textBaseline = "bottom";
    if (c.type === "color") {
      ctx.fillStyle = COLORS[c.colorIdx];
      var label = c.double ? "Double " + COLOR_NAMES[c.colorIdx] : COLOR_NAMES[c.colorIdx];
      ctx.fillText("Moving: " + label, canvasW / 2, canvasH - 12);
    } else {
      ctx.fillStyle = "#a855f7";
      ctx.fillText("Moving: " + CHARACTER_CARDS[c.charIdx].name, canvasW / 2, canvasH - 12);
    }
  }

  drawParticles();
  drawScorePopups();
}

// ============================================================
// SPECIAL EVENT SCREEN
// ============================================================
function drawSpecialEventScreen() {
  drawBoard();
  drawPlayerPanel();

  STATE.specialTimer++;

  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, canvasW, canvasH);

  var boxW = Math.min(canvasW * 0.75, 400);
  var boxH = Math.max(80, canvasH * 0.14);
  var boxX = canvasW / 2 - boxW / 2;
  var boxY = canvasH / 2 - boxH / 2;

  var sq = pathSquares[STATE.players[STATE.currentPlayer].position];
  var borderColor = "#a855f7";
  var icon = "";
  if (sq && sq.special) {
    if (sq.special.type === "shortcut") { borderColor = "#a855f7"; icon = ">>"; }
    else if (sq.special.type === "sticky") { borderColor = "#ff8844"; icon = "~"; }
    else if (sq.special.type === "hazard") { borderColor = "#ff4444"; icon = "!"; }
  }

  fillRoundRect(boxX, boxY, boxW, boxH, 10, "#1a1a2e", borderColor);

  ctx.font = scaledFont(0.04, true);
  ctx.fillStyle = borderColor;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(icon, canvasW / 2, boxY + boxH * 0.3);

  ctx.font = scaledFont(0.017, true);
  ctx.fillStyle = "#fff";
  ctx.fillText(STATE.specialMessage, canvasW / 2, boxY + boxH * 0.6);

  var p = STATE.players[STATE.currentPlayer];

  if (STATE.specialTimer > SPECIAL_DELAY) {
    if (p.isAI) {
      STATE.aiDelay++;
      if (STATE.aiDelay > 15) {
        resolveSpecialEvent();
      }
    } else {
      ctx.font = scaledFont(0.013);
      ctx.fillStyle = "#888";
      ctx.fillText("Tap to continue", canvasW / 2, boxY + boxH - 10);

      if (mouseClicked) {
        resolveSpecialEvent();
      }
    }
  }

  drawParticles();
  drawScorePopups();
}

function resolveSpecialEvent() {
  var p = STATE.players[STATE.currentPlayer];
  var sq = pathSquares[p.position];

  if (sq && sq.special && sq.special.type === "shortcut" && sq.special.target !== null) {
    STATE.aiDelay = 0;
    beginMove(STATE.currentPlayer, sq.special.target);
  } else if (sq && sq.special && sq.special.type === "hazard" && p.hazardPenalty) {
    // Move back from hazard
    var newPos = Math.max(0, p.position - p.hazardPenalty);
    p.hazardPenalty = 0;
    STATE.aiDelay = 0;
    beginMove(STATE.currentPlayer, newPos);
  } else {
    STATE.currentPlayer = (STATE.currentPlayer + 1) % STATE.numPlayers;
    STATE.screen = "playing";
    STATE.aiDelay = 0;
  }
}

// ============================================================
// COMBAT SCREEN (rendering handled in drawCombatScreen)
// ============================================================
function drawCombatWrapper() {
  drawBoard();
  drawPlayerPanel();
  updateCombat();
  drawCombatScreen();
  drawParticles();
  drawScorePopups();
}

// ============================================================
// WINNER SCREEN
// ============================================================
function drawWinnerScreen() {
  updateConfetti();

  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _eImg = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg');
    if (_eImg) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, canvasW, canvasH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _eImg); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, canvasW, canvasH); }
  }
  ctx.fillStyle = DARK_BG;
  ctx.fillRect(0, 0, canvasW, canvasH);

  drawConfetti();

  var winner = STATE.players[STATE.winnerIdx];
  STATE.titlePulse += 0.04;
  var pulse = Math.sin(STATE.titlePulse * 2) * 5;

  // Victory text
  ctx.font = scaledFont(0.06, true);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.shadowColor = "#a855f7";
  ctx.shadowBlur = 20;
  ctx.fillStyle = "#a855f7";
  ctx.fillText("VICTORY!", canvasW / 2, canvasH * 0.1 + pulse);
  ctx.shadowBlur = 0;

  // Large winner token
  var charBounce = Math.sin(STATE.titlePulse * 3) * 5;
  var tokenSize = Math.min(canvasW, canvasH) * 0.1;
  drawPlayerToken(canvasW / 2, canvasH * 0.28 + charBounce, tokenSize, winner.color, winner.icon, true, !winner.isAI);

  // Winner name
  ctx.font = scaledFont(0.04, true);
  ctx.fillStyle = winner.color;
  ctx.fillText(winner.name, canvasW / 2, canvasH * 0.42);

  ctx.font = scaledFont(0.022);
  ctx.fillStyle = "#ccc";
  ctx.fillText("reached the Mushroom Citadel!", canvasW / 2, canvasH * 0.48);

  // Final score
  ctx.font = scaledFont(0.025, true);
  ctx.fillStyle = "#ffd700";
  ctx.fillText("FINAL SCORE: " + SCORE, canvasW / 2, canvasH * 0.55);

  // Stat summary
  ctx.font = scaledFont(0.014);
  ctx.fillStyle = "#888";
  ctx.fillText("Score Mult (INT): x" + SCORE_MULT.toFixed(2), canvasW / 2, canvasH * 0.6);
  ctx.fillText("Items Found: " + INVENTORY.length + "/" + MAX_INVENTORY, canvasW / 2, canvasH * 0.64);

  if (winner.isAI) {
    ctx.fillStyle = "#888";
    ctx.font = scaledFont(0.016);
    ctx.fillText("Better luck next time, " + statB.name + "!", canvasW / 2, canvasH * 0.69);
  }

  // Citadel
  drawCitadel(canvasW / 2, canvasH * 0.79, Math.min(canvasW, canvasH) * 0.1);

  drawConfetti();

  // Play again button
  var btnW = Math.min(canvasW * 0.35, 200);
  var btnH = Math.max(34, canvasH * 0.06);
  var btnX = canvasW / 2 - btnW / 2;
  var btnY = canvasH * 0.9;
  var hover = hitTest(mouseX, mouseY, btnX, btnY, btnW, btnH);
  drawBtn("PLAY AGAIN", btnX, btnY, btnW, btnH, hover);

  if (mouseClicked && hover) {
    STATE.screen = "title";
    STATE.winnerIdx = -1;
    STATE.confetti = [];
    sfxClick();
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function gameLoop() {
  frame++; // global animation clock for baseling sprite animation
  updateShake();
  updateParticles();
  updateAmbientSpores();
  updateScorePopups();

  ctx.save();
  ctx.translate(shakeX, shakeY);

  ctx.fillStyle = DARK_BG;
  ctx.fillRect(-10, -10, canvasW + 20, canvasH + 20);

  switch (STATE.screen) {
    case "title": drawTitleScreen(); break;
    case "tutorial": drawTutorialScreen(); break;
    case "playing": drawPlayingScreen(); break;
    case "cardDraw": drawCardDrawScreen(); break;
    case "moving": drawMovingScreen(); break;
    case "specialEvent": drawSpecialEventScreen(); break;
    case "combat": drawCombatWrapper(); break;
    case "winner": drawWinnerScreen(); break;
  }

  ctx.restore();

  // Reset per-frame input
  mouseClicked = false;

  requestAnimationFrame(gameLoop);
}

// ============================================================
// INIT
// ============================================================
window.addEventListener("resize", resize);
resize();
buildPath();
initAmbientSpores();
requestAnimationFrame(gameLoop);

})();
</script>
