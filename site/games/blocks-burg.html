// ============================================================
// BASELING STAT INTEGRATION (via BaselingPlayer.getMults — see ARCADE-STATS.md)
// ============================================================
// Bespoke engine (no TAS): talk to BaselingPlayer directly. getMults() -> {moveSpeed,
// health,damage,luck,swim}, clamped to the single-player band (0.8–1.6). This board game
// derives ~20 values from D&D-style fields on statB; we keep statB's shape, synthesize its
// fields from the five bounded multipliers (str/dex/con/int/wis/cha each = 10 + (mult-1)*20),
// and recompute the derived values inside recomputeStats() so a title-screen pick applies.
// Not a wager game -> default band.
var statB = { damage: 1, speed: 1, lives: 0, hpMult: 1, scoreMult: 1, cooldown: 1, luck: 1, str: 10, dex: 10, con: 10, int: 10, wis: 10, cha: 10, level: 0, color: '#44dd88', name: 'Baseling', icon: 'B' };
try {
  if (window.NftLoader && NftLoader.getStatBonuses) {
    var _b = NftLoader.getStatBonuses();
    if (_b) { statB.color = _b.color || statB.color; statB.name = _b.name || statB.name; statB.icon = _b.icon || statB.icon; }
  }
} catch (e) { console.warn('[blocks-burg] NftLoader display info failed:', e && e.message); }

// Derived stat bonuses — reassigned in recomputeStats() so a title-screen pick applies.
var STAT_STR_BONUS, STAT_DEX_BONUS, STAT_CON_BONUS, STAT_INT_BONUS, STAT_WIS_BONUS, STAT_CHA_BONUS, STAT_LEVEL;
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  function dnd(x) { return Math.round(10 + (x - 1) * 20); }
  statB.speed = m.moveSpeed; statB.damage = m.damage; statB.hpMult = m.health; statB.luck = m.luck;
  statB.str = dnd(m.damage); statB.dex = dnd(m.moveSpeed); statB.con = dnd(m.health);
  statB.int = dnd(m.luck);   statB.wis = dnd(m.luck);      statB.cha = dnd(m.luck);
  STAT_STR_BONUS = Math.max(0, Math.floor((statB.str - 10) / 2));   // Push power: extra move on doubles
  STAT_DEX_BONUS = Math.max(0, Math.floor((statB.dex - 10) / 2));   // Speed: faster animations
  STAT_CON_BONUS = Math.max(0, Math.floor((statB.con - 10) / 2));   // Endurance: extra HP for boss fights
  STAT_INT_BONUS = Math.max(0, Math.floor((statB.int - 10) / 2));   // Score multiplier
  STAT_WIS_BONUS = Math.max(0, Math.floor((statB.wis - 10) / 2));   // Cooldown: faster reveals/foresight
  STAT_CHA_BONUS = Math.max(0, Math.floor((statB.cha - 10) / 2));   // Luck: better card draws / loot
  STAT_LEVEL = 0;
  // Re-derive config-like values. MOVE_SPEED etc. are declared just below; hoisting makes
  // these assignments target those bindings.
  MOVE_SPEED = Math.max(3, 8 - STAT_DEX_BONUS);            // DEX: faster movement animation
  CARD_SHOW_DELAY = Math.max(10, 25 - STAT_WIS_BONUS * 2); // WIS: faster card reveal
  SPECIAL_DELAY = Math.max(15, 40 - STAT_WIS_BONUS * 3);   // WIS: faster event resolution
  SCORE_MULT = 1 + STAT_INT_BONUS * 0.25;                  // INT: +25% score per bonus point
  // The human player's display name follows the selected baseling.
  if (window.BaselingPlayer && BaselingPlayer.getSelected) {
    var sel = BaselingPlayer.getSelected();
    if (sel) { PLAYER_NAMES[0] = sel.charName; }
  }
}
var picking = false; // baseling character-select overlay is open
var frame = 0;       // global animation clock (incremented each game-loop tick)
function drawSelectedBaseling(c, x, y, size, opts) {
  if (!window.BaselingPlayer || !window.BaselingSprites) return false;
  var sel = BaselingPlayer.getSelected();
  if (!sel || !sel.charId) return false;
  if (!BaselingSprites.isLoaded(sel.charId)) {
    if (!BaselingSprites.hasFailed(sel.charId)) BaselingSprites.load(sel.charId, sel.colorVariant);
    return false;
  }
  return BaselingSprites.draw(c, sel.charId, sel.colorVariant, sel.sparkle, x, y, size, opts || {});
}

function resize() {

// ============================================================
// SCREEN SHAKE (Pass 3: visual polish)
// ============================================================
var shakeX = 0, shakeY = 0, shakeMag = 0, shakeDur = 0;

function triggerShake(magnitude, duration) {
  shakeMag = magnitude;
  shakeDur = duration;
}

function updateShake() {
  if (shakeDur > 0) {
    shakeDur--;
    shakeX = (Math.random() - 0.5) * shakeMag * 2;
    shakeY = (Math.random() - 0.5) * shakeMag * 2;
    shakeMag *= 0.92;
  } else {
    shakeX = 0;
    shakeY = 0;
  }
}

var particles = [];

function spawnParticles(x, y, color, count, spread, life) {
  for (var i = 0; i < count; i++) {
    particles.push({
      x: x, y: y,
      vx: (Math.random() - 0.5) * spread,
      vy: (Math.random() - 0.5) * spread - 1,
      color: color,
      life: life || 40,
      maxLife: life || 40,
      size: 2 + Math.random() * 3
    });
  }
}

function updateParticles() {
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (var i = 0; i < particles.length; i++) {
    var p = particles[i];
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    // NES pixel style: draw as small squares
    var sz = Math.max(1, Math.floor(p.size * alpha));
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), sz, sz);
  }
  ctx.globalAlpha = 1;
}

// Ambient spore particles (zone-themed)
var ambientSpores = [];

function initAmbientSpores() {
  ambientSpores = [];
  for (var i = 0; i < 30; i++) {
    ambientSpores.push({
      x: Math.random() * canvasW,
      y: Math.random() * canvasH,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -0.2 - Math.random() * 0.3,
      size: 1 + Math.random() * 2,
      alpha: 0.1 + Math.random() * 0.3,
      pulse: Math.random() * Math.PI * 2
    });
  }
}

function updateAmbientSpores() {
  for (var i = 0; i < ambientSpores.length; i++) {
    var s = ambientSpores[i];
    s.x += s.vx + Math.sin(s.pulse) * 0.2;
    s.y += s.vy;
    s.pulse += 0.03;
    if (s.y < -10) { s.y = canvasH + 10; s.x = Math.random() * canvasW; }
    if (s.x < -10) s.x = canvasW + 10;
    if (s.x > canvasW + 10) s.x = -10;
  }
}

function drawAmbientSpores(zoneIdx) {
  var colors = ["#a855f7","#38d973","#f4b41b","#7a444a"];
  var c = colors[zoneIdx] || colors[0];
  for (var i = 0; i < ambientSpores.length; i++) {
    var s = ambientSpores[i];
    ctx.globalAlpha = s.alpha * (0.5 + 0.5 * Math.sin(s.pulse));
    ctx.fillStyle = c;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.size), Math.ceil(s.size));
  }
  ctx.globalAlpha = 1;
}

var audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { console.warn("Web Audio not available:", e); }
  }
}

function playTone(freq, dur, type, vol) {
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || "square";
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) { console.warn("Audio error:", e); }
}

// ============================================================
// PATH BUILDING
// ============================================================
var pathSquares = [];

function buildPath() {
  pathSquares = [];
  var sqSize = Math.max(16, Math.floor(Math.min(canvasW, canvasH) * 0.038));
  var margin = Math.floor(canvasW * 0.06);
  var topMargin = Math.floor(canvasH * 0.1);
  var boardW = canvasW - margin * 2;
  var squaresPerRow = 10;
  var totalRows = Math.ceil((PATH_LENGTH + 1) / squaresPerRow);
  var availH = canvasH - topMargin - Math.floor(canvasH * 0.12);
  var rowSpacing = Math.floor(availH / totalRows);

  var colorIdx = 0;
  var idx = 0;
  var startY = canvasH - Math.floor(canvasH * 0.1);

  for (var row = 0; row < totalRows && idx <= PATH_LENGTH; row++) {
    var goingRight = (row % 2 === 0);
    var y = startY - row * rowSpacing;
    var countThisRow = Math.min(squaresPerRow, PATH_LENGTH + 1 - idx);

    for (var col = 0; col < countThisRow; col++) {
      var actualCol = goingRight ? col : (squaresPerRow - 1 - col);
      var x = margin + actualCol * (boardW / (squaresPerRow - 1)) - sqSize / 2;

      var special = null;
      // Check sticky (swamp)
      for (var si = 0; si < LOC_SWAMP.length; si++) {
        if (idx === LOC_SWAMP[si]) special = {type:"sticky", target:null, label:"Spore Trap"};
      }
      // Check sticky (tar pit)
      for (var ti = 0; ti < LOC_TAR_PIT.length; ti++) {
        if (idx === LOC_TAR_PIT[ti]) special = {type:"sticky", target:null, label:"POOP Slide"};
      }
      // Check bridge starts
      for (var bri = 0; bri < LOC_BRIDGE_START.length; bri++) {
        if (idx === LOC_BRIDGE_START[bri]) special = {type:"shortcut", target:LOC_BRIDGE_END[bri], label:"Mushroom Shortcut"};
      }

      // Check enemy encounter
      for (var ei = 0; ei < ENEMY_SQUARES.length; ei++) {
        if (idx === ENEMY_SQUARES[ei] && !special) {
          special = {type:"enemy", enemyIdx: ei % ENEMIES.length, label:"Enemy!"};
        }
      }

      // Check hazard
      for (var hi = 0; hi < HAZARD_SQUARES.length; hi++) {
        if (idx === HAZARD_SQUARES[hi] && !special) {
          special = {type:"hazard", hazardIdx: hi % HAZARDS.length, label:"Hazard!"};
        }
      }

      // Check boss
      for (var boi = 0; boi < BOSSES.length; boi++) {
        if (idx === BOSSES[boi].square) {
          special = {type:"boss", bossIdx: boi, label:BOSSES[boi].name};
        }
      }

      var locInfo = LOC_NAMED[idx] || null;
      var zoneIdx = Math.min(3, Math.floor(idx / 16));

      pathSquares.push({
        x: x,
        y: y - sqSize,
        size: sqSize,
        color: COLORS[colorIdx % 6],
        colorIdx: colorIdx % 6,
        idx: idx,
        special: special,
        locName: locInfo ? locInfo.name : null,
        locBg: locInfo ? locInfo.bg : null,
        zone: zoneIdx
      });
      colorIdx++;
      idx++;
    }
  }

  pathSquares = pathSquares.slice(0, PATH_LENGTH + 1);
}

// ============================================================
// CARD DECK
// ============================================================
var deck = [];

function buildDeck() {
  deck = [];
  // 8 singles + 2 doubles per color = 60 color cards
  for (var c = 0; c < 6; c++) {
    for (var i = 0; i < 8; i++) deck.push({type:"color", colorIdx:c, double:false});
    for (var j = 0; j < 2; j++) deck.push({type:"color", colorIdx:c, double:true});
  }
  // 4 character cards (2 copies each = 8)
  for (var k = 0; k < CHARACTER_CARDS.length; k++) {
    deck.push({type:"character", charIdx:k});
    deck.push({type:"character", charIdx:k});
  }
  shuffle(deck);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
}

function drawCard() {
  if (deck.length === 0) buildDeck();
  var card = deck.pop();
  // CHA: chance to upgrade single to double
  if (card.type === "color" && !card.double && Math.random() < STAT_CHA_BONUS * 0.08) {
    card.double = true;
    card.chaUpgraded = true;
  }
  return card;
}

// ============================================================
// FIND NEXT MATCHING COLOR
// ============================================================
function findNextOfColor(fromPos, colorIdx, isDouble) {
  var found = 0;
  // STR: doubles move one extra square
  var needed = isDouble ? 2 : 1;
  for (var i = fromPos + 1; i < pathSquares.length; i++) {
    if (pathSquares[i].colorIdx === colorIdx) {
      found++;
      if (found >= needed) {
        // STR bonus: push extra squares on doubles
        if (isDouble && STAT_STR_BONUS > 0) {
          var extra = Math.min(STAT_STR_BONUS, pathSquares.length - 1 - i);
          return i + extra;
        }
        return i;
      }
    }
  }
  return pathSquares.length - 1;
}

// ============================================================
// COMBAT SYSTEM (Pass 2: Tasern content)
// ============================================================
var COMBAT = {
  active: false,
  enemy: null,
  isBoss: false,
  enemyHp: 0,
  enemyMaxHp: 0,
  playerHp: 0,
  playerMaxHp: 0,
  phase: "intro",  // intro, fight, victory, defeat
  timer: 0,
  attackTimer: 0,
  playerAttacking: false,
  enemyAttacking: false,
  damageFlash: 0,
  enemyDamageFlash: 0,
  combo: 0,
  comboTimer: 0,
  loot: null
};

function startCombat(enemy, isBoss, bossIdx) {
  COMBAT.active = true;
  COMBAT.isBoss = isBoss;
  COMBAT.bossIdx = bossIdx;

  if (isBoss && BOSS_STATES[BOSSES[bossIdx].square] && BOSS_STATES[BOSSES[bossIdx].square].defeated) {
    // Boss already defeated, skip
    COMBAT.active = false;
    return false;
  }

  COMBAT.enemy = enemy;
  COMBAT.enemyMaxHp = enemy.hp;
  COMBAT.enemyHp = isBoss ? (BOSS_STATES[BOSSES[bossIdx].square].hp || enemy.hp) : enemy.hp;
  COMBAT.playerMaxHp = 5 + STAT_CON_BONUS * 2 + STAT_LEVEL;  // CON: more HP
  COMBAT.playerHp = COMBAT.playerMaxHp;
  COMBAT.phase = "intro";
  COMBAT.timer = 0;
  COMBAT.attackTimer = 0;
  COMBAT.combo = 0;
  COMBAT.comboTimer = 0;
  COMBAT.loot = null;
  COMBAT.playerAttacking = false;
  COMBAT.enemyAttacking = false;
  COMBAT.damageFlash = 0;
  COMBAT.enemyDamageFlash = 0;

  if (isBoss) {
    sfxBossAppear();
    triggerShake(6, 30);
  } else {
    sfxHit();
  }
  return true;
}

function playerAttack() {
  if (COMBAT.phase !== "fight" || COMBAT.playerAttacking) return;
  COMBAT.playerAttacking = true;
  COMBAT.attackTimer = 0;
  var baseDmg = 1 + STAT_STR_BONUS;  // STR: more damage
  // Combo system
  if (COMBAT.comboTimer > 0) {
    COMBAT.combo = Math.min(COMBAT.combo + 1, 5);
  } else {
    COMBAT.combo = 1;
  }
  COMBAT.comboTimer = 30;
  var comboDmg = baseDmg + Math.floor(COMBAT.combo / 2);
  COMBAT.enemyHp = Math.max(0, COMBAT.enemyHp - comboDmg);
  COMBAT.enemyDamageFlash = 8;
  sfxHit();
  triggerShake(3, 5);
  spawnParticles(canvasW * 0.65, canvasH * 0.4, COMBAT.enemy.color, 8, 4, 20);
  addScorePopup(canvasW * 0.65, canvasH * 0.35, "-" + comboDmg, "#ff4444");
  if (COMBAT.combo > 1) {
    addScorePopup(canvasW * 0.65, canvasH * 0.3, COMBAT.combo + "x COMBO!", "#ffd700");
  }
}

function enemyAttack() {
  if (COMBAT.phase !== "fight" || COMBAT.enemyAttacking) return;
  COMBAT.enemyAttacking = true;
  // DEX: chance to dodge
  if (Math.random() < STAT_DEX_BONUS * 0.1) {
    addScorePopup(canvasW * 0.35, canvasH * 0.35, "DODGE!", "#44ff44");
    return;
  }
  // CON: reduce damage taken
  var incomingDmg = Math.max(1, COMBAT.enemy.atk - Math.floor(STAT_CON_BONUS / 2));
  COMBAT.playerHp = Math.max(0, COMBAT.playerHp - incomingDmg);
  COMBAT.damageFlash = 8;
  sfxTrap();
  triggerShake(4, 8);
  spawnParticles(canvasW * 0.35, canvasH * 0.4, "#ff4444", 6, 3, 15);
  addScorePopup(canvasW * 0.35, canvasH * 0.35, "-" + incomingDmg, "#ff4444");
}

function updateCombat() {
  if (!COMBAT.active) return;
  COMBAT.timer++;
  if (COMBAT.comboTimer > 0) COMBAT.comboTimer--;
  if (COMBAT.damageFlash > 0) COMBAT.damageFlash--;
  if (COMBAT.enemyDamageFlash > 0) COMBAT.enemyDamageFlash--;

  if (COMBAT.phase === "intro" && COMBAT.timer > 40) {
    COMBAT.phase = "fight";
    COMBAT.timer = 0;
  }

  if (COMBAT.phase === "fight") {
    // Reset attack flags after cooldown
    if (COMBAT.playerAttacking) {
      COMBAT.attackTimer++;
      if (COMBAT.attackTimer > 8) COMBAT.playerAttacking = false;
    }
    if (COMBAT.enemyAttacking) {
      COMBAT.attackTimer++;
      if (COMBAT.attackTimer > 15) COMBAT.enemyAttacking = false;
    }

    // Enemy auto-attacks periodically (WIS reduces frequency)
    var enemyRate = Math.max(40, 80 - (COMBAT.isBoss ? 20 : 0) + STAT_WIS_BONUS * 5);
    if (COMBAT.timer % enemyRate === 0 && !COMBAT.enemyAttacking) {
      enemyAttack();
    }

    // Check victory
    if (COMBAT.enemyHp <= 0) {
      COMBAT.phase = "victory";
      COMBAT.timer = 0;
      var reward = Math.floor(COMBAT.enemy.reward * SCORE_MULT);
      SCORE += reward;
      addScorePopup(canvasW / 2, canvasH * 0.25, "+" + reward + " pts!", "#ffd700");
      // Item drop (CHA: better drop rate)
      var dropChance = 0.3 + STAT_CHA_BONUS * 0.08;
      if (COMBAT.isBoss) dropChance = 0.8 + STAT_CHA_BONUS * 0.05;
      if (Math.random() < dropChance && INVENTORY.length < MAX_INVENTORY) {
        var item = rollItem();
        if (item) {
          COMBAT.loot = item;
          INVENTORY.push(item);
          sfxItemGet();
        }
      }
      if (COMBAT.isBoss) {
        BOSS_STATES[BOSSES[COMBAT.bossIdx].square].defeated = true;
        sfxBossDeath();
        triggerShake(8, 30);
        spawnParticles(canvasW / 2, canvasH * 0.4, COMBAT.enemy.color, 30, 8, 40);
      } else {
        spawnParticles(canvasW / 2, canvasH * 0.4, COMBAT.enemy.color, 15, 6, 30);
      }
    }

    // Check defeat
    if (COMBAT.playerHp <= 0) {
      COMBAT.phase = "defeat";
      COMBAT.timer = 0;
      triggerShake(6, 20);
    }
  }
}

function rollItem() {
  // CHA: shifts rarity table toward rarer items
  var roll = Math.random() - STAT_CHA_BONUS * 0.03;
  for (var i = ITEMS.length - 1; i >= 0; i--) {
    if (roll < ITEMS[i].rarity) return {name: ITEMS[i].name, effect: ITEMS[i].effect, value: ITEMS[i].value, icon: ITEMS[i].icon, color: ITEMS[i].color};
  }
  return {name: ITEMS[0].name, effect: ITEMS[0].effect, value: ITEMS[0].value, icon: ITEMS[0].icon, color: ITEMS[0].color};
}

function drawCombatScreen() {
  // Dim background
  ctx.fillStyle = "rgba(0,0,0,0.75)";
  ctx.fillRect(0, 0, canvasW, canvasH);

  var e = COMBAT.enemy;

  if (COMBAT.phase === "intro") {
    // Boss/enemy intro text
    var introAlpha = Math.min(1, COMBAT.timer / 20);
    ctx.globalAlpha = introAlpha;
    ctx.font = scaledFont(COMBAT.isBoss ? 0.05 : 0.035, true);
    ctx.fillStyle = e.color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(e.name, canvasW / 2, canvasH * 0.3);

    if (COMBAT.isBoss) {
      ctx.font = scaledFont(0.02);
      ctx.fillStyle = "#ff4444";
      ctx.fillText("BOSS ENCOUNTER!", canvasW / 2, canvasH * 0.4);
    }

    ctx.font = scaledFont(0.016);
    ctx.fillStyle = "#888";
    ctx.fillText("HP: " + COMBAT.enemyHp + "  ATK: " + e.atk, canvasW / 2, canvasH * 0.5);
    ctx.globalAlpha = 1;
    return;
  }

  if (COMBAT.phase === "fight") {
    // Player side (left)
    var playerX = canvasW * 0.25;
    var enemyX = canvasW * 0.75;
    var fightY = canvasH * 0.4;

    // Player baseling sprite
    if (COMBAT.damageFlash > 0 && COMBAT.damageFlash % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    drawBaselingSprite(playerX, fightY, Math.min(canvasW, canvasH) * 0.08, statB.color);
    ctx.globalAlpha = 1;

    // Player HP bar
    drawHPBar(playerX - 40, fightY + 50, 80, 8, COMBAT.playerHp, COMBAT.playerMaxHp, "#44ff44");
    ctx.font = scaledFont(0.013);
    ctx.fillStyle = "#ccc";
    ctx.textAlign = "center";
    ctx.fillText(statB.name, playerX, fightY + 70);
    ctx.fillText("HP:" + COMBAT.playerHp + "/" + COMBAT.playerMaxHp, playerX, fightY + 85);

    // Enemy sprite
    if (COMBAT.enemyDamageFlash > 0 && COMBAT.enemyDamageFlash % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    drawEnemySprite(enemyX, fightY, Math.min(canvasW, canvasH) * (COMBAT.isBoss ? 0.1 : 0.07), e);
    ctx.globalAlpha = 1;

    // Enemy HP bar
    drawHPBar(enemyX - 40, fightY + 50, 80, 8, COMBAT.enemyHp, COMBAT.enemyMaxHp, "#ff4444");
    ctx.font = scaledFont(0.013);
    ctx.fillStyle = "#ccc";
    ctx.textAlign = "center";
    ctx.fillText(e.name, enemyX, fightY + 70);
    ctx.fillText("HP:" + COMBAT.enemyHp + "/" + COMBAT.enemyMaxHp, enemyX, fightY + 85);

    // Combat combo display
    if (COMBAT.combo > 1 && COMBAT.comboTimer > 0) {
      ctx.font = scaledFont(0.025, true);
      ctx.fillStyle = "#ffd700";
      ctx.textAlign = "center";
      ctx.fillText(COMBAT.combo + "x COMBO", canvasW / 2, canvasH * 0.2);
    }

    // Attack button (human player only)
    var p = STATE.players[STATE.currentPlayer];
    if (!p.isAI) {
      var atkW = Math.min(canvasW * 0.25, 160);
      var atkH = Math.max(34, canvasH * 0.06);
      var atkX = canvasW / 2 - atkW / 2;
      var atkY = canvasH * 0.75;
      var hover = hitTest(mouseX, mouseY, atkX, atkY, atkW, atkH);
      drawBtn("ATTACK!", atkX, atkY, atkW, atkH, hover);

      // Item use button
      if (INVENTORY.length > 0) {
        var itemBtnY = atkY + atkH + 8;
        var itemHover = hitTest(mouseX, mouseY, atkX, itemBtnY, atkW, atkH);
        drawBtn("USE: " + INVENTORY[0].name, atkX, itemBtnY, atkW, atkH, itemHover);
        if (mouseClicked && itemHover) {
          useItem(0);
        }
      }

      if (mouseClicked && hover) {
        playerAttack();
      }
    } else {
      // AI auto-attacks
      if (COMBAT.timer % 20 === 0 && !COMBAT.playerAttacking) {
        playerAttack();
      }
    }

    // Stat display
    ctx.font = scaledFont(0.011);
    ctx.fillStyle = "#666";
    ctx.textAlign = "left";
    ctx.fillText("STR:" + statB.str + " DEX:" + statB.dex + " CON:" + statB.con, 10, canvasH * 0.95);
    return;
  }

  if (COMBAT.phase === "victory") {
    ctx.font = scaledFont(0.04, true);
    ctx.fillStyle = "#44ff44";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("VICTORY!", canvasW / 2, canvasH * 0.3);

    ctx.font = scaledFont(0.02);
    ctx.fillStyle = "#ffd700";
    ctx.fillText("+" + Math.floor(COMBAT.enemy.reward * SCORE_MULT) + " points", canvasW / 2, canvasH * 0.4);

    if (COMBAT.loot) {
      ctx.fillStyle = COMBAT.loot.color;
      ctx.fillText("Found: " + COMBAT.loot.name + "!", canvasW / 2, canvasH * 0.48);
    }

    if (COMBAT.timer > 40) {
      var p = STATE.players[STATE.currentPlayer];
      if (p.isAI || mouseClicked) {
        COMBAT.active = false;
        endTurnAfterEvent();
      } else {
        ctx.font = scaledFont(0.014);
        ctx.fillStyle = "#888";
        ctx.fillText("Tap to continue", canvasW / 2, canvasH * 0.6);
      }
    }
    return;
  }

  if (COMBAT.phase === "defeat") {
    ctx.font = scaledFont(0.04, true);
    ctx.fillStyle = "#ff4444";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("DEFEATED!", canvasW / 2, canvasH * 0.3);

    ctx.font = scaledFont(0.018);
    ctx.fillStyle = "#888";
    ctx.fillText("You lose 3 squares...", canvasW / 2, canvasH * 0.4);

    if (COMBAT.timer > 40) {
      var p = STATE.players[STATE.currentPlayer];
      if (p.isAI || mouseClicked) {
        COMBAT.active = false;
        // Move back 3 squares on defeat
        var newPos = Math.max(0, STATE.players[STATE.currentPlayer].position - 3);
        STATE.players[STATE.currentPlayer].position = newPos;
        var sq = pathSquares[newPos];
        if (sq) {
          STATE.players[STATE.currentPlayer].animX = sq.x + sq.size / 2;
          STATE.players[STATE.currentPlayer].animY = sq.y - sq.size * 0.15;
        }
        endTurnAfterEvent();
      } else {
        ctx.font = scaledFont(0.014);
        ctx.fillStyle = "#888";
        ctx.fillText("Tap to continue", canvasW / 2, canvasH * 0.6);
      }
    }
    return;
  }
}

function useItem(idx) {
  if (idx >= INVENTORY.length) return;
  var item = INVENTORY[idx];
  switch (item.effect) {
    case "heal":
      COMBAT.playerHp = Math.min(COMBAT.playerMaxHp, COMBAT.playerHp + item.value);
      addScorePopup(canvasW * 0.35, canvasH * 0.35, "+" + item.value + " HP", "#44ff44");
      sfxItemGet();
      break;
    case "speed":
      // Extra attacks for a few turns — simplified as instant damage
      COMBAT.enemyHp = Math.max(0, COMBAT.enemyHp - item.value);
      addScorePopup(canvasW * 0.65, canvasH * 0.35, "-" + item.value + " SPEED!", "#44aaff");
      sfxHit();
      break;
    case "shield":
      COMBAT.playerHp = Math.min(COMBAT.playerMaxHp + 3, COMBAT.playerHp + 3);
      addScorePopup(canvasW * 0.35, canvasH * 0.35, "+SHIELD", "#ffaa44");
      sfxItemGet();
      break;
    case "luck":
      COMBAT.combo += 3;
      addScorePopup(canvasW / 2, canvasH * 0.25, "LUCKY!", "#ff44ff");
      sfxItemGet();
      break;
    case "score":
      SCORE += item.value;
      addScorePopup(canvasW / 2, canvasH * 0.25, "+" + item.value + " pts!", "#ffd700");
      sfxItemGet();
      break;
    case "warp":
      // Instant kill a percentage of enemy HP
      var warpDmg = Math.max(1, Math.floor(COMBAT.enemyMaxHp * 0.3));
      COMBAT.enemyHp = Math.max(0, COMBAT.enemyHp - warpDmg);
      addScorePopup(canvasW * 0.65, canvasH * 0.3, "-" + warpDmg + " WARP!", "#ff4444");
      sfxBossDeath();
      triggerShake(5, 10);
      break;
  }
  INVENTORY.splice(idx, 1);
}

function endTurnAfterEvent() {
  STATE.currentPlayer = (STATE.currentPlayer + 1) % STATE.numPlayers;
  STATE.screen = "playing";
  STATE.aiDelay = 0;
}

// ============================================================
// NES-STYLE SPRITE HELPERS (Pass 3: pixel art)
// ============================================================
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.ceil(w), Math.ceil(h));
}

function drawBaselingSprite(cx, cy, size, color) {
  var s = size;
  var px = Math.max(1, Math.floor(s / 8));
  // Body (round mushroom shape made of pixel blocks)
  drawPixelRect(cx - s*0.3, cy - s*0.1, s*0.6, s*0.5, color);
  // Cap (dome)
  drawPixelRect(cx - s*0.4, cy - s*0.4, s*0.8, s*0.35, shadeColor(color, 30));
  drawPixelRect(cx - s*0.3, cy - s*0.5, s*0.6, s*0.15, shadeColor(color, 50));
  // Eyes
  drawPixelRect(cx - s*0.15, cy - s*0.05, px*2, px*2, "#fff");
  drawPixelRect(cx + s*0.08, cy - s*0.05, px*2, px*2, "#fff");
  drawPixelRect(cx - s*0.12, cy - s*0.02, px, px, "#000");
  drawPixelRect(cx + s*0.11, cy - s*0.02, px, px, "#000");
  // Feet
  drawPixelRect(cx - s*0.25, cy + s*0.35, s*0.18, px*2, shadeColor(color, -40));
  drawPixelRect(cx + s*0.08, cy + s*0.35, s*0.18, px*2, shadeColor(color, -40));
  // Spots on cap
  drawPixelRect(cx - s*0.2, cy - s*0.35, px*2, px*2, "#fff");
  drawPixelRect(cx + s*0.15, cy - s*0.3, px*2, px*2, "#fff");
  drawPixelRect(cx, cy - s*0.45, px*2, px*2, "#fff");
}

function drawEnemySprite(cx, cy, size, enemy) {
  var s = size;
  var px = Math.max(1, Math.floor(s / 8));
  var c = enemy.color;
  // Generic pixel enemy body
  drawPixelRect(cx - s*0.35, cy - s*0.2, s*0.7, s*0.55, c);
  drawPixelRect(cx - s*0.25, cy - s*0.35, s*0.5, s*0.2, shadeColor(c, 20));
  // Eyes (angry)
  drawPixelRect(cx - s*0.18, cy - s*0.15, px*3, px*2, "#ff0000");
  drawPixelRect(cx + s*0.07, cy - s*0.15, px*3, px*2, "#ff0000");
  drawPixelRect(cx - s*0.15, cy - s*0.12, px, px, "#fff");
  drawPixelRect(cx + s*0.1, cy - s*0.12, px, px, "#fff");
  // Teeth/mouth
  drawPixelRect(cx - s*0.1, cy + s*0.05, s*0.2, px*2, "#220000");
  drawPixelRect(cx - s*0.06, cy + s*0.05, px*2, px, "#fff");
  drawPixelRect(cx + s*0.02, cy + s*0.05, px*2, px, "#fff");
  // Claws
  drawPixelRect(cx - s*0.4, cy + s*0.1, px*2, s*0.15, shadeColor(c, -30));
  drawPixelRect(cx + s*0.32, cy + s*0.1, px*2, s*0.15, shadeColor(c, -30));
  // Icon letter
  ctx.font = "bold " + Math.max(8, Math.floor(s * 0.3)) + "px monospace";
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(enemy.icon, cx, cy + s*0.3);
}

function drawHPBar(x, y, w, h, current, max, color) {
  ctx.fillStyle = "#222";
  ctx.fillRect(x, y, w, h);
  var pct = Math.max(0, current / max);
  ctx.fillStyle = pct > 0.5 ? color : (pct > 0.25 ? "#ffaa00" : "#ff0000");
  ctx.fillRect(x, y, w * pct, h);
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, w, h);
}

var mouseX = 0, mouseY = 0, mouseClicked = false;

canvas.addEventListener("mousedown", function(e) {
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  mouseClicked = true;
  initAudio();
});

canvas.addEventListener("mousemove", function(e) {
  var r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});

canvas.addEventListener("touchstart", function(e) {
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  var touch = e.touches[0];
  mouseX = touch.clientX - r.left;
  mouseY = touch.clientY - r.top;
  mouseClicked = true;
  initAudio();
}, {passive: false});

canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  mouseX = e.touches[0].clientX - r.left;
  mouseY = e.touches[0].clientY - r.top;
}, {passive: false});

document.addEventListener("keydown", function(e) {
  keysDown[e.key] = true;

  if (STATE.screen === "title" && (e.key === "c" || e.key === "C") && !picking) {
    picking = true;
    BaselingPlayer.select(function () { recomputeStats(); picking = false; });
    return;
  }
  // Space/Enter = click in combat
  if ((e.key === " " || e.key === "Enter") && COMBAT.active && COMBAT.phase === "fight") {
    playerAttack();
  }
});
document.addEventListener("keyup", function(e) { keysDown[e.key] = false; });

// ============================================================
// DRAWING HELPERS
// ============================================================
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function fillRoundRect(x, y, w, h, r, fillColor, strokeColor) {
  roundRect(x, y, w, h, r);
  if (fillColor) { ctx.fillStyle = fillColor; ctx.fill(); }
  if (strokeColor) { ctx.strokeStyle = strokeColor; ctx.lineWidth = 2; ctx.stroke(); }
}

function hitTest(px, py, rx, ry, rw, rh) {
  return px >= rx && px <= rx + rw && py >= ry && py <= ry + rh;
}

function drawBtn(text, x, y, w, h, hover) {
  var fill = hover ? "#4a2a6e" : "#2e1a4e";
  var border = hover ? "#a855f7" : "#6b3fa0";
  fillRoundRect(x, y, w, h, 8, fill, border);
  ctx.fillStyle = hover ? "#fff" : "#ccc";
  ctx.font = "bold " + Math.max(12, Math.floor(Math.min(canvasW, canvasH) * 0.022)) + "px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x + w / 2, y + h / 2);
}

function shadeColor(color, amount) {
  var num = parseInt(color.replace("#", ""), 16);
  var r = Math.min(255, Math.max(0, (num >> 16) + amount));
  var g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + amount));
  var b = Math.min(255, Math.max(0, (num & 0xFF) + amount));
  return "#" + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

function scaledFont(sizeFraction, bold) {
  var px = Math.max(10, Math.floor(Math.min(canvasW, canvasH) * sizeFraction));
  return (bold ? "bold " : "") + px + "px monospace";
}

// ============================================================
// SCENERY DRAWING (Tasern themed)
// ============================================================
function drawMushroom(cx, cy, size, color) {
  var s = size;
  ctx.save();
  // Stem
  ctx.fillStyle = "#d4c5a0";
  ctx.fillRect(cx - s * 0.06, cy, s * 0.12, s * 0.25);
  // Cap
  ctx.fillStyle = color || "#cc4444";
  ctx.beginPath();
  ctx.arc(cx, cy, s * 0.18, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  // Spots
  ctx.fillStyle = "#ffffff80";
  ctx.beginPath();
  ctx.arc(cx - s * 0.06, cy - s * 0.08, s * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + s * 0.08, cy - s * 0.1, s * 0.025, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawGiantMushroom(cx, cy, size) {
  var s = size;
  ctx.save();
  // Thick stem
  ctx.fillStyle = "#b8a880";
  ctx.fillRect(cx - s * 0.08, cy - s * 0.1, s * 0.16, s * 0.35);
  // Large cap with bioluminescence
  var glow = Math.sin(Date.now() / 500) * 0.2 + 0.8;
  ctx.fillStyle = "#8844aa";
  ctx.beginPath();
  ctx.ellipse(cx, cy - s * 0.15, s * 0.3, s * 0.15, 0, 0, Math.PI * 2);
  ctx.fill();
  // Glow underside
  ctx.globalAlpha = glow * 0.4;
  ctx.fillStyle = "#ff88ff";
  ctx.beginPath();
  ctx.ellipse(cx, cy - s * 0.08, s * 0.25, s * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Spots
  ctx.fillStyle = "#ffaaff50";
  ctx.beginPath();
  ctx.arc(cx - s * 0.12, cy - s * 0.2, s * 0.04, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + s * 0.1, cy - s * 0.22, s * 0.03, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawCitadel(cx, cy, size) {
  var s = size;
  ctx.save();

  // Main mushroom tower (center)
  ctx.fillStyle = "#6B5B45";
  ctx.fillRect(cx - s * 0.1, cy - s * 0.15, s * 0.2, s * 0.4);
  // Mushroom cap roof
  ctx.fillStyle = "#aa2244";
  ctx.beginPath();
  ctx.ellipse(cx, cy - s * 0.2, s * 0.25, s * 0.12, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#cc3366";
  ctx.beginPath();
  ctx.ellipse(cx, cy - s * 0.25, s * 0.2, s * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  // Cap spots
  ctx.fillStyle = "#ffffff40";
  ctx.beginPath(); ctx.arc(cx - s*0.1, cy - s*0.22, s*0.025, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + s*0.08, cy - s*0.24, s*0.02, 0, Math.PI*2); ctx.fill();

  // Side towers
  ctx.fillStyle = "#5B4B35";
  ctx.fillRect(cx - s * 0.35, cy - s * 0.1, s * 0.12, s * 0.35);
  ctx.fillRect(cx + s * 0.23, cy - s * 0.1, s * 0.12, s * 0.35);
  // Side tower caps
  ctx.fillStyle = "#993355";
  ctx.beginPath();
  ctx.ellipse(cx - s * 0.29, cy - s * 0.12, s * 0.12, s * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + s * 0.29, cy - s * 0.12, s * 0.12, s * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();

  // Spore tip on top
  ctx.fillStyle = "#ffdd44";
  ctx.shadowColor = "#ffdd44";
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(cx, cy - s * 0.32, s * 0.035, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Gate
  ctx.fillStyle = "#1a0e06";
  ctx.beginPath();
  ctx.moveTo(cx - s * 0.07, cy + s * 0.25);
  ctx.lineTo(cx - s * 0.07, cy + s * 0.05);
  ctx.quadraticCurveTo(cx, cy - s * 0.02, cx + s * 0.07, cy + s * 0.05);
  ctx.lineTo(cx + s * 0.07, cy + s * 0.25);
  ctx.closePath();
  ctx.fill();

  // Bioluminescent windows
  var glow = Math.sin(Date.now() / 400) * 0.3 + 0.7;
  ctx.fillStyle = "#a855f7";
  ctx.shadowColor = "#a855f7";
  ctx.shadowBlur = 4 * glow;
  ctx.fillRect(cx - s * 0.05, cy - s * 0.05, s * 0.03, s * 0.04);
  ctx.fillRect(cx + s * 0.02, cy - s * 0.05, s * 0.03, s * 0.04);
  ctx.fillRect(cx - s * 0.31, cy - s * 0.05, s * 0.025, s * 0.03);
  ctx.fillRect(cx + s * 0.28, cy - s * 0.05, s * 0.025, s * 0.03);
  ctx.shadowBlur = 0;

  // Flag with mycelium banner
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy - s * 0.25);
  ctx.lineTo(cx, cy - s * 0.42);
  ctx.stroke();
  var flagWave = Math.sin(Date.now() / 300) * s * 0.02;
  ctx.fillStyle = "#38d973";
  ctx.beginPath();
  ctx.moveTo(cx + 1, cy - s * 0.42);
  ctx.lineTo(cx + s * 0.1 + flagWave, cy - s * 0.37);
  ctx.lineTo(cx + 1, cy - s * 0.32);
  ctx.fill();

  ctx.restore();
}

function drawTree(x, y, size) {
  ctx.save();
  // Mushroom tree — trunk is pale, canopy is fungal
  ctx.fillStyle = "#5a4a3a";
  ctx.fillRect(x - size * 0.05, y, size * 0.1, size * 0.2);
  ctx.fillStyle = "#2a6a3a";
  ctx.beginPath();
  ctx.moveTo(x, y - size * 0.35);
  ctx.lineTo(x + size * 0.18, y + size * 0.05);
  ctx.lineTo(x - size * 0.18, y + size * 0.05);
  ctx.closePath();
  ctx.fill();
  // Tiny mushrooms at base
  drawMushroom(x - size * 0.08, y + size * 0.15, size * 0.4, "#dd6644");
  ctx.restore();
}

function drawMountain(x, y, size) {
  ctx.save();
  // Sporeling peak — rocky with fungal growth
  ctx.fillStyle = "#4a4a5a";
  ctx.beginPath();
  ctx.moveTo(x, y - size * 0.5);
  ctx.lineTo(x + size * 0.35, y + size * 0.15);
  ctx.lineTo(x - size * 0.35, y + size * 0.15);
  ctx.closePath();
  ctx.fill();
  // Glowing spore tip
  ctx.fillStyle = "#38d973";
  ctx.shadowColor = "#38d973";
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.arc(x, y - size * 0.45, size * 0.04, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Fungal patches
  ctx.fillStyle = "#446644";
  ctx.beginPath();
  ctx.arc(x - size * 0.1, y - size * 0.15, size * 0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ============================================================
// PLAYER TOKEN DRAWING
// ============================================================
function drawPlayerToken(cx, cy, size, colorHex, iconLetter, highlight, isBaseling) {
  ctx.save();

  // Shadow
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.beginPath();
  ctx.ellipse(cx, cy + size * 0.45, size * 0.35, size * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();

  // === BASELING SPRITE === the human player's token is the selected baseling.
  if (isBaseling && drawSelectedBaseling(ctx, cx, cy, size * 0.95, { anim: 'idle', frame: frame })) {
    if (highlight) {
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.55, 0, Math.PI * 2);
      ctx.strokeStyle = "#ffd700";
      ctx.lineWidth = Math.max(1, size * 0.06);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  // Mushroom-cap shaped token (NES pixel feel)
  var px = Math.max(1, Math.floor(size / 6));
  // Cap (dome)
  ctx.fillStyle = colorHex;
  ctx.beginPath();
  ctx.arc(cx, cy - size * 0.08, size * 0.38, Math.PI, 0);
  ctx.closePath();
  ctx.fill();
  // Body (stem)
  ctx.fillStyle = shadeColor(colorHex, -20);
  ctx.fillRect(cx - size * 0.2, cy - size * 0.08, size * 0.4, size * 0.35);
  // Highlight
  ctx.fillStyle = "rgba(255,255,255,0.2)";
  ctx.fillRect(cx - size * 0.12, cy - size * 0.35, size * 0.12, size * 0.15);
  // Cap spots
  ctx.fillStyle = "rgba(255,255,255,0.3)";
  ctx.beginPath(); ctx.arc(cx - size*0.12, cy - size*0.25, px*1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + size*0.1, cy - size*0.3, px, 0, Math.PI*2); ctx.fill();

  // Letter
  ctx.fillStyle = "#fff";
  ctx.font = "bold " + Math.max(8, Math.floor(size * 0.38)) + "px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(iconLetter, cx, cy + size * 0.08);

  // Active glow
  if (highlight) {
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.55, 0, Math.PI * 2);
    ctx.strokeStyle = "#ffd700";
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
}

// ============================================================
// CONFETTI (spore-themed)
// ============================================================
function spawnConfetti() {
  STATE.confetti = [];
  var sporeColors = ["#a855f7","#38d973","#f4b41b","#7a444a","#5b8dd9","#e05577"];
  for (var i = 0; i < 120; i++) {
    STATE.confetti.push({
      x: Math.random() * canvasW,
      y: Math.random() * -canvasH,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 2,
      color: sporeColors[Math.floor(Math.random() * sporeColors.length)],
      size: Math.random() * 4 + 2,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2
    });
  }
}

function updateConfetti() {
  for (var i = 0; i < STATE.confetti.length; i++) {
    var c = STATE.confetti[i];
    c.x += c.vx;
    c.y += c.vy;
    c.rot += c.rotV;
    c.vy += 0.02;
    if (c.y > canvasH + 20) {
      c.y = -20;
      c.x = Math.random() * canvasW;
      c.vy = Math.random() * 3 + 2;
    }
  }
}

function drawConfetti() {
  for (var i = 0; i < STATE.confetti.length; i++) {
    var c = STATE.confetti[i];
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    // NES pixel confetti = small squares
    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
    ctx.restore();
  }
}

// ============================================================
function newGame(numPlayers) {
  STATE.numPlayers = numPlayers;
  STATE.players = [];
  SCORE = 0;
  INVENTORY = [];
  // Reset boss states
  for (var bi = 0; bi < BOSSES.length; bi++) {
    BOSS_STATES[BOSSES[bi].square] = {defeated: false, hp: BOSSES[bi].hp};
  }
  for (var i = 0; i < numPlayers; i++) {
    STATE.players.push({
      name: PLAYER_NAMES[i],
      color: PLAYER_COLORS[i],
      icon: PLAYER_ICONS[i],
      position: 0,
      skipTurn: false,
      isAI: i > 0,
      animX: 0,
      animY: 0,
      hp: (i === 0) ? (5 + STAT_CON_BONUS * 2 + STAT_LEVEL) : 5,  // CON: player HP
      score: 0
    });
  }
  STATE.currentPlayer = 0;
  STATE.drawnCard = null;
  STATE.winnerIdx = -1;
  STATE.confetti = [];
  STATE.aiDelay = 0;
  COMBAT.active = false;
  buildDeck();
  buildPath();
  initAmbientSpores();
  // Position all tokens at start
  if (pathSquares.length > 0) {
    var sq = pathSquares[0];
    for (var j = 0; j < STATE.players.length; j++) {
      STATE.players[j].animX = sq.x + sq.size / 2;
      STATE.players[j].animY = sq.y + sq.size / 2;
    }
  }
  STATE.screen = "playing";
}

// ============================================================
// TITLE SCREEN (NES themed with controls)
// ============================================================
function drawTitleScreen() {
  STATE.titlePulse += 0.03;
  var w = canvasW;
  var h = canvasH;

  // Art background
  if (window.TasernArt && TasernArt._auto) {
    var _bgImg = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg'));
    if (_bgImg) { TasernArt.drawCover(ctx, _bgImg); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, w, h); }
  }
  // Zone-themed background gradient
  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "#0a0a14");
  grad.addColorStop(0.5, "#0e0618");
  grad.addColorStop(1, "#14081e");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Dim animated spore blocks (NES style)
  ctx.globalAlpha = 0.1;
  for (var i = 0; i < 50; i++) {
    var bx = ((i * 137 + 50) % w);
    var by = ((i * 89 + 30 + Math.sin(STATE.titlePulse + i) * 3) % h);
    var bs = 4 + (i % 4) * 3;
    ctx.fillStyle = COLORS[i % 6];
    ctx.fillRect(Math.floor(bx), Math.floor(by), bs, bs);
  }
  ctx.globalAlpha = 1;

  // Citadel
  drawCitadel(w / 2, h * 0.32, Math.min(w, h) * 0.18);

  // Giant mushrooms flanking
  drawGiantMushroom(w * 0.12, h * 0.42, Math.min(w, h) * 0.08);
  drawGiantMushroom(w * 0.88, h * 0.4, Math.min(w, h) * 0.07);

  // Title
  var pulse = Math.sin(STATE.titlePulse) * 3;
  var titleSize = Math.max(20, Math.floor(Math.min(w, h) * 0.06));
  ctx.font = "bold " + titleSize + "px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // Shadow
  ctx.fillStyle = "#000";
  ctx.fillText("BASELING BLOCKS", w / 2 + 2, h * 0.1 + 2 + pulse);

  // Rainbow letters
  var title = "BASELING BLOCKS";
  var measured = ctx.measureText(title).width;
  var startX = w / 2 - measured / 2;
  for (var ci = 0; ci < title.length; ci++) {
    var ch = title[ci];
    var chW = ctx.measureText(ch).width;
    if (ch !== " ") {
      ctx.fillStyle = COLORS[ci % 6];
      ctx.textAlign = "left";
      ctx.fillText(ch, startX, h * 0.1 + pulse);
    }
    startX += chW;
  }
  ctx.textAlign = "center";

  // Subtitle
  ctx.font = scaledFont(0.018);
  ctx.fillStyle = "#a855f7";
  ctx.fillText("Game night in Tasern! Race your baseling to the finish!", w / 2, h * 0.17);

  // Selected baseling name (Base-blue) + 5 stat bars in their canonical colors.
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.font = scaledFont(0.014);
  ctx.fillStyle = "#0052FF";
  ctx.fillText("Your Baseling: " + (_sel ? _sel.charName : "WIMMPLE") + (_sel && _sel.tokenId != null ? " #" + _sel.tokenId : ""), w / 2, h * 0.21);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS;
    var _bw = Math.min(w * 0.09, 48), _x0 = w / 2 - _bw * 2.5;
    ctx.font = scaledFont(0.011);
    for (var _i = 0; _i < _keys.length; _i++) {
      var _mm = _meta[_keys[_i]], _v = _sel.stats[_keys[_i]], _bx = _x0 + _i * _bw;
      ctx.fillStyle = _mm.color; ctx.textAlign = "left"; ctx.fillText(_mm.label, _bx, h * 0.24);
      ctx.fillStyle = "#222"; ctx.fillRect(_bx, h * 0.245, _bw * 0.8, 5);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, h * 0.245, _bw * 0.8 * Math.max(0.04, Math.min(1, _v / 200)), 5);
    }
    ctx.textAlign = "center";
  }

  // Decorative baseling tokens
  var tokenSize = Math.min(w, h) * 0.035;
  drawPlayerToken(w * 0.18, h * 0.46, tokenSize, PLAYER_COLORS[0], PLAYER_ICONS[0], false, true);
  drawPlayerToken(w * 0.38, h * 0.48, tokenSize * 0.85, PLAYER_COLORS[1], PLAYER_ICONS[1], false);
  drawPlayerToken(w * 0.62, h * 0.48, tokenSize * 0.85, PLAYER_COLORS[2], PLAYER_ICONS[2], false);
  drawPlayerToken(w * 0.82, h * 0.46, tokenSize, PLAYER_COLORS[3], PLAYER_ICONS[3], false);

  // NES Control instructions
  var ctrlY = h * 0.54;
  ctx.font = scaledFont(0.014, true);
  ctx.fillStyle = "#aaa";
  ctx.fillText("-- CONTROLS --", w / 2, ctrlY);
  ctx.font = scaledFont(0.012);
  ctx.fillStyle = "#888";
  ctx.fillText("CLICK/TAP - Draw cards, attack, navigate", w / 2, ctrlY + 18);
  ctx.fillText("SPACE/ENTER - Attack in combat", w / 2, ctrlY + 34);
  ctx.fillText("Draw cards to move. Dodge POOP. Reach the Mushroom Citadel!", w / 2, ctrlY + 50);
  ctx.fillStyle = "#0052FF";
  ctx.font = scaledFont(0.013, true);
  ctx.fillText("[C] SELECT BASELING", w / 2, ctrlY + 68);

  // Player count buttons
  var btnW = Math.min(w * 0.22, 160);
  var btnH = Math.max(36, h * 0.06);
  var gap = Math.max(10, w * 0.02);
  var totalBtnW = btnW * 3 + gap * 2;
  var bStartX = w / 2 - totalBtnW / 2;
  var btnY = h * 0.72;

  ctx.font = scaledFont(0.014);
  ctx.fillStyle = "#888";
  ctx.fillText("Choose players (You + AI)", w / 2, btnY - btnH * 0.5);

  for (var n = 0; n < 3; n++) {
    var count = n + 2;
    var bx = bStartX + n * (btnW + gap);
    var hover = hitTest(mouseX, mouseY, bx, btnY, btnW, btnH);
    var label = count + " Players";
    drawBtn(label, bx, btnY, btnW, btnH, hover);

    if (mouseClicked && hover) {
      settings.numPlayers = count;
      saveSettings();
      sfxClick();
      newGame(count);
    }
  }

  // Tutorial button
  var tutBtnW = Math.min(w * 0.25, 180);
  var tutBtnY = btnY + btnH + 12;
  var tutBtnX = w / 2 - tutBtnW / 2;
  var tutHover = hitTest(mouseX, mouseY, tutBtnX, tutBtnY, tutBtnW, btnH);
  drawBtn("HOW TO PLAY", tutBtnX, tutBtnY, tutBtnW, btnH, tutHover);
  if (mouseClicked && tutHover) {
    STATE.screen = "tutorial";
    STATE.tutorialPage = 0;
    sfxClick();
  }

  // Footer
  ctx.font = scaledFont(0.012);
  ctx.fillStyle = "#444";
  ctx.fillText("Player 1 = Your Baseling, others are AI critters from Tasern", w / 2, h * 0.95);
}
