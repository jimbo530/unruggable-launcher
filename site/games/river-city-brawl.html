<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Baseling Brawl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1c2c; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script src="baseling-sprites.js"></script>
<script src="baseling-player.js"></script>
<script src="tasern-theme.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-art.js"></script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b', 'c'], labels: { a: 'A PUNCH', b: 'B KICK', c: 'PICK' } });

const GROUND_Y = 240;
const GRAVITY = 900;
const ZONE_WIDTH = 960;
const SAVE_KEY = 'rcb_save';

// === ZONES (Tasern-themed) ===
const ZONES = [
  { name: 'Spore Docks', bg: '#0e1b2a', ground: '#2a3a2a', buildings: '#1a2a3a', accent: '#38d973', music: 220 },
  { name: 'Mycelium Market', bg: '#1a120e', ground: '#3a2a1a', buildings: '#2a1a0e', accent: '#f4b41b', music: 262 },
  { name: 'POOP Slums', bg: '#0e0e1a', ground: '#2a2a2a', buildings: '#1a1a2a', accent: '#a855f7', music: 196 },
  { name: 'Community Garden', bg: '#0e1a0e', ground: '#1a3a1a', buildings: '#2a4a2a', accent: '#38d973', music: 330 },
  { name: 'Spore Academy', bg: '#1a1a0e', ground: '#3a3a2a', buildings: '#4a3a1a', accent: '#f4b41b', music: 294 },
  { name: 'Power Plant', bg: '#0e0e0e', ground: '#3a2a2a', buildings: '#2a1a1a', accent: '#e6482e', music: 175 },
  { name: 'Myco Tower', bg: '#060620', ground: '#2a2a3a', buildings: '#1a1a3a', accent: '#3cacd7', music: 350 },
  { name: 'Canopy Rooftop', bg: '#06060e', ground: '#3a3a3a', buildings: '#0e0e2a', accent: '#f4b41b', music: 392 }
];

// === SHOPS (Tasern-themed) ===
const SHOPS = [
  { zone: 0, x: 400, name: 'Spore Sushi', items: [
    { name: 'Myco Roll', cost: 15, stat: 'str', amount: 1, hp: 0 },
    { name: 'Dragon Spore Roll', cost: 30, stat: 'str', amount: 2, hp: 0 },
    { name: 'Garden Sake', cost: 20, stat: 'con', amount: 1, hp: 10 }
  ]},
  { zone: 1, x: 600, name: 'Fungal Grill', items: [
    { name: 'Shroom Burger', cost: 10, stat: 'con', amount: 1, hp: 10 },
    { name: 'Double Myco Stack', cost: 25, stat: 'con', amount: 2, hp: 20 },
    { name: 'Mega Fungal Meal', cost: 50, stat: 'con', amount: 3, hp: 40 }
  ]},
  { zone: 3, x: 300, name: 'Spore Library', items: [
    { name: 'Reflex Spores', cost: 20, stat: 'dex', amount: 1, hp: 0 },
    { name: 'Wisdom Mycelium', cost: 25, stat: 'wis', amount: 2, hp: 0 },
    { name: 'Focus Fungus', cost: 40, stat: 'int', amount: 2, hp: 0 }
  ]},
  { zone: 4, x: 700, name: 'Garden Dojo', items: [
    { name: 'Spin Kick Scroll', cost: 60, stat: 'move_spin', amount: 1, hp: 0 },
    { name: 'Spore Punch Scroll', cost: 80, stat: 'move_dragon', amount: 1, hp: 0 },
    { name: 'Stone Hands Scroll', cost: 100, stat: 'move_stone', amount: 1, hp: 0 }
  ]},
  { zone: 5, x: 500, name: 'POOP Vendor', items: [
    { name: 'Lucky Spore Gem', cost: 35, stat: 'cha', amount: 1, hp: 0 },
    { name: 'Garden Seed Charm', cost: 60, stat: 'cha', amount: 2, hp: 0 },
    { name: 'Mycelium Chain Shard', cost: 45, stat: 'str', amount: 3, hp: 0 }
  ]}
];

// === BOSS DATA (Tasern bosses) ===
const BOSSES = [
  { name: 'Dock Mycoid', hp: 80, color: '#336655', size: 1.3, punch: 8, speed: 0.6, pattern: 'charge' },
  { name: 'Market Mold Lord', hp: 100, color: '#7a444a', size: 1.2, punch: 10, speed: 0.8, pattern: 'summon' },
  { name: 'POOP Warden', hp: 120, color: '#664488', size: 1.4, punch: 12, speed: 0.7, pattern: 'shockwave' },
  { name: 'Garden Overgrowth', hp: 100, color: '#448844', size: 1.1, punch: 9, speed: 1.0, pattern: 'scatter' },
  { name: 'Toxic Headspore', hp: 140, color: '#888844', size: 1.3, punch: 14, speed: 0.7, pattern: 'charge' },
  { name: 'Power Plant Boss', hp: 160, color: '#e6482e', size: 1.5, punch: 16, speed: 0.5, pattern: 'shockwave' },
  { name: 'Myco Tower Sentinel', hp: 180, color: '#3cacd7', size: 1.4, punch: 18, speed: 0.8, pattern: 'summon' },
  { name: 'Fungi Overlord', hp: 250, color: '#a855f7', size: 1.6, punch: 22, speed: 0.9, pattern: 'charge' }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let titleFrame = 0;

// Player
let player = null;
let camera = { x: 0, y: 0 };
let currentZone = 0;
let money = 0;
let lives = 3;
let continues = 3;
let score = 0;
let xp = 0;
let highScore = TAS.score.load('rcb_hi');
let bossesDefeated = [];
let unlockedMoves = { spin: false, dragon: false, stone: false };

// === statB SYSTEM (via BaselingPlayer.getMults — see ARCADE-STATS.md) ===
// STR = punch/kick damage        (PWR)
// DEX = movement speed + dodge   (SPD)
// CON = max HP, durability        (STA)
// INT = score multiplier, XP      (LCK)
// WIS = combo window duration     (LCK)
// CHA = item drop chance, prices  (LCK)
// The brawler upgrades these stats in its shop as progression. The selected baseling's
// bounded multipliers set the STARTING build (a stronger pet starts buffed); the shop
// builds on top. recomputeStats() recomputes the starting build and is applied only when
// a NEW game begins, so loading a save keeps the player's earned upgrades.
let baseStatB = { str: 5, dex: 3, con: 4, int: 2, wis: 3, cha: 2 };
let statB = { str: 5, dex: 3, con: 4, int: 2, wis: 3, cha: 2 };
function recomputeStats() {
  var m = (window.BaselingPlayer && BaselingPlayer.getMults) ? BaselingPlayer.getMults() : { moveSpeed: 1, health: 1, damage: 1, luck: 1, swim: 1 };
  baseStatB = {
    str: Math.max(1, Math.round(5 * m.damage)),    // PWR -> punch/kick damage
    dex: Math.max(1, Math.round(3 * m.moveSpeed)),  // SPD -> move speed + dodge
    con: Math.max(1, Math.round(4 * m.health)),     // STA -> HP / durability
    int: Math.max(1, Math.round(2 * m.luck)),       // LCK -> score / XP
    wis: Math.max(1, Math.round(3 * m.luck)),       // LCK -> combo window
    cha: Math.max(1, Math.round(2 * m.luck))        // LCK -> drops / shop prices
  };
}
recomputeStats();
var picking = false; // baseling character-select overlay is open
if (window.BaselingPlayer && BaselingPlayer.init) {
  BaselingPlayer.init().then(function () { recomputeStats(); }).catch(function (e) { console.warn('[river-city-brawl] player init failed:', e && e.message); });
}

function getMaxHp() { return 60 + statB.con * 10; }
function getMoveSpeed() { return 100 + statB.dex * 18; }
function getDodgeChance() { return Math.min(0.35, statB.dex * 0.025); }
function getScoreMult() { return 1 + statB.int * 0.15; }
function getComboWindow() { return 60 + statB.wis * 12; }
function getDropChance() { return 0.1 + statB.cha * 0.05; }
function getPunchDmg() { return Math.floor(3 + statB.str * 1.5); }
function getKickDmg() { return Math.floor(2 + statB.str * 1.3); }

let comboCount = 0;
let comboTimer = 0;
let comboTexts = []; // popup combo text

// World objects
let enemies = [];
let objects = []; // throwable items
let droppedWeapons = []; // weapon pickups
let particles = [];
let floatingTexts = [];
let inShop = false;
let shopData = null;
let shopCursor = 0;
let zoneTransition = 0;
let transitionDir = 0;
let bossActive = false;
let bossWarning = 0;

// Charged punch
let punchHoldTime = 0;
let isPunchHeld = false;

// Dodge roll
let dodgeTimer = 0;
let dodgeCooldown = 0;

// Input buffering
let punchPressed = false;
let kickPressed = false;
let jumpPressed = false;
let lastPunch = false;
let lastKick = false;
let lastJump = false;

// === PLAYER FACTORY ===
function createPlayer() {
  const hp = getMaxHp();
  return {
    x: 100, y: GROUND_Y, vx: 0, vy: 0,
    w: 20, h: 36,
    hp: hp, maxHp: hp,
    stamina: 50 + statB.con * 5, maxStamina: 50 + statB.con * 5,
    facing: 1,
    grounded: true,
    state: 'idle',
    stateTimer: 0,
    comboStep: 0,
    kickStep: 0,
    invuln: 0,
    grabbing: null,
    heldObject: null,
    weapon: null, // equipped weapon
    weaponTimer: 0 // durability
  };
}

// === ENEMY FACTORY (Tasern enemies) ===
function createEnemy(x, y, type) {
  const types = {
    'reactor_punk': { hp: 22, color: '#7a444a', speed: 55, punch: 5, money: 2, w: 18, h: 32, score: 100,
      hat: '#a855f7', accent: '#a855f7' },
    'spore_thug': { hp: 28, color: '#448844', speed: 45, punch: 6, money: 3, w: 18, h: 34, score: 150,
      hat: '#38d973', accent: '#38d973' },
    'mycelial_brute': { hp: 50, color: '#446666', speed: 30, punch: 9, money: 5, w: 24, h: 40, score: 250,
      hat: '#3cacd7', accent: '#3cacd7' },
    'spore_ninja': { hp: 20, color: '#1a331a', speed: 75, punch: 7, money: 4, w: 16, h: 30, score: 200,
      hat: '#38d973', accent: '#38d973' }
  };
  const t = types[type] || types['reactor_punk'];
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: t.w, h: t.h,
    hp: t.hp, maxHp: t.hp,
    color: t.color,
    hat: t.hat,
    accent: t.accent,
    speed: t.speed,
    punch: t.punch,
    money: t.money,
    score: t.score,
    facing: -1,
    grounded: true,
    state: 'idle',
    stateTimer: 0,
    aiTimer: 0,
    type: type || 'reactor_punk',
    isBoss: false,
    knockback: 0,
    ragdoll: false,
    ragdollVx: 0, ragdollVy: 0,
    dead: false,
    deathTimer: 0,
    flashTimer: 0
  };
}

function createBoss(zoneIdx) {
  const bd = BOSSES[zoneIdx];
  const e = createEnemy(ZONE_WIDTH - 150, GROUND_Y, 'mycelial_brute');
  e.hp = bd.hp; e.maxHp = bd.hp;
  e.color = bd.color;
  e.punch = bd.punch;
  e.speed = bd.speed * 60;
  e.w = Math.floor(22 * bd.size);
  e.h = Math.floor(38 * bd.size);
  e.money = 10 + zoneIdx * 5;
  e.score = 500 + zoneIdx * 200;
  e.isBoss = true;
  e.bossName = bd.name;
  e.bossPhase = 1;
  e.bossPattern = bd.pattern;
  e.bossTimer = 0;
  return e;
}

// === WEAPON SYSTEM ===
const WEAPON_TYPES = {
  'reactor_chain': { damage: 8, range: 40, durability: 12, color: '#a855f7', name: 'Mycelium Chain' },
  'spore_bat': { damage: 10, range: 35, durability: 10, color: '#38d973', name: 'Garden Bat' }
};

function dropWeapon(x, y) {
  if (Math.random() < getDropChance()) {
    const wtype = Math.random() < 0.5 ? 'reactor_chain' : 'spore_bat';
    const w = WEAPON_TYPES[wtype];
    droppedWeapons.push({
      x: x, y: y, type: wtype,
      damage: w.damage, range: w.range, durability: w.durability,
      color: w.color, name: w.name, bobTimer: 0
    });
  }
}

// === OBJECT FACTORY ===
function createObject(x, y, type) {
  const types = {
    trashcan: { w: 14, h: 20, color: '#556655', damage: 10, weight: 2 },
    pipe: { w: 24, h: 6, color: '#778877', damage: 15, weight: 1 },
    box: { w: 16, h: 16, color: '#6B4513', damage: 8, weight: 1 },
    barrel: { w: 18, h: 22, color: '#4a2a0a', damage: 12, weight: 3 },
    spore_crate: { w: 18, h: 18, color: '#336633', damage: 14, weight: 2 }
  };
  const t = types[type] || types.box;
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: t.w, h: t.h,
    color: t.color,
    damage: t.damage,
    weight: t.weight,
    type: type,
    grounded: true,
    thrown: false,
    thrownBy: null
  };
}

// === ZONE MANAGEMENT ===
function spawnZoneEnemies(zoneIdx) {
  enemies = [];
  objects = [];
  droppedWeapons = [];
  const difficulty = zoneIdx + 1;
  const enemyCount = 3 + difficulty;
  const types = ['reactor_punk', 'spore_thug', 'mycelial_brute', 'spore_ninja'];

  for (let i = 0; i < enemyCount; i++) {
    const ex = 200 + Math.random() * (ZONE_WIDTH - 400);
    const ey = GROUND_Y;
    const typeIdx = Math.min(Math.floor(Math.random() * (1 + zoneIdx * 0.4)), types.length - 1);
    enemies.push(createEnemy(ex, ey, types[typeIdx]));
  }

  // Spawn objects
  const objTypes = ['trashcan', 'pipe', 'box', 'barrel', 'spore_crate'];
  const objCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < objCount; i++) {
    const ox = 150 + Math.random() * (ZONE_WIDTH - 300);
    const ot = objTypes[Math.floor(Math.random() * objTypes.length)];
    objects.push(createObject(ox, GROUND_Y, ot));
  }
}

function enterZone(zoneIdx, fromDir) {
  currentZone = zoneIdx;
  spawnZoneEnemies(zoneIdx);
  bossActive = false;
  bossWarning = 0;

  if (fromDir === 1) {
    player.x = 50;
  } else if (fromDir === -1) {
    player.x = ZONE_WIDTH - 50;
  }
  player.y = GROUND_Y;
  player.vx = 0;
  player.vy = 0;
  player.state = 'idle';
  camera.x = Math.max(0, Math.min(player.x - GW / 2, ZONE_WIDTH - GW));
}

// === SAVE / LOAD ===
function saveGame() {
  const data = {
    statB: statB, money: money, lives: lives, continues: continues,
    score: score, xp: xp, currentZone: currentZone, bossesDefeated: bossesDefeated,
    unlockedMoves: unlockedMoves
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    statB = data.statB || statB;
    money = data.money || 0;
    lives = data.lives || 3;
    continues = data.continues || 3;
    score = data.score || 0;
    xp = data.xp || 0;
    currentZone = data.currentZone || 0;
    bossesDefeated = data.bossesDefeated || [];
    unlockedMoves = data.unlockedMoves || { spin: false, dragon: false, stone: false };
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

// === START GAME ===
function startGame(fresh) {
  if (fresh) {
    recomputeStats(); // refresh starting build from the selected baseling
    statB = { str: baseStatB.str, dex: baseStatB.dex, con: baseStatB.con, int: baseStatB.int, wis: baseStatB.wis, cha: baseStatB.cha };
    money = 0; lives = 3; continues = 3; score = 0; xp = 0;
    currentZone = 0; bossesDefeated = [];
    unlockedMoves = { spin: false, dragon: false, stone: false };
  }
  player = createPlayer();
  enterZone(currentZone, 1);
  state = 'playing';
  inShop = false;
  TAS.particles.clear();
  particles = [];
  floatingTexts = [];
  comboTexts = [];
  droppedWeapons = [];
  punchHoldTime = 0;
  isPunchHeld = false;
  dodgeTimer = 0;
  dodgeCooldown = 0;
}

// === COMBAT LOGIC ===
function dealDamage(target, amount, knockDir, isThrow) {
  const def = target.isBoss ? 3 : 0;
  const dmg = Math.max(1, Math.floor(amount - def));
  target.hp -= dmg;
  target.flashTimer = 8;

  // Knockback
  const kb = isThrow ? 8 : (4 - Math.min(3, (target.isBoss ? 5 : statB.str) * 0.3));
  target.vx = knockDir * (80 + kb * 10);

  if (isThrow) {
    target.ragdoll = true;
    target.ragdollVx = knockDir * 200;
    target.ragdollVy = -150;
    target.grounded = false;
    TAS.fx.shake(10, 0.82);
    TAS.audio.playTone(80, 0.3, 'sawtooth', 0.15, 40);
    spawnImpact(target.x, target.y - target.h / 2, '#ffaa00', 16);
  } else {
    TAS.fx.shake(4, 0.88);
    TAS.audio.playTone(150 + Math.random() * 50, 0.1, 'square', 0.08);
    spawnImpact(target.x, target.y - target.h / 2, '#fff', 6);
  }

  // Combo with WIS-based window
  comboCount++;
  comboTimer = getComboWindow();
  const scorePts = Math.floor(10 * comboCount * getScoreMult());
  score += scorePts;
  xp += Math.floor(comboCount * (1 + statB.int * 0.1));

  // Float damage
  floatingTexts.push({ x: target.x, y: target.y - target.h - 10, text: '-' + dmg, color: '#ff4444', life: 40, size: 9 });

  // Combo popup
  if (comboCount > 1) {
    const comboNames = ['', '', 'DOUBLE', 'TRIPLE', 'QUAD', 'PENTA', 'HEXA', 'ULTRA', 'MEGA', 'GIGA'];
    const cname = comboCount < comboNames.length ? comboNames[comboCount] : comboCount + '-HIT';
    comboTexts.push({
      text: cname + '!', x: GW / 2, y: 100,
      life: 45, maxLife: 45,
      color: comboCount >= 5 ? '#a855f7' : comboCount >= 3 ? '#f4b41b' : '#f4b41b',
      size: Math.min(20, 12 + comboCount)
    });
  }

  if (target.hp <= 0) {
    killEnemy(target);
  } else {
    target.state = 'hurt';
    target.stateTimer = 15;
  }
}

function killEnemy(enemy) {
  enemy.dead = true;
  enemy.deathTimer = 60;
  enemy.ragdoll = true;
  enemy.ragdollVx = player.facing * 120;
  enemy.ragdollVy = -200;
  enemy.grounded = false;

  // CHA affects money drop
  const chaBonus = Math.floor(statB.cha * 0.5);
  const m = enemy.money + Math.floor(Math.random() * 3) + chaBonus;
  money += m;
  score += Math.floor(enemy.score * getScoreMult());
  xp += Math.floor(enemy.score * 0.1 * (1 + statB.int * 0.1));
  floatingTexts.push({ x: enemy.x, y: enemy.y - enemy.h - 20, text: '+' + m + 'M', color: '#38d973', life: 50, size: 10 });

  TAS.fx.shake(8, 0.85);
  TAS.fx.flash('#fff', 0.25);
  TAS.audio.playTone(200, 0.2, 'square', 0.1, 100);
  TAS.audio.playTone(300, 0.15, 'sawtooth', 0.06);
  spawnImpact(enemy.x, enemy.y - enemy.h / 2, enemy.color, 18);

  // CHA-based weapon drop
  dropWeapon(enemy.x, enemy.y);

  // CHA-based item drop (extra money)
  if (Math.random() < getDropChance() * 0.5) {
    const bonus = 5 + Math.floor(statB.cha * 2);
    money += bonus;
    floatingTexts.push({ x: enemy.x + 15, y: enemy.y - enemy.h - 30, text: 'BONUS +' + bonus + 'M', color: '#38d973', life: 50, size: 8 });
  }

  if (enemy.isBoss) {
    bossesDefeated.push(currentZone);
    bossActive = false;
    score += Math.floor(1000 * getScoreMult());
    xp += 200;
    floatingTexts.push({ x: enemy.x, y: enemy.y - enemy.h - 40, text: 'BOSS DOWN!', color: '#f4b41b', life: 80, size: 14 });
    comboTexts.push({ text: 'K.O.!', x: GW / 2, y: 80, life: 70, maxLife: 70, color: '#e6482e', size: 24 });
    TAS.fx.shake(14, 0.80);
    TAS.fx.flash('#f4b41b', 0.5);
    saveGame();
  }
}

function playerTakeDamage(amount) {
  if (player.invuln > 0 || player.state === 'dodge') return;

  // DEX dodge chance
  if (Math.random() < getDodgeChance()) {
    floatingTexts.push({ x: player.x, y: player.y - player.h - 10, text: 'DODGE!', color: '#88ccff', life: 30, size: 10 });
    TAS.audio.playTone(500, 0.05, 'sine', 0.04);
    return;
  }

  // CON reduces damage
  const conReduction = Math.floor(statB.con * 0.3);
  const dmg = Math.max(1, Math.floor(amount - conReduction));
  player.hp -= dmg;
  player.invuln = 40;
  player.state = 'hurt';
  player.stateTimer = 20;
  comboCount = 0;
  TAS.fx.shake(5, 0.88);
  TAS.fx.flash('#ff0000', 0.18);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.1, 50);
  floatingTexts.push({ x: player.x, y: player.y - player.h - 10, text: '-' + dmg, color: '#ff6666', life: 40, size: 9 });

  if (player.hp <= 0) {
    playerDie();
  }
}

function playerDie() {
  player.state = 'dead';
  player.stateTimer = 90;
  lives--;
  TAS.fx.shake(12, 0.82);
  TAS.fx.flash('#ff0000', 0.35);
  TAS.audio.playTone(80, 0.5, 'sawtooth', 0.12, 30);
  comboTexts.push({ text: 'DOWN!', x: GW / 2, y: GH / 2, life: 60, maxLife: 60, color: '#ff4444', size: 20 });
}

// === PARTICLE HELPERS ===
function spawnImpact(x, y, color, count) {
  TAS.particles.spawn(x - camera.x, y, color, count || 8, 3, { gravity: 0.15, size: 2, sizeVar: 3 });
}

// === BOSS AI PATTERNS ===
function updateBossAI(e, dt) {
  e.bossTimer -= dt;
  if (e.bossTimer > 0) return;

  const dx = player.x - e.x;
  const dist = Math.abs(dx);
  e.facing = dx > 0 ? 1 : -1;

  // Phase 2 at half HP
  if (e.hp < e.maxHp * 0.5 && e.bossPhase === 1) {
    e.bossPhase = 2;
    e.speed *= 1.3;
    TAS.fx.shake(6, 0.88);
    floatingTexts.push({ x: e.x, y: e.y - e.h - 30, text: 'ENRAGED!', color: '#ff4444', life: 60, size: 12 });
  }

  switch (e.bossPattern) {
    case 'charge':
      if (dist > 80) {
        e.vx = e.facing * e.speed * (e.bossPhase === 2 ? 2.5 : 2);
        e.state = 'walk';
        e.bossTimer = 0.8;
        if (e.bossPhase === 2) spawnImpact(e.x, e.y, '#ff6644', 4);
      } else {
        e.state = 'punch';
        e.stateTimer = 25;
        e.bossTimer = 0.6;
        setTimeout(function() {
          if (e.dead || e.ragdoll) return;
          const attackX = e.x + e.facing * 35;
          if (Math.abs(attackX - player.x) < 35 && Math.abs(e.y - player.y) < 25) {
            playerTakeDamage(e.punch * (e.bossPhase === 2 ? 1.3 : 1));
          }
          TAS.fx.shake(3, 0.9);
        }, 200);
      }
      break;
    case 'summon':
      if (dist < 60 && Math.random() < 0.4) {
        e.state = 'punch';
        e.stateTimer = 25;
        e.bossTimer = 0.8;
        setTimeout(function() {
          if (e.dead) return;
          const attackX = e.x + e.facing * 30;
          if (Math.abs(attackX - player.x) < 30 && Math.abs(e.y - player.y) < 20) {
            playerTakeDamage(e.punch);
          }
        }, 200);
      } else if (enemies.filter(function(en) { return !en.dead && !en.isBoss; }).length < 2 && Math.random() < 0.3) {
        // Summon a minion
        const sx = e.x + (Math.random() < 0.5 ? -60 : 60);
        enemies.push(createEnemy(sx, GROUND_Y, 'reactor_punk'));
        floatingTexts.push({ x: e.x, y: e.y - e.h - 20, text: 'SUMMON!', color: '#aa44ff', life: 40, size: 10 });
        TAS.audio.playTone(200, 0.15, 'sine', 0.08, 400);
        e.bossTimer = 1.5;
      } else {
        e.vx = e.facing * e.speed;
        e.state = 'walk';
        e.bossTimer = 0.5;
      }
      break;
    case 'shockwave':
      if (dist < 50) {
        // Shockwave attack
        e.state = 'punch';
        e.stateTimer = 30;
        e.bossTimer = 1.2;
        setTimeout(function() {
          if (e.dead) return;
          // Hit all nearby
          if (Math.abs(player.x - e.x) < 60 && Math.abs(player.y - e.y) < 30) {
            playerTakeDamage(Math.floor(e.punch * 1.2));
          }
          TAS.fx.shake(8, 0.85);
          spawnImpact(e.x - 30, e.y, '#ff8844', 8);
          spawnImpact(e.x + 30, e.y, '#ff8844', 8);
          TAS.audio.playTone(60, 0.3, 'sawtooth', 0.1, 30);
        }, 300);
      } else {
        e.vx = e.facing * e.speed * 1.2;
        e.state = 'walk';
        e.bossTimer = 0.4;
      }
      break;
    case 'scatter':
      if (dist < 70 && Math.random() < 0.5) {
        // Quick multi-hit
        e.state = 'punch';
        e.stateTimer = 18;
        e.bossTimer = 0.4;
        for (let i = 0; i < 3; i++) {
          setTimeout(function() {
            if (e.dead || e.ragdoll) return;
            const attackX = e.x + e.facing * (20 + i * 8);
            if (Math.abs(attackX - player.x) < 25 && Math.abs(e.y - player.y) < 20) {
              playerTakeDamage(Math.floor(e.punch * 0.5));
            }
          }, 100 + i * 120);
        }
      } else {
        e.vx = e.facing * e.speed * 1.5;
        e.state = 'walk';
        e.bossTimer = 0.3;
      }
      break;
    default:
      e.bossTimer = 0.5;
  }
}

// === ENEMY AI ===
function updateEnemyAI(e, dt) {
  if (e.dead || e.ragdoll) return;
  if (e.state === 'hurt') {
    e.stateTimer -= 1;
    if (e.stateTimer <= 0) e.state = 'idle';
    return;
  }
  if (e.flashTimer > 0) e.flashTimer--;

  // Boss uses special AI
  if (e.isBoss) {
    updateBossAI(e, dt);
    return;
  }

  e.aiTimer -= dt;
  if (e.aiTimer > 0) return;

  const dx = player.x - e.x;
  const dist = Math.abs(dx);
  e.facing = dx > 0 ? 1 : -1;

  if (dist < 30 && Math.random() < 0.4) {
    e.state = 'punch';
    e.stateTimer = 30;
    e.aiTimer = 0.5 + Math.random() * 0.5;

    setTimeout(function() {
      if (e.dead || e.ragdoll) return;
      const attackX = e.x + e.facing * 25;
      if (Math.abs(attackX - player.x) < 25 && Math.abs(e.y - player.y) < 20) {
        playerTakeDamage(e.punch);
      }
    }, 200);
  } else if (dist > 30) {
    e.state = 'walk';
    e.vx = e.facing * e.speed;
    e.aiTimer = 0.3 + Math.random() * 0.4;
  } else {
    e.state = 'idle';
    e.aiTimer = 0.2 + Math.random() * 0.3;
  }
}

// === INPUT HANDLING ===
function getInput() {
  const keys = TAS.input.keys;
  const tc = TAS.input.touch;
  return {
    left: keys['ArrowLeft'] || keys['KeyA'] || tc.left,
    right: keys['ArrowRight'] || keys['KeyD'] || tc.right,
    up: keys['ArrowUp'] || keys['KeyW'] || tc.up,
    down: keys['ArrowDown'] || keys['KeyS'] || tc.down,
    punch: keys['KeyZ'] || keys['KeyJ'] || tc.a,
    kick: keys['KeyX'] || keys['KeyK'] || tc.b,
    jump: keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || tc.up
  };
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 0.8;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  // Combo popups
  for (let i = comboTexts.length - 1; i >= 0; i--) {
    comboTexts[i].life--;
    comboTexts[i].y -= 0.3;
    if (comboTexts[i].life <= 0) comboTexts.splice(i, 1);
  }

  if (state === 'title') {
    titleFrame++;
    if (picking) return; // character-select overlay open — ignore game input
    if (TAS.input.keys['KeyC'] || TAS.input.touch.c) {
      TAS.input.keys['KeyC'] = false; TAS.input.touch.c = false;
      if (window.BaselingPlayer) {
        picking = true;
        BaselingPlayer.select(function () { recomputeStats(); picking = false; });
      }
      return;
    }
    const input = getInput();
    if (input.punch || input.kick || input.jump) {
      TAS.audio.ensureAudio();
      if (loadGame()) {
        startGame(false);
      } else {
        startGame(true);
      }
    }
    return;
  }

  if (state === 'gameOver') {
    titleFrame++;
    const input = getInput();
    if (input.punch || input.kick) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('rcb_hi', highScore);
      }
      state = 'title';
    }
    return;
  }

  if (state === 'transition') {
    zoneTransition -= dt * 2;
    if (zoneTransition <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  // Shop state
  if (inShop) {
    updateShop(dt);
    return;
  }

  const input = getInput();

  // Detect fresh presses
  punchPressed = input.punch && !lastPunch;
  kickPressed = input.kick && !lastKick;
  jumpPressed = input.jump && !lastJump;
  lastPunch = input.punch;
  lastKick = input.kick;
  lastJump = input.jump;

  // Charged punch tracking
  if (input.punch) {
    punchHoldTime += dt;
    isPunchHeld = true;
  } else {
    if (isPunchHeld && punchHoldTime > 0.4 && statB.str >= 10 && player.grounded && player.state !== 'hurt' && player.state !== 'dead') {
      // Release charged punch
      performChargedPunch();
    }
    punchHoldTime = 0;
    isPunchHeld = false;
  }

  // Combo timer (WIS-based window)
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Dodge cooldown
  if (dodgeCooldown > 0) dodgeCooldown -= dt;

  // Player update
  updatePlayer(dt, input);

  // Enemy updates
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    updateEnemyAI(e, dt);

    // Physics
    if (e.ragdoll) {
      e.x += e.ragdollVx * dt;
      e.y += e.ragdollVy * dt;
      e.ragdollVy += GRAVITY * dt;
      if (e.y >= GROUND_Y) {
        e.y = GROUND_Y;
        e.ragdollVx *= 0.5;
        e.ragdollVy = -e.ragdollVy * 0.3;
        if (Math.abs(e.ragdollVy) < 30) {
          e.ragdoll = false;
          e.grounded = true;
          e.ragdollVx = 0;
          e.ragdollVy = 0;
        }
      }
      // Ragdoll hitting other enemies
      for (let j = 0; j < enemies.length; j++) {
        if (i === j || enemies[j].dead) continue;
        if (TAS.hit.rectOverlap(e.x - e.w/2, e.y - e.h, e.w, e.h,
            enemies[j].x - enemies[j].w/2, enemies[j].y - enemies[j].h, enemies[j].w, enemies[j].h)) {
          dealDamage(enemies[j], getPunchDmg() + 3, e.ragdollVx > 0 ? 1 : -1, true);
          e.ragdollVx *= 0.5;
        }
      }
    } else {
      e.x += e.vx * dt;
      e.vx *= 0.85;
    }

    // Remove dead enemies after timer
    if (e.dead) {
      e.deathTimer--;
      if (e.deathTimer <= 0) {
        enemies.splice(i, 1);
      }
    }
  }

  // Object physics
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    if (o.thrown) {
      o.x += o.vx * dt;
      o.y += o.vy * dt;
      o.vy += GRAVITY * dt;
      if (o.y >= GROUND_Y) {
        o.y = GROUND_Y;
        o.thrown = false;
        o.vx = 0; o.vy = 0;
        TAS.audio.playTone(80, 0.1, 'triangle', 0.05);
      }
      // Hit enemies
      for (const e of enemies) {
        if (e.dead) continue;
        if (TAS.hit.rectOverlap(o.x - o.w/2, o.y - o.h, o.w, o.h,
            e.x - e.w/2, e.y - e.h, e.w, e.h)) {
          dealDamage(e, o.damage + getPunchDmg(), o.vx > 0 ? 1 : -1, true);
          o.thrown = false;
          o.vx = 0; o.vy = 0;
          break;
        }
      }
    }
  }

  // Dropped weapon bobbing + pickup
  for (let i = droppedWeapons.length - 1; i >= 0; i--) {
    const w = droppedWeapons[i];
    w.bobTimer += dt;
    if (player.weapon === null && Math.abs(w.x - player.x) < 20 && Math.abs(w.y - player.y) < 20) {
      player.weapon = w;
      player.weaponTimer = w.durability;
      droppedWeapons.splice(i, 1);
      floatingTexts.push({ x: player.x, y: player.y - player.h - 20, text: w.name + '!', color: w.color, life: 50, size: 10 });
      TAS.audio.playTone(523, 0.1, 'sine', 0.06);
      TAS.audio.playTone(659, 0.08, 'sine', 0.05);
    }
  }

  // Check boss spawn
  if (!bossActive && enemies.filter(function(e) { return !e.dead && !e.isBoss; }).length === 0) {
    if (!bossesDefeated.includes(currentZone)) {
      bossWarning += dt;
      if (bossWarning > 2) {
        const boss = createBoss(currentZone);
        enemies.push(boss);
        bossActive = true;
        TAS.audio.playTone(100, 0.5, 'sawtooth', 0.12, 200);
        floatingTexts.push({ x: GW/2 + camera.x, y: 80, text: boss.bossName + '!', color: '#ff4444', life: 90, size: 14 });
        comboTexts.push({ text: 'BOSS FIGHT!', x: GW / 2, y: 120, life: 80, maxLife: 80, color: '#ff4444', size: 18 });
      }
    }
  }

  // Check shop entry
  for (const shop of SHOPS) {
    if (shop.zone === currentZone) {
      if (Math.abs(player.x - shop.x) < 30 && input.up && player.grounded) {
        inShop = true;
        shopData = shop;
        shopCursor = 0;
        TAS.audio.playTone(440, 0.1, 'sine', 0.05);
      }
    }
  }

  // Zone transitions
  if (player.x > ZONE_WIDTH - 20 && currentZone < ZONES.length - 1) {
    if (bossesDefeated.includes(currentZone) || currentZone === 0) {
      zoneTransition = 1;
      transitionDir = 1;
      state = 'transition';
      enterZone(currentZone + 1, 1);
      saveGame();
    }
  } else if (player.x < 20 && currentZone > 0) {
    zoneTransition = 1;
    transitionDir = -1;
    state = 'transition';
    enterZone(currentZone - 1, -1);
  }

  // Camera
  const targetCamX = player.x - GW / 2;
  camera.x += (targetCamX - camera.x) * 0.08;
  camera.x = TAS.math.clamp(camera.x, 0, ZONE_WIDTH - GW);

  // Stamina regen
  if (player.state === 'idle' || player.state === 'walk') {
    player.stamina = Math.min(player.maxStamina, player.stamina + 8 * dt);
  }
}

// === CHARGED PUNCH (STR>=10) ===
function performChargedPunch() {
  if (player.state === 'hurt' || player.state === 'dead' || player.stamina < 8) return;
  player.state = 'punch';
  player.stateTimer = 25;
  player.stamina -= 8;
  const dmg = Math.floor(getPunchDmg() * 2.5);
  TAS.audio.playTone(100, 0.3, 'sawtooth', 0.12, 300);
  TAS.audio.playTone(400, 0.15, 'square', 0.08, 600);
  TAS.fx.shake(8, 0.85);
  spawnImpact(player.x + player.facing * 25, player.y - player.h / 2, '#ff8800', 14);
  floatingTexts.push({ x: player.x, y: player.y - player.h - 15, text: 'CHARGED!', color: '#ff8800', life: 40, size: 11 });
  comboTexts.push({ text: 'POWER PUNCH!', x: GW / 2, y: 110, life: 35, maxLife: 35, color: '#ff8800', size: 16 });
  performAttack(dmg, 35, true);
  player.vx = player.facing * 60;
}

// === PLAYER UPDATE ===
function updatePlayer(dt, input) {
  if (player.state === 'dead') {
    player.stateTimer--;
    if (player.stateTimer <= 0) {
      if (lives > 0) {
        player.hp = getMaxHp();
        player.maxHp = getMaxHp();
        player.stamina = player.maxStamina;
        player.state = 'idle';
        player.invuln = 60;
      } else if (continues > 0) {
        continues--;
        lives = 3;
        player.hp = getMaxHp();
        player.maxHp = getMaxHp();
        player.stamina = player.maxStamina;
        player.state = 'idle';
        player.invuln = 60;
        money = Math.floor(money / 2);
      } else {
        state = 'gameOver';
      }
    }
    return;
  }

  if (player.state === 'hurt') {
    player.stateTimer--;
    if (player.stateTimer <= 0) player.state = 'idle';
    player.vx *= 0.9;
    player.x += player.vx * dt;
    return;
  }

  // Dodge roll (DEX >= 8, double-tap direction or down+jump)
  if (player.state === 'dodge') {
    dodgeTimer -= dt;
    player.x += player.vx * dt;
    player.invuln = 5;
    if (dodgeTimer <= 0) {
      player.state = 'idle';
      player.vx *= 0.3;
    }
    return;
  }

  // Invuln timer
  if (player.invuln > 0) player.invuln--;

  const moveSpeed = getMoveSpeed();

  // Dodge-roll input (DEX >= 8)
  if (statB.dex >= 8 && input.down && jumpPressed && player.grounded && dodgeCooldown <= 0 && player.stamina >= 5) {
    player.state = 'dodge';
    dodgeTimer = 0.3;
    dodgeCooldown = 0.8;
    player.vx = player.facing * moveSpeed * 2;
    player.stamina -= 5;
    TAS.audio.playTone(400, 0.06, 'sine', 0.04, 600);
    spawnImpact(player.x, player.y, '#88ccff', 5);
    return;
  }

  // Attack states
  if (player.state === 'punch' || player.state === 'kick' || player.state === 'jumpkick') {
    player.stateTimer--;
    if (player.stateTimer <= 0) {
      player.state = player.grounded ? 'idle' : 'jump';
    }
    if (!player.grounded) {
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.grounded = true;
        player.vy = 0;
        if (player.state === 'jumpkick') player.state = 'idle';
      }
    }
    player.x += player.vx * dt;
    player.vx *= 0.92;
    return;
  }

  // Movement
  let mx = 0;
  if (input.left) { mx = -1; player.facing = -1; }
  if (input.right) { mx = 1; player.facing = 1; }

  if (mx !== 0 && player.grounded) {
    player.state = 'walk';
    player.vx = mx * moveSpeed;
  } else if (player.grounded && player.state === 'walk') {
    player.state = 'idle';
    player.vx *= 0.8;
  }

  // Jump
  if (jumpPressed && player.grounded && !input.down) {
    player.vy = -350;
    player.grounded = false;
    player.state = 'jump';
    TAS.audio.playTone(300, 0.08, 'square', 0.04, 400);
  }

  // Weapon attack
  if (player.weapon && punchPressed && player.stamina >= 3) {
    player.state = 'punch';
    player.stateTimer = 14;
    player.stamina -= 3;
    player.weaponTimer--;
    const wdmg = Math.floor(getPunchDmg() + player.weapon.damage);
    TAS.audio.playTone(250, 0.1, 'sawtooth', 0.07);
    performAttack(wdmg, player.weapon.range, true);
    spawnImpact(player.x + player.facing * 20, player.y - player.h / 2, player.weapon.color, 4);
    player.vx = player.facing * 30;
    if (player.weaponTimer <= 0) {
      floatingTexts.push({ x: player.x, y: player.y - player.h - 15, text: 'BROKE!', color: '#ff6644', life: 35, size: 9 });
      TAS.audio.playTone(80, 0.15, 'triangle', 0.06);
      player.weapon = null;
    }
    return; // weapon attack takes priority
  }

  // Punch
  if (punchPressed && player.stamina >= 3 && punchHoldTime < 0.15) {
    if (!player.grounded) {
      player.state = 'jumpkick';
      player.stateTimer = 15;
      player.vx = player.facing * 150;
      player.stamina -= 3;
      TAS.audio.playTone(250, 0.08, 'square', 0.06);
      performAttack(Math.floor(getPunchDmg() + getKickDmg()), 35, true);
    } else {
      player.comboStep++;
      player.stamina -= 3;
      if (player.comboStep >= 4) {
        player.state = 'punch';
        player.stateTimer = 20;
        player.comboStep = 0;
        TAS.audio.playTone(400, 0.15, 'sawtooth', 0.08, 600);
        performAttack(Math.floor(getPunchDmg() * 2), 30, true);
        player.vx = player.facing * 40;
      } else {
        player.state = 'punch';
        player.stateTimer = 12;
        TAS.audio.playTone(200 + player.comboStep * 40, 0.08, 'square', 0.06);
        performAttack(Math.floor(getPunchDmg() + player.comboStep), 25, false);
        player.vx = player.facing * 30;
      }
    }
  }

  // Kick
  if (kickPressed && player.stamina >= 4) {
    if (!player.grounded) {
      player.state = 'jumpkick';
      player.stateTimer = 18;
      player.vx = player.facing * 120;
      player.stamina -= 4;
      TAS.audio.playTone(180, 0.1, 'sawtooth', 0.06);
      performAttack(Math.floor(getKickDmg() + 3), 30, false);
    } else {
      player.kickStep++;
      player.stamina -= 4;
      if (player.kickStep >= 3) {
        player.state = 'kick';
        player.stateTimer = 18;
        player.kickStep = 0;
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.07, 80);
        performSweep();
      } else if (unlockedMoves.spin && player.kickStep === 2) {
        player.state = 'kick';
        player.stateTimer = 20;
        TAS.audio.playTone(350, 0.12, 'square', 0.07, 200);
        performSpinKick();
      } else {
        player.state = 'kick';
        player.stateTimer = 14;
        TAS.audio.playTone(160, 0.08, 'sawtooth', 0.05);
        performAttack(Math.floor(getKickDmg() + player.kickStep * 2), 28, false);
      }
    }
  }

  // Special moves
  if (unlockedMoves.dragon && punchPressed && input.up && player.grounded && player.stamina >= 10) {
    player.state = 'punch';
    player.stateTimer = 25;
    player.vy = -250;
    player.grounded = false;
    player.stamina -= 10;
    TAS.audio.playTone(300, 0.2, 'sawtooth', 0.1, 600);
    performAttack(Math.floor(getPunchDmg() * 3), 35, true);
    spawnImpact(player.x, player.y - player.h, '#ff8800', 12);
    comboTexts.push({ text: 'DRAGON!', x: GW / 2, y: 105, life: 30, maxLife: 30, color: '#ff8800', size: 14 });
  }

  if (unlockedMoves.stone && punchPressed && input.down && !jumpPressed && player.grounded && player.stamina >= 8) {
    player.state = 'punch';
    player.stateTimer = 20;
    player.stamina -= 8;
    TAS.audio.playTone(80, 0.3, 'square', 0.1, 40);
    performAttack(Math.floor(getPunchDmg() * 2.5), 40, true);
    TAS.fx.shake(6, 0.86);
    spawnImpact(player.x + player.facing * 20, player.y - 10, '#aaa', 10);
    comboTexts.push({ text: 'STONE!', x: GW / 2, y: 105, life: 30, maxLife: 30, color: '#aaaaaa', size: 14 });
  }

  // Pick up / throw objects
  if (punchPressed && player.heldObject === null && player.weapon === null && player.grounded) {
    for (const o of objects) {
      if (!o.thrown && Math.abs(o.x - player.x) < 25 && Math.abs(o.y - player.y) < 20) {
        player.heldObject = o;
        TAS.audio.playTone(220, 0.05, 'triangle', 0.04);
        break;
      }
    }
  }
  if (player.heldObject && kickPressed) {
    const o = player.heldObject;
    o.thrown = true;
    o.thrownBy = 'player';
    o.vx = player.facing * 300;
    o.vy = -80;
    o.x = player.x + player.facing * 20;
    o.y = player.y - 20;
    player.heldObject = null;
    TAS.audio.playTone(180, 0.1, 'triangle', 0.06, 100);
  }

  // Grab downed enemy
  if (punchPressed && player.grabbing === null && player.grounded) {
    for (const e of enemies) {
      if (!e.dead && e.state === 'hurt' && Math.abs(e.x - player.x) < 30) {
        player.grabbing = e;
        e.state = 'grabbed';
        TAS.audio.playTone(180, 0.05, 'square', 0.04);
        break;
      }
    }
  }
  // Throw grabbed enemy
  if (player.grabbing && kickPressed) {
    const e = player.grabbing;
    e.ragdoll = true;
    e.ragdollVx = player.facing * 250;
    e.ragdollVy = -180;
    e.grounded = false;
    e.state = 'idle';
    dealDamage(e, Math.floor(getPunchDmg() + statB.str), player.facing, true);
    player.grabbing = null;
  }

  // Gravity
  if (!player.grounded) {
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.grounded = true;
      player.vy = 0;
      player.state = 'idle';
    }
  }

  // Position update
  player.x += player.vx * dt;
  player.vx *= 0.88;
  player.x = TAS.math.clamp(player.x, 10, ZONE_WIDTH - 10);

  // Reset combo steps on timeout
  if (player.state === 'idle' || player.state === 'walk') {
    if (frame % 30 === 0) {
      player.comboStep = 0;
      player.kickStep = 0;
    }
  }

  // Held object follows player
  if (player.heldObject) {
    player.heldObject.x = player.x + player.facing * 12;
    player.heldObject.y = player.y - player.h - 5;
  }
}

function performAttack(damage, range, heavy) {
  const attackX = player.x + player.facing * range;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (Math.abs(attackX - e.x) < range && Math.abs(player.y - e.y) < 25) {
      dealDamage(e, damage, player.facing, heavy);
    }
  }
}

function performSweep() {
  const range = 35;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (Math.abs(player.x - e.x) < range && Math.abs(player.y - e.y) < 20) {
      dealDamage(e, Math.floor(getKickDmg() * 1.5), player.facing, false);
      e.ragdoll = true;
      e.ragdollVx = player.facing * 100;
      e.ragdollVy = -120;
      e.grounded = false;
    }
  }
}

function performSpinKick() {
  const range = 40;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (TAS.math.dist(player.x, player.y, e.x, e.y) < range) {
      const dir = e.x > player.x ? 1 : -1;
      dealDamage(e, Math.floor(getKickDmg() * 2), dir, true);
    }
  }
  spawnImpact(player.x, player.y - player.h/2, '#88ccff', 10);
}

// === SHOP UPDATE ===
function updateShop(dt) {
  const input = getInput();
  if (jumpPressed || (TAS.input.keys['Escape'])) {
    inShop = false;
    TAS.audio.playTone(300, 0.08, 'sine', 0.04, 200);
    return;
  }
  if (input.up && !lastJump) {
    shopCursor = Math.max(0, shopCursor - 1);
    TAS.audio.playTone(400, 0.04, 'sine', 0.03);
  }
  if (input.down && frame % 8 === 0) {
    shopCursor = Math.min(shopData.items.length - 1, shopCursor + 1);
    TAS.audio.playTone(380, 0.04, 'sine', 0.03);
  }
  if (punchPressed) {
    const item = shopData.items[shopCursor];
    // CHA discount
    const discount = Math.floor(item.cost * statB.cha * 0.02);
    const finalCost = Math.max(1, item.cost - discount);
    if (money >= finalCost) {
      money -= finalCost;
      if (item.stat === 'move_spin') { unlockedMoves.spin = true; }
      else if (item.stat === 'move_dragon') { unlockedMoves.dragon = true; }
      else if (item.stat === 'move_stone') { unlockedMoves.stone = true; }
      else { statB[item.stat] += item.amount; }
      if (item.hp > 0) {
        player.maxHp = getMaxHp();
        player.hp = Math.min(player.hp + item.hp, player.maxHp);
      }
      player.maxStamina = 50 + statB.con * 5;
      player.stamina = Math.min(player.stamina, player.maxStamina);
      TAS.audio.playTone(523, 0.1, 'sine', 0.06);
      TAS.audio.playTone(659, 0.1, 'sine', 0.06);
      floatingTexts.push({ x: player.x, y: player.y - 50, text: item.name + '!', color: '#44ffaa', life: 60, size: 10 });
      saveGame();
    } else {
      TAS.audio.playTone(100, 0.15, 'square', 0.06);
    }
  }
  lastJump = input.jump || input.up;
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    return;
  }

  if (state === 'transition') {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1 - zoneTransition;
    ctx.fillStyle = ZONES[currentZone].accent;
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ZONES[currentZone].name, GW/2, GH/2 - 5);
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Zone ' + (currentZone + 1) + ' of 8', GW/2, GH/2 + 15);
    // NES-style border line
    ctx.strokeStyle = ZONES[currentZone].accent + '66';
    ctx.lineWidth = 1;
    ctx.strokeRect(40, GH/2 - 25, GW - 80, 55);
    ctx.globalAlpha = 1;
    return;
  }

  // Draw game world
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawObjects();
  drawDroppedWeapons();
  drawEnemies();
  drawPlayer();
  drawFloatingTexts();
  drawComboTexts();
  TAS.particles.draw();

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Shop overlay
  if (inShop) drawShop();

  // Charged punch indicator
  if (isPunchHeld && punchHoldTime > 0.15 && statB.str >= 10 && player.state !== 'dead') {
    const chargePct = Math.min(1, (punchHoldTime - 0.15) / 0.25);
    const px = player.x - camera.x;
    const py = player.y - player.h - 20;
    ctx.fillStyle = 'rgba(255,136,0,' + (0.3 + chargePct * 0.7) + ')';
    ctx.fillRect(px - 12, py - 4, Math.floor(24 * chargePct), 3);
    if (chargePct >= 1) {
      ctx.fillStyle = '#ff8800';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('READY!', px, py - 6);
    }
  }

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW BACKGROUND ===
function drawBackground() {
  const z = ZONES[currentZone];
  const cx = camera.x;

  // Sky with gradient feel
  ctx.fillStyle = z.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Stars/spores in sky
  ctx.fillStyle = z.accent + '22';
  for (let i = 0; i < 20; i++) {
    const sx = ((i * 73 + frame * 0.1) % GW);
    const sy = 10 + (i * 41) % (GROUND_Y - 80);
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
  }

  // Parallax buildings (far)
  ctx.fillStyle = z.buildings;
  for (let i = 0; i < 12; i++) {
    const bx = i * 100 - (cx * 0.3) % 100;
    const bh = 40 + ((i * 37) % 60);
    ctx.fillRect(Math.floor(bx), GROUND_Y - bh - 20, 60, bh + 20);
    // Windows (NES-style grid)
    ctx.fillStyle = z.accent + '33';
    for (let wy = 0; wy < bh - 10; wy += 14) {
      for (let wx = 8; wx < 52; wx += 14) {
        if ((i + wx + wy) % 3 !== 0) {
          ctx.fillRect(Math.floor(bx + wx), GROUND_Y - bh + wy, 6, 8);
        }
      }
    }
    ctx.fillStyle = z.buildings;
  }

  // Mushroom/spore decorations (Tasern)
  ctx.fillStyle = z.accent + '22';
  for (let i = 0; i < 6; i++) {
    const mx = Math.floor(i * 180 - (cx * 0.4) % 180);
    const mh = 15 + (i * 23) % 20;
    // Mushroom stem
    ctx.fillRect(mx + 8, GROUND_Y - mh, 4, mh);
    // Mushroom cap
    ctx.beginPath();
    ctx.arc(mx + 10, GROUND_Y - mh, 8, Math.PI, 0);
    ctx.fill();
  }

  // Near buildings
  ctx.fillStyle = z.buildings + 'cc';
  for (let i = 0; i < 8; i++) {
    const bx = Math.floor(i * 150 - (cx * 0.6) % 150);
    const bh = 30 + ((i * 53) % 50);
    ctx.fillRect(bx, GROUND_Y - bh, 80, bh);
    // Reactor pipe detail
    ctx.fillStyle = z.accent + '18';
    ctx.fillRect(bx + 2, GROUND_Y - bh + 5, 3, bh - 5);
    ctx.fillRect(bx + 77, GROUND_Y - bh + 5, 3, bh - 5);
    ctx.fillStyle = z.buildings + 'cc';
  }

  // Ground
  ctx.fillStyle = z.ground;
  ctx.fillRect(0, GROUND_Y, GW, GH - GROUND_Y);

  // Ground detail (NES-style dashes)
  ctx.fillStyle = z.accent + '22';
  for (let i = 0; i < 30; i++) {
    const gx = Math.floor((i * 37 - cx * 0.8) % GW);
    ctx.fillRect(gx, GROUND_Y + 5 + (i % 3) * 8, 8, 2);
  }

  // Ground line
  ctx.strokeStyle = z.accent + '66';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(GW, GROUND_Y);
  ctx.stroke();

  // Shop signs
  for (const shop of SHOPS) {
    if (shop.zone === currentZone) {
      const sx = Math.floor(shop.x - cx);
      if (sx > -40 && sx < GW + 40) {
        // Building
        ctx.fillStyle = '#221a11';
        ctx.fillRect(sx - 28, GROUND_Y - 65, 56, 50);
        // Sign
        ctx.fillStyle = '#f4b41b';
        ctx.fillRect(sx - 24, GROUND_Y - 60, 48, 20);
        ctx.fillStyle = '#221a11';
        ctx.font = 'bold 6px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(shop.name, sx, GROUND_Y - 47);
        // Door
        ctx.fillStyle = '#442211';
        ctx.fillRect(sx - 6, GROUND_Y - 18, 12, 18);
        // Arrow indicator
        if (Math.abs(player.x - shop.x) < 40) {
          ctx.fillStyle = '#f4b41b';
          ctx.globalAlpha = 0.5 + Math.sin(frame * 0.1) * 0.3;
          ctx.font = '8px monospace';
          ctx.fillText('ENTER', sx, GROUND_Y - 68);
          ctx.globalAlpha = 1;
        }
      }
    }
  }

  // Zone exit markers
  if (bossesDefeated.includes(currentZone) && currentZone < ZONES.length - 1) {
    const ex = Math.floor(ZONE_WIDTH - 10 - cx);
    if (ex > 0 && ex < GW) {
      ctx.fillStyle = '#38d973';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.fillRect(ex - 3, GROUND_Y - 50, 6, 50);
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('>>>', ex, GROUND_Y - 55);
      ctx.globalAlpha = 1;
    }
  }
  if (currentZone > 0) {
    const ex2 = Math.floor(10 - cx);
    if (ex2 > -10 && ex2 < GW) {
      ctx.fillStyle = '#38d973';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.fillRect(ex2 - 3, GROUND_Y - 50, 6, 50);
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('<<<', ex2, GROUND_Y - 55);
      ctx.globalAlpha = 1;
    }
  }
}

// === DRAW PLAYER ===
function drawPlayer() {
  const px = Math.floor(player.x - camera.x);
  const py = player.y;

  // Invuln flicker
  if (player.invuln > 0 && frame % 4 < 2) return;

  ctx.save();
  ctx.translate(px, py);

  // Dodge roll squash
  if (player.state === 'dodge') {
    ctx.scale(1.3, 0.6);
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  const f = player.facing;

  // === BASELING SPRITE ===
  var _ps = player.state;
  var _anim = (_ps === 'dead') ? 'ko' : (_ps === 'hurt') ? 'hurt' :
    (_ps === 'punch' || _ps === 'kick' || _ps === 'jumpkick') ? 'attack' :
    (_ps === 'jump' || _ps === 'dodge') ? 'jump' : (_ps === 'walk' ? 'walk' : 'idle');
  if (!TAS.drawBaseling(ctx, 0, -22, 45, { flipX: f < 0, frame: frame, anim: _anim })) {
  // Body color
  let bodyColor = '#38d973';
  if (player.state === 'hurt') bodyColor = '#e6482e';
  if (player.state === 'dead') bodyColor = '#555';
  if (player.state === 'dodge') bodyColor = '#3cacd7';

  // Legs
  ctx.fillStyle = '#335533';
  const walkBob = player.state === 'walk' ? Math.sin(frame * 0.3) * 4 : 0;
  ctx.fillRect(-5 + Math.floor(walkBob), -12, 5, 12);
  ctx.fillRect(2 - Math.floor(walkBob), -12, 5, 12);
  // Shoes
  ctx.fillStyle = '#553322';
  ctx.fillRect(-6 + Math.floor(walkBob), -2, 6, 3);
  ctx.fillRect(2 - Math.floor(walkBob), -2, 6, 3);

  // Body torso
  ctx.fillStyle = bodyColor;
  ctx.fillRect(-8, -30, 16, 20);
  // Belt
  ctx.fillStyle = '#886644';
  ctx.fillRect(-8, -14, 16, 3);

  // Head
  ctx.fillStyle = '#38d973';
  if (player.state === 'hurt') ctx.fillStyle = '#e6482e';
  ctx.beginPath();
  ctx.arc(0, -36, 9, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(f * 3, -38, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(f * 4, -38, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  if (player.state === 'punch' || player.state === 'kick' || player.state === 'jumpkick') {
    ctx.fillStyle = '#224422';
    ctx.fillRect(f * 2 - 2, -33, 4, 2);
  }
  }

  // Arms based on state
  ctx.fillStyle = bodyColor;
  if (player.state === 'punch') {
    // Extended punch arm
    ctx.fillRect(f * 8, -28, f * 18, 5);
    // Fist
    if (isPunchHeld && punchHoldTime > 0.3 && statB.str >= 10) {
      ctx.fillStyle = '#ff8800';
    } else {
      ctx.fillStyle = '#f4b41b';
    }
    if (unlockedMoves.stone && TAS.input.keys['ArrowDown']) ctx.fillStyle = '#888';
    ctx.fillRect(f * 24, -30, 7, 7);
    // Weapon in hand
    if (player.weapon) {
      ctx.fillStyle = player.weapon.color;
      ctx.fillRect(f * 26, -34, f * 12, 4);
    }
  } else if (player.state === 'kick' || player.state === 'jumpkick') {
    ctx.fillStyle = '#335533';
    ctx.fillRect(f * 5, -8, f * 20, 6);
    // Foot
    ctx.fillStyle = '#553322';
    ctx.fillRect(f * 23, -10, 8, 8);
    // Arms up
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-f * 5, -30, 5, -8);
    ctx.fillRect(f * 5, -30, 5, -8);
  } else {
    // Idle arms
    ctx.fillRect(-9, -28, 4, 14);
    ctx.fillRect(6, -28, 4, 14);
    // Weapon on back
    if (player.weapon) {
      ctx.fillStyle = player.weapon.color;
      ctx.fillRect(-f * 6, -35, 3, 14);
    }
  }

  // Held object indicator
  if (player.heldObject) {
    ctx.fillStyle = player.heldObject.color;
    ctx.fillRect(f * 10, -45, player.heldObject.w, player.heldObject.h);
  }

  // Grabbing indicator
  if (player.grabbing) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GRAB!', 0, -50);
  }

  ctx.restore();
}

// === DRAW ENEMIES (Tasern-themed) ===
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead && e.deathTimer < 20) {
      ctx.globalAlpha = e.deathTimer / 20;
    }

    const ex = Math.floor(e.x - camera.x);
    const ey = e.y;

    ctx.save();
    ctx.translate(ex, ey);

    if (e.ragdoll) {
      ctx.rotate(e.ragdollVx * 0.005);
    }

    // Flash on hit
    const isFlashing = e.flashTimer > 0 && e.flashTimer % 4 < 2;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0, 0, e.w * 0.6, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    const f = e.facing;
    const bodyColor = isFlashing ? '#ffffff' : e.color;

    // Legs
    ctx.fillStyle = isFlashing ? '#dddddd' : '#333';
    ctx.fillRect(-4, -10, 4, 10);
    ctx.fillRect(2, -10, 4, 10);
    // Boots
    ctx.fillStyle = isFlashing ? '#cccccc' : '#444';
    ctx.fillRect(-5, -2, 5, 3);
    ctx.fillRect(2, -2, 5, 3);

    // Torso
    ctx.fillStyle = bodyColor;
    ctx.fillRect(-e.w/2, -e.h + 8, e.w, e.h - 18);

    // Type-specific detail
    if (e.type === 'reactor_punk') {
      // Reactor punk has glowing chest symbol
      ctx.fillStyle = isFlashing ? '#fff' : '#a855f7';
      ctx.fillRect(-3, Math.floor(-e.h/2 - 2), 6, 6);
    } else if (e.type === 'spore_thug') {
      // Spore patches on torso
      ctx.fillStyle = isFlashing ? '#fff' : '#38d973';
      ctx.fillRect(-4, Math.floor(-e.h/2 - 4), 3, 3);
      ctx.fillRect(3, Math.floor(-e.h/2), 3, 3);
    } else if (e.type === 'mycelial_brute') {
      // Thick arms
      ctx.fillStyle = bodyColor;
      ctx.fillRect(-e.w/2 - 3, -e.h + 12, 5, 16);
      ctx.fillRect(e.w/2 - 2, -e.h + 12, 5, 16);
    }

    // Head
    ctx.fillStyle = isFlashing ? '#fff' : (e.hat || e.color);
    ctx.beginPath();
    ctx.arc(0, -e.h + 4, Math.floor(e.w * 0.4), 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(f * 2, -e.h + 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = isFlashing ? '#444' : '#ff0000';
    ctx.beginPath();
    ctx.arc(f * 2.5, -e.h + 2, 1, 0, Math.PI * 2);
    ctx.fill();

    // Attack arm
    if (e.state === 'punch') {
      ctx.fillStyle = bodyColor;
      ctx.fillRect(f * 6, -e.h + 12, f * 16, 5);
      // Fist
      ctx.fillStyle = isFlashing ? '#fff' : (e.accent || '#ffcc44');
      ctx.fillRect(f * 20, -e.h + 10, 6, 7);
    }

    // Boss crown + glow
    if (e.isBoss) {
      ctx.fillStyle = '#f4b41b';
      ctx.beginPath();
      ctx.moveTo(-8, -e.h - 2);
      ctx.lineTo(-5, -e.h - 10);
      ctx.lineTo(-1, -e.h - 5);
      ctx.lineTo(3, -e.h - 12);
      ctx.lineTo(6, -e.h - 5);
      ctx.lineTo(8, -e.h - 2);
      ctx.closePath();
      ctx.fill();
      // Phase 2 red glow
      if (e.bossPhase === 2) {
        ctx.strokeStyle = 'rgba(255,68,68,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, Math.floor(-e.h / 2), e.w, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    ctx.restore();

    // Health bar for boss
    if (e.isBoss && !e.dead) {
      // Boss bar at top of screen
      const barW = 160;
      const barX = Math.floor((GW - barW) / 2);
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(barX - 4, 40, barW + 8, 18);
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, 46, barW, 8);
      ctx.fillStyle = e.bossPhase === 2 ? '#ff4444' : '#cc4444';
      ctx.fillRect(barX, 46, Math.floor(barW * (e.hp / e.maxHp)), 8);
      ctx.strokeStyle = '#666';
      ctx.strokeRect(barX, 46, barW, 8);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.bossName, GW / 2, 44);
    }

    ctx.globalAlpha = 1;
  }
}

// === DRAW OBJECTS ===
function drawObjects() {
  for (const o of objects) {
    if (o === player.heldObject) continue;
    const ox = Math.floor(o.x - camera.x);
    const oy = o.y;

    ctx.fillStyle = o.color;
    if (o.type === 'trashcan') {
      ctx.fillRect(ox - o.w/2, oy - o.h, o.w, o.h);
      ctx.fillStyle = '#777';
      ctx.fillRect(ox - o.w/2 - 2, oy - o.h - 3, o.w + 4, 4);
    } else if (o.type === 'pipe') {
      ctx.fillRect(ox - o.w/2, oy - o.h/2 - 4, o.w, o.h);
      ctx.fillStyle = '#999';
      ctx.fillRect(ox - o.w/2, oy - o.h/2 - 4, 4, o.h);
    } else if (o.type === 'barrel') {
      ctx.beginPath();
      ctx.ellipse(ox, oy - o.h/2, o.w/2, o.h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#2a1a0a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(ox, oy - o.h/2, o.w/2, o.h/2, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (o.type === 'spore_crate') {
      ctx.fillRect(ox - o.w/2, oy - o.h, o.w, o.h);
      // Spore symbol
      ctx.fillStyle = '#38d973';
      ctx.fillRect(ox - 2, oy - o.h + 4, 4, 4);
      ctx.fillRect(ox - 4, oy - o.h + 6, 8, 2);
    } else {
      ctx.fillRect(ox - o.w/2, oy - o.h, o.w, o.h);
    }
  }
}

// === DRAW DROPPED WEAPONS ===
function drawDroppedWeapons() {
  for (const w of droppedWeapons) {
    const wx = Math.floor(w.x - camera.x);
    const wy = Math.floor(w.y - 8 + Math.sin(w.bobTimer * 3) * 3);
    ctx.fillStyle = w.color;
    if (w.type === 'reactor_chain') {
      // Chain links
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(wx - 8 + i * 5, wy, 4, 3);
      }
    } else {
      // Bat shape
      ctx.fillRect(wx - 10, wy, 20, 4);
      ctx.fillRect(wx + 6, wy - 2, 6, 8);
    }
    // Glow
    ctx.fillStyle = w.color + '44';
    ctx.beginPath();
    ctx.arc(wx, wy + 2, 12, 0, Math.PI * 2);
    ctx.fill();
  }
}

// === DRAW FLOATING TEXTS ===
function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const fx = Math.floor(ft.x - camera.x);
    ctx.globalAlpha = Math.min(1, ft.life / 20);
    ctx.fillStyle = ft.color;
    ctx.font = 'bold ' + (ft.size || 9) + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, fx, Math.floor(ft.y));
  }
  ctx.globalAlpha = 1;
}

// === DRAW COMBO TEXTS (screen-space popups) ===
function drawComboTexts() {
  for (const ct of comboTexts) {
    const pct = ct.life / ct.maxLife;
    const scale = 0.5 + pct * 0.5;
    ctx.globalAlpha = Math.min(1, ct.life / 15);
    ctx.save();
    ctx.translate(Math.floor(ct.x), Math.floor(ct.y));
    ctx.scale(scale, scale);
    // Shadow
    ctx.fillStyle = '#000';
    ctx.font = 'bold ' + ct.size + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ct.text, 2, 2);
    // Main
    ctx.fillStyle = ct.color;
    ctx.fillText(ct.text, 0, 0);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
}

// === DRAW HUD ===
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, GW, 36);

  // HP bar (CON-scaled)
  ctx.fillStyle = '#222';
  ctx.fillRect(6, 4, 100, 10);
  const hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#38d973' : hpPct > 0.25 ? '#f4b41b' : '#e6482e';
  ctx.fillRect(6, 4, Math.floor(100 * hpPct), 10);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(6, 4, 100, 10);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP ' + Math.floor(player.hp) + '/' + player.maxHp, 8, 12);

  // Stamina bar
  ctx.fillStyle = '#222';
  ctx.fillRect(6, 18, 80, 7);
  ctx.fillStyle = '#3cacd7';
  ctx.fillRect(6, 18, Math.floor(80 * (player.stamina / player.maxStamina)), 7);
  ctx.strokeStyle = '#555';
  ctx.strokeRect(6, 18, 80, 7);
  ctx.fillStyle = '#3cacd7';
  ctx.font = '7px monospace';
  ctx.fillText('SP', 8, 24);

  // Weapon indicator
  if (player.weapon) {
    ctx.fillStyle = player.weapon.color;
    ctx.font = '7px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(player.weapon.name + ' x' + player.weaponTimer, 90, 24);
  }

  // Money
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(money + 'M', GW - 6, 12);

  // Score + XP
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('SCR:' + score, GW - 6, 22);
  ctx.fillStyle = '#3cacd7';
  ctx.fillText('XP:' + xp, GW - 6, 31);

  // Lives
  ctx.textAlign = 'center';
  ctx.fillStyle = '#38d973';
  ctx.font = 'bold 9px monospace';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('*', Math.floor(GW/2) - 20 + i * 12, 12);
  }

  // Zone name
  ctx.fillStyle = ZONES[currentZone].accent;
  ctx.font = 'bold 8px monospace';
  ctx.fillText(ZONES[currentZone].name, Math.floor(GW/2), 26);

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = comboCount >= 5 ? '#a855f7' : '#f4b41b';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    const pulse = 1 + Math.sin(frame * 0.2) * 0.12;
    ctx.save();
    ctx.translate(120, 14);
    ctx.scale(pulse, pulse);
    ctx.fillText(comboCount + ' HIT!', 0, 0);
    ctx.restore();
  }

  // Boss warning
  if (bossWarning > 0 && bossWarning < 2 && !bossActive) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.5;
    ctx.fillText('WARNING: BOSS APPROACHING', Math.floor(GW/2), Math.floor(GH/2) - 30);
    ctx.globalAlpha = 1;
  }

  // Dodge-roll indicator (DEX >= 8)
  if (statB.dex >= 8 && dodgeCooldown <= 0) {
    ctx.fillStyle = '#88ccff44';
    ctx.font = '6px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DODGE: DOWN+JUMP', 6, GH - 4);
  }

  // Stats display (bottom right, NES-style statB panel)
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(GW - 68, GH - 58, 66, 56);
  ctx.strokeStyle = '#444';
  ctx.strokeRect(GW - 68, GH - 58, 66, 56);
  ctx.font = 'bold 7px monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#ef4444'; ctx.fillText('PWR:' + statB.str, GW - 64, GH - 48); // power -> punch/kick
  ctx.fillStyle = '#fbbf24'; ctx.fillText('SPD:' + statB.dex, GW - 64, GH - 40); // speed -> move/dodge
  ctx.fillStyle = '#4ade80'; ctx.fillText('STA:' + statB.con, GW - 64, GH - 32); // stamina -> HP
  ctx.fillStyle = '#c084fc'; ctx.fillText('LCK:' + statB.cha, GW - 64, GH - 24); // luck -> drops
  ctx.fillStyle = '#c084fc'; ctx.fillText('CMB:' + statB.wis, GW - 64, GH - 16); // combo window
  ctx.fillStyle = '#c084fc'; ctx.fillText('XPB:' + statB.int, GW - 64, GH - 8);  // xp/score bonus
}

// === DRAW SHOP ===
function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.88)';
  ctx.fillRect(60, 40, GW - 120, GH - 80);
  ctx.strokeStyle = '#f4b41b';
  ctx.lineWidth = 2;
  ctx.strokeRect(62, 42, GW - 124, GH - 84);
  // Inner border (NES double-border)
  ctx.strokeStyle = '#7a444a';
  ctx.lineWidth = 1;
  ctx.strokeRect(66, 46, GW - 132, GH - 92);

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(shopData.name, Math.floor(GW/2), 65);

  // CHA discount display
  const chaDiscount = Math.floor(statB.cha * 2);
  ctx.fillStyle = '#f4b41b';
  ctx.font = '10px monospace';
  ctx.fillText(money + 'M' + (chaDiscount > 0 ? '  (CHA -' + chaDiscount + '%)' : ''), Math.floor(GW/2), 82);

  for (let i = 0; i < shopData.items.length; i++) {
    const item = shopData.items[i];
    const iy = 105 + i * 35;
    const selected = i === shopCursor;
    const discount = Math.floor(item.cost * statB.cha * 0.02);
    const finalCost = Math.max(1, item.cost - discount);

    if (selected) {
      ctx.fillStyle = 'rgba(244,180,27,0.15)';
      ctx.fillRect(70, iy - 10, GW - 150, 30);
    }

    ctx.fillStyle = selected ? '#f4b41b' : '#aaa';
    ctx.font = (selected ? 'bold ' : '') + '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText((selected ? '> ' : '  ') + item.name, 80, iy + 5);

    ctx.textAlign = 'right';
    ctx.fillStyle = money >= finalCost ? '#44ff44' : '#ff4444';
    ctx.fillText(finalCost + 'M', GW - 80, iy + 5);

    // Stat boost info
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    if (item.stat.startsWith('move_')) {
      ctx.fillText('New Move!', 95, iy + 16);
    } else {
      const statLabel = item.stat.toUpperCase();
      ctx.fillText('+' + item.amount + ' ' + statLabel + (item.hp ? ' +' + item.hp + ' MaxHP' : ''), 95, iy + 16);
    }
  }

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[A] Buy  [UP/DOWN] Select  [JUMP] Exit', Math.floor(GW/2), GH - 55);
}

// === DRAW TITLE ===
function drawTitle() {
  // Dark background
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _bi = TasernArt.getImg('art/backgrounds/' + TasernArt._auto.bg + (TasernArt._auto.bg.indexOf('bg-') === 0 || TasernArt._auto.bg === 'adventure-level1' || TasernArt._auto.bg === 'tavern-bg' ? '.webp' : '.jpg')); if (_bi) { TasernArt.drawCover(ctx, _bi); ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, GW, GH); } }

  // Animated spore particles
  ctx.fillStyle = '#a855f722';
  for (let i = 0; i < 25; i++) {
    const sx = (i * 67 + titleFrame * 0.3) % GW;
    const sy = (i * 43 + Math.sin(titleFrame * 0.02 + i) * 20) % (GH - 80);
    ctx.beginPath();
    ctx.arc(Math.floor(sx), Math.floor(sy), 2 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }

  // City silhouette
  for (let i = 0; i < 15; i++) {
    const bx = i * 35;
    const bh = 40 + ((i * 47 + titleFrame) % 80);
    ctx.fillStyle = '#0e0e20';
    ctx.fillRect(bx, GH - 80 - bh, 30, bh + 80);
    // Spore glow windows
    if (i % 3 === 0) {
      ctx.fillStyle = '#38d97318';
      ctx.fillRect(bx + 5, GH - 80 - bh + 10, 6, 8);
    }
  }

  // Ground
  ctx.fillStyle = '#1a1c2c';
  ctx.fillRect(0, GH - 80, GW, 80);
  // Ground detail
  ctx.fillStyle = '#2a2a3a';
  for (let i = 0; i < 20; i++) {
    ctx.fillRect(i * 28 + (titleFrame % 28), GH - 75, 12, 2);
  }

  // Title shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 26px monospace';
  ctx.fillText('BASELING BRAWL', Math.floor(GW/2) + 2, 72);
  // Title
  ctx.fillStyle = '#38d973';
  ctx.fillText('BASELING BRAWL', Math.floor(GW/2), 70);
  // Title highlight
  ctx.globalAlpha = 0.3 + Math.sin(titleFrame * 0.03) * 0.15;
  ctx.fillStyle = '#a855f7';
  ctx.fillText('BASELING BRAWL', Math.floor(GW/2), 70);
  ctx.globalAlpha = 1;

  // Subtitle
  ctx.fillStyle = '#a855f7';
  ctx.font = '10px monospace';
  ctx.fillText('Streets of Sporewood', Math.floor(GW/2), 90);

  // Selected baseling preview (idle bob) — falls back to the procedural fighter.
  const bx = Math.floor(GW/2);
  const by = 165;
  if (!(window.TAS && TAS.drawBaseling && TAS.drawBaseling(ctx, bx, by - 28, 40, { anim: 'idle', frame: frame }))) {
    const punchAnim = Math.sin(titleFrame * 0.08) > 0.3;
    // Body
    ctx.fillStyle = '#38d973';
    ctx.fillRect(bx - 8, by - 30, 16, 20);
    // Belt
    ctx.fillStyle = '#7a444a';
    ctx.fillRect(bx - 8, by - 14, 16, 3);
    // Legs
    ctx.fillStyle = '#335533';
    ctx.fillRect(bx - 5, by - 12, 5, 12);
    ctx.fillRect(bx + 2, by - 12, 5, 12);
    // Head
    ctx.fillStyle = '#38d973';
    ctx.beginPath();
    ctx.arc(bx, by - 36, 9, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(bx + 3, by - 38, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(bx + 4, by - 38, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Fist animation
    ctx.fillStyle = '#38d973';
    if (punchAnim) {
      ctx.fillRect(bx + 8, by - 28, 18, 5);
      ctx.fillStyle = '#f4b41b';
      ctx.fillRect(bx + 24, by - 30, 7, 7);
    } else {
      ctx.fillRect(bx + 8, by - 28, 8, 5);
    }
  }

  // Selected baseling name + 5 arcade stat bars (Base-blue accent)
  var _sel = (window.BaselingPlayer && BaselingPlayer.getSelected) ? BaselingPlayer.getSelected() : null;
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText((_sel ? _sel.charName : 'WIMMPLE') + (_sel && _sel.tokenId != null ? ' #' + _sel.tokenId : ''), Math.floor(GW/2), 186);
  if (_sel && _sel.stats && window.BaselingPlayer) {
    var _meta = BaselingPlayer.STAT_META, _keys = BaselingPlayer.STAT_KEYS, _x0 = Math.floor(GW/2) - 110;
    ctx.font = '7px monospace';
    for (var _si = 0; _si < _keys.length; _si++) {
      var _mm = _meta[_keys[_si]], _v = _sel.stats[_keys[_si]], _bx = _x0 + _si * 46;
      ctx.fillStyle = _mm.color; ctx.textAlign = 'left'; ctx.fillText(_mm.label, _bx, 196);
      ctx.fillStyle = '#222'; ctx.fillRect(_bx, 199, 38, 4);
      ctx.fillStyle = _mm.color; ctx.fillRect(_bx, 199, 38 * Math.max(0.04, Math.min(1, _v / 200)), 4);
    }
    ctx.textAlign = 'center';
  }
  ctx.fillStyle = '#0052FF';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('[C] SELECT BASELING', Math.floor(GW/2), 214);

  // NES-style control info
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('A/Z/J = Punch   B/X/K = Kick   SPACE = Jump', Math.floor(GW/2), 228);
  ctx.fillText('Arrow Keys to Move   UP at Shops to Enter', Math.floor(GW/2), 240);

  // Start prompt
  const pulse = Math.sin(titleFrame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS A OR B TO START', Math.floor(GW/2), GH - 42);
  ctx.globalAlpha = 1;

  // Saved game indicator
  try {
    if (localStorage.getItem(SAVE_KEY)) {
      ctx.fillStyle = '#3cacd7';
      ctx.font = '8px monospace';
      ctx.fillText('(saved game found)', Math.floor(GW/2), GH - 27);
    }
  } catch(e) { /* no storage */ }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.fillText('Best: ' + highScore, Math.floor(GW/2), GH - 14);
  }
}

// === DRAW GAME OVER ===
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, GW, GH);
  if (window.TasernArt && TasernArt._auto) { var _ei = TasernArt.getImg('art/enemies/enemy-' + TasernArt._auto.enemy + '.jpg'); if (_ei) { ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, GW, GH); ctx.globalAlpha = 0.3; TasernArt.drawCover(ctx, _ei); ctx.globalAlpha = 1; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, GW, GH); } }

  ctx.textAlign = 'center';
  // Shadow
  ctx.fillStyle = '#440000';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GAME OVER', Math.floor(GW/2) + 2, Math.floor(GH * 0.3) + 2);
  // Main
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', Math.floor(GW/2), Math.floor(GH * 0.3));

  ctx.fillStyle = '#f4b41b';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Score: ' + score, Math.floor(GW/2), Math.floor(GH * 0.42));

  ctx.fillStyle = '#3cacd7';
  ctx.font = '10px monospace';
  ctx.fillText('XP Earned: ' + xp, Math.floor(GW/2), Math.floor(GH * 0.50));

  if (score > highScore) {
    const pulse = Math.sin(titleFrame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#f4b41b';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('NEW HIGH SCORE!', Math.floor(GW/2), Math.floor(GH * 0.58));
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, Math.floor(GW/2), Math.floor(GH * 0.58));
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Zone: ' + ZONES[currentZone].name, Math.floor(GW/2), Math.floor(GH * 0.66));
  ctx.fillText('Bosses Defeated: ' + bossesDefeated.length + '/8', Math.floor(GW/2), Math.floor(GH * 0.73));

  // Stats summary (arcade labels mapped to the brawler's live build)
  ctx.fillStyle = '#888';
  ctx.font = '8px monospace';
  ctx.fillText('PWR:' + statB.str + ' SPD:' + statB.dex + ' STA:' + statB.con + ' LCK:' + statB.cha + ' CMB:' + statB.wis, Math.floor(GW/2), Math.floor(GH * 0.80));

  const pulse2 = Math.sin(titleFrame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#3cacd7';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY BUTTON', Math.floor(GW/2), Math.floor(GH * 0.90));
  ctx.globalAlpha = 1;
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
