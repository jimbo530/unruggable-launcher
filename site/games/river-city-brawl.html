<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>River City Brawl</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; touch-action: none; }
canvas { display: block; margin: 0 auto; }
#back-link {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  color: #666; font-family: monospace; font-size: 12px; text-decoration: none; z-index: 10;
}
#back-link:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="gc"></canvas>
<a id="back-link" href="/games">Back to Arcade</a>
<script src="nft-loader.js"></script>
<script>if(window.NftLoader)NftLoader.gate();</script>
<script src="tasern-engine.js"></script>
<script>
(function() {
"use strict";

// === GAME CONSTANTS ===
const GW = 480, GH = 320;
const ctx = TAS.ctx;
TAS.initCanvas(GW, GH);
TAS.input.initTouch({ buttons: ['a', 'b'], labels: { a: 'PUNCH', b: 'KICK' } });

const GROUND_Y = 240;
const GRAVITY = 900;
const ZONE_WIDTH = 960;
const SAVE_KEY = 'rcb_save';

// === ZONES ===
const ZONES = [
  { name: 'Docks', bg: '#1a2a3a', ground: '#3a4a3a', buildings: '#2a3a4a', accent: '#5588aa', music: 220 },
  { name: 'Market', bg: '#2a1a1a', ground: '#4a3a2a', buildings: '#3a2a1a', accent: '#cc8844', music: 262 },
  { name: 'Slums', bg: '#1a1a2a', ground: '#3a3a3a', buildings: '#2a2a3a', accent: '#7766aa', music: 196 },
  { name: 'Park', bg: '#1a2a1a', ground: '#2a4a2a', buildings: '#3a5a3a', accent: '#44aa44', music: 330 },
  { name: 'School', bg: '#2a2a1a', ground: '#4a4a3a', buildings: '#5a4a2a', accent: '#aaaa44', music: 294 },
  { name: 'Factory', bg: '#1a1a1a', ground: '#4a3a3a', buildings: '#3a2a2a', accent: '#aa4444', music: 175 },
  { name: 'Tower', bg: '#0a0a2a', ground: '#3a3a4a', buildings: '#2a2a4a', accent: '#6688cc', music: 350 },
  { name: 'Rooftop', bg: '#0a0a1a', ground: '#4a4a4a', buildings: '#1a1a3a', accent: '#ffdd44', music: 392 }
];

// === SHOPS ===
const SHOPS = [
  { zone: 0, x: 400, name: 'Sushi Bar', items: [
    { name: 'Tuna Roll', cost: 15, stat: 'punch', amount: 1, hp: 0 },
    { name: 'Dragon Roll', cost: 30, stat: 'punch', amount: 2, hp: 0 },
    { name: 'Stamina Sake', cost: 20, stat: 'stamina', amount: 5, hp: 0 }
  ]},
  { zone: 1, x: 600, name: 'Burger Joint', items: [
    { name: 'Classic Burger', cost: 10, stat: 'defense', amount: 1, hp: 10 },
    { name: 'Double Stack', cost: 25, stat: 'defense', amount: 2, hp: 20 },
    { name: 'Mega Meal', cost: 50, stat: 'defense', amount: 3, hp: 40 }
  ]},
  { zone: 3, x: 300, name: 'Bookstore', items: [
    { name: 'Speed Manual', cost: 20, stat: 'speed', amount: 1, hp: 0 },
    { name: 'Will Tome', cost: 25, stat: 'will', amount: 2, hp: 0 },
    { name: 'Focus Guide', cost: 40, stat: 'speed', amount: 2, hp: 0 }
  ]},
  { zone: 4, x: 700, name: 'Dojo', items: [
    { name: 'Spin Kick', cost: 60, stat: 'move_spin', amount: 1, hp: 0 },
    { name: 'Dragon Punch', cost: 80, stat: 'move_dragon', amount: 1, hp: 0 },
    { name: 'Stone Hands', cost: 100, stat: 'move_stone', amount: 1, hp: 0 }
  ]}
];

// === BOSS DATA ===
const BOSSES = [
  { name: 'Dock Brute', hp: 80, color: '#446688', size: 1.3, punch: 8, speed: 0.6 },
  { name: 'Market Thug', hp: 100, color: '#886644', size: 1.2, punch: 10, speed: 0.8 },
  { name: 'Slum Lord', hp: 120, color: '#664488', size: 1.4, punch: 12, speed: 0.7 },
  { name: 'Park Ranger', hp: 100, color: '#448844', size: 1.1, punch: 9, speed: 1.0 },
  { name: 'Headmaster', hp: 140, color: '#888844', size: 1.3, punch: 14, speed: 0.7 },
  { name: 'Foreman', hp: 160, color: '#884444', size: 1.5, punch: 16, speed: 0.5 },
  { name: 'Tower Guard', hp: 180, color: '#4466aa', size: 1.4, punch: 18, speed: 0.8 },
  { name: 'Shadow King', hp: 250, color: '#aa44aa', size: 1.6, punch: 22, speed: 0.9 }
];

// === GAME STATE ===
let state = 'title';
let frame = 0;
let titleFrame = 0;

// Player
let player = null;
let camera = { x: 0, y: 0 };
let currentZone = 0;
let money = 0;
let lives = 3;
let continues = 3;
let score = 0;
let highScore = TAS.score.load('rcb_hi');
let bossesDefeated = [];
let unlockedMoves = { spin: false, dragon: false, stone: false };

// RPG Stats
let stats = { punch: 5, kick: 5, speed: 3, defense: 2, stamina: 50, will: 3 };
let maxHp = 100;
let comboCount = 0;
let comboTimer = 0;

// World objects
let enemies = [];
let objects = []; // throwable items
let particles = [];
let floatingTexts = [];
let inShop = false;
let shopData = null;
let shopCursor = 0;
let zoneTransition = 0;
let transitionDir = 0;
let bossActive = false;
let bossWarning = 0;

// Input buffering
let punchPressed = false;
let kickPressed = false;
let jumpPressed = false;
let lastPunch = false;
let lastKick = false;
let lastJump = false;

// === PLAYER FACTORY ===
function createPlayer() {
  return {
    x: 100, y: GROUND_Y, vx: 0, vy: 0,
    w: 20, h: 36,
    hp: maxHp, maxHp: maxHp,
    stamina: stats.stamina, maxStamina: stats.stamina,
    facing: 1, // 1=right, -1=left
    grounded: true,
    state: 'idle', // idle, walk, punch, kick, jump, jumpkick, throw, hurt, dead
    stateTimer: 0,
    comboStep: 0, // for punch combos
    kickStep: 0,
    invuln: 0,
    grabbing: null, // grabbed enemy
    heldObject: null
  };
}

// === ENEMY FACTORY ===
function createEnemy(x, y, type) {
  const types = {
    thug: { hp: 20, color: '#aa6644', speed: 40, punch: 4, money: 2, w: 18, h: 32, score: 100 },
    punk: { hp: 30, color: '#6644aa', speed: 55, punch: 6, money: 3, w: 18, h: 34, score: 150 },
    brute: { hp: 50, color: '#446666', speed: 30, punch: 8, money: 5, w: 22, h: 38, score: 250 },
    ninja: { hp: 25, color: '#222222', speed: 70, punch: 7, money: 4, w: 16, h: 30, score: 200 }
  };
  const t = types[type] || types.thug;
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: t.w, h: t.h,
    hp: t.hp, maxHp: t.hp,
    color: t.color,
    speed: t.speed,
    punch: t.punch,
    money: t.money,
    score: t.score,
    facing: -1,
    grounded: true,
    state: 'idle',
    stateTimer: 0,
    aiTimer: 0,
    type: type || 'thug',
    isBoss: false,
    knockback: 0,
    ragdoll: false,
    ragdollVx: 0, ragdollVy: 0,
    dead: false,
    deathTimer: 0
  };
}

function createBoss(zoneIdx) {
  const bd = BOSSES[zoneIdx];
  const e = createEnemy(ZONE_WIDTH - 150, GROUND_Y, 'brute');
  e.hp = bd.hp; e.maxHp = bd.hp;
  e.color = bd.color;
  e.punch = bd.punch;
  e.speed = bd.speed * 60;
  e.w = Math.floor(22 * bd.size);
  e.h = Math.floor(38 * bd.size);
  e.money = 10 + zoneIdx * 5;
  e.score = 500 + zoneIdx * 200;
  e.isBoss = true;
  e.bossName = bd.name;
  e.bossPhase = 1;
  return e;
}

// === OBJECT FACTORY ===
function createObject(x, y, type) {
  const types = {
    trashcan: { w: 14, h: 20, color: '#666', damage: 10, weight: 2 },
    pipe: { w: 24, h: 6, color: '#888', damage: 15, weight: 1 },
    box: { w: 16, h: 16, color: '#8B4513', damage: 8, weight: 1 },
    barrel: { w: 18, h: 22, color: '#5a3a1a', damage: 12, weight: 3 }
  };
  const t = types[type] || types.box;
  return {
    x: x, y: y, vx: 0, vy: 0,
    w: t.w, h: t.h,
    color: t.color,
    damage: t.damage,
    weight: t.weight,
    type: type,
    grounded: true,
    thrown: false,
    thrownBy: null
  };
}

// === ZONE MANAGEMENT ===
function spawnZoneEnemies(zoneIdx) {
  enemies = [];
  objects = [];
  const difficulty = zoneIdx + 1;
  const enemyCount = 3 + difficulty;
  const types = ['thug', 'punk', 'brute', 'ninja'];

  for (let i = 0; i < enemyCount; i++) {
    const ex = 200 + Math.random() * (ZONE_WIDTH - 400);
    const ey = GROUND_Y;
    const typeIdx = Math.min(Math.floor(Math.random() * (1 + zoneIdx * 0.4)), types.length - 1);
    enemies.push(createEnemy(ex, ey, types[typeIdx]));
  }

  // Spawn objects
  const objTypes = ['trashcan', 'pipe', 'box', 'barrel'];
  const objCount = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < objCount; i++) {
    const ox = 150 + Math.random() * (ZONE_WIDTH - 300);
    const ot = objTypes[Math.floor(Math.random() * objTypes.length)];
    objects.push(createObject(ox, GROUND_Y, ot));
  }
}

function enterZone(zoneIdx, fromDir) {
  currentZone = zoneIdx;
  spawnZoneEnemies(zoneIdx);
  bossActive = false;
  bossWarning = 0;

  if (fromDir === 1) {
    player.x = 50;
  } else if (fromDir === -1) {
    player.x = ZONE_WIDTH - 50;
  }
  player.y = GROUND_Y;
  player.vx = 0;
  player.vy = 0;
  player.state = 'idle';
  camera.x = Math.max(0, Math.min(player.x - GW / 2, ZONE_WIDTH - GW));
}

// === SAVE / LOAD ===
function saveGame() {
  const data = {
    stats: stats, money: money, lives: lives, continues: continues,
    score: score, currentZone: currentZone, bossesDefeated: bossesDefeated,
    unlockedMoves: unlockedMoves, maxHp: maxHp
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) { console.error('Save failed:', e); }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    stats = data.stats || stats;
    money = data.money || 0;
    lives = data.lives || 3;
    continues = data.continues || 3;
    score = data.score || 0;
    currentZone = data.currentZone || 0;
    bossesDefeated = data.bossesDefeated || [];
    unlockedMoves = data.unlockedMoves || { spin: false, dragon: false, stone: false };
    maxHp = data.maxHp || 100;
    return true;
  } catch(e) { console.error('Load failed:', e); return false; }
}

// === START GAME ===
function startGame(fresh) {
  if (fresh) {
    stats = { punch: 5, kick: 5, speed: 3, defense: 2, stamina: 50, will: 3 };
    money = 0; lives = 3; continues = 3; score = 0;
    currentZone = 0; bossesDefeated = [];
    unlockedMoves = { spin: false, dragon: false, stone: false };
    maxHp = 100;
  }
  player = createPlayer();
  player.hp = maxHp;
  player.maxHp = maxHp;
  player.stamina = stats.stamina;
  player.maxStamina = stats.stamina;
  enterZone(currentZone, 1);
  state = 'playing';
  inShop = false;
  TAS.particles.clear();
  particles = [];
  floatingTexts = [];
}

// === COMBAT LOGIC ===
function dealDamage(target, amount, knockDir, isThrow) {
  const def = target.isBoss ? 2 : 0;
  const dmg = Math.max(1, amount - def);
  target.hp -= dmg;

  // Knockback
  const kb = isThrow ? 8 : (4 - Math.min(3, (target.isBoss ? 5 : stats.will) * 0.3));
  target.vx = knockDir * (80 + kb * 10);

  if (isThrow) {
    target.ragdoll = true;
    target.ragdollVx = knockDir * 200;
    target.ragdollVy = -150;
    target.grounded = false;
    TAS.fx.shake(8, 0.85);
    TAS.audio.playTone(80, 0.3, 'sawtooth', 0.15, 40);
    spawnImpact(target.x, target.y - target.h / 2, '#ffaa00', 12);
  } else {
    TAS.fx.shake(3, 0.9);
    TAS.audio.playTone(150 + Math.random() * 50, 0.1, 'square', 0.08);
    spawnImpact(target.x, target.y - target.h / 2, '#fff', 5);
  }

  // Combo
  comboCount++;
  comboTimer = 90;
  score += 10 * comboCount;

  // Float damage
  floatingTexts.push({ x: target.x, y: target.y - target.h - 10, text: '-' + dmg, color: '#ff4444', life: 40 });

  if (target.hp <= 0) {
    killEnemy(target);
  } else {
    target.state = 'hurt';
    target.stateTimer = 15;
  }
}

function killEnemy(enemy) {
  enemy.dead = true;
  enemy.deathTimer = 60;
  enemy.ragdoll = true;
  enemy.ragdollVx = player.facing * 120;
  enemy.ragdollVy = -200;
  enemy.grounded = false;

  const m = enemy.money + Math.floor(Math.random() * 3);
  money += m;
  score += enemy.score;
  floatingTexts.push({ x: enemy.x, y: enemy.y - enemy.h - 20, text: '+$' + m, color: '#44ff44', life: 50 });

  TAS.fx.shake(6, 0.88);
  TAS.fx.flash('#fff', 0.2);
  TAS.audio.playTone(200, 0.2, 'square', 0.1, 100);
  TAS.audio.playTone(300, 0.15, 'sawtooth', 0.06);
  spawnImpact(enemy.x, enemy.y - enemy.h / 2, enemy.color, 15);

  if (enemy.isBoss) {
    bossesDefeated.push(currentZone);
    bossActive = false;
    score += 1000;
    floatingTexts.push({ x: enemy.x, y: enemy.y - enemy.h - 40, text: 'BOSS DOWN!', color: '#ffdd44', life: 80 });
    TAS.fx.shake(12, 0.82);
    TAS.fx.flash('#ffdd44', 0.4);
    saveGame();
  }
}

function playerTakeDamage(amount) {
  if (player.invuln > 0) return;
  const dmg = Math.max(1, amount - stats.defense);
  player.hp -= dmg;
  player.invuln = 40;
  player.state = 'hurt';
  player.stateTimer = 20;
  comboCount = 0;
  TAS.fx.shake(4, 0.9);
  TAS.fx.flash('#ff0000', 0.15);
  TAS.audio.playTone(100, 0.2, 'sawtooth', 0.1, 50);
  floatingTexts.push({ x: player.x, y: player.y - player.h - 10, text: '-' + dmg, color: '#ff6666', life: 40 });

  if (player.hp <= 0) {
    playerDie();
  }
}

function playerDie() {
  player.state = 'dead';
  player.stateTimer = 90;
  lives--;
  TAS.fx.shake(10, 0.85);
  TAS.fx.flash('#ff0000', 0.3);
  TAS.audio.playTone(80, 0.5, 'sawtooth', 0.12, 30);
}

// === PARTICLE HELPERS ===
function spawnImpact(x, y, color, count) {
  TAS.particles.spawn(x - camera.x, y, color, count || 8, 3, { gravity: 0.1, size: 2, sizeVar: 2 });
}

// === ENEMY AI ===
function updateEnemyAI(e, dt) {
  if (e.dead || e.ragdoll) return;
  if (e.state === 'hurt') {
    e.stateTimer -= 1;
    if (e.stateTimer <= 0) e.state = 'idle';
    return;
  }

  e.aiTimer -= dt;
  if (e.aiTimer > 0) return;

  const dx = player.x - e.x;
  const dist = Math.abs(dx);
  e.facing = dx > 0 ? 1 : -1;

  if (dist < 30 && Math.random() < 0.4) {
    // Attack
    e.state = 'punch';
    e.stateTimer = 30;
    e.aiTimer = 0.5 + Math.random() * 0.5;

    // Check hit
    setTimeout(function() {
      if (e.dead || e.ragdoll) return;
      const attackX = e.x + e.facing * 25;
      if (Math.abs(attackX - player.x) < 25 && Math.abs(e.y - player.y) < 20) {
        playerTakeDamage(e.punch);
      }
    }, 200);
  } else if (dist > 30) {
    // Move toward player
    e.state = 'walk';
    e.vx = e.facing * e.speed;
    e.aiTimer = 0.3 + Math.random() * 0.4;
  } else {
    e.state = 'idle';
    e.aiTimer = 0.2 + Math.random() * 0.3;
  }
}

// === INPUT HANDLING ===
function getInput() {
  const keys = TAS.input.keys;
  const tc = TAS.input.touch;
  return {
    left: keys['ArrowLeft'] || keys['KeyA'] || tc.left,
    right: keys['ArrowRight'] || keys['KeyD'] || tc.right,
    up: keys['ArrowUp'] || keys['KeyW'] || tc.up,
    down: keys['ArrowDown'] || keys['KeyS'] || tc.down,
    punch: keys['KeyZ'] || keys['KeyJ'] || tc.a,
    kick: keys['KeyX'] || keys['KeyK'] || tc.b,
    jump: keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || tc.up
  };
}

// === MAIN UPDATE ===
function update(dt) {
  frame++;
  TAS.particles.update(dt);
  TAS.fx.updateEffects(dt);

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y -= 0.8;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }

  if (state === 'title') {
    titleFrame++;
    const input = getInput();
    if (input.punch || input.kick || input.jump) {
      TAS.audio.ensureAudio();
      if (loadGame()) {
        startGame(false);
      } else {
        startGame(true);
      }
    }
    return;
  }

  if (state === 'gameOver') {
    titleFrame++;
    const input = getInput();
    if (input.punch || input.kick) {
      if (score > highScore) {
        highScore = score;
        TAS.score.save('rcb_hi', highScore);
      }
      state = 'title';
    }
    return;
  }

  if (state === 'transition') {
    zoneTransition -= dt * 2;
    if (zoneTransition <= 0) {
      state = 'playing';
    }
    return;
  }

  if (state !== 'playing') return;

  // Shop state
  if (inShop) {
    updateShop(dt);
    return;
  }

  const input = getInput();

  // Detect fresh presses
  punchPressed = input.punch && !lastPunch;
  kickPressed = input.kick && !lastKick;
  jumpPressed = input.jump && !lastJump;
  lastPunch = input.punch;
  lastKick = input.kick;
  lastJump = input.jump;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) comboCount = 0;
  }

  // Player update
  updatePlayer(dt, input);

  // Enemy updates
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    updateEnemyAI(e, dt);

    // Physics
    if (e.ragdoll) {
      e.x += e.ragdollVx * dt;
      e.y += e.ragdollVy * dt;
      e.ragdollVy += GRAVITY * dt;
      if (e.y >= GROUND_Y) {
        e.y = GROUND_Y;
        e.ragdollVx *= 0.5;
        e.ragdollVy = -e.ragdollVy * 0.3;
        if (Math.abs(e.ragdollVy) < 30) {
          e.ragdoll = false;
          e.grounded = true;
          e.ragdollVx = 0;
          e.ragdollVy = 0;
        }
      }
      // Ragdoll hitting other enemies
      for (let j = 0; j < enemies.length; j++) {
        if (i === j || enemies[j].dead) continue;
        if (TAS.hit.rectOverlap(e.x - e.w/2, e.y - e.h, e.w, e.h,
            enemies[j].x - enemies[j].w/2, enemies[j].y - enemies[j].h, enemies[j].w, enemies[j].h)) {
          dealDamage(enemies[j], stats.punch + 3, e.ragdollVx > 0 ? 1 : -1, true);
          e.ragdollVx *= 0.5;
        }
      }
    } else {
      e.x += e.vx * dt;
      e.vx *= 0.85;
    }

    // Remove dead enemies after timer
    if (e.dead) {
      e.deathTimer--;
      if (e.deathTimer <= 0) {
        enemies.splice(i, 1);
      }
    }
  }

  // Object physics
  for (let i = objects.length - 1; i >= 0; i--) {
    const o = objects[i];
    if (o.thrown) {
      o.x += o.vx * dt;
      o.y += o.vy * dt;
      o.vy += GRAVITY * dt;
      if (o.y >= GROUND_Y) {
        o.y = GROUND_Y;
        o.thrown = false;
        o.vx = 0; o.vy = 0;
        TAS.audio.playTone(80, 0.1, 'triangle', 0.05);
      }
      // Hit enemies
      for (const e of enemies) {
        if (e.dead) continue;
        if (TAS.hit.rectOverlap(o.x - o.w/2, o.y - o.h, o.w, o.h,
            e.x - e.w/2, e.y - e.h, e.w, e.h)) {
          dealDamage(e, o.damage + stats.punch, o.vx > 0 ? 1 : -1, true);
          o.thrown = false;
          o.vx = 0; o.vy = 0;
          break;
        }
      }
    }
  }

  // Check boss spawn
  if (!bossActive && enemies.filter(e => !e.dead && !e.isBoss).length === 0) {
    if (!bossesDefeated.includes(currentZone)) {
      bossWarning += dt;
      if (bossWarning > 2) {
        const boss = createBoss(currentZone);
        enemies.push(boss);
        bossActive = true;
        TAS.audio.playTone(100, 0.5, 'sawtooth', 0.12, 200);
        floatingTexts.push({ x: GW/2 + camera.x, y: 80, text: boss.bossName + '!', color: '#ff4444', life: 90 });
      }
    }
  }

  // Check shop entry
  for (const shop of SHOPS) {
    if (shop.zone === currentZone) {
      if (Math.abs(player.x - shop.x) < 30 && input.up && player.grounded) {
        inShop = true;
        shopData = shop;
        shopCursor = 0;
        TAS.audio.playTone(440, 0.1, 'sine', 0.05);
      }
    }
  }

  // Zone transitions
  if (player.x > ZONE_WIDTH - 20 && currentZone < ZONES.length - 1) {
    if (bossesDefeated.includes(currentZone) || currentZone === 0) {
      zoneTransition = 1;
      transitionDir = 1;
      state = 'transition';
      enterZone(currentZone + 1, 1);
      saveGame();
    }
  } else if (player.x < 20 && currentZone > 0) {
    zoneTransition = 1;
    transitionDir = -1;
    state = 'transition';
    enterZone(currentZone - 1, -1);
  }

  // Camera
  const targetCamX = player.x - GW / 2;
  camera.x += (targetCamX - camera.x) * 0.08;
  camera.x = TAS.math.clamp(camera.x, 0, ZONE_WIDTH - GW);

  // Stamina regen
  if (player.state === 'idle' || player.state === 'walk') {
    player.stamina = Math.min(player.maxStamina, player.stamina + 8 * dt);
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt, input) {
  if (player.state === 'dead') {
    player.stateTimer--;
    if (player.stateTimer <= 0) {
      if (lives > 0) {
        player.hp = maxHp;
        player.stamina = stats.stamina;
        player.state = 'idle';
        player.invuln = 60;
      } else if (continues > 0) {
        continues--;
        lives = 3;
        player.hp = maxHp;
        player.stamina = stats.stamina;
        player.state = 'idle';
        player.invuln = 60;
        money = Math.floor(money / 2);
      } else {
        state = 'gameOver';
      }
    }
    return;
  }

  if (player.state === 'hurt') {
    player.stateTimer--;
    if (player.stateTimer <= 0) player.state = 'idle';
    player.vx *= 0.9;
    player.x += player.vx * dt;
    return;
  }

  // Invuln timer
  if (player.invuln > 0) player.invuln--;

  const moveSpeed = 120 + stats.speed * 15;

  // Attack states
  if (player.state === 'punch' || player.state === 'kick' || player.state === 'jumpkick') {
    player.stateTimer--;
    if (player.stateTimer <= 0) {
      player.state = player.grounded ? 'idle' : 'jump';
    }
    // Apply gravity in air
    if (!player.grounded) {
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.grounded = true;
        player.vy = 0;
        if (player.state === 'jumpkick') player.state = 'idle';
      }
    }
    player.x += player.vx * dt;
    player.vx *= 0.92;
    return;
  }

  // Movement
  let mx = 0;
  if (input.left) { mx = -1; player.facing = -1; }
  if (input.right) { mx = 1; player.facing = 1; }

  if (mx !== 0 && player.grounded) {
    player.state = 'walk';
    player.vx = mx * moveSpeed;
  } else if (player.grounded && player.state === 'walk') {
    player.state = 'idle';
    player.vx *= 0.8;
  }

  // Jump
  if (jumpPressed && player.grounded) {
    player.vy = -350;
    player.grounded = false;
    player.state = 'jump';
    TAS.audio.playTone(300, 0.08, 'square', 0.04, 400);
  }

  // Punch
  if (punchPressed && player.stamina >= 3) {
    if (!player.grounded) {
      // Jump kick (aerial punch = flying kick)
      player.state = 'jumpkick';
      player.stateTimer = 15;
      player.vx = player.facing * 150;
      player.stamina -= 3;
      TAS.audio.playTone(250, 0.08, 'square', 0.06);
      performAttack(stats.punch + stats.kick, 35, true);
    } else {
      player.comboStep++;
      player.stamina -= 3;
      if (player.comboStep >= 4) {
        // Uppercut finisher
        player.state = 'punch';
        player.stateTimer = 20;
        player.comboStep = 0;
        TAS.audio.playTone(400, 0.15, 'sawtooth', 0.08, 600);
        performAttack(stats.punch * 2, 30, true);
        player.vx = player.facing * 40;
      } else {
        player.state = 'punch';
        player.stateTimer = 12;
        TAS.audio.playTone(200 + player.comboStep * 40, 0.08, 'square', 0.06);
        performAttack(stats.punch + player.comboStep, 25, false);
        player.vx = player.facing * 30;
      }
    }
  }

  // Kick
  if (kickPressed && player.stamina >= 4) {
    if (!player.grounded) {
      player.state = 'jumpkick';
      player.stateTimer = 18;
      player.vx = player.facing * 120;
      player.stamina -= 4;
      TAS.audio.playTone(180, 0.1, 'sawtooth', 0.06);
      performAttack(stats.kick + 3, 30, false);
    } else {
      player.kickStep++;
      player.stamina -= 4;
      if (player.kickStep >= 3) {
        // Sweep
        player.state = 'kick';
        player.stateTimer = 18;
        player.kickStep = 0;
        TAS.audio.playTone(150, 0.15, 'sawtooth', 0.07, 80);
        performSweep();
      } else if (unlockedMoves.spin && player.kickStep === 2) {
        // Spin kick
        player.state = 'kick';
        player.stateTimer = 20;
        TAS.audio.playTone(350, 0.12, 'square', 0.07, 200);
        performSpinKick();
      } else {
        player.state = 'kick';
        player.stateTimer = 14;
        TAS.audio.playTone(160, 0.08, 'sawtooth', 0.05);
        performAttack(stats.kick + player.kickStep * 2, 28, false);
      }
    }
  }

  // Special moves
  if (unlockedMoves.dragon && punchPressed && input.up && player.grounded && player.stamina >= 10) {
    player.state = 'punch';
    player.stateTimer = 25;
    player.vy = -250;
    player.grounded = false;
    player.stamina -= 10;
    TAS.audio.playTone(300, 0.2, 'sawtooth', 0.1, 600);
    performAttack(stats.punch * 3, 35, true);
    spawnImpact(player.x, player.y - player.h, '#ff8800', 10);
  }

  if (unlockedMoves.stone && punchPressed && input.down && player.grounded && player.stamina >= 8) {
    player.state = 'punch';
    player.stateTimer = 20;
    player.stamina -= 8;
    TAS.audio.playTone(80, 0.3, 'square', 0.1, 40);
    performAttack(stats.punch * 2.5, 40, true);
    TAS.fx.shake(5, 0.88);
    spawnImpact(player.x + player.facing * 20, player.y - 10, '#aaa', 8);
  }

  // Pick up / throw objects
  if (punchPressed && player.heldObject === null && player.grounded) {
    for (const o of objects) {
      if (!o.thrown && Math.abs(o.x - player.x) < 25 && Math.abs(o.y - player.y) < 20) {
        player.heldObject = o;
        TAS.audio.playTone(220, 0.05, 'triangle', 0.04);
        break;
      }
    }
  }
  if (player.heldObject && kickPressed) {
    const o = player.heldObject;
    o.thrown = true;
    o.thrownBy = 'player';
    o.vx = player.facing * 300;
    o.vy = -80;
    o.x = player.x + player.facing * 20;
    o.y = player.y - 20;
    player.heldObject = null;
    TAS.audio.playTone(180, 0.1, 'triangle', 0.06, 100);
  }

  // Grab downed enemy
  if (punchPressed && player.grabbing === null && player.grounded) {
    for (const e of enemies) {
      if (!e.dead && e.state === 'hurt' && Math.abs(e.x - player.x) < 30) {
        player.grabbing = e;
        e.state = 'grabbed';
        TAS.audio.playTone(180, 0.05, 'square', 0.04);
        break;
      }
    }
  }
  // Throw grabbed enemy
  if (player.grabbing && kickPressed) {
    const e = player.grabbing;
    e.ragdoll = true;
    e.ragdollVx = player.facing * 250;
    e.ragdollVy = -180;
    e.grounded = false;
    e.state = 'idle';
    dealDamage(e, stats.punch + stats.will, player.facing, true);
    player.grabbing = null;
  }

  // Gravity
  if (!player.grounded) {
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.y >= GROUND_Y) {
      player.y = GROUND_Y;
      player.grounded = true;
      player.vy = 0;
      player.state = 'idle';
    }
  }

  // Position update
  player.x += player.vx * dt;
  player.vx *= 0.88;
  player.x = TAS.math.clamp(player.x, 10, ZONE_WIDTH - 10);

  // Reset combo steps on timeout
  if (player.state === 'idle' || player.state === 'walk') {
    if (frame % 30 === 0) {
      player.comboStep = 0;
      player.kickStep = 0;
    }
  }

  // Held object follows player
  if (player.heldObject) {
    player.heldObject.x = player.x + player.facing * 12;
    player.heldObject.y = player.y - player.h - 5;
  }
}

function performAttack(damage, range, heavy) {
  const attackX = player.x + player.facing * range;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (Math.abs(attackX - e.x) < range && Math.abs(player.y - e.y) < 25) {
      dealDamage(e, damage, player.facing, heavy);
    }
  }
}

function performSweep() {
  const range = 35;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (Math.abs(player.x - e.x) < range && Math.abs(player.y - e.y) < 20) {
      dealDamage(e, stats.kick * 1.5, player.facing, false);
      e.ragdoll = true;
      e.ragdollVx = player.facing * 100;
      e.ragdollVy = -120;
      e.grounded = false;
    }
  }
}

function performSpinKick() {
  const range = 40;
  for (const e of enemies) {
    if (e.dead || e.ragdoll) continue;
    if (TAS.math.dist(player.x, player.y, e.x, e.y) < range) {
      const dir = e.x > player.x ? 1 : -1;
      dealDamage(e, stats.kick * 2, dir, true);
    }
  }
  spawnImpact(player.x, player.y - player.h/2, '#88ccff', 8);
}

// === SHOP UPDATE ===
function updateShop(dt) {
  const input = getInput();
  if (jumpPressed || (TAS.input.keys['Escape'])) {
    inShop = false;
    TAS.audio.playTone(300, 0.08, 'sine', 0.04, 200);
    return;
  }
  if (input.up && !lastJump) {
    shopCursor = Math.max(0, shopCursor - 1);
    TAS.audio.playTone(400, 0.04, 'sine', 0.03);
  }
  if (input.down && frame % 8 === 0) {
    shopCursor = Math.min(shopData.items.length - 1, shopCursor + 1);
    TAS.audio.playTone(380, 0.04, 'sine', 0.03);
  }
  if (punchPressed) {
    const item = shopData.items[shopCursor];
    if (money >= item.cost) {
      money -= item.cost;
      if (item.stat === 'move_spin') { unlockedMoves.spin = true; }
      else if (item.stat === 'move_dragon') { unlockedMoves.dragon = true; }
      else if (item.stat === 'move_stone') { unlockedMoves.stone = true; }
      else { stats[item.stat] += item.amount; }
      if (item.hp > 0) {
        maxHp += item.hp;
        player.maxHp = maxHp;
        player.hp = Math.min(player.hp + item.hp, maxHp);
      }
      player.stamina = stats.stamina;
      player.maxStamina = stats.stamina;
      TAS.audio.playTone(523, 0.1, 'sine', 0.06);
      TAS.audio.playTone(659, 0.1, 'sine', 0.06);
      floatingTexts.push({ x: player.x, y: player.y - 50, text: item.name + '!', color: '#44ffaa', life: 60 });
      saveGame();
    } else {
      TAS.audio.playTone(100, 0.15, 'square', 0.06);
    }
  }
  lastJump = input.jump || input.up;
}

// === DRAW ===
function draw(dt) {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, GW, GH);

  if (state === 'title') {
    drawTitle();
    return;
  }

  if (state === 'gameOver') {
    drawGameOver();
    return;
  }

  if (state === 'transition') {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, GW, GH);
    ctx.globalAlpha = 1 - zoneTransition;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ZONES[currentZone].name, GW/2, GH/2);
    ctx.font = '10px monospace';
    ctx.fillText('Zone ' + (currentZone + 1) + ' of 8', GW/2, GH/2 + 20);
    ctx.globalAlpha = 1;
    return;
  }

  // Draw game world
  ctx.save();
  TAS.fx.applyShake();

  drawBackground();
  drawObjects();
  drawEnemies();
  drawPlayer();
  drawFloatingTexts();
  TAS.particles.draw();

  ctx.restore();
  TAS.fx.drawFlash(GW, GH);

  // HUD
  drawHUD();

  // Shop overlay
  if (inShop) drawShop();

  // Touch controls
  TAS.input.drawTouchControls(GW, GH);
}

// === DRAW BACKGROUND ===
function drawBackground() {
  const z = ZONES[currentZone];
  const cx = camera.x;

  // Sky
  ctx.fillStyle = z.bg;
  ctx.fillRect(0, 0, GW, GH);

  // Parallax buildings (far)
  ctx.fillStyle = z.buildings;
  for (let i = 0; i < 12; i++) {
    const bx = i * 100 - (cx * 0.3) % 100;
    const bh = 40 + ((i * 37) % 60);
    ctx.fillRect(bx, GROUND_Y - bh - 20, 60, bh + 20);
    // Windows
    ctx.fillStyle = z.accent + '44';
    for (let wy = 0; wy < bh - 10; wy += 15) {
      for (let wx = 8; wx < 52; wx += 14) {
        if ((i + wx + wy) % 3 !== 0) {
          ctx.fillRect(bx + wx, GROUND_Y - bh + wy, 8, 10);
        }
      }
    }
    ctx.fillStyle = z.buildings;
  }

  // Near buildings
  ctx.fillStyle = z.buildings + 'cc';
  for (let i = 0; i < 8; i++) {
    const bx = i * 150 - (cx * 0.6) % 150;
    const bh = 30 + ((i * 53) % 50);
    ctx.fillRect(bx, GROUND_Y - bh, 80, bh);
  }

  // Ground
  ctx.fillStyle = z.ground;
  ctx.fillRect(0, GROUND_Y, GW, GH - GROUND_Y);

  // Ground line
  ctx.strokeStyle = z.accent + '66';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(GW, GROUND_Y);
  ctx.stroke();

  // Shop signs
  for (const shop of SHOPS) {
    if (shop.zone === currentZone) {
      const sx = shop.x - cx;
      if (sx > -40 && sx < GW + 40) {
        ctx.fillStyle = '#332211';
        ctx.fillRect(sx - 25, GROUND_Y - 60, 50, 45);
        ctx.fillStyle = '#ffdd88';
        ctx.fillRect(sx - 22, GROUND_Y - 57, 44, 39);
        ctx.fillStyle = '#332211';
        ctx.font = 'bold 7px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(shop.name, sx, GROUND_Y - 35);
        // Door
        ctx.fillStyle = '#553322';
        ctx.fillRect(sx - 8, GROUND_Y - 18, 16, 18);
      }
    }
  }

  // Zone exit markers
  if (bossesDefeated.includes(currentZone) && currentZone < ZONES.length - 1) {
    const ex = ZONE_WIDTH - 10 - cx;
    if (ex > 0 && ex < GW) {
      ctx.fillStyle = '#44ff44';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.fillRect(ex - 3, GROUND_Y - 50, 6, 50);
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('>>>', ex, GROUND_Y - 55);
      ctx.globalAlpha = 1;
    }
  }
  if (currentZone > 0) {
    const ex2 = 10 - cx;
    if (ex2 > -10 && ex2 < GW) {
      ctx.fillStyle = '#44ff44';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.05) * 0.3;
      ctx.fillRect(ex2 - 3, GROUND_Y - 50, 6, 50);
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('<<<', ex2, GROUND_Y - 55);
      ctx.globalAlpha = 1;
    }
  }
}

// === DRAW PLAYER ===
function drawPlayer() {
  const px = player.x - camera.x;
  const py = player.y;

  // Invuln flicker
  if (player.invuln > 0 && frame % 4 < 2) return;

  ctx.save();
  ctx.translate(px, py);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  const f = player.facing;

  // Body
  ctx.fillStyle = '#44aa66'; // baseling green
  if (player.state === 'hurt') ctx.fillStyle = '#ff6666';
  if (player.state === 'dead') ctx.fillStyle = '#666';

  // Legs
  const walkBob = player.state === 'walk' ? Math.sin(frame * 0.3) * 3 : 0;
  ctx.fillRect(-5 + walkBob, -12, 5, 12);
  ctx.fillRect(2 - walkBob, -12, 5, 12);

  // Body torso
  ctx.fillRect(-8, -30, 16, 20);

  // Head
  ctx.fillStyle = '#55cc77';
  ctx.beginPath();
  ctx.arc(0, -36, 9, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(f * 3, -38, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(f * 4, -38, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Arms based on state
  ctx.fillStyle = '#44aa66';
  if (player.state === 'punch') {
    // Extended punch arm
    ctx.fillRect(f * 8, -28, f * 18, 5);
    // Fist
    ctx.fillStyle = '#ffcc44';
    if (unlockedMoves.stone && TAS.input.keys['ArrowDown']) ctx.fillStyle = '#888';
    ctx.fillRect(f * 24, -30, 7, 7);
  } else if (player.state === 'kick' || player.state === 'jumpkick') {
    // Kick leg extended
    ctx.fillStyle = '#44aa66';
    ctx.fillRect(f * 5, -8, f * 20, 6);
    // Foot
    ctx.fillStyle = '#335533';
    ctx.fillRect(f * 23, -10, 8, 8);
    // Arms up
    ctx.fillRect(-f * 5, -30, 5, -8);
    ctx.fillRect(f * 5, -30, 5, -8);
  } else {
    // Idle arms
    ctx.fillRect(-9, -28, 4, 14);
    ctx.fillRect(6, -28, 4, 14);
  }

  // Held object indicator
  if (player.heldObject) {
    ctx.fillStyle = player.heldObject.color;
    ctx.fillRect(f * 10, -45, player.heldObject.w, player.heldObject.h);
  }

  // Grabbing indicator
  if (player.grabbing) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = '6px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GRAB!', 0, -50);
  }

  ctx.restore();
}

// === DRAW ENEMIES ===
function drawEnemies() {
  for (const e of enemies) {
    if (e.dead && e.deathTimer < 20) {
      ctx.globalAlpha = e.deathTimer / 20;
    }

    const ex = e.x - camera.x;
    const ey = e.y;

    ctx.save();
    ctx.translate(ex, ey);

    if (e.ragdoll) {
      ctx.rotate(e.ragdollVx * 0.005);
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 0, e.w * 0.6, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    const f = e.facing;

    // Body
    ctx.fillStyle = e.color;
    if (e.state === 'hurt') ctx.fillStyle = '#ff8888';

    // Legs
    ctx.fillRect(-4, -10, 4, 10);
    ctx.fillRect(2, -10, 4, 10);

    // Torso
    ctx.fillRect(-e.w/2, -e.h + 8, e.w, e.h - 18);

    // Head
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(0, -e.h + 4, e.w * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(f * 2, -e.h + 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(f * 2.5, -e.h + 2, 1, 0, Math.PI * 2);
    ctx.fill();

    // Attack arm
    if (e.state === 'punch') {
      ctx.fillStyle = e.color;
      ctx.fillRect(f * 6, -e.h + 12, f * 16, 5);
    }

    // Boss crown
    if (e.isBoss) {
      ctx.fillStyle = '#ffdd44';
      ctx.beginPath();
      ctx.moveTo(-6, -e.h - 2);
      ctx.lineTo(-4, -e.h - 8);
      ctx.lineTo(0, -e.h - 4);
      ctx.lineTo(4, -e.h - 8);
      ctx.lineTo(6, -e.h - 2);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();

    // Health bar for boss
    if (e.isBoss && !e.dead) {
      ctx.fillStyle = '#333';
      ctx.fillRect(ex - 30, ey - e.h - 18, 60, 6);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(ex - 30, ey - e.h - 18, 60 * (e.hp / e.maxHp), 6);
      ctx.fillStyle = '#fff';
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.bossName, ex, ey - e.h - 22);
    }

    ctx.globalAlpha = 1;
  }
}

// === DRAW OBJECTS ===
function drawObjects() {
  for (const o of objects) {
    if (o === player.heldObject) continue;
    const ox = o.x - camera.x;
    const oy = o.y;

    ctx.fillStyle = o.color;
    if (o.type === 'trashcan') {
      ctx.fillRect(ox - o.w/2, oy - o.h, o.w, o.h);
      ctx.fillStyle = '#888';
      ctx.fillRect(ox - o.w/2 - 2, oy - o.h - 3, o.w + 4, 4);
    } else if (o.type === 'pipe') {
      ctx.fillRect(ox - o.w/2, oy - o.h/2 - 4, o.w, o.h);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(ox - o.w/2, oy - o.h/2 - 4, 4, o.h);
    } else if (o.type === 'barrel') {
      ctx.beginPath();
      ctx.ellipse(ox, oy - o.h/2, o.w/2, o.h/2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3a2a0a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(ox, oy - o.h/2, o.w/2, o.h/2, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillRect(ox - o.w/2, oy - o.h, o.w, o.h);
    }
  }
}

// === DRAW FLOATING TEXTS ===
function drawFloatingTexts() {
  for (const ft of floatingTexts) {
    const fx = ft.x - camera.x;
    ctx.globalAlpha = Math.min(1, ft.life / 20);
    ctx.fillStyle = ft.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, fx, ft.y);
  }
  ctx.globalAlpha = 1;
}

// === DRAW HUD ===
function drawHUD() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, GW, 36);

  // HP bar
  ctx.fillStyle = '#333';
  ctx.fillRect(6, 4, 100, 10);
  const hpPct = player.hp / player.maxHp;
  ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#cccc44' : '#cc4444';
  ctx.fillRect(6, 4, 100 * hpPct, 10);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(6, 4, 100, 10);
  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', 8, 12);

  // Stamina bar
  ctx.fillStyle = '#333';
  ctx.fillRect(6, 18, 80, 8);
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(6, 18, 80 * (player.stamina / player.maxStamina), 8);
  ctx.strokeStyle = '#666';
  ctx.strokeRect(6, 18, 80, 8);
  ctx.fillStyle = '#88ccff';
  ctx.font = '7px monospace';
  ctx.fillText('SP', 8, 25);

  // Money
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('$' + money, GW - 6, 12);

  // Score
  ctx.fillStyle = '#aaa';
  ctx.font = '8px monospace';
  ctx.fillText('SCR:' + score, GW - 6, 24);

  // Lives
  ctx.textAlign = 'center';
  ctx.fillStyle = '#44cc44';
  ctx.font = '9px monospace';
  for (let i = 0; i < lives; i++) {
    ctx.fillText('*', GW/2 - 20 + i * 12, 12);
  }

  // Zone name
  ctx.fillStyle = ZONES[currentZone].accent;
  ctx.font = 'bold 9px monospace';
  ctx.fillText(ZONES[currentZone].name, GW/2, 26);

  // Combo counter
  if (comboCount > 1) {
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    const pulse = 1 + Math.sin(frame * 0.2) * 0.1;
    ctx.save();
    ctx.translate(120, 14);
    ctx.scale(pulse, pulse);
    ctx.fillText(comboCount + ' HIT!', 0, 0);
    ctx.restore();
  }

  // Boss warning
  if (bossWarning > 0 && bossWarning < 2 && !bossActive) {
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.5;
    ctx.fillText('WARNING: BOSS APPROACHING', GW/2, GH/2 - 30);
    ctx.globalAlpha = 1;
  }

  // Stats display (bottom right, small)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(GW - 80, GH - 50, 78, 48);
  ctx.fillStyle = '#aaa';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('PUN:' + stats.punch, GW - 76, GH - 40);
  ctx.fillText('KCK:' + stats.kick, GW - 76, GH - 32);
  ctx.fillText('SPD:' + stats.speed, GW - 76, GH - 24);
  ctx.fillText('DEF:' + stats.defense, GW - 76, GH - 16);
  ctx.fillText('WIL:' + stats.will, GW - 76, GH - 8);
}

// === DRAW SHOP ===
function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(60, 40, GW - 120, GH - 80);
  ctx.strokeStyle = '#ffdd88';
  ctx.lineWidth = 2;
  ctx.strokeRect(62, 42, GW - 124, GH - 84);

  ctx.fillStyle = '#ffdd88';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(shopData.name, GW/2, 65);

  ctx.fillStyle = '#ffdd44';
  ctx.font = '10px monospace';
  ctx.fillText('Money: $' + money, GW/2, 82);

  for (let i = 0; i < shopData.items.length; i++) {
    const item = shopData.items[i];
    const iy = 105 + i * 35;
    const selected = i === shopCursor;

    if (selected) {
      ctx.fillStyle = 'rgba(255,221,68,0.15)';
      ctx.fillRect(70, iy - 10, GW - 150, 30);
    }

    ctx.fillStyle = selected ? '#ffdd44' : '#aaa';
    ctx.font = (selected ? 'bold ' : '') + '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText((selected ? '> ' : '  ') + item.name, 80, iy + 5);

    ctx.textAlign = 'right';
    ctx.fillStyle = money >= item.cost ? '#44ff44' : '#ff4444';
    ctx.fillText('$' + item.cost, GW - 80, iy + 5);

    // Stat boost info
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    if (item.stat.startsWith('move_')) {
      ctx.fillText('New Move!', 95, iy + 16);
    } else {
      ctx.fillText('+' + item.amount + ' ' + item.stat.toUpperCase() + (item.hp ? ' +' + item.hp + ' MaxHP' : ''), 95, iy + 16);
    }
  }

  ctx.fillStyle = '#666';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('[PUNCH] Buy | [UP/DOWN] Select | [JUMP] Exit', GW/2, GH - 55);
}

// === DRAW TITLE ===
function drawTitle() {
  // Animated background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, GW, GH);

  // City silhouette
  for (let i = 0; i < 15; i++) {
    const bx = i * 35;
    const bh = 40 + ((i * 47 + titleFrame) % 80);
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(bx, GH - 80 - bh, 30, bh + 80);
  }

  // Ground
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(0, GH - 80, GW, 80);

  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('RIVER CITY BRAWL', GW/2 + 2, 82);
  ctx.fillStyle = '#44dd88';
  ctx.fillText('RIVER CITY BRAWL', GW/2, 80);

  // Subtitle
  ctx.fillStyle = '#888';
  ctx.font = '10px monospace';
  ctx.fillText('A Tasern Tale', GW/2, 100);

  // Baseling character preview
  const bx = GW/2;
  const by = 180;
  ctx.fillStyle = '#44aa66';
  ctx.fillRect(bx - 8, by - 30, 16, 20);
  ctx.fillStyle = '#55cc77';
  ctx.beginPath();
  ctx.arc(bx, by - 36, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(bx + 3, by - 38, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(bx + 4, by - 38, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Fist
  ctx.fillStyle = '#44aa66';
  ctx.fillRect(bx + 8, by - 28, 18, 5);
  ctx.fillStyle = '#ffcc44';
  ctx.fillRect(bx + 24, by - 30, 7, 7);

  // Instructions
  ctx.fillStyle = '#aaa';
  ctx.font = '9px monospace';
  ctx.fillText('Z/J = Punch | X/K = Kick | Space = Jump', GW/2, 220);
  ctx.fillText('Arrow Keys to Move | Up at shops to enter', GW/2, 235);
  ctx.fillText('Grab hurt enemies + throw them!', GW/2, 250);

  // Start prompt
  const pulse = Math.sin(titleFrame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('PRESS PUNCH OR KICK TO START', GW/2, GH - 40);
  ctx.globalAlpha = 1;

  // Saved game indicator
  try {
    if (localStorage.getItem(SAVE_KEY)) {
      ctx.fillStyle = '#44ccff';
      ctx.font = '8px monospace';
      ctx.fillText('(saved game found)', GW/2, GH - 25);
    }
  } catch(e) { /* no storage */ }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, GH - 12);
  }
}

// === DRAW GAME OVER ===
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, GW, GH);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('GAME OVER', GW/2, GH * 0.3);

  ctx.fillStyle = '#ffdd44';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('Score: ' + score, GW/2, GH * 0.45);

  if (score > highScore) {
    const pulse = Math.sin(titleFrame * 0.06) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffdd44';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('NEW HIGH SCORE!', GW/2, GH * 0.55);
    ctx.globalAlpha = 1;
  } else if (highScore > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Best: ' + highScore, GW/2, GH * 0.55);
  }

  ctx.fillStyle = '#aaa';
  ctx.font = '10px monospace';
  ctx.fillText('Zone: ' + ZONES[currentZone].name, GW/2, GH * 0.65);
  ctx.fillText('Bosses Defeated: ' + bossesDefeated.length + '/8', GW/2, GH * 0.72);

  const pulse2 = Math.sin(titleFrame * 0.05) * 0.3 + 0.7;
  ctx.globalAlpha = pulse2;
  ctx.fillStyle = '#88ccff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('PRESS ANY KEY', GW/2, GH * 0.88);
  ctx.globalAlpha = 1;
}

// === START LOOP ===
TAS.loop.start(update, draw);

})();
</script>
</body>
</html>
