<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carbon Counting Club — Mint</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/tasern-icon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.1/ethers.umd.min.js"></script>
<style>
:root{--accent:#4ade80;--bg:#0a120a;--card:#111a11;--border:#233523}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#ddd;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{color:var(--accent);font-size:26px;margin:14px 0 4px;text-align:center}
.sub{color:#999;font-size:14px;margin-bottom:18px;text-align:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:480px;margin-bottom:16px}
label{display:block;font-size:14px;font-weight:700;color:var(--accent);margin:14px 0 6px}
input{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:10px;padding:14px;color:#fff;font-size:17px;outline:none}
input:focus{border-color:var(--accent)}
.chain-row{display:flex;gap:10px;margin-top:6px}
.chain-btn{flex:1;padding:16px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;background:transparent;color:#888;border:2px solid #333}
.chain-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.big-btn{width:100%;padding:18px;border:none;border-radius:12px;font-size:19px;font-weight:800;cursor:pointer;background:var(--accent);color:#000;margin-top:18px}
.big-btn:disabled{opacity:.4;cursor:not-allowed}
.connect{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.status{font-size:14px;text-align:center;margin-top:12px;min-height:20px;font-weight:600}
.status.ok{color:var(--accent)}.status.err{color:#ef4444}.status.wait{color:#f0d060}
.job{border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:10px;font-size:14px;line-height:1.7}
.job b{color:var(--accent);font-size:16px}
.job a{color:#7dd3fc;text-decoration:none;font-weight:700}
.chainbadge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-left:6px}
.badge-base{background:#1e3a8a;color:#93c5fd}.badge-polygon{background:#4c1d95;color:#c4b5fd}
.small{font-size:12px;color:#777}
.toggle-link{color:#7dd3fc;font-size:13px;cursor:pointer;text-decoration:underline;display:block;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div id="boards-strip" style="position:relative;z-index:5;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px 12px;font-size:12px;font-family:system-ui,sans-serif"><span style="color:#777;align-self:center">🏆 Boards:</span><a href="/tree-leaderboard.html" style="color:#4ade80;text-decoration:none;border:1px solid #2a4a33;border-radius:20px;padding:4px 12px">🌳 Trees Funded</a><a href="/retire-leaderboard.html" style="color:#4fc47f;text-decoration:none;border:1px solid #2a4a33;border-radius:20px;padding:4px 12px">🌍 Carbon Retired</a><a href="/burns.html" style="color:#f0823c;text-decoration:none;border:1px solid #4a332a;border-radius:20px;padding:4px 12px">🔥 Burns</a><a href="/carbon.html" style="color:#c9ced6;text-decoration:none;border:1px solid #3a3a44;border-radius:20px;padding:4px 12px">📊 Carbon Dashboard</a><a href="/ccc.html" style="color:#8fd6a8;text-decoration:none;border:1px solid #2a4a33;border-radius:20px;padding:4px 12px">⛏️ CCC Work Log</a><a href="/leaderboard.html" style="color:#e8b339;text-decoration:none;border:1px solid #4a432a;border-radius:20px;padding:4px 12px">🏅 Community</a></div>

<h1>&#127795; Carbon Counting Club</h1>
<div class="sub"><b>1 CCC = 1 lb CO2e biochar.</b> Sign in with the <b>admin wallet</b>, mint to the worker, save the X post.</div>

<div class="card">
  <label>Chain</label>
  <div class="chain-row">
    <button class="chain-btn active" id="chainBase" onclick="setChain('base')">&#128309; Base</button>
    <button class="chain-btn" id="chainPolygon" onclick="setChain('polygon')">&#128995; Polygon</button>
  </div>

  <button class="big-btn connect" id="connectBtn" onclick="connect()">Connect Wallet</button>

  <div id="mintForm" style="display:none">
    <label>How many lbs (CCC)</label>
    <input type="number" id="amount" placeholder="100" step="any" min="0">
    <label>X post link for this job</label>
    <input type="text" id="xlink" placeholder="https://x.com/...">
    <label>Worker's wallet <span class="small">(who gets the CCC)</span></label>
    <input type="text" id="mintTo" placeholder="0x... paste the worker's address">
    <span class="small" style="display:block;margin-top:4px;cursor:pointer;text-decoration:underline" onclick="document.getElementById('mintTo').value=user">or mint to myself</span>
    <button class="big-btn" id="mintBtn" onclick="mint()">MINT CCC</button>
  </div>
  <div class="status" id="status"></div>

  <span class="toggle-link" onclick="toggleLogOld()">Already minted somewhere else? Log it here</span>
  <div id="oldForm" style="display:none">
    <label>Tx hash of the mint</label>
    <input type="text" id="oldTx" placeholder="0x...">
    <label>X post link</label>
    <input type="text" id="oldX" placeholder="https://x.com/...">
    <button class="big-btn" onclick="logOld()">SAVE JOB LOG</button>
    <div class="status" id="oldStatus"></div>
  </div>
</div>

<div class="card">
  <label style="margin-top:0">Job history</label>
  <div id="jobs"><span class="small">loading…</span></div>
</div>

<script>
// token addrs kept LOWERCASE and checksummed at runtime via ethers.getAddress —
// never hand-typed mixed case (that's how "bad address checksum" happens)
const CHAINS = {
  base:    { id: '0x2105', token: '0xd0581088eaaa4bf9a948b15a057b809c2b0cd61c', name: 'Base',
             add: { chainId:'0x2105', chainName:'Base', nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18}, rpcUrls:['https://mainnet.base.org'], blockExplorerUrls:['https://basescan.org'] } },
  polygon: { id: '0x89',   token: '0x11f98a36acbd04ca3aa3a149d402affbd5966fe7', name: 'Polygon',
             add: { chainId:'0x89', chainName:'Polygon', nativeCurrency:{name:'POL',symbol:'POL',decimals:18}, rpcUrls:['https://polygon-rpc.com'], blockExplorerUrls:['https://polygonscan.com'] } },
};
const tokenAddr = () => ethers.getAddress(CHAINS[chain].token);
const DEC = 16; // CCC = 16 decimals on BOTH chains (not 18!)
const ABI = ['function mint(address to, uint256 amount)'];
let chain = 'base', provider, signer, user;

function setChain(c) {
  chain = c;
  document.getElementById('chainBase').classList.toggle('active', c === 'base');
  document.getElementById('chainPolygon').classList.toggle('active', c === 'polygon');
  if (user) switchNetwork();
}

async function switchNetwork() {
  const cfg = CHAINS[chain];
  try { await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: cfg.id }] }); }
  catch (e) {
    if (e.code === 4902) await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [cfg.add] });
    else throw e;
  }
  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
}

async function connect() {
  if (!window.ethereum) { alert('Open this page in your wallet browser or install a wallet'); return; }
  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send('eth_requestAccounts', []);
  await switchNetwork();
  user = await signer.getAddress();
  document.getElementById('connectBtn').textContent = user.slice(0, 6) + '…' + user.slice(-4) + ' ✓';
  document.getElementById('mintForm').style.display = 'block';
}

function setStatus(id, msg, cls) { const el = document.getElementById(id); el.textContent = msg; el.className = 'status' + (cls ? ' ' + cls : ''); }

function normalizeAddr(raw) {
  // accept any casing: try as-is (checksum-protected), fall back to lowercase
  try { return ethers.getAddress(raw); } catch (e) {}
  try { return ethers.getAddress(raw.toLowerCase()); } catch (e) {}
  return null;
}

async function mint() {
  const amt = document.getElementById('amount').value.trim();
  const xlink = document.getElementById('xlink').value.trim();
  const to = normalizeAddr(document.getElementById('mintTo').value.trim());
  if (!amt || parseFloat(amt) <= 0) { setStatus('status', 'Enter how many lbs', 'err'); return; }
  if (!to) { setStatus('status', 'Bad worker address — paste the full 0x address', 'err'); return; }
  if (xlink && !/^https:\/\/(x\.com|twitter\.com)\//.test(xlink)) { setStatus('status', 'X link must start with https://x.com/', 'err'); return; }

  document.getElementById('mintBtn').disabled = true;
  try {
    await switchNetwork();
    setStatus('status', 'Confirm in wallet…', 'wait');
    const token = new ethers.Contract(tokenAddr(), ABI, signer);
    const tx = await token.mint(to, ethers.parseUnits(amt, DEC));
    setStatus('status', 'Minting…', 'wait');
    await tx.wait();
    setStatus('status', 'Minted ' + amt + ' CCC ✓ — saving job…', 'ok');
    await saveJob(chain, tx.hash, xlink, 'status');
    document.getElementById('amount').value = ''; document.getElementById('xlink').value = '';
  } catch (e) {
    setStatus('status', (e.reason || e.shortMessage || e.message || 'failed').slice(0, 90), 'err');
  }
  document.getElementById('mintBtn').disabled = false;
}

async function saveJob(c, txHash, xLink, statusId) {
  try {
    const r = await fetch('/api/ccc/jobs', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chain: c, txHash, xLink }) });
    const j = await r.json();
    if (j.ok) { setStatus(statusId, 'Job saved ✓', 'ok'); loadJobs(); }
    else setStatus(statusId, 'Mint OK but log failed: ' + (j.error || ''), 'err');
  } catch (e) { setStatus(statusId, 'Mint OK but log failed — save tx hash: ' + txHash.slice(0, 18) + '…', 'err'); }
}

function toggleLogOld() { const f = document.getElementById('oldForm'); f.style.display = f.style.display === 'none' ? 'block' : 'none'; }

async function logOld() {
  const txHash = document.getElementById('oldTx').value.trim();
  const xLink = document.getElementById('oldX').value.trim();
  if (!/^0x[0-9a-fA-F]{64}$/.test(txHash)) { setStatus('oldStatus', 'Bad tx hash', 'err'); return; }
  setStatus('oldStatus', 'Checking on-chain…', 'wait');
  await saveJob(chain, txHash, xLink, 'oldStatus');
}

async function loadJobs() {
  try {
    const r = await fetch('/api/ccc/jobs');
    const { jobs } = await r.json();
    const el = document.getElementById('jobs');
    if (!jobs.length) { el.innerHTML = '<span class="small">No jobs logged yet.</span>'; return; }
    let total = 0;
    el.innerHTML = jobs.map((j) => {
      total += parseFloat(j.amountCCC || 0);
      return '<div class="job"><b>' + Number(j.amountCCC).toLocaleString() + ' lbs</b>' +
        '<span class="chainbadge badge-' + j.chain + '">' + j.chain + '</span><br>' +
        (j.xLink ? '<a href="' + j.xLink + '" target="_blank" rel="noopener">&#128279; X post</a> · ' : '<span class="small">no X link · </span>') +
        '<a href="' + j.explorer + '" target="_blank" rel="noopener">tx</a> · ' +
        '<span class="small">' + (j.ts || '').slice(0, 10) + ' → ' + j.to.slice(0, 6) + '…' + j.to.slice(-4) + '</span></div>';
    }).join('') + '<div class="small" style="margin-top:10px;text-align:center"><b style="color:var(--accent)">' + total.toLocaleString() + ' lbs CO2e</b> logged total</div>';
  } catch (e) { document.getElementById('jobs').innerHTML = '<span class="small">could not load jobs</span>'; }
}
loadJobs();
</script>
</body>
</html>
