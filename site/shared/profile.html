<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasern Player Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0b1a;
      --bg-card: #12132a;
      --bg-card-alt: #1a1b3a;
      --border: #2a2b4a;
      --border-glow: #4a4bff33;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --text-bright: #ffffff;
      --accent-baseling: #4CAF50;
      --accent-d20: #FF9800;
      --accent-arcade: #9C27B0;
      --accent-cross: #2196F3;
      --gold: #FFD700;
    }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(76, 175, 80, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(255, 152, 0, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(156, 39, 176, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding: 32px 24px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-card-alt));
      border: 1px solid var(--border);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(from 0deg, transparent, rgba(33, 150, 243, 0.03), transparent, rgba(76, 175, 80, 0.03), transparent);
      animation: headerRotate 20s linear infinite;
    }

    @keyframes headerRotate { to { transform: rotate(360deg); } }

    .header-content { position: relative; z-index: 1; }

    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-baseling), var(--accent-d20), var(--accent-arcade));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
      box-shadow: 0 0 30px rgba(33, 150, 243, 0.3);
      animation: avatarPulse 3s ease-in-out infinite;
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(33, 150, 243, 0.2); }
      50% { box-shadow: 0 0 40px rgba(33, 150, 243, 0.4); }
    }

    .profile-name { font-size: 24px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
    .profile-wallet { font-size: 12px; color: var(--text-dim); font-family: monospace; }

    .cross-level {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 6px 16px;
      background: rgba(33, 150, 243, 0.1);
      border: 1px solid rgba(33, 150, 243, 0.3);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-cross);
    }

    .cross-level-num {
      background: var(--accent-cross);
      color: #fff;
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    /* Grid layout */
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--border-glow); }

    .card-glow {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .card-baseling .card-glow { background: linear-gradient(90deg, var(--accent-baseling), #81C784); }
    .card-d20 .card-glow { background: linear-gradient(90deg, var(--accent-d20), #FFB74D); }
    .card-arcade .card-glow { background: linear-gradient(90deg, var(--accent-arcade), #CE93D8); }

    .card-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .card-baseling .card-icon { background: rgba(76, 175, 80, 0.15); }
    .card-d20 .card-icon { background: rgba(255, 152, 0, 0.15); }
    .card-arcade .card-icon { background: rgba(156, 39, 176, 0.15); }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .stat-row:last-child { border-bottom: none; }

    .stat-label { font-size: 13px; color: var(--text-dim); }
    .stat-value { font-size: 14px; font-weight: 600; color: var(--text-bright); }

    .stat-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }

    /* Full-width sections */
    .section-full {
      grid-column: 1 / -1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    /* Titles / Badges */
    .titles-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .title-badge {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: var(--gold);
    }

    .title-badge.baseling { background: rgba(76,175,80,0.1); border-color: rgba(76,175,80,0.3); color: var(--accent-baseling); }
    .title-badge.d20 { background: rgba(255,152,0,0.1); border-color: rgba(255,152,0,0.3); color: var(--accent-d20); }
    .title-badge.arcade { background: rgba(156,39,176,0.1); border-color: rgba(156,39,176,0.3); color: var(--accent-arcade); }
    .title-badge.cross { background: rgba(33,150,243,0.1); border-color: rgba(33,150,243,0.3); color: var(--accent-cross); }

    /* Rewards section */
    .rewards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .reward-item {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reward-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .reward-info { flex: 1; min-width: 0; }
    .reward-name { font-size: 12px; font-weight: 600; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reward-desc { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* Notifications */
    .notif-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }

    .notif-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-card-alt);
      border-radius: 8px;
      border-left: 3px solid var(--accent-cross);
    }
    .notif-item.source-baseling { border-left-color: var(--accent-baseling); }
    .notif-item.source-d20 { border-left-color: var(--accent-d20); }
    .notif-item.source-arcade { border-left-color: var(--accent-arcade); }

    .notif-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .notif-dot.baseling { background: var(--accent-baseling); }
    .notif-dot.d20 { background: var(--accent-d20); }
    .notif-dot.arcade { background: var(--accent-arcade); }

    .notif-text { font-size: 13px; line-height: 1.4; }
    .notif-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* Companion preview */
    .companion-card {
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      margin-bottom: 12px;
    }

    .companion-portrait {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-baseling), #2E7D32);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }

    .companion-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px 12px;
      margin-top: 8px;
    }

    .companion-stat {
      font-size: 12px;
      color: var(--text-dim);
    }
    .companion-stat strong { color: var(--text-bright); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .empty-state-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

    /* Arcade bonuses */
    .bonus-meter {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }
    .bonus-label { font-size: 13px; color: var(--text-dim); min-width: 100px; }
    .bonus-value { font-size: 14px; font-weight: 700; }
    .bonus-value.active { color: var(--accent-baseling); }
    .bonus-value.inactive { color: var(--text-dim); }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .footer a { color: var(--accent-cross); text-decoration: none; }

    /* Loading animation */
    .loading {
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .loading-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent-cross);
      margin: 0 4px;
      animation: loadBounce 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loadBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-10px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Header -->
    <div class="header">
      <div class="header-content">
        <div class="profile-avatar" id="avatar">?</div>
        <div class="profile-name" id="profileName">Loading...</div>
        <div class="profile-wallet" id="profileWallet"></div>
        <div class="cross-level">
          <span>Cross-Game Level</span>
          <div class="cross-level-num" id="crossLevel">-</div>
        </div>
      </div>
    </div>

    <!-- Game Stats Cards -->
    <div class="grid">
      <!-- Baseling Card -->
      <div class="card card-baseling">
        <div class="card-glow"></div>
        <div class="card-icon">&#x1F95A;</div>
        <div class="card-title">Baselings</div>
        <div id="baselingStats">
          <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        </div>
      </div>

      <!-- D20 Card -->
      <div class="card card-d20">
        <div class="card-glow"></div>
        <div class="card-icon">&#x2694;</div>
        <div class="card-title">Tales of Tasern</div>
        <div id="d20Stats">
          <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        </div>
      </div>

      <!-- Arcade Card -->
      <div class="card card-arcade">
        <div class="card-glow"></div>
        <div class="card-icon">&#x1F3AE;</div>
        <div class="card-title">Tasern Arcade</div>
        <div id="arcadeStats">
          <div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        </div>
      </div>
    </div>

    <!-- Titles Section -->
    <div class="section-full" id="titlesSection" style="display:none;">
      <div class="section-title">
        <div class="section-title-icon" style="background:rgba(255,215,0,0.15);">&#x1F3C6;</div>
        Earned Titles
      </div>
      <div class="titles-grid" id="titlesList"></div>
    </div>

    <!-- Baseling Companions for D20 -->
    <div class="section-full" id="companionSection" style="display:none;">
      <div class="section-title">
        <div class="section-title-icon" style="background:rgba(76,175,80,0.15);">&#x1F43E;</div>
        D20 Companions (from Baselings)
      </div>
      <div id="companionList"></div>
    </div>

    <!-- Cross-Game Rewards -->
    <div class="section-full" id="rewardsSection" style="display:none;">
      <div class="section-title">
        <div class="section-title-icon" style="background:rgba(33,150,243,0.15);">&#x1F381;</div>
        Cross-Game Rewards
      </div>
      <div class="rewards-grid" id="rewardsList"></div>
    </div>

    <!-- Arcade Bonuses from Baselings -->
    <div class="section-full" id="bonusSection" style="display:none;">
      <div class="section-title">
        <div class="section-title-icon" style="background:rgba(156,39,176,0.15);">&#x26A1;</div>
        Arcade Bonuses (from Baselings)
      </div>
      <div id="bonusList"></div>
    </div>

    <!-- Notifications -->
    <div class="section-full" id="notifSection" style="display:none;">
      <div class="section-title">
        <div class="section-title-icon" style="background:rgba(33,150,243,0.15);">&#x1F514;</div>
        Recent Activity
      </div>
      <div class="notif-list" id="notifList"></div>
    </div>

    <div class="footer">
      Tasern Cross-Game Profile v1.0 | <a href="/games/">Back to Arcade</a>
    </div>
  </div>

  <script src="tasern-crossgame.js"></script>
  <script>
  (function() {
    "use strict";

    // Wait for crossgame module
    function run() {
      if (typeof TasernCrossGame === "undefined") {
        setTimeout(run, 100);
        return;
      }

      const profile = TasernCrossGame.getProfile();
      renderHeader(profile);
      renderBaselingStats(profile);
      renderD20Stats(profile);
      renderArcadeStats(profile);
      renderTitles(profile);
      renderCompanions();
      renderRewards(profile);
      renderArcadeBonuses();
      renderNotifications();
    }

    function renderHeader(profile) {
      var el = document.getElementById;
      document.getElementById("profileName").textContent = profile.wallet
        ? shortenAddress(profile.wallet)
        : "Tasern Explorer";
      document.getElementById("profileWallet").textContent = profile.wallet || "No wallet connected";
      document.getElementById("crossLevel").textContent = profile.crossGameLevel;

      // Avatar based on highest game
      var avatarText = "?";
      if (profile.baselings.count > 0 && profile.d20.characterLevel > 0 && profile.arcade.gamesPlayed > 0) {
        avatarText = "\u2728"; // sparkles — all 3 games
      } else if (profile.baselings.count > 0) {
        avatarText = "\uD83E\uDD5A"; // egg
      } else if (profile.d20.characterLevel > 0) {
        avatarText = "\u2694\uFE0F"; // swords
      } else if (profile.arcade.gamesPlayed > 0) {
        avatarText = "\uD83C\uDFAE"; // controller
      }
      document.getElementById("avatar").textContent = avatarText;
    }

    function renderBaselingStats(profile) {
      var data = profile.baselings;
      var container = document.getElementById("baselingStats");

      if (data.count === 0 && data.highestLevel === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">\uD83E\uDD5A</div>No baselings yet.<br>Start playing to see stats here!</div>';
        return;
      }

      container.innerHTML =
        statRow("Baselings Alive", data.count) +
        statRow("Highest Level", data.highestLevel) +
        statRow("Battle Wins", data.totalBattleWins) +
        statBarHTML("Level Progress", data.highestLevel, 20, "var(--accent-baseling)");
    }

    function renderD20Stats(profile) {
      var data = profile.d20;
      var container = document.getElementById("d20Stats");

      if (data.characterLevel === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">\u2694\uFE0F</div>No D20 character yet.<br>Create one in Tales of Tasern!</div>';
        return;
      }

      container.innerHTML =
        statRow("Character Level", data.characterLevel) +
        statRow("Dungeons Cleared", data.dungeonsCleared) +
        statRow("Quests Done", data.questsCompleted) +
        statBarHTML("Level Progress", data.characterLevel, 20, "var(--accent-d20)");
    }

    function renderArcadeStats(profile) {
      var data = profile.arcade;
      var container = document.getElementById("arcadeStats");

      if (data.gamesPlayed === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">\uD83C\uDFAE</div>No arcade games played.<br>Visit the Arcade to earn rewards!</div>';
        return;
      }

      container.innerHTML =
        statRow("Games Played", data.gamesPlayed) +
        statRow("Total Score", formatNumber(data.totalScore)) +
        statRow("Badges Earned", data.badgesEarned) +
        statBarHTML("Season Progress", data.badgesEarned, 17, "var(--accent-arcade)");
    }

    function renderTitles(profile) {
      var titles = profile.titles;
      if (titles.length === 0) return;

      var section = document.getElementById("titlesSection");
      section.style.display = "block";
      var list = document.getElementById("titlesList");

      var html = "";
      for (var i = 0; i < titles.length; i++) {
        var cls = getTitleClass(titles[i]);
        html += '<span class="title-badge ' + cls + '">' + titles[i] + '</span>';
      }
      list.innerHTML = html;
    }

    function renderCompanions() {
      var companions = TasernCrossGame.getAllBaselingCompanions();
      if (companions.length === 0) return;

      var section = document.getElementById("companionSection");
      section.style.display = "block";
      var list = document.getElementById("companionList");

      var html = "";
      // Show up to 4 companions
      var shown = companions.slice(0, 4);
      for (var i = 0; i < shown.length; i++) {
        var c = shown[i];
        html += '<div class="companion-card">';
        html += '<div class="companion-portrait">\uD83D\uDC3E</div>';
        html += '<div>';
        html += '<div style="font-weight:700;color:var(--text-bright);">' + escapeHtml(c.name) + '</div>';
        html += '<div style="font-size:12px;color:var(--text-dim);">Lv.' + c.level + ' ' + capitalize(c.species) + ' | ' + capitalize(c.element) + ' | ' + capitalize(c.rarity) + '</div>';
        html += '<div class="companion-stats-grid">';
        html += companionStat("STR", c.stats.STR);
        html += companionStat("DEX", c.stats.DEX);
        html += companionStat("CON", c.stats.CON);
        html += companionStat("INT", c.stats.INT);
        html += companionStat("WIS", c.stats.WIS);
        html += companionStat("CHA", c.stats.CHA);
        html += '</div>';
        if (c.conditionBonus > 0) {
          html += '<div style="font-size:11px;color:var(--accent-baseling);margin-top:6px;">Well-fed & Happy: +' + c.conditionBonus + ' to STR/DEX!</div>';
        }
        html += '<div style="font-size:11px;color:var(--text-dim);margin-top:4px;">HP: ' + c.hp + ' | AC: ' + c.ac + ' | Abilities: ' + c.abilities.length + '</div>';
        html += '</div></div>';
      }
      if (companions.length > 4) {
        html += '<div style="text-align:center;color:var(--text-dim);font-size:13px;padding:8px;">+' + (companions.length - 4) + ' more companions available</div>';
      }
      list.innerHTML = html;
    }

    function renderRewards(profile) {
      var rewards = profile.rewards;
      var unlocks = profile.unlocks;
      var hasRewards = false;

      var items = [];

      if (rewards.dungeon_treats > 0) {
        items.push({ icon: "\uD83C\uDF56", name: "Dungeon Treats", desc: rewards.dungeon_treats + " available", color: "var(--accent-d20)" });
        hasRewards = true;
      }
      if (rewards.arcade_tokens > 0) {
        items.push({ icon: "\uD83E\uDE99", name: "Arcade Tokens", desc: rewards.arcade_tokens + " earned", color: "var(--accent-arcade)" });
        hasRewards = true;
      }
      if ((rewards.companion_scrolls || []).length > 0) {
        items.push({ icon: "\uD83D\uDCDC", name: "Companion Scrolls", desc: rewards.companion_scrolls.length + " learned", color: "var(--accent-d20)" });
        hasRewards = true;
      }
      if ((rewards.d20_stat_gifts || []).length > 0) {
        items.push({ icon: "\uD83C\uDF81", name: "Stat Gift Items", desc: rewards.d20_stat_gifts.length + " gifted", color: "var(--accent-d20)" });
        hasRewards = true;
      }
      if ((rewards.d20_blessings || []).length > 0) {
        items.push({ icon: "\u2728", name: "D20 Blessings", desc: rewards.d20_blessings.length + " active", color: "var(--accent-arcade)" });
        hasRewards = true;
      }
      if (unlocks.gamer_trait) {
        items.push({ icon: "\uD83C\uDFAE", name: "Gamer Trait", desc: "Unlocked!", color: "var(--accent-arcade)" });
        hasRewards = true;
      }
      if (unlocks.hard_mode) {
        items.push({ icon: "\uD83D\uDD25", name: "Hard Mode", desc: "Unlocked in Arcade!", color: "var(--accent-baseling)" });
        hasRewards = true;
      }
      if ((unlocks.arcade_accessories || []).length > 0) {
        items.push({ icon: "\uD83C\uDFA9", name: "Arcade Accessories", desc: unlocks.arcade_accessories.length + " unlocked", color: "var(--accent-arcade)" });
        hasRewards = true;
      }

      if (!hasRewards) return;

      var section = document.getElementById("rewardsSection");
      section.style.display = "block";
      var list = document.getElementById("rewardsList");

      var html = "";
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<div class="reward-item">';
        html += '<div class="reward-icon" style="background:' + item.color + '22;">' + item.icon + '</div>';
        html += '<div class="reward-info"><div class="reward-name">' + item.name + '</div><div class="reward-desc">' + item.desc + '</div></div>';
        html += '</div>';
      }
      list.innerHTML = html;
    }

    function renderArcadeBonuses() {
      var bonuses = TasernCrossGame.getArcadeBonuses();
      if (bonuses.multiplier <= 1.0 && !bonuses.hardMode && !bonuses.elementBonus) return;

      var section = document.getElementById("bonusSection");
      section.style.display = "block";
      var list = document.getElementById("bonusList");

      var html = "";

      html += bonusMeter("Score Multiplier", "x" + bonuses.multiplier.toFixed(2), bonuses.multiplier > 1.0);
      html += bonusMeter("Hard Mode", bonuses.hardMode ? "UNLOCKED" : "Lv.8 needed", bonuses.hardMode);
      if (bonuses.elementBonus) {
        html += bonusMeter(capitalize(bonuses.elementBonus.element) + " Bonus", "x" + bonuses.elementBonus.bonus.toFixed(2) + " in matching games", true);
      }
      html += bonusMeter("Baseling Level", bonuses.highestLevel || 0, bonuses.highestLevel > 0);
      html += bonusMeter("Happiness", (bonuses.happiness || 0) + "%", bonuses.happiness > 50);

      list.innerHTML = html;
    }

    function renderNotifications() {
      var notifications = TasernCrossGame.getNotifications(false);
      if (notifications.length === 0) return;

      var section = document.getElementById("notifSection");
      section.style.display = "block";
      var list = document.getElementById("notifList");

      // Show last 10
      var recent = notifications.slice(-10).reverse();
      var html = "";
      for (var i = 0; i < recent.length; i++) {
        var n = recent[i];
        var dotClass = n.source || "cross";
        html += '<div class="notif-item source-' + dotClass + '">';
        html += '<div class="notif-dot ' + dotClass + '"></div>';
        html += '<div><div class="notif-text">' + escapeHtml(n.message) + '</div>';
        html += '<div class="notif-time">' + timeAgo(n.timestamp) + '</div></div>';
        html += '</div>';
      }
      list.innerHTML = html;
    }

    // ── Helpers ──

    function statRow(label, value) {
      return '<div class="stat-row"><span class="stat-label">' + label + '</span><span class="stat-value">' + value + '</span></div>';
    }

    function statBarHTML(label, current, max, color) {
      var pct = Math.min(100, Math.round((current / max) * 100));
      return '<div style="margin-top:8px;"><div class="stat-label" style="margin-bottom:4px;">' + label + ' (' + current + '/' + max + ')</div>' +
        '<div class="stat-bar-container"><div class="stat-bar" style="width:' + pct + '%;background:' + color + ';"></div></div></div>';
    }

    function companionStat(label, value) {
      return '<div class="companion-stat"><strong>' + value + '</strong> ' + label + '</div>';
    }

    function bonusMeter(label, value, active) {
      return '<div class="bonus-meter"><span class="bonus-label">' + label + '</span><span class="bonus-value ' + (active ? "active" : "inactive") + '">' + value + '</span></div>';
    }

    function getTitleClass(title) {
      var baseling = ["Baseling Breeder", "Pet Trainer", "Master Trainer", "Battle Champion", "Fertilizer Baron"];
      var d20 = ["Adventurer", "Hero of Tasern", "Legend of the Gate", "Dungeon Delver", "Underworld Conqueror", "Blade Master", "Questor"];
      var arcade = ["Arcade Addict", "Arcade Master", "Arcade Completionist", "Badge Collector", "High Scorer", "Million Point Club", "Gamer"];
      if (baseling.indexOf(title) !== -1) return "baseling";
      if (d20.indexOf(title) !== -1) return "d20";
      if (arcade.indexOf(title) !== -1) return "arcade";
      return "cross";
    }

    function shortenAddress(addr) {
      if (!addr) return "Unknown";
      if (addr.includes(".")) return addr; // ENS
      return addr.slice(0, 6) + "..." + addr.slice(-4);
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "K";
      return String(n);
    }

    function capitalize(s) {
      if (!s) return "";
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    function escapeHtml(str) {
      var div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    function timeAgo(ts) {
      var diff = Date.now() - ts;
      if (diff < 60000) return "just now";
      if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
      if (diff < 86400000) return Math.floor(diff / 3600000) + "h ago";
      return Math.floor(diff / 86400000) + "d ago";
    }

    // Start
    run();
  })();
  </script>
</body>
</html>
