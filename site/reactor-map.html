<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unrugable Reactor Network Map</title>
<meta name="description" content="Live reactor network map. Pan and zoom the full burn-compound chain.">
<style>
  :root {
    --bg: #0a0f0d; --bg2: #111916; --bg3: #161f1b;
    --border: #1e2e26; --border2: #2d4a38;
    --green: #7ee787; --green2: #3fb950; --gold: #d4a853;
    --blue: #79c0ff; --red: #f85149; --purple: #d2a8ff;
    --text: #c8d8c4; --muted: #6e7f6a; --white: #e6ede4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
  a { color: var(--green); text-decoration: none; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 44px; }
  .logo { color: var(--green); font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 16px; font-size: 12px; align-items: center; }
  .nav-links a { color: var(--muted); }
  .nav-links a:hover { color: var(--green); }

  #status { position: fixed; top: 44px; left: 0; right: 0; text-align: center; color: var(--muted); font-size: 12px; padding: 6px; background: var(--bg); z-index: 150; border-bottom: 1px solid var(--border); }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #viewport { position: fixed; top: 68px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
  #viewport.dragging { cursor: grabbing; }
  #canvas { position: absolute; transform-origin: 0 0; }

  .zoom-controls { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 4px; }
  .zoom-btn { width: 36px; height: 36px; background: var(--bg2); border: 1px solid var(--border2); color: var(--green); font-size: 18px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .zoom-btn:hover { border-color: var(--green); }

  .legend { position: fixed; bottom: 20px; left: 20px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 10px; color: var(--muted); }
  .legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .legend div:last-child { margin-bottom: 0; }
  .legend .swatch { width: 12px; height: 3px; border-radius: 2px; }

  .rnode { position: absolute; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; width: 190px; text-align: center; transition: border-color 0.2s; }
  .rnode:hover { border-color: var(--green2); z-index: 10; cursor: pointer; }
  .rnode .rname { color: var(--green); font-size: 13px; font-weight: bold; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rnode .raddr { color: var(--muted); font-size: 10px; font-family: monospace; }
  .rnode .rmeta { color: var(--muted); font-size: 10px; margin-top: 4px; }
  .rnode .rmeta span { color: var(--text); }
  .rnode .rbadge { position: absolute; top: 6px; right: 8px; font-size: 9px; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .badge-ready { background: #1a3a1a; color: var(--green); }
  .badge-cooldown { background: #2a2a1a; color: var(--gold); }
  .badge-err { background: #2a1a1a; color: var(--red); }

  .rnode.hub { border-color: var(--gold); background: linear-gradient(135deg, var(--bg2), #1a1a10); }
  .rnode.hub .rname { color: var(--gold); }
  .rnode.launched { border-color: var(--purple); }
  .rnode.launched .rname { color: var(--purple); }
  .rnode.char { border-color: var(--red); border-style: dashed; }
  .rnode.char .rname { color: var(--red); }

  .pool-tags { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: 5px; }
  .ptag { font-size: 8px; padding: 1px 5px; border-radius: 3px; border: 1px solid; background: rgba(0,0,0,0.3); letter-spacing: 0.5px; }

  #updated { position: fixed; top: 44px; right: 10px; color: var(--muted); font-size: 10px; z-index: 160; padding: 6px; }
</style>
<link rel="stylesheet" href="nav.css">
</head>
<body>
<script src="nav.js"></script>
<script>document.addEventListener("DOMContentLoaded", injectNav);</script>

<nav>
  <div class="logo">Unrugable <span>REACTOR MAP</span></div>
  <div class="nav-links">
    <a href="reactor-dashboard.html">Fire</a>
    <a href="unrugable.html">Launch</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<div id="status"><span class="spinner">&#9696;</span> Loading map data...</div>
<div id="updated"></div>

<div id="viewport">
  <div id="canvas">
    <svg id="lines" style="position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none;overflow:visible;"></svg>
  </div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoomIn">+</button>
  <button class="zoom-btn" id="zoomOut">&minus;</button>
  <button class="zoom-btn" id="zoomFit" title="Fit all">&#9635;</button>
</div>

<div class="legend">
  <div><div class="swatch" style="background:#2d4a38"></div> Fee flow</div>
  <div><div class="swatch" style="background:var(--gold)"></div> Referral chain</div>
  <div><div class="swatch" style="background:var(--purple);height:2px;border-top:1px solid var(--purple)"></div> Primary reactor</div>
  <div><div class="swatch" style="background:var(--red);height:2px;border-top:1px dashed var(--red)"></div> CHAR reactor</div>
</div>

<script type="module">

const EXPLORER = "https://basescan.org";
const DATA_URL = "api/reactor-map.json";
const short = a => a.slice(0, 6) + "..." + a.slice(-4);

const TAG_COLORS = {
  "CHAR": "#4ade80", "TGN": "#22c55e", "BURGERS": "#f59e0b", "AZUSD": "#06b6d4", "USDC": "#2775ca",
  "MfT": "#a78bfa", "cbBTC": "#f7931a", "WETH": "#627eea", "EARTH": "#34d399",
  "POOP": "#8b6914", "BB": "#60a5fa", "EB": "#c084fc", "EGP": "#fbbf24",
  "BRETT": "#2563eb", "DEGEN": "#a855f7",
};

// ── Pan & Zoom ──────────────────────────────────────────────────
const viewport = document.getElementById("viewport");
const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");
let scale = 0.85, panX = 0, panY = 0;
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

viewport.addEventListener("pointerdown", (e) => {
  if (e.target.closest("a") || e.target.closest(".rnode")) return;
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  viewport.classList.add("dragging");
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});
viewport.addEventListener("pointerup", () => { dragging = false; viewport.classList.remove("dragging"); });

viewport.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = scale;
  scale *= e.deltaY < 0 ? 1.15 : 0.87;
  scale = Math.max(0.15, Math.min(3, scale));
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);
  applyTransform();
}, { passive: false });

document.getElementById("zoomIn").addEventListener("click", () => { scale = Math.min(3, scale * 1.25); applyTransform(); });
document.getElementById("zoomOut").addEventListener("click", () => { scale = Math.max(0.15, scale * 0.8); applyTransform(); });
document.getElementById("zoomFit").addEventListener("click", fitAll);

function fitAll() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const nodes = canvas.querySelectorAll(".rnode");
  if (!nodes.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const x = parseFloat(n.style.left), y = parseFloat(n.style.top);
    const w = n.offsetWidth || 190, h = n.offsetHeight || 90;
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  });
  const cw = maxX - minX + 80, ch = maxY - minY + 80;
  scale = Math.min(vw / cw, vh / ch, 1.5);
  panX = (vw - cw * scale) / 2 - minX * scale + 40 * scale;
  panY = (vh - ch * scale) / 2 - minY * scale + 40 * scale;
  applyTransform();
}

// ── Helpers ──────────────────────────────────────────────────
function badgeHtml(r) {
  if (!r) return `<span class="rbadge badge-err">--</span>`;
  if (r.status === "ready") return `<span class="rbadge badge-ready">READY</span>`;
  if (r.status === "cooldown" && r.cooldown != null) return `<span class="rbadge badge-cooldown">${Math.ceil(r.cooldown / 60)}m</span>`;
  return `<span class="rbadge badge-err">--</span>`;
}

function tagsHtml(tags) {
  if (!tags || !tags.length) return "";
  const visible = tags.filter(t => t.sym !== "MfT");
  if (!visible.length) return "";
  return `<div class="pool-tags">${visible.map(t => {
    const col = TAG_COLORS[t.sym] || "#6e7f6a";
    return `<span class="ptag" style="border-color:${col};color:${col};${t.disabled ? 'opacity:0.35;' : ''}">${t.sym}</span>`;
  }).join("")}</div>`;
}

// ── Render ──────────────────────────────────────────────────
async function render() {
  const statusEl = document.getElementById("status");

  let data;
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    data = await resp.json();
  } catch (e) {
    statusEl.innerHTML = `<span style="color:var(--red)">Failed to load map data: ${e.message}</span>`;
    return;
  }

  const { launches, reactors, hub, updatedAt } = data;

  // Show last updated
  if (updatedAt) {
    const ago = Math.round((Date.now() - new Date(updatedAt).getTime()) / 60000);
    document.getElementById("updated").textContent = `Updated ${ago < 60 ? ago + "m" : Math.round(ago / 60) + "h"} ago`;
  }

  // Layout constants
  const NODE_W = 190, NODE_H = 90, PAIR_GAP = 20, TREE_GAP_X = 50, TREE_GAP_Y = 40;
  const PAIR_H = NODE_H * 2 + PAIR_GAP;
  const COL_W = NODE_W + TREE_GAP_X;
  const ROW_H = PAIR_H + TREE_GAP_Y;

  // Build referral tree
  const reactorToIdx = {};
  const charToIdx = {};
  for (let i = 0; i < launches.length; i++) {
    reactorToIdx[launches[i].reactor.toLowerCase()] = i;
    if (launches[i].charReactor) charToIdx[launches[i].charReactor.toLowerCase()] = i;
  }

  const children = launches.map(() => []);
  const hasParent = new Set();

  for (let i = 0; i < launches.length; i++) {
    let rInfo = reactors[launches[i].charReactor];
    if (!rInfo && launches[i].reactor) rInfo = reactors[launches[i].reactor];
    if (!rInfo || !rInfo.upstream) continue;
    const upLower = rInfo.upstream.toLowerCase();
    let parentIdx = reactorToIdx[upLower];
    if (parentIdx === undefined) parentIdx = charToIdx[upLower];
    if (parentIdx !== undefined && parentIdx !== i) {
      children[parentIdx].push(i);
      hasParent.add(i);
    }
  }

  const roots = [];
  for (let i = 0; i < launches.length; i++) {
    if (!hasParent.has(i)) roots.push(i);
  }

  // Compute subtree widths + max depth
  const subtreeW = launches.map(() => 1);
  const nodeDepth = launches.map(() => 0);
  function computeWidth(idx, depth) {
    nodeDepth[idx] = depth;
    if (!children[idx].length) { subtreeW[idx] = 1; return 1; }
    let w = 0;
    for (const c of children[idx]) w += computeWidth(c, depth + 1);
    subtreeW[idx] = Math.max(1, w);
    return subtreeW[idx];
  }
  let maxDepth = 0;
  for (const r of roots) computeWidth(r, 0);
  for (const d of nodeDepth) maxDepth = Math.max(maxDepth, d);

  // Position each pair — FLIPPED: leaves at top, roots at bottom (above hub)
  // depth 0 (roots) → bottom row, max depth (leaves) → top row
  const positions = launches.map(() => ({ x: 0, y: 0 }));

  function layoutTree(idx, startX) {
    const flippedRow = maxDepth - nodeDepth[idx]; // leaves=row 0 (top), roots=row maxDepth (bottom)
    if (!children[idx].length) {
      positions[idx] = { x: startX, y: flippedRow * ROW_H };
      return;
    }
    let x = startX;
    for (const c of children[idx]) {
      layoutTree(c, x);
      x += subtreeW[c] * COL_W;
    }
    const first = positions[children[idx][0]];
    const last = positions[children[idx][children[idx].length - 1]];
    positions[idx] = { x: (first.x + last.x) / 2, y: flippedRow * ROW_H };
  }

  let curX = 0;
  for (const r of roots) {
    layoutTree(r, curX);
    curX += subtreeW[r] * COL_W;
  }

  let maxY = 0;
  for (const p of positions) maxY = Math.max(maxY, p.y);
  const hubY = maxY + ROW_H + 30;
  const totalW = curX - TREE_GAP_X;
  const hubX = Math.max(0, (totalW - NODE_W) / 2);

  // Build nodes + connections
  const nodes = [];
  const connections = [];

  for (let i = 0; i < launches.length; i++) {
    const l = launches[i];
    const px = positions[i].x;
    const py = positions[i].y;
    const pInfo = reactors[l.reactor];
    const cInfo = reactors[l.charReactor];

    nodes.push({
      addr: l.reactor, cls: "launched",
      name: l.name + " Reactor",
      meta: `${l.fullName} | $${(Number(BigInt(l.seed)) / 1e6).toFixed(2)}`,
      x: px, y: py, st: pInfo, tags: pInfo ? pInfo.tags : [],
    });

    let bottomY;
    if (l.charReactor) {
      const charY = py + NODE_H + PAIR_GAP;
      nodes.push({
        addr: l.charReactor, cls: "char",
        name: l.name + " CHAR",
        meta: "Burns carbon credits",
        x: px, y: charY, st: cInfo, tags: cInfo ? cInfo.tags : [],
      });
      connections.push({ x1: px + NODE_W / 2, y1: py + NODE_H, x2: px + NODE_W / 2, y2: charY, type: "flow" });
      bottomY = charY + NODE_H;
    } else {
      bottomY = py + NODE_H;
    }

    // Downstream → upstream connection
    if (hasParent.has(i)) {
      let parentIdx = null;
      for (let p = 0; p < launches.length; p++) {
        if (children[p].includes(i)) { parentIdx = p; break; }
      }
      if (parentIdx !== null) {
        let upAddr = "";
        if (l.charReactor) {
          const cInfo2 = reactors[l.charReactor];
          upAddr = cInfo2 && cInfo2.upstream ? cInfo2.upstream.toLowerCase() : "";
        } else {
          const rInfo2 = reactors[l.reactor];
          upAddr = rInfo2 && rInfo2.upstream ? rInfo2.upstream.toLowerCase() : "";
        }
        const feedsMain = upAddr === launches[parentIdx].reactor.toLowerCase();
        const parentHasChar = !!launches[parentIdx].charReactor;
        const targetY = (feedsMain || !parentHasChar)
          ? positions[parentIdx].y + NODE_H / 2
          : positions[parentIdx].y + NODE_H + PAIR_GAP + NODE_H / 2;
        connections.push({
          x1: px + NODE_W / 2, y1: bottomY,
          x2: positions[parentIdx].x + NODE_W / 2, y2: targetY,
          type: "referral",
        });
      }
    } else {
      connections.push({ x1: px + NODE_W / 2, y1: bottomY, x2: hubX + NODE_W / 2, y2: hubY, type: "flow" });
    }
  }

  // Hub
  const hubInfo = reactors[hub];
  nodes.push({
    addr: hub, cls: "hub", name: "Unrugable Hub",
    meta: "Collects upstream fees | MfT Prime",
    x: hubX, y: hubY, st: hubInfo, tags: hubInfo ? hubInfo.tags : [],
  });

  // --- Draw ---
  let html = "";
  for (const n of nodes) {
    const poolStr = n.st && n.st.pools ? ` | <span>${n.st.pools}</span> pools` : "";
    html += `<div class="rnode ${n.cls}" style="left:${n.x}px;top:${n.y}px;width:${NODE_W}px;" onclick="window.location='reactor-detail.html?addr=${n.addr}'">
      ${badgeHtml(n.st)}
      <div class="rname">${n.name}</div>
      <div class="raddr"><a href="${EXPLORER}/address/${n.addr}" target="_blank" onclick="event.stopPropagation()">${short(n.addr)}</a></div>
      <div class="rmeta">${n.meta || ""}${poolStr}</div>
      ${tagsHtml(n.tags)}
    </div>`;
  }
  canvas.innerHTML = html;
  canvas.appendChild(svg);

  // SVG lines
  let svgHtml = "";
  for (const c of connections) {
    const isRef = c.type === "referral";
    const stroke = isRef ? "#d4a853" : "#2d4a38";
    const fill = isRef ? "#d4a853" : "#3fb950";
    const width = isRef ? 2.5 : 2;
    const dash = isRef ? ' stroke-dasharray="6,3"' : "";

    if (c.x1 === c.x2) {
      svgHtml += `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" stroke="${stroke}" stroke-width="${width}"${dash}/>`;
    } else {
      const my = (c.y1 + c.y2) / 2;
      svgHtml += `<path d="M${c.x1},${c.y1} C${c.x1},${my} ${c.x2},${my} ${c.x2},${c.y2}" fill="none" stroke="${stroke}" stroke-width="${width}"${dash}/>`;
    }
    svgHtml += `<polygon points="${c.x2 - 4},${c.y2 - 6} ${c.x2},${c.y2} ${c.x2 + 4},${c.y2 - 6}" fill="${fill}" opacity="0.7"/>`;
    if (isRef) {
      const mx = (c.x1 + c.x2) / 2, my = (c.y1 + c.y2) / 2;
      svgHtml += `<text x="${mx}" y="${my - 6}" fill="${stroke}" font-size="9" font-family="Courier New" text-anchor="middle" opacity="0.8">referral</text>`;
    }
  }
  svg.innerHTML = svgHtml;

  const readyCount = nodes.filter(n => n.st && n.st.status === "ready").length;
  statusEl.innerHTML = `<span style="color:var(--green);">${nodes.length} reactors</span> | ${launches.length} launched tokens | ${readyCount} ready to fire`;

  setTimeout(fitAll, 100);
}

render();
</script>
</body>
</html>
