<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MfT Reactor Network Map</title>
<meta name="description" content="Live reactor network map. Auto-discovers launched tokens and shows the full burn-compound chain.">
<style>
  :root {
    --bg: #0a0f0d; --bg2: #111916; --bg3: #161f1b;
    --border: #1e2e26; --border2: #2d4a38;
    --green: #7ee787; --green2: #3fb950; --gold: #d4a853;
    --blue: #79c0ff; --red: #f85149; --purple: #d2a8ff;
    --text: #c8d8c4; --muted: #6e7f6a; --white: #e6ede4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); line-height: 1.5; }
  a { color: var(--green); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
  .logo { color: var(--green); font-size: 20px; font-weight: bold; letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 20px; font-size: 13px; }
  .nav-links a { color: var(--muted); }
  .nav-links a:hover { color: var(--green); }

  .hero { text-align: center; padding: 50px 24px 30px; }
  .hero h1 { font-size: 32px; color: var(--green); letter-spacing: 3px; margin-bottom: 8px; }
  .hero h1 span { color: var(--gold); }
  .hero .sub { color: var(--muted); font-size: 13px; }

  .stats { display: flex; justify-content: center; gap: 40px; padding: 20px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .num { font-size: 24px; color: var(--green); font-weight: bold; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  #status { text-align: center; color: var(--muted); font-size: 13px; padding: 20px; }
  #status .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .map-container { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }

  .layer { margin-bottom: 32px; }
  .layer-title { color: var(--gold); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; padding-left: 8px; border-left: 3px solid var(--gold); }

  .nodes { display: flex; flex-wrap: wrap; gap: 12px; }
  .node { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; min-width: 200px; flex: 0 0 auto; position: relative; transition: border-color 0.2s; }
  .node:hover { border-color: var(--green2); }
  .node .name { color: var(--green); font-size: 14px; font-weight: bold; margin-bottom: 4px; }
  .node .addr { color: var(--muted); font-size: 11px; font-family: monospace; }
  .node .meta { color: var(--muted); font-size: 11px; margin-top: 6px; }
  .node .meta span { color: var(--text); }
  .node .badge { position: absolute; top: 8px; right: 10px; font-size: 10px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .badge-ready { background: #1a3a1a; color: var(--green); }
  .badge-cooldown { background: #2a2a1a; color: var(--gold); }
  .badge-err { background: #2a1a1a; color: var(--red); }
  .badge-launched { background: #1a1a2a; color: var(--purple); }

  .arrow-row { text-align: center; color: var(--border2); font-size: 20px; margin: 8px 0; letter-spacing: 8px; }

  .node.prime { border-color: var(--gold); background: linear-gradient(135deg, var(--bg2), #1a1a10); }
  .node.prime .name { color: var(--gold); }
  .node.hub { border-color: var(--green2); }
  .node.launched-node { border-color: var(--purple); border-style: dashed; }

  @media (max-width: 700px) {
    .nodes { flex-direction: column; }
    .node { min-width: auto; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo">MfT <span>REACTOR MAP</span></div>
  <div class="nav-links">
    <a href="unruggable.html">Launcher</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<div class="hero">
  <h1>REACTOR <span>NETWORK</span></h1>
  <div class="sub">Live auto-discovering network map. Every launched token joins automatically.</div>
</div>

<div class="stats">
  <div class="stat"><div class="num" id="statTotal">--</div><div class="label">Total Reactors</div></div>
  <div class="stat"><div class="num" id="statLaunched">--</div><div class="label">Launched Tokens</div></div>
  <div class="stat"><div class="num" id="statStatic">17</div><div class="label">Static Network</div></div>
  <div class="stat"><div class="num" id="statReady">--</div><div class="label">Ready to Fire</div></div>
</div>

<div id="status"><span class="spinner">&#9696;</span> Scanning factory for launches...</div>

<div class="map-container" id="map"></div>

<script type="module">
import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.min.js";

const RPC = "https://mainnet.base.org";
const FACTORY = "0x51eF41E0730c0e607950421e1EE113b089867d3e";
const FACTORY_DEPLOY_BLOCK = 45523770;
const CHUNK = 9999;
const EXPLORER = "https://basescan.org";

const FACTORY_ABI = [
  "event TokenLaunched(address indexed token, address indexed reactor, address indexed charReactor, address launcher, string name, string symbol, uint256 supply, uint256 seed)"
];

const REACTOR_ABI = [
  "function poolCount() view returns (uint256)",
  "function timeUntilExecute() view returns (uint256)",
  "function paused() view returns (bool)",
  "function lastExecute() view returns (uint256)"
];

const BRICKED = new Set([
  "0xE9679341527B0e062F08c9efEa8764D46030Bfaf",
  "0x885f90b0fcc10AD6d3257Df851eda4c78f38c5A4",
  "0x3FE916c7CB6354eAF8ee49427380740bEe2b061a",
  "0xB7C5b050E0545b5b2b3015111E4f197641F0D3Fa",
]);

const STATIC_NETWORK = [
  { layer: "feeder", name: "ecowealth", addr: "0xc7E739f223934C5F69EBA36BcDf808c4379b1985" },
  { layer: "band", name: "BB v5", addr: "0x3b31B8c9338ebFE2e737e5dd6361cEf0Bdc431e3" },
  { layer: "band", name: "EB v5", addr: "0x2e06EB264dB2C7bcD8B9a216827b7D0eF3beACA2" },
  { layer: "band", name: "EB relay", addr: "0xC28e64551816535d9ef06CE95844F2b5317353bA" },
  { layer: "band", name: "BTCband v1", addr: "0x2879706E115150BBB9ffb5C432024264dEE0852F" },
  { layer: "band", name: "ETHband v1", addr: "0x7018660EFBd7CfE3219388322417D405fC15b23B" },
  { layer: "band", name: "BTCband v2", addr: "0x038B87f2Abc1dcE269FF7DE4d3e721b5b57eD8cf" },
  { layer: "band", name: "ETHband v2", addr: "0xeB02d1137342cD08C1c4bf61C188d86C5253b631" },
  { layer: "band", name: "BB v3", addr: "0x5375817c1798d43036d3b2DAAfaFB8e2247bAcF2" },
  { layer: "band", name: "EB v3", addr: "0x361A4E356847c5a0C60B510b2531b640aC51f090" },
  { layer: "hub", name: "MycoPad", addr: "0xF5B9Fc40080aAcC262f078eCE374A2268dcdb045" },
  { layer: "chain", name: "TGN", addr: "0xc3f09dAEF814177E52B4C04ec2872B564a36989D" },
  { layer: "chain", name: "AZUSD", addr: "0xD8AFb7caD1f8A3Ddc4E16c1516a94949eb119281" },
  { layer: "chain", name: "BURGERS", addr: "0xc858026Ec5D30280137032BC6EA86F46ea23C2CA" },
  { layer: "chain", name: "CHAR", addr: "0xc2eBe90fB9bC7897f06DC00666951Fa9a49A397A" },
  { layer: "chain", name: "EGP", addr: "0x10A710fced92eB096F796F43BCCFb60884c13819" },
  { layer: "prime", name: "MfT V1 Prime", addr: "0xed3aE91b2bb22307c07438EEebA2500C18EABcFE" },
];

const provider = new ethers.JsonRpcProvider(RPC);
const short = a => a.slice(0, 6) + "..." + a.slice(-4);

async function discoverLaunches() {
  const factory = new ethers.Contract(FACTORY, FACTORY_ABI, provider);
  const currentBlock = await provider.getBlockNumber();
  const events = [];
  for (let from = FACTORY_DEPLOY_BLOCK; from <= currentBlock; from += CHUNK + 1) {
    const to = Math.min(from + CHUNK, currentBlock);
    const chunk = await factory.queryFilter("TokenLaunched", from, to);
    events.push(...chunk);
  }
  return events
    .filter(ev => !BRICKED.has(ev.args.reactor))
    .map(ev => ({
      name: ev.args.symbol,
      fullName: ev.args.name,
      token: ev.args.token,
      reactor: ev.args.reactor,
      charReactor: ev.args.charReactor,
      seed: ev.args.seed,
      block: ev.blockNumber,
    }));
}

async function getReactorStatus(addr) {
  const contract = new ethers.Contract(addr, REACTOR_ABI, provider);
  try {
    const [pools, cd] = await Promise.all([
      contract.poolCount().catch(() => null),
      contract.timeUntilExecute().catch(() => null),
    ]);
    return {
      pools: pools !== null ? Number(pools) : "?",
      cooldown: cd !== null ? Number(cd) : null,
      status: cd !== null ? (cd === 0n ? "ready" : "cooldown") : "unknown",
    };
  } catch {
    return { pools: "?", cooldown: null, status: "unknown" };
  }
}

function badge(status, cd) {
  if (status === "ready") return `<span class="badge badge-ready">READY</span>`;
  if (status === "cooldown") {
    const m = Math.ceil(cd / 60);
    return `<span class="badge badge-cooldown">${m}m</span>`;
  }
  return `<span class="badge badge-err">--</span>`;
}

function nodeHtml(name, addr, extra, classes, status, cd) {
  return `<div class="node ${classes}">
    ${badge(status, cd)}
    <div class="name">${name}</div>
    <div class="addr"><a href="${EXPLORER}/address/${addr}" target="_blank">${short(addr)}</a></div>
    ${extra ? `<div class="meta">${extra}</div>` : ""}
  </div>`;
}

function arrow() {
  return `<div class="arrow-row">&darr; &darr; &darr;</div>`;
}

async function render() {
  const status = document.getElementById("status");
  const map = document.getElementById("map");

  // 1. Discover launches
  let launches;
  try {
    launches = await discoverLaunches();
  } catch (e) {
    status.innerHTML = `<span style="color:var(--red)">Factory scan failed: ${e.message.slice(0, 60)}</span>`;
    return;
  }

  status.innerHTML = `<span class="spinner">&#9696;</span> Found ${launches.length} launched token(s). Loading reactor status...`;

  // 2. Build all nodes to query
  const allNodes = [];

  // Launched CHAR reactors
  for (const l of launches) {
    allNodes.push({ name: `${l.name} CHAR`, addr: l.charReactor, layer: "launched-char", extra: `Token: ${short(l.token)} | Seed: ${ethers.formatUnits(l.seed, 6)} USDC`, classes: "launched-node" });
  }
  // Launched primary reactors
  for (const l of launches) {
    allNodes.push({ name: `${l.name} Reactor`, addr: l.reactor, layer: "launched-primary", extra: `Token: ${short(l.token)} | ${l.fullName}`, classes: "launched-node" });
  }
  // Static
  for (const s of STATIC_NETWORK) {
    const cls = s.layer === "prime" ? "prime" : s.layer === "hub" ? "hub" : "";
    allNodes.push({ name: s.name, addr: s.addr, layer: s.layer, extra: "", classes: cls });
  }

  // 3. Query statuses in batches of 4 to avoid rate limits
  const BATCH = 4;
  const statuses = [];
  for (let i = 0; i < allNodes.length; i += BATCH) {
    const batch = allNodes.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(n => getReactorStatus(n.addr)));
    for (let j = 0; j < results.length; j++) {
      const s = results[j];
      statuses.push(s);
      allNodes[i + j].pools = s.pools;
      allNodes[i + j].status = s.status;
      allNodes[i + j].cooldown = s.cooldown;
      if (allNodes[i + j].pools !== "?") {
        allNodes[i + j].extra += (allNodes[i + j].extra ? " | " : "") + `Pools: <span>${s.pools}</span>`;
      }
    }
    if (i + BATCH < allNodes.length) await new Promise(r => setTimeout(r, 1000));
  }

  // 4. Stats
  const readyCount = statuses.filter(s => s.status === "ready").length;
  document.getElementById("statTotal").textContent = allNodes.length;
  document.getElementById("statLaunched").textContent = launches.length;
  document.getElementById("statReady").textContent = readyCount;
  status.innerHTML = `<span style="color:var(--green)">Network loaded.</span> ${allNodes.length} reactors total.`;

  // 5. Render layers
  const layers = [
    { key: "launched-char", title: "Launched CHAR Reactors (bottom)" },
    { key: "launched-primary", title: "Launched Token Reactors" },
    { key: "feeder", title: "Feeder Reactors" },
    { key: "band", title: "Band Reactors" },
    { key: "hub", title: "MycoPad Hub" },
    { key: "chain", title: "Main Chain (Row 4 > Row 1)" },
    { key: "prime", title: "Prime Reactor" },
  ];

  let html = "";
  for (const layer of layers) {
    const nodes = allNodes.filter(n => n.layer === layer.key);
    if (nodes.length === 0) continue;

    if (html) html += arrow();
    html += `<div class="layer">`;
    html += `<div class="layer-title">${layer.title}</div>`;
    html += `<div class="nodes">`;
    for (const n of nodes) {
      html += nodeHtml(n.name, n.addr, n.extra, n.classes, n.status, n.cooldown);
    }
    html += `</div></div>`;
  }

  map.innerHTML = html;
}

render();
</script>

</body>
</html>
