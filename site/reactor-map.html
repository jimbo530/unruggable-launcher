<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unruggable Reactor Network Map</title>
<meta name="description" content="Live reactor network map. Pan and zoom the full burn-compound chain.">
<style>
  :root {
    --bg: #0a0f0d; --bg2: #111916; --bg3: #161f1b;
    --border: #1e2e26; --border2: #2d4a38;
    --green: #7ee787; --green2: #3fb950; --gold: #d4a853;
    --blue: #79c0ff; --red: #f85149; --purple: #d2a8ff;
    --text: #c8d8c4; --muted: #6e7f6a; --white: #e6ede4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
  a { color: var(--green); text-decoration: none; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 44px; }
  .logo { color: var(--green); font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 16px; font-size: 12px; align-items: center; }
  .nav-links a { color: var(--muted); }
  .nav-links a:hover { color: var(--green); }

  #status { position: fixed; top: 44px; left: 0; right: 0; text-align: center; color: var(--muted); font-size: 12px; padding: 6px; background: var(--bg); z-index: 150; border-bottom: 1px solid var(--border); }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #viewport { position: fixed; top: 68px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
  #viewport.dragging { cursor: grabbing; }

  #canvas { position: absolute; transform-origin: 0 0; }

  /* Zoom controls */
  .zoom-controls { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 4px; }
  .zoom-btn { width: 36px; height: 36px; background: var(--bg2); border: 1px solid var(--border2); color: var(--green); font-size: 18px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .zoom-btn:hover { border-color: var(--green); }

  /* Node styles */
  .rnode { position: absolute; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; width: 180px; text-align: center; transition: border-color 0.2s; }
  .rnode:hover { border-color: var(--green2); z-index: 10; }
  .rnode .rname { color: var(--green); font-size: 13px; font-weight: bold; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rnode .raddr { color: var(--muted); font-size: 10px; font-family: monospace; }
  .rnode .rmeta { color: var(--muted); font-size: 10px; margin-top: 4px; }
  .rnode .rmeta span { color: var(--text); }
  .rnode .rbadge { position: absolute; top: 6px; right: 8px; font-size: 9px; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .badge-ready { background: #1a3a1a; color: var(--green); }
  .badge-cooldown { background: #2a2a1a; color: var(--gold); }
  .badge-err { background: #2a1a1a; color: var(--red); }

  .rnode.prime { border-color: var(--gold); background: linear-gradient(135deg, var(--bg2), #1a1a10); }
  .rnode.prime .rname { color: var(--gold); }
  .rnode.hub { border-color: var(--green2); }
  .rnode.hub .rname { color: var(--green2); }
  .rnode.launched { border-color: var(--purple); border-style: dashed; }
  .rnode.launched .rname { color: var(--purple); }
  .rnode.char { border-color: var(--red); border-style: dashed; }
  .rnode.char .rname { color: var(--red); }
  .rnode.chain { border-color: var(--blue); }
  .rnode.chain .rname { color: var(--blue); }

  /* Layer labels */
  .layer-label { position: absolute; color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; white-space: nowrap; }
</style>
</head>
<body>

<nav>
  <div class="logo">Unruggable <span>REACTOR MAP</span></div>
  <div class="nav-links">
    <a href="reactor-dashboard.html">Fire</a>
    <a href="unrugable.html">Launch</a>
    <a href="index.html">Home</a>
  </div>
</nav>

<div id="status"><span class="spinner">&#9696;</span> Scanning factories...</div>

<div id="viewport">
  <div id="canvas">
    <svg id="lines" style="position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none;overflow:visible;"></svg>
  </div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoomIn">+</button>
  <button class="zoom-btn" id="zoomOut">&minus;</button>
  <button class="zoom-btn" id="zoomFit" title="Fit all">&#9635;</button>
</div>

<script type="module">
import { ethers } from "https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.min.js";

const RPC = "https://mainnet.base.org";
const FACTORIES = [
  { addr: "0x51eF41E0730c0e607950421e1EE113b089867d3e", deployBlock: 45523770 },
  { addr: "0xb74fe5fA2D030706B4A0C901fDC42C5244695A6e", deployBlock: 45570000 },
  { addr: "0x2e0b20a4FFEaCAcB8D3CD0cF6b9bBE6660c4262e", deployBlock: 45700000 },
];
const CHUNK = 9999;
const EXPLORER = "https://basescan.org";
const FACTORY_ABI = ["event TokenLaunched(address indexed token, address indexed reactor, address indexed charReactor, address launcher, string name, string symbol, uint256 supply, uint256 seed)"];
const REACTOR_ABI = ["function poolCount() view returns (uint256)", "function timeUntilExecute() view returns (uint256)"];
const BRICKED = new Set(["0xE9679341527B0e062F08c9efEa8764D46030Bfaf","0x885f90b0fcc10AD6d3257Df851eda4c78f38c5A4","0x3FE916c7CB6354eAF8ee49427380740bEe2b061a","0xB7C5b050E0545b5b2b3015111E4f197641F0D3Fa"]);

const provider = new ethers.JsonRpcProvider(RPC);
const short = a => a.slice(0, 6) + "..." + a.slice(-4);

// ── Pan & Zoom ──────────────────────────────────────────────────
const viewport = document.getElementById("viewport");
const canvas = document.getElementById("canvas");
const svg = document.getElementById("lines");
let scale = 0.85, panX = 0, panY = 0;
let dragging = false, dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

viewport.addEventListener("pointerdown", (e) => {
  if (e.target.closest("a")) return;
  dragging = true; dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  viewport.classList.add("dragging");
  viewport.setPointerCapture(e.pointerId);
});
viewport.addEventListener("pointermove", (e) => {
  if (!dragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
});
viewport.addEventListener("pointerup", () => { dragging = false; viewport.classList.remove("dragging"); });

viewport.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const oldScale = scale;
  scale *= e.deltaY < 0 ? 1.15 : 0.87;
  scale = Math.max(0.15, Math.min(3, scale));
  panX = mx - (mx - panX) * (scale / oldScale);
  panY = my - (my - panY) * (scale / oldScale);
  applyTransform();
}, { passive: false });

document.getElementById("zoomIn").addEventListener("click", () => { scale = Math.min(3, scale * 1.25); applyTransform(); });
document.getElementById("zoomOut").addEventListener("click", () => { scale = Math.max(0.15, scale * 0.8); applyTransform(); });
document.getElementById("zoomFit").addEventListener("click", fitAll);

function fitAll() {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const nodes = canvas.querySelectorAll(".rnode");
  if (!nodes.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const x = parseFloat(n.style.left), y = parseFloat(n.style.top);
    const w = n.offsetWidth || 180, h = n.offsetHeight || 70;
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x + w); maxY = Math.max(maxY, y + h);
  });
  const cw = maxX - minX + 80, ch = maxY - minY + 80;
  scale = Math.min(vw / cw, vh / ch, 1.5);
  panX = (vw - cw * scale) / 2 - minX * scale + 40 * scale;
  panY = (vh - ch * scale) / 2 - minY * scale + 40 * scale;
  applyTransform();
}

// ── Discovery ──────────────────────────────────────────────────
async function discoverLaunches() {
  const currentBlock = await provider.getBlockNumber();
  const events = [];
  for (const f of FACTORIES) {
    const factory = new ethers.Contract(f.addr, FACTORY_ABI, provider);
    for (let from = f.deployBlock; from <= currentBlock; from += CHUNK + 1) {
      const to = Math.min(from + CHUNK, currentBlock);
      const chunk = await factory.queryFilter("TokenLaunched", from, to);
      events.push(...chunk);
    }
  }
  return events.filter(ev => !BRICKED.has(ev.args.reactor)).map(ev => ({
    name: ev.args.symbol, fullName: ev.args.name,
    token: ev.args.token, reactor: ev.args.reactor,
    charReactor: ev.args.charReactor, seed: ev.args.seed,
  }));
}

async function getStatus(addr) {
  const c = new ethers.Contract(addr, REACTOR_ABI, provider);
  try {
    const [pools, cd] = await Promise.all([c.poolCount().catch(() => null), c.timeUntilExecute().catch(() => null)]);
    return { pools: pools !== null ? Number(pools) : "?", cooldown: cd !== null ? Number(cd) : null, status: cd !== null ? (cd === 0n ? "ready" : "cooldown") : "unknown" };
  } catch { return { pools: "?", cooldown: null, status: "unknown" }; }
}

function badgeHtml(s) {
  if (s.status === "ready") return `<span class="rbadge badge-ready">READY</span>`;
  if (s.status === "cooldown") return `<span class="rbadge badge-cooldown">${Math.ceil(s.cooldown / 60)}m</span>`;
  return `<span class="rbadge badge-err">--</span>`;
}

// ── Layout & Render ──────────────────────────────────────────────────
async function render() {
  const statusEl = document.getElementById("status");

  let launches;
  try { launches = await discoverLaunches(); }
  catch (e) { statusEl.innerHTML = `<span style="color:var(--red)">Scan failed: ${e.message.slice(0,60)}</span>`; return; }

  statusEl.innerHTML = `<span class="spinner">&#9696;</span> Found ${launches.length} token(s). Loading status...`;

  // Layout constants
  const NODE_W = 180, NODE_H = 72, GAP_X = 40, GAP_Y = 50, COL_W = NODE_W + GAP_X;

  // Collect all nodes with positions
  const nodes = [];
  const connections = []; // {from: {x,y}, to: {x,y}}

  // --- ROW 0: Token Reactors (primary) ---
  const row0_y = 0;
  const launchStartX = 0;
  for (let i = 0; i < launches.length; i++) {
    const l = launches[i];
    const x = launchStartX + i * COL_W;
    nodes.push({ id: "r-" + l.reactor, name: l.name + " Reactor", addr: l.reactor, cls: "launched", x, y: row0_y, meta: `${l.fullName} | $${(Number(l.seed)/1e6).toFixed(2)}` });
  }

  // --- ROW 1: CHAR Reactors (directly below their primary) ---
  const row1_y = row0_y + NODE_H + GAP_Y;
  for (let i = 0; i < launches.length; i++) {
    const l = launches[i];
    const x = launchStartX + i * COL_W;
    nodes.push({ id: "c-" + l.charReactor, name: l.name + " CHAR", addr: l.charReactor, cls: "char", x, y: row1_y, meta: `Burns carbon credits` });
    // Connect primary → CHAR
    connections.push({ x1: x + NODE_W / 2, y1: row0_y + NODE_H, x2: x + NODE_W / 2, y2: row1_y });
  }

  // --- ROW 2: MycoPad Hub (centered below all CHAR reactors) ---
  const row2_y = row1_y + NODE_H + GAP_Y * 1.5;
  const totalLaunchW = Math.max(1, launches.length) * COL_W - GAP_X;
  const hubX = Math.max(0, (totalLaunchW - NODE_W) / 2);
  nodes.push({ id: "hub", name: "Unruggable Hub", addr: "0xF5B9Fc40080aAcC262f078eCE374A2268dcdb045", cls: "hub", x: hubX, y: row2_y, meta: "Collects all upstream fees" });
  // Connect each CHAR → Hub
  for (let i = 0; i < launches.length; i++) {
    const x = launchStartX + i * COL_W + NODE_W / 2;
    connections.push({ x1: x, y1: row1_y + NODE_H, x2: hubX + NODE_W / 2, y2: row2_y });
  }

  // --- Fetch statuses ---
  const BATCH = 4;
  for (let i = 0; i < nodes.length; i += BATCH) {
    const batch = nodes.slice(i, i + BATCH);
    const results = await Promise.all(batch.map(n => getStatus(n.addr)));
    for (let j = 0; j < results.length; j++) {
      nodes[i + j].st = results[j];
    }
    if (i + BATCH < nodes.length) await new Promise(r => setTimeout(r, 600));
  }

  // --- Draw ---
  let html = "";

  // Layer labels
  if (launches.length > 0) {
    html += `<div class="layer-label" style="left:${launchStartX - 10}px;top:${row0_y - 20}px;">Token Reactors</div>`;
    html += `<div class="layer-label" style="left:${launchStartX - 10}px;top:${row1_y - 20}px;">CHAR Reactors</div>`;
  }
  html += `<div class="layer-label" style="left:${hubX - 10}px;top:${row2_y - 20}px;">Unruggable Hub</div>`;

  // Nodes
  for (const n of nodes) {
    const s = n.st || { status: "unknown", pools: "?", cooldown: null };
    const poolStr = s.pools !== "?" ? ` | Pools: <span>${s.pools}</span>` : "";
    html += `<div class="rnode ${n.cls}" style="left:${n.x}px;top:${n.y}px;width:${NODE_W}px;">
      ${badgeHtml(s)}
      <div class="rname">${n.name}</div>
      <div class="raddr"><a href="${EXPLORER}/address/${n.addr}" target="_blank">${short(n.addr)}</a></div>
      ${n.meta || poolStr ? `<div class="rmeta">${n.meta}${poolStr}</div>` : ""}
    </div>`;
  }

  canvas.innerHTML = html;

  // SVG connections
  let svgHtml = "";
  for (const c of connections) {
    if (c.horiz) {
      // Horizontal arrow (chain links)
      svgHtml += `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" stroke="#2d4a38" stroke-width="2" stroke-dasharray="4,4"/>`;
      svgHtml += `<polygon points="${c.x2 - 6},${c.y2 - 4} ${c.x2},${c.y2} ${c.x2 - 6},${c.y2 + 4}" fill="#3fb950" opacity="0.6"/>`;
    } else {
      // Vertical arrow (fee flow down = up the chain)
      const mx = (c.x1 + c.x2) / 2;
      const my = (c.y1 + c.y2) / 2;
      if (c.x1 === c.x2) {
        svgHtml += `<line x1="${c.x1}" y1="${c.y1}" x2="${c.x2}" y2="${c.y2}" stroke="#2d4a38" stroke-width="2"/>`;
      } else {
        svgHtml += `<path d="M${c.x1},${c.y1} Q${c.x1},${my} ${mx},${my} Q${c.x2},${my} ${c.x2},${c.y2}" fill="none" stroke="#2d4a38" stroke-width="2"/>`;
      }
      svgHtml += `<polygon points="${c.x2 - 4},${c.y2 - 6} ${c.x2},${c.y2} ${c.x2 + 4},${c.y2 - 6}" fill="#3fb950" opacity="0.6"/>`;
    }
  }
  svg.innerHTML = svgHtml;

  // Stats
  const readyCount = nodes.filter(n => n.st && n.st.status === "ready").length;
  statusEl.innerHTML = `<span style="color:var(--green);">${nodes.length} reactors</span> | ${launches.length} launched tokens | ${readyCount} ready to fire`;

  // Fit to view
  setTimeout(fitAll, 100);
}

render();
</script>
</body>
</html>
