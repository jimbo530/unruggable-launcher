const log = document.getElementById("log");
function print(msg) { log.innerHTML += msg + "\n"; }

document.getElementById("deploy").addEventListener("click", async () => {
  if (!window.ethereum) { alert("No wallet"); return; }
  const btn = document.getElementById("deploy");
  btn.disabled = true;

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const network = await provider.getNetwork();
    if (Number(network.chainId) !== 8453) {
      await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x2105" }] });
    }
    const signer = await provider.getSigner();
    const addr = await signer.getAddress();
    print("Wallet: " + addr);

    print("Deploying WildcardManagerV2...");
    print("  USDC:      " + USDC);
    print("  V3Factory: " + V3FAC);
    print("  PM:        " + PM);
    print("  Router:    " + ROUTER);

    const factory = new ethers.ContractFactory(ABI, BIN, signer);
    const contract = await factory.deploy(USDC, V3FAC, PM, ROUTER, { gasLimit: 3000000 });
    print("Tx: " + contract.deploymentTransaction().hash);
    await contract.waitForDeployment();
    const deployed = await contract.getAddress();

    print("");
    print('<span class="addr">WildcardManagerV2 deployed: ' + deployed + '</span>');
    print("");
    print("Verify: usdc()            = " + await contract.usdc());
    print("Verify: v3Factory()       = " + await contract.v3Factory());
    print("Verify: positionManager() = " + await contract.positionManager());
    print("Verify: swapRouter()      = " + await contract.swapRouter());
    print("Verify: MIN_USDC()        = " + (await contract.MIN_USDC()).toString() + " ($5)");
    print("Verify: POOL_FEE()        = " + (await contract.POOL_FEE()).toString() + " (1%)");
  } catch (e) {
    print("ERROR: " + (e.reason || e.message || e));
  }
  btn.disabled = false;
});
