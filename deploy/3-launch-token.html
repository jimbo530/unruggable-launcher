<!DOCTYPE html>
<html><head>
<title>MycoPad — Grow an Unruggable Token</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: monospace; background: #0d1210; color: #c8d8c4; padding: 20px; max-width: 620px; margin: auto; }
  h1 { color: #7ee787; font-size: 22px; text-align: center; margin-bottom: 4px; letter-spacing: 2px; }
  h2 { color: #8b949e; font-size: 13px; text-align: center; margin-bottom: 24px; font-weight: normal; }
  .subtitle { text-align: center; color: #d4a853; font-size: 11px; margin-bottom: 20px; }
  label { display: block; margin: 12px 0 4px; color: #8b949e; font-size: 13px; }
  input, select { background: #161b1e; color: #c8d8c4; border: 1px solid #2d3a2e; padding: 10px; width: 100%; font-family: monospace; font-size: 14px; border-radius: 4px; }
  select { color: #7ee787; }
  input:focus { border-color: #7ee787; outline: none; }
  button { background: #238636; color: #fff; border: none; padding: 14px 32px; font-size: 18px; cursor: pointer; font-family: monospace; margin: 16px 0; width: 100%; font-weight: bold; border-radius: 6px; letter-spacing: 1px; }
  button:hover { background: #2ea043; }
  button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  #log { white-space: pre-wrap; margin-top: 16px; padding: 12px; background: #161b1e; border: 1px solid #2d3a2e; min-height: 120px; font-size: 12px; border-radius: 4px; }
  .addr { color: #d4a853; font-weight: bold; }
  .err { color: #f85149; }
  .info { color: #79c0ff; }
  .success { color: #7ee787; font-weight: bold; }
  .box { border: 1px solid #2d3a2e; padding: 14px; margin: 12px 0; background: #161b1e; border-radius: 6px; }
  .stat { display: flex; justify-content: space-between; margin: 4px 0; }
  .stat .label { color: #8b949e; }
  .stat .value { color: #7ee787; }
  .mesh-note { color: #d4a853; font-size: 11px; margin-top: 10px; padding-top: 8px; border-top: 1px solid #2d3a2e; }
  .safety { color: #8b949e; font-size: 11px; margin-top: 8px; font-style: italic; }
  .tier-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; margin-left: 6px; }
  .tier-spore { background: #21262d; color: #8b949e; }
  .tier-mycelium { background: #1b3a1e; color: #7ee787; }
</style>
</head><body>

<h1>MycoPad</h1>
<h2>Drop a spore. Grow an unruggable token. Join the mycelium.</h2>
<div class="subtitle">Every token feeds the network. Every floor only grows.</div>

<label>Chain:</label>
<select id="chain" onchange="updateChain()"></select>

<label>Spore Name:</label>
<input id="tokenName" placeholder="e.g. TreeCoin">

<label>Spore Symbol:</label>
<input id="tokenSymbol" placeholder="e.g. TREE">

<label>Total Supply:</label>
<input id="totalSupply" type="number" value="1000000000" placeholder="e.g. 1000000000">

<label>Seed Amount (ETH):</label>
<input id="seedAmount" type="text" value="0.0003" placeholder="min ~0.0003 ETH (~$1)">

<div class="box" id="infoBox"></div>

<button id="launchBtn" onclick="launchToken()">DROP SPORE</button>
<div id="log"></div>

<script type="module">
import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js";
import { CHAINS, chainOptions } from "./chains.js";

// -- UPDATE THESE after deploying factories per chain --
const FACTORY_ADDRESSES = {
  8453:  "PASTE_BASE_FACTORY_HERE",
  1:     "PASTE_ETH_FACTORY_HERE",
  42161: "PASTE_ARB_FACTORY_HERE",
  10:    "PASTE_OP_FACTORY_HERE",
  137:   "PASTE_POLY_FACTORY_HERE"
};

const MESH_SEED = 0.4; // ETH — threshold for mycelium mesh

document.getElementById("chain").innerHTML = chainOptions();

function updateChain() {
  const c = CHAINS[Number(document.getElementById("chain").value)];
  const seedVal = parseFloat(document.getElementById("seedAmount").value) || 0;
  const isMesh = seedVal >= MESH_SEED;
  const tierLabel = isMesh
    ? '<span class="tier-badge tier-mycelium">MYCELIUM</span>'
    : '<span class="tier-badge tier-spore">SPORE</span>';

  document.getElementById("infoBox").innerHTML = `
    <div style="color:#7ee787; margin-bottom:8px;">How your spore grows on ${c.name}: ${tierLabel}</div>
    <div class="stat"><span class="label">0.1% supply</span><span class="value">MfT nutrient reserve</span></div>
    <div class="stat"><span class="label">1% supply</span><span class="value">Grower's share (you)</span></div>
    <div class="stat"><span class="label">~40% supply</span><span class="value">USDC root pool</span></div>
    <div class="stat"><span class="label">~35% supply</span><span class="value">WETH root pool</span></div>
    <div class="stat"><span class="label">~25% supply</span><span class="value">${c.btcLabel} root pool</span></div>
    <div class="stat"><span class="label">Seed split</span><span class="value">60% USDC / 20% WETH / 20% ${c.btcLabel}</span></div>
    <div class="stat"><span class="label">Root system</span><span class="value">Locked in Spore Reactor FOREVER</span></div>
    <div class="stat"><span class="label">Reactor</span><span class="value">Burns + compounds + feeds MfT (10%)</span></div>
    ${isMesh ? `<div class="mesh-note">MYCELIUM TIER: Auto-connected to the mesh network. New spores can grow hyphae to yours. Your reactor feeds nutrients up to MfT and compounds floors across the network.</div>` : `<div class="mesh-note">Seed ${MESH_SEED}+ ETH to join the mycelium mesh — auto-connect to the network so other spores grow hyphae to yours.</div>`}
    <div class="safety">Liquidity is permanently rooted. No one can pull this token. Not even you.</div>
  `;
}

document.getElementById("seedAmount").addEventListener("input", updateChain);
updateChain();
window.updateChain = updateChain;

const FACTORY_ABI = [
  {"inputs":[{"type":"string"},{"type":"string"},{"type":"uint256"}],"name":"launch","outputs":[{"type":"address"},{"type":"address"}],"stateMutability":"payable","type":"function"},
  {"inputs":[],"name":"launchCount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"minSeed","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[],"name":"meshSeed","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"},
  {"anonymous":false,"inputs":[{"indexed":true,"type":"address","name":"token"},{"indexed":true,"type":"address","name":"reactor"},{"indexed":true,"type":"address","name":"grower"},{"indexed":false,"type":"string","name":"name"},{"indexed":false,"type":"string","name":"symbol"},{"indexed":false,"type":"uint256","name":"supply"},{"indexed":false,"type":"uint256","name":"seed"},{"indexed":false,"type":"bool","name":"meshed"}],"name":"Sporulated","type":"event"}
];

const log = document.getElementById("log");
function out(msg, cls) { log.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

window.launchToken = async function() {
  const btn = document.getElementById("launchBtn");
  btn.disabled = true;
  log.innerHTML = "";

  try {
    const targetChain = Number(document.getElementById("chain").value);
    const chain = CHAINS[targetChain];
    const factoryAddr = FACTORY_ADDRESSES[targetChain];

    if (!factoryAddr || factoryAddr.startsWith("PASTE_")) {
      out(`MycoPad not deployed on ${chain.name} yet!`, "err");
      btn.disabled = false;
      return;
    }

    if (!window.ethereum) { out("No wallet found. Install MetaMask or similar.", "err"); btn.disabled = false; return; }

    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const network = await provider.getNetwork();
    const address = await signer.getAddress();

    out(`Grower:  ${address}`, "info");
    out(`Chain:   ${network.chainId} (${chain.name})`, "info");

    if (Number(network.chainId) !== targetChain) {
      out(`Switch wallet to ${chain.name} (${targetChain})!`, "err");
      btn.disabled = false;
      return;
    }

    const name = document.getElementById("tokenName").value.trim();
    const symbol = document.getElementById("tokenSymbol").value.trim();
    const supplyRaw = document.getElementById("totalSupply").value.trim();
    const seedEth = document.getElementById("seedAmount").value.trim();

    if (!name || !symbol) { out("Name your spore", "err"); btn.disabled = false; return; }
    if (!supplyRaw || Number(supplyRaw) < 1) { out("Supply must be at least 1", "err"); btn.disabled = false; return; }

    const supply = ethers.parseUnits(supplyRaw, 18);
    const seed = ethers.parseEther(seedEth);
    const isMesh = parseFloat(seedEth) >= MESH_SEED;

    const factory = new ethers.Contract(factoryAddr, FACTORY_ABI, signer);
    const minSeed = await factory.minSeed();

    if (seed < minSeed) {
      out(`Seed too small. Minimum: ${ethers.formatEther(minSeed)} ETH`, "err");
      btn.disabled = false;
      return;
    }

    out(`\nDropping spore: ${name} (${symbol}) on ${chain.name}...`);
    out(`  Supply: ${Number(supplyRaw).toLocaleString()} tokens`);
    out(`  Seed:   ${seedEth} ETH`);
    out(`  Tier:   ${isMesh ? "MYCELIUM (mesh-eligible)" : "SPORE (solo growth)"}`);
    out(`  You get: ${(Number(supplyRaw) * 0.01).toLocaleString()} ${symbol} (1%)`);
    out("");

    const tx = await factory.launch(name, symbol, supply, { value: seed });
    out("Tx sent: " + tx.hash, "info");
    out("Germinating...\n");

    const receipt = await tx.wait();
    out("Rooted in block " + receipt.blockNumber, "success");

    for (const evLog of receipt.logs) {
      try {
        const parsed = factory.interface.parseLog({ topics: evLog.topics, data: evLog.data });
        if (parsed && parsed.name === "Sporulated") {
          out(`\n========================================`, "success");
          out(`  SPORE DROPPED SUCCESSFULLY!`, "success");
          out(`========================================\n`, "success");
          out(`Token:   `, "info"); out(parsed.args.token, "addr");
          out(`Reactor: `, "info"); out(parsed.args.reactor, "addr");
          if (parsed.args.meshed) {
            out(`\nMycelium: CONNECTED`, "success");
            out(`Your spore is part of the mesh network.`);
            out(`Other spores can grow hyphae to yours.`);
            out(`Your reactor feeds 10% to MfT. Floors only grow.`);
          } else {
            out(`\nMycelium: not connected (seed below threshold)`);
            out(`Add wildcards to connect manually.`);
          }
          out(`\n3 root pools live on Uniswap V3.`);
          out(`Liquidity is rooted in the Spore Reactor forever.`);
          out(`Anyone can call execute() to compound + burn.`);
          out(`\nExplorer: ${chain.explorer}/address/${parsed.args.token}`, "info");
          break;
        }
      } catch(_) {}
    }

    out(`\nGas used: ${receipt.gasUsed.toString()}`, "info");

  } catch(e) {
    out("ERROR: " + (e.reason || e.message), "err");
    if (e.data) out("Data: " + e.data, "err");
  }
  btn.disabled = false;
};
</script>
</body></html>
