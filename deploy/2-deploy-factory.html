<!DOCTYPE html>
<html><head>
<title>MycoPad — Step 2: Deploy Factory</title>
<style>
  body { font-family: monospace; background: #0d1210; color: #c8d8c4; padding: 20px; max-width: 700px; margin: auto; }
  h1 { color: #7ee787; font-size: 18px; }
  p { color: #8b949e; }
  label { display: block; margin: 8px 0 4px; color: #8b949e; }
  input, select { background: #161b1e; color: #c8d8c4; border: 1px solid #2d3a2e; padding: 8px; width: 100%; font-family: monospace; box-sizing: border-box; border-radius: 4px; }
  select { color: #7ee787; font-size: 14px; }
  button { background: #238636; color: #fff; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; font-family: monospace; margin: 8px 0; border-radius: 6px; }
  button:hover { background: #2ea043; }
  #log { white-space: pre-wrap; margin-top: 16px; padding: 12px; background: #161b1e; border: 1px solid #2d3a2e; min-height: 100px; border-radius: 4px; }
  .addr { color: #d4a853; font-weight: bold; }
  .err { color: #f85149; }
  .info { color: #79c0ff; }
  .auto { padding: 8px; background: #161b1e; border: 1px solid #2d3a2e; margin-top: 8px; border-radius: 4px; }
  .dim { color: #484f58; font-size: 11px; }
</style>
</head><body>
<h1>MycoPad — Step 2: Deploy Launch Factory</h1>
<p>Deploys the TokenLaunchFactory. One per chain. Chain addresses auto-filled.<br>
Now includes MfT + Reactor Prime for mycelium fuel lines.</p>

<label>Target Chain:</label>
<select id="chain" onchange="fillAddresses()"></select>

<label>Spore Reactor Implementation (from step 1):</label>
<input id="reactorImpl" placeholder="0x...">

<label>MfT Treasury Address:</label>
<input id="mftTreasury" placeholder="0x...">

<label>MfT Token Address:</label>
<input id="mft" placeholder="0x...">

<label>Reactor Prime Address (MfT reactor):</label>
<input id="reactorPrime" placeholder="0x...">

<div class="auto" id="autoFields"></div>

<br>
<button onclick="deploy()">Deploy Factory</button>
<div id="log"></div>

<script type="module">
import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js";
import { CHAINS, chainOptions } from "./chains.js";

document.getElementById("chain").innerHTML = chainOptions();

function fillAddresses() {
  const c = CHAINS[Number(document.getElementById("chain").value)];
  document.getElementById("autoFields").innerHTML = `
    <div class="dim">Auto-filled for ${c.name}:</div>
    <label>WETH:</label><input id="weth" value="${c.weth}">
    <label>USDC:</label><input id="usdc" value="${c.usdc}">
    <label>${c.btcLabel}:</label><input id="wrappedBtc" value="${c.wrappedBtc}">
    <label>V3 Factory:</label><input id="v3Factory" value="${c.v3Factory}">
    <label>Position Manager:</label><input id="pm" value="${c.pm}">
    <label>SwapRouter02:</label><input id="router" value="${c.router}">
    <label>WETH/USDC Fee Tier:</label><input id="wethUsdcFee" value="${c.wethUsdcFee}">
    <label>WETH/${c.btcLabel} Fee Tier:</label><input id="wethBtcFee" value="${c.wethBtcFee}">
  `;
}
fillAddresses();
window.fillAddresses = fillAddresses;

const ABI = [{"inputs":[{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"uint24"},{"type":"uint24"}],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[],"name":"owner","outputs":[{"type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"launchCount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"}];

const BYTECODE = await fetch("TokenLaunchFactory.bin").then(r => r.text());

const log = document.getElementById("log");
function out(msg, cls) { log.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

window.deploy = async function() {
  try {
    const targetChain = Number(document.getElementById("chain").value);
    const chain = CHAINS[targetChain];
    const reactorImpl = document.getElementById("reactorImpl").value.trim();
    const mftTreasury = document.getElementById("mftTreasury").value.trim();
    const mft = document.getElementById("mft").value.trim();
    const reactorPrime = document.getElementById("reactorPrime").value.trim();
    if (!reactorImpl || !mftTreasury || !mft || !reactorPrime) {
      out("Fill in all required addresses", "err"); return;
    }

    if (!window.ethereum) { out("No wallet found", "err"); return; }
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const network = await provider.getNetwork();
    out(`Connected: ${await signer.getAddress()}`, "info");
    out(`Chain: ${network.chainId} (${chain.name})`, "info");

    if (Number(network.chainId) !== targetChain) {
      out(`WARNING: Wallet is on chain ${network.chainId}, expected ${targetChain} (${chain.name})!`, "err");
      return;
    }

    const args = [
      document.getElementById("weth").value.trim(),
      document.getElementById("usdc").value.trim(),
      document.getElementById("wrappedBtc").value.trim(),
      document.getElementById("v3Factory").value.trim(),
      document.getElementById("pm").value.trim(),
      document.getElementById("router").value.trim(),
      reactorImpl,
      mftTreasury,
      mft,
      reactorPrime,
      Number(document.getElementById("wethUsdcFee").value),
      Number(document.getElementById("wethBtcFee").value)
    ];

    out("\nConstructor args:");
    out("  WETH:           " + args[0]);
    out("  USDC:           " + args[1]);
    out(`  ${chain.btcLabel}:          ${args[2]}`);
    out("  V3 Factory:     " + args[3]);
    out("  NPM:            " + args[4]);
    out("  SwapRouter:     " + args[5]);
    out("  Reactor Impl:   " + args[6]);
    out("  MfT Treasury:   " + args[7]);
    out("  MfT Token:      " + args[8]);
    out("  Reactor Prime:  " + args[9]);
    out("  WETH/USDC Fee:  " + args[10]);
    out(`  WETH/${chain.btcLabel} Fee:  ${args[11]}`);

    out("\nPlanting MycoPad Factory...");
    const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
    const contract = await factory.deploy(...args);
    out("Tx sent: " + contract.deploymentTransaction().hash, "info");

    await contract.waitForDeployment();
    const addr = await contract.getAddress();
    out(`\nMycoPad Factory deployed at:`, "info");
    out(addr, "addr");
    out(`\n${chain.explorer}/address/${addr}`, "info");
    out("\nSave this address! Growers call launch() on this contract.", "info");
  } catch(e) {
    out("ERROR: " + e.message, "err");
  }
};
</script>
</body></html>
