const ABI = [{"inputs":[{"type":"address","name":"_reactorImpl"},{"type":"address","name":"_usdc"},{"type":"address","name":"_mft"},{"type":"address","name":"_weth"},{"type":"address","name":"_pm"},{"type":"address","name":"_router"},{"type":"address","name":"_v3Factory"},{"type":"address","name":"_defaultUpstream"}],"stateMutability":"nonpayable","type":"constructor"}];

const log = document.getElementById("log");
function out(msg, cls) { log.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

window.deploy = async function() {
  const btn = document.getElementById("btn");
  btn.disabled = true;
  log.innerHTML = "";

  try {
    if (!window.ethereum) { out("No wallet found", "err"); btn.disabled = false; return; }

    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const addr = await signer.getAddress();
    out("Deployer: " + addr, "ok");

    // Verify on Base
    const network = await provider.getNetwork();
    if (Number(network.chainId) !== 8453) {
      out("Switching to Base...");
      await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x2105" }] });
    }

    const params = [];
    for (let i = 0; i < 8; i++) {
      const v = document.getElementById("p" + i).value.trim();
      if (!v.match(/^0x[0-9a-fA-F]{40}$/)) { out("Invalid address param " + i, "err"); btn.disabled = false; return; }
      params.push(v);
    }

    out("\nConstructor params:");
    out("  reactorImpl:     " + params[0]);
    out("  usdc:            " + params[1]);
    out("  mft:             " + params[2]);
    out("  weth:            " + params[3]);
    out("  pm:              " + params[4]);
    out("  router:          " + params[5]);
    out("  v3Factory:       " + params[6]);
    out("  defaultUpstream: " + params[7]);
    out("");

    const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
    out("Deploying UnruggableAdoption...");

    const contract = await factory.deploy(...params, { gasLimit: 3000000 });
    out("Tx: " + contract.deploymentTransaction().hash);
    out("Waiting for confirmation...");

    await contract.waitForDeployment();
    const address = await contract.getAddress();

    out("\n  DEPLOYED!", "ok");
    out("  Address: " + address, "addr");
    out("  BaseScan: https://basescan.org/address/" + address);
    out("\n  Verify on BaseScan:");
    out("  Compiler: v0.8.26+commit.8a97fa7a");
    out("  Optimization: Yes (200 runs)");
    out("  Constructor args: ABI-encoded 8 addresses above");
    out("\n  Next: update adopt.html ADOPTION_CONTRACT = \"" + address + "\"");
  } catch(e) {
    if (e.code === "ACTION_REJECTED" || e.code === 4001) {
      out("Cancelled by user.", "err");
    } else {
      out("Error: " + (e.reason || e.shortMessage || e.message), "err");
    }
    btn.disabled = false;
  }
