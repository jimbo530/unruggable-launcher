<!DOCTYPE html>
<!--
  game/seas/town/index.html — WALKABLE PORT ROYAL (Phase 1 of the walkable map).
  SNES-overworld / level-select style: walk the party-leader hero along FIXED RAILS between
  FIXED LOCATION NODES (buildings). Reaching a node + confirming opens the EXISTING page.
  NAVIGATION ONLY — no faked game state.

  INPUTS (all live concurrently, no mode switch — founder games on a controller + a11y):
    • TAP (mobile) / CLICK (PC) a building  → hero auto-walks the rail to it → tap/click it
      again (or the Enter button) to go inside.
    • WASD / Arrow keys move along rails; Enter enters the node you're standing on.
    • Gamepad API: d-pad / left stick move along rails; A (button 0) enters.
    • On-screen d-pad + Enter button (touch) drive the exact same logic.

  Lives at /seas/town/ — so sibling location pages are ONE LEVEL UP: links use '../'.
  Self-contained; only sibling is nav.js (pure path math, also unit-tested in nav.test.js).
  Served static like the rest of the game. No build step.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Walk Port Royal — Seize the Seas</title>
  <style>
    :root{ --ink:#f3ead7; --muted:#b6a584; --gold:#e6b422; --rope:#caa45a; --green:#2ecc71; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ margin:0; height:100%; overflow:hidden; }
    body{ font-family:"Segoe UI",system-ui,sans-serif; color:var(--ink); background:#070b10;
      height:100vh; height:100svh; height:100dvh; touch-action:none; user-select:none; -webkit-user-select:none; }

    #scene{ position:fixed; inset:0; display:block; width:100%; height:100%; }

    /* top bar */
    .topbar{ position:fixed; top:0; left:0; right:0; z-index:5;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:calc(8px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) 8px calc(12px + env(safe-area-inset-left));
      background:linear-gradient(rgba(7,11,16,.82), rgba(7,11,16,0)); pointer-events:none; }
    .topbar .ttl{ color:var(--gold); font-weight:800; font-size:16px; letter-spacing:.06em; text-shadow:0 1px 6px #000; }
    .topbar a.back{ pointer-events:auto; color:var(--ink); text-decoration:none; font-size:13px; font-weight:700;
      background:rgba(20,28,38,.85); border:1px solid var(--rope); border-radius:11px; padding:8px 12px; }
    .topbar a.back:active{ filter:brightness(1.15); }

    /* hint line */
    .hint{ position:fixed; left:0; right:0; top:calc(46px + env(safe-area-inset-top)); z-index:4;
      text-align:center; color:var(--muted); font-size:12px; letter-spacing:.03em; text-shadow:0 1px 4px #000;
      padding:0 14px; pointer-events:none; }
    .hint b{ color:var(--rope); }

    /* ENTER confirm bar — shows only when idle on a location node */
    .enterbar{ position:fixed; left:50%; transform:translateX(-50%);
      bottom:calc(130px + env(safe-area-inset-bottom)); z-index:6;
      display:none; align-items:center; gap:10px;
      background:linear-gradient(#f0c645,#caa033); color:#1a1206; font-weight:800; font-size:17px;
      border:1px solid #8a6b16; border-radius:14px; padding:13px 20px;
      box-shadow:0 8px 26px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.4);
      cursor:pointer; white-space:nowrap; animation:epulse 1.8s ease-in-out infinite; }
    .enterbar.show{ display:inline-flex; }
    .enterbar:active{ transform:translateX(-50%) translateY(1px); }
    .enterbar .k{ font-size:11px; font-weight:700; opacity:.7; }
    @keyframes epulse{ 0%,100%{box-shadow:0 8px 26px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.4), 0 0 0 0 rgba(230,180,34,0)} 50%{box-shadow:0 8px 26px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.4), 0 0 0 9px rgba(230,180,34,.18)} }

    /* on-screen d-pad (touch) */
    .dpad{ position:fixed; left:calc(14px + env(safe-area-inset-left)); bottom:calc(18px + env(safe-area-inset-bottom));
      z-index:6; display:grid; grid-template-columns:repeat(3,52px); grid-template-rows:repeat(3,52px); gap:4px; }
    .dpad button{ -webkit-appearance:none; appearance:none; border:1px solid var(--rope); color:var(--gold);
      background:rgba(20,28,38,.78); border-radius:12px; font-size:22px; font-weight:800; line-height:1; cursor:pointer;
      display:flex; align-items:center; justify-content:center; }
    .dpad button:active{ background:rgba(230,180,34,.28); }
    .dpad .sp{ visibility:hidden; }
    /* the A / enter button (touch) */
    .abtn{ position:fixed; right:calc(18px + env(safe-area-inset-right)); bottom:calc(34px + env(safe-area-inset-bottom));
      z-index:6; width:84px; height:84px; border-radius:50%; border:2px solid #8a6b16; cursor:pointer;
      background:radial-gradient(circle at 35% 30%, #f4d06a, #c79a2c); color:#1a1206; font-weight:900; font-size:15px;
      box-shadow:0 8px 22px rgba(0,0,0,.6), inset 0 2px 0 rgba(255,255,255,.5);
      display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.05; }
    .abtn:active{ filter:brightness(1.1); transform:translateY(1px); }
    .abtn.dim{ opacity:.45; }

    /* gamepad connected toast */
    .pad{ position:fixed; top:calc(8px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); z-index:7;
      background:rgba(46,204,113,.16); border:1px solid rgba(46,204,113,.5); color:var(--green);
      font-size:12px; font-weight:700; padding:6px 12px; border-radius:999px; display:none; }
    .pad.show{ display:block; }

    @media(prefers-reduced-motion:reduce){ *{animation:none !important} }
    /* hide the touch controls on real pointer/no-touch desktops to keep it clean */
    @media (hover:hover) and (pointer:fine){ .dpad,.abtn{ opacity:.5; } }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="topbar">
    <span class="ttl">🗺️ Port Royal</span>
    <a class="back" href="../">⚓ Harbor</a>
  </div>
  <div class="hint" id="hint">Tap a place to walk there · <b>WASD</b>/arrows or 🎮 to move · <b>Enter</b>/A to go in</div>

  <div class="pad" id="padToast">🎮 controller ready</div>

  <button class="enterbar" id="enterBar">▶ Enter <span id="enterName">·</span> <span class="k">(Enter / A)</span></button>

  <!-- touch d-pad -->
  <div class="dpad" aria-label="Move">
    <button class="sp"></button><button data-dir="up" aria-label="up">▲</button><button class="sp"></button>
    <button data-dir="left" aria-label="left">◀</button><button class="sp"></button><button data-dir="right" aria-label="right">▶</button>
    <button class="sp"></button><button data-dir="down" aria-label="down">▼</button><button class="sp"></button>
  </div>
  <button class="abtn" id="abtn">A<br><span style="font-size:10px">ENTER</span></button>

  <script type="module">
    "use strict";
    import { buildAdj, bfsPath, bestNeighborByDir, lerp } from './nav.js';

    // roundRect polyfill — older mobile Safari (<16) lacks it; without this the render loop throws.
    if (!CanvasRenderingContext2D.prototype.roundRect){
      CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
        if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r}; else r = {tl:0,tr:0,br:0,bl:0};
        this.moveTo(x+r.tl,y);
        this.lineTo(x+w-r.tr,y); this.arcTo(x+w,y,x+w,y+r.tr,r.tr);
        this.lineTo(x+w,y+h-r.br); this.arcTo(x+w,y+h,x+w-r.br,y+h,r.br);
        this.lineTo(x+r.bl,y+h); this.arcTo(x,y+h,x,y+h-r.bl,r.bl);
        this.lineTo(x,y+r.tl); this.arcTo(x,y,x+r.tl,y,r.tl);
        return this;
      };
    }

    // ── WORLD: location nodes (positions are fractions of the canvas) ─────────
    // 'plaza' is a non-page junction (spawn / hub). The 8 real nodes link to the
    // EXISTING pages, one level up ('../') because this page lives at /seas/town/.
    const NODES = {
      plaza:   { x:.50, y:.50, icon:'⚓', label:'Town Square', href:null },
      store:   { x:.50, y:.15, icon:'🏪', label:'General Store', href:'../store/' },
      tavern:  { x:.21, y:.25, icon:'🍺', label:'The Tavern',    href:'../tavern/' },
      shipyard:{ x:.79, y:.25, icon:'⛵', label:'The Shipyard',  href:'../shipyard/' },
      crew:    { x:.15, y:.55, icon:'👥', label:'Your Crew',     href:'../crew/' },
      battle:  { x:.85, y:.55, icon:'⚔️', label:'The Decks',     href:'../battle-grid/' },
      jobs:    { x:.27, y:.84, icon:'🛠️', label:'Town Work',     href:'../jobs/' },
      play:    { x:.52, y:.88, icon:'🦸', label:'Choose a Hero', href:'../play/' },
      docks:   { x:.76, y:.84, icon:'🧭', label:'The Docks · Set Sail', href:'../map.html' },
      market:  { x:.13, y:.40, icon:'⚖️', label:'Port Royal Market', href:'goods-market.html' },
    };
    const EDGES = [
      ['plaza','store'],['plaza','tavern'],['plaza','shipyard'],['plaza','crew'],
      ['plaza','battle'],['plaza','jobs'],['plaza','play'],['plaza','docks'],
      ['tavern','store'],['store','shipyard'],['tavern','crew'],['shipyard','battle'],
      ['crew','jobs'],['battle','docks'],['jobs','play'],['play','docks'],
      ['plaza','market'],['market','crew'],['market','tavern'],
    ];
    const ADJ = buildAdj(EDGES);
    const POS = {}; for (const id in NODES) POS[id] = { x:NODES[id].x, y:NODES[id].y };

    // ── HERO state ────────────────────────────────────────────────────────────
    // hero is AT a node (edge=null) or MOVING along an edge (from→to, t 0..1).
    const hero = { at:'plaza', from:null, to:null, t:0 };
    let queue = [];          // remaining node-ids to walk to (auto-walk path)
    let heldDir = null;      // {dx,dy} from a held key/dpad/stick (for continuous walk)
    const SPEED = 0.55;      // normalized units per second along an edge

    // ── canvas / sizing ────────────────────────────────────────────────────────
    const cv = document.getElementById('scene');
    const ctx = cv.getContext('2d');
    let CW=0, CH=0, DPR=1;
    function resize(){
      DPR = Math.min(window.devicePixelRatio||1, 2.5);
      CW = window.innerWidth; CH = window.innerHeight;
      cv.width = Math.round(CW*DPR); cv.height = Math.round(CH*DPR);
      cv.style.width = CW+'px'; cv.style.height = CH+'px';
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    window.addEventListener('resize', resize); resize();

    const px = id => ({ x:NODES[id].x*CW, y:NODES[id].y*CH });

    // ── background art (port.jpg, drawn cover) ─────────────────────────────────
    const bg = new Image(); let bgOk=false;
    bg.onload = ()=> bgOk=true;
    bg.onerror = ()=> { bgOk=false; console.warn('[town] background art failed to load (../art/rooms/port.jpg) — using fallback fill'); };
    bg.src = '../art/rooms/port.jpg';

    // ── hero sprite = party-leader paper-doll render (transparent PNG) ──────────
    let leaderId=null; try { leaderId = localStorage.getItem('sts_party_leader'); } catch(_){}
    const sprite = new Image(); sprite.crossOrigin='anonymous'; let spriteOk=false;
    if (leaderId){
      sprite.onload = ()=> spriteOk=true;
      sprite.onerror = ()=> { spriteOk=false; console.warn('[town] leader render failed to load for', leaderId, '— using default marker'); };
      sprite.src = 'https://tasern.quest/crew/render/'+leaderId+'.png';
    }

    // ── ENTER confirm bar ───────────────────────────────────────────────────────
    const enterBar = document.getElementById('enterBar');
    const enterName = document.getElementById('enterName');
    function idleOnLocation(){ return !hero.to && queue.length===0 && NODES[hero.at].href; }
    function refreshEnterBar(){
      if (idleOnLocation()){ enterName.textContent = NODES[hero.at].label; enterBar.classList.add('show'); }
      else enterBar.classList.remove('show');
    }
    function enterCurrent(){
      if (!idleOnLocation()) return;
      const href = NODES[hero.at].href;
      if (href) window.location.href = href;   // open the EXISTING page — no fake state
    }
    enterBar.addEventListener('click', enterCurrent);

    // ── movement engine ─────────────────────────────────────────────────────────
    function startEdge(to){
      if (hero.to || hero.at===to || !ADJ[hero.at].includes(to)) return false;
      hero.from = hero.at; hero.to = to; hero.t = 0; refreshEnterBar(); return true;
    }
    // walk a full BFS path (auto-walk to a tapped/selected node)
    function walkTo(goal){
      if (goal===hero.at && !hero.to){ return; } // already here; ENTER handles entry
      const start = hero.to ? hero.to : hero.at;   // if mid-edge, plan from the node we're heading to
      const path = bfsPath(ADJ, start, goal);
      if (path.length < 2){ queue=[]; return; }
      queue = path.slice(1);                       // drop the start node
      if (!hero.to) startEdge(queue.shift());
    }
    // direction input (keyboard/dpad/stick): pick best neighbour and go
    function nudge(dx,dy){
      if (hero.to) return;                         // already walking an edge
      const nb = bestNeighborByDir(POS, ADJ, hero.at, dx, dy);
      if (nb){ queue=[]; startEdge(nb); }
    }

    function update(dt){
      if (hero.to){
        const a = px(hero.from), b = px(hero.to);
        const distNorm = Math.hypot(NODES[hero.to].x-NODES[hero.from].x, NODES[hero.to].y-NODES[hero.from].y) || 0.001;
        hero.t += (SPEED/distNorm)*dt;
        if (hero.t >= 1){
          hero.at = hero.to; hero.from=null; hero.to=null; hero.t=0;
          if (queue.length){ startEdge(queue.shift()); }      // continue auto-walk path
          else if (heldDir){ nudge(heldDir.dx, heldDir.dy); } // continue while a dir is held
          refreshEnterBar();
        }
      } else if (heldDir){
        nudge(heldDir.dx, heldDir.dy);
      }
    }

    // ── rendering ────────────────────────────────────────────────────────────────
    function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }
    function drawBg(){
      if (bgOk){
        const s = Math.max(CW/bg.width, CH/bg.height);
        const w=bg.width*s, h=bg.height*s;
        ctx.drawImage(bg, (CW-w)/2, (CH-h)/2, w, h);
      } else { ctx.fillStyle='#0e1a24'; ctx.fillRect(0,0,CW,CH); }
      ctx.fillStyle='rgba(7,11,16,.52)'; ctx.fillRect(0,0,CW,CH);   // darken for readability
    }
    function drawRails(){
      ctx.lineCap='round';
      for (const [a,b] of EDGES){
        const pa=px(a), pb=px(b);
        ctx.lineWidth=9; ctx.strokeStyle='rgba(20,14,7,.55)';
        ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
        ctx.lineWidth=4; ctx.setLineDash([2,9]); ctx.strokeStyle='rgba(202,164,90,.85)';
        ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    const destId = ()=> queue.length ? queue[queue.length-1] : (hero.to || null);
    function drawNode(id, now){
      const p=px(id), n=NODES[id];
      const isHere = (!hero.to && hero.at===id);
      const isDest = (destId()===id);
      const R = Math.max(20, Math.min(CW,CH)*0.045);
      // glow ring
      if (isHere || isDest){
        const pulse = 0.5+0.5*Math.sin(now/300);
        ctx.beginPath(); ctx.arc(p.x,p.y,R+8+pulse*4,0,Math.PI*2);
        ctx.fillStyle = isHere ? 'rgba(46,204,113,.20)' : 'rgba(230,180,34,.20)';
        ctx.fill();
      }
      // disc
      ctx.beginPath(); ctx.arc(p.x,p.y,R,0,Math.PI*2);
      ctx.fillStyle='rgba(20,14,7,.92)'; ctx.fill();
      ctx.lineWidth=3; ctx.strokeStyle = isHere?'#2ecc71':(isDest?'#e6b422':'#caa45a'); ctx.stroke();
      // icon
      ctx.font = Math.round(R*1.05)+'px "Segoe UI Emoji","Segoe UI",sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(n.icon, p.x, p.y+1);
      // label plaque
      const ls = Math.max(12, Math.min(CW,CH)*0.024);
      ctx.font = '700 '+ls+'px "Segoe UI",sans-serif';
      const tw = ctx.measureText(n.label).width;
      const ly = p.y + R + 6, lh = ls+8;
      ctx.fillStyle='rgba(7,11,16,.78)'; roundRect(p.x-tw/2-8, ly, tw+16, lh, 7); ctx.fill();
      ctx.fillStyle = n.href ? '#f3ead7' : '#b6a584';
      ctx.textBaseline='middle'; ctx.fillText(n.label, p.x, ly+lh/2+1);
    }
    function heroXY(){
      if (hero.to){ const a=px(hero.from), b=px(hero.to);
        const e = hero.t<0.5 ? 2*hero.t*hero.t : 1-Math.pow(-2*hero.t+2,2)/2; // easeInOut
        return { x:lerp(a.x,b.x,e), y:lerp(a.y,b.y,e) }; }
      return px(hero.at);
    }
    function drawHero(now){
      const p = heroXY();
      const H = Math.max(74, Math.min(CW,CH)*0.16);  // token height in px
      const bob = hero.to ? Math.sin(now/90)*2 : 0;
      // ground shadow
      ctx.beginPath(); ctx.ellipse(p.x, p.y+2, H*0.22, H*0.07, 0, 0, Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fill();
      if (spriteOk){
        // render is 1000x1000, feet at the bottom; anchor feet at p, scale to token height
        const w = H * (sprite.width/sprite.height);
        ctx.drawImage(sprite, p.x - w/2, p.y - H + bob, w, H);
      } else {
        // default marker: gold pin token with a pirate face
        ctx.beginPath(); ctx.arc(p.x, p.y - H*0.45 + bob, H*0.28, 0, Math.PI*2);
        ctx.fillStyle='#caa033'; ctx.fill(); ctx.lineWidth=3; ctx.strokeStyle='#1a1206'; ctx.stroke();
        ctx.font = Math.round(H*0.34)+'px "Segoe UI Emoji",sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('🏴‍☠️', p.x, p.y - H*0.45 + bob + 1);
      }
    }

    let last=performance.now();
    function frame(now){
      const dt = Math.min(0.05, (now-last)/1000); last=now;
      pollGamepad();
      update(dt);
      drawBg(); drawRails();
      for (const id in NODES) if (id!=='plaza') drawNode(id, now);
      drawNode('plaza', now);
      drawHero(now);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    refreshEnterBar();

    // ── INPUT: tap / click (walk-to, then confirm) ───────────────────────────────
    function hitNode(cx,cy){
      const R = Math.max(20, Math.min(CW,CH)*0.045) + 10;
      let best=null, bd=R*R;
      for (const id in NODES){ const p=px(id); const d=(p.x-cx)**2+(p.y-cy)**2; if (d<bd){ bd=d; best=id; } }
      return best;
    }
    function onPoint(cx,cy){
      const id = hitNode(cx,cy);
      if (!id) return;
      if (!hero.to && id===hero.at){ enterCurrent(); return; } // tap the place you're on → go in
      walkTo(id);                                              // else auto-walk the rail there
    }
    cv.addEventListener('click', e => onPoint(e.clientX, e.clientY));
    cv.addEventListener('touchstart', e => { if (e.changedTouches[0]){ e.preventDefault(); const t=e.changedTouches[0]; onPoint(t.clientX,t.clientY); } }, {passive:false});

    // ── INPUT: keyboard (WASD / arrows / Enter) ──────────────────────────────────
    const DIRS = { ArrowUp:[0,-1],KeyW:[0,-1], ArrowDown:[0,1],KeyS:[0,1],
                   ArrowLeft:[-1,0],KeyA:[-1,0], ArrowRight:[1,0],KeyD:[1,0] };
    window.addEventListener('keydown', e => {
      if (e.code in DIRS){ e.preventDefault(); const [dx,dy]=DIRS[e.code]; heldDir={dx,dy}; nudge(dx,dy); }
      else if (e.code==='Enter' || e.code==='Space'){ e.preventDefault(); enterCurrent(); }
    });
    window.addEventListener('keyup', e => { if (e.code in DIRS) heldDir=null; });

    // ── INPUT: on-screen d-pad (touch) ───────────────────────────────────────────
    const DV = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    document.querySelectorAll('.dpad button[data-dir]').forEach(btn => {
      const d = DV[btn.dataset.dir];
      const press = e => { e.preventDefault(); heldDir={dx:d[0],dy:d[1]}; nudge(d[0],d[1]); };
      const release = () => { heldDir=null; };
      btn.addEventListener('touchstart', press, {passive:false});
      btn.addEventListener('touchend', release); btn.addEventListener('touchcancel', release);
      btn.addEventListener('mousedown', press); btn.addEventListener('mouseup', release); btn.addEventListener('mouseleave', release);
    });
    document.getElementById('abtn').addEventListener('click', enterCurrent);

    // ── INPUT: Gamepad API (d-pad / left stick move, A=enter) ────────────────────
    const padToast = document.getElementById('padToast');
    let padAPrev=false, padDirCooldown=0;
    window.addEventListener('gamepadconnected', ()=>{ padToast.classList.add('show'); setTimeout(()=>padToast.classList.remove('show'),3500); });
    function pollGamepad(){
      const pads = (navigator.getGamepads && navigator.getGamepads()) || [];
      let gp=null; for (const p of pads){ if (p){ gp=p; break; } }
      if (!gp) return;
      // axes (left stick) + d-pad buttons (12 up,13 down,14 left,15 right)
      const ax = gp.axes[0]||0, ay = gp.axes[1]||0;
      let dx=0, dy=0;
      if (Math.abs(ax)>0.5) dx = ax>0?1:-1;
      if (Math.abs(ay)>0.5) dy = ay>0?1:-1;
      const b=gp.buttons;
      if (b[12] && b[12].pressed) dy=-1;
      if (b[13] && b[13].pressed) dy=1;
      if (b[14] && b[14].pressed) dx=-1;
      if (b[15] && b[15].pressed) dx=1;
      const now = performance.now();
      if ((dx||dy)){
        heldDir={dx,dy};
        if (now>padDirCooldown){ nudge(dx,dy); padDirCooldown=now+140; }
      } else { if (heldDir && (heldDir.dx||heldDir.dy)) heldDir=null; }
      // A button (index 0) → enter, edge-triggered
      const aDown = !!(b[0] && b[0].pressed);
      if (aDown && !padAPrev) enterCurrent();
      padAPrev = aDown;
    }
  </script>
</body>
</html>
