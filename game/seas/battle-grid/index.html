<!DOCTYPE html>
<!--
  battle-grid/index.html — single ship-DECK HEX battle prototype for the cause=class RPG.

  WHAT THIS IS
    • A HEX grid (flat-top, odd-q offset) laid over a placeholder ship deck. FFT/D&D tactics.
    • Two units, hot-seat: a player Barbarian vs an enemy Wizard. Each unit's STATS come
      from the cause=class engine (../class-engine) by feeding an example endowment to
      resolve() — see units.js. HP/AC/to-hit/damage/spell-DC are DERIVED from those stats.
    • Turn loop: select → Move (hex BFS within move range) → Attack (adjacent d20) or cast
      a real Tales-of-Tasern spell at range. Visible dice in the combat log. 0 HP = down,
      last side standing wins.

  ENGINE REUSE (the whole point of the pivot)
    • Hex math + d20 combat + spell resolution are PORTED from Tales-of-Tasern:
        tot-engine.js  ←  src/lib/hexGrid.ts (verbatim) + src/lib/hexCombat.ts (verbatim
                          combat/dice) + src/lib/spells.ts (real Magic Missile / Burning
                          Hands / Ray of Frost battle effects).
    • units.js BRIDGES the class-engine output onto ToT's BattleUnit shape (D&D−10
      convention), so a Barbarian (BURGERS) and Wizard (PUMP) drop straight into ToT combat.

  THE CONVERGENCE: a battle UNIT = a crew NFT
    • Each unit has a `crewId` ("<distributor>:<tokenId>"). Its IMAGE is the composited
      paper-doll (base acorn + tint + equipped gear + cosmetics) served by the crew service
      (../../base-crew-meta) at GET <CREW_SERVICE_URL>/crew/render/<crewId>.png.
    • So: STATS from the class-engine, IMAGE from the paper-doll compositor. Equipping
      different gear in the closet changes the render → changes the battle token, no code change.
    • The token falls back to an emoji if the crew image can't load (onerror), never blank.

  HOW TO RUN (TWO services)
    1) Start the crew paper-doll service (port 8791):
        cd C:\Users\bigji\Documents\MfT-Launch\base-crew-meta
        node src/server.js
       (Demo looks are set once via the closet API — crown+cape on :0, sunglasses+cape on
        :1 — and persist in data/closet.json. CREW_SERVICE_URL defaults to localhost:8791;
        override by setting window.CREW_SERVICE_URL before game.js loads, e.g. the hosted
        crew origin in production.)
    2) Serve the PARENT `game/` directory (it imports ../class-engine), open with a SLASH:
        cd C:\Users\bigji\Documents\MfT-Launch\game
        npx serve .
        → open  http://localhost:3000/battle-grid/      ← NOTE the trailing slash
    IMPORTANT: use the trailing-slash directory URL above. Requesting ".../index.html"
    explicitly makes `serve` issue a clean-URL 301 redirect, after which the browser
    resolves the relative module <script src="game.js"> against the wrong base and 404s
    game.js (page stays on "Loading…"). The trailing-slash URL serves index.html with no
    redirect, so the relative imports resolve correctly. (Any static server that doesn't
    rewrite URLs works with either form; `python -m http.server` is also fine.)
    Opening index.html via file:// will fail the cross-folder ES-module import in most
    browsers — use the static server above.

  ART STATUS
    • Unit token  → LIVE paper-doll crew render (crewId → crew service). The base acorn body
                    isn't cut out yet, so the body is the labelled placeholder ("ACORN BOY/GIRL")
                    while the equipped GEAR + COSMETICS (crown, cape, sunglasses) are real art —
                    expected and fine for now. The emoji is only the onerror fallback.
    • Deck bg     → game.js drawDeck() plank pattern (no ship-deck art exists yet; a biome
                    bg path is referenced in units.js ART.bgTemp as a temporary option).
    • Cosmetics   → handled by the crew compositor (closet items layer onto the paper doll);
                    units.js still keeps a `cosmetics[]` slot for any battle-only overlays.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cause=Class — Ship-Deck Hex Skirmish (prototype)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Ship-Deck Skirmish</h1>
  <p class="subtitle">
    Move, strike, and cast across the deck. Your recruited fighter takes the field — gear
    them up to shift the odds. &nbsp;<a href="bilge.html" style="color:#2ecc71;text-decoration:none">🐀 First Real Fight: Bilge Rats →</a>
    &nbsp;<a href="goblin.html" style="color:#2ecc71;text-decoration:none">👹 Goblin Cave (a day out) →</a>
    &nbsp;<a href="pvp.html" style="color:#e6b422;text-decoration:none">⚔️ Open-Sea PVP →</a>
  </p>

  <div class="layout">
    <div class="board-wrap">
      <svg id="board" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="banner"></div>
    </div>

    <div class="side">
      <div id="turn-indicator">Loading…</div>
      <div class="controls">
        <button id="btn-move">Move</button>
        <button id="btn-attack">Attack</button>
        <button id="btn-end">End Turn</button>
        <button id="btn-reset">Reset</button>
      </div>
      <div id="spellbar"></div>

      <div class="panel">
        <h2>Equipment</h2>
        <div id="equipbar"></div>
      </div>

      <div class="panel">
        <h2>Active Unit</h2>
        <div id="stats"></div>
      </div>

      <div class="panel">
        <h2>Combat Log</h2>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <!-- Production crew paper-doll service (units render real pawn dolls; falls back to emoji on error). -->
  <script>window.CREW_SERVICE_URL = "https://tasern.quest";</script>
  <!-- Shared employment store (classic script → window.Employment) so the combat code can
       detect pawns that are "on the job" and block them from sailing/fighting. -->
  <script src="../config/seas-config.js"></script>
  <script src="../employment.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
