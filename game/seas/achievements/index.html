<!DOCTYPE html>
<!--
  game/seas/achievements/index.html — the visible ACHIEVEMENT LIST for Seize the Seas.
  Reads ../achievements-catalog.json (generated by build-achievements-catalog.cjs, which mirrors
  the REAL on-chain registrations). Two LINES, founder reskin 2026-06-27:
     • CIVIC — Gold   (the GOLD tier pools, upstanding deeds, pays GOLD)
     • ROGUE — Black Coin (the cbBTC tier pools, Redrum-Raider dark deeds, pays cbBTC)
  Same id + same deed on both lines; only the name/lore differs. Grouped by tier (Mayor→Emperor).
  Live pool balances are read read-only from a public Base RPC; an empty pool shows "unfunded"
  honestly. Mobile-first (friends test on phones). No chain writes, ever.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hall of Deeds — Seize the Seas</title>
  <style>
    :root{ --ink:#f3ead7; --muted:#b6a584; --gold:#e6b422; --rope:#caa45a; --green:#2ecc71;
           --rogue:#c0563a; --rogueglow:#ff6b4a; }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:rgba(230,180,34,.2); }
    body{ margin:0; font-family:"Segoe UI",system-ui,sans-serif; color:var(--ink); overflow-x:hidden;
      min-height:100vh; min-height:100svh; min-height:100dvh;
      background:linear-gradient(rgba(8,12,18,.86), rgba(8,12,18,.94)), url("../art/title.jpg") center/cover, #0a0f14;
      padding:max(20px,env(safe-area-inset-top)) 14px calc(44px + env(safe-area-inset-bottom)); }
    .wrap{ max-width:820px; margin:0 auto; }
    .hh{ text-align:center; color:var(--gold); font-size:clamp(22px,6vw,30px); letter-spacing:.06em;
      text-transform:uppercase; margin:0; text-shadow:0 2px 0 #6b4e10; }
    .sub{ text-align:center; color:var(--ink); font-size:14.5px; margin:8px auto 4px; line-height:1.5; max-width:600px; }
    .sub b{ color:var(--gold); }
    .meta{ text-align:center; color:var(--muted); font-size:12px; margin:0 auto 18px; max-width:600px; line-height:1.6; }

    /* ── LINE toggle (Civic / Rogue) ── */
    .toggle{ display:flex; gap:10px; justify-content:center; margin:0 0 8px; }
    .tg{ flex:1 1 0; max-width:260px; cursor:pointer; border-radius:14px; padding:12px 10px; text-align:center;
      background:linear-gradient(#241a10,#19120a); border:1px solid #4a3a22; color:var(--muted); }
    .tg .t{ font-weight:800; font-size:16px; letter-spacing:.03em; }
    .tg .d{ font-size:11.5px; margin-top:2px; line-height:1.35; }
    .tg.active.civic{ border-color:var(--gold); color:var(--ink); box-shadow:0 0 0 1px var(--gold), 0 8px 22px rgba(0,0,0,.5); }
    .tg.active.civic .t{ color:var(--gold); }
    .tg.active.rogue{ border-color:var(--rogue); color:var(--ink); box-shadow:0 0 0 1px var(--rogue), 0 8px 22px rgba(0,0,0,.5); background:linear-gradient(#2a140e,#190b07); }
    .tg.active.rogue .t{ color:var(--rogueglow); }
    .tg:active{ transform:translateY(1px); }
    .lineblurb{ text-align:center; font-size:13px; color:var(--muted); margin:0 0 18px; min-height:18px; }
    .lineblurb b{ color:var(--ink); }

    /* ── tier group ── */
    .tier{ margin:0 0 22px; }
    .tierhead{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; border-bottom:1px solid #3a2e1a;
      padding:0 2px 8px; margin:0 0 12px; }
    .tiername{ font-size:18px; font-weight:800; color:var(--gold); letter-spacing:.04em; }
    .rogue-mode .tiername{ color:var(--rogueglow); }
    .tierpool{ font-size:11.5px; color:var(--rope); text-decoration:none; word-break:break-all; }
    .tierpool:hover{ color:var(--gold); }
    .bal{ margin-left:auto; font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px;
      border:1px solid #3f5a2e; background:rgba(46,204,113,.12); color:#9fe6b4; white-space:nowrap; }
    .bal.empty{ border-color:#5a4a2e; background:rgba(202,164,90,.1); color:var(--rope); }
    .bal.loading{ border-color:#3a3a3a; background:rgba(255,255,255,.04); color:var(--muted); }

    .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    .card{ background:linear-gradient(#241a10,#19120a); border:1px solid #4a3a22; border-radius:14px;
      padding:13px 13px 14px; display:flex; flex-direction:column; gap:5px; }
    .rogue-mode .card{ background:linear-gradient(#241310,#160a07); border-color:#5a2f22; }
    .card .top{ display:flex; align-items:center; gap:8px; }
    .card .title{ font-weight:800; font-size:15.5px; color:var(--gold); letter-spacing:.01em; line-height:1.25; }
    .rogue-mode .card .title{ color:var(--rogueglow); }
    .card .chips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:1px; }
    .chip{ font-size:10.5px; letter-spacing:.04em; padding:2px 7px; border-radius:999px;
      background:rgba(202,164,90,.12); color:var(--rope); border:1px solid rgba(202,164,90,.35); }
    .chip.rung{ background:rgba(230,180,34,.12); color:var(--gold); border-color:rgba(230,180,34,.35); }
    .card .lore{ color:var(--muted); font-size:12.5px; line-height:1.5; }
    .card .foot{ margin-top:auto; display:flex; align-items:center; gap:8px; padding-top:6px; }
    .card .reward{ font-size:12px; font-weight:700; color:#9fe6b4; }
    .rogue-mode .card .reward{ color:#f0b49e; }
    .card .pend{ font-size:10.5px; color:var(--rope); border:1px solid rgba(202,164,90,.4);
      border-radius:999px; padding:1px 7px; }
    .card .id{ margin-left:auto; font-size:10.5px; color:#6f6450; font-variant-numeric:tabular-nums; }
    .ladderlbl{ grid-column:1/-1; margin:6px 2px -4px; font-size:12px; color:var(--rope); letter-spacing:.05em; text-transform:uppercase; }

    .legend{ margin:24px auto 0; max-width:620px; color:var(--muted); font-size:12px; line-height:1.7;
      background:rgba(0,0,0,.25); border:1px solid #2e2616; border-radius:12px; padding:14px 16px; }
    .legend b{ color:var(--ink); }
    .legend .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .legend .dot.live{ background:var(--green); } .legend .dot.pend{ background:var(--rope); }
    .back{ display:block; text-align:center; margin:22px auto 0; color:var(--rope); text-decoration:none; font-size:13.5px; }
    .back:hover{ color:var(--gold); }
  </style>
</head>
<body>
  <div class="wrap" id="root">
    <h1 class="hh">🏅 Hall of Deeds</h1>
    <p class="sub">Every deed a crew can earn — and the prize pool it pays from. <b>Pick your allegiance.</b></p>
    <p class="meta" id="meta">Loading the ledger…</p>

    <div class="toggle">
      <div class="tg civic active" id="tgCivic"><div class="t">⚓ Civic — Gold</div><div class="d">Sworn to Port Royal. Pays GOLD.</div></div>
      <div class="tg rogue" id="tgRogue"><div class="t">🏴‍☠️ Rogue — Black Coin</div><div class="d">Redrum Raiders. Pays cbBTC.</div></div>
    </div>
    <p class="lineblurb" id="lineblurb"></p>

    <div id="list"></div>

    <div class="legend" id="legend"></div>
    <a class="back" href="../">‹ back to the harbor</a>
  </div>

  <script>
    "use strict";
    const RPC = "https://mainnet.base.org";
    const TIER_ORDER = ["Mayor", "Lord", "PettyKing", "HighKing", "Emperor"];
    let CAT = null;
    let line = "civic";

    const el = (id) => document.getElementById(id);
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const short = (a) => a.slice(0, 6) + "…" + a.slice(-4);

    // ── read-only ERC20 balanceOf via JSON-RPC (no wallet) ──
    async function balanceOf(token, holder) {
      const data = "0x70a08231000000000000000000000000" + holder.slice(2).toLowerCase();
      const res = await fetch(RPC, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ jsonrpc: "2.0", id: 1, method: "eth_call", params: [{ to: token, data }, "latest"] }),
      });
      const j = await res.json();
      if (j.error) throw new Error(j.error.message || "rpc error");
      return BigInt(j.result || "0x0");
    }
    function fmt(bal, decimals) {
      if (bal === 0n) return "0";
      const d = BigInt(decimals);
      const whole = bal / (10n ** d);
      const frac = bal % (10n ** d);
      if (whole > 0n) {
        const fracStr = frac.toString().padStart(Number(d), "0").slice(0, 4).replace(/0+$/, "");
        return whole.toLocaleString("en-US") + (fracStr ? "." + fracStr : "");
      }
      // sub-1: show up to 8 sig digits
      const fracStr = frac.toString().padStart(Number(d), "0").replace(/0+$/, "");
      return "0." + fracStr.slice(0, 8);
    }

    function render() {
      const L = CAT.lines[line];
      const root = el("root");
      root.classList.toggle("rogue-mode", line === "rogue");
      el("tgCivic").classList.toggle("active", line === "civic");
      el("tgRogue").classList.toggle("active", line === "rogue");
      el("lineblurb").innerHTML = `<b>${esc(L.label)}</b> — ${esc(L.blurb)} <span style="color:var(--rope)">(token ${esc(L.tokenSymbol)})</span>`;

      const byTier = {};
      for (const a of CAT.achievements) (byTier[a.tier] ||= []).push(a);

      let html = "";
      for (const tier of TIER_ORDER) {
        const list = byTier[tier] || [];
        if (!list.length) continue;
        const pool = L.pools[tier];
        const tierLabel = (CAT.tiers.find((t) => t.tier === tier) || {}).label || tier;
        html += `<section class="tier">
          <div class="tierhead">
            <span class="tiername">${esc(tierLabel)}</span>
            <a class="tierpool" href="https://basescan.org/address/${pool}" target="_blank" rel="noopener">${short(pool)} ↗</a>
            <span class="bal loading" data-pool="${pool}" data-token="${L.token}" data-dec="${L.tokenDecimals}" data-sym="${esc(L.tokenSymbol)}">checking…</span>
          </div>`;
        // group cards by ladder within tier for a tidy read
        const byLadder = {};
        for (const a of list) (byLadder[a.ladder] ||= []).push(a);
        html += `<div class="cards">`;
        for (const ladder of Object.keys(byLadder)) {
          html += `<div class="ladderlbl">${esc(ladder)}${byLadder[ladder][0].stat && byLadder[ladder][0].kind === "JOB" ? " · " + esc(byLadder[ladder][0].stat) : ""}</div>`;
          for (const a of byLadder[ladder]) {
            const e = a[line];
            const pend = a.attest === "pending" ? `<span class="pend" title="Registered on-chain, watcher attestation not wired yet">attest pending</span>` : "";
            html += `<div class="card">
              <div class="top"><span class="title">${esc(e.title)}</span></div>
              <div class="chips"><span class="chip rung">${esc(a.rungLabel)}</span><span class="chip">${esc(a.ladder)}</span></div>
              <div class="lore">${esc(e.lore)}</div>
              <div class="foot"><span class="reward">🏆 ${esc(a.reward)}</span>${pend}<span class="id">#${a.id}</span></div>
            </div>`;
          }
        }
        html += `</div></section>`;
      }
      el("list").innerHTML = html;
      loadBalances();
    }

    const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
    async function loadBalances() {
      const badges = Array.from(document.querySelectorAll(".bal[data-pool]"));
      for (const b of badges) {
        await sleep(350); // pace the free public RPC so it doesn't rate-limit
        const pool = b.getAttribute("data-pool");
        const token = b.getAttribute("data-token");
        const dec = b.getAttribute("data-dec");
        const sym = b.getAttribute("data-sym");
        try {
          const bal = await balanceOf(token, pool);
          b.classList.remove("loading");
          if (bal === 0n) { b.classList.add("empty"); b.textContent = "unfunded"; }
          else { b.textContent = fmt(bal, dec) + " " + sym; }
        } catch (err) {
          console.warn("[achievements] balance read failed for", pool, err); // visible, not silent
          b.classList.remove("loading"); b.classList.add("empty"); b.textContent = "balance n/a";
        }
      }
    }

    el("tgCivic").addEventListener("click", () => { line = "civic"; render(); });
    el("tgRogue").addEventListener("click", () => { line = "rogue"; render(); });

    (async function init() {
      try {
        const res = await fetch("../achievements-catalog.json", { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        CAT = await res.json();
      } catch (err) {
        console.error("[achievements] catalog load failed:", err);
        el("meta").innerHTML = '<span style="color:var(--rogue)">Couldn\'t load the deed ledger — refresh and try again.</span>';
        return;
      }
      const total = CAT.achievements.length;
      el("meta").innerHTML = `<b style="color:var(--ink)">${total} deeds</b> per line · ${esc(CAT.meta.reward)}`;
      el("legend").innerHTML =
        `<b>How it works.</b> ${esc(CAT.meta.note)}<br/><br/>` +
        `<span class="dot live"></span><b>Live</b> — ${esc(CAT.meta.attestLegend.live)}<br/>` +
        `<span class="dot pend"></span><b>Attest pending</b> — ${esc(CAT.meta.attestLegend.pending)}<br/><br/>` +
        `Pool balances are read live from Base. <b>unfunded</b> means the pool holds nothing yet — the deed is real, but there's no prize in it right now.`;
      render();
    })();
  </script>
</body>
</html>
