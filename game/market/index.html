<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Port Royal Market 🏴‍☠️</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.2/ethers.umd.min.js"></script>
<style>
  :root{ --bg:#120d07; --card:#1c1610; --line:#2a2114; --muted:#b8a888; --gold:#e6b422; --green:#7fd1a8; }
  *{ box-sizing:border-box; }
  body{ margin:0; padding:64px 14px 60px; background:var(--bg) url(../art/world-map.jpg) center/cover fixed; color:#f3e9d6;
        font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; }
  body::before{ content:""; position:fixed; inset:0; background:rgba(10,7,3,.82); z-index:-1; }
  h1{ font-size:22px; margin:6px 0 2px; text-align:center; }
  .sub{ text-align:center; color:var(--muted); margin:0 0 14px; font-size:13px; }
  .wrap{ max-width:980px; margin:0 auto; }
  .coins{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:0 auto 18px; }
  .coin{ background:var(--card); border:1px solid var(--line); border-radius:9px; padding:7px 13px; font-weight:700; }
  .coin small{ color:var(--muted); font-weight:400; }
  h2{ font-size:15px; color:var(--gold); border-bottom:1px solid var(--line); padding-bottom:5px; margin:22px 0 12px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .item{ background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px; display:flex; flex-direction:column; gap:7px; }
  .item.stocked{ border-color:#3a5a3f; }
  .ico{ font-size:26px; }
  .nm{ font-weight:700; }
  .own{ color:var(--muted); font-size:11.5px; }
  .buy{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
  .price{ color:var(--gold); font-weight:700; font-size:13.5px; }
  .btn{ background:#2a5a2f; border:1px solid var(--green); color:#eafff0; border-radius:8px; font-size:12px; padding:6px 12px; cursor:pointer; }
  .btn:hover{ background:#357039; }
  .chip{ font-size:10px; color:var(--green); border:1px solid #2f5a44; border-radius:5px; padding:1px 4px; margin-left:5px; vertical-align:middle; }
  .toast{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); background:#15110a; border:1px solid var(--gold);
          color:#ffe9b0; padding:10px 16px; border-radius:10px; font-size:13.5px; max-width:90%; box-shadow:0 6px 22px rgba(0,0,0,.5); z-index:50; }
  .foot{ text-align:center; color:var(--muted); margin-top:24px; font-size:12px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🏴‍☠️ Port Royal Market</h1>
    <p class="sub">The hub market — buy provisions &amp; gems at the standing D&amp;D price. Real on-chain trades on the Port Royal walls.</p>
    <div class="coins" id="coins"><span class="coin">Connect your wallet to trade</span></div>
    <div id="shop"></div>
    <div class="foot">One-sided sell walls · 0.01% fee · prices climb as the wall is bought ⛓</div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script type="module">
    import { GOODS } from "../shared/goods-tokens.js";
    import { buyGood, coinBalances, balances, isConnected, connect, getAccount } from "../shared/gold.js";

    const MARKUP = 1.0005;                       // +0.05% covers the 0.01% pool fee
    const COIN_EMOJI = { copper: "🟤", silver: "⚪", gold: "🪙" };
    const shopEl = document.getElementById("shop");
    const coinsEl = document.getElementById("coins");
    let owned = {};                              // good id -> balance (loaded when connected)

    let toastT = null;
    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg; el.hidden = false;
      clearTimeout(toastT); toastT = setTimeout(() => { el.hidden = true; }, 4500);
    }

    async function refreshCoins() {
      if (!isConnected()) { coinsEl.innerHTML = '<span class="coin">Connect your wallet to trade</span>'; return; }
      try {
        const c = await coinBalances();
        coinsEl.innerHTML = ["copper","silver","gold"].map(k =>
          `<span class="coin">${COIN_EMOJI[k]} ${Math.floor(c[k]).toLocaleString()} <small>${k}</small></span>`).join("");
      } catch (e) { /* leave prompt */ }
    }

    function render() {
      shopEl.innerHTML = "";
      for (const [kind, label] of [["food", "🍖 Provisions"], ["gem", "💎 Gems"]]) {
        const list = GOODS.filter(g => g.kind === kind);
        const h = document.createElement("h2"); h.textContent = label; shopEl.appendChild(h);
        const grid = document.createElement("div"); grid.className = "grid";
        for (const g of list) {
          const have = owned[g.id] || 0;
          const card = document.createElement("div");
          card.className = "item" + (have > 0 ? " stocked" : "");
          card.innerHTML = `
            <div class="ico">${g.emoji}</div>
            <div class="nm">${g.name}</div>
            ${have > 0 ? `<div class="own">you hold ${have.toLocaleString(undefined,{maximumFractionDigits:2})}</div>` : ""}
            <div class="buy">
              <span class="price">${COIN_EMOJI[g.coin]} ${g.price.toLocaleString()} ${g.coin}<span class="chip">⛓</span></span>
              <button class="btn">Buy</button>
            </div>`;
          card.querySelector(".btn").addEventListener("click", () => buy(g));
          grid.appendChild(card);
        }
        shopEl.appendChild(grid);
      }
    }

    let busy = false;
    async function buy(g) {
      if (busy) return;
      busy = true;
      const cost = +(g.price * MARKUP).toFixed(6);
      try {
        if (!isConnected()) { await connect(); await refreshCoins(); }
        toast(`Confirm in your wallet — ${cost} ${g.coin} for ${g.name}…`);
        await buyGood(g.address, g.coin, cost);
        toast(`Bought ${g.name} ✓ (spent ~${cost} ${g.coin})`);
        await refreshOwned(); await refreshCoins(); render();
      } catch (e) {
        toast("⚠ " + (e?.shortMessage || e?.message || "buy failed"));
      } finally { busy = false; }
    }

    async function refreshOwned() {
      if (!isConnected()) return;
      // read each good's balance via a tiny ERC20 view through the same provider window.ethers uses
      try {
        const acct = getAccount();
        const prov = new window.ethers.BrowserProvider(window.ethereum);
        const abi = ["function balanceOf(address) view returns (uint256)"];
        await Promise.all(GOODS.map(async g => {
          const b = await new window.ethers.Contract(g.address, abi, prov).balanceOf(acct);
          owned[g.id] = Number(window.ethers.formatUnits(b, 18));
        }));
      } catch (e) { /* non-fatal */ }
    }

    // initial paint; if a wallet is already connected (via the header HUD), load live data
    render();
    (async () => {
      try { if (window.ethereum && window.ethereum.selectedAddress) { await connect(); await refreshOwned(); await refreshCoins(); render(); } } catch (e) {}
    })();
    window.addEventListener("focus", () => { if (isConnected()) { refreshCoins(); } });
  </script>
  <script type="module" src="../shared/header.js"></script>
</body>
</html>
