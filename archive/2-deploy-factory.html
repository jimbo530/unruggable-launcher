<!DOCTYPE html>
<html><head>
<title>MycoPad V3.5 — Deploy Factory</title>
<style>
  body { font-family: monospace; background: #0d1210; color: #c8d8c4; padding: 20px; max-width: 700px; margin: auto; }
  h1 { color: #7ee787; font-size: 18px; }
  p { color: #8b949e; }
  label { display: block; margin: 8px 0 4px; color: #8b949e; }
  input, select { background: #161b1e; color: #c8d8c4; border: 1px solid #2d3a2e; padding: 8px; width: 100%; font-family: monospace; box-sizing: border-box; border-radius: 4px; }
  select { color: #7ee787; font-size: 14px; }
  button { background: #238636; color: #fff; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; font-family: monospace; margin: 8px 0; border-radius: 6px; }
  button:hover { background: #2ea043; }
  #log { white-space: pre-wrap; margin-top: 16px; padding: 12px; background: #161b1e; border: 1px solid #2d3a2e; min-height: 100px; border-radius: 4px; }
  .addr { color: #d4a853; font-weight: bold; }
  .err { color: #f85149; }
  .info { color: #79c0ff; }
  .auto { padding: 8px; background: #161b1e; border: 1px solid #2d3a2e; margin-top: 8px; border-radius: 4px; }
  .dim { color: #484f58; font-size: 11px; }
</style>
</head><body>
<h1>MycoPad V3.5 — Deploy Launch Factory</h1>
<p>Deploys MycoPadV3: 3 floor pools (AZUSD + BB + EB) + MfT curve.<br>
AZUSD via Aerodrome. MfT curve reads on-chain AZUSD/MfT price.<br>
Constructor: 19 params (13 address + 6 numeric). Chain addresses auto-filled.</p>

<label>Target Chain:</label>
<select id="chain" onchange="fillAddresses()"></select>

<label>Spore Reactor Implementation (clone template):</label>
<input id="reactorImpl" placeholder="0x...">

<label>Upstream Reactor (MycoPad Reactor for fuel):</label>
<input id="upstreamReactor" placeholder="0x...">

<div class="auto" id="autoFields"></div>

<br>
<button onclick="deploy()">Deploy MycoPadV3.5 Factory</button>
<div id="log"></div>

<script type="module">
import { ethers } from "https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.min.js";
import { CHAINS, chainOptions } from "../site/chains.js";

document.getElementById("chain").innerHTML = chainOptions();

function fillAddresses() {
  const c = CHAINS[Number(document.getElementById("chain").value)];
  document.getElementById("reactorImpl").value = c.reactorImpl || "";
  document.getElementById("autoFields").innerHTML = `
    <div class="dim">Auto-filled for ${c.name}:</div>
    <label>WETH:</label><input id="weth" value="${c.weth}">
    <label>USDC:</label><input id="usdc" value="${c.usdc}">
    <label>AZUSD:</label><input id="azusd" value="${c.azusd}">
    <label>cbBTC (intermediate):</label><input id="wrappedBtc" value="${c.wrappedBtc}">
    <label>MfT Token:</label><input id="mft" value="${c.mft}">
    <label>BB (BTC-banded):</label><input id="bb" value="${c.bb}">
    <label>EB (ETH-banded):</label><input id="eb" value="${c.eb}">
    <label>V3 Factory:</label><input id="v3Factory" value="${c.v3Factory}">
    <label>Position Manager:</label><input id="pm" value="${c.pm}">
    <label>SwapRouter02 (Uniswap):</label><input id="router" value="${c.router}">
    <label>Aerodrome CL Router:</label><input id="aeroRouter" value="${c.aeroRouter}">
    <label>WETH/USDC Fee Tier:</label><input id="wethUsdcFee" value="${c.wethUsdcFee}">
    <label>Aerodrome Tick Spacing (USDC/AZUSD):</label><input id="aeroTickSpacing" value="${c.aeroTickSpacing}">
    <label>WETH/cbBTC Fee Tier:</label><input id="wethBtcFee" value="${c.wethBtcFee}">
    <label>cbBTC/BB Fee Tier:</label><input id="btcBbFee" value="${c.btcBbFee}">
    <label>WETH/EB Fee Tier:</label><input id="wethEbFee" value="${c.wethEbFee}">
    <label>MfT Price Pool Fee (AZUSD/MfT oracle):</label><input id="mftPriceFee" value="${c.mftPriceFee || 10000}">
  `;
}
fillAddresses();
window.fillAddresses = fillAddresses;

const ABI = [{"inputs":[{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"address"},{"type":"uint24"},{"type":"int24"},{"type":"uint24"},{"type":"uint24"},{"type":"uint24"},{"type":"uint24"}],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[],"name":"owner","outputs":[{"type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"launchCount","outputs":[{"type":"uint256"}],"stateMutability":"view","type":"function"}];

const BYTECODE = await fetch("MycoPadV3.bin").then(r => r.text());

const log = document.getElementById("log");
function out(msg, cls) { log.innerHTML += `<span class="${cls||''}">${msg}</span>\n`; }

window.deploy = async function() {
  try {
    const targetChain = Number(document.getElementById("chain").value);
    const chain = CHAINS[targetChain];
    const reactorImpl = document.getElementById("reactorImpl").value.trim();
    const upstreamReactor = document.getElementById("upstreamReactor").value.trim();
    if (!reactorImpl || !upstreamReactor) {
      out("Fill in Reactor Impl and Upstream Reactor addresses", "err"); return;
    }

    if (!window.ethereum) { out("No wallet found", "err"); return; }
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const network = await provider.getNetwork();
    out(`Connected: ${await signer.getAddress()}`, "info");
    out(`Chain: ${network.chainId} (${chain.name})`, "info");

    if (Number(network.chainId) !== targetChain) {
      out(`WARNING: Wallet is on chain ${network.chainId}, expected ${targetChain} (${chain.name})!`, "err");
      return;
    }

    // Constructor: 13 addresses + 6 numerics = 19 params
    const args = [
      document.getElementById("weth").value.trim(),          // 1
      document.getElementById("usdc").value.trim(),          // 2
      document.getElementById("azusd").value.trim(),         // 3
      document.getElementById("wrappedBtc").value.trim(),    // 4
      document.getElementById("mft").value.trim(),           // 5
      document.getElementById("bb").value.trim(),            // 6
      document.getElementById("eb").value.trim(),            // 7
      document.getElementById("v3Factory").value.trim(),     // 8
      document.getElementById("pm").value.trim(),            // 9
      document.getElementById("router").value.trim(),        // 10
      document.getElementById("aeroRouter").value.trim(),    // 11
      reactorImpl,                                           // 12
      upstreamReactor,                                       // 13
      Number(document.getElementById("wethUsdcFee").value),  // 14
      Number(document.getElementById("aeroTickSpacing").value), // 15
      Number(document.getElementById("wethBtcFee").value),   // 16
      Number(document.getElementById("btcBbFee").value),     // 17
      Number(document.getElementById("wethEbFee").value),    // 18
      Number(document.getElementById("mftPriceFee").value)   // 19
    ];

    out("\nConstructor args (19):");
    out("  1  WETH:            " + args[0]);
    out("  2  USDC:            " + args[1]);
    out("  3  AZUSD:           " + args[2]);
    out("  4  cbBTC:           " + args[3]);
    out("  5  MfT:             " + args[4]);
    out("  6  BB:              " + args[5]);
    out("  7  EB:              " + args[6]);
    out("  8  V3 Factory:      " + args[7]);
    out("  9  NPM:             " + args[8]);
    out("  10 Uniswap Router:  " + args[9]);
    out("  11 Aerodrome Router:" + args[10]);
    out("  12 Reactor Impl:    " + args[11]);
    out("  13 Upstream Reactor:" + args[12]);
    out("  14 WETH/USDC Fee:   " + args[13]);
    out("  15 Aero TickSpacing:" + args[14]);
    out("  16 WETH/cbBTC Fee:  " + args[15]);
    out("  17 cbBTC/BB Fee:    " + args[16]);
    out("  18 WETH/EB Fee:     " + args[17]);
    out("  19 MfT Price Fee:   " + args[18]);

    out("\nDeploying MycoPadV3.5 Factory...");
    const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
    const contract = await factory.deploy(...args);
    out("Tx sent: " + contract.deploymentTransaction().hash, "info");

    await contract.waitForDeployment();
    const addr = await contract.getAddress();
    out(`\nMycoPadV3.5 Factory deployed at:`, "info");
    out(addr, "addr");
    out(`\n${chain.explorer}/address/${addr}`, "info");
    out("\nUpdate chains.js factory field with this address.", "info");
  } catch(e) {
    out("ERROR: " + e.message, "err");
  }
};
</script>
</body></html>
